ters into multi-byte sequences (e.g. \\u00xx is 6 bytes) using g_stpcpy() into the 'fixed' output buffer, but the loop only checks `(size_t)(safe_iter - fixed) < fixed_len` *before* each iteration, not whether the upcoming escape sequence (up to 6 bytes) actually fits in the remaining space. When safe_iter is within 1-5 bytes of the end of the buffer, the bounds check still passes (since it merely requires the offset to be less than fixed_len) and g_stpcpy() then writes up to 6 bytes past that point, overflowing the caller's stack buffer (`char safe_value[PATH_MAX + 4 + 1]` in rm_fmt_json_key_unsafe) by up to 5 bytes. This function is called on attacker-controllable data: file paths from the scanned filesystem (line 324: `rm_fmt_json_key_unsafe(out, \"path\", file_path)`), directory names (line 350), and cwd/argv strings (lines 194, 196) - a filename containing control characters placed near the PATH_MAX length boundary triggers a stack buffer overflow.","fix":"Before writing `text` in the loop, check that `(safe_iter - fixed) + strlen(text) < fixed_len` (or always reserve room for the worst case, e.g. stop when `fixed_len - (safe_iter - fixed) < 7`) so the escape sequence cannot be written past the end of the buffer.","locations":[{"ref":"lib/formats/json.c:95-145","code":"   95 | static bool rm_fmt_json_fix(const char *string, char *fixed, size_t fixed_len) {\n   96 |     /* More information here:\n   97 |      *\n   98 |      * http://stackoverflow.com/questions/4901133/json-and-escaping-characters/4908960#4908960\n   99 |      */\n  100 | \n  101 |     int n = strlen(string);\n  102 |     char *safe_iter = fixed;\n  103 | \n  104 |     for(int i = 0; i < n && (size_t)(safe_iter - fixed) < fixed_len; ++i) {\n  105 |         unsigned char *curr = (unsigned char *)&string[i];\n  106 | \n  107 |         char text[20];\n  108 |         memset(text, 0, sizeof(text));\n  109 | \n  110 |         if(*curr == '\"' || *curr == '\\\\') {\n  111 |             /* Printable, but needs to be escaped */\n  112 |             text[0] = '\\\\';\n  113 |             text[1] = *curr;\n  114 |         } else if((*curr > 0 && *curr < 0x1f) || *curr == 0x7f) {\n  115 |             /* Something unprintable */\n  116 |             switch(*curr) {\n  117 |             case '\\b':\n  118 |                 g_snprintf(text, sizeof(text), \"\\\\b\");\n  119 |                 break;\n  120 |             case '\\f':\n  121 |                 g_snprintf(text, sizeof(text), \"\\\\f\");\n  122 |                 break;\n  123 |             case '\\n':\n  124 |                 g_snprintf(text, sizeof(text), \"\\\\n\");\n  125 |                 break;\n  126 |             case '\\r':\n  127 |                 g_snprintf(text, sizeof(text), \"\\\\r\");\n  128 |                 break;\n  129 |             case '\\t':\n  130 |                 g_snprintf(text, sizeof(text), \"\\\\t\");\n  131 |                 break;\n  132 |             default:\n  133 |                 g_snprintf(text, sizeof(text), \"\\\\u00%02x\", (guint)*curr);\n  134 |                 break;\n  135 |             }\n  136 |         } else {\n  137 |             /* Take it unmodified */\n  138 |             text[0] = *curr;\n  139 |         }\n  140 | \n  141 |         safe_iter = g_stpcpy(safe_iter, text);\n  142 |     }\n  143 | \n  144 |     return (size_t)(safe_iter - fixed) < fixed_len;\n  145 | }","lines":51},{"ref":"lib/formats/json.c:147-157","code":"  147 | static void rm_fmt_json_key_unsafe(FILE *out, const char *key, const char *value) {\n  148 |     char safe_value[PATH_MAX + 4 + 1];\n  149 |     memset(safe_value, 0, sizeof(safe_value));\n  150 | \n  151 |     if(rm_fmt_json_fix(value, safe_value, sizeof(safe_value))) {\n  152 |         fprintf(out, \"\\\"%s\\\": \\\"%s\\\"\", key, safe_value);\n  153 |     } else {\n  154 |         /* This should never happen but give at least means of debugging */\n  155 |         fprintf(out, \"\\\"%s\\\": \\\"<BROKEN PATH>\\\"\", key);\n  156 |     }\n  157 | }","lines":11}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"rm_cmd_size_string_to_bytes() in lib/cmdline.c computes `fraction = ((double)fraction_num) / pow(10, 1 + ((int)log10(fraction_num)))` whenever a size spec contains a dot followed by digits (e.g. for --size, -q/-Q clamp offsets, --limit-mem, --read-buffer-len, --sweep-size, --sweep-files). If the digits after the dot parse to 0 (e.g. user passes \"5.0\", \"5.00\", or a bare \"5.\" so dot[1] is empty/strtoull returns 0), then log10(0) is -inf, (int)(-inf) is undefined behavior that in practice yields INT_MIN on glibc, `1 + INT_MIN` signed-overflows, and pow(10, huge_negative_exponent) is 0, producing fraction = 0/0 = NaN. NaN then propagates into `(result + fraction) * size_factor`, the overflow guard `fres > nextafter(...)` is false for NaN, so `result = fres` casts NaN to RmOff (implementation-defined/UB), yielding a garbage size threshold silently accepted as valid. Verified end-to-end with a standalone reproduction of the exact arithmetic: log10(0)=-inf, (int)log10(0)=INT_MIN, final fraction=-nan.","fix":"Guard against fraction_num == 0 before calling log10(), e.g. `fraction = (fraction_num == 0) ? 0.0 : ((double)fraction_num) / pow(10, 1 + (int)log10(fraction_num));`.","locations":[{"ref":"lib/cmdline.c:341-364","code":"  341 |     char *dot = strchr(size_spec_stripped, '.');\n  342 |     if(dot != NULL) {\n  343 |         need_multiply = true;\n  344 | \n  345 |         // Parse with strtoull since we only accept numbers after the dot.\n  346 |         // (not 1e10 or negative number like strtod would support them)\n  347 |         char *first_error = NULL;\n  348 |         RmOff fraction_num = strtoull(&dot[1], &first_error, 10);\n  349 |         if(first_error != NULL && *first_error != 0) {\n  350 |             g_set_error(error, RM_ERROR_QUARK, 0, _(\"Failed to parse size fraction\"));\n  351 |             return 0;\n  352 |         }\n  353 | \n  354 |         if(fraction_num == ULLONG_MAX && errno == ERANGE) {\n  355 |             g_set_error(error, RM_ERROR_QUARK, 0, _(\"Fraction is too big for uint64\"));\n  356 |             return 0;\n  357 |         }\n  358 | \n  359 |         // Make sure number parsing doesn't see the dot.\n  360 |         *dot = 0;\n  361 | \n  362 |         // Convert the integer (e.g. 523) to a fraction (e.g. 0.523).\n  363 |         fraction = ((double)fraction_num) / pow(10, 1 + ((int)log10(fraction_num)));\n  364 |     }","lines":24},{"ref":"lib/cmdline.c:380-392","code":"  380 |     RmOff result = base_size;\n  381 |     if(need_multiply) {\n  382 |         // Only multiply if we really have to.\n  383 |         double fres = (result + fraction) * size_factor;\n  384 | \n  385 |         // Check if an overflow happened during multiplication.\n  386 |         if(fres > nextafter((double)ULLONG_MAX, 0)) {\n  387 |             g_set_error(error, RM_ERROR_QUARK, 0,\n  388 |                         _(\"Size factor would overflow size (max. 2**64 allowed)\"));\n  389 |             return 0;\n  390 |         }\n  391 |         result = fres;\n  392 |     }","lines":13}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In rm_file_new(), self->file_size is computed from cfg's *end*-offset/-factor settings while start_seek was computed earlier from the *start*-offset/-factor settings. The validation at cmdline.c only compares skip_start_factor against skip_end_factor; it never validates the absolute-offset fields (skip_start_offset/skip_end_offset) against each other or against the factor fields. So a user combining an absolute start offset with an absolute (or default) end offset can get self->file_size < start_seek. The guard 'if((self->file_size - start_seek) == 0 ...)' uses unsigned RmOff subtraction, so a negative difference wraps to a huge value instead of being caught, and self->hash_offset is then set past self->file_size. Downstream in shredder.c this makes the read start at/after EOF, so the file is silently dropped from the duplicate scan (status set to RM_FILE_STATE_IGNORE) with only a generic 'Unexpected EOF' warning, instead of a clear error about the invalid -q/-Q combination; in shredder.c's progress-byte-counter underflow at the same call site, the ETA/remaining-bytes stats can also be corrupted for large mismatches.","fix":"Replace the unsigned-underflow-dependent check with a signed/clamped comparison, e.g. `if(self->file_size <= start_seek) { return NULL; }`, and additionally validate absolute skip_start_offset/skip_end_offset against each other in cmdline.c so an invalid range is rejected at parse time with a clear error message.","locations":[{"ref":"lib/file.c:75-88","code":"   75 |     if(type == RM_LINT_TYPE_DUPE_CANDIDATE || type == RM_LINT_TYPE_PART_OF_DIRECTORY) {\n   76 |         if(cfg->use_absolute_end_offset) {\n   77 |             self->file_size = CLAMP(actual_file_size, 1, cfg->skip_end_offset);\n   78 |         } else {\n   79 |             self->file_size = actual_file_size * cfg->skip_end_factor;\n   80 |         }\n   81 | \n   82 |         /* Check if the actual slice the file will be > 0; we don't want empty files in shredder */\n   83 |         if((self->file_size - start_seek) == 0 && actual_file_size != 0) {\n   84 |             return NULL;\n   85 |         }\n   86 | \n   87 |         self->actual_file_size = actual_file_size;\n   88 |     }","lines":14}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"file->n_children is `size_t` (file.h:271) but is populated via `(size_t)json_object_get_int_member(object, \"n_children\")` (replay.c:294) directly from untrusted JSON with no bounds/sign check. A negative value in the JSON wraps to a huge size_t. This value then flows into `session->total_files += file->n_children;` and `session->dup_counter += file->n_children;` (replay.c:663, 673), where total_files is a 32-bit `gint` (session.h:84) - the addition silently overflows/wraps, corrupting the reported statistics (and on some platforms is signed-overflow UB). Similarly 'size' (replay.c:291) is cast directly into actual_file_size (RmOff/guint64), so a negative JSON size silently becomes a huge file size that is summed into total_lint_size.","fix":"Validate that the JSON 'size' and 'n_children' values are non-negative (and within sane bounds) before assigning them to actual_file_size/n_children; reject or clamp invalid values instead of silently wrapping on cast.","locations":[{"ref":"lib/replay.c:291","code":"  291 |             file->actual_file_size = json_object_get_int_member(object, \"size\");","lines":1},{"ref":"lib/replay.c:294","code":"  294 |         file->n_children = (size_t)json_object_get_int_member(object, \"n_children\");","lines":1},{"ref":"lib/replay.c:663","code":"  663 |         session->total_files += file->n_children;","lines":1},{"ref":"lib/replay.c:673","code":"  673 |                 session->dup_counter += file->n_children;","lines":1}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"rm_offset_get_from_fd() computes extent-contiguity checks using `unsigned long` locals (expected_dense, expected) from __u64 fiemap_extent fields (fe_physical/fe_logical/fe_length). On 32-bit platforms (RM_PLATFORM_32, explicitly supported per utilities.h's rm_sys_preadv branch) `unsigned long` is 32 bits, so these computations silently truncate for files/extents with offsets >= 4GB, producing incorrect contiguity results and wrong reflink/clone detection (rm_util_link_type) for large files on 32-bit builds.","fix":"Declare expected_dense and expected as RmOff (uint64_t) instead of unsigned long to match the __u64 fiemap_extent fields.","locations":[{"ref":"lib/utilities.c:1062-1064","code":" 1062 |                 unsigned long expected_dense = fm_last.fe_physical + fm_last.fe_length;\n 1063 |                 unsigned long expected = fm_last.fe_physical + fm_ext.fe_logical - fm_last.fe_logical;\n 1064 |                 if(fm_ext.fe_physical != expected || fm_ext.fe_physical != expected_dense) {","lines":3}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"RmDigestExt.len is a guint8 (max 255), but rm_digest_ext_update() computes `state->len = size / 2` where size is an RmOff (64-bit) derived from strlen() of a JSON-supplied checksum string with no upper bound check. Any checksum string longer than 510 hex characters silently truncates state->len via implicit narrowing conversion, producing a digest of the wrong (truncated) length rather than an error, which can cause incorrect/non-deterministic duplicate matching for replay files with abnormally long checksum fields.","fix":"Validate the parsed checksum string length against a sane maximum (or change RmDigestExt.len to a wider type, e.g. guint16/guint32) before assigning, and reject/log an error for oversized values instead of silently truncating.","locations":[{"ref":"lib/checksum.c:618-621","code":"  618 | typedef struct RmDigestExt {\n  619 |     guint8 len;\n  620 |     guint8 *data;\n  621 | } RmDigestExt;","lines":4},{"ref":"lib/checksum.c:654-660","code":"  654 | \n  655 |     state->len = size / 2;\n  656 |     state->data = g_slice_alloc(state->len);\n  657 | \n  658 |     for(unsigned i = 0; i < state->len; ++i) {\n  659 |         state->data[i] = (CHAR_TO_NUM(data[2 * i]) << 4) + CHAR_TO_NUM(data[2 * i + 1]);\n  660 |     }","lines":7}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"rm_hasher_buffered_read() calls `fseek(fd, start_offset, SEEK_SET)` where start_offset is a guint64, but fseek()'s offset parameter is a `long`, which is 32-bit on common 32-bit platforms (rmlint explicitly supports 32-bit builds, see RM_PLATFORM_32 used elsewhere in lib/checksum.c for the murmur hash selection). On such platforms, start_offset values >= 2GiB are truncated, causing the buffered-read path to seek to the wrong file position for large files / large start offsets, silently producing a checksum over the wrong file region. The unbuffered preadv()-based read path does not have this problem since it passes the full 64-bit offset directly to preadv().","fix":"Use fseeko(fd, (off_t)start_offset, SEEK_SET) instead of fseek(), ensuring the build defines _FILE_OFFSET_BITS=64 (or equivalent) so off_t is 64-bit even on 32-bit platforms.","locations":[{"ref":"lib/hasher.c:184-188","code":"  184 |     if(fseek(fd, start_offset, SEEK_SET) == -1) {\n  185 |         rm_log_perror(\"fseek(3) failed\");\n  186 |         fclose(fd);\n  187 |         return FALSE;\n  188 |     }","lines":5}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"rm_shred_get_read_size() computes 'result = (group->next_offset - file->hash_offset)' from two RmOff (guint64) values and returns it as a gint32. The subtraction is currently bounded in practice by SHRED_MAX_READ_FACTOR/SHRED_PARANOID_BYTES so it stays well under INT32_MAX, but the function offers no defensive clamp/assert, so any future change to the read-size heuristics (or an unexpected combination of page size / offset_factor) could silently truncate or sign-wrap the byte count fed into rm_hasher_task_hash(), corrupting the amount of data read/hashed for a file.","fix":"Change the return type to RmOff (guint64) to match the operands and the type of the caller's bytes_to_read variable (already RmOff at line 1663), or add a g_assert(result >= 0 && result <= G_MAXINT32) before returning.","locations":[{"ref":"lib/shredder.c:496-533","code":"  496 | static gint32 rm_shred_get_read_size(RmFile *file, RmShredTag *tag) {\n  497 |     g_assert(file);\n  498 |     RmShredGroup *group = file->shred_group;\n  499 |     g_assert(group);\n  500 | \n  501 |     gint32 result = 0;\n  502 | \n  503 |     /* calculate next_offset property of the RmShredGroup */\n  504 |     g_assert(tag);\n  505 |     RmOff balanced_bytes = tag->page_size * SHRED_BALANCED_PAGES;\n  506 |     RmOff target_bytes = balanced_bytes * group->offset_factor;\n  507 |     if(group->next_offset == 2) {\n  508 |         file->fadvise_requested = 1;\n  509 |     }\n  510 | \n  511 |     /* round to even number of pages, round up to MIN_READ_PAGES */\n  512 |     RmOff target_pages = MAX(target_bytes / tag->page_size, 1);\n  513 |     target_bytes = target_pages * tag->page_size;\n  514 | \n  515 |     /* test if cost-effective to read the whole file */\n  516 |     if(group->hash_offset + target_bytes + (balanced_bytes) >= group->file_size) {\n  517 |         group->next_offset = group->file_size;\n  518 |         file->fadvise_requested = 1;\n  519 |     } else {\n  520 |         group->next_offset = group->hash_offset + target_bytes;\n  521 |     }\n  522 | \n  523 |     /* for paranoid digests, make sure next read is not > max size of paranoid buffer */\n  524 |     if(group->digest_type == RM_DIGEST_PARANOID) {\n  525 |         group->next_offset =\n  526 |             MIN(group->next_offset, group->hash_offset + SHRED_PARANOID_BYTES);\n  527 |     }\n  528 | \n  529 |     file->status = RM_FILE_STATE_NORMAL;\n  530 |     result = (group->next_offset - file->hash_offset);\n  531 | \n  532 |     return result;\n  533 | }","lines":38}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"In rm_hasher_main() (lib/hash-utility.c), `int buf_size = (g_strv_length(tag.paths) + 1) * sizeof(RmDigest *);` truncates the result of a guint * size_t multiplication into a 32-bit signed int. With an extremely large number of input paths (over roughly 268 million on a 64-bit build, where sizeof(RmDigest*) == 8), this multiplication would overflow the int, producing a wrong (possibly negative or wrapped) buf_size that is then passed to g_slice_alloc0()/g_slice_free1(), causing undersized allocations and subsequent out-of-bounds writes in rm_hasher_callback(). Not practically reachable via normal CLI/stdin usage (would require hundreds of millions of file paths), but the type is technically wrong for a value derived from a user-supplied path count.","fix":"Declare buf_size as size_t (or gsize) instead of int to avoid truncation on very large path counts.","locations":[{"ref":"lib/hash-utility.c:202-203","code":"  202 |     int buf_size = (g_strv_length(tag.paths) + 1) * sizeof(RmDigest *);\n  203 |     tag.read_succesful = g_slice_alloc0(buf_size);","lines":2},{"ref":"lib/hash-utility.c:207","code":"  207 |         tag.completed_digests_buffer = g_slice_alloc0(buf_size);","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"RunnerView.on_default_action() (triggered by the global Ctrl+Enter accelerator while the runner view is active) calls self._generate_script(trie, trie.root), passing a single PathNode instead of a list/iterable of nodes like every other caller (on_generate_script passes [self.model.trie.root]). _generate_script() does `for node in nodes:`, and PathNode has no __iter__ (see tree.py __slots__), so this raises TypeError: 'PathNode' object is not iterable, crashing the keyboard-shortcut code path.","fix":"Change to `self._generate_script(trie, [trie.root])` to match on_generate_script().","locations":[{"ref":"gui/shredder/views/runner.py:437-441","code":"  437 |     def on_default_action(self):\n  438 |         \"\"\"Called on Ctrl-Enter\"\"\"\n  439 |         if self.actionbar.is_sensitive():\n  440 |             trie = self.model.trie\n  441 |             self._generate_script(trie, trie.root)","lines":5},{"ref":"gui/shredder/tree.py:94-119","code":"   94 | class PathNode:\n   95 |     \"\"\"A single node in the PathTrie.\"\"\"\n   96 |     # Save a bit of memory:\n   97 |     __slots__ = [\n   98 |         # Public:\n   99 |         'name', 'parent', 'children', 'row',\n  100 | \n  101 |         # Private:\n  102 |         'is_leaf', 'idx', 'indices', 'depth'\n  103 |     ]\n  104 | \n  105 |     def __init__(self, name, parent, metadata=None, children=None):\n  106 |         # Public:\n  107 |         self.name = name\n  108 |         self.parent = parent\n  109 |         self.children = children or OrderedDict()\n  110 | \n  111 |         # If None probably a directory node, show the bare minimum:\n  112 |         self.row = Column.make_row(metadata or {})\n  113 | \n  114 |         # Private:\n  115 |         self.indices = deque()\n  116 |         self.idx = 0\n  117 |         self.is_leaf = False\n  118 |         self.depth = (parent.depth + 1) if parent else 0\n  119 | ","lines":26}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"rm_hasher_unbuffered_read() clamps bytes_read with `bytes_read = MIN((gsize)bytes_read, bytes_remaining)`. When the caller requests a whole-file read (bytes_to_read == 0, i.e. read_to_eof is TRUE), bytes_remaining is initialized to bytes_to_read == 0 and is never anything else, so this MIN always yields 0 regardless of how many bytes preadv() actually returned. Every buffer's buffer->len is then computed via CLAMP(0 - i*buf_size, 0, buf_size) == 0, so no data is ever sent to the hash pipe, and the loop immediately exits via the `read_to_eof && bytes_read == 0` branch reporting success. The result is a digest computed over zero bytes for any unbuffered (preadv-based) whole-file read. The sibling function rm_hasher_buffered_read() does not have this bug because it tracks EOF via feof(fd) instead of clamping against bytes_remaining. Currently no caller passes bytes_to_read=0 (both shredder.c and hash-utility.c pass an explicit size), so this is latent, but it directly contradicts the documented API contract in hasher.h (\"pass 0 to read whole file\") and will silently corrupt results for any future/external caller that uses it as documented.","fix":"Track EOF independently of bytes_remaining when read_to_eof is true, e.g. only apply the MIN(bytes_read, bytes_remaining) clamp when !read_to_eof, and detect actual end-of-file by checking the preadv() return value (0 or short read) instead of relying on bytes_remaining reaching 0.","locations":[{"ref":"lib/hasher.c:279","code":"  279 |     guint64 bytes_remaining = bytes_to_read;","lines":1},{"ref":"lib/hasher.c:301-302","code":"  301 |         /* ignore over-reads */\n  302 |         bytes_read = MIN((gsize)bytes_read, bytes_remaining);","lines":2},{"ref":"lib/hasher.c:313-314","code":"  313 |             buffer->len = CLAMP(bytes_read - i * (gint32)hasher->buf_size, 0,\n  314 |                                 (gint32)hasher->buf_size);","lines":2},{"ref":"lib/hasher.c:325-327","code":"  325 |         if(read_to_eof && bytes_read == 0) {\n  326 |             success = TRUE;\n  327 |             break;","lines":3}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"rm_shred_group_transfer() decrements source group counters using raw single-file fields (file->is_prefd, !file->is_prefd, !file->is_new) instead of the cluster-aware accessors (rm_file_n_prefd(), rm_file_n_nprefd(), rm_file_n_new()) that were used to increment them in rm_shred_group_push_file(). Two distinct bugs: (1) for hardlink/ext_cksum clusters, the transferred RmFile pointer can represent more than one logical file, so num_files/n_pref/n_npref are under-decremented, leaving the source group's counters too high; (2) n_new is decremented by '!file->is_new' which is the *inverted* and non-aggregated value -- a new file (is_new=true) wrongly leaves n_new unchanged while a non-new file (is_new=false) wrongly decrements n_new. This corrupts the bookkeeping used by rm_shred_group_qualifies() (num_files>=2, n_pref>0, n_npref>0, n_new>0 checks) after --mtime-window or --unmatched-basenames splits a finishing group, which can cause groups to be wrongly reported as duplicates or wrongly dropped, especially when min_mtime (--newer-than) filtering is combined with hardlinks/clusters and either of those two split features.","fix":"In rm_shred_group_transfer(), mirror the increment logic exactly: source->num_files -= rm_file_n_files(file); source->n_pref -= rm_file_n_prefd(file); source->n_npref -= rm_file_n_nprefd(file); source->n_new -= rm_file_n_new(file); (note the sign: subtract the new-count, not its inverse).","locations":[{"ref":"lib/shredder.c:919-928","code":"  919 |         /* update group counters */\n  920 |         shred_group->num_files += rm_file_n_files(file);\n  921 |         shred_group->n_pref += rm_file_n_prefd(file);\n  922 |         shred_group->n_npref += rm_file_n_nprefd(file);\n  923 |         shred_group->n_new += rm_file_n_new(file);\n  924 |         shred_group->n_clusters++;\n  925 |         if(file->ext_cksum == NULL) {\n  926 |             shred_group->n_unhashed_clusters++;\n  927 |         }\n  928 |         shred_group->n_inodes += RM_FILE_INODE_COUNT(file);","lines":10},{"ref":"lib/shredder.c:1370-1379","code":" 1370 | static void rm_shred_group_transfer(RmFile *file, RmShredGroup *source,\n 1371 |                                     RmShredGroup *dest) {\n 1372 |     rm_shred_group_push_file(dest, file, FALSE);\n 1373 |     gboolean success = g_queue_remove(source->held_files, file);\n 1374 |     g_assert(success); (void)success;\n 1375 |     source->num_files--;\n 1376 |     source->n_pref -= file->is_prefd;\n 1377 |     source->n_npref -= !file->is_prefd;\n 1378 |     source->n_new -= !file->is_new;\n 1379 | }","lines":10}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"rm_xattr_is_deduplicated() is declared to return bool where true means 'already deduplicated' (per its own doc comment and its only caller in rm_session_dedupe_main, which skips the dedupe work entirely when true is returned). On a failed rm_sys_stat() it does 'return EXIT_FAILURE;' which is the integer 1, i.e. true when implicitly converted to bool. So any stat() failure (e.g. permission denied, race with file removal) is reported as 'file IS already deduplicated', causing rm_session_dedupe_main to silently skip deduplication instead of treating the check as inconclusive/failed.","fix":"Return false (not EXIT_FAILURE) when the stat() call fails, since this function's contract uses bool/true=deduplicated, not a process exit code.","locations":[{"ref":"lib/xattr.c:406-413","code":"  406 | bool rm_xattr_is_deduplicated(const char *path, bool follow_symlinks) {\n  407 |     g_assert(path);\n  408 | \n  409 |     RmStat stat_buf;\n  410 |     if(rm_sys_stat(path, &stat_buf) < 0) {\n  411 |         rm_log_warning_line(\"failed to check dedupe state of %s: %s\", path, g_strerror(errno));\n  412 |         return EXIT_FAILURE;\n  413 |     }","lines":8}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"on_generate_selection_script() guards with `if not selected_nodes:` but selected_nodes is the return value of PathTreeView.get_selected_nodes(), which is a generator (defined with `yield` in tree.py). A generator object is always truthy regardless of whether it would yield zero or more items, so this guard never triggers and the 'Nothing selected to make script from' branch is dead code. With nothing selected, an empty/no-op script gets silently generated instead of warning the user.","fix":"Materialize the generator first, e.g. `selected_nodes = list(self.treeview.get_selected_nodes())`, then check `if not selected_nodes:`.","locations":[{"ref":"gui/shredder/views/runner.py:426-435","code":"  426 |     def on_generate_selection_script(self, _):\n  427 |         \"\"\"Generate the script only from the current selected dir or files.\"\"\"\n  428 |         model = self.treeview.get_model()\n  429 |         selected_nodes = self.treeview.get_selected_nodes()\n  430 | \n  431 |         if not selected_nodes:\n  432 |             LOGGER.info('Nothing selected to make script from.')\n  433 |             return\n  434 | \n  435 |         self._generate_script(model.trie, selected_nodes)","lines":10},{"ref":"gui/shredder/tree.py:866-871","code":"  866 |     def get_selected_nodes(self):\n  867 |         \"\"\"Extra convenience method for getting the currently selected nodes\"\"\"\n  868 |         model, rows = self.get_selection().get_selected_rows()\n  869 |         for tp_path in rows:\n  870 |             node = model.trie.resolve(tp_path.get_indices())\n  871 |             yield node","lines":6}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In rm_digest_paranoid_buffered_update(), a rejected twin candidate is only added to paranoid->rejects when `!paranoid->shadow_hash` is true (line 778). However shadow_hash is unconditionally created in rm_digest_paranoid_new() and is only ever freed in rm_digest_paranoid_free() (at which point the whole RmParanoid is being destroyed), so this condition is always false during normal operation. As a result paranoid->rejects is never populated, making the reject-list fast-path in rm_digest_equal() (line 1010: `g_slist_find(pa->rejects, b) || g_slist_find(pb->rejects, a)`) permanently dead, forcing every paranoid digest comparison to fall through to the full buffer-by-buffer walk even for pairs that were already proven not to match. This silently defeats the documented performance optimisation (the comment at lines 772-773 and 779 both states the rejects list exists 'to speed up rm_digest_equal()').","fix":"Remove the `if(!paranoid->shadow_hash)` guard (or replace with the intended condition) so rejected twin candidates are actually appended to paranoid->rejects.","locations":[{"ref":"lib/checksum.c:771-784","code":"  771 |         if(paranoid->twin_candidate && !match) {\n  772 |         /* reject the twin candidate, also add to rejects list to speed up\n  773 |          * rm_digest_equal() */\n  774 | #if _RM_CHECKSUM_DEBUG\n  775 |             rm_log_debug_line(\"Rejected twin candidate %p for %p\",\n  776 |                               paranoid->twin_candidate, paranoid);\n  777 | #endif\n  778 |             if(!paranoid->shadow_hash) {\n  779 |                 /* we use the rejects file to speed up rm_digest_equal */\n  780 |                 paranoid->rejects =\n  781 |                     g_slist_prepend(paranoid->rejects, paranoid->twin_candidate);\n  782 |             }\n  783 |             paranoid->twin_candidate = NULL;\n  784 |             paranoid->twin_candidate_buffer = NULL;","lines":14},{"ref":"lib/checksum.c:1009-1012","code":" 1009 |         /* check if already rejected */\n 1010 |         if(g_slist_find(pa->rejects, b) || g_slist_find(pb->rejects, a)) {\n 1011 |             return false;\n 1012 |         }","lines":4}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"rm_pp_parse_pattern() is supposed to skip over escaped '<'/'>' markers (comment says \"escaped, skip\") while scanning for the matching closing bracket of a regex pattern like `r<...>` or `x<...>`. Instead of `continue`-ing the while loop to keep scanning past the escaped character, it does `break`, which aborts the entire balance-scanning loop on the first escaped bracket encountered. This means any sort-criteria regex pattern containing an escaped `\\<` or `\\>` (e.g. `-S 'r<foo\\<bar>'`) either fails to parse with a spurious \"imbalance\" error, or computes the wrong pattern length/content. This bug has existed unchanged since the feature's original 2015 commit (e1964f2e).","fix":"Change `break;` to `continue;` inside the `if(iter[-1] == '\\\\')` branch so the scan resumes searching for the next `<`/`>` after an escaped marker instead of terminating the loop.","locations":[{"ref":"lib/preprocess.c:256-260","code":"  256 |     while((iter = strpbrk(&iter[1], \"<>\"))) {\n  257 |         if(iter[-1] == '\\\\') {\n  258 |             /* escaped, skip */\n  259 |             break;\n  260 |         }","lines":5}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"rm_traverse_directory() declares `char is_emptydir[PATH_MAX/2+1]` and `char is_hidden[PATH_MAX/2+1]` and initializes them with `memset(is_emptydir, 0, sizeof(is_emptydir) - 1)` (and likewise for is_hidden), which only zeroes the first PATH_MAX/2 bytes, leaving the very last array slot (index PATH_MAX/2, reachable when p->fts_level+1 == PATH_MAX/2, i.e. at the maximum possible directory nesting depth) uninitialized stack memory. Git history shows this used to be paired with an explicit `is_emptydir[sizeof(is_emptydir)-1] = '\\0';` sentinel write that fully initialized the array; that line was dropped when the code was reworked for --partial-hidden support (commit 667a36c5), but the truncated memset was kept. At maximum path depth this can read garbage for empty-dir/hidden-file detection, giving incorrect results (nondeterministic false positive/negative empty-directory reports or hidden-file classification) without any crash, making it hard to notice.","fix":"Use `memset(is_emptydir, 0, sizeof(is_emptydir))` and `memset(is_hidden, 0, sizeof(is_hidden))` (drop the `- 1`) so the entire array is zero-initialized, matching the array's actual usable index range of [0, PATH_MAX/2].","locations":[{"ref":"lib/traverse.c:316-323","code":"  316 |     char is_emptydir[PATH_MAX / 2 + 1];\n  317 |     char is_hidden[PATH_MAX / 2 + 1];\n  318 |     bool have_open_emptydirs = false;\n  319 |     bool clear_emptydir_flags = false;\n  320 |     bool next_is_symlink = false;\n  321 | \n  322 |     memset(is_emptydir, 0, sizeof(is_emptydir) - 1);\n  323 |     memset(is_hidden, 0, sizeof(is_hidden) - 1);","lines":8}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In rm_mounts_create_tables(), when handling NFS mounts the code computes `until_slash = MIN((int)sizeof(entry->fsname), nfs_marker - entry->fsname)`. entry->fsname is declared as `char *fsname` in RmMountEntry, so sizeof(entry->fsname) is sizeof(char*) (8 on 64-bit), not the string length. This clamps `until_slash` to at most 8 bytes for essentially any NFS server name, truncating diskname to 8 characters (or fewer) regardless of the real prefix length up to ':/' , causing different NFS servers with similar 8-char prefixes to be merged into the same diskname/whole_disk id.","fix":"Use `MIN(sizeof(diskname) - 1, (size_t)(nfs_marker - entry->fsname))` to clamp against the destination buffer size instead of sizeof() on the pointer.","locations":[{"ref":"lib/utilities.c:745-748","code":"  745 |             } else if((nfs_marker = strstr(entry->fsname, \":/\")) != NULL) {\n  746 |                 size_t until_slash =\n  747 |                     MIN((int)sizeof(entry->fsname), nfs_marker - entry->fsname);\n  748 |                 strncpy(diskname, entry->fsname, until_slash);","lines":4}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"ScriptSaverDialog.on_file_type_changed() builds the new filename with `path + '.' + self.file_type.get_selected_choice() or ''`. Due to Python operator precedence this parses as `(path + '.' + get_selected_choice()) or ''`, not `path + '.' + (get_selected_choice() or '')` as the code clearly intends. Since `path` is always a non-empty string, the `or ''` fallback is unreachable dead code, and if get_selected_choice() were ever to return None this would raise TypeError instead of falling back to an empty suffix.","fix":"Parenthesize correctly: `path + '.' + (self.file_type.get_selected_choice() or '')`.","locations":[{"ref":"gui/shredder/views/editor.py:393-398","code":"  393 |         else:\n  394 |             try:\n  395 |                 path, _ = current_path.rsplit('.', 1)\n  396 |                 self.set_current_name(\n  397 |                     path + '.' + self.file_type.get_selected_choice() or ''\n  398 |                 )","lines":6}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"rm_fmt_json_fix()'s control-character detection uses `(*curr > 0 && *curr < 0x1f)`, which excludes byte value 0x1F (Unit Separator) from escaping since the comparison is strictly less-than. Per RFC 8259, all of U+0000 through U+001F must be escaped in JSON strings; 0x1F instead falls through to the 'take it unmodified' branch and is written raw into the JSON output, producing technically invalid JSON if a path/arg string contains that byte.","fix":"Change the condition to `*curr < 0x20` (i.e. `<= 0x1f`) so 0x1F is also escaped via the default \\u00xx case.","locations":[{"ref":"lib/formats/json.c:114","code":"  114 |         } else if((*curr > 0 && *curr < 0x1f) || *curr == 0x7f) {","lines":1}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"rm_trie_insert() unconditionally increments self->size every call, even when the path already existed in the trie (rm_node_insert returns the pre-existing node without creating a new one). Re-inserting the same path (e.g. to update its value, as done in treemerge.c:182 for a running counter) inflates rm_trie_size() beyond the actual number of distinct paths stored. Currently low impact because rm_trie_size() has no callers in the codebase, but the function is part of the public trie API and is documented as returning 'the size of the trie'.","fix":"Only increment self->size when the node is newly created (e.g. have rm_node_insert return whether it created a new node, or check curr_node->has_value before overwriting).","locations":[{"ref":"lib/pathtricia.c:141-145","code":"  141 |     if(curr_node != NULL) {\n  142 |         curr_node->has_value = true;\n  143 |         curr_node->data = value;\n  144 |         self->size++;\n  145 |     }","lines":5}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"rm_trie_set_value() calls rm_trie_search_node() (which takes/releases self->lock internally) and then mutates find->data *after* the lock has already been released, unlike every other trie mutator (rm_trie_insert, rm_trie_build_path) which hold the lock for the entire read-modify sequence. This is a data race if the trie is used concurrently from multiple threads, which the embedded GMutex implies is a design requirement. Currently dead code (no callers anywhere in the codebase), so impact is latent rather than active, but it would corrupt data the moment it is wired in for concurrent use.","fix":"Hold self->lock for the full lookup+assign, e.g. add an internal locked variant or extend rm_trie_search_node with an unlocked counterpart used under a single lock acquisition in rm_trie_set_value.","locations":[{"ref":"lib/pathtricia.c:183-191","code":"  183 | bool rm_trie_set_value(RmTrie *self, const char *path, void *data) {\n  184 |     RmNode *find = rm_trie_search_node(self, path);\n  185 |     if(find == NULL) {\n  186 |         return false;\n  187 |     } else {\n  188 |         find->data = data;\n  189 |         return true;\n  190 |     }\n  191 | }","lines":9}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"rm_trie_build_path_unlocked()'s overflow guard `if(n_elements >= sizeof(elements)) break;` compares an element *count* (n_elements) against sizeof(elements), which is a *byte size* (PATH_MAX/2+1 pointers * sizeof(char*), i.e. 8x too large on 64-bit). The intended bound is the number of array slots (PATH_MAX/2+1), not the byte size, so the guard is effectively non-functional and relies entirely on the fact that path depth is independently bounded elsewhere (paths are capped to PATH_MAX bytes by rm_path_iter_init before insertion). Were that upstream invariant ever relaxed, this loop would write past the end of the fixed-size stack array `elements[]`.","fix":"Change the guard to compare against G_N_ELEMENTS(elements) (or sizeof(elements)/sizeof(elements[0])) instead of sizeof(elements).","locations":[{"ref":"lib/pathtricia.c:198-208","code":"  198 |     size_t n_elements = 1;\n  199 |     char *elements[PATH_MAX / 2 + 1] = {node->basename, NULL};\n  200 | \n  201 |     /* walk up the folder tree, collecting path elements into a list */\n  202 |     for(RmNode *folder = node->parent; folder && folder->parent;\n  203 |         folder = folder->parent) {\n  204 |         elements[n_elements++] = folder->basename;\n  205 |         if(n_elements >= sizeof(elements)) {\n  206 |             break;\n  207 |         }\n  208 |     }","lines":11}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"rm_tm_cluster_up() looks up parent->file_count from self->count_tree using GPOINTER_TO_UINT (treemerge.c:1001), whereas the original, equivalent lookup in rm_tm_feed() uses GPOINTER_TO_INT (treemerge.c:588). count_tree intentionally stores -1 (via GINT_TO_POINTER(-1)) as an error sentinel for invalid directories (see rm_tm_count_art_callback). Reading that same -1 sentinel back with GPOINTER_TO_UINT yields a large positive value (e.g. 4294967295) instead of -1, assigned into the gint64 parent->file_count. This is an inconsistent/incorrect read of the shared error sentinel; it happens to mostly fail-safe today only because dupe_count realistically never reaches that magnitude, but it is a latent correctness bug and inconsistent with the sibling code path.","fix":"Use GPOINTER_TO_INT (matching rm_tm_feed at treemerge.c:588) instead of GPOINTER_TO_UINT when reading count_tree in rm_tm_cluster_up, so the -1 error sentinel round-trips correctly.","locations":[{"ref":"lib/treemerge.c:1000-1001","code":" 1000 |         parent->file_count =\n 1001 |             GPOINTER_TO_UINT(rm_trie_search(&self->count_tree, parent_dir));","lines":2},{"ref":"lib/treemerge.c:588","code":"  588 |         int file_count = GPOINTER_TO_INT(rm_trie_search(&self->count_tree, dirname));","lines":1}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In rm_xattr_list()'s prefix filter, 'strncmp(curr, prefix, MIN(key_len, sizeof(prefix) - 1))' uses MIN() to avoid reading past a short key, but this means any xattr key shorter than the 12-character \"user.rmlint.\" prefix that happens to match its own (shorter) length against the start of the prefix string will incorrectly pass the filter (e.g. a foreign xattr literally named \"user\" would compare equal for its 4 characters). Such keys are then treated as one of rmlint's own xattrs and looked up again with getxattr(), polluting/wasting effort on the resulting map with foreign data that callers must then filter out via suffix checks (which happens to save the only currently-reachable callers from worse effects).","fix":"Reject keys shorter than the prefix outright (e.g. `if(key_len < sizeof(prefix) - 1) { curr = next + 1; continue; }`) before doing the strncmp, instead of shrinking the comparison length to fit the short key.","locations":[{"ref":"lib/xattr.c:362","code":"  362 |         if(strncmp(curr, prefix, MIN(key_len, sizeof(prefix) -1)) != 0) {","lines":1}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In rm_file_cmp_without_extension(), when computing the comparison length for file B's basename, the fallback (no-extension) branch incorrectly uses `strlen(basename_a)` instead of `strlen(basename_b)`: `size_t b_len = (ext_b) ? (ext_b - basename_b) : (int)strlen(basename_a);`. When file B has no extension and its basename length differs from file A's, b_len is wrong, which can cause incorrect SIGN_DIFF results and/or g_ascii_strncasecmp comparing the wrong number of characters under --match-without-extension. This can misclassify or fail to classify files as duplicates/originals based on basename matching.","fix":"Change line 58 to `size_t b_len = (ext_b) ? (ext_b - basename_b) : (int)strlen(basename_b);`.","locations":[{"ref":"lib/preprocess.c:49-63","code":"   49 | static gint rm_file_cmp_without_extension(const RmFile *file_a, const RmFile *file_b) {\n   50 |     const char *basename_a = file_a->folder->basename;\n   51 |     const char *basename_b = file_b->folder->basename;\n   52 | \n   53 |     char *ext_a = rm_util_path_extension(basename_a);\n   54 |     char *ext_b = rm_util_path_extension(basename_b);\n   55 | \n   56 |     /* Check length till extension, or full length if none present */\n   57 |     size_t a_len = (ext_a) ? (ext_a - basename_a) : (int)strlen(basename_a);\n   58 |     size_t b_len = (ext_b) ? (ext_b - basename_b) : (int)strlen(basename_a);\n   59 | \n   60 |     RETURN_IF_NONZERO(SIGN_DIFF(a_len, b_len));\n   61 | \n   62 |     return g_ascii_strncasecmp(basename_a, basename_b, a_len);\n   63 | }","lines":15}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The inversed_option_entries[] table in rm_cmd_parse_args() contains the exact same GOptionEntry `{\"no-match-extension\", 'E', DISABLE | HIDDEN, G_OPTION_ARG_NONE, &cfg->match_with_extension, \"Disable --match-extension\", NULL}` listed twice in a row (lines 1477 and 1478), registering the long option \"no-match-extension\" and short option -E twice within the same GOptionGroup passed to g_option_group_add_entries(). This is clearly a copy-paste leftover (the very next, distinct entry at line 1479 for \"no-match-without-extension\"/-I suggests the second copy of line 1477 should likely not exist, or was meant to be something else entirely).","fix":"Remove the duplicate line 1478 (or 1477); keep only a single registration of the \"no-match-extension\"/-E option.","locations":[{"ref":"lib/cmdline.c:1477-1478","code":" 1477 |         {\"no-match-extension\"         , 'E' , DISABLE | HIDDEN , G_OPTION_ARG_NONE     , &cfg->match_with_extension    , \"Disable --match-extension\"           , NULL} ,\n 1478 |         {\"no-match-extension\"         , 'E' , DISABLE | HIDDEN , G_OPTION_ARG_NONE     , &cfg->match_with_extension    , \"Disable --match-extension\"           , NULL} ,","lines":2}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"rm_hasher_callback() in lib/hash-utility.c uses the wrong index variable in the `print_in_order == false` branch: `session->read_succesful[session->path_index]` should be `session->read_succesful[index]` (matching the correctly-indexed `session->paths[index]` on the very next line). When the user passes -i/--ignore-order to `rmlint --hash`, RmHasherSession.path_index is never initialized (it is only set to 0 inside the `if(tag.print_in_order)` block in rm_hasher_main, which is skipped when print_in_order is false) and is never updated elsewhere, so this reads read_succesful[] at an uninitialized/garbage stack index - an out-of-bounds read whose result controls whether a hash result gets printed at all, and can crash for large garbage index values.","fix":"Change line 102 to `if(session->read_succesful[index])` to match the index used on line 103, and/or zero-initialize the RmHasherSession struct (and path_index specifically) regardless of print_in_order.","locations":[{"ref":"lib/hash-utility.c:101-104","code":"  101 |         } else if(digest) {\n  102 |             if(session->read_succesful[session->path_index]) {\n  103 |                 rm_hasher_print(digest, session->paths[index]);\n  104 |             }","lines":4},{"ref":"lib/hash-utility.c:205-209","code":"  205 |     if(tag.print_in_order) {\n  206 |         /* allocate buffer to collect results */\n  207 |         tag.completed_digests_buffer = g_slice_alloc0(buf_size);\n  208 |         tag.path_index = 0;\n  209 |     }","lines":5}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"rm_xattr_build_key() does 'memset(buf, 0, sizeof(buf_size))' where buf_size is a size_t parameter (the caller-supplied buffer length), so sizeof(buf_size) is always sizeof(size_t) (8 bytes on 64-bit), not the actual buffer size. This only zeroes the first 8 bytes of buf instead of the whole buffer. It happens to be harmless today because every call site either pre-zeroes its buffer with `= {0}` or relies on snprintf() null-terminating within bounds (rm_xattr_write_hash's cksum_key/mtime_key at line 228 are the one case that is NOT pre-zeroed and depends on this memset), but it is a clear copy-paste mistake (sizeof(buf_size) instead of buf_size) that silently does nothing useful.","fix":"Change to `memset(buf, 0, buf_size);` to actually zero the full caller-supplied buffer.","locations":[{"ref":"lib/xattr.c:142","code":"  142 |     memset(buf, 0, sizeof(buf_size));","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"have_feature() (application.py), _guess_rmlint_version() (about.py) and show_version() (cmdline.py) all call Gio.Subprocess.new(['rmlint', '--version'], ...) unwrapped in any try/except, unlike _create_rmlint_process() in runner.py which explicitly catches GLib.Error around the same kind of spawnv call (with a dedicated ENOEXEC message for 'rmlint not installed'). If rmlint is missing from PATH, Gio.Subprocess.new raises a GLib.Error here, which is never caught: Application.__init__ crashes with a raw GLib.Error traceback instead of reaching its own intended 'No support for +replay' / sys.exit(-1) graceful-exit message, and the --version CLI flag crashes the same way instead of printing a clean error.","fix":"Wrap the Gio.Subprocess.new(['rmlint', '--version'], ...) calls in all three functions with try/except GLib.Error, logging/printing a clear 'rmlint not found' message and returning a safe fallback (False / '?.?.?' / an error message) instead of letting the exception propagate.","locations":[{"ref":"gui/shredder/application.py:35-49","code":"   35 | def have_feature(feature):\n   36 |     \"\"\"Execute rmlint --version to check for some feature.\n   37 | \n   38 |     --version will print the compile time configuration of rmlint.\n   39 |     If a feature is missing, -somefeature is printed. A + in front else.\n   40 |     \"\"\"\n   41 |     proc = Gio.Subprocess.new(\n   42 |         ['rmlint', '--version'],\n   43 |         Gio.SubprocessFlags.STDERR_PIPE\n   44 |     )\n   45 |     result, _, data = proc.communicate_utf8()\n   46 |     if not result or not data:\n   47 |         return False\n   48 | \n   49 |     return '+' + feature in data","lines":15},{"ref":"gui/shredder/about.py:32-48","code":"   32 | def _guess_rmlint_version():\n   33 |     \"\"\"Execute rmlint --version to extract the version.\n   34 | \n   35 |     Shredder is always versioned the same way as rmlint.\n   36 |     This is to make version problems less likely.\n   37 |     \"\"\"\n   38 |     proc = Gio.Subprocess.new(\n   39 |         ['rmlint', '--version'],\n   40 |         Gio.SubprocessFlags.STDERR_PIPE\n   41 |     )\n   42 |     result, _, data = proc.communicate_utf8()\n   43 |     if result and data:\n   44 |         match = re.search(r'version (\\d+\\.\\d+\\.\\d+)', data)\n   45 |         if match:\n   46 |             return match.group(1)\n   47 | \n   48 |     return '?.?.?'","lines":17},{"ref":"gui/shredder/cmdline.py:20-31","code":"   20 | def show_version():\n   21 |     \"\"\"Print the version as shown by `rmlint --version`\"\"\"\n   22 |     proc = Gio.Subprocess.new(\n   23 |         ['rmlint', '--version'],\n   24 |         Gio.SubprocessFlags.STDERR_PIPE\n   25 |     )\n   26 |     *_, data = proc.communicate_utf8()\n   27 | \n   28 |     # Shredder version is always the same as rmlint.\n   29 |     # So, let's just replace `rmlint` with `Shredder` :-)\n   30 |     print(data.replace('rmlint', 'Shredder', 1), end='')\n   31 |     sys.exit(-1)","lines":12}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"Several JSON fields that materially affect output correctness are read with the non-NULL-checked json_object_get_*_member() accessors instead of the has_member-guarded pattern used elsewhere in the same function (e.g. 'path', 'mtime', 'depth', 'checksum', 'hardlink_of' are all guarded). Specifically: 'type' (used unguarded, though caught downstream by RM_LINT_TYPE_UNKNOWN check), 'is_original' (json_object_get_boolean_member, line 277), 'size' and 'n_children' (json_object_get_int_member, lines 291/294, only for DUPE_DIR_CANDIDATE). If these members are missing from a crafted/corrupted JSON file, json-glib emits a GLib CRITICAL warning and silently returns a default (NULL/FALSE/0) rather than rmlint detecting and reporting a malformed cache file. This produces silently wrong results (e.g. a directory candidate silently gets size/n_children of 0) instead of a clear, actionable error message to the user about a corrupt --replay file.","fix":"Use json_object_has_member() checks (consistent with the style already used for mtime/depth/checksum/hardlink_of in this same function) before calling the typed accessors, and treat missing required fields as a parse failure for that record (skip it with a warning) rather than silently substituting a default.","locations":[{"ref":"lib/replay.c:277","code":"  277 |     file->is_original = json_object_get_boolean_member(object, \"is_original\");","lines":1},{"ref":"lib/replay.c:291","code":"  291 |             file->actual_file_size = json_object_get_int_member(object, \"size\");","lines":1},{"ref":"lib/replay.c:294","code":"  294 |         file->n_children = (size_t)json_object_get_int_member(object, \"n_children\");","lines":1},{"ref":"lib/replay.c:239-243","code":"  239 |         rm_file_string_to_lint_type(json_object_get_string_member(object, \"type\"));\n  240 | \n  241 |     if(type == RM_LINT_TYPE_UNKNOWN) {\n  242 |         rm_log_warning_line(_(\"lint type '%s' not recognised\"),\n  243 |                             json_object_get_string_member(object, \"type\"));","lines":5}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"rm_trav_buffer_new() calls stat()/lstat() on the user-supplied root path and, on failure, only logs via rm_log_perror() but leaves self->stat_buf as all-zero (from g_new0) and returns the buffer anyway. The caller (rm_traverse_tree) then tests S_ISLNK/S_ISREG/S_ISDIR on this zeroed stat_buf; all three are false for a zeroed st_mode, so the path silently falls into the generic 'block device/fifo/something weird' branch and is dropped with no error counter incremented and no indication to the user that the root path was simply inaccessible (e.g. due to a permissions error or it not existing).","fix":"Have rm_trav_buffer_new() return NULL (or set a flag) on stat failure, and have the caller in rm_traverse_tree() skip the path with a clear error message / increment an error counter instead of silently treating it as 'something weird'.","locations":[{"ref":"lib/traverse.c:81-96","code":"   81 | static RmTravBuffer *rm_trav_buffer_new(RmSession *session, RmPath *rmpath) {\n   82 |     RmTravBuffer *self = g_new0(RmTravBuffer, 1);\n   83 |     self->rmpath = rmpath;\n   84 | \n   85 |     int stat_state;\n   86 |     if(session->cfg->follow_symlinks) {\n   87 |         stat_state = rm_sys_stat(rmpath->path, &self->stat_buf);\n   88 |     } else {\n   89 |         stat_state = rm_sys_lstat(rmpath->path, &self->stat_buf);\n   90 |     }\n   91 | \n   92 |     if(stat_state == -1) {\n   93 |         rm_log_perror(\"Unable to stat file\");\n   94 |     }\n   95 |     return self;\n   96 | }","lines":16},{"ref":"lib/traverse.c:537-540","code":"  537 |         } else {\n  538 |             /* Probably a block device, fifo or something weird. */\n  539 |             rm_trav_buffer_free(buffer);\n  540 |         }","lines":4}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"rm_shred_check_paranoid_mem_alloc() is documented with 'NOTE: group_lock must be held before calling' this function, and the call site in rm_shred_group_push_file() (line 944) correctly holds shred_group->lock. However the call site in rm_shred_reassign_checksum() (line 1584) invokes rm_shred_check_paranoid_mem_alloc(group, 0) before acquiring group->lock (the lock is only taken afterwards, at line 1590, for an unrelated purpose). Inside the function, group->status, group->file_size, group->hash_offset and (transitively, via rm_shred_group_potential_file_count) group->parent->num_pending are all read without the documented lock while other threads can be concurrently mutating those same fields under shred_group->lock in rm_shred_group_push_file/rm_shred_sift. This is a TOCTOU/data-race on shared mutable RmShredGroup state that can cause an incorrect (stale or torn) memory-budget decision for paranoid hashing.","fix":"Acquire group->lock before calling rm_shred_check_paranoid_mem_alloc() in rm_shred_reassign_checksum(), consistent with the function's documented locking contract, or change the contract/implementation to take the lock internally.","locations":[{"ref":"lib/shredder.c:578-591","code":"  578 | /* Governor to limit memory usage by limiting how many RmShredGroups can be\n  579 |  * active at any one time\n  580 |  * NOTE: group_lock must be held before calling rm_shred_check_paranoid_mem_alloc\n  581 |  */\n  582 | static bool rm_shred_check_paranoid_mem_alloc(RmShredGroup *group,\n  583 |                                               int active_group_threshold) {\n  584 |     if(group->status >= RM_SHRED_GROUP_HASHING) {\n  585 |         /* group already committed */\n  586 |         return true;\n  587 |     }\n  588 | \n  589 |     gint64 mem_required =\n  590 |         (rm_shred_group_potential_file_count(group) / 2 + 1) *\n  591 |         MIN(group->file_size - group->hash_offset, SHRED_PARANOID_BYTES);","lines":14},{"ref":"lib/shredder.c:1578-1597","code":" 1578 | static bool rm_shred_reassign_checksum(RmShredTag *main, RmFile *file) {\n 1579 |     RmCfg *cfg = main->session->cfg;\n 1580 |     RmShredGroup *group = file->shred_group;\n 1581 | \n 1582 |     if(group->digest_type == RM_DIGEST_PARANOID) {\n 1583 |         /* check if memory allocation is ok */\n 1584 |         if(!rm_shred_check_paranoid_mem_alloc(group, 0)) {\n 1585 |             return false;\n 1586 |         }\n 1587 | \n 1588 |         /* get the required target offset into group->next_offset, so that\n 1589 |          * we can make the paranoid RmDigest the right size*/\n 1590 |         g_mutex_lock(&group->lock);\n 1591 |         {\n 1592 |             if(group->next_offset == 0) {\n 1593 |                 (void)rm_shred_get_read_size(file, main);\n 1594 |             }\n 1595 |             g_assert(group->hash_offset == file->hash_offset);\n 1596 |         }\n 1597 |         g_mutex_unlock(&group->lock);","lines":20}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In rm_shred_reassign_checksum(), while holding group->lock, candidate twin digests are sent by first materialising the entire children hash table into a temporary GList via g_hash_table_get_values(), then iterating and freeing each link one at a time with g_list_delete_link(). This allocates and frees an intermediate linked list (proportional to the number of sibling subgroups) on every paranoid-mode file increment, while the group's lock is held, unnecessarily extending the critical section and adding allocator churn in a hot path that already contends with other device threads for the same group lock.","fix":"Use g_hash_table_foreach(group->children, send_candidate_cb, file->digest) to iterate the hash table values directly without building/freeing a temporary GList.","locations":[{"ref":"lib/shredder.c:1604-1619","code":" 1604 |             g_mutex_lock(&group->lock);\n 1605 |             {\n 1606 |                 if(group->children) {\n 1607 |                     GList *children = g_hash_table_get_values(group->children);\n 1608 |                     while(children) {\n 1609 |                         RmShredGroup *child = children->data;\n 1610 |                         rm_digest_send_match_candidate(file->digest, child->digest);\n 1611 |                         children = g_list_delete_link(children, children);\n 1612 |                     }\n 1613 |                 }\n 1614 |                 /* store a reference so the shred group knows where to send any future\n 1615 |                  * twin candidate digests */\n 1616 |                 group->in_progress_digests =\n 1617 |                     g_list_prepend(group->in_progress_digests, file->digest);\n 1618 |             }\n 1619 |             g_mutex_unlock(&group->lock);","lines":16}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"RmShredTag.lock (a GMutex) and the fields remaining_files/remaining_bytes are declared, and tag.lock is initialised with g_mutex_init() in rm_shred_run(), but the mutex is never locked/unlocked anywhere in the file and the two counter fields are never read or written anywhere. The mutex is also never cleared with g_mutex_clear() before rm_shred_run() returns, unlike tag.hash_mem_mtx which is properly cleared at the end.","fix":"Remove the unused lock/remaining_files/remaining_bytes fields from RmShredTag, or if they're meant for future use, at least pair the g_mutex_init with a g_mutex_clear before rm_shred_run returns.","locations":[{"ref":"lib/shredder.c:320-323","code":"  320 |     GMutex lock;\n  321 | \n  322 |     gint32 remaining_files;\n  323 |     gint64 remaining_bytes;","lines":4},{"ref":"lib/shredder.c:1753","code":" 1753 |     g_mutex_init(&tag.lock);","lines":1}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"rm_tm_count_files() has a fallthrough bug in the fts_info switch: cases FTS_F/FTS_SL/FTS_NS/FTS_SLNONE/FTS_DEFAULT insert the path into file_tree and then fall through (no break) into case FTS_D, which is intended to be a no-op default case. This is harmless today because FTS_D and the other listed cases (FTS_DNR/FTS_DOT/FTS_DP/FTS_NSOK/default) all just `break;`, but it is fragile: any future code added under `case FTS_D:` (e.g. directory-specific counting logic) would be silently and incorrectly executed for plain files too, due to the missing break after the file-insertion block.","fix":"Add an explicit `break;` after the rm_trie_insert() call (before `case FTS_D:`) to stop the unintentional fallthrough, or add a comment explicitly marking the fallthrough as intentional if it truly is.","locations":[{"ref":"lib/treemerge.c:244-263","code":"  244 |         case FTS_F:\n  245 |         case FTS_SL:\n  246 |         case FTS_NS:\n  247 |         case FTS_SLNONE:\n  248 |         case FTS_DEFAULT:\n  249 |             /* Save this path as countable file, but only if we consider empty files */\n  250 |             if(!(cfg->find_emptyfiles) || ent->fts_statp->st_size > 0) {\n  251 |                 if(!(cfg->follow_symlinks && ent->fts_info == FTS_SL)) {\n  252 |                     rm_trie_insert(&file_tree, ent->fts_path, GINT_TO_POINTER(false));\n  253 |                 }\n  254 |             }\n  255 |         case FTS_D:\n  256 | // Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');

// Render text with ```fenced``` code blocks and `inline` backticks,

function renderMd(text, q) {

  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;

    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;

      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;

    out += highlight(s.slice(i), q);
    return out;
