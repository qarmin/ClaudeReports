<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"setLegacyQuality (legacy video format quality selection) contains two consecutive filter predicates with a missing set of parentheses around the ternary expression. In the first filter (line 1506): `previousQuality === isPortrait ? variant.width : variant.height` is parsed as `(previousQuality === isPortrait) ? variant.width : variant.height`. Since previousQuality is a number and isPortrait is a boolean, `===` is always false, so the condition always evaluates to `variant.height`, which is always a positive non-zero number (truthy). Every format passes this filter, so `matches` is always the full list — the quality check is completely bypassed.\n\nThe second filter fallback (line 1511) has the same mistake: `previousQuality > isPortrait` where isPortrait is coerced to 0 or 1, meaning any quality > 1 always returns true, again bypassing the quality check.\n\nCompare with the correct implementation in setDashQuality at line 1460: `quality === (isPortrait ? variant.width : variant.height)` — the parentheses are present there.","fix":"Add parentheses around the ternary in both filter predicates:\n  Line 1506: `return previousQuality === (isPortrait ? variant.width : variant.height)`\n  Line 1511: `return previousQuality > (isPortrait ? variant.width : variant.height)`\nThis matches the correct pattern already used in setDashQuality at line 1460.","locations":[{"ref":"src/renderer/components/ft-shaka-video-player/ft-shaka-video-player.js:1505-1518","code":" 1505 |       let matches = legacyFormats.filter(variant => {\n 1506 |         return previousQuality === isPortrait ? variant.width : variant.height\n 1507 |       })\n 1508 | \n 1509 |       if (matches.length === 0) {\n 1510 |         matches = legacyFormats.filter(variant => {\n 1511 |           return previousQuality > isPortrait ? variant.width : variant.height\n 1512 |         })\n 1513 | \n 1514 |         if (matches.length > 0) {\n 1515 |           matches.sort((a, b) => b.bitrate - a.bitrate)\n 1516 |         } else {\n 1517 |           matches = legacyFormats.sort((a, b) => a.bitrate - b.bitrate)\n 1518 |         }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In setLegacyQuality, the fallback path at line 1517 calls `legacyFormats.sort((a, b) => a.bitrate - b.bitrate)` and assigns the result to `matches`. Array.prototype.sort() sorts in-place and returns the same array reference. Since `legacyFormats` is a direct reference to `props.legacyFormats` (line 1501), this mutates the Vue prop array. Subsequent calls to setLegacyQuality will receive a permanently reordered legacyFormats, which can silently change which format is selected.","fix":"Use `.toSorted()` instead of `.sort()` to avoid mutating the prop: `matches = legacyFormats.toSorted((a, b) => a.bitrate - b.bitrate)`","locations":[{"ref":"src/renderer/components/ft-shaka-video-player/ft-shaka-video-player.js:1501","code":" 1501 |       const legacyFormats = props.legacyFormats"},{"ref":"src/renderer/components/ft-shaka-video-player/ft-shaka-video-player.js:1517","code":" 1517 |           matches = legacyFormats.sort((a, b) => a.bitrate - b.bitrate)"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"calculatePublishedDate in utils.js silently returns the current timestamp (Date.now()) when timeFrame is an unrecognized string. If none of the if/else-if branches match, timeSpan stays null. The final return expression `now - timeSpan` evaluates as `now - null` = `now - 0` = `now` in JavaScript (null is coerced to 0 in subtraction). The caller receives the current time as if the video was published just now, silently corrupting subscription feed sorting for any video whose publishedText has an unrecognised time unit.","fix":"Add a final else branch to detect the unrecognised case:\n  } else {\n    console.error(`Unrecognized timeFrame: \"${timeFrame}\" in \"${publishedText}\"`)\n    return undefined\n  }\n  return now - timeSpan","locations":[{"ref":"src/renderer/helpers/utils.js:80-99","code":"   80 |   let timeSpan = null\n   81 | \n   82 |   if (timeFrame.startsWith('second') || timeFrame === 's') {\n   83 |     timeSpan = timeAmount * 1000\n   84 |   } else if (timeFrame.startsWith('minute') || timeFrame === 'm') {\n   85 |     timeSpan = timeAmount * 60000\n   86 |   } else if (timeFrame.startsWith('hour') || timeFrame === 'h') {\n   87 |     timeSpan = timeAmount * 3600000\n   88 |   } else if (timeFrame.startsWith('day') || timeFrame === 'd') {\n   89 |     timeSpan = timeAmount * 86400000\n   90 |   } else if (timeFrame.startsWith('week') || timeFrame === 'w') {\n   91 |     timeSpan = timeAmount * 604800000\n   92 |   } else if (timeFrame.startsWith('month') || timeFrame === 'mo') {\n   93 |     // 30 day month being used\n   94 |     timeSpan = timeAmount * 2592000000\n   95 |   } else if (timeFrame.startsWith('year') || timeFrame === 'y') {\n   96 |     timeSpan = timeAmount * 31556952000\n   97 |   }\n   98 | \n   99 |   return now - timeSpan"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In toDistractionFreeTitle, the regex pattern is built as `[\\p{Lu}|']{N,}` with a literal pipe `|` inside the character class `[...]`. Inside a character class, `|` has no special meaning and matches the literal pipe character. The intended behavior (match sequences of uppercase Unicode letters OR apostrophes) already works for letters and apostrophes, but the regex will also match runs of literal pipe characters as all-caps words and attempt to lowercase-capitalize them. More importantly, if the intent was to make `|` an alternation between `\\p{Lu}` and `'`, the logic is wrong — the alternation must be outside the character class: `(?:[\\p{Lu}]|')+` or simply `[\\p{Lu}']+`.","fix":"Remove the `|` from inside the character class: `RegExp(`[\\\\p{Lu}']{${minUpperCase},}`, 'ug')`","locations":[{"ref":"src/renderer/helpers/utils.js:709","code":"  709 |   const reg = RegExp(`[\\\\p{Lu}|']{${minUpperCase},}`, 'ug')"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","description":"convertInvidiousToLocalFormat in invidious.js computes duration as `parseInt(parseFloat(url.searchParams.get('dur')) * 1000)`. When the 'dur' parameter is absent from the URL, searchParams.get('dur') returns null, parseFloat(null) = NaN, NaN * 1000 = NaN, and parseInt(NaN) = NaN. The resulting NaN is passed to youtubei.js Format as approxDurationMs. Downstream code that depends on the duration for DASH manifest generation will produce malformed manifests for those streams.","fix":"Add a fallback: `const durStr = url.searchParams.get('dur'); const duration = durStr != null ? parseInt(parseFloat(durStr) * 1000) : 0`","locations":[{"ref":"src/renderer/helpers/api/invidious.js:876","code":"  876 |   const duration = parseInt(parseFloat(url.searchParams.get('dur')) * 1000)"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"parseRSSEntry in subscriptions.js sets lengthSeconds to the string '0:00' instead of the number 0. All other code paths that produce video objects (local API and Invidious API) set lengthSeconds to a number. The playlists.js helper videoDurationPresent explicitly checks `typeof video.lengthSeconds !== 'number'` to guard against this, but the string value still propagates into the subscription cache, feed sorting, and any consumer that does arithmetic on lengthSeconds (e.g. duration-based playlist sorting produces NaN for RSS-sourced videos).","fix":"Change `lengthSeconds: '0:00'` to `lengthSeconds: 0` to be consistent with the numeric type used everywhere else.","locations":[{"ref":"src/renderer/helpers/subscriptions.js:98","code":"   98 |     lengthSeconds: '0:00',"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the Invidious API error catch block in Watch.js, console.error(err) is called twice in succession (lines 1048 and 1053) with no code between them. The second call is a copy-paste leftover that produces a duplicate error log entry in the console for every Invidious API failure.","fix":"Remove the duplicate console.error(err) at line 1053.","locations":[{"ref":"src/renderer/views/Watch/Watch.js:1047-1054","code":" 1047 |         .catch(err => {\n 1048 |           console.error(err)\n 1049 |           const errorMessage = this.$t('Invidious API Error (Click to copy)')\n 1050 |           showToast(`${errorMessage}: ${err}`, 10000, () => {\n 1051 |             copyToClipboard(err)\n 1052 |           })\n 1053 |           console.error(err)\n 1054 |           if (process.env.SUPPORTS_LOCAL_API && this.backendPreference === 'invidious' && this.backendFallback) {"}]},{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"In manifestPreprocessorTXml, the live-stream branch reads `mpdNode.attributes.minimumUpdatePeriod.match(/^PT(\\d+(?:\\.\\d+)?)S$/)[1]` without checking if the regex matched. If minimumUpdatePeriod exists but has an unexpected format (e.g. PT1M30S, which is a valid ISO 8601 duration but not matched by the pattern that only accepts seconds), the .match() call returns null and accessing [1] throws a TypeError, crashing the player for any live stream with a non-seconds update period.","fix":"Extract the match result and guard it:\n  const mupMatch = mpdNode.attributes.minimumUpdatePeriod?.match(/^PT(\\d+(?:\\.\\d+)?)S$/)\n  if (mupMatch) {\n    const minimumUpdatePeriod = parseFloat(mupMatch[1])\n    mpdNode.attributes.suggestedPresentationDelay = `PT${(minimumUpdatePeriod * 2).toFixed(3)}S`\n  }","locations":[{"ref":"src/renderer/components/ft-shaka-video-player/ft-shaka-video-player.js:653-654","code":"  653 |         const minimumUpdatePeriod = parseFloat(mpdNode.attributes.minimumUpdatePeriod.match(/^PT(\\d+(?:\\.\\d+)?)S$/)[1])\n  654 |         mpdNode.attributes.suggestedPresentationDelay = `PT${(minimumUpdatePeriod * 2).toFixed(3)}S`"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"calculatePublishedDate in utils.js calls publishedText.match(PUBLISHED_TEXT_REGEX) and immediately dereferences the result on the next two lines as match[2] and match[1] without checking whether match is null. If the publishedText string does not match the regex (e.g. an unsupported locale format, or an unexpected value from the API), match is null and accessing match[2] throws: TypeError: Cannot read properties of null (reading '2').","fix":"Add a null guard immediately after the match call:\n  const match = publishedText.match(PUBLISHED_TEXT_REGEX)\n  if (!match) {\n    console.error(`Unrecognized publishedText format: \"${publishedText}\"`)\n    return undefined\n  }","locations":[{"ref":"src/renderer/helpers/utils.js:76-79","code":"   76 |   const match = publishedText.match(PUBLISHED_TEXT_REGEX)\n   77 | \n   78 |   const timeFrame = match[2]\n   79 |   const timeAmount = parseInt(match[1])"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"In updateLegacyQualityStats, the mimeType string is matched against a codec regex and the result is used directly without a null check: `const codecsMatch = mimeType.match(/codecs=\"(?<videoCodec>.+), ?(?<audioCodec>.+)\"/)` followed by `codecsMatch.groups.audioCodec`. Legacy format MIME types that do not contain a comma-separated codecs pair (e.g. `video/mp4; codecs=\"avc1.640028\"` without a separate audio codec) will produce a null match and throw TypeError: Cannot read properties of null (reading 'groups').","fix":"Guard the result:\n  const codecsMatch = mimeType.match(/codecs=\"(?<videoCodec>.+), ?(?<audioCodec>.+)\"/)\n  if (codecsMatch) {\n    stats.codecs.audioCodec = codecsMatch.groups.audioCodec\n    stats.codecs.videoCodec = codecsMatch.groups.videoCodec\n  }","locations":[{"ref":"src/renderer/components/ft-shaka-video-player/ft-shaka-video-player.js:1622-1628","code":" 1622 |       const codecsMatch = mimeType.match(/codecs=\"(?<videoCodec>.+), ?(?<audioCodec>.+)\"/)\n 1623 | \n 1624 |       stats.codecs.audioItag = itag\n 1625 |       stats.codecs.audioCodec = codecsMatch.groups.audioCodec\n 1626 | \n 1627 |       stats.codecs.videoItag = itag\n 1628 |       stats.codecs.videoCodec = codecsMatch.groups.videoCodec"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"In the Invidious watch page handler (both the live and non-live branches), result.adaptiveFormats[0].url is accessed to extract the stream expiry date without first verifying that adaptiveFormats is non-empty. If an Invidious instance returns an empty adaptiveFormats array (which can happen for region-locked or removed videos that still have metadata), accessing [0] yields undefined and the subsequent `new URL(undefined.url)` call inside extractExpiryDateFromStreamingUrl throws a TypeError.","fix":"Guard the access: `if (result.adaptiveFormats.length > 0) { this.streamingDataExpiryDate = this.extractExpiryDateFromStreamingUrl(result.adaptiveFormats[0].url) }` at both call sites, or factor it into extractExpiryDateFromStreamingUrl itself.","locations":[{"ref":"src/renderer/views/Watch/Watch.js:992","code":"  992 |             this.streamingDataExpiryDate = this.extractExpiryDateFromStreamingUrl(result.adaptiveFormats[0].url)"},{"ref":"src/renderer/views/Watch/Watch.js:1022","code":" 1022 |             this.streamingDataExpiryDate = this.extractExpiryDateFromStreamingUrl(result.adaptiveFormats[0].url)"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","description":"mapInvidiousLegacyFormat destructures format.size with `format.size.split('x')` at the very first line without any existence check. If Invidious omits the 'size' field (it is not part of the Invidious API spec for all formats — audio-only formats typically do not have it), accessing .split on undefined throws a TypeError and causes the entire Watch page load to fail.","fix":"Add a guard: `const [stringWidth, stringHeight] = (format.size ?? '0x0').split('x')` or filter out formats without a size field before calling this function.","locations":[{"ref":"src/renderer/helpers/api/invidious.js:940-941","code":"  940 | export function mapInvidiousLegacyFormat(format) {\n  941 |   const [stringWidth, stringHeight] = format.size.split('x')"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The function name sortAdapationSetsByCodec (line 697) is a consistent misspelling of 'Adaptation' (missing the second 'a' → 'Adapation'). The name is used in both its definition and its single call site. While not a bug, it is a developer-facing typo that will persist in code search results and any future documentation.","fix":"Rename to sortAdaptationSetsByCodec in both the function definition (line 697) and its call site (line 644).","locations":[{"ref":"src/renderer/components/ft-shaka-video-player/ft-shaka-video-player.js:644","code":"  644 |       sortAdapationSetsByCodec(periods)"},{"ref":"src/renderer/components/ft-shaka-video-player/ft-shaka-video-player.js:697","code":"  697 |     function sortAdapationSetsByCodec(periods) {"}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-22 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
