<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"The public `dash` function (and `dash_iter`) indexes `dashes[dash_ix]` and computes `dashes.iter().sum()` without checking for an empty slice. Calling `dash(iter, offset, &[])` panics with an out-of-bounds index at `let mut dash_remaining = dashes[dash_ix] - dash_offset;`. `dash` is a documented public API meant to be usable standalone (e.g. for GPU stroking), so an empty pattern is a plausible caller mistake that should degrade gracefully rather than panic.","fix":"Early-return a pass-through iterator (or assert with a clear message) when `dashes.is_empty()`. At minimum guard the `dashes[dash_ix]` accesses and the modulo in `dash_iter`.","locations":[{"ref":"kurbo/src/stroke.rs:725-751","code":"  725 | fn dash_iter<'a>(\n  726 |     inner: impl Iterator<Item = PathEl> + 'a,\n  727 |     dash_offset: f64,\n  728 |     dashes: &'a [f64],\n  729 |     stable_dash_order: bool,\n  730 | ) -> DashIterator<'a, impl Iterator<Item = PathEl> + 'a> {\n  731 |     // Ensure that offset is positive and minimal by normalization using period\n  732 |     let period = dashes.iter().sum();\n  733 |     // The SVG spec requires odd-length dash arrays to be doubled to become even-length:\n  734 |     // <https://www.w3.org/TR/SVG2/painting.html#StrokeDasharrayProperty>\n  735 |     // This prevents gaps and dashes from swapping with one another as the offset increases.\n  736 |     let period = if dashes.len() % 2 == 1 {\n  737 |         2.0 * period\n  738 |     } else {\n  739 |         period\n  740 |     };\n  741 |     let dash_offset = dash_offset.rem_euclid(period);\n  742 | \n  743 |     let mut dash_ix = 0;\n  744 |     let mut dash_remaining = dashes[dash_ix] - dash_offset;\n  745 |     let mut is_active = true;\n  746 |     // Find place in dashes array for initial offset.\n  747 |     while dash_remaining < 0.0 {\n  748 |         dash_ix = (dash_ix + 1) % dashes.len();\n  749 |         dash_remaining += dashes[dash_ix];\n  750 |         is_active = !is_active;\n  751 |     }","lines":27,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/stroke.rs#L725-L751"},{"ref":"kurbo/src/stroke.rs:717-723","code":"  717 | pub fn dash<'a>(\n  718 |     inner: impl Iterator<Item = PathEl> + 'a,\n  719 |     dash_offset: f64,\n  720 |     dashes: &'a [f64],\n  721 | ) -> impl Iterator<Item = PathEl> + 'a {\n  722 |     dash_iter(inner, dash_offset, dashes, false)\n  723 | }","lines":7,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/stroke.rs#L717-L723"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"CubicBez::nearest unwraps r_best, which can only be None if no critical points and the endpoint-evaluation branch is skipped. The endpoints are only evaluated when roots.len() != 5. If polycool returns exactly 5 roots but all of them are outside [0,1] in a way the solver still counts (roots_between is documented to return only in-range roots, so this is unlikely), or if r_best somehow stays None, the final `r_best.unwrap()` would panic. More concretely: if roots is empty AND len != 5 the endpoints are evaluated so it is safe, but the invariant that 5 roots always means at least one valid evaluation is relied on implicitly and is not asserted. A returned NaN root would make eval_t store it (r could be NaN) but not panic. The real fragility is the assumption `roots.len() == 5 implies r_best is Some`.","fix":"Guard the endpoint evaluation on `r_best.is_none()` instead of (or in addition to) `roots.len() != 5`, e.g. always evaluate endpoints when r_best is None, so the final unwrap can never panic.","locations":[{"ref":"kurbo/src/cubicbez.rs:728-737","code":"  728 |         // If we found all 5 critical points, we can skip evaluating the endpoints.\n  729 |         if roots.len() != 5 {\n  730 |             eval_t(p, &mut t_best, &mut r_best, 0.0, self.p0);\n  731 |             eval_t(p, &mut t_best, &mut r_best, 1.0, self.p3);\n  732 |         }\n  733 | \n  734 |         Nearest {\n  735 |             t: t_best,\n  736 |             distance_sq: r_best.unwrap(),\n  737 |         }","lines":10,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/cubicbez.rs#L728-L737"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"An all-zero dash pattern (e.g. `[0.0, 0.0]`) makes `period == 0.0`, so `dash_offset.rem_euclid(period)` is NaN, and `dash_remaining` becomes NaN. The normalization loop `while dash_remaining < 0.0` exits immediately on NaN, and in `step` every `self.dash_remaining < self.seg_remaining` comparison is false, so the iterator advances by segment forever without ever consuming a dash transition. Combined with a zero-length total pattern this produces nonsensical output and, when fed to stroke expansion, NaN coordinates. A degenerate but reachable input (the public `dash`/`with_dashes` accept it).","fix":"Detect a zero (or non-positive) period after summing and short-circuit: treat the whole path as a single solid dash (pass-through) instead of attempting normalization.","locations":[{"ref":"kurbo/src/stroke.rs:732-751","code":"  732 |     let period = dashes.iter().sum();\n  733 |     // The SVG spec requires odd-length dash arrays to be doubled to become even-length:\n  734 |     // <https://www.w3.org/TR/SVG2/painting.html#StrokeDasharrayProperty>\n  735 |     // This prevents gaps and dashes from swapping with one another as the offset increases.\n  736 |     let period = if dashes.len() % 2 == 1 {\n  737 |         2.0 * period\n  738 |     } else {\n  739 |         period\n  740 |     };\n  741 |     let dash_offset = dash_offset.rem_euclid(period);\n  742 | \n  743 |     let mut dash_ix = 0;\n  744 |     let mut dash_remaining = dashes[dash_ix] - dash_offset;\n  745 |     let mut is_active = true;\n  746 |     // Find place in dashes array for initial offset.\n  747 |     while dash_remaining < 0.0 {\n  748 |         dash_ix = (dash_ix + 1) % dashes.len();\n  749 |         dash_remaining += dashes[dash_ix];\n  750 |         is_active = !is_active;\n  751 |     }","lines":20,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/stroke.rs#L732-L751"},{"ref":"kurbo/src/stroke.rs:835-872","code":"  835 |     fn step(&mut self) -> Option<PathEl> {\n  836 |         let mut result = None;\n  837 |         if self.state == DashState::ToStash && self.needs_moveto {\n  838 |             self.needs_moveto = false;\n  839 |             if self.is_active {\n  840 |                 result = Some(PathEl::MoveTo(self.current_seg.start()));\n  841 |             } else {\n  842 |                 self.state = DashState::Working;\n  843 |             }\n  844 |         } else if self.dash_remaining < self.seg_remaining {\n  845 |             // next transition is a dash transition\n  846 |             let seg = self.current_seg.subsegment(self.t..1.0);\n  847 |             let t1 = seg.inv_arclen(self.dash_remaining, DASH_ACCURACY);\n  848 |             if self.is_active {\n  849 |                 let subseg = seg.subsegment(0.0..t1);\n  850 |                 result = Some(seg_to_el(&subseg));\n  851 |                 self.state = DashState::Working;\n  852 |             } else {\n  853 |                 let p = seg.eval(t1);\n  854 |                 result = Some(PathEl::MoveTo(p));\n  855 |             }\n  856 |             self.is_active = !self.is_active;\n  857 |             self.t += t1 * (1.0 - self.t);\n  858 |             self.seg_remaining -= self.dash_remaining;\n  859 |             self.dash_ix += 1;\n  860 |             if self.dash_ix == self.dashes.len() {\n  861 |                 self.dash_ix = 0;\n  862 |             }\n  863 |             self.dash_remaining = self.dashes[self.dash_ix];\n  864 |         } else {\n  865 |             if self.is_active {\n  866 |                 let seg = self.current_seg.subsegment(self.t..1.0);\n  867 |                 result = Some(seg_to_el(&seg));\n  868 |             }\n  869 |             self.dash_remaining -= self.seg_remaining;\n  870 |             self.get_input();\n  871 |         }\n  872 |         result","lines":38,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/stroke.rs#L835-L872"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`reverse_subpath` calls `els[ix - 1].end_point().unwrap()` (line 494) and panics with `panic!(...)` on any MoveTo/ClosePath element. The function relies on the documented precondition that `els` contains no MoveTo/ClosePath. `reverse_subpaths` enforces this by construction, but the function is a private helper whose panic path is reachable only via a precondition violation; the `.unwrap()` would also panic on a ClosePath (whose end_point is None). Fragile if reused.","fix":"These invariants are currently upheld; keep the helper private and the debug guard, or return a Result. Low priority.","locations":[{"ref":"kurbo/src/bezpath.rs:489-505","code":"  489 | fn reverse_subpath(start_pt: Point, els: &[PathEl], reversed: &mut BezPath) {\n  490 |     let end_pt = els.last().and_then(|el| el.end_point()).unwrap_or(start_pt);\n  491 |     reversed.push(PathEl::MoveTo(end_pt));\n  492 |     for (ix, el) in els.iter().enumerate().rev() {\n  493 |         let end_pt = if ix > 0 {\n  494 |             els[ix - 1].end_point().unwrap()\n  495 |         } else {\n  496 |             start_pt\n  497 |         };\n  498 |         match el {\n  499 |             PathEl::LineTo(_) => reversed.push(PathEl::LineTo(end_pt)),\n  500 |             PathEl::QuadTo(c0, _) => reversed.push(PathEl::QuadTo(*c0, end_pt)),\n  501 |             PathEl::CurveTo(c0, c1, _) => reversed.push(PathEl::CurveTo(*c1, *c0, end_pt)),\n  502 |             _ => panic!(\"reverse_subpath expects MoveTo and ClosePath to be removed\"),\n  503 |         }\n  504 |     }\n  505 | }","lines":17,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/bezpath.rs#L489-L505"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Segments::next` panics via `panic!(\"Can't start a segment on a ClosePath\")` when the first PathEl iterated is a `ClosePath`. `BezPath::from_vec`/`push` only debug_assert that a path begins with MoveTo, so in a release build a malformed `BezPath` (or any hand-built `&[PathEl]` Shape) whose first element is `ClosePath` will reach `segments()` and panic at runtime. The Shape impls for `&[PathEl]`/`[PathEl;N]` even document this can panic, but `BezPath` callers may not expect it.","fix":"Consider returning `None`/skipping instead of panicking, or document this panic on `BezPath::segments`.","locations":[{"ref":"kurbo/src/bezpath.rs:896-905","code":"  896 |             let (start, last) = self.start_last.get_or_insert_with(|| {\n  897 |                 let point = match el {\n  898 |                     PathEl::MoveTo(p) => p,\n  899 |                     PathEl::LineTo(p) => p,\n  900 |                     PathEl::QuadTo(_, p2) => p2,\n  901 |                     PathEl::CurveTo(_, _, p3) => p3,\n  902 |                     PathEl::ClosePath => panic!(\"Can't start a segment on a ClosePath\"),\n  903 |                 };\n  904 |                 (point, point)\n  905 |             });","lines":10,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/bezpath.rs#L896-L905"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`find_subdivision_point` walks `while arc_angles[i].abs() < target { target -= arc_angles[i].abs(); i += 1; }` where `target` starts at `sum * 0.5` and `sum` is the running total of the same `arc_angles[i].abs()` values. In exact arithmetic `i` stays in bounds, but because `sum` and the subtraction accumulate in different orders, floating-point rounding can leave the residual `target` strictly greater than the final element's abs value, advancing `i` past `arc_angles.len()` and indexing OOB (`arc_angles` holds at most 3 elements). Also `arc_angles` can be empty if `tangents.len() == 1`, though endpoints guarantee at least 2 here.","fix":"Clamp the loop index, e.g. `while i + 1 < arc_angles.len() && arc_angles[i].abs() < target`, so the last segment always absorbs any rounding residual.","locations":[{"ref":"kurbo/src/offset.rs:496-516","code":"  496 |         let mut arc_angles: ArrayVec<f64, 3> = ArrayVec::new();\n  497 |         let mut sum = 0.0;\n  498 |         for i in 0..tangents.len() - 1 {\n  499 |             let tan0 = tangents[i];\n  500 |             let tan1 = tangents[i + 1];\n  501 |             let th = tan0.cross(tan1).atan2(tan0.dot(tan1));\n  502 |             sum += th.abs();\n  503 |             arc_angles.push(th);\n  504 |         }\n  505 |         let mut target = sum * 0.5;\n  506 |         let mut i = 0;\n  507 |         while arc_angles[i].abs() < target {\n  508 |             target -= arc_angles[i].abs();\n  509 |             i += 1;\n  510 |         }\n  511 |         let rotation = Vec2::from_angle(target.copysign(arc_angles[i]));\n  512 |         let base = tangents[i];\n  513 |         let tan = base.rotate_scale(rotation);\n  514 |         let utan0 = if i == 0 { rec.utan0 } else { base.normalize() };\n  515 |         self.subdivide_for_tangent(utan0, ts[i], ts[i + 1], tan, true)\n  516 |             .unwrap()","lines":21,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/offset.rs#L496-L516"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`StrokeCtx::finish` and `finish_closed` index `back_els[back_els.len() - 1]` and call `.end_point().unwrap()`. They guard with `self.forward_path.is_empty()` but assume `backward_path` is non-empty and its last element has an end point. The invariant that forward and backward paths grow together holds in current code, but if a future `do_*` ever pushes to forward without backward (or the backward path's last element is a `MoveTo`/`ClosePath` with no end point), this panics. Defensive concern, not currently reproducible.","fix":"Mirror the `forward_path.is_empty()` guard on `backward_path`, or use `back_els.last().and_then(PathEl::end_point)` and bail gracefully if absent.","locations":[{"ref":"kurbo/src/stroke.rs:406-415","code":"  406 |         self.output.extend(&self.forward_path);\n  407 |         let back_els = self.backward_path.elements();\n  408 |         let return_p = back_els[back_els.len() - 1].end_point().unwrap();\n  409 |         let d = self.last_pt - return_p;\n  410 |         match style.end_cap {\n  411 |             Cap::Butt => self.output.line_to(return_p),\n  412 |             Cap::Round => round_cap(&mut self.output, tolerance, self.last_pt, d),\n  413 |             Cap::Square => square_cap(&mut self.output, false, self.last_pt, d),\n  414 |         }\n  415 |         extend_reversed(&mut self.output, back_els);","lines":10,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/stroke.rs#L406-L415"},{"ref":"kurbo/src/stroke.rs:434-437","code":"  434 |         let back_els = self.backward_path.elements();\n  435 |         let last_pt = back_els[back_els.len() - 1].end_point().unwrap();\n  436 |         self.output.move_to(last_pt);\n  437 |         extend_reversed(&mut self.output, back_els);","lines":4,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/stroke.rs#L434-L437"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`SvgLexer::unget` does `self.ix -= 1` with no guard. It is only ever called right after a successful `get_byte()` so in current code paths `ix >= 1` and it cannot underflow. It is a fragile invariant: any future caller that calls `unget` without a preceding successful `get_byte` would cause an `usize` underflow panic in debug (wrap in release).","fix":"Use `self.ix = self.ix.saturating_sub(1);` or debug_assert!(self.ix > 0) to make the invariant explicit.","locations":[{"ref":"kurbo/src/svg.rs:323-325","code":"  323 |     fn unget(&mut self) {\n  324 |         self.ix -= 1;\n  325 |     }","lines":3,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/svg.rs#L323-L325"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"min_dist_param documents support for Beziers up to degree 255 (panics only above 256 control points), but the index math uses u8 throughout. In S, C_rk, A_r and basis_function the degree n is stored as u8 and `2 * n` is computed in u8, which overflows for n >= 128 (debug panic, release wrap-around). Likewise the loop bounds `0..(2 * n)` and indices like `D_rk(2 * n, ...)` and `choose(2 * n, r)` all wrap. So any curve of degree >= 128 silently produces garbage or panics, contradicting the documented degree-255 support.","fix":"Compute degree-related quantities (2*n, 2*m, loop bounds, choose arguments) in a wider integer type (u16/u32/usize) rather than u8, or restrict and document the supported degree to <= 127.","locations":[{"ref":"kurbo/src/mindist.rs:29-39","code":"   29 | pub(crate) fn min_dist_param(\n   30 |     bez1: &[Vec2],\n   31 |     bez2: &[Vec2],\n   32 |     u: (f64, f64),\n   33 |     v: (f64, f64),\n   34 |     epsilon: f64,\n   35 |     best_alpha: Option<f64>,\n   36 | ) -> (f64, f64, f64) {\n   37 |     assert!(!bez1.is_empty() && !bez2.is_empty());\n   38 |     let n = u8::try_from(bez1.len() - 1).expect(\"At most 256 control points\");\n   39 |     let m = u8::try_from(bez2.len() - 1).expect(\"At most 256 control points\");","lines":11,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/mindist.rs#L29-L39"},{"ref":"kurbo/src/mindist.rs:174-179","code":"  174 |     let (n, m) = { ((bez1.len() - 1) as u8, (bez2.len() - 1) as u8) };\n  175 |     let mut summand = 0.0;\n  176 |     for r in 0..=2 * n {\n  177 |         for k in 0..=2 * m {\n  178 |             summand +=\n  179 |                 D_rk(r, k, bez1, bez2) * basis_function(2 * n, r, u) * basis_function(2 * m, k, v);","lines":6,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/mindist.rs#L174-L179"},{"ref":"kurbo/src/mindist.rs:187-208","code":"  187 | fn C_rk(r: u8, k: u8, bez1: &[Vec2], bez2: &[Vec2]) -> f64 {\n  188 |     #[expect(\n  189 |         clippy::cast_possible_truncation,\n  190 |         reason = \"By the checks in `min_dist_param` we know `bez1.len()` and `bez2.len()` are less than or equal to 256\"\n  191 |     )]\n  192 |     let (n, m) = { ((bez1.len() - 1) as u8, (bez2.len() - 1) as u8) };\n  193 |     let upsilon = r.min(n);\n  194 |     let theta = r - n.min(r);\n  195 |     let mut left: Vec2 = Vec2::ZERO;\n  196 |     for i in theta..upsilon + 1 {\n  197 |         let item = bez1[usize::from(i)];\n  198 |         left += item * (choose(n, i) * choose(n, r - i)) as f64 / (choose(2 * n, r) as f64);\n  199 |     }\n  200 | \n  201 |     let varsigma = k.min(m);\n  202 |     let sigma = k - m.min(k);\n  203 |     let mut right: Vec2 = Vec2::ZERO;\n  204 |     for j in sigma..varsigma + 1 {\n  205 |         let item = bez2[usize::from(j)];\n  206 |         right += item * (choose(m, j) * choose(m, k - j)) as f64 / (choose(2 * m, k) as f64);\n  207 |     }\n  208 |     left.dot(right)","lines":22,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/mindist.rs#L187-L208"},{"ref":"kurbo/src/mindist.rs:239-241","code":"  239 | fn basis_function(n: u8, i: u8, u: f64) -> f64 {\n  240 |     choose(n, i) as f64 * (1.0 - u).powi((n - i) as i32) * u.powi(i as i32)\n  241 | }","lines":3,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/mindist.rs#L239-L241"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"choose(n, k) accumulates the binomial coefficient in a u32. Binomial coefficients exceed u32::MAX well before n reaches the documented maximum (choose(34,17) already overflows u32; choose(2n, r) for the doubled-degree sums overflows much sooner). On overflow this panics in debug and wraps to a wrong value in release, corrupting all C_rk/A_r/basis_function results for higher-degree curves. Even the intermediate `p *= n` can overflow before the final division brings it back down.","fix":"Accumulate in u64 or f64, or use a multiplicative form that keeps the running value as the exact binomial coefficient (compute p = p * (n-i+1) / i style) and return f64 to avoid integer overflow entirely.","locations":[{"ref":"kurbo/src/mindist.rs:244-257","code":"  244 | fn choose(n: u8, k: u8) -> u32 {\n  245 |     let mut n = n as u32;\n  246 |     let k = k as u32;\n  247 |     if k > n {\n  248 |         return 0;\n  249 |     }\n  250 |     let mut p = 1;\n  251 |     for i in 1..=(n - k) {\n  252 |         p *= n;\n  253 |         p /= i;\n  254 |         n -= 1;\n  255 |     }\n  256 |     p\n  257 | }","lines":14,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/mindist.rs#L244-L257"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Arc::append_iter computes n from sweep_angle but does not guard against sweep_angle == 0 or NaN. With sweep_angle = 0, n = ceil(0) = 0, so the iterator yields nothing - acceptable. But the doc/Shape impls (perimeter/winding/bounding_box) call path_segments(0.1) on an arc; for a zero-sweep arc path_elements yields only a MoveTo and no segments, so perimeter is 0 (fine), but bounding_box of a degenerate path may be NaN/empty. More importantly, for very large sweep_angle (e.g. many turns) n grows correctly, but the n_err.max(3.999_999) floor only applies per full circle; this is by design. The real bug: arm_len uses `(0.25 * angle_step).abs().tan() * sign` - for sweep_angle approaching a multiple where angle_step is near +-PI/2 the tan blows up; not reachable for reasonable inputs. Flagging the zero/NaN sweep as the actionable item.","fix":"Early-return an empty iterator when sweep_angle is 0 or non-finite, and document behavior for multi-turn arcs.","locations":[{"ref":"kurbo/src/arc.rs:77-103","code":"   77 |     pub fn append_iter(&self, tolerance: f64) -> ArcAppendIter {\n   78 |         let sign = self.sweep_angle.signum();\n   79 |         let scaled_err = self.radii.x.max(self.radii.y) / tolerance;\n   80 |         // Number of subdivisions per ellipse based on error tolerance.\n   81 |         // Note: this may slightly underestimate the error for quadrants.\n   82 |         let n_err = (1.1163 * scaled_err).powf(1.0 / 6.0).max(3.999_999);\n   83 |         let n = (n_err * self.sweep_angle.abs() * (1.0 / (2.0 * PI))).ceil();\n   84 |         let angle_step = self.sweep_angle / n;\n   85 |         let n = n as usize;\n   86 |         let arm_len = (4.0 / 3.0) * (0.25 * angle_step).abs().tan() * sign;\n   87 |         let angle0 = self.start_angle;\n   88 |         let p0 = sample_ellipse(self.radii, self.x_rotation, angle0);\n   89 | \n   90 |         ArcAppendIter {\n   91 |             idx: 0,\n   92 | \n   93 |             center: self.center,\n   94 |             radii: self.radii,\n   95 |             x_rotation: self.x_rotation,\n   96 |             n,\n   97 |             arm_len,\n   98 |             angle_step,\n   99 | \n  100 |             p0,\n  101 |             angle0,\n  102 |         }\n  103 |     }","lines":27,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/arc.rs#L77-L103"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"CircleSegment::winding compares the point's angle (from Vec2::atan2, range [-PI, PI]) directly against start_angle and start_angle + sweep_angle. start_angle/sweep_angle are arbitrary radians and need not lie in [-PI, PI]. For a segment with start_angle = 0 and sweep_angle near 2*PI, every point with a negative atan2 angle is wrongly reported outside. A negative sweep_angle makes the test `angle > start_angle + sweep_angle` exclude the entire actual segment. The winding result is therefore wrong for most segments not expressed with start_angle in [-PI, PI] and positive sweep.","fix":"Normalize the point angle and the segment bounds into a common range before comparison, e.g. compute `delta = (angle - start_angle).rem_euclid(2*PI)` and test `delta <= sweep_angle.abs()` (handling sweep sign), instead of raw `<`/`>` comparisons against possibly-out-of-range bounds.","locations":[{"ref":"kurbo/src/circle.rs:361-375","code":"  361 |     fn winding(&self, pt: Point) -> i32 {\n  362 |         let angle = (pt - self.center).atan2();\n  363 |         if angle < self.start_angle || angle > self.start_angle + self.sweep_angle {\n  364 |             return 0;\n  365 |         }\n  366 |         let dist2 = (pt - self.center).hypot2();\n  367 |         if (dist2 < self.outer_radius.powi(2) && dist2 > self.inner_radius.powi(2)) ||\n  368 |             // case where outer_radius < inner_radius\n  369 |             (dist2 < self.inner_radius.powi(2) && dist2 > self.outer_radius.powi(2))\n  370 |         {\n  371 |             1\n  372 |         } else {\n  373 |             0\n  374 |         }\n  375 |     }","lines":15,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/circle.rs#L361-L375"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"RoundedRectRadii::as_single_radius checks only three pairwise differences (top_left~top_right, top_right~bottom_right, bottom_right~bottom_left) using an absolute epsilon of 1e-9, then returns top_left. With an absolute (not relative) epsilon, large radii that differ by more than 1e-9 but are 'equal' in relative terms are not collapsed, and - worse - chained near-equal comparisons allow drift: e.g. top_left and bottom_left can differ by up to ~3e-9 yet still return top_left, silently discarding bottom_left's value. For huge radii the 1e-9 absolute threshold is essentially an exact-equality test.","fix":"Use a relative epsilon (scaled by the magnitude of the radii) and/or check all radii against top_left directly rather than chaining adjacent comparisons.","locations":[{"ref":"kurbo/src/rounded_rect_radii.rs:98-109","code":"   98 |     pub const fn as_single_radius(&self) -> Option<f64> {\n   99 |         let epsilon = 1e-9;\n  100 | \n  101 |         if (self.top_left - self.top_right).abs() < epsilon\n  102 |             && (self.top_right - self.bottom_right).abs() < epsilon\n  103 |             && (self.bottom_right - self.bottom_left).abs() < epsilon\n  104 |         {\n  105 |             Some(self.top_left)\n  106 |         } else {\n  107 |             None\n  108 |         }\n  109 |     }","lines":12,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/rounded_rect_radii.rs#L98-L109"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"libm_polyfill's `powi` is implemented via `libm::pow(self, pow as _)` (floating-point pow with the exponent cast to f64). This is both slower and numerically different from a true integer power: for negative bases with integer exponents `libm::pow` is well-defined, but it can return slightly different (non-bit-exact, rounded) results than std's `f64::powi`, and the trait is meant to be a drop-in polyfill for std methods used elsewhere (e.g. tests call `.powi`). Using float pow as the polyfill for powi can introduce subtle precision discrepancies between std and libm builds.","fix":"Implement powi via repeated multiplication / exponentiation-by-squaring over the integer exponent (matching f64::powi semantics) instead of libm::pow.","locations":[{"ref":"polycool/src/libm_polyfill.rs:30-32","code":"   30 |     fn powi(self, pow: i32) -> Self {\n   31 |         libm::pow(self, pow as _)\n   32 |     }","lines":3,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/libm_polyfill.rs#L30-L32"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In the macro-generated `roots_between_with_buffer` (Poly<N>, N>=5), the recursive derivative roots are written into `scratch` and then `scratch.push(upper)`, but the critical points produced by the recursion are NOT filtered against the (lower, upper] interval before being used as bracketing endpoints, and there is no `x > last && x <= upper` guard like the PolyDyn and cubic versions have. The recursion can return roots that are infinite (the cubic/quadratic solvers can emit +/-inf), or critical points exactly equal to or beyond `upper`/`lower`. Iterating these unfiltered as bracket endpoints can produce spurious sign-change brackets and call find_root with degenerate intervals, yielding wrong or NaN roots. Compare with poly_dyn.rs lines 193-211 which DOES guard with `if x > last && x <= upper`.","fix":"Add the same `if x > last && x <= upper` guard inside the `for &mut x in scratch` loop in the Poly<N> macro version, mirroring poly_dyn.rs, so out-of-range or infinite critical points are skipped.","locations":[{"ref":"polycool/src/poly.rs:147-185","code":"  147 |             fn roots_between_with_buffer<const M: usize>(\n  148 |                 self,\n  149 |                 lower: f64,\n  150 |                 upper: f64,\n  151 |                 x_error: f64,\n  152 |                 out: &mut ArrayVec<f64, M>,\n  153 |                 scratch: &mut ArrayVec<f64, M>,\n  154 |             ) {\n  155 |                 let deriv = self.deriv();\n  156 |                 if !deriv.is_finite() {\n  157 |                     return;\n  158 |                 }\n  159 |                 deriv.roots_between_with_buffer(lower, upper, x_error, scratch, out);\n  160 |                 scratch.push(upper);\n  161 |                 out.clear();\n  162 |                 let mut last = lower;\n  163 |                 let mut last_val = self.eval(last);\n  164 | \n  165 |                 // `endpoint` now contains all the critical points (in increasing order)\n  166 |                 // and the upper endpoint of the interval. These are the endpoints\n  167 |                 // of the potential bracketing intervals of our polynomial.\n  168 |                 for &mut x in scratch {\n  169 |                     let val = self.eval(x);\n  170 |                     if $crate::different_signs(last_val, val) {\n  171 |                         out.push($crate::yuksel::find_root(\n  172 |                             |x| self.eval(x),\n  173 |                             |x| deriv.eval(x),\n  174 |                             last,\n  175 |                             x,\n  176 |                             last_val,\n  177 |                             val,\n  178 |                             x_error,\n  179 |                         ));\n  180 |                     }\n  181 | \n  182 |                     last = x;\n  183 |                     last_val = val;\n  184 |                 }\n  185 |             }","lines":39,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/poly.rs#L147-L185"},{"ref":"polycool/src/poly_dyn.rs:193-211","code":"  193 |         for &mut x in scratch {\n  194 |             if x > last && x <= upper {\n  195 |                 let val = self.eval(x);\n  196 |                 if different_signs(last_val, val) {\n  197 |                     out.push(yuksel::find_root(\n  198 |                         |x| self.eval(x),\n  199 |                         |x| deriv.eval(x),\n  200 |                         last,\n  201 |                         x,\n  202 |                         last_val,\n  203 |                         val,\n  204 |                         x_error,\n  205 |                     ));\n  206 |                 }\n  207 | \n  208 |                 last = x;\n  209 |                 last_val = val;\n  210 |             }\n  211 |         }","lines":19,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/poly_dyn.rs#L193-L211"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Affine::reflect` calls `.normalize()` on the normal vector derived from `direction`. If `direction` is the zero vector (e.g. `Vec2::ZERO`), `normalize` divides by a zero magnitude and produces NaN components, so the returned `Affine` is entirely NaN with no indication. The public doc does not mention this degenerate case (unlike `inverse`, which documents NaN-on-zero-determinant). A caller passing a degenerate direction silently gets a NaN transform.","fix":"Document that a zero-length `direction` yields a NaN transform (mirroring the `inverse`/`normalize` NaN docs), or guard against the zero case.","locations":[{"ref":"kurbo/src/affine.rs:147-171","code":"  147 |     pub fn reflect(point: impl Into<Point>, direction: impl Into<Vec2>) -> Self {\n  148 |         let point = point.into();\n  149 |         let direction = direction.into();\n  150 | \n  151 |         let n = Vec2 {\n  152 |             x: direction.y,\n  153 |             y: -direction.x,\n  154 |         }\n  155 |         .normalize();\n  156 | \n  157 |         // Compute Householder reflection matrix\n  158 |         let x2 = n.x * n.x;\n  159 |         let xy = n.x * n.y;\n  160 |         let y2 = n.y * n.y;\n  161 |         // Here we also add in the post translation, because it doesn't require any further calc.\n  162 |         let aff = Affine::new([\n  163 |             1. - 2. * x2,\n  164 |             -2. * xy,\n  165 |             -2. * xy,\n  166 |             1. - 2. * y2,\n  167 |             point.x,\n  168 |             point.y,\n  169 |         ]);\n  170 |         aff.pre_translate(-point.to_vec2())\n  171 |     }","lines":25,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/affine.rs#L147-L171"},{"ref":"kurbo/src/vec2.rs:180-183","code":"  180 |     #[inline]\n  181 |     pub fn normalize(self) -> Vec2 {\n  182 |         self / self.hypot()\n  183 |     }","lines":4,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/vec2.rs#L180-L183"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Arc::area returns PI * x * y (full-ellipse area) regardless of sweep_angle, and ignores the sign of radii. The doc says 'shape isn't closed so area is not well defined', but returning the full ellipse area is misleading and unrelated to the arc's actual sweep. A caller using Shape::area generically gets a value that has no relation to the arc.","fix":"Either return 0.0 (consistent with an open shape) or document explicitly that this is the full enclosing ellipse area; at minimum take .abs() of the radii product.","locations":[{"ref":"kurbo/src/arc.rs:203-208","code":"  203 |     /// Note: shape isn't closed so area is not well defined.\n  204 |     #[inline]\n  205 |     fn area(&self) -> f64 {\n  206 |         let Vec2 { x, y } = self.radii;\n  207 |         PI * x * y\n  208 |     }","lines":6,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/arc.rs#L203-L208"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Affine` multiplication of a `BezPath` (`Mul<BezPath>`/`Mul<&BezPath>`) maps each element including `ClosePath` through `self * el` (fine), but unlike `apply_affine` it allocates a new Vec; meanwhile `apply_affine` mutates in place. Not a bug per se, but note `apply_affine` and these `Mul` impls share no code and could diverge. More importantly: none of these transform paths validate the result still begins with MoveTo, which is acceptable since affine maps preserve element kinds. Confirmed not a correctness bug; flagged only as a maintainability/divergence risk between `apply_affine` (line 359) and the `Mul` impls.","fix":"Have `Mul<&BezPath> for Affine` reuse the same per-element transform path as `apply_affine`, or document they must stay in sync.","locations":[{"ref":"kurbo/src/bezpath.rs:358-363","code":"  358 |     /// Apply an affine transform to the path.\n  359 |     pub fn apply_affine(&mut self, affine: Affine) {\n  360 |         for el in self.0.iter_mut() {\n  361 |             *el = affine * (*el);\n  362 |         }\n  363 |     }","lines":6,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/bezpath.rs#L358-L363"},{"ref":"kurbo/src/bezpath.rs:738-752","code":"  738 | impl Mul<BezPath> for Affine {\n  739 |     type Output = BezPath;\n  740 | \n  741 |     fn mul(self, other: BezPath) -> BezPath {\n  742 |         BezPath(other.0.iter().map(|&el| self * el).collect())\n  743 |     }\n  744 | }\n  745 | \n  746 | impl Mul<&BezPath> for Affine {\n  747 |     type Output = BezPath;\n  748 | \n  749 |     fn mul(self, other: &BezPath) -> BezPath {\n  750 |         BezPath(other.0.iter().map(|&el| self * el).collect())\n  751 | pe::bounding_box doc to say it returns an enclosing (not necessarily minimal) rectangle.","locations":[{"ref":"kurbo/src/circle.rs:377-383","code":"  377 |     #[inline]\n  378 |     fn bounding_box(&self) -> Rect {\n  379 |         // todo this is currently not tight\n  380 |         let r = self.inner_radius.max(self.outer_radius);\n  381 |         let (x, y) = self.center.into();\n  382 |         Rect::new(x - r, y - r, x + r, y + r)\n  383 |     }","lines":7,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/circle.rs#L377-L383"},{"ref":"kurbo/src/shape.rs:140-141","code":"  140 |     /// The smallest rectangle that encloses the shape.\n  141 |     fn bounding_box(&self) -> Rect;","lines":2,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/shape.rs#L140-L141"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"solve_quartic's c0==0 fast path chains a 0.0 root onto the cubic's roots without checking whether the reduced cubic already produced a 0.0 root. For a quartic with a double root at 0 (e.g. x^4 + x^3 = x^3(x+1), where after factoring out one x the cubic c1=0,c2=0,c3=1,c4=... still yields a 0 root) this is fine, but more importantly the comment itself flags it: roots are not sorted and a spurious/duplicate 0.0 may be appended. Downstream code that assumes distinct sorted roots can misbehave.","fix":"Either document clearly that callers must dedup/sort, or filter the appended 0.0 when the cubic already contains a near-zero root, and sort the result for consistency with the other branches.","locations":[{"ref":"kurbo/src/common.rs:313-320","code":"  313 |     if c0 == 0.0 {\n  314 |         // Note: appends 0 root at end, doesn't sort. We might want to do that.\n  315 |         return solve_cubic(c1, c2, c3, c4)\n  316 |             .iter()\n  317 |             .copied()\n  318 |             .chain(Some(0.0))\n  319 |             .collect();\n  320 |     }","lines":8,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/common.rs#L313-L320"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Ellipse::perimeter degenerate-radius branch uses f64::max(radii.x, radii.y) to compute the line length 4*max. radii come from svd() which already returns non-negative singular values, so this is usually fine, but the comment says it handles 'one of its radii equal to 0, i.e. a line' - if exactly one radius is 0 the perimeter of the degenerate line (back-and-forth) is 4*other_radius, which max gives correctly only because the other is non-negative. This is correct, but note the test set in compare_perimeter_with_bez passes (0.,1.) and (1.,0.) - fine. Lower-severity: this relies on svd never returning a negative value; if that invariant ever breaks the result is silently wrong. Worth an assert or doc note.","fix":"Document the reliance on svd() returning non-negative radii, or use .abs() defensively.","locations":[{"ref":"kurbo/src/ellipse.rs:274-278","code":"  274 |         // Check for the trivial case where the ellipse has one of its radii equal to 0, i.e.,\n  275 |         // where it describes a line, as the numerical method used breaks down with this extreme.\n  276 |         if radii.x == 0. || radii.y == 0. {\n  277 |             return 4. * f64::max(radii.x, radii.y);\n  278 |         }","lines":5,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/ellipse.rs#L274-L278"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `ExpandCtx`, `last_tan` is stored in inconsistent coordinate frames across segment kinds: `do_line` and `do_quad` store the raw geometry-space tangent (`tan`, `q1`), while `do_cubic` stores `self.expand * utan1` (expansion-space GIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`do_quad` in expand.rs bails to `do_line(p2)` when `det.abs() < 1e-10` (control arms nearly parallel) or when either arm is within tolerance, but it computes `utan0`/`utan1` from `q0`/`q1` *after* an `einv` (inverse expansion) transform and normalizes them. If `expand` has a zero component (`xx` or `yy` == 0, explicitly allowed per `Diagonal2::inv` doc which warns it 'produces infinities'), `einv` contains infinities and `(einv * q0).normalize()` yields NaN/garbage tangents that propagate into the emitted control points without being rejected. A zero expansion factor is a documented-but-dangerous input that is silently mishandled here.","fix":"Validate/clamp zero expansion components at the `expand_path` entry, or detect non-finite `einv` and treat such segments degenerately (fall back to `do_line`).","locations":[{"ref":"kurbo/src/expand.rs:207-240","code":"  207 |     fn do_quad(&mut self, p1: Point, p2: Point) {\n  208 |         let q0 = p1 - self.last_pt;\n  209 |         let q1 = p2 - p1;\n  210 |         if self.in_tolerance(q0) || self.in_tolerance(q1) {\n  211 |             self.do_line(p2);\n  212 |             return;\n  213 |         }\n  214 |         let einv = self.expand.inv();\n  215 |         let utan0 = (einv * q0).normalize();\n  216 |         let utan1 = (einv * q1).normalize();\n  217 |         let det = utan1.cross(utan0);\n  218 |         if det.abs() < 1e-10 {\n  219 |             self.do_line(p2);\n  220 |             return;\n  221 |         }\n  222 |         let utanm = (einv * (p2 - self.last_pt)).normalize();\n  223 |         let n0 = self.expand.abs() * utan0.turn_90();\n  224 |         let n1 = self.expand.abs() * utan1.turn_90();\n  225 |         let mid_chord = self.last_pt.midpoint(p2);\n  226 |         let m = mid_chord.midpoint(p1) + self.expand.abs() * utanm.turn_90();\n  227 |         let out_p0 = self.last_pt + n0;\n  228 |         let out_p3 = p2 + n1;\n  229 |         let rhs = einv * (m - out_p0.midpoint(out_p3));\n  230 |         let idet = (8. / 3.) / det;\n  231 |         let a = (utan1.cross(rhs) * idet).max(0.0);\n  232 |         let b = (utan0.cross(rhs) * idet).max(0.0);\n  233 |         self.do_join(n0, q0, false);\n  234 |         let out_p1 = out_p0 + self.expand * (a * utan0);\n  235 |         let out_p2 = out_p3 - self.expand * (b * utan1);\n  236 |         self.result.curve_to(out_p1, out_p2, out_p3);\n  237 |         self.last_n = Some(n1);\n  238 |         self.last_tan = q1;\n  239 |         self.last_pt = p2;\n  240 |     }","lines":34,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/expand.rs#L207-L240"},{"ref":"kurbo/src/expand.rs:56-59","code":"   56 |     /// Will of course produce infinities if a component is zero.\n   57 |     pub const fn inv(self) -> Self {\n   58 |         Diagonal2::new(1.0 / self.xx, 1.0 / self.yy)\n   59 |     }","lines":4,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/expand.rs#L56-L59"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`fit_opt_segment`'s inner closure `f` re-checks `source.break_cusp(range.clone())` on every solver iteration using the *original* full `range`, not the shrinking `t0..x` interval being measured. Since `break_cusp` is supposed to be queried per-subrange, repeatedly testing the unchanged outer `range` is both redundant work and semantically off: a cusp found in the outer range aborts the segment-length search even when it lies outside the candidate `t0..x` window currently under test, biasing the optimal-fit search.","fix":"Test `break_cusp(t0..x)` (the interval actually being fit) inside the closure, or hoist the single outer cusp check out of the solver loop entirely since it is invariant.","locations":[{"ref":"kurbo/src/fit.rs:683-695","code":"  683 |     let f = |x| {\n  684 |         if let Some(t) = source.break_cusp(range.clone()) {\n  685 |             return Err(t);\n  686 |         }\n  687 |         let err = measure_one_seg(source, t0..x, accuracy).unwrap_or(missing_err);\n  688 |         Ok(err - accuracy)\n  689 |     };\n  690 |     const EPS: f64 = 1e-9;\n  691 |     let k1 = 2.0 / (t1 - t0);\n  692 |     match solve_itp_fallible(f, t0, t1, EPS, 1, k1, -accuracy, err - accuracy) {\n  693 |         Ok((t1, _)) => FitResult::ParamVal(t1),\n  694 |         Err(t) => FitResult::CuspFound(t),\n  695 |     }","lines":13,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/fit.rs#L683-L695"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the Property-two boundary check the loops iterate `for i in 0..2*n` and `for j in 0..2*m`, which exclude the final index 2*n / 2*m. The D_{r,k} grid the algorithm reasons about has indices 0..=2n and 0..=2m (as used in S's `0..=2*n`). Excluding the top row/column means the interior-minimum and boundary tests never consider dij at i==2n or j==2m, so the boundary classification (at_boundary1on_bez1 / at_boundary1on_bez2) and the min_ij search in Property one are computed over an incomplete grid, potentially returning a suboptimal/incorrect minimum distance.","fix":"Use inclusive ranges `0..=2*n` and `0..=2*m` (matching S) so the full D grid including the boundary indices is examined, or justify with a comment why the top boundary index is intentionally omitted.","locations":[{"ref":"kurbo/src/mindist.rs:65-66","code":"   65 |     for r in 0..(2 * n) {\n   66 |         for k in 0..(2 * m) {","lines":2,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/mindist.rs#L65-L66"},{"ref":"kurbo/src/mindist.rs:86-87","code":"   86 |     for i in 0..2 * n {\n   87 |         for j in 0..2 * m {","lines":2,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/mindist.rs#L86-L87"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ParamCurveMoments::moments computes moments by walking PathEls but only handles an explicit ClosePath to close each subpath. If the path iterator yields a subpath that is implicitly closed (a polygon without a trailing ClosePath, or a new MoveTo starting a fresh subpath while the previous one was left open), Green's-theorem area/moment integrals are computed over an open contour and will be wrong (the implicit closing edge from cur back to start_pt is omitted). A new MoveTo silently abandons the previous subpath's closing segment.","fix":"On encountering a MoveTo while a subpath is open (cur != start_pt), emit the implicit closing line before starting the new subpath, mirroring how area/winding handling elsewhere in kurbo treats open subpaths; or document that input must be explicitly closed.","locations":[{"ref":"kurbo/src/moments.rs:536-561","code":"  536 |         for el in self {\n  537 |             match el {\n  538 |                 PathEl::MoveTo(p) => {\n  539 |                     start_pt = p;\n  540 |                     cur = p;\n  541 |                 }\n  542 |                 PathEl::LineTo(p) => {\n  543 |                     moments.handle_line(cur, p);\n  544 |                     cur = p;\n  545 |                 }\n  546 |                 PathEl::QuadTo(p0, p1) => {\n  547 |                     moments.handle_quad(cur, p0, p1);\n  548 |                     cur = p1;\n  549 |                 }\n  550 |                 PathEl::CurveTo(p1, p2, p3) => {\n  551 |                     moments.handle_cubic(cur, p1, p2, p3);\n  552 |                     cur = p3;\n  553 |                 }\n  554 |                 PathEl::ClosePath => {\n  555 |                     if cur != start_pt {\n  556 |                         moments.handle_line(cur, start_pt);\n  557 |                         cur = start_pt;\n  558 |                     }\n  559 |                 }\n  560 |             }\n  561 |         }","lines":26,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/moments.rs#L536-L561"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`eval_err` performs a Newton step `t += tana.dot(pa - p) / tana.dot(self.q.eval(t).to_vec2());` with no guard against the denominator `tana.dot(q(t))` being zero or near-zero. When the source-curve derivative is orthogonal to the approximation's tangent (or vanishes near a cusp), this divides by ~0 and produces an infinite/NaN `t`. It is partially salvaged by `t = t.max(rec.t0).min(rec.t1)` (NaN propagates through `max`/`min` as the non-NaN bound on some platforms but is not guaranteed) and by the later `is_finite` hack on the distance, but a NaN `t` silently corrupts the error sample rather than rejecting it.","fix":"Guard the Newton denominator: skip the update (keep `ts[i]`) when `tana.dot(q(t))` is below an epsilon, or clamp the step; ensure a NaN `t` is mapped back into `[t0,t1]` deterministically.","locations":[{"ref":"kurbo/src/offset.rs:374-392","code":"  374 |             // Newton step to refine t value\n  375 |             let pa = c_approx.eval(ta);\n  376 |             let tana = qa.eval(ta).to_vec2();\n  377 |             t += tana.dot(pa - p) / tana.dot(self.q.eval(t).to_vec2());\n  378 |             t = t.max(rec.t0).min(rec.t1);\n  379 |             ts[i] = t;\n  380 |             let cusp = rec.cusp0.signum();\n  381 |             let unorm = cusp * tana.normalize().turn_90();\n  382 |             unorms[i] = unorm;\n  383 |             let p_new = self.c.eval(t) + self.d * unorm;\n  384 |             let err_vec = pa - p_new;\n  385 |             err_vecs[i] = err_vec;\n  386 |             let mut dist_err_squared = err_vec.length_squared();\n  387 |             if !dist_err_squared.is_finite() {\n  388 |                 // A hack to make sure we reject bad refinements\n  389 |                 dist_err_squared = 1e12;\n  390 |             }\n  391 |             // Note: consider also incorporating angle error\n  392 |             err_squared = dist_err_squared.max(err_squared);","lines":19,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/offset.rs#L374-L392"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ParamCurveArclen::inv_arclen computes `n = 1.0 - epsilon.log2().ceil().min(0.0)`. If `accuracy >= total_arclen` then epsilon >= 1, log2(epsilon) >= 0, ceil >= 0, .min(0.0) == 0, so n = 1.0 - fine. But if total_arclen is 0 (degenerate zero-length curve that still passes the arclen>0 and arclen<total checks — impossible since arclen<total<=0 returns early) it cannot reach here. The genuine concern: epsilon can be subnormal/zero if accuracy is 0, giving log2(0) = -inf, ceil(-inf) = -inf, min(0) = -inf, n = +inf, inner_accuracy = accuracy/inf = 0; solve_itp then runs with epsilon=0. With accuracy=0 the loop may not converge (solve_itp typically has an iteration cap, so likely terminates, but precision/behavior is undefined). No input validation of accuracy > 0.","fix":"Clamp/validate accuracy to be strictly positive (e.g. accuracy.max(f64::MIN_POSITIVE) or document the precondition) before computing epsilon and n.","locations":[{"ref":"kurbo/src/param_curve.rs:106-123","code":"  106 |         let mut t_last = 0.0;\n  107 |         let mut arclen_last = 0.0;\n  108 |         let epsilon = accuracy / total_arclen;\n  109 |         let n = 1.0 - epsilon.log2().ceil().min(0.0);\n  110 |         let inner_accuracy = accuracy / n;\n  111 |         let f = |t: f64| {\n  112 |             let (range, dir) = if t > t_last {\n  113 |                 (t_last..t, 1.0)\n  114 |             } else {\n  115 |                 (t..t_last, -1.0)\n  116 |             };\n  117 |             let arc = self.subsegment(range).arclen(inner_accuracy);\n  118 |             arclen_last += arc * dir;\n  119 |             t_last = t;\n  120 |             arclen_last - arclen\n  121 |         };\n  122 |         common::solve_itp(f, 0.0, 1.0, epsilon, 1, 0.2, -arclen, total_arclen - arclen)\n  123 |     }","lines":18,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/param_curve.rs#L106-L123"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Point::midpoint` and `Rect::center` compute `0.5 * (a + b)`. When `a` and `b` are both large finite values of the same sign, `a + b` can overflow to +/-inf, so the midpoint/center becomes infinite even though it lies between two finite, representable points. The numerically-stable form `a + 0.5*(b-a)` would avoid this. Affects `Line::midpoint` (delegates to `Point::midpoint`) too.","fix":"Compute as `a + 0.5 * (b - a)` per component to avoid intermediate overflow for large coordinates.","locations":[{"ref":"kurbo/src/point.rs:60-64","code":"   60 |     /// Determine the midpoint of two points.\n   61 |     #[inline]\n   62 |     pub const fn midpoint(self, other: Point) -> Point {\n   63 |         Point::new(0.5 * (self.x + other.x), 0.5 * (self.y + other.y))\n   64 |     }","lines":5,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/point.rs#L60-L64"},{"ref":"kurbo/src/rect.rs:171-175","code":"  171 |     /// The center point of the rectangle.\n  172 |     #[inline]\n  173 |     pub const fn center(&self) -> Point {\n  174 |         Point::new(0.5 * (self.x0 + self.x1), 0.5 * (self.y0 + self.y1))\n  175 |     }","lines":5,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/rect.rs#L171-L175"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"QuadBez::estimate_subdiv computes x0/x2/scale via `cross.recip()` and `dd.hypot()` without guarding against degenerate quads. When the quad is exactly a straight line (dd is parallel to (p2-p0)) cross == 0, so x0 = x2 = inf or NaN, and scale = |cross/(...)| may be 0/0 = NaN. The code handles non-finite scale with `if scale.is_finite() { ... } else { 0.0 }`, but x0 and x2 (used for x0.signum()==x2.signum() and feeding approx_parabola_integral) are computed unconditionally and can be NaN/inf; a0/a2 then become NaN/inf and u0/uscale NaN, which silently corrupts FlattenParams even though val is forced to 0. Downstream determine_subdiv_t would produce NaN.","fix":"When `cross` is ~0 (degenerate/straight quad), short-circuit to a FlattenParams that represents a straight line (e.g. val=0 and a linear u mapping) instead of propagating NaN through a0/a2/u0/uscale.","locations":[{"ref":"kurbo/src/quadbez.rs:57-93","code":"   57 |     pub(crate) fn estimate_subdiv(&self, sqrt_tol: f64) -> FlattenParams {\n   58 |         // Determine transformation to $y = x^2$ parabola.\n   59 |         let d01 = self.p1 - self.p0;\n   60 |         let d12 = self.p2 - self.p1;\n   61 |         let dd = d01 - d12;\n   62 |         let cross = (self.p2 - self.p0).cross(dd);\n   63 |         let x0 = d01.dot(dd) * cross.recip();\n   64 |         let x2 = d12.dot(dd) * cross.recip();\n   65 |         let scale = (cross / (dd.hypot() * (x2 - x0))).abs();\n   66 | \n   67 |         // Compute number of subdivisions needed.\n   68 |         let a0 = approx_parabola_integral(x0);\n   69 |         let a2 = approx_parabola_integral(x2);\n   70 |         let val = if scale.is_finite() {\n   71 |             let da = (a2 - a0).abs();\n   72 |             let sqrt_scale = scale.sqrt();\n   73 |             if x0.signum() == x2.signum() {\n   74 |                 da * sqrt_scale\n   75 |             } else {\n   76 |                 // Handle cusp case (segment contains curvature maximum)\n   77 |                 let xmin = sqrt_tol / sqrt_scale;\n   78 |                 sqrt_tol * da / approx_parabola_integral(xmin)\n   79 |             }\n   80 |         } else {\n   81 |             0.0\n   82 |         };\n   83 |         let u0 = approx_parabola_inv_integral(a0);\n   84 |         let u2 = approx_parabola_inv_integral(a2);\n   85 |         let uscale = (u2 - u0).recip();\n   86 |         FlattenParams {\n   87 |             a0,\n   88 |             a2,\n   89 |             u0,\n   90 |             uscale,\n   91 |             val,\n   92 |         }\n   93 |     }","lines":37,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/quadbez.rs#L57-L93"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"QuadBez::arclen analytic branch computes a2 = a.powf(-0.5) (i.e. 1/sqrt(a)) after the early-out `if a < 5e-4 * c`. If c is 0 (p0==p1, a straight degenerate case where p1 coincides with p0) the guard `a < 5e-4*c` becomes `a < 0`, which is false for a>=0, so it does NOT take the stable quadrature branch even when a is tiny. Then a2 = a^-0.5 can be huge/inf when a is near 0, and the log argument / division by ba_c2 can be unstable. The scale-invariance fix (#477) addressed one case, but the c==0 corner (control point at start) is not specifically guarded; a near-zero `a` with `c==0` skips the safe branch.","fix":"Also fall back to the quadrature branch when `c` (or a+b+c) is ~0, or test a against an absolute floor in addition to the relative `5e-4 * c` test, to cover the p0==p1 degenerate case.","locations":[{"ref":"kurbo/src/quadbez.rs:276-321","code":"  276 |     fn arclen(&self, _accuracy: f64) -> f64 {\n  277 |         let d2 = self.p0.to_vec2() - 2.0 * self.p1.to_vec2() + self.p2.to_vec2();\n  278 |         let a = d2.hypot2();\n  279 |         let d1 = self.p1 - self
