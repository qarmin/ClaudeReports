(4.0 * c * a - b * b)\n  319 |                 * (((2.0 * a + b) * a2 + 2.0 * sabc) / ba_c2).ln()\n  320 |         }\n  321 |     }","lines":46,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/quadbez.rs#L276-L321"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"QuadSpline::to_quads uses `self.points.len() - 1` as a bare usize subtraction at line 54. The earlier `get(self.idx..=self.idx + 2)?` guarantees len >= idx+3 >= 3 at this point, so len-1 cannot underflow here. However the condition `self.idx + 2 < self.points.len() - 1` is the off-curve/implied-midpoint test and is easy to get wrong; the equivalent intent is 'is there another segment after this one'. It currently reads correctly for the B-spline midpoint insertion, but `self.idx + 2 < self.points.len() - 1` is more fragilely written than `self.idx + 3 < self.points.len()`. Verify against the four-point test: works. Flagging the unguarded `len() - 1` as a latent underflow risk if the get() guard is ever refactored.","fix":"Rewrite as `if self.idx + 3 < self.points.len()` to avoid the usize subtraction entirely and make the 'has next segment' intent explicit.","locations":[{"ref":"kurbo/src/quadspline.rs:48-56","code":"   48 |         let [mut p0, p1, mut p2]: [Point; 3] =\n   49 |             self.points.get(self.idx..=self.idx + 2)?.try_into().ok()?;\n   50 | \n   51 |         if self.idx != 0 {\n   52 |             p0 = p0.midpoint(p1);\n   53 |         }\n   54 |         if self.idx + 2 < self.points.len() - 1 {\n   55 |             p2 = p1.midpoint(p2);\n   56 |         }","lines":9,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/quadspline.rs#L48-L56"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Rect::contains` uses a half-open test on both axes (`>= x0 && < x1`), so points on the right/bottom edges are excluded while points on the left/top edges are included. This is asymmetric and, combined with `Shape::contains` delegating to it, means a point exactly on `x1`/`y1` is reported as not contained even for a well-formed rect. This is intentional for tiling (see `winding`), but it is undocumented on `contains`, surprising callers who expect a closed rectangle.","fix":"Document the half-open semantics on `contains` (point included iff `x0 <= x < x1` and `y0 <= y < y1`), as is done implicitly for `winding`.","locations":[{"ref":"kurbo/src/rect.rs:177-182","code":"  177 |     /// Returns `true` if `point` lies within `self`.\n  178 |     #[inline]\n  179 |     pub fn contains(&self, point: impl Into<Point>) -> bool {\n  180 |         let point = point.into();\n  181 |         point.x >= self.x0 && point.x < self.x1 && point.y >= self.y0 && point.y < self.y1\n  182 |     }","lines":6,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/rect.rs#L177-L182"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"RoundedRectRadii::clamp uses min(max) per corner but does not clamp the lower bound to 0. RoundedRect::from_rect calls .abs() before .clamp(), so negative radii cannot reach clamp there, but clamp is a public method: calling radii.clamp(max) on a RoundedRectRadii containing negative values leaves them negative, and if max is negative all radii become <= max (negative). The method name 'clamp' implies a bounded range; here it is a one-sided min only.","fix":"Either rename to `clamp_max`/`min_with`, or clamp into [0, max] (and document the assumption max >= 0).","locations":[{"ref":"kurbo/src/rounded_rect_radii.rs:70-78","code":"   70 |     /// For each corner, takes the min of that corner's radius and `max`.\n   71 |     pub const fn clamp(&self, max: f64) -> Self {\n   72 |         RoundedRectRadii::new(\n   73 |             self.top_left.min(max),\n   74 |             self.top_right.min(max),\n   75 |             self.bottom_right.min(max),\n   76 |             self.bottom_left.min(max),\n   77 |         )\n   78 |     }","lines":9,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/rounded_rect_radii.rs#L70-L78"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Size::aspect_ratio_width` and `Rect::aspect_ratio_width` perform `self.width / self.height`. The docs claim the result is `sign(width) * infinity` when height is 0 and `NaN` when both are 0. With IEEE-754 this holds, but `inscribed_rect_with_aspect_ratio` relies on `self_aspect` being usable; when `height == 0` and `width != 0`, `self_aspect` is +/-inf, and the branch `self_aspect.abs() < aspect_ratio.abs()` compares inf < finite => false, dropping into the 'shrink x' branch with `new_width = 0 * aspect_ratio` (=0 or NaN if aspect_ratio is inf). The interaction of inf/NaN aspect with the inscribe algorithm is subtle and only partly covered by tests; degenerate-height rects can yield surprising results.","fix":"Add explicit handling / tests for zero-height (infinite aspect) and zero-width inputs in `inscribed_rect_with_aspect_ratio`, and confirm the documented infinity/NaN contract end-to-end.","locations":[{"ref":"kurbo/src/size.rs:254-260","code":"  254 |     #[inline]\n  255 |     pub const fn aspect_ratio_width(self) -> f64 {\n  256 |         // ratio is determined by width / height\n  257 |         // https://en.wikipedia.org/wiki/Aspect_ratio_(image)\n  258 |         // https://en.wikipedia.org/wiki/Ratio\n  259 |         self.width / self.height\n  260 |     }","lines":7,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/size.rs#L254-L260"},{"ref":"kurbo/src/rect.rs:581-608","code":"  581 |     pub const fn inscribed_rect_with_aspect_ratio(&self, aspect_ratio: f64) -> Rect {\n  582 |         let self_size @ Size { width, height } = self.size();\n  583 |         let self_aspect = self_size.aspect_ratio_width();\n  584 | \n  585 |         // TODO the parameter `1e-9` was chosen quickly and may not be optimal.\n  586 |         // if self_aspect is `NaN`, that means we're the 0x0 rectangle (or have a `NaN`).\n  587 |         // We don't want NaNs in the output for the 0x0 rectangle\n  588 |         if self_aspect.is_nan() || (self_aspect - aspect_ratio).abs() < 1e-9 {\n  589 |             // short circuit\n  590 |             *self\n  591 |         } else if self_aspect.abs() < aspect_ratio.abs() {\n  592 |             // Our width/height is less than the requested width/height\n  593 |             // We use a smaller height to increase the ratio.\n  594 |             // shrink y to fit\n  595 |             let new_height = width * aspect_ratio.recip();\n  596 |             let gap = (height - new_height) * 0.5;\n  597 |             let y0 = self.y0 + gap;\n  598 |             let y1 = self.y1 - gap;\n  599 |             Rect::new(self.x0, y0, self.x1, y1)\n  600 |         } else {\n  601 |             // shrink x to fit\n  602 |             let new_width = height * aspect_ratio;\n  603 |             let gap = (width - new_width) * 0.5;\n  604 |             let x0 = self.x0 + gap;\n  605 |             let x1 = self.x1 - gap;\n  606 |             Rect::new(x0, self.y0, x1, self.y1)\n  607 |         }\n  608 |     }","lines":28,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/rect.rs#L581-L608"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `from_svg`, the 't'/'T' (smooth quadratic) and 's'/'S' (smooth cubic) commands reflect `last_ctrl` regardless of which command produced it. After commands like L/H/V/M, `last_ctrl` is set to the current point (lines 127,134,146,158), so reflection yields the current point, which matches the SVG spec (control point coincides with current point when the previous command was not a matching curve). However the cross-type case is wrong: a 'T' immediately following a 'C'/'S' (cubic) reflects the cubic's second control point as if it were a quadratic control point, and an 'S' following a 'Q'/'T' reflects a quadratic control point as a cubic one. The SVG spec requires the reflected control point to be used only when the preceding command is the *same curve family*; otherwise the current point must be used. This produces subtly wrong curves on mixed Q/C + smooth sequences.","fix":"Track the previous command type (quad vs cubic vs other) and only reflect when the preceding command is of the matching family ('Q'/'T' for 'T', 'C'/'S' for 'S'); otherwise use `last_pt` as the implied control point.","locations":[{"ref":"kurbo/src/svg.rs:169-200","code":"  169 |                 b't' | b'T' => {\n  170 |                     let p1 = match last_ctrl {\n  171 |                         Some(ctrl) => (2.0 * lexer.last_pt.to_vec2() - ctrl.to_vec2()).to_point(),\n  172 |                         None => lexer.last_pt,\n  173 |                     };\n  174 |                     let p2 = lexer.get_maybe_relative(c)?;\n  175 |                     path.quad_to(p1, p2);\n  176 |                     last_ctrl = Some(p1);\n  177 |                     lexer.last_pt = p2;\n  178 |                     last_cmd = c;\n  179 |                 }\n  180 |                 b'c' | b'C' => {\n  181 |                     let p1 = lexer.get_maybe_relative(c)?;\n  182 |                     let p2 = lexer.get_maybe_relative(c)?;\n  183 |                     let p3 = lexer.get_maybe_relative(c)?;\n  184 |                     path.curve_to(p1, p2, p3);\n  185 |                     last_ctrl = Some(p2);\n  186 |                     lexer.last_pt = p3;\n  187 |                     last_cmd = c;\n  188 |                 }\n  189 |                 b's' | b'S' => {\n  190 |                     let p1 = match last_ctrl {\n  191 |                         Some(ctrl) => (2.0 * lexer.last_pt.to_vec2() - ctrl.to_vec2()).to_point(),\n  192 |                         None => lexer.last_pt,\n  193 |                     };\n  194 |                     let p2 = lexer.get_maybe_relative(c)?;\n  195 |                     let p3 = lexer.get_maybe_relative(c)?;\n  196 |                     path.curve_to(p1, p2, p3);\n  197 |                     last_ctrl = Some(p2);\n  198 |                     lexer.last_pt = p3;\n  199 |                     last_cmd = c;\n  200 |                 }","lines":32,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/svg.rs#L169-L200"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`from_svg` arc handling uses a hard-coded tolerance of 0.1 for `to_cubic_beziers`, marked with a TODO. For paths in large coordinate spaces (e.g. font units, thousands of units) a 0.1 absolute tolerance is far tighter than needed and generates excessive cubics; for tiny coordinate spaces it may be too coarse. The tolerance is absolute and unrelated to arc size, so output quality/size varies wildly with scale.","fix":"Make the flattening tolerance configurable (e.g. a `from_svg_with_tolerance`) or scale it relative to the arc radii.","locations":[{"ref":"kurbo/src/svg.rs:219-225","code":"  219 |                     match Arc::from_svg_arc(&svg_arc) {\n  220 |                         Some(arc) => {\n  221 |                             // TODO: consider making tolerance configurable\n  222 |                             arc.to_cubic_beziers(0.1, |p1, p2, p3| {\n  223 |                                 path.curve_to(p1, p2, p3);\n  224 |                             });\n  225 |                         }","lines":7,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/svg.rs#L219-L225"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Triangle::circumscribed_circle computes r = sqrt(b_len2 * c_len2) * |c - b| * d_recip where d_recip = 0.5 / b.cross(c). cross can be negative, so d_recip is signed and the resulting radius can be negative. The test circumradius() explicitly asserts the radius is `-expected` after permuting vertices, confirming the sign flips with vertex orientation - a radius should never be negative. Downstream consumers (Circle bounding_box uses .abs(), area uses powi(2), so they survive), but any code reading Circle::radius directly gets a negative value.","fix":"Take the absolute value of the computed radius (and ideally the incircle radius) before constructing the Circle.","locations":[{"ref":"kurbo/src/triangle.rs:124-136","code":"  124 |     pub fn circumscribed_circle(&self) -> Circle {\n  125 |         let b = self.b - self.a;\n  126 |         let c = self.c - self.a;\n  127 |         let b_len2 = b.hypot2();\n  128 |         let c_len2 = c.hypot2();\n  129 |         let d_recip = 0.5 / b.cross(c);\n  130 | \n  131 |         let x = (c.y * b_len2 - b.y * c_len2) * d_recip;\n  132 |         let y = (b.x * c_len2 - c.x * b_len2) * d_recip;\n  133 |         let r = (b_len2 * c_len2).sqrt() * (c - b).hypot() * d_recip;\n  134 | \n  135 |         Circle::new(self.a + Vec2::new(x, y), r)\n  136 |     }","lines":13,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/triangle.rs#L124-L136"},{"ref":"kurbo/src/triangle.rs:326-342","code":"  326 |     fn circumradius() {\n  327 |         let test = Triangle::EQUILATERAL;\n  328 |         let expected = 0.57735026918962576;\n  329 | \n  330 |         assert_approx_eq(\n  331 |             test.circumscribed_circle().radius,\n  332 |             expected,\n  333 |             f64::EPSILON * 100.,\n  334 |         );\n  335 |         // permute vertex\n  336 |         let test = Triangle::new(test.b, test.a, test.c);\n  337 |         assert_approx_eq(\n  338 |             test.circumscribed_circle().radius,\n  339 |             -expected,\n  340 |             f64::EPSILON * 100.,\n  341 |         );\n  342 |     }","lines":17,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/triangle.rs#L326-L342"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Triangle::inflate ignores the actual triangle shape: it builds a new triangle from the centroid using three fixed angles (straight up, 5*PI/4, 7*PI/4) at distance `scalar`. This always produces an isoceles triangle pointing up regardless of the input triangle, so for a non-isoceles or rotated triangle `inflate` does NOT expand the original by `scalar` in all directions - it replaces it with an unrelated fixed-orientation triangle scaled by scalar. The doc 'Expand the triangle by a constant amount in all directions' is inaccurate.","fix":"Offset each edge outward along its outward normal by `scalar` and recompute vertices as edge intersections, or at minimum fix the documentation to describe the actual behavior.","locations":[{"ref":"kurbo/src/triangle.rs:138-148","code":"  138 |     /// Expand the triangle by a constant amount (`scalar`) in all directions.\n  139 |     #[doc(alias = \"offset\")]\n  140 |     pub fn inflate(&self, scalar: f64) -> Self {\n  141 |         let centroid = self.centroid();\n  142 | \n  143 |         Self::new(\n  144 |             centroid + (0.0, scalar),\n  145 |             centroid + scalar * Vec2::from_angle(5.0 * FRAC_PI_4),\n  146 |             centroid + scalar * Vec2::from_angle(7.0 * FRAC_PI_4),\n  147 |         )\n  148 |     }","lines":11,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/triangle.rs#L138-L148"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Poly<N>::roots_between_with_buffer (macro version) never sorts its output, while it can push roots out of order. Critical points come back sorted from the derivative recursion, so roots found between consecutive critical points are normally increasing; however because there is no double-root recovery / sort (unlike cubic.rs which calls partial_sort), and because endpoints can include `lower` together with possibly-equal critical points, the returned roots are not guaranteed sorted. The cubic path explicitly sorts (cubic.rs:185-187) and the deg5 planted-root test asserts `roots.is_sorted()`, indicating sorted output is an expected contract that the generic path does not robustly guarantee.","fix":"Document that the generic roots_between does not guarantee sorting, or sort `out` before returning to match the cubic path and the test's `is_sorted()` expectation.","locations":[{"ref":"polycool/src/poly.rs:147-185","code":"  147 |             fn roots_between_with_buffer<const M: usize>(\n  148 |                 self,\n  149 |                 lower: f64,\n  150 |                 upper: f64,\n  151 |                 x_error: f64,\n  152 |                 out: &mut ArrayVec<f64, M>,\n  153 |                 scratch: &mut ArrayVec<f64, M>,\n  154 |             ) {\n  155 |                 let deriv = self.deriv();\n  156 |                 if !deriv.is_finite() {\n  157 |                     return;\n  158 |                 }\n  159 |                 deriv.roots_between_with_buffer(lower, upper, x_error, scratch, out);\n  160 |                 scratch.push(upper);\n  161 |                 out.clear();\n  162 |                 let mut last = lower;\n  163 |                 let mut last_val = self.eval(last);\n  164 | \n  165 |                 // `endpoint` now contains all the critical points (in increasing order)\n  166 |                 // and the upper endpoint of the interval. These are the endpoints\n  167 |                 // of the potential bracketing intervals of our polynomial.\n  168 |                 for &mut x in scratch {\n  169 |                     let val = self.eval(x);\n  170 |                     if $crate::different_signs(last_val, val) {\n  171 |                         out.push($crate::yuksel::find_root(\n  172 |                             |x| self.eval(x),\n  173 |                             |x| deriv.eval(x),\n  174 |                             last,\n  175 |                             x,\n  176 |                             last_val,\n  177 |                             val,\n  178 |                             x_error,\n  179 |                         ));\n  180 |                     }\n  181 | \n  182 |                     last = x;\n  183 |                     last_val = val;\n  184 |                 }\n  185 |             }","lines":39,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/poly.rs#L147-L185"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"PolyDyn::roots_between treats any polynomial of degree<=2 via to_quadratic().roots() and degree<=3 via to_cubic(), based on degree() which counts coefficient slots, not leading-zero detection. A PolyDyn constructed with a trailing-zero leading coefficient (e.g. coeffs [c,b,a,0.0]) reports degree 3 and goes through the cubic path with leading coeff 0, i.e. a degenerate cubic. The cubic critical_points computes a=3*0=0 and r0=q/a divides by zero -> infinity, relying on downstream filtering. While the quadratic/cubic solvers are written to tolerate a==0 (via copysign trick and inf filtering), feeding deliberately-degenerate leading coefficients is an under-tested path and the degree() doc explicitly warns it ignores zero values, so callers can hit the degenerate solver branches unexpectedly.","fix":"Strip trailing (high-degree) zero coefficients before dispatching, or document that degenerate leading-zero PolyDyn inputs route through the higher-degree solver and rely on its degeneracy handling.","locations":[{"ref":"polycool/src/poly_dyn.rs:99-128","code":"   99 |     pub fn degree(&self) -> usize {\n  100 |         self.coeffs.len().saturating_sub(1)\n  101 |     }\n  102 | \n  103 |     /// If this polynomial has degree 3 or less, converts it to a [cubic](crate::Cubic).\n  104 |     fn to_cubic(&self) -> Option<Cubic> {\n  105 |         if self.degree() <= 3 {\n  106 |             Some(Cubic::new([\n  107 |                 self.coeffs.first().copied().unwrap_or(0.0),\n  108 |                 self.coeffs.get(1).copied().unwrap_or(0.0),\n  109 |                 self.coeffs.get(2).copied().unwrap_or(0.0),\n  110 |                 self.coeffs.get(3).copied().unwrap_or(0.0),\n  111 |             ]))\n  112 |         } else {\n  113 |             None\n  114 |         }\n  115 |     }\n  116 | \n  117 |     /// If this polynomial has degree 2 or less, converts it to a [cubic](crate::Quadratic).\n  118 |     fn to_quadratic(&self) -> Option<Quadratic> {\n  119 |         if self.degree() <= 2 {\n  120 |             Some(Quadratic::new([\n  121 |                 self.coeffs.first().copied().unwrap_or(0.0),\n  122 |                 self.coeffs.get(1).copied().unwrap_or(0.0),\n  123 |                 self.coeffs.get(2).copied().unwrap_or(0.0),\n  124 |             ]))\n  125 |         } else {\n  126 |             None\n  127 |         }\n  128 |     }","lines":30,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/poly_dyn.rs#L99-L128"},{"ref":"polycool/src/poly_dyn.rs:167-174","code":"  167 |         if let Some(q) = self.to_quadratic() {\n  168 |             out.extend(q.roots().into_iter().filter(|&r| lower <= r && r <= upper));\n  169 |             return;\n  170 |         }\n  171 |         if let Some(c) = self.to_cubic() {\n  172 |             out.extend(c.roots_between(lower, upper, x_error));\n  173 |             return;\n  174 |         }","lines":8,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/poly_dyn.rs#L167-L174"},{"ref":"polycool/src/cubic.rs:72-90","code":"   72 |     fn critical_points(&self) -> Option<(f64, f64)> {\n   73 |         let a = 3.0 * self.coeffs[3];\n   74 |         let b_2 = self.coeffs[2];\n   75 |         let c = self.coeffs[1];\n   76 |         let disc_4 = b_2 * b_2 - a * c;\n   77 | \n   78 |         if !disc_4.is_finite() {\n   79 |             return self.rescaled_critical_points();\n   80 |         }\n   81 | \n   82 |         if disc_4 > 0.0 {\n   83 |             let q = -(b_2 + disc_4.sqrt().copysign(b_2));\n   84 |             let r0 = q / a;\n   85 |             let r1 = c / q;\n   86 |             Some((r0.min(r1), r0.max(r1)))\n   87 |         } else {\n   88 |             None\n   89 |         }\n   90 |     }","lines":19,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/cubic.rs#L72-L90"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Quadratic::roots() handles the disc==0.0 (double root) case but Quadratic::positive_discriminant_roots() (used by the cubic deflation path to find the remaining two roots) returns None for disc==0.0. A genuine double root of the deflated quadratic is therefore silently dropped. For a cubic like (x-1)^2(x-2), after finding root 2 and deflating, the quadratic (x-1)^2 has disc 0 and its double root x=1 is lost. This is partly intentional per the multiplicity caveat, but it means roots_between can miss a real, isolated double root that roots() would have found.","fix":"Decide deliberately: if double roots from deflation should be reported, handle disc==0.0 in positive_discriminant_roots (or have cubic deflation fall back to quad.roots()); otherwise document the omission clearly.","locations":[{"ref":"polycool/src/quadratic.rs:83-98","code":"   83 |     pub fn positive_discriminant_roots(&self) -> Option<(f64, f64)> {\n   84 |         let &[c, b, a] = self.coeffs();\n   85 |         let disc = b * b - 4.0 * a * c;\n   86 |         if disc.is_finite() {\n   87 |             if disc > 0.0 {\n   88 |                 let q = -0.5 * (b + disc.sqrt().copysign(b));\n   89 |                 let r0 = q / a;\n   90 |                 let r1 = c / q;\n   91 |                 Some((r0.min(r1), r0.max(r1)))\n   92 |             } else {\n   93 |                 None\n   94 |             }\n   95 |         } else {\n   96 |             self.positive_discriminant_roots_scaled()\n   97 |         }\n   98 |     }","lines":16,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/quadratic.rs#L83-L98"},{"ref":"polycool/src/cubic.rs:172-189","code":"  172 |             out.push(r);\n  173 |             let quad = self.deflate(r);\n  174 |             if let Some((x0, x1)) = quad.positive_discriminant_roots() {\n  175 |                 if lower <= x0 && x0 <= upper {\n  176 |                     out.push(x0);\n  177 |                 }\n  178 |                 if lower <= x1 && x1 <= upper {\n  179 |                     out.push(x1);\n  180 |                 }\n  181 | \n  182 |                 // `self.first_root` is supposed to return the smallest root in\n  183 |                 // our interval, but it's possible it doesn't because it misses\n  184 |                 // a double-root (or near-double-root).\n  185 |                 if lower <= x0 && x0 < r {\n  186 |                     partial_sort(out);\n  187 |                 }\n  188 |             }\n  189 |         }","lines":18,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/cubic.rs#L172-L189"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"yuksel::find_root only checks `val_lower`/`val_upper` for finiteness up front, and checks `x.is_finite()` in the loop guard, but does not guard against `deriv_x == 0.0` combined with `val_x != 0` producing `step = -val_x/deriv_x = +/-inf`. The infinite `new_x` is then clamped via `new_x <= lower || new_x >= upper` to the bisection midpoint, so it recovers - but only because of that branch. If `deriv_x` is 0 and the computed `new_x` via the infinity happens to fall inside (lower, upper) it cannot (inf is never < upper), so it is fine; however a NaN from 0/0 is impossible only because of the early `val_x == 0.0` return. This is fragile: the comment at line 45-47 claims returning early on zero makes step-NaN impossible, but `deriv_x` being a denormal-tiny nonzero with val_x finite can still make `step` a huge finite value - which is handled by clamping. Reviewed as correct but the invariant chain is subtle and undocumented for deriv_x==0.","fix":"Add an explicit comment/assertion documenting why deriv_x==0 (giving infinite step) is safe (clamped by the `new_x <= lower || new_x >= upper` branch), or handle deriv_x==0 explicitly with a bisection fallback.","locations":[{"ref":"polycool/src/yuksel.rs:34-77","code":"   34 |     while step.abs() > x_error && x.is_finite() {\n   35 |         // There's potentially a performance gain to be had by evaluating the\n   36 |         // derivative and the polynomial \"jointly\", so that subexpressions can\n   37 |         // be shared. At least for the cubic case, the compiler is smart enough\n   38 |         // to do that for us.\n   39 |         let deriv_x = deriv(x);\n   40 |         let val_x = f(x);\n   41 | \n   42 |         // By returning early on zero, we make it impossible for `step` to\n   43 |         // be NaN. This seems to benchmark a little better than checking for\n   44 |         // NaN after the fact.\n   45 |         if val_x == 0.0 {\n   46 |             return x;\n   47 |         }\n   48 |         let root_in_first_half = different_signs(val_lower, val_x);\n   49 |         if r t that a non-finite transform yields a non-finite/invalid bbox, or guard against it.","locations":[{"ref":"kurbo/src/affine.rs:445-451","code":"  445 |     pub fn transform_rect_bbox(self, rect: Rect) -> Rect {\n  446 |         let p00 = self * Point::new(rect.x0, rect.y0);\n  447 |         let p01 = self * Point::new(rect.x0, rect.y1);\n  448 |         let p10 = self * Point::new(rect.x1, rect.y0);\n  449 |         let p11 = self * Point::new(rect.x1, rect.y1);\n  450 |         Rect::from_points(p00, p01).union(Rect::from_points(p10, p11))\n  451 |     }","lines":7,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/affine.rs#L445-L451"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Arc bounding_box, winding, and perimeter all hardcode path_segments(0.1) as the tolerance for the bezier approximation, ignoring any accuracy the caller passes (perimeter takes `accuracy` but uses 0.1 for the segmentation and only passes accuracy to the segment-length integrator). bounding_box thus has up to ~0.1 absolute error and is not tight; winding near the boundary can be wrong by the approximation error.","fix":"Derive the segmentation tolerance from the requested accuracy (or from the bounding box scale) rather than a fixed 0.1, and document the approximation error.","locations":[{"ref":"kurbo/src/arc.rs:213-227","code":"  213 |     #[inline]\n  214 |     fn perimeter(&self, accuracy: f64) -> f64 {\n  215 |         self.path_segments(0.1).perimeter(accuracy)\n  216 |     }\n  217 | \n  218 |     /// Note: shape isn't closed, so a point's winding number is not well defined.\n  219 |     #[inline]\n  220 |     fn winding(&self, pt: Point) -> i32 {\n  221 |         self.path_segments(0.1).winding(pt)\n  222 |     }\n  223 | \n  224 |     #[inline]\n  225 |     fn bounding_box(&self) -> Rect {\n  226 |         self.path_segments(0.1).bounding_box()\n  227 |     }","lines":15,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/arc.rs#L213-L227"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"CircleSegment::perimeter omits the absolute value on the arc-length term. With ro/ri possibly swapped (inner_radius > outer_radius, which area/winding explicitly support) the radial-edge term uses |ro - ri| but the arc term `sweep_angle * (ri + ro)` is fine in magnitude; however combined with the negative-sweep issue the result can be negative. A perimeter should never be negative.","fix":"Return `2.0 * (outer_radius - inner_radius).abs() + sweep_angle.abs() * (inner_radius + outer_radius)`.","locations":[{"ref":"kurbo/src/circle.rs:355-359","code":"  355 |     #[inline]\n  356 |     fn perimeter(&self, _accuracy: f64) -> f64 {\n  357 |         2.0 * (self.outer_radius - self.inner_radius).abs()\n  358 |             + self.sweep_angle * (self.inner_radius + self.outer_radius)\n  359 |     }","lines":5,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/circle.rs#L355-L359"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"solve_quadratic's near-linear fallback computes `root = -c0 / c1` only after dividing by c2. If c2 is tiny-but-finite such that sc0/sc1 are finite, the quadratic branch runs; but if sc0 or sc1 is non-finite due to c2==0 it falls back to the linear solve. When c1 is also 0 but c0 != 0 (no solution), `-c0/c1` is +/-inf (non-finite) and c0==0&&c1==0 is false, so nothing is pushed - correct. However when c0 is finite and c1 is subnormal-zero giving inf, the same path returns empty silently. This is acceptable but the degenerate handling treats `c0==0 && c1==0` as 'all x are roots' returning a single 0.0, which is an arbitrary convention that callers may not expect; it is only documented, not signalled.","fix":"No n {\n  413 |                         c.p1 -= (dimension / d01h) * d01;\n  414 |                     }\n  415 |                     if d23h > 2.0 * dimension {\n  416 |                         c.p2 += (dimension / d23h) * d23;\n  417 |                     }\n  418 |                 }","lines":14,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/cubicbez.rs#L405-L418"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"CubicBez::detect_cusp shadows the local `d` (let d = q.eval(nearest.t)) with another `let d = b*b - 4.*a*c` inside the same scope. The first `d` is a Point used at lines 444-446; the second `d` (discriminant) at line 451 reuses the name. This is legal Rust shadowing and not a bug, but the reuse of `d` for two unrelated quantities in a numerically delicate routine is a readability/maintenance hazard that could easily lead to a future copy-paste error.","fix":"Rename the discriminant variable (e.g. `disc`) to avoid shadowing the evaluated point `d`.","locations":[{"ref":"kurbo/src/cubicbez.rs:444-451","code":"  444 |             let d = q.eval(nearest.t);\n  445 |             let d2 = q.deriv().eval(nearest.t);\n  446 |             let cross = d.to_vec2().cross(d2.to_vec2());\n  447 |             if nearest.distance_sq.powi(3) <= (cross * dimension).powi(2) {\n  448 |                 let a = 3. * det_012 + det_023 - 2. * det_013;\n  449 |                 let b = -3. * det_012 + det_013;\n  450 |                 let c = det_012;\n  451 |                 let d = b * b - 4. * a * c;","lines":8,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/cubicbez.rs#L444-L451"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ToQuads::size_hint returns (self.n - self.i, ...). next() increments self.i up to self.n and returns None when i==n, so n-i is  |         path.curve_to(c.p1, c.p2, c.p3);\n  199 |         return;\n  200 |     } else {\n  201 |         // A smarter approach is possible than midpoint subdivision, but would be\n  202 |         // a significant increase in complexity.\n  203 |         0.5 * (start + end)\n  204 |     };\n  205 |     if t == start || t == end {\n  206 |         // infinite recursion, just draw a line\n  207 |         let p1 = start_p.lerp(end_p, 1.0 / 3.0);\n  208 |         let p2 = end_p.lerp(start_p, 1.0 / 3.0);\n  209 |         if path.is_empty() {\n  210 |             path.move_to(start_p);\n  211 |         }\n  212 |         path.curve_to(p1, p2, end_p);\n  213 |         return;\n  214 |     }","lines":23,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/fit.rs#L192-L214"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Line::crossing_point` only returns `None` when the cross product is exactly `0.0`. For nearly-parallel (but not exactly parallel) lines the division `ab.cross(...) / pcd` produces a finite but astronomically large coordinate rather than `None`, and for collinear-overlapping lines (also `pcd == 0`) it returns `None` even though infinitely many crossing points exist. The exact `== 0.0` test is fragile for floating-point inputs.","fix":"Document the near-parallel behavior, and/or consider returning `None` based on a relative-magnitude threshold; note that collinear overlap also returns `None`.","locations":[{"ref":"kurbo/src/line.rs:64-74","code":"   64 |     /// Computes the point where two lines, if extended to infinity, would cross.\n   65 |     pub fn crossing_point(self, other: Line) -> Option<Point> {\n   66 |         let ab = self.p1 - self.p0;\n   67 |         let cd = other.p1 - other.p0;\n   68 |         let pcd = ab.cross(cd);\n   69 |         if pcd == 0.0 {\n   70 |             return None;\n   71 |         }\n   72 |         let h = ab.cross(self.p0 - other.p0) / pcd;\n   73 |         Some(other.p0 + cd * h)\n   74 |     }","lines":11,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/line.rs#L64-L74"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The final subdivision selects the best of four recursive results via `min_by(... partial_cmp().unwrap_or(Ordering::Less))`. If a recursive distance is NaN, partial_cmp returns None and unwrap_or(Ordering::Less) treats the NaN candidate as the smaller, so a NaN distance can be propagated as the minimum, masking a real numeric failure rather than ignoring it.","fix":"Use total_cmp on the distance, or explicitly skip NaN candidates, so a NaN never wins the minimum.","locations":[{"ref":"kurbo/src/mindist.rs:160-164","code":"  160 |     *results\n  161 |         .iter()\n  162 |         .min_by(|a, b| a.0.partial_cmp(&b.0).unwrap_or(Ordering::Less))\n  163 |         .unwrap()\n  164 | }","lines":5,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/mindist.rs#L160-L164"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`offset_cubic` computes the endpoint cusp values and the unit tangents from the *original* `c` (and `co` built from the regularized curve), but mixes them: `utan0`/`utan1` and the initial `move_to` are derived from the unregularized `c` via `PathSeg::Cubic(c).tangents()` while `cusp0`/`cusp1` use `co` (regularized) coefficients. The first emitted point is `c.p0 + d * utan0.turn_90()` using the original p0 but a regularized-curve-consistent recursion follows from `co`. For a curve whose endpoints were perturbed by regularization this is a small inconsistency between the move-to point and the recursive approximation's first control geometry. Likely negligible in practice (regularization only perturbs interior near-cusps) e, but combined with the `debug_assert!(sum_of_sq != 0.0)` at line 463: if `is_straight_line` were ever bypassed (e.g. radii exactly at the 1e-5 boundary with degenerate p), `sum_of_sq` could be zero leading to division producing NaN/inf in transformed_cx/cy. The guard relies entirely on `is_straight_line` matching the zero condition exactly; this coupling is non-obvious and only enforced by a debug assert, so release builds can silently produce NaN center coordinates if the conditions ever diverge.","fix":"Either return None when `sum_of_sq == 0.0` at runtime (not just debug_assert), or document the exact invariant linking `is_straight_line` to non-zero `sum_of_sq`.","locations":[{"ref":"kurbo/src/svg.rs:410-417","code":"  410 | impl SvgArc {\n  411 |     /// Checks that arc is actually a straight line.\n  412 |     ///\n  413 |     /// In this case, it can be replaced with a `LineTo`.\n  414 |     pub fn is_straight_line(&self) -> bool {\n  415 |         self.radii.x.abs() <= 1e-5 || self.radii.y.abs() <= 1e-5 || self.from == self.to\n  416 |     }\n  417 | }","lines":8,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/svg.rs#L410-L417"},{"ref":"kurbo/src/svg.rs:458-473","code":"  458 |         let rxry = rx * ry;\n  459 |         let rxpy = rx * p.y;\n  460 |         let rypx = ry * p.x;\n  461 |         let sum_of_sq = rxpy * rxpy + rypx * rypx;\n  462 | \n  463 |         debug_assert!(sum_of_sq != 0.0);\n  464 | \n  465 |         // F6.5.2\n  466 |         let sign_coe = if arc.large_arc == arc.sweep {\n  467 |             -1.0\n  468 |         } else {\n  469 |             1.0\n  470 |         };\n  471 |         let coe = sign_coe * ((rxry * rxry - sum_of_sq) / sum_of_sq).abs().sqrt();\n  472 |         let transformed_cx = coe * rxpy / ry;\n  473 |         let transformed_cy = -coe * rypx / rx;","lines":16,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/svg.rs#L458-L473"}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`TranslateScale::inverse` computes `scale.recip()` and documents 'Produces NaN values when scale is zero.' With scale = 0, `recip()` is +inf (not NaN), and `translation * -inf` yields inf/NaN per component. The actual output is infinities, not strictly NaN, so the doc is slightly inaccurate about what is produced.","fix":"Reword the doc to 'Produces non-finite (infinite or NaN) values when scale is zero.'","locations":[{"ref":"kurbo/src/translate_scale.rs:96-110","code":"   96 |     /// Compute the inverse transform.\n   97 |     ///\n   98 |     /// Multiplying a transform with its inverse (either on the\n   99 |     /// left or right) results in the identity transform\n  100 |     /// (modulo floating point rounding errors).\n  101 |     ///\n  102 |     /// Produces NaN values when scale is zero.\n  103 |     #[inline]\n  104 |     pub fn inverse(self) -> TranslateScale {\n  105 |         let scale_recip = self.scale.recip();\n  106 |         TranslateScale {\n  107 |             translation: self.translation * -scale_recip,\n  108 |             scale: scale_recip,\n  109 |         }\n  110 |     }","lines":15,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/translate_scale.rs#L96-L110"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Triangle::inscribed_circle radius = 2 * area * perimeter_recip uses signed area (Triangle::area returns a signed cross product). For a clockwise-ordered triangle area is negative, yielding a negative inradius. The inscribed_circle test uses a counter-clockwise triangle so it passes, but reversed winding produces a negative radius.","fix":"Use self.area().abs() when computing the inradius.","locations":[{"ref":"kurbo/src/triangle.rs:105-117","code":"  105 |     pub fn inscribed_circle(&self) -> Circle {\n  106 |         let ab = self.a.distance(self.b);\n  107 |         let bc = self.b.distance(self.c);\n  108 |         let ac = self.a.distance(self.c);\n  109 | \n  110 |         // [`Vec2::div`] also multiplies by the reciprocal of the argument, but as this reciprocal\n  111 |         // is reused below to calculate the radius, there's explicitly only one division needed.\n  112 |         let perimeter_recip = 1. / (ab + bc + ac);\n  113 |         let incenter = (self.a.to_vec2() * bc + self.b.to_vec2() * ac + self.c.to_vec2() * ab)\n  114 |             * perimeter_recip;\n  115 | \n  116 |         Circle::new(incenter.to_point(), 2.0 * self.area() * perimeter_recip)\n  117 |     }","lines":13,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/triangle.rs#L105-L117"},{"ref":"kurbo/src/triangle.rs:88-91","code":"   88 |     #[inline]\n   89 |     pub fn area(&self) -> f64 {\n   90 |         0.5 * (self.b - self.a).cross(self.c - self.a)\n   91 |     }","lines":4,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/triangle.rs#L88-L91"}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Triangle::winding uses signum() of three cross products and returns s0 only if s0 == s1 == s2. signum() of exactly 0.0 returns 0.0 (point exactly on an edge), and signum of -0.0 returns -0.0; a point lying exactly on a vertex/edge yields a 0 cross product so the three signs won't all match and winding returns 0, even though the point is on the boundary. More subtly, signum(NaN) is NaN; a NaN coordinate yields a meaningless comparison. Edge points being 'outside' is a defensible convention but inconsistent with other shapes (e.g. RoundedRect winding treats boundary as inside via <=).","fix":"Decide and document boundary convention; consider treating zero cross products (on-edge) consistently with the rest of the crate.","locations":[{"ref":"kurbo/src/triangle.rs:217-224","code":"  217 |     #[inline]\n  218 |     fn winding(&self, pt: Point) -> i32 {\n  219 |         let s0 = (self.b - self.a).cross(pt - self.a).signum();\n  220 |         let s1 = (self.c - self.b).cross(pt - self.b).signum();\n  221 |         let s2 = (self.a - self.c).cross(pt - self.c).signum();\n  222 | \n  223 |         if s0 == s1 && s1 == s2 { s0 as i32 } else { 0 }\n  224 |     }","lines":8,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/triangle.rs#L217-L224"}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"poly_with_planted_root multiplies in (N-1) linear factors total: one initial `mul` plus `(N-3)` in the loop, giving N-2 root factors on top of the planted root for a Poly<N> (degree N-1). For N==2 (degree 1) the loop range `0..(N-3)` underflows? No - it is `0..(N-3)` with usize; for N==2, N-3 underflows to a huge usize causing a near-infinite loop / panic in debug. The function asserts N>=2 but N>=2 is insufficient: with N==2 the initial unconditional `mul` already adds a second factor (making degree 2, exceeding the Poly<2> capacity write? coeffs has len 2) and `(N-3)` wraps. Only N>=3 is actually safe.","fix":"Change the assertion to `assert!(N >= 3)`, or compute the loop count with saturating_sub and guard the initial mul, so N==2 cannot underflow the `0..(N-3)` range.","locations":[{"ref":"polycool/src/arbitrary.rs:106-129","code":"  106 | pub fn poly_with_planted_root<const N: usize>(\n  107 |     u: &mut Unstructured<'_>,\n  108 |     root: f64,\n  109 |     buffer: f64,\n  110 | ) -> Result<Poly<N>, arbitrary::Error> {\n  111 |     assert!(N >= 2, \"N is below 2\");\n  112 | \n  113 |     // Generate the roots, with a bias towards roots being almost-repeated.\n  114 |     let mut coeffs = [0.0; N];\n  115 |     coeffs[1] = 1.0;\n  116 |     coeffs[0] = -root;\n  117 | \n  118 |     let mut r = finite_float(u)?;\n  119 |     if (r - root).abs() < buffer {\n  120 |         return Err(arbitrary::Error::IncorrectFormat);\n  121 |     }\n  122 |     mul(&mut coeffs, r);\n  123 |     for _ in 0..(N - 3) {\n  124 |         r = another_finite_float(r, u)?;\n  125 |         if (r - root).abs() < buffer {\n  126 |             return Err(arbitrary::Error::IncorrectFormat);\n  127 |         }\n  128 |         mul(&mut coeffs, r);\n  129 |     }","lines":24,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/arbitrary.rs#L106-L129"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`from_svg` returns `UninitializedPath` only when a non-moveto command is seen while `path.elements().is_empty()`. But after a 'z'/'Z' that sets `implicit_moveto = Some(first_pt)` (line 238) with `first_pt` defaulting to `Point::ORIGIN` if 'z' is somehow the first effective command, a subsequent draw command could implicitly move_to ORIGIN. In normal input 'z' cannot be first (it would hit the is_empty check), so this is guarded; flagged to confirm `first_pt` cannot be used uninitialized. It cannot in current flow.","fix":"No change needed; the is_empty guard prevents reaching the draw path before a MoveTo. Confirmed safe.","locations":[{"ref":"kurbo/src/svg.rs:103-119","code":"  103 |     pub fn from_svg(data: &str) -> Result<BezPath, SvgParseError> {\n  104 |         let mut lexer = SvgLexer::new(data);\n  105 |         let mut path = BezPath::new();\n  106 |         let mut last_cmd = 0;\n  107 |         let mut last_ctrl = None;\n  108 |         let mut first_pt = Point::ORIGIN;\n  109 |         let mut implicit_moveto = None;\n  110 |         while let Some(c) = lexer.get_cmd(last_cmd) {\n  111 |             if c != b'm' && c != b'M' {\n  112 |                 if path.elements().is_empty() {\n  113 |                     return Err(SvgParseError::UninitializedPath);\n  114 |                 }\n  115 | \n  116 |                 if let Some(pt) = implicit_moveto.take() {\n  117 |                     path.move_to(pt);\n  118 |                 }\n  119 |             }","lines":17,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/svg.rs#L103-L119"},{"ref":"kurbo/src/svg.rs:235-239","code":"  235 |                 b'z' | b'Z' => {\n  236 |                     path.close_path();\n  237 |                     lexer.last_pt = first_pt;\n  238 |                     implicit_moveto = Some(first_pt);\n  239 |                 }","lines":5,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/svg.rs#L235-L239"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`get_cmd` only treats a following number (implicit repeat of the previous command) as plausible when it starts with '-', '.', or a digit. A leading '+' (a valid SVG number sign, accepted by `get_number` at line 331) is not recognized, so e.g. `L10 10 +5 +5` stops parsing the implicit second coordinate pair and silently truncates the path instead of continuing.","fix":"Add `|| c == b'+'` to the plausible-number-start check on line 305.","locations":[{"ref":"kurbo/src/svg.rs:300-314","code":"  300 |     fn get_cmd(&mut self, last_cmd: u8) -> Option<u8> {\n  301 |         self.skip_ws();\n  302 |         if let Some(c) = self.get_byte() {\n  303 |             if c.is_ascii_lowercase() || c.is_ascii_uppercase() {\n  304 |                 return Some(c);\n  305 |             } else if last_cmd != 0 && (c == b'-' || c == b'.' || c.is_ascii_digit()) {\n  306 |                 // Plausible number start\n  307 |                 self.unget();\n  308 |                 return Some(last_cmd);\n  309 |             } else {\n  310 |                 self.unget();\n  311 |             }\n  312 |         }\n  313 |         None\n  314 |     }","lines":15,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/svg.rs#L300-L314"},{"ref":"kurbo/src/svg.rs:331","code":"  331 |         if !(c == b'-' || c == b'+') {","lines":1,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/svg.rs#L331"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"quadratic.rs roots() rescaling: when disc is non-finite and self.is_finite() it rescales by 2^-515 and recurses. But if a==0 (linear) and b,c are large, disc=b*b is finite-or-inf; the rescale path handles inf. However for the disc==0.0 linear/degenerate fallback, `root = -0.5*b/a` with a==0 gives +/-inf or NaN; the code only pushes 0.0 when c==0.0. A genuine linear equation (a==0, b!=0) presented as a 'quadratic' yields no root from this branch because disc=b*b>0 takes the disc>0 path where r1=c/q is the valid linear root and r0=q/a is inf (filtered) - so it works, but only via the >0 branch. The disc==0 a==0 c!=0 case (e.g. coeffs [c,0,0], i.e. constant nonzero) silently returns no roots which is correct, but constant-zero [0,0,0] returns root 0.0, an arbitrary choice flagged in the comment. Confirm callers expect this.","fix":"No change required if the documented kurbo-compatible behavior is intended; otherwise distinguish true-degenerate (no/all roots) from numeric-underflow cases explicitly.","locations":[{"ref":"polycool/src/quadratic.rs:42-56","code":"   42 |             } else if disc == 0.0 {\n   43 |                 let root = -0.5 * b / a;\n   44 |                 if root.is_finite() {\n   45 |                     push(root);\n   46 |                 } else if c == 0.0 {\n   47 |                     // This is kurbo's behavior: the intention is that if the\n   48 |                     // whole thing is zero, return zero as a single root. I'm\n   49 |                     // not sure I love it.\n   50 |                     //\n   51 |                     // Bear in mind that this branch is not *only* for the\n   52 |                     // identically zero case: if a == c == 0.0 and b * b\n   53 |                     // underflows then we will end up here. In that case,\n   54 |                     // zero is the only root.\n   55 |                     push(0.0);\n   56 |                 }","lines":15,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/quadratic.rs#L42-L56"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`BezPath::get_seg` handling of `ClosePath` does a reverse linear scan `self.0[..ix].iter().rev().find_map(...)` to locate the subpath start. Calling `get_seg` repeatedly over a path (the documented random-access use case) makes the overall cost O(n^2). The doc only warns about O(n) for ClosePath segments but the quadratic aggregate cost when iterating is not noted.","fix":"Document the O(n) per-ClosePath cost prominently, and steer users to `segments()` for full iteration (which is already O(n) total).","locations":[{"ref":"kurbo/src/bezpath.rs:326-349","code":"  326 |     pub fn get_seg(&self, ix: usize) -> Option<PathSeg> {\n  327 |         if ix == 0 || ix >= self.0.len() {\n  328 |             return None;\n  329 |         }\n  330 |         let last = match self.0[ix - 1] {\n  331 |             PathEl::MoveTo(p) => p,\n  332 |             PathEl::LineTo(p) => p,\n  333 |             PathEl::QuadTo(_, p2) => p2,\n  334 |             PathEl::CurveTo(_, _, p3) => p3,\n  335 |             PathEl::ClosePath => return None,\n  336 |         };\n  337 |         match self.0[ix] {\n  338 |             PathEl::LineTo(p) => Some(PathSeg::Line(Line::new(last, p))),\n  339 |             PathEl::QuadTo(p1, p2) => Some(PathSeg::Quad(QuadBez::new(last, p1, p2))),\n  340 |             PathEl::CurveTo(p1, p2, p3) => Some(PathSeg::Cubic(CubicBez::new(last, p1, p2, p3))),\n  341 |             PathEl::ClosePath => self.0[..ix].iter().rev().find_map(|el| match *el {\n  342 |                 PathEl::MoveTo(start) if start != last => {\n  343 |                     Some(PathSeg::Line(Line::new(last, start)))\n  344 |                 }\n  345 |                 _ => None,\n  346 |             }),\n  347 |             PathEl::MoveTo(_) => None,\n  348 |         }\n  349 |     }","lines":24,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/bezpath.rs#L326-L349"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"CubicBez::subsegment calls self.deriv() then evaluates the derivative quad at both t0 and t1 (two QuadBez::eval calls), plus two CubicBez::eval calls for endpoints. ToQuads::next calls subsegment for every quad, so per quad this recomputes the full deriv each time. For curves split into many quads this is repeated work; deriv() is cheap but eval of the cubic at endpoints could reuse shared subdivision. Minor, but noted as the hot path for to_quads/flattening.","fix":"If profiling shows this hot, compute parameters() once and evaluate position+tangent together, avoiding the separate deriv() construction per call.","locations":[{"ref":"kurbo/src/cubicbez.rs:559-568","code":"  559 |     fn subsegment(&self, range: Range<f64>) -> CubicBez {\n  560 |         let (t0, t1) = (range.start, range.end);\n  561 |         let p0 = self.eval(t0);\n  562 |         let p3 = self.eval(t1);\n  563 |         let d = self.deriv();\n  564 |         let scale = (t1 - t0) * (1.0 / 3.0);\n  565 |         let p1 = p0 + scale * d.eval(t0).to_vec2();\n  566 |         let p2 = p3 - scale * d.eval(t1).to_vec2();\n  567 |         CubicBez { p0, p1, p2, p3 }\n  568 |     }","lines":10,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/cubicbez.rs#L559-L568"},{"ref":"kurbo/src/cubicbez.rs:784-797","code":"  784 |     #[inline]\n  785 |     fn next(&mut self) -> Option<(f64, f64, QuadBez)> {\n  786 |         if self.i == self.n {\n  787 |             return None;\n  788 |         }\n  789 |         let t0 = self.i as f64 / self.n as f64;\n  790 |         let t1 = (self.i + 1) as f64 / self.n as f64;\n  791 |         let seg = self.c.subsegment(t0..t1);\n  792 |         let p1x2 = 3.0 * seg.p1.to_vec2() - seg.p0.to_vec2();\n  793 |         let p2x2 = 3.0 * seg.p2.to_vec2() - seg.p3.to_vec2();\n  794 |         let result = QuadBez::new(seg.p0, ((p1x2 + p2x2) / 4.0).to_point(), seg.p3);\n  795 |         self.i += 1;\n  796 |         Some((t0, t1, result))\n  797 |     }","lines":14,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/cubicbez.rs#L784-L797"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Ellipse's getters major_radius, minor_radius, rotation, radii each call self.inner.svd() independently. Code paths that need several of these (e.g. with_radii calls svd for rotation, with_rotation calls svd for scale, path_elements calls svd) recompute the SVD repeatedly. radii_and_rotation exists precisely to avoid this but the individual getters do not use it. Each svd involves trig/sqrt work.","fix":"Where multiple components are needed in one function, call radii_and_rotation() once; consider caching is out of scope but the internal callers can be tightened.","locations":[{"ref":"kurbo/src/ellipse.rs:126-162","code":"  126 |     #[inline]\n  127 |     pub fn radii(&self) -> Vec2 {\n  128 |         self.inner.svd().0\n  129 |     }\n  130 | \n  131 |     /// Returns the major radius of this ellipse.\n  132 |     ///\n  133 |     /// This metric is also known as the semi-major axis.\n  134 |     #[inline]\n  135 |     pub fn major_radius(&self) -> f64 {\n  136 |         self.inner.svd().0.x\n  137 |     }\n  138 | \n  139 |     /// Returns the minor radius of this ellipse.\n  140 |     ///\n  141 |     /// This metric is also known as the semi-minor axis.\n  142 |     #[inline]\n  143 |     pub fn minor_radius(&self) -> f64 {\n  144 |         self.inner.svd().0.y\n  145 |     }\n  146 | \n  147 |     /// The ellipse's rotation, in radians.\n  148 |     ///\n  149 |     /// This allows all possible ellipses to be drawn by always starting with\n  150 |     /// an ellipse with the two radii on the x and y axes.\n  151 |     #[inline]\n  152 |     pub fn rotation(&self) -> f64 {\n  153 |         self.inner.svd().1\n  154 |     }\n  155 | \n  156 |     /// Returns the radii and the rotation of this ellipse.\n  157 |     ///\n  158 |     /// Equivalent to `(self.radii(), self.rotation())` but more efficient.\n  159 |     #[inline]\n  160 |     pub fn radii_and_rotation(&self) -> (Vec2, f64) {\n  161 |         self.inner.svd()\n  162 |     }","lines":37,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/ellipse.rs#L126-L162"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`do_close_path` in expand.rs ends with `self.last_n = None;` but every other reset path (re-`MoveTo`) relies on this. Separately, `expand_path` calls `segments(close_subpaths(path.path_elements(tolerance))).area()` which fully materializes and walks the entire path once just to compute the sign, then `expand_path_signed` walks `path.path_elements(tolerance)` a second time. For large paths this doubles tessellation/iteration cost. Not a correctness bug, but the path is flattened twice.","fix":"If the `Shape` is cheap to re-iterate this is acceptable; otherwise collect elements once into a buffer and reuse for both the area sign and the expansion pass.","locations":[{"ref":"kurbo/src/expand.rs:127-138","code":"  127 | pub fn expand_path(\n  128 |     path: impl Shape,\n  129 |     mut r_delta(source, x, accuracy, t0..t1, n);\n  624 |     let k1 = 0.2 / accuracy;\n  625 |     let ya = -err;\n  626 |     let yb = accuracy - last_err;\n  627 |     let (_, x) = match solve_itp_fallible(f, 0.0, accuracy, EPS, 1, k1, ya, yb) {\n  628 |         Ok(x) => x,\n  629 |         Err(t) => return Some(t),\n  630 |     };\n  631 |     //println!(\"got fit with n={}, err={}\", n, x);\n  632 |     let path_len = path.elements().len();\n  633 |     for i in 0..n {\n  634 |         let t1 = if i < n - 1 {\n  635 |             match fit_opt_segment(source, x, t0..range.end) {\n  636 |                 FitResult::ParamVal(t1) => t1,\n  637 |                 FitResult::SegmentError(_) => range.end,\n  638 |                 FitResult::CuspFound(t) => {\n  639 |                     path.truncate(path_len);\n  640 |                     return Some(t);\n  641 |                 }\n  642 |             }\n  643 |         } else {\n  644 |             range.end\n  645 |         };\n  646 |         let (c, _) = fit_to_cubic(source, t0..t1, accuracy).unwrap();\n  647 |         if i == 0 && range.start == 0.0 {\n  648 |             path.move_to(c.p0);\n  649 |         }\n  650 |         path.curve_to(c.p1, c.p2, c.p3);\n  651 |         t0 = t1;\n  652 |         if t0 == range.end {\n  653 |             // This is unlikely but could happen when not monotonic.\n  654 |             break;\n  655 |         }\n  656 |     }\n  657 |     None","lines":51,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/fit.rs#L607-L657"},{"ref":"kurbo/src/fit.rs:700-719","code":"  700 | fn fit_opt_err_delta(\n  701 |     source: &impl ParamCurveFit,\n  702 |     accuracy: f64,\n  703 |     limit: f64,\n  704 |     range: Range<f64>,\n  705 |     n: usize,\n  706 | ) -> Result<f64, f64> {\n  707 |     let (mut t0, t1) = (range.start, range.end);\n  708 |     for _ in 0..n - 1 {\n  709 |         t0 = match fit_opt_segment(source, accuracy, t0..t1) {\n  710 |             FitResult::ParamVal(t0) => t0,\n  711 |             // In this case, n - 1 will work, which of course means the error is highly\n  712 |             // non-monotonic. We should probably harvest that solution.\n  713 |             FitResult::SegmentError(_) => return Ok(accuracy),\n  714 |             FitResult::CuspFound(t) => return Err(t),\n  715 |         }\n  716 |     }\n  717 |     let err = measure_one_seg(source, t0..t1, limit).unwrap_or(accuracy * 2.0);\n  718 |     Ok(accuracy - err)\n  719 | }","lines":20,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/fit.rs#L700-L719"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"min_dist_param recomputes D_rk (which itself calls A_r and C_rk, each looping with repeated choose() calls) many times: once in the alpha svalues via S, then a full (2n)x(2m) grid in Property one, then again a full grid in Property two re-calling D_rk(i,j) plus four extra D_rk calls per cell for the boundary references. For cubics this is a large amount of redundant recomputation of identical D_rk values and binomial coefficients on every recursion level.","fix":"Cache the D_rk grid (and choose() values) once per invocation in a small array and reuse it across Property one and Property two instead of recomputing per access.","locations":[{"ref":"kurbo/src/mindist.rs:65-106","code":"   65 |     for r in 0..(2 * n) {\n   66 |         for k in 0..(2 * m) {\n   67 |             let d_rk = D_rk(r, k, bez1, bez2);\n   68 |             if d_rk < alpha {\n   69 |                 is_outside = false;\n   70 |             }\n   71 |             if min_drk.is_none() || Some(d_rk) < min_drk {\n   72 |                 min_drk = Some(d_rk);\n   73 |                 min_ij = Some((r, k));\n   74 |             }\n   75 |         }\n   76 |     }\n   77 |     if is_outside {\n   78 |         return (alpha, umid, vmid);\n   79 | f64) -> f64 {\n   81 |         let mut ret = 0.0;\n   82 |         let mut x_pow = 1.0;\n   83 |         for &c in &self.coeffs {\n   84 |             ret += c * x_pow;\n   85 |             x_pow *= x;\n   86 |         }\n   87 |         ret\n   88 |     }","lines":10,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/poly_dyn.rs#L79-L88"},{"ref":"polycool/src/poly.rs:60-68","code":"   60 |     pub fn eval(&self, x: f64) -> f64 {\n   61 |         let mut acc = 0.0;\n   62 |         for c in self.coeffs.iter().rev() {\n   63 |             // It would be nice to use `f64::mul_add` here, but it's slow on\n   64 |             // architectures that don't have a dedicated instruction.\n   65 |             acc = acc * x + c;\n   66 |         }\n   67 |         acc\n   68 |     }","lines":9,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/polycool/src/poly.rs#L60-L68"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Affine::spectral_norm` calls `self.svd().0.x`, computing the full SVD (including the rotation angle via `atan2` and both singular values) only to discard everything but the larger singular value. The code comment at the top of `svd` notes `#[inline(always)]` is meant to let the compiler eliminate dead code, but `atan2` and the second singular-value branch are not obviously dead-code-eliminable, so `spectral_norm` may do substantially more work than needed.","fix":"Provide a dedicated spectral-norm path computing only `0.5 * (s1 + s2)` (max singular value) without the angle, if profiling shows the DCE does not fire.","locations":[{"ref":"kurbo/src/affine.rs:414-421","code":"  414 |     #[inline]\n  415 |     pub fn spectral_norm(self) -> f64 {\n  416 |         // Note a different calculation, returning the `_squared` form like our nuclear and\n  417 |         // Frobenius norms, could be `0.5 (frob^2 + sqrt(frob^4 - 4 det^2))`. In terms of operations\n  418 |         // it's a wash: one fewer sqrt if the user actually wants the squared form, but it uses more\n  419 |         // muls. More importantly, that form has worse numeric conditioning.\n  420 |         self.svd().0.x\n  421 |     }","lines":8,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/affine.rs#L414-L421"},{"ref":"kurbo/src/affine.rs:506-559","code":"  506 |     #[inline(always)]\n  507 |     pub(crate) fn svd(self) -> (Vec2, f64) {\n  508 |         let [a, b, c, d, _, _] = self.0;\n  509 |         let a2 = a * a;\n  510 |         let b2 = b * b;\n  511 |         let c2 = c * c;\n  512 |         let d2 = d * d;\n  513 |         let ab = a * b;\n  514 |         let cd = c * d;\n  515 |         let angle = 0.5 * (2.0 * (ab + cd)).atan2(a2 - b2 + c2 - d2);\n  516 | \n  517 |         // Given matrix A = [ a c ]\n  518 |         //                  [ b d ]\n  519 |         //\n  520 |         // The two singular values σ1, σ2 of A are the square roots of the two eigen values λ1, λ2\n  521 |         // of M = A^T A. The common formula for 2x2 eigenvalues requires evaluating a square root,\n  522 |         // but we'd like to compute the singular values of the matrix without nested square roots.\n  523 |         //\n  524 |         // M = A^T A = [ aa+cc   ab+cd ]\n  525 |         //             [ ab+cd   bb+dd ]\n  526 |         //\n  527 |         // We have\n  528 |         // λ = 1/2 (tr(M) ± sqrt(tr(M)^2 - 4 det(M))).\n  529 |         //\n  530 |         // Note det(M) = det(A^T A) = det(A)^2.\n  531 |         // => 2λ = tr(M) ± sqrt(tr(M)^2 - 4 det(A)^2)\n  532 |         // => 2λ = tr(M) ± sqrt[(a^2+b^2+c^2+d^2)^2 - 4 (ad-bc)^2]\n  533 |         // By factorizing the inner term,\n  534 |         // => 2λ = tr(M) ± sqrt[((a+d)^2 + (b-c)^2) ((a-d)^2 + (b+c)^2)]\n  535 |         // => 2λ = tr(M) ± sqrt[(a+d)^2 + (b-c)^2] sqrt[(a-d)^2 + (b+c)^2]\n  536 |         //\n  537 |         // Define S1 = sqrt[(a+d)^2 + (b-c)^2]\n  538 |         //        S2 = sqrt[(a-d)^2 + (b+c)^2].\n  539 |         //\n  540 |         // => 2λ = tr(M) ± S1 S2\n  541 |         // => 2λ = 1/2 (S1^2 + S2^2) ± S1 S2\n  542 |         // => λ = 1/4 (S1^2 + S2^2 ± 2 S1 S2)\n  543 |         // => λ = 1/4 (S1 ± S2)^2\n  544 |         //\n  545 |         // Note we're interested in\n  546 |         // σ = sqrt(λ).\n  547 |         //\n  548 |         // => σ1 = 1/2 (S1 + S2)\n  549 |         // and similarly σ2 = 1/2 |S1 - S2|\n  550 |         let s1 = ((a + d).powi(2) + (b - c).powi(2)).sqrt();\n  551 |         let s2 = ((a - d).powi(2) + (b + c).powi(2)).sqrt();\n  552 |         (\n  553 |             Vec2 {\n  554 |                 x: 0.5 * (s1 + s2),\n  555 |                 y: 0.5 * (s1 - s2).abs(),\n  556 |             },\n  557 |             angle,\n  558 |         )\n  559 |     }","lines":54,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/affine.rs#L506-L559"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`BezPath::is_empty` iterates the whole element list checking that every element is MoveTo/ClosePath (true when there are no drawable segments). This is O(n); for the common case of a non-empty path it returns early on the first drawable element, so typical cost is small, but a path of many MoveTo/ClosePath only is fully scanned. Acceptable; noting the name `is_empty` implies O(1) to callers but it is O(n).","fix":"Document that `is_empty` is O(n) (it checks for the absence of segments, not element count).","locations":[{"ref":"kurbo/src/bezpath.rs:351-356","code":"  351 |     /// Returns `true` if the path contains no segments.\n  352 |     pub fn is_empty(&self) -> bool {\n  353 |         self.0\n  354 |             .iter()\n  355 |             .all(|el| matches!(el, PathEl::MoveTo(..) | PathEl::ClosePath))\n  356 | se and the early return effectively unreachable in those cases; conversely if all of x^3, g*x, h are positive but small the threshold is tiny. The use of .max() over signed quantities for an error tolerance is suspect and likely not what was intended (a magnitude-based tolerance should use abs of each term).","fix":"Take absolute values of the scale terms, e.g. EPS_M * x.powi(3).abs().max((g*x).abs()).max(h.abs()), so the convergence tolerance is a non-negative magnitude.","locations":[{"ref":"kurbo/src/common.rs:609-612","code":"  609 |     const EPS_M: f64 = 2.22045e-16;\n  610 |     if f.abs() < EPS_M * x.powi(3).max(g * x).max(h) {\n  611 |         return x;\n  612 |     }","lines":4,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/common.rs#L609-L612"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"CubicBez::split_into_n precomputes ArrayVec storage for n in {1,2,3,4,6} but not 5. For n==5 it falls through to the generic from_fn parametric path. This is intentional (comment says 'six or fewer items we precompute them' but 5 is skipped), making the comment slightly misleading: 5 is six-or-fewer yet not precomputed. Not a correctness bug, but the comment 'if we have six or fewer items we precompute them' is false for n==5.","fix":"Fix the comment to list the precomputed cases (1,2,3,4,6) explicitly, or add the n==5 case for consistency.","locations":[{"ref":"kurbo/src/cubicbez.rs:193-223","code":"  193 |     fn split_into_n(&self, n: usize) -> impl Iterator<Item = CubicBez> {\n  194 |         // for certain small values of `n` we precompute all our values.\n  195 |         // if we have six or fewer items we precompute them.\n  196 |         let mut storage = ArrayVec::<_, 6>::new();\n  197 | \n  198 |         match n {\n  199 |             1 => storage.push(*self),\n  200 |             2 => {\n  201 |                 let (l, r) = self.subdivide();\n  202 |                 storage.try_extend_from_slice(&[r, l]).unwrap();\n  203 |             }\n  204 |             3 => {\n  205 |                 let (left, mid, right) = self.subdivide_3();\n  206 |                 storage.try_extend_from_slice(&[right, mid, left]).unwrap();\n  207 |             }\n  208 |             4 => {\n  209 |                 let (l, r) = self.subdivide();\n  210 |                 let (ll, lr) = l.subdivide();\n  211 |                 let (rl, rr) = r.subdivide();\n  212 |                 storage.try_extend_from_slice(&[rr, rl, lr, ll]).unwrap();\n  213 |             }\n  214 |             6 => {\n  215 |                 let (l, r) = self.subdivide();\n  216 |                 let (l1, l2, l3) = l.subdivide_3();\n  217 |                 let (r1, r2, r3) = r.subdivide_3();\n  218 |                 storage\n  219 |                     .try_extend_from_slice(&[r3, r2, r1, l3, l2, l1])\n  220 |                     .unwrap();\n  221 |             }\n  222 |             _ => (),\n  223 |         }","lines":31,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/cubicbez.rs#L193-L223"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`StrokeOptLevel` and `StrokeOpts::opt_level` have no effect: the doc on `StrokeOptLevel` states 'in the current implementation, this setting has no effect' and `opt_level` is never read in stroke expansion (only `stable_dash_order` is used in `stroke_with`). The `Optimized` variant and the builder are effectively dead/no-op API surface that may mislead callers into expecting different output quality.","fix":"Keep as documented forward-compat API (current choice) but ensure the doc note is prominent; otherwise remove until implemented.","locations":[{"ref":"kurbo/src/stroke.rs:73-96","code":"   73 | /// Optimization level for computing stroke outlines.\n   74 | ///\n   75 | /// Note that in the current implementation, this setting has no effect.\n   76 | /// However, having a tradeoff between optimization of number of segments\n   77 | /// and speed makes sense and may be added in the future, so applications\n   78 | /// should set it appropriately. For real time rendering, the appropriate\n   79 | /// value is `Subdivide`.\n   80 | #[derive(Clone, Copy, Debug, Eq, PartialEq)]\n   81 | pub enum StrokeOptLevel {\n   82 |     /// Adaptively subdivide segments in half.\n   83 |     Subdivide,\n   84 |     /// Compute optimized subdivision points to minimize error.\n   85 |     Optimized,\n   86 | }\n   87 | \n   88 | impl Default for StrokeOpts {\n   89 |     fn default() -> Self {\n   90 |         let opt_level = StrokeOptLevel::Subdivide;\n   91 |         StrokeOpts {\n   92 |             opt_level,\n   93 |             stable_dash_order: false,\n   94 |         }\n   95 |     }\n   96 | }","lines":24,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/stroke.rs#L73-L96"},{"ref":"kurbo/src/stroke.rs:183-188","code":"  183 | impl StrokeOpts {\n  184 |     /// Set optimization level for computing stroke outlines.\n  185 |     pub fn opt_level(mut self, opt_level: StrokeOptLevel) -> Self {\n  186 |         self.opt_level = opt_level;\n  187 |         self\n  188 |     }","lines":6,"link":"https://github.com/linebender/kurbo/blob/838b69ef35f3381cefc007d86aa8364f5a6dc673/kurbo/src/stroke.rs#L183-L188"},{"ref":"kurbo/src/stroke.rs:281-299","code":"  281 | pub fn stroke_with(\n  282 |     path: impl IntoIterator<Item = PathEl>,\n  283 |     style: &Stroke,\n  284 |     opts: &StrokeOpts,\n  285 |     tolerance: f64,\n  286 |     ctx: &mut StrokeCtx,\n  287 | ) {\n  288 |     if style.dash_pattern.is_empty() {\n  289 |         stroke_undashed(path, style, tolerance, ctx);\n  290 |     } else {\n  291 |         let dashed = dash_iter(\n  292 |             path.into_iter(),\n  293 |             style.dash_offset,\n  294 |
