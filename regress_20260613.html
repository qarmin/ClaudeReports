<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"PikeVM panics at runtime for any regex that uses a quantifier on a single-character matcher (e.g. /a+/, /[a-z]*/, /\\d{3}/). The optimizer's `promote_1char_loops` pass always runs (it is not gated behind any feature flag) and emits `Insn::Loop1CharBody` for these patterns. The pikevm executor hits the unconditional `panic!` arm for this instruction. The test suite works around this by always passing `optimize: false` (i.e. `no_opt = true`) when running PikeVM tests, but production users of the public `PikeVMExecutor` type who compile with the default flags will trigger the panic. There is no warning in the API or docs that `no_opt` must be set when using PikeVM.","fix":"Either (a) implement Loop1CharBody in the PikeVM executor, or (b) gate `promote_1char_loops` so it is skipped when the bytecode will be run by the PikeVM, or (c) add a runtime check in the PikeVM executor that returns an error / falls back instead of panicking, and document the `no_opt` requirement in the PikeVMExecutor API.","locations":[{"ref":"src/pikevm.rs:292","code":"  292 |         Insn::Loop1CharBody { .. } => panic!(\"Loop1CharBody unimplemented for pikevm\"),","lines":1},{"ref":"src/optimizer.rs:533","code":"  533 |         changed |= run_pass(r, &mut promote_1char_loops);","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In parse_file() in string_properties.rs, every call to fields.next().unwrap() (lines 21-22) will panic with an unhelpful 'called Option::unwrap() on a None value' message if the emoji-sequences.txt or emoji-zwj-sequences.txt file has a malformed line lacking a semicolon field separator. Similarly, CodepointRange::from_str(...).unwrap() and Codepoint::from_str(...).unwrap() (lines 30, 37, 41) provide no context on which file or line triggered the parse failure. Because this is a build tool, the panics will abort the build with a cryptic backtrace.","fix":"Use expect() with a descriptive message that includes the path and the offending line content, or collect errors with anyhow/thiserror for better diagnostics.","locations":[{"ref":"gen-unicode/src/string_properties.rs:14-41","code":"   14 |     let file = File::open(path).unwrap();\n   15 |     for line in io::BufReader::new(file).lines() {\n   16 |         let line = line.unwrap();\n   17 |         if line.starts_with('#') || line.is_empty() {\n   18 |             continue;\n   19 |         }\n   20 |         let mut fields = line.split(';');\n   21 |         let codepoints = fields.next().unwrap().trim();\n   22 |         let property = fields.next().unwrap().trim().to_string();\n   23 | \n   24 |         let property_codepoints = match properties.entry(property) {\n   25 |             Entry::Occupied(o) => o.into_mut(),\n   26 |             Entry::Vacant(v) => v.insert(Vec::new()),\n   27 |         };\n   28 | \n   29 |         if codepoints.contains(\"..\") {\n   30 |             for cp in CodepointRange::from_str(codepoints).unwrap() {\n   31 |                 property_codepoints.push(vec![cp]);\n   32 |             }\n   33 |         } else if codepoints.contains(' ') {\n   34 |             property_codepoints.push(\n   35 |                 codepoints\n   36 |                     .split_whitespace()\n   37 |                     .map(|s| Codepoint::from_str(s).unwrap())\n   38 |                     .collect(),\n   39 |             );\n   40 |         } else {\n   41 |             property_codepoints.push(vec![Codepoint::from_str(codepoints).unwrap()]);","lines":28}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`ByteBitmap::as_array<N>()` iterates over all 256 bytes and writes the ones present into `array[idx]` without any bounds check or early exit. If the bitmap contains more than `N` bytes, indexing `array[idx]` where `idx >= N` panics with an opaque index-out-of-bounds. The doc comment says \"Panics if the array is not large enough\" but gives no context on why or the expected invariant. In release mode the panic still occurs (no UB), but the diagnostic is confusing.","fix":"Add an explicit `assert!(idx < N, \"ByteBitmap::as_array: bitmap has more than {N} entries\");` before the assignment, or add a `debug_assert` and document the caller responsibility clearly with the precondition.","locations":[{"ref":"src/bytesearch.rs:250-263","code":"  250 |     /// Panics if the array is not large enough.\n  251 |     #[allow(clippy::wrong_self_convention)]\n  252 |     #[inline(always)]\n  253 |     pub fn as_array<const N: usize>(&self) -> [u8; N] {\n  254 |         let mut array = [0u8; N];\n  255 |         let mut idx = 0;\n  256 |         for byte in 0..=255 {\n  257 |             if self.contains(byte) {\n  258 |                 array[idx] = byte;\n  259 |                 idx += 1;\n  260 |             }\n  261 |         }\n  262 |         array\n  263 |     }","lines":14}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"The `with_scm_loop_impl` and `with_scm_compute_max` helper functions in `classicalbacktrack.rs` handle `ByteSeq1` through `ByteSeq6` but not `ByteSeq7` through `ByteSeq16` (lines 289-310 and 358-378). The wildcard arm fires `unreachable!(\"Missing SCM: ...\")`. In current code this is not reachable because `Loop1CharBody` can only be created from nodes where `matches_exactly_one_char()` returns true (Char, CharSet, Bracket, MatchAny, MatchAnyExceptLineTerminator), whose byte encodings are at most 4 bytes (ByteSeq1-4). However, the panic message says 'Missing SCM' implying the arm is not expected, and any future optimisation that allows multi-byte bodies would silently trigger a release-mode panic instead of a compile error.","fix":"Add a compile-time or build-time assertion that `Loop1CharBody`'s loopee can produce at most `ByteSeq4`. Alternatively, add `ByteSeq7` through `ByteSeq16` arms that call `run_scm_loop_impl` / `compute_max_pos` with `scm::MatchByteSeq(bytes)` to make the wildcard arm truly unreachable.","locations":[{"ref":"src/classicalbacktrack.rs:289-310","code":"  289 |             Insn::ByteSeq1(bytes) => {\n  290 |                 Self::run_scm_loop_impl(input, pos, min, max, dir, scm::MatchByteSeq(bytes))\n  291 |             }\n  292 |             Insn::ByteSeq2(bytes) => {\n  293 |                 Self::run_scm_loop_impl(input, pos, min, max, dir, scm::MatchByteSeq(bytes))\n  294 |             }\n  295 |             Insn::ByteSeq3(bytes) => {\n  296 |                 Self::run_scm_loop_impl(input, pos, min, max, dir, scm::MatchByteSeq(bytes))\n  297 |             }\n  298 |             Insn::ByteSeq4(bytes) => {\n  299 |                 Self::run_scm_loop_impl(input, pos, min, max, dir, scm::MatchByteSeq(bytes))\n  300 |             }\n  301 |             Insn::ByteSeq5(bytes) => {\n  302 |                 Self::run_scm_loop_impl(input, pos, min, max, dir, scm::MatchByteSeq(bytes))\n  303 |             }\n  304 |             Insn::ByteSeq6(bytes) => {\n  305 |                 Self::run_scm_loop_impl(input, pos, min, max, dir, scm::MatchByteSeq(bytes))\n  306 |             }\n  307 |             _ => {\n  308 |                 unreachable!(\"Missing SCM: {:?}\", re.insns.iat(ip + 1));\n  309 |             }\n  310 |         }","lines":22},{"ref":"src/classicalbacktrack.rs:358-378","code":"  358 |             Insn::ByteSeq1(bytes) => {\n  359 |                 Self::compute_max_pos(input, pos, limit, dir, scm::MatchByteSeq(bytes))\n  360 |             }\n  361 |             Insn::ByteSeq2(bytes) => {\n  362 |                 Self::compute_max_pos(input, pos, limit, dir, scm::MatchByteSeq(bytes))\n  363 |             }\n  364 |             Insn::ByteSeq3(bytes) => {\n  365 |                 Self::compute_max_pos(input, pos, limit, dir, scm::MatchByteSeq(bytes))\n  366 |             }\n  367 |             Insn::ByteSeq4(bytes) => {\n  368 |                 Self::compute_max_pos(input, pos, limit, dir, scm::MatchByteSeq(bytes))\n  369 |             }\n  370 |             Insn::ByteSeq5(bytes) => {\n  371 |                 Self::compute_max_pos(input, pos, limit, dir, scm::MatchByteSeq(bytes))\n  372 |             }\n  373 |             Insn::ByteSeq6(bytes) => {\n  374 |                 Self::compute_max_pos(input, pos, limit, dir, scm::MatchByteSeq(bytes))\n  375 |             }\n  376 |             _ => {\n  377 |                 unreachable!(\"Missing SCM: {:?}\", re.insns.iat(ip + 1));\n  378 |             }","lines":21}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In unfold_icase_chars, the `_` arm panics if unfold_uppercase_char or unfold_char returns more than MAX_BYTE_SET_LENGTH (4) code points for a character. The panic fires in release builds. Although current Unicode data does not produce more than 4 case variants, this is an undocumented assumption about Unicode tables. If the tables are ever updated or a new fold relation is added with 5+ variants, the optimizer will panic when compiling any regex containing that character with the icase flag.","fix":"Instead of panicking, fall back to keeping the original icase Char node when unfolded.len() > MAX_CHAR_SET_LENGTH. This is safe because the backtracking engine handles icase Char natively. Change the arm to `_ => PassAction::Keep`.","locations":[{"ref":"src/optimizer.rs:303-304","code":"  303 |             }\n  304 |         }","lines":2},{"ref":"src/optimizer.rs:321-323","code":"  321 |                 _ => panic!(\"Unfolded to more characters than we believed possible\"),\n  322 |             }\n  323 |         }","lines":3}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"emit.rs next_offset() casts insns.len() to u32 without a bounds check. If a regex could generate more than u32::MAX instructions, the cast silently truncates, causing subsequent jump-target fixups to point to wrong instructions and producing incorrect matching behaviour or crashes. There is no limit on total instruction count enforced by the parser.","fix":"Add an assert or saturating check: `assert!(self.result.insns.len() <= u32::MAX as usize, \"instruction count overflow\");` in next_offset, or maintain a u32 counter directly.","locations":[{"ref":"src/emit.rs:114-116","code":"  114 |     fn next_offset(&self) -> u32 {\n  115 |         self.result.insns.len() as u32\n  116 |     }","lines":3}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"FoldPair::stride_to computes 'rhs.orig - self.orig' as u32 subtraction without checking that rhs.orig >= self.orig. Similarly, DeltaBlock::can_append computes 'fp.orig - self.first().orig' (line 236) as u32 subtraction. If the UCD data is ever not in strictly ascending codepoint order, these will panic with a subtraction overflow in debug builds or silently wrap in release builds, producing corrupt FoldRange tables. Neither generate_case_folds nor generate_uppercase sorts fold_pairs before iterating; they rely entirely on the implicit ordering of the parsed UCD data.","fix":"Either sort fold_pairs by .orig before the DeltaBlock loop, or add a debug_assert!(rhs.orig >= self.orig) in stride_to and a similar guard in can_append before the subtraction.","locations":[{"ref":"gen-unicode/src/main.rs:192-194","code":"  192 |     fn stride_to(self, rhs: FoldPair) -> u32 {\n  193 |         rhs.orig - self.orig\n  194 |     }","lines":3},{"ref":"gen-unicode/src/main.rs:236","code":"  236 |         } else if fp.orig - self.first().orig > MAX_LENGTH {","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Flags::fmt (Display) omits the 'v' (unicode_sets) flag. A Flags value with unicode_sets=true cannot round-trip through Display + Flags::from: printing it produces a string that, when re-parsed, produces a different Flags. Any code serialising flags and re-using the string (e.g. for debugging, serialisation, or re-compilation) will silently lose the unicode_sets setting.","fix":"Add `if self.unicode_sets { f.write_str(\"v\")?; }` after the `unicode` block. Also add `if self.no_opt { ... }` if round-tripping of internal flags is ever intended.","locations":[{"ref":"src/api.rs:102-118","code":"  102 | impl fmt::Display for Flags {\n  103 |     fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n  104 |         if self.multiline {\n  105 |             f.write_str(\"m\")?;\n  106 |         }\n  107 |         if self.icase {\n  108 |             f.write_str(\"i\")?;\n  109 |         }\n  110 |         if self.dot_all {\n  111 |             f.write_str(\"s\")?;\n  112 |         }\n  113 |         if self.unicode {\n  114 |             f.write_str(\"u\")?;\n  115 |         }\n  116 |         Ok(())\n  117 |     }\n  118 | }","lines":17}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"NamedGroups implements ExactSizeIterator but its size_hint is incorrect when duplicate group names exist. size_hint counts every non-empty name from next_group_idx onwards, but the iterator skips duplicate occurrences of the same name. For a regex with two capture groups both named 'foo', size_hint returns 2 at start but the iterator yields only 1 item. ExactSizeIterator is a safety-relevant contract: callers (including stdlib code) may use the exact size to allocate or unsafe-index, leading to logic errors or, in unsafe contexts, memory safety issues.","fix":"Rewrite size_hint to count distinct non-empty names from next_group_idx, deduplicating. One approach: `let seen: std::collections::HashSet<_> = self.mat.group_names[..self.next_group_idx].iter().filter(|s| !s.is_empty()).collect(); let size = self.mat.group_names[self.next_group_idx..].iter().filter(|s| !s.is_empty()).filter(|s| !seen.contains(s)).count();`. Alternatively, remove the ExactSizeIterator impl if an exact count is not worth computing.","locations":[{"ref":"src/api.rs:358-366","code":"  358 |     fn size_hint(&self) -> (usize, Option<usize>) {\n  359 |         let size = self.mat.group_names[self.next_group_idx..]\n  360 |             .iter()\n  361 |             .filter(|s| !s.is_empty())\n  362 |             .count();\n  363 | \n  364 |         (size, Some(size))\n  365 |     }\n  366 | }","lines":9},{"ref":"src/api.rs:368","code":"  368 | impl<'m> ExactSizeIterator for NamedGroups<'m> {}","lines":1}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The pattern_impl forward Searcher skips one byte after every zero-width match that is not at the end of the haystack. When a zero-width match is found at position P, current_pos is advanced to the next char boundary (P+delta). On the next call, find_from starts at P+delta, so if a subsequent match starts at P+delta there is no Reject segment covering bytes [P, P+delta). Those bytes are never reported as either Match or Reject, violating the Searcher safety contract (all bytes must be returned exactly once as Match or Reject segments). Code relying on exhaustive partitioning (e.g. split, matches) will silently drop that character.","fix":"After returning Match(match_start, match_end) for a zero-width match, the next call must emit Reject(match_end, current_pos) to cover the skipped bytes before looking for the next match. Introduce a pending_reject field in RegexSearcher to emit it on the subsequent call, or restructure next() to emit the Reject immediately within the same call.","locations":[{"ref":"src/api.rs:802-823","code":"  802 |                 self.current_pos = match_end;\n  803 | \n  804 |                 // Handle zero-width matches to avoid infinite loops\n  805 |                 if match_start == match_end {\n  806 |                     // For zero-width matches, we need to advance at least one byte\n  807 |                     // to avoid infinite loops\n  808 |                     if match_end < self.haystack.len() {\n  809 |                         // Find the next character boundary\n  810 |                         let mut next_pos = match_end + 1;\n  811 |                         while next_pos < self.haystack.len()\n  812 |                             && !self.haystack.is_char_boundary(next_pos)\n  813 |                         {\n  814 |                             next_pos += 1;\n  815 |                         }\n  816 |                         self.current_pos = next_pos;\n  817 |                     } else {\n  818 |                         // We're at the end of the string\n  819 |                         self.done = true;\n  820 |                     }\n  821 |                 }\n  822 | \n  823 |                 SearchStep::Match(match_start, match_end)","lines":22}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `ClassSet::node`, when `negate_set` is true and `self.alternatives` is non-empty, the negation is either ignored entirely (when codepoints are empty, line 88 returns the alternatives node directly) or applied only to the bracket but not to the alternatives portion of the Alt node (line 90). A negated class `[^\\q{ab}]` would emit an un-negated alternatives node.","fix":"When `negate_set` is true and alternatives are present, the spec requires an error (negation of a class set with string alternatives is not allowed in v-mode). Either return an error or, if the spec allows it, correctly negate the codepoints only and error on alternatives.","locations":[{"ref":"src/parse.rs:85-91","code":"   85 |         if self.alternatives.0.is_empty() {\n   86 |             bracket\n   87 |         } else if codepoints_empty {\n   88 |             self.alternatives.into_node(icase)\n   89 |         } else {\n   90 |             make_alt(Vec::from([self.alternatives.into_node(icase), bracket]))\n   91 |         }","lines":7}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `consume_class_set_expression`, when the first operand is followed by a single `&` (not `&&`), the code consumes `&`, adds it to `result.codepoints`, and enters Union mode - but it never adds `first` to `result`. For example, `[a&b]` in unicode-sets mode yields a set containing `&` and `b` but silently drops `a`.","fix":"Before adding `0x26` to `result.codepoints`, also call `result.union_operand(first)` so the first operand is not lost. The `first` in this arm should not be cloned since it is consumed.","locations":[{"ref":"src/parse.rs:1044-1053","code":" 1044 |             Some(0x26 /* & */) => {\n 1045 |                 self.consume('&');\n 1046 |                 if self.peek() == Some(0x26 /* & */) {\n 1047 |                     self.consume('&');\n 1048 |                     result.union_operand(first.clone());\n 1049 |                     ClassSetOperator::Intersection\n 1050 |                 } else {\n 1051 |                     result.codepoints.add_one(0x26 /* & */);\n 1052 |                     ClassSetOperator::Union\n 1053 |                 }","lines":10}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `consume_class_set_operand`, negating a nested class set like `[^abc]` inside a unicode-sets expression calls `result.codepoints.inverted()` but discards the returned value. `inverted()` returns a new `CodePointSet` by value and does NOT mutate in place. The codepoints field remains uninverted, so `[^[abc]]` inside a `v`-mode class is silently treated as `[[abc]]`.","fix":"Replace `result.codepoints.inverted();` with `result.codepoints = result.codepoints.inverted();`.","locations":[{"ref":"src/parse.rs:1171-1173","code":" 1171 |                 if negate_set {\n 1172 |                     result.codepoints.inverted();\n 1173 |                 }","lines":3}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The `prohibit-unsafe` feature flag is inverted in `fold()` and `uppercase()`. When `prohibit-unsafe` IS set (meaning: don't use unsafe code), the branches call `unsafe { FOLDS.get_unchecked(index) }`. When it is NOT set, they call the safe `.get(index).expect(...)`. This is the opposite of every other prohibit-unsafe usage in the codebase (util.rs, bytesearch.rs, position.rs, classicalbacktrack.rs all have the safe branch inside `if cfg!(feature = \"prohibit-unsafe\")`). The result is that building with `--features prohibit-unsafe` actually runs unsafe code, while normal builds run the safe path.","fix":"Swap the two branches: the `unsafe { FOLDS.get_unchecked(index) }` call should be in the `else` arm (when prohibit-unsafe is NOT set), and `FOLDS.get(index).expect(\"Invalid index\")` should be in the `if cfg!(feature = \"prohibit-unsafe\")` arm. Same fix for the identical pattern in `uppercase()` at lines 183-187.","locations":[{"ref":"src/unicode.rs:161-165","code":"  161 |         let fr: &FoldRange = if cfg!(feature = \"prohibit-unsafe\") {\n  162 |             unsafe { FOLDS.get_unchecked(index) }\n  163 |         } else {\n  164 |             FOLDS.get(index).expect(\"Invalid index\")\n  165 |         };","lines":5},{"ref":"src/unicode.rs:183-187","code":"  183 |         let fr: &FoldRange = if cfg!(feature = \"prohibit-unsafe\") {\n  184 |             unsafe { TO_UPPERCASE.get_unchecked(index) }\n  185 |         } else {\n  186 |             TO_UPPERCASE.get(index).expect(\"Invalid index\")\n  187 |         };","lines":5}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Two test patterns in test_lookbehinds_mjsunit_tc have a spurious leading double-quote character inside the regex string literal. 'tc.compilef(\"\\\"^foooo(?<=^o+)$\", \"\")' tests the pattern '\"^foooo(?<=^o+)$' (starting with a literal '\"'), not the intended '^foooo(?<=^o+)$'. The .test_fails(\"foooo\") assertion passes for the wrong reason (\"foooo\" has no leading '\"' so the pattern can never match), meaning the real lookbehind logic is not exercised.","fix":"Remove the leading escaped double-quote from each pattern string: change '\"\\\"^foooo(?<=^o+)$\"' to '\"^foooo(?<=^o+)$\"' and similarly for the o* variant on line 432.","locations":[{"ref":"tests/tests.rs:431-432","code":"  431 |     tc.compilef(\"\\\"^foooo(?<=^o+)$\", \"\").test_fails(\"foooo\");\n  432 |     tc.compilef(\"\\\"^foooo(?<=^o*)$\", \"\").test_fails(\"foooo\");","lines":2}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"generate_binary_properties_tests() and generate_general_category_tests() only emit the START codepoint of each range (c.0) as a test vector, not all codepoints in the range. For example, a property range (0x0041, 0x005A) generates a test only for U+0041 ('A'), never checking U+005A ('Z') or anything in between. The generated tests therefore have very sparse codepoint coverage; an off-by-one in the range endpoints would go undetected.","fix":"Emit at minimum both the start and the end codepoint of each range (and optionally a mid-range sample), mirroring the strategy used in generate_scripts_tests() which already does this via the SAMPLE_THRESHOLD logic.","locations":[{"ref":"gen-unicode/src/binary_properties.rs:161-164","code":"  161 |             let code_points: Vec<String> = chars\n  162 |                 .iter()\n  163 |                 .map(|c| format!(\"\\\"\\\\u{{{:x}}}\\\"\", c.0))\n  164 |                 .collect();","lines":4},{"ref":"gen-unicode/src/general_category_values.rs:171-174","code":"  171 |             let code_points: Vec<String> = chars\n  172 |                 .iter()\n  173 |                 .map(|c| format!(\"\\\"\\\\u{{{:x}}}\\\"\", c.0))\n  174 |                 .collect();","lines":4},{"ref":"gen-unicode/src/general_category_values.rs:245-248","code":"  245 |             let code_points: Vec<String> = chars\n  246 |                 .iter()\n  247 |                 .map(|c| format!(\"\\\"\\\\u{{{:x}}}\\\"\", c.0))\n  248 |                 .collect();","lines":4}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `format_bitmap()` (used by `Debug` impls for `AsciiBitmap` and `ByteBitmap`), the inner loop increments `end` while `end <= 256` and calls `contains(end as u8)`. When `end` reaches 256, `end as u8` truncates to 0, so the loop tests whether byte 0 is in the bitmap instead of detecting the end of the byte range. If byte 0 is present, the loop will incorrectly include it in the current run and produce a range string like \"255-256\" (or even loop further), corrupting the Debug output.","fix":"Change the loop bound and cast: use `end < 256` in the outer while and `(end as u8)` only when `end <= 255`. Alternatively, use `u16` for `idx` and `end` with the outer loop `while idx <= 255u16` to avoid truncation entirely.","locations":[{"ref":"src/bytesearch.rs:134-148","code":"  134 |     while idx <= 256 {\n  135 |         // Compute the next value not contained.\n  136 |         let mut end = idx;\n  137 |         while end <= 256 && contains(end as u8) {\n  138 |             end += 1;\n  139 |         }\n  140 |         match end - idx {\n  141 |             0 => (),\n  142 |             1 => write!(f, \"{}{}\", maybe_space, idx)?,\n  143 |             _ => write!(f, \"{}{}-{}\", maybe_space, idx, end - 1)?,\n  144 |         };\n  145 |         if end > idx {\n  146 |             maybe_space = \" \";\n  147 |         }\n  148 |         idx = end + 1","lines":15}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`ByteBitmap::unsafe_find_in_slice` is only correct on little-endian platforms. It calls `align_to::<u32>()` to process 4 bytes at a time, then calls `.to_le_bytes()` on the resulting `u32` chunk assuming that index 0 of the byte array corresponds to the earliest address in memory. On big-endian platforms the byte order within the chunk is reversed, so index 0 of `to_le_bytes()` corresponds to the LAST byte of the 4-byte group. The function then returns `Some(offset)` (claiming the match is at the start of the group) when it might actually be at `offset + 3`, silently producing wrong match positions. The comment on line 282 explicitly says \"Use LE\" but there is no endianness guard.","fix":"Add `#[cfg(target_endian = \"little\")]` on `unsafe_find_in_slice` and route big-endian through the safe byte-by-byte loop that `ByteSearcher::find_in` already uses for `prohibit-unsafe` builds. Alternatively use `from_ne_bytes` and adjust index mapping accordingly, or use `u32::from_le(chunk)` to normalise to LE before extracting nibbles.","locations":[{"ref":"src/bytesearch.rs:268-307","code":"  268 |     fn unsafe_find_in_slice(&self, bytes: &[u8]) -> Option<usize> {\n  269 |         type Chunk = u32;\n  270 |         let bm = &self.0;\n  271 | \n  272 |         let mut offset = 0;\n  273 |         let (prefix, body, suffix) = unsafe { bytes.align_to::<Chunk>() };\n  274 |         for &byte in prefix.iter() {\n  275 |             if self.contains(byte) {\n  276 |                 return Some(offset);\n  277 |             }\n  278 |             offset += 1;\n  279 |         }\n  280 | \n  281 |         for &chunk in body {\n  282 |             // Use LE. Here index 0 is the earliest address.\n  283 |             let byte_idxs = ((chunk >> 4) & 0x0F0F0F0F).to_le_bytes();\n  284 |             let bit_idxs = (chunk & 0x0F0F0F0F).to_le_bytes();\n  285 |             if (bm[byte_idxs[0] as usize] & (1 << bit_idxs[0])) != 0 {\n  286 |                 return Some(offset);\n  287 |             }\n  288 |             if (bm[byte_idxs[1] as usize] & (1 << bit_idxs[1])) != 0 {\n  289 |                 return Some(offset + 1);\n  290 |             }\n  291 |             if (bm[byte_idxs[2] as usize] & (1 << bit_idxs[2])) != 0 {\n  292 |                 return Some(offset + 2);\n  293 |             }\n  294 |             if (bm[byte_idxs[3] as usize] & (1 << bit_idxs[3])) != 0 {\n  295 |                 return Some(offset + 3);\n  296 |             }\n  297 |             offset += 4;\n  298 |         }\n  299 | \n  300 |         for &byte in suffix.iter() {\n  301 |             if self.contains(byte) {\n  302 |                 return Some(offset);\n  303 |             }\n  304 |             offset += 1;\n  305 |         }\n  306 |         None\n  307 |     }","lines":40}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"unfold_icase_chars uses MAX_BYTE_SET_LENGTH (= 4, the maximum ByteSet size) as the upper bound for creating a CharSet node, but the correct constant is MAX_CHAR_SET_LENGTH (also currently 4). The two constants are semantically unrelated: one bounds a byte-set instruction, the other bounds a char-set. If either constant is changed independently (e.g. MAX_BYTE_SET_LENGTH increased to support larger byte sets), the range check 2..=MAX_BYTE_SET_LENGTH would allow charsets larger than MAX_CHAR_SET_LENGTH, triggering a panic in emit.rs when the fixed-size CharSet array is filled. The code is fragile.","fix":"Replace MAX_BYTE_SET_LENGTH with MAX_CHAR_SET_LENGTH on both lines. Also update the `_` panic message to mention MAX_CHAR_SET_LENGTH. Remove the now-unused MAX_BYTE_SET_LENGTH import in optimizer.rs if it is not needed elsewhere.","locations":[{"ref":"src/optimizer.rs:298","code":"  298 |                 2..=MAX_BYTE_SET_LENGTH => {","lines":1},{"ref":"src/optimizer.rs:317","code":"  317 |                 2..=MAX_BYTE_SET_LENGTH => {","lines":1}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `intersect_operand` for `ClassSetOperand::Class` (lines 146-162), the cross-product handling is incomplete for multi-char alternatives. The code only accounts for len-1 alternatives crossing between codepoints and alternatives, but multi-char alternatives in `self.alternatives` that also appear in `class.alternatives` are handled by the `self.alternatives.intersect` call. However, multi-char alternatives in `class.alternatives` that are a superset of chars all present in `self.codepoints` should logically be included in the intersection, but they are not. This makes the unicode-sets class intersection semantically approximate.","fix":"This is inherently complex since intersection of string sets is not straightforward. The implementation should be carefully validated against the TC39 spec for all combinations of codepoint-sets and string-alternatives intersections.","locations":[{"ref":"src/parse.rs:146-162","code":"  146 |             ClassSetOperand::Class(class) => {\n  147 |                 let mut retained_codepoints = CodePointSet::new();\n  148 |                 for alternative in &class.alternatives.0 {\n  149 |                     if alternative.len() == 1 && self.codepoints.contains(alternative[0]) {\n  150 |                         retained_codepoints.add_one(alternative[0]);\n  151 |                     }\n  152 |                 }\n  153 |                 let mut retained_alternatives = ClassSetAlternativeStrings::new();\n  154 |                 for alternative in &self.alternatives.0 {\n  155 |                     if alternative.len() == 1 && class.codepoints.contains(alternative[0]) {\n  156 |                         retained_alternatives.0.push(alternative.clone());\n  157 |                     }\n  158 |                 }\n  159 |                 self.codepoints.intersect(class.codepoints.intervals());\n  160 |                 self.codepoints.add_set(retained_codepoints);\n  161 |                 self.alternatives.intersect(&class.alternatives);\n  162 |                 self.alternatives.extend(retained_alternatives);","lines":17}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In the `\\q{}` parser, empty alternatives (the empty string) are silently discarded at both the `|` separator (line 1205) and the closing `}` (line 1198). This means `\\q{|abc}` drops the leading empty-string alternative, and `\\q{}` produces an always-fails node instead of matching the empty string. Per the TC39 UnicodeSets proposal, empty strings are valid alternatives in `ClassStringDisjunction`.","fix":"Remove the `!alternative.is_empty()` guards. Always push the current (possibly empty) `alternative` slice before moving past `|` or `}`. An empty `Box<[u32]>` (i.e. `Box::from([])`) is a valid alternative that matches the empty string.","locations":[{"ref":"src/parse.rs:1194-1219","code":" 1194 |                         loop {\n 1195 |                             match self.peek() {\n 1196 |                                 Some(0x7D /* } */) => {\n 1197 |                                     self.consume('}');\n 1198 |                                     if !alternative.is_empty() {\n 1199 |                                         alternatives.push(alternative.into_boxed_slice());\n 1200 |                                     }\n 1201 |                                     break;\n 1202 |                                 }\n 1203 |                                 Some(0x7C /* | */) => {\n 1204 |                                     self.consume('|');\n 1205 |                                     if !alternative.is_empty() {\n 1206 |                                         let alternative = std::mem::take(&mut alternative).into_boxed_slice();\n 1207 |                                         alternatives.push(alternative);\n 1208 | \n 1209 |                                     }\n 1210 |                                 }\n 1211 |                                 Some(_) => {\n 1212 |                                     alternative.push(self.consume_class_set_character()?);\n 1213 |                                 }\n 1214 |                                 None => {\n 1215 |                                     return error(\"Unbalanced class set string disjunction\");\n 1216 |                                 }\n 1217 |                             }\n 1218 |                         }\n 1219 |                         Ok(ClassStringDisjunction(ClassSetAlternativeStrings(alternatives)))","lines":26}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `consume_class_set_character` and `consume_class_set_operand`, `\\b` inside a unicode-sets class set returns the raw codepoint `0x62` ('b') instead of `0x08` (backspace, U+0008). In contrast, the regular bracket parser (`try_consume_bracket_class_atom`) correctly returns `'\\x08'` for `\\b`. This means `[\\b]` in `v`-mode matches the letter 'b' instead of backspace.","fix":"Replace `Ok(self.consume(cp))` in the `\\b` arm of both functions with `Ok(self.consume(cp); 0x08)` - i.e. consume the `b` but return `0x08u32` (backspace), matching the spec and the non-unicode-sets code path.","locations":[{"ref":"src/parse.rs:1305-1308","code":" 1305 |                     // \\b\n 1306 |                     0x62 /* b */ => {\n 1307 |                         Ok(self.consume(cp))\n 1308 |                     }","lines":4},{"ref":"src/parse.rs:1278-1281","code":" 1278 |                     // ClassSetCharacter:: \\b\n 1279 |                     0x62 /* b */ => {\n 1280 |                         Ok(ClassSetCharacter(self.consume(cp)))\n 1281 |                     }","lines":4}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `collect_named_group_locations`, the `[` handler (lines 1923-1933) scans until the matching `]` by skipping `\\X` pairs. In `unicode_sets` mode, brackets can be nested (`[[a][b]]`). The scanner does not track nesting, so the first `]` at any depth terminates the bracket scan. This causes incorrect paren-depth tracking and can miscount capture groups for patterns with nested class sets.","fix":"When `flags.unicode_sets` is set, use a nesting counter for brackets inside the `[` handler. Increment on `[` and decrement on `]`; only break when the nesting counter reaches zero.","locations":[{"ref":"src/parse.rs:1923-1933","code":" 1923 |                 Some('[') => loop {\n 1924 |                     match self.next().map(to_char_sat) {\n 1925 |                         Some('\\\\') => {\n 1926 |                             self.next();\n 1927 |                             continue;\n 1928 |                         }\n 1929 |                         Some(']') => break,\n 1930 |                         Some(_) => continue,\n 1931 |                         None => break,\n 1932 |                     }\n 1933 |                 },","lines":11}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `pikevm::try_match_state`, a successful positive lookahead (or lookbehind) swaps the entire inner `State` back into the current state `s` (via `core::mem::swap` inside `try_at_pos`). This correctly propagates capture group results, but it also replaces `s.loops` with the lookahead's loop counters. If the lookahead contains loops (which have globally-unique `loop_id` values), those counters occupy entries in the shared `loops` vec. While loop IDs are unique so outer loop state is not directly corrupted, the memory usage of `s.loops` grows with the union of outer and inner loop IDs. More critically, if the lookahead fails the inner try_at_pos returns false and `s` is untouched - but when it succeeds `s.loops` is replaced wholesale. A later `EnterLoop` for an outer loop resets `ld.iters = 0`, so correctness is preserved in practice, but the interaction is fragile and undocumented.","fix":"After a successful lookahead/lookbehind, restore `s.loops` from the saved snapshot before swapping the state back, similar to how `classicalbacktrack::run_lookaround` uses isolated backtrack stacks. Document why propagating loops is or is not correct.","locations":[{"ref":"src/pikevm.rs:244-283","code":"  244 |         &Insn::Lookahead {\n  245 |             negate,\n  246 |             start_group: _,\n  247 |             end_group: _,\n  248 |             continuation,\n  249 |         } => {\n  250 |             // Enter into the lookaround's instruction stream.\n  251 |             s.ip += 1;\n  252 |             let saved_pos = s.pos;\n  253 |             let attempt_succeeded =\n  254 |                 MatchAttempter::<Input>::new(re).try_at_pos(*input, s, Forward::new());\n  255 |             let matched = attempt_succeeded != negate;\n  256 |             if matched {\n  257 |                 s.ip = continuation as usize;\n  258 |                 s.pos = saved_pos;\n  259 |                 StateMatch::Continue\n  260 |             } else {\n  261 |                 StateMatch::Fail\n  262 |             }\n  263 |         }\n  264 | \n  265 |         &Insn::Lookbehind {\n  266 |             negate,\n  267 |             start_group: _,\n  268 |             end_group: _,\n  269 |             continuation,\n  270 |         } => {\n  271 |             // Enter into the lookaround's instruction stream.\n  272 |             s.ip += 1;\n  273 |             let saved_pos = s.pos;\n  274 |             let attempt_succeeded = MatchAttempter::new(re).try_at_pos(*input, s, Backward::new());\n  275 |             let matched = attempt_succeeded != negate;\n  276 |             if matched {\n  277 |                 s.ip = continuation as usize;\n  278 |                 s.pos = saved_pos;\n  279 |                 StateMatch::Continue\n  280 |             } else {\n  281 |                 StateMatch::Fail\n  282 |             }\n  283 |         }","lines":40},{"ref":"src/pikevm.rs:369-394","code":"  369 |     fn try_at_pos<Dir: Direction>(\n  370 |         &mut self,\n  371 |         input: Input,\n  372 |         init_state: &mut State<Input::Position>,\n  373 |         dir: Dir,\n  374 |     ) -> bool {\n  375 |         debug_assert!(self.states.is_empty(), \"Should be no states\");\n  376 |         self.states.push(init_state.clone());\n  377 |         while !self.states.is_empty() {\n  378 |             let s = self.states.last_mut().unwrap();\n  379 |             match try_match_state(self.re, &input, s, dir) {\n  380 |                 StateMatch::Fail => {\n  381 |                     self.states.pop();\n  382 |                 }\n  383 |                 StateMatch::Continue => {}\n  384 |                 StateMatch::Complete => {\n  385 |                     // Give the successful state to the caller.\n  386 |                     core::mem::swap(init_state, s);\n  387 |                     self.states.clear();\n  388 |                     return true;\n  389 |                 }\n  390 |                 StateMatch::Split(newstate) => self.states.push(newstate),\n  391 |             }\n  392 |         }\n  393 |         false\n  394 |     }","lines":26}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In exec_re_on_string in regress-tool, the total match count is computed as '1 + matches.count()' after calling matches.next() to get the first result. This is correct. However, the formatted first match (res) is captured before consuming the iterator with .count(), so res references a Match object whose captured range offsets are valid. The issue is cosmetic: if there are zero additional matches after the first, count() returns 0 and '1 + 0 = 1', which is correct. But if the program is intended as a diagnostic tool, the 'total' count printed reflects all matches including the first, while only the first match is printed - which could confuse users expecting all matches to be shown.","fix":"Add a comment clarifying that 'total' is the total number of matches and only the first is displayed, or collect and display all matches.","locations":[{"ref":"regress-tool/src/regress-tool.rs:65-73","code":"   65 | fn exec_re_on_string(re: &Regex, input: &str) {\n   66 |     let mut matches = re.find_iter(input);\n   67 |     if let Some(res) = matches.next() {\n   68 |         let count = 1 + matches.count();\n   69 |         println!(\"Match: {}, total: {}\", format_match(&res, input), count);\n   70 |     } else {\n   71 |         println!(\"No match\");\n   72 |     }\n   73 | }","lines":9}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `try_duplicate` for `Node::Loop`, the assertion `enclosed_groups.start >= enclosed_groups.end` is used to assert no enclosed groups. For a non-empty range, `start < end`, so the assert fires. However, an empty range has `start == end`, not `start > end`, so the `>=` condition allows `start > end` (which is already an invalid range state). The assertion is correct in practice but uses a confusing inequality; `start == end` would be clearer.","fix":"Change the assertion to `assert!(enclosed_groups.is_empty(), ...)`, which is both clearer and correct.","locations":[{"ref":"src/ir.rs:214-216","code":"  214 |                 assert!(\n  215 |                     enclosed_groups.start >= enclosed_groups.end,\n  216 |                     \"Cannot duplicate a loop with enclosed groups\"","lines":3}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `try_duplicate` for `Node::LookaroundAssertion`, the assertion `start_group >= end_group` checks for no enclosed groups. Same issue as the Loop assertion: `>=` allows the impossible `start > end` case. Use `start == end` or `is_empty()` for clarity.","fix":"Change the assertion condition to `*start_group == *end_group` or introduce a helper method.","locations":[{"ref":"src/ir.rs:250-252","code":"  250 |                 assert!(\n  251 |                     start_group >= end_group,\n  252 |                     \"Cannot duplicate an assertion with enclosed groups\"","lines":3}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `pikevm::next_match`, the outer `loop` that tries successive start positions reuses a single `State` object. After each failed `try_at_pos` call, `state` is unchanged (the init_state is not mutated on failure), which is correct. However, `state.ip` is initialized to 0 once and never explicitly reset between iterations - this works only because `try_at_pos` guarantees not to modify `init_state` on failure. If that invariant ever changes (e.g. partial progress is written back for performance reasons), stale `ip != 0` would cause the next attempt to start mid-bytecode. The code relies on a non-local invariant without a comment.","fix":"Add `state.ip = 0;` at the top of the inner loop body (after advancing `state.pos`) to make the reset explicit, or add a comment explaining why the reset is unnecessary.","locations":[{"ref":"src/pikevm.rs:472-501","code":"  472 |         let mut state = State {\n  473 |             pos,\n  474 |             ip: 0,\n  475 |             loops: vec![LoopData::new(pos); re.loops as usize],\n  476 |             groups: vec![GroupData::new(); re.groups as usize],\n  477 |         };\n  478 |         loop {\n  479 |             let start = state.pos;\n  480 |             if self\n  481 |                 .matcher\n  482 |                 .try_at_pos(self.input, &mut state, Forward::new())\n  483 |             {\n  484 |                 let end = state.pos;\n  485 |                 if end != start {\n  486 |                     *next_start = Some(end)\n  487 |                 } else {\n  488 |                     *next_start = self.input.next_right_pos(end)\n  489 |                 }\n  490 |                 return Some(successful_match(\n  491 |                     self.input,\n  492 |                     start,\n  493 |                     &state,\n  494 |                     re.group_names.clone(),\n  495 |                 ));\n  496 |             }\n  497 |             match self.input.next_right_pos(start) {\n  498 |                 Some(nextpos) => state.pos = nextpos,\n  499 |                 None => break,\n  500 |             }\n  501 |         }","lines":30}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"is_start_anchored in startpredicate.rs treats only StartOfLine anchors as start-anchoring. An Alt node whose both branches begin with StartOfLine would correctly be detected as anchored by the left branch, but an Alt where BOTH sides are anchored is not handled - only the left branch is checked. This is not a correctness bug (the predicate is conservative) but it's a missed optimisation opportunity: `(^a)|(^b)` is start-anchored but is not treated as such.","fix":"Minor: extend is_start_anchored to handle Node::Alt: return true only if both left and right are start-anchored. This is safe because is_start_anchored is used solely as an optimisation hint.","locations":[{"ref":"src/startpredicate.rs:14-28","code":"   14 | fn is_start_anchored(n: &Node) -> bool {\n   15 |     match n {\n   16 |         Node::Anchor {\n   17 |             anchor_type: ir::AnchorType::StartOfLine,\n   18 |             multiline,\n   19 |         } => !multiline,\n   20 |         Node::Cat(nodes) => {\n   21 |             // For concatenation, check if the first node is start-anchored\n   22 |             nodes.first().is_some_and(is_start_anchored)\n   23 |         }\n   24 |         Node::CaptureGroup { contents, .. } => is_start_anchored(contents),\n   25 |         // Other nodes are not anchored\n   26 |         _ => false,\n   27 |     }\n   28 | }","lines":15}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"The two cargo fmt invocations in main() call .output().expect(...). The .expect() only panics if the OS fails to spawn or wait for the child process. If cargo fmt itself exits with a non-zero exit code (e.g. rustfmt not installed, syntax error in generated code), the failure is silently swallowed and the malformed output is left in the generated files. The generated tables and test files would then be unparseable by the Rust compiler with no diagnostic from gen-unicode itself.","fix":"Check the exit status after .output(): let out = cmd.output().expect(\"...\"); assert!(out.status.success(), \"cargo fmt failed: {}\", String::from_utf8_lossy(&out.stderr));","locations":[{"ref":"gen-unicode/src/main.rs:112-124","code":"  112 |     std::process::Command::new(\"cargo\")\n  113 |         .arg(\"fmt\")\n  114 |         .arg(\"--\")\n  115 |         .arg(file_unicode_tables_path)\n  116 |         .output()\n  117 |         .expect(\"Failed to run 'cargo fmt' on unicode tables file\");\n  118 | \n  119 |     std::process::Command::new(\"cargo\")\n  120 |         .arg(\"fmt\")\n  121 |         .arg(\"--\")\n  122 |         .arg(file_tests_path)\n  123 |         .output()\n  124 |         .expect(\"Failed to run 'cargo fmt' on tests file\");","lines":13}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"ReverseSearcher::find_last_match_before always iterates all matches from the beginning of the haystack to find the last match before the current reverse position. Each call to next_back() invokes this O(n) scan, making the full reverse iteration O(n^2) in the number of matches. For a string with M matches, reverse searching costs O(M^2) instead of O(M).","fix":"Collect all matches once in a Vec at construction time, store the Vec in RegexSearcher, and have next_back() pop from the end. Alternatively, walk the Vec by index. This reduces reverse iteration to O(M) total.","locations":[{"ref":"src/api.rs:764-775","code":"  764 |         fn find_last_match_before(&self, pos: usize) -> Option<super::Match> {\n  765 |             // Find all matches up to the given position and return the last one\n  766 |             let mut last_match = None;\n  767 |             for m in self.regex.find_from(self.haystack, 0) {\n  768 |                 if m.end() <= pos {\n  769 |                     last_match = Some(m);\n  770 |                 } else {\n  771 |                     break;\n  772 |                 }\n  773 |             }\n  774 |             last_match\n  775 |         }","lines":12},{"ref":"src/api.rs:840-891","code":"  840 |     unsafe impl<'r, 't> ReverseSearcher<'t> for RegexSearcher<'r, 't> {\n  841 |         fn next_back(&mut self) -> SearchStep {\n  842 |             if self.reverse_done {\n  843 |                 return SearchStep::Done;\n  844 |             }\n  845 | \n  846 |             // Try to find the last match before current reverse position\n  847 |             if let Some(m) = self.find_last_match_before(self.reverse_pos) {\n  848 |                 let match_start = m.start();\n  849 |                 let match_end = m.end();\n  850 | \n  851 |                 // Handle any gap between match end and current reverse position\n  852 |                 if match_end < self.reverse_pos {\n  853 |                     let reject_start = match_end;\n  854 |                     let reject_end = self.reverse_pos;\n  855 |                     self.reverse_pos = match_end;\n  856 |                     return SearchStep::Reject(reject_start, reject_end);\n  857 |                 }\n  858 | \n  859 |                 // Return the match\n  860 |                 self.reverse_pos = match_start;\n  861 | \n  862 |                 // Handle zero-width matches\n  863 |                 if match_start == match_end {\n  864 |                     // For zero-width matches, move back by one character\n  865 |                     if match_start > 0 {\n  866 |                         let mut prev_pos = match_start - 1;\n  867 |                         while prev_pos > 0 && !self.haystack.is_char_boundary(prev_pos) {\n  868 |                             prev_pos -= 1;\n  869 |                         }\n  870 |                         self.reverse_pos = prev_pos;\n  871 |                     } else {\n  872 |                         // We're at the beginning of the string\n  873 |                         self.reverse_done = true;\n  874 |                     }\n  875 |                 }\n  876 | \n  877 |                 SearchStep::Match(match_start, match_end)\n  878 |             } else {\n  879 |                 // No more matches, reject remaining text if any\n  880 |                 if self.reverse_pos > 0 {\n  881 |                     let reject_start = 0;\n  882 |                     let reject_end = self.reverse_pos;\n  883 |                     self.reverse_pos = 0;\n  884 |                     self.reverse_done = true;\n  885 |                     SearchStep::Reject(reject_start, reject_end)\n  886 |                 } else {\n  887 |                     self.reverse_done = true;\n  888 |                     SearchStep::Done\n  889 |                 }\n  890 |             }\n  891 |         }","lines":52}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"replace_all and replace_all_with do not handle zero-width matches specially. When the underlying find_iter returns a zero-width match (e.g. regex /(?:)/ or /a*/), last_end == m.end() and does not advance. The exec layer does advance past the position, so find_iter itself does not loop forever. However, if the regex matches the empty string at every position in a large input, every character of the input is iterated and the replacement closure is called len+1 times, each time for an empty match. This is expected behaviour for zero-width regexes, but there is no warning to users that replace_all on a zero-width-matching regex is O(n) with potentially surprising output.","fix":"Add a note to the doc comments of replace_all and replace_all_with explaining the behaviour with zero-width-matching regexes.","locations":[{"ref":"src/api.rs:570-582","code":"  570 |     pub fn replace_all(&self, text: &str, replacement: &str) -> String {\n  571 |         let mut result = String::with_capacity(text.len());\n  572 |         let mut last_end = 0;\n  573 | \n  574 |         for m in self.find_iter(text) {\n  575 |             result.push_str(&text[last_end..m.start()]);\n  576 |             self.expand_replacement(&m, text, replacement, &mut result);\n  577 |             last_end = m.end();\n  578 |         }\n  579 | \n  580 |         result.push_str(&text[last_end..]);\n  581 |         result\n  582 |     }","lines":13},{"ref":"src/api.rs:638-653","code":"  638 |     pub fn replace_all_with<F>(&self, text: &str, replacement: F) -> String\n  639 |     where\n  640 |         F: Fn(&Match) -> String,\n  641 |     {\n  642 |         let mut result = String::with_capacity(text.len());\n  643 |         let mut last_end = 0;\n  644 | \n  645 |         for m in self.find_iter(text) {\n  646 |             result.push_str(&text[last_end..m.start()]);\n  647 |             result.push_str(&replacement(&m));\n  648 |             last_end = m.end();\n  649 |         }\n  650 | \n  651 |         result.push_str(&text[last_end..]);\n  652 |         result\n  653 |     }","lines":16}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The unsafe `set_len(len - 1)` in `pop_backtrack` skips calling `drop` on the removed element. While this is technically sound today because all `BacktrackInsn` variants contain only `Copy` types (no heap allocations, no destructors), it creates a maintenance hazard: if any future variant adds a field with a `Drop` implementation (e.g. a `Vec` or `Box`), the memory will silently leak without triggering a compiler error. The safe alternative `self.bts.pop()` would have identical performance for `Copy` types since LLVM elides the no-op drop.","fix":"Replace the unsafe block with `self.bts.pop();`. The performance difference is negligible for Copy types; LLVM optimises both paths identically.","locations":[{"ref":"src/classicalbacktrack.rs:97-105","code":"   97 |     fn pop_backtrack(&mut self) {\n   98 |         // Note we never pop the last instruction so this will never be empty.\n   99 |         debug_assert!(!self.bts.is_empty());\n  100 |         if cfg!(feature = \"prohibit-unsafe\") {\n  101 |             self.bts.pop();\n  102 |         } else {\n  103 |             unsafe { self.bts.set_len(self.bts.len() - 1) }\n  104 |         }\n  105 |     }","lines":9}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`CodePointSet::intersect()` uses an O(n*m) double loop over `intervals` (parameter) and `self.intervals()`. Because both slices are sorted and disjoint, a merge-style two-pointer scan would achieve O(n+m) by advancing whichever pointer is behind. The current approach becomes slow when both sets have many intervals.","fix":"Replace the nested loops with a two-pointer merge scan: maintain one index into `intervals` and one into `self.ivs`, advance the one with the smaller `last`, and emit intersections on overlap. This is the same pattern used by `remove()`.","locations":[{"ref":"src/codepointset.rs:315-328","code":"  315 |     pub(crate) fn intersect(&mut self, intervals: &[Interval]) {\n  316 |         let mut new_ivs = Vec::new();\n  317 |         for iv in intervals {\n  318 |             for self_iv in self.intervals() {\n  319 |                 if iv.overlaps(*self_iv) {\n  320 |                     new_ivs.push(Interval {\n  321 |                         first: cmp::max(iv.first, self_iv.first),\n  322 |                         last: cmp::min(iv.last, self_iv.last),\n  323 |                     });\n  324 |                 }\n  325 |             }\n  326 |         }\n  327 |         self.ivs = new_ivs;\n  328 |     }","lines":14}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `ClassSetAlternativeStrings::intersect` (line 247-249) and `remove` (line 251-253), the `other` slice is searched linearly via `other.contains(string)` for every retained string. Both methods are called in loops inside `intersect_operand` and `subtract_operand`. For large sets this is O(n*m). In practice, class set sizes are small, but for deeply nested intersection/subtraction expressions this could be slow.","fix":"Consider sorting the alternatives or using a HashSet for O(n+m) intersection/removal when the sets are large.","locations":[{"ref":"src/parse.rs:247-249","code":"  247 |     fn intersect(&mut self, other: &[Box<[CodePoint]>]) {\n  248 |         self.0.retain(|string| other.contains(string));\n  249 |     }","lines":3},{"ref":"src/parse.rs:251-253","code":"  251 |     fn remove(&mut self, other: &[Box<[CodePoint]>]) {\n  252 |         self.0.retain(|string| !other.contains(string));\n  253 |     }","lines":3}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`unfold_interval()` in `unicode.rs` performs a full linear scan over all entries in the `FOLDS` table on every call (lines 244-273). In contrast, `fold_interval()` uses a binary-search range (`equal_range_by`) to find only the overlapping fold entries. Because `add_icase_code_points()` calls `unfold_interval()` once per interval in the folded set, the total cost is O(K * |FOLDS|) where K is the number of intervals, while `fold_interval` is O(K * log(|FOLDS|) + matches). For large character sets this can be significantly slower than necessary.","fix":"Build an inverse index from transformed-to intervals to fold-range indices at startup (or as a static table), or at minimum use `equal_range_by` on the `transformed_to()` intervals (sort FOLDS by their destination range first). This would let `unfold_interval` skip most of the table.","locations":[{"ref":"src/unicode.rs:241-274","code":"  241 | fn unfold_interval(iv: Interval, recv: &mut CodePointSet) {\n  242 |     // Note: We still need to check all ranges because the relationship between\n  243 |     // transformed_from and transformed_to intervals can be complex\n  244 |     for tr in FOLDS.iter() {\n  245 |         if !iv.overlaps(tr.transformed_to()) {\n  246 |             continue;\n  247 |         }\n  248 | \n  249 |         let modulo = tr.predicate_mask() + 1;\n  250 |         let first_source = tr.first();\n  251 |         let last_source = tr.last();\n  252 | \n  253 |         let mut process_cp = |cp| {\n  254 |             let tcp = tr.apply(cp);\n  255 |             if tcp != cp && iv.contains(tcp) {\n  256 |                 recv.add_one(cp);\n  257 |             }\n  258 |         };\n  259 | \n  260 |         if modulo == 1 {\n  261 |             // Optimization: when modulo is 1, every character in range gets transformed\n  262 |             for cp in first_source..(last_source + 1) {\n  263 |                 process_cp(cp);\n  264 |             }\n  265 |         } else {\n  266 |             // Walk by modulo amount instead of checking every character\n  267 |             let mut cp = first_source;\n  268 |             while cp <= last_source {\n  269 |                 process_cp(cp);\n  270 |                 cp += modulo;\n  271 |             }\n  272 |         }\n  273 |     }\n  274 | }","lines":34},{"ref":"src/unicode.rs:326-338","code":"  326 | pub fn add_icase_code_points(mut input: CodePointSet) -> CodePointSet {\n  327 |     let mut folded = input.clone();\n  328 |     for iv in input.intervals() {\n  329 | bel":"Invalid Comment","severity":"low","easy":true,"description":"Flags::new doc comment says \"'i' means to ignore case, 'm' means multiline, 'u' means unicode\" and then \"Other flags are not implemented and are ignored.\" Both claims are wrong: the 's' (dot_all) and 'v' (unicode_sets) flags ARE implemented and recognised in the same function. The comment has not been updated to reflect added flags.","fix":"Update the doc comment to list all recognised flags: 'i' (icase), 'm' (multiline), 's' (dot_all), 'u' (unicode), 'v' (unicode_sets). Remove the claim that other flags are ignored.","locations":[{"ref":"src/api.rs:59-61","code":"   59 |     /// Construct a Flags from a Unicode codepoints iterator, using JavaScript field names.\n   60 |     /// 'i' means to ignore case, 'm' means multiline, 'u' means unicode.\n   61 |     /// Note the 'g' flag implies a stateful regex and is not supported.","lines":3}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for Regex::with_flags has a stray `//` (non-doc comment) instead of `///` on the blank line between the first sentence and the subsequent note. This causes the second paragraph to be disconnected from the doc comment and invisible to rustdoc.","fix":"Change the bare `//` on line 396 to `///` to keep the paragraph part of the doc comment.","locations":[{"ref":"src/api.rs:395-396","code":"  395 |     //\n  396 |     /// Note it is preferable to cache a Regex which is intended to be used more","lines":2}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `charclasses.rs`, the comment above the first WHITESPACE interval lists U+0009 (TAB), U+000B (VT), and U+000C (FF), but silently omits U+000A (LINE FEED). The range `r('\\u{0009}', '\\u{000C}')` covers all four code points including LF. LF is a LineTerminator in the ES spec (not a WhiteSpace), so including it in an array named WHITESPACE is misleading. The behavioral impact is minimal because `parse.rs` adds the full LINE_TERMINATOR set on top for `\\s`, making LF presence in WHITESPACE redundant rather than incorrect, but the documentation is wrong.","fix":"Either split the range into two non-overlapping intervals (`r('\\u{0009}', '\\u{0009}')` and `r('\\u{000B}', '\\u{000C}')`), or add U+000A to the comment. Also update the comment to not claim this matches ES12 12.2 WhiteSpace exactly.","locations":[{"ref":"src/charclasses.rs:33-38","code":"   33 |     // U+0009 - Character Tabulation - <TAB>\n   34 |     // U+000B - Line Tabulation      - <VT>\n   35 |     // U+000C - Form Feed (FF)       - <FF>\n   36 |     r('\\u{0009}', '\\u{000C}'),\n   37 |     // From unicode “Space_Separator” (`Zs`) category:\n   38 |     //","lines":6}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment at line 26 in `codepointset.rs` reads \"A list of sorted, inclusive, non-empty ranges of code points.\" It is placed directly above `impl Interval` and describes a *list* of Intervals (the invariant of `CodePointSet`), not the `Interval` type or its methods. The misplacement means it appears as documentation for the impl block, not where it belongs.","fix":"Move the comment to be a doc comment on `CodePointSet` (above the struct definition at line 110-113), or rewrite it to describe what `Interval` actually is.","locations":[{"ref":"src/codepointset.rs:26-27","code":"   26 | /// A list of sorted, inclusive, non-empty ranges of code points.\n   27 | impl Interval {","lines":2}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The trait method comments on `next_right_pos` and `next_left_pos` (lines 84 and 87) say 'does not decode the element', but the `Utf16Input` implementations of both methods DO inspect code units to detect surrogate pairs and advance or retreat by two code units when a surrogate pair is found. The comment is accurate only for the `AsciiInput` and `Ucs2Input` implementations.","fix":"Change the comments to 'returns the next position without returning the decoded element value' or similar wording that does not imply the underlying code units are unread.","locations":[{"ref":"src/indexing.rs:84-88","code":"   84 |     // Like next_right, but does not decode the element.\n   85 |     fn next_right_pos(&self, pos: Self::Position) -> Option<Self::Position>;\n   86 | \n   87 |     // Like next_left, but does not decode the element.\n   88 |     fn next_left_pos(&self, pos: Self::Position) -> Option<Self::Position>;","lines":5},{"ref":"src/indexing.rs:973-1022","code":"  973 |     fn next_right_pos(&self, mut pos: Self::Position) -> Option<Self::Position> {\n  974 |         let u1 = self.input.get(self.pos_to_offset(pos)).copied()?;\n  975 |         pos += 1;\n  976 | \n  977 |         // If the code unit is not a high surrogate, it is not the start of a surrogate pair.\n  978 |         if !Self::is_high_surrogate(u1) {\n  979 |             return Some(pos);\n  980 |         }\n  981 | \n  982 |         let Some(u2) = self.input.get(self.pos_to_offset(pos)).copied() else {\n  983 |             return Some(pos);\n  984 |         };\n  985 | \n  986 |         // If the code unit is not a low surrogate, it is not a surrogate pair.\n  987 |         if !Self::is_low_surrogate(u2) {\n  988 |             return Some(pos);\n  989 |         }\n  990 | \n  991 |         pos += 1;\n  992 | \n  993 |         Some(pos)\n  994 |     }\n  995 | \n  996 |     #[inline(always)]\n  997 |     fn next_left_pos(&self, mut pos: Self::Position) -> Option<Self::Position> {\n  998 |         let left_end = self.left_end();\n  999 |         if pos == left_end {\n 1000 |             return None;\n 1001 |         }\n 1002 | \n 1003 |         let u2 = self.input.get(self.pos_to_offset(pos - 1)).copied()?;\n 1004 |         pos -= 1;\n 1005 |
