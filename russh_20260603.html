<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"SealingKey::seal in gcm.rs calls `.unwrap()` on the ring/aws-lc-rs seal result (line 186). If the nonce counter wraps all the way around to the initial nonce value, `seal_in_place_separate_tag` can return `Err(Unspecified)` (nonce exhaustion), causing a panic instead of a recoverable error.","fix":"Return `Result` from `seal` (requires changing the trait signature) or call `.map_err(|_| Error::EncryptionError)?` and propagate the error. Alternatively, enforce a maximum-packet-count limit that prevents nonce exhaustion before it can occur.","locations":[{"ref":"russh/src/cipher/gcm.rs:178-186","code":"  178 |         #[allow(clippy::unwrap_used)]\n  179 |         let tag_out = self\n  180 |             .0\n  181 |             .seal_in_place_separate_tag(\n  182 |                 Aad::from(&packet_length),\n  183 |                 #[allow(clippy::indexing_slicing)]\n  184 |                 &mut plaintext_in_ciphertext_out[super::PACKET_LENGTH_LEN..],\n  185 |             )\n  186 |             .unwrap();"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"Three `unreachable!()` calls in public session methods (`data`, `eof`, `close`, `extended_data`) will panic at runtime if called when `self.common.encrypted` is `None`. These methods are reachable from `handle_msg`, which is called from the main event loop. A race or incorrect state transition could trigger these paths.","fix":"Replace each `unreachable!()` with `Err(crate::Error::Inconsistent)` (matching the pattern used elsewhere in the codebase) so the error is propagated to the caller rather than panicking.","locations":[{"ref":"russh/src/client/session.rs:451","code":"  451 |             unreachable!()"},{"ref":"russh/src/client/session.rs:459","code":"  459 |             unreachable!()"},{"ref":"russh/src/client/session.rs:467","code":"  467 |             unreachable!()"},{"ref":"russh/src/client/session.rs:482","code":"  482 |             unreachable!()"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"encode_mpint panics with index-out-of-bounds when the input slice is all zeros. The while loop increments `i` until `i == s.len()`, then the unconditional `s[i]` access on line 482 reads past the end of the slice.","fix":"Guard the body of encode_mpint: if `i == s.len()` (all-zero input), encode a zero mpint (length 1, byte 0x00) and return early, rather than unconditionally indexing `s[i]`.","locations":[{"ref":"russh/src/kex/mod.rs:477-489","code":"  477 |     let mut i = 0;\n  478 |     while i < s.len() && s[i] == 0 {\n  479 |         i += 1\n  480 |     }\n  481 |     // If the first non-zero is >= 128, write its length (u32, BE), followed by 0.\n  482 |     if s[i] & 0x80 != 0 {\n  483 |         ((s.len() - i + 1) as u32).encode(w)?;\n  484 |         0u8.encode(w)?;\n  485 |     } else {\n  486 |         ((s.len() - i) as u32).encode(w)?;\n  487 |     }\n  488 |     w.write(&s[i..])?;\n  489 |     Ok(())"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"In `russh/src/lib_inner.rs`, `Limits::new` contains an `assert!` macro that will panic if `write_limit` or `read_limit` exceeds 1 GiB. This is a library function callable from user code; panicking is inappropriate — it should return a `Result` instead.","fix":"Replace `assert!(...)` with a `Result`-returning signature: `pub fn new(...) -> Result<Limits, Error>` and return `Err(Error::InvalidConfig(...))` when limits are exceeded.","locations":[{"ref":"russh/src/lib_inner.rs:273","code":"  273 |         assert!(write_limit <= 1 << 30 && read_limit <= 1 << 30);"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"unimplemented!() macro in the live session message loop will panic the session task if any unhandled Msg variant is received. Although the comment claims this is unreachable, Msg variants such as ChannelMsg::RequestPty, ChannelMsg::Open, ChannelMsg::OpenFailure, ChannelMsg::RequestSubsystem etc. are all valid ChannelMsg values that could be constructed and sent through a Handle, reaching this branch.","fix":"Replace `unimplemented!(...)` with a graceful error return or a debug log + `Ok(())`, ensuring the session is not torn down by unexpected internal message types.","locations":[{"ref":"russh/src/server/session.rs:632-635","code":"  632 |                         Some(_) => {\n  633 |                             // should be unreachable, since the receiver only gets\n  634 |                             // messages from methods implemented within russh\n  635 |                             unimplemented!(\"unimplemented (client-only?) message: {:?}\", msg)"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"`CryptoVec::write_all_from` asserts `offset < self.size` (line 350) with a bare `assert!`, which panics on a public method if the caller passes `offset >= size` (including the edge case where `size == 0`).","fix":"Return an `Err(std::io::Error::new(std::io::ErrorKind::InvalidInput, \"offset out of bounds\"))` instead of panicking, or change the signature to return `Result<usize, std::io::Error>` and propagate the error.","locations":[{"ref":"cryptovec/src/cryptovec.rs:350","code":"  350 |         assert!(offset < self.size);"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"SealingKey::seal in chacha20poly1305.rs calls `tag.try_into().unwrap()` (line 140). If the caller ever passes a `tag_out` slice whose length differs from `chacha20_poly1305_openssh::TAG_LEN` (16 bytes), the conversion panics. The trait contract does not statically enforce the tag buffer length.","fix":"Return an error instead of panicking: replace `.unwrap()` with `.map_err(|_| /* unreachable in practice */)?` after making `seal` return a `Result`, or add a `debug_assert_eq!` and document the invariant more explicitly.","locations":[{"ref":"russh/src/cipher/chacha20poly1305.rs:139-141","code":"  139 |             #[allow(clippy::unwrap_used)]\n  140 |             tag.try_into().unwrap(),\n  141 |         );"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"SealingKey::finish_packet and SealingKey::write both contain bare `assert!` calls (cipher/mod.rs lines 226, 232, 267, 272) that will panic in production if a caller builds a packet exceeding `u32::MAX` bytes or a padding value exceeding `u8::MAX`. These are reachable if an attacker-controlled channel window or payload size is large enough.","fix":"Replace bare `assert!` with checked arithmetic returning `Error::PacketSize` or similar, so the connection can be torn down cleanly rather than crashing the process.","locations":[{"ref":"russh/src/cipher/mod.rs:226-232","code":"  226 |         assert!(packet_length <= u32::MAX as usize);\n  227 |         BigEndian::write_u32(\n  228 |             &mut buffer.buffer[offset..offset + PACKET_LENGTH_LEN],\n  229 |             packet_length as u32,\n  230 |         );\n  231 | \n  232 |         assert!(padding_length <= u8::MAX as usize);"},{"ref":"russh/src/cipher/mod.rs:267-272","code":"  267 |         assert!(packet_length <= u32::MAX as usize);\n  268 |         buffer\n  269 |             .buffer\n  270 |             .extend_from_slice(&(packet_length as u32).to_be_bytes());\n  271 | \n  272 |         assert!(padding_length <= u8::MAX as usize);"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"`unimplemented!()` macro is called in `handle_msg` for any `Msg` variant that is not matched. The comment says this should be unreachable, but the match arm is actually reachable for any future `Msg` variants added to the enum (e.g. from a different code path), causing a panic instead of an error.","fix":"Replace `unimplemented!(...)` with `return Err(crate::Error::Inconsistent)` or add a `debug!` log and silently continue.","locations":[{"ref":"russh/src/client/mod.rs:1500-1504","code":" 1500 |             msg => {\n 1501 |                 // should be unreachable, since the receiver only gets\n 1502 |                 // messages from methods implemented within russh\n 1503 |                 unimplemented!(\"unimplemented (server-only?) message: {:?}\", msg)\n 1504 |             }"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"Session::close() and Session::eof() call unreachable!() when self.common.encrypted is None. Although this should not be reachable after the initial key exchange, any code path that calls these methods before encryption is established will panic the task rather than returning an error.","fix":"Replace `unreachable!()` with `Err(Error::Inconsistent)` to match the pattern used elsewhere (e.g., channel_open_generic at line 1186).","locations":[{"ref":"russh/src/server/session.rs:893-899","code":"  893 |     /// Close a channel.\n  894 |     pub fn close(&mut self, channel: ChannelId) -> Result<(), Error> {\n  895 |         if let Some(ref mut enc) = self.common.encrypted {\n  896 |             enc.close(channel)\n  897 |         } else {\n  898 |             unreachable!()\n  899 |         }"},{"ref":"russh/src/server/session.rs:902-909","code":"  902 |     /// Send EOF to a channel\n  903 |     pub fn eof(&mut self, channel: ChannelId) -> Result<(), Error> {\n  904 |         if let Some(ref mut enc) = self.common.encrypted {\n  905 |             enc.eof(channel)\n  906 |         } else {\n  907 |             unreachable!()\n  908 |         }\n  909 |     }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"Session::data() and Session::extended_data() call unreachable!() when self.common.encrypted is None. Same argument as above: callers invoke these via the Handle dispatch loop before confirming encryption is active.","fix":"Replace `unreachable!()` with `Err(Error::Inconsistent)`.","locations":[{"ref":"russh/src/server/session.rs:917-925","code":"  917 |     pub fn data(&mut self, channel: ChannelId, data: impl Into<bytes::Bytes>) -> Result<(), Error> {\n  918 |         let is_rekeying = self.kex.active();\n  919 |         let common = &mut self.common;\n  920 |         if let Some(enc) = common.encrypted.as_mut() {\n  921 |             enc.data_with_writer(&mut common.packet_writer, channel, data, is_rekeying)\n  922 |         } else {\n  923 |             unreachable!()\n  924 |         }\n  925 |     }"},{"ref":"russh/src/server/session.rs:944-952","code":"  944 |                 channel,\n  945 |                 extended,\n  946 |                 data,\n  947 |                 is_rekeying,\n  948 |             )\n  949 |         } else {\n  950 |             unreachable!()\n  951 |         }\n  952 |     }"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","description":"`Encrypted::data` and related methods contain `assert!(channel.confirmed)` in production code\n(not inside `#[test]`). These fire as hard panics instead of errors if a caller sends data to\na channel that has not yet been confirmed by the peer. An application that races a\ndata-send with a channel-open can therefore crash the server/client process.\nAffected lines in session.rs: 571, 595, 624, 647.","fix":"Replace `assert!(channel.confirmed)` with a proper error return, for example:\n  `if !channel.confirmed { return Err(crate::Error::Inconsistent); }`","locations":[{"ref":"russh/src/session.rs:571","code":"  571 |             assert!(channel.confirmed);"},{"ref":"russh/src/session.rs:595","code":"  595 |             assert!(channel.confirmed);"},{"ref":"russh/src/session.rs:624","code":"  624 |             assert!(channel.confirmed);"},{"ref":"russh/src/session.rs:647","code":"  647 |             assert!(channel.confirmed);"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","description":"`Encrypted::flush` reads a 4-byte big-endian length from `self.write[self.write_cursor..]`\nusing `BigEndian::read_u32` without first verifying that at least 4 bytes remain.\nThe loop guard `write_cursor < write.len()` only ensures ≥1 byte is present.\nIf the buffer is corrupt (e.g., due to a bug elsewhere writing a partial packet), the slice\nindexing will panic at runtime. Similarly, the subsequent slice\n`&self.write[(write_cursor+4)..(write_cursor+4+len)]` is not bounds-checked against\n`write.len()` before indexing, creating a second potential panic.","fix":"Before calling `BigEndian::read_u32`, assert or check that `write.len() - write_cursor >= 4`,\nand similarly verify that `write_cursor + 4 + len <= write.len()` before slicing.\nReturn `Err(Error::Inconsistent)` on failure rather than panicking.","locations":[{"ref":"russh/src/session.rs:671-681","code":"  671 |             while self.write_cursor < self.write.len() {\n  672 |                 // Read a single packet, encrypt and send it.\n  673 |                 #[allow(clippy::indexing_slicing)] // length checked\n  674 |                 let len = BigEndian::read_u32(&self.write[self.write_cursor..]) as usize;\n  675 |                 #[allow(clippy::indexing_slicing)]\n  676 |                 let to_write = &self.write[(self.write_cursor + 4)..(self.write_cursor + 4 + len)];\n  677 |                 trace!(\"session_write_encrypted, buf = {to_write:?}\");\n  678 | \n  679 |                 writer.packet_raw(to_write)?;\n  680 |                 self.write_cursor += 4 + len\n  681 |             }"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","description":"`unreachable!()` is used in `process_packet` for the `EncryptedState::InitCompression` branch. While this state should not occur during normal packet processing (it is transitioned immediately after flushing), a malformed or reordered internal state could trigger the panic.","fix":"Return `Err(crate::Error::Inconsistent)` instead of calling `unreachable!()`.","locations":[{"ref":"russh/src/client/encrypted.rs:310","code":"  310 |                 EncryptedState::InitCompression => unreachable!(),"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","description":"`PublicKeyBase64::public_key_base64` in `russh/src/keys/mod.rs` calls two\n`assert_eq!(s.pop(), Some('\\n'))` / `assert_eq!(s.pop(), Some('\\r'))` on the\nresult of `BASE64_MIME.encode(...)`. If the underlying `public_key_bytes()` implementation\nreturns an empty slice, BASE64_MIME produces an empty string and both `pop()` calls return\n`None`, causing a runtime panic. While this scenario is unlikely with current key types,\nit is a fragile API assumption.","fix":"Replace the asserts with a result-based approach or use `trim_end_matches(['', '\n'])`\non the raw encoded string, removing the CRLF unconditionally and safely without panicking.","locations":[{"ref":"russh/src/keys/mod.rs:229-232","code":"  229 |         let mut s = BASE64_MIME.encode(&self.public_key_bytes());\n  230 |         assert_eq!(s.pop(), Some('\\n'));\n  231 |         assert_eq!(s.pop(), Some('\\r'));\n  232 |         s.replace(\"\\r\\n\", \"\")"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"In `wmmessage::get_current_process_user`, `OpenProcessToken` writes a handle into `process_token`. If `GetTokenInformation` (the first call, which is expected to fail) or the second `GetTokenInformation` succeeds but the subsequent `*(buffer.as_ptr() as *const TOKEN_USER)` operation panics or the function returns early, the process token handle is never closed. The `CloseHandle` at line 226 is only reached on the happy path.","fix":"Wrap `process_token` in a RAII handle guard (or use a scopeguard/defer macro) that closes it on all exit paths, rather than relying on a single explicit `CloseHandle` at the end of the happy path.","locations":[{"ref":"pageant/src/wmmessage.rs:205-228","code":"  205 | fn get_current_process_user() -> Result<TOKEN_USER, Error> {\n  206 |     unsafe {\n  207 |         let mut process_token = HANDLE::default();\n  208 |         OpenProcessToken(\n  209 |             GetCurrentProcess(),\n  210 |             TOKEN_QUERY,\n  211 |             &mut process_token as *mut _,\n  212 |         )?;\n  213 | \n  214 |         let mut info_size = 0;\n  215 |         let _ = GetTokenInformation(process_token, TokenUser, None, 0, &mut info_size);\n  216 | \n  217 |         let mut buffer = vec![0; info_size as usize];\n  218 |         GetTokenInformation(\n  219 |             process_token,\n  220 |             TokenUser,\n  221 |             Some(buffer.as_mut_ptr() as *mut _),\n  222 |             buffer.len() as u32,\n  223 |             &mut info_size,\n  224 |         )?;\n  225 |         let user: TOKEN_USER = *(buffer.as_ptr() as *const _);\n  226 |         let _ = CloseHandle(process_token);\n  227 |         Ok(user)\n  228 |     }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In `Msg::AwaitExtensionInfo` handling, the `reply_channel` oneshot sender is silently dropped (never sent to) if the session is not encrypted yet (`self.common.encrypted` is `None`). The caller (`await_extension_info`) will then hang until its 1-second `tokio::time::timeout` expires. While not a permanent leak, this is a silent failure mode that delays the RSA hash negotiation path.","fix":"If `self.common.encrypted` is None, immediately send `()` on the reply_channel to unblock the caller (the extension info has not been received, so the timeout behavior is acceptable but explicit).","locations":[{"ref":"russh/src/client/mod.rs:1470-1486","code":" 1470 |             Msg::AwaitExtensionInfo {\n 1471 |                 extension_name,\n 1472 |                 reply_channel,\n 1473 |             } => {\n 1474 |                 if let Some(ref mut enc) = self.common.encrypted {\n 1475 |                     // Drop if the extension has been seen already\n 1476 |                     if !enc.received_extensions.contains(&extension_name) {\n 1477 |                         // There will be no new extension info after authentication\n 1478 |                         // has succeeded\n 1479 |                         if !matches!(enc.state, EncryptedState::Authenticated) {\n 1480 |                             enc.extension_info_awaiters\n 1481 |                                 .entry(extension_name)\n 1482 |                                 .or_insert(vec![])\n 1483 |                                 .push(reply_channel);\n 1484 |                         }\n 1485 |                     }\n 1486 |                 }"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In `send_keepalive` (session.rs), a `GlobalRequestResponse::Keepalive` entry is unconditionally pushed to `open_global_requests` even when `self.common.encrypted` is `None` (line 407-408). If the session is not yet encrypted, the keepalive packet is never sent, but the queue entry is still enqueued. Subsequent REQUEST_SUCCESS or REQUEST_FAILURE responses will then be matched against this phantom keepalive entry, causing misalignment of the response queue.","fix":"Only push the `GlobalRequestResponse::Keepalive` entry when the packet is actually written (inside the `if let Some(ref mut enc)` block).","locations":[{"ref":"russh/src/client/session.rs:406-417","code":"  406 |     pub fn send_keepalive(&mut self, want_reply: bool) -> Result<(), crate::Error> {\n  407 |         self.open_global_requests\n  408 |             .push_back(crate::session::GlobalRequestResponse::Keepalive);\n  409 |         if let Some(ref mut enc) = self.common.encrypted {\n  410 |             push_packet!(enc.write, {\n  411 |                 msg::GLOBAL_REQUEST.encode(&mut enc.write)?;\n  412 |                 \"keepalive@openssh.com\".encode(&mut enc.write)?;\n  413 |                 (want_reply as u8).encode(&mut enc.write)?;\n  414 |             });\n  415 |         }\n  416 |         Ok(())\n  417 |     }"}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"The same `open_global_requests` queue misalignment issue exists in `no_more_sessions` (session.rs line 432-443) and `send_ping` (lines 419-429): the response entry is enqueued before checking whether encryption is available, so if the encrypted channel is absent, the packet is not written but the queue entry remains.","fix":"Move the `open_global_requests.push_back(...)` call inside the `if let Some(ref mut enc)` block.","locations":[{"ref":"russh/src/client/session.rs:419-429","code":"  419 |     pub fn send_ping(&mut self, reply_channel: oneshot::Sender<()>) -> Result<(), crate::Error> {\n  420 |         self.open_global_requests\n  421 |             .push_back(crate::session::GlobalRequestResponse::Ping(reply_channel));\n  422 |         if let Some(ref mut enc) = self.common.encrypted {\n  423 |             push_packet!(enc.write, {\n  424 |                 msg::GLOBAL_REQUEST.encode(&mut enc.write)?;\n  425 |                 \"keepalive@openssh.com\".encode(&mut enc.write)?;\n  426 |                 (true as u8).encode(&mut enc.write)?;\n  427 |             });\n  428 |         }\n  429 |         Ok(())"},{"ref":"russh/src/client/session.rs:432-443","code":"  432 |     pub fn no_more_sessions(&mut self, want_reply: bool) -> Result<(), crate::Error> {\n  433 |         self.open_global_requests\n  434 |             .push_back(crate::session::GlobalRequestResponse::NoMoreSessions);\n  435 |         if let Some(ref mut enc) = self.common.encrypted {\n  436 |             push_packet!(enc.write, {\n  437 |                 msg::GLOBAL_REQUEST.encode(&mut enc.write)?;\n  438 |                 \"no-more-sessions@openssh.com\".encode(&mut enc.write)?;\n  439 |                 (want_reply as u8).encode(&mut enc.write)?;\n  440 |             });\n  441 |         }\n  442 |         Ok(())\n  443 |     }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In CHANNEL_WINDOW_ADJUST handling, `new_size` (u32) is decremented by the return value of flush_pending_with_writer cast from usize to u32 without overflow/underflow protection. If the flush writes more bytes than new_size (which can happen when pending data exceeds the newly advertised window), `new_size` wraps around to a very large u32, causing the channel's effective window size to appear enormous. This is then both stored in a channel state and forwarded to the application handler.","fix":"Use saturating_sub: `new_size = new_size.saturating_sub(flushed as u32);` — the value passed to the handler and used for window updates should never wrap.","locations":[{"ref":"russh/src/server/encrypted.rs:1066-1071","code":" 1066 |                 let common = &mut self.common;\n 1067 |                 if let Some(enc) = common.encrypted.as_mut() {\n 1068 |                     new_size -= enc\n 1069 |                         .flush_pending_with_writer(&mut common.packet_writer, channel_num)?\n 1070 |                         as u32;\n 1071 |                 }"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`Encrypted::adjust_window_size` in `session.rs` casts `data.len()` to `u32` before\ncomparing it to `channel.sender_window_size`. On 64-bit platforms, if `data.len()`\nexceeds `u32::MAX` (≈ 4 GiB), the cast silently truncates and the comparison at line 298\nmay be incorrect, causing the window to be decremented by the wrong amount. SSH's own\nmax packet size caps prevent this in normal operation, but the implicit truncation is\nan unsound cast.","fix":"Use `u32::try_from(data.len()).unwrap_or(u32::MAX)` or guard with\n`if data.len() <= channel.sender_window_size as usize` to avoid the truncating cast.","locations":[{"ref":"russh/src/session.rs:298-299","code":"  298 |             if data.len() as u32 <= channel.sender_window_size {\n  299 |                 channel.sender_window_size -= data.len() as u32;"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"max_auth_attempts is never enforced. Config::max_auth_attempts is defined with a default of 10 and exposed in the API, but auth_attempts is only incremented (encrypted.rs:99) and used to select the initial-rejection timer (encrypted.rs:54); the count is never compared against max_auth_attempts anywhere in the codebase. A client can make unlimited authentication attempts, making password brute-forcing trivially easy.","fix":"After incrementing auth_attempts (line 99), check `self.common.auth_attempts >= self.common.config.max_auth_attempts` and, if exceeded, send SSH_MSG_DISCONNECT with reason DISCONNECT_BY_APPLICATION and return an error to close the connection.","locations":[{"ref":"russh/src/server/mod.rs:91-92","code":"   91 |     pub max_auth_attempts: usize,\n   92 |     /// Time after which the connection is garbage-collected."},{"ref":"russh/src/server/encrypted.rs:54-63","code":"   54 |         let initial_none_rejection_wait_until = if self.common.auth_attempts == 0 {\n   55 |             tokio::time::Instant::now()\n   56 |                 + self\n   57 |                     .common\n   58 |                     .config\n   59 |                     .auth_rejection_time_initial\n   60 |                     .unwrap_or(self.common.config.auth_rejection_time)\n   61 |         } else {\n   62 |             rejection_wait_until\n   63 |         };"},{"ref":"russh/src/server/encrypted.rs:99","code":"   99 |                 self.common.auth_attempts += 1;"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In cipher/mod.rs `read()`, after decryption the `padding_length` is read from the first byte of plaintext (line 334). The code then computes `plaintext_end = plaintext.len().checked_sub(padding_length)` but does NOT subtract the mandatory 1-byte `padding_length` field itself. The returned slice therefore includes the padding-length byte as part of the payload, which is an off-by-one in the SSH framing: the real payload starts at `plaintext[1..]` and ends at `plaintext[1 + actual_payload_len]`, not at `plaintext[0..plaintext_end]`.","fix":"Consume the padding-length byte before computing the payload bounds: `let payload = &plaintext[1..plaintext.len() - padding_length]`. The final `buffer.buffer.resize` and return value must be updated accordingly (add 4 for the packet-length prefix, but exclude the padding-length byte from the counted payload).","locations":[{"ref":"russh/src/cipher/mod.rs:334-349","code":"  334 |     let padding_length = *plaintext.first().to_owned().unwrap_or(&0) as usize;\n  335 |     trace!(\"reading, padding_length {padding_length:?}\");\n  336 |     let plaintext_end = plaintext\n  337 |         .len()\n  338 |         .checked_sub(padding_length)\n  339 |         .ok_or(Error::IndexOutOfBounds)?;\n  340 | \n  341 |     // Sequence numbers are on 32 bits and wrap.\n  342 |     // https://tools.ietf.org/html/rfc4253#section-6.4\n  343 |     buffer.seqn += Wrapping(1);\n  344 |     buffer.len = 0;\n  345 | \n  346 |     // Remove the padding\n  347 |     buffer.buffer.resize(plaintext_end + 4, 0);\n  348 | \n  349 |     Ok(plaintext_end + 4)"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In `wait_recv_reply`, a `None` result from the receiver (meaning the channel was dropped / the session died) is silently mapped to `AuthResult::Failure` with empty `remaining_methods`. This hides session errors from callers of `authenticate_password`, `authenticate_publickey`, and `authenticate_openssh_cert`: they receive a successful `Ok(AuthResult::Failure { ... })` rather than an error, making it impossible to distinguish 'server explicitly rejected' from 'connection dropped'.","fix":"Return `Err(crate::Error::RecvError)` when `recv()` returns `None`, consistent with the handling in `wait_recv_keyboard_interactive_reply` (line 382).","locations":[{"ref":"russh/src/client/mod.rs:401-405","code":"  401 |                 None => {\n  402 |                     return Ok(AuthResult::Failure {\n  403 |                         remaining_methods: MethodSet::empty(),\n  404 |                         partial_success: false,\n  405 |                     });"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"partial_success from the handler's Auth::Reject response is immediately overwritten by an unconditional `auth_request.partial_success = false` on the very next line. This affects all three authentication methods that set it (password at line 576/580, none at line 617/621, and publickey at line 797/799). RFC 4252 §5.1 defines partial success as a protocol-level signal that a method succeeded as part of multi-factor authentication; silently discarding it makes it impossible for handlers to use multi-method authentication flows.","fix":"Remove the unconditional `auth_request.partial_success = false` lines (580, 621, 799). The `partial_success` field should only be reset by `reject_auth_request` once it has been sent, or left as the handler returned it.","locations":[{"ref":"russh/src/server/encrypted.rs:570-581","code":"  570 |                     if let Auth::Reject {\n  571 |                         proceed_with_methods: Some(proceed_with_methods),\n  572 |                         partial_success,\n  573 |                     } = auth\n  574 |                     {\n  575 |                         auth_request.methods = proceed_with_methods;\n  576 |                         auth_request.partial_success = partial_success;\n  577 |                     } else {\n  578 |                         auth_request.methods.remove(MethodKind::Password);\n  579 |                     }\n  580 |                     auth_request.partial_success = false;\n  581 |                     reject_auth_request(until, &mut self.write, auth_request).await?;"},{"ref":"russh/src/server/encrypted.rs:611-622","code":"  611 |                     if let Auth::Reject {\n  612 |                         proceed_with_methods: Some(proceed_with_methods),\n  613 |                         partial_success,\n  614 |                     } = auth\n  615 |                     {\n  616 |                         auth_request.methods = proceed_with_methods;\n  617 |                         auth_request.partial_success = partial_success;\n  618 |                     } else {\n  619 |                         auth_request.methods.remove(MethodKind::None);\n  620 |                     }\n  621 |                     auth_request.partial_success = false;\n  622 |                     reject_auth_request(until, &mut self.write, auth_request).await?;"},{"ref":"russh/src/server/encrypted.rs:791-801","code":"  791 |                                 if let Auth::Reject {\n  792 |                                     proceed_with_methods: Some(proceed_with_methods),\n  793 |                                     partial_success,\n  794 |                                 } = auth\n  795 |                                 {\n  796 |                                     auth_request.methods = proceed_with_methods;\n  797 |                                     auth_request.partial_success = partial_success;\n  798 |                                 }\n  799 |                                 auth_request.partial_success = false;\n  800 |                                 auth_user.clear();\n  801 |                                 reject_auth_request(until, &mut self.write, auth_request).await?;"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `pageant/src/interface.rs`, if both `namedpipes` and `wmmessage` features are disabled, the `PageantStream::new` function body has no `#[cfg]` branches that actually return a value, yet the function signature promises `Result<Self, Error>`. With both features disabled the only reachable code is `Err(Error::Multiple(errors))` with an empty `errors` vec, making this a semantically misleading error (\"Multiple Errors\" with zero errors).","fix":"Add a `compile_error!` or `#[cfg(not(any(...)))]` block that fails at compile time if neither transport feature is enabled, rather than producing a runtime error with a nonsensical message.","locations":[{"ref":"pageant/src/interface.rs:51-57","code":"   51 |         if errors.len() == 1\n   52 |             && let Some(err) = errors.pop()\n   53 |         {\n   54 |             Err(err)\n   55 |         } else {\n   56 |             Err(Error::Multiple(errors))\n   57 |         }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `wmmessage::query_pageant_direct`, the guard `if buf.len() < 4` after `map.read(4)` is always false: `map.read(n)` unconditionally returns `vec![0; n]` which has exactly `n` elements. The check is dead/misleading code; the real risk (reading past the mapped region) is not caught.","fix":"Remove the dead check and instead fix `MemoryMap::read` to return `Result<Vec<u8>, Error>` with a bounds check, propagating any overflow error here.","locations":[{"ref":"pageant/src/wmmessage.rs:276-279","code":"  276 |     let mut buf = map.read(4);\n  277 |     if buf.len() < 4 {\n  278 |         return Err(Error::NoResponse);\n  279 |     }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"%H and %h expand to the same value (both call self.host()). In OpenSSH, %H is the original hostname typed by the user and %h is the hostname after any Hostname substitution. Using the post-substitution hostname for %H is semantically wrong and may cause unexpected behaviour when ProxyCommand uses %H to refer to the original typed host.","fix":"Store the original typed hostname separately from the (possibly substituted) hostname. Have %h expand to the possibly-rewritten hostname and %H expand to the original `self.host_name`.","locations":[{"ref":"russh-config/src/lib.rs:178-179","code":"  178 |         string = string.replace(\"%h\", self.host()); // remote hostname (from context \"host\")\n  179 |         string = string.replace(\"%H\", self.host()); // remote hostname (from context \"host\")"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The `parse_ssh_config` function returns `Err(Error::HostNotFound)` when global (pre-Host-block) parameters are found with no preceding Host stanza. This mirrors the real behaviour of OpenSSH, which accepts a global section; returning an error silently rejects valid configs that use global options before the first Host block.","fix":"Treat a parameter section with no Host pattern as a wildcard / global section that matches every host (equivalent to 'Host *'), rather than returning an error.","locations":[{"ref":"russh-config/src/lib.rs:250-252","code":"  250 |                     } else if found_params {\n  251 |                         return Err(Error::HostNotFound);\n  252 |                     }"},{"ref":"russh-config/src/lib.rs:304-307","code":"  304 |     } else if found_params {\n  305 |         // Found configurations, but no Host (or Match) key.\n  306 |         return Err(Error::HostNotFound);\n  307 |     }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In cipher/block.rs `SealingKey::padding_length`, the `extra_len` variable (line 229) includes `self.mac.mac_len()` in the threshold comparison but the SSH RFC 4253 padding calculation should not include the MAC in the comparison against `MINIMUM_PACKET_LEN`, because the MAC is appended outside the encrypted packet. This can produce a padding length that is one block too short for very small payloads when a MAC is in use, potentially creating packets below the 16-byte minimum encrypted length.","fix":"Remove `self.mac.mac_len()` from `extra_len`; the MAC does not contribute to the encrypted payload length that must meet the minimum-16-byte requirement.","locations":[{"ref":"russh/src/cipher/block.rs:229-235","code":"  229 |         let extra_len = PACKET_LENGTH_LEN + super::PADDING_LENGTH_LEN + self.mac.mac_len();\n  230 | \n  231 |         let padding_len = if payload.len() + extra_len <= super::MINIMUM_PACKET_LEN {\n  232 |             super::MINIMUM_PACKET_LEN - payload.len() - super::PADDING_LENGTH_LEN - pll\n  233 |         } else {\n  234 |             block_size - ((pll + super::PADDING_LENGTH_LEN + payload.len()) % block_size)\n  235 |         };"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `cipher/mod.rs`, the `read` function increments `buffer.seqn` (line 343) after a successful `cipher.open()` call but before the padding-length validation (lines 336-339). If the padding length is invalid (larger than the plaintext), `Error::IndexOutOfBounds` is returned but the sequence number has already been advanced. This desynchronises the receive sequence number from the remote peer's send sequence number, causing all subsequent MAC verifications to fail and tearing down the connection unnecessarily.","fix":"Move the `buffer.seqn += Wrapping(1)` increment to after successful padding validation, or check padding validity before incrementing the sequence number.","locations":[{"ref":"russh/src/cipher/mod.rs:332-344","code":"  332 |     let plaintext = cipher.open(seqn, &mut buffer.buffer)?;\n  333 | \n  334 |     let padding_length = *plaintext.first().to_owned().unwrap_or(&0) as usize;\n  335 |     trace!(\"reading, padding_length {padding_length:?}\");\n  336 |     let plaintext_end = plaintext\n  337 |         .len()\n  338 |         .checked_sub(padding_length)\n  339 |         .ok_or(Error::IndexOutOfBounds)?;\n  340 | \n  341 |     // Sequence numbers are on 32 bits and wrap.\n  342 |     // https://tools.ietf.org/html/rfc4253#section-6.4\n  343 |     buffer.seqn += Wrapping(1);\n  344 |     buffer.len = 0;"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `FuturePublicKey` signing: the data returned in `Msg::Signed` is copied unnecessarily by `data[..].to_vec()` even though `data` is already a `Vec<u8>`. More critically, the auth packet is only written if `self.common.buffer.len() != len` (line 257), meaning if the signer returns a blob whose byte length happens to equal `len` (the length before signing was appended), the USERAUTH_REQUEST packet is silently dropped and no auth packet is ever sent to the server.","fix":"Remove the length equality guard — always write the push_packet block after receiving the signed data; the check `len != buffer.len()` is not a reliable indicator that signing succeeded.","locations":[{"ref":"russh/src/client/encrypted.rs:250-263","code":"  250 |                                     self.common.buffer = loop {\n  251 |                                         match self.receiver.recv().await {\n  252 |                                             Some(Msg::Signed { data }) => break data[..].to_vec(),\n  253 |                                             None => return Err(crate::Error::RecvError.into()),\n  254 |                                             _ => {}\n  255 |                                         }\n  256 |                                     };\n  257 |                                     if self.common.buffer.len() != len {\n  258 |                                         // The buffer was modified.\n  259 |                                         push_packet!(enc.write, {\n  260 |                                             #[allow(clippy::indexing_slicing)] // length checked\n  261 |                                             enc.write.extend_from_slice(&self.common.buffer[i..]);\n  262 |                                         })\n  263 |                                     }"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The same silent-drop bug exists in the `FutureCertificate` branch: the USERAUTH_REQUEST packet is only written if `self.common.buffer.len() != len`. If the signed blob happens to be the same length as the presigning content, no auth packet is emitted.","fix":"Same fix as FuturePublicKey — always emit the push_packet block after receiving Msg::Signed data.","locations":[{"ref":"russh/src/client/encrypted.rs:283-296","code":"  283 |                                     self.common.buffer = loop {\n  284 |                                         match self.receiver.recv().await {\n  285 |                                             Some(Msg::Signed { data }) => break data,\n  286 |                                             None => return Err(crate::Error::RecvError.into()),\n  287 |                                             _ => {}\n  288 |                                         }\n  289 |                                     };\n  290 |                                     if self.common.buffer.len() != len {\n  291 |                                         // The buffer was modified.\n  292 |                                         push_packet!(enc.write, {\n  293 |                                             #[allow(clippy::indexing_slicing)] // length checked\n  294 |                                             enc.write.extend(&self.common.buffer[i..]);\n  295 |                                         })\n  296 |                                     }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `client_send_auth_response`, the response count is encoded as `responses.len().try_into().unwrap_or(0)`. If the conversion fails (i.e. more than `u32::MAX` responses, which cannot happen in practice but is still unsound), the count 0 is written while the actual response strings are still written in the loop, producing a malformed authentication packet.","fix":"Return an error if `responses.len()` does not fit in `u32`, instead of silently substituting 0.","locations":[{"ref":"russh/src/client/encrypted.rs:1116","code":" 1116 |             (responses.len().try_into().unwrap_or(0) as u32).encode(&mut self.write)?; // number of responses"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `authenticate_publickey_with` and `authenticate_certificate_with`, a `None` from the receiver is also silently converted to `Ok(AuthResult::Failure { remaining_methods: empty, partial_success: false })` instead of propagating an error, masking dropped-connection scenarios.","fix":"Return `Err(S::Error::from(crate::Error::RecvError))` when `recv()` returns `None`.","locations":[{"ref":"russh/src/client/mod.rs:498-503","code":"  498 |                 None => {\n  499 |                     return Ok(AuthResult::Failure {\n  500 |                         remaining_methods: MethodSet::empty(),\n  501 |                         partial_success: false,\n  502 |                     });\n  503 |                 }"},{"ref":"russh/src/client/mod.rs:560-565","code":"  560 |                 None => {\n  561 |                     return Ok(AuthResult::Failure {\n  562 |                         remaining_methods: MethodSet::empty(),\n  563 |                         partial_success: false,\n  564 |                     });\n  565 |                 }"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`Server::max_auth_attempts` (default 10) is declared in `russh/src/server/mod.rs` and\n`AuthRequest::rejection_count` is incremented on every rejected authentication request\n(`server/encrypted.rs:881`), but `rejection_count` is **never compared** to\n`max_auth_attempts`. The server therefore never disconnects a client that submits unlimited\nauthentication attempts; the only anti-brute-force protection is the per-attempt delay\n(`auth_rejection_time`). This allows a slow brute-force attack against passwords or keys\nthat bypasses the declared attempt limit.","fix":"After incrementing `rejection_count` (or after incrementing `auth_attempts`) in\n`reject_auth_request`, compare it to `config.max_auth_attempts` and, if exceeded, call\n`self.disconnect(Disconnect::TooManyConnections, ...)` and return an error.","locations":[{"ref":"russh/src/server/mod.rs:91","code":"   91 |     pub max_auth_attempts: usize,"},{"ref":"russh/src/server/encrypted.rs:881","code":"  881 |     auth_request.rejection_count += 1;"},{"ref":"russh/src/auth.rs:236","code":"  236 |     pub rejection_count: usize,"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The default implementation of Handler::lookup_dh_gex_group ignores min/max group size constraints when picking the final group. The second loop (lines 815-820) selects any group larger than the preferred size without checking whether it also falls within [min_group_size, max_group_size]. If no group falls in the valid range, the function still returns DH_GROUP14 (the initial value of best_group), which may violate the client's stated minimum or maximum. Per RFC 4419 §3, the server MUST respect the bounds.","fix":"In the second loop, add the same min/max guard: `if group.bit_size() >= gex_params.min_group_size() && group.bit_size() <= gex_params.max_group_size() && group.bit_size() > gex_params.preferred_group_size()`. Also return an error (rather than a default group) if no group satisfies the constraints.","locations":[{"ref":"russh/src/server/mod.rs:801-824","code":"  801 |         async {\n  802 |             let mut best_group = &DH_GROUP14;\n  803 | \n  804 |             // Find _some_ matching group\n  805 |             for group in BUILTIN_SAFE_DH_GROUPS.iter() {\n  806 |                 if group.bit_size() >= gex_params.min_group_size()\n  807 |                     && group.bit_size() <= gex_params.max_group_size()\n  808 |                 {\n  809 |                     best_group = *group;\n  810 |                     break;\n  811 |                 }\n  812 |             }\n  813 | \n  814 |             // Find _closest_ matching group\n  815 |             for group in BUILTIN_SAFE_DH_GROUPS.iter() {\n  816 |                 if group.bit_size() > gex_params.preferred_group_size() {\n  817 |                     best_group = *group;\n  818 |                     break;\n  819 |                 }\n  820 |             }\n  821 | \n  822 |             Ok(Some(best_group.clone()))\n  823 |         }\n  824 |     }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Lines with only a keyword but no value (tokens.len() != 2) are silently skipped rather than being treated as a parse error or logged. A misconfigured file will appear to parse successfully with no diagnostic.","fix":"Add a `debug!` or `warn!` log message for unrecognised or malformed lines, or return a parse error for lines that have a known keyword but no value.","locations":[{"ref":"russh-config/src/lib.rs:215-295","code":"  215 |         let tokens = line.splitn(2, ' ').collect::<Vec<&str>>();\n  216 |         if tokens.len() == 2 {\n  217 |             let (key, value) = (tokens.first().unwrap_or(&\"\"), tokens.get(1).unwrap_or(&\"\"));\n  218 |             let lower = key.to_lowercase();\n  219 |             if lower != \"host\" {\n  220 |                 found_params = true;\n  221 |             }\n  222 |             match lower.as_str() {\n  223 |                 \"host\" => {\n  224 |                     let patterns = value\n  225 |                         .split_ascii_whitespace()\n  226 |                         .filter_map(|pattern| {\n  227 |                             if pattern.is_empty() {\n  228 |                                 None\n  229 |                             } else {\n  230 |                                 let (pattern, negated) =\n  231 |                                     if let Some(pattern) = pattern.strip_prefix('!') {\n  232 |                                         (pattern, true)\n  233 |                                     } else {\n  234 |                                         (pattern, false)\n  235 |                                     };\n  236 |                                 Some(HostPattern {\n  237 |                                     pattern: pattern.to_string(),\n  238 |                                     negated,\n  239 |                                 })\n  240 |                             }\n  241 |                         })\n  242 |                         .collect();\n  243 | \n  244 |                     if let Some(host_patterns) = host_patterns.take() {\n  245 |                         let host_config = std::mem::take(&mut config);\n  246 |                         entries.push(HostEntry {\n  247 |                             host_patterns,\n  248 |                             host_config,\n  249 |                         });\n  250 |                     } else if found_params {\n  251 |                         return Err(Error::HostNotFound);\n  252 |                     }\n  253 | \n  254 |                     found_params = false;\n  255 |                     host_patterns = Some(patterns);\n  256 |                 }\n  257 |                 \"user\" => config.user = Some(value.trim_start().to_string()),\n  258 |                 \"hostname\" => config.hostname = Some(value.trim_start().to_string()),\n  259 |                 \"port\" => {\n  260 |                     if let Ok(port) = value.trim_start().parse::<u16>() {\n  261 |                         config.port = Some(port)\n  262 |                     }\n  263 |                 }\n  264 |                 \"identityfile\" => {\n  265 |                     let identity_file = value.trim_start().strip_quotes().expand_home()?;\n  266 |                     if let Some(files) = config.identity_file.as_mut() {\n  267 |                         files.push(identity_file);\n  268 |                     } else {\n  269 |                         config.identity_file = Some(vec![identity_file])\n  270 |                     }\n  271 |                 }\n  272 |                 \"proxycommand\" => config.proxy_command = Some(value.trim_start().to_string()),\n  273 |                 \"proxyjump\" => config.proxy_jump = Some(value.trim_start().to_string()),\n  274 |                 \"addkeystoagent\" => {\n  275 |                     let value = match value.to_lowercase().as_str() {\n  276 |                         \"yes\" => AddKeysToAgent::Yes,\n  277 |                         \"confirm\" => AddKeysToAgent::Confirm,\n  278 |                         \"ask\" => AddKeysToAgent::Ask,\n  279 |                         _ => AddKeysToAgent::No,\n  280 |                     };\n  281 |                     config.add_keys_to_agent = Some(value)\n  282 |                 }\n  283 |                 \"userknownhostsfile\" => {\n  284 |                     config.user_known_hosts_file =\n  285 |                         Some(value.trim_start().strip_quotes().expand_home()?);\n  286 |                 }\n  287 |                 \"stricthostkeychecking\" => match value.to_lowercase().as_str() {\n  288 |                     \"no\" => config.strict_host_key_checking = Some(false),\n  289 |                     _ => config.strict_host_key_checking = Some(true),\n  290 |                 },\n  291 |                 key => {\n  292 |                     debug!(\"{key:?}\");\n  293 |                 }\n  294 |             }\n  295 |         }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ssh_config(5) allows the '=' separator between keyword and value (e.g. 'Port=22'), and also allows tab as whitespace between keyword and value. The parser only splits on a single space (`splitn(2, ' ')`), so any line using '=' or a tab separator is silently ignored.","fix":"Split on any whitespace or '=' character: e.g. `line.splitn(2, |c: char| c.is_whitespace() || c == '=')`, then trim leading whitespace from the value part.","locations":[{"ref":"russh-config/src/lib.rs:215","code":"  215 |         let tokens = line.splitn(2, ' ').collect::<Vec<&str>>();"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `russh-util/src/time.rs`, the wasm32 `Instant::duration_since` method calls `.expect(\"Duration is negative\")` if the arithmetic produces a negative duration (i.e. `earlier` is actually after `self`). This will panic in wasm builds when clocks are skewed or when the function is called with arguments in the wrong order.","fix":"Return `std::time::Duration::ZERO` (or a `Result`) for negative durations to match the behaviour of `std::time::Instant::duration_since` on non-wasm targets, which saturates to zero rather than panicking.","locations":[{"ref":"russh-util/src/time.rs:22-25","code":"   22 |             (self.inner - earlier.inner)\n   23 |                 .to_std()\n   24 |                 .expect(\"Duration is negative\")\n   25 |         }"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `handle_ext_info`, the `name` variable is cloned for `enc.received_extensions.push(name.clone())` even when the extension name has already been used. Additionally, if `name == \"server-sig-algs\"`, the `handle_server_sig_algs_ext` reads data from `r`, but then the `else` branch for unknown extensions is skipped — meaning the `NameList` bytes have already been consumed. The `received_extensions.push(name.clone())` runs for `server-sig-algs` but the awaiters lookup uses the same name — this is correct. However, the `ensure_end(r)` at line 341 is called after the loop, but if a malformed packet has leftover bytes after the last extension, only the final iteration's leftover is checked.","fix":"Low impact; the code is mostly correct. Consider moving `ensure_end` inside the loop or documenting that it only applies post-loop.","locations":[{"ref":"russh/src/client/encrypted.rs:321-342","code":"  321 |     fn handle_ext_info(&mut self, r: &mut impl Reader) -> Result<(), Error> {\n  322 |         let n_extensions = u32::decode(r)? as usize;\n  323 |         debug!(\"Received EXT_INFO, {n_extensions:?} extensions\");\n  324 |         for _ in 0..n_extensions {\n  325 |             let name = String::decode(r)?;\n  326 |             if name == \"server-sig-algs\" {\n  327 |                 self.handle_server_sig_algs_ext(r)?;\n  328 |             } else {\n  329 |                 let data = Vec::<u8>::decode(r)?;\n  330 |                 debug!(\"* {name:?} (unknown, data: {data:?})\");\n  331 |             }\n  332 |             if let Some(ref mut enc) = self.common.encrypted {\n  333 |                 enc.received_extensions.push(name.clone());\n  334 |                 if let Some(mut senders) = enc.extension_info_awaiters.remove(&name) {\n  335 |                     senders.drain(..).for_each(|w| {\n  336 |                         let _ = w.send(());\n  337 |                     });\n  338 |                 }\n  339 |             }\n  340 |         }\n  341 |         ensure_end(r)?;\n  342 |         Ok(())"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `write_auth_request_if_needed`, when the session is in `WaitingAuthRequest` state, `enc.write_auth_request` is called (line 943) even though the same user/method was already written when the state was entered. This causes a duplicate USERAUTH_REQUEST to be sent to the server on subsequent authentication attempts while still in `WaitingAuthRequest` state.","fix":"Only call `enc.write_auth_request` when transitioning from `WaitingAuthServiceRequest` with `accepted == true`, not when already in `WaitingAuthRequest`.","locations":[{"ref":"russh/src/client/encrypted.rs:921-951","code":"  921 |         if let Some(ref mut enc) = self.common.encrypted {\n  922 |             is_waiting = match enc.state {\n  923 |                 EncryptedState::WaitingAuthRequest(_) => true,\n  924 |                 EncryptedState::WaitingAuthServiceRequest {\n  925 |                     accepted,\n  926 |                     ref mut sent,\n  927 |                 } => {\n  928 |                     debug!(\"sending ssh-userauth service requset\");\n  929 |                     if !*sent {\n  930 |                         self.common.packet_writer.write_packet(|w| {\n  931 |                             msg::SERVICE_REQUEST.encode(w)?;\n  932 |                             \"ssh-userauth\".encode(w)?;\n  933 |                             Ok(())\n  934 |                         })?;\n  935 |                         *sent = true\n  936 |                     }\n  937 |                     accepted\n  938 |                 }\n  939 |                 EncryptedState::InitCompression | EncryptedState::Authenticated => false,\n  940 |             };\n  941 |             debug!(\"write_auth_request_if_needed: is_waiting = {is_waiting:?}\");\n  942 |             if is_waiting {\n  943 |                 enc.write_auth_request(user, &meth)?;\n  944 |                 let auth_request = AuthRequest::new(&meth);\n  945 |                 enc.state = EncryptedState::WaitingAuthRequest(auth_request);\n  946 |             }\n  947 |         }\n  948 |         self.common.auth_user.clear();\n  949 |         self.common.auth_user.push_str(user);\n  950 |         self.common.auth_method = Some(meth);\n  951 |         Ok(is_waiting)"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `reply` (mod.rs), when `strict_kex` is active and the session is pre-authentication (`encrypted.is_none()`), the sequence number check subtracts 1 from `pkt.seqn.0` without checking for underflow. If `pkt.seqn.0 == 0` (wrapping subtraction on `u32`), the computed `seqno` wraps to `u32::MAX`, which is then cast to `usize`, causing an incorrect sequence number to be validated.","fix":"Use saturating or checked subtraction, or compare `pkt.seqn.0.wrapping_sub(1)` explicitly with appropriate handling.","locations":[{"ref":"russh/src/client/mod.rs:1567-1568","code":" 1567 |             let seqno = pkt.seqn.0 - 1; // was incremented after read()\n 1568 |             validate_server_msg_strict_kex(*message_type, seqno as usize)?;"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `request_pty`, the terminal-modes length field is pre-computed as `(1 + 5 * terminal_modes.len()) as u32` (line 129). However, the loop skips entries where `code == Pty::TTY_OP_END` with `continue`, so the actual bytes written may be fewer than the announced count, producing a malformed pty-req packet if any TTY_OP_END codes are present in the slice.","fix":"Filter out TTY_OP_END entries before computing the length, or count the entries after filtering.","locations":[{"ref":"russh/src/client/session.rs:129-137","code":"  129 |                     ((1 + 5 * terminal_modes.len()) as u32).encode(&mut enc.write)?;\n  130 |                     for &(code, value) in terminal_modes {\n  131 |                         if code == Pty::TTY_OP_END {\n  132 |                             continue;\n  133 |                         }\n  134 |                         (code as u8).encode(&mut enc.write)?;\n  135 |                         value.encode(&mut enc.write)?;\n  136 |                     }\n  137 |                     (Pty::TTY_OP_END as u8).encode(&mut enc.write)?;"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `negotiation.rs` the `read_kex` function discards the `cipher server-to-client` field\n(line 277) but correctly selects the cipher from the `cipher client-to-server` list.\nThe selected cipher is then used symmetrically for both directions. This matches RFC 4253\n§7.1 (both sides negotiate the same cipher), but the discarded field means the server's\n`server-to-client` cipher preference advertised by the remote peer is completely ignored.\nIf a remote peer advertises different ciphers for the two directions this is silently\naccepted instead of being flagged as unexpected, and MAC negotiation for `server_mac` reads\nthe next name-list after `client_mac` regardless of direction.\n\nMore concretely: the code reads one cipher name-list (client-to-server) and uses it for\nboth directions, discarding the second list with no attempt to verify they match. While\nrussh itself always advertises identical lists for both directions (`write_kex` duplicates\nthe cipher and MAC lists), a peer advertising mismatched lists could cause a silently\nincorrect negotiation.","fix":"After decoding `cipher server-to-client`, either verify it matches the negotiated\n`cipher client-to-server` value, or perform a separate selection for the second direction\nand log/warn if they differ.","locations":[{"ref":"russh/src/negotiation.rs:274-304","code":"  274 |         let cipher_list = NameList::decode(&mut r)?;\n  275 |         let (_cipher_both_first, cipher) =\n  276 |             Self::select(&pref.cipher, &cipher_list, AlgorithmKind::Cipher)?;\n  277 |         String::decode(&mut r)?; // cipher server-to-client.\n  278 | \n  279 |         // MAC\n  280 | \n  281 |         let need_mac = CIPHERS.get(&cipher).map(|x| x.needs_mac()).unwrap_or(false);\n  282 | \n  283 |         let client_mac =\n  284 |             match Self::select(&pref.mac, &NameList::decode(&mut r)?, AlgorithmKind::Mac) {\n  285 |                 Ok((_, m)) => m,\n  286 |                 Err(e) => {\n  287 |                     if need_mac {\n  288 |                         return Err(e);\n  289 |                     } else {\n  290 |                         mac::NONE\n  291 |                     }\n  292 |                 }\n  293 |             };\n  294 |         let server_mac =\n  295 |             match Self::select(&pref.mac, &NameList::decode(&mut r)?, AlgorithmKind::Mac) {\n  296 |                 Ok((_, m)) => m,\n  297 |                 Err(e) => {\n  298 |                     if need_mac {\n  299 |                         return Err(e);\n  300 |                     } else {\n  301 |                         mac::NONE\n  302 |                     }\n  303 |                 }\n  304 |             };"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In server_handle_channel_open, when the handler returns an error (Err variant), the channel ChannelRef (reference) is not inserted into self.channels and finalize_channel_open is not called, so neither a CHANNEL_OPEN_CONFIRMATION nor a CHANNEL_OPEN_FAILURE is sent to the client. The client will wait indefinitely for a response that never comes. This applies to all five channel type branches (Session, X11, DirectTcpip, ForwardedTcpIp, DirectStreamLocal).","fix":"In the error branch, call `self.finalize_channel_open(&msg, channel_params, false)` to send SSH_OPEN_ADMINISTRATIVELY_PROHIBITED before propagating the error, so the client receives a rejection.","locations":[{"ref":"russh/src/server/encrypted.rs:1584-1648","code":" 1584 |             ChannelType::Session => {\n 1585 |                 let mut result = handler.channel_open_session(channel, self).await;\n 1586 |                 if let Ok(allowed) = &mut result {\n 1587 |                     self.channels.insert(sender_channel, reference);\n 1588 |                     self.finalize_channel_open(&msg, channel_params, *allowed)?;\n 1589 |                 }\n 1590 |                 result\n 1591 |             }\n 1592 |             ChannelType::X11 {\n 1593 |                 originator_address,\n 1594 |                 originator_port,\n 1595 |             } => {\n 1596 |                 let mut result = handler\n 1597 |                     .channel_open_x11(channel, originator_address, *originator_port, self)\n 1598 |                     .await;\n 1599 |                 if let Ok(allowed) = &mut result {\n 1600 |                     self.channels.insert(sender_channel, reference);\n 1601 |                     self.finalize_channel_open(&msg, channel_params, *allowed)?;\n 1602 |                 }\n 1603 |                 result\n 1604 |             }\n 1605 |             ChannelType::DirectTcpip(d) => {\n 1606 |                 let mut result = handler\n 1607 |                     .channel_open_direct_tcpip(\n 1608 |                         channel,\n 1609 |                         &d.host_to_connect,\n 1610 |                         d.port_to_connect,\n 1611 |                         &d.originator_address,\n 1612 |                         d.originator_port,\n 1613 |                         self,\n 1614 |                     )\n 1615 |                     .await;\n 1616 |                 if let Ok(allowed) = &mut result {\n 1617 |                     self.channels.insert(sender_channel, reference);\n 1618 |                     self.finalize_channel_open(&msg, channel_params, *allowed)?;\n 1619 |                 }\n 1620 |                 result\n 1621 |             }\n 1622 |             ChannelType::ForwardedTcpIp(d) => {\n 1623 |                 let mut result = handler\n 1624 |                     .channel_open_forwarded_tcpip(\n 1625 |                         channel,\n 1626 |                         &d.host_to_connect,\n 1627 |                         d.port_to_connect,\n 1628 |                         &d.originator_address,\n 1629 |                         d.originator_port,\n 1630 |                         self,\n 1631 |                     )\n 1632 |                     .await;\n 1633 |                 if let Ok(allowed) = &mut result {\n 1634 |                     self.channels.insert(sender_channel, reference);\n 1635 |                     self.finalize_channel_open(&msg, channel_params, *allowed)?;\n 1636 |                 }\n 1637 |                 result\n 1638 |             }\n 1639 |             ChannelType::DirectStreamLocal(d) => {\n 1640 |                 let mut result = handler\n 1641 |                     .channel_open_direct_streamlocal(channel, &d.socket_path, self)\n 1642 |                     .await;\n 1643 |                 if let Ok(allowed) = &mut result {\n 1644 |                     self.channels.insert(sender_channel, reference);\n 1645 |                     self.finalize_channel_open(&msg, channel_params, *allowed)?;\n 1646 |                 }\n 1647 |                 result\n 1648 |             }"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The inactivity timer is only reset when data is received OR a keepalive was not sent (lines 668-675). When a keepalive IS sent the timer is not reset, meaning the inactivity timeout can fire on the same iteration as the keepalive, potentially disconnecting a client that is simply idle but otherwise healthy. The keepalive mechanism and the inactivity mechanism serve different purposes (liveness vs. idleness) and resetting inactivity on any received data (line 673) should be sufficient — but the current guard `if !sent_keepalive` prevents a reset even when data was received in the same loop iteration where a keepalive was also sent.","fix":"Separate the two conditions: always reset the inactivity timer when `self.common.received_data` is true, independently of `sent_keepalive`.","locations":[{"ref":"russh/src/server/session.rs:668-675","code":"  668 |             if !sent_keepalive {\n  669 |                 if let (futures::future::Either::Right(ref mut sleep), Some(d)) = (\n  670 |                     inactivity_timer.as_mut().as_pin_mut(),\n  671 |                     self.common.config.inactivity_timeout,\n  672 |                 ) {\n  673 |                     sleep.as_mut().reset(tokio::time::Instant::now() + d);\n  674 |                 }\n  675 |             }"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `ssh_read.rs` the `read_ssh_id_inner` function checks `ssh_id.bytes_read > 0`\n(line 184) before testing `bytes_read > SSH_ID_MAX_LINE_LEN` (line 185), but\n`ssh_id.bytes_read` is assigned as the line-end offset (e.g., `i + 2` for `\\r\\n`),\nwhich is the position **past** the terminator. The check `bytes_read > SSH_ID_MAX_LINE_LEN`\ntherefore rejects lines with a `\\r\\n`-terminated payload of exactly 255 bytes (total\nline_end = 257), which would be valid per RFC 4253 (max 255 chars plus CRLF). However,\nthis scenario is unreachable because the `total >= SSH_ID_MAX_LINE_LEN` (255) check at\nline 176 would trigger first, returning `Error::Version`. The dead guard on line 185 adds\nconfusion without providing any real protection.","fix":"Remove the redundant `bytes_read > SSH_ID_MAX_LINE_LEN` check at line 185; the `total >= SSH_ID_MAX_LINE_LEN` check at line 176 already covers it.","locations":[{"ref":"russh/src/ssh_read.rs:184-186","code":"  184 |             if ssh_id.bytes_read > 0 {\n  185 |                 if ssh_id.bytes_read > SSH_ID_MAX_LINE_LEN {\n  186 |                     return Err(Error::Version);"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","description":"In `wmmessage::PageantStream::new`, the background task spawned via `tokio::spawn` runs in a detached fire-and-forget fashion. Any error from `two.write_all(&response)` (which returns `std::io::Result<()>`) causes the task to exit silently. The caller using `one` (the other half of the duplex) will simply see an EOF or stall with no indication of what went wrong.","fix":"Log errors from the background task before returning. Consider using a shared error channel (e.g. `tokio::sync::watch`) to propagate the error back to callers of the stream.","locations":[{"ref":"pageant/src/wmmessage.rs:39-62","code":"   39 |         tokio::spawn(async move {\n   40 |             let mut buf = BytesMut::new();\n   41 |             while let Ok(n) = two.read_buf(&mut buf).await {\n   42 |                 if n == 0 {\n   43 |                     break;\n   44 |                 }\n   45 |                 if buf.len() < 4 {\n   46 |                     continue;\n   47 |                 }\n   48 |                 let len = BigEndian::read_u32(&buf) as usize;\n   49 |                 if buf.len() < len + 4 {\n   50 |                     continue;\n   51 |                 }\n   52 |                 let msg = buf.split_to(len + 4).freeze();\n   53 |                 let Ok(response) = query_pageant_direct(cookie.clone(), &msg).map_err(|e| {\n   54 |                     debug!(\"Pageant query failed: {:?}\", e);\n   55 |                     e\n   56 |                 }) else {\n   57 |                     break;\n   58 |                 };\n   59 |                 two.write_all(&response).await?\n   60 |             }\n   61 |             std::io::Result::Ok(())\n   62 |         });"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In `namedpipes::PageantStream::capi_obfuscate_string`, the result of `CryptProtectMemory` is explicitly discarded with `let _ = ...` and a comment says 'Errors are explicitly ignored'. If `CryptProtectMemory` fails (e.g. the DPAPI service is unavailable), the pipe name is computed from unencrypted data, silently producing the wrong pipe name and causing a connection failure with no diagnostic.","fix":"Propagate the error: remove `let _ =` and use `?`, returning an appropriate `Error` variant. Add a dedicated error variant such as `Error::CryptProtectMemoryFailed` if needed.","locations":[{"ref":"pageant/src/namedpipes.rs:101-108","
