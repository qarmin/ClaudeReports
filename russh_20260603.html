code":"  101 |         unsafe {\n  102 |             // Errors are explicitly ignored:\n  103 |             let _ = CryptProtectMemory(\n  104 |                 cryptdata.as_mut_ptr() as *mut _,\n  105 |                 cryptlen as u32,\n  106 |                 CRYPTPROTECTMEMORY_CROSS_PROCESS,\n  107 |             );\n  108 |         }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In `wmmessage::MemoryMap::new`, `MapViewOfFile` can return a null/zero view on failure without setting a Win32 error that `?` would catch, because `MapViewOfFile` returns `MEMORY_MAPPED_VIEW_ADDRESS` (a struct), not a `windows::core::Result`. The code does not check whether `view.Value` is null before using it, leading to a null-pointer write in `MemoryMap::write`.","fix":"Check `if view.Value.is_null() { return Err(Error::from_win32()); }` immediately after calling `MapViewOfFile`.","locations":[{"ref":"pageant/src/wmmessage.rs:133-139","code":"  133 |         let view = unsafe { MapViewOfFile(filemap, FILE_MAP_WRITE, 0, 0, 0) };\n  134 |         Ok(Self {\n  135 |             filemap,\n  136 |             view,\n  137 |             length,\n  138 |             pos: 0,\n  139 |         })"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In `connect_stream`, the error from `config.maximum_packet_size > 65535` check is only logged, not returned. The connection proceeds with an oversized packet size that could cause interoperability failures. The error message text also has a grammar mistake: 'should not larger than' instead of 'should not be larger than'.","fix":"Return an `Err(H::Error::from(crate::Error::InvalidConfig(...)))` when `maximum_packet_size > 65535`, or at minimum correct the log message grammar.","locations":[{"ref":"russh/src/client/mod.rs:1005-1010","code":" 1005 |     if config.maximum_packet_size > 65535 {\n 1006 |         error!(\n 1007 |             \"Maximum packet size ({:?}) should not larger than a TCP packet (65535)\",\n 1008 |             config.maximum_packet_size\n 1009 |         );\n 1010 |     }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `russh-util/src/runtime.rs`, the `spawn` function silently discards the result of `sender.send(result)` with `let _ = sender.send(result)`. If the receiver (`JoinHandle`) has been dropped before the task completes, the task result is lost without any logging or diagnostic. While this matches tokio's behaviour for detached tasks, callers may not expect silent result loss.","fix":"This is acceptable for a spawn abstraction, but add a doc comment explaining that results are silently dropped if the JoinHandle is dropped before the task completes.","locations":[{"ref":"russh-util/src/runtime.rs:44-46","code":"   44 |         let result = future.await;\n   45 |         let _ = sender.send(result);\n   46 |     });"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `client_read_authenticated`, for the `CHANNEL_OPEN_CONFIRMATION` message, if the channel is not found in `self.channels` (line 382-393), only an `error!` log is emitted and execution continues to call `client.channel_open_confirmation(...)`. The handler then receives a confirmation for a channel it does not track, which may cause confusion or misuse.","fix":"Return `Err(crate::Error::Inconsistent.into())` when no channel is found for the confirmed id, consistent with the treatment of unknown channels elsewhere.","locations":[{"ref":"russh/src/client/encrypted.rs:382-393","code":"  382 |                 if let Some(channel) = self.channels.get(&local_id) {\n  383 |                     channel\n  384 |                         .send(ChannelMsg::Open {\n  385 |                             id: local_id,\n  386 |                             max_packet_size: msg.maximum_packet_size,\n  387 |                             window_size: msg.initial_window_size,\n  388 |                         })\n  389 |                         .await\n  390 |                         .unwrap_or(());\n  391 |                 } else {\n  392 |                     error!(\"no channel for id {local_id:?}\");\n  393 |                 }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","description":"ProxyCommand is split on literal space before being passed to Command::new/args. This means any path containing spaces (e.g. 'C:\\Program Files\\...') breaks the command, and no shell escaping or quoting is respected. The real-world ssh_config ProxyCommand values routinely contain quoted paths or special characters that this naive split will mangle.","fix":"Use a proper shell-word splitter (e.g. the `shlex` crate) instead of `split(' ')`. Replace `proxy_command.split(' ').collect::<Vec<_>>()` with `shlex::split(&proxy_command).ok_or(Error::InvalidProxyCommand)?` and pass the resulting Vec elements to cmd/args.","locations":[{"ref":"russh-config/src/lib.rs:188-190","code":"  188 |             let cmd: Vec<&str> = proxy_command.split(' ').collect();\n  189 |             Stream::proxy_command(cmd.first().unwrap_or(&\"\"), cmd.get(1..).unwrap_or(&[]))\n  190 |                 .await"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","description":"Curve25519 secret scalars are generated using `Scalar::from_bytes_mod_order(rand::random::<[u8; 32]>())` in both curve25519.rs (lines 77, 96) and hybrid_mlkem.rs (lines 97, 121). `from_bytes_mod_order` reduces the random bytes modulo the group order, introducing a tiny but non-zero bias that is not present with the correct `Scalar::from_bits` (clamping) or a rejection-sampling construction. For Curve25519/X25519 key agreement this is a cryptographic weakness.","fix":"Use `Scalar::from_bits(rand::random::<[u8; 32]>())` (which applies the standard X25519 clamping) or use the `x25519-dalek` crate's `EphemeralSecret`/`StaticSecret` API which handles key generation correctly.","locations":[{"ref":"russh/src/kex/curve25519.rs:77","code":"   77 |         let server_secret = Scalar::from_bytes_mod_order(rand::random::<[u8; 32]>());"},{"ref":"russh/src/kex/curve25519.rs:96","code":"   96 |         let client_secret = Scalar::from_bytes_mod_order(rand::random::<[u8; 32]>());"},{"ref":"russh/src/kex/hybrid_mlkem.rs:97","code":"   97 |         let s_secret = Scalar::from_bytes_mod_order(rand::random::<[u8; 32]>());"},{"ref":"russh/src/kex/hybrid_mlkem.rs:121","code":"  121 |         let x25519_secret = Scalar::from_bytes_mod_order(rand::random::<[u8; 32]>());"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"In `wmmessage::MemoryMap::read`, the function reads `n` bytes starting at `self.pos` without any bounds check. If `self.pos + n > self.length`, this reads past the end of the memory-mapped region, which is undefined behaviour in Rust's safety model (via a raw pointer dereference).","fix":"Add a bounds check: if `self.pos + n > self.length { return Err(Error::Overflow); }` (change the signature to `Result<Vec<u8>, Error>`), or at minimum panic with a clear message. The call sites in `query_pageant_direct` already check `buf.len() < 4` after the fact, but that check is on the result buffer length (which is always 4 because `vec![0; 4]` is infallible), not on memory safety.","locations":[{"ref":"pageant/src/wmmessage.rs:167-178","code":"  167 |     fn read(&mut self, n: usize) -> Vec<u8> {\n  168 |         let out = vec![0; n];\n  169 |         unsafe {\n  170 |             std::ptr::copy_nonoverlapping(\n  171 |                 self.view.Value.add(self.pos) as *const u8,\n  172 |                 out.as_ptr() as *mut u8,\n  173 |                 n,\n  174 |             );\n  175 |         }\n  176 |         self.pos += n;\n  177 |         out\n  178 |     }"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"In `wmmessage::query_pageant_direct`, after reading the 4-byte length prefix from the memory map, the code extends `buf` with `map.read(size)` where `size` comes from untrusted Pageant output and is not validated. An attacker-controlled Pageant process could set `size` to a huge value causing `vec![0; size]` to exhaust heap memory or cause an OOM abort, and the subsequent `copy_nonoverlapping` would read past the mapped region.","fix":"Validate that `size <= _AGENT_MAX_MSGLEN - 4` before reading, and add bounds checking to `MemoryMap::read`.","locations":[{"ref":"pageant/src/wmmessage.rs:281-282","code":"  281 |     let size = u32::from_be_bytes([buf[0], buf[1], buf[2], buf[3]]) as usize;\n  282 |     buf.extend(map.read(size));"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"In the GCM `Nonce` implementation (gcm.rs lines 88-102), when the 96-bit nonce counter overflows (carry remains non-zero after the loop), the overflow is silently discarded. This is not a practical concern in a single session but violates the requirement that nonces must be unique; a nonce counter overflow should trigger a key re-exchange or connection termination.","fix":"After the increment loop, check if `carry != 0` and return `Err(Unspecified)` to signal nonce exhaustion (ring/aws-lc-rs's `NonceSequence` contract explicitly allows returning `Err` to trigger rekeying).","locations":[{"ref":"russh/src/cipher/gcm.rs:93-99","code":"   93 |         let mut carry = 1;\n   94 |         #[allow(clippy::indexing_slicing)] // length checked\n   95 |         for i in (0..NONCE_LEN).rev() {\n   96 |             let n = self.0[i] as u16 + carry;\n   97 |             self.0[i] = n as u8;\n   98 |             carry = n >> 8;\n   99 |         }"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"In `mac/crypto.rs`, `make_mac` calls `key.copy_from_slice(mac_key)` (line 32) without checking that `mac_key.len() == KL::to_usize()`. If the caller passes a key of the wrong length the slice copy panics at runtime. The internal call path from `compute_keys` does size the key correctly, but the `MacAlgorithm` trait is `pub(crate)` and any future internal caller could pass the wrong length.","fix":"Return an error if `mac_key.len() != KL::to_usize()`, or assert and document the invariant clearly. The `MacAlgorithm::make_mac` signature could be changed to return `Result<Box<dyn Mac + Send>, Error>`.","locations":[{"ref":"russh/src/mac/crypto.rs:31-32","code":"   31 |         let mut key = GenericArray::<u8, KL>::default();\n   32 |         key.copy_from_slice(mac_key);"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"`known_hosts_path()` in `russh/src/keys/known_hosts.rs` calls the deprecated\n`std::env::home_dir()` function (deprecated since Rust 1.29 for incorrect behaviour on\nsome platforms). On Windows with non-UTF-8 home paths this can return wrong results.","fix":"Use the `home` crate (`home::home_dir()`) or `std::env::var(\"HOME\")` with a fallback to\nproduce a correct and non-deprecated home-directory path.","locations":[{"ref":"russh/src/keys/known_hosts.rs:51-55","code":"   51 | fn known_hosts_path() -> Result<PathBuf, Error> {\n   52 |     env::home_dir()\n   53 |         .map(|home_dir| home_dir.join(\".ssh\").join(\"known_hosts\"))\n   54 |         .ok_or(Error::NoHomeDir)\n   55 | }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"In `russh-config/src/lib.rs`, `expand_tokens` repeatedly calls `self.user()` and `self.host()` (each of which may call `whoami::username()` or a field access) for every token substitution and also chains multiple `String::replace` calls, each of which allocates a new `String`. For ProxyCommand strings this happens just once per connection, but the pattern is suboptimal.","fix":"Compute `user` and `host` once before the replacement chain and reuse them. Consider using a single-pass replacement (e.g. iterating the string once) for larger strings.","locations":[{"ref":"russh-config/src/lib.rs:175-183","code":"  175 |     fn expand_tokens(&self, original: &str) -> String {\n  176 |         let mut string = original.to_string();\n  177 |         string = string.replace(\"%u\", &self.user());\n  178 |         string = string.replace(\"%h\", self.host()); // remote hostname (from context \"host\")\n  179 |         string = string.replace(\"%H\", self.host()); // remote hostname (from context \"host\")\n  180 |         string = string.replace(\"%p\", &format!(\"{}\", self.port())); // original typed hostname (from context \"host\")\n  181 |         string = string.replace(\"%%\", \"%\");\n  182 |         string\n  183 |     }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"In `russh-config/src/lib.rs`, `parse_ssh_config` calls `key.to_lowercase()` to get `lower`, and then immediately calls `lower.as_str()` in a match. This allocates a new `String` for every non-comment, non-empty line in the config file.","fix":"Use `unicase` or compare case-insensitively with `eq_ignore_ascii_case`, or convert once and match on the `&str` slice directly (which the code already does via `.as_str()` — the allocation itself is the issue, not the match).","locations":[{"ref":"russh-config/src/lib.rs:218-219","code":"  218 |             let lower = key.to_lowercase();\n  219 |             if lower != \"host\" {"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"`MethodSet::push` calls `self.remove(method)` unconditionally before pushing, which\nperforms a linear scan of the entire list even when the method being pushed is not\nalready present (the common case). For small sets this is negligible, but the API doc\ndocuments this as intended. The implementation is correct but slightly inefficient.","fix":"Check for existence first with `self.0.contains(&method)` before calling `remove`.\nOr replace with a structure that provides O(1) membership like a small bitset over\nthe five known variants.","locations":[{"ref":"russh/src/auth.rs:131-134","code":"  131 |     pub fn push(&mut self, method: MethodKind) {\n  132 |         self.remove(method);\n  133 |         self.0.push(method);\n  134 |     }"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"In `cipher/block.rs`, `CtrWrapper::unchecked_apply_keystream_inout` and `unchecked_write_keystream` (lines 80-93) reconstruct a fresh cipher instance from the stored key/IV and seek to `self.pos` on every call. This means every invocation re-initialises AES key schedule and performs a seek, adding unnecessary overhead compared to keeping the live cipher state.","fix":"Store the active `C` cipher directly in `CtrWrapper` instead of (or in addition to) the raw key and IV. Keep the key/IV only for the `Clone` (probe) path. Constructing the cipher once per key-exchange and re-using it through the session eliminates repeated key-schedule setup.","locations":[{"ref":"russh/src/cipher/block.rs:80-93","code":"   80 |     fn unchecked_apply_keystream_inout(&mut self, buf: InOutBuf<'_, '_, u8>) {\n   81 |         let mut cipher = C::new(&self.key, &self.initial_iv);\n   82 |         cipher.seek(self.pos);\n   83 |         cipher.unchecked_apply_keystream_inout(buf);\n   84 |         self.pos = cipher.current_pos();\n   85 |     }\n   86 | \n   87 |     fn unchecked_write_keystream(&mut self, buf: &mut [u8]) {\n   88 |         let mut cipher = C::new(&self.key, &self.initial_iv);\n   89 |         cipher.seek(self.pos);\n   90 |         cipher.unchecked_write_keystream(buf);\n   91 |         self.pos = cipher.current_pos();\n   92 |     }\n   93 | }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"In `client_read_encrypted`, the `pkt.buffer` is converted to a plain `&[u8]` slice reference and passed to `process_packet`, but `pkt` itself is a mutable reference. The function signature could take `&pkt.buffer` directly without the indirection through `client_read_encrypted`. Minor, but the extra function call and ref construction add overhead on every received packet.","fix":"Consider inlining or calling `process_packet` directly from `reply()` to eliminate the indirection.","locations":[{"ref":"russh/src/client/encrypted.rs:38-52","code":"   38 |     pub(crate) async fn client_read_encrypted<H: Handler>(\n   39 |         &mut self,\n   40 |         client: &mut H,\n   41 |         pkt: &mut IncomingSshPacket,\n   42 |     ) -> Result<(), H::Error> {\n   43 |         #[allow(clippy::indexing_slicing)] // length checked\n   44 |         {\n   45 |             trace!(\n   46 |                 \"client_read_encrypted, buf = {:?}\",\n   47 |                 &pkt.buffer[..pkt.buffer.len().min(20)]\n   48 |             );\n   49 |         }\n   50 | \n   51 |         self.process_packet(client, &pkt.buffer).await\n   52 |     }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"In `FuturePublicKey` signing, the received data is converted from `Vec<u8>` to a new `Vec<u8>` via `data[..].to_vec()` (line 252), which is an unnecessary full copy. The data is already a `Vec<u8>` and can be used directly.","fix":"Replace `data[..].to_vec()` with simply `data` (moving the Vec).","locations":[{"ref":"russh/src/client/encrypted.rs:252","code":"  252 |                                             Some(Msg::Signed { data }) => break data[..].to_vec(),"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"In `handle_ext_info`, `name.clone()` is called on line 333 to push into `received_extensions` after the name has already been used in the match and awaiters lookup. Since `name` is only used for the push afterwards, the clone could be avoided by pushing the original owned string (rearranging the block order).","fix":"Restructure the loop body so `name` is moved into `received_extensions` after it is no longer needed for lookups, avoiding the clone.","locations":[{"ref":"russh/src/client/encrypted.rs:333","code":"  333 |                 enc.received_extensions.push(name.clone());"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"In `kex/hybrid_mlkem.rs::client_dh` (lines 129-132), the ML-KEM public key bytes are serialised twice: once via `client_ephemeral.extend(&mlkem_pk.to_bytes())` and once via `c_init.extend(mlkem_pk.to_bytes())`, allocating a second buffer (`c_init`) that duplicates the same data already in `client_ephemeral`.","fix":"Build `c_init` directly from `client_ephemeral` (after it has been populated) rather than re-serialising `mlkem_pk` and `x25519_pk` into a second `Vec`.","locations":[{"ref":"russh/src/kex/hybrid_mlkem.rs:124-132","code":"  124 |         client_ephemeral.clear();\n  125 |         client_ephemeral.extend(&mlkem_pk.to_bytes());\n  126 |         client_ephemeral.extend(&x25519_pk.0);\n  127 | \n  128 |         msg::KEX_HYBRID_INIT.encode(writer)?;\n  129 |         let mut c_init = Vec::<u8>::new();\n  130 |         c_init.extend(mlkem_pk.to_bytes());\n  131 |         c_init.extend(&x25519_pk.0);\n  132 |         c_init.as_slice().encode(writer)?;"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"In `kex/hybrid_mlkem.rs`, the combined k_pq + k_cl secret is computed twice using identical code: once in `compute_exchange_hash` (lines 194-200) and once in `compute_keys` (lines 222-228). Both allocate a temporary `Vec` and run a SHA-256 hash.","fix":"Cache the derived `k` value (the SHA-256 of the combined secret) as an additional field in `MlKem768X25519Kex`, computed once during `compute_shared_secret` / `server_dh`. This removes duplicate allocation and hashing.","locations":[{"ref":"russh/src/kex/hybrid_mlkem.rs:194-200","code":"  194 |         let mut combined = Vec::new();\n  195 |         combined.extend_from_slice(k_pq);\n  196 |         combined.extend_from_slice(&k_cl.0);\n  197 | \n  198 |         let mut hasher = sha2::Sha256::new();\n  199 |         hasher.update(&combined);\n  200 |         let k = hasher.finalize();"},{"ref":"russh/src/kex/hybrid_mlkem.rs:222-228","code":"  222 |         let mut combined = Vec::new();\n  223 |         combined.extend_from_slice(k_pq);\n  224 |         combined.extend_from_slice(&k_cl.0);\n  225 | \n  226 |         let mut hasher = sha2::Sha256::new();\n  227 |         hasher.update(&combined);\n  228 |         let k = hasher.finalize();"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","description":"`write_kex` in `negotiation.rs` constructs four identical `NameList` instances from\n`pref.cipher` (lines 463-486) and two identical ones from `pref.mac` (lines 483-486),\nconverting each to a `String` with `.to_string()` / `.as_ref().to_string()`. These\nallocate multiple identical intermediate `Vec<String>` collections that could be computed\nonce and reused.","fix":"Build the cipher and MAC `NameList` instances once and encode them twice each, or\nintroduce helper closures that avoid the repeated iteration and string allocation.","locations":[{"ref":"russh/src/negotiation.rs:462-506","code":"  462 |         // cipher client to server\n  463 |         NameList(\n  464 |             prefs\n  465 |                 .cipher\n  466 |                 .iter()\n  467 |                 .map(|x| x.as_ref().to_string())\n  468 |                 .collect(),\n  469 |         )\n  470 |         .encode(w)?;\n  471 | \n  472 |         // cipher server to client\n  473 |         NameList(\n  474 |             prefs\n  475 |                 .cipher\n  476 |                 .iter()\n  477 |                 .map(|x| x.as_ref().to_string())\n  478 |                 .collect(),\n  479 |         )\n  480 |         .encode(w)?;\n  481 | \n  482 |         // mac client to server\n  483 |         NameList(prefs.mac.iter().map(|x| x.as_ref().to_string()).collect()).encode(w)?;\n  484 | \n  485 |         // mac server to client\n  486 |         NameList(prefs.mac.iter().map(|x| x.as_ref().to_string()).collect()).encode(w)?;\n  487 | \n  488 |         // compress client to server\n  489 |         NameList(\n  490 |             prefs\n  491 |                 .compression\n  492 |                 .iter()\n  493 |                 .map(|x| x.as_ref().to_string())\n  494 |                 .collect(),\n  495 |         )\n  496 |         .encode(w)?;\n  497 | \n  498 |         // compress server to client\n  499 |         NameList(\n  500 |             prefs\n  501 |                 .compression\n  502 |                 .iter()\n  503 |                 .map(|x| x.as_ref().to_string())\n  504 |                 .collect(),\n  505 |         )\n  506 |         .encode(w)?;"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","description":"In the publickey probe response path (is_real == 0), the public key blob and algorithm are copied into two freshly allocated Vec<u8> buffers (public_key and algo at lines 821-824) even though the original Bytes/String slices are already available. These allocations are unnecessary — the existing pubkey_key (Bytes) and pubkey_algo (String) values contain the same data.","fix":"Store pubkey_key.to_vec() and pubkey_algo.as_bytes().to_vec() directly, or better, keep references to the already-owned pubkey_key and pubkey_algo values without an extra copy.","locations":[{"ref":"russh/src/server/encrypted.rs:820-835","code":"  820 |                             let mut public_key = Vec::new();\n  821 |                             public_key.extend_from_slice(&pubkey_key);\n  822 | \n  823 |                             let mut algo = Vec::new();\n  824 |                             algo.extend_from_slice(pubkey_algo.as_bytes());\n  825 |                             debug!(\"pubkey_key: {pubkey_key:?}\");\n  826 |                             push_packet!(self.write, {\n  827 |                                 self.write.push(msg::USERAUTH_PK_OK);\n  828 |                                 map_err!(pubkey_algo.encode(&mut self.write))?;\n  829 |                                 map_err!(pubkey_key.encode(&mut self.write))?;\n  830 |                             });\n  831 | \n  832 |                             auth_request.current = Some(CurrentRequest::PublicKey {\n  833 |                                 key: public_key,\n  834 |                                 algo,\n  835 |                                 sent_pk_ok: true,"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","description":"In `cipher/mod.rs::read`, `plaintext.first().to_owned()` (line 334) creates an unnecessary owned copy of an `Option<&u8>` reference. `to_owned()` on `Option<&u8>` produces `Option<u8>` by copying, but `.copied()` or simply `*plaintext.first().unwrap_or(&0)` is cleaner and more idiomatic.","fix":"Replace `*plaintext.first().to_owned().unwrap_or(&0)` with `plaintext.first().copied().unwrap_or(0)`.","locations":[{"ref":"russh/src/cipher/mod.rs:334","code":"  334 |     let padding_length = *plaintext.first().to_owned().unwrap_or(&0) as usize;"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"The pending_reads drain loop inside the rekey completion path is dead code. pending_reads is declared in Session and initialized to an empty Vec, but nothing in the server code ever pushes packets into it (unlike some frameworks where packets arriving mid-rekey are queued). The loop at lines 1160-1165 therefore always iterates zero times. The field pending_len is similarly never incremented in server code.","fix":"Either implement the queuing logic (store packets that arrive during a rekey in pending_reads and replay after), or remove the dead drain loop and the unused struct fields.","locations":[{"ref":"russh/src/server/mod.rs:1160-1165","code":" 1160 |                         let mut pending = std::mem::take(&mut session.pending_reads);\n 1161 |                         for p in pending.drain(..) {\n 1162 |                             session.process_packet(handler, &p).await?;\n 1163 |                         }\n 1164 |                         session.pending_reads = pending;\n 1165 |                         session.pending_len = 0;"},{"ref":"russh/src/server/session.rs:25-26","code":"   25 |     pub(crate) pending_reads: Vec<Vec<u8>>,\n   26 |     pub(crate) pending_len: u32,"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"The `Key` struct in `cipher/clear.rs` (line 22) is derived with `#[derive(Debug)]` but is never used as a `Debug` value; the derive is harmless but unnecessary.","fix":"Remove `#[derive(Debug)]` from `Key` if it is not needed, or leave it as documentation — this is cosmetic only.","locations":[{"ref":"russh/src/cipher/clear.rs:21-22","code":"   21 | #[derive(Debug)]\n   22 | pub struct Key;"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`Encrypted::flush_all_pending` (session.rs:405) is annotated `#[allow(dead_code)]`,\nindicating it is not called anywhere in the non-test production path. It duplicates the\nper-channel iteration pattern of `flush_all_pending_with_writer` but writes to\n`self.write` instead of a `PacketWriter`. If the `_with_writer` variant is the intended\nproduction path, the dead variant should be removed or clearly documented as reserved.","fix":"Either remove `flush_all_pending` or document why it is retained alongside its `_with_writer` counterpart.","locations":[{"ref":"russh/src/session.rs:404-411","code":"  404 |     #[allow(dead_code)]\n  405 |     pub fn flush_all_pending(&mut self) -> Result<(), crate::Error> {\n  406 |         let channel_ids: Vec<ChannelId> = self.channels.keys().copied().collect();\n  407 |         for channel_id in channel_ids {\n  408 |             self.flush_pending(channel_id)?;\n  409 |         }\n  410 |         Ok(())\n  411 |     }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In `kex/mod.rs` at line 472-473, the comment reads: `// NOTE: using MpInt::from_bytes().encode() will randomly fail, // I'm assuming it's due to specific byte values / padding but no time to investigate`. This documents an uninvestigated intermittent failure in a cryptographic primitive and signals deferred technical debt in security-critical code.","fix":"Investigate the root cause of the MpInt failure (likely a leading zero / sign-bit issue) and either fix the upstream usage or document the exact invariant that makes the manual implementation necessary.","locations":[{"ref":"russh/src/kex/mod.rs:472-473","code":"  472 | // NOTE: using MpInt::from_bytes().encode() will randomly fail,\n  473 | // I'm assuming it's due to specific byte values / padding but no time to investigate"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"ServerKex's Debug impl creates the debug struct with the name 'ClientKex' (a copy-paste error from the client implementation), not 'ServerKex'. This produces misleading output in logs and diagnostics.","fix":"Change `f.debug_struct(\"ClientKex\")` to `f.debug_struct(\"ServerKex\")`.","locations":[{"ref":"russh/src/server/kex.rs:50","code":"   50 |         let mut s = f.debug_struct(\"ClientKex\");"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment on line 334 in kex.rs says 'waiting for a KEWKEYS packet' (typo: 'KEWKEYS' should be 'NEWKEYS').","fix":"Fix the typo: 'KEWKEYS' -> 'NEWKEYS'.","locations":[{"ref":"russh/src/client/kex.rs:334","code":"  334 |                 // and we're waiting for a KEWKEYS packet"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment on line 69 in session.rs says 'sender channel id.' for `originator_port`, which is copy-paste from a different field. The comment is incorrect.","fix":"Replace the comment '// sender channel id.' with '// originator port.' or remove it.","locations":[{"ref":"russh/src/client/session.rs:69","code":"   69 |             map_err!(originator_port.encode(write))?; // sender channel id."}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In `channel_open_direct_tcpip` (session.rs lines 83 and 85), both `port_to_connect.encode(write)?` and `originator_port.encode(write)?` are followed by the comment `// sender channel id.`, which is copied from elsewhere and is incorrect.","fix":"Remove or correct the misleading '// sender channel id.' comments.","locations":[{"ref":"russh/src/client/session.rs:83-85","code":"   83 |             port_to_connect.encode(write)?; // sender channel id.\n   84 |             originator_address.encode(write)?;\n   85 |             originator_port.encode(write)?; // sender channel id."}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The pattern of waiting for `Msg::Signed` from the receiver (lines 250-256 and 283-289) is duplicated identically for `FuturePublicKey` and `FutureCertificate`, differing only in what is sent to the caller. The receiver loop, error handling, and buffer assignment are copy-pasted.","fix":"Extract the receive-signed-data loop into a small helper `async fn recv_signed_data(receiver: &mut Receiver<Msg>) -> Result<Vec<u8>, Error>` and call it from both branches.","locations":[{"ref":"russh/src/client/encrypted.rs:250-256","code":"  250 |                                     self.common.buffer = loop {\n  251 |                                         match self.receiver.recv().await {\n  252 |                                             Some(Msg::Signed { data }) => break data[..].to_vec(),\n  253 |                                             None => return Err(crate::Error::RecvError.into()),\n  254 |                                             _ => {}\n  255 |                                         }\n  256 |                                     };"},{"ref":"russh/src/client/encrypted.rs:283-289","code":"  283 |                                     self.common.buffer = loop {\n  284 |                                         match self.receiver.recv().await {\n  285 |                                             Some(Msg::Signed { data }) => break data,\n  286 |                                             None => return Err(crate::Error::RecvError.into()),\n  287 |                                             _ => {}\n  288 |                                         }\n  289 |                                     };"}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The six channel-open functions in `Handle<H>` (`channel_open_session`, `channel_open_x11`, `channel_open_direct_tcpip`, `channel_open_direct_streamlocal`, and server-side variants) each independently create a `(sender, receiver)` channel pair, create a `ChannelRef`, clone `window_size_ref`, send a `Msg::ChannelOpen*`, and then call `wait_channel_confirmation`. This pattern is repeated verbatim five times.","fix":"Extract the channel-creation boilerplate into a private helper that accepts the `Msg` to send and returns `Result<Channel<Msg>, Error>`.","locations":[{"ref":"russh/src/client/mod.rs:675-686","code":"  675 |     pub async fn channel_open_session(&self) -> Result<Channel<Msg>, crate::Error> {\n  676 |         let (sender, receiver) = channel(self.channel_buffer_size);\n  677 |         let channel_ref = ChannelRef::new(sender);\n  678 |         let window_size_ref = channel_ref.window_size().clone();\n  679 | \n  680 |         self.sender\n  681 |             .send(Msg::ChannelOpenSession { channel_ref })\n  682 |             .await\n  683 |             .map_err(|_| crate::Error::SendError)?;\n  684 |         self.wait_channel_confirmation(receiver, window_size_ref)\n  685 |             .await\n  686 |     }"},{"ref":"russh/src/client/mod.rs:693-707","code":"  693 |     ) -> Result<Channel<Msg>, crate::Error> {\n  694 |         let (sender, receiver) = channel(self.channel_buffer_size);\n  695 |         let channel_ref = ChannelRef::new(sender);\n  696 |         let window_size_ref = channel_ref.window_size().clone();\n  697 | \n  698 |         self.sender\n  699 |             .send(Msg::ChannelOpenX11 {\n  700 |                 originator_address: originator_address.into(),\n  701 |                 originator_port,\n  702 |                 channel_ref,\n  703 |             })\n  704 |             .await\n  705 |             .map_err(|_| crate::Error::SendError)?;\n  706 |         self.wait_channel_confirmation(receiver, window_size_ref)\n  707 |             .await"},{"ref":"russh/src/client/mod.rs:724-740","code":"  724 |     ) -> Result<Channel<Msg>, crate::Error> {\n  725 |         let (sender, receiver) = channel(self.channel_buffer_size);\n  726 |         let channel_ref = ChannelRef::new(sender);\n  727 |         let window_size_ref = channel_ref.window_size().clone();\n  728 | \n  729 |         self.sender\n  730 |             .send(Msg::ChannelOpenDirectTcpIp {\n  731 |                 host_to_connect: host_to_connect.into(),\n  732 |                 port_to_connect,\n  733 |                 originator_address: originator_address.into(),\n  734 |                 originator_port,\n  735 |                 channel_ref,\n  736 |             })\n  737 |             .await\n  738 |             .map_err(|_| crate::Error::SendError)?;\n  739 |         self.wait_channel_confirmation(receiver, window_size_ref)\n  740 |             .await"},{"ref":"russh/src/client/mod.rs:747-759","code":"  747 |         let (sender, receiver) = channel(self.channel_buffer_size);\n  748 |         let channel_ref = ChannelRef::new(sender);\n  749 |         let window_size_ref = channel_ref.window_size().clone();\n  750 | \n  751 |         self.sender\n  752 |             .send(Msg::ChannelOpenDirectStreamLocal {\n  753 |                 socket_path: socket_path.into(),\n  754 |                 channel_ref,\n  755 |             })\n  756 |             .await\n  757 |             .map_err(|_| crate::Error::SendError)?;\n  758 |         self.wait_channel_confirmation(receiver, window_size_ref)\n  759 |             .await"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"medium","description":"In `kex/hybrid_mlkem.rs`, the `shared_secret_bytes()` method (lines 166-172) returns only the X25519 (k_cl) portion of the hybrid secret and explicitly documents that the ML-KEM portion is omitted. Any caller that uses `shared_secret_bytes()` to derive keys outside of `compute_keys` will silently obtain a secret that is missing half the hybrid material, degrading the post-quantum security to zero.","fix":"Either return `None` (as `NoneKexAlgorithm` does) to make the limitation explicit and force callers through `compute_keys`, or cache and return the full combined k value. Update the doc comment to clearly warn that this returns an incomplete secret.","locations":[{"ref":"russh/src/kex/hybrid_mlkem.rs:166-172","code":"  166 |     fn shared_secret_bytes(&self) -> Option<&[u8]> {\n  167 |         // For hybrid KEX, the shared secret is a combination of ML-KEM and X25519.\n  168 |         // The actual combined secret is computed during compute_keys.\n  169 |         // We return the X25519 portion as that's what's directly available.\n  170 |         // Users needing the full hybrid secret should use compute_keys.\n  171 |         self.k_cl.as_ref().map(|k| k.0.as_slice())\n  172 |     }"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","description":"In `mac/none.rs`, `NoMac::verify` unconditionally returns `true` (line 23) without checking that the passed `mac` slice is actually empty. If this MAC is ever used in a context where a non-empty MAC field is present in the wire data, the tag bytes are silently accepted without authentication.","fix":"Return `mac.is_empty()` instead of `true`, so any unexpected non-empty tag bytes cause verification to fail rather than being silently accepted.","locations":[{"ref":"russh/src/mac/none.rs:23-25","code":"   23 |     fn verify(&self, _: u32, _: &[u8], _: &[u8]) -> bool {\n   24 |         true\n   25 |     }"}]}]</script>

<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
