tate::Start;\n  173 |                 }","lines":6},{"ref":"godot-codegen/src/formatter/mod.rs:214-221","code":"  214 |                 (c, FormatState::PrevClosingBrace) if c == ';' || c == ',' => {\n  215 |                     // technically ; is already covered, but it's explicit.\n  216 | \n  217 |                     s.push('\\n');\n  218 |                     s.push_str(indent(level));\n  219 | \n  220 |                     *state = FormatState::Start;\n  221 |                 }","lines":8}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`Quaternion::from_axis_angle` asserts that `axis.is_normalized()` and then computes `let d = axis.length();` and `let s = sin_angle / d;`. Because the assert guarantees `d ≈ 1.0`, the division by `d` is redundant work that also gives a false impression that non-normalized axes are supported (they are not — the assert rejects them). Godot's original divides by length precisely because it accepts non-normalized axes; here the two are contradictory.","fix":"Either drop the `is_normalized` assert and keep dividing by `d` (to genuinely support arbitrary axes, matching Godot), or keep the assert and remove the redundant `d`/division (`let s = sin_angle;`).","locations":[{"ref":"godot-core/src/builtin/quaternion.rs:52-65","code":"   52 |     pub fn from_axis_angle(axis: Vector3, angle: real) -> Self {\n   53 |         assert!(\n   54 |             axis.is_normalized(),\n   55 |             \"Quaternion axis {axis:?} is not normalized.\"\n   56 |         );\n   57 |         let d = axis.length();\n   58 |         let sin_angle = (angle * 0.5).sin();\n   59 |         let cos_angle = (angle * 0.5).cos();\n   60 |         let s = sin_angle / d;\n   61 |         let x = axis.x * s;\n   62 |         let y = axis.y * s;\n   63 |         let z = axis.z * s;\n   64 |         let w = cos_angle;\n   65 |         Self::new(x, y, z, w)","lines":14}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`ArrayMismatch::Display` has two branches that produce identical output. The first branch (variant types differ) writes `expected:?`/`actual:?`. The second branch formats `exp_class`/`act_class` via `format!(\"{expected:?}\")`/`format!(\"{actual:?}\")` and then prints them with the exact same wording. The branching and the two intermediate strings add no value; both arms emit `\"expected array of type {expected:?}, got {actual:?}\"`.","fix":"Collapse to a single `write!(f, \"expected array of type {expected:?}, got {actual:?}\")`, or make the second branch actually differ (e.g. mention only the differing class names) if a distinct message was intended.","locations":[{"ref":"godot-core/src/meta/error/convert_error.rs:274-287","code":"  274 | impl fmt::Display for ArrayMismatch {\n  275 |     fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {\n  276 |         let ArrayMismatch { expected, actual } = self;\n  277 | \n  278 |         if expected.variant_type() != actual.variant_type() {\n  279 |             return write!(f, \"expected array of type {expected:?}, got {actual:?}\");\n  280 |         }\n  281 | \n  282 |         let exp_class = format!(\"{expected:?}\");\n  283 |         let act_class = format!(\"{actual:?}\");\n  284 | \n  285 |         write!(f, \"expected array of type {exp_class}, got {act_class}\")\n  286 |     }\n  287 | }","lines":14}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"is_builtin_method_excluded ignores its parameters and always returns false; the entire builtin-method codegen-exclusion path is a no-op kept only for the signature.","fix":"Keep but document prominently, or inline `false` at call sites until a real exclusion is needed.","locations":[{"ref":"godot-codegen/src/special_cases/codegen_special_cases.rs:16-20","code":"   16 | pub(crate) fn is_builtin_method_excluded(_method: &JsonBuiltinMethod) -> bool {\n   17 |     // Prior to Godot 4.2, builtin varargs (method.is_vararg) weren't supported, but that's now our minimum supported version.\n   18 | \n   19 |     false\n   20 | }","lines":5}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`builder/method.rs` is 141 lines that are entirely commented out (an old `Method`/`CodeMethod` prototype). It contains no live code. Likewise `register_class<T>` in class.rs is `#[expect(dead_code)]` and `builder/mod.rs` is an explicitly-dummy placeholder. The commented-out file in particular is pure dead weight that obscures the module.","fix":"Delete `builder/method.rs` (and its `mod method;` declaration); the prototype is preserved in git history if ever needed.","locations":[{"ref":"godot-core/src/builder/method.rs:1-141","code":"    1 | /*\n    2 |  * Copyright (c) godot-rust; Bromeon and contributors.\n    3 |  * This Source Code Form is subject to the terms of the Mozilla Public\n    4 |  * License, v. 2.0. If a copy of the MPL was not distributed with this\n    5 |  * file, You can obtain one at https://mozilla.org/MPL/2.0/.\n    6 |  */\n    7 | \n    8 | // use crate::GodotClass;\n    9 | // use godot_core::Variant;\n   10 | // use godot_ffi as sys;\n   11 | // use std::borrow::Cow;\n   12 | // use std::ffi::CStr;\n   13 | \n   14 | // pub trait Method<C> {\n   15 | //     type ReturnType;\n   16 | //     type ParamTypes;\n   17 | //\n   18 | //     fn method_name(&self) -> Cow<CStr>;\n   19 | //     fn ptrcall(&mut self, instance: &mut C, args: Self::ParamTypes) -> Self::ReturnType;\n   20 | // }\n   21 | \n   22 | // ----------------------------------------------------------------------------------------------------------------------------------------------\n   23 | /*\n   24 | \n   25 | /// Method known at compile time (statically), either a Rust `fn` or closure.\n   26 | pub trait CodeMethod<C, R, Ps>\n   27 | where\n   28 |     C: GodotClass,\n         Self {\n  203 |             tool_only_in_editor,\n  204 |         }\n  205 |     }\n  206 | }","lines":11}]},{"id":"DUP_11","type":"duplicate_code","type_label":"Duplicate Code","severity":"negligible","easy":false,"description":"The signal symbolic-API generation (`make_signal_individual_struct`, `make_signal_symbols`) and the RPC collection-API generation (`make_rpc_api`) follow near-identical patterns: a per-item typed accessor method returning a generated struct, a hidden collection struct holding a `UserSignalObject`/`UserRpcObject`, and `WithUserSignals`/`WithUserRpcs` impls with `internal`/`external` constructors. Visibility/duplication is already flagged by the TODO in rpc.rs about reusing `SignalVisibility`.","fix":"Factor the shared collection/accessor-struct codegen into a common helper parameterized by item kind (signal vs. rpc), as the rpc.rs TODO already anticipates.","locations":[{"ref":"godot-macros/src/class/data_models/signal.rs:455-579","code":"  455 | fn make_signal_symbols(\n  456 |     class_name: &Ident,\n  457 |     collection_api: SignalCollection,\n  458 |     // max_visibility: SignalVisibility,\n  459 | ) -> TokenStream {\n  460 |     // Earlier implementation generated a simplified code when no #[signal] was declared: only WithSignals/WithUserSignals impl, but no own\n  461 |     // collection, instead the associated type pointing to the base class. This has however some problems:\n  462 |     // * Part of the reason for user-defined collection is to store UserSignalObject instead of Gd, which can store &mut self.\n  463 |     //   This is necessary for self.signals().some_base_signal().emit(), if such a signal is connected to Self::connect*() taking &mut self;\n  464 |     //   Gd would cause a borrow error.\n  465 |     // * Once we add Rust-Rust inheritance, we'd need to differentiate case again, which can be tricky since #[godot_api] has no information\n  466 |     //   about the base class.\n  467 |     //\n  468 |     // As compromise, we always generate a collection struct if either at least 1 #[signal] is declared or the struct has a Base<T> field.\n  469 |     // We also provide opt-out via #[godot_api(no_typed_signals)].\n  470 | \n  471 |     let declares_no_signals = collection_api.is_empty();\n  472 |     let collection_struct_name =\n  473 |         format_ident!(\"__godot_Signals_{class_name}\", span = class_name.span());\n  474 |     let collection_struct_methods = &collection_api.provider_methods;\n  475 |     let with_signals_impl = make_with_signals_impl(class_name, &collection_struct_name);\n  476 |     let upcast_deref_impl = make_upcast_deref_impl(class_name, &collection_struct_name);\n  477 |     let individual_structs = collection_api.individual_structs;\n  478 | \n  479 |     // The collection cannot be `pub` because `Deref::Target` contains the class type, which leads to \"leak private type\" errors.\n  480 |     // We thus adopt the visibility of the #[derive(GodotClass)] struct, imported via macro trick.\n  481 |     //\n  482 |     // A previous approach (that cannot access the struct visibility) used \"max visibility\": the user decides which visibility is acceptable f\n  483 |     // or individual #[signal]s. They can all be at most the class visibility. Since we assume that decision is correct, the signal collection\n  484 |     // itself can also share the widest visibility of any #[signal]. This approach however still led to problems because there's a 2-way\n  485 |     // dependency: `impl WithSignals for MyClass` has an associated type `SignalCollection` that mentions the generated collection type. If\n  486 |     // that collection type has *lower* visibility than the class, we *also* run into \"leak private type\" errors.\n  487 | \n  488 |     // Unrelated, we could use the following for encapsulation:\n  489 |     //     mod #signal_mod_name {\n  490 |     //         pub use super::*;\n  491 |     //         ... // all the code below\n  492 |     //     }\n  493 |     //     pub use #signal_mod_name::*;\n  494 |     //\n  495 |     // This now makes signal types/methods invisible to the surrounding scope, so we'd need to adjust visibility in some cases:\n  496 |     // * private      -> `pub(super)`\n  497 |     // * `pub(super)` -> pub(in super::super)\n  498 |     //\n  499 |     // Benefit of encapsulating would be:\n  500 |     // * No need for `#[doc(hidden)]` on internal symbols like fields.\n  501 |     // * Any potential #[cfg]s (in the past for >= 4.2 API level) would not need to be repeated. This is less of a problem if the #[cfg]\n  502 |     //   is used inside the macro instead of generated code.\n  503 |     // * Less scope pollution (even though names are mangled).\n  504 |     //\n  505 |     // Downside is slightly higher complexity and introducing signals in secondary blocks becomes harder (although we could use another\n  506 |     // module name, we'd need a way to create unique names).\n  507 | \n  508 |     let visibility_macro = util::format_class_visibility_macro(class_name);\n  509 | \n  510 |     // Span propagation: the visibility macro causes error messages for \"method not found\" on the signals collection to point to\n  511 |     // `#[derive(GodotClass)]` instead of `impl ClassName`. This is because `macro_rules!` hygiene overrides input token spans. Using\n  512 |     // `quote_spanned!` here doesn't help since spans are lost when passing through declarative macros (it works without surrounding macro).\n  513 |     // A proc-macro helper instead of `macro_rules!` could preserve spans, but adds complexity.\n  514 |     let mut code = quote! {\n  515 |         #visibility_macro! {\n  516 |             #[allow(non_camel_case_types)]\n  517 |             #[doc(hidden)] // Only on struct, not methods, to allow completion in IDEs.\n  518 |             struct #collection_struct_name<'c, C> {\n  519 |                 // Hiding necessary because it's in the same scope as the user-defined class, so appearing in IDE completion.\n  520 |                 #[doc(hidden)]\n  521 |                 __internal_obj: Option<::godot::private::UserSignalObject<'c, C>>\n  522 |             }\n  523 |         }\n  524 | \n  525 |         impl<'c, C> #collection_struct_name<'c, C>\n  526 |         where // bounds: see UserSignalObject::into_typed_signal().\n  527 |             C: ::godot::obj::WithUserSignals +\n  528 |                ::godot::obj::WithSignals<__SignalObj<'c> = ::godot::private::UserSignalObject<'c, C>>,\n  529 |         {\n  530 |             #( #collection_struct_methods )*\n  531 |         }\n  532 | \n  533 |         #with_signals_impl\n  534 |         #upcast_deref_impl\n  535 |         #( #individual_structs )*\n  536 |     };\n  537 | \n  538 |     // base_field_macro! is a macro that expands to all input tokens if the class declares a Base<T> field, and to nothing otherwise.\n  539 |     // This makes sure that WithSignals is only implemented for classes with a base field, and avoids compile errors about it.\n  540 |     // Only when no #[signal] is declared -> otherwise the user explicitly requests it, and a compile error is better to guide them.\n  541 |     if declares_no_signals {\n  542 |         let base_field_macro = util::format_class_base_field_macro(class_name);\n  543 | \n  544 |         code = quote! {\n  545 |             #base_field_macro! { #code }\n  546 |         };\n  547 |     }\n  548 | \n  549 |     code\n  550 | }\n  551 | \n  552 | /// Declare `impl WithSignals` and `impl WithUserSignals` with own signal collection.\n  553 | fn make_with_signals_impl(class_name: &Ident, collection_struct_name: &Ident) -> TokenStream {\n  554 |     quote! {\n  555 |         impl ::godot::obj::WithSignals for #class_name {\n  556 |             type SignalCollection<'c, C: ::godot::obj::WithSignals> = #collection_struct_name<'c, C>;\n  557 | \n  558 |             #[doc(hidden)]\n  559 |             type __SignalObj<'c> = ::godot::private:: n 1032 |     }\n 1033 | \n 1034 |     Ok(())\n 1035 | }","lines":29}]},{"id":"ARCH_7","type":"architecture","type_label":"Architecture","severity":"negligible","easy":false,"description":"`Array::assume_type` and `Dictionary::assume_type` manually move individual fields and call `mem::forget(self)`. The in-code TODO warns this is fragile: adding a new field requires remembering to move it here, or it silently leaks / is left default-constructed. This is a maintenance landmine for an unsafe FFI type.","fix":"Use `ManuallyDrop<Self>` + `ptr::read` of each field, or make the type `#[repr(C)]` and `transmute`, so adding a field cannot silently break the move.","locations":[{"ref":"godot-core/src/builtin/collections/array.rs:912-928","code":"  912 |     // TODO(v0.6): fragile manual field move + mem::forget; if a field is added, it must be moved here too.\n  913 |     // Consider transmute (requires #[repr(C)]) or ManuallyDrop + ptr::read. Same issue in Dictionary::assume_type.\n  914 |     pub(super) unsafe fn assume_type<U: Element>(self) -> Array<U> {\n  915 |         let result = Array::<U> {\n  916 |             opaque: self.opaque,\n  917 |             _phantom: PhantomData,\n  918 |             cached_element_type: OnceCell::new(),\n  919 |         };\n  920 | \n  921 |         // Transfer cached type to avoid redundant FFI calls.\n  922 |         ElementType::transfer_cache(&self.cached_element_type, &result.cached_element_type);\n  923 | \n  924 |         // Prevent drop of self since we moved opaque.\n  925 |         std::mem::forget(self);\n  926 | \n  927 |         result\n  928 |     }","lines":17}]},{"id":"ARCH_8","type":"architecture","type_label":"Architecture","severity":"negligible","easy":false,"description":"`varcall_return_checked` takes `Result<R, ()>` with a `// TODO Err should be custom CallError enum` and, on the `Err(())` path, fabricates a generic `GDEXTENSION_CALL_ERROR_INVALID_ARGUMENT` with no contextual information. The error reason is enti onsistency: GString::len() uses `.try_into().unwrap()` (panics on negative/overflow) while StringName::len() uses `as usize` on the same i64 length, silently wrapping a negative value. Lengths are non-negative in practice, but the two should behave identically; the `as usize` path would hide a contract violation instead of panicking.","fix":"Use the same conversion in both (prefer the checked `.try_into().expect(...)` form used elsewhere in NodePath counts).","locations":[{"ref":"godot-core/src/builtin/strings/gstring.rs:155-157","code":"  155 |     pub fn len(&self) -> usize {\n  156 |         self.as_inner().length().try_into().unwrap()\n  157 |     }","lines":3},{"ref":"godot-core/src/builtin/strings/string_name.rs:139-141","code":"  139 |     pub fn len(&self) -> usize {\n  140 |         self.as_inner().length() as usize\n  141 |     }","lines":3}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"negligible","easy":false,"description":"static_sname! macro references the bare identifier `StringName` (StringName::__cstr_with_static) without a fully-qualified path, relying on the caller having `StringName` in scope. This is a macro hygiene hazard: the macro will fail to compile at call sites that have not imported StringName, unlike a properly path-qualified `$crate::builtin::StringName`.","fix":"Use `$crate::builtin::StringName::__cstr_with_static(...)` inside the macro instead of the bare `StringName`.","locations":[{"ref":"godot-core/src/builtin/strings/string_name.rs:511-520","code":"  511 | #[macro_export]\n  512 | macro_rules! static_sname {\n  513 |     ($str:literal) => {{\n  514 |         use std::sync::OnceLock;\n  515 | \n  516 |         let c_str: &'static std::ffi::CStr = $str;\n  517 |         static SNAME: OnceLock<StringName> = OnceLock::new();\n  518 |         SNAME.get_or_init(|| StringName::__cstr_with_static(c_str, true))\n  519 |     }};\n  520 | }","lines":10}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"ne <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
