<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"indent(n) slices a fixed 56-character space literal at byte range 0..n*4. Once brace/code nesting reaches level 15, end = 60 > 56 and the slice panics ('byte index out of bounds'), aborting codegen. The function recurses with level+1 on every Delimiter::Brace and code block. The comment 'The code that's generated doesn't seem like it's any deeper than this' is an unchecked assumption; deeply nested generated code (nested closures/match in default-param builders, etc.) crashes the build. The safe Cow fallback is sitting commented-out right below.","fix":"Restore the commented-out fallback: idents.get(0..end) -> Cow::Borrowed, else Cow::Owned(\"    \".repeat(n)). Or clamp: idents.get(0..end).unwrap_or(idents).","locations":[{"ref":"godot-codegen/src/formatter/mod.rs:63-82","code":"   63 | fn indent(n: usize) -> &'static str {\n   64 |     // This looks strange, but it means we don't need to actually allocate anything.\n   65 |     // The downside is there's a limit to how deep we can nest.\n   66 |     // The code that's generated doesn't seem like it's any deeper than this.\n   67 | \n   68 |     //           |   |   |   |   |   |   |   |   |   |   |   |   |   |   |\n   69 |     let idents = \"                                                        \";\n   70 | \n   71 |     let end = n * 4;\n   72 |     &idents[0..end]\n   73 | \n   74 |     // If at some point this approach doesn't work anymore, a `Cow<'static, str>`\n   75 |     // could be returned.\n   76 | \n   77 |     // if let Some(s) = idents.get(0..end) {\n   78 |     //     Cow::Borrowed(s)\n   79 |     // } else {\n   80 |     //     Cow::Owned(\"    \".repeat(n))\n   81 |     // }\n   82 | }","lines":20}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Most Godot-invoked `extern \"C\"` callbacks call user/Rust code without a panic guard, so a panic unwinds across the C FFI boundary into Godot's C++ - undefined behavior. `to_string`, `on_notification`, `get_property`, `set_property`, `get_property_list`, `validate_property`, `property_can_revert`, `property_get_revert` all directly invoke `T::__godot_*` user methods (which can panic) and, in several cases, `storage.get_mut()`/`get()` which *deliberately panic* on a conflicting borrow (see `bind_mut_failed`/`bind_failed`). For example, `on_notification` calls `storage.get_mut()`; if a notification fires while the instance is already mutably borrowed, the storage panics and unwinds straight into Godot. Only `create`/`recreate` wrap user code in `handle_panic`.","fix":"Wrap the bodies of these callbacks in `handle_panic` (as `create_rust_part_for_existing_godot_part` does), returning a safe default (e.g. SYS_FALSE / no-op) on panic, so unwinding never crosses the FFI boundary.","locations":[{"ref":"godot-core/src/registry/callbacks.rs:265-295","code":"  265 | pub unsafe extern \"C\" fn to_string<T: cap::GodotToString>(\n  266 |     instance: sys::GDExtensionClassInstancePtr,\n  267 |     is_valid: *mut sys::GDExtensionBool,\n  268 |     out_string: sys::GDExtensionStringPtr,\n  269 | ) {\n  270 |     unsafe {\n  271 |         // Note: to_string currently always succeeds, as it is only provided for classes that have a working implementation.\n  272 | \n  273 |         let storage = as_storage::<T>(instance);\n  274 |         let string = T::__godot_to_string(T::Recv::instance(storage));\n  275 | \n  276 |         // Transfer ownership to Godot\n  277 |         string.move_into_string_ptr(out_string);\n  278 | \n  279 |         // Note: is_valid comes uninitialized and must be set.\n  280 |         *is_valid = sys::conv::SYS_TRUE;\n  281 |     }\n  282 | }\n  283 | \n  284 | pub unsafe extern \"C\" fn on_notification<T: cap::GodotNotification>(\n  285 |     instance: sys::GDExtensionClassInstancePtr,\n  286 |     what: i32,\n  287 |     _reversed: sys::GDExtensionBool,\n  288 | ) {\n  289 |     unsafe {\n  290 |         let storage = as_storage::<T>(instance);\n  291 |         let mut instance = storage.get_mut();\n  292 | \n  293 |         T::__godot_notification(&mut *instance, what);\n  294 |     }\n  295 | }","lines":31},{"ref":"godot-core/src/registry/callbacks.rs:297-331","code":"  297 | pub unsafe extern \"C\" fn get_property<T: cap::GodotGet>(\n  298 |     instance: sys::GDExtensionClassInstancePtr,\n  299 |     name: sys::GDExtensionConstStringNamePtr,\n  300 |     ret: sys::GDExtensionVariantPtr,\n  301 | ) -> sys::GDExtensionBool {\n  302 |     unsafe {\n  303 |         let storage = as_storage::<T>(instance);\n  304 |         let instance = T::Recv::instance(storage);\n  305 |         let property = StringName::new_from_string_sys(name);\n  306 | \n  307 |         match T::__godot_get_property(instance, property) {\n  308 |             Some(value) => {\n  309 |                 value.move_into_var_ptr(ret);\n  310 |                 sys::conv::SYS_TRUE\n  311 |             }\n  312 |             None => sys::conv::SYS_FALSE,\n  313 |         }\n  314 |     }\n  315 | }\n  316 | \n  317 | pub unsafe extern \"C\" fn set_property<T: cap::GodotSet>(\n  318 |     instance: sys::GDExtensionClassInstancePtr,\n  319 |     name: sys::GDExtensionConstStringNamePtr,\n  320 |     value: sys::GDExtensionConstVariantPtr,\n  321 | ) -> sys::GDExtensionBool {\n  322 |     unsafe {\n  323 |         let storage = as_storage::<T>(instance);\n  324 |         let instance = T::Recv::instance(storage);\n  325 | \n  326 |         let property = StringName::new_from_string_sys(name);\n  327 |         let value = Variant::new_from_var_sys(value);\n  328 | \n  329 |         sys::conv::bool_to_sys(T::__godot_set_property(instance, property, value))\n  330 |     }\n  331 | }","lines":35},{"ref":"godot-core/src/registry/callbacks.rs:346-369","code":"  346 | pub unsafe extern \"C\" fn get_property_list<T: cap::GodotGetPropertyList>(\n  347 |     instance: sys::GDExtensionClassInstancePtr,\n  348 |     count: *mut u32,\n  349 | ) -> *const sys::GDExtensionPropertyInfo {\n  350 |     // SAFETY: Godot provides us with a valid instance pointer to a `T`. And it will live until the end of this function.\n  351 |     let storage = unsafe { as_storage::<T>(instance) };\n  352 |     let instance = T::Recv::instance(storage);\n  353 | \n  354 |     let property_list = T::__godot_get_property_list(instance);\n  355 |     let property_list_sys: Box<[sys::GDExtensionPropertyInfo]> = property_list\n  356 |         .into_iter()\n  357 |         .map(|prop| prop.into_owned_property_sys())\n  358 |         .collect();\n  359 | \n  360 |     // SAFETY: Godot ensures that `count` is initialized and valid to write into.\n  361 |     unsafe {\n  362 |         *count = property_list_sys\n  363 |             .len()\n  364 |             .try_into()\n  365 |             .expect(\"property list cannot be longer than `u32::MAX`\");\n  366 |     }\n  367 | \n  368 |     Box::leak(property_list_sys).as_mut_ptr()\n  369 | }","lines":24},{"ref":"godot-core/src/registry/callbacks.rs:463-479","code":"  463 | pub unsafe extern \"C\" fn validate_property<T: cap::GodotValidateProperty>(\n  464 |     instance: sys::GDExtensionClassInstancePtr,\n  465 |     property_info_ptr: *mut sys::GDExtensionPropertyInfo,\n  466 | ) -> sys::GDExtensionBool {\n  467 |     // SAFETY: `instance` is a valid `T` instance pointer for the duration of this function call.\n  468 |     let storage = unsafe { as_storage::<T>(instance) };\n  469 |     let instance = T::Recv::instance(storage);\n  470 | \n  471 |     // SAFETY: property_info_ptr must be valid.\n  472 |     let mut property_info = unsafe { PropertyInfo::new_from_sys(property_info_ptr) };\n  473 |     T::__godot_validate_property(instance, &mut property_info);\n  474 | \n  475 |     // SAFETY: property_info_ptr remains valid & unchanged.\n  476 |     unsafe { property_info.move_into_property_info_ptr(property_info_ptr) };\n  477 | \n  478 |     sys::conv::SYS_TRUE\n  479 | }","lines":17}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In the non-lazy make_method_table, when method_init_groups is non-empty, the code does last.method_inits.last().unwrap(). populate_class_methods guards empty groups (only pushes when !method_inits.is_empty()), but populate_builtin_methods pushes a MethodInitGroup unconditionally even when method_inits is empty (a builtin variant with an associated class but zero outbound methods). If such an empty group ends up last, .last().unwrap() panics at build time with no useful message. The class path proves the author knew empty groups must be excluded; the builtin path omits the same guard.","fix":"Guard the builtin group push the same way as classes: only push the group (and bump class_count) when !method_inits.is_empty(), or make the assertion robust against empty trailing groups.","locations":[{"ref":"godot-codegen/src/generator/method_tables.rs:336-344","code":"  336 |     if let Some(last) = method_init_groups.last() {\n  337 |         assert_eq!(\n  338 |             last.method_inits.last().unwrap().index,\n  339 |             method_count - 1,\n  340 |             \"last method should have highest index (table {table_name})\"\n  341 |         );\n  342 |     } else {\n  343 |         assert_eq!(method_count, 0, \"empty method table should have count 0\");\n  344 |     }","lines":9},{"ref":"godot-codegen/src/generator/method_tables.rs:619-624","code":"  619 |     table.method_init_groups.push(MethodInitGroup::new(\n  620 |         &builtin_class.name().godot_ty,\n  621 |         None, // load_builtin_method() doesn't need a StringName for the class, as it accepts the VariantType enum.\n  622 |         method_inits,\n  623 |     ));\n  624 |     table.class_count += 1;","lines":6}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Parsing a native-structure array-size field slices field_name[index+1 .. field_name.len()-1] assuming the '[' is followed by a matching ']' as the final character. For a malformed field like 'foo[' (index=3, len=4) the range is 4..3 which panics ('slice index starts at 4 but ends at 3'). Non-numeric bracket content silently yields None, which then trips the upstream .expect(\"Could not parse native_structures format field\"). This is parsed JSON whose shape can change across Godot versions.","fix":"Guard with field_name.ends_with(']') / locate the matching ']' via rfind(']'), only slice between brackets, and treat malformed input as a clean parse failure rather than a slice panic.","locations":[{"ref":"godot-codegen/src/generator/native_structures.rs:256-259","code":"  256 |             if let Some(index) = field_name.find('[') {\n  257 |                 array_size = Some(field_name[index + 1..field_name.len() - 1].parse().ok()?);\n  258 |                 field_name.truncate(index);\n  259 |             }","lines":4},{"ref":"godot-codegen/src/generator/native_structures.rs:123-124","code":"  123 |     let fields = parse_native_structures_format(&structure.format)\n  124 |         .expect(\"Could not parse native_structures format field\");","lines":2}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"BuiltinVariant JSON->domain mapping hardcodes the shape of the Variant.Type global enum: .expect(\"missing enum for VariantType in JSON\"), .expect(\"variant enumerator lacks prefix 'TYPE_'\"), and assert_eq!(json_variant_enumerator_name, \"OBJECT\"). The assert assumes the only class-less variant enumerator is OBJECT. If a future Godot adds another variant type with no builtin class (as has happened historically), the generator panics rather than degrading gracefully.","fix":"Tolerate unknown class-less variant types (warn and skip, or handle generically). At minimum widen the assert into a clear, version-mentioning message.","locations":[{"ref":"godot-codegen/src/models/domain_mapping.rs:248-308","code":"  248 |         let variant_type_enum = global_enums\n  249 |             .iter()\n  250 |             .find(|e| &e.name == \"Variant.Type\")\n  251 |             .expect(\"missing enum for VariantType in JSON\");\n  252 | \n  253 |         // Make HashMap from builtin_classes, keyed by a normalized version of their names (all-lower, no underscores)\n  254 |         let mut builtin_classes: HashMap<String, JsonBuiltinClass> = builtin_classes\n  255 |             .into_iter()\n  256 |             .map(|c| (normalize(&c.name), c))\n  257 |             .collect();\n  258 | \n  259 |         let mut all = variant_type_enum\n  260 |             .values\n  261 |             .iter()\n  262 |             .filter_map(|e| {\n  263 |                 let json_shout_case = e\n  264 |                     .name\n  265 |                     .strip_prefix(\"TYPE_\")\n  266 |                     .expect(\"variant enumerator lacks prefix 'TYPE_'\");\n  267 | \n  268 |                 if json_shout_case == \"NIL\" || json_shout_case == \"MAX\" {\n  269 |                     return None;\n  270 |                 }\n  271 | \n  272 |                 let name = normalize(json_shout_case);\n  273 |                 let json_builtin_class = builtin_classes.remove(&name);\n  274 |                 let json_ord = e.to_enum_ord();\n  275 | \n  276 |                 Some(Self::from_json(\n  277 |                     json_shout_case,\n  278 |                     json_ord,\n  279 |                     json_builtin_class,\n  280 |                     ctx,\n  281 |                 ))\n  282 |             })\n  283 |             .collect::<Vec<_>>();\n  284 | \n  285 |         all.sort_by_key(|v| v.variant_type_ord);\n  286 |         all\n  287 |     }\n  288 | \n  289 |     pub fn from_json(\n  290 |         json_variant_enumerator_name: &str,\n  291 |         json_variant_enumerator_ord: i32,\n  292 |         json_builtin_class: Option<JsonBuiltinClass>,\n  293 |         ctx: &mut Context,\n  294 |     ) -> Self {\n  295 |         let builtin_class;\n  296 |         let godot_original_name;\n  297 | \n  298 |         // Nil, int, float etc. are not represented by a BuiltinVariant.\n  299 |         // Object has no BuiltinClass, but still gets its BuiltinVariant instance.\n  300 |         if let Some(json_builtin) = json_builtin_class {\n  301 |             godot_original_name = json_builtin.name.clone();\n  302 |             builtin_class = BuiltinClass::from_json(json_builtin, ctx);\n  303 |         } else {\n  304 |             assert_eq!(json_variant_enumerator_name, \"OBJECT\");\n  305 | \n  306 |             builtin_class = None;\n  307 |             godot_original_name = \"Object\".to_string();\n  308 |         };","lines":61}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"is_builtin_type_scalar does name.chars().next().unwrap().is_ascii_lowercase(), which panics on an empty type name. It is pub and reached via is_builtin_type_deleted with class_name.godot_ty. A malformed/empty builtin entry crashes the generator with an opaque panic instead of a clear diagnostic.","fix":"Use name.chars().next().is_some_and(|c| c.is_ascii_lowercase()).","locations":[{"ref":"godot-codegen/src/special_cases/special_cases.rs:847-849","code":"  847 | pub fn is_builtin_type_scalar(name: &str) -> bool {\n  848 |     name.chars().next().unwrap().is_ascii_lowercase()\n  849 | }","lines":3}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`failed_varcall_inner` indexes `arg_types[vararg_offset + argument as usize]` using `argument` taken directly from Godot's `GDExtensionCallError`. The inline comment admits the index calculation \"might not always work\". If Godot reports an `argument` index that doesn't line up with the reconstructed `arg_types` slice (e.g. caps, \"status\")?.unwrap(),\n   51 |         custom_rev: cap(&caps, \"custom_rev\")?,\n   52 |     })","lines":8},{"ref":"godot-bindings/src/lib.rs:157-162","code":"  157 |             major: version[0].parse().unwrap(),\n  158 |             minor: version[1].parse().unwrap(),\n  159 |             patch: version\n  160 |                 .get(2)\n  161 |                 .and_then(|patch| patch.parse().ok())\n  162 |                 .unwrap_or(0),","lines":6}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`MutGuard::deref`/`deref_mut` assert `self.count == current_mut_count` on every single dereference, calling `CellState::borrow_state` (an unsafe pointer round-trip) and `std::any::type_name` formatting setup each time. This is a hot path (every `*guard` access). The assertion is documented as a best-effort check that 'should never be triggered'; running it on every deref is wasteful, and if a logic bug ever did trip it the guard panics rather than failing gracefully.","fix":"Gate the count assertion behind `debug_assertions` (or a strict-checks cfg) so release builds skip the per-deref overhead.","locations":[{"ref":"godot-cell/src/guards.rs:122-149","code":"  122 | impl<T> Deref for MutGuard<'_, T> {\n  123 |     type Target = T;\n  124 | \n  125 |     fn deref(&self) -> &Self::Target {\n  126 |         // SAFETY: There can't be any other active reference to CellState.\n  127 |         let count = unsafe { CellState::borrow_state(self.state) }.mut_count();\n  128 |         // This is just a best-effort error check. It should never be triggered.\n  129 |         assert_eq!(\n  130 |             self.count,\n  131 |             count,\n  132 |             \"\\\n  133 |             attempted to access a non-current mutable borrow of type: `{}`. \\n\\\n  134 |             current count: {}\\n\\\n  135 |             value pointer: {:p}\\n\\\n  136 |             attempted access count: {}\\n\\\n  137 |             **this is a bug, please report it**\\\n  138 |             \",\n  139 |             std::any::type_name::<T>(),\n  140 |             self.count,\n  141 |             self.value,\n  142 |             count\n  143 |         );\n  144 | \n  145 |         // SAFETY: It is safe to call `as_ref()` on value when we have a `&self` reference because of the\n  146 |         // safety invariants of `new`.\n  147 |         unsafe { self.value.as_ref() }\n  148 |     }\n  149 | }","lines":28},{"ref":"godot-cell/src/guards.rs:151-177","code":"  151 | impl<T> DerefMut for MutGuard<'_, T> {\n  152 |     fn deref_mut(&mut self) -> &mut Self::Target {\n  153 |         // SAFETY: There can't be any other active reference to CellState.\n  154 |         let count = unsafe { CellState::borrow_state(self.state) }.mut_count();\n  155 |         // This is just a best-effort error check. It should never be triggered.\n  156 |         assert_eq!(\n  157 |             self.count,\n  158 |             count,\n  159 |             \"\\\n  160 |             attempted to access a non-current mutable borrow of type: `{}`. \\n\\\n  161 |             current count: {}\\n\\\n  162 |             value pointer: {:p}\\n\\\n  163 |             attempted access count: {}\\n\\\n  164 |             **this is a bug, please report it**\\\n  165 |             \",\n  166 |             std::any::type_name::<T>(),\n  167 |             self.count,\n  168 |             self.value,\n  169 |             count\n  170 |         );\n  171 | \n  172 |         // SAFETY:\n  173 |         // It is safe to call `as_mut()` on value when we have a `&mut self` reference because of the safety\n  174 |         // invariants of `new`.\n  175 |         unsafe { self.value.as_mut() }\n  176 |     }\n  177 | }","lines":27}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"During engine teardown on Godot < 4.5, `FallibleSignalFuture::drop` -> `is_engine_exiting()` calls `Engine::singleton().get_main_loop()` and casts/queries it. This runs inside a `Drop`, on the teardown path, and accesses engine singletons; if the Engine singleton or main loop is already unavailable at that exact moment the singleton/cast access can panic, and a panic escaping `Drop` aborts the process. The newer (4.5+) path uses only an atomic flag and is safe; the pre-4.5 heuristic reintroduces engine access in a destructor.","fix":"Wrap the pre-4.5 `is_engine_exiting()` engine access in `handle_panic` (as the rest of `FallibleSignalFuture::drop` already does for object access), or gate the whole heuristic behind a check that the bindings are still at a usable init level.","locations":[{"ref":"godot-core/src/task/async_runtime.rs:277-289","code":"  277 |     #[cfg(before_api = \"4.5\")]\n  278 |     {\n  279 |         use crate::obj::Singleton as _;\n  280 | \n  281 |         match crate::classes::Engine::singleton().get_main_loop() {\n  282 |             // No main loop: the engine is shutting down (or has not started yet, in which case no signal future can be pending).\n  283 |             None => true,\n  284 |             Some(main_loop) => match main_loop.try_cast::<crate::classes::SceneTree>() {\n  285 |                 Ok(tree) => tree.get_root().is_none(),\n  286 |                 Err(_) => false,\n  287 |             },\n  288 |         }\n  289 |     }","lines":13},{"ref":"godot-core/src/task/futures.rs:163-165","code":"  163 |         if crate::task::is_engine_exiting() {\n  164 |             return;\n  165 |         }","lines":3}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`panic_call_error` indexes `vararg_types[argument as usize]` on `GDEXTENSION_CALL_ERROR_INVALID_ARGUMENT`. `argument` is an `i32` from Godot; if it is out of range (or negative, becoming a huge usize) this panics with an opaque index-out-of-bounds error inside the very function meant to produce a readable panic, masking the real engine error info.","fix":"Use `vararg_types.get(argument as usize)` and fall back to a textual `\"argument #N\"` when out of range.","locations":[{"ref":"godot-ffi/src/extras.rs:128-133","code":"  128 |         GDEXTENSION_CALL_ERROR_INVALID_ARGUMENT => {\n  129 |             let from = vararg_types[argument as usize];\n  130 |             let to = VariantType::from_sys(expected as GDExtensionVariantType);\n  131 |             let i = argument + 1;\n  132 | \n  133 |             format!(\"cannot convert argument #{i} from {from:?} to {to:?}\")","lines":6}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`process_godot_fns` replaces signal items from an impl block via index bookkeeping, but `handle_regular_virtual_fn` in interface_trait_impl.rs uses `panic!(\"unexpected parameter type: {new_params:?}\")` and `.expect(\"parameter had no name\")` / `.expect(\"type had no span\")` when applying the f32->f64 substitution. These are reachable on syntactically unusual but parseable user signatures (e.g. a virtual `process` whose modified parameter is not a plain typed param), producing an ICE-style panic instead of a clean compile error.","fix":"Convert these panics/expects into `bail!` with the function/parameter span so malformed input yields a clean compile_error!.","locations":[{"ref":"godot-macros/src/class/data_models/interface_trait_impl.rs:473-487","code":"  473 |             for (index, new_ty) in signature_info.modified_param_types.iter() {\n  474 |                 let venial::FnParam::Typed(typed) = &mut new_params.inner[*index].0 else {\n  475 |                     panic!(\"unexpected parameter type: {new_params:?}\");\n  476 |                 };\n  477 | \n  478 |                 // Capture original type span before replacing (e.g. the user's `f32`).\n  479 |                 original_ty_span = Some(typed.ty.span());\n  480 | \n  481 |                 typed.ty = new_ty.clone();\n  482 |                 param_name = Some(typed.name.clone());\n  483 |             }\n  484 | \n  485 |             let original_body = &original_method.body;\n  486 |             let param_name = param_name.expect(\"parameter had no name\");\n  487 |             let original_ty_span = original_ty_span.expect(\"type had no span\");","lines":15}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`format_virtual_method_xml` panics (`panic!(...)`) when a virtual method in an `impl ITrait for MyClass` block is annotated with `@experimental` or `@deprecated` doc tags. This is user-controllable input (a doc comment), so a malformed/unsupported annotation produces an ICE-style proc-macro panic with no span, instead of a clean `compile_error!` pointing at the method.","fix":"Return a `ParseResult`/`bail!` with the method's span (threading the error out of `document_interface_trait_impl`) instead of `panic!`, so the user gets a localized compile error.","locations":[{"ref":"godot-macros/src/docs/extract_docs.rs:318-327","code":"  318 | fn format_virtual_method_xml(method: venial::Function) -> Option<String> {\n  319 |     let XmlParagraphs {\n  320 |         description_content,\n  321 |         deprecated_attr,\n  322 |         experimental_attr,\n  323 |     } = attribute_docs_to_xml_paragraphs(&method.attributes)?;\n  324 | \n  325 |     if !deprecated_attr.is_empty() || !experimental_attr.is_empty() {\n  326 |         panic!(\"Virtual methods can't be documented as neither `@experimental` nor `@deprecated`.\");\n  327 |     }","lines":10}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"`ExtendBuffer::push` writes to `self.buf[self.len]` and increments `len` with no check that `len < N`. It relies entirely on callers (the `PackedArray::extend` loop) honoring `is_full()`. A future caller that forgets the `is_full()` guard would write out of bounds of the array (panic via index in debug, but the `MaybeUninit` write itself is the concern). The doc comment says 'Panics if buffer is full' but no such panic is coded for the `len == N` case writing at index N.","fix":"Add a debug assertion `sys::strict_assert!(self.len < N)` before the write, matching the documented contract.","locations":[{"ref":"godot-core/src/builtin/collections/extend_buffer.rs:42-45","code":"   42 |     fn push(&mut self, value: T) {\n   43 |         self.buf[self.len].write(value);\n   44 |         self.len += 1;\n   45 |     }","lines":4}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"low","easy":false,"description":"`discover_main_thread` does `MAIN_THREAD_ID.clear(); MAIN_THREAD_ID.set(id);` non-atomically, while `main_thread_id()` checks `is_initialized()` then calls `get_unchecked()`. Between `clear()` and `set()` the cell is `None`; a concurrent `is_main_thread()` from another thread can hit `unreachable_unchecked()` UB or a racing `get_unchecked()` on `None`. Runs at `InitLevel::Servers`, documented main-thread-only and before user threads, so impact is low, but the clear+set transiently violates the cell's 'never None after init' invariant.","fix":"Add a `replace`/`overwrite` method to `ManualInitCell` that swaps in place without a None window, or guard `MAIN_THREAD_ID` with an atomic flag.","locations":[{"ref":"godot-ffi/src/lib.rs:725-741","code":"  725 | pub unsafe fn discover_main_thread() {\n  726 |     #[cfg(not(wasm_nothreads))]\n  727 |     {\n  728 |         if is_main_thread() {\n  729 |             // we don't have to do anything if the current thread is already the main thread.\n  730 |             return;\n  731 |         }\n  732 | \n  733 |         let thread_id = std::thread::current().id();\n  734 | \n  735 |         // SAFETY: initialize must have already been called before this function is called. By clearing and setting the cell again we can reinitialize it.\n  736 |         unsafe {\n  737 |             MAIN_THREAD_ID.clear();\n  738 |             MAIN_THREAD_ID.set(thread_id);\n  739 |         }\n  740 |     }\n  741 | }","lines":17},{"ref":"godot-ffi/src/lib.rs:603-613","code":"  603 | pub fn main_thread_id() -> std::thread::ThreadId {\n  604 |     assert!(\n  605 |         MAIN_THREAD_ID.is_initialized(),\n  606 |         \"Godot engine not available; make sure you are not calling it from unit/doc tests\"\n  607 |     );\n  608 | \n  609 |     // SAFETY: We initialized the cell during library initialization, before any other code is executed.\n  610 |     let thread_id = unsafe { MAIN_THREAD_ID.get_unchecked() };\n  611 | \n  612 |     *thread_id\n  613 | }","lines":11}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"`unregister_classes` has a `// TODO clean up dyn traits` and never removes entries from the global `DYN_TRAITS_BY_TYPEID` map. Across hot reloads (editor), each `auto_register_classes` pass re-pushes `DynTraitImpl`s for the same classes into the per-typeid `Vec` via `or_default().push(...)`, so the vectors grow unboundedly and stale (old-code) dynify function pointers accumulate. Besides the leak, stale function pointers for classes that were unregistered/reloaded remain reachable through `try_dynify_object`.","fix":"In `unregister_classes`, also lock `global_dyn_traits_by_typeid()` and remove the `DynTraitImpl` entries whose `class_name` belongs to the classes being unregistered (clearing emptied typeid buckets).","locations":[{"ref":"godot-core/src/registry/class.rs:318-321","code":"  318 | pub fn unregister_classes(init_level: InitLevel) {\n  319 |     let mut loaded_classes_by_level = global_loaded_classes_by_init_level();\n  320 |     let mut loaded_classes_by_name = global_loaded_classes_by_name();\n  321 |     // TODO clean up dyn traits","lines":4},{"ref":"godot-core/src/registry/class.rs:298-307","code":"  298 |         // Transpose Class->Trait relations to Trait->Class relations.\n  299 |         for (trait_type_id, mut dyn_trait_impl) in info.dynify_fns_by_trait.drain() {\n  300 |             // Note: Must be done after filling out the class info since shards are being iterated in unspecified order.\n  301 |             dyn_trait_impl.parent_class_name = info.parent_class_name;\n  302 | \n  303 |             dyn_traits_by_typeid\n  304 |                 .entry(trait_type_id)\n  305 |                 .or_default()\n  306 |                 .push(dyn_trait_impl);\n  307 |         }","lines":10}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In the encode/decode bounds check `byte_offset + $bytes > self.len()`, the addition `byte_offset + $bytes` can overflow `usize`. In release builds (wrapping arithmetic) a large `byte_offset` makes the sum wrap to a small value, passing the bounds check and then performing an out-of-bounds read/write into Godot-owned memory via the FFI encode/decode call. In debug builds it panics instead of returning the documented `Err`. The same flaw exists in `encode_var`/`decode_var` which pass `byte_offset as i64` to Godot without an upper-bound check.","fix":"Use checked arithmetic, e.g. `byte_offset.checked_add($bytes).map_or(true, |end| end > self.len())` to return `Err(())` on overflow, or compare via `self.len().checked_sub($bytes).map_or(true, |max| byte_offset > max)`.","locations":[{"ref":"godot-core/src/builtin/collections/packed_array.rs:806-808","code":"  806 |             if byte_offset + $bytes > self.len() {\n  807 |                 return Err(());\n  808 |             }","lines":3},{"ref":"godot-core/src/builtin/collections/packed_array.rs:824-826","code":"  824 |             if byte_offset + $bytes > self.len() {\n  825 |                 return Err(());\n  826 |             }","lines":3}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"make_extra_constructors allocates Vec::with_capacity(constructors.len() - 2) twice. If ever reached with fewer than 2 constructors, this is an integer underflow (debug panic 'attempt to subtract with overflow'). Today the caller make_construct_fns indexes constructors[1] before calling this (panicking earlier if len<2), so the path is reachable only with len>=2, but the `- 2` is fragile and would produce an opaque panic message rather than a clear one.","fix":"Use constructors.len().saturating_sub(2) for the capacity hints (capacity is only a hint; this avoids a confusing underflow panic).","locations":[{"ref":"godot-codegen/src/generator/lifecycle_builtins.rs:165-166","code":"  165 |     let mut extra_decls = Vec::with_capacity(constructors.len() - 2);\n  166 |     let mut extra_inits = Vec::with_capacity(constructors.len() - 2);","lines":2}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"EnumeratorValue::to_i64 casts a Bitfield(u64) to i64 with `as` (the doc admits it 'may map some bitfield values to negative numbers'). find_index_enum_max_impl guards against bitfields, but to_i64 is also used by unsuffixed_lit, the general path for emitting bitfield literals. A bitfield value with bit 63 set (>= 2^63) would be emitted as a negative literal, generating wrong code. Latent: current Godot bitfields don't use bit 63, but the JSON value is unchecked external input.","fix":"In unsuffixed_lit, emit bitfield values via Literal::u64_unsuffixed(*i) directly rather than routing through to_i64(), so high-bit values aren't silently negated.","locations":[{"ref":"godot-codegen/src/models/domain/enums.rs:148-166","code":"  148 |     /// Converts `self` to an `i64`.\n  149 |     ///\n  150 |     /// This may map some bitfield values to negative numbers.\n  151 |     pub fn to_i64(&self) -> i64 {\n  152 |         // Conversion is safe because i64 is used in the original JSON.\n  153 |         match self {\n  154 |             EnumeratorValue::Enum(i) => *i as i64,\n  155 |             EnumeratorValue::Bitfield(i) => *i as i64,\n  156 |         }\n  157 |     }\n  158 | \n  159 |     /// This method is needed for platform-dependent types like raw `VariantOperator`, which can be `i32` or `u32`.\n  160 |     /// Do not suffix them.\n  161 |     ///\n  162 |     /// See also `BuiltinVariant::unsuffixed_ord_lit()`.\n  163 |     pub fn unsuffixed_lit(&self) -> Literal {\n  164 |         Literal::i64_unsuffixed(self.to_i64())\n  165 |     }\n  166 | }","lines":19}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Integer-vector `length()` computes `(self.length_squared() as real).sqrt()`, where `length_squared()` returns `i32` (sum of squares computed in `i32` via glam). For components with large magnitudes (e.g. ~46341 on a single axis, or smaller per-axis values in 3D/4D), the squared sum overflows `i32` and wraps before being cast to `real`, yielding a nonsensical (possibly negative -> NaN) length. `distance_squared_to` for integer vectors has the same exposure.","fix":"Compute integer length via the float glam type (`to_glam_real().length()`) or accumulate squares in `i64`/`real` before the sqrt, to avoid i32 overflow.","locations":[{"ref":"godot-core/src/builtin/vectors/vector_macros.rs:451-465","code":"  451 |             /// Returns the length (magnitude) of this vector.\n  452 |             #[inline]\n  453 |             pub fn length(self) -> real {\n  454 |                 // does the same as glam's length() but also works for integer vectors\n  455 |                 (self.length_squared() as real).sqrt()\n  456 |             }\n  457 | \n  458 |             /// Squared length (squared magnitude) of this vector.\n  459 |             ///\n  460 |             /// Runs faster than [`length()`][Self::length], so prefer it if you need to compare vectors or need the\n  461 |             /// squared distance for some formula.\n  462 |             #[inline]\n  463 |             pub fn length_squared(self) -> $Scalar {\n  464 |                 self.to_glam().length_squared()\n  465 |             }","lines":15},{"ref":"godot-core/src/builtin/vectors/vector_macros.rs:553-556","code":"  553 |         #[inline]\n  554 |         pub fn distance_squared_to(self, to: Self) -> i32 {\n  555 |             (to - self).length_squared() as i32\n  556 |         }","lines":4}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`lower_bound`/`upper_bound` compute `n + 1` for excluded/included bounds on `i64` without overflow guarding. A range whose excluded start or included end is `i64::MAX` (reachable via `wrapped(..=i64::MAX)` or a `usize` range near `i64::MAX` on 64-bit) overflows: it panics in debug and wraps to `i64::MIN` in release, silently corrupting the (from, to) passed to Godot string APIs.","fix":"Use `n.saturating_add(1)` (or `checked_add` with an explicit clamp/error) for the excluded-start and included-end cases.","locations":[{"ref":"godot-core/src/meta/signed_range.rs:42-56","code":"   42 | fn lower_bound(bound: Bound<i64>) -> Option<i64> {\n   43 |     match bound {\n   44 |         Bound::Included(n) => Some(n),\n   45 |         Bound::Excluded(n) => Some(n + 1),\n   46 |         Bound::Unbounded => None,\n   47 |     }\n   48 | }\n   49 | \n   50 | fn upper_bound(bound: Bound<i64>) -> Option<i64> {\n   51 |     match bound {\n   52 |         Bound::Included(n) => Some(n + 1),\n   53 |         Bound::Excluded(n) => Some(n),\n   54 |         Bound::Unbounded => None,\n   55 |     }\n   56 | }","lines":15}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`<GFile as BufRead>::consume(amt)` computes `(self.last_buffer_size - amt) as i64`. If a caller passes `amt > last_buffer_size` (BufRead's contract says amt must not exceed the last `fill_buf` length, but nothing enforces it here), this is a `usize` subtraction that panics in debug and wraps in release, yielding a huge offset and an out-of-range seek. `last_buffer_size` is also stale if `consume` is called without a preceding `fill_buf`.","fix":"Clamp with `let amt = amt.min(self.last_buffer_size);` before computing the offset, and decrement `last_buffer_size` by the consumed amount.","locations":[{"ref":"godot-core/src/tools/gfile.rs:820-826","code":"  820 |     fn consume(&mut self, amt: usize) {\n  821 |         // Cursor is being moved by `FileAccess::get_buffer()` call, so we need to adjust it.\n  822 |         let offset = (self.last_buffer_size - amt) as i64;\n  823 |         let pos = SeekFrom::Current(-offset);\n  824 | \n  825 |         self.seek(pos).expect(\"failed to consume bytes during read\");\n  826 |     }","lines":7}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`validate_or_panic` rejects the minimum supported Godot version itself. `MIN_SUPPORTED_VERSION` is derived from `ALL_VERSIONS[0]` which is `(4, 2, 0)`, so `min_minor == 2`. The assertion `self.minor > min_minor` therefore requires `minor > 2`, rejecting Godot 4.1 AND 4.2 even though 4.2 is the declared minimum (there is an `api-4-2` prebuilt feature). An `api-custom`/`api-custom-json` build pointed at a real Godot 4.2 binary panics at build time. The panic message ('Godot 4.0 is no longer supported') is also wrong/misleading. This is a regression from when the literal `0` was refactored to `MIN_SUPPORTED_VERSION` without changing `>` to `>=`.","fix":"Change the assertion to `self.minor >= min_minor` and update the message to reference the actual minimum, e.g. \"Godot versions below 4.{min_minor} are no longer supported\".","locations":[{"ref":"godot-bindings/src/lib.rs:43-59","code":"   43 |     pub(crate) fn validate_or_panic(self) -> Self {\n   44 |         let (min_major, min_minor) = MIN_SUPPORTED_VERSION;\n   45 | \n   46 |         assert_eq!(\n   47 |             self.major, min_major,\n   48 |             \"Only Godot versions with major version 4 are supported; found version {}.\",\n   49 |             self.full_string\n   50 |         );\n   51 | \n   52 |         assert!(\n   53 |             self.minor > min_minor,\n   54 |             \"Godot 4.0 is no longer supported by godot-rust; found version {}.\",\n   55 |             self.full_string\n   56 |         );\n   57 | \n   58 |         self\n   59 |     }","lines":17},{"ref":"godot-bindings/src/import.rs:28-31","code":"   28 | pub const MIN_SUPPORTED_VERSION: (u8, u8) = {\n   29 |     let (major, minor, _patch) = ALL_VERSIONS[0];\n   30 |     (major, minor)\n   31 | };","lines":4}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`InaccessibleGuard::can_drop` combines its two safety preconditions with `||` instead of `&&`. The doc states a guard may be dropped only when it is released in the correct order (`state.stack_depth == self.stack_depth`) AND there is no accessible/shared borrow (`may_unset_inaccessible()`). With `||`, `can_drop` returns `true` when only one holds. `try_drop` then proceeds to `perform_drop`, which either poisons the cell (wrong order, when only `may_unset_inaccessible` was true) or panics on `unset_inaccessible().unwrap()` (a shared/accessible borrow still exists, when only the stack_depth match was true). This defeats the whole point of the non-panicking `try_drop` spin-retry used in multi-threaded code (see tests/mock/main.rs:140-145).","fix":"Change the `||` to `&&`: `state.borrow_state.may_unset_inaccessible() && state.stack_depth == self.stack_depth`.","locations":[{"ref":"godot-cell/src/guards.rs:256-265","code":"  256 |     /// Returns `true` if guard can be safely dropped, i.e.:\n  257 |     ///\n  258 |     /// - Guard is being released in correct order.\n  259 |     /// - There is no accessible mutable reference to underlying value.\n  260 |     /// - There are no shared references to underlying value.\n  261 |     #[doc(hidden)]\n  262 |     pub fn can_drop(&self) -> bool {\n  263 |         let state = unsafe { self.state.get().as_mut() }.unwrap();\n  264 |         state.borrow_state.may_unset_inaccessible() || state.stack_depth == self.stack_depth\n  265 |     }","lines":10}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"map_c_type mishandles multi-level (double) pointers. It detects a pointer via c_type.ends_with('*'), then computes the pointee with trim_end_matches('*').trim(), which strips ALL trailing '*' at once and emits only a single *mut/*const. So 'int **' / 'void **' map to '*mut i32' / '*mut c_void' instead of '*mut *mut i32'. It also only honors 'const' at the outermost level. The reference implementation in conv/type_conversions.rs::to_rust_type_uncached (which the in-code comment says this duplicates) strips exactly one '*' and recurses (see its explicit double-pointer note). The two have diverged; any header types/interface entry with a double pointer gets a wrong FFI type.","fix":"Strip a single '*' and recurse, mirroring to_rust_type_uncached: strip_suffix('*'), trim, map pointee recursively, wrap in *mut/*const based on per-level const. Ideally extract one shared pointer-parsing helper used by both call sites.","locations":[{"ref":"godot-codegen/src/generator/header_codegen.rs:387-410","code":"  387 | fn map_c_type(c_type: &str) -> TokenStream {\n  388 |     // Code duplication: pointer parsing logic - conv/type_conversions.rs::to_rust_type_uncached().\n  389 | \n  390 |     let (is_const, c_type) = if let Some(rest) = c_type.strip_prefix(\"const \") {\n  391 |         (true, rest.trim())\n  392 |     } else {\n  393 |         (false, c_type)\n  394 |     };\n  395 | \n  396 |     // Handle pointer types\n  397 |     if c_type.ends_with('*') {\n  398 |         let base_type = c_type.trim_end_matches('*').trim();\n  399 |         let inner = map_c_type_as_pointee(base_type);\n  400 | \n  401 |         return if is_const {\n  402 |             quote! { *const #inner }\n  403 |         } else {\n  404 |             quote! { *mut #inner }\n  405 |         };\n  406 |     }\n  407 | \n  408 |     // Base types\n  409 |     map_c_base_type(c_type)\n  410 | }","lines":24},{"ref":"godot-codegen/src/conv/type_conversions.rs:209-237","code":"  209 |     if ty.ends_with('*') {\n  210 |         // Pointer type; strip '*', see if const, and then resolve the inner type.\n  211 |         let mut ty = ty[0..ty.len() - 1].to_string();\n  212 | \n  213 |         // 'const' should apply to the innermost pointer, if present.\n  214 |         let is_const = ty.starts_with(\"const \") && !ty.ends_with('*');\n  215 |         if is_const {\n  216 |             ty = ty.replace(\"const \", \"\");\n  217 |         }\n  218 | \n  219 |         // Sys pointer type defined in `gdextension_interface` and used as param for given method, e.g. `GDExtensionInitializationFunction`.\n  220 |         // Note: we branch here to avoid clashes with actual GDExtension classes.\n  221 |         if ty.starts_with(\"GDExtension\") {\n  222 |             let ty = rustify_ty(&ty);\n  223 |             return RustTy::RawPointer {\n  224 |                 inner: Box::new(RustTy::SysPointerType {\n  225 |                     tokens: quote! { sys::#ty },\n  226 |                 }),\n  227 |                 is_const,\n  228 |             };\n  229 |         }\n  230 | \n  231 |         // .trim() is necessary here, as Godot places a space between a type and the stars when representing a double pointer.\n  232 |         // Example: \"int*\" but \"int **\".\n  233 |         let inner_type = to_rust_type(ty.trim(), None, None, ctx);\n  234 |         return RustTy::RawPointer {\n  235 |             inner: Box::new(inner_type),\n  236 |             is_const,\n  237 |         };","lines":29}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`Aabb::intersects()` is missing the Z-axis upper-bound check. It tests `position.x <= end_b.x && end.x >= b.position.x` for X and Y, but for Z it only tests `position.z <= end_b.z` and omits the matching `end.z >= b.position.z`. Compare to `intersects_exclude_borders()` (lines 326-331) which correctly has both Z comparisons. As a result, two AABBs that are separated only along the Z axis (b entirely below self in Z) are wrongly reported as intersecting. The existing unit tests pass only because their test cases are also separated on X/Y.","fix":"Add the missing condition `&& end.z >= b.position.z` to `intersects()` so it mirrors the X and Y checks (and matches `intersects_exclude_borders`).","locations":[{"ref":"godot-core/src/builtin/aabb.rs:304-313","code":"  304 |     pub fn intersects(self, b: Aabb) -> bool {\n  305 |         let end = self.end();\n  306 |         let end_b = b.end();\n  307 | \n  308 |         self.position.x <= end_b.x\n  309 |             && end.x >= b.position.x\n  310 |             && self.position.y <= end_b.y\n  311 |             && end.y >= b.position.y\n  312 |             && self.position.z <= end_b.z\n  313 |     }","lines":10},{"ref":"godot-core/src/builtin/aabb.rs:326-331","code":"  326 |         self.position.x < end_b.x\n  327 |             && end.x > b.position.x\n  328 |             && self.position.y < end_b.y\n  329 |             && end.y > b.position.y\n  330 |             && self.position.z < end_b.z\n  331 |             && end.z > b.position.z","lines":6}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Callable::object() documents \"Also returns None if the object is dead\" and then unconditionally calls maybe_inc_ref() on the object returned by InnerCallable::get_object(). The sibling Signal::object() (signal.rs:142-154) had exactly this bug fixed by inserting an is_instance_valid() guard, because get_object() can hand back a pointer to an already-freed object (e.g. destroyed on another thread), and maybe_inc_ref() then touches freed memory and panics (fatal during Drop). Callable::object() is missing that guard, so it both violates its own contract (does not return None for dead objects) and can access a freed instance / panic.","fix":"Mirror Signal::object(): after obtaining the object from get_object(), check `if !object.is_instance_valid() { return None; }` before calling maybe_inc_ref(), so dead objects return None as documented.","locations":[{"ref":"godot-core/src/builtin/callable.rs:411-424","code":"  411 |     /// Returns the object on which this callable is called.\n  412 |     ///\n  413 |     /// Returns `None` when this callable doesn't have any target object to call a method on (regardless of whether the method exists for that\n  414 |     /// target or not). Also returns `None` if the object is dead. You can differentiate these two cases using [`object_id()`][Self::object_id].\n  415 |     ///\n  416 |     /// _Godot equivalent: `get_object`_\n  417 |     pub fn object(&self) -> Option<Gd<classes::Object>> {\n  418 |         // Increment refcount because we're getting a reference, and `InnerCallable::get_object` doesn't\n  419 |         // increment the refcount.\n  420 |         self.as_inner().get_object().map(|mut object| {\n  421 |             <classes::Object as Bounds>::DynMemory::maybe_inc_ref(&mut object.raw);\n  422 |             object\n  423 |         })\n  424 |     }","lines":14},{"ref":"godot-core/src/builtin/signal.rs:142-154","code":"  142 |     pub fn object(&self) -> Option<Gd<Object>> {\n  143 |         let mut object = self.as_inner().get_object()?;\n  144 | \n  145 |         // `get_object()` may hand out a pointer to an already-freed object (e.g. when the object was destroyed on another thread).\n  146 |         // Validate liveness before touching the instance, honoring this method's contract to return `None` for dead objects. Without this,\n  147 |         // `maybe_inc_ref()` below would access the freed instance and panic -- fatal if it happens during `Drop`, see `FallibleSignalFuture`.\n  148 |         if !object.is_instance_valid() {\n  149 |             return None;\n  150 |         }\n  151 | \n  152 |         <Object as Bounds>::DynMemory::maybe_inc_ref(&mut object.raw);\n  153 |         Some(object)\n  154 |     }","lines":13}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`FromGodot::from_variant` for `Option<T>` ignores the `qualifies_as_special_none` special case that `try_from_variant` honors. For objects, Godot 4.2 sends an empty `NodePath` (not a nil Variant) when clearing an exported property; `Gd::qualifies_as_special_none` recognizes that and `try_from_variant` returns `Ok(None)`. But `from_variant` only checks `variant.is_nil()`, so the empty-NodePath case falls through to `T::from_variant(variant)`, which panics instead of yielding `None`. The two methods disagree on the same input.","fix":"Make `from_variant` mirror `try_from_variant`: check `T::Via::qualifies_as_special_none(variant)` (return `None`) before `is_nil()`. Better, implement `from_variant` as `try_from_variant(variant).unwrap_or_else(...)` to keep both paths in sync.","locations":[{"ref":"godot-core/src/meta/godot_convert/impls.rs:129-150","code":"  129 |     fn try_from_variant(variant: &Variant) -> Result<Self, ConvertError> {\n  130 |         // Note: this forwards to T::Via, not Self::Via (= Option<T>::Via).\n  131 |         // For Option<T>, there is a blanket impl GodotType, so case differentiations are not possible.\n  132 |         if T::Via::qualifies_as_special_none(variant) {\n  133 |             return Ok(None);\n  134 |         }\n  135 | \n  136 |         if variant.is_nil() {\n  137 |             return Ok(None);\n  138 |         }\n  139 | \n  140 |         let value = T::try_from_variant(variant)?;\n  141 |         Ok(Some(value))\n  142 |     }\n  143 | \n  144 |     fn from_variant(variant: &Variant) -> Self {\n  145 |         if variant.is_nil() {\n  146 |             return None;\n  147 |         }\n  148 | \n  149 |         Some(T::from_variant(variant))\n  150 |     }","lines":22}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`InaccessibleGuardBlocking::try_drop` acquires the tracker lock with `self.state.lock()` but never `.unwrap()`s it, so a poisoned mutex is silently ignored (inconsistent with every other lock site in this file which uses `.unwrap()`). More importantly, on the success path it returns `Ok(())` and lets `self` drop normally, invoking the `Drop` impl -> `ManuallyDrop::drop(inner)` -> `InaccessibleGuard::perform_drop`, which can still poison/panic if state changed between the `can_drop()` check and the actual drop. Because `can_drop()` is evaluated while holding the lock but the lock is released before `Drop` runs, the check is not atomic with the drop.","fix":"Use `self.state.lock().unwrap()` and hold the lock across the can_drop check and the drop, or perform the drop manually under the lock (mirroring the panicking `try_drop` with `ManuallyDrop`).","locations":[{"ref":"godot-cell/src/blocking_guards.rs:140-156","code":"  140 |     pub fn try_drop(self) -> Result<(), Self> {\n  141 |         let can_drop = {\n  142 |             let _tracker_guard = self.state.lock();\n  143 |             self.inner.can_drop()\n  144 |         };\n  145 | \n  146 |         if !can_drop { Err(self) } else { Ok(()) }\n  147 |     }\n  148 | }\n  149 | \n  150 | impl<T> Drop for InaccessibleGuardBlocking<'_, T> {\n  151 |     fn drop(&mut self) {\n  152 |         let _tracker_guard = self.state.lock().unwrap();\n  153 |         unsafe { ManuallyDrop::drop(&mut self.inner) };\n  154 |         drop(_tracker_guard)\n  155 |     }\n  156 | }","lines":17}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"make_notification_enum merges a class's notification constants with those of all base classes (extend, no dedup) and emits them both as enum variants with explicit discriminants (`SHOUT = ord`) and as From<i32> match arms. Nothing deduplicates by identifier or ordinal. Two notification constants in a hierarchy that share the same integer value produce duplicate explicit enum discriminants (a hard Rust compile error) and duplicate From<i32> match arms (unreachable_patterns). Whether it triggers depends on the exact extension_api.json for a given Godot version.","fix":"Deduplicate all_constants after merging base-class constants - by identifier, and assert/skip conflicting ordinals - before generating variants and match arms (e.g. order-preserving set keyed on the shout ident).","locations":[{"ref":"godot-codegen/src/generator/notifications.rs:73-92","code":"   73 |     // Collect all notification constants from current and base classes\n   74 |     let mut all_constants = all_constants.clone();\n   75 |     for base_name in all_bases {\n   76 |         if let Some(constants) = ctx.notification_constants(base_name) {\n   77 |             all_constants.extend(constants.iter().cloned());\n   78 |         }\n   79 |     }\n   80 | \n   81 |     let enum_name = ctx.notification_enum_name(class_name).name;\n   82 |     let doc_str = format!(\n   83 |         \"Notification type for class [`{c}`][crate::classes::{c}].\",\n   84 |         c = class_name.rust_ty\n   85 |     );\n   86 | \n   87 |     let mut notification_enumerators_shout = Vec::new();\n   88 |     let mut notification_enumerators_ord = Vec::new();\n   89 |     for (constant_ident, constant_value) in all_constants {\n   90 |         notification_enumerators_shout.push(constant_ident);\n   91 |         notification_enumerators_ord.push(constant_value);\n   92 |     }","lines":20},{"ref":"godot-codegen/src/generator/notifications.rs:105-128","code":"  105 |         pub enum #enum_name {\n  106 |             #(\n  107 |                 #notification_enumerators_shout = #notification_enumerators_ord,\n  108 |             )*\n  109 | \n  110 |             /// Since Godot represents notifications as integers, it's always possible that a notification outside the known types\n  111 |             /// is received. For example, the user can manually issue notifications through `Object::notify()`.\n  112 |             ///\n  113 |             /// This is also necessary if you develop an extension on a Godot version and want to be forward-compatible with newer\n  114 |             /// versions. If Godot adds new notifications, they will be unknown to your extension, but you can still handle them.\n  115 |             Unknown(i32),\n  116 |         }\n  117 | \n  118 |         impl From<i32> for #enum_name {\n  119 |             /// Always succeeds, mapping unknown integers to the `Unknown` variant.\n  120 |             fn from(enumerator: i32) -> Self {\n  121 |                 match enumerator {\n  122 |                     #(\n  123 |                         #notification_enumerators_ord => Self::#notification_enumerators_shout,\n  124 |                     )*\n  125 |                     other_int => Self::Unknown(other_int),\n  126 |                 }\n  127 |             }\n  128 |         }","lines":24}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`find_key_by_value` returns `Some(K::from_variant(&key))` when the searched value is not found but the dictionary happens to contain a NIL key. Godot's `find_key` returns NIL on 'not found'; the guard `if !key.is_nil() || self.as_inner().has(&key)` then evaluates `has(&NIL)`, which is `true` if a NIL key exists, so a not-found lookup incorrectly yields `Some(NIL)` instead of `None`.","fix":"Distinguish the two cases: only treat NIL as a found key when the searched value was actually associated with a NIL key. Consider verifying that `get(found_key) == value` before returning `Some`, or document/accept the ambiguity explicitly.","locations":[{"ref":"godot-core/src/builtin/collections/dictionary.rs:287-299","code":"  287 |     pub fn find_key_by_value(&self, value: impl AsArg<V>) -> Option<K>\n  288 |     where\n  289 |         K: FromGodot,\n  290 |     {\n  291 |         meta::arg_into_ref!(value: V);\n  292 |         let key = self.as_inner().find_key(&value.to_variant());\n  293 | \n  294 |         if !key.is_nil() || self.as_inner().has(&key) {\n  295 |             Some(K::from_variant(&key))\n  296 |         } else {\n  297 |             None\n  298 |         }\n  299 |     }","lines":13}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Gd::is_dynamic_class() / is_dynamic_class_of() and owned_cast() validate liveness only via check_rtti(), which is a no-op under the 'disengaged' safeguard level. owned_cast() then calls is_dynamic_class_of() -> as_object_ref().is_class() which dereferences the object pointer via FFI. On a dead object at the disengaged level this is a use-after-free with no diagnostic. This is the same class of issue as free(), but reachable through the very common cast()/try_cast() path.","fix":"Document clearly that the disengaged safeguard level removes liveness validation from cast/bind/etc. (making those operations unsafe on stale pointers), or keep a minimal liveness check in cast paths regardless of level.","locations":[{"ref":"godot-core/src/obj/raw_gd.rs:139-160","code":"  139 |     pub(super) fn owned_cast<U>(self) -> Result<RawGd<U>, Self>\n  140 |     where\n  141 |         U: GodotClass,\n  142 |     {\n  143 |         if self.is_null() {\n  144 |             // Null can be cast to anything; ref-count is irrelevant.\n  145 |             return Ok(RawGd::null());\n  146 |         }\n  147 | \n  148 |         // Before Godot API calls, make sure the object is alive (and in Debug mode, of the correct type).\n  149 |         // Current design decision: EVERY cast fails on incorrect type, even if target type is correct. This avoids the risk of violated\n  150 |         // invariants that leak to the Godot implementation. Also, we do not provide a way to recover from bad types -- this is always\n  151 |         // a bug that must be solved by the user.\n  152 |         self.check_rtti(\"cast\");\n  153 | \n  154 |         if self.is_dynamic_class_of::<U>() {\n  155 |             // SAFETY: is_class() confirmed U is a valid type.\n  156 |             Ok(unsafe { self.into_reinterpreted() })\n  157 |         } else {\n  158 |             Err(self)\n  159 |         }\n  160 |     }","lines":22},{"ref":"godot-core/src/obj/raw_gd.rs:400-403","code":"  400 |     #[cfg(not(safeguards_balanced))]\n  401 |     pub(crate) fn check_rtti(&self, _method_name: &'static str) {\n  402 |         // Disengaged level: no-op.\n  403 |     }","lines":4}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The `with_singleton` unregister closure calls `T::singleton()` to obtain the instance, then `Engine::unregister_singleton(...)`, then `singleton.free()`. `T::singleton()` goes through `singleton_unchecked_type`, which (balanced+ safeguards) asserts `current_init_level >= T::INIT_LEVEL`. During deinit the current init level is being torn down, so fetching the singleton this way is fragile and, if the singleton was already removed or the level already lowered, can panic or return a stale pointer right before `free()`. Recent history (\"Fix dangling singleton pointer after deinit\") shows this area is bug-prone.","fix":"Capture/free the singleton via the instance ID or the pointer returned by `Engine::get_singleton` defensively (null-check), and avoid relying on `T::singleton()`'s init-level assertion during the deinit path.","locations":[{"ref":"godot-core/src/registry/shard.rs:271-291","code":"  271 |     pub fn with_singleton<T>(mut self) -> Self\n  272 |     where\n  273 |         T: UserSingleton\n  274 |             + Bounds<Memory = bounds::MemManual, Declarer = bounds::DeclUser>\n  275 |             + NewAlloc\n  276 |             + Inherits<classes::Object>,\n  277 |     {\n  278 |         self.register_singleton_fn = Some(|| {\n  279 |             crate::classes::Engine::singleton()\n  280 |                 .register_singleton(&T::class_id().to_string_name(), &T::new_alloc());\n  281 |         });\n  282 | \n  283 |         self.unregister_singleton_fn = Some(|| {\n  284 |             let singleton = T::singleton();\n  285 |             crate::classes::Engine::singleton()\n  286 |                 .unregister_singleton(&T::class_id().to_string_name());\n  287 |             singleton.free();\n  288 |         });\n  289 | \n  290 |         self\n  291 |     }","lines":21}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`<GFile as Seek>::seek(SeekFrom::End(offset))` uses the wrong bounds check. The absolute target position is `length + offset` (offset is normally <= 0 when seeking from the end). The guard `(self.check_file_length() as i64) < offset` instead rejects *positive* offsets and never catches a large *negative* offset that lands before the start of the file. So `seek(End(-(length+100)))` passes the check and seeks to a negative/clamped position, while a legitimate `seek(End(5))` (past end, which Godot allows for writing) is wrongly rejected with 'Position can't be set before the file beginning'.","fix":"Compute `let target = self.check_file_length() as i64 + offset;` and return the InvalidInput error when `target < 0`. Then `seek_end_ex().position(offset)` and return the resulting position.","locations":[{"ref":"godot-core/src/tools/gfile.rs:772-782","code":"  772 |             SeekFrom::End(offset) => {\n  773 |                 if (self.check_file_length() as i64) < offset {\n  774 |                     return Err(std::io::Error::new(\n  775 |                         ErrorKind::InvalidInput,\n  776 |                         \"Position can't be set before the file beginning\",\n  777 |                     ));\n  778 |                 }\n  779 |                 self.fa.seek_end_ex().position(offset).done();\n  780 |                 self.check_error()?;\n  781 |                 Ok(self.fa.get_position())\n  782 |             }","lines":11}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `impl AtomicIntLike for Option<T>`, `from_u8` treats the associated const `u8::MAX` as the sentinel for `None` and `to_u8` maps `None` to `u8::MAX`. The invariant 'Make sure no variant has this value' is unenforced: if an enum used inside `AtomicEnum<Option<E>>` defines a variant with discriminant 255, that variant is silently conflated with `None` on every store/load, with no compile-time or runtime check.","fix":"Add a debug assertion in `Option::<T>::to_u8`/`from_u8` (or a `static_assert!` in the macro) that no real variant equals `u8::MAX`, or document the limitation prominently.","locations":[{"ref":"godot-ffi/src/atomic_enum.rs:62-95","code":"   62 | /// [`atomic_enum!`][crate::atomic_enum] macro.\n   63 | ///\n   64 | /// Automatically implemented for `Option<T>` by mapping `None` to `u8::MAX`. Make sure no variant has this value.\n   65 | pub trait AtomicIntLike: Copy {\n   66 |     /// Raw byte used by [`AtomicEnum::default()`] for `const` (e.g. `static`) initialization.\n   67 |     const DEFAULT_ORD: u8;\n   68 | \n   69 |     /// Convert this value to a `u8`.\n   70 |     fn to_u8(self) -> u8;\n   71 | \n   72 |     /// Convert a `u8` back to this type.\n   73 |     ///\n   74 |     /// # Panics\n   75 |     /// Panics if the value is not a valid discriminant.\n   76 |     fn from_u8(value: u8) -> Self;\n   77 | }\n   78 | \n   79 | impl<T: AtomicIntLike> AtomicIntLike for Option<T> {\n   80 |     const DEFAULT_ORD: u8 = u8::MAX;\n   81 | \n   82 |     fn to_u8(self) -> u8 {\n   83 |         match self {\n   84 |             None => u8::MAX,\n   85 |             Some(inner) => T::to_u8(inner),\n   86 |         }\n   87 |     }\n   88 | \n   89 |     fn from_u8(value: u8) -> Self {\n   90 |         match value {\n   91 |             u8::MAX => None,\n   92 |             inner => Some(T::from_u8(inner)),\n   93 |         }\n   94 |     }\n   95 | }","lines":34}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The multi-threaded `BindingStorage` (the backend that actually permits concurrent FFI access from many threads) has no atomic publication, while the single-threaded backend was deliberately hardened with an `AtomicBool initialized` plus Release/Acquire ordering. In the threaded build, `initialize` calls `binding.set()` and `deinitialize` calls `binding.clear()` while `get_binding_unchecked` / `is_initialized` read the `UnsafeCell<Option<T>>` with no synchronization. Off-main-thread `thread_safe()` readers (e.g. a worker thread calling an FFI function while the engine tears down / hot-reloads the binding) have no defined happens-before relationship, a latent data race / use-after-free. Documented as caller responsibility, but inconsistent that the unthreaded build carries the careful machinery and the threaded build (where the race is actually reachable) does not.","fix":"Mirror the single-threaded design: add an `AtomicBool initialized`, store `true` with Release after `set()`, store `false` with Release before `clear()`, and load it with Acquire in `get_binding_unchecked`/`is_initialized`.","locations":[{"ref":"godot-ffi/src/binding/multi_threaded.rs:17-19","code":"   17 | pub(super) struct BindingStorage {\n   18 |     binding: ManualInitCell<GodotBinding>,\n   19 | }","lines":3},{"ref":"godot-ffi/src/binding/multi_threaded.rs:36-62","code":"   36 |     pub unsafe fn initialize(binding: GodotBinding) {\n   37 |         let storage = Self::storage();\n   38 | \n   39 |         assert!(\n   40 |             !storage.binding.is_initialized(),\n   41 |             \"initialize must only be called at startup or after deinitialize\"\n   42 |         );\n   43 | \n   44 |         // SAFETY: per declared invariants.\n   45 |         unsafe { storage.binding.set(binding) }\n   46 |     }\n   47 | \n   48 |     /// Deinitialize the binding storage.\n   49 |     ///\n   50 |     /// # Safety\n   51 |     /// See [`initialize`](BindingStorage::initialize).\n   52 |     pub unsafe fn deinitialize() {\n   53 |         let storage = Self::storage();\n   54 | \n   55 |         assert!(\n   56 |             storage.binding.is_initialized(),\n   57 |             \"deinitialize must only be called after initialize\"\n   58 |         );\n   59 | \n   60 |         // SAFETY: per declared invariants.\n   61 |         unsafe { storage.binding.clear() };\n   62 |     }","lines":27},{"ref":"godot-ffi/src/binding/multi_threaded.rs:70-85","code":"   70 |     pub unsafe fn get_binding_unchecked() -> &'static GodotBinding {\n   71 |         let storage = Self::storage();\n   72 | \n   73 |         crate::strict_assert!(\n   74 |             storage.binding.is_initialized(),\n   75 |             \"Godot engine not available; make sure you are not calling it from unit/doc tests\"\n   76 |         );\n   77 | \n   78 |         // SAFETY: The binding has been initialized before calling this method.\n   79 |         unsafe { storage.binding.get_unchecked() }\n   80 |     }\n   81 | \n   82 |     pub fn is_initialized() -> bool {\n   83 |         let storage = Self::storage();\n   84 |         storage.binding.is_initialized()\n   85 |     }","lines":16}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`#[export_tool_button(name = \"...\")]` produces a wrong `hint_string` when no `icon` is given. `handle_literal(\"name\
