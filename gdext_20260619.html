", ...)` returns a `proc_macro2::Literal` whose `to_string()` includes the surrounding double quotes (e.g. `\"My Button\"` -> the Rust string `\"My Button\"`). When an `icon` is also present, the name is stripped via `name.trim_matches('\"')`, but the `else` branch (no icon) returns `name` verbatim, leaving the embedded quotes in the Godot hint string. The result is a button label that literally contains quote characters, inconsistent with the documented equivalent (`hint_string = \"My tool button!,2DNodes\"`).","fix":"Trim the quotes from `name` once at the source (e.g. `let name = lit.to_string(); let name = name.trim_matches('\"').to_string();`) so both branches use the unquoted value, then drop the per-branch `trim_matches`.","locations":[{"ref":"godot-macros/src/class/data_models/field_var.rs:101-116","code":"  101 |         let hint_string = {\n  102 |             let name = if let Some(lit) = parser.handle_literal(\"name\", \"String\")? {\n  103 |                 lit.to_string()\n  104 |             } else {\n  105 |                 field_name.to_string().replace(\"_\", \" \")\n  106 |             };\n  107 | \n  108 |             if let Some(icon) = parser.handle_literal(\"icon\", \"String\")? {\n  109 |                 let unquoted_name = name.trim_matches('\\\"');\n  110 |                 let unquoted_icon = icon.to_string();\n  111 |                 let unquoted_icon = unquoted_icon.trim_matches('\\\"');\n  112 |                 format!(\"{unquoted_name},{unquoted_icon}\")\n  113 |             } else {\n  114 |                 name\n  115 |             }\n  116 |         };","lines":16}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`since_patch_api` / `before_patch_api` cfgs are emitted via `cargo:rustc-cfg=...` but no matching `cargo:rustc-check-cfg=cfg(since_patch_api, ...)` / `before_patch_api` is ever declared (only `since_api`/`before_api` are declared). Any code referencing `#[cfg(since_patch_api = ...)]` would trip the `unexpected_cfgs` lint complaining the cfg name itself is unknown. Latent today (all `ALL_VERSIONS` patches are 0), but inconsistent with `since_api`/`before_api`.","fix":"Emit `cargo:rustc-check-cfg=cfg(since_patch_api, values(any()))` and the same for `before_patch_api` alongside the other check-cfg declarations.","locations":[{"ref":"godot-bindings/src/lib.rs:194-224","code":"  194 |             println!(r#\"cargo:rustc-check-cfg=cfg(since_api, values(\"4.{minor}\"))\"#);\n  195 |             println!(r#\"cargo:rustc-check-cfg=cfg(before_api, values(\"4.{minor}\"))\"#);\n  196 |         }\n  197 |     }\n  198 | \n  199 |     let GodotVersion {\n  200 |         major: _,\n  201 |         minor,\n  202 |         patch,\n  203 |         ..\n  204 |     } = get_godot_version();\n  205 | \n  206 |     // Emit `rustc-cfg` dependent on current API version.\n  207 |     // Start at 1; checking for \"since/before 4.0\" makes no sense\n  208 |     let upcoming_minor = all_versions.last().unwrap().1;\n  209 |     for m in 1..=minor {\n  210 |         println!(r#\"cargo:rustc-cfg=since_api=\"4.{m}\"\"#);\n  211 |     }\n  212 |     for m in minor + 1..=upcoming_minor {\n  213 |         println!(r#\"cargo:rustc-cfg=before_api=\"4.{m}\"\"#);\n  214 |     }\n  215 | \n  216 |     // The below configuration keys are very rarely needed and should generally not be used.\n  217 |     // Emit #[cfg]s since/before for patch level.\n  218 |     for (_, m, p) in all_versions.iter().copied() {\n  219 |         if (m, p) >= (minor, patch) {\n  220 |             println!(r#\"cargo:rustc-cfg=since_patch_api=\"4.{m}.{p}\"\"#);\n  221 |         } else {\n  222 |             println!(r#\"cargo:rustc-cfg=before_patch_api=\"4.{m}.{p}\"\"#);\n  223 |         }\n  224 |     }","lines":31}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`BorrowState::has_accessible` computes `self.mut_count - self.inaccessible_count` with unsigned subtraction. The invariants are supposed to keep `inaccessible_count <= mut_count`, but if a bug ever broke that, this underflows to a huge `usize` (panic in debug, wraps in release) rather than surfacing the invariant violation cleanly. This is the lowest-level predicate that most other checks build on, so a silent wrap in release would corrupt all subsequent borrow accounting.","fix":"Use `self.mut_count.checked_sub(self.inaccessible_count)` and poison/return on `None`, or `saturating_sub`, instead of raw subtraction.","locations":[{"ref":"godot-cell/src/borrow_state.rs:44-54","code":"   44 |     /// Returns `true` if there are any accessible mutable references.\n   45 |     pub fn has_accessible(&self) -> bool {\n   46 |         let count = self.mut_count - self.inaccessible_count;\n   47 | \n   48 |         assert!(\n   49 |             count <= 1,\n   50 |             \"there should never be more than 1 accessible mutable reference\"\n   51 |         );\n   52 | \n   53 |         count == 1\n   54 |     }","lines":11}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"register_table_index increments next_index and then returns the incremented value (*next_index after `*next_index += 1`), i.e. one more than the index actually assigned to `key`. Currently harmless because both callers (populate_class_table_indices, populate_builtin_class_table_indices) discard the return value, but a future caller relying on the returned index would get an off-by-one.","fix":"Return the assigned index: capture `let assigned = *next_index;` before incrementing and return `assigned` (or drop the return type since it's unused).","locations":[{"ref":"godot-codegen/src/context.rs:242-255","code":"  242 |     fn register_table_index(&mut self, key: MethodTableKey) -> usize {\n  243 |         let key_category = key.category();\n  244 | \n  245 |         let next_index = self\n  246 |             .method_table_next_index\n  247 |             .entry(key_category)\n  248 |             .or_insert(0);\n  249 | \n  250 |         let prev = self.method_table_indices.insert(key, *next_index);\n  251 |         assert!(prev.is_none(), \"table index already registered\");\n  252 | \n  253 |         *next_index += 1;\n  254 |         *next_index\n  255 |     }","lines":14}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"signals.rs uses tokens_non_null() for EngineClass signal parameters, emitting Gd<T> rather than the conservative Option<Gd<T>> used by virtual methods (make_virtual_param_type). The file's own top-of-file TODO acknowledges this as a bug: signal emit signatures may not match nullable Godot objects, forcing non-null where Godot allows null.","fix":"For RustTy::EngineClass signal params, emit Option<Gd<T>> mirroring make_virtual_param_type, or document why signals are exempt.","locations":[{"ref":"godot-codegen/src/generator/signals.rs:13","code":"   13 | // TODO(v0.6): signal parameters are Gd<T> instead of conservatively Option<Gd<T>>, which is a bug.","lines":1},{"ref":"godot-codegen/src/generator/signals.rs:293-300","code":"  293 |         for param in params.iter() {\n  294 |             let param_name = safe_ident(&param.name.to_string());\n  295 |             let param_ty = &param.type_;\n  296 |             let param_ty_tokens = param_ty.tokens_non_null();\n  297 | \n  298 |             param_list.extend(quote! { #param_name: #param_ty_tokens, });\n  299 |             type_list.extend(quote! { #param_ty_tokens, });\n  300 |             name_list.extend(quote! { #param_name, });","lines":8}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Enumerator::from_json picks Bitfield vs Enum solely from the enum-level is_bitfield flag, then for bitfields does try_into::<u64> and panics 'is negative' on failure, while the non-bitfield branch panics on out-of-i32-range. But is_bitfield can be overridden by special_cases::is_enum_bitfield. If a special case forces is_bitfield=true on an enum containing a negative sentinel (e.g. -1), codegen panics; conversely forcing is_bitfield=false on a true bitfield with a value > i32::MAX hits the i32 panic. The representation choice is decoupled from the actual data, making the panics reachable via the special-case table.","fix":"When overriding is_bitfield via special cases, validate that all enumerator values are compatible (non-negative for bitfields, in-i32-range for enums), or document the constraint at the special-case definition site.","locations":[{"ref":"godot-codegen/src/models/domain_mapping.rs:766-768","code":"  766 | \n  767 |         let is_bitfield = special_cases::is_enum_bitfield(surrounding_class, &godot_name)\n  768 |             .unwrap_or(json_is_bitfield);","lines":3},{"ref":"godot-codegen/src/models/domain_mapping.rs:813-833","code":"  813 | impl Enumerator {\n  814 |     pub fn from_json(json: JsonEnumConstant, rust_name: Ident, is_bitfield: bool) -> Self {\n  815 |         let value = if is_bitfield {\n  816 |             let ord = json.value.try_into().unwrap_or_else(|_| {\n  817 |                 panic!(\n  818 |                     \"bitfield value {} = {} is negative; please report this\",\n  819 |                     json.name, json.value\n  820 |                 )\n  821 |             });\n  822 | \n  823 |             EnumeratorValue::Bitfield(ord)\n  824 |         } else {\n  825 |             let ord = json.value.try_into().unwrap_or_else(|_| {\n  826 |                 panic!(\n  827 |                     \"enum value {} = {} is out of range for i32; please report this\",\n  828 |                     json.name, json.value\n  829 |                 )\n  830 |             });\n  831 | \n  832 |             EnumeratorValue::Enum(ord)\n  833 |         };","lines":21}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"is_class_method_const applies the get_/is_/has_ -> const heuristic (Some(true)) to ALL classes after a small explicit deny-list (Some(false)) keyed by bare method name. Any future mutating get_* method not added to the deny-list is silently mapped to &self, producing an unsound &self signature on a mutating call. The doc comment acknowledges the heuristic but understates the soundness risk; the deny-list keyed on bare names also risks cross-class collisions.","fix":"Prefer Godot's own is_const flag where available and assert against the heuristic on disagreement; consider an allow-list rather than deny-list for const-ness.","locations":[{"ref":"godot-codegen/src/special_cases/special_cases.rs:776-783","code":"  776 |         // Heuristic: many Godot getters are not const-qualified despite being pure reads. Override get_*/is_*/has_* methods to const.\n  777 |         // Exceptions with actual side effects are listed as explicit Some(false) arms above.\n  778 |         _ if !godot_method.is_const && !godot_method.is_static && !godot_method.is_virtual\n  779 |             && [\"get_\", \"is_\", \"has_\"].iter().any(|p| godot_method.name.starts_with(p))\n  780 |         => Some(true),\n  781 | \n  782 |         _ => None,\n  783 |     }","lines":8}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_global_enum_module_path special-cases 'Variant.Type'/'VariantType' to live in crate::builtin, but not 'Variant.Operator'. Yet is_enum_private lists both (None,\"Variant.Type\") and (None,\"Variant.Operator\") as re-exported to crate::builtin. So Variant.Operator resolves to crate::global in get_global_enum_module_path, inconsistent with the private-enum treatment; doc links / module paths for Variant.Operator can be wrong.","fix":"If Variant.Operator lives in crate::builtin, add it (and its 'VariantOperator' spelling) to the builtin arm of get_global_enum_module_path; otherwise document why it differs.","locations":[{"ref":"godot-codegen/src/special_cases/special_cases.rs:1324-1331","code":" 1324 | pub fn get_global_enum_module_path(enum_name: &str) -> &'static str {\n 1325 |     match enum_name {\n 1326 |         \"PropertyHint\" | \"PropertyUsageFlags\" | \"MethodFlags\" => \"crate::registry::info\",\n 1327 |         // Godot's JSON spells `VariantType` as `Variant.Type`; accept both since callers may pass either form.\n 1328 |         \"Corner\" | \"EulerOrder\" | \"Side\" | \"VariantType\" | \"Variant.Type\" => \"crate::builtin\",\n 1329 |         _ => \"crate::global\",\n 1330 |     }\n 1331 | }","lines":8},{"ref":"godot-codegen/src/special_cases/special_cases.rs:1308-1319","code":" 1308 |         | (None, \"Corner\")\n 1309 |         | (None, \"EulerOrder\")\n 1310 |         | (None, \"Side\")\n 1311 |         | (None, \"Variant.Operator\")\n 1312 |         | (None, \"Variant.Type\")\n 1313 | \n 1314 |         // Re-exported to godot::register::info.\n 1315 |         | (None, \"PropertyHint\")\n 1316 |         | (None, \"PropertyUsageFlags\")\n 1317 |         | (None, \"MethodFlags\")\n 1318 | \n 1319 |         => true, _ => false","lines":12}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`DictionaryIter::next_key` increments `next_idx` based solely on `self.next_idx < self.dictionary.len()`, even when `new_key` is `None` (iteration finished). This over-counts at the end of iteration, making `size_hint()` (which computes `len - next_idx`) inaccurate. The increment should be tied to whether a key was actually produced.","fix":"Only increment `next_idx` when `new_key.is_some()`, e.g. move the `if self.next_idx < len { self.next_idx += 1; }` block inside the `new_key.is_some()` path.","locations":[{"ref":"godot-core/src/builtin/collections/dictionary.rs:991-1005","code":"  991 |     fn next_key(&mut self) -> Option<Variant> {\n  992 |         let new_key = if self.is_first {\n  993 |             self.is_first = false;\n  994 |             Self::call_init(self.dictionary)\n  995 |         } else {\n  996 |             Self::call_next(self.dictionary, self.last_key.take()?)\n  997 |         };\n  998 | \n  999 |         if self.next_idx < self.dictionary.len() {\n 1000 |             self.next_idx += 1;\n 1001 |         }\n 1002 | \n 1003 |         self.last_key.clone_from(&new_key);\n 1004 |         new_key\n 1005 |     }","lines":15}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`PackedByteArray::decode_var` checks `if variant.is_nil() { return Err(()) }` to detect failure, but a legitimately-encoded NIL variant is indistinguishable from a decode failure here. The doc acknowledges this, but the `strict_assert_ne!(size, -1)` afterwards assumes a non-nil variant always has a valid size; if Godot returns a non-nil variant but `decode_var_size` returns -1, the debug assert fires while release silently casts -1 to `usize::MAX`.","fix":"Handle a `-1` size in release builds (return `Err(())`) rather than casting it to `usize::MAX`, to avoid returning a bogus huge size.","locations":[{"ref":"godot-core/src/builtin/collections/packed_array.rs:959-983","code":"  959 |     pub fn decode_var(\n  960 |         &self,\n  961 |         byte_offset: usize,\n  962 |         allow_objects: bool,\n  963 |     ) -> Result<(Variant, usize), ()> {\n  964 |         let variant = self\n  965 |             .as_inner()\n  966 |             .decode_var(byte_offset as i64, allow_objects);\n  967 | \n  968 |         if variant.is_nil() {\n  969 |             return Err(());\n  970 |         }\n  971 | \n  972 |         // It's unfortunate that this does another full decoding, but decode_var() is barely useful without also knowing the size, as it won't\n  973 |         // be possible to know where to start reading any follow-up data. Furthermore, decode_var_size() often returns true when there's in fact\n  974 |         // no variant written at that place, it just interprets \"nil\", treats it as valid, and happily returns 4 bytes.\n  975 |         //\n  976 |         // So we combine the two calls for the sake of convenience and to avoid accidental usage.\n  977 |         let size: i64 = self\n  978 |             .as_inner()\n  979 |             .decode_var_size(byte_offset as i64, allow_objects);\n  980 |         sys::strict_assert_ne!(size, -1); // must not happen if we just decoded variant.\n  981 | \n  982 |         Ok((variant, size as usize))\n  983 |     }","lines":25}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`Basis2D`'s `Display` impl emits mismatched brackets: the format string is `\"[a: {a}, b: {b})]\"`, producing output like `[a: (..), b: (..))]` with a stray `)`. Cosmetic but clearly a typo (the `Basis`/`Transform2D` Display impls use matching `[...]`).","fix":"Change the format string to `\"[a: {a}, b: {b}]\"` (remove the stray `)`).","locations":[{"ref":"godot-core/src/builtin/matrices/transform2d.rs:598-603","code":"  598 | impl Display for Basis2D {\n  599 |     fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n  600 |         let [a, b] = self.cols;\n  601 |         write!(f, \"[a: {a}, b: {b})]\")\n  602 |     }\n  603 | }","lines":6}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Quaternion::inverse()` returns the conjugate `(-x, -y, -z, w)`, which equals the true inverse only for unit quaternions. The method has no normalization check and no doc note (unlike most other methods here which panic on non-normalized input). For a non-unit quaternion this returns the conjugate, not the inverse, silently producing a wrong result. Godot's `Quaternion::inverse()` likewise assumes a unit quaternion, but here it is entirely unguarded and undocumented.","fix":"Document that `inverse()` assumes a normalized quaternion (returns the conjugate), or divide the conjugate by `length_squared()` to make it correct for arbitrary quaternions.","locations":[{"ref":"godot-core/src/builtin/quaternion.rs:162-164","code":"  162 |     pub fn inverse(self) -> Self {\n  163 |         Self::new(-self.x, -self.y, -self.z, self.w)\n  164 |     }","lines":3}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Signal::emit() silently does nothing when the signal's object is None (dead or absent), with no indication to the caller. The doc says \"All Callables connected to this signal will be triggered\" and does not mention this silent no-op, which can mask bugs where emit is called on an invalid signal.","fix":"Document the silent no-op behavior on a missing/dead object, or return a status/Result so callers can detect it.","locations":[{"ref":"godot-core/src/builtin/signal.rs:107-113","code":"  107 |     pub fn emit(&self, varargs: &[Variant]) {\n  108 |         let Some(mut object) = self.object() else {\n  109 |             return;\n  110 |         };\n  111 | \n  112 |         object.emit_signal(&self.name(), varargs);\n  113 |     }","lines":7}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Vector2::aspect()` returns `self.x / self.y` with no guard against `y == 0`. For the float version this yields inf/NaN silently; for integer `Vector2i::aspect()` the components are cast to `real` first so it is also inf/NaN rather than a panic, but the divide-by-zero case is entirely undocumented. Callers cannot distinguish a legitimate large ratio from a degenerate input.","fix":"Document the divide-by-zero behavior of `aspect()` (returns inf/NaN when `y == 0`), or return an `Option`/handle the zero case explicitly.","locations":[{"ref":"godot-core/src/builtin/vectors/vector_macros.rs:856-860","code":"  856 |             /// Returns the aspect ratio of this vector, the ratio of [`Self::x`] to [`Self::y`].\n  857 |             #[inline]\n  858 |             pub fn aspect(self) -> real {\n  859 |                 self.x as real / self.y as real\n  860 |             }","lines":5}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`suppress_godot_errors()` has a TOCTOU window in its outermost-scope capture. Between `SUPPRESS_DEPTH.fetch_add` returning 0 and the subsequent `SUPPRESS_ORIG_STATE.store(Engine::is_printing_error_messages())`, a second thread can enter, see depth>0, skip capture, and proceed; or two outer scopes can interleave such that the captured 'original' state is already `false` (set by an overlapping scope), causing the guard's `Drop` to restore error printing to `false` permanently. The doc acknowledges 'races are self-healing', but a stuck-`false` restore is not purely cosmetic. Also `Engine::set_print_error_messages` uses the main-thread-asserting binding, so concurrent off-thread use is UB despite the atomics suggesting thread-safety.","fix":"Document this as strictly main-thread-only (the atomics give a false sense of cross-thread safety), or capture/restore under a mutex so the original-state snapshot cannot be clobbered by an overlapping scope.","locations":[{"ref":"godot-core/src/global/print.rs:458-467","code":"  458 | pub fn suppress_godot_errors() -> SuppressGuard {\n  459 |     if SUPPRESS_DEPTH.fetch_add(1, Ordering::AcqRel) == 0 {\n  460 |         SUPPRESS_ORIG_STATE.store(\n  461 |             Engine::singleton().is_printing_error_messages(),\n  462 |             Ordering::Release,\n  463 |         );\n  464 |         Engine::singleton().set_print_error_messages(false);\n  465 |     }\n  466 |     SuppressGuard { _private: () }\n  467 | }","lines":10},{"ref":"godot-core/src/global/print.rs:438-447","code":"  438 | impl Drop for SuppressGuard {\n  439 |     fn drop(&mut self) {\n  440 |         let prev = SUPPRESS_DEPTH.fetch_sub(1, Ordering::AcqRel);\n  441 |         sys::strict_assert!(prev >= 1, \"suppress_godot_errors: depth underflow\");\n  442 |         if prev == 1 {\n  443 |             let restore = SUPPRESS_ORIG_STATE.load(Ordering::Acquire);\n  444 |             Engine::singleton().set_print_error_messages(restore);\n  445 |         }\n  446 |     }\n  447 | }","lines":10}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`CallErrorType::result_from_sys` doc comment claims it `Returns None if the value doesn't correspond to a known error type` and documents a debug panic, but the function returns `Result<(), Self>` (never an `Option`) and on an unknown value (release) silently maps it to `Err(Self::InvalidMethod)` -- misclassifying the error type. The doc is wrong, and the silent remap to `InvalidMethod` can mislead callers inspecting the error kind.","fix":"Fix the doc to describe the actual `Result<(), Self>` contract. Consider a dedicated `Unknown` variant (the enum is `#[non_exhaustive]`) instead of remapping unknown codes to `InvalidMethod`.","locations":[{"ref":"godot-core/src/meta/error/call_error_type.rs:50-71","code":"   50 |     /// Creates a `CallErrorType` from a `GDExtensionCallErrorType` value.\n   51 |     ///\n   52 |     /// Returns `None` if the value doesn't correspond to a known error type.\n   53 |     ///\n   54 |     /// # Panics (Debug)\n   55 |     /// If the input doesn't match any known error type.\n   56 |     #[doc(hidden)]\n   57 |     pub fn result_from_sys(value: sys::GDExtensionCallErrorType) -> Result<(), Self> {\n   58 |         match value {\n   59 |             sys::GDEXTENSION_CALL_OK => Ok(()),\n   60 |             sys::GDEXTENSION_CALL_ERROR_INVALID_METHOD => Err(Self::InvalidMethod),\n   61 |             sys::GDEXTENSION_CALL_ERROR_INVALID_ARGUMENT => Err(Self::InvalidArgument),\n   62 |             sys::GDEXTENSION_CALL_ERROR_TOO_MANY_ARGUMENTS => Err(Self::TooManyArguments),\n   63 |             sys::GDEXTENSION_CALL_ERROR_TOO_FEW_ARGUMENTS => Err(Self::TooFewArguments),\n   64 |             sys::GDEXTENSION_CALL_ERROR_INSTANCE_IS_NULL => Err(Self::InstanceIsNull),\n   65 |             sys::GDEXTENSION_CALL_ERROR_METHOD_NOT_CONST => Err(Self::MethodNotConst),\n   66 |             _ => {\n   67 |                 sys::strict_assert!(false, \"Unknown GDExtensionCallErrorType value: {value}\");\n   68 |                 Err(Self::InvalidMethod) // in Release builds, return known error.\n   69 |             }\n   70 |         }\n   71 |     }","lines":22}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"try_to_unique() uses `None => unreachable!()` for the result of DynMemory::get_ref_count(). For MemRefCounted::get_ref_count this is fine, but get_ref_count goes through with_ref_counted_unchecked which can fail / behave unreliably during init/drop phases (as documented on with_ref_counted). If get_reference_count is ever observed as unavailable the code panics with an opaque 'internal error' instead of a meaningful diagnostic.","fix":"Replace unreachable!() with an explicit panic message (e.g. 'try_to_unique() called during construction/destruction'), or handle the None case by returning Err with a defined contract.","locations":[{"ref":"godot-core/src/obj/gd.rs:1003-1011","code":" 1003 |     pub fn try_to_unique(self) -> Result<Self, (Self, usize)> {\n 1004 |         use crate::obj::bounds::DynMemory as _;\n 1005 | \n 1006 |         match <T as Bounds>::DynMemory::get_ref_count(&self.raw) {\n 1007 |             Some(1) => Ok(self),\n 1008 |             Some(ref_count) => Err((self, ref_count)),\n 1009 |             None => unreachable!(),\n 1010 |         }\n 1011 |     }","lines":9}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Editor plugins are documented (and required, per the comment at lines 236-242 and the matching unregister logic at lines 327-333) to be registered/added after all other classes and in a deterministic order. However, `editor_plugins` (and `singletons`) are populated by iterating `map.into_values()`, whose order is unspecified (HashMap). The `editor_add_plugin` calls therefore happen in nondeterministic order. While each plugin class itself is registered before any plugin is added (the loop populates the vec while registering), the relative ordering among multiple editor plugins / singletons is arbitrary, which can matter when plugins depend on one another.","fix":"If inter-plugin/inter-singleton ordering matters, collect into an order-stable structure (e.g. sort by class name or init order) before invoking `editor_add_plugin`/`register_singleton_fn`, mirroring the sort already done in `unregister_classes`.","locations":[{"ref":"godot-core/src/registry/class.rs:243-272","code":"  243 |     let mut editor_plugins: Vec<ClassId> = Vec::new();\n  244 | \n  245 |     // Similarly to EnginePlugins – freshly instantiated engine singleton might depend on some not-yet-registered classes.\n  246 |     let mut singletons: Vec<fn()> = Vec::new();\n  247 | \n  248 |     // Actually register all the classes.\n  249 |     for info in map.into_values() {\n  250 |         #[cfg(feature = \"debug-log\")]\n  251 |         let class_name = info.class_name;\n  252 | \n  253 |         if info.is_editor_plugin {\n  254 |             editor_plugins.push(info.class_name);\n  255 |         }\n  256 | \n  257 |         if let Some(register_singleton_fn) = info.register_singleton_fn {\n  258 |             singletons.push(register_singleton_fn)\n  259 |         }\n  260 | \n  261 |         register_class_raw(info);\n  262 | \n  263 |         out!(\"Class {class_name} loaded.\");\n  264 |     }\n  265 | \n  266 |     for register_singleton_fn in singletons {\n  267 |         register_singleton_fn()\n  268 |     }\n  269 | \n  270 |     for editor_plugin_class_name in editor_plugins {\n  271 |         unsafe { interface_fn!(editor_add_plugin)(editor_plugin_class_name.string_sys()) };\n  272 |     }","lines":30}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The autoload cache stores `Gd<Node>` keyed by name and returns it on subsequent calls without checking whether the cached node is still alive. If the autoload node is freed (e.g. tree teardown, or a custom autoload that frees itself) and the cache is not cleared, `try_get_autoload_by_name` returns/operates on a stale `Gd`. The cached node is only ever validated indirectly inside `cast_autoload` via `get_class()`, which on a dead object follows the usual liveness rules (panic or UB under disengaged safeguards) rather than returning a clean cache-miss.","fix":"On cache hit, verify `cached_node.is_instance_valid()`; if invalid, drop the entry and fall through to the scene-tree lookup path.","locations":[{"ref":"godot-core/src/tools/autoload.rs:92-95","code":"   92 |     let cached = AUTOLOAD_CACHE.with(|cache| cache.borrow().get(autoload_name).cloned());\n   93 | \n   94 |     if let Some(cached_node) = cached {\n   95 |         return cast_autoload(cached_node, autoload_name);","lines":4},{"ref":"godot-core/src/tools/autoload.rs:157-169","code":"  157 | fn cast_autoload<T>(node: Gd<Node>, autoload_name: &str) -> Result<Gd<T>, ConvertError>\n  158 | where\n  159 |     T: Inherits<Node>,\n  160 | {\n  161 |     node.try_cast::<T>().map_err(|node| {\n  162 |         let expected = T::class_id();\n  163 |         let actual = node.get_class();\n  164 | \n  165 |         ConvertError::new(format!(\n  166 |             \"autoload `{autoload_name}` has wrong type (expected {expected}, got {actual})\",\n  167 |         ))\n  168 |     })\n  169 | }","lines":13}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_class_editor_only` returns `true` for *any* class whose name starts with `Editor`, but `parse_struct_attributes` separately rejects user classes starting with `Editor` unless `#[class(internal)]` is set. For a *base* class named like `Editor...` the `post_validate` path additionally forces `#[class(tool)]`. The two name-prefix checks (`starts_with(\"Editor\")` for the user's own class name vs. for the base class) encode the same brittle heuristic in two places and can disagree with Godot's real `api_type`, leading to spurious required-attribute errors for classes that merely happen to start with \"Editor\".","fix":"Centralize the editor-class determination using engine metadata (api_type) rather than two independent `starts_with(\"Editor\")` string heuristics.","locations":[{"ref":"godot-macros/src/class/derive_godot_class.rs:643-650","code":"  643 |             // Godot has an edge case where classes starting with \"Editor\" are implicitly hidden:\n  644 |             // https://github.com/godotengine/godot/blob/ca452113d430cb96de409a297ff5b52389f1c9d9/editor/gui/create_dialog.cpp#L171-L173\n  645 |             if class.name.to_string().starts_with(\"Editor\") {\n  646 |                 return bail!(\n  647 |                     class.name.span(),\n  648 |                     \"Classes starting with `Editor` are implicitly hidden by Godot; use #[class(internal)] to make this explicit\",\n  649 |                 );\n  650 |             }","lines":8},{"ref":"godot-macros/src/class/derive_godot_class.rs:1053-1062","code":" 1053 | fn is_class_editor_only(godot_class_name: &str) -> bool {\n 1054 |     match godot_class_name {\n 1055 |         \"FileSystemDock\" | \"ScriptCreateDialog\" | \"ScriptEditor\" | \"ScriptEditorBase\" => true,\n 1056 |         _ => {\n 1057 |             (godot_class_name.starts_with(\"ResourceImporter\")\n 1058 |                 && godot_class_name != \"ResourceImporter\")\n 1059 |                 || godot_class_name.starts_with(\"Editor\")\n 1060 |         }\n 1061 |     }\n 1062 | }","lines":10}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"Duplicated i64->i32 'out of range for i32' conversion-and-panic logic with near-identical messages differing only by punctuation ('out of range for i32, please report this' vs 'out of range for i32; please report this'), indicating copy-paste drift. JsonEnumConstant::to_enum_ord already centralizes this conversion.","fix":"Have Enumerator::from_json call json.to_enum_ord() for the enum case, eliminating the duplicate.","locations":[{"ref":"godot-codegen/src/models/api_json.rs:135-143","code":"  135 |     pub fn to_enum_ord(&self) -> i32 {\n  136 |         self.value.try_into().unwrap_or_else(|_| {\n  137 |             panic!(\n  138 |                 \"enum value {} = {} is out of range for i32, please report this\",\n  139 |                 self.name, self.value\n  140 |             )\n  141 |         })\n  142 |     }\n  143 | }","lines":9},{"ref":"godot-codegen/src/models/domain_mapping.rs:825-832","code":"  825 |             let ord = json.value.try_into().unwrap_or_else(|_| {\n  826 |                 panic!(\n  827 |                     \"enum value {} = {} is out of range for i32; please report this\",\n  828 |                     json.name, json.value\n  829 |                 )\n  830 |             });\n  831 | \n  832 |             EnumeratorValue::Enum(ord)","lines":8}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`register_class_raw` logs an error when Godot reports the class registration failed (e.g. incompatible base-class change during hot reload), but then unconditionally proceeds to call `register_methods_constants_fn`, `register_properties_fn` and `user_register_fn`. These register methods/properties/constants against a class name that does not exist in Godot's ClassDB, producing a cascade of further Godot errors and potentially running user `register_class` code with invalid assumptions. The failure should short-circuit the remaining registration.","fix":"After detecting `registration_failed`, `return` early (after logging) instead of continuing to register methods, properties and the user callback for a class that was not created.","locations":[{"ref":"godot-core/src/registry/class.rs:630-657","code":"  630 |     // Do not panic here; otherwise lock is poisoned and the whole extension becomes unusable.\n  631 |     // This can happen during hot reload if a class changes base type in an incompatible way (e.g. RefCounted -> Node).\n  632 |     if registration_failed {\n  633 |         godot_error!(\n  634 |             \"Failed to register class `{class_name}`; check preceding Godot stderr messages.\"\n  635 |         );\n  636 |     }\n  637 | \n  638 |     // ...then custom symbols\n  639 | \n  640 |     //let mut class_builder = crate::builder::ClassBuilder::<?>::new();\n  641 |     let mut class_builder = 0; // TODO dummy argument; see callbacks\n  642 | \n  643 |     // Order of the following registrations is crucial:\n  644 |     // 1. Methods and constants.\n  645 |     // 2. Properties (they may depend on get/set methods).\n  646 |     // 3. User-defined registration function (intuitively, user expects their own code to run after proc-macro generated code).\n  647 |     if let Some(register_fn) = info.register_methods_constants_fn {\n  648 |         (register_fn.raw)(&mut class_builder);\n  649 |     }\n  650 | \n  651 |     if let Some(register_fn) = info.register_properties_fn {\n  652 |         (register_fn.raw)(&mut class_builder);\n  653 |     }\n  654 | \n  655 |     if let Some(register_fn) = info.user_register_fn {\n  656 |         (register_fn.raw)(&mut class_builder);\n  657 |     }","lines":28}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`InaccessibleGuard::new` rejects a mismatched reference with the plain error 'wrong reference passed in' and the comment admits 'it is likely not unsound for this to happen, but it's unexpected'. However, `decrement_shared` poisons the whole cell when it detects a shared ref tracked alongside an accessible mutable ref. The two related invariant-violation paths are handled very differently (one soft error, one poison) without a documented rationale, making the poison policy inconsistent and hard to reason about for a soundness-critical type.","fix":"Document the poison policy precisely (which invariant breaks poison vs. soft-error), and make the two sites consistent.","locations":[{"ref":"godot-cell/src/guards.rs:222-241","code":"  222 |         // SAFETY: There can be only one active reference to the cell state at a given time.\n  223 |         let cell_state = unsafe { state.get().as_mut() }.unwrap();\n  224 |         let current_ptr = cell_state.get_ptr();\n  225 |         let new_ptr = NonNull::from(new_ref);\n  226 | \n  227 |         if current_ptr != new_ptr {\n  228 |             // it is likely not unsound for this to happen, but it's unexpected\n  229 |             return Err(\"wrong reference passed in\".into());\n  230 |         }\n  231 | \n  232 |         cell_state.borrow_state.set_inaccessible()?;\n  233 |         let prev_ptr = cell_state.get_ptr();\n  234 |         let stack_depth = cell_state.push_ptr(new_ptr);\n  235 | \n  236 |         Ok(Self {\n  237 |             state,\n  238 |             stack_depth,\n  239 |             prev_ptr,\n  240 |         })\n  241 |     }","lines":20},{"ref":"godot-cell/src/borrow_state.rs:140-155","code":"  140 |     pub fn decrement_shared(&mut self) -> Result<usize, BorrowStateErr> {\n  141 |         self.ensure_not_poisoned()?;\n  142 | \n  143 |         if self.shared_count == 0 {\n  144 |             return Err(\"cannot decrement shared counter when no shared reference exists\".into());\n  145 |         }\n  146 | \n  147 |         if self.has_accessible() {\n  148 |             self.poison(\"shared reference tracked while accessible mutable reference exists\")?;\n  149 |         }\n  150 | \n  151 |         // We know `shared_count` isn't 0.\n  152 |         self.shared_count -= 1;\n  153 | \n  154 |         Ok(self.shared_count)\n  155 |     }","lines":16}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Exception-safety hazard in `Array::resize`: after calling Godot `resize()` (which fills new slots with NIL), the loop writes `value.to_variant()` into each new slot. If `to_variant()` panics mid-loop, the array is left containing NIL elements that violate the `T` type invariant, which can later cause panics on element access. The in-code comment acknowledges this but the issue remains unaddressed.","fix":"Compute the variant once before resizing (it is the same value for every slot) and clone/move it, so the only fallible conversion happens before the array is grown; or guard the partially-filled array on panic.","locations":[{"ref":"godot-core/src/builtin/collections/array.rs:468-492","code":"  468 |     pub fn resize(&mut self, new_size: usize, value: impl AsArg<T>) {\n  469 |         self.balanced_ensure_mutable();\n  470 | \n  471 |         let original_size = self.len();\n  472 | \n  473 |         // SAFETY: While we do insert `Variant::nil()` if the new size is larger, we then fill it with `value` ensuring that all values in the\n  474 |         // array are of type `T` still.\n  475 |         unsafe { self.as_inner_mut() }.resize(to_i64(new_size));\n  476 | \n  477 |         meta::arg_into_ref!(value: T);\n  478 | \n  479 |         // If new_size < original_size then this is an empty iterator and does nothing.\n  480 |         for i in original_size..new_size {\n  481 |             // Exception safety: if to_variant() panics, the array will become inconsistent (filled with non-T nils).\n  482 |             // At the moment (Nov 2024), this can only happen for u64, which isn't a valid Array element type.\n  483 |             // This could be changed to use clone() (if that doesn't panic) or store a variant without moving.\n  484 |             let variant = value.to_variant();\n  485 | \n  486 |             let ptr_mut = self.ptr_mut(i);\n  487 | \n  488 |             // SAFETY: we iterate pointer within bounds; ptr_mut() additionally checks them.\n  489 |             // ptr_mut() lookup could be optimized if we know the internal layout.\n  490 |             unsafe { variant.move_into_var_ptr(ptr_mut) };\n  491 |         }\n  492 |     }","lines":25}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`EngineFromGodot for u64` decodes from Variant via `variant.try_to::<i64>().map(|i| i as u64)`. This is consistent with the bit-reinterpretation policy documented for `u64`, but it silently accepts any i64 and reinterprets the bits, so a Variant carrying a value never intended as the high-bit `u64` is converted without diagnostics. Combined with `engine_to_variant` storing `*self as i64`, large `u64` values round-trip as negative GDScript ints with no warning -- easy to misuse in bitfield-adjacent engine APIs.","fix":"No change needed if the bit-reinterpret contract is intended, but document at the conversion site that this is a reinterpret (not a value-preserving conversion), to prevent silent misuse.","locations":[{"ref":"godot-core/src/meta/godot_convert/impls.rs:366-378","code":"  366 |     fn engine_to_variant(&self) -> Variant {\n  367 |         Variant::from(*self as i64) // Treat as i64.\n  368 |     }\n  369 | }\n  370 | \n  371 | impl meta::EngineFromGodot for u64 {\n  372 |     fn engine_try_from_godot(via: Self::Via) -> Result<Self, ConvertError> {\n  373 |         Ok(via)\n  374 |     }\n  375 | \n  376 |     fn engine_try_from_variant(variant: &Variant) -> Result<Self, ConvertError> {\n  377 |         variant.try_to::<i64>().map(|i| i as u64)\n  378 |     }","lines":13}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"script_instance_exists() calls script.bind() to fetch the language. bind() panics if another guard is active or if the object is a placeholder. Since this helper is meant to be called from IScriptExtension::instance_has (an engine callback), a panic here crosses the FFI boundary. It also takes a full bind guard merely to read get_language().","fix":"Guard the bind (e.g. fail gracefully returning false if already bound / placeholder), or fetch the language without binding the user instance if an engine-side path exists.","locations":[{"ref":"godot-core/src/obj/script.rs:418-421","code":"  418 |     let Some(language) = script.bind().get_language() else {\n  419 |         return false;\n  420 |     };\n  421 | ","lines":4}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`TaskHandle::is_pending()` panics via `unreachable!(\"missing future slot\")` when the slot index is out of range, whereas the sibling method `cancel()` deliberately treats a missing slot (runtime deinitialized) as a no-op and returns gracefully. After `task::cleanup()` runs at engine shutdown the runtime is set to `None`, and `with_runtime` itself would `expect`-panic before reaching the `unreachable!`; but the asymmetry means `is_pending()` is far more panic-prone than `cancel()` for the same lifecycle states, and the `unreachable!` message implies an invariant that index validity does not actually guarantee.","fix":"Return `false` for a missing slot (consistent with the id-mismatch branch and with `cancel()`), instead of `unreachable!()`.","locations":[{"ref":"godot-core/src/task/async_runtime.rs:223-239","code":"  223 |     pub fn is_pending(&self) -> bool {\n  224 |         ASYNC_RUNTIME.with_runtime(|rt| {\n  225 |             let slot = rt\n  226 |                 .tasks\n  227 |                 .get(self.index)\n  228 |                 .unwrap_or_else(|| unreachable!(\"missing future slot at index {}\", self.index));\n  229 | \n  230 |             if slot.id != self.id {\n  231 |                 return false;\n  232 |             }\n  233 | \n  234 |             matches!(\n  235 |                 slot.value,\n  236 |                 FutureSlotState::Pending(_) | FutureSlotState::Polling\n  237 |             )\n  238 |         })\n  239 |     }","lines":17}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`InitLevel::from_sys` maps any unrecognized `GDExtensionInitializationLevel` to `Self::Scene` (after an `eprintln!`). A wrong-but-plausible default here is dangerous: `Scene` drives 'must only be called once per level' method-table loading, so an unknown/future level silently aliasing to `Scene` could trigger table loading at the wrong time. The chosen fallback (`Scene`, not `Core`) is arbitrary and unjustified.","fix":"Panic on an unknown level, or return an `Option`/dedicated 'unknown' variant the caller can skip, rather than aliasing to `Scene`.","locations":[{"ref":"godot-ffi/src/init_level.rs:37-48","code":"   37 |     pub fn from_sys(level: crate::GDExtensionInitializationLevel) -> Self {\n   38 |         match level {\n   39 |             crate::GDEXTENSION_INITIALIZATION_CORE => Self::Core,\n   40 |             crate::GDEXTENSION_INITIALIZATION_SERVERS => Self::Servers,\n   41 |             crate::GDEXTENSION_INITIALIZATION_SCENE => Self::Scene,\n   42 |             crate::GDEXTENSION_INITIALIZATION_EDITOR => Self::Editor,\n   43 |             _ => {\n   44 |                 eprintln!(\"WARNING: unknown initialization level {level}\");\n   45 |                 Self::Scene\n   46 |             }\n   47 |         }\n   48 |     }","lines":12}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`handle_mutually_exclusive_keys` builds a user-facing compile error by `Debug`-formatting a `Vec` of `Result` values: `bail!(parser.span(), \"{errs:?}\")`. When any key check returns an error (e.g. a flag key like `#[rpc(any_peer = 5)]` was given a value), the emitted `compile_error!` text is the raw `Debug` of `vec![Err(venial::Error { ... })]` rather than the actual human-readable message and span. The original error's span and message are discarded.","fix":"Collect the errors with `?`/`try_fold`, or extract the first `Err` and propagate it directly (combining messages), instead of `Debug`-printing the `Vec<Result<...>>`.","locations":[{"ref":"godot-macros/src/lib.rs:1561-1569","code":" 1561 |     let (oks, errs) = keys\n 1562 |         .iter()\n 1563 |         .enumerate()\n 1564 |         .map(|(idx, key)| Ok(parser.handle_alone(key)?.then_some(idx)))\n 1565 |         .partition::<Vec<_>, _>(|result: &ParseResult<Option<usize>>| result.is_ok());\n 1566 | \n 1567 |     if !errs.is_empty() {\n 1568 |         return bail!(parser.span(), \"{errs:?}\");\n 1569 |     }","lines":9}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`Rect2` does not validate non-negative size on operations where its 3D counterpart `Aabb` does. `Aabb::merge/volume/contains_point/intersect/intersects_ray/intersect_segment_inner` all call `assert_nonnegative()`, but `Rect2::merge/intersect/intersects/contains_point` perform no such check despite the type documenting the same soft invariant. This makes the float 2D and 3D bounding-box types behave inconsistently for negative-size inputs (silent wrong results in Rect2 vs panic in Aabb). Note `Rect2i` does assert nonnegative in these methods, so `Rect2` is the odd one out.","fix":"Add `self.assert_nonnegative()` (and for binary ops, also on the argument) to `Rect2::merge`, `intersect`, `intersects`, and `contains_point`, matching `Aabb` and `Rect2i`.","locations":[{"ref":"godot-core/src/builtin/rect2.rs:122-128","code":"  122 |     #[inline]\n  123 |     pub fn merge(self, b: Self) -> Self {\n  124 |         let position = self.position.coord_min(b.position);\n  125 |         let end = self.end().coord_max(b.end());\n  126 | \n  127 |         Self::from_position_end(position, end)\n  128 |     }","lines":7},{"ref":"godot-core/src/builtin/rect2.rs:190-194","code":"  190 |     pub fn contains_point(self, point: Vector2) -> bool {\n  191 |         let point = point - self.position;\n  192 | \n  193 |         point.abs() == point && point.x < self.size.x && point.y < self.size.y\n  194 |     }","lines":5},{"ref":"godot-core/src/builtin/rect2.rs:219-228","code":"  219 |     #[inline]\n  220 |     pub fn intersects(self, b: Self) -> bool {\n  221 |         let end = self.end();\n  222 |         let end_b = b.end();\n  223 | \n  224 |         self.position.x <= end_b.x\n  225 |             && end.x >= b.position.x\n  226 |             && self.position.y <= end_b.y\n  227 |             && end.y >= b.position.y\n  228 |     }","lines":10}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`get_property_list` collects the user-provided property list into a `Box<[...]>`, then computes the count with `.len().try_into().expect(\"property list cannot be longer than u32::MAX\")`. The `.expect()` panics inside an `extern \"C\"` callback (no panic guard), so an over-long list unwinds into Godot (UB) rather than being handled. The same unguarded-panic pattern via `.expect()` exists in `ClassMethodInfo::argument_count`/`default_argument_count` and in `MethodInfo::into_owned_method_sys`, all reachable from FFI-adjacent registration paths.","fix":"Treat over-long lists as a recoverable error: clamp/return empty with a `godot_error!` log instead of `expect`, or guard the callback body with `handle_panic`.","locations":[{"ref":"godot-core/src/registry/callbacks.rs:355-368","code":"  355 |     let property_list_sys: Box<[sys::GDExtensionPropertyInfo]> = property_list\n  356 |         .into_iter()\n  357 |         .map(|prop| prop.into_owned_property_sys())\n  358 |         .collect();\n  359 | \n  360 |     // SAFETY: Godot ensures that `count` is initialized and valid to write into.\n  361 |     unsafe {\n  362 |         *count = property_list_sys\n  363 |             .len()\n  364 |             .try_into()\n  365 |             .expect(\"property list cannot be longer than `u32::MAX`\");\n  366 |     }\n  367 | \n  368 |     Box::leak(property_list_sys).as_mut_ptr()","lines":14},{"ref":"godot-core/src/registry/info/method_info.rs:128-146","code":"  128 |         let argument_count: u32 = arguments\n  129 |             .len()\n  130 |             .try_into()\n  131 |             .expect(\"cannot have more than `u32::MAX` arguments\");\n  132 |         let arguments = arguments\n  133 |             .into_iter()\n  134 |             .map(|arg| arg.into_owned_property_sys())\n  135 |             .collect::<Box<[_]>>();\n  136 |         let arguments = Box::leak(arguments).as_mut_ptr();\n  137 | \n  138 |         let default_argument_count: u32 = default_arguments\n  139 |             .len()\n  140 |             .try_into()\n  141 |             .expect(\"cannot have more than `u32::MAX` default arguments\");\n  142 |         let default_argument = default_arguments\n  143 |             .into_iter()\n  144 |             .map(|arg| arg.into_owned_var_sys())\n  145 |             .collect::<Box<[_]>>();\n  146 |         let default_arguments = Box::leak(default_argument).as_mut_ptr();","lines":19}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`subarray_impl` in both `Array` and `AnyArray` clamps an unspecified `end` to `i32::MAX as i64`. Since indices are `usize` and Godot arrays can exceed `i32::MAX` elements (Godot uses `int`/`int64_t` internally for sizes), an unbounded range (`begin..`) on a very large array would be silently truncated to the first ~2.1 billion elements rather than spanning to the true end.","fix":"Default the unspecified `end` to `i64::MAX` (or the actual array length) instead of `i32::MAX as i64`.","locations":[{"ref":"godot-core/src/builtin/collections/array.rs:549-559","code":"  549 |     fn subarray_impl(&self, range: impl SignedRange, step: Option<i32>, deep: bool) -> Self {\n  550 |         assert_ne!(step, Some(0), \"subarray: step cannot be zero\");\n  551 | \n  552 |         let step = step.unwrap_or(1);\n  553 |         let (begin, end) = range.signed();\n  554 |         let end = end.unwrap_or(i32::MAX as i64);\n  555 | \n  556 |         self.as_inner()\n  557 |             .slice(begin, end, step as i64, deep)\n  558 |             .cast_array::<T>()\n  559 |     }","lines":11},{"ref":"godot-core/src/builtin/collections/any_array.rs:253-260","code":"  253 |     fn subarray_impl(&self, range: impl meta::SignedRange, step: Option<i32>, deep: bool) -> Self {\n  254 |         let step = step.unwrap_or(1);\n  255 |         assert_ne!(step, 0, \"subarray: step cannot be zero\");\n  256 |         let (begin, end) = range.signed();\n  257 |         let end = end.unwrap_or(i32::MAX as i64);\n  258 | \n  259 |         self.array.as_inner().slice(begin, end, step as i64, deep)\n  260 |     }","lines":8}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`Transform2D` derives `Default`, which produces an all-zero matrix (a, b, origin all `Vector2::ZERO`) rather than the identity transform — confirmed by the serde roundtrip test expecting all-zero fields. This is inconsistent with `Transform3D`, `Basis`, and `Projection`, which all have `Default == IDENTITY`. A zero `Transform2D` is a degenerate (non-invertible) transform, so an unsuspecting `Transform2D::default()` collapses everything to the origin.","fix":"Implement `Default` manually to return `Self::IDENTITY`, matching the other matrix types (and Godot, where `Transform2D()` is the identity).","locations":[{"ref":"godot-core/src/builtin/matrices/transform2d.rs:52-71","code":"   52 | #[derive(Default, Copy, Clone, PartialEq, Debug)]\n   53 | #[cfg_attr(feature = \"serde\", derive(serde::Serialize, serde::Deserialize))]\n   54 | #[repr(C)]\n   55 | pub struct Transform2D {\n   56 |     /// The first basis vector.\n   57 |     ///\n   58 |     /// _Godot equivalent: `Transform2D.x`_, see [`Basis`][crate::builtin::Basis] for why it's changed\n   59 |     pub a: Vector2,\n   60 | \n   61 |     /// The second basis vector.\n   62 |     ///\n   63 |     /// _Godot equivalent: `Transform2D.y`_, see [`Basis`][crate::builtin::Basis] for why it's changed\n   64 |     pub b: Vector2,\n   65 | \n   66 |     /// The origin of the transform. The coordinate space defined by this transform\n   67 |     /// starts at this point.\n   68 |     ///\n   69 |     /// _Godot equivalent: `Transform2D.origin`_\n   70 |     pub origin: Vector2,\n   71 | }","lines":20},{"ref":"godot-core/src/builtin/matrices/transform2d.rs:813-820","code":"  813 |     #[cfg(feature = \"serde\")]\n  814 |     #[test]\n  815 |     fn serde_roundtrip() {\n  816 |         let transform = Transform2D::default();\n  817 |         let expected_json = \"{\\\"a\\\":{\\\"x\\\":0.0,\\\"y\\\":0.0},\\\"b\\\":{\\\"x\\\":0.0,\\\"y\\\":0.0},\\\"origin\\\":{\\\"x\\\":0.0,\\\"y\\\":0.0}}\";\n  818 | \n  819 |         crate::builtin::test_utils::roundtrip(&transform, expected_json);\n  820 |     }","lines":8}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Signal::connect() and connect_flags() call track_custom_callable() unconditionally, even when the underlying Godot connect() returned an error (e.g. duplicate connection, ERR_INVALID_PARAMETER). This records a custom-callable connection in the editor registry that may not actually exist, potentially causing stale entries / incorrect hot-reload cleanup.","fix":"Only call track_custom_callable() when `error` indicates success (Error::OK).","locations":[{"ref":"godot-core/src/builtin/signal.rs:75-95","code":"   75 |     pub fn connect(&self, callable: &Callable) -> Error {\n   76 |         let error = self.as_inner().connect(callable, 0i64);\n   77 | \n   78 |         track_custom_callable(self, callable);\n   79 |         Error::from_godot(error as i32)\n   80 |     }\n   81 | \n   82 |     /// Connect signal to a callable, customizing with flags.\n   83 |     ///\n   84 |     /// Optional flags can be also added to configure the connection's behavior (see [`ConnectFlags`](ConnectFlags) constants).\n   85 |     /// You can provide additional arguments to the connected callable by using `Callable::bind`.\n   86 |     ///\n   87 |     /// A signal can only be connected once to the same [`Callable`]. If the signal is already connected, returns [`Error::ERR_INVALID_PARAMETER`]\n   88 |     /// and pushes an error message, unless the signal is connected with [`ConnectFlags::REFERENCE_COUNTED`](ConnectFlags::REFERENCE_COUNTED).\n   89 |     /// To prevent this, check for existing connections with [`is_connected()`][Self::is_connected].\n   90 |     pub fn connect_flags(&self, callable: &Callable, flags: ConnectFlags) -> Error {\n   91 |         let error = self.as_inner().connect(callable, flags.ord() as i64);\n   92 | \n   93 |         track_custom_callable(self, callable);\n   94 |         Error::from_godot(error as i32)\n   95 |     }","lines":21}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Gd::instance_id_unchecked() is documented as 'safe and never panics', but it relies on raw.instance_id_unchecked() returning Some via unwrap_unchecked(). The safety argument ('a Gd can only be created from a non-null RawGd') holds only as long as every Gd construction path enforces non-null cached_rtti. RawGd::null() sets cached_rtti = None and try_from_ffi rejects null, but there is no type-level guarantee; a future construction path that bypasses try_from_ffi would turn this into UB (unwrap_unchecked on None).","fix":"Consider a debug_assert or strict_assert on instance_id.is_some() before unwrap_unchecked, to catch invariant violations during development without runtime cost in release.","locations":[{"ref":"godot-core/src/obj/gd.rs:316-322","code":"  316 |     pub fn instance_id_unchecked(&self) -> InstanceId {\n  317 |         let instance_id = self.raw.instance_id_unchecked();\n  318 | \n  319 |         // SAFETY: a `Gd` can only be created from a non-null `RawGd`, meaning `raw.instance_id_unchecked()` will\n  320 |         // always return `Some`.\n  321 |         unsafe { instance_id.unwrap_unchecked() }\n  322 |     }","lines":7}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Gd::free() only performs the liveness check (is_instance_valid) under cfg!(safeguards_balanced). For a manually-managed type, MemManual::is_ref_counted() always returns Some(false) without consulting liveness, so under the 'disengaged' safeguard level free() on an already-destroyed object skips both checks and proceeds straight to object_destroy(), causing a double-free / use-after-free. The doc comment claims free() 'is safe and effectively prevents double-free', which is untrue at the disengaged level.","fix":"Either keep the liveness guard active regardless of safeguard level for free() (cheap relative to the destroy cost), or amend the doc/safety wording to state that double-free protection requires at least the balanced safeguard level.","locations":[{"ref":"godot-core/src/obj/gd.rs:940-943","code":"  940 |         // If ref_counted returned None, that means the instance was destroyed\n  941 |         if ref_counted != Some(false) || (cfg!(safeguards_balanced) && !self.is_instance_valid()) {\n  942 |             return error_or_panic(\"called free() on already destroyed object\".to_string());\n  943 |         }","lines":4},{"ref":"godot-core/src/obj/bounds.rs:349-360","code":"  349 | impl DynMemory for MemManual {\n  350 |     fn maybe_init_ref<T: GodotClass>(_obj: &mut RawGd<T>) {}\n  351 |     fn maybe_inc_ref<T: GodotClass>(_obj: &mut RawGd<T>) {}\n  352 |     unsafe fn maybe_dec_ref<T: GodotClass>(_obj: &mut RawGd<T>) -> bool {\n  353 |         false\n  354 |     }\n  355 |     fn is_ref_counted<T: GodotClass>(_obj: &RawGd<T>) -> Option<bool> {\n  356 |         Some(false)\n  357 |     }\n  358 |     fn get_ref_count<T: GodotClass>(_obj: &RawGd<T>) -> Option<usize> {\n  359 |         None\n  360 |     }","lines":12}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"Every spawned task is heap-boxed twice. `spawn()` calls `rt.add_task(Box::pin(future))`, passing an already-boxed `Pin<Box<dyn Future>>` as the generic `F`. Inside `add_task<F>()`, the value is boxed again via `Box::pin(future)` (line 446), producing a `Pin<Box<Pin<Box<dyn Future>>>>` that then coerces back to `Pin<Box<dyn Future>>`. The result is an extra heap allocation and an extra pointer indirection per task poll, for the entire lifetime of every async task.","fix":"Either have `spawn()` pass the bare `future` (let `add_task` do the single boxing), or change `add_task` to accept an already-pinned `Pin<Box<dyn Future<Output=()>>>` and remove the inner `Box::pin`. Pick one boxing site.","locations":[{"ref":"godot-core/src/task/async_runtime.rs:162","code":"  162 |         let task_handle = rt.add_task(Box::pin(future));","lines":1},{"ref":"godot-core/src/task/async_runtime.rs:437-446","code":"  437 |     fn add_task<F: Future<Output = ()> + 'static>(&mut self, future: F) -> TaskHandle {\n  438 |         let id = self.next_id();\n  439 |         let index_slot = self\n  440 |             .tasks\n  441 |             // If we find an available slot, we will assign the new future to it.\n  442 |             .iter_mut()\n  443 |             .enumerate()\n  444 |             .find(|(_, slot)| slot.is_empty());\n  445 | \n  446 |         let boxed = Box::pin(future);","lines":10}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Array::resize` calls `value.to_variant()` inside the loop on every iteration, even though `value` is a single `impl AsArg<T>` argument that yields the same variant each time. For large growth counts this performs N redundant conversions/allocations; Godot's own `fill()` could be used or the variant computed once and cloned.","fix":"Compute `let variant = value.to_variant();` once before the loop and clone it per slot (or use `as_inner_mut().fill()` over the new range).","locations":[{"ref":"godot-core/src/builtin/collections/array.rs:477-491","code":"  477 |         meta::arg_into_ref!(value: T);\n  478 | \n  479 |         // If new_size < original_size then this is an empty iterator and does nothing.\n  480 |         for i in original_size..new_size {\n  481 |             // Exception safety: if to_variant() panics, the array will become inconsistent (filled with non-T nils).\n  482 |             // At the moment (Nov 2024), this can only happen for u64, which isn't a valid Array element type.\n  483 |             // This could be changed to use clone() (if that doesn't panic) or store a variant without moving.\n  484 |             let variant = value.to_variant();\n  485 | \n  486 |             let ptr_mut = self.ptr_mut(i);\n  487 | \n  488 |             // SAFETY: we iterate pointer within bounds; ptr_mut() additionally checks them.\n  489 |             // ptr_mut() lookup could be optimized if we know the internal layout.\n  490 |             unsafe { variant.move_into_var_ptr(ptr_mut) };\n  491 |         }","lines":15}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"lpad()/rpad() allocate a fresh single-character GString on every call by going through `GString::from([character].as_slice())` (UTF-32 FFI construction). For code padding many strings in a loop this is a needless per-call allocation + FFI round-trip; the one-char GString could be constructed once by the caller, but the API hides it.","fix":"Document the cost, or offer a variant taking a prebuilt delimiter/character GString; at minimum note that repeated calls re-allocate.","locations":[{"ref":"godot-core/src/builtin/strings/macros.rs:204-218","code":"","lines":15}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`OutParamTuple::with_variant_pointers` round-trips through full `Variant` construction: it calls `with_variants` (which materializes a `[Variant; N]` via `ref_to_variant` for every argument) and then takes `var_sys()` of each. For ptr-style out-calls this builds and immediately drops a Variant per argument. The dedicated `with_type_pointers` path (FFI repr, no Variant) exists for exactly this reason; using the variant path where only pointers are needed adds avoidable allocations/clones on the out-call hot path.","fix":"Where callers only need Variant *pointers* and Variant semantics aren't required, prefer the `with_type_pointers` path; otherwise document why full Variants are mandatory here. At minimum verify this isn't used on perf-critical out-calls that could use type pointers.","locations":[{"ref":"godot-core/src/meta/param_tuple/impls.rs:141-153","code":"  141 |             fn with_variant_pointers<F, R>(self, f: F) -> R\n  142 |             where\n  143 |                 F: FnOnce(&[godot_ffi::GDExtensionConstVariantPtr]) -> R,\n  144 |             {\n  145 |                 self.with_variants(|variants| {\n  146 |                     let sys_args = [\n  147 |                         $(\n  148 |                             Variant::var_sys(&variants[$n]),\n  149 |                         )*\n  150 |                     ];\n  151 |                     f(&sys_args)\n  152 |                 })\n  153 |             }","lines":13}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"from_obj_sys_weak() performs an FFI round-trip (object_get_instance_id) for every non-null weak construction. This is on the hot path for every object argument received in ptrcalls (from_arg_ptr -> from_obj_sys -> from_obj_sys_weak) and every object returned from engine APIs. For functions taking/returning many objects, this is a per-object FFI call solely to populate cached_rtti.","fix":"Consider deferring the instance-ID query to first use (lazy rtti) for performance-critical paths, or document that the cost is intentional. At minimum, profile whether the eager query is justified.","locations":[{"ref":"godot-core/src/obj/raw_gd.rs:51-65","code":"   51 |     pub(super) unsafe fn from_obj_sys_weak(obj: sys::GDExtensionObjectPtr) -> Self {\n   52 |         let rtti = if obj.is_null() {\n   53 |             None\n   54 |         } else {\n   55 |             let raw_id = unsafe { interface_fn!(object_get_instance_id)(obj) };\n   56 | \n   57 |             // This happened originally during Variant -> RawGd conversion, but at this point it's too late to detect, and UB has already\n   58 |             // occurred (the Variant holds the object pointer as bytes in an array, which becomes dangling the moment the actual object dies).\n   59 |             let instance_id = InstanceId::try_from_u64(raw_id)\n   60 |                 .expect(\"null instance ID when constructing object; this very likely causes UB\");\n   61 | \n   62 |             // TODO(bromeon): this should query dynamic type of object, which can be different from T (upcast, FromGodot, etc).\n   63 |             // See comment in ObjectRtti.\n   64 |             Some(ObjectRtti::of::<T>(instance_id))\n   65 |         };","lines":15}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`try_dynify_object` and `get_dyn_implementor_class_ids` do a linear scan over the `Vec<DynTraitImpl>` for a trait, and `get_dyn_gd` inside calls `object.dynamic_class_string()` (an FFI call) plus a `StringName` comparison per candidate. For each conversion attempt this is O(implementors) FFI calls. The code itself flags this (`// TODO maybe use 2nd hashmap instead of linear search`). For classes with many `#[godot_dyn]` implementors this is a per-conversion cost on a path that can be hot (e.g. property/array deserialization).","fix":"Key the registry by (TypeId, ClassId) so the implementing relation can be looked up directly from the object's dynamic class, avoiding the per-candidate `dynamic_class_string()` FFI call and linear scan.","locations":[{"ref":"godot-core/src/registry/class.rs:377-392","code":"  377 |     // TODO maybe use 2nd hashmap instead of linear search.\n  378 |     // (probably not pair of typeid/classname, as that wouldn't allow the above check).\n  379 |     for relation in relations {\n  380 |         match relation.get_dyn_gd(object) {\n  381 |             Ok(dyn_gd) => return Ok(dyn_gd),\n  382 |             Err(obj) => object = obj,\n  383 |         }\n  384 |     }\n  385 | \n  386 |     let error = FromGodotError::UnimplementedDynTrait {\n  387 |         trait_name,\n  388 |         class_name: object.dynamic_class_string().to_string(),\n  389 |     };\n  390 | \n  391 |     Err((error, object))\n  392 | }","lines":16},{"ref":"godot-core/src/registry/shard.rs:594-621","code":"  594 |     pub fn get_dyn_gd<T: GodotClass, D: ?Sized + 'static>(\n  595 |         &self,\n  596 |         object: Gd<T>,\n  597 |     ) -> Result<DynGd<T, D>, Gd<T>> {\n  598 |         let dynamic_class = object.dynamic_class_string();\n  599 | \n  600 |         if dynamic_class != self.class_name.to_string_name() {\n  601 |             return Err(object);\n  602 |         }\n  603 | \n  604 |         let object = object.upcast_object();\n  605 | \n  606 |         // SAFETY: `DynTraitImpl::new` ensures that this function is safe to call when `object` is castable to `self.class_name`.\n  607 |         // Since the dynamic class of `object` is `self.class_name`, it must be castable to `self.class_name`.\n  608 |         let erased_dyn = unsafe { (self.erased_dynify_fn)(object) };\n  609 | \n  610 |         let dyn_gd_object = erased_dyn.boxed.downcast::<DynGd<classes::Object, D>>();\n  611 | \n  612 |         // SAFETY: `callbacks::dynify_fn` returns a `DynGd<Object, D>` which has been type erased. So this downcast will always succeed.\n  613 |         let dyn_gd_object = unsafe { dyn_gd_object.unwrap_unchecked() };\n  614 | \n  615 |         // SAFETY: This is effectively upcasting a value which has class equal to `self.class_name` to a `DynGd<T, D>`. Since the class of\n  616 |         // `object` is `T` and its dynamic class is `self.class_name`, this means that `T` must be a superclass of `self.class_name`. Thus\n  617 |         // this upcast is safe.\n  618 |         let dyn_gd_t = unsafe { dyn_gd_object.cast_unchecked::<T>() };\n  619 | \n  620 |         Ok(dyn_gd_t)\n  621 |     }","lines":28}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`make_default_argument_vec` generates `vec![...]` inside the varcall FFI function, which heap-allocates a `Vec<Variant>` on *every* call for any `#[func]` that declares `#[opt(default = ...)]` parameters. This is acknowledged in the inline comment as accepted-for-now, but it is a real per-call allocation on a hot FFI path for functions with default parameters.","fix":"Hoist the defaults into a `LazyLock`/`thread_local`/`Global<Vec<Variant>>` allocated once per function, or store them in `MethodInfo` during registration and retrieve via the method-data pointer (as the comment suggests).","locations":[{"ref":"godot-macros/src/class/data_models/func.rs:225-262","code":"  225 | /// Generates code to create a `Vec<Variant>` containing default argument values for varcall. Allocates on every call.\n  226 | fn make_default_argument_vec(\n  227 |     optional_param_default_exprs: &[TokenStream],\n  228 |     all_params: &[venial::TypeExpr],\n  229 | ) -> ParseResult<TokenStream> {\n  230 |     // Optional params appearing at the end has already been validated in validate_default_exprs().\n  231 | \n  232 |     // Early exit: all parameters are required, not optional. This check is not necessary for correctness.\n  233 |     if optional_param_default_exprs.is_empty() {\n  234 |         return Ok(quote! { vec![] });\n  235 |     }\n  236 | \n  237 |     let optional_param_types = all_params\n  238 |         .iter()\n  239 |         .skip(all_params.len() - optional_param_default_exprs.len());\n  240 | \n  241 |     let default_parameters = optional_param_default_exprs\n  242 |         .iter()\n  243 |         .zip(optional_param_types)\n  244 |         .map(|(value, param_type)| {\n  245 |             quote! {\n  246 |                 ::godot::private::opt_default_value::<#param_type>(#value)\n  247 |             }\n  248 |         });\n  249 | \n  250 |     // Performance: This generates `vec![...]` in the varcall FFI function, which allocates on *every* call when default parameters\n  251 |     // are present. This is a performance cost we accept for now.\n  252 |     //\n  253 |     // If no #[opt] attributes are used, this generates `vec![]` which does *not* allocate, so most #[func] functions are unaffected.\n  254 |     //\n  255 |     // Potential future improvements:\n  256 |     // - Use `Global<Vec<Variant>>` (or LazyLock/thread_local) to allocate once per function instead of per call.\n  257 |     // - Store defaults in MethodInfo during registration and retrieve via method_data pointer.\n  258 |     //\n  259 |     // Note also that there may be a semantic difference on reusing the same object vs. recreating it, see Python's default-param issue.\n  260 |     Ok(quote! {\n  261 |         vec![ #(#default_parameters),* ]\n  262 |     })","lines":38}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"RustTy::is_integer calls ty.to_string() (Ident->String allocation) on every invocation just to compare against a fixed set of literals, called per-parameter during codegen via the enum-replacement path. Build-time only and small, hence negligible.","fix":"Compare against the Ident without allocating, or compute the string once.","locations":[{"ref":"godot-codegen/src/models/domain.rs:930-940","code":"  930 |     pub fn is_integer(&self) -> bool {\n  931 |         let RustTy::BuiltinIdent { ty, .. } = self else {\n  932 |             return false;\n  933 |         };\n  934 | \n  935 |         // isize/usize currently not supported (2025-09), but this is more future-proof.\n  936 |         matches!(\n  937 |             ty.to_string().as_str(),\n  938 |             \"i8\" | \"i16\" | \"i32\" | \"i64\" | \"u8\" | \"u16\" | \"u32\" | \"u64\" | \"isize\" | \"usize\"\n  939 |         )\n  940 |     }","lines":11}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Dictionary::insert` and `Dictionary::get`/`at` perform a `has()` FFI call followed by a separate `get()` FFI call (double round-trip) to fetch the previous/current value. The code's own TODO comments note this. For hot insert/get loops this doubles the FFI cost per operation.","fix":"Use a sentinel-based single-call pattern (e.g. `get(key, unique_sentinel)`) to detect presence and retrieve the value in one FFI call where supported.","locations":[{"ref":"godot-core/src/builtin/collections/dictionary.rs:198-204","code":"  198 |     // TODO(v0.6): avoid double FFI round-trip (has + get); consider using get(key, sentinel) pattern.\n  199 |     /// Gets and removes the old value for a key, if it exists.\n  200 |     fn take_old_value(&self, key_variant: &Variant) -> Option<V> {\n  201 |         self.as_inner()\n  202 |             .has(key_variant)\n  203 |             .then(|| self.get_or_panic(key_variant.clone()))\n  204 |     }","lines":7},{"ref":"godot-core/src/builtin/collections/dictionary.rs:339-352","code":"  339 |     pub fn insert(&mut self, key: impl AsArg<K>, value: impl AsArg<V>) -> Option<V> {\n  340 |         self.balanced_ensure_mutable();\n  341 | \n  342 |         meta::arg_into_ref!(key: K);\n  343 |         meta::arg_into_ref!(value: V);\n  344 | \n  345 |         let key_variant = key.to_variant();\n  346 |         let old_value = self.take_old_value(&key_variant);\n  347 | \n  348 |         // SAFETY: K and V strongly typed.\n  349 |         unsafe { self.set_variant(key_variant, value.to_variant()) };\n  350 | \n  351 |         old_value\n  352 |     }","lines":14}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"get_owner_func and get_script_func clone the borrowed Gd (incrementing the refcount for ref-counted objects) only to read obj_sys() and immediately drop the clone (decrementing again). The original &Gd held by the script instance already keeps the object alive, so the clone/drop pair is pure overhead on every engine call to these hooks.","fix":"Return i.get_owner().map(|gd| gd.obj_sys()) / i.get_script().obj_sys() directly without cloning; the reference returned by the user trait method already guarantees liveness for the duration of the call.","locations":[{"ref":"godot-core/src/obj/script.rs:1340-1345","code":" 1340 |         let owner = with_instance(instance, \"get_owner\", |i| i.get_owner().clone());\n 1341 | \n 1342 |         match owner {\n 1343 |             Ok(Some(owner)) => owner.obj_sys(),\n 1344 |             _ => std::ptr::null_mut(),\n 1345 |         }","lines":6},{"ref":"godot-core/src/obj/script.rs:888-893","code":"  888 |         let script = with_instance(instance, \"get_script\", |i| i.get_script().clone());\n  889 | \n  890 |         match script {\n  891 |             Ok(script) => script.obj_sys(),\n  892 |             Err(_) => std::ptr::null_mut(),\n  893 |         }","lines":6}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`export_range` builds its hint string with repeated `push_str(&format!(...))`, allocating a throwaway `String` for each appended fragment (the `,{rest}` and `,suffix:{suffix}` parts). Minor, but `write!`/`push_str` on literals avoids the intermediate allocations.","fix":"Use `hint_string.push(',')` + `push_str(&rest)` and `write!(hint_string, \",suffix:{suffix}\")` instead of `push_str(&format!(...))`.","locations":[{"ref":"godot-core/src/registry/property/mod.rs:400-406","code":"  400 |         let mut hint_string = hint_beginning;\n  401 |         if !rest.is_empty() {\n  402 |             hint_string.push_str(&format!(\",{rest}\"));\n  403 |         }\n  404 |         if let Some(suffix) = suffix {\n  405 |             hint_string.push_str(&format!(\",suffix:{suffix}\"));\n  406 |         }","lines":7}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In format_one, the (';', _) arm matches every semicolon regardless of state and re-flows the line, so the later arm (c, FormatState::PrevClosingBrace) if c == ';' || c == ',' can never fire for ';'. The accompanying comment 'technically ; is already covered, but it's explicit.' mislabels unreachable dead code as merely explicit.","fix":"Change the guard to `if c == ','` and remove/update the misleading comment.","locations":[{"ref":"godot-codegen/src/formatter/mod.rs:168-173","code":"  168 |             match (c, *state) {\n  169 |                 (';', _) => {\n  170 |                     s.push('\\n');\n  171 |                     s.push_str(indent(level));\n  172 |                     *state = FormatS
