<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`parse_attr` only handles `NestedMeta::Meta` items and `panic!`s on anything else. `NestedMeta` also has `Lit` and `NameValueInvalidExpr` variants (see ast/data/nested_meta.rs), both of which are produced from user-writable input: `#[darling(\"literal\")]` yields `NestedMeta::Lit`, and `#[darling(vis = pub(crate))]` yields `NestedMeta::NameValueInvalidExpr`. Both reach the `else { panic!(\"Wasn't able to parse: ...\") }` and abort the proc-macro with an ICE-style panic instead of emitting a clean compile error.","fix":"Replace the `else { panic!(...) }` with `errors.push(Error::unsupported_format(...).with_span(item));` (or forward the stored error from `NameValueInvalidExpr`) so malformed user input yields a normal compile error rather than a panic.","locations":[{"ref":"core/src/options/mod.rs:96-100","code":"   96 |                 if let NestedMeta::Meta(ref mi) = item {\n   97 |                     errors.handle(target.parse_nested(mi));\n   98 |                 } else {\n   99 |                     panic!(\"Wasn't able to parse: `{:?}`\", item);\n  100 |                 }","lines":5}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Data::empty_from` panics on `syn::Data::Union`. A safe sibling `try_empty_from` exists that returns an Error instead. The panicking variant is public API; a downstream proc-macro that calls `empty_from` on union input will abort compilation with a panic message rather than a clean diagnostic. Reachability depends on the caller, but darling itself documents that unions are unsupported and elsewhere prefers returning errors.","fix":"Consider deprecating `empty_from` in favor of `try_empty_from`, or at minimum ensure callers within darling never route union input here. The Panics doc is present, so this is a known trade-off, but the duplicate fallible API is the safer path.","locations":[{"ref":"core/src/ast/data/mod.rs:30-36","code":"   30 |     pub fn empty_from(src: &syn::Data) -> Self {\n   31 |         match *src {\n   32 |             syn::Data::Enum(_) => Data::Enum(vec![]),\n   33 |             syn::Data::Struct(ref vd) => Data::Struct(Fields::empty_from(&vd.fields)),\n   34 |             syn::Data::Union(_) => panic!(\"Unions are not supported\"),\n   35 |         }\n   36 |     }","lines":7}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`TypeParams::next` recurses via `self.next()` to skip non-type generic params instead of looping. Rust does not guarantee tail-call optimization, so a generics list containing a very long run of consecutive lifetime/const params before a type param (pathological but attacker-controllable proc-macro input) recurses one stack frame per skipped param and can overflow the stack.","fix":"Rewrite as a loop, e.g. `for v in self.0.by_ref() { if let Some(tp) = v.as_type_param() { return Some(tp); } } None`.","locations":[{"ref":"core/src/ast/generics.rs:166-175","code":"  166 |     fn next(&mut self) -> Option<Self::Item> {\n  167 |         let next = self.0.next();\n  168 |         match next {\n  169 |             None => None,\n  170 |             Some(v) => match v.as_type_param() {\n  171 |                 Some(val) => Some(val),\n  172 |                 None => self.next(),\n  173 |             },\n  174 |         }\n  175 |     }","lines":10}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ChildDiagnostic::append_to` and `ErrorUnknownValue::into_diagnostic` call `Span::unwrap()` on `proc_macro2::Span`, which panics if invoked outside a real proc-macro context. This is documented in `append_to` and only compiled under the `diagnostics` feature, so reachable only on nightly within actual macro expansion. Acceptable, but the panic in `into_diagnostic` (kind.rs:191) is NOT documented like the one in child.rs is.","fix":"Add a `# Panics` doc note to `ErrorUnknownValue::into_diagnostic` matching the one on `ChildDiagnostic::append_to`.","locations":[{"ref":"core/src/error/child.rs:50-81","code":"   50 |     pub fn append_to(self, diagnostic: proc_macro::Diagnostic) -> proc_macro::Diagnostic {\n   51 |         match self.level {\n   52 |             Level::Error => {\n   53 |                 if let Some(span) = self.span {\n   54 |                     diagnostic.span_error(span.unwrap(), self.message)\n   55 |                 } else {\n   56 |                     diagnostic.error(self.message)\n   57 |                 }\n   58 |             }\n   59 |             Level::Warning => {\n   60 |                 if let Some(span) = self.span {\n   61 |                     diagnostic.span_warning(span.unwrap(), self.message)\n   62 |                 } else {\n   63 |                     diagnostic.warning(self.message)\n   64 |                 }\n   65 |             }\n   66 |             Level::Note => {\n   67 |                 if let Some(span) = self.span {\n   68 |                     diagnostic.span_note(span.unwrap(), self.message)\n   69 |                 } else {\n   70 |                     diagnostic.note(self.message)\n   71 |                 }\n   72 |             }\n   73 |             Level::Help => {\n   74 |                 if let Some(span) = self.span {\n   75 |                     diagnostic.span_help(span.unwrap(), self.message)\n   76 |                 } else {\n   77 |                     diagnostic.help(self.message)\n   78 |                 }\n   79 |             }\n   80 |         }\n   81 |     }","lines":32},{"ref":"core/src/error/kind.rs:186-208","code":"  186 |     #[cfg(feature = \"diagnostics\")]\n  187 |     pub fn into_diagnostic(self, span: Option<::proc_macro2::Span>) -> ::proc_macro::Diagnostic {\n  188 |         let mut diag = span\n  189 |             .unwrap_or_else(::proc_macro2::Span::call_site)\n  190 |             .unwrap()\n  191 |             .error(self.top_line());\n  192 | \n  193 |         if let Some((_, alt_name)) = self.did_you_mean {\n  194 |             diag = diag.help(format!(\"did you mean `{}`?\", alt_name));\n  195 |         }\n  196 | \n  197 |         if !self.alts.is_empty() {\n  198 |             let mut alts = String::new();\n  199 | \n  200 |             // Per documentation, formatting is infallible unless underlying stream closes\n  201 |             // https://doc.rust-lang.org/std/fmt/struct.Error.html\n  202 |             write_delimited(&mut alts, self.alts.iter().map(Quoted::backticks), \", \")\n  203 |                 .expect(\"writing to a string never fails\");\n  204 |             diag = diag.help(format!(\"available values: {}\", alts));\n  205 |         }\n  206 | \n  207 |         diag\n  208 |     }","lines":23}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Error::multiple` panics when given an empty `Vec` (`panic!(\"Can't deal with 0 errors\")`). This is documented, and the only internal caller (`Accumulator::finish_with`) guards with `errors.is_empty()`. However `flatten()` calls `Error::multiple(self.into_vec())`; `into_vec` always returns a non-empty Vec for a non-empty error, so it is safe. The panic is reachable only if a user calls `Error::multiple(vec![])` directly. Acceptable as documented, but consider returning a `Result` or an explicit empty-error sentinel to make the API harder to misuse.","fix":"Either keep as documented, or add a debug_assert and consider an `Option<Error>` return. At minimum the doc `# Panics` already covers it; lowest priority.","locations":[{"ref":"core/src/error/mod.rs:297-305","code":"  297 |     pub fn multiple(mut errors: Vec<Error>) -> Self {\n  298 |         match errors.len() {\n  299 |             1 => errors\n  300 |                 .pop()\n  301 |                 .expect(\"Error array of length 1 has a first item\"),\n  302 |             0 => panic!(\"Can't deal with 0 errors\"),\n  303 |             _ => Error::new(ErrorKind::Multiple(errors)),\n  304 |         }\n  305 |     }","lines":9}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Usage traversal of non-exhaustive syn enums (`syn::Type`, `syn::WherePredicate`, `syn::GenericArgument`, `syn::TypeParamBound`) falls through to `panic!(\"Unknown ...\")` on unrecognized variants. The code's own TODO comments flag this. With the pinned syn version these arms are unreachable, but a syn upgrade that adds a variant turns a recoverable parse into a compile-time panic in every downstream macro. The same `panic!` pattern is duplicated across both type_params.rs and lifetimes.rs.","fix":"As the TODOs note, prefer returning an empty set (conservative: assume no usage) or threading a fallible result instead of panicking on unknown variants, so a syn upgrade degrades gracefully.","locations":[{"ref":"core/src/usage/type_params.rs:164","code":"  164 |             _ => panic!(\"Unknown syn::Type: {:?}\", self),","lines":1},{"ref":"core/src/usage/type_params.rs:221","code":"  221 |             _ => panic!(\"Unknown syn::WherePredicate: {:?}\", self),","lines":1},{"ref":"core/src/usage/type_params.rs:237","code":"  237 |             _ => panic!(\"Unknown syn::GenericArgument: {:?}\", self),","lines":1},{"ref":"core/src/usage/type_params.rs:249","code":"  249 |             _ => panic!(\"Unknown syn::TypeParamBound: {:?}\", self),","lines":1},{"ref":"core/src/usage/lifetimes.rs:182","code":"  182 |             _ => panic!(\"Unknown syn::Type: {:?}\", self),","lines":1},{"ref":"core/src/usage/lifetimes.rs:252","code":"  252 |             _ => panic!(\"Unknown syn::WherePredicate: {:?}\", self),","lines":1},{"ref":"core/src/usage/lifetimes.rs:273","code":"  273 |             _ => panic!(\"Unknown syn::GenericArgument: {:?}\", self),","lines":1},{"ref":"core/src/usage/lifetimes.rs:303","code":"  303 |             _ => panic!(\"Unknown syn::TypeParamBound: {:?}\", self),","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the transparent branch of FromMetaImpl, the impl emits only `from_meta` and returns early. The previously computed `from_word`, `from_none`, and `from_expr` overrides are discarded. Options validation rejects `from_word` and `from_expr` combined with transparent, but `from_none` is NOT validated against transparent (see core/src/options/from_meta.rs which only checks from_word/from_expr). Consequently a user who writes `#[darling(transparent, from_none = ...)]` has their `from_none` override silently dropped with no error or warning.","fix":"Either emit the `from_none` override inside the transparent impl block, or add options validation rejecting `from_none` together with `transparent` (mirroring the existing from_word/from_expr checks).","locations":[{"ref":"core/src/codegen/from_meta_impl.rs:31-37","code":"   31 |         let from_none = self.from_none.map(|body| {\n   32 |             quote_spanned! {body.span()=>\n   33 |                 fn from_none() -> _darling::export::Option<Self> {\n   34 |                     _darling::export::identity::<fn() -> _darling::export::Option<Self>>(#body)()\n   35 |                 }\n   36 |             }\n   37 |         });","lines":7},{"ref":"core/src/codegen/from_meta_impl.rs:47-67","code":"   47 |         // Transparent proxies to the sole value it contains\n   48 |         if let Some((member, _)) = base\n   49 |             .data\n   50 |             .as_struct()\n   51 |             .and_then(|fields| super::extract_transparent(fields, base.transparent))\n   52 |         {\n   53 |             let ty_ident = base.ident;\n   54 |             let impl_block = quote!(\n   55 |                 fn from_meta(__item: &_darling::export::syn::Meta) -> _darling::Result<Self> {\n   56 |                     _darling::FromMeta::from_meta(__item)\n   57 |                         .map_err(|e| e.with_span(&__item))\n   58 |                         .map(|value| #ty_ident { #member: value })\n   59 |                 }\n   60 |             );\n   61 | \n   62 |             self.wrap(impl_block, tokens);\n   63 |             if self.derive_syn_parse {\n   64 |                 ParseImpl(self).to_tokens(tokens);\n   65 |             }\n   66 |             return;\n   67 |         }","lines":21}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Display for ErrorKind` special-cases `Multiple(items) if items.len() == 1` to print `items[0]` directly, but `Error::multiple` already collapses a single-element Vec into that single error and never constructs `Multiple` with one element. So this arm is only reachable if a `Multiple(vec![one])` is built by some other path (e.g. `ErrorKind::Multiple(...)` constructed directly inside `add_sibling_alts...` after mapping, which preserves length, so not here). It is effectively defensive/dead for current construction paths but harmless. Note however `ErrorKind::len()` and this `Display` disagree in spirit: `len()` recurses summing, Display unwraps only one level - inconsistent handling of nested single-element Multiples.","fix":"Either remove the `len()==1` Display special-case (since construction prevents it) or document why it is kept as a defensive guard.","locations":[{"ref":"core/src/error/kind.rs:75-80","code":"   75 |             Multiple(ref items) if items.len() == 1 => items[0].fmt(f),\n   76 |             Multiple(ref items) => {\n   77 |                 write!(f, \"Multiple errors: (\")?;\n   78 |                 write_delimited(f, items, \", \")?;\n   79 |                 write!(f, \")\")\n   80 |             }","lines":6},{"ref":"core/src/error/mod.rs:297-305","code":"  297 |     pub fn multiple(mut errors: Vec<Error>) -> Self {\n  298 |         match errors.len() {\n  299 |             1 => errors\n  300 |                 .pop()\n  301 |                 .expect(\"Error array of length 1 has a first item\"),\n  302 |             0 => panic!(\"Can't deal with 0 errors\"),\n  303 |             _ => Error::new(ErrorKind::Multiple(errors)),\n  304 |         }\n  305 |     }","lines":9}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`ErrorUnknownValue::add_alts` only updates the `did_you_mean` suggestion if a NEW alternate scores strictly higher than the current best (`bna.0 > current.0`). But `did_you_mean` is recomputed over the freshly-passed `alternates` slice ONLY, not over the union of old + new alts. The previously-recorded `did_you_mean` may have come from an earlier batch of alts that is not in this call. This is fine for picking the global best across batches. However, the candidate selection inside `did_you_mean` itself uses `confidence > 0.8` as a hard floor: if all newly-added alts score <= 0.8 they are silently ignored even when there was no prior suggestion, which is intended, but the union of alts displayed (`self.alts`) can then list many values while `did_you_mean` stays None - acceptable. The real subtlety: the stored similarity score is only ever compared within `did_you_mean` batches, so cross-batch ties keep the first batch's suggestion. Document or unify by recomputing over `self.alts` once after extending.","fix":"After `self.alts.extend(...)`, recompute `self.did_you_mean = did_you_mean(&self.value, self.alts.iter())` so the suggestion is always derived from the full known set rather than per-batch, eliminating order-dependence.","locations":[{"ref":"core/src/error/kind.rs:167-184","code":"  167 |     pub fn add_alts<'a, T, I>(&mut self, alternates: I)\n  168 |     where\n  169 |         T: AsRef<str> + 'a,\n  170 |         I: IntoIterator<Item = &'a T>,\n  171 |     {\n  172 |         let alts = alternates.into_iter().collect::<Vec<_>>();\n  173 |         self.alts\n label":"Logic Error","severity":"medium","easy":false,"description":"`From<Error> for syn::Error`: in the single-error branch with no explicit span, it builds `syn::Error::new(e.span(), e)` where `e.span()` returns `Span::call_site()` (because `has_span()` is false). The `Display` of `e` here includes the location path (e.g. `... at foo/bar`). But in the multi-error branch it flattens and maps each through `syn::Error::from`, where each flattened single error with no explicit span ALSO renders with its location path. This is intended. However the single-error WITH explicit span branch uses `e.kind` (no location path) while the no-span branch uses `e` (with path). The asymmetry means whether the location path appears in the compiler error depends on span presence, which is a deliberate but easily-overlooked coupling worth a comment at the call site (the comment exists for the span branch only).","fix":"Add a brief comment on the no-span branch mirroring the span branch's comment, clarifying that the full `Error` (with location path) is intentionally used here.","locations":[{"ref":"core/src/error/mod.rs:701-727","code":"  701 | impl From<Error> for syn::Error {\n  702 |     fn from(e: Error) -> Self {\n  703 |         if e.len() == 1 {\n  704 |             if let Some(span) = e.explicit_span() {\n  705 |                 // Don't include the location path if the error has an explicit span,\n  706 |                 // since it will be redundant and isn't consistent with how rustc\n  707 |                 // exposes errors.\n  708 |                 syn::Error::new(span, e.kind)\n  709 |             } else {\n  710 |                 // If the error's span is going to be the macro call site, include\n  711 |                 // the location information to try and help the user pinpoint the issue.\n  712 |                 syn::Error::new(e.span(), e)\n  713 |             }\n  714 |         } else {\n  715 |             let mut syn_errors = e.flatten().into_iter().map(syn::E iant\")\n  158 |                                 .with_span(&word.span()),\n  159 |                         );\n  160 |                     }\n  161 |                 }\n  162 | \n  163 |                 if let Some(from_expr) = &self.from_expr {\n  164 |                     if data.iter().any(|v| v.is_unit_variant() && !v.is_skipped()) {\n  165 |                         errors.push(\n  166 |                             Error::custom(\"`from_expr` cannot be used on enums with non-skipped unit variants because it conflicts with the generated impl\")\n  167 |                                 .with_span(from_expr),\n  168 |                         );\n  169 |                     }\n  170 |                 }\n  171 |             }\n  172 |         }\n  173 |     }","lines":61}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`InputField::parse_nested` carefully rejects the combinations `flatten` + `rename`/`with`/`skip`/`multiple` (with symmetric checks in both the option arm and the `flatten` arm at lines 199-232), but there is NO conflict check for `flatten` + `default` in either direction. `#[darling(flatten, default = ...)]` is silently accepted while every other flatten pairing errors, which is an asymmetry worth confirming is intended.","fix":"If `flatten` + `default` is unsupported, add a conflict check in both the `default` arm (when flatten present) and the `flatten` arm (when default present); otherwise document that the combination is intentionally allowed.","locations":[{"ref":"core/src/options/input_field.rs:140-144","code":"  140 |         } else if path.is_ident(\"default\") {\n  141 |             if self.default.is_some() {\n  142 |                 return Err(Error::duplicate_field_path(path).with_span(mi));\n  143 |             }\n  144 |             self.default = FromMeta::from_meta(mi)?;","lines":5},{"ref":"core/src/options/input_field.rs:199-232","code":"  199 |         } else if path.is_ et_word` and pass.","fix":"Use `word.strip_prefix(self.prefix).unwrap_or(word)` (single strip) instead of `trim_start_matches`, so only one prefix is removed and `struct_struct_named` falls through to the `_ => Err(unknown_value)` arm.","locations":[{"ref":"core/src/options/shape.rs:164-188","code":"  164 |     fn set_word(&mut self, word: &str) -> Result<()> {\n  165 |         match word.trim_start_matches(self.prefix) {\n  166 |             \"newtype\" => {\n  167 |                 self.newtype = true;\n  168 |                 Ok(())\n  169 |             }\n  170 |             \"named\" => {\n  171 |                 self.named = true;\n  172 |                 Ok(())\n  173 |             }\n  174 |             \"tuple\" => {\n  175 |                 self.tuple = true;\n  176 |                 Ok(())\n  177 |             }\n  178 |             \"unit\" => {\n  179 |                 self.unit = true;\n  180 |                 Ok(())\n  181 |             }\n  182 |             \"any\" => {\n  183 |                 self.any = true;\n  184 |                 Ok(())\n  185 |             }\n  186 |             _ => Err(Error::unknown_value(word)),\n  187 |         }\n  188 |     }","lines":25},{"ref":"core/src/options/shape.rs:56-68","code":"   56 |                 if word == \"any\" {\n   57 |                     new.any = true;\n   58 |                 } else if word.starts_with(\"enum_\") {\n   59 |                     new.enum_values\n   60 |                         .set_word(&word)\n   61 |                         .map_err(|e| e.with_span(&ident))?;\n   62 |                 } else if word.starts_with(\"struct_\") {\n   63 |                     new.struct_values\n   64 |                         .set_word(&word)\n   65 |                         .map_err(|e| e.with_span(&ident))?;\n   66 |                 } else {\n   67 |                     return Err(Error::unknown_value(&word).with_span(&ident));\n   68 |                 }","lines":13}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`DataShape::set_word` accepts `any` (sets `self.any = true`) for the per-variant `supports` use (FromVariant, where prefix is empty), but the bare-`any` handling in `DeriveInputShapeSet::from_list` is intercepted earlier and never routed to `set_word`. This means `struct_any`/`enum_any` set the inner `DataShape.any`, while top-level `any` sets the outer `DeriveInputShapeSet.any`; the two `any` concepts are easy to confuse and the inner `any` in `DataShape::to_tokens` expands to all four shapes including `Unit`, which may not be intended for `enum_any` (enum variants are never unit-as-struct). Worth verifying the `enum_any` -> includes-Unit expansion is correct.","fix":"Confirm that `enum_any`/`struct_any` expanding to {Named,Tuple,Newtype,Unit} is the intended shape set for both contexts; if Unit should be excluded in some context, special-case it.","locations":[{"ref":"core/src/options/shape.rs:182-185","code":"  182 |             \"any\" => {\n  183 |                 self.any = true;\n  184 |                 Ok(())\n  185 |             }","lines":4},{"ref":"core/src/options/shape.rs:208-241","code":"  208 | impl ToTokens for DataShape {\n  209 |     fn to_tokens(&self, tokens: &mut TokenStream) {\n  210 |         let Self {\n  211 |             any,\n  212 |             named,\n  213 |             tuple,\n  214 |             unit,\n  215 |             newtype,\n  216 |             ..\n  217 |         } = *self;\n  218 | \n  219 |         let shape_path: syn::Path = parse_quote!(_darling::util::Shape);\n  220 | \n  221 |         let mut shapes = vec![];\n  222 |         if any || named {\n  223 |             shapes.push(quote!(#shape_path::Named));\n  224 |         }\n  225 | \n  226 |         if any || tuple {\n  227 |             shapes.push(quote!(#shape_path::Tuple));\n  228 |         }\n  229 | \n  230 |         if any || newtype {\n  231 |             shapes.push(quote!(#shape_path::Newtype));\n  232 |         }\n  233 | \n  234 |         if any || unit {\n  235 |             shapes.push(quote!(#shape_path::Unit));\n  236 |         }\n  237 | \n  238 |         tokens.append_all(quote! {\n  239 |             _darling::util::ShapeSet::new(vec![#(#shapes),*])\n  240 |         });\n  241 |     }","lines":34}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Flag::present()` and `From<bool>::from(true)` use `Span::call_site()` for the stored span, whereas `from_meta` stores the actual path span. A `Flag` constructed programmatically therefore points at the macro call site, which can make conflicting-flag error messages (the documented use case) point at the wrong location when flags are synthesized rather than parsed.","fix":"Document that programmatically-created flags carry `call_site` spans, or accept an explicit `Span` in a constructor so synthesized flags can carry a meaningful location.","locations":[{"ref":"core/src/util/flag.rs:49-51","code":"   49 |     pub fn present() -> Self {\n   50 |         Flag(Some(Span::call_site()))\n   51 |     }","lines":3},{"ref":"core/src/util/flag.rs:91-98","code":"   91 | impl From<bool> for Flag {\n   92 |     fn from(v: bool) -> Self {\n   93 |         if v {\n   94 |             Flag::present()\n   95 |         } else {\n   96 |             Flag(None)\n   97 |         }\n   98 |     }","lines":8}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`from_meta_num!` `from_string` parses numbers via `s.parse()` and maps any error to `Error::unknown_value(s)`, discarding the distinction between overflow (value out of range) and malformed input. The literal path (`base10_parse`) preserves the precise syn error, but the string path collapses e.g. `\"99999999999\"` for a `u8` into a generic \"unknown value\" rather than an overflow message. Diagnostic-quality issue only; no panic (parse returns Err, never overflows).","fix":"Distinguish `ParseIntError` kinds (or just surface the underlying parse error message) so overflow vs invalid-digit produces a clearer diagnostic, as the literal branch already does.","locations":[{"ref":"core/src/from_meta.rs:333-350","code":"  333 | macro_rules! from_meta_num {\n  334 |     ($ty:path) => {\n  335 |         impl FromMeta for $ty {\n  336 |             fn from_string(s: &str) -> Result<Self> {\n  337 |                 s.parse().map_err(|_| Error::unknown_value(s))\n  338 |             }\n  339 | \n  340 |             fn from_value(value: &Lit) -> Result<Self> {\n  341 |                 (match *value {\n  342 |                     Lit::Str(ref s) => Self::from_string(&s.value()),\n  343 |                     Lit::Int(ref s) => s.base10_parse::<$ty>().map_err(Error::from),\n  344 |                     _ => Err(Error::unexpected_lit_type(value)),\n  345 |                 })\n  346 |                 .map_err(|e| e.with_span(value))\n  347 |             }\n  348 |         }\n  349 |     };\n  350 | }","lines":18}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"DataMatchArm panics with `panic!(\"Match arms aren't supported for tuple variants yet\")` for an enum variant that is a multi-field tuple (not unit, not struct, and not single-field/transparent). Nothing in options validation rejects multi-field tuple variants for a FromMeta enum (extract_transparent only matches len()==1 tuples), so feeding such a variant produces an internal proc-macro panic instead of a spanned darling::Error pointing at the offending variant. Proc-macro panics give users an opaque 'proc-macro panicked' message with no location.","fix":"Validate against multi-field tuple variants in options (emit a proper Error with the variant span), or have DataMatchArm emit a compile_error!-style token / darling error rather than panicking.","locations":[{"ref":"core/src/codegen/variant.rs:189-191","code":"  189 |         } else {\n  190 |             panic!(\"Match arms aren't supported for tuple variants yet\");\n  191 |         }","lines":3}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`impl FromMeta for Result<T>` only overrides `from_none`, `from_list`, and `from_meta` to capture inner errors into the `Ok(Err(..))` value. It does NOT override `from_word`, `from_value`, `from_string`, `from_char`, `from_bool`, or `from_invalid_expr`. The whole point of `Result<T>` is \"fallible parsing; will populate the target field with the result of the parse attempt\" (per the trait docs at lines 52-54). `from_meta` covers the normal derive path (Path/List/NameValue), so the gap is mostly latent, but any code path that calls a leaf method directly (e.g. a container that calls `from_invalid_expr` on a `NameValueInvalidExpr`, as the `map!` macro does at line 913, or `from_value` from a parent collection) will get a hard `Err` instead of the intended `Ok(Err(..))` capture. In particular a `Result<T>` value behind a `name = <invalid expr>` reaches the default `from_invalid_expr` (line 218) which returns the raw error rather than capturing it.","fix":"Add overrides for `from_invalid_expr`, `from_value`, `from_word`, `from_string`, `from_char`, and `from_bool` that delegate to `T::...` and wrap the result in `Ok(...)`, mirroring `from_meta`/`from_list`, so error capture is consistent across every entry point.","locations":[{"ref":"core/src/from_meta.rs:778-793","code":"  778 | impl<T: FromMeta> FromMeta for Result<T> {\n  779 |     fn from_none() -> Option<Self> {\n  780 |         T::from_none().map(Ok)\n  781 |     }\n  782 | \n  783 |     // `#[darling(flatten)]` forwards directly to this method, so it's\n  784 |     // necessary to declare it to avoid getting an unsupported format\n  785 |     // error if it's invoked directly.\n  786 |     fn from_list(items: &[NestedMeta]) -> Result<Self> {\n  787 |         Ok(FromMeta::from_list(items))\n  788 |     }\n  789 | \n  790 |     fn from_meta(item: &Meta) -> Result<Self> {\n  791 |         Ok(FromMeta::from_meta(item))\n  792 |     }\n  793 | }","lines":16},{"ref":"core/src/from_meta.rs:218-220","code":"  218 |     fn from_invalid_expr(value: &MetaNameValueInvalidExpr) -> Result<Self> {\n  219 |         Err(value.error.clone())\n  220 |     }","lines":3}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Multi-field tuple structs deriving FromMeta hit `panic!(\"Multi-field tuples are not supported\")` during code generation. Like the variant case, this is a proc-macro panic rather than a spanned darling::Error, producing a poor diagnostic for the user.","fix":"Reject multi-field tuple structs during options validation with a spanned Error, or emit a compile_error! token instead of panicking.","locations":[{"ref":"core/src/codegen/from_meta_impl.rs:79-84","code":"   79 |             Data::Struct(Fields {\n   80 |                 style: Style::Tuple,\n   81 |                 ..\n   82 |             }) => {\n   83 |                 panic!(\"Multi-field tuples are not supported\");\n   84 |             }","lines":6}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"For `HashMap`/`BTreeMap` with `syn::Path` keys, a duplicate-key error is reported via `Error::duplicate_field(&key.to_display())`, which stringifies the path and loses the structured-path information. The crate provides a dedicated `Error::duplicate_field_path(path)` helper (error/mod.rs:97) intended exactly for path-typed fields. Using the string variant gives a less precise diagnostic than the API already supports.","fix":"Use `Error::duplicate_field_path(...)` for `syn::Path` keys (the `map!` macro and `HashSet<Path>` impl), keep alse,"description":"Forwarded/special fields handled via `clone_from(&field.ident)` (`vis`, `ty`, `bounds`, `default`, `discriminant`) silently ignore any `#[darling(...)]` attributes placed on those fields. Unlike `ForwardedField::from_field` (used for `ident`, `attrs`, `data`, `generics`, `fields`), these branches never call `parse_attributes`, so e.g. `#[darling(with = ...)]` on a `vis`/`ty`/`bounds`/`default`/`discriminant` field is silently dropped rather than rejected, and no `with` support exists for them.","fix":"Either route these fields through a parser that rejects unknown darling attributes, or document/assert that no attributes are accepted. At minimum emit an error when darling attributes are present on these fields.","locations":[{"ref":"core/src/options/from_derive.rs:58-71","code":"   58 |         match field.ident.as_ref().map(|v| v.to_string()).as_deref() {\n   59 |             Some(\"vis\") => {\n   60 |                 self.vis.clone_from(&field.ident);\n   61 |                 Ok(())\n   62 |             }\n   63 |             Some(\"data\") => {\n   64 |                 self.data = ForwardedField::from_field(field).map(Some)?;\n   65 |                 Ok(())\n   66 |             }\n   67 |             Some(\"generics\") => {\n   68 |                 self.generics = ForwardedField::from_field(field).map(Some)?;\n   69 |                 Ok(())\n   70 |             }\n   71 |             _ => self.base.parse_field(field),","lines":14},{"ref":"core/src/options/from_field.rs:40-50","code":"   40 |         match field.ident.as_ref().map(|v| v.to_string()).as_deref() {\n   41 |             Some(\"vis\") => {\n   42 |                 self.vis.clone_from(&field.ident);\n   43 |                 Ok(())\n   44 |             }\n   45 |             Some(\"ty\") => {\n   46 |                 self.ty.clone_from(&field.ident);\n   47 |                 Ok(())\n   48 |             }\n   49 |             _ => self.base.parse_field(field),\n   50 |         }","lines":11},{"ref":"core/src/options/from_type_param.rs:40-50","code":"   40 |         match field.ident.as_ref().map(|v| v.to_string()).as_deref() {\n   41 |             Some(\"bounds\") => {\n   42 |                 self.bounds.clone_from(&field.ident);\n   43 |                 Ok(())\n   44 |             }\n   45 |             Some(\"default\") => {\n   46 |                 self.default.clone_from(&field.ident);\n   47 |                 Ok(())\n   48 |             }\n   49 |             _ => self.base.parse_field(field),\n   50 |         }","lines":11},{"ref":"core/src/options/from_variant.rs:60-70","code":"   60 |         match field.ident.as_ref().map(|v| v.to_string()).as_deref() {\n   61 |             Some(\"discriminant\") => {\n   62 |                 self.discriminant.clone_from(&field.ident);\n   63 |                 Ok(())\n   64 |             }\n   65 |             Some(\"fields\") => {\n   66 |                 self.fields = ForwardedField::from_field(field).map(Some)?;\n   67 |                 Ok(())\n   68 |             }\n   69 |             _ => self.base.parse_field(field),\n   70 |         }","lines":11}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`IdentString::map` panics if the transform produces an invalid identifier (via `Ident::new`). The panic is documented, but `map` is part of a proc-macro helper crate; a user transform that yields a non-ident string aborts the macro with an opaque panic instead of a `darling::Error`. Reachable whenever a consumer passes a transform that can produce an invalid ident.","fix":"Consider offering a fallible variant returning `syn::Result`/`darling::Result`, or clearly funnel the failure through a span-bearing error rather than `Ident::new`'s panic.","locations":[{"ref":"core/src/util/ident_string/mod.rs:53-61","code":"   53 |     pub fn map<F, S>(self, map_fn: F) -> Self\n   54 |     where\n   55 |         F: FnOnce(String) -> S,\n   56 |         S: AsRef<str>,\n   57 |     {\n   58 |         let span = self.span();\n   59 |         let string = map_fn(self.string);\n   60 |         Ident::new(string.as_ref(), span).into()\n   61 |     }","lines":9}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"ValuePopulator invokes the user-provided `with` callable directly as `#with(__fwd_attrs)` without the `identity::<fn(...) -> ...>(#with)(...)` wrapper used everywhere else for Callable values (see field.rs MatchArm, ident_field.rs, default_expr.rs, from_meta_impl.rs). Callable's own docs state the identity wrapper both pins the function signature and 'prevents a closure from accessing locals in the generated code'. Because `forward_attrs` `with` accepts a Callable (which can be a closure), this path lets a closure capture generated locals (e.g. `__fwd_attrs`, `__errors`), contrary to the documented invariant, and gives worse type-mismatch diagnostics.","fix":"Wrap the call in the standard identity shim, e.g. `_darling::export::identity::<fn(Vec<syn::Attribute>) -> _darling::Result<_>>(#with)(__fwd_attrs)`, matching the other Callable invocation sites.","locations":[{"ref":"core/src/codegen/attrs_field.rs:62-69","code":"   62 |     fn to_tokens(&self, tokens: &mut proc_macro2::TokenStream) {\n   63 |         let ForwardedField { ident, with, .. } = self.0;\n   64 |         let initializer_expr = match with {\n   65 |             Some(with) => quote_spanned!(with.span()=> __errors.handle(#with(__fwd_attrs))),\n   66 |             None => quote!(_darling::export::Some(__fwd_attrs)),\n   67 |         };\n   68 |         tokens.append_all(quote!(#ident = #initializer_expr;));\n   69 |     }","lines":8}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Manual `PartialEq`/`Eq` for `IdentString` compare only `ident`, while `PartialOrd`/`Ord` are derived over (`ident`, `string`). This is currently consistent because `string` is always derived from `ident`, but the split derivation is fragile: if a future change ever lets `string` diverge from `ident`, `Ord`/`Eq` would disagree, violating the `Ord`/`PartialEq` consistency contract.","fix":"Either derive all of `PartialEq`/`Eq`/`PartialOrd`/`Ord` consistently (and drop the redundant `string` field from comparison via manual impls based solely on `ident`), or document the invariant that `string == ident.to_string()` must always hold.","locations":[{"ref":"core/src/util/ident_string/mod.rs:19","code":"   19 | #[derive(Clone, PartialOrd, Ord)]","lines":1},{"ref":"core/src/util/ident_string/mod.rs:94-100","code":"   94 | impl Eq for IdentString {}\n   95 | \n   96 | impl PartialEq for IdentString {\n   97 |     fn eq(&self, rhs: &Self) -> bool {\n   98 |         self.ident == rhs.ident\n   99 |     }\n  100 | }","lines":7}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Error::at` does `self.locations.insert(0, location.to_string())`, an O(n) shift of the whole Vec on every prepend. During deep parsing, `at` is called once per nesting level as errors bubble up, giving O(depth^2) total. `prepend_at` already does the efficient bulk-prepend. For typical macro inputs depth is tiny so impact is negligible, but a `VecDeque` or building locations in reverse then reversing once would avoid the repeated shifts.","fix":"If profiling ever shows this hot, store locations reversed (push_back, O(1)) and reverse only at display time, or use a small SmallVec/VecDeque. Low priority given typical input sizes.","locations":[{"ref":"core/src/error/mod.rs:401-406","code":"  401 |     /// Adds a location to the error, such as a field or variant.\n  402 |     /// Locations must be added in reverse order of specificity.\n  403 |     pub fn at<T: fmt::Display>(mut self, location: T) -> Self {\n  404 |         self.locations.insert(0, location.to_string());\n  405 |         self\n  406 |     }","lines":6}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`from_owned` clones the entire last `PathSegment` just to move its `arguments` out, whereas the equivalent `from_ref`/`from_mut` borrow the arguments directly. Cloning the whole segment (ident + arguments) is wasteful; only the arguments are needed.","fix":"Match on `last_segment.arguments` by reference and clone only the needed `GenericArgument`, or destructure the owned path. e.g. `let syn::PathArguments::AngleBracketed(ty) = &last_segment.arguments else { ... };` then clone the single generic argument, mirroring `from_ref`.","locations":[{"ref":"core/src/util/extract_option.rs:67","code":"   67 |     let syn::PathArguments::AngleBracketed(ty) = last_segment.clone().arguments else {","lines":1}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"Several `from_string` implementations format an intermediate `String` and re-parse, e.g. `Vec<syn::WherePredicate>::from_string` does `format!(\"where {}\", value)` and then parses the whole where-clause. This is acceptable for proc-macro-time work, but the `from_value` variant (lines 749-759) duplicates the same `format!(\"where {}\", ...)` logic instead of delegating to `from_string`, so the two code paths can drift. Minor maintainability/duplication issue, not a hot path.","fix":"Have `from_value` extract the string and delegate to `from_string` (or share a private helper) to avoid duplicating the `\"where {}\"` prefixing logic.","locations":[{"ref":"core/src/from_meta.rs:743-760","code":"  743 | impl FromMeta for Vec<syn::WherePredicate> {\n  744 |     fn from_string(value: &str) -> Result<Self> {\n  745 |         syn::WhereClause::from_string(&format!(\"where {}\", value))\n  746 |             .map(|c| c.predicates.into_iter().collect())\n  747 |     }\n  748 | \n  749 |     fn from_value(value: &Lit) -> Result<Self> {\n  750 |         if let syn::Lit::Str(s) = value {\n  751 |             syn::WhereClause::from_value(&syn::Lit::Str(syn::LitStr::new(\n  752 |                 &format!(\"where {}\", s.value()),\n  753 |                 value.span(),\n  754 |             )))\n  755 |             .map(|c| c.predicates.into_iter().collect())\n  756 |         } else {\n  757 |             Err(Error::unexpected_lit_type(value))\n  758 |         }\n  759 |     }\n  760 | }","lines":18}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`ParseAttribute::parse_attributes` builds `parse_quote!(darling)` (a fresh `syn::Path` allocation) on every loop iteration to compare against `attr.meta.path()`. For inputs with many attributes this re-parses the path repeatedly.","fix":"Use `attr.meta.path().is_ident(\"darling\")` instead of constructing a `Path` via `parse_quote!` for the comparison.","locations":[{"ref":"core/src/options/mod.rs:76-85","code":"   76 |     fn parse_attributes(mut self, attrs: &[syn::Attribute]) -> Result<Self> {\n   77 |         let mut errors = Error::accumulator();\n   78 |         for attr in attrs {\n   79 |             if attr.meta.path() == &parse_quote!(darling) {\n   80 |                 errors.handle(parse_attr(attr, &mut self));\n   81 |             }\n   82 |         }\n   83 | \n   84 |         errors.finish_with(self)\n   85 |     }","lines":10}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`collect_type_params` seeds its accumulator with `with_capacity_and_hasher(type_set.len(), ...)`, but the analogous `collect_lifetimes` seeds with `Default::default()` (zero capacity), forcing reallocation as lifetimes are inserted. The result set can never exceed `lifetimes.len()`, so the same preallocation would avoid rehashing.","fix":"Use `HashSet::with_capacity_and_hasher(lifetimes.len(), Default::default())` as the fold seed in `collect_lifetimes`, matching `collect_type_params`.","locations":[{"ref":"core/src/usage/lifetimes.rs:62-67","code":"   62 |         self.into_iter()\n   63 |             .fold(Default::default(), |mut state, value| {\n   64 |                 state.extend(value.uses_lifetimes(options, lifetimes));\n   65 |                 state\n   66 |             })\n   67 |     }","lines":6},{"ref":"core/src/usage/type_params.rs:42-45","code":"   42 |         self.into_iter().fold(\n   43 |             IdentRefSet::with_capacity_and_hasher(type_set.len(), Default::default()),\n   44 |             |state, value| union_in_place(state, value.uses_type_params(options, type_set)),\n   45 |         )","lines":4}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`from_owned` collects all generic args into a `Vec` solely to check `len() == 1` and take the first, then uses `.expect(...)`. `from_ref`/`from_mut` do the same. A direct length check on the iterator/punctuated plus `into_iter().next()` would avoid the allocation and the unreachable `expect`.","fix":"Check `ty.args.len() != 1` directly on the punctuated list (no Vec), then `ty.args.into_iter().next()` / `.iter().next()` and match the `GenericArgument::Type`.","locations":[{"ref":"core/src/util/extract_option.rs:71-84","code":"   71 |     let args = ty.args.into_iter().collect::<Vec<_>>();\n   72 | \n   73 |     if args.len() != 1 {\n   74 |         return Err(err());\n   75 |     }\n   76 | \n   77 |     let arg = args\n   78 |         .into_iter()\n   79 |         .next()\n   80 |         .expect(\"just checked that `.len() == 1`\");\n   81 | \n   82 |     let syn::GenericArgument::Type(ty) = arg else {\n   83 |         return Err(err());\n   84 |     };","lines":14},{"ref":"core/src/util/extract_option.rs:134-147","code":"  134 |     let args = ty.args.iter_mut().collect::<Vec<_>>();\n  135 | \n  136 |     if args.len() != 1 {\n  137 |         return Err(err());\n  138 |     }\n  139 | \n  140 |     let arg = args\n  141 |         .into_iter()\n  142 |         .next()\n  143 |         .expect(\"just checked that `.len() == 1`\");\n  144 | \n  145 |     let syn::GenericArgument::Type(ty) = arg else {\n  146 |         return Err(err());\n  147 |     };","lines":14},{"ref":"core/src/util/extract_option.rs:197-210","code":"  197 |     let args = ty.args.iter().collect::<Vec<_>>();\n  198 | \n  199 |     if args.len() != 1 {\n  200 |         return Err(err());\n  201 |     }\n  202 | \n  203 |     let arg = args\n  204 |         .into_iter()\n  205 |         .next()\n  206 |         .expect(\"just checked that `.len() == 1`\");\n  207 | \n  208 |     let syn::GenericArgument::Type(ty) = arg else {\n  209 |         return Err(err());\n  210 |     };","lines":14}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"Needless borrow of an already-borrowable value in the serde roundtrip test (`serde_json::from_str(&raw_ident)` where `raw_ident: &str`). Harmless test-only nit.","fix":"Use `serde_json::from_str(raw_ident)`.","locations":[{"ref":"core/src/util/ident_string/serde.rs:48-49","code":"   48 |         let deserialized: IdentString =\n   49 |             serde_json::from_str(&raw_ident).expect(\"ident must be valid\");","lines":2}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`path_to_string` builds, for every segment, a 2-element array of `Cow<str>` (separator + ident) and flat-maps them into the output `String`. Each `s.ident.to_string()` allocates a `String` that is then copied into the result and dropped. For a helper used in hot comparison paths this allocates one throwaway `String` per segment.","fix":"Write directly into a `String` with `String::with_capacity`, pushing `\"::\"` between segments and using `write!`/`push_str` with the ident's display, avoiding the per-segment `Cow` arrays and intermediate `String`s.","locations":[{"ref":"core/src/util/path_to_string.rs:15-28","code":"   15 | pub fn path_to_string(path: &syn::Path) -> String {\n   16 |     path.segments\n   17 |         .iter()\n   18 |         // like `.intersperse(\"::\")`, but that's not stable yet\n   19 |         .enumerate()\n   20 |         .flat_map(|(i, s)| {\n   21 |             if i == 0 {\n   22 |                 [Cow::Borrowed(\"\"), s.ident.to_string().into()]\n   23 |             } else {\n   24 |                 [Cow::Borrowed(\"::\"), s.ident.to_string().into()]\n   25 |             }\n   26 |         })\n   27 |         .collect()\n   28 | }","lines":14}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`emit_with_macro_help_span` is annotated `#[allow(dead_code)]` and is `cfg(feature = \"diagnostics\")` only; it has no callers anywhere in the crate. It is genuinely dead code retained for experimentation.","fix":"Either wire it up behind a real code path / feature, or remove it. If kept intentionally for future use, leave the allow but note it is experimental in a comment (the doc already hints at this).","locations":[{"ref":"core/src/error/mod.rs:581-598","code":"  581 |     #[cfg(feature = \"diagnostics\")]\n  582 |     #[allow(dead_code)]\n  583 |     fn emit_with_macro_help_span(self) {\n  584 |         use proc_macro::Diagnostic;\n  585 | \n  586 |         for error in self.flatten() {\n  587 |             let needs_help = error.has_span();\n  588 |             let diagnostic = error.single_to_diagnostic();\n  589 |             Diagnostic::emit(if needs_help {\n  590 |                 diagnostic.span_help(\n  591 |                     Span::call_site().unwrap(),\n  592 |                     \"Encountered as part of this derive-mode-macro\",\n  593 |                 )\n  594 |             } else {\n  595 |                 diagnostic\n  596 |             })\n  597 |         }\n  598 |     }","lines":18}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In `parse_meta_path`, the `segments.is_empty()` branch returns `input.parse::<Ident>().unwrap_err()`. This is only reachable when no ident could be peeked, but `NestedMeta::parse` only calls `parse_meta_path` after confirming `peek(Ident::peek_any)` (or `::` followed by `peek3(Ident)`), guaranteeing at least one segment. The branch is effectively dead; the `unwrap_err()` relies on a parse that is assumed to fail.","fix":"Either document the invariant that makes this unreachable, or replace with `input.error(\"expected path\")` to avoid the speculative `unwrap_err` if the call surface ever changes.","locations":[{"ref":"core/src/ast/data/nested_meta.rs:31-32","code":"   31 |             if segments.is_empty() {\n   32 |                 return Err(input.parse::<Ident>().unwrap_err());","lines":2}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`macros_private.rs` contains a commented-out alternative implementation of the `path!` macro (`//stringify!(...).parse().unwrap()`). Dead commented code with no explanatory value.","fix":"Remove the commented-out line.","locations":[{"ref":"core/src/macros_private.rs:1-6","code":"    1 | macro_rules! path {\n    2 |     ($($path:tt)+) => {\n    3 |         ::syn::parse_quote!($($path)+)\n    4 |         //stringify!($($path)+).parse().unwrap()\n    5 |     };\n    6 | }","lines":6}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment references `darling::util::decode_if_verbatim`, a function that does not exist anywhere in the crate (grep finds zero definitions or other references). The reader is pointed at non-existent documentation.","fix":"Remove the dangling reference or point it at the real API, `FromMeta::from_invalid_expr` (documented in core/src/from_meta.rs).","locations":[{"ref":"core/src/ast/data/nested_meta.rs:112","code":"  112 |             // For more details, see docs of `darling::util::decode_if_verbatim`","lines":1}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment says the verbatim tokens are parsed into the user's `FromMeta::from_verbatim`, but no such method exists. The actual method is `FromMeta::from_invalid_expr` (see core/src/from_meta.rs:218). The wrong method name will mislead anyone trying to implement the hook.","fix":"Change `FromMeta::from_verbatim` to `FromMeta::from_invalid_expr`.","locations":[{"ref":"core/src/ast/data/nested_meta.rs:134","code":"  134 |                 // We'll then parse this into user's custom implementation of `FromMeta::from_verbatim`,","lines":1}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment 'This is NOT mutable, as it will be declared mutable only temporarily' is stale and contradicts the code directly below it. The variable is emitted as `let mut #ident`, i.e. it IS declared mutable, unconditionally. The comment dates back to a version where mutability was conditional (`let #mutable #ident`) and no longer describes the code, so it actively misleads readers.","fix":"Delete the comment, or replace it with an accurate note such as `// Accumulates all values; declared mut because items are pushed during the parse loop.`","locations":[{"ref":"core/src/codegen/field.rs:96-98","code":"   96 |         tokens.append_all(if field.multiple {\n   97 |             // This is NOT mutable, as it will be declared mutable only temporarily.\n   98 |             quote!(let mut #ident: #ty = _darling::export::Default::default();)","lines":3}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `flatten`/`into_vec` claims child diagnostics on `self` are cloned down to all contained errors, but this cloning only happens at the `ErrorKind::Multiple` level inside `into_vec`. For a single (non-Multiple) error wrapped via `flatten` -> `multiple` -> `into_vec`, the children stay on the single error and are never propagated to nested levels because there are none - fine. The subtle issue: `into_vec` clones `self.children` to each child BEFORE recursing, but the recursion `error.into_vec()` runs on an error that already had the parent children extended, so for 3+ levels of nesting the grandparent's children get duplicated at each level. Verify whether double-attachment of the same child diagnostic across nesting levels is intended.","fix":"If duplicate child diagnostics across nesting levels are not desired, dedupe or attach children only at the leaf level rather than re-extending at every recursion step.","locations":[{"ref":"core/src/error/mod.rs:374-399","code":"  374 |     fn into_vec(self) -> Vec<Self> {\n  375 |         if let ErrorKind::Multiple(errors) = self.kind {\n  376 |             let locations = self.locations;\n  377 | \n  378 |             #[cfg(feature = \"diagnostics\")]\n  379 |             let children = self.children;\n  380 | \n  381 |             errors\n  382 |                 .into_iter()\n  383 |                 .flat_map(|error| {\n  384 |                     // This is mutated if the diagnostics feature is enabled\n  385 |                     #[allow(unused_mut)]\n  386 |                     let mut error = error.prepend_at(locations.clone());\n  387 | \n  388 |                     // Any child diagnostics in `self` are cloned down to all the distinct\n  389 |                     // errors contained in `self`.\n  390 |                     #[cfg(feature = \"diagnostics\")]\n  391 |                     error.children.extend(children.iter().cloned());\n  392 | \n  393 |                     error.into_vec()\n  394 |                 })\n  395 |                 .collect()\n  396 |         } else {\n  397 |             vec![self]\n  398 |         }\n  399 |     }","lines":26},{"ref":"core/src/error/mod.rs:365-372","code":"  365 |     /// Recursively converts a tree of errors to a flattened list.\n  366 |     ///\n  367 |     /// # Child Diagnostics\n  368 |     /// If the `diagnostics` feature is enabled, any child diagnostics on `self`\n  369 |     /// will be cloned down to all the errors within `self`.\n  370 |     pub fn flatten(self) -> Self {\n  371 |         Error::multiple(self.into_vec())\n  372 |     }","lines":8}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `checkpoint` doc says the success case returns the accumulator 'for future use', but the in-body comment then explains it actually creates a FRESH accumulator after consuming the old one via `finish`. The public rustdoc example and `# Drop Behavior` are correct, but the body comment phrase 'return the Accumulator for future use' contradicts the doc's actual statement, which could confuse maintainers.","fix":"Reword the in-body comment to match reality: the old accumulator is consumed by `finish`, and a brand-new empty (armed) accumulator is returned.","locations":[{"ref":"core/src/error/mod.rs:924-930","code":"  924 |     pub fn checkpoint(self) -> Result<Accumulator> {\n  925 |         // The doc comment says on success we \"return the Accumulator for future use\".\n  926 |         // Actually, we have consumed it by feeding it to finish so we make a fresh one.\n  927 |         // This is OK since by definition of the success path, it was empty on entry.\n  928 |         self.finish()?;\n  929 |         Ok(Self::default())\n  930 |     }","lines":7}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The `extract_option` module doc claims the functions return `Ok` only when the type is a `Type::Path` with a single generic argument whose last path segment is `Option`. The implementation additionally rejects paths with a `qself` (`path.qself.is_some()`), which the prose omits, so the documented contract is incomplete.","fix":"Update the module doc to mention that qualified-self paths (`<T as Trait>::Option<...>`) are also rejected.","locations":[{"ref":"core/src/util/extract_option.rs:20-21","code":"   20 | //! These functions will return `Ok` if the given [`Type`] is a [`Type::Path`], with a single generic\n   21 | //! argument, and the last path segment is `\"Option\"`","lines":2},{"ref":"core/src/util/extract_option.rs:55-57","code":"   55 |     if path.qself.is_some() {\n   56 |         return Err(err());\n   57 |     }","lines":3}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment says 'we use the local variable `len` here' but the generated/used variable is named `__len` (see the `quote!(... __len ...)` immediately below and the `let __len = #ident.len();` in the multiple-arm). The variable name in the prose is wrong.","fix":"Change 'the local variable `len`' to 'the local variable `__len`' in the comment.","locations":[{"ref":"core/src/codegen/field.rs:169-172","code":"  169 |             // we use the local variable `len` here because location is accessed via\n  170 |             // a closure, and the borrow checker gets very unhappy if we try to immutably\n  171 |             // borrow `#ident` in that closure when it was declared `mut` outside.\n  172 |             quote!(&format!(\"{}[{}]\", #name_str, __len))","lines":4}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment 'Calls `FromMeta::<#ty>::from_none()` if the `#ty` implements `FromMeta`. if it doesn't, evaluates to an `Option`.' is inaccurate: there is no such turbofish call, the dispatch is done via autoref specialization (`(&PhantomData::<#ty>).tag().from_none()`), and the result is always an `Option` regardless of whether the type implements FromMeta. The phrasing misdescribes the mechanism.","fix":"Reword to describe the autoref-specialization dispatch: it evaluates to `<#ty as FromMeta>::from_none()` when `#ty: FromMeta`, otherwise to `None`, always yielding `Option<#ty>`.","locations":[{"ref":"core/src/codegen/from_none.rs:3-4","code":"    3 | /// Calls `FromMeta::<#ty>::from_none()` if the `#ty` implements `FromMeta`.\n    4 | /// if it doesn't, evaluates to an `Option`.","lines":2}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Typos in module/struct doc comments: `expensive compilation taks` (should be `task`) and `unhelful` (should be `unhelpful`).","fix":"Fix the typos: `taks` -> `task`, `unhelful` -> `unhelpful`.","locations":[{"ref":"core/src/error/mod.rs:37","code":"   37 | /// deserialization, and it happens in the context of an expensive compilation taks.","lines":1},{"ref":"core/src/error/mod.rs:951","code":"  951 |         // otherwise we end up with an unhelful \"thread panicked while panicking. aborting.\" message","lines":1}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on the `map!` macro states \"Its size will always be exactly nested.len(), since otherwise >=1 field had a problem and the entire map is dropped\" (lines 927-929) and that `seen_keys` is sized `with_capacity($nested.len())`. With duplicate keys present, the map's final size is strictly less than `nested.len()` even in code paths, and the success case only reaches `errors.finish_with(map)` returning `Ok` when there were no duplicates/errors. The comment's phrasing (\"always be exactly nested.len()\") is misleading because the in-progress `map` can legitimately be smaller than `nested.len()` whenever duplicates exist; the guarantee only holds for the returned `Ok` map. Minor doc imprecision.","fix":"Clarify the 2}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The `let __default: Self = _darling::export::From::from(#input.ident.clone());` default block for the `from_ident` case is duplicated verbatim across four impl generators. Each also duplicates the surrounding `if self.from_ident { ... } else { self.base.fallback_decl() }` shape. This is repeated copy-paste that should be factored into a shared helper to avoid divergence.","fix":"Add a helper (e.g. a method on TraitImpl or a free fn taking `from_ident: bool` and the input token stream) that returns the default-declaration TokenStream, and call it from all four generators.","locations":[{"ref":"core/src/codegen/from_derive_impl.rs:113-117","code":"  113 |         let default = if self.from_ident {\n  114 |             quote!(let __default: Self = _darling::export::From::from(#input.ident.clone());)\n  115 |         } else {\n  116 |             self.base.fallback_decl()\n  117 |         };","lines":5},{"ref":"core/src/codegen/from_field.rs:35-39","code":"   35 |         let default = if self.from_ident {\n   36 |             quote!(let __default: Self = _darling::export::From::from(#input.ident.clone());)\n   37 |         } else {\n   38 |             self.base.fallback_decl()\n   39 |         };","lines":5},{"ref":"core/src/codegen/from_variant_impl.rs:54-58","code":"   54 |         let default = if self.from_ident {\n   55 |             quote!(let __default: Self = _darling::export::From::from(#input.ident.clone());)\n   56 |         } else {\n   57 |             self.base.fallback_decl()\n   58 |         };","lines":5},{"ref":"core/src/codegen/from_type_param.rs:28-32","code":"   28 |         let default = if self.from_ident {\n   29 |             quote!(let __default: Self = _darling::export::From::from(#input.ident.clone());)\n   30 |         } else {\n   31 |             self.base.fallback_decl()\n   32 |         };","lines":5}]},{"id":"DUP_2","t
