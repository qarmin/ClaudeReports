<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"onActivityResult forwards the result of the MainActivity image picker to handleImage(resultData) whenever resultCode == RESULT_OK and resultData != null, but handleImage does `uri = intent.data!!`. If the picker returns OK with a null data Uri, the !! throws a NullPointerException and crashes the activity.","fix":"Guard against null data: in onActivityResult check resultData.data != null before calling handleImage, or make handleImage handle a null Uri gracefully (toast unknown_file_location and finish).","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/SetWallpaperActivity.kt:68-77","code":"   68 |     override fun onActivityResult(requestCode: Int, resultCode: Int, resultData: Intent?) {\n   69 |         if (requestCode == PICK_IMAGE) {\n   70 |             if (resultCode == RESULT_OK && resultData != null) {\n   71 |                 handleImage(resultData)\n   72 |             } else {\n   73 |                 finish()\n   74 |             }\n   75 |         }\n   76 |         super.onActivityResult(requestCode, resultCode, resultData)\n   77 |     }","lines":10},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/SetWallpaperActivity.kt:90-96","code":"   90 |     private fun handleImage(intent: Intent) {\n   91 |         uri = intent.data!!\n   92 |         if (uri.scheme != \"file\" && uri.scheme != \"content\") {\n   93 |             toast(R.string.unknown_file_location)\n   94 |             finish()\n   95 |             return\n   96 |         }","lines":7}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"If fileDataSource.open(dataSpec) throws, the exception is caught and only a toast is shown, then execution continues. fileDataSource.uri will be null after a failed open, so fileDataSource.uri!! on the next line throws NullPointerException and crashes the activity instead of failing gracefully.","fix":"Return early after showErrorToast(e) (e.g. finish() / return) when open() fails, or null-check fileDataSource.uri before using it.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/VideoPlayerActivity.kt:370-381","code":"  370 |     private fun initExoPlayer() {\n  371 |         val dataSpec = DataSpec(mUri!!)\n  372 |         val fileDataSource = ContentDataSource(applicationContext)\n  373 |         try {\n  374 |             fileDataSource.open(dataSpec)\n  375 |         } catch (e: Exception) {\n  376 |             showErrorToast(e)\n  377 |         }\n  378 | \n  379 |         val factory = DataSource.Factory { fileDataSource }\n  380 |         val mediaSource: MediaSource = ProgressiveMediaSource.Factory(factory)\n  381 |             .createMediaSource(MediaItem.fromUri(fileDataSource.uri!!))","lines":12}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"scheduleSwipe() force-unwraps getCurrentMedium()!! and force-casts (getCurrentFragment() as? VideoFragment)!!. Both can be null: getCurrentMedium() returns null when the media list is empty or mPos == -1, and getCurrentFragment() can return null if the adapter is not yet attached or returns a non-VideoFragment. This is called from onPageSelected and after the slideshow delay, so a transient state (e.g. media just deleted, fragment not yet created) crashes the activity with NPE.","fix":"Capture the medium in a local and return early if null. Use the safe cast result: (getCurrentFragment() as? VideoFragment)?.playVideo(). Avoid !! on both expressions.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/ViewPagerActivity.kt:723-736","code":"  723 |     private fun scheduleSwipe() {\n  724 |         mSlideshowHandler.removeCallbacksAndMessages(null)\n  725 |         if (mIsSlideshowActive) {\n  726 |             if (getCurrentMedium()!!.isImage() || getCurrentMedium()!!.isGIF() || getCurrentMedium()!!.isPortrait()) {\n  727 |                 mSlideshowHandler.postDelayed({\n  728 |                     if (mIsSlideshowActive && !isDestroyed) {\n  729 |                         swipeToNextMedium()\n  730 |                     }\n  731 |                 }, mSlideshowInterval * 1000L)\n  732 |             } else {\n  733 |                 (getCurrentFragment() as? VideoFragment)!!.playVideo()\n  734 |             }\n  735 |         }\n  736 |     }","lines":14}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"applyFilter dereferences filterInitialBitmap!! with !!. filterInitialBitmap is only set in the Glide onResourceReady callback. applyFilter is invoked from the filter list adapter click and from an onGlobalLayout callback; if the bitmap load failed or has not completed, the !! throws NPE. The async ordering makes this reachable.","fix":"Null-check filterInitialBitmap and bail out (or reload) instead of using !!.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/EditActivity.kt:754-757","code":"  754 |     private fun applyFilter(filterItem: FilterItem) {\n  755 |         val newBitmap = Bitmap.createBitmap(filterInitialBitmap!!)\n  756 |         binding.defaultImageView.setImageBitmap(filterItem.filter.processFilter(newBitmap))\n  757 |     }","lines":4}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"fillExtraOutput dereferences several nullable values with !! based on assumptions that can fail. resultData.data!!.path!! crashes if the result intent has no data Uri or the Uri has no path; intent.extras!! crashes if there are no extras even though the caller only checked containsKey via intent.extras?.containsKey(...)==true (that check returns false for null extras, so this specific path is guarded, but the data!!/path!! on the incoming resultData is attacker/third-party controlled and unguarded). A malformed pick result would crash the app.","fix":"Null-check resultData.data and its path before constructing the File, returning gracefully (or showing an error toast) instead of using !!.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:1020-1028","code":" 1020 |     private fun fillExtraOutput(resultData: Intent): Uri? {\n 1021 |         val file = File(resultData.data!!.path!!)\n 1022 |         var inputStream: InputStream? = null\n 1023 |         var outputStream: OutputStream? = null\n 1024 |         try {\n 1025 |             val output = intent.extras!!.get(MediaStore.EXTRA_OUTPUT) as Uri\n 1026 |             inputStream = FileInputStream(file)\n 1027 |             outputStream = contentResolver.openOutputStream(output)\n 1028 |             inputStream.copyTo(outputStream!!)","lines":9}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"fillPickedPaths uses resultData.extras!! and getStringArrayList(PICKED_PATHS)!! then removeAt(0). If the extra is present but the list is empty, uris.removeAt(0) throws IndexOutOfBoundsException. The caller only checked containsKey(PICKED_PATHS), not that the list is non-empty, so an empty PICKED_PATHS list crashes the app.","fix":"Check that the paths list is non-empty before calling removeAt(0); return early or show an error if empty.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:1041-1049","code":" 1041 |     private fun fillPickedPaths(resultData: Intent, resultIntent: Intent) {\n 1042 |         val paths = resultData.extras!!.getStringArrayList(PICKED_PATHS)\n 1043 |         val uris = paths!!\n 1044 |             .map { getFilePublicUri(File(it), BuildConfig.APPLICATION_ID) } as ArrayList\n 1045 |         val clipData = ClipData(\n 1046 |             \"Attachment\",\n 1047 |             arrayOf(\"image/*\", \"video/*\"),\n 1048 |             ClipData.Item(uris.removeAt(0))\n 1049 |         )","lines":9}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"fillIntentPath can crash on a null data Uri. When data.toString() does not start with \"/\", path is computed as data!!.path; if resultData.data is null, data.toString() yields the string \"null\" (not starting with \"/\"), so the code falls into data!!.path and throws NPE. Then File(path!!) also assumes a non-null path. This is reachable from third-party intent results.","fix":"Guard against null data/path explicitly and bail out (or toast) instead of relying on !! and on data.toString() never being the literal \"null\".","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:1059-1062","code":" 1059 |     private fun fillIntentPath(resultData: Intent, resultIntent: Intent) {\n 1060 |         val data = resultData.data\n 1061 |         val path = if (data.toString().startsWith(\"/\")) data.toString() else data!!.path\n 1062 |         val uri = getFilePublicUri(File(path!!), BuildConfig.APPLICATION_ID)","lines":4}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"goToNextMedium and slideshowEnded dereference binding.viewPager.adapter!! to read .count. During a slideshow the adapter is normally set, but if the adapter was cleared (e.g. media deleted to empty, configuration change, or refreshViewPager racing) this !! throws NPE. The slideshow animation callbacks run on a delayed handler, so the adapter state is not guaranteed at fire time.","fix":"Use binding.viewPager.adapter?.count ?: return (or stopSlideshow()) instead of !!.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/ViewPagerActivity.kt:631-639","code":"  631 |     private fun goToNextMedium(forward: Boolean) {\n  632 |         val oldPosition = binding.viewPager.currentItem\n  633 |         val newPosition = if (forward) oldPosition + 1 else oldPosition - 1\n  634 |         if (newPosition == -1 || newPosition > binding.viewPager.adapter!!.count - 1) {\n  635 |             slideshowEnded(forward)\n  636 |         } else {\n  637 |             binding.viewPager.setCurrentItem(newPosition, false)\n  638 |         }\n  639 |     }","lines":9},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/ViewPagerActivity.kt:695-706","code":"  695 |     private fun slideshowEnded(forward: Boolean) {\n  696 |         if (config.loopSlideshow) {\n  697 |             if (forward) {\n  698 |                 binding.viewPager.setCurrentItem(0, false)\n  699 |             } else {\n  700 |                 binding.viewPager.setCurrentItem(binding.viewPager.adapter!!.count - 1, false)\n  701 |             }\n  702 |         } else {\n  703 |             stopSlideshow()\n  704 |             toast(R.string.slideshow_ended)\n  705 |         }\n  706 |     }","lines":12}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"moveSelectedItemsToTop()/moveSelectedItemsToBottom() compute position via dirs.indexOfFirst { it.path.hashCode() == key } and then immediately index dirs[position] and dirs.removeAt(position). If a selected key no longer maps to any directory (e.g. dirs was updated/filtered while the key remained in selectedKeys), indexOfFirst returns -1 and dirs[-1]/removeAt(-1) throws IndexOutOfBoundsException.","fix":"Guard each iteration: skip when position < 0 (e.g. if (position == -1) return@forEach) before using it.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/DirectoryAdapter.kt:270-290","code":"  270 |     private fun moveSelectedItemsToTop() {\n  271 |         selectedKeys.toMutableList().reversed().forEach { key ->\n  272 |             val position = dirs.indexOfFirst { it.path.hashCode() == key }\n  273 |             val tempItem = dirs[position]\n  274 |             dirs.removeAt(position)\n  275 |             dirs.add(0, tempItem)\n  276 |         }\n  277 | \n  278 |         notifyDataSetChanged()\n  279 |     }\n  280 | \n  281 |     private fun moveSelectedItemsToBottom() {\n  282 |         selectedKeys.forEach { key ->\n  283 |             val position = dirs.indexOfFirst { it.path.hashCode() == key }\n  284 |             val tempItem = dirs[position]\n  285 |             dirs.removeAt(position)\n  286 |             dirs.add(dirs.size, tempItem)\n  287 |         }\n  288 | \n  289 |         notifyDataSetChanged()\n  290 |     }","lines":21}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"currentSelection is initialized in a property initializer as filterItems.first(), which throws NoSuchElementException if the adapter is ever constructed with an empty filter list. Adapters are commonly built before data is guaranteed non-empty.","fix":"Use filterItems.firstOrNull() and make currentSelection nullable, or guarantee/assert non-empty input with a clear error.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/FiltersAdapter.kt:15-15","code":"   15 |     private var currentSelection = filterItems.first()","lines":1}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"onChange() increments realIndex when the item at the given position is a section title, then indexes media[realIndex] directly (not getOrNull). If a ThumbnailSection is the last element of the list, realIndex equals media.size and media[realIndex] throws IndexOutOfBoundsException. A trailing section header is normally not produced, but any future grouping change or an empty-after-section state makes this an unchecked crash. The cast to Medium is null-safe but the index access is not.","fix":"Use media.getOrNull(realIndex) as? Medium instead of media[realIndex], returning \"\" on null.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/MediaAdapter.kt:771-778","code":"  771 |     override fun onChange(position: Int): String {\n  772 |         var realIndex = position\n  773 |         if (isASectionTitle(position)) {\n  774 |             realIndex++\n  775 |         }\n  776 | \n  777 |         return (media[realIndex] as? Medium)?.getBubbleText(sorting, activity, dateFormat, timeFormat) ?: \"\"\n  778 |     }","lines":8}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"addParentWithoutMediaFiles computes max(1000L, into.maxOf { it.id ?: 0L }). maxOf throws NoSuchElementException on an empty collection. While callers usually pass non-empty lists, this is a latent crash if 'into' is ever empty, and the value newDirId is only used inside the subDirs.isNotEmpty() branch making the eager computation unnecessary.","fix":"Move the newDirId computation inside the 'if (subDirs.isNotEmpty())' block and use maxOfOrNull { it.id ?: 0L } ?: 0L.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Context.kt:298-299","code":"  298 |     val subDirs = into.filter { File(it.path).parent.equals(path, true) } as ArrayList<Directory>\n  299 |     val newDirId = max(1000L, into.maxOf { it.id ?: 0L })","lines":2}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"getNoMediaFoldersSync adds noMediaFile.parent to an ArrayList<String>. File.parent is a Kotlin platform type (String!) and is null when the path has no parent. Although unlikely for a real NOMEDIA file, a null parent would be added to the list (or throw on a non-null context), and downstream consumers treat entries as non-null. The surrounding catch swallows any resulting exception silently.","fix":"Use noMediaFile.parent?.let { folders.add(it) } to guard the nullable parent.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Context.kt:511-518","code":"  511 |                 val path = cursor.getStringValue(Files.FileColumns.DATA) ?: continue\n  512 |                 val noMediaFile = File(path)\n  513 |                 if (\n  514 |                     getDoesFilePathExist(noMediaFile.absolutePath, OTGPath)\n  515 |                     && noMediaFile.name == NOMEDIA\n  516 |                 ) {\n  517 |                     folders.add(noMediaFile.parent)\n  518 |                 }","lines":8}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"onCreateView accesses arguments.getSerializable(MEDIUM) as Medium (and similar requireArguments / non-null casts) without null safety; if arguments are missing or the cast fails the fragment crashes. More concretely, several methods use mExoPlayer!! / mExoPlayer non-null assumptions right after null checks that are not atomic with respect to release on another lifecycle callback, but the clearer issue is the unchecked 'as Medium' serializable cast which throws ClassCastException/NPE if the bundle lacks the key.","fix":"Use a null-safe retrieval (getSerializable(MEDIUM) as? Medium) and bail out / show error if null, rather than an unchecked cast.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/VideoFragment.kt:170","code":"  170 |         mMedium = arguments.getSerializable(MEDIUM) as Medium","lines":1},{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/PhotoFragment.kt:155","code":"  155 |         mMedium = arguments.getSerializable(MEDIUM) as Medium","lines":1}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"init() force-unwraps the InputStream with inputStream!!. If contentResolver.openInputStream(newUri) returns null (provider returns no stream, file gone, permission revoked), this throws NullPointerException rather than surfacing a handleable error to the SubsamplingScaleImageView.","fix":"Null-check the stream and throw a descriptive IOException (or return gracefully) instead of !!.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/helpers/PicassoRegionDecoder.kt:17-22","code":"   17 |     override fun init(context: Context, uri: Uri): Point {\n   18 |         val newUri = Uri.parse(uri.toString().replace(\"%\", \"%25\").replace(\"#\", \"%23\"))\n   19 |         val inputStream = context.contentResolver.openInputStream(newUri)\n   20 |         decoder = BitmapRegionDecoder.newInstance(inputStream!!, false)\n   21 |         return Point(decoder!!.width, decoder!!.height)\n   22 |     }","lines":6}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"recycle() dereferences decoder with !!. If init() failed/threw (e.g. openInputStream returned null and the !! on line 20 already crashed, or newInstance threw) or recycle() is called before init(), decoder is null and this throws NullPointerException. isReady() guards with a null check but recycle() does not.","fix":"Use decoder?.recycle() (and set decoder = null afterwards).","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/helpers/PicassoRegionDecoder.kt:45-47","code":"   45 |     override fun recycle() {\n   46 |         decoder!!.recycle()\n   47 |     }","lines":3}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"hasNavBar uses windowManager.defaultDisplay, which is deprecated and returns null on some configurations/contexts (e.g. when the Activity is not attached to a display). A null defaultDisplay would NPE on getRealMetrics. No null guard is present.","fix":"Prefer context.display (R+) or WindowMetrics via WindowManager#getCurrentWindowMetrics, and null-guard the legacy path.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Activity.kt:543-553","code":"  543 | fun Activity.hasNavBar(): Boolean {\n  544 |     val display = windowManager.defaultDisplay\n  545 | \n  546 |     val realDisplayMetrics = DisplayMetrics()\n  547 |     display.getRealMetrics(realDisplayMetrics)\n  548 | \n  549 |     val displayMetrics = DisplayMetrics()\n  550 |     display.getMetrics(displayMetrics)\n  551 | \n  552 |     return (realDisplayMetrics.widthPixels - displayMetrics.widthPixels > 0) || (realDisplayMetrics.heightPixels - displayMetrics.heightPixels > 0)\n  553 | }","lines":11}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"fixDateTaken calls formatter.parse(dateTime).time. SimpleDateFormat.parse returns null (or throws ParseException) on unparseable EXIF date strings, so .time would NPE. It is inside a per-path try that continues on exception, so impact is limited to skipping that file, but the null path is silently funnelled into the generic catch rather than handled.","fix":"Use formatter.parse(dateTime)?.time ?: continue to skip cleanly without relying on the catch.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Activity.kt:584-585","code":"  584 |                     val formatter = SimpleDateFormat(format, Locale.getDefault())\n  585 |                     val timestamp = formatter.parse(dateTime).time","lines":2}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"createDirectoryFromMedia forces thumbnail!! at multiple points (lines 1258, 1259, 1286). thumbnail is assigned \"\" (empty) when no cover/media is found, never staying null, so the !! does not crash today; but the non-null assertions are fragile - any future path that leaves thumbnail null (e.g. an early-return refactor) would crash. The code relies on an implicit invariant rather than a safe call.","fix":"Declare thumbnail as a non-null var initialised to \"\" and assign concrete strings, removing the !! operators entirely.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Context.kt:1253-1260","code":" 1253 |     if (thumbnail == null) {\n 1254 |         val sortedMedia = grouped.filter { it is Medium }.toMutableList() as ArrayList<Medium>\n 1255 |         thumbnail = sortedMedia.firstOrNull { getDoesFilePathExist(it.path, OTGPath) }?.path ?: \"\"\n 1256 |     }\n 1257 | \n 1258 |     if (config.OTGPath.isNotEmpty() && thumbnail!!.startsWith(config.OTGPath)) {\n 1259 |         thumbnail = thumbnail!!.getOTGPublicPath(applicationContext)\n 1260 |     }","lines":8}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"resolveUriScheme dereferences uri.path!! for the 'file' scheme. A malformed file:// uri with a null path would throw NPE. The caller-supplied uri is not validated here.","fix":"Use uri.path?.let(onPath) ?: onUnknown() instead of forcing with !!.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Context.kt:1424-1428","code":" 1424 |     when (uri.scheme) {\n 1425 |         \"file\" -> onPath(uri.path!!)\n 1426 |         \"content\" -> onContentUri(uri)\n 1427 |         else -> onUnknown()\n 1428 |     }","lines":5}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The touch-hold runnable dereferences mView.parent without a null check. If the runnable fires (500ms delay) after the view has been detached from its parent (e.g. fragment paused/destroyed, page swiped), mView.parent is null and requestDisallowInterceptTouchEvent throws NPE. The handler callbacks are removed on many paths but not guaranteed to be removed before detach in all lifecycle transitions.","fix":"Guard with mView.parent?.requestDisallowInterceptTouchEvent(true) and bail out early if the fragment is no longer added (isAdded).","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/VideoFragment.kt:134-143","code":"  134 |     private val mTouchHoldRunnable = Runnable {\n  135 |         mView.parent.requestDisallowInterceptTouchEvent(true)\n  136 |         // This code runs after the delay, only if the user is still holding down.\n  137 |         mIsLongPressActive = true\n  138 |         mOriginalPlaybackSpeed = mExoPlayer?.playbackParameters?.speed ?: mConfig.playbackSpeed\n  139 |         mView.performHapticFeedback(HapticFeedbackConstants.LONG_PRESS)\n  140 |         updatePlaybackSpeed(TOUCH_HOLD_SPEED_MULTIPLIER)\n  141 | \n  142 |         mPlaybackSpeedPill.fadeIn()\n  143 |     }","lines":10}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"MediaSideScroll uses activity!! in volumePercentChanged, brightnessPercentChanged and getCurrentBrightness. These run from onTouchEvent which only early-returns when (mPassTouches && activity == null). If activity is null but mPassTouches is false (e.g. view touched before initialize() set activity, or after the activity reference path), the !! assertions throw NPE. The guard condition couples two unrelated booleans.","fix":"Guard onTouchEvent with a plain 'if (activity == null) return false' and use safe calls instead of !! in the percent-changed methods.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/views/MediaSideScroll.kt:84-87","code":"   84 |     override fun onTouchEvent(event: MotionEvent): Boolean {\n   85 |         if (mPassTouches && activity == null) {\n   86 |             return false\n   87 |         }","lines":4},{"ref":"app/src/main/kotlin/org/fossify/gallery/views/MediaSideScroll.kt:144-150","code":"  144 |     private fun getCurrentBrightness(): Int {\n  145 |         return try {\n  146 |             Settings.System.getInt(activity!!.contentResolver, Settings.System.SCREEN_BRIGHTNESS)\n  147 |         } catch (e: Settings.SettingNotFoundException) {\n  148 |             70\n  149 |         }\n  150 |     }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/gallery/views/MediaSideScroll.kt:160-193","code":"  160 |     private fun volumePercentChanged(percent: Int) {\n  161 |         val stream = AudioManager.STREAM_MUSIC\n  162 |         val maxVolume = max(activity!!.audioManager.getStreamMaxVolume(stream), 1)\n  163 |         val addPoints = ((percent / 100f) * maxVolume).toInt()\n  164 |         val newVolume = (mTouchDownValue + addPoints).coerceIn(0, maxVolume)\n  165 |         activity!!.audioManager.setStreamVolume(stream, newVolume, 0)\n  166 | \n  167 |         val absolutePercent = ((newVolume / maxVolume.toFloat()) * 100).toInt()\n  168 |         showValue(absolutePercent)\n  169 | \n  170 |         mSlideInfoFadeHandler.removeCallbacksAndMessages(null)\n  171 |         mSlideInfoFadeHandler.postDelayed({\n  172 |             slideInfoView.animate().alpha(0f)\n  173 |         }, SLIDE_INFO_FADE_DELAY)\n  174 |     }\n  175 | \n  176 |     private fun brightnessPercentChanged(percent: Int) {\n  177 |         val maxBrightness = 255f\n  178 |         var newBrightness = (mTouchDownValue + 2.55 * percent).toFloat()\n  179 |         newBrightness = Math.min(maxBrightness, Math.max(0f, newBrightness))\n  180 |         mTempBrightness = newBrightness.toInt()\n  181 | \n  182 |         val absolutePercent = ((newBrightness / maxBrightness) * 100).toInt()\n  183 |         showValue(absolutePercent)\n  184 | \n  185 |         val attributes = activity!!.window.attributes\n  186 |         attributes.screenBrightness = absolutePercent / 100f\n  187 |         activity!!.window.attributes = attributes\n  188 | \n  189 |         mSlideInfoFadeHandler.removeCallbacksAndMessages(null)\n  190 |         mSlideInfoFadeHandler.postDelayed({\n  191 |             slideInfoView.animate().alpha(0f)\n  192 |         }, SLIDE_INFO_FADE_DELAY)\n  193 |     }","lines":34}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","easy":false,"description":"SplashActivity migration: on first non-zero run it sets config.wereFavoritesMigrated = true BEFORE the background migration (reading mediaDB.getFavorites and inserting into favoritesDB) completes. If the process is killed during the background thread, wereFavoritesMigrated is already persisted true, so the migration is permanently skipped on next launch and favorites are silently lost.","fix":"Set wereFavoritesMigrated = true only after favoritesDB.insertAll succeeds (inside the background thread, before runOnUiThread), so an interrupted migration retries on next launch.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/SplashActivity.kt:21-35","code":"   21 |             } else {\n   22 |                 config.wereFavoritesMigrated = true\n   23 |                 ensureBackgroundThread {\n   24 |                     val favorites = ArrayList<Favorite>()\n   25 |                     val favoritePaths = mediaDB.getFavorites().map { it.path }.toMutableList() as ArrayList<String>\n   26 |                     favoritePaths.forEach {\n   27 |                         favorites.add(getFavoriteFromPath(it))\n   28 |                     }\n   29 |                     favoritesDB.insertAll(favorites)\n   30 | \n   31 |                     runOnUiThread {\n   32 |                         launchActivity()\n   33 |                     }\n   34 |                 }\n   35 |             }","lines":15}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In parseFileChannel, when a 'uuid' box is encountered a raw FileInputStream is opened but never closed. The function returns (or an exception is caught by the outer try) without closing fis, leaking a file descriptor on every parsed video that contains a uuid box. There is no finally/use{} around it.","fix":"Wrap the FileInputStream in a use{} block (FileInputStream(File(path)).use { fis -> ... }) so it is closed on all exit paths.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Context.kt:1160-1183","code":" 1160 |             if (type == \"uuid\") {\n 1161 |                 val fis = FileInputStream(File(path))\n 1162 |                 fis.skip(begin)\n 1163 | \n 1164 |                 val sb = StringBuilder()\n 1165 |                 val buffer = ByteArray(1024)\n 1166 |                 while (sb.length < size) {\n 1167 |                     val n = fis.read(buffer)\n 1168 |                     if (n != -1) {\n 1169 |                         sb.append(String(buffer, 0, n))\n 1170 |                     } else {\n 1171 |                         break\n 1172 |                     }\n 1173 |                 }\n 1174 | \n 1175 |                 val xmlString = sb.toString().lowercase(Locale.getDefault())\n 1176 |                 if (\n 1177 |                     xmlString.contains(\"gspherical:projectiontype>equirectangular\")\n 1178 |                     || xmlString.contains(\"gspherical:projectiontype=\\\"equirectangular\\\"\")\n 1179 |                 ) {\n 1180 |                     callback.invoke()\n 1181 |                 }\n 1182 |                 return\n 1183 |             }","lines":24}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"Several Bitmaps decoded for editing/sharing are never recycled. getOriginalBitmap() returns a full-size bitmap that is filtered in place and handed off (share/save) but never recycled; applyFilter creates a new Bitmap.createBitmap(filterInitialBitmap!!) on each filter tap with no recycling of the previous result; filterInitialBitmap itself is held for the activity lifetime. On large images and repeated filter taps this drives heavy native memory churn and OOM risk.","fix":"Recycle intermediate bitmaps once consumed (after compress/share), and recycle filterInitialBitmap in onDestroy. Consider reusing a single working bitmap for filter previews.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/EditActivity.kt:426-432","code":"  426 |     private fun getOriginalBitmap(): Bitmap {\n  427 |         return Glide.with(applicationContext)\n  428 |             .asBitmap()\n  429 |             .load(uri)\n  430 |             .submit(Target.SIZE_ORIGINAL, Target.SIZE_ORIGINAL)\n  431 |             .get()\n  432 |     }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/EditActivity.kt:754-757","code":"  754 |     private fun applyFilter(filterItem: FilterItem) {\n  755 |         val newBitmap = Bitmap.createBitmap(filterInitialBitmap!!)\n  756 |         binding.defaultImageView.setImageBitmap(filterItem.filter.processFilter(newBitmap))\n  757 |     }","lines":4}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"mLastMediaHandler and mTempShowHiddenHandler are created with new Handler() using the default (deprecated) constructor, which binds to the current thread's Looper. More importantly, onPause removes mLastMediaHandler callbacks but onDestroy never calls mLastMediaHandler.removeCallbacksAndMessages(null); only mTempShowHiddenHandler is cleared there. A pending checkLastMediaChanged postDelayed could still fire after the activity is being torn down (it does guard with isDestroyed, but the handler/runnable chain still holds an implicit reference to the Activity until then).","fix":"Use Handler(Looper.getMainLooper()) and clear mLastMediaHandler callbacks in onDestroy as well.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:186-187","code":"  186 |     private var mLastMediaHandler = Handler()\n  187 |     private var mTempShowHiddenHandler = Handler()","lines":2},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:377-393","code":"  377 |     override fun onDestroy() {\n  378 |         super.onDestroy()\n  379 |         if (!isChangingConfigurations) {\n  380 |             config.temporarilyShowHidden = false\n  381 |             config.temporarilyShowExcluded = false\n  382 |             config.tempSkipDeleteConfirmation = false\n  383 |             config.tempSkipRecycleBin = false\n  384 |             mTempShowHiddenHandler.removeCallbacksAndMessages(null)\n  385 |             removeTempFolder()\n  386 |             unregisterFileUpdateListener()\n  387 | \n  388 |             if (!config.showAll) {\n  389 |                 mLastMediaFetcher?.shouldStop = true\n  390 |                 GalleryDatabase.destroyInstance()\n  391 |             }\n  392 |         }\n  393 |     }","lines":17}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"resizeImage opens contentResolver.openInputStream(...) into oldExif via ExifInterface(inputStream!!) but never closes that InputStream. ExifInterface does not close streams passed to it. One leaked file descriptor per resize operation.","fix":"Wrap the input stream in use{} or store and close it in a finally after ExifInterface has read its attributes.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Activity.kt:856-858","code":"  856 |     var oldExif: ExifInterface?\n  857 |     val inputStream = contentResolver.openInputStream(Uri.fromFile(File(oldPath)))\n  858 |     oldExif = ExifInterface(inputStream!!)","lines":3}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"ExoPlayer is given freshly-allocated Surface objects wrapping the TextureView's SurfaceTexture, but those Surface instances are never released via Surface.release(). A new Surface is created on initExoPlayer (setVideoSurface) and again every time the surface texture becomes available (onSurfaceTextureAvailable). Each call leaks the previously set Surface, and the player is never told to clear its video surface on release. Over many video opens/rotations/visibility toggles this leaks native graphic buffers.","fix":"Keep a reference to the created Surface, call clearVideoSurface()/release the old Surface before setting a new one, and release the Surface in releaseExoPlayer() (e.g. mExoPlayer?.setVideoSurface(null) then surface.release()).","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/VideoFragment.kt:533-535","code":"  533 |                 if (mTextureView.surfaceTexture != null) {\n  534 |                     setVideoSurface(Surface(mTextureView.surfaceTexture))\n  535 |                 }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/VideoFragment.kt:952-954","code":"  952 |     override fun onSurfaceTextureAvailable(surface: SurfaceTexture, width: Int, height: Int) {\n  953 |         mExoPlayer?.setVideoSurface(Surface(mTextureView.surfaceTexture))\n  954 |     }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/VideoFragment.kt:937-944","code":"  937 |     private fun releaseExoPlayer() {\n  938 |         mIsPlayerPrepared = false\n  939 |         mExoPlayer?.apply {\n  940 |             stop()\n  941 |             release()\n  942 |         }\n  943 |         mExoPlayer = null\n  944 |     }","lines":8}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"init() opens an InputStream via openInputStream but never closes it. BitmapRegionDecoder.newInstance(InputStream, ...) does not take ownership of and does not close the stream, so every (re)initialization of a region decoder leaks an open content-resolver InputStream/file descriptor. With many large images opened, this can exhaust file descriptors.","fix":"Wrap the stream in a use { } block (or store and close it in recycle()), e.g. context.contentResolver.openInputStream(newUri)?.use { decoder = BitmapRegionDecoder.newInstance(it, false) }.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/helpers/PicassoRegionDecoder.kt:17-22","code":"   17 |     override fun init(context: Context, uri: Uri): Point {\n   18 |         val newUri = Uri.parse(uri.toString().replace(\"%\", \"%25\").replace(\"#\", \"%23\"))\n   19 |         val inputStream = context.contentResolver.openInputStream(newUri)\n   20 |         decoder = BitmapRegionDecoder.newInstance(inputStream!!, false)\n   21 |         return Point(decoder!!.width, decoder!!.height)\n   22 |     }","lines":6}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In NewPhotoFetcher.onStartJob the cursor variable is reassigned inside the `uris.forEach` loop (one query per content URI) but the `finally` block only closes whatever cursor is referenced last. The first query's Cursor (Images.Media) is overwritten by the second iteration (Video.Media) without being closed, leaking that Cursor every time the job triggers. The loop should close each cursor before moving to the next URI (e.g. use `.use { }` per iteration).","fix":"Close each cursor inside the forEach iteration, e.g. `contentResolver.query(...).use { cursor -> while (cursor.moveToNext()) { ... } }`, instead of relying on a single shared `cursor` variable closed once in `finally`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/jobs/NewPhotoFetcher.kt:83-98","code":"   83 |                     var cursor: Cursor? = null\n   84 |                     try {\n   85 |                         val projection = arrayOf(Images.ImageColumns.DATA)\n   86 |                         val uris = arrayListOf(Images.Media.EXTERNAL_CONTENT_URI, Video.Media.EXTERNAL_CONTENT_URI)\n   87 |                         uris.forEach {\n   88 |                             cursor = contentResolver.query(it, projection, selection.toString(), null, null)\n   89 |                             while (cursor!!.moveToNext()) {\n   90 |                                 val path = cursor!!.getStringValue(Images.ImageColumns.DATA)\n   91 |                                 affectedFolderPaths.add(path.getParentPath())\n   92 |                                 addPathToDB(path)\n   93 |                             }\n   94 |                         }\n   95 |                     } catch (ignored: Exception) {\n   96 |                     } finally {\n   97 |                         cursor?.close()\n   98 |                     }","lines":16}]},{"id":"MEM_8","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"fillCanvasBackground uses Glide ... .into(width, height) to get a FutureTarget and calls builder.get(), but the FutureTarget is never cleared (Glide.with(ctx).clear(target)). FutureTargets obtained this way should be cleared to release the held resource; not doing so leaks the target/resource until GC.","fix":"Keep the FutureTarget reference and call Glide.with(applicationContext).clear(target) after retrieving the bitmap (in a finally block).","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/EditActivity.kt:345-374","code":"  345 |     private fun fillCanvasBackground() {\n  346 |         val size = Point()\n  347 |         windowManager.defaultDisplay.getSize(size)\n  348 |         val options = RequestOptions()\n  349 |             .format(DecodeFormat.PREFER_ARGB_8888)\n  350 |             .skipMemoryCache(true)\n  351 |             .diskCacheStrategy(DiskCacheStrategy.NONE)\n  352 |             .fitCenter()\n  353 | \n  354 |         try {\n  355 |             val builder = Glide.with(applicationContext)\n  356 |                 .asBitmap()\n  357 |                 .load(uri)\n  358 |                 .apply(options)\n  359 |                 .into(binding.editorDrawCanvas.width, binding.editorDrawCanvas.height)\n  360 | \n  361 |             val bitmap = builder.get()\n  362 |             runOnUiThread {\n  363 |                 binding.editorDrawCanvas.apply {\n  364 |                     updateBackgroundBitmap(bitmap)\n  365 |                     layoutParams.width = bitmap.width\n  366 |                     layoutParams.height = bitmap.height\n  367 |                     y = (height - bitmap.height) / 2f\n  368 |                     requestLayout()\n  369 |                 }\n  370 |             }\n  371 |         } catch (e: Exception) {\n  372 |             showErrorToast(e)\n  373 |         }\n  374 |     }","lines":30}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"SetWallpaperActivity.onImageCropped creates scaledBitmap via bitmap.scale(...) and passes it to wallpaperManager.setBitmap, but neither the source bitmap nor scaledBitmap is recycled afterward. For full-resolution wallpapers this leaves large bitmaps to GC pressure.","fix":"Recycle scaledBitmap (and the source bitmap if no longer needed) after setBitmap completes.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/SetWallpaperActivity.kt:156-169","code":"  156 |         ensureBackgroundThread {\n  157 |             val wantedHeight = wallpaperManager.desiredMinimumHeight\n  158 |             val ratio = wantedHeight / bitmap.height.toFloat()\n  159 |             val wantedWidth = (bitmap.width * ratio).toInt()\n  160 |             try {\n  161 |                 val scaledBitmap = bitmap.scale(wantedWidth, wantedHeight)\n  162 |                 wallpaperManager.setBitmap(scaledBitmap, null, true, wallpaperFlag)\n  163 |                 setResult(RESULT_OK)\n  164 |             } catch (ignored: OutOfMemoryError) {\n  165 |                 toast(org.fossify.commons.R.string.out_of_memory_error)\n  166 |                 setResult(RESULT_CANCELED)\n  167 |             }\n  168 |             finish()\n  169 |         }","lines":14}]},{"id":"MEM_10","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"SimpleActivity registers two ContentObservers via registerFileUpdateListener but unregisterFileUpdateListener is not called from any lifecycle method in this base class; it is the subclass's responsibility (MainActivity calls it in onDestroy). Any subclass that calls registerFileUpdateListener without unregistering leaks the observer (and the Activity via the anonymous ContentObserver). The pairing is implicit and easy to get wrong.","fix":"Tie unregister to the activity lifecycle in the base class (e.g. unregister in onDestroy) or use a LifecycleObserver so registration always has a matching unregister.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/SimpleActivity.kt:78-91","code":"   78 |     protected fun registerFileUpdateListener() {\n   79 |         try {\n   80 |             contentResolver.registerContentObserver(Images.Media.EXTERNAL_CONTENT_URI, true, observer)\n   81 |             contentResolver.registerContentObserver(Video.Media.EXTERNAL_CONTENT_URI, true, observer)\n   82 |         } catch (ignored: Exception) {\n   83 |         }\n   84 |     }\n   85 | \n   86 |     protected fun unregisterFileUpdateListener() {\n   87 |         try {\n   88 |             contentResolver.unregisterContentObserver(observer)\n   89 |         } catch (ignored: Exception) {\n   90 |         }\n   91 |     }","lines":14},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/SimpleActivity.kt:25-36","code":"   25 |     private val observer = object : ContentObserver(null) {\n   26 |         override fun onChange(selfChange: Boolean, uri: Uri?) {\n   27 |             super.onChange(selfChange, uri)\n   28 |             if (uri != null) {\n   29 |                 val path = getRealPathFromURI(uri)\n   30 |                 if (path != null) {\n   31 |                     updateDirectoryPath(path.getParentPath())\n   32 |                     addPathToDB(path)\n   33 |                 }\n   34 |             }\n   35 |         }\n   36 |     }","lines":12}]},{"id":"MEM_11","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"mOriginalBrightness is set in onResume via window.updateBrightness, but onPause/onDestroy never restore the original brightness. The screen brightness override (config.maxBrightness) therefore persists when the activity is paused but still visible, and is only undone implicitly when the window is destroyed. This is an effective resource/state leak of the brightness window attribute across the activity lifecycle.","fix":"Restore brightness in on src/main/kotlin/org/fossify/gallery/adapters/PortraitPhotosAdapter.kt:21-21","code":"   21 |     var views = HashMap<Int, View>()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/PortraitPhotosAdapter.kt:73-79","code":"   73 |                 if (photo.isNotEmpty()) {\n   74 |                     root.isClickable = true\n   75 |                     views[position] = root\n   76 |                     root.setOnClickListener {\n   77 |                         itemClick(position, root.x.toInt())\n   78 |                         setCurrentPhoto(position)\n   79 |                     }","lines":7}]},{"id":"MEM_13","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"showFileOnMap creates ExifInterface(contentResolver.openInputStream(path.toUri())!!) for content:// uris but never closes the opened InputStream, leaking a descriptor each time a content-scheme file's location is shown.","fix":"Open the stream into a variable and close it in finally (or use{}) after constructing ExifInterface.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Activity.kt:931-940","code":"  931 |     val exif = try {\n  932 |         if (path.startsWith(\"content://\")) {\n  933 |             ExifInterface(contentResolver.openInputStream(path.toUri())!!)\n  934 |         } else {\n  935 |             ExifInterface(path)\n  936 |         }\n  937 |     } catch (e: Exception) {\n  938 |         showErrorToast(e)\n  939 |         return\n  940 |     }","lines":10}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The crop progress bar is hidden almost immediately instead of when cropping finishes. cropImage() launches the cropping coroutine, then in the returned Job's .apply{} block launches a SEPARATE Dispatchers.Main coroutine that calls setCropProgressBarVisibility(false) right away. That second coroutine does not wait for the cropping job, so the progress indicator is shown and then hidden almost instantly while getCroppedImage() is still running on Dispatchers.Default. The progress bar is effectively never visible during the actual work. The intent was almost certainly to hide it on completion (e.g. via invokeOnCompletion or at the end of the cropping coroutine itself).","fix":"Hide the progress bar from within the cropping coroutine after onImageCropped returns, or use bitmapCroppingJob.invokeOnCompletion { runOnUiThread { setCropProgressBarVisibility(false) } } instead of launching an independent Main coroutine that runs immediately.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/BaseCropActivity.kt:27-42","code":"   27 |     protected fun cropImage() {\n   28 |         setCropProgressBarVisibility(true)\n   29 |         bitmapCroppingJob?.cancel()\n   30 |         bitmapCroppingJob = lifecycleScope.launch(CoroutineExceptionHandler { _, t ->\n   31 |             onImageCropped(bitmap = null, error = Exception(t))\n   32 |         }) {\n   33 |             val bitmap = withContext(Dispatchers.Default) {\n   34 |                 cropImageView.getCroppedImage()\n   35 |             }\n   36 |             onImageCropped(bitmap, null)\n   37 |         }.apply {\n   38 |             lifecycleScope.launch(Dispatchers.Main) {\n   39 |                 setCropProgressBarVisibility(false)\n   40 |             }\n   41 |         }\n   42 |     }","lines":16}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"When the storage permission is denied, the activity calls finish() but does NOT return, so initEditActivity() runs anyway on a finishing activity. This loads the image, sets up the UI and can trigger further work/toasts on an activity that is being torn down. The finish()/initEditActivity() control flow is wrong.","fix":"Add an early return after finish() inside the !it branch (or wrap initEditActivity() in an else block) so the ed g/fossify/gallery/fragments/VideoFragment.kt:855-859","code":"  855 |     private fun videoEnded(): Boolean {\n  856 |         val currentPos = mExoPlayer?.currentPosition ?: 0\n  857 |         val duration = mExoPlayer?.duration ?: 0\n  858 |         return currentPos != 0L && currentPos >= duration\n  859 |     }","lines":5}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Removing the GROUP_BY_FOLDER flag for a single folder is done with arithmetic subtraction 'groupBy -= GROUP_BY_FOLDER + 1' (i.e. groupBy - 33). This is not a bit clear: it only yields a sensible result if exactly GROUP_BY_FOLDER (32) is set and GROUP_BY_NONE (1) is not. For groupBy == GROUP_BY_FOLDER (32) the result is -1 (all bits set); combined with other flags it produces wrong groupings. The apparent intent is to fall back to GROUP_BY_NONE when grouping a single folder by folder.","fix":"Clear the folder bit and set none explicitly: groupBy = (groupBy and GROUP_BY_FOLDER.inv()) or GROUP_BY_NONE (preserving GROUP_DESCENDING / GROUP_SHOW_FILE_COUNT as desired).","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/helpers/Config.kt:35-41","code":"   35 |     fun getFolderGrouping(path: String): Int {\n   36 |         var groupBy = prefs.getInt(GROUP_FOLDER_PREFIX + path.lowercase(Locale.getDefault()), groupBy)\n   37 |         if (path != SHOW_ALL && groupBy and GROUP_BY_FOLDER != 0) {\n   38 |             groupBy -= GROUP_BY_FOLDER + 1\n   39 |         }\n   40 |         return groupBy\n   41 |     }","lines":7}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"InstantItemSwitch mutates the incoming MotionEvent (sets action to ACTION_DOWN, relocates) and dispatches it to parentView twice, identical to the fragile pattern in MediaSideScroll. Re-using and mutating a framework-owned event and forwarding it twice can corrupt the parent's gesture tracking. Also t on ACTION_UP/CANCEL.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/views/MediaSideScroll.kt:120-129","code":"  120 |                 } else if (Math.abs(diffX) > dragThreshold || Math.abs(diffY) > dragThreshold) {\n  121 |                     if (!mPassTouches) {\n  122 |                         event.action = MotionEvent.ACTION_DOWN\n  123 |                         event.setLocation(event.rawX, event.rawY)\n  124 |                         mParentView?.dispatchTouchEvent(event)\n  125 |                     }\n  126 |                     mPassTouches = true\n  127 |                     mParentView?.dispatchTouchEvent(event)\n  128 |                     return false\n  129 |                 }","lines":10},{"ref":"app/src/main/kotlin/org/fossify/gallery/views/MediaSideScroll.kt:74-82","code":"   74 |     override fun dispatchTouchEvent(ev: MotionEvent): Boolean {\n   75 |         if (mPassTouches) {\n   76 |             if (ev.actionMasked == MotionEvent.ACTION_DOWN) {\n   77 |                 mPassTouches = false\n   78 |             }\n   79 |             return false\n   80 |         }\n   81 |         return super.dispatchTouchEvent(ev)\n   82 |     }","lines":9}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"IncludedFoldersActivity, ExcludedFoldersActivity and HiddenFoldersActivity each create a fresh ManageFoldersAdapter on every updateFolders()/refreshItems() call and assign it as the list adapter, discarding the previous adapter and losing scroll position/selection state on each refresh, instead of updating the existing adapter's data.","fix":"Reuse a single adapter instance and update its dataset (notifyDataSetChanged / DiffUtil) rather than recreating it on every refresh.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/IncludedFoldersActivity.kt:37-48","code":"   37 |     private fun updateFolders() {\n   38 |         val folders = ArrayList<String>()\n             }","lines":39}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"onResume reads `val primaryColor = getProperPrimaryColor()` and compares to mStoredPrimaryColor, but when they differ it calls getMediaAdapter()?.updatePrimaryColor() WITHOUT passing primaryColor, and never updates mStoredPrimaryColor to the new value. So mStoredPrimaryColor stays stale and the branch fires on every subsequent onResume even when the color hasn't changed again (and storeStateVariables only refreshes it in onPause). Minor redundant work / inconsistent with the other mStored* fields which are compared the same way.","fix":"Update mStoredPrimaryColor = primaryColor after applying, consistent with the other stored-state comparisons (which rely on storeStateVariables in onPause but here the divergence is notable).","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MediaActivity.kt:224-227","code":"  224 |         val primaryColor = getProperPrimaryColor()\n  225 |         if (mStoredPrimaryColor != primaryColor) {\n  226 |             getMediaAdapter()?.updatePrimaryColor()\n  227 |         }","lines":4}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"checkLastMediaChanged re-arms itself via a delayed Handler post that re-checks getLatestMediaId/getLatestMediaByDateId every 3s, calling getMedia() (full reload) when they change. gotMedia in turn calls checkLastMediaChanged again, and refreshUI paths also trigger it. There is no guard preventing multiple overlapping polling chains from being scheduled (e.g. getMedia called from pull-to-refresh while a poll is pending), and removeCallbacksAndMessages(null) on mLastMediaHandler is the only dedup. Multiple entrypoints calling gotMedia can stack reloads.","fix":"Centralize the polling lifecycle (single in-flight flag) so gotMedia restarting the timer cannot create overlapping chains.","loca e":"  914 |         var parent = file.parentFile ?: return false\n  915 |         while (true) {\n  916 |             if (parent.isHidden || parent.list()?.any { it.startsWith(NOMEDIA) } == true) {\n  917 |                 return true\n  918 |             }\n  919 | \n  920 |             if (parent.absolutePath == \"/\") {\n  921 |                 break\n  922 |             }\n  923 |             parent = parent.parentFile ?: return false\n  924 |         }\n  925 | \n  926 |         return false","lines":13}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Selection keys are derived from path.hashCode() (getItemSelectionKey, getItemKeyPosition, getItemWithKey). String hashCode collisions, while rare, would cause two distinct folders/media to share a selection key, so selecting one selects/operates on the wrong item. getItemWithKey uses firstOrNull on the hash, silently picking whichever collides first. Affects both DirectoryAdapter and MediaAdapter.","fix":"If the base class permits, key selection by stable unique ids (e.g. mediaStoreId / full path identity) rather than hashCode, or accept the documented collision risk explicitly. At minimum note the assumption.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/DirectoryAdapter.kt:231-233","code":"  231 |     override fun getItemSelectionKey(position: Int) = dirs.getOrNull(position)?.path?.hashCode()\n  232 | \n  233 |     override fun getItemKeyPosition(key: Int) = dirs.indexOfFirst { it.path.hashCode() == key }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/MediaAdapter.kt:242-244","code":"  242 |     override fun getItemSelectionKey(position: Int) = (media.getOrNull(position) as? Medium)?.path?.hashCode()\n  243 | \n  244 |     override fun getItemKeyPosition(key: Int) = media.indexOfFirst { (it as? Medium)?.path?.hashCode() == key }","lines":3}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"tryUnhideFolders() builds an empty 'removeFolders' list and passes it down to unhideFolders(), which then re-populates it via getSelectedItems(). The list created at the top of tryUnhideFolders is always empty when passed and serves no purpose; the SAF branch and the non-SAF branch both rely on unhideFolders re-deriving the selection. This is dead/misleading state that obscures intent and risks confusion if selection changes between the two calls.","fix":"Drop the pre-built removeFolders parameter; let unhideFolders() create its own local list from getSelectedItems().","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/ManageHiddenFoldersAdapter.kt:116-149","code":"  116 |     private fun tryUnhideFolders() {\n  117 |         val removeFolders = ArrayList<String>(selectedKeys.size)\n  118 | \n  119 |         val sdCardPaths = ArrayList<String>()\n  120 |         getSelectedItems().forEach {\n  121 |             if (activity.isPathOnSD(it)) {\n  122 |                 sdCardPaths.add(it)\n  123 |             }\n  124 |         }\n  125 | \n  126 |         if (sdCardPaths.isNotEmpty()) {\n  127 |             activity.handleSAFDialog(sdCardPaths.first()) {\n  128 |                 if (it) {\n  129 |                     unhideFolders(removeFolders)\n  130 |                 }\n  131 |             }\n  132 |         } else {\n  133 |             unhideFolders(removeFolders)\n  134 |         }\n  135 |     }\n  136 | \n  137 |     private fun unhideFolders(removeFolders: ArrayList<String>) {\n  138 |         val position = getSelectedItemPositions()\n  139 |         getSelectedItems().forEach {\n  140 |             removeFolders.add(it)\n  141 |             activity.removeNoMedia(it)\n  142 |         }\n  143 | \n  144 |         folders.removeAll(removeFolders)\n  145 |         removeSelectedItems(position)\n  146 |         if (folders.isEmpty()) {\n  147 |             listener?.refreshItems()\n  148 |         }\n  149 |     }","lines":34}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"deleteFiles() mutates the media list (media.removeAll(removeMedia)) and calls removeSelectedItems(positions) inside the nested SAF/SDK30 callbacks, but 'positions' is captured via getSelectedItemPositions() BEFORE the async callbacks resolve. If the underlying list changed between capture and the callback firing (e.g. a refresh), positions become stale, leading to wrong items being removed from the RecyclerView or an index mismatch with the mutated media list.","fix":"Recompute positions immediately before removeSelectedItems, or snapshot selected items+positions atomically and validate them against the current media list before removal.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/MediaAdapter.kt:602-616","code":"  602 |                 val fileDirItems = ArrayList<FileDirItem>(selectedKeys.size)\n  603 |                 val removeMedia = ArrayList<Medium>(selectedKeys.size)\n  604 |                 val positions = getSelectedItemPositions()\n  605 | \n  606 |                 selectedItems.forEach { medium ->\n  607 |                     fileDirItems.add(medium.toFileDirItem())\n  608 |                     removeMedia.add(medium)\n  609 |                 }\n  610 | \n  611 |                 media.removeAll(removeMedia)\n  612 |                 listener?.tryDeleteFiles(fileDirItems, skipRecycleBin)\n  613 |                 listener?.updateMediaGridDecoration(media)\n  614 |                 removeSelectedItems(positions)\n  615 |                 currentMediaHash = media.hashCode()\n  616 |             }","lines":15}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"GetMediaAsynctask.stopFetching sets mediaFetcher.shouldStop and calls cancel(true), but doInBackground never checks isCancelled or shouldStop between getFilesFrom calls in the :"Logic Error","severity":"low","easy":false,"description":"GalleryDatabase uses fallbackToDestructiveMigration() together with explicit migrations 4->10. Any version gap not covered by an explicit Migration (e.g. opening a DB at version <4, or a future schema bump without a matching migration) will silently wipe all user data (favorites, recycle bin entries, custom date-takens) instead of failing loudly. Destructive fallback combined with hand-written migrations is a data-loss hazard worth a deliberate decision.","fix":"Consider fallbackToDestructiveMigrationFrom() for only the intended legacy versions, or remove destructive fallback so missing migrations fail visibly during testing.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/databases/GalleryDatabase.kt:32-40","code":"   32 |                         db = Room.databaseBuilder(context.applicationContext, GalleryDatabase::class.java, \"gallery.db\")\n   33 |                             .fallbackToDestructiveMigration()\n   34 |                             .addMigrations(MIGRATION_4_5)\n   35 |                             .addMigrations(MIGRATION_5_6)\n   36 |                             .addMigrations(MIGRATION_6_7)\n   37 |                             .addMigrations(MIGRATION_7_8)\n   38 |                             .addMigrations(MIGRATION_8_9)\n   39 |                             .addMigrations(MIGRATION_9_10)\n   40 |                             .build()","lines":9}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ExcludeFolderDialog assigns each dynamically added radio button `id = index` (0-based). View id 0 is a legitimate value but is also indistinguishable from an unset id in some Android paths; relying on raw loop indices as View ids is fragile. dialogConfirmed then uses `radioGroup.checkedRadioButtonId` directly as an index into alternativePaths, coupling the View id space to list positions. It currently works only because ids happen to equal indices and the first button is pre-checked.","fix":"Use View.generateViewId() (or stable non-zero ids) and map the checked id back to a path via a lookup table, rather than treating the View id as a list index.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/dialogs/ExcludeFolderDialog.kt:26-33","code":"   26 |         alternativePaths.forEachIndexed { index, value ->\n   27 |             val radioButton = RadioButtonBinding.inflate(activity.layoutInflater).root.apply {\n   28 |                 text = alternativePaths[index]\n   29 |                 isChecked = index == 0\n   30 |                 id = index\n   31 |             }\n   32 |             radioGroup!!.addView(radioButton, RadioGroup.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.WRAP_CONTENT))\n   33 |         }","lines":8},{"ref":"app/src/main/kotlin/org/fossify/gallery/dialogs/ExcludeFolderDialog.kt:43-47","code":"   43 |     private fun dialogConfirmed() {\n   44 |         val path = if (alternativePaths.isEmpty()) selectedPaths[0] else alternativePaths[radioGroup!!.checkedRadioButtonId]\n   45 |         activity.config.addExcludedFolder(path)\n   46 |         callback()\n   47 |     }","lines":5}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"PickMediumDialog.handleGridSpacing compares decorations via `currentGridDecoration.toString() != newGridDecoration.toString()` where currentGridDecoration may be null, producing the literal string \"null\". When there is no existing decoration this comparison is always true (string \"null\" never equals the new decoration's toString), so the branch works by accident; relying on a class's default/overridden toString for equality is brittle and will silently break if GridSpacingItemDecoration.toString changes.","fix":"Compare decorations with a real equals() (data class or explicit field comparison) and handle the null case explicitly rather
