 as ResizeDialog (`ratio = size.x / size.y.toFloat()`). With size.y == 0 the width/height auto-fill produces Infinity/NaN-derived values. Additionally, unlike ResizeDialog, this dialog has no 'keep aspect ratio' checkbox, so the linked width/height adjustment is always forced even when the user may want independent dimensions.","fix":"Guard against a zero denominator before computing ratio.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/dialogs/ResizeWithPathDialog.kt:45-69","code":"   45 |         val ratio = size.x / size.y.toFloat()\n   46 | \n   47 |         widthView.onTextChangeListener {\n   48 |             if (widthView.hasFocus()) {\n   49 |                 var width = getViewValue(widthView)\n   50 |                 if (width > size.x) {\n   51 |                     widthView.setText(size.x.toString())\n   52 |                     width = size.x\n   53 |                 }\n   54 | \n   55 |                 heightView.setText((width / ratio).toInt().toString())\n   56 |             }\n   57 |         }\n   58 | \n   59 |         heightView.onTextChangeListener {\n   60 |             if (heightView.hasFocus()) {\n   61 |                 var height = getViewValue(heightView)\n   62 |                 if (height > size.y) {\n   63 |                     heightView.setText(size.y.toString())\n   64 |                     height = size.y\n   65 |                 }\n   66 | \n   67 |                 widthView.setText((height * ratio).toInt().toString())\n   68 |             }\n   69 |         }","lines":25}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"movePathsInRecycleBin verifies copy success with fileDocument.getItemSize(true) == copiedSize, but copiedSize is the number of bytes read from the input stream during this copy, which by construction equals the source size unless the stream errored. Comparing the source size against bytes-just-read does not validate the destination file's integrity (the destination is only checked for existence, not size), so a truncated write to 'out' would still be treated as success.","fix":"Compare against the destination file's actual size (e.g. File(destination).length()) rather than the bytes read from the source.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Activity.kt:361-375","code":"  361 |                     var copiedSize = 0L\n  362 |                     val buffer = ByteArray(DEFAULT_BUFFER_SIZE)\n  363 |                     var bytes = inputStream!!.read(buffer)\n  364 |                     while (bytes >= 0) {\n  365 |                         out!!.write(buffer, 0, bytes)\n  366 |                         copiedSize += bytes\n  367 |                         bytes = inputStream.read(buffer)\n  368 |                     }\n  369 | \n  370 |                     out?.flush()\n  371 | \n  372 |                     if (fileDocument.getItemSize(true) == copiedSize && getDoesFilePathExist(destination)) {\n  373 |                         mediaDB.updateDeleted(\"$RECYCLE_BIN$source\", System.currentTimeMillis(), source)\n  374 |                         pathsCnt--\n  375 |                     }","lines":15}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"getDirsToShow builds 'currentFolder' with a firstOrNull predicate that always short-circuits to false: the inner condition requires parentDirs.firstOrNull{ it.path.equals(currentPathPrefix) } == null AND it.path.equals(currentPathPrefix). The first conjunct already implies currentPathPrefix is not in parentDirs, but the predicate then ANDs two checks on the SAME path equality plus a redundant null-check, making the expression convoluted and likely not matching the intended 'pick the dir whose path equals currentPathPrefix only if not already among parentDirs'. The nested firstOrNull re-evaluates per allDirs element (O(n*m)).","fix":"Compute 'parentDirs already contains currentPathPrefix' once outside the firstOrNull, then select allDirs.firstOrNull { it.path.equals(currentPathPrefix, true) } only when it is absent.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Context.kt:276-287","code":"  276 |         if (currentPathPrefix.isNotEmpty()) {\n  277 |             val currentFolder = allDirs.firstOrNull {\n  278 |                 parentDirs.firstOrNull {\n  279 |                     it.path.equals(currentPathPrefix, true)\n  280 |                 } == null && it.path.equals(currentPathPrefix, true)\n  281 |             }\n  282 | \n  283 |             currentFolder?.apply {\n  284 |                 subfoldersCount = 1\n  285 |                 parentDirs.add(this)\n  286 |             }\n  287 |         }","lines":12}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"PhotoFragment.onConfigurationChanged posts loadGif via a 50ms-delayed Handler and resets gifViewFrame controller state, but does not cancel any previously posted runnable; rapid configuration changes can queue multiple delayed loadGif calls. Also it instantiates new Handler() each time (see Handler finding).","fix":"Reuse a member Handler and removeCallbacks before posting, or use View.postDelayed and cancel on subsequent calls.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/PhotoFragment.kt:332-341","code":"  332 |         if (mMedium.isGIF()) {\n  333 |             mView.onGlobalLayout {\n  334 |                 if (activity != null) {\n  335 |                     measureScreen()\n  336 |                     Handler().postDelayed({\n  337 |                         binding.gifViewFrame.controller.resetState()\n  338 |                         loadGif()\n  339 |                     }, 50)\n  340 |                 }\n  341 |             }","lines":10}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"showPortraitStripe casts listFiles()?.toMutableList() to ArrayList<File> via 'as? ArrayList<File>'. toMutableList() returns an ArrayList in the current stdlib so this happens to work, but it relies on an implementation detail; if it ever returns a different MutableList the cast yields null and the whole portrait stripe silently disappears. Also listFiles() returns all files unfiltered (including non-image files and subdirectories), which are then added as photo paths.","fix":"Use ArrayList(files.toList()) instead of an unchecked cast, and filter listFiles() to actual image files.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/PhotoFragment.kt:621-622","code":"  621 |     private fun showPortraitStripe() {\n  622 |         val files = File(mMedium.parentPath).listFiles()?.toMutableList() as? ArrayList<File>","lines":2},{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/PhotoFragment.kt:670-684","code":"  670 |     private fun fillPhotoPaths(files: ArrayList<File>, fakeItemsCnt: Int): ArrayList<String> {\n  671 |         val paths = ArrayList<String>()\n  672 |         for (i in 0 until fakeItemsCnt) {\n  673 |             paths.add(\"\")\n  674 |         }\n  675 | \n  676 |         files.forEach {\n  677 |             paths.add(it.absolutePath)\n  678 |         }\n  679 | \n  680 |         for (i in 0 until fakeItemsCnt) {\n  681 |             paths.add(\"\")\n  682 |         }\n  683 |         return paths\n  684 |     }","lines":15}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"MAX_PROGRESS is computed as (MAX_PLAYBACK_SPEED*100 + MIN_PLAYBACK_SPEED*100) = 300 + 25 = 325, an arbitrary asymmetric range. HALF_PROGRESS = 162. getPlaybackSpeed maps progress<HALF to [0.25,1.0) over 0..162 and progress>HALF to (1.0,3.0] over 163..325, but the off-by-one around HALF and the inclusion of MIN*100 in the max make the seekbar's center not correspond cleanly to 1.0x and the two halves cover unequal progress widths for the slow vs fast ranges. The MIN term in MAX_PROGRESS has no meaningful justification.","fix":"Define MAX_PROGRESS as a clean even number (e.g. 200 with HALF=100) and map [0,HALF] to [MIN,1] and [HALF,MAX] to [1,MAX_SPEED] so the center maps exactly to 1.0x with symmetric resolution.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/PlaybackSpeedFragment.kt:22-25","code":"   22 |     private val MIN_PLAYBACK_SPEED = 0.25f\n   23 |     private val MAX_PLAYBACK_SPEED = 3f\n   24 |     private val MAX_PROGRESS = (MAX_PLAYBACK_SPEED * 100 + MIN_PLAYBACK_SPEED * 100).toInt()\n   25 |     private val HALF_PROGRESS = MAX_PROGRESS / 2","lines":4},{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/PlaybackSpeedFragment.kt:88-107","code":"   88 |     private fun getPlaybackSpeed(progress: Int): Float {\n   89 |         var playbackSpeed = when {\n   90 |             progress < HALF_PROGRESS -> {\n   91 |                 val lowerProgressPercent = progress / HALF_PROGRESS.toFloat()\n   92 |                 val lowerProgress = (1 - MIN_PLAYBACK_SPEED) * lowerProgressPercent + MIN_PLAYBACK_SPEED\n   93 |                 lowerProgress\n   94 |             }\n   95 | \n   96 |             progress > HALF_PROGRESS -> {\n   97 |                 val upperProgressPercent = progress / HALF_PROGRESS.toFloat() - 1\n   98 |                 val upperDiff = MAX_PLAYBACK_SPEED - 1\n   99 |                 upperDiff * upperProgressPercent + 1\n  100 |             }\n  101 | \n  102 |             else -> 1f\n  103 |         }\n  104 |         playbackSpeed = Math.min(Math.max(playbackSpeed, MIN_PLAYBACK_SPEED), MAX_PLAYBACK_SPEED)\n  105 |         val stepMultiplier = 1 / STEP\n  106 |         return Math.round(playbackSpeed * stepMultiplier) / stepMultiplier\n  107 |     }","lines":20}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"VideoFragment.onProgressChanged uses two separate if-blocks ('if mExoPlayer != null' then 'if mExoPlayer == null') instead of if/else. This is functionally an if/else but written so that a state change between the two checks is theoretically possible; more notably mPositionWhenInit is only recorded when !mWasPlayerInited, and the player==null branch starts playback (initExoPlayer) from a seekbar drag, which is surprising side-effect from a progress-changed callback.","fix":"Use an explicit if/else on mExoPlayer == null and reconsider triggering full playback start from onProgressChanged.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/VideoFragment.kt:726-741","code":"  726 |     override fun onProgressChanged(seekBar: SeekBar, progress: Int, fromUser: Boolean) {\n  727 |         if (fromUser) {\n  728 |             val newPosition = progress.toLong()\n  729 |             if (mExoPlayer != null) {\n  730 |                 if (!mWasPlayerInited) {\n  731 |                     mPositionWhenInit = newPosition\n  732 |                 }\n  733 |                 setPosition(newPosition)\n  734 |             }\n  735 | \n  736 |             if (mExoPlayer == null) {\n  737 |                 mPositionAtPause = newPosition\n  738 |                 playVideo()\n  739 |             }\n  740 |         }\n  741 |     }","lines":16}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"playVideo() can drive ExoPlayer initialization twice in quick succession. The first branch returns after initExoPlayer() when mExoPlayer is null, but if videoPreview is visible while mExoPlayer is already non-null, it calls initExoPlayer() again (which no-ops due to the mExoPlayer != null guard). The control flow is confusing and the second initExoPlayer() call on line 806 is effectively dead given the guard, making intent unclear.","fix":"Remove the redundant initExoPlayer() call inside the videoPreview.isVisible() branch (the player is already    25 |         }\n   26 |     }","lines":10}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"getDuration is invoked for OTG media using a path derived by string-replacing the SAF tree URI, but context.getDuration expects a real file path. On OTG this commonly fails silently and returns 0; combined with the broad swallowing of exceptions elsewhere, video durations on OTG are effectively unavailable without indication.","fix":"Resolve durations for OTG via the document Uri / MediaMetadataRetriever on the content Uri instead of a reconstructed path, or document that durations are unsupported on OTG.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/helpers/MediaFetcher.kt:599-602","code":"  599 |             val path = Uri.decode(\n  600 |                 file.uri.toString().replaceFirst(\"${context.config.OTGTreeUri}/document/${context.config.OTGPartition}%3A\", \"${context.config.OTGPath}/\")\n  601 |             )\n  602 |             val videoDuration = if (getVideoDurations) context.getDuration(path) ?: 0 else 0","lines":4}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"initExoPlayer opens a FileDataSource/ContentDataSource just to obtain the resolved uri, then closes it, but wraps that same already-opened-and-closed instance in a DataSource.Factory that returns the single shared instance. ProgressiveMediaSource will call open() again on a DataSource that was already opened and closed once; reusing a single mutable DataSource instance across the player's lifetime is not the intended contract (the factory is supposed to create a fresh source per call). This is fragile and can break on retries/seeks that require re-opening.","fix":"Resolve the uri once (or just use MediaItem.fromUri(uri) directly with DefaultMediaSourceFactory), and have the DataSource.Factory construct a new ContentDataSource/FileDataSource on each invocation instead of returning a pre-opened shared instance.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/VideoFragment.kt:481-500","code":"  481 |         val dataSpec = DataSpec(uri)\n  482 |         val fileDataSource = if (isContentUri) {\n  483 |             ContentDataSource(requireContext())\n  484 |         } else {\n  485 |             FileDataSource()\n  486 |         }\n  487 | \n  488 |         try {\n  489 |             fileDataSource.open(dataSpec)\n  490 |         } catch (e: Exception) {\n  491 |             fileDataSource.close()\n  492 |             activity?.showErrorToast(e)\n  493 |             return\n  494 |         }\n  495 | \n  496 |         val factory = DataSource.Factory { fileDataSource }\n  497 |         val mediaSource: MediaSource = ProgressiveMediaSource.Factory(factory)\n  498 |             .createMediaSource(MediaItem.fromUri(fileDataSource.uri!!))\n  499 | \n  500 |         fileDataSource.close()","lines":20}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"App.onCreate installs a Picasso singleton with a custom Downloader whose load() returns an empty Response.Builder().build() without setting required fields. okhttp3 Response.Builder().build() throws IllegalStateException because request, protocol, code and message are not set. If Picasso ever falls through to network loading (e.g. a non-file/content URI), this Downloader will crash rather than simply failing the load. It only 'works' because the app intends to never do network loads, but it is a landmine.","fix":"Either build a valid (empty) Response with the required fields set, or throw a clear IOException to signal network loading is unsupported, instead of relying on an incompletely-built Response.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/App.kt:17-21","code":"   17 |         Picasso.setSingletonInstance(Picasso.Builder(this).downloader(object : Downloader {\n   18 |             override fun load(request: Request) = Response.Builder().build()\n   19 | \n   20 |             override fun shutdown() {}\n   21 |         }).build())","lines":5}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Deprecated APIs used. EditActivity uses `Handler()` (no Looper) and `windowManager.defaultDisplay.getSize(size)`, both deprecated for years; on newer Android getSize excludes system insets and the bare Handler constructor is discouraged.","fix":"Use Handler(Looper.getMainLooper()) (or view.post) and obtain size via WindowMetrics/Resources.displayMetrics instead of defaultDisplay.getSize.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/EditActivity.kt:275-277","code":"  275 |                         Handler().post {\n  276 |                             loadDefaultImageView()\n  277 |                         }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/EditActivity.kt:345-347","code":"  345 |     private fun fillCanvasBackground() {\n  346 |         val size = Point()\n  347 |         windowManager.defaultDisplay.getSize(size)","lines":3}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Several Handler instances are created with the deprecated no-argument Handler() constructor. While these happen to be constructed on the main thread (so they bind to the main Looper), the no-arg constructor is deprecated precisely because it silently captures the current thread's Looper and is error-prone.","fix":"Use Handler(Looper.getMainLooper()) explicitly.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/VideoPlayerActivity.kt:127-128","code":"  127 |     private var mTimerHandler = Handler()\n  128 |     private var mPlayWhenReadyHandler = Handler()","lines":2},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/VideoPlayerActivity.kt:362-364","code": ype_label":"Api Misuse","severity":"low","easy":false,"description":"Two raw Handler() instances (mSlideshowHandler line 201, and Handler() at line 523) are created with the deprecated no-arg constructor, which implicitly uses the current thread's Looper and is deprecated since API 30 for hidden-thread bugs. Within onCreate this happens to be the main thread, but the implicit-Looper constructor is flagged and brittle.","fix":"Use Handler(Looper.getMainLooper()) explicitly for both.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/ViewPagerActivity.kt:201-201","code":"  201 |     private var mSlideshowHandler = Handler()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/ViewPagerActivity.kt:523-525","code":"  523 |                 Handler().postDelayed({\n  524 |                     fragmentClicked()\n  525 |                 }, HIDE_SYSTEM_UI_DELAY)","lines":3}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"saveRotatedImageToFile decodes a bitmap via BitmapFactory.decodeStream(inputstream) (line 692) but never closes 'inputstream' obtained from getFileInputStreamSync. Only 'it' (the output stream) is closed. The input stream is leaked for every non-JPG rotation.","fix":"Wrap getFileInputStreamSync(oldPath) in use{} so it closes after decodeStream.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Activity.kt:691-694","code":"  691 |                 val inputstream = getFileInputStreamSync(oldPath)\n  692 |                 val bitmap = BitmapFactory.decodeStream(inputstream)\n  693 |                 saveFile(tmpPath, bitmap, it as FileOutputStream, newDegrees)\n  694 |             }","lines":4}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"View.sendFakeClick obtains a MotionEvent via MotionEvent.obtain() but never calls event.recycle(). Synthetic MotionEvents obtained this way shoul  adapter.performClickOn(closestIndex)\n  720 |                 }, 100)","lines":3}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"setupAdapter is invoked from inside the gotDirectories per-directory loop on every changed directory (and again after the loop, and again per new folder). Each setupAdapter call re-runs distinctBy, getSortedDirectories, getDirsToShow and clone over the full dirs list, plus posts a delayed scrollBy. For a device with many folders this is repeated O(n) full re-sorts inside an O(n) loop, i.e. O(n^2) sorting work plus many redundant adapter updates and 500ms-delayed posts during a single refresh.","fix":"Throttle/batch adapter updates during the scan (e.g. update at most every N items or on a debounce) instead of calling setupAdapter on every single directory change.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:1247","code":" 1247 |                 setupAdapter(dirs)","lines":1},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:1473-1541","code":" 1473 |     private fun setupAdapter(\n 1474 |         dirs: ArrayList<Directory>,\n 1475 |         textToSearch: String = binding.mainMenu.getCurrentQuery(),\n 1476 |         forceRecreate: Boolean = false\n 1477 |     ) {\n 1478 |         val currAdapter = binding.directoriesGrid.adapter\n 1479 |         val distinctDirs = dirs\n 1480 |             .distinctBy { it.path.getDistinctPath() }\n 1481 |             .toMutableList() as ArrayList<Directory>\n 1482 | \n 1483 |         val sortedDirs = getSortedDirectories(distinctDirs)\n 1484 |         var dirsToShow = getDirsToShow(\n 1485 |             dirs = sortedDirs,\n 1486 |             allDirs = mDirs,\n 1487 |             currentPathPrefix = mCurrentPathPrefix\n 1488 |         ).clone() as ArrayList<Directory>\n 1489 | \n 1490 |         if (currAdapter == null || forceRecreate) {\n 1491 |             mDirsIgnoringS ty(dirsToShow)\n 1532 | \n 1533 |                 (binding.directoriesGrid.adapter as? DirectoryAdapter)?.updateDirs(dirsToShow)\n 1534 |             }\n 1535 |         }\n 1536 | \n 1537 |         // recyclerview sometimes becomes empty at init/update, triggering an invisible refresh like this seems to work fine\n 1538 |         binding.directoriesGrid.postDelayed({\n 1539 |             binding.directoriesGrid.scrollBy(0, 0)\n 1540 |         }, 500)\n 1541 |     }","lines":69}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"setupSettingItems() is invoked from onResume() on every resume, and it calls setupClearCache() and setupEmptyRecycleBin(), each of which spawns a background thread that walks the cache dir / queries the deleted-media DB and sums file sizes. Returning to the Settings screen repeatedly re-runs these potentially expensive disk/DB scans needlessly.","fix":"Move one-off size computations (clear cache size, recycle bin size) into onCreate or guard them so they don't re-run on every onResume.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/SettingsActivity.kt:48-52","code":"   48 |     override fun onResume() {\n   49 |         super.onResume()\n   50 |         setupTopAppBar(binding.settingsAppbar, NavigationIcon.Arrow)\n   51 |         setupSettingItems()\n   52 |     }","lines":5},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/SettingsActivity.kt:741-790","code":"  741 |     private fun setupEmptyRecycleBin() {\n  742 |         ensureBackgroundThread {\n  743 |             try {\n  744 |                 mRecycleBinContentSize = mediaDB.getDeletedMedia().sumByLong { medium ->\n  745 |                     val size = medium.size\n  746 |                     if (size == 0L) {\n  747 |                         val path = medium.path.removePrefix(RECYCLE_BIN).prependIndent(recycleBinPath)\n  748 |                         File(path).length()\n  749 | ery per folder. For large folders this performs many synchronous filesystem stat calls and one IPC-backed duration probe per video on the loading path, which is a known slow point. Not a correctness bug but a notable performance cost in a hot loop.","fix":"Prefer the MediaStore-provided size/date/duration values already fetched in bulk (as getAndroid11FolderMedia does) and avoid per-file getDuration unless getVideoDurations is required; batch stat calls where possible.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/helpers/MediaFetcher.kt:362-408","code":"  362 |             var size = 0L\n  363 |             if (checkProperFileSize || checkFileExistence) {\n  364 |                 var newSize = fileSizes.remove(path)\n  365 |                 if (newSize == null) {\n  366 |                     newSize = file.length()\n  367 |                 }\n  368 |                 size = newSize\n  369 |             }\n  370 | \n  371 |             if ((checkProperFileSize || checkFileExistence) && size <= 0L) {\n  372 |                 continue\n  373 |             }\n  374 | \n  375 |             if (checkFileExistence && (!file.exists() || !file.isFile)) {\n  376 |                 continue\n  377 |             }\n  378 | \n  379 |             if (isRecycleBin) {\n  380 |                 deletedMedia.firstOrNull { it.path == path }?.apply {\n  381 |                     media.add(this)\n  382 |                 }\n  383 |             } else {\n  384 |                 var lastModified: Long\n  385 |                 var newLastModified = lastModifieds.remove(path)\n  386 |                 if (newLastModified == null) {\n  387 |                     newLastModified = if (getProperLastModified) {\n  388 |                         file.lastModified()\n  389 |                     } else {\n  390 |                         0L\n  391 |                     }\n  392 |                 }\n  393 |                 lastModified = newLastModified\n  394 | \n  395 |                 var dateTaken = lastModified\n  396 |                 val videoDuration = if (getVideoDurations && isVideo) context.getDuration(path) ?: 0 else 0\n  397 | \n  398 |                 if (getProperDateTaken) {\n  399 |                     var newDateTaken = dateTakens.remove(path)\n  400 |                     if (newDateTaken == null) {\n  401 |                         newDateTaken = if (getProperLastModified) {\n  402 |                             lastModified\n  403 |                         } else {\n  404 |                             file.lastModified()\n  405 |                         }\n  406 |                     }\n  407 |                     dateTaken = newDateTaken\n  408 |                 }","lines":47}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In gotDirectories, dirs.map { it.path }.contains(...) is used multiple times (1144, 1160) building a new list each call; and foldersToScan filtering (1302-1304) does dirs.filterNot{}.forEach{ foldersToScan.remove(it.path) } which is O(dirs*foldersToScan) list removals. For large galleries these are unnecessary allocations and quadratic removals.","fix":"Build a Set of dir paths once and reuse it; use Set operations instead of repeated list scans and per-element remove.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:1144","code":" 1144 |             && !dirs.map { it.path }.contains(RECYCLE_BIN)","lines":1},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:1160","code":" 1160 |         if (dirs.map { it.path }.contains(FAVORITES)) {","lines":1},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MainActivity.kt:1302-1304","code":" 1302 |         dirs.filterNot { it.path == RECYCLE_BIN || it.path == FAVORITES }.forEach {\n 1303 |             foldersToScan.remove(it.path)\n 1304 |         }","lines":3}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"columnCountChanged calls getMediaAdapter()?.notifyItemRangeChanged(0, media.size) to rebind every item after a span-count change. For large galleries this rebinds the whole list on the main thread on every zoom-in/zoom-out gesture step (initZoomListener increases/reduces column count per gesture), causing jank during pinch-zoom.","fix":"Rely on the layout manager spanCount change to relayout, or use a lighter notify (notifyDataSetChanged is no better, but debounce zoom steps) to avoid full rebinds per gesture increment.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MediaActivity.kt:919-926","code":"  919 |     private fun columnCountChanged() {\n  920 |         (binding.mediaGrid.layoutManager as MyGridLayoutManager).spanCount = config.mediaColumnCnt\n  921 |         handleGridSpacing()\n  922 |         refreshMenuItems()\n  923 |         getMediaAdapter()?.apply {\n  924 |             notifyItemRangeChanged(0, media.size)\n  925 |         }\n  926 |     }","lines":8},{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/MediaActivity.kt:862-884","code":"  862 |     private fun initZoomListener() {\n  863 |         val viewType = config.getFolderViewType(if (mShowAll) SHOW_ALL else mPath)\n  864 |         if (viewType == VIEW_TYPE_GRID) {\n  865 |             val layoutManager = binding.mediaGrid.layoutManager as MyGridLayoutManager\n  866 |             mZoomListener = object : MyRecyclerView.MyZoomListener {\n  867 |                 override fun zoomIn() {\n  868 |                     if (layoutManager.spanCount > 1) {\n  869 |                         reduceColumnCount()\n  870 |                         getMediaAdapter()?.finishActMode()\n  871 |                     }\n  872 |                 }\n  873 | \n  874 |                 override fun zoomOut() {\n  875 |                     if (layoutManager.spanCount < MAX_COLUMN_COUNT) {\n  876 |                         increaseColumnCount()\n  877 | lter)) instead of listing all entries, and consider moving the walk off the main thread.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/activities/ViewPagerActivity.kt:908-927","code":"  908 |     private fun isShowHiddenFlagNeeded(): Boolean {\n  909 |         val file = File(mPath)\n  910 |         if (file.isHidden) {\n  911 |             return true\n  912 |         }\n  913 | \n  914 |         var parent = file.parentFile ?: return false\n  915 |         while (true) {\n  916 |             if (parent.isHidden || parent.list()?.any { it.startsWith(NOMEDIA) } == true) {\n  917 |                 return true\n  918 |             }\n  919 | \n  920 |             if (parent.absolutePath == \"/\") {\n  921 |                 break\n  922 |             }\n  923 |             parent = parent.parentFile ?: return false\n  924 |         }\n  925 | \n  926 |         return false\n  927 |     }","lines":20}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"getItemPosition() unconditionally returns POSITION_NONE, so every notifyDataSetChanged() destroys and recreates ALL fragments/views in the pager rather than reusing unchanged ones. For a media viewer paging through many large images this forces full reload of the visible and adjacent fragments on any data refresh. This is a known workaround pattern but is worth flagging as a performance cost.","fix":"Return POSITION_UNCHANGED for items whose underlying Medium is unchanged (track by path), reserving POSITION_NONE for actually moved/removed items.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/MyPagerAdapter.kt:39-39","code":"   39 |     override fun getItemPosition(item: Any) = PagerAdapter.POSITION_NONE","lines":1}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"GetMediaAsynctask still uses android.os.AsyncTask, which is deprecated since API 30 and uses a serial executor by default, so concurrent fetches from different screens can queue behind each other. The class also leaks the standard AsyncTask risk: the callback captures context indirectly via MediaFetcher and runs on a static executor thread.","fix":"Migrate to coroutines or ensureBackgroundThread-based execution as used elsewhere in the app; AsyncTask is deprecated and its serial executor can stall parallel work.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/asynctasks/GetMediaAsynctask.kt:15-72","code":"   15 | class GetMediaAsynctask(\n   16 |     val context: Context, val mPath: String, val isPickImage: Boolean = false, val isPickVideo: Boolean = false,\n   17 |     val showAll: Boolean, val callback: (media: ArrayList<ThumbnailItem>) -> Unit\n   18 | ) :\n   19 |     AsyncTask<Void, Void, ArrayList<ThumbnailItem>>() {\n   20 |     private val mediaFetcher = MediaFetcher(context)\n   21 | \n   22 |     override fun doInBackground(vararg params: Void): ArrayList<ThumbnailItem> {\n   23 |         val pathToUse = if (showAll) SHOW_ALL else mPath\n   24 |         val folderGrouping = context.config.getFolderGrouping(pathToUse)\n   25 |         val folderSorting = context.config.getFolderSorting(pathToUse)\n   26 |         val getProperDateTaken = folderSorting and SORT_BY_DATE_TAKEN != 0 ||\n   27 |             folderGrouping and GROUP_BY_DATE_TAKEN_DAILY != 0 ||\n   28 |             folderGrouping and GROUP_BY_DATE_TAKEN_MONTHLY != 0\n   29 | \n   30 |         val getProperLastModified = folderSorting and SORT_BY_DATE_MODIFIED != 0 ||\n   31 |             folderGrouping and GROUP_BY_LAST_MODIFIED_DAILY != 0 ||\n   32 |             folderGrouping and GROUP_BY_LAST_MODIFIED_MONTHLY != 0\n   33 | \n   34 |         val getProperFileSize = folderSorting and SORT_BY_SIZE != 0\n   35 |         val favoritePaths = context.getFavoritePaths()\n   36 |         val getVideoDurations = context.config.showThumbnailVideoDuration\n   37 |         val lastModifieds = if (getProperLastModified) mediaFetcher.getLastModifieds() else HashMap()\n   38 |         val dateTakens = if (getProperDateTaken) mediaFetcher.getDateTakens() else HashMap()\n   39 | \n   40 |         val media = if (showAll) {\n   41 |             val foldersToScan = mediaFetcher.getFoldersToScan().filter { it != RECYCLE_BIN && it != FAVORITES && !context.config.isFolderProtected(it) }\n   42 |             val media = ArrayList<Medium>()\n   43 |             foldersToScan.forEach {\n   44 |                 val newMedia = mediaFetcher.getFilesFrom(\n   45 |                     it, isPickImage, isPickVideo, getProperDateTaken, getProperLastModified, getProperFileSize,\n   46 |                     favoritePaths, getVideoDurations, lastModifieds, dateTakens.clone() as HashMap<String, Long>, null\n   47 |                 )\n   48 |                 media.addAll(newMedia)\n   49 |             }\n   50 | \n   51 |             mediaFetcher.sortMedia(media, context.config.getFolderSorting(SHOW_ALL))\n   52 |             media\n   53 |         } else {\n   54 |             mediaFetcher.getFilesFrom(\n   55 |                 mPath, isPickImage, isPickVideo, getProperDateTaken, getProperLastModified, getProperFileSize, favoritePaths,\n   56 |                 getVideoDurations, lastModifieds, dateTakens, null\n   57 |             )\n   58 |         }\n   59 | \n   60 |         return mediaFetcher.groupMedia(media, pathToUse)\n   61 |     }\n   62 | \n   63 |     override fun onPostExecute(media: ArrayList<ThumbnailItem>) {\n   64 |         super.onPostExecute(media)\n   65 |         callback(media)\n   66 |     }\n   67 | \n   68 |     fun stopFetching() {\n   69 |         mediaFetcher.shouldStop = true\n   70 |         cancel(true)\n   71 |     }\n   72 | }","lines":58}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"getDirectParentSubfolders contains a nested O(n^2) loop over currentPaths solely to set the boolean areDirectSubfoldersAvailable, and recurses on the result. For folder sets with many entries this nested scan plus recursion is quadratic-to-worse and runs on every directory grouping pass. File(it).parent allocations inside the inner loop add to the cost.","fix":"Short-circuit the inner loop with any{} (break on first match) and hoist File(...).parent computations out of the inner loop; consider precomputing parents into a map.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Context.kt:414-426","code":"  414 |     var areDirectSubfoldersAvailable = false\n  415 |     currentPaths.forEach {\n  416 |         val path = it\n  417 |         currentPaths.forEach {\n  418 |             if (\n  419 |                 !foldersWithoutMediaFiles.contains(it)\n  420 |                 && !it.equals(path, true)\n  421 |                 && File(it).parent?.equals(path, true) == true\n  422 |             ) {\n  423 |                 areDirectSubfoldersAvailable = true\n  424 |             }\n  425 |         }\n  426 |     }","lines":13}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"checkAppendingHidden rebuilds a fresh HashMap<String,Boolean> of every NOMEDIA folder status on every single call. When invoked per-directory during a folder listing, this re-allocates and re-populates the same map N times (O(N*M)). The same map is already built once by callers like getCachedDirectories.","fix":"Accept the prebuilt folderNoMediaStatuses map as a parameter instead of reconstructing it on each call.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/extensions/Context.kt:570-590","code":"  570 | fun Context.checkAppendingHidden(\n  571 |     path: String,\n  572 |     hidden: String,\n  573 |     includedFolders: MutableSet<String>,\n  574 |     noMediaFolders: ArrayList<String>\n  575 | ): String {\n  576 |     val dirName = getFolderNameFromPath(path)\n  577 |     val folderNoMediaStatuses = HashMap<String, Boolean>()\n  578 |     noMediaFolders.forEach { folder ->\n  579 |         folderNoMediaStatuses[\"$folder/$NOMEDIA\"] = true\n  580 |     }\n  581 | \n  582 |     return if (\n  583 |         path.doesThisOrParentHaveNoMedia(folderNoMediaStatuses, null)\n  584 |         && !path.isThisOrParentIncluded(includedFolders)\n  585 |     ) {\n  586 |         \"$dirName $hidden\"\n  587 |     } else {\n  588 |         dirName\n  589 |     }\n  590 | }","lines":21}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"getMediumExtendedDetails / getResolution call file.readBytes() for .jxl files to obtain image dimensions via JxlCoder.getSize. Reading the entire JXL file into memory just to read its header size is wasteful for large files and only the OutOfMemoryError is caught (not IOException/other exceptions), so an IO failure here propagates.","fix":"Read only the header bytes needed (stream) rather than the whole file, and catch general Exception as well.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/fragments/ViewPagerFragment.kt:107-118","code":"  107 |     private fun getResolution(medium: Medium, file: File): String? {\n  108 |         if (medium.name.endsWith(\".jxl\",ignoreCase = true)) {\n  109 |             val resolution = try {\n  110 |                 JxlCoder.getSize(file.readBytes())\n  111 |             } catch (ignored: OutOfMemoryError) {\n  112 |                 null\n  113 |             }\n  114 |             return resolution?.let { Point(it.width,it.height).formatAsResolution() }\n  115 |         } else {\n  116 |             return context?.getResolution(file.absolutePath)?.formatAsResolution()\n  117 |         }\n  118 |     }","lines":12}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"processThumbs allocates a full copy of every thumbnail bitmap (Bitmap.createBitmap(filterItem.bitmap)) inside the loop and force-unwraps the filter result with !!. The defensive copy doubles memory per thumbnail during processing, and a filter returning null (e.g. on OOM) crashes with NPE instead of being handled.","fix":"Avoid the extra copy if the filter does not mutate in place, and handle a null filter result (skip or fall back) instead of using !!.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/helpers/FilterThumbnailsManager.kt:14-20","code":"   14 |     fun processThumbs(): ArrayList<FilterItem> {\n   15 |         for (filterItem in filterThumbnails) {\n   16 |             filterItem.bitmap = filterItem.filter.processFilter(Bitmap.createBitmap(filterItem.bitmap))!!\n   17 |             processedThumbnails.add(filterItem)\n   18 |         }\n   19 |         return processedThumbnails\n   20 |     }","lines":7}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"EditorDrawCanvas stores every stroke as a Path in mPaths and redraws all of them on every onDraw (called after every ACTION_MOVE via invalidate()). With many strokes this re-renders all paths each frame. Acceptable for an editor but for very large drawings it degrades; the in-progress mPath is also redrawn separately each frame which is fine, but completed paths could be cached to a bitmap layer.","fix":"Render committed strokes into an offscreen bitmap/hardware layer and only draw the in-progress path live, re-baking on undo.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/views/EditorDrawCanvas.kt:39-55","code":"   39 |     override fun onDraw(canvas: Canvas) {\n   40 |         super.onDraw(canvas)\n   41 |         canvas.save()\n   42 | \n   43 |         if (backgroundBitmap != null) {\n   44 |             canvas.drawBitmap(backgroundBitmap!!, 0f, 0f, null)\n   45 |         }\n   46 | \n   47 |         for ((key, value) in mPaths) {\n   48 |             changePaint(value)\n   49 |             canvas.drawPath(key, mPaint)\n   50 |         }\n   51 | \n   52 |         changePaint(mPaintOptions)\n   53 |         canvas.drawPath(mPath, mPaint)\n   54 |         canvas.restore()\n   55 |     }","lines":17}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"getSelectableItemCount() filters the entire media list (media.filter { it is Medium }.size) to count non-section items. This allocates a new list every call; for large folders and frequent invocations a count() would avoid the allocation.","fix":"Use media.count { it is Medium } to avoid allocating an intermediate list.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/adapters/MediaAdapter.kt:238-238","code":"  238 |     override fun getSelectableItemCount() = media.filter { it is Medium }.size","lines":1}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"Medium.getSignature falls back to File(path).lastModified() (synchronous disk I/O) when modified <= 1. getKey()/getSignature() are called from Glide model building on the UI/binding path; for items whose stored modified time is 0/1 this performs a filesystem stat per bind, which can stutter scrolling for such items.","fix":"Avoid the File.lastModified() fallback on the binding path, or ensure modified is always populated when media is loaded so the fallback is not hit during scroll.","locations":[{"ref":"app/src/main/kotlin/org/fossify/gallery/models/Medium.kt:101-109","code":"  101 |     fun getSignature(): String {\n  102 |         val lastModified = if (modified > 1) {\n  103 |             modified\n  104 |         } else {\n  105 |             File(path).lastModified()\n  106 |         }\n  107 | \n  108 |         return \"$path-$lastModified-$size\"\n  109 |     }","lines":9}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"high","easy":true,"description":"When the current item cannot be located (mPos == -1), th <div class="project-info"><div class="pi-name">fossify-gallery</div><div class="pi-row"><a class="pi-repo-btn" href="https://github.com/FossifyOrg/Gallery" target="_blank" rel="noopener">&#128279; https://github.com/FossifyOrg/Gallery</a><span><span class="pi-k">branch</span> <code>main</code></span><span><span class="pi-k">commit</span> <a href="https://github.com/FossifyOrg/Gallery/commit/aa21c26937e92412524904a9ab2b55eaca203a94" target="_blank" rel="noopener"><code>aa21c26937</code></a></span></div></div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
  <button class="action-btn" data-action="download-md">&#11015; MD</button>
  <button class="action-btn" data-action="download-md-short">&#11015; MD Short</button>
  <button class="action-btn" data-action="download-toml">&#11015; TOML</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
