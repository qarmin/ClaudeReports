<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","description":"`StoredAlias::s_ver` calls `self.destination_path.parent().unwrap()` (src/alias.rs:66-67). `destination_path` is produced by `std::fs::canonicalize` in the TryInto impl (src/alias.rs:52). If an alias symlink resolves to a filesystem-root path (e.g. a symlink pointing directly at `/`), `parent()` returns `None` and this unwraps to a panic. Likewise `file_name().expect(\"must have basename\")` on the same path can fail. While normal fnm-created aliases point at `.../<version>/installation`, a user or external tooling can create an arbitrary symlink in the aliases dir, and `list_aliases` will feed it here (e.g. via `fnm ls`), turning a malformed alias into a crash instead of an ignorable entry.","fix":"Return `Option`/`Result` from `s_ver`/`name` (or use `.and_then`) and skip aliases whose canonical destination has no parent/basename, rather than unwrapping. Filter such entries out in `list_aliases`.","locations":[{"ref":"src/alias.rs:61-82","code":"   61 | impl StoredAlias {\n   62 |     pub fn s_ver(&self) -> &str {\n   63 |         if self.destination_path == system_version::path() {\n   64 |             system_version::display_name()\n   65 |         } else {\n   66 |             self.destination_path\n   67 |                 .parent()\n   68 |                 .unwrap()\n   69 |                 .file_name()\n   70 |                 .expect(\"must have basename\")\n   71 |                 .to_str()\n   72 |                 .unwrap()\n   73 |         }\n   74 |     }\n   75 | \n   76 |     pub fn name(&self) -> &str {\n   77 |         self.alias_path\n   78 |             .file_name()\n   79 |             .expect(\"must have basename\")\n   80 |             .to_str()\n   81 |             .unwrap()\n   82 |     }","lines":22}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"The `outln!` macro calls `.expect(\"Can't write output\")` on the `writeln!` result. When fnm output is piped to a\nprocess that closes the pipe early (e.g. `fnm ls-remote | head`), the write fails with EPIPE and fnm panics with a\nnon-zero/aborting status and an ugly backtrace instead of exiting cleanly. This affects every command that prints via `outln!`.","fix":"Handle a broken-pipe error gracefully: ignore `ErrorKind::BrokenPipe` (or exit(0)) instead of `expect`, e.g. match on the\nwrite result and `std::process::exit(0)` when `err.kind() == ErrorKind::BrokenPipe`.","locations":[{"ref":"src/log_level.rs:50-56","code":"   50 | #[macro_export]\n   51 | macro_rules! outln {\n   52 |     ($config:ident, $level:path, $($expr:expr),+) => {{\n   53 |         use $crate::log_level::LogLevel::*;\n   54 |         writeln!($config.log_level().writer_for($level), $($expr),+).expect(\"Can't write output\");\n   55 |     }}\n   56 | }","lines":7}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","description":"`Arch::default()` panics (`panic!(\"{}\", e.details)`) if `platform_arch()` ever returns a string `Arch::from_str` cannot\nparse. Today the returned strings all parse, so it is currently unreachable, but it is a latent panic: any future change to\n`platform_arch` (or adding a new pointer-width/arch combination) that returns an unmapped value crashes the whole program at\nconfig-parse time with no graceful error.","fix":"Either keep the strings strictly in sync with `from_str`, or have `Arch::default()` fall back to a sensible value / surface a\nproper error rather than `panic!`.","locations":[{"ref":"src/arch.rs:50-57","code":"   50 | impl Default for Arch {\n   51 |     fn default() -> Arch {\n   52 |         match crate::system_info::platform_arch().parse() {\n   53 |             Ok(arch) => arch,\n   54 |             Err(e) => panic!(\"{}\", e.details),\n   55 |         }\n   56 |     }\n   57 | }","lines":8}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","description":"`Zip::extract_into` calls `tempfile().expect(\"Can't get a temporary file\")`. Creating a temp file is fallible I/O (disk full, permissions, TMPDIR missing) and occurs on the Windows install path. On failure it panics instead of returning the `Error` the function is already declared to produce.","fix":"Replace `.expect(...)` with `?` (the function returns `Result<(), Error>` and `Error` already has a `From<io::Error>` impl).","locations":[{"ref":"src/archive/zip.rs:21-22","code":"   21 |     fn extract_into(mut self: Box<Self>, path: &Path) -> Result<(), Error> {\n   22 |         let mut tmp_zip_file = tempfile().expect(\"Can't get a temporary file\");","lines":2}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","description":"Several `to_str().unwrap()` calls on PathBufs panic if the fnm directory or multishell path contains non-UTF-8 bytes. The env command would panic instead of producing a usable error message.","fix":"Use `to_string_lossy()` or handle the None branch with a proper error variant when converting paths to strings for env var output.","locations":[{"ref":"src/commands/env.rs:98","code":"   98 |             (\"FNM_MULTISHELL_PATH\", multishell_path.to_str().unwrap()),","lines":1},{"ref":"src/commands/env.rs:103","code":"  103 |             (\"FNM_DIR\", base_dir.to_str().unwrap()),","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","description":"`std::env::current_dir().unwrap()` panics if the current working directory has been deleted or is inaccessible (e.g. a process whose cwd was rmdir'd). This is a user-reachable runtime panic rather than a clean error message, and it occurs in the hot path of nearly every command that infers a version from the directory.","fix":"Replace `.unwrap()` with proper error handling that maps the io::Error into a dedicated error variant (e.g. `Error::CantReadCurrentDirectory`), or fall back gracefully when the cwd cannot be read.","locations":[{"ref":"src/commands/install.rs:73","code":"   73 |         let current_dir = std::env::current_dir().unwrap();","lines":1},{"ref":"src/commands/use.rs:46","code":"   46 |                 let current_dir = std::env::current_dir().unwrap();","lines":1},{"ref":"src/commands/exec.rs:67","code":"   67 |                 let current_dir = std::env::current_dir().unwrap();","lines":1},{"ref":"src/commands/uninstall.rs:27","code":"   27 |                 let current_dir = std::env::current_dir().unwrap();","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"`corepack_path.to_str().unwrap()` panics if the installation path contains non-UTF-8 bytes (possible on Unix and Windows). Since the path is derived from the user-configurable fnm directory, a non-UTF-8 base path turns corepack enablement into a panic instead of an error.","fix":"Avoid the lossy/`unwrap` conversion; pass the path through an OsStr-aware API, or handle the None case by returning a descriptive error.","locations":[{"ref":"src/commands/install.rs:202","code":"  202 |     super::exec::Exec::new_for_version(version, corepack_path.to_str().unwrap(), &[\"enable\"])","lines":1}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"`current_version` uses three `.expect()` calls on a canonicalized path (src/current_version.rs:17-22). The path comes from `config.multishell_path()` and is canonicalized. The comment-bearing `.parent().expect(\"multishell path can't be in the root\")` and the subsequent `file_name`/`to_str` expects assume a well-formed `.../<version>/bin` layout. If the multishell symlink is corrupted or repointed (e.g. to a root-level or non-UTF-8 path), this aborts the process with a panic instead of returning a recoverable error, which is harsh for a function that otherwise returns `Result`.","fix":"Replace the `.expect()` calls with `.ok_or(...)`/`?` returning the existing `Error` type (or `Ok(None)`), so a malformed multishell path yields a clean error instead of a panic.","locations":[{"ref":"src/current_version.rs:14-27","code":"   14 |     if let Ok(resolved_path) = std::fs::canonicalize(multishell_path) {\n   15 |         let installation_path = resolved_path\n   16 |             .parent()\n   17 |             .expect(\"multishell path can't be in the root\");\n   18 |         let file_name = installation_path\n   19 |             .file_name()\n   20 |             .expect(\"Can't get filename\")\n   21 |             .to_str()\n   22 |             .expect(\"Invalid OS string\");\n   23 |         let version = Version::parse(file_name).map_err(|source| Error::VersionError {\n   24 |             source,\n   25 |             version: file_name.to_string(),\n   26 |         })?;\n   27 |         Ok(Some(version))","lines":14}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"`DirectoryPortal::new_in` calls `TempDir::new_in(parent_dir).expect(\"Can't generate a temp directory\")`. Temp-dir creation is an ordinary I/O operation that can fail (permissions, full disk, missing parent), and this is on the main install path. The failure aborts the process with a panic instead of returning a recoverable error through the existing `Error` enum.","fix":"Make `new_in` return `std::io::Result<Self>` and propagate the error to the caller in `install_node_dist`, which already returns `Result`.","locations":[{"ref":"src/directory_portal.rs:18-23","code":"   18 |     #[must_use]\n   19 |     pub fn new_in(parent_dir: impl AsRef<Path>, target: P) -> Self {\n   20 |         let temp_dir = TempDir::new_in(parent_dir).expect(\"Can't generate a temp directory\");\n   21 |         debug!(\"Created a temp directory in {:?}\", temp_dir.path());\n   22 |         Self { temp_dir, target }\n   23 |     }","lines":6}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"`download_url` builds a URL string with `format!` and unwraps `Url::parse`. The `version` component is interpolated via its `Display` impl directly into the URL path without percent-encoding. A version value containing characters that are invalid in a URL would make `Url::parse` return `Err`, causing an unconditional panic rather than a clean error. While current callers pass validated versions, the `.unwrap()` is a latent panic on the URL-construction path.","fix":"Return `Result<Url, Error>` and propagate the parse error, or build the URL with `base_url.join(...)` / `Url`'s path-segment API which handles encoding and avoids the unwrap.","locations":[{"ref":"src/downloader.rs:59-67","code":"   59 | fn download_url(base_url: &Url, version: &Version, arch: Arch, ext: &str) -> Url {\n   60 |     Url::parse(&format!(\n   61 |         \"{}/{}/{}\",\n   62 |         base_url.as_str().trim_end_matches('/'),\n   63 |         version,\n   64 |         filename_for_version(version, arch, ext)\n   65 |     ))\n   66 |     .unwrap()\n   67 | }","lines":9}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","description":"WindowsCmd::to_clap_shell unconditionally panics. The From<Box<dyn Shell>> for clap_complete::Shell conversion (src/shell/shell.rs:53-57) calls to_clap_shell() on whatever shell is boxed, and infer_shell can return WindowsCmd (shell_from_string maps \"cmd\" to WindowsCmd). If completion generation is ever driven by an inferred shell that resolves to cmd, this panics the process instead of returning a graceful error. The TODO acknowledges it should be an Option/Result.","fix":"Change to_clap_shell to return Option<clap_complete::Shell> (or Result) and have the completions command surface a user-facing error for cmd, rather than panicking.","locations":[{"ref":"src/shell/windows_cmd/mod.rs:8-11","code":"    8 |     fn to_clap_shell(&self) -> clap_complete::Shell {\n    9 |         // TODO: move to Option\n   10 |         panic!(\"Shell completion is not supported for Windows Command Prompt. Maybe try using PowerShell for a better experience?\");\n   11 |     }","lines":4},{"ref":"src/shell/shell.rs:53-57","code":"   53 | impl From<Box<dyn Shell>> for clap_complete::Shell {\n   54 |     fn from(shell: Box<dyn Shell>) -> Self {\n   55 |         shell.to_clap_shell()\n   56 |     }\n   57 | }","lines":5}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"negligible","description":"`std::io::stdout().flush().unwrap()` and `read_line(...).expect(\"Can't read user input\")` will panic if stdout/stdin I/O fails during the interactive install prompt. Low impact since this only runs in interactive terminals, but it is still an avoidable panic on a broken pipe.","fix":"Propagate the I/O errors as a recoverable error (return false or an Err) instead of unwrapping/expecting.","locations":[{"ref":"src/commands/use.rs:190","code":"  190 |     std::io::stdout().flush().unwrap();","lines":1},{"ref":"src/commands/use.rs:192-194","code":"  192 |     std::io::stdin()\n  193 |         .read_line(&mut s)\n  194 |         .expect(\"Can't read user input\");","lines":3}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"low","description":"`create_alias` removes an existing alias symlink and then creates a new one in two separate, non-atomic steps (src/alias.rs:19-20). Between `remove_symlink_dir` and `symlink_dir` another fnm process (or external action) may recreate the path, causing `symlink_dir` to fail with EEXIST and leaving the alias missing. This is a classic TOCTOU on the alias path.","fix":"Create the new symlink at a temporary unique path and atomically rename it over the destination, or retry the remove+create sequence on EEXIST, to make alias replacement robust against concurrent processes.","locations":[{"ref":"src/alias.rs:8-23","code":"    8 | pub fn create_alias(\n    9 |     config: &FnmConfig,\n   10 |     common_name: &str,\n   11 |     version: &Version,\n   12 | ) -> std::io::Result<()> {\n   13 |     let aliases_dir = config.aliases_dir();\n   14 |     std::fs::create_dir_all(&aliases_dir)?;\n   15 | \n   16 |     let version_dir = version.installation_path(config);\n   17 |     let alias_dir = aliases_dir.join(common_name);\n   18 | \n   19 |     remove_symlink_dir(&alias_dir).ok();\n   20 |     symlink_dir(version_dir, &alias_dir)?;\n   21 | \n   22 |     Ok(())\n   23 | }","lines":16}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"low","description":"`use.rs` reads the alias symlink then checks `alias_path.exists()` then later replaces a symlink, and `uninstall.rs` lists matching versions, then resolves, then `remove_dir_all` - all classic TOCTOU patterns. Concurrent fnm invocations (or external changes) between the check and the action can lead to acting on a stale state (e.g. deleting a directory that was replaced). Impact is limited to single-user concurrent shells.","fix":"Where feasible, perform the action and handle the resulting NotFound/AlreadyExists error rather than checking-then-acting; document the single-user assumption otherwise.","locations":[{"ref":"src/commands/use.rs:73-99","code":"   73 |             if matches!(fs::shallow_read_symlink(&alias_path), Ok(shallow_path) if shallow_path == system_path)\n   74 |             {\n   75 |                 let message = format!(\n   76 |                     \"Bypassing fnm: using {} node\",\n   77 |                     system_version::display_name().cyan()\n   78 |                 );\n   79 |                 (message, system_path)\n   80 |             } else if alias_path.exists() {\n   81 |                 let message = format!(\"Using Node for alias {}\", alias_name.cyan());\n   82 |                 (message, alias_path)\n   83 |             } else {\n   84 |                 install_new_version(requested_version, config, self.install_if_missing)?;\n   85 |                 return Ok(());\n   86 |             }\n   87 |         } else {\n   88 |             let current_version = requested_version.to_version(&all_versions, config);\n   89 |             if let Some(version) = current_version {\n   90 |                 let version_path = config\n   91 |                     .installations_dir()\n   92 |                     .join(version.to_string())\n   93 |                     .join(\"installation\");\n   94 |                 let message = format!(\"Using Node {}\", version.to_string().cyan());\n   95 |                 (message, version_path)\n   96 |             } else {\n   97 |                 install_new_version(requested_version, config, self.install_if_missing)?;\n   98 |                 return Ok(());\n   99 |             }","lines":27},{"ref":"src/commands/uninstall.rs:36-63","code":"   36 |         let available_versions: Vec<&Version> = all_versions\n   37 |             .iter()\n   38 |             .filter(|v| requested_version.matches(v, config))\n   39 |             .collect();\n   40 | \n   41 |         if available_versions.len() >= 2 {\n   42 |             return Err(Error::PleaseBeMoreSpecificToDelete {\n   43 |                 matched_versions: available_versions\n   44 |                     .iter()\n   45 |                     .map(std::string::ToString::to_string)\n   46 |                     .collect(),\n   47 |             });\n   48 |         }\n   49 | \n   50 |         let version = requested_version\n   51 |             .to_version(&all_versions, config)\n   52 |             .ok_or(Error::CantFindVersion)?;\n   53 | \n   54 |         let matching_aliases = version.find_aliases(config)?;\n   55 |         let root_path = version\n   56 |             .root_path(config)\n   57 |             .ok_or_else(|| Error::RootPathNotFound {\n   58 |                 version: version.clone(),\n   59 |             })?;\n   60 | \n   61 |         debug!(\"Removing Node version from {:?}\", root_path);\n   62 |         std::fs::remove_dir_all(root_path)\n   63 |             .map_err(|source| Error::CantDeleteNodeVersion { source })?;","lines":28}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"low","description":"`install_node_dist` checks `installation_dir.exists()` and returns `VersionAlreadyInstalled`, then much later (after download + extraction) calls `portal.teleport()` which `fs::rename`s onto that same target path. Between the initial check and the rename, a concurrent `fnm install` of the same version (or an external process) could create the directory; the rename will then either fail or clobber/merge unexpectedly. This is a classic TOCTOU on the installation directory.","fix":"Treat the final rename as the atomic gate: handle an `AlreadyExists`/`ENOTEMPTY` error from `teleport`'s rename as `VersionAlreadyInstalled`, rather than relying on the earlier `exists()` check for correctness.","locations":[{"ref":"src/downloader.rs:77-83","code":"   77 |     let installation_dir = PathBuf::from(installations_dir.as_ref()).join(version.v_str());\n   78 | \n   79 |     if installation_dir.exists() {\n   80 |         return Err(Error::VersionAlreadyInstalled {\n   81 |             path: installation_dir,\n   82 |         });\n   83 |     }","lines":7},{"ref":"src/downloader.rs:118-123","code":"  118 |         let renamed_installation_dir = portal.join(\"installation\");\n  119 |         std::fs::rename(installed_directory, renamed_installation_dir)?;\n  120 | \n  121 |         portal.teleport()?;\n  122 | \n  123 |         return Ok(());","lines":6},{"ref":"src/directory_portal.rs:25-33","code":"   25 |     pub fn teleport(self) -> std::io::Result<P> {\n   26 |         debug!(\n   27 |             \"Moving directory {:?} into {:?}\",\n   28 |             self.temp_dir.path(),\n   29 |             self.target.as_ref()\n   30 |         );\n   31 |         std::fs::rename(&self.temp_dir, &self.target)?;\n   32 |         Ok(self.target)\n   33 |     }","lines":9}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"`install_node_dist` creates `installations_dir/.downloads` and a `DirectoryPortal` temp subdirectory inside it. If the download/extraction fails partway (e.g. an HTTP/extract error returned via `?`), the `DirectoryPortal`'s `TempDir` drop will clean up its own subdir, but the `.downloads` parent directory it created is never removed and accumulates as an empty leftover directory across failed installs.","fix":"Clean up the `.downloads` directory when it is left empty (or create the portal temp dir directly under `installations_dir` if same-mount), so failed installs do not leave stray directories behind.","locations":[{"ref":"src/downloader.rs:87-124","code":"   87 |     let temp_installations_dir = installations_dir.as_ref().join(\".downloads\");\n   88 |     std::fs::create_dir_all(&temp_installations_dir)?;\n   89 | \n   90 |     let portal = DirectoryPortal::new_in(&temp_installations_dir, installation_dir);\n   91 | \n   92 |     for extract in Archive::supported() {\n   93 |         let ext = extract.file_extension();\n   94 |         let url = download_url(node_dist_mirror, version, arch, ext);\n   95 |         debug!(\"Going to call for {}\", &url);\n   96 |         let response = crate::http::get(url.as_str())?;\n   97 | \n   98 |         if !response.status().is_success() {\n   99 |             continue;\n  100 |         }\n  101 | \n  102 |         debug!(\"Extracting response...\");\n  103 |         if show_progress {\n  104 |             extract.extract_archive_into(\n  105 |                 portal.as_ref(),\n  106 |                 ResponseProgress::new(response, ProgressDrawTarget::stderr()),\n  107 |             )?;\n  108 |         } else {\n  109 |             extract.extract_archive_into(portal.as_ref(), response)?;\n  110 |         }\n  111 |         debug!(\"Extraction completed\");\n  112 | \n  113 |         let installed_directory = std::fs::read_dir(&portal)?\n  114 |             .next()\n  115 |             .ok_or(Error::TarIsEmpty)??;\n  116 |         let installed_directory = installed_directory.path();\n  117 | \n  118 |         let renamed_installation_dir = portal.join(\"installation\");\n  119 |         std::fs::rename(installed_directory, renamed_installation_dir)?;\n  120 | \n  121 |         portal.teleport()?;\n  122 | \n  123 |         return Ok(());\n  124 |     }","lines":38}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"get_process_info spawns `ps` via Command::spawn() and then moves out its stdout, dropping the Child handle without ever calling wait()/wait_with_output(). On Unix a dropped Child is not reaped, leaving a zombie process until fnm itself exits. The loop in infer_shell can invoke this up to ~11 times per run, creating that many transient zombies. Using Command::output() (which waits) would avoid the leak and is simpler.","fix":"Use Command::new(\"ps\").args(...).output() to capture stdout and reap the child in one call, or explicitly call child.wait() after reading stdout.","locations":[{"ref":"src/shell/infer/unix.rs:52-86","code":"   52 |     let buffer = Command::new(\"ps\")\n   53 |         .arg(\"-o\")\n   54 |         .arg(\"ppid,comm\")\n   55 |         .arg(pid.to_string())\n   56 |         .stdout(std::process::Stdio::piped())\n   57 |         .spawn()?\n   58 |         .stdout\n   59 |         .ok_or_else(|| Error::from(ErrorKind::UnexpectedEof))?;\n   60 | \n   61 |     let mut lines = BufReader::new(buffer).lines();\n   62 | \n   63 |     // skip header line\n   64 |     lines\n   65 |         .next()\n   66 |         .ok_or_else(|| Error::from(ErrorKind::UnexpectedEof))??;\n   67 | \n   68 |     let line = lines\n   69 |         .next()\n   70 |         .ok_or_else(|| Error::from(ErrorKind::NotFound))??;\n   71 | \n   72 |     let mut parts = line.split_whitespace();\n   73 |     let ppid = parts.next().ok_or_else(|| ProcessInfoError::Parse {\n   74 |         expectation: \"Can't read the ppid from ps, should be the first item in the table\",\n   75 |         got: line.to_string(),\n   76 |     })?;\n   77 |     let command = parts.next().ok_or_else(|| ProcessInfoError::Parse {\n   78 |         expectation: \"Can't read the command from ps, should be the second item in the table\",\n   79 |         got: line.to_string(),\n   80 |     })?;\n   81 | \n   82 |     Ok(ProcessInfo {\n   83 |         parent_pid: ppid.parse().ok(),\n   84 |         command: command.into(),\n   85 |     })\n   86 | }","lines":35}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"The iteration guard is off-by-one relative to its name. visited starts at 0; the check `if visited > MAX_ITERATIONS (10)` runs before processing and visited is incremented after, so the body executes for visited = 0..=10, i.e. 11 ancestor processes rather than the 10 the constant name implies. Harmless but misleading; no overflow occurs because the loop returns first.","fix":"Use `if visited >= MAX_ITERATIONS` (or increment before the check) so the actual cap matches the named limit.","locations":[{"ref":"src/shell/infer/unix.rs:14-43","code":"   14 | const MAX_ITERATIONS: u8 = 10;\n   15 | \n   16 | pub fn infer_shell() -> Option<Box<dyn Shell>> {\n   17 |     let mut pid = Some(std::process::id());\n   18 |     let mut visited = 0;\n   19 | \n   20 |     while let Some(current_pid) = pid {\n   21 |         if visited > MAX_ITERATIONS {\n   22 |             return None;\n   23 |         }\n   24 | \n   25 |         let process_info = get_process_info(current_pid)\n   26 |             .map_err(|err| {\n   27 |                 debug!(\"{}\", err);\n   28 |                 err\n   29 |             })\n   30 |             .ok()?;\n   31 |         let binary = process_info\n   32 |             .command\n   33 |             .trim_start_matches('-')\n   34 |             .split('/')\n   35 |             .next_back()?;\n   36 | \n   37 |         if let Some(shell) = super::shell_from_string(binary) {\n   38 |             return Some(shell);\n   39 |         }\n   40 | \n   41 |         pid = process_info.parent_pid;\n   42 |         visited += 1;\n   43 |     }","lines":30}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Alias name case-handling is inconsistent between creation and resolution. `Version::parse` lowercases any alias name (src/version.rs:22,33), so resolving a user input like \"MyAlias\" produces `Version::Alias(\"myalias\")`. However `create_alias` stores the alias symlink using the raw, un-lowercased name passed on the command line (src/commands/alias.rs:13,26 -> src/alias.rs:8,17), so the on-disk directory is \"MyAlias\". As a result `UserVersion::matches` compares the lowercased `user_alias` against the raw `alias.name()` (src/user_version.rs:37-44) and never matches, and `choose_version_for_user_input` joins the lowercased name onto `aliases_dir` (src/choose_version_for_user_input.rs:44-45) which will not find an alias stored with uppercase letters. Any alias containing uppercase characters becomes unusable after creation.","fix":"Normalize the alias name consistently. Either lowercase `common_name` in `create_alias` before joining it onto `aliases_dir`, or stop lowercasing alias names in `Version::parse` and instead compare case-insensitively. Pick one canonical form and apply it on both the write and read paths.","locations":[{"ref":"src/version.rs:22-34","code":"   22 |         let lowercased = version_str.as_ref().to_lowercase();\n   23 |         if lowercased == system_version::display_name() {\n   24 |             Ok(Self::Bypassed)\n   25 |         } else if lowercased.starts_with(\"lts-\") || lowercased.starts_with(\"lts/\") {\n   26 |             let lts_type = LtsType::from(&lowercased[4..]);\n   27 |             Ok(Self::Lts(lts_type))\n   28 |         } else if first_letter_is_number(lowercased.trim_start_matches('v')) {\n   29 |             let version_plain = lowercased.trim_start_matches('v');\n   30 |             let sver = node_semver::Version::parse(version_plain)?;\n   31 |             Ok(Self::Semver(sver))\n   32 |         } else {\n   33 |             Ok(Self::Alias(lowercased))\n   34 |         }","lines":13},{"ref":"src/alias.rs:8-23","code":"    8 | pub fn create_alias(\n    9 |     config: &FnmConfig,\n   10 |     common_name: &str,\n   11 |     version: &Version,\n   12 | ) -> std::io::Result<()> {\n   13 |     let aliases_dir = config.aliases_dir();\n   14 |     std::fs::create_dir_all(&aliases_dir)?;\n   15 | \n   16 |     let version_dir = version.installation_path(config);\n   17 |     let alias_dir = aliases_dir.join(common_name);\n   18 | \n   19 |     remove_symlink_dir(&alias_dir).ok();\n   20 |     symlink_dir(version_dir, &alias_dir)?;\n   21 | \n   22 |     Ok(())\n   23 | }","lines":16},{"ref":"src/user_version.rs:34-52","code":"   34 |     pub fn matches(&self, version: &Version, config: &crate::config::FnmConfig) -> bool {\n   35 |         match (self, version) {\n   36 |             (Self::Full(a), b) if a == b => true,\n   37 |             (Self::Full(user_version), maybe_alias) => {\n   38 |                 match (user_version.alias_name(), maybe_alias.find_aliases(config)) {\n   39 |                     (None, _) | (_, Err(_)) => false,\n   40 |                     (Some(user_alias), Ok(aliases)) => {\n   41 |                         aliases.iter().any(|alias| alias.name() == user_alias)\n   42 |                     }\n   43 |                 }\n   44 |             }\n   45 |             (Self::SemverRange(range), Version::Semver(semver)) => semver.satisfies(range),\n   46 |             (_, Version::Bypassed | Version::Lts(_) | Version::Alias(_) | Version::Latest) => false,\n   47 |             (Self::OnlyMajor(major), Version::Semver(other)) => *major == other.major,\n   48 |             (Self::MajorMinor(major, minor), Version::Semver(other)) => {\n   49 |                 *major == other.major && *minor == other.minor\n   50 |             }\n   51 |         }\n   52 |     }","lines":19},{"ref":"src/choose_version_for_user_input.rs:44-67","code":"   44 |     } else if let Some(alias_name) = requested_version.alias_name() {\n   45 |         let alias_path = config.aliases_dir().join(&alias_name);\n   46 |         let system_path = system_version::path();\n   47 |         if matches!(fs::shallow_read_symlink(&alias_path), Ok(shallow_path) if shallow_path == system_path)\n   48 |         {\n   49 |             info!(\n   50 |                 \"Bypassing fnm: using {} node\",\n   51 |                 system_version::display_name().cyan()\n   52 |             );\n   53 |             Some(ApplicableVersion {\n   54 |                 path: alias_path,\n   55 |                 version: Version::Bypassed,\n   56 |             })\n   57 |         } else if alias_path.exists() {\n   58 |             info!(\"Using Node for alias {}\", alias_name.cyan());\n   59 |             Some(ApplicableVersion {\n   60 |                 path: alias_path,\n   61 |                 version: Version::Alias(alias_name),\n   62 |             })\n   63 |         } else {\n   64 |             return Err(Error::CantFindVersion {\n   65 |                 requested_version: requested_version.clone(),\n   66 |             });\n   67 |         }","lines":24}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `make_symlink`, the `while temp_dir.exists()` retry loop guards against name collisions but there is a TOCTOU window between the existence check and `symlink_dir`. More importantly, `symlink_dir` is not protected against a concurrently-created path: two `fnm env` invocations in the same millisecond from the same PID are now mitigated by the random component, but the existence check itself is racy and a colliding symlink_dir call returns CantCreateSymlink rather than retrying.","fix":"Drop the pre-check and instead attempt creation in a loop, retrying with a new random name when symlink_dir fails with AlreadyExists; only surface other I/O errors.","locations":[{"ref":"src/commands/env.rs:40-52","code":"   40 | fn make_symlink(config: &FnmConfig) -> Result<std::path::PathBuf, Error> {\n   41 |     let base_dir = config.multishell_storage().ensure_exists_silently();\n   42 |     let mut temp_dir = base_dir.join(generate_symlink_path());\n   43 | \n   44 |     while temp_dir.exists() {\n   45 |         temp_dir = base_dir.join(generate_symlink_path());\n   46 |     }\n   47 | \n   48 |     match symlink_dir(config.default_version_dir(), &temp_dir) {\n   49 |         Ok(()) => Ok(temp_dir),\n   50 |         Err(source) => Err(Error::CantCreateSymlink { source, temp_dir }),\n   51 |     }\n   52 | }","lines":13}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`installed_versions::list` treats any directory whose name is not numeric-prefixed as a successfully parsed `Version::Alias`, instead of rejecting it. `Version::parse` returns `Ok(Version::Alias(name))` for non-numeric input (src/version.rs:32-34), and `list` pushes whatever `Version::parse(filename)` returns (src/installed_versions.rs:23-24). A stray non-hidden directory in the installations dir (a leftover temp dir, a partially extracted download, an unrelated folder) is therefore reported as an installed \"version\" alias rather than being skipped or flagged. This pollutes `fnm ls` output and the candidate set used by `to_version`.","fix":"In `installed_versions::list`, only accept entries that parse as `Version::Semver` (or explicitly skip names that do not begin with a digit / 'v'), since the installations dir should only contain real semver versions.","locations":[{"ref":"src/installed_versions.rs:5-27","code":"    5 | pub fn list<P: AsRef<Path>>(installations_dir: P) -> Result<Vec<Version>, Error> {\n    6 |     let mut vec = vec![];\n    7 |     for result_entry in installations_dir.as_ref().read_dir()? {\n    8 |         let entry = result_entry?;\n    9 |         if entry\n   10 |             .file_name()\n   11 |             .to_str()\n   12 |             .is_some_and(|s| s.starts_with('.'))\n   13 |         {\n   14 |             continue;\n   15 |         }\n   16 | \n   17 |         let path = entry.path();\n   18 |         let filename = path\n   19 |             .file_name()\n   20 |             .ok_or_else(|| std::io::Error::from(std::io::ErrorKind::NotFound))?\n   21 |             .to_str()\n   22 |             .ok_or_else(|| std::io::Error::from(std::io::ErrorKind::NotFound))?;\n   23 |         let version = Version::parse(filename)?;\n   24 |         vec.push(version);\n   25 |     }\n   26 |     Ok(vec)\n   27 | }","lines":23},{"ref":"src/version.rs:20-35","code":"   20 | impl Version {\n   21 |     pub fn parse<S: AsRef<str>>(version_str: S) -> Result<Self, node_semver::SemverError> {\n   22 |         let lowercased = version_str.as_ref().to_lowercase();\n   23 |         if lowercased == system_version::display_name() {\n   24 |             Ok(Self::Bypassed)\n   25 |         } else if lowercased.starts_with(\"lts-\") || lowercased.starts_with(\"lts/\") {\n   26 |             let lts_type = LtsType::from(&lowercased[4..]);\n   27 |             Ok(Self::Lts(lts_type))\n   28 |         } else if first_letter_is_number(lowercased.trim_start_matches('v')) {\n   29 |             let version_plain = lowercased.trim_start_matches('v');\n   30 |             let sver = node_semver::Version::parse(version_plain)?;\n   31 |             Ok(Self::Semver(sver))\n   32 |         } else {\n   33 |             Ok(Self::Alias(lowercased))\n   34 |         }\n   35 |     }","lines":16}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`ResponseProgress::drop` unconditionally executes `eprintln!()`, printing a blank line to stderr on every drop - even when no progress bar was ever created (the response had no Content-Length, so `progress` is `None`) and even though progress can be disabled by config. This emits spurious blank lines to stderr in cases where nothing was displayed, and runs in tests too.","fix":"Only print the trailing newline when a progress bar was actually shown, e.g. guard `eprintln!()` behind `if self.progress.is_some()` (after `finish()`).","locations":[{"ref":"src/progress.rs:74-79","code":"   74 | impl Drop for ResponseProgress {\n   75 |     fn drop(&mut self) {\n   76 |         self.finish();\n   77 |         eprintln!();\n   78 |     }\n   79 | }","lines":6}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`platform_arch()` returns \"x64\" for every 64-bit non-arm target, including ppc64le, ppc64 and s390x.\nThe `Arch` enum explicitly defines `Ppc64le`, `Ppc64` and `S390x` variants, but auto-detection (used by `Arch::default()`)\ncan never produce them - it will mislabel a PowerPC/s390x host as x64. On such hosts fnm will try to download an x64 Node\nbuild, which does not exist for that platform, so installs fail unless the user manually passes `--arch`.","fix":"Add `cfg` arms for the missing 64-bit architectures, e.g. `#[cfg(target_arch = \"powerpc64\")]` returning \"ppc64le\"/\"ppc64\"\n(distinguish by `target_endian`) and `#[cfg(target_arch = \"s390x\")]` returning \"s390x\", before the catch-all x64 arm.","locations":[{"ref":"src/system_info.rs:35-41","code":"   35 | #[cfg(all(\n   36 |     target_pointer_width = \"64\",\n   37 |     not(any(target_arch = \"arm\", target_arch = \"aarch64\"))\n   38 | ))]\n   39 | pub fn platform_arch() -> &'static str {\n   40 |     \"x64\"\n   41 | }","lines":7},{"ref":"src/arch.rs:50-57","code":"   50 | impl Default for Arch {\n   51 |     fn default() -> Arch {\n   52 |         match crate::system_info::platform_arch().parse() {\n   53 |             Ok(arch) => arch,\n   54 |             Err(e) => panic!(\"{}\", e.details),\n   55 |         }\n   56 |     }\n   57 | }","lines":8}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `Zip::extract_into`, unix permissions are applied with `fs::set_permissions(&outpath, ...)` for every entry including directory entries. For directory entries this can strip the owner write/execute bits depending on the archive's stored mode, potentially making a just-created directory non-traversable or preventing subsequent file creation inside it. Permissions from the archive should typically only be force-applied to regular files (and directories handled with care).","fix":"Only call `set_permissions` for the non-directory branch, or ensure directory modes always retain the user rwx bits needed to write the files extracted into them.","locations":[{"ref":"src/archive/zip.rs:44-75","code":"   44 |             if file.name().ends_with('/') {\n   45 |                 debug!(\n   46 |                     \"File {} extracted to \\\"{}\\\"\",\n   47 |                     i,\n   48 |                     outpath.as_path().display()\n   49 |                 );\n   50 |                 fs::create_dir_all(&outpath)?;\n   51 |             } else {\n   52 |                 debug!(\n   53 |                     \"Extracting file {} to \\\"{}\\\" ({} bytes)\",\n   54 |                     i,\n   55 |                     outpath.as_path().display(),\n   56 |                     file.size()\n   57 |                 );\n   58 |                 if let Some(p) = outpath.parent() {\n   59 |                     if !p.exists() {\n   60 |                         fs::create_dir_all(p)?;\n   61 |                     }\n   62 |                 }\n   63 |                 let mut outfile = fs::File::create(&outpath)?;\n   64 |                 io::copy(&mut file, &mut outfile)?;\n   65 |             }\n   66 | \n   67 |             // Get and Set permissions\n   68 |             #[cfg(unix)]\n   69 |             {\n   70 |                 use std::os::unix::fs::PermissionsExt;\n   71 | \n   72 |                 if let Some(mode) = file.unix_mode() {\n   73 |                     fs::set_permissions(&outpath, fs::Permissions::from_mode(mode))?;\n   74 |                 }\n   75 |             }","lines":32}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Default::apply` for the no-version case prints `alias.s_ver()` (the stored version string the default alias points to). That is intended, but `get_alias_by_name` returning None maps to `DefaultAliasDoesNotExist`, while `Alias::handle_error` is reused via `Default::handle_error`. Since `Alias` does not override `handle_error`, this indirection just calls the default trait impl and adds no value, i.e. dead indirection.","fix":"Remove the overridden `handle_error` that merely forwards to the default trait implementation, or document why the forwarding exists.","locations":[{"ref":"src/commands/default.rs:32-34","code":"   32 |     fn handle_error(err: Self::Error, config: &FnmConfig) {\n   33 |         Alias::handle_error(err, config);\n   34 |     }","lines":3}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The use_on_cd file-existence conditions are inconsistent across shells and against cd.cmd. Bash, Zsh and PowerShell test for .node-version, .nvmrc and (when resolve_engines) package.json, but the generated cd.cmd for WindowsCmd only checks .nvmrc and .node-version and never package.json regardless of resolve_engines (it only special-cases the `recursive` strategy). This means auto-switch on cd does not trigger for package.json `engines` on cmd, diverging from every other shell.","fix":"Generate cd.cmd dynamically (or add a package.json branch gated on FNM_RESOLVE_ENGINES) so the WindowsCmd auto-switch logic matches the other shells.","locations":[{"ref":"src/shell/windows_cmd/cd.cmd:1-13","code":"    1 | @echo off\n    2 | cd /d %*\n    3 | if \"%FNM_VERSION_FILE_STRATEGY%\" == \"recursive\" (\n    4 |   fnm use --silent-if-unchanged\n    5 | ) else (\n    6 |   if exist .nvmrc (\n    7 |     fnm use --silent-if-unchanged\n    8 |   ) else (\n    9 |     if exist .node-version (\n   10 |       fnm use --silent-if-unchanged\n   11 |     )\n   12 |   )\n   13 | )","lines":13},{"ref":"src/shell/bash.rs:29-33","code":"   29 |         let version_file_exists_condition = if config.resolve_engines() {\n   30 |             \"-f .node-version || -f .nvmrc || -f package.json\"\n   31 |         } else {\n   32 |             \"-f .node-version || -f .nvmrc\"\n   33 |         };","lines":5},{"ref":"src/shell/powershell.rs:29-33","code":"   29 |         let version_file_exists_condition = if config.resolve_engines() {\n   30 |             \"(Test-Path .nvmrc) -Or (Test-Path .node-version) -Or (Test-Path package.json)\"\n   31 |         } else {\n   32 |             \"(Test-Path .nvmrc) -Or (Test-Path .node-version)\"\n   33 |         };","lines":5}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`UserVersion::from_str` silently discards trailing non-numeric components when falling back to major/minor parsing. For input like \"10.foo\" the fallback splits on '.', parses major=10, fails to parse minor, and returns `OnlyMajor(10)` (src/user_version.rs:90-95), silently ignoring the invalid \"foo\" segment. Similarly \"10.20.bad\" yields `MajorMinor(10,20)`. Malformed version specifiers are accepted as if they were valid coarse versions instead of being reported as errors, which can mask user typos.","fix":"After collecting major/minor, verify there are no leftover non-empty parts (or that remaining parts are 'x'/'*'), otherwise return the original `SemverError`.","locations":[{"ref":"src/user_version.rs:84-98","code":"   84 | impl FromStr for UserVersion {\n   85 |     type Err = node_semver::SemverError;\n   86 |     fn from_str(s: &str) -> Result<UserVersion, Self::Err> {\n   87 |         match Version::parse(s) {\n   88 |             Ok(v) => Ok(Self::Full(v)),\n   89 |             Err(e) => {\n   90 |                 let mut parts = skip_first_v(s.trim()).split('.');\n   91 |                 match (next_of::<u64, _>(&mut parts), next_of::<u64, _>(&mut parts)) {\n   92 |                     (Some(major), None) => Ok(Self::OnlyMajor(major)),\n   93 |                     (Some(major), Some(minor)) => Ok(Self::MajorMinor(major, minor)),\n   94 |                     _ => Err(e),\n   95 |                 }\n   96 |             }\n   97 |         }\n   98 |     }","lines":15}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","description":"Downloaded Node archives are never verified for integrity. The downloader fetches the archive over HTTP and extracts it directly without comparing it against the official SHASUMS256.txt checksums published alongside every Node release. A corrupted download (truncated transfer, proxy tampering, or a compromised/MITM'd mirror) will be silently extracted and installed. For a tool that installs executables that users then run, this is a meaningful integrity/supply-chain gap.","fix":"Download SHASUMS256.txt(.asc) from the mirror, compute the SHA-256 of the downloaded archive bytes (e.g. while streaming through a hashing reader), and abort installation with an error if the digest does not match the expected value for that file.","locations":[{"ref":"src/downloader.rs:92-124","code":"   92 |     for extract in Archive::supported() {\n   93 |         let ext = extract.file_extension();\n   94 |         let url = download_url(node_dist_mirror, version, arch, ext);\n   95 |         debug!(\"Going to call for {}\", &url);\n   96 |         let response = crate::http::get(url.as_str())?;\n   97 | \n   98 |         if !response.status().is_success() {\n   99 |             continue;\n  100 |         }\n  101 | \n  102 |         debug!(\"Extracting response...\");\n  103 |         if show_progress {\n  104 |             extract.extract_archive_into(\n  105 |                 portal.as_ref(),\n  106 |                 ResponseProgress::new(response, ProgressDrawTarget::stderr()),\n  107 |             )?;\n  108 |         } else {\n  109 |             extract.extract_archive_into(portal.as_ref(), response)?;\n  110 |         }\n  111 |         debug!(\"Extraction completed\");\n  112 | \n  113 |         let installed_directory = std::fs::read_dir(&portal)?\n  114 |             .next()\n  115 |             .ok_or(Error::TarIsEmpty)??;\n  116 |         let installed_directory = installed_directory.path();\n  117 | \n  118 |         let renamed_installation_dir = portal.join(\"installation\");\n  119 |         std::fs::rename(installed_directory, renamed_installation_dir)?;\n  120 | \n  121 |         portal.teleport()?;\n  122 | \n  123 |         return Ok(());\n  124 |     }","lines":33},{"ref":"src/http.rs:13-19","code":"   13 | pub fn get(url: impl IntoUrl) -> Result<Response, Error> {\n   14 |     Ok(Client::new()\n   15 |         .get(url)\n   16 |         // Some sites require a user agent.\n   17 |         .header(\"User-Agent\", concat!(\"fnm \", env!(\"CARGO_PKG_VERSION\")))\n   18 |         .send()?)\n   19 | }","lines":7}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"The HTTP client is constructed with reqwest defaults and sets no connect or read/request timeout. A stalled or half-open connection to a Node mirror will cause `http::get` (and therefore `install_node_dist` / `remote_node_index::list`) to block indefinitely with no way to recover, hanging the CLI. A version manager that talks to remote mirrors should always bound network operations.","fix":"Build the client via `Client::builder().connect_timeout(...).timeout(...).build()` (or set `.timeout(...)` on the request) so that stalled downloads fail with an error after a bounded period.","locations":[{"ref":"src/http.rs:13-19","code":"   13 | pub fn get(url: impl IntoUrl) -> Result<Response, Error> {\n   14 |     Ok(Client::new()\n   15 |         .get(url)\n   16 |         // Some sites require a user agent.\n   17 |         .header(\"User-Agent\", concat!(\"fnm \", env!(\"CARGO_PKG_VERSION\")))\n   18 |         .send()?)\n   19 | }","lines":7}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`exec.rs` swallows the spawned child's lifecycle on error by `.wait().expect(\"Failed to grab exit code\")`, which panics if waiting on the child fails. A failed wait (e.g. ECHILD due to a signal handler reaping the child) becomes a panic rather than a propagated error.","fix":"Map the `wait()` error into a dedicated Error variant and return it instead of using `.expect`.","locations":[{"ref":"src/commands/exec.rs:104-105","code":"  104 |             .wait()\n  105 |             .expect(\"Failed to grab exit code\");","lines":2}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `install.rs`, the `VersionAlreadyInstalled` downloader error is treated as a warning (printed) and execution continues to tag default/aliases and run corepack/use. This is intentional, but the warning is printed to the Error log stream while the message text labels it 'warning:', conflating an informational re-install case with an error-level log. Minor but can confuse log-level-based filtering.","fix":"Emit the already-installed notice at Info/warning level rather than the Error stream, consistent with its non-fatal nature.","locations":[{"ref":"src/commands/install.rs:154-159","code":"  154 |             Err(err @ DownloaderError::VersionAlreadyInstalled { .. }) => {\n  155 |                 outln!(config, Error, \"{} {}\", \"warning:\".bold().yellow(), err);\n  156 |             }\n  157 |             Err(source) => Err(Error::DownloadError { source })?,\n  158 |             Ok(()) => {}\n  159 |         }","lines":6}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"maybe_fix_windows_path silently discards any cygpath error and any non-UTF-8 cygpath output via `.ok()?`, falling back to the original (un-converted) Windows path. On real Git-Bash-for-Windows setups where cygpath exists but momentarily fails, the caller then emits an unconverted Windows path into a Unix-style `export PATH=...` line, which Bash cannot use - with no diagnostic. The failure mode is invisible to the user.","fix":"Log a debug/warn message when cygpath is present but returns failure or non-UTF-8 output, so the silent fallback to an unusable path is at least diagnosable.","locations":[{"ref":"src/shell/windows_compat.rs:11-20","code":"   11 |     let output = std::process::Command::new(\"cygpath\")\n   12 |         .arg(path)\n   13 |         .output()\n   14 |         .ok()?;\n   15 |     if output.status.success() {\n   16 |         let output = String::from_utf8(output.stdout).ok()?;\n   17 |         Some(output.trim().to_string())\n   18 |     } else {\n   19 |         None\n   20 |     }","lines":10}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"`http::get` constructs a brand-new `reqwest::blocking::Client` on every call. The client owns the connection pool and TLS configuration, so creating it per-request discards connection reuse and re-initializes TLS each time. `remote_node_index::list` and the download path both call this repeatedly; a shared/lazily-initialized client would avoid the per-call setup cost.","fix":"Create the `Client` once (e.g. via a `OnceLock`/`Lazy` static or by passing a shared client) and reuse it across requests so the connection pool and TLS config are retained.","locations":[{"ref":"src/http.rs:13-19","code":"   13 | pub fn get(url: impl IntoUrl) -> Result<Response, Error> {\n   14 |     Ok(Client::new()\n   15 |         .get(url)\n   16 |         // Some sites require a user agent.\n   17 |         .header(\"User-Agent\", concat!(\"fnm \", env!(\"CARGO_PKG_VERSION\")))\n   18 |         .send()?)\n   19 | }","lines":7}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"In `LtsType::pick_latest`, the `CodeName` branch recomputes `s.to_lowercase()` on every iteration of the filter closure (src/lts.rs:42). For each indexed version it allocates a new lowercased copy of the requested codename, even though `s` never changes. The version index can contain hundreds of entries.","fix":"Compute `let needle = s.to_lowercase();` once before the iterator and compare `needle == x.to_lowercase()` inside the closure.","locations":[{"ref":"src/lts.rs:38-44","code":"   38 |             Self::CodeName(s) => versions\n   39 |                 .iter()\n   40 |                 .filter(|x| match &x.lts {\n   41 |                     None => false,\n   42 |                     Some(x) => s.to_lowercase() == x.to_lowercase(),\n   43 |                 })\n   44 |                 .next_back(),","lines":7}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"`remote_node_index::list` reads the entire index.json into a `String` via `resp.text()` and then parses it with `serde_json::from_str`. The index is large (every Node release ever). Buffering the whole body as a `String` before parsing doubles peak memory versus streaming, and the `&text[..]` reslice on line 92 is a redundant no-op. Note the body must currently be retained only to build `DecodeError`.","fix":"Pass `&text` instead of `&text[..]`; consider `serde_json::from_reader` over the response when the full body is not needed for error reporting.","locations":[{"ref":"src/remote_node_index.rs:90-92","code":"   90 |     let text = resp.text().map_err(crate::http::Error::from)?;\n   91 |     let mut value: Vec<IndexedNodeVersion> =\n   92 |         serde_json::from_str(&text[..]).map_err(|cause| DecodeError::from_serde(text, cause))?;","lines":3}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","description":"In ls_remote, when `--latest` is combined with `--sort desc`, `truncate_except_latest` swaps element 0 with the last and truncates to one element, then `all_versions.reverse()` runs on a single-element vector. Harmless but the reverse is pointless after truncation to 1; more notably the latest-selection assumes the remote list is always returned in ascending order, an undocumented coupling that would silently pick the wrong version if the upstream order changed.","fix":"Select the latest via `max()` on the version field rather than relying on positional last/swap, making the logic independent of upstream ordering.","locations":[{"ref":"src/commands/ls_remote.rs:71-77","code":"   71 |         if self.latest {\n   72 |             truncate_except_latest(&mut all_versions);\n   73 |         }\n   74 | \n   75 |         if let SortingMethod::Descending = self.sort {\n   76 |             all_versions.reverse();\n   77 |         }","lines":7},{"ref":"src/commands/ls_remote.rs:42-48","code":"   42 | fn truncate_except_latest<T>(list: &mut Vec<T>) {\n   43 |     let len = list.len();\n   44 |     if len > 1 {\n   45 |         list.swap(0, len - 1);\n   46 |         list.truncate(1);\n   47 |     }\n   48 | }","lines":7}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`LogLevel::possible_values()` is never called anywhere in the codebase (the only reference is its own definition). It is dead\ncode. It is also internally inconsistent with the rest of the type: it lists `[\"quiet\", \"info\", \"all\", \"error\"]` in an order\nthat matches neither the enum declaration nor `as_str`, and includes the `all` alias which `as_str` never emits, so if it were\never wired into help/validation it would present a confusing value list.","fix":"Remove `possible_values()`; clap's `ValueEnum` derive already provides the canonical possible-values list for help output.","locations":[{"ref":"src/log_level.rs:39-41","code":"   39 |     pub fn possible_values() -> &'static [&'static str; 4] {\n   40 |         &[\"quiet\", \"info\", \"all\", \"error\"]\n   41 |     }","lines":3}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`ArchError` implements the long-deprecated `std::error::Error::description` method (deprecated since Rust 1.42). It is never\ncalled and adds no value since `Display` already exposes the message.","fix":"Remove the `description` override; the default trait method suffices.","locations":[{"ref":"src/arch.rs:100-104","code":"  100 | impl std::error::Error for ArchError {\n  101 |     fn description(&self) -> &str {\n  102 |         &self.details\n  103 |     }\n  104 | }","lines":5}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`IndexedNodeVersion` carries two commented-out fields (`date`, `files`) left in the struct definition. This is dead/commented code that adds noise; if the data is needed it should be deserialized, otherwise removed.","fix":"Remove the commented-out `date`/`files` fields, or implement them properly if the data is needed.","locations":[{"ref":"src/remote_node_index.rs:60-67","code":"   60 | #[derive(Deserialize, Debug)]\n   61 | pub struct IndexedNodeVersion {\n   62 |     pub version: Version,\n   63 |     #[serde(with = \"lts_status\")]\n   64 |     pub lts: Option<String>,\n   65 |     // pub date: chrono::NaiveDate,\n   66 |     // pub files: Vec<String>,\n   67 | }","lines":8}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment \"handle common case: Apple Silicon / Node < 16\" is duplicated verbatim above the Windows `get_safe_arch`\nimplementation, which simply returns the arch unchanged and has nothing to do with Apple Silicon or Node < 16. The comment is\nmisleading for the Windows variant.","fix":"Remove or correct the comment on the Windows `get_safe_arch` (e.g. \"no arch remapping needed on Windows\").","locations":[{"ref":"src/arch.rs:44-48","code":"   44 | #[cfg(windows)]\n   45 | /// handle common case: Apple Silicon / Node < 16\n   46 | pub fn get_safe_arch(arch: Arch, _version: &Version) -> Arch {\n   47 |     arch\n   48 | }","lines":5}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment in env.rs says `Call use internally for the initial directory, so the shell doesn't need to spawn a subprocess`, but `shell.use_on_cd(config)` on the following line still emits the on-cd hook that spawns fnm later; the comment describes only the immediate call and may mislead a reader into thinking no subprocess hook is generated.","fix":"Clarify the comment to state it only avoids the subprocess for the *initial* evaluation, while still installing the per-cd hook.","locations":[{"ref":"src/commands/env.rs:140-142","code":"  140 |         if self.use_on_cd {\n  141 |             // Call `use` internally for the initial directory, so the shell doesn't\n  142 |             // need to spawn a subprocess after evaluating the env output.","lines":3}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment on `remote_node_index::list` says \"Prints\" and then contains a ```rust code block that is a misleading/non-functional doctest (`use crate::remote_node_index::list;` - `crate` is not valid in an external doctest context and the function does not print anything; it returns a sorted Vec). The comment does not describe what the function does.","fix":"Replace with an accurate description, e.g. \"Fetches and returns the list of available Node versions from `<base_url>/index.json`, sorted ascending by version.\"","locations":[{"ref":"src/remote_node_index.rs:79-84","code":"   79 | /// Prints\n   80 | ///\n   81 | /// ```rust\n   82 | /// use crate::remote_node_index::list;\n   83 | /// ```\n   84 | pub fn list(base_url: &Url) -> Result<Vec<IndexedNodeVersion>, Error> {","lines":6}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The TODO comment in src/version.rs:80-81 describes adding a `BinPath` trait for `&Path`/`PathBuf` to unify `.bin_path()` across platforms, but it is placed in the middle of version.rs between unrelated impl blocks and refers to functionality that is unrelated to the `Version` type. It is stale orientation noise in a file about version parsing.","fix":"Move the TODO to the relevant module (e.g. src/fs.rs or a path-utilities module) or track it as an issue, and remove it from version.rs.","locations":[{"ref":"src/version.rs:80-81","code":"   80 | // TODO: add a trait called BinPath that &Path and PathBuf implements\n   81 | // which adds the `.bin_path()` which works both on windows and unix :)","lines":2}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The `extract::Error` enum (in src/archive/extract.rs) and the downloader's `Error` enum manually reimplement the same boilerplate pattern of wrapping `io::Error` / `http::Error` with `Display`/`From` impls. `extract::Error` hand-writes `Display`, `StdError`, and three `From` impls (~35 lines) while the rest of the crate uses `thiserror` derive for the identical pattern, creating inconsistent, duplicated error-wiring.","fix":"Convert `extract::Error` to use `#[derive(thiserror::Error)]` with `#[from]`/`#[error(transparent)]` as done in downloader.rs and remote_node_index.rs, eliminating the hand-written impls.","locations":[{"ref":"src/archive/extract.rs:4-39","code":"    4 | #[derive(Debug)]\n    5 | pub enum Error {\n    6 |     IoError(std::io::Error),\n    7 |     ZipError(zip::result::ZipError),\n    8 |     HttpError(crate::http::Error),\n    9 | }\n   10 | \n   11 | impl std::fmt::Display for Error {\n   12 |     fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n   13 |         match self {\n   14 |             Self::IoError(x) => x.fmt(f),\n   15 |             Self::ZipError(x) => x.fmt(f),\n   16 |             Self::HttpError(x) => x.fmt(f),\n   17 |         }\n   18 |     }\n   19 | }\n   20 | \n   21 | impl StdError for Error {}\n   22 | \n   23 | impl From<std::io::Error> for Error {\n   24 |     fn from(err: std::io::Error) -> Self {\n   25 |         Self::IoError(err)\n   26 |     }\n   27 | }\n   28 | \n   29 | impl From<zip::result::ZipError> for Error {\n   30 |     fn from(err: zip::result::ZipError) -> Self {\n   31 |         Self::ZipError(err)\n   32 |     }\n   33 | }\n   34 | \n   35 | impl From<crate::http::Error> for Error {\n   36 |     fn from(err: crate::http::Error) -> Self {\n   37 |         Self::HttpError(err)\n   38 |     }\n   39 | }","lines":36}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The `CantInferShell` error variant (with its identical multi-line `#[error(...)]` message) and the `shells_as_string()` helper function are duplicated verbatim between completions.rs and env.rs. Changes to the wording or shell list must be made in two places, risking divergence.","fix":"Extract a shared error type and a single `shells_as_string()` helper (e.g. in the shell module) and reuse it from both commands.","locations":[{"ref":"src/commands/completions.rs:36-52","code":"   36 |     #[error(\n   37 |         \"{}\\n{}\\n{}\\n{}\",\n   38 |         \"Can't infer shell!\",\n   39 |         \"fnm can't infer your shell based on the process tree.\",\n   40 |         \"Maybe it is unsupported? we support the following shells:\",\n   41 |         shells_as_string()\n   42 |     )]\n   43 |     CantInferShell,\n   44 | }\n   45 | \n   46 | fn shells_as_string() -> String {\n   47 |     Shells::value_variants()\n   48 |         .iter()\n   49 |         .map(|x| format!(\"* {x}\"))\n   50 |         .collect::<Vec<_>>()\n   51 |         .join(\"\\n\")\n   52 | }","lines":17},{"ref":"src/commands/env.rs:176-183","code":"  176 |     #[error(\n  177 |         \"{}\\n{}\\n{}\\n{}\",\n  178 |         \"Can't infer shell!\",\n  179 |         \"fnm can't infer your shell based on the process tree.\",\n  180 |         \"Maybe it is unsupported? we support the following shells:\",\n  181 |         shells_as_string()\n  182 |     )]\n  183 |     CantInferShell,","lines":8},{"ref":"src/commands/env.rs:197-203","code":"  197 | fn shells_as_string() -> String {\n  198 |     Shells::value_variants()\n  199 |         .iter()\n  200 |         .map(|x| format!(\"* {x}\"))\n  201 |         .collect::<Vec<_>>()\n  202 |         .join(\"\\n\")\n  203 | }","lines":7}]},{"id":"DUPLIC_3","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The use_on_cd implementations across bash.rs, zsh.rs, fish.rs and powershell.rs repeat the same structure: build a `version_file_exists_condition` string (engines vs non-engines), then match on VersionFileStrategy::{Local,Recursive} to build an autoload_hook, with the only differences being the shell-specific test syntax and the wrapper template. This is ~15 lines duplicated four times with identical logic, making it easy to update one shell (e.g. add a new version-file name) and forget the others.","fix":"Factor the strategy/engines decision into a shared helper that takes the per-shell test-syntax fragments and returns the autoload hook body, so the version-file list lives in one place.","locations":[{"ref":"src/shell/bash.rs:28-44","code":"   28 |     fn use_on_cd(&self, config: &crate::config::FnmConfig) -> anyhow::Result<String> {\n   29 |         let version_file_exists_condition = if config.resolve_engines() {\n   30 |             \"-f .node-version || -f .nvmrc || -f package.json\"\n   31 |         } else {\n   32 |             \"-f .node-version || -f .nvmrc\"\n   33 |         };\n   34 |         let autoload_hook = match config.version_file_strategy() {\n   35 |             VersionFileStrategy::Local => formatdoc!(\n   36 |                 r\"\n   37 |                     if [[ {version_file_exists_condition} ]]; then\n   38 |                         fnm use --silent-if-unchanged\n   39 |                     fi\n   40 |                 \",\n   41 |                 version_file_exists_condition = version_file_exists_condition,\n   42 |             ),\n   43 |             VersionFileStrategy::Recursive => String::from(r\"fnm use --silent-if-unchanged\"),\n   44 |         };","lines":17},{"ref":"src/shell/zsh.rs:32-48","code":"   32 |     fn use_on_cd(&self, config: &crate::config::FnmConfig) -> anyhow::Result<String> {\n   33 |         let version_file_exists_condition = if config.resolve_engines() {\n   34 |             \"-f .node-version || -f .nvmrc || -f package.json\"\n   35 |         } else {\n   36 |             \"-f .node-version || -f .nvmrc\"\n   37 |         };\n   38 |         let autoload_hook = match config.version_file_strategy() {\n   39 |             VersionFileStrategy::Local => formatdoc!(\n   40 |                 r\"\n   41 |                     if [[ {version_file_exists_condition} ]]; then\n   42 |                         fnm use --silent-if-unchanged\n   43 |                     fi\n   44 |                 \",\n   45 |                 version_file_exists_condition = version_file_exists_condition,\n   46 |             ),\n   47 |             VersionFileStrategy::Recursive => String::from(r\"fnm use --silent-if-unchanged\"),\n   48 |         };","lines":17},{"ref":"src/shell/fish.rs:28-44","code":"   28 |     fn use_on_cd(&self, config: &crate::config::FnmConfig) -> anyhow::Result<String> {\n   29 |         let version_file_exists_condition = if config.resolve_engines() {\n   30 |             \"test -f .node-version -o -f .nvmrc -o -f package.json\"\n   31 |         } else {\n   32 |             \"test -f .node-version -o -f .nvmrc\"\n   33 |         };\n   34 |         let autoload_hook = match config.version_file_strategy() {\n   35 |             VersionFileStrategy::Local => formatdoc!(\n   36 |                 r\"\n   37 |                     if {version_file_exists_condition}\n   38 |                         fnm use --silent-if-unchanged\n   39 |                     end\n   40 |                 \",\n   41 |                 version_file_exists_condition = version_file_exists_condition,\n   42 |             ),\n   43 |             VersionFileStrategy::Recursive => String::from(r\"fnm use --silent-if-unchanged\"),\n   44 |         };","lines":17},{"ref":"src/shell/powershell.rs:28-42","code":"   28 |     fn use_on_cd(&self, config: &crate::config::FnmConfig) -> anyhow::Result<String> {\n   29 |         let version_file_exists_condition = if config.resolve_engines() {\n   30 |             \"(Test-Path .nvmrc) -Or (Test-Path .node-version) -Or (Test-Path package.json)\"\n   31 |         } else {\n   32 |             \"(Test-Path .nvmrc) -Or (Test-Path .node-version)\"\n   33 |         };\n   34 |         let autoload_hook = match config.version_file_strategy() {\n   35 |             VersionFileStrategy::Local => formatdoc!(\n   36 |                 r\"\n   37 |                     If ({version_file_exists_condition}) {{ & fnm use --silent-if-unchanged }}\n   38 |                 \",\n   39 |                 version_file_exists_condition = version_file_exists_condition,\n   40 |             ),\n   41 |             VersionFileStrategy::Recursive => String::from(r\"fnm use --silent-if-unchanged\"),\n   42 |         };","lines":15}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","description":"PowerShell's set_env_var interpolates the value directly into a double-quoted string without any escaping: `$env:{name} = \"{value}\"`. Unlike Bash/Zsh/Fish (which use Rust's {:?} Debug formatting to add quotes/escapes), the value here is inserted raw. Values come from user-controllable sources such as FNM_NODE_DIST_MIRROR (an arbitrary URL/string) and FNM_DIR/FNM_MULTISHELL_PATH (filesystem paths that may contain `\"` or backtick). A value containing a double quote, backtick, or `$(...)` breaks out of the string literal and is interpreted by PowerShell, producing a code-injection / broken-output vector when the env script is evaluated.","fix":"Escape the value for a PowerShell double-quoted string before interpolation: replace backtick with double-backtick and double-quote with backtick-quote (and `$` -> backtick-dollar), e.g. produce a properly escaped literal, or use a single-quoted PowerShell string with `'` doubled.","locations":[{"ref":"src/shell/powershell.rs:24-26","code":"   24 |     fn set_env_var(&self, name: &str, value: &str) -> String {\n   25 |         format!(r#\"$env:{name} = \"{value}\"\"#)\n   26 |     }","lines":3}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"medium","description":"Bash/Zsh/Fish path() and set_env_var rely on Rust's {:?} Debug formatting to quote shell values. Rust Debug only escapes `\\` and `\"`; it does NOT escape `$` or backtick. Inside a POSIX double-quoted string these remain active, so a value containing `$VAR`, `$(cmd)` or `` `cmd` `` (e.g. a base dir path or a FNM_NODE_DIST_MIRROR mirror URL with such characters) is subject to parameter expansion / command substitution when the generated `export NAME=\"...\"` line is eval'd by the shell. {:?} is not a correct shell-quoting mechanism.","fix":"Use a real shell-quoting routine (e.g. wrap in single quotes with embedded single-quotes escaped as '\\'') instead of relying on the {:?} Debug formatter, which does not neutralize `$` and backtick in double-quoted contexts.","locations":[{"ref":"src/shell/bash.rs:21","code":"   21 |         Ok(format!(\"export PATH={path:?}:\\\"$PATH\\\"\"))","lines":1},{"ref":"src/shell/bas
