<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"`buffer_size()` calls `.expect(\"ASIO stream has neither input nor output\")` on the result of `streams.output.or(streams.input)`. While normally one of them is set, the event callback handling `kAsioBufferSizeChange` (and the stream-rollback paths on error) can set `streams.input`/`streams.output` to `None`, and a buffer-size-change race or a teardown sequence can transiently leave both empty. A user calling `buffer_size()` then panics. A public API method should never panic on driver-controlled state.","fix":"Return `Err(Error::with_message(ErrorKind::StreamInvalidated, ...))` instead of `.expect(...)` when both streams are `None`.","locations":[{"ref":"src/host/asio/stream.rs:110-120","code":"  110 |     pub fn buffer_size(&self) -> Result<FrameCount, Error> {\n  111 |         let streams = self.asio_streams.lock().map_err(|_| {\n  112 |             Error::with_message(ErrorKind::StreamInvalidated, \"Stream lock poisoned\")\n  113 |         })?;\n  114 |         Ok(streams\n  115 |             .output\n  116 |             .as_ref()\n  117 |             .or(streams.input.as_ref())\n  118 |             .expect(\"ASIO stream has neither input nor output\")\n  119 |             .buffer_size as FrameCount)\n  120 |     }","lines":11}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"`Stream::play` calls `web_sys::window().unwrap()`. In a Web Worker / AudioWorklet-less context (or any environment where `window` is undefined, e.g. running cpal under a worker), `window()` returns `None` and this panics across the FFI boundary inside a WASM module, which is undefined-behaviour-adjacent and at minimum aborts the stream start. `play()` returns `Result<(), Error>`, so this should be a recoverable error.","fix":"Replace `.unwrap()` with `ok_or_else(|| Error::with_message(ErrorKind::DeviceNotAvailable, \"no window available\"))?` and propagate the error.","locations":[{"ref":"src/host/webaudio/mod.rs:588","code":"  588 |         let window = web_sys::window().unwrap();","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"`create_buffers` calls `panic!(\"ASIOGetBufferSize produced unusable preferred buffer size of {}\")` when `buffer_sizes.pref <= 0`. A misbehaving driver reporting a non-positive preferred buffer size will crash the application from within stream construction rather than returning a recoverable error.","fix":"Return `Err(AsioError::InvalidBufferSize)` instead of panicking.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:676-681","code":"  676 |         if buffer_sizes.pref <= 0 {\n  677 |             panic!(\n  678 |                 \"`ASIOGetBufferSize` produced unusable preferred buffer size of {}\",\n  679 |                 buffer_sizes.pref,\n  680 |             );\n  681 |         }","lines":6}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"`stream_data_type` does `FromPrimitive::from_i32(channel_info.type_).expect(\"unknown ASIOSampletype value\")`. The driver fully controls `type_`; ASIO defines sample-type values (e.g. DSD variants, the MSB16/18/20/24 variants) that are valid per the SDK but absent from many drivers, and a non-conformant or future driver can return any i32. This is reachable during device enumeration (`input_data_type`/`output_data_type`) and during stream build, so a single odd driver panics the whole process instead of being skipped.","fix":"Return `Err(AsioError::UnknownError)` (or a dedicated error) instead of `.expect(...)` so the caller can skip the device.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:1081-1084","code":" 1081 | fn stream_data_type(is_input: bool) -> Result<AsioSampleType, AsioError> {\n 1082 |     let channel_info = asio_channel_info(0, is_input)?;\n 1083 |     Ok(FromPrimitive::from_i32(channel_info.type_).expect(\"unknown `ASIOSampletype` value\"))\n 1084 | }","lines":4}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"JACK process callback writes input data with `self.temp_input_buffer[ch_ix + i * num_in_channels]` where `i` runs `0..current_frame_count` and `current_frame_count = process_scope.n_frames()`. The temp buffer is sized `in_ports.len() * self.buffer_size`. The `buffer_size` callback resizes the temp buffers, but JACK does not guarantee the `buffer_size` callback fires before the first `process` call with a larger n_frames in all reconfiguration races; if `n_frames > buffer_size` the indexing panics in the real-time thread (and `temp_buffer_to_data` also panics, as its own comment on line 419 admits). A panic in the JACK process thread is undefined/abortive.","fix":"Clamp `current_frame_count` to `self.buffer_size` (or `min` of the two) before indexing, or grow the temp buffers on demand at the top of `process` if `n_frames` exceeds the current capacity.","locations":[{"ref":"src/host/jack/stream.rs:446-456","code":"  446 |             for ch_ix in 0..num_in_channels {\n  447 |                 let input_channel = &self.in_ports[ch_ix].as_slice(process_scope);\n  448 |                 for i in 0..current_frame_count {\n  449 |                     self.temp_input_buffer[ch_ix + i * num_in_channels] = input_channel[i];\n  450 |                 }\n  451 |             }\n  452 |             // Create a slice of exactly current_frame_count frames\n  453 |             let data = temp_buffer_to_data(\n  454 |                 &mut self.temp_input_buffer,\n  455 |                 current_frame_count * num_in_channels,\n  456 |             );","lines":11},{"ref":"src/host/jack/stream.rs:418-420","code":"  418 |         // This should be equal to self.buffer_size, but the implementation will\n  419 |         // work even if it is less. Will panic in `temp_buffer_to_data` if greater.\n  420 |         let current_frame_count = process_scope.n_frames() as usize;","lines":3}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"`Device::description` calls `device.OpenPropertyStore(STGM_READ).expect(\"could not open property store\")`. OpenPropertyStore can fail at runtime (device invalidated/disconnected, access denied), and this is reachable from the public `DeviceTrait::description` and from the `Display`/`Debug` impls, so a disconnected device panics the caller instead of returning an Error.","fix":"Propagate the failure as an `Error` via `?`/`map_err(Error::from)` instead of `.expect`.","locations":[{"ref":"src/host/wasapi/device.rs:426-428","code":"  426 |             let property_store = device\n  427 |                 .OpenPropertyStore(STGM_READ)\n  428 |                 .expect(\"could not open property store\");","lines":3}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"`get_enumerator()` calls `CoCreateInstance(MMDeviceEnumerator)` and `.unwrap()`s the result. This is the foundation for almost every device operation (enumeration, default device lookup, the DefaultDeviceMonitor). On systems where the Windows Audio service is stopped/disabled or COM is in an incompatible state, CoCreateInstance can fail (e.g. REGDB_E_CLASSNOTREG, audio service not running), and the whole process panics instead of returning a recoverable cpal Error.","fix":"Return a `Result<&'static Enumerator, Error>` (or store the HRESULT and surface it) instead of `.unwrap()`, and propagate the error through the public APIs that call it.","locations":[{"ref":"src/host/wasapi/device.rs:1192-1210","code":" 1192 | fn get_enumerator() -> &'static Enumerator {\n 1193 |     ENUMERATOR.get_or_init(|| {\n 1194 |         // COM initialization is thread local, but we only need to have COM initialized in the\n 1195 |         // thread we create the objects in\n 1196 |         com::com_initialized();\n 1197 | \n 1198 |         // building the devices enumerator object\n 1199 |         unsafe {\n 1200 |             let enumerator = Com::CoCreateInstance::<_, Audio::IMMDeviceEnumerator>(\n 1201 |                 &Audio::MMDeviceEnumerator,\n 1202 |                 None,\n 1203 |                 Com::CLSCTX_ALL,\n 1204 |             )\n 1205 |             .unwrap();\n 1206 | \n 1207 |             Enumerator(enumerator)\n 1208 |         }\n 1209 |     })\n 1210 | }","lines":19}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"`Devices::next` calls `self.collection.Item(self.next_item).unwrap()`. IMMDeviceCollection::Item can fail (E_INVALIDARG, or a device removed between GetCount and iteration in a TOCTOU window), which would panic during a plain iteration over devices in user code.","fix":"Map the error: on `Err`, either skip the item (advance next_item and recurse/continue) or terminate iteration by returning None. Do not unwrap inside Iterator::next.","locations":[{"ref":"src/host/wasapi/device.rs:1314-1324","code":" 1314 |     fn next(&mut self) -> Option<Self::Item> {\n 1315 |         if self.next_item >= self.total_count {\n 1316 |             return None;\n 1317 |         }\n 1318 | \n 1319 |         unsafe {\n 1320 |             let device = self.collection.Item(self.next_item).unwrap();\n 1321 |             self.next_item += 1;\n 1322 |             Some(Self::Item::from_immdevice(device))\n 1323 |         }\n 1324 |     }","lines":11}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"Several `.read().unwrap()` / `.write().unwrap()` calls on the `ClosureHandle` RwLock and the time-cursor RwLock will panic if the lock is poisoned. While WASM is single-threaded so poisoning is unlikely, a panic inside the JS `ended` callback (e.g. from `from_secs_f64` on a bad time) unwinds into JS as an abort. The `.expect(\"Unable to get a read lock on the time cursor\")` at line 381 is the same pattern. These run in the audio scheduling hot path.","fix":"Use `unwrap_or_else(|e| e.into_inner())` for lock recovery (as is already done for the data/error callback mutexes) instead of `.unwrap()`/`.expect()`.","locations":[{"ref":"src/host/webaudio/mod.rs:373-375","code":"  373 |             on_ended_closure\n  374 |                 .write()\n  375 |                 .unwrap()","lines":3},{"ref":"src/host/webaudio/mod.rs:379-381","code":"  379 |                         let time_at_start_of_buffer = time_handle\n  380 |                             .read()\n  381 |                             .expect(\"Unable to get a read lock on the time cursor\");","lines":3},{"ref":"src/host/webaudio/mod.rs:528-533","code":"  528 |                                 .read()\n  529 |                                 .unwrap()\n  530 |                                 .as_ref()\n  531 |                                 .unwrap()\n  532 |                                 .as_ref()\n  533 |                                 .unchecked_ref(),","lines":6},{"ref":"src/host/webaudio/mod.rs:562","code":"  562 |                     *time_handle.write().unwrap() = time_at_start_of_buffer + buffer_time_step_secs;","lines":1},{"ref":"src/host/webaudio/mod.rs:608-617","code":"  608 |                             on_ended_closure\n  609 |                                 .read()\n  610 |                                 .unwrap()\n  611 |                                 .as_ref()\n  612 |                                 .unwrap()\n  613 |                                 .as_ref()\n  614 |                                 .unchecked_ref(),\n  615 |                             offset_ms,\n  616 |                         )\n  617 |                         .unwrap();","lines":10}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"The output playback timestamp is built with `StreamInstant::from_secs_f64(time_at_start_of_buffer + total_hw_latency_secs)` and `from_secs_f64(now)`. `StreamInstant::from_secs_f64` panics if the value is negative, non-finite, or overflows u64 nanoseconds (see src/timestamp.rs:151-167). `now` comes from `ctx.current_time()` and the scheduled time is derived from it; these are normally fine, but a non-finite/very large context time (or a misbehaving polyfill) makes the audio scheduling closure panic and abort. The audioworklet backend has the same exposure at mod.rs:397 and 417 (`StreamInstant::from_secs_f64(now)` where `now` is a raw f64 from JS).","fix":"Guard against non-finite/negative values before calling from_secs_f64, or add a non-panicking try_from_secs_f64 and emit an error / clamp instead of panicking in the callback.","locations":[{"ref":"src/host/webaudio/mod.rs:417-420","code":"  417 |                                 let callback = StreamInstant::from_secs_f64(now);\n  418 |                                 let playback = StreamInstant::from_secs_f64(\n  419 |                                     time_at_start_of_buffer + total_hw_latency_secs,\n  420 |                                 );","lines":4},{"ref":"src/host/audioworklet/mod.rs:397","code":"  397 |                             let callback = StreamInstant::from_secs_f64(now);","lines":1},{"ref":"src/host/audioworklet/mod.rs:463-465","code":"  463 |     fn now(&self) -> StreamInstant {\n  464 |         StreamInstant::from_secs_f64(self.audio_context.current_time())\n  465 |     }","lines":3}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"`set_timeout_with_callback_and_timeout_and_arguments_0(...).unwrap()` in `play()` panics if the browser refuses to schedule the timeout (e.g. throws). Since `play()` is fallible, a thrown JS exception should be converted to an `Error`, not unwrapped.","fix":"Match on the result and return an Error (ErrorKind::DeviceNotAvailable / BackendError) instead of `.unwrap()`.","locations":[{"ref":"src/host/webaudio/mod.rs:606-617","code":"  606 |                     window\n  607 |                         .set_timeout_with_callback_and_timeout_and_arguments_0(\n  608 |                             on_ended_closure\n  609 |                                 .read()\n  610 |                                 .unwrap()\n  611 |                                 .as_ref()\n  612 |                                 .unwrap()\n  613 |                                 .as_ref()\n  614 |                                 .unchecked_ref(),\n  615 |                             offset_ms,\n  616 |                         )\n  617 |                         .unwrap();","lines":12}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","description":"`is_webaudio_available()` calls `js_sys::Reflect::get(&js_sys::global(), ...).unwrap()`. `Reflect::get` returns a `Result`; if it errors (it normally won't for a global lookup, but it can throw for exotic globals/proxies) this panics. `is_available()`/`devices()`/`default_output_device()` all funnel through this and are expected to be infallible-but-safe, so a panic here is inappropriate.","fix":"Use `.ok().map(|v| v.is_truthy()).unwrap_or(false)` instead of `.unwrap().is_truthy()`.","locations":[{"ref":"src/host/webaudio/mod.rs:681-685","code":"  681 | fn is_webaudio_available() -> bool {\n  682 |     js_sys::Reflect::get(&js_sys::global(), &JsValue::from(\"AudioContext\"))\n  683 |         .unwrap()\n  684 |         .is_truthy()\n  685 | }","lines":5}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","description":"`build_input_stream`/`build_output_stream` wrap the raw stream callback with `.expect(\"host supplied incorrect sample type\")` on `data.as_slice()`/`as_slice_mut()`. This expect runs inside the realtime audio callback on every buffer. If a backend ever delivers a `Data` whose `sample_format` does not match `T::FORMAT` (a backend bug, or a config the backend silently changed), the audio thread panics, which on many platforms aborts the process or unwinds across an FFI boundary (UB). A realtime callback should not contain a panic path.","fix":"Route the mismatch through the user error_callback (or document it as a hard invariant verified at stream-build time) rather than panicking inside the per-buffer realtime callback.","locations":[{"ref":"src/traits.rs:254-260","code":"  254 |             move |data, info| {\n  255 |                 data_callback(\n  256 |                     data.as_slice()\n  257 |                         .expect(\"host supplied incorrect sample type\"),\n  258 |                     info,\n  259 |                 )\n  260 |             },","lines":7},{"ref":"src/traits.rs:310-316","code":"  310 |             move |data, info| {\n  311 |                 data_callback(\n  312 |                     data.as_slice_mut()\n  313 |                         .expect(\"host supplied incorrect sample type\"),\n  314 |                     info,\n  315 |                 )\n  316 |             },","lines":7}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","description":"`now_stream_instant` asserts `clock_gettime(CLOCK_MONOTONIC) == 0`. This runs on the realtime audio callback thread for every callback (both input and output). On the astronomically unlikely failure of clock_gettime it panics inside the AAudio callback thread, aborting the process rather than degrading gracefully.","fix":"On failure, fall back to a best-effort instant (e.g. return StreamInstant::from_nanos(0) or the previous value) instead of asserting in the audio hot path.","locations":[{"ref":"src/host/aaudio/convert.rs:8-16","code":"    8 | pub fn now_stream_instant() -> StreamInstant {\n    9 |     let mut ts = libc::timespec {\n   10 |         tv_sec: 0,\n   11 |         tv_nsec: 0,\n   12 |     };\n   13 |     let res = unsafe { libc::clock_gettime(libc::CLOCK_MONOTONIC, &mut ts) };\n   14 |     assert_eq!(res, 0, \"clock_gettime(CLOCK_MONOTONIC) failed\");\n   15 |     StreamInstant::new(ts.tv_sec as u64, ts.tv_nsec as u32)\n   16 | }","lines":9}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","description":"`process_input_callback_i24` calls `I24::new(sample).unwrap()` inside the realtime buffer callback. `i24_bytes_to_i32` sign-extends a 24-bit value into the range [-8388608, 8388607], which `I24::new` should accept, so this is normally safe; but if the ASIO buffer ever contains an unexpected byte layout the unwrap would panic on the audio thread. Panicking across the C ABI ASIO callback boundary is UB.","fix":"Mask to 24 bits before constructing (`I24::new(sample).unwrap_or_default()`), or construct via a method that cannot fail given the guaranteed range.","locations":[{"ref":"src/host/asio/stream.rs:1374-1378","code":" 1374 |             let sample = i24_bytes_to_i32(\n 1375 |                 &[channel_sample[0], channel_sample[1], channel_sample[2]],\n 1376 |                 little_endian,\n 1377 |             );\n 1378 |             *sample_in_buffer = I24::new(sample).unwrap();","lines":5}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","description":"In the render/input callbacks `buffer_frames = len / channels as usize` divides by `mNumberChannels` taken directly from the CoreAudio-supplied AudioBuffer. If a buffer reports zero channels this panics (divide by zero) on the realtime audio thread, which aborts the process. The macOS paths divide unconditionally.","fix":"Guard against zero, e.g. `len.checked_div(channels as usize).unwrap_or(0)`, matching the defensive pattern already used in the iOS callbacks (ios/mod.rs:546,591).","locations":[{"ref":"src/host/coreaudio/macos/device.rs:781","code":"  781 |             let buffer_frames = len / channels as usize;","lines":1},{"ref":"src/host/coreaudio/macos/device.rs:892","code":"  892 |             let buffer_frames = len / channels as usize;","lines":1}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","description":"Stream::now() unwraps host_time_to_stream_instant with .expect(\"mach_timebase_info failed\"). now() is part of the public StreamTrait API; although mach_timebase_info essentially never fails, an error path is reachable and would panic in user code rather than returning an error.","fix":"Either change the trait to return Result, or fall back to StreamInstant::ZERO / a cached timebase instead of panicking.","locations":[{"ref":"src/host/coreaudio/macos/mod.rs:369-372","code":"  369 |     fn now(&self) -> StreamInstant {\n  370 |         let m_host_time = unsafe { mach2::mach_time::mach_absolute_time() };\n  371 |         host_time_to_stream_instant(m_host_time).expect(\"mach_timebase_info failed\")\n  372 |     }","lines":4},{"ref":"src/host/coreaudio/ios/mod.rs:310-313","code":"  310 |     fn now(&self) -> StreamInstant {\n  311 |         let m_host_time = unsafe { mach2::mach_time::mach_absolute_time() };\n  312 |         host_time_to_stream_instant(m_host_time).expect(\"mach_timebase_info failed\")\n  313 |     }","lines":4}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","description":"The null backend's `DeviceTrait`, `StreamTrait`, and the supported-config accessors are implemented with `unimplemented!()`, which panics if called. The null host is the fallback for unsupported platforms; `HostTrait::is_available()` returns false but `devices()` returns `Ok(Devices)` and `Device::description()`/`id()` succeed, so a downstream crate that enumerates the null device and then calls `supported_output_configs()`, `default_output_config()`, `build_*_stream_raw()`, `play()`, `pause()`, `now()`, or `buffer_size()` gets a hard panic rather than a recoverable `Err`. `Device`'s `Display` impl calls `description()` (which is fine), but the rest are panics on an otherwise-usable-looking handle.","fix":"Return `Err(Error::new(ErrorKind::DeviceNotAvailable))` (or `BackendSpecific`) from these methods instead of `unimplemented!()`. For the iterator-returning config methods, return an empty `SupportedInputConfigs`/`SupportedOutputConfigs` (they already yield `None`), and for `now()`/`buffer_size()` return an error or a zero instant rather than panicking.","locations":[{"ref":"src/host/null/mod.rs:61-67","code":"   61 |     fn supported_input_configs(&self) -> Result<SupportedInputConfigs, Error> {\n   62 |         unimplemented!()\n   63 |     }\n   64 | \n   65 |     fn supported_output_configs(&self) -> Result<SupportedOutputConfigs, Error> {\n   66 |         unimplemented!()\n   67 |     }","lines":7},{"ref":"src/host/null/mod.rs:69-75","code":"   69 |     fn default_input_config(&self) -> Result<SupportedStreamConfig, Error> {\n   70 |         unimplemented!()\n   71 |     }\n   72 | \n   73 |     fn default_output_config(&self) -> Result<SupportedStreamConfig, Error> {\n   74 |         unimplemented!()\n   75 |     }","lines":7},{"ref":"src/host/null/mod.rs:77-106","code":"   77 |     fn build_input_stream_raw<D, E>(\n   78 |         &self,\n   79 |         _config: StreamConfig,\n   80 |         _sample_format: SampleFormat,\n   81 |         _data_callback: D,\n   82 |         _error_callback: E,\n   83 |         _timeout: Option<Duration>,\n   84 |     ) -> Result<Self::Stream, Error>\n   85 |     where\n   86 |         D: FnMut(&Data, &InputCallbackInfo) + Send + 'static,\n   87 |         E: FnMut(Error) + Send + 'static,\n   88 |     {\n   89 |         unimplemented!()\n   90 |     }\n   91 | \n   92 |     /// Create an output stream.\n   93 |     fn build_output_stream_raw<D, E>(\n   94 |         &self,\n   95 |         _config: StreamConfig,\n   96 |         _sample_format: SampleFormat,\n   97 |         _data_callback: D,\n   98 |         _error_callback: E,\n   99 |         _timeout: Option<Duration>,\n  100 |     ) -> Result<Self::Stream, Error>\n  101 |     where\n  102 |         D: FnMut(&mut Data, &OutputCallbackInfo) + Send + 'static,\n  103 |         E: FnMut(Error) + Send + 'static,\n  104 |     {\n  105 |         unimplemented!()\n  106 |     }","lines":30},{"ref":"src/host/null/mod.rs:130-146","code":"  130 | impl StreamTrait for Stream {\n  131 |     fn play(&self) -> Result<(), Error> {\n  132 |         unimplemented!()\n  133 |     }\n  134 | \n  135 |     fn pause(&self) -> Result<(), Error> {\n  136 |         unimplemented!()\n  137 |     }\n  138 | \n  139 |     fn now(&self) -> StreamInstant {\n  140 |         unimplemented!()\n  141 |     }\n  142 | \n  143 |     fn buffer_size(&self) -> Result<FrameCount, Error> {\n  144 |         unimplemented!()\n  145 |     }\n  146 | }","lines":17}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","description":"PipeWire `connect_output`/`connect_input` call `PodSerializer::serialize(...).unwrap()` and `Pod::from_bytes(&values).unwrap()` on the serialized format object. These run during stream connection (worker thread). While the inputs are constructed locally and serialization \"should not\" fail, an `unwrap` on a fallible serialize/parse of an external-library POD is a panic waiting on any libspa/POD-format change; it would crash the spawned stream thread rather than returning an Err.","fix":"Propagate these as `pw::Error` (the function already returns `Result<_, pw::Error>`) via `?` / a mapped error instead of `unwrap()`.","locations":[{"ref":"src/host/pipewire/stream.rs:739-745","code":"  739 |     let values: Vec<u8> =\n  740 |         PodSerializer::serialize(std::io::Cursor::new(Vec::new()), &Value::Object(obj))\n  741 |             .unwrap()\n  742 |             .0\n  743 |             .into_inner();\n  744 | \n  745 |     let mut params = [Pod::from_bytes(&values).unwrap()];","lines":7},{"ref":"src/host/pipewire/stream.rs:968-974","code":"  968 |     let values: Vec<u8> =\n  969 |         PodSerializer::serialize(std::io::Cursor::new(Vec::new()), &Value::Object(obj))\n  970 |             .unwrap()\n  971 |             .0\n  972 |             .into_inner();\n  973 | \n  974 |     let mut params = [Pod::from_bytes(&values).unwrap()];","lines":7}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","description":"`immendpoint_from_immdevice` (`.expect(\"could not query IMMDevice interface for IMMEndpoint\")`) and `data_flow_from_immendpoint` (`.expect(\"could not get endpoint data_flow\")`) panic on COM failure. These are reached via `Device::data_flow` -> `Endpoint::from`, which is called from many public entry points (supports_input/output, default_*_config, description). A device invalidated between enumeration and use will panic.","fix":"Make these helpers return `Result` and propagate, or make `data_flow` fall back to `EDataFlow` Unknown on failure instead of panicking.","locations":[{"ref":"src/host/wasapi/device.rs:184-194","code":"  184 | unsafe fn immendpoint_from_immdevice(device: Audio::IMMDevice) -> Audio::IMMEndpoint {\n  185 |     device\n  186 |         .cast::<Audio::IMMEndpoint>()\n  187 |         .expect(\"could not query IMMDevice interface for IMMEndpoint\")\n  188 | }\n  189 | \n  190 | unsafe fn data_flow_from_immendpoint(endpoint: &Audio::IMMEndpoint) -> Audio::EDataFlow {\n  191 |     endpoint\n  192 |         .GetDataFlow()\n  193 |         .expect(\"could not get endpoint data_flow\")\n  194 | }","lines":11},{"ref":"src/host/wasapi/device.rs:804-813","code":"  804 |     pub(crate) fn data_flow(&self) -> Audio::EDataFlow {\n  805 |         match &self.device {\n  806 |             DeviceHandle::DefaultOutput => Audio::eRender,\n  807 |             DeviceHandle::DefaultInput => Audio::eCapture,\n  808 |             DeviceHandle::Specific(device) => {\n  809 |                 let endpoint = Endpoint::from(device.clone());\n  810 |                 endpoint.data_flow()\n  811 |             }\n  812 |         }\n  813 |     }","lines":10}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","description":"`endpoint_ids_equal` and `hash_endpoint_id` call `device.GetId().expect(\"cpal: GetId failure\")`. These run inside `PartialEq::eq` and `Hash::hash` for `Device`, which are infallible trait methods, so a GetId failure (invalidated device) panics from inside e.g. a HashMap insert or equality comparison.","fix":"On GetId failure, treat the device as not-equal / hash a fixed sentinel rather than panicking, since Eq/Hash cannot return errors.","locations":[{"ref":"src/host/wasapi/device.rs:1074-1091","code":" 1074 | unsafe fn endpoint_ids_equal(a: &Audio::IMMDevice, b: &Audio::IMMDevice) -> bool {\n 1075 |     let id_a = a.GetId().expect(\"cpal: GetId failure\");\n 1076 |     let id_b = b.GetId().expect(\"cpal: GetId failure\");\n 1077 |     let _ga = ComString(id_a);\n 1078 |     let _gb = ComString(id_b);\n 1079 |     let mut off = 0isize;\n 1080 |     loop {\n 1081 |         let wa = *id_a.0.offset(off);\n 1082 |         let wb = *id_b.0.offset(off);\n 1083 |         if wa != wb {\n 1084 |             return false;\n 1085 |         }\n 1086 |         if wa == 0 {\n 1087 |             return true;\n 1088 |         }\n 1089 |         off += 1;\n 1090 |     }\n 1091 | }","lines":18},{"ref":"src/host/wasapi/device.rs:1097-1109","code":" 1097 | unsafe fn hash_endpoint_id<H: std::hash::Hasher>(device: &Audio::IMMDevice, state: &mut H) {\n 1098 |     let id = device.GetId().expect(\"cpal: GetId failure\");\n 1099 |     let _g = ComString(id);\n 1100 |     let mut off = 0isize;\n 1101 |     loop {\n 1102 |         let w = *id.0.offset(off);\n 1103 |         if w == 0 {\n 1104 |             break;\n 1105 |         }\n 1106 |         w.hash(state);\n 1107 |         off += 1;\n 1108 |     }\n 1109 | }","lines":13}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","description":"`push_command` does `Threading::SetEvent(self.pending_scheduled_event).unwrap()`. This is called from `play()`, `pause()` and `Stream::drop` (Terminate). If SetEvent ever fails (e.g. handle already closed during a racy teardown), play/pause/drop panics. The error from `send()` is handled gracefully but the SetEvent is not.","fix":"Replace `.unwrap()` with `let _ = Threading::SetEvent(...)` or propagate the error; a missed wakeup is not worth panicking the control thread, especially in Drop.","locations":[{"ref":"src/host/wasapi/stream.rs:458-464","code":"  458 |     fn push_command(&self, command: Command) -> Result<(), SendError<Command>> {\n  459 |         self.commands.send(command)?;\n  460 |         unsafe {\n  461 |             Threading::SetEvent(self.pending_scheduled_event).unwrap();\n  462 |         }\n  463 |         Ok(())\n  464 |     }","lines":7}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"AudioObjectRemovePropertyListener does not guarantee that an already-dispatched listener callback running on another (CoreAudio HAL) thread has completed before it returns. AudioObjectPropertyListener::drop/remove_inner removes the listener and then the Box<PropertyListenerCallbackWrapper> is freed immediately. A concurrently in-flight property_listener_handler_shim invocation dereferences the freed Box (`(*wrapper).0()`), a use-after-free. The same hazard applies to the RateListener used in set_sample_rate.","fix":"After removing the listener, ensure no callback can still run before freeing the closure: keep the callback box alive (e.g. leak it, or store callbacks in a registry that outlives the HAL), or serialize teardown with the HAL run loop. At minimum document the residual race; ideally hold the box behind an Arc that the shim upgrades.","locations":[{"ref":"src/host/coreaudio/macos/property_listener.rs:57-89","code":"   57 |     fn remove_inner(&mut self) -> Result<(), Error> {\n   58 |         unsafe {\n   59 |             coreaudio::Error::from_os_status(AudioObjectRemovePropertyListener(\n   60 |                 self.audio_object_id,\n   61 |                 NonNull::from(&self.property_address),\n   62 |                 Some(property_listener_handler_shim),\n   63 |                 &*self.callback as *const _ as *mut _,\n   64 |             ))?;\n   65 |         }\n   66 |         self.removed = true;\n   67 |         Ok(())\n   68 |     }\n   69 | }\n   70 | \n   71 | impl Drop for AudioObjectPropertyListener {\n   72 |     fn drop(&mut self) {\n   73 |         if !self.removed {\n   74 |             let _ = self.remove_inner();\n   75 |         }\n   76 |     }\n   77 | }\n   78 | \n   79 | /// Callback used to call user-provided closure as a property listener.\n   80 | unsafe extern \"C-unwind\" fn property_listener_handler_shim(\n   81 |     _: AudioObjectID,\n   82 |     _: u32,\n   83 |     _: NonNull<AudioObjectPropertyAddress>,\n   84 |     callback: *mut ::std::os::raw::c_void,\n   85 | ) -> OSStatus {\n   86 |     let wrapper = callback as *mut PropertyListenerCallbackWrapper;\n   87 |     (*wrapper).0();\n   88 |     0\n   89 | }","lines":33},{"ref":"src/host/coreaudio/macos/property_listener.rs:71-77","code":"   71 | impl Drop for AudioObjectPropertyListener {\n   72 |     fn drop(&mut self) {\n   73 |         if !self.removed {\n   74 |             let _ = self.remove_inner();\n   75 |         }\n   76 |     }\n   77 | }","lines":7}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"Undefined behavior from creating a misaligned slice. `fill_typed!` casts `buffer.as_mut_ptr()` (a `*mut u8`, alignment 1) to `*mut $sample_type` (u16/u32/u64, alignment 2/4/8) and calls `std::slice::from_raw_parts_mut`. Creating a slice from a pointer that is not properly aligned for the element type is immediate UB in Rust, independent of whether the subsequent writes are torn. The `debug_assert_eq!` only checks that the length is a multiple of the sample size, never alignment. The ALSA caller in src/host/alsa/mod.rs:673 passes a `vec![0u8; ...].into_boxed_slice()` whose backing allocation is only 1-byte aligned, so the U16/U24/U32/U64 paths can construct a misaligned `*mut u16`/`*mut u32`/`*mut u64` slice. WASAPI/pipewire buffers come from the OS and happen to be aligned in practice, but nothing in this API guarantees it.","fix":"Do not transmute the byte buffer. Write the equilibrium value byte-pattern instead: compute the little-/native-endian bytes of `EQUILIBRIUM` once and use `chunks_exact_mut(sample_size)` + `copy_from_slice`, or use `ptr::write_unaligned` in a loop over byte offsets. Alternatively assert alignment with `debug_assert_eq!(buffer.as_ptr() as usize % align_of::<$sample_type>(), 0)` and document/guarantee the contract at every call site (the ALSA boxed `Vec<u8>` would still violate it).","locations":[{"ref":"src/host/equilibrium.rs:24-29","code":"   24 |             let samples = unsafe {\n   25 |                 std::slice::from_raw_parts_mut(\n   26 |                     buffer.as_mut_ptr() as *mut $sample_type,\n   27 |                     num_samples,\n   28 |                 )\n   29 |             };","lines":6}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"`asio_channel_slice`/`asio_channel_slice_mut` build a Rust slice directly from `asio_stream.buffer_infos[channel_index].buffers[buffer_index]` raw pointers owned by the ASIO driver. These pointers are only valid between ASIO's `CreateBuffers` and `DisposeBuffers`. If a `kAsioBufferSizeChange` event updates `asio_stream.buffer_size` (event callback, line ~1054) without the driver having reissued `CreateBuffers`, or if a reset/dispose races the buffer callback, the slice length (`buffer_size`) and/or the pointers no longer match the live ASIO allocation, producing out-of-bounds reads/writes into freed or resized driver memory.","fix":"Treat buffer pointers and size as a single unit updated atomically only on a real CreateBuffers; do not mutate `buffer_size` from the event callback without re-fetching the buffer pointers, and ensure dispose cannot race the buffer callback.","locations":[{"ref":"src/host/asio/stream.rs:1200-1226","code":" 1200 | unsafe fn asio_channel_slice<T>(\n 1201 |     asio_stream: &sys::AsioStream,\n 1202 |     buffer_index: usize,\n 1203 |     channel_index: usize,\n 1204 |     requested_channel_length: Option<usize>,\n 1205 | ) -> &[T] {\n 1206 |     let channel_length = requested_channel_length.unwrap_or(asio_stream.buffer_size as usize);\n 1207 |     let buff_ptr: *const T =\n 1208 |         asio_stream.buffer_infos[channel_index].buffers[buffer_index] as *const _;\n 1209 |     std::slice::from_raw_parts(buff_ptr, channel_length)\n 1210 | }\n 1211 | \n 1212 | /// Shorthand for retrieving the asio buffer slice associated with a channel.\n 1213 | ///\n 1214 | /// The channel length is automatically inferred from the buffer size or some\n 1215 | /// value can be passed to enforce a certain length (for odd sized sample formats)\n 1216 | #[inline]\n 1217 | unsafe fn asio_channel_slice_mut<T>(\n 1218 |     asio_stream: &mut sys::AsioStream,\n 1219 |     buffer_index: usize,\n 1220 |     channel_index: usize,\n 1221 |     requested_channel_length: Option<usize>,\n 1222 | ) -> &mut [T] {\n 1223 |     let channel_length = requested_channel_length.unwrap_or(asio_stream.buffer_size as usize);\n 1224 |     let buff_ptr: *mut T = asio_stream.buffer_infos[channel_index].buffers[buffer_index] as *mut _;\n 1225 |     std::slice::from_raw_parts_mut(buff_ptr, channel_length)\n 1226 | }","lines":27},{"ref":"src/host/asio/stream.rs:1043-1058","code":" 1043 |                     sys::AsioMessageSelectors::kAsioBufferSizeChange => {\n 1044 |                         if value > 0 {\n 1045 |                             let mut streams = asio_streams_for_event\n 1046 |                                 .lock()\n 1047 |                                 .unwrap_or_else(|e| e.into_inner());\n 1048 |                             let stream = if is_input {\n 1049 |                                 streams.input.as_mut()\n 1050 |                             } else {\n 1051 |                                 streams.output.as_mut()\n 1052 |                             };\n 1053 |                             if let Some(s) = stream {\n 1054 |                                 s.buffer_size = value;\n 1055 |                             }\n 1056 |                         }\n 1057 |                         true\n 1058 |                     }","lines":16}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"`CURRENT_SAMPLE_RATE`, `CALL_OUTPUT_READY`, and `CALLBACK_FLAG` are process-global statics, and `BUFFER_CALLBACK`/`DRIVER_EVENT_CALLBACKS` are global registries shared by every `Driver`/`Stream`. The buffer-switch callback iterates ALL registered buffer callbacks (`bcs.iter_mut()`), and `dispatch_event` invokes ALL event callbacks. With the host's single-global-driver model this is usually one stream, but two streams built from the same driver (one input, one output) register two buffer callbacks and the ASIO callback fans out to both; each closure only services its own direction but still pays the global lock and dispatch cost, and `CALLBACK_FLAG`/output-ready state is shared across them, coupling unrelated streams.","fix":"Associate callbacks/flags with a specific driver/stream rather than process-global statics, or document and enforce the single-stream invariant.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:363-370","code":"  363 | static BUFFER_CALLBACK: Mutex<Vec<(BufferCallbackId, BufferCallback)>> = Mutex::new(Vec::new());\n  364 | \n  365 | /// Used to identify when to clear buffers.\n  366 | static CALLBACK_FLAG: AtomicU32 = AtomicU32::new(0);\n  367 | \n  368 | /// Indicates that ASIOOutputReady should be called\n  369 | static CALL_OUTPUT_READY: AtomicBool = AtomicBool::new(false);\n  370 | static CURRENT_SAMPLE_RATE: AtomicU64 = AtomicU64::new(0);","lines":8},{"ref":"asio-sys/src/bindings/mod.rs:1114-1122","code":" 1114 | fn dispatch_event(event: AsioDriverEvent) -> bool {\n 1115 |     let callbacks: Vec<_> = {\n 1116 |         let lock = DRIVER_EVENT_CALLBACKS.lo lt_output_device().is_none() {\n  258 |                         if let Ok(mut inner) = arc.try_lock() {\n  259 |                             let _ = inner.pause();\n  260 |                         }","lines":4}]},{"id":"RACE_6","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"`try_emit_error` treats a poisoned mutex as success: it calls `into_inner()` and invokes the user callback. A poisoned mutex means the callback's previous invocation panicked while holding the lock, so the callback (and any state it closes over) may be in an inconsistent or partially-mutated state. Re-entering a callback that already panicked once can compound the corruption or panic again. `emit_error` has the same recover-from-poison behavior (`unwrap_or_else(|e| e.into_inner())`). For a synchronization/error-delivery primitive this \"recover and keep calling\" policy is undocumented and arguably wrong; at minimum it silently hides that the user's error callback panicked.","fix":"Decide and document the poison policy. Safer options: drop the error (do not re-invoke a callback known to have panicked) and/or surface that the callback panicked. If recovery is intentional, add a comment explaining why re-entering a poisoned callback is safe here.","locations":[{"ref":"src/host/error_emit.rs:16","code":"   16 |     let mut cb = callback.lock().unwrap_or_else(|e| e.into_inner());","lines":1},{"ref":"src/host/error_emit.rs:34-37","code":"   34 |         Err(TryLockError::Poisoned(e)) => {\n   35 |             (*e.into_inner())(error);\n   36 |             Ok(())\n   37 |         }","lines":4}]},{"id":"RACE_7","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"PipeWire `UserData::publish_data_out`/`publish_data_in` store the negotiated quantum into `last_quantum` (read by `Stream::buffer_size`) only from inside the process callback. Before the first process cycle, `buffer_size()` returns `initial_quantum`, which for `BufferSize::Default` is `self.quantum` taken from global settings that may be 0 if clock metadata had not arrived during enumeration (the code elsewhere explicitly handles `max_quantum == 0` as \"not received yet\"). Thus `buffer_size()` can transiently return 0, and callers dividing by it would hit a divide-by-zero.","fix":"Have `buffer_size()` return a sensible fallback when `last_quantum` is 0, or block until the first process cycle has populated a real quantum.","locations":[{"ref":"src/host/pipewire/device.rs:378-382","code":"  378 |         let initial_quantum = match config.buffer_size {\n  379 |             BufferSize::Fixed(n) => n as u64,\n  380 |             BufferSize::Default => self.quantum as u64,\n  381 |         };\n  382 |         let last_quantum = Arc::new(AtomicU64::new(initial_quantum));","lines":5},{"ref":"src/host/pipewire/stream.rs:154-156","code":"  154 |     fn buffer_size(&self) -> Result<FrameCount, Error> {\n  155 |         Ok(self.last_quantum.load(Ordering::Relaxed) as _)\n  156 |     }","lines":3}]},{"id":"RACE_8","type":"race_condition","type_label":"Race Condition","severity":"low","description":"In the AudioWorklet backend, `buffer_size_frames` (Arc<AtomicU64>) is written from the worklet callback (mod.rs:391, on the audio render thread) and read from `Stream::buffer_size` (mod.rs:440, on the main thread) using Ordering::Relaxed. With cross-origin isolation and real threads (the whole point of the audioworklet/atomics feature), Relaxed is acceptable for a single scalar, but the value can be read before the worklet has ever run (it is seeded with initial_quantum), and there is no synchronization indicating the worklet has started. A caller may observe the seed value indefinitely if the worklet failed to initialize (the async setup error only goes to error_callback). Low impact but worth noting given this backend genuinely crosses a thread boundary.","fix":"Document that buffer_size() returns the requested/initial quantum until the worklet first runs; the Relaxed ordering is fine for a single atomic scalar.","locations":[{"ref":"src/host/audioworklet/mod.rs:347-348","code":"  347 |         let buffer_size_frames = Arc::new(AtomicU64::new(initial_quantum));\n  348 |         let buffer_size_frames_cb = buffer_size_frames.clone();","lines":2},{"ref":"src/host/audioworklet/mod.rs:391","code":"  391 |                             buffer_size_frames_cb.store(frame_size as u64, Ordering::Relaxed);","lines":1},{"ref":"src/host/audioworklet/mod.rs:438-441","code":"  438 | impl StreamTrait for Stream {\n  439 |     fn buffer_size(&self) -> Result<FrameCount, Error> {\n  440 |         Ok(self.buffer_size_frames.load(Ordering::Relaxed) as FrameCount)\n  441 |     }","lines":4}]},{"id":"RACE_9","type":"race_condition","type_label":"Race Condition","severity":"low","description":"PulseAudio playback `Stream::drop` calls `stream.clone().delete().now_or_never()` to nudge the `play_all` driver thread to exit, but `now_or_never()` polls the future exactly once and discards it if not immediately ready. If the delete is not instantly ready (typical for a network/socket round trip), the eof_tx may not be dropped promptly, so the driver thread can keep running until the subsequent `join()` blocks on it - the very deadlock the delete was meant to avoid. The comment claims this terminates the driver but the single poll does not guarantee it.","fix":"Drive the delete future to completion (e.g. `block_on`) with a bounded timeout, or use an explicit shutdown signal that the driver checks, before joining.","locations":[{"ref":"src/host/pulseaudio/stream.rs:63-90","code":"   63 | impl Drop for Stream {\n   64 |     fn drop(&mut self) {\n   65 |         match &mut self.inner {\n   66 |             StreamInner::Playback(stream, _, handle) => {\n   67 |                 handle.cancel();\n   68 |                 // Help the play_all driver thread terminate by\n   69 |                 // queueing a delete, which causes the reactor to drop\n   70 |                 // the source's eof_tx. We need to do this because\n   71 |                 // poll_read always reports a non-empty buffer.\n   72 |                 let _ = stream.clone().delete().now_or_never();\n   73 |             }\n   74 |             StreamInner::Record(_, _, handle) => {\n   75 |                 handle.cancel();\n   76 |             }\n   77 |         }\n   78 | \n   79 |         // Unpark the threads in case they're sleeping.\n   80 |         self.signal_ready();\n   81 | \n   82 |         for handle in self.workers.drain(..) {\n   83 |             // Prevent self-join: a worker thread may surface an error\n   84 |             // through the user's error_callback, and that callback may\n   85 |             // drop the Stream — in which case we'd be joining ourselves.\n   86 |             if handle.thread().id() != std::thread::current().id() {\n   87 |                 let _ = handle.join();\n   88 |             }\n   89 |         }\n   90 |     }","lines":28}]},{"id":"RACE_10","type":"race_condition","type_label":"Race Condition","severity":"low","description":"In the IMMNotificationClient callbacks, `SetEvent` failure falls back to `pending_device_changed.store(true, Relaxed)`. The audio run loop reads this flag with `swap(false, Relaxed)` only at the top of each iteration, *before* the WaitForMultipleObjectsEx blocking wait. If the flag is set after the swap but the SetEvent path failed (so no handle wakeup), the loop blocks on INFINITE wait and the pending DeviceChanged is not delivered until the next unrelated wakeup. The whole flag mechanism exists for the SetEvent-failed case yet relies on a wakeup it just failed to produce.","fix":"Also signal `pending_scheduled_event` (which is always in the handle set) when setting the flag, so the run loop is guaranteed to wake and observe it; or use a timed wait.","locations":[{"ref":"src/host/wasapi/stream.rs:130-134","code":"  130 |             unsafe {\n  131 |                 if Threading::SetEvent(self.event).is_err() {\n  132 |                     self.pending_device_changed.store(true, Ordering::Relaxed);\n  133 |                 }\n  134 |             }","lines":5},{"ref":"src/host/wasapi/stream.rs:701-708","code":"  701 |     if let Some(ref flag) = run_context.pending_device_changed {\n  702 |         if flag.swap(false, Ordering::Relaxed) {\n  703 |             emit_error(\n  704 |                 error_callback,\n  705 |                 Error::with_message(ErrorKind::DeviceChanged, \"Default audio device changed\"),\n  706 |             );\n  707 |         }\n  708 |     }","lines":8}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"If `set_sample_rate` fails partway through the fallback reconfiguration cycle (e.g. `start()`, `stop()`, `dispose_buffers()`, the `ASIOExit`/reload, or the final rate check all use `?`/early returns), the driver can be left in `Prepared` or `Running` state with buffers allocated, or fully torn down via `ASIOExit`+`remove_current_driver` while `DriverInner.state` still says `Initialized`/`Prepared`. The cached `DriverState` then no longer matches the real driver state, so later `create_buffers`/`start`/`Drop` issue out-of-sequence ASIO calls. Notably the dummy buffers created at line 592 are not disposed on the early-error paths between create and the later dispose.","fix":"Wrap the reconfiguration in a guard that always disposes dummy buffers and resynchronizes `DriverState` with the actual driver state on every error path before returning.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:591-639","code":"  591 |         let mut dummy_infos = prepare_buffer_infos(false, 1);\n  592 |         let buffer_size = self.create_buffers(&mut dummy_infos, None)?;\n  593 | \n  594 |         // Start briefly so the driver reconfigures its hardware clock.\n  595 |         self.start()?;\n  596 | \n  597 |         // Wait for one full buffer to be processed: this g    if (actual - sample_rate).abs() >= 1.0 {\n  634 |                 return Err(AsioError::NoRate);\n  635 |             }\n  636 | \n  637 |             CURRENT_SAMPLE_RATE.store(actual.to_bits(), Ordering::Release);\n  638 |         }\n  639 |         Ok(())","lines":49}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"JACK `Device::new_device` creates a real JACK client purely to query sample rate, buffer size and port count, but never deactivates/closes it explicitly; it relies on `jack::Client`'s Drop. More importantly, `Host::initialize_default_devices` creates TWO such clients (one `_in`, one `_out`) at `Host::new()` time, each opening a server connection, and `input_device_with_name`/`output_device_with_name` create yet more by calling `default_input_device`/`default_output_device` after mutating `self.name`. These transient clients connect to the JACK server on every host/device construction. If `Device::new_device` returns early via the `?` on `get_client` after a partial setup there is no leak, but the repeated connect/disconnect churn on the audio server is a real cost, and the dummy-client pattern is explicitly called out as \"a hack\" in the code comment.","fix":"Cache the queried server parameters once per Host instead of opening a fresh client per Device, or reuse a single client connection. At minimum, document the connection cost and avoid re-querying in `input_device_with_name`/`output_device_with_name`.","locations":[{"ref":"src/host/jack/device.rs:36-73","code":"   36 |         let client_options = super::get_client_options(start_server_automatically);\n   37 | \n   38 |         // Create a dummy client to find out the sample rate of the server to be able to provide it\n   39 |         // as a possible config. This client will be dropped, and a new one will be created when\n   40 |         // making the stream. This is a hack due to the fact that the Client must be moved to\n   41 |         //
