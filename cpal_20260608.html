nregister failure; consider retrying unregister, and at minimum document that this path leaks. If unregister truly cannot succeed, the COM object will keep the Arc alive anyway, but the raw event handle should be tracked for eventual closure.","locations":[{"ref":"src/host/wasapi/stream.rs:88-111","code":"   88 | impl Drop for DefaultDeviceMonitor {\n   89 |     fn drop(&mut self) {\n   90 |         // Ensure COM is initialised on this thread before making COM calls. Drop can run on\n   91 |         // any thread (e.g. the audio run thread), which may not have called CoInitialize.\n   92 |         crate::host::com::com_initialized();\n   93 |         unsafe {\n   94 |             // Synchronous: waits for any in-progress IMMNotificationClient callback to finish\n   95 |             // before returning. Notification callbacks must not invoke the user error callback:\n   96 |             // if the user dropped the Stream in response, this call would deadlock waiting for\n   97 |             // the in-progress callback. Instead, callbacks set `pending_device_changed` and\n   98 |             // the audio thread delivers the error on its next iteration.\n   99 |             //\n  100 |             // Only close the event handle on success; if unregister fails the callback may\n  101 |             // still hold a reference and could later call SetEvent on a closed/reused handle.\n  102 |             if self\n  103 |                 .enumerator\n  104 |                 .UnregisterEndpointNotificationCallback(&self.client)\n  105 |                 .is_ok()\n  106 |             {\n  107 |                 let _ = Foundation::CloseHandle(self.event);\n  108 |             }\n  109 |         }\n  110 |     }\n  111 | }","lines":24}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"negligible","description":"AGGREGATE_INSTANCE_COUNTER only ever increments (fetch_add, never reset). It is used solely to build unique aggregate-device names so wraparound is harmless, but over an extremely long-lived process creating many loopback devices the names lose uniqueness guarantees after a u32 wrap. Minor.","fix":"Acceptable as-is; if uniqueness must be guaranteed, also incorporate a timestamp or random suffix into the device UID.","locations":[{"ref":"src/host/coreaudio/macos/loopback.rs:10","code":"   10 | static AGGREGATE_INSTANCE_COUNTER: AtomicU32 = AtomicU32::new(0);","lines":1},{"ref":"src/host/coreaudio/macos/loopback.rs:90","code":"   90 |         let instance = AGGREGATE_INSTANCE_COUNTER.fetch_add(1, Ordering::Relaxed);","lines":1}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Buffer length is computed as `cpal_num_samples = buffer_size * num_channels as usize` then `len_bytes = cpal_num_samples * sample_format.sample_size()` with plain `*` (no checked/saturating). `buffer_size` is a driver-reported value cast from i32 and `num_channels` is user-supplied; on overflow in release this wraps and produces an undersized `Vec`, then the callback's `cast_slice_mut` reinterprets it and reads/writes ASIO channel slices sized from `buffer_size`, causing out-of-bounds access. While realistic sizes are small, the values are externally influenced and unchecked.","fix":"Use checked multiplication and return an error on overflow, or validate `buffer_size`/`num_channels` bounds before allocating.","locations":[{"ref":"src/host/asio/stream.rs:171-175","code":"  171 |         let cpal_num_samples = buffer_size * num_channels as usize;\n  172 | \n  173 |         // Create the buffer depending on the size of the data type.\n  174 |         let len_bytes = cpal_num_samples * sample_format.sample_size();\n  175 |         let mut interleaved = vec![0u8; len_bytes];","lines":5},{"ref":"src/host/asio/stream.rs:504-508","code":"  504 |         let cpal_num_samples = buffer_size * num_channels as usize;\n  505 | \n  506 |         // Create the buffer depending on data type.\n  507 |         let len_bytes = cpal_num_samples * sample_format.sample_size();\n  508 |         let mut interleaved = vec![0u8; len_bytes];","lines":5}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"PulseAudio `store_latency` computes `(write_offset - read_offset)` with plain `i64` subtraction. If the server ever reports `read_offset > write_offset` plus a large magnitude (or near i64::MIN/MAX edges), the subtraction can overflow and panic in a debug build; the subsequent `.max(0) as u64` only guards the result sign, not the subtraction itself. This runs on the latency polling thread on every poll.","fix":"Use `write_offset.saturating_sub(read_offset).max(0) as u64`.","locations":[{"ref":"src/host/pulseaudio/stream.rs:462-478","code":"  462 | fn store_latency(\n  463 |     latency_micros: &AtomicU64,\n  464 |     sample_spec: protocol::SampleSpec,\n  465 |     device_latency_usec: u64,\n  466 |     write_offset: i64,\n  467 |     read_offset: i64,\n  468 | ) {\n  469 |     let offset = (write_offset - read_offset).max(0) as u64;\n  470 | \n  471 |     let latency =\n  472 |         Duration::from_micros(device_latency_usec) + sample_spec.bytes_to_duration(offset as usize);\n  473 | \n  474 |     latency_micros.store(\n  475 |         latency.as_micros().try_into().unwrap_or(u64::MAX),\n  476 |         Ordering::Relaxed,\n  477 |     );\n  478 | }","lines":17}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`get_available_frames` computes `stream.max_frames_in_buffer - padding` and `output_timestamp` computes `stream.max_frames_in_buffer - frames_available`, both unchecked u32 subtractions. GetCurrentPadding is documented to never exceed the buffer size, but if a buggy/virtual driver reports padding > max_frames_in_buffer the subtraction underflows: it panics in debug builds and wraps to a huge FrameCount in release, which then drives a GetBuffer request for billions of frames and a slice of that size in process_output -> immediate UB / crash.","fix":"Use `saturating_sub` (or checked_sub returning an error) for both subtractions so a misbehaving driver yields 0 available frames instead of underflowing.","locations":[{"ref":"src/host/wasapi/stream.rs:601-609","code":"  601 | fn get_available_frames(stream: &StreamInner) -> Result<FrameCount, Error> {\n  602 |     unsafe {\n  603 |         let padding = stream\n  604 |             .audio_client\n  605 |             .GetCurrentPadding()\n  606 |             .context(\"Failed to get current padding\")?;\n  607 |         Ok(stream.max_frames_in_buffer - padding)\n  608 |     }\n  609 | }","lines":9},{"ref":"src/host/wasapi/stream.rs:879-882","code":"  879 |     // `padding` is the number of frames already queued in the endpoint buffer ahead of the\n  880 |     // frames we are about to write. Those frames must drain before ours are heard.\n  881 |     let padding = stream.max_frames_in_buffer - frames_available;\n  882 |     let playback = callback + (frames_to_duration(padding, sample_rate) + stream.stream_latency);","lines":4}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In the AAudio output dynamic-tuning path, `let mut buffer_size = burst_size * new_mixer_bursts;` multiplies two i32 values without overflow protection (line 496). burst_size is bounded small (>=16, fallback 256), and new_mixer_bursts is saturating_add(1) starting from a value that could be a parsed system property (audio_manager parses arbitrary i32). A maliciously large `aaudio.mixer_bursts` property could make this multiply overflow in debug (panic) or wrap in release, then get clamped to capacity. Low severity because capacity clamp follows, but the multiply itself can wrap/panic before the clamp.","fix":"Use `burst_size.saturating_mul(new_mixer_bursts)` (or checked_mul with fallback).","locations":[{"ref":"src/host/aaudio/mod.rs:496","code":"  496 |                     let mut buffer_size = burst_size * new_mixer_bursts;","lines":1}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`buffer_size()` returns `self.inner.period_size as FrameCount` (line 1442) where `period_size` is a `usize` originating from an i64 `snd_pcm_sframes_t`, and `FrameCount` is `u32`. A period size larger than u32::MAX (possible with pathological PipeWire-ALSA ring buffers as the file's own header comment warns about, ~524K is fine but the cast is unchecked) would silently truncate. Similarly `period_samples = period_size * channels` (line 423) and the `transfer_buffer` allocation `period_size * frame_size` (line 865) are unchecked usize multiplications that could overflow on 32-bit targets for very large periods.","fix":"Use `FrameCount::try_from(period_size)` and surface an error (or clamp) instead of a lossy `as` cast, and use checked multiplication for the buffer-size computations.","locations":[{"ref":"src/host/alsa/mod.rs:1441-1443","code":" 1441 |     fn buffer_size(&self) -> Result<FrameCount, Error> {\n 1442 |         Ok(self.inner.period_size as FrameCount)\n 1443 |     }","lines":3},{"ref":"src/host/alsa/mod.rs:423","code":"  423 |             period_samples: period_size * conf.channels as usize,","lines":1},{"ref":"src/host/alsa/mod.rs:865","code":"  865 |         let transfer_buffer = vec![0u8; stream.period_size * stream.frame_size].into_boxed_slice();","lines":1}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"Several i32->usize/u32 and f64->u32 casts of driver-reported values use `as` without range checks: `channels.ins as ChannelCount`/`channels.outs as ChannelCount` (i32 truncated to u16 ChannelCount), `buffer_size_range.min/max as FrameCount` (i32 to u32, negative becomes huge), `sample_rate as SampleRate`. A driver reporting >65535 channels truncates silently, and a negative or huge buffer size becomes a bogus FrameCount that then drives allocations.","fix":"Use `try_into()` with explicit error handling (skip the device) rather than truncating `as` casts on externally-provided values.","locations":[{"ref":"src/host/asio/device.rs:225-229","code":"  225 |                             channels_in: channels.ins as ChannelCount,\n  226 |                             channels_out: channels.outs as ChannelCount,\n  227 |                             sample_rate: sample_rate as SampleRate,\n  228 |                             buffer_size_min: buffer_size_range.min as FrameCount,\n  229 |                             buffer_size_max: buffer_size_range.max as FrameCount,","lines":5}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"PipeWire `pw_stream_time` delay-to-ns conversion `t.delay() * 1_000_000_000i64 / t.rate().denom` can overflow i64 if `delay()` is large (delay is in rate units; for very large latencies and high denominators the intermediate `delay * 1e9` exceeds i64). Runs in the RT process callback; an overflow panics in debug builds and wraps in release, producing a garbage timestamp.","fix":"Use `i128` (or `mul_div`-style) intermediate math, or `saturating_mul`, before dividing by the denominator.","locations":[{"ref":"src/host/pipewire/stream.rs:305-311","code":"  305 |         let (callback, capture) = match pw_stream_time(stream) {\n  306 |             Some(t) => {\n  307 |                 let delay_ns = t.delay() * 1_000_000_000i64 / t.rate().denom as i64;\n  308 |                 (\n  309 |                     StreamInstant::from_nanos(t.now() as u64),\n  310 |                     StreamInstant::from_nanos((t.now() - delay_ns.max(0)) as u64),\n  311 |                 )","lines":7},{"ref":"src/host/pipewire/stream.rs:344-350","code":"  344 |         let (callback, playback) = match pw_stream_time(stream) {\n  345 |             Some(t) => {\n  346 |                 let delay_ns = t.delay() * 1_000_000_000i64 / t.rate().denom as i64;\n  347 |                 (\n  348 |                     StreamInstant::from_nanos(t.now() as u64),\n  349 |                     StreamInstant::from_nanos((t.now() + delay_ns.max(0)) as u64),\n  350 |                 )","lines":7}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`config_to_waveformatextensible` computes `nAvgBytesPerSec = channels * sample_rate * sample_bytes` as a `u32` and `nBlockAlign = channels * sample_bytes` as a `u16`. For high channel counts / sample rates / 64-bit samples these can overflow: e.g. nBlockAlign for 8 channels * 8 bytes (I64/F64) = 64 fits, but block_align is u16 so channels*sample_bytes overflows above 8192 bytes; nAvgBytesPerSec overflows u32 around channels*rate*bytes > 4.29e9 (e.g. 64ch * 384000 * 8 = 1.97e8 ok, but very wide configs can exceed). Overflow wraps silently producing a malformed WAVEFORMATEX.","fix":"Validate that channels*sample_bytes fits in u16 and channels*sample_rate*sample_bytes fits in u32 (use checked_mul) and return None on overflow, so an invalid config is rejected rather than corrupted.","locations":[{"ref":"src/host/wasapi/device.rs:1385-1411","code":" 1385 |     let channels = config.channels;\n 1386 |     let sample_rate = config.sample_rate;\n 1387 |     let sample_bytes = sample_format.sample_size() as u16;\n 1388 |     let avg_bytes_per_sec = u32::from(channels) * sample_rate * u32::from(sample_bytes);\n 1389 |     let block_align = channels * sample_bytes;\n 1390 |     // wBitsPerSample is the container word size; wValidBitsPerSample is the actual bit depth.\n 1391 |     // For I24 the container is 32 bits (sample_size() == 4) but only 24 bits are significant.\n 1392 |     let container_bits = 8 * sample_bytes;\n 1393 |     let valid_bits = sample_format.bits_per_sample() as u16;\n 1394 | \n 1395 |     let cb_size = if format_tag == Audio::WAVE_FORMAT_PCM {\n 1396 |         0\n 1397 |     } else {\n 1398 |         let extensible_size = mem::size_of::<Audio::WAVEFORMATEXTENSIBLE>();\n 1399 |         let ex_size = mem::size_of::<Audio::WAVEFORMATEX>();\n 1400 |         (extensible_size - ex_size) as u16\n 1401 |     };\n 1402 | \n 1403 |     let waveformatex = Audio::WAVEFORMATEX {\n 1404 |         wFormatTag: format_tag as u16,\n 1405 |         nChannels: channels,\n 1406 |         nSamplesPerSec: sample_rate,\n 1407 |         nAvgBytesPerSec: avg_bytes_per_sec,\n 1408 |         nBlockAlign: block_align,\n 1409 |         wBitsPerSample: container_bits,\n 1410 |         cbSize: cb_size,\n 1411 |     };","lines":27}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`Data::bytes` and `bytes_mut` compute `self.len * self.sample_format.sample_size()` with a plain `usize` multiply. `len` is supplied by backend code via the unsafe `from_parts` constructor. For a very large `len` (close to `usize::MAX / sample_size`) the multiplication can wrap in release builds, producing a byte length smaller than the real buffer; this is then handed to `slice::from_raw_parts`. While `len` is normally a sane audio buffer size, the function is the public byte view used by raw callbacks and silently truncates rather than failing.","fix":"Use `self.len.checked_mul(self.sample_format.sample_size())` and document/handle the overflow case (debug_assert or saturating), consistent with the safety contract.","locations":[{"ref":"src/lib.rs:609-624","code":"  609 |     pub fn bytes(&self) -> &[u8] {\n  610 |         let len = self.len * self.sample_format.sample_size();\n  611 |         // The safety of this block relies on correct construction of the `Data` instance.\n  612 |         // See the unsafe `from_parts` constructor for these requirements.\n  613 |         unsafe { std::slice::from_raw_parts(self.data as *const u8, len) }\n  614 |     }\n  615 | \n  616 |     /// The raw slice of memory representing the underlying audio data as a slice of bytes.\n  617 |     ///\n  618 |     /// It is up to the user to interpret the slice of memory based on [`Data::sample_format`].\n  619 |     pub fn bytes_mut(&mut self) -> &mut [u8] {\n  620 |         let len = self.len * self.sample_format.sample_size();\n  621 |         // The safety of this block relies on correct construction of the `Data` instance. See\n  622 |         // the unsafe `from_parts` constructor for these requirements.\n  623 |         unsafe { std::slice::from_raw_parts_mut(self.data as *mut u8, len) }\n  624 |     }","lines":16}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"JACK `Host::input_device_with_name` / `output_device_with_name` mutate `self.name` to the requested name and then call `default_input_device` / `default_output_device`, which iterate over `self.devices_created` - a Vec populated once in `Host::new()` from the ORIGINAL name. They never re-create devices with the new name, so the supplied `name` argument is silently ignored: the caller always gets back the default device built at construction time (or `None`). The `self.name = ...` assignment has no effect on the returned device.","fix":"Either build a fresh `Device` from the requested name inside `input_device_with_name`/`output_device_with_name` (calling `Device::default_input_device(name, ...)`), or remove these name-based methods if per-name lookup is unsupported. The dead `self.name = ...` write should go.","locations":[{"ref":"src/host/jack/mod.rs:77-85","code":"   77 |     pub fn input_device_with_name(&mut self, name: &str) -> Option<Device> {\n   78 |         self.name = name.to_owned();\n   79 |         self.default_input_device()\n   80 |     }\n   81 | \n   82 |     pub fn output_device_with_name(&mut self, name: &str) -> Option<Device> {\n   83 |         self.name = name.to_owned();\n   84 |         self.default_output_device()\n   85 |     }","lines":9},{"ref":"src/host/jack/mod.rs:132-148","code":"  132 |     fn default_input_device(&self) -> Option<Self::Device> {\n  133 |         for device in &self.devices_created {\n  134 |             if device.is_input() {\n  135 |                 return Some(device.clone());\n  136 |             }\n  137 |         }\n  138 |         None\n  139 |     }\n  140 | \n  141 |     fn default_output_device(&self) -> Option<Self::Device> {\n  142 |         for device in &self.devices_created {\n  143 |             if device.is_output() {\n  144 |                 return Some(device.clone());\n  145 |             }\n  146 |         }\n  147 |         None\n  148 |     }","lines":17}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`driver_names` builds `MAX_DRIVERS` name buffers of `MAX_DRIVER_NAME_LEN = 32` bytes and passes their pointers to `get_driver_names`. ASIO driver names can exceed 31 chars; the SDK writes a NUL-terminated string into each buffer assuming a caller-defined capacity (the SDK convention is 32), but if a driver name is exactly 32+ bytes the C side may write without a guaranteed NUL within the 32-byte buffer, and `CStr::from_ptr` then reads past the buffer end (out-of-bounds) until it finds a NUL. The fixed 32-byte assumption is an unchecked contract.","fix":"Ensure each buffer is force-NUL-terminated at index 31 before reading, or read at most MAX_DRIVER_NAME_LEN-1 bytes with a bounded conversion.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:391-413","code":"  391 |     pub fn driver_names(&self) -> Vec<String> {\n  392 |         // The most drivers we can take\n  393 |         const MAX_DRIVERS: usize = 100;\n  394 |         // Max length for divers name\n  395 |         const MAX_DRIVER_NAME_LEN: usize = 32;\n  396 | \n  397 |         // 2D array of driver names set to 0.\n  398 |         let mut driver_names: [[c_char; MAX_DRIVER_NAME_LEN]; MAX_DRIVERS] =\n  399 |             [[0; MAX_DRIVER_NAME_LEN]; MAX_DRIVERS];\n  400 |         // Pointer to each driver name.\n  401 |         let mut driver_name_ptrs: [*mut c_char; MAX_DRIVERS] = [null_mut(); MAX_DRIVERS];\n  402 |         for (ptr, name) in driver_name_ptrs.iter_mut().zip(&mut driver_names[..]) {\n  403 |             *ptr = (*name).as_mut_ptr();\n  404 |         }\n  405 | \n  406 |         unsafe {\n  407 |             let num_drivers =\n  408 |                 ai::get_driver_names(driver_name_ptrs.as_mut_ptr(), MAX_DRIVERS as i32);\n  409 |             (0..num_drivers)\n  410 |                 .map(|i| driver_name_to_utf8(&driver_names[i as usize]).to_string())\n  411 |                 .collect()\n  412 |         }\n  413 |     }","lines":23}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`create_buffers` only checks `buffer_size > buffer_sizes.max` (returns `InvalidBufferSize`) and never checks against `buffer_sizes.min`. The comment in `check_config` (stream.rs) acknowledges ASIO does not validate the lower bound, but `create_buffers` is also reachable from `set_sample_rate`'s internal path and from any other caller without going through `check_config`, so an in-sys caller can pass a sub-minimum size that the driver silently mishandles.","fix":"Reject `buffer_size < buffer_sizes.min` in `create_buffers` as well.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:683-692","code":"  683 |         let buffer_size = match buffer_size {\n  684 |             Some(v) => {\n  685 |                 if v <= buffer_sizes.max {\n  686 |                     v\n  687 |                 } else {\n  688 |                     return Err(AsioError::InvalidBufferSize);\n  689 |                 }\n  690 |             }\n  691 |             None => buffer_sizes.pref,\n  692 |         };","lines":10}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The default device is created with `DeviceDirection::Unknown` (line 145), but `supports_input` and `supports_output` (lines 226-238) only return true for `Input`/`Duplex` and `Output`/`Duplex` respectively. Consequently the device returned by `default_input_device()`/`default_output_device()` reports `supports_input() == false` and `supports_output() == false`, which is contradictory: callers that filter or check capability via these methods will conclude the default device supports neither direction even though it is the system default for both.","fix":"Treat `DeviceDirection::Unknown` as potentially supporting both directions in `supports_input`/`supports_output` (return true), or give the default device `Duplex`, since its true direction cannot be known without opening it.","locations":[{"ref":"src/host/alsa/mod.rs:139-148","code":"  139 |     // \"default\" is a virtual ALSA device that redirects to the configured default. We cannot\n  140 |     // determine its actual capabilities without opening it, so we return Unknown direction.\n  141 |     fn default_device(&self) -> Device {\n  142 |         Device {\n  143 |             pcm_id: DEFAULT_DEVICE.to_owned(),\n  144 |             desc: Some(\"Default Audio Device\".to_owned()),\n  145 |             direction: DeviceDirection::Unknown,\n  146 |             _context: self.inner.clone(),\n  147 |         }\n  148 |     }","lines":10},{"ref":"src/host/alsa/mod.rs:226-238","code":"  226 |     fn supports_input(&self) -> bool {\n  227 |         matches!(\n  228 |             self.direction,\n  229 |             DeviceDirection::Input | DeviceDirection::Duplex\n  230 |         )\n  231 |     }\n  232 | \n  233 |     fn supports_output(&self) -> bool {\n  234 |         matches!(\n  235 |             self.direction,\n  236 |             DeviceDirection::Output | DeviceDirection::Duplex\n  237 |         )\n  238 |     }","lines":13}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In the input buffer callback, `n_channels = interleaved.len() / n_frames` (process_input_callback) and likewise in output `n_channels = interleaved.len() / asio_stream.buffer_size`. `interleaved` was sized for the CPAL `num_channels`, but `asio_stream.buffer_infos.len()` is the number of ASIO channels actually created. If these differ (e.g. driver created a different channel count, or buffer-size-change resize used `num_channels` while ASIO allocated differently), `asio_channel_slice(asio_stream, _, ch_ix, _)` indexes `buffer_infos[ch_ix]` for `ch_ix in 0..n_channels` which can exceed `buffer_infos.len()` and panic, or under-fill channels. The channel count should come from `buffer_infos.len()`, not be derived by division.","fix":"Use `asio_stream.buffer_infos.len()` as the channel count and iterate frames against `buffer_size`, rather than inferring channels via `interleaved.len() / n_frames`.","locations":[{"ref":"src/host/asio/stream.rs:270-279","code":"  270 |                 let n_frames = asio_stream.buffer_size as usize;\n  271 |                 let n_channels = interleaved.len() / n_frames;\n  272 |                 let buffer_index = asio_info.buffer_index as usize;\n  273 |                 for ch_ix in 0..n_channels {\n  274 |                     let asio_channel =\n  275 |                         asio_channel_slice::<A>(asio_stream, buffer_index, ch_ix, None);\n  276 |                     for (frame, s_asio) in interleaved.chunks_mut(n_channels).zip(asio_channel) {\n  277 |                         frame[ch_ix] = from_endianness(*s_asio);\n  278 |                     }\n  279 |                 }","lines":10},{"ref":"src/host/asio/stream.rs:623-636","code":"  623 |                 let n_channels = interleaved.len() / asio_stream.buffer_size as usize;\n  624 |                 let buffer_index = asio_info.buffer_index as usize;\n  625 | \n  626 |                 // Write interleaved samples to ASIO channels, one channel at a time.\n  627 |                 for ch_ix in 0..n_channels {\n  628 |                     let asio_channel =\n  629 |                         asio_channel_slice_mut::<A>(asio_stream, buffer_index, ch_ix, None);\n  630 |                     if silence_asio_buffer {\n  631 |                         asio_channel.align_to_mut::<u8>().1.fill(0);\n  632 |                     }\n  633 |                     for (frame, s_asio) in interleaved.chunks(n_channels).zip(asio_channel) {\n  634 |                         *s_asio = mix_samples(*s_asio, frame[ch_ix]);\n  635 |                     }\n  636 |                 }","lines":14},{"ref":"src/host/asio/stream.rs:1295-1306","code":" 1295 |     let n_channels = interleaved.len() / asio_stream.buffer_size as usize;\n 1296 |     let buffer_index = asio_info.buffer_index as usize;\n 1297 | \n 1298 |     // Write interleaved samples to ASIO channels, one channel at a time.\n 1299 |     for ch_ix in 0..n_channels {\n 1300 |         // Take channel as u8 array ([u8; 3] packets to represent i24)\n 1301 |         let asio_channel = asio_channel_slice_mut(\n 1302 |             asio_stream,\n 1303 |             buffer_index,\n 1304 |             ch_ix,\n 1305 |             Some(asio_stream.buffer_size as usize * asio_sample_size_bytes),\n 1306 |         );","lines":12},{"ref":"src/host/asio/stream.rs:1358-1369","code":" 1358 |     let n_frames = asio_stream.buffer_size as usize;\n 1359 |     let n_channels = interleaved.len() / n_frames;\n 1360 |     let buffer_index = asio_info.buffer_index as usize;\n 1361 |     let asio_sample_size_bytes = 3;\n 1362 | \n 1363 |     for ch_ix in 0..n_channels {\n 1364 |         let asio_channel = asio_channel_slice::<u8>(\n 1365 |             asio_stream,\n 1366 |             buffer_index,\n 1367 |             ch_ix,\n 1368 |             Some(n_frames * asio_sample_size_bytes),\n 1369 |         );","lines":12}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The output buffer callback's silence/mix scheme relies on `current_callback_flag` (per-Device `AtomicU32`) compared to `callback_info.callback_flag` which is `CALLBACK_FLAG.fetch_xor(1)` (alternates 0/1). The comment says the flag 'is updated once per buffer switch' and is used so the first callback to see a new flag silences the buffer. But `current_callback_flag` is stored on the Device and cloned into the closure; if the Device builds a new output stream later, the stale flag persists. More importantly, with only values {0,1} and a single output stream the silence decision degenerates: each buffer switch flips the flag so `silence` is true every cycle, which is the intended 'clear before mixing' behavior - but the elaborate multi-callback coordination comment is misleading because output mixing across multiple callbacks for the same buffer index cannot actually happen with the dedup guard at line 554.","fix":"Simplify: since each buffer switch should clear-then-write once, silence unconditionally per callback and drop the cross-callback flag coordination, and fix/remove the misleading comment.","locations":[{"ref":"src/host/asio/stream.rs:582-591","code":"  582 |             // Silence the ASIO buffer that is about to be used.\n  583 |             //\n  584 |             // Check if any other callbacks have already silenced the buffer associated with\n  585 |             // the current callback. The flag is updated once per buffer switch.\n  586 |             let silence =\n  587 |                 current_callback_flag.load(Ordering::Acquire) != callback_info.callback_flag;\n  588 | \n  589 |             if silence {\n  590 |                 current_callback_flag.store(callback_info.callback_flag, Ordering::Release);\n  591 |             }","lines":10},{"ref":"src/host/asio/stream.rs:509","code":"  509 |         let current_callback_flag = self.current_callback_flag.clone();","lines":1},{"ref":"asio-sys/src/bindings/mod.rs:1218","code":" 1218 |     let callback_flag = CALLBACK_FLAG.fetch_xor(1, Ordering::Relaxed);","lines":1}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`check_config` validates a `Fixed` buffer size against `range.min..=range.max` and against `Stepped` granularity, but does NOT validate it for the `Only` and `Preferred` granularity cases (where ASIO granularity 0 means only pref is guaranteed, or `-1`/power-of-two). Combined with the granularity misinterpretation above, a user-supplied size that the driver cannot honor passes validation and is sent to `ASIOCreateBuffers`, whose behavior for an unsupported-but-in-range size is unspecified.","fix":"Validate the fixed size against the actual granularity model for every `BufferPreference` variant (exact match for `Only`, power-of-two for the SDK's -1 case, multiples for `Stepped`).","locations":[{"ref":"src/host/asio/stream.rs:1111-1136","code":" 1111 |     if let BufferSize::Fixed(requested_size) = buffer_size {\n 1112 |         let range = driver.buffersize_range().map_err(build_stream_err)?;\n 1113 |         let requested_size_i32 = requested_size as i32;\n 1114 |         if !(range.min..=range.max).contains(&requested_size_i32) {\n 1115 |             return Err(Error::with_message(\n 1116 |                 ErrorKind::UnsupportedConfig,\n 1117 |                 format!(\n 1118 |                     \"Buffer size {requested_size} is not in the supported range {min}..={max}\",\n 1119 |                     min = range.min,\n 1120 |                     max = range.max\n 1121 |                 ),\n 1122 |             ));\n 1123 |         }\n 1124 |         if let sys::BufferPreference::Stepped { step, .. } = range.preferred {\n 1125 |             let offset = requested_size_i32 - range.min;\n 1126 |             if offset % step as i32 != 0 {\n 1127 |                 return Err(Error::with_message(\n 1128 |                     ErrorKind::UnsupportedConfig,\n 1129 |                     format!(\n 1130 |                         \"Buffer size {requested_size} is not valid; sizes must start at {min} and increment by {step}\",\n 1131 |                         min = range.min\n 1132 |                     ),\n 1133 |                 ));\n 1134 |             }\n 1135 |         }\n 1136 |     }","lines":26}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"PipeWire input `process` callback derives the frame count from `data.chunk().size() / sample_size / n_channels` (lines 945-946). If the negotiated `n_channels` does not evenly divide the sample count, `frames` truncates and `n_samples` (computed independently as `chunk.size()/sample_size`) is NOT a multiple of `n_channels`. `Data::from_parts` is then built with this raw `n_samples`, so the callback may see a trailing partial frame, inconsistent with the output path which deliberately sizes data as `frames * n_channels`.","fix":"Compute `frames` first, then set `n_samples = frames * n_channels` (as the output path does) so the exposed Data length is always a whole number of frames.","locations":[{"ref":"src/host/pipewire/stream.rs:945-953","code":"  945 |                 let n_samples = data.chunk().size() / user_data.sample_format.sample_size() as u32;\n  946 |                 let frames = n_samples / n_channels;\n  947 | \n  948 |                 let Some(samples) = data.data() else {\n  949 |                     return;\n  950 |                 };\n  951 |                 let data = samples.as_mut_ptr() as *mut ();\n  952 |                 let data =\n  953 |                     unsafe { Data::from_parts(data, n_samples as usize, user_data.sample_format) };","lines":9}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The two scheduling closures (front/back buffer) share a single `time` cursor RwLock. The first time each fires it checks `if *time_at_start_of_buffer > 0.0` to decide whether to anchor to `now + base + step` or use the stored value. Because both closures are kicked off via separate `setTimeout`s in `play()` (offset_ms staggered), there is an inherent assumption about ordering: whichever fires first initializes the cursor. If the second closure fires before the first writes the cursor (both see 0.0), both schedule their first buffer at `now + base + step`, producing two sources starting at the same time (overlap/double playback) rather than back-to-back. The stagger in `play()` (offset_ms += time_step_ms) mitigates but does not guarantee this under timer coalescing/jitter.","fix":"Initialize the time cursor deterministically before scheduling (e.g. set it once in play() to now + base + step) and have each closure unconditionally consume-and-advance it, instead of relying on the 0.0 sentinel plus timer ordering.","locations":[{"ref":"src/host/webaudio/mod.rs:378-392","code":"  378 |                     let time_at_start_of_buffer = {\n  379 |                         let time_at_start_of_buffer = time_handle\n  380 |                             .read()\n  381 |                             .expect(\"Unable to get a read lock on the time cursor\");\n  382 |                         // Synchronise first buffer as necessary (eg. keep the time value\n  383 |                         // referenced to the context clock).\n  384 |                         if *time_at_start_of_buffer > 0.0 {\n  385 |                             *time_at_start_of_buffer\n  386 |                         } else {\n  387 |                             // Schedule the first buffer far enough ahead for the browser's\n  388 |                             // internal audio pipeline (baseLatency) plus one full buffer of\n  389 |                             // data, so playback starts underrun-free at any buffer size.\n  390 |                             now + base_latency_secs + buffer_time_step_secs\n  391 |                         }\n  392 |                     };","lines":15},{"ref":"src/host/webaudio/mod.rs:599-619","code":"  599 |                 // Begin webaudio playback, initially scheduling the closures to fire on a timeout\n  600 |                 // event. Minimum value as per spec: https://html.spec.whatwg.org/multipage/timers-and-user-prompts.html#timers\n  601 |                 let mut offset_ms = 4;\n  602 |                 let time_step_secs =\n  603 |                     buffer_time_step_secs(self.buffer_size_frames, self.config.sample_rate);\n  604 |                 let time_step_ms = ((time_step_secs * 1_000.0).ceil() as i32).max(1);\n  605 |                 for on_ended_closure in self.on_ended_closures.iter() {\n  606 |                     window\n  607 |                         .set_timeout_with_callback_and_timeout_and_arguments_0(\n  608 |                             on_ended_closure\n  609 |                                 .read()\n  610 |                                 .unwrap()\n  611 |                                 .as_ref()\n  612 |                                 .unwrap()\n  613 |                                 .as_ref()\n  614 |                                 .unchecked_ref(),\n  615 |                             offset_ms,\n  616 |                         )\n  617 |                         .unwrap();\n  618 |                     offset_ms += time_step_ms;\n  619 |                 }","lines":21}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The output playback timestamp double-counts baseLatency. `time_at_start_of_buffer` is computed as `now + base_latency_secs + buffer_time_step_secs` for the very first buffer (lines 384-391), i.e. it already includes baseLatency. The reported playback instant is then `time_at_start_of_buffer + total_hw_latency_secs` (lines 418-420) where `total_hw_latency_secs = base_latency_secs + output_latency_secs` (lines 409-416). So baseLatency is added twice for the first buffer's anchor, biasing the reported DAC presentation time later than reality. Even for subsequent buffers the scheduling time (an AudioContext clock value) is conceptually the time the buffer is submitted to the graph; adding the full hardware latency on top of an already-scheduled context time is questionable, but the clear, unambiguous bug is the baseLatency double count.","fix":"Separate the scheduling anchor (context time at which the source starts) from the hardware-latency offset. Report playback = time_at_start_of_buffer + output-pipeline latency exactly once. Do not include baseLatency both in the initial scheduling offset and again in total_hw_latency_secs.","locations":[{"ref":"src/host/webaudio/mod.rs:384-420","code":"  384 |                         if *time_at_start_of_buffer > 0.0 {\n  385 |                             *time_at_start_of_buffer\n  386 |                         } else {\n  387 |                             // Schedule the first buffer far enough ahead for the browser's\n  388 |                             // internal audio pipeline (baseLatency) plus one full buffer of\n  389 |                             // data, so playback starts underrun-free at any buffer size.\n  390 |                             now + base_latency_secs + buffer_time_step_secs\n  391 |                         }\n  392 |                     };\n  393 | \n  394 |                     // Populate the sample data into an interleaved temporary buffer.\n  395 |                     {\n  396 |                         let len = temporary_buffer.len();\n  397 |                         let data = temporary_buffer.as_mut_ptr() as *mut ();\n  398 |                         let mut data = unsafe { Data::from_parts(data, len, sample_format) };\n  399 |                         match data_callback_handle.lock() {\n  400 |                             Ok(mut data_callback) => {\n  401 |                                 // outputLatency can change at runtime, so read it each callback.\n  402 |                                 let output_latency_secs = js_sys::Reflect::get(\n  403 |                                     ctx_handle.as_ref(),\n  404 |                                     &JsValue::from(\"outputLatency\"),\n  405 |                                 )\n  406 |                                 .ok()\n  407 |                                 .and_then(|v| v.as_f64())\n  408 |                                 .unwrap_or(0.0);\n  409 |                                 let total_hw_latency_secs = {\n  410 |                                     let sum = base_latency_secs + output_latency_secs;\n  411 |                                     if sum.is_finite() {\n  412 |                                         sum.max(0.0)\n  413 |                                     } else {\n  414 |                                         0.0\n  415 |                                     }\n  416 |                                 };\n  417 |                                 let callback = StreamInstant::from_secs_f64(now);\n  418 |                                 let playback = StreamInstant::from_secs_f64(\n  419 |                                     time_at_start_of_buffer + total_hw_latency_secs,\n  420 |                                 );","lines":37}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The doc comment for `cmp_default_heuristics` claims the sample-format priority is \"F32 is ranked highest ... followed by F64. Standard integer widths descend by bit depth (I32 > I24 > I16); 64-bit integers are deprioritised below I16\". But the `format_rank` table ranks U8 (3) and I8 (4) BELOW U64 (5) and I64 (6), i.e. 8-bit integers are the lowest non-DSD formats and 64-bit integers sit between 8-bit and 16-bit. The documented \"below I16\" claim is true for 64-bit ints, but the doc never mentions that 8-bit ints rank even lower than 64-bit ints, which is surprising and undocumented. A backend exposing only U8 and I64 would pick I64 as the default, contradicting a naive reading of the heuristic.","fix":"Either reorder format_rank so 8-bit ints are not below 64-bit ints, or expand the doc comment to state the full ordering explicitly (DSD < 8-bit < 64-bit < 16-bit < 24-bit < 32-bit < F64 < F32).","locations":[{"ref":"src/lib.rs:794-799","code":"  794 |     /// **Sample format** (most preferred first):\n  795 |     ///\n  796 |     /// F32 is ranked highest as the universal realtime audio format, followed by F64. Standard\n  797 |     /// integer widths descend by bit depth (I32 > I24 > I16); 64-bit integers are deprioritised\n  798 |     /// below I16 as accumulator types rather than native stream formats. Signed beats unsigned\n  799 |     /// at the same width. DSD ranks last as non-PCM.","lines":6},{"ref":"src/lib.rs:824-843","code":"  824 |         fn format_rank(fmt: SampleFormat) -> u8 {\n  825 |             match fmt {\n  826 |                 SampleFormat::DsdU8 => 0,\n  827 |                 SampleFormat::DsdU16 => 1,\n  828 |                 SampleFormat::DsdU32 => 2,\n  829 |                 SampleFormat::U8 => 3,\n  830 |                 SampleFormat::I8 => 4,\n  831 |                 // 64-bit integers: deprioritised below standard audio widths.\n  832 |                 SampleFormat::U64 => 5,\n  833 |                 SampleFormat::I64 => 6,\n  834 |                 SampleFormat::U16 => 7,\n  835 |                 SampleFormat::I16 => 8,\n  836 |                 SampleFormat::U24 => 9,\n  837 |                 SampleFormat::I24 => 10,\n  838 |                 SampleFormat::U32 => 11,\n  839 |                 SampleFormat::I32 => 12,\n  840 |                 SampleFormat::F64 => 13,\n  841 |                 SampleFormat::F32 => 14,\n  842 |             }\n  843 |         }","lines":20}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `default_host()` for the Linux family, PipeWire and PulseAudio are tried, but if `is_available()` returns true yet `new()` returns `Err`, the code silently falls through to ALSA. That is intended fallback behaviour, however the final `AlsaHost::new().expect(\"the default host should always be available\")` will panic if ALSA initialization fails (e.g. no `/dev/snd`, container without ALSA). `default_host()` returns `Host` (not `Result`), so a system without a working ALSA cannot obtain any host without panicking, even when PipeWire/Pulse exist but failed to construct.","fix":"Fall back to a Null host (or return the successfully constructed PipeWire/Pulse host) instead of unconditionally `expect`-ing on ALSA; at minimum document that default_host can panic on misconfigured Linux systems.","locations":[{"ref":"src/platform/mod.rs:833-849","code":"  833 |     pub fn default_host() -> Host {\n  834 |         #[cfg(feature = \"pipewire\")]\n  835 |         if <PipeWireHost as crate::traits::HostTrait>::is_available() {\n  836 |             if let Ok(host) = PipeWireHost::new() {\n  837 |                 return host.into();\n  838 |             }\n  839 |         }\n  840 |         #[cfg(feature = \"pulseaudio\")]\n  841 |         if <PulseAudioHost as crate::traits::HostTrait>::is_available() {\n  842 |             if let Ok(host) = PulseAudioHost::new() {\n  843 |                 return host.into();\n  844 |             }\n  845 |         }\n  846 |         AlsaHost::new()\n  847 |             .expect(\"the default host should always be available\")\n  848 |             .into()\n  849 |     }","lines":17}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`AsioErrorWrapper` defines both `ASE_OK = 0` and `ASE_SUCCESS = 0x3f4847a0`, but the `asio_result!` macro tests `r == ASE_OK as i32` then `r == ASE_SUCCESS as i32`. `0x3f4847a0` fits in i32 so that's fine, but enum has two variants with overlapping intent and the discriminant after `ASE_SUCCESS` (`ASE_NotPresent = -1000`) resets the auto-counter; subsequent variants (`ASE_HWMalfunction` = -999, etc.) rely on this. This is fragile: any reordering silently changes the numeric mapping used to interpret ASIO return codes. The mapping is also duplicated conceptually between the enum and the macro arms.","fix":"Use explicit discriminants for every variant and/or match on a single source of truth to avoid drift between the enum and the macro.","locations":[{"ref":"asio-sys/src/bindings/errors.rs:25-37","code":"   25 | #[derive(Debug)]\n   26 | pub enum AsioErrorWrapper {\n   27 |     ASE_OK = 0,               // This value will be returned whenever the call succeeded\n   28 |     ASE_SUCCESS = 0x3f4847a0, // unique success return value for ASIOFuture calls\n   29 |     ASE_NotPresent = -1000,   // hardware input or output is not present or available\n   30 |     ASE_HWMalfunction,        // hardware is malfunctioning (can be returned by any ASIO function)\n   31 |     ASE_InvalidParameter,     // input parameter invalid\n   32 |     ASE_InvalidMode,          // hardware is in a bad mode or used in a bad mode\n   33 |     ASE_SPNotAdvancing,       // hardware is not running when sample position is inquired\n   34 |     ASE_NoClock,              // sample clock or rate cannot be determined or is not present\n   35 |     ASE_NoMemory,             // not enough memory for completing the request\n   36 |     Invalid,\n   37 | }","lines":13},{"ref":"asio-sys/src/bindings/errors.rs:94-112","code":"   94 | macro_rules! asio_result {\n   95 |     ($e:expr) => {{\n   96 |         let res = { $e };\n   97 |         match res {\n   98 |             r if r == AsioErrorWrapper::ASE_OK as i32 => Ok(()),\n   99 |             r if r == AsioErrorWrapper::ASE_SUCCESS as i32 => Ok(()),\n  100 |             r if r == AsioErrorWrapper::ASE_NotPresent as i32 => Err(AsioError::NoDrivers),\n  101 |             r if r == AsioErrorWrapper::ASE_HWMalfunction as i32 => {\n  102 |                 Err(AsioError::HardwareMalfunction)\n  103 |             }\n  104 |             r if r == AsioErrorWrapper::ASE_InvalidParameter as i32 => Err(AsioError::InvalidInput),\n  105 |             r if r == AsioErrorWrapper::ASE_InvalidMode as i32 => Err(AsioError::BadMode),\n  106 |             r if r == AsioErrorWrapper::ASE_SPNotAdvancing as i32 => Err(AsioError::HardwareStuck),\n  107 |             r if r == AsioErrorWrapper::ASE_NoClock as i32 => Err(AsioError::NoRate),\n  108 |             r if r == AsioErrorWrapper::ASE_NoMemory as i32 => Err(AsioError::NoMemory),\n  109 |             _ => Err(AsioError::UnknownError),\n  110 |         }\n  111 |     }};\n  112 | }","lines":19}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`can_sample_rate` maps `Err(AsioError::NoRate)` to `Ok(false)`. ASIO's `ASIOCanSampleRate` returns ASE_NoClock for unsupported rates, which `asio_result!` maps to `NoRate`, so this is correct for that path. However `ASIOCanSampleRate` may also return ASE_NotPresent/ASE_InvalidMode for unsupported rates on some drivers; those become hard errors here, so during enumeration `supported_sample_rates` filtering (`.unwrap_or(false)`) hides them but `check_config` (`.map_err(build_stream_err)?`) turns them into a stream-build failure instead of 'unsupported rate'.","fix":"Treat any error from `can_sample_rate` as 'rate not supported' for config validation, or explicitly map the relevant ASIO error codes to `Ok(false)`.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:561-570","code":"  561 |     pub fn can_sample_rate(&self, sample_rate: f64) -> Result<bool, AsioError> {\n  562 |         let _guard = self.inner.lock_state();\n  563 |         unsafe {\n  564 |             match asio_result!(ai::can_sample_rate(sample_rate)) {\n  565 |                 Ok(()) => Ok(true),\n  566 |                 Err(AsioError::NoRate) => Ok(false),\n  567 |                 Err(err) => Err(err),\n  568 |             }\n  569 |         }\n  570 |     }","lines":10},{"ref":"src/host/asio/stream.rs:1141-1147","code":" 1141 |         if driver\n 1142 |             .can_sample_rate(sample_rate)\n 1143 |             .map_err(build_stream_err)?\n 1144 |         {\n 1145 |             driver\n 1146 |                 .set_sample_rate(sample_rate)\n 1147 |                 .map_err(build_stream_err)?;","lines":7}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`DeviceDescription::Display` formats name, manufacturer, device_type and interface_type, but silently omits `driver`, `address`, `direction`, and `extended` fields even when present. A user printing a device for diagnostics loses the direction (input/output/duplex) and address, which are often the most useful disambiguators (e.g. two identical-named USB mics). This is easy to mistake for the description being incomplete.","fix":"Include direction/address in the Display output, or document explicitly that Display is a short label and that callers should inspect the struct for full detail.","locations":[{"ref":"src/device_description.rs:217-235","code":"  217 | impl fmt::Display for DeviceDescription {\n  218 |     fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {\n  219 |         write!(f, \"{}\", self.name)?;\n  220 | \n  221 |         if let Some(mfr) = &self.manufacturer {\n  222 |             write!(f, \" ({})\", mfr)?;\n  223 |         }\n  224 | \n  225 |         if self.device_type != DeviceType::Unknown {\n  226 |             write!(f, \" [{}]\", self.device_type)?;\n  227 |         }\n  228 | \n  229 |         if self.interface_type != InterfaceType::Unknown {\n  230 |             write!(f, \" via {}\", self.interface_type)?;\n  231 |         }\n  232 | \n  233 |         Ok(())\n  234 |     }\n  235 | }","lines":19}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`get_mixer_bursts` reads the system property `aaudio.mixer_bursts` with default `\"2\"` and parses it as i32. The parsed value is later used in build_output_stream as `tuning.mixer_bursts` and clamped with `.max(0)` at mod.rs:527. However a value of 0 (a legitimate possibility) combined with the dynamic-tuning path produces `buffer_size = burst_size * new_mixer_bursts` only after an underrun. The bigger issue: the property is a global hint, not per-stream, and using it as the starting mixer-burst count for an arbitrary stream's buffer can over/under-size the buffer. Minor, but worth noting the property semantics.","fix":"Prefer deriving the initial mixer-burst count from the opened stream (buffer_size_in_frames / frames_per_burst) and treat the system property only as a last-resort hint; document the units.","locations":[{"ref":"src/host/aaudio/java_interface/audio_manager.rs:16-24","code":"   16 | fn get_mixer_bursts<'j>(env: &mut Env<'j>) -> JResult<i32> {\n   17 |     let mixer_bursts = get_system_property(env, \"aaudio.mixer_bursts\", \"2\")?;\n   18 | \n   19 |     let mixer_bursts_string = String::from(mixer_bursts.mutf8_chars(env)?);\n   20 | \n   21 |     mixer_bursts_string\n   22 |         .parse::<i32>()\n   23 |         .map_err(|e| jni::errors::Error::ParseFailed(e.to_string()))\n   24 | }","lines":9},{"ref":"src/host/aaudio/mod.rs:526-537","code":"  526 |     let mixer_bursts = match AudioManager::get_mixer_bursts() {\n  527 |         Ok(bursts) => bursts.max(0),\n  528 |         Err(_) => {\n  529 |             let burst_size = stream.frames_per_burst();\n  530 |             if burst_size > 0 {\n  531 |                 stream.buffer_size_in_frames() / burst_size\n  532 |             } else {\n  533 |                 0 // defer to dynamic tuning\n  534 |             }\n  535 |         }\n  536 |     };\n  537 |     tuning.mixer_bursts.store(mixer_bursts, Ordering::Relaxed);","lines":12}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`AudioDeviceInfo::request` is hard-coded to require SDK_INT >= 23 and otherwise returns a synthetic MethodNotFound error with empty name/sig (devices_info.rs:33-38). On API < 23, callers (HostTrait::devices) swallow the error and return a single default `Device(None)` (mod.rs:181-189), which is fine, but the fabricated `MethodNotFound { name: \"\", sig: \"\" }` is a misleading error type for \"SDK too old\" and will produce a confusing message string if it ever surfaces.","fix":"Return a descriptive error (e.g. jni::errors::Error::Other / a custom message indicating the minimum SDK), not a fake MethodNotFound with empty fields.","locations":[{"ref":"src/host/aaudio/java_interface/devices_info.rs:33-38","code":"   33 |             } else {\n   34 |                 Err(jni::errors::Error::MethodNotFound {\n   35 |                     name: \"\".into(),\n   36 |                     sig: \"\".into(),\n   37 |                 })\n   38 |             }","lines":6}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`device_supported_configs` skips channel counts that fail `ChannelCount::try_from` or equal 0, but it does NOT validate sample rates: `*sample_rate as SampleRate` casts an i32 from the device (or the SAMPLE_RATES table) directly. If a device reports a negative or zero sample rate via getSampleRates(), the `as u32` cast turns a negative i32 into a huge u32 and 0 stays 0, producing invalid SupportedStreamConfigRange entries that later fail validation only at build time.","fix":"Filter sample rates to positive values (and reasonable bounds) the same way channel counts are filtered, before building the config range.","locations":[{"ref":"src/host/aaudio/mod.rs:252-268","code":"  252 |     for sample_rate in sample_rates {\n  253 |         for channel_count in channel_counts {\n  254 |             let Ok(channels) = ChannelCount::try_from(*channel_count) else {\n  255 |                 continue;\n  256 |             };\n  257 |             if channels == 0 {\n  258 |                 continue;\n  259 |             }\n  260 |             for format in formats {\n  261 |                 output.push(SupportedStreamConfigRange {\n  262 |                     channels,\n  263 |                     min_sample_rate: *sample_rate as SampleRate,\n  264 |                     max_sample_rate: *sample_rate as SampleRate,\n  265 |                     buffer_size,\n  266 |                     sample_format: *format,\n  267 |                 });\n  268 |             }","lines":17}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`configure_for_device` sets buffer_capacity_in_frames to `size.saturating_mul(2)` for fixed buffer sizes, but frames_per_data_callback is set to `size`. AAudio requires buffer capacity >= frames_per_burst and the callback size, but a capacity of exactly 2*callback may be smaller than the device's burst-aligned minimum for some sizes, or the device may silently clamp. More importantly, the capacity multiplier of 2 is a magic heuristic with no documented rationale and is applied regardless of how many bursts the device actually needs to avoid underruns.","fix":"Document the 2x rationale, and consider deriving capacity from frames_per_burst after open rather than from the requested callback size.","locations":[{"ref":"src/host/aaudio/mod.rs:291-296","code":"  291 |     if let BufferSize::Fixed(size) = config.buffer_size {\n  292 |         // For fixed sizes, the user explicitly wants control over the callback size.\n  293 |         builder = builder\n  294 |             .frames_per_data_callback(size.min(i32::MAX as FrameCount) as i32)\n  295 |             .buffer_capacity_in_frames(size.saturating_mul(2).min(i32::MAX as FrameCount) as i32);\n  296 |     }","lines":6}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `process_input`, an EAGAIN after a partial read (`frames_read > 0`) returns `ErrorKind::Xrun` (lines 1175-1180), which causes the worker to call `prepare()`+`start()`, discarding the partially read frames already drained from the device. Because `readi` is non-blocking here (PCM opened non-blocking), EAGAIN mid-period is plausible and converting it to a full xrun-recovery throws away valid captured audio and reports a spurious xrun to the user error callback.","fix":"On EAGAIN with partial progress, retry the read (optionally after a short poll/wait) to complete the period rather than treating it as an xrun; only escalate to xrun on EPIPE.","locations":[{"ref":"src/host/alsa/mod.rs:1165-1191","code":" 1165 |     let mut frames_read = 0;\n 1166 |     while frames_read < stream.period_size {\n 1167 |         match stream\n 1168 |             .handle\n 1169 |             .io_bytes()\n 1170 |             .readi(&mut buffer[frames_read * stream.frame_size..])\n 1171 |         {\n 1172 |             Ok(n) => frames_read += n,\n 1173 |             // EAGAIN = no frames available: skip this cycle if no progress was made,\n 1174 |             // otherwise treat as an underrun (partial period cannot be delivered safely).\n 1175 |             Err(err) if err.errno() == libc::EAGAIN => {\n 1176 |                 if frames_read == 0 {\n 1177 |                     return Ok(());\n 1178 |                 } else {\n 1179 |                     return Err(ErrorKind::Xrun.into());\n 1180 |                 }\n 1181 |             }\n 1182 |             // EPIPE = xrun: full underrun recovery (prepare + start) required.\n 1183 |             Err(err) if err.errno() == libc::EPIPE => return Err(ErrorKind::Xrun.into()),\n 1184 |             // ESTRPIPE = hardware suspend: try soft resume first, falling back to underrun\n 1185 |             // recovery if the hardware doesn't support it.\n 1186 |             Err(err) if err.errno() == libc::ESTRPIPE => {\n 1187 |                 return try_resume(&stream.handle).map(|_| ());\n 1188 |             }\n 1189 |             Err(err) => return Err(err.into()),\n 1190 |         }\n 1191 |     }","lines":27}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Devices::next` reads `driver.sample_rate().unwrap_or(0.0)` and stores `sample_rate as SampleRate` into the Device; a driver that reports 0 (common before a stream is active, per the comment) yields a Device with `sample_rate == 0`. `default_config` does not reject a zero sample rate, so `default_input_config`/`default_output_config` can return a `SupportedStreamConfig` with `sample_rate: 0`, which is an invalid config that downstream code (frames_to_duration, validate_stream_config) may divide by or reject inconsistently.","fix":"Reject or substitute a sensible default when `sample_rate == 0` in `default_config`, or defer rate reporting until known.","locations":[{"ref":"src/host/asio/device.rs:195","code":"  195 |                         let sample_rate = driver.sample_rate().unwrap_or(0.0);","lines":1},{"ref":"src/host/asio/device.rs:104-112","code":"  104 |         Ok(SupportedStreamConfig {\n  105 |             channels,\n  106 |             sample_rate: self.sample_rate,\n  107 |             buffer_size: SupportedBufferSize::Range {\n  108 |                 min: self.buffer_size_min,\n  109 |                 max: self.buffer_size_max,\n  110 |             },\n  111 |             sample_format,\n  112 |         })","lines":9}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Devices::next` returns `None` immediately on `LoadDriverError::DriverAlreadyExists`, stopping enumeration entirely. If a stream is active on driver A, enumeration cannot list any subsequent driver - but it also cannot list driver A's metadata via this path. More subtly, the iterator silently truncates the device list whenever any driver is currently loaded, which the caller cannot distinguish from 'no more devices'. This can make `default_input_device`/`default_output_device` return `None` or the wrong device while a stream is open.","fix":"When a driver is already loaded, surface the currently-loaded driver's metadata (or skip just that name) rather than ending enumeration; document the limitation.","locations":[{"ref":"src/host/asio/device.rs:238-240","code":"  238 |                     // A different driver is already loaded (e.g. an active Stream holds it). Stop\n  239 |                     // cleanly rather than spinning through the rest of the list.\n  240 |                     Err(sys::LoadDriverError::DriverAlreadyExists) => return None,","lines":3}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`TimeBase::to_stream_instant` detects timer wrap via `ns < prev` using `Relaxed` ordering and a single shared `last_ns`. Because callbacks and `now()` both call this and swap `last_ns`, a `now()` call interleaved between two callback timestamps can record a smaller `ns` (timeGetTime ms granularity vs the callback's ns), falsely triggering a wrap and adding ~49.7 days to the epoch, permanently corrupting all subsequent StreamInstants. The comment claims races only matter at true wrap (~every 49.7 days), but ms-vs-ns granularity differences make spurious `ns < prev` likely far more often.","fix":"Maintain separate monotonic bases for `now()` and the callback path, or only run wrap detection on the callback (single-thread) timestamps; do not let the coarse `now()` value feed wrap detection.","locations":[{"ref":"src/host/asio/stream.rs:36-51","code":"   36 | impl TimeBase {\n   37 |     /// Convert a nanosecond timestamp to a monotonic `StreamInstant`.\n   38 |     fn to_stream_instant(&self, ns: u64) -> StreamInstant {\n   39 |         // `Relaxed` is sufficient: callbacks run on a single ASIO thread. The only\n   40 |         // cross-thread caller is `now()`, which may race at wrap time (~1µs every 49.7 days).\n   41 |         let prev = self.last_ns.swap(ns, Ordering::Relaxed);\n   42 |         let epoch = if ns < prev {\n   43 |             self.epoch_ns\n   44 |                 .fetch_add(TIMEGETIME_WRAP_NS, Ordering::Relaxed)\n   45 |                 + TIMEGETIME_WRAP_NS\n   46 |         } else {\n   47 |             self.epoch_ns.load(Ordering::Relaxed)\n   48 |         };\n   49 |         StreamInstant::from_nanos(epoch + ns)\n   50 |     }\n   51 | }","lines":16},{"ref":"src/host/asio/stream.rs:92-98","code":"   92 |     pub fn now(&self) -> StreamInstant {\n   93 |         // `ASIOTimeInfo::systemTime` is specified by the ASIO SDK as nanoseconds\n   94 |         // derived from `timeGetTime()`, so calling it here gives a value on the\n   95 |         // same clock as the `system_time` field delivered to every callback.\n   96 |         let ms = unsafe { windows::Win32::Media::timeGetTime() };\n   97 |         self.time_base.to_stream_instant(ms as u64 * 1_000_000)\n   98 |     }","lines":7}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`WasmAudioProcessor::process` resizes `interleaved_buffer` to `interleaved_buffer_size.max(self.interleaved_buffer.len())`, so the buffer only ever grows and is never shrunk. After a one-time large frame_size, the buffer permanently retains the larger allocation. The slice passed to the callback is correctly truncated to `[..interleaved_buffer_size]`, so correctness is fine, but the comment \"This likely only occurs once\" understates that a transient large quantum permanently inflates memory. Minor.","fix":"Either document that the buffer is intentionally never shrunk, or resize to exactly interleaved_buffer_size (the realloc cost is amortized since it's rare).","locations":[{"ref":"src/host/audioworklet/mod.rs:518-524","code":"  518 |         // Ensure there's enough space in the output buffer\n  519 |         // This likely only occurs once, or very few times.\n  520 |         let interleaved_buffer_size = channels as usize * frame_size;\n  521 |         self.interleaved_buffer.resize(\n  522 |             interleaved_buffer_size.max(self.interleaved_buffer.len()),\n  523 |             0.0,\n  524 |         );","lines":7}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"get_device_buffer_frames computes `(buffer_duration * sample_rate) as usize`. If AVAudioSession reports a sample_rate of 0 (session not configured / inactive) the result is 0, and an `as usize` cast of a negative or NaN float would saturate/produce 0 silently. This feeds the latency calculation and Stream::buffer_size(), which would then report a meaningless 0-frame buffer.","fix":"Validate that buffer_duration and sample_rate are finite and positive before converting, and surface an error (or a sensible default) instead of returning 0.","locations":[{"ref":"src/host/coreaudio/ios/mod.rs:384-392","code":"  384 | fn get_device_buffer_frames() -> usize {\n  385 |     // SAFETY: AVAudioSession methods are safe to call on the singleton instance\n  386 |     unsafe {\n  387 |         let audio_session = AVAudioSession::sharedInstance();\n  388 |         let buffer_duration = audio_session.IOBufferDuration();\n  389 |         let sample_rate = audio_session.sampleRate();\n  390 |         (buffer_duration * sample_rate) as usize\n  391 |     }\n  392 | }","lines":9},{"ref":"src/host/coreaudio/ios/mod.rs:315-317","code":"  315 |     fn buffer_size(&self) -> Result<FrameCount, Error> {\n  316 |         Ok(get_device_buffer_frames() as FrameCount)\n  317 |     }","lines":3}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"extract_audio_buffer (input branch) reads a single AudioBuffer from mBuffers without checking mNumberBuffers > 0; its own safety doc states the caller must guarantee at least one buffer, but the input callback that calls it does no such check. If CoreAudio ever delivers an empty buffer list the read is on out-of-range memory of the [AudioBuffer;1] tail.","fix":"Check mNumberBuffers (or args.data.data validity) before reading mBuffers and produce a zero-length Data when there are no buffers.","locations":[{"ref":"src/host/coreaudio/ios/mod.rs:485-513","code":"  485 | unsafe fn extract_audio_buffer(\n  486 |     args: &render_callback::Args<data::Raw>,\n  487 |     bytes_per_channel: usize,\n  488 |     sample_format: SampleFormat,\n  489 |     is_input: bool,\n  490 | ) -> (AudioBuffer, Data) {\n  491 |     let buffer = if is_input {\n  492 |         // Input: access through buffer array\n  493 |         let first_buf_ptr = core::ptr::addr_of!((*args.data.data).mBuffers) as *const AudioBuffer;\n  494 |         core::ptr::read_unaligned(first_buf_ptr)\n  495 |     } else {\n  496 |         // Output: direct access\n  497 |         let buf_ptr = core::ptr::addr_of!((*args.data.data).mBuffers[0]);\n  498 |         core::ptr::read_unaligned(buf_ptr)\n  499 |     };\n  500 | \n  501 |     let mut data_ptr = buffer.mData as *mut ();\n  502 |     let mut len = buffer.mDataByteSize as usize / bytes_per_channel;\n  503 | \n  504 |     // SAFETY: slice::from_raw_parts requires a non-null pointer.\n  505 |     if data_ptr.is_null() {\n  506 |         data_ptr = NonNull::dangling().as_ptr();\n  507 |         len = 0;\n  508 |     }\n  509 | \n  510 |     let data = Data::from_parts(data_ptr, len, sample_format);\n  511 | \n  512 |     (buffer, data)\n  513 | }","lines":29},{"ref":"src/host/coreaudio/ios/mod.rs:531-535","code":"  531 |     audio_unit.set_input_callback(move |args: Args| {\n  532 |         // SAFETY: CoreAudio provides valid AudioBufferList for the callback duration\n  533 |         let (buffer, data) =\n  534 |             unsafe { extract_audio_buffer(&args, bytes_per_channel, sample_format, true) };\n  535 | ","lines":5}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","description":"JACK `JackNotificationHandler::sample_rate` returns `jack::Control::Quit` whenever the reported rate differs from the configured rate, even while the stream is still in `StreamState::Starting` (in which case it does NOT emit the error first, due to the guard on line 562). Quitting the client on a benign initial sample-rate notification during startup could tear down a freshly-activated client before it ever plays, without informing the user.","fix":"During `Starting`, return `Control::Continue` (adopt/accept the rate) instead of `Quit`, or only `Quit` after the stream has left the Starting state.","locations":[{"ref":"src/host/jack/stream.rs:557-572","code":"  557 |     fn sample_rate(&mut self, _: &jack::Client, srate: jack::Frames) -> jack::Control {\n  558 |         if srate == self.configured_sample_rate {\n  559 |             // One of these notifications is sent every time a client is started.\n  560 |             return jack::Control::Continue;\n  561 |         }\n  562 |         if StreamState::load(&self.state, Ordering::Acquire) != StreamState::Starting {\n  563 |             emit_error(\n  564 |                 &self.error_callback_ptr,\n  565 |                 Error::with_message(\n  566 |                     ErrorKind::StreamInvalidated,\n  567 |                     format!(\"JACK server changed sample rate to {srate} Hz\"),\n  568 |                 ),\n  569 |             );\n  570 |         }\n  571 |         jack::Control::Quit\n  572 |     }","lines":16}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Device::description()` returns `Ok(... \"Null Device\")` and `id()` returns `Ok(...)`, yet every other operation on the same device panics via `unimplemented!()`. This is internally inconsistent: the device advertises itself as a real, named, identifiable device but cannot actually do anything. Combined with `devices()` returning `Ok(Devices)` (an iterator that yields nothing) and `default_*_device()` returning `None`, the API surface is contradictory about whether a null device exists.","fix":"Make the null device either fully absent (no enumeration, errors everywhere) or fully inert-but-non-panicking. Pick one model and apply it consistently so callers can rely on either \"no devices\" or \"devices  |                     ),\n  541 |                 ));\n  542 |             }\n  543 |         }","lines":13}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","description":"PulseAudio `supported_config_ranges` iterates `for channel_count in 1..protocol::sample_spec::MAX_CHANNELS`, an exclusive upper bound, so the maximum supported channel count is never advertised (off-by-one). `make_channel_map` supports up to that count, and `default_config_from_spec` happily reports `channel_map.num_channels()` which can equal MAX_CHANNELS, so the advertised supported-config list is inconsistent with what the device can actually report/accept.","fix":"Use `1..=protocol::sample_spec::MAX_CHANNELS` (inclusive) if MAX_CHANNELS is a valid count, or clarify the intended exclusive semantics.","locations":[{"ref":"src/host/pulseaudio/mod.rs:230","code":"  230 |         for channel_count in 1..protocol::sample_spec::MAX_CHANNELS {","lines":1}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`format_from_waveformatex_ptr` maps `(32, IEEE_FLOAT) -> F32` and `(64, IEEE_FLOAT) -> F64` for the non-extensible (wFormatTag) path, and the PCM path handles 8/16. But for plain WAVE_FORMAT_PCM with wBitsPerSample of 24 or 32 (legacy non-extensible formats some drivers report), the match falls through to `_ => return None`, silently dropping a valid format the device reports via GetMixFormat. Modern Windows uses EXTENSIBLE so impact is low, but the comment claims it handles GetMixFormat output generally.","fix":"Add 24/32-bit WAVE_FORMAT_PCM arms (I24/I32) to the non-extensible match, mirroring the extensible branch.","locations":[{"ref":"src/host/wasapi/device.rs:225-260","code":"  225 |     let sample_format = match (\n  226 |         (*waveformatex_ptr).wBitsPerSample,\n  227 |         (*waveformatex_ptr).wFormatTag as u32,\n  228 |     ) {\n  229 |         (8, Audio::WAVE_FORMAT_PCM) => SampleFormat::U8,\n  230 mat::F64 => 13,\n  841 |                 SampleFormat::F32 => 14,\n  842 |             }\n  843 |         }","lines":20}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"`supported_output_configs` in webaudio sets `buffer_size: SupportedBufferSize::Range { min: 1, max: FrameCount::MAX }`, but the actual implementation uses a ScriptProcessor-style scheduling with DEFAULT_BUFFER_SIZE=2048 and only honors BufferSize::Fixed by casting `v as usize` with no range check against any real limit (mod.rs:271-274). Advertising a max of FrameCount::MAX (4 billion frames) is misleading; an enormous fixed buffer would allocate `buffer_size_frames * channels` f32s and likely OOM or fail at create_buffer. The advertised range does not reflect a usable range.","fix":"Advertise a realistic max buffer size (e.g. a few seconds of frames) rather than FrameCount::MAX, or validate Fixed sizes against a sane upper bound.","locations":[{"ref":"src/host/webaudio/mod.rs:134-137","code":"  134 |         let buffer_size = SupportedBufferSize::Range {\n  135 |             min: 1,\n  136 |             max: FrameCount::MAX,\n  137 |         };","lines":4},{"ref":"src/host/webaudio/mod.rs:271-283","code":"  271 |         let buffer_size_frames = match config.buffer_size {\n  272 |             BufferSize::Fixed(v) => v as usize,\n  273 |             BufferSize::Default => DEFAULT_BUFFER_SIZE,\n  274 |         };\n  275 |         let buffer_size_samples = buffer_size_frames.checked_mul(n_channels).ok_or_else(|| {\n  276 |             Error::with_message(\n  277 |                 ErrorKind::UnsupportedConfig,\n  278 |                 format!(\n  279 |                     \"Buffer size {} * channel count {} overflows on this platform\",\n  280 |                     buffer_size_frames, config.channels\n  281 |                 ),\n  282 |             )\n  283 |         })?;","lines":13}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`asio_get_buffer_sizes`/`buffersize_range` map ASIO granularity values: `-1 => Only`, `0 => Preferred`, `n>0 => Stepped{step:n}`. Per the ASIO SDK, `ASIOGetBufferSize`'s granularity is `-1` meaning 'power of 2' (sizes are powers of two between min and max), not 'only the preferred size'. Treating `-1` as `Only(pref)` makes `check_config` reject every fixed buffer size except exactly `pref`, even though the driver supports a range of power-of-two sizes.","fix":"Model `-1` granularity as 'power-of-two sizes between min and max' and validate fixed sizes accordingly, rather than as a single allowed size.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:533-548","code":"  533 |     pub fn buffersize_range(&self) -> Result<BufferSizeRange, AsioError> {\n  534 |         let _guard = self.inner.lock_state();\n  535 |         let buffer_sizes = asio_get_buffer_sizes()?;\n  536 |         Ok(BufferSizeRange {\n  537 |             min: buffer_sizes.min,\n  538 |             max: buffer_sizes.max,\n  539 |             preferred: match buffer_sizes.grans {\n  540 |                 -1 => BufferPreference::Only(buffer_sizes.pref as u32),\n  541 |                 0 => BufferPreference::Preferred(buffer_sizes.pref as u32),\n  542 |                 granularity => BufferPreference::Stepped {\n  543 |                     preferred: buffer_sizes.pref as u32,\n  544 |                     step: granularity as u32,\n  545 |                 },\n  546 |             },\n  547 |         })\n  548 |     }","lines":16},{"ref":"src/host/asio/stream.rs:1124-1135","code":" 1124 |         if let sys::BufferPreference::Stepped { step, .. } = range.preferred {\n 1125 |             let offset = requested_size_i32 - range.min;\n 1126 |             if offset % step as i32 != 0 {\n 1127 |                 return Err(Error::with_message(\n 1128 |                     ErrorKind::UnsupportedConfig,\n 1129 |                     format!(\n 1130 |
