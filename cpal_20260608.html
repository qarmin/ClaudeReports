: StreamInstant) -> Duration {\n  102 |         self.saturating_duration_since(earlier)\n  103 |     }","lines":11}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Comment in `asio_message` for `kAsioResyncRequest` says 'The driver encountered non-fatal data loss (e.g. a timestamp discontinuity). Notify the host so it can handle the gap appropriately.' But the cpal stream layer treats kAsioResyncRequest as a full stream-invalidation requiring stop/reinit/start (stream.rs:1013-1024 and its own comment explicitly contradicts this, citing the ASIO spec/JUCE: it is NOT a simple xrun). The two comments give opposite descriptions of the same selector.","fix":"Correct the asio-sys comment to state that kAsioResyncRequest means the driver needs a full restart/reinit, matching the stream-layer handling and the SDK.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:1161-1169","code":" 1161 |         Some(AsioMessageSelectors::kAsioResyncRequest) => {\n 1162 |             // The driver encountered non-fatal data loss (e.g. a timestamp discontinuity).\n 1163 |             // Notify the host so it can handle the gap appropriately.\n 1164 |             dispatch_event(AsioDriverEvent::Message {\n 1165 |                 selector: AsioMessageSelectors::kAsioResyncRequest,\n 1166 |                 value,\n 1167 |             });\n 1168 |             true as c_long\n 1169 |         }","lines":9},{"ref":"src/host/asio/stream.rs:1013-1024","code":" 1013 |                     sys::AsioMessageSelectors::kAsioResyncRequest => {\n 1014 |                         // Per the ASIO spec (and matching JUCE's behavior), kAsioResyncRequest\n 1015 |                         // means the driver needs a full stop/reinit/start. It is *not* a simple\n 1016 |                         // xrun notification.\n 1017 |                         if StreamState::load(&state, Ordering::Acquire) != StreamState::Starting {\n 1018 |                             let _ = timer_tx.send(Error::with_message(\n 1019 |                                 ErrorKind::StreamInvalidated,\n 1020 |                                 \"Stream resynchronization was requested by the ASIO driver\",\n 1021 |                             ));\n 1022 |                         }\n 1023 |                         true\n 1024 |                     }","lines":12}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment for DEFAULT_CHANNEL_COUNTS claims these are \"ITU-R BS.2051 standard surround channel counts\". The values [1, 2, 4, 6, 8] are generic mono/stereo/quad/5.1/7.1 layouts; BS.2051 defines specific advanced sound-system layouts (e.g. up to 24 channels) and is not the source of this simple list. The citation is misleading.","fix":"Reword to describe them as common channel-count fallbacks (mono/stereo/quad/5.1/7.1) without the inaccurate ITU-R BS.2051 attribution.","locations":[{"ref":"src/host/aaudio/mod.rs:105-107","code":"  105 | // ITU-R BS.2051 standard surround channel counts; used as fallback when the device does not\n  106 | // report its own via AudioDeviceInfo.getChannelCounts().\n  107 | const DEFAULT_CHANNEL_COUNTS: [i32; 5] = [1, 2, 4, 6, 8];","lines":3}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Doc comments on `process_input_callback` (and the numbered steps) use `///` (outer doc comments) on statements/nested functions inside the closure body. These are not valid doc-comment positions; rustc warns about doc comments not attached to items in some contexts, and they document nothing. They should be `//` line comments. Same pattern for the `/// 1. Render ...` block on the output side.","fix":"Change `///` to `//` for these inline explanatory comments.","locations":[{"ref":"src/host/asio/stream.rs:250-251","code":"  250 |             /// 1. Write from the ASIO buffer to the interleaved CPAL buffer.\n  251 |             /// 2. Deliver the CPAL buffer to the user callback.","lines":2},{"ref":"src/host/asio/stream.rs:593-596","code":"  593 |             /// 1. Render the given callback to the given buffer of interleaved samples.\n  594 |             /// 2. If required, silence the ASIO buffer.\n  595 |             /// 3. Finally, write the interleaved data to the non-interleaved ASIO buffer,\n  596 |             ///    performing endianness conversions as necessary.","lines":4}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The variable `bytes_per_channel` in the render/input callbacks is actually bytes-per-sample (sample_format.sample_size()), and `len = data_byte_size / bytes_per_channel` yields the total interleaved sample count, not a per-channel count. The name is misleading: for multi-channel interleaved data it is not bytes per channel-frame. setup_callback_vars returns it under the same misleading name.","fix":"Rename to bytes_per_sample to reflect that it is the size of one sample, not one channel-frame.","locations":[{"ref":"src/host/coreaudio/macos/device.rs:771","code":"  771 |             let len = data_byte_size as usize / bytes_per_channel;","lines":1},{"ref":"src/host/coreaudio/macos/device.rs:882","code":"  882 |             let len = data_byte_size as usize / bytes_per_channel;","lines":1},{"ref":"src/host/coreaudio/macos/device.rs:1034","code":" 1034 |     let bytes_per_channel = sample_format.sample_size();","lines":1}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"PipeWire output `process` comment on line 702 says \"frames = samples / channels or frames = data_len / stride\", but the code computes `frames = requested.min(maxsize / stride)` - it uses PipeWire's `requested()` count, not a division of available samples. The comment describes a different (record-path) formula and is misleading for this branch.","fix":"Update the comment to describe the requested-vs-capacity clamp actually performed.","locations":[{"ref":"src/host/pipewire/stream.rs:702-705","code":"  702 |                 // frames = samples / channels or frames = data_len / stride\n  703 |                 // Honor the frame count PipeWire requests this cycle, capped by the\n  704 |                 // mapped buffer capacity to guard against any mismatch.\n  705 |                 let frames = requested.min(buf_data.as_raw().maxsize as usize / stride);","lines":4}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment on `Device::future_audio_client` (and the type-level comment) says the uninitialized IAudioClient is cached \"so that we can call functions from it without having to create/destroy audio clients all the time\". But `build_audioclient` does `lock.take().unwrap()`, removing the client from the cache on every stream build, so the cache is emptied whenever a stream is constructed and a fresh client is activated next time. The comment overstates the caching behaviour.","fix":"Reword the comment to reflect that the cache is used for format-probing reuse but is consumed when a stream is built.","locations":[{"ref":"src/host/wasapi/device.rs:86-89","code":"   86 |     /// We cache an uninitialized `IAudioClient` so that we can call functions from it without\n   87 |     /// having to create/destroy audio clients all the time.\n   88 |     future_audio_client: Arc<Mutex<Option<IAudioClientWrapper>>>, // TODO: add NonZero around the ptr\n   89 | }","lines":4},{"ref":"src/host/wasapi/device.rs:607-615","code":"  607 |     /// Returns an uninitialized `IAudioClient`.\n  608 |     pub(crate) fn build_audioclient(\n  609 |         &self,\n  610 |         activation_timeout: Option<Duration>,\n  611 |     ) -> Result<Audio::IAudioClient, Error> {\n  612 |         let mut lock = self.ensure_future_audio_client(activation_timeout)?;\n  613 |         // ensure_future_audio_client always sets the Option to Some before returning Ok.\n  614 |         Ok(lock.take().unwrap().0)\n  615 |     }","lines":9}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc for `FrameCount` (`pub type FrameCount = u32`) describes what a *frame* is (\"one sample for each channel\"), but `FrameCount` is a count of frames, not the definition of a frame. The prose is attached to the wrong item and reads as if `FrameCount` were a frame rather than a number of frames.","fix":"Reword to describe the count, e.g. \"A number of frames, where one frame is one sample per channel.\"","locations":[{"ref":"src/lib.rs:231-233","code":"  231 | /// A frame represents one sample for each channel. For example, with stereo audio,\n  232 | /// one frame contains two samples (left and right channels).\n  233 | pub type FrameCount = u32;","lines":3}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Typos and stale comments: 'Either create a stream if thers none or had back the size' (twice), 'Max length for divers name', 'c_uint (flags)' cast note references MinGW-w64 which is no longer the build path (build.rs uses MSVC/cc), and the `kAsioBufferSizeChange` enum doc says 'not yet supported, will currently always return 0L' yet the code now actively handles it.","fix":"Fix typos and update stale comments to match current behavior.","locations":[{"ref":"src/host/asio/stream.rs:863-864","code":"  863 |         // Either create a stream if thers none or had back the\n  864 |         // size of the current one.","lines":2},{"ref":"src/host/asio/stream.rs:905-906","code":"  905 |         // Either create a stream if thers none or had back the\n  906 |         // size of the current one.","lines":2},{"ref":"asio-sys/src/bindings/mod.rs:395","code":"  395 |         const MAX_DRIVER_NAME_LEN: usize = 32;","lines":1},{"ref":"asio-sys/src/bindings/mod.rs:248-251","code":"  248 |     kAsioBufferSizeChange,      // not yet supported, will currently always return 0L.\n  249 |                                 // for now, use kAsioResetRequest instead.\n  250 |                                 // once implemented, the new buffer size is expected\n  251 |                                 // in <value>, and on success returns 1L","lines":4}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc on `LatchWaiter::wait` says it \"Parks the calling thread until the latch is released or dropped without releasing.\" In fact the function spins-and-parks: on each loop iteration it upgrades the `Weak`, checks the flag, and only parks when the latch is still alive and the flag is false. This is correct (park tokens make the missed-wakeup window safe), but the phrasing implies a single blocking park rather than a loop. Minor, but for a sync primitive the exact semantics matter to future readers.","fix":"Reword the doc to note that it loops, re-checking the flag and the liveness of the latch on each spurious or real wakeup, and only returns when the flag is set (true) or the latch's `Arc` has been dropped (false).","locations":[{"ref":"src/host/latch.rs:81-83","code":"   81 |     /// Parks the calling thread until the latch is released or dropped without releasing.\n   82 |     ///\n   83 |     /// Returns `true` if the stream is ready, `false` if the [`Latch`] was dropped before release.","lines":3},{"ref":"src/host/latch.rs:92-103","code":"   92 |     pub(crate) fn wait(&self) -> bool {\n   93 |         loop {\n   94 |             match self.0.upgrade() {\n   95 |                 None => return false,\n   96 |                 Some(flag) if flag.load(Ordering::Acquire) => return true,\n   97 |                 Some(flag) => {\n   98 |                     drop(flag); // release strong ref before parking\n   99 |                     std::thread::park();\n  100 |                 }\n  101 |             }\n  102 |         }\n  103 |     }","lines":12}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"PulseAudio `make_playback_buffer_attr` comment block (lines 619-622) has a run-on / mismatched sentence: \"Double-buffer: total buffer = 2 callback periods. With adjust_latency this becomes the end-to-end latency target, Minimum request = one callback period, ...\" - the comma after \"target\" should be a period, and the description mixes two fields awkwardly, making the intent hard to follow.","fix":"Rewrite as separate sentences per field; fix the stray comma.","locations":[{"ref":"src/host/pulseaudio/mod.rs:618-627","code":"  618 |             protocol::stream::BufferAttr {\n  619 |                 // Double-buffer: total buffer = 2 callback periods. With\n  620 |                 // adjust_latency this becomes the end-to-end latency target,\n  621 |                 // Minimum request = one callback period, ensuring the server\n  622 |                 // always asks for exactly frame_count frames per call.\n  623 |                 max_length: double_len,\n  624 |                 target_length: double_len,\n  625 |                 minimum_request_length: len,\n  626 |                 ..Default::default()\n  627 |             }","lines":10}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The module doc for `sample_format.rs` states \"All multi-byte sample formats use the native endianness of the target platform. CPAL handles any necessary conversions when interfacing with hardware that uses a different byte order.\" This is an overbroad guarantee: cpal generally hands raw native-endian buffers to/from the backend and does NOT perform byte-order conversion in the core; the claim that \"CPAL handles any necessary conversions\" is misleading for users relying on it.","fix":"Soften the wording to state that samples are interpreted in native endianness and that t the shared scaffolding (load, validate, allocate, latency, event callback, start/rollback) into a helper generic over direction, and table-drive the format dispatch.","locations":[{"ref":"src/host/asio/stream.rs:124-455","code":"  124 |     pub fn build_input_stream_raw<D, E>(\n  125 |         &self,\n  126 |         config: StreamConfig,\n  127 |         sample_format: SampleFormat,\n  128 |         mut data_callback: D,\n  129 |         error_callback: E,\n  130 |         _timeout: Option<Duration>,\n  131 |     ) -> Result<Stream, Error>\n  132 |     where\n  133 |         D: FnMut(&Data, &InputCallbackInfo) + Send + 'static,\n  134 |         E: FnMut(Error) + Send + 'static,\n  135 |     {\n  136 |         crate::validate_stream_config(&config)?;\n  137 |         com::com_initialized();\n  138 |         let description = self.description()?;\n  139 |         let driver = super::GLOBAL_ASIO\n  140 |             .get()\n  141 |             .ok_or_else(|| {\n  142 |                 Error::with_message(\n  143 |                     ErrorKind::DeviceNotAvailable,\n  144 |                     \"ASIO driver is not initialized\",\n  145 |                 )\n  146 |             })?\n  147 |             .load_driver(description.name())\n  148 |             .map_err(load_driver_err)?;\n  149 | \n  150 |         let stream_type = driver.input_data_type().map_err(build_stream_err)?;\n  151 | \n  152 |         // Ensure that the desired sample type is supported.\n  153 |         let expected_sample_format =\n  154 |             super::device::convert_data_type(&stream_type).ok_or_else(|| {\n  155 |                 Error::with_message(\n  156 |                     ErrorKind::UnsupportedConfig,\n  157 |                     \"Input sample format is not supported\",\n  158 |                 )\n  159 |             })?;\n  160 |         if sample_format != expected_sample_format {\n  161 |             return Err(Error::with_message(\n  162 |                 ErrorKind::UnsupportedConfig,\n  163 |                 format!(\n  164 |                     \"Sample format {sample_format} is not supported; expected {expected_sample_format}\"\n  165 |                 ),\n  166 |             ));\n  167 |         }\n  168 | \n  169 |         let num_channels = config.channels;\n  170 |         let buffer_size = self.get_or_create_input_stream(&driver, config, sample_format)?;\n  171 |         let cpal_num_samples = buffer_size * num_channels as usize;\n  172 | \n  173 |         // Create the buffer depending on the size of the data type.\n  174 |         let len_bytes = cpal_num_samples * sample_format.sample_size();\n  175 |         let mut interleaved = vec![0u8; len_bytes];\n  176 | \n  177 |         // Query hardware input latency (order matters: needs buffers created above).\n  178 |         // Wrapped in Arc<AtomicUsize> so the message callback can update it on\n  179 |         // kAsioLatenciesChanged without touching the buffer callback.\n  180 |         let hardware_input_latency = Arc::new(AtomicU32::new(\n  181 |             driver\n  182 |                 .latencies()\n  183 |                 .map(|latencies| latencies.input.max(0) as u32)\n  184 |                 .unwrap_or(0),\n  185 |         ));\n  186 | \n  187 |         let state = Arc::new(AtomicU8::new(StreamState::Starting as u8));\n  188 |         let driver_event_callback_id = self\n  189 |             .add_event_callback(\n  190 |                 &driver,\n  191 |                 error_callback,\n  192 |                 Arc::clone(&hardware_input_latency),\n  193 |                 true,\n  194 |                 Arc::clone(&state),\n  195 |             )\n  196 |             .inspect_err(|_| {\n  197 |                 // Roll back the input stream stored by get_or_create_input_stream.\n  198 |                 if let Ok(mut streams) = self.asio_streams.lock() {\n  199 |                     streams.input = None;\n  200 |                 }\n  201 |             })?;\n  202 | \n  203 n  108 |         let total = self.as_nanos().checked_add(duration.as_nanos())?;\n  109 |         let secs = u64::try_from(total / 1_000_000_000).ok()?;\n  110 |         let nanos = (total % 1_000_000_000) as u32;\n  111 |         Some(Self { secs, nanos })\n  112 |     }\n  113 | \n  114 |     /// Returns `Some(t)` where `t` is `self - duration`, or `None` if the result cannot be\n  115 |     /// represented as a `StreamInstant` (i.e. would be negative).\n  116 |     pub fn checked_sub(&self, duration: Duration) -> Option<Self> {\n  117 |         let total = self.as_nanos().checked_sub(duration.as_nanos())?;\n  118 |         let secs = u64::try_from(total / 1_000_000_000).ok()?;\n  119 |         let nanos = (total % 1_000_000_000) as u32;\n  120 |         Some(Self { secs, nanos })\n  121 |     }","lines":15},{"ref":"src/timestamp.rs:156-168","code":"  156 |     pub fn from_secs_f64(secs: f64) -> Self {\n  157 |         const NANOS_PER_SEC: u128 = 1_000_000_000;\n  158 |         const MAX_NANOS: f64 = ((u64::MAX as u128 + 1) * NANOS_PER_SEC) as f64;\n  159 |         let nanos = secs * NANOS_PER_SEC as f64;\n  160 |         if !(0.0..MAX_NANOS).contains(&nanos) {\n  161 |             panic!(\"StreamInstant::from_secs_f64 called with invalid value: {secs}\");\n  162 |         }\n  163 |         let nanos = nanos as u128;\n  164 |         Self::new(\n  165 |             (nanos / NANOS_PER_SEC) as u64,\n  166 |             (nanos % NANOS_PER_SEC) as u32,\n  167 |         )\n  168 |     }","lines":13}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","description":"AudioObjectGetPropertyData takes io_data_size as NonNull<u32> (an in/out parameter that CoreAudio writes the actual byte count back into) and the out_data pointer. Several call sites pass `NonNull::from(&data_size)` where `data_size` is bound with an immutable `let`, so CoreAudio mutates a u32 through a pointer derived from a shared reference to a non-interior-mutable value. That is undefined behavior in Rust. Affected: is_aggregate_device (device.rs:386 `let data_size`, used at 396) and default_input_device / default_output_device (enumerate.rs:91/98 and 121/128).","fix":"Bind these as `let mut data_size = ...` and pass `NonNull::from(&mut data_size)` so the write-back goes through a unique mutable reference, matching the other call sites in this file.","locations":[{"ref":"src/host/coreaudio/macos/device.rs:386-399","code":"  386 |         let data_size = size_of::<AudioClassID>() as u32;\n  387 | \n  388 |         // SAFETY: AudioObjectGetPropertyData is documented to write an AudioClassID\n  389 |         // for kAudioObjectPropertyClass. We check the status before using the value.\n  390 |         let status = unsafe {\n  391 |             AudioObjectGetPropertyData(\n  392 |                 self.audio_device_id,\n  393 |                 NonNull::from(&property_address),\n  394 |                 0,\n  395 |                 null(),\n  396 |                 NonNull::from(&data_size),\n  397 |                 NonNull::from(&mut class_id).cast(),\n  398 |             )\n  399 |         };","lines":14},{"ref":"src/host/coreaudio/macos/enumerate.rs:91-101","code":"   91 |     let data_size = mem::size_of::<AudioDeviceID>() as u32;\n   92 |     let status = unsafe {\n   93 |         AudioObjectGetPropertyData(\n   94 |             kAudioObjectSystemObject as AudioObjectID,\n   95 |             NonNull::from(&property_address),\n   96 |             0,\n   97 |             null(),\n   98 |             NonNull::from(&data_size),\n   99 |             NonNull::from(&mut audio_device_id).cast(),\n  100 |         )\n  101 |     };","lines":11},{"ref":"src/host/coreaudio/macos/enumerate.rs:121-131","code":"  121 |     let data_size = mem::size_of::<AudioDeviceID>() as u32;\n  122 |     let status = unsafe {\n  123 |         AudioObjectGetPropertyData(\n  124 |             kAudioObjectSystemObject as AudioObjectID,\n  125 |             NonNull::from(&property_address),\n  126 |             0,\n  127 |             null(),\n  128 |             NonNull::from(&data_size),\n  129 |             NonNull::from(&mut audio_device_id).cast(),\n  130 |         )\n  131 |     };","lines":11}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"medium","description":"audio_devices() has a TOCTOU window: it queries the size, allocates capacity for `device_count` IDs, then calls AudioObjectGetPropertyData and unconditionally `set_len(device_count)` using the count from the first query. If the device list shrank between the two calls, CoreAudio writes fewer IDs but set_len still exposes uninitialized AudioDeviceID slots.","fix":"Recompute the element count from the data_size value written back by AudioObjectGetPropertyData and set_len to that value.","locations":[{"ref":"src/host/coreaudio/macos/enumerate.rs:34-60","code":"   34 |     let mut data_size = 0u32;\n   35 |     let status = AudioObjectGetPropertyDataSize(\n   36 |         kAudioObjectSystemObject as AudioObjectID,\n   37 |         NonNull::from(&property_address),\n   38 |         0,\n   39 |         null(),\n   40 |         NonNull::from(&mut data_size),\n   41 |     );\n   42 |     try_status_or_return!(status);\n   43 | \n   44 |     let device_count = data_size / mem::size_of::<AudioDeviceID>() as u32;\n   45 |     let mut audio_devices = vec![];\n   46 |     audio_devices.reserve_exact(device_count as usize);\n   47 | \n   48 |     let status = AudioObjectGetPropertyData(\n   49 |         kAudioObjectSystemObject as AudioObjectID,\n   50 |         NonNull::from(&property_address),\n   51 |         0,\n   52 |         null(),\n   53 |         NonNull::from(&mut data_size),\n   54 |         NonNull::new(audio_devices.as_mut_ptr()).unwrap().cast(),\n   55 |     );\n   56 |     try_status_or_return!(status);\n   57 | \n   58 |     audio_devices.set_len(device_count as usize);\n   59 | \n   60 |     Ok(audio_devices)","lines":27}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","description":"build.rs `download_asio_sdk_to_temp_dir` downloads the ASIO SDK from a hardcoded URL over the network with no checksum/signature verification, then compiles and statically links whatever it extracted. A network MITM or a changed upstream archive results in arbitrary C++ being compiled into the build. Also `host_os_is_windows()` uses `std::env::consts::OS` (the build-host OS) while the rest of main() keys off `CARGO_CFG_TARGET_OS`, so the download branch logic and the target-gating can disagree under cross-compilation.","fix":"Pin and verify a checksum of the downloaded SDK; prefer requiring CPAL_ASIO_DIR. Make host/target OS handling consistent.","locations":[{"ref":"asio-sys/build.rs:300-370","code":"  300 | fn download_asio_sdk_to_temp_dir(temp_dir: &Path) {\n  301 |     let asio_zip_path = temp_dir.join(\"asio_sdk.zip\");\n  302 |     if host_os_is_windows() {\n  303 |         let status = Command::new(\"powershell\")\n  304 |             .args([\n  305 |                 \"-NoProfile\",\n  306 |                 \"-Command\",\n  307 |                 &format!(\n  308 |                     \"Invoke-WebRequest -Uri {ASIO_SDK_URL} -OutFile {}\",\n  309 |                     asio_zip_path.display()\n  310 |                 ),\n  311 |             ])\n  312 |             .status()\n  313 |             .expect(\"Failed to execute PowerShell command\");\n  314 | \n  315 |         if !status.success() {\n  316 |             panic!(\"Failed to download ASIO SDK\");\n  317 |         }\n  318 |         println!(\"Downloaded ASIO SDK successfully\");\n  319 | \n  320 |         // Unzip using PowerShell's Expand-Archive\n  321 |         println!(\"Extracting ASIO SDK..\");\n  322 |         let status = Command::new(\"powershell\")\n  323 |             .args([\n  324 |                 \"-NoProfile\",\n  325 |                 \"-Command\",\n  326 |                 &format!(\n  327 |                     \"Expand-Archive -Path {} -DestinationPath {} -Force\",\n  328 |                     asio_zip_path.display(),\n  329 |                     temp_dir.display()\n  330 |                 ),\n  331 |             ])\n  332 |             .status()\n  333 |             .expect(\"Failed to execute PowerShell command for extracting ASIO SDK\");\n  334 | \n  335 |         if !status.success() {\n  336 |             panic!(\"Failed to extract ASIO SDK\");\n  337 |         }\n  338 |     } else {\n  339 |         let status = Command::new(\"sh\")\n  340 |             .arg(\"-c\")\n  341 |             .arg(&format!(\n  342 |                 \"curl -L --fail --output {} {}\",\n  343 |                 asio_zip_path.display(),\n  344 |                 \"https://www.steinberg.net/asiosdk\" // Replace with the actual ASIO SDK URL\n  345 |             ))\n  346 |             .status()\n  347 |             .expect(\"Failed to execute curl command\");\n  348 | \n  349 |         if !status.success() {\n  350 |             panic!(\"Failed to download ASIO SDK\");\n  351 |         }\n  352 |         println!(\"Downloaded ASIO SDK successfully\");\n  353 | \n  354 |         // Extract using `unzip`\n  355 |         println!(\"Extracting ASIO SDK..\");\n  356 |         let status = Command::new(\"unzip\")\n  357 |             .args([\n  358 |                 \"-o\",\n  359 |                 asio_zip_path.to_str().unwrap(),\n  360 |                 \"-d\",\n  361 |                 temp_dir.to_str().unwrap(),\n  362 |             ])\n  363 |             .status()\n  364 |             .expect(\"Failed to execute unzip command for extracting ASIO SDK\");\n  365 | \n  366 |         if !status.success() {\n  367 |             panic!(\"Failed to extract ASIO SDK\");\n  368 |         }\n  369 |     }\n  370 | }","lines":71},{"ref":"asio-sys/build.rs:20-23","code":"   20 | /// Checks if the host OS is Windows\n   21 | fn host_os_is_windows() -> bool {\n   22 |     std::env::consts::OS == \"windows\"\n   23 | }","lines":4}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","description":"`asio_channel_slice`/`_mut` and the i24 helpers create slices from raw driver pointers with no alignment guarantee for type `T` (i16/i32/u32/u64). `AsioBufferInfo` is `#[repr(C, packed(4))]` and ASIO buffers are driver-allocated; `from_raw_parts` requires the pointer be properly aligned for `T`. For u64/f64 (8-byte) samples the driver buffer is only guaranteed 4-byte aligned by the packed layout assumption, so reading as `&[u64]` may be misaligned -> UB on the audio thread.","fix":"Use unaligned reads/writes (read_unaligned/copy_nonoverlapping through byte slices) for sample access, or assert/verify ASIO guarantees natural alignment for the sample type.","locations":[{"ref":"src/host/asio/stream.rs:1200-1226","code":" 1200 | unsafe fn asio_channel_slice<T>(\n 1201 |     asio_stream: &sys::AsioStream,\n 1202 |     buffer_index: usize,\n 1203 |     channel_index: usize,\n 1204 |     requested_channel_length: Option<usize>,\n 1205 | ) -> &[T] {\n 1206 |     let channel_length = requested_channel_length.unwrap_or(asio_stream.buffer_size as usize);\n 1207 |     let buff_ptr: *const T =\n 1208 |         asio_stream.buffer_infos[channel_index].buffers[buffer_index] as *const _;\n 1209 |     std::slice::from_raw_parts(buff_ptr, channel_length)\n 1210 | }\n 1211 | \n 1212 | /// Shorthand for retrieving the asio buffer slice associated with a channel.\n 1213 | ///\n 1214 | /// The channel length is automatically inferred from the buffer size or some\n 1215 | /// value can be passed to enforce a certain length (for odd sized sample formats)\n 1216 | #[inline]\n 1217 | unsafe fn asio_channel_slice_mut<T>(\n 1218 |     asio_stream: &mut sys::AsioStream,\n 1219 |     buffer_index: usize,\n 1220 |     channel_index: usize,\n 1221 |     requested_channel_length: Option<usize>,\n 1222 | ) -> &mut [T] {\n 1223 |     let channel_length = requested_channel_length.unwrap_or(asio_stream.buffer_size as usize);\n 1224 |     let buff_ptr: *mut T = asio_stream.buffer_infos[channel_index].buffers[buffer_index] as *mut _;\n 1225 |     std::slice::from_raw_parts_mut(buff_ptr, channel_length)\n 1226 | }","lines":27},{"ref":"src/host/asio/stream.rs:269","code":"  269 |                 let interleaved: &mut [A] = cast_slice_mut(interleaved);","lines":1},{"ref":"src/host/asio/stream.rs:614","code":"  614 |                 let interleaved: &mut [A] = cast_slice_mut(interleaved);","lines":1}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"negligible","description":"build.rs uses `env::set_var` to import vcvarsall.bat output into the build process environment. `env::set_var` is being deprecated as `unsafe` in newer Rust editions (data races with other threads reading env), and build scripts may run concurrently in some setups. Additionally `entry.path().file_name().unwrap()` in create_lib's walk closure will panic on a path ending in `..` (unlikely but unguarded).","fix":"Pass variables explicitly to the `cc`/`bindgen` invocation instead of mutating process env; avoid the `unwrap` on file_name.","locations":[{"ref":"asio-sys/build.rs:410-417","code":"  410 |     for line in String::from_utf8_lossy(&output.stdout).lines() {\n  411 |         // Filters the output of vcvarsall.bat to only include lines of the form \"VARNAME=VALUE\"\n  412 |         let parts: Vec<&str> = line.splitn(2, '=').collect();\n  413 |         if parts.len() == 2 {\n  414 |             env::set_var(parts[0], parts[1]);\n  415 |             println!(\"{}={}\", parts[0], parts[1]);\n  416 |         }\n  417 |     }","lines":8},{"ref":"asio-sys/build.rs:100","code":"  100 |                     if entry.path().file_name().unwrap().to_str() == Some(\"asiodrvr.cpp\") {","lines":1}]},{"id":"ARCHIT_1","type":"architecture","type_label":"Architecture","severity":"low","description":"`mod.rs` is a 1716-line file mixing many distinct concerns: host/device enumeration glue, PCM open helpers, hw/sw parameter negotiation, the self-pipe trigger primitive, timestamp math, the equilibrium-fill strategy, the worker threads, and the public Stream/StreamTrait impl. This monolith makes the concurrency-sensitive worker/control interaction hard to reason about and review.","fix":"Split into submodules, e.g. `stream.rs` (StreamInner/worker/process_*), `params.rs` (hw/sw param negotiation, supported_configs), `timestamp.rs` (TimestampMode and htstamp math), and `trigger.rs` (self-pipe), keeping `mod.rs` to the Host/Device wiring.","locations":[{"ref":"src/host/alsa/mod.rs:1-1716","code":"    1 | //! ALSA backend implementation.\n    2 | //!\n    3 | //! Default backend on Linux and BSD systems.\n    4 | \n    5 | extern crate alsa;\n    6 | #[cfg(feature = \"realtime\")]\n    7 | extern crate alsa_sys;\n    8 | extern crate libc;\n    9 | \n   10 | use std::{\n   11 |     collections::HashMap,\n   12 |     fmt,\n   13 |     sync::{\n   14 |         atomic::{AtomicBool, Ordering},\n   15 |         Arc, Mutex,\n   16 |     },\n   17 |     thread::{self, JoinHandle},\n   18 |     time::Duration,\n   19 |     vec::IntoIter as VecIntoIter,\n   20 | };\n   21 | \n   22 | use self::alsa::poll::Descriptors;\n   23 | pub use self::enumerate::Devices;\n   24 | use crate::{\n   25 |     host::{\n   26 |         equilibrium::{fill_equilibrium, DSD_EQUILIBRIUM_BYTE, U8_EQUILIBRIUM_BYTE},\n   27 |         frames_to_duration,\n   28 |         latch::Latch,\n   29 |     },\n   30 |     iter::{SupportedInputConfigs, SupportedOutputConfigs},\n   31 |     traits::{DeviceTrait, HostTrait, StreamTrait},\n   32 |     BufferSize, ChannelCount, Data, DeviceDescription, DeviceDescriptionBuilder, DeviceDirection,\n   33 |     DeviceId, Error, ErrorKind, FrameCount, InputCallbackInfo, InputStreamTimestamp,\n   34 |     OutputCallbackInfo, OutputStreamTimestamp, SampleFormat, SampleRate, StreamConfig,\n   35 |     StreamInstant, SupportedBufferSize, SupportedStreamConfig, SupportedStreamConfigRange,\n   36 |     COMMON_SAMPLE_RATES,\n   37 | };\n   38 | \n   39 | mod enumerate;\n   40 | \n   41 | // ALSA Buffer Size Behavior\n   42 | // =========================\n   43 | //\n   44 | // ## ALSA Latency Model\n   45 | //\n   46 | // **Hardware vs Software Buffer**: ALSA maintains a software buffer in memory that feeds\n   47 | // a hardware buffer in the audio device. Audio latency is determined by how much data\n   48 | // sits in the software buffer before being transferred to hardware.\n   49 | //\n   50 | // **Period-Based Transfer**: ALSA transfers data in chunks called \"periods\". When one\n   51 | // period worth of data has been consumed by hardware, ALSA triggers a callback to refill\n   52 | // that period in the software buffer.\n   53 | //\n   54 | // ## BufferSize::Fixed Behavior\n   55 | //\n   56 | // When `BufferSize::Fixed(x)` is specified, cpal attempts to configure the period size\n   57 | // to approximately `x` frames to achieve the requested callback size. However, the\n   58 | // actual callback size may differ from the request:\n   59 | //\n   60 | // - ALSA may round the period size to hardware-supported values\n   61 | // - Different devices have different period size constraints\n   62 | // - The callback size is not guaranteed to exactly match the request\n   63 | // - If the requested size cannot be accommodated, ALSA will choose the nearest\n   64 | //   supported configuration\n   65 | //\n   66 | // This mirrors the behavior documented in the cpal API where `BufferSize::Fixed(x)`\n   67 | // requests but does not guarantee a specific callback size.\n   68 | //\n   69 | // ## BufferSize::Default Behavior\n   70 | //\n   71 | // When `BufferSize::Default` is specified, cpal does NOT set explicit period size or\n   72 | // period count constraints, allowing the device/driver to choose sensible defaults.\n   73 | //\n   74 | // **Why not set defaults?** Different audio systems have different behaviors:\n   75 | //\n   76 | // - **Native ALSA hardware**: Typically chooses reasonable defaults (e.g., 512-2048\n   77 | //   frame periods with 2-4 periods)\n   78 | //\n   79 | // - **PipeWire-ALSA plugin**: Allocates a large ring buffer (~1M frames at 48kHz) but\n   80 | //   uses small periods (512-1024 frames). Critically, if you request `set_periods(2)`\n   81 | //   without specifying period size, PipeWire calculates period = buffer/2, resulting\n   82 | //   in pathologically large periods (~524K frames = 10 seconds). See issues #1029 and\n   83 | //   #1036.\n   84 | //\n   85 | // By not constraining period configuration, PipeWire-ALSA can use its optimized defaults\n   86 | // (small periods with many-period buffer), while native ALSA hardware uses its own defaults.\n   87 | //\n   88 | // **Startup latency**: Regardless of buffer size, cpal uses double-buffering for startup\n   89 | // (start_threshold = 2 periods), ensuring low latency even with large multi-period ring\n   90 | // buffers.\n   91 | \n   92 | const DEFAULT_DEVICE: &str = \"default\";\n   93 | const DEFAULT_PERIODS: alsa::pcm::Frames = 2;\n   94 | \n   95 | // Some ALSA plugins (e.g. alsaequal, certain USB drivers) are not reentrant.\n   96 | static ALSA_OPEN_MUTEX: std::sync::Mutex<()> = std::sync::Mutex::new(());\n   97 | \n   98 | fn open_pcm(pcm_id: &str, direction: alsa::Direction) -> Result<alsa::pcm::PCM, Error> {\n   99 |     let _guard = ALSA_OPEN_MUTEX.lock().unwrap_or_else(|e| e.into_inner());\n  100 |     alsa::pcm::PCM::new(pcm_id, direction, true).map_err(|e| {\n  101 |         let e = Error::from(e);\n  102 |         if e.kind() == ErrorKind::UnsupportedConfig {\n  103 |             let dir = match direction {\n  104 |                 alsa::Direction::Capture => \"input\",\n  105 |                 alsa::Direction::Playback => \"output\",\n  106 |             };\n  107 |             Error::with_message(\n  108 |                 ErrorKind::UnsupportedOperation,\n  109 |                 format!(\"Device does not support {dir}\"),\n  110 |             )\n  111 |         } else {\n  112 |             e\n  113 |         }\n  114 |     })\n  115 | }\n  116 | \n  117 | // TODO: Not yet defined in rust-lang/libc crate\n  118 | const LIBC_ENOTSUPP: libc::c_int = 524;\n  119 | \n  120 | /// The default Linux and BSD host type.\n  121 | #[derive(Debug, Clone)]\n  122 | pub struct Host {\n  123 |     inner: Arc<AlsaContext>,\n  124 | }\n  125 | \n  126 | impl Host {\n  127 |     pub fn new() -> Result<Self, Error> {\n  128 |         let inner = AlsaContext::new().map_err(|e| {\n  129 |             Error::with_message(\n  130 |                 ErrorKind::HostUnavailable,\n  131 |                 format!(\"ALSA is not available: {e}\"),\n  132 |             )\n  133 |         })?;\n  134 |         Ok(Self {\n  135 |             inner: Arc::new(inner),\n  136 |         })\n  137 |     }\n  138 | \n  139 |     // \"default\" is a virtual ALSA device that redirects to the configured default. We cannot\n  140 |     // determine its actual capabilities without opening it, so we return Unknown direction.\n  141 |     fn default_device(&self) -> Device {\n  142 |         Device {\n  143 |             pcm_id: DEFAULT_DEVICE.to_owned(),\n  144 |             desc: Some(\"Default Audio Device\".to_owned()),\n  145 |             direction: DeviceDirection::Unknown,\n  146 |             _context: self.inner.clone(),\n  147 |         }\n  148 |     }\n  149 | }\n  150 | \n  151 | impl HostTrait for Host {\n  152 |     type Devices = Devices;\n  153 |     type Device = Device;\n  154 | \n  155 |     fn is_available() -> bool {\n  156 |         // Assume ALSA is always available on Linux and BSD.\n  157 |         true\n  158 |     }\n  159 | \n  160 |     fn devices(&self) -> Result<Self::Devices, Error> {\n  161 |         self.enumerate_devices()\n  162 |     }\n  163 | \n  164 |     fn device_by_id(&self, id: &DeviceId) -> Option<Self::Device> {\n  165 |         let canonical_id = DeviceId::new(id.host( SampleFormat::I16 => 8,\n  836 |                 SampleFormat::U24 => 9,\n  837 |                 SampleFormat::I24 => 10,\n  838 |                 SampleFormat::U32 => 11,\n  839 |                 SampleFormat::I32 => 12,\n  840 |                 SampleFormat::F64 => 13,\n  841 |                 SampleFormat::F32 => 14,\n  842 |             }\n  843 |         }\n  844 | \n  845 |         let cmp_format = format_rank(self.sample_format).cmp(&format_rank(other.sample_format));\n  846 |         if cmp_format != Equal {\n  847 |             return cmp_format;\n  848 |         }\n  849 | \n  850 |         let cmp_broadcast = self\n  851 |             .contains_rate(SAMPLE_RATE_48K)\n  852 |             .cmp(&other.contains_rate(SAMPLE_RATE_48K));\n  853 |         if cmp_broadcast != Equal {\n  854 |             return cmp_broadcast;\n  855 |         }\n  856 | \n  857 |         let cmp_cd = self\n  858 |             .contains_rate(SAMPLE_RATE_CD)\n  859 |             .cmp(&other.contains_rate(SAMPLE_RATE_CD));\n  860 |         if cmp_cd != Equal {\n  861 |             return cmp_cd;\n  862 |         }\n  863 | \n  864 |         self.max_sample_rate.cmp(&other.max_sample_rate)\n  865 |     }\n  866 | }\n  867 | \n  868 | impl From<SupportedStreamConfig> for StreamConfig {\n  869 |     fn from(conf: SupportedStreamConfig) -> Self {\n  870 |         conf.config()\n  871 |     }\n  872 | }\n  873 | \n  874 | #[allow(dead_code)]\n  875 | pub(crate) fn validate_stream_config(config: &StreamConfig) -> Result<(), Error> {\n  876 |     if config.channels == 0 {\n  877 |         return Err(Error::with_message(\n  878 |             ErrorKind::InvalidInput,\n  879 |             \"channel count must be at least 1\",\n  880 |         ));\n  881 |     }\n  882 |     if config.sample_rate == 0 {\n  883 |         return Err(Error::with_message(\n  884 |             ErrorKind::InvalidInput,\n  885 |             \"sample rate must be at least 1 Hz\",\n  886 |         ));\n  887 |     }\n  888 |     if config.buffer_size == BufferSize::Fixed(0) {\n  889 |         return Err(Error::with_message(\n  890 |             ErrorKind::InvalidInput,\n  891 |             \"buffer size must be greater than 0\",\n  892 |         ));\n  893 |     }\n  894 |     Ok(())\n  895 | }\n  896 | \n  897 | // If a backend does not provide an API for retrieving supported formats, we query it with a bunch\n  898 | // of commonly used rates. This is always the case for WASAPI and is sometimes the case for ALSA.\n  899 | #[allow(dead_code)]\n  900 | pub(crate) const COMMON_SAMPLE_RATES: &[SampleRate] = &[\n  901 |     // Standard PCM rates and DSD sample rates through DSD512\n  902 |     5512, 8000, 11025, 12000, 16000, 22050, 24000, 32000, 44100, 48000, 64000, 88200, 96000, 176400,\n  903 |     192000, 352800, 384000, 705600, 768000, 1411200, 1536000, 2822400, 3072000, 5644800, 6144000,\n  904 |     11289600, 12288000, 22579200, 24576000,\n  905 | ];","lines":468}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-06-08 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
