rite back a smaller actual size into data_size), then unconditionally `set_len(n_ranges)`. The updated data_size returned by the second call is ignored, so if the device returns fewer ranges than the first query indicated, the Vec exposes uninitialized AudioValueRange entries.","fix":"After the second AudioObjectGetPropertyData, recompute the length from the (possibly updated) data_size value and set_len to that, not the count from the size query.","locations":[{"ref":"src/host/coreaudio/macos/device.rs:131-146","code":"  131 |         let n_ranges = data_size as usize / mem::size_of::<AudioValueRange>();\n  132 |         let mut ranges: Vec<AudioValueRange> = Vec::with_capacity(n_ranges);\n  133 |         let status = unsafe {\n  134 |             AudioObjectGetPropertyData(\n  135 |                 audio_device_id,\n  136 |                 NonNull::from(&property_address),\n  137 |                 0,\n  138 |                 null(),\n  139 |                 NonNull::from(&mut data_size),\n  140 |                 NonNull::new(ranges.as_mut_ptr()).unwrap().cast(),\n  141 |             )\n  142 |         };\n  143 |         coreaudio::Error::from_os_status(status)?;\n  144 |         unsafe {\n  145 |             ranges.set_len(n_ranges);\n  146 |         }","lines":16},{"ref":"src/host/coreaudio/macos/device.rs:548-560","code":"  548 |             let n_ranges = data_size as usize / mem::size_of::<AudioValueRange>();\n  549 |             let mut ranges: Vec<AudioValueRange> = Vec::with_capacity(n_ranges);\n  550 |             let status = AudioObjectGetPropertyData(\n  551 |                 self.audio_device_id,\n  552 |                 NonNull::from(&property_address),\n  553 |                 0,\n  554 |                 null(),\n  555 |                 NonNull::from(&mut data_size),\n  556 |                 NonNull::new(ranges.as_mut_ptr()).unwrap().cast(),\n  557 |             );\n  558 |             check_os_status(status)?;\n  559 | \n  560 |             ranges.set_len(n_ranges);","lines":13}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"PulseAudio `Host::new` spawns a thread that calls `Client::from_env` and on timeout returns an error while the spawned thread keeps running (the comment acknowledges \"leak the thread\"). If `from_env` later succeeds, the resulting `Client` is dropped, but the thread leak is permanent per failed host probe. Since host probing may be retried, this can accumulate stuck threads each holding a half-open socket/auth handshake. Also `CString::new(...).unwrap()` (line 139) will panic if the process id formatting ever contains a NUL, which it cannot today, but the unwrap is a latent panic.","fix":"Bound the handshake with a connect/socket timeout inside the worker so the thread terminates, or use a cancellation mechanism. Replace the `unwrap()` with a mapped error.","locations":[{"ref":"src/host/pulseaudio/mod.rs:134-157","code":"  134 |     pub fn new() -> Result<Self, Error> {\n  135 |         // `Client::from_env` does a blocking auth handshake with no socket timeout. If this never\n  136 |         // returns, fall through to the next host with no other option than to leak the thread.\n  137 |         let (tx, rx) = mpsc::channel();\n  138 |         std::thread::spawn(move || {\n  139 |             let name = CString::new(format!(\"cpal-pulseaudio-{}\", std::process::id())).unwrap();\n  140 |             let _ = tx.send(pulseaudio::Client::from_env(&name));\n  141 |         });\n  142 |         let client = rx\n  143 |             .recv_timeout(INIT_TIMEOUT)\n  144 |             .map_err(|err| match err {\n  145 |                 mpsc::RecvTimeoutError::Timeout => Error::with_message(\n  146 |                     ErrorKind::HostUnavailable,\n  147 |                     \"PulseAudio is not available: connection timed out\",\n  148 |                 ),\n  149 |                 mpsc::RecvTimeoutError::Disconnected => Error::with_message(\n  150 |                     ErrorKind::HostUnavailable,\n  151 |                     \"PulseAudio is not available: initialization failed\",\n  152 |                 ),\n  153 |             })\n  154 |             .and_then(|r| r.map_err(Error::from))?;\n  155 | \n  156 |         Ok(Self { client })\n  157 |     }","lines":24}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`is_format_supported` ignores the HRESULT for error cases: it returns `Ok(hr.0 == 0)` for any hr. IsFormatSupported can return genuine failures (E_POINTER, AUDCLNT_E_UNSUPPORTED_FORMAT, AUDCLNT_E_DEVICE_INVALIDATED, E_OUTOFMEMORY). All of these collapse to `Ok(false)` (\"not supported\") indistinguishably from the legitimate S_FALSE case, so a device-invalidated or OOM condition during format probing is silently reported as merely-unsupported instead of surfacing the real error.","fix":"Match on hr: S_OK -> Ok(true), S_FALSE -> Ok(false), otherwise return Err(Error::from(windows::core::Error::from(hr))).","locations":[{"ref":"src/host/wasapi/device.rs:198-215","code":"  198 | pub unsafe fn is_format_supported(\n  199 |     client: &Audio::IAudioClient,\n  200 |     waveformatex_ptr: *const Audio::WAVEFORMATEX,\n  201 | ) -> Result<bool, Error> {\n  202 |     let mut closest_match: *mut Audio::WAVEFORMATEX = ptr::null_mut();\n  203 |     let hr = client.IsFormatSupported(\n  204 |         Audio::AUDCLNT_SHAREMODE_SHARED,\n  205 |         waveformatex_ptr,\n  206 |         Some(&mut closest_match),\n  207 |     );\n  208 |     if !closest_match.is_null() {\n  209 |         let _free = WaveFormatExPtr(closest_match);\n  210 |     }\n  211 | \n  212 |     // S_OK (hr.0 == 0): format is natively supported, Initialize will accept it without conversion.\n  213 |     // S_FALSE (hr.0 == 1): only usable when AUTOCONVERTPCM is set (output).\n  214 |     Ok(hr.0 == 0)\n  215 | }","lines":18}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `load_driver`, after `ASIOInit` succeeds the code calls `get_sample_rate` and ignores its result via `let _ = asio_result!(...)`. That's acceptable, but if `ASIOInit` succeeds and then any later step were to fail there is no `ASIOExit`/`remove_current_driver` cleanup before returning - the loaded driver would leak. Currently no fallible step exists after ASIOInit, but the pattern is fragile because `load_asio_driver` already ran and a future added `?` here would leak the SDK driver.","fix":"Wrap post-`load_asio_driver` initialization so any failure calls `ASIOExit`+`remove_current_driver` before returning the error.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:461-485","code":"  461 |         unsafe {\n  462 |             match ai::load_asio_driver(driver_name_cstring.as_ptr() as *mut c_char) {\n  463 |                 false => Err(LoadDriverError::LoadDriverFailed),\n  464 |                 true => {\n  465 |                     // Initialize ASIO.\n  466 |                     asio_result!(ai::ASIOInit(driver_info.as_mut_ptr()))?;\n  467 |                     let _driver_info = driver_info.assume_init();\n  468 |                     let mut rate: c_double = 0.0;\n  469 |                     let _ = asio_result!(ai::get_sample_rate(&mut rate));\n  470 |                     if rate > 0.0 {\n  471 |                         CURRENT_SAMPLE_RATE.store(rate.to_bits(), Ordering::Release);\n  472 |                     }\n  473 |                     let state = Mutex::new(DriverState::Initialized);\n  474 |                     let name = driver_name.to_string();\n  475 |                     let destroyed = false;\n  476 |                     let inner = Arc::new(DriverInner {\n  477 |                         name,\n  478 |                         state,\n  479 |                         destroyed,\n  480 |                     });\n  481 |                     *loaded = Arc::downgrade(&inner);\n  482 |                     let driver = Driver { inner };\n  483 |                     Ok(driver)\n  484 |                 }\n  485 |             }","lines":25}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `set_sw_params_from_format`, if the first `pcm_handle.sw_params(&sw_params)` fails for any reason other than the unsupported tstamp_type (e.g. an invalid start_threshold or avail_min), the fallback path (lines 1678-1681) only changes the timestamp type and retries, masking and discarding the real underlying error. The comment assumes the only possible failure is the tstamp_type, which is not guaranteed.","fix":"Only fall back when the error is specifically due to the tstamp type (e.g. check errno), and otherwise propagate the original error instead of silently retrying with a different parameter.","locations":[{"ref":"src/host/alsa/mod.rs:1672-1681","code":" 1672 |     sw_params.set_tstamp_mode(true)?;\n 1673 |     sw_params.set_tstamp_type(alsa::pcm::TstampType::MonotonicRaw)?;\n 1674 | \n 1675 |     // tstamp_type param cannot be changed after the device is opened.\n 1676 |     // The default tstamp_type value on most Linux systems is \"monotonic\",\n 1677 |     // let's try to use it if setting the tstamp_type fails.\n 1678 |     if pcm_handle.sw_params(&sw_params).is_err() {\n 1679 |         sw_params.set_tstamp_type(alsa::pcm::TstampType::Monotonic)?;\n 1680 |         pcm_handle.sw_params(&sw_params)?;\n 1681 |     }","lines":10}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In the AudioWorklet output path, the async worklet setup runs in spawn_local and any failure (add_module, AudioWorkletNode construction, connect) is reported only via error_callback after build_output_stream_raw has already returned Ok. The doc comment acknowledges this. However the AudioContext is created and returned even when setup fails; the resulting Stream is dead (no node connected) but play()/pause() still succeed, giving the caller a silently non-functional stream. There is no state flag recording that the worklet failed.","fix":"Record an AtomicBool/state for worklet-init failure and have play()/buffer_size() surface it, or document loudly that errors arrive only via the error callback and the stream is otherwise inert.","locations":[{"ref":"src/host/audioworklet/mod.rs:350-435","code":"  350 |         wasm_bindgen_futures::spawn_local(async move {\n  351 |             let result: Result<(), JsValue> = async move {\n  352 |                 let mod_url = dependent_module!(\"worklet.js\")?;\n  353 |                 wasm_bindgen_futures::JsFuture::from(ctx.audio_worklet()?.add_module(&mod_url)?)\n  354 |                     .await?;\n  355 | \n  356 |                 let options = web_sys::AudioWorkletNodeOptions::new();\n  357 | \n  358 |                 let js_array = js_sys::Array::new();\n  359 |                 js_array.push(&JsValue::from_f64(destination.channel_count() as _));\n  360 | \n  361 |                 options.set_output_channel_count(&js_array);\n  362 |                 options.set_number_of_inputs(0);\n  363 | \n  364 |                 // Capture audio output latency here: the closure runs in a separate worker and cannot access AudioContext properties directly.\n  365 |                 // While baseLatency is fixed for the context lifetime, outputLatency can change but not be re-read from inside the worklet;\n  366 |                 // we snapshot it here.\n  367 |                 let base_latency_secs =\n  368 |                     js_sys::Reflect::get(ctx.as_ref(), &JsValue::from(\"baseLatency\"))\n  369 |                         .ok()\n  370 |                         .and_then(|v| v.as_f64())\n  371 |                         .unwrap_or(0.0);\n  372 |                 let output_latency_secs =\n  373 |                     js_sys::Reflect::get(ctx.as_ref(), &JsValue::from(\"outputLatency\"))\n  374 |                         .ok()\n  375 |                         .and_then(|v| v.as_f64())\n  376 |                         .unwrap_or(0.0);\n  377 |                 let total_output_latency_secs = {\n  378 |                     let sum = base_latency_secs + output_latency_secs;\n  379 |                     if sum.is_finite() {\n  380 |                         sum.max(0.0)\n  381 |                     } else {\n  382 |                         0.0\n  383 |                     }\n  384 |                 };\n  385 | \n  386 |                 options.set_processor_options(Some(&js_sys::Array::of3(\n  387 |                     &wasm_bindgen::module(),\n  388 |                     &wasm_bindgen::memory(),\n  389 |                     &WasmAudioProcessor::new(Box::new(\n  390 |                         move |interleaved_data, frame_size, sample_rate, now| {\n  391 |                             buffer_size_frames_cb.store(frame_size as u64, Ordering::Relaxed);\n  392 |                             let data = interleaved_data.as_mut_ptr() as *mut ();\n  393 |                             let mut data = unsafe {\n  394 |                                 Data::from_parts(data, interleaved_data.len(), sample_format)\n  395 |                             };\n  396 | \n  397 |                             let callback = StreamInstant::from_secs_f64(now);\n  398 |                             let buffer_duration =\n  399 |                                 frames_to_duration(frame_size as FrameCount, sample_rate);\n  400 |                             let playback = callback\n  401 |                                 + (buffer_duration\n  402 |                                     + Duration::from_secs_f64(total_output_latency_secs));\n  403 |                             let timestamp = OutputStreamTimestamp { callback, playback };\n  404 |                             let info = OutputCallbackInfo { timestamp };\n  405 |                             (data_callback)(&mut data, &info);\n  406 |                         },\n  407 |                     ))\n  408 |                     .pack()\n  409 |                     .into(),\n  410 |                 )));\n  411 |                 // This name 'CpalProcessor' must match the name registered in worklet.js\n  412 |                 let audio_worklet_node =\n  413 |                     web_sys::AudioWorkletNode::new_with_options(&ctx, \"CpalProcessor\", &options)?;\n  414 | \n  415 |                 audio_worklet_node.connect_with_audio_node(&destination)?;\n  416 |                 Ok(())\n  417 |             }\n  418 |             .await;\n  419 | \n  420 |             if let Err(err) = result {\n  421 |                 let message = err\n  422 |                     .as_string()\n  423 |                     .unwrap_or_else(|| \"Failed to initialize audio worklet\".to_string());\n  424 |                 error_callback(Error::with_message(\n  425 |                     ErrorKind::UnsupportedOperation,\n  426 |                     message,\n  427 |                 ))\n  428 |             }\n  429 |         });\n  430 | \n  431 |         Ok(Self::Stream {\n  432 |             audio_context,\n  433 |             buffer_size_frames,\n  434 |         })\n  435 |     }","lines":86}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"LoopbackDevice::drop ignores the OSStatus from AudioHardwareDestroyAggregateDevice and AudioHardwareDestroyProcessTap (assigned to _status, never inspected). The comment says this avoids panicking in drop, which is reasonable, but a failed destroy leaks the aggregate device / process tap with no diagnostic at all.","fix":"Log (e.g. via the crate's error/trace facility) when the destroy calls return a non-zero status so leaks are observable, while still not panicking.","locations":[{"ref":"src/host/coreaudio/macos/loopback.rs:143-152","code":"  143 | impl Drop for LoopbackDevice {\n  144 |     fn drop(&mut self) {\n  145 |         unsafe {\n  146 |             // We don't check status to avoid panic during `drop`\n  147 |             let _status =\n  148 |                 AudioHardwareDestroyAggregateDevice(self.aggregate_device.audio_device_id);\n  149 |             let _status = AudioHardwareDestroyProcessTap(self.tap_id);\n  150 |         }\n  151 |     }\n  152 | }","lines":10}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"The `else` branch (multi-byte unsigned formats) guards correctness only with `debug_assert!(sample_format.is_uint())` and then a `match` that falls through to `unimplemented!()` for any unsigned format not explicitly listed. If a new unsigned `SampleFormat` variant is ever added (e.g. a hypothetical U48) without updating this match, release builds will hit `unimplemented!()` and panic from inside an audio render path. The panic message is also slightly misleading: by construction the format is unsigned, so \"unsupported unsigned format\" is the only case, but the surrounding `is_uint()` check is a debug-only guard so in release a non-uint format reaching here would also land on the catch-all with a wrong message.","fix":"Match exhaustively on `SampleFormat` (no `_` arm) so the compiler forces an update when a new variant is added, or return/fill zero as a safe fallback instead of panicking inside a real-time callback path.","locations":[{"ref":"src/host/equilibrium.rs:43-55","code":"   43 |     } else {\n   44 |         // Multi-byte unsigned integer formats require a fill equal to the midpoint of their range.\n   45 |         debug_assert!(sample_format.is_uint());\n   46 |         match sample_format {\n   47 |             SampleFormat::U16 => fill_typed!(u16),\n   48 |             SampleFormat::U24 => fill_typed!(U24),\n   49 |             SampleFormat::U32 => fill_typed!(u32),\n   50 |             SampleFormat::U64 => fill_typed!(u64),\n   51 |             _ => unimplemented!(\n   52 |                 \"failed to fill equilibrium for unsupported unsigned format {sample_format:?}\"\n   53 |             ),\n   54 |         }\n   55 |     }","lines":13}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"PipeWire `init_devices` registry/metadata bind failures are silently swallowed with `return;` and TODO comments (\"do something about this error\", \"maybe we should add a log\"). A failed `core.sync(0)` inside a `global` callback also silently returns, which can leave `pending_events` unbalanced so the done-listener may quit the loop early or never, relying on the `INIT_TIMEOUT` watchdog. No diagnostic is surfaced to the user.","fix":"Surface bind/sync failures via a log or by aborting enumeration with a meaningful error, and ensure `pending_events` stays balanced when a sync cannot be issued.","locations":[{"ref":"src/host/pipewire/device.rs:796-804","code":"  796 |                     let meta_settings: Metadata = match registry.bind(global) {\n  797 |                         Ok(meta_settings) => meta_settings,\n  798 |                         Err(_) => {\n  799 |                             // TODO: do something about this error\n  800 |                             // Though it is already checked, but maybe something happened with\n  801 |                             // pipewire?\n  802 |                             return;\n  803 |                         }\n  804 |                     };","lines":9},{"ref":"src/host/pipewire/device.rs:847-851","code":"  847 |                     let Ok(pending) = core.sync(0) else {\n  848 |                         // TODO: maybe we should add a log?\n  849 |                         return;\n  850 |                     };\n  851 |                     pending_events.borrow_mut().push(pending);","lines":5},{"ref":"src/host/pipewire/device.rs:874-882","code":"  874 |                     let node: Node = match registry.bind(global) {\n  875 |                         Ok(node) => node,\n  876 |                         Err(_) => {\n  877 |                             // TODO: do something about this error\n  878 |                             // Though it is already checked, but maybe something happened with\n  879 |                             // pipewire?\n  880 |                             return;\n  881 |                         }\n  882 |                     };","lines":9},{"ref":"src/host/pipewire/device.rs:1007-1011","code":" 1007 |                     let Ok(pending) = core.sync(0) else {\n 1008 |                         // TODO: maybe we should add a log?\n 1009 |                         return;\n 1010 |                     };\n 1011 |                     pending_events.borrow_mut().push(pending);","lines":5}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`buffer_duration_to_frames` does `(buffer_duration * sample_rate as i64 * 100 / 1_000_000_000) as FrameCount`. The intermediate `buffer_duration(hns) * sample_rate * 100` can exceed i64 only for absurd values, but the final `as FrameCount` (u32) truncates silently if the frame count exceeds u32::MAX, and a negative buffer_duration (it is i64) would cast to a huge u32. Reported buffer min/max from GetBufferSizeLimits feed this directly.","fix":"Clamp to >= 0 and use `try_into`/`min(u32::MAX as i64)` before casting to FrameCount.","locations":[{"ref":"src/host/wasapi/device.rs:1462-1464","code":" 1462 | fn buffer_duration_to_frames(buffer_duration: i64, sample_rate: SampleRate) -> FrameCount {\n 1463 |     (buffer_duration * sample_rate as i64 * 100 / 1_000_000_000) as FrameCount\n 1464 | }","lines":3}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`DeviceId::from_str` accepts an empty host portion: `split_once(':')` on `\":dev\"` yields `host_str == \"\"`, which is then passed to `HostId::from_str` and rejected with `UnsupportedOperation`. It also accepts an empty device portion (`\"alsa:\"` -> device == \"\") without complaint, producing a `DeviceId` with an empty backend identifier. The doc advertises validation of `\"host:device\"` format but does not reject an empty device id, which can later fail opaquely in `device_by_id`.","fix":"Reject empty device_str (and clarify behaviour for empty host) with ErrorKind::InvalidInput so malformed IDs fail fast with a clear message.","locations":[{"ref":"src/lib.rs:316-327","code":"  316 |     fn from_str(s: &str) -> Result<Self, Self::Err> {\n  317 |         let (host_str, device_str) = s.split_once(':').ok_or_else(|| {\n  318 |             Error::with_message(\n  319 |                 ErrorKind::InvalidInput,\n  320 |                 format!(\"failed to parse device ID \\\"{s}\\\": expected \\\"host:device_id\\\" format\"),\n  321 |             )\n  322 |         })?;\n  323 | \n  324 |         let host_id = crate::platform::HostId::from_str(host_str)?;\n  325 | \n  326 |         Ok(Self::new(host_id, device_str))\n  327 |     }","lines":12}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","description":"In `set_sample_rate`, the fallback reconfiguration cycle creates dummy buffers with `prepare_buffer_infos(false, 1)` - i.e. exactly one OUTPUT channel. For an input-only ASIO device (no output channels) `ASIOCreateBuffers` will fail, so `set_sample_rate` returns an error and configuring an input stream at a non-default rate becomes impossible on output-less devices. The channel direction/count is hardcoded rather than derived from the device.","fix":"Query `ASIOGetChannels` and create a single buffer on whichever direction (input or output) actually has at least one channel.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:591-592","code":"  591 |         let mut dummy_infos = prepare_buffer_infos(false, 1);\n  592 |         let buffer_size = self.create_buffers(&mut dummy_infos, None)?;","lines":2},{"ref":"asio-sys/src/bindings/mod.rs:1034-1044","code":" 1034 | fn prepare_buffer_infos(is_input: bool, n_channels: usize) -> Vec<AsioBufferInfo> {\n 1035 |     let is_input = if is_input { 1 } else { 0 };\n 1036 |     (0..n_channels)\n 1037 |         .map(|ch| AsioBufferInfo {\n 1038 |             is_input,\n 1039 |             channel_num: ch as i32,\n 1040 |             // To be filled by ASIOCreateBuffers.\n 1041 |             buffers: [std::ptr::null_mut(); 2],\n 1042 |         })\n 1043 |         .collect()\n 1044 | }","lines":11}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`is_rt_eligible` reads the raw `*mut snd_pcm_t` out of `alsa::pcm::PCM` by casting `&PCM as *const PCM` to `*const *mut snd_pcm_t` and dereferencing (lines 825-829). This depends on the private, non-`repr(C)` tuple-struct field order `PCM(*mut snd_pcm_t, Cell<bool>)`. Rust does not guarantee field ordering for non-repr(C) types, so a compiler or alsa-rs layout change could place the `Cell<bool>` first, making this read a garbage pointer that is then passed to `snd_pcm_type`, causing undefined behavior. The TODO already acknowledges no public accessor exists.","fix":"Avoid reading private fields by layout assumption. Gate behind a layout assertion at minimum, or upstream an `as_ptr()` accessor to alsa-rs and depend on that. Alternatively determine RT eligibility from the PCM id/name string rather than the raw pointer type.","locations":[{"ref":"src/host/alsa/mod.rs:819-847","code":"  819 |     #[cfg(feature = \"realtime\")]\n  820 |     fn is_rt_eligible(&self) -> bool {\n  821 |         use alsa_sys::*;\n  822 |         // SAFETY: `alsa::pcm::PCM` is `pub struct PCM(*mut snd_pcm_t, Cell<bool>)`. The crate\n  823 |         // does not expose a public `as_ptr()`, but we can cast and read from it.\n  824 |         // TODO: replace with `self.handle.as_ptr()` once alsa-rs exposes it publicly.\n  825 |         let raw = unsafe {\n  826 |             (&self.handle as *const alsa::pcm::PCM)\n  827 |                 .cast::<*mut snd_pcm_t>()\n  828 |                 .read()\n  829 |         };\n  830 |         let pcm_type = unsafe { snd_pcm_type(raw) };\n  831 | \n  832 |         // Only attempt RT promotion for types known not to spin and not to chain to a\n  833 |         // server-backed backend. Therefore, we exclude:\n  834 |         // - NULL: always-ready poll() spins and exhausts RLIMIT_RTTIME, causing SIGXCPU.\n  835 |         // - IOPLUG/EXTPLUG: may route to PulseAudio, causing priority inversion and SIGXCPU.\n  836 |         // - HOOKS, SOFTVOL, PLUG, RATE, ROUTE, COPY: that can chain to either of the above.\n  837 |         matches!(\n  838 |             pcm_type,\n  839 |             SND_PCM_TYPE_HW\n  840 |                 | SND_PCM_TYPE_LINEAR\n  841 |                 | SND_PCM_TYPE_ALAW\n  842 |                 | SND_PCM_TYPE_MULAW\n  843 |                 | SND_PCM_TYPE_ADPCM\n  844 |                 | SND_PCM_TYPE_LINEAR_FLOAT\n  845 |                 | SND_PCM_TYPE_IEC958\n  846 |         )\n  847 |     }","lines":29}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"Loopback capture (input built from an eRender device) is initialized with `AUDCLNT_STREAMFLAGS_EVENTCALLBACK | AUDCLNT_STREAMFLAGS_LOOPBACK` and a SetEventHandle. WASAPI loopback only delivers data while the render endpoint is actively playing audio; in event-driven mode the event is not reliably signalled during silence, so the run loop can block indefinitely on WaitForMultipleObjectsEx with no data and no error delivered to the user. This is a well-known WASAPI gotcha for event-driven loopback.","fix":"Either document/validate that loopback streams may stall during silence, or for loopback use a timed wait (poll) instead of pure INFINITE event wait, or drive loopback with GetNextPacketSize polling rather than the audio event.","locations":[{"ref":"src/host/wasapi/device.rs:860-919","code":"  860 |             let mut stream_flags = DEFAULT_FLAGS;\n  861 | \n  862 |             if self.data_flow() == Audio::eRender {\n  863 |                 stream_flags |= Audio::AUDCLNT_STREAMFLAGS_LOOPBACK;\n  864 |             }\n  865 | \n  866 |             // Computing the format and initializing the device.\n  867 |             let waveformatex = {\n  868 |                 let format_attempt = config_to_waveformatextensible(config, sample_format)\n  869 |                     .ok_or_else(|| {\n  870 |                         Error::with_message(\n  871 |                             ErrorKind::UnsupportedConfig,\n  872 |                             \"Stream configuration could not be converted to a compatible format\",\n  873 |                         )\n  874 |                     })?;\n  875 |                 let share_mode = Audio::AUDCLNT_SHAREMODE_SHARED;\n  876 | \n  877 |                 // Ensure the format is supported.\n  878 |                 match super::device::is_format_supported(&audio_client, &format_attempt.Format) {\n  879 |                     Ok(false) => {\n  880 |                         return Err(Error::with_message(\n  881 |                             ErrorKind::UnsupportedConfig,\n  882 |                             \"Stream configuration is not supported in shared mode\",\n  883 |                         ))\n  884 |                     }\n  885 |                     Err(e) => return Err(e),\n  886 |                     _ => (),\n  887 |                 }\n  888 | \n  889 |                 // Finally, initializing the audio client\n  890 |                 audio_client\n  891 |                     .Initialize(\n  892 |                         share_mode,\n  893 |                         stream_flags,\n  894 |                         buffer_duration,\n  895 |                         0,\n  896 |                         &format_attempt.Format,\n  897 |                         None,\n  898 |                     )\n  899 |                     .context(\"Failed to initialize audio client\")?;\n  900 | \n  901 |                 format_attempt.Format\n  902 |             };\n  903 | \n  904 |             // obtaining the size of the samples buffer in number of frames\n  905 |             let max_frames_in_buffer = audio_client\n  906 |                 .GetBufferSize()\n  907 |                 .context(\"Failed to get buffer size\")?;\n  908 | \n  909 |             let period_frames =\n  910 |                 shared_mode_period_frames(&audio_client, config.sample_rate, max_frames_in_buffer);\n  911 | \n  912 |             // Creating the event that will be signalled whenever we need to submit some samples.\n  913 |             let event =\n  914 |                 Threading::CreateEventA(None, false, false, windows::core::PCSTR(ptr::null()))\n  915 |                     .context(\"Failed to create event\")?;\n  916 | \n  917 |             audio_client\n  918 |                 .SetEventHandle(event)\n  919 |                 .context(\"Failed to set event handle\")?;","lines":60}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"In the AudioWorklet output path, `options.set_output_channel_count(&js_array)` pushes `destination.channel_count()` (the channel count just set on the destination at line 341), not `config.channels`. These are normally equal, but `set_channel_count` can be clamped by the implementation, and reading it back at line 359 is fine; however the data callback delivers `config.channels`-interleaved frames (sample_format/Data::from_parts uses interleaved_data.len based on the worklet's channels*frame_size from process()). If destination.channel_count() and config.channels diverge, the worklet output channel count and the interleaving assumed by `process` (which receives `channels` from JS) could mismatch silently.","fix":"Use config.channels consistently for both d_buffer.resize(\n  522 |             interleaved_buffer_size.max(self.interleaved_buffer.len()),\n  523 |             0.0,\n  524 |         );\n  525 | \n  526 |         (self.callback)(\n  527 |             &mut self.interleaved_buffer[..interleaved_buffer_size],\n  528 |             frame_size as u32,\n  529 |             sample_rate,\n  530 |             current_time,\n  531 |         );","lines":23}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"JACK `connect_to_system_outputs`/`connect_to_system_inputs` only require `n_sys >= n_our` and then zip ports positionally. The `system:playback_.*` / `system:capture_.*` pattern can match ports in an order that does not correspond to physical channel order (JACK returns ports in registration order, not guaranteed channel order), so channels may be mapped to the wrong physical outputs/inputs on some setups. There is also no de-duplication if monitor ports match the pattern.","fix":"Sort matched system ports by their numeric channel suffix before zipping, and consider filtering to physical ports via `PortFlags::IS_PHYSICAL`.","locations":[{"ref":"src/host/jack/stream.rs:172-205","code":"  172 |     pub fn connect_to_system_outputs(&mut self) -> Result<(), Error> {\n  173 |         let client = self.async_client.as_client();\n  174 |         let system_ports = client.ports(Some(\"system:playback_.*\"), None, jack::PortFlags::empty());\n  175 | \n  176 |         let n_our = self.output_port_names.len();\n  177 |         let n_sys = system_ports.len();\n  178 |         if n_sys < n_our {\n  179 |             return Err(Error::with_message(\n  180 |                 ErrorKind::UnsupportedConfig,\n  181 |                 format!(\n  182 |                     \"Only {n_sys} system playback port(s) available, but the stream has {n_our} output channel(s)\"\n  183 |                 ),\n  184 |             ));\n  185 |         }\n  186 | \n  187 |         // Connect outputs from this client to the system playback inputs.\n  188 |         for (i, (our_port, system_port)) in\n  189 |             self.output_port_names.iter().zip(&system_ports).enumerate()\n  190 |         {\n  191 |             if let Err(e) = client.connect_ports_by_name(our_port, system_port) {\n  192 |                 for (prev_our, prev_sys) in\n  193 |                     self.output_port_names[..i].iter().zip(&system_ports[..i])\n  194 |                 {\n  195 |                     let _ = client.disconnect_ports_by_name(prev_our, prev_sys);\n  196 |                 }\n  197 | \n  198 |                 return Err(Error::with_message(\n  199 |                     ErrorKind::DeviceNotAvailable,\n  200 |                     format!(\"JACK failed to connect port '{our_port}' to '{system_port}': {e}\"),\n  201 |                 ));\n  202 |             }\n  203 |         }\n  204 |         Ok(())\n  205 |     }","lines":34},{"ref":"src/host/jack/stream.rs:218-251","code":"  218 |     pub fn connect_to_system_inputs(&mut self) -> Result<(), Error> {\n  219 |         let client = self.async_client.as_client();\n  220 |         let system_ports = client.ports(Some(\"system:capture_.*\"), None, jack::PortFlags::empty());\n  221 | \n  222 |         let n_our = self.input_port_names.len();\n  223 |         let n_sys = system_ports.len();\n  224 |         if n_sys < n_our {\n  225 |             return Err(Error::with_message(\n  226 |                 ErrorKind::UnsupportedConfig,\n  227 |                 format!(\n  228 |                     \"Only {n_sys} system capture port(s) available, but the stream has {n_our} input channel(s)\"\n  229 |                 ),\n  230 |             ));\n  231 |         }\n  232 | \n  233 |         // Connect inputs from system capture ports to this client.\n  234 |         for (i, (system_port, our_port)) in\n  235 |             system_ports.iter().zip(&self.input_port_names).enumerate()\n  236 |         {\n  237 |             if let Err(e) = client.connect_ports_by_name(system_port, our_port) {\n  238 |                 for (prev_sys, prev_our) in\n  239 |                     system_ports[..i].iter().zip(&self.input_port_names[..i])\n  240 |                 {\n  241 |                     let _ = client.disconnect_ports_by_name(prev_sys, prev_our);\n  242 |                 }\n  243 | \n  244 |                 return Err(Error::with_message(\n  245 |                     ErrorKind::DeviceNotAvailable,\n  246 |                     format!(\"JACK failed to connect port '{system_port}' to '{our_port}': {e}\"),\n  247 |                 ));\n  248 |             }\n  249 |         }\n  250 |         Ok(())\n  251 |     }","lines":34}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","description":"`Latch::waiter` uses `.expect(\"waiter called on a dropped Latch\")`. Since `flag` is only `None` after `Drop` has run, this can never panic in safe code (you cannot call a method on a dropped value), making the `Option` and the expect a defensive construct whose failure mode is unreachable. This is acceptable, but the `Option<Arc<...>>` adds indirection and an unreachable panic site to a hot-path-adjacent primitive purely to let `Drop` distinguish itself from `release`. The same effect (drop the Arc before unparking) could be achieved without making `waiter()` fallible.","fix":"Document that `waiter()` is infallible in practice, or restructure so `Drop` drops the Arc without requiring `flag` to be an `Option` in the live struct (e.g. keep the Arc non-optional and rely on `Drop` decrementing the strong count, since waiters already hold only a `Weak`).","locations":[{"ref":"src/host/latch.rs:19","code":"   19 |     flag: Option<Arc<AtomicBool>>,","lines":1},{"ref":"src/host/latch.rs:37-43","code":"   37 |     pub(crate) fn waiter(&self) -> LatchWaiter {\n   38 |         LatchWaiter(Arc::downgrade(\n   39 |             self.flag\n   40 |                 .as_ref()\n   41 |                 .expect(\"waiter called on a dropped Latch\"),\n   42 |         ))\n   43 |     }","lines":7}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","description":"host_time_to_stream_instant() calls mach_timebase_info() via a syscall on every invocation, and it is invoked from inside the realtime render/input callbacks (device.rs:774 and 885, ios/mod.rs:536 and 581) once per audio buffer. The timebase ratio is constant for the lifetime of the process, so this repeated syscall adds avoidable latency and jitter to the audio hot path.","fix":"Query mach_timebase_info() once (e.g. via a std::sync::OnceLock cache) and reuse the cached numer/denom for all subsequent conversions instead of calling the syscall in the render callback.","locations":[{"ref":"src/host/coreaudio/mod.rs:68-78","code":"   68 | #[inline]\n   69 | fn host_time_to_stream_instant(m_host_time: u64) -> Result<StreamInstant, Error> {\n   70 |     let mut info: mach2::mach_time::mach_timebase_info = Default::default();\n   71 |     let res = unsafe { mach2::mach_time::mach_timebase_info(&mut info) };\n   72 |     check_os_status(res)?;\n   73 |     let nanos = m_host_time as u128 * info.numer as u128 / info.denom as u128;\n   74 |     let secs = u64::try_from(nanos / 1_000_000_000)\n   75 |         .map_err(|_| Error::with_message(ErrorKind::Other, \"Timestamp conversion overflowed\"))?;\n   76 |     let subsec_nanos = (nanos % 1_000_000_000) as u32;\n   77 |     Ok(StreamInstant::new(secs, subsec_nanos))\n   78 | }","lines":11},{"ref":"src/host/coreaudio/macos/device.rs:774","code":"  774 |             let callback = match host_time_to_stream_instant(args.time_stamp.mHostTime) {","lines":1},{"ref":"src/host/coreaudio/macos/device.rs:885","code":"  885 |             let callback = match host_time_to_stream_instant(args.time_stamp.mHostTime) {","lines":1},{"ref":"src/host/coreaudio/ios/mod.rs:536","code":"  536 |         let callback = match host_time_to_stream_instant(args.time_stamp.mHostTime) {","lines":1},{"ref":"src/host/coreaudio/ios/mod.rs:581","code":"  581 |         let callback = match host_time_to_stream_instant(args.time_stamp.mHostTime) {","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"`dispatch_event` allocates a `Vec` and clones every registered `Arc<dyn Fn>` callback on every dispatch, just to release the lock before invoking. While event dispatch is not the buffer hot path, `asio_message`/`sample_rate_did_change` can be called frequently by some drivers, and the per-call heap allocation + Arc clone churn is avoidable.","fix":"Invoke callbacks while holding the lock, or reuse a thread-local/preallocated buffer; cloning Arcs each call is unnecessary.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:1114-1122","code":" 1114 | fn dispatch_event(event: AsioDriverEvent) -> bool {\n 1115 |     let callbacks: Vec<_> = {\n 1116 |         let lock = DRIVER_EVENT_CALLBACKS.lock().unwrap();\n 1117 |         lock.iter().map(|(_, cb)| cb.0.clone()).collect()\n 1118 |     };\n 1119 |     callbacks\n 1120 |         .iter()\n 1121 |         .fold(false, |handled, cb| cb(event) || handled)\n 1122 | }","lines":9}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","description":"In the realtime buffer-switch path, `buffer_switch` calls `ASIOGetSamplePosition` via FFI on every callback and `buffer_switch_time_info` takes the global `BUFFER_CALLBACK` mutex for the entire iteration. Holding a process-global lock during the user data callback on the audio thread means any control-thread operation that also locks `BUFFER_CALLBACK` (e.g. `add_callback`/`remove_callback` during stream build/teardown) can block the realtime thread, risking xruns.","fix":"Use a lock-free or RCU-style snapshot of the callback list for the audio thread, or hold the lock only long enough to grab a reference; avoid blocking the realtime callback on a control-path mutex.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:1215","code":" 1215 |     let mut bcs = BUFFER_CALLBACK.lock().unwrap();","lines":1},{"ref":"asio-sys/src/bindings/mod.rs:1225-1227","code":" 1225 |     for &mut (_, ref mut bc) in bcs.iter_mut() {\n 1226 |         bc.run(&callback_info);\n 1227 |     }","lines":3},{"ref":"asio-sys/src/bindings/mod.rs:1244-1249","code":" 1244 |     let mut time = unsafe {\n 1245 |         let mut time: AsioTime = std::mem::zeroed();\n 1246 |         let res = ai::ASIOGetSamplePosition(\n 1247 |             &mut time.time_info.sample_position,\n 1248 |             &mut time.time_info.system_time,\n 1249 |         );","lines":6}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","description":"JACK input/output deinterleave loops iterate sample-by-sample with a scalar inner loop (`for i in 0..current_frame_count { buf[ch_ix + i * num_in_channels] = input_channel[i] }`). This strided scatter/gather defeats auto-vectorization and is the hottest path in the backend. For multi-channel high-rate streams this is a measurable per-cycle cost in the RT thread.","fix":"Use chunked interleaving (e.g. iterate frames in the outer loop and channels in the inner, writing contiguous frame slices) or a dedicated interleave helper that the optimizer can vectorize; consider `itertools`-style zip over per-channel slices.","locations":[{"ref":"src/host/jack/stream.rs:446-451","code":"  446 |             for ch_ix in 0..num_in_channels {\n  447 |                 let input_channel = &self.in_ports[ch_ix].as_slice(process_scope);\n  448 |                 for i in 0..current_frame_count {\n  449 |                     self.temp_input_buffer[ch_ix + i * num_in_channels] = input_channel[i];\n  450 |                 }\n  451 |             }","lines":6},{"ref":"src/host/jack/stream.rs:489-495","code":"  489 |             // Deinterlace\n  490 |             for ch_ix in 0..num_out_channels {\n  491 |                 let output_channel = &mut self.out_ports[ch_ix].as_mut_slice(process_scope);\n  492 |                 for i in 0..current_frame_count {\n  493 |                     output_channel[i] = self.temp_output_buffer[ch_ix + i * num_out_channels];\n  494 |                 }\n  495 |             }","lines":7}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","description":"In the WebAudio output scheduling closure, deinterleaving is done with a manual nested scalar loop (`temporary_channel_buffer[i] = temporary_buffer[n_channels * i + channel]`) for every channel of every buffer. This runs on the audio scheduling path. With many channels/large buffers this is a hot, non-vectorizable strided gather in a tight per-callback loop. The interleaved buffer is also fully re-walked once per channel (O(channels * frames) with poor cache locality on the source side).","fix":"Consider deinterleaving all channels in a single pass over the interleaved buffer (write into per-channel slices as you stride once), or document why per-channel passes are required. At minimum hoist `n_channels` and use iterators to enable autovectorization.","locations":[{"ref":"src/host/webaudio/mod.rs:442-446","code":"  442 |                     for channel in 0..n_channels {\n  443 |                         for i in 0..buffer_size_frames {\n  444 |                             temporary_channel_buffer[i] =\n  445 |                                 temporary_buffer[n_channels * i + channel];\n  446 |                         }","lines":5}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"In the AAudio output data callback, the entire output buffer is zero-filled on every callback via `std::slice::from_raw_parts_mut(data, byte_count).fill(0)` before invoking the user callback (lines 456-461). For a user callback that always writes the full buffer this is a redundant full-buffer memset on the realtime audio thread every period. This is defensive (silences unwritten frames) but unconditional.","fix":"Document the tradeoff; optionally only pre-zero when the backend cannot guarantee the user fills the buffer, or rely on the user contract that the buffer must be fully written (as most cpal backends do).","locations":[{"ref":"src/host/aaudio/mod.rs:456-461","code":"  456 |             // Pre-fill with equilibrium so unwritten frames are silent.\n  457 |             let byte_count = n_samples * sample_format.sample_size();\n  458 |             // SAFETY: `data` is the buffer pointer provided by AAudio for this callback.\n  459 |             unsafe {\n  460 |                 std::slice::from_raw_parts_mut(data as *mut u8, byte_count).fill(0);\n  461 |             }","lines":6}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"`process_input`/`process_output` call `stream.handle.io_bytes()` inside the per-period write/read loop (lines 1167-1169 and 1234-1236), each call constructing a fresh IO wrapper. While cheap, this is in the audio hot path and is re-created on every loop iteration; for partial transfers it is reconstructed multiple times per period.","fix":"Construct the `io_bytes()` accessor once before the loop and reuse it across iterations.","locations":[{"ref":"src/host/alsa/mod.rs:1167-1170","code":" 1167 |         match stream\n 1168 |             .handle\n 1169 |             .io_bytes()\n 1170 |             .readi(&mut buffer[frames_read * stream.frame_size..])","lines":4},{"ref":"src/host/alsa/mod.rs:1234-1237","code":" 1234 |         match stream\n 1235 |             .handle\n 1236 |             .io_bytes()\n 1237 |             .writei(&buffer[frames_written * stream.frame_size..])","lines":4}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"In the output i24 path and the generic output path, `interleaved.fill(0)` is executed every callback before the user callback (stream.rs:639) and the ASIO channel is additionally zeroed via `align_to_mut::<u8>().1.fill(0)` when silencing. With the silence flag effectively true every cycle (see the silence-logic finding), both the CPAL buffer and the ASIO buffer are zeroed each callback, then the user data is written and then mixed via saturating_add against the just-zeroed buffer - the add is redundant work since the old value is always 0 after silencing.","fix":"When silencing, write the user sample directly instead of zeroing then add-mixing; reserve the mix path for the genuine multi-write case if it exists.","locations":[{"ref":"src/host/asio/stream.rs:639","code":"  639 |             interleaved.fill(0);","lines":1},{"ref":"src/host/asio/stream.rs:630-635","code":"  630 |                     if silence_asio_buffer {\n  631 |                         asio_channel.align_to_mut::<u8>().1.fill(0);\n  632 |                     }\n  633 |                     for (frame, s_asio) in interleaved.chunks(n_channels).zip(asio_channel) {\n  634 |                         *s_asio = mix_samples(*s_asio, frame[ch_ix]);\n  635 |                     }","lines":6},{"ref":"src/host/asio/stream.rs:1308-1326","code":" 1308 |         if silence_asio_buffer {\n 1309 |             asio_channel.align_to_mut::<u8>().1.fill(0);\n 1310 |         }\n 1311 | \n 1312 |         // Fill in every channel from the interleaved vector\n 1313 |         for (channel_sample, sample_in_buffer) in asio_channel\n 1314 |             .chunks_mut(asio_sample_size_bytes)\n 1315 |             .zip(interleaved.iter().skip(ch_ix).step_by(n_channels))\n 1316 |         {\n 1317 |             // Add samples from buffer if no silence was applied, otherwise just overwrite\n 1318 |             let result = if silence_asio_buffer {\n 1319 |                 sample_in_buffer.inner()\n 1320 |             } else {\n 1321 |                 let sample = i24_bytes_to_i32(\n 1322 |                     &[channel_sample[0], channel_sample[1], channel_sample[2]],\n 1323 |                     little_endian,\n 1324 |                 );\n 1325 |                 (sample_in_buffer.inner() + sample).clamp(-8388608, 8388607)\n 1326 |             };","lines":19}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"PipeWire `init_devices` binds a `Node` proxy and registers an info listener for EVERY audio node in the graph just to read static properties (name, channels, icon, rate, latency) that are already present in `global.props` available in the registry `global` callback. Binding a proxy + listener per node and round-tripping a `core.sync(0)` for each is far heavier than reading the props directly.","fix":"Read the needed properties directly from `global.props` where available and avoid binding a Node proxy + extra sync per node.","locations":[{"ref":"src/host/pipewire/device.rs:856-1014","code":"  856 |                 ObjectType::Node => {\n  857 |                     let Some(props) = global.props else {\n  858 |                         return;\n  859 |                     };\n  860 |                     let Some(media_class) = props.get(*pw::keys::MEDIA_CLASS) else {\n  861 |                         return;\n  862 |                     };\n  863 |                     if !matches!(\n  864 |                         media_class,\n  865 |                         audio::SINK\n  866 |                             | audio::SOURCE\n  867 |                             | audio::DUPLEX\n  868 |                             | audio::STREAM_INPUT\n  869 |                             | audio::STREAM_OUTPUT\n  870 |                     ) {\n  871 |                         return;\n  872 |                     }\n  873 | \n  874 |                     let node: Node = match registry.bind(global) {\n  875 |                         Ok(node) => node,\n  876 |                         Err(_) => {\n  877 |                             // TODO: do something about this error\n  878 |                             // Though it is already checked, but maybe something happened with\n  879 |                             // pipewire?\n  880 |                             return;\n  881 |                         }\n  882 |                     };\n  883 | \n  884 |                     let discovered = discovered.clone();\n  885 |                     let listener = node\n  886 |                         .add_listener_local()\n  887 |                         .info(move |info| {\n  888 |                             let Some(props) = info.props() else {\n  889 |                                 return;\n  890 |                             };\n  891 |                             let Some(media_class) = props.get(*pw::keys::MEDIA_CLASS) else {\n  892 |                                 return;\n  893 |                             };\n  894 |                             let role = match media_class {\n  895 |                                 audio::SINK => Role::Sink,\n  896 |                                 audio::SOURCE => Role::Source,\n  897 |                                 audio::DUPLEX => Role::Duplex,\n  898 |                                 audio::STREAM_OUTPUT => Role::StreamOutput,\n  899 |                                 audio::STREAM_INPUT => Role::StreamInput,\n  900 |                                 _ => {\n  901 |                                     return;\n  902 |                                 }\n  903 |                             };\n  904 |                             // Discovered `Audio/Sink` nodes are exposed as\n  905 |                             // `Duplex`, so they are treated as input-capable.\n  906 |                             // When cpal later opens an input stream on such\n  907 |                             // a device, it sets `STREAM_CAPTURE_SINK`, which\n  908 |                             // makes that stream capture audio playing to the\n  909 |                             // sink.\n  910 |                             let direction = match role {\n  911 |                                 Role::Sink => DeviceDirection::Duplex,\n  912 |                                 Role::Source => DeviceDirection::Input,\n  913 |                                 Role::Duplex => DeviceDirection::Duplex,\n  914 |                                 Role::StreamOutput => DeviceDirection::Output,\n  915 |                                 Role::StreamInput => DeviceDirection::Input,\n  916 |                             };\n  917 |                             let Some(object_serial) = props\n  918 |                                 .get(*pw::keys::OBJECT_SERIAL)\n  919 |                                 .and_then(|serial| serial.parse().ok())\n  920 |                             else {\n  921 |                                 return;\n  922 |                             };\n  923 |                             let node_name = props\n  924 |                                 .get(*pw::keys::NODE_NAME)\n  925 |                                 .unwrap_or(\"unknown\")\n  926 |                                 .to_owned();\n  927 |                             let description = props\n  928 |                                 .get(*pw::keys::NODE_DESCRIPTION)\n  929 |                                 .unwrap_or(\"unknown\")\n  930 |                                 .to_owned();\n  931 |                             let nick_name = props\n  932 |                                 .get(*pw::keys::NODE_NICK)\n  933 |                                 .unwrap_or(description.as_str())\n  934 |                                 .to_owned();\n  935 |                             let channels = props\n  936 |                                 .get(*pw::keys::AUDIO_CHANNELS)\n  937 |                                 .and_then(|channels| channels.parse().ok())\n  938 |                                 .unwrap_or(2);\n  939 | \n  940 |                             let icon_name =\n  941 |                                 props.get(DEVICE_ICON_NAME).unwrap_or(\"default\").to_owned();\n  942 | \n  943 |                             let interface_type = match props.get(*pw::keys::DEVICE_API) {\n  944 |                                 Some(\"bluez5\") => InterfaceType::Bluetooth,\n  945 |                                 _ => match props.get(\"device.bus\") {\n  946 |                                     Some(\"pci\") => InterfaceType::Pci,\n  947 |                                     Some(\"usb\") => InterfaceType::Usb,\n  948 |                                     Some(\"firewire\") => InterfaceType::FireWire,\n  949 |                                     Some(\"thunderbolt\") => InterfaceType::Thunderbolt,\n  950 |                                     _ => InterfaceType::Unknown,\n  951 |                                 },\n  952 |                             };\n  953 | \n  954 |                             let address = props\n  955 |                                 .get(\"api.bluez5.address\")\n  956 |                                 .or_else(|| props.get(\"api.alsa.path\"))\n  957 |                                 .map(|s| s.to_owned());\n  958 | \n  959 |                             let driver = props.get(*pw::keys::FACTORY_NAME).map(|s| s.to_owned());\n  960 | \n  961 |                             // \"node.rate\" = \"1/<sample_rate>\" — set by the driver, authoritative\n  962 |                             // for the hardware clock rate.\n  963 |                             let node_rate: Option<SampleRate> = props\n  964 |                                 .get(node::RATE)\n  965 |                                 .and_then(parse_fraction)\n  966 |                                 .filter(|(_, den)| *den > 0)\n  967 |                                 .map(|(_, den)| den);\n  968 | \n  969 |                             // \"node.latency\" = \"<frames>/<rate>\" — preferred quantum; the rate\n  970 |                             // denominator is a fallback when node.rate is absent.\n  971 |                             let (node_quantum, latency_rate): (\n  972 |                                 Option<FrameCount>,\n  973 |                                 Option<SampleRate>,\n  974 |                             ) = props\n  975 |                                 .get(node::LATENCY)\n  976 |                                 .and_then(parse_fraction)\n  977 |                                 .filter(|(num, den)| *num > 0 && *den > 0)\n  978 |                                 .unzip();\n  979 | \n  980 |                             // node.rate is authoritative; node.latency denominator is the\n  981 |                             // fallback for devices that advertise latency but not a direct rate.\n  982 |                             let rate_override = node_rate.or(latency_rate);\n  983 | \n  984 |                             let device = Device {\n  985 |                                 node_name,\n  986 |                                 nick_name,\n  987 |                                 description,\n  988 |                                 direction,\n  989 |                                 role,\n  990 |                                 channels,\n  991 |                                 icon_name,\n  992 |                                 object_serial,\n  993 |                                 interface_type,\n  994 |                                 address,\n  995 |                                 driver,\n  996 |                                 ..Default::default()\n  997 |                             };\n  998 |                             discovered.borrow_mut().push((\n  999 |                                 device,\n 1000 |                                 NodeOverrides {\n 1001 |                                     rate: rate_override,\n 1002 |                                     quantum: node_quantum,\n 1003 |                                 },\n 1004 |                             ));\n 1005 |                         })\n 1006 |                         .register();\n 1007 |                     let Ok(pending) = core.sync(0) else {\n 1008 |                         // TODO: maybe we should add a log?\n 1009 |                         return;\n 1010 |                     };\n 1011 |                     pending_events.borrow_mut().push(pending);\n 1012 |                     requests\n 1013 |                         .borrow_mut()\n 1014 |                         .push((node.upcast(), Request::Node(listener)));","lines":159}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","description":"In the audio hot path, `run_input`/`run_output` clone the COM interface (`capture_client.clone()` / `render_client.clone()`) on every loop iteration after every event wakeup. AddRef/Release are interlocked atomic operations; doing this once per callback period is cheap but unnecessary - the client is owned by StreamInner for the loop's lifetime and a borrow would suffice. The clone exists only to avoid borrowing run_ctxt.stream immutably while later passing it.","fix":"Pass `&render_client`/`&capture_client` borrowed from the matched reference, or restructure so process_input/process_output borrow the client out of stream.client_flow directly, avoiding the per-iteration AddRef/Release.","locations":[{"ref":"src/host/wasapi/stream.rs:630-637","code":"  630 |         let capture_client = match run_ctxt.stream.client_flow {\n  631 |             AudioClientFlow::Capture { ref capture_client } => capture_client.clone(),\n  632 |             _ => unreachable!(),\n  633 |         };\n  634 |         if let Err(err) = process_input(&run_ctxt.stream, capture_client, data_callback) {\n  635 |             emit_error(error_callback, err);\n  636 |             break;\n  637 |         }","lines":8},{"ref":"src/host/wasapi/stream.rs:660-667","code":"  660 |         let render_client = match run_ctxt.stream.client_flow {\n  661 |             AudioClientFlow::Render { ref render_client } => render_client.clone(),\n  662 |             _ => unreachable!(),\n  663 |         };\n  664 |         if let Err(err) = process_output(&run_ctxt.stream, render_client, data_callback) {\n  665 |             emit_error(error_callback, err);\n  666 |             break;\n  667 |         }","lines":8}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","description":"`HostId::Display` calls `self.name().to_ascii_lowercase()`, allocating a new `String` every time a `HostId` is formatted. `DeviceId::Display` (`write!(f, \"{}:{}\", self.host(), self.id())`) goes through this path, so every `DeviceId.to_string()` (used for serialization and in `device_by_id` round-trips) allocates an intermediate lowercase String. Host names are static and could be lowercased once or written char-by-char without allocation.","fix":"Write the lowercased name directly to the formatter (iterate chars with `to_ascii_lowercase()` per char) or store/return a pre-lowercased static string for each host.","locations":[{"ref":"src/platform/mod.rs:228-232","code":"  228 |         impl std::fmt::Display for HostId {\n  229 |             fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n  230 |                 write!(f, \"{}\", self.name().to_ascii_lowercase())\n  231 |             }\n  232 |         }","lines":5},{"ref":"src/lib.rs:294-298","code":"  294 | impl std::fmt::Display for DeviceId {\n  295 |     fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {\n  296 |         write!(f, \"{}:{}\", self.host(), self.id())\n  297 |     }\n  298 | }","lines":5}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","description":"`fill_equilibrium`'s int/float fast path uses `buffer.fill(0)` which is fine, but the multi-byte unsigned path constructs a temporary slice and writes element-by-element in a scalar loop (`for sample in samples { *sample = equilibrium; }`). For large period buffers this is slower than a `memset`-style fill. The ALSA caller already mitigates this by building a template once and `copy_from_slice`-ing it (src/host/alsa/mod.rs:679-685), but the WASAPI and pipewire callers call `fill_equilibrium` on every buffer, so each silent buffer pays the scalar-loop cost.","fix":"Build the equilibrium byte pattern once and use `chunks_exact_mut(sample_size).for_each(|c| c.copy_from_slice(&pattern))`, or precompute a fill template at stream setup (as ALSA does) and reuse it in the WASAPI/pipewire callbacks instead of recomputing per buffer.","locations":[{"ref":"src/host/equilibrium.rs:31-33","code":"   31 |             for sample in samples {\n   32 |                 *sample = equilibrium;\n   33 |             }","lines":3}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`Driver::destroy` (public) and `DriverState::destroy`/`destroy_inner` provide a manual-destroy path with the `destroyed` flag, but cpal's host layer never calls `destroy()`; it relies entirely on `Drop`. The `destroyed` bookkeeping and the `Arc::try_unwrap` path are effectively unused by the crate itself. `is_available()` in mod.rs also contains a commented-out `unimplemented!` line. `BufferPreference::Only`/`Preferred` carry a `u32 pref` that is only read in the `Stepped` arm of check_config.","fix":"Either exercise/destroy via the public API or remove the unused manual-destroy machinery; drop the commented-out line.","locations":[{"ref":"asio-sys/src/bindings/mod.rs:902-911","code":"  902 |     pub fn destroy(self) -> Result<bool, AsioError> {\n  903 |         let Driver { inner } = self;\n  904 |         match Arc::try_unwrap(inner) {\n  905 |             Err(_) => Ok(false),\n  906 |             Ok(mut inner) => {\n  907 |                 inner.destroy_inner()?;\n  908 |                 Ok(true)\n  909 |             }\n  910 |         }\n  911 |     }","lines":10},{"ref":"src/host/asio/mod.rs:54-57","code":"   54 |     fn is_available() -> bool {\n   55 |         true\n   56 |         //unimplemented!(\"check how to do this using asio-sys\")\n   57 |     }","lines":4},{"ref":"src/host/asio/stream.rs:1124-1135","code":" 1124 |         if let sys::BufferPreference::Stepped { step, .. } = range.preferred {\n 1125 |             let offset = requested_size_i32 - range.min;\n 1126 |             if offset % step as i32 != 0 {\n 1127 |                 return Err(Error::with_message(\n 1128 |                     ErrorKind::UnsupportedConfig,\n 1129 |                     format!(\n 1130 |                         \"Buffer size {requested_size} is not valid; sizes must start at {min} and increment by {step}\",\n 1131 |                         min = range.min\n 1132 |                     ),\n 1133 |                 ));\n 1134 |             }\n 1135 |         }","lines":12}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In devices_info.rs the loop variable shadows `direction` (the function parameter is `direction: DeviceDirection` used to compute flags at line 51, then a new per-device `direction` is computed at line 70 from is_source/is_sink). The parameter `direction` is unused after line 51. Not a bug, but the shadowing of a same-typed binding with a different meaning is a readability trap. Also the commented-out `ENCODING_PCM_8BIT` constant in definitions.rs:127 is dead.","fix":"Rename the per-device binding (e.g. device_direction) to avoid shadowing, and remove the commented-out constant or document why it is retained.","locations":[{"ref":"src/host/aaudio/java_interface/devices_info.rs:48-70","code":"   48 | ) -> JResult<Vec<AudioDeviceInfo>> {\n   49 |     let audio_manager = get_system_service(env, context, Context::AUDIO_SERVICE)?;\n   50 | \n   51 |     let devices = get_devices(env, &audio_manager, android_device_flags(direction))?;\n   52 | \n   53 |     let length = devices.len(env)?;\n   54 | \n   55 |     (0..length)\n   56 |         .map(|index| {\n   57 |             let device = devices.get_element(env, index)?;\n   58 |             let id = call_method_no_args_ret_int(env, &device, \"getId\")?;\n   59 |             let address = call_method_no_args_ret_string(env, &device, \"getAddress\")?;\n   60 |             let address = String::from(address.mutf8_chars(env)?);\n   61 |             let product_name =\n   62 |                 call_method_no_args_ret_char_sequence(env, &device, \"getProductName\")?;\n   63 |             let product_name = String::from(product_name.mutf8_chars(env)?);\n   64 |             let device_type =\n   65 |                 FromPrimitive::from_i32(call_method_no_args_ret_int(env, &device, \"getType\")?)\n   66 |                     .unwrap_or(AudioDeviceType::Unsupported);\n   67 | \n   68 |             let is_source = call_method_no_args_ret_bool(env, &device, \"isSource\")?;\n   69 |             let is_sink = call_method_no_args_ret_bool(env, &device, \"isSink\")?;\n   70 |             let direction = crate::device_description::direction_from_caps(is_source, is_sink);","lines":23},{"ref":"src/host/aaudio/java_interface/definitions.rs:127","code":"  127 |     //pub(crate) const ENCODING_PCM_8BIT: i32 = 3;","lines":1}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"JACK `device.rs` defines an inherent `fn id(&self) -> Result<DeviceId, Error>` (line 75) that is also exposed via the `DeviceTrait::id` impl which just calls `Device::id(self)`. The inherent method returns a `Result` that \"can never fail\" (per the PartialEq/Hash comments that `unwrap()` it), so the `Result` wrapper is pure ceremony - it forces `.unwrap()` in `eq`/`hash` and a `map_err` in Display.","fix":"Make `id()` infallible (return `DeviceId`) since it cannot fail, removing the `unwrap()`s in `PartialEq`/`Hash`.","locations":[{"ref":"src/host/jack/device.rs:75-77","code":"   75 |     fn id(&self) -> Result<DeviceId, Error> {\n   76 |         Ok(DeviceId::new(crate::platform::HostId::Jack, &self.name))\n   77 |     }","lines":3},{"ref":"src/host/jack/device.rs:346-367","code":"  346 | impl
