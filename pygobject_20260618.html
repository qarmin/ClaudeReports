<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"find_vfunc_info() is a void function that signals errors only by setting a Python exception via PyErr_Format and returning early, without writing to *implementor_class_ret. In the interface case, when g_type_interface_peek() returns NULL (implementor class doesn't implement the interface vtable), it unrefs the just-acquired implementor_class, sets a TypeError, and returns -- leaving the caller's implementor_class_ret untouched. The only caller, _wrap_pyg_hook_up_vfunc_implementation, initializes its local implementor_class to NULL before the call and never checks PyErr_Occurred() after calling find_vfunc_info(). It falls through to the end of the function and unconditionally calls g_type_class_unref(implementor_class) with implementor_class still NULL, then returns Py_RETURN_NONE despite a pending Python exception (dangling exception state combined with a reported success return value).","fix":"Change find_vfunc_info to return a gboolean success indicator (or have the caller check PyErr_Occurred() immediately after the call) and bail out early (returning NULL, not Py_RETURN_NONE) without touching implementor_class when it is NULL. Also guard the trailing g_type_class_unref(implementor_class) with a NULL check.","locations":[{"ref":"gi/gimodule.c:495-509","code":"  495 |     implementor_class = g_type_class_ref (implementor_gtype);\n  496 |     if (is_interface) {\n  497 |         GTypeInstance *implementor_iface_class;\n  498 |         implementor_iface_class =\n  499 |             g_type_interface_peek (implementor_class, ancestor_g_type);\n  500 |         if (implementor_iface_class == NULL) {\n  501 |             g_type_class_unref (implementor_class);\n  502 |             PyErr_Format (\n  503 |                 PyExc_RuntimeError,\n  504 |                 \"Couldn't find GType of implementor of interface %s. \"\n  505 |                 \"Forgot to set __gtype_name__?\",\n  506 |                 g_type_name (ancestor_g_type));\n  507 |             return;\n  508 |         }\n  509 | ","lines":15},{"ref":"gi/gimodule.c:553-588","code":"  553 |     if (!PyArg_ParseTuple (args, \"O!O!O:hook_up_vfunc_implementation\",\n  554 |                            &PyGIBaseInfo_Type, &py_info, &PyGTypeWrapper_Type,\n  555 |                            &py_type, &py_function))\n  556 |         return NULL;\n  557 | \n  558 |     implementor_gtype = pyg_type_from_object (py_type);\n  559 |     g_assert (G_TYPE_IS_CLASSED (implementor_gtype));\n  560 | \n  561 |     find_vfunc_info (py_info->info, implementor_gtype, &implementor_class,\n  562 |                      &implementor_vtable, &field_info);\n  563 |     if (field_info != NULL) {\n  564 |         GITypeInfo *type_info;\n  565 |         GICallableInfo *callable_info;\n  566 |         size_t offset;\n  567 | \n  568 |         type_info = gi_field_info_get_type_info (field_info);\n  569 |         callable_info =\n  570 |             GI_CALLABLE_INFO (gi_type_info_get_interface (type_info));\n  571 |         offset = gi_field_info_get_offset (field_info);\n  572 |         method_ptr = G_STRUCT_MEMBER_P (implementor_vtable, offset);\n  573 | \n  574 |         cache = pygi_closure_cache_new (callable_info);\n  575 |         closure = _pygi_make_native_closure ((GICallableInfo *)callable_info,\n  576 |                                              cache, GI_SCOPE_TYPE_NOTIFIED,\n  577 |                                              py_function, NULL);\n  578 | \n  579 |         *method_ptr = gi_callable_info_get_closure_native_address (\n  580 |             callable_info, closure->closure);\n  581 | \n  582 |         gi_base_info_unref (callable_info);\n  583 |         gi_base_info_unref (type_info);\n  584 |         gi_base_info_unref (field_info);\n  585 |     }\n  586 |     g_type_class_unref (implementor_class);\n  587 | \n  588 |     Py_RETURN_NONE;","lines":36}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"pygi_fundamental_new calls self = _pygi_fundamental_new_internal(type, instance) at line 154 and then unconditionally calls pygi_fundamental_ref(self) at line 155 without checking self for NULL. _pygi_fundamental_new_internal can legitimately return NULL: when type is not a subtype of PyGIFundamental_Type (lines 165-169, with a TypeError already set), when introspection info is missing (lines 171-179), or when tp_alloc fails under OOM (lines 181-184). pygi_fundamental_ref (lines 204-208) immediately dereferences self->ref_func and self->instance, so any of these paths crashes with a NULL pointer dereference instead of propagating the already-set Python exception.","fix":"After calling _pygi_fundamental_new_internal, check if self is NULL and return NULL immediately (propagating the pending exception) before calling pygi_fundamental_ref(self).","locations":[{"ref":"gi/pygi-fundamental.c:154-155","code":"  154 |     self = _pygi_fundamental_new_internal (type, instance);\n  155 |     pygi_fundamental_ref (self);","lines":2},{"ref":"gi/pygi-fundamental.c:204-208","code":"  204 | void\n  205 | pygi_fundamental_ref (PyGIFundamental *self)\n  206 | {\n  207 |     if (self->ref_func && self->instance) self->ref_func (self->instance);\n  208 | }","lines":5}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In _invoke_marshal_out_args, when an async future is present (state->py_async set) and the callable's return is skipped (pygi_callable_cache_skip_return(cache) true, or cache->return_cache is NULL), py_return stays NULL because the to_py_marshaller call at line 592 is gated by 'cache->return_cache && !pygi_callable_cache_skip_return(cache)'. The code then unconditionally calls Py_DECREF(py_return) at line 607. Py_DECREF (unlike Py_XDECREF) dereferences its argument without a NULL check, so this crashes whenever an async-returning function has no Python-visible return value, which per the preceding g_assert is exactly the expected/required case for this branch.","fix":"Change Py_DECREF (py_return) to Py_XDECREF (py_return) at gi/pygi-invoke.c:607, since py_return is legitimately NULL whenever the return is skipped.","locations":[{"ref":"gi/pygi-invoke.c:607","code":"  607 |         Py_DECREF (py_return);","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In pyg_object_new, if pygobject_prepare_construct_properties() fails (returns FALSE), obj is left NULL and g_object_new_with_properties() is never called. The function then checks PyErr_Occurred() and, if true, unconditionally calls g_object_unref(obj) with obj == NULL. g_object_unref() requires a non-NULL valid GObject (g_return_if_fail(G_IS_OBJECT(object))), so this triggers a GLib critical warning on every construct-property failure (e.g. invalid kwarg type passed to GObject.new()), and aborts the process under G_DEBUG=fatal-warnings or similar fatal-criticals configurations.","fix":"Guard the unref: only call g_object_unref(obj) if obj != NULL, e.g. `if (PyErr_Occurred ()) { if (obj) g_object_unref (obj); return NULL; }`.","locations":[{"ref":"gi/pygobject-object.c:2122-2141","code":" 2122 | \n 2123 |     if (pygobject_prepare_construct_properties (\n 2124 |             class, kwargs, &n_properties, &names, &values, &cleanup_data)) {\n 2125 |         obj = g_object_new_with_properties (type, n_properties, names, values);\n 2126 |     }\n 2127 | \n 2128 |     for (i = 0; i < n_properties; i++) {\n 2129 |         pygi_argument_from_py_cleanup (&cleanup_data[i]);\n 2130 |         g_free (names[i]);\n 2131 |         g_value_unset (&values[i]);\n 2132 |     }\n 2133 |     g_free (names);\n 2134 |     g_free (values);\n 2135 |     g_free (cleanup_data);\n 2136 | \n 2137 |     g_type_class_unref (class);\n 2138 | \n 2139 |     if (PyErr_Occurred ()) {\n 2140 |         g_object_unref (obj);\n 2141 |         return NULL;","lines":20}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"gboxed_repr() fetches the instance's __module__ attribute and, if it is not a unicode string, does Py_DECREF(module) and returns NULL without setting any exception (gi/pygboxed.c:69-72). Returning NULL from a tp_repr slot without a pending exception violates the CPython C API contract and will surface as 'SystemError: <method '__repr__' ...> returned NULL without setting an exception' instead of a meaningful error. Additionally, PyUnicode_AsUTF8(module) at line 74 can itself return NULL on a Unicode encoding error, and its result is dereferenced unchecked by g_strrstr() at line 75, which would crash on a NULL pointer dereference.","fix":"When module is not a unicode string, call PyErr_SetString(PyExc_TypeError, \"__module__ must be a string\") before returning NULL. Also check PyUnicode_AsUTF8()'s return value for NULL and bail out (the function already sets an exception in that case) before calling g_strrstr().","locations":[{"ref":"gi/pygboxed.c:66-80","code":"   66 |     module = PyObject_GetAttrString (self, \"__module__\");\n   67 |     if (module == NULL) return NULL;\n   68 | \n   69 |     if (!PyUnicode_Check (module)) {\n   70 |         Py_DECREF (module);\n   71 |         return NULL;\n   72 |     }\n   73 | \n   74 |     module_str = PyUnicode_AsUTF8 (module);\n   75 |     namespace = g_strrstr (module_str, \".\");\n   76 |     if (namespace == NULL) {\n   77 |         namespace = module_str;\n   78 |     } else {\n   79 |         namespace += 1;\n   80 |     }","lines":15}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In _pygi_closure_handle, the return value of _invoke_state_init_from_cache(&state, closure->cache, args) at line 535 is discarded. That function (gi/pygi-invoke.c, _invoke_state_init_from_cache) can return FALSE on PyTuple_New OOM failure or _pygi_invoke_arg_state_init OOM failure, leaving state->py_in_args NULL and/or state->args entries uninitialized. Execution proceeds unconditionally into _pygi_closure_convert_arguments at line 537, which dereferences these fields, risking a NULL-pointer dereference under low-memory conditions instead of failing gracefully.","fix":"Check the boolean return of _invoke_state_init_from_cache and, on failure, set a Python exception (e.g. PyErr_NoMemory) and jump to the cleanup/end label instead of continuing to _pygi_closure_convert_arguments.","locations":[{"ref":"gi/pygi-closure.c:535-537","code":"  535 |     _invoke_state_init_from_cache (&state, closure->cache, args);\n  536 | \n  537 |     if (!_pygi_closure_convert_arguments (&state, closure->cache)) {","lines":3}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"critical","easy":false,"description":"In pygi_arg_foreign_from_py_marshal, the ForeignReleaseData used for cleanup is built and registered via pygi_marshal_cleanup_data_init_full unconditionally, using arg->v_pointer, BEFORE checking whether pygi_struct_foreign_convert_to_g_argument actually succeeded. That conversion function returns NULL on failure and leaves `arg` unmodified/uninitialized in that case, so release_data->struct_ is set to an uninitialized/garbage GIArgument.v_pointer. Because the cleanup_data was already wired up with a destroy_failed callback (release_foreign), the marshalling machinery will later call release_foreign on this garbage pointer when the overall call fails, causing a crash or memory corruption from dereferencing/freeing an arbitrary pointer value.","fix":"Check the result of pygi_struct_foreign_convert_to_g_argument (i.e. whether `success` is Py_None) before allocating release_data and calling pygi_marshal_cleanup_data_init_full. Only register the cleanup data on success; on failure, return FALSE directly without touching arg->v_pointer or registering any cleanup.","locations":[{"ref":"gi/pygi-cache-struct.c:248-276","code":"  248 | static gboolean\n  249 | pygi_arg_foreign_from_py_marshal (PyGIInvokeState *state,\n  250 |                                   PyGICallableCache *callable_cache,\n  251 |                                   PyGIArgCache *arg_cache, PyObject *py_arg,\n  252 |                                   GIArgument *arg,\n  253 |                                   PyGIMarshalCleanupData *cleanup_data)\n  254 | {\n  255 |     PyObject *success;\n  256 |     PyGIInterfaceCache *iface_cache = (PyGIInterfaceCache *)arg_cache;\n  257 | \n  258 |     if (Py_IsNone (py_arg)) {\n  259 |         arg->v_pointer = NULL;\n  260 |         return TRUE;\n  261 |     }\n  262 | \n  263 |     success = pygi_struct_foreign_convert_to_g_argument (\n  264 |         py_arg, GI_REGISTERED_TYPE_INFO (iface_cache->interface_info),\n  265 |         arg_cache->transfer, arg);\n  266 | \n  267 |     ForeignReleaseData *release_data = g_new (ForeignReleaseData, 1);\n  268 |     release_data->base_info = gi_base_info_ref (\n  269 |         GI_BASE_INFO (((PyGIInterfaceCache *)arg_cache)->interface_info));\n  270 |     release_data->struct_ = arg->v_pointer;\n  271 |     pygi_marshal_cleanup_data_init_full (\n  272 |         cleanup_data, release_data, (GDestroyNotify)free_foreign_release_data,\n  273 |         (GDestroyNotify)release_foreign);\n  274 | \n  275 |     return Py_IsNone (success);\n  276 | }","lines":29}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"critical","easy":false,"description":"In _pygi_closure_set_out_arguments, the from_py_marshaller's cleanup-data output pointer is written to '&state->args[i_py_retval].from_py_arg_cleanup_data' (line 453) instead of '&state->args[i].from_py_arg_cleanup_data', while the marshaled argument value itself is correctly stored at state->args[i].arg_value (lines 421-423, 451-453). i_py_retval only equals i when there is no return value and no skipped/non-FROM_PYTHON arguments before index i; otherwise the two indices diverge. This causes cleanup data to be written into the wrong argument slot, so pygi_marshal_cleanup_args_from_py (gi/pygi-marshal-cleanup.c) later reads stale or uninitialized cleanup data for one argument while the slot that actually needs cleanup never gets it - leading to leaked or double-freed marshaled arguments (e.g. GLib boxed copies, strings) during vfunc/callback invocation cleanup.","fix":"Use the same index 'i' for both the value and cleanup-data output pointers: '&state->args[i].arg_value, &state->args[i].from_py_arg_cleanup_data'.","locations":[{"ref":"gi/pygi-closure.c:451-453","code":"  451 |             success = arg_cache->from_py_marshaller (\n  452 |                 state, cache, arg_cache, item, &state->args[i].arg_value,\n  453 |                 &state->args[i_py_retval].from_py_arg_cleanup_data);","lines":3}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"In _pygi_marshal_to_py_interface_enum, the GIBaseInfo* obtained from gi_type_info_get_interface is only unref'd on the success path. When gi_argument_to_c_long fails, the function returns NULL directly without calling gi_base_info_unref(interface), leaking the interface info. The structurally identical _pygi_marshal_to_py_interface_flags function (same file) correctly unrefs interface on both the failure and success paths, confirming this is a copy-paste omission.","fix":"Add gi_base_info_unref (interface) before the `return NULL;` on the gi_argument_to_c_long failure path, mirroring the pattern already used in _pygi_marshal_to_py_interface_flags.","locations":[{"ref":"gi/pygi-cache-enum.c:230-256","code":"  230 | static PyObject *\n  231 | _pygi_marshal_to_py_interface_enum (PyGIInvokeState *state,\n  232 |                                     PyGICallableCache *callable_cache,\n  233 |                                     PyGIArgCache *arg_cache, GIArgument *arg,\n  234 |                                     PyGIMarshalCleanupData *cleanup_data)\n  235 | {\n  236 |     PyGIInterfaceCache *iface_cache = (PyGIInterfaceCache *)arg_cache;\n  237 |     GIBaseInfo *interface;\n  238 |     long c_long;\n  239 | \n  240 |     interface = gi_type_info_get_interface (arg_cache->type_info);\n  241 |     g_assert (GI_IS_ENUM_INFO (interface) && !GI_IS_FLAGS_INFO (interface));\n  242 | \n  243 |     if (!gi_argument_to_c_long (\n  244 |             arg, &c_long,\n  245 |             gi_enum_info_get_storage_type ((GIEnumInfo *)interface))) {\n  246 |         return NULL;\n  247 |     }\n  248 |     gi_base_info_unref (interface);\n  249 | \n  250 |     if (c_long < INT_MIN || c_long > INT_MAX) {\n  251 |         PyErr_Format (PyExc_OverflowError, \"Value %ld is not in integer range\",\n  252 |                       c_long);\n  253 |         return NULL;\n  254 |     }\n  255 |     return pyg_enum_val_new (iface_cache->py_type, (int)c_long);\n  256 | }","lines":27}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"pyg_props_descr_descr_get allocates a GC-tracked object via PyObject_GC_New(PyGProps, &PyGProps_Type) at line 260, but never calls PyObject_GC_Track() on it before returning. PyGProps_Type is registered with Py_TPFLAGS_HAVE_GC and a real tp_traverse (pygobject_props_traverse, lines 176-182) that visits self->pygobject, a strong reference acquired via Py_NewRef at line 271. Because the object is never tracked, the cyclic garbage collector will never visit or collect it, so any reference cycle involving a GProps instance and its owning GObject (e.g. via a Python subclass storing a reference back to the GProps wrapper) becomes permanently unreachable-but-uncollectable, leaking the GObject and its properties wrapper. The same function also doesn't check PyObject_GC_New's return value for NULL, risking a crash on OOM (gprops->pygobject = NULL dereferences gprops directly).","fix":"After allocating, check 'if (gprops == NULL) return NULL;', and call PyObject_GC_Track((PyObject *)gprops) before returning the new instance (matching the pattern used for other GC-tracked types like PyGObject in gi/pygobject-object.c and PyGIResultTuple in gi/pygi-resulttuple.c).","locations":[{"ref":"gi/pygobject-props.c:260","code":"  260 |     gprops = PyObject_GC_New (PyGProps, &PyGProps_Type);","lines":1},{"ref":"gi/pygobject-props.c:255-275","code":"  255 | static PyObject *\n  256 | pyg_props_descr_descr_get (PyObject *self, PyObject *obj, PyObject *type)\n  257 | {\n  258 |     PyGProps *gprops;\n  259 | \n  260 |     gprops = PyObject_GC_New (PyGProps, &PyGProps_Type);\n  261 |     if (obj == NULL || Py_IsNone (obj)) {\n  262 |         gprops->pygobject = NULL;\n  263 |         gprops->gtype = pyg_type_from_object (type);\n  264 |     } else {\n  265 |         if (!PyObject_IsInstance (obj, (PyObject *)&PyGObject_Type)) {\n  266 |             PyErr_SetString (PyExc_TypeError,\n  267 |                              \"cannot use GObject property\"\n  268 |                              \" descriptor on non-GObject instances\");\n  269 |             return NULL;\n  270 |         }\n  271 |         gprops->pygobject = (PyGObject *)Py_NewRef (obj);\n  272 |         gprops->gtype = pyg_type_from_object (obj);\n  273 |     }\n  274 |     return (PyObject *)gprops;\n  275 | }","lines":21}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In marshal_emission_hook, the per-parameter conversion loop builds the params tuple with PyTuple_SetItem. If pyg_value_to_pyobject() fails for any parameter (item == NULL), the code does `goto out`, which skips the Py_DECREF(params) that only happens on the success path (after the loop, before calling the Python callback). This leaks the partially-filled params tuple (and any PyObject items already stored in it via PyTuple_SetItem) every time a signal parameter fails to convert to a Python object during an emission-hook invocation.","fix":"Add Py_DECREF(params) on the error path before `goto out`, e.g. change `if (!item) { goto out; }` to `if (!item) { Py_DECREF (params); goto out; }`.","locations":[{"ref":"gi/gimodule.c:747-757","code":"  747 |     /* construct Python tuple for the parameter values */\n  748 |     params = PyTuple_New (n_param_values);\n  749 | \n  750 |     for (i = 0; i < n_param_values; i++) {\n  751 |         PyObject *item = pyg_value_to_pyobject (&param_values[i], FALSE);\n  752 | \n  753 |         /* error condition */\n  754 |         if (!item) {\n  755 |             goto out;\n  756 |         }\n  757 |         PyTuple_SetItem (params, i, item);","lines":11}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In _pygi_marshal_from_py_ghash, py_keys (from PyMapping_Keys) is leaked if pygi_guint_from_pyssize fails on the length conversion: the function returns FALSE immediately without decrementing py_keys, unlike the PyMapping_Length failure case three lines earlier which correctly does Py_DECREF (py_keys) before returning FALSE.","fix":"Add Py_DECREF (py_keys) before returning FALSE when pygi_guint_from_pyssize fails, matching the cleanup already done for the py_length < 0 case just above it.","locations":[{"ref":"gi/pygi-cache-hashtable.c:86-91","code":"   86 |     py_length = PyMapping_Length (py_arg);\n   87 |     if (py_length < 0) {\n   88 |         Py_DECREF (py_keys);\n   89 |         return FALSE;\n   90 |     }\n   91 |     if (!pygi_guint_from_pyssize (py_length, &length)) return FALSE;","lines":6}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"_pygi_marshal_from_py_ghash builds the hash table with g_hash_table_new_full but only supplies key_destroy_func/value_destroy_func when the key or value type is UTF8/FILENAME (g_free). For any other type (objects, boxed structs, etc.) marshalled with GI_TRANSFER_EVERYTHING, the hash table is not given destroy funcs, so the keys/values transferred into the hash table are never freed when the hash table itself is destroyed. This is acknowledged in a comment immediately following but left unaddressed.","fix":"For transfer-everything hash tables with non-string key/value types, register destroy funcs appropriate to the contained type (e.g. g_object_unref, g_boxed_free) so that g_hash_table_unref properly releases ownership of transferred keys/values.","locations":[{"ref":"gi/pygi-cache-hashtable.c:109-122","code":"  109 |     if (hash_cache->key_cache->type_tag == GI_TYPE_TAG_UTF8\n  110 |         || hash_cache->key_cache->type_tag == GI_TYPE_TAG_FILENAME) {\n  111 |         hash_func = g_str_hash;\n  112 |         equal_func = g_str_equal;\n  113 |         /* Transfer rule has been updated in hash_table_item_cache_new(). */\n  114 |         key_destroy_func = g_free;\n  115 |     }\n  116 |     if (hash_cache->value_cache->type_tag == GI_TYPE_TAG_UTF8\n  117 |         || hash_cache->value_cache->type_tag == GI_TYPE_TAG_FILENAME) {\n  118 |         value_destroy_func = g_free;\n  119 |     }\n  120 | \n  121 |     hash_ = g_hash_table_new_full (hash_func, equal_func, key_destroy_func,\n  122 |                                    value_destroy_func);","lines":14},{"ref":"gi/pygi-cache-hashtable.c:172-173","code":"  172 |     /* Note that the keys and values will leak for transfer everything because\n  173 |      * we do not use g_hash_table_new_full and set key/value_destroy_func. */","lines":2}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In _pygi_marshal_from_py_ghash's per-item loop, when key_from_py_marshaller or value_from_py_marshaller fails partway through an item (e.g. the value marshaller fails after the key already marshalled successfully), the err: block decrefs py_keys/py_values and unrefs the hash table but never destroys the cleanup data for the item that just failed (key_cleanup_data and/or value_cleanup_data), nor any GIArgument already produced for that item. This is acknowledged directly in the source via a `// LEAK` comment and a `/* FIXME: cleanup hash keys and values */` comment in the err: block, but is unfixed.","fix":"In the err: block, call the appropriate cleanup function (pygi_marshal_cleanup_data_destroy_failed or equivalent) on key_cleanup_data/value_cleanup_data for the item that was in progress when the failure occurred, before unref'ing the hash table.","locations":[{"ref":"gi/pygi-cache-hashtable.c:138","code":"  138 |         // LEAK: key_cleanup_data and value_cleanup_data are never cleaned","lines":1},{"ref":"gi/pygi-cache-hashtable.c:159-165","code":"  159 | err:\n  160 |         /* FIXME: cleanup hash keys and values */\n  161 |         Py_DECREF (py_keys);\n  162 |         Py_DECREF (py_values);\n  163 |         g_hash_table_unref (hash_);\n  164 |         _PyGI_ERROR_PREFIX (\"Item %i: \", i);\n  165 |         return FALSE;","lines":7}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"pygi_arg_struct_from_py_marshal creates an owned copy of a boxed struct via g_boxed_copy when arg_cache->transfer == GI_TRANSFER_EVERYTHING (storing it in arg->v_pointer), but never registers any cleanup_data for it -- the wiring is explicitly stubbed out with a `// TODO: fix cleanup` comment and commented-out code. If a later argument in the same call fails to marshal and the overall invoke aborts, this boxed copy has no owner and is never freed, a use-case-dependent memory leak on the cross-argument failure path.","fix":"Wire up cleanup_data (e.g. via pygi_marshal_cleanup_data_init_full with g_boxed_free as the destroy_failed callback) so the copied boxed value is freed if a sibling argument fails to marshal.","locations":[{"ref":"gi/pygi-cache-struct.c:330-335","code":"  330 |         if (is_union || pyg_boxed_check (py_arg, g_type)\n  331 |             || g_type_is_a (pyg_type_from_object (py_arg), g_type)) {\n  332 |             arg->v_pointer = pyg_boxed_get (py_arg, void);\n  333 |             if (arg_cache->transfer == GI_TRANSFER_EVERYTHING) {\n  334 |                 arg->v_pointer = g_boxed_copy (g_type, arg->v_pointer);\n  335 |             }","lines":6},{"ref":"gi/pygi-cache-struct.c:365-369","code":"  365 |     /* Assume struct marshaling is always a pointer and assign cleanup_data\n  366 |      * here rather than passing it further down the chain.\n  367 |      */\n  368 |     // TODO: fix cleanup\n  369 |     // cleanup_data->data = arg->v_pointer;","lines":5}]},{"id":"MEM_8","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In pygobject_emit, after the signal is emitted and the return value GValue `ret` has been converted to a Python object via pyg_value_to_pyobject(&ret, TRUE), the code conditionally skips releasing the GValue's reference: `if (!was_floating) g_value_unset (&ret);`. pygobject_new() (invoked transitively for G_TYPE_OBJECT-holding GValues) always calls g_object_ref_sink() unconditionally when steal=FALSE (see pygobject_new_full, which takes its own independent reference regardless of the object's floating state). This means the GValue's own held reference on the returned object is logically separate from the new Python wrapper's reference, and is only released by g_value_unset(). Skipping g_value_unset() when the returned object was floating leaks one reference on that object every time a signal handler returns a newly-constructed (still floating) GObject as its return value.","fix":"Always call g_value_unset(&ret) once the value has been converted via pyg_value_to_pyobject regardless of was_floating, since pygobject_new takes its own independent reference (sinking the float) and does not depend on or steal the GValue's reference.","locations":[{"ref":"gi/pygobject-object.c:1561-1576","code":" 1561 | \n 1562 |     g_free (params);\n 1563 |     if ((query.return_type & ~G_SIGNAL_TYPE_STATIC_SCOPE) != G_TYPE_NONE) {\n 1564 |         gboolean was_floating = FALSE;\n 1565 | \n 1566 |         if (G_VALUE_HOLDS_OBJECT (&ret)) {\n 1567 |             GObject *obj = g_value_get_object (&ret);\n 1568 |             if (obj != NULL && G_IS_OBJECT (obj)) {\n 1569 |                 was_floating = g_object_is_floating (obj);\n 1570 |             }\n 1571 |         }\n 1572 |         py_ret = pyg_value_to_pyobject (&ret, TRUE);\n 1573 |         if (!was_floating) g_value_unset (&ret);\n 1574 |     } else {\n 1575 |         py_ret = Py_NewRef (Py_None);\n 1576 |     }","lines":16}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"pygi_arg_gvalue_to_py_marshal converts a GValue to a Python object via pyg_value_to_pyobject but never cleans up the source GValue even when the caller has ownership (caller_allocates / transfer-everything). The gap is acknowledged directly with a `// TODO: clean up GValue if we own it` comment, but is unaddressed, so an owned GValue's contained boxed/object data can leak.","fix":"When the marshaller owns the GValue (e.g. caller_allocates or transfer-everything), call g_value_unset on it (and free the GValue itself if heap-allocated) after the Python object has copied out what it needs, or register the appropriate destroy callback via cleanup_data.","locations":[{"ref":"gi/pygi-cache-struct.c:374-392","code":"  374 | static PyObject *\n  375 | pygi_arg_gvalue_to_py_marshal (PyGIInvokeState *state,\n  376 |                                PyGICallableCache *callable_cache,\n  377 |                                PyGIArgCache *arg_cache, GIArgument *arg,\n  378 |                                PyGIMarshalCleanupData *cleanup_data)\n  379 | {\n  380 |     PyObject *py_obj;\n  381 | \n  382 |     if (arg->v_pointer == NULL) {\n  383 |         Py_RETURN_NONE;\n  384 |     }\n  385 | \n  386 |     py_obj = pyg_value_to_pyobject (\n  387 |         arg->v_pointer, pygi_arg_cache_is_caller_allocates (arg_cache));\n  388 | \n  389 |     // TODO: clean up GValue if we own it\n  390 | \n  391 |     return py_obj;\n  392 | }","lines":19}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In _pygi_closure_handle, success is initialized to TRUE at line 517 and then updated via 'success |= _pygi_closure_set_out_arguments(...)' at line 551. Since success is already TRUE before this call, ORing in any boolean result keeps it TRUE regardless of whether _pygi_closure_set_out_arguments actually failed. This makes the subsequent 'if (!success)' cleanup block at lines 554-557 permanently dead code, so failures in setting out-arguments/return value (e.g. a from_py_marshaller failure) are silently ignored instead of triggering pygi_marshal_cleanup_args_from_py and _pygi_closure_clear_retvals.","fix":"Change 'success |= _pygi_closure_set_out_arguments(...)' to 'success = _pygi_closure_set_out_arguments(...)' at gi/pygi-closure.c:551.","locations":[{"ref":"gi/pygi-closure.c:551","code":"  551 |     success |= _pygi_closure_set_out_arguments (&state, closure->cache, retval,","lines":1}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"add_properties() installs every property parsed from a class's __gproperties__ dict with the same hardcoded property id 1 via g_object_class_install_property(klass, 1, pspec), instead of an incrementing/unique id per property. GObject property ids are meant to be unique positive integers within a class (conventionally PROP_0+1, +2, ...) and are used internally by GObjectClass property bookkeeping (e.g. sizing/indexing of property arrays, n_property_specs, and identifying which property changed in some property-change paths). Installing multiple pspecs under the same id on one class is a clear deviation from the documented contract of g_object_class_install_property and can corrupt or silently overwrite the class's internal property-id indexed bookkeeping, even though this codebase's own get_property/set_property dispatch by pspec/name and happens not to read the id directly.","fix":"Introduce a property counter (e.g. starting at 1) that increments once per successfully parsed property, and pass that counter as the id argument to g_object_class_install_property instead of the literal 1.","locations":[{"ref":"gi/pygobject-class.c:542","code":"  542 |             g_object_class_install_property (klass, 1, pspec);","lines":1}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"pygi_arg_gobject_out_arg_from_py uses a heuristic (Py_REFCNT(py_arg) == 1 && gobj->ref_count == 1) to detect when a returned GObject has no other reference and needs an extra ref to avoid premature finalization. The code's own comment states this check 'does not hold up for Python 3.14' because CPython's refcounting changed the observed refcount in that scenario, meaning the leak-prevention workaround silently stops engaging on newer Python versions without any compensating code path or runtime version check.","fix":"Replace the refcount-based heuristic with a more robust mechanism not dependent on CPython's internal refcounting behavior (e.g. an explicit floating-reference protocol, or a version-conditional check with a documented fallback for Python 3.14+), or update the comment into a tracked TODO/issue reference if no fix is currently planned.","locations":[{"ref":"gi/pygi-cache-object.c:83-125","code":"   83 | static gboolean\n   84 | pygi_arg_gobject_out_arg_from_py (PyObject *py_arg, /* in */\n   85 |                                   GIArgument *arg,  /* out */\n   86 |                                   GITransfer transfer)\n   87 | {\n   88 |     GObject *gobj;\n   89 |     if (!pygi_marshal_from_py_object (py_arg, arg, transfer)) {\n   90 |         return FALSE;\n   91 |     }\n   92 | \n   93 |     /* HACK: At this point the basic marshaling of the GObject was successful\n   94 |      * but we add some special case hacks for vfunc returns due to buggy APIs:\n   95 |      * https://bugzilla.gnome.org/show_bug.cgi?id=693393\n   96 |      */\n   97 |     gobj = arg->v_pointer;\n   98 |     // In Python 3.13 the py_arg refcount is 3, in 3.14 only 1\n   99 |     if (Py_REFCNT (py_arg) == 1 && gobj->ref_count == 1) {\n  100 |         /* If both object ref counts are only 1 at this point (the reference held\n  101 |          * in a return tuple), we assume the GObject will be free'd before reaching\n  102 |          * its target and become invalid. So instead of getting invalid object errors\n  103 |          * we add a new GObject ref.\n  104 |          *\n  105 |          * Note that this check does not hold up for Python 3.14\n  106 |          */\n  107 |         PyObject *repr = PyObject_Repr (py_arg);\n  108 |         gchar *msg = g_strdup_printf (\n  109 |             \"Adding extra reference for %s, \"\n  110 |             \"for nothing is holding a reference to this object. \"\n  111 |             \"This could potentially lead to a memory leak. \"\n  112 |             \"See: https://bugzilla.gnome.org/show_bug.cgi?id=687522\",\n  113 |             PyUnicode_AsUTF8 (repr));\n  114 |         Py_DECREF (repr);\n  115 |         if (PyErr_WarnEx (PyExc_RuntimeWarning, msg, 2)) {\n  116 |             g_free (msg);\n  117 |             return FALSE;\n  118 |         }\n  119 |         g_free (msg);\n  120 | \n  121 |         g_object_ref (gobj);\n  122 |     }\n  123 | \n  124 |     return TRUE;\n  125 | }","lines":43}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"pyg_enum_add() validates the GType with g_type_is_a(gtype, G_TYPE_ENUM) and on failure calls PyErr_Format(PyExc_TypeError, ...) before returning NULL, correctly setting a Python exception (gi/pygenum.c:222-229). The near-identical pyg_flags_add() performs the same check but instead calls g_warning(...) (a glib log message, not a Python exception) and returns NULL without ever calling PyErr_SetString/PyErr_Format. pyg_flags_add is exported through the public C API table (_PyGObject_API->flags_add, see gi/pygi-capi.c:445) for use by other extension modules. Any caller that treats a NULL return as 'an exception is set and should propagate' will instead get a NULL PyObject* with no exception set, which CPython flags as a SystemError ('NULL result without error') instead of the intended TypeError.","fix":"Replace the g_warning() call with PyErr_Format(PyExc_TypeError, \"Trying to register gtype '%s' as flags when in fact it is of type '%s'\", g_type_name (gtype), g_type_name (G_TYPE_FUNDAMENTAL (gtype))) to mirror pyg_enum_add().","locations":[{"ref":"gi/pygflags.c:223-230","code":"  223 |     g_return_val_if_fail (typename != NULL, NULL);\n  224 |     if (!g_type_is_a (gtype, G_TYPE_FLAGS)) {\n  225 |         g_warning (\n  226 |             \"Trying to register gtype '%s' as flags when in fact it is of \"\n  227 |             \"type '%s'\",\n  228 |             g_type_name (gtype), g_type_name (G_TYPE_FUNDAMENTAL (gtype)));\n  229 |         return NULL;\n  230 |     }","lines":8}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"pygi_type_import_by_g_type() can fail in two distinct ways: it returns NULL with no exception set (GType not found in any typelib), or it returns NULL with a Python exception set (e.g. PyImport_ImportModule or PyObject_GetAttrString inside it failed). All four call sites that use its result as an intermediate fallback step (before falling back further to a default wrapper type) treat both cases identically and never call PyErr_Clear(). If the typelib-lookup path raised an exception, execution still falls through to the generic fallback type and returns a seemingly successful PyObject* while a Python exception remains pending on the thread state. This corrupts the caller's error state and can cause a spurious/garbled exception to surface at an unrelated, later point, or trip a 'SystemError: returned a result with an exception set' assertion in debug builds.","fix":"After calling pygi_type_import_by_g_type(), check PyErr_Occurred() and PyErr_Clear() before falling back to the default wrapper type, or propagate the error to the caller instead of silently continuing.","locations":[{"ref":"gi/pygboxed.c:199-209","code":"  199 |     tp = g_type_get_qdata (boxed_type, pygboxed_type_key);\n  200 | \n  201 |     if (!tp) tp = (PyTypeObject *)pygi_type_import_by_g_type (boxed_type);\n  202 | \n  203 |     if (!tp) tp = (PyTypeObject *)&PyGBoxed_Type; /* fallback */\n  204 | \n  205 |     if (!PyType_IsSubtype (tp, &PyGBoxed_Type)) {\n  206 |         PyErr_Format (PyExc_RuntimeError, \"%s isn't a GBoxed\", tp->tp_name);\n  207 |         PyGILState_Release (state);\n  208 |         return NULL;\n  209 |     }","lines":11},{"ref":"gi/pygpointer.c:156-160","code":"  156 |     tp = g_type_get_qdata (pointer_type, pygpointer_class_key);\n  157 | \n  158 |     if (!tp) tp = (PyTypeObject *)pygi_type_import_by_g_type (pointer_type);\n  159 | \n  160 |     if (!tp) tp = (PyTypeObject *)&PyGPointer_Type; /* fallback */","lines":5},{"ref":"gi/pygenum.c:65-69","code":"   65 |     pyclass = (PyObject *)g_type_get_qdata (gtype, pygenum_class_key);\n   66 |     if (!pyclass) pyclass = pygi_type_import_by_g_type (gtype);\n   67 |     if (!pyclass)\n   68 |         pyclass = pyg_enum_add (NULL, g_type_name (gtype), NULL, gtype);\n   69 |     if (!pyclass) return PyLong_FromLong (value);","lines":5},{"ref":"gi/pygflags.c:65-69","code":"   65 |     pyclass = (PyObject *)g_type_get_qdata (gtype, pygflags_class_key);\n   66 |     if (!pyclass) pyclass = pygi_type_import_by_g_type (gtype);\n   67 |     if (!pyclass)\n   68 |         pyclass = pyg_flags_add (NULL, g_type_name (gtype), NULL, gtype);\n   69 |     if (!pyclass) return PyLong_FromUnsignedLong (value);","lines":5}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In both pyg_enum_add() and pyg_flags_add(), inside the per-value registration loop, 'item' is the result of PyObject_Vectorcall(stub, ...) constructing an enum/flags member instance. The return value is never checked for NULL before being passed to PyModule_AddObject(module, prefix, item). If the vectorcall fails (e.g. memory error or a __new__/__init__ override raising), item is NULL, an exception is already pending, and PyModule_AddObject is called with a NULL value object, which is invalid API usage and will misbehave (it dereferences/incref's the value object internally). The loop also does not check the return value of PyModule_AddObject itself, nor does the outer code check the return of the first PyModule_AddObject(module, typename, stub) call before unconditionally doing Py_INCREF(stub) right after it -- if that call fails, the reference is leaked rather than stolen (PyModule_AddObject only steals the ref on success).","fix":"Check 'item' for NULL right after the Vectorcall and bail out (propagating the exception) before calling PyModule_AddObject. Also check the return value of every PyModule_AddObject call and only Py_INCREF(stub) after confirming the first call succeeded.","locations":[{"ref":"gi/pygenum.c:244-264","code":"  244 |         PyModule_AddObject (module, (char *)typename, stub);\n  245 |         Py_INCREF (stub);\n  246 | \n  247 |         /* Register enum values */\n  248 |         eclass = G_ENUM_CLASS (g_type_class_ref (gtype));\n  249 |         for (i = 0; i < eclass->n_values; i++) {\n  250 |             PyObject *item, *intval;\n  251 |             PyObject *args[2] = { NULL };\n  252 |             char *prefix;\n  253 | \n  254 |             intval = PyLong_FromLong (eclass->values[i].value);\n  255 |             args[1] = intval;\n  256 |             item = PyObject_Vectorcall (\n  257 |                 stub, &args[1], 1 + PY_VECTORCALL_ARGUMENTS_OFFSET, NULL);\n  258 |             Py_DECREF (intval);\n  259 | \n  260 |             prefix = g_strdup (pyg_constant_strip_prefix (\n  261 |                 eclass->values[i].value_name, strip_prefix));\n  262 |             PyModule_AddObject (module, prefix, item);\n  263 |             g_free (prefix);\n  264 |         }","lines":21},{"ref":"gi/pygflags.c:245-265","code":"  245 |         PyModule_AddObject (module, (char *)typename, stub);\n  246 |         Py_INCREF (stub);\n  247 | \n  248 |         /* Register flags values */\n  249 |         fclass = G_FLAGS_CLASS (g_type_class_ref (gtype));\n  250 |         for (i = 0; i < fclass->n_values; i++) {\n  251 |             PyObject *item, *intval;\n  252 |             PyObject *args[2] = { NULL };\n  253 |             char *prefix;\n  254 | \n  255 |             intval = PyLong_FromUnsignedLong (fclass->values[i].value);\n  256 |             args[1] = intval;\n  257 |             item = PyObject_Vectorcall (\n  258 |                 stub, &args[1], 1 + PY_VECTORCALL_ARGUMENTS_OFFSET, NULL);\n  259 |             Py_DECREF (intval);\n  260 | \n  261 |             prefix = g_strdup (pyg_constant_strip_prefix (\n  262 |                 fclass->values[i].value_name, strip_prefix));\n  263 |             PyModule_AddObject (module, prefix, item);\n  264 |             g_free (prefix);\n  265 |         }","lines":21}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"pygi_type_get_from_g_type calls PyObject_GetAttrString(py_g_type, \"pytype\") and only handles the Py_IsNone(py_type) case by falling back to pygi_type_import_by_g_type. It does not check for py_type == NULL (the failure return of PyObject_GetAttrString, e.g. AttributeError if the wrapper has no pytype attribute). Since NULL != Py_None, Py_IsNone(NULL) evaluates false, so on failure the function falls through to `Py_DECREF (py_g_type); return py_type;`, returning NULL while silently skipping the intended import fallback, and potentially leaving an unexpected exception state for the caller (pygi-info.c:1954) to deal with.","fix":"Check for py_type == NULL after PyObject_GetAttrString; if NULL, clear the exception (PyErr_Clear) and fall back to pygi_type_import_by_g_type the same as the Py_IsNone case, rather than only checking Py_IsNone.","locations":[{"ref":"gi/pygi-type.c:83-102","code":"   83 | PyObject *\n   84 | pygi_type_get_from_g_type (GType g_type)\n   85 | {\n   86 |     PyObject *py_g_type;\n   87 |     PyObject *py_type;\n   88 | \n   89 |     py_g_type = pyg_type_wrapper_new (g_type);\n   90 |     if (py_g_type == NULL) {\n   91 |         return NULL;\n   92 |     }\n   93 | \n   94 |     py_type = PyObject_GetAttrString (py_g_type, \"pytype\");\n   95 |     if (Py_IsNone (py_type)) {\n   96 |         py_type = pygi_type_import_by_g_type (g_type);\n   97 |     }\n   98 | \n   99 |     Py_DECREF (py_g_type);\n  100 | \n  101 |     return py_type;\n  102 | }","lines":20}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"pyg_enum_register() calls PyLong_AsLong(value) (gi/pygenum.c:301) and pyg_flags_register() calls PyLong_AsUnsignedLongMask(value) (gi/pygflags.c:302) to extract each enum/flags member's integer value, without checking PyErr_Occurred() afterward. If 'value' (an item from the user-supplied Python enum/flags class) is not actually convertible to an integer, PyLong_AsLong returns -1 with an exception set, but the code proceeds to use -1 as the value and continues the loop, silently registering a bogus GEnumValue/GFlagsValue instead of failing the registration with a clear TypeError.","fix":"After the PyLong_As* call, check PyErr_Occurred() and, if set, Py_DECREF(name) and 'goto out' to propagate the error instead of silently continuing with value -1.","locations":[{"ref":"gi/pygenum.c:301","code":"  301 |         enum_values[i].value = (int)PyLong_AsLong (value);","lines":1},{"ref":"gi/pygflags.c:302","code":"  302 |         flags_values[i].value = (guint)PyLong_AsUnsignedLongMask (value);","lines":1}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":true,"description":"pygi_argument_from_py calls pygi_arg_cache_new and immediately dereferences the returned cache pointer (cache->from_py_marshaller(...)) without a NULL check. pygi_arg_cache_new can legitimately return NULL (e.g. pygi_arg_interface_setup in pygi-cache-interface.c returns FALSE/propagates NULL when py_type cannot be resolved, such as when a GI-introspected type's module fails to import). This causes a NULL pointer dereference instead of a clean Python exception.","fix":"After calling pygi_arg_cache_new, check if cache is NULL and return an error sentinel (or propagate the already-set Python exception) before dereferencing cache->from_py_marshaller.","locations":[{"ref":"gi/pygi-argument.c:39-63","code":"   39 | GIArgument\n   40 | pygi_argument_from_py (GITypeInfo *type_info, PyObject *object,\n   41 |                        GITransfer transfer,\n   42 |                        PyGIArgumentFromPyCleanupData *arg_cleanup)\n   43 | {\n   44 |     GIArgument arg = PYGI_ARG_INIT;\n   45 | \n   46 |     PyGIArgCache *cache = pygi_arg_cache_new (\n   47 |         type_info, /*arg_info=*/NULL, transfer, PYGI_DIRECTION_FROM_PYTHON,\n   48 |         /*callable_cache=*/NULL, 0, 0);\n   49 | \n   50 |     if (!cache->from_py_marshaller (&arg_cleanup->state,\n   51 |                                     /*callable_cache=*/NULL, cache, object,\n   52 |                                     &arg, &arg_cleanup->cleanup_data)) {\n   53 |         if (!PyErr_Occurred ())\n   54 |             PyErr_Format (PyExc_TypeError,\n   55 |                           \"Unable to convert argument %R to its C equivalent\",\n   56 |                           object);\n   57 |     }\n   58 | \n   59 |     arg_cleanup->cache = cache;\n   60 |     arg_cleanup->object = object;\n   61 | \n   62 |     return arg;\n   63 | }","lines":25}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":true,"description":"pygi_argument_to_py calls pygi_arg_cache_new and immediately dereferences the returned cache pointer (cache->to_py_marshaller(...)) without a NULL check, the same issue as pygi_argument_from_py. pygi_arg_cache_new can return NULL when type resolution fails (see pygi-cache-interface.c pygi_arg_interface_setup), leading to a NULL pointer dereference.","fix":"After calling pygi_arg_cache_new, check if cache is NULL and return NULL (propagating the already-set Python exception) before dereferencing cache->to_py_marshaller.","locations":[{"ref":"gi/pygi-argument.c:77-96","code":"   77 | PyObject *\n   78 | pygi_argument_to_py (GITypeInfo *type_info, GIArgument arg,\n   79 |                      GITransfer transfer)\n   80 | {\n   81 |     PyGIInvokeState state = { 0 };\n   82 |     PyGIMarshalCleanupData cleanup_data = { 0 };\n   83 |     PyObject *object;\n   84 | \n   85 |     PyGIArgCache *cache = pygi_arg_cache_new (\n   86 |         type_info, /*arg_info=*/NULL, transfer, PYGI_DIRECTION_TO_PYTHON,\n   87 |         /*callable_cache=*/NULL, 0, 0);\n   88 | \n   89 |     object = cache->to_py_marshaller (&state, /*callable_cache=*/NULL, cache,\n   90 |                                       &arg, &cleanup_data);\n   91 | \n   92 |     pygi_marshal_cleanup_data_destroy (&cleanup_data);\n   93 |     pygi_arg_cache_free (cache);\n   94 | \n   95 |     return object;\n   96 | }","lines":20}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"pyg_pointer_new() looks up a Python type via g_type_get_qdata()/pygi_type_import_by_g_type() and, if found, directly does PyObject_New(PyGPointer, tp) and then writes pointer/gtype fields at PyGPointer struct offsets. Unlike pygi_gboxed_new() (gi/pygboxed.c:205-209), there is no PyType_IsSubtype(tp, &PyGPointer_Type) check here. If qdata or the typelib importer resolves 'tp' to some Python type that is registered for that GType but is not actually a PyGPointer subclass (e.g. a regular GObject-derived wrapper, or any other registered class with a different/larger instance layout), PyObject_New() will allocate using that unrelated type's tp_basicsize/tp_alloc and the code will then blindly write through PyGPointer-shaped offsets into it. This is a type-confusion bug that can corrupt arbitrary instance memory of the wrongly-resolved type.","fix":"Add the same PyType_IsSubtype(tp, &PyGPointer_Type) check used in pygi_gboxed_new() before calling PyObject_New(), and raise PyExc_RuntimeError (as pygboxed.c does) if the resolved type is not a GPointer subtype.","locations":[{"ref":"gi/pygpointer.c:156-168","code":"  156 |     tp = g_type_get_qdata (pointer_type, pygpointer_class_key);\n  157 | \n  158 |     if (!tp) tp = (PyTypeObject *)pygi_type_import_by_g_type (pointer_type);\n  159 | \n  160 |     if (!tp) tp = (PyTypeObject *)&PyGPointer_Type; /* fallback */\n  161 |     self = PyObject_New (PyGPointer, tp);\n  162 | \n  163 |     PyGILState_Release (state);\n  164 | \n  165 |     if (self == NULL) return NULL;\n  166 | \n  167 |     pyg_pointer_set_ptr (self, pointer);\n  168 |     self->gtype = pointer_type;","lines":13}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"pygi_gschar_from_py has an unreachable trailing `return FALSE;` after an if/else where both branches already return, making the final statement dead code.","fix":"Remove the unreachable trailing return FALSE statement, or restructure the if/else so control flow makes the final statement necessary.","locations":[{"ref":"gi/pygi-basictype.c:432-452","code":"  432 | gboolean\n  433 | pygi_gschar_from_py (PyObject *object, gint8 *result)\n  434 | {\n  435 |     if (PyUnicode_Check (object)) {\n  436 |         gunichar uni;\n  437 |         PyObject *temp;\n  438 |         gboolean status;\n  439 | \n  440 |         if (!pygi_gunichar_from_py (object, &uni)) return FALSE;\n  441 | \n  442 |         temp = pygi_guint32_to_py (uni);\n  443 |         status = pygi_gint8_from_py (temp, result);\n  444 |         Py_DECREF (temp);\n  445 |         return status;\n  446 |     } else {\n  447 |         /* pygi_gint8_from_py handles numbers and bytes */\n  448 |         return pygi_gint8_from_py (object, result);\n  449 |     }\n  450 | \n  451 |     return FALSE;\n  452 | }","lines":21}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"Several *_new_from_info constructor functions across the arg-cache files allocate their cache struct with g_slice_new0 and then check the result for NULL before proceeding. GLib's slice allocator aborts the process on allocation failure rather than returning NULL, so these NULL checks can never be true and are dead code that obscures the actual control flow.","fix":"Remove the dead `if (x == NULL) return NULL;` checks following g_slice_new0 calls, or if defending against future allocator changes is desired, document why with a comment instead of dead branches.","locations":[{"ref":"gi/pygi-cache-array.c:787-788","code":"  787 |     PyGIArgGArray *array_cache = g_slice_new0 (PyGIArgGArray);\n  788 |     if (array_cache == NULL) return NULL;","lines":2},{"ref":"gi/pygi-cache-closure.c:231-232","code":"  231 |     callback_cache = g_slice_new0 (PyGICallbackCache);\n  232 |     if (callback_cache == NULL) return NULL;","lines":2},{"ref":"gi/pygi-cache-hashtable.c:315-316","code":"  315 |     hc = g_slice_new0 (PyGIHashCache);\n  316 |     if (hc == NULL) return NULL;","lines":2},{"ref":"gi/pygi-cache-list.c:346-347","code":"  346 |     PyGIArgCache *arg_cache = (PyGIArgCache *)g_slice_new0 (PyGIArgGList);\n  347 |     if (arg_cache == NULL) return NULL;","lines":2},{"ref":"gi/pygi-cache-list.c:370-371","code":"  370 |     PyGIArgCache *arg_cache = (PyGIArgCache *)g_slice_new0 (PyGIArgGList);\n  371 |     if (arg_cache == NULL) return NULL;","lines":2}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The err: blocks in _pygi_marshal_from_py_glist and _pygi_marshal_from_py_gslist contain `/* FIXME: clean up list ... */` comments suggesting that already-processed item cleanup data is never cleaned up on failure. However, cleanup_data is wired to item_cleanups via pygi_marshal_cleanup_data_init_full before the loop runs, so the caller (pygi_marshal_cleanup_args_from_py) still invokes destroy_failed on item_cleanups after this function returns FALSE, which does clean up all previously-appended per-item cleanup data. The comment is misleading/stale about what is and isn't actually cleaned up (only the in-flight item at the point of failure, whose cleanup data was never appended to item_cleanups, is genuinely left unhandled).","fix":"Update or remove the FIXME comments to accurately describe that only the cleanup data for the item that failed mid-marshal (not yet appended to item_cleanups) is left unhandled; previously-processed items are already cleaned up by the outer invoke machinery.","locations":[{"ref":"gi/pygi-cache-list.c:86-91","code":"   86 | err:\n   87 |         /* FIXME: clean up list\n   88 |         if (sequence_cache->item_cache->from_py_cleanup != NULL) {\n   89 |             PyGIMarshalFromPyCleanupFunc cleanup = sequence_cache->item_cache->from_py_cleanup;\n   90 |         }\n   91 |         */","lines":6},{"ref":"gi/pygi-cache-list.c:168-173","code":"  168 | err:\n  169 |         /* FIXME: Clean up list\n  170 |         if (sequence_cache->item_cache->from_py_cleanup != NULL) {\n  171 |             PyGIMarshalFromPyCleanupFunc cleanup = sequence_cache->item_cache->from_py_cleanup;\n  172 |         }\n  173 |         */","lines":6}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":false,"description":"pyg_enum_add_full()/pyg_flags_add_full() allocate several PyObjects (enum_name/flags_name via PyUnicode_FromString, bases via PyTuple_New, method_name via PyUnicode_FromString) without checking any of them for NULL (allocation failure). PyTuple_SET_ITEM(bases, 0, ...) would dereference a NULL 'bases' on OOM, and a NULL enum_name/flags_name is stored into args[] and later unconditionally Py_DECREF'd on the values-creation failure path. This is only reachable under out-of-memory conditions, but it is a real latent NULL-deref/crash path rather than a graceful MemoryError propagation.","fix":"Check the return values of PyUnicode_FromString() and PyTuple_New() for NULL and bail out early (propagating the already-set MemoryError) before using them.","locations":[{"ref":"gi/pygenum.c:135-150","code":"  135 |     enum_name = PyUnicode_FromString (typename);\n  136 |     bases = PyTuple_New (1);\n  137 |     PyTuple_SET_ITEM (bases, 0, Py_NewRef (base_class));\n  138 | \n  139 |     args[0] = (PyObject *)Py_TYPE (base_class);\n  140 |     args[1] = enum_name;\n  141 |     args[2] = bases;\n  142 | \n  143 |     method_name = PyUnicode_FromString (\"__prepare__\");\n  144 |     values = PyObject_VectorcallMethod (\n  145 |         method_name, args, 3 + PY_VECTORCALL_ARGUMENTS_OFFSET, NULL);\n  146 |     Py_DECREF (method_name);\n  147 |     if (!values) {\n  148 |         Py_DECREF (enum_name);\n  149 |         Py_DECREF (bases);\n  150 |         return NULL;","lines":16},{"ref":"gi/pygflags.c:135-150","code":"  135 |     flags_name = PyUnicode_FromString (typename);\n  136 |     bases = PyTuple_New (1);\n  137 |     PyTuple_SET_ITEM (bases, 0, Py_NewRef (base_class));\n  138 | \n  139 |     args[0] = (PyObject *)Py_TYPE (base_class);\n  140 |     args[1] = flag
