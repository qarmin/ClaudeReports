.trim().replace(\"\\\\s+\".toRegex(), \" \")\n  202 |         val contacts = allContacts.filter {\n  203 |             it.name.contains(fixedText, true) || (text.toLongOrNull() != null && it.doesContainPhoneNumber(fixedText))\n  204 |         }.sortedByDescending {\n  205 |             it.name.startsWith(fixedText, true)\n  206 |         }.toMutableList() as ArrayList<Contact>","lines":7}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"MyViewPagerFragment.startNameWithSurnameChanged mutates the shared config.sorting only inside `(innerBinding.fragmentList?.adapter as? ContactsAdapter)?.apply { ... }`. If the adapter is not yet set (null) or not a ContactsAdapter, the user's sort preference change is silently dropped and refreshFragments() is never called, so the setting appears to have no effect until the screen is recreated.","fix":"Set config.sorting unconditionally (outside the adapter cast) and then refresh, rather than gating the persistence on the adapter being present.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/MyViewPagerFragment.kt:38-45","code":"   38 |     fun startNameWithSurnameChanged(startNameWithSurname: Boolean) {\n   39 |         if (this !is RecentsFragment) {\n   40 |             (innerBinding.fragmentList?.adapter as? ContactsAdapter)?.apply {\n   41 |                 config.sorting = if (startNameWithSurname) SORT_BY_SURNAME else SORT_BY_FIRST_NAME\n   42 |                 (this@MyViewPagerFragment.activity!! as MainActivity).refreshFragments()\n   43 |             }\n   44 |         }\n   45 |     }","lines":8}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"swap() unholds the held call but never holds the currently active call. With two calls (one active, one on hold), tapping swap unholds the held one while the previously-active call remains active, briefly producing two active calls rather than swapping. A true swap should hold the active call as it unholds the held one (the Telecom framework usually auto-holds, but relying on that is fragile and order-dependent).","fix":"Explicitly hold the active call before/while unholding the held one, or document that the framework auto-holds and verify behavior.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/CallManager.kt:177-181","code":"  177 |         fun swap() {\n  178 |             if (calls.size > 1) {\n  179 |                 calls.find { it.getStateCompat() == Call.STATE_HOLDING }?.unhold()\n  180 |             }\n  181 |         }","lines":5}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"getRecents reads CACHED_PHOTO_URI with cursor.getStringValue (non-OrNull) into photoUri at line 225, while every other string column (NUMBER, CACHED_NAME) uses getStringValueOrNull. Inconsistent handling; if the commons getStringValue throws or returns null for an absent column this differs from the surrounding defensive code. The trailing `?: \"\"` only helps if getStringValue itself returns null rather than throwing.","fix":"Use getStringValueOrNull(Calls.CACHED_PHOTO_URI) ?: \"\" for consistency and null-safety.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/RecentsHelper.kt:225","code":"  225 |                 var photoUri = cursor.getStringValue(Calls.CACHED_PHOTO_URI) ?: \"\"","lines":1}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"CallActionReceiver handles ACCEPT_CALL by starting CallActivity then calling CallManager.accept(), but does nothing to validate there is actually a ringing call, and performs no goAsync()/ordered handling. More importantly, for DECLINE_CALL it only calls CallManager.reject() and never cancels/updates the call notification, relying entirely on the InCallService state callback to clean up; if the service is not bound when the action arrives the notification can linger.","fix":"Guard the actions against a null/non-ringing primary call, and ensure notification cleanup happens for the decline path rather than assuming the InCallService callback will always run.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/receivers/CallActionReceiver.kt:12-21","code":"   12 |     override fun onReceive(context: Context, intent: Intent) {\n   13 |         when (intent.action) {\n   14 |             ACCEPT_CALL -> {\n   15 |                 context.startActivity(CallActivity.getStartIntent(context))\n   16 |                 CallManager.accept()\n   17 |             }\n   18 | \n   19 |             DECLINE_CALL -> CallManager.reject()\n   20 |         }\n   21 |     }","lines":10}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The Call.Callback registered in CallService calls callNotificationManager.setupNotification() (default priority) on every non-disconnected state change. Combined with the explicit setupNotification(lowPriority) in onCallAdded, the notification priority computed at call-add time (full-screen-intent for incoming/locked) is silently overwritten with the default the first time the call transitions state, potentially dropping the heads-up/full-screen behavior mid-call.","fix":"Recompute or remember the desired priority and pass it to setupNotification() in onStateChanged, or have CallNotificationManager preserve the previously chosen priority instead of resetting to default.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/services/CallService.kt:23-32","code":"   23 |     private val callListener = object : Call.Callback() {\n   24 |         override fun onStateChanged(call: Call, state: Int) {\n   25 |             super.onStateChanged(call, state)\n   26 |             if (state == Call.STATE_DISCONNECTED || state == Call.STATE_DISCONNECTING) {\n   27 |                 callNotificationManager.cancelNotification()\n   28 |             } else {\n   29 |                 callNotificationManager.setupNotification()\n   30 |             }\n   31 |         }\n   32 |     }","lines":10}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"MyViewPagerFragment.fontSizeChanged accesses the nullable `activity` (protected var activity: SimpleActivity? at line 24) via `activity.getTextSize()` without a null check on lines 55 and 60. If invoked before setupFragment(activity) has assigned activity (or after detach), this throws an NPE. The rest of the class guards activity with `?` or `!!`, making this inconsistent.","fix":"Use a safe call/early return, e.g. capture `val activity = activity ?: return` at the top of fontSizeChanged, or guard each access.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/MyViewPagerFragment.kt:54-62","code":"   54 |             (innerBinding.recentsList.adapter as? RecentCallsAdapter)?.apply {\n   55 |                 fontSize = activity.getTextSize()\n   56 |                 notifyDataSetChanged()\n   57 |             }\n   58 |         } else {\n   59 |             (innerBinding.fragmentList?.adapter as? ContactsAdapter)?.apply {\n   60 |                 fontSize = activity.getTextSize()\n   61 |                 notifyDataSetChanged()\n   62 |             }","lines":9}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"RecentsFragment.updateSearchResult force-unwraps searchQuery!! (line 103). searchQuery is nullable and set to null in onSearchClosed. While current call paths happen to guarantee non-null, this is a fragile invariant with no compiler enforcement; a future caller or a race (onSearchClosed running between a posted background task and its execution) would cause a NullPointerException on a background thread.","fix":"Capture the query into a local non-null val with a guard, e.g. `val query = searchQuery ?: return` at the start of updateSearchResult, and use that local.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/RecentsFragment.kt:101-103","code":"  101 |     private fun updateSearchResult() {\n  102 |         ensureBackgroundThread {\n  103 |             val fixedText = searchQuery!!.trim().replace(\"\\\\s+\".toRegex(), \" \")","lines":3}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"CallActivity.checkCalledSIMCard() wraps its entire body in catch (ignored: Exception) {} and addLockScreenFlags() swallows wake-lock exceptions silently. Silently ignoring all exceptions hides real failures (e.g. a RippleDrawable cast failure or SecurityException) and makes debugging SIM-label/lock-screen issues impossible.","fix":"Catch only the specific expected exceptions and at minimum log the swallowed throwable.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/CallActivity.kt:649-651","code":"  649 |         } catch (ignored: Exception) {\n  650 |         }\n  651 |     }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/phone/activities/CallActivity.kt:850-855","code":"  850 |         try {\n  851 |             val powerManager = getSystemService(Context.POWER_SERVICE) as PowerManager\n  852 |             screenOnWakeLock = powerManager.newWakeLock(PowerManager.FULL_WAKE_LOCK, \"org.fossify.phone:full_wake_lock\")\n  853 |             screenOnWakeLock!!.acquire(5 * 1000L)\n  854 |         } catch (e: Exception) {\n  855 |         }","lines":6}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Context.getAvailableSIMCardLabels swallows all exceptions with `catch (ignored: Exception) {}` and also dereferences phoneAccount.label / phoneAccount.address without null checks; getPhoneAccount can return null and label/address can be null, which would throw NPE mid-loop and abort enumeration of all remaining SIMs (the partial simAccounts list built so far is returned). Silent catch hides real telecom errors.","fix":"Null-check phoneAccount/getPhoneAccount results and guard label/address before toString(); avoid losing all SIMs when one entry is malformed. Log the exception instead of fully ignoring it.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/extensions/Context.kt:31-58","code":"   31 | @SuppressLint(\"MissingPermission\")\n   32 | fun Context.getAvailableSIMCardLabels(): List<SIMAccount> {\n   33 |     val simAccounts = mutableListOf<SIMAccount>()\n   34 |     try {\n   35 |         telecomManager.callCapablePhoneAccounts.forEachIndexed { index, account ->\n   36 |             val phoneAccount = telecomManager.getPhoneAccount(account)\n   37 |             var label = phoneAccount.label.toString()\n   38 |             var address = phoneAccount.address.toString()\n   39 |             if (address.startsWith(\"tel:\") && address.substringAfter(\"tel:\").isNotEmpty()) {\n   40 |                 address = Uri.decode(address.substringAfter(\"tel:\"))\n   41 |                 label += \" ($address)\"\n   42 |             }\n   43 | \n   44 |             simAccounts.add(\n   45 |                 SIMAccount(\n   46 |                     id = index + 1,\n   47 |                     handle = phoneAccount.accountHandle,\n   48 |                     label = label,\n   49 |                     phoneNumber = address.substringAfter(\"tel:\"),\n   50 |                     color = phoneAccount.highlightColor\n   51 |                 )\n   52 |             )\n   53 |         }\n   54 |     } catch (ignored: Exception) {\n   55 |     }\n   56 | \n   57 |     return simAccounts\n   58 | }","lines":28}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"getCallContactAvatar dereferences the loaded bitmap with bitmap!! before passing to getCircularBitmap. loadThumbnail can return null and MediaStore.getBitmap can return null; the !! would NPE, but it is inside the try that catches Exception and returns null, so a null bitmap is silently swallowed as 'no avatar'. NPE-as-control-flow is fragile and masks distinct failure causes.","fix":"Null-check the loaded bitmap explicitly (return null if null) instead of relying on !! being caught.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/CallContactAvatarHelper.kt:21-30","code":"   21 |                 bitmap = if (isQPlus()) {\n   22 |                     val tmbSize = context.resources.getDimension(R.dimen.list_avatar_size).toInt()\n   23 |                     contentResolver.loadThumbnail(photoUri, Size(tmbSize, tmbSize), null)\n   24 |                 } else {\n   25 |                     MediaStore.Images.Media.getBitmap(contentResolver, photoUri)\n   26 |                 }\n   27 |                 bitmap = getCircularBitmap(bitmap!!)\n   28 |             } catch (ignored: Exception) {\n   29 |                 return null\n   30 |             }","lines":10}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"getPhoneState's fallback for >2 calls returns NoCall when no conference call is found (calls.find { isConference() } ?: return NoCall). With 3+ non-conference simultaneous calls (rare but possible) this reports NoCall, which updateState turns into clearing the primary call and could dismiss the in-call UI while calls are still active.","fix":"Fall back to a sensible non-empty state (e.g. derive active/held from the call list) instead of NoCall when 3+ calls exist without a conference.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/CallManager.kt:76-95","code":"   76 |                 else -> {\n   77 |                     val conference = calls.find { it.isConference() } ?: return NoCall\n   78 |                     val secondCall = if (conference.children.size + 1 != calls.size) {\n   79 |                         calls.filter { !it.isConference() }\n   80 |                             .subtract(conference.children.toSet())\n   81 |                             .firstOrNull()\n   82 |                     } else {\n   83 |                         null\n   84 |                     }\n   85 |                     if (secondCall == null) {\n   86 |                         SingleCall(conference)\n   87 |                     } else {\n   88 |                         val newCallState = secondCall.getStateCompat()\n   89 |                         if (newCallState == Call.STATE_ACTIVE || newCallState == Call.STATE_CONNECTING || newCallState == Call.STATE_DIALING) {\n   90 |                             TwoCalls(secondCall, conference)\n   91 |                         } else {\n   92 |                             TwoCalls(conference, secondCall)\n   93 |                         }\n   94 |                     }\n   95 |                 }","lines":20}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In CallService.onCallAdded, when starting CallActivity throws, the catch falls back to callNotificationManager.setupNotification() with the default priority argument, ignoring the lowPriority flag that was already used at line 52. This can downgrade an incoming/locked-screen call notification from full-screen-intent priority to the default, so the user may miss the incoming call. The default-arg notification also duplicates the one already posted at line 52.","fix":"Pass the same priority on the fallback path, e.g. callNotificationManager.setupNotification(lowPriority = false) to force a visible/high-priority notification when the activity could not be shown; avoid re-posting if one was already set.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/services/CallService.kt:52-65","code":"   52 |         callNotificationManager.setupNotification(lowPriority)\n   53 |         if (\n   54 |             lowPriority\n   55 |             || !hasPermission(PERMISSION_POST_NOTIFICATIONS)\n   56 |             || !canUseFullScreenIntent()\n   57 |         ) {\n   58 |             try {\n   59 |                 startActivity(CallActivity.getStartIntent(this))\n   60 |             } catch (_: Exception) {\n   61 |                 // seems like startActivity can throw AndroidRuntimeException and\n   62 |                 // ActivityNotFoundException, not yet sure when and why, lets show a notification\n   63 |                 callNotificationManager.setupNotification()\n   64 |             }\n   65 |         }","lines":14}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"MainActivity.onResume() calls System.exit(0) whenever the visible-tabs setting changed while the app was backgrounded. Killing the process abruptly to 'reload' tabs is a hostile UX hack: it loses all activity/back stack state, flashes the launcher, and can drop an in-progress flow. The tab set can be rebuilt in-process via setupTabs()/refreshItems() instead.","fix":"Rebuild the tabs in place (call setupTabs() and refresh fragments / recreate()) instead of System.exit(0).","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/MainActivity.kt:111-115","code":"  111 |         if (storedShowTabs != config.showTabs) {\n  112 |             config.lastUsedViewPagerPage = 0\n  113 |             System.exit(0)\n  114 |             return\n  115 |         }","lines":5}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"RecentCallsAdapter casts activity to MainActivity in findContactByCall, but the adapter's declared type is SimpleActivity and it is also used in non-MainActivity contexts (e.g. the grouped-calls/show-call-details flow where refreshItemsListener is null). Any usage from an activity that is not MainActivity throws ClassCastException as soon as a row binds or cab_view_details is evaluated.","fix":"Guard with (activity as? MainActivity)?.cachedContacts and return null when not a MainActivity, or pass the contact list/lookup in via the constructor rather than reaching into a concrete activity.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/RecentCallsAdapter.kt:330-332","code":"  330 |     private fun findContactByCall(recentCall: RecentCall): Contact? {\n  331 |         return (activity as MainActivity).cachedContacts.find { it.name == recentCall.name && it.doesHavePhoneNumber(recentCall.phoneNumber) }\n  332 |     }","lines":3}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"getCircularBitmap allocates the output bitmap with bitmap.width for BOTH width and height, and computes radius from bitmap.width only. For any non-square source bitmap this either crops/clips the image incorrectly or distorts the circular mask. Contact photos are not guaranteed square. It is almost certainly a copy-paste typo of width where height was intended.","fix":"Use bitmap.height for the output height and base the radius/center on min(width,height), e.g. Bitmap.createBitmap(bitmap.width, bitmap.height, ARGB_8888) and draw the circle centered with radius = min(width,height)/2f.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/CallContactAvatarHelper.kt:36-40","code":"   36 |         val output = Bitmap.createBitmap(bitmap.width, bitmap.width, Bitmap.Config.ARGB_8888)\n   37 |         val canvas = Canvas(output)\n   38 |         val paint = Paint()\n   39 |         val rect = Rect(0, 0, bitmap.width, bitmap.height)\n   40 |         val radius = bitmap.width / 2.toFloat()","lines":5}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"DialerActivity.initOutgoingCall() builds the call extras Bundle then calls telecomManager.placeCall(callNumber, this) from inside the Bundle.apply block, but does so before checking that handle is non-null in a way that always calls finish() afterward; more importantly placeCall is annotated @SuppressLint(\"MissingPermission\") and the CALL_PHONE permission is never verified here - if the permission is missing placeCall throws SecurityException (caught generically). The blocked-number check does callNumber.toString().replace(\"tel:\", \"\") which leaves URL-encoded characters (e.g. %23 for #) un-decoded, so blocked numbers containing such chars may bypass the block.","fix":"Decode the Uri (Uri.decode / callNumber.schemeSpecificPart) before the blocked-number comparison, and verify CALL_PHONE is granted before placeCall.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/DialerActivity.kt:36-60","code":"   36 |     @SuppressLint(\"MissingPermission\")\n   37 |     private fun initOutgoingCall() {\n   38 |         try {\n   39 |             if (isNumberBlocked(callNumber.toString().replace(\"tel:\", \"\"), getBlockedNumbers())) {\n   40 |                 toast(R.string.calling_blocked_number)\n   41 |                 finish()\n   42 |                 return\n   43 |             }\n   44 | \n   45 |             getHandleToUse(intent, callNumber.toString()) { handle ->\n   46 |                 if (handle != null) {\n   47 |                     Bundle().apply {\n   48 |                         putParcelable(TelecomManager.EXTRA_PHONE_ACCOUNT_HANDLE, handle)\n   49 |                         putBoolean(TelecomManager.EXTRA_START_CALL_WITH_VIDEO_STATE, false)\n   50 |                         putBoolean(TelecomManager.EXTRA_START_CALL_WITH_SPEAKERPHONE, false)\n   51 |                         telecomManager.placeCall(callNumber, this)\n   52 |                     }\n   53 |                 }\n   54 |                 finish()\n   55 |             }\n   56 |         } catch (e: Exception) {\n   57 |             showErrorToast(e)\n   58 |             finish()\n   59 |         }\n   60 |     }","lines":25}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"FilterContactSourcesAdapter keys selection on ContactSource.hashCode(). Two contact sources with equal content (same name/type/etc.) collide, so toggling one toggles both and getSelectedContactSources returns both. Using a content hash as an identity key in a HashSet is unreliable.","fix":"Key selection on a stable unique identifier (or the source's position/name) rather than hashCode().","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/FilterContactSourcesAdapter.kt:20-44","code":"   20 |     private val selectedKeys = HashSet<Int>()\n   21 | \n   22 |     init {\n   23 |         contactSources.forEachIndexed { index, contactSource ->\n   24 |             if (displayContactSources.contains(contactSource.name)) {\n   25 |                 selectedKeys.add(contactSource.hashCode())\n   26 |             }\n   27 | \n   28 |             if (contactSource.type == SMT_PRIVATE && displayContactSources.contains(SMT_PRIVATE)) {\n   29 |                 selectedKeys.add(contactSource.hashCode())\n   30 |             }\n   31 |         }\n   32 |     }\n   33 | \n   34 |     private fun toggleItemSelection(select: Boolean, contactSource: ContactSource, position: Int) {\n   35 |         if (select) {\n   36 |             selectedKeys.add(contactSource.hashCode())\n   37 |         } else {\n   38 |             selectedKeys.remove(contactSource.hashCode())\n   39 |         }\n   40 | \n   41 |         notifyItemChanged(position)\n   42 |     }\n   43 | \n   44 |     fun getSelectedContactSources() = contactSources.filter { selectedKeys.contains(it.hashCode()) }","lines":25},{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/FilterContactSourcesAdapter.kt:60","code":"   60 |             val isSelected = selectedKeys.contains(contactSource.hashCode())","lines":1}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"SpeedDialAdapter uses SpeedDial.hashCode() as the stable selection key (getItemSelectionKey/getItemKeyPosition) and to match selected items in getSelectedItems/setupView. hashCode is not guaranteed unique: two SpeedDial entries with equal content collide, so selecting one selects/deletes both, and getItemKeyPosition returns the first match only.","fix":"Use the stable unique SpeedDial.id as the selection key instead of hashCode().","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/SpeedDialAdapter.kt:39-41","code":"   39 |     override fun getItemSelectionKey(position: Int) = speedDialValues.getOrNull(position)?.hashCode()\n   40 | \n   41 |     override fun getItemKeyPosition(key: Int) = speedDialValues.indexOfFirst { it.hashCode() == key }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/SpeedDialAdapter.kt:62","code":"   62 |     private fun getSelectedItems() = speedDialValues.filter { selectedKeys.contains(it.hashCode()) } as ArrayList<SpeedDial>","lines":1},{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/SpeedDialAdapter.kt:77","code":"   77 |                 isSelected = selectedKeys.contains(speedDial.hashCode())","lines":1}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"FavoritesFragment.columnCountChanged calls notifyItemRangeChanged(0, allContacts.size) on the adapter, but the adapter's item count may differ from allContacts.size when a search filter is active (the adapter then holds the filtered list). Passing an itemCount larger than the adapter's actual count can address positions that do not exist; relying on allContacts.size here is incorrect coupling between fragment state and adapter state.","fix":"Use the adapter's own item count (e.g. adapter.itemCount) or notifyItemRangeChanged(0, adapter?.itemCount ?: 0), or simply notifyDataSetChanged().","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/FavoritesFragment.kt:160-165","code":"  160 |     fun columnCountChanged() {\n  161 |         (binding.fragmentList.layoutManager as? MyGridLayoutManager)?.spanCount = context!!.config.contactsGridColumnCount\n  162 |         binding.fragmentList.adapter?.apply {\n  163 |             notifyItemRangeChanged(0, allContacts.size)\n  164 |         }\n  165 |     }","lines":6}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"CallManager.keypad uses `Handler()` (deprecated no-arg constructor). It implicitly binds to the Looper of the current thread; if called from a thread without a prepared Looper it throws \"Can't create handler inside thread that has not called Looper.prepare()\", and the stopDtmfTone callback runs on whatever thread happened to call keypad.","fix":"Use Handler(Looper.getMainLooper()) explicitly (as ToneGeneratorHelper already does).","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/CallManager.kt:204-209","code":"  204 |         fun keypad(char: Char) {\n  205 |             call?.playDtmfTone(char)\n  206 |             Handler().postDelayed({\n  207 |                 call?.stopDtmfTone()\n  208 |             }, DIALPAD_TONE_LENGTH_MS)\n  209 |         }","lines":6}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"ShowGroupedCallsDialog declares its constructor param as BaseSimpleActivity but immediately downcasts with `activity as SimpleActivity` when building the adapter. If any caller ever passes a BaseSimpleActivity that is not a SimpleActivity this throws ClassCastException. The only real caller already has a SimpleActivity, so the loose parameter type is misleading and an unsafe-cast hazard.","fix":"Type the constructor parameter as SimpleActivity directly and drop the `as SimpleActivity` cast.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/dialogs/ShowGroupedCallsDialog.kt:13-21","code":"   13 | class ShowGroupedCallsDialog(val activity: BaseSimpleActivity, recentCalls: List<RecentCall>) {\n   14 |     private var dialog: AlertDialog? = null\n   15 |     private val binding by activity.viewBinding(DialogShowGroupedCallsBinding::inflate)\n   16 | \n   17 |     init {\n   18 |         activity.runOnUiThread {\n   19 |             RecentCallsAdapter(\n   20 |                 activity = activity as SimpleActivity,\n   21 |                 recyclerView = binding.selectGroupedCallsList,","lines":9}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Context.config = Config.newInstance(applicationContext) is a `get()` property that creates/obtains a Config on every access. Several fragment hot paths read context.config or activity!!.config repeatedly (e.g. FavoritesFragment lines 116, 147, 161, 168, 185, 214). Combined with `context!!`/`activity!!` force-unwraps (FavoritesFragment lines 87, 161, 168), these can NPE if the view is detached, and repeatedly resolve config.","fix":"Cache config in a local where used repeatedly and avoid force-unwrapping context!!/activity!! in fragment methods that may run after detach; use safe calls with early return.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/extensions/Context.kt:20","code":"   20 | val Context.config: Config get() = Config.newInstance(applicationContext)","lines":1},{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/FavoritesFragment.kt:87","code":"   87 |             allContacts = if (activity!!.config.isCustomOrderSelected) {","lines":1}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"ToneGeneratorHelper never releases the ToneGenerator. ToneGenerator allocates a native AudioTrack and should be released via release() when no longer needed; the helper has no close/release method, so the native resource lives until GC finalization. Repeated creation (per dialpad session) can exhaust DTMF tone resources.","fix":"Add a release()/close() method that calls toneGenerator?.release() and invoke it from the owner's lifecycle (e.g. onDestroy).","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/ToneGeneratorHelper.kt:12-16","code":"   12 |     private val toneGenerator: ToneGenerator? = try {\n   13 |         ToneGenerator(DIAL_TONE_STREAM_TYPE, TONE_RELATIVE_VOLUME)\n   14 |     } catch (ignored: Exception) {\n   15 |         null\n   16 |     }","lines":5}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"onBindViewHolder for every recent-call row parses the phone number and runs an offline geocoder lookup (PhoneNumberOfflineGeocoder.getDescriptionForNumber) on the main thread, inside bind. The geocoder loads/searches prefix-mapping data; doing this synchronously on every bind (and rebind during scroll) causes jank and dropped frames on the call log.","fix":"Compute the geocoded location off the main thread (e.g. when building the RecentCall model or via a cached background lookup) and store it on the model, then just set the text in bind. At minimum cache results keyed by phone number to avoid repeated geocoding of recycled rows.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/RecentCallsAdapter.kt:545-570","code":"  545 |                 itemRecentsLocation.apply {\n  546 |                     val locale = Locale.getDefault()\n  547 |                     val defaultCountryCode = locale.country\n  548 |                     val phoneNumber = try {\n  549 |                         phoneNumberUtilInstance\n  550 |                             .parse(call.phoneNumber, defaultCountryCode)\n  551 |                     } catch (_: NumberParseException) {\n  552 |                         null\n  553 |                     }\n  554 | \n  555 | (function(){

// Data

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
