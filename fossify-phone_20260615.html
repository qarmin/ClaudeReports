<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"merge() dereferences the companion `call` with !! twice. If `call` is null (no primary call) merge() throws a NullPointerException. merge() is reachable from UI actions; the global call state can be cleared concurrently by onCallRemoved/updateState between the user tapping merge and this running.","fix":"Capture `val current = call ?: return` at the top and use the local; avoid !!.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/CallManager.kt:183-192","code":"  183 |         fun merge() {\n  184 |             val conferenceableCalls = call!!.conferenceableCalls\n  185 |             if (conferenceableCalls.isNotEmpty()) {\n  186 |                 call!!.conference(conferenceableCalls.first())\n  187 |             } else {\n  188 |                 if (call!!.hasCapability(Call.Details.CAPABILITY_MERGE_CONFERENCE)) {\n  189 |                     call!!.mergeConference()\n  190 |                 }\n  191 |             }\n  192 |         }","lines":10}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ManageSpeedDialActivity.updateAdapter()/removeSpeedDial() use speedDialValues.first { it.id == ... } which throws NoSuchElementException if no entry matches. clickedContact.id / dialId come from adapter items so normally present, but if speedDialValues was reloaded/reduced (or ids drift) this crashes. Likewise selectedContact.phoneNumbers.first() at line 91 throws if a selected contact somehow has no numbers.","fix":"Use firstOrNull { ... }?.apply { } and phoneNumbers.firstOrNull() with a guard.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/ManageSpeedDialActivity.kt:80-80","code":"   80 |                         speedDialValues.first { it.id == clickedContact.id }.apply {","lines":1},{"ref":"app/src/main/kotlin/org/fossify/phone/activities/ManageSpeedDialActivity.kt:89-92","code":"   89 |                     speedDialValues.first { it.id == clickedContact.id }.apply {\n   90 |                         displayName = selectedContact.getNameToDisplay()\n   91 |                         number = selectedContact.phoneNumbers.first().value\n   92 |                     }","lines":4},{"ref":"app/src/main/kotlin/org/fossify/phone/activities/ManageSpeedDialActivity.kt:104-104","code":"  104 |             speedDialValues.first { it.id == dialId }.apply {","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"setupRecyclerView casts arguments?.getParcelableArray(ITEMS) directly to Array<SimpleListItem>. Bundle.getParcelableArray returns a Parcelable[] whose runtime component type is Parcelable, not SimpleListItem, so after process death / fragment recreation this cast throws ClassCastException. If arguments is null or the key is missing it returns null and the non-null cast throws NPE. Additionally, onItemClick is stored only as a transient field (not in arguments), so after recreation the callback is silently lost. This dialog is used for the call-screen audio-route chooser, so a low-memory recreation can crash the call UI.","fix":"Read with a copy: val parcels = arguments?.getParcelableArray(ITEMS) ?: emptyArray(); val listItems = parcels.filterIsInstance<SimpleListItem>(). Guard against null. Consider that the dialog cannot restore its callback after recreation; dismiss on recreation when onItemClick is null, or persist enough state to rebuild it.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/dialogs/DynamicBottomSheetChooserDialog.kt:23-27","code":"   23 |     private fun setupRecyclerView() {\n   24 |         @Suppress(\"UNCHECKED_CAST\")\n   25 |         val listItems = arguments?.getParcelableArray(ITEMS) as Array<SimpleListItem>\n   26 |         getRecyclerViewAdapter().submitList(listItems.toList())\n   27 |     }","lines":5},{"ref":"app/src/main/kotlin/org/fossify/phone/dialogs/DynamicBottomSheetChooserDialog.kt:14-15","code":"   14 | \n   15 |     var onItemClick: ((SimpleListItem) -> Unit)? = null","lines":2}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In getRecentCalls, when previousRecents is non-empty it builds previousRecentCalls via flatMap { it.groupedCalls ?: listOf(it) }. If a RecentCall has a non-null but EMPTY groupedCalls list, flatMap contributes nothing; if every entry is such, previousRecentCalls is empty and previousRecentCalls.first()/.last() throw NoSuchElementException. The isNotEmpty() guard is on previousRecents, not on the flattened result.","fix":"Guard on previousRecentCalls.isNotEmpty() (or use firstOrNull/lastOrNull and fall back to a full getRecents(contacts)) before calling .first()/.last().","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/RecentsHelper.kt:47-64","code":"   47 |                 val recentCalls = if (previousRecents.isNotEmpty()) {\n   48 |                     val previousRecentCalls = previousRecents\n   49 |                         .flatMap { it.groupedCalls ?: listOf(it) }\n   50 |                         .map { it.copy(groupedCalls = null) }\n   51 | \n   52 |                     val newerRecents = getRecents(\n   53 |                         contacts = contacts,\n   54 |                         selection = \"${Calls.DATE} > ?\",\n   55 |                         selectionParams = arrayOf(\"${previousRecentCalls.first().startTS}\")\n   56 |                     )\n   57 | \n   58 |                     val olderRecents = getRecents(\n   59 |                         contacts = contacts,\n   60 |                         selection = \"${Calls.DATE} < ?\",\n   61 |                         selectionParams = arrayOf(\"${previousRecentCalls.last().startTS}\")\n   62 |                     )\n   63 | \n   64 |                     newerRecents + previousRecentCalls + olderRecents","lines":18}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"number.normalizePhoneNumber() result is dereferenced with !! (normalizedNumber!!). If normalizePhoneNumber returns null for an unusual NUMBER value this throws NPE during call-log processing on a background thread, aborting the whole getRecents pass.","fix":"Use a safe local: val normalizedNumber = number.normalizePhoneNumber() ?: continue/return, or guard with null-check instead of !!.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/RecentsHelper.kt:202-203","code":"  202 |                         val normalizedNumber = number.normalizePhoneNumber()\n  203 |                         if (normalizedNumber!!.length >= COMPARABLE_PHONE_NUMBER_LENGTH) {","lines":2}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"CallActivity acquires screenOnWakeLock (FULL_WAKE_LOCK) and proximityWakeLock but onDestroy only releases screenOnWakeLock and the proximity sensor. The proximityWakeLock is released via disableProximitySensor() in onDestroy, but screenOnWakeLock.acquire(5s) plus the proximity wake lock acquired for 60 minutes means if the activity is killed without going through endCall, a wake lock can be held. More concretely, enableProximitySensor acquires for 60*MINUTE*1000ms; if the call object/state path skips disableProximitySensor the sensor wake lock stays held long after the call ends.","fix":"Release proximityWakeLock and screenOnWakeLock unconditionally in onDestroy (call disableProximitySensor() there, which it does) and verify every call-end path goes through disableProximitySensor; consider a much shorter proximity acquire timeout.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/CallActivity.kt:101-109","code":"  101 |     override fun onDestroy() {\n  102 |         super.onDestroy()\n  103 |         CallManager.removeListener(callCallback)\n  104 |         disableProximitySensor()\n  105 | \n  106 |         if (screenOnWakeLock?.isHeld == true) {\n  107 |             screenOnWakeLock!!.release()\n  108 |         }\n  109 |     }","lines":9},{"ref":"app/src/main/kotlin/org/fossify/phone/activities/CallActivity.kt:858-870","code":"  858 |     private fun enableProximitySensor() {\n  859 |         if (!config.disableProximitySensor && (proximityWakeLock == null || proximityWakeLock?.isHeld == false)) {\n  860 |             val powerManager = getSystemService(Context.POWER_SERVICE) as PowerManager\n  861 |             proximityWakeLock = powerManager.newWakeLock(PowerManager.PROXIMITY_SCREEN_OFF_WAKE_LOCK, \"org.fossify.phone:wake_lock\")\n  862 |             proximityWakeLock!!.acquire(60 * MINUTE_SECONDS * 1000L)\n  863 |         }\n  864 |     }\n  865 | \n  866 |     private fun disableProximitySensor() {\n  867 |         if (proximityWakeLock?.isHeld == true) {\n  868 |             proximityWakeLock!!.release()\n  869 |         }\n  870 |     }","lines":13}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"MainActivity uses bare Handler() (no Looper) and posts delayed work (2000ms in onResume, 100ms in initFragments). These anonymous-Runnable posts capture the Activity and are never removed in onPause/onDestroy, so a delayed callback can fire after the activity is gone (the 2s recents refresh is especially likely to outlive a quick screen) leaking the activity and touching dead views. Bare Handler() is also deprecated.","fix":"Use Handler(Looper.getMainLooper()) stored as a field and removeCallbacks in onPause/onDestroy, or use a lifecycle-aware coroutine (lifecycleScope.launch + delay) so the work is cancelled with the lifecycle.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/MainActivity.kt:148-150","code":"  148 |         Handler().postDelayed({\n  149 |             getRecentsFragment()?.refreshItems()\n  150 |         }, 2000)","lines":3},{"ref":"app/src/main/kotlin/org/fossify/phone/activities/MainActivity.kt:389-399","code":"  389 |             Handler().postDelayed({\n  390 |                 var wantedTab = getDefaultTab()\n  391 | \n  392 |                 // open the Recents tab if we got here by clicking a missed call notification\n  393 |                 if (intent.action == Intent.ACTION_VIEW && config.showTabs and TAB_CALL_HISTORY > 0) {\n  394 |                     wantedTab = binding.mainTabsHolder.tabCount - 1\n  395 |                 }\n  396 | \n  397 |                 binding.mainTabsHolder.getTabAt(wantedTab)?.select()\n  398 |                 refreshMenuItems()\n  399 |             }, 100L)","lines":11}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"RecentsFragment instantiates RecentsHelper(context) as a field initializer (line 43) using the view's Context (an Activity). Combined with `recentsAdapter` holding the activity, the fragment-View retains activity references. More importantly, background callbacks (getRecentCalls/prepareCallLog) capture `this` and touch `binding`/`activity` after completion; if the view is detached during the async load these run against a stale activity. The activity? null-checks mitigate crashes but the captured Activity Context in RecentsHelper can outlive the activity.","fix":"Construct RecentsHelper with applicationContext, or recreate it lazily per call, to avoid retaining the Activity context in a long-lived helper.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/RecentsFragment.kt:43","code":"   43 |     private var recentsHelper = RecentsHelper(context)","lines":1}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"onCallAdded registers a new Call.Callback on each added call but the callback is never unregistered when the call is removed (onCallRemoved only does calls.remove + updateState). The anonymous callback holds an implicit reference and keeps firing/leaking until the Call object is fully GC'd by the framework; repeated calls accumulate registered callbacks.","fix":"Keep a reference to each registered Call.Callback (e.g. a map keyed by Call) and call call.unregisterCallback(cb) in onCallRemoved.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/CallManager.kt:30-48","code":"   30 |             call.registerCallback(object : Call.Callback() {\n   31 |                 override fun onStateChanged(call: Call, state: Int) {\n   32 |                     updateState()\n   33 |                 }\n   34 | \n   35 |                 override fun onDetailsChanged(call: Call, details: Call.Details) {\n   36 |                     updateState()\n   37 |                 }\n   38 | \n   39 |                 override fun onConferenceableCallsChanged(call: Call, conferenceableCalls: MutableList<Call>) {\n   40 |                     updateState()\n   41 |                 }\n   42 |             })\n   43 |         }\n   44 | \n   45 |         fun onCallRemoved(call: Call) {\n   46 |             calls.remove(call)\n   47 |             updateState()\n   48 |         }","lines":19}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"getMyContactsCursor returns a Cursor (privateCursor) that is passed to MyContactsContentProvider.getContacts but is never closed in either RecentsHelper.getRecentCalls or CallContactHelper.getCallContact. Each invocation leaks a Cursor; getRecentCalls runs on every refresh of the recents tab. Also in getRecentCalls the cursor is fetched on the caller's thread before ensureBackgroundThread, and if the READ_CALL_LOG permission check fails the cursor is fetched then abandoned without use.","fix":"Wrap privateCursor usage in use{}/try-finally and close it, or fetch it only after the permission check; ensure MyContactsContentProvider.getContacts is given the cursor inside a close-managed scope.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/RecentsHelper.kt:33-41","code":"   33 |         val privateCursor = context.getMyContactsCursor(favoritesOnly = false, withPhoneNumbersOnly = true)\n   34 |         if (!context.hasPermission(PERMISSION_READ_CALL_LOG)) {\n   35 |             callback(ArrayList())\n   36 |             return\n   37 |         }\n   38 | \n   39 |         ContactsHelper(context).getContacts(getAll = true, showOnlyContactsWithNumbers = true) { contacts ->\n   40 |             ensureBackgroundThread {\n   41 |                 val privateContacts = MyContactsContentProvider.getContacts(context, privateCursor)","lines":9},{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/CallContactHelper.kt:23-41","code":"   23 |     val privateCursor = context.getMyContactsCursor(favoritesOnly = false, withPhoneNumbersOnly = true)\n   24 |     ensureBackgroundThread {\n   25 |         val callContact = CallContact(\"\", \"\", \"\", \"\")\n   26 |         val handle = try {\n   27 |             call?.details?.handle?.toString()\n   28 |         } catch (e: NullPointerException) {\n   29 |             null\n   30 |         }\n   31 | \n   32 |         if (handle == null) {\n   33 |             callback(callContact)\n   34 |             return@ensureBackgroundThread\n   35 |         }\n   36 | \n   37 |         val uri = Uri.decode(handle)\n   38 |         if (uri.startsWith(\"tel:\")) {\n   39 |             val number = uri.substringAfter(\"tel:\")\n   40 |             ContactsHelper(context).getContacts(getAll = true, showOnlyContactsWithNumbers = true) { contacts ->\n   41 |                 val privateContacts = MyContactsContentProvider.getContacts(context, privateCursor)","lines":19}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"CallActivity.endCall() is invoked both for the user pressing decline/hangup AND from updateCallState() when the call reaches STATE_DISCONNECTED. endCall() unconditionally calls CallManager.reject() even for an already-disconnected remote hangup. Calling reject() on a call that the other party ended is at best a no-op but can also reject a *different* primary call if the call list changed between the disconnect callback and this handler.","fix":"Separate the 'user hung up' action from the 'call disconnected' UI handler; on STATE_DISCONNECTED only run the teardown/finish logic and do not call CallManager.reject().","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/CallActivity.kt:653-661","code":"  653 |     private fun updateCallState(call: Call) {\n  654 |         val state = call.getStateCompat()\n  655 |         when (state) {\n  656 |             Call.STATE_RINGING -> callRinging()\n  657 |             Call.STATE_ACTIVE -> callStarted()\n  658 |             Call.STATE_DISCONNECTED -> endCall()\n  659 |             Call.STATE_CONNECTING, Call.STATE_DIALING -> initOutgoingCallUI()\n  660 |             Call.STATE_SELECT_PHONE_ACCOUNT -> showPhoneAccountPicker()\n  661 |         }","lines":9},{"ref":"app/src/main/kotlin/org/fossify/phone/activities/CallActivity.kt:760-790","code":"  760 |     private fun endCall() {\n  761 |         CallManager.reject()\n  762 |         disableProximitySensor()\n  763 |         audioRouteChooserDialog?.dismissAllowingStateLoss()\n  764 | \n  765 |         if (isCallEnded) {\n  766 |             safeFinishAndRemoveTask()\n  767 |             return\n  768 |         }\n  769 | \n  770 |         try {\n  771 |             audioManager.mode = AudioManager.MODE_NORMAL\n  772 |         } catch (ignored: Exception) {\n  773 |         }\n  774 | \n  775 |         isCallEnded = true\n  776 |         runOnUiThread {\n  777 |             if (callDuration > 0) {\n  778 |                 disableAllActionButtons()\n  779 |                 @SuppressLint(\"SetTextI18n\")\n  780 |                 binding.callStatusLabel.text = \"${callDuration.getFormattedDuration()} (${getString(R.string.call_ended)})\"\n  781 |                 Handler(mainLooper).postDelayed(3000) {\n  782 |                     safeFinishAndRemoveTask()\n  783 |                 }\n  784 |             } else {\n  785 |                 disableAllActionButtons()\n  786 |                 binding.callStatusLabel.text = getString(R.string.call_ended)\n  787 |                 finish()\n  788 |             }\n  789 |         }\n  790 |     }","lines":31}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"ConferenceCallsAdapter captures the bind-time `position` inside the split/disconnect click listeners and uses it for data.removeAt(position)/notifyItemRemoved(position). After any removal the remaining rows are not rebound, so a later click fires with a stale captured position, removing the wrong call or throwing IndexOutOfBoundsException. Also `if (data.size == 1) activity.finish()` finishes when one call remains, which is off-by-one if the intent is to finish when no conference members remain.","fix":"Use holder.adapterPosition (bindingAdapterPosition) inside the click listeners and bail out on NO_POSITION; re-evaluate the size threshold that triggers activity.finish().","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/ConferenceCallsAdapter.kt:71-97","code":"   71 |                 itemConferenceCallSplit.setOnClickListener {\n   72 |                     call.splitFromConference()\n   73 |                     data.removeAt(position)\n   74 |                     notifyItemRemoved(position)\n   75 |                     if (data.size == 1) {\n   76 |                         activity.finish()\n   77 |                     }\n   78 |                 }\n   79 | \n   80 |                 itemConferenceCallSplit.setOnLongClickListener {\n   81 |                     if (!it.contentDescription.isNullOrEmpty()) {\n   82 |                         root.context.toast(it.contentDescription.toString())\n   83 |                     }\n   84 |                     true\n   85 |                 }\n   86 | \n   87 |                 itemConferenceCallEnd.isEnabled = canDisconnect\n   88 |                 itemConferenceCallEnd.alpha = if (canDisconnect) 1.0f else LOWER_ALPHA\n   89 |                 itemConferenceCallEnd.setColorFilter(textColor)\n   90 |                 itemConferenceCallEnd.setOnClickListener {\n   91 |                     call.disconnect()\n   92 |                     data.removeAt(position)\n   93 |                     notifyItemRemoved(position)\n   94 |                     if (data.size == 1) {\n   95 |                         activity.finish()\n   96 |                     }\n   97 |                 }","lines":27}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In FavoritesFragment.refreshItems, the private/My-Contacts favorites are fetched, merged into allContacts and sorted (lines 75-84), but then allContacts is unconditionally overwritten on line 87-91 with a list derived purely from `favorites` (which itself is computed from the non-private `contacts` on line 85). All the private-contact merge work is discarded, and private favorites (starred contacts from the My Contacts provider) never appear in the Favorites tab.","fix":"Compute favorites from the merged allContacts (after adding private contacts), e.g. `val favorites = allContacts.filter { it.starred == 1 }`, then apply the custom-order sort. Do not recompute from the original `contacts` parameter.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/FavoritesFragment.kt:71-91","code":"   71 |     override fun refreshItems(invalidate: Boolean, callback: (() -> Unit)?) {\n   72 |         ContactsHelper(context).getContacts(showOnlyContactsWithNumbers = true) { contacts ->\n   73 |             allContacts = contacts\n   74 | \n   75 |             if (SMT_PRIVATE !in context.baseConfig.ignoredContactSources) {\n   76 |                 val privateCursor = context?.getMyContactsCursor(favoritesOnly = true, withPhoneNumbersOnly = true)\n   77 |                 val privateContacts = MyContactsContentProvider.getContacts(context, privateCursor).map {\n   78 |                     it.copy(starred = 1)\n   79 |                 }\n   80 |                 if (privateContacts.isNotEmpty()) {\n   81 |                     allContacts.addAll(privateContacts)\n   82 |                     allContacts.sort()\n   83 |                 }\n   84 |             }\n   85 |             val favorites = contacts.filter { it.starred == 1 } as ArrayList<Contact>\n   86 | \n   87 |             allContacts = if (activity!!.config.isCustomOrderSelected) {\n   88 |                 sortByCustomOrder(favorites)\n   89 |             } else {\n   90 |                 favorites\n   91 |             }","lines":21}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"getCallContact only invokes the callback when the decoded handle URI starts with \"tel:\". If the call handle uses any other scheme (e.g. \"sip:\", \"voicemail:\", or a custom/empty scheme), the callback is never called, so the caller (e.g. CallNotificationManager.setupNotification, CallActivity) waits forever and no notification/UI is built. Unknown-number and SIP calls silently produce no contact callback.","fix":"Add an else branch after the `if (uri.startsWith(\"tel:\"))` block that invokes callback(callContact) with the bare/decoded handle as the number, so every code path eventually calls back.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/helpers/CallContactHelper.kt:38-78","code":"   38 |         if (uri.startsWith(\"tel:\")) {\n   39 |             val number = uri.substringAfter(\"tel:\")\n   40 |             ContactsHelper(context).getContacts(getAll = true, showOnlyContactsWithNumbers = true) { contacts ->\n   41 |                 val privateContacts = MyContactsContentProvider.getContacts(context, privateCursor)\n   42 |                 if (privateContacts.isNotEmpty()) {\n   43 |                     contacts.addAll(privateContacts)\n   44 |                 }\n   45 | \n   46 |                 val contactsWithMultipleNumbers = contacts.filter { it.phoneNumbers.size > 1 }\n   47 |                 val numbersToContactIDMap = HashMap<String, Int>()\n   48 |                 contactsWithMultipleNumbers.forEach { contact ->\n   49 |                     contact.phoneNumbers.forEach { phoneNumber ->\n   50 |                         numbersToContactIDMap[phoneNumber.value] = contact.contactId\n   51 |                         numbersToContactIDMap[phoneNumber.normalizedNumber] = contact.contactId\n   52 |                     }\n   53 |                 }\n   54 | \n   55 |                 callContact.number = if (context.config.formatPhoneNumbers) {\n   56 |                     number.formatPhoneNumber()\n   57 |                 } else {\n   58 |                     number\n   59 |                 }\n   60 | \n   61 |                 val contact = contacts.firstOrNull { it.doesHavePhoneNumber(number) }\n   62 |                 if (contact != null) {\n   63 |                     callContact.name = contact.getNameToDisplay()\n   64 |                     callContact.photoUri = contact.photoUri\n   65 | \n   66 |                     if (contact.phoneNumbers.size > 1) {\n   67 |                         val specificPhoneNumber = contact.phoneNumbers.firstOrNull { it.value == number }\n   68 |                         if (specificPhoneNumber != null) {\n   69 |                             callContact.numberLabel = context.getPhoneNumberTypeText(specificPhoneNumber.type, specificPhoneNumber.label)\n   70 |                         }\n   71 |                     }\n   72 |                 } else {\n   73 |                     callContact.name = callContact.number\n   74 |                 }\n   75 | \n   76 |                 callback(callContact)\n   77 |             }\n   78 |         }","lines":41}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"CallActivity.changeCallAudioRoute() computes a new route from a *local shadowed* val (val isSpeakerOn = !isSpeakerOn) and never updates the member field isSpeakerOn. It relies entirely on the onAudioStateChanged callback to later set the field. If the callback is delayed or not delivered, a second tap reads the stale field and toggles to the same route, so toggling speaker can appear stuck. The shadowing also makes the code confusing.","fix":"Rename the local (e.g. newSpeakerOn) and/or drive the toggle off CallManager.getCallAudioRoute() rather than the possibly-stale field, to make the intended next state unambiguous.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/CallActivity.kt:435-444","code":"  435 |     private fun changeCallAudioRoute() {\n  436 |         val supportAudioRoutes = CallManager.getSupportedAudioRoutes()\n  437 |         if (supportAudioRoutes.contains(AudioRoute.BLUETOOTH)) {\n  438 |             createOrUpdateAudioRouteChooser(supportAudioRoutes)\n  439 |         } else {\n  440 |             val isSpeakerOn = !isSpeakerOn\n  441 |             val newRoute = if (isSpeakerOn) CallAudioState.ROUTE_SPEAKER else CallAudioState.ROUTE_WIRED_OR_EARPIECE\n  442 |             CallManager.setAudioRoute(newRoute)\n  443 |         }\n  444 |     }","lines":10}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"DialpadActivity hideDialpadNumbers branch sets dialpad0Holder.visibility = View.INVISIBLE while keeping dialpadPlusHolder visible. The '+' is normally produced by long-pressing '0'; with '0' merely INVISIBLE (still occupying space) but its touch listener active under an invisible view, and the '+' key shown separately, the layout/interaction is inconsistent - an INVISIBLE view still receives no clicks, so long-press-for-plus is silently lost when numbers are hidden, with no alternative wired up beyond the separate plus key.","fix":"Clarify intended behavior: if numbers are hidden, ensure the standalone plus key is the input path and that the invisible 0 holder does not capture touches; add a comment explaining why 0 is INVISIBLE rather than GONE.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/DialpadActivity.kt:109-122","code":"  109 |         binding.dialpadWrapper.apply {\n  110 |             if (config.hideDialpadNumbers) {\n  111 |                 dialpad1Holder.isVisible = false\n  112 |                 dialpad2Holder.isVisible = false\n  113 |                 dialpad3Holder.isVisible = false\n  114 |                 dialpad4Holder.isVisible = false\n  115 |                 dialpad5Holder.isVisible = false\n  116 |                 dialpad6Holder.isVisible = false\n  117 |                 dialpad7Holder.isVisible = false\n  118 |                 dialpad8Holder.isVisible = false\n  119 |                 dialpad9Holder.isVisible = false\n  120 |                 dialpadPlusHolder.isVisible = true\n  121 |                 dialpad0Holder.visibility = View.INVISIBLE\n  122 |             }","lines":14}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ManageSpeedDialActivity persists speedDialValues only in onStop() via config.speedDial = Gson().toJson(...). If the process is killed while the activity is merely paused (not stopped) or onStop is skipped, edits are lost. Also it serializes with Gson here but DialpadActivity/config.getSpeedDialValues read them elsewhere - mixing persistence points makes the save fragile.","fix":"Persist immediately after each edit (in removeSpeedDial and the dialog callbacks) rather than only in onStop.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/ManageSpeedDialActivity.kt:59-62","code":"   59 |     override fun onStop() {\n   60 |         super.onStop()\n   61 |         config.speedDial = Gson().toJson(speedDialValues)\n   62 |     }","lines":4}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ConferenceCallsAdapter.onBindViewHolder calls getCallContact asynchronously and sets the name/image inside root.post {}. The callback does not verify the holder still represents `call` (no adapterPosition / tag check), so on a recycled row a slow lookup for an old call can overwrite a newer row's name and photo.","fix":"Tag the view with the current call and verify it matches before applying the async result, or cancel/ignore stale callbacks on recycle.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/ConferenceCallsAdapter.kt:50-64","code":"   50 |             ItemConferenceCallBinding.bind(itemView).apply {\n   51 |                 getCallContact(itemView.context, call) { callContact ->\n   52 |                     root.post {\n   53 |                         itemConferenceCallName.text = callContact.name.ifEmpty { itemView.context.getString(R.string.unknown_caller) }\n   54 |                         itemConferenceCallName.setTextColor(textColor)\n   55 |                         val contactDrawable = activity.getDrawable(R.drawable.ic_person_vector)\n   56 |                         contactDrawable?.applyColorFilter(textColor)\n   57 |                         SimpleContactsHelper(activity).loadContactImage(\n   58 |                             callContact.photoUri,\n   59 |                             itemConferenceCallImage,\n   60 |                             callContact.name,\n   61 |                             contactDrawable\n   62 |                         )\n   63 |                     }\n   64 |                 }","lines":15}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ContactsAdapter.updateItems decides whether the list changed by comparing newItems.hashCode() != contacts.hashCode(). List hashCode is content-based, so two different-identity lists with equal content are treated as 'no change' and the new instance is dropped; conversely it gives no per-item diffing (full notifyDataSetChanged). It is also fragile: any Contact whose equals/hashCode ignores a displayed field (e.g. photoUri) will fail to refresh.","fix":"Compare list equality directly (newItems == contacts) for clarity, or better, migrate to ListAdapter/DiffUtil so changed rows update without notifyDataSetChanged.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/ContactsAdapter.kt:226-237","code":"  226 |     @SuppressLint(\"NotifyDataSetChanged\")\n  227 |     fun updateItems(newItems: List<Contact>, highlightText: String = \"\") {\n  228 |         if (newItems.hashCode() != contacts.hashCode()) {\n  229 |             contacts = ArrayList(newItems)\n  230 |             textToHighlight = highlightText\n  231 |             notifyDataSetChanged()\n  232 |             finishActMode()\n  233 |         } else if (textToHighlight != highlightText) {\n  234 |             textToHighlight = highlightText\n  235 |             notifyDataSetChanged()\n  236 |         }\n  237 |     }","lines":12}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ViewPagerAdapter.getFragment rebuilds the visible-fragments list and, when position is out of range, returns fragments.last() instead of failing. Combined with getCount() (which counts tabs via tabsList.filter) this can silently map a position to the wrong/last fragment if the two computations ever disagree, masking bugs rather than surfacing them.","fix":"Build the enabled-fragment list once and derive both getCount() and getFragment() from it; treat an out-of-range position as a programming error rather than returning last().","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/ViewPagerAdapter.kt:33-53","code":"   33 |     override fun getCount() = tabsList.filter { it and activity.config.showTabs != 0 }.size\n   34 | \n   35 |     override fun isViewFromObject(view: View, item: Any) = view == item\n   36 | \n   37 |     private fun getFragment(position: Int): Int {\n   38 |         val showTabs = activity.config.showTabs\n   39 |         val fragments = arrayListOf<Int>()\n   40 |         if (showTabs and TAB_CONTACTS > 0) {\n   41 |             fragments.add(R.layout.fragment_contacts)\n   42 |         }\n   43 | \n   44 |         if (showTabs and TAB_FAVORITES > 0) {\n   45 |             fragments.add(R.layout.fragment_favorites)\n   46 |         }\n   47 | \n   48 |         if (showTabs and TAB_CALL_HISTORY > 0) {\n   49 |             fragments.add(R.layout.fragment_recents)\n   50 |         }\n   51 | \n   52 |         return if (position < fragments.size) fragments[position] else fragments.last()\n   53 |     }","lines":21}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"confirmContactSources compares the visible contact sources to the freshly-built ignored contact sources to decide whether anything changed. These are two semantically opposite sets (visible vs ignored), and on top of that getVisibleContactSources() returns an ArrayList<String> while ignoredContactSources is a HashSet<String>; a List never equals a Set, so '!=' is effectively always true. The guard is meaningless: config.ignoredContactSources is overwritten and callback() fires on every confirm even when the user changed nothing.","fix":"Compare against the previous ignored set, not the visible set, using a type that supports equality: e.g. capture val oldIgnored = activity.config.ignoredContactSources before computing, and do `if (oldIgnored != ignoredContactSources) { ... }`. Ensure both sides are the same collection type (Set).","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/dialogs/FilterContactSourcesDialog.kt:78-89","code":"   78 |     private fun confirmContactSources() {\n   79 |         val selectedContactSources = (binding.filterContactSourcesList.adapter as FilterContactSourcesAdapter).getSelectedContactSources()\n   80 |         val ignoredContactSources = contactSources.filter { !selectedContactSources.contains(it) }.map {\n   81 |             if (it.type == SMT_PRIVATE) SMT_PRIVATE else it.getFullIdentifier()\n   82 |         }.toHashSet()\n   83 | \n   84 |         if (activity.getVisibleContactSources() != ignoredContactSources) {\n   85 |             activity.config.ignoredContactSources = ignoredContactSources\n   86 |             callback()\n   87 |         }\n   88 |         dialog?.dismiss()\n   89 |     }","lines":12}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ContactsFragment.refreshItems merges private contacts into allContacts (lines 91-99) and calls cacheContacts(), but then passes the original `contacts` (NOT allContacts) to gotContacts on line 103. Therefore the displayed list excludes private contacts even though allContacts (used for search via onSearchClosed/onSearchQueryChanged) includes them. The initial list and the search-restored list are inconsistent.","fix":"Pass allContacts to gotContacts (and to the adapter) so private contacts appear in the displayed list, consistent with the search code paths.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/ContactsFragment.kt:90-103","code":"   90 |         ContactsHelper(context).getContacts(showOnlyContactsWithNumbers = true) { contacts ->\n   91 |             allContacts = contacts\n   92 | \n   93 |             if (SMT_PRIVATE !in context.baseConfig.ignoredContactSources) {\n   94 |                 val privateContacts = MyContactsContentProvider.getContacts(context, privateCursor)\n   95 |                 if (privateContacts.isNotEmpty()) {\n   96 |                     allContacts.addAll(privateContacts)\n   97 |                     allContacts.sort()\n   98 |                 }\n   99 |             }\n  100 |             (activity as MainActivity).cacheContacts()\n  101 | \n  102 |             activity?.runOnUiThread {\n  103 |                 gotContacts(contacts)","lines":14}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ContactsFragment.requestReadContactsPermission re-fetches contacts via ContactsHelper but skips the private-contact merge and does NOT update allContacts; it calls gotContacts(contacts) directly. After granting permission, the list shows only non-private contacts and the field allContacts remains the old/empty value, so a subsequent search shows stale results. It also does not call cacheContacts(), unlike refreshItems.","fix":"After granting permission, call refreshItems() (the full path that merges private contacts, updates allContacts and caches) instead of a bespoke partial getContacts call.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/ContactsFragment.kt:185-197","code":"  185 |     private fun requestReadContactsPermission() {\n  186 |         activity?.handlePermission(PERMISSION_READ_CONTACTS) {\n  187 |             if (it) {\n  188 |                 binding.fragmentPlaceholder.text = context.getString(R.string.no_contacts_found)\n  189 |                 binding.fragmentPlaceholder2.text = context.getString(R.string.create_new_contact)\n  190 |                 ContactsHelper(context).getContacts(showOnlyContactsWithNumbers = true) { contacts ->\n  191 |                     activity?.runOnUiThread {\n  192 |                         gotContacts(contacts)\n  193 |                     }\n  194 |                 }\n  195 |             }\n  196 |         }\n  197 |     }","lines":13}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"RecentsFragment.refreshItems triggers a two-phase load (loadAll=false then loadAll=true) but ignores the `invalidate` flag's intent: after setting allRecentCalls = emptyList() on invalidate, getRecentCalls still uses `allRecentCalls.filterIsInstance<RecentCall>()` as existingRecentCalls, which is now empty so that is fine; however the second nested refreshCallLog(loadAll = true) does not propagate the original `callback`, so the caller's callback (passed to refreshItems) is invoked after only the partial (limited) load completes, not after the full load. Callers expecting completion of the full refresh may act on stale/partial data.","fix":"Thread the `callback` parameter through to the final loadAll=true refreshCallLog call, and invoke it only after the full load completes.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/fragments/RecentsFragment.kt:77-87","code":"   77 |     override fun refreshItems(invalidate: Boolean, callback: (() -> Unit)?) {\n   78 |         if (invalidate) {\n   79 |             allRecentCalls = emptyList()\n   80 |         }\n   81 | \n   82 |         refreshCallLog(loadAll = false) {\n   83 |             binding.recentsList.runAfterAnimations {\n   84 |                 refreshCallLog(loadAll = true)\n   85 |             }\n   86 |         }\n   87 |     }","lines":11}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"RecentsFragment.updateNamesIfEmpty matches a contact by `it.phoneNumbers.first().normalizedNumber == call.phoneNumber` (line 263), only ever comparing the contact's FIRST phone number. A contact with the dialed number as a secondary number will not be matched, so its name is not resolved even though the contact exists. The private-contact branch correctly uses doesContainPhoneNumber across all numbers.","fix":"Match against any phone number, e.g. `contactsWithNumbers.firstOrNull { it.doesHavePhoneNumber(call.phoneNumber) }` (or check all phoneNumbers), instead of only rs = context.getBlockedNumbers()\n  282 | \n  283 |         return recentCalls\n  284 |             .filter { !context.isNumberBlocked(it.phoneNumber, blockedNumbers) }\n  285 |     }","lines":8}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"CallActivity.showDialpad() animates each view-under-dialpad with two separate animate() chains on the same view (one scaling X, one scaling Y), each with its own withEndAction { beGone() }. Issuing two animate() calls on one View can cause the second to cancel/replace the first depending on the platform's ViewPropertyAnimator coalescing, making the scaleX/alpha animation unreliable. hideDialpad() has the same double-animate pattern.","fix":"Use a single animate() chain per view applying scaleX, scaleY and alpha together with one withEndAction.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/activities/CallActivity.kt:542-547","code":"  542 |         viewsUnderDialpad.forEach { (view, _) ->\n  543 |             view.run {\n  544 |                 animate().scaleX(0f).alpha(0f).withEndAction { beGone() }.duration = 250L\n  545 |                 animate().scaleY(0f).alpha(0f).withEndAction { beGone() }.duration = 250L\n  546 |             }\n  547 |         }","lines":6},{"ref":"app/src/main/kotlin/org/fossify/phone/activities/CallActivity.kt:559-564","code":"  559 |         viewsUnderDialpad.forEach { (view, alpha) ->\n  560 |             view.run {\n  561 |                 animate().withStartAction { beVisible() }.setInterpolator(OvershootInterpolator()).scaleX(1f).alpha(alpha).duration = 250L\n  562 |                 animate().withStartAction { beVisible() }.setInterpolator(OvershootInterpolator()).scaleY(1f).alpha(alpha).duration = 250L\n  563 |             }\n  564 |         }","lines":6}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"DialpadActivity secret-code handling: dialpadValueCh ectedItems()\n  297 |         val positions = getSelectedItemPositions()\n  298 |         contacts.removeAll(contactsToRemove)\n  299 |         val idsToRemove = contactsToRemove.map { it.rawId }.toMutableList() as ArrayList<Int>\n  300 | \n  301 |         SimpleContactsHelper(activity).deleteContactRawIDs(idsToRemove) {\n  302 |             activity.runOnUiThread {\n  303 |                 if (contacts.isEmpty()) {\n  304 |                     refreshItemsListener?.refreshItems()\n  305 |                     finishActMode()\n  306 |                 } else {\n  307 |                     removeSelectedItems(positions)\n  308 |                 }\n  309 |             }\n  310 |         }\n  311 |     }","lines":21}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In RecentCallsAdapter the popup-menu cab_block_number and cab_remove handlers add callId to selectedKeys then launch async confirmation dialogs (tryBlocking/askConfirmRemove) without the executeItemMenuOperation wrapper. If the user cancels/dismisses the dialog, the key is never removed (the success paths clear it via finishActMode, but cancellation has no handler), leaving a stale selection that affects later getSelectedItems()/CAB operations.","fix":"Clear selectedKeys when the block/remove confirmation dialog is cancelled or dismissed.","locations":[{"ref":"app/src/main/kotlin/org/fossify/phone/adapters/RecentCallsAdapter.kt:431-439","code":"  431 |                     R.id.cab_block_number -> {\n  432 |                         selectedKeys.add(callId)\n  433 |                         tryBlocking()\n  434 |                     }\n  435 | \n  436 |                     R.id.cab_remove -> {\n  437 |                         selectedKeys.add(callId)\n  438 |                         askConfirmRemove()\n  439 |                     }","lines":9}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description
