<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`parse_conjunct` recurses into itself directly for `/` (Join) and via `parse_conjunct` for `+` (Concatenation) and `++` (ListConcatenation) without any depth guard. The `RECURSION_LIMIT` check only exists in `parse_expression_with_condition`, so `a/b/c/d/.../` or `a+b+c+...` with enough operands exhausts the Rust call stack. Verified by running `just` against a justfile `x := a/a/a/...` with 50 000 operands - it crashes with stack overflow. Similarly `parse_disjunct` recurses into itself for `&&` without a depth check (and is only reachable through `parse_expression_with_condition` which already incremented the depth by 1, but `parse_disjunct` -> `parse_conjunct` can recurse indefinitely within that single `parse_expression_with_condition` call).","fix":"Extend the `self.recursion_depth` increment/decrement guard (or introduce a separate counter) to cover `parse_conjunct` and `parse_disjunct` recursive calls, consistent with the existing guard in `parse_expression_with_condition`.","locations":[{"ref":"src/parser.rs:780-807","code":"  780 |   fn parse_conjunct(&mut self) -> CompileResult<'src, Expression<'src>> {\n  781 |     if self.next_is_keyword(Keyword::If) {\n  782 |       self.parse_conditional()\n  783 |     } else if let Some(operator) = self.accept(Slash)? {\n  784 |       let lhs = None;\n  785 |       let rhs = self.parse_conjunct()?.into();\n  786 |       Ok(Expression::Join { lhs, operator, rhs })\n  787 |     } else {\n  788 |       let value = self.parse_value()?;\n  789 | \n  790 |       if let Some(operator) = self.accept(Slash)? {\n  791 |         let lhs = Some(Box::new(value));\n  792 |         let rhs = self.parse_conjunct()?.into();\n  793 |         Ok(Expression::Join { lhs, operator, rhs })\n  794 |       } else if let Some(operator) = self.accept(PlusPlus)? {\n  795 |         self.list_feature(ListFeature::ListConcatenationOperator, operator);\n  796 |         let lhs = value.into();\n  797 |         let rhs = self.parse_conjunct()?.into();\n  798 |         Ok(Expression::ListConcatenation { lhs, operator, rhs })\n  799 |       } else if let Some(operator) = self.accept(Plus)? {\n  800 |         let lhs = value.into();\n  801 |         let rhs = self.parse_conjunct()?.into();\n  802 |         Ok(Expression::Concatenation { lhs, operator, rhs })\n  803 |       } else {\n  804 |         Ok(value)\n  805 |       }\n  806 |     }\n  807 |   }","lines":28},{"ref":"src/parser.rs:737-750","code":"  737 |   fn parse_disjunct(&mut self, condition: bool) -> CompileResult<'src, Expression<'src>> {\n  738 |     let conjunct = self.parse_comparison(condition)?;\n  739 | \n  740 |     let expression = if let Some(token) = self.accept(AmpersandAmpersand)? {\n  741 |       self.list_feature(ListFeature::LogicalOperator, token);\n  742 |       let lhs = conjunct.into();\n  743 |       let rhs = self.parse_disjunct(false)?.into();\n  744 |       Expression::And { lhs, rhs }\n  745 |     } else {\n  746 |       conjunct\n  747 |     };\n  748 | \n  749 |     Ok(expression)\n  750 |   }","lines":14}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`parse_value` recurses into itself directly for the `!` (Not/Bang) operator without going through the `parse_expression_with_condition` path that guards against `RECURSION_LIMIT`. An input like `x := !!!!!...` with tens of thousands of consecutive `!` characters causes unbounded Rust call-stack recursion, producing a stack overflow crash (`fatal runtime error: stack overflow, aborting`) instead of a graceful compile error. Verified by running `just` against a generated justfile containing 200 000 `!` operators - it segfaults. The `RECURSION_LIMIT` constant (256 / 48) exists specifically to prevent such crashes, but it is only checked in `parse_expression_with_condition`, leaving all `parse_value`-only recursion unprotected.","fix":"Add a recursion-depth check at the top of `parse_value` (increment and check `self.recursion_depth` before recursing into `parse_value` for `Bang`, and decrement it on return), or convert the loop to iterative using an explicit depth counter, the same way `parse_expression_with_condition` does it.","locations":[{"ref":"src/parser.rs:914-919","code":"  914 |   fn parse_value(&mut self) -> CompileResult<'src, Expression<'src>> {\n  915 |     if let Some(token) = self.accept(Bang)? {\n  916 |       self.list_feature(ListFeature::NegationOperator, token);\n  917 |       Ok(Expression::Not {\n  918 |         operand: self.parse_value()?.into(),\n  919 |       })","lines":6}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `subcommand.rs`, the `format` function computes `root = search.justfile.parent().unwrap()` (the justfile's containing directory) and passes it as the `root` argument to `loader.load`. Inside `loader.load`, the code does `path.strip_prefix(root.parent().unwrap())`, which takes the parent of the already-parent-stripped path. When the justfile sits at the top-most non-root directory (i.e., `/subdir/justfile`), this double-`.parent()` resolves correctly; however when `search.justfile` is literally `/justfile` (justfile at filesystem root), `root` = `/` and `root.parent()` = `None`, causing a panic. In the normal (non-root) case it produces an incorrect relative path: for example, with `search.justfile = /home/user/project/justfile`, `root.parent()` = `/home/user`, so `strip_prefix` yields `project/justfile` instead of the correct `justfile`. This is confirmed experimentally: running `just --fmt` with a syntax error in the justfile displays `sub/justfile:1:4` instead of `justfile:1:4`. All other callers (`compiler.rs`, `completer.rs`, `subcommand.rs` for non-format subcommands) pass `root = &search.justfile` (the full file path), which correctly strips the parent directory. The `format` function alone applies an extra `.parent()` before passing to `loader.load`.","fix":"Change line 389 of `subcommand.rs` to pass `&search.justfile` as `root` instead of `search.justfile.parent().unwrap()`, consistent with all other callers of `loader.load`. The line should read: `let (path, src) = loader.load(config, &search.justfile, &search.justfile)?;`","locations":[{"ref":"src/subcommand.rs:388-391","code":"  388 |   fn format<'src>(config: &Config, loader: &'src Loader, search: &Search) -> RunResult<'src> {\n  389 |     let root = search.justfile.parent().unwrap();\n  390 | \n  391 |     let (path, src) = loader.load(config, root, &search.justfile)?;","lines":4},{"ref":"src/loader.rs:29","code":"   29 |     let relative = path.strip_prefix(root.parent().unwrap()).unwrap_or(path);","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In `function.rs`, `module_directory` calls `context.execution_context.module.source.parent().unwrap()` (line 519) and both `source_directory` (line 664) and `source_file` (line 684) call `search.justfile.parent().unwrap()`. On virtually all real-world inputs these are safe because justfile paths are always absolute paths with at least one non-root component. However they are unconditional `unwrap()` calls on user-influenced data: if `source` or `search.justfile` were ever set to the filesystem root `/` or to an empty path (e.g. by a crafted or buggy search result), the function panics instead of returning an error. `source_directory` has a second `unwrap()` at line 667 on `.join(context.name.token.path).parent()` which would also panic if the token path somehow resolves to the root.","fix":"Replace each `.unwrap()` with `.ok_or_else(|| format!(\"...\"))?` to return a descriptive error string instead of panicking, consistent with how the rest of `function.rs` handles error cases.","locations":[{"ref":"src/function.rs:519","code":"  519 |   let module_directory = context.execution_context.module.source.parent().unwrap();","lines":1},{"ref":"src/function.rs:664-665","code":"  664 |     .parent()\n  665 |     .unwrap()","lines":2},{"ref":"src/function.rs:667-668","code":"  667 |     .parent()\n  668 |     .unwrap()","lines":2},{"ref":"src/function.rs:684-685","code":"  684 |     .parent()\n  685 |     .unwrap()","lines":2}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`Token::fmt` (the `ColorDisplay` impl in `token.rs`, line 29) calls `self.src.lines().nth(self.line).unwrap()`. For an empty source string (`src == \"\"`), `lines().count()` is 0, so `self.lines` in the lexer is 0 and the advancement guard `line + 1 < self.lines` is never true, keeping `line` at 0. Any token from an empty file (including the `Eof` token) has `line: 0`, but `\"\".lines().nth(0)` returns `None`, so `.unwrap()` panics. In practice this is not triggered because empty-file errors (\"justfile contains no recipes\") currently do not format a source span, but any future error that references a token from an empty file will panic.","fix":"Replace `.unwrap()` with `.unwrap_or(\"\")` or handle the `None` case explicitly to avoid a panic when `src` is empty or `self.line` exceeds the actual line count.","locations":[{"ref":"src/token.rs:29","code":"   29 |     let line = self.src.lines().nth(self.line).unwrap();","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`resolve_dependency` in `RecipeResolver` builds the wrong circular-dependency chain when the cycle does not include the bottom of the resolution stack. On detecting that `name` is already on `stack`, the code unconditionally takes `stack[0]` (the very first recipe pushed during this whole resolution run) and pushes it as the closing element of the reported cycle, then filters the stack with `skip_while(|name| **name != dependency.recipe.last().lexeme())`. The closing element should be the repeated name itself (`name`), not `stack[0]`. For `a: b\nb: c\nc: b` the actual cycle is `b -> c -> b`, but `just` reports `recipe c has circular dependency b -> c -> a`, citing recipe `a`, which is not even part of the cycle, and the chain never returns to its starting point. Verified by building from source and running `just --justfile test.just --list` on `a: b\nb: c\nc: b` (also reproduced with a 4-recipe chain `a:b,b:c,c:d,d:c`). This produces a misleading error message for any user debugging a circular dependency that does not happen to start at the first recipe resolved.","fix":"Push `name` (the element already present in `stack` that closes the cycle) instead of `stack[0]`, e.g.:\n  stack.push(name);\n  Err(dependency.recipe.last().error(CircularRecipeDependency {\n    recipe: recipe.name(),\n    circle: stack.iter().skip_while(|s| **s != name).copied().collect(),\n  }))\nThis correctly starts the reported circle at the first occurrence of the repeated recipe and closes it by repeating that same recipe, matching the pattern already used correctly in `AssignmentResolver::resolve_variable` (src/assignment_resolver.rs:88-97), which pushes the repeated `name` itself.","locations":[{"ref":"src/recipe_resolver.rs:120-133","code":"  120 |     } else if stack.contains(&name) {\n  121 |       // recipe depends on itself\n  122 |       let first = stack[0];\n  123 |       stack.push(first);\n  124 |       Err(\n  125 |         dependency.recipe.last().error(CircularRecipeDependency {\n  126 |           recipe: recipe.name(),\n  127 |           circle: stack\n  128 |             .iter()\n  129 |             .skip_while(|name| **name != dependency.recipe.last().lexeme())\n  130 |             .copied()\n  131 |             .collect(),\n  132 |         }),\n  133 |       )","lines":14}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`join_list(value, sep)` delegates to Rust's `[String]::join()`, which returns an empty string `\"\"` when the input slice is empty. `Value::from(\"\")` wraps that in a single-element vec `[\"\"]​`, producing a non-empty, truthy `Value` instead of the empty `Value::new()` that a caller would expect from joining an empty list. As a result, `join_list([])` and `join_list([], sep)` return `[\"\"]` (truthy, length 1) rather than `[]` (falsy, length 0). Any downstream code that tests the result with `&&`, `||`, or an `if` condition, or passes it to `bool()`, will observe the wrong answer. The `split`/`join_list` round-trip also breaks: `join_list(split(\"\"), sep)` -> `join_list([], sep)` -> `[\"\"]`, not `[]`.","fix":"Add an early return for the empty case: `if value.is_empty() { return Ok(Value::new()); }` before the `join` call.","locations":[{"ref":"src/function.rs:447-449","code":"  447 | fn join_list(_context: Context, value: &Value, separator: Option<&str>) -> ValueResult {\n  448 |   Ok(value.elements().join(separator.unwrap_or(\" \")).into())\n  449 | }","lines":3}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`public_groups` in Justfile only collects groups from (a) direct `self.recipes` and (b) module-level `set groups := [...]` declarations in immediate submodules via `submodule.groups()`. It does NOT collect groups that are annotated on recipes inside those submodules with `[group('name')]`. As a result, `just --groups` produces an incomplete list whenever modules contain recipes with group annotations; those group names are silently absent from the output. The `list` subcommand calls `public_groups` recursively per module and is also affected at each nesting level for the same reason - a module's own recipe-group annotations ARE collected, but its submodules' recipe-group annotations are not included in that module's `public_groups` return value.","fix":"Add a third loop inside `public_groups` that walks `self.public_modules(config)` recursively and collects groups from each submodule's `public_recipes`. Alternatively, change the first loop to `self.public_recipes_recursive(config)` instead of `self.recipes.values()` to include all descendant recipe groups. Care must be taken to preserve the correct sort key (offset) for unsorted mode.","locations":[{"ref":"src/justfile.rs:681-709","code":"  681 |   pub(crate) fn public_groups(&self, config: &Config) -> Vec<String> {\n  682 |     let mut groups = Vec::new();\n  683 | \n  684 |     for recipe in self.recipes.values() {\n  685 |       if recipe.is_public() {\n  686 |         for group in recipe.groups() {\n  687 |           groups.push((recipe.import_offsets.as_slice(), recipe.name.offset, group));\n  688 |         }\n  689 |       }\n  690 |     }\n  691 | \n  692 |     for submodule in self.public_modules(config) {\n  693 |       for group in submodule.groups() {\n  694 |         groups.push((&[], submodule.name.unwrap().offset, group.to_string()));\n  695 |       }\n  696 |     }\n  697 | \n  698 |     if config.unsorted {\n  699 |       groups.sort();\n  700 |     } else {\n  701 |       groups.sort_by(|(_, _, a), (_, _, b)| a.cmp(b));\n  702 |     }\n  703 | \n  704 |     let mut seen = HashSet::new();\n  705 | \n  706 |     groups.retain(|(_, _, group)| seen.insert(group.clone()));\n  707 | \n  708 |     groups.into_iter().map(|(_, _, group)| group).collect()\n  709 |   }","lines":29}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`body_whitespace` in `lex_line_start` is always an empty string due to a broken iterator chain. The expression `.take(N).map(|(i, _c)| i).next()` ignores N (as long as N >= 1) and always returns the index of the very first `char_indices()` element, which is always 0. So `&whitespace[..0]` is always `\"\"` regardless of the current indentation depth. This makes `body_spaces`, `body_tabs`, and `body_whitespace` always false/empty, rendering two branches in the indentation classification dead: (1) the `Mixed { whitespace: body_whitespace }` branch for recipe bodies (line 370-373) can never be reached because `body_spaces && body_tabs` is always false; (2) the `Inconsistent` branch guarded by `body_whitespace.len() >= self.indentation().len()` (line 378-382) is always false since `body_whitespace.len()` is 0. The intent was to check only the first N characters of the line's leading whitespace (where N is the indentation depth) for mixed tabs/spaces or inconsistency, using `.nth(N)` or similar to find the byte boundary of the Nth character. In practice some cases that should produce `MixedLeadingWhitespace` inside a recipe body instead fall through to `Inconsistent` checks on the full `whitespace` string, producing a different (wrong) error kind and message. The correct fix is to use `char_indices().nth(self.indentation().chars().count()).map_or(whitespace.len(), |(i, _)| i)` to get the byte index after the Nth char.","fix":"Replace the `body_whitespace` slice expression with: `&whitespace[..whitespace.char_indices().nth(self.indentation().chars().count()).map_or(whitespace.len(), |(i, _)| i)]`. The `.take(N).map(...).next()` pattern is logically equivalent to just `.next()` because `.next()` only consumes the first iterator element regardless of the `.take(N)` limit.","locations":[{"ref":"src/lexer.rs:348-353","code":"  348 |     let body_whitespace = &whitespace[..whitespace\n  349 |       .char_indices()\n  350 |       .take(self.indentation().chars().count())\n  351 |       .map(|(i, _c)| i)\n  352 |       .next()\n  353 |       .unwrap_or(0)];","lines":6}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In run_script, the condition that controls whether evaluated script lines are printed to stderr is `config.verbosity.loud() && (config.dry_run || self.quiet)`. This means that applying the `@` prefix (quiet flag) to a shebang/script recipe TRIGGERS source echoing rather than suppressing it, which is the exact opposite of what `@` does in shell (line-by-line) recipes, where it suppresses per-line echoing. The test in tests/misc.rs at `quiet_shebang_recipe` asserts this behavior explicitly (`@quiet:` with a shebang body emits all script lines to stderr), confirming the code does what the test expects, but the semantics are directly contrary to the documented meaning of `@` (suppress output). A user who writes `@deploy:` expecting silence gets ALL script source dumped to stderr on every run.","fix":"Change the condition to `config.verbosity.loud() && config.dry_run` to make `@` on script recipes suppress output (consistent with shell recipes). If printing the script on dry-run is desired, keep the dry_run arm. The `|| self.quiet` arm should be removed - it makes `@` produce MORE output, not less. Then update the `quiet_shebang_recipe` test in tests/misc.rs to expect no stderr output when `@` is used.","locations":[{"ref":"src/recipe.rs:478-489","code":"  478 |     if config.verbosity.loud() && (config.dry_run || self.quiet) {\n  479 |       for line in &evaluated_lines {\n  480 |         eprintln!(\n  481 |           \"{}\",\n  482 |           config\n  483 |             .color\n  484 |             .command(config.command_color)\n  485 |             .stderr()\n  486 |             .paint(line)\n  487 |         );\n  488 |       }\n  489 |     }","lines":12}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"When `--group <NAME>` is combined with `--list-submodules`, the group filter is correctly applied at the top level but is silently dropped when recursing into submodules. The recursive call at subcommand.rs:801 passes `&[]` (empty groups) to `list_module` instead of the original `groups` slice, so every recipe inside a shown submodule is printed regardless of whether it belongs to the requested group. For example, if `mod bar` is tagged `[group('foo')]` and contains both a `[group('foo')]` recipe `c` and an ungrouped recipe `d`, then `just --list --group foo --list-submodules` prints `d` even though the user explicitly requested only group `foo` recipes.","fix":"Pass `groups` instead of `&[]` to the recursive `list_module` call so that the group filter is applied consistently throughout the module tree: `Self::list_module(config, depth + 1, groups, submodule)?;`","locations":[{"ref":"src/subcommand.rs:801","code":"  801 |             Self::list_module(config, depth + 1, &[], submodule)?;","lines":1}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `generate-book/src/main.rs`, the `links` BTreeMap maps heading slugs (computed from heading text) to their target HTML anchor or page. This map is built by iterating over ALL chapters and ALL headings globally, without namespacing the slug key by chapter. If two headings in different chapters (or within the same chapter) produce the same slug (e.g., two sections both titled 'Examples'), the later insertion silently overwrites the earlier one. Any `#anchor` internal link that referenced the first heading would then be silently rewritten to point to the second heading's page/anchor instead. The link rewriting loop at lines 160-170 uses `&links[anchor]` (panics if anchor slug not found in map) but this panic path is guarded by the prior `links.insert` which always stores every heading - so no panic, just wrong links.","fix":"Namespace slug keys by chapter index or filename, e.g., `format!(\"{}/{}\", chapter.filename(), slug)`, and generate links accordingly. Alternatively, detect slug collisions and emit an error.","locations":[{"ref":"crates/generate-book/src/main.rs:126-157","code":"  126 |     let mut links = BTreeMap::new();\n  127 | \n  128 |     for chapter in &chapters {\n  129 |       let mut current = None;\n  130 |       for event in &chapter.events {\n  131 |         match event {\n  132 |           Event::Start(Tag::Heading(..)) => current = Some(Vec::new()),\n  133 |           Event::End(Tag::Heading(level, ..)) => {\n  134 |             let events = current.unwrap();\n  135 |             let title = events\n  136 |               .iter()\n  137 |               .filter_map(|event| match event {\n  138 |                 Event::Code(content) | Event::Text(content) => Some(content.deref()),\n  139 |                 _ => None,\n  140 |               })\n  141 |               .collect::<String>();\n  142 |             let slug = slug(&title);\n  143 |             let link = if let HeadingLevel::H1 | HeadingLevel::H2 | HeadingLevel::H3 = level {\n  144 |               format!(\"{}.html\", chapter.filename())\n  145 |             } else {\n  146 |               format!(\"{}.html#{}\", chapter.filename(), slug)\n  147 |             };\n  148 |             links.insert(slug, link);\n  149 |             current = None;\n  150 |           }\n  151 |           _ => {\n  152 |             if let Some(events) = &mut current {\n  153 |               events.push(event.clone());\n  154 |             }\n  155 |           }\n  156 |         }\n  157 |       }","lines":32},{"ref":"crates/generate-book/src/main.rs:160-170","code":"  160 |     for chapter in &mut chapters {\n  161 |       for event in &mut chapter.events {\n  162 |         if let Event::Start(Tag::Link(_, dest, _)) | Event::End(Tag::Link(_, dest, _)) = event {\n  163 |           if let Some(anchor) = dest.clone().strip_prefix('#') {\n  164 |             if anchor != \"just\" {\n  165 |               *dest = CowStr::Borrowed(&links[anchor]);\n  166 |             }\n  167 |           }\n  168 |         }\n  169 |       }\n  170 |     }","lines":11}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The `ConfigError::SubcommandArguments` display format (config_error.rs:24-32) lowercases the `subcommand` field with `subcommand.to_lowercase()`, so error messages for `--changelog`, `--dump`, `--edit`, etc., print `--changelog`, `--dump`, `--edit` which is correct. However, for `--fmt` the stored subcommand name is `\"FORMAT\"` (from the `Subcommand::Format` strum `SCREAMING_SNAKE_CASE` serialisation), so the error reads `` `--format` used with unexpected argument `bar` `` rather than `--fmt`. A user who typed `--fmt bar` will see `--format` in the error, which is the alias name rather than the flag they used, and may be confusing (though technically both are valid spellings due to the `alias` attribute on that flag).","fix":"Either store the actual flag string used (`fmt` vs `format`) alongside the subcommand name when constructing `SubcommandArguments`, or document that the canonical alias is shown in error messages.","locations":[{"ref":"src/config_error.rs:24-32","code":"   24 |     \"`--{}` used with unexpected {}: {}\",\n   25 |     subcommand.to_lowercase(),\n   26 |     Count::unnumbered(\"argument\", arguments.len()),\n   27 |     List::and_ticked(arguments)\n   28 |   ))]\n   29 |   SubcommandArguments {\n   30 |     subcommand: &'static str,\n   31 |     arguments: Vec<String>,\n   32 |   },","lines":9},{"ref":"src/subcommand.rs:14-57","code":"   14 | #[derive(PartialEq, Clone, Debug, IntoStaticStr)]\n   15 | #[strum(serialize_all = \"SCREAMING_SNAKE_CASE\")]\n   16 | pub(crate) enum Subcommand {\n   17 |   Changelog,\n   18 |   Choose {\n   19 |     chooser: Option<PathBuf>,\n   20 |   },\n   21 |   Command {\n   22 |     arguments: Vec<OsString>,\n   23 |     binary: OsString,\n   24 |   },\n   25 |   Completions {\n   26 |     shell: Shell,\n   27 |   },\n   28 |   Dump {\n   29 |     format: DumpFormat,\n   30 |   },\n   31 |   Edit,\n   32 |   Evaluate {\n   33 |     format: EvaluateFormat,\n   34 |     path: Modulepath,\n   35 |   },\n   36 |   Format,\n   37 |   Groups,\n   38 |   Init,\n   39 |   List {\n   40 |     path: Modulepath,\n   41 |   },\n   42 |   Man,\n   43 |   Request {\n   44 |     request: Request,\n   45 |   },\n   46 |   Run {\n   47 |     arguments: Vec<String>,\n   48 |   },\n   49 |   Show {\n   50 |     path: Modulepath,\n   51 |   },\n   52 |   Summary,\n   53 |   Usage {\n   54 |     path: Modulepath,\n   55 |   },\n   56 |   Variables,\n   57 | }","lines":44}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `evaluate_defined_function` (evaluator.rs:286), `self.context.as_ref().unwrap()` panics if `self.context` is `None`. Similarly, the `context!()` macro in `evaluate_builtin_function` (evaluator.rs:326-328) calls `.unwrap()` on `self.function_context(name)` which returns `Err` when `self.context` is `None`. In practice these panics are unreachable because `evaluate_value`'s `Expression::Call` arm (evaluator.rs:487) checks `self.context` with `?` before dispatching to either function - so `None` context is caught and converted to `Error::Const` before reaching the unwraps. However, the unwraps are load-bearing invariant assertions that are not enforced by the type system; if a future refactor adds a new call site that bypasses the `Expression::Call` gate (e.g., an optimized fast path), the panics become reachable with no compile-time warning. The `self.context` field being `Option` while both callee functions assume `Some` is a latent unsafety.","fix":"Propagate the error instead of unwrapping: change the unwrap at line 286 to `?` (adjusting the return type or error conversion), and change the `context!()` macro to return `Err(...)` instead of panicking. Alternatively, restructure so `evaluate_defined_function` and `evaluate_builtin_function` receive a pre-validated `&ExecutionContext` argument rather than reading it from `self`.","locations":[{"ref":"src/evaluator.rs:286","code":"  286 |     let context = *self.context.as_ref().unwrap();","lines":1},{"ref":"src/evaluator.rs:325-328","code":"  325 |     macro_rules! context {\n  326 |       () => {\n  327 |         self.function_context(name).unwrap()\n  328 |       };","lines":4},{"ref":"src/evaluator.rs:486-494","code":"  486 |       Expression::Call { name, arguments } => {\n  487 |         let module = self.context(ConstError::FunctionCall(*name))?.module;\n  488 |         if let Some(function) = module.functions.get(name.lexeme()) {\n  489 |           self.evaluate_defined_function(function, arguments)\n  490 |         } else if let Some(builtin) = function::get(name.lexeme()) {\n  491 |           self.evaluate_builtin_function(*name, builtin, arguments)\n  492 |         } else {\n  493 |           unreachable!();\n  494 |         }","lines":9}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`split(s, separator)` with an explicit separator uses Rust's `str::split`, which always yields at least one element (an empty string `\"\"`) even for empty input, so `split(\"\", \",\")` returns `[\"\"]` (truthy). Without a separator, `split_whitespace` is used instead, which yields zero elements for empty/all-whitespace input, so `split(\"\")` returns `[]` (falsy). The two branches are semantically inconsistent for empty string input: the with-separator path is truthy, the without-separator path is falsy. This creates a surprising behavioral gap when the separator argument is conditionally present, and breaks the split/join_list round-trip for the empty-string case.","fix":"For the separator branch, filter out empty-string results the same way `split_whitespace` does: `s.split(separator).filter(|s| !s.is_empty()).map(str::to_string).collect()`. Alternatively, treat empty `s` as a special case returning `Value::new()` in both branches. Pick whichever matches the intended semantics and document it.","locations":[{"ref":"src/function.rs:697-703","code":"  697 | fn split(_context: Context, s: &str, separator: Option<&str>) -> ValueResult {\n  698 |   Ok(if let Some(separator) = separator {\n  699 |     s.split(separator).map(str::to_string).collect()\n  700 |   } else {\n  701 |     s.split_whitespace().map(str::to_string).collect()\n  702 |   })\n  703 | }","lines":7}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `run_recipe` (justfile.rs), subsequent dependencies (the `&&` portion of a recipe's dependency list) are run with a freshly constructed `Ran::default()` (line 515), while prior dependencies use the shared `ran` tracker (line 501). This means subsequent dependencies bypass deduplication against the rest of the recipe execution graph: if a recipe `B` already ran earlier in the invocation (e.g., as a prior dependency of another recipe), it will run AGAIN when it appears as a subsequent. This is intentional per the test `subsequents_run_even_if_already_ran_as_prior` in tests/subsequents.rs, but creates a footgun: recipes with side effects (file creation, network calls, etc.) that appear as both priors and subsequents of different recipes in the same `just` invocation will execute multiple times without any warning. The `confirm` attribute IS re-checked for each subsequent run since it is inside `run_recipe`, but environment-mutating or slow recipes may run unexpectedly multiple times.","fix":"Document this behavior explicitly in the justfile manual under the `&&` dependency section, noting that subsequent dependencies are not deduplicated against prior runs. Consider adding a warning at recipe definition time (or a `[no-dedup]` attribute for clarity). If the intent is full deduplication, pass the shared `ran` instead of `&Ran::default()`, but this would be a breaking change that needs a CHANGELOG entry and test updates.","locations":[{"ref":"src/justfile.rs:508-518","code":"  508 |     Self::run_dependencies(\n  509 |       config,\n  510 |       &context,\n  511 |       recipe.subsequents(),\n  512 |       recipe,\n  513 |       &mut evaluator,\n  514 |       overrides,\n  515 |       &Ran::default(),\n  516 |       scopes,\n  517 |       search,\n  518 |     )?;","lines":11}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`lex_escape` silently accepts a trailing backslash at end-of-file. When `self.next` is `None` after `presume('\\\\')` consumes the backslash (i.e. `\\` is the last character in the file), none of the branches in `lex_escape` match and the function returns `Ok(())` without emitting a token or an error. This means `token_start` is not advanced, and the Eof token emitted later by `tokenize()` absorbs the backslash byte into its `length` field (resulting in `length: 1` for Eof instead of the expected `0`). The parser and downstream consumers treat Eof as a zero-length sentinel, so a non-zero length Eof may cause unexpected behavior in display or analysis code. Additionally, a lone `\\` at end-of-file is probably invalid input that should produce a compile error, but instead is silently swallowed.","fix":"Add an `else` branch (when `self.next.is_none()`) that returns an error, e.g. `Err(self.error(UnexpectedEndOfFile))` or reuses an existing error kind. This mirrors how `lex_eol` and `lex_digraph` handle unexpected EOF.","locations":[{"ref":"src/lexer.rs:756-758","code":"  756 |     } else if let Some(character) = self.next {\n  757 |       return Err(self.error(InvalidEscapeSequence { character }));\n  758 |     }","lines":3}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `parse_attributes`, duplicate keyword argument names within a single attribute (e.g., `[arg(name, short=x, short=y)]`) are silently accepted: `keyword_arguments.insert(key.lexeme(), (key, value))` overwrites the previous entry with no error. Every other duplicate in the parser (duplicate attribute, duplicate arg-attribute, duplicate option) is explicitly detected and rejected with a dedicated error kind, but duplicate keyword argument keys are silently lost. The last duplicate wins, which is confusing and inconsistent with the rest of the parser's duplicate-detection philosophy.","fix":"Before inserting, check whether the key is already present in `keyword_arguments`. If it is, return an appropriate compile error (e.g., a new `DuplicateKeywordArgument` kind, or reuse an existing one). Example: `if keyword_arguments.contains_key(key.lexeme()) { return Err(...); }` before the `insert` call.","locations":[{"ref":"src/parser.rs:1675","code":" 1675 |                 keyword_arguments.insert(key.lexeme(), (key, value));","lines":1}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `run_script`, when `config.timestamp` is set, a timestamp header line (`[time] recipe_name`) is printed to stderr before the dry-run check at line 491. This means that in dry-run mode the timestamp header is emitted before the script body lines, while in `run_shell` the timestamp is only emitted as part of the per-line echo block (inside the combined dry-run / verbose condition at lines 352-371), keeping it in sync with whether the command line is actually printed. The asymmetry means `run_script` with `--dry-run` shows a timestamp header even when the script body print is guarded by the separate verbosity check at line 478. The header also appears even when `config.verbosity.quiet()` would suppress all other output, because the loud/quiet check is not applied to it.","fix":"Move the timestamp print block (lines 462-471) to after the dry-run guard, or wrap it in the same `config.verbosity.loud()` check used at line 478. Alternatively, unify the two blocks so that the timestamp is emitted only when the evaluated-lines block is also printed.","locations":[{"ref":"src/recipe.rs:462-471","code":"  462 |     if let Some(timestamp) = config.timestamp() {\n  463 |       let color = if config.highlight {\n  464 |         config.color.command(config.command_color)\n  465 |       } else {\n  466 |         config.color\n  467 directory that will be searched'. Document the current behaviour if intentional.","locations":[{"ref":"src/search.rs:270-283","code":"  270 |       match candidates.len() {\n  271 |         0 => {}\n  272 |         1 => return Ok(candidates.pop_first().unwrap()),\n  273 |         _ => return Err(SearchError::MultipleCandidates { candidates }),\n  274 |       }\n  275 | \n  276 |       if let Some(ceiling) = &config.ceiling {\n  277 |         if directory == ceiling {\n  278 |           break;\n  279 |         }\n  280 |       }\n  281 |     }\n  282 | \n  283 |     Err(SearchError::NotFound)","lines":14}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `signal_handler.rs`, the `caught` field of the singleton `SignalHandler` is set when a fatal signal is received during child process execution but is never cleared after being read by `spawn()`. The `spawn()` function returns `instance.caught` at line 141 without resetting it to `None`. As a result, once any fatal signal has been caught, every subsequent call to `spawn()` will report `Some(signal)` even if no new signal has arrived. In practice the immediate `Error::Interrupted` propagation limits real-world impact for normal (non-infallible) recipe lines, but for recipes with the `[no-exit-message]`/infallible attribute the per-line caught check is skipped (`if !infallible { ... }`), so execution continues through the loop and each subsequent `status_guard()` call within the same recipe will spuriously report the old signal. Any recipe executing after a signal-interrupted recipe in the same `just` invocation would also receive the stale `caught` value.","fix":"After reading `instance.caught` at line 141, reset it: store the value locally, then set `instance.caught = None` before returning. E.g.: `let caught = instance.caught.take(); (result, caught)`","locations":[{"ref":"src/signal_handler.rs:110-142","code":"  110 |   pub(crate) fn spawn<T>(\n  111 | (function(){

// Data

const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.

const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};

// State

  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,

function loadStatuses() {

}

}

// URL hash — debounced so rapid filter changes don't thrash history

  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
