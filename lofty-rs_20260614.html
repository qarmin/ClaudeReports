 unrecognized APE key therefore silently becomes the `Other` picture type with no way for callers to detect that the key was unknown, unlike the analogous `from_u8` which preserves the original byte.","fix":"Either return a dedicated sentinel/`Option`, or document that unknown APE keys collapse to `Other`. At minimum avoid `Undefined(0)` which aliases `Other`.","locations":[{"ref":"lofty/src/picture.rs:273-298","code":"  273 | \tpub fn from_ape_key(key: &str) -> Self {\n  274 | \t\tmatch key {\n  275 | \t\t\t\"Cover Art (Other)\" => Self::Other,\n  276 | \t\t\t\"Cover Art (Png Icon)\" => Self::Icon,\n  277 | \t\t\t\"Cover Art (Icon)\" => Self::OtherIcon,\n  278 | \t\t\t\"Cover Art (Front)\" => Self::CoverFront,\n  279 | \t\t\t\"Cover Art (Back)\" => Self::CoverBack,\n  280 | \t\t\t\"Cover Art (Leaflet)\" => Self::Leaflet,\n  281 | \t\t\t\"Cover Art (Media)\" => Self::Media,\n  282 | \t\t\t\"Cover Art (Lead Artist)\" => Self::LeadArtist,\n  283 | \t\t\t\"Cover Art (Artist)\" => Self::Artist,\n  284 | \t\t\t\"Cover Art (Conductor)\" => Self::Conductor,\n  285 | \t\t\t\"Cover Art (Band)\" => Self::Band,\n  286 | \t\t\t\"Cover Art (Composer)\" => Self::Composer,\n  287 | \t\t\t\"Cover Art (Lyricist)\" => Self::Lyricist,\n  288 | \t\t\t\"Cover Art (Recording Location)\" => Self::RecordingLocation,\n  289 | \t\t\t\"Cover Art (During Recording)\" => Self::DuringRecording,\n  290 | \t\t\t\"Cover Art (During Performance)\" => Self::DuringPerformance,\n  291 | \t\t\t\"Cover Art (Video Capture)\" => Self::ScreenCapture,\n  292 | \t\t\t\"Cover Art (Fish)\" => Self::BrightFish,\n  293 | \t\t\t\"Cover Art (Illustration)\" => Self::Illustration,\n  294 | \t\t\t\"Cover Art (Band Logotype)\" => Self::BandLogo,\n  295 | \t\t\t\"Cover Art (Publisher Logotype)\" => Self::PublisherLogo,\n  296 | \t\t\t_ => Self::Undefined(0),\n  297 | \t\t}\n  298 | \t}","lines":26}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the ID3v2 map the format key \"TEXT\" is mapped twice in two separate rules: `\"TEXT\" => Writer` and `\"TEXT\" => Lyricist`. Because `get_item_key` builds the lookup via `map.insert($key, values)`, the second insertion overwrites the first, so `ItemKey::from_key(TagType::Id3v2, \"TEXT\")` resolves to `Lyricist`, not `Writer`. The macro's own comment states \"The most applicable variant must appear first\", implying `Writer` (which appears first) should win. The result is silently determined by declaration order in a non-obvious, easy-to-break way.","fix":"Decide explicitly which `ItemKey` \"TEXT\" should resolve to and either merge into a single `\"TEXT\" => Writer | Lyricist` rule (where `values[0]` deterministically wins) or remove the duplicate. Additionally, make `get_item_key` not silently overwrite on duplicate keys (e.g. keep the first inserted value) so declaration order matches the documented contract.","locations":[{"ref":"lofty/src/tag/item.rs:184","code":"  184 | \t\"TEXT\"                                  => Writer,","lines":1},{"ref":"lofty/src/tag/item.rs:188","code":"  188 | \t\"TEXT\"                                  => Lyricist,","lines":1},{"ref":"lofty/src/tag/item.rs:60","code":"   60 | \t\t\t\t\t\t\t\tmap.insert($key, values);","lines":1}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Timestamp::verify` accepts a month/day/hour/minute/second value of 0 for fields where 0 is invalid. `verify_field` only checks `field <= limit` with no lower bound, so a month of 0 or a day of 0 passes (`0 <= 12`, `0 <= 31`). Combined with the parser accepting `\"2024-0-\"` as `month: Some(0)` (see the test at timestamp.rs:437-444), an out-of-range timestamp like `2024-00-00` is treated as valid and will be written back out. Months and days are 1-based.","fix":"Add lower bounds for the 1-based fields. For month and day require `1..=limit`; hour/minute/second may legitimately be 0 so keep `<= limit` for those. E.g. pass a `min` to `verify_field` or special-case month and day.","locations":[{"ref":"lofty/src/tag/items/timestamp.rs:303-324","code":"  303 | \tpub(crate) fn verify(&self) -> Result<()> {\n  304 | \t\tfn verify_field(field: Option<u8>, limit: u8, parent: Option<u8>) -> bool {\n  305 | \t\t\tif let Some(field) = field {\n  306 | \t\t\t\treturn parent.is_some() && field <= limit;\n  307 | \t\t\t}\n  308 | \t\t\treturn true; // Field does not exist, so it's valid\n  309 | \t\t}\n  310 | \n  311 | \t\tif self.year > 9999\n  312 | \t\t\t|| !verify_field(self.month, 12, Some(self.year as u8))\n  313 | \t\t\t|| !verify_field(self.day, 31, self.month)\n  314 | \t\t\t|| !verify_field(self.hour, 23, self.day)\n  315 | \t\t\t|| !verify_field(self.minute, 59, self.hour)\n  316 | \t\t\t|| !verify_field(self.second, 59, self.minute)\n  317 | \t\t{\n  318 | \t\t\terr!(BadTimestamp(\n  319 | \t\t\t\t\"Timestamp contains segment(s) that exceed their limits\"\n  320 | \t\t\t))\n  321 | \t\t}\n  322 | \n  323 | \t\tOk(())\n  324 | \t}","lines":22}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`F80::as_f64` ignores the explicit integer (J) bit of the 80-bit extended format and always treats the value as normalized: it masks the fraction to 63 bits (`& 0x7FFF_FFFF_FFFF_FFFF`) and rebuilds an f64 mantissa without distinguishing the normalized (i=1) vs denormalized (i=0) cases described in the comment just above (lines 80-85). For true denormalized F80 inputs this yields an incorrect f64. In practice AIFF sample rates are always normalized so it is not currently triggered, but the code does not implement what its own comment documents.","fix":"Inspect the integer bit (bit 63 of `fraction`) and handle the denormalized case, or narrow the comment to state that only normalized inputs are supported.","locations":[{"ref":"lofty/src/util/math.rs:80-91","code":"   80 | \t\t// 0 <= e <= 32766, i = 0, f = 0\n   81 | \t\tif self.fraction == 0 {\n   82 | \t\t\treturn f64::from_bits(sign << 63);\n   83 | \t\t}\n   84 | \n   85 | \t\t// 0 <= e <= 32766, 0 <= i <= 1, f >= 0\n   86 | \n   87 | \t\tlet fraction = self.fraction & 0x7FFF_FFFF_FFFF_FFFF;\n   88 | \t\tlet exponent = self.exponent as i16 - 16383 + 1023;\n   89 | \t\tlet bits = (sign << 63) | ((exponent as u64) << 52) | (fraction >> 11);\n   90 | \n   91 | \t\tf64::from_bits(bits)","lines":12}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`header.rs` validates the segment count with `if segments < 1` where `segments` is a `u8`. This is equivalent to `segments == 0`. The `< 1` form on an unsigned type is confusing and triggers clippy's `absurd_extreme_comparisons`-style concerns; more importantly it obscures that the only rejected value is 0.","fix":"Use `if segments == 0` for clarity.","locations":[{"ref":"ogg_pager/src/header.rs:81-85","code":"   81 | \t\tlet segments = data.read_u8()?;\n   82 | \n   83 | \t\tif segments < 1 {\n   84 | \t\t\treturn Err(PageError::BadSegmentCount);\n   85 | \t\t}","lines":5}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The final completeness check compares `packet_sizes.len() != count as usize`, but the read loop tracks progress with a separate counter `packets_read` and breaks when `packets_read == count`. These two counters are maintained independently (packets_read is only incremented when `count != -1`), making the post-loop validation fragile: if the loop exits early via the `while let Ok(..)` condition (a page failing to parse) rather than the explicit `break 'outer`, the error path depends on `packet_sizes.len()` rather than the counter actually driving the loop. Consolidating on one counter would remove the duplicated bookkeeping and the chance of them disagreeing.","fix":"Drive both the early-break and the final check from a single source of truth (e.g. `packet_sizes.len()`).","locations":[{"ref":"ogg_pager/src/packets.rs:82-129","code":"   82 | \t\tlet mut packets_read = 0;\n   83 | \n   84 | \t\tlet mut packet_size = 0_u64;\n   85 | \t\tlet mut packet_bytes_already_read = None;\n   86 | \t\tlet mut current_packet_content;\n   87 | \t\t'outer: while let Ok(header) = PageHeader::read(data) {\n   88 | \t\t\tfor i in header.segments {\n   89 | \t\t\t\tpacket_size += u64::from(i);\n   90 | \n   91 | \t\t\t\tif i < 255 {\n   92 | \t\t\t\t\tif count != -1 {\n   93 | \t\t\t\t\t\tpackets_read += 1;\n   94 | \t\t\t\t\t}\n   95 | \n   96 | \t\t\t\t\tlet byte_count_to_read =\n   97 | \t\t\t\t\t\tSelf::get_byte_count_to_read(packet_size, &mut packet_bytes_already_read);\n   98 | \n   99 | \t\t\t\t\tcurrent_packet_content = vec![0; byte_count_to_read as usize];\n  100 | \t\t\t\t\tdata.read_exact(&mut current_packet_content)?;\n  101 | \n  102 | \t\t\t\t\tpacket_sizes.push(packet_size);\n  103 | \t\t\t\t\tpacket_size = 0;\n  104 | \t\t\t\t\tpacket_bytes_already_read = None;\n  105 | \n  106 | \t\t\t\t\tcontent.append(&mut current_packet_content);\n  107 | \n  108 | \t\t\t\t\tif packets_read == count {\n  109 | \t\t\t\t\t\tbreak 'outer;\n  110 | \t\t\t\t\t}\n  111 | \t\t\t\t}\n  112 | \t\t\t}\n  113 | \n  114 | \t\t\t// The packet continues on the next page, write what we can so far\n  115 | \t\t\tif packet_size != 0 {\n  116 | \t\t\t\tlet byte_count_to_read =\n  117 | \t\t\t\t\tSelf::get_byte_count_to_read(packet_size, &mut packet_bytes_already_read);\n  118 | \n  119 | \t\t\t\tcurrent_packet_content = vec![0; byte_count_to_read as usize];\n  120 | \t\t\t\tdata.read_exact(&mut current_packet_content)?;\n  121 | \t\t\t\tcontent.append(&mut current_packet_content);\n  122 | \t\t\t}\n  123 | \n  124 | \t\t\tcontinue;\n  125 | \t\t}\n  126 | \n  127 | \t\tif count != -1 && packet_sizes.len() != count as usize {\n  128 | \t\t\treturn Err(PageError::NotEnoughData);\n  129 | \t\t}","lines":48}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`paginate` checks `if flags & CONTAINS_LAST_PAGE_OF_BITSTREAM == 0x04`. Comparing the masked result against the literal `0x04` instead of `!= 0` works only because `CONTAINS_LAST_PAGE_OF_BITSTREAM` happens to equal 0x04, but it is brittle: if the flag value ever changes the masked comparison silently breaks. The idiomatic form is `flags & FLAG != 0`.","fix":"Use `flags & CONTAINS_LAST_PAGE_OF_BITSTREAM != 0`.","locations":[{"ref":"ogg_pager/src/paginate.rs:149","code":"  149 | \tif flags & CONTAINS_LAST_PAGE_OF_BITSTREAM == 0x04","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`stream_len -= u64::from(header.size)` is an unchecked subtraction, unlike every other stream-length\nadjustment in the same function which uses `checked_sub` + `err!(SizeMismatch)` (see lines 40-45,\n89-93, 116-120, 125-129). A crafted APE footer whose `size` exceeds the remaining `stream_len`\nwill underflow: panic in debug builds, or in release wrap to a huge value that is then fed into\nthe properties bitrate calculation, producing nonsense. The earlier `size > file size` check in\nread_ape_header is against the whole file, not the residual `stream_len`, so it does not prevent this.","fix":"Replace `stream_len -= u64::from(header.size);` with a `checked_sub` that bails with `err!(SizeMismatch)`, matching the surrounding code.","locations":[{"ref":"lofty/src/ape/read.rs:138-141","code":"  138 | \tif let (tag, Some(header)) = read_ape_tag(data, true, parse_options)? {\n  139 | \t\tstream_len -= u64::from(header.size);\n  140 | \t\tape_tag = tag;\n  141 | \t}","lines":4}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`Moov::find`, `Moov::parse`, and `mdat_length` drive their loops with `while let Ok(Some(atom)) =\nreader.next()`. Any `Err` returned by `reader.next()` (e.g. `SizeMismatch`, `BadAtom`) is silently\nswallowed and treated as end-of-iteration rather than being propagated. This means genuine parse\nerrors in `Strict` mode are quietly ignored at the top level, and `Moov::find` will simply report\n\"No moov atom found\" instead of the real underlying error.","fix":"Match on the result explicitly and propagate `Err` (at least in `ParsingMode::Strict`), only treating `Ok(None)` as loop termination.","locations":[{"ref":"lofty/src/mp4/moov.rs:25-32","code":"   25 | \t\twhile let Ok(Some(atom)) = reader.next() {\n   26 | \t\t\tif atom.ident == AtomIdent::Fourcc(*b\"moov\") {\n   27 | \t\t\t\tmoov = Some(atom);\n   28 | \t\t\t\tbreak;\n   29 | \t\t\t}\n   30 | \n   31 | \t\t\tskip_atom(reader, atom.extended, atom.len)?;\n   32 | \t\t}","lines":8},{"ref":"lofty/src/mp4/moov.rs:44-79","code":"   44 | \t\twhile let Ok(Some(atom)) = reader.next() {\n   45 | \t\t\tif let AtomIdent::Fourcc(fourcc) = atom.ident {\n   46 | \t\t\t\tmatch &fourcc {\n   47 | \t\t\t\t\tb\"trak\" if parse_options.read_properties => {\n   48 | \t\t\t\t\t\t// All we need from here is trak.mdia\n   49 | \t\t\t\t\t\tif let Some(mdia) =\n   50 | \t\t\t\t\t\t\tfind_child_atom(reader, atom.len, *b\"mdia\", parse_options.parsing_mode)?\n   51 | \t\t\t\t\t\t{\n   52 | \t\t\t\t\t\t\tskip_atom(reader, mdia.extended, mdia.len)?;\n   53 | \t\t\t\t\t\t\ttraks.push(mdia);\n   54 | \t\t\t\t\t\t}\n   55 | \t\t\t\t\t},\n   56 | \t\t\t\t\tb\"udta\" if parse_options.read_tags => {\n   57 | \t\t\t\t\t\tlet ilst_parsed = ilst_from_udta(reader, parse_options, atom.len - 8)?;\n   58 | \t\t\t\t\t\tif let Some(ilst_parsed) = ilst_parsed {\n   59 | \t\t\t\t\t\t\tlet Some(mut existing_ilst) = ilst else {\n   60 | \t\t\t\t\t\t\t\tilst = Some(ilst_parsed);\n   61 | \t\t\t\t\t\t\t\tcontinue;\n   62 | \t\t\t\t\t\t\t};\n   63 | \n   64 | \t\t\t\t\t\t\tlog::warn!(\"Multiple `ilst` atoms found, combining them\");\n   65 | \t\t\t\t\t\t\tfor atom in ilst_parsed.atoms {\n   66 | \t\t\t\t\t\t\t\texisting_ilst.insert(atom);\n   67 | \t\t\t\t\t\t\t}\n   68 | \n   69 | \t\t\t\t\t\t\tilst = Some(existing_ilst);\n   70 | \t\t\t\t\t\t}\n   71 | \t\t\t\t\t},\n   72 | \t\t\t\t\t_ => skip_atom(reader, atom.extended, atom.len)?,\n   73 | \t\t\t\t}\n   74 | \n   75 | \t\t\t\tcontinue;\n   76 | \t\t\t}\n   77 | \n   78 | \t\t\tskip_atom(reader, atom.extended, atom.len)?\n   79 | \t\t}","lines":36},{"ref":"lofty/src/mp4/properties.rs:944-952","code":"  944 | \twhile let Ok(Some(atom)) = reader.next() {\n  945 | \t\tif atom.ident == AtomIdent::Fourcc(*b\"mdat\") {\n  946 | \t\t\treturn Ok(atom.len - 8);\n  947 | \t\t}\n  948 | \n  949 | \t\tskip_atom(reader, atom.extended, atom.len)?;\n  950 | \t}\n  951 | \n  952 | \tdecode_err!(@BAIL Mp4, \"Failed to find \\\"mdat\\\" atom\");","lines":9}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In the OGG write path, after rewriting the header pages the remaining audio pages are re-read and re-numbered with `while let Ok(mut page) = Page::read(&mut pages_reader)`. Any parse error on the trailing data terminates the loop silently, so a corrupt or truncated page in the remainder is dropped without warning and the rest of the file's audio is lost on write-back, with no error returned to the caller. I/O errors are likewise swallowed.","fix":"Match on the read result; break only on a clean EOF and propagate genuine errors (or at minimum log a warning) so silent data loss during tag writing is detectable.","locations":[{"ref":"lofty/src/ogg/write.rs:149-158","code":"  149 | \tlet mut pages_reader = Cursor::new(&remaining_file_content[..]);\n  150 | \tlet mut idx = 0;\n  151 | \twhile let Ok(mut page) = Page::read(&mut pages_reader) {\n  152 | \t\tlet header = page.header_mut();\n  153 | \t\theader.sequence_number = pages_written + idx;\n  154 | \t\tpage.gen_crc();\n  155 | \t\tfile.write_all(&page.as_bytes())?;\n  156 | \n  157 | \t\tidx += 1;\n  158 | \t}","lines":10}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`Packets::read_count` drives its loop with `while let Ok(header) = PageHeader::read(data)`, which silently swallows every error from page-header parsing (I/O errors, missing magic, bad version, bad segment count). A truncated or corrupt stream simply terminates the loop as if the data ended cleanly. When `count == -1` (read all) this means a corrupt page in the middle is indistinguishable from EOF and no error is ever reported. Genuine I/O errors are also hidden.","fix":"Distinguish EOF/clean termination from real errors: match on the result and break only on the expected end condition, propagating I/O errors (and, in strict mode, malformed-page errors).","locations":[{"ref":"ogg_pager/src/packets.rs:87","code":"   87 | \t\t'outer: while let Ok(header) = PageHeader::read(data) {","lines":1}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `EventTimingCodesFrame::parse`, the loop reads an event-type byte with `while let Ok(...)` (a\nread error / EOF cleanly ends the loop), but then reads the 4-byte timestamp with `?`, which\npropagates an error. A truncated frame that ends after an event-type byte but before its 4-byte\ntimestamp turns a recoverable \"end of events\" into a hard parse error, inconsistent with the\nloop's own tolerant handling of the event-type byte.","fix":"Read the timestamp tolerantly too (e.g. break the loop if the `read_u32` fails) so a trailing\npartial event is ignored rather than aborting the whole frame, matching the event-type handling.","locations":[{"ref":"lofty/src/id3/v2/items/event_timing_codes_frame.rs:272-280","code":"  272 | \t\twhile let Ok(event_type_byte) = reader.read_u8() {\n  273 | \t\t\tlet event_type = EventType::from_u8(event_type_byte);\n  274 | \t\t\tlet timestamp = reader.read_u32::<BigEndian>()?;\n  275 | \n  276 | \t\t\tevents.push(Event {\n  277 | \t\t\t\tevent_type,\n  278 | \t\t\t\ttimestamp,\n  279 | \t\t\t})\n  280 | \t\t}","lines":9}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the AIFF `COMT` parser, `num_comments` is read from the file and used directly as a loop bound. Each iteration issues several reads against the `Take`-bounded chunk; if the declared count is larger than the data actually present, the first read past the chunk end returns EOF and the whole file parse fails (in non-strict mode too) rather than salvaging the comments already read. A malformed but otherwise readable file is rejected entirely.","fix":"Break out of the loop on a clean EOF / short read (respecting `parsing_mode`) and keep the comments parsed so far, instead of propagating the error unconditionally.","locations":[{"ref":"lofty/src/iff/aiff/read.rs:104-124","code":"  104 | \t\t\tb\"COMT\" if comments.is_empty() && parse_options.read_tags => {\n  105 | \t\t\t\tif chunk.size() < 2 {\n  106 | \t\t\t\t\tcontinue;\n  107 | \t\t\t\t}\n  108 | \n  109 | \t\t\t\tlet num_comments = chunk.read_u16::<BigEndian>()?;\n  110 | \n  111 | \t\t\t\tfor _ in 0..num_comments {\n  112 | \t\t\t\t\tlet timestamp = chunk.read_u32::<BigEndian>()?;\n  113 | \t\t\t\t\tlet marker_id = chunk.read_u16::<BigEndian>()?;\n  114 | \t\t\t\t\tlet size = chunk.read_u16::<BigEndian>()?;\n  115 | \n  116 | \t\t\t\t\tlet text = chunk.read_string(Some(u32::from(size)))?;\n  117 | \n  118 | \t\t\t\t\tcomments.push(Comment {\n  119 | \t\t\t\t\t\ttimestamp,\n  120 | \t\t\t\t\t\tmarker_id,\n  121 | \t\t\t\t\t\ttext,\n  122 | \t\t\t\t\t})\n  123 | \t\t\t\t}\n  124 | \t\t\t},","lines":21}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Tag::date()` parses with `ParsingMode::Relaxed` and uses `.ok().flatten()`, silently discarding any parse error. `try_parse_timestamp` (used elsewhere in this module for the same purpose) at least logs a warning on failure. `date()` swallows malformed timestamps with no diagnostic, making it harder to debug why a date \"disappears\". Behavior is also inconsistent with `try_parse_timestamp`.","fix":"Route `date()` through `try_parse_timestamp` (or otherwise log on parse failure) so the two timestamp read paths behave consistently and a failed parse is at least observable in logs.","locations":[{"ref":"lofty/src/tag/mod.rs:187-195","code":"  187 | \tfn date(&self) -> Option<Timestamp> {\n  188 | \t\tself.get_string(ItemKey::RecordingDate)\n  189 | \t\t\t.or_else(|| self.get_string(ItemKey::Year))\n  190 | \t\t\t.and_then(|d| {\n  191 | \t\t\t\tTimestamp::parse(&mut d.as_bytes(), ParsingMode::Relaxed)\n  192 | \t\t\t\t\t.ok()\n  193 | \t\t\t\t\t.flatten()\n  194 | \t\t\t})\n  195 | \t}","lines":9},{"ref":"lofty/src/tag/mod.rs:120-128","code":"  120 | #[must_use]\n  121 | pub(crate) fn try_parse_timestamp(input: &str) -> Option<Timestamp> {\n  122 | \tlet Ok(timestamp) = Timestamp::parse(&mut input.as_bytes(), ParsingMode::Relaxed) else {\n  123 | \t\tlog::warn!(\"Timestamp exists in file, but cannot be parsed.\");\n  124 | \t\treturn None;\n  125 | \t};\n  126 | \n  127 | \ttimestamp\n  128 | }","lines":9}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`read_to_terminator` for UTF-16 reads byte pairs via `(reader.read_u8(), reader.read_u8())`. If the stream ends after an odd number of bytes (a trailing lone byte before EOF), the `while let (Ok(b1), Ok(b2))` pattern fails to match and the already-read `b1` is silently discarded. The dropped byte is also not reflected in the returned length, so callers tracking `bytes_read` will be off by one on malformed input.","fix":"After the loop, account for a dangling final byte (push it / include it in the length), or document that trailing odd bytes are intentionally dropped.","locations":[{"ref":"lofty/src/util/text.rs:270-280","code":"  270 | \t\tTextEncoding::UTF16 | TextEncoding::UTF16BE => {\n  271 | \t\t\twhile let (Ok(b1), Ok(b2)) = (reader.read_u8(), reader.read_u8()) {\n  272 | \t\t\t\tif b1 == 0 && b2 == 0 {\n  273 | \t\t\t\t\tterminator_len = 2;\n  274 | \t\t\t\t\tbreak;\n  275 | \t\t\t\t}\n  276 | \n  277 | \t\t\t\ttext_bytes.push(b1);\n  278 | \t\t\t\ttext_bytes.push(b2)\n  279 | \t\t\t}\n  280 | \t\t},","lines":11}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In WavPack DSD extended-metadata parsing, the rate multiplier branch breaks out of the metadata loop on an\ninvalid multiplier (`rate_multiplier > 30`) in non-strict modes, but `break` only exits `get_extended_meta_info`;\ncontrol returns to the caller which has already consumed `block_size - 24` bytes and continues. More notably,\nwhen the multiplier is invalid the DSD sample rate is silently left unmultiplied/unset, yet parsing of\nsubsequent blocks proceeds as if the rate were valid, potentially yielding a misleading sample rate / duration\nrather than a clear error or a zeroed property. The `wrapping_mul` on line 360 also silently wraps a bogus\nproduct instead of being flagged.","fix":"On an invalid DSD multiplier in non-strict modes, explicitly zero `properties.sample_rate` (so the later\n`sample_rate == 0` guard skips duration/bitrate math) rather than leaving a partially-computed value, and\nconsider using `checked_mul` with a fallback instead of `wrapping_mul`.","locations":[{"ref":"lofty/src/wavpack/properties.rs:343-361","code":"  343 | \t\t\tID_DSD => {\n  344 | \t\t\t\tif size <= 1 {\n  345 | \t\t\t\t\tdecode_err!(@BAIL WavPack, \"Encountered an invalid DSD block size\");\n  346 | \t\t\t\t}\n  347 | \n  348 | \t\t\t\tlet mut rate_multiplier = u32::from(reader.read_u8()?);\n  349 | \t\t\t\tsize -= 1;\n  350 | \n  351 | \t\t\t\tif rate_multiplier > 30 {\n  352 | \t\t\t\t\tparse_mode_choice!(\n  353 | \t\t\t\t\t\tparse_mode,\n  354 | \t\t\t\t\t\tSTRICT: decode_err!(@BAIL WavPack, \"Encountered an invalid sample rate multiplier\"),\n  355 | \t\t\t\t\t\tDEFAULT: break\n  356 | \t\t\t\t\t)\n  357 | \t\t\t\t}\n  358 | \n  359 | \t\t\t\trate_multiplier = 1 << rate_multiplier;\n  360 | \t\t\t\tproperties.sample_rate = properties.sample_rate.wrapping_mul(rate_multiplier);\n  361 | \t\t\t},","lines":19}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`Id3v1Tag::set_track` casts the incoming `u32` to `u8` with `value as u8`, silently truncating. A\ncaller setting track 256 ends up storing track 0 (which the format treats as \"no track\"), and 257\nbecomes 1, etc., with no error or warning. Other ID3v1 setters that can lose data at least clamp or\ntruncate visibly; this one corrupts the value.","fix":"Clamp to u8::MAX (or ignore values > 255) and/or log a warning, e.g. `self.track_number = Some(u8::try_from(value).unwrap_or(u8::MAX));`.","locations":[{"ref":"lofty/src/id3/v1/tag.rs:166-168","code":"  166 | \tfn set_track(&mut self, value: u32) {\n  167 | \t\tself.track_number = Some(value as u8);\n  168 | \t}","lines":3}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"`impl<'a> Into<Cow<'a, str>> for FrameId<'a>` implements `Into` directly instead of `From`. This is\nthe `from_over_into` anti-pattern: implementing `From<FrameId> for Cow` would give the `Into`\nimplementation for free and also provide the reverse-direction ergonomics. As written, callers only\nget `Into`, and the blanket `From` is unavailable.","fix":"Replace with `impl<'a> From<FrameId<'a>> for Cow<'a, str> { fn from(id: FrameId<'a>) -> Self {\nid.into_inner() } }`.","locations":[{"ref":"lofty/src/id3/v2/frame/header/mod.rs:190-194","code":"  190 | impl<'a> Into<Cow<'a, str>> for FrameId<'a> {\n  191 | \tfn into(self) -> Cow<'a, str> {\n  192 | \t\tself.into_inner()\n  193 | \t}\n  194 | }","lines":5}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"`gen_map!`-generated `get_item_key` builds a `HashMap<&str, &[ItemKey]>` in a `LazyLock`, but then never uses it as a hash map. It does `INSTANCE.iter().find(|(k, _)| k.eq_ignore_ascii_case(key))`, which is a full O(n) linear scan with a case-insensitive comparison on every single lookup. The maps are large (the ID3v2 and ILST maps have ~70-90 entries each), and `ItemKey::from_key` is called for every key while parsing a tag, making tag parsing O(items * map_size). The whole point of the HashMap (O(1) lookup) is defeated; it would have been just as fast to store a `&[(&str, &[ItemKey])]` slice.","fix":"Normalize keys to ASCII-lowercase when building the map (store lowercased static keys) and look up with `INSTANCE.get(key.to_ascii_lowercase().as_str())`, or build a case-insensitive hashing wrapper. Either approach restores O(1) lookups instead of an O(n) scan per call.","locations":[{"ref":"lofty/src/tag/item.rs:54-66","code":"   54 | \t\t\t\tpub(crate) fn get_item_key(&self, key: &str) -> Option<ItemKey> {\n   55 | \t\t\t\t\tstatic INSTANCE: std::sync::LazyLock<HashMap<&'static str, &'static [ItemKey]>> = std::sync::LazyLock::new(|| {\n   56 | \t\t\t\t\t\tlet mut map = HashMap::new();\n   57 | \t\t\t\t\t\t$(\n   58 | \t\t\t\t\t\t\tlet values: &'static [ItemKey] = &[$(ItemKey::$variant,)+];\n   59 | \t\t\t\t\t\t\t$(\n   60 | \t\t\t\t\t\t\t\tmap.insert($key, values);\n   61 | \t\t\t\t\t\t\t)+\n   62 | \t\t\t\t\t\t)+\n   63 | \t\t\t\t\t\tmap\n   64 | \t\t\t\t\t});\n   65 | \t\t\t\t\tINSTANCE.iter().find(|(k, _)| k.eq_ignore_ascii_case(key)).map(|(_, v)| v[0])\n   66 | \t\t\t\t}","lines":13}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"The entire file is read into memory for every tag-write operation (`new_from_file` calls\n`read_to_end`), and `parse_ilst` / `Minf::parse` / `read_stsd` read whole atoms into freshly\nallocated `Vec`s sized from untrusted lengths. While `try_vec!`/`try_with_capacity_stable` guard\nagainst OOM aborts, large `stsd`/`ilst`/`mdat` atoms still trigger large eager allocations and full\ncopies even when only a few header bytes are needed. The `mdat_length` helper additionally rewinds\nand re-scans the whole file just to recover a length the parser already saw (acknowledged by the\nTODO at properties.rs:642).","fix":"Track the `mdat` offset/length during the initial scan instead of re-reading; avoid copying full atoms when only headers are needed; stream over the reader instead of buffering whole atoms where feasible.","locations":[{"ref":"lofty/src/mp4/ilst/read.rs:28-31","code":"   28 | \tlet mut contents = try_vec![0; len as usize];\n   29 | \treader.read_exact(&mut contents)?;\n   30 | \n   31 | \tlet mut cursor = Cursor::new(contents);","lines":4},{"ref":"lofty/src/mp4/properties.rs:469-472","code":"  469 | \t\t\t\t\tb\"stsd\" => {\n  470 | \t\t\t\t\t\tlet mut stsd = try_vec![0; (atom.len - 8) as usize];\n  471 | \t\t\t\t\t\treader.read_exact(&mut stsd)?;\n  472 | \t\t\t\t\t\tstsd_data = Some(stsd);","lines":4},{"ref":"lofty/src/mp4/properties.rs:638-655","code":"  638 | \tread_stsd(&mut stsd_reader, &mut properties)?;\n  639 | \n  640 | \t// We do the mdat check up here, so we have access to the entire file\n  641 | \tif duration > 0 {\n  642 | \t\t// TODO: We should keep track of the `mdat` length when first reading the file.\n  643 | \t\t//       This extra read is unnecessary.\n  644 | \t\tlet mdat_len;\n  645 | \t\tmatch mdat_length(reader) {\n  646 | \t\t\tOk(len) => mdat_len = len,\n  647 | \t\t\tErr(err) => {\n  648 | \t\t\t\tif parse_mode == ParsingMode::Strict {\n  649 | \t\t\t\t\treturn Err(err);\n  650 | \t\t\t\t}\n  651 | \n  652 | \t\t\t\tlog::warn!(\"No \\\"mdat\\\" atom found, any audio properties will be useless.\");\n  653 | \t\t\t\treturn Ok(properties);\n  654 | \t\t\t},\n  655 | \t\t}","lines":18},{"ref":"lofty/src/mp4/write.rs:128-149","code":"  128 | \tpub(super) fn new_from_file<F>(file: &mut F, parse_mode: ParsingMode) -> Result<Self>\n  129 | \twhere\n  130 | \t\tF: FileLike,\n  131 | \t\tLoftyError: From<<F as Truncate>::Error>,\n  132 | \t\tLoftyError: From<<F as Length>::Error>,\n  133 | \t{\n  134 | \t\tlet mut contents = Cursor::new(Vec::new());\n  135 | \t\tfile.read_to_end(contents.get_mut())?;\n  136 | \n  137 | \t\tlet mut len = contents.get_ref().len() as u64;\n  138 | \t\tlet mut atoms = Vec::new();\n  139 | \t\twhile let Some(atom) = ContextualAtom::read(&mut contents, &mut len, parse_mode)? {\n  140 | \t\t\tatoms.push(atom);\n  141 | \t\t}\n  142 | \n  143 | \t\tcontents.rewind()?;\n  144 | \n  145 | \t\tOk(Self {\n  146 | \t\t\tcontents: RefCell::new(contents),\n  147 | \t\t\tatoms,\n  148 | \t\t})\n  149 | \t}","lines":22}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`find_next_frame` in AAC is acknowledged by an in-code TODO to do \"a lot of unnecessary seeking\": for every\ncandidate it seeks back to the frame start, re-reads the header, then `cmp_header` seeks forward and back\nagain, and the outer loop re-seeks per frame. On large files this is O(frames) redundant `seek`/`read`\nsyscalls. The MPEG reader has the same structure. Not a correctness bug, but a measurable cost when reading\nproperties of large ADTS/MP3 streams.","fix":"Read frames forward in a single pass using the known frame length to advance, avoiding the seek-back-and-reread\npattern; only fall back to a frame-sync search when the next header fails to validate.","locations":[{"ref":"lofty/src/aac/read.rs:156-198","code":"  156 | // TODO: Does a lot of unnecessary seeking\n  157 | // Searches for the next frame, comparing it to the following one\n  158 | fn find_next_frame<R>(\n  159 | \treader: &mut R,\n  160 | \tparsing_mode: ParsingMode,\n  161 | ) -> Result<Option<(ADTSHeader, u64)>>\n  162 | where\n  163 | \tR: Read + Seek,\n  164 | {\n  165 | \tlet mut pos = reader.stream_position()?;\n  166 | \n  167 | \twhile let Ok(Some(first_adts_frame_start_relative)) = search_for_frame_sync(reader) {\n  168 | \t\tlet first_adts_frame_start_absolute = pos + first_adts_frame_start_relative;\n  169 | \n  170 | \t\t// Seek back to the start of the frame and read the header\n  171 | \t\treader.seek(SeekFrom::Start(first_adts_frame_start_absolute))?;\n  172 | \n  173 | \t\tif let Some(first_header) = ADTSHeader::read(reader, parsing_mode)? {\n  174 | \t\t\tlet header_len = if first_header.has_crc { 9 } else { 7 };\n  175 | \n  176 | \t\t\tmatch cmp_header(\n  177 | \t\t\t\treader,\n  178 | \t\t\t\theader_len,\n  179 | \t\t\t\tu32::from(first_header.len),\n  180 | \t\t\t\tu32::from_be_bytes(first_header.bytes[..4].try_into().unwrap()),\n  181 | \t\t\t\tHEADER_MASK,\n  182 | \t\t\t) {\n  183 | \t\t\t\tHeaderCmpResult::Equal => {\n  184 | \t\t\t\t\treturn Ok(Some((\n  185 | \t\t\t\t\t\tfirst_header,\n  186 | \t\t\t\t\t\tfirst_adts_frame_start_absolute + u64::from(first_header.len),\n  187 | \t\t\t\t\t)));\n  188 | \t\t\t\t},\n  189 | \t\t\t\tHeaderCmpResult::Undetermined => return Ok(None),\n  190 | \t\t\t\tHeaderCmpResult::NotEqual => {},\n  191 | \t\t\t}\n  192 | \t\t}\n  193 | \n  194 | \t\tpos = reader.stream_position()?;\n  195 | \t}\n  196 | \n  197 | \tOk(None)\n  198 | }","lines":43},{"ref":"lofty/src/mpeg/read.rs:218-246","code":"  218 | // Searches for the next frame, comparing it to the following one\n  219 | fn find_next_frame<R>(reader: &mut R) -> Result<Option<(Header, u64)>>\n  220 | where\n  221 | \tR: Read + Seek,\n  222 | {\n  223 | \tlet mut pos = reader.stream_position()?;\n  224 | \n  225 | \twhile let Ok(Some(first_mp3_frame_start_relative)) = search_for_frame_sync(reader) {\n  226 | \t\tlet first_mp3_frame_start_absolute = pos + first_mp3_frame_start_relative;\n  227 | \n  228 | \t\t// Seek back to the start of the frame and read the header\n  229 | \t\treader.seek(SeekFrom::Start(first_mp3_frame_start_absolute))?;\n  230 | \t\tlet first_header_data = reader.read_u32::<BigEndian>()?;\n  231 | \n  232 | \t\tif let Some(first_header) = Header::read(first_header_data) {\n  233 | \t\t\tmatch cmp_header(reader, 4, first_header.len, first_header_data, HEADER_MASK) {\n  234 | \t\t\t\tHeaderCmpResult::Equal => {\n  235 | \t\t\t\t\treturn Ok(Some((first_header, first_mp3_frame_start_absolute)));\n  236 | \t\t\t\t},\n  237 | \t\t\t\tHeaderCmpResult::Undetermined => return Ok(None),\n  238 | \t\t\t\tHeaderCmpResult::NotEqual => {},\n  239 | \t\t\t}\n  240 | \t\t}\n  241 | \n  242 | \t\tpos = reader.stream_position()?;\n  243 | \t}\n  244 | \n  245 | \tOk(None)\n  246 | }","lines":29}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The APE write path reads the entire file into memory and performs in-place splice/drain operations\non the resulting Vec. `read_to_end` into `file_bytes`, then `splice` (which shifts all trailing bytes)\nand a possible `drain` for a header-position tag, copies the whole file potentially twice for large\naudio files. This is acceptable for tags but scales poorly with file size.","fix":"Where feasible, write only the changed tail region (the tag area) rather than rewriting the whole file from a full in-memory buffer, or document the memory cost.","locations":[{"ref":"lofty/src/ape/tag/write.rs:125-144","code":"  125 | \tfile.rewind()?;\n  126 | \n  127 | \tlet mut file_bytes = Vec::new();\n  128 | \tfile.read_to_end(&mut file_bytes)?;\n  129 | \n  130 | \t// Write the tag in the appropriate place\n  131 | \tif let Some(range) = ape_tag_location {\n  132 | \t\tfile_bytes.splice(range, tag);\n  133 | \t} else {\n  134 | \t\tfile_bytes.splice(ape_position as usize..ape_position as usize, tag);\n  135 | \t}\n  136 | \n  137 | \t// Now, if there was a tag at the beginning, remove it\n  138 | \tif header_ape_tag.0 {\n  139 | \t\tfile_bytes.drain(header_ape_tag.1.0 as usize..header_ape_tag.1.1 as usize);\n  140 | \t}\n  141 | \n  142 | \tfile.rewind()?;\n  143 | \tfile.truncate(0)?;\n  144 | \tfile.write_all(&file_bytes)?;","lines":20}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In the ID3v2.3 IPLS merge path, each key/value pair is appended by formatting the entire\naccumulated string again: `ipls_frame.value = Cow::Owned(format!(\"{}{key}\\0{value}\", ipls_frame.value))`.\nThis re-copies the full running IPLS string on every pair, giving O(n^2) behavior for a frame with\nmany involved-people entries. A separator push is already done just above, making this even more\nwasteful.","fix":"Mutate the owned String in place: push `key`, push '\\0', push `value` onto `ipls_frame.value` (after converting to Cow::Owned once) instead of reformatting the whole string each iteration.","locations":[{"ref":"lofty/src/id3/v2/write/frame.rs:215-229","code":"  215 | \t\t\t\tfor (key, value) in key_value_pairs.drain(..) {\n  216 | \t\t\t\t\tif !ipls_frame.value.is_empty() {\n  217 | \t\t\t\t\t\tmatch &mut ipls_frame.value {\n  218 | \t\t\t\t\t\t\tCow::Owned(v) => v.push('\\0'),\n  219 | \t\t\t\t\t\t\tv => {\n  220 | \t\t\t\t\t\t\t\tlet mut new = String::from(&**v);\n  221 | \t\t\t\t\t\t\t\tnew.push('\\0');\n  222 | \n  223 | \t\t\t\t\t\t\t\t*v = Cow::Owned(new);\n  224 | \t\t\t\t\t\t\t},\n  225 | \t\t\t\t\t\t}\n  226 | \t\t\t\t\t}\n  227 | \n  228 | \t\t\t\t\tipls_frame.value = Cow::Owned(format!(\"{}{key}\\0{value}\", ipls_frame.value));\n  229 | \t\t\t\t}","lines":15}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The RIFF-INFO write path reads the entire file into memory (`read_to_end` into a `Cursor<Vec<u8>>`) and then performs `Vec::splice` insertions/removals, which shift the whole tail of the buffer on every edit. For large WAV/AIFF files (audio data can be hundreds of MB) this is a full copy plus O(n) memmoves. The AIFF text-chunk writer (`write_to_inner`) does the same with multiple `drain`/`splice` calls.","fix":"Where the tag region is at/near the end, prefer in-place truncate+seek+write instead of materializing the whole file; at minimum compute all edits and apply a single rebuild pass rather than repeated splices/drains over the full buffer.","locations":[{"ref":"lofty/src/iff/wav/tag/write.rs:35-104","code":"   35 | \tlet mut file_bytes = Cursor::new(Vec::new());\n   36 | \tfile.read_to_end(file_bytes.get_mut())?;\n   37 | \n   38 | \t// File is lying about its length\n   39 | \tif file_bytes.get_ref().len() < (original_stream_length + IFF_CHUNK_HEADER_SIZE) as usize {\n   40 | \t\terr!(SizeMismatch);\n   41 | \t}\n   42 | \n   43 | \tfile_bytes.seek(SeekFrom::Start(u64::from(FIRST_CHUNK_LEN)))?;\n   44 | \n   45 | \t// TODO: Forcing the use of ParseOptions::default()\n   46 | \tlet parse_options = ParseOptions::default();\n   47 | \tlet Some(original_info_list_size) = find_info_list(\n   48 | \t\t&mut file_bytes,\n   49 | \t\tu64::from(original_stream_length - 4),\n   50 | \t\tparse_options.parsing_mode,\n   51 | \t)?\n   52 | \telse {\n   53 | \t\t// Simply append the info list to the end of the file and update the file size\n   54 | \n   55 | \t\tlet new_stream_length = riff_info_bytes.len() as u64 + u64::from(original_stream_length);\n   56 | \t\tif new_stream_length > u64::from(u32::MAX) {\n   57 | \t\t\terr!(TooMuchData);\n   58 | \t\t}\n   59 | \n   60 | \t\tfile_bytes.rewind()?;\n   61 | \n   62 | \t\tlet tag_position = (original_stream_length + IFF_CHUNK_HEADER_SIZE) as usize;\n   63 | \t\tfile_bytes.seek(SeekFrom::Start(tag_position as u64))?;\n   64 | \n   65 | \t\tfile_bytes\n   66 | \t\t\t.get_mut()\n   67 | \t\t\t.splice(tag_position..tag_position, riff_info_bytes.iter().copied());\n   68 | \n   69 | \t\tfile_bytes.seek(SeekFrom::Start(4))?;\n   70 | \t\tfile_bytes.write_u32::<LittleEndian>(new_stream_length as u32)?;\n   71 | \n   72 | \t\tfile.rewind()?;\n   73 | \t\tfile.truncate(0)?;\n   74 | \t\tfile.write_all(file_bytes.get_ref())?;\n   75 | \n   76 | \t\treturn Ok(());\n   77 | \t};\n   78 | \n   79 | \t// Replace the existing tag\n   80 | \n   81 | \tlet info_list_start = file_bytes.seek(SeekFrom::Current(-12))? as usize;\n   82 | \n   83 | \t// `original_info_list_size` doesn't include the b\"LIST\\0\\0\\0\\0\" chunk header\n   84 | \tlet info_list_end =\n   85 | \t\tinfo_list_start + (IFF_CHUNK_HEADER_SIZE + original_info_list_size) as usize;\n   86 | \tlet original_info_list = info_list_start..info_list_end;\n   87 | \n   88 | \tlet new_stream_length = riff_info_bytes.len() as u64\n   89 | \t\t+ (u64::from(original_stream_length) - original_info_list.len() as u64);\n   90 | \tif new_stream_length > u64::from(u32::MAX) {\n   91 | \t\terr!(TooMuchData);\n   92 | \t}\n   93 | \n   94 | \tlet _ = file_bytes\n   95 | \t\t.get_mut()\n   96 | \t\t.splice(original_info_list, riff_info_bytes);\n   97 | \n   98 | \tlet _ = file_bytes\n   99 | \t\t.get_mut()\n  100 | \t\t.splice(4..8, (new_stream_length as u32).to_le_bytes());\n  101 | \n  102 | \tfile.rewind()?;\n  103 | \tfile.truncate(0)?;\n  104 | \tfile.write_all(file_bytes.get_ref())?;","lines":70},{"ref":"lofty/src/iff/aiff/tag.rs:464-490","code":"  464 | \t\tlet file = chunks.into_inner();\n  465 | \t\tfile.rewind()?;\n  466 | \n  467 | \t\tlet mut file_bytes = Vec::new();\n  468 | \t\tfile.read_to_end(&mut file_bytes)?;\n  469 | \n  470 | \t\tif chunks_to_remove.is_empty() {\n  471 | \t\t\tfile_bytes.splice((comm_end as usize)..(comm_end as usize), text_chunks);\n  472 | \t\t} else {\n  473 | \t\t\tchunks_to_remove.sort_unstable();\n  474 | \t\t\tchunks_to_remove.reverse();\n  475 | \n  476 | \t\t\tlet first = chunks_to_remove.pop().unwrap(); // Infallible\n  477 | \n  478 | \t\t\tfor (s, e) in &chunks_to_remove {\n  479 | \t\t\t\tfile_bytes.drain(*s..*e);\n  480 | \t\t\t}\n  481 | \n  482 | \t\t\tfile_bytes.splice(first.0..first.1, text_chunks);\n  483 | \t\t}\n  484 | \n  485 | \t\tlet total_size = ((file_bytes.len() - IFF_CHUNK_HEADER_SIZE as usize) as u32).to_be_bytes();\n  486 | \t\tfile_bytes.splice(4..8, total_size.to_vec());\n  487 | \n  488 | \t\tfile.rewind()?;\n  489 | \t\tfile.truncate(0)?;\n  490 | \t\tfile.write_all(&file_bytes)?;","lines":27}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"On the OGG tag write path the entire remainder of the file after the header packets is read fully into memory (`file.read_to_end(&mut remaining_file_content)`), then parsed page-by-page from a `Cursor`, then written back out. For large audio files this doubles peak memory (full audio body buffered) and performs an extra full copy that could be streamed/seek-based instead.","fix":"Stream the trailing pages directly from the source file region rather than buffering the whole remainder in a Vec.","locations":[{"ref":"lofty/src/ogg/write.rs:103-104","code":"  103 | \tlet mut remaining_file_content = Vec::new();\n  104 | \tfile.read_to_end(&mut remaining_file_content)?;","lines":2},{"ref":"lofty/src/ogg/write.rs:149-158","code":"  149 | \tlet mut pages_reader = Cursor::new(&remaining_file_content[..]);\n  150 | \tlet mut idx = 0;\n  151 | \twhile let Ok(mut page) = Page::read(&mut pages_reader) {\n  152 | \t\tlet header = page.header_mut();\n  153 | \t\theader.sequence_number = pages_written + idx;\n  154 | \t\tpage.gen_crc();\n  155 | \t\tfile.write_all(&page.as_bytes())?;\n  156 | \n  157 | \t\tidx += 1;\n  158 | \t}","lines":10}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`PictureType::from_str`/`MimeType::from_str` calls `mime_type.to_lowercase()` allocating a new `String` on every lookup. `from_ape_key` also does linear string matching. These are minor, but `MimeType::from_str` in particular is on hot picture-parsing paths and allocates even when the input is already lowercase.","fix":"Use `eq_ignore_ascii_case` comparisons against the known literals to avoid the allocation, falling back to `Unknown` for the rest.","locations":[{"ref":"lofty/src/picture.rs:71-79","code":"   71 | \tpub fn from_str(mime_type: &str) -> Self {\n   72 | \t\tmatch &*mime_type.to_lowercase() {\n   73 | \t\t\t\"image/jpeg\" | \"image/jpg\" => Self::Jpeg,\n   74 | \t\t\t\"image/png\" => Self::Png,\n   75 | \t\t\t\"image/tiff\" => Self::Tiff,\n   76 | \t\t\t\"image/bmp\" => Self::Bmp,\n   77 | \t\t\t\"image/gif\" => Self::Gif,\n   78 | \t\t\t_ => Self::Unknown(mime_type.to_owned()),\n   79 | \t\t}","lines":9}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`write_tag` and `dump_tag` clone the entire `Tag` (items + all pictures) for the MP4 path via `Into::<Ilst>::into(tag.clone())`. For a tag carrying large embedded artwork this duplicates all picture byte buffers purely to perform a read-only write/dump. Other formats in the same `match` take `&Tag` without cloning.","fix":"Provide a borrowing conversion `&Tag -> IlstRef` (analogous to the other `*Ref` types already used in this file, e.g. `Id3v2TagRef`/`VorbisCommentsRef`) so the MP4 write/dump path can operate without cloning the pictures.","locations":[{"ref":"lofty/src/tag/utils.rs:43-47","code":"   43 | \t\tFileType::Mp4 => crate::mp4::ilst::write::write_to(\n   44 | \t\t\tfile,\n   45 | \t\t\t&mut Into::<Ilst>::into(tag.clone()).as_ref(),\n   46 | \t\t\twrite_options,\n   47 | \t\t),","lines":5},{"ref":"lofty/src/tag/utils.rs:72-74","code":"   72 | \t\tTagType::Mp4Ilst => Into::<Ilst>::into(tag.clone())\n   73 | \t\t\t.as_ref()\n   74 | \t\t\t.dump_to(writer, write_options),","lines":3}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Page::gen_crc` calls `self.as_bytes()`, which allocates a fresh `Vec` containing the entire page (header + segment table + content) purely to feed it to `crc32`, then discards it. For every page written this is a full extra allocation and copy of the page content. The CRC could be computed incrementally over the header bytes and the content slice without materializing the combined buffer.","fix":"Compute the CRC by streaming the header fields and `self.content` through `crc32` incrementally, avoiding the temporary Vec.","locations":[{"ref":"ogg_pager/src/lib.rs:100-105","code":"  100 | \t/// Generates the CRC checksum of the page\n  101 | \tpub fn gen_crc(&mut self) {\n  102 | \t\t// The value is computed over the entire header (with the CRC field in the header set to zero) and then continued over the page\n  103 | \t\tself.header.checksum = 0;\n  104 | \t\tself.header.checksum = crc::crc32(&self.as_bytes());\n  105 | \t}","lines":6}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`get_byte_count_to_read` contains dead arithmetic in the `Some` branch: it sets `*packet_bytes_already_read = Some(*already_read_bytes_count + byte_count_to_read)` where `byte_count_to_read = packet_size - *already_read_bytes_count`, so the stored value simplifies to exactly `packet_size`. The running total is therefore needlessly recomputed via a subtraction-then-addition round trip, and the `Option` exists only to encode \"first chunk vs. later chunk\", which is already implied by `packet_size`. The logic is harder to follow than necessary.","fix":"Simplify: `let to_read = packet_size - already_read; *packet_bytes_already_read = Some(packet_size);`.","locations":[{"ref":"ogg_pager/src/packets.rs:137-154","code":"  137 | \tfn get_byte_count_to_read(\n  138 | \t\tpacket_size: u64,\n  139 | \t\tpacket_bytes_already_read: &mut Option<u64>,\n  140 | \t) -> u64 {\n  141 | \t\tlet byte_count_to_read;\n  142 | \t\tmatch packet_bytes_already_read {\n  143 | \t\t\tSome(already_read_bytes_count) => {\n  144 | \t\t\t\tbyte_count_to_read = packet_size - *already_read_bytes_count;\n  145 | \t\t\t\t*packet_bytes_already_read = Some(*already_read_bytes_count + byte_count_to_read);\n  146 | \t\t\t},\n  147 | \t\t\tNone => {\n  148 | \t\t\t\tbyte_count_to_read = packet_size;\n  149 | \t\t\t\t*packet_bytes_already_read = Some(packet_size);\n  150 | \t\t\t},\n  151 | \t\t}\n  152 | \n  153 | \t\tbyte_count_to_read\n  154 | \t}","lines":18}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`TextInformationFrame::as_bytes` encodes the text first, then `content.insert(0, encoding as u8)`,\nwhich is an O(n) shift of the entire encoded buffer to prepend a single encoding byte. Text frames\nare one of the most common frame types, so this prepend happens for nearly every written tag. The\nsame pattern appears in `TimestampFrame::as_bytes`.","fix":"Build the buffer with the encoding byte first, e.g. `let mut content = vec![encoding as u8];\ncontent.extend(encoding.encode(...)?);` to avoid the front insertion.","locations":[{"ref":"lofty/src/id3/v2/items/text_information_frame.rs:108-110","code":"  108 | \t\tlet mut content = encoding.encode(&self.value, false, write_options.lossy_text_encoding)?;\n  109 | \t\tcontent.insert(0, encoding as u8);\n  110 | \t\tOk(content)","lines":3},{"ref":"lofty/src/id3/v2/items/timestamp_frame.rs:139-144","code":"  139 | \t\tlet mut encoded_text = encoding.encode(\n  140 | \t\t\t&self.timestamp.to_string(),\n  141 | \t\t\tfalse,\n  142 | \t\t\twrite_options.lossy_text_encoding,\n  143 | \t\t)?;\n  144 | \t\tencoded_text.insert(0, encoding as u8);","lines":6}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"In `ExtendedTextFrame::parse`, the UTF-16 block returns early when `raw_text.is_empty()` (line 125),\nso by the time the `match bom` at line 139 is reached `raw_text` is guaranteed non-empty. The match\narm `[0x00, 0x00] if raw_text.is_empty() => { ... }` therefore can never be taken; its guard is\nalways false. The body (including the `debug_assert!` and `break 'utf16`) is dead code.","fix":"Remove the unreachable guarded arm. The following `[0x00, 0x00] => { err!(...) }` arm already covers\nthe \"no BOM\" case for non-empty text.","locations":[{"ref":"lofty/src/id3/v2/items/extended_text_frame.rs:140-145","code":"  140 | \t\t\t\t[0x00, 0x00] if raw_text.is_empty() => {\n  141 | \t\t\t\t\tdebug_assert!(description.content.is_empty());\n  142 | \t\t\t\t\t// Empty string\n  143 | \t\t\t\t\tframe_content = String::new();\n  144 | \t\t\t\t\tbreak 'utf16;\n  145 | \t\t\t\t},","lines":6}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`let _ = next_fourcc.escape_ascii();` computes an `EscapeAscii` iterator and immediately discards it. `escape_ascii` has no side effects, so the line does nothing (likely a leftover from a debug/log statement). Dead code that obscures intent.","fix":"Remove the line, or, if it was meant for logging, turn it into an actual `log::debug!` call using the escaped bytes.","locations":[{"ref":"lofty/src/iff/chunk.rs:202","code":"  202 | \t\t\tlet _ = next_fourcc.escape_ascii();","lines":1}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`AtomInfo` derives/stores an `extended` flag and a `header_size()` helper, but several skip paths\nignore the distinction and assume an 8-byte header. Conversely, the commented-out seek in\n`ContextualAtom::read` (`// reader.seek(SeekFrom::Current(*reader_len as i64))?;`) is leftover dead\ncode with no explanation of why remaining bytes are not skipped.","fix":"Remove the commented-out line, or restore it with a comment explaining the invariant (children already consume the full container).","locations":[{"ref":"lofty/src/mp4/write.rs:82","code":"   82 | \t\t// reader.seek(SeekFrom::Current(*reader_len as i64))?; // Skip any remaining bytes","lines":1}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Misleading error message. When the header dispatch fails, the bail message claims the expected\nmarkers are `[\"MAC \", \"APETAGEX\", \"ID3\"]`, but the match arms only handle `b\"MAC \"` and `b\"APET\"`\n(the start of \"APETAGEX\"); there is no \"ID3\" arm at this point (ID3v2/ID3v1 are handled earlier/later\nin separate steps). The message lists a token the code does not actually accept here, which is\nconfusing when debugging malformed files.","fix":"Correct the message to reflect the markers actually accepted at this branch (e.g. `[\"MAC \", \"APETAGEX\"]`).","locations":[{"ref":"lofty/src/ape/read.rs:100-102","code":"  100 | \t\t\t_ => {\n  101 | \t\t\t\tdecode_err!(@BAIL Ape, \"Invalid data found while reading header, expected any of [\\\"MAC \\\", \\\"APETAGEX\\\", \\\"ID3\\\"]\")\n  102 | \t\t\t},","lines":3}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment for `skip_atom` says it logs/skips `len - 8` bytes and assumes the reader is \"at the\nend of the atom's header\", but for an extended atom the header is 16 bytes, not 8. The non-extended\nbranch seeks `len - 8` and the extended branch advances `len - 8` from the current position too, so\nboth branches subtract a fixed 8 regardless of the actual header size implied by `extended`. The\n`log::trace!(\"Attempting to skip {} bytes\", len - 8)` is therefore misleading for extended atoms.","fix":"Clarify in the comment that `len` is the full atom length and the caller is positioned right after the (8-byte) size+ident pair even for extended atoms, or compute the skip relative to `header_size()`.","locations":[{"ref":"lofty/src/mp4/read/mod.rs:88-116","code":"   88 | /// Seeks the reader to the end of the atom\n   89 | ///\n   90 | /// This should be used immediately after [`AtomInfo::read`] to skip an unwanted atom.\n   91 | ///\n   92 | /// NOTES:\n   93 | ///\n   94 | /// * This makes the assumption that the reader is at the end of the atom's header.\n   95 | /// * This makes the assumption that the `len` is the *full atom length*, not just that of the content.\n   96 | pub(super) fn skip_atom<R>(reader: &mut R, extended: bool, len: u64) -> Result<()>\n   97 | where\n   98 | \tR: Read + Seek,\n   99 | {\n  100 | \tlog::trace!(\"Attempting to skip {} bytes\", len - 8);\n  101 | \n  102 | \tif !extended {\n  103 | \t\treader.seek(SeekFrom::Current(i64::from(len as u32) - 8))?;\n  104 | \t\treturn Ok(());\n  105 | \t}\n  106 | \n  107 | \tlet pos = reader.stream_position()?;\n  108 | \n  109 | \tif let (pos, false) = pos.overflowing_add(len - 8) {\n  110 | \t\treader.seek(SeekFrom::Start(pos))?;\n  111 | \t} else {\n  112 | \t\terr!(TooMuchData);\n  113 | \t}\n  114 | \n  115 | \tOk(())\n  116 | }","lines":29}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Misleading doc comment on `search_for_frame_sync`'s return value. The comment states the function \"returns the\nindex relative to this beginning\" and \"will return the first match\", and the implementation comment describes\nanalyzing overlapping pairs starting at `[0x01,0x02]`. However the returned `index` comes from\n`iterator.enumerate()` which begins enumerating only after the first byte was already consumed into\n`buffer[0]`, so `index` is the position of the *second* byte of the matching pair, i.e. it equals the offset of\nthe frame-sync's first byte only because of that one-byte skew. The reasoning is subtle and the comment does\nnot explain the off-by-one bookkeeping, making the function easy to misread/misuse by callers computing\nabsolute offsets.","fix":"Clarify the comment to state explicitly that `buffer[0]` is pre-loaded with the first byte before enumeration,\nso the enumerated `index` already corresponds to the offset of the first byte of the matched 2-byte frame sync.","locations":[{"ref":"lofty/src/mpeg/header.rs:13-44","code":"   13 | // Searches for a frame sync (11 set bits) in the reader.\n   14 | // The search starts at the beginning of the reader and returns the index relative to this beginning.\n   15 | // This will return the first match, if one is found.\n   16 | //\n   17 | // Note that the search searches in 8 bit steps, i.e. the first 8 bits need to be byte aligned.\n   18 | pub(crate) fn search_for_frame_sync<R>(input: &mut R) -> std::io::Result<Option<u64>>\n   19 | where\n   20 | \tR: Read,\n   21 | {\n   22 | \tlet mut iterator = input.bytes();\n   23 | \tlet mut buffer = [0u8; 2];\n   24 | \t// Read the first byte, as each iteration expects that buffer 0 was set from a previous iteration.\n   25 | \t// This is not the case in the first iteration, which is therefore a special case.\n   26 | \tif let Some(byte) = iterator.next() {\n   27 | \t\tbuffer[0] = byte?;\n   28 | \t}\n   29 | \t// Create a stream of overlapping 2 byte pairs\n   30 | \t//\n   31 | \t// Example:\n   32 | \t// [0x01, 0x02, 0x03, 0x04] should be analyzed as\n   33 | \t// [0x01, 0x02], [0x02, 0x03], [0x03, 0x04]\n   34 | \tfor (index, byte) in iterator.enumerate() {\n   35 | \t\tbuffer[1] = byte?;\n   36 | \t\t// Check the two bytes in the buffer\n   37 | \t\tif verify_frame_sync(buffer) {\n   38 | \t\t\treturn Ok(Some(index as u64));\n   39 | \t\t}\n   40 | \t\t// If they do not match, copy the last byte in the buffer to the front for the next iteration\n   41 | \t\tbuffer[0] = buffer[1];\n   42 | \t}\n   43 | \tOk(None)\n   44 | }","lines":32}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The comment \"In the absolute *worst* case we'll do 3 more retries.\" is misleading: the retry loop in `find_last_page` is unbounded - it keeps calling `rfind`/`PageHeader::read` until a valid header is found or the backward search fails. There is no hard cap of 3 retries; the \"3\" is just an informal estimate based on max page size, not enforced by the code.","fix":"Reword the comment to reflect that the loop is bounded only by the search reaching `header_end`, not a fixed retry count.","locations":[{"ref":"lofty/src/ogg/mod.rs:63-93","code":"   63 | \t// In the absolute *worst* case we'll do 3 more retries. Realistically though, the last page in\n   64 | \t// the stream should be well below the maximum size.\n   65 | \tlet last_page_header;\n   66 | \tloop {\n   67 | \t\tlet current_pos = data.stream_position()?;\n   68 | \n   69 | \t\tmatch PageHeader::read(data) {\n   70 | \t\t\tOk(h) => {\n   71 | \t\t\t\tlast_page_header = h;\n   72 | \t\t\t\tbreak;\n   73 | \t\t\t},\n   74 | \t\t\t// False positive, keep searching\n   75 | \t\t\tErr(\n   76 | \t\t\t\tPageError::MissingMagic | PageError::InvalidVersion | PageError::BadSegmentCount,\n   77 | \t\t\t) => {\n   78 | \t\t\t\tdata.seek(SeekFrom::Start(current_pos))?;\n   79 | \n   80 | \t\t\t\tif !data\n   81 | \t\t\t\t\t.rfind(PATTERN)\n   82 | \t\t\t\t\t.buffer_size(BUFFER_SIZE)\n   83 | \t\t\t\t\t.start_pos(RevSearchStart::FromCurrent)\n   84 | \t\t\t\t\t.end_pos(RevSearchEnd::Pos(header_end))\n   85 | \t\t\t\t\t.search()?\n   86 | \t\t\t\t{\n   87 | \t\t\t\t\treturn Err(PageError::MissingMagic.into());\n   88 | \t\t\t\t}\n   89 | \t\t\t\tcontinue;\n   90 | \t\t\t},\n   91 | \t\t\tErr(err) => return Err(err.into()),\n   92 | \t\t}\n   93 | \t}","lines":31}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment on `MAX_CONTENT_SIZE` claims \"An OGG page can have up to 255 segments, or ~64KB. We cap it at 32 segments, or ~8KB when writing.\" but the constant it documents is `MAX_SEGMENT_COUNT * 255` (255 segments, ~64KB) - i.e. the read-side maximum, not the 32-segment write cap. The comment describes `MAX_WRITTEN_CONTENT_SIZE` (defined just above), so it is attached to the wrong constant and misleads readers about what `MAX_CONTENT_SIZE` represents.","fix":"Move the 32-segment/8KB note to MAX_WRITTEN_CONTENT_SIZE and describe MAX_CONTENT_SIZE as the full 255-segment read maximum.","locations":[{"ref":"ogg_pager/src/lib.rs:21-25","code":"   21 | /// The maximum page content size\n   22 | // NOTE: An OGG page can have up to 255 segments, or ~64KB. We cap it at 32 segments, or ~8KB when writing.\n   23 | pub const MAX_CONTENT_SIZE: usize = MAX_SEGMENT_COUNT * 255;\n   24 | /// The maximum number of segments a page can contain\n   25 | pub const MAX_SEGMENT_COUNT: usize = 255;","lines":5}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `UniqueFileIdentifierFrame::identifier` states \"The binary payload with up to 64\nbytes of data\", but `parse` reads the identifier with `read_to_end` and imposes no 64-byte limit\n(the only bound is the surrounding frame size). The \"up to 64 bytes\" claim is misleading.","fix":"Either enforce the 64-byte limit during parsing/validation per the ID3v2 spec, or correct the doc\ncomment to reflect that no limit is enforced.","locations":[{"ref":"lofty/src/id3/v2/items/unique_file_identifier.rs:19-20","code":"   19 | \t/// The binary payload with up to 64 bytes of data.\n   20 | \tpub identifier: Cow<'a, [u8]>,","lines":2},{"ref":"lofty/src/id3/v2/items/unique_file_identifier.rs:93-94","code":"   93 | \t\tlet mut identifier = Vec::new();\n   94 | \t\treader.read_to_end(&mut identifier)?;","lines":2}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment has a stray, unbalanced double-quote: `// handle bracketed refinement e.g. (55)((I think...)\"`.\nThe trailing `\"` is a typo and makes the example look malformed.","fix":"Remove the trailing stray double quote from the comment.","locations":[{"ref":"lofty/src/id3/v2/tag.rs:592","code":"  592 | \t\t\t// handle bracketed refinement e.g. (55)((I think...)\"","lines":1}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`Chunks::correct_position` mixes several concerns (even-boundary padding, encoder-bug detection that mis-includes padding in the chunk size, peeking the next FourCC, and rewinding by either 3 or 4 bytes) in one heuristic-laden function with `seek_back` magic numbers and only terse comments. The padding-vs-next-chunk recovery is subtle and easy to break; it deserves clearer factoring/naming and a comment explaining the -3 vs -4 cases and why `remaining_size > 4` is the gate.","fix":"Extract the 'next chunk peek' recovery into a named helper, replace the `-3`/`-4` literals with named constants derived from `IFF_CHUNK_HEADER_SIZE`/padding size, and document the invariant each branch maintains.","locations":[{"ref":"lofty/src/iff/chunk.rs:184-220","code":"  184 | \tfn correct_position(&mut self, current_chunk_size: u32) -> Result<()> {\n  185 | \t\t// Chunks are expected to start on even boundaries, and are padded\n  186 | \t\t// with a 0 if necessary. This is NOT the null terminator of the value,\n  187 | \t\t// and it is NOT included in the chunk's size\n  188 | \n  189 | \t\tlet mut padding_size = 1;\n  190 | \t\tif current_chunk_size.is_multiple_of(2) || self.remaining_size < padding_size {\n  191 | \t\t\treturn Ok(());\n  192 | \t\t}\n  193 | \n  194 | \t\tlet padding_byte = self.reader.read_u8()?;\n  195 | \n  196 | \t\t// Unfortunately, not all encoders get padding bytes correct and include them in the chunk\n  197 | \t\t// size, so we need to check if we're eating into another chunk.\n  198 | \t\tif padding_byte != 0 && self.remaining_size > 4 {\n  199 | \t\t\tlet mut next_fourcc = [padding_byte, 0, 0, 0];\n  200 | \t\t\tself.reader.read_exact(&mut next_fourcc[1..])?;\n  201 | \n  202 | \t\t\tlet _ = next_fourcc.escape_ascii();\n  203 | \t\t\tlet seek_back;\n  204 | \t\t\tif valid_fourcc(next_fourcc) {\n  205 | \t\t\t\t// Eating into the next chunk, so assume the padding was already consumed\n  206 | \t\t\t\tseek_back = -4;\n  207 | \t\t\t\tpadding_size = 0;\n  208 | \t\t\t} else {\n  209 | \t\t\t\t// Maybe the encoder wrote a junk padding byte? or the next chunk fourcc is junk?\n  210 | \t\t\t\t// who knows. will probably error later.\n  211 | \t\t\t\tseek_back = -3;\n  212 | \t\t\t}\n  213 | \n  214 | \t\t\tself.reader.seek(SeekFrom::Current(seek_back))?;\n  215 | \t\t}\n  216 | \n  217 | \t\tself.remaining_size = self.remaining_size.saturating_sub(padding_size);\n  218 | \n  219 | \t\tOk(())\n  220 | \t}","lines":37}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`item.rs` is a 1173-line file dominated by six enormous `gen_map!` invocations (the format<->ItemKey mapping tables, ~265-462) plus the giant `gen_item_keys!`/`ItemKey` definition (~522-955). The mapping tables are pure data that change frequently and are error-prone to edit by hand (see the duplicate \"TEXT\" finding), yet they live in the same file as the core `ItemValue`/`TagItem` types. This mixes a large data table with type definitions and makes the file unwieldy.","fix":"Move the per-format `gen_map!` tables into a dedicated module (e.g. `tag/item/maps.rs`) and keep `item.rs` for the `ItemKey`/`ItemValue`/`TagItem` types. This isolates the volatile data tables from the stable type definitions.","locations":[{"ref":"lofty/src/tag/item.rs:81-462","code":"   81 | gen_map!(\n   82 | \tAIFF_TEXT_MAP;\n   83 | \n   84 | \t\"NAME\"          => TrackTitle,\n   85 | \t\"AUTH\"          => TrackArtist,\n   86 | \t\"(c) \"          => CopyrightMessage,\n   87 | \t\"COMM\" | \"ANNO\" => Comment\n   88 | );\n   89 | \n   90 | gen_map!(\n   91 | \tAPE_MAP;\n   92 | \n   93 | \t\"Album\"                          => AlbumTitle,\n   94 | \t\"DiscSubti alse,"description":"`TagItem::re_map` is a misnomer. Its name strongly implies it remaps/rewrites the item's key for the new `TagType`, but it only returns a `bool` indicating whether a mapping exists (a validity check); it never mutates the item. It is used in `Tag::re_map`, `Tag::insert`, and `Tag::push` purely as a predicate. The confusing name makes call sites like `self.retain(|i| i.re_map(tag_type))` hard to read.","fix":"Rename `TagItem::re_map` to something predicate-like, e.g. `supports_tag_type` or `is_valid_for`, to reflect that it only checks validity and does not perform a remap.","locations":[{"ref":"lofty/src/tag/item.rs:1141-1149","code":" 1141 | \tpub(crate) fn re_map(&self, tag_type: TagType) -> bool {\n 1142 | \t\tif tag_type == TagType::Id3v1 {\n 1143 | \t\t\tuse crate::id3::v1::constants::VALID_ITEMKEYS;\n 1144 | \n 1145 | \t\t\treturn VALID_ITEMKEYS.contains(&self.item_key);\n 1146 | \t\t}\n 1147 | \n 1148 | \t\tself.item_key.map_key(tag_type).is_some()\n 1149 | \t}","lines":9},{"ref":"lofty/src/tag/mod.rs:248","code":"  248 | \t\tself.retain(|i| i.re_map(tag_type));","lines":1},{"ref":"lofty/src/tag/mod.rs:367-368","code":"  367 | \tpub fn insert(&mut self, item: TagItem) -> bool {\n  368 | \t\tif item.re_map(self.tag_type) {","lines":2}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`Timestamp::verify` passes `Some(self.year as u8)` as the `parent` of `month`. `year` is a non-optional `u16`, so the only purpose of wrapping it is to make `parent.is_some()` always true. The `as u8` truncating cast is meaningless (the numeric value is never read, only `is_some()` is checked) and is misleading - a reader may think the year value matters. It also silently truncates (e.g. year 256 -> 0).","fix":"Change `verify_field`'s `parent` parameter to a `bool` (or just inline a `true` for month since the year is always present), removing the pointless `Some(self.year as u8)` and the truncating cast.","locations":[{"ref":"lofty/src/tag/items/timestamp.rs:311-312","code":"  311 | \t\tif self.year > 9999\n  312 | \t\t\t|| !verify_field(self.month, 12, Some(self.year as u8))","lines":2},{"ref":"lofty/src/tag/items/timestamp.rs:304-309","code":"  304 | \t\tfn verify_field(field: Option<u8>, limit: u8, parent: Option<u8>) -> bool {\n  305 | \t\t\tif let Some(field) = field {\n  306 | \t\t\t\treturn parent.is_some() && field <= limit;\n  307 | \t\t\t}\n  308 | \t\t\treturn true; // Field does not exist, so it's valid\n  309 | \t\t}","lines":6}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"negligible","easy":false,"description":"In `ParsedFrame::read`, the guards `if size < 1` (lines 80 and 92) are checking a `u32` for being\nless than 1, i.e. `size == 0`. These are written immediately after the earlier `if size == 0`\nchecks for the same value, and the `< 1` form is a less-clear way to express `== 0`.","fix":"Use `if size == 0` for clarity (or fold the checks), matching the style used elsewhere in the same\nfunction.","locations":[{"ref":"lofty/src/id3/v2/frame/read.rs:80-82","code":"   80 | \t\t\tif size < 1 {\n   81 | \t\t\t\treturn Err(Id3v2Error::new(Id3v2ErrorKind::BadFrameLength).into());\n   82 | \t\t\t}","lines":3},{"ref":"lofty/src/id3/v2/frame/read.rs:92-94","code":"   92 | \t\t\tif size < 1 {\n   93 | \t\t\t\treturn Err(Id3v2Error::new(Id3v2ErrorKind::BadFrameLength).into());\n   94 | \t\t\t}","lines":3}]}]</script>
