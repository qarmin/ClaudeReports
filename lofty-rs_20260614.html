<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Infinite loop / denial-of-service on crafted AAC (ADTS) input.\n\nIn `read_from`, after the first frame is found, the property-reading loop seeks to `first_frame_end` and\nrepeatedly calls `find_next_frame`, advancing by `first_header.len` each iteration. `ADTSHeader::read` never\nrejects a frame whose 13-bit `Frame length` field (`len`) is 0, and `read_properties`/`read_from` never\nreject a 0-length frame either. When `len == 0`:\n  - `find_next_frame` returns `frame_end = first_adts_frame_start_absolute + 0` (same position).\n  - `cmp_header` is called with `first_header_len = 0`; it seeks `0.saturating_sub(header_len) == 0`\n    (no movement), re-reads the identical 4 bytes, and returns `HeaderCmpResult::Equal`.\nThe outer `while let Some(...)` loop therefore seeks back to the exact same offset every iteration and never\nterminates. A single malicious ADTS frame with a zero length field hangs the parser forever.","fix":"Reject ADTS frames whose `len` is less than the header size (7, or 9 with CRC) in `ADTSHeader::read`\n(treat as not a valid frame / return `Ok(None)` or bail). Additionally, in the loop in `read_from`, guard\nthat each `frame_end` strictly increases (e.g. break if `frame_end <= previous_position`) so progress is\nalways made even on malformed input.","locations":[{"ref":"lofty/src/aac/read.rs:137-146","code":"  137 | \t\treader.seek(SeekFrom::Start(first_frame_end))?;\n  138 | \n  139 | \t\tlet mut frame_count = 1;\n  140 | \n  141 | \t\twhile let Some((header, frame_end)) = find_next_frame(reader, parse_mode)? {\n  142 | \t\t\tfirst_frame_header.bitrate += header.bitrate;\n  143 | \t\t\tframe_count += 1u32;\n  144 | \n  145 | \t\t\treader.seek(SeekFrom::Start(frame_end))?;\n  146 | \t\t}","lines":10},{"ref":"lofty/src/aac/read.rs:158-198","code":"  158 | fn find_next_frame<R>(\n  159 | \treader: &mut R,\n  160 | \tparsing_mode: ParsingMode,\n  161 | ) -> Result<Option<(ADTSHeader, u64)>>\n  162 | where\n  163 | \tR: Read + Seek,\n  164 | {\n  165 | \tlet mut pos = reader.stream_position()?;\n  166 | \n  167 | \twhile let Ok(Some(first_adts_frame_start_relative)) = search_for_frame_sync(reader) {\n  168 | \t\tlet first_adts_frame_start_absolute = pos + first_adts_frame_start_relative;\n  169 | \n  170 | \t\t// Seek back to the start of the frame and read the header\n  171 | \t\treader.seek(SeekFrom::Start(first_adts_frame_start_absolute))?;\n  172 | \n  173 | \t\tif let Some(first_header) = ADTSHeader::read(reader, parsing_mode)? {\n  174 | \t\t\tlet header_len = if first_header.has_crc { 9 } else { 7 };\n  175 | \n  176 | \t\t\tmatch cmp_header(\n  177 | \t\t\t\treader,\n  178 | \t\t\t\theader_len,\n  179 | \t\t\t\tu32::from(first_header.len),\n  180 | \t\t\t\tu32::from_be_bytes(first_header.bytes[..4].try_into().unwrap()),\n  181 | \t\t\t\tHEADER_MASK,\n  182 | \t\t\t) {\n  183 | \t\t\t\tHeaderCmpResult::Equal => {\n  184 | \t\t\t\t\treturn Ok(Some((\n  185 | \t\t\t\t\t\tfirst_header,\n  186 | \t\t\t\t\t\tfirst_adts_frame_start_absolute + u64::from(first_header.len),\n  187 | \t\t\t\t\t)));\n  188 | \t\t\t\t},\n  189 | \t\t\t\tHeaderCmpResult::Undetermined => return Ok(None),\n  190 | \t\t\t\tHeaderCmpResult::NotEqual => {},\n  191 | \t\t\t}\n  192 | \t\t}\n  193 | \n  194 | \t\tpos = reader.stream_position()?;\n  195 | \t}\n  196 | \n  197 | \tOk(None)\n  198 | }","lines":41},{"ref":"lofty/src/aac/header.rs:103-104","code":"  103 | \t\tlet len =\n  104 | \t\t\t(u16::from(byte4 & 0b11) << 11) | (u16::from(byte5) << 3) | (u16::from(byte6) >> 5);","lines":2}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`flac_properties` computes `dfla.len - 12` where `dfla` is an atom whose length is only guaranteed\nby `AtomInfo::read` to be >= 8 (ATOM_HEADER_LEN), not >= 12. A `dfLa` atom with length 8, 9, 10 or\n11 makes `dfla.len - 12` underflow, panicking in debug builds and wrapping to a huge u64 in release\nbuilds (the subsequent `< 18` comparison then passes the wrong branch). Reachable from a crafted\nFLAC-in-MP4 stsd entry.","fix":"Check `dfla.len < 30` (12 header/version + 18 STREAMINFO) up front and bail early, or use `dfla.len.checked_sub(12)`.","locations":[{"ref":"lofty/src/mp4/properties.rs:919","code":"  919 | \tif dfla.len - 12 < 18 {","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Integer divide-by-zero panic on malformed SV7 MPC input. In `MpcSv7Properties::read`, when\n`true_gapless` is set and `frame_count == 1` with `last_frame_length == 0`, `total_samples`\nbecomes `(1 * 1152) - (1152 - 0) = 0`. The bitrate is then computed as\n`(stream_length * 8 * sample_freq) / (total_samples * 1000)`, i.e. a division by zero, which\npanics in both debug and release builds. The early-return guards only check `sample_freq == 0`\nand `frame_count == 0`, never `total_samples == 0`. All of these inputs are attacker-controlled\nfields read directly from the file header.","fix":"After computing `total_samples`, bail or warn-and-return early when `total_samples == 0` (mirror the `total_samples == 0` guard already present in sv8/properties.rs:282-288) before performing the division.","locations":[{"ref":"lofty/src/musepack/sv7/properties.rs:374-384","code":"  374 | \t\tlet total_samples;\n  375 | \t\tif properties.true_gapless {\n  376 | \t\t\ttotal_samples = (u64::from(properties.frame_count) * MPC_FRAME_LENGTH)\n  377 | \t\t\t\t- (MPC_FRAME_LENGTH - u64::from(properties.last_frame_length));\n  378 | \t\t} else {\n  379 | \t\t\ttotal_samples =\n  380 | \t\t\t\t(u64::from(properties.frame_count) * MPC_FRAME_LENGTH) - MPC_DECODER_SYNTH_DELAY;\n  381 | \t\t}\n  382 | \n  383 | \t\tproperties.average_bitrate = ((stream_length * 8 * u64::from(properties.sample_freq))\n  384 | \t\t\t/ (total_samples * 1000)) as u32;","lines":11}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Divide-by-zero panic when calculating Opus bitrate. `length` is computed as `(total_samples * 1000).div_round(48000)`. The only guard is `total_samples > 0`, but for small granule-position differences (total_samples in roughly 1..=23) the rounded division produces `length == 0`. The very next lines divide by `length` (`(file_length * 8) / length` and `(stream_len * 8) / length`), which panics on a crafted Opus file whose last-page abgp is only slightly larger than the first-page abgp (after pre-skip subtraction). This is reachable from untrusted input.","fix":"After computing `length`, guard the divisions with `if length > 0` (mirroring the Vorbis code which uses `checked_div`), or compute the bitrate with `checked_div`/`saturating` helpers and skip the calculation when `length == 0`.","locations":[{"ref":"lofty/src/ogg/opus/properties.rs:133-147","code":"  133 | \t\tif total_samples > 0 {\n  134 | \t\t\t// Best case scenario\n  135 | \t\t\tlet length = (total_samples * 1000).div_round(48000);\n  136 | \n  137 | \t\t\t// Get the stream length by subtracting the length of the header packets\n  138 | \n  139 | \t\t\t// Safe to unwrap, metadata is checked prior\n  140 | \t\t\tlet metadata_packet = packets.get(1).unwrap();\n  141 | \t\t\tlet header_size = identification_packet.len() + metadata_packet.len();\n  142 | \n  143 | \t\t\tlet stream_len = file_length - header_size as u64;\n  144 | \n  145 | \t\t\tproperties.duration = Duration::from_millis(length);\n  146 | \t\t\tproperties.overall_bitrate = ((file_length * 8) / length) as u32;\n  147 | \t\t\tproperties.audio_bitrate = ((stream_len * 8) / length) as u32;","lines":15}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Divide-by-zero panic when calculating Speex bitrate. Inside `if total_samples > 0`, `length` is set to `(total_samples * 1000).div_round(sample_rate)`, which can round down to 0 for small total_samples relative to the sample rate. `length` then reaches the bitrate calculations at the bottom of the function where it is used as a divisor (`file_length.saturating_mul(8) / length` and `.div_round(length)`), panicking on division by zero. div_round itself also divides by its `rhs`, so `div_round(length)` with length==0 panics too. Reachable from crafted input.","fix":"Only assign the rounded `length` when it is non-zero (keep the default of 1000 otherwise), or guard all uses of `length` as a divisor with a `length > 0` check / `checked_div`.","locations":[{"ref":"lofty/src/ogg/speex/properties.rs:158-183","code":"  158 | \t\tif properties.sample_rate > 0 {\n  159 | \t\t\tlet total_samples = last_page_abgp.saturating_sub(first_page_abgp);\n  160 | \n  161 | \t\t\t// Best case scenario\n  162 | \t\t\tif total_samples > 0 {\n  163 | \t\t\t\tlength = (total_samples * 1000).div_round(u64::from(properties.sample_rate));\n  164 | \t\t\t\tproperties.duration = Duration::from_millis(length);\n  165 | \t\t\t} else {\n  166 | \t\t\t\tlog::warn!(\n  167 | \t\t\t\t\t\"Speex: The file contains invalid PCM values, unable to calculate length\"\n  168 | \t\t\t\t);\n  169 | \t\t\t}\n  170 | \t\t} else {\n  171 | \t\t\tlog::warn!(\"Speex: Sample rate = 0, unable to calculate length\");\n  172 | \t\t}\n  173 | \t}\n  174 | \n  175 | \tif properties.nominal_bitrate > 0 {\n  176 | \t\tproperties.overall_bitrate = (file_length.saturating_mul(8) / length) as u32;\n  177 | \t\tproperties.audio_bitrate = (properties.nominal_bitrate as u64 / 1000) as u32;\n  178 | \t} else {\n  179 | \t\tlog::warn!(\"Nominal bitrate = 0, estimating bitrate from file length\");\n  180 | \n  181 | \t\tproperties.overall_bitrate = file_length.saturating_mul(8).div_round(length) as u32;\n  182 | \t\tproperties.audio_bitrate = stream_length.saturating_mul(8).div_round(length) as u32;\n  183 | \t}","lines":26}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`parse_data_inner` uses a hard `assert!` (active in release builds) on parser-derived offsets:\n`assert!(atom_end >= position, ...)`. `atom_end = atom_info.start + atom_info.len`. If a previously\nparsed atom advanced the reader past the computed `atom_end` (a \"size mismatch\" the code admits can\nhappen), this panics on untrusted input rather than returning a recoverable error. A library\nparsing untrusted files should never abort the process.","fix":"Replace the `assert!` with a graceful error/early-return: `if atom_end < position { return Ok(None); }` (or `err!(SizeMismatch)`).","locations":[{"ref":"lofty/src/mp4/ilst/read.rs:241-248","code":"  241 | \tlet atom_end = atom_info.start + atom_info.len;\n  242 | \tlet position = reader.stream_position()?;\n  243 | \tassert!(\n  244 | \t\tatom_end >= position,\n  245 | \t\t\"uncaught size mismatch, reader position: {position} (expected <= {atom_end})\",\n  246 | \t);\n  247 | \n  248 | \tlet to_read = atom_end - position;","lines":8}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`write_free_atom` computes `size - ATOM_HEADER_LEN as u32` (size - 8). When called from `pad_atom`\nwith a `preferred_padding` taken from `WriteOptions` that is less than 8, this underflows, panicking\nin debug builds and producing a gigantic `try_vec` allocation request (which then fails) in release.\nThe `write_options.preferred_padding` value is caller-controlled and not validated to be >= 8.","fix":"Reject/round-up `preferred_padding < ATOM_HEADER_LEN` before calling `write_free_atom`, or use `size.checked_sub(ATOM_HEADER_LEN as u32)` and error on `None`.","locations":[{"ref":"lofty/src/mp4/ilst/write.rs:420-428","code":"  420 | fn write_free_atom<W>(writer: &mut W, size: u32) -> Result<()>\n  421 | where\n  422 | \tW: Write,\n  423 | {\n  424 | \twriter.write_u32::<BigEndian>(size)?;\n  425 | \twriter.write_all(b\"free\")?;\n  426 | \twriter.write_all(&try_vec![1; (size - ATOM_HEADER_LEN as u32) as usize])?;\n  427 | \tOk(())\n  428 | }","lines":9},{"ref":"lofty/src/mp4/ilst/write.rs:401-417","code":"  401 | \tlet Some(preferred_padding) = write_options.preferred_padding else {\n  402 | \t\tlog::trace!(\"Cannot avoid offset update, not padding atom\");\n  403 | \t\treturn Ok((atom_size_difference, 0));\n  404 | \t};\n  405 | \n  406 | \tlog::trace!(\n  407 | \t\t\"Cannot avoid offset update, padding atom with {} bytes\",\n  408 | \t\tpreferred_padding\n  409 | \t);\n  410 | \n  411 | \t// Otherwise, we'll have to just pad the default amount,\n  412 | \t// and update the offsets.\n  413 | \twrite_free_atom(writer, preferred_padding)?;\n  414 | \tatom_size_difference += i64::from(preferred_padding);\n  415 | \tpadding_size = u64::from(preferred_padding);\n  416 | \n  417 | \tOk((atom_size_difference, padding_size))","lines":17}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`mp4a_properties` reads a 16-bit channel count from the file and computes\n`stsd.read_u16()? as u8 + 1`. The `as u8` truncates, and `+ 1` overflows `u8` (panics in debug,\nwraps to 0 in release) whenever the low byte of the read value is 0xFF. This is in the ALS branch\nand is driven entirely by untrusted stream data.","fix":"Use `(stsd.read_u16()? as u8).saturating_add(1)` or compute in a wider type and clamp.","locations":[{"ref":"lofty/src/mp4/properties.rs:833","code":"  833 | \t\t\t\t\t\tproperties.channels = stsd.read_u16()? as u8 + 1;","lines":1}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Picture::mimetype_from_bin` unconditionally indexes `bytes[..8]`, which panics if it is ever called with a slice shorter than 8 bytes. It is `pub(crate)` and the GIF/TIFF/PNG arms only need prefixes, so the `..8` requirement is an implicit, undocumented precondition rather than an intrinsic need. Current callers happen to pass >= 8 bytes, but this is a fragile latent panic for a shared helper that parses untrusted magic bytes.","fix":"Guard with `if bytes.len() < 8 { err!(NotAPicture) }` at the top, or match on `bytes` directly with slice patterns instead of slicing `bytes[..8]`.","locations":[{"ref":"lofty/src/picture.rs:956-965","code":"  956 | \tpub(crate) fn mimetype_from_bin(bytes: &[u8]) -> Result<MimeType> {\n  957 | \t\tmatch bytes[..8] {\n  958 | \t\t\t[0x89, b'P', b'N', b'G', 0x0D, 0x0A, 0x1A, 0x0A] => Ok(MimeType::Png),\n  959 | \t\t\t[0xFF, 0xD8, ..] => Ok(MimeType::Jpeg),\n  960 | \t\t\t[b'G', b'I', b'F', 0x38, 0x37 | 0x39, b'a', ..] => Ok(MimeType::Gif),\n  961 | \t\t\t[b'B', b'M', ..] => Ok(MimeType::Bmp),\n  962 | \t\t\t[b'I', b'I', b'*', 0x00, ..] | [b'M', b'M', 0x00, b'*', ..] => Ok(MimeType::Tiff),\n  963 | \t\t\t_ => err!(NotAPicture),\n  964 | \t\t}\n  965 | \t}","lines":10}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`lookup_resolver` panics with `unwrap()`/`panic!` when an unregistered custom `FileType` is encountered, and is called from `Probe::read_inner` (probe.rs:490). While the panic is documented on `Probe::read`, a library parsing untrusted files reaching a hard `panic!` from the normal read path is hostile to callers who cannot guarantee resolver registration ordering. The mutex `unwrap()` additionally turns a poisoned lock into a panic.","fix":"Return a `Result`/`err!(UnknownFormat)` for the missing-resolver case instead of `panic!`, and handle a poisoned mutex gracefully rather than `unwrap()`.","locations":[{"ref":"lofty/src/resolve.rs:41-52","code":"   41 | pub(crate) fn lookup_resolver(name: &'static str) -> &'static dyn ObjectSafeFileResolver {\n   42 | \tlet res = CUSTOM_RESOLVERS.lock().unwrap();\n   43 | \n   44 | \tif let Some(resolver) = res.get(name).copied() {\n   45 | \t\treturn resolver;\n   46 | \t}\n   47 | \n   48 | \tpanic!(\n   49 | \t\t\"Encountered an unregistered custom `FileType` named `{}`\",\n   50 | \t\tname\n   51 | \t);\n   52 | }","lines":12},{"ref":"lofty/src/probe.rs:485-492","code":"  485 | \t\t\t\tFileType::Custom(c) => {\n  486 | \t\t\t\t\tif !unsafe { global_options().use_custom_resolvers } {\n  487 | \t\t\t\t\t\terr!(UnknownFormat)\n  488 | \t\t\t\t\t}\n  489 | \n  490 | \t\t\t\t\tlet resolver = crate::resolve::lookup_resolver(c);\n  491 | \t\t\t\t\tresolver.read_from(reader, options)?\n  492 | \t\t\t\t},","lines":8}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`flush_page` contains `debug_assert!(self.pos <= self.current_packet_len as u64)` and `debug_assert!(full_segments_occupied <= MAX_WRITTEN_SEGMENT_COUNT)`, and relies on `self.last_segment_size.expect(..)`. While `paginate` is fed internal packet slices in normal use, `Packets::paginate`/`write_to` are public APIs that paginate content whose recorded packet sizes can be set arbitrarily via `Packets::set`. A packet whose size exceeds the actual content, or content larger than expected, could trip the debug assertions (panic in debug builds) or push an incorrect segment table. The invariants are enforced only by debug_assert, so release builds emit a malformed page instead.","fix":"Validate packet lengths against available content before paginating, and return a `PageError` instead of relying on debug_assert for invariants that depend on externally controllable sizes.","locations":[{"ref":"ogg_pager/src/paginate.rs:82-101","code":"   82 | \t\tdebug_assert!(self.pos <= self.current_packet_len as u64);\n   83 | \n   84 | \t\tif self.flags.packet_finished_on_page {\n   85 | \t\t\theader.abgp = self.abgp;\n   86 | \t\t} else {\n   87 | \t\t\t// A special value of '-1' (in two's complement) indicates that no packets\n   88 | \t\t\t// finish on this page.\n   89 | \t\t\theader.abgp = 1_u64.wrapping_neg()\n   90 | \t\t}\n   91 | \n   92 | \t\tdebug_assert!(full_segments_occupied <= MAX_WRITTEN_SEGMENT_COUNT);\n   93 | \t\theader.segments = vec![255; full_segments_occupied];\n   94 | \n   95 | \t\tif full_segments_occupied != MAX_WRITTEN_SEGMENT_COUNT {\n   96 | \t\t\t// End of the packet\n   97 | \t\t\tlet last_segment_size = self\n   98 | \t\t\t\t.last_segment_size\n   99 | \t\t\t\t.expect(\"fresh packet should be indicated at this point\");\n  100 | \t\t\theader.segments.push(last_segment_size);\n  101 | \t\t}","lines":20}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`PacketsIter::next` indexes `self.packet_sizes[0]` and slices `self.content.split_at(packet_size as usize)` based on the recorded sizes. This relies on the invariant that the sum of `packet_sizes` equals `content.len()`. If a prior `Packets::set` desynchronized that invariant, `split_at` panics (index out of bounds). The iterator trusts `cap`/`packet_sizes[0]` without checking against the remaining content length.","fix":"Use `split_at_checked` (or guard `packet_size <= self.content.len()`) and stop iterating gracefully on mismatch.","locations":[{"ref":"ogg_pager/src/packets.rs:422-436","code":"  422 | \tfn next(&mut self) -> Option<Self::Item> {\n  423 | \t\tif self.cap == 0 {\n  424 | \t\t\treturn None;\n  425 | \t\t}\n  426 | \n  427 | \t\tlet packet_size = self.packet_sizes[0];\n  428 | \n  429 | \t\tself.cap -= 1;\n  430 | \t\tself.packet_sizes = &self.packet_sizes[1..];\n  431 | \n  432 | \t\tlet (ret, remaining) = self.content.split_at(packet_size as usize);\n  433 | \t\tself.content = remaining;\n  434 | \n  435 | \t\tSome(ret)\n  436 | \t}","lines":15}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"`write_riff_info` uses the RIFF size field read straight from the file (`original_stream_length`, a `u32`) in unchecked arithmetic. `verify_wav` returns this value with no lower-bound validation. At line 50 `original_stream_length - 4` underflows (panic in debug, wraps to ~4G in release) for any file whose RIFF size field is 0..=3. The wrapped value is then passed to `find_info_list` as `file_size`, corrupting chunk parsing. This is reachable when saving a RIFF INFO tag to a crafted/truncated WAV.","fix":"Validate `original_stream_length >= 4` (and ideally that it is consistent with the real file length) right after `verify_wav`, bailing with a decode/size-mismatch error otherwise. Use `checked_sub`/`saturating_sub` instead of `-`.","locations":[{"ref":"lofty/src/iff/wav/tag/write.rs:47-51","code":"   47 | \tlet Some(original_info_list_size) = find_info_list(\n   48 | \t\t&mut file_bytes,\n   49 | \t\tu64::from(original_stream_length - 4),\n   50 | \t\tparse_options.parsing_mode,\n   51 | \t)?","lines":5},{"ref":"lofty/src/iff/wav/read.rs:15-32","code":"   15 | pub(crate) fn verify_wav<T>(data: &mut T) -> Result<u32>\n   16 | where\n   17 | \tT: Read + Seek,\n   18 | {\n   19 | \tlet mut id = [0; 12];\n   20 | \tdata.read_exact(&mut id)?;\n   21 | \n   22 | \tif &id[..4] != b\"RIFF\" {\n   23 | \t\tdecode_err!(@BAIL Wav, \"WAV file doesn't contain a RIFF chunk\");\n   24 | \t}\n   25 | \n   26 | \tif &id[8..] != b\"WAVE\" {\n   27 | \t\tdecode_err!(@BAIL Wav, \"Found RIFF file, format is not WAVE\");\n   28 | \t}\n   29 | \n   30 | \tlog::debug!(\"File verified to be WAV\");\n   31 | \tOk(u32::from_le_bytes(id[4..8].try_into().unwrap()))\n   32 | }","lines":18}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"`duration` is read directly from the file's `mdhd` atom (u64 for version 1, u32 for version 0)\nand is then used in `duration * 1000` before being passed to `div_round`. A crafted version-1\n`mdhd` with a large duration makes `duration * 1000` overflow `u64`, which panics in debug builds\nand silently wraps in release builds, producing a nonsensical duration. `div_round` itself\n(`self + (rhs >> 1)`) can also overflow on top of that. This is reachable from untrusted input.","fix":"Use checked/saturating arithmetic or compute in u128: `u128::from(duration) * 1000` then divide, before converting back. Clamp the result to a sane range.","locations":[{"ref":"lofty/src/mp4/properties.rs:620-623","code":"  620 | \tif timescale > 0 {\n  621 | \t\tlet duration_millis = (duration * 1000).div_round(u64::from(timescale));\n  622 | \t\tproperties.duration = Duration::from_millis(duration_millis);\n  623 | \t}","lines":4},{"ref":"lofty/src/mp4/properties.rs:375-392","code":"  375 | \t\tlet (timescale, duration) = if version == 1 {\n  376 | \t\t\t// We don't care about these two values\n  377 | \t\t\tlet _creation_time = reader.read_u64()?;\n  378 | \t\t\tlet _modification_time = reader.read_u64()?;\n  379 | \n  380 | \t\t\tlet timescale = reader.read_u32()?;\n  381 | \t\t\tlet duration = reader.read_u64()?;\n  382 | \n  383 | \t\t\t(timescale, duration)\n  384 | \t\t} else {\n  385 | \t\t\tlet _creation_time = reader.read_u32()?;\n  386 | \t\t\tlet _modification_time = reader.read_u32()?;\n  387 | \n  388 | \t\t\tlet timescale = reader.read_u32()?;\n  389 | \t\t\tlet duration = reader.read_u32()?;\n  390 | \n  391 | \t\t\t(timescale, u64::from(duration))\n  392 | \t\t};","lines":18},{"ref":"lofty/src/util/math.rs:18-20","code":"   18 | \t\t\t\tfn div_round(self, rhs: Self) -> Self::Output {\n   19 | \t\t\t\t\t(self + (rhs >> 1)) / rhs\n   20 | \t\t\t\t}","lines":3}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"`skip_atom` casts a 64-bit atom length down to `u32` before seeking: `i64::from(len as u32) - 8`.\n`len` can legitimately exceed `u32::MAX` - e.g. the \"extends to end of file\" case in\n`AtomInfo::read` (len_raw == 0) sets `len = end - pos`, and extended 64-bit atoms can carry any\nu64. The truncation makes the reader seek to the wrong offset (a tiny fraction of the real atom\nlength), corrupting all subsequent parsing instead of correctly skipping the atom.","fix":"Seek using the full u64 length: `reader.seek(SeekFrom::Current(i64::try_from(len - 8).map_err(...)?))?;` and error (or saturate) when the length does not fit in `i64`, mirroring the extended branch.","locations":[{"ref":"lofty/src/mp4/read/mod.rs:96-105","code":"   96 | pub(super) fn skip_atom<R>(reader: &mut R, extended: bool, len: u64) -> Result<()>\n   97 | where\n   98 | \tR: Read + Seek,\n   99 | {\n  100 | \tlog::trace!(\"Attempting to skip {} bytes\", len - 8);\n  101 | \n  102 | \tif !extended {\n  103 | \t\treader.seek(SeekFrom::Current(i64::from(len as u32) - 8))?;\n  104 | \t\treturn Ok(());\n  105 | \t}","lines":10},{"ref":"lofty/src/mp4/atom_info.rs:159-172","code":"  159 | \t\tlet (len, extended) = match len_raw {\n  160 | \t\t\t// The atom extends to the end of the file\n  161 | \t\t\t0 => {\n  162 | \t\t\t\tlet pos = data.stream_position()?;\n  163 | \t\t\t\tlet end = data.seek(SeekFrom::End(0))?;\n  164 | \n  165 | \t\t\t\tdata.seek(SeekFrom::Start(pos))?;\n  166 | \n  167 | \t\t\t\t(end - pos, false)\n  168 | \t\t\t},\n  169 | \t\t\t// There's an extended length\n  170 | \t\t\t1 => (data.read_u64::<BigEndian>()?, true),\n  171 | \t\t\t_ => (len_raw, false),\n  172 | \t\t};","lines":14}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In `PictureInformation::from_jpeg`, the per-section skip computes `section_len - 2` where `section_len` is a `u16` read from untrusted input inside the loop (line 451). Unlike the first read (lines 443-446, which guards against `< 2` via `overflowing_sub`), this subtraction is unchecked. A crafted JPEG with a section length of 0 or 1 causes a `u16` underflow: panic in debug builds, and in release it wraps to a huge value passed to `seek`, breaking parsing. Reachable from untrusted picture data.","fix":"Use `section_len.checked_sub(2)` (or `overflowing_sub` like the earlier code) and bail with `err!(NotAPicture)` on underflow.","locations":[{"ref":"lofty/src/picture.rs:451-477","code":"  451 | \t\t\tsection_len = reader.read_u16::<BigEndian>()?;\n  452 | \n  453 | \t\t\t// This marks the SOS (Start of Scan), which is\n  454 | \t\t\t// the end of the header\n  455 | \t\t\tif marker == 0xDA {\n  456 | \t\t\t\tbreak;\n  457 | \t\t\t}\n  458 | \n  459 | \t\t\t// We are looking for a frame with a \"SOFn\" marker,\n  460 | \t\t\t// with `n` either being 0 or 2. Since there isn't a\n  461 | \t\t\t// header like PNG, we actually need to search for this\n  462 | \t\t\t// frame\n  463 | \t\t\tif marker == 0xC0 || marker == 0xC2 {\n  464 | \t\t\t\tlet precision = reader.read_u8()?;\n  465 | \t\t\t\tlet height = u32::from(reader.read_u16::<BigEndian>()?);\n  466 | \t\t\t\tlet width = u32::from(reader.read_u16::<BigEndian>()?);\n  467 | \t\t\t\tlet components = reader.read_u8()?;\n  468 | \n  469 | \t\t\t\treturn Ok(Self {\n  470 | \t\t\t\t\twidth,\n  471 | \t\t\t\t\theight,\n  472 | \t\t\t\t\tcolor_depth: u32::from(precision * components),\n  473 | \t\t\t\t\tnum_colors: 0,\n  474 | \t\t\t\t});\n  475 | \t\t\t}\n  476 | \n  477 | \t\t\treader.seek(SeekFrom::Current(i64::from(section_len - 2)))?;","lines":27}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"`PictureInformation::from_jpeg` computes `color_depth: u32::from(precision * components)` where both `precision` and `components` are `u8` read directly from untrusted JPEG bytes. The SOF marker allows `precision` up to 16 and `components` up to 255 (and an attacker can put any byte there), so `precision * components` routinely exceeds 255. The multiplication is done in `u8`, so it panics on overflow in debug builds and silently wraps (producing a wrong color depth) in release. `from_jpeg` is reachable from `PictureInformation::from_picture` and FLAC/Vorbis picture parsing on untrusted input.","fix":"Promote before multiplying: `color_depth: u32::from(precision) * u32::from(components)`.","locations":[{"ref":"lofty/src/picture.rs:464-474","code":"  464 | \t\t\t\tlet precision = reader.read_u8()?;\n  465 | \t\t\t\tlet height = u32::from(reader.read_u16::<BigEndian>()?);\n  466 | \t\t\t\tlet width = u32::from(reader.read_u16::<BigEndian>()?);\n  467 | \t\t\t\tlet components = reader.read_u8()?;\n  468 | \n  469 | \t\t\t\treturn Ok(Self {\n  470 | \t\t\t\t\twidth,\n  471 | \t\t\t\t\theight,\n  472 | \t\t\t\t\tcolor_depth: u32::from(precision * components),\n  473 | \t\t\t\t\tnum_colors: 0,\n  474 | \t\t\t\t});","lines":11}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `RelativeVolumeAdjustmentFrame::as_bytes`, when a channel's `peak_volume` is longer than the\nbyte count implied by `bits_representing_peak`, the code recalculates `bits_representing_peak` (a\n`u8`) by summing `b.leading_ones()` over up to 32 peak bytes. Each `leading_ones()` returns 0..=8,\nso the sum can reach 32*8 = 256, which overflows the `u8` accumulator and panics in debug builds\n(wraps in release). A `RelativeVolumeAdjustmentFrame` with a large `peak_volume` and a small\n`bits_representing_peak` is enough to trigger this. The comment \"Max out at 255 bits\" is also\nmisleading: nothing caps the value at 255.","fix":"Use a saturating/checked accumulator and actually cap at 255, e.g.:\n\n```rust\nlet mut total = 0u16;\nfor b in peak.iter().copied().take(32) {\n    total += u16::from(b.leading_ones() as u8);\n}\nbits_representing_peak = u8::try_from(total).unwrap_or(u8::MAX);\n```\n\nAlso reconsider the semantics: summing `leading_ones()` per byte is almost certainly not the\nintended \"number of bits representing the peak\".","locations":[{"ref":"lofty/src/id3/v2/items/relative_volume_adjustment_frame.rs:235-246","code":"  235 | \t\t\t\tif peak.len() > expected_peak_byte_length as usize {\n  236 | \t\t\t\t\t// Recalculate bits representing peak\n  237 | \t\t\t\t\tbits_representing_peak = 0;\n  238 | \n  239 | \t\t\t\t\t// Max out at 255 bits\n  240 | \t\t\t\t\tfor b in peak.iter().copied().take(32) {\n  241 | \t\t\t\t\t\tbits_representing_peak += b.leading_ones() as u8;\n  242 | \t\t\t\t\t}\n  243 | \t\t\t\t}\n  244 | \n  245 | \t\t\t\tcontent.push(bits_representing_peak);\n  246 | \t\t\t\tcontent.extend(peak.iter().take(32));","lines":12}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `write_riff_info` several `u32` additions on file-derived sizes can overflow. Line 39 `original_stream_length + IFF_CHUNK_HEADER_SIZE` and line 62 `original_stream_length + IFF_CHUNK_HEADER_SIZE` are computed in `u32` before the `as usize` cast; a large RIFF size field (close to `u32::MAX`) overflows (debug panic / release wrap) producing a bogus offset that is then used to index/seek into the in-memory file buffer.","fix":"Perform these additions in `u64` (e.g. `u64::from(original_stream_length) + u64::from(IFF_CHUNK_HEADER_SIZE)`) and compare against the actual buffer length, or use `checked_add` and bail on overflow.","locations":[{"ref":"lofty/src/iff/wav/tag/write.rs:39","code":"   39 | \tif file_bytes.get_ref().len() < (original_stream_length + IFF_CHUNK_HEADER_SIZE) as usize {","lines":1},{"ref":"lofty/src/iff/wav/tag/write.rs:62-63","code":"   62 | \t\tlet tag_position = (original_stream_length + IFF_CHUNK_HEADER_SIZE) as usize;\n   63 | \t\tfile_bytes.seek(SeekFrom::Start(tag_position as u64))?;","lines":2}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"On the write path, `moov` size is recomputed as `(moov_len - existing_udta_size) + new_udta_size`,\nand in `save_to_existing` `*new_udta_size = (udta.len - meta.len) + new_meta_size`. These assume the\nchild atom (`udta`/`meta`) length is <= its parent length. A malformed file where a child reports a\nlength larger than its parent makes these subtractions underflow (panic in debug, wrap in release).\nThe file has already been fully read into memory, so this is a robustness/panic bug rather than a\nmemory-safety one.","fix":"Use checked subtraction and return a `FileEncodingError` when a child atom's size exceeds its parent's.","locations":[{"ref":"lofty/src/mp4/ilst/write.rs:195","code":"  195 | \tlet new_moov_length = (moov_len - existing_udta_size) + new_udta_size;","lines":1},{"ref":"lofty/src/mp4/ilst/write.rs:343","code":"  343 | \t\t*new_udta_size = (udta.len - meta.len) + new_meta_size;","lines":1}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Bitrate estimation multiplies before widening: `u128::from(mdat_len * 8)` and\n`u128::from(file_length * 8)`. The `* 8` happens in `u64` first, so the widening to `u128` is\nuseless for preventing overflow. `mdat_len` derives from an atom length (`atom.len - 8`, where\n`atom.len` can be a 64-bit extended size), so a crafted/huge `mdat` can overflow the `u64`\nmultiplication (panic in debug, wrap in release) before it is ever promoted to `u128`.","fix":"Widen first, then multiply: `u128::from(mdat_len) * 8` and `u128::from(file_length) * 8`.","locations":[{"ref":"lofty/src/mp4/properties.rs:679","code":"  679 | \t\tlet overall_bitrate = u128::from(file_length * 8) / duration_millis;","lines":1},{"ref":"lofty/src/mp4/properties.rs:685","code":"  685 | \t\t\tproperties.audio_bitrate = (u128::from(mdat_len * 8) / duration_millis) as u32;","lines":1}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Same unchecked-multiply overflow risk in the SV7 path: `stream_length * 8 * u64::from(sample_freq)`\nand `total_samples * 1000` are computed without overflow protection on attacker-controlled values.\n`frame_count` is a full u32 read from the file, so `frame_count * MPC_FRAME_LENGTH` and the\nsubsequent products can overflow u64 and panic in debug builds.","fix":"Use checked/saturating arithmetic or u128 intermediates for these products, consistent with the rest of the parser.","locations":[{"ref":"lofty/src/musepack/sv7/properties.rs:376-384","code":"  376 | \t\t\ttotal_samples = (u64::from(properties.frame_count) * MPC_FRAME_LENGTH)\n  377 | \t\t\t\t- (MPC_FRAME_LENGTH - u64::from(properties.last_frame_length));\n  378 | \t\t} else {\n  379 | \t\t\ttotal_samples =\n  380 | \t\t\t\t(u64::from(properties.frame_count) * MPC_FRAME_LENGTH) - MPC_DECODER_SYNTH_DELAY;\n  381 | \t\t}\n  382 | \n  383 | \t\tproperties.average_bitrate = ((stream_length * 8 * u64::from(properties.sample_freq))\n  384 | \t\t\t/ (total_samples * 1000)) as u32;","lines":9}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Unchecked u64 multiplications on attacker-controlled sample counts can overflow and panic in\ndebug builds (or silently wrap in release, producing garbage bitrate/duration). `sample_count`\nand `beginning_silence` are variable-length integers of up to 9*7 = 63 bits, so `total_samples`\ncan approach 2^63. `total_samples * 1000` (used for both duration and the bitrate divisor) and\n`stream_length * 8 * sample_rate` can overflow u64.","fix":"Use checked/saturating arithmetic (e.g. `checked_mul`) or cast to u128 for the intermediate products, and bail gracefully on overflow instead of relying on wrapping/panicking.","locations":[{"ref":"lofty/src/musepack/sv8/properties.rs:290-294","code":"  290 | \tlet length = (total_samples * 1000).div_round(u64::from(sample_rate));\n  291 | \n  292 | \tproperties.duration = Duration::from_millis(length);\n  293 | \tproperties.average_bitrate =\n  294 | \t\t((stream_length * 8 * u64::from(sample_rate)) / (total_samples * 1000)) as u32;","lines":5}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Potential subtraction underflow when computing the Opus stream length: `let stream_len = file_length - header_size as u64;` where `header_size = identification_packet.len() + metadata_packet.len()`. The two packet lengths are derived from parsed packet data, while `file_length` comes from seeking to the end. There is no guarantee `header_size <= file_length` for a malformed/crafted file (e.g. packets reconstructed from overlapping/duplicated pages), so this can underflow and panic in debug builds (or wrap to a huge value in release, producing a nonsense bitrate).","fix":"Use `file_length.saturating_sub(header_size as u64)`.","locations":[{"ref":"lofty/src/ogg/opus/properties.rs:141-143","code":"  141 | \t\t\tlet header_size = identification_packet.len() + metadata_packet.len();\n  142 | \n  143 | \t\t\tlet stream_len = file_length - header_size as u64;","lines":3}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Unchecked subtraction on externally-derived APE tag size, inconsistent with every other size adjustment in\nthe same function. `find_id3v1` (line 26) and `find_lyrics3v2` (line 35) both use `checked_sub` and bail with\n`SizeMismatch` on underflow, but the APE-tag branch uses a plain `-=`. `header.size` comes directly from the\nfile's APE footer and can exceed `stream_length`, causing a debug-build panic ('attempt to subtract with\noverflow') or a wrapped huge `stream_length` in release, which then poisons the bitrate/duration math\n(`stream_length * 8 / length`) in `read_properties`.","fix":"Use `checked_sub` for the APE size too, matching the surrounding code:\n`let Some(new) = stream_length.checked_sub(u64::from(header.size)) else { err!(SizeMismatch); };\nstream_length = new;`","locations":[{"ref":"lofty/src/wavpack/read.rs:48-51","code":"   48 | \tif let (tag, Some(header)) = crate::ape::tag::read::read_ape_tag(reader, true, parse_options)? {\n   49 | \t\tstream_length -= u64::from(header.size);\n   50 | \t\tape_tag = tag;\n   51 | \t}","lines":4}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `Packets::paginate`, each packet slice is taken as `&self.content[pos..pos + packet_size as usize]` and `pos` is advanced by `packet_size as usize`. `packet_sizes` is `Vec<u64>` and `set()` writes arbitrary user-supplied content lengths into it. If the recorded packet sizes ever exceed `content.len()` (which `set` does not re-validate against the actual content vec, and which can drift after multiple `set` calls), the slice index panics. The sum of packet sizes is assumed to equal `content.len()` but nothing enforces this invariant.","fix":"Slice defensively with bounds checks (e.g. `content.get(pos..pos + size)`), or maintain/verify the invariant that `packet_sizes.iter().sum() == content.len()` after every mutation.","locations":[{"ref":"ogg_pager/src/packets.rs:341-351","code":"  341 | \tpub fn paginate(&self, stream_serial: u32, abgp: u64, flags: u8) -> Result<Vec<Page>> {\n  342 | \t\tlet mut packets = Vec::new();\n  343 | \n  344 | \t\tlet mut pos = 0;\n  345 | \t\tfor packet_size in self.packet_sizes.iter().copied() {\n  346 | \t\t\tpackets.push(&self.content[pos..pos + packet_size as usize]);\n  347 | \t\t\tpos += packet_size as usize;\n  348 | \t\t}\n  349 | \n  350 | \t\tpaginate(packets, stream_serial, abgp, flags)\n  351 | \t}","lines":11},{"ref":"ogg_pager/src/packets.rs:278-290","code":"  278 | \tpub fn set(&mut self, idx: usize, content: impl Into<Vec<u8>>) -> bool {\n  279 | \t\tlet Some(range) = self.packet_span(idx) else {\n  280 | \t\t\treturn false;\n  281 | \t\t};\n  282 | \n  283 | \t\tlet content = content.into();\n  284 | \t\tlet content_size = content.len();\n  285 | \n  286 | \t\tself.content.splice(range, content);\n  287 | \t\tself.packet_sizes[idx] = content_size as u64;\n  288 | \n  289 | \t\ttrue\n  290 | \t}","lines":13}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Accumulating per-frame AAC bitrates into a `u32` can overflow. `first_frame_header.bitrate` is a `u32` and\nthe loop does `first_frame_header.bitrate += header.bitrate` once per frame across the entire file before\ndividing by `frame_count`. Each `header.bitrate` is a few hundred (e.g. ~344 for a typical 44.1 kHz frame),\nso a file with on the order of ~12M frames overflows `u32`, panicking in debug builds and wrapping in\nrelease (yielding a nonsensical average bitrate and thus a wrong duration). A crafted/large file can trigger\nthis on untrusted input.","fix":"Accumulate into a `u64` (or use a running average) and only down-cast after dividing by `frame_count`, e.g.\n`let mut bitrate_sum = u64::from(first_frame_header.bitrate); ... bitrate_sum += u64::from(header.bitrate);`\nthen `first_frame_header.bitrate = (bitrate_sum / u64::from(frame_count)) as u32;`.","locations":[{"ref":"lofty/src/aac/read.rs:139-148","code":"  139 | \t\tlet mut frame_count = 1;\n  140 | \n  141 | \t\twhile let Some((header, frame_end)) = find_next_frame(reader, parse_mode)? {\n  142 | \t\t\tfirst_frame_header.bitrate += header.bitrate;\n  143 | \t\t\tframe_count += 1u32;\n  144 | \n  145 | \t\t\treader.seek(SeekFrom::Start(frame_end))?;\n  146 | \t\t}\n  147 | \n  148 | \t\tfirst_frame_header.bitrate /= frame_count;","lines":10}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Silent truncation of item value lengths to u32 when serializing an APE tag. `value.len() as u32`\ntruncates on 64-bit platforms if a single item value is >= 4 GiB; the full (non-truncated) bytes are\nthen written via `write_all`, producing a tag whose declared value_size disagrees with the bytes\npresent. The aggregate `size + 32 > u32::MAX` check at line 209 happens only after the per-item size\nfields are already written with truncated values, so it does not catch this per-item case.","fix":"Validate each item value length against u32::MAX before casting and bail with `err!(TooMuchData)` if exceeded.","locations":[{"ref":"lofty/src/ape/tag/write.rs:177-202","code":"  177 | \t\tlet (mut flags, value) = match item.value {\n  178 | \t\t\tItemValueRef::Binary(value) => {\n  179 | \t\t\t\ttag_write.write_u32::<LittleEndian>(value.len() as u32)?;\n  180 | \n  181 | \t\t\t\t(1_u32 << 1, value)\n  182 | \t\t\t},\n  183 | \t\t\tItemValueRef::Text(ref value) => {\n  184 | \t\t\t\ttag_write.write_u32::<LittleEndian>(value.len() as u32)?;\n  185 | \n  186 | \t\t\t\t(0_u32, value.as_bytes())\n  187 | \t\t\t},\n  188 | \t\t\tItemValueRef::Locator(value) => {\n  189 | \t\t\t\ttag_write.write_u32::<LittleEndian>(value.len() as u32)?;\n  190 | \n  191 | \t\t\t\t(2_u32 << 1, value.as_bytes())\n  192 | \t\t\t},\n  193 | \t\t};\n  194 | \n  195 | \t\tif item.read_only {\n  196 | \t\t\tflags |= 1_u32\n  197 | \t\t}\n  198 | \n  199 | \t\ttag_write.write_u32::<LittleEndian>(flags)?;\n  200 | \t\ttag_write.write_all(item.key.as_bytes())?;\n  201 | \t\ttag_write.write_u8(0)?;\n  202 | \t\ttag_write.write_all(value)?;","lines":26}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Frame body length is taken as `value.len() as u32` (and `len + 1` for grouping identity), a\ntruncating cast of a usize. For a frame body larger than 4 GiB the written size wraps, and `len + 1`\ncan overflow to 0 if `len == u32::MAX`. `synch()` later rejects values above the 28-bit limit, but\nonly after the truncation has already happened, so the synchsafe guard can be defeated by a value\nthat wraps below the limit.","fix":"Use try_into::<u32>() on value.len() and on the +1 result, returning TooMuchData on overflow, before encoding the size.","locations":[{"ref":"lofty/src/id3/v2/write/frame.rs:296-305","code":"  296 | \tlet len = value.len() as u32;\n  297 | \tlet is_grouping_identity = flags.grouping_identity.is_some();\n  298 | \n  299 | \twrite_frame_header(\n  300 | \t\twriter,\n  301 | \t\tname,\n  302 | \t\tif is_grouping_identity { len + 1 } else { len },\n  303 | \t\tflags,\n  304 | \t\twrite_options,\n  305 | \t)?;","lines":10}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"The final ID3v2 tag size is computed as `extended_header_len + len as u32` where `len` is a usize\nderived from the actual encoded byte length. The `len as u32` cast silently truncates on 64-bit\ntargets for tags larger than 4 GiB, and the addition can wrap in release builds before `.synch()`\ngets a chance to reject an oversized value. While `.synch()` ultimately rejects anything above the\n28-bit synchsafe limit, it is fed an already-truncated/wrapped value, so a pathologically large tag\ncould pass the synchsafe check with a bogus small size.","fix":"Keep the running length as u64/usize, check it against the synchsafe maximum (0x0FFF_FFFF) before casting, and error with TooMuchData otherwise.","locations":[{"ref":"lofty/src/id3/v2/write/mod.rs:132-144","code":"  132 | \tlet mut len = id3v2.get_ref().len() - header_len;\n  133 | \n  134 | \t// https://mutagen-specs.readthedocs.io/en/latest/id3/id3v2.4.0-structure.html#padding:\n  135 | \t//\n  136 | \t// \"[A tag] MUST NOT have any padding when a tag footer is added to the tag\"\n  137 | \tlet padding_len = write_options.preferred_padding.unwrap_or(0) as usize;\n  138 | \tif !has_footer {\n  139 | \t\tlen += padding_len;\n  140 | \t}\n  141 | \n  142 | \t// Go back to the start and write the final size\n  143 | \tid3v2.seek(SeekFrom::Start(6))?;\n  144 | \tid3v2.write_u32::<BigEndian>((extended_header_len + len as u32).synch()?)?;","lines":13}]},{"id":"OVF_19","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`Chunk`'s `Seek` impl casts the adjusted remaining sizes back to unsigned without range checks: `(*self.file_remaining_size as i64 - delta) as u64` and `(i64::from(*self.chunk_remaining_size) - delta) as u32`. A seek that moves the inner `Take` limit such that `delta` exceeds the current `chunk_remaining_size` yields a negative intermediate that wraps to a huge `u32`/`u64`, corrupting the bookkeeping used to bound subsequent reads. Also `file_remaining_size as i64` can itself be wrong for very large files (>i64::MAX, not reachable in practice).","fix":"Use checked/saturating signed-to-unsigned conversions (e.g. clamp the result to 0) and assert the delta stays within the chunk bounds, mirroring the saturating logic used in the `Read` impl.","locations":[{"ref":"lofty/src/iff/chunk.rs:303-315","code":"  303 | impl<R: Seek> Seek for Chunk<'_, R> {\n  304 | \tfn seek(&mut self, pos: SeekFrom) -> std::io::Result<u64> {\n  305 | \t\tlet old_limit = self.reader.limit();\n  306 | \t\tlet ret = self.reader.seek(pos)?;\n  307 | \t\tlet new_limit = self.reader.limit();\n  308 | \n  309 | \t\tlet delta = (old_limit as i64) - (new_limit as i64);\n  310 | \n  311 | \t\t*self.file_remaining_size = (*self.file_remaining_size as i64 - delta) as u64;\n  312 | \t\t*self.chunk_remaining_size = (i64::from(*self.chunk_remaining_size) - delta) as u32;\n  313 | \n  314 | \t\tOk(ret)\n  315 | \t}","lines":13}]},{"id":"OVF_20","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"WAV `fmt ` parsing silently truncates 16-bit fields to 8 bits. `channels` is read as `u16` then stored as `channels as u8` (line 142); a file declaring >255 channels wraps to a wrong small value rather than being rejected. Likewise `bit_depth` is produced via `valid_bits_per_sample as u8` / `bits_per_sample as u8` (lines 213-214), truncating depths >255. These are externally controlled values from the chunk.","fix":"Validate the `u16` channel count / bit depth against the `u8` range (or widen the public field types) and bail with a decode error on out-of-range values instead of truncating.","locations":[{"ref":"lofty/src/iff/wav/properties.rs:140-148","code":"  140 | \tlet mut fmt_chunk = FmtChunk {\n  141 | \t\tformat_tag,\n  142 | \t\tchannels: channels as u8,\n  143 | \t\tsample_rate,\n  144 | \t\tbytes_per_second,\n  145 | \t\tblock_align,\n  146 | \t\tbits_per_sample,\n  147 | \t\textensible_info: None,\n  148 | \t};","lines":9},{"ref":"lofty/src/iff/wav/properties.rs:209-216","code":"  209 | \tmatch extensible_info {\n  210 | \t\tSome(ExtensibleFmtChunk {\n  211 | \t\t\tvalid_bits_per_sample,\n  212 | \t\t\t..\n  213 | \t\t}) if valid_bits_per_sample > 0 => bit_depth = valid_bits_per_sample as u8,\n  214 | \t\t_ if bits_per_sample > 0 => bit_depth = bits_per_sample as u8,\n  215 | \t\t_ => bit_depth = bytes_per_sample.saturating_mul(8) as u8,\n  216 | \t}","lines":8}]},{"id":"OVF_21","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`total_samples * 1000` can overflow `u64` for an attacker-controlled granule position close to `u64::MAX`. In debug builds this panics; in release it wraps, yielding an incorrect duration/bitrate. Vorbis avoids this by widening to `u128` before multiplying (see vorbis/properties.rs:124-129), but Opus and Speex multiply in `u64`.","fix":"Widen to `u128` before multiplying by 1000 (as Vorbis does), or use `saturating_mul`.","locations":[{"ref":"lofty/src/ogg/opus/properties.rs:135","code":"  135 | \t\t\tlet length = (total_samples * 1000).div_round(48000);","lines":1},{"ref":"lofty/src/ogg/speex/properties.rs:163","code":"  163 | \t\t\t\tlength = (total_samples * 1000).div_round(u64::from(properties.sample_rate));","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`decode_text` mishandles the explicitly-supplied BOM case for UTF-16. When `options.bom != [0,0]` (used by `key_value_frame.rs` to propagate the first string's BOM to subsequent strings that have NO BOM of their own), the code still enters the `[0xFE,0xFF]`/`[0xFF,0xFE]` match arms which always slice `&raw_bytes[2..]`, discarding the first two bytes. For a string without its own BOM this throws away the first real UTF-16 code unit, corrupting the decoded text. The first-2-bytes strip is only correct when the BOM was actually read from `raw_bytes` (the `options.bom == [0,0]` branch).","fix":"Only strip the leading 2 bytes when the BOM was auto-detected from `raw_bytes`. When `options.bom` was supplied, decode the full `raw_bytes` with the endianness implied by the supplied BOM and do not skip the first two bytes.","locations":[{"ref":"lofty/src/util/text.rs:216-239","code":"  216 | \tlet mut bom = [0, 0];\n  217 | \tlet read_string = match options.encoding {\n  218 | \t\tTextEncoding::Latin1 => latin1_decode(&raw_bytes),\n  219 | \t\tTextEncoding::UTF16 => {\n  220 | \t\t\tif raw_bytes.len() < 2 {\n  221 | \t\t\t\terr!(TextDecode(\"UTF-16 string has an invalid length (< 2)\"));\n  222 | \t\t\t}\n  223 | \n  224 | \t\t\tif raw_bytes.len() % 2 != 0 {\n  225 | \t\t\t\terr!(TextDecode(\"UTF-16 string has an odd length\"));\n  226 | \t\t\t}\n  227 | \n  228 | \t\t\tif options.bom == [0, 0] {\n  229 | \t\t\t\tbom = [raw_bytes[0], raw_bytes[1]];\n  230 | \t\t\t} else {\n  231 | \t\t\t\tbom = options.bom;\n  232 | \t\t\t}\n  233 | \n  234 | \t\t\tmatch bom {\n  235 | \t\t\t\t[0xFE, 0xFF] => utf16_decode_bytes(&raw_bytes[2..], u16::from_be_bytes)?,\n  236 | \t\t\t\t[0xFF, 0xFE] => utf16_decode_bytes(&raw_bytes[2..], u16::from_le_bytes)?,\n  237 | \t\t\t\t_ => err!(TextDecode(\"UTF-16 string has an invalid byte order mark\")),\n  238 | \t\t\t}\n  239 | \t\t},","lines":24}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The `remaining_size` bookkeeping in the APE item loop is broken, so the size guards are largely\nineffective. `remaining_size` starts at `header.size` (the whole tag including footer/header) but\nthe loop only ever subtracts 4 per item (`remaining_size -= 4` at line 37) for the value-size\nfield; it never subtracts the 4 flag bytes, the key bytes, the NUL terminator, or `value_size`\nitself. As a result `remaining_size` shrinks far slower than the data actually consumed, so the\n`remaining_size < 11` break (line 28) and the `value_size > remaining_size` check (line 33) do not\nreflect reality and provide almost no protection against a corrupt/oversized item_count or value_size.\nThe loop is only bounded by the underlying reader returning EOF.","fix":"Track remaining_size correctly: subtract 4 (value_size field) + 4 (flags) + key length + 1 (NUL) + value_size as each item is consumed, and bail when the running total exceeds header.size.","locations":[{"ref":"lofty/src/ape/tag/read.rs:25-90","code":"   25 | \tlet mut remaining_size = header.size;\n   26 | \n   27 | \tfor _ in 0..header.item_count {\n   28 | \t\tif remaining_size < 11 {\n   29 | \t\t\tbreak;\n   30 | \t\t}\n   31 | \n   32 | \t\tlet value_size = data.read_u32::<LittleEndian>()?;\n   33 | \t\tif value_size > remaining_size {\n   34 | \t\t\terr!(SizeMismatch);\n   35 | \t\t}\n   36 | \n   37 | \t\tremaining_size -= 4;\n   38 | \t\tlet flags = data.read_u32::<LittleEndian>()?;\n   39 | \n   40 | \t\tlet mut key = Vec::new();\n   41 | \t\tlet mut key_char = data.read_u8()?;\n   42 | \n   43 | \t\twhile key_char != 0 {\n   44 | \t\t\tkey.push(key_char);\n   45 | \t\t\tkey_char = data.read_u8()?;\n   46 | \t\t}\n   47 | \n   48 | \t\tlet key = utf8_decode(key)\n   49 | \t\t\t.map_err(|_| decode_err!(Ape, \"APE tag item contains a non UTF-8 key\"))?;\n   50 | \n   51 | \t\tif INVALID_KEYS.contains(&&*key.to_uppercase()) {\n   52 | \t\t\tdecode_err!(@BAIL Ape, \"APE tag item contains an illegal key\");\n   53 | \t\t}\n   54 | \n   55 | \t\tif APE_PICTURE_TYPES.contains(&&*key) && !parse_options.read_cover_art {\n   56 | \t\t\tdata.seek(SeekFrom::Current(i64::from(value_size)))?;\n   57 | \t\t\tcontinue;\n   58 | \t\t}\n   59 | \n   60 | \t\tlet read_only = (flags & 1) == 1;\n   61 | \t\tlet item_type = (flags >> 1) & 3;\n   62 | \n   63 | \t\tif value_size == 0 || key.len() < 2 || key.len() > 255 {\n   64 | \t\t\tlog::warn!(\"APE: Encountered invalid item key '{}'\", key);\n   65 | \t\t\tdata.seek(SeekFrom::Current(i64::from(value_size)))?;\n   66 | \t\t\tcontinue;\n   67 | \t\t}\n   68 | \n   69 | \t\tlet mut value = try_vec![0; value_size as usize];\n   70 | \t\tdata.read_exact(&mut value)?;\n   71 | \n   72 | \t\tlet parsed_value = match item_type {\n   73 | \t\t\t0 => ItemValue::Text(utf8_decode(value).map_err(|_| {\n   74 | \t\t\t\tdecode_err!(Ape, \"Failed to convert text item into a UTF-8 string\")\n   75 | \t\t\t})?),\n   76 | \t\t\t1 => ItemValue::Binary(value),\n   77 | \t\t\t2 => ItemValue::Locator(utf8_decode(value).map_err(|_| {\n   78 | \t\t\t\tdecode_err!(Ape, \"Failed to convert locator item into a UTF-8 string\")\n   79 | \t\t\t})?),\n   80 | \t\t\t_ => decode_err!(@BAIL Ape, \"APE tag item contains an invalid item type\"),\n   81 | \t\t};\n   82 | \n   83 | \t\tlet mut item = ApeItem::new(key, parsed_value)?;\n   84 | \n   85 | \t\tif read_only {\n   86 | \t\t\titem.read_only = true;\n   87 | \t\t}\n   88 | \n   89 | \t\ttag.insert(item);\n   90 | \t}","lines":66}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`handle_encryption` reads exactly `size` bytes via `read_exact(&mut content)` where `content` is\n`vec![0; size as usize]`, but in the unsynchronized and/or compressed code paths the reader passed\nin is an `UnsynchronizedStream` or a zlib `ZlibDecoder` whose decoded output length differs from\n`size` (the raw on-disk content length). For an unsynchronized encrypted frame the decoded stream is\nshorter than `size`, so `read_exact` hits EOF and the whole frame fails to parse; for a\ncompressed+encrypted frame the decompressed length is unrelated to `size`. The plain-encryption path\n(reader is `take(size)`) is the only one that is correct.","fix":"Use `read_to_end` instead of a fixed `size`-sized `read_exact` in `handle_encryption`, since the\nreader is already bounded by the outer `take(size)` (and further transformed by unsynch/zlib). That\nway the encrypted blob captures whatever the transformed stream actually yields.","locations":[{"ref":"lofty/src/id3/v2/frame/read.rs:229-249","code":"  229 | fn handle_encryption<R: Read>(\n  230 | \treader: &mut R,\n  231 | \tsize: u32,\n  232 | \tid: FrameId<'static>,\n  233 | \tflags: FrameFlags,\n  234 | ) -> Result<ParsedFrame<'static>> {\n  235 | \tif flags.data_length_indicator.is_none() {\n  236 | \t\treturn Err(Id3v2Error::new(Id3v2ErrorKind::MissingDataLengthIndicator).into());\n  237 | \t}\n  238 | \n  239 | \tlet mut content = try_vec![0; size as usize];\n  240 | \treader.read_exact(&mut content)?;\n  241 | \n  242 | \tlet encrypted_frame = Frame::Binary(BinaryFrame {\n  243 | \t\theader: FrameHeader::new(id, flags),\n  244 | \t\tdata: Cow::Owned(content),\n  245 | \t});\n  246 | \n  247 | \t// Nothing further we can do with encrypted frames\n  248 | \tOk(ParsedFrame::Next(encrypted_frame))\n  249 | }","lines":21},{"ref":"lofty/src/id3/v2/frame/read.rs:141-201","code":"  141 | \t\t\t\tif flags.compression {\n  142 | \t\t\t\t\tlet mut compression_reader = handle_compression(unsynchronized_reader)?;\n  143 | \n  144 | \t\t\t\t\tif flags.encryption.is_some() {\n  145 | \t\t\t\t\t\treturn handle_encryption(&mut compression_reader, size, id, flags);\n  146 | \t\t\t\t\t}\n  147 | \n  148 | \t\t\t\t\treturn parse_frame(\n  149 | \t\t\t\t\t\t&mut compression_reader,\n  150 | \t\t\t\t\t\tsize,\n  151 | \t\t\t\t\t\tid,\n  152 | \t\t\t\t\t\tflags,\n  153 | \t\t\t\t\t\tversion,\n  154 | \t\t\t\t\t\tparse_options.parsing_mode,\n  155 | \t\t\t\t\t);\n  156 | \t\t\t\t}\n  157 | \n  158 | \t\t\t\tif flags.encryption.is_some() {\n  159 | \t\t\t\t\treturn handle_encryption(&mut unsynchronized_reader, size, id, flags);\n  160 | \t\t\t\t}\n  161 | \n  162 | \t\t\t\treturn parse_frame(\n  163 | \t\t\t\t\t&mut unsynchronized_reader,\n  164 | \t\t\t\t\tsize,\n  165 | \t\t\t\t\tid,\n  166 | \t\t\t\t\tflags,\n  167 | \t\t\t\t\tversion,\n  168 | \t\t\t\t\tparse_options.parsing_mode,\n  169 | \t\t\t\t);\n  170 | \t\t\t},\n  171 | \t\t\t// Possible combinations:\n  172 | \t\t\t//\n  173 | \t\t\t// * compressed + encrypted\n  174 | \t\t\t// * compressed\n  175 | \t\t\tFrameFlags {\n  176 | \t\t\t\tcompression: true, ..\n  177 | \t\t\t} => {\n  178 | \t\t\t\tlet mut compression_reader = handle_compression(reader)?;\n  179 | \n  180 | \t\t\t\tif flags.encryption.is_some() {\n  181 | \t\t\t\t\treturn handle_encryption(&mut compression_reader, size, id, flags);\n  182 | \t\t\t\t}\n  183 | \n  184 | \t\t\t\treturn parse_frame(\n  185 | \t\t\t\t\t&mut compression_reader,\n  186 | \t\t\t\t\tsize,\n  187 | \t\t\t\t\tid,\n  188 | \t\t\t\t\tflags,\n  189 | \t\t\t\t\tversion,\n  190 | \t\t\t\t\tparse_options.parsing_mode,\n  191 | \t\t\t\t);\n  192 | \t\t\t},\n  193 | \t\t\t// Possible combinations:\n  194 | \t\t\t//\n  195 | \t\t\t// * encrypted\n  196 | \t\t\tFrameFlags {\n  197 | \t\t\t\tencryption: Some(_),\n  198 | \t\t\t\t..\n  199 | \t\t\t} => {\n  200 | \t\t\t\treturn handle_encryption(&mut reader, size, id, flags);\n  201 | \t\t\t},","lines":61}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Encrypted-frame writing computes the frame header size as `value.len() + 1`, but the body it\nactually writes is a 4-byte data length indicator + 1-byte method symbol + the value\n(`value.len() + 5` bytes). The frame size in the header must include the data length indicator and\nmethod symbol, so it is 4 bytes too small. Any reader using the frame size to find the next frame\nwill land 4 bytes inside this frame's data and mis-parse the rest of the tag.","fix":"Pass `(value.len() + 5) as u32` (4 for the data length indicator + 1 for the method symbol) to `write_frame_header`, and guard against overflow when casting from usize.","locations":[{"ref":"lofty/src/id3/v2/write/frame.rs:336-349","code":"  336 | \tif let Some(mut len) = flags.data_length_indicator\n  337 | \t\t&& len > 0\n  338 | \t{\n  339 | \t\twrite_frame_header(writer, name, (value.len() + 1) as u32, flags, write_options)?;\n  340 | \t\tif !write_options.use_id3v23 {\n  341 | \t\t\tlen = len.synch()?;\n  342 | \t\t}\n  343 | \n  344 | \t\twriter.write_u32::<BigEndian>(len)?;\n  345 | \t\twriter.write_u8(method_symbol)?;\n  346 | \t\twriter.write_all(value)?;\n  347 | \n  348 | \t\treturn Ok(());\n  349 | \t}","lines":14}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Chunk::read_cstring` is documented as \"Read a C-style string\" but it merely reads the entire chunk content and UTF-8 decodes it; it does not stop at or strip the NUL terminator. RIFF INFO values are NUL-terminated (and padded), so the returned `String` contains the trailing `\\0` (and any padding NUL). Callers must remember to `trim_matches('\\0')` later (done in `From<RiffInfoList> for Tag`), but `RiffInfoList::get`/round-trip and `Accessor` getters return the embedded NULs. Misleading name and incomplete handling.","fix":"Either rename to `read_string`-style and document that NULs are retained, or actually trim a single trailing NUL terminator in `read_cstring` so the stored value matches the C-string semantics the name implies.","locations":[{"ref":"lofty/src/iff/chunk.rs:245-249","code":"  245 | \t/// Read a C-style string from the chunk\n  246 | \tpub fn read_cstring(&mut self) -> Result<String> {\n  247 | \t\tlet cont = self.content()?;\n  248 | \t\tutf8_decode(cont)\n  249 | \t}","lines":5},{"ref":"lofty/src/iff/wav/tag/read.rs:30-46","code":"   30 | \t\tmatch chunk.read_cstring() {\n   31 | \t\t\tOk(cstr) => value = cstr,\n   32 | \t\t\tErr(e) => {\n   33 | \t\t\t\tif parse_mode == ParsingMode::Strict {\n   34 | \t\t\t\t\tdecode_err!(@BAIL Wav, \"Failed to read RIFF INFO item value\")\n   35 | \t\t\t\t}\n   36 | \n   37 | \t\t\t\t// RIFF INFO tags have no standard text encoding, so they will occasionally default\n   38 | \t\t\t\t// to the system encoding, which isn't always UTF-8. In reality, if one item fails\n   39 | \t\t\t\t// they likely all will, but we'll keep trying.\n   40 | \t\t\t\tif matches!(e.kind(), ErrorKind::StringFromUtf8(_)) {\n   41 | \t\t\t\t\tcontinue;\n   42 | \t\t\t\t}\n   43 | \n   44 | \t\t\t\treturn Err(e);\n   45 | \t\t\t},\n   46 | \t\t}","lines":17}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Tag::take_filter` claims in its doc comment that it \"preserves the ordering of the remaining items\", but the swap-based partition does not. It swaps each matched element toward the front (`self.items.swap(split_idx, read_idx)`), which scrambles the relative order of the *unmatched* elements that get swapped backward. Example: items [A,B,C,D] where B and D match. After processing, the vec becomes [B,D,C,A]; draining the front two leaves [C,A], but the original order of the remaining items was [A,C]. So the documented invariant is violated, and remaining items come out reordered.","fix":"Use a stable partition. Replace the swap loop with `Vec::extract_if` (or a manual stable approach: build a new `Vec` of retained items in order while collecting the matched ones), e.g. partition into two `Vec`s preserving order, then reassign `self.items` to the retained vec and return the matched vec as an iterator. The doc claim of order preservation then holds for both matched and remaining items.","locations":[{"ref":"lofty/src/tag/mod.rs:461-481","code":"  461 | \tpub fn take_filter<F>(\n  462 | \t\t&mut self,\n  463 | \t\tkey: ItemKey,\n  464 | \t\tmut filter: F,\n  465 | \t) -> impl Iterator<Item = TagItem> + use<'_, F>\n  466 | \twhere\n  467 | \t\tF: FnMut(&TagItem) -> bool,\n  468 | \t{\n  469 | \t\t// TODO: drain_filter\n  470 | \t\tlet mut split_idx = 0;\n  471 | \n  472 | \t\tfor read_idx in 0..self.items.len() {\n  473 | \t\t\tlet item = &self.items[read_idx];\n  474 | \t\t\tif item.key() == key && filter(item) {\n  475 | \t\t\t\tself.items.swap(split_idx, read_idx);\n  476 | \t\t\t\tsplit_idx += 1;\n  477 | \t\t\t}\n  478 | \t\t}\n  479 | \n  480 | \t\tself.items.drain(..split_idx)\n  481 | \t}","lines":21}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Key-byte read loop in the APE item parser is unbounded with respect to the declared tag size: it\ncalls `data.read_u8()` repeatedly until a NUL is found (lines 41-46) with no cap. Because\n`remaining_size` is not decremented for key bytes (see the related remaining_size finding), a\nmalformed item with no NUL terminator will read bytes well past the intended item/tag boundary,\nonly stopping at reader EOF. The subsequent `key.len() > 255` check (line 63) happens after the full\nunbounded read has already occurred.","fix":"Cap the key read at 255 bytes (the documented maximum) and bail if no NUL is seen within that window, before allocating/scanning further.","locations":[{"ref":"lofty/src/ape/tag/read.rs:40-46","code":"   40 | \t\tlet mut key = Vec::new();\n   41 | \t\tlet mut key_char = data.read_u8()?;\n   42 | \n   43 | \t\twhile key_char != 0 {\n   44 | \t\t\tkey.push(key_char);\n   45 | \t\t\tkey_char = data.read_u8()?;\n   46 | \t\t}","lines":7}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`RelativeVolumeAdjustmentFrame::as_bytes` can emit a frame that cannot be round-tripped. When\n`peak_volume` is *shorter* than the byte count implied by `bits_representing_peak`\n(`expected_peak_byte_length`), the code still writes the original `bits_representing_peak` byte\nfollowed by only `peak.len()` bytes (it only recomputes the b he\nreturned slice. The slice returned (`&self.value[start..end]`) thus includes the closing `)` while\n`self.pos` was set from the older value, so the relationship between the returned span and the next\nposition is inconsistent and depends on subtle ordering. This is fragile and the `((` handling does\nnot robustly cover all malformed bracketing seen in real files.","fix":"Compute the final `end` (including any `((` adjustment) before setting `self.pos`, and clearly separate the returned slice bounds from the next-scan position.","locations":[{"ref":"lofty/src/id3/v2/tag.rs:588-597","code":"  588 | \t\tif remainder.starts_with('(') && remainder.contains(')') {\n  589 | \t\t\tlet start = self.pos + 1;\n  590 | \t\t\tlet mut end = self.pos + remainder.find(')').unwrap();\n  591 | \t\t\tself.pos = end + 1;\n  592 | \t\t\t// handle bracketed refinement e.g. (55)((I think...)\"\n  593 | \t\t\tif remainder.starts_with(\"((\") {\n  594 | \t\t\t\tend += 1;\n  595 | \t\t\t}\n  596 | \t\t\treturn Some(parse_genre(&self.value[start..end], self.preserve_indexes));\n  597 | \t\t}","lines":10}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`from_tag` collects all generated frames into a `HashSet<Frame>` (`frames`) and then iterates that\nset to build the tag. Iteration order of a HashSet is non-deterministic, so the order in which\nframes are written to the file changes between runs / process invocations. This makes ID3v2 output\nnon-reproducible (bit-for-bit) and can cause flaky round-trip/ordering assertions and confusing\ndiffs for users who re-save unchanged tags.","fix":"Use an insertion-order-preserving collection (e.g. an indexmap/IndexSet or a Vec with explicit dedup) so frame write order is deterministic.","locations":[{"ref":"lofty/src/id3/v2/tag/conversion.rs:394-445","code":"  394 | \tlet mut frames = HashSet::with_capacity(items.len());\n  395 | \tfor item in items {\n  396 | \t\tif let Some(frame) =
