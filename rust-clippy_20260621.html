{\n  432 |         ExprKind::Field(recv, _) | ExprKind::Index(recv, _, _) => path_to_local_with_projections(recv),\n  433 |         ExprKind::Path(QPath::Resolved(\n  434 |             _,\n  435 |             Path {\n  436 |                 res: Res::Local(local), ..\n  437 |             },\n  438 |         )) => Some(*local),\n  439 |         _ => None,\n  440 |     }\n  441 | }\n  442 | \n  443 | /// Gets the `hir::TraitRef` of the trait the given method is implemented for.\n  444 | ///\n  445 | /// Use this if you want to find the `TraitRef` of the `Add` trait in this example:\n  446 | ///\n  447 | /// ```no_run\n  448 | /// struct Point(isize, isize);\n  449 | ///\n  450 | /// impl std::ops::Add for Point {\n  451 | ///     type Output = Self;\n  452 | ///\n  453 | ///     fn add(self, other: Self) -> Self {\n  454 | ///         Point(0, 0)\n  455 | ///     }\n  456 | /// }\n  457 | /// ```\n  458 | pub fn trait_ref_of_method<'tcx>(cx: &LateContext<'tcx>, owner: OwnerId) -> Option<&'tcx TraitRef<'tcx>> {\n  459 |     if let Node::Item(item) = cx.tcx.hir_node(cx.tcx.hir_owner_parent(owner))\n  460 |         && let ItemKind::Impl(impl_) = &item.kind\n  461 |         && let Some(of_trait) = impl_.of_trait\n  462 |     {\n  463 |         return Some(&of_trait.trait_ref);\n  464 |     }\n  465 |     None\n  466 | }\n  467 | \n  468 | /// This method will return tuple of projection stack and root of the expression,\n  469 | /// used in `can_mut_borrow_both`.\n  470 | ///\n  471 | /// For example, if `e` represents the `v[0].a.b[x]`\n  472 | /// this method will return a tuple, composed of a `Vec`\n  473 | /// containing the `Expr`s for `v[0], v[0].a, v[0].a.b, v[0].a.b[x]`\n  474 | /// and an `Expr` for root of them, `v`\n  475 | fn projection_stack<'a, 'hir>(\n  476 |     mut e: &'a Expr<'hir>,\n  477 |     ctxt: SyntaxContext,\n  478 | ) -> Option<(Vec<&'a Expr<'hir>>, &'a Expr<'hir>)> {\n  479 |     let mut result = vec![];\n  480 |     let root = loop {\n  481 |         match e.kind {\n  482 |             ExprKind::Index(ep, _, _) | ExprKind::Field(ep, _) if e.span.ctxt() == ctxt => {\n  483 |                 result.push(e);\n  484 |                 e = ep;\n  485 |             },\n  486 |             ExprKind::Index(..) | ExprKind::Field(..) => return None,\n  487 |             _ => break e,\n  488 |         }\n  489 |     };\n  490 |     result.reverse();\n  491 |     Some((result, root))\n  492 | }\n  493 | \n  494 | /// Gets the mutability of the custom deref adjustment, if any.\n  495 | pub fn expr_custom_deref_adjustment(cx: &LateContext<'_>, e: &Expr<'_>) -> Option<Mutability> {\n  496 |     cx.typeck_results()\n  497 |         .expr_adjustments(e)\n  498 |         .iter()\n  499 |         .find_map(|a| match a.kind {\n  500 |             Adjust::Deref(DerefAdjustKind::Overloaded(d)) => Some(Some(d.mutbl)),\n  501 |             Adjust::Deref(DerefAdjustKind::Builtin) => None,\n  502 |             _ => Some(None),\n  503 |         })\n  504 |         .and_then(|x| x)\n  505 | }\n  506 | \n  507 | /// Checks if two expressions can be mutably borrowed simultaneously\n  508 | /// and they aren't dependent on borrowing same thing twice\n  509 | pub fn can_mut_borrow_both(cx: &LateContext<'_>, ctxt: SyntaxContext, e1: &Expr<'_>, e2: &Expr<'_>) -> bool {\n  510 |     let Some((s1, r1)) = projection_stack(e1, ctxt) else {\n  511 |         return false;\n  512 |     };\n  513 |     let Some((s2, r2)) = projection_stack(e2, ctxt) else {\n  514 |         return false;\n  515 |     };\n  516 |     if !eq_expr_value(cx, ctxt, r1, r2) {\n  517 |         return true;\n  518 |     }\n  519 |     if expr_custom_deref_adjustment(cx, r1).is_some() || expr_custom_deref_adjustment(cx, r2).is_some() {\n  520 |         return false;\n  521 |     }\n  522 | \n  523 |     for (x1, x2) in zip(&s1, &s2) {\n  524 |         if expr_custom_deref_adjustment(cx, x1).is_some() || expr_custom_deref_adjustment(cx, x2).is_some() {\n  525 |             return false;\n  526 |         }\n  527 | \n  528 |         match (&x1.kind, &x2.kind) {\n  529 |             (ExprKind::Field(_, i1), ExprKind::Field(_, i2)) => {\n  530 |                 if i1 != i2 {\n  531 |                     return true;\n  532 |                 }\n  533 |             },\n  534 |             _ => return false,\n  535 |         }\n  536 |     }\n  537 |     false\n  538 | }\n  539 | \n  540 | /// Returns true if the `def_id` associated with the `path` is recognized as a \"default-equivalent\"\n  541 | /// constructor from the std library\n  542 | fn is_default_equivalent_ctor(cx: &LateContext<'_>, def_id: DefId, path: &QPath<'_>) -> bool {\n  543 |     let std_types_symbols = &[\n  544 |         sym::Vec,\n  545 |         sym::VecDeque,\n  546 |         sym::LinkedList,\n  547 |         sym::HashMap,\n  548 |         sym::BTreeMap,\n  549 |         sym::HashSet,\n  550 |         sym::BTreeSet,\n  551 |         sym::BinaryHeap,\n  552 |     ];\n  553 | \n  554 |     if let QPath::TypeRelative(_, method) = path\n  555 |         && method.ident.name == sym::new\n  556 |         && let Some(impl_did) = cx.tcx.impl_of_assoc(def_id)\n  557 |         && let Some(adt) = cx\n  558 |             .tcx\n  559 |             .type_of(impl_did)\n  560 |             .instantiate_identity()\n  561 |             .skip_norm_wip()\n  562 |             .ty_adt_def()\n  563 |     {\n  564 |         return Some(adt.did()) == cx.tcx.lang_items().string()\n  565 |             || (cx.tcx.get_diagnostic_name(adt.did())).is_some_and(|adt_name| std_types_symbols.contains(&adt_name));\n  566 |     }\n  567 |     false\n  568 | }\n  569 | \n  570 | /// Returns true if the expr is equal to `Default::default` when evaluated.\n  571 | pub fn is_default_equivalent_call(\n  572 |     cx: &LateContext<'_>,\n  573 |     repl_func: &Expr<'_>,\n  574 |     whole_call_expr: Option<&Expr<'_>>,\n  575 | ) -> bool {\n  576 |     if let ExprKind::Path(ref repl_func_qpath) = repl_func.kind\n  577 |         && let Some(repl_def) = cx.qpath_res(repl_func_qpath, repl_func.hir_id).opt_def(cx)\n  578 |         && (repl_def.assoc_fn_parent(cx).is_diag_item(cx, sym::Default)\n  579 |             || is_default_equivalent_ctor(cx, repl_def.1, repl_func_qpath))\n  580 |     {\n  581 |         return true;\n  582 |     }\n  583 | \n  584 |     // Get the type of the whole method call expression, find the exact method definition, look at\n  585 |     // its body and check if it is similar to the corresponding `Default::default()` body.\n  586 |     let Some(e) = whole_call_expr else { return false };\n  587 |     let Some(default_fn_def_id) = cx.tcx.get_diagnostic_item(sym::default_fn) else {\n  588 |         return false;\n  589 |     };\n  590 |     let Some(ty) = cx.tcx.typeck(e.hir_id.owner.def_id).expr_ty_adjusted_opt(e) else {\n  591 |         return false;\n  592 |     };\n  593 |     let args = rustc_ty::GenericArgs::for_item(cx.tcx, default_fn_def_id, |param, _| {\n  594 |         if let rustc_ty::GenericParamDefKind::Lifetime = param.kind {\n  595 |             cx.tcx.lifetimes.re_erased.into()\n  596 |         } else if param.index == 0 && param.name == kw::SelfUpper {\n  597 |             ty.into()\n  598 |         } else {\n  599 |             param.to_error(cx.tcx)\n  600 |         }\n  601 |     });\n  602 |     let instance = rustc_ty::Instance::try_resolve(cx.tcx, cx.typing_env(), default_fn_def_id, args);\n  603 | \n  604 |     let Ok(Some(instance)) = instance else { return false };\n  605 |     if let rustc_ty::InstanceKind::Item(def) = instance.def\n  606 |         && !cx.tcx.is_mir_available(def)\n  607 |     {\n  608 |         return false;\n  609 |     }\n  610 |     let ExprKind::Path(ref repl_func_qpath) = repl_func.kind else {\n  611 |         return false;\n  612 |     };\n  613 |     let Some(repl_def_id) = cx.qpath_res(repl_func_qpath, repl_func.hir_id).opt_def_id() else {\n  614 |         return false;\n  615 |     };\n  616 | \n  617 |     // Get the MIR Body for the `<Ty as Default>::default()` function.\n  618 |     // If it is a value or call (either fn or ctor), we compare its `DefId` against the one for the\n  619 |     // resolution of the expression we had in the path. This lets us identify, for example, that\n  620 |     // the body of `<Vec<T> as Default>::default()` is a `Vec::new()`, and the field was being\n  621 |     // initialized to `Vec::new()` as well.\n  622 |     let body = cx.tcx.instance_mir(instance.def);\n  623 |     for block_data in body.basic_blocks.iter() {\n  624 |         if block_data.statements.len() == 1\n  625 |             && let StatementKind::Assign(assign) = &block_data.statements[0].kind\n  626 |             && assign.0.local == RETURN_PLACE\n  627 |             && let Rvalue::Aggregate(kind, _places) = &assign.1\n  628 |             && let AggregateKind::Adt(did, variant_index, _, _, _) = **kind\n  629 |             && let def = cx.tcx.adt_def(did)\n  630 |             && let variant = &def.variant(variant_index)\n  631 |             && variant.fields.is_empty()\n  632 |             && let Some((_, did)) = variant.ctor\n  633 |             && did == repl_def_id\n  634 |         {\n  635 |             return true;\n  636 |         } else if block_data.statements.is_empty()\n  637 |             && let Some(term) = &block_data.terminator\n  638 |         {\n  639 |             match &term.kind {\n  640 |                 TerminatorKind::Call {\n  641 |                     func: Operand::Constant(c),\n  642 |                     ..\n  643 |                 } if let rustc_ty::FnDef(did, _args) = c.ty().kind()\n  644 |                     && *did == repl_def_id =>\n  645 |                 {\n  646 |                     return true;\n  647 |                 },\n  648 |                 TerminatorKind::TailCall {\n  649 |                     func: Operand::Constant(c),\n  650 |                     ..\n  651 |                 } if let rustc_ty::FnDef(did, _args) = c.ty().kind()\n  652 |                     && *did == repl_def_id =>\n  653 |                 {\n  654 |                     return true;\n  655 |                 },\n  656 |                 _ => {},\n  657 |             }\n  658 |         }\n  659 |     }\n  660 |     false\n  661 | }\n  662 | \n  663 | /// Returns true if the expr is equal to `Default::default()` of its type when evaluated.\n  664 | ///\n  665 | /// It doesn't cover all cases, like struct literals, but it is a close approximation.\n  666 | pub fn is_default_equivalent(cx: &LateContext<'_>, e: &Expr<'_>) -> bool {\n  667 |     match &e.kind {\n  668 |         ExprKind::Lit(lit) => match lit.node {\n  669 |             LitKind::Bool(false) | LitKind::Int(Pu128(0), _) => true,\n  670 |             LitKind::Str(s, _) => s.is_empty(),\n  671 |             _ => false,\n  672 |         },\n  673 |         ExprKind::Tup(items) | ExprKind::Array(items) => items.iter().all(|x| is_default_equivalent(cx, x)),\n  674 |         ExprKind::Repeat(x, len) => {\n  675 |             if let ConstArgKind::Anon(anon_const) = len.kind\n  676 |                 && let ExprKind::Lit(const_lit) = cx.tcx.hir_body(anon_const.body).value.kind\n  677 |                 && let LitKind::Int(v, _) = const_lit.node\n  678 |                 && v <= 32\n  679 |                 && is_default_equivalent(cx, x)\n  680 |             {\n  681 |                 true\n  682 |             } else {\n  683 |                 false\n  684 |             }\n  685 |         },\n  686 |         ExprKind::Call(repl_func, []) => is_default_equivalent_call(cx, repl_func, Some(e)),\n  687 |         ExprKind::Call(from_func, [arg]) => is_default_equivalent_from(cx, from_func, arg),\n  688 |         ExprKind::Path(qpath) => cx\n  689 |             .qpath_res(qpath, e.hir_id)\n  690 |             .ctor_parent(cx)\n  691 |             .is_lang_item(cx, OptionNone),\n  692 |         ExprKind::AddrOf(rustc_hir::BorrowKind::Ref, _, expr) => matches!(expr.kind, ExprKind::Array([])),\n  693 |         ExprKind::Block(Block { stmts: [], expr, .. }, _) => expr.is_some_and(|e| is_default_equivalent(cx, e)),\n  694 |         _ => false,\n  695 |     }\n  696 | }\n  697 | \n  698 | fn is_default_equivalent_from(cx: &LateContext<'_>, from_func: &Expr<'_>, arg: &Expr<'_>) -> bool {\n  699 |     if let ExprKind::Path(QPath::TypeRelative(ty, seg)) = from_func.kind\n  700 |         && seg.ident.name == sym::from\n  701 |     {\n  702 |         match arg.kind {\n  703 |             ExprKind::Lit(hir::Lit {\n  704 |                 node: LitKind::Str(sym, _),\n  705 |                 ..\n  706 |             }) => return sym.is_empty() && ty.basic_res().is_lang_item(cx, LangItem::String),\n  707 |             ExprKind::Array([]) => return ty.basic_res().is_diag_item(cx, sym::Vec),\n  708 |             ExprKind::Repeat(_, len) => {\n  709 |                 if let ConstArgKind::Anon(anon_const) = len.kind\n  710 |                     && let ExprKind::Lit(const_lit) = cx.tcx.hir_body(anon_const.body).value.kind\n  711 |                     && let LitKind::Int(v, _) = const_lit.node\n  712 |                 {\n  713 |                     return v == 0 && ty.basic_res().is_diag_item(cx, sym::Vec);\n  714 |                 }\n  715 |             },\n  716 |             _ => (),\n  717 |         }\n  718 |     }\n  719 |     false\n  720 | }\n  721 | \n  722 | /// Checks if the top level expression can be moved into a closure as is.\n  723 | /// Currently checks for:\n  724 | /// * Break/Continue outside the given loop HIR ids.\n  725 | /// * Yield/Return statements.\n  726 | /// * Inline assembly.\n  727 | /// * Usages of a field of a local where the type of the local can be partially moved.\n  728 | ///\n  729 | /// For example, given the following function:\n  730 | ///\n  731 | /// ```no_run\n  732 | /// fn f<'a>(iter: &mut impl Iterator<Item = (usize, &'a mut String)>) {\n  733 | ///     for item in iter {\n  734 | ///         let s = item.1;\n  735 | ///         if item.0 > 10 {\n  736 | ///             continue;\n  737 | ///         } else {\n  738 | ///             s.clear();\n  739 | ///         }\n  740 | ///     }\n  741 | /// }\n  742 | /// ```\n  743 | ///\n  744 | /// When called on the expression `item.0` this will return false unless the local `item` is in the\n  745 | /// `ignore_locals` set. The type `(usize, &mut String)` can have the second element moved, so it\n  746 | /// isn't always safe to move into a closure when only a single field is needed.\n  747 | ///\n  748 | /// When called on the `continue` expression this will return false unless the outer loop expression\n  749 | /// is in the `loop_ids` set.\n  750 | ///\n  751 | /// Note that this check is not recursive, so passing the `if` expression will always return true\n  752 | /// even though sub-expressions might return false.\n  753 | pub fn can_move_expr_to_closure_no_visit<'tcx>(\n  754 |     cx: &LateContext<'tcx>,\n  755 |     expr: &'tcx Expr<'_>,\n  756 |     loop_ids: &[HirId],\n  757 |     ignore_locals: &HirIdSet,\n  758 | ) -> bool {\n  759 |     match expr.kind {\n  760 |         ExprKind::Break(Destination { target_id: Ok(id), .. }, _)\n  761 |         | ExprKind::Continue(Destination { target_id: Ok(id), .. })\n  762 |             if loop_ids.contains(&id) =>\n  763 |         {\n  764 |             true\n  765 |         },\n  766 |         ExprKind::Break(..)\n  767 |         | ExprKind::Continue(_)\n  768 |         | ExprKind::Ret(_)\n  769 |         | ExprKind::Yield(..)\n  770 |         | ExprKind::InlineAsm(_) => false,\n  771 |         // Accessing a field of a local value can only be done if the type isn't\n  772 |         // partially moved.\n  773 |         ExprKind::Field(\n  774 |             &Expr {\n  775 |                 hir_id,\n  776 |                 kind:\n  777 |                     ExprKind::Path(QPath::Resolved(\n  778 |                         _,\n  779 |                         Path {\n  780 |                             res: Res::Local(local_id),\n  781 |                             ..\n  782 |                         },\n  783 |                     )),\n  784 |                 ..\n  785 |             },\n  786 |             _,\n  787 |         ) if !ignore_locals.contains(local_id) && can_partially_move_ty(cx, cx.typeck_results().node_type(hir_id)) => {\n  788 |             // TODO: check if the local has been partially moved. Assume it has for now.\n  789 |             false\n  790 |         },\n  791 |         _ => true,\n  792 |     }\n  793 | }\n  794 | \n  795 | /// How a local is captured by a closure\n  796 | #[derive(Debug, Clone, Copy, PartialEq, Eq)]\n  797 | pub enum CaptureKind {\n  798 |     Value,\n  799 |     Use,\n  800 |     Ref(Mutability),\n  801 | }\n  802 | impl CaptureKind {\n  803 |     pub fn is_imm_ref(self) -> bool {\n  804 |         self == Self::Ref(Mutability::Not)\n  805 |     }\n  806 | }\n  807 | impl std::ops::BitOr for CaptureKind {\n  808 |     type Output = Self;\n  809 |     fn bitor(self, rhs: Self) -> Self::Output {\n  810 |         match (self, rhs) {\n  811 |             (CaptureKind::Value, _) | (_, CaptureKind::Value) => CaptureKind::Value,\n  812 |             (CaptureKind::Use, _) | (_, CaptureKind::Use) => CaptureKind::Use,\n  813 |             (CaptureKind::Ref(Mutability::Mut), CaptureKind::Ref(_))\n  814 |             | (CaptureKind::Ref(_), CaptureKind::Ref(Mutability::Mut)) => CaptureKind::Ref(Mutability::Mut),\n  815 |             (CaptureKind::Ref(Mutability::Not), CaptureKind::Ref(Mutability::Not)) => CaptureKind::Ref(Mutability::Not),\n  816 |         }\n  817 |     }\n  818 | }\n  819 | impl std::ops::BitOrAssign for CaptureKind {\n  820 |     fn bitor_assign(&mut self, rhs: Self) {\n  821 |         *self = *self | rhs;\n  822 |     }\n  823 | }\n  824 | \n  825 | /// Given an expression referencing a local, determines how it would be captured in a closure.\n  826 | ///\n  827 | /// Note as t current.kind {\n 1019 |             if receiver.span.from_expansion() || args.iter().any(|e| e.span.from_expansion()) {\n 1020 |                 break;\n 1021 |             }\n 1022 |             method_names.push(path.ident.name);\n 1023 |             arg_lists.push((*receiver, &**args));\n 1024 |             spans.push(path.ident.span);\n 1025 |             current = receiver;\n 1026 |         } else {\n 1027 |             break;\n 1028 |         }\n 1029 |     }\n 1030 | \n 1031 |     (method_names, arg_lists, spans)\n 1032 | }\n 1033 | \n 1034 | /// Matches an `Expr` against a chain of methods, and return the matched `Expr`s.\n 1035 | ///\n 1036 | /// For example, if `expr` represents the `.baz()` in `foo.bar().baz()`,\n 1037 | /// `method_chain_args(expr, &[sym::bar, sym::baz])` will return a `Vec`\n 1038 | /// containing the `Expr`s for\n 1039 | /// `.bar()` and `.baz()`\n 1040 | pub fn method_chain_args<'a>(expr: &'a Expr<'_>, methods: &[Symbol]) -> Option<Vec<(&'a Expr<'a>, &'a [Expr<'a>])>> {\n 1041 |     let mut current = expr;\n 1042 |     let mut matched = Vec::with_capacity(methods.len());\n 1043 |     for method_name in methods.iter().rev() {\n 1044 |         // method chains are stored last -> first\n 1045 |         if let ExprKind::MethodCall(path, receiver, args, _) = current.kind {\n 1046 |             if path.ident.name == *method_name {\n 1047 |                 if receiver.span.from_expansion() || args.iter().any(|e| e.span.from_expansion()) {\n 1048 |                     return None;\n 1049 |                 }\n 1050 |                 matched.push((receiver, args)); // build up `matched` backwards\n 1051 |                 current = receiver; // go to parent expression\n 1052 |             } else {\n 1053 |                 return None;\n 1054 |             }\n 1055 |         } else {\n 1056 |             return None;\n 1057 |         }\n 1058 |     }\n 1059 |     // Reverse `matched` so that it is in the same order as `methods`.\n 1060 |     matched.reverse();\n 1061 |     Some(matched)\n 1062 | }\n 1063 | \n 1064 | /// Returns `true` if the provided `def_id` is an entrypoint to a program.\n 1065 | pub fn is_entrypoint_fn(cx: &LateContext<'_>, def_id: DefId) -> bool {\n 1066 |     cx.tcx\n 1067 |         .entry_fn(())\n 1068 |         .is_some_and(|(entry_fn_def_id, _)| def_id == entry_fn_def_id)\n 1069 | }\n 1070 | \n 1071 | /// Returns `true` if the expression is in the program's `#[panic_handler]`.\n 1072 | pub fn is_in_panic_handler(cx: &LateContext<'_>, e: &Expr<'_>) -> bool {\n 1073 |     let parent = cx.tcx.hir_get_parent_item(e.hir_id);\n 1074 |     Some(parent.to_def_id()) == cx.tcx.lang_items().panic_impl()\n 1075 | }\n 1076 | \n 1077 | /// Gets the name of the item the expression is in, if available.\n 1078 | pub fn parent_item_name(cx: &LateContext<'_>, expr: &Expr<'_>) -> Option<Symbol> {\n 1079 |     let parent_id = cx.tcx.hir_get_parent_item(expr.hir_id).def_id;\n 1080 |     match cx.tcx.hir_node_by_def_id(parent_id) {\n 1081 |         Node::Item(item) => item.kind.ident().map(|ident| ident.name),\n 1082 |         Node::TraitItem(TraitItem { ident, .. }) | Node::ImplItem(ImplItem { ident, .. }) => Some(ident.name),\n 1083 |         _ => None,\n 1084 |     }\n 1085 | }\n 1086 | \n 1087 | pub struct ContainsName<'a, 'tcx> {\n 1088 |     pub cx: &'a LateContext<'tcx>,\n 1089 |     pub name: Symbol,\n 1090 | }\n 1091 | \n 1092 | impl<'tcx> Visitor<'tcx> for ContainsName<'_, 'tcx> {\n 1093 |     type Result = ControlFlow<()>;\n 1094 |     type NestedFilter = nested_filter::OnlyBodies;\n 1095 | \n 1096 |     fn visit_name(&mut self, name: Symbol) -> Self::Result {\n 1097 |         if self.name == name {\n 1098 |             ControlFlow::Break(())\n 1099 |         } else {\n 1100 |             ControlFlow::Continue(())\n 1101 |         }\n 1102 |     }\n 1103 | \n 1104 |     fn maybe_tcx(&mut self) -> Self::MaybeTyCtxt {\n 1105 |         self.cx.tcx\n 1106 |     }\n 1107 | }\n 1108 | \n 1109 | /// C nderlying pattern and the number of\n 2226 | /// references removed.\n 2227 | pub fn peel_hir_pat_refs<'a>(pat: &'a Pat<'a>) -> (&'a Pat<'a>, usize) {\n 2228 |     fn peel<'a>(pat: &'a Pat<'a>, count: usize) -> (&'a Pat<'a>, usize) {\n 2229 |         if let PatKind::Ref(pat, _, _) = pat.kind {\n 2230 |             peel(pat, count + 1)\n 2231 |         } else {\n 2232 |             (pat, count)\n 2233 |         }\n 2234 |     }\n 2235 |     peel(pat, 0)\n 2236 | }\n 2237 | \n 2238 | /// Peels of expressions while the given closure returns `Some`.\n 2239 | pub fn peel_hir_expr_while<'tcx>(\n 2240 |     mut expr: &'tcx Expr<'tcx>,\n 2241 |     mut f: impl FnMut(&'tcx Expr<'tcx>) -> Option<&'tcx Expr<'tcx>>,\n 2242 | ) -> &'tcx Expr<'tcx> {\n 2243 |     while let Some(e) = f(expr) {\n 2244 |         expr = e;\n 2245 |     }\n 2246 |     expr\n 2247 | }\n 2248 | \n 2249 | /// Peels off up to the given number of references on the expression. Returns the underlying\n 2250 | /// expression and the number of references removed.\n 2251 | pub fn peel_n_hir_expr_refs<'a>(expr: &'a Expr<'a>, count: usize) -> (&'a Expr<'a>, usize) {\n 2252 |     let mut remaining = count;\n 2253 |     let e = peel_hir_expr_while(expr, |e| match e.kind {\n 2254 |         ExprKind::AddrOf(ast::BorrowKind::Ref, _, e) if remaining != 0 => {\n 2255 |             remaining -= 1;\n 2256 |             Some(e)\n 2257 |         },\n 2258 |         _ => None,\n 2259 |     });\n 2260 |     (e, count - remaining)\n 2261 | }\n 2262 | \n 2263 | /// Peels off all unary operators of an expression. Returns the underlying expression and the number\n 2264 | /// of operators removed.\n 2265 | pub fn peel_hir_expr_unary<'a>(expr: &'a Expr<'a>) -> (&'a Expr<'a>, usize) {\n 2266 |     let mut count: usize = 0;\n 2267 |     let mut curr_expr = expr;\n 2268 |     while let ExprKind::Unary(_, local_expr) = curr_expr.kind {\n 2269 |         count = count.wrapping_add(1);\n 2270 |         curr_expr = local_expr;\n 2271 | self.requires_semi = !self.cx.typeck_results().expr_ty(e).is_never();\n 3070 |                         },\n 3071 |                     }\n 3072 |                 }\n 3073 |                 return;\n 3074 |             }\n 3075 |             match e.kind {\n 3076 |                 ExprKind::DropTemps(e) => self.visit_expr(e),\n 3077 |                 ExprKind::Ret(None) | ExprKind::Continue(_) => self.is_never = true,\n 3078 |                 ExprKind::Ret(Some(e)) | ExprKind::Become(e) => {\n 3079 |                     self.in_final_expr = false;\n 3080 |                     self.visit_expr(e);\n 3081 |                     self.is_never = true;\n 3082 |                 },\n 3083 |                 ExprKind::Break(dest, e) => {\n 3084 |                     if let Some(e) = e {\n 3085 |                         self.in_final_expr = false;\n 3086 |                         self.visit_expr(e);\n 3087 |                     }\n 3088 |                     if let Ok(id) = dest.target_id\n 3089 |                         && let Some((i, target)) = self\n 3090 |                             .break_targets\n 3091 |                             .iter_mut()\n 3092 |                             .enumerate()\n 3093 |                             .find(|(_, target)| target.id == id)\n 3094 |                     {\n 3095 |                         target.unused &= self.is_never;\n 3096 |                         if i < self.break_targets_for_result_ty as usize {\n 3097 |                             self.requires_semi = true;\n 3098 |                         }\n 3099 |                     }\n 3100 |                     self.is_never = true;\n 3101 |                 },\n 3102 |                 ExprKind::If(cond, then, else_) => {\n 3103 |                     let in_final_expr = mem::replace(&mut self.in_final_expr, false);\n 3104 |                     self.visit_expr(cond);\n 3105 |                     self.in_final_expr = in_final_expr;\n 3106 | \n 3107 |                     if self.is_never tcx.def_path_str(callee)\n 3275 |     }\n 3276 | }\n 3277 | \n 3278 | /// Tries to produce a relative path from `from` to `to`; if such a path would contain more than\n 3279 | /// `max_super` `super` items, produces an absolute path instead. Both `from` and `to` should be in\n 3280 | /// the local crate.\n 3281 | ///\n 3282 | /// Suitable for user output/suggestions.\n 3283 | ///\n 3284 | /// This ignores use items, and assumes that the target path is visible from the source\n 3285 | /// path (which _should_ be a reasonable assumption since we in order to be able to use an object of\n 3286 | /// certain type T, T is required to be visible).\n 3287 | ///\n 3288 | /// TODO make use of `use` items. Maybe we should have something more sophisticated like\n 3289 | /// rust-analyzer does? <https://docs.rs/ra_ap_hir_def/0.0.169/src/ra_ap_hir_def/find_path.rs.html#19-27>\n 3290 | fn maybe_get_relative_path(from: &DefPath, to: &DefPath, max_super: usize) -> String {\n 3291 |     use itertools::EitherOrBoth::{Both, Left, Right};\n 3292 | \n 3293 |     // 1. skip the segments common for both paths (regardless of their type)\n 3294 |     let unique_parts = to\n 3295 |         .data\n 3296 |         .iter()\n 3297 |         .zip_longest(from.data.iter())\n 3298 |         .skip_while(|el| matches!(el, Both(l, r) if l == r))\n 3299 |         .map(|el| match el {\n 3300 |             Both(l, r) => Both(l.data, r.data),\n 3301 |             Left(l) => Left(l.data),\n 3302 |             Right(r) => Right(r.data),\n 3303 |         });\n 3304 | \n 3305 |     // 2. for the remaining segments, construct relative path using only mod names and `super`\n 3306 |     let mut go_up_by = 0;\n 3307 |     let mut path = Vec::new();\n 3308 |     for el in unique_parts {\n 3309 |         match el {\n 3310 |             Both(l, r) => {\n 3311 |                 // consider:\n 3312 |                 // a::b::sym:: ::    refers to\n 3313 |                 // c::d::e  ::f::sym\n 3314 |                 // <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
