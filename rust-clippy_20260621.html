rity":"low","easy":true,"description":"The `HEURISTICS` table entry `(sym::peekable, 1, First, Infinite)` declares that `peekable` takes 1 argument, but `Iterator::peekable(self) -> Peekable<Self>` takes zero arguments. In `is_infinite` the match requires `args.len() == len`, so this entry can never fire and infiniteness is not propagated through `.peekable()` (e.g. `(0..).peekable()` is not recognised as infinite), whereas the adjacent zero-arg methods `fuse`, `cloned`, `rev`, `cycle`, `enumerate` work correctly.","fix":"Change the arg count to 0: `(sym::peekable, 0, First, Infinite),`.","locations":[{"ref":"clippy_lints/src/infinite_iter.rs:134","code":"  134 |     (sym::peekable, 1, First, Infinite),","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/infinite_iter.rs#L134"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":true,"description":"In `check_if_chains`, the `TyCtxt::is_diagnostic_item` branch binds the `did1` snippet to a variable named `recv` and then uses it as `get_diagnostic_name({recv})`. The value is correct (it is the `did` argument) but the name `recv` is misleading copy-paste residue from the receiver-based branch above; the parallel `check_block` branch correctly names the same thing `did`. Cosmetic, output is correct.","fix":"Rename the local `recv` to `did` for clarity.","locations":[{"ref":"clippy_lints_internal/src/repeated_is_diagnostic_item.rs:482","code":"  482 |                 let recv = snippet_with_applicability(cx, did1.span, \"_\", &mut app);","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints_internal/src/repeated_is_diagnostic_item.rs#L482"},{"ref":"clippy_lints_internal/src/repeated_is_diagnostic_item.rs:226","code":"  226 |                         let did = snippet_with_applicability(cx, did1.span, \"_\", &mut app);","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints_internal/src/repeated_is_diagnostic_item.rs#L226"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"In `check_crate_post`, the outer loop iterates all functions and the inner loop iterates each function's unused `&mut` parameters. When `span_extend_to_prev_str` fails to locate `mut` it triggers the `let ... else { return; }`, which aborts the entire `check_crate_post` method. That suppresses NEEDLESS_PASS_BY_REF_MUT not just for the offending parameter but for every remaining parameter and every remaining function in the crate. The intent is to skip only the current parameter.","fix":"Change `return;` on line 277 to `continue;` so only the current parameter is skipped.","locations":[{"ref":"clippy_lints/src/needless_pass_by_ref_mut.rs:267-278","code":"  267 |             for input in unused {\n  268 |                 // If the argument is never used mutably, we emit the warning.\n  269 |                 let sp = input.span;\n  270 |                 if let rustc_hir::TyKind::Ref(_, inner_ty) = input.kind {\n  271 |                     let Some(after_mut_span) = cx.tcx.sess.source_map().span_extend_to_prev_str(\n  272 |                         inner_ty.ty.span.shrink_to_lo(),\n  273 |                         \"mut\",\n  274 |                         true,\n  275 |                         true,\n  276 |                     ) else {\n  277 |                         return;\n  278 |                     };","lines":12,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/needless_pass_by_ref_mut.rs#L267-L278"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`Meta.next_page` is typed as a non-optional `String`, but the crates.io API returns `\"next_page\": null` once there are no further pages. The pagination loop `while crates.len() < number` only stops once `number` crates are collected; if `number` exceeds the total available crates (or the API otherwise terminates pagination with a null `next_page`), the next `into_json::<Page>()` fails to deserialize `null` into `String`, so `fetch` returns `Err` which `main` then `.unwrap()`s, panicking. There is no termination guard for 'no more pages'.","fix":"Make `next_page: Option<String>` and break the loop when it is `None` (or when a page returns zero crates), in addition to the length check.","locations":[{"ref":"lintcheck/src/popular_crates.rs:19-22","code":"   19 | #[derive(Deserialize, Debug)]\n   20 | struct Meta {\n   21 |     next_page: String,\n   22 | }","lines":4,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/lintcheck/src/popular_crates.rs#L19-L22"},{"ref":"lintcheck/src/popular_crates.rs:31-43","code":"   31 |     while crates.len() < number {\n   32 |         let page: Page = agent\n   33 |             .get(&format!(\"https://crates.io/api/v1/crates{query}\"))\n   34 |             .call()?\n   35 |             .into_json()?;\n   36 | \n   37 |         query = page.meta.next_page;\n   38 |         crates.extend(page.crates);\n   39 |         crates.truncate(number);\n   40 | \n   41 |         let width = number.ilog10() as usize + 1;\n   42 |         println!(\"Fetched {:>width$}/{number} crates\", crates.len());\n   43 |     }","lines":13,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/lintcheck/src/popular_crates.rs#L31-L43"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`run_rustfmt` configures the rustfmt child with `Stdio::piped()` stderr but only reads that stderr in the error branches; on a successful exit the pipe is never drained. rustfmt run with `--check` over many files can write substantial output to stderr; because the pipe buffer is never read on the success path, a child that writes more than the OS pipe buffer before exiting could block in `write` and `child.wait()` would then deadlock. Latent rather than commonly hit.","fix":"Always drain the child's stderr (e.g. via `wait_with_output`) in all match arms, or only pipe stderr when it is consumed.","locations":[{"ref":"clippy_dev/src/fmt.rs:292-327","code":"  292 |             cmd.stdout(Stdio::null())\n  293 |                 .stdin(Stdio::null())\n  294 |                 .stderr(Stdio::piped())\n  295 |                 .args([\"--unstable-features\", \"--skip-children\"]);\n  296 |             cmd\n  297 |         },\n  298 |         args.iter(),\n  299 |     )\n  300 |     .map(|mut cmd| expect_action(cmd.spawn(), ErrAction::Run, \"rustfmt\"))\n  301 |     .collect();\n  302 | \n  303 |     for child in &mut children {\n  304 |         let status = expect_action(child.wait(), ErrAction::Run, \"rustfmt\");\n  305 |         match (update_mode, status.exit_ok()) {\n  306 |             (UpdateMode::Check | UpdateMode::Change, Ok(())) => {},\n  307 |             (UpdateMode::Check, Err(_)) => {\n  308 |                 let mut s = String::new();\n  309 |                 if let Some(mut stderr) = child.stderr.take()\n  310 |                     && stderr.read_to_string(&mut s).is_ok()\n  311 |                 {\n  312 |                     eprintln!(\"{s}\");\n  313 |                 }\n  314 |                 eprintln!(\"Formatting check failed!\\nRun `cargo dev fmt` to update.\");\n  315 |                 process::exit(1);\n  316 |             },\n  317 |             (UpdateMode::Change, e) => {\n  318 |                 let mut s = String::new();\n  319 |                 if let Some(mut stderr) = child.stderr.take()\n  320 |                     && stderr.read_to_string(&mut s).is_ok()\n  321 |                 {\n  322 |                     eprintln!(\"{s}\");\n  323 |                 }\n  324 |                 expect_action(e, ErrAction::Run, \"rustfmt\");\n  325 |             },\n  326 |         }\n  327 |     }","lines":36,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_dev/src/fmt.rs#L292-L327"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In `check_install_precondition`, when `.vscode` does not exist and `fs::create_dir` fails, the error is printed but the function falls through and still returns `true`. `install_tasks` then proceeds to `fs::copy` into the missing directory, which fails again, emitting a second redundant error. The user sees two errors for one root cause and the precondition function's contract ('return false when install can't proceed') is violated.","fix":"In the `Err` arm of `create_dir` return `false` after printing the error.","locations":[{"ref":"clippy_dev/src/setup/vscode.rs:43-53","code":"   43 |         match fs::create_dir(vs_dir_path) {\n   44 |             Ok(()) => {\n   45 |                 println!(\"info: created `{VSCODE_DIR}` directory for clippy\");\n   46 |             },\n   47 |             Err(err) => {\n   48 |                 eprintln!(\"error: the task target directory `{VSCODE_DIR}` could not be created ({err})\");\n   49 |             },\n   50 |         }\n   51 |     }\n   52 | \n   53 |     true","lines":11,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_dev/src/setup/vscode.rs#L43-L53"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"For `CrateSource::Git`, a failed `git clone` or `git checkout` only prints to stderr via `eprintln!` and then proceeds to construct and return the `Crate` as if the source were ready. A failed clone leaves `repo_path` nonexistent/empty; lintcheck then runs clippy against missing sources and surfaces a much less clear error far from the root cause. The clone is also skipped entirely when `repo_path` already exists, so a previously-failed partial clone is never retried.","fix":"On clone/checkout failure return an error or exit with a clear message instead of returning an unusable crate path.","locations":[{"ref":"lintcheck/src/input.rs:247-271","code":"  247 |                 if !repo_path.is_dir() {\n  248 |                     println!(\"Cloning {url} and checking out {commit}\");\n  249 |                     if !Command::new(\"git\")\n  250 |                         .arg(\"clone\")\n  251 |                         .arg(url)\n  252 |                         .arg(&repo_path)\n  253 |                         .status()\n  254 |                         .expect(\"Failed to clone git repo!\")\n  255 |                         .success()\n  256 |                     {\n  257 |                         eprintln!(\"Failed to clone {url} into {}\", repo_path.display());\n  258 |                     }\n  259 |                 }\n  260 |                 // check out the commit/branch/whatever\n  261 |                 if !Command::new(\"git\")\n  262 |                     .args([\"-c\", \"advice.detachedHead=false\"])\n  263 |                     .arg(\"checkout\")\n  264 |                     .arg(commit)\n  265 |                     .current_dir(&repo_path)\n  266 |                     .status()\n  267 |                     .expect(\"Failed to check out commit\")\n  268 |                     .success()\n  269 |                 {\n  270 |                     eprintln!(\"Failed to checkout {commit} of repo at {}\", repo_path.display());\n  271 |                 }","lines":25,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/lintcheck/src/input.rs#L247-L271"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`match_wild_err_arm` identifies the `Err` variant by pretty-printing the qpath and string-comparing to the literal \"Err\" (`path_str == \"Err\"`). This is fragile name-based matching rather than lang-item resolution: a user-defined enum variant named `Err` in scope could match, and a fully-qualified `Result::Err(..)` would fail the compare. The scrutinee is already constrained to `Result`, limiting damage, but the check is incorrect compared to the lang-item resolution used elsewhere in this directory (manual_ok_err.rs uses `result_err_variant()`).","fix":"Resolve the pattern constructor and compare against `cx.tcx.lang_items().result_err_variant()` instead of comparing the pretty-printed path string to \"Err\".","locations":[{"ref":"clippy_lints/src/matches/match_wild_err_arm.rs:22-23","code":"   22 |                 let path_str = rustc_hir_pretty::qpath_to_string(&cx.tcx, path);\n   23 |                 if path_str == \"Err\" {","lines":2,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/matches/match_wild_err_arm.rs#L22-L23"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"Three OP_REF suggestion sites compute a mutable `applicability` and pass `&mut applicability` to `snippet_with_context` (which may downgrade it to `HasPlaceholders` when the `...` placeholder is used), but then hand a fresh hardcoded `Applicability::MachineApplicable` to `span_suggestion` instead of the (possibly downgraded) `applicability` variable, so the computed value is discarded. The sibling blocks at op_ref.rs:64-71 and op_ref.rs:84-87 correctly forward `applicability`. Result: rustfix may auto-apply a suggestion that still contains `...` placeholders.","fix":"Pass the mutated `applicability` variable to `span_suggestion` in all three sites instead of `Applicability::MachineApplicable`.","locations":[{"ref":"clippy_lints/src/operators/op_ref.rs:99-107","code":"   99 |                             let mut applicability = Applicability::MachineApplicable;\n  100 |                             let (rsnip, _) = snippet_with_context(cx, r.span, e.span.ctxt(), \"...\", &mut applicability);\n  101 |                             diag.span_suggestion(\n  102 |                                 right.span,\n  103 |                                 \"use the right value directly\",\n  104 |                                 rsnip,\n  105 |                                 Applicability::MachineApplicable,\n  106 |                             );\n  107 |                         },","lines":9,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/operators/op_ref.rs#L99-L107"},{"ref":"clippy_lints/src/operators/op_ref.rs:131-140","code":"  131 |                         |diag| {\n  132 |                             let mut applicability = Applicability::MachineApplicable;\n  133 |                             let (lsnip, _) = snippet_with_context(cx, l.span, e.span.ctxt(), \"...\", &mut applicability);\n  134 |                             diag.span_suggestion(\n  135 |                                 left.span,\n  136 |                                 \"use the left value directly\",\n  137 |                                 lsnip,\n  138 |                                 Applicability::MachineApplicable,\n  139 |                             );\n  140 |                         },","lines":10,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/operators/op_ref.rs#L131-L140"},{"ref":"clippy_lints/src/operators/op_ref.rs:159-168","code":"  159 |                     span_lint_and_then(cx, OP_REF, e.span, \"taken reference of right operand\", |diag| {\n  160 |                         let mut applicability = Applicability::MachineApplicable;\n  161 |                         let (rsnip, _) = snippet_with_context(cx, r.span, e.span.ctxt(), \"...\", &mut applicability);\n  162 |                         diag.span_suggestion(\n  163 |                             right.span,\n  164 |                             \"use the right value directly\",\n  165 |                             rsnip,\n  166 |                             Applicability::MachineApplicable,\n  167 |                         );\n  168 |                     });","lines":10,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/operators/op_ref.rs#L159-L168"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`with_test_item_names` uses a process-global `static OnceLock<Mutex<FxHashMap<LocalModDefId, Vec<Symbol>>>>` cache. It is never cleared between compilation sessions in the same process (leaking DefIds from prior crates) and is guarded by a single global `Mutex` that serializes all `is_in_test_function`/`is_test_function` lookups across threads. This is invoked widely during linting.","fix":"Store the cache in per-session state threaded through the lint context, or at minimum key/clear per crate; if global, shard or use RwLock to reduce contention.","locations":[{"ref":"clippy_utils/src/lib.rs:2352-2380","code":" 2352 | static TEST_ITEM_NAMES_CACHE: OnceLock<Mutex<FxHashMap<LocalModDefId, Vec<Symbol>>>> = OnceLock::new();\n 2353 | \n 2354 | /// Apply `f()` to the set of test item names.\n 2355 | /// The names are sorted using the default `Symbol` ordering.\n 2356 | fn with_test_item_names(tcx: TyCtxt<'_>, module: LocalModDefId, f: impl FnOnce(&[Symbol]) -> bool) -> bool {\n 2357 |     let cache = TEST_ITEM_NAMES_CACHE.get_or_init(|| Mutex::new(FxHashMap::default()));\n 2358 |     let mut map: MutexGuard<'_, FxHashMap<LocalModDefId, Vec<Symbol>>> = cache.lock().unwrap();\n 2359 |     let value = map.entry(module);\n 2360 |     match value {\n 2361 |         Entry::Occupied(entry) => f(entry.get()),\n 2362 |         Entry::Vacant(entry) => {\n 2363 |             let mut names = Vec::new();\n 2364 |             for id in tcx.hir_module_free_items(module) {\n 2365 |                 if matches!(tcx.def_kind(id.owner_id), DefKind::Const { .. })\n 2366 |                     && let item = tcx.hir_item(id)\n 2367 |                     && let ItemKind::Const(ident, _generics, ty, _body) = item.kind\n 2368 |                     && let TyKind::Path(QPath::Resolved(_, path)) = ty.kind\n 2369 |                     // We could also check for the type name `test::TestDescAndFn`\n 2370 |                     && let Res::Def(DefKind::Struct, _) = path.res\n 2371 |                     && find_attr!(tcx, item.hir_id(), RustcTestMarker(..))\n 2372 |                 {\n 2373 |                     names.push(ident.name);\n 2374 |                 }\n 2375 |             }\n 2376 |             names.sort_unstable();\n 2377 |             f(entry.insert(names))\n 2378 |         },\n 2379 |     }\n 2380 | }","lines":29,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/lib.rs#L2352-L2380"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`let mut packages = metadata.packages.clone();` deep-clones the entire package list (each `Package` is a large struct) just to sort it for `group_by`. The function only needs sorted references.","fix":"Sort a `Vec<&Package>` of references (`let mut packages: Vec<&Package> = metadata.packages.iter().collect(); packages.sort_by(...)`) instead of cloning the owned packages.","locations":[{"ref":"clippy_lints/src/cargo/multiple_crate_versions.rs:13-14","code":"   13 |     let mut packages = metadata.packages.clone();\n   14 |     packages.sort_by(|a, b| a.name.cmp(&b.name));","lines":2,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/cargo/multiple_crate_versions.rs#L13-L14"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In `VarBindingVisitor::visit_stmt`, a `Let` statement's `init` expression is visited twice: once manually (so the let's own pattern bindings are still in `self.identifiers`), then again via `walk_stmt` -> `visit_local` -> `walk_local`, which re-walks the entire init subtree. The second visit is redundant work on every local in the trailing-statement scan.","fix":"In the `Let` case, after the manual init visit and binding removal, avoid `walk_stmt` re-visiting `init` (e.g. visit only the `els` block), instead of calling `walk_stmt` which re-walks `init`.","locations":[{"ref":"clippy_lints/src/matches/match_single_binding.rs:186-197","code":"  186 |     fn visit_stmt(&mut self, stmt: &'tcx Stmt<'tcx>) -> Self::Result {\n  187 |         if let StmtKind::Let(let_stmt) = stmt.kind {\n  188 |             if let Some(init) = let_stmt.init {\n  189 |                 self.visit_expr(init)?;\n  190 |             }\n  191 | \n  192 |             let_stmt.pat.each_binding(|_, _, _, ident| {\n  193 |                 self.identifiers.remove(&ident.name);\n  194 |             });\n  195 |         }\n  196 |         walk_stmt(self, stmt)\n  197 |     }","lines":12,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/matches/match_single_binding.rs#L186-L197"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`cx.tcx.hir_get_parent_item(expr.hir_id)` is called twice: line 82 (taking `.def_id`) and line 86, where the result re-runs the identical query and shadows the `parent_fn` binding with a different-typed value. One redundant query plus confusing reuse of the same name.","fix":"Bind the result once: `let parent_item = cx.tcx.hir_get_parent_item(expr.hir_id);` then use `parent_item.def_id` and pass `parent_item` to `trait_ref_of_method`.","locations":[{"ref":"clippy_lints/src/suspicious_trait_impl.rs:82-87","code":"   82 |             && let parent_fn = cx.tcx.hir_get_parent_item(expr.hir_id).def_id\n   83 |             && let hir::Node::ImplItem(impl_item) = cx.tcx.hir_node_by_def_id(parent_fn)\n   84 |             && let hir::ImplItemKind::Fn(_, body_id) = impl_item.kind\n   85 |             && let body = cx.tcx.hir_body(body_id)\n   86 |             && let parent_fn = cx.tcx.hir_get_parent_item(expr.hir_id)\n   87 |             && let Some(trait_ref) = trait_ref_of_method(cx, parent_fn)","lines":6,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/suspicious_trait_impl.rs#L82-L87"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`format!(\"{generic_snippet}\")` formats a snippet into a fresh `String` solely to clone the existing `Cow<str>`. This is an unnecessary allocation/format in the suggestion path.","fix":"Pass `generic_snippet` directly (it already implements `Display`/`Into<String>`), e.g. `generic_snippet.to_string()` or `generic_snippet.into_owned()`, instead of `format!(\"{generic_snippet}\")`.","locations":[{"ref":"clippy_lints/src/types/redundant_allocation.rs:32","code":"   32 |                 diag.span_suggestion(hir_ty.span, \"try\", format!(\"{generic_snippet}\"), applicability);","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/types/redundant_allocation.rs#L32"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`find_assert_within_debug_assert` and `is_assert_arg` each call `cx.tcx.item_name(...)` (a query) inside a per-expression visitor closure, and `is_assert_arg` is invoked per expression from `find_assert_args_inner`'s walk. Repeatedly interning/looking up names during a full subtree walk is more expensive than necessary on assert-heavy code.","fix":"Compare resolved `DefId`s directly outside the per-expression closure rather than calling `item_name` per node.","locations":[{"ref":"clippy_utils/src/macros.rs:389-430","code":"  389 | fn find_assert_within_debug_assert<'a>(\n  390 |     cx: &LateContext<'_>,\n  391 |     expr: &'a Expr<'a>,\n  392 |     expn: ExpnId,\n  393 |     assert_name: Symbol,\n  394 | ) -> Option<(&'a Expr<'a>, ExpnId)> {\n  395 |     for_each_expr_without_closures(expr, |e| {\n  396 |         if !e.span.from_expansion() {\n  397 |             return ControlFlow::Continue(Descend::No);\n  398 |         }\n  399 |         let e_expn = e.span.ctxt().outer_expn();\n  400 |         if e_expn == expn {\n  401 |             ControlFlow::Continue(Descend::Yes)\n  402 |         } else if e_expn.expn_data().macro_def_id.map(|id| cx.tcx.item_name(id)) == Some(assert_name) {\n  403 |             ControlFlow::Break((e, e_expn))\n  404 |         } else {\n  405 |             ControlFlow::Continue(Descend::No)\n  406 |         }\n  407 |     })\n  408 | }\n  409 | \n  410 | fn is_assert_arg(cx: &LateContext<'_>, expr: &Expr<'_>, assert_expn: ExpnId) -> bool {\n  411 |     if !expr.span.from_expansion() {\n  412 |         return true;\n  413 |     }\n  414 |     let result = macro_backtrace(expr.span).try_for_each(|macro_call| {\n  415 |         if macro_call.expn == assert_expn {\n  416 |             ControlFlow::Break(false)\n  417 |         } else {\n  418 |             match cx.tcx.item_name(macro_call.def_id) {\n  419 |                 // `cfg!(debug_assertions)` in `debug_assert!`\n  420 |                 sym::cfg => ControlFlow::Continue(()),\n  421 |                 // assert!(other_macro!(..))\n  422 |                 _ => ControlFlow::Break(true),\n  423 |             }\n  424 |         }\n  425 |     });\n  426 |     match result {\n  427 |         ControlFlow::Break(is_assert_arg) => is_assert_arg,\n  428 |         ControlFlow::Continue(()) => true,\n  429 |     }\n  430 | }","lines":42,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/macros.rs#L389-L430"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`position_before_rarrow` allocates a full `Vec<char>` of the entire string to walk backwards over whitespace, when it only inspects characters near the end. Additionally `rpos` is a byte offset from `rfind` but is used to index the `Vec<char>`, so on input with multibyte characters before the arrow it indexes the wrong element.","fix":"Walk backwards over the byte slice `s[..rpos]` (e.g. `char_indices().rev()` or `trim_end` on `&s[..rpos]`) to find the last non-whitespace position, avoiding both the allocation and the byte/char index mismatch.","locations":[{"ref":"clippy_utils/src/source.rs:475-490","code":"  475 | pub fn position_before_rarrow(s: &str) -> Option<usize> {\n  476 |     s.rfind(\"->\").map(|rpos| {\n  477 |         let mut rpos = rpos;\n  478 |         let chars: Vec<char> = s.chars().collect();\n  479 |         while rpos > 1 {\n  480 |             if let Some(c) = chars.get(rpos - 1)\n  481 |                 && c.is_whitespace()\n  482 |             {\n  483 |                 rpos -= 1;\n  484 |                 continue;\n  485 |             }\n  486 |             break;\n  487 |         }\n  488 |         rpos\n  489 |     })\n  490 | }","lines":16,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/source.rs#L475-L490"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`str_literal_to_char_literal` computes `string.chars().count()` (a full pass over the string) in the non-ascii branch only to check `len == 1`. For long string literals this scans the whole string when it only needs to know whether there is exactly one char.","fix":"Use `let mut it = string.chars(); it.next().is_some() && it.next().is_none()` to stop after the second character.","locations":[{"ref":"clippy_utils/src/source.rs:791-796","code":"  791 |         && let len = if ascii_only {\n  792 |             string.len()\n  793 |         } else {\n  794 |             string.chars().count()\n  795 |         }\n  796 |         && len == 1","lines":6,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/source.rs#L791-L796"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`camel_case_split` allocates a `Vec<usize>` of byte offsets purely to iterate `windows(2)`, while `camel_case_indices` already allocates a `Vec<StrIndex>`. This is a second allocation and a redundant pass over the components on the string-name hot path used by `item_name_repetitions`.","fix":"Iterate the `StrIndex` vec pairwise directly and slice `s` without materializing a separate `Vec<usize>`.","locations":[{"ref":"clippy_utils/src/str_utils.rs:156-166","code":"  156 | pub fn camel_case_split(s: &str) -> Vec<&str> {\n  157 |     let mut offsets = camel_case_indices(s)\n  158 |         .iter()\n  159 |         .map(|e| e.byte_index)\n  160 |         .collect::<Vec<usize>>();\n  161 |     if offsets[0] != 0 {\n  162 |         offsets.insert(0, 0);\n  163 |     }\n  164 | \n  165 |     offsets.windows(2).map(|w| &s[w[0]..w[1]]).collect()\n  166 | }","lines":11,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/str_utils.rs#L156-L166"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `DerefDelegate::borrow`, `cmt.place.projections.clone()` allocates a fresh `Vec` only to truncate it and iterate, on the suggestion-building path of `deref_closure_args`. The clone+truncate can be replaced by slicing.","fix":"Iterate `cmt.place.projections[..pos].iter().filter(|p| p.kind == ProjectionKind::Deref)` instead of cloning the projections vector.","locations":[{"ref":"clippy_utils/src/sugg.rs:1079-1088","code":" 1079 |                     if let Some(pos) = last_deref {\n 1080 |                         let mut projections = cmt.place.projections.clone();\n 1081 |                         projections.truncate(pos);\n 1082 | \n 1083 |                         for item in projections {\n 1084 |                             if item.kind == ProjectionKind::Deref {\n 1085 |                                 replacement_str = format!(\"*{replacement_str}\");\n 1086 |                             }\n 1087 |                         }\n 1088 |                     }","lines":10,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/sugg.rs#L1079-L1088"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`ParamBindingIdCollector::collect_binding_hir_ids` copies each collected `HirId` from a per-param finder into the aggregate vec one element at a time via a manual loop, instead of appending the whole vec. Needless per-element copy on a path run for every body checked by `are_params_used`.","fix":"Replace the inner `for hir_id in &finder.binding_hir_ids { hir_ids.push(*hir_id); }` with `hir_ids.append(&mut finder.binding_hir_ids);`.","locations":[{"ref":"clippy_utils/src/usage.rs:90-102","code":"   90 |     fn collect_binding_hir_ids(body: &'tcx hir::Body<'tcx>) -> Vec<HirId> {\n   91 |         let mut hir_ids: Vec<HirId> = Vec::new();\n   92 |         for param in body.params {\n   93 |             let mut finder = ParamBindingIdCollector {\n   94 |                 binding_hir_ids: Vec::new(),\n   95 |             };\n   96 |             finder.visit_param(param);\n   97 |             for hir_id in &finder.binding_hir_ids {\n   98 |                 hir_ids.push(*hir_id);\n   99 |             }\n  100 |         }\n  101 |         hir_ids\n  102 |     }","lines":13,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/usage.rs#L90-L102"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`extend_vec_if_indicator_present` does `vec.contains(&\"..\".to_string())`, allocating a fresh `String` just to compare. Minor; runs a handful of times at config load.","fix":"Use `vec.iter().any(|s| s == \"..\")` (no allocation), matching the style already used a few lines above.","locations":[{"ref":"clippy_config/src/conf.rs:1240-1244","code":" 1240 | fn extend_vec_if_indicator_present(vec: &mut Vec<String>, default: &[&str]) {\n 1241 |     if vec.contains(&\"..\".to_string()) {\n 1242 |         vec.extend(default.iter().map(ToString::to_string));\n 1243 |     }\n 1244 | }","lines":5,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_config/src/conf.rs#L1240-L1244"}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"In `build_manual_memcpy_suggestion`'s `print_offset`, the zero check is done by allocating a string and comparing `offset.to_string() == \"0\"`, instead of reusing the existing `MinifyingSugg::is_zero()` helper used elsewhere in the file.","fix":"Use `if offset.is_zero()` instead of `if offset.to_string() == \"0\"`.","locations":[{"ref":"clippy_lints/src/loops/manual_memcpy.rs:122-128","code":"  122 |     fn print_offset(offset: MinifyingSugg<'static>) -> MinifyingSugg<'static> {\n  123 |         if offset.to_string() == \"0\" {\n  124 |             sugg::EMPTY.into()\n  125 |         } else {\n  126 |             offset\n  127 |         }\n  128 |     }","lines":7,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/loops/manual_memcpy.rs#L122-L128"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`make_iterator_snippet` wraps an     // If this doesn't need drop at all, then don't select `[const] Destruct`.\n  457 |         if !ty.needs_drop(tcx, body.typing_env(tcx)) {\n  458 |             return false;\n  459 |         }\n  460 | \n  461 |         let (infcx, param_env) = tcx.infer_ctxt().build_with_typing_env(body.typing_env(tcx));\n  462 |         // FIXME(const_trait_impl) constness\n  463 |         let obligation = Obligation::new(\n  464 |             tcx,\n  465 |             ObligationCause::dummy_with_span(body.span),\n  466 |             param_env,\n  467 |             TraitRef::new(tcx, tcx.require_lang_item(LangItem::Destruct, body.span), [ty]),\n  468 |         );\n  469 | \n  470 |         let mut selcx = SelectionContext::new(&infcx);\n  471 |         let Some(impl_src) = selcx.select(&obligation).ok().flatten() else {\n  472 |             return false;\n  473 |         };\n  474 | \n  475 |         if !matches!(\n  476 |             impl_src,\n  477 |             ImplSource::Builtin(BuiltinImplSource::Misc, _) | ImplSource::Param(_)\n  478 |         ) {\n  479 |             return false;\n  480 |         }\n  481 | \n  482 |         let ocx = ObligationCtxt::new(&infcx);\n  483 |         ocx.register_obligations(impl_src.nested_obligations());\n  484 |         ocx.evaluate_obligations_error_on_ambiguity().is_empty()\n  485 |     }\n  486 | \n  487 |     !ty.needs_drop(tcx, ConstCx::new(tcx, body).typing_env)\n  488 | }","lines":37,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/qualify_min_const_fn.rs#L452-L488"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`let attr_path = if let Some(ident) = attr.ident() { ... }` computes `attr_path`, then the very next block re-evaluates `attr.ident()` again with a fresh `if let Some(ident) = attr.ident()`. The first `attr.ident()` call is duplicated work; the two blocks could share one match on `attr.ident()`.","fix":"Compute `attr.ident()` once and reuse it for both the `attr_path` derivation and the name-based skip checks.","locations":[{"ref":"clippy_lints/src/attrs/duplicated_attributes.rs:39-61","code":"   39 |     let attr_path = if let Some(ident) = attr.ident() {\n   40 |         ident.name\n   41 |     } else {\n   42 |         Symbol::intern(&path_to_string(&attr.path))\n   43 |     };\n   44 |     if let Some(ident) = attr.ident() {\n   45 |         let name = ident.name;\n   46 |         if name == sym::doc || name == sym::cfg_attr_trace || name == sym::rustc_on_unimplemented || name == sym::reason\n   47 |         {\n   48 |             // FIXME: Would be nice to handle `cfg_attr` as well. Only problem is to check that cfg\n   49 |             // conditions are the same.\n   50 |             // `#[rustc_on_unimplemented]` contains duplicated subattributes, that's expected.\n   51 |             return;\n   52 |         }\n   53 |         if let Some(direct_parent) = parent.last()\n   54 |             && *direct_parent == sym::cfg_trace\n   55 |             && [sym::all, sym::not, sym::any].contains(&name)\n   56 |         {\n   57 |             // FIXME: We don't correctly check `cfg`s for now, so if it's more complex than just a one\n   58 |             // level `cfg`, we leave.\n   59 |             return;\n   60 |         }\n   61 |     }","lines":23,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/attrs/duplicated_attributes.rs#L39-L61"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"The `local_used_in`/`local_used_after_expr` guard that prepends `&`/`&mut` to the eta-reduction suggestion is wrapped by a FIXME (lines 233-236) stating: `Do we really need this local_used_in check? ... currently nothing changes after deleting this check.` The author explicitly suspects this branch is dead/unnecessary and unverified by any test.","fix":"Add a regression test exercising a callee local used in args or after the expr, or remove the branch if confirmed unreachable.","locations":[{"ref":"clippy_lints/src/eta_reduction.rs:232-247","code":"  232 |                             if callee.res_local_id().is_some_and(|l| {\n  233 |                                 // FIXME: Do we really need this `local_used_in` check?\n  234 |                                 // Isn't it checking something like... `callee(callee)`?\n  235 |                                 // If somehow this check is needed, add some test for it,\n  236 |                                 // 'cuz currently nothing changes after deleting this check.\n  237 |                                 local_used_in(cx, l, args) || local_used_after_expr(cx, l, expr)\n  238 |                             }) {\n  239 |                                 match closure_kind {\n  240 |                                     // Mutable closure is used after current expr; we cannot consume it.\n  241 |                                     ClosureKind::FnMut => snippet = format!(\"&mut {snippet}\"),\n  242 |                                     ClosureKind::Fn if !callee_ty_raw.is_ref() => {\n  243 |                                         snippet = format!(\"&{snippet}\");\n  244 |                                     },\n  245 |                                     _ => (),\n  246 |                                 }\n  247 |                             }","lines":16,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/eta_reduction.rs#L232-L247"}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"Trailing commented-out call `//try_parse_contains(cx, cond_expr)` refers to a function that no longer exists in the file. Leftover noise.","fix":"Remove the commented-out fragment from the end of line 61.","locations":[{"ref":"clippy_lints/src/set_contains_or_insert.rs:61","code":"   61 |             && let Some((contains_expr, sym)) = try_parse_op_call(cx, cond_expr, sym::contains)//try_parse_contains(cx, cond_expr)","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/set_contains_or_insert.rs#L61"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The macro comment claims disallowed-profile table parsing is 'special-cased to preserve spans for diagnostics in disallowed-path entries.' But `parse_profile_list` calls `path.set_span(config_span)` for *every* entry, where `config_span` is the span of the entire `profiles` value table. It is not each entry's span. Contrast the normal disallowed-path path in the `deserialize!` macro which uses each entry's own `value_span`. So any `create_disallowed_map` 'does not refer to a reachable ...' warning for a profile entry points at the whole table rather than the offending entry, and the comment is misleading.","fix":"In `parse_profile_list`, iterate over `Vec<toml::Spanned<toml::Value>>` and call `path.set_span(span_from_toml_range(file, entry.span()))` per entry; then drop `config_span` or fix the comment.","locations":[{"ref":"clippy_config/src/conf.rs:356-358","code":"  356 |                                 field_span,\n  357 |                                 // Disallowed-profile table parsing is special-cased to preserve spans for\n  358 |                                 // diagnostics in disallowed-path entries.","lines":3,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_config/src/conf.rs#L356-L358"},{"ref":"clippy_config/src/conf.rs:492-531","code":"  492 | fn parse_profile_list(\n  493 |     file: &SourceFile,\n  494 |     profile_name: &str,\n  495 |     key_name: &str,\n  496 |     value: toml::Value,\n  497 |     value_span: Range<usize>,\n  498 |     config_span: Span,\n  499 |     errors: &mut Vec<ConfError>,\n  500 | ) -> Vec<DisallowedPath> {\n  501 |     let toml::Value::Array(entries) = value else {\n  502 |         errors.push(ConfError::spanned(\n  503 |             file,\n  504 |             format!(\"profile `{profile_name}`: `{key_name}` must be an array\"),\n  505 |             None,\n  506 |             value_span,\n  507 |         ));\n  508 |         return Vec::new();\n  509 |     };\n  510 | \n  511 |     let mut disallowed = Vec::with_capacity(entries.len());\n  512 |     for entry in entries {\n  513 |         match DisallowedPath::deserialize(entry.clone()) {\n  514 |             Ok(mut path) => {\n  515 |                 path.set_span(config_span);\n  516 |                 disallowed.push(path);\n  517 |             },\n  518 |             Err(err) => errors.push(ConfError::spanned(\n  519 |                 file,\n  520 |                 format!(\n  521 |                     \"profile `{profile_name}`: {}\",\n  522 |                     err.to_string().replace('\\n', \" \").trim()\n  523 |                 ),\n  524 |                 None,\n  525 |                 value_span.clone(),\n  526 |             )),\n  527 |         }\n  528 |     }\n  529 | \n  530 |     disallowed\n  531 | }","lines":40,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_config/src/conf.rs#L492-L531"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment 'Ignore the command result; we'll fall back to displaying the old metadata' precedes `expect_action(cargo_cmd().arg(\"collect-metadata\").status(), ...)`. `expect_action` panics on `Err`. `Command::status()` returns `Err` only when the process fails to spawn (e.g. cargo not on PATH). So a non-zero exit is ignored as the comment says, but a spawn failure crashes the whole serve loop rather than falling back to old metadata.","fix":"Either truly ignore the result (`let _ = cargo_cmd().arg(\"collect-metadata\").status();`) to match the comment, or correct the comment to state a spawn failure is fatal.","locations":[{"ref":"clippy_dev/src/serve.rs:28-33","code":"   28 |             // Ignore the command result; we'll fall back to displaying the old metadata.\n   29 |             let _ = expect_action(\n   30 |                 cargo_cmd().arg(\"collect-metadata\").status(),\n   31 |                 ErrAction::Run,\n   32 |                 \"cargo collect-metadata\",\n   33 |             );","lines":6,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_dev/src/serve.rs#L28-L33"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Typo in the help message of `cast_slice_from_raw_parts::check_implicit_cast`: the help string is `\"replace_with\"` (with an underscore) instead of `\"replace with\"`, producing the awkward rendered help `replace_with: ...`. The sibling `check` function at line 53 correctly uses `\"replace with\"`.","fix":"Change `\"replace_with\"` to `\"replace with\"` to match line 53 and produce a grammatical help message.","locations":[{"ref":"clippy_lints/src/casts/cast_slice_from_raw_parts.rs:91","code":"   91 |             \"replace_with\",","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/casts/cast_slice_from_raw_parts.rs#L91"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `iter_over_hash_type` `Use instead` doc example does `let mut keys = my_map.keys().clone().collect::<Vec<_>>();`. `my_map.keys()` returns a `Keys` iterator; `.clone()` clones the iterator itself, which is a pointless no-op here since `.collect()` consumes it. The snippet teaches a misleading pattern.","fix":"Drop `.clone()`: `let mut keys = my_map.keys().collect::<Vec<_>>();` (use `.copied()` if owned keys are wanted).","locations":[{"ref":"clippy_lints/src/iter_over_hash_type.rs:26","code":"   26 |     ///     let mut keys = my_map.keys().clone().collect::<Vec<_>>();","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/iter_over_hash_type.rs#L26"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Variable `immutable` is bound to `src_ty.is_mutable_ptr()`, so it is `true` exactly when the source IS a mutable pointer - the opposite of what the name implies. The downstream `if immutable { \"\" } else { \"&mut \" }` is correct (a mutable ptr needs no extra `&mut`), so behavior is fine, but a future edit reading the name as 'is immutable' would invert the logic and introduce a bug.","fix":"Rename to `already_mut_ref` (true == already a `&mut`): `let already_mut_ref = src_ty.is_mutable_ptr();` and keep `if already_mut_ref { \"\" } else { \"&mut \" }`.","locations":[{"ref":"clippy_lints/src/methods/extend_with_drain.rs:19","code":"   19 |         && let immutable = src_ty.is_mutable_ptr()","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/extend_with_drain.rs#L19"},{"ref":"clippy_lints/src/methods/extend_with_drain.rs:36","code":"   36 |                 if immutable { \"\" } else { \"&mut \" },","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/extend_with_drain.rs#L36"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The diagnostic message renders the iterator method without its call parentheses: the format string interpolates `{method_name}` directly between two dots, producing `using `.iter.next()` on an array` / `.iter_mut.next()` instead of `.iter().next()`. Confirmed by the blessed test output. Misleading user-facing text.","fix":"Change the format strings to `using `.{method_name}().next()` ...`, then re-bless the test.","locations":[{"ref":"clippy_lints/src/methods/iter_next_slice.rs:64","code":"   64 |                 format!(\"using `.{method_name}.next()` on a Slice without end index\"),","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/iter_next_slice.rs#L64"},{"ref":"clippy_lints/src/methods/iter_next_slice.rs:77","code":"   77 |             format!(\"using `.{method_name}.next()` on an array\"),","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/iter_next_slice.rs#L77"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The second `span_suggestion` help message says \"if this is intentional, consider using `Path::new`\" but the actual emitted replacement is `PathBuf::from(...)`. The message names a different API than the code it inserts (and `Path::new` would not even type-check as a replacement here since it returns `&Path`), which is confusing.","fix":"Change the message to \"if this is intentional, consider using `PathBuf::from`\" to match the emitted suggestion.","locations":[{"ref":"clippy_lints/src/methods/join_absolute_paths.rs:44-49","code":"   44 |                     .span_suggestion(\n   45 |                         expr_span,\n   46 |                         \"if this is intentional, consider using `Path::new`\",\n   47 |                         format!(\"PathBuf::from({arg_str})\"),\n   48 |                         Applicability::Unspecified,\n   49 |                     );","lines":6,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/join_absolute_paths.rs#L44-L49"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The comment for `check_split_call_arg` is a verbatim copy-paste of the comment on `check_into_iter_call_arg`; it claims the function checks whether `expr` is an argument in an `into_iter` call, but this function handles `.split(...)` calls. Misleading for maintainers.","fix":"Rewrite the comment to describe the split case.","locations":[{"ref":"clippy_lints/src/methods/unnecessary_to_owned.rs:311-312","code":"  311 | /// Checks whether `expr` is an argument in an `into_iter` call and, if so, determines whether its\n  312 | /// call of a `to_owned`-like function is unnecessary.","lines":2,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/unnecessary_to_owned.rs#L311-L312"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The lint's documentation example silently changes the initializer body, misrepresenting what the suggestion does (the lint only swaps the wrapper type). The \"Bad\" block shows `static ref FOO: String = \"foo\".to_uppercase();` but \"Use instead\" shows `LazyLock::new(|| \"FOO\".to_lowercase())` - both the literal (\"foo\" -> \"FOO\") and the method (to_uppercase -> to_lowercase) were changed.","fix":"Keep the body identical, e.g. `LazyLock::new(|| \"foo\".to_uppercase())` in the FOO \"Use instead\" line.","locations":[{"ref":"clippy_lints/src/non_std_lazy_statics.rs:30-41","code":"   30 |     /// ### Example\n   31 |     /// ```ignore\n   32 |     /// lazy_static! {\n   33 |     ///     static ref FOO: String = \"foo\".to_uppercase();\n   34 |     /// }\n   35 |     /// static BAR: once_cell::sync::Lazy<String> = once_cell::sync::Lazy::new(|| \"BAR\".to_lowercase());\n   36 |     /// ```\n   37 |     /// Use instead:\n   38 |     /// ```ignore\n   39 |     /// static FOO: std::sync::LazyLock<String> = std::sync::LazyLock::new(|| \"FOO\".to_lowercase());\n   40 |     /// static BAR: std::sync::LazyLock<String> = std::sync::LazyLock::new(|| \"BAR\".to_lowercase());\n   41 |     /// ```","lines":12,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/non_std_lazy_statics.rs#L30-L41"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Malformed user-facing diagnostic text in REDUNDANT_COMPARISONS notes. The note format strings have a stray leading backtick before `if` and mismatched backticks around the snippet substitutions: `format!(\"`if `{rhs_str}` evaluates to true, {lhs_str}` will always evaluate to true as well\")`. This renders as e.g. `` `if `x > 5` evaluates to true, x > 4` will always... `` - leading backtick before `if`, and `{lhs_str}` has a closing backtick with no opening one. Line 101 has the identical defect with lhs/rhs swapped.","fix":"Rewrite as `format!(\"if `{rhs_str}` evaluates to true, `{lhs_str}` will always evaluate to true as well\")`: drop the leading backtick and balance the backticks around each snippet.","locations":[{"ref":"clippy_lints/src/operators/const_comparisons.rs:92","code":"   92 |                     format!(\"`if `{rhs_str}` evaluates to true, {lhs_str}` will always evaluate to true as well\"),","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/operators/const_comparisons.rs#L92"},{"ref":"clippy_lints/src/operators/const_comparisons.rs:101","code":"  101 |                     format!(\"`if `{lhs_str}` evaluates to true, {rhs_str}` will always evaluate to true as well\"),","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/operators/const_comparisons.rs#L101"}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The \"Use instead\" doc example shows `if set.insert(&value)` while the \"before\" example uses `set.insert(value)`. For a `HashSet<i32>`, `insert` takes the value by value, so `set.insert(&value)` would not compile. The example is misleading/incorrect.","fix":"Change the \"Use instead\" line to `if set.insert(value) {`.","locations":[{"ref":"clippy_lints/src/set_contains_or_insert.rs:31-42","code":"   31 |     /// if !set.contains(&value) {\n   32 |     ///     set.insert(value);\n   33 |     ///     println!(\"inserted {value:?}\");\n   34 |     /// }\n   35 |     /// ```\n   36 |     /// Use instead:\n   37 |     /// ```rust\n   38 |     /// use std::collections::HashSet;\n   39 |     /// let mut set = HashSet::new();\n   40 |     /// let value = 5;\n   41 |     /// if set.insert(&value) {\n   42 |     ///     println!(\"inserted {value:?}\");","lines":12,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/set_contains_or_insert.rs#L31-L42"}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The diagnostic message for the function-return-type case says \"dereferencing a reference to an uninhabited type would be undefined behavior\", but this code path fires on the return-type annotation, not a deref (the actual deref case is handled separately at line 53). The wording is misleading for the return-type lint.","fix":"Reword to reflect the return-type case, e.g. \"returning a reference to an uninhabited type could allow safe code to dereference it, which is undefined behavior\".","locations":[{"ref":"clippy_lints/src/uninhabited_references.rs:71-80","code":"   71 |         if let FnRetTy::Return(hir_ty) = fndecl.output\n   72 |             && let TyKind::Ref(_, mut_ty) = hir_ty.kind\n   73 |             && lower_ty(cx.tcx, mut_ty.ty).is_privately_uninhabited(cx.tcx, cx.typing_env())\n   74 |         {\n   75 |             span_lint(\n   76 |                 cx,\n   77 |                 UNINHABITED_REFERENCES,\n   78 |                 hir_ty.span,\n   79 |                 \"dereferencing a reference to an uninhabited type would be undefined behavior\",\n   80 |             );","lines":10,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/uninhabited_references.rs#L71-L80"}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `for_each_local_assignment` is copy-pasted from `for_each_local_use_after_expr` and says it runs the function for each path expression referencing the given local that occurs after a given expression. The function actually visits the RHS of every `Assign` whose LHS is the given local across the enclosing block (no 'after expr' notion, no 'path expression' semantics).","fix":"Rewrite to: 'Runs the given function for the right-hand side of each assignment to the given local within its enclosing block.'","locations":[{"ref":"clippy_utils/src/visitors.rs:722-723","code":"  722 | /// Runs the given function for each path expression referencing the given local which occur after\n  723 | /// the given expression.","lines":2,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/visitors.rs#L722-L723"}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `LintInfo::location` says the format is `clippy_lints/src/absolute_paths.rs#43`, but the macro generates it with `concat!(file!(), \"#L\", line!())`, producing `...#L43` (note the `#L`). The example is stale versus what the code produces and what consumers (e.g. compile-test `id_location`) receive.","fix":"Update the doc example to `clippy_lints/src/absolute_paths.rs#L43`.","locations":[{"ref":"declare_clippy_lint/src/lib.rs:107","code":"  107 |     /// e.g. `clippy_lints/src/absolute_paths.rs#43`","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/declare_clippy_lint/src/lib.rs#L107"},{"ref":"declare_clippy_lint/src/lib.rs:146","code":"  146 |             location: concat!(file!(), \"#L\", line!()),","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/declare_clippy_lint/src/lib.rs#L146"}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"A stale TODO `// TODO: THIS SHOULD BE TESTED, this comment will be gone soon` sits above the `allowed_idents_below_min_chars` `\"..\"` handling and was never removed. The two hand-rolled `\"..\"` extend blocks here also duplicate the `extend_vec_if_indicator_present` helper that already implements the same logic for other fields.","fix":"Remove the TODO and replace the two manual extend blocks with `extend_vec_if_indicator_present` calls.","locations":[{"ref":"clippy_config/src/conf.rs:1222-1232","code":" 1222 |             // TODO: THIS SHOULD BE TESTED, this comment will be gone soon\n 1223 |             if conf.conf.allowed_idents_below_min_chars.iter().any(|e| e == \"..\") {\n 1224 |                 conf.conf\n 1225 |                     .allowed_idents_below_min_chars\n 1226 |                     .extend(DEFAULT_ALLOWED_IDENTS_BELOW_MIN_CHARS.iter().map(ToString::to_string));\n 1227 |             }\n 1228 |             if conf.conf.doc_valid_idents.iter().any(|e| e == \"..\") {\n 1229 |                 conf.conf\n 1230 |                     .doc_valid_idents\n 1231 |                     .extend(DEFAULT_DOC_VALID_IDENTS.iter().map(ToString::to_string));\n 1232 |             }","lines":11,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_config/src/conf.rs#L1222-L1232"}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment on the space literal states nt,\n  543 |                     // triggering `await_holding_lock` and risking deadlock.\n  544 |                     if self.map_is_mutex_guard && desugar_await(expr).is_some() {\n  545 |                         self.can_use_entry = false;\n  546 |                     }","lines":8,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/entry.rs#L539-L546"}]},{"id":"CMT_18","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The lint message string is `\"unnecessary \\`>= y + 1\\` or \\`x - 1 >=\\`\"`. The second fragment `\\`x - 1 >=\\`` is truncated (missing the right-hand side) and the message omits the `<=` cases (`x + 1 <= y`, `x <= y - 1`) the lint also handles, so the user-facing diagnostic is garbled and incomplete.","fix":"Reword to a complete, symmetric message, e.g. `\"unnecessary \\`+ 1\\` or \\`- 1\\` in comparison; use \\`>\\` / \\`<\\` instead\"`.","locations":[{"ref":"clippy_lints/src/int_plus_one.rs:134","code":"  134 |             \"unnecessary `>= y + 1` or `x - 1 >=`\",","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/int_plus_one.rs#L134"}]},{"id":"CMT_19","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comments on the `indexed_indirectly` and `indexed_directly` fields read \"the extend is `None` for global\" - `extend` is a typo for `extent` (the `region::Scope`), which is misleading when reading the struct.","fix":"Fix the typo: change \"the extend is `None`\" to \"the extent is `None`\".","locations":[{"ref":"clippy_lints/src/loops/needless_range_loop.rs:233-238","code":"  233 |     /// indirectly indexed variables (`v[(i + 4) % N]`), the extend is `None` for global\n  234 |     indexed_indirectly: FxHashMap<Symbol, Option<region::Scope>>,\n  235 |     /// indirectly indexed literals, like `[1, 2, 3][(i + 4) % N]`\n  236 |     unnamed_indexed_indirectly: bool,\n  237 |     /// subset of `indexed` of vars that are indexed directly: `v[i]`\n  238 |     /// this will not contain cases like `v[calc_index(i)]` or `v[(i + 4) % N]`","lines":6,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/loops/needless_range_loop.rs#L233-L238"}]},{"id":"CMT_20","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In `check_is_some_is_none`, the comment 'We need to use `as_ref()` because `filter` takes a reference' references `filter`, but the suggestion produced is `is_some_and`/`is_none_or`, not `filter`. The comment is a stale copy-paste and is now misleading about why `as_ref()` is inserted.","fix":"Update the comment to reference the actual `is_some_and`/`is_none_or` rationale.","locations":[{"ref":"clippy_lints/src/methods/manual_is_variant_and.rs:322-328","code":"  322 |                 // We need to use `as_ref()` because `filter` takes a reference\n  323 |                 diag.span_suggestion(\n  324 |                     lint_span,\n  325 |                     \"use\",\n  326 |                     format!(\"{recv_snip}.as_ref().{method}({map_func_snip})\"),\n  327 |                     app,\n  328 |                 );","lines":7,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/manual_is_variant_and.rs#L322-L328"}]},{"id":"CMT_21","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Garbled comparison-operator set in the BAD_BIT_MASK doc comment. The doc lists `<cmp_op>` as `{!=, >=, >, !=, >=, >}` - `!=`, `>=`, `>` are each duplicated and the set omits `==`, `<`, and `<=`, all of which `check_bit_mask` actually handles (see bit_mask.rs). The table just below (mod.rs:153-158) correctly references `==`/`!=`/`<`/`>=`/`>`/`<=`, contradicting line 148.","fix":"Replace the set with `{==, !=, <, <=, >, >=}`.","locations":[{"ref":"clippy_lints/src/operators/mod.rs:148","code":"  148 |     /// {`!=`, `>=`, `>`, `!=`, `>=`, `>`}) can be determined from the following","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/operators/mod.rs#L148"}]},{"id":"CMT_22","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment says removal of the `_test` prefix, but the lint operates on the `test_` prefix (see `starts_with(\"test_\")` on line 83 and the trimming on line 98). The comment names the wrong string.","fix":"Change `_test` to `test_` in the doc comment.","locations":[{"ref":"clippy_lints/src/redundant_test_prefix.rs:125","code":"  125 | /// Checks whether removal of the `_test` prefix from the function name will cause a name conflict.","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/redundant_test_prefix.rs#L125"}]},{"id":"CMT_23","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comments for `eval_local`, `eval_full_int`, and the `integer_const`/`is_zero_integer_const` helpers contain the same copy-pasted typos in four places: 'This is need so', 'marke the evaluation', 'independant'.","fix":"Fix to 'This is needed so the const evaluator ... and mark the evaluation as non-local independent of what the macro expands to.' in all copies.","locations":[{"ref":"clippy_utils/src/consts.rs:569-588","code":"  569 |     /// Attempts to evaluate the expression without accessing other items.\n  570 |     ///\n  571 |     /// The context argument is the context used to view the evaluated expression. e.g. when\n  572 |     /// evaluating the argument in `f(m!(1))` the context of the call expression should be used.\n  573 |     /// This is need so the const evaluator can see the `m` macro and marke the evaluation as\n  574 |     /// non-local independant of what the macro expands to.\n  575 |     pub fn eval_local(&self, e: &Expr<'_>, ctxt: SyntaxContext) -> Option<Constant> {\n  576 |         match self.eval_with_source(e, ctxt) {\n  577 |             Some((x, ConstantSource::Local)) => Some(x),\n  578 |             _ => None,\n  579 |         }\n  580 |     }\n  581 | \n  582 |     /// Attempts to evaluate the expression as an integer without accessing other items.\n  583 |     ///\n  584 |     /// The context argument is the context used to view the evaluated expression. e.g. when\n  585 |     /// evaluating the argument in `f(m!(1))` the context of the call expression should be used.\n  586 |     /// This is need so the const evaluator can see the `m` macro and marke the evaluation as\n  587 |     /// non-local independant of what the macro expands to.\n  588 |     pub fn eval_full_int(&self, e: &Expr<'_>, ctxt: SyntaxContext) -> Option<FullInt> {","lines":20,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/consts.rs#L569-L588"},{"ref":"clippy_utils/src/consts.rs:1156-1176","code":" 1156 | /// If `expr` evaluates to an integer constant, return its value.\n 1157 | ///\n 1158 | /// The context argument is the context used to view the evaluated expression. e.g. when evaluating\n 1159 | /// the argument in `f(m!(1))` the context of the call expression should be used. This is need so\n 1160 | /// the const evaluator can see the `m` macro and marke the evaluation as non-local independant of\n 1161 | /// what the macro expands to.\n 1162 | pub fn integer_const(cx: &LateContext<'_>, expr: &Expr<'_>, ctxt: SyntaxContext) -> Option<u128> {\n 1163 |     if let Some(Constant::Int(value)) = ConstEvalCtxt::new(cx).eval_local(expr, ctxt) {\n 1164 |         Some(value)\n 1165 |     } else {\n 1166 |         None\n 1167 |     }\n 1168 | }\n 1169 | \n 1170 | /// Check xt) {\n  460 |             ReceiverPathResult::Continue(parent.hir_id)\n  461 |         } else {\n  462 |             ReceiverPathResult::Stop(true)\n  463 |         };\n  464 |     }\n  465 | \n  466 |     let Some(arg_index) = args.iter().position(|arg| arg.hir_id == current_hir_id) else {\n  467 |         return ReceiverPathResult::Stop(false);\n  468 |     };\n  469 | \n  470 |     let passthrough = !has_explicit_type_or_const_args(segment.args)\n  471 |         && cx\n  472 |             .typeck_results()\n  473 |             .type_dependent_def_id(parent.hir_id)\n  474 |             .is_some_and(|def_id| output_depends_on_input_param(cx, def_id, arg_index + 1));\n  475 | \n  476 |     if matches!(mode, ReceiverPathMode::FindLintBlockingContext) {\n  477 |         if passthrough\n  478 |             || args.iter().any(|arg| {\n  479 |                 arg.hir_id != current_hir_id\n  480 |                     && get_numeric_literal(arg).is_none()\n  481 |                     && !cx.typeck_results().expr_ty(arg).is_primitive()\n  482 |             })\n  483 |         {\n  484 |             ReceiverPathResult::Stop(true)\n  485 |         } else {\n  486 |             ReceiverPathResult::Continue(parent.hir_id)\n  487 |         }\n  488 |     } else if passthrough {\n  489 |         ReceiverPathResult::Continue(parent.hir_id)\n  490 |     } else {\n  491 |         ReceiverPathResult::Stop(false)\n  492 |     }\n  493 | }\n  494 | \n  495 | fn walk_receiver_path_call(\n  496 |     cx: &LateContext<'_>,\n  497 |     current_hir_id: HirId,\n  498 |     parent: &Expr<'_>,\n  499 |     callee: &Expr<'_>,\n  500 |     args: &[Expr<'_>],\n  501 |     mode: ReceiverPathMode,\n  502 | ) -> ReceiverPathResult {\n  503 |     if callee.hir_id == current_hir_id {\n  504 |         return ReceiverPathResult::Continue(parent.hir_id);\n  505 |     }\n  506 | \n  507 |     let Some(arg_index) = args.iter().position(|arg| arg.hir_id == current_hir_id) else {\n  508 |         return ReceiverPathResult::Stop(false);\n  509 |     };\n  510 | \n  511 |     let passthrough = if let ExprKind::Path(qpath) = callee.kind\n  512 |         && let Res::Def(DefKind::Fn, def_id) = cx.qpath_res(&qpath, callee.hir_id)\n  513 |     {\n  514 |         let has_explicit_args = match &qpath {\n  515 |             QPath::Resolved(_, path) => path\n  516 |                 .segments\n  517 |                 .last()\n  518 |                 .is_some_and(|seg| has_explicit_type_or_const_args(seg.args)),\n  519 |             QPath::TypeRelative(_, segment) => has_explicit_type_or_const_args(segment.args),\n  520 |         };\n  521 | \n  522 |         !has_explicit_args && output_depends_on_input_param(cx, def_id, arg_index)\n  523 |     } else {\n  524 |         false\n  525 |     };\n  526 | \n  527 |     if matches!(mode, ReceiverPathMode::FindLintBlockingContext) {\n  528 |         ReceiverPathResult::Stop(passthrough)\n  529 |     } else if passthrough {\n  530 |         ReceiverPathResult::Continue(parent.hir_id)\n  531 |     } else {\n  532 |         ReceiverPathResult::Stop(false)\n  533 |     }\n  534 | }\n  535 | \n  536 | // Walk one step up the receiver path for the current mode.\n  537 | fn walk_receiver_path_step(cx: &LateContext<'_>, current_hir_id: HirId, mode: ReceiverPathMode) -> ReceiverPathResult {\n  538 |     match cx.tcx.parent_hir_node(current_hir_id) {\n  539 |         Node::Expr(parent) => match parent.kind {\n  540 |             // Main case.\n  541 |             // The current node may be the receiver.\n  542 |             // Or it may flow through a passthrough method.\n  543 |             ExprKind::MethodCall(segment, receiver, args, _) => {\n  544 |                 walk_receiver_path_method_call(cx, current_hir_id, parent, segment, receiver, args, mode)\n  545 |             },\n  546 |             // Regular calls only keep the path alive\n  547 |             // if the output still depends on this input.\n  548 |             ExprKind::Call(callee, args) => walk_receiver_path_call(cx, current_hir_id, parent, callee, args, mode),\n  549 |             // A sibling that is not primitive blocks the lint.\n  550 |             ExprKind::Binary(_, left, right) | ExprKind::Index(left, right, _)\n  551 |                 if left.hir_id == current_hir_id || right.hir_id == current_hir_id =>\n  552 |             {\n  553 |                 if matches!(mode, ReceiverPathMode::FindLintBlockingContext) {\n  554 |                     let sibling = if left.hir_id == current_hir_id { right } else { left };\n  555 |                     if get_numeric_literal(sibling).is_none() && !cx.typeck_results().expr_ty(sibling).is_primitive() {\n  556 |                         ReceiverPathResult::Stop(true)\n  557 |                     } else {\n  558 |                         ReceiverPathResult::Continue(parent.hir_id)\n  559 |                     }\n  560 |                 } else {\n  561 |                     ReceiverPathResult::Continue(parent.hir_id)\n  562 |                 }\n  563 |             },\n  564 |             // These expressions don't block the lint, so we continue walking up the path.\n  565 |             ExprKind::Unary(_, inner)\n  566 |             | ExprKind::Cast(inner, _)\n  567 |             | ExprKind::AddrOf(_, _, inner)\n  568 |             | ExprKind::Field(inner, _)\n  569 |             | ExprKind::DropTemps(inner)\n  570 |                 if inner.hir_id == current_hir_id =>\n  571 |             {\n  572 |                 ReceiverPathResult::Continue(parent.hir_id)\n  573 |             },\n  574 |             // A block can forward its tail expression, so we keep walking through it.\n  575 |             ExprKind::Block(block, _)\n  576 |                 if block.hir_id == current_hir_id || block.expr.is_some_and(|tail| tail.hir_id == current_hir_id) =>\n  577 |             {\n  578 |                 ReceiverPathResult::Continue(parent.hir_id)\n  579 |             },\n  580 |             // Depending on
