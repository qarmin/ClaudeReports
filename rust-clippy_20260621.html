<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`map_container_to_text` indexes a fixed 18-space string literal with `&\"                  \"[0..*indent]` for `Container::List(indent)`. The `indent` value is computed in `doc/mod.rs` as `start.saturating_sub(range.start)` (the offset of the list item's content from the marker) and is not bounded to 18. A list item with a wide marker or deep indentation (e.g. content indented by 20+ spaces, or a numbered list with many digits plus spaces) yields `indent > 18`, so the slice is out of bounds and panics (ICE). The stale comment even claims the budget is only 'nine digits, plus the dot, plus four spaces on either side' but the literal holds 18 spaces, not enough for the documented worst case.","fix":"Build the indentation string dynamically, e.g. `\" \".repeat(*indent)` returning an owned String, or clamp/saturate the slice length with `&SPACES[0..(*indent).min(SPACES.len())]` after widening the literal. Do not index a fixed-width literal with an unbounded user-derived length.","locations":[{"ref":"clippy_lints/src/doc/lazy_continuation.rs:10-16","code":"   10 | fn map_container_to_text(c: &super::Container) -> &'static str {\n   11 |     match c {\n   12 |         super::Container::Blockquote => \"> \",\n   13 |         // numbered list can have up to nine digits, plus the dot, plus four spaces on either side\n   14 |         super::Container::List(indent) => &\"                  \"[0..*indent],\n   15 |     }\n   16 | }","lines":7,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/doc/lazy_continuation.rs#L10-L16"},{"ref":"clippy_lints/src/doc/mod.rs:1215-1228","code":" 1215 |                             refdefrange.start - range.start\n 1216 |                         } else {\n 1217 |                             let mut start = next_range.start;\n 1218 |                             if start > 0 && doc.as_bytes().get(start - 1) == Some(&b'\\\\') {\n 1219 |                                 // backslashes aren't in the event stream...\n 1220 |                                 start -= 1;\n 1221 |                             }\n 1222 | \n 1223 |                             start.saturating_sub(range.start)\n 1224 |                         }\n 1225 |                     } else {\n 1226 |                         0\n 1227 |                     };\n 1228 |                     containers.push(Container::List(indent));","lines":14,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/doc/mod.rs#L1215-L1228"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`metadata.packages[0]` indexes the first package unconditionally. For a virtual workspace manifest (a `Cargo.toml` with only `[workspace]` and no `[package]`), `cargo metadata --no-deps` can return an empty `packages` vector, so this indexing panics. Every other cargo lint in this directory iterates `&metadata.packages` safely; only this one indexes `[0]`.","fix":"Use `if let Some(package) = metadata.packages.first()` (or iterate, matching the other cargo lints) instead of `metadata.packages[0]`.","locations":[{"ref":"clippy_lints/src/cargo/wildcard_dependencies.rs:8-9","code":"    8 | pub(super) fn check(cx: &LateContext<'_>, metadata: &Metadata) {\n    9 |     for dep in &metadata.packages[0].dependencies {","lines":2,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/cargo/wildcard_dependencies.rs#L8-L9"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`get_captured_ids_recursive` calls `cx.tcx.hir_get_if_local(*def_id).unwrap()` on a closure DefId discovered inside an iterator type, then `can_move_expr_to_closure(cx, closure_expr).unwrap()`. The first unwrap can ICE when the closure DefId is non-local (a closure embedded in a type coming from another crate or a monomorphized generic). The second unwraps `None`, which `can_move_expr_to_closure` returns whenever it cannot prove the body movable. Iterator types like `Map<I, F>` routinely carry a closure `F`, so a body the analyzer declines triggers the ICE on otherwise-valid user code.","fix":"Replace both unwraps with graceful fallbacks: `if let Some(node) = cx.tcx.hir_get_if_local(*def_id)` and `if let Some(caps) = can_move_expr_to_closure(cx, closure_expr)`, treating the `None` cases as 'no captured ids'.","locations":[{"ref":"clippy_lints/src/methods/needless_collect.rs:729-740","code":"  729 |             ty::Closure(def_id, _) => {\n  730 |                 let closure_hir_node = cx.tcx.hir_get_if_local(*def_id).unwrap();\n  731 |                 if let Node::Expr(closure_expr) = closure_hir_node {\n  732 |                     can_move_expr_to_closure(cx, closure_expr)\n  733 |                         .unwrap()\n  734 |                         .into_iter()\n  735 |                         .for_each(|(hir_id, capture_kind)| {\n  736 |                             if matches!(capture_kind, CaptureKind::Ref(Mutability::Mut)) {\n  737 |                                 set.insert(hir_id);\n  738 |                             }\n  739 |                         });\n  740 |                 }","lines":12,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/needless_collect.rs#L729-L740"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`eq_attr_item_kind` calls `todo!()` for the `(Parsed, Parsed)` case. `eq_attr` is reachable from `eq_pat`/`eq_field_pat` (used by the `unnested_or_patterns` lint) when comparing pattern attributes. If both attributes are already-parsed builtin attributes (`AttrItemKind::Parsed`), this unconditionally panics, causing an ICE on otherwise valid user code.","fix":"Replace `todo!()` with a conservative `return false;` (treat as non-equal), or implement a real comparison of the parsed attribute contents.","locations":[{"ref":"clippy_utils/src/ast_utils/mod.rs:1021-1027","code":" 1021 | fn eq_attr_item_kind(l: &AttrItemKind, r: &AttrItemKind) -> bool {\n 1022 |     match (l, r) {\n 1023 |         (AttrItemKind::Unparsed(l), AttrItemKind::Unparsed(r)) => eq_attr_args(l, r),\n 1024 |         (AttrItemKind::Parsed(_l), AttrItemKind::Parsed(_r)) => todo!(),\n 1025 |         _ => false,\n 1026 |     }\n 1027 | }","lines":7,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/ast_utils/mod.rs#L1021-L1027"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`iter_input_pats` does `(0..decl.inputs.len()).map(move |i| &body.params[i])`, assuming `decl.inputs.len() == body.params.len()`. On HIR where these differ (recovered/malformed functions, or desugarings where body params do not match declared inputs) the slice index panics and ICEs.","fix":"Iterate `body.params.iter()` directly, or `decl.inputs.iter().zip(body.params)` so the shorter side bounds the loop.","locations":[{"ref":"clippy_utils/src/lib.rs:1554-1556","code":" 1554 | pub fn iter_input_pats<'tcx>(decl: &FnDecl<'_>, body: &'tcx Body<'_>) -> impl Iterator<Item = &'tcx Param<'tcx>> {\n 1555 |     (0..decl.inputs.len()).map(move |i| &body.params[i])\n 1556 | }","lines":3,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/lib.rs#L1554-L1556"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`PanicCall::parse` calls `path.segments.last().unwrap()` on a callee path. A `QPath::Resolved` path with zero segments panics. In practice resolved call paths have at least one segment, but this is an unchecked `unwrap` on user-derived HIR in a widely-used utility; a malformed/synthetic path would ICE.","fix":"Use `path.segments.last()?.ident.name` and return `None` if the path has no segments.","locations":[{"ref":"clippy_utils/src/macros.rs:297","code":"  297 |         let name = path.segments.last().unwrap().ident.name;","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/macros.rs#L297"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`calculate_dimensions` calls `fields.iter().map(|f| f.len()).max().unwrap()` twice; both panic if `fields` is empty. `fields` is the `expected` list from `unknown_field` after filtering out deprecated fields. With the current config set this is never empty, but it is fragile: if every remaining expected field were deprecated (or the list otherwise emptied), formatting an unknown-field error would itself panic. The first call is additionally gated behind a successfully-parsed `CLIPPY_TERMINAL_WIDTH`.","fix":"Use `.max().unwrap_or(0)` in both places, or early-return when `fields.is_empty()`.","locations":[{"ref":"clippy_config/src/conf.rs:1388","code":" 1388 |             let max_field_width = fields.iter().map(|field| field.len()).max().unwrap();","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_config/src/conf.rs#L1388"},{"ref":"clippy_config/src/conf.rs:1403","code":" 1403 |                     .max()","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_config/src/conf.rs#L1403"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `same_item_push::check`, `vec_ty.walk().nth(1).unwrap().expect_ty()` extracts the Vec element type. The `.unwrap()` assumes the walked type has a second component and `.expect_ty()` assumes it is a type arg (not a const/region). This holds for a well-formed `Vec<T>` reached via `get_vec_push`, but is brittle: any future change letting `vec` be non-`Vec`, or an unusual instantiation, turns this into an ICE.","fix":"Extract the element type defensively: `if let ty::Adt(_, args) = vec_ty.kind() && let Some(ty) = args.types().next()`, bailing out otherwise, instead of `walk().nth(1).unwrap().expect_ty()`.","locations":[{"ref":"clippy_lints/src/loops/same_item_push.rs:59-60","code":"   59 |         && let vec_ty = cx.typeck_results().expr_ty(vec)\n   60 |         && let ty = vec_ty.walk().nth(1).unwrap().expect_ty()","lines":2,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/loops/same_item_push.rs#L59-L60"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`map_clone::check` indexes `closure_body.params[0]` without verifying the closure has exactly one parameter. `map` is dispatched here, and a malformed closure with the wrong arity (e.g. user writes `.map(|| 5)`, a type error that still produces valid HIR which clippy lints over) makes this index out of bounds and ICE. Other closure handlers in this directory guard arity with `let [param] = body.params else { return; }`.","fix":"Match the param list before indexing: `let [param] = closure_body.params else { return; };` and use `param.pat.kind`.","locations":[{"ref":"clippy_lints/src/methods/map_clone.rs:52","code":"   52 |                 match closure_body.params[0].pat.kind {","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/map_clone.rs#L52"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`inputs[arg_idx]` indexes the callee's input-type slice with an index derived from the call's argument position (incremented by 1 for method calls). For a variadic extern fn, `fn_sig().inputs()` excludes the `...` part, so a `collect()` result passed in a variadic position yields `arg_idx >= inputs.len()` and an out-of-bounds panic/ICE. Unlikely but unguarded.","fix":"Use `inputs.get(arg_idx)` and `return` early if it is `None` instead of direct indexing.","locations":[{"ref":"clippy_lints/src/methods/needless_collect.rs:217","code":"  217 |                 .any(|ty| ty == inputs[arg_idx])","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/needless_collect.rs#L217"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`recv.span.get_text(cx).unwrap()` panics if the source text for the receiver span cannot be retrieved. `get_text` returns `None` for spans whose source is inaccessible (e.g. a receiver originating from a macro expansion while the outer `as_deref()`/`as_deref_mut()` call site is real source, so the crate-level `from_expansion()` guard does not protect it). Every other lint here uses `snippet`/`snippet_with_applicability`, which fall back to a placeholder.","fix":"Guard the result: `let Some(text) = recv.span.get_text(cx) else { return; };` then suggest `text.to_owned()`, or use `snippet(cx, recv.span, \"..\")`.","locations":[{"ref":"clippy_lints/src/methods/needless_option_as_deref.rs:35","code":"   35 |             recv.span.get_text(cx).unwrap().to_owned(),","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/methods/needless_option_as_deref.rs#L35"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the `PTR_ARG` suggestion builder, `r.self_span.get_text(cx).unwrap()` unwraps the source text of the method-call receiver span. `get_text` returns `Option`, and unwrapping inside the diagnostic closure will ICE if the span has no recoverable source text (e.g. spans touched by macro/desugaring edge cases). The rest of the file handles `get_text` fallibly (see DerefTyDisplay).","fix":"Handle the `None` case: fall back to a placeholder or skip emitting the per-usage replacement when `get_text` returns `None`, rather than `.unwrap()`.","locations":[{"ref":"clippy_lints/src/ptr/ptr_arg.rs:54-61","code":"   54 |                 iter::once((args.span, format!(\"{}{}\", args.ref_prefix, args.deref_ty.display(cx))))\n   55 |                     .chain(result.replacements.iter().map(|r| {\n   56 |                         (\n   57 |                             r.expr_span,\n   58 |                             format!(\"{}{}\", r.self_span.get_text(cx).unwrap(), r.replacement),\n   59 |                         )\n   60 |                     }))\n   61 |                     .collect(),","lines":8,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/ptr/ptr_arg.rs#L54-L61"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`walk_span_to_context(init.span, local.span.ctxt()).unwrap()` unwraps the result of walking a span to a context. While usually `Some`, `walk_span_to_context` returns `Option` and can yield `None` for spans in mismatched hygiene contexts, which would ICE inside the diagnostic closure.","fix":"Bind with `let Some(init_new_span) = walk_span_to_context(init.span, local.span.ctxt()) else { return; };` and bail out of the suggestion instead of `.unwrap()`.","locations":[{"ref":"clippy_lints/src/unit_types/let_unit_value.rs:77","code":"   77 |                     let init_new_span = walk_span_to_context(init.span, local.span.ctxt()).unwrap();","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/unit_types/let_unit_value.rs#L77"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In `UnnecessaryDefPath::check_expr`, each path segment is const-evaluated and if a segment cannot be resolved/const-evaluated the code calls `panic!(\"failed to resolve path {:?}\", expr.span)`. This is inside a lint pass, so a `type_path!`/`value_path!` invocation whose segment const cannot be const-evaluated (e.g. due to an error elsewhere) would ICE the compiler rather than skipping. The sibling code in `symbols.rs` handles the identical `const_eval_poly` + `to_u32` case gracefully with `if let Ok(...)`/`discard_err()`, making this panic inconsistent.","fix":"Replace the `panic!` with an early `return` / skip (use `if let` and bail), mirroring the graceful handling in `symbols.rs`.","locations":[{"ref":"clippy_lints_internal/src/unnecessary_def_path.rs:54-66","code":"   54 |             let path: Vec<Symbol> = segments\n   55 |                 .iter()\n   56 |                 .map(|segment| {\n   57 |                     if let Some(const_def_id) = segment.res(cx).opt_def_id()\n   58 |                         && let Ok(ConstValue::Scalar(value)) = cx.tcx.const_eval_poly(const_def_id)\n   59 |                         && let Some(value) = value.to_u32().discard_err()\n   60 |                     {\n   61 |                         Symbol::new(value)\n   62 |                     } else {\n   63 |                         panic!(\"failed to resolve path {:?}\", expr.span);\n   64 |                     }\n   65 |                 })\n   66 |                 .collect();","lines":13,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints_internal/src/unnecessary_def_path.rs#L54-L66"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`hash_pat` has `PatKind::Missing => unreachable!()` with no message. `PatKind::Missing` is produced for omitted parameter patterns; if a `Missing` pattern is ever hashed (e.g. via SpanlessHash over a body with a recovered/omitted param) clippy ICEs instead of producing a stable hash.","fix":"Hash the discriminant only (the `mem::discriminant` is already hashed on line 1458) and return for `PatKind::Missing` instead of `unreachable!()`, or add a message and a graceful release-build fallback.","locations":[{"ref":"clippy_utils/src/hir_utils.rs:1457-1460","code":" 1457 |     pub fn hash_pat(&mut self, pat: &Pat<'_>) {\n 1458 |         mem::discriminant(&pat.kind).hash(&mut self.s);\n 1459 |         match &pat.kind {\n 1460 |             PatKind::Missing => unreachable!(),","lines":4,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/hir_utils.rs#L1457-L1460"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`is_refutable` has `PatKind::Missing => unreachable!()` with no context message. If reached with an omitted/recovered parameter pattern it ICEs rather than degrading gracefully.","fix":"Return a sensible default (e.g. `false`) for `PatKind::Missing`, or add a message and `debug_assert!` so release builds do not ICE.","locations":[{"ref":"clippy_utils/src/lib.rs:1490","code":" 1490 |         PatKind::Missing => unreachable!(),","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/lib.rs#L1490"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`if_sequence` calls `panic!(\"ExprKind::If node is not an ExprKind::Block\")` when an `if` then-branch is not a block. This is a hard panic in shared utility code; any future HIR/desugaring change turns into an ICE rather than a skipped lint.","fix":"Replace the `panic!` with a graceful `break` (returning conds/blocks collected so far) or a `debug_assert!` plus break.","locations":[{"ref":"clippy_utils/src/lib.rs:1721-1725","code":" 1721 |         if let ExprKind::Block(block, _) = then.kind {\n 1722 |             blocks.push(block);\n 1723 |         } else {\n 1724 |             panic!(\"ExprKind::If node is not an ExprKind::Block\");\n 1725 |         }","lines":5,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/lib.rs#L1721-L1725"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`is_slice_of_primitives` uses `expr_type.peel_refs().walk().nth(1).unwrap().expect_ty()` and `refs_peeled.walk().last().unwrap()`. These rely on the walked type having the expected structure after `is_primitive`. If the structure does not match (unusual primitive/wrapper combination), `nth(1)` returns `None` / `expect_ty` fails and it ICEs in hot shared code.","fix":"Match on the walked `GenericArg` instead of unwrapping; return `None` when the element type cannot be extracted.","locations":[{"ref":"clippy_utils/src/lib.rs:2168","code":" 2168 |         match expr_type.peel_refs().walk().nth(1).unwrap().expect_ty().kind() {","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/lib.rs#L2168"},{"ref":"clippy_utils/src/lib.rs:2176","code":" 2176 |                 return Some(refs_peeled.walk().last().unwrap().to_string());","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/lib.rs#L2176"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`group_digits` computes `digits.clone().count() - 1` when `partial_group_first` is true; an empty digit iterator underflows and panics. Current callers feed only lexer-validated literals so the empty case is not reachable today, but `NumericLiteral::new`/`format` are public APIs with no such guarantee, so a malformed input ICEs instead of degrading gracefully.","fix":"Guard the empty case, e.g. `let n = digits.clone().count(); if n == 0 { return; }` (or use `checked_sub`).","locations":[{"ref":"clippy_utils/src/numeric_literal.rs:205-206","code":"  205 |         if partial_group_first {\n  206 |             first_group_size = (digits.clone().count() - 1) % group_size + 1;","lines":2,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/numeric_literal.rs#L205-L206"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`line_span` calls `sm.source_map().lookup_line(span.lo()).unwrap()`. `lookup_line` returns `Err` for a position in a file with no source lines (empty/zero-length virtual file). `line_span` feeds `indent_of`, `snippet_indent`, and `first_char_in_first_line`, reached from many lints on possibly synthetic spans, so an `Err` ICEs.","fix":"Return the original span (or an `Option`) when `lookup_line` returns `Err` instead of `unwrap()`.","locations":[{"ref":"clippy_utils/src/source.rs:421-427","code":"  421 | fn line_span<'sm>(sm: impl HasSourceMap<'sm>, span: Span) -> Span {\n  422 |     let span = original_sp(span, DUMMY_SP);\n  423 |     let SourceFileAndLine { sf, line } = sm.source_map().lookup_line(span.lo()).unwrap();\n  424 |     let line_start = sf.lines()[line];\n  425 |     let line_start = sf.absolute_position(line_start);\n  426 |     span.with_lo(line_start)\n  427 | }","lines":7,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/source.rs#L421-L427"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`snippet_with_context_sm` calls `span.parent_callsite().unwrap()` when `span.desugaring_kind() == Some(DesugaringKind::RangeExpr)`, assuming a range-desugaring span always has a parent callsite. A malformed/synthetic range span lacking a parent callsite would ICE.","fix":"Guard with `if let Some(parent) = span.parent_callsite() && parent.ctxt() == outer`, falling through to the normal path otherwise.","locations":[{"ref":"clippy_utils/src/source.rs:695","code":"  695 |     if span.desugaring_kind() == Some(DesugaringKind::RangeExpr) && span.parent_callsite().unwrap().ctxt() == outer {","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/source.rs#L695"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`trim_span` computes `data.lo - sf.start_pos` and indexes the source. If `data.lo < sf.start_pos` (a span whose lo precedes the looked-up source file start, possible with malformed/cross-file spans), `BytePos` subtraction underflows and panics in debug builds.","fix":"Use checked/saturating conversion or verify `data.lo >= sf.start_pos && data.hi >= sf.start_pos` before subtracting, returning `span` otherwise.","locations":[{"ref":"clippy_utils/src/source.rs:750-768","code":"  750 | pub fn trim_span(sm: &SourceMap, span: Span) -> Span {\n  751 |     let data = span.data();\n  752 |     let sf: &_ = &sm.lookup_source_file(data.lo);\n  753 |     let Some(src) = sf.src.as_deref() else {\n  754 |         return span;\n  755 |     };\n  756 |     let Some(snip) = &src.get((data.lo - sf.start_pos).to_usize()..(data.hi - sf.start_pos).to_usize()) else {\n  757 |         return span;\n  758 |     };\n  759 |     let trim_start = snip.len() - snip.trim_start().len();\n  760 |     let trim_end = snip.len() - snip.trim_end().len();\n  761 |     SpanData {\n  762 |         lo: data.lo + BytePos::from_usize(trim_start),\n  763 |         hi: data.hi - BytePos::from_usize(trim_end),\n  764 |         ctxt: data.ctxt,\n  765 |         parent: data.parent,\n  766 |     }\n  767 |     .span()\n  768 | }","lines":19,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/source.rs#L750-L768"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"After downloading, `if crates.is_empty()` reports the error with `config.only.unwrap()`. But `crates` can be empty for reasons unrelated to `--only` (e.g. an empty/misconfigured sources TOML, or all crates filtered out). In those cases `config.only` is `None` and `.unwrap()` panics with a misleading message instead of reporting the real problem.","fix":"Branch on `config.only`: if `Some(name)` report the missing crate, otherwise print a generic 'no crates to check' message and exit.","locations":[{"ref":"lintcheck/src/main.rs:383-389","code":"  383 |     if crates.is_empty() {\n  384 |         eprintln!(\n  385 |             \"ERROR: could not find crate '{}' in lintcheck/lintcheck_crates.toml\",\n  386 |             config.only.unwrap(),\n  387 |         );\n  388 |         std::process::exit(1);\n  389 |     }","lines":7,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/lintcheck/src/main.rs#L383-L389"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In `fmt_conf`, the attribute-nesting depth counter can underflow. `State::Attr(0)` with a `CloseBracket` is handled at line 127, but `State::Attr(0)` with a `CloseParen` or `CloseBrace` falls through to the generic arm and computes `State::Attr(x - 1)` with `x == 0`, panicking on `u32` underflow in debug builds (this dev binary is built in debug). Requires a malformed/unbalanced attribute in `conf.rs`, so it produces a confusing panic instead of the intended parse-error diagnostic.","fix":"Guard the decrement, e.g. `State::Attr(x.saturating_sub(1))`, or route any depth-0 `CloseParen`/`CloseBrace` to the parse-error arm.","locations":[{"ref":"clippy_dev/src/fmt.rs:127-136","code":"  127 |             (State::Attr(0), TokenKind::CloseBracket) => {\n  128 |                 attrs_end = i + 1;\n  129 |                 state = State::Docs;\n  130 |             },\n  131 |             (State::Attr(x), TokenKind::OpenParen | TokenKind::OpenBracket | TokenKind::OpenBrace) => {\n  132 |                 state = State::Attr(x + 1);\n  133 |             },\n  134 |             (State::Attr(x), TokenKind::CloseParen | TokenKind::CloseBracket | TokenKind::CloseBrace) => {\n  135 |                 state = State::Attr(x - 1);\n  136 |             },","lines":10,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_dev/src/fmt.rs#L127-L136"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`doc.as_bytes().get(start - 1)` computes `start - 1` in `usize` where `start = i + range.start` can be `0` (a `[` at the very start of the doc text). When `start == 0`, `start - 1` underflows; with overflow checks this panics, otherwise it wraps to `usize::MAX` (the `.get` then returns `None`, silently changing behavior). The equivalent code in `doc/mod.rs:1312` explicitly guards this exact case with a comment noting the underflow risk, so this site is an inconsistent, unguarded copy.","fix":"Guard the index like mod.rs does: `&& (start == 0 || doc.as_bytes().get(start - 1) != Some(&b'\\\\'))`, or use `start.checked_sub(1).map_or(true, |p| doc.as_bytes().get(p) != Some(&b'\\\\'))`.","locations":[{"ref":"clippy_lints/src/doc/doc_suspicious_footnotes.rs:19-23","code":"   19 |         let start = i + range.start;\n   20 |         if doc.as_bytes().get(start + 1) == Some(&b'^')\n   21 |             && let Some(end) = all_numbers_upto_brace(doc, start + 2)\n   22 |             && doc.as_bytes().get(end) != Some(&b':')\n   23 |             && doc.as_bytes().get(start - 1) != Some(&b'\\\\')","lines":5,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/doc/doc_suspicious_footnotes.rs#L19-L23"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In `is_array_length_equal_to_range`, `end_value - start_value` subtracts two raw u128 literal values extracted from user source with no ordering check. A reversed range literal such as `for i in 5..3 { dst[i] = src[i]; }` (start=5, end=3) underflows and panics in a debug build of clippy (ICE). The values come straight from `extract_lit_value` on user literals, so this is reachable.","fix":"Use `end_value.checked_sub(start_value)` and bail out (`_ => return false`) on `None`.","locations":[{"ref":"clippy_lints/src/loops/manual_memcpy.rs:502-505","code":"  502 |         let range = match (extract_lit_value(start), extract_lit_value(end)) {\n  503 |             (Some(start_value), Some(end_value)) => end_value - start_value,\n  504 |             _ => return false,\n  505 |         };","lines":4,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/loops/manual_memcpy.rs#L502-L505"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In `is_end_eq_array_len`, the closed-range branch computes `end_int.get() + 1` on a u128 with no overflow guard. A closed range whose end literal is `u128::MAX` (e.g. indexing `[T; N]` with `0..=340282366920938463463374607431768211455`) overflows and panics in a debug build (ICE). The value comes directly from a user literal.","fix":"Use `end_int.get().saturating_add(1) >= arr_len.into()` for the `Closed` arm; saturation at u128::MAX does not change the comparison result.","locations":[{"ref":"clippy_lints/src/loops/needless_range_loop.rs:216-219","code":"  216 |         return match limits {\n  217 |             ast::RangeLimits::Closed => end_int.get() + 1 >= arr_len.into(),\n  218 |             ast::RangeLimits::HalfOpen => end_int.get() >= arr_len.into(),\n  219 |         };","lines":4,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/loops/needless_range_loop.rs#L216-L219"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"The coverage loop `while num <= max.val { ... num += 1 ... }` increments `num: i128` unconditionally when a found value is hit. `expr_as_i128` accepts any literal that fits in i128, including exactly `i128::MAX` (line 46: `i128::try_from(num.get()).ok()?`). If `max.val == i128::MAX`, then when `num` reaches `i128::MAX` and is in `numbers_found`, `num += 1` (line 124) overflows: panic (ICE) in a debug build of clippy, wrap-around to i128::MIN in release causing an incorrect/looping lint. Triggerable by an OR-pattern containing i128::MAX and two neighbors on a 128-bit-typed scrutinee. The `range.end() + 1` on line 134 has the same risk.","fix":"Use checked arithmetic and break on overflow, e.g. `let Some(next) = num.checked_add(1) else { break }; num = next;`, and likewise guard `range.end().checked_add(1)`.","locations":[{"ref":"clippy_lints/src/manual_range_patterns.rs:121-138","code":"  121 |             let mut num = min.val;\n  122 |             while num <= max.val {\n  123 |                 if numbers_found.contains(&num) {\n  124 |                     num += 1;\n  125 |                 }\n  126 |                 // Given a list of (potentially overlapping) ranges like:\n  127 |                 // 1..=5, 3..=7, 6..=10\n  128 |                 // We want to find the range with the highest end that still contains the current number\n  129 |                 else if let Some(range) = ranges_found\n  130 |                     .iter()\n  131 |                     .filter(|range| range.contains(&num))\n  132 |                     .max_by_key(|range| range.end())\n  133 |                 {\n  134 |                     num = range.end() + 1;\n  135 |                 } else {\n  136 |                     return;\n  137 |                 }\n  138 |             }","lines":18,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/manual_range_patterns.rs#L121-L138"},{"ref":"clippy_lints/src/manual_range_patterns.rs:41-46","code":"   41 | fn expr_as_i128(expr: &PatExpr<'_>) -> Option<i128> {\n   42 |     if let PatExprKind::Lit { lit, negated } = expr.kind\n   43 |         && let LitKind::Int(num, _) = lit.node\n   44 |     {\n   45 |         // Intentionally not handling numbers greater than i128::MAX (for u128 literals) for now.\n   46 |         let n = i128::try_from(num.get()).ok()?;","lines":6,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/manual_range_patterns.rs#L41-L46"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In identity_op's `check_remainder`, signed full-int operands are compared with `lv.abs() < rv.abs()` where `lv`/`rv` are `i128`. For an expression like `i128::MIN % 5`, `lv == i128::MIN` and `i128::MIN.abs()` overflows: it panics in an overflow-checks build of clippy and silently wraps to `i128::MIN` (negative) otherwise, making the magnitude comparison nonsensical. `rv.abs()` has the same exposure for `_ % i128::MIN`.","fix":"Use total operations: `lv.unsigned_abs() < rv.unsigned_abs()` (both `u128`), which never overflows and gives the intended magnitude comparison.","locations":[{"ref":"clippy_lints/src/operators/identity_op.rs:194-200","code":"  194 |     if match (ecx.eval_full_int(left, ctxt), ecx.eval_full_int(right, ctxt)) {\n  195 |         (Some(FullInt::S(lv)), Some(FullInt::S(rv))) => lv.abs() < rv.abs(),\n  196 |         (Some(FullInt::U(lv)), Some(FullInt::U(rv))) => lv < rv,\n  197 |         _ => return,\n  198 |     } {\n  199 |         span_ineffective_operation(cx, span, arg, Parens::Unneeded, false);\n  200 |     }","lines":7,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/operators/identity_op.rs#L194-L200"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `const_eval_duration`, the `from_days` and `from_weeks` arms compute the duration via an explicit multiplication in clippy's own arithmetic: `from_hours(days * 24)` and `from_hours(weeks * 24 * 7)`, where `days`/`weeks` are `u64` parsed directly from a user literal. For large literals (e.g. `Duration::from_days(u64::MAX)`) the multiplication overflows: panic in a debug build of clippy, wrong wrapped value in release leading to an incorrect UNCHECKED_TIME_SUBTRACTION decision.","fix":"Use checked multiplication and bail on overflow, e.g. `from_hours(days.checked_mul(24)?)` and `from_hours(weeks.checked_mul(24 * 7)?)` (adapting the macro to allow `?` in the constructor arg, or via an explicit let).","locations":[{"ref":"clippy_lints/src/time_subtraction.rs:249-254","code":"  249 |             sym::from_days => {\n  250 |                 try_parse_duration! { (days: Int(u64)) -> from_hours(days * 24) }\n  251 |             },\n  252 |             sym::from_weeks => {\n  253 |                 try_parse_duration! { (weeks: Int(u64)) -> from_hours(weeks * 24 * 7) }\n  254 |             },","lines":6,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/time_subtraction.rs#L249-L254"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"In `to_const_range`, the closed-range (`a..=b`) end bound is computed as `Some(x + 1)` where `x: u128` comes from const-evaluating the index expression. If the constant end equals `u128::MAX` this addition overflows and panics (ICE) in a debug build of clippy. Reachability via a real array index is dubious (array indices are usize), but the unchecked `x + 1` on const-folded values is fragile.","fix":"Use `x.checked_add(1)` and return `None` (treat as non-const) on overflow.","locations":[{"ref":"clippy_lints/src/indexing_slicing.rs:247-252","code":"  247 |         Some(Some(Constant::Int(x))) => {\n  248 |             if range.limits == RangeLimits::Closed {\n  249 |                 Some(x + 1)\n  250 |             } else {\n  251 |                 Some(x)\n  252 |             }","lines":6,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/indexing_slicing.rs#L247-L252"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In both `rename_test_files` and `delete_test_files`, after the working OsString is switched from the `tests/ui/` prefix to the `tests/ui-toml/` prefix, the per-iteration `truncate` still resets to `\"tests/ui/\".len()` (9 bytes) instead of `\"tests/ui-toml/\".len()` (14 bytes). On the first ui-toml iteration the buffer is correct, but from the second entry onward the buffer is truncated to `tests/ui-` and the next `push(name)` produces a corrupted path. When a renamed/deprecated lint has two or more `tests/ui-toml/<lint>*` entries, all but the first are renamed/deleted at the wrong path (silently nothing, since try_rename_dir/delete_dir_if_exists swallow not-found). Rarely hit because most lints have at most one ui-toml dir.","fix":"Truncate to `\"tests/ui-toml/\".len()` in the ui-toml loops (both `old_buf`/`new_buf` in rename, and `buf` in delete). Best: capture the prefix length in a local and truncate to it.","locations":[{"ref":"clippy_dev/src/edit_lints.rs:274-280","code":"  274 |     for (name, _) in &tests {\n  275 |         old_buf.push(name);\n  276 |         new_buf.extend([new_name.as_ref(), name.slice_encoded_bytes(old_name.len()..)]);\n  277 |         try_rename_dir(old_buf.as_ref(), new_buf.as_ref());\n  278 |         old_buf.truncate(\"tests/ui/\".len());\n  279 |         new_buf.truncate(\"tests/ui/\".len());\n  280 |     }","lines":7,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_dev/src/edit_lints.rs#L274-L280"},{"ref":"clippy_dev/src/edit_lints.rs:303-309","code":"  303 |     tests.clear();\n  304 |     collect_ui_toml_test_names(lint, ignored_prefixes, &mut tests);\n  305 |     for (name, _) in &tests {\n  306 |         buf.push(name);\n  307 |         delete_dir_if_exists(buf.as_ref());\n  308 |         buf.truncate(\"tests/ui/\".len());\n  309 |     }","lines":7,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_dev/src/edit_lints.rs#L303-L309"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`add_ampersand_if_copy` inserts `&` at byte index 1 of `body_str`, assuming the string always begins with a closure pipe `|`. But `check_with` (manual_utils.rs lines 129-134) can produce a bare function-path body via the `can_pass_as_func` shortcut. For manual_filter, `get_cond_expr` makes the if-condition the `some_expr.expr`; a condition of the form `is_even(x)` collapses to just the function name `is_even`. When the scrutinee is `Copy`, `add_ampersand_if_copy` then turns `\"is_even\"` into `\"i&s_even\"`, emitting a broken `filter(i&s_even)` suggestion. The applicability is MachineApplicable, so it can be auto-applied to produce uncompilable code. (Note: the same `can_pass_as_func` path also bypasses the `needs_negated` handling that `to_snippet_with_context` would apply, a second correctness problem for manual_filter.)","fix":"Do not mutate `body_str` by byte index. Suppress the `can_pass_as_func` shortcut for the manual_filter caller (where prepending `&` is invalid and negation is needed), or thread the 'needs `&`' decision into `check_with` so the `&` is inserted right before the binding in the closure-form branch only.","locations":[{"ref":"clippy_lints/src/matches/manual_filter.rs:85-93","code":"   85 | fn add_ampersand_if_copy(body_str: String, has_copy_trait: bool) -> String {\n   86 |     if has_copy_trait {\n   87 |         let mut with_ampersand = body_str;\n   88 |         with_ampersand.insert(1, '&');\n   89 |         with_ampersand\n   90 |     } else {\n   91 |         body_str\n   92 |     }\n   93 | }","lines":9,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/matches/manual_filter.rs#L85-L93"},{"ref":"clippy_lints/src/matches/manual_filter.rs:209","code":"  209 |         let body_str = add_ampersand_if_copy(sugg_info.body_str, sugg_info.scrutinee_impl_copy);","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/matches/manual_filter.rs#L209"},{"ref":"clippy_lints/src/matches/manual_utils.rs:129-151","code":"  129 |     let body_str = if let PatKind::Binding(annotation, id, some_binding, None) = some_pat.kind {\n  130 |         if !some_expr.needs_unsafe_block\n  131 |             && let Some(func) = can_pass_as_func(cx, id, some_expr.expr)\n  132 |             && func.span.eq_ctxt(some_expr.expr.span)\n  133 |         {\n  134 |             snippet_with_applicability(cx, func.span, \"..\", &mut app).into_owned()\n  135 |         } else {\n  136 |             if some_expr.expr.res_local_id() == Some(id)\n  137 |                 && !is_lint_allowed(cx, MATCH_AS_REF, expr.hir_id)\n  138 |                 && binding_ref.is_some()\n  139 |             {\n  140 |                 return None;\n  141 |             }\n  142 | \n  143 |             // `ref` and `ref mut` annotations were handled earlier.\n  144 |             let annotation = if matches!(annotation, BindingMode::MUT) {\n  145 |                 \"mut \"\n  146 |             } else {\n  147 |                 \"\"\n  148 |             };\n  149 | \n  150 |             format!(\"|{annotation}{some_binding}| {closure_body}\")\n  151 |         }","lines":23,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/matches/manual_utils.rs#L129-L151"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `is_non_freeze_init_borrowed`, the recursive call passes `init_typeck` (the constant's definition-site `TypeckResults`, per the doc comment at lines 567-568) together with `src_expr` (a use-site expression). But `is_non_freeze_val_borrowed` (signature at line 489) immediately calls `typeck.expr_ty(src_expr)`, `typeck.expr_adjustments(src_expr)` and walks `hir_parent_iter(src_expr.hir_id)` on the passed typeck. `TypeckResults` are keyed per-body, so querying use-site HIR nodes against the definition-site typeck yields wrong type/adjustment data or panics with a node-not-found / hir-id-owner ICE. Every other call site (lines 540, 628, 676, 701, 866) correctly pairs the use-site `typeck` with `src_expr`; only line 613 uses `init_typeck`. The sibling fallback at line 628 in the same function uses `typeck` correctly.","fix":"Change `init_typeck` to `typeck` (the use-site parameter in scope) in the call on line 613.","locations":[{"ref":"clippy_lints/src/non_copy_const.rs:612-613","code":"  612 |                                 ) && let Ok(res) =\n  613 |                                     self.is_non_freeze_val_borrowed(tcx, typing_env, init_typeck, src_expr, val) =>","lines":2,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/non_copy_const.rs#L612-L613"},{"ref":"clippy_lints/src/non_copy_const.rs:489-498","code":"  489 |     fn is_non_freeze_val_borrowed(\n  490 |         &mut self,\n  491 |         tcx: TyCtxt<'tcx>,\n  492 |         typing_env: TypingEnv<'tcx>,\n  493 |         typeck: &'tcx TypeckResults<'tcx>,\n  494 |         mut src_expr: &'tcx Expr<'tcx>,\n  495 |         mut val: ConstValue,\n  496 |     ) -> Result<Option<BorrowSource<'tcx>>, ()> {\n  497 |         let mut parents = tcx.hir_parent_iter(src_expr.hir_id);\n  498 |         let mut ty = typeck.expr_ty(src_expr);","lines":10,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/non_copy_const.rs#L489-L498"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`Meet for Certainty` is incorrect when one side is `Contradiction`. The catch-all arm `(Certain(inner), _) | (_, Certain(inner)) => Certain(inner)` is reached for `(Certain, Contradiction)` and `(Contradiction, Certain)` (the `Uncertain` and `(Certain,Certain)` arms above did not match), so `meet(Certain(x), Contradiction) == Certain(x)`, silently swallowing a contradiction. `join` propagates `Contradiction` first. A meet that drops a known contradiction can upgrade a contradictory type-heuristic result to `Certain`, violating the module invariant that claiming false certainty is a bug.","fix":"Handle `Contradiction` explicitly before the catch-all, e.g. `(Certainty::Contradiction, _) | (_, Certainty::Contradiction) => Certainty::Contradiction,`, or deliberately document why a contradiction is absorbed.","locations":[{"ref":"clippy_utils/src/ty/type_certainty/certainty.rs:45-53","code":"   45 | impl Meet for Certainty {\n   46 |     fn meet(self, other: Self) -> Self {\n   47 |         match (self, other) {\n   48 |             (Certainty::Uncertain, _) | (_, Certainty::Uncertain) => Certainty::Uncertain,\n   49 |             (Certainty::Certain(lhs), Certainty::Certain(rhs)) => Certainty::Certain(lhs.meet(rhs)),\n   50 |             (Certainty::Certain(inner), _) | (_, Certainty::Certain(inner)) => Certainty::Certain(inner),\n   51 |             (Certainty::Contradiction, Certainty::Contradiction) => Certainty::Contradiction,\n   52 |         }\n   53 |     }","lines":9,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/ty/type_certainty/certainty.rs#L45-L53"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"manual_dangling_ptr's `is_literal_aligned` accepts ANY literal value that is `<= align` (`u128::from(val) <= align`), not only `val == align`. But the MachineApplicable suggestion replaces `N as *const T` with `ptr::dangling::<T>()`, whose address equals `align_of::<T>()`. So e.g. `2 as *const u32` (address 2) is rewritten to `std::ptr::dangling::<u32>()` (address 4) - the actual pointer value silently changes from 2 to 4. The lint's own test fixture confirms this (`2 as *const u32` -> `dangling::<u32>()`). For any value strictly between 1 and align the autofix is value-changing yet marked MachineApplicable.","fix":"Only lint when the literal exactly equals the alignment: replace `u128::from(val) <= align` with `u128::from(val) == align` (the `dangling` pointer's address is exactly the alignment). Values below the alignment are not equivalent to `ptr::dangling`.","locations":[{"ref":"clippy_lints/src/casts/manual_dangling_ptr.rs:69-81","code":"   69 | fn is_literal_aligned(cx: &LateContext<'_>, lit: &Spanned<LitKind>, to: &Ty<'_>) -> bool {\n   70 |     let LitKind::Int(val, _) = lit.node else { return false };\n   71 |     if val == 0 {\n   72 |         return false;\n   73 |     }\n   74 |     let to_mid_ty = cx.typeck_results().node_type(to.hir_id);\n   75 |     cx.tcx\n   76 |         .layout_of(cx.typing_env().as_query_input(to_mid_ty))\n   77 |         .is_ok_and(|layout| {\n   78 |             let align = u128::from(layout.align.bytes());\n   79 |             u128::from(val) <= align\n   80 |         })\n   81 | }","lines":13,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/casts/manual_dangling_ptr.rs#L69-L81"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `collection_is_never_read`, the closure-read detection passes `param.hir_id` to `has_no_read_access`, but that function compares against `expr.res_local_id()`, which returns the binding pattern's HirId (`PatKind::Binding(_, local_id, ..)` on `param.pat`), NOT the `Param` node's `hir_id`. These two HirIds are always distinct (see line 49 in the same file, which correctly extracts the binding id from `local.pat.kind`). Consequently no expression inside the closure body ever has `res_local_id() == Some(param.hir_id)`, so `has_no_read_access` always reports `no read`, `is_read_in_closure_arg` is always false, and the special-case block (114-131) is effectively dead. The documented example `items.retain(|item| send_item(item).is_ok());` is still flagged as a never-read collection: a false positive.","fix":"Extract the binding id from the closure param pattern: `&& let PatKind::Binding(_, arg_id, ..) = param.pat.kind` and pass `arg_id` (not `param.hir_id`) to `has_no_read_access`, mirroring line 49.","locations":[{"ref":"clippy_lints/src/collection_is_never_read.rs:118-131","code":"  118 |             let is_read_in_closure_arg = args.iter().any(|arg| {\n  119 |                 if let ExprKind::Closure(closure) = arg.kind\n  120 |                     // To keep things simple, we only check the first param to see if its read.\n  121 |                     && let Body { params: [param, ..], value } = cx.tcx.hir_body(closure.body)\n  122 |                 {\n  123 |                     !has_no_read_access(cx, param.hir_id, *value)\n  124 |                 } else {\n  125 |                     false\n  126 |                 }\n  127 |             });\n  128 |             if is_read_in_closure_arg {\n  129 |                 has_read_access = true;\n  130 |                 return ControlFlow::Break(());\n  131 |             }","lines":14,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/collection_is_never_read.rs#L118-L131"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The block intended to suppress the lint when a method implements a non-exported local trait checks the wrong def id. Line 163 already returns early when `!cx.effective_visibilities.is_exported(impl_item.owner_id.def_id)`. The later guard on line 182 re-checks the same `impl_item.owner_id.def_id`, which is therefore always false once line 180 is reached, making the whole `if` block (180-187) unreachable dead code. The comment and intent are to test the visibility of the trait (`trait_def_id`), not the impl item. As a result MISSING_INLINE_IN_PUBLIC_ITEMS wrongly fires on methods that implement a non-exported local trait.","fix":"Test the trait's visibility instead: convert `trait_def_id` to a LocalDefId and check `!cx.effective_visibilities.is_exported(local)` on line 182 rather than `impl_item.owner_id.def_id`.","locations":[{"ref":"clippy_lints/src/missing_inline.rs:162-187","code":"  162 |         // If the item being implemented is not exported, then we don't need #[inline]\n  163 |         if !cx.effective_visibilities.is_exported(impl_item.owner_id.def_id) {\n  164 |             return;\n  165 |         }\n  166 | \n  167 |         let desc = match impl_item.kind {\n  168 |             hir::ImplItemKind::Fn(..) => \"a method\",\n  169 |             hir::ImplItemKind::Const(..) | hir::ImplItemKind::Type(_) => return,\n  170 |         };\n  171 | \n  172 |         let assoc_item = cx.tcx.associated_item(impl_item.owner_id);\n  173 |         let container_id = assoc_item.container_id(cx.tcx);\n  174 |         let trait_def_id = match assoc_item.container {\n  175 |             AssocContainer::Trait => Some(container_id),\n  176 |             AssocContainer::TraitImpl(_) => Some(cx.tcx.impl_trait_id(container_id)),\n  177 |             AssocContainer::InherentImpl => None,\n  178 |         };\n  179 | \n  180 |         if let Some(trait_def_id) = trait_def_id\n  181 |             && trait_def_id.is_local()\n  182 |             && !cx.effective_visibilities.is_exported(impl_item.owner_id.def_id)\n  183 |         {\n  184 |             // If a trait is being implemented for an item, and the\n  185 |             // trait is not exported, we don't need #[inline]\n  186 |             return;\n  187 |         }","lines":26,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/missing_inline.rs#L162-L187"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`local_assignments` rescans every statement and terminator of every basic block (via `is_local_assignment`/`stmt_at`) for a single `local`. It is O(MIR size) per local and is reachable on arbitrary user MIR; when a lint queries many locals it becomes O(locals * MIR size). Unlike `expr_local`, it carries no cost warning.","fix":"When callers query assignments for many locals, build a single `Local -> Vec<Location>` map in one pass instead of calling `local_assignments` repeatedly; or document the cost.","locations":[{"ref":"clippy_utils/src/mir/mod.rs:167-179","code":"  167 | /// Returns a vector of `mir::Location` where `local` is assigned.\n  168 | pub fn local_assignments(mir: &Body<'_>, local: Local) -> Vec<Location> {\n  169 |     let mut locations = Vec::new();\n  170 |     for (block, data) in mir.basic_blocks.iter_enumerated() {\n  171 |         for statement_index in 0..=data.statements.len() {\n  172 |             let location = Location { block, statement_index };\n  173 |             if is_local_assignment(mir, local, location) {\n  174 |                 locations.push(location);\n  175 |             }\n  176 |         }\n  177 |     }\n  178 |     locations\n  179 | }","lines":13,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/mir/mod.rs#L167-L179"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `--fix` mode, the code finds a stderr line that *contains* `\"failed to automatically apply fixes suggested by rustc to crate\"`, then extracts the crate name with `&stderr[63..]` (where `stderr` is the single matched line). The 63-byte slice only works if the matched line *starts* with that exact 63-char phrase. Cargo emits it as `warning: failed to automatically apply fixes...`, so with any prefix the slice is at the wrong offset (mangled output), and if the matched line is shorter than 63 bytes it is an out-of-range slice panic.","fix":"Slice relative to the found phrase position: `let marker = \"...to crate \"; if let Some(line) = stderr.lines().find(|l| l.contains(marker)) { let subcrate = &line[line.find(marker).unwrap() + marker.len()..]; ... }`.","locations":[{"ref":"lintcheck/src/main.rs:199-209","code":"  199 |         if config.fix {\n  200 |             if let Some(stderr) = stderr\n  201 |                 .lines()\n  202 |                 .find(|line| line.contains(\"failed to automatically apply fixes suggested by rustc to crate\"))\n  203 |             {\n  204 |                 let subcrate = &stderr[63..];\n  205 |                 println!(\n  206 |                     \"ERROR: failed to apply some suggestion to {} / to (sub)crate {subcrate}\",\n  207 |                     self.name\n  208 |                 );\n  209 |             }","lines":11,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/lintcheck/src/main.rs#L199-L209"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `parse_cargo_package`, the start offset of the version literal uses total trimmed whitespace on both sides: `value.len() - value.trim().len()`. This is meant to skip only leading whitespace after `=`, but `trim()` also removes trailing whitespace, so any trailing whitespace after the version value (e.g. a trailing `\\r` on a CRLF checkout) inflates the start offset and yields a misaligned range. The `.end` computation correctly uses `trim_end()` only. Works for rustfmt-clean Unix files but is fragile.","fix":"Use leading-only whitespace: `value.len() - value.trim_start().len()`.","locations":[{"ref":"clippy_dev/src/utils.rs:248-249","code":"  248 |                     version_range.start = offset + (value.len() - value.trim().len()) + key.len() + 1;\n  249 |                     version_range.end = offset + key.len() + value.trim_end().len() + 1;","lines":2,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_dev/src/utils.rs#L248-L249"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The loop over an item's attributes uses `return` (not `continue`) when an attribute comes from an external macro: `if attr.span.in_external_macro(...) { return; }`. If a macro-generated attribute precedes a hand-written lint-level attribute on the same item, the early `return` abandons the whole loop and the remaining (lintable) attributes are never checked, causing missed lints.","fix":"Replace `return;` with `continue;` so only the macro-derived attribute is skipped while later attributes are still examined.","locations":[{"ref":"clippy_lints/src/attrs/useless_attribute.rs:13-16","code":"   13 |     for attr in attrs {\n   14 |         if attr.span.in_external_macro(cx.sess().source_map()) {\n   15 |             return;\n   16 |         }","lines":4,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/attrs/useless_attribute.rs#L13-L16"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`SuggestContext::recurse` returns `Option<()>` to signal that a snippet could not be built (it returns `None` at lines 362-363 when an inner terminal's snippet is not MachineApplicable, and at line 396 when `get_text` fails). The recursive calls in the `Not(And|Or)` arm (line 350), in the `And` arm (lines 379 and 382), and in the `Or` arm (line 391) ignore the returned Option (no `?`), while line 369 correctly propagates with `?`. As a result, a nested terminal that fails to produce a snippet inside an And/Or/Not(group) is silently swallowed and `recurse` still returns `Some(())`, so the caller emits a partial/malformed suggestion string instead of detecting the failure. Blast radius is limited because the suggestion is emitted with Applicability::Unspecified (not auto-applied).","fix":"Propagate consistently: use `self.recurse(inner)?;` at lines 350, 379, 382 and 391, and have the caller skip emitting the suggestion when `recurse` returns None.","locations":[{"ref":"clippy_lints/src/booleans.rs:346-397","code":"  346 |             Not(inner) => match **inner {\n  347 |                 And(_) | Or(_) => {\n  348 |                     self.output.push('!');\n  349 |                     self.output.push('(');\n  350 |                     self.recurse(inner);\n  351 |                     self.output.push(')');\n  352 |                 },\n  353 |                 Term(n) => {\n  354 |                     let terminal = self.terminals[n as usize];\n  355 |                     if let Some(str) = simplify_not(self.cx, self.msrv, terminal) {\n  356 |                         self.output.push_str(&str);\n  357 |                     } else {\n  358 |                         let mut app = Applicability::MachineApplicable;\n  359 |                         let snip = Sugg::hir_with_context(self.cx, terminal, SyntaxContext::root(), \"\", &mut app);\n  360 |                         // Ignore the case If the expression is inside a macro expansion, or the default snippet is used\n  361 |                         if app != Applicability::MachineApplicable {\n  362 |                             return None;\n  363 |                         }\n  364 |                         let _cannot_fail = write!(&mut self.output, \"{}\", !snip);\n  365 |                     }\n  366 |                 },\n  367 |                 True | False | Not(_) => {\n  368 |                     self.output.push('!');\n  369 |                     self.recurse(inner)?;\n  370 |                 },\n  371 |             },\n  372 |             And(v) => {\n  373 |                 for (index, inner) in v.iter().enumerate() {\n  374 |                     if index > 0 {\n  375 |                         self.output.push_str(\" && \");\n  376 |                     }\n  377 |                     if let Or(_) = *inner {\n  378 |                         self.output.push('(');\n  379 |                         self.recurse(inner);\n  380 |                         self.output.push(')');\n  381 |                     } else {\n  382 |                         self.recurse(inner);\n  383 |                     }\n  384 |                 }\n  385 |             },\n  386 |             Or(v) => {\n  387 |                 for (index, inner) in v.iter().rev().enumerate() {\n  388 |                     if index > 0 {\n  389 |                         self.output.push_str(\" || \");\n  390 |                     }\n  391 |                     self.recurse(inner);\n  392 |                 }\n  393 |             },\n  394 |             &Term(n) => {\n  395 |                 self.output\n  396 |                     .push_str(&self.terminals[n as usize].span.source_callsite().get_text(self.cx)?);\n  397 |             },","lines":52,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/booleans.rs#L346-L397"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`cognitive_complexity` subtracts a return-based adjustment with `if cc >= ret_adjust { cc -= ret_adjust; }`. The comment claims this prevents degenerate cases, but when `ret_adjust > cc` the code leaves `cc` at its full, un-reduced value rather than clamping it. So a function with many `return`s and few branches keeps its inflated complexity and can still trip the threshold: the opposite of the comment's stated intent. The branch only avoids the underflow panic, not the degenerate false positive it claims to prevent.","fix":"Clamp with a floor, e.g. `cc = cc.saturating_sub(ret_adjust).max(1);`, so the result matches the documented `subtract returns, floor at 1` semantics.","locations":[{"ref":"clippy_lints/src/cognitive_complexity.rs:101-104","code":"  101 |         // prevent degenerate cases where unreachable code contains `return` statements\n  102 |         if cc >= ret_adjust {\n  103 |             cc -= ret_adjust;\n  104 |         }","lines":4,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/cognitive_complexity.rs#L101-L104"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`disallowed_script_idents` flags an identifier if ANY of a character's Unicode Script_Extensions is not whitelisted (`.find(|script| !self.whitelist.contains(script))`). Script_Extensions encodes that a character is shared across several scripts (e.g. shared punctuation/digits); the comment at line 88 says `not part of any allowed script`, which matches an all-extensions-disallowed test. As written, a character belonging to both an allowed and a disallowed script is flagged - a potential false positive, and inconsistent with the comment.","fix":"Flag only when none of a character's script extensions are whitelisted: find a char where `c.script_extension().iter().all(|script| !self.whitelist.contains(script))`.","locations":[{"ref":"clippy_lints/src/disallowed_script_idents.rs:88-99","code":"   88 |             // Check if any character in the symbol is not part of any allowed script.\n   89 |             // Fast path for ascii-only idents.\n   90 |             if !symbol_str.is_ascii()\n   91 |                 && let Some(script) = symbol_str.chars().find_map(|c| {\n   92 |                     if c.is_ascii() {\n   93 |                         return None;\n   94 |                     }\n   95 | \n   96 |                     c.script_extension()\n   97 |                         .iter()\n   98 |                         .find(|script| !self.whitelist.contains(script))\n   99 |                 })","lines":12,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/disallowed_script_idents.rs#L88-L99"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `maybe_lint_endian_bytes`, the separator-insertion guard is `if i != len && !only_one`, but `i` comes from `allowed_lints.enumerate()` and so ranges over `0..len`, never reaching `len`. The guard `i != len` is therefore always true, and `\"or \"` is appended after every element including the last, producing malformed help text like `use either of \\`T::from_le\\` or \\`T::from_be\\` or instead`. (Separately, `\"either of \"` at line 188 is pushed once per iteration rather than once.)","fix":"Change line 193 to `if i != len - 1 && !only_one {` so the trailing `\"or \"` is suppressed; move the `\"either of \"` push (lines 187-189) out of the loop.","locations":[{"ref":"clippy_lints/src/endian_bytes.rs:185-197","code":"  185 |             for (i, lint) in allowed_lints.enumerate() {\n  186 |                 let only_one = len == 1;\n  187 |                 if !only_one {\n  188 |                     help_str.push_str(\"either of \");\n  189 |                 }\n  190 | \n  191 |                 write!(help_str, \"`{ty}::{}` \", lint.as_name(prefix)).unwrap();\n  192 | \n  193 |                 if i != len && !only_one {\n  194 |                     help_str.push_str(\"or \");\n  195 |                 }\n  196 |             }\n  197 |             help_str.push_str(\"instead\");","lines":13,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/endian_bytes.rs#L185-L197"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"mul_add's ambiguous-type guard (`has_ambiguous_type`, added for issue #14897 to avoid emitting wrongly-suffixed suggestions for ambiguous f32/f64 literals) is only applied to `inner_lhs`, not to `inner_rhs` or the addend. An ambiguous literal appearing only in `inner_rhs` or the third operand slips through and can yield a non-machine-applicable suggestion.","fix":"Apply the `has_ambiguous_type` guard to all participating sub-expressions (`inner_lhs`, `inner_rhs`, and the addend) before emitting the suggestion.","locations":[{"ref":"clippy_lints/src/floating_point_arithmetic/mul_add.rs:70-88","code":"   70 |     let has_ambiguous_type = |expr: &Expr<'_>| {\n   71 |         (matches!(expr.kind, ExprKind::Path(_)) || matches!(expr.kind, ExprKind::Call(_, _)))\n   72 |             && has_ambiguous_literal_in_expr(cx, expr)\n   73 |     };\n   74 | \n   75 |     let (recv, arg1, arg2, is_from_rhs) = if let Some((inner_lhs, inner_rhs)) = is_float_mul_expr(cx, rhs)\n   76 |         && cx.typeck_results().expr_ty(lhs).is_floating_point()\n   77 |         && !has_ambiguous_type(inner_lhs)\n   78 |     {\n   79 |         (inner_lhs, inner_rhs, lhs, true)\n   80 |     } else if !is_assign\n   81 |         && let Some((inner_lhs, inner_rhs)) = is_float_mul_expr(cx, lhs)\n   82 |         && cx.typeck_results().expr_ty(rhs).is_floating_point()\n   83 |         && !has_ambiguous_type(inner_lhs)\n   84 |     {\n   85 |         (inner_lhs, inner_rhs, rhs, false)\n   86 |     } else {\n   87 |         return;\n   88 |     };","lines":19,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/floating_point_arithmetic/mul_add.rs#L70-L88"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"radians.rs hardcodes the `_f64` suffix when the multiplicand is an unsuffixed float literal: `format!(\"{recv}_f64.to_degrees()\")`. If the surrounding expression is f32-typed, the original literal would have been inferred as f32, so appending `_f64` changes the literal's type in the suggested code. The existing tests only cover variable receivers and already-f64 literals, so the literal-in-f32-context case is untested.","fix":"Derive the suffix from `cx.typeck_results().expr_ty(mul_lhs)` (use the float type's `name_str()`, like `lib::prepare_receiver_sugg` does) instead of hardcoding `_f64`.","locations":[{"ref":"clippy_lints/src/floating_point_arithmetic/radians.rs:46-57","code":"   46 |                     let proposal = if let ExprKind::Lit(literal) = mul_lhs.kind\n   47 |                         && let ast::LitKind::Float(ref value, float_type) = literal.node\n   48 |                         && float_type == ast::LitFloatType::Unsuffixed\n   49 |                     {\n   50 |                         if value.as_str().ends_with('.') {\n   51 |                             format!(\"{recv}0_f64.to_degrees()\")\n   52 |                         } else {\n   53 |                             format!(\"{recv}_f64.to_degrees()\")\n   54 |                         }\n   55 |                     } else {\n   56 |                         format!(\"{}.to_degrees()\", recv.maybe_paren())\n   57 |                     };","lines":12,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/floating_point_arithmetic/radians.rs#L46-L57"},{"ref":"clippy_lints/src/floating_point_arithmetic/radians.rs:72-83","code":"   72 |                     let proposal = if let ExprKind::Lit(literal) = mul_lhs.kind\n   73 |                         && let ast::LitKind::Float(ref value, float_type) = literal.node\n   74 |                         && float_type == ast::LitFloatType::Unsuffixed\n   75 |                     {\n   76 |                         if value.as_str().ends_with('.') {\n   77 |                             format!(\"{recv}0_f64.to_radians()\")\n elf.format_trait_impl = None;\n  127 |         }\n  128 |     }","lines":11,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/format_impl.rs#L118-L128"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `check_enum_start`, the third condition `name.chars().nth(item_name_chars + 1).is_some_and(|c| !c.is_numeric())` requires a character at index `item_name_chars + 1`, i.e. it forces the variant name to be at least `enum_name_len + 2` chars. A variant equal to the enum name plus a single non-digit char (enum `Foo`, variant `FooX`) has no char at that index, so `is_some_and` is false and ENUM_VARIANT_NAMES never fires, even though `FooX` plainly starts with the enum name. The intent (per the lint docs) is only to exclude a numeric char immediately after the prefix (`Foo1`); that check belongs at index `item_name_chars`, not `item_name_chars + 1`. Existing UI tests use multi-char suffixes so the bug is masked.","fix":"Check the boundary char itself: combine into `name.chars().nth(item_name_chars).is_some_and(|c| !c.is_lowercase() && !c.is_numeric())` and drop the separate `nth(item_name_chars + 1)` clause.","locations":[{"ref":"clippy_lints/src/item_name_repetitions.rs:418-421","code":"  418 |     if count_match_start(item_name, name).char_count == item_name_chars\n  419 |         && name.chars().nth(item_name_chars).is_some_and(|c| !c.is_lowercase())\n  420 |         && name.chars().nth(item_name_chars + 1).is_some_and(|c| !c.is_numeric())\n  421 |         && !check_enum_tuple_path_match(name, variant.data)","lines":4,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/item_name_repetitions.rs#L418-L421"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `explicit_counter_loop`, when `InitializeVisitor` returns no counter /src/consts.rs:127-149","code":"  127 | impl PartialEq for Constant {\n  128 |     fn eq(&self, other: &Self) -> bool {\n  129 |         match (self, other) {\n  130 |             (Self::Str(ls), Self::Str(rs)) => ls == rs,\n  131 |             (Self::Binary(l), Self::Binary(r)) => l == r,\n  132 |             (&Self::Char(l), &Self::Char(r)) => l == r,\n  133 |             (&Self::Int(l), &Self::Int(r)) => l == r,\n  134 |             (&Self::F64(l), &Self::F64(r)) => {\n  135 |                 // `to_bits` is required to catch non-matching `0.0` and `-0.0`.\n  136 |                 l.to_bits() == r.to_bits() && !l.is_nan()\n  137 |             },\n  138 |             (&Self::F32(l), &Self::F32(r)) => {\n  139 |                 // `to_bits` is required to catch non-matching `0.0` and `-0.0`.\n  140 |                 l.to_bits() == r.to_bits() && !l.is_nan()\n  141 |             },\n  142 |             (&Self::Bool(l), &Self::Bool(r)) => l == r,\n  143 |             (&Self::Vec(ref l), &Self::Vec(ref r)) | (&Self::Tuple(ref l), &Self::Tuple(ref r)) => l == r,\n  144 |             (Self::Repeat(lv, ls), Self::Repeat(rv, rs)) => ls == rs && lv == rv,\n  145 |             (Self::Ref(lb), Self::Ref(rb)) => *lb == *rb,\n  146 |             // TODO: are there inter-type equalities?\n  147 |             _ => false,\n  148 |         }\n  149 |     }","lines":23,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/consts.rs#L127-L149"},{"ref":"clippy_utils/src/consts.rs:209-263","code":"  209 |     pub fn partial_cmp(tcx: TyCtxt<'_>, cmp_type: Ty<'_>, left: &Self, right: &Self) -> Option<Ordering> {\n  210 |         match (left, right) {\n  211 |             (Self::Str(ls), Self::Str(rs)) => Some(ls.cmp(rs)),\n  212 |             (Self::Char(l), Self::Char(r)) => Some(l.cmp(r)),\n  213 |             (&Self::Int(l), &Self::Int(r)) => match *cmp_type.kind() {\n  214 |                 ty::Int(int_ty) => Some(sext(tcx, l -lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_utils/src/visitors.rs#L741-L751"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`RustcIce::from_stderr_and_status` treats *any* process exit code of 101 as an internal compiler error, ignoring stderr content (the `stderr` parameter is only copied into `ice_content`, never inspected). Exit code 101 is also the default Rust panic exit code and is commonly returned by cargo/build failures that are not clippy ICEs, producing false 'Some crates ICEd' results and spurious ICE entries.","fix":"Require an ICE signature in stderr (e.g. `stderr.contains(\"internal compiler error\")` or `\"thread 'rustc' panicked\"`) before classifying as a `RustcIce`.","locations":[{"ref":"lintcheck/src/output.rs:36-49","code":"   36 | impl RustcIce {\n   37 |     pub fn from_stderr_and_status(crate_name: &str, status: ExitStatus, stderr: &str) -> Option<Self> {\n   38 |         if status.code().unwrap_or(0) == 101\n   39 |         /* ice exit status */\n   40 |         {\n   41 |             Some(Self {\n   42 |                 crate_name: crate_name.to_owned(),\n   43 |                 ice_content: stderr.to_owned(),\n   44 |             })\n   45 |         } else {\n   46 |             None\n   47 |         }\n   48 |     }\n   49 | }","lines":14,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/lintcheck/src/output.rs#L36-L49"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"In `verify_case`, the `UpperCase`/`LowerCase` checks use `c.to_uppercase().next() == Some(c)` and `c.to_lowercase().next() == Some(c)`. Characters whose case mapping expands to multiple chars (e.g. 'ß' -> \"SS\") are judged only by their first mapped char, so a string-literal arm containing such a character can be classified inaccurately. Best-effort heuristic, but not a faithful case test.","fix":"Compare the full case-mapped string against the original, or document the ASCII-only intent.","locations":[{"ref":"clippy_lints/src/matches/match_str_case_mismatch.rs:82-84","code":"   82 |         CaseMethod::LowerCase => |input: &str| -> bool { input.chars().all(|c| c.to_lowercase().next() == Some(c)) },\n   83 |         CaseMethod::AsciiLowerCase => |input: &str| -> bool { !input.chars().any(|c| c.is_ascii_uppercase()) },\n   84 |         CaseMethod::UpperCase => |input: &str| -> bool { input.chars().all(|c| c.to_uppercase().next() == Some(c)) },","lines":3,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/matches/match_str_case_mismatch.rs#L82-L84"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"Inconsistent `peel_refs()` usage in transmute_undefined_repr when deciding whether to emit the 'has an undefined layout' note. At lines 72/86 the comparison peels refs on BOTH sides (`from_ty_orig.peel_refs() != from_ty.peel_refs()`), but the later branches at 120/123/141/158 peel only the original side (`from_ty_orig.peel_refs() != from_ty`), comparing operands at different reduction levels so the inequality is essentially always true there. This affects only a diagnostic note (cannot cause a wrong lint to fire), so impact is cosmetic, but the asymmetry looks unintentional.","fix":"Make all five comparisons consistent - peel refs on both sides (`from_ty_orig.peel_refs() != from_ty.peel_refs()`) everywhere, or none.","locations":[{"ref":"clippy_lints/src/transmute/transmute_undefined_repr.rs:72","code":"   72 |                         if from_ty_orig.peel_refs() != from_ty.peel_refs() {","lines":1,"link":"https://github.com/rust-lang/rust-clippy/blob/d0a919d7c850dd66f2be66ae7a6f09fb099f38be/clippy_lints/src/transmute/transmute_undefined_repr.rs#L72"},{"ref":"clippy_lints/src/transmute/transmute_undefined_repr.rs
