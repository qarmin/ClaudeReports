odebase.","locations":[{"ref":"qt/app.py:95","code":"   95 |             self.excludeDialog = ExcludeListDialog(app=self, parent=parent_window, model=self.model.exclude_list_dialog)","lines":1}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":false,"description":"In MusicFile._read_info the 'comment' tag defaults to ['' ] (a list with one empty string) via 'or [\"\"]', while every other tag uses 'or []'. The result for comment is an empty string after join either way, so behavior is equivalent, but the inconsistency is confusing and suggests a copy/paste slip.","fix":"Use 'or []' for comment to match the other fields, since ', '.join([]) already yields an empty string.","locations":[{"ref":"core/me/fs.py:113","code":"  113 |             self.comment = \", \".join(file.tags.get(\"comment\") or [\"\"])","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Directories._get_files swaps a broad 'except OSError: pass' around the whole os.scandir block and an inner 'except (OSError, fs.InvalidPath): pass' per item. A directory that becomes unreadable mid-scan is silently skipped with no record in results.problems and no user-visible warning, so users can believe a folder was fully scanned when it was not. The same silent-pass pattern is in _get_folders, get_subfolders, load_from_file.","fix":"Log skipped paths (at least at debug/info) and consider surfacing unreadable directories to the user rather than swallowing all OSErrors silently.","locations":[{"ref":"core/directories.py:93-132","code":"   93 |     def _get_files(self, from_path, fileclasses, j):\n   94 |         try:\n   95 |             with os.scandir(from_path) as iter:\n   96 |                 root_path = Path(from_path)\n   97 |                 state = self.get_state(root_path)\n   98 |                 # if we have no un-excluded dirs under this directory skip going deeper\n   99 |                 skip_dirs = state == DirectoryState.EXCLUDED and not any(\n  100 |                     p.parts[: len(root_path.parts)] == root_path.parts for p in self.states\n  101 |                 )\n  102 |                 count = 0\n  103 |                 for item in iter:\n  104 |                     j.check_if_cancelled()\n  105 |                     try:\n  106 |                         if item.is_dir():\n  107 |                             if skip_dirs:\n  108 |                                 continue\n  109 |                             yield from self._get_files(item.path, fileclasses, j)\n  110 |                             continue\n  111 |                         elif state == DirectoryState.EXCLUDED:\n  112 |                             continue\n  113 |                         # File excluding or not\n  114 |                         if (\n  115 |                             self._exclude_list is None\n  116 |                             or not self._exclude_list.mark_count\n  117 |                             or not self._exclude_list.is_excluded(str(from_path), item.name)\n  118 |                         ):\n  119 |                             file = fs.get_file(item, fileclasses=fileclasses)\n  120 |                             if file:\n  121 |                                 file.is_ref = state == DirectoryState.REFERENCE\n  122 |                                 count += 1\n  123 |                                 yield file\n  124 |                     except (OSError, fs.InvalidPath):\n  125 |                         pass\n  126 |                 logging.debug(\n  127 |                     \"Collected %d files in folder %s\",\n  128 |                     count,\n  129 |                     str(root_path),\n  130 |                 )\n  131 |         except OSError:\n  132 |             pass","lines":40},{"ref":"core/directories.py:134-145","code":"  134 |     def _get_folders(self, from_folder, j):\n  135 |         j.check_if_cancelled()\n  136 |         try:\n  137 |             for subfolder in from_folder.subfolders:\n  138 |                 yield from self._get_folders(subfolder, j)\n  139 |             state = self.get_state(from_folder.path)\n  140 |             if state != DirectoryState.EXCLUDED:\n  141 |                 from_folder.is_ref = state == DirectoryState.REFERENCE\n  142 |                 logging.debug(\"Yielding Folder %r state: %d\", from_folder, state)\n  143 |                 yield from_folder\n  144 |         except (OSError, fs.InvalidPath):\n  145 |             pass","lines":12}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"export.export_to_xhtml and export_to_csv open files without a context manager (fp = open(...); ... fp.close() in xhtml; csv.writer(open(dest, ...)) in csv) and never close the csv file handle at all. If writing raises, the xhtml file is left open (no try/finally), and the csv handle is never explicitly closed, relying on GC. export_to_csv also has no OSError handling itself (the caller in app.py catches it), but export_to_xhtml has no error handling and will raise into the GUI thread.","fix":"Use 'with open(...) as fp:' in both functions so handles are always closed, including the csv writer's underlying file.","locations":[{"ref":"core/export.py:139-152","code":"  139 |     folder = mkdtemp()\n  140 |     destpath = op.join(folder, \"export.htm\")\n  141 |     fp = open(destpath, \"wt\", encoding=\"utf-8\")\n  142 |     fp.write(content)\n  143 |     fp.close()\n  144 |     return destpath\n  145 | \n  146 | \n  147 | def export_to_csv(dest, colnames, rows):\n  148 |     writer = csv.writer(open(dest, \"wt\", encoding=\"utf-8\"))\n  149 |     writer.writerow([\"Group ID\"] + colnames)\n  150 |     for row in rows:\n  151 |         writer.writerow(row)","lines":14}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"File.__getattribute__ catches every Exception from _read_info and merely logs a warning, then falls back to INITIAL_INFO defaults (size 0, empty digests). A transient read error (permissions, IO error) silently yields size 0 / empty digest, which can cause unrelated files to be treated as matching (e.g. two unreadable files both get digest b'' and size 0 and match as duplicates). Errors are swallowed with no signal to the caller.","fix":"Distinguish genuine 'not computed yet' from real read failures; do not let an IO error collapse to default digest/size that fabricates duplicate matches. Consider marking the file as errored and excluding it from matching.","locations":[{"ref":"core/fs.py:226-236","code":"  226 |     def __getattribute__(self, attrname):\n  227 |         result = object.__getattribute__(self, attrname)\n  228 |         if result is NOT_SET:\n  229 |             try:\n  230 |                 self._read_info(attrname)\n  231 |             except Exception as e:\n  232 |                 logging.warning(\"An error '%s' was raised while decoding '%s'\", e, repr(self.path))\n  233 |             result = object.__getattribute__(self, attrname)\n  234 |             if result is NOT_SET:\n  235 |                 result = self.INITIAL_INFO[attrname]\n  236 |         return result","lines":11}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"DeletionOptions.supports_links() relies on calling os.symlink() with no arguments and catching TypeError to mean 'supported'. If none of the expected exceptions is raised (or an unexpected exception type occurs that is not caught), the function falls through and implicitly returns None instead of a bool. The intended contract is to return a boolean; a None result is falsy and would silently disable hardlink options even on platforms that support them, and any unanticipated OSError subclass behavior is brittle.","fix":"Use a robust platform/feature check (e.g. hasattr(os, 'symlink') combined with sys.platform, or functools-cached probe) and ensure every code path returns an explicit bool.","locations":[{"ref":"core/gui/deletion_options.py:75-90","code":"   75 |     def supports_links(self):\n   76 |         \"\"\"Returns whether our platform supports symlinks.\"\"\"\n   77 |         # When on a platform that doesn't implement it, calling os.symlink() (with the wrong number\n   78 |         # of arguments) raises NotImplementedError, which allows us to gracefully check for the\n   79 |         # feature.\n   80 |         try:\n   81 |             os.symlink()\n   82 |         except NotImplementedError:\n   83 |             # Windows XP, not supported\n   84 |             return False\n   85 |         except OSError:\n   86 |             # Vista+, symbolic link privilege not held\n   87 |             return False\n   88 |         except TypeError:\n   89 |             # wrong number of arguments\n   90 |             return True","lines":16}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"getmatches creates a multiprocessing.Pool but only calls pool.close()/pool.join() on the success path. If an exception other than MemoryError propagates out of the comparison loop (or from the result-collection / verification loop), the pool is never closed or joined, leaking worker processes. There is no try/finally around the pool lifecycle.","fix":"Wrap pool usage in try/finally (or a context manager) that guarantees pool.close()/pool.terminate() and pool.join() run even when an exception occurs.","locations":[{"ref":"core/pe/matchblock.py:208-260","code":"  208 |     pool = multiprocessing.Pool()\n  209 |     async_results = []\n  210 |     matches = []\n  211 |     chunks = get_chunks(pictures)\n  212 |     # We add a None element at the end of the chunk list because each chunk has to be compared\n  213 |     # with itself. Thus, each chunk will show up as a ref_chunk having other_chunk set to None once.\n  214 |     comparisons_to_do = list(combinations(chunks + [None], 2))\n  215 |     comparison_count = 0\n  216 |     j.start_job(len(comparisons_to_do))\n  217 |     try:\n  218 |         for ref_chunk, other_chunk in comparisons_to_do:\n  219 |             picinfo = {p.cache_id: get_picinfo(p) for p in ref_chunk}\n  220 |             ref_ids = [p.cache_id for p in ref_chunk]\n  221 |             if other_chunk is not None:\n  222 |                 other_ids = [p.cache_id for p in other_chunk]\n  223 |                 picinfo.update({p.cache_id: get_picinfo(p) for p in other_chunk})\n  224 |             else:\n  225 |                 other_ids = None\n  226 |             args = (ref_ids, other_ids, cache_path, threshold, picinfo, match_rotated)\n  227 |             async_results.append(pool.apply_async(async_compare, args))\n  228 |             collect_results()\n  229 |         collect_results(collect_all=True)\n  230 |     except MemoryError:\n  231 |         # Rare, but possible, even in 64bit situations (ref #264). What do we do now? We free us\n  232 |         # some wiggle room, log about the incident, and stop matching right here. We then process\n  233 |         # the matches we have. The rest of the process doesn't allocate much and we should be\n  234 |         # alright.\n  235 |         del (\n  236 |             comparisons_to_do,\n  237 |             chunks,\n  238 |             pictures,\n  239 |         )  # some wiggle room for the next statements\n  240 |         logging.warning(\"Ran out of memory when scanning! We had %d matches.\", len(matches))\n  241 |         del matches[-len(matches) // 3 :]  # some wiggle room to ensure we don't run out of memory again.\n  242 |     pool.close()\n  243 |     result = []\n  244 |     myiter = j.iter_with_progress(\n  245 |         iterconsume(matches, reverse=False),\n  246 |         tr(\"Verified %d/%d matches\"),\n  247 |         every=10,\n  248 |         count=len(matches),\n  249 |     )\n  250 |     for ref_id, other_id, percentage in myiter:\n  251 |         ref = id2picture[ref_id]\n  252 |         other = id2picture[other_id]\n  253 |         if percentage == 100 and ref.digest != other.digest:\n  254 |             percentage = 99\n  255 |         if percentage >= threshold:\n  256 |             ref.dimensions  # pre-read dimensions for display in results\n  257 |             other.dimensions\n  258 |             result.append(get_match(ref, other, percentage))\n  259 |     pool.join()\n  260 |     return result","lines":53}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In getblock, the results of PySequence_ITEM (ppixel, pr, pg, pb) are never NULL-checked before use, and PyLong_AsLong is called without checking for the -1/PyErr_Occurred error path. If a pixel item is not a 3-element sequence (e.g. a paletted \"P\" mode image whose getdata yields scalar ints, or a malformed image), PySequence_ITEM returns NULL and the subsequent PySequence_ITEM/PyLong_AsLong dereference or pass NULL, causing a crash or silently swallowed exception that propagates incorrectly.","fix":"Check each PySequence_ITEM result for NULL and bail out (Py_XDECREF partial refs, return NULL); after PyLong_AsLong calls, check PyErr_Occurred() and propagate. Alternatively assert the image is in RGB mode before iterating.","locations":[{"ref":"core/pe/modules/block.c:36-46","code":"   36 |     ppixel = PySequence_ITEM(ppixels, i);\n   37 |     pr = PySequence_ITEM(ppixel, 0);\n   38 |     pg = PySequence_ITEM(ppixel, 1);\n   39 |     pb = PySequence_ITEM(ppixel, 2);\n   40 |     Py_DECREF(ppixel);\n   41 |     r = PyLong_AsLong(pr);\n   42 |     g = PyLong_AsLong(pg);\n   43 |     b = PyLong_AsLong(pb);\n   44 |     Py_DECREF(pr);\n   45 |     Py_DECREF(pg);\n   46 |     Py_DECREF(pb);","lines":11}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In block_getblocks2, PyObject_GetAttrString(image, \"size\") and the two PySequence_ITEM calls on pimage_size are not NULL-checked. If image has no \"size\" attribute or it is not subscriptable, pimage_size/pwidth/pheight are NULL and Py_DECREF(NULL-via-attr) / PyLong_AsLong(NULL) lead to a crash instead of a clean Python exception.","fix":"Check pimage_size for NULL after PyObject_GetAttrString and return NULL; check pwidth/pheight for NULL after PySequence_ITEM; check PyErr_Occurred() after PyLong_AsLong.","locations":[{"ref":"core/pe/modules/block.c:112-119","code":"  112 |   pimage_size = PyObject_GetAttrString(image, \"size\");\n  113 |   pwidth = PySequence_ITEM(pimage_size, 0);\n  114 |   pheight = PySequence_ITEM(pimage_size, 1);\n  115 |   width = PyLong_AsLong(pwidth);\n  116 |   height = PyLong_AsLong(pheight);\n  117 |   Py_DECREF(pimage_size);\n  118 |   Py_DECREF(pwidth);\n  119 |   Py_DECREF(pheight);","lines":8}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"reraise_if_error() / pulse() reference self.last_traceback without a class-level default, relying on it being set only inside the 'except Exception' branch of _async_run. If last_error is set but the code path that assigns last_traceback is changed or a future caller inspects state out of order, self.last_traceback can raise AttributeError. More importantly, _async_run sets last_traceback only on generic Exception; it is never reset to None between runs, so a stale traceback from a previous job could be attached to a new last_error if any path ever set last_error without setting last_traceback.","fix":"Declare 'last_traceback = None' as a class attribute alongside 'last_error = None', and set both together (last_error and last_traceback) in the except branch so they are always consistent.","locations":[{"ref":"hscommon/jobprogress/performer.py:40-62","code":"   40 |     def _async_run(self, *args) -> None:\n   41 |         target = args[0]\n   42 |         args = tuple(args[1:])\n   43 |         self._job_running = True\n   44 |         self.last_error = None\n   45 |         try:\n   46 |             target(*args)\n   47 |         except JobCancelled:\n   48 |             pass\n   49 |         except Exception as e:\n   50 |             self.last_error = e\n   51 |             self.last_traceback = sys.exc_info()[2]\n   52 |         finally:\n   53 |             self._job_running = False\n   54 |             self.last_progress = None\n   55 | \n   56 |     def reraise_if_error(self) -> None:\n   57 |         \"\"\"Reraises the error that happened in the thread if any.\n   58 | \n   59 |         Call this after the caller of run_threaded detected that self._job_running returned to False\n   60 |         \"\"\"\n   61 |         if self.last_error is not None:\n   62 |             raise self.last_error.with_traceback(self.last_traceback)","lines":23}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In the Qt getblock, multiple Python C-API calls are unchecked: PyObject_CallMethod(image, \"bytesPerLine\"/\"bits\") may return NULL, PyObject_CallMethod(sipptr, \"ascapsule\") may return NULL, and PyCapsule_GetPointer may return NULL. The pointer s is then dereferenced in the inner loop without a NULL check, and PyLong_AsLong(pi) is used without error checking. Any failure leads to a crash rather than a propagated exception.","fix":"NULL-check the return value of every PyObject_CallMethod and PyCapsule_GetPointer, propagate errors by returning NULL, and check PyErr_Occurred() after PyLong_AsLong before using bytes_per_line.","locations":[{"ref":"qt/pe/modules/block.c:32-54","code":"   32 |     pi = PyObject_CallMethod(image, \"bytesPerLine\", NULL);\n   33 |     bytes_per_line = PyLong_AsLong(pi);\n   34 |     Py_DECREF(pi);\n   35 | \n   36 |     sipptr = PyObject_CallMethod(image, \"bits\", NULL);\n   37 |     bits_capsule = PyObject_CallMethod(sipptr, \"ascapsule\", NULL);\n   38 |     Py_DECREF(sipptr);\n   39 |     s = (char *)PyCapsule_GetPointer(bits_capsule, NULL);\n   40 |     Py_DECREF(bits_capsule);\n   41 |     /* Qt aligns all its lines on 32bit, which means that if the number of bytes\n   42 |      *per line for image is not divisible by 4, there's going to be crap\n   43 |      *inserted in \"s\" We have to take this into account when calculating offsets\n   44 |      **/\n   45 |     for (i = 0; i < height; i++) {\n   46 |       int j;\n   47 |       for (j = 0; j < width; j++) {\n   48 |         int offset;\n   49 |         unsigned char r, g, b;\n   50 | \n   51 |         offset = i * bytes_per_line + j * 3;\n   52 |         r = s[offset];\n   53 |         g = s[offset + 1];\n   54 |         b = s[offset + 2];","lines":23}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"setup_qt_logging builds a logging.FileHandler from filename, but when log_to_stdout is True filename is set to None, and logging.FileHandler(None, ...) raises (it cannot open a None path). The log_to_stdout=True code path therefore crashes instead of logging to stdout, and no StreamHandler is ever added.","fix":"Branch on log_to_stdout: use logging.StreamHandler() when logging to stdout, and logging.FileHandler(filename, ...) otherwise.","locations":[{"ref":"qt/util.py:116-130","code":"  116 | def setup_qt_logging(level=logging.WARNING, log_to_stdout=False):\n  117 |     # Under Qt, we log in \"debug.log\" in appdata. Moreover, when under cx_freeze, we have a\n  118 |     # problem because sys.stdout and sys.stderr are None, so we need to replace them with a\n  119 |     # wrapper that logs with the logging module.\n  120 |     appdata = get_appdata()\n  121 |     if not op.exists(appdata):\n  122 |         os.makedirs(appdata)\n  123 |     # Setup logging\n  124 |     # Have to use full configuration over basicConfig as FileHandler encoding was not being set.\n  125 |     filename = op.join(appdata, \"debug.log\") if not log_to_stdout else None\n  126 |     log = logging.getLogger()\n  127 |     handler = logging.FileHandler(filename, \"a\", \"utf-8\")\n  128 |     formatter = logging.Formatter(\"%(asctime)s - %(levelname)s - %(message)s\")\n  129 |     handler.setFormatter(formatter)\n  130 |     log.addHandler(handler)","lines":15}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"without_ref calls self.results.get_group_of_duplicate(dupe).ref for every dupe; if get_group_of_duplicate returns None (dupe not in any current group) this raises AttributeError. Several callers (remove_selected, make_selected_reference, add_selected_to_ignore_list, toggle_selected_mark_state) pass selected_dupes through this, and selected_dupes is only pruned in _results_changed, so a stale selection can trigger a crash.","fix":"Guard against a None group: filter to dupes whose group is not None before checking ref, e.g. [d for d in dupes if (g := self.results.get_group_of_duplicate(d)) is not None and g.ref is not d].","locations":[{"ref":"core/app.py:841-843","code":"  841 |     def without_ref(self, dupes):\n  842 |         \"\"\"Returns ``dupes`` with all reference elements removed.\"\"\"\n  843 |         return [dupe for dupe in dupes if self.results.get_group_of_duplicate(dupe).ref is not dupe]","lines":3}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The diff() helper calls PySequence_ITEM and PyLong_AsLong on first/second without any NULL or error checks. In practice blocks come from trusted cache data so the risk is low, but a corrupted block list would crash rather than raise.","fix":"Add NULL checks after the PySequence_ITEM calls and check PyErr_Occurred() after PyLong_AsLong, signalling failure to the caller.","locations":[{"ref":"core/pe/modules/block.c:67-90","code":"   67 | static int diff(PyObject *first, PyObject *second) {\n   68 |   int r1, g1, b1, r2, b2, g2;\n   69 |   PyObject *pr, *pg, *pb;\n   70 |   pr = PySequence_ITEM(first, 0);\n   71 |   pg = PySequence_ITEM(first, 1);\n   72 |   pb = PySequence_ITEM(first, 2);\n   73 |   r1 = PyLong_AsLong(pr);\n   74 |   g1 = PyLong_AsLong(pg);\n   75 |   b1 = PyLong_AsLong(pb);\n   76 |   Py_DECREF(pr);\n   77 |   Py_DECREF(pg);\n   78 |   Py_DECREF(pb);\n   79 | \n   80 |   pr = PySequence_ITEM(second, 0);\n   81 |   pg = PySequence_ITEM(second, 1);\n   82 |   pb = PySequence_ITEM(second, 2);\n   83 |   r2 = PyLong_AsLong(pr);\n   84 |   g2 = PyLong_AsLong(pg);\n   85 |   b2 = PyLong_AsLong(pb);\n   86 |   Py_DECREF(pr);\n   87 |   Py_DECREF(pg);\n   88 |   Py_DECREF(pb);\n   89 | \n   90 |   return abs(r1 - r2) + abs(g1 - g2) + abs(b1 - b2);","lines":24}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the module init functions, PyModule_AddObject is called without checking its return value, and on the error path the exception object references (NoBlocksError, DifferentBlockCountError) would be leaked. PyModule_AddObject steals a reference only on success; on failure the object is leaked and the module is left in an inconsistent state.","fix":"Check PyModule_AddObject return values, Py_XDECREF the exception object and return NULL on failure (or use PyModule_AddObjectRef and decref appropriately).","locations":[{"ref":"core/pe/modules/block.c:241-247","code":"  241 |   NoBlocksError = PyErr_NewException(\"_block.NoBlocksError\", NULL, NULL);\n  242 |   PyModule_AddObject(m, \"NoBlocksError\", NoBlocksError);\n  243 |   DifferentBlockCountError =\n  244 |       PyErr_NewException(\"_block.DifferentBlockCountError\", NULL, NULL);\n  245 |   PyModule_AddObject(m, \"DifferentBlockCountError\", DifferentBlockCountError);\n  246 | \n  247 |   return m;","lines":7}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"inttuple calls PyTuple_New(n) but does not check the result for NULL before entering the loop; if allocation fails, PyTuple_SET_ITEM writes through a NULL pointer.","fix":"Check result for NULL immediately after PyTuple_New and return NULL on failure.","locations":[{"ref":"core/pe/modules/common.c:32-40","code":"   32 |     result = PyTuple_New(n);\n   33 | \n   34 |     for (i=0; i<n; i++) {\n   35 |         pnumber = PyLong_FromUnsignedLong(va_arg(numbers, long));\n   36 |         if (pnumber == NULL) {\n   37 |             Py_DECREF(result);\n   38 |             return NULL;\n   39 |         }\n   40 |         PyTuple_SET_ITEM(result, i, pnumber);","lines":9}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"check_for_update constructs semantic_version.Version(release['name']) for every release without guarding against releases whose 'name' is not a valid semver string (or is None). A single malformed release name raises ValueError and aborts the entire update check with an unhandled exception, even though other releases might be valid.","fix":"Wrap the per-release Version parsing in try/except and skip releases that fail to parse, or use release['tag_name'] with validation.","locations":[{"ref":"core/util.py:95-99","code":"   95 |     for release in response_json:\n   96 |         release_version = semantic_version.Version(release[\"name\"])\n   97 |         if new_version < release_version and (include_prerelease or not release_version.prerelease):\n   98 |             new_version = release_version\n   99 |             new_url = release[\"html_url\"]","lines":5}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"generate_pot()'s exception handler when removing the temp file prints a malformed message. The handler 'print(\"Exception while removing temporary folder %s\\n\", genpath)' passes genpath as a second positional print() argument instead of formatting it into the %s, so it prints the literal format string followed by the path on a separate argument, and the '%s' is never substituted. The except is also a bare 'except Exception' that swallows the real error.","fix":"Use proper formatting, e.g. 'print(f\"Exception while removing temporary file {genpath}\")', and consider logging the actual exception rather than discarding it.","locations":[{"ref":"hscommon/loc.py:37-40","code":"   37 |         try:\n   38 |             os.remove(genpath)\n   39 |         except Exception:\n   40 |             print(\"Exception while removing temporary folder %s\\n\", genpath)","lines":4}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"delete_if_empty() has a default mutable argument 'files_to_delete: List[str] = []'. A shared mutable default is a well-known Python footgun; although this function does not mutate the list today, the list object is shared across all calls and any future mutation would leak between calls. The list is also iterated for membership checks ('p.name not in files_to_delete') which is O(n) per file.","fix":"Use 'files_to_delete: Optional[List[str]] = None' and assign 'files_to_delete = files_to_delete or []' inside the body; optionally convert to a set for O(1) membership.","locations":[{"ref":"hscommon/util.py:264-266","code":"  264 | @log_io_error\n  265 | @pathify\n  266 | def delete_if_empty(path: Path, files_to_delete: List[str] = []) -> bool:","lines":3}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the Qt block_getblocks, the QImage width()/height() calls (PyObject_CallMethod) are not NULL-checked before PyLong_AsLong is applied, so a failing call would crash instead of raising.","fix":"NULL-check the PyObject_CallMethod results and check PyErr_Occurred() after PyLong_AsLong.","locations":[{"ref":"qt/pe/modules/block.c:98-103","code":"   98 |   pi = PyObject_CallMethod(image, \"width\", NULL);\n   99 |   width = PyLong_AsLong(pi);\n  100 |   Py_DECREF(pi);\n  101 |   pi = PyObject_CallMethod(image, \"height\", NULL);\n  102 |   height = PyLong_AsLong(pi);\n  103 |   Py_DECREF(pi);","lines":6}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"invoke_custom_command runs user commands via subprocess.Popen(..., shell=True) and reads only p.stdout while stderr is redirected into the same pipe; it never waits on the process and reads stdout fully only once. With shell=True and unsanitized substitution of file paths into the command string this is also a shell-injection / quoting hazard, and a command producing a lot of output before exiting can deadlock or leave zombie processes since p.wait() is never called.","fix":"Avoid shell=True; build an argument list and use subprocess.run(...) (which waits and captures output safely). At minimum call p.communicate()/p.wait() and quote paths properly. Validate or escape the substituted paths.","locations":[{"ref":"core/app.py:530-564","code":"  530 |     def invoke_custom_command(self):\n  531 |         \"\"\"Calls command in ``CustomCommand`` pref with ``%d`` and ``%r`` placeholders replaced.\n  532 | \n  533 |         Using the current selection, ``%d`` is replaced with the currently selected dupe and ``%r``\n  534 |         is replaced with that dupe's ref file. If there's no selection, the command is not invoked.\n  535 |         If the dupe is a ref, ``%d`` and ``%r`` will be the same.\n  536 |         \"\"\"\n  537 |         cmd = self.view.get_default(\"CustomCommand\")\n  538 |         if not cmd:\n  539 |             msg = tr(\"You have no custom command set up. Set it up in your preferences.\")\n  540 |             self.view.show_message(msg)\n  541 |             return\n  542 |         if not self.selected_dupes:\n  543 |             return\n  544 |         dupes = self.selected_dupes\n  545 |         refs = [self.results.get_group_of_duplicate(dupe).ref for dupe in dupes]\n  546 |         for dupe, ref in zip(dupes, refs):\n  547 |             dupe_cmd = cmd.replace(\"%d\", str(dupe.path))\n  548 |             dupe_cmd = dupe_cmd.replace(\"%r\", str(ref.path))\n  549 |             match = re.match(r'\"([^\"]+)\"(.*)', dupe_cmd)\n  550 |             if match is not None:\n  551 |                 # This code here is because subprocess. Popen doesn't seem to accept, under Windows,\n  552 |                 # executable paths with spaces in it, *even* when they're enclosed in \"\". So this is\n  553 |                 # a workaround to make the damn thing work.\n  554 |                 exepath, args = match.groups()\n  555 |                 path, exename = op.split(exepath)\n  556 |                 p = subprocess.Popen(\n  557 |                     exename + args, shell=True, cwd=path, stdout=subprocess.PIPE, stderr=subprocess.STDOUT\n  558 |                 )\n  559 |                 output = p.stdout.read()\n  560 |                 logging.info(\"Custom command %s %s: %s\", exename, args, output)\n  561 |             else:\n  562 |                 p = subprocess.Popen(dupe_cmd, shell=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)\n  563 |                 output = p.stdout.read()\n  564 |                 logging.info(\"Custom command %s: %s\", dupe_cmd, output)","lines":35}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"inttuple uses va_arg(numbers, long) to read its variadic arguments, but every caller passes int values (block.c: inttuple(4, left, top, right, bottom) and inttuple(3, totr, totg, totb); cache.c: inttuple(3, r, g, b) where r/g/b are unsigned long). Reading an int argument as long via va_arg is undefined behavior, and in cache.c the unsigned long values are read with PyLong_FromUnsignedLong but extracted as plain long. On LLP64 (64-bit Windows) long is 32-bit while the promoted-to-int default-promotion still differs, so the types must match exactly.","fix":"Make argument types consistent: have callers pass values of the exact type read by va_arg (e.g. cast to long, or use unsigned long both in callers and in va_arg/PyLong_FromUnsignedLong). Document and enforce the expected argument type for inttuple.","locations":[{"ref":"core/pe/modules/common.c:24-45","code":"   24 | PyObject* inttuple(int n, ...)\n   25 | {\n   26 |     int i;\n   27 |     PyObject *pnumber;\n   28 |     PyObject *result;\n   29 |     va_list numbers;\n   30 | \n   31 |     va_start(numbers, n);\n   32 |     result = PyTuple_New(n);\n   33 | \n   34 |     for (i=0; i<n; i++) {\n   35 |         pnumber = PyLong_FromUnsignedLong(va_arg(numbers, long));\n   36 |         if (pnumber == NULL) {\n   37 |             Py_DECREF(result);\n   38 |             return NULL;\n   39 |         }\n   40 |         PyTuple_SET_ITEM(result, i, pnumber);\n   41 |     }\n   42 | \n   43 |     va_end(numbers);\n   44 |     return result;\n   45 | }","lines":22},{"ref":"core/pe/modules/block.c:61","code":"   61 |   return inttuple(3, totr, totg, totb);","lines":1},{"ref":"core/pe/modules/block.c:146","code":"  146 |       pbox = inttuple(4, left, top, right, bottom);","lines":1},{"ref":"core/pe/modules/cache.c:36","code":"   36 |     color_tuple = inttuple(3, r, g, b);","lines":1}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"ColorPickerButton.setColor tries to mutate a QSize via attribute assignment: size.width = 0 / size.height = 0. QSize.width and QSize.height are methods, not assignable attributes, so this rebinds the bound methods to ints rather than resizing; the intended zero-size pixmap is never produced. The branch is reached when setColor(None) is called.","fix":"Use size.setWidth(0); size.setHeight(0) (or construct QSize(0, 0) and fill/return early) when color is None.","locations":[{"ref":"qt/preferences_dialog.py:428-438","code":"  428 |     def setColor(self, color):\n  429 |         size = QSize(16, 16)\n  430 |         px = QPixmap(size)\n  431 |         if color is None:\n  432 |             size.width = 0\n  433 |             size.height = 0\n  434 |         elif not color.isValid():\n  435 |             return\n  436 |         else:\n  437 |             self.color = color\n  438 |             px.fill(color)","lines":11}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"FilesDB.get() reads from the connection without acquiring self.lock, while put/commit/close all take self.lock. sqlite3 connection created with check_same_thread=False is shared across threads; concurrent get() vs put()/commit() without the lock is a data race on the shared connection/cursor and can raise sqlite3 'recursive use of cursors' or threading errors during multithreaded scans.","fix":"Acquire self.lock around the get() query as well (the connection is shared across threads).","locations":[{"ref":"core/fs.py:156-168","code":"  156 |         try:\n  157 |             with self.conn as conn:\n  158 |                 if self.ignore_mtime:\n  159 |                     cursor = conn.execute(\n  160 |                         self.select_query_ignore_mtime.format(key=key), {\"path\": str(path), \"size\": size}\n  161 |                     )\n  162 |                 else:\n  163 |                     cursor = conn.execute(\n  164 |                         self.select_query.format(key=key),\n  165 |                         {\"path\": str(path), \"size\": size, \"mtime_ns\": mtime_ns},\n  166 |                     )\n  167 |                 result = cursor.fetchone()\n  168 |                 cursor.close()","lines":13},{"ref":"core/fs.py:182-196","code":"  182 |             with self.lock, self.conn as conn:\n  183 |                 conn.execute(\n  184 |                     self.insert_query.format(key=key),\n  185 |                     {\"path\": str(path), \"size\": size, \"mtime_ns\": mtime_ns, \"value\": value},\n  186 |                 )\n  187 |         except Exception as ex:\n  188 |             logging.warning(f\"Couldn't put {key} for {path} w/{size}, {mtime_ns}: {ex}\")\n  189 | \n  190 |     def commit(self) -> None:\n  191 |         with self.lock:\n  192 |             self.conn.commit()\n  193 | \n  194 |     def close(self) -> None:\n  195 |         with self.lock:\n  196 |             self.conn.close()","lines":15}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"SqliteCache._create_con catches sqlite.DatabaseError and then calls self.con.close() in the handler. If sqlite.connect() itself raised the DatabaseError, self.con is still None (or the previous value), so self.con.close() raises AttributeError, masking the real error. os.remove(self.dbname) will also raise for the \":memory:\" default db name.","fix":"Guard the cleanup: only call self.con.close() when self.con is not None, and skip os.remove when dbname == \":memory:\" (or when the file does not exist).","locations":[{"ref":"core/pe/cache_sqlite.py:102-112","code":"  102 |     def _create_con(self, second_try=False):\n  103 |         try:\n  104 |             self.con = sqlite.connect(self.dbname, isolation_level=None)\n  105 |             self._check_upgrade()\n  106 |         except sqlite.DatabaseError as e:  # corrupted db\n  107 |             if second_try:\n  108 |                 raise  # Something really strange is happening\n  109 |             logging.warning(\"Could not create picture cache because of an error: %s\", str(e))\n  110 |             self.con.close()\n  111 |             os.remove(self.dbname)\n  112 |             self._create_con(second_try=True)","lines":11}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"get_multiple and purge_outdated build SQL by string-joining rowids directly into the query (f\"... rowid in ({ids})\" and \"... in (%s)\" % \",\".join(map(str, todelete))). The rowids are internally generated integers so practical injection risk is low, but this is unsafe SQL construction; a non-int sneaking in would break the query or inject SQL.","fix":"Use parameterized queries with a generated list of \"?\" placeholders bound to the rowids, or explicitly coerce each id to int before joining.","locations":[{"ref":"core/pe/cache_sqlite.py:157-163","code":"  157 |     def get_multiple(self, rowids):\n  158 |         ids = \",\".join(map(str, rowids))\n  159 |         sql = (\n  160 |             \"select rowid, blocks, blocks2, blocks3, blocks4, blocks5, blocks6, blocks7, blocks8 \"\n  161 |             f\"from pictures where rowid in ({ids})\"\n  162 |         )\n  163 |         cur = self.con.execute(sql)","lines":7},{"ref":"core/pe/cache_sqlite.py:197-199","code":"  197 |         if todelete:\n  198 |             sql = \"delete from pictures where rowid in (%s)\" % \",\".join(map(str, todelete))\n  199 |             self.con.execute(sql)","lines":3}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"core/util.py uses logging.warn three times, which is deprecated since Python 3.3 in favor of logging.warning and emits a DeprecationWarning.","fix":"Replace logging.warn with logging.warning.","locations":[{"ref":"core/util.py:83","code":"   83 |                 logging.warn(f\"Error retriving updates. Status: {response.status}\")","lines":1},{"ref":"core/util.py:88","code":"   88 |                 logging.warn(f\"Error parsing updates. {ex.msg}\")","lines":1},{"ref":"core/util.py:91","code":"   91 |         logging.warn(f\"Error retriving updates. {ex.reason}\")","lines":1}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"filereplace() opens files without closing them on error. open() results are bound to fp and only closed after read()/write() succeed (lines 85-87, 91-93). If read() or write() raises, the file descriptor leaks. The function also reuses the name 'fp' for both the input and output handles. Same manual open/close pattern (no try/finally or with) appears in build_debian_changelog (lines 276-278).","fix":"Use 'with open(...) as fp:' context managers for both the read and the write, which guarantees the descriptor is closed even on exception.","locations":[{"ref":"hscommon/build.py:85-93","code":"   85 |     fp = open(filename, encoding=\"utf-8\")\n   86 |     contents = fp.read()\n   87 |     fp.close()\n   88 |     # We can't use str.format() because in some files, there might be {} characters that mess with it.\n   89 |     for key, item in kwargs.items():\n   90 |         contents = contents.replace(f\"{{{key}}}\", item)\n   91 |     fp = open(outfilename, \"wt\", encoding=\"utf-8\")\n   92 |     fp.write(contents)\n   93 |     fp.close()","lines":9},{"ref":"hscommon/build.py:276-278","code":"  276 |     fp = open(destfile, \"w\")\n  277 |     fp.write(result)\n  278 |     fp.close()","lines":3}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"ScrollAreaImageViewer.scaleBy and scaleAt call QSize.__imul__ directly (self.label.size().__imul__(factor) / self._pixmap.size().__imul__(scale)) to scale a QSize by a float. Relying on the dunder is unidiomatic and QSize multiplication by a float truncates to int sizes; using the operator obscures intent and the in-place mutation semantics of __imul__ on a temporary are surprising.","fix":"Use the normal multiplication operator (self.label.size() * factor) or QSize.scaled / explicit int width/height computation for clarity and correctness.","locations":[{"ref":"qt/pe/image_viewer.py:1034-1045","code":" 1034 |     def scaleBy(self, factor):\n 1035 |         self.current_scale *= factor\n 1036 |         # factor has to be either 1.25 or 0.8 here\n 1037 |         self.label.resize(self.label.size().__imul__(factor))\n 1038 |         self.label.current_scale = self.current_scale\n 1039 |         self.label.update()\n 1040 | \n 1041 |     def scaleAt(self, scale):\n 1042 |         self.current_scale = scale\n 1043 |         self.label.resize(self._pixmap.size().__imul__(scale))\n 1044 |         self.label.current_scale = scale\n 1045 |         self.label.update()","lines":12}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"PreferencesBase.saveGeometry computes the dock area via 'widget.parent.dockWidgetArea(widget)'. QWidget.parent is a bound method, not the parent widget, so this would call dockWidgetArea on a method object and raise AttributeError. It is only reached when d is truthy (widget is a docked QDockWidget), so it is latent but broken for the docked-details-window save path.","fix":"Call widget.parent() to obtain the parent widget before calling dockWidgetArea.","locations":[{"ref":"qt/preferences.py:136","code":"  136 |         area = widget.parent.dockWidgetArea(widget) if d else 0","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"In the core matching loop, get_match() / compare() is called once per pair, and for fuzzy scans compare() does difflib.get_close_matches() per word when MATCH_SIMILAR_WORDS is set. get_close_matches builds a SequenceMatcher for every candidate word on every comparison, which is extremely expensive and is invoked inside the O(N^2)-per-word inner loop. The similar-word matching is also already pre-computed by merge_similar_words(), so doing it again per-compare is largely redundant work in the hottest path.","fix":"Rely on merge_similar_words() (run once up front) for similarity and drop the per-compare difflib.get_close_matches() call, or cache close-match results. At minimum, avoid recomputing close matches for the same word repeatedly.","locations":[{"ref":"core/engine.py:81-90","code":"   81 |     for word in first:\n   82 |         if match_similar and (word not in second):\n   83 |             similar = difflib.get_close_matches(word, second, 1, 0.8)\n   84 |             if similar:\n   85 |                 word = similar[0]\n   86 |         if word in second:\n   87 |             if second[0] != word:\n   88 |                 in_order = False\n   89 |             second.remove(word)\n   90 |             match_count += len(word) if weight_words else 1","lines":10},{"ref":"core/engine.py:265-268","code":"  265 |                 for other in to_compare:\n  266 |                     m = get_match(ref, other, match_flags)\n  267 |                     if m.percentage >= min_match_percentage:\n  268 |                         result.append(m)","lines":4}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"compare() builds joined = first + second (a new list) and then computes total_count by summing/len over it on every single pairwise comparison. In a scan with millions of pairs this allocates a throwaway list and re-iterates both word lists each call. total_count can be computed without allocating joined (len(first)+len(second), or sum over the two lists).","fix":"Replace 'joined = first + second' and the sum/len over joined with direct computation: total_count = (sum(len(w) for w in first)+sum(len(w) for w in second)) if weight_words else (len(first)+len(second)). Avoids the list allocation in the hot path.","locations":[{"ref":"core/engine.py:77-78","code":"   77 |     joined = first + second\n   78 |     total_count = sum(len(word) for word in joined) if weight_words else len(joined)","lines":2}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"compare() uses 'word in second' (O(n) list membership) and second.remove(word) (O(n) scan + shift) inside the per-word loop, making the per-pair comparison O(len(first)*len(second)). For files with many words this is quadratic per comparison and runs across all pairs.","fix":"Use a multiset (collections.Counter) of the second word list for O(1) membership and decrement, while still tracking ordering separately. This turns the inner work near-linear.","locations":[{"ref":"core/engine.py:82-90","code":"   82 |         if match_similar and (word not in second):\n   83 |             similar = difflib.get_close_matches(word, second, 1, 0.8)\n   84 |             if similar:\n   85 |                 word = similar[0]\n   86 |         if word in second:\n   87 |             if second[0] != word:\n   88 |                 in_order = False\n   89 |             second.remove(word)\n   90 |             match_count += len(word) if weight_words else 1","lines":9}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"get_groups() recurses on orphan_matches by calling get_groups(orphan_matches) which re-sorts the orphan list and rebuilds dupe2group from scratch each level. For pathological inputs this can recurse deeply and re-sort repeatedly. Also matches.sort() mutates the caller's list in place (see scanner passing its own list), a surprising side effect.","fix":"Consider an iterative worklist instead of recursion, and sort a copy (sorted(matches, ...)) to avoid mutating the caller's list as a side effect.","locations":[{"ref":"core/engine.py:502","code":"  502 |     matches.sort(key=lambda match: -match.percentage)","lines":1},{"ref":"core/engine.py:543-544","code":"  543 |     if groups and orphan_matches:\n  544 |         groups += get_groups(orphan_matches)  # no job, as it isn't supposed to take a long time","lines":2}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Photo._plat_get_dimensions and _plat_get_blocks each construct a fresh QImageReader/QImage from the file path independently, and dimensions plus blocks are read in separate passes. During a picture scan every file is decoded at least twice (once for dimensions, once for blocks), and _plat_get_blocks decodes the full image and may also allocate a transformed copy. For large libraries this doubles image decode I/O and CPU.","fix":"Decode the image once and derive both dimensions and blocks from the same QImage where the scanning flow allows, or cache the decoded image/size to avoid re-reading the file on the second access.","locations":[{"ref":"qt/pe/photo.py:16-72","code":"   16 | class File(PhotoBase):\n   17 |     def _plat_get_dimensions(self):\n   18 |         try:\n   19 |             ir = QImageReader(str(self.path))\n   20 |             size = ir.size()\n   21 |             if size.isValid():\n   22 |                 return (size.width(), size.height())\n   23 |             else:\n   24 |                 return (0, 0)\n   25 |         except OSError:\n   26 |             logging.warning(\"Could not read image '%s'\", str(self.path))\n   27 |             return (0, 0)\n   28 | \n   29 |     def _plat_get_blocks(self, block_count_per_side, orientation):\n   30 |         image = QImage(str(self.path))\n   31 |         image = image.convertToFormat(QImage.Format_RGB888)\n   32 |         if not isinstance(orientation, int):\n   33 |             logging.warning(\n   34 |                 \"Orientation for file '%s' was a %s '%s', not an int.\",\n   35 |                 str(self.path),\n   36 |                 type(orientation),\n   37 |                 orientation,\n   38 |             )\n   39 |             try:\n   40 |                 orientation = int(orientation)\n   41 |             except Exception as e:\n   42 |                 logging.exception(\n   43 |                     \"Skipping transformation because could not convert %s to int. %s\",\n   44 |                     type(orientation),\n   45 |                     e,\n   46 |                 )\n   47 |                 return getblocks(image, block_count_per_side)\n   48 |         # MYSTERY TO SOLVE: For reasons I cannot explain, orientations 5 and 7 don't work for\n   49 |         # duplicate scanning. The transforms seems to work fine (if I try to save the image after\n   50 |         # the transform, we see that the image has been correctly flipped and rotated), but the\n   51 |         # analysis part yields wrong blocks. I spent enought time with this feature, so I'll leave\n   52 |         # like that for now. (by the way, orientations 5 and 7 work fine under Cocoa)\n   53 |         if 2 <= orientation <= 8:\n   54 |             t = QTransform()\n   55 |             if orientation == 2:\n   56 |                 t.scale(-1, 1)\n   57 |             elif orientation == 3:\n   58 |                 t.rotate(180)\n   59 |             elif orientation == 4:\n   60 |                 t.scale(1, -1)\n   61 |             elif orientation == 5:\n   62 |                 t.scale(-1, 1)\n   63 |                 t.rotate(90)\n   64 |             elif orientation == 6:\n   65 |                 t.rotate(90)\n   66 |             elif orientation == 7:\n   67 |                 t.scale(-1, 1)\n   68 |                 t.rotate(270)\n   69 |             elif orientation == 8:\n   70 |                 t.rotate(270)\n   71 |             image = image.transformed(t)\n   72 |         return getblocks(image, block_count_per_side)","lines":57}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Group.add_match's inner add_candidate does 'if self.unordered <= matches' (subset test) on every match added for a candidate, an O(group size) operation per match. discard_matches() and remove_dupe also rebuild match sets via set comprehensions. For very large groups this adds up, though groups are usually small.","fix":"Acceptable for small groups; if large groups are common, track candidate match counts incrementally rather than recomputing subset tests.","locations":[{"ref":"core/engine.py:390-395","code":"  390 |         def add_candidate(item, match):\n  391 |             matches = self.candidates[item]\n  392 |             matches.add(match)\n  393 |             if self.unordered <= matches:\n  394 |                 self.ordered.append(item)\n  395 |                 self.unordered.add(item)","lines":6}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"async_compare receives the entire picinfo dict and the full block lists for every chunk pair via pickling to subprocesses. picinfo is rebuilt and re-pickled for each comparison pair, and blocks are re-read from the SQLite cache inside each subprocess. For large libraries this pickling/IPC overhead per chunk-pair can dominate. The chunking comment acknowledges Disk IO but the repeated picinfo serialization is extra avoidable overhead.","fix":"Pass only the picinfo entries relevant to the chunk pair (already mostly done) and consider sharing immutable picinfo via an initializer/global in the Pool to avoid re-pickling common data on every task.","locations":[{"ref":"core/pe/matchblock.py:218-228","code":"  218 |         for ref_chunk, other_chunk in comparisons_to_do:\n  219 |             picinfo = {p.cache_id: get_picinfo(p) for p in ref_chunk}\n  220 |             ref_ids = [p.cache_id for p in ref_chunk]\n  221 |             if other_chunk is not None:\n  222 |                 other_ids = [p.cache_id for p in other_chunk]\n  223 |                 picinfo.update({p.cache_id: get_picinfo(p) for p in other_chunk})\n  224 |             else:\n  225 |                 other_ids = None\n  226 |             args = (ref_ids, other_ids, cache_path, threshold, picinfo, match_rotated)\n  227 |             async_results.append(pool.apply_async(async_compare, args))\n  228 |             collect_results()","lines":11}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Results.__get_dupe_list checks 'if None in self.__dupes' (an O(n) scan) on every rebuild purely as debug logging for issue #44. This adds a full linear scan over all dupes on each refresh just to emit a warning that is a leftover diagnostic.","fix":"Remove the leftover debug scan, or gate it behind a debug flag so it does not run on every dupe-list rebuild.","locations":[{"ref":"core/results.py:102-108","code":"  102 |             if None in self.__dupes:\n  103 |                 # This is debug logging to try to figure out #44\n  104 |                 logging.warning(\n  105 |                     \"There is a None value in the Results' dupe list. dupes: %r groups: %r\",\n  106 |                     self.__dupes,\n  107 |                     self.groups,\n  108 |                 )","lines":7}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"ResultsModel.invalidate_markings forces a repaint by scrolling the view by one pixel down then back up (self.view.scroll(0, 1); self.view.scroll(0, -1)). This is an acknowledged HACK (per the comment) that can cause visible flicker and unnecessary work on large result sets.","fix":"Emit dataChanged for the marked column range (or call self.view.viewport().update()) instead of scrolling the viewport.","locations":[{"ref":"qt/results_model.py:101-105","code":"  101 |     def invalidate_markings(self):\n  102 |         # redraw view\n  103 |         # HACK. this is the only way I found to update the widget without reseting everything\n  104 |         self.view.scroll(0, 1)\n  105 |         self.view.scroll(0, -1)","lines":5}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"dedupe() uses a dict 'seen = {}' purely as a set (values are always 1) to track membership. This is slightly more memory and slightly slower than using a set, and obscures intent.","fix":"Use 'seen = set()' with 'seen.add(item)' instead of a dict with dummy values.","locations":[{"ref":"hscommon/util.py:40-47","code":"   40 |     result = []\n   41 |     seen = {}\n   42 |     for item in iterable:\n   43 |         if item in seen:\n   44 |             continue\n   45 |         seen[item] = 1\n   46 |         result.append(item)\n   47 |     return result","lines":8}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"exclude.py contains an unused debug 'timer' decorator (only referenced in commented-out @timer lines) and a commented-out change_index method. The 'memoize' helper's per-function cache (func.cache) on _do_compile grows unbounded for the lifetime of the class and is shared across all instances since it is keyed only by args; for a regex-compilation cache this is minor but the unbounded growth and cross-instance sharing are worth noting.","fix":"Delete the timer decorator and commented change_index. Consider functools.lru_cache with a maxsize for _do_compile, or document that the cache is intentionally process-lifetime.","locations":[{"ref":"core/exclude.py:31-40","code":"   31 | def timer(func):\n   32 |     @functools.wraps(func)\n   33 |     def wrapper_timer(*args):\n   34 |         start = time.perf_counter_ns()\n   35 |         value = func(*args)\n   36 |         end = time.perf_counter_ns()\n   37 |         print(f\"DEBUG: func {func.__name__!r} took {end - start} ns.\")\n   38 |         return value\n   39 | \n   40 |     return wrapper_timer","lines":10},{"ref":"core/exclude.py:304-307","code":"  304 |     # def change_index(self, regex, new_index):\n  305 |     # \"\"\"Internal list must be a list, not dict.\"\"\"\n  306 |     #     item = self._excluded.pop(regex)\n  307 |     #     self._excluded.insert(new_index, item)","lines":4},{"ref":"core/exclude.py:43-52","code":"   43 | def memoize(func):\n   44 |     func.cache = dict()\n   45 | \n   46 |     @functools.wraps(func)\n   47 |     def _memoize(*args):\n   48 |         if args not in func.cache:\n   49 |             func.cache[args] = func(*args)\n   50 |         return func.cache[args]\n   51 | \n   52 |     return _memoize","lines":10}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"ExcludeList.__setitem__ and __delitem__ are empty stubs marked 'TODO if necessary'. Supporting subscript assignment/deletion that silently does nothing is a latent footgun: excludelist[key] = x silently no-ops instead of raising, which can mask bugs in callers.","fix":"Remove the stubs (so the default TypeError is raised) or implement them; do not leave silent no-op magic methods.","locations":[{"ref":"core/exclude.py:102-108","code":"  102 |     def __setitem__(self, key, value):\n  103 |         # TODO if necessary\n  104 |         pass\n  105 | \n  106 |     def __delitem__(self, key):\n  107 |         # TODO if necessary\n  108 |         pass","lines":7}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In PrioritizeDialog.add_selected, 'del crit' deletes the loop variable immediately after appending the same object to self.prioritizations. It has no effect on the appended reference and only unbinds the local name, which is rebound on the next iteration anyway. It is misleading dead code that suggests an ownership/removal intent that does not exist.","fix":"Remove the 'del crit' line.","locations":[{"ref":"core/gui/prioritize_dialog.py:76-78","code":"   76 |             crit = self.criteria[i]\n   77 |             self.prioritizations.append(crit)\n   78 |             del crit","lines":3}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"remove_dupe_paths contains an empty else/pass branch: 'else: pass  # We dont treat them as dupes'. The pass does nothing and the comment-only branch is dead structure; the append after the if/else already handles the not-a-dupe case.","fix":"Remove the redundant else: pass branch; keep only the 'continue' on same-file and let control fall through to append.","locations":[{"ref":"core/scanner.py:64-66","code":"   64 |                     continue  # same file, it's a dupe\n   65 |                 else:\n   66 |                     pass  # We don't treat them as dupes","lines":3}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"performer.py imports 'Job' from hscommon.jobprogress.job (line 13) only for use as a return type annotation on create_job(). The pygettext module also carries large amounts of vestigial machinery (Options.extractall is explicitly marked 'currently this option has no effect at all', the usage() function references __doc__ which is None since the original module docstring was stripped, so usage() would crash printing 'None % globals()'). These are leftovers from the CPython Tools/i18n origin.","fix":"Remove usage() (or restore a __doc__) since '__doc__ % globals()' raises TypeError when __doc__ is None; drop the unused extractall option and other unreachable cmdline-era code paths to clarify the module's reduced scope.","locations":[{"ref":"hscommon/pygettext.py:43-47","code":"   43 | def usage(code, msg=\"\"):\n   44 |     print(__doc__ % globals(), file=sys.stderr)\n   45 |     if msg:\n   46 |         print(msg, file=sys.stderr)\n   47 |     sys.exit(code)","lines":5},{"ref":"hscommon/pygettext.py:313","code":"  313 |         extractall = 0  # FIXME: currently this option has no effect at all.","lines":1}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"BaseController.scaleImagesAt is a pyqtSlot that computes a precomputed scale and delegates to viewers, but no signal or caller invokes scaleImagesAt anywhere in the codebase; only scaleImagesBy and onMouseWheel are wired up. Similarly GraphicsViewViewer.setNewCenter duplicates setCenter (both set _centerPoint and call centerOn) and adds API surface without distinct behavior.","fix":"Remove scaleImagesAt if confirmed unused, and collapse setNewCenter into setCenter (or have one call the other) to reduce redundant API.","locations":[{"ref":"qt/pe/image_viewer.py:303-309","code":"  303 |     @pyqtSlot(float)\n  304 |     def scaleImagesAt(self, scale):\n  305 |         \"\"\"Scale at a pre-computed scale.\"\"\"\n  306 |         self.current_scale = scale\n  307 |         self.selectedViewer.scaleAt(scale)\n  308 |         self.referenceViewer.scaleAt(scale)\n  309 |         self.updateButtons()","lines":7},{"ref":"qt/pe/image_viewer.py:1264-1275","code":" 1264 |     def setCenter(self, point):\n 1265 |         self._centerPoint = point\n 1266 |         self.centerOn(self._centerPoint)\n 1267 | \n 1268 |     def resetCenter(self):\n 1269 |         \"\"\"Resets origin\"\"\"\n 1270 |         self._mousePanningDelta = QPointF()\n 1271 |         self.current_scale = 1.0\n 1272 | \n 1273 |     def setNewCenter(self, position):\n 1274 |         self._centerPoint = position\n 1275 |         self.centerOn(self._centerPoint)","lines":12}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"TabWindow.pages dict is populated in createPage but is explicitly noted as unused ('This is currently not used anywhere' / 'Not used, might remove'). It needlessly retains references to created pages.","fix":"Remove self.pages and the assignment in createPage, or actually use it where indexOfWidget/lookup is needed. perations/DeletionService for _do_delete/copy_or_move, a SortKeyResolver for _get_dupe_sort_key/_get_group_sort_key, a SessionPersistence for load/save) and have DupeGuru delegate to them, keeping it a thin coordinator.","locations":[{"ref":"core/app.py:81-900","code":"   81 | class DupeGuru(Broadcaster):\n   82 |     \"\"\"Holds everything together.\n   83 | \n   84 |     Instantiated once per running application, it holds a reference to every high-level object\n   85 |     whose reference needs to be held: :class:`~core.results.Results`,\n   86 |     :class:`~core.directories.Directories`, :mod:`core.gui` instances, etc..\n   87 | \n   88 |     It also hosts high level methods and acts as a coordinator for all those elements. This is why\n   89 |     some of its methods seem a bit shallow, like for example :meth:`mark_all` and\n   90 |     :meth:`remove_duplicates`. These methos are just proxies for a method in :attr:`results`, but\n   91 |     they are also followed by a notification call which is very important if we want GUI elements\n   92 |     to be correctly notified of a change in the data they're presenting.\n   93 | \n   94 |     .. attribute:: directories\n   95 | \n   96 |         Instance of :class:`~core.directories.Directories`. It holds the current folder selection.\n   97 | \n   98 |     .. attribute:: results\n   99 | \n  100 |         Instance of :class:`core.results.Results`. Holds the results of the latest scan.\n  101 | \n  102 |     .. attribute:: selected_dupes\n  103 | \n  104 |         List of currently selected dupes from our :attr:`results`. Whenever the user changes its\n  105 |         selection at the UI level, :attr:`result_table` takes care of updating this attribute, so\n  106 |         you can trust that it's always up-to-date.\n  107 | \n  108 |     .. attribute:: result_table\n  109 | \n  110 |         Instance of :mod:`meta-gui <core.gui>` table listing the results from :attr:`results`\n  111 |     \"\"\"\n  112 | \n  113 | 6 |                 self.view.show_message(tr(\"Couldn't write to file: {}\").format(str(e)))\n  517 | \n  518 |     def get_display_info(self, dupe, group, delta=False):\n  519 |         def empty_data():\n  520 |             return {c.name: \"---\" for c in self.result_table.COLUMNS[1:]}\n  521 | \n  522 |         if (dupe is None) or (group is None):\n  523 |             return empty_data()\n  524 |         try:\n  525 |             return dupe.get_display_info(group, delta)\n  526 |         except Exception as e:\n  527 |             logging.warning(\"Exception (type: %s) on GetDisplayInfo for %s: %s\", type(e), str(dupe.path), str(e))\n  528 |             return empty_data()\n  529 | \n  530 |     def invoke_custom_command(self):\n  531 |         \"\"\"Calls command in ``CustomCommand`` pref with ``%d`` and ``%r`` placeholders replaced.\n  532 | \n  533 |         Using the current selection, ``%d`` is replaced with the currently selected dupe and ``%r``\n  534 |         is replaced with that dupe's ref file. If there's no selection, the command is not invoked.\n  535 |         If the dupe is a ref, ``%d`` and ``%r`` will be the same.\n  536 |         \"\"\"\n  537 |         cmd = self.view.get_default(\"CustomCommand\")\n  538 |         if not cmd:\n  539 |             msg = tr(\"You have no custom command set up. Set it up in your preferences.\")\n  540 |             self.view.show_message(msg)\n  541 |             return\n  542 |         if not self.selected_dupes:\n  543 |             return\n  544 |         dupes = self.selected_dupes\n  545 |         refs = [self.results.get_group_of_duplicate(dupe).ref for dupe in dupes]\n  546 |         for dupe, ref in zip(dupes, refs):\n  547 |             dupe_cmd = cmd.replace(\"%d\", str(dupe.path))\n  548 |             dupe_cmd = dupe_cmd.replace(\"%r\", str(ref.path))\n  549 |             match = re.match(r'\"([^\"]+)\"(.*)', dupe_cmd)\n  550 |             if match is not None:\n  551 |                 # This code ories.__init__()\n  585 |         self.directories.load_from_file(filepath)\n  586 |         self.notify(\"directories_changed\")\n  587 | \n  588 |     def load_from(self, filename):\n  589 |         \"\"\"Start an async job to load results from ``filename``.\n  590 | \n  591 |         :param str filename: path of the XML file (created with :meth:`save_as`) to load\n  592 |         \"\"\"\n  593 | \n  594 |         def do(j):\n  595 |             self.results.load_from_xml(filename, self._get_file, j)\n  596 | \n  597 |         self._start_job(JobType.LOAD, do)\n  598 | \n  599 |     def make_selected_reference(self):\n  600 |         \"\"\"Promote :attr:`selected_dupes` to reference position within their respective groups.\n  601 | \n  602 |         Each selected dupe will become the :attr:`~core.engine.Group.ref` of its group. If there's\n  603 |         more than one dupe selected for the same group, only the first (in the order currently shown\n  604 |         in :attr:`result_table`) dupe will be promoted.\n  605 |         \"\"\"\n  606 |         dupes = self.without_ref(self.selected_dupes)\n  607 |         changed_groups = set()\n  608 |         for dupe in dupes:\n  609 |             g = self.results.get_group_of_duplicate(dupe)\n  610 |             if g not in changed_groups and self.results.make_ref(dupe):\n  611 |                 changed_groups.add(g)\n  612 |         # It's not always obvious to users what this action does, so to make it a bit clearer,\n  613 |         # we change our selection to the ref of all changed groups. However, we also want to keep\n  614 |         # the files that were ref before and weren't changed by the action. In effect, what this\n  615 |         # does is that we keep our old selection, but remove all non-ref dupes from it.\n  616 |         # If no group was changed, however, we don't touch the selection.\n  617 |         if not self.result_table.power_marker:\n  618 |             if changed_groups:\n  619 |                 self.selected_dupes = [\n  620 |                     d for d in self.selected_dupes if self.results.get_group_of_duplicate(d).ref is d\n  621 |                 ]\n  622 |             self.notify(\"results_changed\")\n  623 |         else:\n  624 |             # If we're in \"Dupes Only\" mode (previously called Power Marker), things are a bit\n  625 |             # different. The refs are not shown in the table, and if our operation is successful,\n  626 |             # this means that there's no way to follow our dupe selection. Then, the best thing to\n  627 |             # do is to keep our selection index-wise (different dupe selection, but same index\n  628 |             # selection).\n  629 |             self.notify(\"results_changed_but_keep_selection\")\n  630 | \n  631 |     def mark_all(self):\n  632 |         \"\"\"Set all dupes in the results as marked.\"\"\"\n  633 |         self.results.mark_all()\n  634 |         self.notify(\"marking_changed\")\n  635 | \n  636 |     def mark_none(self):\n  637 |         \"\"\"Set all dupes in the results as unmarked.\"\"\"\n  638 |         self.results.mark_none()\n  639 |         self.notify(\"marking_changed\")\n  640 | \n  641 |     def mark_invert(self):\n  642 |         \"\"\"Invert the marked state of all dupes in the results.\"\"\"\n  643 |         self.results.mark_invert()\n  644 |         self.notify(\"marking_changed\")\n  645 | \n  646 |     def mark_dupe(self, dupe, marked):\n  647 |         \"\"\"Change marked status of ``dupe``.\n  648 | \n  649 |         :param dupe: dupe to mark/unmark\n  650 |         :type dupe: :class:`~core.fs.File`\n  651 |         :param bool marked: True = mark, False = unmark\n  652 |         \"\"\"\n  653 |         if marked:\n  654 |             self.results.mark(dupe)\n  655 |         else:\n  656 |             self.results.unmark(dupe)\n  657 |         self.notify(\"marking_changed\")\n  658 | \n  659 |     def open_selected(self):\n  660 |         \"\"\"Open :attr:`
