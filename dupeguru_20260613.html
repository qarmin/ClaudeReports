<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"copy_or_move computes location_path = first(p for p in self.directories if p in dupe.path.parents). If no selected root directory is a parent of the dupe path (e.g. the dupe was loaded from a saved-results XML referencing a path outside current selection), first() returns None and line 437 location_path.relative_to(...) raises AttributeError, aborting the copy/move job with an unhandled error for DestType.RELATIVE.","fix":"Handle location_path is None explicitly (fall back to DestType.ABSOLUTE behavior or skip the dupe with a recorded problem) before calling relative_to.","locations":[{"ref":"core/app.py:431-438","code":"  431 |         location_path = first(p for p in self.directories if p in dupe.path.parents)\n  432 |         dest_path = Path(destination)\n  433 |         if dest_type in {DestType.RELATIVE, DestType.ABSOLUTE}:\n  434 |             # no filename, no windows drive letter\n  435 |             source_base = source_path.relative_to(source_path.anchor).parent\n  436 |             if dest_type == DestType.RELATIVE:\n  437 |                 source_base = source_base.relative_to(location_path.relative_to(location_path.anchor))\n  438 |             dest_path = dest_path.joinpath(source_base)","lines":8}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"format_size() raises IndexError for byte counts at or above 1024**8 (the YB range). When forcepower is -1, the loop 'while size >= SIZE_VALS[i]: i += 1' increments i past the end of SIZE_VALS (which has only 8 elements, indexes 0-7). SIZE_VALS[7] == 1024**8, so any size >= 1024**8 makes i reach 8 and 'size >= SIZE_VALS[8]' raises 'tuple index out of range'. SIZE_DESC has 9 entries (up to YB) but SIZE_VALS only 8, so the YB tier is unreachable without crashing. While such sizes are rare for files, the function is generic and a multi-petabyte/exabyte aggregate (e.g. total scanned size across a huge dataset) can trigger it.","fix":"Bound the loop, e.g. 'while i < len(SIZE_VALS) and size >= SIZE_VALS[i]: i += 1', so i never exceeds the last valid index, or extend SIZE_VALS so it has the same length as SIZE_DESC.","locations":[{"ref":"hscommon/util.py:195-215","code":"  195 | SIZE_DESC = (\"B\", \"KB\", \"MB\", \"GB\", \"TB\", \"PB\", \"EB\", \"ZB\", \"YB\")\n  196 | SIZE_VALS = tuple(1024**i for i in range(1, 9))\n  197 | \n  198 | \n  199 | def format_size(size: int, decimal: int = 0, forcepower: int = -1, showdesc: bool = True) -> str:\n  200 |     \"\"\"Transform a byte count in a formatted string (KB, MB etc..).\n  201 | \n  202 |     ``size`` is the number of bytes to format.\n  203 |     ``decimal`` is the number digits after the dot.\n  204 |     ``forcepower`` is the desired suffix. 0 is B, 1 is KB, 2 is MB etc.. if kept at -1, the suffix\n  205 |     will be automatically chosen (so the resulting number is always below 1024).\n  206 |     if ``showdesc`` is ``True``, the suffix will be shown after the number.\n  207 |     Usage example::\n  208 | \n  209 |         >>> format_size(1234, decimal=2, showdesc=True)\n  210 |         '1.21 KB'\n  211 |     \"\"\"\n  212 |     if forcepower < 0:\n  213 |         i = 0\n  214 |         while size >= SIZE_VALS[i]:\n  215 |             i += 1","lines":21}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In the Qt block_getblocks, top = min(ih * block_height, height - block_height - 1) and left = min(iw * block_width, width - block_width - 1). block_height/block_width are max(dim/bcps, 1). When the image dimension is very small (e.g. height == 1, so block_height == 1), height - block_height - 1 == -1, making top == -1; the offset i * bytes_per_line + j * 3 then becomes negative and s[offset] reads out of bounds (buffer under-read). The core (non-Qt) version uses height - block_height without the -1 and does not have this underflow.","fix":"Clamp top/left to be non-negative (use max(0, ...)) and reconcile the off-by-one with the core implementation which uses height - block_height / width - block_width.","locations":[{"ref":"qt/pe/modules/block.c:119-125","code":"  119 |     top = min(ih * block_height, height - block_height - 1);\n  120 |     for (iw = 0; iw < block_count_per_side; iw++) {\n  121 |       int left;\n  122 |       PyObject *pcrop;\n  123 |       PyObject *pblock;\n  124 | \n  125 |       left = min(iw * block_width, width - block_width - 1);","lines":7},{"ref":"qt/pe/modules/block.c:51","code":"   51 |         offset = i * bytes_per_line + j * 3;","lines":1}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In getblock, totr/totg/totb are plain int accumulators summing per-channel values across all pixels of a crop. For very large crops (block sizes are bounded by block_count_per_side so normally small, but getblocks2 with block_count_per_side == 1 over a huge image is possible) the sum of up to width*height*255 could exceed INT_MAX and overflow before the division.","fix":"Use a wider accumulator type (long long / Py_ssize_t) for totr/totg/totb to avoid overflow on large blocks.","locations":[{"ref":"core/pe/modules/block.c:21","code":"   21 |   int i, totr, totg, totb;","lines":1},{"ref":"core/pe/modules/block.c:48-58","code":"   48 |     totr += r;\n   49 |     totg += g;\n   50 |     totb += b;\n   51 |   }\n   52 | \n   53 |   Py_DECREF(ppixels);\n   54 | \n   55 |   if (pixel_count) {\n   56 |     totr /= pixel_count;\n   57 |     totg /= pixel_count;\n   58 |     totb /= pixel_count;","lines":11}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"TabBarWindow.showTabIndex guards with 'index <= self.stackedWidget.count()', allowing index == count, which is one past the last valid widget index (valid range is 0..count-1). QStackedWidget.setCurrentIndex with an out-of-range index is ignored by Qt, so this is benign today, but the off-by-one is incorrect.","fix":"Use 'index < self.stackedWidget.count()' for the upper bound.","locations":[{"ref":"qt/tabbed_window.py:306-309","code":"  306 |     def showTabIndex(self, index):\n  307 |         # The tab bar's indices should be aligned with the stackwidget's\n  308 |         if index >= 0 and index <= self.stackedWidget.count():\n  309 |             self.stackedWidget.setCurrentIndex(index)","lines":4}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"ExcludeList._remove_compiled matches the regex to remove against compiled patterns using substring containment ('if regex in item.pattern'), not equality. A regex that is a substring of another marked regex's pattern will remove the wrong compiled Pattern from the set, leaving stale or incorrect exclusion patterns active. It also mutates self._excluded_compiled while iterating over it, which is fragile.","fix":"Compare exact pattern equality (item.pattern == regex) and collect matches first, then discard after the loop, or rebuild the set from self._excluded entries.","locations":[{"ref":"core/exclude.py:141-148","code":"  141 |     def _remove_compiled(self, regex):\n  142 |         self._dirty = True\n  143 |         if self._use_union:\n  144 |             return\n  145 |         for item in self._excluded_compiled:\n  146 |             if regex in item.pattern:\n  147 |                 self._excluded_compiled.remove(item)\n  148 |                 break","lines":8}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"build_compiled_caches(union=True) builds combined patterns by joining marked regex strings with '|' WITHOUT wrapping each alternative in a non-capturing group. Anchors and alternations in individual regexes leak across the join, e.g. joining '^a' and 'b$' yields '^a|b$' which changes matching semantics versus matching each pattern independently. is_excluded then uses fullmatch on this union, so a user regex like 'a|b' combined with others can match unintended filenames or fail to match intended ones.","fix":"Wrap each alternative in a non-capturing group before joining: re.compile('|'.join('(?:' + p + ')' for p in marked_count)).","locations":[{"ref":"core/exclude.py:186-198","code":"  186 |             # HACK returned as a tuple to get a free iterator and keep interface\n  187 |             # the same regardless of whether the client asked for union or not\n  188 |             self._cached_compiled_union_all = (re.compile(\"|\".join(marked_count)),)\n  189 |             files_marked = [x for x in marked_count if not has_sep(x)]\n  190 |             if not files_marked:\n  191 |                 self._cached_compiled_union_files = tuple()\n  192 |             else:\n  193 |                 self._cached_compiled_union_files = (re.compile(\"|\".join(files_marked)),)\n  194 |             paths_marked = [x for x in marked_count if has_sep(x)]\n  195 |             if not paths_marked:\n  196 |                 self._cached_compiled_union_paths = tuple()\n  197 |             else:\n  198 |                 self._cached_compiled_union_paths = (re.compile(\"|\".join(paths_marked)),)","lines":13}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"getFilesForName() cannot return files for a directory argument. Line 149 calls 'os.walk(name, _visit_pyfiles, file_list)', which is the obsolete Python 2 os.path.walk(path, visit, arg) callback API. Modern os.walk(top, topdown=True, onerror=None, ...) treats _visit_pyfiles as the 'topdown' flag and file_list as 'onerror', returns a lazy generator that is never iterated, and never calls _visit_pyfiles. As a result file_list stays empty and the directory branch silently returns no files.","fix":"Rewrite using the generator form: iterate 'for dirpath, dirnames, filenames in os.walk(name):', skip CVS in dirnames, and extend file_list with the .py files joined to dirpath. Drop the _visit_pyfiles callback or adapt it to be called per directory.","locations":[{"ref":"hscommon/pygettext.py:146-150","code":"  146 |     if os.path.isdir(name):\n  147 |         # find all python files in directory\n  148 |         file_list = []\n  149 |         os.walk(name, _visit_pyfiles, file_list)\n  150 |         return file_list","lines":5}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"select_dest_file does not handle a cancelled save dialog. QFileDialog.getSaveFileName returns an empty string when the user cancels, but the code unconditionally appends the extension, producing a destination of '.csv' (or similar) in the current working directory. The core export then writes a file named '.csv' instead of aborting.","fix":"Return early with an empty string when destination is falsy, e.g. 'if not destination: return \"\"' before the extension-append logic, and have callers treat an empty return as 'cancelled'.","locations":[{"ref":"qt/app.py:444-449","code":"  444 |     def select_dest_file(self, prompt, extension):\n  445 |         files = tr(\"{} file (*.{})\").format(extension.upper(), extension)\n  446 |         destination, chosen_filter = QFileDialog.getSaveFileName(self.resultWindow, prompt, \"\", files)\n  447 |         if not destination.endswith(f\".{extension}\"):\n  448 |             destination = f\"{destination}.{extension}\"\n  449 |         return destination","lines":6}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The Qt getblock assumes 3 bytes per pixel (offset = i * bytes_per_line + j * 3 and reading s[offset], s[offset+1], s[offset+2]). QImage data is almost always 32-bit (RGB32/ARGB32, 4 bytes per pixel) unless explicitly converted to a packed 24-bit format. With a 4-byte format the per-pixel stride is wrong, so the computed mean colors are garbage (channels read from the wrong byte positions), which corrupts the whole block-matching comparison.","fix":"Determine the actual bytes-per-pixel (e.g. from QImage depth()/format or bytesPerLine/width) and use it as the pixel stride, or ensure the image is converted to a known 24-bit RGB888 format before calling getblock and document that requirement.","locations":[{"ref":"qt/pe/modules/block.c:45-58","code":"   45 |     for (i = 0; i < height; i++) {\n   46 |       int j;\n   47 |       for (j = 0; j < width; j++) {\n   48 |         int offset;\n   49 |         unsigned char r, g, b;\n   50 | \n   51 |         offset = i * bytes_per_line + j * 3;\n   52 |         r = s[offset];\n   53 |         g = s[offset + 1];\n   54 |         b = s[offset + 2];\n   55 |         red += r;\n   56 |         green += g;\n   57 |         blue += b;\n   58 |       }","lines":14}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Directories._default_state_for_path, when an exclude list with marks exists, only checks path.name against the file/union 'compiled' patterns and returns NORMAL otherwise, completely bypassing the legacy '.'-prefixed hidden-folder exclusion (lines 89-90 are only reachable when no exclude marks exist). Since app.py always constructs an ExcludeList seeded with default regexes (which include '^\\..*'), the dotfile branch at 89-90 is effectively dead in the running app, and folder state now depends entirely on matching path.name against patterns built for filenames.","fix":"Clarify and unify the exclusion logic so directory state is decided by one well-defined path; if the dotfile fallback is intended only when no exclude list is configured, document that, otherwise remove the dead branch.","locations":[{"ref":"core/directories.py:80-91","code":"   80 |     def _default_state_for_path(self, path):\n   81 |         # New logic with regex filters\n   82 |         if self._exclude_list is not None and self._exclude_list.mark_count > 0:\n   83 |             # We iterate even if we only have one item here\n   84 |             for denied_path_re in self._exclude_list.compiled:\n   85 |                 if denied_path_re.match(str(path.name)):\n   86 |                     return DirectoryState.EXCLUDED\n   87 |             return DirectoryState.NORMAL\n   88 |         # Override this in subclasses to specify the state of some special folders.\n   89 |         if path.name.startswith(\".\"):\n   90 |             return DirectoryState.EXCLUDED\n   91 |         return DirectoryState.NORMAL","lines":12}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Directories._get_files computes skip_dirs by checking whether any state path is under root_path via p.parts[:len(root_path.parts)] == root_path.parts. This prefix comparison treats unrelated sibling directories that share a name prefix incorrectly only at the component level (which is fine) but it scans the entire self.states dict for every excluded directory entered, making traversal of large excluded trees O(dirs * states). For deep trees with many per-folder state overrides this is a real performance cost.","fix":"Precompute, once per scan, the set of ancestor paths that contain non-excluded descendants, or index states by parent, instead of rescanning self.states for every directory.","locations":[{"ref":"core/directories.py:93-101","code":"   93 |     def _get_files(self, from_path, fileclasses, j):\n   94 |         try:\n   95 |             with os.scandir(from_path) as iter:\n   96 |                 root_path = Path(from_path)\n   97 |                 state = self.get_state(root_path)\n   98 |                 # if we have no un-excluded dirs under this directory skip going deeper\n   99 |                 skip_ ename):\n  261 |         \"\"\"Return True if the file or the absolute path to file is supposed to be\n  262 |         filtered out, False otherwise.\"\"\"\n  263 |         matched = False\n  264 |         for expr in self.compiled_files:\n  265 |             if expr.fullmatch(filename):\n  266 |                 matched = True\n  267 |                 break\n  268 |         if not matched:\n  269 |             for expr in self.compiled_paths:\n  270 |                 if expr.fullmatch(dirname + sep + filename):\n  271 |                     matched = True\n  272 |                     break\n  273 |         return matched","lines":14},{"ref":"core/exclude.py:505-513","code":"  505 | if ISWINDOWS:\n  506 | \n  507 |     def has_sep(regexp):\n  508 |         return \"\\\\\" + sep in regexp\n  509 | \n  510 | else:\n  511 | \n  512 |     def has_sep(regexp):\n  513 |         return sep in regexp","lines":9}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ExcludeList.remove iterates over self._excluded with a for-loop while calling self._excluded.remove(item) inside the loop. Mutating a list during iteration can skip elements; if duplicate-equal entries ever existed only the first would be removed. The intent (remove the single matching entry) is also obscured.","fix":"Break after removing the matched item, or build a new list without the matched regex, then call _remove_compiled once.","locations":[{"ref":"core/exclude.py:275-279","code":"  275 |     def remove(self, regex):\n  276 |         for item in self._excluded:\n  277 |             if item[0] == regex:\n  278 |                 self._excluded.remove(item)\n  279 |         self._remove_compiled(regex)","lines":5}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"restore_defaults adds missing default regexes then marks them, but ExcludeList._do_add inserts each new regex at the top of the list. Iterating default_regexes in order while inserting at index 0 reverses their stored order relative to the documented intent, and because only newly-missing defaults are added the final ordering depends on which defaults already existed. This makes the persisted/displayed order of the default exclusion regexes nondeterministic across sessions.","fix":"Insert defaults in reverse so display order matches default_regexes, or sort/normalize order explicitly after restoring; document the intended order.","locations":[{"ref":"core/exclude.py:309-316","code":"  309 |     def restore_defaults(self):\n  310 |         for _, regex in self:\n  311 |             if regex not in default_regexes:\n  312 |                 self.unmark(regex)\n  313 |         for default_regex in default_regexes:\n  314 |             if not self.has_entry(default_regex):\n  315 |                 self.add(default_regex)\n  316 |             self.mark(default_regex)","lines":8},{"ref":"core/exclude.py:245-247","code":"  245 |     def _do_add(self, regex, iscompilable, exception, compiled):\n  246 |         # We need to insert at the top\n  247 |         self._excluded.insert(0, [regex, iscompilable, exception, compiled])","lines":3}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"get_fields indexes the endianness label dict {INTEL_ENDIAN: \"Intel\", MOTOROLA_ENDIAN: \"Motorola\"}[data_format] directly. If a corrupt/unexpected first byte is read, this raises KeyError (not caught here) instead of a clean parse failure. Also length = data[4]*256 + data[5] and the subsequent fp.read(length - 8) are used without validating length >= 8, so a malformed header yields a negative read size.","fix":"Validate the endianness byte and the computed length before use, and treat unexpected values as a parse error (raise ValueError) handled by the callers in photo.py.","locations":[{"ref":"core/pe/exif.py:293-297","code":"  293 |     length = data[4] * 256 + data[5]\n  294 |     logging.debug(\"Exif header length: %d bytes\", length)\n  295 |     data = fp.read(length - 8)\n  296 |     data_format = data[0]\n  297 |     logging.debug(\"%s format\", {INTEL_ENDIAN: \"Intel\", MOTOROLA_ENDIAN: \"Motorola\"}[data_format])","lines":5}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In prepare_pictures, the non-rotated branch does blocks = [[]] * 8 which creates eight references to the SAME inner list, then assigns blocks[idx] = picture.get_blocks(...). The assignment replaces one slot so it happens to work, but any future code that mutates a slot in-place would corrupt all eight entries. This is a fragile aliasing pattern.","fix":"Build distinct lists, e.g. blocks = [[] for _ in range(8)], to avoid shared mutable references.","locations":[{"ref":"core/pe/matchblock.py:84-86","code":"   84 |                     else:\n   85 |                         blocks = [[]] * 8\n   86 |                         blocks[max(picture.get_orientation() - 1, 0)] = picture.get_blocks(BLOCK_COUNT_PER_SIDE)","lines":3}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FilenameCategory.sort_key for ENDS_WITH_NUMBER/DOESNT_END_WITH_NUMBER uses value.strip()[-1:].isdigit(); after rem_file_ext and strip, a name that is entirely whitespace or empty yields '' whose [-1:] is '' and isdigit() is False, which is acceptable, but value.strip() discards internal/leading content meaning a filename like 'file 2 ' is judged by its real last non-space char, while names ending in punctuation after a digit (e.g. 'track01)') are treated as not ending in a number. The 'ends with number' criterion silently misclassifies common patterns.","fix":"Define 'ends with number' explicitly (e.g. regex search for trailing digits ignoring trailing punctuation) and document the rule rather than relying on the last stripped character.","locations":[{"ref":"core/prioritize.py:115-122","code":"  115 |     def sort_key(self, dupe, crit_value):\n  116 |         value = self.extract_value(dupe)\n  117 |         if crit_value in {self.ENDS_WITH_NUMBER, self.DOESNT_END_WITH_NUMBER}:\n  118 |             ends_with_digit = value.strip()[-1:].isdigit()\n  119 |             if crit_value == self.ENDS_WITH_NUMBER:\n  120 |                 return 0 if ends_with_digit else 1\n  121 |             else:\n  122 |                 return 1 if ends_with_digit else 0","lines":8}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In _did_unmark/_did_mark and stat_line, when mark_inverted is True the displayed marked_size is computed as total_size - marked_size, but __marked_size is maintained only via _did_mark/_did_unmark which fire on actual set membership changes regardless of inversion. When inverted, the set holds the UNmarked items, so __marked_size tracks the size of explicitly-toggled (i.e. unmarked) dupes, and total_size - marked_size is only correct if __total_size equals the size of all markable dupes. After make_ref/remove_duplicates adjust __total_size and __marked_size independently, the inverted stat line can drift. This is fragile coupling worth auditing.","fix":"Recompute marked_size from the actual marked set under inversion rather than maintaining a running __marked_size that must stay in lockstep with __total_size across make_ref/remove_duplicates.","locations":[{"ref":"core/results.py:58-62","code":"   58 |     def _did_mark(self, dupe):\n   59 |         self.__marked_size += dupe.size\n   60 | \n   61 |     def _did_unmark(self, dupe):\n   62 |         self.__marked_size -= dupe.size","lines":5},{"ref":"core/results.py:133-134","code":"  133 |         if self.mark_inverted:\n  134 |             marked_size = self.__total_size - marked_size","lines":2},{"ref":"core/results.py:272-287","code":"  272 |     def make_ref(self, dupe):\n  273 |         \"\"\"Make ``dupe`` take the :attr:`~core.engine.Group.ref` position of its group.\"\"\"\n  274 |         g = self.get_group_of_duplicate(dupe)\n  275 |         r = g.ref\n  276 |         if not g.switch_ref(dupe):\n  277 |             return False\n  278 |         self._remove_mark_flag(dupe)\n  279 |         if not r.is_ref:\n  280 |             self.__total_count += 1\n  281 |             self.__total_size += r.size\n  282 |         if not dupe.is_ref:\n  283 |             self.__total_count -= 1\n  284 |             self.__total_size -= dupe.size\n  285 |         self.__dupes = None\n  286 |         self.is_modified = True\n  287 |         return True","lines":16}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"load_from_xml.do_match is implemented recursively over the dupe list (do_match(other_files[0], other_files[1:], group)), creating one stack frame per file in a group and slicing the list at every level. A loaded group with a large number of files can hit Python's recursion limit and/or be O(n^2) due to repeated list slicing.","fix":"Rewrite do_match iteratively, adding matches for all pairs without recursion or repeated slicing.","locations":[{"ref":"core/results.py:223-228","code":"  223 |         def do_match(ref_file, other_files, group):\n  224 |             if not other_files:\n  225 |                 return\n  226 |             for other_file in other_files:\n  227 |                 group.add_match(engine.get_match(ref_file, other_file))\n  228 |             do_match(other_files[0], other_files[1:], group)","lines":6},{"ref":"core/results.py:262","code":"  262 |                 do_match(dupes[0], dupes[1:], group)","lines":1}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"remove_duplicates() returns early (bare 'return') if any single dupe is not in its group's dupes list. This aborts processing of all re unning. create_job() and run_threaded() both test 'if self._job_running' and then proceed, but _job_running is only set to True inside the worker thread in _async_run (line 51), after run_threaded() has already returned. Two rapid run_threaded() calls (or create_job followed by run_threaded from another thread) can both pass the guard before either sets the flag, allowing two concurrent jobs that clobber shared last_progress/last_desc/last_error state. _job_running is a plain bool with no lock.","fix":"Guard _job_running with a threading.Lock, and set _job_running = True synchronously inside run_threaded() (before starting the Thread) under that lock, rather than inside the worker thread.","locations":[{"ref":"hscommon/jobprogress/performer.py:28-74","code":"   28 |     _job_running = False\n   29 |     last_error = None\n   30 | \n   31 |     # --- Protected\n   32 |     def create_job(self) -> Job:\n   33 |         if self._job_running:\n   34 |             raise JobInProgressError()\n   35 |         self.last_progress: Union[int, None] = -1\n   36 |         self.last_desc = \"\"\n   37 |         self.job_cancelled = False\n   38 |         return Job(1, self._update_progress)\n   39 | \n   40 |     def _async_run(self, *args) -> None:\n   41 |         target = args[0]\n   42 |         args = tuple(args[1:])\n   43 |         self._job_running = True\n   44 |         self.last_error = None\n   45 |         try:\n   46 |             target(*args)\n   47 |         except JobCancelled:\n   48 |             pass\n   49 |         except Exception as e:\n   50 |             self.last_error = e\n   51 |             self.last_traceback = sys.exc_info()[2]\n   52 |         finally:\n   53 |             self._job_running = False\n   54 |             self.last_progress = None\n   55 | \n   56 |     def reraise_if_error(self) -> None:\n   57 |         \"\"\"Reraises the error that happened in the thread if any.\n   58 | \n   59 |         Call this after the caller of run_threaded detected that self._job_running returned to False\n   60 |         \"\"\"\n   61 |         if self.last_error is not None:\n   62 |             raise self.last_error.with_traceback(self.last_traceback)\n   63 | \n   64 |     def _update_progress(self, newprogress: int, newdesc: str = \"\") -> bool:\n   65 |         self.last_progress = newprogress\n   66 |         if newdesc:\n   67 |             self.last_desc = newdesc\n   68 |         return not self.job_cancelled\n   69 | \n   70 |     def run_threaded(self, target: Callable, args: Tuple = ()) -> None:\n   71 |         if self._job_running:\n   72 |             raise JobInProgressError()\n   73 |         args = (target,) + args\n   74 |         Thread(target=self._async_run, args=args).start()","lines":47}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"multi_replace() misinterprets the replace_to argument when both replace_from and replace_to are equal-length strings. The intent (per the docstring) is that a string replace_to means 'replace every replace_from occurrence with that whole string'. But the guard 'if isinstance(replace_to, str) and (len(replace_from) != len(replace_to))' only expands replace_to into a per-item list when the lengths differ. When they are equal (e.g. multi_replace('abc', 'ab', 'xy')), replace_to is left as the string 'xy', zip pairs it char-by-char with replace_from, and 'a'->'x', 'b'->'y' instead of replacing both 'a' and 'b' with the full string 'xy'. The behavior thus silently depends on whether the two strings happen to have the same length.","fix":"Decide the semantics explicitly: if replace_to is a str it should always be broadcast to every replace_from item (drop the length check), or document that an equal-length str replace_to is treated positionally. Replacing the condition with 'if isinstance(replace_to, str): replace_to = [replace_to for _ in replace_from]' matches the documented behavior.","locations":[ aders).replace(\"$rows\", rendered_rows)","lines":21}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"FilesDB.connect checks platform.startswith('gnu0') to choose isolation_level=None. 'gnu0' is not a real sys.platform value (Linux is 'linux', Hurd would be 'gnu'); this branch is effectively dead and the special isolation handling it intends never triggers, while close()/commit() rely on default isolation.","fix":"Fix the platform string (likely 'gnu' or remove the special case) or remove the dead branch.","locations":[{"ref":"core/fs.py:122-125","code":"  122 |         if platform.startswith(\"gnu0\"):\n  123 |             self.conn = sqlite3.connect(path, check_same_thread=False, isolation_level=None)\n  124 |         else:\n  125 |             self.conn = sqlite3.connect(path, check_same_thread=False)","lines":4}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"File._read_info for 'digest_samples' uses 'if size <= MIN_FILE_SIZE: self.digest_samples = self.digest', i.e. small files reuse the full digest. But getmatches_by_contents only consults digest_samples when 'bigsize > 0 and first.size > bigsize'. If bigsize is set smaller than MIN_FILE_SIZE (3 MiB), a file with bigsize < size <= MIN_FILE_SIZE gets its full digest as digest_samples, which is correct but means the 'sample' optimization silently degrades to a full hash without indication; the interplay of the two thresholds (bigsize vs MIN_FILE_SIZE) is undocumented and easy to misconfigure.","fix":"Document the relationship between big_file_size_threshold and MIN_FILE_SIZE, or derive one from the other so sampling behavior is predictable.","locations":[{"ref":"core/fs.py:299-308","code":"  299 |         elif field == \"digest_samples\":\n  300 |             size = self.size\n  301 |             # Might as well hash such small files entirely.\n  302 |             if size <= MIN_FILE_SI e only one side is a nested child is kept, which may retain matches the comment says should be pruned. The dedup-of-duplicates logic is subtle and the condition does not clearly implement 'remove folder matches whose parent is also matched'.","fix":"Re-derive the intended predicate and add a test: likely the match should be dropped if EITHER path is a redundant nested child whose ancestor is already matched.","locations":[{"ref":"core/scanner.py:158-169","code":"  158 |         if self.scan_type == ScanType.FOLDERS and matches:\n  159 |             allpath = {m.first.path for m in matches}\n  160 |             allpath |= {m.second.path for m in matches}\n  161 |             sortedpaths = sorted(allpath)\n  162 |             toremove = set()\n  163 |             last_parent_path = sortedpaths[0]\n  164 |             for p in sortedpaths[1:]:\n  165 |                 if last_parent_path in p.parents:\n  166 |                     toremove.add(p)\n  167 |                 else:\n  168 |                     last_parent_path = p\n  169 |             matches = [m for m in matches if m.first.path not in toremove or m.second.path not in toremove]","lines":12}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"smart_copy() catches OSError and decides 'it's a directory' purely from errno being EISDIR (21) or EACCES (13). EACCES (Permission denied) is a genuine permission error on many platforms, not a reliable signal that the source is a directory. On Linux, copying a directory with shutil.copy raises IsADirectoryError (EISDIR); a real EACCES (e.g. unreadable source file) would be misrouted into shutil.copytree, masking the true permission error with a confusing directory-copy failure.","fix":"Decide whether to recurse based on source_path.is_dir() before copying, rather than inferring it from the errno of a failed shutil.copy; reserve the errno fallback strictly for the Windows EACCES-on-directory quirk.","locations":[{"ref":"hscommon/conflict.py:74-83","code":"   74 | def smart_copy(source_path: Path, dest_path: Path) -> None:\n   75 |     \"\"\"Copies ``source_path`` to ``dest_path``, recursively and with conflict resolution.\"\"\"\n   76 |     try:\n   77 |         _smart_move_or_copy(shutil.copy, source_path, dest_path)\n   78 |     except OSError as e:\n   79 |         # It's a directory, code is 21 on OS X / Linux (EISDIR) and 13 on Windows (EACCES)\n   80 |         if e.errno in (EISDIR, EACCES):\n   81 |             _smart_move_or_copy(shutil.copytree, source_path, dest_path)\n   82 |         else:\n   83 |             raise","lines":10}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Selectable._check_selection_range() only filters indexes that are too large ('index < len(self)') and does not reject negative indexes. A negative index passed via selected_indexes/select() survives the range check and later indexes from the end of the sequence (e.g. selected_rows -> self[-1]), silently selecting the wrong row instead of being treated as out-of-bounds.","fix":"Filter on a full bounds check, e.g. '[index for index in self._selected_indexes if 0 <= index < len(self)]'.","locations":[{"ref":"hscommon/gui/selectable_list.py:25-32","code":"   25 |     def _check_selection_range(self):\n   26 |         if not self:\n   27 |             self._selected_indexes = []\n   28 |         if not self._selected_indexes:\n   29 |             return\n   30 |         self._selected_indexes = [index for index in self._selected_indexes if index < len(self)]\n   31 |         if not self._selected_indexes:\n   32 |             self._selected_indexes = [len(self) - 1]","lines":8}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Table.insert() can place a row in the wrong position when only a footer (and no header) is present. With a footer present and index >= len(self), ,"type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"QWidgetImageViewer.changeEvent handles EnabledChange but does not call super().changeEvent(event), and returns early on the enabled branch. Swallowing changeEvent without chaining to the base implementation can suppress other change notifications (font/style/palette changes) that QWidget relies on for correct repainting/relayout.","fix":"Call super().changeEvent(event) at the start (or in all branches) so non-EnabledChange events still propagate to the base class.","locations":[{"ref":"qt/pe/image_viewer.py:742-747","code":"  742 |     def changeEvent(self, event):\n  743 |         if event.type() == QEvent.EnabledChange:\n  744 |             if self.isEnabled():\n  745 |                 self.connectMouseSignals()\n  746 |                 return\n  747 |             self.disconnectMouseSignals()","lines":6}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"QWidgetImageViewer.setImage, on receiving a null pixmap, only overwrites self._pixmap when the existing pixmap is non-null ('if not self._pixmap.isNull(): self._pixmap = pixmap'). The guard is pointless: assigning the null pixmap is harmless and the conditional only adds a confusing branch. More importantly, if the existing pixmap is already null it skips the assignment but still disables the widget, so behavior depends on prior state in a non-obvious way.","fix":"Unconditionally set self._pixmap = pixmap in the null branch (or drop the redundant inner check) so state is deterministic.","locations":[{"ref":"qt/pe/image_viewer.py:804-811","code":"  804 |     def setImage(self, pixmap):\n  805 |         if pixmap.isNull():\n  806 |             if not self._pixmap.isNull():\n  807 |                 self._pixmap = pixmap\n  808 |             self.disconnectMouseSignals()\n  809 |             self.setEnabled(False)\n  810 |             self.update()\n  811 |             return","lines":8}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"shouldBeActive() references 'self.pixmap', but the attribute is named '_pixmap' everywhere else; this would raise AttributeError if ever called. Both copies (QWidgetImageViewer and ScrollAreaImageViewer) have the same defect. The method is currently never called anywhere in the codebase, so it is also dead code that masks the bug.","fix":"Either delete the unused shouldBeActive() methods, or fix them to use self._pixmap.isNull().","locations":[{"ref":"qt/pe/image_viewer.py:822-823","code":"  822 |     def shouldBeActive(self):\n  823 |         return True if not self.pixmap.isNull() else False","lines":2},{"ref":"qt/pe/image_viewer.py:1031-1032","code":" 1031 |     def shouldBeActive(self):\n 1032 |         return True if not self.pixmap.isNull() else False","lines":2}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"GraphicsViewViewer.setImage calls self.translate(1, 1) on every image set. Translating the view by a fixed (1,1) on each setImage has no clear purpose and accumulates a per-call offset on the view transform; combined with fitScale/centerOn it can introduce a small drift in the displayed position. It looks like a leftover workaround rather than intentional geometry.","fix":"Remove the self.translate(1, 1) call, or document the specific Qt glitch it works around; verify centering is unaffected after removal.","locations":[{"ref":"qt/pe/image_viewer.py:1251-1258","code":" 1251 |     def setImage(self, pixmap):\n 1252 |         if pixmap.isNull():\n 1253 |             self.ignore_signal = True\n 1254 |         elif self.ignore_signal:\n 1255 |             self.ignore_signal = False\n 1256 |         self._pixmap = pixmap\n 1257 |         self._item.setPixmap(pixmap)\n 1258 |         self.translate(1, 1)","lines":8}]},{"id":"LOGIC_54","type":"logic_error","type_la
