<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`tick::Channel` computes the next delivery time with `Instant + Duration`\n(`now + self.duration` in `try_recv`, and `delivery_time.0.max(now) + self.duration`\nin `recv`). `Instant::add` panics on overflow. With a sufficiently large `duration`\n(e.g. one constructed near the platform clock's representable maximum, which is\nexternally controllable via `tick(dur)`), repeated ticks can advance the stored\ndelivery time until the addition overflows and panics inside an otherwise infallible\nreceive path. The `at` flavor avoids any such addition; `tick` does not guard it.","fix":"Use `Instant::checked_add(self.duration)` and fall back to a saturated/clamped value\n(or simply skip rescheduling) when it returns `None`, instead of the panicking `+`.","locations":[{"ref":"crossbeam-channel/src/flavors/tick.rs:90-97","code":"   90 |             if self\n   91 |                 .delivery_time\n   92 |                 .compare_exchange(delivery_time, Align(now + self.duration))\n   93 |                 .is_ok()\n   94 |             {\n   95 |                 return Ok(delivery_time.0);\n   96 |             }\n   97 |         }","lines":8},{"ref":"crossbeam-channel/src/flavors/tick.rs:116-128","code":"  116 |             if self\n  117 |                 .delivery_time\n  118 |                 .compare_exchange(\n  119 |                     delivery_time,\n  120 |                     Align(delivery_time.0.max(now) + self.duration),\n  121 |                 )\n  122 |                 .is_ok()\n  123 |             {\n  124 |                 if now < delivery_time.0 {\n  125 |                     thread::sleep(delivery_time.0 - now);\n  126 |                 }\n  127 |                 return Ok(delivery_time.0);\n  128 |             }","lines":13}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ArrayQueue::new` computes `one_lap = (cap + 1).next_power_of_two()`. For very large\ncapacities this has two undocumented panic paths beyond the documented zero-capacity case:\n(1) `cap + 1` overflows when `cap == usize::MAX` (panics in debug, wraps to 0 in release,\nwhich would then corrupt the index/lap bit-packing math); (2) `next_power_of_two()` panics\nwhen its argument exceeds the largest representable power of two (i.e. `cap + 1 > 1 << (bits-1)`).\nIn practice the `(0..cap).collect()` buffer allocation will usually fail/abort first for such\nsizes, so this is low severity, but the `# Panics` doc only mentions zero capacity.","fix":"Either document the additional panic conditions, or guard explicitly, e.g. assert that\n`cap <= (1 << (usize::BITS - 1)) - 1` (or use `cap.checked_add(1).and_then(usize::checked_next_power_of_two)`\nwith a clear panic message) so the failure mode is intentional rather than an arithmetic overflow.","locations":[{"ref":"crossbeam-queue/src/array_queue.rs:96-117","code":"   96 |     pub fn new(cap: usize) -> Self {\n   97 |         assert!(cap > 0, \"capacity must be non-zero\");\n   98 | \n   99 |         // Head is initialized to `{ lap: 0, index: 0 }`.\n  100 |         // Tail is initialized to `{ lap: 0, index: 0 }`.\n  101 |         let head = 0;\n  102 |         let tail = 0;\n  103 | \n  104 |         // Allocate a buffer of `cap` slots initialized\n  105 |         // with stamps.\n  106 |         let buffer: Box<[Slot<T>]> = (0..cap)\n  107 |             .map(|i| {\n  108 |                 // Set the stamp to `{ lap: 0, index: i }`.\n  109 |                 Slot {\n  110 |                     stamp: AtomicUsize::new(i),\n  111 |                     value: UnsafeCell::new(MaybeUninit::uninit()),\n  112 |                 }\n  113 |             })\n  114 |             .collect();\n  115 | \n  116 |         // One lap is the smallest power of two greater than `cap`.\n  117 |         let one_lap = (cap + 1).next_power_of_two();","lines":22}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `reserve`, the doubling loop computes `new_cap = cap * 2` and then `new_cap *= 2` with plain\n(non-wrapping, non-checked) multiplication. If a caller passes a very large `reserve_cap` (the public\n`steal_batch_with_limit*` APIs accept `limit: usize` up to `usize::MAX`, though the effective batch is\nclamped to `len/2`), or the queue legitimately grows past `usize::MAX / 2` capacity, `cap * 2` overflows\nand in release builds wraps to a smaller/invalid capacity, after which `resize` would allocate a buffer\nthat is too small or attempt an invalid `Layout`. In practice the index space (isize) bounds this long\nbefore it is reachable, so severity is low, but the arithmetic is unguarded and the invariant\n(\"capacity always fits\") is implicit rather than asserted.","fix":"Use `checked_mul`/`saturating` arithmetic or assert that the new capacity stays within a sane bound (e.g. `<= isize::MAX as usize`) before calling `resize`.","locations":[{"ref":"crossbeam-deque/src/deque.rs:338-342","code":"  338 |                 // Keep doubling the capacity as much as is needed.\n  339 |                 let mut new_cap = cap * 2;\n  340 |                 while new_cap - len < reserve_cap {\n  341 |                     new_cap *= 2;\n  342 |                 }","lines":5}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `tick::Channel::recv`, `delivery_time` is loaded (line 104) before `now` is sampled\n(line 105), and the deadline branch compares the cached `delivery_time.0` against the\ndeadline while sleeping based on a separately sampled `now`. Between the load and the\nCAS at line 116 another receiver may have advanced `delivery_time`; on CAS failure the\nloop retries, which is correct, but the success branch then sleeps `delivery_time.0 - now`\nusing the value read at the top of the iteration. This is benign today (the CAS guarantees\nthe value was still current at swap time), but the ordering of the two loads is fragile and\ndiffers from `try_recv`, making the timing logic harder to reason about than necessary.","fix":"Sample `now` immediately after the `delivery_time.load()` (or document the invariant that\nthe CAS revalidates `delivery_time`), keeping the ordering consistent with `try_recv`.","locations":[{"ref":"crossbeam-channel/src/flavors/tick.rs:103-129","code":"  103 |         loop {\n  104 |             let delivery_time = self.delivery_time.load();\n  105 |             let now = Instant::now();\n  106 | \n  107 |             if let Some(d) = deadline {\n  108 |                 if d < delivery_time.0 {\n  109 |                     if now < d {\n  110 |                         thread::sleep(d - now);\n  111 |                     }\n  112 |                     return Err(RecvTimeoutError::Timeout);\n  113 |                 }\n  114 |             }\n  115 | \n  116 |             if self\n  117 |                 .delivery_time\n  118 |                 .compare_exchange(\n  119 |                     delivery_time,\n  120 |                     Align(delivery_time.0.max(now) + self.duration),\n  121 |                 )\n  122 |                 .is_ok()\n  123 |             {\n  124 |                 if now < delivery_time.0 {\n  125 |                     thread::sleep(delivery_time.0 - now);\n  126 |                 }\n  127 |                 return Ok(delivery_time.0);\n  128 |             }\n  129 |         }","lines":27}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`Node::try_increment` panics with `.expect(\"SkipList reference count overflow\")` when the reference count saturates (line 236). The count lives in the high bits of a `usize` shared with the 5-bit height, so on a 64-bit platform overflow requires ~2^59 simultaneous `Entry`/`RefEntry` clones - effectively unreachable in practice, but it is a reachable panic path reachable from the safe public `Clone` impls for `Entry`/`RefEntry` if a caller leaks clones in a tight loop. Acceptable, but the panic is the only failure mode (no fallible variant).","fix":"No change strictly required; optionally document the overflow-panic on the public `Clone` impls so callers know cloning can (theoretically) panic.","locations":[{"ref":"crossbeam-skiplist/src/base.rs:233-236","code":"  233 |             // If all bits in the reference count are ones, we're about to overflow it.\n  234 |             let new_refs_and_height = refs_and_height\n  235 |                 .checked_add(1 << HEIGHT_BITS)\n  236 |                 .expect(\"SkipList reference count overflow\");","lines":4}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"`ScopedJoinHandle::into_pthread_t` (and the Windows `into_raw_handle`) claim in their docs to\n**transfer ownership** of the underlying OS thread handle: \"Callers are then the unique owners of\nthe pthread_t and must either detach or join the pthread_t once it's no longer needed.\" But the\nimplementation simply calls `self.as_pthread_t()` / `self.as_raw_handle()`, which only *borrows*\nthe handle out of the shared `Arc<Mutex<Option<JoinHandle>>>` and returns the raw value. The\n`JoinHandle` is left in the shared list, so the scope still joins the thread when it exits. A\ncaller that follows the documented contract and also joins/detaches the returned raw handle\nperforms a second join/detach on the same OS thread, which is undefined behavior. The doc and the\nimplementation are inconsistent and the documented contract is unsound.","fix":"Either (a) actually consume the inner `JoinHandle` and prevent the scope from joining it (e.g. by\n`take()`-ing it out of the shared option and detaching the scope's responsibility), or (b) fix the\ndocs to state that ownership is NOT transferred and the scope will still join the thread, so\ncallers must not join/detach the returned raw handle. Given scoped semantics, (b) is the correct\nand safe choice.","locations":[{"ref":"crossbeam-utils/src/thread.rs:579-598","code":"  579 |         /// Consumes the thread, returning the raw pthread_t\n  580 |         ///\n  581 |         /// This function **transfers ownership** of the underlying pthread_t to\n  582 |         /// the caller. Callers are then the unique owners of the pthread_t and\n  583 |         /// must either detach or join the pthread_t once it's no longer needed.\n  584 |         fn into_pthread_t(self) -> RawPthread;\n  585 |     }\n  586 | \n  587 |     impl<T> sealed::Sealed for ScopedJoinHandle<'_, T> {}\n  588 |     impl<T> JoinHandleExt for ScopedJoinHandle<'_, T> {\n  589 |         fn as_pthread_t(&self) -> RawPthread {\n  590 |             // Borrow the handle. The handle will surely be available because the root scope waits\n  591 |             // for nested scopes before joining remaining threads.\n  592 |             let handle = self.handle.lock().unwrap();\n  593 |             handle.as_ref().unwrap().as_pthread_t()\n  594 |         }\n  595 |         fn into_pthread_t(self) -> RawPthread {\n  596 |             self.as_pthread_t()\n  597 |         }\n  598 |     }","lines":20},{"ref":"crossbeam-utils/src/thread.rs:616-620","code":"  616 |     impl<T> IntoRawHandle for ScopedJoinHandle<'_, T> {\n  617 |         fn into_raw_handle(self) -> RawHandle {\n  618 |             self.as_raw_handle()\n  619 |         }\n  620 |     }","lines":5}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"The `At` and `Tick` receiver flavors carry no type parameter (they are `Arc<flavors::at::Channel>` /\n`Arc<flavors::tick::Channel>`, always producing `Instant`), yet `Receiver<T>::try_recv`, `recv`,\n`recv_deadline` and `channel::read` reinterpret their `Result<Instant, _>` as `Result<T, _>` via\n`mem::transmute_copy`. This is sound only because the constructors `after`/`at`/`tick` are the sole\nway to build these flavors and they hardcode `Receiver<Instant>`. The invariant (\"an `At`/`Tick`\nflavor can only exist inside a `Receiver<Instant>`\") is implicit and unchecked: any future code path\nthat placed an `At`/`Tick` flavor inside a `Receiver<T>` with `T != Instant` would silently produce\nUB (it transmutes by reading `size_of::<Result<Instant, _>>()` bytes into a differently-sized/typed\n`Result<T, _>`). A subtle, easily-broken cross-module coupling in unsafe code.","fix":"Document the invariant explicitly at the `ReceiverFlavor::At`/`Tick` definitions and at each\ntransmute site, or better, make the flavors generic / store the materialized `Instant` behind a\ntyped wrapper so the transmute can be replaced with a checked conversion that only compiles when\n`T = Instant`.","locations":[{"ref":"crossbeam-channel/src/channel.rs:783-798","code":"  783 |             ReceiverFlavor::At(chan) => {\n  784 |                 let msg = chan.try_recv();\n  785 |                 unsafe {\n  786 |                     mem::transmute_copy::<Result<Instant, TryRecvError>, Result<T, TryRecvError>>(\n  787 |                         &msg,\n  788 |                     )\n  789 |                 }\n  790 |             }\n  791 |             ReceiverFlavor::Tick(chan) => {\n  792 |                 let msg = chan.try_recv();\n  793 |                 unsafe {\n  794 |                     mem::transmute_copy::<Result<Instant, TryRecvError>, Result<T, TryRecvError>>(\n  795 |                         &msg,\n  796 |                     )\n  797 |                 }\n  798 |             }","lines":16},{"ref":"crossbeam-channel/src/channel.rs:836-853","code":"  836 |             ReceiverFlavor::At(chan) => {\n  837 |                 let msg = chan.recv(None);\n  838 |                 unsafe {\n  839 |                     mem::transmute_copy::<\n  840 |                         Result<Instant, RecvTimeoutError>,\n  841 |                         Result<T, RecvTimeoutError>,\n  842 |                     >(&msg)\n  843 |                 }\n  844 |             }\n  845 |             ReceiverFlavor::Tick(chan) => {\n  846 |                 let msg = chan.recv(None);\n  847 |                 unsafe {\n  848 |                     mem::transmute_copy::<\n  849 |                         Result<Instant, RecvTimeoutError>,\n  850 |                         Result<T, RecvTimeoutError>,\n  851 |                     >(&msg)\n  852 |                 }\n  853 |             }","lines":18},{"ref":"crossbeam-channel/src/channel.rs:1556-1562","code":" 1556 |             ReceiverFlavor::At(chan) => {\n 1557 |                 mem::transmute_copy::<Result<Instant, ()>, Result<T, ()>>(&chan.read(token))\n 1558 |             }\n 1559 |             ReceiverFlavor::Tick(chan) => {\n 1560 |                 mem::transmute_copy::<Result<Instant, ()>, Result<T, ()>>(&chan.read(token))\n 1561 |             }\n 1562 |             ReceiverFlavor::Never(chan) => chan.read(token),","lines":7}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In `insert_internal`, the `replace` / `compare_fn` closure can be invoked more than once for a single logical insert: once after the initial `search_position` (line 1037) and again after every CAS failure + re-search (line 1111). For `compare_insert`, which takes an `Fn(&V) -> bool`, a user closure with side effects (counters, logging) will fire repeatedly under contention. The documented \"Note\" on `get_or_insert_with` warns about the value closure being discarded, but no such warning covers the compare closure being called multiple times.","fix":"Document that the compare closure passed to `compare_insert` may be called more than once and must be free of observable side effects, or restructure the retry loop so it is evaluated at most once per call.","locations":[{"ref":"crossbeam-skiplist/src/base.rs:1036-1045","code":" 1036 |             if let Some(r) = search.found {\n 1037 |                 let replace = replace(&r.value);\n 1038 |                 if !replace {\n 1039 |                     // If a node with the key was found and we're not going to replace it, let's\n 1040 |                     // try returning it as an entry.\n 1041 |                     if let Some(e) = RefEntry::try_acquire(self, r) {\n 1042 |                         return e;\n 1043 |                     }\n 1044 |                 }\n 1045 |             }","lines":10},{"ref":"crossbeam-skiplist/src/base.rs:1110-1126","code":" 1110 |                 if let Some(r) = search.found {\n 1111 |                     let replace = replace(&r.value);\n 1112 |                     if !replace {\n 1113 |                         // If a node with the key was found and we're not going to replace it,\n 1114 |                         // let's try returning it as an entry.\n 1115 |                         if let Some(e) = RefEntry::try_acquire(self, r) {\n 1116 |                             // Destroy the new node.\n 1117 |                             Node::finalize(node.as_raw() as *mut Node<K, V>);\n 1118 |                             self.hot_data.len.fetch_sub(1, Ordering::Relaxed);\n 1119 | \n 1120 |                             return e;\n 1121 |                         }\n 1122 | \n 1123 |                         // If we couldn't increment the reference count, that means someone has\n 1124 |                         // just now removed the node.\n 1125 |                     }\n 1126 |                 }","lines":17}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`SyncWaker::register`, `unregister`, `watch`, and `unwatch` each recompute `is_empty` by reading\nboth `inner.selectors.is_empty()` and `inner.observers.is_empty()` and storing the result with a\nfull `SeqCst` store while already holding the mutex. `register`/`watch` always push exactly one\nentry, so after them the waker is provably non-empty - the recomputation and the two `is_empty()`\nscans are unnecessary; the store could be an unconditional `store(false, ...)`. Minor, but this is\non the hot path of every blocking send/recv that has to enqueue.","fix":"In `register`/`watch`, replace the recomputed store with `self.is_empty.store(false, Ordering::SeqCst)`\nsince a push guarantees non-emptiness.","locations":[{"ref":"crossbeam-channel/src/waker.rs:202-209","code":"  202 |     pub(crate) fn register(&self, oper: Operation, cx: &Context) {\n  203 |         let mut inner = self.inner.lock();\n  204 |         inner.register(oper, cx);\n  205 |         self.is_empty.store(\n  206 |             inner.selectors.is_empty() && inner.observers.is_empty(),\n  207 |             Ordering::SeqCst,\n  208 |         );\n  209 |     }","lines":8},{"ref":"crossbeam-channel/src/waker.rs:241-248","code":"  241 |     pub(crate) fn watch(&self, oper: Operation, cx: &Context) {\n  242 |         let mut inner = self.inner.lock();\n  243 |         inner.watch(oper, cx);\n  244 |         self.is_empty.store(\n  245 |             inner.selectors.is_empty() && inner.observers.is_empty(),\n  246 |             Ordering::SeqCst,\n  247 |         );\n  248 |     }","lines":8}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Global::collect` is `#[cold]` and calls `try_advance` (also `#[cold]`), then\npops/expires bags. When `cfg!(crossbeam_sanitize)` is set, `steps` is\n`usize::MAX`, meaning a single `collect` call will spin in the `for _ in\n0..steps` loop popping expired bags until the queue is exhausted. That is\nintentional for sanitizing, but `try_pop_if`/`try_pop` themselves spin\nindefinitely (`loop { if Ok ... }`) on contention, so under heavy concurrent\ncontention a thread can be starved/livelock-prone here. This is inherent to the\nlock-free design but worth noting: there is no bounded back-off or yield in the\nretry loops of `try_pop`/`try_pop_if`.","fix":"Consider adding a bounded spin/back-off (e.g. `crossbeam_utils::Backoff`) inside\nthe `try_pop`/`try_pop_if` retry loops to reduce contention and improve fairness\nunder load. Functionally correct as-is, so this is an optimization, not a bug.","locations":[{"ref":"crossbeam-epoch/src/sync/queue.rs:180-202","code":"  180 |     pub(crate) fn try_pop(&self, guard: &Guard) -> Option<T> {\n  181 |         loop {\n  182 |             if let Ok(head) = self.pop_internal(guard) {\n  183 |                 return head;\n  184 |             }\n  185 |         }\n  186 |     }\n  187 | \n  188 |     /// Attempts to dequeue from the front, if the item satisfies the given condition.\n  189 |     ///\n  190 |     /// Returns `None` if the queue is observed to be empty, or the head does not satisfy the given\n  191 |     /// condition.\n  192 |     pub(crate) fn try_pop_if<F>(&self, condition: F, guard: &Guard) -> Option<T>\n  193 |     where\n  194 |         T: Sync,\n  195 |         F: Fn(&T) -> bool,\n  196 |     {\n  197 |         loop {\n  198 |             if let Ok(head) = self.pop_if_internal(&condition, guard) {\n  199 |                 return head;\n  200 |             }\n  201 |         }\n  202 |     }","lines":23}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`random_height` reads and writes `hot_data.seed` with a non-atomic relaxed load + relaxed store (lines 713-717), not a CAS. Under concurrent inserts, multiple threads can read the same seed value and produce identical height sequences, and stores can be lost. This does not affect correctness (heights are always clamped to [1, MAX_HEIGHT]) but degrades the quality of the height distribution under contention, which can make the skip list less balanced and slow down lookups. This mirrors upstream crossbeam, so it is a known trade-off, but worth documenting.","fix":"Either document that the RNG is intentionally racy for speed, or use a per-thread seed / compare_exchange loop so concurrent threads do not collide on the same seed stream.","locations":[{"ref":"crossbeam-skiplist/src/base.rs:713-717","code":"  713 |         let mut num = self.hot_data.seed.load(Ordering::Relaxed);\n  714 |         num ^= num << 13;\n  715 |         num ^= num >> 17;\n  716 |         num ^= num << 5;\n  717 |         self.hot_data.seed.store(num, Ordering::Relaxed);","lines":5}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`reserve` doubles capacity in a loop (`new_cap *= 2; while new_cap - len < reserve_cap`). For a single\nlarge `reserve_cap` (e.g. a batch steal reserving many tasks at once) this loops O(log) times doing\nnothing but multiplications before calling `resize`. The required capacity can be computed directly via\n`(len + reserve_cap).next_power_of_two()` (clamped to at least `cap * 2` / `MIN_CAP`). This is a tiny\nmicro-inefficiency on a cold path, but the direct computation is also clearer and avoids the implicit\nassumption that `cap` is already a power of two large enough to converge.","fix":"Compute the target capacity directly with `next_power_of_two()` of `len + reserve_cap` (lower-bounded by `cap * 2`) instead of repeated doubling in a loop.","locations":[{"ref":"crossbeam-deque/src/deque.rs:337-348","code":"  337 |             if cap - len < reserve_cap {\n  338 |                 // Keep doubling the capacity as much as is needed.\n  339 |                 let mut new_cap = cap * 2;\n  340 |                 while new_cap - len < reserve_cap {\n  341 |                     new_cap *= 2;\n  342 |                 }\n  343 | \n  344 |                 // Resize the buffer.\n  345 |                 unsafe {\n  346 |                     self.resize(new_cap);\n  347 |                 }\n  348 |             }","lines":12}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`Injector::len` re-reads `self.tail.index` a third time inside the consistency check\n(`load(SeqCst) == tail`) on every iteration. The double-load consistency pattern is standard, but the\nloop has no backoff and can in principle spin under heavy concurrent pushing. Combined with three SeqCst\nloads per attempt this is a relatively expensive `len()`; callers that poll it in a hot loop pay for it.\nDocumenting that `len()` is approximate/best-effort or adding a bounded retry would help. (Behaviorally\ncorrect - flagged only as a minor performance/clarity note.)","fix":"Consider a `Backoff` in the retry loop, or document that `len()` may spin briefly under contention. No correctness change required.","locations":[{"ref":"crossbeam-deque/src/deque.rs:1988-2021","code":" 1988 |     pub fn len(&self) -> usize {\n 1989 |         loop {\n 1990 |             // Load the tail index, then load the head index.\n 1991 |             let mut tail = self.tail.index.load(Ordering::SeqCst);\n 1992 |             let mut head = self.head.index.load(Ordering::SeqCst);\n 1993 | \n 1994 |             // If the tail index didn't change, we've got consistent indices to work with.\n 1995 |             if self.tail.index.load(Ordering::SeqCst) == tail {\n 1996 |                 // Erase the lower bits.\n 1997 |                 tail &= !((1 << SHIFT) - 1);\n 1998 |                 head &= !((1 << SHIFT) - 1);\n 1999 | \n 2000 |                 // Fix up indices if they fall onto block ends.\n 2001 |                 if (tail >> SHIFT) & (LAP - 1) == LAP - 1 {\n 2002 |                     tail = tail.wrapping_add(1 << SHIFT);\n 2003 |                 }\n 2004 |                 if (head >> SHIFT) & (LAP - 1) == LAP - 1 {\n 2005 |                     head = head.wrapping_add(1 << SHIFT);\n 2006 |                 }\n 2007 | \n 2008 |                 // Rotate indices so that head falls into the first block.\n 2009 |                 let lap = (head >> SHIFT) / LAP;\n 2010 |                 tail = tail.wrapping_sub((lap * LAP) << SHIFT);\n 2011 |                 head = head.wrapping_sub((lap * LAP) << SHIFT);\n 2012 | \n 2013 |                 // Remove the lower bits.\n 2014 |                 tail >>= SHIFT;\n 2015 |                 head >>= SHIFT;\n 2016 | \n 2017 |                 // Return the difference minus the number of blocks between tail and head.\n 2018 |                 return tail - head - tail / LAP;\n 2019 |             }\n 2020 |         }\n 2021 |     }","lines":34}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The `local_size` test is completely empty: its only body is a commented-out\n`assert!`. The accompanying comment claims \"Make sure `Local` is less than or\nequal to 2048 bytes\", but the test asserts nothing and therefore guarantees\nnothing. It silently passes regardless of `Local`'s size, giving a false sense\nof a maintained invariant (the size regression issue #551 it references is no\nlonger guarded against).","fix":"Either re-enable a real size assertion (uncomment and fix the `assert!`, possibly\nwith a larger bound matching reality), or delete the empty test and its\nmisleading comment entirely so it does not pretend to enforce an invariant.","locations":[{"ref":"crossbeam-epoch/src/internal.rs:320-330","code":"  320 | // Make sure `Local` is less than or equal to 2048 bytes.\n  321 | // https://github.com/crossbeam-rs/crossbeam/issues/551\n  322 | #[cfg(not(any(crossbeam_sanitize, miri)))] // `crossbeam_sanitize` and `miri` reduce the size of `Local`\n  323 | #[test]\n  324 | fn local_size() {\n  325 |     // TODO: https://github.com/crossbeam-rs/crossbeam/issues/869\n  326 |     // assert!(\n  327 |     //     core::mem::size_of::<Local>() <= 2048,\n  328 |     //     \"An allocation of `Local` should be <= 2048 bytes.\"\n  329 |     // );\n  330 | }","lines":11}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In `list::Channel::discard_all_messages`, the `offset` computed at line 595 inside the\ninitial spin loop is only used to test `offset != BLOCK_CAP`; the binding name shadows the\nlater `offset` used in the drop loop. The first loop's `offset` is recomputed every\niteration and never reused, which is fine, but `disconnect_receivers`/`discard_all_messages`\nand the `Drop` impl duplicate nearly identical block-walk/drop logic (lines 625-650 vs\n683-706). The two copies have already drifted (one calls `wait_write`/`wait_next` and uses\natomic loads, the other uses `get_mut`), which is a maintenance hazard: a fix to one is\neasy to forget in the other.","fix":"Factor the shared \"walk blocks from head to tail, drop each message, free each block\" logic\ninto one helper parameterized over how it loads next pointers/states, so the concurrent\n(`discard_all_messages`) and exclusive (`Drop`) paths cannot diverge.","locations":[{"ref":"crossbeam-channel/src/flavors/list.rs:625-653","code":"  625 |         unsafe {\n  626 |             // Drop all messages between head and tail and deallocate the heap-allocated blocks.\n  627 |             while head >> SHIFT != tail >> SHIFT {\n  628 |                 let offset = (head >> SHIFT) % LAP;\n  629 | \n  630 |                 if offset < BLOCK_CAP {\n  631 |                     // Drop the message in the slot.\n  632 |                     let slot = (*block).slots.get_unchecked(offset);\n  633 |                     slot.wait_write();\n  634 |                     (*slot.msg.get()).assume_init_drop();\n  635 |                 } else {\n  636 |                     (*block).wait_next();\n  637 |                     // Deallocate the block and move to the next one.\n  638 |                     let next = (*block).next.load(Ordering::Acquire);\n  639 |                     drop(Box::from_raw(block));\n  640 |                     block = next;\n  641 |                 }\n  642 | tive on the project. These are not\nbehind any cfg and serve no purpose other than as a perpetual \"not implemented\" note.","fix":"Delete the commented-out blocks; if the optimizations are genuinely desired, track them in an issue\nrather than as dead source.","locations":[{"ref":"crossbeam-channel/src/select_macro.rs:594-690","code":"  594 |     // // Optimize the non-blocking case with two receive operations.\n  595 |     // (@init\n  596 |     //     (recv($r1:expr) -> $res1:pat => $recv_body1:tt,)\n  597 |     //     (recv($r2:expr) -> $res2:pat => $recv_body2:tt,)\n  598 |     //     (default() => $default_body:tt,)\n  599 |     // ) => {{\n  600 |     //     match $r1 {\n  601 |     //         ref _r1 => {\n  602 |     //             let _r1: &$crate::Receiver<_> = _r1;\n  603 |     //\n  604 |     //             match $r2 {\n  605 |     //                 ref _r2 => {\n  606 |     //                     let _r2: &$crate::Receiver<_> = _r2;\n  607 |     //\n  608 |     //                     // TODO(stjepang): Implement this optimization.\n  609 |     //                 }\n  610 |     //             }\n  611 |     //         }\n  612 |     //     }\n  613 |     // }};\n  614 |     // // Optimize the blocking case with two receive operations.\n  615 |     // (@init\n  616 |     //     (recv($r1:expr) -> $res1:pat => $body1:tt,)\n  617 |     //     (recv($r2:expr) -> $res2:pat => $body2:tt,)\n  618 |     //     ()\n  619 |     // ) => {{\n  620 |     //     match $r1 {\n  621 |     //         ref _r1 => {\n  622 |     //             let _r1: &$crate::Receiver<_> = _r1;\n  623 |     //\n  624 |     //             match $r2 {\n  625 |     //                 ref _r2 => {\n  626 |     //                     let _r2: &$crate::Receiver<_> = _r2;\n  627 |     //\n  628 |     //                     // TODO(stjepang): Implement this optimization.\n  629 |     //                 }\n  630 |     //             }\n  631 |     //         }\n  632 |     //     }\n  633 |     // }};\n  634 |     // // Optimize the case with two receive operations and a timeout.\n  635 |     // (@init\n  636 |     //     (recv($r1:expr) -> $res1:pat => $recv_body1:tt,)\n  637 |     //     (recv($r2:expr) -> $res2:pat => $recv_body2:tt,)\n  638 |     //     (default($timeout:expr) => $default_body:tt,)\n  639 |     // ) => {{\n  640 |     //     match $r1 {\n  641 |     //         ref _r1 => {\n  642 |     //             let _r1: &$crate::Receiver<_> = _r1;\n  643 |     //\n  644 |     //             match $r2 {\n  645 |     //                 ref _r2 => {\n  646 |     //                     let _r2: &$crate::Receiver<_> = _r2;\n  647 |     //\n  648 |     //                     // TODO(stjepang): Implement this optimization.\n  649 |     //                 }\n  650 |     //             }\n  651 |     //         }\n  652 |     //     }\n  653 |     // }};\n  654 | \n  655 |     // // Optimize `select!` into `try_send()`.\n  656 |     // (@init\n  657 |     //     (send($s:expr, $m:expr) -> $res:pat => $send_body:tt,)\n  658 |     //     (default() => $default_body:tt,)\n  659 |     // ) => {{\n  660 |     //     match $s {\n  661 |     //         ref _s => {\n  662 |     //             let _s: &$crate::Sender<_> = _s;\n  663 |     //             // TODO(stjepang): Implement this optimization.\n  664 |     //         }\n  665 |     //     }\n  666 |     // }};\n  667 |     // // Optimize `select!` into `send()`.\n  668 |     // (@init\n  669 |     //     (send($s:expr, $m:expr) -> $res:pat => $body:tt,)\n  670 |     //     ()\n  671 |     // ) => {{\n  672 |     //     match $s {\n  673 |     //         ref _s => {\n  674 |     //             let _s: &$crate::Sender<_> = _s;\n  675 |     //             // TODO(stjepang): Implement this optimization.\n  676 |     //         }\n  677 |     //     }\n  678 |     // }};\n  679 |     // // Optimize `select!` into `send_timeout()`.\n  680 |     // (@init\n  681 |     //     (send($s:expr, $m:expr) -> $res:pat => p the unused methods (or add a comment that they exist\nsolely to satisfy the `atomic!` macro's method-name requirements). Verify with coverage before\nremoving.","locations":[{"ref":"crossbeam-utils/src/atomic/atomic_cell.rs:1002-1022","code":" 1002 | impl AtomicUnit {\n 1003 |     #[inline]\n 1004 |     fn load(&self, _order: Ordering) {}\n 1005 | \n 1006 |     #[inline]\n 1007 |     fn store(&self, _val: (), _order: Ordering) {}\n 1008 | \n 1009 |     #[inline]\n 1010 |     fn swap(&self, _val: (), _order: Ordering) {}\n 1011 | \n 1012 |     #[inline]\n 1013 |     fn compare_exchange_weak(\n 1014 |         &self,\n 1015 |         _current: (),\n 1016 |         _new: (),\n 1017 |         _success: Ordering,\n 1018 |         _failure: Ordering,\n 1019 |     ) -> Result<(), ()> {\n 1020 |         Ok(())\n 1021 |     }\n 1022 | }","lines":21}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment says the buffer is shrunk \"if `len - 1` is less than one fourth of the capacity\", but the\ncode actually tests `len <= buffer.cap / 4` (i.e. it compares `len`, not `len - 1`, and uses `<=`).\nThe remaining length after this FIFO pop is `len - 1`, so the prose and the code use different\nquantities/relations. While the resulting behavior is fine, the comment is misleading to a future\nreader trying to reason about the shrink threshold. The LIFO branch (line 533-534) uses `len < cap/4`\nwith a comment that says \"less than\", which is the consistent phrasing; the FIFO branch is the odd one.","fix":"Reword to match the code, e.g. \"Shrink the buffer if the remaining length (`len - 1`) is at most one fourth of the capacity\", or change the condition to operate on the post-pop length explicitly.","locations":[{"ref":"crossbeam-deque/src/deque.rs:480-483","code":"  480 |                     // Shrink the buffer if `len - 1` is less than one fourth of the capacity.\n  481 |                     if buffer.cap > MIN_CAP && len <= buffer.cap as isize / 4 {\n  482 |                         self.resize(buffer.cap / 2);\n  483 |                     }","lines":4}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The docs for `Guard::defer` / `defer_unchecked` / `defer_destroy` repeatedly\nstate that when the local cache becomes full \"some functions are moved into the\nglobal cache\" and \"some functions from both local and global caches may get\nexecuted ... to incrementally clean up the caches as they fill up\". The actual\nimplementation (`Local::defer` -> `Global::push_bag`) moves the *entire* full\nbag (all MAX_OBJECTS deferred functions) into the global queue at once, and\n`defer` itself never triggers collection of either cache. Collection only\nhappens periodically in `pin()` (every PINNINGS_BETWEEN_COLLECT) or on explicit\n`flush`/`collect`. The \"some functions\" / \"as they fill up\" wording is\nmisleading about the granularity and timing.","fix":"Reword the docs to reflect reality: when the thread-local bag fills, the whole\nbag is sealed and pushed to the global queue; deferred functions are executed\nlater during periodic collection (in `pin`) or via `flush`/`collect`, not\nincrementally on every `defer`.","locations":[{"ref":"crossbeam-epoch/src/guard.rs:101-111","code":"  101 |     /// threads get unpinned.\n  102 |     ///\n  103 |     /// This method first stores `f` into the thread-local (or handle-local) cache. If this cache\n  104 |     /// becomes full, some functions are moved into the global cache. At the same time, some\n  105 |     /// functions from both local and global caches may get executed in order to incrementally\n  106 |     /// clean up the caches as they fill up.\n  107 |     ///\n  108 |     /// There is no guarantee when exactly `f` will be executed. The only guarantee is that it\n  109 |     /// won't be executed until all currently pinned threads get unpinned. In theory,  or they were abandoned. It\nmisleads future maintainers into thinking an MSRV bump is still pending for these PRs.","fix":"Remove the obsolete TODO, or replace it with a concrete, still-actionable note if the\nreferenced PRs genuinely still need to be applied.","locations":[{"ref":"crossbeam-channel/src/flavors/list.rs:24-28","code":"   24 | // TODO(stjepang): Once we bump the minimum required Rust version to 1.28 or newer, re-apply the\n   25 | // following changes by @kleimkuhler:\n   26 | //\n   27 | // 1. https://github.com/crossbeam-rs/crossbeam-channel/pull/100\n   28 | // 2. https://github.com/crossbeam-rs/crossbeam-channel/pull/101","lines":5}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The `mod.rs` doc comment lists the flavors as ordered \"1..6\" but the order given (at, array,\nlist, never, tick, zero) matches neither the declaration order in the file (array, at, list,\nnever, tick, zero) nor any obvious logical grouping, and the numbered list adds no value over\nthe alphabetical `pub(crate) mod` declarations right below it. Minor, but the numbering can\ndrift out of sync with the actual module set.","fix":"Drop the redundant numbered list or align its order with the module declarations.","locations":[{"ref":"crossbeam-channel/src/flavors/mod.rs:1-17","code":"    1 | //! Channel flavors.\n    2 | //!\n    3 | //! There are six flavors:\n    4 | //!\n    5 | //! 1. `at` - Channel that delivers a message after a certain amount of time.\n    6 | //! 2. `array` - Bounded channel based on a preallocated array.\n    7 | //! 3. `list` - Unbounded channel implemented as a linked list.\n    8 | //! 4. `never` - Channel that never delivers messages.\n    9 | //! 5. `tick` - Channel that delivers messages periodically.\n   10 | //! 6. `zero` - Zero-capacity channel.\n   11 | \n   12 | pub(crate) mod array;\n   13 | pub(crate) mod at;\n   14 | pub(crate) mod list;\n   15 | pub(crate) mod never;\n   16 | pub(crate) mod tick;\n   17 | pub(crate) mod zero;","lines":17}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `SyncWaker::notify` says \"Attempts to find one thread (not the current one),\nselect its operation, and wake it up.\" but the body calls both `inner.try_select()` (which wakes at\nmost one selector) AND `inner.notify()` (which drains and wakes ALL observers). The comment omits\nthe observer-notification half of the behavior, which is the more surprising part.","fix":"Update the comment to mention that it also notifies all watching (observer) operations, e.g.\n\"Selects and wakes at most one blocked selector, then notifies all watching operations.\"","locations":[{"ref":"crossbeam-channel/src/waker.rs:223-237","code":"  223 |     /// Attempts to find one thread (not the current one), select its operation, and wake it up.\n  224 |     #[inline]\n  225 |     pub(crate) fn notify(&self) {\n  226 |         if !self.is_empty.load(Ordering::SeqCst) {\n  227 |             let mut inner = self.inner.lock();\n  228 |             if !self.is_empty.load(Ordering::SeqCst) {\n  229 |                 inner.try_select();\n  230 |                 inner.notify();\n  231 |                 self.is_empty.store(\n  232 |                     inner.selectors.is_empty() && inner.observers.is_empty(),\n  233 |                     Ordering::SeqCst,\n  234 |                 );\n  235 |             }\n  236 |         }\n  237 |     }","lines":15}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `ensure_aligned` reads \"Panics if the pointer is not properly\nunaligned.\" This is the inverse of what the function does: it panics if the\npointer IS not properly *aligned* (i.e. when alignment bits are nonzero). The\nword \"unaligned\" should be \"aligned\".","fix":"Change the comment to \" equired regardless of the rustc fix (e.g. it is\nneeded so `Drop` is controlled manually and so the optimistic seqlock read can load possibly-stale\nbytes as `MaybeUninit<T>`), rather than presenting the fix as making it potentially redundant.","locations":[{"ref":"crossbeam-utils/src/atomic/atomic_cell.rs:40-46","code":"   40 |     /// Using MaybeUninit to prevent code outside the cell from observing partially initialized state:\n   41 |     /// <https://github.com/crossbeam-rs/crossbeam/issues/833>\n   42 |     /// (This rustc bug has been fixed in Rust 1.64.)\n   43 |     ///\n   44 |     /// Note:\n   45 |     /// - we'll never store uninitialized `T` due to our API only using initialized `T`.\n   46 |     /// - this `MaybeUninit` does *not* fix <https://github.com/crossbeam-rs/crossbeam/issues/315>.","lines":7}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Several doc-comment phrasings in `atomic_cell.rs` read \"an atomic instructions is used\" (singular\narticle + plural noun) in the descriptions of `atomic_load`, `atomic_store`, `atomic_swap`, and\n`atomic_compare_exchange_weak`. Purely cosmetic, but it is a repeated grammatical error in public\nrustdoc-adjacent comments.","fix":"Change \"an atomic instructions is used\" to \"an atomic instruction is used\".","locations":[{"ref":"crossbeam-utils/src/atomic/atomic_cell.rs:1031","code":" 1031 | /// This operation uses the `Acquire` ordering. If possible, an atomic instructions is used, and a","lines":1},{"ref":"crossbeam-utils/src/atomic/atomic_cell.rs:1073","code":" 1073 | /// This operation uses the `Release` ordering. If possible, an atomic instructions is used, and a","lines":1},{"ref":"crossbeam-utils/src/atomic/atomic_cell.rs:1092","code":" 1092 | /// This operation uses the `AcqRel` ordering. If possible, an atomic instructions is used, and a","lines":1},{"ref":"crossbeam-utils/src/atomic/atomic_cell.rs:1115","code":" 1115 | // old = *value;\n  921 |                 *value ^= val;\n  922 |                 old\n  923 |             }\n  924 |         }\n  925 |     }\n  926 | }","lines":550}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`Operation::hook` asserts `val > 2` so a pointer address can never collide with the `Waiting`/\n`Aborted`/`Disconnected` sentinels (0/1/2). The reference passed in `run_select`/`run_ready` is\n`Operation::hook::<&dyn SelectHandle>(handle)` where `handle` is `&mut (&dyn SelectHandle, usize, usize)`\n- i.e. the address of the first field of a tuple element living in the `handles` slice. This relies\non every such element having an address `> 2`, which is always true for a real allocation, but the\nassertion is a runtime `assert!` on a value that is effectively a constant property of the\nallocation; on a degenerate/embedded target where a stack object could theoretically sit at address\n1 or 2 this would panic rather than misbehave. Not a practical bug on supported platforms, but the\nidentity scheme (pointer == operation id, with 3 magic low values) is an undocumented fragile\ncoupling between `select.rs` and `Selected`'s `From<usize>`/`Into<usize>`.","fix":"Add a comment cross-referencing `Selected`'s usize encoding (0/1/2 reserved) at `Operation::hook`,\nso a future change to the `Selected` discriminants cannot silently break the `> 2` invariant.","locations":[{"ref":"crossbeam-channel/src/select.rs:44-51","code":"   44 |     #[inline]\n   45 |     pub fn hook<T>(r: &mut T) -> Self {\n   46 |         let val = r as *mut T as usize;\n   47 |         // Make sure that the pointer address doesn't equal the numerical representation of\n   48 |         // `Selected::{Waiting, Aborted, Disconnected}`.\n   49 |         assert!(val > 2);\n   50 |         Self(val)\n   51 |     }","lines":8},{"ref":"crossbeam-channel/src/select.rs:70-92","code":"   70 | impl From<usize> for Selected {\n   71 |     #[inline]\n   72     /// Resizes the internal buffer to the new capacity of `new_cap`.\n  290 |     #[cold]\n  291 |     unsafe fn resize(&self, new_cap: usize) {\n  292 |         // Load the back index, front index, and buffer.\n  293 |         let b = self.inner.back.load(Ordering::Relaxed);\n  294 |         let f = self.inner.front.load(Ordering::Relaxed);\n  295 |         let buffer = self.buffer.get();\n  296 | \n  297 |         // Allocate a new buffer and copy data from the old buffer to the new one.\n  298 |         let new = Buffer::alloc(new_cap);\n  299 |         let mut i = f;\n  300 |         while i != b {\n  301 |             unsafe { ptr::copy_nonoverlapping(buffer.at(i), new.at(i), 1) }\n  302 |             i = i.wrapping_add(1);\n  303 |         }\n  304 | \n  305 |         let guard = &epoch::pin();\n  306 | \n  307 |         // Replace the old buffer with the new one.\n  308 |         self.buffer.replace(new);\n  309 |         let old =\n  310 |             self.inner\n  311 |                 .buffer\n  312 |                 .swap(Owned::new(new).into_shared(guard), Ordering::Release, guard);\n  313 | \n  314 |         // Destroy the old buffer later.\n  315 |         unsafe { guard.defer_unchecked(move || old.into_owned().into_box().dealloc()) }\n  316 | \n  317 |         // If the buffer is very large, then flush the thread-local garbage in order to deallocate\n  318 |         // it as soon as possible.\n  319 |         if mem::size_of::<T>() * new_cap >= FLUSH_THRESHOLD_BYTES {\n  320 |             guard.flush();\n  321 |         }\n  322 |     }","lines":34},{"ref":"crossbeam-deque/src/deque.rs:399-433","code":"  399 |     pub fn push(&self, task: T) {\n  400 |         // Load the back index, front index, and buffer.\n  401 |         let b = self.inner.back.load(Ordering::Relaxed);\n  402 |         let f = self.inner.front.load(Ordering::Acquire);\n  403 |         let mut buffer = self.buffer.get();\n  404 | \n  405 |         // Calculate the length of the queue.\n  406 |         let len = b.wrapping_sub(f);\n  407 | \n  408 |         // Is the queue full?\n  409 |         if len >= buffer.cap as isize {\n  410 |             // Yes. Grow the underlying buffer.\n  411 |             unsafe {\n  412 |                 self.resize(2 * buffer.cap);\n  413 |             }\n  414 |             buffer = self.buffer.get();\n  415 |         }\n  416 | \n  417 |         // Write `task` into the slot.\n  418 |         unsafe {\n  419 |             buffer.write(b, MaybeUninit::new(task));\n  420 |         }\n  421 | \n  422 |         // ThreadSanitizer does not understand fences, so we omit fence and do store with Release ordering.\n  423 |         #[cfg(not(crossbeam_sanitize_thread))]\n  424 |         atomic::fence(Ordering::Release);\n  425 |         let store_order = if cfg!(crossbeam_sanitize_thread) {\n  426 |             Ordering::Release\n  427 |         } else {\n  428 |             Ordering::Relaxed\n  429 |         };\n  430 | \n  431 |         // Increment the back index.\n  432 |         self.inner.back.store(b.wrapping_add(1), store_order);\n  433 |     }","lines":35}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","easy":false,"description":"In `Local::pin`, the pin counter is incremented and the modulo check\n`count.0 % PINNINGS_BETWEEN_COLLECT == 0` is evaluated using `count` (the value\n*before* the increment, captured at line 451). Since the very first pin sees\n`count.0 == 0`, `0 % 128 == 0` is true and collection runs on the first pin.\nThis is harmless but means the \"every 128 pinnings\" trigger actually fires on\npins number 1, 129, 257, ... (using the pre-increment value), not on a clean\nmultiple of 128 of completed pins. Not a bug, but the off-by-one relative to the\ncomment \"After every PINNINGS_BETWEEN_COLLECT\" can confuse maintainers.","fix":"Either compute the modulo on the post-increment count to match the \"after every\nN pinnings\" wording, or update the comment to clarify that collection is\ntriggered on the first pin and then every N-th pin thereafter.","locations":[{"ref":"crossbeam-epoch/src/internal.rs:450-458","code":"  450 |             // Increment the pin counter.\n  451 |             let count = self.pin_count.get();\n  452 |             self.pin_count.set(count + Wrapping(1));\n  453 | \n  454 |             // After every `PINNINGS_BETWEEN_COLLECT` try advancing the epoch and collecting\n  455 |             // some garbage.\n  456 |             if count.0 % Self::PINNINGS_BETWEEN_COLLECT == 0 {\n  457 |                 self.global().collect(&guard);\n  458 |             }","lines":9}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`pop_if_internal` evaluates the user-supplied `condition` closure on the head\nnode's data while only the epoch guard protects the node. The match arm reads\n`&*n.data.as_ptr()` and runs `condition` BEFORE the `compare_exchange` that\nclaims the node. If the CAS then fails (lost race), the node may already have\nbeen popped+`defer_destroy`'d by the winning thread; however because this thread\nis pinned, the node memory is not yet reclaimed, so the earlier `condition` read\nremains valid. This is sound under epoch protection but is subtle: `condition`\nruns on a node that another thread may concurrently be popping. Any future change\nthat lets `condition` observe mutable/uninitialized state, or that drops the\nguard, would become a use-after-free. Worth a comment documenting the invariant.","fix":"Add a comment explaining that `condition` may run on a node concurrently being\npopped by another thread, and that this is safe only because the current thread\nis pinned (epoch protection keeps the node alive). This guards against future\nrefactors that could violate the assumption.","locations":[{"ref":"crossbeam-epoch/src/sync/queue.rs:148-175","code":"  148 |     fn pop_if_internal<F>(&self, condition: F, guard: &Guard) -> Result<Option<T>, ()>\n  149 | the same way). The behavior is internally consistent for pure-forward or pure-backward use, but the double-ended mixed-direction semantics are subtle and undocumented.","fix":"Document the double-ended exhaustion semantics of `Iter`, or align them with `RefIter` so a single boundary element is yielded exactly once when alternating `next`/`next_back`.","locations":[{"ref":"crossbeam-skiplist/src/base.rs:1822-1860","code":" 1822 |         if let (Some(h), Some(t)) = (self.head, self.tail) {\n 1823 |             if self.parent.comparator.compare(&h.key, &t.key).is_ge() {\n 1824 |                 self.head = None;\n 1825 |                 self.tail = None;\n 1826 |             }\n 1827 |         }\n 1828 |         self.head.map(|n| Entry {\n 1829 |             parent: self.parent,\n 1830 |             node: n,\n 1831 |             guard: self.guard,\n 1832 |         })\n 1833 |     }\n 1834 | }\n 1835 | \n 1836 | impl<'a: 'g, 'g, K: 'a, V: 'a, C> DoubleEndedIterator for Iter<'a, 'g, K, V, C>\n 1837 | where\n 1838 |     C: Comparator<K>,\n 1839 | {\n 1840 |     fn next_back(&mut self) -> Option<Self::Item> {\n 1841 |         self.tail = match self.tail {\n 1842 |             Some(n) => self\n 1843 |                 .parent\n 1844 |                 .search_bound(Bound::Excluded(&n.key), true, self.guard),\n 1845 |             None => self\n 1846 |                 .parent\n 1847 |                 .search_bound::<K>(Bound::Unbounded, true, self.guard),\n 1848 |         };\n 1849 |         if let (Some(h), Some(t)) = (self.head, self.tail) {\n 1850 |             if self.parent.comparator.compare(&h.key, &t.key).is_ge() {\n 1851 |                 self.head = None;\n 1852 |                 self.tail = None;\n 1853 |             }\n 1854 |         }\n 1855 |         self.tail.map(|n| Entry {\n 1856 |             parent: self.parent,\n 1857 |             node: n,\n 1858 |             guard: self.guard,\n 1859 |         })\n 1860 |     }","lines":39}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"low","easy":false,"description":"The seq-lock fallback `atomic_load` performs `ptr::read_volatile` on a value that may be\nconcurrently written by a writer holding the lock, and the inline comment admits \"data races are\n*always* UB, even if we use volatile reads and discard the data\". This is a known, intentional\ntrade-off (no stable byte-wise atomic memcpy), but it means the fallback path of `AtomicCell<T>`\nfor large/non-lock-free `T` is technically UB under the Rust/C++ memory model and will be flagged\nby ThreadSanitizer/Miri's strict mode. Worth tracking as a soundness caveat rather than treating\nthe fallback as fully sound.","fix":"No trivial fix on stable. Keep the caveat documented prominently in the public `AtomicCell` docs\n(currently only an internal comment), and migrate to a real atomic byte-copy primitive\n(e.g. via `atomic_maybe_uninit` for the fallback too) when available so the optimistic-read path\nis no longer a data race.","locations":[{"ref":"crossbeam-utils/src/atomic/atomic_cell.rs:1046-1059","code":" 1046 |             // Try doing an optimistic read first.\n 1047 |             if let Some(stamp) = lock.optimistic_read() {\n 1048 |                 // We need a volatile read here because other threads might concurrently modify the\n 1049 |                 // value. In theory, data races are *always* UB, even if we use volatile reads and\n 1050 |                 // discard the data when a data race is detected. The proper solution would be to\n 1051 |                 // do atomic reads and atomic writes, but we can't atomically read and write all\n 1052 |                 // kinds of data since `AtomicU8` is not available on stable Rust yet.\n 1053 |                 // Load as `MaybeUninit` because we may load a value that is not valid as `T`.\n 1054 |                 let val = unsafe { ptr::read_volatile(src.cast::<MaybeUninit<T>>()) };\n 1055 | \n 1056 |                 if lock.validate_read(stamp) {\n
