_ERROR,\n  884 | \t\t\t\t           \"vBarEntry->count %\" PRIu32 \" != vBarHeight %\" PRIu32 \"\",\n  885 | \t\t\t\t           vBarEntry->count, vBarHeight);\n  886 | \t\t\t\tvBarEntry->count = vBarHeight;\n  887 | \n  888 | \t\t\t\tif (!resize_vbar_entry(clear, vBarEntry))\n  889 | \t\t\t\t\treturn FALSE;\n  890 | \t\t\t}","lines":124}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`update_read_bitmap_update` at line 346 calls `calloc(bitmapUpdate->number, sizeof(BITMAP_DATA))`\nwhere `number` is a UINT16 read from the network. When `number == 0`, `calloc(0, N)` returns\neither NULL or a unique non-NULL pointer depending on the platform. The NULL check at line 348\ntriggers a `goto fail` on platforms that return NULL for zero-size calloc (e.g., some embedded\nlibc implementations), rejecting a valid server PDU that contains zero bitmap rectangles.","fix":"Guard the allocation with an explicit zero check:\n```c\nif (bitmapUpdate->number > 0) {\n    bitmapUpdate->rectangles = calloc(bitmapUpdate->number, sizeof(BITMAP_DATA));\n    if (!bitmapUpdate->rectangles)\n        goto fail;\n}\n```","locations":[{"ref":"libfreerdp/core/update.c:343-349","code":"  343 | \tStream_Read_UINT16(s, bitmapUpdate->number); /* numberRectangles (2 bytes) */\n  344 | \tWLog_Print(up->log, WLOG_TRACE, \"BitmapUpdate: %\" PRIu32 \"\", bitmapUpdate->number);\n  345 | \n  346 | \tbitmapUpdate->rectangles = (BITMAP_DATA*)calloc(bitmapUpdate->number, sizeof(BITMAP_DATA));\n  347 | \n  348 | \tif (!bitmapUpdate->rectangles)\n  349 | \t\tgoto fail;","lines":7}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The function BIO_s_rdp_tls() uses a non-thread-safe double-checked initialization idiom for its\nstatic BIO_METHOD pointer:\n  static BIO_METHOD* bio_methods = nullptr;\n  if (bio_methods == nullptr) {\n      bio_methods = BIO_meth_new(...);\n      BIO_meth_set_*(...);\n  }\nIf two threads call BIO_new_rdp_tls() simultaneously for the first time, both can observe\nbio_methods == nullptr and both call BIO_meth_new(), resulting in two independent method objects.\nThe second one overwrites bio_methods but the first is leaked. In multi-threaded reconnect or\ngateway scenarios this race can cause memory leaks and potentially use partially-initialised\nBIO_METHOD objects.","fix":"Protect the initialisation block with INIT_ONCE (already used elsewhere in this file for\nsecrets_file_idx_once) or a static mutex. Example using INIT_ONCE:\n  static INIT_ONCE bio_method_once = INIT_ONCE_STATIC_INIT;\n  static BOOL CALLBACK bio_method_init(PINIT_ONCE, PVOID, PVOID*) {\n      bio_methods = BIO_meth_new(...);\n      ...\n      return TRUE;\n  }\n  InitOnceExecuteOnce(&bio_method_once, bio_method_init, nullptr, nullptr);","locations":[{"ref":"libfreerdp/crypto/tls.c:577-597","code":"  577 | static BIO_METHOD* BIO_s_rdp_tls(void)\n  578 | {\n  579 | \tstatic BIO_METHOD* bio_methods = nullptr;\n  580 | \n  581 | \tif (bio_methods == nullptr)\n  582 | \t{\n  583 | \t\tif (!(bio_methods = BIO_meth_new(BIO_TYPE_RDP_TLS, \"RdpTls\")))\n  584 | \t\t\treturn nullptr;\n  585 | \n  586 | \t\tBIO_meth_set_write(bio_methods, bio_rdp_tls_write);\n  587 | \t\tBIO_meth_set_read(bio_methods, bio_rdp_tls_read);\n  588 | \t\tBIO_meth_set_puts(bio_methods, bio_rdp_tls_puts);\n  589 | \t\tBIO_meth_set_gets(bio_methods, bio_rdp_tls_gets);\n  590 | \t\tBIO_meth_set_ctrl(bio_methods, bio_rdp_tls_ctrl);\n  591 | \t\tBIO_meth_set_create(bio_methods, bio_rdp_tls_new);\n  592 | \t\tBIO_meth_set_destroy(bio_methods, bio_rdp_tls_free);\n  593 | \t\tBIO_meth_set_callback_ctrl(bio_methods, bio_rdp_tls_callback_ctrl);\n  594 | \t}\n  595 | \n  596 | \treturn bio_methods;\n  597 | }","lines":21}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In scard_handle_new() (smartcard_emulate.c), the check 'if (!hdl->szReader.pv) goto fail;' at line 296 is placed after the allocation of hdl->szReader.pw or hdl->szReader.pc. However, because the earlier goto-fail paths already check the allocation result, this NULL check is dead code - control only reaches line 296 if the allocation succeeded. More importantly, if the unicode branch allocates hdl->szReader.pw but then the vgids_new() or vgids_init() call fails, the memory pointed to by szReader is freed by scard_handle_free via 'free(hdl->szReader.pv)', which is correct. However, the memcpy at lines 284 and 293 copies through the same union pointer after assignment, which is correct but confusingly written - the comment says 'do not use _strdup' but then does the equivalent manually, which may mislead future readers.","fix":"Remove the dead NULL check at line 296-297. Add a comment clarifying that the memcpy destination is the same memory as the immediately-preceding allocation.","locations":[{"ref":"libfreerdp/emu/scard/smartcard_emulate.c:296-297","code":"  296 | \tif (!hdl->szReader.pv)\n  297 | \t\tgoto fail;","lines":2}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In freerdp_keyboard_init_ex() (locale/keyboard.c lines 411-439), the local 'goto fail' label is declared inside the 'if (keyboardRemappingList)' block. If the goto is taken, execution falls through to 'fail:' which is also inside the block, then falls through to 'free(copy)' which frees the string. However, if the strdup fails (copy is NULL), the code skips the entire remapping parse but still calls free(copy) on NULL - which is safe but misleading. The actual problem is that on parse failure the function returns the keyboard layout ID that was already computed, silently ignoring the bad remapping list with no error surfaced to the caller.","fix":"Propagate the parse failure to the caller or at least log a warning when freerdp_extract_key_value fails in this path.","locations":[{"ref":"libfreerdp/locale/keyboard.c:411-439","code":"  411 | DWORD freerdp_keyboard_init_ex(DWORD keyboardLayoutId, const char* keyboardRemappingList)\n  412 | {\n  413 | \tDWORD res = freerdp_keyboard_init(keyboardLayoutId);\n  414 | \n  415 | \tmemset(REMAPPING_TABLE, 0, sizeof(REMAPPING_TABLE));\n  416 | \tif (keyboardRemappingList)\n  417 | \t{\n  418 | \t\tchar* copy = _strdup(keyboardRemappingList);\n  419 | \t\tchar* context = nullptr;\n  420 | \t\tchar* token = nullptr;\n  421 | \t\tif (!copy)\n  422 | \t\t\tgoto fail;\n  423 | \t\ttoken = strtok_s(copy, \",\", &context);\n  424 | \t\twhile (token)\n  425 | \t\t{\n  426 | \t\t\tDWORD key = 0;\n  427 | \t\t\tDWORD value = 0;\n  428 | \t\t\tif (!freerdp_extract_key_value(token, &key, &value))\n  429 | \t\t\t\tgoto fail;\n  430 | \t\t\tif (key >= ARRAYSIZE(REMAPPING_TABLE))\n  431 | \t\t\t\tgoto fail;\n  432 | \t\t\tREMAPPING_TABLE[key] = value;\n  433 | \t\t\ttoken = strtok_s(nullptr, \",\", &context);\n  434 | \t\t}\n  435 | \tfail:\n  436 | \t\tfree(copy);\n  437 | \t}\n  438 | \treturn res;\n  439 | }","lines":29}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In rdtk_nine_patch_get_fill_ht() (rdtk_nine_patch.c lines 446-448), the function writes into ninePatch->scaleTop and ninePatch->scaleBottom instead of ninePatch->fillTop and ninePatch->fillBottom. The result is that the fill vertical boundaries overwrite the scale vertical boundaries that were already correctly set by rdtk_nine_patch_get_scale_ht(). The fill region information is lost and the scale region is corrupted. Compare with rdtk_nine_patch_get_fill_lr() which correctly writes ninePatch->fillLeft and ninePatch->fillRight.","fix":"Change 'ninePatch->scaleTop', 'ninePatch->scaleBottom', 'ninePatch->scaleHeight' to 'ninePatch->fillTop', 'ninePatch->fillBottom', 'ninePatch->fillHeight' respectively.","locations":[{"ref":"rdtk/librdtk/rdtk_nine_patch.c:446-448","code":"  446 | \tninePatch->scaleTop = (int32_t)beg - 1;\n  447 | \tninePatch->scaleBottom = (int32_t)end - 1;\n  448 | \tninePatch->scaleHeight = ninePatch->scaleBottom - ninePatch->scaleTop;","lines":3}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"pf_config_decode_base64 measures the length of the decoded result with\nstrnlen(decoded, decoded_length). strnlen stops at the first embedded null byte, so if\nthe decoded binary data (e.g. a DER-encoded certificate) contains a null byte before\ndecoded_length, the reported *pLength is shorter than the actual allocation. Any code\nthat later uses *pLength to process the buffer will silently truncate it.","fix":"Use decoded_length directly as the length; strnlen is inappropriate for binary data.\nSet *pLength = decoded_length and document that the buffer is not null-terminated.","locations":[{"ref":"server/proxy/pf_config.c:567-568","code":"  567 | \t*pLength = strnlen(decoded, decoded_length) + 1;\n  568 | \treturn decoded;","lines":2}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`CharLowerW` (winpr/libwinpr/crt/string.c line 575) passes `UINT32_MAX + 1` as the `max`\nparameter to `_wcsnlen`:\n  `const size_t len = _wcsnlen(lpsz, UINT32_MAX + 1);`\n`UINT32_MAX + 1` wraps to 0 in unsigned arithmetic when evaluated as UINT32 (though it may\nbe size_t depending on promotion), so in the worst case this limits the scan to 0 characters\nand always returns 0, causing the function to return `lpsz` unchanged even for non-empty\nstrings. On platforms where the literal promotes to a 64-bit size_t the value is 4294967296 and\n`_wcsnlen` scans the entire string, but this is a latent portability / correctness bug.","fix":"Change to `_wcsnlen(lpsz, UINT32_MAX)` to match the documented limit (WCHAR strings in\nWindows APIs are at most UINT32_MAX / sizeof(WCHAR) characters), then cast len to UINT32\nafter the > UINT32_MAX guard already present.","locations":[{"ref":"winpr/libwinpr/crt/string.c:573-579","code":"  573 | LPWSTR CharLowerW(LPWSTR lpsz)\n  574 | {\n  575 | \tconst size_t len = _wcsnlen(lpsz, UINT32_MAX + 1);\n  576 | \tif (len > UINT32_MAX)\n  577 | \t\treturn nullptr;\n  578 | \tCharLowerBuffW(lpsz, (UINT32)len);\n  579 | \treturn lpsz;","lines":7}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ConvertLineEndingToLF` in winpr/libwinpr/crt/string.c (line 676) may access `str[x - skip]`\nwith an invalid index when `skip > x`. At loop start `skip == 0`, but the increment `skip++`\nhappens after `str[x - skip] = '\n'` so the problematic access cannot occur in the first\niteration. However the logic is subtle and a future edit could break the invariant. The real\nissue is that when `x == 0` and skip is somehow non-zero (which cannot happen with current\nlogic but is easy to accidentally introduce), the subtraction underflows to a huge index\ninto the string. A defensive assert or comment is warranted.","fix":"Add `WINPR_ASSERT(x >= skip)` before `str[x - skip] = ...` to document and enforce the\ninvariant.","locations":[{"ref":"winpr/libwinpr/crt/string.c:676-697","code":"  676 | size_t ConvertLineEndingToLF(char* str, size_t size)\n  677 | {\n  678 | \tsize_t skip = 0;\n  679 | \n  680 | \tWINPR_ASSERT(str || (size == 0));\n  681 | \tfor (size_t x = 0; x < size; x++)\n  682 | \t{\n  683 | \t\tchar c = str[x];\n  684 | \t\tswitch (c)\n  685 | \t\t{\n  686 | \t\t\tcase '\\r':\n  687 | \t\t\t\tstr[x - skip] = '\\n';\n  688 | \t\t\t\tif ((x + 1 < size) && (str[x + 1] == '\\n'))\n  689 | \t\t\t\t\tskip++;\n  690 | \t\t\t\tbreak;\n  691 | \t\t\tdefault:\n  692 | \t\t\t\tstr[x - skip] = c;\n  693 | \t\t\t\tbreak;\n  694 | \t\t}\n  695 | \t}\n  696 | \treturn size - skip;\n  697 | }","lines":22}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In the Solaris path of FileCreateFileA(), when both FILE_SHARE_READ and FILE_SHARE_WRITE are set in dwShareMode, the code sets 'lock.l_type = F_RDLCK' for FILE_SHARE_READ and then unconditionally overwrites it with 'lock.l_type = F_RDLCK' again for FILE_SHARE_WRITE (both branches write F_RDLCK). For FILE_SHARE_WRITE an exclusive lock (F_WRLCK) would be more appropriate, matching the non-Solaris path where FILE_SHARE_WRITE maps to LOCK_EX.","fix":"Change the FILE_SHARE_WRITE branch on Solaris to 'lock.l_type = F_WRLCK;'.","locations":[{"ref":"winpr/libwinpr/file/file.c:970-978","code":"  970 | \tif (dwShareMode & FILE_SHARE_READ)\n  971 | \t\tlock.l_type = F_RDLCK;\n  972 | \tif (dwShareMode & FILE_SHARE_WRITE)\n  973 | \t\tlock.l_type = F_RDLCK;\n  974 | #else\n  975 | \tif (dwShareMode & FILE_SHARE_READ)\n  976 | \t\tlock = LOCK_SH;\n  977 | \tif (dwShareMode & FILE_SHARE_WRITE)\n  978 | \t\tlock = LOCK_EX;","lines":9}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In LoadLibraryA() under _UWP, the condition 'if (filenameW)' at line 121 returns nullptr when the allocation succeeds (non-null), and falls through when it fails (null). The condition is inverted: it should be 'if (!filenameW)'. As written, a successful conversion leads to an immediate nullptr return, while an OOM case tries to call LoadLibraryW(nullptr).","fix":"Change 'if (filenameW)' to 'if (!filenameW)' to correctly handle the OOM error path.","locations":[{"ref":"winpr/libwinpr/library/library.c:120-126","code":"  120 | \tfilenameW = ConvertUtf8ToWCharAlloc(lpLibFileName, nullptr);\n  121 | \tif (filenameW)\n  122 | \t\treturn nullptr;\n  123 | \n  124 | \thModule = LoadLibraryW(filenameW);\n  125 | \tfree(filenameW);\n  126 | \treturn hModule;","lines":7}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In CreateNamedPipeA(), after the 'goto out' path (error), the function calls close(serverfd) to close the newly created server socket. However, if a pre-existing baseSocket was found (serverfd reused via dup from the global list), closing serverfd there would close the duplicated fd, which is correct. But if baseSocket was newly allocated and appended to the list, a successful ArrayList_Append means the entry is already tracking the fd; the subsequent 'close(serverfd)' at line 722 double-closes it because NamedPipeCloseHandle also closes pNamedPipe->serverfd which was dup'd from the same fd. This leaves baseSocket->serverfd dangling.","fix":"Only call close(serverfd) in the error path if baseSocket was NOT successfully appended to the list (i.e., track whether the append succeeded).","locations":[{"ref":"winpr/libwinpr/pipe/pipe.c:718-724","code":"  718 | out:\n  719 | \tNamedPipeCloseHandle(pNamedPipe);\n  720 | \n  721 | \tif (serverfd != -1)\n  722 | \t\tclose(serverfd);\n  723 | \n  724 | \tArrayList_Unlock(g_NamedPipeServerSockets);","lines":7}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `ntlm_compute_channel_bindings` (winpr/libwinpr/sspi/NTLM/ntlm_av_pairs.c line 440),\n`ChannelBindingTokenLength` is computed as:\n  `context->Bindings.BindingsLength - sizeof(SEC_CHANNEL_BINDINGS)`\nwithout first checking that `BindingsLength >= sizeof(SEC_CHANNEL_BINDINGS)`. If a caller\npasses a `Bindings` buffer shorter than the fixed header size, the subtraction wraps to a\nhuge size_t and the subsequent MD5 update over `ChannelBindingToken` will read far beyond the\nbuffer. Additionally, `ChannelBindingToken` is taken from\n`ChannelBindings->dwApplicationDataOffset` without validating that the offset is within the\nallocated binding buffer.","fix":"Before computing ChannelBindingTokenLength, verify:\n  if (context->Bindings.BindingsLength < sizeof(SEC_CHANNEL_BINDINGS)) return;\nAlso verify that dwApplicationDataOffset plus cbApplicationDataLength does not exceed\nBindingsLength before passing data to the digest.","locations":[{"ref":"winpr/libwinpr/sspi/NTLM/ntlm_av_pairs.c:419-466","code":"  419 | static void ntlm_compute_channel_bindings(NTLM_CONTEXT* context)\n  420 | {\n  421 | \tWINPR_DIGEST_CTX* md5 = nullptr;\n  422 | \tBYTE* ChannelBindingToken = nullptr;\n  423 | \tUINT32 ChannelBindingTokenLength = 0;\n  424 | \tSEC_CHANNEL_BINDINGS* ChannelBindings = nullptr;\n  425 | \n  426 | \tWINPR_ASSERT(context);\n  427 | \n  428 | \tZeroMemory(context->ChannelBindingsHash, WINPR_MD5_DIGEST_LENGTH);\n  429 | \tChannelBindings = context->Bindings.Bindings;\n  430 | \n  431 | \tif (!ChannelBindings)\n  432 | \t\treturn;\n  433 | \n  434 | \tif (!(md5 = winpr_Digest_New()))\n  435 | \t\treturn;\n  436 | \n  437 | \tif (!winpr_Digest_Init(md5, WINPR_MD_MD5))\n  438 | \t\tgoto out;\n  439 | \n  440 | \tChannelBindingTokenLength = context->Bindings.BindingsLength - sizeof(SEC_CHANNEL_BINDINGS);\n  441 | \tChannelBindingToken = &((BYTE*)ChannelBindings)[ChannelBindings->dwApplicationDataOffset];\n  442 | \n  443 | \tif (!ntlm_md5_update_uint32_be(md5, ChannelBindings->dwInitiatorAddrType))\n  444 | \t\tgoto out;\n  445 | \n  446 | \tif (!ntlm_md5_update_uint32_be(md5, ChannelBindings->cbInitiatorLength))\n  447 | \t\tgoto out;\n  448 | \n  449 | \tif (!ntlm_md5_update_uint32_be(md5, ChannelBindings->dwAcceptorAddrType))\n  450 | \t\tgoto out;\n  451 | \n  452 | \tif (!ntlm_md5_update_uint32_be(md5, ChannelBindings->cbAcceptorLength))\n  453 | \t\tgoto out;\n  454 | \n  455 | \tif (!ntlm_md5_update_uint32_be(md5, ChannelBindings->cbApplicationDataLength))\n  456 | \t\tgoto out;\n  457 | \n  458 | \tif (!winpr_Digest_Update(md5, (void*)ChannelBindingToken, ChannelBindingTokenLength))\n  459 | \t\tgoto out;\n  460 | \n  461 | \tif (!winpr_Digest_Final(md5, context->ChannelBindingsHash, WINPR_MD5_DIGEST_LENGTH))\n  462 | \t\tgoto out;\n  463 | \n  464 | out:\n  465 | \twinpr_Digest_Free(md5);\n  466 | }","lines":48}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `SamLookupStart` (winpr/libwinpr/utils/sam.c lines 160-168), the `fread` return value check\nis incorrect. `fread(sam->buffer, fileSize, 1, pcap->fp)` returns the number of full items (1 or 0).\nIf `fread` returns 0 the code then checks `ferror` and if no error occurred it sets\n`readSize = (size_t)fileSize`. This effectively ignores a partial or empty read when no error\nflag is set (e.g. on some platforms hitting EOF immediately counts as no error), and treats\na zero-byte read as a full success of `fileSize` bytes. The buffer is left as all-zero calloc\nbytes rather than actual file content, and subsequent SAM lookups silently fail to find any user.","fix":"Replace the heuristic with a proper check: use `fread(buf, 1, fileSize, fp)` (single-byte\nitems, count == fileSize) so the return value directly gives bytes read. Fail if the returned\ncount != fileSize.","locations":[{"ref":"winpr/libwinpr/utils/sam.c:137-178","code":"  137 | static BOOL SamLookupStart(WINPR_SAM* sam)\n  138 | {\n  139 | \tsize_t readSize = 0;\n  140 | \tINT64 fileSize = 0;\n  141 | \n  142 | \tif (!sam || !sam->fp)\n  143 | \t\treturn FALSE;\n  144 | \n  145 | \tif (_fseeki64(sam->fp, 0, SEEK_END) != 0)\n  146 | \t\treturn FALSE;\n  147 | \tfileSize = _ftelli64(sam->fp);\n  148 | \tif (_fseeki64(sam->fp, 0, SEEK_SET) != 0)\n  149 | \t\treturn FALSE;\n  150 | \n  151 | \tif (fileSize < 1)\n  152 | \t\treturn FALSE;\n  153 | \n  154 | \tsam->context = nullptr;\n  155 | \tsam->buffer = (char*)calloc((size_t)fileSize + 2, 1);\n  156 | \n  157 | \tif (!sam->buffer)\n  158 | \t\treturn FALSE;\n  159 | \n  160 | \treadSize = fread(sam->buffer, (size_t)fileSize, 1, sam->fp);\n  161 | \n  162 | \tif (!readSize)\n  163 | \t{\n  164 | \t\tif (!ferror(sam->fp))\n  165 | \t\t\treadSize = (size_t)fileSize;\n  166 | \t}\n  167 | \n  168 | \tif (readSize < 1)\n  169 | \t{\n  170 | \t\tfree(sam->buffer);\n  171 | \t\tsam->buffer = nullptr;\n  172 | \t\treturn FALSE;\n  173 | \t}\n  174 | \n  175 | \tsam->buffer[fileSize] = '\\n';\n  176 | \tsam->buffer[fileSize + 1] = '\\0';\n  177 | \tsam->line = strtok_s(sam->buffer, \"\\n\", &sam->context);\n  178 | \treturn TRUE;","lines":42}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`Ellipse_Bresenham` in libfreerdp/gdi/shape.c (lines 43-104) calls `gdi_SetPixel` with\ncoordinates that can be negative (x1 and y1 can go negative inside the loop) while the\nparameter type of `gdi_SetPixel` is UINT32 (unsigned). The casts at lines 68-75 via\n`WINPR_ASSERTING_INT_CAST(UINT32, x1)` / `WINPR_ASSERTING_INT_CAST(UINT32, y1)` will assert\nin debug builds and silently wrap to large values in release builds when x1 or y1 becomes\nnegative, causing gdi_get_bitmap_pointer to return nullptr and gdi_SetPixel to silently skip\nthe pixel. While this produces cosmetically incorrect output rather than a security issue,\nthe silent wrapping is a source of hard-to-diagnose rendering bugs.","fix":"Before calling gdi_SetPixel, guard each coordinate: only draw if x1 >= 0 and y1 >= 0 (and\nwithin bitmap bounds). Replace WINPR_ASSERTING_INT_CAST with an explicit skip-if-negative check.","locations":[{"ref":"libfreerdp/gdi/shape.c:43-104","code":"   43 | static BOOL Ellipse_Bresenham(HGDI_DC hdc, int x1, int y1, int x2, int y2)\n   44 | {\n   45 | \tINT32 a = (x1 < x2) ? x2 - x1 : x1 - x2;\n   46 | \tconst INT32 b = (y1 < y2) ? y2 - y1 : y1 - y2;\n   47 | \tINT32 c = b & 1;\n   48 | \tINT32 dx = 4 * (1 - a) * b * b;\n   49 | \tINT32 dy = 4 * (c + 1) * a * a;\n   50 | \tINT32 e = dx + dy + c * a * a;\n   51 | \n   52 | \tif (x1 > x2)\n   53 | \t{\n   54 | \t\tx1 = x2;\n   55 | \t\tx2 += a;\n   56 | \t}\n   57 | \n   58 | \tif (y1 > y2)\n   59 | \t\ty1 = y2;\n   60 | \n   61 | \ty1 += (b + 1) / 2;\n   62 | \ty2 = y1 - c;\n   63 | \ta *= 8 * a;\n   64 | \tc = 8 * b * b;\n   65 | \n   66 | \tdo\n   67 | \t{\n   68 | \t\tgdi_SetPixel(hdc, WINPR_ASSERTING_INT_CAST(UINT32, x2),\n   69 | \t\t             WINPR_ASSERTING_INT_CAST(UINT32, y1), 0);\n   70 | \t\tgdi_SetPixel(hdc, WINPR_ASSERTING_INT_CAST(UINT32, x1),\n   71 | \t\t             WINPR_ASSERTING_INT_CAST(UINT32, y1), 0);\n   72 | \t\tgdi_SetPixel(hdc, WINPR_ASSERTING_INT_CAST(UINT32, x1),\n   73 | \t\t             WINPR_ASSERTING_INT_CAST(UINT32, y2), 0);\n   74 | \t\tgdi_SetPixel(hdc, WINPR_ASSERTING_INT_CAST(UINT32, x2),\n   75 | \t\t             WINPR_ASSERTING_INT_CAST(UINT32, y2), 0);\n   76 | \n   77 | \t\tconst INT32 e2 = 2 * e;\n   78 | \n   79 | \t\tif (e2 >= dx)\n   80 | \t\t{\n   81 | \t\t\tx1++;\n   82 | \t\t\tx2--;\n   83 | \t\t\te += dx += c;\n   84 | \t\t}\n   85 | \n   86 | \t\tif (e2 <= dy)\n   87 | \t\t{\n   88 | \t\t\ty1++;\n   89 | \t\t\ty2--;\n   90 | \t\t\te += dy += a;\n   91 | \t\t}\n   92 | \t} while (x1 <= x2);\n   93 | \n   94 | \twhile (y1 - y2 < b)\n   95 | \t{\n   96 | \t\ty1++;\n   97 | \t\ty2--;\n   98 | \n   99 | \t\tgdi_SetPixel(hdc, WINPR_ASSERTING_INT_CAST(uint32_t, x1 - 1),\n  100 | \t\t             WINPR_ASSERTING_INT_CAST(uint32_t, y1), 0);\n  101 | \t\tgdi_SetPixel(hdc, WINPR_ASSERTING_INT_CAST(uint32_t, x1 - 1),\n  102 | \t\t             WINPR_ASSERTING_INT_CAST(uint32_t, y2), 0);\n  103 | \t}\n  104 | \treturn TRUE;","lines":62}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"xf_cliprdr_formats_to_alphabet calls WINPR_ASSERT on the return value of _strdup.\nWINPR_ASSERT aborts the process on failure, so an OOM condition during clipboard\nformat registration causes a hard crash rather than a graceful error return. This is\nreachable remotely whenever the server sends a format list with named formats.","fix":"Replace WINPR_ASSERT with an explicit NULL check and return FALSE on failure.","locations":[{"ref":"client/X11/xf_cliprdr.c:757-759","code":"  757 | \t\t\t\t{\n  758 | \t\t\t\t\tcformat->formatName = _strdup(format->formatName);\n  759 | \t\t\t\t\tWINPR_ASSERT(cformat->formatName);","lines":3}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`license_rc4_with_licenseKey` incorrectly returns FALSE for valid zero-length inputs. When\n`len == 0`, `buffer` stays NULL and the `if (!buffer)` check at line 1331 fires, causing the\nfunction to return failure even though a zero-length RC4 operation is well-defined and harmless.\nThe rc4 context allocated at line 1320 is also freed without error in the `error_buffer` path,\nbut the NULL pointer is logged as a failure, which is misleading.","fix":"Handle the zero-length case explicitly before the NULL check:\n```c\nif (len == 0) {\n    free(target->data);\n    target->data = NULL;\n    target->length = 0;\n    winpr_RC4_Free(rc4);\n    return TRUE;\n}\n```","locations":[{"ref":"libfreerdp/core/license.c:1328-1332","code":" 1328 | \tBYTE* buffer = nullptr;\n 1329 | \tif (len > 0)\n 1330 | \t\tbuffer = realloc(target->data, len);\n 1331 | \tif (!buffer)\n 1332 | \t\tgoto error_buffer;","lines":5}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In FileCreateFileA(), when freopen() fails it returns NULL but the original fp is already closed (freopen closes the stream regardless of success). The function does not check freopen's return value; if freopen returns nullptr, pFile->fp is set to nullptr and the subsequent 'if (!pFile->fp)' check correctly catches it, but the error path calls free(pFile->lpFileName) and free(pFile) directly without calling FileCloseHandle, potentially leaking the FILE* resource in edge cases on some platforms.","fix":"After fp = freopen(...), immediately check 'if (!fp)' and go to the error path (which calls FileCloseHandle(pFile)) rather than relying on the later null check.","locations":[{"ref":"winpr/libwinpr/file/file.c:925-960","code":"  925 | \t\tfp = freopen(pFile->lpFileName, mode, fp);\n  926 | \t}\n  927 | \telse\n  928 | \t{\n  929 | \t\tif (stat(pFile->lpFileName, &st) != 0)\n  930 | \t\t{\n  931 | \t\t\tSetLastError(map_posix_err(errno));\n  932 | \t\t\tfree(pFile->lpFileName);\n  933 | \t\t\tfree(pFile);\n  934 | \t\t\treturn INVALID_HANDLE_VALUE;\n  935 | \t\t}\n  936 | \n  937 | \t\t/* FIFO (named pipe) would block the following fopen\n  938 | \t\t * call if not connected. This renders the channel unusable,\n  939 | \t\t * therefore abort early. */\n  940 | \t\tif (S_ISFIFO(st.st_mode))\n  941 | \t\t{\n  942 | \t\t\tSetLastError(ERROR_FILE_NOT_FOUND);\n  943 | \t\t\tfree(pFile->lpFileName);\n  944 | \t\t\tfree(pFile);\n  945 | \t\t\treturn INVALID_HANDLE_VALUE;\n  946 | \t\t}\n  947 | \t}\n  948 | \n  949 | \tif (nullptr == fp)\n  950 | \t\tfp = winpr_fopen(pFile->lpFileName, mode);\n  951 | \n  952 | \tpFile->fp = fp;\n  953 | \tif (!pFile->fp)\n  954 | \t{\n  955 | \t\t/* This case can occur when trying to open a\n  956 | \t\t * not existing file without create flag. */\n  957 | \t\tSetLastError(map_posix_err(errno));\n  958 | \t\tfree(pFile->lpFileName);\n  959 | \t\tfree(pFile);\n  960 | \t\treturn INVALID_HANDLE_VALUE;","lines":36}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"GetDiskFreeSpaceA() (non-Windows path) calls statvfs/statfs but ignores its return value. If the call fails (e.g. the path does not exist), the function proceeds to dereference the uninitialized svfst structure and returns TRUE, reporting garbage disk space values.","fix":"Check the return value of STATVFS(); if it returns non-zero, return FALSE and set the last error with map_posix_err(errno).","locations":[{"ref":"winpr/libwinpr/file/file.c:1102-1108","code":" 1102 | \tstruct STATVFS svfst = WINPR_C_ARRAY_INIT;\n 1103 | \tSTATVFS(lpRootPathName, &svfst);\n 1104 | \t*lpSectorsPerCluster = (UINT32)MIN(svfst.f_frsize, UINT32_MAX);\n 1105 | \t*lpBytesPerSector = 1;\n 1106 | \t*lpNumberOfFreeClusters = (UINT32)MIN(svfst.f_bavail, UINT32_MAX);\n 1107 | \t*lpTotalNumberOfClusters = (UINT32)MIN(svfst.f_blocks, UINT32_MAX);\n 1108 | \treturn TRUE;","lines":7}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"PipeWrite() (anonymous pipe) does not check for write errors other than EWOULDBLOCK. When write() returns -1 for any reason other than EWOULDBLOCK/EAGAIN, io_status is -1, which is cast to DWORD (a large positive value) and written to *lpNumberOfBytesWritten, and the function returns TRUE, indicating success to the caller.","fix":"After the write loop, if io_status < 0 and errno != EWOULDBLOCK, set *lpNumberOfBytesWritten = 0, call SetLastError(map_posix_err(errno)) and return FALSE.","locations":[{"ref":"winpr/libwinpr/pipe/pipe.c:153-178","code":"  153 | static BOOL PipeWrite(PVOID Object, LPCVOID lpBuffer, DWORD nNumberOfBytesToWrite,\n  154 |                       LPDWORD lpNumberOfBytesWritten, LPOVERLAPPED lpOverlapped)\n  155 | {\n  156 | \tSSIZE_T io_status = 0;\n  157 | \tWINPR_PIPE* pipe = nullptr;\n  158 | \n  159 | \tif (lpOverlapped)\n  160 | \t{\n  161 | \t\tWLog_ERR(TAG, \"WinPR does not support the lpOverlapped parameter\");\n  162 | \t\tSetLastError(ERROR_NOT_SUPPORTED);\n  163 | \t\treturn FALSE;\n  164 | \t}\n  165 | \n  166 | \tpipe = (WINPR_PIPE*)Object;\n  167 | \n  168 | \tdo\n  169 | \t{\n  170 | \t\tio_status = write(pipe->fd, lpBuffer, nNumberOfBytesToWrite);\n  171 | \t} while ((io_status < 0) && (errno == EINTR));\n  172 | \n  173 | \tif ((io_status < 0) && (errno == EWOULDBLOCK))\n  174 | \t\tio_status = 0;\n  175 | \n  176 | \t*lpNumberOfBytesWritten = (DWORD)io_status;\n  177 | \treturn TRUE;\n  178 | }","lines":26}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In remdesk_recv_ctl_version_info_pdu(), when the server advertises an unsupported protocol version\n(versionMajor != 1, versionMinor == 0, or versionMinor > 2), the code only logs an error and then\ncontinues:\n  remdesk->Version = versionMinor;\n  return CHANNEL_RC_OK;\nThe connection proceeds with a version that the client explicitly deemed unsupported. This is a\nviolation of the protocol contract and could expose the client to undefined behavior if subsequent\nPDUs rely on version-specific semantics.","fix":"Return an error when the version is unsupported: replace the log-only block with `return ERROR_INVALID_DATA;` after the WLog_ERR call.","locations":[{"ref":"channels/remdesk/client/remdesk_main.c:168-175","code":"  168 | \tif ((versionMajor != 1) || (versionMinor > 2) || (versionMinor == 0))\n  169 | \t{\n  170 | \t\tWLog_ERR(TAG, \"Unsupported protocol version %\" PRIu32 \".%\" PRIu32, versionMajor,\n  171 | \t\t         versionMinor);\n  172 | \t}\n  173 | \n  174 | \tremdesk->Version = versionMinor;\n  175 | \treturn CHANNEL_RC_OK;","lines":8}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In tsmf_ifman_check_format_support_request(), the function signature declares return type UINT but\nline 172 contains:\n  return -1;\nIn C, returning -1 from a UINT (unsigned int) function yields the value 0xFFFFFFFF. This is not\nequal to any of the defined CHANNEL_RC_* or Win32 error codes, so callers that check for specific\nerror values will silently mishandle this failure path. All other return sites in this function\nreturn CHANNEL_RC_OK (0) or ERROR_* constants (positive UINT values).","fix":"Replace `return -1;` with `return ERROR_INTERNAL_ERROR;` or another appropriate Win32 error code.","locations":[{"ref":"channels/tsmf/client/tsmf_ifman.c:172-172","code":"  172 | \t\treturn -1;","lines":1}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In crypto_write_pem() the function writes 'size' bytes where size = strnlen(pem, length) + 1\n(including the NUL terminator). The success check is 'return rc == size', but fwrite is called as\nfwrite(pem, 1, size, fp). If fclose fails (e.g. on NFS), the data may not be durably written but\nthe function returns TRUE because fwrite succeeded. Additionally, the return value of fclose is\ndiscarded via (void)fclose(fp) before the success check, so a flush error is silently ignored.","fix":"Check the return value of fclose:\n  int close_rc = fclose(fp);\n  fp = nullptr;\n  if (close_rc != 0) {\n      rc = 0;  /* treat close failure as write failure */\n  }","locations":[{"ref":"libfreerdp/crypto/crypto.c:248-272","code":"  248 | BOOL crypto_write_pem(const char* WINPR_RESTRICT filename, const char* WINPR_RESTRICT pem,\n  249 |                       size_t length)\n  250 | {\n  251 | \tWINPR_ASSERT(filename);\n  252 | \tWINPR_ASSERT(pem || (length == 0));\n  253 | \n  254 | \tWINPR_ASSERT(filename);\n  255 | \tWINPR_ASSERT(pem);\n  256 | \n  257 | \tconst size_t size = strnlen(pem, length) + 1;\n  258 | \tsize_t rc = 0;\n  259 | \tFILE* fp = winpr_fopen(filename, \"w\");\n  260 | \tif (!fp)\n  261 | \t\tgoto fail;\n  262 | \trc = fwrite(pem, 1, size, fp);\n  263 | \t(void)fclose(fp);\n  264 | fail:\n  265 | \tif (rc == 0)\n  266 | \t{\n  267 | \t\tchar buffer[8192] = WINPR_C_ARRAY_INIT;\n  268 | \t\tWLog_WARN(TAG, \"Failed to write PEM [%\" PRIuz \"] to file '%s' [%s]\", length, filename,\n  269 | \t\t          winpr_strerror(errno, buffer, sizeof(buffer)));\n  270 | \t}\n  271 | \treturn rc == size;\n  272 | }","lines":25}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In winpr_RAND() (mbedtls non-HAVEGE path), if mbedtls_hmac_drbg_seed() fails, the function returns -1 without calling mbedtls_entropy_free(&entropy) or mbedtls_hmac_drbg_free(&hmac_drbg), leaking both initialised contexts.","fix":"Before the 'return -1' at line 67, free both contexts: 'mbedtls_hmac_drbg_free(&hmac_drbg); mbedtls_entropy_free(&entropy);'.","locations":[{"ref":"winpr/libwinpr/crypto/rand.c:65-67","code":"   65 | \tif ((status = mbedtls_hmac_drbg_seed(&hmac_drbg, md_info, mbedtls_entropy_func, &entropy,\n   66 | \t                                     nullptr, 0)) != 0)\n   67 | \t\treturn -1;","lines":3}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":true,"description":"xf_DestroyWindow passes nullptr instead of the mapped pointer to munmap. The call\nmunmap(nullptr, sizeof(*appWindow->xfwin)) unmaps nothing (or faults on some kernels)\nwhile the shared-memory mapping is never released. The identical code in\nxf_DestroyDesktopWindow correctly passes the pointer.","fix":"Change munmap(nullptr, ...) to munmap(appWindow->xfwin, sizeof(*appWindow->xfwin)).","locations":[{"ref":"client/X11/xf_window.c:1435-1436","code":" 1435 | \tif (appWindow->xfwin)\n 1436 | \t\tmunmap(nullptr, sizeof(*appWindow->xfwin));","lines":2}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"In uwac_default_error_handler(), the call 'vfprintf(stderr, \"%s\", args)' passes the va_list 'args' as the single format argument, not as a variadic argument list. vfprintf expects (FILE*, const char* fmt, va_list ap), so the call should be 'vfprintf(stderr, msg, args)'. As written the format string is a literal \"%s\" and 'args' is cast to the string pointer, printing garbage and ignoring the 'msg' parameter entirely. On most ABIs this will print random stack/register data or crash.","fix":"Change 'vfprintf(stderr, \"%s\", args)' to 'vfprintf(stderr, msg, args)'.","locations":[{"ref":"uwac/libuwac/uwac-display.c:59","code":"   59 | \t(void)vfprintf(stderr, \"%s\", args);","lines":1}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"xf_GetWorkArea_NET_WORKAREA passes INT_MAX as the 'length' argument (number of 32-bit\nlongs to retrieve) to XGetWindowProperty via xf_GetWindowProperty. The X protocol\nlimits this value to a 32-bit quantity; INT_MAX happens to be safe on 32-bit but is\nsemantically wrong and will cause excessive network traffic when the property is large.\nA reasonable bound (e.g. 16) would match the expected WORKAREA layout (4 values per\ndesktop, up to a few dozen desktops).","fix":"Pass a small constant (e.g. 256) instead of INT_MAX for the length parameter.","locations":[{"ref":"client/X11/xf_window.c:570-571","code":"  570 | \tconst BOOL status =\n  571 | \t    xf_GetWindowProperty(xfc, root, xfc->NET_WORKAREA, INT_MAX, &nitems, &bytes, &bprop);","lines":2}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`rdp_read_capability_set` at line 4284 calls `realloc(ptr, size)` and at line 4285 guards\nagainst failure only when `size > 0`: `if (!tmp && (size > 0)) return FALSE`. When `size == 0`,\n`realloc` may return NULL (implementation-defined), `tmp` is NULL, and the code falls through to\n`memcpy(tmp, Stream_Buffer(sub), size)` at line 4287. Calling `memcpy(NULL, src, 0)` is\nundefined behavior in C even with a zero count. Additionally, the old allocation is leaked when\n`realloc` returns NULL on a size > 0 failure, because `settings->ReceivedCapabilityData[type]`\nstill holds the old pointer that realloc freed.","fix":"Skip the memcpy entirely when size is 0, and fix the realloc leak pattern:\n```c\nif (size > 0) {\n    void* tmp = realloc(settings->ReceivedCapabilityData[type], size);\n    if (!tmp)\n        return FALSE;\n    memcpy(tmp, Stream_Buffer(sub), size);\n    settings->ReceivedCapabilityData[type] = tmp;\n} else {\n    free(settings->ReceivedCapabilityData[type]);\n    settings->ReceivedCapabilityData[type] = NULL;\n}\nsettings->ReceivedCapabilityDataSizes[type] = (UINT32)size;\n```","locations":[{"ref":"libfreerdp/core/capabilities.c:4284-4288","code":" 4284 | \t\tvoid* tmp = realloc(settings->ReceivedCapabilityData[type], size);\n 4285 | \t\tif (!tmp && (size > 0))\n 4286 | \t\t\treturn FALSE;\n 4287 | \t\tmemcpy(tmp, Stream_Buffer(sub), size);\n 4288 | \t\tsettings->ReceivedCapabilityData[type] = tmp;","lines":5}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`CreateMutexA` in winpr/libwinpr/synch/mutex.c (line 136) initialises a mutex with\n`pthread_mutex_init(&mutex->mutex, &attr)` but ignores the return value. POSIX specifies\nthat `pthread_mutex_init` can fail (e.g. ENOMEM). If it fails the mutex handle is returned\nto the caller anyway with an uninitialised `pthread_mutex_t`, and any subsequent lock/unlock\nwill exhibit undefined behaviour. The same pattern exists for `pthread_mutexattr_init` and\n`pthread_mutexattr_settype` on lines 133-135.","fix":"Check return values of pthread_mutexattr_init, pthread_mutexattr_settype, and\npthread_mutex_init; free the WINPR_MUTEX allocation and return NULL on failure.","locations":[{"ref":"winpr/libwinpr/synch/mutex.c:122-149","code":"  122 | HANDLE CreateMutexA(LPSECURITY_ATTRIBUTES lpMutexAttributes, BOOL bInitialOwner, LPCSTR lpName)\n  123 | {\n  124 | \tHANDLE handle = nullptr;\n  125 | \tWINPR_MUTEX* mutex = nullptr;\n  126 | \tmutex = (WINPR_MUTEX*)calloc(1, sizeof(WINPR_MUTEX));\n  127 | \n  128 | \tif (lpMutexAttributes)\n  129 | \t\tWLog_WARN(TAG, \"[%s] does not support lpMutexAttributes\", lpName);\n  130 | \n  131 | \tif (mutex)\n  132 | \t{\n  133 | \t\tpthread_mutexattr_t attr;\n  134 | \t\tpthread_mutexattr_init(&attr);\n  135 | \t\tpthread_mutexattr_settype(&attr, PTHREAD_MUTEX_RECURSIVE);\n  136 | \t\tpthread_mutex_init(&mutex->mutex, &attr);\n  137 | \t\tWINPR_HANDLE_SET_TYPE_AND_MODE(mutex, HANDLE_TYPE_MUTEX, WINPR_FD_READ);\n  138 | \t\tmutex->common.ops = &ops;\n  139 | \t\thandle = (HANDLE)mutex;\n  140 | \n  141 | \t\tif (bInitialOwner)\n  142 | \t\t\tpthread_mutex_lock(&mutex->mutex);\n  143 | \n  144 | \t\tif (lpName)\n  145 | \t\t\tmutex->name = strdup(lpName); /* Non runtime relevant information, skip nullptr check */\n  146 | \t}\n  147 | \n  148 | \treturn handle;\n  149 | }","lines":28}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In WSAIoctl() (WSAIOCTL_IFADDRS path, Apple/macOS), when iterating over network interfaces, the buffer bound check 'numInterfaces < maxNumInterfaces' is missing. If the caller provides an output buffer sized for fewer INTERFACE_INFO entries than there are interfaces, the code writes beyond the end of lpvOutBuffer.","fix":"Add a bounds check 'if (numInterfaces >= maxNumInterfaces) break;' (or 'continue') at the top of the for loop, matching the non-Apple path which already guards with 'numInterfaces < maxNumInterfaces'.","locations":[{"ref":"winpr/libwinpr/winsock/winsock.c:841-912","code":"  841 | \t\tfor (struct ifaddrs* ifa = ifap; ifa; ifa = ifa->ifa_next)\n  842 | \t\t{\n  843 | \t\t\tpInterface = &pInterfaces[index];\n  844 | \t\t\tpAddress = (struct sockaddr_in*)&pInterface->iiAddress;\n  845 | \t\t\tpBroadcast = (struct sockaddr_in*)&pInterface->iiBroadcastAddress;\n  846 | \t\t\tpNetmask = (struct sockaddr_in*)&pInterface->iiNetmask;\n  847 | \t\t\tnFlags = 0;\n  848 | \n  849 | \t\t\tif (ifa->ifa_flags & IFF_UP)\n  850 | \t\t\t\tnFlags |= _IFF_UP;\n  851 | \n  852 | \t\t\tif (ifa->ifa_flags & IFF_BROADCAST)\n  853 | \t\t\t\tnFlags |= _IFF_BROADCAST;\n  854 | \n  855 | \t\t\tif (ifa->ifa_flags & IFF_LOOPBACK)\n  856 | \t\t\t\tnFlags |= _IFF_LOOPBACK;\n  857 | \n  858 | \t\t\tif (ifa->ifa_flags & IFF_POINTOPOINT)\n  859 | \t\t\t\tnFlags |= _IFF_POINTTOPOINT;\n  860 | \n  861 | \t\t\tif (ifa->ifa_flags & IFF_MULTICAST)\n  862 | \t\t\t\tnFlags |= _IFF_MULTICAST;\n  863 | \n  864 | \t\t\tpInterface->iiFlags = nFlags;\n  865 | \n  866 | \t\t\tif (ifa->ifa_addr)\n  867 | \t\t\t{\n  868 | \t\t\t h no upper bound) waiting for\nall peer threads to exit. If a peer thread deadlocks or hangs, pf_server_free never\nreturns and the process cannot shut down cleanly.","fix":"Add a maximum wait time (e.g. 30 iterations = 3 seconds). After the deadline, log a\nwarning and proceed with cleanup anyway, accepting that some resources may leak rather\nthan hanging forever.","locations":[{"ref":"server/proxy/pf_server.c:1133-1145","code":" 1133 | \tif (server->peer_list)\n 1134 | \t{\n 1135 | \t\twhile (ArrayList_Count(server->peer_list) > 0)\n 1136 | \t\t{\n 1137 | \t\t\t/* pf_server_stop triggers the threads to shut down.\n 1138 | \t\t\t * loop here until all of them stopped.\n 1139 | \t\t\t *\n 1140 | \t\t\t * This must be done before ArrayList_Free otherwise the thread removal\n 1141 | \t\t\t * in pf_server_handle_peer will deadlock due to both threads trying to\n 1142 | \t\t\t * lock the list.\n 1143 | \t\t\t */\n 1144 | \t\t\tSleep(100);\n 1145 | \t\t}","lines":13}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"Under the disabled `#if defined(WITH_LICENSE_DECRYPT_CHALLENGE_RESPONSE)` guard (the macro is\nnever defined - the only reference at line 51 is commented out), lines 2747 and 2763 call\n`license_check_stream_length` with 3 arguments instead of the required 4. The function\nsignature is `(wLog*, wStream*, SSIZE_T, const char*)`, but the calls pass `(wStream*, SSIZE_T,\nconst char*)`, treating the stream pointer as a log pointer. If this guard were ever enabled,\nit would produce a compile error or undefined behavior at runtime.","fix":"Fix both calls to pass the logger as first argument:\n  `license_check_stream_length(license->log, s, 8, \"PLATFORM_CHALLENGE_RESPONSE_DATA\")`\n  `license_check_stream_length(license->log, s, cbChallenge, \"PLATFORM_CHALLENGE_RESPONSE_DATA::pbChallenge\")`\nAlso add a build test or CI job that compiles with WITH_LICENSE_DECRYPT_CHALLENGE_RESPONSE to\nprevent this dead cod <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report &mdash; FreeRDP</h1>
    <div class="meta">Generated 2026-06-13 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="project-info"><div class="pi-name">FreeRDP</div><div class="pi-row"><a class="pi-repo-btn" href="https://github.com/FreeRDP/FreeRDP" target="_blank" rel="noopener">&#128279; https://github.com/FreeRDP/FreeRDP</a><span><span class="pi-k">branch</span> <code>master</code></span><span><span class="pi-k">commit</span> <a href="https://github.com/FreeRDP/FreeRDP/commit/d3d46b07bcc126be43a59aeb2598935c83d67e81" target="_blank" rel="noopener"><code>d3d46b07bc</code></a></span></div></div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
