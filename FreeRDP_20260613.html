<script type="application/json" id="D">[{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"wlf_request_clone does a shallow struct copy (*copy = *other) but only deep-copies\nresponseMime. The responseFile field (FILE*) is copied by value, so both the original\nand the clone hold the same FILE* pointer. wlf_request_free closes responseFile\n(fclose). If the ArrayList clones the object and later frees both, the FILE* is closed\ntwice (double-fclose), causing undefined behaviour and potential corruption of the C\nstdio state.","fix":"After shallow-copying, set copy->responseFile = nullptr so the clone does not own the\nfile handle. If the clone genuinely needs to write to the same fd, dup() the fd and\nfdopen the duplicate.","locations":[{"ref":"client/Wayland/wlf_cliprdr.c:121-137","code":"  121 | static void* wlf_request_clone(const void* oth)\n  122 | {\n  123 | \tconst wlf_request* other = (const wlf_request*)oth;\n  124 | \twlf_request* copy = wlf_request_new();\n  125 | \tif (!copy)\n  126 | \t\treturn nullptr;\n  127 | \t*copy = *other;\n  128 | \tif (other->responseMime)\n  129 | \t{\n  130 | \t\tcopy->responseMime = _strdup(other->responseMime);\n  131 | \t\tif (!copy->responseMime)\n  132 | \t\t\tgoto fail;\n  133 | \t}\n  134 | \treturn copy;\n  135 | fail:\n  136 | \twlf_request_free(copy);\n  137 | \treturn nullptr;","lines":17}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In wlf_cliprdr_server_format_data_request, when the requested format is a file list,\ncliprdr_serialize_file_list_ex allocates a buffer into ddata. On the success path the\nfunction jumps to the 'fail' label (despite success) and then calls\nwlf_cliprdr_send_data_response(clipboard, ddata, dsize). The response function does not\ntake ownership of ddata, and ddata is never freed, leaking the serialized file-list\nbuffer on every file clipboard transfer.","fix":"Free ddata after wlf_cliprdr_send_data_response returns.","locations":[{"ref":"client/Wayland/wlf_cliprdr.c:805-818","code":"  805 | \t\tif (fileFormatId == formatId)\n  806 | \t\t{\n  807 | \t\t\tconst UINT32 flags = cliprdr_file_context_remote_get_flags(clipboard->file);\n  808 | \t\t\tconst UINT32 error = cliprdr_serialize_file_list_ex(\n  809 | \t\t\t    flags, (const FILEDESCRIPTORW*)data, len / sizeof(FILEDESCRIPTORW), &ddata, &dsize);\n  810 | \t\t\tif (error)\n  811 | \t\t\t\tgoto fail;\n  812 | \t\t}\n  813 | \t}\n  814 | fail:\n  815 | \tClipboardUnlock(clipboard->system);\n  816 | \trc = wlf_cliprdr_send_data_response(clipboard, ddata, dsize);\n  817 | \tfree(data);\n  818 | \treturn rc;","lines":14}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"In drdynvc_process_create_request(), data_out is allocated via StreamPool_Take at line 1299, and\nthen Stream_Write_UINT8 is called on it. The next statement is:\n  if (!Stream_SetPosition(s, 1))\n      return ERROR_INVALID_DATA;\nThis early return does not release data_out back to the stream pool, leaking the pooled stream\nobject. All other error paths further down the function do release data_out.","fix":"Replace the bare return with a pool release:\n  if (!Stream_SetPosition(s, 1))\n  {\n      Stream_Release(data_out);\n      return ERROR_INVALID_DATA;\n  }","locations":[{"ref":"channels/drdynvc/client/drdynvc_main.c:1299-1308","code":" 1299 | \tdata_out = StreamPool_Take(dvcman->pool, pos + 4);\n 1300 | \tif (!data_out)\n 1301 | \t{\n 1302 | \t\tWLog_Print(drdynvc->log, WLOG_ERROR, \"StreamPool_Take failed!\");\n 1303 | \t\treturn CHANNEL_RC_NO_MEMORY;\n 1304 | \t}\n 1305 | \n 1306 | \tStream_Write_UINT8(data_out, (CREATE_REQUEST_PDU << 4) | cbChId);\n 1307 | \tif (!Stream_SetPosition(s, 1))\n 1308 | \t\treturn ERROR_INVALID_DATA;","lines":10}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"In zgfx_compress(), a wStream is allocated via Stream_New() and then freed with Stream_Free(s, FALSE)\n(FALSE means do not free the inner buffer). The buffer pointer is returned through *ppDstData. If\nzgfx_compress_to_stream() returns an error (status < 0), *ppDstData is never set, yet Stream_Free is\nstill called with FALSE leaving the buffer unfreed. Conversely, if status >= 0 the buffer is passed\nto the caller who owns it, but the wStream shell is freed here. The shell itself is not leaked but the\nerror path leaves the internal buffer allocated with no owner.","fix":"On error, free the inner buffer before returning:\n  if (status < 0) {\n      Stream_Free(s, TRUE);  /* TRUE to also free the buffer */\n  } else {\n      (*ppDstData) = Stream_Buffer(s);\n      Stream_Free(s, FALSE);\n  }","locations":[{"ref":"libfreerdp/codec/zgfx.c:601-613","code":"  601 | \twStream* s = Stream_New(nullptr, SrcSize);\n  602 | \tstatus = zgfx_compress_to_stream(zgfx, s, pSrcData, SrcSize, pFlags);\n  603 | \tconst size_t pos = Stream_GetPosition(s);\n  604 | \tif (pos > UINT32_MAX)\n  605 | \t\tstatus = -1;\n  606 | \telse\n  607 | \t{\n  608 | \t\t(*ppDstData) = Stream_Buffer(s);\n  609 | \t\t(*pDstSize) = (UINT32)pos;\n  610 | \t}\n  611 | \tStream_Free(s, FALSE);\n  612 | \treturn status;\n  613 | }","lines":13}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In UwacWindowShmAllocBuffers() (uwac-window.c), the loop that creates Wayland buffers initializes pixman/region16 damage regions for each buffer slot. If the loop is aborted early because 'offset > INT32_MAX' (line 395-396), the function jumps to 'error_mmap' which only closes the fd and returns an error. The wl_shm_pool_create_buffer calls and listener_data allocations for already-created buffers in the same call are skipped, and the damage regions that were already initialized are never cleaned up.","fix":"Before jumping to error_mmap, destroy any wl_buffer objects and uninit damage regions that were already initialized in the current loop iteration.","locations":[{"ref":"uwac/libuwac/uwac-window.c:383-411","code":"  383 | \tfor (uint64_t i = 0; i < nbuffers; i++)\n  384 | \t{\n  385 | \t\tconst size_t idx = (size_t)i;\n  386 | \t\tconst size_t bufferIdx = w->nbuffers + idx;\n  387 | \t\tUwacBuffer* buffer = &w->buffers[bufferIdx];\n  388 | \n  389 | #ifdef UWAC_HAVE_PIXMAN_REGION\n  390 | \t\tpixman_region32_init(&buffer->damage);\n  391 | #else\n  392 | \t\tregion16_init(&buffer->damage);\n  393 | #endif\n  394 | \t\tconst size_t offset = allocSize * idx;\n  395 | \t\tif (offset > INT32_MAX)\n  396 | \t\t\tgoto error_mmap;\n  397 | \n  398 | \t\tbuffer->data = &((char*)data)[allocSize * idx];\n  399 | \t\tbuffer->size = allocSize;\n  400 | \t\tbuffer->wayland_buffer = wl_shm_pool_create_buffer(pool, (int32_t)offset, (int32_t)width,\n  401 | \t\t                                                   (int32_t)height, w->stride, format);\n  402 | \t\tUwacBufferReleaseData* listener_data = xmalloc(sizeof(UwacBufferReleaseData));\n  403 | \t\tlistener_data->window = w;\n  404 | \t\tlistener_data->bufferIdx = bufferIdx;\n  405 | \t\twl_buffer_add_listener(buffer->wayland_buffer, &buffer_listener, listener_data);\n  406 | \t}\n  407 | \n  408 | \twl_shm_pool_destroy(pool);\n  409 | \tw->nbuffers += nbuffers;\n  410 | error_mmap:\n  411 | \tclose(fd);","lines":29}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In winpr_Cipher_BytesToKey() (mbedtls path), when mbedtls_hmac_drbg_seed() fails (returns non-zero at line 66), the function immediately returns -1 without calling mbedtls_entropy_free(&entropy) or mbedtls_hmac_drbg_free(&hmac_drbg). Both contexts have been initialised and must be freed.","fix":"After the seed failure check, call mbedtls_hmac_drbg_free(&hmac_drbg) and mbedtls_entropy_free(&entropy) before returning -1.","locations":[{"ref":"winpr/libwinpr/crypto/cipher.c:65-67","code":"   65 |  */\n   66 | \n   67 | struct winpr_rc4_ctx_private_st","lines":3}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"FileHandle_New() calls _strdup() for pFile->lpFileName but does not check whether the allocation succeeded. If _strdup returns nullptr (OOM), the NULL pointer is silently stored in pFile->lpFileName; subsequent code that dereferences it (e.g. log_error_) will crash. The allocation failure also goes unreported to the caller.","fix":"Check the result of _strdup and on failure free(pFile) and return nullptr.","locations":[{"ref":"winpr/libwinpr/file/file.c:1044-1047","code":" 1044 | \tpFile->lpFileName = _strdup(name);\n 1045 | \n 1046 | \tWINPR_HANDLE_SET_TYPE_AND_MODE(pFile, HANDLE_TYPE_FILE, WINPR_FD_READ);\n 1047 | \treturn pFile;","lines":4}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In GetFullPathNameA() (UWP path), when malloc(nBufferLengthW) fails (line 1393), the function returns 0 but lpFileNameW allocated just above (line 1387) is never freed.","fix":"Free lpFileNameW before the early return at line 1394: 'free(lpFileNameW); return 0;'.","locations":[{"ref":"winpr/libwinpr/file/file.c:1387-1394","code":" 1387 | \tlpFileNameW = ConvertUtf8ToWCharAlloc(lpFileName, nullptr);\n 1388 | \tif (!lpFileNameW)\n 1389 | \t\treturn 0;\n 1390 | \n 1391 | \tlpBufferW = (WCHAR*)malloc(nBufferLengthW);\n 1392 | \n 1393 | \tif (!lpBufferW)\n 1394 | \t\treturn 0;","lines":8}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In tsmf_ifman_update_geometry_info(), cbVisibleRect is read as a UINT32 from the network stream,\nthen num_rects is computed as cbVisibleRect / 16. A large cbVisibleRect causes two problems:\n1. calloc(num_rects, sizeof(RECTANGLE_32)) with a server-controlled num_rects can exhaust memory.\n2. The loop then reads num_rects * 16 bytes from the stream with no prior\n   Stream_CheckAndLogRequiredLengthOfSize call, so if the stream is shorter than claimed, the\n   Stream_Read_UINT32 calls read past the end of valid data.\nThis is reachable from an unauthenticated server connection, making it a reliable way to read\nout-of-bounds heap data or crash the client.","fix":"Before the calloc, validate both the available stream data and a sane upper bound:\n  if (!Stream_CheckAndLogRequiredLengthOfSize(TAG, ifman->input, num_rects, 16))\n      return ERROR_INVALID_DATA;\nAlso enforce a reasonable cap, e.g.:\n  if (num_rects > 1024)\n      return ERROR_INVALID_DATA;","locations":[{"ref":"channels/tsmf/client/tsmf_ifman.c:511-531","code":"  511 | \tStream_Read_UINT32(ifman->input, cbVisibleRect);\n  512 | \tconst UINT32 num_rects = cbVisibleRect / 16;\n  513 | \tDEBUG_TSMF(\"numGeometryInfo %\" PRIu32 \" Width %\" PRIu32 \" Height %\" PRIu32 \" Left %\" PRIu32\n  514 | \t           \" Top %\" PRIu32 \" cbVisibleRect %\" PRIu32 \" num_rects %d\",\n  515 | \t           numGeometryInfo, Width, Height, Left, Top, cbVisibleRect, num_rects);\n  516 | \n  517 | \tif (num_rects > 0)\n  518 | \t{\n  519 | \t\trects = (RECTANGLE_32*)calloc(num_rects, sizeof(RECTANGLE_32));\n  520 | \n  521 | \t\tfor (size_t i = 0; i < num_rects; i++)\n  522 | \t\t{\n  523 | \t\t\tStream_Read_UINT32(ifman->input, rects[i].top);    /* Top */\n  524 | \t\t\tStream_Read_UINT32(ifman->input, rects[i].left);   /* Left */\n  525 | \t\t\tStream_Read_UINT32(ifman->input, rects[i].height); /* Bottom */\n  526 | \t\t\tStream_Read_UINT32(ifman->input, rects[i].width);  /* Right */\n  527 | \t\t\trects[i].width -= rects[i].left;\n  528 | \t\t\trects[i].height -= rects[i].top;\n  529 | \t\t\tDEBUG_TSMF(\"rect %d: %\" PRId16 \" %\" PRId16 \" %\" PRId16 \" %\" PRId16 \"\", i, rects[i].x,\n  530 | \t\t\t           rects[i].y, rects[i].width, rects[i].height);\n  531 | \t\t}","lines":21}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In mppc_decompress(), after computing SrcPtr = &HistoryBuffer[(index) & 0xFFFF], the code copies\nLengthOfMatch bytes via a raw do-while loop (*HistoryPtr++ = *SrcPtr++) with no bounds check on\nSrcPtr. SrcPtr can start anywhere in [HistoryBuffer, HistoryBuffer+65535] and advances up to\nLengthOfMatch (max 65535) steps, potentially reading up to ~128 KB past the start of the 65536-byte\nHistoryBuffer array. The only overflow guard checks HistoryPtr (the write pointer), not SrcPtr (the\nread pointer). A malicious server can craft copy-offsets and match-lengths to trigger an out-of-bounds\nread.","fix":"After computing SrcPtr, verify that SrcPtr + LengthOfMatch - 1 remains within HistoryBuffer. Because\nthe copy may wrap around a ring-buffer, either implement proper ring-buffer semantics for the read\npointer (clamping at HistoryBufferEnd and wrapping), or reject the packet when the computed range\nwould exceed the buffer:\n  if (SrcPtr + LengthOfMatch > HistoryBuffer + HistoryBufferSize)  { return -1; }","locations":[{"ref":"libfreerdp/codec/mppc.c:414-426","code":"  414 | \t\tif ((HistoryPtr + LengthOfMatch - 1) > HistoryBufferEnd)\n  415 | \t\t{\n  416 | \t\t\tWLog_ERR(TAG, \"history buffer overflow\");\n  417 | \t\t\treturn -1005;\n  418 | \t\t}\n  419 | \n  420 | \t\tSrcPtr = &HistoryBuffer[(HistoryPtr - HistoryBuffer - CopyOffset) &\n  421 | \t\t                        (CompressionLevel ? 0xFFFF : 0x1FFF)];\n  422 | \n  423 | \t\tdo\n  424 | \t\t{\n  425 | \t\t\t*HistoryPtr++ = *SrcPtr++;\n  426 | \t\t} while (--LengthOfMatch);","lines":13}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In rdtk_font_draw_text(), the glyph array index is computed as 'text[index] - 32' with no bounds check. If the text string contains a byte value less than 32 (e.g., '\\t', '\\n', or any byte with the high bit set when 'char' is signed), the subtraction wraps to a large unsigned value and the subsequent array access 'font->glyphs[text[index] - 32]' reads out-of-bounds memory. The function rdtk_font_text_draw_size() does guard against this via the 'glyphIndex < font->glyphCount' check, but rdtk_font_draw_text() does not.","fix":"Add a bounds check before the array access: if ((uint8_t)text[index] < 32 || (uint8_t)text[index] - 32 >= font->glyphCount) continue;","locations":[{"ref":"rdtk/librdtk/rdtk_font.c:118","code":"  118 | \t\trdtkGlyph* glyph = &font->glyphs[text[index] - 32];","lines":1}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Integer underflow in ntlm_read_AuthenticateMessage when computing the ChallengeTargetInfo buffer\nsize. At line 1044, `context->ChallengeTargetInfo.cbBuffer` is assigned\n`message->NtChallengeResponse.Len - (28 + 16)` without first checking that Len >= 44.\n`NtChallengeResponse.Len` is a UINT16 read from the network; if the server sends a value below 44\n(e.g. 1), the subtraction wraps to a huge UINT32 value. That oversized cbBuffer is then passed to\n`ntlm_av_pair_get` as the bounds argument, which will happily walk off the end of the\n`NTLMv2Response.Challenge.AvPairs` allocation causing an out-of-bounds read and potential crash.","fix":"Before line 1044 add a guard:\n  if (message->NtChallengeResponse.Len < 44)\n      goto fail;\nThen the assignment `context->ChallengeTargetInfo.cbBuffer = message->NtChallengeResponse.Len - 44`\nis safe.  The constant 44 is 16 (NTProofStr) + 28 (NTLMv2_CLIENT_CHALLENGE fixed header).","locations":[{"ref":"winpr/libwinpr/sspi/NTLM/ntlm_message.c:1025-1048","code":" 1025 | \tif (message->NtChallengeResponse.Len > 0)\n 1026 | \t{\n 1027 | \t\tsize_t cbAvFlags = 0;\n 1028 | \t\twStream ssbuffer;\n 1029 | \t\twStream* snt = Stream_StaticConstInit(&ssbuffer, message->NtChallengeResponse.Buffer,\n 1030 | \t\t                                      message->NtChallengeResponse.Len);\n 1031 | \n 1032 | \t\tif (!snt)\n 1033 | \t\t\tgoto fail;\n 1034 | \n 1035 | \t\tstatus = SEC_E_INVALID_TOKEN;\n 1036 | \t\tif (!ntlm_read_ntlm_v2_response(snt, &(context->NTLMv2Response)))\n 1037 | \t\t\tgoto fail;\n 1038 | \t\tstatus = SEC_E_INTERNAL_ERROR;\n 1039 | \n 1040 | \t\tcontext->NtChallengeResponse.pvBuffer = message->NtChallengeResponse.Buffer;\n 1041 | \t\tcontext->NtChallengeResponse.cbBuffer = message->NtChallengeResponse.Len;\n 1042 | \t\tsspi_SecBufferFree(&(context->ChallengeTargetInfo));\n 1043 | \t\tcontext->ChallengeTargetInfo.pvBuffer = (void*)context->NTLMv2Response.Challenge.AvPairs;\n 1044 | \t\tcontext->ChallengeTargetInfo.cbBuffer = message->NtChallengeResponse.Len - (28 + 16);\n 1045 | \t\tCopyMemory(context->ClientChallenge, context->NTLMv2Response.Challenge.ClientChallenge, 8);\n 1046 | \t\tAvFlags =\n 1047 | \t\t    ntlm_av_pair_get(context->NTLMv2Response.Challenge.AvPairs,\n 1048 | \t\t                     context->NTLMv2Response.Challenge.cbAvPairs, MsvAvFlags, &cbAvFlags);","lines":24}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In rdpgfx_send_caps_advertise_pdu(), the UINT32 field header.pduLength is accumulated in a loop:\n  header.pduLength += RDPGFX_CAPSET_BASE_SIZE + capsSet->length;\ncapsSet->length is UINT32 and RDPGFX_CAPSET_BASE_SIZE is also a positive constant. With up to\nRDPGFX_NUMBER_CAPSETS (currently 10) iterations the overflow risk is low in practice, but there is no\nexplicit guard. If a caller ever passes a crafted pdu with capsSet->length values summing near\nUINT32_MAX, header.pduLength wraps and Stream_New is called with an undersized buffer. All subsequent\nStream_Write calls would then overflow that buffer. An explicit overflow check before each addition\nwould close the issue completely.","fix":"Add an overflow guard before the accumulation:\n  if (header.pduLength > UINT32_MAX - RDPGFX_CAPSET_BASE_SIZE - capsSet->length)\n      return ERROR_INVALID_DATA;\n  header.pduLength += RDPGFX_CAPSET_BASE_SIZE + capsSet->length;","locations":[{"ref":"channels/rdpgfx/client/rdpgfx_main.c:213-217","code":"  213 | \tfor (UINT16 index = 0; index < pdu->capsSetCount; index++)\n  214 | \t{\n  215 | \t\tconst RDPGFX_CAPSET* capsSet = &(pdu->capsSets[index]);\n  216 | \t\theader.pduLength += RDPGFX_CAPSET_BASE_SIZE + capsSet->length;\n  217 | \t}","lines":5}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In urb_select_interface_result(), the size of the USB interface descriptor response is computed as:\n  const uint32_t interface_size = 16U + (MsInterface->NumberOfPipes * 20U);\nMsInterface->NumberOfPipes is UINT32. When NumberOfPipes >= 214748365 (approximately UINT32_MAX/20),\nthe multiplication overflows UINT32, wrapping to a small value. The resulting interface_size is\nundersized relative to the actual data written in subsequent loops. The variable is then used to\nsize the stream and is cast to uint16_t via WINPR_ASSERTING_INT_CAST, which would assert/truncate\nfurther. NumberOfPipes comes from USB device descriptors supplied by the server, so a malicious\nserver can trigger this.","fix":"Guard the multiplication:\n  if (MsInterface->NumberOfPipes > (UINT32_MAX - 16U) / 20U)\n      return ERROR_INVALID_DATA;\n  const uint32_t interface_size = 16U + (MsInterface->NumberOfPipes * 20U);","locations":[{"ref":"channels/urbdrc/client/data_transfer.c:593-601","code":"  593 | \tconst uint32_t interface_size = 16U + (MsInterface->NumberOfPipes * 20U);\n  594 | \twStream* out =\n  595 | \t    create_urb_completion_message(InterfaceId, MessageId, RequestId, URB_COMPLETION_NO_DATA);\n  596 | \n  597 | \tif (!out)\n  598 | \t\treturn ERROR_OUTOFMEMORY;\n  599 | \n  600 | \tconst uint32_t size = 8U + interface_size;\n  601 | \tconst uint16_t usize = WINPR_ASSERTING_INT_CAST(uint16_t, size);","lines":9}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In `bitmap_cache_put` (libfreerdp/cache/bitmap.c line 246) the cell-id bound check uses\n`id > bitmapCache->maxCells` (strictly greater), while `bitmap_cache_get` (line 224) correctly\nuses `id >= bitmapCache->maxCells`. The asymmetry means `bitmap_cache_put` will accept\n`id == bitmapCache->maxCells` as valid and index `cells[maxCells]`, which is the intentionally\nminimal extra slot allocated for the \"off-by-one old server\" case with number == 0. When a server\nsends index > 0 together with id == maxCells the put succeeds with `index > 0` checked against\n`cells[maxCells].number` which is 0, so `index > 0` is true and the call is rejected. However the\ninitial `id > maxCells` vs `id >= maxCells` inconsistency is a latent logic bug.","fix":"Change line 246 from `if (id > bitmapCache->maxCells)` to\n`if (id >= bitmapCache->maxCells)` to match the symmetric check in bitmap_cache_get\n(the extra slot is still reachable via the BITMAP_CACHE_WAITING_LIST_INDEX path which\nexplicitly redirects to index == number).","locations":[{"ref":"libfreerdp/cache/bitmap.c:244-263","code":"  244 | BOOL bitmap_cache_put(rdpBitmapCache* bitmapCache, UINT32 id, UINT32 index, rdpBitmap* bitmap)\n  245 | {\n  246 | \tif (id > bitmapCache->maxCells)\n  247 | \t{\n  248 | \t\tWLog_ERR(TAG, \"put invalid bitmap cell id: %\" PRIu32 \"\", id);\n  249 | \t\treturn FALSE;\n  250 | \t}\n  251 | \n  252 | \tif (index == BITMAP_CACHE_WAITING_LIST_INDEX)\n  253 | \t{\n  254 | \t\tindex = bitmapCache->cells[id].number;\n  255 | \t}\n  256 | \telse if (index > bitmapCache->cells[id].number)\n  257 | \t{\n  258 | \t\tWLog_ERR(TAG, \"put invalid bitmap index %\" PRIu32 \" in cell id: %\" PRIu32 \"\", index, id);\n  259 | \t\treturn FALSE;\n  260 | \t}\n  261 | \n  262 | \tbitmapCache->cells[id].entries[index] = bitmap;\n  263 | \treturn TRUE;","lines":20}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In clear_decompress_subcode_rlex(), startIndex is computed as 'startIndex = stopIndex - suiteDepth'\nwhere both variables are BYTE (uint8_t). When suiteDepth > stopIndex the subtraction wraps around\n(unsigned byte underflow), yielding a large startIndex. The subsequent check\n'if (startIndex >= paletteCount)' does catch the case where the wrapped value >= paletteCount, but\nonly if paletteCount <= the wrapped value. If suiteDepth = stopIndex+1 and paletteCount = 127,\nstartIndex would be 255 >= 127, so the check fires - however there is a brief window where the\noverflow goes undetected if paletteCount is small and the wrapped value happens to be less than it\n(for example stopIndex=1, suiteDepth=3, paletteCount=253: startIndex = 254, which is < 255 but\nstill wrong). The correct check is to verify stopIndex >= suiteDepth before the subtraction.","fix":"Add an explicit underflow check before the subtraction:\n  if (stopIndex < suiteDepth) {\n      WLog_Print(log, WLOG_ERROR, \"suiteDepth %\" PRIu8 \" > stopIndex %\" PRIu8, suiteDepth, stopIndex);\n      return FALSE;\n  }\n  startIndex = stopIndex - suiteDepth;","locations":[{"ref":"libfreerdp/codec/clear.c:214-241","code":"  214 | \t\tsuiteDepth = (tmp >> numBits) & CLEAR_8BIT_MASKS[(8 - numBits)];\n  215 | \t\tstopIndex = tmp & CLEAR_8BIT_MASKS[numBits];\n  216 | \t\tstartIndex = stopIndex - suiteDepth;\n  217 | \n  218 | \t\tif (runLengthFactor >= 0xFF)\n  219 | \t\t{\n  220 | \t\t\tif (!Stream_CheckAndLogRequiredLengthWLog(log, s, 2))\n  221 | \t\t\t\treturn FALSE;\n  222 | \n  223 | \t\t\tStream_Read_UINT16(s, runLengthFactor);\n  224 | \t\t\tbitmapDataOffset += 2;\n  225 | \n  226 | \t\t\tif (runLengthFactor >= 0xFFFF)\n  227 | \t\t\t{\n  228 | \t\t\t\tif (!Stream_CheckAndLogRequiredLengthWLog(log, s, 4))\n  229 | \t\t\t\t\treturn FALSE;\n  230 | \n  231 | \t\t\t\tStream_Read_UINT32(s, runLengthFactor);\n  232 | \t\t\t\tbitmapDataOffset += 4;\n  233 | \t\t\t}\n  234 | \t\t}\n  235 | \n  236 | \t\tif (startIndex >= paletteCount)\n  237 | \t\t{\n  238 | \t\t\tWLog_Print(log, WLOG_ERROR, \"startIndex %\" PRIu8 \" > paletteCount %\" PRIu8 \"]\",\n  239 | \t\t\t           startIndex, paletteCount);\n  240 | \t\t\treturn FALSE;\n  241 | \t\t}","lines":28}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In freerdp_bitmap_planar_compress_planes_rle() the variable outPlanesSize is computed as\n'UINT32 outPlanesSize = width * height * 4'. With width and height both being UINT32, when\nwidth * height exceeds UINT32_MAX/4 (approximately 1 billion pixels) the multiplication overflows\nsilently, producing a smaller-than-expected size. Subsequent plane compression functions receive this\ntruncated size as the output buffer limit, allowing writes beyond the buffer.","fix":"Use a checked 64-bit product:\n  if (width > UINT32_MAX / 4 / (height ? height : 1))  return FALSE;\n  const UINT64 outPlanesSizeU64 = (UINT64)width * height * 4;\n  if (outPlanesSizeU64 > UINT32_MAX)  return FALSE;\n  UINT32 outPlanesSize = (UINT32)outPlanesSizeU64;","locations":[{"ref":"libfreerdp/codec/planar.c:1430","code":" 1430 | \tUINT32 outPlanesSize = width * height * 4;","lines":1}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In progressive_surface_context_new(), gridWidth and gridHeight are computed from attacker-controlled\nUINT32 width and height parameters:\n  gridWidth  = (width  + (64 - width  % 64)) / 64\n  gridHeight = (height + (64 - height % 64)) / 64\n  gridSize   = gridWidth * gridHeight\n\nWhen width = 0xFFFFFF3F (or any value where width % 64 == 63), the expression\n'width + (64 - 63) = width + 1' overflows UINT32, yielding 0, so gridWidth = 0 and gridSize = 0.\nThe WINPR_ASSERT(surface->gridSize > 0) in progressive_allocate_tile_cache() then terminates the\nprocess. Additionally, for large but non-overflowing dimensions, gridWidth * gridHeight can itself\noverflow UINT32.","fix":"Cap or validate width/height before computing grid dimensions (RDP protocol already limits surface\ndimensions). Also use 64-bit arithmetic for the product:\n  if (width == 0 || height == 0) return nullptr;\n  const UINT64 gw = ((UINT64)width  + 63) / 64;\n  const UINT64 gh = ((UINT64)height + 63) / 64;\n  if (gw > UINT32_MAX || gh > UINT32_MAX || gw * gh > UINT32_MAX) return nullptr;\n  surface->gridWidth  = (UINT32)gw;\n  surface->gridHeight = (UINT32)gh;\n  surface->gridSize   = (UINT32)(gw * gh);","locations":[{"ref":"libfreerdp/codec/progressive.c:447-449","code":"  447 | \tsurface->gridWidth = (width + (64 - width % 64)) / 64;\n  448 | \tsurface->gridHeight = (height + (64 - height % 64)) / 64;\n  449 | \tsurface->gridSize = surface->gridWidth * surface->gridHeight;","lines":3}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`rdstls_write_string` at line 253 writes a UINT16 length field computed as\n`(UINT16)length * sizeof(WCHAR)`. The cast `(UINT16)length` silently truncates `length` (a\n`size_t`) before multiplying by 2. For a string longer than 32767 characters, the written\nlength field is wrong (truncated), while the actual UTF-16 data written by\n`Stream_Write_UTF16_String_From_UTF8` at line 258 uses the untruncated `length`. This produces\na malformed RDSTLS PDU where the declared length disagrees with the actual data.","fix":"Move the overflow check before the cast:\n```c\nif (length > UINT16_MAX / sizeof(WCHAR))\n    return -1;\nStream_Write_UINT16(s, (UINT16)(length * sizeof(WCHAR)));\n```","locations":[{"ref":"libfreerdp/core/rdstls.c:251-259","code":"  251 | \tconst size_t length = (strlen(str) + 1);\n  252 | \n  253 | \tStream_Write_UINT16(s, (UINT16)length * sizeof(WCHAR));\n  254 | \n  255 | \tif (!Stream_EnsureRemainingCapacity(s, length * sizeof(WCHAR)))\n  256 | \t\treturn -1;\n  257 | \n  258 | \tif (Stream_Write_UTF16_String_From_UTF8(s, length, str, length, TRUE) < 0)\n  259 | \t\treturn -1;","lines":9}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`process_rop` in gdi/bitmap.c uses a fixed-size stack of 10 UINT32 entries but never checks\n`stackp` against the stack bound before writing. The ROP string is derived from the server-supplied\nDWORD ROP code via `gdi_rop_to_string`. Although the largest valid ROP-3 expression that can be\nproduced is bounded, if an unrecognized or crafted ROP code maps to a malformed string longer than\n10 push operations the write `stack[stackp++] = ...` at lines 243/247/251/255/259 will silently\noverflow the array. Reading from `stack[0]` when stackp is 0 also reads uninitialized memory.","fix":"Add bounds checks:\n  - Before each `stack[stackp++] = ...` push: assert or check `stackp < ARRAYSIZE(stack)`.\n  - At the return: check `stackp >= 1` before returning `stack[0]`, returning 0 otherwise.","locations":[{"ref":"libfreerdp/gdi/bitmap.c:231-284","code":"  231 | static UINT32 process_rop(UINT32 src, UINT32 dst, UINT32 pat, const char* rop, UINT32 format)\n  232 | {\n  233 | \tUINT32 stack[10] = WINPR_C_ARRAY_INIT;\n  234 | \tUINT32 stackp = 0;\n  235 | \n  236 | \twhile (*rop != '\\0')\n  237 | \t{\n  238 | \t\tchar op = *rop++;\n  239 | \n  240 | \t\tswitch (op)\n  241 | \t\t{\n  242 | \t\t\tcase '0':\n  243 | \t\t\t\tstack[stackp++] = FreeRDPGetColor(format, 0, 0, 0, 0xFF);\n  244 | \t\t\t\tbreak;\n  245 | \n  246 | \t\t\tcase '1':\n  247 | \t\t\t\tstack[stackp++] = FreeRDPGetColor(format, 0xFF, 0xFF, 0xFF, 0xFF);\n  248 | \t\t\t\tbreak;\n  249 | \n  250 | \t\t\tcase 'D':\n  251 | \t\t\t\tstack[stackp++] = dst;\n  252 | \t\t\t\tbreak;\n  253 | \n  254 | \t\t\tcase 'S':\n  255 | \t\t\t\tstack[stackp++] = src;\n  256 | \t\t\t\tbreak;\n  257 | \n  258 | \t\t\tcase 'P':\n  259 | \t\t\t\tstack[stackp++] = pat;\n  260 | \t\t\t\tbreak;\n  261 | \n  262 | \t\t\tcase 'x':\n  263 | \t\t\t\top_xor(stack, &stackp);\n  264 | \t\t\t\tbreak;\n  265 | \n  266 | \t\t\tcase 'a':\n  267 | \t\t\t\top_and(stack, &stackp);\n  268 | \t\t\t\tbreak;\n  269 | \n  270 | \t\t\tcase 'o':\n  271 | \t\t\t\top_or(stack, &stackp);\n  272 | \t\t\t\tbreak;\n  273 | \n  274 | \t\t\tcase 'n':\n  275 | \t\t\t\top_not(stack, &stackp);\n  276 | \t\t\t\tbreak;\n  277 | \n  278 | \t\t\tdefault:\n  279 | \t\t\t\tbreak;\n  280 | \t\t}\n  281 | \t}\n  282 | \n  283 | \treturn stack[0];\n  284 | }","lines":54}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`gfx_align_scanline` (libfreerdp/gdi/gfx.c line 78) performs unchecked UINT32 arithmetic.\n`surface->width` is computed as `gfx_align_scanline(createSurface->width, 16)` where\n`createSurface->width` is a UINT16 (0..65535). After alignment the width can reach up to 65535+15\n= 65550 which still fits in UINT32. However `surface->scanline = gfx_align_scanline(surface->width\n* 4UL, 16)` (line 1306) multiplies by 4 reaching up to ~262200, and then the allocation\n`1ull * surface->scanline * surface->height` at line 1307 can reach ~262200 * 65550 >=\n~17 GB on a 32-bit DWORD scanline field, silently overflowing `(size_t)surface->scanline *\nsurface->height` on 32-bit targets. On 64-bit targets this is harmless, but the code is\nexposed on 32-bit ARM builds.","fix":"Add explicit validation of createSurface->width and ->height against reasonable maximums\n(e.g. 8192 or FreeRDP_DesktopWidth/Height settings) before calling gfx_align_scanline.\nUse size_t arithmetic for the allocation product check.","locations":[{"ref":"libfreerdp/gdi/gfx.c:78-88","code":"   78 | static DWORD gfx_align_scanline(DWORD widthInBytes, DWORD alignment)\n   79 | {\n   80 | \tconst UINT32 align = alignment;\n   81 | \tconst UINT32 pad = align - (widthInBytes % alignment);\n   82 | \tUINT32 scanline = widthInBytes;\n   83 | \n   84 | \tif (align != pad)\n   85 | \t\tscanline += pad;\n   86 | \n   87 | \treturn scanline;\n   88 | }","lines":11},{"ref":"libfreerdp/gdi/gfx.c:1284-1315","code":" 1284 | \tsurface->width = gfx_align_scanline(createSurface->width, 16);\n 1285 | \tsurface->height = gfx_align_scanline(createSurface->height, 16);\n 1286 | \tsurface->mappedWidth = createSurface->width;\n 1287 | \tsurface->mappedHeight = createSurface->height;\n 1288 | \tsurface->outputTargetWidth = createSurface->width;\n 1289 | \tsurface->outputTargetHeight = createSurface->height;\n 1290 | \n 1291 | \tswitch (createSurface->pixelFormat)\n 1292 | \t{\n 1293 | \t\tcase GFX_PIXEL_FORMAT_ARGB_8888:\n 1294 | \t\t\tsurface->format = PIXEL_FORMAT_BGRA32;\n 1295 | \t\t\tbreak;\n 1296 | \n 1297 | \t\tcase GFX_PIXEL_FORMAT_XRGB_8888:\n 1298 | \t\t\tsurface->format = PIXEL_FORMAT_BGRX32;\n 1299 | \t\t\tbreak;\n 1300 | \n 1301 | \t\tdefault:\n 1302 | \t\t\tfree(surface);\n 1303 | \t\t\tgoto fail;\n 1304 | \t}\n 1305 | \n 1306 | \tsurface->scanline = gfx_align_scanline(surface->width * 4UL, 16);\n 1307 | \tsurface->data = (BYTE*)winpr_aligned_malloc(1ull * surface->scanline * surface->height, 16);\n 1308 | \n 1309 | \tif (!surface->data)\n 1310 | \t{\n 1311 | \t\tfree(surface);\n 1312 | \t\tgoto fail;\n 1313 | \t}\n 1314 | \n 1315 | \tmemset(surface->data, 0xFF, (size_t)surface->scanline * surface->height);","lines":32}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In uwac-input.c, xkb modifier masks are built by shifting 1u left by the return value of xkb_keymap_mod_get_index(). That function returns XKB_MOD_INVALID (0xffffffff) when a modifier name is not found. The expression '1u << 0xffffffff' is undefined behavior in C (shift count >= width of unsigned int, which is 32 bits). If any of the hard-coded modifier names (\"Control\", \"Mod1\", \"Shift\", \"Lock\", \"Mod2\") are absent from the keymap, the program has UB.","fix":"Check the return value of xkb_keymap_mod_get_index() against XKB_MOD_INVALID before computing the shift. If invalid, set the corresponding mask to 0.","locations":[{"ref":"uwac/libuwac/uwac-input.c:244-248","code":"  244 | \tinput->xkb.control_mask = 1u << xkb_keymap_mod_get_index(input->xkb.keymap, \"Control\");\n  245 | \tinput->xkb.alt_mask = 1u << xkb_keymap_mod_get_index(input->xkb.keymap, \"Mod1\");\n  246 | \tinput->xkb.shift_mask = 1u << xkb_keymap_mod_get_index(input->xkb.keymap, \"Shift\");\n  247 | \tinput->xkb.caps_mask = 1u << xkb_keymap_mod_get_index(input->xkb.keymap, \"Lock\");\n  248 | \tinput->xkb.num_mask = 1u << xkb_keymap_mod_get_index(input->xkb.keymap, \"Mod2\");","lines":5}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `ntlm_write_AuthenticateMessage` (ntlm_message.c lines 1314 and 1318), credential field lengths\nare cast to UINT16 before multiplying by sizeof(WCHAR):\n  `message->DomainName.Len = (UINT16)credentials->identity.DomainLength * sizeof(WCHAR);`\n  `message->UserName.Len   = (UINT16)credentials->identity.UserLength   * sizeof(WCHAR);`\nThe cast to UINT16 happens before the multiplication, so if DomainLength or UserLength exceeds\n32767 (UINT16_MAX / 2), the multiplication on the already-truncated value produces a length that\nis too small, causing the written field to describe fewer bytes than are actually present. This\ncorrupts the AUTHENTICATE_MESSAGE offsets and could cause authentication failure or, if somehow\na server accepts the message, a mismatch between advertised and actual buffer bounds.","fix":"Validate and cast after the multiplication:\n  const size_t domainLenBytes = (size_t)credentials->identity.DomainLength * sizeof(WCHAR);\n  if (domainLenBytes > UINT16_MAX) return SEC_E_INSUFFICIENT_MEMORY;\n  message->DomainName.Len = (UINT16)domainLenBytes;\nApply the same pattern for UserName.Len and LmChallengeResponse.Len / NtChallengeResponse.Len.","locations":[{"ref":"winpr/libwinpr/sspi/NTLM/ntlm_message.c:1311-1319","code":" 1311 | \tif (credentials->identity.DomainLength > 0)\n 1312 | \t{\n 1313 | \t\tmessage->NegotiateFlags |= NTLMSSP_NEGOTIATE_DOMAIN_SUPPLIED;\n 1314 | \t\tmessage->DomainName.Len = (UINT16)credentials->identity.DomainLength * sizeof(WCHAR);\n 1315 | \t\tmessage->DomainName.Buffer = (BYTE*)credentials->identity.Domain;\n 1316 | \t}\n 1317 | \n 1318 | \tmessage->UserName.Len = (UINT16)credentials->identity.UserLength * sizeof(WCHAR);\n 1319 | \tmessage->UserName.Buffer = (BYTE*)credentials->identity.User;","lines":9}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In remdesk_send_ctl_remote_control_desktop_pdu(), the byte length of the connection string is\ncomputed as:\n  size_t cbRaConnectionStringW = length * sizeof(WCHAR);\nwhere length is the output of ConvertUtf8ToWCharAlloc (a size_t character count). On any platform\nwhere size_t is 64-bit and length > SIZE_MAX / sizeof(WCHAR), this multiplication overflows.\nThe sibling function remdesk_send_ctl_authenticate_pdu (line ~285) does guard against this:\n  if (cbRaConnectionStringW > UINT32_MAX / sizeof(WCHAR)) { ... return ERROR_INVALID_PARAMETER; }\nbut remdesk_send_ctl_remote_control_desktop_pdu lacks the equivalent check.","fix":"Add the same guard present in the sibling function before the multiply:\n  if (length > SIZE_MAX / sizeof(WCHAR))\n      return ERROR_INVALID_PARAMETER;\n  size_t cbRaConnectionStringW = length * sizeof(WCHAR);","locations":[{"ref":"channels/remdesk/client/remdesk_main.c:349-350","code":"  349 | \tWCHAR* raConnectionStringW = ConvertUtf8ToWCharAlloc(raConnectionString, &length);\n  350 | \tsize_t cbRaConnectionStringW = length * sizeof(WCHAR);","lines":2}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`glyph_cache_fragment_get` at line 634 of libfreerdp/cache/glyph.c truncates the stored\nUINT32 size to BYTE when returning it to callers:\n  `*size = (BYTE)glyphCache->fragCache.entries[index].size;`\nThe field `FRAGMENT_CACHE_ENTRY.size` is UINT32, but the return value is silently truncated to\n8 bits. Any fragment with a size > 255 bytes will have its size report as `size & 0xFF`.\nSubsequently the GLYPH_FRAGMENT_USE loop iterates only over the truncated number of bytes,\nleaving most of the fragment unprocessed - incorrect text rendering. If size wraps to a small\nnon-zero value it may also lead to processing too few bytes and skipping valid glyph indices.","fix":"Remove the truncating cast. Change `*size = (BYTE)glyphCache->fragCache.entries[index].size;`\nto `*size = glyphCache->fragCache.entries[index].size;`. The output parameter `size` is already\nUINT32*.","locations":[{"ref":"libfreerdp/cache/glyph.c:620-642","code":"  620 | const void* glyph_cache_fragment_get(rdpGlyphCache* glyphCache, UINT32 index, UINT32* size)\n  621 | {\n  622 | \tvoid* fragment = nullptr;\n  623 | \n  624 | \tWINPR_ASSERT(glyphCache);\n  625 | \tWINPR_ASSERT(glyphCache->fragCache.entries);\n  626 | \n  627 | \tif (index > 255)\n  628 | \t{\n  629 | \t\tWLog_ERR(TAG, \"invalid glyph cache fragment index: %\" PRIu32 \"\", index);\n  630 | \t\treturn nullptr;\n  631 | \t}\n  632 | \n  633 | \tfragment = glyphCache->fragCache.entries[index].fragment;\n  634 | \t*size = (BYTE)glyphCache->fragCache.entries[index].size;\n  635 | \tWLog_Print(glyphCache->log, WLOG_DEBUG,\n  636 | \t           \"GlyphCacheFragmentGet: index: %\" PRIu32 \" size: %\" PRIu32 \"\", index, *size);\n  637 | \n  638 | \tif (!fragment)\n  639 | \t\tWLog_ERR(TAG, \"invalid glyph fragment at index:%\" PRIu32 \"\", index);\n  640 | \n  641 | \treturn fragment;\n  642 | }","lines":23}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `rdp_recv_server_redirection_pdu`, line 841 computes\n`const size_t size = TargetNetAddressesCount * sizeof(WCHAR)` where\n`TargetNetAddressesCount` is a UINT32 and `sizeof(WCHAR)` is 2. On 32-bit platforms where\n`size_t` is 32 bits, this multiplication can overflow when `TargetNetAddressesCount >\nSIZE_MAX / 2` (approximately 2 billion). The overflowed `size` then passes the sanity check\n`size > Stream_GetRemainingLength(s)` even when the count is absurdly large, allowing the\nsubsequent loop to iterate far more times than the stream contains data.","fix":"Use a checked multiplication:\n```c\nsize_t size = 0;\nif (!winpr_SizeTMult(TargetNetAddressesCount, sizeof(WCHAR), &size)) {\n    WLog_ERR(TAG, \"TargetNetAddressesCount overflow\");\n    return STATE_RUN_FAILED;\n}\n```","locations":[{"ref":"libfreerdp/core/redirection.c:841-848","code":"  841 | \t\tconst size_t size = TargetNetAddressesCount * sizeof(WCHAR);\n  842 | \t\tif ((size > Stream_GetRemainingLength(s)) || (size > targetNetAddressesLength))\n  843 | \t\t{\n  844 | \t\t\tWLog_ERR(TAG,\n  845 | \t\t\t         \"Invalid RDP_SERVER_REDIRECTION_PACKET::TargetNetAddressLength %\" PRIuz\n  846 | \t\t\t         \", sanity limit is %\" PRIuz,\n  847 | \t\t\t         TargetNetAddressesCount * sizeof(WCHAR), Stream_GetRemainingLength(s));\n  848 | \t\t\treturn STATE_RUN_FAILED;","lines":8}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","easy":true,"description":"Server-side license validation is permanently disabled via `if (FALSE)`. After a client sends a\nPLATFORM_CHALLENGE_RESPONSE packet, the code unconditionally issues a license without verifying\nthe challenge response. Any client connecting to an FreeRDP-based RDP server receives a valid\nlicense regardless of identity or credentials.","fix":"Remove the `if (FALSE)` guard. Implement the challenge response verification: decrypt\nEncryptedPlatformChallengeResponse with RC4, parse the PLATFORM_CHALLENGE_RESPONSE_DATA\nstructure, compare PlatformChallengeResponse against the stored challenge, and call\n`license_send_error_alert` with ERR_INVALID_CLIENT on mismatch. The decryption code already\nexists under the WITH_LICENSE_DECRYPT_CHALLENGE_RESPONSE guard in the same file.","locations":[{"ref":"libfreerdp/core/license.c:1050-1072","code":" 1050 | \t\tcase PLATFORM_CHALLENGE_RESPONSE:\n 1051 | \t\t\tif (!license_ensure_state(license, LICENSE_STATE_PLATFORM_CHALLENGE, bMsgType))\n 1052 | \t\t\t\tgoto fail;\n 1053 | \t\t\tif (!license_read_client_platform_challenge_response(license, s))\n 1054 | \t\t\t\tgoto fail;\n 1055 | \n 1056 | \t\t\t// TODO: validate challenge response\n 1057 | \t\t\tif (FALSE)\n 1058 | \t\t\t{\n 1059 | \t\t\t\tif (license_send_error_alert(license, ERR_INVALID_CLIENT, ST_TOTAL_ABORT,\n 1060 | \t\t\t\t                             license->ErrorInfo))\n 1061 | \t\t\t\t\tgoto fail;\n 1062 | \t\t\t}\n 1063 | \t\t\telse\n 1064 | \t\t\t{\n 1065 | \t\t\t\tif (!license_server_send_new_or_upgrade_license(license, license->update))\n 1066 | \t\t\t\t\tgoto fail;\n 1067 | \n 1068 | \t\t\t\tlicense->type = LICENSE_TYPE_ISSUED;\n 1069 | \t\t\t\tlicense_set_state(license, LICENSE_STATE_COMPLETED);\n 1070 | \n 1071 | \t\t\t\trc = STATE_RUN_CONTINUE; /* License issued, switch state */\n 1072 | \t\t\t}","lines":23}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Server-side license receive handler has two TODO stubs that silently accept any\nNEW_LICENSE_REQUEST and LICENSE_INFO packet without validation. Line 1029 has a TODO for\nvalidating whether the client is allowed to obtain a license, and line 1043 has a TODO for\nvalidating the license info against a known-good license database. Both stubs fall through to\nissuing a platform challenge, effectively skipping all client authorization checks.","fix":"Implement the TODOs: for NEW_LICENSE_REQUEST, check the client hardware ID and user/company\nfields against a policy database or allowlist before proceeding. For LICENSE_INFO, validate the\npresented license blob against the issuer and license store. Return an ERR_INVALID_CLIENT error\nalert on failure.","locations":[{"ref":"libfreerdp/core/license.c:1024-1047","code":" 1024 | \t\tcase NEW_LICENSE_REQUEST:\n 1025 | \t\t\tif (!license_ensure_state(license, LICENSE_STATE_REQUEST, bMsgType))\n 1026 | \t\t\t\tgoto fail;\n 1027 | \t\t\tif (!license_read_new_license_request_packet(license, s))\n 1028 | \t\t\t\tgoto fail;\n 1029 | \t\t\t// TODO: Validate if client is allowed\n 1030 | \t\t\tif (!license_send_error_alert(license, ERR_INVALID_MAC, ST_TOTAL_ABORT,\n 1031 | \t\t\t                              license->ErrorInfo))\n 1032 | \t\t\t\tgoto fail;\n 1033 | \t\t\tif (!license_send_platform_challenge_packet(license))\n 1034 | \t\t\t\tgoto fail;\n 1035 | \t\t\tlicense->update = FALSE;\n 1036 | \t\t\tlicense_set_state(license, LICENSE_STATE_PLATFORM_CHALLENGE);\n 1037 | \t\t\tbreak;\n 1038 | \t\tcase LICENSE_INFO:\n 1039 | \t\t\tif (!license_ensure_state(license, LICENSE_STATE_REQUEST, bMsgType))\n 1040 | \t\t\t\tgoto fail;\n 1041 | \t\t\tif (!license_read_license_info(license, s))\n 1042 | \t\t\t\tgoto fail;\n 1043 | \t\t\t// TODO: Validate license info\n 1044 | \t\t\tif (!license_send_platform_challenge_packet(license))\n 1045 | \t\t\t\tgoto fail;\n 1046 | \t\t\tlicense_set_state(license, LICENSE_STATE_PLATFORM_CHALLENGE);\n 1047 | \t\t\tlicense->update = TRUE;","lines":24}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In rdtk_surface_fill(), the per-pixel byte offset within a scanline is computed as 'line[j + 4ul]' instead of 'line[j * 4ul]'. Each pixel is 4 bytes wide (BGRA), so the correct offset for pixel j is j*4. The current code reads and writes at offset j+4, which accesses adjacent pixels at wrong positions and, for large j values, walks far off the end of the scanline into neighboring rows or beyond the allocation.","fix":"Change '(uint32_t*)&line[j + 4ul]' to '(uint32_t*)&line[j * 4ul]'.","locations":[{"ref":"rdtk/librdtk/rdtk_surface.c:36","code":"   36 | \t\t\tuint32_t* pixel = (uint32_t*)&line[j + 4ul];","lines":1}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"GetStdHandle() stores a single global WINPR_FILE* (pStdHandleFile) regardless of which standard handle is requested. After the first call the file descriptor stored inside is always whichever of stdin/stdout/stderr was requested first. Any subsequent call for a different standard handle silently returns a handle pointing to the wrong FILE* stream.","fix":"Maintain three separate global WINPR_FILE* handles - one for each standard stream - and initialise the correct one based on nStdHandle.","locations":[{"ref":"winpr/libwinpr/file/file.c:59-59","code":"   59 | static WINPR_FILE* pStdHandleFile = nullptr;","lines":1},{"ref":"winpr/libwinpr/file/file.c:1055-1079","code":" 1055 | HANDLE GetStdHandle(DWORD nStdHandle)\n 1056 | {\n 1057 | \tFILE* fp = nullptr;\n 1058 | \n 1059 | \tswitch (nStdHandle)\n 1060 | \t{\n 1061 | \t\tcase STD_INPUT_HANDLE:\n 1062 | \t\t\tfp = stdin;\n 1063 | \t\t\tbreak;\n 1064 | \t\tcase STD_OUTPUT_HANDLE:\n 1065 | \t\t\tfp = stdout;\n 1066 | \t\t\tbreak;\n 1067 | \t\tcase STD_ERROR_HANDLE:\n 1068 | \t\t\tfp = stderr;\n 1069 | \t\t\tbreak;\n 1070 | \t\tdefault:\n 1071 | \t\t\treturn INVALID_HANDLE_VALUE;\n 1072 | \t}\n 1073 | \tif (!pStdHandleFile)\n 1074 | \t\tpStdHandleFile = FileHandle_New(fp);\n 1075 | \n 1076 | \tif (!pStdHandleFile)\n 1077 | \t\treturn INVALID_HANDLE_VALUE;\n 1078 | \n 1079 | \treturn (HANDLE)pStdHandleFile;","lines":25}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In rdpgfx_recv_end_frame_pdu(), the QoE timestamp is computed as:\n  qoe.timestamp = gfx->StartDecodingTime % UINT32_MAX;\nUINT32_MAX is 0xFFFFFFFF (4294967295). Modulo by 0xFFFFFFFF maps values 0 and 0xFFFFFFFF to the\nsame result (0), meaning the value 0xFFFFFFFF can never appear in the output and 0 appears for two\ndistinct inputs. The correct truncation to 32 bits is a cast or bitmask:\n  qoe.timestamp = (UINT32)(gfx->StartDecodingTime);\nBecause StartDecodingTime is UINT64, the cast naturally wraps at 2^32, which is the intended behavior.","fix":"Replace `gfx->StartDecodingTime % UINT32_MAX` with `(UINT32)(gfx->StartDecodingTime)`.","locations":[{"ref":"channels/rdpgfx/client/rdpgfx_main.c:1385-1385","code":" 1385 | \t\t\t\tqoe.timestamp = gfx->StartDecodingTime % UINT32_MAX;","lines":1}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In xf_pointer_New, mCursors is incremented before the three realloc calls for\ncursorWidths, cursorHeights, and cursors. If the second realloc (cursorHeights) or\nthird realloc (cursors) fails and the function returns FALSE, mCursors is already set\nto the new (larger) value while at most one or two of the three arrays have been grown.\nOn the next call the partially-grown arrays are used with the inflated mCursors cap,\nleading to out-of-bounds writes.","fix":"Save the old mCursors value before incrementing it and restore it on any realloc\nfailure, or increment mCursors only after all three reallocs succeed.","locations":[{"ref":"client/X11/xf_graphics.c:153-181","code":"  153 | \t\tif (xpointer->nCursors == xpointer->mCursors)\n  154 | \t\t{\n  155 | \t\t\tvoid* tmp2 = nullptr;\n  156 | \t\t\txpointer->mCursors = (xpointer->mCursors == 0 ? 1 : xpointer->mCursors * 2);\n  157 | \n  158 | \t\t\ttmp2 = realloc(xpointer->cursorWidths, sizeof(UINT32) * xpointer->mCursors);\n  159 | \t\t\tif (!tmp2)\n  160 | \t\t\t{\n  161 | \t\t\t\txf_unlock_x11(xfc);\n  162 | \t\t\t\treturn FALSE;\n  163 | \t\t\t}\n  164 | \t\t\txpointer->cursorWidths = tmp2;\n  165 | \n  166 | \t\t\ttmp2 = realloc(xpointer->cursorHeights, sizeof(UINT32) * xpointer->mCursors);\n  167 | \t\t\tif (!tmp2)\n  168 | \t\t\t{\n  169 | \t\t\t\txf_unlock_x11(xfc);\n  170 | \t\t\t\treturn FALSE;\n  171 | \t\t\t}\n  172 | \t\t\txpointer->cursorHeights = (UINT32*)tmp2;\n  173 | \n  174 | \t\t\ttmp2 = realloc(xpointer->cursors, sizeof(Cursor) * xpointer->mCursors);\n  175 | \t\t\tif (!tmp2)\n  176 | \t\t\t{\n  177 | \t\t\t\txf_unlock_x11(xfc);\n  178 | \t\t\t\treturn FALSE;\n  179 | \t\t\t}\n  180 | \t\t\txpointer->cursors = (Cursor*)tmp2;\n  181 | \t\t}","lines":29}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`glyph_cache_fragment_put` stores whole-buffer fragments incorrectly. At line 281 of\nlibfreerdp/cache/glyph.c the GLYPH_FRAGMENT_ADD handler calls\n`glyph_cache_fragment_put(glyph_cache, id, size, data)` where `data` is the entire glyph data\nbuffer starting from its beginning, and `size` is the single byte read from `data[index-1]`.\nLater, when the fragment is replayed (GLYPH_FRAGMENT_USE), it iterates from offset 0 of the\nstored fragment treating it as a glyph index sequence. The intent is to store the current\nglyph data from a particular offset, not the whole buffer from its start. The stored `data`\npointer does not account for the current stream position, so the replayed indices will be from\nthe wrong offset, corrupting text rendering and potentially reading glyph indices that are\nout-of-range for the glyph cache.","fix":"The fragment should be stored starting at the current `index` position in `data`, not from\nthe beginning. Change the call to:\n  glyph_cache_fragment_put(glyph_cache, id, size, &data[index - size]);\nadjusting the pointer so the replayed fragment begins at the right glyph-index bytes.","locations":[{"ref":"libfreerdp/cache/glyph.c:275-282","code":"  275 | \t\t\t\tcase GLYPH_FRAGMENT_ADD:\n  276 | \t\t\t\t\tif (index + 2 > length)\n  277 | \t\t\t\t\t\tgoto fail;\n  278 | \n  279 | \t\t\t\t\tid = data[index++];\n  280 | \t\t\t\t\tsize = data[index++];\n  281 | \t\t\t\t\tglyph_cache_fragment_put(glyph_cache, id, size, data);\n  282 | \t\t\t\t\tbreak;","lines":8}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In progressive_surface_tile_replace(), zIdx is computed as\n  zIdx = tile->yIdx * surface->gridWidth + tile->xIdx\nand then compared against surface->tilesSize. However neither tile->xIdx nor tile->yIdx is validated\nindividually against gridWidth / gridHeight before the multiplication. With large yIdx (up to UINT16_MAX\n= 65535) and a small gridWidth (e.g. 1), the product yIdx*gridWidth = 65535, which then has tile->xIdx\nadded. The final zIdx < tilesSize check catches the combined result, but the intermediate multiplication\ncan still overflow size_t on 32-bit platforms (size_t is 32 bits), silently producing a small zIdx that\nbypasses the bounds check and allows writing to an arbitrary tile slot.","fix":"Validate xIdx and yIdx separately before computing zIdx:\n  if (tile->xIdx >= surface->gridWidth || tile->yIdx >= surface->gridHeight) {\n      WLog_ERR(TAG, \"tile index out of range x=%\" PRIu16 \" y=%\" PRIu16, tile->xIdx, tile->yIdx);\n      return FALSE;\n  }\n  const size_t zIdx = (size_t)tile->yIdx * surface->gridWidth + tile->xIdx;","locations":[{"ref":"libfreerdp/codec/progressive.c:471-477","code":"  471 | \tzIdx = (tile->yIdx * surface->gridWidth) + tile->xIdx;\n  472 | \n  473 | \tif (zIdx >= surface->tilesSize)\n  474 | \t{\n  475 | \t\tWLog_ERR(TAG, \"Invalid zIndex %\" PRIuz, zIdx);\n  476 | \t\treturn FALSE;\n  477 | \t}","lines":7}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`gcc_read_server_security_data` at line 1674 checks whether the server proposed an encryption\nmethod that the client did not advertise, and only emits a WLOG_WARN log message. A FIXME\ncomment acknowledges this should return FALSE. The function then applies the server's unadvertised\nencryption method at line 1682, silently downgrading or changing the negotiated security level\nwithout client consent. A malicious or misconfigured server can force the client into any\nencryption method regardless of the client's security policy.","fix":"Return FALSE when the server proposes a method outside what the client advertised:\n```c\nif (settings->UseRdpSecurityLayer && !(settings->EncryptionMethods & EncryptionMethod)) {\n    WLog_Print(mcs->log, WLOG_ERROR,\n               \"Server uses non-advertised encryption method 0x%08\" PRIX32, EncryptionMethod);\n    return FALSE;\n}\n```","locations":[{"ref":"libfreerdp/core/gcc.c:1674-1682","code":" 1674 | \tif (settings->UseRdpSecurityLayer && !(settings->EncryptionMethods & EncryptionMethod))\n 1675 | \t{\n 1676 | \t\tWLog_Print(mcs->log, WLOG_WARN,\n 1677 | \t\t           \"Server uses non-advertised encryption method 0x%08\" PRIX32 \"\",\n 1678 | \t\t           EncryptionMethod);\n 1679 | \t\t/* FIXME: Should we return FALSE; in this case ?? */\n 1680 | \t}\n 1681 | \n 1682 | \tsettings->EncryptionMethods = EncryptionMethod;","lines":9}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In tls_verify_certificate() (tls.c line 1731), when AuthenticationLevel == 0 and the connection is\nnot a gateway transport, certificate verification is entirely skipped:\n  else if (!tls->isGatewayTransport && (settings->AuthenticationLevel == 0))\n      verification_status = 1; /* success! */\n\nAuthenticationLevel=0 is a documented RDP setting (no authentication), but unlike IgnoreCertificate\n(which emits prominent DANGER warnings), this path is completely silent. An attacker performing a\nman-in-the-middle attack against a client configured with AuthenticationLevel=0 will succeed without\nany log warning, making this a certificate validation bypass that is hard for users to notice.","fix":"Add a prominent warning log message at WLOG_WARN level before accepting, matching the pattern used\nfor IgnoreCertificate. Consider whether AuthenticationLevel=0 should still verify the certificate\nchain even if hostname mismatches are tolerated.","locations":[{"ref":"libfreerdp/crypto/tls.c:1731-1732","code":" 1731 | \telse if (!tls->isGatewayTransport && (settings->AuthenticationLevel == 0))\n 1732 | \t\tverification_status = 1; /* success! */","lines":2}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"shadow_client_logon handles the ANSI case (no SEC_WINNT_AUTH_IDENTITY_UNICODE flag) by\ncalling _strdup((char*)identity->User). The SEC_WINNT_AUTH_IDENTITY structure specifies\nstring lengths via UserLength/DomainLength/PasswordLength and does NOT guarantee\nnull-termination. _strdup reads until a null byte, which may read past the end of the\nbuffer, returning a truncated or over-long string, or triggering undefined behaviour.","fix":"Use strndup(identity->User, identity->UserLength) (or an equivalent length-bounded\ncopy) for the ANSI path, mirroring the Unicode path that uses ConvertWCharNToUtf8Alloc\nwith explicit length.","locations":[{"ref":"server/shadow/shadow_client.c:776-785","code":"  776 | \t{\n  777 | \t\tif (identity->User)\n  778 | \t\t\tuser = _strdup((char*)identity->User);\n  779 | \n  780 | \t\tif (identity->Domain)\n  781 | \t\t\tdomain = _strdup((char*)identity->Domain);\n  782 | \n  783 | \t\tif (identity->Password)\n  784 | \t\t\tpassword = _strdup((char*)identity->Password);\n  785 | \t}","lines":10}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In update_key_released() (uwac-input.c), the loop counter 'i' is incremented by 1 each iteration ('i++') while the pointer 'keyPtr' advances by sizeof(uint32_t)=4 bytes each iteration ('keyPtr++'). The wl_array.size field is in bytes, so 'i' is used as an element index but it should track bytes. After the loop, 'toMove = seat->pressed_keys.size - ((i + 1) * sizeof(uint32_t))' computes the wrong number of bytes to move if the matching key is not the first element, causing memmove to copy the wrong amount and potentially underflowing the subtraction (wrapping to a huge size_t). Compare with the correct idiom used in keyboard_handle_leave() which uses 'i += sizeof(uint32_t)'.","fix":"Change the loop to 'for (; i < seat->pressed_keys.size; i += sizeof(uint32_t), keyPtr++)' so that 'i' tracks the byte offset matching wl_array semantics, and update toMove computation accordingly: 'toMove = seat->pressed_keys.size - (i + sizeof(uint32_t))'.","locations":[{"ref":"uwac/libuwac/uwac-input.c:340-358","code":"  340 | \tsize_t i = 0;\n  341 | \tuint32_t* keyPtr = seat->pressed_keys.data;\n  342 | \tfor (; i < seat->pressed_keys.size; i++, keyPtr++)\n  343 | \t{\n  344 | \t\tif (*keyPtr == key)\n  345 | \t\t{\n  346 | \t\t\tfound = true;\n  347 | \t\t\tbreak;\n  348 | \t\t}\n  349 | \t}\n  350 | \n  351 | \tif (found)\n  352 | \t{\n  353 | \t\ttoMove = seat->pressed_keys.size - ((i + 1) * sizeof(uint32_t));\n  354 | \t\tif (toMove)\n  355 | \t\t\tmemmove(keyPtr, keyPtr + 1, toMove);\n  356 | \n  357 | \t\tseat->pressed_keys.size -= sizeof(uint32_t);\n  358 | \t}","lines":19}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"SetEnvironmentVariableEBA() allocates 'length + 1' bytes for envstr (to hold an extra terminating NUL), but then passes 'length' (not 'length + 1') as the buffer size to sprintf_s(). For the lpValue != NULL case, length = strlen(lpName) + strlen(lpValue) + 2. The output of sprintf_s needs exactly that many bytes including its own NUL terminator, but since sprintf_s is given 'length' it will truncate the string by one character when the total write would reach 'length'.","fix":"Pass 'length + 1' to sprintf_s in both branches so the full string including NUL fits in the buffer.","locations":[{"ref":"winpr/libwinpr/environment/environment.c:634-640","code":"  634 | \t\tlength = (strlen(lpName) + strlen(lpValue) + 2); /* +2 because of = and \\0 */\n  635 | \t\tenvstr = (char*)malloc(length + 1);              /* +1 because of closing \\0 */\n  636 | \n  637 | \t\tif (!envstr)\n  638 | \t\t\treturn FALSE;\n  639 | \n  640 | \t\t(void)sprintf_s(envstr, length, \"%s=%s\", lpName, lpValue);","lines":7}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"FileLockFileEx() on Solaris sets lock.l_type = F_WRLCK for both the exclusive-lock branch and the shared-lock (else) branch. Shared locks (LOCKFILE_EXCLUSIVE_LOCK not set) should use F_RDLCK, not F_WRLCK, matching the non-Solaris path that uses LOCK_SH.","fix":"Change the else branch to 'lock.l_type = F_RDLCK;'.","locations":[{"ref":"winpr/libwinpr/file/file.c:470-473","code":"  470 | \tif (dwFlags & LOCKFILE_EXCLUSIVE_LOCK)\n  471 | \t\tlock.l_type = F_WRLCK;\n  472 | \telse\n  473 | \t\tlock.l_type = F_WRLCK;","lines":4}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"FileUnlockFile() and FileUnlockFileEx() never reset pFile->bLocked to FALSE after successfully unlocking the file. A second call to FileUnlockFile on the same handle will fail with 'File is not locked', even though the file was supposed to have been unlocked. This also means FileLockFileEx can never re-lock a file that was unlocked via FileUnlockFile.","fix":"Add 'pFile->bLocked = FALSE;' before the 'return TRUE;' in both FileUnlockFile and FileUnlockFileEx.","locations":[{"ref":"winpr/libwinpr/file/file.c:506-539","code":"  506 | static BOOL FileUnlockFile(HANDLE hFile, WINPR_ATTR_UNUSED DWORD dwFileOffsetLow,\n  507 |                            WINPR_ATTR_UNUSED DWORD dwFileOffsetHigh,\n  508 |                            WINPR_ATTR_UNUSED DWORD nNumberOfBytesToUnlockLow,\n  509 |                            WINPR_ATTR_UNUSED DWORD nNumberOfBytesToUnlockHigh)\n  510 | {\n  511 | \tWINPR_FILE* pFile = (WINPR_FILE*)hFile;\n  512 | #ifdef __sun\n  513 | \tstruct flock lock;\n  514 | #endif\n  515 | \n  516 | \tif (!hFile)\n  517 | \t\treturn FALSE;\n  518 | \n  519 | \tif (!pFile->bLocked)\n  520 | \t{\n  521 | \t\tWLog_ERR(TAG, \"File %s is not locked!\", pFile->lpFileName);\n  522 | \t\treturn FALSE;\n  523 | \t}\n  524 | \n  525 | #ifdef __sun\n  526 | \tlock.l_start = 0;\n  527 | \tlock.l_len = 0;\n  528 | \tlock.l_whence = SEEK_SET;\n  529 | \tlock.l_type = F_UNLCK;\n  530 | \tif (fcntl(fileno(pFile->fp), F_GETLK, &lock) == -1)\n  531 | \t\treturn log_error(\"F_GETLK\", pFile);\n  532 | \n  533 | #else\n  534 | \tif (flock(fileno(pFile->fp), LOCK_UN) < 0)\n  535 | \t\treturn log_error(\"flock\", pFile);\n  536 | #endif\n  537 | \n  538 | \treturn TRUE;\n  539 | }","lines":34},{"ref":"winpr/libwinpr/file/file.c:541-580","code":"  541 | static BOOL FileUnlockFileEx(HANDLE hFile, WINPR_ATTR_UNUSED DWORD dwReserved,\n  542 |                              WINPR_ATTR_UNUSED DWORD nNumberOfBytesToUnlockLow,\n  543 |                              WINPR_ATTR_UNUSED DWORD nNumberOfBytesToUnlockHigh,\n  544 |                              LPOVERLAPPED lpOverlapped)\n  545 | {\n  546 | \tWINPR_FILE* pFile = (WINPR_FILE*)hFile;\n  547 | #ifdef __sun\n  548 | \tstruct flock lock;\n  549 | #endif\n  550 | \n  551 | \tif (lpOverlapped)\n  552 | \t{\n  553 | \t\tWLog_ERR(TAG, \"WinPR does not support the lpOverlapped parameter\");\n  554 | \t\tSetLastError(ERROR_NOT_SUPPORTED);\n  555 | \t\treturn FALSE;\n  556 | \t}\n  557 | \n  558 | \tif (!hFile)\n  559 | \t\treturn FALSE;\n  560 | \n  561 | \tif (!pFile->bLocked)\n  562 | \t{\n  563 | \t\tWLog_ERR(TAG, \"File %s is not locked!\", pFile->lpFileName);\n  564 | \t\treturn FALSE;\n  565 | \t}\n  566 | \n  567 | #ifdef __sun\n  568 | \tlock.l_start = 0;\n  569 | \tlock.l_len = 0;\n  570 | \tlock.l_whence = SEEK_SET;\n  571 | \tlock.l_type = F_UNLCK;\n  572 | \tif (fcntl(fileno(pFile->fp), F_GETLK, &lock) == -1)\n  573 | \t\treturn log_error(\"F_GETLK\", pFile);\n  574 | #else\n  575 | \tif (flock(fileno(pFile->fp), LOCK_UN) < 0)\n  576 | \t\treturn log_error(\"flock\", pFile);\n  577 | #endif\n  578 | \n  579 | \treturn TRUE;\n  580 | }","lines":40}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"FileUnlockFile() and FileUnlockFileEx() on Solaris use F_GETLK (query lock) instead of F_SETLK (set/release lock) to release the lock. F_GETLK only checks whether the lock could be acquired; it never actually releases the existing lock, so the file remains locked after a successful return.","fix":"Replace 'fcntl(fileno(pFile->fp), F_GETLK, &lock)' with 'fcntl(fileno(pFile->fp), F_SETLK, &lock)' (or F_SETLKW) in both FileUnlockFile and FileUnlockFileEx. Also reset pFile->bLocked = FALSE on success.","locations":[{"ref":"winpr/libwinpr/file/file.c:525-538","code":"  525 | #ifdef __sun\n  526 | \tlock.l_start = 0;\n  527 | \tlock.l_len = 0;\n  528 | \tlock.l_whence = SEEK_SET;\n  529 | \tlock.l_type = F_UNLCK;\n  530 | \tif (fcntl(fileno(pFile->fp), F_GETLK, &lock) == -1)\n  531 | \t\treturn log_error(\"F_GETLK\", pFile);\n  532 | \n  533 | #else\n  534 | \tif (flock(fileno(pFile->fp), LOCK_UN) < 0)\n  535 | \t\treturn log_error(\"flock\", pFile);\n  536 | #endif\n  537 | \n  538 | \treturn TRUE;","lines":14},{"ref":"winpr/libwinpr/file/file.c:566-580","code":"  566 | \n  567 | #ifdef __sun\n  568 | \tlock.l_start = 0;\n  569 | \tlock.l_len = 0;\n  570 | \tlock.l_whence = SEEK_SET;\n  571 | \tlock.l_type = F_UNLCK;\n  572 | \tif (fcntl(fileno(pFile->fp), F_GETLK, &lock) == -1)\n  573 | \t\treturn log_error(\"F_GETLK\", pFile);\n  574 | #else\n  575 | \tif (flock(fileno(pFile->fp), LOCK_UN) < 0)\n  576 | \t\treturn log_error(\"flock\", pFile);\n  577 | #endif\n  578 | \n  579 | \treturn TRUE;\n  580 | }","lines":15}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"GetFullPathNameA() assigns the computed file-part pointer to the local variable 'lpFilePart' (the parameter) instead of writing through the double-pointer '*lpFilePart'. The caller's pointer is never updated.","fix":"Change 'lpFilePart = lpBuffer + (lpFilePartW - lpBufferW);' to '*lpFilePart = lpBuffer + (lpFilePartW - lpBufferW);'.","locations":[{"ref":"winpr/libwinpr/file/file.c:1400-1401","code":" 1400 | \tif (lpFilePart)\n 1401 | \t\tlpFilePart = lpBuffer + (lpFilePartW - lpBufferW);","lines":2}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In winpr_CreateFile() (generic.c), the loop condition uses '<=' instead of '<' when iterating over HandleCreators: 'for (size_t i = 0; i <= ArrayList_Count(HandleCreators); i++)'. This causes one out-of-bounds read via ArrayList_GetItem at index == Count, returning nullptr. The nullptr check on 'creator' masks the crash but the intent is clearly to iterate valid indices only.","fix":"Change the loop condition from 'i <= ArrayList_Count(HandleCreators)' to 'i < ArrayList_Count(HandleCreators)'.","locations":[{"ref":"winpr/libwinpr/file/generic.c:265-277","code":"  265 | \tfor (size_t i = 0; i <= ArrayList_Count(HandleCreators); i++)\n  266 | \t{\n  267 | \t\tconst HANDLE_CREATOR* creator = ArrayList_GetItem(HandleCreators, i);\n  268 | \n  269 | \t\tif (creator && creator->IsHandled(lpFileName))\n  270 | \t\t{\n  271 | \t\t\tHANDLE newHandle =\n  272 | \t\t\t    creator->CreateFileA(lpFileName, dwDesiredAccess, dwShareMode, lpSecurityAttributes,\n  273 | \t\t\t                         dwCreationDisposition, dwFlagsAndAttributes, hTemplateFile);\n  274 | \t\t\tArrayList_Unlock(HandleCreators);\n  275 | \t\t\treturn newHandle;\n  276 | \t\t}\n  277 | \t}","lines":13}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In rdpdr_send_client_name_request(), ConvertUtf8NToWCharAlloc() may return NULL on allocation\nfailure. When it does, computerNameLenW is set to 0 (NULL * sizeof(WCHAR) = 0), and there is no\nNULL check for computerNameW before its use. The code reaches Stream_Write(s, computerNameW, 0)\nwhich is safe only because the length is 0, but the resulting PDU declares unicodeFlag=1 with a\ncomputer-name length of 0 and no name bytes - a malformed PDU that the server may reject or\nmishandle. The allocation failure goes silently undetected.","fix":"Check the return value of ConvertUtf8NToWCharAlloc immediately:\n  computerNameW = ConvertUtf8NToWCharAlloc(rdpdr->computerName, len, &computerNameLenW);\n  if (!computerNameW)\n      return ERROR_OUTOFMEMORY;","locations":[{"ref":"channels/rdpdr/client/rdpdr_main.c:1317-1338","code":" 1317 | \tcomputerNameW = ConvertUtf8NToWCharAlloc(rdpdr->computerName, len, &computerNameLenW);\n 1318 | \tcomputerNameLenW *= sizeof(WCHAR);\n 1319 | \n 1320 | \tif (computerNameLenW > 0)\n 1321 | \t\tcomputerNameLenW += sizeof(WCHAR); // also write '\\0'\n 1322 | \n 1323 | \ts = StreamPool_Take(rdpdr->pool, 16U + computerNameLenW);\n 1324 | \n 1325 | \tif (!s)\n 1326 | \t{\n 1327 | \t\tfree(computerNameW);\n 1328 | \t\tWLog_Print(rdpdr->log, WLOG_ERROR, \"Stream_New failed!\");\n 1329 | \t\treturn CHANNEL_RC_NO_MEMORY;\n 1330 | \t}\n 1331 | \n 1332 | \tStream_Write_UINT16(s, RDPDR_CTYP_CORE);        /* Component (2 bytes) */\n 1333 | \tStream_Write_UINT16(s, PAKID_CORE_CLIENT_NAME); /* PacketId (2 bytes) */\n 1334 | \tStream_Write_UINT32(s, 1);                      /* unicodeFlag, 0 for ASCII and 1 for Unicode */\n 1335 | \tStream_Write_UINT32(s, 0);                      /* codePage, must be set to zero */\n 1336 | \tStream_Write_UINT32(s,\n 1337 | \t                    (UINT32)computerNameLenW); /* computerNameLen, including null terminator */\n 1338 | \tStream_Write(s, computerNameW, computerNameLenW);","lines":22}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In clear_decompress_bands_data(), when a VBAR_CACHE_HIT is encountered (vBarHeader & 0x8000 == 0x8000),\nthe code checks vBarEntry->size == 0 to detect an uninitialized/reset cache entry and fills it with\ndummy data:\n  if (vBarEntry->size == 0) {\n      vBarEntry->count = vBarHeight;\n      if (!resize_vbar_entry(clear, vBarEntry)) return FALSE;\n  }\nHowever, if size > 0 but the cached entry has a different height than vBarHeight, the code proceeds to\nuse it anyway. The mismatch is caught later via the check\n'if (vBarEntry->count != vBarHeight) { vBarEntry->count = vBarHeight; resize... }',\nbut at that point the old pixel data (sized for the original height) is reused without clearing it,\npotentially exposing stale pixel data from a previous session in the rendered output.","fix":"When vBarEntry->count != vBarHeight, zero out vBarEntry->pixels before resizing so stale data is\nnot rendered:\n  memset(vBarEntry->pixels, 0, (size_t)vBarEntry->count * FreeRDPGetBytesPerPixel(clear->format));\n  vBarEntry->count = vBarHeight;\n  if (!resize_vbar_entry(clear, vBarEntry)) return FALSE;","locations":[{"ref":"libfreerdp/codec/clear.c:767-890","code":"  767 | \t\t\telse if ((vBarHeader & 0x8000) == 0x8000) /* VBAR_CACHE_HIT */\n  768 | \t\t\t{\n  769 | \t\t\t\tconst UINT16 vBarIndex = (vBarHeader & 0x7FFF);\n  770 | \t\t\t\tvBarEntry = &(clear->VBarStorage[vBarIndex]);\n  771 | \n  772 | \t\t\t\t/* If the cache was reset we need to fill in some dummy data. */\n  773 | \t\t\t\tif (vBarEntry->size == 0)\n  774 | \t\t\t\t{\n  775 | \t\t\t\t\tWLog_Print(clear->log, WLOG_WARN,\n  776 | \t\t\t\t\t           \"Empty cache index %\" PRIu16 \", filling dummy data\", vBarIndex);\n  777 | \t\t\t\t\tvBarEntry->count = vBarHeight;\n  778 | \n  779 | \t\t\t\t\tif (!resize_vbar_entry(clear, vBarEntry))\n  780 | \t\t\t\t\t\treturn FALSE;\n  781 | \t\t\t\t}\n  782 | \t\t\t}\n  783 | \t\t\telse\n  784 | \t\t\t{\n  785 | \t\t\t\tWL
