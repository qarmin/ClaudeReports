<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

the other adapters) and use getOrNull / a null check on the resolved position before indexing items.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/adapters/PlaylistsAdapter.kt:48-54","code":"   48 |     override fun actionItemPressed(id: Int) {\n   49 |         when (id) {\n   50 |             R.id.cab_delete -> askConfirmDelete()\n   51 |             R.id.cab_rename -> showRenameDialog()\n   52 |             R.id.cab_select_all -> selectAll()\n   53 |         }\n   54 |     }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/adapters/PlaylistsAdapter.kt:89-95","code":"   89 |     private fun showRenameDialog() {\n   90 |         NewPlaylistDialog(context, items[getItemKeyPosition(selectedKeys.first())]) {\n   91 |             context.runOnUiThread {\n   92 |                 finishActMode()\n   93 |             }\n   94 |         }\n   95 |     }","lines":7}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Config.playbackSetting getter indexes PlaybackSetting.values() with the stored Int directly. If the persisted preference value is out of range (e.g. due to corrupted prefs or a future enum reorder/removal), this throws ArrayIndexOutOfBoundsException on read, crashing playback setup.","fix":"Use PlaybackSetting.values().getOrElse(prefs.getInt(...)) { PlaybackSetting.REPEAT_OFF } to fall back safely.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/Config.kt:15-17","code":"   15 |     var playbackSetting: PlaybackSetting\n   16 |         get() = PlaybackSetting.values()[prefs.getInt(PLAYBACK_SETTING, PlaybackSetting.REPEAT_OFF.ordinal)]\n   17 |         set(playbackSetting) = prefs.edit().putInt(PLAYBACK_SETTING, playbackSetting.ordinal).apply()","lines":3}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"releaseController() accesses the `lateinit var controllerFuture` without checking `::controllerFuture.isInitialized`. SimpleMediaController.destroyInstance() calls releaseController() on the singleton; if the controller was never created (createControllerAsync never ran), this throws UninitializedPropertyAccessException.","fix":"Guard with `if (::controllerFuture.isInitialized) MediaController.releaseFuture(controllerFuture)`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/SimpleMediaController.kt:59-61","code":"   59 |     fun releaseController() {\n   60 |         MediaController.releaseFuture(controllerFuture)\n   61 |     }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/SimpleMediaController.kt:97-100","code":"   97 |         fun destroyInstance() {\n   98 |             instance?.releaseController()\n   99 |             instance = null\n  100 |         }","lines":4}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"getRandomItem() force-unwraps getChildren(...)!! and calls children.random() in a loop. If a browsable node has an empty children list (e.g. an empty album/artist/genre, or a tab that built no items), random() throws NoSuchElementException; if a referenced node is missing, getChildren returns null and !! throws NPE. This path is reachable from onAddMediaItems via a search query that has no match (getItemFromSearch returns null -> getRandomItem).","fix":"Use getChildren(...)?.takeIf { it.isNotEmpty() }?.random() and bail out / return a safe fallback when null or empty instead of force-unwrapping.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/library/MediaItemProvider.kt:111-118","code":"  111 |     fun getRandomItem(): MediaItem {\n  112 |         var curRoot = getRootItem()\n  113 |         while (curRoot.mediaMetadata.isBrowsable == true) {\n  114 |             val children = getChildren(curRoot.mediaId)!!\n  115 |             curRoot = children.random()\n  116 |         }\n  117 |         return curRoot\n  118 |              instance = SimpleMediaScanner(app)\n  674 |                 instance!!\n  675 |             }\n  676 |         }\n  677 |     }","lines":11}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","easy":false,"description":"onPlaybackResumption uses a plain (non-volatile, non-synchronized) local `futureSet` flag mutated inside getRecentItemsLazily's callback. If that callback can be invoked from more than one thread (the lazy loader makes no single-thread guarantee), the check-then-set is a TOCTOU race that can call settableFuture.set twice (the second set is ignored but the first batch may be dropped) or route the first batch to addRemainingMediaItems. Also player.addRemainingMediaItems is invoked from the executor thread; it internally re-posts to the player thread, but the read of `player` before the session is fully wired is not guarded.","fix":"Make futureSet an AtomicBoolean (compareAndSet) or document/guarantee single-threaded callback invocation.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/MediaSessionCallback.kt:149-163","code":"  149 |         val settableFuture = SettableFuture.create<MediaSession.MediaItemsWithStartPosition>()\n  150 |         executorService.execute {\n  151 |             var futureSet = false\n  152 |             mediaItemProvider.getRecentItemsLazily {\n  153 |                 // resume playback as quickly as possible: https://github.com/androidx/media/issues/111\n  154 |                 if (!futureSet) {\n  155 |                     settableFuture.set(it)\n  156 |                     futureSet = true\n  157 |                 } else {\n  158 |                     player.addRemainingMediaItems(it.mediaItems, it.startIndex)\n  159 |                 }\n  160 |             }\n  161 |         }\n  162 | \n  163 |         return settableFuture","lines":15}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"medium","easy":false,"description":"The `state` setter only enters the synchronized(onReadyListeners) block (and assigns `field`) for STATE_INITIALIZED/STATE_ERROR; STATE_INITIALIZING/STATE_CREATED are written without synchronization. whenReady() reads `state` and mutates onReadyListeners (`onReadyListeners += performAction`) without holding the same lock. A listener registered on a background reload thread can be added after the setter has already iterated and posted its snapshot, so that listener is never invoked (lost wakeup / hung future). The notification also reads `state` again inside the posted Runnable, by which time it may have changed.","fix":"Guard all reads/writes of `state` and onReadyListeners with the same lock; capture the boolean result inside the synchronized block and pass it to the posted Runnable rather than re-reading `state`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/library/MediaItemProvider.kt:60-94","code":"   60 |     private var state: Int = STATE_CREATED\n   61 |         set(value) {\n   62 |             if (value == STATE_INITIALIZED || value == STATE_ERROR) {\n   63 |                 synchronized(onReadyListeners) {\n   64 |                     field = value\n   65 |                     Handler(Looper.getMainLooper()).post {\n   66 |                         onReadyListeners.forEach { listener ->\n   67 |                             listener(state == STATE_INITIALIZED)\n   68 |                         }\n   69 |                     }\n   70 |                 }\n   71 |             } else {\n   72 |                 field = value\n   73 |             }\n   74 |         }\n   75 | \n   76 |     private val audioHelper = context.audioHelper\n   77 | \n   78 |     init {\n   79 |         buildRoot()\n   80 |     }\n   81 | \n   82 |     fun whenReady(performAction: (Boolean) -> Unit): Boolean {\n   83 |         return when (state) {\n   84 |             STATE_CREATED, STATE_INITIALIZING -> {\n   85 |                 onReadyListeners += performAction\n   86 |                 false\n   87 |             }\n   88 | \n   89 |             else -> {\n   90 |                 performAction(state != STATE_ERROR)\n   91 |                 true\n   92 |             }\n   93 |         }\n   94 |     }","lines":35}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"MarqueeTextView overrides isFocused() to always return true and suppresses focus-loss callbacks (onWindowFocusChanged/onFocusChanged only forward the 'true'/'focused' branch). Forcing perpetual focus to keep the marquee animating means the text view never relinquishes the marquee animation/handler even when the window loses focus or the view goes off-screen, keeping an animation running indefinitely (battery/CPU) for every such label.","fix":"Allow the standard focus-loss path so the marquee can stop when the window/view is not visible, or explicitly start/stop the marquee in onAttachedToWindow/onDetachedFromWindow rather than faking permanent focus.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/views/MarqueeTextView.kt:30-38","code":"   30 |     override fun isFocused() = true\n   31 | \n   32 |     override fun onWindowFocusChanged(hasWindowFocus: Boolean) {\n   33 |         if (hasWindowFocus) super.onWindowFocusChanged(true)\n   34 |     }\n   35 | \n   36 |     override fun onFocusChanged(focused: Boolean, direction: Int, previouslyFocusedRect: Rect?) {\n   37 |         if (focused) super.onFocusChanged(true, direction, previouslyFocusedRect)\n   38 |     }","lines":9}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","easy":false,"description":"The MediaSessionCallback creates `executorService` (a 4-thread fixed pool wrapped by MoreExecutors) but it is never shut down. The pool's non-daemon threads outlive PlaybackService.onDestroy (which releases the session/player but never touches this executor), leaking threads across service restarts. MediaItemProvider's single-thread `executor` (line 46-48) has the same problem - never shut down on service destroy.","fix":"Expose a shutdown/close path on the callback and MediaItemProvider and call executorService.shutdown() / executor.shutdown() from PlaybackService.onDestroy().","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/MediaSessionCallback.kt:27-29","code":"   27 |     private val executorService by lazy {\n   28 |         MoreExecutors.listeningDecorator(Executors.newFixedThreadPool(4))\n   29 |     }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/library/MediaItemProvider.kt:46-48","code":"   46 |     private val executor by lazy {\n   47 |         MoreExecutors.listeningDecorator(Executors.newSingleThreadExecutor())\n   48 |     }","lines":3}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"MAX_PROGRESS is computed as (MAX_PLAYBACK_SPEED * 100 + MIN_PLAYBACK_SPEED * 100) = 300 + 25 = 325, which is a nonsensical seekbar maximum (adding the minimum to the maximum). HALF_PROGRESS = 325/2 = 162 is therefore not the true 1.0x midpoint of the 0.25..3.0 range, so the seekbar's center does not map to 1.0x and the slow/fast halves are asymmetric and slightly miscalibrated.","fix":"Define the progress range from the speed span, e.g. MAX_PROGRESS = ((MAX_PLAYBACK_SPEED - MIN_PLAYBACK_SPEED) * 100).toInt(), and map 1.0x to the proportional progress rather than the arithmetic mean.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/fragments/PlaybackSpeedFragment.kt:20-23","code":"   20 |     private val MIN_PLAYBACK_SPEED = 0.25f\n   21 |     private val MAX_PLAYBACK_SPEED = 3f\n   22 |     private val MAX_PROGRESS = (MAX_PLAYBACK_SPEED * 100 + MIN_PLAYBACK_SPEED * 100).toInt()\n   23 |     private val HALF_PROGRESS = MAX_PROGRESS / 2","lines":4}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"dateAdded is computed as (File.lastModified() / 1000L).toInt(). Unix seconds fit in Int until year 2038; after that the toInt() truncation wraps to a negative value, corrupting date-added sorting. The same pattern appears in SimpleMediaScanner.findTracksManually.","fix":"Store dateAdded as Long seconds rather than truncating to Int.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/RoomHelper.kt:113-117","code":"  113 |             val dateAdded = try {\n  114 |                 (File(it).lastModified() / 1000L).toInt()\n  115 |             } catch (e: Exception) {\n  116 |                 0\n  117 |             }","lines":5},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/SimpleMediaScanner.kt:462-466","code":"  462 |             val dateAdded = try {\n  463 |                 (File(path).lastModified() / 1000L).toInt()\n  464 |             } catch (e: Exception) {\n  465 |                 0\n  466 |             }","lines":5}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"SleepTimerCustomDialog parses minutes via Integer.valueOf(value) with no upper bound and multiplies by 60. A very large minutes entry overflows Int when multiplied by 60 (e.g. > ~35.7M minutes), yielding a negative/garbage seconds value passed to the callback. Low real-world likelihood but unvalidated.","fix":"Clamp the parsed minutes to a sane maximum (and handle NumberFormatException for overly long input) before multiplying.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/dialogs/SleepTimerCustomDialog.kt:26-28","code":"   26 |         val value = binding.minutes.value\n   27 |         val minutes = Integer.valueOf(value.ifEmpty { \"0\" })\n   28 |         callback(minutes * 60)","lines":3}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"EqualizerActivity stores two different, incompatible meanings into the `bands` map for the same key. `onProgressChanged` stores the dB band level (`newValue = newProgress + minValue`, line 102), whereas `onStopTrackingTouch` (line 114) and `draggingStarted` (line 126) store the raw SeekBar progress (= level - minValue). `presetChanged` for the custom preset then reads `bands[band]` and uses it directly as the SeekBar progress (line 170) and adds minValue again to derive the level (line 171). Because the persisted value (saved to config in onStopTrackingTouch, line 115) is the raw progress while onProgressChanged would have written the dB level, restored custom EQ levels are wrong/shifted by minValue depending on which path last wrote the entry.","fix":"Pick one representation (preferably the raw progress, since that is what is persisted and re-read in presetChanged) and use it consistently in all three places. In onProgressChanged store `newProgress` (not `newProgress + minValue`).","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/EqualizerActivity.kt:98-116","code":"   98 |                             val newValue = newProgress + minValue\n   99 |                             try {\n  100 |                                 if (equalizer.getBandLevel(band.toShort()) != newValue.toShort()) {\n  101 |                                     equalizer.setBandLevel(band.toShort(), newValue.toShort())\n  102 |                                     bands[band.toShort()] = newValue\n  103 |                                 }\n  104 |                             } catch (ignored: Exception) {\n  105 |                             }\n  106 |                         }\n  107 |                     }\n  108 | \n  109 |                     override fun onStartTrackingTouch(seekBar: SeekBar) {\n  110 |                         draggingStarted(equalizer)\n  111 |                     }\n  112 | \n  113 |                     override fun onStopTrackingTouch(seekBar: SeekBar) {\n  114 |                         bands[band.toShort()] = equalizerBandSeekBar.progress\n  115 |                         config.equalizerBands = Gson().toJson(bands)\n  116 |                     }","lines":19},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/EqualizerActivity.kt:122-128","code":"  122 |     private fun draggingStarted(equalizer: Equalizer) {\n  123 |         binding.equalizerPreset.text = getString(org.fossify.commons.R.string.custom)\n  124 |         config.equalizerPreset = EQUALIZER_PRESET_CUSTOM\n  125 |         for (band in 0 until equalizer.numberOfBands) {\n  126 |             bands[band.toShort()] = bandSeekBars[band].progress\n  127 |         }\n  128 |     }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/EqualizerActivity.kt:161-172","code":"  161 |             for (band in 0 until equalizer.numberOfBands) {\n  162 |                 val minValue = equalizer.bandLevelRange[0]\n  163 |                 val progress = if (bands.containsKey(band.toShort())) {\n  164 |                     bands[band.toShort()]\n  165 |                 } else {\n  166 |                     val maxValue = equalizer.bandLevelRange[1]\n  167 |                     (maxValue - minValue) / 2\n  168 |                 }\n  169 | \n  170 |                 bandSeekBars[band].progress = progress!!.toInt()\n  171 |                 val newValue = progress + minValue\n  172 |                 equalizer.setBandLevel(band.toShort(), newValue.toShort())","lines":12}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"On Android R+ (isRPlus()), if the user edits the filename/extension so that oldPath != newPath, no branch executes: the oldPath==newPath block is skipped, and the rename block is guarded by !isRPlus(). The result is that storeEditedSong/callback are never called and the dialog is never dismissed, leaving the dialog stuck open and the filename change silently dropped.","fix":"Add an isRPlus() branch that performs the SAF/MediaStore-based rename (or at minimum dismisses the dialog and informs the user), instead of only handling the !isRPlus() case.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/dialogs/EditDialog.kt:56-77","code":"   56 |                                 val oldPath = track.path\n   57 |                                 val newPath = \"${oldPath.getParentPath()}/$newFilename.$newFileExtension\"\n   58 |                                 if (oldPath == newPath) {\n   59 |                                     storeEditedSong(track, oldPath, newPath)\n   60 |                                     callback(track)\n   61 |                                     alertDialog.dismiss()\n   62 |                                     return@updateContentResolver\n   63 |                                 }\n   64 | \n   65 |                                 if (!isRPlus()) {\n   66 |                                     activity.renameFile(oldPath, newPath, false) { success, _ ->\n   67 |                                         if (success) {\n   68 |                                             storeEditedSong(track, oldPath, newPath)\n   69 |                                             track.path = newPath\n   70 |                                             callback(track)\n   71 |                                         } else {\n   72 |                                             activity.toast(R.string.rename_song_error)\n   73 |                                         }\n   74 |                                         alertDialog.dismiss()\n   75 |                                     }\n   76 |                                 }\n   77 |                             }","lines":22}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"ALL_TABS_MASK omits TAB_GENRES (it is defined as PLAYLISTS or FOLDERS or ARTISTS or ALBUMS or TRACKS, value 32 for genres is missing). ManageVisibleTabsDialog falls back to ALL_TABS_MASK when the user unchecks every tab, so the Genres tab can never be restored via the \"all unchecked -> show all\" path, and any code treating ALL_TABS_MASK as \"everything\" silently excludes genres.","fix":"Include TAB_GENRES in the ALL_TABS_MASK constant (Constants.kt:88) so the fallback restores every tab.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/dialogs/ManageVisibleTabsDialog.kt:47-49","code":"   47 |         if (result == 0) {\n   48 |             result = ALL_TABS_MASK\n   49 |         }","lines":3}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"buildMediaItem accepts a `mediaType` parameter and uses it to compute `setIsBrowsable`/`setIsPlayable`, but then hardcodes `.setMediaType(MediaMetadata.MEDIA_TYPE_MUSIC)`, completely ignoring the caller-supplied type. Every MediaItem (root folder, playlists, folders, artists, albums, genres) is reported to media browsers as MEDIA_TYPE_MUSIC even though it is built with browsable folder/album/artist/genre types. This corrupts the metadata exposed to Android Auto / system media browsers and is inconsistent with the isBrowsable flag set on the same item.","fix":"Use the parameter: `.setMediaType(mediaType)` instead of `.setMediaType(MediaMetadata.MEDIA_TYPE_MUSIC)`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/extensions/MediaItem.kt:52-58","code":"   52 |         .setIsBrowsable(mediaType != MediaMetadata.MEDIA_TYPE_MUSIC)\n   53 |         .setIsPlayable(mediaType == MediaMetadata.MEDIA_TYPE_MUSIC)\n   54 |         .setTotalTrackCount(trackCnt)\n   55 |         .setTrackNumber(trackNumber)\n   56 |         .setDiscNumber(discNumber)\n   57 |         .setReleaseYear(year)\n   58 |         .setMediaType(MediaMetadata.MEDIA_TYPE_MUSIC)","lines":7}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"When a track is tapped while a search filter is active, the click handler computes the index in the FULL `tracks` list (tracks.indexOf(it)) and then plays the full unfiltered `tracks` list. The adapter, however, is currently showing the filtered subset. The indexOf on the full list returns the wrong position relative to what the user sees, and the played queue is the entire library rather than the filtered results, so tapping a search result starts playback at an unexpected track.","fix":"Capture the list currently shown by the adapter (the filtered list) and play that list, computing startIndex within it, e.g. use the adapter's items or the item itself rather than the full `tracks` field.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/fragments/TracksFragment.kt:51-52","code":"   51 |                                 val startIndex = tracks.indexOf(it as Track)\n   52 |                                 prepareAndPlay(tracks, startIndex)","lines":2}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"getArtistsSync() builds a local `artists` list but never populates it: inside the cursor loop it adds parsed artists to the `newArtists` member field instead of the local `artists`, then returns the still-empty local `artists`. The caller does `newArtists += getArtistsSync()`, so artists get added once via the side-effect mutation and the returned empty list adds nothing - it only works by accident. It is fragile and confusing, and if the loop body were ever fixed to use the local list the artists would be lost. It also means getArtistsSync mutates shared state as a hidden side effect.","fix":"Add the parsed `artist` to the local `artists` list and return it; remove the `newArtists.add(artist)` side effect from inside getArtistsSync.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/SimpleMediaScanner.kt:289-311","code":"  289 |     private fun getArtistsSync(): ArrayList<Artist> {\n  290 |         val artists = arrayListOf<Artist>()\n  291 |         val uri = Audio.Artists.EXTERNAL_CONTENT_URI\n  292 |         val projection = arrayOf(\n  293 |             Audio.Artists._ID,\n  294 |             Audio.Artists.ARTIST,\n  295 |             Audio.Artists.NUMBER_OF_TRACKS,\n  296 |             Audio.Artists.NUMBER_OF_ALBUMS\n  297 |         )\n  298 | \n  299 |         context.queryCursor(uri, projection, showErrors = true) { cursor ->\n  300 |             val id = cursor.getLongValue(Audio.Artists._ID)\n  301 |             val title = cursor.getStringValue(Audio.Artists.ARTIST) ?: MediaStore.UNKNOWN_STRING\n  302 |             val albumCnt = cursor.getIntValue(Audio.Artists.NUMBER_OF_TRACKS)\n  303 |             val trackCnt = cursor.getIntValue(Audio.Artists.NUMBER_OF_ALBUMS)\n  304 |             val artist = Artist(id = id, title = title, albumCnt = albumCnt, trackCnt = trackCnt, albumArt = \"\")\n  305 |             if (artist.albumCnt > 0 && artist.trackCnt > 0) {\n  306 |                 newArtists.add(artist)\n  307 |             }\n  308 |         }\n  309 | \n  310 |         return artists\n  311 |     }","lines":23}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In reload(), if any of the build* calls throws, the catch block sets `state = STATE_ERROR`, but execution then falls through to the unconditional `state = STATE_INITIALIZED` on the next line, immediately overwriting the error state. Consumers waiting via whenReady are therefore told initialization succeeded even when it failed, and they will operate on a partially-built tree.","fix":"Set STATE_INITIALIZED only in the success path, e.g. return early after STATE_ERROR or use a try/catch/else structure so the final assignment is skipped on failure.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/library/MediaItemProvider.kt:176-187","code":"  176 |             try {\n  177 |                 buildPlaylists()\n  178 |                 buildFolders()\n  179 |                 buildArtists()\n  180 |                 buildAlbums()\n  181 |                 buildTracks()\n  182 |                 buildGenres()\n  183 |             } catch (e: Exception) {\n  184 |                 state = STATE_ERROR\n  185 |             }\n  186 | \n  187 |             state = STATE_INITIALIZED","lines":12}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"formatFrequency divides the frequency by 1000 a second time. The caller already converts the center frequency to a smaller unit at line 82 (`getCenterFreq(...) / 1000.0`), and then formatFrequency at line 201 divides the passed value by `1000.0.pow(digitGroups)` again. The acknowledged copy-paste origin (line 193 comment) of a file-size formatter means the unit math is wrong: a band centered at e.g. 60000 milliHz (60 Hz) is passed in as 60.0 and then divided again, producing a misleading label. The labels shown to the user do not correspond to the real band frequencies.","fix":"Compute the frequency in Hz once (getCenterFreq returns milliHz, so divide by 1000 to get Hz) and have formatFrequency operate on Hz without an extra /1000. Verify against Equalizer.getCenterFreq's documented millihertz unit.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/EqualizerActivity.kt:81-83","code":"   81 |         for (band in 0 until equalizer.numberOfBands) {\n   82 |             val frequency = equalizer.getCenterFreq(band.toShort()) / 1000.0\n   83 |             val formatted = formatFrequency(frequency)","lines":3},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/EqualizerActivity.kt:193-202","code":"  193 |     // copy-pasted from the file size formatter, should be simplified\n  194 |     private fun formatFrequency(value: Double): String {\n  195 |         if (value <= 0) {\n  196 |             return \"0 Hz\"\n  197 |         }\n  198 | \n  199 |         val units = arrayOf(\"Hz\", \"kHz\", \"gHz\")\n  200 |         val digitGroups = (log10(value) / log10(1000.0)).toInt()\n  201 |         return \"${DecimalFormat(\"#,##0.#\").format(value / 1000.0.pow(digitGroups.toDouble()))} ${units[digitGroups]}\"\n  202 |     }","lines":10}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"TrackActivity.onMediaItemTransition finishes the activity whenever mediaItem becomes null (line 430-431). This is also invoked through the base SimpleControllerActivity Player.Listener while the activity is the foreground player UI; a transient null media item (e.g. during queue clearing or playback reset that is later repopulated) will close the now-playing screen unexpectedly.","fix":"Only finish when playback has genuinely ended (e.g. check player state / that the queue is empty) rather than on any null mediaItem transition.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/TrackActivity.kt:428-436","code":"  428 |     override fun onMediaItemTransition(mediaItem: MediaItem?, reason: Int) {\n  429 |         super.onMediaItemTransition(mediaItem, reason)\n  430 |         if (mediaItem == null) {\n  431 |             finish()\n  432 |         } else {\n  433 |             binding.activityTrackProgressbar.progress = 0\n  434 |             updateTrackInfo()\n  435 |         }\n  436 |     }","lines":9}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"AlbumsTracksAdapter.askConfirmDelete builds `positions` from both selected tracks AND selected albums, then deletes only the track files via context.deleteTracks(selectedTracks) (albums' tracks are NOT in selectedTracks), yet on completion it removes BOTH the track rows and the album rows from the list. Album rows (and their underlying tracks/files) are removed from the UI even though deleteTracks never deleted them, so the displayed list diverges from the actual on-disk/db state until a refresh.","fix":"Either include the album tracks in the deletion set (getAllSelectedTracks already expands albums) or only remove rows whose files were actually deleted; keep the removed positions and the deleted entities consistent.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/adapters/AlbumsTracksAdapter.kt:100-126","code":"  100 |     private fun askConfirmDelete() {\n  101 |         ConfirmationDialog(context) {\n  102 |             ensureBackgroundThread {\n  103 |                 val positions = ArrayList<Int>()\n  104 |                 val selectedTracks = getAllSelectedTracks()\n  105 |                 val selectedAlbums = getSelectedAlbums()\n  106 | \n  107 |                 positions += selectedTracks.mapNotNull { track -> items.indexOfFirstOrNull { it is Track && it.mediaStoreId == track.mediaStoreId } }\n  108 |                 positions += selectedAlbums.mapNotNull { album -> items.indexOfFirstOrNull { it is Album && it.id == album.id } }\n  109 | \n  110 |                 context.deleteTracks(selectedTracks) {\n  111 |                     context.runOnUiThread {\n  112 |                         positions.sortDescending()\n  113 |                         removeSelectedItems(positions)\n  114 |                         positions.forEach {\n  115 |                             items.removeAt(it)\n  116 |                         }\n  117 | \n  118 |                         // finish activity if all tracks are deleted\n  119 |                         if (items.none { it is Track }) {\n  120 |                             context.finish()\n  121 |                         }\n  122 |                     }\n  123 |                 }\n  124 |             }\n  125 |         }\n  126 |     }","lines":27}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"removePlaylists() computes the positions to                         playlistItems.add(copy)\n   41 |                     }\n   42 |                 }\n   43 |             }","lines":8}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"RoomHelper.getTracksFromPaths splits paths into groups of 50 via `parts = paths.size / ITEMS_PER_GROUP` and loops `0..parts`. When paths.size is an exact multiple of 50 (e.g. 50), parts=1 and the loop runs i=0 and i=1; for i=1 the sublist is paths.subList(50, min(100,50)) = subList(50,50) which is empty, leading to a query with `DATA IN ()` (empty question marks -> `?` with zero args via getQuestionMarks(0) returning a single `?`). getQuestionMarks(0) returns \"?\" but selectionArgs is empty, causing a SQL bind-count mismatch / wrong query for that empty group.","fix":"Use Kotlin's `paths.chunked(ITEMS_PER_GROUP)` and skip empty chunks, eliminating the off-by-one and the empty-IN edge case.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/RoomHelper.kt:60-66","code":"   60 |         val parts = paths.size / ITEMS_PER_GROUP\n   61 |         for (i in 0..parts) {\n   62 |             val sublist = paths.subList(i * ITEMS_PER_GROUP, min((i + 1) * ITEMS_PER_GROUP, paths.size))\n   63 |             val questionMarks = getQuestionMarks(sublist.size)\n   64 |             val selection = \"${Audio.Media.DATA} IN ($questionMarks)\"\n   65 |             val selectionArgs = sublist.toTypedArray()\n   66 | ","lines":7},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/RoomHelper.kt:131","code":"  131 |     private fun getQuestionMarks(cnt: Int) = \"?\" + \",?\".repeat(Math.max(cnt - 1, 0))","lines":1}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Track.getComparator's PLAYER_SORT_BY_TRACK_ID branch returns 0 when first.trackId is null regardless of second.trackId (the elvis on the safe-call collapses any null-first comparison to 0). Tracks with a null track_id are therefore treated as equal to every other track instead of being ordered consistently, producing unstable/incorrect track-number sorting and an asymmetric comparator (a vs b can differ from b vs a).","fix":"Compare with a null-coalesced sentinel symmetrically, e.g. (first.trackId ?: Int.MAX_VALUE).compareTo(second.trackId ?: Int.MAX_VALUE), mirroring the discNumber handling just above.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/models/Track.kt:66-72","code":"   66 |                 sorting and PLAYER_SORT_BY_TRACK_ID != 0 -> {\n   67 |                     val discComparison = (first.discNumber ?: Int.MAX_VALUE).compareTo(second.discNumber ?: Int.MAX_VALUE)\n   68 |                     if (discComparison == 0) {\n   69 |                         first.trackId?.compareTo(second.trackId ?: 0) ?: 0\n   70 |                     } else {\n   71 |                         discComparison\n   72 |                     }","lines":7}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"reload() calls buildRoot() again at the start, but addNodeAndChildren writes into the existing `treeNodes`/`titleMap` maps without clearing them first. Stale entries from a previous load (tracks/albums that no longer exist) are never removed, so deleted media keeps resolving via get()/getChildren() until the process dies. buildRoot also re-adds the root's children to a node that already has them, duplicating root child entries on every reload.","fix":"Clear treeNodes and titleMap (and any children lists) at the start of reload()/buildRoot() before repopulating.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/library/MediaItemProvider.kt:171-199","code":"  171 |     fun reload() {\n  172 |         state = STATE_INITIALIZING\n  173 |         executor.execute {\n  174 |             buildRoot()\n  175 | \n  176 |             try {\n  177 | compares against lastUpdatedFormattedValue using playbackSpeed.toString() (raw Float, e.g. \"1.0499999\") while lastUpdatedFormattedValue is later assigned the same raw toString(). However the initial lastUpdatedFormattedValue is formatPlaybackSpeed(config.playbackSpeed) (\"%.2f\", e.g. \"1.05\"), so the first comparison compares a raw Float string against a 2-decimal formatted string and will almost always differ. The two value spaces (raw vs formatted) are mixed, making the de-duplication guard unreliable on the first change.","fix":"Compare consistently using the same representation (compare the Float values directly, or compare formatPlaybackSpeed(...) on both sides); do not mix raw toString() with the %.2f-formatted seed value.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/fragments/PlaybackSpeedFragment.kt:56-82","code":"   56 |         val formattedValue = formatPlaybackSpeed(config.playbackSpeed)\n   57 |         speedLabel.text = \"${formattedValue}x\"\n   58 |         seekbar.max = MAX_PROGRESS\n   59 | \n   60 |         val playbackSpeedProgress = config.playbackSpeedProgress\n   61 |         if (playbackSpeedProgress == -1) {\n   62 |             config.playbackSpeedProgress = HALF_PROGRESS\n   63 |         }\n   64 |         seekbar.progress = config.playbackSpeedProgress\n   65 | \n   66 |         var lastUpdatedProgress = config.playbackSpeedProgress\n   67 |         var lastUpdatedFormattedValue = formattedValue\n   68 | \n   69 |         seekbar.onSeekBarChangeListener { progress ->\n   70 |             val playbackSpeed = getPlaybackSpeed(progress)\n   71 |             if (playbackSpeed.toString() != lastUpdatedFormattedValue) {\n   72 |                 lastUpdatedProgress = progress\n   73 |                 lastUpdatedFormattedValue = playbackSpeed.toString()\n   74 |                 config.playbackSpeed = playbackSpeed\n   75 |                 config.playbackSpeedProgress = progress\n   76 | \n   77 |                 speedLabel.text = \"${formatPlaybackSpeed(playbackSpeed)}x\"\n   78 |                 listener?.updatePlaybackSpeed(playbackSpeed)\n   79 |             } else {\n   80 |                 seekbar.progress = lastUpdatedProgress\n   81 |             }\n   82 |         }","lines":27}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"onSearchClosed restores the full list and toggles the placeholder with beGoneIf(tracks.isNotEmpty()): it hides the placeholder when the list is non-empty but never shows it when the list IS empty. After clearing a search on a genuinely empty library the placeholder stays whatever the previous (search-driven) state set it to, leaving the empty view inconsistent. The same pattern is duplicated across fragments.","fix":"Use beVisibleIf(list.isEmpty()) so the placeholder is correctly shown or hidden in both cases when search is closed.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/fragments/TracksFragment.kt:95-98","code":"   95 |     override fun onSearchClosed() {\n   96 |         getAdapter()?.updateItems(tracks)\n   97 |         binding.tracksPlaceholder.beGoneIf(tracks.isNotEmpty())\n   98 |     }","lines":4},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/fragments/AlbumsFragment.kt:92-95","code":"   92 |     override fun onSearchClosed() {\n   93 |         getAdapter()?.updateItems(albums)\n   94 |         binding.albumsPlaceholder.beGoneIf(albums.isNotEmpty())\n   95 |     }","lines":4},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/fragments/ArtistsFragment.kt:91-94","code":"   91 |     override fun onSearchClosed() {\n   92 |         getAdapter()?.updateItems(artists)\n   93 |         binding.artistsPlaceholder.beGoneIf(artists.isNotEmpty())\n   94 |     }","lines":4},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/fragments/GenresFragment.kt:91-94","code":"   91 |     override fun onSearchClosed() {\n   92 |         getAdapter()?.updateItems(genres)\n etTrack(currentItem.trackId)\n  276 |             if (currentTrack == null) {\n  277 |                 callback(emptyList(), 0, 0)\n  278 |                 return@ensureBackgroundThread\n  279 |             }\n  280 | \n  281 |             // immediately return the current track.\n  282 |             val startPositionMs = currentItem.lastPosition.seconds.inWholeMilliseconds\n  283 |             callback(listOf(currentTrack), 0, startPositionMs)\n  284 | \n  285 |             // return the rest of the queued tracks.\n  286 |             val queuedTracks = getQueuedTracks(queueItems)\n  287 |             val currentIndex = queuedTracks.indexOfFirstOrNull { it.mediaStoreId == currentTrack.mediaStoreId } ?: 0\n  288 |             callback(queuedTracks, currentIndex, startPositionMs)\n  289 |         }","lines":29}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"M3uImporter declares the result variables as failedEvents/exportedEvents (copy-pasted from the exporter) for an import operation; on a parse exception failedEvents is incremented once but exportedEvents may still be 0, returning IMPORT_FAIL even though partial work could have been intended. More importantly, exportedEvents counts matched playlistItems which can exceed the number of m3u entries due to the OR/duplicate matching, so the success classification is unreliable.","fix":"Rename to import-specific counters and base the result on number of m3u entries successfully resolved vs. unresolved, after fixing the duplicate-matching bug.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/M3uImporter.kt:15-16","code":"   15 |     var failedEvents = 0\n   16 |     var exportedEvents = 0","lines":2},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/M3uImporter.kt:45-60","code":"   45 |             activity.audioHelper.insertTracks(playlistItems)\n   46 |             exportedEvents = playlistItems.size\n   47 |         } cat 156 | \n  157 |         return RemoteViews(context.packageName, layoutId)","lines":15}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"getAlbumsSync on pre-Q devices resolves artistId via `artists.first { it.title == artistName }` which throws NoSuchElementException if no artist matches that album's artist name (possible when the album artist string differs from any Artists.ARTIST row). Since this runs inside the silently-swallowed scan try/catch, it aborts the whole MediaStore scan with no indication.","fix":"Use firstOrNull { ... }?.id ?: 0 (or skip the album) instead of first { ... }.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/SimpleMediaScanner.kt:335-339","code":"  335 |             val artistId = if (isQPlus()) {\n  336 |                 cursor.getLongValue(Audio.Albums.ARTIST_ID)\n  337 |             } else {\n  338 |                 artists.first { it.title == artistName }.id\n  339 |             }","lines":5}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In findTracksManually, if retriever.setDataSource(path) succeeds (no fallback FileInputStream opened), inputStream stays null and is closed harmlessly; but if extractMetadata throws after a successful setDataSource, the retriever is never released and the inputStream (if any) leaks - the cleanup at lines 481-485 only runs when no exception is thrown earlier in the loop body. There is no try/finally around the metadata extraction.","fix":"Wrap the metadata extraction and track building in try/finally that always calls retriever.release() and inputStream?.close().","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/SimpleMediaScanner.kt:437-486","code":"  437 |             val retriever = MediaMetadataRetriever()\n  438 |             var inputStream: FileInputStream? = null\n  439 | \n  440 |             try {\n  441 |                 retriever.setDataSource(path)\n  442 |             } catch (ignored: Exception) {\n  443 |                 try {\n  444 |                     inputStream = FileInputStream(path)\n  445 |                     retriever.setDataSource(inputStream.fd)\n  446 |                 } catch (ignored: Exception) {\n  447 |                     retriever.release()\n  448 |                     inputStream?.close()\n  449 |                     return@forEach\n  450 |                 }\n  451 |             }\n  452 | \n  453 |             val title = retriever.extractMetadata(METADATA_KEY_TITLE) ?: path.getFilenameFromPath()\n  454 |             val artist = retriever.extractMetadata(METADATA_KEY_ARTIST) ?: retriever.extractMetadata(METADATA_KEY_ALBUMARTIST) ?: MediaStore.UNKNOWN_STRING\n  455 |             val duration = retriever.extractMetadata(METADATA_KEY_DURATION)?.toLongOrNull()?.div(1000)?.toInt() ?: 0\n  456 |             val folderName = path.getParentPath().getFilenameFromPath()\n  457 |             val album = retriever.extractMetadata(METADATA_KEY_ALBUM) ?: folderName\n  458 |             val trackNumber = retriever.extractMetadata(METADATA_KEY_CD_TRACK_NUMBER)\n  459 |             val trackId = trackNumber?.firstNumber()\n  460 |             val discNumber = retriever.extractMetadata(METADATA_KEY_DISC_NUMBER)?.firstNumber()\n  461 |             val year = retriever.extractMetadata(METADATA_KEY_YEAR)?.toIntOrNull() ?: 0\n  462 |             val dateAdded = try {\n  463 |                 (File(path).lastModified() / 1000L).toInt()\n  464 |             } catch (e: Exception) {\n  465 |                 0\n  466 |             }\n  467 | \n  468 |             val genre = retriever.extractMetadata(METADATA_KEY_GENRE).orEmpty()\n  469 | \n  470 |             if (title.isNotEmpty()) {\n  471 |                 val track = Track(\n  472 |                     id = 0, mediaStoreId = 0, title = title, artist = artist, path = path, duration = duration, album = album, genre = genre,\n  473 |                     coverArt = \"\", playListId = 0, trackId = trackId, discNumber = discNumber, folderName = folderName, albumId = 0, artistId = 0,\n  474 |                     genreId = 0, year = year, dateAdded = dateAdded, orderInPlaylist = 0, flags = FLAG_MANUAL_CACHE\n  475 |                 )\n  476 |                 // use hashCode() as id for tracking purposes, there's a very slim chance of collision\n  477 |                 track.mediaStoreId = track.hashCode().toLong()\n  478 |                 tracks.add(track)\n  479 |             }\n  480 | \n  481 |             try {\n  482 |                 inputStream?.close()\n  483 |                 retriever.release()\n  484 |             } catch (ignored: Exception) {\n  485 |             }\n  486 |         }","lines":50}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The `state` setter posts listener notifications to the main thread via Handler(Looper.getMainLooper()).post and clears nothing; onReadyListeners is never cleared after firing. Listeners registered through whenReady accumulate across reloads and are invoked again on every subsequent INITIALIZED/ERROR transition, causing duplicate callbacks (e.g. repeated notifyChildrenChanged / repeated future completions) and unbounded growth of the list.","fix":"After dispatching, clear (or snapshot-and-remove) the fired listeners so each registration is invoked exactly once.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/library/MediaItemProvider.kt:58-74","code":"   58 |     private val onReadyListeners = mutableListOf<(Boolean) -> Unit>()\n   59 | \n   60 |     private var state: Int = STATE_CREATED\n   61 |         set(value) {\n   62 |             if (value == STATE_INITIALIZED || value == STATE_ERROR) {\n   63 |                 synchronized(onReadyListeners) {\n   64 |                     field = value\n   65 |                     Handler(Looper.getMainLo text.queueDAO.getCurrent()?.let {\n  146 |             val mediaItem = getMediaItemFromQueueItem(it) ?: return@let null\n  147 |             val metadata = mediaItem.mediaMetadata.buildUpon().build()\n  148 |             startPosition = it.lastPosition * 1000L\n  149 |             mediaItem.buildUpon().setMediaMetadata(metadata).build()\n  150 |         }\n  151 | \n  152 |         val startIndex = maxOf(recentItems.indexOf(currentItem), 0)\n  153 |         return MediaItemsWithStartPosition(recentItems, startIndex, startPosition)\n  154 |     }","lines":13}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"SimpleMusicPlayer.seekToNext() calls play() unconditionally before advancing. This forces playback to start whenever a controller requests skip-to-next even if the user had paused, which violates the typical expectation that skipping while paused stays paused. The same applies to seekToPrevious(). This is surprising behavior baked into a Player override that all controllers (incl. system UI) route through.","fix":"Preserve the prior play/pause state instead of always calling play() on skip, or document why forcing playback is intended.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/player/SimpleMusicPlayer.kt:39-50","code":"   39 |     override fun seekToNext() {\n   40 |         play()\n   41 |         if (maybeForceNext()) return\n   42 |         super.seekToNext()\n   43 |     }\n   44 | \n   45 |     override fun seekToPrevious() {\n   46 |         play()\n   47 |         if (maybeRestartOnPrevious()) return\n   48 |         if (maybeForcePrevious()) return\n   49 |         super.seekToPrevious()\n   50 |     }","lines":12}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"setNextMediaItem(): in the branch where the item is not already in the queue (else, line 81-85), it computes newIndex = currentMediaItemInd
