rrentIndex = shuffledIndices.indexOf(itemIndex)\n   93 |             val shuffledNewIndex = shuffledIndices.indexOf(nextMediaItemIndex)\n   94 |             shuffledIndices.move(currentIndex = shuffledCurrentIndex, newIndex = shuffledNewIndex)\n   95 |             exoPlayer.shuffleOrder = DefaultShuffleOrder(\n   96 |                 shuffledIndices.toIntArray(),\n   97 |                 DEFAULT_SHUFFLE_ORDER_SEED\n   98 |             )\n   99 |         }\n  100 |     }","lines":29}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In ChangeSortingDialog.setupSortRadio the ACTIVITY_PLAYLIST_FOLDER branch reuses RadioItem index 4 for both \"date_added\" and \"custom\". The first constructor arg is an unused display index (radio button View ids come from radioItem.value, the distinct sort flag), so this is harmless today, but the duplicate index is misleading and would bite if the index were ever used as an identifier.","fix":"Give the custom RadioItem a unique index (e.g. 5).","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/dialogs/ChangeSortingDialog.kt:103-107","code":"  103 |                 radioItems.add(RadioItem(4, activity.getString(org.fossify.commons.R.string.date_added), PLAYER_SORT_BY_DATE_ADDED))\n  104 | \n  105 |                 if (playlist != null) {\n  106 |                     radioItems.add(RadioItem(4, activity.getString(org.fossify.commons.R.string.custom), PLAYER_SORT_BY_CUSTOM))\n  107 |                 }","lines":5}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"albumCnt and trackCnt are swapped when reading the artists cursor: albumCnt is read from NUMBER_OF_TRACKS and trackCnt is read from NUMBER_OF_ALBUMS. This produces wrong per-artist album/track counts throughout the UI.","fix":"Swap the assignments: albumCnt = getIntValue(NUMBER_OF_ALBUMS), trackCnt = getIntValue(NUMBER_OF_TRACKS).","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/SimpleMediaScanner.kt:302-303","code":"  302 |             val albumCnt = cursor.getIntValue(Audio.Artists.NUMBER_OF_TRACKS)\n  303 |             val trackCnt = cursor.getIntValue(Audio.Artists.NUMBER_OF_ALBUMS)","lines":2}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"The entire scan pipeline is wrapped in `catch (ignored: Exception) {}` which silently swallows every error (DB failures, MediaStore query errors, OOM-adjacent issues). When an exception occurs mid-scan the callback `onScanComplete?.invoke(true)` is never called, so callers waiting for completion may hang or never refresh, and the failure is invisible for debugging.","fix":"At minimum log the exception; consider invoking the completion callback (or a failure callback) in the finally block so callers are not left waiting.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/SimpleMediaScanner.kt:62-86","code":"   62 |         ensureBackgroundThread {\n   63 |             try {\n   64 |                 scanMediaStore()\n   65 |                 if (isQPlus()) {\n   66 |                     onScanComplete?.invoke(false)\n   67 |                     scanFilesManually()\n   68 |                 }\n   69 | \n   70 |                 cleanupDatabase()\n   71 |                 onScanComplete?.invoke(true)\n   72 |             } catch (ignored: Exception) {\n   73 |             } finally {\n   74 |                 if (showProgress && newTracks.isEmpty()) {\n   75 |                     context.toast(org.fossify.commons.R.string.no_items_found)\n   76 |                 }\n   77 | \n   78 |                 newTracks.clear()\n   79 |                 newAlbums.clear()\n   80 |                 newArtists.clear()\n   81 |                 newGenres.clear()\n   82 |                 mediaStorePaths.clear()\n   83 |                 scanning = false\n   84 |                 hideScanProgress()\n   85 |             }\n   86 |         }","lines":25}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"TagHelper.writeTag uses multiple non-null assertions (`!!`) on I/O results that can legitimately be null: openInputStream(uri), getTempFile(...), and openOutputStream(uri, \"w\"). Any of these returning null (e.g. provider denies access, temp dir unavailable) throws NullPointerException instead of surfacing a handled error. There is also no try/catch, so failures crash rather than toast.","fix":"Null-check getTempFile and the streams, bail out with a user-facing error toast, and wrap the operation in try/catch like the other helpers do.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/TagHelper.kt:42-58","code":"   42 |             val temp = activity.getTempFile(TEMP_FOLDER, track.path.getFilenameFromPath())\n   43 |             activity.contentResolver.openInputStream(uri)!!.use { inputStream ->\n   44 |                 temp!!.outputStream().use { out ->\n   45 |                     inputStream.copyTo(out)\n   46 |                 }\n   47 |             }\n   48 | \n   49 |             val audioFile = AudioFileIO.read(temp)\n   50 |             val tag = audioFile.tag ?: createTag(track.path.getFilenameExtension()).also { audioFile.tag = it }\n   51 |             tag.setField(FieldKey.TITLE, newTitle)\n   52 |             tag.setField(FieldKey.ARTIST, newArtist)\n   53 |             tag.setField(FieldKey.ALBUM, newAlbum)\n   54 |             audioFile.commit()\n   55 | \n   56 |             activity.contentResolver.openOutputStream(uri, \"w\")!!.use { outputStream ->\n   57 |                 outputStream.write(temp!!.readBytes())\n   58 |             }","lines":17}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"EqualizerActivity swallows exceptions silently in multiple band-setting paths: the empty catch in onProgressChanged (lines 104-105) and the IllegalStateException catch when enabling the equalizer (lines 52-53). If setBandLevel consistently fails (e.g. equalizer not initialized), the UI moves the SeekBar but nothing happens and the user gets no feedback, masking real failures.","fix":"Log or surface failures (at least once) instead of fully silent catches, so persistent equalizer failures are diagnosable.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/EqualizerActivity.kt:99-105","code":"   99 |                             try {\n  100 |                                 if (equalizer.getBandLevel(band.toShort()) != newValue.toShort()) {\n  101 |                                     equalizer.setBandLevel(band.toShort(), newValue.toShort())\n  102 |                                     bands[band.toShort()] = newValue\n  103 |                                 }\n  104 |                             } catch (ignored: Exception) {\n  105 |                             }","lines":7},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/EqualizerActivity.kt:48-53","code":"   48 |         try {\n   49 |             if (!equalizer.enabled) {\n   50 |                 equalizer.enabled = true\n   51 |             }\n   52 |         } catch (ignored: IllegalStateException) {\n   53 |         }","lines":6}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"QueueAdapter.updateCurrentTrack scrolls to newIndex only when BOTH previousIndex and newIndex are found (previousIndex != -1 && newIndex != -1). On the very first track or whenever the previous track is no longer in the queue, previousIndex is -1, so even though newIndex is valid the highlight update and smooth-scroll to the now-playing track are skipped, leaving the current track unhighlighted/not scrolled into view.","fix":"Decouple the conditions: if previousIndex != -1 notifyItemChanged(previousIndex); independently, if newIndex != -1 notifyItemChanged(newIndex) and scroll to it.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/adapters/QueueAdapter.kt:83-90","code":"   83 |                 val previousIndex = items.indexOfFirst { it.mediaStoreId == lastTrackId }\n   84 |                 val newIndex = items.indexOfFirst { it.mediaStoreId == track.mediaStoreId }\n   85 |                 if (previousIndex != -1 && newIndex != -1) {\n   86 |                     notifyItemChanged(previousIndex)\n   87 |                     notifyItemChanged(newIndex)\n   88 |                     recyclerView.lazySmoothScroll(newIndex)\n   89 |                 }\n   90 |             }","lines":8}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"ExportPlaylistDialog sets ignoreClicks = true before exporting but never reads it; the OK button click handler does not check ignoreClicks. Rapid double-taps on OK can therefore enqueue the export callback twice (each on a background thread) before the dialog dismisses, defeating the apparent intent of the flag.","fix":"Either guard the click handler with `if (ignoreClicks) return@setOnClickListener` at the top, or remove the unused flag.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/dialogs/ExportPlaylistDialog.kt:19-20","code":"   19 |     private var ignoreClicks = false\n   20 |     private var realPath = path.ifEmpty { activity.internalStoragePath }","lines":2},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/dialogs/ExportPlaylistDialog.kt:49-66","code":"   49 |                     alertDialog.getButton(AlertDialog.BUTTON_POSITIVE).setOnClickListener {\n   50 |                         val filename = binding.exportPlaylistFilename.value\n   51 |                         when {\n   52 |                             filename.isEmpty() -> activity.toast(org.fossify.commons.R.string.empty_name)\n   53 |                             filename.isAValidFilename() -> {\n   54 |                                 val file = File(realPath, \"$filename.m3u\")\n   55 |                                 if (!hidePath && file.exists()) {\n   56 |                                     activity.toast(org.fossify.commons.R.string.name_taken)\n   57 |                                     return@setOnClickListener\n   58 |                                 }\n   59 | \n   60 |                                 ignoreClicks = true\n   61 |                                 ensureBackgroundThread {\n   62 |                                     activity.config.lastExportPath = file.absolutePath.getParentPath()\n   63 |                                     callback(file)\n   64 |                                     alertDialog.dismiss()\n   65 |                                 }\n   66 |                             }","lines":18}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"ListenableFuture.getOrNull casts the result with `get(...) as T`. Because get can legitimately return null and T is generic/erased, the unchecked cast offers no safety, and more importantly the function will block up to 15 seconds on the calling thread. getControllerSync() (SimpleMediaController) calls this, and it is invoked from within withController on the player/main path, risking a 15s block / ANR if the controller future never completes.","fix":"Avoid blocking on the main thread (use the future's listener callback you already have in createControllerAsync) and drop the meaningless unchecked cast.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/extensions/Future.kt:9-17","code":"    9 | fun <T> ListenableFuture<T>.getOrNull(timeout: Long = 15000L, unit: TimeUnit = TimeUnit.MILLISECONDS) = try {\n   10 |     get(timeout, unit) as T\n   11 | } catch (e: CancellationException) {\n   12 |     null\n   13 | } catch (e: ExecutionException) {\n   14 |     null\n   15 | } catch (e: TimeoutException) {\n   16 |     null\n   17 | }","lines":9}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"M3uImporter.importPlaylist opens the input stream (File(path).inputStream() or assets.open) outside the try block (lines 23-27). If opening throws (file missing, asset absent), the exception propagates uncaught - the surrounding try/catch that calls showErrorToast and the finally that closes the stream do not cover the open call, so a bad path crashes instead of reporting IMPORT_FAIL.","fix":"Move the stream-opening into the try block (or its own try) and report IMPORT_FAIL on failure.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/M3uImporter.kt:22-27","code":"   22 |     fun importPlaylist(path: String, playListId: Int) {\n   23 |         val inputStream = if (path.contains(\"/\")) {\n   24 |             File(path).inputStream()\n   25 |         } else {\n   26 |             activity.assets.open(path)\n   27 |         }","lines":6}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"startSleepTimer computes `millisInFuture = config.sleepInTS - System.currentTimeMillis() + 1000L`. If sleepInTS is in the past or 0 (e.g. stale config), millisInFuture is negative; CountDownTimer with a negative duration fires onFinish almost immediately, stopping the service unexpectedly. There is no lower-bound clamp.","fix":"Clamp millisInFuture to a non-negative minimum (e.g. coerceAtLeast(0)) and/or validate config.sleepInTS is in the future before starting.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/SleepTimer.kt:19-22","code":"   19 | internal fun PlaybackService.startSleepTimer() {\n   20 |     val millisInFuture = config.sleepInTS - System.currentTimeMillis() + 1000L\n   21 |     sleepTimer?.cancel()\n   22 |     sleepTimer = object : CountDownTimer(millisInFuture, 1000) {","lines":4}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"notifyDataChanged() uses notifyItemRangeChanged(0, itemCount) for any non-empty list, but it is called from updateItems() after the backing `items` list has been replaced with a list of a DIFFERENT size. notifyItemRangeChanged only rebinds existing positions; it never tells RecyclerView that items were inserted or removed. When the new list is larger, the range [0, newCount) extends past the positions RecyclerView currently knows about; when it is smaller, leftover items are never removed. This causes stale/duplicated rows and can trigger \"Inconsistency detected\" IndexOutOfBounds crashes during layout. The correct primitive for a wholesale data swap is notifyDataSetChanged() (or DiffUtil), not notifyItemRangeChanged.","fix":"In updateItems(), call notifyDataSetChanged() when the item count changes (or adopt DiffUtil/ListAdapter). Reserve notifyItemRangeChanged for in-place rebinds (color/highlight changes) where the size is unchanged.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/adapters/BaseMusicAdapter.kt:173-178","code":"  173 |     @SuppressLint(\"NotifyDataSetChanged\")\n  174 |     fun notifyDataChanged() = if (itemCount == 0) {\n  175 |         notifyDataSetChanged()\n  176 |     } else {\n  177 |         notifyItemRangeChanged(0, itemCount)\n  178 |     }","lines":6},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/adapters/BaseMusicAdapter.kt:65-75","code":"   65 |     open fun updateItems(newItems: ArrayList<Type>, highlightText: String = \"\", forceUpdate: Boolean = false) {\n   66 |         if (forceUpdate || newItems.hashCode() != items.hashCode()) {\n   67 |             items = newItems.clone() as ArrayList<Type>\n   68 |             textToHighlight = highlightText\n   69 |             notifyDataChanged()\n   70 |             finishActMode()\n   71 |         } else if (textToHighlight != highlightText) {\n   72 |             textToHighlight = highlightText\n   73 |             notifyDataChanged()\n   74 |         }\n   75 |     }","lines":11}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"SettingsActivity.setupUseEnglish and MainActivity restart the process by calling exitProcess(0) / System.exit(0) to apply config changes. Killing the process abruptly is a crude way to relaunch and can lose unsaved state and produce a jarring UX; it is also generally discouraged on Android (the OS may restart the app inconsistently).","fix":"Use a proper recreate()/relaunch flow (e.g. restart the launcher activity with a fresh task and finishAffinity) instead of forcibly exiting the process.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/SettingsActivity.kt:72-76","code":"   72 |         settingsUseEnglishHolder.setOnClickListener {\n   73 |             settingsUseEnglish.toggle()\n   74 |             config.useEnglish = settingsUseEnglish.isChecked\n   75 |             exitProcess(0)\n   76 |         }","lines":5},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/MainActivity.kt:84-88","code":"   84 |         if (storedShowTabs != config.showTabs) {\n   85 |             config.lastUsedViewPagerPage = 0\n   86 |             System.exit(0)\n   87 |             return\n   88 |         }","lines":5}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"resizeDrawable unconditionally casts the Drawable to BitmapDrawable. getSmallPlaceholder/getBiggerPlaceholder pass drawables loaded from vector/other resources via getDrawable(); if R.drawable.ic_headset(_padded) is ever a non-BitmapDrawable (e.g. a VectorDrawable), this throws ClassCastException and crashes.","fix":"Guard the cast (drawable as? BitmapDrawable) and fall back to drawing the drawable onto a Canvas-backed Bitmap when it is not already a BitmapDrawable.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/extensions/Resources.kt:24-28","code":"   24 | fun Resources.resizeDrawable(drawable: Drawable, size: Int): Drawable {\n   25 |     val bitmap = (drawable as BitmapDrawable).bitmap\n   26 |     val bitmapResized = Bitmap.createScaledBitmap(bitmap, size, size, false)\n   27 |     return BitmapDrawable(this, bitmapResized)\n   28 | }","lines":5}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"RoomHelper.getTracksFromPaths reads Audio.Media.DATE_ADDED from the cursor (line 78) but DATE_ADDED is not included in the projection (lines 31-41). getIntValueOrNull returns null for a column not present in the query, so dateAdded silently becomes 0 for every track resolved via MediaStore here, losing the real date-added value.","fix":"Add Audio.Media.DATE_ADDED to the projection list.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/RoomHelper.kt:31-41","code":"   31 |         val projection = arrayListOf(\n   32 |             Audio.Media._ID,\n   33 |             Audio.Media.TITLE,\n   34 |             Audio.Media.ARTIST,\n   35 |             Audio.Media.DATA,\n   36 |             Audio.Media.DURATION,\n   37 |             Audio.Media.ALBUM,\n   38 |             Audio.Media.ALBUM_ID,\n   39 |             Audio.Media.ARTIST_ID,\n   40 |             Audio.Media.YEAR\n   41 |         )","lines":11},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/RoomHelper.kt:78","code":"   78 |                 val dateAdded = cursor.getIntValueOrNull(Audio.Media.DATE_ADDED) ?: 0","lines":1}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"findAudioFiles recurses through the whole directory tree on the same thread without depth limiting or symlink handling. file.listFiles() can return null (handled) but a symlink loop or extremely deep tree can cause unbounded recursion / StackOverflowError, and the recursion runs the entire device scan synchronously.","fix":"Guard against symlink cycles (track visited canonical paths) and/or convert to an explicit stack/queue with a sane depth bound.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/helpers/SimpleMediaScanner.kt:492-511","code":"  492 |     private fun findAudioFiles(file: File, destination: ArrayList<String>, excludedPaths: MutableList<String>) {\n  493 |         if (file.isHidden) {\n  494 |             return\n  495 |         }\n  496 | \n  497 |         val path = file.absolutePath\n  498 |         if (path in excludedPaths || path.getParentPath() in excludedPaths) {\n  499 |             return\n  500 |         }\n  501 | \n  502 |         if (file.isFile) {\n  503 |             if (path.isAudioFast()) {\n  504 |                 destination.add(path)\n  505 |             }\n  506 |         } else if (!file.containsNoMedia()) {\n  507 |             file.listFiles().orEmpty().forEach { child ->\n  508 |                 findAudioFiles(child, destination, excludedPaths)\n  509 |             }\n  510 |         }\n  511 |     }","lines":20}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"WidgetConfigureActivity.saveConfig builds a result Intent with the widget id but never actually returns it to the caller correctly for the standard widget-pick flow review: it calls setResult(RESULT_OK, intent) inside the apply block (line 127) which is correct, but the activity returns RESULT_OK even when launched purely for color customization (mWidgetId == INVALID_APPWIDGET_ID), and the app-widget host receives an INVALID id. Combined with line 49 (which only finishes when not customizing colors), saving in customize-colors mode calls updateAppWidget with INVALID_APPWIDGET_ID.","fix":"Guard updateAppWidget/result intent on a valid mWidgetId; when only customizing colors, skip the appWidgetManager.updateAppWidget call and do not return a widget-id result.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/WidgetConfigureActivity.kt:110-130","code":"  110 |     private fun saveConfig() {\n  111 |         val appWidgetManager = AppWidgetManager.getInstance(this) ?: return\n  112 |         val views = RemoteViews(packageName, R.layout.widget).apply {\n  113 |             applyColorFilter(R.id.widget_background, mBgColor)\n  114 |         }\n  115 | \n  116 |         appWidgetManager.updateAppWidget(mWidgetId, views)\n  117 | \n  118 |         storeWidgetColors()\n  119 |         requestWidgetUpdate()\n  120 | \n  121 |         if (config.initialWidgetHeight == 0) {\n  122 |             config.widgetIdToMeasure = mWidgetId\n  123 |         }\n  124 | \n  125 |         Intent().apply {\n  126 |             putExtra(AppWidgetManager.EXTRA_APPWIDGET_ID, mWidgetId)\n  127 |             setResult(RESULT_OK, this)\n  128 |         }\n  129 |         finish()\n  130 |     }","lines":21},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/activities/WidgetConfigureActivity.kt:45-51","code":"   45 |         val isCustomizingColors = intent.extras?.getBoolean(IS_CUSTOMIZING_COLORS) == true\n   46 |         mWidgetId = intent.extras?.getInt(AppWidgetManager.EXTRA_APPWIDGET_ID)\n   47 |             ?: AppWidgetManager.INVALID_APPWIDGET_ID\n   48 | \n   49 |         if (mWidgetId == AppWidgetManager.INVALID_APPWIDGET_ID && !isCustomizingColors) {\n   50 |             finish()\n   51 |         }","lines":7}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"loadTrackCoverArt uses the deprecated MediaStore.Images.Media.getBitmap(ContentResolver, Uri), which loads a full-size bitmap (risking large allocations/OOM) and is deprecated in favor of ImageDecoder. The Q+ path already uses loadThumbnail; the pre-Q content:// path relies on the deprecated API with no size bound.","fix":"On Q+ prefer contentResolver.loadThumbnail for all content:// URIs; on older APIs decode with a bounded BitmapFactory.Options sampleSize instead of getBitmap.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/extensions/Context.kt:202-207","code":"  202 |     if (artworkUri.startsWith(\"content://\")) {\n  203 |         try {\n  204 |             return MediaStore.Images.Media.getBitmap(contentResolver, artworkUri.toUri())\n  205 |         } catch (ignored: Exception) {\n  206 |         }\n  207 |     }","lines":6}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Resources.getDrawable(int) (one-arg) is deprecated since API 22 and ignores the theme. The app targets modern APIs, so this should use a theme-aware loader.","fix":"Use ResourcesCompat.getDrawable(this, R.drawable.xxx, theme) or AppCompatResources.getDrawable(context, id).","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/extensions/Resources.kt:11","code":"   11 |     val placeholder = getDrawable(R.drawable.ic_headset_padded)","lines":1},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/extensions/Resources.kt:18","code":"   18 |     val placeholder = getDrawable(R.drawable.ic_headset)","lines":1}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"showNoPermissionNotification posts startForeground after a 100ms delay and swallows every exception with an empty catch. On Android 12+ a delayed startForeground from the background can throw ForegroundServiceStartNotAllowedException, which is silently ignored, leaving the service running without a foreground notification (and at risk of being killed / triggering an ANR-style violation). The empty catch also hides genuine errors.","fix":"Handle/log the specific exception and fall back gracefully (e.g. stopSelf or surface the permission state) rather than swallowing all exceptions.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/playback/PlaybackService.kt:80-90","code":"   80 |     private fun showNoPermissionNotification() {\n   81 |         Handler(Looper.getMainLooper()).postDelayed(delayInMillis = 100L) {\n   82 |             try {\n   83 |                 startForeground(\n   84 |                     NotificationHelper.NOTIFICATION_ID,\n   85 |                     NotificationHelper.createInstance(this).createNoPermissionNotification()\n   86 |                 )\n   87 |             } catch (ignored: Exception) {\n   88 |             }\n   89 |         }\n   90 |     }","lines":11}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"CurrentTrackBar.updateCurrentTrack loads the cover art into findViewById(R.id.current_track_image) instead of using the already-bound view-binding reference (binding.currentTrackImage). This redundant findViewById on every track change defeats the purpose of the view binding used elsewhere in the same class and is slower and error-prone.","fix":"Load into binding.currentTrackImage instead of findViewById(R.id.current_track_image).","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/views/CurrentTrackBar.kt:57-63","code":"   57 |         context.getTrackCoverArt(track) { coverArt ->\n   58 |             (context as? Activity)?.ensureActivityNotDestroyed {\n   59 |                 Glide.with(this)\n   60 |                     .load(coverArt)\n   61 |                     .apply(options)\n   62 |                     .into(findViewById(R.id.current_track_image))\n   63 |             }","lines":7}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"TracksActivity.addTrackFromPath and refreshPlaylist run audioHelper/RoomHelper database calls (getTrack, getTrackFromPath, insertTracks, getPlaylistTracks) directly on whatev 364 |         val newTracks = audioHelper.getPlaylistTracks(playlist!!.id)\n  365 |         runOnUiThread {\n  366 |             getTracksAdapter()?.updateItems(newTracks)\n  367 |             binding.tracksPlaceholder.beVisibleIf(newTracks.isEmpty())\n  368 |             binding.tracksPlaceholder2.beVisibleIf(newTracks.isEmpty())\n  369 |         }\n  370 |     }","lines":10}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"onBindViewHolder triggers a metadata/cover-art read on every bind via activity.getTrackCoverArt(track){ ... } (and getAlbumCoverArt / getGenreCoverArt / getArtistCoverArt in the other adapters). bindView is called on every scroll for every visible row, so cover-art retrieval (often a disk/MediaStore lookup) is kicked off repeatedly during fast scrolling rather than being debounced or cached, causing jank. The asynchronous callback also has no guard that the holder is still bound to the same item, so a slow lookup can set a stale image on a recycled view.","fix":"Let Glide handle the cover-art source directly (load a model/URI) instead of a per-bind callback, and verify the holder still references the same track in the callback before calling loadImage.","locations":[{"ref":"app/src/main/kotlin/org/fossify/musicplayer/adapters/TracksAdapter.kt:206-208","code":"  206 |             activity.getTrackCoverArt(track) { coverArt ->\n  207 |                 loadImage(trackImage, coverArt, placeholderBig)\n  208 |             }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/adapters/QueueAdapter.kt:166-168","code":"  166 |             context.getTrackCoverArt(track) { coverArt ->\n  167 |                 loadImage(trackQueueImage, coverArt, placeholderBig)\n  168 |             }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/musicplayer/adapters/AlbumsTracksAdapter.kt:145-167","code":"  145 |             context.getAlbumCoverArt(album) { coverArt ->\n  146 |    private val newGenres = arrayListOf<Genre>()\n   40 | \n   41 |     private var notificationHelper: NotificationHelper? = null\n   42 |     private var notificationHandler: Handler? = null\n   43 |     private var lastProgressUpdateMs = 0L\n   44 | \n   45 |     fun isScanning(): Boolean = scanning\n   46 | \n   47 |     /**\n   48 |      * Initiates the scanning process for new audio files, artists, and albums. Since the manual scan can be a slow process, the [callback] parameter is\n   49 |      * triggered in two stages to ensure that the UI is updated as soon as possible.\n   50 |      */\n   51 |     @Synchronized\n   52 |     fun scan(progress: Boolean = false, callback: ((complete: Boolean) -> Unit)? = null) {\n   53 |         onScanComplete = callback\n   54 |         showProgress = progress\n   55 |         maybeShowScanProgress()\n   56 | \n   57 |         if (scanning) {\n   58 |             return\n   59 |         }\n   60 | \n   61 |         scanning = true\n   62 |         ensureBackgroundThread {\n   63 |             try {\n   64 |                 scanMediaStore()\n   65 |                 if (isQPlus()) {\n   66 |                     onScanComplete?.invoke(false)\n   67 |                     scanFilesManually()\n   68 |                 }\n   69 | \n   70 |                 cleanupDatabase()\n   71 |                 onScanComplete?.invoke(true)\n   72 |             } catch (ignored: Exception) {\n   73 |             } finally {\n   74 |                 if (showProgress && newTracks.isEmpty()) {\n   75 |                     context.toast(org.fossify.commons.R.string.no_items_found)\n   76 |                 }\n   77 | \n   78 |                 newTracks.clear()\n   79 |                 newAlbums.clear()\n   80 |                 newArtists.clear()\n   81 |                 newGenres.clear()\n   82 |                 mediaStorePaths.clear()\n   83 |                 scanning = false\n   84 |                 hideScanProgress()\n   85 |             }\n   86 |         }\n   87 |     }\n   88 | \n   89 |     /**\n   90 |      * Scans [MediaStore] for audio files. Querying [MediaStore.Audio.Artists] and [MediaStore.Audio.Albums] is not necessary in this context, we\n   91 |      * can manually group tracks by artist and album as done in [scanFilesManually]. However, this approach would require fetching album art bitmaps repeatedly\n   92 |      * using [MediaMetadataRetriever] instead of utilizing the cached version provided by [MediaStore]. This may become a necessity when we add more nuanced\n   93 |      * features e.g. group albums by `ALBUM-ARTIST` instead of `ARTIST`\n   94 |      */\n   95 |     private fun scanMediaStore() {\n   96 |         newTracks += getTracksSync()\n   97 |         newArtists += getArtistsSync()\n   98 |         newAlbums += getAlbumsSync(newArtists)\n   99 |         newGenres += getGenresSync()\n  100 |         mediaStorePaths += newTracks.map { it.path }\n  101 |         assignGenreToTracks()\n  102 | \n  103 |         // ignore tracks from excluded folders and tracks with no albums, artists\n  104 |         val albumIds = newAlbums.map { it.id }\n  105 |         val artistIds = newArtists.map { it.id }\n  106 |         val excludedFolders = config.excludedFolders\n  107 |         val tracksToExclude = mutableSetOf<Track>()\n  108 |         for (track in newTracks) {\n  109 |             if (track.path.getParentPath() in excludedFolders) {\n  110 |                 tracksToExclude.add(track)\n  111 |                 continue\n  112 |             }\n  113 | \n  114 |             if (track.albumId !in albumIds || track.artistId !in artistIds) {\n  115 |                 tracksToExclude.add(track)\n  116 |             }\n  117 |         }\n  118 | \n  119 |         newTracks.removeAll(tracksToExclude)\n  120 | \n  121 |         // update album, track count if any tracks were excluded\n  122 |         for (album in newAlbums) {\n  123 |             val tracksInAlbum = newTracks.filter { it.albumId == album.id }\n  124 |             album.trackCnt = tracksInAlbum.size\n  125 |             if (album.trackCnt > 0) {\n  126 |                 album.dateAdded = tracksInAlbum.first().dateAdded\n  127 |             }\n  128 |         }\n  129 | \n  130 |         for (artist in newArtists) {\n  131 |             artist.trackCnt = newTracks.filter { it.artistId == artist.id }.size\n  132 |             val albumsByArtist = newAlbums.filter { it.artistId == artist.id }\n  133 |             artist.albumCnt = albumsByArtist.size\n  134 |             artist.albumArt = albumsByArtist.firstOrNull { it.coverArt.isNotEmpty() }?.coverArt.orEmpty()\n  135 |         }\n  136 | \n  137 |         for (genre in newGenres) {\n  138 |             val genreTracks = newTracks.filter { it.genreId == genre.id }\n  139 |             genre.trackCnt = genreTracks.size\n  140 |             genre.albumArt = genreTracks.firstOrNull { it.coverArt.isNotEmpty() }?.coverArt.orEmpty()\n  141 |         }\n  142 | \n  143 |         // remove invalid albums, artists\n  144 |         newAlbums.removeAll { it.trackCnt == 0 }\n  145 |         newArtists.removeAll { it.trackCnt == 0 || it.albumCnt == 0 }\n  146 |         newGenres.removeAll { it.trackCnt == 0 }\n  147 | \n  148 |         updateAllDatabases()\n  149 |     }\n  150 | \n  151 |     /**\n  152 |      * Manually scans the storage for audio files. This method is used to find audio files that may not be available in the [MediaStore] database,\n  153 |      * as well as files added through unconventional methods (e.g. `adb push`) that may take longer to appear in [MediaStore]. By performing a manual scan,\n  154 |      * any new audio files can be immediately detected and made visible within the app. Existing paths already available in [MediaStore] are ignored to optimize\n  155 |      * the scanning process for efficiency.\n  156 |      */\n  157 |     private fun scanFilesManually() {\n  158 |         val trackPaths = newTracks.map { it.path }\n  159 |         val artistNames = newArtists.map { it.title }\n  160 |         val albumNames = newAlbums.map { it.title }\n  161 |         val genreNames = newGenres.map { it.title }\n  162 | \n  163 |         val tracks = findTracksManually(pathsToIgnore = trackPaths)\n  164 |         if (tracks.isNotEmpty()) {\n  165 |             val artists = splitIntoArtists(tracks)\n  166 |             val albums = splitIntoAlbums(tracks)\n  167 |             val genres = splitIntoGenres(tracks)\n  168 | \n  169 |             newTracks += tracks.filter { it.path !in trackPaths }\n  170 |             newAlbums += albums.filter { it.title !in albumNames }\n  171 |             newArtists += artists.filter { it.title !in artistNames }\n  172 |             newGenres += genres.filter { it.title !in genreNames }\n  173 | \n  174 |             updateAllDatabases()\n  175 |         }\n  176 |     }\n  177 | \n  178 |     private fun updateAllDatabases() {\n  179 |         context.audioHelper.apply {\n  180 |             insertTracks(newTracks)\n  181 |             insertAlbums(newAlbums)\n  182 |             insertArtists(newArtists)\n  183 |             insertGenres(newGenres)\n  184 |         }\n  185 |         updateAllTracksPlaylist()\n  186 |     }\n  187 | \n  188 |     private fun updateAllTracksPlaylist() {\n  189 |         if (!config.wasAllTracksPlaylistCreated) {\n  190 |             val allTracksLabel = context.resources.getString(R.string.all_tracks)\n  191 |             val playlist = Playlist(ALL_TRACKS_PLAYLIST_ID, allTracksLabel)\n  192 |             context.audioHelper.insertPlaylist(playlist)\n  193 |             config.wasAllTracksPlaylistCreated = true\n  194 |         }\n  195 | \n  196 |         // avoid re-adding tracks that have been explicitly removed from 'All tracks' playlist\n  197 |         val excludedFolders = config.excludedFolders\n  198 |         val tracksRemovedFromAllTracks = config.tracksRemovedFromAllTracksPlaylist.map { it.toLong() }\n  199 |         val tracksWithPlaylist = newTracks\n  200 |             .filter { it.mediaStoreId !in tracksRemovedFromAllTracks && it.playListId == 0 && it.path.getParentPath() !in excludedFolders }\n  201 |             .onEach { it.playListId = ALL_TRACKS_PLAYLIST_ID }\n  202 |         RoomHelper(context).insertTracksWithPlaylist(tracksWithPlaylist as ArrayList<Track>)\n  203 |     }\n  204 | \n  205 |     private fun getTracksSync(): ArrayList<Track> {\n  206 |         val tracks = arrayListOf<Track>()\n  207 |         val uri = Audio.Media.EXTERNAL_CONTENT_URI\n  208 |         val projection = arrayListOf(\n  209 |             Audio.Media._ID,\n  210 |             Audio.Media.DURATION,\n  211 |             Audio.Media.DATA,\n  212 |             Audio.Media.TITLE,\n  213 |             Audio.Media.ARTIST,\n  214 |             Audio.Media.ALBUM,\n  215 |             Audio.Media.ALBUM_ID,\n  216 |             Audio.Media.ARTIST_ID,\n  217 |             Audio.Media.TRACK,\n  218 |             Audio.Media.YEAR,\n  219 |             Audio.Media.DATE_ADDED\n  220 |         )\n  221 | \n  222 |         if (isQPlus()) {\n  223 |             projection.add(Audio.Media.BUCKET_DISPLAY_NAME)\n  224 |         }\n  225 | \n  226 |         if (isRPlus()) {\n  227 |             projection.add(Audio.Media.GENRE)\n  228 |             projection.add(Audio.Media.GENRE_ID)\n  229 |             projection.add(Audio.Media.DISC_NUMBER)\n  230 |         }\n  231 | \n  232 |         context.queryCursor(uri, projection.toTypedArray(), showErrors = true) { cursor ->\n  233 |             val id = cursor.getLongValue(Audio.Media._ID)\n  234 |             val title = cursor.getStringValue(Audio.Media.TITLE)\n  235 |             val duration = cursor.getIntValue(Audio.Media.DURATION) / 1000\n  236 |             var trackId = cursor.getStringValue(Audio.Media.TRACK)?.firstNumber()\n  237 |                 ?: cursor.getIntValueOrNull(Audio.Media.TRACK)\n  238 |             val path = cursor.getStringValue(Audio.Media.DATA).orEmpty()\n  239 |             val artist = cursor.getStringValue(Audio.Media.ARTIST) ?: MediaStore.UNKNOWN_STRING\n  240 |             val folderName = if (isQPlus()) {\n  241 |                 cursor.getStringValue(Audio.Media.BUCKET_DISPLAY_NAME) ?: MediaStore.UNKNOWN_STRING\n  242 |             } else {\n  243 |                 context.getFriendlyFolder(path).ifEmpty { MediaStore.UNKNOWN_STRING }\n  244 |             }\n  245 | \n  246 |             val album = cursor.getStringValue(Audio.Media.ALBUM) ?: folderName\n  247 |             val albumId = cursor.getLongValue(Audio.Media.ALBUM_ID)\n  248 |             val artistId = cursor.getLongValue(Audio.Media.ARTIST_ID)\n  249 |             val year = cursor.getIntValue(Audio.Media.YEAR)\n  250 |             val dateAdded = cursor.getIntValue(Audio.Media.DATE_ADDED)\n  251 |             val coverUri = ContentUris.withAppendedId(artworkUri, albumId)\n  252 |             val coverArt = coverUri.toString()\n  253 | \n  254 |             val genre: String\n  255 |             val genreId: Long\n  256 |             var discNumber: Int?\n  257 |             if (isRPlus()) {\n  258 |                 genre = cursor.getStringValue(Audio.Media.GENRE).orEmpty()\n  259 |                 genreId = cursor.getLongValue(Audio.Media.GENRE_ID)\n  260 |                 discNumber = cursor.getStringValue(Audio.Media.DISC_NUMBER)?.firstNumber()\n  261 |             } else {\n  262 |                 genre = \"\"\n  263 |                 genreId = 0\n  264 |                 discNumber = null\n  265 |             }\n  266 | \n  267 |             if (trackId != null && trackId >= 1000) {\n  268 |                 // derive disc number from track number when possible\n  269 |                 if (discNumber == null) {\n  270 |                     discNumber = trackId / 1000\n  271 |                 }\n  272 | \n  273 |                 trackId %= 1000\n  274 |             }\n  275 | \n  276 |             if (!title.isNullOrEmpty()) {\n  277 |                 val track = Track(\n  278 |                     id = 0, mediaStoreId = id, title = title, artist = artist, path = path, duration = duration, album = album, genre = genre,\n  279 |                     coverArt = coverArt, playListId = 0, trackId = trackId, discNumber = discNumber, folderName = folderName, albumId = albumId, artistId = artistId,\n  280 |                     genreId = genreId, year = year, dateAdded = dateAdded, orderInPlaylist = 0\n  281 |                 )\n  282 |                 tracks.add(track)\n  283 |             }\n  284 |         }\n  285 | \n  286 |         return tracks\n  287 |     }\n  288 | \n  289 |     private fun getArtistsSync(): ArrayList<Artist> {\n  290 |         val artists = arrayListOf<Artist>()\n  291 |         val uri = Audio.Artists.EXTERNAL_CONTENT_URI\n  292 |         val projection = arrayOf(\n  293 |             Audio.Artists._ID,\n  294 |             Audio.Artists.ARTIST,\n  295 |             Audio.Artists.NUMBER_OF_TRACKS,\n  296 |             Audio.Artists.NUMBER_OF_ALBUMS\n  297 |         )\n  298 | \n  299 |         context.queryCursor(uri, projection, showErrors = true) { cursor ->\n  300 |             val id = cursor.getLongValue(Audio.Artists._ID)\n  301 |             val title = cursor.getStringValue(Audio.Artists.ARTIST) ?: MediaStore.UNKNOWN_STRING\n  302 |             val albumCnt = cursor.getIntValue(Audio.Artists.NUMBER_OF_TRACKS)\n  303 |             val trackCnt = cursor.getIntValue(Audio.Artists.NUMBER_OF_ALBUMS)\n  304 |             val artist = Artist(id = id, title = title, albumCnt = albumCnt, trackCnt = trackCnt, albumArt = \"\")\n  305 |             if (artist.albumCnt > 0 && artist.trackCnt > 0) {\n  306 |                 newArtists.add(artist)\n  307 |             }\n  308 |         }\n  309 | \n  310 |         return artists\n  311 |     }\n  312 | \n  313 |     private fun getAlbumsSync(artists: ArrayList<Artist>): ArrayList<Album> {\n  314 |         val albums = arrayListOf<Album>()\n  315 |         val uri = Audio.Albums.EXTERNAL_CONTENT_URI\n  316 |         val projection = arrayListOf(\n  317 |             Audio.Albums._ID,\n  318 |             Audio.Albums.ARTIST,\n  319 |             Audio.Albums.FIRST_YEAR,\n  320 |             Audio.Albums.ALBUM,\n  321 |             Audio.Albums.NUMBER_OF_SONGS\n  322 |         )\n  323 | \n  324 |         if (isQPlus()) {\n  325 |             projection.add(Audio.Albums.ARTIST_ID)\n  326 |         }\n  327 | \n  328 |         context.queryCursor(uri, projection.toTypedArray(), null, null, showErrors = true) { cursor ->\n  329 |             val id = cursor.getLongValue(Audio.Albums._ID)\n  330 |             val artistName = cursor.getStringValue(Audio.Albums.ARTIST) ?: MediaStore.UNKNOWN_STRING\n  331 |             val title = cursor.getStringValue(Audio.Albums.ALBUM) ?: MediaStore.UNKNOWN_STRING\n  332 |             val coverArt = ContentUris.withAppendedId(artworkUri, id).toString()\n  333 |             val year = cursor.getIntValue(Audio.Albums.FIRST_YEAR)\n  334 |             val trackCnt = cursor.getIntValue(Audio.Albums.NUMBER_OF_SONGS)\n  335 |             val artistId = if (isQPlus()) {\n  336 |                 cursor.getLongValue(Audio.Albums.ARTIST_ID)\n  337 |             } else {\n  338 |                 artists.first { it.title == artistName }.id\n  339 |             }\n  340 | \n  341 |             if (trackCnt > 0) {\n  342 |                 val album = Album(\n  343 |                     id = id, artist = artistName, title = title, coverArt = coverArt, year = year, trackCnt = trackCnt, artistId = artistId, dateAdded = 0\n  344 |                 )\n  345 |                 albums.add(album)\n  346 |             }\n  347 |         }\n  348 | \n  349 |         return albums\n  350 |     }\n  351 | \n  352 |     private fun getGenresSync(): ArrayList<Genre> {\n  353 |         val genres = arrayListOf<Genre>()\n  354 |         val uri = Audio.Genres.EXTERNAL_CONTENT_URI\n  355 |         val projection = arrayListOf(Audio.Genres._ID, Audio.Genres.NAME)\n  356 |         context.queryCursor(uri, projection.toTypedArray(), showErrors = true) { cursor ->\n  357 |             val id = cursor.getLongValue(Audio.Genres._ID)\n  358 |             val title = cursor.getStringValue(Audio.Genres.NAME)\n  359 | \n  360 |             if (!title.isNullOrEmpty()) {\n  361 |                 val genre = Genre(id = id, title = title, trackCnt = 0, albumArt = \"\")\n  362 |                 genres.add(genre)\n  363 |             }\n  364 |         }\n  365 | \n  366 |         return genres\n  367 |     }\n  368 | \n  369 |     /**\n  370 |      * To map tracks to genres, we utilize [MediaStore.Audio.Genres.Members] because [MediaStore.Audio.Media.GENRE_ID] is not available on Android 11 and\n  371 |      * below. It is essential to call this method after [getTracksSync].\n  372 |      */\n  373 |     private fun assignGenreToTracks() {\n  374 |         if (isRPlus()) {\n  375 |             return\n  376 |         }\n  377 | \n  378 |         val genreToTracks = hashMapOf<Long, MutableList<Long>>()\n  379 |         val uri = GENRE_CONTENT_URI.toUri()\n  380 |         val projection = arrayListOf(\n  381 |             Audio.Genres.Members.GENRE_ID,\n  382 |             Audio.Genres.Members.AUDIO_ID\n  383 |         )\n  384 | \n  385 |         context.queryCursor(uri, projection.toTypedArray(), showErrors = true) {\n  386 |             val trackId = it.getLongValue(Audio.Genres.Members.AUDIO_ID)\n  387 |             val genreId = it.getLongValue(Audio.Genres.Members.GENRE_ID)\n  388 | \n  389 |             var tracks = genreToTracks[genreId]\n  390 |             if (tracks == null) {\n  391 |                 tracks = mutableListOf(trackId)\n  392 |             } else {\n  393 |                 tracks.add(trackId)\n  394 |             }\n  395 | \n  396 |             genreToTracks[genreId] = tracks\n  397 |         }\n  398 | \n  399 |         for ((genreId, trackIds) in genreToTracks) {\n  400 |             for (track in newTracks) {\n  401 |                 if (track.mediaStoreId in trackIds) {\n  402 |                     track.genreId = genreId\n  403 |                 }\n  404 |             }\n  405 |         }\n  406 |     }\n  407 | \n  408 |     private fun findTracksManually(pathsToIgnore: List<String>): ArrayList<Track> {\n  409 |         val audioFilePaths = arrayListOf<String>()\n  410 |         val excludedPaths = pathsToIgnore.toMutableList().apply { addAll(0, config.excludedFolders) }\n  411 | \n  412 |         for (rootPath in arrayOf(context.internalStoragePath, context.sdCardPath)) {\n  413 |             if (rootPath.isEmpty()) {\n  414 |                 continue\n  415 |             }\n  416 | \n  417 |             val rootFile = File(rootPath)\n  418 |             findAudioFiles(rootFile, audioFilePaths, excludedPaths)\n  419 |         }\n  420 | \n  421 |         if (audioFilePaths.isEmpty()) {\n  422 |             return arrayListOf()\n  423 |         }\n  424 | \n  425 |         val tracks = arrayListOf<Track>()\n  426 |         val totalPaths = audioFilePaths.size\n  427 |         var pathsScanned = 0\n  428 | \n  429 |         audioFilePaths.forEach { path ->\n  430 |             pathsScanned += 1\n  431 |             maybeShowScanProgress(\n  432 |                 pathBeingScanned = path,\n  433 |                 progress = pathsScanned,\n  434 |                 max = totalPaths\n  435 |             )\n  436 | \n  437 |             val retriever = MediaMetadataRetriever()\n  438 |             var inputStream: FileInputStream? = null\n  439 | \n  440 |             try {\n  441 |                 retriever.setDataSource(path)\n  442 |             } catch (ignored: Exception) {\n  443 |                 try {\n  444 |                     inputStream = FileInputStream(path)\n  445 |                     retriever.setDataSource(inputStream.fd)\n  446 |                 } catch (ignored: Exception) {\n  447 |                     retriever.release()\n  448 |                     inputStream?.close()\n  449 |                     return@forEach\n  450 |                 }\n  451 |             }\n  452 | \n  453 |             val title = retriever.extractMetadata(METADATA_KEY_TITLE) ?: path.getFilenameFromPath()\n  454 |             val artist = retriever.extractMetadata(METADATA_KEY_ARTIST) ?: retriever.extractMetadata(METADATA_KEY_ALBUMARTIST) ?: MediaStore.UNKNOWN_STRING\n  455 |             val duration = retriever.extractMetadata(METADATA_KEY_DURATION)?.toLongOrNull()?.div(1000)?.toInt() ?: 0\n  456 |             val folderName = path.getParentPath().getFilenameFromPath()\n  457 |             val album = retriever.extractMetadata(METADATA_KEY_ALBUM) ?: folderName\n  458 |             val trackNumber = retriever.extractMetadata(METADATA_KEY_CD_TRACK_NUMBER)\n  459 |             val trackId = trackNumber?.firstNumber()\n  460 |             val discNumber = retriever.extractMetadata(METADATA_KEY_DISC_NUMBER)?.firstNumber()\n  461 |             val year = retriever.extractMetadata(METADATA_KEY_YEAR)?.toIntOrNull() ?: 0\n  462 |             val dateAdded = try {\n  463 |                 (File(path).lastModified() / 1000L).toInt()\n  464 |             } catch (e: Exception) {\n  465 |                 0\n  466 |             }\n  467 | \n  468 |             val genre = retriever.extractMetadata(METADATA_KEY_GENRE).orEmpty()\n  469 | \n  470 |             if (title.isNotEmpty()) {\n  471 |                 val track = Track(\n  472 |                     id = 0, mediaStoreId = 0, title = title, artist = artist, path = path, duration = duration, album = album, genre = genre,\n  473 |                     coverArt = \"\", playListId = 0, trackId = trackId, discNumber = discNumber, folderName = folderName, albumId = 0, artistId = 0,\n  474 |                     genreId = 0, year = year, dateAdded = dateAdded, orderInPlaylist = 0, flags = FLAG_MANUAL_CACHE\n  475 |                 )\n  476 |                 // use hashCode() as id for tracking purposes, there's a very slim chance of collision\n  477 |                 track.mediaStoreId = track.hashCode().toLong()\n  478 |                 tracks.add(track)\n  479 |             }\n  480 | \n  481 |             try {\n  482 |                 inputStream?.close()\n  483 |                 retriever.release()\n  484 |             } catch (ignored: Exception) {\n  485 |             }\n  486 |         }\n  487 | \n  488 |         maybeRescanPaths(audioFilePaths)\n  489 |         return tracks\n  490 |     }\n  491 | \n  492 |     private fun findAudioFiles(file: File, destination: ArrayList<String>, excludedPaths: MutableList<String>) {\n  493 |         if (file.isHidden) {\n  494 |             return\n  495 |         }\n  496 | \n  497 |         val path = file.absolutePath\n  498 |         if (path in excludedPaths || path.getParentPath() in excludedPaths) {\n  499 |             return\n  500 |         }\n  501 | \n  502 |         if (file.isFile) {\n  503 |             if (path.isAudioFast()) {\n  504 |                 destination.add(path)\n  505 |             }\n  506 |         } else if (!file.containsNoMedia()) {\n  507 |             file.listFiles().orEmpty().forEach { child ->\n  508 |                 findAudioFiles(child, destination, excludedPaths)\n  509 |             }\n  510 |         }\n  511 |     }\n  512 | \n  513 |     private fun maybeRescanPaths(paths: ArrayList<String>) {\n  514 |         val pathsToRescan = paths.filter { path -> path !in mediaStorePaths }\n  515 |         context.rescanPaths(pathsToRescan)\n  516 |     }\n  517 | \n  518 |     private fun splitIntoArtists(tracks: ArrayList<Track>): ArrayList<Artist> {\n  519 |         val artists = arrayListOf<Artist>()\n  520 |         val tracksGroupedByArtist = tracks.groupBy { it.artist }\n  521 |         for ((artistName, tracksByArtist) in tracksGroupedByArtist) {\n  522 |             val trackCnt = tracksByArtist.s     const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
