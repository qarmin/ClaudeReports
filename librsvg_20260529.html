 i1a = f64::from(pixel.a) / 255f64;\n 1262 |             let i2a = f64::from(pixel_2.a) / 255f64;\n 1263 |             let oa = k1 * i1a * i2a + k2 * i1a + k3 * i2a + k4;\n 1264 |             let oa = clamp(oa, 0f64, 1f64);\n 1265 | \n 1266 |             // Contents of image surfaces are transparent by default, so if the resulting pixel is\n 1267 |             // transparent there's no need to do anything.\n 1268 |             if oa > 0f64 {\n 1269 |                 let compute = |i1, i2| {\n 1270 |                     let i1 = f64::from(i1) / 255f64;\n 1271 |                     let i2 = f64::from(i2) / 255f64;\n 1272 | \n 1273 |                     let o = k1 * i1 * i2 + k2 * i1 + k3 * i2 + k4;\n 1274 |                     let o = clamp(o, 0f64, oa);\n 1275 | \n 1276 |                     ((o * 255f64) + 0.5) as u8\n 1277 |                 };\n 1278 | \n 1279 |                 let output_pixel = Pixel {\n 1280 |                     r: compute(pixel.r, pixel_2.r),\n 1281 |                     g: compute(pixel.g, pixel_2.g),\n 1282 |                     b: compute(pixel.b, pixel_2.b),\n 1283 |                     a: ((oa * 255f64) + 0.5) as u8,\n 1284 |                 };\n 1285 | \n 1286 |                 data.set_pixel(stride, output_pixel, x, y);\n 1287 |             }\n 1288 |         }\n 1289 |     });\n 1290 | }"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","description":"`Bytes::from(buffer)` in CHandle::close copies the entire write() accumulation buffer (per the From<&T: Borrow<[u8]>> impl in glib). For a large SVG accumulated via repeated rsvg_handle_write calls, this doubles peak memory at the moment of close().","fix":"Move ownership instead: change the match arm to `LoadState::Loading { ref mut buffer }` and use `glib::Bytes::from_owned(std::mem::take(buffer))` (or equivalent) to transfer the Vec into the Bytes without copying.","locations":[{"ref":"librsvg-c/src/handle.rs:561-567","code":"  561 |             LoadState::Loading { ref buffer } => {\n  562 |                 let bytes = Bytes::from(buffer);\n  563 |                 let stream = gio::MemoryInputStream::from_bytes(&bytes);\n  564 | \n  565 |                 let base_file = inner.base_url.get_gfile();\n  566 |                 self.read_stream(state, &stream.upcast(), base_file.as_ref(), None)\n  567 |             }"}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","description":"`NonTSPseudoClass::to_css` for the `Lang` variant allocates `Vec<String>` via `.iter().map(ToString::to_string).collect()` and then joins. Each language tag becomes a heap allocation; the joined output allocates again.","fix":"Write directly with `write!`: iterate language tags, emitting separators between them, e.g. `let mut first = true; write!(dest, \"lang(\\\"\")?; for tag in lang { if !first { dest.write_str(\"\\\",\\\"\")?; } write!(dest, \"{tag}\")?; first = false; } write!(dest, \"\\\")\")`.","locations":[{"ref":"rsvg/src/css.rs:393-411","code":"  393 | impl ToCss for NonTSPseudoClass {\n  394 |     fn to_css<W>(&self, dest: &mut W) -> fmt::Result\n  395 |     where\n  396 |         W: fmt::Write,\n  397 |     {\n  398 |         match self {\n  399 |             NonTSPseudoClass::Link => write!(dest, \"link\"),\n  400 |             NonTSPseudoClass::Visited => write!(dest, \"visited\"),\n  401 |             NonTSPseudoClass::Lang(lang) => write!(\n  402 |                 dest,\n  403 |                 \"lang(\\\"{}\\\")\",\n  404 |                 lang.iter()\n  405 |                     .map(ToString::to_string)\n  406 |                     .collect::<Vec<_>>()\n  407 |                     .join(\"\\\",\\\"\")\n  408 |             ),\n  409 |         }\n  410 |     }\n  411 | }"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","description":"escape_link_target runs Regex::replace_all on every `<a>` link target. The regex is correctly cached behind a OnceLock, but the matcher still scans every byte of every link value even when there are no characters to escape, and each substituted character allocates a fresh String inside the replacement closure for what is a 2-byte literal.","fix":"Short-circuit on common input: `if !value.contains(['\\'', '\\\\']) { return Cow::Borrowed(value); }` before invoking the regex. Optionally also rewrite the closure to return `&'static str` literals to avoid per-match String allocations.","locations":[{"ref":"rsvg/src/drawing_ctx.rs:2401-2414","code":" 2401 | fn escape_link_target(value: &str) -> Cow<'_, str> {\n 2402 |     let regex = {\n 2403 |         static REGEX: OnceLock<Regex> = OnceLock::new();\n 2404 |         REGEX.get_or_init(|| Regex::new(r\"['\\\\]\").unwrap())\n 2405 |     };\n 2406 | \n 2407 |     regex.replace_all(value, |caps: &Captures<'_>| {\n 2408 |         match caps.get(0).unwrap().as_str() {\n 2409 |             \"'\" => \"\\\\'\".to_owned(),\n 2410 |             \"\\\\\" => \"\\\\\\\\\".to_owned(),\n 2411 |             _ => unreachable!(),\n 2412 |         }\n 2413 |     })\n 2414 | }"}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","description":"feConvolveMatrix's per-pixel inner loop indexes `matrix[(kernel_y, kernel_x)]` four times (once per channel) when not `preserve_alpha`. nalgebra's `Index` does bounds-checked indexing each call and the matrix indexing in `Dyn`-sized matrices is not a free pointer-add. Hoist once per neighbor pixel.","fix":"let factor = matrix[(kernel_y, kernel_x)]; r += pixel.r as f64 / 255.0 * factor; g += ...; (same as `convolve` in shared_surface.rs:579-619 already does).","locations":[{"ref":"rsvg/src/filters/convolve_matrix.rs:244-257","code":"  244 |                 for (x, y, pixel) in\n  245 |                     PixelRectangle::within(&input_surface, bounds, kernel_bounds, self.edge_mode)\n  246 |                 {\n  247 |                     let kernel_x = (kernel_bounds.x1 - x - 1) as usize;\n  248 |                     let kernel_y = (kernel_bounds.y1 - y - 1) as usize;\n  249 | \n  250 |                     r += f64::from(pixel.r) / 255.0 * matrix[(kernel_y, kernel_x)];\n  251 |                     g += f64::from(pixel.g) / 255.0 * matrix[(kernel_y, kernel_x)];\n  252 |                     b += f64::from(pixel.b) / 255.0 * matrix[(kernel_y, kernel_x)];\n  253 | \n  254 |                     if !self.preserve_alpha {\n  255 |                         a += f64::from(pixel.a) / 255.0 * matrix[(kernel_y, kernel_x)];\n  256 |                     }\n  257 |                 }"}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","description":"feLighting's edge/corner computation runs entirely sequentially (top corners + top row + bottom row + left column + right column) before the parallel interior block. For a tall narrow filter region (e.g. 5 wide x 4096 tall), the two column loops dominate and could trivially be done with rayon.","fix":"Use `par_iter` on the y range for the left/right column loops (they each touch only one column, disjoint from each other and from corners). Similarly the top/bottom row loops can run in parallel — both write to row y0 and y1-1 respectively, no overlap.","locations":[{"ref":"rsvg/src/filters/lighting.rs:548-630","code":"  548 |                     // Top left.\n  549 |                     compute_output_pixel(\n  550 |                         output_slice,\n  551 |                         0,\n  552 |                         bounds.x0 as u32,\n  553 |                         bounds.y0 as u32,\n  554 |                         Normal::top_left(&input_surface, bounds),\n  555 |                     );\n  556 | \n  557 |                     // Top right.\n  558 |                     compute_output_pixel(\n  559 |                         output_slice,\n  560 |                         0,\n  561 |                         bounds.x1 as u32 - 1,\n  562 |                         bounds.y0 as u32,\n  563 | rface, bounds, x),\n  604 |                             );\n  605 |                         }\n  606 |                     }\n  607 | \n  608 |                     if bounds_h >= 3 {\n  609 |                         // Left column.\n  610 |                         for y in bounds.y0 as u32 + 1..bounds.y1 as u32 - 1 {\n  611 |                             compute_output_pixel(\n  612 |                                 output_slice,\n  613 |                                 0,\n  614 |                                 bounds.x0 as u32,\n  615 |                                 y,\n  616 |                                 Normal::left_column(&input_surface, bounds, y),\n  617 |                             );\n  618 |                         }\n  619 | \n  620 |                         // Right column.\n  621 |                         for y in bounds.y0 as u32 + 1..bounds.y1 as u32 - 1 {\n  622 |                             compute_output_pixel(\n  623 |                                 output_slice,\n  624 |                                 0,\n  625 |                                 bounds.x1 as u32 - 1,\n  626 |                                 y,\n  627 |                                 Normal::right_column(&input_surface, bounds, y),\n  628 |                             );\n  629 |                         }\n  630 |                     }"}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","description":"Segments::from(&Path) collects the entire path command stream into `Vec<PathCommand>` solely to enable one-step lookahead at `path_commands[i + 1]`. A `Peekable<impl Iterator<Item=PathCommand>>` provides the same lookahead without the intermediate allocation. The marker subsystem then iterates the path again at line 896 (`path.iter().nth(segments.len())`), paying the traversal cost twice on every marker render.","fix":"Replace the Vec collection with `let mut iter = path.iter().peekable();` and use `iter.peek()` for lookahead. Combined with carrying a closed-subpath flag through Segments, this also eliminates the second `path.iter().nth(...)` traversal.","locations":[{"ref":"rsvg/src/marker.rs:441-466","code":"  441 |         let mut segments = Vec::new();\n  442 |         let mut state = SegmentState::Initial;\n  443 | \n  444 |         let path_commands: Vec<PathCommand> = path.iter().collect();\n  445 | \n  446 |         for i in 0..path_commands.len() {\n  447 |             last_x = cur_x;\n  448 |             last_y = cur_y;\n  449 | \n  450 |             let path_command = &path_commands[i];\n  451 | \n  452 |             let is_subpath_start = matches!(state, SegmentState::NewSubpath);\n  453 | \n  454 |             let is_subpath_end = if i == path_commands.len() - 1 {\n  455 |                 true\n  456 |             } else {\n  457 |                 // If the next command is a MoveTo, it means that the next Segment will be disconnected\n  458 |                 // from the current one.  So, make a note to emit a marker for the current segment's\n  459 |                 // endpoint.\n  460 |                 //\n  461 |                 // Normally we only emit markers for the start point of a Segment, since normally\n  462 |                 // Segments are connected to each other.  They are disconnected only if there are\n  463 |                 // subpaths.\n  464 | \n  465 |                 matches!(path_commands[i + 1], PathCommand::MoveTo(..))\n  466 |             };"},{"ref":"rsvg/src/marker.rs:888-913","code":"  888 |     if !segments.is_empty() {\n  889 |         let segment = &segments[segments.len() - 1];\n  890 |         if let Segment::LineOrCurve { .. } = *segment {\n  891 |             let incoming = segments\n  892 |                 .find_incoming_angle_backwards(segments.len() - 1)\n  893 |                 .unwrap_or_else(|| Angle::new(0.0));\n  894 | \n  895 |             let angle = {\n  896 |                 if let PathCommand::ClosePath = path.iter().nth(segments.len()).unwrap d::$long_m5e_name) {\n  308 |                         v\n  309 |                     } else {\n  310 |                         unreachable!();\n  311 |                     }\n  312 |                 }\n  313 |             )+\n  314 | \n  315 |             $(\n  316 |                 pub fn $nonprop_field(&self) -> $nonprop_name {\n  317 |                     if let ComputedValue::$nonprop_name(v) = self.get_value(PropertyId::$nonprop_name) {\n  318 |                         v\n  319 |                     } else {\n  320 |                         unreachable!();\n  321 |                     }\n  322 |                 }\n  323 |             )+\n  324 | \n  325 |             fn set_value(&mut self, computed: ComputedValue) {\n  326 |                 match computed {\n  327 |                     $(ComputedValue::$long_name(v) => self.$long_field = v,)+\n  328 |                     $(ComputedValue::$long_m5e_name(v) => self.$long_m5e_field = v,)+\n  329 |                     $(ComputedValue::$nonprop_name(v) => self.$nonprop_field = v,)+\n  330 |                 }\n  331 |             }\n  332 | \n  333 |             fn get_value(&self, id: PropertyId) -> ComputedValue {\n  334 |                 assert!(!id.is_shorthand());\n  335 | \n  336 |                 match id {\n  337 |                     $(\n  338 |                         PropertyId::$long_name =>\n  339 |                             ComputedValue::$long_name(self.$long_field.clone()),\n  340 |                     )+\n  341 |                     $(\n  342 |                         PropertyId::$long_m5e_name =>\n  343 |                             ComputedValue::$long_m5e_name(self.$long_m5e_field.clone()),\n  344 |                     )+\n  345 |                     $(\n  346 |                         PropertyId::$nonprop_name =>\n  347 |                             ComputedValue::$nonprop_name(self.$nonprop_field.clone()),\n  348 |                     )+\n  349 |                     _ => unreachable!(),\n  350 |                 }\n  351 |             }\n  352 |         }"}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"low","description":"`SpecifiedValues::inherit_xml_lang` does redundant work for `SpecifiedValue::Unspecified` lang: it first sets `computed.xml_lang` to parent's value, then calls `s.compute(&computed.xml_lang(), computed)` which (because `XmlLang` inherits automatically) returns `src.clone()` — the parent value again, requiring an extra clone of the `Option<Box<LanguageTag>>`.","fix":"Short-circuit: when `s` is `Unspecified` and parent is `Some`, the value is already correct after the first `set_value`; skip the second. For `Specified`/`Inherit`, skip the parent-set step and compute normally.","locations":[{"ref":"rsvg/src/properties.rs:781-800","code":"  781 |     pub fn inherit_xml_lang(\n  782 |         &self,\n  783 |         computed: &mut ComputedValues,\n  784 |         parent: Option<crate::node::Node>,\n  785 |     ) {\n  786 |         use crate::node::NodeBorrow;\n  787 |         let prop_val = self.get_property(PropertyId::XmlLang);\n  788 |         if let ParsedProperty::XmlLang(s) = prop_val {\n  789 |             if let Some(parent) = parent {\n  790 |                 computed.set_value(ComputedValue::XmlLang(\n  791 |                     parent.borrow_element().get_computed_values().xml_lang(),\n  792 |                 ));\n  793 |             }\n  794 |             computed.set_value(ComputedValue::XmlLang(\n  795 |                 s.compute(&computed.xml_lang(), computed),\n  796 |             ));\n  797 |         } else {\n  798 |             unreachable!();\n  799 |         }\n  800 |     }"}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"low","description":"draw_basic_shape clones stroke_paint and fill_paint THREE times each (once per Marker { context_stroke, context_fill }). PaintSource can be large (gradients carry full color-stop vectors, patterns carry node handles, etc.). For elements with markers the cloning happens unconditionally for marker_start/marker_mid/marker_end even when most marker nodes are None.","fix":"Build Marker structs lazily — only clone the paints when the marker_*_node is Some. Or store stroke_paint/fill_paint in the Shape itself once, and have markers reference them rather than copying.","locations":[{"ref":"rsvg/src/shapes.rs:103-148","code":"  103 |     let marker_start_node;\n  104 |     let marker_mid_node;\n  105 |     let marker_end_node;\n  106 | \n  107 |     if shape_def.markers == Markers::Yes {\n  108 |         marker_start_node = acquire_marker(\n  109 |             session,\n  110 |             &shape_element_name,\n  111 |             acquired_nodes,\n  112 |             &values.marker_start().0,\n  113 |         );\n  114 |         marker_mid_node = acquire_marker(\n  115 |             session,\n  116 |             &shape_element_name,\n  117 |             acquired_nodes,\n  118 |             &values.marker_mid().0,\n  119 |         );\n  120 |         marker_end_node = acquire_marker(\n  121 |             session,\n  122 |             &shape_element_name,\n  123 |             acquired_nodes,\n  124 |             &values.marker_end().0,\n  125 |         );\n  126 |     } else {\n  127 |         marker_start_node = None;\n  128 |         marker_mid_node = None;\n  129 |         marker_end_node = None;\n  130 |     }\n  131 | \n  132 |     let marker_start = Marker {\n  133 |         node_ref: marker_start_node,\n  134 |         context_stroke: stroke_paint.clone(),\n  135 |         context_fill: fill_paint.clone(),\n  136 |     };\n  137 | \n  138 |     let marker_mid = Marker {\n  139 |         node_ref: marker_mid_node,\n  140 |         context_stroke: stroke_paint.clone(),\n  141 |         context_fill: fill_paint.clone(),\n  142 |     };\n  143 | \n  144 |     let marker_end = Marker {\n  145 |         node_ref: marker_end_node,\n  146 |         context_stroke: stroke_paint.clone(),\n  147 |         context_fill: fill_paint.clone(),\n  148 |     };"}]},{"id":"PERF_21","type":"performance","type_label":"Performance","severity":"low","description":"StackingContext::new() is constructed twice per Group/Svg element: once in layout() and once in draw(). Both call sites pass the same field values. For SVGs with many groups this duplicates non-trivial work (the StackingContext gathers filters, transforms, etc.).","fix":"Refactor draw() to call layout() and then draw the returned Layer (the Shape draw impl already does this via impl_draw! macro). Apply the same pattern to Group/Svg/Switch.","locations":[{"ref":"rsvg/src/structure.rs:40-48","code":"   40 |         let stacking_ctx = Box::new(StackingContext::new(\n   41 |             draw_ctx,\n   42 |             acquired_nodes,\n   43 |             &elt,\n   44 |             values.transform(),\n   45 |             None,\n   46 |             values,\n   47 |             viewport,\n   48 |         ));"},{"ref":"rsvg/src/structure.rs:132-141","code":"  132 |         let elt = node.borrow_element();\n  133 |         let stacking_ctx = StackingContext::new(\n  134 |             draw_ctx,\n  135 |             acquired_nodes,\n  136 |             &elt,\n  137 |             values.transform(),\n  138 |             None,\n  139 |             values,\n  140 |             viewport,\n  141 |         );"},{"ref":"rsvg/src/structure.rs:411-420","code":"  411 |         let elt = node.borrow_element();\n  412 |         let stacking_ctx = Box::new(StackingContext::new(\n  413 |             draw_ctx,\n  414 |             acquired_nodes,\n  415 |             &elt,\n  416 |             values.transform(),\n  417 |             None,\n  418 |             values,\n  419 |             viewport,\n  420 |         ));"},{"ref":"rsvg/src/structure.rs:471-480","code":"  471 |         let elt = node.borrow_element();\n  472 |         let stacking_ctx = StackingContext::new(\n  473 |             draw_ctx,\n  474 |             acquired_nodes,\n  475 |             &elt,\n  476 |             values.transform(),\n  477 |             None,\n  478 |             values,\n  479 |             viewport,\n  480 |         );"}]},{"id":"PERF_22","type":"performance","type_label":"Performance","severity":"low","description":"build_formatted_text calls `text_ref.get_string().chars().count()` for every text node. get_string() clones the entire RefCell<String> just so we can count chars — a useless O(n) heap allocation per text node. With many or large text nodes this adds up.","fix":"Add a `char_count(&self) -> usize { self.string.borrow().chars().count() }` method on Chars and use that. Avoids the clone.","locations":[{"ref":"rsvg/src/text2.rs:375-388","code":"  375 |                 NodeData::Text(ref text_ref) => {\n  376 |                     let text_len = text_ref.get_string().chars().count();\n  377 |                     for character in characters\n  378 |                         .iter()\n  379 |                         .skip(num_visited_characters)\n  380 |                         .take(text_len)\n  381 |                     {\n  382 |                         if character.addressable {\n  383 |                             text.push(character.character);\n  384 |                             byte_index += character.character.len_utf8();\n  385 |                         }\n  386 |                         num_visited_characters += 1;\n  387 |                     }\n  388 |                 }"},{"ref":"rsvg/src/text.rs:773-775","code":"  773 |     pub fn get_string(&self) -> String {\n  774 |         self.string.borrow().clone()\n  775 |     }"}]},{"id":"PERF_23","type":"performance","type_label":"Performance","severity":"negligible","description":"`Pixel::diff` (used in tests but defined on the public trait `PixelOps`) uses `self.iter().zip(other.iter()).map(...).collect()` which allocates an iterator chain and a small intermediate `Pixel` via `FromIterator`. Cheap per-call but, since it's part of `PixelOps`, anyone using it inside a pixel loop pays an iterator-construction cost per pixel.","fix":"Replace the iter().zip().map().collect() chain with a direct four-field struct literal. Same readability, no iterator overhead, and inlining works reliably.","locations":[{"ref":"rsvg/src/surface_utils/mod.rs:163-169","code":"  163 |     #[inline]\n  164 |     fn diff(&self, other: &Pixel) -> Pixel {\n  165 |         self.iter()\n  166 |             .zip(other.iter())\n  167 |             .map(|(l, r)| (l as i32 - r as i32).unsigned_abs() as u8)\n  168 |             .collect()\n  169 |     }"}]},{"id":"PERF_24","type":"performance","type_label":"Performance","severity":"negligible","description":"compute_normal_nowrap / compute_pre_prewrap pre-allocate `Vec::with_capacity(input.len())` where input.len() is the BYTE length of the &str. The Vec holds Character (a (bool,char) ~8 bytes each), and the actual count is `input.chars().count()`. For ASCII inputs this is correct, but for multi-byte UTF-8 it overallocates by up to 4x.","fix":"Use `Vec::new()` and let it grow, or pass `input.chars().count()` if the precomputation is worth it.","locations":[{"ref":"rsvg/src/text2.rs:170-208","code":"  170 | fn compute_normal_nowrap(input: &str) -> Vec<Character> {\n  171 |     let mut result: Vec<Character> = Vec::with_capacity(input.len());\n  172 | \n  173 |     let mut prev_was_space: bool = false;\n  174 | \n  175 |     for ch in input.chars() {\n  176 |         if is_bidi_control(ch) {\n  177 |             result.push(Character {\n  178 |                 addressable: false,\n  179 |                 character: ch,\n  180 |             });\n  181 |             continue;\n  182 |         }\n  183 | \n  184 |         if is_space(ch) {\n  185 |             if prev_was_space {\n  186 |                 result.push(Character {\n  187 |                     addressable: false,\n  188 |                     character: ch,\n  189 |                 });\n  190 |             } else {\n  191 |                 result.push(Character {\n  192 |                     addressable: true,\n  193 |                     character: ch,\n  194 |                 });\n  195 |                 prev_was_space = true;\n  196 |             }\n  197 |         } else {\n  198 |             result.push(Character {\n  199 |                 addressable: true,\n  200 |                 character: ch,\n  201 |             });\n  202 | \n  203 |             prev_was_space = false;\n  204 |         }\n  205 |     }\n  206 | \n  207 |     result\n  208 | }"},{"ref":"rsvg/src/text2.rs:210-228","code":"  210 | fn compute_pre_prewrap(input: &str) -> Vec<Character> {\n  211 |     let mut result: Vec<Character> = Vec::with_capacity(input.len());\n  212 | \n  213 |     for ch in input.chars() {\n  214 |         if is_bidi_control(ch) {\n  215 |             result.push(Character {\n  216 |                 addressable: false,\n  217 |                 character: ch,\n  218 |             });\n  219 |         } else {\n  220 |             result.push(Character {\n  221 |                 addressable: true,\n  222 |                 character: ch,\n  223 |             });\n  224 |         }\n  225 |     }\n  226 | \n  227 |     result\n  228 | }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`rsvg_handle_set_stylesheet` calls `slice::from_raw_parts(css, css_len)` without validating `css_len <= isize::MAX as usize`. `slice::from_raw_parts` requires total size in bytes <= isize::MAX — a C caller passing css_len > isize::MAX triggers UB. The function does have a precondition `!css.is_null() || (css.is_null() && css_len == 0)` (which itself is redundantly written) but no upper bound check.","fix":"Add `css_len <= isize::MAX as usize` to the precondition list. Simplify the null-check clause too.","locations":[{"ref":"librsvg-c/src/handle.rs:1645-1670","code":" 1645 |     rsvg_return_val_if_fail! {\n 1646 |         rsvg_handle_set_stylesheet => false.into_glib();\n 1647 | \n 1648 |         is_rsvg_handle(handle),\n 1649 |         !css.is_null() || (css.is_null() && css_len == 0),\n 1650 |         error.is_null() || (*error).is_null(),\n 1651 |     }\n 1652 | \n 1653 |     let rhandle = get_rust_handle(handle);\n 1654 |     let session = rhandle.imp().session.clone();\n 1655 | \n 1656 |     let css = match (css, css_len) {\n 1657 |         (p, 0) if p.is_null() => \"\",\n 1658 |         (_, _) => {\n 1659 |             let s = slice::from_raw_parts(css, css_len);\n 1660 |             match str::from_utf8(s) {\n 1661 |                 Ok(s) => s,\n 1662 |                 Err(e) => {\n 1663 |                     set_gerror(&session, error, 0, &format!(\"CSS is not valid UTF-8: {e}\"));\n 1664 |                     return false.into_glib();\n 1665 |                 }\n 1666 |             }\n 1667 |         }\n 1668 |     };\n 1669 | \n 1670 |     rhandle.set_stylesheet(css).into_gerror(&session, error)"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"From<Rect> for IRect and Rect<i32>::scale() cast f64 to i32 via `floor() as i32` and `ceil() as i32`. In Rust these are saturating casts — extreme f64 values silently clamp to i32::MAX/MIN, and NaN becomes 0. A malicious or buggy SVG producing huge or NaN coordinates ends up with bogus integer rectangles that downstream code uses for surface sizing and clipping, with no error signal.","fix":"Use a fallible conversion such as cast::i32(x.floor()) (already in use in rsvg-convert/main.rs:checked_i32). Reject NaN and out-of-range values with an explicit error path.","locations":[{"ref":"rsvg/src/rect.rs:127-135","code":"  127 |         #[inline]\n  128 |         pub fn scale(self, x: f64, y: f64) -> Self {\n  129 |             Self {\n  130 |                 x0: (f64::from(self.x0) * x).floor() as i32,\n  131 |                 y0: (f64::from(self.y0) * y).floor() as i32,\n  132 |                 x1: (f64::from(self.x1) * x).ceil() as i32,\n  133 |                 y1: (f64::from(self.y1) * y).ceil() as i32,\n  134 |             }\n  135 |         }"},{"ref":"rsvg/src/rect.rs:157-167","code":"  157 | impl From<Rect> for IRect {\n  158 |     #[inline]\n  159 |     fn from(r: Rect) -> Self {\n  160 |         Self {\n  161 |             x0: r.x0.floor() as i32,\n  162 |             y0: r.y0.floor() as i32,\n  163 |             x1: r.x1.ceil() as i32,\n  164 |             y1: r.y1.ceil() as i32,\n  165 |         }\n  166 |     }\n  167 | }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"compute_baseline_offset performs i32 arithmetic on Pango metrics BEFORE widening to f64: `ascent - descent` (line 312), `ascent + descent` (lines 322, 338), `2 * ascent - height` (line 327), and `strikethrough_position + strikethrough_thickness / 2` (line 318). Pango units are 1024x pixels, so for very large font sizes these intermediate i32 expressions can overflow (panic in debug, wrap silently in release).","fix":"Widen each metric to f64 first, e.g. `(f64::from(ascent) - f64::from(descent)) / f64::from(pango::SCALE)`. `f64::from(2 * ascent - height)` is especially vulnerable since `2 * ascent` doubles an already-large value before any widening.","locations":[{"ref":"rsvg/src/text.rs:310-340","code":"  310 |             match dominant_baseline {\n  311 |                 DominantBaseline::Hanging => {\n  312 |                     baseline -= f64::from(ascent - descent) / f64::from(pango::SCALE);\n  313 |                 }\n  314 |                 DominantBaseline::Middle => {\n  315 |                     // Approximate meanline using strikethrough position and thickness\n  316 |                     // https://mail.gnome.org/archives/gtk-i18n-list/2012-December/msg00046.html\n  317 |                     baseline -= f64::from(\n  318 |                         metrics.strikethrough_position() + metrics.strikethrough_thickness() / 2,\n  319 |                     ) / f64::from(pango::SCALE);\n  320 |                 }\n  321 |                 DominantBaseline::Central => {\n  322 |                     baseline = 0.5 * f64::from(ascent + descent) / f64::from(pango::SCALE);\n  323 |                 }\n  324 |                 DominantBaseline::TextBeforeEdge | DominantBaseline::TextTop => {\n  325 |                     //baseline -= f64::from(ascent) / f64::from(pango::SCALE);\n  326 |                     // Bit of a klutch, but leads to better results\n  327 |                     baseline -= f64::from(2 * ascent - height) / f64::from(pango::SCALE);\n  328 |                 }\n  329 |                 DominantBaseline::TextAfterEdge | DominantBaseline::TextBottom => {\n  330 |                     baseline += f64::from(descent) / f64::from(pango::SCALE);\n  331 |                 }\n  332 |                 DominantBaseline::Ideographic => {\n  333 |                     // Approx\n  334 |                     baseline += f64::from(descent) / f64::from(pango::SCALE);\n  335 |                 }\n  336 |                 DominantBaseline::Mathematical => {\n  337 |                     // Approx\n  338 |                     baseline = 0.5 * f64::from(ascent + descent) / f64::from(pango::SCALE);\n  339 |                 }\n  340 |                 _ => (),"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"set_pattern computes `let pw: i32 = (pattern.width * scwscale) as i32;`. `pattern.width` is user-controlled (parsed from the SVG) and `scwscale` is amplified by the user's outer transform attribute. A pathologically large product saturates to i32::MAX (Rust 1.45+ behavior); cairo's `Surface::create_similar` then refuses the absurd allocation, but only after the renderer has set up the pattern path. The existing `if pw < 1 || ph < 1` guard handles only the underflow side.","fix":"Clamp before casting: `let pw = (pattern.width * scwscale).clamp(1.0, MAX_PATTERN_SIDE as f64) as i32;` with a defensible upper bound, returning `Ok(false)` for over-sized patterns (mirroring the existing under-sized handling).","locations":[{"ref":"rsvg/src/drawing_ctx.rs:1280-1311","code":" 1280 |         let taffine = viewport.transform.pre_transform(&pattern.transform);\n 1281 | \n 1282 |         let mut scwscale = (taffine.xx.powi(2) + taffine.xy.powi(2)).sqrt();\n 1283 |         let mut schscale = (taffine.yx.powi(2) + taffine.yy.powi(2)).sqrt();\n 1284 | \n 1285 |         let pw: i32 = (pattern.width * scwscale) as i32;\n 1286 |         let ph: i32 = (pattern.height * schscale) as i32;\n 1287 | \n 1288 |         if pw < 1 || ph < 1 {\n 1289 |             return Ok(false);\n 1290 |         }\n 1291 | \n 1292 |         scwscale = f64::from(pw) / pattern.width;\n 1293 |         schscale = f64::from(ph) / pattern.height;\n 1294 | \n 1295 |         // Apply the pattern transform\n 1296 |         let (affine, caffine) = if scwscale.approx_eq_cairo(1.0) && schscale.approx_eq_cairo(1.0) {\n 1297 |             (pattern.coord_transform, pattern.content_transform)\n 1298 |         } else {\n 1299 |             (\n 1300 |                 pattern\n 1301 |                     .coord_transform\n 1302 |                     .pre_scale(1.0 / scwscale, 1.0 / schscale),\n 1303 |                 pattern.content_transform.post_scale(scwscale, schscale),\n 1304 |             )\n 1305 |         };\n 1306 | \n 1307 |         // Draw to another surface\n 1308 |         let surface = self\n 1309 |             .cr\n 1310 |             .target()\n 1311 |             .create_similar(cairo::Content::ColorAlpha, pw, ph)?;"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"The path-data lexer accepts numeric tokens like `1e9999` and forwards them to f64::parse(), which returns f64::INFINITY without error. The lexer's match_number does NOT check is_finite() on the result. Compare to parsers.rs::f64::parse (line 107), which explicitly rejects non-finite numbers. Infinity then flows through arc/curve math producing NaN coordinates in the geometry pipeline.","fix":"After parsing, check `n.is_finite()` and return Err(LexError::ParseFloatError) on non-finite results, mirroring the parsers.rs behaviour.","locations":[{"ref":"rsvg/src/path_parser.rs:130-143","code":"  130 |         // If you need path parsing to be faster, you can do from_utf8_unchecked to\n  131 |         // avoid re-validating all the chars, and std::str::parse<i*> calls are\n  132 |         // faster than std::str::parse<f64> for numbers that are not floats.\n  133 | \n  134 |         // bare unwrap here should be safe since we've already checked all the bytes\n  135 |         // in the range\n  136 |         match std::str::from_utf8(&self.input[start_pos..end_pos])\n  137 |             .unwrap()\n  138 |             .parse::<f64>()\n  139 |         {\n  140 |             Ok(n) => Ok(Number(n)),\n  141 |             Err(_e) => Err(LexError::ParseFloatError),\n  142 |         }\n  143 |     }"},{"ref":"rsvg/src/parsers.rs:103-113","code":"  103 | impl Parse for f64 {\n  104 |     fn parse<'i>(parser: &mut Parser<'i, '_>) -> Result<Self, ParseError<'i>> {\n  105 |         let loc = parser.current_source_location();\n  106 |         let n = parser.expect_number()?;\n  107 |         if n.is_finite() {\n  108 |             Ok(f64::from(n))\n  109 |         } else {\n  110 |             Err(loc.new_custom_error(ValueErrorKind::value_error(\"expected finite number\")))\n  111 |         }\n  112 |     }\n  113 | }"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"From<IRect> for cairo::Rectangle computes width/height as `r.x1 - r.x0` and `r.y1 - r.y0` in i32 arithmetic before converting to f64. For extreme but legal i32 values (e.g. x0=i32::MIN, x1=i32::MAX), this overflows — panic in debug, silent wrap in release. The arithmetic should happen in f64.","fix":"Compute the differences in f64: cairo::Rectangle::new(f64::from(r.x0), f64::from(r.y0), f64::from(r.x1) - f64::from(r.x0), f64::from(r.y1) - f64::from(r.y0)).","locations":[{"ref":"rsvg/src/rect.rs:230-240","code":"  230 | impl From<IRect> for cairo::Rectangle {\n  231 |     #[inline]\n  232 |     fn from(r: IRect) -> Self {\n  233 |         Self::new(\n  234 |             f64::from(r.x0),\n  235 |             f64::from(r.y0),\n  236 |             f64::from(r.x1 - r.x0),\n  237 |             f64::from(r.y1 - r.y0),\n  238 |         )\n  239 |     }\n  240 | }"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"FcGetVersion() returns libc::c_int (typically i32), which is cast to u32: `version as u32`. If fontconfig ever returns a negative sentinel (e.g. -1 to indicate an error, as some C APIs do), the cast produces a huge unsigned number that yields nonsense version triples like (429496, ...).","fix":"Guard before casting: if version < 0, treat as unknown / return early. Or use i32 throughout split_fontconfig_version with a documented precondition.","locations":[{"ref":"rsvg_convert/src/main.rs:833-848","code":"  833 | fn split_fontconfig_version(version: u32) -> (u32, u32, u32) {\n  834 |     let major = version / 10000;\n  835 |     let minor = version % 10000 / 100;\n  836 |     let revision = version % 100;\n  837 | \n  838 |     (major, minor, revision)\n  839 | }\n  840 | \n  841 | #[cfg(unix)]\n  842 | fn fontconfig_version_string() -> String {\n  843 |     let version = unsafe { FcGetVersion() };\n  844 | \n  845 |     let (major, minor, revision) = split_fontconfig_version(version as u32);\n  846 | \n  847 |     format!(\"{major}.{minor}.{revision}\")\n  848 | }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In `shared_surface.rs`, the `compute` closure relies on the sum fitting in u32 (comment at line 848: 'The sum is u32 so that it can fit MAXIMUM_KERNEL_SIZE * 255'). However `MAXIMUM_KERNEL_SIZE` is defined in `gaussian_blur.rs` as 500, while `box_blur_loop` accepts an arbitrary `kernel_size: usize` — there is no assertion enforcing the 500 limit at this layer. A caller passing kernel_size > ~16.8M (= 2^32 / 255) would silently overflow the u32 sum.","fix":"Add `assert!(kernel_size <= MAXIMUM_KERNEL_SIZE);` (or a public constant) at the top of `box_blur_loop`, or use u64 sums.","locations":[{"ref":"rsvg/src/surface_utils/shared_surface.rs:847-867","code":"  847 |                         //\n  848 |                         // The sum is u32 so that it can fit MAXIMUM_KERNEL_SIZE * 255.\n  849 |                         let mut sum_r = 0;\n  850 |                         let mut sum_g = 0;\n  851 |                         let mut sum_b = 0;\n  852 |                         let mut sum_a = 0;\n  853 | \n  854 |                         // The whole sum needs to be computed for the first pixel. However, we know\n  855 |                         // that values outside of bounds are transparent, so the loop starts on the\n  856 |                         // first pixel in bounds.\n  857 |                         for j in main_axis_min..min(main_axis_max, main_axis_min + shift) {\n  858 |                             let Pixel { r, g, b, a } = pixel(i, j);\n  859 | \n  860 |                             if !A::IS_ALPHA_ONLY {\n  861 |                                 sum_r += u32::from(r);\n  862 |                                 sum_g += u32::from(g);\n  863 |                                 sum_b += u32::from(b);\n  864 |                             }\n  865 | \n  866 |                             sum_a += u32::from(a);\n  867 |                         }"},{"ref":"rsvg/src/filters/gaussian_blur.rs:30","code":"   30 | const MAXIMUM_KERNEL_SIZE: usize = 500;"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Typo: comment reads 'URL path segments always contain at last 1 element' instead of 'at least 1 element'. The branch is also redundant: the `unreachable!` for `else` cannot fire for file: URLs (always cannot-be-a-base = false), so the entire `else` is dead-but-defensive.","fix":"Fix typo to 'at least'. Optionally collapse to `match url.path_segments().and_then(|mut s| s.next_back())` so the dead branch is gone.","locations":[{"ref":"rsvg/src/url_resolver.rs:96-106","code":"   96 |         if let Some(mut segments) = url.path_segments() {\n   97 |             if segments\n   98 |                 .next_back()\n   99 |                 .expect(\"URL path segments always contain at last 1 element\")\n  100 |                 .is_empty()\n  101 |             {\n  102 |                 return Err(AllowedUrlError::NotSiblingOrChildOfBaseFile);\n  103 |             }\n  104 |         } else {\n  105 |             unreachable!(\"the file: URL cannot have an empty path\");\n  106 |         }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment at xml/mod.rs:130-138 claims XmlStateInner does not impl Drop and that `build_document()` is 'responsible for freeing all the XmlEntityPtr from this field'. This is misleading: `XmlEntity` (lines 87-100) DOES impl Drop calling `xmlFreeNode`, so the HashMap drops them automatically on any path.","fix":"Rewrite to: 'XmlEntity has its own Drop impl that calls xmlFreeNode; entities are released automatically when the HashMap drops, regardless of whether XmlStateInner is destructured in build_document() or dropped on an error path.'","locations":[{"ref":"rsvg/src/xml/mod.rs:130-138","code":"  130 | \n  131 |     // Note that neither XmlStateInner nor Xmlstate implement Drop.\n  132 |     //\n  133 |     // An XmlState is finally consumed in XmlState::build_document(), and that\n  134 |     // function is responsible for freeing all the XmlEntityPtr from this field.\n  135 |     //\n  136 |     // (The structs cannot impl Drop because build_document()\n  137 |     // destructures and consumes them at the same time.)\n  138 |     entities: HashMap<String, XmlEntity>,"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The error message for IdNotFound contains a stray closing paren with no opening paren: `\"File {} does not have an object with id \\\"{}\\\")\"`. User-facing typo.","fix":"Drop the trailing `)`: `\"File {} does not have an object with id \\\"{}\\\"\"`.","locations":[{"ref":"rsvg_convert/src/main.rs:803-807","code":"  803 |         RenderingError::IdNotFound => error!(\n  804 |             \"File {} does not have an object with id \\\"{}\\\")\",\n  805 |             input,\n  806 |             export_id.unwrap()\n  807 |         ),"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The FIXME at drawing_ctx.rs:956-959 claims 'we are *not* modifying res in case of error' for filter_current_surface. In the current code, `filter_current_surface(...)?` short-circuits the entire enclosing block on error (the lambda passed to with_saved_cr returns the error), so the masking code below never runs and res does not need to be updated. The FIXME's premise no longer matches the code.","fix":"Delete the FIXME (and the now-unnecessary `mut` on `res` at line 922) or rewrite to describe a current concern, so maintainers don't act on stale guidance.","locations":[{"ref":"rsvg/src/drawing_ctx.rs:947-963","code":"  947 |                         if let Some(ref filter) = stacking_ctx.filter {\n  948 |                             let filtered_surface = temporary_draw_ctx.filter_current_surface(\n  949 |                                 acquired_nodes,\n  950 |                                 filter,\n  951 |                                 &viewport_for_temporary_surface,\n  952 |                                 &stacking_ctx.element_name,\n  953 |                                 &bbox,\n  954 |                             )?;\n  955 | \n  956 |                             // FIXME: \"res\" was declared mutable above so that we could overwrite it\n  957 |                             // with the result of filtering, so that if filtering produces an error,\n  958 |                             // then the masking below wouldn't take place.  Test for that and fix this;\n  959 |                             // we are *not* modifying res in case of error.\n  960 |                             (filtered_surface, res, bbox)\n  961 |                         } else {\n  962 |                             (temporary_draw_ctx.cr.target(), res, bbox)\n  963 |                         }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"`FontWeight::compute` has duplicated arms: for `Bolder`, ranges `1..100` and `100..350` both yield `Weight(400)`; for `Lighter`, ranges `100..350` and `350..550` both yield `Weight(100)`. Easy to mis-edit one and leave the other inconsistent — a real risk given the CSS relative-weights table can change with spec updates.","fix":"Collapse the duplicate ranges: `(1..350)` for Bolder->400, `(100..550)` for Lighter->100. Verify against https://drafts.csswg.org/css-fonts-4/#relative-weights.","locations":[{"ref":"rsvg/src/font_props.rs:329-349","code":"  329 |             Bolder => match v.numeric_weight() {\n  330 |                 w if (  1..100).contains(&w) => Weight(400),\n  331 |                 w if (100..350).contains(&w) => Weight(400),\n  332 |                 w if (350..550).contains(&w) => Weight(700),\n  333 |                 w if (550..750).contains(&w) => Weight(900),\n  334 |                 w if (750..900).contains(&w) => Weight(900),\n  335 |                 w if 900 <= w                => Weight(w),\n  336 | \n  337 |                 _ => unreachable!(),\n  338 |             }\n  339 | \n  340 |             Lighter => match v.numeric_weight() {\n  341 |      ElementData::Path(ref e) => e.make_path(&params, child_values).to_cairo_path(false),\n  470 |                 ElementData::Polygon(ref e) => {\n  471 |                     e.make_path(&params, child_values).to_cairo_path(false)\n  472 |                 }\n  473 |                 ElementData::Polyline(ref e) => {\n  474 |                     e.make_path(&params, child_values).to_cairo_path(false)\n  475 |                 }\n  476 |                 ElementData::Line(ref e) => e.make_path(&params, child_values).to_cairo_path(false),\n  477 |                 ElementData::Rect(ref e) => e.make_path(&params, child_values).to_cairo_path(false),\n  478 |                 ElementData::Circle(ref e) => {\n  479 |                     e.make_path(&params, child_values).to_cairo_path(false)\n  480 |                 }\n  481 |                 ElementData::Ellipse(ref e) => {\n  482 |                     e.make_path(&params, child_values).to_cairo_path(false)\n  483 |                 }\n  484 |                 ElementData::Text(ref e) => path_from_text(\n  485 |                     e,\n  486 |                     child,\n  487 |                     &child_cascaded,\n  488 |                     session,\n  489 |                     font_options,\n  490 |                     acquired_nodes,\n  491 |                     viewport,\n  492 |                 )\n  493 |                 .ok()?,\n  494 |                 _ => unreachable!(\n  495 |                     \"we already checked the allowed types of elements in <use> in <clipPath>\"\n  496 |                 ),\n  497 |             };"},{"ref":"rsvg/src/layout.rs:564-587","code":"  564 |         let path = match *data {\n  565 |             ElementData::Path(ref e) => e.make_path(params, values).to_cairo_path(false),\n  566 |             ElementData::Polygon(ref e) => e.make_path(params, values).to_cairo_path(false),\n  567 |             ElementData::Polyline(ref e) => e.make_path(params, values).to_cairo_path(false),\n  568 |             ElementData::Line(ref e) => e.make_path(params, values).to_cairo_path(false),\n  569 |             ElementData::Rect(ref e) => e.make_path(params, values).to_cairo_path(false),\n  570 |             ElementData::Circle(ref e) => e.make_path(params, values).to_cairo_path(false),\n  571 |             ElementData::Ellipse(ref e) => e.make_path(params, values).to_cairo_path(false),\n  572 |             ElementData::Text(ref e) => {\n  573 |                 let cascaded = CascadedValues::new_from_node(node);\n  574 |                 path_from_text(\n  575 |                     e,\n  576 |                     node,\n  577 |                     &cascaded,\n  578 |                     session,\n  579 |                     font_options,\n  580 |                     acquired_nodes,\n  581 |                     viewport,\n  582 |                 )\n  583 |                 .ok()?\n  584 |             }\n  585 | \n  586 |             _ => return None,\n  587 |         };"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"UnresolvedGradient::into_resolved has two match arms (Linear and Radial) that produce literally identical ResolvedGradient values — the discriminator (the .. patterns) is ignored. The match exists only to dispatch on variant, but variant.into_resolved() already does that dispatch.","fix":"Drop the outer match: ResolvedGradient { units: units.unwrap(), transform: transform.unwrap(), spread: spread.unwrap(), stops: stops.unwrap(), variant: variant.into_resolved() }.","locations":[{"ref":"rsvg/src/gradient.rs:348-379","code":"  348 | impl UnresolvedGradient {\n  349 |     fn into_resolved(self) -> ResolvedGradient {\n  350 |         assert!(self.is_resolved());\n  351 | \n  352 |         let UnresolvedGradient {\n  353 |             units,\n  354 |             transform,\n  355 |             spread,\n  356 |             stops,\n  357 |             variant,\n  358 |         } = self;\n  359 | \n  360 |         match variant {\n  361 |             UnresolvedVariant::Linear { .. } => ResolvedGradient {\n  362 |                 units: units.unwrap(),\n  363 |                 transform: transform.unwrap(),\n  364 |                 spread: spread.unwrap(),\n  365 |                 stops: stops.unwrap(),\n  366 | \n  367 |                 variant: variant.into_resolved(),\n  368 |             },\n  369 | \n  370 |             UnresolvedVariant::Radial { .. } => ResolvedGradient {\n  371 |                 units: units.unwrap(),\n  372 |                 transform: transform.unwrap(),\n  373 |                 spread: spread.unwrap(),\n  374 |                 stops: stops.unwrap(),\n  375 | \n  376 |                 variant: variant.into_resolved(),\n  377 |             },\n  378 |         }\n  379 |     }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"UnresolvedGradient::add_color_stop first sets self.stops = Some(Vec::new()) if it was None, then enters an `if let Some(ref mut stops) = self.stops` whose else branch is `unreachable!()`. The unreachable branch is provably dead.","fix":"Replace the two-step pattern with `let stops = self.stops.get_or_insert_with(Vec::new);` and operate on `stops` directly. Remove the unreachable!().","locations":[{"ref":"rsvg/src/gradient.rs:382-404","code":"  382 |     fn add_color_stop(&mut self, offset: UnitInterval, color: Color) {\n  383 |         if self.stops.is_none() {\n  384 |             self.stops = Some(Vec::<ColorStop>::new());\n  385 |         }\n  386 | \n  387 |         if let Some(ref mut stops) = self.stops {\n  388 |             let last_offset = if !stops.is_empty() {\n  389 |                 stops[stops.len() - 1].offset\n  390 |             } else {\n  391 |                 UnitInterval(0.0)\n  392 |             };\n  393 | \n  394 |             let offset = if offset > last_offset {\n  395 |                 offset\n  396 |             } else {\n  397 |                 last_offset\n  398 |             };\n  399 | \n  400 |             stops.push(ColorStop { offset, color });\n  401 |         } else {\n  402 |             unreachable!();\n  403 |         }\n  404 |     }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"match_number's guard `if !self.advance_over_simple_number() && start_pos != self.current_pos()` has a dead second clause. match_number is only entered when current is one of '-', '+', '.' or a digit, so the helpers ALWAYS advance current_pos by at least one byte. The `start_pos != self.current_pos()` clause is therefore always true and obscures intent.","fix":"Drop the dead second clause: `if !self.advance_over_simple_number() { match self.current { ... } }`. Existing tests continue to pass.","locations":[{"ref":"rsvg/src/path_parser.rs:112-120","code":"  112 |     fn match_number(&mut self) -> Result<Token, LexError> {\n  113 |         // remember the beginning\n  114 |         let (start_pos, _) = self.current.unwrap();\n  115 |         if !self.advance_over_simple_number() && start_pos != self.current_pos() {\n  116 |             match self.current {\n  117 |                 None => return Err(LexError::UnexpectedEof),\n  118 |                 Some((_pos, c)) => return Err(LexError::UnexpectedByte(c)),\n  119 |             }\n  120 |         }"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","description":"optional_drawto_commands has signature `Result<bool, ParseError>` but always returns Ok(false), and its sole caller (moveto_drawto_command_group) throws the bool away via `.map(|_| ())`. The bool return is misleading — it suggests something meaningful is signalled.","fix":"Change the signature to `Result<(), ParseError>` and drop the `.map(|_| ())` at the call site.","locations":[{"ref":"rsvg/src/path_parser.rs:527-550","code":"  527 |     fn moveto_drawto_command_group(&mut self) -> Result<(), ParseError> {\n  528 |         self.moveto()?;\n  529 |         self.optional_drawto_commands().map(|_| ())\n  530 |     }\n  531 | \n  532 |     fn moveto_drawto_command_groups(&mut self) -> Result<(), ParseError> {\n  533 |         loop {\n  534 |             self.moveto_drawto_command_group()?;\n  535 | \n  536 |             if self.current_pos_and_token.is_none() {\n  537 |                 break;\n  538 |             }\n  539 |         }\n  540 | \n  541 |         Ok(())\n  542 |     }\n  543 | \n  544 |     fn optional_drawto_commands(&mut self) -> Result<bool, ParseError> {\n  545 |         while self.drawto_command()? {\n  546 |             // everything happens in the drawto_command() calls.\n  547 |         }\n  548 | \n  549 |         Ok(false)\n  550 |     }"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`SpecifiedValues::indices` is a `[u8; ...]`, and `set_property` stores indices via `pos as u8`. With ~67 properties currently this is safe, but if the macro-listed properties ever exceed 254 entries, `pos as u8` will silently collide with the `PropertyId::UnsetProperty` sentinel value (`u8::MAX` of the discriminant).","fix":"Add `const _: () = assert!(PropertyId::UnsetProperty as usize <= u8::MAX as usize - 1);` near the struct. Or change the array to `[u16; ...]` (negligible memory impact).","locations":[{"ref":"rsvg/src/properties.rs:108-115","code":"  108 | /// Holds the specified values for the CSS properties of an element.\n  109 | #[derive(Clone)]\n  110 | pub struct SpecifiedValues {\n  111 |     indices: [u8; PropertyId::UnsetProperty as usize],\n  112 |     props: Vec<ParsedProperty>,\n  113 | \n  114 |     transform: Option<Transform>,\n  115 | }"},{"ref":"rsvg/src/properties.rs:528-541","code":"  528 |     fn set_property(&mut self, prop: &ParsedProperty, replace: bool) {\n  529 |         let id = prop.get_property_id();\n  530 |         assert!(!id.is_shorthand());\n  531 | \n  532 |         if let Some(index) = self.property_index(id) {\n  533 |             if replace {\n  534 |                 self.props[index] = prop.clone();\n  535 |             }\n  536 |         } else {\n  537 |             self.props.push(prop.clone());\n  538 |             let pos = self.props.len() - 1;\n  539 |             self.indices[id.as_usize()] = pos as u8;\n  540 |         }\n  541 |     }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"CSS `@import` failures are silently swallowed via `let _ = self.load(&aurl, session.clone());`. Authors debugging broken imports get no diagnostic. The `load()` error includes useful information that's discarded.","fix":"Replace `let _ = self.load(...)` with `if let Err(e) = self.load(&aurl, session.clone()) { rsvg_log!(session, \"could not load @import-ed stylesheet {}: {:?}\", aurl, e); }`.","locations":[{"ref":"rsvg/src/css.rs:945-955","code":"  945 |             .for_each(|rule| match rule {\n  946 |                 Rule::AtRule(AtRule::Import(url)) => match url_resolver.resolve_href(&url) {\n  947 |                     Ok(aurl) => {\n  948 |                         // ignore invalid imports\n  949 |                         let _ = self.load(&aurl, session.clone());\n  950 |                     }\n  951 | \n  952 |                     Err(e) => {\n  953 |                         rsvg_log!(session, \"Not loading stylesheet from \\\"{}\\\": {}\", url, e);\n  954 |                     }\n  955 |                 },"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`rsvg_handle_get_dimensions` (no-suffix) discards the boolean return of `rsvg_handle_get_dimensions_sub`. On error, dimension_data is silently zeroed (RsvgDimensionData::empty), and the C caller cannot distinguish a legitimate 0x0 SVG from a render failure.","fix":"ABI prevents changing the return type, but the function should at minimum call `rsvg_g_warning` on error (similar to other into_g_warning paths) so users get a console message in default builds.","locations":[{"ref":"librsvg-c/src/handle.rs:1358-1365","code":" 1358 | #[unsafe(no_mangle)]\n 1359 | #[allow(unsafe_op_in_unsafe_fn)]\n 1360 | pub unsafe extern \"C\" fn rsvg_handle_get_dimensions(\n 1361 |     handle: *const RsvgHandle,\n 1362 |     dimension_data: *mut RsvgDimensionData,\n 1363 | ) {\n 1364 |     rsvg_handle_get_dimensions_sub(handle, dimension_data, ptr::null());\n 1365 | }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"DefsLookupErrorKind::NotFound has a comment 'FIXME: this is returned internally from Handle.lookup_node(), and gets translated to Ok(false). Don't expose this internal code in the public API.' Yet `impl From<DefsLookupErrorKind> for InternalRenderingError` maps NotFound -> IdNotFound, propagating it. Either the FIXME is stale or the From impl is wrong.","fix":"Audit callers. If NotFound is genuinely internal, remove the From impl and force callers to handle it explicitly. If the From is needed, update the FIXME comment to describe the new behavior.","locations":[{"ref":"rsvg/src/error.rs:94-103","code":"   94 | pub enum DefsLookupErrorKind {\n   95 |     /// Error when parsing the id to lookup.\n   96 |     InvalidId,\n   97 | \n   98 |     /// For internal use only.\n   99 |     ///\n  100 |     // FIXME: this is returned internally from Handle.lookup_node(), and gets translated\n  101 |     // to Ok(false).  Don't expose this internal code in the public API.\n  102 |     NotFound,\n  103 | }"},{"ref":"rsvg/src/error.rs:153-160","code":"  153 | impl From<DefsLookupErrorKind> for InternalRenderingError {\n  154 |     fn from(e: DefsLookupErrorKind) -> InternalRenderingError {\n  155 |         match e {\n  156 |             DefsLookupErrorKind::NotFound => InternalRenderingError::IdNotFound,\n  157 |             _ => InternalRenderingError::InvalidId(format!(\"{e}\")),\n  158 |         }\n  159 |     }\n  160 | }"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"parse_error_to_element_error uses unreachable!() for ParseErrorKind::Basic(_) catch-all, claiming 'attribute parsers should not return errors for CSS rules'. But cssparser's BasicParseErrorKind has AtRuleInvalid(_), AtRuleBodyInvalid, and QualifiedRuleInvalid variants that could in principle reach here via a future parser change. A user input that triggers any of those panics the process.","fix":"Replace the unreachable! with a benign fallback like `ElementError { attr, err: ValueErrorKind::parse_error(\"invalid CSS in attribute\") }`.","locations":[{"ref":"rsvg/src/error.rs:313-344","code":"  313 | fn parse_error_to_element_error<'i>(e: ParseError<'i>, attr: QualName) -> ElementError {\n  314 |     // FIXME: eventually, here we'll want to preserve the location information\n  315 | \n  316 |     let ParseError {\n  317 |         kind,\n  318 |         location: _location,\n  319 |     } = e;\n  320 | \n  321 |     match kind {\n  322 |         ParseErrorKind::Basic(BasicParseErrorKind::UnexpectedToken(tok)) => {\n  323 |             let mut s = String::from(\"unexpected token '\");\n  324 |             tok.to_css(&mut s).unwrap(); // FIXME: what do we do with a fmt::Error?\n  325 |             s.push('\\'');\n  326 | \n  327 |             ElementError {\n  328 |                 attr,\n  329 |                 err: ValueErrorKind::Parse(s),\n  330 |             }\n  331 |         }\n  332 | \n  333 |         ParseErrorKind::Basic(BasicParseErrorKind::EndOfInput) => ElementError {\n  334 |             attr,\n  335 |             err: ValueErrorKind::parse_error(\"unexpected end of input\"),\n  336 |         },\n  337 | \n  338 |         ParseErrorKind::Basic(_) => {\n  339 |             unreachable!(\"attribute parsers should not return errors for CSS rules\")\n  340 |         }\n  341 | \n  342 |         ParseErrorKind::Custom(err) => ElementError { attr, err },\n  343 |     }\n  344 | }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"PathParser::error reports position 0 when current_pos_and_token is None (EOF). The proper position would be self.tokens.input.len() (which is what match_number/match_command return on EOF). A FIXME comment at line 399 acknowledges this is wrong. Errors raised via self.error(...) point at offset 0 on EOF, which produces misleading 'error at position 0' messages.","fix":"Use `self.tokens.input.len()` instead of 0 in the None arm: `None => ParseError { position: self.tokens.input.len(), kind },`.","locations":[{"ref":"rsvg/src/path_parser.rs:393-401","code":"  393 |     fn error(&self, kind: ErrorKind) -> ParseError {\n  394 |         match self.current_pos_and_token {\n  395 |             Some((pos, _)) => ParseError {\n  396 |                 position: pos,\n  397 |                 kind,\n  398 |             },\n  399 |             None => ParseError { position: 0, kind }, // FIXME: ???\n  400 |         }\n  401 |     }"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"match_if_drawto_command_with_absolute consumes ANY ASCII letter as a drawto command candidate. If the letter is not in the drawto set (Z/L/H/V/C/S/Q/T/A), drawto_command's `_ => Ok(false)` silently swallows it. Parsing continues and typically errors at the NEXT token (missing M) rather than at the unknown command. The FIXME on line 552-553 explicitly calls this out. Effect: error positions are off, and obviously-malformed paths are reported with confusing locations.","fix":"Either restrict match_if_drawto_command_with_absolute to the actual drawto letter set (returning None for anything else, so the letter isn't consumed), or have drawto_command's `_` arm return `Err(self.error(ErrorKind::UnexpectedCommand(c)))`.","locations":[{"ref":"rsvg/src/path_parser.rs:552-615","code":"  552 |     // FIXME: This should not just fail to match 'M' and 'm', but make sure the\n  553 |     // command is in the set of drawto command characters.\n  554 |     fn match_if_drawto_command_with_absolute(&mut self) -> Option<(u8, bool)> {\n  555 |         let cmd = self.peek_command();\n  556 |         let result = match cmd {\n  557 |             Some(b'M') => None,\n  558 |             Some(b'm') => None,\n  559 |             Some(c) => {\n  560 |                 let c_up = c.to_ascii_uppercase();\n  561 |                 if c == c_up {\n  562 |                     Some((c_up, true))\n  563 |                 } else {\n  564 |                     Some((c_up, false))\n  565 |                 }\n  566 |             }\n  567 |             _ => None,\n  568 |         };\n  569 |         if result.is_some() {\n  570 |             let _ = self.match_command();\n  571 |         }\n  572 |         result\n  573 |     }\n  574 | \n  575 |     fn drawto_command(&mut self) -> Result<bool, ParseError> {\n  576 |         match self.match_if_drawto_command_with_absolute() {\n  577 |             Some((b'Z', _)) => {\n  578 |                 self.emit_close_path();\n  579 |                 Ok(true)\n  580 |             }\n  581 |             Some((b'L', abs)) => {\n  582 |                 self.lineto_argument_sequence(abs)?;\n  583 |                 Ok(true)\n  584 |             }\n  585 |             Some((b'H', abs)) => {\n  586 |                 self.horizontal_lineto_argument_sequence(abs)?;\n  587 |                 Ok(true)\n  588 |             }\n  589 |             Some((b'V', abs)) => {\n  590 |                 self.vertical_lineto_argument_sequence(abs)?;\n  591 |                 Ok(true)\n  592 |             }\n  593 |             Some((b'C', abs)) => {\n  594 |                 self.curveto_argument_sequence(abs)?;\n  595 |                 Ok(true)\n  596 |             }\n  597 |             Some((b'S', abs)) => {\n  598 |                 self.smooth_curveto_argument_sequence(abs)?;\n  599 |                 Ok(true)\n  600 |             }\n  601 |             Some((b'Q', abs)) => {\n  602 |                 self.quadratic_curveto_argument_sequence(abs)?;\n  603 |                 Ok(true)\n  604 |             }\n  605 |             Some((b'T', abs)) => {\n  606 |                 self.smooth_quadratic_curveto_argument_sequence(abs)?;\n  607 |                 Ok(true)\n  608 |             }\n  609 |             Some((b'A', abs)) => {\n  610 |                 self.elliptical_arc_argument_sequence(abs)?;\n  611 |                 Ok(true)\n  612 |             }\n  613 |             _ => Ok(false),\n  614 |         }\n  615 |     }"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`get_xml2_sax_handler` sets both `error` and `fatalError` callbacks to None, relying solely on `serror` for diagnostics. If libxml2 ever falls back to the legacy callbacks (older versions, or codepaths bypassing serror), errors print to stderr — inappropriate behavior for an embedded library.","fix":"Set error and fatalError to small no-op extern \"C\" trampolines that silently consume the variadic args.","locations":[{"ref":"rsvg/src/xml/xml2_load.rs:31-71","code":"   31 | fn get_xml2_sax_handler() -> xmlSAXHandler {\n   32 |     xmlSAXHandler {\n   33 |         // first the unused callbacks\n   34 |         internalSubset:        None,\n   35 |         isStandalone:          None,\n   36 |         hasInternalSubset:     None,\n   37 |         hasExternalSubset:     None,\n   38 |         resolveEntity:         None,\n   39 |         notationDecl:          None,\n   40 |         attributeDecl:         None,\n   41 |         elementDecl:           None,\n   42 |         setDocumentLocator:    None,\n   43 |         startDocument:         None,\n   44 |         endDocument:           None,\n   45 |         reference:             None,\n   46 |         ignorableWhitespace:   None,\n   47 |         comment:               None,\n   48 |         warning:               None,\n   49 |         error:                 None,\n   50 |         fatalError:            None,\n   51 |         externalSubset:        None,\n   52 | \n   53 |         _private:              ptr::null_mut(),\n   54 | \n   55 |         // then the used callbacks\n   56 |         getEntity:             Some(sax_get_entity_cb),\n   57 |         entityDecl:            Some(sax_entity_decl_cb),\n   58 |         unparsedEntityDecl:    Some(sax_unparsed_entity_decl_cb),\n   59 |         getParameterEntity:    Some(sax_get_parameter_entity_cb),\n   60 |         characters:            Some(sax_characters_cb),\n   61 |         cdataBlock:            Some(sax_characters_cb),\n   62 |         startElement:          None,\n   63 |         endElement:            None,\n   64 |         processingInstruction: Some(sax_processing_instruction_cb),\n   65 |         startElementNs:        Some(sax_start_element_ns_cb),\n   66 |         endElementNs:          Some(sax_end_element_ns_cb),\n   67 |         serror:                Some(rsvg_sax_serror_cb),\n   68 | \n   69 |         initialized:           XML_SAX2_MAGIC,\n   70 |     }\n   71 | }"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"`static mut DPI_X` / `DPI_Y` are mutated by `rsvg_set_default_dpi*` and read by `Dpi::x()`/`y()` from arbitrary threads without synchronization. Concurrent read+write of a `static mut f64` is a data race and UB. The module comment notes 'this is clearly not thread-safe, but it is the legacy behavior' — acknowledging UB doesn't make it sound.","fix":"Replace with `AtomicU64` storing `f64::to_bits()`/`from_bits()` (or `Mutex<f64>`). The C ABI is preserved while eliminating the data race.","locations":[{"ref":"librsvg-c/src/dpi.rs:17-71","code":"   17 | static mut DPI_X: f64 = DEFAULT_DPI_X;\n   18 | static mut DPI_Y: f64 = DEFAULT_DPI_Y;\n   19 | \n   20 | #[derive(Debug, Copy, Clone, Default)]\n   21 | pub(crate) struct Dpi {\n   22 |     x: f64,\n   23 |     y: f64,\n   24 | }\n   25 | \n   26 | impl Dpi {\n   27 |     pub(crate) fn new(x: f64, y: f64) -> Dpi {\n   28 |         Dpi { x, y }\n   29 |     }\n   30 | \n   31 |     pub(crate) fn x(&self) -> f64 {\n   32 |         if self.x <= 0.0 {\n   33 |             unsafe { DPI_X }\n   34 |         } else {\n   35 |             self.x\n   36 |         }\n   37 |     }\n   38 | \n   39 |     pub(crate) fn y(&self) -> f64 {\n   40 |         if self.y <= 0.0 {\n   41 |             unsafe { DPI_Y }\n   42 |         } else {\n   43 |             self.y\n   44 |         }\n   45 |     }\n   46 | }\n   47 | \n   48 | #[unsafe(no_mangle)]\n   49 | pub unsafe extern \"C\" fn rsvg_set_default_dpi_x_y(dpi_x: libc::c_double, dpi_y: libc::c_double) {\n   50 |     // mutating global statics is unsafe\n   51 |     unsafe {\n   52 |         if dpi_x <= 0.0 {\n   53 |             DPI_X = DEFAULT_DPI_X;\n   54 |         } else {\n   55 |             DPI_X = dpi_x;\n   56 |         }\n   57 | \n   58 |         if dpi_y <= 0.0 {\n   59 |             DPI_Y = DEFAULT_DPI_Y;\n   60 |         } else {\n   61 |             DPI_Y = dpi_y;\n   62 |         }\n   63 |     }\n   64 | }\n   65 | \n   66 | #[unsafe(no_mangle)]\n   67 | pub unsafe extern \"C\" fn rsvg_set_default_dpi(dpi: libc::c_double) {\n   68 |     unsafe {\n   69 |         rsvg_set_default_dpi_x_y(dpi, dpi);\n   70 |     }\n   71 | }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"low","description":"In `box_blur_loop`, `rayon::scope` is used with the `UnsafeSendPixelData` helper that carries raw pointers across thread boundaries via a hand-written `unsafe impl Send`. The safety argument relies entirely on `split_at_row`/`split_at_column` producing disjoint sub-regions, but neither helper marks the parameter `index` carefully — `split_at_row` accepts `index == self.height` (assert `index <= self.height`). A future refactor that introduces an off-by-one in the splitting math would silently produce overlapping writable views — data race in unsafe code.","fix":"Add `debug_assert!(self.width + index_complement.width == original_width)` style invariants at the call sites, or replace `UnsafeSendPixelData` with `RowsMut` / `par_chunks_mut` over a `&mut [u8]` slice, which lets the borrow checker prove disjointness.","locations":[{"ref":"rsvg/src/surface_utils/shared_surface.rs:676-783","code":"  676 |             struct UnsafeSendPixelData<'a> {\n  677 |                 width: u32,\n  678 |                 height: u32,\n  679 |                 stride: isize,\n  680 |                 ptr: NonNull<u8>,\n  681 |                 _marker: PhantomData<&'a mut ()>,\n  682 |             }\n  683 | \n  684 |             unsafe impl<'a> Send for UnsafeSendPixelData<'a> {}\n  685 | \n  686 |             impl<'a> UnsafeSendPixelData<'a> {\n  687 |                 /// Creates a new `UnsafeSendPixelData`.\n  688 |                 ///\n  689 |                 /// # Safety\n  690 |                 /// You must call `cairo_surface_mark_dirty()` on the surface once all instances of\n  691 |                 /// `UnsafeSendPixelData` are dropped to make sure the pixel changes are committed\n  692 |                 /// to Cairo.\n  693 |                 #[inline]\n  694 |                 unsafe fn new(surface: &mut cairo::ImageSurface) -> Self {\n  695 |                     assert_eq!(surface.format(), cairo::Format::ARgb32);\n  696 |                     let ptr = surface.data().unwrap().as_mut_ptr();\n  697 | \n  698 |                     Self {\n  699 |                         width: surface.width() as u32,\n  700 |                         height: surface.height() as u32,\n  701 |                         stride: surface.stride() as isize,\n  702 |                         ptr: NonNull::new(ptr).unwrap(),\n  703 |                         _marke \n  745 |                             stride: self.stride,\n  746 |                             ptr: NonNull::new(unsafe {\n  747 |                                 self.ptr.as_ptr().offset(index as isize * self.stride)\n  748 |                             })\n  749 |                             .unwrap(),\n  750 |                             _marker: PhantomData,\n  751 |                         },\n  752 |                     )\n  753 |                 }\n  754 | \n  755 |                 /// Splits this `UnsafeSendPixelData` into two at the given column.\n  756 |                 ///\n  757 |                 /// The first one contains columns `0..index` (`index` not included) and the second\n  758 |                 /// one contains columns `index..width`.\n  759 |                 #[inline]\n  760 |                 fn split_at_column(self, index: u32) -> (Self, Self) {\n  761 |                     assert!(index <= self.width);\n  762 | \n  763 |                     (\n  764 |                         UnsafeSendPixelData {\n  765 |                             width: index,\n  766 |                             height: self.height,\n  767 |                             stride: self.stride,\n  768 |                             ptr: self.ptr,\n  769 |                             _marker: PhantomData,\n  770 |                         },\n  771 |                         UnsafeSendPixelData {\n  772 |                             width: self.width - index,\n  773 |                             height: self.height,\n  774 |                             stride: self.stride,\n  775 |                             ptr: NonNull::new(unsafe {\n  776 |                                 self.ptr.as_ptr().offset(index as isize * 4)\n  777 |                             })\n  778 |                             .unwrap(),\n  779 |                             _marker: PhantomData,\n  780 |                         },\n  781 |                     )\n  782 |                 }\n  783 |             }"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","description":"`rsvg_handle_get_pixbuf` leaks the GError. It declares `let mut error = ptr::null_mut()`, passes &mut error to `rsvg_handle_get_pixbuf_and_error`, then if non-null, formats and returns without ever calling `g_error_free(error)`. Every failed render leaks the GError struct plus its heap-allocated message string. Additionally, `format!(\"{:?}\", *error)` only prints the pointer fields, not the human-readable message — so the log is also useless.","fix":"Read the message via `CStr::from_ptr((*error).message).to_string_lossy()` for logging, then call `glib::ffi::g_error_free(error)` before returning NULL.","locations":[{"ref":"librsvg-c/src/handle.rs:1276-1301","code":" 1276 | #[unsafe(no_mangle)]\n 1277 | #[cfg(feature = \"pixbuf\")]\n 1278 | #[allow(unsafe_op_in_unsafe_fn)]\n 1279 | pub unsafe extern \"C\" fn rsvg_handle_get_pixbuf(\n 1280 |     handle: *const RsvgHandle,\n 1281 | ) -> *mut gdk_pixbuf::ffi::GdkPixbuf {\n 1282 |     rsvg_return_val_if_fail! {\n 1283 |         rsvg_handle_get_pixbuf => ptr::null_mut();\n 1284 | \n 1285 |         is_rsvg_handle(handle),\n 1286 |     }\n 1287 | \n 1288 |     let mut error = ptr::null_mut();\n 1289 |     let pixbuf = rsvg_handle_get_pixbuf_and_error(handle, &mut error);\n 1290 | \n 1291 |     if !error.is_null() {\n 1292 |         let rhandle = get_rust_handle(handle);\n 1293 |         let session = &rhandle.imp().session;\n 1294 |         let msg = format!(\"could not render: {:?}\", *error);\n 1295 |         rsvg_log!(session, \"{}\", msg);\n 1296 |         rsvg_g_warning(&msg);\n 1297 |         return ptr::null_mut();\n 1298 |     }\n 1299 | \n 1300 |     pixbuf\n 1301 | }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`rsvg_handle_new_from_data` passes `data as *mut u8` to `g_memory_input_stream_new_from_data` with no destroy_notify. GIO's contract requires either (a) da
