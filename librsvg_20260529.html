<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","description":"Explicit `panic!(\"API called out of order\")` in `rsvg_handle_get_intrinsic_dimensions` reachable directly from C. If the handle is not loaded, `get_intrinsic_dimensions()` returns Err and the `unwrap_or_else(|_| panic!(...))` unwinds through the FFI boundary into the C caller — undefined behavior. C callers cannot catch Rust panics.","fix":"Mirror the pattern used by other rsvg_handle_get_* functions: emit `rsvg_g_critical(\"API called out of order\")`, zero/empty all out params (set has_width/has_height/has_viewbox to FALSE), and return.","locations":[{"ref":"librsvg-c/src/handle.rs:1708-1721","code":" 1708 |     let rhandle = get_rust_handle(handle);\n 1709 | \n 1710 |     let d = rhandle\n 1711 |         .get_intrinsic_dimensions()\n 1712 |         .unwrap_or_else(|_| panic!(\"API called out of order\"));\n 1713 | \n 1714 |     let w = d.width;\n 1715 |     let h = d.height;\n 1716 |     let r = d.vbox.map(RsvgRectangle::from);\n 1717 | \n 1718 |     set_out_param(out_has_width, out_width, &Into::into(w));\n 1719 |     set_out_param(out_has_height, out_height, &Into::into(h));\n 1720 |     set_out_param(out_has_viewbox, out_viewbox, &r);\n 1721 | }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"critical","description":"Same FFI-boundary panic as above, in `rsvg_handle_get_intrinsic_size_in_pixels`. `unwrap_or_else(|_| panic!(\"API called out of order\"))` panics across the C boundary on out-of-order API use.","fix":"Replace the panic with `rsvg_g_critical`, write 0.0 to out_width/out_height if non-null, and return `false.into_glib()`.","locations":[{"ref":"librsvg-c/src/handle.rs:1736-1753","code":" 1736 |     let rhandle = get_rust_handle(handle);\n 1737 | \n 1738 |     let dim = rhandle\n 1739 |         .get_intrinsic_size_in_pixels()\n 1740 |         .unwrap_or_else(|_| panic!(\"API called out of order\"));\n 1741 | \n 1742 |     let (w, h) = dim.unwrap_or((0.0, 0.0));\n 1743 | \n 1744 |     if !out_width.is_null() {\n 1745 |         *out_width = w;\n 1746 |     }\n 1747 | \n 1748 |     if !out_height.is_null() {\n 1749 |         *out_height = h;\n 1750 |     }\n 1751 | \n 1752 |     dim.is_some().into_glib()\n 1753 | }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"`SizeCallback::start_loop()` / `end_loop()` enforce the loop guard with `assert!`. `get_dimensions_sub` calls `start_loop()`, then runs `geometry_for_layer` + the user's C size_func, then `end_loop()`. If anything between them panics (e.g. from inside the Rust renderer for malformed input), `end_loop` never executes and `in_loop` stays `true` forever — the very next call to `get_dimensions_sub` then panics on `start_loop`'s assert, propagating across FFI. The handle is permanently bricked.","fix":"Use an RAII guard struct that sets in_loop=true on construction and clears it in Drop. Optionally relax the asserts to `debug_assert!` or convert to `rsvg_g_critical`+early-return.","locations":[{"ref":"librsvg-c/src/handle.rs:462-470","code":"  462 |     fn start_loop(&self) {\n  463 |         assert!(!self.in_loop.get());\n  464 |         self.in_loop.set(true);\n  465 |     }\n  466 | \n  467 |     fn end_loop(&self) {\n  468 |         assert!(self.in_loop.get());\n  469 |         self.in_loop.set(false);\n  470 |     }"},{"ref":"librsvg-c/src/handle.rs:678-700","code":"  678 |         inner.size_callback.start_loop();\n  679 | \n  680 |         let res = self\n  681 |             .get_geometry_sub(id)\n  682 |             .and_then(|(ink_r, _)| {\n  683 |                 // Keep these in sync with tests/src/reference.rs\n  684 |                 let width = checked_i32(ink_r.width().round())?;\n  685 |                 let height = checked_i32(ink_r.height().round())?;\n  686 | \n  687 |                 Ok((ink_r, width, height))\n  688 |             })\n  689 |             .map(|(ink_r, width, height)| {\n  690 |                 let (w, h) = inner.size_callback.call(width, height);\n  691 | \n  692 |                 RsvgDimensionData {\n  693 |                     width: w,\n  694 |                     height: h,\n  695 |                     em: ink_r.width(),\n  696 |                     ex: ink_r.height(),\n  697 |                 }\n  698 |             });\n  699 | \n  700 |         inner.size_callback.end_loop();"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"BoundingBox::combine() unconditionally unwraps the result of `self.transform.invert()`. The code's own comment explicitly acknowledges 'this will panic!() if it's not invertible... should we check on our own?'. Any caller that constructs a BoundingBox with a non-invertible transform (e.g. one accumulated through other transforms producing a singular matrix) and then inserts/clips into it will panic. Reachable from extents_of_transformed_children() and similar layer-extent helpers.","fix":"Make `combine` return Result<(), InvalidTransform> or early-return when invert() yields None. At minimum, replace the .unwrap() with .expect(...) and document the invariant; better, wrap the field in ValidTransform.","locations":[{"ref":"rsvg/src/bbox.rs:36-50","code":"   36 |     fn combine(&mut self, src: &BoundingBox, clip: bool) {\n   37 |         if src.rect.is_none() && src.ink_rect.is_none() {\n   38 |             return;\n   39 |         }\n   40 | \n   41 |         // this will panic!() if it's not invertible... should we check on our own?\n   42 |         let transform = self\n   43 |             .transform\n   44 |             .invert()\n   45 |             .unwrap()\n   46 |             .pre_transform(&src.transform);\n   47 | \n   48 |         self.rect = combine_rects(self.rect, src.rect, &transform, clip);\n   49 |         self.ink_rect = combine_rects(self.ink_rect, src.ink_rect, &transform, clip);\n   50 |     }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"`emit_markers_for_path` calls `path.iter().nth(segments.len()).unwrap()` to decide whether the path ended with a ClosePath. For multi-subpath paths whose last subpath is closed (e.g. `M0,0 L10,0 L0,10 Z M20,20 L30,20 L20,30 Z`), this indexes into a middle subpath command rather than the trailing ClosePath, so the end marker's angle wrongly uses `incoming` only instead of bisecting with the closing subpath's outgoing tangent. Also, for hand-constructed paths where commands.len() == segments.len() (e.g. a single LineTo built via PathBuilder API without a leading MoveTo), `nth(segments.len())` returns None and `.unwrap()` panics the renderer.","fix":"Track whether each subpath was closed during the segment-building loop in `Segments::from(&Path)` (carry a parallel `Vec<bool>` or extend the Segment enum), and use that flag instead of re-indexing into the original PathCommand stream by segment count.","locations":[{"ref":"rsvg/src/marker.rs:888-913","code":"  888 |     if !segments.is_empty() {\n  889 |         let segment = &segments[segments.len() - 1];\n  890 |         if let Segment::LineOrCurve { .. } = *segment {\n  891 |             let incoming = segments\n  892 |                 .find_incoming_angle_backwards(segments.len() - 1)\n  893 |                 .unwrap_or_else(|| Angle::new(0.0));\n  894 | \n  895 |             let angle = {\n  896 |                 if let PathCommand::ClosePath = path.iter().nth(segments.len()).unwrap() {\n  897 |                     let outgoing = segments\n  898 |                         .find_outgoing_angle_forwards(0)\n  899 |                         .unwrap_or_else(|| Angle::new(0.0));\n  900 |                     incoming.bisect(outgoing)\n  901 |                 } else {\n  902 |                     incoming\n  903 |                 }\n  904 |             };\n  905 | \n  906 |             specs.push(emit_marker(\n  907 |                 segment,\n  908 |                 MarkerEndpoint::End,\n  909 |                 MarkerType::End,\n  910 |                 angle,\n  911 |             ));\n  912 |         }\n  913 |     }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","description":"collapse_white_space() reaches unimplemented!() for valid CSS white-space values BreakSpaces and PreLine. These are real CSS values that the property parser accepts (see property_defs.rs: 'break-spaces' => BreakSpaces, 'pre-line' => PreLine), so this panic is reachable from any SVG that sets white-space to one of those values.","fix":"Either implement BreakSpaces / PreLine explicitly per CSS Text 3, or fall back to one of the existing two implementations and log a warning, rather than panicking.","locations":[{"ref":"rsvg/src/text2.rs:140-146","code":"  140 | fn collapse_white_space(input: &str, white_space: WhiteSpace) -> Vec<Character> {\n  141 |     match white_space {\n  142 |         WhiteSpace::Normal | WhiteSpace::NoWrap => compute_normal_nowrap(input),\n  143 |         WhiteSpace::Pre | WhiteSpace::PreWrap => compute_pre_prewrap(input),\n  144 |         _ => unimplemented!(),\n  145 |     }\n  146 | }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","description":"`panic!(\"end_element: XML handler stack is empty!?\")` in XmlState::end_element is invoked from a libxml2 SAX callback. While libxml2 normally guarantees balanced start/end, any libxml2 bug or future API change that delivers an unbalanced `<\/foo>` causes a panic to unwind through libxml2's C parser — UB. The companion `context_stack.pop().unwrap()` on line 258 has the same risk.","fix":"Treat unbalanced end-element as a fatal parser error: push Context::FatalError, log via rsvg_log, and return. Replace `.pop().unwrap()` with `if let Some(_) = ...pop() { /* fine */ }`.","locations":[{"ref":"rsvg/src/xml/mod.rs:240-259","code":"  240 |     pub fn end_element(&self, _name: QualName) {\n  241 |         let context = self.inner.borrow().context();\n  242 | \n  243 |         match context {\n  244 |             Context::Start => panic!(\"end_element: XML handler stack is empty!?\"),\n  245 |             Context::ElementCreation => self.element_creation_end_element(),\n  246 | \n  247 |             Context::Style => self.style_end_element(),\n  248 |             Context::UnsupportedStyleChild => (),\n  249 | \n  250 |             Context::XInclude(_) => (),\n  251 |             Context::UnsupportedXIncludeChild => (),\n  252 |             Context::XIncludeFallback(_) => (),\n  253 | \n  254 |             Context::FatalError(_) => return,\n  255 |         }\n  256 | \n  257 |         // We can unwrap since start_element() always adds a context to the stack\n  258 |         self.inner.borrow_mut().context_stack.pop().unwrap();\n  259 |     }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","description":"Several `assert!(!ptr.is_null())` and `assert!(len >= 0)` calls inside libxml2 SAX callbacks. Panics inside extern \"C\" callbacks unwinding through libxml2 frames are UB. Particularly important: `assert!(!entity.is_null())` at line 165 triggers when `xmlNewEntity` returns NULL (OOM) — an OOM during XML parsing of a malicious file becomes a crash-from-FFI.","fix":"Replace each assert with `if ptr.is_null() { return; }` / `if len < 0 { return; }`. For the entity OOM case at 165, set a state error and call `xmlStopParser(parser)` as already done elsewhere in the file.","locations":[{"ref":"rsvg/src/xml/xml2_load.rs:129","code":"  129 |     assert!(!name.is_null());"},{"ref":"rsvg/src/xml/xml2_load.rs:148","code":"  148 |     assert!(!name.is_null());"},{"ref":"rsvg/src/xml/xml2_load.rs:165","code":"  165 |     assert!(!entity.is_null());"},{"ref":"rsvg/src/xml/xml2_load.rs:214","code":"  214 |     assert!(!localname.is_null());"},{"ref":"rsvg/src/xml/xml2_load.rs:252","code":"  252 |     assert!(!localname.is_null());"},{"ref":"rsvg/src/xml/xml2_load.rs:270-271","code":"  270 |     assert!(!unterminated_text.is_null());\n  271 |     assert!(len >= 0);"},{"ref":"rsvg/src/xml/xml2_load.rs:284","code":"  284 |     assert!(!target.is_null());"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"`unreachable!(\"should have been called with percentage units\")` in `size_in_pixels_from_percentage_width_and_height` is reachable via FFI through `rsvg_handle_get_dimensions` -> `legacy_layer_geometry`. The non-Percent contract is only enforced by `intrinsic_size_in_pixels` returning None first — fragile coupling to an internal invariant.","fix":"Replace the unreachable arm with `(_, _) => None,` or `Some((vbox.width(), vbox.height()))`. The function already returns Option, so falling back gracefully is natural.","locations":[{"ref":"librsvg-c/src/sizing.rs:108-113","code":"  108 |     match (width.unit, height.unit) {\n  109 |         (Percent, Percent) => Some((vbox.width(), vbox.height())),\n  110 |         (_, Percent) => Some((w, w * vbox.height() / vbox.width())),\n  111 |         (Percent, _) => Some((h * vbox.width() / vbox.height(), h)),\n  112 |         (_, _) => unreachable!(\"should have been called with percentage units\"),\n  113 |     }"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"`apply_selector_flags` is implemented as `todo!()` which panics if invoked. Currently `css::cascade()` passes `NeedsSelectorFlags::No`, so it isn't reached, but any future change of that flag or any other code path that invokes selector matching with flags enabled (the `selectors` crate exposes many entry points) will crash librsvg.","fix":"Replace with empty body: `fn apply_selector_flags(&self, _: ElementSelectorFlags) {}` — librsvg does not perform style invalidation so it does not need to track these flags.","locations":[{"ref":"rsvg/src/css.rs:822-826","code":"  822 |     /// Applies the given selector flags to this element.\n  823 |     fn apply_selector_flags(&self, _: ElementSelectorFlags) {\n  824 |         todo!()\n  825 |     }\n  826 | }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"feTurbulence's `render` calls `ctx.paffine().invert().unwrap()` unconditionally. If the primitive transform is non-invertible (zero determinant, e.g. degenerate scale(0)), this panics. The rest of the librsvg filter code generally returns a `FilterError` for such cases.","fix":"Replace with: `let affine = ctx.paffine().invert().ok_or(FilterError::InvalidParameter(\"non-invertible primitive transform\".into()))?;` (or whichever existing error variant fits — there is precedent in the filter code for handling non-invertible transforms).","locations":[{"ref":"rsvg/src/filters/turbulence.rs:361","code":"  361 |         let affine = ctx.paffine().invert().unwrap();"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","description":"CssLength::to_points() panics for Percent, Em, Ex, and Ch units. While the rsvg-convert CLI restricts inputs to absolute units via parse_length()/is_absolute_unit(), the function is pub in `rsvg::rsvg_convert_only` and the discipline is not enforced by types. Same hazard for to_inches/to_cm/to_mm/to_picas which delegate to to_points.","fix":"Return Result<f64, ValueErrorKind> (or Option<f64>), or split into a typed AbsoluteCssLength wrapper that statically guarantees absolute units. Mark current with #[track_caller] and a clearer message in the meantime.","locations":[{"ref":"rsvg/src/length.rs:460-492","code":"  460 |     pub fn to_points(&self, params: &NormalizeParams) -> f64 {\n  461 |         match self.unit {\n  462 |             LengthUnit::Px => {\n  463 |                 self.length / <N as Normalize>::normalize(params.dpi.x, params.dpi.y) * 72.0\n  464 |             }\n  465 | \n  466 |             LengthUnit::Percent => {\n  467 |                 panic!(\"Cannot convert a percentage length into an absolute length\");\n  468 |             }\n  469 | \n  470 |             LengthUnit::Em => {\n  471 |                 panic!(\"Cannot convert an Em length into an absolute length\");\n  472 |             }\n  473 | \n  474 |             LengthUnit::Ex => {\n  475 |                 panic!(\"Cannot convert an Ex length into an absolute length\");\n  476 |             }\n  477 | \n  478 |             LengthUnit::In => self.length * POINTS_PER_INCH,\n  479 | \n  480 |             LengthUnit::Cm => self.length / CM_PER_INCH * POINTS_PER_INCH,\n  481 | \n  482 |             LengthUnit::Mm => self.length / MM_PER_INCH * POINTS_PER_INCH,\n  483 | \n  484 |             LengthUnit::Pt => self.length,\n  485 | \n  486 |             LengthUnit::Pc => self.length / PICA_PER_INCH * POINTS_PER_INCH,\n  487 | \n  488 |             LengthUnit::Ch => {\n  489 |                 panic!(\"Cannot convert a Ch length into an absolute length\");\n  490 |             }\n  491 |         }\n  492 |     }"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","description":"Multiple `.unwrap()` calls in XmlState reachable through SAX callbacks: `current_node.take().unwrap()` (394), `current_node.clone().unwrap()` (401), `current_node.as_ref().unwrap()` (412). These rely on the context_stack/current_node invariant. Any divergence (malformed XML edge case, future refactor) produces a panic across the libxml2 callback boundary.","fix":"Replace each unwrap with `if let Some(...)` and treat None as a fatal parser error (push Context::FatalError, stop parser).","locations":[{"ref":"rsvg/src/xml/mod.rs:392-413","code":"  392 |     fn element_creation_end_element(&self) {\n  393 |         let mut inner = self.inner.borrow_mut();\n  394 |         let node = inner.current_node.take().unwrap();\n  395 |         inner.current_node = node.parent();\n  396 |     }\n  397 | \n  398 |     fn element_creation_characters(&self, text: &str) {\n  399 |         let mut inner = self.inner.borrow_mut();\n  400 | \n  401 |         let mut parent = inner.current_node.clone().unwrap();\n  402 |         inner.document_builder.append_characters(text, &mut parent);\n  403 |     }\n  404 | \n  405 |     fn style_end_element(&self) {\n  406 |         self.add_inline_stylesheet();\n  407 |         self.element_creation_end_element()\n  408 |     }\n  409 | \n  410 |     fn add_inline_stylesheet(&self) {\n  411 |         let mut inner = self.inner.borrow_mut();\n  412 |         let current_node = inner.current_node.as_ref().unwrap();\n  413 | "}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","description":"rsvg-convert's metadata::creation_date() calls Utc.timestamp_opt(seconds, 0).unwrap() on a user-controlled environment variable. timestamp_opt returns LocalResult::None for out-of-range timestamps (e.g. SOURCE_DATE_EPOCH=99999999999999999), so this unwrap panics. A simple build-system mistake crashes the CLI.","fix":"Handle LocalResult::None: match Utc.timestamp_opt(seconds, 0) { LocalResult::Single(dt) => Ok(Some(dt.to_rfc3339())), _ => Err(error!(\"SOURCE_DATE_EPOCH out of range: {}\", seconds)) }.","locations":[{"ref":"rsvg_convert/src/main.rs:406-420","code":"  406 |     pub fn creation_date() -> Result<Option<String>, Error> {\n  407 |         match env::var(\"SOURCE_DATE_EPOCH\") {\n  408 |             Ok(epoch) => match i64::from_str(&epoch) {\n  409 |                 Ok(seconds) => {\n  410 |                     let datetime = Utc.timestamp_opt(seconds, 0).unwrap();\n  411 |                     Ok(Some(datetime.to_rfc3339()))\n  412 |                 }\n  413 |                 Err(e) => Err(error!(\"Environment variable $SOURCE_DATE_EPOCH: {}\", e)),\n  414 |             },\n  415 |             Err(env::VarError::NotPresent) => Ok(None),\n  416 |             Err(env::VarError::NotUnicode(_)) => Err(error!(\n  417 |                 \"Environment variable $SOURCE_DATE_EPOCH is not valid Unicode\"\n  418 |             )),\n  419 |         }\n  420 |     }"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","description":"natural_geometry() calls export_id.unwrap() inside the RenderingError::IdNotFound arm. The code assumes the renderer only emits IdNotFound when an id was passed, but the unwrap is fragile. If a future renderer change ever returns IdNotFound while export_id is None, rsvg-convert panics instead of producing a clean error.","fix":"Use export_id.unwrap_or(\"\") (or .as_deref().unwrap_or(\"(unknown)\")), or restructure the error message so it doesn't depend on the Option being Some.","locations":[{"ref":"rsvg_convert/src/main.rs:802-809","code":"  802 |     .map_err(|e| match e {\n  803 |         RenderingError::IdNotFound => error!(\n  804 |             \"File {} does not have an object with id \\\"{}\\\")\",\n  805 |             input,\n  806 |             export_id.unwrap()\n  807 |         ),\n  808 |         _ => error!(\"Error rendering SVG {}: {}\", input, e),\n  809 |     })"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","description":"`CString::new(url.as_str()).unwrap()` in `BaseUrl::set` will panic if the URL string ever contains an interior NUL byte. Although `Url::parse` rejects most NUL-bearing input, defensive handling avoids a panic-across-FFI if anything slips through.","fix":"Use `CString::new(url.as_str()).unwrap_or_else(|_| CString::new(\"\").unwrap())` (or propagate via Result and log via rsvg_g_critical).","locations":[{"ref":"librsvg-c/src/handle.rs:206-211","code":"  206 | impl BaseUrl {\n  207 |     fn set(&mut self, url: Url) {\n  208 |         let cstring = CString::new(url.as_str()).unwrap();\n  209 | \n  210 |         self.inner = Some(BaseUrlInner { url, cstring });\n  211 |     }"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","description":"`with_dpi` asserts `dpi_x > 0.0 && dpi_y > 0.0`. This is a public API that can be invoked with NaN, 0.0, negative, or Infinity from user/program data, panicking the library.","fix":"Clamp to a sensible default (with `rsvg_log!`) when invalid, or change to return `Result<Self, ApiError>`. At minimum reject NaN/Infinity via `dpi_x.is_finite() && dpi_x > 0.0`.","locations":[{"ref":"rsvg/src/api.rs:503-511","code":"  503 |     pub fn with_dpi(self, dpi_x: f64, dpi_y: f64) -> Self {\n  504 |         assert!(dpi_x > 0.0);\n  505 |         assert!(dpi_y > 0.0);\n  506 | \n  507 |         CairoRenderer {\n  508 |             dpi: Dpi::new(dpi_x, dpi_y),\n  509 |             ..self\n  510 |         }\n  511 |     }"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","description":"`AcquiredNode::drop` unwraps `stack.pop()` and asserts equality with `self.node`. If invariants are ever broken (e.g. acquired nodes dropped out of order, or stored in a `Vec` that drops them in reverse), the panic destabilizes the entire rendering session at drop time.","fix":"Make the drop diagnostic-only: `if let Some(last) = stack.pop() { if last != self.node { rsvg_log!(session, \"acquire-stack mismatch\"); } }`. The acquire stack is an optimization; refusing to clean up on mismatch is worse than logging.","locations":[{"ref":"rsvg/src/document.rs:850-858","code":"  850 | impl Drop for AcquiredNode {\n  851 |     fn drop(&mut self) {\n  852 |         if let Some(ref stack) = self.stack {\n  853 |             let mut stack = stack.borrow_mut();\n  854 |             let last = stack.pop().unwrap();\n  855 |             assert!(last == self.node);\n  856 |         }\n  857 |     }\n  858 | }"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","description":"FontOptions::new() is called from DrawingCtx::get_font_options(), which is called from StackingContext::new() for every drawn element, and it unwraps `cairo::FontOptions::new()` — fallible (returns `Result<FontOptions, cairo::Error>` on cairo OOM). A cairo allocation failure during rendering of an untrusted SVG will abort the process rather than surfacing as an InternalRenderingError.","fix":"Make FontOptions::new return `Result<FontOptions, cairo::Error>` and propagate through get_font_options()/StackingContext::new(), mapping to an InternalRenderingError::Cairo variant.","locations":[{"ref":"rsvg/src/drawing_ctx.rs:57-69","code":"   57 | impl FontOptions {\n   58 |     pub fn new(testing: bool) -> FontOptions {\n   59 |         let mut options = cairo::FontOptions::new().unwrap();\n   60 |         if testing {\n   61 |             options.set_antialias(cairo::Antialias::Gray);\n   62 |         }\n   63 | \n   64 |         options.set_hint_style(cairo::HintStyle::None);\n   65 |         options.set_hint_metrics(cairo::HintMetrics::Off);\n   66 | \n   67 |         FontOptions { options }\n   68 |     }\n   69 | }"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","description":"DrawingCtx::new stores the address of a local stack variable (`stack_variable: u8 = 42`) in `self.stack_ptr`. The local is dropped when `new` returns, leaving a dangling pointer. `print_stack_depth` later calls `self.stack_ptr.byte_offset_from(current_stack_ptr)`. Per Rust's pointer rules, `byte_offset_from` requires both pointers to be derived from the same allocation; passing a dangling pointer is UB even without dereferencing it.","fix":"Either remove the diagnostic, or capture an integer derived from the address of a long-lived field of DrawingCtx and compute the delta using `wrapping_sub` on `usize` addresses rather than `byte_offset_from`.","locations":[{"ref":"rsvg/src/drawing_ctx.rs:355-381","code":"  355 |     pub fn new(\n  356 |         session: Session,\n  357 |         cr: &cairo::Context,\n  358 |         initial_viewport: &Viewport,\n  359 |         config: RenderingConfiguration,\n  360 |         drawsub_stack: Vec<Node>,\n  361 |     ) -> DrawingCtx {\n  362 |         let stack_variable: u8 = 42;\n  363 | \n  364 |         DrawingCtx {\n  365 |             session,\n  366 |             initial_viewport: *initial_viewport,\n  367 |             cr_stack: Rc::new(RefCell::new(Vec::new())),\n  368 |             cr: cr.clone(),\n  369 |             drawsub_stack,\n  370 |             config,\n  371 |             recursion_depth: 0,\n  372 | \n  373 |             // We store this pointer to pinpoint the stack depth at this point in the program.\n  374 |             // Later, in the print_stack_depth() function, we'll use it to subtract from the\n  375 |             // current stack pointer.  This is a cheap hack to monitor how much stack space\n  376 |             // is consumed between recursive calls to the drawing machinery.\n  377 |             //\n  378 |             // The pointer is otherwise meaningless and should never be dereferenced.\n  379 |             stack_ptr: &stack_variable,\n  380 |         }\n  381 |     }"},{"ref":"rsvg/src/drawing_ctx.rs:414-425","code":"  414 |     pub fn print_stack_depth(&self, place_name: &str) {\n  415 |         let stack_variable: u8 = 42;\n  416 | \n  417 |         let current_stack_ptr = &stack_variable;\n  418 | \n  419 |         let stack_size = unsafe { self.stack_ptr.byte_offset_from(current_stack_ptr) };\n  420 |         rsvg_log!(\n  421 |             self.session,\n  422 |             \"{place_name}: recursion_depth={}, stack_depth={stack_size}\",\n  423 |             self.recursion_depth\n  424 |         );\n  425 |     }"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","description":"filter_current_surface does `cairo::ImageSurface::try_from(self.cr.target()).unwrap()`. Today the only caller path constructs the cr via create_surface_for_toplevel_viewport() (which always yields an ImageSurface) so the unwrap is reachable but not triggered, but nothing in the function signature documents this invariant. Any future caller invoking this method while the current cr targets a PDF, Recording, or PostScript surface will panic on this line — surprising for a function whose name implies it filters 'the current surface' generically.","fix":"Either map the cast to a typed error and return it (`.map_err(|_| InternalRenderingError::Rendering(...))?`), or change the function signature to accept `&ImageSurface` so the invariant is enforced at the type level.","locations":[{"ref":"rsvg/src/drawing_ctx.rs:796-806","code":"  796 |     fn filter_current_surface(\n  797 |         &mut self,\n  798 |         acquired_nodes: &mut AcquiredNodes<'_>,\n  799 |         filter: &Filter,\n  800 |         viewport: &Viewport,\n  801 |         element_name: &str,\n  802 |         bbox: &BoundingBox,\n  803 |     ) -> Result<cairo::Surface, Box<InternalRenderingError>> {\n  804 |         let surface_to_filter = SharedImageSurface::copy_from_surface(\n  805 |             &cairo::ImageSurface::try_from(self.cr.target()).unwrap(),\n  806 |         )?;"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","description":"draw_group() is reachable via draw_layer() when given a LayerKind::Group and unconditionally panics with `unimplemented!()`. LayerKind::Group is constructed by `Group::layout_with_children` (structure.rs:144) and exercised at least by the unit test at structure.rs:849. Any future render path that drives off the layout tree (the FIXME comments suggest this is in progress) will hit the panic at runtime rather than getting a typecheck error.","fix":"Implement the function by iterating `group.children` and calling `dc.draw_layer(layer, an, false, new_viewport)?` for each, or temporarily remove `LayerKind::Group` and `layout_with_children` until the layout-driven render path is wired up.","locations":[{"ref":"rsvg/src/drawing_ctx.rs:1635-1657","code":" 1635 |     fn draw_group(\n 1636 |         &mut self,\n 1637 |         _group: &Group,\n 1638 |         _stacking_ctx: &StackingContext,\n 1639 |         _acquired_nodes: &mut AcquiredNodes<'_>,\n 1640 |         _viewport: &Viewport,\n 1641 |     ) -> DrawResult {\n 1642 |         unimplemented!();\n 1643 |         /*\n 1644 |         self.with_discrete_layer(\n 1645 |             stacking_ctx,\n 1646 |             acquired_nodes,\n 1647 |             viewport,\n 1648 |             group.establish_viewport,\n 1649 |             false,\n 1650 |             &mut |an, dc, new_viewport| {\n 1651 |                 for layer in &group.children {\n 1652 |                     dc.draw_layer(layer, an, false, &new_viewport)?;\n 1653 |                 }\n 1654 |             },\n 1655 |         )\n 1656 |         */\n 1657 |     }"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","description":"`NoiseGenerator::new` for feTurbulence normalizes random gradients with `s = sqrt(gx*gx + gy*gy); gx /= s; gy /= s;`. If the random LCG happens to produce a gradient of exactly (0, 0), `s` is 0 and the division yields NaN, which will silently propagate into pixel output. Probability is tiny but deterministic per seed.","fix":"Skip the normalization (or pick a fallback unit vector) when `s == 0.0`: `if s != 0.0 { gx /= s; gy /= s; }`.","locations":[{"ref":"rsvg/src/filters/turbulence.rs:197-211","code":"  197 |         for k in 0..4 {\n  198 |             for i in 0..B_SIZE {\n  199 |                 rv.lattice_selector[i] = i;\n  200 |                 for j in 0..2 {\n  201 |                     seed = random(seed);\n  202 |                     rv.gradient[k][i][j] =\n  203 |                         ((seed % (B_SIZE + B_SIZE) as i32) - B_SIZE as i32) as f64 / B_SIZE as f64;\n  204 |                 }\n  205 |                 let s = (rv.gradient[k][i][0] * rv.gradient[k][i][0]\n  206 |                     + rv.gradient[k][i][1] * rv.gradient[k][i][1])\n  207 |                     .sqrt();\n  208 |                 rv.gradient[k][i][0] /= s;\n  209 |                 rv.gradient[k][i][1] /= s;\n  210 |             }\n  211 |         }"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","description":"PathBuilder's command methods (line_to, curve_to, arc, close_path) are public and DON'T enforce that the path starts with move_to. If a caller builds a path with line_to before move_to, both SubPath::origin() (line 603) and SubPathIter::next (line 651) panic on `assert!(matches!(commands.first().unwrap(), PackedCommand::MoveTo))`. The path_parser respects this invariant, but other callers using PathBuilder directly can trip it.","fix":"Either make the iterators tolerant of non-MoveTo-leading paths, or have PathBuilder's command methods auto-insert a move_to(0,0) (or return an error) when invoked before any move_to.","locations":[{"ref":"rsvg/src/path_builder.rs:495-570","code":"  495 | impl PathBuilder {\n  496 |     pub fn parse(&mut self, path_str: &str) -> Result<(), ParseError> {\n  497 |         let mut parser = PathParser::new(self, path_str);\n  498 |         parser.parse()\n  499 |     }\n  500 | \n  501 |     /// Consumes the `PathBuilder` and returns a compact, immutable representation as a `Path`.\n  502 |     pub fn into_path(self) -> Path {\n  503 |         let num_coords = self\n  504 |             .path_commands\n  505 |             .iter()\n  506 |             .map(PathCommand::num_coordinates)\n  507 |             .sum();\n  508 | \n  509 |         let mut coords = Vec::with_capacity(num_coords);\n  510 |         let packed_commands: Vec<_> = self\n  511 |             .path_commands\n  512 |             .iter()\n  513 |             .map(|cmd| cmd.to_packed(&mut coords))\n  514 |             .collect();\n  515 | \n  516 |         Path {\n  517 |             commands: packed_commands.into_boxed_slice(),\n  518 |             coords: coords.into_boxed_slice(),\n  519 |         }\n  520 |     }\n  521 | \n  522 |     /// Adds a MoveTo command to the path.\n  523 |     pub fn move_to(&mut self, x: f64, y: f64) {\n  524 |         self.path_commands.push(PathCommand::MoveTo(x, y));\n  525 |     }\n  526 | \n  527 |     /// Adds a LineTo command to the path.\n  528 |     pub fn line_to(&mut self, x: f64, y: f64) {\n  529 |         self.path_commands.push(PathCommand::LineTo(x, y));\n  530 |     }\n  531 | \n  532 |     /// Adds a CurveTo command to the path.\n  533 |     pub fn curve_to(&mut self, x2: f64, y2: f64, x3: f64, y3: f64, x4: f64, y4: f64) {\n  534 |         let curve = CubicBezierCurve {\n  535 |             pt1: (x2, y2),\n  536 |             pt2: (x3, y3),\n  537 |             to: (x4, y4),\n  538 |         };\n  539 |         self.path_commands.push(PathCommand::CurveTo(curve));\n  540 |     }\n  541 | \n  542 |     /// Adds an EllipticalArc command to the path.\n  543 |     pub fn arc(\n  544 |         &mut self,\n  545 |         x1: f64,\n  546 |         y1: f64,\n  547 |         rx: f64,\n  548 |         ry: f64,\n  549 |         x_axis_rotation: f64,\n  550 |         large_arc: LargeArc,\n  551 |         sweep: Sweep,\n  552 |         x2: f64,\n  553 |         y2: f64,\n  554 |     ) {\n  555 |         let arc = EllipticalArc {\n  556 |             r: (rx, ry),\n  557 |             x_axis_rotation,\n  558 |             large_arc,\n  559 |             sweep,\n  560 |             from: (x1, y1),\n  561 |             to: (x2, y2),\n  562 |         };\n  563 |         self.path_commands.push(PathCommand::Arc(arc));\n  564 |     }\n  565 | \n  566 |     /// Adds a ClosePath command to the path.\n  567 |     pub fn close_path(&mut self) {\n  568 |         self.path_commands.push(PathCommand::ClosePath);\n  569 |     }\n  570 | }"},{"ref":"rsvg/src/path_builder.rs:601-688","code":"  601 |     pub fn origin(&self) -> (f64, f64) {\n  602 |         let first = *self.commands.first().unwrap();\n  603 |         assert!(matches!(first, PackedCommand::MoveTo));\n  604 |         let command = PathCommand::from_packed(first, &mut self.coords.iter());\n  605 | \n  606 |         match command {\n  607 |             PathCommand::MoveTo(x, y) => (x, y),\n  608 |             _ => unreachable!(),\n  609 |         }\n  610 |     }\n  611 | \n  612 |     /// Returns whether the length of a subpath is approximately zero.\n  613 |     pub fn is_zero_length(&self) -> bool {\n  614 |         let (cur_x, cur_y) = self.origin();\n  615 | \n  616 |         for cmd in self.iter_commands().skip(1) {\n  617 |             let (end_x, end_y) = match cmd {\n  618 |                 PathCommand::MoveTo(_, _) => unreachable!(\n  619 |                     \"A MoveTo cannot appear in a subpath if it's not the first element\"\n  620 |                 ),\n  621 |                 PathCommand::LineTo(x, y) => (x, y),\n  622 |                 PathCommand::CurveTo(curve) => curve.to,\n  623 |                 PathCommand::Arc(arc) => arc.to,\n  624 |                 // If we get a `ClosePath and haven't returned yet then we haven't moved at all making\n  625 |                 // it an empty subpath`\n  626 |                 PathCommand::ClosePath => return true,\n  627 |             };\n  628 | \n  629 |             if !end_x.approx_eq_cairo(cur_x) || !end_y.approx_eq_cairo(cur_y) {\n  630 |                 return false;\n  631 |             }\n  632 |         }\n  633 | \n  634 |         true\n  635 |     }\n  636 | }\n  637 | \n  638 | impl<'a> Iterator for SubPathIter<'a> {\n  639 |     type Item = SubPath<'a>;\n  640 | \n  641 |     fn next(&mut self) -> Option<Self::Item> {\n  642 |         // If we ended on our last command in the previous iteration, we're done here\n  643 |         if self.commands_start >= self.path.commands.len() {\n  644 |             return None;\n  645 |         }\n  646 | \n  647 |         // Otherwise we have at least one command left, we setup the slice to be all the remaining\n  648 |         // commands.\n  649 |         let commands = &self.path.commands[self.commands_start..];\n  650 | \n  651 |         assert!(matches!(commands.first().unwrap(), PackedCommand::MoveTo));\n  652 |         let mut num_coords = PackedCommand::MoveTo.num_coordinates();\n  653 | \n  654 |         // Skip over the initial MoveTo\n  655 |         for (i, cmd) in commands.iter().enumerate().skip(1) {\n  656 |             // If we encounter a MoveTo , we ended our current subpath, we\n  657 |             // return the commands until this command and set commands_start to be the index of the\n  658 |             // next command\n  659 |             if let PackedCommand::MoveTo = cmd {\n  660 |                 let subpath_coords_start = self.coords_start;\n  661 | \n  662 |                 self.commands_start += i;\n  663 |                 self.coords_start += num_coords;\n  664 | \n  665 |                 return Some(SubPath {\n  666 |                     commands: &commands[..i],\n  667 |                     coords: &self.path.coords\n  668 |                         [subpath_coords_start..subpath_coords_start + num_coords],\n  669 |                 });\n  670 |             } else {\n  671 |                 num_coords += cmd.num_coordinates();\n  672 |             }\n  673 |         }\n  674 | \n  675 |         // If we didn't find any MoveTo, we're done here. We return the rest of the path\n  676 |         // and set commands_start so next iteration will return None.\n  677 | \n  678 |         self.commands_start = self.path.commands.len();\n  679 | \n  680 |         let subpath_coords_start = self.coords_start;\n  681 |         assert!(subpath_coords_start + num_coords == self.path.coords.len());\n  682 |         self.coords_start = self.path.coords.len();\n  683 | \n  684 |         Some(SubPath {\n  685 |             commands,\n  686 |             coords: &self.path.coords[subpath_coords_start..],\n  687 |         })\n  688 |     }"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"low","description":"ResolvedPattern::node_with_children() calls wc.upgrade().unwrap() on a WeakNode. The strong reference is normally kept alive by the document, but no invariant enforces this — a future lifecycle/refactor change could drop it while a pattern is still being processed, producing a hard panic instead of a graceful skip.","fix":"Return None on upgrade failure: `Children::WithChildren(ref wc) => wc.upgrade()`. The method already returns Option<Node>.","locations":[{"ref":"rsvg/src/pattern.rs:336-345","code":"  336 | impl ResolvedPattern {\n  337 |     fn node_with_children(&self) -> Option<Node> {\n  338 |         match self.children {\n  339 |             // This means we didn't find any children among the fallbacks,\n  340 |             // so there is nothing to render.\n  341 |             Children::Empty => None,\n  342 | \n  343 |             Children::WithChildren(ref wc) => Some(wc.upgrade().unwrap()),\n  344 |         }\n  345 |     }"}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","description":"`ImageSurfaceDataExt::set_pixel` on `[u32]` computes `(y * stride + x*4) / 4` — if `stride` is not a multiple of 4 (Cairo always returns stride aligned to 4 bytes for ARgb32 surfaces, but the trait is `pub` and a future caller of `set_pixel` on a non-Cairo-derived `[u32]` could provide an odd stride), the division silently truncates and writes to the wrong pixel.","fix":"Either assert `stride % 4 == 0` at the top of the function, or accept the stride in `u32` units rather than bytes (matching the slice element type).","locations":[{"ref":"rsvg/src/surface_utils/mod.rs:251-256","code":"  251 | impl ImageSurfaceDataExt for [u32] {\n  252 |     #[inline]\n  253 |     fn set_pixel(&mut self, stride: usize, pixel: Pixel, x: u32, y: u32) {\n  254 |         self[(y as usize * stride + x as usize * 4) / 4] = pixel.to_u32();\n  255 |     }\n  256 | }"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","description":"`SharedImageSurface::get_pixel_by_offset` asserts only the upper bound (`offset < stride * height`) but not `offset >= 0`. If a caller ever passes a negative `isize`, `ptr.offset(neg)` is undefined behavior (in unsafe code) and the assertion does not catch it. Currently the only caller is `Pixels::next()` whose offset is constructed from x0/y0 (asserted >= 0) and only grows monotonically, so this is latent — but it is a sharp edge for future callers.","fix":"Add `assert!(offset >= 0);` alongside the existing upper-bound assertion, or change the parameter type from `isize` to `usize`.","locations":[{"ref":"rsvg/src/surface_utils/shared_surface.rs:357-365","code":"  357 |     /// Retrieves the pixel value by offset into the pixel data array.\n  358 |     #[inline]\n  359 |     pub fn get_pixel_by_offset(&self, offset: isize) -> Pixel {\n  360 |         assert!(offset < self.stride * self.height as isize);\n  361 | \n  362 |         #[allow(clippy::cast_ptr_alignment)]\n  363 |         let value = unsafe { *(self.data_ptr.as_ptr().offset(offset) as *const u32) };\n  364 |         Pixel::from_u32(value)\n  365 |     }"}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","description":"Text::draw() calls `self.layout(...).and_then(|layer| draw_ctx.draw_layer(layer.as_ref().unwrap(), ...))`. layout() currently always returns Ok(Some(_)), but the `.unwrap()` becomes a hidden runtime panic the moment layout() is changed to ever return Ok(None). The Option-vs-always-Some contract is invisible to callers.","fix":"Either match on layer explicitly (Some/None branches), or change Text::layout()'s return type to `Result<Layer, _>` since it never returns None.","locations":[{"ref":"rsvg/src/text.rs:964-1017","code":"  964 |     fn layout(\n  965 |         &self,\n  966 |         node: &Node,\n  967 |         acquired_nodes: &mut AcquiredNodes<'_>,\n  968 |         cascaded: &CascadedValues<'_>,\n  969 |         viewport: &Viewport,\n  970 |         draw_ctx: &mut DrawingCtx,\n  971 |     ) -> Result<Option<Layer>, Box<InternalRenderingError>> {\n  972 |         let session = draw_ctx.session();\n  973 | \n  974 |         let values = cascaded.get();\n  975 | \n  976 |         let elt = node.borrow_element();\n  977 | \n  978 |         let stacking_ctx = StackingContext::new(\n
