<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ip_original_dst` and `ipv6_original_dst` call `.try_into().unwrap()` to convert the returned `SocketAddrAny` into a `SocketAddrV4`/`SocketAddrV6`. If the address family returned by `getsockopt(SO_ORIGINAL_DST/IP6T_SO_ORIGINAL_DST)` is not the expected family (e.g. an unexpected kernel/netfilter state), the conversion fails and the public API panics instead of returning an error.","fix":"Replace `.try_into().unwrap()` with `.try_into().map_err(|_| io::Errno::OPNOTSUPP)?` (or similar) so an unexpected family yields an error rather than a panic.","locations":[{"ref":"src/backend/libc/net/sockopt.rs:878-885","code":"  878 | pub(crate) fn ip_original_dst(fd: BorrowedFd<'_>) -> io::Result<SocketAddrV4> {\n  879 |     let level = c::IPPROTO_IP;\n  880 |     let optname = c::SO_ORIGINAL_DST;\n  881 | \n  882 |     let mut addr = crate::net::SocketAddrBuf::new();\n  883 |     getsockopt_raw(fd, level, optname, &mut addr.storage, &mut addr.len)?;\n  884 |     Ok(unsafe { addr.into_any() }.try_into().unwrap())\n  885 | }","lines":8},{"ref":"src/backend/libc/net/sockopt.rs:889-896","code":"  889 | pub(crate) fn ipv6_original_dst(fd: BorrowedFd<'_>) -> io::Result<SocketAddrV6> {\n  890 |     let level = c::IPPROTO_IPV6;\n  891 |     let optname = c::IP6T_SO_ORIGINAL_DST;\n  892 | \n  893 |     let mut addr = crate::net::SocketAddrBuf::new();\n  894 |     getsockopt_raw(fd, level, optname, &mut addr.storage, &mut addr.len)?;\n  895 |     Ok(unsafe { addr.into_any() }.try_into().unwrap())\n  896 | }","lines":8}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`tcp_congestion` reads up to 16 bytes (`OPTLEN`) of the congestion-control algorithm name and then `assert!(slice.contains(&b'\\0'))`. The kernel constant `TCP_CA_NAME_MAX` is 16, so a congestion name occupying all 16 bytes would arrive without a NUL terminator inside the buffer, making the assertion fail and panicking a public API. Additionally `core::str::from_utf8(...).unwrap()` would panic on any non-UTF-8 bytes. Both are reachable only via kernel-provided names, which are normally short ASCII, so impact is limited.","fix":"Avoid the assert/unwrap: locate the NUL with `iter().position()` (defaulting to the full slice length if absent) to bound the string, and return `Errno` (or lossy-convert) instead of unwrapping `from_utf8`.","locations":[{"ref":"src/backend/libc/net/sockopt.rs:1042-1060","code":" 1042 | pub(crate) fn tcp_congestion(fd: BorrowedFd<'_>) -> io::Result<String> {\n 1043 |     const OPTLEN: c::socklen_t = 16;\n 1044 | \n 1045 |     let level = c::IPPROTO_TCP;\n 1046 |     let optname = c::TCP_CONGESTION;\n 1047 |     let mut value = MaybeUninit::<[MaybeUninit<u8>; OPTLEN as usize]>::uninit();\n 1048 |     let mut optlen = OPTLEN;\n 1049 |     getsockopt_raw(fd, level, optname, &mut value, &mut optlen)?;\n 1050 |     unsafe {\n 1051 |         let value = value.assume_init();\n 1052 |         let slice: &[u8] = core::mem::transmute(&value[..optlen as usize]);\n 1053 |         assert!(slice.contains(&b'\\0'));\n 1054 |         Ok(\n 1055 |             core::str::from_utf8(CStr::from_ptr(slice.as_ptr().cast()).to_bytes())\n 1056 |                 .unwrap()\n 1057 |                 .to_owned(),\n 1058 |         )\n 1059 |     }\n 1060 | }","lines":19}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The `CPU_SET`, `CPU_CLR`, and `CPU_ISSET` helpers compute `idx = cpu / size_in_bits` and then index `cpuset.bits[idx]` with no bounds check. These are reachable from the safe public API `CpuSet::set`, `CpuSet::unset`, and `CpuSet::is_set` (src/thread/sched.rs:38-56), which accept a caller-controlled `field: usize` and whose docs only say \"`field` is the CPU id\" without documenting any maximum or panic. Passing a CPU id >= `CpuSet::MAX_CPU` (e.g. 1024 on a typical 64-bit target, where `bits` is `[u64; 16]`) makes `idx` exceed the array length and triggers an index-out-of-bounds panic. glibc's equivalent macros are unchecked UB, but here a safe Rust API panics on out-of-range input. `CPU_COUNT_S` has the same unchecked indexing (`cpuset.bits[..idx]`) if ever called with a `size_in_bytes` larger than the set.","fix":"Either document the precondition `field < CpuSet::MAX_CPU` on the public `CpuSet::set`/`unset`/`is_set` methods (and ideally `debug_assert!(cpu < CPU_SETSIZE)` in the helpers), or bounds-check `cpu`/`idx` against `cpuset.bits.len()` and silently no-op / return false when out of range, matching the practical behavior callers expect from a CPU-set bitmask.","locations":[{"ref":"src/backend/linux_raw/thread/cpu_set.rs:8-32","code":"    8 | #[inline]\n    9 | pub(crate) fn CPU_SET(cpu: usize, cpuset: &mut RawCpuSet) {\n   10 |     let size_in_bits = 8 * size_of_val(&cpuset.bits[0]); // 32, 64 etc\n   11 |     let (idx, offset) = (cpu / size_in_bits, cpu % size_in_bits);\n   12 |     cpuset.bits[idx] |= 1 << offset\n   13 | }\n   14 | \n   15 | #[inline]\n   16 | pub(crate) fn CPU_ZERO(cpuset: &mut RawCpuSet) {\n   17 |     cpuset.bits.fill(0)\n   18 | }\n   19 | \n   20 | #[inline]\n   21 | pub(crate) fn CPU_CLR(cpu: usize, cpuset: &mut RawCpuSet) {\n   22 |     let size_in_bits = 8 * size_of_val(&cpuset.bits[0]); // 32, 64 etc\n   23 |     let (idx, offset) = (cpu / size_in_bits, cpu % size_in_bits);\n   24 |     cpuset.bits[idx] &= !(1 << offset)\n   25 | }\n   26 | \n   27 | #[inline]\n   28 | pub(crate) fn CPU_ISSET(cpu: usize, cpuset: &RawCpuSet) -> bool {\n   29 |     let size_in_bits = 8 * size_of_val(&cpuset.bits[0]);\n   30 |     let (idx, offset) = (cpu / size_in_bits, cpu % size_in_bits);\n   31 |     (cpuset.bits[idx] & (1 << offset)) != 0\n   32 | }","lines":25},{"ref":"src/backend/linux_raw/thread/cpu_set.rs:35-41","code":"   35 | pub(crate) fn CPU_COUNT_S(size_in_bytes: usize, cpuset: &RawCpuSet) -> u32 {\n   36 |     let size_of_mask = size_of_val(&cpuset.bits[0]);\n   37 |     let idx = size_in_bytes / size_of_mask;\n   38 |     cpuset.bits[..idx]\n   39 |         .iter()\n   40 |         .fold(0, |acc, i| acc + i.count_ones())\n   41 | }","lines":7}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`align_for_cmsghdr` computes the alignment offset `adjusted - addr` (which can be up to `align_of::<cmsghdr>() - 1`, e.g. 7) and then slices `&mut buffer[adjusted - addr..]`. If the caller passes a non-empty buffer whose length is smaller than the required alignment offset (e.g. a 1-3 byte buffer that happens to be misaligned), the slice index exceeds the buffer length and the index operation panics. This is reachable from the public `SendAncillaryBuffer::new` / `RecvAncillaryBuffer::new` constructors (and their `From` impls) with a small, misaligned buffer.","fix":"Clamp the offset to the buffer length, e.g. compute `let off = core::cmp::min(adjusted - addr, buffer.len()); &mut buffer[off..]`, returning an empty (already-exhausted) slice when the buffer is too small to hold even one aligned header, rather than panicking.","locations":[{"ref":"src/net/send_recv/msg.rs:499-510","code":"  499 | fn align_for_cmsghdr(buffer: &mut [MaybeUninit<u8>]) -> &mut [MaybeUninit<u8>] {\n  500 |     // If the buffer is empty, we won't be writing anything into it, so it\n  501 |     // doesn't need to be aligned.\n  502 |     if buffer.is_empty() {\n  503 |         return buffer;\n  504 |     }\n  505 | \n  506 |     let align = align_of::<c::cmsghdr>();\n  507 |     let addr = buffer.as_ptr() as usize;\n  508 |     let adjusted = (addr + (align - 1)) & align.wrapping_neg();\n  509 |     &mut buffer[adjusted - addr..]\n  510 | }","lines":12}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Termios::input_speed()` / `output_speed()` call `speed::decode(self.input_speed).unwrap()` on the fallback platform branch (not linux_kernel/bsd/solarish/newlib/aix, i.e. fuchsia, emscripten, hurd, redox, haiku, cygwin). On these platforms `input_speed`/`output_speed` hold the libc-encoded `B*` speed value as read from the device via `tcgetattr`. If the terminal device reports a baud rate whose encoded constant is not in rustix's hard-coded `decode` match table (e.g. a custom/unusual speed configured by another program), `decode` returns `None` and `.unwrap()` panics. This is reachable from the public safe API `Termios::input_speed()`/`output_speed()` (also invoked by the `Debug` impl at types.rs:239-240) without unsafe or obviously-invalid input.","fix":"On the fallback branch, avoid panicking on an unrecognized encoded speed. Either return a sentinel (e.g. fall back to returning the raw encoded value or 0) or change the accessor to handle `None` gracefully, and make the `Debug` impl tolerant of an undecodable speed rather than calling `.unwrap()`.","locations":[{"ref":"src/termios/types.rs:121-122","code":"  121 |             speed::decode(self.input_speed).unwrap()\n  122 |         }","lines":2},{"ref":"src/termios/types.rs:154-155","code":"  154 |             speed::decode(self.output_speed).unwrap()\n  155 |         }","lines":2},{"ref":"src/termios/types.rs:239-240","code":"  239 |         d.field(\"input_speed\", &self.input_speed());\n  240 |         d.field(\"output_speed\", &self.output_speed());","lines":2}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"`AncillaryIter::new` asserts `data.len() % size_of::<T>() == 0`. For the `SCM_RIGHTS` path (T = OwnedFd, size 4) the payload length comes from `cmsg_len`. While the Linux kernel only delivers whole file descriptors even when ancillary data is truncated (`MSG_CTRUNC`), so the normal `recvmsg`/`drain` path cannot reach this assert, the assert is also reachable from the public `unsafe fn AncillaryDrain::parse`, whose safety contract only requires \"valid message data\". A caller that supplies a structurally-valid cmsg header with a payload length not a multiple of 4 triggers a panic rather than a graceful skip.","fix":"In `cvt_msg`, for the SCM_RIGHTS branch round the payload length down to a multiple of `size_of::<OwnedFd>()` before constructing the iterator (or return `None`/skip when it is not aligned), instead of relying on a debug-style `assert_eq!` that can panic.","locations":[{"ref":"src/net/send_recv/msg.rs:824-837","code":"  824 | impl<'data, T> AncillaryIter<'data, T> {\n  825 |     /// Create a new iterator over data in an ancillary buffer.\n  826 |     ///\n  827 |     /// # Safety\n  828 |     ///\n  829 |     /// The buffer must contain valid ancillary data.\n  830 |     unsafe fn new(data: &'data mut [u8]) -> Self {\n  831 |         assert_eq!(data.len() % size_of::<T>(), 0);\n  832 | \n  833 |         Self {\n  834 |             data,\n  835 |             _marker: PhantomData,\n  836 |         }\n  837 |     }","lines":14},{"ref":"src/net/send_recv/msg.rs:563-568","code":"  563 |                 (c::SOL_SOCKET, c::SCM_RIGHTS) => {\n  564 |                     // Create an iterator that reads out the file descriptors.\n  565 |                     let fds = AncillaryIter::new(payload);\n  566 | \n  567 |                     Some(RecvAncillaryMessage::ScmRights(fds))\n  568 |                 }","lines":6}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In the libc backend, three `WatchFlags` inotify constants are hardcoded to the placeholder value `1` instead of their real kernel values: `EXCL_UNLINK`, `MASK_ADD`, and `MASK_CREATE`. The correct values are `IN_EXCL_UNLINK` (0x04000000), `IN_MASK_ADD` (0x20000000), and `IN_MASK_CREATE` (0x10000000). `WatchFlags` is publicly re-exported (`crate::fs::inotify::WatchFlags`) and its `.bits()` is passed straight to `inotify_add_watch` (see src/backend/libc/fs/syscalls.rs:2696-2710 and src/fs/inotify.rs:74-79). As a result, on the libc backend, `WatchFlags::MASK_ADD` actually sends `IN_ACCESS` (value 1) to the kernel rather than `IN_MASK_ADD`; same for `MASK_CREATE` (would send IN_ACCESS instead of failing-if-exists semantics) and `EXCL_UNLINK`. This silently changes inotify watch semantics: a caller asking to merge/replace masks or to require-no-existing-watch instead just adds an ACCESS event watch. The linux_raw backend uses the correct `linux_raw_sys::general::IN_*` values (src/backend/linux_raw/fs/inotify.rs:65-69), so behavior differs between backends. libc defines all three constants correctly (c::IN_EXCL_UNLINK / c::IN_MASK_ADD / c::IN_MASK_CREATE).","fix":"Replace the placeholder `1` values with the libc constants: `const EXCL_UNLINK = c::IN_EXCL_UNLINK;`, `const MASK_ADD = c::IN_MASK_ADD;`, `const MASK_CREATE = c::IN_MASK_CREATE;`, matching the linux_raw backend.","locations":[{"ref":"src/backend/libc/fs/inotify.rs:64-69","code":"   64 |         /// `IN_EXCL_UNLINK`\n   65 |         const EXCL_UNLINK = 1;\n   66 |         /// `IN_MASK_ADD`\n   67 |         const MASK_ADD = 1;\n   68 |         /// `IN_MASK_CREATE`\n   69 |         const MASK_CREATE = 1;","lines":6}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`lstat` and its helper `lstat_old` are missing `mips64r6` in their `#[cfg]` gates, unlike every other stat function in this file (`fstat`, `stat`, `statat` all include `target_arch = \"mips64r6\"`). On `mips64r6` (a supported linux_raw target when `rustix_use_experimental_asm` is set):\n- The statx branch at line 669 (`cfg(any(target_pointer_width = \"32\", target_arch = \"mips64\"))`) is NOT compiled.\n- The direct-syscall branch at line 683 (`cfg(all(target_pointer_width = \"64\", not(target_arch = \"mips64\")))`) IS compiled and runs.\nThat branch does `let mut result = MaybeUninit::<Stat>::uninit(); ret(syscall!(__NR_newfstatat, ..., &mut result, ...))`, i.e. it tells the kernel to write a `struct stat` into a `Stat`. But on `mips64r6` the active `Stat` is the custom, non-`repr(C)` struct defined at types.rs:600-625 (its cfg includes `mips64r6`), whose field order/sizes do NOT match the kernel's `struct stat`. The kernel therefore writes its `struct stat` layout into a buffer interpreted with rustix's incompatible layout, producing garbage/corrupted stat results returned from the public `crate::fs::lstat` (and dangerous as it is read as initialized memory of the wrong shape). Note that the `lstat_old` helper even contains a dead `#[cfg(any(target_arch = \"mips64\", target_arch = \"mips64r6\"))]` arm (line 701) that can never be reached because the enclosing fn (line 697) is not compiled for `mips64r6`, which corroborates that `mips64r6` was simply forgotten in `lstat`.","fix":"Add `target_arch = \"mips64r6\"` to the cfgs in `lstat` and `lstat_old` exactly as done for `fstat`/`stat`/`statat`: change line 669 to `#[cfg(any(target_pointer_width = \"32\", target_arch = \"mips64\", target_arch = \"mips64r6\"))]`, change line 683 to `#[cfg(all(target_pointer_width = \"64\", not(target_arch = \"mips64\"), not(target_arch = \"mips64r6\")))]`, and change line 697 to include `target_arch = \"mips64r6\"`. This routes `lstat` through `statx`/`statx_to_stat` on mips64r6, matching the custom `Stat` layout.","locations":[{"ref":"src/backend/linux_raw/fs/syscalls.rs:667-695","code":"  667 | pub(crate) fn lstat(path: &CStr) -> io::Result<Stat> {\n  668 |     // See the comments in `fstat` about using `crate::fs::statx` here.\n  669 |     #[cfg(any(target_pointer_width = \"32\", target_arch = \"mips64\"))]\n  670 |     {\n  671 |         match crate::fs::statx(\n  672 |             crate::fs::CWD,\n  673 |             path,\n  674 |             AtFlags::SYMLINK_NOFOLLOW,\n  675 |             StatxFlags::BASIC_STATS,\n  676 |         ) {\n  677 |             Ok(x) => statx_to_stat(x),\n  678 |             Err(io::Errno::NOSYS) => lstat_old(path),\n  679 |             Err(err) => Err(err),\n  680 |         }\n  681 |     }\n  682 | \n  683 |     #[cfg(all(target_pointer_width = \"64\", not(target_arch = \"mips64\")))]\n  684 |     unsafe {\n  685 |         let mut result = MaybeUninit::<Stat>::uninit();\n  686 |         ret(syscall!(\n  687 |             __NR_newfstatat,\n  688 |             raw_fd(AT_FDCWD),\n  689 |             path,\n  690 |             &mut result,\n  691 |             c_uint(AT_SYMLINK_NOFOLLOW)\n  692 |         ))?;\n  693 |         Ok(result.assume_init())\n  694 |     }\n  695 | }","lines":29},{"ref":"src/backend/linux_raw/fs/syscalls.rs:697-724","code":"  697 | #[cfg(any(target_pointer_width = \"32\", target_arch = \"mips64\"))]\n  698 | fn lstat_old(path: &CStr) -> io::Result<Stat> {\n  699 |     let mut result = MaybeUninit::<linux_stat64>::uninit();\n  700 | \n  701 |     #[cfg(any(target_arch = \"mips64\", target_arch = \"mips64r6\"))]\n  702 |     unsafe {\n  703 |         ret(syscall!(\n  704 |             __NR_newfstatat,\n  705 |             raw_fd(AT_FDCWD),\n  706 |             path,\n  707 |             &mut result,\n  708 |             c_uint(AT_SYMLINK_NOFOLLOW)\n  709 |         ))?;\n  710 |         stat_to_stat(result.assume_init())\n  711 |     }\n  712 | \n  713 |     #[cfg(target_pointer_width = \"32\")]\n  714 |     unsafe {\n  715 |         ret(syscall!(\n  716 |             __NR_fstatat64,\n  717 |             raw_fd(AT_FDCWD),\n  718 |             path,\n  719 |             &mut result,\n  720 |             c_uint(AT_SYMLINK_NOFOLLOW)\n  721 |         ))?;\n  722 |         stat_to_stat(result.assume_init())\n  723 |     }\n  724 | }","lines":28},{"ref":"src/backend/linux_raw/fs/types.rs:600-625","code":"  600 | #[cfg(any(\n  601 |     target_pointer_width = \"32\",\n  602 |     target_arch = \"mips64\",\n  603 |     target_arch = \"mips64r6\"\n  604 | ))]\n  605 | #[derive(Debug, Copy, Clone)]\n  606 | #[allow(missing_docs)]\n  607 | #[non_exhaustive]\n  608 | pub struct Stat {\n  609 |     pub st_dev: u64,\n  610 |     pub st_mode: u32,\n  611 |     pub st_nlink: u32,\n  612 |     pub st_uid: u32,\n  613 |     pub st_gid: u32,\n  614 |     pub st_rdev: u64,\n  615 |     pub st_size: i64,\n  616 |     pub st_blksize: u32,\n  617 |     pub st_blocks: u64,\n  618 |     pub st_atime: i64,\n  619 |     pub st_atime_nsec: u32,\n  620 |     pub st_mtime: i64,\n  621 |     pub st_mtime_nsec: u32,\n  622 |     pub st_ctime: i64,\n  623 |     pub st_ctime_nsec: u32,\n  624 |     pub st_ino: u64,\n  625 | }","lines":26}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"In the XDP statistics v1 compatibility path, all three statistics fields are filled from `xdp_statistics.rx_dropped`. The `xdp_statistics_v1` struct has three distinct `u64` fields (`rx_dropped`, `rx_invalid_descs`, `tx_invalid_descs`), but `rx_invalid_descs` and `tx_invalid_descs` are both incorrectly assigned the `rx_dropped` value. On kernels old enough to return the v1-sized struct, `XdpStatistics::rx_invalid_descs` and `tx_invalid_descs` silently report the dropped-packet count instead of the real invalid-descriptor counts. The non-v1 branch (lines 1276-1281) reads the correct fields, confirming this is a copy-paste mistake.","fix":"Read the correct fields: `rx_invalid_descs: xdp_statistics.rx_invalid_descs,` and `tx_invalid_descs: xdp_statistics.tx_invalid_descs,`. (The same bug exists in src/backend/linux_raw/net/sockopt.rs and should be fixed there too.)","locations":[{"ref":"src/backend/libc/net/sockopt.rs:1258-1261","code":" 1258 |         Ok(XdpStatistics {\n 1259 |             rx_dropped: xdp_statistics.rx_dropped,\n 1260 |             rx_invalid_descs: xdp_statistics.rx_dropped,\n 1261 |             tx_invalid_descs: xdp_statistics.rx_dropped,","lines":4}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"In `timerfd_settime_old`, the returned `Itimerspec.it_value` field is populated from `old_result.it_interval` instead of `old_result.it_value`. The `it_value` (the time until the timer next expires) is silently replaced with the interval value, so callers on this code path get a wrong remaining-time. This is the `fix_y2038` fallback path, reachable on 32-bit glibc targets (e.g. i686/armv7) when the `__timerfd_settime64` symbol is unavailable (older glibc). The corresponding linux_raw backend (src/backend/linux_raw/time/syscalls.rs:187-189) correctly uses `it_value`.","fix":"In the `it_value` arm, read from `old_result.it_value.tv_sec` and `old_result.it_value.tv_nsec` instead of `old_result.it_interval.*`.","locations":[{"ref":"src/backend/libc/time/syscalls.rs:425-442","code":"  425 |     Ok(Itimerspec {\n  426 |         it_interval: Timespec {\n  427 |             tv_sec: old_result\n  428 |                 .it_interval\n  429 |                 .tv_sec\n  430 |                 .try_into()\n  431 |                 .map_err(|_| io::Errno::OVERFLOW)?,\n  432 |             tv_nsec: old_result.it_interval.tv_nsec as _,\n  433 |         },\n  434 |         it_value: Timespec {\n  435 |             tv_sec: old_result\n  436 |                 .it_interval\n  437 |                 .tv_sec\n  438 |                 .try_into()\n  439 |                 .map_err(|_| io::Errno::OVERFLOW)?,\n  440 |             tv_nsec: old_result.it_interval.tv_nsec as _,\n  441 |         },\n  442 |     })","lines":18}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":false,"description":"In `timerfd_gettime_old`, the returned `Itimerspec.it_value` field is populated from `old_result.it_interval` instead of `old_result.it_value`, so the queried time-until-next-expiration is replaced by the interval value. Same `fix_y2038` fallback path, reachable on 32-bit glibc targets when `__timerfd_gettime64` is unavailable. The linux_raw backend (src/backend/linux_raw/time/syscalls.rs:232-234) uses `it_value` correctly.","fix":"In the `it_value` arm, read from `old_result.it_value.tv_sec` and `old_result.it_value.tv_nsec` instead of `old_result.it_interval.*`.","locations":[{"ref":"src/backend/libc/time/syscalls.rs:498-515","code":"  498 |     Ok(Itimerspec {\n  499 |         it_interval: Timespec {\n  500 |             tv_sec: old_result\n  501 |                 .it_interval\n  502 |                 .tv_sec\n  503 |                 .try_into()\n  504 |                 .map_err(|_| io::Errno::OVERFLOW)?,\n  505 |             tv_nsec: old_result.it_interval.tv_nsec as _,\n  506 |         },\n  507 |         it_value: Timespec {\n  508 |             tv_sec: old_result\n  509 |                 .it_interval\n  510 |                 .tv_sec\n  511 |                 .try_into()\n  512 |                 .map_err(|_| io::Errno::OVERFLOW)?,\n  513 |             tv_nsec: old_result.it_interval.tv_nsec as _,\n  514 |         },\n  515 |     })","lines":18}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In the `xdp_statistics` v1 compatibility branch, `rx_invalid_descs` and `tx_invalid_descs` are both assigned `xdp_statistics.rx_dropped` instead of the corresponding fields. `xdp_statistics_v1` is a real struct with three distinct `__u64` fields (`rx_dropped`, `rx_invalid_descs`, `tx_invalid_descs`), all of which were written by the kernel into the zeroed buffer. As a result, on older kernels that return the v1-sized struct, callers of `XdpStatistics` get bogus values: the rx_dropped count is reported for all three counters. The non-v1 branch (lines 1061-1068) maps the same fields correctly, proving the v1 branch is wrong. The libc backend has the identical bug (src/backend/libc/net/sockopt.rs:1259-1261), confirming it is a genuine copy-paste error rather than intentional.","fix":"Map the distinct v1 fields: `rx_invalid_descs: xdp_statistics.rx_invalid_descs,` and `tx_invalid_descs: xdp_statistics.tx_invalid_descs,` (the v1 struct contains all three counters). Apply the same fix to the libc backend.","locations":[{"ref":"src/backend/linux_raw/net/sockopt.rs:1044-1051","code":" 1044 |         Ok(XdpStatistics {\n 1045 |             rx_dropped: xdp_statistics.rx_dropped,\n 1046 |             rx_invalid_descs: xdp_statistics.rx_dropped,\n 1047 |             tx_invalid_descs: xdp_statistics.rx_dropped,\n 1048 |             rx_ring_full: None,\n 1049 |             rx_fill_ring_empty_descs: None,\n 1050 |             tx_ring_empty_descs: None,\n 1051 |         })","lines":8}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"`libc_statvfs_to_statvfs` populates the `f_favail` output field from the source `f_ffree` field instead of the source `f_favail` field: `f_favail: from.f_ffree as u64`. The libc backend reads a real `c::statvfs`, which has a distinct `f_favail` member (verified present across libc targets), so this returns the total number of free inodes (`f_ffree`) where the caller asked for the number of inodes available to non-privileged users (`f_favail`). The two differ on filesystems that reserve inodes for root. This is a copy-paste from the linux_raw backend (src/backend/linux_raw/fs/syscalls.rs:956), where using `f_ffree` is correct because the raw kernel `statfs` struct has no separate `f_favail` field - but that justification does not apply to the libc `statvfs` path.","fix":"Change line 1631 to `f_favail: from.f_favail as u64,` so the available-inode count is taken from the corresponding source field.","locations":[{"ref":"src/backend/libc/fs/syscalls.rs:1622-1639","code":" 1622 | fn libc_statvfs_to_statvfs(from: c::statvfs) -> StatVfs {\n 1623 |     StatVfs {\n 1624 |         f_bsize: from.f_bsize as u64,\n 1625 |         f_frsize: from.f_frsize as u64,\n 1626 |         f_blocks: from.f_blocks as u64,\n 1627 |         f_bfree: from.f_bfree as u64,\n 1628 |         f_bavail: from.f_bavail as u64,\n 1629 |         f_files: from.f_files as u64,\n 1630 |         f_ffree: from.f_ffree as u64,\n 1631 |         f_favail: from.f_ffree as u64,\n 1632 |         #[cfg(not(target_os = \"aix\"))]\n 1633 |         f_fsid: from.f_fsid as u64,\n 1634 |         #[cfg(target_os = \"aix\")]\n 1635 |         f_fsid: ((from.f_fsid.val[0] as u64) << 32) | from.f_fsid.val[1],\n 1636 |         f_flag: StatVfsMountFlags::from_bits_retain(from.f_flag as u64),\n 1637 |         f_namemax: from.f_namemax as u64,\n 1638 |     }\n 1639 | }","lines":18}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"`set_ipv6_multicast_hops`/`ipv6_multicast_hops` pass `c::IPPROTO_IP` as the socket option level for the IPv6 option `IPV6_MULTICAST_HOPS`, instead of `c::IPPROTO_IPV6`. Every other IPv6 sockopt in this file (e.g. `set_ipv6_unicast_hops` just above) correctly uses `IPPROTO_IPV6`. On Linux `IPPROTO_IP` is level 0 (SOL_IP) and `IPV6_MULTICAST_HOPS` numerically equals `IP_MTU_DISCOVER` (18), so these calls actually read/write the IPv4 Path-MTU-Discovery setting rather than the IPv6 multicast hop limit. The setter therefore never sets the hop limit and may corrupt the IPv4 MTU-discover state. The existing test masks this because IP_MTU_DISCOVER defaults to 0.","fix":"Use `c::IPPROTO_IPV6` as the level in both `set_ipv6_multicast_hops` and `ipv6_multicast_hops`. (Same bug is present in src/backend/linux_raw/net/sockopt.rs.)","locations":[{"ref":"src/backend/libc/net/sockopt.rs:617-625","code":"  617 | #[inline]\n  618 | pub(crate) fn set_ipv6_multicast_hops(fd: BorrowedFd<'_>, multicast_hops: u32) -> io::Result<()> {\n  619 |     setsockopt(fd, c::IPPROTO_IP, c::IPV6_MULTICAST_HOPS, multicast_hops)\n  620 | }\n  621 | \n  622 | #[inline]\n  623 | pub(crate) fn ipv6_multicast_hops(fd: BorrowedFd<'_>) -> io::Result<u32> {\n  624 |     getsockopt(fd, c::IPPROTO_IP, c::IPV6_MULTICAST_HOPS)\n  625 | }","lines":9}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`set_ipv6_multicast_hops`/`ipv6_multicast_hops` pass `c::IPPROTO_IP` as the socket level for the `IPV6_MULTICAST_HOPS` option, which is an IPv6-level option and would normally use `c::IPPROTO_IPV6` (compare the adjacent `IPV6_UNICAST_HOPS` handlers which use `IPPROTO_IPV6`). The libc backend uses the same `IPPROTO_IP` level, so the two backends agree and this may be a pre-existing tolerated quirk, but per the man page the level for IPV6_MULTICAST_HOPS is IPPROTO_IPV6; using IPPROTO_IP risks EINVAL/ENOPROTOOPT or setting the wrong option on some configurations.","fix":"Use `c::IPPROTO_IPV6` for both the setter and getter of `IPV6_MULTICAST_HOPS` (and align the libc backend), unless there is a documented reason it must be IPPROTO_IP.","locations":[{"ref":"src/backend/linux_raw/net/sockopt.rs:569-576","code":"  569 | pub(crate) fn set_ipv6_multicast_hops(fd: BorrowedFd<'_>, multicast_hops: u32) -> io::Result<()> {\n  570 |     setsockopt(fd, c::IPPROTO_IP, c::IPV6_MULTICAST_HOPS, multicast_hops)\n  571 | }\n  572 | \n  573 | #[inline]\n  574 | pub(crate) fn ipv6_multicast_hops(fd: BorrowedFd<'_>) -> io::Result<u32> {\n  575 |     getsockopt(fd, c::IPPROTO_IP, c::IPV6_MULTICAST_HOPS)\n  576 | }","lines":8}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`linux_hwcap()` re-runs the full `init_auxv()` (which invokes `prctl(PR_GET_AUXV)` or opens and reads `/proc/self/auxv`) whenever `hwcap == 0 || hwcap2 == 0`. On systems where the kernel genuinely reports `AT_HWCAP2 == 0` (the value is legitimately zero on many architectures/CPUs), `HWCAP2` stays 0 after initialization, so the condition remains true and every subsequent call to `linux_hwcap()` re-reads the entire auxv array. The other getters (e.g. `page_size`) don't have this problem because their cached value is nonzero after init. This is repeated unnecessary work (a syscall or file read) on a function that callers may reasonably poll.","fix":"Track initialization with a separate sentinel/flag (e.g. a dedicated `AtomicBool` set once after `init_auxv` completes, or use a nonzero-default for HWCAP2 isn't possible). For example gate the re-init on a single \"initialized\" flag rather than on `hwcap == 0 || hwcap2 == 0`, so a legitimately-zero `hwcap2` doesn't force re-reading auxv on every call.","locations":[{"ref":"src/backend/linux_raw/param/auxv.rs:62-73","code":"   62 | pub(crate) fn linux_hwcap() -> (usize, usize) {\n   63 |     let mut hwcap = HWCAP.load(Relaxed);\n   64 |     let mut hwcap2 = HWCAP2.load(Relaxed);\n   65 | \n   66 |     if hwcap == 0 || hwcap2 == 0 {\n   67 |         init_auxv();\n   68 |         hwcap = HWCAP.load(Relaxed);\n   69 |         hwcap2 = HWCAP2.load(Relaxed);\n   70 |     }\n   71 | \n   72 |     (hwcap, hwcap2)\n   73 | }","lines":12}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Several `MountAttrFlags` bitflag constants have doc comments that name a different flag than the constant they document. `MOUNT_ATTR_IDMAP` (0x0010_0000) is documented as `MOUNT_ATTR_NOUSER`; `MOUNT_ATTR_NOSYMFOLLOW` (0x0020_0000) is documented as `MOUNT_ATTR__ATIME_FLAGS`; `MOUNT_ATTR_SIZE_VER0` (32) is also documented as `MOUNT_ATTR__ATIME_FLAGS`. The constant values themselves match the kernel; only the doc strings are wrong (copy-paste). This can mislead readers about which flag is which.","fix":"Fix the doc comments to match the constants: `/// `MOUNT_ATTR_IDMAP`` over `MOUNT_ATTR_IDMAP`, `/// `MOUNT_ATTR_NOSYMFOLLOW`` over `MOUNT_ATTR_NOSYMFOLLOW`, and `/// `MOUNT_ATTR_SIZE_VER0`` over `MOUNT_ATTR_SIZE_VER0`.","locations":[{"ref":"src/backend/libc/mount/types.rs:190-197","code":"  190 |         /// `MOUNT_ATTR_NOUSER`\n  191 |         const MOUNT_ATTR_IDMAP = 0x0010_0000;\n  192 | \n  193 |         /// `MOUNT_ATTR__ATIME_FLAGS`\n  194 |         const MOUNT_ATTR_NOSYMFOLLOW = 0x0020_0000;\n  195 | \n  196 |         /// `MOUNT_ATTR__ATIME_FLAGS`\n  197 |         const MOUNT_ATTR_SIZE_VER0 = 32;","lines":8}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"`MoveMountFlags` constants have mismatched doc comments. `MOVE_MOUNT_F_SYMLINKS` (0x0000_0001) is documented as `MOVE_MOUNT_F_EMPTY_PATH`, and `MOVE_MOUNT_SET_GROUP` (0x0000_0100) is documented as `MOVE_MOUNT__MASK`. Values are correct; only the doc strings are wrong.","fix":"Correct the doc comments to name the actual constants (`MOVE_MOUNT_F_SYMLINKS` and `MOVE_MOUNT_SET_GROUP` respectively).","locations":[{"ref":"src/backend/libc/mount/types.rs:212-213","code":"  212 |         /// `MOVE_MOUNT_F_EMPTY_PATH`\n  213 |         const MOVE_MOUNT_F_SYMLINKS = 0x0000_0001;","lines":2},{"ref":"src/backend/libc/mount/types.rs:230-231","code":"  230 |         /// `MOVE_MOUNT__MASK`\n  231 |         const MOVE_MOUNT_SET_GROUP = 0x0000_0100;","lines":2}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"In `epoll_wait`, the version-gating uses the `linux_5_11` feature (epoll_pwait2 was added in Linux 5.11), but two comments say \"Linux 5.1\". This contradicts the actual cfg condition (`#[cfg(not(feature = \"linux_5_11\"))]`) and the kernel version that introduced `epoll_pwait2`. The analogous `poll`/`select` functions correctly reference Linux 5.1 because those gate on `linux_5_1` (ppoll_time64/pselect6_time64). Here the comments should read \"Linux 5.11\".","fix":"Change the two comments in `epoll_wait` from \"Linux 5.1\" to \"Linux 5.11\" to match the `linux_5_11` cfg and the kernel version that introduced `epoll_pwait2`.","locations":[{"ref":"src/backend/linux_raw/event/syscalls.rs:291-292","code":"  291 |     // If we don't have Linux 5.1, and the timeout fits in an `i32`, use plain\n  292 |     // `epoll_pwait`.","lines":2},{"ref":"src/backen ange the doc aliases on the `FloatingPointEmulationControl` flags to `#[doc(alias = \"PR_FPEMU_NOPRINT\")]` for `NO_PRINT` and `#[doc(alias = \"PR_FPEMU_SIGFPE\")]` for `SIGFPE`.","locations":[{"ref":"src/process/prctl.rs:202-216","code":"  202 | bitflags! {\n  203 |     /// `PR_FPEMU_*` flags for use with [`floating_point_emulation_control`]\n  204 |     /// and [`set_floating_point_emulation_control`].\n  205 |     #[repr(transparent)]\n  206 |     #[derive(Copy, Clone, Eq, PartialEq, Hash, Debug)]\n  207 |     pub struct FloatingPointEmulationControl: u32 {\n  208 |         /// Silently emulate floating point operations accesses.\n  209 |         #[doc(alias = \"PR_UNALIGN_NOPRINT\")]\n  210 |         const NO_PRINT = 1;\n  211 |         /// Don't emulate floating point operations, send a [`Signal::Fpe`]\n  212 |         /// signal instead.\n  213 |         #[doc(alias = \"PR_UNALIGN_SIGFPE\")]\n  214 |         const SIGFPE = 2;\n  215 |     }\n  216 | }","lines":15}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"All six variants of the `WakeOpCmp` enum carry the same doc comment naming the constant `FUTEX_OP_CMP_EQ`, even though the variants represent the full set of comparisons (==, !=, <, <=, >, >=). Only `Eq` should reference `FUTEX_OP_CMP_EQ`; the others should reference `FUTEX_OP_CMP_NE`, `FUTEX_OP_CMP_LT`, `FUTEX_OP_CMP_LE`, `FUTEX_OP_CMP_GT`, and `FUTEX_OP_CMP_GE`. The enum discriminant values (0..5) and the `if oldval <op> cmparg` text are correct, so this is a documentation-only copy-paste error.","fix":"Update each variant's doc comment to name its matching kernel constant: `FUTEX_OP_CMP_NE` for `Ne`, `FUTEX_OP_CMP_LT` for `Lt`, `FUTEX_OP_CMP_LE` for `Le`, `FUTEX_OP_CMP_GT` for `Gt`, and `FUTEX_OP_CMP_GE` for `Ge`.","locations":[{"ref":"src/thread/futex.rs:191-202","code":"  191 |     /// `FUTEX_OP_CMP_EQ`: `if oldval == cmparg { wake(); }`\n  192 |     Eq = 0,\n  193 |     /// `FUTEX_OP_CMP_EQ`: `if oldval != cmparg { wake(); }`\n  194 |     Ne = 1,\n  195 |     /// `FUTEX_OP_CMP_EQ`: `if oldval < cmparg { wake(); }`\n  196 |     Lt = 2,\n  197 |     /// `FUTEX_OP_CMP_EQ`: `if oldval <= cmparg { wake(); }`\n  198 |     Le = 3,\n  199 |     /// `FUTEX_OP_CMP_EQ`: `if oldval > cmparg { wake(); }`\n  200 |     Gt = 4,\n  201 |     /// `FUTEX_OP_CMP_EQ`: `if oldval >= cmparg { wake(); }`\n  202 |     Ge = 5,","lines":12}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In the glibc `pwritev64v2` syscall shim, the second syscall argument is named `iovec: c_int` instead of `iovcnt: c_int`. The `syscall!` macro passes arguments positionally so behavior is unaffected, but the parameter name is misleading/copy-paste-wrong compared to the matching `preadv2` shim which uses `iovcnt`.","fix":"Rename the parameter from `iovec` to `iovcnt` for consistency and clarity.","locations":[{"ref":"src/backend/libc/c.rs:381-390","code":"  381 |             syscall! {\n  382 |                 fn pwritev2(\n  383 |                     fd: c_int,\n  384 |                     iov: *const iovec,\n  385 |                     iovec: c_int,\n  386 |                     offset_lo: usize,\n  387 |                     offset_hi: usize,\n  388 |                     flags: c_int\n  389 |                 ) via SYS_pwritev2 -> ssize_t\n  390 |             }","lines":10}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc-link in `ShmOFlags` uses a single colon (`crate:shm::open`) instead of `crate::shm::open`, so the intra-doc link is broken and will not resolve.","fix":"Change `[`shm::open`]: crate:shm::open` to `[`shm::open`]: crate::shm::open`.","locations":[{"ref":"src/backend/libc/shm/types.rs:7","code":"    7 |     /// [`shm::open`]: crate:shm::open","lines":1}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid C <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);

}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
