row on NaN; handle empty input explicitly.","locations":[{"ref":"src/utils/Utils.ts:140-152","code":"  140 | export function timeToSeconds(time: string): number {\n  141 |   const params = time.split(':').map((param) => parseInt(param.replace(/\\D/g, '')));\n  142 |   switch (params.length) {\n  143 |     case 1:\n  144 |       return params[0];\n  145 |     case 2:\n  146 |       return params[0] * 60 + params[1];\n  147 |     case 3:\n  148 |       return params[0] * 3600 + params[1] * 60 + params[2];\n  149 |     default:\n  150 |       throw new Error('Invalid time string');\n  151 |   }\n  152 | }"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The debug fetch logger's message is built with broken string concatenation. A template literal is\nopened at `  headers:\\n${headers_serialized}\\n' + ` and only closed at the end of the next physical\nline. The `' + ` and the opening `'` of `  body:` end up as *literal text inside the template literal*\nrather than being JS string concatenation. The emitted log therefore contains the raw characters\n`' + ` and a stray `'` in the middle of the headers/body section, producing malformed output.","fix":"Replace the mixed quoting with a single template literal: `  headers:\\n${headers_serialized}\\n  body:\\n${body_contents}`.","locations":[{"ref":"src/utils/Utils.ts:235-241","code":"  235 |   Log.warn(TAG_,\n  236 |     'Fetch:\\n' +\n  237 |     `  url: ${url.toString()}\\n` +\n  238 |     `  method: ${init?.method || 'GET'}\\n` +\n  239 |     `  headers:\\n${headers_serialized}\\n' + \n  240 |     '  body:\\n${body_contents}`\n  241 |   );"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`u8ToBase64` uses `btoa(String.fromCharCode.apply(null, Array.from(u8)))`. Besides spreading a whole\narray through `apply` (which throws \"Maximum call stack size exceeded\" for large inputs, ~100k+ bytes),\n`String.fromCharCode` only handles values 0-255 correctly here which is fine, but the apply-based call\nis both a performance hazard and a hard crash for large Uint8Arrays (e.g. large protobuf payloads).","fix":"Build the binary string in a loop/chunks, or use a TextDecoder('latin1') / chunked fromCharCode to avoid the call-stack limit.","locations":[{"ref":"src/utils/Utils.ts:246-248","code":"  246 | export function u8ToBase64(u8: Uint8Array): string {\n  247 |   return btoa(String.fromCharCode.apply(null, Array.from(u8)));\n  248 | }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"Naming bug: the guards check snake_case keys that never exist on the raw InnerTube data. `Reflect.has(data, 'tv_banner')` and `Reflect.has(data, 'mobile_banner')` will always be false because the raw keys are camelCase `tvBanner`/`mobileBanner` (the assignment bodies even read `data.tvBanner`/`data.mobileBanner`, and CompactChannel.ts uses `data.tvBanner` directly). Consequently `tv_banner` and `mobile_banner` are never populated.","fix":"Change the guards to `Reflect.has(data, 'tvBanner')` and `Reflect.has(data, 'mobileBanner')`.","locations":[{"ref":"src/parser/classes/C4TabbedHeader.ts:39-45","code":"   39 |     if (Reflect.has(data, 'tv_banner')) {\n   40 |       this.tv_banner = Thumbnail.fromResponse(data.tvBanner);\n   41 |     }\n   42 | \n   43 |     if (Reflect.has(data, 'mobile_banner')) {\n   44 |       this.mobile_banner = Thumbnail.fromResponse(data.mobileBanner);\n   45 |     }"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"Copy-paste bug: the field is gated on the wrong key. `if ('shortBylineText' in data)` guards the assignment of `this.view_count = new Text(data.viewCountText)`. The condition checks `shortBylineText` but the value comes from `viewCountText`. As a result `view_count` is only populated when `shortBylineText` happens to be present (and may be left undefined when `viewCountText` exists without `shortBylineText`, or set to `new Text(undefined)` otherwise). Should check `'viewCountText' in data`.","fix":"Change the guard to `if ('viewCountText' in data)` and assign `this.view_count = new Text(data.viewCountText);`.","locations":[{"ref":"src/parser/classes/CompactVideo.ts:49-50","code":"   49 |     if ('shortBylineText' in data)\n   50 |       this.view_count = new Text(data.viewCountText);"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"Copy-paste/casing bug: `comment.author.A11y` reads a property named `A11y` (capital A, no prefix). Every other accessibility field in this file is `likeCountA11y`, `replyCountA11y`, etc., and the sibling field here is `sponsorBadgeUrl`. The member badge accessibility label field is almost certainly `sponsorBadgeA11y`, so `a11y` is always undefined.","fix":"Use the correct field name, e.g. `a11y: comment.author.sponsorBadgeA11y` (verify exact key against a real payload).","locations":[{"ref":"src/parser/classes/comments/CommentView.ts:106-110","code":"  106 |       if (Reflect.has(comment.author, 'sponsorBadgeUrl')) {\n  107 |         this.member_badge = {\n  108 |           url: comment.author.sponsorBadgeUrl,\n  109 |           a11y: comment.author.A11y\n  110 |         };"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"`hoistNumberAttributeIfPossible` takes a `property` parameter ('audio_sample_rate' | 'fps') and is\nsupposed to hoist that attribute when it is identical across all formats. However the uniqueness\ncheck is hard-coded to `format.fps` instead of `format[property]`. When called for 'audio_sample_rate'\n(StreamingInfo.ts:508) it actually tests whether all formats share the same fps (which for audio is\nusually undefined for every format, so the Set size is 1), then incorrectly hoists\n`Number(formats[0].audio_sample_rate)` to the AdaptationSet even when the per-representation sample\nrates differ. This produces wrong audioSamplingRate values in the generated DASH manifest. Conversely\ntwo audio formats with the same sample rate but different (undefined) fps will not be hoisted.","fix":"Use `new Set(formats.map((format) => format[property]))` instead of `format.fps`.","locations":[{"ref":"src/utils/StreamingInfo.ts:213-222","code":"  213 | function hoistNumberAttributeIfPossible(\n  214 |   formats: Format[],\n  215 |   property: 'audio_sample_rate' | 'fps',\n  216 |   hoisted: string[]\n  217 | ) {\n  218 |   if (formats.length > 1 && new Set(formats.map((format) => format.fps)).size === 1) {\n  219 |     hoisted.push(property);\n  220 |     return Number(formats[0][property]);\n  221 |   }\n  222 | }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"signIn wraps logic in `new Promise(async (resolve, reject) => {...})`. Using an async executor is an anti-pattern: any throw inside the async executor (other than the explicitly caught oauth.init) becomes an unhandled rejection rather than rejecting the returned promise. Here the catch covers oauth.init, but the pattern is fragile and the eslint no-async-promise-executor rule flags it.","fix":"Use a non-async executor and call oauth.init().catch(reject) inside it, or refactor to register the once-listeners then `await this.oauth.init(credentials)` without the Promise wrapper.","locations":[{"ref":"src/core/Session.ts:661-678","code":"  661 |   async signIn(credentials?: OAuth2Tokens): Promise<void> {\n  662 |     return new Promise(async (resolve, reject) => {\n  663 |       const error_handler: OAuth2AuthErrorEventHandler = (err) => reject(err);\n  664 | \n  665 |       this.once('auth-error', error_handler);\n  666 | \n  667 |       this.once('auth', () => {\n  668 |         this.off('auth-error', error_handler);\n  669 |         this.logged_in = true;\n  670 |         resolve();\n  671 |       });\n  672 | \n  673 |       try {\n  674 |         await this.oauth.init(credentials);\n  675 |       } catch (err) {\n  676 |         reject(err);\n  677 |       }\n  678 |     });"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"parseCommand swallows the 'class not found' case silently. When the key matches the command/endpoint/action regex but no parser exists (has_target_class is false), the function neither generates a runtime class nor invokes ERROR_HANDLER (unlike parseItem, which JIT-generates and reports). It simply continues the loop and ultimately returns undefined, so unknown commands disappear with no diagnostic, making parser-coverage regressions invisible.","fix":"When !has_target_class for a matched command key, either call generateRuntimeClass(...) as parseItem does, or at minimum emit an ERROR_HANDLER 'class_not_found' so missing commands are reported.","locations":[{"ref":"src/parser/parser.ts:679-691","code":"  679 |       try {\n  680 |         const has_target_class = hasParser(classname);\n  681 |         if (has_target_class)\n  682 |           return new (getParserByName(classname))(value);\n  683 |       } catch (error) {\n  684 |         ERROR_HANDLER({\n  685 |           error,\n  686 |           classname,\n  687 |           classdata: value,\n  688 |           error_type: 'parse'\n  689 |         });\n  690 |       }\n  691 |     }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In #pollLivechat, when the response has no continuation_contents the code emits 'error', 'end' and calls stop() but does NOT return. Execution falls through to the `if (!(contents instanceof LiveChatContinuation))` block, which calls stop() and emits 'end' a second time. This results in duplicate 'end' (and the listener seeing the stream end twice) and relies on `undefined instanceof LiveChatContinuation` being false to avoid a crash.","fix":"Add a `return;` after the stop() call in the `if (!contents)` branch so the function does not continue into the instanceof check.","locations":[{"ref":"src/parser/youtube/LiveChat.ts:149-159","code":"  149 |         if (!contents) {\n  150 |           this.emit('error', new InnertubeError('Unexpected live chat incremental continuation response', response));\n  151 |           this.emit('end');\n  152 |           this.stop();\n  153 |         }\n  154 | \n  155 |         if (!(contents instanceof LiveChatContinuation)) {\n  156 |           this.stop();\n  157 |           this.emit('end');\n  158 |           return;\n  159 |         }"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`#processJsonPayload` calls `JSON.parse(json_body)` with no try/catch. It is only reached when the\ncaller-supplied `Content-Type` header equals `application/json` and the body is a string, but the body\nitself is not validated to be valid JSON. A malformed body (or a non-JSON body mislabelled as JSON)\nthrows a raw SyntaxError out of `fetch`, bypassing the library's InnertubeError contract.","fix":"Wrap the JSON.parse in try/catch and throw a descriptive InnertubeError on failure.","locations":[{"ref":"src/utils/HTTPClient.ts:156-157","code":"  156 |   #processJsonPayload(json_body: string, session: Session): ProcessedJsonPayload {\n  157 |     const parsed_payload = JSON.parse(json_body);"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In Actions.execute, when args.parse is falsy the method returns `{ success: response.ok, status_code: response.status, data: await response.json() }`. response.json() is called unconditionally even for non-OK responses and for endpoints that may return empty/non-JSON bodies, throwing a raw SyntaxError that masks the real HTTP status. Several managers then read response.data.* assuming success regardless of response.ok.","fix":"Guard JSON parsing (check content-type / response.ok, or wrap in try/catch) and surface the HTTP status when the body is not valid JSON.","locations":[{"ref":"src/core/Actions.ts:178-183","code":"  178 |     // Mimics the Axios API using Fetch's Response object.\n  179 |     return {\n  180 |       success: response.ok,\n  181 |       status_code: response.status,\n  182 |       data: await response.json()\n  183 |     };"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"refreshAccessToken checks `response_data.error_code` to detect server errors, but getDeviceAndUserCode/pollForAccessToken use `response_data.error` (the OAuth2 standard field). The Google token endpoint returns the error under `error`, so a failed refresh that returns HTTP 200 with an `error` body (e.g. invalid_grant when the refresh token was revoked) is NOT detected; the code then sets access_token = undefined and silently emits update-credentials with broken tokens.","fix":"Check `response_data.error` (and/or error_code) and throw OAuth2Error when present before assigning the new tokens.","locations":[{"ref":"src/core/OAuth2.ts:225-233","code":"  225 |     const response_data = await response.json();\n  226 | \n  227 |     if (response_data.error_code)\n  228 |       throw new OAuth2Error('Authorization server returned an error', response_data);\n  229 | \n  230 |     this.oauth2_tokens.access_token = response_data.access_token;\n  231 |     this.oauth2_tokens.expiry_date = new Date(Date.now() + response_data.expires_in * 1000).toISOString();\n  232 | \n  233 |     this.#session.emit('update-credentials', { credentials: this.oauth2_tokens });"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"getParserByName throws a generic Error with a custom `code = 'MODULE_NOT_FOUND'` for unknown classes. generator.parse() (renderer/array-renderer branches) and createRuntimeClass map renderer names to constructors via getParserByName without catching; if a renderer dependency failed to be generated (e.g. its introspection threw), this throw escapes the JIT-generated constructor and is only caught by parseItem's broad try/catch, turning a recoverable missing-dependency into a dropped node with a generic 'parse' error rather than the more informative class_not_found path.","fix":"In generator.parse, fall back to generateRuntimeClass for renderer names lacking a parser (or report class_not_found) instead of letting getParserByName throw mid-construction.","locations":[{"ref":"src/parser/parser.ts:203-213","code":"  203 | export function getParserByName(classname: string) {\n  204 |   const ParserConstructor = RUNTIME_NODES.get(classname);\n  205 | \n  206 |   if (!ParserConstructor) {\n  207 |     const error = new Error(`Module not found: ${classname}`);\n  208 |     (error as any).code = 'MODULE_NOT_FOUND';\n  209 |     throw error;\n  210 |   }\n  211 | \n  212 |   return ParserConstructor;\n  213 | }"},{"ref":"src/parser/generator.ts:685","code":"  685 |       return should_optional ? Parser.parseItem(accessDataFromKeyPath({ data }, [ ...key_path, key ]), inference_type.renderers.map((type) => Parser.getParserByName(type))) : undefined;"},{"ref":"src/parser/generator.ts:690","code":"  690 |           return should_optional ? Parser.parse(accessDataFromKeyPath({ data }, [ ...key_path, key ]), true, inference_type.renderers.map((type) => Parser.getParserByName(type))) : undefined;"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"#pollMetadata swallows all errors in a bare `catch {}` and silently retries forever (no retry counter, unlike #pollLivechat which caps at 10). A persistently failing /updated_metadata endpoint causes an infinite 2-second-interval request loop with no 'error' event surfaced to the consumer.","fix":"Emit an 'error' event and apply a bounded retry count similar to #pollLivechat, or at least surface the error so consumers can react.","locations":[{"ref":"src/parser/youtube/LiveChat.ts:243-247","code":"  243 |       } catch {\n  244 |         await this.#wait(2000);\n  245 |         if (this.running)\n  246 |           this.#pollMetadata();\n  247 |       }"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `download`, the chunked path declares `let cancel: AbortController;` but only assigns it inside the\n`pull` callback. The stream's `cancel(reason)` handler calls `cancel.abort(reason)` unconditionally. If\nthe consumer cancels the stream before the first `pull` ever runs, `cancel` is still `undefined` and\n`cancel.abort` throws a TypeError from within the cancel handler.","fix":"Guard the abort: `cancel?.abort(reason)`, or initialize the AbortController in `start()`.","locations":[{"ref":"src/utils/FormatUtils.ts:64-124","code":"   64 |   let cancel: AbortController;\n   65 | \n   66 |   return new Platform.shim.ReadableStream<Uint8Array>({\n   67 |     start() {\n   68 |     },\n   69 |     pull: async (controller) => {\n   70 |       if (must_end) {\n   71 |         controller.close();\n   72 |         return;\n   73 |       }\n   74 | \n   75 |       if ((chunk_end >= (format.content_length ? format.content_length : 0)) || options.range) {\n   76 |         must_end = true;\n   77 |       }\n   78 | \n   79 |       return new Promise(async (resolve, reject) => {\n   80 |         try {\n   81 |           cancel = new AbortController();\n   82 | \n   83 |           const response = await actions.session.http.fetch_function(`${format_url}&cpn=${cpn}&range=${chunk_start}-${chunk_end || ''}`, {\n   84 |             method: 'GET',\n   85 |             headers: {\n   86 |               ...Constants.STREAM_HEADERS\n   87 |               // XXX: use YouTube's range parameter instead of a Range header.\n   88 |               // Range: `bytes=${chunk_start}-${chunk_end}`\n   89 |             },\n   90 |             signal: cancel.signal\n   91 |           });\n   92 | \n   93 |           // Throw if the response is not 2xx\n   94 |           if (!response.ok)\n   95 |             throw new InnertubeError('The server responded with a non 2xx status code', {\n   96 |               error_type: 'FETCH_FAILED',\n   97 |               response\n   98 |             });\n   99 | \n  100 |           const body = response.body;\n  101 | \n  102 |           if (!body)\n  103 |             throw new InnertubeError('Could not get ReadableStream from fetch Response.', {\n  104 |               error_type: 'FETCH_FAILED',\n  105 |               response\n  106 |             });\n  107 | \n  108 |           for await (const chunk of streamToIterable(body)) {\n  109 |             controller.enqueue(chunk);\n  110 |           }\n  111 | \n  112 |           chunk_start = chunk_end + 1;\n  113 |           chunk_end += chunk_size;\n  114 | \n  115 |           resolve();\n  116 | \n  117 |         } catch (e: any) {\n  118 |           reject(e);\n  119 |         }\n  120 |       });\n  121 |     },\n  122 |     async cancel(reason) {\n  123 |       cancel.abort(reason);\n  124 |     }"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`getStringBetweenStrings` builds a RegExp with the `s` (dotAll) flag from escaped delimiters. While the\ndelimiters are escaped, the helper is used widely on external response bodies (OTF segment headers,\nstoryboard responses). When no match is found it returns `undefined`, and several callers\n(StreamingInfo getColorInfo, getFormatGroupings) chain `?.split(...)` / `.startsWith(...)` — those use\noptional chaining, but `getStringBetweenStrings(format.mime_type, 'codecs=\"', '\"')` may return\nundefined and is then assigned directly to a typed `codecs?: string` field that the DASH layer\nstringifies, silently emitting `codecs=\"undefined\"` is avoided only because undefined props are skipped.\nThe OTF parse path (parseInt on `trimmed_segment_duration`) can yield NaN durations with no validation.","fix":"Validate parseInt results (skip/throw on NaN) when building the OTF segment timeline.","locations":[{"ref":"src/utils/StreamingInfo.ts:258-276","code":"  258 |   const segment_durations = [];\n  259 |   for (const segment_duration_string of segment_duration_strings) {\n  260 |     const trimmed_segment_duration = segment_duration_string.trim();\n  261 |     if (trimmed_segment_duration.length === 0) {\n  262 |       continue;\n  263 |     }\n  264 | \n  265 |     let repeat_count;\n  266 | \n  267 |     const repeat_count_string = getStringBetweenStrings(trimmed_segment_duration, '(r=', ')');\n  268 |     if (repeat_count_string) {\n  269 |       repeat_count = parseInt(repeat_count_string);\n  270 |     }\n  271 | \n  272 |     segment_durations.push({\n  273 |       duration: parseInt(trimmed_segment_duration),\n  274 |       repeat_count\n  275 |     });\n  276 |   }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"setTokens aliases the caller's object (`const tokensMod = tokens;` is not a copy) and then mutates it: it overwrites `expiry_date` and `delete`s `expires_in` from the user-supplied tokens object. Callers that reuse the same OAuth2Tokens object (e.g. passing it to multiple sessions or re-passing after refresh) get silently mutated state, and the `expires_in` they provided disappears.","fix":"Clone the input first: `const tokensMod = { ...tokens };` so the caller's object is never mutated.","locations":[{"ref":"src/core/OAuth2.ts:85-103","code":"   85 |   setTokens(tokens: OAuth2Tokens): void {\n   86 |     const tokensMod = tokens;\n   87 | \n   88 |     // Convert access token remaining lifetime to ISO string\n   89 |     if (tokensMod.expires_in) {\n   90 |       tokensMod.expiry_date = new Date(Date.now() + tokensMod.expires_in * 1000).toISOString();\n   91 |       delete tokensMod.expires_in; // We don't need this anymore\n   92 |     }\n   93 | \n   94 |     if (!this.validateTokens(tokensMod))\n   95 |       throw new OAuth2Error('Invalid tokens provided.');\n   96 | \n   97 |     this.oauth2_tokens = tokensMod;\n   98 | \n   99 |     if (tokensMod.client) {\n  100 |       Log.info(TAG, 'Using provided client id and secret.');\n  101 |       this.client_id = tokensMod.client;\n  102 |     }\n  103 |   }"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"parseActions and LiveChatContinuation mutate the caller's raw response objects via `delete action.clickTrackingParams`. parseResponse passes the original IRawResponse subobjects, so this deletes keys from the user's input data in place. If the same raw response is parsed twice or inspected by the caller afterwards, fields are silently gone; it also makes parsing non-idempotent.","fix":"Copy the relevant fields instead of deleting from the source, e.g. map to `{ ...action, clickTrackingParams: undefined }` or destructure out clickTrackingParams without mutating the original.","locations":[{"ref":"src/parser/parser.ts:758-766","code":"  758 | export function parseActions(data: RawData) {\n  759 |   if (Array.isArray(data)) {\n  760 |     return parse(data.map((action) => {\n  761 |       delete action.clickTrackingParams;\n  762 |       return action;\n  763 |     }));\n  764 |   }\n  765 |   return new SuperParsedResult(parseItem(data));\n  766 | }"},{"ref":"src/parser/continuations.ts:176-179","code":"  176 |     this.actions = Parser.parse(data.actions?.map((action: any) => {\n  177 |       delete action.clickTrackingParams;\n  178 |       return action;\n  179 |     }), true) || observe<YTNode>([]);"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"The Cloudflare Worker cache uses a bare string `key` with the Cache API. `cache.match(key)`,\n`cache.put(key, ...)` and `cache.delete(key)` require a full URL string or Request; a bare key like\n`youtube_session_data` is not a valid request URL and Workers will throw \"Cache API got a request\nwith a non-http(s) URL\". Additionally `set` does not `await cache.put(...)`, so write failures are\nsilently swallowed and the write may not have completed when `set` resolves.","fix":"Wrap the key in a synthetic URL (e.g. `new Request('https://ytjs.cache/' + encodeURIComponent(key))`) for match/put/delete, and `await cache.put(...)` in set.","locations":[{"ref":"src/platform/cf-worker.ts:19-38","code":"   19 |   async get(key: string) {\n   20 |     const cache = await caches.open('yt-api');\n   21 | \n   22 |     const response = await cache.match(key);\n   23 |     if (!response) return undefined;\n   24 | \n   25 |     return response.arrayBuffer();\n   26 |   }\n   27 | \n   28 |   async set(key: string, value: ArrayBuffer) {\n   29 | \n   30 |     const cache = await caches.open('yt-api');\n   31 |     cache.put(key, new Response(value));\n   32 |   }\n   33 | \n   34 |   async remove(key: string) {\n   35 |     const cache = await caches.open('yt-api');\n   36 | \n   37 |     await cache.delete(key);\n   38 |   }"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"music_tracks uses `info_row.info_row_expand_status_key?.indexOf(...) !== -1`. When info_row_expand_status_key is undefined the optional chain yields undefined, and `undefined !== -1` is true, so the artist/license branch is entered erroneously. However this branch is only reached inside the `else` where info_row_expand_status_key was already confirmed defined (line 444 checks `=== undefined`), so it happens to be safe — but the pattern is fragile and `indexOf(...) !== -1` should be `.includes(...)`.","fix":"Use `info_row.info_row_expand_status_key.includes('...')` for clarity; the surrounding else already guarantees it is defined.","locations":[{"ref":"src/parser/youtube/VideoInfo.ts:455-462","code":"  455 |               if (info_row.info_row_expand_status_key?.indexOf('structured-description-music-section-artists-row-state-id') !== -1) {\n  456 |                 artist = info_row.default_metadata?.toString() || info_row.expanded_metadata?.toString();\n  457 |                 if (channelId === undefined) {\n  458 |                   const endpoint = info_row.default_metadata?.endpoint || info_row.expanded_metadata?.endpoint;\n  459 |                   channelId = endpoint?.payload?.browseId;\n  460 |                 }\n  461 |               }\n  462 |               if (info_row.info_row_expand_status_key?.indexOf('structured-description-music-section-licenses-row-state-id') !== -1) {"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"`new Text(data.longBylineText)` is constructed up to three separate times (lines 56, 57, 65), and `new Text(data.lengthText)` twice (lines 52-53), re-parsing the same raw node repeatedly. Text construction maps/joins runs and builds NavigationEndpoints, so this is wasted work per item.","fix":"Build each Text once into a local const and reuse it.","locations":[{"ref":"src/parser/classes/PlaylistPanelVideo.ts:51-65","code":"   51 |     this.duration = {\n   52 |       text: new Text(data.lengthText).toString(),\n   53 |       seconds: timeToSeconds(new Text(data.lengthText).toString())\n   54 |     };\n   55 | \n   56 |     const album = new Text(data.longBylineText).runs?.find((run: any) => run.endpoint?.payload?.browseId?.startsWith('MPR'));\n   57 |     const artists = new Text(data.longBylineText).runs?.filter((run: any) => run.endpoint?.payload?.browseId?.startsWith('UC'));\n   58 | \n   59 |     this.author = new Text(data.shortBylineText).toString();\n   60 | \n   61 |     if (album) {\n   62 |       this.album = {\n   63 |         id: (album as TextRun).endpoint?.payload?.browseId,\n   64 |         name: (album as TextRun).text,\n   65 |         year: new Text(data.longBylineText).runs?.slice(-1)[0].text,"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"mergeKeyInfo detects changes via repeated full JSON.stringify comparisons of inference subtrees (object/array-object/array-primitive/misc/primitive branches). For deeply nested object key_info this serializes the entire subtree on every merge at every recursion level, giving roughly O(n^2) serialization cost during JIT class evolution. This only runs on the unknown-class path but can be noticeable for large responses with many novel renderers.","fix":"Track `did_change` structurally from the recursive merge results (e.g. propagate a changed flag / compare changed_keys length) instead of stringifying whole subtrees.","locations":[{"ref":"src/parser/generator.ts:769","code":"  769 |           const did_change = JSON.stringify(resolved_key) !== JSON.stringify(type);"},{"ref":"src/parser/generator.ts:867","code":"  867 |               const did_change = JSON.stringify(resolved_key) !== JSON.stringify(type);"},{"ref":"src/parser/generator.ts:907","code":"  907 |               const did_change = JSON.stringify(resolved_key) !== JSON.stringify(type);"},{"ref":"src/parser/generator.ts:955","code":"  955 |           const did_change = JSON.stringify(resolved_key) !== JSON.stringify(type);"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"Settings.setting_options and getSettingOption each iterate every section/element and call `el.as(SettingsOptions).options` repeatedly; setting_options builds the list via repeated `options.concat(...)` (O(n^2) array copies). getSettingOption is also invoked by the error path of itself only, but setting_options is recomputed on every access (getter) and again inside getSettingOption's failure path, doubling the traversal on errors.","fix":"Use a single push-based accumulation (`options.push(...el.as(SettingsOptions).options)`) and consider memoizing the parsed options list.","locations":[{"ref":"src/parser/youtube/Settings.ts:104-119","code":"  104 |   get setting_options(): string[] {\n  105 |     if (!this.sections)\n  106 |       throw new InnertubeError('Sections not available');\n  107 | \n  108 |     let options: any[] = [];\n  109 | \n  110 |     for (const section of this.sections) {\n  111 |       if (!section.contents) continue;\n  112 |       for (const el of section.contents) {\n  113 |         if (el.as(SettingsOptions).options)\n  114 |           options = options.concat(el.as(SettingsOptions).options);\n  115 |       }\n  116 |     }\n  117 | \n  118 |     return options.map((opt) => opt.title?.toString()).filter((el) => el);\n  119 |   }"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"`deepCompare` uses `keys.some(...)` and returns `true` as soon as ANY key matches, despite the name and\ndoc implying a full deep comparison. For object-valued keys it does a `JSON.stringify` equality which is\norder-sensitive and O(n) per key. The use of `some` (vs `every`) means it returns true when objects\nare mostly different but share one equal field — almost certainly an inverted/loose semantics bug for a\nfunction named \"deepCompare\".","fix":"Use `every` for true equality semantics (or rename/clarify), and avoid JSON.stringify-based comparison for unordered objects.","locations":[{"ref":"src/utils/Utils.ts:67-76","code":"   67 | export function deepCompare(obj1: any, obj2: any): boolean {\n   68 |   const keys = Reflect.ownKeys(obj1);\n   69 |   return keys.some((key) => {\n   70 |     const is_text = obj2[key] instanceof Text;\n   71 |     if (!is_text && typeof obj2[key] === 'object') {\n   72 |       return JSON.stringify(obj1[key]) === JSON.stringify(obj2[key]);\n   73 |     }\n   74 |     return obj1[key] === (is_text ? obj2[key].toString() : obj2[key]);\n   75 |   });\n   76 | }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"Player.LIBRARY_VERSION static getter returns the literal 14 and is never referenced anywhere in the source. Player cache versioning actually uses packageInfo.version (a string) in cache()/fromCache(). The stale numeric constant is dead and misleading—it suggests a versioning scheme that is no longer used.","fix":"Remove the LIBRARY_VERSION getter, or wire it back into Player cache (de)serialization if numeric versioning is intended.","locations":[{"ref":"src/core/Player.ts:289-291","code":"  289 |   static get LIBRARY_VERSION(): number {\n  290 |     return 14;\n  291 |   }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"getAll's ObservedArray type declares `del_items?: boolean` (optional) but the proxy implementation signature is `(rule: object, del_items: boolean)`. More importantly, callers using `getAll(rule)` pass del_items as undefined which is falsy (fine), but the inconsistency with `get` (which declares del_item optional and is) is a latent API mismatch. Also the `arrayProps` array in Maybe.arrayOfMaybe is always empty, so `Reflect.has(arrayProps, prop)` is effectively dead — every property (including array methods like length/map) is wrapped in a Maybe, which is likely not intended.","fix":"For arrayOfMaybe, only wrap numeric index access in Maybe and pass through real array properties/methods (length, iterator, etc.). Align getAll's implementation signature with its optional declaration.","locations":[{"ref":"src/parser/helpers.ts:178-188","code":"  178 |   arrayOfMaybe(): Maybe[] {\n  179 |     const arrayProps: any[] = [];\n  180 |     return new Proxy(this.array(), {\n  181 |       get(target, prop) {\n  182 |         if (Reflect.has(arrayProps, prop)) {\n  183 |           return Reflect.get(target, prop);\n  184 |         }\n  185 |         return new Maybe(Reflect.get(target, prop));\n  186 |       }\n  187 |     });\n <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-06-03 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
