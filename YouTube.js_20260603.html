<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"applyCommentsMutations does not guard the parsing loop when mutations are missing. When comment_view_items.length > 0 and mutations is falsy, it logs a 'mutation_data_missing' error but then falls through into the `for (const comment_view ...)` loop which calls `mutations.find(...)`. Since mutations is undefined here, this throws 'Cannot read properties of undefined (reading find)', crashing the entire parseResponse call. Note applyMutations (the sibling function above) correctly uses an if/else to avoid exactly this, so this is an inconsistency/copy-paste oversight.","fix":"After logging the mutation_data_missing error, `return;` (or wrap the loop in an `else` like applyMutations does) so the function does not proceed to call `mutations.find` when mutations is undefined.","locations":[{"ref":"src/parser/parser.ts:826-855","code":"  826 | export function applyCommentsMutations(memo: Memo, mutations: RawNode[]) {\n  827 |   const comment_view_items = memo.getType(CommentView);\n  828 | \n  829 |   if (comment_view_items.length > 0) {\n  830 |     if (!mutations) {\n  831 |       ERROR_HANDLER({\n  832 |         error_type: 'mutation_data_missing',\n  833 |         classname: 'CommentView'\n  834 |       });\n  835 |     }\n  836 | \n  837 |     for (const comment_view of comment_view_items) {\n  838 |       const comment_mutation = mutations\n  839 |         .find((mutation) => mutation.payload?.commentEntityPayload?.key === comment_view.keys.comment)\n  840 |         ?.payload?.commentEntityPayload;\n  841 | \n  842 |       const toolbar_state_mutation = mutations\n  843 |         .find((mutation) => mutation.payload?.engagementToolbarStateEntityPayload?.key === comment_view.keys.toolbar_state)\n  844 |         ?.payload?.engagementToolbarStateEntityPayload;\n  845 | \n  846 |       const engagement_toolbar = mutations.find((mutation) => mutation.entityKey === comment_view.keys.toolbar_surface)\n  847 |         ?.payload?.engagementToolbarSurfaceEntityPayload;\n  848 | \n  849 |       const comment_surface_mutation = mutations\n  850 |         .find((mutation) => mutation.payload?.commentSurfaceEntityPayload?.key === comment_view.keys.comment_surface)\n  851 |         ?.payload?.commentSurfaceEntityPayload;\n  852 | \n  853 |       comment_view.applyMutations(comment_mutation, toolbar_state_mutation, engagement_toolbar, comment_surface_mutation);\n  854 |     }\n  855 |   }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"`tab` obtained from `getType(Tab)[0]` is used as `tab.content` without checking that `tab` exists. If no Tab node is present in contents_memo, `[0]` is undefined and `tab.content` throws. The subsequent InnertubeError('Content tab has no content', tab) is never reached for the missing-tab case.","fix":"Guard tab first: `if (!tab) throw new InnertubeError('Content tab not found', this.page);` before accessing `tab.content`.","locations":[{"ref":"src/parser/youtube/HashtagFeed.ts:22-24","code":"   22 |     const tab = this.page.contents_memo.getType(Tab)[0];\n   23 | \n   24 |     if (!tab.content)"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"When removing a video that is a LockupView, deeply chained property accesses are performed with no null guards: `content.metadata?.menu_button?.on_tap?.payload.panelLoadingStrategy.inlineContent.sheetViewModel.content.listViewModel.listItems` (each `.payload.panelLoadingStrategy...` after the last `?.` is unchecked), then `listItems.find(...)` whose result `listItem` is dereferenced as `listItem.listItemViewModel.rendererContext...` without verifying the find succeeded. Any structural change from YouTube, or a LockupView lacking these fields, throws a raw TypeError instead of a meaningful error.","fix":"Use optional chaining throughout and check that `listItems` and the found `listItem` are defined before dereferencing; throw an InnertubeError if the remove token cannot be extracted.","locations":[{"ref":"src/parser/youtube/History.ts:48-53","code":"   48 |           } else if (content.is(LockupView)) {\n   49 |             if (content.content_id === video_id) {\n   50 |               const listItems = content.metadata?.menu_button?.on_tap?.payload.panelLoadingStrategy.inlineContent.sheetViewModel.content.listViewModel.listItems;\n   51 |               const listItem = listItems.find((video: { listItemViewModel: { title: { content: string; }; }; }) => video.listItemViewModel?.title.content === 'Remove from watch history');\n   52 |               feedbackToken = listItem.listItemViewModel.rendererContext.commandContext.onTap.innertubeCommand.feedbackEndpoint.feedbackToken;\n   53 |               break;"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"`this.page.contents_memo?.getType(SectionList)[0].contents` accesses `.contents` on `[0]` without a guard. getType always returns an array (never undefined), so the optional chain `?.` only guards contents_memo; if the SectionList array is empty, `[0]` is undefined and `.contents` throws 'Cannot read properties of undefined'. The fallback chain with `||` is never reached because the throw happens first.","fix":"Use optional access on the index: `this.page.contents_memo?.getType(SectionList)[0]?.contents || ...` (the second branch already does this).","locations":[{"ref":"src/parser/youtube/Search.ts:29-32","code":"   29 |     const contents =\n   30 |       this.page.contents_memo?.getType(SectionList)[0].contents ||\n   31 |       this.page.on_response_received_commands_memo?.getType(SectionList)[0]?.contents ||\n   32 |       this.page.on_response_received_commands?.[0].as(AppendContinuationItemsAction, ReloadContinuationItemsCommand).contents;"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"`this.#page.contents_memo.getType(MusicShelf)?.[0].contents` dereferences `.contents` on the array element. getType returns an array (never undefined), so `?.` does not guard the index; if there is no MusicShelf, `[0]` is undefined and `.contents` throws before the `|| observe([])` fallback can apply.","fix":"Add optional chaining on the index: `getType(MusicShelf)?.[0]?.contents || observe([])`.","locations":[{"ref":"src/parser/ytmusic/Album.ts:31","code":"   31 |     this.contents = this.#page.contents_memo.getType(MusicShelf)?.[0].contents || observe([]);"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"getSearchSuggestions parses the suggestion response with JSON.parse on a string built by stripping a JSONP wrapper, then immediately does `data[1].map(...)`. There is no try/catch and no validation that `data` is an array of the expected shape. A malformed/unexpected response (empty body, layout change, error page) throws a raw SyntaxError or TypeError out of the public API method.","fix":"Wrap parse + extraction in try/catch (or validate Array.isArray(data) && Array.isArray(data[1])) and throw an InnertubeError with context, or return an empty array.","locations":[{"ref":"src/Innertube.ts:300-303","code":"  300 |     const text = await response.text();\n  301 | \n  302 |     const data = JSON.parse(text.replace('window.google.ac.h(', '').slice(0, -1));\n  303 |     return data[1].map((suggestion: (string | number)[]) => suggestion[0]);"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"#getSessionData parses YouTube's /sw.js_data JSPB blob and indexes deeply into untrusted arrays without validation: `data[0][2]`, destructuring `[ [ device_info ], api_key ]`, `device_info[61]`, then `config_info[config_info.length - 1]`. If YouTube changes the layout or returns an unexpected payload, `config_info.length` (when device_info[61] is undefined) or the destructuring throws a raw TypeError, defeating the fail_fast/local-fallback design (the throw is caught by the caller only when !fail_fast, but produces an opaque error).","fix":"Validate the structure after JSON.parse (check array shapes and that device_info[61] exists) and throw a SessionError with context, so the local-fallback path is reliably taken.","locations":[{"ref":"src/core/Session.ts:563-596","code":"  563 |     const data = JSON.parse(text.replace(/^\\)\\]\\}'/, ''));\n  564 | \n  565 |     const ytcfg = data[0][2];\n  566 | \n  567 |     const api_version = Constants.CLIENTS.WEB.API_VERSION;\n  568 | \n  569 |     const [ [ device_info ], api_key ] = ytcfg;\n  570 | \n  571 |     const config_info = device_info[61];\n  572 |     const app_install_data = config_info[config_info.length - 1];\n  573 | \n  574 |     const context_info = {\n  575 |       hl: options.lang || device_info[0],\n  576 |       gl: options.location || device_info[1],\n  577 |       remote_host: device_info[3],\n  578 |       visitor_data: options.visitor_data || device_info[13],\n  579 |       user_agent: options.user_agent,\n  580 |       client_name: options.client_name,\n  581 |       client_version: options.client_name === 'WEB' ? device_info[16] : Object.values(Constants.CLIENTS).find(\n  582 |         (c) => c.NAME === options.client_name\n  583 |       )?.VERSION || device_info[16],\n  584 |       os_name: device_info[17],\n  585 |       os_version: device_info[18],\n  586 |       time_zone: device_info[79] || options.time_zone,\n  587 |       device_category: options.device_category,\n  588 |       browser_name: device_info[86],\n  589 |       browser_version: device_info[87],\n  590 |       device_make: device_info[11],\n  591 |       device_model: device_info[12],\n  592 |       app_install_data: app_install_data,\n  593 |       device_experiment_id: device_info[103],\n  594 |       rollout_token: device_info[107],\n  595 |       enable_safety_mode: options.enable_safety_mode\n  596 |     };"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"blockChannel dereferences `response.data.command.confirmDialogEndpoint` and then `popup.content` with no checks. If the response has no `command` or no `confirmDialogEndpoint` (e.g. API change or error response), this throws a raw TypeError rather than a descriptive InnertubeError.","fix":"Validate `response.data.command?.confirmDialogEndpoint?.content` and throw an InnertubeError with the response attached if missing.","locations":[{"ref":"src/core/clients/Kids.ts:94-95","code":"   94 |     const popup = response.data.command.confirmDialogEndpoint;\n   95 |     const popup_fragment = { contents: popup.content, engagementPanels: [] };"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"translate() blindly dereferences a deep chain on the raw response: `response.data.frameworkUpdates.entityBatchUpdate.mutations[0].payload.commentEntityPayload` and then `mutation.translatedContent.content`. Any missing intermediate (no frameworkUpdates, empty mutations array, missing translatedContent) throws a raw TypeError instead of a meaningful error.","fix":"Guard each level (optional chaining + explicit checks) and throw an InnertubeError('Unexpected translate response', response) when the expected fields are absent.","locations":[{"ref":"src/core/managers/InteractionManager.ts:157-165","code":"  157 |     const response = await perform_comment_action_endpoint.call(this.#actions);\n  158 |     const mutation = response.data.frameworkUpdates.entityBatchUpdate.mutations[0].payload.commentEntityPayload;\n  159 | \n  160 |     return {\n  161 |       success: response.success,\n  162 |       status_code: response.status_code,\n  163 |       translated_content: mutation.translatedContent.content,\n  164 |       data: response.data\n  165 |     };"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"page_contents accesses `this.#memo.getType(Tab)?.[0].content`. Memo.getType always returns an array (never null/undefined), so the optional chain is misleading and provides no protection: when no Tab exists the array is empty and `[0]` is undefined, so `.content` throws `Cannot read properties of undefined`. Pages without a Tab will crash instead of falling through to the reload/append continuation branches.","fix":"Use `this.#memo.getType(Tab)[0]?.content` so an empty result yields undefined and the `||` chain falls through to reload_continuation_items / append_continuation_items.","locations":[{"ref":"src/core/mixins/Feed.ts:145-150","code":"  145 |   get page_contents(): SectionList | MusicQueue | RichGrid | ReloadContinuationItemsCommand {\n  146 |     const tab_content = this.#memo.getType(Tab)?.[0].content;\n  147 |     const reload_continuation_items = this.#memo.getType(ReloadContinuationItemsCommand)[0];\n  148 |     const append_continuation_items = this.#memo.getType(AppendContinuationItemsAction)[0];\n  149 |     return tab_content || reload_continuation_items || append_continuation_items;\n  150 |   }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"Same unguarded `image.sources[0].clientResource.imageName` pattern as ThumbnailBadgeView, in multiple view-model parsers. An empty/missing `sources` array or missing `clientResource` throws during parse.","fix":"Use optional chaining on `.sources?.[0]?.clientResource?.imageName` (and `imageColor`).","locations":[{"ref":"src/parser/classes/ButtonCardView.ts:15","code":"   15 |     this.icon_name = data.image.sources[0].clientResource.imageName;"},{"ref":"src/parser/classes/ThumbnailHoverOverlayView.ts:15","code":"   15 |     this.icon_name = data.icon.sources[0].clientResource.imageName;"},{"ref":"src/parser/classes/livechat/items/BumperUserEduContentView.ts:15-16","code":"   15 |     this.image_name = data.image.sources[0].clientResource.imageName;\n   16 |     this.image_color = data.image.sources[0].client throw. These are guarded by `isTextRun(run) && run.endpoint` but not by the presence of `browseId`.","fix":"Guard browseId before calling startsWith, e.g. `run.endpoint.payload.browseId?.startsWith('UC')`.","locations":[{"ref":"src/parser/classes/MusicResponsiveListItem.ts:203","code":"  203 |           run.endpoint.payload.browseId.startsWith('MPR')"},{"ref":"src/parser/classes/MusicResponsiveListItem.ts:208","code":"  208 |           run.endpoint.payload.browseId.startsWith('MPR')"},{"ref":"src/parser/classes/MusicResponsiveListItem.ts:220","code":"  220 |       (run) => (isTextRun(run) && run.endpoint) && run.endpoint.payload.browseId.startsWith('UC')"},{"ref":"src/parser/classes/MusicResponsiveListItem.ts:240","code":"  240 |         run.endpoint.payload.browseId.startsWith('UC')"},{"ref":"src/parser/classes/MusicResponsiveListItem.ts:294","code":"  294 |         run.endpoint.payload.browseId.startsWith('UC')"},{"ref":"src/parser/classes/MusicResponsiveListItem.ts:321","code":"  321 |         (isTextRun(run) && run.endpoint) &&"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","description":"Inconsistent optional-chaining on `browseId.startsWith`. Lines 89 and 112 use `run.endpoint?.payload?.browseId.startsWith('UC')` (no `?.` before `.startsWith`), so when a run has an endpoint+payload but no `browseId`, `.startsWith` throws. Line 103 in the same file correctly uses `?.browseId?.startsWith`.","fix":"Add the missing optional chain: `run.endpoint?.payload?.browseId?.startsWith('UC')`.","locations":[{"ref":"src/parser/classes/MusicTwoRowItem.ts:89","code":"   89 |       const artists = this.subtitle.runs?.filter((run: any) => run.endpoint?.payload?.browseId.startsWith('UC'));"},{"ref":"src/parser/classes/MusicTwoRowItem.ts:112","code":"  112 |       const artists = this.subtitle.runs?.filter((run: any) => run.endpoint?.payload?.browseId.startsWith('UC'));"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","descr uttons[0].as(Button).endpoint.payload.feedbackToken;"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"medium","description":"In applySort, `options` may be undefined (when MusicSortFilterButton is absent: `button?.menu?.options` short-circuits to undefined, and `.filter` is then called on undefined and throws). Even if it does not throw there, when target_item is not found the error builder calls `options.map((item) => item.title)` which throws if options is undefined.","fix":"Default options to an empty array: `const options = (button?.menu?.options?.filter(...) ?? []) as MusicMultiSelectMenuItem[];`.","locations":[{"ref":"src/parser/ytmusic/Library.ts:48-58","code":"   48 |       const button = this.#page.contents_memo?.getType(MusicSortFilterButton)[0];\n   49 | \n   50 |       const options = button?.menu?.options\n   51 |         .filter(\n   52 |           (item: MusicMultiSelectMenuItem | MusicMenuItemDivider) => item instanceof MusicMultiSelectMenuItem\n   53 |         ) as MusicMultiSelectMenuItem[];\n   54 | \n   55 |       target_item = options?.find((item) => item.title === sort_by);\n   56 | \n   57 |       if (!target_item)\n   58 |         throw new InnertubeError(`Sort option \"${sort_by}\" not found`, { available_filters: options.map((item) => item.title) });"}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"medium","description":"In sort_options getter, `options` is computed as `button?.menu?.options.filter(...)`. The optional chain stops at `button?.menu?` but `.options.filter` is then called unconditionally; if `menu.options` is undefined this throws. More importantly `options` can be undefined (when button or menu is missing) and `options.map(...)` on the next line throws 'Cannot read properties of undefined'.","fix":"Use `button?.menu?.options?.filter(...)` and guard: `return (options ?? []).map((item) => item.title);`.","locations":[{"ref":"src/parser/ytmusic/Library.ts:137-139","code":"  137 |     const button = this.#page.contents_memo?.getType(MusicSortFilterButton)[0];\n  138 |     const options = button?.menu?.options.filter((item: MusicMultiSelectMenuItem | MusicMenuItemDivider) => item instanceof MusicMultiSelectMenuItem) as MusicMultiSelectMenuItem[];\n  139 |     return options.map((item) => item.title);"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"medium","description":"`this.header.panels[0].text_on_tap_endpoint` indexes panels[0] without verifying the array is non-empty. A HighlightsCarousel with no panels throws a TypeError instead of a meaningful error.","fix":"Guard: `const endpoint = this.header.panels[0]?.text_on_tap_endpoint; if (!endpoint) throw new InnertubeError('Recap playlist endpoint not found');`.","locations":[{"ref":"src/parser/ytmusic/Recap.ts:54","code":"   54 |     const endpoint = this.header.panels[0].text_on_tap_endpoint;"}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"medium","description":"getTab falls back to `this.tabs?.[0]` (line 53) as the target tab when neither a title nor pageType match. This means getRelated/getLyrics, which pass a pageType string, will silently return the first tab's contents if the requested type is absent, rather than failing. Combined with the cast `as ObservedArray<MusicDescriptionShelf>` in getRelated/getLyrics, callers can receive wrongly-typed nodes. The `if (!target_tab)` guard at line 55 is effectively dead because the fallback almost always yields a tab.","fix":"Only fall back to tabs[0] for the title-lookup convenience case, not for pageType lookups; or remove the fallback so a missing pageType throws the InnertubeError as intended.","locations":[{"ref":"src/parser/ytmusic/TrackInfo.ts:50-56","code":"   50 |     const target_tab =\n   51 |       this.tabs.find((tab) => tab.title === title_or_page_type) ||\n   52 |       this.tabs.find((tab) => tab.endpoint.payload.browseEndpointContextSupportedConfigs?.browseEndpointContextMusicConfig?.pageType === title_or_page_type) ||\n   53 |       this.tabs?.[0];\n   54 | \n   55 |     if (!target_tab)\n   56 |       throw new InnertubeError(`Tab \"${title_or_page_type}\" not found`, { available_tabs: this.available_tabs });"}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"medium","description":"`globalThis.crypto?.randomUUID()` only optional-chains the `crypto` access, not the method call.\nIf `crypto` exists but `randomUUID` is undefined (older RN/browser environments — the exact case this\nfallback is meant to handle), `crypto.randomUUID()` throws \"randomUUID is not a function\" and the\nmanual UUID fallback below is never reached. Additionally the check invokes `randomUUID()` purely to\ntest truthiness and then calls it a second time, wasting a call.","fix":"Test the method reference without calling it: `if (typeof globalThis.crypto?.randomUUID === 'function') return globalThis.crypto.randomUUID();`.","locations":[{"ref":"src/platform/react-native.ts:47-49","code":"   47 |     if (globalThis.crypto?.randomUUID()) {\n   48 |       return globalThis.crypto.randomUUID();\n   49 |     }"},{"ref":"src/platform/web.ts:100-102","code":"  100 |     if (globalThis.crypto?.randomUUID()) {\n  101 |       return globalThis.crypto.randomUUID();\n  102 |     }"}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"medium","description":"`getColorInfo` does `new URL(format.url as string)` only to read the InnerTube client param for a\nwarning log. `format.url` is frequently undefined for ciphered/streaming-data formats (the URL lives in\n`signature_cipher`/`cipher`), so `new URL(undefined)` throws. This turns a benign \"unknown matrix\ncoefficients\" warning path into a hard exception that aborts the entire manifest/streaming-info build.","fix":"Guard with `format.url ? new URL(format.url) : null` (and skip the client param) before constructing the URL, or wrap in try/catch.","locations":[{"ref":"src/utils/StreamingInfo.ts:561-571","code":"  561 |       if (!matrix_coefficients) {\n  562 |         const url = new URL(format.url as string);\n  563 | \n  564 |         const anonymisedFormat = JSON.parse(JSON.stringify(format));\n  565 |         anonymisedFormat.url = 'REDACTED';\n  566 |         anonymisedFormat.signature_cipher = 'REDACTED';\n  567 |         anonymisedFormat.cipher = 'REDACTED';\n  568 | \n  569 |         Log.warn(TAG_, `Unknown matrix coefficients \"${color_info.matrix_coefficients}\". The DASH manifest is still usable without this.\\n`\n  570 |           + `Please report it at ${packageInfo.bugs.url} so we can add support for it.\\n`\n  571 |           + `InnerTube client: ${url.searchParams.get('c')}\\nformat:`, anonymisedFormat);"}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"low","description":"getUnseenNotificationsCount accesses `response.data?.actions?.[0].updateNotificationsUnseenCountAction?.unseenCount`. The optional chaining stops at `actions?.[0]` but `[0]` itself is then dereferenced with a non-optional `.updateNotificationsUnseenCountAction`; if `actions` is an empty array, `actions[0]` is undefined and the property access throws. A FIXME comment already acknowledges this is not properly parsed.","fix":"Use `response.data?.actions?.[0]?.updateNotificationsUnseenCountAction?.unseenCount` so an empty actions array yields undefined and falls back to 0.","locations":[{"ref":"src/Innertube.ts:402-406","code":"  402 |   async getUnseenNotificationsCount(): Promise<number> {\n  403 |     const response = await this.actions.execute('/notification/get_unseen_count');\n  404 |     // FIXME: properly parse this.\n  405 |     return response.data?.unseenCount || response.data?.actions?.[0].updateNotificationsUnseenCountAction?.unseenCount || 0;\n  406 |   }"}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"low","description":"`data.thumbnailOverlays.find(...)` and (in CompactMovie/Movie) the subsequent `?.thumbnailOverlayTimeStatusRenderer.text` access ')` only confirms the key exists, not that the array has elements; an empty `continuations` array makes `Reflect.has(data.continuations[0], ...)` throw (Reflect.has on undefined).","fix":"Add a length/element guard: `const cont = data.continuations?.[0]; if (cont) { ... }`.","locations":[{"ref":"src/parser/classes/SectionList.ts:21-26","code":"   21 |     if (Reflect.has(data, 'continuations')) {\n   22 |       if (Reflect.has(data.continuations[0], 'nextContinuationData')) {\n   23 |         this.continuation = data.continuations[0].nextContinuationData.continuation;\n   24 |       } else if (Reflect.has(data.continuations[0], 'reloadContinuationData')) {\n   25 |         this.continuation = data.continuations[0].reloadContinuationData.continuation;\n   26 |       }"}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"low","description":"`data.sticker.accessibility.accessibilityData.label` and `data.contextMenuAccessibility.accessibilityData.label` are dereferenced without null checks. If accessibility data is missing the constructor throws. (Same pattern in LiveChatPaidMessage.ts:55.)","fix":"Use optional chaining (e.g. `data.sticker.accessibility?.accessibilityData?.label`) consistent with LiveChatTextMessage.ts which guards these with Reflect.has.","locations":[{"ref":"src/parser/classes/livechat/items/LiveChatPaidSticker.ts:45","code":"   45 |     this.sticker_accessibility_label = data.sticker.accessibility.accessibilityData.label;"},{"ref":"src/parser/classes/livechat/items/LiveChatPaidSticker.ts:51","code":"   51 |     this.context_menu_accessibility_label = data.contextMenuAccessibility.accessibilityData.label;"},{"ref":"src/parser/classes/livechat/items/LiveChatPaidMessage.ts:55","code":"   55 |     this.context_menu_accessibility_label = data.contextMenuAccessibility.accessibilityData.label;"}]},{"id":"PANIC_36","type":"panic","type_label":"Panic","severity":"low","description":"Inconsistent null-safety on `data.emoji`. The `text` assignment uses `data.emoji?.emojiId` etc., but the `emoji` object literal reads `data.emoji.emojiId` and `data.emoji.image` directly (lines 25 and 28). If `data.emoji` is undefined these throw, contradicting the optional chaining used a few lines above.","fix":"Use `data.emoji?.emojiId` and `Thumbnail.fromResponse(data.emoji?.image)` for consistency, or early-return when `data.emoji` is absent.","locations":[{"ref":"src/parser/classes/misc/EmojiRun.ts:24-30","code":"   24 |     this.emoji = {\n   25 |       emoji_id: data.emoji.emojiId,\n   26 |       shortcuts: data.emoji?.shortcuts || [],\n   27 |       search_terms: data.emoji?.searchTerms || [],\n   28 |       image: Thumbnail.fromResponse(data.emoji.image),\n   29 |       is_custom: !!data.emoji?.isCustomEmoji\n   30 |     };"}]},{"id":"PANIC_37","type":"panic","type_label":"Panic","severity":"low","description":"`TextRun.toHTML()` deep-dereferences `this.attachment.element.type.imageType.image.sources[0]` and `this.attachment.element.properties.layoutProperties.height.value` based only on a truthy `this.attachment` check. `attachment` is assigned raw, untyped `data.attachment`; any structural mismatch (e.g. missing `properties.layoutProperties`) throws while rendering HTML.","fix":"Validate each level with optional chaining before building the image element, and bail out to the plain wrapped_text on mismatch.","locations":[{"ref":"src/parser/classes/misc/TextRun.ts:82-91","code":"   82 |     if (this.attachment) {\n   83 |       if (this.attachment.element.type.imageType.image.sources.length) {\n   84 |         if (this.endpoint) {\n   85 |           const { url } = this.attachment.element.type.imageType.image.sources[0];\n   86 | \n   87 |           let image_el = '';\n   88 | \n   89 |           if (url) {\n   90 |             image_el = `<img src=\"${url}\" style=\"vertical-align: middle; height: ${this.attachment.element.properties.layoutProperties.height.value}px; width: ${this.attachment.element.properties.layoutProperties.width.value}px;\" alt=\"\">`;\n   91 |           }"}]},{"id":"PANIC_38","type":"panic","type_label":"Panic","severity":"low","description":"isMiscType treats any object whose key ends with 'Endpoint'/'Command' (or equals 'endpoint') as a NavigationEndpoint and immediately constructs `new NavigationEndpoint(value)` during introspection of unknown JIT classes. If `value` is an object that is not a valid endpoint shape, the NavigationEndpoint constructor may throw, propagating out of inferType/introspect and aborting JIT class generation (which is itself the fallback path for unknown nodes). Endpoint/Text/Author construction during pure type inference couples introspection to runtime parsing correctness.","fix":"Wrap the speculative `new NavigationEndpoint`/`new Text` construction in try/catch (treating failures as a plain object type), since this runs on arbitrary unknown data during introspection.","locations":[{"ref":"src/parser/generator.ts:163-184","code":"  163 | export function isMiscType(key: string, value: unknown): MiscInferenceType | false {\n  164 |   if (typeof value === 'object' && value !== null) {\n  165 |     // NavigationEndpoint\n  166 |     if (key.endsWith('Endpoint') || key.endsWith('Command') || key === 'endpoint') {\n  167 |       return {\n  168 |         type: 'misc',\n  169 |         endpoint: new NavigationEndpoint(value),\n  170 |         optional: false,\n  171 |         misc_type: 'NavigationEndpoint'\n  172 |       };\n  173 |     }\n  174 |     // Text\n  175 |     if (Reflect.has(value, 'simpleText') || Reflect.has(value, 'runs')) {\n  176 |       const textNode = new Text(value);\n  177 |       return {\n  178 |         type: 'misc',\n  179 |         misc_type: 'Text',\n  180 |         optional: false,\n  181 |         endpoint: textNode.endpoint,\n  182 |         text: textNode.toString()\n  183 |       };\n  184 |     }"}]},{"id":"PANIC_39","type":"panic","type_label":"Panic","severity":"low","description":"Maybe.node() builds its error message with `this.#value.constructor.name` inside the failure branch. When #value is null or undefined (a common shape for missing InnerTube keys), `null.constructor` throws 'Cannot read properties of null', masking the intended descriptive TypeError. The same pattern exists in Maybe.instanceof().","fix":"Guard the message, e.g. use `typeof this.#value` / `this.#value?.constructor?.name ?? String(this.#value)` when constructing the error string.","locations":[{"ref":"src/parser/helpers.ts:203-206","code":"  203 |   node() {\n  204 |     if (!(this.#value instanceof YTNode)) {\n  205 |       throw new TypeError(`Expected YTNode, got ${this.#value.constructor.name}`);\n  206 |     }"},{"ref":"src/parser/helpers.ts:289-293","code":"  289 |   instanceof<T extends object>(type: Constructor<T>): T {\n  290 |     if (!this.isInstanceof(type)) {\n  291 |       throw new TypeError(`Expected instance of ${type.name}, got ${this.#value.constructor.name}`);\n  292 |     }\n  293 |     return this.#value;"}]},{"id":"PANIC_40","type":"panic","type_label":"Panic","severity":"low","description":"playback_tracking parsing accesses `data.playbackTracking.videostatsWatchtimeUrl.baseUrl` and `...videostatsPlaybackUrl.baseUrl` with no optional chaining. The outer `playbackTracking` is guarded, but if YouTube drops `videostatsWatchtimeUrl`/`videostatsPlaybackUrl` (API drift) the `.baseUrl` access throws and aborts the whole response parse. Most other optional fields in this function use parseItem/`?.` defensively; this block does not.","fix":"Use optional chaining: `data.playbackTracking.videostatsWatchtimeUrl?.baseUrl` etc., or validate presence before building the object.","locations":[{"ref":"src/parser/parser.ts:380-383","code":"  380 |   const playback_tracking = data.playbackTracking ? {\n  381 |     videostats_watchtime_url: data.playbackTracking.videostatsWatchtimeUrl.baseUrl,\n  382 |     videostats_playback_url: data.playbackTracking.videostatsPlaybackUrl.baseUrl\n  383 |   } : null;"}]},{"id":"PANIC_41","type":"panic","type_label":"Panic","severity":"low","description":"`account_section_list.contents[0]` is assigned to `this.contents` (typed `AccountItemSection | null`) but `contents[0]` will be undefined (not null) if the section list is empty, violating the declared type and potentially causing downstream undefined access in consumers expecting null.","fix":"Normalize to null: `this.contents = account_section_list.contents[0] ?? null;`.","locations":[{"ref":"src/parser/youtube/AccountInfo.ts:25","code":"   25 |     this.contents = account_section_list.contents[0];"}]},{"id":"PANIC_42","type":"panic","type_label":"Panic","severity":"low","description":"`firstChip.is(ChipView)` is checked (line 215) before reading display_type in Channel.filter_nodes, but `chips[0]` may be undefined when memo.has('ChipView') is true yet the array is somehow empty after observe; calling `.is` on undefined would throw. Minor, but the has()/getType() pair does not guarantee a non-empty array.","fix":"Add `if (!firstChip) return this.#filter_nodes = { primary_filters, secondary_filters };` guard before `firstChip.is(ChipView)`.","locations":[{"ref":"src/parser/youtube/Channel.ts:212-215","code":"  212 |       const chips = this.memo.getType(ChipView);\n  213 |       const firstChip = chips[0];\n  214 | \n  215 |       if (firstChip.is(ChipView)) {"}]},{"id":"PANIC_43","type":"panic","type_label":"Panic","severity":"low","description":"`firstChip` from `chipBarView.chips[0]` is used as `firstChip.display_type` without checking the chips array is non-empty. If a ChipBarView is present but has an empty chips array, `firstChip` is undefined and `.display_type` throws. (Channel.filter_nodes at line 214 guards firstChip with `.is()`, but FilteredChannelList does not.)","fix":"Guard: `const firstChip = chipBarView.chips[0]; if (!firstChip) return;` (or skip filter extraction) before reading display_type.","locations":[{"ref":"src/parser/youtube/Channel.ts:460-463","code":"  460 |       const firstChip = chipBarView.chips[0];\n  461 | \n  462 |       const hasDropdown =\n  463 |         firstChip.display_type === 'CHIP_VIEW_MODEL_DISPLAY_TYPE_DROP_DOWN' ||"}]},{"id":"PANIC_44","type":"panic","type_label":"Panic","severity":"low","description":"`this.#page.contents_memo?.getType(ChipCloud)?.[0].chips` dereferences `.chips` on element `[0]`. getType returns an array so `?.` does not guard the index; an empty ChipCloud array makes `[0]` undefined and `.chips` throws before the `|| []` fallback applies.","fix":"Use `getType(ChipCloud)?.[0]?.chips.map(...) || []`.","locations":[{"ref":"src/parser/ytmusic/Library.ts:143","code":"  143 |     return this.#page.contents_memo?.getType(ChipCloud)?.[0].chips.map((chip: ChipCloudChip) => chip.text) || [];"}]},{"id":"PANIC_45","type":"panic","type_label":"Panic","severity":"low","description":"`getStoryboardInfo` does `new URL(storyboard.template_url)` and `.pathname.split('.').pop()` to derive\nthe file extension with no try/catch. A malformed/relative `template_url` makes `new URL` throw,\naborting storyboard processing. Likewise `getImageRepresentation`/`getStoryboardMimeType` construct\n`new URL(url.replace('$M', ...))` directly from server data.","fix":"Wrap URL construction in try/catch (or validate the template_url) and skip boards with unparseable URLs.","locations":[{"ref":"src/utils/StreamingInfo.ts:647-650","code":"  647 |   for (const storyboard of boards) {\n  648 |     const extension = new URL(storyboard.template_url).pathname.split('.').pop();\n  649 | \n  650 |     const mime_type = `image/${extension === 'jpg' ? 'jpeg' : extension}`;"}]},{"id":"PANIC_46","type":"panic","type_label":"Panic","severity":"low","description":"`getStreamingInfo` accesses `formats[0]` in several places (lines 856, 859, 873, 937, 939) without\nchecking that the (possibly format-filtered) `formats` array is non-empty. If `format_filter` rejects\nevery adaptive format, `formats` is empty and `formats[0].approx_duration_ms` / `formats[0].has_audio`\nthrow \"Cannot read properties of undefined\". The reduce over `groups` would be empty so no sets are\nproduced, but the duration / first-format reads happen before that.","fix":"Throw an explicit InnertubeError when `formats.length === 0` right after computing `formats`.","locations":[{"ref":"src/utils/StreamingInfo.ts:858-862","code":"  858 |   } else {\n  859 |     const duration = formats[0].approx_duration_ms / 1000;\n  860 | \n  861 |     getDuration = () => Promise.resolve(duration);\n  862 |   }"},{"ref":"src/utils/StreamingInfo.ts:873-878","code":"  873 |     if (formats[0].has_audio) {\n  874 |       // Some videos with multiple audio tracks, have a broken one, that doesn't have any audio track information\n  875 |       // It seems to be the same as default audio track but broken\n  876 |       // We want to ignore it, as it messes up audio track selection in players and YouTube ignores it too\n  877 |       // At the time of writing, this video has a broken audio track: https://youtu.be/UJeSWbR6W04\n  878 |       if (has_multiple_audio_tracks && !formats[0].audio_track)"}]},{"id":"PANIC_47","type":"panic","type_label":"Panic","severity":"low","description":"`base64ToU8` computes padding as `(4 - standard_base64.length % 4) % 4` and `atob`s the result. If the\ninput contains characters outside the base64 alphabet (after the `-`/`_` substitution) — e.g. a\ntruncated/garbage visitor-data string passed to decodeVisitorData — `atob` throws an\n\"InvalidCharacterError\" that is not caught, surfacing as an unhandled exception in ProtoUtils.decode*.","fix":"Validate the input matches the base64url alphabet (or wrap atob in try/catch) before decoding.","locations":[{"ref":"src/utils/Utils.ts:250-254","code":"  250 | export function base64ToU8(base64: string): Uint8Array {\n  251 |   const standard_base64 = base64.replace(/-/g, '+').replace(/_/g, '/');\n  252 |   const padded_base64 = standard_base64.padEnd(standard_base64.length + (4 - standard_base64.length % 4) % 4, '=');\n  253 |   return new Uint8Array(atob(padded_base64).split('').map((char) => char.charCodeAt(0)));\n  254 | }"}]},{"id":"PANIC_48","type":"panic","type_label":"Panic","severity":"low","description":"In `analyzeAst`, when an identifier assignment matches a previously declared variable, the code does\n`existingVariable.node.init = right`. `node` is typed `any` and for a predeclared `var x;` the stored\nnode is a VariableDeclarator (has `.init`), but nothing guarantees `node` is defined/assignable for\nevery metadata shape created elsewhere (e.g. alias members store an ExpressionStatement as `node`).\nMutating `.init` on a non-declarator node silently attaches a bogus property that later rendering may\nrely on, and assigning to `undefined.init` would throw.","fix":"Assert the node type (`node.type === 'VariableDeclarator'`) before assigning `.init`, or store the init on metadata instead of mutating the AST node.","locations":[{"ref":"src/utils/javascript/JsAnalyzer.ts:181-188","code":"  181 |             const existingVariable = this.declaredVariables.get(left.name);\n  182 |             if (!existingVariable) continue;\n  183 | \n  184 |             existingVariable.node.init = right;\n  185 | \n  186 |             if (this.needsDependencyAnalysis(right)) {\n  187 |               existingVariable.dependencies = this.findDependencies(assignment.right, left.name);\n  188 |             }"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"pollForAccessToken runs an async callback inside setInterval with no try/catch. If `this.#http.fetch_function` or `response.json()` throws (network error, non-JSON body), the promise rejects unhandled, the interval is never cleared, and polling continues indefinitely (a leaked timer that also keeps emitting failing requests). A transient network blip during device-code polling leaks the interval forever.","fix":"Wrap the interval body in try/catch; on unexpected errors clearInterval(connInterval) and emit 'auth-error'. Consider awaiting nothing inside setInterval and using a self-scheduling setTimeout to avoid overlapping in-flight requests.","locations":[{"ref":"src/core/OAuth2.ts:144-183","code":"  144 |     const connInterval = setInterval(async () => {\n  145 |       const response = await this.#http.fetch_function(this.AUTH_SERVER_TOKEN_URL, {\n  146 |         body: JSON.stringify(payload),\n  147 |         method: 'POST',\n  148 |         headers: {\n  149 |           'Content-Type': 'application/json'\n  150 |         }\n  151 |       });\n  152 | \n  153 |       const response_data = await response.json();\n  154 | \n  155 |       if (response_data.error) {\n  156 |         switch (response_data.error) {\n  157 |           case 'access_denied':\n  158 |             this.#session.emit('auth-error', new OAuth2Error('Access was denied.', response_data));\n  159 |             clearInterval(connInterval);\n  160 |             break;\n  161 |           case 'expired_token':\n  162 |             this.#session.emit('auth-error', new OAuth2Error('The device code has expired.', response_data));\n  163 |             clearInterval(connInterval);\n  164 |             break;\n  165 |           case 'authorization_pending':\n  166 |           case 'slow_down':\n  167 |             Log.info(TAG, 'Polling for access token...');\n  168 |             break;\n  169 |           default:\n  170 |             this.#session.emit('auth-error', new OAuth2Error('Server returned an unexpected error.', response_data));\n  171 |             clearInterval(connInterval);\n  172 |             break;\n  173 |         }\n  174 |         return;\n  175 |       }\n  176 | \n  177 |       this.setTokens(response_data);\n  178 | \n  179 |       this.#session.emit('auth', { credentials: this.oauth2_tokens });\n  180 | \n  181 |       clearInterval(connInterval);\n  182 |     }, interval * 1000);\n  183 |   }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"revokeCredentials mutates the shared, long-lived URL instance `this.AUTH_SERVER_REVOKE_TOKEN_URL` by calling `url.searchParams.set('token', ...)`. The OAuth2 instance keeps this URL object; if revoke were ever attempted again (or the object inspected later) it carries the previous access_token in its query string. Reusing a stored mutable URL for per-call parameters is fragile and leaks token state onto the instance.","fix":"Construct a fresh URL inside the method (`const url = new URL(this.AUTH_SERVER_REVOKE_TOKEN_URL)`) before setting the token search param.","locations":[{"ref":"src/core/OAuth2.ts:191-194","code":"  191 |     const url = this.AUTH_SERVER_REVOKE_TOKEN_URL;\n  192 |     url.searchParams.set('token', this.oauth2_tokens.access_token);\n  193 | \n  194 |     return this.#session.http.fetch_function(url, { method: 'POST' });"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"fromCache compares the cached library_version (a number written by #storeSession via parseInt(packageInfo.version.split('.',1)[0])) against `parseInt(packageInfo.version.split('.', 1)[0])`. If package.json version ever lacks a leading numeric major (or the field is malformed), parseInt yields NaN; NaN !== NaN is true so cache is always discarded silently. More importantly the version is parsed every call from package.json with no error handling on a malformed string.","fix":"Compute the major version once with validation (guard against NaN) and reuse it; log clearly if the version string is unparseable.","locations":[{"ref":"src/core/Session.ts:343-346","code":"  343 |       if (session_data.library_version !== parseInt(packageInfo.version.split('.', 1)[0])) {\n  344 |         Log.warn(TAG, `Cached session data is from a different library version (${session_data.library_version}). Regenerating session data.`);\n  345 |         return null;\n  346 |       }"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`getPostLiveDvrInfo` parses `X-Head-Time-Millis` and `X-Head-Seqnum` response headers with `parseInt`\nand uses them in arithmetic (`duration_ms / 1000`) and as `repeat_count`. Although NaN is checked, the\nvalues are not bounds-checked; an attacker-controlled / malformed CDN response with an absurdly large\nseqnum is propagated unbounded into the segment timeline `repeat_count`, which can blow up DASH\ngeneration. Same pattern for `parseInt(response.headers.get('Content-Length') || '0')` in\ngetStoryboardBitrate.","fix":"Validate header-derived integers are within sane bounds (Number.isSafeInteger and reasonable max) before using them.","locations":[{"ref":"src/utils/StreamingInfo.ts:285-303","code":"  285 | async function getPostLiveDvrInfo(transformed_url: string, actions: Actions): Promise<PostLiveDvrInfo> {\n  286 |   const response = await actions.session.http.fetch_function(`${transformed_url}&rn=0&sq=0`, {\n  287 |     method: 'HEAD',\n  288 |     headers: Constants.STREAM_HEADERS,\n  289 |     redirect: 'follow'\n  290 |   });\n  291 | \n  292 |   const duration_ms = parseInt(response.headers.get('X-Head-Time-Millis') || '');\n  293 |   const segment_count = parseInt(response.headers.get('X-Head-Seqnum') || '');\n  294 | \n  295 |   if (isNaN(duration_ms) || isNaN(segment_count)) {\n  296 |     throw new InnertubeError('Failed to extract the duration or segment count for this Post Live DVR video');\n  297 |   }\n  298 | \n  299 |   return {\n  300 |     duration: duration_ms / 1000,\n  301 |     segment_count\n  302 |   };\n  303 | }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`getStoryboardBitrate` computes `Math.max(...content_lengths) / (board.rows * board.columns)`. If a\nboard reports `rows` or `columns` of 0 the result is `Infinity`/`NaN`, and if `responses` is empty\n(can happen if `request_limit` resolves to 0 because `storyboard_count` is 0) `Math.max()` returns\n`-Infinity`, yielding a nonsensical negative/Infinity bitrate that is propagated into the manifest's\n`bandwidth` attribute. Content-Length values come straight from `parseInt` on response headers with no\nupper-bound validation.","fix":"Guard against zero rows/columns and empty content_lengths; clamp/round the result and fall back to a sane default when inputs are invalid.","locations":[{"ref":"src/utils/StreamingInfo.ts:719-727","code":"  719 |   const content_lengths = [];\n  720 | \n  721 |   for (const response of responses) {\n  722 |     content_lengths.push(parseInt(response.headers.get('Content-Length') || '0'));\n  723 |   }\n  724 | \n  725 |   // This is a rough estimate, so it probably won't reflect that actual peak bitrate\n  726 |   // Hopefully it's close enough, because figuring out the actual peak bitrate would require downloading and analysing all storyboard tiles\n  727 |   return Math.ceil((Math.max(...content_lengths) / (board.rows * board.columns)) * 8);"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"setName() builds the playlistEditEndpoint payload with the key `playlist_id` (snake_case) instead of `playlistId` (camelCase) used by every other method in this file (e.g. setDescription at line 288, addVideos at 121, moveVideo at 205). InnerTube expects `playlistId`, so the playlist ID is never sent and the rename request will target an unidentified/wrong playlist or be rejected.","fix":"Change `const payload = { playlist_id, actions: [] ... }` to `const payload = { playlistId: playlist_id, actions: [] ... }` to match the field name InnerTube expects.","locations":[{"ref":"src/core/managers/PlaylistManager.ts:261-269","code":"  261 |     const payload = { playlist_id, actions: [] as Record<string, any>[] };\n  262 | \n  263 |     payload.actions.push({\n  264 |       action: 'ACTION_SET_PLAYLIST_NAME',\n  265 |       playlistName: name\n  266 |     });\n  267 | \n  268 |     const playlist_edit_endpoint = new NavigationEndpoint({ playlistEditEndpoint: payload });\n  269 |     const response = await playlist_edit_endpoint.call(this.#actions);"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"mergeKeyInfo merges renderer name lists with object spread on arrays. RendererInferenceType.renderers and the array-renderer `renderers` are typed `string[]` (see generator.ts:46 and ArrayInferenceType), but the union is built as `{ ...type.renderers, ...new_type.renderers }`. Spreading arrays into an object produces an index-keyed object ({0:'A',1:'B'}), and merging ['A','B'] with ['C'] yields {0:'C',1:'B'} — i.e. renderers are overwritten/dropped by positional index instead of unioned by name. The resolved key_info then carries a malformed `renderers` (an object, not an array), corrupting JIT class generation and the regenerated TypeScript output.","fix":"Union the names by value, e.g. `renderers: Array.from(new Set([ ...type.renderers, ...new_type.renderers ]))`, instead of object-spreading the arrays.","locations":[{"ref":"src/parser/generator.ts:776-784","code":"  776 |           const union_map = {\n  777 |             ...type.renderers,\n  778 |             ...new_type.renderers\n  779 |           };\n  780 |           const either_optional = type.optional || new_type.optional;\n  781 |           const resolved_key: InferenceType = {\n  782 |             type: 'renderer',\n  783 |             renderers: union_map,\n  784 |             optional: either_optional"},{"ref":"src/parser/generator.ts:815-825","code":"  815 |               const union_map = {\n  816 |                 ...type.renderers,\n  817 |                 ...new_type.renderers\n  818 |               };\n  819 |               const either_optional = type.optional || new_type.optional;\n  820 |               const resolved_key: InferenceType = {\n  821 |                 type: 'array',\n  822 |                 array_type: 'renderer',\n  823 |                 renderers: union_map,\n  824 |                 optional: either_optional\n  825 |               };"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In the Node cache, `get` returns `data.buffer as ArrayBuffer` where `data` is a Buffer from\n`fs.readFile`. For small files Node allocates the Buffer from a shared internal pool, so `data.buffer`\nis the entire (e.g. 8 KiB) pool ArrayBuffer, not just the file's bytes, and `data.byteOffset` is\nnon-zero. Callers that wrap the returned ArrayBuffer (e.g. BinarySerializer.deserialize via\n`new DataView`/`Uint8Array`) will read garbage/adjacent data and the length will be wrong. The Deno\nand web/react-native caches have the same `.buffer` over-read pattern for typed-array views.","fix":"Return only the file's bytes, e.g. `data.buffer.slice(data.byteOffset, data.byteOffset + data.byteLength)` for Buffers, and `result.buffer.slice(result.byteOffset, result.byteOffset + result.byteLength)` for views.","locations":[{"ref":"src/platform/node.ts:58-59","code":"   58 |         const data: Buffer = await fs.readFile(file);\n   59 |         return data.buffer as ArrayBuffer;"},{"ref":"src/platform/deno.ts:52-53","code":"   52 |         const data: Uint8Array = await Deno.readFile(file);\n   53 |         return data.buffer as ArrayBuffer;"},{"ref":"src/platform/web.ts:62-63","code":"   62 |         } else if (ArrayBuffer.isView(result)) {\n   63 |           resolve(result.buffer as ArrayBuffer);"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"moveVideo's recursive getSetVideoIds only stops when BOTH set_video_id_0 and set_video_id_1 are found; otherwise it fetches the next continuation. If one of the supplied video IDs is not in the playlist, the loop walks every page until pl.getContinuation() throws 'Could not get continuation data', surfacing a confusing error instead of a clear 'video not found'. removeVideos has the analogous issue: it recurses while payload.actions.length < video_ids.length, so any unmatched id forces a full walk ending in a continuation error.","fix":"After exhausting continuations (catch the no-continuation case or check has_continuation), throw a clear InnertubeError naming the video id(s) that could not be located.","locations":[{"ref":"src/core/managers/PlaylistManager.ts:209-222","code":"  209 |     const getSetVideoIds = async (pl: Feed): Promise<void> => {\n  210 |       const video_0 = pl.videos.find((video) => moved_video_id === video.key('id').string());\n  211 |       const video_1 = pl.videos.find((video) => predecessor_video_id === video.key('id').string());\n  212 | \n  213 |       set_video_id_0 = set_video_id_0 || video_0?.key('set_video_id').string();\n  214 |       set_video_id_1 = set_video_id_1 || video_1?.key('set_video_id').string();\n  215 | \n  216 |       if (!set_video_id_0 || !set_video_id_1) {\n  217 |         const next = await pl.getContinuation();\n  218 |         return getSetVideoIds(next);\n  219 |       }\n  220 |     };\n  221 | \n  222 |     await getSetVideoIds(playlist);"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`is_premiere` compares `badge.style === 'PREMIERE'`, but `style` holds raw badge style strings of the form `BADGE_STYLE_TYPE_*` (never the bare word `PREMIERE`). The label, not the style, carries `PREMIERE` — see Video.ts:137 which correctly uses `badge.label === 'PREMIERE'`. As written CompactVideo.is_premiere is always false.","fix":"Match on the label like Video.ts: `return this.badges.some((badge) => badge.label === 'PREMIERE');`.","locations":[{"ref":"src/parser/classes/CompactVideo.ts:115-117","code":"  115 |   get is_premiere(): boolean {\n  116 |     return this.badges.some((badge) => badge.style === 'PREMIERE');\n  117 |   }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Regex operator-precedence bug. `/\\d+ songs|song/` parses as (`\\d+ songs`) OR (`song`), so it matches any text merely containing the substring `song` (e.g. the artist word 'Songwriter'), not only a count like '5 songs'. The grouping was almost certainly intended.","fix":"Group the alternation: `/\\d+ (?:songs|song)/`.","locations":[{"ref":"src/parser/classes/MusicTwoRowItem.ts:86","code":"   86 |       const item_count_run = this.subtitle.runs?.find((run) => run.text.match(/\\d+ songs|song/));"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`EventEmitterLike` stores listener wrappers in `#legacy_listeners` keyed by the *listener function\nonly*, not by (type, listener). Registering the same listener for two different event types overwrites\nthe first wrapper in the map, so a later `off(typeA, listener)` removes nothing for typeA's wrapper\n(the stored wrapper is typeB's) and the typeA listener can never be detached — a listener/memory leak.\nRegistering the same listener twice for the same type has the same effect.","fix":"Key the map by a composite of type+listener (e.g. a Map<string, Map<listener, wrapper>>), or store an array of {type, wrapper} per listener.","locations":[{"ref":"src/utils/EventEmitterLike.ts:4-46","code":"    4 |   #legacy_listeners = new Map<(...args: any[]) => void, EventListener>();\n    5 | \n    6 |   constructor() {\n    7 |     super();\n    8 |   }\n    9 | \n   10 |   emit(type: string, ...args: any[]) {\n   11 |     const event = new Platform.shim.CustomEvent(type, { detail: args });\n   12 |     this.dispatchEvent(event);\n   13 |   }\n   14 | \n   15 |   on(type: string, listener: (...args: any[]) => void) {\n   16 |     const wrapper: EventListener = (ev) => {\n   17 |       if (ev instanceof Platform.shim.CustomEvent) {\n   18 |         listener(...ev.detail);\n   19 |       } else {\n   20 |         listener(ev);\n   21 |       }\n   22 |     };\n   23 |     this.#legacy_listeners.set(listener, wrapper);\n   24 |     this.addEventListener(type, wrapper);\n   25 |   }\n   26 | \n   27 |   once(type: string, listener: (...args: any[]) => void) {\n   28 |     const wrapper: EventListener = (ev) => {\n   29 |       if (ev instanceof Platform.shim.CustomEvent) {\n   30 |         listener(...ev.detail);\n   31 |       } else {\n   32 |         listener(ev);\n   33 |       }\n   34 |       this.off(type, listener);\n   35 |     };\n   36 |     this.#legacy_listeners.set(listener, wrapper);\n   37 |     this.addEventListener(type, wrapper);\n   38 |   }\n   39 | \n   40 |   off(type: string, listener: (...args: any[]) => void) {\n   41 |     const wrapper = this.#legacy_listeners.get(listener);\n   42 |     if (wrapper) {\n   43 |       this.removeEventListener(type, wrapper);\n   44 |       this.#legacy_listeners.delete(listener);\n   45 |     }\n   46 |   }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The non-whole-name branch of the cookie matcher builds the regex `(^|s?)${name}=([^;]+)`. The intent\nwas clearly `(^|\\s?)` (optional whitespace) but it reads `s?` — an optional literal letter \"s\" that\ncan match the empty string. As a result the regex matches `${name}=` anywhere in the cookie string,\nincluding when `name` is a suffix of a longer cookie name. e.g. searching for `SAPISID` could match\nthe tail of `__Secure-3PSAPISID=...` and return the wrong cookie value. This is the default code path\n(`matchWholeName = false`) and is used for the SAPISID auth cookie in HTTPClient.","fix":"Use `(^|\\s)` (or a proper boundary like `(?:^|;\\s*)`) instead of `(^|s?)`, and prefer matchWholeName=true for auth cookies.","locations":[{"ref":"src/utils/Utils.ts:260-264","code":"  260 | export function getCookie(cookies: string, name: string, matchWholeName = false): string | undefined {\n  261 |   const regex = matchWholeName ? `(^|\\\\s?)\\\\b${name}\\\\b=([^;]+)` : `(^|s?)${name}=([^;]+)`;\n  262 |   const match = cookies.match(new RegExp(regex));\n  263 |   return match ? match[2] : undefined;\n  264 | }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`parseFunctionArguments` builds the positional argument list for the generated wrapper, but for any\nargument it cannot map to a name/literal it pushes the placeholder `'input'` only if `'input'` is not\nalready present. When a target function has two or more such unmappable arguments, only a single\n`input` param is emitted, so the generated wrapper has fewer parameters than the call site expects and\npositional alignment of all subsequent arguments is wrong, producing an incorrect decipher wrapper.","fix":"Emit a unique placeholder per unmapped argument (e.g. `input0`, `input1`, ...) preserving arity.","locations":[{"ref":"src/utils/javascript/helpers.ts:267-288","code":"  267 | function parseFunctionArguments(analyzer: JsAnalyzer, args: ESTree.Node[]) {\n  268 |   const params: string[] = [];\n  269 | \n  270 |   for (const arg of args) {\n  271 |     if (arg.type === 'Identifier' && analyzer.declaredVariables.has(arg.name)) {\n  272 |       params.push(arg.name);\n  273 |     } else if (arg.type === 'Literal' && (typeof arg.value === 'string' || typeof arg.value === 'number')) {\n  274 |       params.push(JSON.stringify(arg.value));\n  275 |     } else if (arg.type === 'UnaryExpression') {\n  276 |       const argSource = extractNodeSource(arg, analyzer.getSource());\n  277 |       if (argSource) {\n  278 |         params.push(argSource.trim());\n  279 |       }\n  280 |     } else if (arg.type === 'AssignmentPattern' && arg.left.type === 'Identifier') {\n  281 |       params.push(arg.left.name);\n  282 |     } else if (arg.type === 'Identifier') {\n  283 |       params.push(arg.name);\n  284 |     } else if (!params.includes('input'))\n  285 |       params.push('input');\n  286 |   }\n  287 | \n  288 |   return params;"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In search(), params are computed as `filters ? encodeURIComponent(...) : undefined`, but `filters` defaults to `{}` and is always an object, so the ternary is always truthy. Even when the caller passes no filters, an encoded (empty) SearchFilter is always sent as `params`. The intended guard (only send params when filters were actually provided) does not work.","fix":"Check whether any filter fields were actually set (e.g. Object.keys(search_filter.filters).length || search_filter.prioritize) before encoding, otherwise pass undefined.","locations":[{"ref":"src/Innertube.ts:266-271","code":"  266 |     const search_endpoint = new NavigationEndpoint({\n  267 |       searchEndpoint: {\n  268 |         query,\n  269 |         params: filters ? encodeURIComponent(u8ToBase64(SearchFilter.encode(search_filter).finish())) : undefined\n  270 |       }\n  271 |     });"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"getContinuationData sets `this.#continuation = this.#getBodyContinuations()` then `if (this.#continuation) return this.getContinuationData();`. #getBodyContinuations always returns an (possibly empty) ObservedArray, which is always truthy, so the guard is always taken and the recursion always re-enters—on the second pass the length===0 branch throws. The `if` is effectively dead and the control flow only works by accident; an empty continuation array produces a throw on the recursive call rather than a clean return.","fix":"Drop the redundant `if` (it is always true) and document that an empty continuation array intentionally triggers the 'no continuations' throw, or handle the empty case explicitly before recursing.","locations":[{"ref":"src/core/mixins/Feed.ts:202-214","code":"  202 |   async getContinuationData(): Promise<T | undefined> {\n  203 |     if (this.#continuation) {\n  204 |       if (this.#continuation.length === 0)\n  205 |         throw new InnertubeError('There are no continuations');\n  206 | \n  207 |       return await this.#continuation[0].endpoint.call<T>(this.#actions, { parse: true });\n  208 |     }\n  209 | \n  210 |     this.#continuation = this.#getBodyContinuations();\n  211 | \n  212 |     if (this.#continuation)\n  213 |       return this.getContinuationData();\n  214 |   }"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"FeedFilterChipBar count guard uses `this.memo.getType(FeedFilterChipBar)?.length > 1`. getType never returns null/undefined so the `?.` is dead, and more subtly the subsequent branch uses `this.memo.has('FeedFilterChipBar')` (a string key on the Map) rather than the typed getType result, mixing two different lookup mechanisms for the same node and making the >1 guard and the has() branch potentially inconsistent.","fix":"Use `this.memo.getType(FeedFilterChipBar).length` consistently and reuse that result for both the >1 check and the presence check.","locations":[{"ref":"src/core/mixins/FilterableFeed.ts:38-42","code":"   38 |     if (this.memo.getType(FeedFilterChipBar)?.length > 1)\n   39 |       throw new InnertubeError('There are too many feed filter chipbars, you\\'ll need to find the correct one yourself in this.page');\n   40 | \n   41 |     if (this.memo.has('FeedFilterChipBar')) {\n   42 |       primary_filters = this.memo.getType(ChipCloudChip);;"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`this.author = data.shortBylineText && new Author(...)`. When `shortBylineText` is falsy, `author` is set to the falsy value (e.g. undefined/empty string) rather than an Author, but the property is typed non-optional `author: Author`. Downstream code accessing `author.*` would then throw.","fix":"Either make `author` optional and guard, or always construct: `new Author(data.shortBylineText, data.ownerBadges)` (Author already tolerates missing input).","locations":[{"ref":"src/parser/classes/GridVideo.ts:40","code":"   40 |     this.author = data.shortBylineText && new Author(data.shortBylineText, data.ownerBadges);"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Type/semantic inconsistency: `timestamp_usec` is declared `number` and assigned the raw `data.timestampUsec` (which is a microsecond string, as evidenced by `parseInt(data.timestampUsec)` used for `timestamp`). Sibling classes LiveChatPaidMessage/LiveChatPaidSticker declare `timestamp_usec: string`. The value is never converted to a number, so the declared type is wrong and downstream numeric use would misbehave.","fix":"Declare `timestamp_usec: string` to match the other livechat item classes (the value is a string).","locations":[{"ref":"src/parser/classes/livechat/items/LiveChatTextMessage.ts:17","code":"   17 |   timestamp_usec: number;"},{"ref":"src/parser/classes/livechat/items/LiveChatTextMessage.ts:30","code":"   30 |     this.timestamp_usec = data.timestampUsec;"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"introspectKeysSecondPass verifies author badges with `Reflect.has(badge_key_info[1].renderers, 'MetadataBadge')`. `renderers` is a string[] of renderer class names, so Reflect.has checks for a *property/index* named 'MetadataBadge' on the array (always false for a normal string array) rather than membership. The badge detection therefore never succeeds, so author metadata badges are effectively never attached.","fix":"Use membership: `badge_key_info[1].renderers.includes('MetadataBadge')`.","locations":[{"ref":"src/parser/generator.ts:341-346","code":"  341 |     const badge_key_info = key_info.find(([ key ]) => key === canonical_badges);\n  342 |     const is_badges = badge_key_info ?\n  343 |       badge_key_info[1].type === 'array' && badge_key_info[1].array_type === 'renderer' && Reflect.has(badge_key_info[1].renderers, 'MetadataBadge') :\n  344 |       false;\n  345 | \n  346 |     if (is_badges && canonical_badges) excluded_keys.add(canonical_badges);"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In mergeKeyInfo, the 'misc' branch sets changed_keys to an unknown primitive on a misc_type mismatch but does not `continue`/`break`. Execution then falls into `switch (type.misc_type)`; for the Author case it re-checks `new_type.misc_type !== 'Author'` and breaks, but if both are misc-Author with different params the earlier unknown-primitive assignment may already be overwritten or vice-versa, and the control flow is fragile. The intent (mismatch => mark unknown and stop) is not enforced.","fix":"Add `break;` (or `continue;`) immediately after setting changed_keys on the misc_type mismatch, mirroring the primitive/renderer mismatch branches.","locations":[{"ref":"src/parser/generator.ts:916-945","code":"  916 |       case 'misc':\n  917 |         {\n  918 |           if (new_type.type !== 'misc') continue;\n  919 |           if (type.misc_type !== new_type.misc_type) {\n  920 |           // We've got a type mismatch, this is unknown, we do not resolve unions\n  921 |             changed_keys.set(key, {\n  922 |               type: 'primitive',\n  923 |               typeof: [ 'unknown' ],\n  924 |               optional: true\n  925 |             });\n  926 |           }\n  927 |           switch (type.misc_type) {\n  928 |             case 'Author':\n  929 |               {\n  930 |                 if (new_type.misc_type !== 'Author') break;\n  931 |                 const had_optional_param = type.params[1] || new_type.params[1];\n  932 |                 const either_optional = type.optional || new_type.optional;\n  933 |                 const resolved_key: MiscInferenceType = {\n  934 |                   type: 'misc',\n  935 |                   misc_type: 'Author',\n  936 |                   optional: either_optional,\n  937 |                   params: [ new_type.params[0], had_optional_param ]\n  938 |                 };\n  939 |                 const did_change = JSON.stringify(resolved_key) !== JSON.stringify(type);\n  940 |                 if (did_change) changed_keys.set(key, resolved_key);\n  941 |               }\n  942 |               break;\n  943 |           // Other cases can not change\n  944 |           }\n  945 |         }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"sanitizeClassName replaces 'Renderer'/'Model'/'Radio' globally and anywhere in the string (`.replace(/Renderer|Model/g, '')`, `.replace(/Radio/g, 'Mix')`). These substrings are only meaningful as suffixes/tokens; a hypothetical key containing them mid-word would be mangled (e.g. a class with 'Radio' inside its name becomes 'Mix'). The intent (per isRenderer) is to strip the trailing Renderer/Model suffix only.","fix":"Anchor the replacements to the end, e.g. `.replace(/(Renderer|Model)$/,'')`, and reconsider the global Radio->Mix substitution.","locations":[{"ref":"src/parser/parser.ts:197-201","code":"  197 | export function sanitizeClassName(input: string) {\n  198 |   return (input.charAt(0).toUpperCase() + input.slice(1))\n  199 |     .replace(/Renderer|Model/g, '')\n  200 |     .replace(/Radio/g, 'Mix').trim();\n  201 | }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In SmoothedQueue.emitSmoothedActions, when delay == 1 the next delay is computed as `this.#estimated_update_interval as number / this.#action_queue.length`. If estimated_update_interval is still null (no prior interval established) this yields `null / n === 0`, and if action_queue is empty after the splice it yields NaN/Infinity. The cast `as number` hides that estimated_update_interval may be null. Math.max(80, ...) clamps NaN poorly (Math.max(80, NaN) === NaN).","fix":"Guard against null/zero: use `(this.#estimated_update_interval ?? 1E4)` and ensure action_queue.length is non-zero (the outer `if (this.#action_queue.length)` is checked before the splice, but length can become 0 after splice).","locations":[{"ref":"src/parser/youtube/SmoothedQueue.ts:110-118","code":"  110 |       if (this.#action_queue !== null) {\n  111 |         if (delay == 1) {\n  112 |           delay = this.#estimated_update_interval as number / this.#action_queue.length;\n  113 |           delay *= Math.random() + 0.5;\n  114 |           delay = Math.min(1E3, delay);\n  115 |           delay = Math.max(80, delay);\n  116 |         } else {\n  117 |           delay = 80;\n  118 |         }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`if (this.#action_queue !== null)` is always true: #action_queue is initialized to `[]` and clear() resets it to `[]`, never null (its type is YTNode[][], not nullable). This dead guard suggests the intent was to check emptiness (`.length`) or that the queue could be nulled, neither of which holds.","fix":"Remove the always-true null check, or replace with the intended condition (e.g. re-schedule only if there is remaining work).","locations":[{"ref":"src/parser/youtube/SmoothedQueue.ts:110","code":"  110 |       if (this.#action_queue !== null) {"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`timeToSeconds` strips all non-digits per segment with `replace(/\\D/g, '')` then `parseInt`. For an\nempty or malformed segment (e.g. input \"::\" or \"1::\") a segment becomes \"\" and `parseInt('')` is NaN,\nwhich silently propagates into the arithmetic giving a NaN result rather than the documented error.\nThe `default` case throws only for >3 segments; 0/empty inputs (e.g. \"\") produce `[NaN]` -> returns NaN.","fix":"Validate each parsed component with Number.isFinite and th
