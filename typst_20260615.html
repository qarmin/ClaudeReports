       if node.range().end < ctx.cursor {\n  513 |                     existing_positional += 1;\n  514 |                 }\n  515 |             }\n  516 |             ast::Arg::Named(named) => {\n  517 |                 existing_named.insert(named.name().as_str());\n  518 |             }\n  519 |             _ => {}\n  520 |         }\n  521 |     }","lines":16}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`file_completions_with_extensions` is missing a `return` after the empty-extensions branch. When `extensions` is empty (e.g. for `attach`/`path` parameters, see `path_completion`), it calls `file_completions(|_| true)` to add every file, then falls through and pointlessly calls `file_completions` again with the extension filter. The second call happens to add nothing because `[].contains(&ext)` is always false, so there is no visible bug today - but the fall-through is clearly unintended (the `if` block was meant to be terminal), wastes a full second scan over all files, and is a latent bug: any future change to the filter's empty-slice semantics would start producing duplicate completions.","fix":"Add `return;` after `self.file_completions(|_| true);` inside the `if extensions.is_empty()` block.","locations":[{"ref":"crates/typst-ide/src/complete.rs:1183-1196","code":" 1183 |     fn file_completions_with_extensions(&mut self, extensions: &[&str]) {\n 1184 |         if extensions.is_empty() {\n 1185 |             self.file_completions(|_| true);\n 1186 |         }\n 1187 |         self.file_completions(|id| {\n 1188 |             let ext = id\n 1189 |                 .vpath()\n 1190 |                 .extension()\n 1191 |                 .map(EcoString::from)\n 1192 |                 .unwrap_or_default()\n 1193 |                 .to_lowercase();\n 1194 |             extensions.contains(&ext.as_str())\n 1195 |         });\n 1196 |     }","lines":14}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `value_completion_full`, the string-trimming branch checks `label.starts_with('\"')` and `self.after.starts_with('\"')` then `label.strip_suffix('\"')`. For a label that is exactly `\"` (a single quote char, possible if a repr is degenerate), `strip_suffix` yields an empty string and `apply` becomes `Some(\"\")`, which would replace the completion text with nothing. The branch assumes the label is a well-formed quoted string of length >= 2.","fix":"Require `label.len() >= 2` (or that it both starts and ends with a quote) before stripping, to avoid producing an empty `apply`.","locations":[{"ref":"crates/typst-ide/src/complete.rs:1320-1325","code":" 1320 |         } else if label.starts_with('\"')\n 1321 |             && self.after.starts_with('\"')\n 1322 |             && let Some(trimmed) = label.strip_suffix('\"')\n 1323 |         {\n 1324 |             apply = Some(trimmed.into());\n 1325 |         }","lines":6}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Docs::summary` heuristically stops at the first sentence-ending period using `s.scout(-3) != Some('.')` to avoid breaking on 'e.g.'. This only inspects three characters back, so abbreviations like 'i.e.' (which has a period at offset -2) or longer patterns are not reliably handled, and conversely legitimate sentence ends preceded by a period three back (e.g. '...end. Next') will be incorrectly skipped. The summary truncation is therefore inconsistent for common abbreviations and edge punctuation.","fix":"Use a more robust sentence-boundary heuristic (e.g. require the period to be followed by whitespace AND not preceded by a known abbreviation / single letter), or document the limitation explicitly; at minimum handle the 2-char abbreviation case.","locations":[{"ref":"crates/typst-ide/src/docs.rs:137-144","code":"  137 |                 '.' => {\n  138 |                     output.push('.');\n  139 |                     // Avoid stopping on things like `See foo.bar.` or `e.g.`.\n  140 |                     if (s.done() || s.at(char::is_whitespace)) && s.scout(-3) != Some('.')\n  141 |                     {\n  142 |                         break;\n  143 |                     }\n  144 |                 }","lines":8}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`inject_live_reload_script` falls back to `html.len()` when `<\/body>` is not found, appending the `<script>` after all existing markup. For HTML that has a `<\/html>` but no `<\/body>`, or fragments, the reload script ends up outside the document body/root, which some browsers will relocate or ignore, potentially breaking live reload for non-standard HTML output.","fix":"Prefer inserting before `<\/body>`, then `<\/html>`, and only fall back to appending; or document that well-formed `<\/body>` is required.","locations":[{"ref":"crates/typst-kit/src/server.rs:223-226","code":"  223 | fn inject_live_reload_script(html: &mut String) {\n  224 |     let pos = html.rfind(\"<\/body>\").unwrap_or(html.len());\n  225 |     html.insert_str(pos, LIVE_RELOAD_SCRIPT);\n  226 | }","lines":4}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `Distributor::placed`, footnote handling for non-float placed children is invoked with `breakable = true`, even though absolutely-placed content is atomic from the flow's perspective. This makes `footnotes` compute `migratable = migratable && !breakable` = false and use per-marker `y` as the flow need instead of the placed frame height, disabling migration and miscomputing flow need for placed blocks whose footnotes don't fit.","fix":"Pass `breakable = false` for absolutely placed (non-float) children, treating them as atomic for footnote handling, consistent with floats.","locations":[{"ref":"crates/typst-layout/src/flow/distribute.rs:452-458","code":"  452 |         } else {\n  453 |             let frame = placed.layout(self.composer.engine, self.regions.base())?;\n  454 |             self.composer\n  455 |                 .footnotes(&self.regions, &frame, Abs::zero(), true, true)?;\n  456 |             self.flush_tags();\n  457 |             self.items.push(Item::Placed(frame, placed));\n  458 |         }","lines":7}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `raw_ratio`, when `ratio > 1.0` the extra stretch is normalized by `p.config.font_size / 2.0`. `font_size` is the paragraph's nominal text size from the config, but lines may contain text at arbitrary sizes (e.g. larger `text(size: ...)` runs or math). Using a single global font size to normalize per-line glyph-level justification means the justification cost/ratio is miscalibrated for lines whose dominant size differs from the paragraph default, which can bias optimized line breaking. This is an approximation but worth documenting/revisiting.","fix":"Consider normalizing by a size derived from the line's actual glyphs (or document explicitly why the global font size is an acceptable approximation).","locations":[{"ref":"crates/typst-layout/src/inline/linebreak.rs:607-613","code":"  607 |     if ratio > 1.0 {\n  608 |         // We should stretch the line above its stretchability. Now\n  609 |         // calculate the extra amount. Also, don't divide by zero.\n  610 |         let extra_stretch = (delta - adjustability) / justifiables.max(1) as f64;\n  611 |         // Normalize the amount by half the em size.\n  612 |         ratio = 1.0 + extra_stretch / (p.config.font_size / 2.0);\n  613 |     }","lines":7}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `measure_bodies`, the returned body width `measured_body_width.min(available_width - list.marker_width)` can be negative when the marker is wider than the available width (a wide marker in a narrow region), and `available_width` (`regions.size.x - list.indent - list.body_indent`) can itself already be negative. The result is later assigned to `body_regions.size.x` and used as a region width, which is an invalid negative size for subsequent layout.","fix":"Clamp the computed body width to be non-negative, e.g. `measured_body_width.min((available_width - list.marker_width).max(Abs::zero()))`, and guard `available_width` against going below zero.","locations":[{"ref":"crates/typst-layout/src/lists.rs:351-369","code":"  351 |     let available_width = regions.size.x - list.indent - list.body_indent;\n  352 |     let mut measured_body_width = Abs::zero();\n  353 |     for (item, (_, body_locator)) in items.iter().zip(locators) {\n  354 |         let body = crate::layout_frame(\n  355 |             engine,\n  356 |             &item.body,\n  357 |             body_locator.relayout(),\n  358 |             styles,\n  359 |             Region::new(Axes::new(available_width, Abs::inf()), Axes::splat(false)),\n  360 |         )?;\n  361 |         measured_body_width.set_max(body.width());\n  362 |     }\n  363 | \n  364 |     // If marker and body together exceed the page width, the marker gets the\n  365 |     // space it requested and the body the rest. This makes some sense since the\n  366 |     // marker comes first, is unlikely to be large, and is unlikely to be able\n  367 |     // to wrap. It also keeps consistency between the case where we measure the\n  368 |     // body and the case where we don't.\n  369 |     Ok(measured_body_width.min(available_width - list.marker_width))","lines":19},{"ref":"crates/typst-layout/src/lists.rs:448-457","code":"  448 |         let total_body_indent = list.indent + list.marker_width + list.body_indent;\n  449 | \n  450 |         // Restrict the body to the available space.\n  451 |         let mut body_regions = regions;\n  452 |         if let Some(body_width) = list.body_width {\n  453 |             body_regions.size.x = body_width;\n  454 |             body_regions.expand.x = true;\n  455 |         } else {\n  456 |             body_regions.size.x -= total_body_indent;\n  457 |         }","lines":10}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The unit-conversion test does not take the absolute value of the difference, so it only checks an upper bound, not closeness. `Abs::mm(150.0).to_cm() - 15.0` is compared with `< 1e-4`; if the conversion produced a value that was too *small* (e.g. 10.0, giving a difference of -5.0), the assertion `-5.0 < 1e-4` would still pass. The test thus cannot catch a whole class of regressions.","fix":"Use `assert!((Abs::mm(150.0).to_cm() - 15.0).abs() < 1e-4);` so the test asserts true approximate equality.","locations":[{"ref":"crates/typst-library/src/layout/abs.rs:282-285","code":"  282 |     #[test]\n  283 |     fn test_length_unit_conversion() {\n  284 |         assert!((Abs::mm(150.0).to_cm() - 15.0) < 1e-4);\n  285 |     }","lines":4}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Same defective approximate-equality pattern as in abs.rs: the angle-conversion test compares a signed difference against `1e-4` instead of its absolute value, so it only enforces an upper bound and would pass even if the converted value were far too small.","fix":"Wrap each difference in `.abs()` before the `< 1e-4` comparison, e.g. `assert!((Angle::rad(2.0 * PI).to_deg() - 360.0).abs() < 1e-4);`.","locations":[{"ref":"crates/typst-library/src/layout/angle.rs:274-278","code":"  274 |     #[test]\n  275 |     fn test_angle_unit_conversion() {\n  276 |         assert!((Angle::rad(2.0 * PI).to_deg() - 360.0) < 1e-4);\n  277 |         assert!((Angle::deg(45.0).to_rad() - std::f64::consts::FRAC_PI_4) < 1e-4);\n  278 |     }","lines":5}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Grid line validation accepts a degenerate zero-length line. For both hlines and vlines, `end` is documented as an exclusive end, so a valid line requires `start < end`. The validation only rejects `end.get() < start`, permitting `end.get() == start`, which describes a line that spans the empty range `start..start` and draws nothing. This silently produces a no-op line instead of reporting the user error.","fix":"Use `end.is_some_and(|end| end.get() <= start)` so that an empty range is reported with the existing \"line cannot end before it starts\" diagnostic (or a clearer message).","locations":[{"ref":"crates/typst-library/src/layout/grid/resolve.rs:1321-1323","code":" 1321 |                     if end.is_some_and(|end| end.get() < start) {\n 1322 |                         bail!(span, \"line cannot end before it starts\");\n 1323 |                     }","lines":3},{"ref":"crates/typst-library/src/layout/grid/resolve.rs:1371-1373","code":" 1371 |                     if end.is_some_and(|end| end.get() < start) {\n 1372 |                         bail!(span, \"line cannot end before it starts\");\n 1373 |                     }","lines":3}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"CSV row error reporting can produce inconsistent line numbers: when `err.kind().position()` is `Some`, `pos` is built from the byte offset (which the renderer maps to a line/column), but the human message for `UnequalLengths` is interpolated with the separately-computed `line` value (`enumerate index + line_offset`). These two line numbers can disagree, so the underline and the text can point at different lines.","fix":"Derive the human-readable line consistently from the same source as `pos` (e.g. compute the line from the byte position when available), or drop the explicit line number from the message and rely solely on `pos`.","locations":[{"ref":"crates/typst-library/src/loading/csv.rs:138-156","code":"  138 | fn format_csv_error(err: ::csv::Error, line: usize) -> LoadError {\n  139 |     let msg = \"failed to parse CSV\";\n  140 |     let pos = (err.kind().position())\n  141 |         .map(|pos| {\n  142 |             let start = pos.byte().saturating_as();\n  143 |             ReportTextPos::from(start..start)\n  144 |         })\n  145 |         .unwrap_or(LineCol::one_based(line, 1).into());\n  146 |     match err.kind() {\n  147 |         ::csv::ErrorKind::Utf8 { .. } => {\n  148 |             LoadError::text(pos, msg, \"file is not valid UTF-8\")\n  149 |         }\n  150 |         ::csv::ErrorKind::UnequalLengths { expected_len, len, .. } => {\n  151 |             let err =\n  152 |                 format!(\"found {len} instead of {expected_len} fields in line {line}\");\n  153 |             LoadError::text(pos, msg, err)\n  154 |         }\n  155 |         _ => LoadError::text(pos, \"failed to parse CSV\", err),\n  156 |     }","lines":19},{"ref":"crates/typst-library/src/loading/csv.rs:72-77","code":"   72 |     for (line, result) in reader.records().enumerate() {\n   73 |         // Original solution was to use line from error, but that is\n   74 |         // incorrect with `has_headers` set to `false`. See issue:\n   75 |         // https://github.com/BurntSushi/rust-csv/issues/184\n   76 |         let line = line + line_offset;\n   77 |         let row = result.map_err(|err| format_csv_error(err, line)).within(&loaded)?;","lines":6}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`Delimiter::find_matching` computes the matching delimiter for a generic opening/closing character via `char::from_u32(c as u32 + 1)` / `- 1`. If the arithmetic produces an invalid scalar value (e.g. a surrogate range or out-of-range codepoint), `char::from_u32` returns `None`, and the result becomes `Self(None)` — i.e. silently *no* delimiter — rather than falling back to the original character. This can drop a user's matrix/vector delimiter with no diagnostic.","fix":"Fall back to `Self(Some(c))` (the original delimiter) when `char::from_u32` returns `None`, mirroring the catch-all arm.","locations":[{"ref":"crates/typst-library/src/math/matrix.rs:311-324","code":"  311 |     pub fn find_matching(self) -> Self {\n  312 |         match self.0 {\n  313 |             None => Self::none(),\n  314 |             Some('[') => Self(Some(']')),\n  315 |             Some(']') => Self(Some('[')),\n  316 |             Some('{') => Self(Some('}')),\n  317 |             Some('}') => Self(Some('{')),\n  318 |             Some(c) => match default_math_class(c) {\n  319 |                 Some(MathClass::Opening) => Self(char::from_u32(c as u32 + 1)),\n  320 |                 Some(MathClass::Closing) => Self(char::from_u32(c as u32 - 1)),\n  321 |                 _ => Self(Some(c)),\n  322 |             },\n  323 |         }\n  324 |     }","lines":14}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `BibliographyElem::decode`, when a key is duplicated more than twice every occurrence after the first is pushed into `duplicates`, so the user-facing \"duplicate bibliography keys: ...\" error lists the same key repeatedly (e.g. `foo, foo`). Cosmetic, but produces noisy/confusing diagnostics for keys repeated 3+ times.","fix":"Deduplicate `duplicates` before joining (e.g. sort+dedup, or only push a key the first time a collision for it is detected).","locations":[{"ref":"crates/typst-library/src/model/bibliography.rs:383-400","code":"  383 |                 match map.entry(label) {\n  384 |                     indexmap::map::Entry::Vacant(vacant) => {\n  385 |                         vacant.insert(entry);\n  386 |                     }\n  387 |                     indexmap::map::Entry::Occupied(_) => {\n  388 |                         duplicates.push(entry.key().into());\n  389 |                     }\n  390 |                 }\n  391 |             }\n  392 |         }\n  393 | \n  394 |         if !duplicates.is_empty() {\n  395 |             // TODO: Store spans of entries for duplicate key error messages.\n  396 |             // Requires hayagriva entries to store their location, which should\n  397 |             // be fine, since they are 1kb anyway.\n  398 |             let span = data.first().unwrap().source.span;\n  399 |             bail!(span, \"duplicate bibliography keys: {}\", duplicates.join(\", \"));\n  400 |         }","lines":18}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`AnchorGenerator::identify` uses two independent counters that can produce colliding HTML element IDs. A reusable label `<loc>` appearing multiple times yields `loc-1`, `loc-2`, ... from `label_counter`, while non-reusable/auto targets yield `loc-1`, `loc-2`, ... from `loc_counter`. `disambiguate` only checks for collisions against existing document labels (`label_count > 0`), never against IDs already emitted in this run, so a `<loc>`-labeled element and an auto-id element can both receive `loc-1`. Duplicate `id` attributes break HTML fragment linking. Narrow edge case (needs a user label literally named `loc`).","fix":"Track the set of IDs already emitted by this generator and have `disambiguate` consult it too, or exclude the auto-id prefix (`loc`) from `can_use_label_as_id` so label-derived and auto-generated IDs can never share a namespace.","locations":[{"ref":"crates/typst-library/src/model/link.rs:538-555","code":"  538 |     pub fn identify(&mut self, label: Option<Label>) -> EcoString {\n  539 |         if let Some(label) = label {\n  540 |             let resolved = label.resolve();\n  541 |             let text = resolved.as_str();\n  542 |             if can_use_label_as_id(text) {\n  543 |                 if self.introspector.label_count(label) == 1 {\n  544 |                     return text.into cations":[{"ref":"crates/typst-library/src/model/par.rs:591-605","code":"  591 | impl Limit for Length {\n  592 |     fn checked_min(self) -> StrResult<Self> {\n  593 |         if self.abs > Abs::zero() || self.em > Em::zero() {\n  594 |             bail!(\"length must be negative or zero\");\n  595 |         }\n  596 |         Ok(self)\n  597 |     }\n  598 | \n  599 |     fn checked_max(self) -> StrResult<Self> {\n  600 |         if self.abs < Abs::zero() || self.em < Em::zero() {\n  601 |             bail!(\"length must be positive or zero\");\n  602 |         }\n  603 |         Ok(self)\n  604 |     }\n  605 | }","lines":15}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`FontAxis::distance` is asymmetric in how it computes the out-of-range penalty: for `target < min` it returns `distance(min, target)` but for `target >= max` it returns `distance(target, max)` (arguments swapped). This is only safe because the two concrete `distance` functions used (`FontStretch::distance` and `FontWeight::distance`) take an absolute value, so argument order is irrelevant. If a future caller passes a non-symmetric `distance` closure, the metric will be wrong for one side only. The asymmetry is a latent trap.","fix":"Use a consistent argument order on both branches (e.g. always `distance(target, bound)` or always `distance(bound, target)`), or document that the `distance` closure must be symmetric.","locations":[{"ref":"crates/typst-library/src/text/font/variations.rs:31-51","code":"   31 |     pub(super) fn distance<T, N>(\n   32 |         &self,\n   33 |         target: T,\n   34 |         parse: impl Fn(AxisValue) -> T,\n   35 |         distance: impl Fn(T, T) -> N,\n   36 |     ) -> N\n   37 |     where\n   38 |         T: Ord,\n   39 |         N: Default,\n   40 |     {\n   41 |         let min = parse(self.min);\n   42 |         let max = parse(self.max);\n   43 |         if target < min {\n   44 | ations":[{"ref":"crates/typst-library/src/text/font/variations.rs:143-186","code":"  143 |         let mut set = |axis: &FontAxis, value: AxisValue| {\n  144 |             variations.0.push((axis.tag, value.clamp(axis)));\n  145 |         };\n  146 | \n  147 |         let axes = StandardAxes::parse(axes);\n  148 | \n  149 |         match (variant.style, axes.ital, axes.slnt) {\n  150 |             // Don't need to do anything or can't do anything.\n  151 |             (FontStyle::Normal, ..) | (_, None, None) => {}\n  152 | \n  153 |             // Serve italic due to request or as fallback for oblique.\n  154 |             (FontStyle::Italic, Some(axis), _)\n  155 |             | (FontStyle::Oblique, Some(axis), None) => {\n  156 |                 // Set to 1.0 for italic, but avoid exceeding the axis' range.\n  157 |                 set(axis, AxisValue(axis.max.0.min(1.0)));\n  158 |             }\n  159 | \n  160 |             // Serve oblique due to request or as fallback for italic.\n  161 |             (FontStyle::Oblique, _, Some(axis))\n  162 |             | (FontStyle::Italic, None, Some(axis)) => {\n  163 |                 // Slant values are clockwise and a typical italic is\n  164 |                 // counter-clockwise, so negative values are desirable. If the\n  165 |                 // axis doesn't support negative slant, however, we prefer,\n  166 |                 // positive slant over no slant at all.\n  167 |                 if axis.min.0 < 0.0 {\n  168 |                     set(axis, axis.min);\n  169 |                 } else if axis.max.0 > 0.0 {\n  170 |                     set(axis, axis.max);\n  171 |                 }\n  172 |             }\n  173 |         }\n  174 | \n  175 |         if let Some(axis) = axes.wdth {\n  176 |             set(axis, variant.stretch.to_wdth());\n  177 |         }\n  178 | \n  179 |         if let Some(axis) = axes.wght {\n  180 |             set(axis, variant.weight.to_wght());\n  181 |         }\n  182 | \n  183 |         if let Some(axis) = axes.opsz {\n  184 |             set(axis, AxisValue(size.to_pt() as f32));\n  185 |         }\n  186 | ","lines":44}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`SmartQuoter::push` silently drops quote-open events once nesting depth reaches 32 (`if self.depth < 32`). When more than 32 nested quotes are opened, the extra opening quotes still emit an opening glyph (via `quotes.open`) but are not recorded on the stack, so the corresponding closing quotes later desynchronize the depth/kinds bookkeeping and produce wrong open/close decisions for the remainder of the run. This is an obscure edge case but yields silently incorrect typography rather than a clean fallback.","fix":"Either saturate gracefully (keep emitting opens but track an overflow counter so closes stay balanced) or document/clamp the behavior explicitly; at minimum avoid the stack going out of sync with emitted glyphs.","locations":[{"ref":"crates/typst-library/src/text/smartquote.rs:163-176","code":"  163 |     /// Push onto the quotation stack.\n  164 |     fn push(&mut self, double: bool) {\n  165 |         if self.depth < 32 {\n  166 |             self.kinds |= (double as u32) << self.depth;\n  167 |             self.depth += 1;\n  168 |         }\n  169 |     }\n  170 | \n  171 |     /// Pop from the quotation stack.\n  172 |     fn pop(&mut self) {\n  173 |         self.depth -= 1;\n  174 |         self.kinds &= (1 << self.depth) - 1;\n  175 |     }\n  176 | }","lines":14},{"ref":"crates/typst-library/src/text/smartquote.rs:116-155","code":"  116 |     pub fn quote<'a>(\n  117 |         &mut self,\n  118 |         before: Option<char>,\n  119 |         quotes: &SmartQuotes<'a>,\n  120 |         double: bool,\n  121 |     ) -> &'a str {\n  122 |         let opened = self.top();\n  123 |         let before = before.unwrap_or(' ');\n  124 | \n  125 |         // If we are after a number and haven't most he `ProcessColor` Eq/Hash consistency (see the high-severity finding) resolves this transitively; verify `SpotColorant` equality semantics are intended to match its `Hash`.","locations":[{"ref":"crates/typst-library/src/visualize/color.rs:2302-2309","code":" 2302 | #[derive(Debug, Clone, Eq, PartialEq, Hash)]\n 2303 | #[ty(scope, name = \"spot\", title = \"Spot Colorant\")]\n 2304 | pub struct SpotColorant {\n 2305 |     /// Name of the spot colorant to use, if any.\n 2306 |     pub name: Option<SpotColorantName>,\n 2307 |     /// How to render this color if the specified colorant is not available.\n 2308 |     pub fallback: ProcessColor,\n 2309 | }","lines":8},{"ref":"crates/typst-library/src/visualize/color.rs:2497-2505","code":" 2497 |             Verdict::MayBeSpot(colorant) => {\n 2498 |                 verdict = match color.space() {\n 2499 |                     ColorSpace::Spot(other) if &other == colorant => verdict,\n 2500 |                     _ => Verdict::fallback(),\n 2501 |                 }\n 2502 |             }\n 2503 |             Verdict::Space(_) => break,\n 2504 |         }\n 2505 |     }","lines":9}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Gradient::sample_at` normalizes coordinates as `x / width`, `y / height` and, for the linear case, also divides by `factor = sin.abs() + cos.abs()` and (in conic) by aspect ratio, without guarding against a zero `width`/`height`. A zero-sized container yields NaN/inf `t`; the final `t.clamp(0.0, 1.0)` does not sanitize NaN (NaN.clamp returns NaN in Rust), so a NaN can flow into `sample` -> `partition_point`, producing an arbitrary stop selection.","fix":"Guard against zero/non-finite `width`/`height` (return the first stop's color) and replace the final clamp with a NaN-safe normalization, e.g. `if !t.is_finite() { 0.0 } else { t.clamp(0.0, 1.0) }`.","locations":[{"ref":"crates/typst-library/src/visualize/gradient.rs:908-972","code":"  90 rho = (cr * cr) - (q - p).hypot2();\n  948 |                     let bz = ((az * az) + rho).sqrt() - az;\n  949 | \n  950 |                     ((z - q).hypot() - fr) / (bz - fr)\n  951 |                 }\n  952 |             }\n  953 |             Self::Conic(conic) => {\n  954 |                 // The x and y coordinates have been transformed into ratios to\n  955 |                 // compute the position relative to the gradient center.\n  956 |                 let x = x as f64 - conic.center.x.get();\n  957 |                 let y = y as f64 - conic.center.y.get();\n  958 | \n  959 |                 // Transform the angle computed from the ratio positions back\n  960 |                 // into the screen space, to correct for the aspect ratio.\n  961 |                 let sample_angle = Gradient::correct_aspect_ratio(\n  962 |                     Angle::atan2(y, x),\n  963 |                     Ratio::new((width / height) as f64),\n  964 |                 );\n  965 | \n  966 |                 // Negate conic angle for clockwise rotation.\n  967 |                 (Angle::rad(PI) + sample_angle - conic.angle).normalized().to_rad() / TAU\n  968 |             }\n  969 |         };\n  970 | \n  971 |         self.sample(RatioOrAngle::Ratio(Ratio::new(t.clamp(0.0, 1.0))))\n  972 |     }","lines":65}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `convert_paint`, negative rectangle dimensions are detected via `rect.x.signum() < 1.0`. `Abs::signum()` returns 0.0 for an exactly-zero length, and `0.0 < 1.0` is true, so a zero-width or zero-height rect is treated as if it were negative: the offset is shifted by `size` (0) and the size is multiplied by -1 (still 0). The net effect is harmless for true zeros, but the condition is misleading and differs from the intended `signum() < 0.0` / `< 0` check used elsewhere; a value with `signum() == 0` should not enter the negative-size branch.","fix":"Test the sign ck(1))\n  879 |     }\n  880 | }","lines":8},{"ref":"crates/typst-syntax/src/parser.rs:225-233","code":"  225 | fn equation(p: &mut Parser) {\n  226 |     let m = p.marker();\n  227 |     p.enter_modes(SyntaxMode::Math, AtNewline::Continue, |p| {\n  228 |         p.assert(SyntaxKind::Dollar);\n  229 |         math(p, syntax_set!(Dollar, End));\n  230 |         p.expect_closing_delimiter(m, SyntaxKind::Dollar);\n  231 |     });\n  232 |     p.wrap(m, SyntaxKind::Equation);\n  233 | }","lines":9}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Numeric::get` recomputes the numeric value / unit split by counting trailing chars in `'a'..='z' | '%'`, duplicating (and slightly diverging from) the suffix logic in the lexer's `number()`. The lexer reads a suffix with `c.is_ascii_alphanumeric() || c == '%'` (uppercase allowed) and only blesses a fixed lowercase set as valid `Numeric` suffixes. The AST re-parse silently relies on the invariant that valid `Numeric` text only ever has lowercase suffixes. This is currently true, but the two pieces of suffix knowledge are independent: if a new uppercase or digit-containing unit were ever accepted by the lexer, `Numeric::get` would split at the wrong byte and `text[..split].parse()` would yield a wrong value via `unwrap_or_default()` (silent 0.0) rather than an error. The unit-matching `match` also maps the unreachable `_` arm to `Unit::Percent`, so an unexpected suffix becomes a percentage rather than being rejected.","fix":"Centralize the suffix set (e.g. a shared `const`/function listing the valid units) used by both the lexer and `Numeric::get`, and make the `_` arm in the unit match unreachable!()/debug_assert rather than defaulting to `Percent`.","locations":[{"ref":"crates/typst-syntax/src/ast.rs:1379-1406","code":" 1379 | impl Numeric<'_> {\n 1380 |     /// Get the numeric value and unit.\n 1381 |     pub fn get(self) -> (f64, Unit) {\n 1382 |         let text = self.0.leaf_text();\n 1383 |         let count = text\n 1384 |             .chars()\n 1385 |             .rev()\n 1386 |             .take_while(|c| matches!(c, 'a'..='z' | '%'))\n 1387 |             .count();\n 1388 | \n 1389 |         let split = text.len() - count;\n 1390 |         let value = text[..split].parse().unwrap_or_default();\n 1391 |         let unit = match &text[split..] {\n 1392 |             \"pt\" => Unit::Pt,\n 1393 |             \"mm\" => Unit::Mm,\n 1394 |             \"cm\" => Unit::Cm,\n 1395 |             \"in\" => Unit::In,\n 1396 |             \"deg\" => Unit::Deg,\n 1397 |             \"rad\" => Unit::Rad,\n 1398 |             \"em\" => Unit::Em,\n 1399 |             \"fr\" => Unit::Fr,\n 1400 |             \"%\" => Unit::Percent,\n 1401 |             _ => Unit::Percent,\n 1402 |         };\n 1403 | \n 1404 |         (value, unit)\n 1405 |     }\n 1406 | }","lines":28},{"ref":"crates/typst-syntax/src/lexer.rs:1002-1019","code":" 1002 |         let number = self.s.from(start);\n 1003 |         let suffix = self.s.eat_while(|c: char| c.is_ascii_alphanumeric() || c == '%');\n 1004 | \n 1005 |         // Parse large integer literals as floats\n 1006 |         if base == 10\n 1007 |             && !is_float\n 1008 |             && let Err(e) = i64::from_str_radix(number, base)\n 1009 |             && matches!(e.kind(), IntErrorKind::PosOverflow | IntErrorKind::NegOverflow)\n 1010 |             && number.parse::<f64>().is_ok()\n 1011 |         {\n 1012 |             is_float = true;\n 1013 |         }\n 1014 | \n 1015 |         let mut suffix_result = match suffix {\n 1016 |             \"\" => Ok(None),\n 1017 |             \"pt\" | \"mm\" | \"cm\" | \"in\" | \"deg\" | \"rad\" | \"em\" | \"fr\" | \"%\" => Ok(Some(())),\n 1018 |             _ => Err(eco_format!(\"invalid number suffix: `{suffix}`\")),\n 1019 |         };","lines":18}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`DurationDisplay` formats a duration of exactly one second as `1000 ms` rather than `1 s`. The seconds branch is gated on `self.0 > Duration::from_secs(1)` (strictly greater), so at exactly 1 s control falls through to the `self.0 > Duration::from_millis(1)` branch, printing `1000 ms`. The threshold should be inclusive.","fix":"Use `self.0 >= Duration::from_secs(1)` for the seconds branch (and review the ms/µs boundaries similarly) so exact-second durations render as `s`.","locations":[{"ref":"crates/typst-utils/src/duration.rs:52-65","code":"   52 |         if nanos == 0 || self.0 > Duration::from_secs(1) {\n   53 |             // For durations > 5 min, we drop the fractional part.\n   54 |             if self.0 > Duration::from_secs(300) {\n   55 |                 piece!(\"{secs} s\");\n   56 |             } else {\n   57 |                 piece!(\"{} s\", fract(3));\n   58 |             }\n   59 |         } else if self.0 > Duration::from_millis(1) {\n   60 |             piece!(\"{} ms\", fract(2));\n   61 |         } else if self.0 > Duration::from_micros(1) {\n   62 |             piece!(\"{} µs\", fract(1));\n   63 |         } else {\n   64 |             piece!(\"{} ns\", fract(0));\n   65 |         }","lines":14}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`greet()` writes the greeted-marker file with `std::fs::write(&path, version).ok()` before printing the greeting, but does not create the parent `typst` directory first. If `~/.local/share/typst` (or platform equivalent) does not yet exist, the write fails silently (`.ok()`), so the marker is never persisted and the full greeting is shown again on every invocation until some other code creates that directory.","fix":"`fs::create_dir_all(path.parent())` before writing the marker file so the greeting is correctly recorded as shown.","locations":[{"ref":"crates/typst-cli/src/greet.rs:27-39","code":"   27 | pub fn greet() {\n   28 |     let Some(data_dir) = dirs::data_dir() else { return };\n   29 |     let path = data_dir.join(\"typst\").join(\"greeted\");\n   30 | \n   31 |     let version = typst::utils::version().raw();\n   32 |     let prev_greet = std::fs::read_to_string(&path).ok();\n   33 |     if prev_greet.as_deref() == Some(version) {\n   34 |         return;\n   35 |     };\n   36 | \n   37 |     std::fs::write(&path, version).ok();\n   38 |     print_and_exit(GREETING);\n   39 | }","lines":13}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`update` computes `current_tag = typst::utils::version().raw().parse().unwrap()` and again in `update_needed`. Both `unwrap()` the parse of the embedded version string. If the build embeds a non-semver version string (e.g. a custom distro tag), the update command panics instead of producing a clean error. The version string is build-controlled, so this is low-likelihood, but the duplicated `.unwrap()` parsing of the same value in two places is fragile.","fix":"Parse the current version once into a helper returning `StrResult<Version>` and reuse it, converting a parse failure into a user-facing error.","locations":[{"ref":"crates/typst-cli/src/update.rs:49","code":"   49 |         let current_tag = typst::utils::version().raw().parse().unwrap();","lines":1},{"ref":"crates/typst-cli/src/update.rs:227","code":"  227 |     let current_tag: Version = typst::utils::version().raw().parse().unwrap();","lines":1}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`DedupId::fmt` trims leading `'0'` hex digits from the 128-bit hash with `trim_start_matches('0')`. For the (vanishingly unlikely) hash value `0`, all 32 digits are trimmed, yielding an id consisting of only the single kind character (e.g. `\"g\"`). This is still unique among ids of the same kind, but the id is no longer a fixed-width/identifiable hex string and trims to a degenerate form.","fix":"Keep at least one digit, e.g. trim but ensure a minimum length of one hex char after the kind prefix.","locations":[{"ref":"crates/typst-svg/src/lib.rs:537-545","code":"  537 |         let mut digits = [0; 32];\n  538 |         for (i, byte) in hash.to_be_bytes().into_iter().enumerate() {\n  539 |             digits[2 * i] = to_hex_digit((byte >> 4) & 0x0F);\n  540 |             digits[2 * i + 1] = to_hex_digit(byte & 0x0F);\n  541 |         }\n  542 | \n  543 |         // The digits are all valid ASCII hex characters.\n  544 |         let str = std::str::from_utf8(&digits).unwrap();\n  545 |         f.push_str(str.trim_start_matches('0'));","lines":9}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"Copy-paste bug in the gradient-stop interpolation condition: `gradient.space() == ColorSpace::Process(ProcessColorSpace::Oklab)` is checked twice with identical operands. The second comparison was clearly meant to test a different color space (almost certainly `Oklch`, the other perceptual space that needs intermediate RGB stops). As written the `||` is redundant and Oklch gradients do not get the extra intermediate stops, producing visibly wrong gradient interpolation for Oklch.","fix":"Change the second branch to the intended space, e.g. `|| gradient.space() == ColorSpace::Process(ProcessColorSpace::Oklch)`.","locations":[{"ref":"crates/typst-pdf/src/paint.rs:332-336","code":"  332 |                     && (gradient.space().hue_index().is_some()\n  333 |                         || gradient.space()\n  334 |                             == ColorSpace::Process(ProcessColorSpace::Oklab)\n  335 |                         || gradient.space()\n  336 |                             == ColorSpace::Process(ProcessColorSpace::Oklab))","lines":5}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The doc comment for `RowState::is_being_repeated` is self-contradictory due to a copy-paste error: it says the value is `false` when a header row is laid out the first time, and also `false` for any other time. Both branches say `false`, so the documented meaning is meaningless. Based on the field name and the footer counterpart described right after (true on repetition), the first occurrence should document `false` the first time and `true` on later (repeated) layouts.","fix":"Change the second `false` to `true`: 'This is `false` if a header row is laid out the first time, and `true` for any other time.'","locations":[{"ref":"crates/typst-layout/src/grid/layouter.rs:186-189","code":"  186 |     /// This is `false` if a header row is laid out the first time, and `false`\n  187 |     /// for any other time. For footers it's the opposite, this will be `true`\n  188 |     /// the last time the footer is laid out, and `false` for all previous\n  189 |     /// occurrences.","lines":4}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"`DocumentIntrospection::diagnose` passes `\"path\"` as the `output_kind_plural` argument to `format_convergence_warning`, but this introspection is about the *document* that contains an element, not its path. This is a copy-paste from `PathIntrospection` (which correctly uses \"path\"). The convergence warning hint will read 'the following path were observed' for a document-location introspection.","fix":"Change the `output_kind_plural` argument to something like \"documents\" for `DocumentIntrospection`.","locations":[{"ref":"crates/typst-library/src/introspection/location.rs:349-358","code":"  349 |     fn diagnose(&self, history: &History<Self::Output>) -> SourceDiagnostic {\n  350 |         format_convergence_warning(\n  351 |             self.0,\n  352 |             self.1,\n  353 |             history,\n  354 |             \"path\",\n  355 |             |element| eco_format!(\"document in which the {element} is located\"),\n  356 |             |_loc| eco_format!(\"TODO\"),\n  357 |         )\n  358 |     }","lines":10},{"ref":"crates/typst-library/src/introspection/location.rs:315-331","code":"  315 |     fn diagnose(&self, history: &History<Self::Output>) -> SourceDiagnostic {\n  316 |         format_convergence_warning(\n  317 |             self.0,\n  318 |             self.1,\n  319 |             history,\n  320 |             \"path\",\n  321 |             |element| {\n  322 |                 eco_format!(\"path of the document in which the {element} is located\")\n  323 |             },\n  324 |             |path| {\n  325 |                 eco_format!(\n  326 |                     \"`{}`\",\n  327 |                     path.as_ref().map(|p| p.get_with_slash()).into_value().repr()\n  328 |                 )\n  329 |             },\n  330 |         )\n  331 |     }","lines":17}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`write_deps_make` writes the dependency-file output even when every output path and every dependency path is non-UTF-8 and thus skipped. The function comment for the inner skips says it still produces a usable rule, but if all paths are skipped it writes a file containing just `:` and a newline (an empty, meaningless Make rule) rather than reporting that no usable rule could be produced. More importantly, when the *output* targets are all skippable the rule becomes `: deps...` with an empty target, which is invalid Make syntax.","fix":"Track whether at least one output target was written; if none were, return an error (or skip writing the file) instead of emitting a rule with an empty target.","locations":[{"ref":"crates/typst-cli/src/deps.rs:84-126","code":"   84 | fn write_deps_make(\n   85 |     world: &mut SystemWorld,\n   86 |     dest: &Output,\n   87 |     outputs: &[Output],\n   88 | ) -> io::Result<()> {\n   89 |     let mut buffer = Vec::new();\n   90 |     for (i, output) in outputs.iter().enumerate() {\n   91 |         let path = match output {\n   92 |             Output::Path(path) => path.as_os_str(),\n   93 |             Output::Stdout => {\n   94 |                 return Err(io::Error::new(\n   95 |                     io::ErrorKind::InvalidInput,\n   96 |                     \"make dependencies contain the output path, \\\n   97 |                      but the output was stdout\",\n   98 |                 ));\n   99 |             }\n  100 |         };\n  101 | \n  102 |         // Silently skip paths that aren't valid Unicode so we still\n  103 |         // produce a rule that will work for the other paths that can be\n  104 |         // processed.\n  105 |         let Some(string) = path.to_str() else { continue };\n  106 |         if i != 0 {\n  107 |             buffer.write_all(b\" \")?;\n  108 |         }\n  109 |         buffer.write_all(munge(string).as_bytes())?;\n  110 |     }\n  111 | \n  112 |     // Only create the deps file in case of valid output paths.\n  113 |     let mut dest = dest.open()?;\n  114 |     dest.write_all(&buffer)?;\n  115 |     dest.write_all(b\":\")?;\n  116 | \n  117 |     for dep in relative_dependencies(world)? {\n  118 |         // See above.\n  119 |         let Some(string) = dep.to_str() else { continue };\n  120 |         dest.write_all(b\" \")?;\n  121 |         dest.write_all(munge(string).as_bytes())?;\n  122 |     }\n  123 |     dest.write_all(b\"\\n\")?;\n  124 | \n  125 |     Ok(())\n  126 | }","lines":43}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"On `self_replace` failure, the temp binary is removed via `fs::remove_file(&temp_exe).ok()`, but `temp_exe` is a `NamedTempFile` that already removes itself on drop. The manual removal is redundant and, on Windows where the file may still be open/locked by `self_replace`, can race with the `NamedTempFile` drop cleanup. More notably, the error closure returns the error string but ignores the result of the manual removal, so a failed cleanup is silent.","fix":"Drop the manual `fs::remove_file` and rely on `NamedTempFile`'s automatic cleanup, or use `keep()`/explicit close semantics if self_replace needs the path to persist.","locations":[{"ref":"crates/typst-cli/src/update.rs:103-112","code":"  103 |     let mut temp_exe = NamedTempFile::new()\n  104 |         .map_err(|err| eco_format!(\"failed to create temporary file ({err})\"))?;\n  105 |     temp_exe\n  106 |         .write_all(&binary_data)\n  107 |         .map_err(|err| eco_format!(\"failed to write binary data ({err})\"))?;\n  108 | \n  109 |     self_replace::self_replace(&temp_exe).map_err(|err| {\n  110 |         fs::remove_file(&temp_exe).ok();\n  111 |         eco_format!(\"failed to self-replace running executable ({err})\")\n  112 |     })","lines":10}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `Dict` evaluation, a keyed entry whose key fails to cast to `Str` records the cast errors but substitutes `Str::default()` (empty string) and continues inserting subsequent entries into the map. If multiple keyed entries are invalid they all collapse to the same empty-string key, overwriting each other in the `IndexMap` before the function finally returns the collected errors. While the errors are eventually returned (so compilation fails), the transient map state is wrong and the pattern is fragile: any future change that uses the map before the `invalid_keys.is_empty()` check would observe silently corrupted data.","fix":"Short-circuit: on the first invalid key, stop inserting (or skip the insert for invalid keys) rather than inserting a default empty-string key, since the result is discarded anyway when `invalid_keys` is non-empty.","locations":[{"ref":"crates/typst-eval/src/code.rs:291-311","code":"  291 |                 ast::DictItem::Keyed(keyed) => {\n  292 |                     let raw_key = keyed.key();\n  293 |                     let key = raw_key.eval(vm)?;\n  294 |                     let key =\n  295 |                         key.cast::<Str>().at(raw_key.span()).unwrap_or_else(|errors| {\n  296 |                             invalid_keys.extend(errors);\n  297 |                             Str::default()\n  298 |                         });\n  299 |                     map.insert(key, keyed.expr().eval(vm)?);\n  300 |                 }\n  301 |                 ast::DictItem::Spread(spread) => match spread.expr().eval(vm)? {\n  302 |                     Value::None => {}\n  303 |                     Value::Dict(dict) => map.extend(dict),\n  304 |                     v => bail!(spread.span(), \"cannot spread {} into dictionary\", v.ty()),\n  305 |                 },\n  306 |             }\n  307 |         }\n  308 | \n  309 |         if !invalid_keys.is_empty() {\n  310 |             return Err(invalid_keys);\n  311 |         }","lines":21}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the `ImageCandidate` cast, `v.take(\"width\").ok()` and `v.take(\"density\").ok()` discard any error from `Dict::take`. Since `v.finish(&[\"src\", \"width\", \"density\"])` later rejects unknown keys, the only error `take` can produce for these known keys is a missing-key error, so `.ok()` is effectively `None`-on-absent, which is fine; however, using `.ok()` to convert errors to `None` is fragile if `take` ever gains other failure modes and silently hides them.","fix":"Use an explicit optional-take API (e.g. a `take_optional`/`get` variant) that distinguishes \"absent\" from \"present but invalid\" instead of swallowing errors with `.ok()`.","locations":[{"ref":"crates/typst-html/src/typed.rs:677-681","code":"  677 |         let width: Option<NonZeroU64> =\n  678 |             v.take(\"width\").ok().map(Value::cast).transpose()?;\n  679 |         let density: Option<PositiveF64> =\n  680 |             v.take(\"density\").ok().map(Value::cast).transpose()?;\n  681 |         v.finish(&[\"src\", \"width\", \"density\"])?;","lines":5}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`with_cert_path` documents that 'If the certificate cannot be read, it is ignored', but the implementation propagates the read/parse error: `cert()` returns `Some(Err(..))` and `stream()` does `cert?.clone()`, aborting the whole download with the certificate error. The behavior contradicts the documented contract; a malformed custom cert path will fail every network request instead of being silently ignored.","fix":"Either change the doc comment to state that an unreadable certificate causes a network error, or actually ignore the error (e.g. log and proceed without the custom cert) to match the documented contract.","locations":[{"ref":"crates/typst-kit/src/downloader.rs:116-145","code":"  116 |     /// Creates a new downloader with the given user agent and certificate path.\n  117 |     ///\n  118 |     /// If the certificate cannot be read, it is ignored.\n  119 |     pub fn with_cert_path(user_agent: impl Into<EcoString>, cert_path: PathBuf) -> Self {\n  120 |         Self {\n  121 |             user_agent: user_agent.into(),\n  122 |             cert_path: Some(cert_path),\n  123 |             cert: OnceCell::new(),\n  124 |         }\n  125 |     }\n  126 | \n  127 |     /// Returns the certificate this client is using, if a custom certificate is\n  128 |     /// used it is loaded on first access.\n  129 |     ///\n  130 |     /// - Returns `None` if no certificate was configured.\n  131 |     /// - Returns `Some(Ok(cert))` if the certificate was loaded successfully.\n  132 |     /// - Returns `Some(Err(err))` if an error occurred while loading the\n  133 |     ///   certificate.\n  134 |     fn cert(&self) -> Option<io::Result<&Certificate>> {\n  135 |         if let Some(cert) = self.cert.get() {\n  136 |             return Some(Ok(cert));\n  137 |         }\n  138 | \n  139 |         self.cert_path.as_ref().map(|path| {\n  140 |             self.cert.get_or_try_init(|| {\n  141 |                 let pem = std::fs::read(path)?;\n  142 |                 Certificate::from_pem(&pem).map_err(io::Error::other)\n  143 |             })\n  144 |         })\n  145 |     }","lines":30},{"ref":"crates/typst-kit/src/downloader.rs:169-172","code":"  169 |         // Apply a custom CA certificate if present.\n  170 |         if let Some(cert) = self.cert() {\n  171 |             tls.add_root_certificate(cert?.clone());\n  172 |         }","lines":4}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Version::component` zips `self.0.iter()` with `COMPONENTS`, so a named component is only found when the version actually has that many elements. The doc comment promises it returns 0 when the version isn't specified to the necessary length, and `Ord`/`at()` both treat missing trailing components as 0. But `version(1).minor` or `version(1, 2).patch` yields `None`, which `foundations/fields.rs` turns into a 'does not contain field' error instead of returning 0. This contradicts the documented behavior and is inconsistent with the sibling `at(index)` accessor which does return 0 for positive out-of-range indices.","fix":"Look up the name's fixed position in `COMPONENTS` and return `self.0.get(pos).copied().unwrap_or(0) as i64` for any of the three known component names, only erroring for genuinely unknown names.","locations":[{"ref":"crates/typst-library/src/foundations/version.rs:38-48","code":"   38 |     /// Get a named component of a version.\n   39 |     ///\n   40 |     /// Always non-negative. Returns `0` if the version isn't specified to the\n   41 |     /// necessary length.\n   42 |     pub fn component(&self, name: &str) -> StrResult<i64> {\n   43 |         self.0\n   44 |             .iter()\n   45 |             .zip(Self::COMPONENTS)\n   46 |             .find_map(|(&i, s)| (s == name).then_some(i as i64))\n   47 |             .ok_or_else(|| \"unknown version component\".into())\n   48 |     }","lines":11}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`PositionIntrospection::introspect` silently maps an HTML position (or a missing position) to `PagedPosition::ORIGIN` (page 1, (0,0)). For an HTML document, calling `location.position()` therefore returns a meaningless page-1 origin instead of an error, which can mask bugs in user code. The source even has a `// Maybe error here instead?` note acknowledging this.","fix":"Return a `SourceResult`/error (or `None`) when the position is not a paged position, rather than fabricating an origin coordinate; at minimum resolve the inline TODO comment with a decision.","locations":[{"ref":"crates/typst-library/src/introspection/position.rs:179-189","code":"","lines":11},{"ref":"crates/typst-library/src/introspection/location.rs:184-189","code":"  184 |         match introspector.position(self.0) {\n  185 |             Some(DocumentPosition::Paged(pos)) => pos,\n  186 |             // Maybe error here instead?\n  187 |             Some(DocumentPosition::Html(_)) | None => PagedPosition::ORIGIN,\n  188 |         }\n  189 |     }","lines":6}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Size::aspect_ratio` divides width by height with no guard against a zero or non-finite height. `self.x / self.y` (Abs / Abs) yields an `f64`; when `y` is zero this produces `inf`/`NaN`, and `Ratio::new` will store that non-finite value. Callers like `Gradient::correct_aspect_ratio` then call `aspect_ratio.get().abs()` and divide by it, propagating the non-finite value into angle math. A zero-height frame is reachable (e.g. an empty/collapsed container).","fix":"Guard against a zero/non-finite height, e.g. return `Ratio::one()` (or otherwise a sane default) when `self.y.approx_empty()` or the quotient is not finite.","locations":[{"ref":"crates/typst-library/src/layout/size.rs:27-29","code":"   27 |     pub fn aspect_ratio(self) -> Ratio {\n   28 |         Ratio::new(self.x / self.y)\n   29 |     }","lines":3}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`localized_str` ends with `english_bundle.get(key).unwrap()`, which panics if a translation key is missing from the English bundle (or if any of the three `parse_language_bundle(...).unwrap()` calls return an error for a malformed bundled translation file). While the English bundle is expected to be complete, a missing key (e.g. a newly referenced `LocalName::KEY` not yet added to `en.txt`) turns into a hard panic during layout rather than a graceful fallback. The behavior is documented but is a fragile invariant enforced only at runtime.","fix":"Consider falling back to the key name or an empty string instead of `unwrap()`, or add a compile-time/test-time check that guarantees every `LocalName::KEY` exists in `en.txt`.","locations":[{"ref":"crates/typst-library/src/text/lang.rs:638-650","code":"  638 | #[comemo::memoize]\n  639 | pub fn localized_str(lang: Lang, region: Option<Region>, key: &str) -> &'static str {\n  640 |     let lang_region_bundle = parse_language_bundle(lang, region).unwrap();\n  641 |     if let Some(str) = lang_region_bundle.get(key) {\n  642 |         return str;\n  643 |     }\n  644 |     let lang_bundle = parse_language_bundle(lang, None).unwrap();\n  645 |     if let Some(str) = lang_bundle.get(key) {\n  646 |         return str;\n  647 |     }\n  648 |     let english_bundle = parse_language_bundle(Lang::ENGLISH, None).unwrap();\n  649 |     english_bundle.get(key).unwrap()\n  650 | }","lines":13}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `RasterImage::new_impl`, the pixel-data path uses `ImageBuffer::from_raw(...).unwrap()` inside the `to::<P>` helper. The size check above (`expected_size as usize != data.len()`) is intended to guarantee this never fails, but the unwrap couples correctness of a public decode path to that pre-check; any future mismatch (e.g. subpixel-count assumptions per `P`) turns into a panic rather than a returned error.","fix":"Return an error from the helper (propagate via `?`) instead of `unwrap()`, e.g. `ImageBuffer::from_raw(...).ok_or(\"pixel dimensions and pixel data do not match\")?`.","locations":[{"ref":"crates/typst-library/src/visualize/image/raster.rs:125-138","code":"  125 |                 fn to<P: Pixel<Subpixel = u8>>(\n  126 |                     data: &Bytes,\n  127 |                     format: PixelFormat,\n  128 |                 ) -> ImageBuffer<P, Vec<u8>> {\n  129 |                     ImageBuffer::from_raw(format.width, format.height, data.to_vec())\n  130 |                         .unwrap()\n  131 |                 }\n  132 | \n  133 |                 let dynamic = match format.encoding {\n  134 |                     PixelEncoding::Rgb8 => to::<image::Rgb<u8>>(&data, format).into(),\n  135 |                     PixelEncoding::Rgba8 => to::<image::Rgba<u8>>(&data, format).into(),\n  136 |                     PixelEncoding::Luma8 => to::<image::Luma<u8>>(&data, format).into(),\n  137 |                     PixelEncoding::Lumaa8 => to::<image::LumaA<u8>>(&data, format).into(),\n  138 |                 };","lines":14}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`finish` handles `KrillaError::SixteenBitImage(image, _)` by `gc.image_to_spans.get(&image).unwrap()`. `image_to_spans` is only populated for raster images that successfully pass through `convert_raster` (and only the first occurrence is stored); if krilla reports a 16-bit image whose krilla `Image` handle is not present in the map (e.g. constructed via a path that didn't insert into `image_to_spans`, or a hash mismatch), the `unwrap()` panics during the error-reporting path, masking the real diagnostic with an internal panic.","fix":"Fall back to a detached span when the lookup misses, e.g. `let span = gc.image_to_spans.get(&image).copied().unwrap_or_else(Span::detached);`.","locations":[{"ref":"crates/typst-pdf/src/convert.rs:464-470","code":"  464 |             KrillaError::SixteenBitImage(image, _) => {\n  465 |                 let span = gc.image_to_spans.get(&image).unwrap();\n  466 |                 bail!(\n  467 |                     *span, \"16 bit images are not supported in this export mode\";\n  468 |                     hint: \"convert the image to 8 bit instead\";\n  469 |                 )\n  470 |             }","lines":7}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Str::get` slices the leaf text as `&text[1..text.len() - 1]` to strip the surrounding quotes, assuming a `Str` leaf always has at least two bytes (both quotes). This holds for parser output (an unclosed string becomes an `Error` node, not `Str`), but the method is `pub` and the `ast` module's own doc-contract is that AST accessors must never panic even on a hand-constructed/invalid CST. A `Str` node whose text is `\"` (length 1) or empty would underflow `text.len() - 1` / panic on the slice. Every other accessor in this file is written defensively (the file even `#![deny(clippy::panic, clippy::unwrap_used, ...)]`); this slice is the one place that can panic on a malformed leaf.","fix":"Guard the bounds, e.g. `let unquoted = text.strip_prefix('\"').and_then(|t| t.strip_suffix('\"')).unwrap_or(text);` before processing escapes.","locations":[{"ref":"crates/typst-syntax/src/ast.rs:1436-1443","code":" 1436 | impl Str<'_> {\n 1437 |     /// Get the string value with resolved escape sequences.\n 1438 |     pub fn get(self) -> EcoString {\n 1439 |         let text = self.0.leaf_text();\n 1440 |         let unquoted = &text[1..text.len() - 1];\n 1441 |         if !unquoted.contains('\\\\') {\n 1442 |             return unquoted.into();\n 1443 |         }","lines":8}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`pause()` uses `io::stdin().lock().read(&mut [0]).unwrap()` to wait for the user after greeting on Windows. If stdin is closed/redirected (not a real double-click scenario but possible), `read` returning an error will panic with a confusing message right as the program is trying to exit gracefully. The `#[allow(clippy::unused_io_amount)]` masks that a 0-byte or partial read is also not handled.","fix":"Ignore the read result (`let _ = ...`) so a closed stdin does not panic during the exit path.","locations":[{"ref":"crates/typst-cli/src/greet.rs:62-67","code":"   62 | #[allow(clippy::unused_io_amount)]\n   63 | fn pause() {\n   64 |     eprintln!();\n   65 |     eprintln!(\"Press enter to continue...\");\n   66 |     io::stdin().lock().read(&mut [0]).unwrap();\n   67 | }","lines":6}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`Em::from_units` divides by `units_per_em` without checking for zero. A `units_per_em` of `0.0` (a malformed/edge-case font) yields a non-finite `Em`. Unlike `Em::from_abs`/`Em::at`, which explicitly guard with `is_finite()` and fall back to zero, this constructor performs no such check, so a non-finite em can leak into downstream length arithmetic.","fix":"Return `Em::zero()` (or otherwise guard) when `units_per_em` is zero or the result is not finite, consistent with the `is_finite` checks in `from_abs` and `at`.","locations":[{"ref":"crates/typst-library/src/layout/em.rs:35-37","code":"   35 |     pub fn from_units(units: impl Into<f64>, units_per_em: f64) -> Self {\n   36 |         Self(Scalar::new(units.into() / units_per_em))\n   37 |     }","lines":3}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`extract_binary_from_tar_xz` uses `e.path().unwrap_or_default().ends_with(\"typst\")` to find the binary. `ends_with` on a `Path` matches whole final components, so an entry like `some/dir/not-typst` is correctly rejected, but an entry whose final component is exactly `typst` anywhere in the archive (e.g. a stray `typst` data file or directory) would be picked as the binary. Combined with `filter_map(Result::ok)` silently discarding errored entries, a corrupted or unexpected archive layout can select the wrong entry and produce a non-executable 'binary' that then replaces the running executable.","fix":"Match the expected full path (e.g. the `{asset_name}/typst` prefix as done for the ZIP case) rather than any component named `typst`, and surface entry-iteration errors instead of dropping them.","locations":[{"ref":"crates/typst-cli/src/update.rs:207-223","code":"  207 | fn extract_binary_from_tar_xz(data: &[u8]) -> StrResult<Vec<u8>> {\n  208 |     let mut archive = tar::Archive::new(XzDecoder::new(Cursor::new(data)));\n  209 | \n  210 |     let mut file = archive\n  211 |         .entries()\n  212 |         .map_err(|err| eco_format!(\"failed to extract tar.xz archive ({err})\"))?\n  213 |         .filter_map(Result::ok)\n  214 |         .find(|e| e.path().unwrap_or_default().ends_with(\"typst\"))\n  215 |         .ok_or(\"tar.xz archive did not contain Typst binary\")?;\n  216 | \n  217 |     let mut buffer = vec![];\n  218 |     file.read_to_end(&mut buffer).map_err(|err| {\n  219 |         eco_format!(\"failed to read binary data from tar.xz archive ({err})\")\n  220 |     })?;\n  221 | \n  222 |     Ok(buffer)\n  223 | }","lines":17}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`MultiMap::iter` is defined and used by `extend`, but `MultiMap::insert_iter` and `MultiMap::take` together with the generic helpers are partly unused depending on `P`; more concretely, the `iter` helper is only ever used by `extend`, and `extend` itself iterates the source map and re-inserts element-by-element via `insert_iter`, allocating a fresh `SmallVec` per key even when the destination key is absent. For `keys.extend(&elements.keys)` over large documents this is an avoidable per-key allocation/clone.","fix":"Where the destination is known to be empty/fresh, clone the inner map directly; otherwise reserve and extend the existing `SmallVec` in place rather than calling `insert_iter` per element.","locations":[{"ref":"crates/typst-library/src/introspection/introspector.rs:660-677","code":"  660 |     fn insert_iter(&mut self, key: K, values: impl IntoIterator<Item = V>) {\n  661 |         self.0.entry(key).or_default().extend(values);\n  662 |     }\n  663 | \n  664 |     fn take(&mut self, key: &K) -> Option<impl Iterator<Item = V> + use<K, V>> {\n  665 |         self.0.remove(key).map(|vec| vec.into_iter())\n  666 |     }\n  667 | \n  668 |     fn extend(&mut self, other: &Self)\n  669 |     where\n  670 |         K: Clone,\n  671 |         V: Clone,\n  672 |     {\n  673 |         for (key, locs) in other.iter() {\n  674 |             self.insert_iter(key.clone(), locs.iter().cloned());\n  675 |         }\n  676 |     }\n  677 | }","lines":18},{"ref":"crates/typst-library/src/introspection/introspector.rs:557","code":"  557 |         self.keys.extend(&elements.keys);","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`Curve::contains` and `Curve::bbox` (no-stroke path) build a fresh `kurbo::BezPath` by collecting `self.to_kurbo()` into a `Vec` on every call. For point-in-curve hit-testing (`contains`) this allocates and rebuilds the entire path for each query point, which is O(n) allocation per hit-test. The same `to_kurbo().collect()` pattern is repeated in three places.","fix":"`kurbo::Shape::winding` works on any `PathEl` iterator; pass `self.to_kurbo()` directly to `kurbo::segments`/winding helpers without collecting, or cache the constructed `BezPath` when many queries are expected.","locations":[{"ref":"crates/typst-library/src/visualize/curve.rs:478-491","code":"  478 |     /// Computes the bounding box of this curve.\n  479 |     pub fn bbox(&self, stroke: Option<&FixedStroke>) -> Rect {\n  480 |         let bbox = if let Some(stroke) = stroke {\n  481 |             self.to_kurbo_stroke(stroke).bounding_box()\n  482 |         } else {\n  483 |             kurbo::BezPath::from_vec(self.to_kurbo().collect()).bounding_box()\n  484 |         };\n  485 | \n  486 |         Rect::new(\n  487 |             Point::new(Abs::raw(bbox.x0), Abs::raw(bbox.y0)),\n  488 |             Point::new(Abs::raw(bbox.x1), Abs::raw(bbox.y1)),\n  489 |         )\n  490 |     }\n  491 | }","lines":14},{"ref":"crates/typst-library/src/visualize/curve.rs:509-517","code":"  509 |     /// When this curve is interpreted as a clip mask, would it contain `point`?\n  510 |     pub fn contains(&self, fill_rule: FillRule, needle: Point) -> bool {\n  511 |         let kurbo = kurbo::BezPath::from_vec(self.to_kurbo().collect());\n  512 |         let windings = kurbo::Shape::winding(&kurbo, point_to_kurbo(needle));\n  513 |         match fill_rule {\n  514 |             FillRule::NonZero => windings != 0,\n  515 |             FillRule::EvenOdd => windings % 2 != 0,\n  516 |         }\n  517 |     }","lines":9}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `ast::Array` evaluation, the dict-spread lookahead re-evaluates every remaining spread expression via `items.all(|item| matches!(spread.expr().eval(vm), Ok(Value::Dict(_))))` purely to decide whether to emit a better error hint. These spread expressions are then evaluated AGAIN by the normal loop iteration in the non-error case is avoided (because we bail), but in pathological inputs the lookahead can evaluate arbitrary user expressions twice and discards their results/errors (the `Ok(..)` match swallows evaluation errors). Side-effecting or expensive spread expressions are evaluated redundantly, and genuine evaluation errors in the lookahead are silently ignored.","fix":"Restructure so the lookahead does not call `eval` (e.g. inspect syntactic shape only), or hoist the already-evaluated value; at minimum avoid discarding evaluation errors from `spread.expr().eval(vm)` in the lookahead.","locations":[{"ref":"crates/typst-eval/src/code.rs:252-269","code":"  252 |                     v @ Value::Dict(_)\n  253 |                         if all_dict_spreads\n  254 |                         // Lookahead to see whether remaining items are spreads\n  255 |                         // of dicts\n  256 |                         && items.all(|item| matches!(\n  257 |                             item,\n  258 |                             ast::ArrayItem::Spread(spread) if matches!(\n  259 |                                 spread.expr().eval(vm),\n  260 |                                 Ok(Value::Dict(_)),\n  261 |                             ),\n  262 |                         )) =>\n  263 |                     {\n  264 |                         let fixed = self.to_untyped().full_text().replacen(\"(\", \"(: \", 1);\n  265 |                         bail!(\n  266 |                             spread.span(), \"cannot spread {} into array\", v.ty();\n  267 |                             hint: \"add a colon to create a dictionary instead: `{fixed}`\";\n  268 |                         )\n  269 |                     }","lines":18}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`HtmlAttrs::push_front` uses `EcoVec::insert(0, ..)`, an O(n) shift, and `create_link_anchors`/`AnchorGeneratorExt::assign` calls it to prepend the generated `id` attribute for every link target. Combined with `HtmlAttrs::get` being a linear scan, anchor assignment on documents with many link targets is O(n*m). This is acknowledged as acceptable for now by the `Fold` TODO, but the `push_front` per-target cost is a separate avoidable hot spot.","fix":"Prefer pushing the id to the back (attribute order is not semantically meaningful) or use a data structure better suited to front insertion; at minimum, avoid the front-insert when ordering does not matter.","locations":[{"ref":"crates/typst-html/src/dom.rs:377-380","code":"  377 |     /// Adds an attribute to the start of the list.\n  378 |     pub fn push_front(&mut self, attr: HtmlAttr, value: impl Into<EcoString>) {\n  379 |         self.0.insert(0, (attr, value.into()));\n  380 |     }","lines":4},{"ref":"crates/typst-html/src/link.rs:197-205","code":"  197 | impl AnchorGeneratorExt for AnchorGenerator<'_> {\n  198 |     fn assign(&mut self, element: &mut HtmlElement, label: Option<Label>) -> EcoString {\n  199 |         element.attrs.get(attr::id).cloned().unwrap_or_else(|| {\n  200 |             let id = self.identify(label);\n  201 |             element.attrs.push_front(attr::id, id.clone());\n  202 |             id\n  203 |         })\n  204 |     }\n  205 | }","lines":9}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`ProgressDownloader::stream` is implemented by fully buffering the response via `self.inner.download(...)` into a `Vec` and wrapping it in a `Cursor`, defeating the purpose of `stream` (incremental reading) for any caller that goes through the progress wrapper's `stream` path. A consumer expecting a streaming reader (e.g. to bound memory) will instead get the entire body materialized in memory first.","fix":"Implement `stream` by wrapping the inner `stream`'s reader in a progress-reporting `Read` adapter, rather than calling `download` and buffering the whole body.","locations":[{"ref":"crates/typst-kit/src/downloader.rs:257-265","code":"  257 |     fn stream(\n  258 |         &self,\n  259 |         key: &dyn Any,\n  260 |         url: &str,\n  261 |     ) -> io::Result<(Option<usize>, Box<dyn Read>)> {\n  262 |         let data = self.inner.download(key, url)?;\n  263 |         Ok((Some(data.len()), Box::new(Cursor::new(data))))\n  264 |     }\n  265 | }","lines":9}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `render_fills_strokes`, cell fill rendering uses a triple-nested loop: for each column, for each row, and inside it an `rows.iter().find(...)` scan to determine the first spanned row of the parent cell. This is O(cols * rows^2) in the worst case for tables with fills. The inner `find` scans from the start of `rows` every time and is only short-circuited by the `parent.y == row.y` check above it. For large filled tables this is a measurable cost.","fix":"Precompute, per region, the first present row index >= a given y (e.g. a single forward pass), or hoist the `rows.iter().find(|row| row.y >= parent.y)` out of the inner per-(x,row) loop, to avoid the repeated linear scan.","locations":[{"ref":"crates/typst-layout/src/grid/layouter.rs:815-899","code":"  815 |             for (x, &col) in self.rcols.iter().enumerate() {\n  816 |                 let mut dy = Abs::zero();\n  817 |                 for row in rows {\n  818 |                     // We want to only draw the fill starting at the parent\n  819 |                     // positions of cells. However, sometimes the parent\n  820 |                     // position is absent from the current region, either\n  821 |                     // because the first few rows of a rowspan were empty auto\n  822 |                     /
