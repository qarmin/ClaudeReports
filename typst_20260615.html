   // Additionally, we should only draw the fill when\n  850 |                             // this row is the local parent Y for this cell,\n  851 |                             // that is, the first row spanned by the cell's\n  852 |                             // parent in this region, because if the parent\n  853 |                             // cell's fill was already drawn in a previous\n  854 |                             // region, we must render it again in later regions\n  855 |                             // spanned by that cell. Note that said condition\n  856 |                             // always holds when the current cell has a rowspan\n  857 |                             // of 1 and we're not currently at a gutter row.\n  858 |                             parent.x == x\n  859 |                                 && (parent.y == row.y\n  860 |                                     || rows\n  861 |                                         .iter()\n  862 |                                         .find(|row| row.y >= parent.y)\n  863 |                                         .is_some_and(|first_spanned_row| {\n  864 |                                             first_spanned_row.y == row.y\n  865 |                                         }))\n  866 |                         });\n  867 | \n  868 |                     if let Some(parent) = parent {\n  869 |                         let cell = self.grid.cell(parent.x, parent.y).unwrap();\n  870 |                         let fill = cell.fill.clone();\n  871 |                         if let Some(fill) = fill {\n  872 |                             let rowspan = self.grid.effective_rowspan_of_cell(cell);\n  873 |                             let height = if rowspan == 1 {\n  874 |                                 row.height\n  875 |                             } else {\n  876 |                                 rows.iter()\n  877 |                                     .filter(|row| {\n  878 |                                         (parent.y..parent.y + rowspan).contains(&row.y)\n  879 |                                     })\n  880 |                                     .map(|row| row.height)\n  881 |                                     .sum()\n  882 |                             };\n  883 |                             let width = self.cell_spanned_width(cell, x);\n  884 |                             let mut pos = Point::new(dx, dy);\n  885 |                             if self.is_rtl {\n  886 |                                 // In RTL cells expand to the left, thus the\n  887 |                                 // position must additionally be offset by the\n  888 |                                 // cell's width.\n  889 |                                 pos.x = self.width - (dx + width);\n  890 |                             }\n  891 |                             let size = Size::new(width, height);\n  892 |                             let rect = Geometry::Rect(size).filled(fill);\n  893 |                             fills.push((pos, FrameItem::Shape(rect, self.span)));\n  894 |                         }\n  895 |                     }\n  896 |                     dy += row.height;\n  897 |                 }\n  898 |                 dx += col;\n  899 |             }","lines":85}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`SpanMapper::span_at` performs an O(n) linear scan over all span segments. It is called once per glyph in `ShapedText::build` (`spans.span_at(shaped.range.start)`), making frame building O(glyphs * segments) for a paragraph. For long paragraphs with many small text segments this is quadratic. The segment list is sorted/contiguous, so a binary search or a cursor that advances monotonically (glyphs are emitted in order) would make it linear overall.","fix":"Store cumulative offsets and binary-search, or thread a monotonic cursor through `build` since glyphs are processed in increasing range order.","locations":[{"ref":"crates/typst-layout/src/inline/collect.rs:328-337","code":"  328 |     pub fn span_at(&self, offset: usize) -> (Span, u16) {\n  329 |         let mut cursor = 0;\n  330 |         for &(len, span) in &self.0 {\n  331 |             if (cursor..cursor + len).contains(&offset) {\n  332 |                 return (span, u16::try_from(offset - cursor).unwrap_or(0));\n  333 |             }\n  334 |             cursor += len;\n  335 |         }\n  336 |         (Span::detached(), 0)\n  337 |     }","lines":10},{"ref":"crates/typst-layout/src/inline/shaping.rs:403-404","code":"  403 |                     let mut span = spans.span_at(shaped.range.start);\n  404 |                     span.1 = span.1.saturating_add(span_offset.saturating_as());","lines":2}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`query_labelled` iterates over *all* introspectable elements and filters by `label().is_some()`, even though the introspector already maintains a `labels: MultiMap<Label, usize>` acceleration structure. For documents with many elements but few labels this is unnecessarily O(n) instead of O(#labelled).","fix":"Build the result from `self.labels` (iterate its values and `get_by_idx`) instead of scanning `self.all()`. Note ordering must still be preserved, so collect indices and sort, or iterate `elems` only over labelled indices.","locations":[{"ref":"crates/typst-library/src/introspection/introspector.rs:388-390","code":"  388 |     pub fn query_labelled(&self) -> EcoVec<Content> {\n  389 |         self.all().filter(|c| c.label().is_some()).cloned().collect()\n  390 |     }","lines":3},{"ref":"crates/typst-library/src/introspection/introspector.rs:183-184","code":"  183 |     /// Accelerates lookup of elements by label.\n  184 |     labels: MultiMap<Label, usize>,","lines":2}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`QueryCache` uses a single `RwLock<FxHashMap<...>>` guarding all cached query results, and `Clone for QueryCache` takes a read lock and clones the whole map. Under parallel layout with many distinct subqueries, all writers contend on one lock, and cloning an `ElementIntrospector` (which derives `Clone`) duplicates the entire query cache. For large documents this can be a notable allocation/contention cost.","fix":"Consider a sharded/lock-free map (e.g. dashmap-style) for the cache, and/or start clones with an empty cache (the cache is purely a memoization aid and need not be copied) if semantics allow.","locations":[{"ref":"crates/typst-library/src/introspection/introspector.rs:685-703","code":"  685 | /// Caches queries.\n  686 | #[derive(Default)]\n  687 | struct QueryCache(RwLock<FxHashMap<u128, EcoVec<Content>>>);\n  688 | \n  689 | impl QueryCache {\n  690 |     fn get(&self, hash: u128) -> Option<EcoVec<Content>> {\n  691 |         self.0.read().unwrap().get(&hash).cloned()\n  692 |     }\n  693 | \n  694 |     fn insert(&self, hash: u128, output: EcoVec<Content>) {\n  695 |         self.0.write().unwrap().insert(hash, output);\n  696 |     }\n  697 | }\n  698 | \n  699 | impl Clone for QueryCache {\n  700 |     fn clone(&self) -> Self {\n  701 |         Self(RwLock::new(self.0.read().unwrap().clone()))\n  702 |     }\n  703 | }","lines":19},{"ref":"crates/typst-library/src/introspection/introspector.rs:169-190","code":"  169 | #[derive(Clone)]\n  170 | pub struct ElementIntrospector<P> {\n  171 |     /// All introspectable elements.\n  172 |     elems: Vec<(Content, P)>,\n  173 |     /// Lists all elements with a specific hash key. This is used for\n  174 |     /// introspector-assisted location assignment during measurement.\n  175 |     keys: MultiMap<u128, Location>,\n  176 |     /// Accelerates lookup of elements by location.\n  177 |     ///\n  178 |     /// Holds a range pointing into `elements` that covers the element and all\n  179 |     /// its conceptual descendants. The first element in the range (i.e.\n  180 |     /// `elems[range.start]` is the element with the location itself while the\n  181 |     /// last element is its right-most descendants).\n  182 |     locations: FxHashMap<Location, Range<usize>>,\n  183 |     /// Accelerates lookup of elements by label.\n  184 |     labels: MultiMap<Label, usize>,\n  185 |     /// Caches queries done on the introspector. This is important because\n  186 |     /// even if all top-level queries are distinct, they often have shared\n  187 |     /// subqueries. Example: Individual counter queries with `before` that\n  188 |     /// all depend on a global counter query.\n  189 |     queries: QueryCache,\n  190 | }","lines":22}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`RawContent::get` clones the entire content unconditionally via `match self.clone()` before inspecting which variant it is. For the `Text` variant this clones the whole `EcoString` (cheap, refcounted) but for `Lines` it clones the whole `EcoVec` of `(EcoString, Span)` even though the function only needs to read it. `get` is called in hot paths (`PlainText::plain_text`, `PartialEq`, `preprocess`). Matching on `self` by reference would avoid the up-front clone.","fix":"Match on `self` by reference: `match self { RawContent::Text(text) => text.clone(), RawContent::Lines(lines) => { ... } }`, cloning only the single string actually returned.","locations":[{"ref":"crates/typst-library/src/text/raw.rs:669-684","code":"  669 | impl RawContent {\n  670 |     /// Returns or synthesizes the text content of the raw text.\n  671 |     fn get(&self) -> EcoString {\n  672 |         match self.clone() {\n  673 |             RawContent::Text(text) => text,\n  674 |             RawContent::Lines(lines) => {\n  675 |                 let mut lines = lines.into_iter().map(|(s, _)| s);\n  676 |                 if lines.len() <= 1 {\n  677 |                     lines.next().unwrap_or_default()\n  678 |                 } else {\n  679 |                     lines.collect::<Vec<_>>().join(\"\\n\").into()\n  680 |                 }\n  681 |             }\n  682 |         }\n  683 |     }\n  684 | }","lines":16}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`collect_named_destinations` queries `typst_document.introspector()` for every heading and, inside the loop, calls `introspector().position(loc)` per match. Likewise `outline.rs::convert_node` calls `introspector().position(loc)` per outline node, and `build_outline` calls `introspector().page(...)` per heading. Introspector position/page lookups are not free; for documents with many headings/anchors this is repeated work. Not a correctness issue, but the per-element introspector calls dominate for large documents.","fix":"Batch-resolve positions where possible, or cache `introspector()` results; at minimum hoist the repeated `introspector()` accessor calls out of the inner loops.","locations":[{"ref":"crates/typst-pdf/src/convert.rs:856-882","code":"  856 |     let headings = typst_document.introspector().query(&HeadingElem::ELEM.select());\n  857 |     let matches = anchors\n  858 |         .iter()\n  859 |         .map(|(loc, anchor)| (*loc, anchor.to_string()))\n  860 |         .chain(\n  861 |             headings\n  862 |                 .iter()\n  863 |                 .filter_map(|elem| elem.location().zip(elem.label()))\n  864 |                 .map(|(loc, label)| (loc, label.resolve().to_string())),\n  865 |         )\n  866 |         .filter(|(_, name)| seen.insert(name.clone()));\n  867 | \n  868 |     for (loc, name) in matches {\n  869 |         // Only add named destination if page belonging to the position is exported.\n  870 |         let pos = typst_document\n  871 |             .introspector()\n  872 |             .position(loc)\n  873 |             .unwrap_or(PagedPosition::ORIGIN);\n  874 |         if let Some(dest) = crate::link::pos_to_xyz(pic, pos) {\n  875 |             let named = NamedDestination::new(name, dest);\n  876 |             // The option is `None` if the destination is a duplicate which\n  877 |             // should not happen because we filtered them on a set insert above,\n  878 |             // hence the unwrap.\n  879 |             document.register_named_destination(named.clone()).unwrap();\n  880 |             locs_to_names.insert(loc, named);\n  881 |         }\n  882 |     }","lines":27},{"ref":"crates/typst-pdf/src/outline.rs:25-32","code":"   25 |             let visible = gc.options.page_ranges.as_ref().is_none_or(|ranges| {\n   26 |                 !ranges.includes_page(\n   27 |                     gc.document\n   28 |                         .introspector()\n   29 |                         .page(elem.location().unwrap())\n   30 |                         .unwrap_or(NonZeroUsize::ONE),\n   31 |                 )\n   32 |             });","lines":8}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`split_outer_group` contains a nested loop that, for each broken stack entry, iterates over ALL groups via `tree.groups.list.ids().zip(iter_mut()).rev()` to re-parent children, breaking early only at `outer.id`. The comment acknowledges this is a partial scan, but in documents with many groups and deeply overlapping tags this becomes O(stack_depth * group_count) work on the (admittedly rare) overlapping-tag path.","fix":"Maintain a children index (parent -> child ids) so re-parenting can iterate only the affected children instead of scanning the entire group list per entry.","locations":[{"ref":"crates/typst-pdf/src/tags/tree/mod.rs:740-805","code":"","lines":66}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`HashLock`/`LazyHash` treat a stored hash value of `0` as 'unset'. If `hash128` legitimately yields `0` for some value, `get_or_insert_with` will recompute the (expensive 128-bit siphash) hash on every access because the sentinel can never be distinguished from a real zero hash. With 128-bit hashes this is astronomically rare, but it is a silent correctness-vs-performance sentinel collision worth documenting.","fix":"Document the zero-sentinel assumption explicitly, or store the hash as `Option`/use a separate 'computed' flag so a genuine zero hash is cached rather than recomputed.","locations":[{"ref":"crates/typst-utils/src/hash.rs:236-243","code":"  236 |     pub fn get_or_insert_with(&self, f: impl FnOnce() -> u128) -> u128 {\n  237 |         let mut hash = self.get();\n  238 |         if hash == 0 {\n  239 |             hash = f();\n  240 |             self.0.store(hash, Ordering::Relaxed);\n  241 |         }\n  242 |         hash\n  243 |     }","lines":8}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`autocomplete`/`scope_completions` calls `named_items` which, for each `ModuleImport` ancestor sibling, calls `analyze_import` (which can load and evaluate an entire module via `with_engine`/`typst_eval::import`). When completing inside a file with many imports, this can repeatedly resolve and evaluate modules for every completion request with no caching at the IDE layer beyond comemo memoization, making completion latency scale with the number/size of imported modules.","fix":"Cache resolved import modules per (file, span) within a completion/analysis pass, or short-circuit `analyze_import` when the import's exports are not needed by the current `recv` consumer.","locations":[{"ref":"crates/typst-ide/src/matchers.rs:31-44","code":"   31 |             if let Some(v) = node.cast::<ast::ModuleImport>() {\n   32 |                 let imports = v.imports();\n   33 |                 let source = v.source();\n   34 | \n   35 |                 let source_value = node\n   36 |                     .find(source.span())\n   37 |                     .and_then(|source| analyze_import(world, &source));\n   38 |                 let source_value = source_value.as_ref();\n   39 | \n   40 |                 let module = source_value.and_then(|value| match value {\n   41 |                     Value::Module(module) => Some(module),\n   42 |                     _ => None,\n   43 |                 });\n   44 | ","lines":14},{"ref":"crates/typst-ide/src/analyze.rs:80-93","code":"   80 | pub fn analyze_import(world: &dyn IdeWorld, source: &LinkedNode) -> Option<Value> {\n   81 |     // Use span in the node for resolving imports with relative paths.\n   82 |     let source_span = source.span();\n   83 |     let (source, _) = analyze_expr(world, source).into_iter().next()?;\n   84 |     if source.scope().is_some() {\n   85 |         return Some(source);\n   86 |     }\n   87 | \n   88 |     let Value::Str(path) = source else { return None };\n   89 | \n   90 |     crate::utils::with_engine(world, |engine| {\n   91 |         typst_eval::import(engine, &path, source_span).ok().map(Value::Module)\n   92 |     })\n   93 | }","lines":14}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Watcher::update` and `Watcher::wait` call `path.exists()` (and in `wait`, `self.missing.iter().any(|path| path.exists())`) on every update/poll cycle. `exists()` performs a `stat` syscall per path each iteration; with many missing dependencies and the 300ms poll interval this is a steady stream of syscalls. This is acceptable but could be reduced; more importantly `exists()` follows symlinks and treats permission errors as 'not existing', which can cause a watched-but-unreadable file to be perpetually polled as missing.","fix":"Use `path.try_exists()` to distinguish real absence from access errors, and consider caching stat results within a single `wait` poll loop.","locations":[{"ref":"crates/typst-kit/src/watcher.rs:88-96","code":"   88 |         // that weren't watched yet.\n   89 |         for path in iter {\n   90 |             // We can't watch paths that don't exist with notify-rs. Instead, we\n   91 |             // add those to a `missing` set and fall back to manual poll\n   92 |             // watching.\n   93 |             if !path.exists() {\n   94 |                 self.missing.insert(path);\n   95 |                 continue;\n   96 |             }","lines":9},{"ref":"crates/typst-kit/src/watcher.rs:186-190","code":"  186 |             // If we found a relevant event or if any of the missing files now\n  187 |             // exists, stop waiting.\n  188 |             if relevant || self.missing.iter().any(|path| path.exists()) {\n  189 |                 return Ok(());\n  190 |             }","lines":5}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In `Composer::footnotes`, every `FootnoteElem` found in `self.work.tags` is cloned into `notes` on every call, even when entries are later skipped (refs) or the function returns early. `footnotes` is called frequently (per frame/line/placed), so for tag-heavy documents this clones packed footnote elements repeatedly across relayouts.","fix":"Defer cloning until after confirming the note is not skipped (collect references first, clone lazily inside the processing loop).","locations":[{"ref":"crates/typst-layout/src/flow/compose.rs:371-377","code":"  371 |         let mut notes = vec![];\n  372 |         for tag in &self.work.tags {\n  373 |             let Tag::Start(elem, _) = tag else { continue };\n  374 |             let Some(note) = elem.to_packed::<FootnoteElem>() else { continue };\n  375 |             notes.push((Abs::zero(), note.clone()));\n  376 |         }\n  377 |         find_in_frame_impl::<FootnoteElem>(&mut notes, frame, Abs::zero());","lines":7}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Estimates::compute` and `CumulativeVec` allocate one `summed` entry per byte of the paragraph text (`push` loops `for _ in 0..byte_len`, `adjust` resizes to byte length). For very large paragraphs this is a sizable allocation proportional to text length rather than glyph/segment count, used only to support O(1) range estimates. It is correct but memory-heavy.","fix":"If memory becomes a concern, store cumulative sums keyed by segment/glyph boundary plus a sparse index rather than one entry per byte.","locations":[{"ref":"crates/typst-layout/src/inline/linebreak.rs:1013-1023","code":" 1013 |     fn adjust(&mut self, len: usize) {\n 1014 |         self.summed.resize(len, self.total);\n 1015 |     }\n 1016 | \n 1017 |     /// Adds a new segment with the given byte length and metric.\n 1018 |     fn push(&mut self, byte_len: usize, metric: T) {\n 1019 |         self.total = self.total + metric;\n 1020 |         for _ in 0..byte_len {\n 1021 |             self.summed.push(self.total);\n 1022 |         }\n 1023 |     }","lines":11},{"ref":"crates/typst-layout/src/inline/linebreak.rs:956-983","code":"  956 |     fn compute(p: &Preparation) -> Self {\n  957 |         let cap = p.text.len();\n  958 | \n  959 |         let mut widths = CumulativeVec::with_capacity(cap);\n  960 |         let mut stretchability = CumulativeVec::with_capacity(cap);\n  961 |         let mut shrinkability = CumulativeVec::with_capacity(cap);\n  962 |         let mut justifiables = CumulativeVec::with_capacity(cap);\n  963 | \n  964 |         for (range, item) in p.items.iter() {\n  965 |             if let Item::Text(shaped) = item {\n  966 |                 for g in shaped.glyphs.iter() {\n  967 |                     let byte_len = g.range.len();\n  968 |                     let stretch = g.stretchability().0 + g.stretchability().1;\n  969 |                     let shrink = g.shrinkability().0 + g.shrinkability().1;\n  970 |                     widths.push(byte_len, g.x_advance.at(g.size));\n  971 |                     stretchability.push(byte_len, stretch.at(g.size));\n  972 |                     shrinkability.push(byte_len, shrink.at(g.size));\n  973 |                     justifiables.push(byte_len, g.is_justifiable() as usize);\n  974 |                 }\n  975 |             } else {\n  976 |                 widths.push(range.len(), item.natural_width());\n  977 |             }\n  978 | \n  979 |             widths.adjust(range.end);\n  980 |             stretchability.adjust(range.end);\n  981 |             shrinkability.adjust(range.end);\n  982 |             justifiables.adjust(range.end);\n  983 |         }","lines":28}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Point::hypot` computes `(x*x + y*y).sqrt()` on raw f64 values. The accompanying comment claims this 'should be faster than `f64::hypot` or `libm::hypot`', which is true, but `f64::sqrt` is not guaranteed available in all `no_std`/non-std-math configurations the rest of this crate avoids (it consistently uses `libm` elsewhere, e.g. angle.rs uses `libm::sin`/`cos`). The mismatch is a minor inconsistency rather than a correctness issue, but worth noting for portability.","fix":"Either keep `std`'s `sqrt` intentionally (the comment already documents determinism) or, for consistency with the rest of the math in this module, use `libm::sqrt`. No behavioral change required if `std` is always available.","locations":[{"ref":"crates/typst-library/src/layout/point.rs:59-65","code":"   59 |     pub fn hypot(self) -> Abs {\n   60 |         // The `sqrt` function is defined by IEEE-754 and thus deterministic.\n   61 |         // In addition this should be faster than `f64::hypot` or `libm::hypot`.\n   62 |         let x = self.x.to_raw();\n   63 |         let y = self.y.to_raw();\n   64 |         Abs::raw((x * x + y * y).sqrt())\n   65 |     }","lines":7}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`MathItem::is_spaced` uses an explicit `if ... { true } else { false }` returning the boolean of a condition that is already a boolean expression, which clippy's `needless_bool` would flag.","fix":"Return the boolean expression directly: `self.class() == MathClass::Fence || matches!(self, Self::Component(comp) if comp.props.spaced && matches!(comp.props.class(), MathClass::Normal | MathClass::Alphabetic))`.","locations":[{"ref":"crates/typst-library/src/math/ir/item.rs:157-170","code":"  157 |     pub(crate) fn is_spaced(&self) -> bool {\n  158 |         if self.class() == MathClass::Fence {\n  159 |             return true;\n  160 |         }\n  161 | \n  162 |         if let Self::Component(comp) = self\n  163 |             && comp.props.spaced\n  164 |             && matches!(comp.props.class(), MathClass::Normal | MathClass::Alphabetic)\n  165 |         {\n  166 |             true\n  167 |         } else {\n  168 |             false\n  169 |         }\n  170 |     }","lines":14}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`check_font_list` is invoked during text element parsing for every `text(font: ...)` call and does a `book.select_family(...).next()` lookup per family. `select_family` builds an iterator over a `BTreeMap` lookup which is fine, but the family name passed (`family.as_str()`) is already lowercased while `FontBook` keys are lowercased too, so this is correct; however the warning is emitted at parse time even when fallback would have resolved the font, which can produce noisy warnings. This is a UX/behavioral nit rather than a correctness bug.","fix":"No code change strictly required; consider only warning when the family is also not resolvable via fallback, or document that the warning is purely informational.","locations":[{"ref":"crates/typst-library/src/text/mod.rs:1576-1588","code":" 1576 | /// Checks for font families that are not available.\n 1577 | fn check_font_list(engine: &mut Engine, list: &Spanned<FontList>) {\n 1578 |     let book = engine.world.book();\n 1579 |     for family in &list.v {\n 1580 |         if book.select_family(family.as_str()).next().is_none() {\n 1581 |             engine.sink.warn(warning!(\n 1582 |                 list.span,\n 1583 |                 \"unknown font family: {}\",\n 1584 |                 family.as_str(),\n 1585 |             ));\n 1586 |         }\n 1587 |     }\n 1588 | }","lines":13},{"ref":"crates/typst-library/src/text/font/book.rs:81-88","code":"   81 |     pub fn select_family(&self, family: &str) -> impl Iterator<Item = usize> + '_ {\n   82 |         self.families\n   83 |             .get(family)\n   84 |             .map(|vec| vec.as_slice())\n   85 |             .unwrap_or_default()\n   86 |             .iter()\n   87 |             .copied()\n   88 |     }","lines":8}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Image::width`/`height`/`dpi` and `RasterImage::width`/`height` go through `self.dynamic()` which is fine, but `Color::to_vec4_u8` exists twice (on `Color` and `ProcessColor`) with identical bodies, and `to_vec4_u8` re-rounds floats on every comparison/hash. For `ProcessColor::eq` of two RGB colors, `to_vec4_u8` is computed for both on every equality check (hot path in deduplication of gradient stops). Minor but avoidable.","fix":"Deduplicate the two `to_vec4_u8` definitions; consider caching/precomputing the rounded representation if equality is shown to be hot.","locations":[{"ref":"crates/typst-library/src/visualize/color.rs:1287-1289","code":" 1287 |     pub fn to_vec4_u8(&self) -> [u8; 4] {\n 1288 |         self.to_vec4().map(|x| (x * 255.0).round() as u8)\n 1289 |     }","lines":3},{"ref":"crates/typst-library/src/visualize/color.rs:1754-1756","code":" 1754 |     pub fn to_vec4_u8(&self) -> [u8; 4] {\n 1755 |         self.to_vec4().map(|x| (x * 255.0).round() as u8)\n 1756 |     }","lines":3}]},{"id":"PERF_21","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Lines::len_utf16` and `len_utf16(&str)` recompute the UTF-16 length of the final line on every call by iterating all chars of the last line. For repeated queries on large final lines (e.g. a file ending in one long line) this is O(n) per call. Minor, but `Lines` is meant to be an acceleration structure for exactly these conversions.","fix":"Cache the total UTF-16 length alongside the line table (it is already incrementally computable in `lines_from`), or store the file's total utf16 length in `LinesInner`.","locations":[{"ref":"crates/typst-syntax/src/lines.rs:47-52","code":"   47 |     /// Get the length of the file in UTF-16 code units.\n   48 |     pub fn len_utf16(&self) -> usize {\n   49 |         let last = self.0.lines.last().unwrap();\n   50 |         last.utf16_idx + len_utf16(&self.text()[last.byte_idx..])\n   51 |     }\n   52 | ","lines":6},{"ref":"crates/typst-syntax/src/lines.rs:278-282","code":"  278 | /// The number of code units this string would use if it was encoded in\n  279 | /// UTF16. This runs in linear time.\n  280 | fn len_utf16(string: &str) -> usize {\n  281 |     string.chars().map(char::len_utf16).sum()\n  282 | }","lines":5}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`Bytes::to_str`'s fast path downcasts the inner `dyn Bytelike` to `Str` (`(self.inner() as &dyn Any).downcast_ref::<Str>()`), but a `Str` only ever backs `Bytes` through `Bytes::from_string`, which wraps it as `StrWrapper(data)`; `Str` has no `AsRef<[u8]>` so it never reaches the bare `Bytes::new` path either. The concrete inner type is therefore always `StrWrapper<Str>`, never a bare `Str`, so the downcast always returns `None`, the fast path is unreachable dead code, and the function always falls through to `as_str().map(Into::into)` (an extra allocation). The doc comment claiming 'the string is cloned directly' is thus also misleading. Compare the correct sibling `to_underlying_string`, which downcasts to `StrWrapper<T>`.","fix":"Downcast to `StrWrapper<Str>` (mirroring `to_underlying_string`) and clone the inner `Str` on a hit, or remove the fast path if the cheap clone is not worth it; update the doc comment accordingly.","locations":[{"ref":"crates/typst-library/src/foundations/bytes.rs:139-149","code":"  139 |     /// Try to turn the bytes into a `Str`.\n  140 |     ///\n  141 |     /// - If these bytes were created via `Bytes::from_string::<Str>`, the\n  142 |     ///   string is cloned directly.\n  143 |     /// - If these bytes were created via `Bytes::from_string`, but from a\n  144 |     ///   different type of string, UTF-8 validation is still skipped.\n  145 |     pub fn to_str(&self) -> Result<Str, Utf8Error> {\n  146 |         match (self.inner() as &dyn Any).downcast_ref::<Str>() {\n  147 |             Some(string) => Ok(string.clone()),\n  148 |             None => self.as_str().map(Into::into),\n  149 |         }","lines":11}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"The `Author` and `Keywords` newtype structs (with their `cast!` impls) are unused. `DocumentElem::author` and `DocumentElem::keywords` use `OneOrMultiple<EcoString>` (lines 161, 167), not these types, and no other code in the workspace constructs or references `Author`/`Keywords`. They are `pub` and re-exported via `pub use self::document::*` in mod.rs, so they leak into the public API surface as dead code. Verified by grep: the only occurrences are their own definitions.","fix":"Delete the `Author` and `Keywords` structs and their `cast!` blocks, or wire them into the `DocumentElem` fields if they were intended to replace `OneOrMultiple<EcoString>`.","locations":[{"ref":"crates/typst-library/src/model/document.rs:301-321","code":"  301 | /// A list of authors.\n  302 | #[derive(Debug, Default, Clone, PartialEq, Hash)]\n  303 | pub struct Author(Vec<EcoString>);\n  304 | \n  305 | cast! {\n  306 |     Author,\n  307 |     self => self.0.into_value(),\n  308 |     v: EcoString => Self(vec![v]),\n  309 |     v: Array => Self(v.into_iter().map(Value::cast).collect::<HintedStrResult<_>>()?),\n  310 | }\n  311 | \n  312 | /// A list of keywords.\n  313 | #[derive(Debug, Default, Clone, PartialEq, Hash)]\n  314 | pub struct Keywords(Vec<EcoString>);\n  315 | \n  316 | cast! {\n  317 |     Keywords,\n  318 |     self => self.0.into_value(),\n  319 |     v: EcoString => Self(vec![v]),\n  320 |     v: Array => Self(v.into_iter().map(Value::cast).collect::<HintedStrResult<_>>()?),\n  321 | }","lines":21}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"In `should_compress`, the `MatcherType::Image` arm matches a long list of MIME types but every branch (including the `_` fallback) returns `Smart::Auto`. The entire `match ty.mime_type()` for images is therefore dead - it cannot influence the result. Either the list is leftover from a copy of the Audio/Video arms (which legitimately return `Smart::Custom(false)` for already-compressed formats) and was meant to mark some image formats as already-compressed (jpeg/png/webp/avif/jxl), or it should be collapsed to `Smart::Auto`.","fix":"Either return `Smart::Custom(false)` for already-compressed image formats (jpeg/jp2/png/webp/heif/avif/jxl) to avoid double compression, or remove the redundant inner match and return `Smart::Auto` directly.","locations":[{"ref":"crates/typst-pdf/src/attach.rs:107-119","code":"  107 |         infer::MatcherType::Image => match ty.mime_type() {\n  108 |             #[rustfmt::skip]\n  109 |             \"image/jpeg\"\n  110 |             | \"image/jp2\"\n  111 |             | \"image/png\"\n  112 |             | \"image/webp\"\n  113 |             | \"image/vnd.ms-photo\"\n  114 |             | \"image/heif\"\n  115 |             | \"image/avif\"\n  116 |             | \"image/jxl\"\n  117 |             | \"image/vnd.djvu\" => Smart::Auto,\n  118 |             _ => Smart::Auto,\n  119 |         },","lines":13}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"`Number`/`NumberWithPrecision` are documented as displaying a number with N \"significant digits\" (and the doc reasons about precision based on that), but the underlying `typst_utils::round_with_precision` rounds to N digits *after the decimal point*, not N significant digits. For values >= 1 the actual behavior differs from the documentation (e.g. 1234.5678 with precision 4 keeps all four decimals, not four significant figures).","fix":"Reword the doc comments to say \"N digits after the decimal point\" (decimal places), or change the implementation to actually compute significant digits if that was the intent.","locations":[{"ref":"crates/typst-html/src/css/encode.rs:325-344","code":"  325 | /// Displays a number with four significant digits.\n  326 | ///\n  327 | /// For a number between 0 and 1, four significant digits give us a\n  328 | /// precision of 1/10_000, which is more than 12 bits (see `is_very_close`).\n  329 | struct Number<T: Into<f64>>(T);\n  330 | \n  331 | impl<T: Into<f64> + Copy> ToCss for Number<T> {\n  332 |     fn emit(&self, w: &mut CssWriter) {\n  333 |         w.emit(NumberWithPrecision(self.0, 4));\n  334 |     }\n  335 | }\n  336 | \n  337 | /// Displays a number with N significant digits.\n  338 | struct NumberWithPrecision<T: Into<f64>>(T, i16);\n  339 | \n  340 | impl<T: Into<f64> + Copy> ToCss for NumberWithPrecision<T> {\n  341 |     fn emit(&self, w: &mut CssWriter) {\n  342 |         w.write_fmt(typst_utils::round_with_precision(self.0.into(), self.1));\n  343 |     }\n  344 | }","lines":20}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `MetricRange::display` claims it 'Displays the range if initialized and not the default for that metric.', but `display` only checks for initialization (`self.0.map(..)`); it performs no default filtering. The default-filtering behavior actually lives in `display_if_not_default`. The comment was evidently copy-pasted and is misleading.","fix":"Change the comment on `display` to 'Displays the range if initialized.' and keep the default-aware wording only on `display_if_not_default`.","locations":[{"ref":"crates/typst-ide/src/utils.rs:149-156","code":"  149 |     /// Displays the range if initialized and not the default for that metric.\n  150 |     fn display(self) -> Option<impl Display> {\n  151 |         self.0.map(|(min, max)| {\n  152 |             typst_utils::display(move |f| {\n  153 |                 if min == max { write!(f, \"{min}\") } else { write!(f, \"{min}–{max}\") }\n  154 |             })\n  155 |         })\n  156 |     }","lines":8}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The module-level feature-flag documentation for `emit-diagnostics` and `datetime` is garbled: the `emit-diagnostics` bullet ends with `via` and no link, the `datetime` bullet is inserted in the middle, and the `[diagnostics::emit]` link target dangles on its own line attached to the wrong bullet. This renders incorrectly and misattributes the doc links.","fix":"Reorder the two bullets so each description sits with its own intra-doc link: `emit-diagnostics`: ... via [diagnostics::emit].` and `datetime`: ... via [datetime::Time::today].`","locations":[{"ref":"crates/typst-kit/src/lib.rs:22-24","code":"   22 | //! - `emit-diagnostics`: Enables emitting terminal-style diagnostics via\n   23 | //! - `datetime`: Enables obtaining the current date via [`datetime::Time::today`].\n   24 | //!   [`diagnostics::emit`].","lines":3}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The non-convergence diagnostic for `DocumentIntrospection` formats every observed value as the literal string \"TODO\" via the closure `|_loc| eco_format!(\"TODO\")`. If a document's `document()` introspection ever fails to converge, the resulting warning hint will list \"TODO\" for each iteration instead of a meaningful value, exposing placeholder text to end users.","fix":"Implement a real formatter for the location value (e.g. format the document location like other introspections do, or drop the value hint entirely if it cannot be rendered).","locations":[{"ref":"crates/typst-library/src/introspection/location.rs:349-358","code":"  349 |     fn diagnose(&self, history: &History<Self::Output>) -> SourceDiagnostic {\n  350 |         format_convergence_warning(\n  351 |             self.0,\n  352 |             self.1,\n  353 |             history,\n  354 |             \"path\",\n  355 |             |element| eco_format!(\"document in which the {element} is located\"),\n  356 |             |_loc| eco_format!(\"TODO\"),\n  357 |         )\n  358 |     }","lines":10}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Stale/duplicated doc comment on the `Works` struct: two full doc-comment paragraphs are stacked, the first being an earlier version (\"Fully formatted citations and references...\") immediately followed by its rewrite (\"Fully formatted citation groups and bibliographies...\"). Rustdoc concatenates both, producing redundant and mildly contradictory documentation.","fix":"Delete the first stale paragraph (lines 672-675), keeping only the rewritten block.","locations":[{"ref":"crates/typst-library/src/model/bibliography.rs:672-680","code":"  672 | /// Fully formatted citations and references, generated once (through\n  673 | /// memoization) for the whole document. This setup is necessary because\n  674 | /// citation formatting is inherently stateful and s or per-cell stroke below it.\n  630 |     #[fold]\n  631 |     #[default(Some(Arc::new(Stroke::default())))]\n  632 |     pub stroke: Option<Arc<Stroke>>,","lines":7}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `VerticalFontMetric::Descender` is a copy-paste of the `Ascender` comment: it reads \"The font's ascender, which typically exceeds the depth of all glyphs.\" but this variant is the descender. The same copy-paste mistake exists for `BottomEdgeMetric::Descender` which says \"The font's descender, which typically exceeds the depth of all glyphs.\" (that one is at least the right name but the `VerticalFontMetric` one names the wrong metric entirely).","fix":"Change the `VerticalFontMetric::Descender` doc to describe the descender, e.g. \"The font's descender, which typically exceeds the depth of all glyphs.\"","locations":[{"ref":"crates/typst-library/src/text/font/metrics.rs:401-402","code":"  401 |     /// The font's ascender, which typically exceeds the depth of all glyphs.\n  402 |     Descender,","lines":2}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Garbled / ungrammatical comment in the markup reparse success check. The second line reads `// Similarly, if we children follow or we not top-level the nesting` which is missing words (\"if we have children following or we are not top-level\") and is hard to parse. It documents the non-obvious `at_end`/`top_level`/`nesting` matching condition immediately below, so its unreadability hurts maintainability of a subtle invariant.","fix":"Rewrite, e.g.: \"If children follow, `at_start` must match its previous value. Similarly, if children follow or we are not at top level, `nesting` must match its previous value.\"","locations":[{"ref":"crates/typst-syntax/src/reparser.rs:201-203","code":"  201 |             // If more children follow, at_start must match its previous value.\n  202 |             // Similarly, if we children follow or we not top-level the nesting\n  203 |             // must match its previous value.","lines":3}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"In `DurationDisplay`, the comment `// For durations > 5 min, we drop the fractional part.` sits directly above the `if nanos == 0 || self.0 > Duration::from_secs(1)` branch, but the actual 5-minute (300 s) threshold check is the nested `if self.0 > Duration::from_secs(300)`. The comment is misplaced and describes the inner condition, making the outer branch confusing to read.","fix":"Move the comment down to immediately precede the `if self.0 > Duration::from_secs(300)` line it actually describes.","locations":[{"ref":"crates/typst-utils/src/duration.rs:52-58","code":"   52 |         if nanos == 0 || self.0 > Duration::from_secs(1) {\n   53 |             // For durations > 5 min, we drop the fractional part.\n   54 |             if self.0 > Duration::from_secs(300) {\n   55 |                 piece!(\"{secs} s\");\n   56 |             } else {\n   57 |                 piece!(\"{} s\", fract(3));\n   58 |             }","lines":7}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment is grammatically broken/truncated: 'If the child is manually, the size is forced...' is missing a word (presumably 'sized'). It appears twice (copy-paste), obscuring the intended meaning.","fix":"Change to 'If the child is manually sized, the size is forced and we should enable expansion.' in both locations.","locations":[{"ref":"crates/typst-layout/src/flow/block.rs:283-284","code":"  283 |     // If the child is manually, the size is forced and we should enable\n  284 |     // expansion.","lines":2},{"ref":"crates/typst-layout/src/flow/block.rs:356-357","code":"  356 |     // If the child is manually, the size is forced and we should enable\n  357 |     // expansion.","lines":2}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment typo: 'No point in create column regions' should read 'No point in creating column regions'.","fix":"Fix grammar to 'No point in creating column regions, if there's just one!'.","locations":[{"ref":"crates/typst-layout/src/flow/compose.rs:110","code":"  110 |         // No point in create column regions, if there's just one!","lines":1}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment typo in `Distributor::finalize`: 'Restore the initial state of all items are migratable' is missing 'if' ('...state if all items are migratable').","fix":"Reword to 'Restore the initial state if all items are migratable ...'.","locations":[{"ref":"crates/typst-layout/src/flow/distribute.rs:494-496","code":"  494 |             // If this is the very end of the flow, flush pending tags.\n  495 |             self.flush_tags();\n  496 |         } else if !self.items.is_empty() && self.items.iter().all(Item::migratable) {","lines":3}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment in `collect` reads \"Non-paragraph inline layout should never trigger this since it only won't be triggered if we see any non-inline content.\" The sentence is grammatically broken and self-contradictory (\"only won't be triggered if\"), making the intended meaning unclear to future readers.","fix":"Rewrite to state the actual invariant, e.g. \"This branch is only reached for non-inline content, which should not appear here during paragraph layout.\"","locations":[{"ref":"crates/typst-layout/src/inline/collect.rs:237-238","code":"  237 |             // Non-paragraph inline layout should never trigger this since it\n  238 |             // only won't be triggered if we see any non-inline content.","lines":2}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comments for `ControlPoints::reuse_stroke_after_for_cap` and `reuse_stroke_before_for_cap` describe a boolean predicate ('Whether to use ...'), but the functions return `Option<Abs>` (the stroke value to reuse), not a boolean. The wording does not match the actual return type.","fix":"Reword to reflect the `Option<Abs>` return, e.g. 'Returns the stroke value to reuse for the cap when the opposite stroke is missing and the radius is large enough; otherwise `None`.'","locations":[{"ref":"crates/typst-layout/src/shapes.rs:1101-1106","code":" 1101 |     /// Whether to use the [`Self::stroke_after`] if [`Self::stroke_before`] is\n 1102 |     /// missing to compute the control points. If the radius is too small, caps\n 1103 |     /// other than the [`LineCap::Butt`] might be misshaped.\n 1104 |     fn reuse_stroke_after_for_cap(&self) -> Option<Abs> {\n 1105 |         self.stroke_after.filter(|s| 2.0 * *s < self.radius)\n 1106 |     }","lines":6},{"ref":"crates/typst-layout/src/shapes.rs:1115-1120","code":" 1115 |     /// Whether to use the [`Self::stroke_before`] if [`Self::stroke_after`] is\n 1116 |     /// missing to compute the control points. If the radius is too small, caps\n 1117 |     /// other than the [`LineCap::Butt`] might be misshaped.\n 1118 |     fn reuse_stroke_before_for_cap(&self) -> Option<Abs> {\n 1119 |         self.stroke_before.filter(|s| 2.0 * *s < self.radius)\n 1120 |     }","lines":6}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on `query_first_naive` reads \"It's used should be avoided.\" - a garbled sentence with a dropped word; it was meant to be \"Its use should be avoided.\"","fix":"Change to \"Its use should be avoided.\"","locations":[{"ref":"crates/typst-library/src/foundations/content/mod.rs:389-391","code":"  389 |     /// This is a *naive hack* because contextual content and elements produced\n  390 |     /// in `show` rules will not be included in the results. It's used should\n  391 |     /// be avoided.","lines":3}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Three doc-comment defects in `Styles::root`: 'content that it at the root' (should be 'is at the root'); '(efor pages,' (should be '(e.g. for pages,') with an unbalanced parenthesis in the `text(red, page(..)` example; and a double space in 'root  level'.","fix":"Fix the typos ('is at', 'e.g. for'), balance the `text(red, page(..))` parenthesis, and collapse the double space.","locations":[{"ref":"crates/typst-library/src/foundations/styles.rs:114-134","code":"  114 |     /// Determines the styles used for content that it at the root, outside of\n  115 |     /// the user-controlled content (e.g. page marginals and footnotes). This\n  116 |     /// applies to both paged and HTML export.\n  117 |     ///\n  118 |     /// As a base, we collect the styles that are shared by all elements in the\n  119 |     /// children (this can be a whole document in HTML or a page run in paged\n  120 |     /// export). As a fallback if there are no elements, we use the styles\n  121 |     /// active at the very start or, for page runs, at the pagebreak that\n  122 |     /// introduced the page. Then, to produce our trunk styles, we filter this\n  123 |     /// list of styles according to a few rules:\n  124 |     ///\n  125 |     /// - Other styles are only kept if they are `outside && (initial ||\n  126 |     ///   liftable)`.\n  127 |     /// - \"Outside\" means they were not produced within a show rule or, for page\n  128 |     ///   runs, that the show rule \"broke free\" to the root level by emitting\n  129 |     ///   page styles.\n  130 |     /// - \"Initial\" means they were active where the children start (efor pages,\n  131 |     ///   at the pagebreak that introduced the page). Since these are\n  132 |     ///   intuitively already active, they should be kept even if not liftable.\n  133 |     ///   (E.g. `text(red, page(..)`) makes the footer red.)\n  134 |     /// - \"Liftable\" means they can be lifted to the root  level even though","lines":21}]},{"id":"CMT_18","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Typo in doc comment: \"Decode on library from one data source\" - \"on\" should be \"one\".","fix":"Change to \"Decode one library from one data source.\"","locations":[{"ref":"crates/typst-library/src/model/bibliography.rs:424","code":"  424 | /// Decode on library from one data source.","lines":1}]},{"id":"CMT_19","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Typo: \"Fall back to a generating a page reference.\" contains an extra word \"a\" before \"generating\".","fix":"Change to \"Fall back to generating a page reference.\"","locations":[{"ref":"crates/typst-library/src/model/link.rs:326","code":"  326 |                     // Fall back to a generating a page reference.","lines":1}]},{"id":"CMT_20","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment on `AnchorGenerator::new` says \"Creates a new identificator.\" - \"identificator\" is not an English word, and the type is a generator, not an identificator.","fix":"Change to \"Creates a new anchor generator.\"","locations":[{"ref":"crates/typst-library/src/model/link.rs:523","code":"  523 |     /// Creates a new identificator.","lines":1}]},{"id":"CMT_21","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Doc comment on `Color::hsv`'s `color` parameter reads \"Alternatively: The color to convert to HSL.\" but the function converts to HSV. Copy-paste from the at enclosed the figure\", \"a `weak` pragraph\" / \"a pragraph is split up\" (twice), and \"Points at the next intem in the `unfinished` list\".","fix":"Fix to \"A wrapper element that encloses the figure\", \"paragraph\", and \"item\" respectively.","locations":[{"ref":"crates/typst-pdf/src/tags/groups.rs:439","code":"  439 |     /// An wrapper element that enclosed the figure tag and its caption.","lines":1},{"ref":"crates/typst-pdf/src/tags/groups.rs:452-454","code":"  452 |     /// Whether this paragraph is a `weak` pragraph that is omitted when it\n  453 |     /// contains no children. This can happen when there are overlapping tags\n  454 |     /// and a pragraph is split up.","lines":3},{"ref":"crates/typst-pdf/src/tags/tree/mod.rs:33","code":"   33 |     /// Points at the next intem in the `unfinished` list.","lines":1}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The three loop/branch evaluators repeat the identical control-flow dispatch block matching `vm.flow` against Break/Continue/Return/None (clearing flow on break/continue, breaking on return). It appears in the `while` loop, the `for` loop macro, and is conceptually mirrored in the conditional/loop epilogues. The 'Mark the return as conditional' epilogue (`if let Some(FlowEvent::Return(_, _, conditional)) = &mut vm.flow { *conditional = true; }`) is duplicated verbatim across `Conditional`, `WhileLoop`, and `ForLoop`.","fix":"Extract a helper (e.g. `handle_loop_flow(vm) -> LoopAction { Break, Continue, Stop }`) for the Break/Continue/Return dispatch, and a `mark_return_conditional(vm)` helper for the shared epilogue, then call them from all three sites.","locations":[{"ref":"crates/typst-eval/src/flow.rs:88-96","code":"   88 |             match vm.flow {\n   89 |                 Some(FlowEvent::Break(_)) => {\n   90 |                     vm.flow = None;\n   91 |                     break;\n   92 |                 }\n   93 |                 Some(FlowEvent::Continue(_)) => vm.flow = None,\n   94 |                 Some(FlowEvent::Return(..)) => break,\n   95 |                 None => {}\n   96 |             }","lines":9},{"ref":"crates/typst-eval/src/flow.rs:134-142","code":"  134 |                     match vm.flow {\n  135 |                         Some(FlowEvent::Break(_)) => {\n  136 |                             vm.flow = None;\n  137 |                             break;\n  138 |                         }\n  139 |                         Some(FlowEvent::Continue(_)) => vm.flow = None,\n  140 |                         Some(FlowEvent::Return(..)) => break,\n  141 |                         None => {}\n  142 |                     }","lines":9},{"ref":"crates/typst-eval/src/flow.rs:54-57","code":"   54 |         // Mark the return as conditional.\n   55 |         if let Some(FlowEvent::Return(_, _, conditional)) = &mut vm.flow {\n   56 |             *conditional = true;\n   57 |         }","lines":4},{"ref":"crates/typst-eval/src/flow.rs:105-108","code":"  105 |         // Mark the return as conditional.\n  106 |         if let Some(FlowEvent::Return(_, _, conditional)) = &mut vm.flow {\n  107 |             *conditional = true;\n  108 |         }","lines":4},{"ref":"crates/typst-eval/src/flow.rs:183-186","code":"  183 |         // Mark the return as conditional.\n  184 |         if let Some(FlowEvent::Return(_, _, conditional)) = &mut vm.flow {\n  185 |             *conditional = true;\n  186 |         }","lines":4}]},{"id":"DUP_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"`layout_single_impl` and `layout_multi_impl` are near-identical: both reconstruct `Protected::from_raw`, a `LocatorLink`, the `Locator`, build an `Engine` from the same tracked args, and call `layout_and_modify`, differing only in the child/region type and which `layout_*_block` is invoked (~25 lines duplicated). The same engine-reconstruction boilerplate recurs elsewhere.","fix":"Extract a helper that reconstructs the `Engine` + linked `Locator` from the tracked components and invokes a passed closure, eliminating the duplicated boilerplate.","locations":[{"ref":"crates/typst-layout/src/flow/collect.rs:415-442","code":"  415 | fn layout_single_impl(\n  416 |     world: Tracked<dyn World + '_>,\n  417 |     library: &LazyHash<Library>,\n  418 |     introspector: Tracked<dyn Introspector + '_>,\n  419 |     traced: Tracked<Traced>,\n  420 |     sink: TrackedMut<Sink>,\n  421 |     route: Tracked<Route>,\n  422 |     elem: &Packed<BlockElem>,\n  423 |     locator: Tracked<Locator>,\n  424 |     styles: StyleChain,\n  425 |     region: Region,\n  426 | ) -> SourceResult<Frame> {\n  427 |     let introspector = Protected::from_raw(introspector);\n  428 |     let link = LocatorLink::new(locator);\n  429 |     let locator = Locator::link(&link);\n  430 |     let mut engine = Engine {\n  431 |         library,\n  432 |         world,\n  433 |         introspector,\n  434 |         traced,\n  435 |         sink,\n  436 |         route: Route::extend(route),\n  437 |     };\n  438 | \n  439 |     layout_and_modify(styles, |styles| {\n  440 |         layout_single_block(elem, &mut engine, locator, styles, region)\n  441 |     })\n  442 | }","lines":28},{"ref":"crates/typst-layout/src/flow/collect.rs:515-542","code":"  515 | fn layout_multi_impl(\n  516 |     world: Tracked<dyn World + '_>,\n  517 |     library: &LazyHash<Library>,\n  518 |     introspector: Tracked<dyn Introspector + '_>,\n  519 |     traced: Tracked<Traced>,\n  520 |     sink: TrackedMut<Sink>,\n  521 |     route: Tracked<Route>,\n  522 |     elem: &Packed<BlockElem>,\n  523 |     locator: Tracked<Locator>,\n  524 |     styles: StyleChain,\n  525 |     regions: Regions,\n  526 | ) -> SourceResult<Fragment> {\n  527 |     let introspector = Protected::from_raw(introspector);\n  528 |     let link = LocatorLink::new(locator);\n  529 |     let locator = Locator::link(&link);\n  530 |     let mut engine = Engine {\n  531 |         library,\n  532 |         world,\n  533 |         introspector,\n  534 |         traced,\n  535 |         sink,\n  536 |         route: Route::extend(route),\n  537 |     };\n  538 | \n  539 |     layout_and_modify(styles, |styles| {\n  540 |         layout_multi_block(elem, &mut engine, locator, styles, regions)\n  541 |     })\n  542 | }","lines":28}]},{"id":"DUP_3","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The glyph-assembly part-measurement loop is duplicated in `assemble`: the first loop (computing `full`/`growable`/overlap) and the second loop (emitting glyphs) both compute `advance = font.to_em(part.full_advance).at(size)` and the `max_overlap = min(end_connector_length, next.start_connector_length)` connector overlap in the same way. The two ~25-line loops drift easily (e.g. the warning is only in the first); a shared helper computing per-part advance and overlap would reduce risk.","fix":"Extract a helper that yields `(advance, max_overlap)` per part and reuse it in both the sizing pass and the emitting pass.","locations":[{"ref":"crates/typst-layout/src/math/fragment/glyph.rs:593-619","code":"  593 |         while let Some(part) = parts.next() {\n  594 |             let mut advance = base.item.font.to_em(part.full_advance).at(base.item.size);\n  595 |             if let Some(next) = parts.peek() {\n  596 |                 let max_overlap = base\n  597 |                     .item\n  598 |                     .font\n  599 |                     .to_em(part.end_connector_length.min(next.start_connector_length))\n  600 |                     .at(base.item.size);\n  601 |                 if max_overlap < min_overlap {\n  602 |                     // This condition happening is indicative of a bug in the\n  603 |                     // font.\n  604 |                     engine.sink.warn(warning!(\n  605 |                        base.item.glyphs[0].span.0,\n  606 |                        \"glyph has assembly parts with overlap less than minConnectorOverlap\";\n  607 |                        hint: \"its rendering may appear broken - this is probably a font bug\";\n  608 |                        hint: \"please file an issue at https://github.com/typst/typst/issues\";\n  609 |                     ));\n  610 |                 }\n  611 | \n  612 |                 advance -= max_overlap;\n  613 |                 // In case we have that max_overlap < min_overlap, ensure we\n  614 |                 // don't decrease the value of growable.\n  615 |                 growable += (max_overlap - min_overlap).max(Abs::zero());\n  616 |             }\n  617 | \n  618 |             full += advance;\n  619 |         }","lines":27},{"ref":"crates/typst-layout/src/math/fragment/glyph.rs:635-646","code":"  635 |     let mut parts = parts(assembly, repeat).peekable();\n  636 |     while let Some(part) = parts.next() {\n  637 |         let mut advance = base.item.font.to_em(part.full_advance).at(base.item.size);\n  638 |         if let Some(next) = parts.peek() {\n  639 |             let max_overlap = base\n  640 |                 .item\n  641 |                 .font\n  642 |                 .to_em(part.end_connector_length.min(next.start_connector_length))\n  643 |                 .at(base.item.size);\n  644 |             advance -= max_overlap;\n  645 |             advance += ratio * (max_overlap - min_overlap);\n  646 |         }","lines":12}]},{"id":"DUP_4","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The `tight`-spacing prepend block (read `spacing` falling back to `ParElem::leading`, build a weak attached `VElem`, and prepend it via `realized = v + realized`) is copy-pasted across the list, enum, and terms show rules. The logic is identical but the terms variant additionally `.spanned(span)`s the VElem while the list/enum variants do not, an inconsistency that the duplication inv itecture","severity":"high","easy":false,"description":"`SyntaxSet` is backed by a `u128`, so it can only represent the first 128 `SyntaxKind` discriminants. `SyntaxKind` already has 137 variants (indices 0..=136). The 9 highest kinds (`ImportItems`, `ImportItemPath`, `RenamedImportItem`, `ModuleInclude`, `LoopBreak`, `LoopContinue`, `FuncReturn`, `Destructuring`, `DestructAssignment`) cannot be stored: `SyntaxSet::contains` silently returns `false` for them (guarded by `(kind as u8) < BITS`), while `add`/`remove` would assert-fail. None of those kinds happen to be used in any current `syntax_set!`/`at_set` call, so this is latent rather than active, but the design is fragile: adding any new leaf kind before index 128, reordering the enum, or using one of those kinds in a stop-set will silently misbehave (a stop condition that always evaluates false) or panic. The data structure capacity (128) is now smaller than the number of kinds it indexes.","fix":"Grow the set to cover all kinds (e.g. use a fixed-size bitset / `[u128; 2]`, or a const array of bools indexed by `kind as usize`), or add a compile-time assertion that `SyntaxKind` variant count <= 128. At minimum, make `contains` panic in debug for out-of-range kinds instead of silently returning false.","locations":[{"ref":"crates/typst-syntax/src/set.rs:9-48","code":"    9 | pub struct SyntaxSet(u128);\n   10 | \n   11 | impl SyntaxSet {\n   12 |     /// Create a new empty set.\n   13 |     pub const fn new() -> Self {\n   14 |         Self(0)\n   15 |     }\n   16 | \n   17 |     /// Insert a syntax kind into the set.\n   18 |     ///\n   19 |     /// You can only add kinds with discriminator < 128.\n   20 |     pub const fn add(self, kind: SyntaxKind) -> Self {\n   21 |         assert!((kind as u8) < BITS);\n   22 |         Self(self.0 | bit(kind))\n   23 |     }\n   24 | \n   25 |     /// Remove a syntax kind from the set. Does nothing if not present.\n   26 |     ///\n   27 |     /// You can only remove kinds with discriminator < 128.\n   28 |     pub const fn remove(self, kind: SyntaxKind) -> Self {\n   29 |         assert!((kind as u8) < BITS);\n   30 |         Self(self.0 & !bit(kind))\n   31 |     }\n   32 | \n   33 |     /// Combine two syntax sets.\n   34 |     pub const fn union(self, other: Self) -> Self {\n   35 |         Self(self.0 | other.0)\n   36 |     }\n   37 | \n   38 |     /// Whether the set contains the given syntax kind.\n   39 |     pub const fn contains(&self, kind: SyntaxKind) -> bool {\n   40 |         (kind as u8) < BITS && (self.0 & bit(kind)) != 0\n   41 |     }\n   42 | }\n   43 | \n   44 | const BITS: u8 = 128;\n   45 | \n   46 | const fn bit(kind: SyntaxKind) -> u128 {\n   47 |     1 << (kind as usize)\n   48 | }","lines":40},{"ref":"crates/typst-syntax/src/kind.rs:8-295","code":"    8 | pub enum SyntaxKind {\n    9 |     /// The end of token stream.\n   10 |     End,\n   11 |     /// An invalid sequence of characters.\n   12 |     Error,\n   13 | \n   14 |     /// A shebang: `#! ...`\n   15 |     Shebang,\n   16 |     /// A line comment: `// ...`.\n   17 |     LineComment,\n   18 |     /// A block comment: `/* ... */`.\n   19 |     BlockComment,\n   20 | \n   21 |     /// The contents of a file or content block.\n   22 |     Markup,\n   23 |     /// Plain text without markup.\n   24 |     Text,\n   25 |     /// Whitespace. Contains at most one newline in markup, as more indicate a\n   26 |     /// paragraph break.\n   27 |     Space,\n   28 |     /// A forced line break: `\\`.\n   29 |     Linebreak,\n   30 |     /// A paragraph break, indicated by one or multiple blank lines.\n   31 |     Parbreak,\n   32 |     /// An escape sequence: `\\#`, `\\u{1F5FA}`.\n   33 |     Escape,\n   34 |     /// A shorthand for a unicode codepoint. For example, `~` for non-breaking\n   35 |     /// space or `-?` for a soft hyphen.\n   36 |     Shorthand,\n   37 |     /// A smart quote: `'` or `\"`.\n   38 |     SmartQuote,\n   39 |     /// Strong content: `* :"`Property::name` is a `&'static str` and CSS property handling (`Properties::push`, `remove`, `set_display`) relies on string equality / `binary_search_by_key` over these names, while the parallel HTML attribute system uses interned `HtmlAttr` (`PicoStr`). The code itself flags this inconsistency with `// TODO: Use something similar to HtmlAttr`. The `&'static str` constraint also forces every dynamically-needed property name to be a string literal, which is a latent friction point.","fix":"Unify CSS property names with the interned-string approach used for `HtmlAttr` so property identity is cheap and consistent across the crate.","locations":[{"ref":"crates/typst-html/src/css/encode.rs:116-131","code":"  116 | /// A CSS property pair such as `display: block`.\n  117 | #[derive(Debug, Clone, Eq, PartialEq, Hash)]\n  118 | pub struct Property {\n  119 |     /// The property's name, e.g. `display`.\n  120 |     // TODO: Use something similar to `HtmlAttr`.\n  121 |     pub name: &'static str,\n  122 |     /// The property's serialized value, e.g. `block`.\n  123 |     pub value: EcoString,\n  124 | }\n  125 | \n  126 | impl Property {\n  127 |     /// Creates a new property pair from its parts.\n  128 |     pub fn new(name: &'static str, value: EcoString) -> Self {\n  129 |         Self { name, value }\n  130 |     }\n  131 | }","lines":16},{"ref":"crates/typst-html/src/convert.rs:499-510","code":"  499 | /// Sets the CSS `display` property for an element or frame.\n  500 | fn set_display(node: &mut HtmlNode, display: Option<property::Display>) {\n  501 |     let css = match node {\n  502 |         HtmlNode::Element(element) => &mut element.css,\n  503 |         HtmlNode::Frame(frame) => &mut frame.css,\n  504 |         _ => return,\n  505 |     };\n  506 |     match display {\n  507 |         Some(display) => css.push(\"display\", display.as_str()),\n  508 |         None => css.remove(\"display\"),\n  509 |     }\n  510 | }","lines":12}]},{"id":"ARCH_3","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`CachedCell` caches exactly one (input_hash, output) pair. During relayout-heavy paths (e.g. column-scoped float relayout reruns distribution with two oscillating region sizes), alternating calls thrash the single slot to a near-0% hit rate, defeating the memoization for exactly the paths it is meant to accelerate.","fix":"Consider a small fixed-size LRU (2-4 entries) instead of a single slot to survive the common oscillating-region relayout pattern, measuring the memory/speed tradeoff.","locations":[{"ref":"crates/typst-layout/src/flow/collect.rs:672-706","code":"  672 | /// Wraps a parameterized computation and caches its latest output.\n  673 | ///\n  674 | /// - When the computation is performed multiple times consecutively with the\n  675 | ///   same argument, reuses the cache.\n  676 | /// - When the argument changes, the new output is cached.\n  677 | #[derive(Clone)]\n  678 | struct CachedCell<T>(RefCell<Option<(u128, T)>>);\n  679 | \n  680 | impl<T> CachedCell<T> {\n  681 |     /// Create an empty cached cell.\n  682 |     fn new() -> Self {\n  683 |         Self(RefCell::new(None))\n  684 |     }\n  685 | \n  686 |     /// Perform the computation `f` with caching.\n  687 |     fn get_or_init<F, I>(&self, input: I, f: F) -> T\n  688 |     where\n  689 |         I: Hash,\n  690 |         T: Clone,\n  691 |         F: FnOnce(I) -> T,\n  692 |     {\n  693 |         let input_hash = typst_utils::hash128(&input);\n  694 | \n  695 |         let mut slot = self.0.borrow_mut();\n  696 |         if let Some((hash, output)) = &*slot\n  697 |             && *hash == input_hash\n  698 |         {\n  699 |             return output.clone();\n  700 |         }\n  701 | \n  702 |         let output = f(input);\n  703 |         *slot = Some((input_hash, output.clone()));\n  704 |         output\n  705 |     }\n  706 | }","lines":35}]},{"id":"ARCH_4","type":"architecture","type_label":"Architecture","severity":"negligible","easy":false,"description":"`Counter::matching_numbering` contains the comment 'This coupling between the counter type and the remaining standard library is not great ...'. The function hard-codes per-element-type branches (heading/figure/equation/footnote) twice (once for the queried element, once for the style fallback), so adding a new numbered element type requires editing this introspection module. This is acknowledged tech debt worth tracking.","fix":"Introduce a trait (e.g. `Numbered`/`Count`-style) that elements implement to expose their own default numbering and per-style numbering, and have the counter query that trait instead of matching on concrete element types.","locations":[{"ref":"crates/typst-library/src/introspection/counter.rs:278-332","code":"  278 |     /// Resolves the numbering for this counter track.\n  279 |     ///\n  280 |     /// This coupling between the counter type and the remaining standard\n  281 |     /// library is not great ...\n  282 |     fn matching_numbering(\n  283 |         &self,\n  284 |         engine: &mut Engine,\n  285 |         styles: StyleChain,\n  286 |         loc: Location,\n  287 |         span: Span,\n  288 |     ) -> Option<Numbering> {\n  289 |         match self.0 {\n  290 |             CounterKey::Page => loc.page_numbering(engine, span),\n  291 |             CounterKey::Selector(Selector::Elem(func, _)) => engine\n  292 |                 .introspect(QueryFirstIntrospection(Selector::Location(loc), span))\n  293 |                 .and_then(|content| {\n  294 |                     if func == HeadingElem::ELEM {\n  295 |                         content\n  296 |                             .to_packed::<HeadingElem>()\n  297 |                             .and_then(|elem| elem.numbering.as_option().clone())\n  298 |                             .flatten()\n  299 |                     } else if func == FigureElem::ELEM {\n  300 |                         content\n  301 | <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);

const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {

}
function saveStatuses() {
