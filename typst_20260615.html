<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"When a document uses a custom top-level `<html>` element (allowed by `finalize_dom`, which returns it as the root) and the document also contains an equation, `html_document_common` searches the root's children for a `<head>` element and calls `.expect(\"head to be present in document output\")`. A user-provided `<html>` is not required to contain a `<head>`, so a document like `#html.elem(\"html\")[$x$]` panics the compiler instead of producing a diagnostic. The code comment itself acknowledges this should be an error rather than an expect.","fix":"Replace the `.expect(...)` with graceful handling: if no `<head>` exists in a custom DOM, emit a proper `SourceResult` error (or skip injecting equation styles / inject them elsewhere) rather than panicking.","locations":[{"ref":"crates/typst-html/src/document.rs:196-215","code":"  196 |     if has_equations {\n  197 |         let root = output.root_mut();\n  198 | \n  199 |         let head = root.children.make_mut().iter_mut().find_map(|node| match node {\n  200 |             HtmlNode::Element(elem) if elem.tag == tag::head => Some(elem),\n  201 |             _ => None,\n  202 |         });\n  203 | \n  204 |         // TODO: this becomes an error when html fragments are supported\n  205 |         let head = head.expect(\"head to be present in document output\");\n  206 | \n  207 |         head.children.push(\n  208 |             HtmlElement::new(tag::style)\n  209 |                 .with_children(eco_vec![HtmlNode::Text(\n  210 |                     EQUATION_CSS_STYLES.clone(),\n  211 |                     Span::detached(),\n  212 |                 )])\n  213 |                 .into(),\n  214 |         );\n  215 |     }","lines":20}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`MultiSpill::layout` skips `self.backlog.len()` frames and then calls `frames.next().unwrap()`. The surrounding comment itself admits the region model 'is not 100% correct' and the cached cell may produce a result from a differently-shaped region; if `layout_full` returns fewer frames than `self.backlog.len() + 1`, this unwrap panics on an otherwise valid document.","fix":"Handle a `None` from `frames.next()` gracefully (return an empty frame / no spill) or replace the `unwrap()` with a descriptive internal-error `bail!` rather than panicking.","locations":[{"ref":"crates/typst-layout/src/flow/collect.rs:587-604","code":"  587 |         let mut frames = self\n  588 |             .multi\n  589 |             .layout_full(engine, pod)?\n  590 |             .into_iter()\n  591 |             .skip(self.backlog.len());\n  592 | \n  593 |         // Ensure that the backlog never shrinks, so that unwrapping below is at\n  594 |         // least fairly safe. Note that the whole region juggling here is\n  595 |         // fundamentally not ideal: It is a compatibility layer between the old\n  596 |         // (all regions provided upfront) & new (each region provided on-demand,\n  597 |         // like an iterator) layout model. This approach is not 100% correct, as\n  598 |         // in the old model later regions could have an effect on earlier\n  599 |         // frames, but it's the best we can do for now, until the multi\n  600 |         // layouters are refactored to the new model.\n  601 |         self.min_backlog_len = self.min_backlog_len.max(backlog.len());\n  602 | \n  603 |         // Save the first frame.\n  604 |         let frame = frames.next().unwrap();","lines":18}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Arithmetic between a `Datetime` and a `Duration` uses `time`'s panicking `+`/`-` operators (implemented as `checked_*(...).expect(\"resulting value is out of range\")`). These impls are reached directly from user-facing operators in ops.rs (`Datetime + Duration`, `Datetime - Duration`), so markup like `#(datetime(year: 9999, month: 12, day: 31) + duration(weeks: 99999999))` panics the compiler rather than erroring cleanly.","fix":"Use `checked_add`/`checked_sub` from `time` inside these `Add`/`Sub` impls (or in ops.rs) and surface `None` as a diagnostic instead of relying on the panicking operators.","locations":[{"ref":"crates/typst-library/src/foundations/datetime.rs:529-565","code":"  529 | impl Add<Duration> for Datetime {\n  530 |     type Output = Self;\n  531 | \n  532 |     fn add(self, rhs: Duration) -> Self::Output {\n  533 |         let rhs: time::Duration = rhs.into();\n  534 |         match self {\n  535 |             Self::Datetime(datetime) => Self::Datetime(datetime + rhs),\n  536 |             Self::Date(date) => {\n  537 |                 use time::Time;\n  538 |                 match PrimitiveDateTime::new(date, Time::MIDNIGHT) + rhs {\n  539 |                     dt if dt.time() == Time::MIDNIGHT => Self::Date(dt.date()),\n  540 |                     dt => Self::Datetime(dt),\n  541 |                 }\n  542 |             }\n  543 |             Self::Time(time) => Self::Time(time + rhs),\n  544 |         }\n  545 |     }\n  546 | }\n  547 | \n  548 | impl Sub<Duration> for Datetime {\n  549 |     type Output = Self;\n  550 | \n  551 |     fn sub(self, rhs: Duration) -> Self::Output {\n  552 |         let rhs: time::Duration = rhs.into();\n  553 |         match self {\n  554 |             Self::Datetime(datetime) => Self::Datetime(datetime - rhs),\n  555 |             Self::Date(date) => {\n  556 |                 use time::Time;\n  557 |                 match PrimitiveDateTime::new(date, Time::MIDNIGHT) - rhs {\n  558 |                     dt if dt.time() == Time::MIDNIGHT => Self::Date(dt.date()),\n  559 |                     dt => Self::Datetime(dt),\n  560 |                 }\n  561 |             }\n  562 |             Self::Time(time) => Self::Time(time - rhs),\n  563 |         }\n  564 |     }\n  565 | }","lines":37}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Duration::construct` builds a `time::Duration` via `time::Duration::seconds/minutes/hours/days/weeks` and chained `+`, all of which `.expect(...)` on overflow. User markup such as `#duration(weeks: 9223372036854775807)` therefore panics the compiler instead of producing a graceful diagnostic.","fix":"Use the checked constructors (e.g. `time::Duration::checked_weeks`) and `checked_add`, and `bail!` with an overflow message when any returns `None`.","locations":[{"ref":"crates/typst-library/src/foundations/duration.rs:73-79","code":"   73 |         Duration::from(\n   74 |             time::Duration::seconds(seconds)\n   75 |                 + time::Duration::minutes(minutes)\n   76 |                 + time::Duration::hours(hours)\n   77 |                 + time::Duration::days(days)\n   78 |                 + time::Duration::weeks(weeks),\n   79 |         )","lines":7}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`AxisValue::clamp` calls `self.0.clamp(axis.min.0, axis.max.0)` on raw `f32` values taken directly from a font's `fvar` table. `f32::clamp` panics if `min > max` or if either bound is NaN. A malformed/adversarial variable font whose variation axis advertises `min > max` (or a NaN bound) would therefore panic the whole compilation. Font data is untrusted input, so this is a denial-of-service vector via crafted fonts. The values flow in unchecked from `FontInfo::from_ttf` (`min: AxisValue(axis.min_value)`, `max: AxisValue(axis.max_value)`) and are then clamped during `FontVariations::resolve`.","fix":"Guard against degenerate ranges before clamping, e.g. `let (lo, hi) = (axis.min.0.min(axis.max.0), axis.min.0.max(axis.max.0)); AxisValue(self.0.clamp(lo, hi))`, and skip/normalize NaN bounds when ingesting the axes in `FontInfo::from_ttf`.","locations":[{"ref":"crates/typst-library/src/text/font/variations.rs:59-63","code":"   59 |     /// Clamps this value into the allowed range for the given `axis`.\n   60 |     pub fn clamp(self, axis: &FontAxis) -> Self {\n   61 |         AxisValue(self.0.clamp(axis.min.0, axis.max.0))\n   62 |     }\n   63 | }","lines":5},{"ref":"crates/typst-library/src/text/font/variations.rs:141-188","code":"  141 |     pub fn resolve(axes: &[FontAxis], variant: FontVariant, size: Abs) -> Self {\n  142 |         let mut variations = FontVariations::default();\n  143 |         let mut set = |axis: &FontAxis, value: AxisValue| {\n  144 |             variations.0.push((axis.tag, value.clamp(axis)));\n  145 |         };\n  146 | \n  147 |         let axes = StandardAxes::parse(axes);\n  148 | \n  149 |         match (variant.style, axes.ital, axes.slnt) {\n  150 |             // Don't need to do anything or can't do anything.\n  151 |             (FontStyle::Normal, ..) | (_, None, None) => {}\n  152 | \n  153 |             // Serve italic due to request or as fallback for oblique.\n  154 |             (FontStyle::Italic, Some(axis), _)\n  155 |             | (FontStyle::Oblique, Some(axis), None) => {\n  156 |                 // Set to 1.0 for italic, but avoid exceeding the axis' range.\n  157 |                 set(axis, AxisValue(axis.max.0.min(1.0)));\n  158 |             }\n  159 | \n  160 |             // Serve oblique due to request or as fallback for italic.\n  161 |             (FontStyle::Oblique, _, Some(axis))\n  162 |             | (FontStyle::Italic, None, Some(axis)) => {\n  163 |                 // Slant values are clockwise and a typical italic is\n  164 |                 // counter-clockwise, so negative values are desirable. If the\n  165 |                 // axis doesn't support negative slant, however, we prefer,\n  166 |                 // positive slant over no slant at all.\n  167 |                 if axis.min.0 < 0.0 {\n  168 |                     set(axis, axis.min);\n  169 |                 } else if axis.max.0 > 0.0 {\n  170 |                     set(axis, axis.max);\n  171 |                 }\n  172 |             }\n  173 |         }\n  174 | \n  175 |         if let Some(axis) = axes.wdth {\n  176 |             set(axis, variant.stretch.to_wdth());\n  177 |         }\n  178 | \n  179 |         if let Some(axis) = axes.wght {\n  180 |             set(axis, variant.weight.to_wght());\n  181 |         }\n  182 | \n  183 |         if let Some(axis) = axes.opsz {\n  184 |             set(axis, AxisValue(size.to_pt() as f32));\n  185 |         }\n  186 | \n  187 |         variations\n  188 |     }","lines":48},{"ref":"crates/typst-library/src/text/font/info.rs:140-149","code":"  140 |         let axes = ttf\n  141 |             .variation_axes()\n  142 |             .into_iter()\n  143 |             .map(|axis| FontAxis {\n  144 |                 tag: Tag::from_bytes(&axis.tag.to_bytes()),\n  145 |                 min: AxisValue(axis.min_value),\n  146 |                 max: AxisValue(axis.max_value),\n  147 |                 default: AxisValue(axis.def_value),\n  148 |             })\n  149 |             .collect();","lines":10}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Paint::unwrap_solid` panics with `panic!(\"expected solid color\")` when the paint is a gradient or tiling. This is a hard panic reachable from text rendering paths; a malformed/unexpected paint reaching this point aborts compilation instead of producing a diagnostic.","fix":"Return `Option<Color>` (or a `SourceResult`) and let callers handle the non-solid case, or document and guarantee the invariant at the call sites so the panic is provably unreachable.","locations":[{"ref":"crates/typst-library/src/visualize/paint.rs:20-26","code":"   20 |     /// Unwraps a solid color used for text rendering.\n   21 |     pub fn unwrap_solid(&self) -> Color {\n   22 |         match self {\n   23 |             Self::Solid(color) => color.clone(),\n   24 |             Self::Gradient(_) | Self::Tiling(_) => panic!(\"expected solid color\"),\n   25 |         }\n   26 |     }","lines":7}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`render_tiling_frame` creates a pixmap via `sk::Pixmap::new(w, h).unwrap()` where `w`/`h` are `(size * pixel_per_pt).round() as u32`. If the tiling size (plus spacing) rounds down to zero pixels in either dimension (very small tiling and/or small `pixel_per_pt`), `Pixmap::new` returns `None` and the `unwrap()` panics, crashing rendering. Other pixmap creations in this crate guard with `.max(1)` (e.g. `build_texture`'s `cached` uses `width.max(1)`), but this one does not.","fix":"Clamp the dimensions to at least 1: `sk::Pixmap::new((..).round().max(1.0) as u32, (..).round().max(1.0) as u32)`, or return early / fall back when the rounded size is zero.","locations":[{"ref":"crates/typst-render/src/paint.rs:297-303","code":"  297 | pub fn render_tiling_frame(state: &State, tilings: &Tiling) -> sk::Pixmap {\n  298 |     let size = tilings.size() + tilings.spacing();\n  299 |     let mut canvas = sk::Pixmap::new(\n  300 |         (size.x.to_f32() * state.pixel_per_pt).round() as u32,\n  301 |         (size.y.to_f32() * state.pixel_per_pt).round() as u32,\n  302 |     )\n  303 |     .unwrap();","lines":7}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`eval` hard-panics with `panic!(\"Tried to cyclicly evaluate {:?}\", ...)` if a cyclic evaluation slips past the route check. While `import_file` guards against cycles with `route.contains` and bails gracefully (\"cyclic import\"), this panic is a process-aborting invariant violation rather than a recoverable diagnostic. Any future code path that reaches `eval` without going through `import_file`'s check (or a bug in route tracking) would crash the compiler/IDE instead of reporting an error.","fix":"Return a `SourceResult` error (e.g. via `bail!` against the source span) instead of `panic!`, so cyclic evaluation surfaces as a diagnostic rather than a crash.","locations":[{"ref":"crates/typst-eval/src/lib.rs:48-52","code":"   48 |     // Prevent cyclic evaluation.\n   49 |     let id = source.id();\n   50 |     if route.contains(id) {\n   51 |         panic!(\"Tried to cyclicly evaluate {:?}\", id.vpath());\n   52 |     }","lines":5}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `measure_auto_row`, when `can_skip` is false the second call's result is unwrapped (`.unwrap()`), relying on the documented invariant that the result is always `Some` when `can_skip` is false. The invariant holds in the current code (the only early `return Ok(None)` is gated on `can_skip && breakable`), but it is enforced only by a comment, so a future change to the skip condition would turn this into a panic on valid input rather than a compile error.","fix":"Either return a typed result that makes the `can_skip=false => Some` invariant explicit, or replace the `.unwrap()` with an explicit internal-error path (e.g. `bail!`/`unreachable!` with a descriptive message).","locations":[{"ref":"crates/typst-layout/src/grid/layouter.rs:1166-1177","code":" 1166 |             None => {\n 1167 |                 self.finish_region(engine, false)?;\n 1168 |                 self.measure_auto_row(\n 1169 |                     engine,\n 1170 |                     disambiguator,\n 1171 |                     y,\n 1172 |                     false,\n 1173 |                     self.unbreakable_rows_left,\n 1174 |                     None,\n 1175 |                 )?\n 1176 |                 .unwrap()\n 1177 |             }","lines":12}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `MathFragment::kern_at_height`, the glyph index is computed as `glyph.item.glyphs.len() - 1` for several corner cases, and `is_vertical` is `glyph.item.glyphs.iter().all(|g| g.y_advance != 0)` which returns `true` for an empty glyph vector. If `item.glyphs` is ever empty, both `len() - 1` (usize underflow) and the later `glyphs[glyph_index]` index will panic. While glyph fragments normally hold at least one glyph, there is no assertion guaranteeing it after `assemble`/`stretch`, so this is a latent panic should an assembly ever produce no parts.","fix":"Guard against an empty `glyphs` slice (early-return `Abs::zero()`), or assert the invariant that a glyph fragment always has at least one glyph.","locations":[{"ref":"crates/typst-layout/src/math/fragment/mod.rs:180-195","code":"  180 |                 let is_vertical =\n  181 |                     glyph.item.glyphs.iter().all(|glyph| glyph.y_advance != Em::zero());\n  182 |                 let glyph_index = match (is_vertical, corner) {\n  183 |                     (true, Corner::TopLeft | Corner::TopRight) => {\n  184 |                         glyph.item.glyphs.len() - 1\n  185 |                     }\n  186 |                     (false, Corner::TopRight | Corner::BottomRight) => {\n  187 |                         glyph.item.glyphs.len() - 1\n  188 |                     }\n  189 |                     _ => 0,\n  190 |                 };\n  191 | \n  192 |                 kern_at_height(\n  193 |                     &glyph.item.font,\n  194 |                     GlyphId(glyph.item.glyphs[glyph_index].id),\n  195 |                     corner,","lines":16}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `layout_blank_page`, `layout_page_run(engine, &[], ...)` is followed by `.into_iter().next().unwrap()`, assuming the returned vector is non-empty. This holds in practice because `layout_flow` yields one frame for empty children, but the invariant is not locally guaranteed; if `layout_flow` ever returned an empty fragment for empty input this would panic.","fix":"Make the contract explicit: handle the empty case gracefully (e.g. construct a default blank `LayoutedPage`) or document/assert the invariant at the call site instead of relying on `unwrap()`.","locations":[{"ref":"crates/typst-layout/src/pages/run.rs:46-53","code":"   46 | pub fn layout_blank_page(\n   47 |     engine: &mut Engine,\n   48 |     locator: Locator,\n   49 |     initial: StyleChain,\n   50 | ) -> SourceResult<LayoutedPage> {\n   51 |     let layouted = layout_page_run(engine, &[], locator, initial)?;\n   52 |     Ok(layouted.into_iter().next().unwrap())\n   53 | }","lines":8}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`Content::field(id)` calls `self.elem().field_name(id).unwrap()` inside the `map_err` closure. If `id` is not a valid field id (and not the special 255), `get(id, None)` returns `Err(FieldAccessError::Unknown)` and `field_name(id)` returns `None`, so the `.unwrap()` panics instead of producing the intended 'does not have field' diagnostic. All current callers pass macro-generated valid ids, so it is a latent footgun rather than a live bug, but `field_by_name` (the sibling method) avoids the issue entirely.","fix":"Use a fallback such as `self.elem().field_name(id).unwrap_or(\"?\")`, or format the message without requiring the resolved name when the error is `Unknown`.","locations":[{"ref":"crates/typst-library/src/foundations/content/mod.rs:217-220","code":"  217 |     pub fn field(&self, id: u8) -> StrResult<Value> {\n  218 |         self.get(id, None)\n  219 |             .map_err(|e| e.message(self, self.elem().field_name(id).unwrap()))\n  220 |     }","lines":4}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The `TodayOffset` cast arm `hours: i64 => Self(time::Duration::hours(hours).into())` uses the panicking `time::Duration::hours`, which `.expect(...)`s on overflow. `#datetime.today(offset: 9223372036854775807)` therefore panics the compiler before any guard runs.","fix":"Use `time::Duration::checked_hours(hours)` and map `None` to a cast error string.","locations":[{"ref":"crates/typst-library/src/foundations/datetime.rs:643-648","code":"  643 | cast! {\n  644 |     TodayOffset,\n  645 |     self => self.0.into_value(),\n  646 |     v: Duration => Self(v),\n  647 |     hours: i64 => Self(time::Duration::hours(hours).into()),\n  648 | }","lines":6}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Mul<f64>` and `Div<f64>` for `Duration` delegate to `time::Duration`'s `Mul<f64>`/`Div<f64>`, which panic on NaN, infinity, or range overflow. These are wired to user-facing operators (`Duration * float`, `Duration / float`), so `#(duration(weeks: 1) * float.nan)` or multiplying by a huge factor panics the compiler.","fix":"Validate the multiplier/divisor (reject non-finite, check resulting range) before applying, returning a diagnostic on failure rather than delegating to the panicking ops.","locations":[{"ref":"crates/typst-library/src/foundations/duration.rs:201-215","code":"  201 | impl Mul<f64> for Duration {\n  202 |     type Output = Duration;\n  203 | \n  204 |     fn mul(self, rhs: f64) -> Self::Output {\n  205 |         Duration(self.0 * rhs)\n  206 |     }\n  207 | }\n  208 | \n  209 | impl Div<f64> for Duration {\n  210 |     type Output = Duration;\n  211 | \n  212 |     fn div(self, rhs: f64) -> Self::Output {\n  213 |         Duration(self.0 / rhs)\n  214 |     }\n  215 | }","lines":15}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`HeadingElem::resolve_level` computes `offset + depth.get()` (both user-settable: `offset` is a plain `usize` with default 0, `depth` is `NonZeroUsize`) and unwraps the result with `.expect(\"overflow to 0 on NoneZeroUsize + usize\")`. The addition itself can overflow `usize` and panic (in debug) or wrap (in release) before `NonZeroUsize::new` is even reached; and a wrapped value of 0 reaches the `expect` and panics. A user writing e.g. `#set heading(offset: 18446744073709551615)` followed by any heading triggers this. A user-reachable construction should produce a diagnostic, not a panic.","fix":"Use `self.offset.get(styles).checked_add(self.depth.get(styles).get()).and_then(NonZeroUsize::new)` and return a `SourceResult`/clamp to `NonZeroUsize::MAX` instead of `.expect()`. `resolve_level` callers (Synthesize, ShowSet, Count, Outlinable) would need to handle the error or the value should be clamped.","locations":[{"ref":"crates/typst-library/src/model/heading.rs:230-235","code":"  230 |     pub fn resolve_level(&self, styles: StyleChain) -> NonZeroUsize {\n  231 |         self.level.get(styles).unwrap_or_else(|| {\n  232 |             NonZeroUsize::new(self.offset.get(styles) + self.depth.get(styles).get())\n  233 |                 .expect(\"overflow to 0 on NoneZeroUsize + usize\")\n  234 |         })\n  235 |     }","lines":6}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`bounding_box` unwraps `Rect::from_ltrb(min_x, min_y, max_x, max_y)`. The min/max values come from transforming the link rectangle's corners through the current transform and reducing with `f32::min`/`max`. If any transformed coordinate is non-finite (NaN/inf, e.g. due to a degenerate or extreme transform), the reduction yields non-finite bounds and `Rect::from_ltrb(...).unwrap()` panics, aborting the whole export. Link rectangles are derived from user content, so an adversarial or pathological transform reaches this.","fix":"Use a fallible path: if `Rect::from_ltrb` returns `None` (or any bound is non-finite), skip emitting the annotation (return early in `handle_link`) instead of unwrapping.","locations":[{"ref":"crates/typst-pdf/src/link.rs:169-192","code":"  169 | fn bounding_box(fc: &FrameContext, size: Size) -> kg::Rect {\n  170 |     let pos = Point::zero();\n  171 |     let points = [\n  172 |         pos + Point::with_y(size.y),\n  173 |         pos + size.to_point(),\n  174 |         pos + Point::with_x(size.x),\n  175 |         pos,\n  176 |     ];\n  177 | \n  178 |     let mut min_x = f32::INFINITY;\n  179 |     let mut min_y = f32::INFINITY;\n  180 |     let mut max_x = f32::NEG_INFINITY;\n  181 |     let mut max_y = f32::NEG_INFINITY;\n  182 | \n  183 |     for point in points {\n  184 |         let p = point.transform(fc.state().transform()).to_krilla();\n  185 |         min_x = min_x.min(p.x);\n  186 |         min_y = min_y.min(p.y);\n  187 |         max_x = max_x.max(p.x);\n  188 |         max_y = max_y.max(p.y);\n  189 |     }\n  190 | \n  191 |     kg::Rect::from_ltrb(min_x, min_y, max_x, max_y).unwrap()\n  192 | }","lines":24}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Annotations::take` and `TagStorage::take` remove a value out of a slot and `expect` it to be present (`expect(\"initialized annotation node\")` / `expect(\"tag\")`). If the tag-tree resolver ever visits the same `Annotation`/`Standard` node twice (e.g. due to a group being inserted into two parents through the logical-child/move-into machinery), the second `take` hits an emptied slot and panics. The resolver relies on the invariant that each node id is consumed exactly once; this invariant is not locally enforced and a structural bug elsewhere surfaces here as an opaque panic rather than a diagnostic.","fix":"These are internal invariants; at minimum convert the `expect` into `panic_internal`/`assert_internal` with a span so a double-visit produces a reportable internal error instead of a bare panic, and document the single-consumption invariant.","locations":[{"ref":"crates/typst-pdf/src/tags/context/mod.rs:115-118","code":"  115 |     pub fn take(&mut self, id: AnnotationId) -> Node {\n  116 |         let annot = self.0[id.idx()].take().expect(\"initialized annotation node\");\n  117 |         Node::Leaf(annot)\n  118 |     }","lines":4},{"ref":"crates/typst-pdf/src/tags/groups.rs:350-352","code":"  350 |     pub fn take(&mut self, id: TagId) -> TagKind {\n  351 |         self.0[id.idx()].take().expect(\"tag\")\n  352 |     }","lines":3}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`render_image_glyph`/`render_path_glyph` compute `scale = text.size / text.font.units_per_em()` and outline glyphs are pre-scaled by it. If a (malformed) font reports `units_per_em() == 0`, the division produces an infinite/NaN scale that propagates into transforms and path coordinates. ttf-parser normally guarantees a non-zero upem, but there is no defensive check here, unlike many other size computations in the codebase.","fix":"Treat a zero `units_per_em()` defensively (skip the glyph or substitute a sane default) before dividing.","locations":[{"ref":"crates/typst-svg/src/text.rs:67","code":"   67 |             let scale = Ratio::new(text.size.to_pt() / text.font.units_per_em());","lines":1},{"ref":"crates/typst-svg/src/text.rs:103","code":"  103 |         let scale = Ratio::new(text.size.to_pt() / text.font.units_per_em());","lines":1},{"ref":"crates/typst-render/src/text.rs:27-28","code":"   27 |             let upem = text.font.units_per_em();\n   28 |             let text_scale = text.size / upem;","lines":2}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Several paint-transform code paths call `state.transform.invert().unwrap()` / `state.container_transform.invert().unwrap()`. A singular (non-invertible) transform — e.g. a zero scale produced by `scale(x: 0%)` on a parent-relative gradient/tiling fill — makes `invert()` return `None`, panicking. This affects both the SVG and raster renderers.","fix":"Handle the non-invertible case gracefully (e.g. fall back to `Transform::identity()` / skip the fill) instead of unwrapping, or guarantee upstream that container/state transforms are always invertible.","locations":[{"ref":"crates/typst-svg/src/text.rs:172","code":"  172 |                 .post_concat(state.transform.invert().unwrap()),","lines":1},{"ref":"crates/typst-svg/src/shape.rs:93","code":"   93 |                 .post_concat(state.transform.invert().unwrap()),","lines":1},{"ref":"crates/typst-svg/src/shape.rs:98","code":"   98 |                 RelativeTo::Parent => state.transform.invert().unwrap(),","lines":1},{"ref":"crates/typst-render/src/paint.rs:50","code":"   50 |             RelativeTo::Parent => state.container_transform.invert().unwrap(),","lines":1},{"ref":"crates/typst-render/src/paint.rs:103","code":"  103 |             RelativeTo::Parent => state.container_transform.invert().unwrap(),","lines":1},{"ref":"crates/typst-render/src/lib.rs:218","code":"  218 |                     .post_concat(state.container_transform.invert().unwrap()),","lines":1}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `Progress`'s `Display` impl, `remaining_bytes = content_len - self.downloaded` is an unchecked `usize` subtraction. If a server reports a `Content-Length` smaller than the actual body it streams (or due to a redirect/transfer-encoding quirk), `downloaded` can exceed `content_len`, causing an integer underflow panic in a debug build and a gigantic bogus ETA in release. Progress display should never be able to crash a download.","fix":"Use `content_len.saturating_sub(self.downloaded)` for `remaining_bytes`, and clamp `ratio` to `<= 1.0` for the percentage.","locations":[{"ref":"crates/typst-kit/src/downloader.rs:322-330","code":"  322 |             Some(content_len) => {\n  323 |                 let ratio = self.downloaded as f64 / content_len as f64;\n  324 |                 let remaining_bytes = content_len - self.downloaded;\n  325 |                 let remaining_buckets: u32 = remaining_bytes\n  326 |                     .checked_div(bytes_per_period)\n  327 |                     .and_then(|c| c.try_into().ok())\n  328 |                     .unwrap_or(0);\n  329 | \n  330 |                 let eta = self.period * remaining_buckets;","lines":9}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`round_int_with_precision` computes `-precision as u32` without any lower-bound guard on `precision`. For `precision == i16::MIN` (-32768), the negation `-precision` overflows `i16` (the positive value 32768 is not representable), panicking in debug builds and wrapping to a wrong value in release. Note that the sibling float function `round_with_precision` *does* guard with `precision < -(f64::MAX_10_EXP as i16)`, but the integer variant has no equivalent check before negating.","fix":"Guard against the extreme value before negating, e.g. compute `let digits = (precision as i32).unsigned_abs();` (widening to i32 first) or early-return `Some(0)` for `precision <= -19` (more digits than any i64 can hold) before doing `-precision as u32`.","locations":[{"ref":"crates/typst-utils/src/round.rs:82-91","code":"   82 | pub fn round_int_with_precision(value: i64, precision: i16) -> Option<i64> {\n   83 |     if precision >= 0 {\n   84 |         return Some(value);\n   85 |     }\n   86 | \n   87 |     let digits = -precision as u32;\n   88 |     let Some(ten_to_digits) = 10i64.checked_pow(digits - 1) else {\n   89 |         // Larger than any possible amount of integer digits.\n   90 |         return Some(0);\n   91 |     };","lines":10}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `layout_repeat`, when `justify` is enabled and exactly one copy fits (`count == 1.0`), `gap += remaining / (count - 1.0)` divides by zero, producing an infinite/NaN gap. It is currently masked because the placement loop runs once and the `count == 1.0` branch uses `align.x.position` instead, so the poisoned `gap` is never read; but it is a latent division-by-zero one refactor away from corrupting layout.","fix":"Guard the justify adjustment with the count, e.g. `if justify && count > 1.0 { gap += remaining / (count - 1.0); }`, mirroring the existing `count == 1.0` check.","locations":[{"ref":"crates/typst-layout/src/repeat.rs:50-53","code":"   50 |     let justify = elem.justify.get(styles);\n   51 |     if justify {\n   52 |         gap += remaining / (count - 1.0);\n   53 |     }","lines":4}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`fact_impl(start, end)` computes `end + 1 < start` without checked arithmetic. It is called from `fact` as `fact_impl(1, number)` and from `perm` as `fact_impl(base - numbers + 1, base)`, where `number`/`base` come straight from user-supplied `u64` arguments. Calling `calc.fact(18446744073709551615)` (u64::MAX) makes `end + 1` overflow: in debug builds this panics; in release it wraps to 0, so the guard `end + 1 < start` becomes `0 < 1` and the function silently returns `Some(0)` instead of an overflow error. Either way the behavior is wrong.","fix":"Use `end.checked_add(1).is_none_or(|e| e < start)` or restructure the empty-range check as `if start > end { return Some(if ... ) }` to avoid the `+ 1` overflow. The intent (empty range -> conventional value) can be expressed without adding 1 to a u64 that may be u64::MAX.","locations":[{"ref":"crates/typst-library/src/foundations/calc.rs:608-612","code":"  608 | fn fact_impl(start: u64, end: u64) -> Option<i64> {\n  609 |     // By convention\n  610 |     if end + 1 < start {\n  611 |         return Some(0);\n  612 |     }","lines":5}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In the page-counter sequence, `let delta = page.get() - prev.get();` assumes the page numbers returned by `introspector.page()` are monotonically non-decreasing in query order. If the introspector ever returns a page number for a later element that is smaller than a previous one (e.g. due to a not-yet-converged intermediate layout iteration), this subtraction underflows and panics in debug builds (usize). The `CounterAtIntrospection` paths use `saturating_sub` for the analogous computation, so this spot is inconsistent and less defensive.","fix":"Use `page.get().saturating_sub(prev.get())` for consistency with the other delta computations and to avoid a potential underflow panic during non-converged iterations.","locations":[{"ref":"crates/typst-library/src/introspection/counter.rs:936-945","code":"  936 |             let prev = page;\n  937 |             page = introspector\n  938 |                 .page(elem.location().unwrap())\n  939 |                 .unwrap_or(NonZeroUsize::ONE);\n  940 | \n  941 |             let delta = page.get() - prev.get();\n  942 |             if delta > 0 {\n  943 |                 current.step(NonZeroUsize::ONE, delta as u64);\n  944 |             }\n  945 |         }","lines":10},{"ref":"crates/typst-library/src/introspection/counter.rs:796-803","code":"  796 |         if counter.is_page() {\n  797 |             let delta = introspector\n  798 |                 .page(*loc)\n  799 |                 .unwrap_or(NonZeroUsize::ONE)\n  800 |                 .get()\n  801 |                 .saturating_sub(page.get());\n  802 |             state.step(NonZeroUsize::ONE, delta as u64);\n  803 |         }","lines":8}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"`Array::slice` computes the end position as `start as i64 + c` with unchecked arithmetic when `count` is given. A `count` near `i64::MAX` overflows (panic in debug, wrap in release). The same idiom appears in `str.rs:270` and `bytes.rs:294`, so it is a codebase-wide convention; real impact is minimal because `locate` would reject the value anyway in release.","fix":"Use `(start as i64).checked_add(c)` and treat overflow as out of bounds, consistent with the checked-add style already used in `locate_opt`.","locations":[{"ref":"crates/typst-library/src/foundations/array.rs:297-298","code":"  297 |         let end = end.or(count.map(|c| start as i64 + c));\n  298 |         let end = self.locate(end.unwrap_or(self.len() as i64), true)?.max(start);","lines":2}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"Plugin call passes the wasm argument length as `wasmi::Val::I32(a.len() as i32)`, truncating to 32-bit signed. A >=2 GiB argument buffer would be passed to the plugin as a wrong/negative length. Wasm32 linear memory makes such sizes implausible, so impact is essentially nil, but the cast is silently lossy.","fix":"Use `u32::try_from(a.len())` and `bail!` with an 'argument too large' message on failure.","locations":[{"ref":"crates/typst-library/src/foundations/plugin.rs:482","code":"  482 |             .map(|a| wasmi::Val::I32(a.len() as i32))","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Font-stack corruption: in `get_font_and_covers`, the selected font is pushed onto `ctx.used` only when `covers.is_none()` (commit ea5272bb2 made the push conditional). However, `shape_segment` unconditionally calls `ctx.used.pop()` at the end of every invocation. When a font is selected through a font family that has a `covers` regex (covers is `Some`), nothing was pushed, yet `pop()` still runs and removes a font that an outer/earlier shaping call had pushed. This corrupts the `used` font-exhaustion stack, so fonts that should be considered exhausted can be reused (or vice versa), leading to incorrect font fallback and shaping results for documents that use `text(font: (covers: ...))`.","fix":"Track whether this call pushed a font (e.g. return the `covers.is_none()` flag from `get_font_and_covers` or remember it) and only call `ctx.used.pop()` when a font was actually pushed. Mirror the `if covers.is_none()` condition around the pop.","locations":[{"ref":"crates/typst-layout/src/inline/shaping.rs:947-952","code":"  947 |     // This font has been exhausted and will not be used again.\n  948 |     if covers.is_none() {\n  949 |         ctx.used().push(font.clone());\n  950 |     }\n  951 | \n  952 |     Some((font, covers))","lines":6},{"ref":"crates/typst-layout/src/inline/shaping.rs:1157","code":" 1157 |     ctx.used.pop();","lines":1}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`ProcessColor` violates the `Hash`/`Eq` contract. `PartialEq` compares `Rgb` colors via `to_vec4_u8()` (rounded to 8-bit) and `Luma` colors via rounded-to-u8 lightness, deliberately lowering precision to ignore rounding differences. However, the `Hash` impl hashes the raw f32 bits of `to_vec4()` for every variant. Therefore two `Rgb` (or `Luma`) colors that differ only below 8-bit precision are `==` but produce different hashes. This breaks the invariant `a == b => hash(a) == hash(b)` and can cause lookups to silently miss entries / duplicate keys in any `HashMap`/`HashSet`/comemo memoization keyed (transitively) on `Color`.","fix":"Make `Hash` consistent with `PartialEq`: for `Rgb` and `Luma`, hash the same rounded `to_vec4_u8()` / rounded-u8 values that `eq` compares, rather than the raw float bits.","locations":[{"ref":"crates/typst-library/src/visualize/color.rs:2038-2067","code":" 2038 | impl PartialEq for ProcessColor {\n 2039 |     fn eq(&self, other: &Self) -> bool {\n 2040 |         match (self, other) {\n 2041 |             // Lower precision for comparison to avoid rounding errors.\n 2042 |             // Keeps backward compatibility with previous versions of Typst.\n 2043 |             (Self::Rgb(_), Self::Rgb(_)) => self.to_vec4_u8() == other.to_vec4_u8(),\n 2044 |             (Self::Luma(a), Self::Luma(b)) => {\n 2045 |                 (a.luma * 255.0).round() as u8 == (b.luma * 255.0).round() as u8\n 2046 |             }\n 2047 |             (Self::Oklab(a), Self::Oklab(b)) => a == b,\n 2048 |             (Self::Oklch(a), Self::Oklch(b)) => a == b,\n 2049 |             (Self::LinearRgb(a), Self::LinearRgb(b)) => a == b,\n 2050 |             (Self::Cmyk(a), Self::Cmyk(b)) => a == b,\n 2051 |             (Self::Hsl(a), Self::Hsl(b)) => a == b,\n 2052 |             (Self::Hsv(a), Self::Hsv(b)) => a == b,\n 2053 |             _ => false,\n 2054 |         }\n 2055 |     }\n 2056 | }\n 2057 | \n 2058 | impl Hash for ProcessColor {\n 2059 |     fn hash<H: Hasher>(&self, state: &mut H) {\n 2060 |         core::mem::discriminant(self).hash(state);\n 2061 |         let [x, y, z, w] = self.to_vec4();\n 2062 |         x.to_bits().hash(state);\n 2063 |         y.to_bits().hash(state);\n 2064 |         z.to_bits().hash(state);\n 2065 |         w.to_bits().hash(state);\n 2066 |     }\n 2067 | }","lines":30}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Inverted page-visibility check when building the PDF outline (bookmarks). `visible` is computed as `ranges.is_none_or(|ranges| !ranges.includes_page(...))`, so when a page range is set, `visible` is `true` exactly for headings on EXCLUDED pages and `false` for headings on INCLUDED pages. The result `include = boomarked && visible` is then fed to `OutlineNode::build_tree`, which only adds entries whose `include` is true. Consequently, with `--pages`/`page_ranges` set, the bookmark tree contains the headings of the pages that were NOT exported and omits the headings that were. The original code (see git history) skipped headings via `if !page_ranges.includes_page(...) { continue; }`, i.e. the predicate must be `includes_page`, not its negation.","fix":"Compute visibility as inclusion: `let visible = gc.options.page_ranges.as_ref().is_none_or(|ranges| ranges.includes_page(...));` (drop the `!`).","locations":[{"ref":"crates/typst-pdf/src/outline.rs:25-34","code":"   25 |             let visible = gc.options.page_ranges.as_ref().is_none_or(|ranges| {\n   26 |                 !ranges.includes_page(\n   27 |                     gc.document\n   28 |                         .introspector()\n   29 |                         .page(elem.location().unwrap())\n   30 |                         .unwrap_or(NonZeroUsize::ONE),\n   31 |                 )\n   32 |             });\n   33 | \n   34 |             let include = boomarked && visible;","lines":10}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The image export cache is indexed positionally (`Vec<u128>` keyed by push order), but `is_cached(*i, page)` is called with `*i` being the absolute page index in `document.pages()`. When `--pages` selects a non-contiguous subset (e.g. pages 2 and 5), the first exported page has `i = 1` (0-based 1) while the cache is empty, so `i >= cache.len()` is true and the hash is appended at position 0; subsequent compilations keep hitting the `i >= cache.len()` branch and never actually compare hashes. The result is that the export cache is effectively disabled (always re-exports) whenever a page range that does not start at page 1 / is sparse is used. The comparison branch `cache[i]` is only ever reached when `i < cache.len()`, which for sparse indices maps to the wrong page's hash.","fix":"Index the cache by the position within `exported_pages` (the `enumerate` index of the filtered iterator) rather than the absolute page index `*i`, so the cache vector is dense and entries line up across compilations.","locations":[{"ref":"crates/typst-cli/src/compile.rs:495-532","code":"  495 |     exported_pages\n  496 |         .par_iter()\n  497 |         .map(|(i, page)| {\n  498 |             // Use output with converted path.\n  499 |             let output = match &config.output {\n  500 |                 Output::Path(path) => {\n  501 |                     let storage;\n  502 |                     let path = if can_handle_multiple {\n  503 |                         storage = output_template::format(\n  504 |                             path.to_str().unwrap_or_default(),\n  505 |                             i + 1,\n  506 |                             document.pages().len(),\n  507 |                         );\n  508 |                         Path::new(&storage)\n  509 |                     } else {\n  510 |                         path\n  511 |                     };\n  512 | \n  513 |                     // If we are not watching, don't use the cache.\n  514 |                     // If the frame is in the cache, skip it.\n  515 |                     // If the file does not exist, always create it.\n  516 |                     if config.watching\n  517 |                         && config.export_cache.is_cached(*i, page)\n  518 |                         && path.exists()\n  519 |                     {\n  520 |                         return Ok(Output::Path(path.to_path_buf()));\n  521 |                     }\n  522 | \n  523 |                     Output::Path(path.to_owned())\n  524 |                 }\n  525 |                 Output::Stdout => Output::Stdout,\n  526 |             };\n  527 | \n  528 |             export_image_page(config, page, &output, fmt)?;\n  529 |             Ok(output)\n  530 |         })\n  531 |         .collect::<StrResult<Vec<Output>>>()\n  532 | }","lines":38},{"ref":"crates/typst-cli/src/compile.rs:656-668","code":"  656 |     /// Returns true if the entry is cached and appends the new hash to the\n  657 |     /// cache (for the next compilation).\n  658 |     pub fn is_cached(&self, i: usize, page: &Page) -> bool {\n  659 |         let hash = typst::utils::hash128(page);\n  660 | \n  661 |         let mut cache = self.cache.upgradable_read();\n  662 |         if i >= cache.len() {\n  663 |             cache.with_upgraded(|cache| cache.push(hash));\n  664 |             return false;\n  665 |         }\n  666 | \n  667 |         cache.with_upgraded(|cache| std::mem::replace(&mut cache[i], hash) == hash)\n  668 |     }","lines":13}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`info` splits `TYPST_FONT_PATHS` with a hardcoded `':'` separator, but the actual font-path argument parser uses the platform path separator `ENV_PATH_SEP` (`;` on Windows, `:` elsewhere). On Windows, `typst info` will therefore misparse the configured font paths (treating drive letters / the whole `;`-separated string as a single malformed path), reporting font configuration that differs from what compilation actually uses.","fix":"Split on `crate::args::ENV_PATH_SEP` (make it `pub(crate)`) instead of the literal `':'`, matching the `FontArgs::font_paths` value delimiter.","locations":[{"ref":"crates/typst-cli/src/info.rs:309-316","code":"  309 |     let font_paths = env\n  310 |         .typst_font_paths\n  311 |         .as_deref()\n  312 |         .unwrap_or_default()\n  313 |         .split(':')\n  314 |         .filter(|s| !s.is_empty())\n  315 |         .map(PathBuf::from)\n  316 |         .collect::<_>();","lines":8},{"ref":"crates/typst-cli/src/args.rs:23","code":"   23 | const ENV_PATH_SEP: char = if cfg!(windows) { ';' } else { ':' };","lines":1},{"ref":"crates/typst-cli/src/args.rs:473-479","code":"  473 |     #[clap(\n  474 |         long = \"font-path\",\n  475 |         env = \"TYPST_FONT_PATHS\",\n  476 |         value_name = \"DIR\",\n  477 |         value_delimiter = ENV_PATH_SEP,\n  478 |     )]\n  479 |     pub font_paths: Vec<PathBuf>,","lines":7}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The `ImageCandidate` (srcset image-candidate string) serializes a pixel-density descriptor with the suffix `d` (e.g. `image.png 2d`). The HTML srcset grammar uses `x` for the density descriptor (e.g. `image.png 2x`); `d` is not a valid descriptor. This silently produces invalid `srcset`/`imagesrcset` attribute values that browsers will reject the candidate from.","fix":"Change the density branch to write the `x` descriptor: `write!(out, \" {}x\", density.get())`.","locations":[{"ref":"crates/typst-html/src/typed.rs:690-695","code":"  690 |         match (width, density) {\n  691 |             (None, None) => {}\n  692 |             (Some(width), None) => write!(out, \" {width}w\").unwrap(),\n  693 |             (None, Some(density)) => write!(out, \" {}d\", density.get()).unwrap(),\n  694 |             (Some(_), Some(_)) => bail!(\"cannot specify both `width` and `density`\"),\n  695 |         }","lines":6}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`analyze_expr` recurses into the parent node for any node that is not the first child of a `FieldAccess`/`MathFieldAccess` (`node.index() > 0`). The field-name identifier of a field access has index > 0, so hovering/analyzing the *field name* of `a.b` analyzes the whole `a.b` expression, which is intended; however the guard `node.index() > 0` also matches other non-first children (e.g. the `.` dot token if it were ever passed) and the dot is at index 1. Passing the dot token leads to analyzing the parent field access rather than returning empty, which can yield surprising tooltip/definition results for a cursor on the dot. The condition keys on positional index rather than on the node actually being the field identifier.","fix":"Tighten the guard to only recurse when `node` is the field identifier (e.g. check `node.kind()` is Ident/MathIdent and that it equals the access's `field()` node), instead of the generic `node.index() > 0`.","locations":[{"ref":"crates/typst-ide/src/analyze.rs:35-43","code":"   35 |             if let Some(parent) = node.parent()\n   36 |                 && matches!(\n   37 |                     parent.kind(),\n   38 |                     SyntaxKind::FieldAccess | SyntaxKind::MathFieldAccess\n   39 |                 )\n   40 |                 && node.index() > 0\n   41 |             {\n   42 |                 return analyze_expr(world, parent);\n   43 |             }","lines":9}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`label_tooltip` returns `Some(Tooltip::Text(detail?))` inside the loop: when the matching label is found but its `detail` is `None`, the `?` propagates `None` and aborts the whole function, returning no tooltip at all. This is correct only if a missing detail should mean 'no tooltip', but it also means that once the matching label is located, no further labels are considered (correct) yet a matched-but-detail-less label silently yields nothing rather than, say, a minimal tooltip. More importantly, the early `?` couples 'label not found' and 'label found but undescribed' into the same `None` outcome, which is a latent correctness trap.","fix":"Make the intent explicit: `if label.resolve().as_str() == target { return detail.map(Tooltip::Text); }` so a found label with no detail clearly yields `None` and the loop stops at the match.","locations":[{"ref":"crates/typst-ide/src/tooltip.rs:196-202","code":"  196 |     for (label, detail) in analyze_labels(output).0 {\n  197 |         if label.resolve().as_str() == target {\n  198 |             return Some(Tooltip::Text(detail?));\n  199 |         }\n  200 |     }\n  201 | \n  202 |     None","lines":7}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `Composer::float`, for `PlacementScope::Parent` the remaining space sums region heights of the remaining columns (via `.take(columns.count - self.column)`) but divides by the full `columns.count`. When `self.column > 0`, fewer region sizes are summed while the divisor stays the full column count, systematically under-estimating `remaining` for parent floats encountered in later columns, biasing the fit check and top/bottom alignment heuristic.","fix":"Divide by the number of remaining columns actually summed (`columns.count - self.column`) rather than the full `columns.count`, reconciling the `take` count with the divisor; or document precisely why the full count is intended.","locations":[{"ref":"crates/typst-layout/src/flow/compose.rs:296-307","code":"  296 |         // placement, but only an approximation for page placement.\n  297 |         let remaining = match placed.scope {\n  298 |             PlacementScope::Column => regions.size.y,\n  299 |             PlacementScope::Parent => {\n  300 |                 let remaining: Abs = regions\n  301 |                     .iter()\n  302 |                     .map(|size| size.y)\n  303 |                     .take(self.config.columns.count - self.column)\n  304 |                     .sum();\n  305 |                 remaining / self.config.columns.count as f64\n  306 |             }\n  307 |         };","lines":12}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The page `foreground` marginal is not tagged as a PDF artifact, unlike `background`, `header`, and `footer`. The background is passed as `background.clone().map(|b| b.artifact(ArtifactKind::Background))`, but the foreground is passed raw to `layout_marginal`. As a result, foreground/watermark content is exposed as real content in tagged PDF export (to screen readers, reflow, copy-paste) instead of being marked as an artifact, an accessibility regression.","fix":"Tag the foreground like the others before the loop, e.g. `let foreground = foreground.clone().map(|f| f.artifact(ArtifactKind::Background));` (or a dedicated watermark artifact kind), and pass the tagged value to `layout_marginal`.","locations":[{"ref":"crates/typst-layout/src/pages/run.rs:218-235","code":"  218 |     let header = header.clone().map(|h| h.artifact(ArtifactKind::Header));\n  219 |     let footer = footer.clone().map(|f| f.artifact(ArtifactKind::Footer));\n  220 |     let background = background.clone().map(|b| b.artifact(ArtifactKind::Background));\n  221 | \n  222 |     for inner in fragment {\n  223 |         let header_size = Size::new(inner.width(), margin.top - header_ascent);\n  224 |         let footer_size = Size::new(inner.width(), margin.bottom - footer_descent);\n  225 |         let full_size = inner.size() + margin.sum_by_axis() + bleed.sum_by_axis();\n  226 |         let mid = HAlignment::Center + VAlignment::Horizon;\n  227 |         layouted.push(LayoutedPage {\n  228 |             inner,\n  229 |             fill: fill.clone(),\n  230 |             numbering: numbering.clone(),\n  231 |             supplement: supplement.clone(),\n  232 |             header: layout_marginal(&header, header_size, Alignment::BOTTOM)?,\n  233 |             footer: layout_marginal(&footer, footer_size, Alignment::TOP)?,\n  234 |             background: layout_marginal(&background, full_size, mid)?,\n  235 |             foreground: layout_marginal(foreground, full_size, mid)?,","lines":18}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Counter::matching_numbering` only handles the `CounterKey::Selector(Selector::Elem(func, _))` case for inferring a default numbering. A counter created from a label-based or `where`-based selector that still ultimately targets headings/figures/equations/footnotes (e.g. `counter(heading.where(level: 1))`) falls into the `_ => None` arm and thus never infers the element's numbering, silently falling back to the generic `1.1` pattern in `display`.","fix":"Extract the element function from richer selector shapes (e.g. `Selector::Elem` nested within `And`/`Where`-style selectors) before giving up, or document that auto-numbering inference only works for bare element-function counters.","locations":[{"ref":"crates/typst-library/src/introspection/counter.rs:282-332","code":"  282 |     fn matching_numbering(\n  283 |         &self,\n  284 |         engine: &mut Engine,\n  285 |         styles: StyleChain,\n  286 |         loc: Location,\n  287 |         span: Span,\n  288 |     ) -> Option<Numbering> {\n  289 |         match self.0 {\n  290 |             CounterKey::Page => loc.page_numbering(engine, span),\n  291 |             CounterKey::Selector(Selector::Elem(func, _)) => engine\n  292 |                 .introspect(QueryFirstIntrospection(Selector::Location(loc), span))\n  293 |                 .and_then(|content| {\n  294 |                     if func == HeadingElem::ELEM {\n  295 |                         content\n  296 |                             .to_packed::<HeadingElem>()\n  297 |                             .and_then(|elem| elem.numbering.as_option().clone())\n  298 |                             .flatten()\n  299 |                     } else if func == FigureElem::ELEM {\n  300 |                         content\n  301 |                             .to_packed::<FigureElem>()\n  302 |                             .and_then(|elem| elem.numbering.as_option().clone())\n  303 |                             .flatten()\n  304 |                     } else if func == EquationElem::ELEM {\n  305 |                         content\n  306 |                             .to_packed::<EquationElem>()\n  307 |                             .and_then(|elem| elem.numbering.as_option().clone())\n  308 |                             .flatten()\n  309 |                     } else if func == FootnoteElem::ELEM {\n  310 |                         content\n  311 |                             .to_packed::<FootnoteElem>()\n  312 |                             .and_then(|elem| elem.numbering.as_option().clone())\n  313 |                     } else {\n  314 |                         None\n  315 |                     }\n  316 |                 })\n  317 |                 .or_else(|| {\n  318 |                     if func == HeadingElem::ELEM {\n  319 |                         styles.get_cloned(HeadingElem::numbering)\n  320 |                     } else if func == FigureElem::ELEM {\n  321 |                         styles.get_cloned(FigureElem::numbering)\n  322 |                     } else if func == EquationElem::ELEM {\n  323 |                         styles.get_cloned(EquationElem::numbering)\n  324 |                     } else if func == FootnoteElem::ELEM {\n  325 |                         Some(styles.get_cloned(FootnoteElem::numbering))\n  326 |                     } else {\n  327 |                         None\n  328 |                     }\n  329 |                 }),\n  330 |             _ => None,\n  331 |         }\n  332 |     }","lines":51},{"ref":"crates/typst-library/src/introspection/counter.rs:430-435","code":"  430 |         let numbering = numbering\n  431 |             .custom()\n  432 |             .or_else(|| {\n  433 |                 self.matching_numbering(engine, context.styles().ok()?, location, span)\n  434 |             })\n  435 |             .unwrap_or_else(|| NumberingPattern::from_str(\"1.1\").unwrap().into());","lines":6}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Transform::invert` returns a wrong (non-`None`) result for a singular scale-only matrix. In the scale-translate fast path, when `sx` or `sy` is zero (a degenerate transform that flattens one axis, e.g. produced by `scale(x: 0%)`), the determinant is zero and the matrix is not invertible, yet the code returns `Some(Self::translate(-tx, -ty))` instead of `None`. The general path below correctly returns `None` for a zero determinant, so this fast path is inconsistent and yields a mathematically incorrect inverse. Many callers do `transform.invert().unwrap()` (e.g. typst-svg, typst-render paint code) and will silently use this bogus matrix for relative gradient/pattern coordinates instead of getting `None`.","fix":"Return `None` when `self.sx.is_zero() || self.sy.is_zero()` in the fast path, mirroring the determinant check (`return None;`), rather than returning a translate-only transform.","locations":[{"ref":"crates/typst-library/src/layout/transform.rs:360-374","code":"  360 |         if self.kx.is_zero() && self.ky.is_zero() {\n  361 |             if self.sx.is_zero() || self.sy.is_zero() {\n  362 |                 return Some(Self::translate(-self.tx, -self.ty));\n  363 |             }\n  364 | \n  365 |             let inv_x = 1.0 / self.sx;\n  366 |             let inv_y = 1.0 / self.sy;\n  367 |             return Some(Self {\n  368 |                 sx: Ratio::new(inv_x),\n  369 |                 ky: Ratio::zero(),\n  370 |                 kx: Ratio::zero(),\n  371 |                 sy: Ratio::new(inv_y),\n  372 |                 tx: -self.tx * inv_x,\n  373 |                 ty: -self.ty * inv_y,\n  374 |             });","lines":15}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Limits::for_class` and `Limits::for_char_with_class` disagree for the `Large` class. `for_char_with_class` returns `Limits::Display` for a `Large` non-integral char and `Limits::Never` for integral chars, but `for_class` (used by `class()`/`ClassElem` and by `resolve_class`) always returns `Limits::Display` for `Large` and never special-cases integrals. As a result, forcing a class of `\"large\"` onto an integral-like glyph via `math.class` gives different (display-limit) behaviour than the same glyph would have by default (`Never`).","fix":"If the inconsistency is intentional, document it; otherwise make `for_class` aware of integral characters (or have `resolve_class` use `for_char_with_class` where the base glyph is known).","locations":[{"ref":"crates/typst-library/src/math/attach.rs:165-186","code":"  165 |     pub fn for_char_with_class(c: char, class: Option<MathClass>) -> Self {\n  166 |         match class {\n  167 |             Some(MathClass::Large) => {\n  168 |                 if is_integral_char(c) {\n  169 |                     Limits::Never\n  170 |                 } else {\n  171 |                     Limits::Display\n  172 |                 }\n  173 |             }\n  174 |             Some(MathClass::Relation) => Limits::Always,\n  175 |             _ => Limits::Never,\n  176 |         }\n  177 |     }\n  178 | \n  179 |     /// The default limit configuration for a math class.\n  180 |     pub fn for_class(class: MathClass) -> Self {\n  181 |         match class {\n  182 |             MathClass::Large => Self::Display,\n  183 |             MathClass::Relation => Self::Always,\n  184 |             _ => Self::Never,\n  185 |         }\n  186 |     }","lines":22},{"ref":"crates/typst-library/src/math/ir/resolve.rs:1191-1201","code":" 1191 | fn resolve_class<'a, 'v, 'e>(\n 1192 |     elem: &'a Packed<ClassElem>,\n 1193 |     ctx: &mut MathResolver<'a, 'v, 'e>,\n 1194 |     styles: StyleChain<'a>,\n 1195 | ) -> SourceResult<()> {\n 1196 |     let mut item = ctx.resolve_into_item(&elem.body, styles)?;\n 1197 |     item.set_class(elem.class);\n 1198 |     item.set_limits(Limits::for_class(elem.class));\n 1199 |     ctx.push(item);\n 1200 |     Ok(())\n 1201 | }","lines":11}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `resolve_mat`, augmentation-line offset validation rejects offsets whose magnitude exceeds the number of rows/columns, but it does not reject an offset of `0`. An `hline`/`vline` offset of `0` means 'draw before the first row/column' which is silently accepted here and passed through to layout, whereas the documentation describes positive offsets as 'after the Nth row' and negative as counting from the end; `0` has no well-defined meaning and is the kind of off-by-one value users hit. The two near-identical validation blocks are also duplicated.","fix":"Decide on and document the meaning of offset 0 (likely reject it, since neither 'after row 0' nor a from-the-end interpretation is meaningful), and factor the duplicated hline/vline checks into a small helper.","locations":[{"ref":"crates/typst-library/src/math/ir/resolve.rs:1040-1060","code":" 1040 |     if let Some(aug) = &augment {\n 1041 |         for &offset in &aug.hline.0 {\n 1042 |             if offset > nrows as isize || offset.unsigned_abs() > nrows {\n 1043 |                 bail!(\n 1044 |                     span,\n 1045 |                     \"cannot draw a horizontal line at offset {offset} \\\n 1046 |                      in a matrix with {nrows} rows\",\n 1047 |                 );\n 1048 |             }\n 1049 |         }\n 1050 | \n 1051 |         for &offset in &aug.vline.0 {\n 1052 |             if offset > ncols as isize || offset.unsigned_abs() > ncols {\n 1053 |                 bail!(\n 1054 |                     span,\n 1055 |                     \"cannot draw a vertical line at offset {offset} \\\n 1056 |                      in a matrix with {ncols} columns\",\n 1057 |                 );\n 1058 |             }\n 1059 |         }\n 1060 |     }","lines":21}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`open_output` for the HTTP-server case opens `http://{addr}` with the viewer, but the early `config.open.take()` consumes the open request unconditionally. When a server exists but compilation later changes output, `open_output` is invoked once and returns after opening the URL; this is fine. However when there is no server and output is stdout, the function silently returns `Ok(())` after already having `take()`n the viewer, so a user who passes `--open` with stdout output gets no feedback that `--open` was ignored, contradicting the flag's documented 'Ignored if output is stdout' only loosely (no warning).","fix":"Emit a warning when `--open` is requested but the output target is stdout, instead of silently ignoring it.","locations":[{"ref":"crates/typst-cli/src/compile.rs:672-690","code":"  672 | fn open_output(config: &mut CompileConfig) -> StrResult<()> {\n  673 |     let Some(viewer) = config.open.take() else { return Ok(()) };\n  674 | \n  675 |     #[cfg(feature = \"http-server\")]\n  676 |     if let Some(server) = &config.server {\n  677 |         let url = format!(\"http://{}\", server.addr());\n  678 |         return open_path(OsStr::new(&url), viewer.as_deref());\n  679 |     }\n  680 | \n  681 |     // Can't open stdout.\n  682 |     let Output::Path(path) = &config.output else { return Ok(()) };\n  683 | \n  684 |     // Some resource openers require the path to be canonicalized.\n  685 |     let path = path\n  686 |         .canonicalize()\n  687 |         .map_err(|err| eco_format!(\"failed to canonicalize path ({err})\"))?;\n  688 | \n  689 |     open_path(path.as_os_str(), viewer.as_deref())\n  690 | }","lines":19}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In watch mode, `Status::print(&config).unwrap()` and `print_error(...).unwrap()` are called on every world-creation retry and status update. These unwrap I/O results, so a transient terminal write error (e.g. broken pipe when output is piped, or the controlling terminal going away) will panic the watcher instead of being handled, even though the rest of the code base treats diagnostic printing failures as recoverable `io::Result`s elsewhere.","fix":"Propagate or log the I/O error from status printing instead of `unwrap()`, consistent with how `print_diagnostics` errors are mapped to `StrResult`.","locations":[{"ref":"crates/typst-cli/src/watch.rs:43-44","code":"   43 |                 Status::Error.print(&config).unwrap();\n   44 |                 print_error(&err.to_string()).unwrap();","lines":2},{"ref":"crates/typst-cli/src/compile.rs:264","code":"  264 |         Status::Compiling.print(config).unwrap();","lines":1},{"ref":"crates/typst-cli/src/compile.rs:283-300","code":"  283 |                     Status::Success(duration).print(config).unwrap();\n  284 |                 } else {\n  285 |                     Status::PartialSuccess(duration).print(config).unwrap();\n  286 |                 }\n  287 |             }\n  288 | \n  289 |             print_diagnostics(world, &[], &warnings, config.diagnostic_format)\n  290 |                 .map_err(|err| eco_format!(\"failed to print diagnostics ({err})\"))?;\n  291 | \n  292 |             open_output(config)?;\n  293 |         }\n  294 | \n  295 |         // Print failure message and diagnostics.\n  296 |         Err(errors) => {\n  297 |             set_failed();\n  298 | \n  299 |             if config.watching {\n  300 |                 Status::Error.print(config).unwrap();","lines":18}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `param_completions`, named arguments are added to `existing_named` unconditionally, whereas positional arguments are only counted when they end before the cursor (`node.range().end < ctx.cursor`). As a result, a named argument typed after the cursor still suppresses its own completion suggestion, an inconsistency with how positional args are handled. A user editing `func(|, x: 1)` would not be offered `x` even though they are completing before it.","fix":"Only insert into `existing_named` when the named argument lies before the cursor, mirroring the positional handling via `args_linked.find(arg.span())` and a `range().end < ctx.cursor` check.","locations":[{"ref":"crates/typst-ide/src/complete.rs:506-521","code":"  506 |     let mut existing_positional = 0;\n  507 |     let mut existing_named = FxHashSet::default();\n  508 |     for arg in args.items() {\n  509 |         match arg {\n  510 |             ast::Arg::Pos(_) => {\n  511 |                 let Some(node) = args_linked.find(arg.span()) else { continue };\n  512 |
