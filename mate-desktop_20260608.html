trings,\n 3031 | \t\t\t\t     MATE_DESKTOP_ITEM_SORT_ORDER,\n 3032 | \t\t\t\t     MATE_DESKTOP_ITEM_SORT_ORDER);\n 3033 | \t}\n 3034 | \n 3035 | \treturn g_hash_table_lookup (strings, key) != NULL;\n 3036 | }","lines":50}]},{"id":"MEM_10","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In configurations_read_from_file(), on the success path g_ptr_array_add(parser->configurations, NULL); result = g_ptr_array_free(parser->configurations, FALSE) steals the array, then parser->configurations = g_ptr_array_new() allocates a fresh empty array purely so parser_free() can free it. The returned result array holds the MateRRConfig* objects with their refs, but parser_free() at line 394-399 iterates parser->configurations (now empty) - fine. However the freshly allocated empty array at line 440 is redundant churn, and more importantly the contained configs in result are owned by the caller while parser_free still unrefs nothing extra - net this is correct but the redundant reallocation is dead/wasteful. Real concern: result is returned even when parse partially populated configs but final NULL terminator logic assumes well-formedness.","fix":"Set parser->configurations = NULL after stealing it (and have parser_free tolerate NULL) instead of allocating a throwaway empty GPtrArray.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:438-442","code":"  438 |     g_ptr_array_add (parser->configurations, NULL);\n  439 |     result = (MateRRConfig **)g_ptr_array_free (parser->configurations, FALSE);\n  440 |     parser->configurations = g_ptr_array_new ();\n  441 | \n  442 |     g_assert (parser->outputs);","lines":5}]},{"id":"MEM_11","type":"memory_leak","type_label":"Memory Leak","severity":"negligible","description":"has_similar_mode() calls mate_rr_output_list_modes(output) which returns output->modes (transfer none,\nno leak), but it is invoked once per mode per output pair inside gather_clone_modes - each call is cheap but the result\nis never cached. Not a leak in the allocation sense; flagged as a redundant repeated lookup feeding the performance\nissue above.","fix":"Cache the modes pointer once outside the inner loops.","locations":[{"ref":"libmate-desktop/mate-rr.c:295","code":"  295 |     MateRRMode **modes = mate_rr_output_list_modes (output);","lines":1}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"make_root_pixmap() opens a temporary X display with XOpenDisplay and creates a Pixmap, then sets RetainPermanent and closes the display. If cairo_xlib_surface_create fails or the caller's surface creation fails, the Pixmap is intentionally retained. However on the error path of get_pixbuf-less callers the returned surface (and its underlying retained pixmap) can be leaked if not eventually killed via mate_bg_set_root_pixmap_id. More concretely: if XCreatePixmap fails the function still proceeds to create a surface from an invalid pixmap. No error checking on xpixmap.","fix":"Check the result of XCreatePixmap (and guard surface creation), and ensure failure paths return NULL without leaving a retained-permanent pixmap dangling.","locations":[{"ref":"libmate-desktop/mate-bg.c:1266-1299","code":" 1266 | static cairo_surface_t *\n 1267 | make_root_pixmap (GdkWindow *window, gint width, gint height)\n 1268 | {\n 1269 | \tGdkScreen *screen = gdk_window_get_screen(window);\n 1270 | \tchar *disp_name = DisplayString (GDK_WINDOW_XDISPLAY (window));\n 1271 | \tDisplay *display;\n 1272 | \tPixmap xpixmap;\n 1273 | \tcairo_surface_t *surface;\n 1274 | \tint depth;\n 1275 | \n 1276 | \t/* Desktop background pixmap should be created from dummy X client since most\n 1277 | \t * applications will try to kill it with XKillClient later when changing pixmap\n 1278 | \t */\n 1279 | \tdisplay = XOpenDisplay (disp_name);\n 1280 | \n 1281 | \tif (display == NULL) {\n 1282 | \t\tg_warning (\"Unable to open display '%s' when setting background pixmap\\n\",\n 1283 | \t\t           (disp_name) ? disp_name : \"NULL\");\n 1284 | \t\treturn NULL;\n 1285 | \t}\n 1286 | \n 1287 | \tdepth = DefaultDepth (display, gdk_x11_screen_get_screen_number (screen));\n 1288 | \txpixmap = XCreatePixmap (display, GDK_WINDOW_XID (window), width, height, depth);\n 1289 | \n 1290 | \tXFlush (display);\n 1291 | \tXSetCloseDownMode (display, RetainPermanent);\n 1292 | \tXCloseDisplay (display);\n 1293 | \n 1294 | \tsurface = cairo_xlib_surface_create (GDK_SCREEN_XDISPLAY (screen), xpixmap,\n 1295 |                                              GDK_VISUAL_XVISUAL (gdk_screen_get_system_visual (screen)),\n 1296 |         \t\t\t\t     width, height);\n 1297 | \n 1298 | \treturn surface;\n 1299 | }","lines":34}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In get_screen_color(), gtk_get_current_event() returns a copied event that is owned by the caller. On the success path it is freed once (line 1858), but if the first gdk_seat_grab (keyboard) fails the event is freed and the function returns (correct); however the GTK_WINDOW_POPUP grab_widget created and shown earlier is never destroyed on the early-return / failed-grab paths, and dropper_grab_widget is only reused, so a failed pick leaves the invisible popup window mapped until dispose.","fix":"On grab failure, hide the dropper_grab_widget (and remove any window-group membership) before returning, mirroring shutdown_eyedropper cleanup.","locations":[{"ref":"libmate-desktop/mate-colorsel.c:1844-1865","code":" 1844 |   if (gdk_seat_grab (seat, gtk_widget_get_window (priv->dropper_grab_widget),\n 1845 |                      GDK_SEAT_CAPABILITY_KEYBOARD, FALSE, NULL,\n 1846 |                      event,\n 1847 |                      NULL, NULL) != GDK_GRAB_SUCCESS)\n 1848 |   {\n 1849 |     gdk_event_free (event);\n 1850 |     return;\n 1851 |   }\n 1852 | \n 1853 |   picker_cursor = make_picker_cursor (screen);\n 1854 |   grab_status = gdk_seat_grab (seat, gtk_widget_get_window (priv->dropper_grab_widget),\n 1855 |                                GDK_SEAT_CAPABILITY_POINTER, FALSE, picker_cursor,\n 1856 |                                event,\n 1857 |                                NULL, NULL);\n 1858 |   gdk_event_free (event);\n 1859 |   g_object_unref (picker_cursor);\n 1860 | \n 1861 |   if (grab_status != GDK_GRAB_SUCCESS)\n 1862 |     {\n 1863 |       gdk_seat_ungrab (seat);\n 1864 |       return;\n 1865 |     }","lines":22}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"ditem_save does not close/unref the GFile when g_file_replace fails. On the early `if (stream == NULL) return FALSE;` path, the previously created `file` (g_file_new_for_uri) is leaked. The success path unrefs both stream and file, but the error path returns without unreffing `file`.","fix":"g_object_unref (file) before returning FALSE in the stream == NULL branch.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:3825-3829","code":" 3825 | \tfile = g_file_new_for_uri (uri);\n 3826 | \tstream = g_file_replace (file, NULL, FALSE, G_FILE_CREATE_NONE,\n 3827 | \t\t\t\t NULL, error);\n 3828 | \tif (stream == NULL)\n 3829 | \t\treturn FALSE;","lines":5}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In mate_desktop_prepend_terminal_to_vector, when g_shell_parse_argv succeeds but yields an empty/NULL term_argv (e.g. the configured exec string parses to zero tokens), or when it partially fails, term_argc may be 0 while term_argv is non-NULL but empty. More concretely, if the configured terminal string parses successfully, the fallback program search block is skipped, but there is no validation that term_argv[0] exists; a zero-length term_argv would lead to building a command vector with no terminal program. The parse error is also silently ignored (NULL passed for error).","fix":"After g_shell_parse_argv, verify term_argc > 0 (treat empty result like the NULL case and fall through to the program-search fallback), and consider logging parse errors.","locations":[{"ref":"libmate-desktop/mate-desktop-utils.c:103-126","code":"  103 | \tif (terminal && *terminal != '\\0') {\n  104 | \t\tgchar *command_line;\n  105 | \t\tgchar *exec_flag;\n  106 | \n  107 | \t\texec_flag = g_settings_get_string (settings, \"exec-arg\");\n  108 | \n  109 | \t\tif (!exec_flag || *exec_flag == '\\0')\n  110 | \t\t\tcommand_line = g_strdup (terminal);\n  111 | \t\telse\n  112 | \t\t\tcommand_line = g_strdup_printf (\"%s %s\", terminal,\n  113 | \t\t\t\t\t\t\texec_flag);\n  114 | \n  115 | \t\tg_shell_parse_argv (command_line,\n  116 | \t\t\t\t    &term_argc,\n  117 | \t\t\t\t    &term_argv,\n  118 | \t\t\t\t    NULL /* error */);\n  119 | \n  120 | \t\tg_free (command_line);\n  121 | \t\tg_free (exec_flag);\n  122 | \t}\n  123 | \tg_free (terminal);\n  124 | \tg_object_unref (settings);\n  125 | \n  126 | \tif (term_argv == NULL) {","lines":24}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"mate_rr_config_save() does a non-atomic backup/write dance: rename(intended, backup) then g_file_set_contents(intended, ...). g_file_set_contents itself writes to a temp file and renames, but the surrounding logic loses the original on failure modes (e.g. if the process is killed between the rename and the write, monitors.xml only exists as monitors.xml.backup). More importantly, the rename() calls ignore errors entirely (acknowledged in comments) - if backup rename fails for a reason other than ENOENT (e.g. EACCES, cross-device), the user's config can be silently lost on a subsequent failed write that triggers the restore rename. Return values are never inspected.","fix":"Check rename() return values; distinguish ENOENT (benign) from real errors and propagate via GError, so a failed backup does not silently destroy the existing config.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:1266-1272","code":" 1266 |     /* backup the file first */\n 1267 |     rename (intended_filename, backup_filename); /* no error checking because the intended file may not even exist */\n 1268 | \n 1269 |     result = g_file_set_contents (intended_filename, output->str, -1, error);\n 1270 | \n 1271 |     if (!result)\n 1272 | \trename (backup_filename, intended_filename); /* no error checking because the backup may not even exist */","lines":7}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"create_gradient() allocates g_malloc(n_pixels * 3) where n_pixels is the rect width or height (an int). The multiplication is performed in int arithmetic; for very large gradient dimensions n_pixels*3 can overflow a 32-bit int, producing a too-small allocation and a subsequent heap buffer overflow when the loop writes result[3*i+0..2]. Pixel-buffer sizing should use gsize.","fix":"Compute the size as a gsize: g_malloc ((gsize) n_pixels * 3), and use gsize for the index arithmetic, or use g_malloc_n / g_new for overflow-checked allocation.","locations":[{"ref":"libmate-desktop/mate-bg.c:2601-2618","code":" 2601 | static guchar *\n 2602 | create_gradient (const GdkRGBA *primary,\n 2603 | \t\t const GdkRGBA *secondary,\n 2604 | \t\t int\t         n_pixels)\n 2605 | {\n 2606 | \tguchar *result = g_malloc (n_pixels * 3);\n 2607 | \tint i;\n 2608 | \n 2609 | \tfor (i = 0; i < n_pixels; ++i) {\n 2610 | \t\tdouble ratio = (i + 0.5) / n_pixels;\n 2611 | \n 2612 | \t\tresult[3 * i + 0] = (guchar) ((primary->red * (1 - ratio) + secondary->red * ratio) * 0x100);\n 2613 | \t\tresult[3 * i + 1] = (guchar) ((primary->green * (1 - ratio) + secondary->green * ratio) * 0x100);\n 2614 | \t\tresult[3 * i + 2] = (guchar) ((primary->blue * (1 - ratio) + secondary->blue * ratio) * 0x100);\n 2615 | \t}\n 2616 | \n 2617 | \treturn result;\n 2618 | }","lines":18}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"get_encoding_from_locale uses a fixed 3-byte buffer `char lang[3]` and does `strncpy (lang, locale, 2); lang[2] = '\\0';` to extract a 2-letter language code. This silently truncates any locale to its first two bytes, which is wrong for 3-letter ISO-639 codes (e.g. some language identifiers) and assumes the locale is at least conceptually 2-char; while not an out-of-bounds write, it is a latent correctness bug and a fragile fixed-size buffer pattern that mishandles multi-byte/short locales.","fix":"Extract the language portion up to '_' or '.' using g_strndup based on the actual delimiter rather than a hardcoded 2-byte copy.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:3213-3241","code":" 3213 | static const char *\n 3214 | get_encoding_from_locale (const char *locale)\n 3215 | {\n 3216 | \tchar lang[3];\n 3217 | \tconst char *encoding;\n 3218 | \tstatic GHashTable *encodings = NULL;\n 3219 | \n 3220 | \tif (locale == NULL)\n 3221 | \t\treturn NULL;\n 3222 | \n 3223 | \t/* if locale includes encoding, use it */\n 3224 | \tencoding = strchr (locale, '.');\n 3225 | \tif (encoding != NULL) {\n 3226 | \t\treturn encoding+1;\n 3227 | \t}\n 3228 | \n 3229 | \tif (encodings == NULL)\n 3230 | \t\tencodings = init_encodings ();\n 3231 | \n 3232 | \t/* first try the entire locale (at this point ll_CC) */\n 3233 | \tencoding = g_hash_table_lookup (encodings, locale);\n 3234 | \tif (encoding != NULL)\n 3235 | \t\treturn encoding;\n 3236 | \n 3237 | \t/* Try just the language */\n 3238 | \tstrncpy (lang, locale, 2);\n 3239 | \tlang[2] = '\\0';\n 3240 | \treturn g_hash_table_lookup (encodings, lang);\n 3241 | }","lines":29}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"crtc_assignment_new() computes required_pixels = width * height, min_pixels = min_width * min_height, max_pixels = max_width * max_height as int multiplications. Large virtual screen sizes (multi-4K/8K monitor walls, e.g. width*height > 2^31) overflow signed int, producing negative or wrapped values and defeating the bounds check (required_pixels < min_pixels || > max_pixels). This can allow an out-of-range configuration to be accepted, or wrongly reject a valid one.","fix":"Use 64-bit (gint64/glong) for the pixel-area products, or compare width/height dimensions directly against min/max rather than multiplying.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:1848-1852","code":" 1848 | \trequired_pixels = width * height;\n 1849 | \tmin_pixels = min_width * min_height;\n 1850 | \tmax_pixels = max_width * max_height;\n 1851 | \n 1852 | \tif (required_pixels < min_pixels || required_pixels > max_pixels)","lines":5}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"get_work_area() reads workareas[desktop*4 .. desktop*4+3] without verifying that desktop*4+3 < num. desktop comes from the _NET_CURRENT_DESKTOP property (get_current_desktop), while the _NET_WORKAREA array length is num. A stale/inconsistent window manager state where the current desktop index exceeds the number of workarea entries leads to an out-of-bounds read of the X-server-returned buffer. The only validations are result==Success, type!=None, format!=0, no leftovers, and num%4==0 - none bound desktop against num.","fix":"After computing desktop, clamp/validate: if ((gulong)(desktop * 4 + 3) >= num) fall back to the default full-screen rect (or desktop = 0) before indexing workareas.","locations":[{"ref":"libmate-desktop/mate-rr-labeler.c:152-158","code":"  152 | \tdesktop = get_current_desktop (labeler->priv->screen);\n  153 | \n  154 | \tworkareas = (long *) ret_workarea;\n  155 | \trect->x = workareas[desktop * 4];\n  156 | \trect->y = workareas[desktop * 4 + 1];\n  157 | \trect->width = workareas[desktop * 4 + 2];\n  158 | \trect->height = workareas[desktop * 4 + 3];","lines":7}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"pixbuf_average_value() computes dividend = height * width (guint) and dd = dividend * 0xFF (computed as guint64 only because dd is gdouble; the dividend itself is guint). For very large images width*height in guint can overflow 32 bits before the multiply by 0xFF, skewing the average color. The per-component totals are guint64 and safe, but the divisor is not.","fix":"Declare dividend as guint64 (already is) but compute it from 64-bit operands: dividend = (guint64) height * width; ensure width/height are promoted to 64-bit before multiplying.","locations":[{"ref":"libmate-desktop/mate-bg.c:2523-2542","code":" 2523 | \t\tdividend = height * width * 0xFF;\n 2524 | \t\ta_total *= 0xFF;\n 2525 | \t} else {\n 2526 | \t\tfor (row = 0; row < height; row++) {\n 2527 | \t\t\tp = pixels + (row * row_stride);\n 2528 | \t\t\tfor (column = 0; column < width; column++) {\n 2529 | \t\t\t\tr = *p++;\n 2530 | \t\t\t\tg = *p++;\n 2531 | \t\t\t\tb = *p++;\n 2532 | \n 2533 | \t\t\t\tr_total += r;\n 2534 | \t\t\t\tg_total += g;\n 2535 | \t\t\t\tb_total += b;\n 2536 | \t\t\t}\n 2537 | \t\t}\n 2538 | \t\tdividend = height * width;\n 2539 | \t\ta_total = dividend * 0xFF;\n 2540 | \t}\n 2541 | \n 2542 | \tdd = dividend * 0xFF;","lines":20}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In paint_triangle()/get_color(), the per-vertex r/g/b are 0..255 ints but the LERP macro performs integer interpolation that can produce values slightly outside 0..255 along padded scanlines (xx ranges over [0,width) with x_interp CLAMPed only to [xl,xr]); the result is packed with (r<<16)|(g<<8)|b without masking. An out-of-range component bleeds into the adjacent channel. In practice values stay near range, but there is no clamp/mask before packing.","fix":"Clamp each interpolated component to [0,255] (or mask with &0xff) before shifting and OR-ing into the pixel.","locations":[{"ref":"libmate-desktop/mate-hsv.c:1020-1037","code":" 1020 |         c = (rl << 16) | (gl << 8) | bl;\n 1021 | \n 1022 |         for (xx = 0; xx < x_start; xx++)\n 1023 |           *p++ = c;\n 1024 | \n 1025 |         for (; xx < x_end; xx++)\n 1026 |           {\n 1027 |             x_interp = CLAMP (xx, xl, xr);\n 1028 | \n 1029 |             *p++ = ((LERP (rl, rr, xl, xr, x_interp) << 16) |\n 1030 |                     (LERP (gl, gr, xl, xr, x_interp) << 8) |\n 1031 |                     LERP (bl, br, xl, xr, x_interp));\n 1032 |           }\n 1033 | \n 1034 |         c = (rr << 16) | (gr << 8) | br;\n 1035 | \n 1036 |         for (; xx < width; xx++)\n 1037 |           *p++ = c;","lines":18}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"In make_display_name the diagonal is computed as `sqrt(width_mm * width_mm + height_mm * height_mm)` using int arithmetic. width_mm/height_mm come from EDID (up to ~2550 mm for the 10*byte case, or up to ~4095 for detailed-timing mm fields). Squares (~16.7M) and their sum fit in 32-bit int, so no real overflow with valid data, but the multiplication is done in int before promotion to double; if a future code path supplied larger values it would overflow silently. Low risk given EDID byte limits.","fix":"Cast to double before multiplying: `sqrt((double)width_mm * width_mm + (double)height_mm * height_mm)`.","locations":[{"ref":"libmate-desktop/display-name.c:284","code":"  284 | \t\tdouble d = sqrt (width_mm * width_mm + height_mm * height_mm);","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"mate_bg_crossfade_finalize() overrides GObject finalize but never chains up to the parent class finalize (G_OBJECT_CLASS(mate_bg_crossfade_parent_class)->finalize(object)). This breaks the GObject finalization chain, leaking the base GObject's private data and any parent-class resources, and is a GObject contract violation.","fix":"Add G_OBJECT_CLASS (mate_bg_crossfade_parent_class)->finalize (object); at the end of mate_bg_crossfade_finalize().","locations":[{"ref":"libmate-desktop/mate-bg-crossfade.c:124-147","code":"  124 | static void\n  125 | mate_bg_crossfade_finalize (GObject *object)\n  126 | {\n  127 |     MateBGCrossfade *fade;\n  128 | \n  129 |     fade = MATE_BG_CROSSFADE (object);\n  130 | \n  131 |     mate_bg_crossfade_stop (fade);\n  132 | \n  133 |     if (fade->priv->fading_surface != NULL) {\n  134 |         cairo_surface_destroy (fade->priv->fading_surface);\n  135 |         fade->priv->fading_surface = NULL;\n  136 |     }\n  137 | \n  138 |     if (fade->priv->start_surface != NULL) {\n  139 |         cairo_surface_destroy (fade->priv->start_surface);\n  140 |         fade->priv->start_surface = NULL;\n  141 |     }\n  142 | \n  143 |     if (fade->priv->end_surface != NULL) {\n  144 |         cairo_surface_destroy (fade->priv->end_surface);\n  145 |         fade->priv->end_surface = NULL;\n  146 |     }\n  147 | }","lines":24}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"ditem_execute returns the uninitialized local `int ret` on the success path. `ret` is only ever assigned -1 in error branches; on a successful g_spawn_async the variable is never written, yet `return ret;` is executed at the end. The function is documented to return the spawned pid (callers treat any value >= 0 as success and a pid). Returning an indeterminate value can cause callers to misinterpret success/failure or use a garbage pid.","fix":"Initialize `int ret = 0;` (or set `ret = pid;`/`ret = 0;` after a successful spawn) so a meaningful value is returned on success.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:1763-1765","code":" 1763 | \tchar **free_me = NULL;\n 1764 | \tchar **real_argv;\n 1765 | \tint i, ret;","lines":3},{"ref":"libmate-desktop/mate-desktop-item.c:2039","code":" 2039 | \treturn ret;","lines":1}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"drop_uri_list_with_env iterates the URI list incorrectly. The loop `for (uri = uris[0]; uri != NULL; uri++)` increments the char pointer `uri` by one byte per iteration instead of advancing through the string array (`uris[i]`). This walks into the bytes of the first URI string and past its end, building a bogus file list of garbage pointers that are then passed to the launcher, and reads out of bounds. It should iterate the NULL-terminated `char **uris` array element by element.","fix":"Iterate with an index: `for (i = 0; uris[i] != NULL; i++) list = g_list_prepend (list, uris[i]);` (or `for (char **p = uris; *p; p++) list = g_list_prepend(list, *p);`).","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:2289-2294","code":" 2289 | \turis = g_uri_list_extract_uris (uri_list);\n 2290 | \n 2291 | \tfor (uri = uris[0]; uri != NULL; uri++) {\n 2292 | \t\tlist = g_list_prepend (list, uri);\n 2293 | \t}\n 2294 | \tlist = g_list_reverse (list);","lines":6}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Inconsistent validation of monitor physical size. The first branch tests `info->width_mm != -1 && info->height_mm` - it compares width against the -1 sentinel but only tests height_mm for truthiness. Since the \"not specified\" sentinel is -1 (which is truthy), a height_mm of -1 passes `info->height_mm` and the code proceeds to use height_mm == -1 as a real dimension, producing a bogus diagonal/inches value via sqrt. It should test `info->height_mm != -1` to match the width check (and the later combined check on line 282).","fix":"Change the condition to `if (info && info->width_mm != -1 && info->height_mm != -1)`.","locations":[{"ref":"libmate-desktop/display-name.c:266-269","code":"  266 | \tif (info && info->width_mm != -1 && info->height_mm)\n  267 | \t{\n  268 | \t\twidth_mm = info->width_mm;\n  269 | \t\theight_mm = info->height_mm;","lines":4}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In scale_thumbnail(), the Wayland fallback branch swaps width and height: scr_height is assigned geometry.width and scr_width is assigned geometry.height. This produces a transposed screen size, corrupting the screen_to_dest fit factor and thus the thumbnail scaling on non-X11 (Wayland) sessions.","fix":"Assign scr_width = geometry.width and scr_height = geometry.height.","locations":[{"ref":"libmate-desktop/mate-bg.c:2152-2157","code":" 2152 | \t\t\tGdkRectangle geometry = {0};\n 2153 | \t\t\tGdkMonitor *monitor;\n 2154 | \t\t\tmonitor = gdk_display_get_monitor (display, 0);\n 2155 | \t\t\tgdk_monitor_get_geometry (monitor, &geometry);\n 2156 | \t\t\tscr_height = geometry.width;\n 2157 | \t\t\tscr_width = geometry.height;","lines":6}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"find_best_size() can return NULL (e.g. empty sizes list, or pass 1 finds nothing). Callers dereference the result without checking: get_filename_for_size returns size->file, get_pixbuf_for_size uses size->file, create_img_thumbnail uses fs->file / fs1->file / fs2->file. A slideshow whose <file>/<from>/<to> element has no usable size entry yields a NULL deref.","fix":"Return early / handle NULL from find_best_size at every call site before dereferencing the returned FileSize.","locations":[{"ref":"libmate-desktop/mate-bg.c:2307-2342","code":" 2307 | static FileSize *\n 2308 | find_best_size (GSList *sizes, gint width, gint height)\n 2309 | {\n 2310 | \tGSList *s;\n 2311 | \tgdouble a, d, distance;\n 2312 | \tFileSize *best = NULL;\n 2313 | \tgint pass;\n 2314 | \n 2315 | \ta = width/(gdouble)height;\n 2316 | \tdistance = 10000.0;\n 2317 | \n 2318 | \tfor (pass = 0; pass < 2; pass++) {\n 2319 | \t\tfor (s = sizes; s; s = s->next) {\n 2320 | \t\t\tFileSize *size = s->data;\n 2321 | \n 2322 | \t\t\tif (pass == 0 && (size->width < width || size->height < height))\n 2323 | \t\t\t\tcontinue;\n 2324 | \n 2325 | \t\t\td = fabs (a - size->width/(gdouble)size->height);\n 2326 | \t\t\tif (d < distance) {\n 2327 | \t\t\t\tdistance = d;\n 2328 | \t\t\t\tbest = size;\n 2329 | \t\t\t}\n 2330 | \t\t\telse if (d == distance) {\n 2331 | \t\t\t\tif (best && (abs (size->width - width) < abs (best->width - width))) {\n 2332 | \t\t\t\t\tbest = size;\n 2333 | \t\t\t\t}\n 2334 | \t\t\t}\n 2335 | \t\t}\n 2336 | \n 2337 | \t\tif (best)\n 2338 | \t\t\tbreak;\n 2339 | \t}\n 2340 | \n 2341 | \treturn best;\n 2342 | }","lines":36},{"ref":"libmate-desktop/mate-bg.c:1333-1334","code":" 1333 | \tsize = find_best_size (slide->file1, best_width, best_height);\n 1334 | \treturn size->file;","lines":2},{"ref":"libmate-desktop/mate-bg.c:2238-2239","code":" 2238 | \t\t\t\t\tfs = find_best_size (slide->file1, dest_width, dest_height);\n 2239 | \t\t\t\t\ttmp = get_as_thumbnail (bg, factory, fs->file);","lines":2}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"handle_text() parses the slideshow <hour> as parser->start_tm.tm_hour = parse_int(text) - 1. struct tm tm_hour is 0-23 and the XML value is already the literal hour, so subtracting 1 shifts the slideshow start time one hour earlier. Note <day> (tm_mday) is parsed without an offset and <month>/<year> use the correct struct-tm offsets, so the -1 on the hour is an inconsistent, almost certainly wrong adjustment that desynchronizes time-of-day-based slideshows.","fix":"Use parser->start_tm.tm_hour = parse_int(text); (no -1), matching the handling of minute/second/day.","locations":[{"ref":"libmate-desktop/mate-bg.c:2864-2865","code":" 2864 | \telse if (stack_is (parser, \"hour\", \"starttime\", \"background\", NULL)) {\n 2865 | \t\tparser->start_tm.tm_hour = parse_int (text) - 1;","lines":2}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"adjustment_changed() recomputes RGB from HSV (or HSV from RGB) and then calls update_color(), which calls mate_hsv_set_color() and resets all spin-button adjustments. Because the hue spin button range is 0..360 with integer step and saturation/value are 0..100 integer, editing one channel quantizes the others on every keystroke via scale_round(), so round-tripping a color through the spin buttons drifts/loses precision (e.g. fine HSV from the wheel snaps to integer degrees).","fix":"Only update the widgets the user is not currently editing, or keep full-precision color state and avoid re-quantizing unedited channels on every change.","locations":[{"ref":"libmate-desktop/mate-colorsel.c:1967-2004","code":" 1967 |   switch (GPOINTER_TO_INT (data))\n 1968 |     {\n 1969 |     case COLORSEL_SATURATION:\n 1970 |     case COLORSEL_VALUE:\n 1971 |       priv->color[GPOINTER_TO_INT (data)] = value / 100;\n 1972 |       gtk_hsv_to_rgb (priv->color[COLORSEL_HUE],\n 1973 | \t\t      priv->color[COLORSEL_SATURATION],\n 1974 | \t\t      priv->color[COLORSEL_VALUE],\n 1975 | \t\t      &priv->color[COLORSEL_RED],\n 1976 | \t\t      &priv->color[COLORSEL_GREEN],\n 1977 | \t\t      &priv->color[COLORSEL_BLUE]);\n 1978 |       break;\n 1979 |     case COLORSEL_HUE:\n 1980 |       priv->color[GPOINTER_TO_INT (data)] = value / 360;\n 1981 |       gtk_hsv_to_rgb (priv->color[COLORSEL_HUE],\n 1982 | \t\t      priv->color[COLORSEL_SATURATION],\n 1983 | \t\t      priv->color[COLORSEL_VALUE],\n 1984 | \t\t      &priv->color[COLORSEL_RED],\n 1985 | \t\t      &priv->color[COLORSEL_GREEN],\n 1986 | \t\t      &priv->color[COLORSEL_BLUE]);\n 1987 |       break;\n 1988 |     case COLORSEL_RED:\n 1989 |     case COLORSEL_GREEN:\n 1990 |     case COLORSEL_BLUE:\n 1991 |       priv->color[GPOINTER_TO_INT (data)] = value / 255;\n 1992 | \n 1993 |       gtk_rgb_to_hsv (priv->color[COLORSEL_RED],\n 1994 | \t\t      priv->color[COLORSEL_GREEN],\n 1995 | \t\t      priv->color[COLORSEL_BLUE],\n 1996 | \t\t      &priv->color[COLORSEL_HUE],\n 1997 | \t\t      &priv->color[COLORSEL_SATURATION],\n 1998 | \t\t      &priv->color[COLORSEL_VALUE]);\n 1999 |       break;\n 2000 |     default:\n 2001 |       priv->color[GPOINTER_TO_INT (data)] = value / 255;\n 2002 |       break;\n 2003 |     }\n 2004 |   update_color (colorsel);","lines":38},{"ref":"libmate-desktop/mate-colorsel.c:2124-2148","code":" 2124 |   mate_hsv_set_color (MATE_HSV (priv->triangle_colorsel),\n 2125 | \t\t      priv->color[COLORSEL_HUE],\n 2126 | \t\t      priv->color[COLORSEL_SATURATION],\n 2127 | \t\t      priv->color[COLORSEL_VALUE]);\n 2128 |   gtk_adjustment_set_value (gtk_spin_button_get_adjustment\n 2129 | \t\t\t    (GTK_SPIN_BUTTON (priv->hue_spinbutton)),\n 2130 | \t\t\t    scale_round (priv->color[COLORSEL_HUE], 360));\n 2131 |   gtk_adjustment_set_value (gtk_spin_button_get_adjustment\n 2132 | \t\t\t    (GTK_SPIN_BUTTON (priv->sat_spinbutton)),\n 2133 | \t\t\t    scale_round (priv->color[COLORSEL_SATURATION], 100));\n 2134 |   gtk_adjustment_set_value (gtk_spin_button_get_adjustment\n 2135 | \t\t\t    (GTK_SPIN_BUTTON (priv->val_spinbutton)),\n 2136 | \t\t\t    scale_round (priv->color[COLORSEL_VALUE], 100));\n 2137 |   gtk_adjustment_set_value (gtk_spin_button_get_adjustment\n 2138 | \t\t\t    (GTK_SPIN_BUTTON (priv->red_spinbutton)),\n 2139 | \t\t\t    scale_round (priv->color[COLORSEL_RED], 255));\n 2140 |   gtk_adjustment_set_value (gtk_spin_button_get_adjustment\n 2141 | \t\t\t    (GTK_SPIN_BUTTON (priv->green_spinbutton)),\n 2142 | \t\t\t    scale_round (priv->color[COLORSEL_GREEN], 255));\n 2143 |   gtk_adjustment_set_value (gtk_spin_button_get_adjustment\n 2144 | \t\t\t    (GTK_SPIN_BUTTON (priv->blue_spinbutton)),\n 2145 | \t\t\t    scale_round (priv->color[COLORSEL_BLUE], 255));\n 2146 |   gtk_adjustment_set_value (gtk_range_get_adjustment\n 2147 | \t\t\t    (GTK_RANGE (priv->opacity_slider)),\n 2148 | \t\t\t    scale_round (priv->color[COLORSEL_OPACITY], 255));","lines":25}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"readbuf_rewind dereferences a freed/NULL stream and leaks state for string-backed ReadBufs and on seek failure. When backed by a string (readbuf_new_from_string) rb->stream and rb->file are NULL; if past_first_read were ever set this would call g_seekable_seek/g_file_read on NULL. More concretely, on the non-seekable reopen path it does g_object_unref(rb->stream) then g_file_read; if rb->file is NULL (string-backed) this is a NULL deref, and rb->size is reset to 0 before the seek attempt so a failed seek followed by failed reopen leaves rb in an inconsistent state. ditem_load always calls readbuf_rewind after get_encoding.","fix":"Guard for rb->stream/rb->file == NULL (string-backed buffers just reset pos/size), and only reset rb->size after a successful seek/reopen.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:261-294","code":"  261 | static gboolean\n  262 | readbuf_rewind (ReadBuf *rb, GError **error)\n  263 | {\n  264 | \tGError *local_error;\n  265 | \n  266 | \trb->eof = FALSE;\n  267 | \trb->pos = 0;\n  268 | \n  269 | \tif (!rb->past_first_read)\n  270 | \t\treturn TRUE;\n  271 | \n  272 | \trb->size = 0;\n  273 | \n  274 | \tif (g_seekable_seek (G_SEEKABLE (rb->stream),\n  275 | \t\t\t     0, G_SEEK_SET, NULL, NULL))\n  276 | \t\treturn TRUE;\n  277 | \n  278 | \tg_object_unref (rb->stream);\n  279 | \tlocal_error = NULL;\n  280 | \trb->stream = g_file_read (rb->file, NULL, &local_error);\n  281 | \n  282 | \tif (rb->stream == NULL) {\n  283 | \t\tg_set_error (\n  284 | \t\t\terror, MATE_DESKTOP_ITEM_ERROR,\n  285 | \t\t\tMATE_DESKTOP_ITEM_ERROR_CANNOT_OPEN,\n  286 | \t\t\t_(\"Error rewinding file '%s': %s\"),\n  287 | \t\t\trb->uri, local_error->message);\n  288 | \t\tg_error_free (local_error);\n  289 | \n  290 | \t\treturn FALSE;\n  291 | \t}\n  292 | \n  293 | \treturn TRUE;\n  294 | }","lines":34}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"decode_string_and_dup undersizes its output buffer for the default escape case. It allocates exactly strlen(s)+1 bytes, but for an unrecognized escape like `\\x` the default branch writes TWO bytes (`*p++ = '\\\\'; *p++ = *s;`) for the two input bytes consumed - that part is balanced - however the loop condition `while (*s++)` advances `s` after the body, and in the default escape branch `s` was already advanced once by `*(++s)`, so a trailing backslash at end-of-string (`\\\\0`) reads/writes one byte past intent. A string ending in a lone backslash makes the switch read the NUL via `*(++s)`, hit default, write '\\\\' and the NUL, then `while(*s++)` advances past the NUL - over-reading. Output sizing assumes no escape expands, which holds, but the lone-trailing-backslash path is unsafe.","fix":"Guard the escape switch against `s` pointing at the terminating NUL (if `*(s+1) == '\\0'` treat the backslash literally and stop), and verify buffer sizing for the default branch.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:3064-3099","code":" 3064 | static char *\n 3065 | decode_string_and_dup (const char *s)\n 3066 | {\n 3067 | \tchar *p = g_malloc (strlen (s) + 1);\n 3068 | \tchar *q = p;\n 3069 | \n 3070 | \tdo {\n 3071 | \t\tif (*s == '\\\\'){\n 3072 | \t\t\tswitch (*(++s)){\n 3073 | \t\t\tcase 's':\n 3074 | \t\t\t\t*p++ = ' ';\n 3075 | \t\t\t\tbreak;\n 3076 | \t\t\tcase 't':\n 3077 | \t\t\t\t*p++ = '\\t';\n 3078 | \t\t\t\tbreak;\n 3079 | \t\t\tcase 'n':\n 3080 | \t\t\t\t*p++ = '\\n';\n 3081 | \t\t\t\tbreak;\n 3082 | \t\t\tcase '\\\\':\n 3083 | \t\t\t\t*p++ = '\\\\';\n 3084 | \t\t\t\tbreak;\n 3085 | \t\t\tcase 'r':\n 3086 | \t\t\t\t*p++ = '\\r';\n 3087 | \t\t\t\tbreak;\n 3088 | \t\t\tdefault:\n 3089 | \t\t\t\t*p++ = '\\\\';\n 3090 | \t\t\t\t*p++ = *s;\n 3091 | \t\t\t\tbreak;\n 3092 | \t\t\t}\n 3093 | \t\t} else {\n 3094 | \t\t\t*p++ = *s;\n 3095 | \t\t}\n 3096 | \t} while (*s++);\n 3097 | \n 3098 | \treturn q;\n 3099 | }","lines":36}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"insert_key can dereference NULL when stripping the encoding from a key's locale bracket. After whacking the encoding from the locale string (p = strchr(locale,'.')), it finds the '[' in the key copy `k` (brace = strchr(k,'[')) and then does `p = strchr(brace, '.')`. If the key contained a locale bracket but `brace` is NULL (e.g. the key was constructed such that snarf_locale_from_key returned non-NULL from a '[' that is no longer present in `k`), strchr(NULL,...) is undefined. The code assumes a '[' is always present in `k` whenever `locale != NULL`, which is true for well-formed input but not validated.","fix":"Null-check `brace` before calling strchr(brace, '.'), bailing out or treating the key as non-localized if absent.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:3423-3445","code":" 3423 | \t\t} else if (locale != NULL) {\n 3424 | \t\t\tchar *p, *brace;\n 3425 | \n 3426 | \t\t\t/* Whack the encoding part */\n 3427 | \t\t\tp = strchr (locale, '.');\n 3428 | \t\t\tif (p != NULL)\n 3429 | \t\t\t\t*p = '\\0';\n 3430 | \n 3431 | \t\t\tif (g_list_find_custom (item->languages, locale,\n 3432 | \t\t\t\t\t\t(GCompareFunc)strcmp) == NULL) {\n 3433 | \t\t\t\titem->languages = g_list_prepend\n 3434 | \t\t\t\t\t(item->languages, locale);\n 3435 | \t\t\t} else {\n 3436 | \t\t\t\tg_free (locale);\n 3437 | \t\t\t}\n 3438 | \n 3439 | \t\t\t/* Whack encoding from encoding in the key */\n 3440 | \t\t\tbrace = strchr (k, '[');\n 3441 | \t\t\tp = strchr (brace, '.');\n 3442 | \t\t\tif (p != NULL) {\n 3443 | \t\t\t\t*p = ']';\n 3444 | \t\t\t\t*(p+1) = '\\0';\n 3445 | \t\t\t}","lines":23}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In mate_rr_config_load_current(), the clone-detection logic only sets clone=TRUE when it finds a second on-output at (0,0) with the same width/height as the first. But the very next else-branch (output on but no crtc/mode, lines 584-588) sets config->priv->clone = FALSE unconditionally, which can clobber a clone state already established by an earlier output in the loop. Because outputs are processed in list order, a later non-displaying-but-connected output resets the clone flag that earlier matching outputs set, giving an order-dependent and likely-wrong clone result.","fix":"Do not reset config->priv->clone in the per-output else branch; compute clone purely from the set of on-outputs at (0,0), independent of iteration order.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:574-588","code":"  574 | \t\tif (output->priv->x == 0 && output->priv->y == 0) {\n  575 | \t\t\tif (clone_width == -1) {\n  576 | \t\t\t\tclone_width = output->priv->width;\n  577 | \t\t\t\tclone_height = output->priv->height;\n  578 | \t\t\t} else if (clone_width == output->priv->width &&\n  579 | \t\t\t\t   clone_height == output->priv->height) {\n  580 | \t\t\t\tconfig->priv->clone = TRUE;\n  581 | \t\t\t}\n  582 | \t\t}\n  583 | \t    }\n  584 | \t    else\n  585 | \t    {\n  586 | \t\toutput->priv->on = FALSE;\n  587 | \t\tconfig->priv->clone = FALSE;\n  588 | \t    }","lines":15}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"crtc_assignment_apply() calls mate_rr_screen_set_primary_output(assign->screen, assign->primary) unconditionally at line 1970, even when success is already FALSE (a CRTC turn-off failed at line 1936-1940 and broke out of the loop, or a configure_crtc call failed). This applies a primary-output change on top of a partially-failed/aborted configuration, leaving the screen in an inconsistent state.","fix":"Only call mate_rr_screen_set_primary_output() inside the if (success) block, after the CRTCs have been configured successfully.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:1955-1970","code":" 1955 |     if (success)\n 1956 |     {\n 1957 | \tConfigureCrtcState state;\n 1958 | \n 1959 | \tmate_rr_screen_set_size (assign->screen, width, height, width_mm, height_mm);\n 1960 | \n 1961 | \tstate.timestamp = timestamp;\n 1962 | \tstate.has_error = FALSE;\n 1963 | \tstate.error = error;\n 1964 | \n 1965 | \tg_hash_table_foreach (assign->info, configure_crtc, &state);\n 1966 | \n 1967 | \tsuccess = !state.has_error;\n 1968 |     }\n 1969 | \n 1970 |     mate_rr_screen_set_primary_output (assign->screen, assign->primary);","lines":16}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"get_current_desktop() requests a format-32 CARDINAL property but reads the value as data_return[0] where data_return is unsigned char*. For an X property with format==32 the data is an array of long (per Xlib ABI), not bytes. Reading data_return[0] only reads the first byte of the first long. On little-endian this happens to give correct results for small desktop numbers, but it is technically wrong and would break on big-endian or for desktop indices >= 256.","fix":"Cast appropriately: workspace = (int) ((long *) data_return)[0]; (matching the format==32 / XA_CARDINAL contract).","locations":[{"ref":"libmate-desktop/mate-rr-labeler.c:90-91","code":"   90 |         if (type == XA_CARDINAL && format == 32 && n_items > 0)\n   91 |                 workspace = (int) data_return[0];","lines":2}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In get_property(), if actual_type/actual_format do not match (XA_INTEGER / format 8) the function still\ncalls XFree(prop) and returns NULL, which is fine, but `*len` is left untouched only in the success branch. Callers\nsuch as read_edid_data() use `*len` after a NULL return is checked, so that is safe; however output->edid_size is read\nby output_copy() (g_memdup2(from->edid_data, from->edid_size)) even when edid_data is NULL. edid_size is only assigned\nwhen read_edid_data returns non-NULL, so on the NULL path edid_size stays 0 from g_slice_new0 - acceptable - but if a\nprior copy set it and data is later NULL the size/data can desynchronize. Minor, but the size field is not reset to 0\nwhen edid_data is NULL.","fix":"Set output->edid_size = 0 explicitly when read_edid_data returns NULL, and guard the g_memdup2 in output_copy with a NULL edid_data check.","locations":[{"ref":"libmate-desktop/mate-rr.c:1344","code":" 1344 |     output->edid_data = read_edid_data (output, &output->edid_size);","lines":1},{"ref":"libmate-desktop/mate-rr.c:1393-1398","code":" 1393 |     output->edid_size = from->edid_size;\n 1394 | #ifdef GLIB_VERSION_2_68\n 1395 |     output->edid_data = g_memdup2 (from->edid_data, from->edid_size);\n 1396 | #else\n 1397 |     output->edid_data = g_memdup (from->edid_data, from->edid_size);\n 1398 | #endif","lines":6}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","description":"decode_edid never validates the EDID checksum it computes. decode_check_sum sums all 128 bytes into info->checksum (a valid block sums to 0 mod 256), but decode_edid only checks decode_header (the 8-byte magic) and ignores info->checksum entirely. Corrupt/garbage EDID data with a valid header but bad checksum is accepted and decoded as if valid. The checksum is computed but its result is dead with respect to the accept/reject decision.","fix":"After decode_check_sum, reject the block (return NULL) when info->checksum != 0, or at minimum emit a warning, since downstream consumers have no other signal.","locations":[{"ref":"libmate-desktop/edid-parse.c:508-535","code":"  508 | static void decode_check_sum(const uchar* edid, MonitorInfo* info)\n  509 | {\n  510 | \tint i;\n  511 | \tuchar check = 0;\n  512 | \n  513 | \tfor (i = 0; i < 128; ++i)\n  514 | \t{\n  515 | \t\tcheck += edid[i];\n  516 | \t}\n  517 | \n  518 | \tinfo->checksum = check;\n  519 | }\n  520 | \n  521 | MonitorInfo* decode_edid(const uchar* edid)\n  522 | {\n  523 | \tMonitorInfo* info = g_new0(MonitorInfo, 1);\n  524 | \n  525 | \tdecode_check_sum(edid, info);\n  526 | \n  527 | \tif (decode_header(edid) && decode_vendor_and_product_identification(edid, info) && decode_edid_version(edid, info) && decode_display_parameters(edid, info) && decode_color_characteristics(edid, info) && decode_established_timings(edid, info) && decode_standard_timings(edid, info) && decode_descriptors(edid, info))\n  528 | \t{\n  529 | \t\treturn info;\n  530 | \t}\n  531 | \telse\n  532 | \t{\n  533 | \t\tg_free(info);\n  534 | \t\treturn NULL;\n  535 | \t}","lines":28}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"color_to_string() converts a GdkRGBA channel to 8-bit via ((guint)(color->red * 65535)) >> 8. For red == 1.0 this is 65535>>8 = 255 (ok), but the intermediate scaling to 65535 then shifting by 8 is a lossy and roundabout way to get an 8-bit value, and for channel values slightly above 1.0 (GdkRGBA is not clamped) the cast can wrap. It also never rounds. Minor correctness/rounding issue.","fix":"Clamp each channel to [0,1] and compute (guint)(CLAMP(color->red,0,1) * 255 + 0.5) directly into the %02x format.","locations":[{"ref":"libmate-desktop/mate-bg.c:201-208","code":"  201 | static char *\n  202 | color_to_string (const GdkRGBA *color)\n  203 | {\n  204 | \treturn g_strdup_printf (\"#%02x%02x%02x\",\n  205 | \t\t\t\t((guint) (color->red * 65535)) >> 8,\n  206 | \t\t\t\t((guint) (color->green * 65535)) >> 8,\n  207 | \t\t\t\t((guint) (color->blue * 65535)) >> 8);\n  208 | }","lines":8}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"cache_file_is_valid() returns get_mtime(filename) < get_mtime(cache_filename). If either file is missing get_mtime returns (gint64)-1. If the source file is missing (mtime -1) and the cache exists (positive mtime), -1 < positive is TRUE, so a stale cache for a now-deleted source is considered valid. Conversely a brand-new cache written in the same second as the source may compare equal (not strictly less) and be treated as invalid, forcing a needless re-render.","fix":"Handle the (gint64)-1 error sentinel explicitly (treat missing source/cache as invalid) and consider <= for the timestamp comparison.","locations":[{"ref":"libmate-desktop/mate-bg.c:679-687","code":"  679 | static gboolean\n  680 | cache_file_is_valid (const char *filename,\n  681 | \t\t     const char *cache_filename)\n  682 | {\n  683 | \tif (!g_file_test (cache_filename, G_FILE_TEST_IS_REGULAR))\n  684 | \t\treturn FALSE;\n  685 | \n  686 | \treturn (get_mtime (filename) < get_mtime (cache_filename));\n  687 | }","lines":9}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"pixbuf_clip_to_fit() returns g_object_ref(src) only when src is strictly smaller in BOTH dimensions (src_width < max_width && src_height < max_height). If the source exactly equals the destination, or is smaller in one dimension but larger in the other, it allocates a new pixbuf and copies. More importantly when src is smaller in one dimension, w/h are MIN(...) so the clipped pixbuf is smaller than the destination area, which for CENTERED placement is intended, but the condition wording (using < not <=) causes a needless copy for an exactly-equal-size image.","fix":"Use <= in the early-return test, or document that the copy on equal size is intentional.","locations":[{"ref":"libmate-desktop/mate-bg.c:852-883","code":"  852 | static GdkPixbuf *\n  853 | pixbuf_clip_to_fit (GdkPixbuf *src,\n  854 | \t\t    int        max_width,\n  855 | \t\t    int        max_height)\n  856 | {\n  857 | \tint src_width, src_height;\n  858 | \tint w, h;\n  859 | \tint src_x, src_y;\n  860 | \tGdkPixbuf *pixbuf;\n  861 | \n  862 | \tsrc_width = gdk_pixbuf_get_width (src);\n  863 | \tsrc_height = gdk_pixbuf_get_height (src);\n  864 | \n  865 | \tif (src_width < max_width && src_height < max_height)\n  866 | \t\treturn g_object_ref (src);\n  867 | \n  868 | \tw = MIN(src_width, max_width);\n  869 | \th = MIN(src_height, max_height);\n  870 | \n  871 | \tpixbuf = gdk_pixbuf_new (GDK_COLORSPACE_RGB,\n  872 | \t\t\t\t gdk_pixbuf_get_has_alpha (src),\n  873 | \t\t\t\t 8, w, h);\n  874 | \n  875 | \tsrc_x = (src_width - w) / 2;\n  876 | \tsrc_y = (src_height - h) / 2;\n  877 | \tgdk_pixbuf_copy_area (src,\n  878 | \t\t\t      src_x, src_y,\n  879 | \t\t\t      w, h,\n  880 | \t\t\t      pixbuf,\n  881 | \t\t\t      0, 0);\n  882 | \treturn pixbuf;\n  883 | }","lines":32}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"mate_bg_is_dark() mixes color-space scales. After pixbuf_average_value fills argb in [0,1] doubles, it converts to 8-bit (a,r,g,b in 0..255) then computes color.red = (color.red * (0xFF - a) + r * 0x101 * a) / 0xFF, storing the result back into the GdkRGBA double field color.red. The r*0x101 term scales an 8-bit value to 16-bit, so color.red ends up on a ~0..65535 scale, but color.red coming from bg->primary is on a 0..1 scale; mixing a 0..1 value with a 0..65535 value via (0xFF-a) weighting is dimensionally inconsistent, making the darkness heuristic unreliable.","fix":"Work consistently in one scale: convert primary/secondary to the same 0..65535 (or 0..1) units as the averaged pixbuf color before the alpha-weighted blend, then compute intensity.","locations":[{"ref":"libmate-desktop/mate-bg.c:1238-1259","code":" 1238 | \tpixbuf = get_pixbuf_for_size (bg, -1, width, height);\n 1239 | \tif (pixbuf) {\n 1240 | \t\tGdkRGBA argb;\n 1241 | \t\tguchar a, r, g, b;\n 1242 | \n 1243 | \t\tpixbuf_average_value (pixbuf, &argb);\n 1244 | \t\ta = argb.alpha * 0xff;\n 1245 | \t\tr = argb.red * 0xff;\n 1246 | \t\tg = argb.green * 0xff;\n 1247 | \t\tb = argb.blue * 0xff;\n 1248 | \n 1249 | \t\tcolor.red = (color.red * (0xFF - a) + r * 0x101 * a) / 0xFF;\n 1250 | \t\tcolor.green = (color.green * (0xFF - a) + g * 0x101 * a) / 0xFF;\n 1251 | \t\tcolor.blue = (color.blue * (0xFF - a) + b * 0x101 * a) / 0xFF;\n 1252 | \t\tg_object_unref (pixbuf);\n 1253 | \t}\n 1254 | \n 1255 | \tintensity = ((guint) (color.red * 65535) * 77 +\n 1256 | \t\t     (guint) (color.green * 65535) * 150 +\n 1257 | \t\t     (guint) (color.blue * 65535) * 28) >> 16;\n 1258 | \n 1259 | \treturn intensity < 160; /* biased slightly to be dark */","lines":22}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In handle_text(), the 'size' element handlers (e.g. stack_is size/file/static/...) do fs = slide->file1->data; fs->file = g_strdup(text); overwriting fs->file. If a <size> element appears before any <file>/<from> text (so file1 is NULL) this dereferences a NULL list. Also g_strdup on an already-set fs->file leaks the previous string. Malformed/hostile slideshow XML can trigger this.","fix":"Guard against slide->file1/file2 being NULL before dereferencing ->data, and g_free any pre-existing fs->file before overwriting it.","locations":[{"ref":"libmate-desktop/mate-bg.c:2898-2906","code":" 2898 | \telse if (stack_is (parser, \"size\", \"file\", \"static\", \"background\", NULL) ||\n 2899 | \t\t stack_is (parser, \"size\", \"from\", \"transition\", \"background\", NULL)) {\n 2900 | \t\tg_return_if_fail (slide != NULL);\n 2901 | \n 2902 | \t\tfs = slide->file1->data;\n 2903 | \t\tfs->file = g_strdup (text);\n 2904 | \t\tif (slide->file1->next != NULL)\n 2905 | \t\t\tparser->has_multiple_sizes = TRUE;\n 2906 | \t}","lines":9},{"ref":"libmate-desktop/mate-bg.c:2924-2931","code":" 2924 | \telse if (stack_is (parser, \"size\", \"to\", \"transition\", \"background\", NULL)) {\n 2925 | \t\tg_return_if_fail (slide != NULL);\n 2926 | \n 2927 | \t\tfs = slide->file2->data;\n 2928 | \t\tfs->file = g_strdup (text);\n 2929 | \t\tif (slide->file2->next != NULL)\n 2930 | \t\t\tparser->has_multiple_sizes = TRUE;\n 2931 | \t}","lines":8}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"read_slideshow_file(): on a single-slide slideshow it sets slide->duration = show->total_duration = G_MAXUINT. G_MAXUINT (4294967295) assigned to a double duration is then used by get_current_slide via fmod(now()-start_time, total_duration); this works but the magic sentinel is also fed into get_slide_timeout (returns G_MAXUINT for fixed, or /64 for transition) and ensure_timeout compares timeout < G_MAXUINT. For a single non-fixed slide this branch is unreachable, but the dual use of G_MAXUINT as both 'duration' and 'no timeout sentinel' is fragile and undocumented.","fix":"Use an explicit flag for single-slide/no-transition state instead of overloading G_MAXUINT as a duration value.","locations":[{"ref":"libmate-desktop/mate-bg.c:3090-3093","code":" 3090 | \t\t} else if (num_items == 1) {\n 3091 | \t\t\tSlide *slide = show->slides->head->data;\n 3092 | \t\t\tslide->duration = show->total_duration = G_MAXUINT;\n 3093 | \t\t}","lines":4}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","description":"mate_color_selection_get_current_rgba() never sets color->alpha. The returned GdkRGBA has an uninitialized alpha field, so callers that read .alpha (e.g. to render or serialize) get garbage. The companion set_current_rgba() does store alpha into COLORSEL_OPACITY.","fix":"Set color->alpha = priv->has_opacity ? priv->color[COLORSEL_OPACITY] : 1.0; before returning.","locations":[{"ref":"libmate-desktop/mate-colorsel.c:2481-2494","code":" 2481 | void\n 2482 | mate_color_selection_get_current_rgba (MateColorSelection *colorsel,\n 2483 | \t\t\t\t       GdkRGBA          *color)\n 2484 | {\n 2485 |   MateColorSelectionPrivate *priv;\n 2486 | \n 2487 |   g_return_if_fail (MATE_IS_COLOR_SELECTION (colorsel));\n 2488 |   g_return_if_fail (color != NULL);\n 2489 | \n 2490 |   priv = colorsel->private_data;\n 2491 |   color->red = priv->color[COLORSEL_RED];\n 2492 |   color->green = priv->color[COLORSEL_GREEN];\n 2493 |   color->blue = priv->color[COLORSEL_BLUE];\n 2494 | }","lines":14}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","description":"mate_color_selection_get_color() fills the opacity slot with 65535 when has_opacity is FALSE, but every other element of this gdouble array is in the normalized [0.0,1.0] range (and the opacity element itself is [0,1] when has_opacity is TRUE). Callers expecting a 0..1 opacity get 65535. The sentinel value is a leftover from the old guint16-based GTK API.","fix":"Use 1.0 instead of 65535 for the no-opacity case to stay consistent with the [0,1] convention used everywhere else.","locations":[{"ref":"libmate-desktop/mate-colorsel.c:2536","code":" 2536 |   color[3] = priv->has_opacity ? priv->color[COLORSEL_OPACITY] : 65535;","lines":1}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"find_section has a confusing dual responsibility: despite the name, when the section is not found it allocates and appends a brand-new empty Section as a side effect (lines 930-934). Callers like mate_desktop_item_clear_section call find_section purely to look up an existing section; for an unknown section name this silently creates an empty section in item->sections. This get-or-create-with-side-effect behavior is surprising for a \"find\" function and can accumulate empty sections.","fix":"Split into find_section (pure lookup, returns NULL if absent) and get_or_create_section; have callers choose the right one.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:913-940","code":"  913 | static Section *\n  914 | find_section (MateDesktopItem *item, const char *section)\n  915 | {\n  916 | \tGList *li;\n  917 | \tSection *sec;\n  918 | \n  919 | \tif (section == NULL)\n  920 | \t\treturn NULL;\n  921 | \tif (strcmp (section, \"Desktop Entry\") == 0)\n  922 | \t\treturn NULL;\n  923 | \n  924 | \tfor (li = item->sections; li != NULL; li = li->next) {\n  925 | \t\tsec = li->data;\n  926 | \t\tif (strcmp (sec->name, section) == 0)\n  927 | \t\t\treturn sec;\n  928 | \t}\n  929 | \n  930 | \tsec = g_new0 (Section, 1);\n  931 | \tsec->name = g_strdup (section);\n  932 | \tsec->keys = NULL;\n  933 | \n  934 | \titem->sections = g_list_append (item->sections, sec);\n  935 | \n  936 | \t/* Don't mark the item modified, this is just an empty section,\n  937 | \t * it won't be saved even */\n  938 | \n  939 | \treturn sec;\n  940 | }","lines":28}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"make_spawn_environment_for_sn_context uses strncmp(envp[i], \"DESKTOP_STARTUP_ID\", len) to filter out the existing startup id, but this prefix-match also drops any variable beginning with DESKTOP_STARTUP_ID (e.g. a hypothetical DESKTOP_STARTUP_ID_EXTRA) and, more subtly, does not require an '=' after the name. Combined with retval being sized i+2 while the filter may remove zero entries and one is appended, the sizing is correct, but the prefix filter is imprecise.","fix":"Compare against \"DESKTOP_STARTUP_ID=\" including the '=' so only the exact variable is filtered.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:1512-1524","code":" 1512 | \tdesktop_startup_id_len = strlen (\"DESKTOP_STARTUP_ID\");\n 1513 | \n 1514 | \tfor (i = 0, j = 0; envp[i]; i++) {\n 1515 | \t\tif (strncmp (envp[i], \"DESKTOP_STARTUP_ID\", desktop_startup_id_len) != 0) {\n 1516 | \t\t\tretval[j] = g_strdup (envp[i]);\n 1517 | \t\t\t++j;\n 1518 | \t        }\n 1519 | \t}\n 1520 | \n 1521 | \tretval[j] = g_strdup_printf (\"DESKTOP_STARTUP_ID=%s\",\n 1522 | \t\t\t\t     sn_launcher_context_get_startup_id (sn_context));\n 1523 | \t++j;\n 1524 | \tretval[j] = NULL;","lines":13}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","description":"make_environment_for_screen only records the LAST environment entry matching the \"DISPLAY\" prefix (display_index is overwritten in the loop) and uses strncmp with strlen(\"DISPLAY\"), so variables like DISPLAY_FOO or DISPLAYMANAGER also match the prefix. If such a variable appears after the real DISPLAY, display_index points at the wrong entry and the real DISPLAY is copied unchanged while the unrelated variable is overwritten with the screen's display name, corrupting the child environment.","fix":"Match the variable name exactly: compare against \"DISPLAY=\" (with the '=') and break on the first match.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:1714-1729","code":" 1714 | \tfor (env_len = 0; envp [env_len]; env_len++)\n 1715 | \t\tif (strncmp (envp [env_len], \"DISPLAY\", strlen (\"DISPLAY\")) == 0)\n 1716 | \t\t\tdisplay_index = env_len;\n 1717 | \n 1718 | \tretval = g_new (char *, env_len + 1);\n 1719 | \tretval [env_len] = NULL;\n 1720 | \n 1721 | \tdisplay = gdk_screen_get_display (screen);\n 1722 | \tdisplay_name = g_strdup (gdk_display_get_name (display));\n 1723 | \n 1724 | \tfor (i = 0; i < env_len; i++)\n 1725 | \t\tif (i == display_index)\n 1726 | \t\t\tretval [i] = g_strconcat (\"DISPLAY=\", display_name, NULL);\n 1727 | \t\telse\n 1728 | \t\t\tretval [i] = g_strdup (envp[i]);\n 1729 | ","lines":16}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","description":"mate_desktop_item_launch_on_screen_with_env copies the Exec string onto the stack with g_alloca(strlen(exec)+1). A very long Exec field (attacker-controlled .desktop file) causes an unbounded stack allocation via alloca, which can overflow the stack and crash rather than failing gracefully. alloca on untrusted-length input is unsafe.","fix":"Use g_strdup(exec) (heap) and g_free it, instead of g_alloca, to bound stack usage on untrusted input.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:2126-2127","code":" 2126 | \tthe_exec = g_alloca (strlen (exec) + 1);\n 2127 | \tg_strlcpy (the_exec, exec, strlen (exec) + 1);","lines":2}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ditem_load loses a character at buffer overflow in the KeyDef state machine. The macro OVERFLOW is checked together with `c == '='` and `c == '\\n'`: when OVERFLOW becomes true on an ordinary key character the branch `if (c == '=' || OVERFLOW)` terminates the key and discards the current char `c` (it is never stored, and state transitions to KeyValue). Similarly the KeyValue overflow path discards `c`. With keys/values longer than 1024 bytes this silently truncates and can split a value at an arbitrary byte, producing a corrupted parse rather than an error.","fix":"Treat overflow as an explicit parse error or grow the buffer dynamically (GString) instead of silently truncating fixed CharBuffer[1024].","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:3625-3741","code":" 3625 | #define OVERFLOW (next == &CharBuffer [sizeof(CharBuffer)-1])\n 3626 | \n 3627 | \tstate = FirstBrace;\n 3628 | \twhile ((c = readbuf_getc (rb)) != EOF) {\n 3629 | \t\tif (c == '\\r')\t\t/* Ignore Carriage Return */\n 3630 | \t\t\tcontinue;\n 3631 | \n 3632 | \t\tswitch (state) {\n 3633 | \n 3634 | \t\tcase OnSecHeader:\n 3635 | \t\t\tif (c == ']' || OVERFLOW) {\n 3636 | \t\t\t\t*next = '\\0';\n 3637 | \t\t\t\tnext = CharBuffer;\n 3638 | \n 3639 | \t\t\t\t/* keys were inserted in reverse */\n 3640 | \t\t\t\tif (cur_section != NULL &&\n 3641 | \t\t\t\t    cur_section->keys != NULL) {\n 3642 | \t\t\t\t\tcur_section->keys = g_list_reverse\n 3643 | \t\t\t\t\t\t(cur_section->keys);\n 3644 | \t\t\t\t}\n 3645 | \t\t\t\tif (strcmp (CharBuffer,\n 3646 | \t\t\t\t\t    \"KDE Desktop Entry\") == 0) {\n 3647 | \t\t\t\t\t/* Main section */\n 3648 | \t\t\t\t\tcur_section = NULL;\n 3649 | \t\t\t\t\told_kde = TRUE;\n 3650 | \t\t\t\t} else if (strcmp (CharBuffer,\n 3651 | \t\t\t\t\t\t   \"Desktop Entry\") == 0) {\n 3652 | \t\t\t\t\t/* Main section */\n 3653 | \t\t\t\t\tcur_section = NULL;\n 3654 | \t\t\t\t} else {\n 3655 | \t\t\t\t\tcur_section = g_n
