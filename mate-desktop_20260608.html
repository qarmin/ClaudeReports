<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"NULL dereference in mate_desktop_item_get_file_status. g_file_query_info is called with the error argument NULL, so on failure (file removed, permission error, etc.) `info` is NULL. The code then immediately calls g_file_info_has_attribute(info, ...) and g_object_unref(info) without a NULL check, crashing. The \"disappeared\" case the function is meant to detect is exactly when query_info fails.","fix":"Check `if (info == NULL) { g_object_unref (file); return MATE_DESKTOP_ITEM_DISAPPEARED; }` before using `info`.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:2463-2475","code":" 2463 | \tfile = g_file_new_for_uri (item->location);\n 2464 | \tinfo = g_file_query_info (file, G_FILE_ATTRIBUTE_TIME_MODIFIED,\n 2465 | \t\t\t\t  G_FILE_QUERY_INFO_NONE, NULL, NULL);\n 2466 | \n 2467 | \tretval = MATE_DESKTOP_ITEM_UNCHANGED;\n 2468 | \n 2469 | \tif (!g_file_info_has_attribute (info, G_FILE_ATTRIBUTE_TIME_MODIFIED))\n 2470 | \t\tretval = MATE_DESKTOP_ITEM_DISAPPEARED;\n 2471 | \telse if (((guint64) item->mtime) < g_file_info_get_attribute_uint64 (info, G_FILE_ATTRIBUTE_TIME_MODIFIED))\n 2472 | \t\tretval = MATE_DESKTOP_ITEM_CHANGED;\n 2473 | \n 2474 | \tg_object_unref (info);\n 2475 | \tg_object_unref (file);","lines":13}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"mate_get_country_from_locale() appends translated_territory to the GString without first checking for NULL. get_translated_territory() returns NULL whenever the territory code is not found in mate_territories_map (e.g. an unknown/numeric territory, or iso_3166.xml failed to load). g_string_append(full_name, NULL) then dereferences a NULL pointer and crashes. The sibling function mate_get_language_from_locale() correctly guards this case (it does `if (translated_language == NULL) goto out;`).","fix":"Mirror the language path: after `translated_territory = get_translated_territory(...)`, do `if (translated_territory == NULL) goto out;` before appending. Or guard the append with `if (translated_territory != NULL)`.","locations":[{"ref":"libmate-desktop/mate-languages.c:1214-1215","code":" 1214 |         translated_territory = get_translated_territory (territory_code, translation);\n 1215 |         g_string_append (full_name, translated_territory);","lines":2}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"A malformed config XML file can abort the whole process. handle_start_element() runs g_assert(parser->output == NULL) on every <output> element and g_assert(parser->configuration == NULL) on every <configuration>. A file with nested or repeated elements (e.g. <output><output>... or <configuration><configuration>...) makes the assertion fire and calls abort(). Since these files come from disk and can be hand-edited or corrupted, this is a denial-of-service / crash on untrusted input. The matching code comment at line 193 even acknowledges that the file may be malformed and tries to avoid crashing, yet these asserts contradict that intent.","fix":"Replace the g_assert calls with graceful error handling: if parser->output/parser->configuration is already non-NULL, set *err with g_set_error (G_MARKUP_ERROR) and return, aborting the parse cleanly instead of crashing the process.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:177","code":"  177 | \tg_assert (parser->output == NULL);","lines":1},{"ref":"libmate-desktop/mate-rr-config.c:206","code":"  206 | \tg_assert (parser->configuration == NULL);","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"handle_text() unconditionally dereferences parser->output (e.g. parser->output->priv->connected = TRUE) when the stack matches patterns like \"vendor\",\"output\",... However stack_is() compares against the element-name stack, and a crafted/corrupt file can place text whose stack matches \"...output...\" while parser->output is NULL (for example if the <output> start handler was never reached for that text node, or version mismatch makes TOPLEVEL_ELEMENT NULL and shifts matching). More directly: if <clone> text is encountered the code derefs parser->configuration, and any \"output\"-scoped text derefs parser->output - neither is null-checked. A malformed file can therefore cause a NULL dereference.","fix":"Guard each branch with a NULL check on parser->output / parser->configuration before dereferencing, and set a G_MARKUP_ERROR on mismatch instead of crashing.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:271-364","code":"  271 |     if (stack_is (parser, \"vendor\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  272 |     {\n  273 | \tparser->output->priv->connected = TRUE;\n  274 | \n  275 | \tstrncpy ((gchar*) parser->output->priv->vendor, text, 3);\n  276 | \tparser->output->priv->vendor[3] = 0;\n  277 |     }\n  278 |     else if (stack_is (parser, \"clone\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  279 |     {\n  280 | \tif (strcmp (text, \"yes\") == 0)\n  281 | \t    parser->configuration->priv->clone = TRUE;\n  282 |     }\n  283 |     else if (stack_is (parser, \"product\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  284 |     {\n  285 | \tparser->output->priv->connected = TRUE;\n  286 | \n  287 | \tparser->output->priv->product = parse_int (text);\n  288 |     }\n  289 |     else if (stack_is (parser, \"serial\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  290 |     {\n  291 | \tparser->output->priv->connected = TRUE;\n  292 | \n  293 | \tparser->output->priv->serial = parse_uint (text);\n  294 |     }\n  295 |     else if (stack_is (parser, \"width\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  296 |     {\n  297 | \tparser->output->priv->on = TRUE;\n  298 | \n  299 | \tparser->output->priv->width = parse_int (text);\n  300 |     }\n  301 |     else if (stack_is (parser, \"x\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  302 |     {\n  303 | \tparser->output->priv->on = TRUE;\n  304 | \n  305 | \tparser->output->priv->x = parse_int (text);\n  306 |     }\n  307 |     else if (stack_is (parser, \"y\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  308 |     {\n  309 | \tparser->output->priv->on = TRUE;\n  310 | \n  311 | \tparser->output->priv->y = parse_int (text);\n  312 |     }\n  313 |     else if (stack_is (parser, \"height\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  314 |     {\n  315 | \tparser->output->priv->on = TRUE;\n  316 | \n  317 | \tparser->output->priv->height = parse_int (text);\n  318 |     }\n  319 |     else if (stack_is (parser, \"rate\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  320 |     {\n  321 | \tparser->output->priv->on = TRUE;\n  322 | \n  323 | \tparser->output->priv->rate = parse_int (text);\n  324 |     }\n  325 |     else if (stack_is (parser, \"rotation\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  326 |     {\n  327 | \tif (strcmp (text, \"normal\") == 0)\n  328 | \t{\n  329 | \t    parser->output->priv->rotation |= MATE_RR_ROTATION_0;\n  330 | \t}\n  331 | \telse if (strcmp (text, \"left\") == 0)\n  332 | \t{\n  333 | \t    parser->output->priv->rotation |= MATE_RR_ROTATION_90;\n  334 | \t}\n  335 | \telse if (strcmp (text, \"upside_down\") == 0)\n  336 | \t{\n  337 | \t    parser->output->priv->rotation |= MATE_RR_ROTATION_180;\n  338 | \t}\n  339 | \telse if (strcmp (text, \"right\") == 0)\n  340 | \t{\n  341 | \t    parser->output->priv->rotation |= MATE_RR_ROTATION_270;\n  342 | \t}\n  343 |     }\n  344 |     else if (stack_is (parser, \"reflect_x\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  345 |     {\n  346 | \tif (strcmp (text, \"yes\") == 0)\n  347 | \t{\n  348 | \t    parser->output->priv->rotation |= MATE_RR_REFLECT_X;\n  349 | \t}\n  350 |     }\n  351 |     else if (stack_is (parser, \"reflect_y\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  352 |     {\n  353 | \tif (strcmp (text, \"yes\") == 0)\n  354 | \t{\n  355 | \t    parser->output->priv->rotation |= MATE_RR_REFLECT_Y;\n  356 | \t}\n  357 |     }\n  358 |     else if (stack_is (parser, \"primary\", \"output\", \"configuration\", TOPLEVEL_ELEMENT, NULL))\n  359 |     {\n  360 | \tif (strcmp (text, \"yes\") == 0)\n  361 | \t{\n  362 | \t    parser->output->priv->primary = TRUE;\n  363 | \t}\n  364 |     }","lines":94}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"In screen_update(), the new ScreenInfo's resources are compared against the previous one via\n`info->resources->configTimestamp != screen->priv->info->resources->configTimestamp`. If the screen was created in a\nstate where the previous info had no resources, or if any code path leaves priv->info NULL (e.g. a failed earlier\nupdate), this dereferences a NULL `screen->priv->info`. More concretely, `info->resources` is dereferenced without a\nNULL check; XRRGetScreenResources/XRRGetScreenResourcesCurrent can return non-NULL resources but fill_out_screen_info\nonly stores them when non-NULL, so info->resources is generally valid, yet screen->priv->info / its ->resources are\nassumed valid with no guard.","fix":"Guard with `screen->priv->info && screen->priv->info->resources` before comparing configTimestamp; treat a missing previous info as changed.","locations":[{"ref":"libmate-desktop/mate-rr.c:548-551","code":"  548 | #ifdef HAVE_RANDR\n  549 |     if (info->resources->configTimestamp != screen->priv->info->resources->configTimestamp)\n  550 | \t    changed = TRUE;\n  551 | #endif","lines":4}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"tile_surface() can return NULL (when cairo_status(cr) != SUCCESS the copy is destroyed and NULL returned). mate_bg_crossfade_start() assigns fade->priv->fading_surface = tile_surface(...) for the non-root case without checking for NULL; subsequent draw_background()/on_widget_draw() assert fading_surface != NULL (g_assert) or pass NULL to cairo_set_source_surface, leading to abort or cairo error.","fix":"Check the return of tile_surface for NULL and bail out of mate_bg_crossfade_start (do not start the timeout / emit error) when surface creation failed.","locations":[{"ref":"libmate-desktop/mate-bg-crossfade.c:667-685","code":"  667 |     if (gdk_window_get_window_type (fade->priv->window) != GDK_WINDOW_ROOT) {\n  668 |         fade->priv->fading_surface = tile_surface (fade->priv->start_surface,\n  669 |                                                    fade->priv->width,\n  670 |                                                    fade->priv->height);\n  671 |         if (fade->priv->widget != NULL) {\n  672 |             g_signal_connect (fade->priv->widget, \"draw\",\n  673 |                               (GCallback) on_widget_draw, fade);\n  674 |         }\n  675 |     } else {\n  676 |         cairo_t   *cr;\n  677 |         GdkDisplay *display = gdk_window_get_display (fade->priv->window);\n  678 | \n  679 |         fade->priv->fading_surface = get_root_pixmap_id_surface (display);\n  680 |         cr = cairo_create (fade->priv->fading_surface);\n  681 |         cairo_set_source_surface (cr, fade->priv->start_surface, 0, 0);\n  682 |         cairo_paint (cr);\n  683 |         cairo_destroy (cr);\n  684 |     }\n  685 |     draw_background (fade);","lines":19},{"ref":"libmate-desktop/mate-bg-crossfade.c:288-296","code":"  288 |     if (cairo_status (cr) != CAIRO_STATUS_SUCCESS)\n  289 |     {\n  290 |         cairo_surface_destroy (copy);\n  291 |         copy = NULL;\n  292 |     }\n  293 | \n  294 |     cairo_destroy(cr);\n  295 | \n  296 |     return copy;","lines":9}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"get_current_slide() ends with g_assert_not_reached() followed by return NULL. With G_DISABLE_ASSERT (common in release builds) the assert is compiled out and the function returns NULL. Several callers (e.g. get_filename_for_size at line 1333, create_img_thumbnail) immediately dereference the returned slide (slide->file1, slide->fixed) without a NULL check, so a malformed slideshow with zero total_duration (total_duration==0 makes fmod return NaN, and the loop never matches) leads to a NULL deref.","fix":"Have get_current_slide return a sane fallback (e.g. first slide) instead of NULL, and/or NULL-check the result at every call site. Also guard against total_duration == 0 before fmod().","locations":[{"ref":"libmate-desktop/mate-bg.c:1720-1752","code":" 1720 | static Slide *\n 1721 | get_current_slide (SlideShow *show,\n 1722 | \t\t   double    *alpha)\n 1723 | {\n 1724 | \tdouble delta = fmod (now() - show->start_time, show->total_duration);\n 1725 | \tGList *list;\n 1726 | \tdouble elapsed;\n 1727 | \tint i;\n 1728 | \n 1729 | \tif (delta < 0)\n 1730 | \t\tdelta += show->total_duration;\n 1731 | \n 1732 | \telapsed = 0;\n 1733 | \ti = 0;\n 1734 | \tfor (list = show->slides->head; list != NULL; list = list->next) {\n 1735 | \t\tSlide *slide = list->data;\n 1736 | \n 1737 | \t\tif (elapsed + slide->duration > delta) {\n 1738 | \t\t\tif (alpha)\n 1739 | \t\t\t\t*alpha = (delta - elapsed) / (double)slide->duration;\n 1740 | \t\t\treturn slide;\n 1741 | \t\t}\n 1742 | \n 1743 | \t\ti++;\n 1744 | \t\telapsed += slide->duration;\n 1745 | \t}\n 1746 | \n 1747 | \t/* this should never happen since we have slides and we should always\n 1748 | \t * find a current slide for the elapsed time since beginning -- we're\n 1749 | \t * looping with fmod() */\n 1750 | \tg_assert_not_reached ();\n 1751 | \n 1752 | \treturn NULL;","lines":33}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"In create_img_thumbnail(), when a slideshow frame is requested with frame_num != -1, slide = g_queue_peek_nth(show->slides, frame_num). g_queue_peek_nth returns NULL if frame_num is out of range, after which slide->fixed is dereferenced unconditionally, causing a NULL dereference / crash.","fix":"Check slide != NULL after g_queue_peek_nth and bail out (return NULL) before dereferencing slide->fixed.","locations":[{"ref":"libmate-desktop/mate-bg.c:2230-2235","code":" 2230 | \t\t\t\tif (frame_num == -1)\n 2231 | \t\t\t\t\tslide = get_current_slide (show, &alpha);\n 2232 | \t\t\t\telse\n 2233 | \t\t\t\t\tslide = g_queue_peek_nth (show->slides, frame_num);\n 2234 | \n 2235 | \t\t\t\tif (slide->fixed) {","lines":6}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"get_current_colors() aborts the process with g_assert if the persisted 'gtk-color-palette' GSettings string does not parse into exactly 9*4=36 colors. A user (or another app) writing a palette string with a different number of entries crashes every MateColorSelection. g_assert is also compiled out with G_DISABLE_ASSERT, in which case update_palette()/palette_change_color() index current_colors[] out of bounds instead.","fix":"Validate n_colors gracefully: if it differs from GTK_CUSTOM_PALETTE_WIDTH*GTK_CUSTOM_PALETTE_HEIGHT, fall back to DEFAULT_COLOR_PALETTE (re-parse it) instead of asserting.","locations":[{"ref":"libmate-desktop/mate-colorsel.c:1176-1177","code":" 1176 |   /* make sure that we fill every slot */\n 1177 |   g_assert (n_colors == GTK_CUSTOM_PALETTE_WIDTH * GTK_CUSTOM_PALETTE_HEIGHT);","lines":2}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"mode_initialize() computes the refresh frequency as\n`((info->dotClock / (double)info->hTotal) / info->vTotal + 0.5) * 1000`. If hTotal is 0 this is a float divide (yields\ninf/nan), but the subsequent division by vTotal and especially any integer use is unguarded; more importantly some\nmodes (e.g. certain synthesized modes) report hTotal == 0 or vTotal == 0, producing inf/nan that is then cast to int\n(`mode->freq`) which is undefined behavior in C.","fix":"Guard against hTotal == 0 || vTotal == 0 and set freq = 0 in that case before computing the rate.","locations":[{"ref":"libmate-desktop/mate-rr.c:2101","code":" 2101 |     mode->freq = ((info->dotClock / (double)info->hTotal) / info->vTotal + 0.5) * 1000;","lines":1}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"mate_rr_crtc_set_gamma() calls XRRAllocGamma(crtc->gamma_size) and immediately memcpy()s into\ngamma->red/green/blue without checking that XRRAllocGamma returned non-NULL. On allocation failure (or gamma_size 0)\nXRRAllocGamma can return NULL, leading to a NULL dereference in memcpy.","fix":"Check `if (!gamma) return;` after XRRAllocGamma before the memcpy calls.","locations":[{"ref":"libmate-desktop/mate-rr.c:2145-2153","code":" 2145 |     gamma = XRRAllocGamma (crtc->gamma_size);\n 2146 | \n 2147 |     copy_size = crtc->gamma_size * sizeof (unsigned short);\n 2148 |     memcpy (gamma->red, red, copy_size);\n 2149 |     memcpy (gamma->green, green, copy_size);\n 2150 |     memcpy (gamma->blue, blue, copy_size);\n 2151 | \n 2152 |     XRRSetCrtcGamma (DISPLAY (crtc), crtc->id, gamma);\n 2153 |     XRRFreeGamma (gamma);","lines":9}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","description":"palette_change_color() searches custom_palette[][] for the drawing_area; if it is not found the loop exits with x==GTK_CUSTOM_PALETTE_WIDTH (9) and y==GTK_CUSTOM_PALETTE_HEIGHT (4). The guard g_assert(x < WIDTH || y < HEIGHT) then fails (abort), and if asserts are disabled the next line writes current_colors[y*9+x] = current_colors[45], an out-of-bounds write into a 36-element array.","fix":"Return early (or g_return_if_fail) when the drawing_area is not found, rather than relying on g_assert and then indexing with possibly-out-of-range x/y.","locations":[{"ref":"libmate-desktop/mate-colorsel.c:1203-1224","code":" 1203 |   x = 0;\n 1204 |   y = 0;\t\t\t/* Quiet GCC */\n 1205 |   while (x < GTK_CUSTOM_PALETTE_WIDTH)\n 1206 |     {\n 1207 |       y = 0;\n 1208 |       while (y < GTK_CUSTOM_PALETTE_HEIGHT)\n 1209 |         {\n 1210 |           if (priv->custom_palette[x][y] == drawing_area)\n 1211 |             goto out;\n 1212 | \n 1213 |           ++y;\n 1214 |         }\n 1215 | \n 1216 |       ++x;\n 1217 |     }\n 1218 | \n 1219 |  out:\n 1220 | \n 1221 |   g_assert (x < GTK_CUSTOM_PALETTE_WIDTH || y < GTK_CUSTOM_PALETTE_HEIGHT);\n 1222 | \n 1223 |   current_colors = get_current_colors (colorsel);\n 1224 |   current_colors[y * GTK_CUSTOM_PALETTE_WIDTH + x] = gdk_color;","lines":22}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","description":"language_name_get_codeset_details() passes nl_langinfo(CODESET) through normalize_codeset() then does `strcmp(codeset, \"UTF-8\")`. normalize_codeset() returns NULL if its argument is NULL; if nl_langinfo ever returns NULL (or an empty/unknown encoding leading to a NULL further down) this strcmp dereferences NULL. Defensive NULL handling is missing.","fix":"Check codeset for NULL before strcmp, e.g. `*is_utf8 = (codeset != NULL && strcmp (codeset, \"UTF-8\") == 0);`.","locations":[{"ref":"libmate-desktop/mate-languages.c:319-323","code":"  319 |         if (is_utf8 != NULL) {\n  320 |                 codeset = normalize_codeset (codeset);\n  321 | \n  322 |                 *is_utf8 = strcmp (codeset, \"UTF-8\") == 0;\n  323 |         }","lines":5}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","description":"capitalize_utf8_string() does not handle an empty input string. For str == \"\", g_utf8_get_char(\"\") returns 0 and g_utf8_offset_to_pointer(str, 1) advances one character past the terminating NUL, reading out of bounds, and the result concatenates garbage. iso-codes translated names are normally non-empty, but dgettext of an empty entry would trigger this.","fix":"Return g_strdup(str) (or NULL) early when *str == '\\0' ename (e.g. return a g_strdup'd copy and free at the call site, or restructure so the slideshow stays referenced while the filename is in use).","locations":[{"ref":"libmate-desktop/mate-bg.c:1316-1335","code":" 1316 | static const char *\n 1317 | get_filename_for_size (MateBG *bg, gint best_width, gint best_height)\n 1318 | {\n 1319 | \tSlideShow *show;\n 1320 | \tSlide *slide;\n 1321 | \tFileSize *size;\n 1322 | \n 1323 | \tif (!bg->filename)\n 1324 | \t\treturn NULL;\n 1325 | \n 1326 | \tshow = get_as_slideshow (bg, bg->filename);\n 1327 | \tif (!show) {\n 1328 | \t\treturn bg->filename;\n 1329 | \t}\n 1330 | \n 1331 | \tslide = get_current_slide (show, NULL);\n 1332 | \tslideshow_unref (show);\n 1333 | \tsize = find_best_size (slide->file1, best_width, best_height);\n 1334 | \treturn size->file;\n 1335 | }","lines":20}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"language_name_get_codeset_details() declares `g_autofree char *codeset`. At line 313 it is assigned the return of nl_langinfo(CODESET), which is a pointer into static/internal storage owned by libc, NOT heap memory. If the caller passes is_utf8 == NULL, the normalize_codeset() reassignment at line 320 is skipped, so at scope exit g_autofree calls g_free() on the libc-owned static pointer - an invalid free / crash. Currently all in-file callers pass a non-NULL is_utf8 so the bug is latent, but it is a real freeing-of-non-heap-memory defect waiting for a NULL is_utf8 caller.","fix":"Do not store the nl_langinfo() result in an autofree variable. Use a separate const char * for the nl_langinfo pointer and only g_strdup it where ownership is needed.","locations":[{"ref":"libmate-desktop/mate-languages.c:305-326","code":"  305 |         g_autofree char *old_locale = NULL;\n  306 |         g_autofree char *codeset = NULL;\n  307 | \n  308 |         old_locale = g_strdup (setlocale (LC_CTYPE, NULL));\n  309 | \n  310 |         if (setlocale (LC_CTYPE, language_name) == NULL)\n  311 |                 return;\n  312 | \n  313 |         codeset = nl_langinfo (CODESET);\n  314 | \n  315 |         if (pcodeset != NULL) {\n  316 |                 *pcodeset = g_strdup (codeset);\n  317 |         }\n  318 | \n  319 |         if (is_utf8 != NULL) {\n  320 |                 codeset = normalize_codeset (codeset);\n  321 | \n  322 |                 *is_utf8 = strcmp (codeset, \"UTF-8\") == 0;\n  323 |         }\n  324 | \n  325 |         setlocale (LC_CTYPE, old_locale);\n  326 | }","lines":22}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"low","description":"on_tick() in the crossfade recurses (return on_tick(fade)) when is_first_frame && percent_done > .33 after mutating total_duration. Since this runs from a GSource callback, the recursion is bounded (one level) and benign, but note that on_tick reads/writes fade->priv state that is also touched from mate_bg_crossfade_stop / finalize on the same main loop; if any of these were ever invoked from another thread there is no locking. Within single-thread main-loop use it is fine; flagged for the threading assumption being undocumented.","fix":"Document the single-main-loop-thread requirement, or guard shared state. No code change needed if main-loop-only is guaranteed.","locations":[{"ref":"libmate-desktop/mate-bg-crossfade.c:468-522","code":"  468 | static gboolean\n  469 | on_tick (MateBGCrossfade *fade)\n  470 | {\n  471 |     gdouble now, percent_done;\n  472 |     cairo_t *cr;\n  473 |     cairo_status_t status;\n  474 | \n  475 |     g_return_val_if_fail (MATE_IS_BG_CROSSFADE (fade), FALSE);\n  476 | \n  477 |     now = get_current_time ();\n  478 | \n  479 |     percent_done = (now - fade->priv->start_time) / fade->priv->total_duration;\n  480 |     percent_done = CLAMP (percent_done, 0.0, 1.0);\n  481 | \n  482 |     /* If it's taking a long time to get to the first frame,\n  483 |      * then lengthen the duration, so the user will get to see\n  484 |      * the effect.\n  485 |      */\n  486 |     if (fade->priv->is_first_frame && percent_done > .33) {\n  487 |         fade->priv->is_first_frame = FALSE;\n  488 |         fade->priv->total_duration *= 1.5;\n  489 |         return on_tick (fade);\n  490 |     }\n  491 | \n  492 |     if (fade->priv->fading_surface == NULL ||\n  493 |         fade->priv->end_surface == NULL) {\n  494 |         return FALSE;\n  495 |     }\n  496 | \n  497 |     if (animations_are_disabled (fade)) {\n  498 |         return FALSE;\n  499 |     }\n  500 | \n  501 |     /* We accumulate the results in place for performance reasons.\n  502 |      *\n  503 |      * This means 1) The fade is exponential, not linear (looks good!)\n  504 |      * 2) The rate of fade is not independent of frame rate. Slower machines\n  505 |      * will get a slower fade (but never longer than .75 seconds), and\n  506 |      * even the fastest machines will get *some* fade because the framerate\n  507 |      * is capped.\n  508 |      */\n  509 |     cr = cairo_create (fade->priv->fading_surface);\n  510 | \n  511 |     cairo_set_source_surface (cr, fade->priv->end_surface,\n  512 |                               0.0, 0.0);\n  513 |     cairo_paint_with_alpha (cr, percent_done);\n  514 | \n  515 |     status = cairo_status (cr);\n  516 |     cairo_destroy (cr);\n  517 | \n  518 |     if (status == CAIRO_STATUS_SUCCESS) {\n  519 |         draw_background (fade);\n  520 |     }\n  521 |     return percent_done <= .99;\n  522 | }","lines":55}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"low","description":"The thumbnail lookup/generate/save path is a TOCTOU sequence: mate_desktop_thumbnail_factory_lookup() loads and validates the thumbnail file at a computed MD5 path, and generate/save operate on the same path later, with no locking against other processes (or threads) writing the same cache file concurrently. validate_thumbnail_path() reads the file with gdk_pixbuf_new_from_file() and then callers may overwrite it; another process can replace the file between check and use. save_thumbnail() mitigates partly via mkstemp+rename, but readers can still observe a half-state across the multi-step API.","fix":"Document the cross-process race; rely consistently on atomic write-via-temp+rename (already done in save_thumbnail) and avoid re-reading without re-validating mtime. This is inherent to the spec but should be acknowledged/hardened.","locations":[{"ref":"libmate-desktop/mate-desktop-thumbnail.c:714-750","code":"  714 | static char *\n  715 | validate_thumbnail_path (char                     *path,\n  716 |                          const char               *uri,\n  717 |                          time_t                    mtime,\n  718 |                          MateDesktopThumbnailSize  size)\n  719 | {\n  720 |   GdkPixbuf *pixbuf;\n  721 | \n  722 |   pixbuf = gdk_pixbuf_new_from_file (path, NULL);\n  723 |   if (pixbuf == NULL ||\n  724 |       !mate_desktop_thumbnail_is_valid (pixbuf, uri, mtime)) {\n  725 |       g_free (path);\n  726 |       return NULL;\n  727 |   }\n  728 | \n  729 |   g_clear_object (&pixbuf);\n  730 | \n  731 |   return path;\n  732 | }\n  733 | \n  734 | static char *\n  735 | lookup_thumbnail_path (const char               *uri,\n  736 |                        time_t                    mtime,\n  737 |                        MateDesktopThumbnailSize  size)\n  738 | {\n  739 |   char *path = thumbnail_path (uri, size);\n  740 |   return validate_thumbnail_path (path, uri, mtime, size);\n  741 | }\n  742 | \n  743 | static char *\n  744 | lookup_failed_thumbnail_path (const char               *uri,\n  745 |                               time_t                    mtime,\n  746 |                               MateDesktopThumbnailSize  size)\n  747 | {\n  748 |   char *path = thumbnail_failed_path (uri);\n  749 |   return validate_thumbnail_path (path, uri, mtime, size);\n  750 | }","lines":37},{"ref":"libmate-desktop/mate-desktop-thumbnail.c:1230-1248","code":" 1230 | void\n 1231 | mate_desktop_thumbnail_factory_save_thumbnail (MateDesktopThumbnailFactory *factory,\n 1232 |                                                GdkPixbuf                   *thumbnail,\n 1233 |                                                const char                  *uri,\n 1234 |                                                time_t                       original_mtime)\n 1235 | {\n 1236 |   char *path;\n 1237 | \n 1238 |   path = thumbnail_path (uri, factory->priv->size);\n 1239 |   if (!save_thumbnail (thumbnail, path, uri, original_mtime))\n 1240 |     {\n 1241 |       thumbnail = make_failed_thumbnail ();\n 1242 |       g_free (path);\n 1243 |       path = thumbnail_failed_path (uri);\n 1244 |       save_thumbnail (thumbnail, path, uri, original_mtime);\n 1245 |       g_object_unref (thumbnail);\n 1246 |     }\n 1247 |   g_free (path);\n 1248 | }","lines":19}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","description":"In get_pixbuf_for_size(), get_as_slideshow() already returns a slideshow with an incremented ref count, but the code then calls slideshow_ref(show) again (extra +1), while only a single slideshow_unref(show) is performed at the end. Net effect: the slideshow ref count is leaked by one on every call that hits the slideshow branch, so the SlideShow (and all its slides/strings/queues) is never freed.","fix":"Remove the redundant slideshow_ref(show) at line 2379; get_as_slideshow already returns a reference that the single slideshow_unref at the end balances.","locations":[{"ref":"libmate-desktop/mate-bg.c:2372-2414","code":" 2372 | \t\t\tSlideShow *show = get_as_slideshow (bg, bg->filename);\n 2373 | \n 2374 | \t\t\tif (show) {\n 2375 | \t\t\t\tdouble alpha;\n 2376 | \t\t\t\tdouble timeout;\n 2377 | \t\t\t\tSlide *slide;\n 2378 | \n 2379 | \t\t\t\tslideshow_ref (show);\n 2380 | \n 2381 | \t\t\t\tslide = get_current_slide (sh ->filename);\n 3237 | \n 3238 | \tif (!show)\n 3239 | \t\treturn NULL;\n 3240 | \n 3241 | \tif (frame_num < 0 || (guint) frame_num >= g_queue_get_length (show->slides))\n 3242 | \t\treturn NULL;\n 3243 | \n 3244 | \ti = 0;\n 3245 | \tskipped = 0;\n 3246 | \tfound = FALSE;\n 3247 | \tfor (l = show->slides->head; l; l = l->next) {\n 3248 | \t\tSlide *slide = l->data;\n 3249 | \t\tif (!slide->fixed) {\n 3250 | \t\t\tskipped++;\n 3251 | \t\t\tcontinue;\n 3252 | \t\t}\n 3253 | \t\tif (i == frame_num) {\n 3254 | \t\t\tfound = TRUE;\n 3255 | \t\t\tbreak;\n 3256 | \t\t}\n 3257 | \t\ti++;\n 3258 | \t}\n 3259 | \tif (!found)\n 3260 | \t\treturn NULL;\n 3261 | \n 3262 | \tresult = gdk_pixbuf_new (GDK_COLORSPACE_RGB, FALSE, 8, dest_width, dest_height);\n 3263 | \n 3264 | \tdraw_color (bg, result);\n 3265 | \n 3266 | \tif (bg->filename) {\n 3267 | \t\tthumb = create_img_thumbnail (bg, factory, screen,\n 3268 | \t\t\t\t\t      dest_width, dest_height,\n 3269 | \t\t\t\t\t      frame_num + skipped);\n 3270 | \n 3271 | \t\tif (thumb) {\n 3272 | \t\t\tdraw_image_for_thumb (bg, thumb, result);\n 3273 | \t\t\tg_object_unref (thumb);\n 3274 | \t\t}\n 3275 | \t}\n 3276 | \n 3277 | \treturn result;\n 3278 | }","lines":43}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"PROP_HEX_STRING getter leaks a string. gtk_editable_get_chars() returns a newly-allocated copy of the entry text, and g_value_set_string() makes its own copy, so the original is never freed.","fix":"Use g_value_take_string (value, gtk_editable_get_chars (...)) so the GValue takes ownership of the allocated string.","locations":[{"ref":"libmate-desktop/mate-colorsel.c:563-564","code":"  563 |     case PROP_HEX_STRING:\n  564 |       g_value_set_string (value, gtk_editable_get_chars (GTK_EDITABLE (priv->hex_entry), 0, -1));","lines":2}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"In ditem_execute, `arg_ptr` is allocated as a second independent GSList of GFile objects via `make_args (file_list)` (line 1813) in addition to `args` (line 1812). Only `args` is freed at the end via free_args(args) (line 2031). The list nodes and the GFile objects referenced by the original head of `arg_ptr` are never unreffed/freed: arg_ptr is advanced with `arg_ptr = arg_ptr->next` during the loop, losing the head, and there is no free_args(arg_ptr-head) anywhere. Each launch leaks a GSList plus its GFile references.","fix":"Keep the original head of the second list (e.g. `arg_ptr_head`) and free_args() it after the loop, or restructure to use a single args list with a separate cursor pointer that does not own the nodes.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:1812-1813","code":" 1812 | \targs = make_args (file_list);\n 1813 | \targ_ptr = make_args (file_list);","lines":2},{"ref":"libmate-desktop/mate-desktop-item.c:2006-2031","code":" 2006 | \t\tif (arg_ptr != NULL)\n 2007 | \t\t\targ_ptr = arg_ptr->next;\n 2008 | \n 2009 | \t/* rinse, repeat until we run out of arguments (That\n 2010 | \t * is if we were adding singles anyway) */\n 2011 | \t} while (added_status == ADDED_SINGLE &&\n 2012 | \t\t arg_ptr != NULL &&\n 2013 | \t\t ! launch_only_one);\n 2014 | \n 2015 | \tg_free (exec_locale);\n 2016 | #ifdef HAVE_STARTUP_NOTIFICATION\n 2017 | \tif ((sn_context != NULL) && (GDK_IS_X11_DISPLAY (display))){\n 2018 | \t\tif (ret < 0)\n 2019 | \t\t\tsn_launcher_context_complete (sn_context); /* end sequence */\n 2020 | \t\telse\n 2021 | \t\t\tadd_startup_timeout (screen ? screen :\n 2022 | \t\t\t\t\t     gdk_display_get_default_screen (gdk_display_get_default ()),\n 2023 | \t\t\t\t\t     sn_context);\n 2024 | \t\tsn_launcher_context_unref (sn_context);\n 2025 | \t}\n 2026 | \tif (GDK_IS_X11_DISPLAY (display))\n 2027 | \t\tsn_display_unref (sn_display);\n 2028 | \n 2029 | #endif /* HAVE_STARTUP_NOTIFICATION */\n 2030 | \n 2031 | \tfree_args (args);","lines":26}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"count_languages_and_territories() unconditionally allocates new mate_language_count_map and mate_territory_count_map via g_hash_table_new_full and assigns them to the static globals, without freeing any previously-allocated maps. Because collect_locales() (which calls this) can run more than once (see the performance finding), the previously created count hash tables are leaked on every subsequent run.","fix":"Free/clear the existing maps first (g_clear_pointer(&mate_language_count_map, g_hash_table_destroy)) before re-creating, or only build them once.","locations":[{"ref":"libmate-desktop/mate-languages.c:582-583","code":"  582 | \tmate_language_count_map = g_hash_table_new_full (g_str_hash, g_str_equal, g_free, NULL);\n  583 | \tmate_territory_count_map = g_hash_table_new_full (g_str_hash, g_str_equal, g_free, NULL);","lines":2}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"fill_screen_info_from_resources() stores `info->resources = resources` at entry, but if any\ncrtc_initialize() or output_initialize() fails it returns FALSE. The caller fill_out_screen_info() then returns FALSE,\nand screen_info_new() calls screen_info_free(). screen_info_free does free info->resources, so the resources are freed,\nbut the partially-built outputs/crtcs/modes arrays are also freed - this path is OK. The real leak: if\nXRRGetScreenResources succeeds but the very first crtc_initialize fails, output->name/connector_type/edid for outputs\nnot yet initialized are NULL (fine), but XRROutputInfo / XRRCrtcInfo allocations inside the *failed* initialize call are\nnot freed on the error return (e.g. output_initialize returns FALSE at line 1293 without XRRFreeOutputInfo when info is\nnon-NULL but output->info is NULL).","fix":"In output_initialize, if `info` is non-NULL but the combined check fails, call XRRFreeOutputInfo(info) before returning FALSE. Same audit for crtc_initialize.","locations":[{"ref":"libmate-desktop/mate-rr.c:1286-1294","code":" 1286 |     if (!info || !output->info)\n 1287 |     {\n 1288 | \t/* FIXME: see the comment in crtc_initialize() */\n 1289 | \t/* Translators: here, an \"output\" is a video output */\n 1290 | \tg_set_error (error, MATE_RR_ERROR, MATE_RR_ERROR_RANDR_ERROR,\n 1291 | \t\t     _(\"could not get information about output %d\"),\n 1292 | \t\t     (int) output->id);\n 1293 | \treturn FALSE;\n 1294 |     }","lines":9}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"read_pnp_ids leaks the per-line string allocations. `g_strsplit` returns a NULL-terminated array of separately g_malloc'd strings; the code frees only the array container with `g_free(lines)` instead of `g_strfreev(lines)`. Lines that match the format have their pointer (`code`) stored in the hash table (whose key destroy is g_free), but every non-matching line (blank lines, comments, malformed lines, and the trailing empty element) is leaked. With the real pnp.ids file this leaks a large number of strings. Note: a plain `g_strfreev` cannot be used because matching lines are still referenced by the hash table, so the fix must free only the unreferenced lines or restructure storage.","fix":"g_strdup the code and name when inserting into the hash table (so the table owns its own copies) and then call g_strfreev(lines); or explicitly g_free each lines[i] that was not stored.","locations":[{"ref":"libmate-desktop/display-name.c:204-223","code":"  204 | \tif (g_file_get_contents(PNP_IDS, &contents, NULL, NULL))\n  205 | \t{\n  206 | \t\tlines = g_strsplit(contents, \"\\n\", -1);\n  207 | \n  208 | \t\tfor (i = 0; lines[i]; i++)\n  209 | \t\t{\n  210 | \t\t\t line = lines[i];\n  211 | \n  212 | \t\t\t if (line[0] && line[1] && line[2] && line[3] == '\\t' && line[4])\n  213 | \t\t\t {\n  214 | \t\t\t\t code = line;\n  215 | \t\t\t\t line[3] = '\\0';\n  216 | \t\t\t\t name = line + 4;\n  217 | \t\ L);\n 1951 | \t\t\t} else {\n 1952 | \t\t\t\tpixbuf = gdk_pixbuf_new_from_file (filename, NULL);\n 1953 | \t\t\t}\n 1954 | \n 1955 | \t\t\tif (tmp != NULL)\n 1956 | \t\t\t\tg_free (tmp);\n 1957 | \t\t}","lines":22},{"ref":"libmate-desktop/mate-bg.c:710-712","code":"  710 | \t\tformat = gdk_pixbuf_get_file_info (bg->filename, NULL, NULL);\n  711 | \n  712 | \t\tif (format != NULL) {","lines":3}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In get_encoding_from_locale and init_encodings, the static GHashTable `encodings` is created once and intentionally never freed (process-lifetime cache), and standard_is_boolean/standard_is_strings do the same. These are deliberate one-time caches but they are not thread-safe: two threads racing on first call can each call init_encodings/g_hash_table_new and leak one table, and concurrent g_hash_table_insert on the shared table is undefined. For a library function this is a latent race/leak.","fix":"Initialize these static hash tables under g_once_init_enter / g_once_init_leave (or via a GOnce) to make first-use thread-safe.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:3213-3241","code":" 3213 | static const char *\n 3214 | get_encoding_from_locale (const char *locale)\n 3215 | {\n 3216 | \tchar lang[3];\n 3217 | \tconst char *encoding;\n 3218 | \tstatic GHashTable *encodings = NULL;\n 3219 | \n 3220 | \tif (locale == NULL)\n 3221 | \t\treturn NULL;\n 3222 | \n 3223 | \t/* if locale includes encoding, use it */\n 3224 | \tencoding = strchr (locale, '.');\n 3225 | \tif (encoding != NULL) {\n 3226 | \t\treturn encoding+1;\n 3227 | \t}\n 3228 | \n 3229 | \tif (encodings == NULL)\n 3230 | \t\tencodings = init_encodings ();\n 3231 | \n 3232 | \t/* first try the entire locale (at this point ll_CC) */\n 3233 | \tencoding = g_hash_table_lookup (encodings, locale);\n 3234 | \tif (encoding != NULL)\n 3235 | \t\treturn encoding;\n 3236 | \n 3237 | \t/* Try just the language */\n 3
