ame (g_get_user_cache_dir (),\n  705 |                            \"thumbnails\",\n  706 |                            \"fail\",\n  707 |                            appname,\n  708 |                            file,\n  709 |                            NULL);\n  710 |   g_free (file);\n  711 |   return path;\n  712 | }","lines":16}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","description":"expand_thumbnailing_elem(): a trailing lone '%' in a script element is silently dropped. When '%' is the last character, after `p++` *p is '\\0', the switch hits `case 0` which does nothing and does not append a '%', then `last = p` points at the NUL and the final g_string_append(str, last) appends nothing. So a malformed Exec line ending in '%' loses that character rather than being preserved or reported. Minor robustness issue in untrusted-ish .thumbnailer parsing.","fix":"In the `case 0` branch, append a literal '%' (or otherwise preserve the trailing percent) before terminating, matching shell-like escaping expectations.","locations":[{"ref":"libmate-desktop/mate-desktop-thumbnail.c:881-921","code":"  881 |   while ((p = strchr (last, '%')) != NULL)\n  882 |     {\n  883 |       g_string_append_len (str, last, p - last);\n  884 |       p++;\n  885 | \n  886 |       switch (*p) {\n  887 |       case 'u':\n  888 |        g_string_append (str, inuri);\n  889 |        *got_input = TRUE;\n  890 |        p++;\n  891 |        break;\n  892 |       case 'i':\n  893 |        localfile = g_filename_from_uri (inuri, NULL, NULL);\n  894 |        if (localfile)\n  895 |          {\n  896 |            g_string_append (str, localfile);\n  897 |            *got_input = TRUE;\n  898 |            g_free (localfile);\n  899 |          }\n  900 |        p++;\n  901 |        break;\n  902 |       case 'o':\n  903 |        g_string_append (str, outfile);\n  904 |        *got_output = TRUE;\n  905 |        p++;\n  906 |        break;\n  907 |       case 's':\n  908 |        g_string_append_printf (str, \"%d\", size);\n  909 |        p++;\n  910 |        break;\n  911 |       case '%':\n  912 |        g_string_append_c (str, '%');\n  913 |        p++;\n  914 |        break;\n  915 |       case 0:\n  916 |       default:\n  917 |         break;\n  918 |       }\n  919 |       last = p;\n  920 |     }\n  921 |   g_string_append (str, last);","lines":41}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In mate_hsv_move(), GTK_DIR_LEFT increases hue (hue += HUE_DELTA, same as UP) and GTK_DIR_RIGHT decreases it (same as DOWN) when focus is on the ring. Moving the selection left thus rotates hue the same way as moving up, which is counter-intuitive for arrow-key navigation; LEFT and RIGHT arguably should be swapped or mapped to opposite deltas from UP/DOWN.","fix":"Confirm intended ring-navigation direction; if unintended, make LEFT/RIGHT use the opposite sign from UP/DOWN (or document the choice).","locations":[{"ref":"libmate-desktop/mate-hsv.c:1401-1420","code":" 1401 |     case GTK_DIR_LEFT:\n 1402 |       if (priv->focus_on_ring)\n 1403 |         hue += HUE_DELTA;\n 1404 |       else\n 1405 |         {\n 1406 |           x -= 1;\n 1407 |           compute_sv (hsv, x, y, &sat, &val);\n 1408 |         }\n 1409 |       break;\n 1410 | \n 1411 |     case GTK_DIR_RIGHT:\n 1412 |       if (priv->focus_on_ring)\n 1413 |         hue -= HUE_DELTA\n 1414 |           ;\n 1415 |       else\n 1416 |         {\n 1417 |           x += 1;\n 1418 |           compute_sv (hsv, x, y, &sat, &val);\n 1419 |         }\n 1420 |       break;","lines":20}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","description":"mate_hsv_move() wrap logic maps hue<0 to exactly 1.0 and hue>1 to exactly 0.0 instead of wrapping by modulo. Repeatedly pressing the arrow key at the boundary snaps from one extreme straight to the opposite endpoint (a full revolution) rather than advancing by HUE_DELTA past the seam, causing a visible jump.","fix":"Wrap continuously: if (hue < 0.0) hue += 1.0; else if (hue > 1.0) hue -= 1.0;","locations":[{"ref":"libmate-desktop/mate-hsv.c:1427-1431","code":" 1427 |   /* Wrap */\n 1428 |   if (hue < 0.0)\n 1429 |     hue = 1.0;\n 1430 |   else if (hue > 1.0)\n 1431 |     hue = 0.0;","lines":5}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","description":"add_locale()'s dedup logic only replaces an existing locale entry when the new name is strictly longer (the early-return triggers when `strlen(old_locale->name) > strlen(locale->name)`). When lengths are equal it falls through to g_hash_table_insert, replacing the previous entry with an equivalent one - harmless but wasteful (extra free+strdup). More importantly the heuristic of preferring the longer name is undocumented and can pick a less-canonical variant; behavior depends on hash iteration/scan order.","fix":"Document the longer-name-wins heuristic, and skip the insert when the new entry is not strictly preferable (length <= existing) to avoid redundant churn.","locations":[{"ref":"libmate-desktop/mate-languages.c:466-474","code":"  466 |         old_locale = g_hash_table_lookup (mate_available_locales_map, locale->id);\n  467 |         if (old_locale != NULL) {\n  468 |                 if (strlen (old_locale->name) > strlen (locale->name)) {\n  469 |                         mate_locale_free (locale);\n  470 |                         return FALSE;\n  471 |                 }\n  472 |         }\n  473 | \n  474 |         g_hash_table_insert (mate_available_locales_map, g_strdup (locale->id), locale);","lines":9}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","description":"get_rotation_name() tests rotation flags in order ROTATION_0, _90, _180, _270 with separate ifs returning on first match. MATE_RR_ROTATION_0 is typically a distinct bit; but reflection flags (REFLECT_X/Y) are OR'd into the same rotation value (see handle_text and emit_configuration). If a value has only reflection bits set and no rotation bit, the function falls through to return \"normal\", which is correct, but if ROTATION_0 is value 1 and is always implicitly present the earlier branches may shadow a genuine 90/180/270. Worth verifying the bit layout: as written, any value containing the ROTATION_0 bit returns \"normal\" even if a real rotation bit is also set.","fix":"Mask to the rotation bits and test for exact rotation (e.g. switch on r & (ROTATION_0|_90|_180|_270)) so a combined value cannot be misreported as normal.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:1032-1045","code":" 1032 | static const char *\n 1033 | get_rotation_name (MateRRRotation r)\n 1034 | {\n 1035 |     if (r & MATE_RR_ROTATION_0)\n 1036 | \treturn \"normal\";\n 1037 |     if (r & MATE_RR_ROTATION_90)\n 1038 | \treturn \"left\";\n 1039 |     if (r & MATE_RR_ROTATION_180)\n 1040 | \treturn \"upside_down\";\n 1041 |     if (r & MATE_RR_ROTATION_270)\n 1042 | \treturn \"right\";\n 1043 | \n 1044 |     return \"normal\";\n 1045 | }","lines":14}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","description":"mate_rr_config_ensure_primary()'s top-left selection uses (info->x < top_left->priv->x && info->y < top_left->priv->y) with logical AND. An output that is more-left but lower (smaller x, larger y) is not considered \"more top-left\", so for typical side-by-side monitor layouts (same y, differing x) the second condition fails and top_left is never updated past the first on-output. The comment/intent is to find the top-left-most monitor, but the AND makes it pick essentially the first on-output in most real layouts.","fix":"Use a proper ordering, e.g. prefer smaller x, breaking ties by smaller y: (info->x < top_left->priv->x || (info->x == top_left->priv->x && info->y < top_left->priv->y)).","locations":[{"ref":"libmate-desktop/mate-rr-config.c:1205-1209","code":" 1205 |                 if (top_left == NULL\n 1206 |                     || (info->priv->x < top_left->priv->x\n 1207 |                         && info->priv->y < top_left->priv->y)) {\n 1208 |                         top_left = info;\n 1209 |                 }","lines":5}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","description":"position_window() ignores the return value of get_work_area(). When get_work_area() returns FALSE it has only filled rect with default full-screen bounds (which is acceptable), but it may also have set the rect to stale/zero values in some early-return paths; more importantly the function then intersects the (possibly default) workarea with the monitor geometry and moves the window to workarea.x/.y. gdk_display_get_monitor_at_point() can return NULL (e.g. coordinates outside any monitor after a hotplug), and gdk_monitor_get_geometry(NULL, &monitor) would crash.","fix":"Null-check the monitor returned by gdk_display_get_monitor_at_point() before calling gdk_monitor_get_geometry(); fall back to the workarea rect if NULL.","locations":[{"ref":"libmate-desktop/mate-rr-labeler.c:356-372","code":"  356 | static void\n  357 | position_window (MateRRLabeler  *labeler,\n  358 | \t\t GtkWidget       *window,\n  359 | \t\t int              x,\n  360 | \t\t int              y)\n  361 | {\n  362 | \tGdkRectangle    workarea;\n  363 | \tGdkRectangle    monitor;\n  364 | \tGdkMonitor     *monitor_num;\n  365 | \n  366 | \tget_work_area (labeler, &workarea);\n  367 | \tmonitor_num = gdk_display_get_monitor_at_point (gdk_screen_get_display (labeler->priv->screen), x, y);\n  368 | \tgdk_monitor_get_geometry (monitor_num, &monitor);\n  369 | \tgdk_rectangle_intersect (&monitor, &workarea, &workarea);\n  370 | \n  371 | \tgtk_window_move (GTK_WINDOW (window), workarea.x, workarea.y);\n  372 | }","lines":17}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In fill_out_screen_info(), the non-reprobe branch calls mate_rr_screen_get_ranges(info->screen, ...)\nwhich reads from `screen->priv->info` (the PREVIOUS ScreenInfo), not the new `info` being constructed. This relies on\npriv->info still pointing at a valid prior info. It happens to work because screen_update replaces priv->info only\nafter a successful build, but it is a hidden coupling: the function fills the new info's ranges from the old info's\nranges, and if the old ranges were stale they propagate. The min/max arg order also differs from the reprobe branch.","fix":"Carry forward the ranges explicitly from priv->info into the new info, or always query XRRGetScreenSizeRange; document the dependency.","locations":[{"ref":"libmate-desktop/mate-rr.c:489-496","code":"  489 |     else\n  490 |     {\n  491 |         mate_rr_screen_get_ranges (info->screen,\n  492 | \t\t\t\t\t &(info->min_width),\n  493 | \t\t\t\t\t &(info->max_width),\n  494 | \t\t\t\t\t &(info->min_height),\n  495 | \t\t\t\t\t &(info->max_height));\n  496 |     }","lines":8},{"ref":"libmate-desktop/mate-rr.c:866-890","code":"  866 | void\n  867 | mate_rr_screen_get_ranges (MateRRScreen *screen,\n  868 | \t\t\t    int\t          *min_width,\n  869 | \t\t\t    int\t          *max_width,\n  870 | \t\t\t    int           *min_height,\n  871 | \t\t\t    int\t          *max_height)\n  872 | {\n  873 |     MateRRScreenPrivate *priv;\n  874 | \n  875 |     g_return_if_fail (MATE_IS_RR_SCREEN (screen));\n  876 | \n  877 |     priv = screen->priv;\n  878 | \n  879 |     if (min_width)\n  880 | \t*min_width = priv->info->min_width;\n  881 | \n  882 |     if (max_width)\n  883 | \t*max_width = priv->info->max_width;\n  884 | \n  885 |     if (min_height)\n  886 | \t*min_height = priv->info->min_height;\n  887 | \n  888 |     if (max_height)\n  889 | \t*max_height = priv->info->max_height;\n  890 | }","lines":25}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","description":"mate_rr_crtc_set_config_with_time() declares `result` and only assigns it in the else branch; on the\nerror branch it returns FALSE directly. This is functionally correct but `result` is otherwise unused (it is always\nTRUE when reached). The bounds check `x + mode->width > info->max_width` can also overflow if x is large negative or\npositive, though X positions are normally small.","fix":"Replace `result = TRUE; return result;` with `return TRUE;` and drop the variable; consider validating x/y are non-negative before the addition.","locations":[{"ref":"libmate-desktop/mate-rr.c:1778","code":" 1778 |     gboolean result;","lines":1},{"ref":"libmate-desktop/mate-rr.c:1834-1838","code":" 1834 |     } else {\n 1835 |         result = TRUE;\n 1836 |     }\n 1837 | \n 1838 |     return result;","lines":5},{"ref":"libmate-desktop/mate-rr.c:1789-1790","code":" 1789 | \tif (x + mode->width > info->max_width\n 1790 | \t    || y + mode->height > info->max_height)","lines":2}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","description":"mate_about_on_activate presents only the first existing application window, but g_application_run with a GtkApplication that has no G_APPLICATION_HANDLES_* flags will emit \"activate\" on first run when there are no windows, calling mate_about_run(). mate_about_run uses gtk_dialog_run (a nested main loop) and then destroys the dialog, which conflicts with the GtkApplication run loop model: the dialog is created without being added as an application window until gtk_window_set_application is called, and gtk_dialog_run blocks the activate handler. This mixes the blocking gtk_dialog_run model with GtkApplication's non-blocking model, which can cause the application to exit immediately or behave oddly on re-activation.","fix":"Use gtk_application_add_window and a non-blocking response handler (connect to \"response\"/\"destroy\") instead of gtk_dialog_run inside an activate callback.","locations":[{"ref":"mate-about/mate-about.c:23-37","code":"   23 | static void mate_about_on_activate(GtkApplication* app)\n   24 | {\n   25 |     GList* list;\n   26 | \n   27 |     list = gtk_application_get_windows(app);\n   28 | \n   29 |     if (list)\n   30 |     {\n   31 |         gtk_window_present(GTK_WINDOW(list->data));\n   32 |     }\n   33 |     else\n   34 |     {\n   35 |         mate_about_run();\n   36 |     }\n   37 | }","lines":15},{"ref":"mate-about/mate-about.c:39-75","code":"   39 | void mate_about_run(void)\n   40 | {\n   41 |     mate_about_dialog = (GtkAboutDialog*) gtk_about_dialog_new();\n   42 | \n   43 |     gtk_window_set_default_icon_name(icon);\n   44 |     gtk_about_dialog_set_logo_icon_name(mate_about_dialog, icon);\n   45 | \n   46 |     // name\n   47 |     gtk_about_dialog_set_program_name(mate_about_dialog, _(program_name));\n   48 | \n   49 |     // version\n   50 |     gtk_about_dialog_set_version(mate_about_dialog, version);\n   51 | \n   52 |     // credits and website\n   53 |     gtk_about_dialog_set_copyright(mate_about_dialog, _(copyright));\n   54 |     gtk_about_dialog_set_website(mate_about_dialog, website);\n   55 | \n   56 |     /**\n   57 |      * This generate a random message.\n   58 |      * The comments index must not be more than comments_count - 1\n   59 |      */\n   60 |     gtk_about_dialog_set_comments (mate_about_dialog,\n   61 |                                    _(comments_array[g_random_int_range (0, comments_count)]));\n   62 | \n   63 |     gtk_about_dialog_set_authors(mate_about_dialog, authors);\n   64 |     gtk_about_dialog_set_artists(mate_about_dialog, artists);\n   65 |     gtk_about_dialog_set_documenters(mate_about_dialog, documenters);\n   66 |     /* Translators should localize the following string which will be\n   67 |      * displayed in the about box to give credit to the translator(s). */\n   68 |     gtk_about_dialog_set_translator_credits(mate_about_dialog, _(\"translator-credits\"));\n   69 | \n   70 |     gtk_window_set_application(GTK_WINDOW(mate_about_dialog), mate_about_application);\n   71 | \n   72 |     // start and destroy\n   73 |     gtk_dialog_run((GtkDialog*) mate_about_dialog);\n   74 |     gtk_widget_destroy((GtkWidget*) mate_about_dialog);\n   75 | }","lines":37}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","description":"comments_count is a hand-maintained constant (= 6) used as the upper bound for g_random_int_range(0, comments_count) when selecting a comment from comments_array. If a contributor adds or removes an entry in comments_array without updating comments_count, the random index can either skip valid entries or, if comments_count exceeds the array size, read past the array end and pass a garbage pointer to gettext / gtk_about_dialog_set_comments (out-of-bounds read / crash). The count should be derived from the array.","fix":"Replace the manual comments_count with G_N_ELEMENTS(comments_array) at the use site (the array is visible in mate-about.c via the header), eliminating the hand-synced constant.","locations":[{"ref":"mate-about/mate-about.c:56-61","code":"   56 |     /**\n   57 |      * This generate a random message.\n   58 |      * The comments index must not be more than comments_count - 1\n   59 |      */\n   60 |     gtk_about_dialog_set_comments (mate_about_dialog,\n   61 |                                    _(comments_array[g_random_int_range (0, comments_count)]));","lines":6},{"ref":"mate-about/mate-about.h.in:38-61","code":"   38 | /* Increment comments_count if you add other comments. This will be\n   39 |  * used to choose a random comment. */\n   40 | const int comments_count = 6;\n   41 | const char* comments_array[] = {\n   42 |     N_(\"MATE provides an intuitive and attractive desktop to Linux users \"\n   43 |     \"using traditional metaphors.\"),\n   44 | \n   45 |     N_(\"MATE includes most of what you see on your computer, including the file \"\n   46 |     \"manager, document viewer, image viewer, menus, and many applications.\"),\n   47 | \n   48 |     N_(\"MATE is a Free, usable, stable, accessible desktop environment for the Unix-\"\n   49 |     \"like family of operating systems.\"),\n   50 | \n   51 |     N_(\"MATE is the continuation of GNOME 2. Hundreds of people have contributed code to \"\n   52 |     \"GNOME since it was started in 1997; many more have contributed in other \"\n   53 |     \"important ways, including translations, documentation, and quality assurance.\"),\n   54 | \n   55 |     N_(\"GNOME 2 was the most popular Linux desktop but it’s no longer available... \"\n   56 |     \"MATE is here to provide that same desktop to you!\"),\n   57 | \n   58 |     N_(\"The name “MATE” comes from yerba maté, a species of holly native \"\n   59 |     \"to subtropical South America. Its leaves contain caffeine and are \"\n   60 |     \"used to make infusions and a beverage called mate.\")\n   61 | };","lines":24}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"do_changed/do_transitioned set their id field to 0 and return FALSE (one-shot). queue_changed/queue_transitioned remove an existing source via g_source_remove before re-adding. This is correct, but finalize removes blow_caches_id/changed_id/transitioned_id while dispose (called before finalize) already ran clear_cache which can re-arm timeout_id indirectly is not an issue here. Negligible: the comment '//* Check if default background exists, also */' uses a malformed comment opener (//*) in mate_bg_load_from_gsettings.","fix":"Fix the malformed comment marker //* to a proper /* */ or // comment.","locations":[{"ref":"libmate-desktop/mate-bg.c:370","code":"  370 | \t\t\t//* Check if default background exists, also */","lines":1}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"Swapped bit-range arguments when decoding the chromaticity coordinates. `get_bits(edid[0x19], 5, 4)` is called with begin=5, end=4. In get_bits the mask is `(1 << (end - begin + 1)) - 1`, which for end<begin evaluates to `(1 << 0) - 1 == 0`, so the function always returns 0. Every other call in this function passes the low value first (e.g. `get_bits(edid[0x19], 6, 7)`, `(..., 2, 3)`, `(..., 0, 1)`), confirming this is a transposition typo. As a result the two low bits of red_y are silently dropped, corrupting the decoded red Y chromaticity value.","fix":"Change the call to `get_bits(edid[0x19], 4, 5)` to match the ordering used by all the sibling calls.","locations":[{"ref":"libmate-desktop/edid-parse.c:256","code":"  256 | \tinfo->red_y = decode_fraction(edid[0x1c], get_bits(edid[0x19], 5, 4));","lines":1}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"In mate_get_country_from_locale() the codeset details are fetched from `translation` instead of `locale`: `language_name_get_codeset_details (translation, &langinfo_codeset, &is_utf8);`. The analogous code in mate_get_language_from_locale() (line 1149) correctly uses `locale`. `translation` is the optional UI-translation locale (often NULL), not the locale whose codeset is being described, so the appended `[codeset]` suffix is computed from the wrong locale (and when translation is NULL, langinfo is read for the current locale). Classic copy-paste error.","fix":"Change the first argument to `locale`: `language_name_get_codeset_details (locale, &langinfo_codeset, &is_utf8);`.","locations":[{"ref":"libmate-desktop/mate-languages.c:1230","code":" 1230 |         language_name_get_codeset_details (translation, &langinfo_codeset, &is_utf8);","lines":1}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"mate_rr_config_sanitize() (lines 1154-1169) and mate_rr_config_ensure_primary() (lines 1196-1203) contain the same \"only one primary, please\" dedup logic (track found, clear later primaries). Duplicated guarantee logic that can drift; ensure_primary already does this so sanitize's copy is redundant when both are called.","fix":"Extract a single helper enforcing one-primary, and call it from both, or have sanitize() delegate to the shared routine.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:1154-1169","code":" 1154 |     /* Only one primary, please */\n 1155 |     found = FALSE;\n 1156 |     for (i = 0; config->priv->outputs[i]; ++i)\n 1157 |     {\n 1158 |         if (config->priv->outputs[i]->priv->primary)\n 1159 |         {\n 1160 |             if (found)\n 1161 |             {\n 1162 |                 config->priv->outputs[i]->priv->primary = FALSE;\n 1163 |             }\n 1164 |             else\n 1165 |             {\n 1166 |                 found = TRUE;\n 1167 |             }\n 1168 |         }\n 1169 |     }","lines":16},{"ref":"libmate-desktop/mate-rr-config.c:1196-1203","code":" 1196 |                 /* ensure only one */\n 1197 |                 if (info->priv->primary) {\n 1198 |                         if (found) {\n 1199 |                                 info->priv->primary = FALSE;\n 1200 |                         } else {\n 1201 |                                 found = TRUE;\n 1202 |                         }\n 1203 |                 }","lines":8}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"crtc_new() takes its id parameter typed as RROutput rather than RRCrtc. It is assigned to crtc->id\n(an RRCrtc / XID). RROutput and RRCrtc are both XID typedefs so it compiles and works, but this is a copy-paste from\noutput_new() and is misleading - the forward declaration at line 128-129 correctly uses RRCrtc.","fix":"Change the parameter type to RRCrtc to match the declaration and the field type.","locations":[{"ref":"libmate-desktop/mate-rr.c:1929","code":" 1929 | crtc_new (ScreenInfo *info, RROutput id)","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","description":"mate_rr_config_load_filename() reuses the same GError** for two consecutive calls. mate_rr_config_new_current(result->priv->screen, error) may fail and set *error; immediately afterwards configurations_read_from_file(filename, error) is called with the same error pointer. Calling a function that does g_set_error() on an already-set GError triggers a runtime warning and leaks the second GError. Additionally, if mate_rr_config_new_current() returns NULL, current is NULL and is later passed to g_object_unref(current) at line 716 (critical warning) and to mate_rr_config_match(configs[i], current) which only g_return_val_if_fails, silently masking the real failure.","fix":"Check the return of mate_rr_config_new_current(); if NULL, return FALSE immediately (the error is already set). Use a separate/clean GError for configurations_read_from_file, and only g_object_unref(current) when non-NULL.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:680-716","code":"  680 |     current = mate_rr_config_new_current (result->priv->screen, error);\n  681 | \n  682 |     configs = configurations_read_from_file (filename, error);\n  683 | \n  684 |     if (configs)\n  685 |     {\n  686 | \tint i;\n  687 | \n  688 | \tfor (i = 0; configs[i] != NULL; ++i)\n  689 | \t{\n  690 | \t    if (mate_rr_config_match (configs[i], current))\n  691 | \t    {\n  692 | \t\tint j;\n  693 | \t\tGPtrArray *array;\n  694 | \t\tresult->priv->clone = configs[i]->priv->clone;\n  695 | \n  696 | \t\tarray = g_ptr_array_new ();\n  697 | \t\tfor (j = 0; configs[i]->priv->outputs[j] != NULL; j++) {\n  698 | \t\t    g_object_ref (configs[i]->priv->outputs[j]);\n  699 | \t\t    g_ptr_array_add (array, configs[i]->priv->outputs[j]);\n  700 | \t\t}\n  701 | \t\tg_ptr_array_add (array, NULL);\n  702 | \t\tresult->priv->outputs = (MateRROutputInfo **) g_ptr_array_free (array, FALSE);\n  703 | \n  704 | \t\tfound = TRUE;\n  705 | \t\tbreak;\n  706 | \t    }\n  707 | \t    g_object_unref (configs[i]);\n  708 | \t}\n  709 | \tg_free (configs);\n  710 | \n  711 | \tif (!found)\n  712 | \t    g_set_error (error, MATE_RR_ERROR, MATE_RR_ERROR_NO_MATCHING_CONFIG,\n  713 | \t\t\t _(\"none of the saved display configurations matched the active configuration\"));\n  714 |     }\n  715 | \n  716 |     g_object_unref (current);","lines":37}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","description":"get_property() ignores the return Status of XRRGetOutputProperty. On failure the X library leaves `prop`\nand the nitems/actual_type/actual_format outputs in an indeterminate state, yet the code proceeds to test actual_type\nand call g_memdup2(prop, nitems) and XFree(prop). Combined with read_edid_data passing this straight into edid parsing,\na failed request can lead to reading uninitialized stack values or copying from a garbage pointer.","fix":"Check the return value of XRRGetOutputProperty; on anything other than Success return NULL without touching prop/nitems.","locations":[{"ref":"libmate-desktop/mate-rr.c:1149-1172","code":" 1149 |     XRRGetOutputProperty (dpy, output, atom,\n 1150 | \t\t\t  0, 100, False, False,\n 1151 | \t\t\t  AnyPropertyType,\n 1152 | \t\t\t  &actual_type, &actual_format,\n 1153 | \t\t\t  &nitems, &bytes_after, &prop);\n 1154 | \n 1155 |     if (actual_type == XA_INTEGER && actual_format == 8)\n 1156 |     {\n 1157 | #ifdef GLIB_VERSION_2_68\n 1158 | \tresult = g_memdup2 (prop, nitems);\n 1159 | #else\n 1160 | \tresult = g_memdup (prop, nitems);\n 1161 | #endif\n 1162 | \tif (len)\n 1163 | \t    *len = nitems;\n 1164 |     }\n 1165 |     else\n 1166 |     {\n 1167 | \tresult = NULL;\n 1168 |     }\n 1169 | \n 1170 |     XFree (prop);\n 1171 | \n 1172 |     return result;","lines":24}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In mate_bg_crossfade_start(), for the root window case fade->priv->fading_surface = get_root_pixmap_id_surface(display) may return NULL (e.g. _XROOTPMAP_ID not set or XGetGeometry fails), and then cairo_create(NULL) is called and drawn into without a check. Although start() earlier asserts the root pixmap surface exists, that check creates and destroys a separate temporary surface, so a race or change between the two queries can still yield NULL here.","fix":"Check fade->priv->fading_surface for NULL after get_root_pixmap_id_surface and abort the crossfade gracefully if it is NULL, instead of feeding it to cairo_create.","locations":[{"ref":"libmate-desktop/mate-bg-crossfade.c:675-684","code":"  675 |     } else {\n  676 |         cairo_t   *cr;\n  677 |         GdkDisplay *display = gdk_window_get_display (fade->priv->window);\n  678 | \n  679 |         fade->priv->fading_surface = get_root_pixmap_id_surface (display);\n  680 |         cr = cairo_create (fade->priv->fading_surface);\n  681 |         cairo_set_source_surface (cr, fade->priv->start_surface, 0, 0);\n  682 |         cairo_paint (cr);\n  683 |         cairo_destroy (cr);\n  684 |     }","lines":10}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"cleanup_cache_for_monitor() calls g_dir_open(cache_dir, 0, NULL) without checking the return value. If the directory cannot be opened, g_cache_dir is NULL and g_dir_read_name(NULL) / g_dir_close(NULL) are called, which is undefined / will crash or warn.","fix":"Check g_cache_dir for NULL after g_dir_open and return early (freeing monitor_prefix) if it failed.","locations":[{"ref":"libmate-desktop/mate-bg.c:650-677","code":"  650 | static void\n  651 | cleanup_cache_for_monitor (gchar *cache_dir,\n  652 | \t\t\t   gint   num_monitor)\n  653 | {\n  654 | \tGDir            *g_cache_dir;\n  655 | \tgchar           *monitor_prefix;\n  656 | \tconst gchar     *file;\n  657 | \n  658 | \tg_cache_dir = g_dir_open (cache_dir, 0, NULL);\n  659 | \tmonitor_prefix = g_strdup_printf (\"%i_\", num_monitor);\n  660 | \n  661 | \tfile = g_dir_read_name (g_cache_dir);\n  662 | \twhile (file != NULL) {\n  663 | \t\tgchar *path = g_build_filename (cache_dir, file, NULL);\n  664 | \n  665 | \t\t/* purge files with same monitor id */\n  666 | \t\tif (g_str_has_prefix (file, monitor_prefix) &&\n  667 | \t\t    g_file_test (path, G_FILE_TEST_IS_REGULAR))\n  668 | \t\t\tg_unlink (path);\n  669 | \n  670 | \t\tg_free (path);\n  671 | \n  672 | \t\tfile = g_dir_read_name (g_cache_dir);\n  673 | \t}\n  674 | \n  675 | \tg_free (monitor_prefix);\n  676 | \tg_dir_close (g_cache_dir);\n  677 | }","lines":28}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"readbuf_getc ignores read errors. The comment \"FIXME: handle errors other than EOF\" acknowledges it: g_input_stream_read returns -1 on error with the error pointer passed as NULL, and the code treats any `bytes_read <= 0` as clean EOF. A truncated or errored read is silently interpreted as end-of-file, so a partially-read desktop file is parsed as if complete with no error reported to the caller.","fix":"Pass a GError to g_input_stream_read and propagate read errors distinctly from EOF (e.g. via a status flag on ReadBuf) instead of collapsing both into EOF.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:150-159","code":"  150 | \t\t\tbytes_read = g_input_stream_read (G_INPUT_STREAM (rb->stream),\n  151 | \t\t\t\t\t\t\t  rb->buf,\n  152 | \t\t\t\t\t\t\t  READ_BUF_SIZE,\n  153 | \t\t\t\t\t\t\t  NULL, NULL);\n  154 | \n  155 | \t\t/* FIXME: handle errors other than EOF */\n  156 | \t\tif (bytes_read <= 0) {\n  157 | \t\t\trb->eof = TRUE;\n  158 | \t\t\treturn EOF;\n  159 | \t\t}","lines":10}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In save_thumbnail(), when g_mkdir_with_parents() fails the code `goto out` while tmp_path is still NULL        g_object_unref (settings);\n 1163 | \n 1164 |       if (str && *str)\n 1165 |         g_strlcpy(color_palette, str, SIZE_OF_COLOR_PALETTE);\n 1166 |       else\n 1167 |         g_strlcpy(color_palette, DEFAULT_COLOR_PALETTE, SIZE_OF_COLOR_PALETTE);\n 1168 | \n 1169 |       g_free (str);\n 1170 |     }","lines":13},{"ref":"libmate-desktop/mate-colorsel.c:2226","code":" 2226 |   g_strlcpy(color_palette, str, SIZE_OF_COLOR_PALETTE);","lines":1}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"mate_dconf_list_subdirs does not check the result of dconf_client_list before iterating. `children` is dereferenced in the `for (i = 0; children[i] != NULL; ...)` loop. While dconf_client_list normally returns a non-NULL (possibly empty) array, the surrounding code treats `len` as an out parameter but never validates it; any future change or library behavior returning NULL would cause a NULL-pointer dereference. The robust idiom guards against NULL.","fix":"Guard the loop with `if (children) { for (...) {...} g_strfreev(children); }` or assert children != NULL.","locations":[{"ref":"libmate-desktop/mate-dconf.c:116-129","code":"  116 |     children = dconf_client_list (client, dir, &len);\n  117 | \n  118 |     g_object_unref (client);\n  119 | \n  120 |     for (i = 0; children[i] != NULL; i++) {\n  121 |         if (dconf_is_rel_dir (children[i], NULL)) {\n  122 |             char *val = g_strdup (children[i]);\n  123 | \n  124 |             if (remove_trailing_slash)\n  125 |                 val[strlen (val) - 1] = '\\0';\n  126 | \n  127 |             array = g_array_append_val (array, val);\n  128 |         }\n  129 |     }","lines":14}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"stream_printf ignores the result of g_output_stream_write entirely (its own FIXME notes this). ditem_save calls stream_printf repeatedly and returns TRUE unconditionally even if every write failed (disk full, broken pipe), so mate_desktop_item_save reports success and then clears item->modified, losing the user's changes silently.","fix":"Propagate write errors from g_output_stream_write through stream_printf and have ditem_save return FALSE (with GError) on the first failed write; also check the result of g_object_unref-via-close on the stream.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:3783-3797","code":" 3783 | static void\n 3784 | stream_printf (GFileOutputStream *stream, const char *format, ...)\n 3785 | {\n 3786 |     va_list args;\n 3787 |     gchar *s;\n 3788 | \n 3789 |     va_start (args, format);\n 3790 |     s = g_strdup_vprintf (format, args);\n 3791 |     va_end (args);\n 3792 | \n 3793 |     /* FIXME: what about errors */\n 3794 |     g_output_stream_write (G_OUTPUT_STREAM (stream), s, strlen (s),\n 3795 | \t\t    \t   NULL, NULL);\n 3796 |     g_free (s);\n 3797 | }","lines":15},{"ref":"libmate-desktop/mate-desktop-item.c:3831-3861","code":" 3831 | \tstream_printf (stream, \"[Desktop Entry]\\n\");\n 3832 | \tfor (li = item->keys; li != NULL; li = li->next) {\n 3833 | \t\tconst char *key = li->data;\n 3834 | \t\tconst char *value = g_hash_table_lookup (item->main_hash, key);\n 3835 | \t\tif (value != NULL) {\n 3836 | \t\t\tchar *val = escape_string_and_dup (value);\n 3837 | \t\t\tstream_printf (stream, \"%s=%s\\n\", key, val);\n 3838 | \t\t\tg_free (val);\n 3839 | \t\t}\n 3840 | \t}\n 3841 | \n 3842 | \tif (item->sections != NULL)\n 3843 | \t\tstream_printf (stream, \"\\n\");\n 3844 | \n 3845 | \tfor (li = item->sections; li != NULL; li = li->next) {\n 3846 | \t\tSection *section = li->data;\n 3847 | \n 3848 | \t\t/* Don't write empty sections */\n 3849 | \t\tif (section->keys == NULL)\n 3850 | \t\t\tcontinue;\n 3851 | \n 3852 | \t\tdump_section (item, stream, section);\n 3853 | \n 3854 | \t\tif (li->next != NULL)\n 3855 | \t\t\tstream_printf (stream, \"\\n\");\n 3856 | \t}\n 3857 | \n 3858 | \tg_object_unref (stream);\n 3859 | \tg_object_unref (file);\n 3860 | \n 3861 | \treturn TRUE;","lines":31}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In mate_desktop_thumbnail_factory_generate_thumbnail(), g_spawn_sync()'s GError out-param is passed as NULL, and exit_status is only meaningfully interpreted as `exit_status == 0`. On a glibc/UNIX platform g_spawn_sync returns the raw waitpid status in exit_status, so comparing it directly to 0 is correct only by coincidence; the proper API is g_spawn_check_wait_status()/g_spawn_check_exit_status(). Spawn failures are silently ignored (no GError captured), so genuine thumbnailer errors are indistinguishable from a missing thumbnail.","fix":"Capture a GError from g_spawn_sync and use g_spawn_check_wait_status(exit_status, &error) to decide success; log spawn failures.","locations":[{"ref":"libmate-desktop/mate-desktop-thumbnail.c:1115-1118","code":" 1115 |           ret = g_spawn_sync (NULL, expanded_script, NULL, G_SPAWN_SEARCH_PATH,\n 1116 |                               NULL, NULL, NULL, NULL, &exit_status, NULL);\n 1117 |           if (ret && exit_status == 0)\n 1118 |             pixbuf = gdk_pixbuf_new_from_file (tmpname, NULL);","lines":4}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"get_connector_type_string() jumps to the `out:` label and unconditionally calls XFree(prop) even when\nthe XRRGetOutputProperty path that set prop took the early `return NULL` at the != Success check. On the != Success\npath prop is never freed (early return), which can leak; on the goto-out path prop may be a partially populated buffer.\nThe Success-but-wrong-type case correctly frees. The early `return NULL` without XFree(prop) is the leak if the X\nserver returned a buffer alongside a non-Success status (rare but possible).","fix":"Initialize prop = NULL, and on the != Success branch goto out (which XFrees) instead of returning directly; XFree is NULL-safe.","locations":[{"ref":"libmate-desktop/mate-rr.c:1220-1242","code":" 1220 |     if (XRRGetOutputProperty (DISPLAY (output), output->id, output->info->screen->priv->connector_type_atom,\n 1221 | \t\t\t      0, 100, False, False,\n 1222 | \t\t\t      AnyPropertyType,\n 1223 | \t\t\t      &actual_type, &actual_format,\n 1224 | \t\t\t      &nitems, &bytes_after, &prop) != Success)\n 1225 | \treturn NULL;\n 1226 | \n 1227 |     if (!(actual_type == XA_ATOM && actual_format == 32 && nitems == 1))\n 1228 | \tgoto out;\n 1229 | \n 1230 |     connector_type = *((Atom *) prop);\n 1231 | \n 1232 |     connector_type_str = XGetAtomName (DISPLAY (output), connector_type);\n 1233 |     if (connector_type_str) {\n 1234 | \tresult = g_strdup (connector_type_str); /* so the caller can g_free() it */\n 1235 | \tXFree (connector_type_str);\n 1236 |     }\n 1237 | \n 1238 | out:\n 1239 | \n 1240 |     XFree (prop);\n 1241 | \n 1242 |     return result;","lines":23}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"mate_desktop_item_get_boolean and cannonize treat any string whose atoi() is non-zero, OR whose first char is T/t/Y/y, as TRUE. This means a value like \"ttrue\", \"yacht\", or \"0true\" parses oddly, and more importantly a numeric-looking value such as \"-1\" or \"10\" is coerced via atoi to TRUE which is not part of the desktop entry spec (only true/false/1/0). The first-character heuristic also makes the value \"false\" starting differently fine, but \"Trueish-no\" reads as TRUE. This permissive parsing can silently misinterpret malformed boolean fields.","fix":"Compare against the canonical spec values (\"true\"/\"false\"/\"1\"/\"0\") explicitly instead of using first-char and atoi heuristics.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:2916-2920","code":" 2916 | \treturn (value[0] == 'T' ||\n 2917 | \t\tvalue[0] == 't' ||\n 2918 | \t\tvalue[0] == 'Y' ||\n 2919 | \t\tvalue[0] == 'y' ||\n 2920 | \t\tatoi (value) != 0);","lines":5},{"ref":"libmate-desktop/mate-desktop-item.c:3042-3051","code":" 3042 | \tif (standard_is_boolean (key)) {\n 3043 | \t\tif (value[0] == 'T' ||\n 3044 | \t\t    value[0] == 't' ||\n 3045 | \t\t    value[0] == 'Y' ||\n 3046 | \t\t    value[0] == 'y' ||\n 3047 | \t\t    atoi (value) != 0) {\n 3048 | \t\t\treturn g_strdup (\"true\");\n 3049 | \t\t} else {\n 3050 | \t\t\treturn g_strdup (\"false\");\n 3051 | \t\t}","lines":10}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"mate_desktop_gtk_style_get_light_color / _get_dark_color pass `&color` (a GdkRGBA**) to gtk_style_context_get with the \"background-color\" property. For boxed/pointer-valued style properties gtk_style_context_get allocates a new GdkRGBA and stores its pointer into the caller's variable, overwriting the caller-supplied `color` pointer with a freshly allocated one. That heap GdkRGBA is then never freed (gdk_rgba_free is never called), leaking a GdkRGBA on every call, and the result is written to the new allocation rather than the buffer the caller passed in. The caller's own buffer is effectively ignored/leaked-over.","fix":"Fetch into a local `GdkRGBA *tmp = NULL; gtk_style_context_get(style, state, \"background-color\", &tmp, NULL);` then `gtk_style_shade(tmp, color, MULT); gdk_rgba_free(tmp);`.","locations":[{"ref":"libmate-desktop/mate-desktop-utils.c:445-467","code":"  445 | void\n  446 | mate_desktop_gtk_style_get_light_color (GtkStyleContext *style,\n  447 |                                         GtkStateFlags    state,\n  448 |                                         GdkRGBA         *color)\n  449 | {\n  450 | \tg_return_if_fail (color !=  NULL);\n  451 | \tg_return_if_fail (GTK_IS_STYLE_CONTEXT (style));\n  452 | \n  453 | \tgtk_style_context_get (style, state, \"background-color\", &color, NULL);\n  454 | \tgtk_style_shade (color, color, LIGHTNESS_MULT);\n  455 | }\n  456 | \n  457 | void\n  458 | mate_desktop_gtk_style_get_dark_color (GtkStyleContext *style,\n  459 |                                        GtkStateFlags    state,\n  460 |                                        GdkRGBA         *color)\n  461 | {\n  462 | \tg_return_if_fail (color !=  NULL);\n  463 | \tg_return_if_fail (GTK_IS_STYLE_CONTEXT (style));\n  464 | \n  465 | \tgtk_style_context_get (style, state, \"background-color\", &color, NULL);\n  466 | \tgtk_style_shade (color, color, DARKNESS_MULT);\n  467 | }","lines":23}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"draw_color_area() builds an ARGB pixel for gdk_pixbuf_fill from bg->primary using ((guint)(primary.red*0xff) << 24)|...|0xff. The cast (guint)(red*0xff) is not clamped/rounded and GdkRGBA channels are doubles; values at exactly 1.0 give 255 but rounding is absent and out-of-range doubles could overflow into adjacent bytes. Also the gradient cases ignore the actual rect when SOLID is selected (comment acknowledges this).","fix":"Clamp and round each channel: ((guint)(CLAMP(primary.red,0,1)*255+0.5) << 24) etc.","locations":[{"ref":"libmate-desktop/mate-bg.c:797-806","code":"  797 | \tswitch (bg->color_type) {\n  798 | \tcase MATE_BG_COLOR_SOLID:\n  799 | \t\t/* not really a big deal to ignore the area of interest */\n  800 | \t\tpixel = ((guint) (bg->primary.red * 0xff) << 24)   |\n  801 | \t\t\t((guint) (bg->primary.green * 0xff) << 16) |\n  802 | \t\t\t((guint) (bg->primary.blue * 0xff) << 8)   |\n  803 | \t\t\t(0xff);\n  804 | \n  805 | \t\tgdk_pixbuf_fill (dest, pixel);\n  806 | \t\tbreak;","lines":10}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"do_popup() stores the colorsel pointer under a translated key: g_object_set_data(drawing_area, _(\"gtk-color-sel\"), colorsel) wraps the key in gettext _(). save_color_selected() later retrieves it with the literal untranslated key g_object_get_data(drawing_area, \"gtk-color-sel\"). In any non-C locale that translates this (internal) string, the keys differ and g_object_get_data() returns NULL, leading to a NULL colorsel deref in save_color_selected().","fix":"Use the plain literal \"gtk-color-sel\" (no _()) in do_popup(); object-data keys must never be translated.","locations":[{"ref":"libmate-desktop/mate-colorsel.c:1322-1324","code":" 1322 |   g_object_set_data (G_OBJECT (drawing_area),\n 1323 |                      _(\"gtk-color-sel\"),\n 1324 |                      colorsel);","lines":3},{"ref":"libmate-desktop/mate-colorsel.c:1306-1309","code":" 1306 |   colorsel = MATE_COLOR_SELECTION (g_object_get_data (G_OBJECT (drawing_area),\n 1307 |                                                      \"gtk-color-sel\"));\n 1308 | \n 1309 |   priv = colorsel->private_data;","lines":4}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"mate_rr_config_apply_with_time() lacks the g_return_val_if_fail (error == NULL || *error == NULL, ...) precondition check that the other public apply/applicable functions have, and it does not propagate the failure path consistently: when crtc_assignment_new() returns NULL it has set *error, but the function just falls through to return FALSE - acceptable - yet when assignment succeeds but crtc_assignment_apply() fails, result stays FALSE while error is set; callers relying on the documented contract get inconsistent guarantees compared to sibling functions.","fix":"Add the standard g_return_val_if_fail (error == NULL || *error == NULL, FALSE) guard for parity and document/ensure error is set on every FALSE return.","locations":[{"ref":"libmate-desktop/mate-rr-config.c:1281-1316","code":" 1281 | gboolean\n 1282 | mate_rr_config_apply_with_time (MateRRConfig *config,\n 1283 | \t\t\t\t MateRRScreen *screen,\n 1284 | \t\t\t\t guint32        timestamp,\n 1285 | \t\t\t\t GError       **error)\n 1286 | {\n 1287 |     CrtcAssignment *assignment;\n 1288 |     MateRROutputInfo **outputs;\n 1289 |     gboolean result = FALSE;\n 1290 |     int i;\n 1291 |     GdkDisplay *display;\n 1292 | \n 1293 |     g_return_val_if_fail (MATE_IS_RR_CONFIG (config), FALSE);\n 1294 |     g_return_val_if_fail (MATE_IS_RR_SCREEN (screen), FALSE);\n 1295 | \n 1296 |     outputs = make_outputs (config);\n 1297 | \n 1298 |     assignment = crtc_assignment_new (screen, outputs, error);\n 1299 | \n 1300 |     for (i = 0; outputs[i] != NULL; i++)\n 1301 | \tg_object_unref (outputs[i]);\n 1302 |     g_free (outputs);\n 1303 | \n 1304 |     if (assignment)\n 1305 |     {\n 1306 | \tif (crtc_assignment_apply (assignment, timestamp, error))\n 1307 | \t    result = TRUE;\n 1308 | \n 1309 | \tcrtc_assignment_free (assignment);\n 1310 | \n 1311 | \tdisplay = gdk_display_get_default ();\n 1312 | \tgdk_display_flush (display);\n 1313 |     }\n 1314 | \n 1315 |     return result;\n 1316 | }","lines":36}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"refresh_cache_file() is invoked from draw_image_area() on every single draw/redraw of the background. Each call computes an MD5 checksum of the filename, builds cache paths, calls gdk_pixbuf_get_file_info (opens/reads the source file header from disk), stats the cache file, and may re-encode/save a PNG/JPEG. For a static wallpaper redrawn frequently (e.g. on every expose/monitor change) this is significant repeated disk and CPU work even when the cache is already valid.","fix":"Only refresh the disk cache when the scaled pixbuf actually changed, and short-circuit cheaply (e.g. cache the computed cache filename / validity per (monitor,size) rather than recomputing MD5 + file info each draw).","locations":[{"ref":"libmate-desktop/mate-bg.c:689-734","code":"  689 | static void\n  690 | refresh_cache_file (MateBG     *bg,\n  691 | \t\t    GdkPixbuf  *new_pixbuf,\n  692 | \t\t    gint        num_monitor,\n  693 | \t\t    gint        width,\n  694 | \t\t    gint        height)\n  695 | {\n  696 | \tgchar           *cache_filename;\n  697 | \tgchar           *cache_dir;\n  698 | \tGdkPixbufFormat *format;\n  699 | \tgchar           *format_name;\n  700 | \n  701 | \tif ((num_monitor == -1) || (width <= 300) || (height <= 300))\n  702 | \t\treturn;\n  703 | \n  704 | \tcache_filename = get_wallpaper_cache_filename (bg->filename, num_monitor,\n  705 | \t\t\t\t\t\t\tbg->placement, width, height);\n  706 | \tcache_dir = get_wallpaper_cache_dir ();\n  707 | \n  708 | \t/* Only refresh scaled file on disk if useful (and don't cache slideshow) */\n  709 | \tif (!cache_file_is_valid (bg->filename, cache_filename)) {\n  710 | \t\tformat = gdk_pixbuf_get_file_info (bg->filename, NULL, NULL);\n  711 | \n  712 | \t\tif (format != NULL) {\n  713 | \t\t\tif (!g_file_test (cache_dir, G_FILE_TEST_IS_DIR)) {\n  714 | \t\t\t\tg_mkdir_with_parents (cache_dir, 0700);\n  715 | \t\t\t} else {\n  716 | \t\t\t\tcleanup_cache_for_monitor (cache_dir, num_monitor);\n  717 | \t\t\t}\n  718 | \n  719 | \t\t\tformat_name = gdk_pixbuf_format_get_name (format);\n  720 | \n  721 | \t\t\tif (strcmp (format_name, \"jpeg\") == 0)\n  722 | \t\t\t\tgdk_pixbuf_save (new_pixbuf, cache_filename, format_name,\n  723 | \t\t\t\t\t\t NULL, \"quality\", \"100\", NULL);\n  724 | \t\t\telse\n  725 | \t\t\t\tgdk_pixbuf_save (new_pixbuf, cache_filename, format_name,\n  726 | \t\t\t\t\t\t NULL, NULL);\n  727 | \n  728 | \t\t\tg_free (format_name);\n  729 | \t\t}\n  730 | \t}\n  731 | \n  732 | \tg_free (cache_filename);\n  733 | \tg_free (cache_dir);\n  734 | }","lines":46},{"ref":"libmate-desktop/mate-bg.c:947-967","code":"  947 | \tscaled = get_scaled_pixbuf (bg->placement, pixbuf, dest_width, dest_height, &x, &y, &w, &h);\n  948 | \n  949 | \tswitch (bg->placement) {\n  950 | \tcase MATE_BG_PLACEMENT_TILED:\n  951 | \t\tpixbuf_tile (scaled, dest);\n  952 | \t\tbreak;\n  953 | \tcase MATE_BG_PLACEMENT_ZOOMED:\n  954 | \tcase MATE_BG_PLACEMENT_CENTERED:\n  955 | \tcase MATE_BG_PLACEMENT_FILL_SCREEN:\n  956 | \tcase MATE_BG_PLACEMENT_SCALED:\n  957 | \t\tpixbuf_blend (scaled, dest, 0, 0, w, h, x + area->x, y + area->y, 1.0);\n  958 | \t\tbreak;\n  959 | \tcase MATE_BG_PLACEMENT_SPANNED:\n  960 | \t\tpixbuf_blend (scaled, dest, 0, 0, w, h, x, y, 1.0);\n  961 | \t\tbreak;\n  962 | \tdefault:\n  963 | \t\tg_assert_not_reached ();\n  964 | \t\tbreak;\n  965 | \t}\n  966 | \n  967 | \trefresh_cache_file (bg, scaled, num_monitor, dest_width, dest_height);","lines":21}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"paint_ring() recomputes the entire ring image pixel-by-pixel (atan2 + hsv_to_rgb per pixel) on every draw, and allocates/frees a full-window guint32 buffer each time. The ring only depends on size/ring_width/allocation, not on the current color, yet it is regenerated on every motion event while dragging. This is a significant per-frame cost on the color wheel.","fix":"Cache the ring image surface and only regenerate it when the widget size or ring width changes; redraw the value-marker line on top each frame.","locations":[{"ref":"libmate-desktop/mate-hsv.c:764-829","code":"  764 | static void\n  765 | paint_ring (MateHSV *hsv,\n  766 |             cairo_t *cr)\n  767 | {\n  768 |   MateHSVPrivate *priv = hsv->priv;\n  769 |   GtkWidget *widget = GTK_WIDGET (hsv);\n  770 |   int xx, yy, width, height;\n  771 |   gdouble dx, dy, dist;\n  772 |   gdouble center_x;\n  773 |   gdouble center_y;\n  774 |   gdouble inner, outer;\n  775 |   guint32 *buf, *p;\n  776 |   gdouble angle;\n  777 |   gdouble hue;\n  778 |   gdouble r, g, b;\n  779 |   cairo_surface_t *source;\n  780 |   cairo_t *source_cr;\n  781 |   gint stride;\n  782 | \n  783 |   width = gtk_widget_get_allocated_width (widget);\n  784 |   height = gtk_widget_get_allocated_height (widget);\n  785 | \n  786 |   center_x = width / 2.0;\n  787 |   center_y = height / 2.0;\n  788 | \n  789 |   outer = priv->size / 2.0;\n  790 |   inner = outer - priv->ring_width;\n  791 | \n  792 |   /* Create an image initialized with the ring colors */\n  793 | \n  794 |   stride = cairo_format_stride_for_width (CAIRO_FORMAT_RGB24, width);\n  795 |   buf = g_new (guint32, height * stride / 4);\n  796 | \n  797 |   for (yy = 0; yy < height; yy++)\n  798 |     {\n  799 |       p = buf + yy * width;\n  800 | \n  801 |       dy = -(yy - center_y);\n  802 | \n  803 |       for (xx = 0; xx < width; xx++)\n  804 |         {\n  805 |           dx = xx - center_x;\n  806 | \n  807 |           dist = dx * dx + dy * dy;\n  808 |           if (dist < ((inner-1) * (inner-1)) || dist > ((outer+1) * (outer+1)))\n  809 |             {\n  810 |               *p++ = 0;\n  811 |               continue;\n  812 |             }\n  813 | \n  814 |           angle = atan2 (dy, dx);\n  815 |           if (angle < 0.0)\n  816 |             angle += 2.0 * G_PI;\n  817 | \n  818 |           hue = angle / (2.0 * G_PI);\n  819 | \n  820 |           r = hue;\n  821 |           g = 1.0;\n  822 |           b = 1.0;\n  823 |           hsv_to_rgb (&r, &g, &b);\n  824 | \n  825 |           *p++ = (((int)(r * 255.0) << 16) |\n  826 |                   ((int)(g * 255.0) << 8) |\n  827 |                   (int)(b * 255.0));\n  828 |         }\n  829 |     }","lines":66}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","description":"collect_locales() only guards the creation of mate_available_locales_map with a NULL check, but unconditionally re-runs collect_locales_from_localebin() (spawns `locale -a`), collect_locales_from_directory() (scandir of MATELOCALEDIR + many setlocale calls), and count_languages_and_territories() on every call. collect_locales() is invoked from get_language_count(), get_territory_count() and mate_get_all_locales() guarded only by the count-map / locales-map being NULL respectively, so e.g. calling mate_get_all_locales() after get_language_count() triggers a full second rebuild: another subprocess spawn, another directory scan, and re-insertion of every locale into the already-populated map.","fix":"Add a one-time guard (e.g. a static gboolean done, or a GOnce) so the expensive collection/counting work runs only once, instead of relying on individual map NULL checks.","locations":[{"ref":"libmate-desktop/mate-languages.c:593-614","code":"  593 | static void\n  594 | collect_locales (void)\n  595 | {\n  596 |         gboolean found_localebin_locales = FALSE;\n  597 |         gboolean found_dir_locales = FALSE;\n  598 | \n  599 |         if (mate_available_locales_map == NULL) {\n  600 |                 mate_available_locales_map = g_hash_table_new_full (g_str_hash, g_str_equal, g_free, (GDestroyNotify) mate_locale_free);\n  601 |         }\n  602 | \n  603 |         found_localebin_locales = collect_locales_from_localebin ();\n  604 | \n  605 |         found_dir_locales = collect_locales_from_directory ();\n  606 | \n  607 |         if (!(found_localebin_locales || found_dir_locales)) {\n  608 |                 g_warning (\"Could not read list of available locales from libc, \"\n  609 |                            \"guessing possible locales from available translations, \"\n  610 |                            \"but list may be incomplete!\");\n  611 |         }\n  612 | \n  613 | \tcount_languages_and_territories ();\n  614 | }","lines":22}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"pixbuf_draw_gradient() vertical branch fills each pixel one channel at a time with a triple-nested loop (height x width x n_channels), writing byte-by-byte. This is far slower than building one source row pattern and memcpy-ing, or precomputing the per-row color. The horizontal branch already uses memcpy; the vertical branch should too.","fix":"Precompute a single row of width*n_channels bytes for each row's color (the color is constant across a row in the vertical gradient) and memset/memcpy it, instead of the per-channel inner loop.","locations":[{"ref":"libmate-desktop/mate-bg.c:2649-2670","code":" 2649 | \t} else {\n 2650 | \t\tguchar *gb, *gradient;\n 2651 | \t\tint i;\n 2652 | \n 2653 | \t\tgradient = create_gradient (primary, secondary, height);\n 2654 | \t\tfor (i = 0; i < height; i++) {\n 2655 | \t\t\tint j;\n 2656 | \t\t\tguchar *d;\n 2657 | \n 2658 | \t\t\td = dst + rowstride * i;\n 2659 | \t\t\tgb = gradient + n_channels * i;\n 2660 | \t\t\tfor (j = width; j > 0; j--) {\n 2661 | \t\t\t\tint k;\n 2662 | \n 2663 | \t\t\t\tfor (k = 0; k < n_channels; k++) {\n 2664 | \t\t\t\t\t*(d++) = gb[k];\n 2665 | \t\t\t\t}\n 2666 | \t\t\t}\n 2667 | \t\t}\n 2668 | \n 2669 | \t\tg_free (gradient);\n 2670 | \t}","lines":22}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"The set() helper and insert paths use g_list_append on item->keys and section->keys, which is O(n) per append because GList must walk to the tail each time. For desktop files with many keys this makes loading/setting O(n^2). The parser (insert_key) correctly uses g_list_prepend then reverses, but the public set() path (line 1022, 1043) appends.","fix":"Maintain a tail pointer or use g_list_prepend with a final reverse, or use GQueue, to avoid O(n) appends.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:1014-1061","code":" 1014 | static void\n 1015 | set (MateDesktopItem *item, const char *key, const char *value)\n 1016 | {\n 1017 | \tSection *sec = section_from_key (item, key);\n 1018 | \n 1019 | \tif (sec != NULL) {\n 1020 | \t\tif (value != NULL) {\n 1021 | \t\t\tif (g_hash_table_lookup (item->main_hash, key) == NULL)\n 1022 | \t\t\t\tsec->keys = g_list_append\n 1023 | \t\t\t\t\t(sec->keys,\n 1024 | \t\t\t\t\t g_strdup (key_basename (key)));\n 1025 | \n 1026 | \t\t\tg_hash_table_replace (item->main_hash,\n 1027 | \t\t\t\t\t      g_strdup (key),\n 1028 | \t\t\t\t\t      g_strdup (value));\n 1029 | \t\t} else {\n tput_get_size_inches    (MateRROutput         *output);","lines":1}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"get_current_slide() maintains an int i (i=0; i++ in the loop) that is never used for anything; it is incremented but never read. Likewise mate_bg_get_pixmap_size has trailing dead code: after the if(!bg->filename) block the function just returns, and the switch on color_type for the non-filename gradient case does nothing (falls through to break).","fix":"Remove the unused i counter in get_current_slide. Simplify mate_bg_get_pixmap_size.","locations":[{"ref":"libmate-desktop/mate-bg.c:1727-1744","code":" 1727 | \tint i;\n 1728 | \n 1729 | \tif (delta < 0)\n 1730 | \t\tdelta += show->total_duration;\n 1731 | \n 1732 | \telapsed = 0;\n 1733 | \ti = 0;\n 1734 | \tfor (list = show->slides->head; list != NULL; list = list->next) {\n 1735 | \t\tSlide *slide = list->data;\n 1736 | \n 1737 | \t\tif (elapsed + slide->duration > delta) {\n 1738 | \t\t\tif (alpha)\n 1739 | \t\t\t\t*alpha = (delta - elapsed) / (double)slide->duration;\n 1740 | \t\t\treturn slide;\n 1741 | \t\t}\n 1742 | \n 1743 | \t\ti++;\n 1744 | \t\telapsed += slide->duration;","lines":18},{"ref":"libmate-desktop/mate-bg.c:1103-1109","code":" 1103 | \t\tcase MATE_BG_COLOR_H_GRADIENT:\n 1104 | \t\tcase MATE_BG_COLOR_V_GRADIENT:\n 1105 | \t\t\tbreak;\n 1106 | \t\t}\n 1107 | \n 1108 | \t\treturn;\n 1109 | \t}","lines":7}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"scale_thumbnail() declares GdkDisplay *display and assigns it from gdk_screen_get_display(screen), then in the X11 check re-calls gdk_screen_get_display(screen) instead of reusing display. The local 'display' is only used in the Wayland branch. Minor redundant call.","fix":"Reuse the already-fetched display variable in the GDK_IS_X11_DISPLAY check.","locations":[{"ref":"libmate-desktop/mate-bg.c:2142-2145","code":" 2142 | \t\tdisplay = gdk_screen_get_display (screen);\n 2143 | \n 2144 | \t\t/*Since we can use this in wayland, only use x11 specific code when in x11*/\n 2145 | \t\tif (GDK_IS_X11_DISPLAY (gdk_screen_get_display (screen)))","lines":4}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"mate_color_selection_finalize() only chains up to the parent finalize and does nothing else; it is an empty override. Similarly mate_hsv_destroy() only chains up. These add no behavior.","fix":"Remove the empty override and the class_init assignment, letting the parent class handle it directly.","locations":[{"ref":"libmate-desktop/mate-colorsel.c:501-505","code":"  501 | static void\n  502 | mate_color_selection_finalize (GObject *object)\n  503 | {\n  504 |   G_OBJECT_CLASS (mate_color_selection_parent_class)->finalize (object);\n  505 | }","lines":5},{"ref":"libmate-desktop/mate-hsv.c:226-230","code":"  226 | static void\n  227 | mate_hsv_destroy (GtkWidget *widget)\n  228 | {\n  229 |   GTK_WIDGET_CLASS (mate_hsv_parent_class)->destroy (widget);\n  230 | }","lines":5}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Commented-out call left in the dialog init: '//_gtk_dialog_set_ignore_separator (dialog, TRUE);'. Dead code referencing a private GTK function that no longer exists.","fix":"Delete the commented-out line.","locations":[{"ref":"libmate-desktop/mate-colorseldialog.c:184","code":"  184 |   //_gtk_dialog_set_ignore_separator (dialog, TRUE);","lines":1}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In readbuf_getc the branch `if (rb->stream == NULL) bytes_read = 0;` handles a NULL stream (string-backed ReadBuf), but for string-backed buffers rb->size is preset to the full length and rb->pos starts at 0, so this read path is only reached after the string is fully consumed, where it correctly yields EOF. The branch is reachable but the `rb->size != 0` -> past_first_read handling immediately below it is effectively never exercised for string buffers; the interplay is confusing and partially dead for the string case.","fix":"Document or simplify the string-backed vs stream-backed read paths; consider separating them.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:143-166","code":"  143 | \tif (rb->size == 0 ||\n  144 | \t    rb->pos == rb->size) {\n  145 | \t\tgssize bytes_read;\n  146 | \n  147 | \t\tif (rb->stream == NULL)\n  148 | \t\t\tbytes_read = 0;\n  149 | \t\telse\n  150 | \t\t\tbytes_read = g_input_stream_read (G_INPUT_STREAM (rb->stream),\n  151 | \t\t\t\t\t\t\t  rb->buf,\n  152 | \t\t\t\t\t\t\t  READ_BUF_SIZE,\n  153 | \t\t\t\t\t\t\t  NULL, NULL);\n  154 | \n  155 | \t\t/* FIXME: handle errors other than EOF */\n  156 | \t\tif (bytes_read <= 0) {\n  157 | \t\t\trb->eof = TRUE;\n  158 | \t\t\treturn EOF;\n  159 | \t\t}\n  160 | \n  161 | \t\tif (rb->size != 0)\n  162 | \t\t\trb->past_first_read = TRUE;\n  163 | \t\trb->size = bytes_read;\n  164 | \t\trb->pos = 0;\n  165 | \n  166 | \t}","lines":24}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In mate_rr_config_load_filename() the parameter filename is validated non-NULL via g_return_val_if_fail(filename != NULL, ...) at line 674, making the subsequent if (filename == NULL) filename = mate_rr_config_get_intended_filename(); at lines 677-678 unreachable dead code (and it would leak the returned string anyway, since it is never freed).","fix":"Remove the dead NULL-fallback block (the g_return_val_if_fail already guarantees filename != NULL).","locations":[{"ref":"libmate-desktop/mate-rr-config.c:674-678","code":"  674 |     g_return_val_if_fail (filename != NULL, FALSE);\n  675 |     g_return_val_if_fail (error == NULL || *error == NULL, FALSE);\n  676 | \n  677 |     if (filename == NULL)\n  678 |       filename = mate_rr_config_get_intended_filename ();","lines":5}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"ensure_timeout()'s comment says 'G_MAXUINT means \"only one slide\"' and the code guards with if (timeout < G_MAXUINT). But timeout is a double computed from slide->duration (which for a single slide is set to G_MAXUINT). Comparing a double timeout to G_MAXUINT and then multiplying timeout*1000 for g_timeout_add_full can overflow the guint interval argument for large-but-finite durations, and the 'only one slide' sentinel relies on exact double equality with G_MAXUINT which is fragile.","fix":"Use an explicit boolean/sentinel for 'single slide / no transition' rather than overloading G_MAXUINT as a double, and clamp timeout*1000 to G_MAXUINT before passing to g_timeout_add_full.","locations":[{"ref":"libmate-desktop/mate-bg.c:2077-2092","code":" 2077 | static void\n 2078 | ensure_timeout (MateBG *bg,\n 2079 | \t\tSlide   *slide)\n 2080 | {\n 2081 | \tif (!bg->timeout_id) {\n 2082 | \t\tdouble timeout = get_slide_timeout (slide);\n 2083 | \n 2084 | \t\t/* G_MAXUINT means \"only one slide\" */\n 2085 | \t\tif (timeout < G_MAXUINT) {\n 2086 | \t\t\tbg->timeout_id = g_timeout_add_full (\n 2087 | \t\t\t\tG_PRIORITY_LOW,\n 2088 | \t\t\t\ttimeout * 1000, on_timeout, bg, NULL);\n 2089 | \t\t}\n 2090 | \n 2091 | \t}\n 2092 | }","lines":16}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The DetailedTiming struct comment \"Terminated by 0x0x0\" on the established[] field is a typo/leftover; established[24] is a fixed array of Timing, not zero-terminated in any meaningful sense by the decoder (decode_established_timings only writes the entries whose bit is set and frequency != 0, and relies on g_new0 zero-initialization). The \"0x0x0\" text is meaningless.","fix":"Reword to e.g. \"unused trailing entries are zero-initialized\" or remove the comment.","locations":[{"ref":"libmate-desktop/edid.h:162","code":"  162 | \tTiming established[24];\t/* Terminated by 0x0x0 */","lines":1}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment in startup_timeout says \"we'll use seconds for the timeout\" and then clamps min_timeout (a value in milliseconds, derived from STARTUP_TIMEOUT_LENGTH which is *1000) to a minimum of 1000, then divides by 1000 when calling g_timeout_add_seconds. The variable min_timeout mixes ms and the comparison `elapsed >= STARTUP_TIMEOUT_LENGTH` compares an elapsed value computed in ms-as-double against the ms macro, which is fine, but `MIN(min_timeout, STARTUP_TIMEOUT_LENGTH - elapsed)` mixes int and double and the surrounding comments/units are confusing and partly misleading about what unit min_timeout holds.","fix":"Clarify units in comments and keep min_timeout consistently in milliseconds, converting only at the g_timeout_add_seconds call.","locations":[{"ref":"libmate-desktop/mate-desktop-item.c:1567-1630","code":" 1567 | static gboolean\n 1568 | startup_timeout (void *data)\n 1569 | {\n 1570 | \tStartupTimeoutData *std = data;\n 1571 | \tGSList *tmp;\n 1572 | \tint min_timeout;\n 1573 | \n 1574 | \tmin_timeout = STARTUP_TIMEOUT_LENGTH;\n 1575 | \n 1576 | #if GLIB_CHECK_VERSION(2,61,2)\n 1577 | \tgint64 now = g_get_real_time ();\n 1578 | #else\n 1579 | \tGTimeVal now;\n 1580 | \tg_get_current_time (&now);\n 1581 | #endif\n 1582 | \n 1583 | \ttmp = std->contexts;\n 1584 | \twhile (tmp != NULL) {\n 1585 | \t\tSnLauncherContext *sn_context = tmp->data;\n 1586 | \t\tGSList *next = tmp->next;\n 1587 | \t\tdouble elapsed;\n 1588 | \n 1589 | #if GLIB_CHECK_VERSION(2,61,2)\n 1590 | \t\ttime_t tv_sec;\n 1591 | \t\tsuseconds_t tv_usec;\n 1592 | \t\tgint64 tv;\n 1593 | \n 1594 | \t\tsn_launcher_context_get_last_active_time (sn_context, &tv_sec, &tv_usec);\n 1595 | \t\ttv = (tv_sec * G_USEC_PER_SEC) + tv_usec;\n 1596 | \t\telapsed = (double) (now - tv) / 1000.0;\n 1597 | #else\n 1598 | \t\tlong tv_sec, tv_usec;\n 1599 | \n 1600 | \t\tsn_launcher_context_get_last_active_time (sn_context,\n 1601 | \t\t\t\t\t\t\t  &tv_sec, &tv_usec);\n 1602 | \n 1603 | \t\telapsed =\n 1604 | \t\t\t((((double)now.tv_sec - tv_sec) * G_USEC_PER_SEC +\n 1605 | \t\t\t  (now.tv_usec - tv_usec))) / 1000.0;\n 1606 | #endif\n 1607 | \n 1608 | \t\tif (elapsed >= STARTUP_TIMEOUT_LENGTH) {\n 1609 | \t\t\tstd->contexts = g_slist_remove (std->contexts,\n 1610 | \t\t\t\t\t\t\tsn_context);\n 1611 | \t\t\tsn_launcher_context_complete (sn_context);\n 1612 | \t\t\tsn_launcher_context_unref (sn_context);\n 1613 | \t\t} else {\n 1614 | \t\t\tmin_timeout = MIN (min_timeout, (STARTUP_TIMEOUT_LENGTH - elapsed));\n 1615 | \t\t}\n 1616 | \n 1617 | \t\ttmp = next;\n 1618 | \t}\n 1619 | \n 1620 | \t/* we'll use seconds for the timeout */\n 1621 | \tif (min_timeout < 1000)\n 1622 | \t\tmin_timeout = 1000;\n 1623 | \n 1624 | \tif (std->contexts == NULL) {\n 1625 | \t\tstd->timeout_id = 0;\n 1626 | \t} else {\n 1627 | \t\tstd->timeout_id = g_timeout_add_seconds (min_timeout / 1000,\n 1628 | \t\t\t\t\t\t\t startup_timeout,\n 1629 | \t\t\t\t\t\t\t std);\n 1630 | \t}","lines":64}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The hsv_to_rgb() achromatic branch sets *h=*v; *s=*v; *v=*v with the trailing comment '/* heh */'. The third assignment is a no-op and the comment is noise, not an explanation of intent.","fix":"Drop the redundant '*v = *v;' line and the '/* heh */' comment; just set *h = *s = *v (gray).","locations":[{"ref":"libmate-desktop/mate-hsv.c:351-356","code":"  351 |   if (*s == 0.0)\n  352 |     {\n  353 |       *h = *v;\n  354 |       *s = *v;\n  355 |       *v = *v; /* heh */\n  356 |     }","lines":6}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment for the regex/parse path states the locale grammar as [language[_country][.codeset][@modifier]], but the regex at lines 140-143 restricts territory to [[:upper:]]+ and codeset to [-_0-9a-zA-Z]+ while allowing any [[:ascii:]]+ modifier. Real glibc locale names can contain lowercase or digits in the territory portion in unusual cases; the doc comment does not reflect the stricter actual acceptance, which can cause valid-looking locales to be rejected with a g_warning.","fix":"Either relax the regex to match the documented grammar or update the comment to state the actual restrictions enforced.","locations":[{"ref":"libmate-desktop/mate-languages.c:113-116","code":"  113 |  * Extracts the various components of a locale string of the form\n  114 |  * [language[_country][.codeset][@modifier]]. See\n  115 |  * http://en.wikipedia.org/wiki/Locale.\n  116 |  *","lines":4},{"ref":"libmate-desktop/mate-languages.c:140-143","code":"  140 |                 re = g_regex_new (\"^(?P<language>[^_.@[:space:]]+)\"\n  141 |                                   \"(_(?P<territory>[[:upper:]]+))?\"\n  142 |                                   \"(\\\\.(?P<codeset>[-_0-9a-zA-Z]+))?\"\n  143 |                                   \"(@(?P<modifier>[[:ascii:]]+))?$\",","lines":4}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The block comment in make_palette() about hues and \"berries with cream\" is whimsical filler that does not document any non-obvious why; per the project guideline against decorative comments it adds noise. Minor, but the genuinely useful part (start at red, end at blue) could be one line.","fix":"Trim to a single terse line stating the hue range, or remove.","locations":[{"ref":"libmate-desktop/mate-rr-labeler.c:285-292","code":"  285 | \t/* The idea is that we go around an hue color wheel.  We want to start\n  286 | \t * at red, go around to green/etc. and stop at blue --- because magenta\n  287 | \t * is evil.  Eeeeek, no magenta, please!\n  288 | \t *\n  289 | \t * Purple would be nice, though.  Remember that we are watered down\
