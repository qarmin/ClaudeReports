<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`FunctionalGroupInfo.checked_modules` is declared, cleared in `clear()`, and read by the guard at line 261 ('check only one per-frame item'), but is never populated with `.add(...)` anywhere in the code. The guard therefore never fires, so every item of a multi-item Per-Frame Functional Groups Sequence re-runs the full macro validation. Combined with the `add_tag_errors` miscount above and the in-place mutation in `combined()`, this leads to repeated validation of the same macro and inconsistent error counts for multi-frame datasets.","fix":"Populate `self._func_group_info.checked_modules.add(module_name)` after a per-frame macro has been validated (e.g. in the `is_per_frame` branch of `_validate_module`), or remove the dead `checked_modules` field and its guard if single-item checking is not actually intended.","locations":[{"ref":"dicom_validator/validator/iod_validator.py:260-263","code":"  260 |         if group_macros is None:\n  261 |             if module_name in self._func_group_info.checked_modules:\n  262 |                 # check only one per-frame item\n  263 |                 return {}","lines":4},{"ref":"dicom_validator/validator/iod_validator.py:61-73","code":"   61 | @dataclass\n   62 | class FunctionalGroupInfo:\n   63 |     \"\"\"Contains information about the currently validated functional groups.\n   64 |     Contrary to other checks, we have to check both Shared and PerFrame functional\n   65 |     groups before being able to do the validation.\n   66 |     \"\"\"\n   67 | \n   68 |     shared_results: dict  # the result of the shared group validation\n   69 |     checked_modules: set  # the names of already validated macro modules\n   70 | \n   71 |     def clear(self) -> None:\n   72 |         self.shared_results.clear()\n   73 |         self.checked_modules.clear()","lines":13}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`add_tag_errors` updates the per-module error dict with `.update(tag_errors)` but then increments the running total by `len(tag_errors) - nr_module_errors`, where `nr_module_errors` is the count the module already had. When a module receives errors in two separate passes (e.g. a functional-group macro validated once in the Shared and once in the Per-Frame pass), the second call subtracts the previously counted errors instead of counting only the newly added keys. The increment can become zero or negative even though the merged dict grew, so `result.errors` (and thus the process exit code of `validate_iods`) under-counts and disagrees with the number of errors actually iterated by the handler.","fix":"Compute the delta from the dict size before and after the update: `before = len(self.module_errors.get(module_name, {})); self.module_errors.setdefault(module_name, {}).update(tag_errors); after = len(self.module_errors[module_name]); self.errors += after - before`.","locations":[{"ref":"dicom_validator/validator/validation_result.py:176-180","code":"  176 |     def add_tag_errors(self, module_name: str, tag_errors: TagErrors) -> None:\n  177 |         self.module_errors = self.module_errors or ModuleErrors()\n  178 |         nr_module_errors = len(self.module_errors.get(module_name, []))\n  179 |         self.module_errors.setdefault(module_name, {}).update(tag_errors)\n  180 |         self.errors += len(tag_errors) - nr_module_errors","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`print('\\n\"%s\" does not exist - skipping', dicom_path)` passes `dicom_path` as a second positional argument to `print` rather than applying `%`-formatting, so the literal text `\"%s\" does not exist - skipping` is printed followed by the raw path (and a stray space). The intended message is never produced.","fix":"Use an f-string or `%` operator: `print(f'\\n\"{dicom_path}\" does not exist - skipping')`.","locations":[{"ref":"dicom_validator/dump_dcm_info.py:189","code":"  189 |             print('\\n\"%s\" does not exist - skipping', dicom_path)","lines":1}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`FunctionalGroupInfo.combined` mutates its inputs in place: it `del`etes entries from `per_frame` and from `shared` (which is the same dict stored in `self.shared_results[module_name]`). Because the same shared-results dict is reused when more than one Per-Frame Functional Groups item is processed, a second per-frame item sees a partially-emptied shared result, producing different (and order-dependent) merged errors. This coupling is only safe today because `checked_modules` accidentally lets every item re-run, but it is fragile and order-sensitive.","fix":"Operate on copies (e.g. build a fresh `result` without mutating `shared`/`per_frame`, or copy them at entry) so `combined` is idempotent and independent of how many per-frame items are processed.","locations":[{"ref":"dicom_validator/validator/iod_validator.py:90-133","code":"   90 |         result = {}\n   91 |         shared = self.shared_results.get(module_name, {})\n   92 |         if not shared and not per_frame:\n   93 |             # the module is present in both shared and per-frame groups\n   94 |             # this is an error\n   95 |             return {\n   96 |                 seq_tag: TagError(\n   97 |                     code=ErrorCode.TagNotAllowed, scope=ErrorScope.BothFuncGroups\n   98 |                 )\n   99 |             }\n  100 |         for tag, error in shared.items():\n  101 |             # similar tags differ by the functional group parent tag\n  102 |             per_frame_tag = DicomTag(tag.tag, [0x5200_9230] + tag.parents[1:])\n  103 |             if per_frame.get(per_frame_tag) == error:\n  104 |                 # if the error appears in both sequences, it is real\n  105 |                 result[tag] = shared[tag]\n  106 |                 del per_frame[per_frame_tag]\n  107 |             elif error.code == ErrorCode.TagMissing:\n  108 |                 # for missing tags, we also have to check if the error does not appear\n  109 |                 # in the per-frame group because it is part of a missing sequence\n  110 |                 handled_tags = []\n  111 |                 for per_frame_tag in per_frame:\n  112 |                     if per_frame_tag.parents and tag.tag in per_frame_tag.parents[1:]:\n  113 |                         result[per_frame_tag] = per_frame[per_frame_tag]\n  114 |                         handled_tags.append(per_frame_tag)\n  115 |                 for handled_tag in handled_tags:\n  116 |                     del per_frame[handled_tag]\n  117 |             else:\n  118 |                 # other errors (unexpected tag, missing value) shall always remain\n  119 |                 result[tag] = shared[tag]\n  120 | \n  121 |         for tag, error in per_frame.items():\n  122 |             if error.code == ErrorCode.TagMissing:\n  123 |                 # same check as above\n  124 |                 handled_tags = []\n  125 |                 for shared_tag in shared:\n  126 |                     if shared_tag.parents and tag.tag in shared_tag.parents[1:]:\n  127 |                         result[shared_tag] = shared[shared_tag]\n  128 |                         handled_tags.append(shared_tag)\n  129 |                 for handled_tag in handled_tags:\n  130 |                     del shared[handled_tag]\n  131 |             else:\n  132 |                 result[tag] = per_frame[tag]\n  133 |         return result","lines":44}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"When `dcmread` raises `InvalidDicomError`, the returned `ValidationResult` is created with the default `errors=0`. `validate_iods.validate()` returns the sum of `result.errors` as the process exit code, so an unreadable / non-DICOM file yields exit code 0 (success). This is inconsistent with the missing-file path in `validate()`, which correctly sets `errors=1`, and makes the tool report success in CI for corrupt input.","fix":"Set `errors=1` on the `InvalidFile` result, e.g. `ValidationResult(file_path=file_path, status=Status.InvalidFile, errors=1)`, matching the `MissingFile` handling.","locations":[{"ref":"dicom_validator/validator/dicom_file_validator.py:118-124","code":"  118 | \n  119 |         except InvalidDicomError:\n  120 |             result = ValidationResult(file_path=file_path, status=Status.InvalidFile)\n  121 |             self.handle_error(result)\n  122 |             return {\n  123 |                 file_path: result,\n  124 |             }","lines":7},{"ref":"dicom_validator/validate_iods.py:30-35","code":"   30 |     error_nr = 0\n   31 |     for dicom_path in args.dicomfiles:\n   32 |         error_nr += sum(\n   33 |             result.errors for result in list(validator.validate(dicom_path).values())\n   34 |         )\n   35 |     return int(error_nr)","lines":6}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Both `update_edition` and `get_chapter` catch `BaseException`, which also swallows `KeyboardInterrupt` and `SystemExit`. A user pressing Ctrl-C during a slow spec download would have the interrupt silently turned into a logged warning/error instead of aborting the program.","fix":"Catch `Exception` (or the specific network/OS errors expected from `urlretrieve`) instead of `BaseException`.","locations":[{"ref":"dicom_validator/spec_reader/edition_reader.py:137-138","code":"  137 |         except BaseException as exception:\n  138 |             self.logger.warning(\"Failed to get DICOM editions: %s\", str(exception))","lines":2},{"ref":"dicom_validator/spec_reader/edition_reader.py:317-318","code":"  317 |         except BaseException as exception:\n  318 |             self.logger.error(f\"Failed to download {url}: {exception}\")","lines":2}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`HtmlErrorHandler.url_exists` opens an `HTTPSConnection` and never closes it; it is leaked on every call (and `valid_url_for_ref` may call it repeatedly while walking up a section reference). Each leaked connection holds an open socket until garbage-collected.","fix":"Wrap the connection in `with closing(HTTPSConnection(p.netloc)) as conn:` (or call `conn.close()` in a `finally`) so the socket is released on all paths.","locations":[{"ref":"dicom_validator/validator/html_error_handler.py:60-66","code":"   60 |         p = urlparse(url)\n   61 |         conn = HTTPSConnection(p.netloc)\n   62 |         try:\n   63 |             conn.request(\"HEAD\", p.path)\n   64 |         except Exception:\n   65 |             return False\n   66 |         return conn.getresponse().status < 400","lines":7}]},{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`parse_variable_list` calls `self.enum_values_regex.match(title.text)` after only checking that the `<title>` element exists, not that it has text. A `<title/>` element with no text yields `title.text is None`, and `re.match(None)` raises `TypeError`, aborting JSON generation for that edition.","fix":"Guard against empty titles: `if title is None or not title.text: return {}` before running the regexes.","locations":[{"ref":"dicom_validator/spec_reader/enum_parser.py:89-95","code":"   89 |         title = var_list.find(self.docbook_ns + \"title\")\n   90 |         if title is None:\n   91 |             return {}\n   92 |         index = 0\n   93 |         match = self.enum_values_regex.match(title.text)\n   94 |         if not match:\n   95 |             value_match = self.enum_with_value_regex.match(title.text)","lines":7}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"`condition_grammar.py` imports `ParseResult` from `urllib.parse` (a URL-parsing namedtuple) and uses it as the parameter type annotation for `_condition_from_condition_expression` and `_condition_from_tag_expression`, which actually receive a pyparsing `ParseResults`. The annotation is misleading and the import is the wrong symbol entirely.","fix":"Remove the `from urllib.parse import ParseResult` import and annotate the parameters with pyparsing's `ParseResults`.","locations":[{"ref":"dicom_validator/spec_reader/condition_grammar.py:3","code":"    3 | from urllib.parse import ParseResult","lines":1},{"ref":"dicom_validator/spec_reader/condition_grammar.py:208","code":"  208 |     def _condition_from_condition_expression(self, result: ParseResult) -> Condition:","lines":1},{"ref":"dicom_validator/spec_reader/condition_grammar.py:224","code":"  224 |     def _condition_from_tag_expression(self, result: ParseResult) -> Condition:","lines":1}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"`parse_linked_variablelists` is annotated `-> list[dict]` and returns a list of enum dicts, but its docstring's Returns section claims it returns a `dict` ('Parsed enumerated values dictionary ... or empty dict if none found').","fix":"Update the Returns section to describe a `list[dict]` (list of enumerated-value dictionaries, or empty list if none found).","locations":[{"ref":"dicom_validator/spec_reader/enum_parser.py:125-139","code":"  125 |     def parse_linked_variablelists(self, node) -> list[dict]:\n  126 |         \"\"\"Follow `xref` links to a section containing enumerated values.\n  127 | \n  128 |         Parameters\n  129 |         ----------\n  130 |         node : Element\n  131 |             DocBook element whose paragraph may contain `xref` pointers to\n  132 |             a section with a `variablelist` of enumerated values.\n  133 | \n  134 |         Returns\n  135 |         -------\n  136 |         dict\n  137 |             Parsed enumerated values dictionary as returned by\n  138 |             `parse_variable_list`, or empty dict if none found.\n  139 |         \"\"\"","lines":15}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"`Part6Reader.sop_class_uid` looks up a SOP Class UID from its name (it iterates names and returns the matching UID), but its docstring says it returns 'the name of SOP Class corresponding to the given UID' - a copy-paste of the `sop_class_name` docstring describing the opposite operation.","fix":"Change the docstring to 'Return the SOP Class UID corresponding to the given SOP Class name.'","locations":[{"ref":"dicom_validator/spec_reader/part6_reader.py:92-97","code":"   92 |     def sop_class_uid(self, sop_class_name: str) -> str | None:\n   93 |         \"\"\"Return the name of SOP Class corresponding to the given UID.\"\"\"\n   94 |         for uid, name in self.sop_class_uids().items():\n   95 |             if name == sop_class_name:\n   96 |                 return uid\n   97 |         return None","lines":6}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`Part6Reader`'s class docstring says 'Reads information from PS3.4 in docbook format', but this reader parses PS3.6 (the DICOM Data Element / UID registry), as correctly stated in the module-level docstring.","fix":"Change the class docstring to 'Reads information from PS3.6 in docbook format.'","locations":[{"ref":"dicom_validator/spec_reader/part6_reader.py:12-13","code":"   12 | class Part6Reader(SpecReader):\n   13 |     \"\"\"Reads information from PS3.4 in docbook format.\"\"\"","lines":2}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"medium","easy":false,"description":"`iod_validator.py` (776 lines) concentrates several distinct responsibilities in one class with very dense control flow: module-presence heuristics, condition evaluation, functional-group shared/per-frame reconciliation, sequence descent, and VR/enum value checking. `_validate_module` alone is ~110 lines with deeply nested special cases for functional groups, making the shared/per-frame logic (the source of the `checked_modules`/`combined` defects above) hard to reason about and test in isolation.","fix":"Extract the functional-group reconciliation (shared/per-frame handling, `FunctionalGroupInfo`) into its own collaborator and split `_validate_module` into smaller methods (presence test, condition test, func-group dispatch), so each branch can be unit-tested and the state flow is explicit.","locations":[{"ref":"dicom_validator/validator/iod_validator.py:221-330","code":"  221 |     def _validate_module(\n  222 |         self,\n  223 |         module: dict[str, dict | str],\n  224 |         module_name: str,\n  225 |         maybe_existing_modules: dict[str, set[DicomTag]],\n  226 |         group_macros: dict[str, dict[str, dict]] | None = None,\n  227 |     ) -> TagErrors:\n  228 |         \"\"\"Validate the given module.\n  229 | \n  230 |         Parameters\n  231 |         ----------\n  232 |         module : dict[str, dict]\n  233 |             Contains the module reference chapter (\"ref\"), the usage (\"use\"),\n  234 |             and optionally the usage condition as a dictionary (see `Condition`).\n  235 |         module_name : str\n  236 |             The module name as listed in the standard.\n  237 |         maybe_existing_modules : dict[str, set[DicomTag]]\n  238 |             List of module references with contained tags that may be present\n  239 |             in the dataset. Due to the fact that the same tag may belong to\n  240 |             different modules, the presence of the module is only guessed at this point,\n  241 |             and  280 |         elif condition:\n  281 |             required, allowed = self._object_is_required_or_allowed(condition)\n  282 |         else:\n  283 |             required = False\n  284 | \n  285 |         if required:\n  286 |             # Always validate required modules.\n  287 |             # If the module is missing from the dataset the validation\n  288 |             # should report it as an error.\n  289 |             result = self._validate_attributes(module_info, False)\n  290 |             if group_macros is not None:\n  291 |                 return result\n  292 | \n  293 |             # for functional groups, we need to check both shared and per-frame groups\n  294 |             # to get a result; a required module should be in only one of these\n  295 |             if is_shared:\n  296 |                 # just save the result to check together with per-frame groups\n  297 |                 self._func_group_info.shared_results[module_name] = result\n  298 |                 return {}\n  299 |             if is_per_frame:\n  300 |                 shared_result = self._func_group_info.shared_results.get(module_name)\n  301 |                 if shared_result is not None:\n  302 |                     seq_tag = self._tag_id(list(module_info.keys())[0])\n  303 |                     return self._func_group_info.combined(module_name, seq_tag, result)\n  304 |                 return result\n  305 | \n  306 |         if module[\"ref\"] not in maybe_existing_modules:\n  307 |             # The module is not present at all in the dataset.\n  308 |             # No validation is needed.\n  309 |             return {}\n  310 | \n  311 |         # At this point the module is __not required__ but it __may be existing__\n  312 |         # in the dataset.\n  313 |         # Just \"maybe\" because multiple modules may have overlapping attributes.\n  314 |         # So, let's see if it exists \"strongly\" enough to be considered\n  315 |         # for further checks.\n  316 |         if maybe_existing_modules and not self._does_module_strongly_exist(\n  317 |             cast(str, module[\"ref\"]), maybe_existing_modules\n  318 |         ):\n  319 |             return {}\n  320 | \n  321 |         if not allowed:\n  322 |             # no special case for functional groups here\n  323 |             errors = {}\n  324 |             for tag_id_string in module_info:\n  325 |                 tag_id = self._tag_id(tag_id_string)\n  326 |                 if tag_id.tag in self._dataset_stack[-1].dataset:\n  327 |                     errors[tag_id] = TagError(code=ErrorCode.TagNotAllowed, scope=scope)\n  328 |                     self._dataset_stack[-1].unexpected_tags.discard(tag_id)\n  329 |             return errors\n  330 |         return self._validate_attributes(module_info, False)","lines":110},{"ref":"dicom_validator/validator/iod_validator.py:340-403","code":"  340 |     def _validate_attributes(\n  341 |         self, attributes: dict, report_unexpected_tags: bool\n  342 |     ) -> TagErrors:\n  343 |         \"\"\"Validate the given attributes according to their type.\n  344 |         Parameters\n  345 |         ----------\n  346 |         attributes : dict\n  347 |             The attributes of a single module to be validated.\n  348 |         report_unexpected_tags : bool\n  349 |             If True, tags that are not expected are reported and placed into\n  350 |             the `errors` dictionary.\n  351 | \n  352 |         Returns\n  353 |         -------\n  354 |         The dictionary of found errors.\n  355 |         \"\"\"\n  356 |         errors = TagErrors()\n  357 |         for tag_id_string, attribute in attributes.items():\n  358 |             if tag_id_string == \"modules\":\n  359 |                 self._validate_func_group_modules(attribute)\n  360 |             else:\n  361 |                 tag_id = self._tag_id(tag_id_string)\n  362 |                 if (\n  363 |                     tag_error := self._validate_attribute(tag_id, attribute)\n  364 |                 ) is not None:\n  365 |                     errors[tag_id] = tag_error\n  366 |                 self._dataset_stack[-1].unexpected_tags.discard(tag_id)\n  367 | \n  368 |                 if \"items\" in attribute:\n  369 |                     data_elem = self._dataset_stack[-1].dataset.get_item(tag_id.tag)\n  370 |                     if data_elem is None:\n  371 |                         continue\n  372 |                     if data_elem.VR != \"SQ\":\n  373 |                         raise RuntimeError(f\"Not a sequence: {data_elem}\")\n  374 |                     for sq_item_dataset in data_elem.value:\n  375 |                         self._dataset_stack.append(\n  376 |                             DatasetStackItem(\n  377 |                                 sq_item_dataset,\n  378 |                                 tag_id.tag,\n  379 |                                 self._dataset_stack[-1].stack,\n  380 |                                 self._dataset_stack[-1].in_func_group,\n  381 |                             )\n  382 |                         )\n  383 |                         # the item attributes are only created at this point,\n  384 |                         # where we have descended into the related sequence item level\n  385 |                         item_attribute = attribute[\"items\"]\n  386 |                         if \"group_macros\" in item_attribute:\n  387 |                             group_macros = item_attribute[\"group_macros\"]\n  388 |                             items = item_attribute[\"items\"]\n  389 |                         else:\n  390 |                             group_macros = None\n  391 |                             items = item_attribute\n  392 |                         item_attributes = self._expanded_module_info(\n  393 |                             items,\n  394 |                             group_macros,\n  395 |                             expand_items=True,\n  396 |                         )\n  397 |                         errors.update(self._validate_attributes(item_attributes, True))\n  398 |                         self._dataset_stack.pop()\n  399 | \n  400 |         if report_unexpected_tags:\n  401 |             errors.update(self._unexpected_tag_errors())\n  402 | \n  403 |         return errors","lines":64}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`_tag_id_from_id_and_name` resolves a tag-name-only expression by linearly scanning the entire `dict_info` (thousands of data elements) and then `uid_dict_info` on each call. During JSON generation this runs for every condition that references a tag by name, making spec parsing slower than necessary.","fix":"Build a name->tag_id reverse lookup dict once in `ConditionGrammar.__init__` and use it here instead of scanning `dict_info`/`uid_dict_info` per call.","locations":[{"ref":"dicom_validator/spec_reader/condition_grammar.py:510-518","code":"  510 |         if not tag_id:\n  511 |             # tag name only - look it up\n  512 |             for tag_id, entry in self.dict_info.items():\n  513 |                 if entry[\"name\"] == tag_name:\n  514 |                     return tag_id\n  515 |             for tag_id, entry in self.uid_dict_info.items():\n  516 |                 if entry[\"name\"] == tag_name:\n  517 |                     return tag_id\n  518 |             return None","lines":9}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In `_does_module_strongly_exist`, `tags_only_in_a = a_tags - (a_tags & b_tags)` is mathematically identical to the simpler `a_tags - b_tags`; the intersection is computed only to be subtracted away again.","fix":"Simplify to `tags_only_in_a = a_tags - b_tags`.","locations":[{"ref":"dicom_validator/validator/iod_validator.py:627","code":"  627 |             tags_only_in_a = a_tags - (a_tags & b_tags)","lines":1}]}]</script>

<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
