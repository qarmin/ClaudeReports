<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"NULL pointer dereference in the HTTP/3 proxy header callback. When a regular (non-pseudo) header arrives before the `:status` pseudo-header, `proxy_ctx->tunnel.resp` is still NULL (it is only allocated in the `NGHTTP3_QPACK_TOKEN__STATUS` branch), yet the else-branch dereferences `proxy_ctx->tunnel.resp->headers` to call Curl_dynhds_add(). A misbehaving or malicious proxy can emit a normal header field first, crashing the client. The equivalent HTTP/2 proxy callback (cf-h2-proxy.c proxy_h2_on_header) guards this with `if(!ctx->tunnel.resp) return NGHTTP2_ERR_CALLBACK_FAILURE;` just before the Curl_dynhds_add() call; the HTTP/3 version is missing this check (copy/paste divergence).","fix":"Before the Curl_dynhds_add() in the else-branch, add a guard mirroring the h2 code: `if(!proxy_ctx->tunnel.resp) return NGHTTP3_ERR_CALLBACK_FAILURE;`.","locations":[{"ref":"lib/cf-h3-proxy.c:883-892","code":"  883 |   else {\n  884 |     /* store as an HTTP1-style header */\n  885 |     CURL_TRC_CF(data, cf, \"[%\" PRId64 \"] header: %.*s: %.*s\", stream_id,\n  886 |                 (int)h3name.len, h3name.base, (int)h3val.len, h3val.base);\n  887 |     result = Curl_dynhds_add(&proxy_ctx->tunnel.resp->headers,\n  888 |                              (const char *)h3name.base, h3name.len,\n  889 |                              (const char *)h3val.base, h3val.len);\n  890 |     if(result) {\n  891 |       return NGHTTP3_ERR_CALLBACK_FAILURE;\n  892 |     }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"NULL pointer dereference in FormAdd() for the CURLFORM_FILENAME / CURLFORM_BUFFER options. Unlike every other option handler (e.g. CURLFORM_COPYNAME, CURLFORM_FILE, CURLFORM_CONTENTTYPE) which first checks `if(avalue) ... else retval = CURL_FORMADD_NULL;`, this branch unconditionally calls `Curl_bufref_memdup0(&curr->showfilename, avalue, strlen(avalue))`. The `strlen(avalue)` argument is evaluated by the caller before the function runs, so passing a NULL value for CURLFORM_FILENAME/CURLFORM_BUFFER (an attacker- or caller-supplied bad combo) dereferences NULL and crashes. The other handlers in this very function guard against NULL.","fix":"Guard avalue before use, matching the other cases:\n  avalue = form_ptr_arg(char *);\n  if(!avalue)\n    retval = CURL_FORMADD_NULL;\n  else if(Curl_bufref_ptr(&curr->showfilename))\n    retval = CURL_FORMADD_OPTION_TWICE;\n  else if(Curl_bufref_memdup0(&curr->showfilename, avalue, strlen(avalue)))\n    retval = CURL_FORMADD_MEMORY;","locations":[{"ref":"lib/formdata.c:553-560","code":"  553 |     case CURLFORM_FILENAME:\n  554 |     case CURLFORM_BUFFER:\n  555 |       avalue = form_ptr_arg(char *);\n  556 |       if(Curl_bufref_ptr(&curr->showfilename))\n  557 |         retval = CURL_FORMADD_OPTION_TWICE;\n  558 |       else if(Curl_bufref_memdup0(&curr->showfilename, avalue, strlen(avalue)))\n  559 |         retval = CURL_FORMADD_MEMORY;\n  560 |       break;"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"In the HTTP/2 on_frame_recv() SETTINGS handler, `data` (obtained from CF_DATA_CURRENT(cf)) is treated as possibly NULL: the surrounding code guards uses with `if(data && ...)` (line 1192) and `if(data)` (line 1212). However, `CURL_REQ_WANT_SEND(data)` at line 1203 dereferences `data` unconditionally (it expands to `(data)->req.io_flags & REQ_IO_SEND`). If a connection-level SETTINGS frame arrives while no current easy handle is associated (the very case the other guards protect against), this is a NULL pointer dereference in release builds (only a DEBUGASSERT guards it).","fix":"Guard the unhold logic with the same NULL check, e.g. `if(data && CURL_REQ_WANT_SEND(data)) Curl_multi_mark_dirty(data);`.","locations":[{"ref":"lib/http2.c:1192-1204","code":" 1192 |         if(data && max_conn != ctx->max_concurrent_streams) {\n 1193 |           /* only signal change if the value actually changed */\n 1194 |           CURL_TRC_CF(data, cf, \"[0] notify MAX_CONCURRENT_STREAMS: %u\",\n 1195 |                       ctx->max_concurrent_streams);\n 1196 |           Curl_multi_connchanged(data->multi);\n 1197 |         }\n 1198 |         /* Since the initial stream window is 64K, a request might be on HOLD,\n 1199 |          * due to exhaustion. The (initial) SETTINGS may announce a much larger\n 1200 |          * window and *assume* that we treat this like a WINDOW_UPDATE. Some\n 1201 |          * servers send an explicit WINDOW_UPDATE, but not all seem to do that.\n 1202 |          * To be safe, we UNHOLD a stream in order not to stall. */\n 1203 |         if(CURL_REQ_WANT_SEND(data))\n 1204 |           Curl_multi_mark_dirty(data);"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"In mbed_configure_ssl() the ALPN protocols are copied into the fixed array `const char *protocols[3]` (struct member) with `for(i = 0; i < connssl->alpn->count; ++i) backend->protocols[i] = ...`. ALPN_ENTRIES_MAX is 3, so `count` can be 3, filling protocols[0..2] and leaving no NULL terminator. mbedtls_ssl_conf_alpn_protocols() requires a NULL-terminated list and will read past the array (OOB read / use of garbage pointer). With the common count of 2 it happens to work because protocols[2] stays NULL, masking the bug.","fix":"Size the array to ALPN_ENTRIES_MAX + 1 and ensure protocols[count] is set to NULL after the loop (the struct is zero-initialized, but only if the array is large enough to hold the terminator).","locations":[{"ref":"lib/vtls/mbedtls.c:87","code":"   87 |   const char *protocols[3];"},{"ref":"lib/vtls/mbedtls.c:952-965","code":"  952 |   if(connssl->alpn) {\n  953 |     struct alpn_proto_buf proto;\n  954 |     size_t i;\n  955 | \n  956 |     for(i = 0; i < connssl->alpn->count; ++i) {\n  957 |       backend->protocols[i] = connssl->alpn->entries[i];\n  958 |     }\n  959 |     /* this function does not clone the protocols array, which is why we need\n  960 |        to keep it around */\n  961 |     if(mbedtls_ssl_conf_alpn_protocols(&backend->config,\n  962 |                                        &backend->protocols[0])) {\n  963 |       failf(data, \"Failed setting ALPN protocols\");\n  964 |       return CURLE_SSL_CONNECT_ERROR;\n  965 |     }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","description":"In file_do(), `xfer_buf` is declared without initialization. If\nCurl_multi_xfer_buf_borrow() fails it returns early via `goto out`, where\nCurl_multi_xfer_buf_release(data, xfer_buf) is called with the uninitialized\npointer. Curl_multi_xfer_buf_release ignores the buffer value at runtime, but\nit contains a DEBUGASSERT(!buf || data->multi->xfer_buf == buf) that\ndereferences/compares the uninitialized pointer, which can fire a spurious\nassertion in debug builds. (Note: borrow sets *pbuf = NULL on the no-multi /\nbuffer-size-0 paths but returns CURLE_OUT_OF_MEMORY without touching *pbuf only\nafter already setting it to NULL at the top, so in practice xfer_buf is NULL on\nall current failure paths — but relying on that is fragile.)","fix":"Initialize `char *xfer_buf = NULL;` at declaration so the release path is well-defined regardless of how borrow fails.","locations":[{"ref":"lib/file.c:400-401","code":"  400 |   char *xfer_buf;\n  401 |   size_t xfer_blen;"},{"ref":"lib/file.c:529-531","code":"  529 |   result = Curl_multi_xfer_buf_borrow(data, &xfer_buf, &xfer_blen);\n  530 |   if(result)\n  531 |     goto out;"},{"ref":"lib/file.c:598-600","code":"  598 | out:\n  599 |   Curl_multi_xfer_buf_release(data, xfer_buf);\n  600 |   return result;"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","description":"ftp_state_size_resp() parses the SIZE reply. With ftpcode==213 it does\n`memchr(start, '\\r', len - 4)` where len = ftpc->pp.nfinal and start =\n&buf[4]. If a malformed/truncated cached response made nfinal < 4 this would\nunderflow to a huge length and read out of bounds. In practice ftp_endofresp\nguarantees a LASTLINE (>=4 chars + code) before this state is reached, so\nnfinal >= 6, but there is no defensive check here and the value flows directly\nfrom server-controlled framing.","fix":"Guard with `if(len > 4)` before computing `len - 4` and calling memchr, falling back to start otherwise.","locations":[{"ref":"lib/ftp.c:2662-2682","code":" 2662 |   const char *buf = curlx_dyn_ptr(&ftpc->pp.recvbuf);\n 2663 |   size_t len = ftpc->pp.nfinal;\n 2664 | \n 2665 |   /* get the size from the ascii string: */\n 2666 |   if(ftpcode == 213) {\n 2667 |     /* To allow servers to prepend \"rubbish\" in the response string, we scan\n 2668 |        for all the digits at the end of the response and parse only those as a\n 2669 |        number. */\n 2670 |     const char *start = &buf[4];\n 2671 |     const char *fdigit = memchr(start, '\\r', len - 4);\n 2672 |     if(fdigit) {\n 2673 |       fdigit--;\n 2674 |       if(*fdigit == '\\n')\n 2675 |         fdigit--;\n 2676 |       while(ISDIGIT(fdigit[-1]) && (fdigit > start))\n 2677 |         fdigit--;\n 2678 |     }\n 2679 |     else\n 2680 |       fdigit = start;\n 2681 |     if(curlx_str_number(&fdigit, &filesize, CURL_OFF_T_MAX))\n 2682 |       filesize = -1; /* size remain unknown */"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"curl_easy_nextheader() (public headers API) dereferences the handle without a NULL check: `struct Curl_easy *data = curl;` is immediately followed by `if(request > data->state.requests)`. The sibling public API curl_easy_header() explicitly validates `!data` and returns CURLHE_BAD_ARGUMENT. Passing a NULL handle to curl_easy_nextheader() crashes instead of failing gracefully, an inconsistency in input validation between the two paired functions.","fix":"Add `if(!data) return NULL;` at the start of curl_easy_nextheader(), matching the NULL handling in curl_easy_header().","locations":[{"ref":"lib/headers.c:126-136","code":"  126 |   struct Curl_easy *data = curl;\n  127 |   struct Curl_llist_node *pick;\n  128 |   struct Curl_llist_node *e;\n  129 |   struct Curl_header_store *hs;\n  130 |   size_t amount = 0;\n  131 |   size_t index = 0;\n  132 | \n  133 |   if(request > data->state.requests)\n  134 |     return NULL;\n  135 |   if(request == -1)\n  136 |     request = data->state.requests;"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"schannel_get_internals() unconditionally returns &backend->ctxt->ctxt_handle. If it is ever called before the security context has been created (backend->ctxt == NULL, e.g. on a failed/early connection), this dereferences a NULL pointer. The other backends' get_internals return a directly embedded handle and cannot NULL-deref the same way, making schannel inconsistent.","fix":"Return NULL when backend->ctxt is NULL, e.g. `return backend->ctxt ? &backend->ctxt->ctxt_handle : NULL;`.","locations":[{"ref":"lib/vtls/schannel.c:2718-2726","code":" 2718 | static void *schannel_get_internals(struct ssl_connect_data *connssl,\n 2719 |                                     CURLINFO info)\n 2720 | {\n 2721 |   struct schannel_ssl_backend_data *backend =\n 2722 |     (struct schannel_ssl_backend_data *)connssl->backend;\n 2723 |   (void)info;\n 2724 |   DEBUGASSERT(backend);\n 2725 |   return &backend->ctxt->ctxt_handle;\n 2726 | }"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"The session-cache lock (scache->is_locked plus the share lock) is only taken when CURL_SHARE_ssl_scache(data) is true; otherwise Curl_ssl_scache_lock/unlock merely toggle the is_locked flag without any mutex. When the scache comes from data->multi->ssl_scache (a multi handle, not an explicitly shared CURLSH), concurrent easy handles driven from different threads on the same multi can mutate the same Curl_ssl_scache_peer list (add/take/clear sessions) with no real locking. The DEBUGASSERT(!scache->is_locked) in Curl_ssl_scache_lock even documents the single-locker assumption. This is the documented curl threading model (a multi must be driven by one thread), so it is by-design for correct usage, but the cache is reachable concurrently and the 'lock' is a no-op outside the SHARE case, making any misuse a silent data race / use-after-free on session objects rather than a detected error.","fix":"Document the single-thread-per-multi requirement at these functions, or make the multi-owned scache use an actual mutex so the lock is meaningful even without a CURLSH share.","locations":[{"ref":"lib/vtls/vtls_scache.c:647-670","code":"  647 | /* Lock shared SSL session data */\n  648 | void Curl_ssl_scache_lock(struct Curl_easy *data)\n  649 | {\n  650 |   struct Curl_ssl_scache *scache = cf_ssl_scache_get(data);\n  651 |   if(scache) {\n  652 |     if(CURL_SHARE_ssl_scache(data))\n  653 |       Curl_share_lock(data, CURL_LOCK_DATA_SSL_SESSION,\n  654 |                       CURL_LOCK_ACCESS_SINGLE);\n  655 |     DEBUGASSERT(!scache->is_locked);\n  656 |     scache->is_locked = TRUE;\n  657 |   }\n  658 | }\n  659 | \n  660 | /* Unlock shared SSL session data */\n  661 | void Curl_ssl_scache_unlock(struct Curl_easy *data)\n  662 | {\n  663 |   struct Curl_ssl_scache *scache = cf_ssl_scache_get(data);\n  664 |   if(scache) {\n  665 |     DEBUGASSERT(scache->is_locked);\n  666 |     scache->is_locked = FALSE;\n  667 |     if(CURL_SHARE_ssl_scache(data))\n  668 |       Curl_share_unlock(data, CURL_LOCK_DATA_SSL_SESSION);\n  669 |   }\n  670 | }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"low","description":"easy_events() uses a function-local `static struct events evs` and the comment\nexplains it is made static so it survives after the function returns and\ncurl_multi_remove_handle() is called. As a consequence curl_easy_perform_ev()\nis not reentrant and not thread-safe: two concurrent event-based blocking\nperforms (or nested ones) share the same `evs` (including its socket-monitor\nlinked list `ev->list`), which can corrupt the monitor list. This is\nDEBUGBUILD-only test plumbing, so production impact is none, but it is a real\nshared-mutable-state hazard worth noting.","fix":"Avoid the static; if the struct must outlive the function, heap-allocate it and tie its lifetime to the multi/easy handle, or document and enforce single-threaded debug-only use.","locations":[{"ref":"lib/easy.c:666-676","code":"  666 | static CURLcode easy_events(struct Curl_multi *multi)\n  667 | {\n  668 |   /* this struct is made static to allow it to be used after this function\n  669 |      returns and curl_multi_remove_handle() is called */\n  670 |   static struct events evs = { -1, FALSE, 0, NULL, 0 };\n  671 | \n  672 |   /* if running event-based, do some further multi inits */\n  673 |   events_setup(multi, &evs);\n  674 | \n  675 |   return wait_or_timeout(multi, &evs);\n  676 | }"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"doh_decode_rdata_name() leaks the local `thename` dynbuf on two of its error return paths. When the initial zero-length label is handled and the \".\" add fails (line 1096-1097) it `return CURLE_OUT_OF_MEMORY;` without curlx_dyn_free(&thename). When a label add fails inside the loop (line 1104-1106) it `return CURLE_TOO_LARGE;` again without freeing. The other two error paths in the same function (lines 1100-1102 and 1110-1113) correctly call curlx_dyn_free(&thename) first, confirming the omission is a bug. Any allocated dynbuf content is leaked. This is reachable from parsing attacker-controlled HTTPS RR RDATA.","fix":"Call curlx_dyn_free(&thename) before returning on both the line 1096-1097 and line 1104-1106 error paths (matching the other two error returns).","locations":[{"ref":"lib/doh.c:1094-1106","code":" 1094 |   if(clen == 0) {\n 1095 |     /* special case - return \".\" as name */\n 1096 |     if(curlx_dyn_addn(&thename, \".\", 1))\n 1097 |       return CURLE_OUT_OF_MEMORY;\n 1098 |   }\n 1099 |   while(clen) {\n 1100 |     if(clen >= rem) {\n 1101 |       curlx_dyn_free(&thename);\n 1102 |       return CURLE_OUT_OF_MEMORY;\n 1103 |     }\n 1104 |     if(curlx_dyn_addn(&thename, cp, clen) ||\n 1105 |        curlx_dyn_addn(&thename, \".\", 1))\n 1106 |       return CURLE_TOO_LARGE;"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"In Curl_peer_from_url(), the port-parsing branch returns directly with\n`return CURLE_URL_MALFORMAT;` instead of `goto out;`. This bypasses the\nfunction's cleanup at the `out:` label, which calls peer_parse_clear(&pp)\n(freeing pp.tmp_host_user / pp.tmp_host / pp.tmp_zoneid) and frees `zoneid`.\nAt this point peer_parse_host() may already have allocated pp.tmp_host_user\nand pp.tmp_host (e.g. for an IDN hostname), so those buffers leak whenever a\nURL has an unparseable port. Every other error path in this function uses\n`goto out`.","fix":"Replace `return CURLE_URL_MALFORMAT;` with `result = CURLE_URL_MALFORMAT; goto out;` so the cleanup at `out:` runs.","locations":[{"ref":"lib/peer.c:424-425","code":"  424 |       if(curlx_str_number(&p, &offt, 0xffff))\n  425 |         return CURLE_URL_MALFORMAT;"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"do_pubkey_field() inits a dynbuf `out` and only frees it inside the `if(!result)` branch. When ASN1tostr() returns a non-OK CURLcode (e.g. CURLE_WEIRD_SERVER_REPLY for an invalid wide char, or an OOM during dynbuf growth), the function returns with `out` still holding an allocated buffer that is never freed. This path is reachable while parsing a malicious/garbage server certificate public key, so it is an attacker-influenced leak repeated per certificate field.","fix":"Always free the dynbuf: move `curlx_dyn_free(&out);` out of the `if(!result)` block so it runs on every return path, e.g. call it unconditionally before `return result;`.","locations":[{"ref":"lib/vtls/x509asn1.c:949-967","code":"  949 | static CURLcode do_pubkey_field(struct Curl_easy *data, int certnum,\n  950 |                                 const char *label,\n  951 |                                 struct Curl_asn1Element *elem)\n  952 | {\n  953 |   CURLcode result;\n  954 |   struct dynbuf out;\n  955 | \n  956 |   curlx_dyn_init(&out, CURL_X509_STR_MAX);\n  957 | \n  958 |   /* Generate a certificate information record for the public key. */\n  959 | \n  960 |   result = ASN1tostr(&out, elem);\n  961 |   if(!result) {\n  962 |     if(data->set.ssl.certinfo)\n  963 |       result = ssl_push_certinfo_dyn(data, certnum, label, &out);\n  964 |     curlx_dyn_free(&out);\n  965 |   }\n  966 |   return result;\n  967 | }"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In split_to_dyn_array(), when a non-final segment's curlx_dyn_addn() fails (OOM), the code does `goto fail` after curlx_dyn_init(&db[index]) but before incrementing num_splits. Since *num_splits_out is set to num_splits (which does not include this index), the caller canon_query() frees only db[0..num_splits-1] via dyn_array_free(), leaking the dynbuf already initialized/allocated at db[index]. Only reachable on allocation failure.","fix":"On the addn-failure path, free db[index] before goto fail, or increment num_splits before the addn so the count includes the partially-built entry that dyn_array_free will then clean up.","locations":[{"ref":"lib/http_aws_sigv4.c:166-178","code":"  166 |       if(segment_length) {\n  167 |         curlx_dyn_init(&db[index], segment_length + 1);\n  168 |         result = curlx_dyn_addn(&db[index], &source[start], segment_length);\n  169 |         if(result)\n  170 |           goto fail;\n  171 | \n  172 |         segment_length = 0;\n  173 |         index++;\n  174 |         if(++num_splits == MAX_QUERY_COMPONENTS) {\n  175 |           result = CURLE_TOO_LARGE;\n  176 |           goto fail;\n  177 |         }\n  178 |       }"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In tool_create_output_file(), when handling CLOBBER_NEVER, the dynbuf `fbuffer` is initialized with curlx_dyn_init() and then, inside the retry loop, `curlx_dyn_addf(&fbuffer, \"%s.%d\", fname, next_num)` is called. On allocation failure that branch does `return FALSE;` directly without calling curlx_dyn_free(&fbuffer), leaking the dynbuf's heap allocation. Every other exit from this function path eventually transfers or frees the buffer, but this early error return does not.","fix":"Free the buffer before the early return, e.g. `if(curlx_dyn_addf(&fbuffer, \"%s.%d\", fname, next_num)) { curlx_dyn_free(&fbuffer); return FALSE; }`.","locations":[{"ref":"src/tool_cb_wrt.c:62-73","code":"   62 |       int next_num = 1;\n   63 |       struct dynbuf fbuffer;\n   64 |       char *newfile;\n   65 |       curlx_dyn_init(&fbuffer, 1025);\n   66 |       /* !checksrc! disable ERRNOVAR 1 */\n   67 |       while(fd == -1 && /* have not successfully opened a file */\n   68 |             (errno == EEXIST || errno == EISDIR) &&\n   69 |             /* because we keep having files that already exist */\n   70 |             next_num < 100 /* and we have not reached the retry limit */) {\n   71 |         curlx_dyn_reset(&fbuffer);\n   72 |         if(curlx_dyn_addf(&fbuffer, \"%s.%d\", fname, next_num))\n   73 |           return FALSE;"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In ipfs_gateway(), after opening the gateway file, the first line is read character-by-character into the dynbuf `dyn`. If curlx_dyn_addn() fails it does `goto fail`. The `fail:` label only closes gfile and frees ipfs_path_c; it never calls curlx_dyn_free(&dyn), so the partially-built dynbuf allocation is leaked on that error path. On the success path ownership of the dynbuf buffer is transferred to the caller, but the failure path has no such transfer.","fix":"Free the dynbuf on the error path, e.g. add `curlx_dyn_free(&dyn);` before/at the goto, or restructure so the fail label frees it. Since `dyn` is only in scope inside the `if(gfile)` block, free it there before jumping (or move the goto to a local cleanup that frees dyn).","locations":[{"ref":"src/tool_ipfs.c:71-96","code":"   71 |   if(gfile) {\n   72 |     int c;\n   73 |     struct dynbuf dyn;\n   74 |     char *gateway = NULL;\n   75 |     curlx_dyn_init(&dyn, MAX_GATEWAY_URL_LEN);\n   76 | \n   77 |     /* get the first line of the gateway file, ignore the rest */\n   78 |     while((c = getc(gfile)) != EOF && c != '\\n' && c != '\\r') {\n   79 |       char c_char = (char)c;\n   80 |       if(curlx_dyn_addn(&dyn, &c_char, 1))\n   81 |         goto fail;\n   82 |     }\n   83 | \n   84 |     if(curlx_dyn_len(&dyn))\n   85 |       gateway = curlx_dyn_ptr(&dyn);\n   86 | \n   87 |     curl_free(ipfs_path_c);\n   88 |     curlx_fclose(gfile);\n   89 | \n   90 |     return gateway;\n   91 |   }\n   92 | fail:\n   93 |   if(gfile)\n   94 |     curlx_fclose(gfile);\n   95 |   curl_free(ipfs_path_c);\n   96 |   return NULL;"}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"varexpand() initializes a local dynbuf `buf` at line 294 (used to hold function-processed variable content). When the expanded value is found to contain a NUL byte, the function returns PARAM_EXPAND_ERROR at line 311 without calling curlx_dyn_free(&buf). On the normal path (line 316) and most error paths the buffer is freed, so this branch leaks whatever `varfunc()` allocated into `buf` (when a function suffix like ':b64' / ':64dec' was used). It is a terminal error in a short-lived CLI but still a genuine leak.","fix":"Free the buffer before returning, e.g. add `curlx_dyn_free(&buf);` immediately before `return PARAM_EXPAND_ERROR;` (and ensure `out` is also cleaned up consistently with the caller's expectations).","locations":[{"ref":"src/var.c:305-312","code":"  305 |           if(value && vlen > 0) {\n  306 |             /* A variable might contain null bytes. Such bytes cannot be shown\n  307 |                using normal means, this is an error. */\n  308 |             const char *nb = memchr(value, '\\0', vlen);\n  309 |             if(nb) {\n  310 |               errorf(\"variable contains null byte\");\n  311 |               return PARAM_EXPAND_ERROR;\n  312 |             }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In ftp_setup_connection(), if Curl_meta_set(CURL_META_FTP_EASY, ftp, ...)\nsucceeds but the subsequent allocation of `ftpc` fails (or\nCurl_conn_meta_set fails) the function returns CURLE_OUT_OF_MEMORY. The `ftp`\nobject is owned by the easy-handle meta store (freed by ftp_easy_dtor), so that\nis fine; but `ftpc` allocated at line 4414 is leaked when\nCurl_conn_meta_set() itself fails after a successful curlx_calloc, because\nmeta_set takes ownership only on success and the error path does not free ftpc.","fix":"On the `!ftpc || Curl_conn_meta_set(...)` failure, free ftpc when it was allocated but meta_set failed (mirror the pattern used for account/alternative_to_user).","locations":[{"ref":"lib/ftp.c:4414-4417","code":" 4414 |   ftpc = curlx_calloc(1, sizeof(*ftpc));\n 4415 |   if(!ftpc ||\n 4416 |      Curl_conn_meta_set(conn, CURL_META_FTP_CONN, ftpc, ftp_conn_dtor))\n 4417 |     return CURLE_OUT_OF_MEMORY;"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In the non-pipe2 fallback of wakeup_pipe(), when nonblocking is requested and\ncurlx_nonblock() fails, both pipe fds are closed. However, in the HAVE_FCNTL\nblock just above, if only the FD_CLOEXEC fcntl on socks[1] fails (after the\nfcntl on socks[0] succeeded), both are closed correctly. The handling is fine\nthere. The genuine concern is the eventfd path: in wakeup_eventfd() both\nsocks[0] and socks[1] are set to the SAME fd. If a later caller iterates and\ncloses both entries it would double-close; Curl_wakeup_destroy() guards this\nwith `#ifndef USE_EVENTFD` for socks[1], but any other code path that closes\nsocks[0] and socks[1] independently for the eventfd backend would double-close\nthe same descriptor. This aliasing is fragile and undocumented at the call\nsites.","fix":"Document the socks[0]==socks[1] aliasing for the eventfd backend at the struct/usage level, or store CURL_SOCKET_BAD in socks[1] for eventfd so generic close loops cannot double-close.","locations":[{"ref":"lib/socketpair.c:38-47","code":"   38 | static int wakeup_eventfd(curl_socket_t socks[2], bool nonblocking)\n   39 | {\n   40 |   int efd = eventfd(0, nonblocking ? EFD_CLOEXEC | EFD_NONBLOCK : EFD_CLOEXEC);\n   41 |   if(efd == -1) {\n   42 |     socks[0] = socks[1] = CURL_SOCKET_BAD;\n   43 |     return -1;\n   44 |   }\n   45 |   socks[0] = socks[1] = efd;\n   46 |   return 0;\n   47 | }"},{"ref":"lib/socketpair.c:365-374","code":"  365 | void Curl_wakeup_destroy(curl_socket_t socks[2])\n  366 | {\n  367 | #ifndef USE_EVENTFD\n  368 |   if(socks[1] != CURL_SOCKET_BAD)\n  369 |     wakeup_close(socks[1]);\n  370 | #endif\n  371 |   if(socks[0] != CURL_SOCKET_BAD)\n  372 |     wakeup_close(socks[0]);\n  373 |   socks[0] = socks[1] = CURL_SOCKET_BAD;\n  374 | }"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"cf_quiche_send() / h3_open_stream(): on the QUICHE_H3_ERR_STREAM_BLOCKED path the request headers have been submitted-attempt failed and result is set to CURLE_AGAIN, but stream->h1.req was already freed (Curl_h1_req_parse_free at line 1019) and stream->opened is left FALSE. On the next cf_quiche_send() call h3_open_stream() is entered again and Curl_h1_req_parse_read() is called on the freed/reset parser. Because parse_free only frees the parsed req (not the parser struct) and parse_read re-parses from buf, this works, but *pnwritten was already advanced past the consumed header bytes on the first call while the caller retries with the same buffer offset reset — leading to potential double-consumption of the header bytes. Worth verifying the retry contract for STREAM_BLOCKED here.","fix":"On QUICHE_H3_ERR_STREAM_BLOCKED, ensure *pnwritten is reset to 0 (or the stream open state is preserved) so the retry re-parses the same input consistently and does not double-count header bytes.","locations":[{"ref":"lib/vquic/curl_quiche.c:976-1095","code":"  976 | static CURLcode h3_open_stream(struct Curl_cfilter *cf,\n  977 |                                struct Curl_easy *data,\n  978 |                                const uint8_t *buf, size_t blen, bool eos,\n  979 |                                size_t *pnwritten)\n  980 | {\n  981 |   struct cf_quiche_ctx *ctx = cf->ctx;\n  982 |   struct h3_stream_ctx *stream = H3_STREAM_CTX(ctx, data);\n  983 |   size_t nheader, i;\n  984 |   int64_t rv;\n  985 |   struct dynhds h2_headers;\n  986 |   quiche_h3_header *nva = NULL;\n  987 |   CURLcode result = CURLE_OK;\n  988 | \n  989 |   *pnwritten = 0;\n  990 |   if(!stream) {\n  991 |     result = h3_data_setup(cf, data);\n  992 |     if(result)\n  993 |       return result;\n  994 |     stream = H3_STREAM_CTX(ctx, data);\n  995 |     DEBUGASSERT(stream);\n  996 |   }\n  997 | \n  998 |   Curl_dynhds_init(&h2_headers, 0, DYN_HTTP_REQUEST);\n  999 | \n 1000 |   DEBUGASSERT(stream);\n 1001 | \n 1002 |   result = Curl_h1_req_parse_read(&stream->h1, buf, blen, NULL,\n 1003 |                                   !data->state.http_ignorecustom ?\n 1004 |                                   data->set.str[STRING_CUSTOMREQUEST] : NULL,\n 1005 |                                   0, pnwritten);\n 1006 |   if(result)\n 1007 |     goto out;\n 1008 |   if(!stream->h1.done) {\n 1009 |     /* need more data */\n 1010 |     goto out;\n 1011 |   }\n 1012 |   DEBUGASSERT(stream->h1.req);\n 1013 | \n 1014 |   result = Curl_http_req_to_h2(&h2_headers, stream->h1.req, data);\n 1015 |   if(result)\n 1016 |     goto out;\n 1017 | \n 1018 |   /* no longer needed */\n 1019 |   Curl_h1_req_parse_free(&stream->h1);\n 1020 | \n 1021 |   nheader = Curl_dynhds_count(&h2_headers);\n 1022 |   nva = curlx_malloc(sizeof(quiche_h3_header) * nheader);\n 1023 |   if(!nva) {\n 1024 |     result = CURLE_OUT_OF_MEMORY;\n 1025 |     goto out;\n 1026 |   }\n 1027 | \n 1028 |   for(i = 0; i < nheader; ++i) {\n 1029 |     struct dynhds_entry *e = Curl_dynhds_getn(&h2_headers, i);\n 1030 |     nva[i].name = (unsigned char *)e->name;\n 1031 |     nva[i].name_len = e->namelen;\n 1032 |     nva[i].value = (unsigned char *)e->value;\n 1033 |     nva[i].value_len = e->valuelen;\n 1034 |   }\n 1035 | \n 1036 |   buf += *pnwritten;\n 1037 |   blen -= *pnwritten;\n 1038 | \n 1039 |   if(eos && !blen)\n 1040 |     stream->send_closed = TRUE;\n 1041 | \n 1042 |   rv = quiche_h3_send_request(ctx->h3c, ctx->qconn, nva, nheader,\n 1043 |                               stream->send_closed);\n 1044 |   CURL_TRC_CF(data, cf, \"quiche_send_request() -> %\" PRId64, rv);\n 1045 |   if(rv < 0) {\n 1046 |     if(QUICHE_H3_ERR_STREAM_BLOCKED == rv) {\n 1047 |       /* quiche seems to report this error if the connection window is\n 1048 |        * exhausted. Which happens frequently and intermittent. */\n 1049 |       CURL_TRC_CF(data, cf, \"[%\" PRIu64 \"] blocked\", stream->id);\n 1050 |       stream->quic_flow_blocked = TRUE;\n 1051 |       result = CURLE_AGAIN;\n 1052 |       goto out;\n 1053 |     }\n 1054 |     else {\n 1055 |       CURL_TRC_CF(data, cf, \"send_request(%s) -> %\" PRId64,\n 1056 |                   Curl_bufref_ptr(&data->state.url), rv);\n 1057 |     }\n 1058 |     result = CURLE_SEND_ERROR;\n 1059 |     goto out;\n 1060 |   }\n 1061 | \n 1062 |   DEBUGASSERT(!stream->opened);\n 1063 |   stream->id = (uint64_t)rv;\n 1064 |   stream->opened = TRUE;\n 1065 |   stream->closed = FALSE;\n 1066 |   stream->reset = FALSE;\n 1067 | \n 1068 |   if(Curl_trc_is_verbose(data)) {\n 1069 |     infof(data, \"[HTTP/3] [%\" PRIu64 \"] OPENED stream for %s\",\n 1070 |           stream->id, Curl_bufref_ptr(&data->state.url));\n 1071 |     for(i = 0; i < nheader; ++i) {\n 1072 |       infof(data, \"[HTTP/3] [%\" PRIu64 \"] [%.*s: %.*s]\", stream->id,\n 1073 |             (int)nva[i].name_len, nva[i].name,\n 1074 |             (int)nva[i].value_len, nva[i].value);\n 1075 |     }\n 1076 |   }\n 1077 | \n 1078 |   if(blen) {  /* after the headers, there was request BODY data */\n 1079 |     size_t nwritten;\n 1080 |     CURLcode r2 = CURLE_OK;\n 1081 | \n 1082 |     r2 = cf_quiche_send_body(cf, data, stream, buf, blen, eos, &nwritten);\n 1083 |     if(r2 && (r2 != CURLE_AGAIN)) {  /* real error, fail */\n 1084 |       result = r2;\n 1085 |     }\n 1086 |     else if(nwritten > 0) {\n 1087 |       *pnwritten += nwritten;\n 1088 |     }\n 1089 |   }\n 1090 | \n 1091 | out:\n 1092 |   curlx_free(nva);\n 1093 |   Curl_dynhds_free(&h2_headers);\n 1094 |   return result;\n 1095 | }"}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"wssl_random() initializes a wolfSSL RNG with wc_InitRng() but on two early-return error paths it does not call wc_FreeRng(): when `length > UINT_MAX` and when wc_RNG_GenerateBlock() fails. Both return CURLE_FAILED_INIT while leaking the initialized RNG context (which may hold OS handles / allocated state).","fix":"Free the RNG before returning on every path after a successful wc_InitRng(), e.g. use a goto cleanup that calls wc_FreeRng(&rng), or move the `length > UINT_MAX` check before wc_InitRng().","locations":[{"ref":"lib/vtls/wolfssl.c:2273-2283","code":" 2273 |   WC_RNG rng;\n 2274 |   (void)data;\n 2275 |   if(wc_InitRng(&rng))\n 2276 |     return CURLE_FAILED_INIT;\n 2277 |   if(length > UINT_MAX)\n 2278 |     return CURLE_FAILED_INIT;\n 2279 |   if(wc_RNG_GenerateBlock(&rng, entropy, (unsigned)length))\n 2280 |     return CURLE_FAILED_INIT;\n 2281 |   if(wc_FreeRng(&rng))\n 2282 |     return CURLE_FAILED_INIT;\n 2283 |   return CURLE_OK;"}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"glob_match_url() builds the output into the local dynbuf `dyn`. On the out-of-memory error paths after a failed curlx_dyn_addn() the function returns the error without freeing `dyn`: line 784-785 (`if(result) return result;`) inside the main loop and line 788-789 (`if(curlx_dyn_addn(&dyn, \"\", 0)) return CURLE_OUT_OF_MEMORY;`). Other error paths in the same function correctly call curlx_dyn_free(&dyn) (e.g. line 753, 778, 796). These two paths leak the accumulated buffer on allocation failure.","fix":"Call curlx_dyn_free(&dyn) before returning on these two error paths (or use a single `goto error` label that frees the buffer).","locations":[{"ref":"src/tool_urlglob.c:784-789","code":"  784 |     if(result)\n  785 |       return result;\n  786 |   }\n  787 | \n  788 |   if(curlx_dyn_addn(&dyn, \"\", 0))\n  789 |     return CURLE_OUT_OF_MEMORY;"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"tftp_set_timeouts() computes `timeout = (time_t)(timeout_ms + 500) / 1000` and\nthen `state->retry_max = (int)timeout / 5`. timeout_ms is a timediff_t\n(64-bit). The branch only enters this calculation when timeout_ms < 3600000, so\ntimeout fits, but note the cast precedence: `(time_t)(timeout_ms + 500) / 1000`\ncasts the sum to time_t before dividing — fine. The real concern is\n`state->retry_time = (int)(timeout / state->retry_max)`: retry_max is clamped to\n[3,50] so no divide-by-zero. This is sound; however the infof at lines 191-193\nprints timeout_ms with FMT_OFF_T while timeout_ms is timediff_t — on platforms\nwhere timediff_t and curl_off_t differ in size/signedness this is a\nformat/type mismatch.","fix":"Print timeout_ms with the timediff_t format macro (e.g. FMT_TIMEDIFF_T / appropriate cast) instead of FMT_OFF_T to avoid undefined behavior from a varargs type mismatch.","locations":[{"ref":"lib/tftp.c:172-193","code":"  172 |     timeout = (time_t)(timeout_ms + 500) / 1000;\n  173 |   else\n  174 |     timeout = 15;\n  175 | \n  176 |   /* Average reposting an ACK after 5 seconds */\n  177 |   state->retry_max = (int)timeout / 5;\n  178 | \n  179 |   /* Bound the total number */\n  180 |   if(state->retry_max < 3)\n  181 |     state->retry_max = 3;\n  182 | \n  183 |   if(state->retry_max > 50)\n  184 |     state->retry_max = 50;\n  185 | \n  186 |   /* Compute the re-ACK interval to suit the timeout */\n  187 |   state->retry_time = (int)(timeout / state->retry_max);\n  188 |   if(state->retry_time < 1)\n  189 |     state->retry_time = 1;\n  190 | \n  191 |   infof(state->data,\n  192 |         \"set timeouts for state %d; Total %\" FMT_OFF_T \", retry %d maxtry %d\",\n  193 |         (int)state->state, timeout_ms, state->retry_time, state->retry_max);"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"curlx_tvtoms() computes (tv->tv_sec * 1000) using time_t arithmetic before\nadding the microsecond contribution. On platforms where time_t is a 64-bit\nsigned type this is fine for realistic values, but the multiplication is done\nin time_t and then implicitly converted to timediff_t; for a large tv_sec\n(e.g. an absolute wall-clock timeval rather than a small interval) tv_sec*1000\ncan overflow time_t/timediff_t. Unlike the other timeval helpers in this file\n(curlx_ptimediff_ms etc.) there is no saturation/overflow guard here.","fix":"Cast tv_sec to timediff_t before multiplying and add a saturation check against\nTIMEDIFF_T_MAX/1000, mirroring the guards used in curlx_ptimediff_ms().","locations":[{"ref":"lib/curlx/timediff.c:82-85","code":"   82 | timediff_t curlx_tvtoms(struct timeval *tv)\n   83 | {\n   84 |   return (tv->tv_sec * 1000) + (timediff_t)(tv->tv_usec / 1000);\n   85 | }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"mbed_load_cacert() and mbed_load_clicert() inspect `((char *)blob->data)[blob->len - 1]` to detect a NUL-terminated PEM blob. If a caller supplies a zero-length CURLOPT_CAINFO_BLOB / CURLOPT_SSLCERT_BLOB (len == 0), this indexes element [SIZE_MAX], an out-of-bounds read. The blob length is user-controlled via the public blob API.","fix":"Guard the access with a length check, e.g. only test the last byte when `blob->len > 0`; treat len==0 as an error (or as non-NUL-terminated PEM) before dereferencing `data[len-1]`.","locations":[{"ref":"lib/vtls/mbedtls.c:500-501","code":"  500 |     if((ssl_cert_type && curl_strequal(ssl_cert_type, \"DER\")) ||\n  501 |        ((char *)(ca_info_blob->data))[ca_info_blob->len - 1] == '\\0') {"},{"ref":"lib/vtls/mbedtls.c:612-613","code":"  612 |     if((ssl_cert_type && curl_strequal(ssl_cert_type, \"DER\")) ||\n  613 |        ((char *)(ssl_cert_blob->data))[ssl_cert_blob->len - 1] == '\\0') {"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In tftp_receive_packet(), the address-pinning check uses\n`memcmp(&remote_addr, &state->remote_addr, fromlen)` where fromlen is the\nlength returned by recvfrom for the *current* packet. The pinned length is\nstored as remote_addrlen. The code first checks `state->remote_addrlen !=\nfromlen`, so the memcmp length matches both, but memcmp over a\nCurl_sockaddr_storage compares the entire reported socklen which for some\naddress families includes uninitialized padding bytes (e.g. sockaddr_in\nsin_zero). recvfrom does not guarantee those padding bytes are identical\nbetween packets, so a legitimate continuation packet from the same peer could\nbe wrongly rejected with \"Data received from another address\".","fix":"Compare only the meaningful address fields (family + addr + port) rather than the raw socklen-many bytes, or zero the storage before each recvfrom and memcpy so padding is deterministic.","locations":[{"ref":"lib/tftp.c:1052-1066","code":" 1052 |   if((state->rbytes >= 0) && fromlen) {\n 1053 |     if(state->remote_pinned) {\n 1054 |       /* pinned, verify that it comes from the same address */\n 1055 |       if((state->remote_addrlen != fromlen) ||\n 1056 |          memcmp(&remote_addr, &state->remote_addr, fromlen)) {\n 1057 |         failf(data, \"Data received from another address\");\n 1058 |         return CURLE_RECV_ERROR;\n 1059 |       }\n 1060 |     }\n 1061 |     else {\n 1062 |       /* pin address on first use */\n 1063 |       state->remote_pinned = TRUE;\n 1064 |       state->remote_addrlen = fromlen;\n 1065 |       memcpy(&state->remote_addr, &remote_addr, fromlen);\n 1066 |     }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Curl_thrdpool_await_idle() computes the remaining wait time with the\narguments to curlx_timediff_ms() swapped. curlx_timediff_ms(newer, older)\nreturns (newer - older) in milliseconds. Here it is called as\ncurlx_timediff_ms(curlx_now(), end), i.e. (now - end). Since `end` is set to\n`now + timeout_ms`, this expression is always approximately -timeout_ms, hence\nnegative. The subsequent check `if(remain_ms <= 0)` therefore fires on the very\nfirst iteration and the function returns CURLE_OPERATION_TIMEDOUT immediately,\nwithout ever calling Curl_cond_timedwait() to actually wait. The intended\nremaining time is `end - now`, which requires curlx_timediff_ms(end,\ncurlx_now()). As written, any caller that passes a non-zero timeout_ms gets an\ninstant spurious timeout instead of waiting for the pool to go idle.","fix":"Swap the arguments so the remaining time is positive while `now` is before\n`end`:\n  remain_ms = curlx_timediff_ms(end, curlx_now());\n(optionally clamp to a small positive minimum to avoid a 0ms timedwait).","locations":[{"ref":"lib/thrdpool.c:414-419","code":"  414 |       remain_ms = curlx_timediff_ms(curlx_now(), end);\n  415 |       if(remain_ms <= 0)\n  416 |         r = CURLE_OPERATION_TIMEDOUT;\n  417 |       else\n  418 |         r = Curl_cond_timedwait(&tpool->await, &tpool->lock,\n  419 |                                 (uint32_t)remain_ms);"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`ctx->last_stream_id` is read in tunnel_recv() to decide whether a received GOAWAY affects the tunnel stream (`ctx->rcvd_goaway && ctx->last_stream_id < ctx->tunnel.stream_id`), but it is never assigned anywhere. The GOAWAY handler in proxy_h2_on_frame_recv() only sets `ctx->rcvd_goaway = TRUE` and does not record `frame->goaway.last_stream_id`. Since last_stream_id stays 0 (from calloc) and tunnel.stream_id is always >= 1, the condition is always true whenever a GOAWAY is received, so the tunnel is reported as RECV_ERROR even when the server's GOAWAY last_stream_id actually covers our stream. The main HTTP/2 stack (http2.c) correctly does `ctx->remote_max_sid = frame->goaway.last_stream_id;` in its GOAWAY handler — an incomplete port.","fix":"In the NGHTTP2_GOAWAY case of proxy_h2_on_frame_recv(), record the last stream id: `ctx->last_stream_id = frame->goaway.last_stream_id;` (in addition to setting rcvd_goaway).","locations":[{"ref":"lib/cf-h2-proxy.c:503-505","code":"  503 |     case NGHTTP2_GOAWAY:\n  504 |       ctx->rcvd_goaway = TRUE;\n  505 |       break;"},{"ref":"lib/cf-h2-proxy.c:1204-1208","code":" 1204 |     else if(ctx->tunnel.reset ||\n 1205 |             (ctx->conn_closed && Curl_bufq_is_empty(&ctx->inbufq)) ||\n 1206 |             (ctx->rcvd_goaway &&\n 1207 |              ctx->last_stream_id < ctx->tunnel.stream_id)) {\n 1208 |       result = CURLE_RECV_ERROR;"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"cshutdn_perform() computes the smallest remaining shutdown time across\nconnections into next_expire_ms, but initializes next_expire_ms = 0 and only\nupdates it with `if(ms && ms < next_expire_ms)`. Curl_conn_shutdown_timeleft()\nreturns a POSITIVE number of milliseconds when time remains (and negative only\nwhen already expired). Since next_expire_ms starts at 0, the condition\n`ms < next_expire_ms` is only ever true for negative (already-expired) values;\nany positive remaining time never updates next_expire_ms. As a result\nnext_expire_ms stays 0 and the `if(next_expire_ms) Curl_expire_ex(...)` call is\nskipped, so the EXPIRE_SHUTDOWN timer is not (re)scheduled for connections that\nstill have time left. Compare with the correct idiom used in\nCurl_conn_shutdown_timeleft() itself (lib/connect.c:193): `if(ms && (!left_ms\n|| ms < left_ms))`.","fix":"Use `if(ms && (!next_expire_ms || ms < next_expire_ms)) next_expire_ms = ms;` so a positive remaining time is captured and the EXPIRE_SHUTDOWN timer is scheduled.","locations":[{"ref":"lib/cshutdn.c:235-263","code":"  235 |   timediff_t next_expire_ms = 0, ms;\n  236 |   bool done;\n  237 | \n  238 |   if(!e)\n  239 |     return;\n  240 | \n  241 |   CURL_TRC_M(data, \"[SHUTDOWN] perform on %zu connections\",\n  242 |              Curl_llist_count(&cshutdn->list));\n  243 |   sigpipe_apply(data, sigpipe_ctx);\n  244 |   while(e) {\n  245 |     enext = Curl_node_next(e);\n  246 |     conn = Curl_node_elem(e);\n  247 |     Curl_cshutdn_run_once(data, conn, &done);\n  248 |     if(done) {\n  249 |       Curl_node_remove(e);\n  250 |       Curl_cshutdn_terminate(data, conn, FALSE);\n  251 |     }\n  252 |     else {\n  253 |       /* idata has one timer list, but maybe more than one connection.\n  254 |        * Set EXPIRE_SHUTDOWN to the smallest time left for all. */\n  255 |       ms = Curl_conn_shutdown_timeleft(data, conn);\n  256 |       if(ms && ms < next_expire_ms)\n  257 |         next_expire_ms = ms;\n  258 |     }\n  259 |     e = enext;\n  260 |   }\n  261 | \n  262 |   if(next_expire_ms)\n  263 |     Curl_expire_ex(data, next_expire_ms, EXPIRE_SHUTDOWN);"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Curl_range() does not reject \"X-\" ranges where the start offset equals\nCURL_OFF_T_MAX. When the range is just \"X-\" (no end), `from` is parsed with a\ncap of CURL_OFF_T_MAX and stored directly into resume_from with no further\nvalidation. More importantly, the \"-Y\" branch reads `to` but the \"X-Y\" branch\ncomputes `totalsize = to - from` and only rejects when `totalsize ==\nCURL_OFF_T_MAX`; it does not reject the case `from == to` producing\nmaxdownload == 1 vs. an off-by-one in the inclusive-byte accounting is fine,\nbut a `to` value parsed equal to CURL_OFF_T_MAX combined with from==0 yields\ntotalsize==CURL_OFF_T_MAX which is rejected, yet from==1,to==CURL_OFF_T_MAX\nyields totalsize==CURL_OFF_T_MAX-1 and maxdownload = CURL_OFF_T_MAX (no\noverflow) — acceptable. The genuine issue: the final DEBUGF at lines 82-84\nprints `to` even in the \"X-\" branch where `to` was never assigned (the\ncurlx_str_number for `to` failed), reading an uninitialized variable in debug\nbuilds.","fix":"Initialize `to` to 0 (or a sentinel) at declaration so the trailing DEBUGF does not read an uninitialized value in the 'X-' (no second number) case.","locations":[{"ref":"lib/curl_range.c:48-53","code":"   48 |     if(curlx_str_number(&p, &to, CURL_OFF_T_MAX)) {\n   49 |       /* no second number */\n   50 |       /* X - */\n   51 |       data->state.resume_from = from;\n   52 |       DEBUGF(infof(data, \"RANGE %\" FMT_OFF_T \" to end of file\", from));\n   53 |     }"},{"ref":"lib/curl_range.c:82-84","code":"   82 |     DEBUGF(infof(data, \"range-download from %\" FMT_OFF_T\n   83 |                  \" to %\" FMT_OFF_T \", totally %\" FMT_OFF_T \" bytes\",\n   84 |                  from, to, data->req.maxdownload));"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"ftp_parse_url_path() FTPFILE_MULTICWD branch computes `clen = spos - curPos`\nwhere spos = strchr(curPos, '/'). After processing the last directory slash,\n`curPos = spos + 1`. The loop count `dirAlloc` equals numof_slashes(rawPath).\nIf the path contains a '/' but strchr returns NULL on a later iteration\n(impossible given dirAlloc was derived from the same string, unless the string\nwas mutated), spos would be NULL and `clen = NULL - curPos` is undefined. The\nstrings are not mutated between numof_slashes() and the loop, so spos is\nnon-NULL each iteration; this is safe but depends on the invariant that the\ndecoded path is identical to what numof_slashes counted. Worth an assertion.","fix":"Add `DEBUGASSERT(spos)` after strchr in the MULTICWD loop to document and catch any future violation of the slash-count invariant.","locations":[{"ref":"lib/ftp.c:265-301","code":"  265 |   case FTPFILE_MULTICWD: {\n  266 |     /* current position: begin of next path component */\n  267 |     const char *curPos = rawPath;\n  268 | \n  269 |     /* number of entries to allocate for the 'dirs' array */\n  270 |     size_t dirAlloc = numof_slashes(rawPath);\n  271 | \n  272 |     if(dirAlloc >= FTP_MAX_DIR_DEPTH)\n  273 |       /* suspiciously deep directory hierarchy */\n  274 |       return CURLE_URL_MALFORMAT;\n  275 | \n  276 |     if(dirAlloc) {\n  277 |       ftpc->dirs = curlx_calloc(dirAlloc, sizeof(ftpc->dirs[0]));\n  278 |       if(!ftpc->dirs)\n  279 |         return CURLE_OUT_OF_MEMORY;\n  280 | \n  281 |       /* parse the URL path into separate path components */\n  282 |       while(dirAlloc--) {\n  283 |         const char *spos = strchr(curPos, '/');\n  284 |         size_t clen = spos - curPos;\n  285 | \n  286 |         /* path starts with a slash: add that as a directory */\n  287 |         if(!clen && (ftpc->dirdepth == 0))\n  288 |           ++clen;\n  289 | \n  290 |         /* we skip empty path components, like \"x//y\" since the FTP command\n  291 |            CWD requires a parameter and a non-existent parameter a) does not\n  292 |            work on many servers and b) has no effect on the others. */\n  293 |         if(clen) {\n  294 |           ftpc->dirs[ftpc->dirdepth].start = (int)(curPos - rawPath);\n  295 |           ftpc->dirs[ftpc->dirdepth].len = (int)clen;\n  296 |           ftpc->dirdepth++;\n  297 |         }\n  298 |         curPos = spos + 1;\n  299 |       }\n  300 |     }\n  301 |     fileName = curPos; /* the rest is the filename (or empty) */"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"match_pasv_6nums() / ftp_state_pasv_resp(): for a 227 PASV reply the loop scans\n`str` byte-by-byte calling match_pasv_6nums until it matches or hits NUL. str is\ncurlx_dyn_ptr(&pp->recvbuf)+4 and is NUL-terminated, so the scan is bounded.\nHowever ftp_state_pasv_resp() reads `str` from the recvbuf without verifying the\nbuffer actually has at least 4 bytes; for a crafted short final line that still\nsatisfied LASTLINE (which requires >=4 chars including code+space), +4 points at\nthe space/terminator region. This is bounded by the NUL but means the +4 offset\nassumes a minimum length that is only loosely guaranteed by the framing macro.","fix":"Assert/verify curlx_dyn_len(&pp->recvbuf) >= 4 before indexing recvbuf+4, consistently across the *_resp handlers that use the +4 offset.","locations":[{"ref":"lib/ftp.c:2063-2064","code":" 2063 |   const char *str = curlx_dyn_ptr(&pp->recvbuf) + 4; /* start on the first\n 2064 |                                                         letter */"},{"ref":"lib/ftp.c:2108-2117","code":" 2108 |     while(*str) {\n 2109 |       if(match_pasv_6nums(str, ip))\n 2110 |         break;\n 2111 |       str++;\n 2112 |     }\n 2113 | \n 2114 |     if(!*str) {\n 2115 |       failf(data, \"Could not interpret the 227-response\");\n 2116 |       return CURLE_FTP_WEIRD_227_FORMAT;\n 2117 |     }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"ftp_pwd_resp() uses `result` (declared at line 3009 without initialization) on\npaths where it may not have been assigned before being tested. Inside the\nquote-doubling loop every iteration assigns result via curlx_dyn_addn before the\n`if(result)` check, so the loop body is safe. However, after the loop, when\n`entry_extracted` is true, the code calls Curl_pp_sendf and assigns result\n(3076) only inside the `if(!ftpc->server_os && dir[0] != '/')` branch; on the\nother branch result is never assigned but also never read afterward. The\ngenuine latent risk is that if the for-loop at 3033 never executes its body\n(e.g. the character right after the opening quote is immediately a closing quote\nwith empty content), entry_extracted stays FALSE and result remains\nuninitialized, yet result is not read on that path — so currently benign but\nfragile.","fix":"Initialize `CURLcode result = CURLE_OK;` at declaration in ftp_pwd_resp() to remove the reliance on control-flow guarantees.","locations":[{"ref":"lib/ftp.c:3009-3009","code":" 3009 |   CURLcode result;"},{"ref":"lib/ftp.c:3031-3060","code":" 3031 |     if('\\\"' == *ptr) {\n 3032 |       /* it started good */\n 3033 |       for(ptr++; *ptr; ptr++) {\n 3034 |         if('\\\"' == *ptr) {\n 3035 |           if('\\\"' == ptr[1]) {\n 3036 |             /* \"quote-doubling\" */\n 3037 |             result = curlx_dyn_addn(&out, &ptr[1], 1);\n 3038 |             ptr++;\n 3039 |           }\n 3040 |           else {\n 3041 |             /* end of path */\n 3042 |             if(curlx_dyn_len(&out))\n 3043 |               entry_extracted = TRUE;\n 3044 |             break; /* get out of this loop */\n 3045 |           }\n 3046 |         }\n 3047 |         else {\n 3048 |           if(ISCNTRL(*ptr)) {\n 3049 |             /* control characters have no business in a path */\n 3050 |             curlx_dyn_free(&out);\n 3051 |             return CURLE_WEIRD_SERVER_REPLY;\n 3052 |           }\n 3053 |           result = curlx_dyn_addn(&out, ptr, 1);\n 3054 |         }\n 3055 |         if(result) {\n 3056 |           curlx_dyn_free(&out);\n 3057 |           return result;\n 3058 |         }\n 3059 |       }\n 3060 |     }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"imap_endofresp() detects a tagged response by matching imapc->resptag. During the initial connect the tag is set to the literal '*' (imap_connect() calls curlx_strcopy(imapc->resptag, ..., '*')). After that, the untagged-response check `!memcmp(\"* \", line, 2)` and the tagged-response check (id=='*') can both fire for a server greeting line beginning with '* '. The tagged branch runs first and, for a greeting like '* OK ...', sets *resp=IMAP_RESP_OK and returns TRUE, which is the intended SERVERGREET handling; however for a greeting such as '* BYE ...' the tagged branch returns IMAP_RESP_NOT_OK whereas the untagged path would have returned FALSE for non-greeting states. The overlap of the '*' tag with the untagged marker is fragile: any genuinely untagged line during SERVERGREET is classified as a tagged response. Confirm the greeting state relies on this; if a multiline untagged greeting arrives it is mis-parsed as tagged.","fix":"Use a tag value during SERVERGREET that cannot collide with the untagged '* ' marker (e.g. an empty/sentinel tag), or special-case IMAP_SERVERGREET before the generic tagged-response comparison.","locations":[{"ref":"lib/imap.c:328-343","code":"  328 |   /* Do we have a tagged command response? */\n  329 |   id = imapc->resptag;\n  330 |   id_len = strlen(id);\n  331 |   if(len >= id_len + 1 && !memcmp(id, line, id_len) && line[id_len] == ' ') {\n  332 |     line += id_len + 1;\n  333 |     len -= id_len + 1;\n  334 | \n  335 |     if(len >= 2 && !memcmp(line, \"OK\", 2))\n  336 |       *resp = IMAP_RESP_OK;\n  337 |     else if(len >= 7 && !memcmp(line, \"PREAUTH\", 7))\n  338 |       *resp = IMAP_RESP_PREAUTH;\n  339 |     else\n  340 |       *resp = IMAP_RESP_NOT_OK;\n  341 | \n  342 |     return TRUE;\n  343 |   }"},{"ref":"lib/imap.c:1978-1979","code":" 1978 |   /* Start off with an response id of '*' */\n 1979 |   curlx_strcopy(imapc->resptag, sizeof(imapc->resptag), STRCONST(\"*\"));"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"tftp_parse_option_ack() rejects a server-offered blksize that is larger than\nthe *originally requested* blksize (state->requested_blksize), but the receive\nbuffer was actually allocated to need_blksize = max(requested, 512) in\ntftp_connect(). When the user requests a blksize smaller than 512 (e.g.\nCURLOPT_TFTP_BLKSIZE=8), requested_blksize is that small value while the\nbuffers hold 512+4 bytes. A server offering, say, 400 is then rejected even\nthough the buffer could hold it; conversely the comment at lines 299-301 claims\nthe rejection is because realloc is needed, which is misleading since the\nbuffer is already 512+4. The result is interoperability loss (valid OACKs\nrejected) rather than memory unsafety.","fix":"Compare against the actually-allocated buffer capacity (need_blksize) rather than requested_blksize, or document that small requested blksizes intentionally cap the negotiated size.","locations":[{"ref":"lib/tftp.c:298-305","code":"  298 |       else if(blksize > state->requested_blksize) {\n  299 |         /* could realloc pkt buffers here, but the spec does not call out\n  300 |          * support for the server requesting a bigger blksize than the client\n  301 |          * requests */\n  302 |         failf(data, \"server requested blksize larger than allocated (%\"\n  303 |               CURL_FORMAT_CURL_OFF_T \")\", blksize);\n  304 |         return CURLE_TFTP_ILLEGAL;\n  305 |       }"},{"ref":"lib/tftp.c:919-941","code":"  919 |   /* alloc pkt buffers based on specified blksize */\n  920 |   if(data->set.tftp_blksize)\n  921 |     /* range checked when set */\n  922 |     blksize = (int)data->set.tftp_blksize;\n  923 | \n  924 |   need_blksize = blksize;\n  925 |   /* default size is the fallback when no OACK is received */\n  926 |   if(need_blksize < TFTP_BLKSIZE_DEFAULT)\n  927 |     need_blksize = TFTP_BLKSIZE_DEFAULT;\n  928 | \n  929 |   if(!state->rpacket.data) {\n  930 |     state->rpacket.data = curlx_calloc(1, need_blksize + 2 + 2);\n  931 | \n  932 |     if(!state->rpacket.data)\n  933 |       return CURLE_OUT_OF_MEMORY;\n  934 |   }\n  935 | \n  936 |   if(!state->spacket.data) {\n  937 |     state->spacket.data = curlx_calloc(1, need_blksize + 2 + 2);\n  938 | \n  939 |     if(!state->spacket.data)\n  940 |       return CURLE_OUT_OF_MEMORY;\n  941 |   }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"sftp_download_stat() (libssh2): when stat returns success but with no SIZE flag or filesize==0, the code sets data->req.size/maxdownload = -1 and forces attrs.filesize = 0 (line 1302). Immediately afterwards, if data->state.resume_from is set, the resume logic at lines 1326-1351 uses attrs.filesize (now forced to 0) to validate the resume offset and to compute data->req.size = attrs.filesize - resume_from. For a positive resume_from on such a server, this both rejects the resume with a bogus 'beyond file size (0)' error and, for the negative case, can compute a negative req.size. The override of attrs.filesize to 0 for the 'unknown size' case is incompatible with the subsequent resume arithmetic that assumes attrs.filesize is the real size.","fix":"Skip the resume_from arithmetic (or treat size as unknown) when the server did not report a real file size, instead of running it against a forced filesize of 0.","locations":[{"ref":"lib/vssh/libssh2.c:1290-1352","code":" 1290 |   if(rc ||\n 1291 |      !(attrs.flags & LIBSSH2_SFTP_ATTR_SIZE) ||\n 1292 |      (attrs.filesize == 0)) {\n 1293 |     /*\n 1294 |      * libssh2_sftp_open() did not return an error, so maybe the server\n 1295 |      * does not support stat()\n 1296 |      * OR the server does not return a file size with a stat()\n 1297 |      * OR file size is 0\n 1298 |      */\n 1299 |     data->req.size = -1;\n 1300 |     data->req.maxdownload = -1;\n 1301 |     Curl_pgrsSetDownloadSize(data, -1);\n 1302 |     attrs.filesize = 0; /* might be uninitialized but is read below */\n 1303 |   }\n 1304 |   else {\n 1305 |     curl_off_t size = attrs.filesize;\n 1306 | \n 1307 |     if(size < 0) {\n 1308 |       failf(data, \"Bad file size (%\" FMT_OFF_T \")\", size);\n 1309 |       return CURLE_BAD_DOWNLOAD_RESUME;\n 1310 |     }\n 1311 |     if(data->state.use_range) {\n 1312 |       curl_off_t from;\n 1313 |       CURLcode result = Curl_ssh_range(data, data->state.range, size,\n 1314 |                                        &from, &size);\n 1315 |       if(result)\n 1316 |         return result;\n 1317 | \n 1318 |       libssh2_sftp_seek64(sshc->sftp_handle, (libssh2_uint64_t)from);\n 1319 |     }\n 1320 |     data->req.size = size;\n 1321 |     data->req.maxdownload = size;\n 1322 |     Curl_pgrsSetDownloadSize(data, size);\n 1323 |   }\n 1324 | \n 1325 |   /* We can resume if we can seek to the resume position */\n 1326 |   if(data->state.resume_from) {\n 1327 |     if(data->state.resume_from < 0) {\n 1328 |       /* We are supposed to download the last abs(from) bytes */\n 1329 |       if((curl_off_t)attrs.filesize < -data->state.resume_from) {\n 1330 |         failf(data, \"Offset (%\" FMT_OFF_T \") was beyond file size (%\"\n 1331 |               FMT_OFF_T \")\",\n 1332 |               data->state.resume_from, (curl_off_t)attrs.filesize);\n 1333 |         return CURLE_BAD_DOWNLOAD_RESUME;\n 1334 |       }\n 1335 |       /* download from where? */\n 1336 |       data->state.resume_from += attrs.filesize;\n 1337 |     }\n 1338 |     else {\n 1339 |       if((curl_off_t)attrs.filesize < data->state.resume_from) {\n 1340 |         failf(data, \"Offset (%\" FMT_OFF_T\n 1341 |               \") was beyond file size (%\" FMT_OFF_T \")\",\n 1342 |               data->state.resume_from, (curl_off_t)attrs.filesize);\n 1343 |         return CURLE_BAD_DOWNLOAD_RESUME;\n 1344 |       }\n 1345 |     }\n 1346 |     /* Now store the number of bytes we are expected to download */\n 1347 |     data->req.size = attrs.filesize - data->state.resume_from;\n 1348 |     data->req.maxdownload = attrs.filesize - data->state.resume_from;\n 1349 |     Curl_pgrsSetDownloadSize(data, attrs.filesize - data->state.resume_from);\n 1350 |     libssh2_sftp_seek64(sshc->sftp_handle,\n 1351 |                         (libssh2_uint64_t)data->state.resume_from);\n 1352 |   }"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In config2setopts(), the guard meant to limit REFERER/USERAGENT setup to HTTP(S)/RTSP transfers tests `if(proto_http || proto_rtsp)`. Both `proto_http` and `proto_rtsp` are global protocol-token pointers that are non-NULL whenever the corresponding protocol is built in (independent of the current URL's scheme), so this condition is effectively always true. The intent was clearly `use_proto == proto_http || use_proto == proto_rtsp` (compare with the other *_setopts helpers in this same file which correctly compare `use_proto`). As written, CURLOPT_REFERER and CURLOPT_USERAGENT are set for every transfer regardless of protocol.","fix":"Change the condition to compare the actual scheme of this transfer, e.g. `if(use_proto == proto_http || use_proto == proto_https || use_proto == proto_rtsp)`.","locations":[{"ref":"src/config2setopts.c:919-923","code":"  919 |   if(proto_http || proto_rtsp) {\n  920 |     MY_SETOPT_STR(curl, CURLOPT_REFERER, config->referer);\n  921 |     MY_SETOPT_STR(curl, CURLOPT_USERAGENT, config->useragent ?\n  922 |                   config->useragent : CURL_NAME \"/\" CURL_VERSION);\n  923 |   }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"An empty HTTP Datagram capsule (capsule_length == 1, i.e. payload_len == 0) is consumed and Curl_capsule_process_udp_raw() returns 0 bytes with *err == CURLE_OK. In capsule_cf_recv() this 0/CURLE_OK is propagated up as a recv of 0 bytes, which higher layers interpret as a clean EOF / connection close, even though the tunnel is still alive and more datagrams may follow. A peer sending a zero-length datagram capsule could thus spuriously terminate the transfer.","fix":"Treat a fully-consumed zero-length payload as \"try again\" rather than EOF: set `*err = CURLE_AGAIN; return 0;` for the payload_len == 0 case (after skipping the header bytes), so the caller loops for the next capsule instead of seeing a 0-byte read.","locations":[{"ref":"lib/capsule.c:271-275","code":"  271 |   Curl_bufq_skip(recvbufq, offset);\n  272 |   if(!payload_len) {\n  273 |     *err = CURLE_OK;\n  274 |     return 0;\n  275 |   }"},{"ref":"lib/cf-capsule.c:192-197","code":"  192 |   /* try to extract a complete capsule datagram */\n  193 |   *pnread = Curl_capsule_process_udp_raw(cf, data, &ctx->recvbuf,\n  194 |                                          (unsigned char *)buf, len,\n  195 |                                          &result);\n  196 |   return result;\n  197 | }"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"cf_ip_attempt_restart() returns the CURLcode from a->cf_create(), but the\nresult of the (re)connect attempt is only stored in a->result via\ncf_ip_attempt_connect() and is NOT propagated to the function's return value.\nThe caller in cf_ip_ballers_run() does `result = cf_ip_attempt_restart(...);\nif(result) goto out;` treating only cf_create failures as serious. A hard\nconnect failure during restart (a->result set, return value CURLE_OK) is thus\nnot surfaced as a serious failure here; it is only re-discovered on the next\nevaluate loop. This is likely intended but the divergence between the returned\nvalue and a->result is subtle and easy to misread.","fix":"Clarify intent with a comment, or return a->result (not the cf_create result) so connect failures are handled consistently by the caller.","locations":[{"ref":"lib/cf-ip-happy.c:270-297","code":"  270 | static CURLcode cf_ip_attempt_restart(struct cf_ip_attempt *a,\n  271 |                                       struct Curl_cfilter *cf,\n  272 |                                       struct Curl_easy *data)\n  273 | {\n  274 |   struct Curl_cfilter *wcf;\n  275 |   CURLcode result;\n  276 | \n  277 |   if(a->cf)\n  278 |     Curl_conn_cf_discard_chain(&a->cf, data);\n  279 | \n  280 |   a->result = CURLE_OK;\n  281 |   a->connected = FALSE;\n  282 |   a->inconclusive = FALSE;\n  283 |   a->cf = NULL;\n  284 | \n  285 |   result = a->cf_create(&a->cf, data, cf->conn, &a->addr, a->transport_in,\n  286 |                         a->transport_out);\n  287 |   if(!result) {\n  288 |     bool dummy;\n  289 |     /* the new filter might have sub-filters */\n  290 |     for(wcf = a->cf; wcf; wcf = wcf->next) {\n  291 |       wcf->conn = cf->conn;\n  292 |       wcf->sockindex = cf->sockindex;\n  293 |     }\n  294 |     a->result = cf_ip_attempt_connect(a, data, &dummy);\n  295 |   }\n  296 |   return result;\n  297 | }"},{"ref":"lib/cf-ip-happy.c:514-517","code":"  514 |           result = cf_ip_attempt_restart(a, cf, data);\n  515 |           CURL_TRC_CF(data, cf, \"restarted baller %d -> %d\", i, result);\n  516 |           if(result) /* serious failure */\n  517 |             goto out;"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In cf_socket_send() the DEBUGBUILD partial-write simulation reduces `len` but\nthe EWOULDBLOCK simulation that runs first restores cf->conn->sock[sockindex]\nand returns CURLE_AGAIN correctly. The partial-write branch checks\n`cf->cft != &Curl_cft_udp`; however cf_socket_send is also used for the UNIX\nfilter (Curl_cft_unix) and the TCP-accept filter. For UNIX/accept the partial\nwrite simulation applies (only UDP is excluded). That is presumably acceptable\nfor stream sockets, but the guard is by-filter-identity rather than by\nsocktype, so a future stream filter reusing cf_socket_send is silently included.\nMinor maintainability concern, not a runtime bug.","fix":"Gate the simulation on the socket type (SOCK_STREAM) rather than on cf->cft != &Curl_cft_udp, to be robust to new filters.","locations":[{"ref":"lib/cf-socket.c:1480-1486","code":" 1480 |   if(cf->cft != &Curl_cft_udp && ctx->wpartial_percent > 0 && len > 8) {\n 1481 |     len = len * ctx->wpartial_percent / 100;\n 1482 |     if(!len)\n 1483 |       len = 1;\n 1484 |     CURL_TRC_CF(data, cf, \"send(len=%zu) SIMULATE partial write of %zu bytes\",\n 1485 |                 orig_len, len);\n 1486 |   }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In parse_netscape() field 2 (path), the test `strncmp(\"TRUE\", ptr, len) && strncmp(\"FALSE\", ptr, len)` uses the field length `len` as the strncmp limit. A path field whose value is a strict prefix of \"TRUE\"/\"FALSE\" (e.g. the 2-byte string \"TR\" or single \"F\") compares equal under strncmp with that short len and is therefore misclassified as a boolean field, causing the real path to be discarded and a default \"/\" path used plus a spurious extra field count. Crafted/odd cookie files can thus get their path silently dropped.","fix":"Compare with exact length, e.g. require `!(len == 4 && !strncmp(\"TRUE\", ptr, 4)) && !(len == 5 && !strncmp(\"FALSE\", ptr, 5))`, so only the full tokens TRUE/FALSE are treated as booleans.","locations":[{"ref":"lib/cookie.c:698-714","code":"  698 |     case 2:\n  699 |       /* The file format allows the path field to remain not filled in */\n  700 |       if(strncmp(\"TRUE\", ptr, len) && strncmp(\"FALSE\", ptr, len)) {\n  701 |         /* only if the path does not look like a boolean option! */\n  702 |         co->path = sanitize_cookie_path(ptr, len);\n  703 |         if(!co->path)\n  704 |           return CURLE_OUT_OF_MEMORY;\n  705 |         break;\n  706 |       }\n  707 |       else {\n  708 |         /* this does not look like a path, make one up! */\n  709 |         co->path = curlx_strdup(\"/\");\n  710 |         if(!co->path)\n  711 |           return CURLE_OUT_OF_MEMORY;\n  712 |       }\n  713 |       fields++; /* add a field and fall down to secure */\n  714 |       FALLTHROUGH();"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the fnmatch fallback parser, setcharorrange() reads through the pattern with\npost-increment dereferences without bounds checks: `unsigned char endrange =\n*p++; if(endrange == '\\\\') endrange = *p++;`. For a pattern ending in a\ndangling range like \"[a-\\\" the code reads the NUL terminator into endrange,\nthen (because endrange=='\\\\' is false for NUL) proceeds; but for \"[a-\" it\nreads the NUL as endrange (value 0), and the subsequent `endrange >= c` test\nfails so the range is not applied. The reads stay within the NUL-terminated\nbuffer by one byte at most, but the function can advance `*pp` (= p) past the\nNUL terminator when a backslash escape consumes it, after which the caller's\nloop may dereference beyond the string.","fix":"After reading each character in setcharorrange(), stop (do not advance or apply the range) if the byte read is the NUL terminator, so the pattern pointer never moves past end-of-string.","locations":[{"ref":"lib/curl_fnmatch.c:137-156","code":"  137 | static void setcharorrange(const unsigned char **pp, unsigned char *charset)\n  138 | {\n  139 |   const unsigned char *p = (*pp)++;\n  140 |   unsigned char c = *p++;\n
