DDED as %s%s\", s,\n  493 |               (what & CURL_POLL_IN) ? \"IN\" : \"\",\n  494 |               (what & CURL_POLL_OUT) ? \"OUT\" : \"\");\n  495 |       }\n  496 |       else\n  497 |         return CURLE_OUT_OF_MEMORY;\n  498 |     }\n  499 |   }"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In curl_easy_unescape(), when the decoded output length exceeds INT_MAX the\ncode frees the result buffer (str becomes NULL via curlx_safefree) but does\nNOT assign anything to *outlength. The function then returns NULL, which is\ncorrect, but a caller that passed a non-NULL outlength and only checks the\nreturned pointer would read an uninitialized *outlength. More importantly the\ndocumented contract (\"Returns a pointer ... with length given in *olen\") is\nviolated silently on this error path: there is no way for the caller to learn\nthe decode failed via outlength, and the value is left as whatever was there\nbefore. The success path always writes *outlength, so the asymmetry is\nsurprising. Setting *outlength to 0 (or simply leaving str non-NULL would be\nworse) would make behavior consistent.","fix":"In the too-large branch set `*outlength = 0;` (or document the unset behavior). Currently only str is freed and *outlength is left untouched.","locations":[{"ref":"lib/escape.c:176-184","code":"  176 |     if(outlength) {\n  177 |       if(outputlen <= (size_t)INT_MAX)\n  178 |         *outlength = curlx_uztosi(outputlen);\n  179 |       else\n  180 |         /* too large to return in an int, fail! */\n  181 |         curlx_safefree(str);\n  182 |     }\n  183 |   }\n  184 |   return str;"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In mqtt_connect() the return value of Curl_rand_alnum() (used to fill the random part of the generated MQTT client id) is stored in `result` but never checked before it is potentially overwritten by add_client_id()'s success path. If Curl_rand_alnum() fails, the random bytes are not produced. In practice the subsequent add_client_id() length check (client_id must be exactly MQTT_CLIENTID_LEN) catches the still-\"curl\" id and the function errors out, so there is no memory-safety impact, but a failing RNG is silently turned into a misleading \"Client ID length mismatched\" error instead of being reported as the real failure, and the dependency on the length check to mask an unchecked RNG error is fragile.","fix":"Check the result of Curl_rand_alnum() immediately and goto end / return on error, e.g. `result = Curl_rand_alnum(...); if(result) goto end;` before calling add_client_id().","locations":[{"ref":"lib/mqtt.c:308-316","code":"  308 |   result = Curl_rand_alnum(data, (unsigned char *)&client_id[clen],\n  309 |                            MQTT_CLIENTID_LEN - clen + 1);\n  310 |   /* add client id */\n  311 |   rc = add_client_id(client_id, strlen(client_id), packet, pos + 1);\n  312 |   if(rc) {\n  313 |     failf(data, \"Client ID length mismatched: [%zu]\", strlen(client_id));\n  314 |     result = CURLE_WEIRD_SERVER_REPLY;\n  315 |     goto end;\n  316 |   }"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In Curl_pp_statemach(), a select/poll error (rc == -1) is reported as CURLE_OUT_OF_MEMORY: `failf(data, \"select/poll error\"); result = CURLE_OUT_OF_MEMORY;`. A poll/select failure is not an out-of-memory condition; returning CURLE_OUT_OF_MEMORY misleads callers and users. This mislabeling is purely an error-code mismatch (the FTP/other pingpong consumers propagate it unchanged).","fix":"Return a more appropriate code such as CURLE_RECV_ERROR (or a dedicated select error code) instead of CURLE_OUT_OF_MEMORY.","locations":[{"ref":"lib/pingpong.c:108-111","code":"  108 |   if(rc == -1) {\n  109 |     failf(data, \"select/poll error\");\n  110 |     result = CURLE_OUT_OF_MEMORY;\n  111 |   }"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"wakeup_inet() error path does `sclose(socks[0]); sclose(socks[1]);` after\n`socks[0] = socks[1] = CURL_SOCKET_BAD;` is only set at the very start (line\n167). Between obtaining `socks[0]` (line 192) and `socks[1]` (line 205) several\ngoto error jumps occur. On the early failures (e.g. bind/getsockname/listen\nfail before socks[0] is created) socks[0]/socks[1] are still CURL_SOCKET_BAD so\nsclose() is a no-op - that is fine. But after a successful accept sets\nsocks[1], a later failure in the read-verify loop jumps to error and closes\nlistener, socks[0], socks[1] - correct. No leak, but note that swrite() at line\n219 ignores its return value; a failed write leaves the subsequent poll/sread\nloop to time out (up to 60s) rather than failing fast.","fix":"Check the swrite() return value and goto error on failure instead of relying on the 60s read-loop timeout.","locations":[{"ref":"lib/socketpair.c:218-219","code":"  218 |     /* write data to the socket */\n  219 |     swrite(socks[0], rnd, sizeof(rnd));"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In telnet sendsuboption() (CURL_TELOPT_NAWS branch) the data is sent to the socket with three separate swrite() calls (the 3-byte header, the 4 window-size bytes via send_telnet_data(), and the 2-byte footer). The return value of swrite() is only checked for < 0; a short write (returning fewer than the requested bytes, which is normal for non-blocking or pressured sockets) is ignored, so a partially-sent suboption is treated as success and the telnet sub-negotiation stream silently becomes corrupt. The same unchecked-short-write pattern exists in send_negotiation() and suboption().","fix":"Either send the whole suboption through a single path that loops until all bytes are written (like send_telnet_data() does), or verify that bytes_written equals the requested length and fail/retry on a short write.","locations":[{"ref":"lib/telnet.c:707-721","code":"  707 |     /* we send the header of the suboption... */\n  708 |     bytes_written = swrite(conn->sock[FIRSTSOCKET], tn->subbuffer, 3);\n  709 |     if(bytes_written < 0) {\n  710 |       err = SOCKERRNO;\n  711 |       failf(data, \"Sending data failed (%d)\", err);\n  712 |     }\n  713 |     /* ... then the window size with the send_telnet_data() function\n  714 |        to deal with 0xFF cases ... */\n  715 |     send_telnet_data(data, tn, (const char *)tn->subbuffer + 3, 4);\n  716 |     /* ... and the footer */\n  717 |     bytes_written = swrite(conn->sock[FIRSTSOCKET], tn->subbuffer + 7, 2);\n  718 |     if(bytes_written < 0) {\n  719 |       err = SOCKERRNO;\n  720 |       failf(data, \"Sending data failed (%d)\", err);\n  721 |     }"},{"ref":"lib/telnet.c:230-247","code":"  230 | static void send_negotiation(struct Curl_easy *data, int cmd, int option)\n  231 | {\n  232 |   unsigned char buf[3];\n  233 |   ssize_t bytes_written;\n  234 |   struct connectdata *conn = data->conn;\n  235 | \n  236 |   buf[0] = CURL_IAC;\n  237 |   buf[1] = (unsigned char)cmd;\n  238 |   buf[2] = (unsigned char)option;\n  239 | \n  240 |   bytes_written = swrite(conn->sock[FIRSTSOCKET], buf, 3);\n  241 |   if(bytes_written < 0) {\n  242 |     int err = SOCKERRNO;\n  243 |     failf(data, \"Sending data failed (%d)\", err);\n  244 |   }\n  245 | \n  246 |   printoption(data, \"SENT\", cmd, option);\n  247 | }"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Curl_auth_gsasl_token() ignores the GSASL return distinction beyond OK/NEEDS_MORE and always sets the output bufref to (response, outlen) even when gsasl_step returned GSASL_OK with response==NULL/outlen==0. More importantly, on GSASL_NEEDS_MORE the function returns CURLE_OK with no indication to the caller that another round is required, relying entirely on protocol-level looping. While functional, the response buffer ownership (freed via gsasl_free) is set unconditionally; if gsasl_step set response to NULL this stores a NULL with a free callback which is benign but the unchecked outlen/response pairing is fragile.","fix":"Explicitly handle response==NULL (set an empty bufref without a free callback) and document/propagate the NEEDS_MORE state so callers cannot misinterpret a CURLE_OK with no token.","locations":[{"ref":"lib/vauth/gsasl.c:93-111","code":"   93 | CURLcode Curl_auth_gsasl_token(struct Curl_easy *data,\n   94 |                                const struct bufref *chlg,\n   95 |                                struct gsasldata *gsasl,\n   96 |                                struct bufref *out)\n   97 | {\n   98 |   int res;\n   99 |   char *response;\n  100 |   size_t outlen;\n  101 | \n  102 |   res = gsasl_step(gsasl->client, Curl_bufref_ptr(chlg), Curl_bufref_len(chlg),\n  103 |                    &response, &outlen);\n  104 |   if(res != GSASL_OK && res != GSASL_NEEDS_MORE) {\n  105 |     failf(data, \"GSASL step: %s\", gsasl_strerror(res));\n  106 |     return CURLE_BAD_CONTENT_ENCODING;\n  107 |   }\n  108 | \n  109 |   Curl_bufref_set(out, response, outlen, gsasl_free);\n  110 |   return CURLE_OK;\n  111 | }"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Curl_auth_create_ntlm_type3_message can leak/abort inconsistently: in the NTLMv2 branch several early 'return result;' statements (after Curl_rand, Curl_ntlm_core_mk_nt_hash, Curl_ntlm_core_mk_ntlmv2_hash, Curl_ntlm_core_mk_lmv2_resp, Curl_ntlm_core_mk_ntlmv2_resp) return before reaching the 'error:' label. On the mk_ntlmv2_resp failure it sets ntlmv2resp via the out-param only on success, so those early returns are fine, but they also skip the Curl_auth_cleanup_ntlm(ntlm) cleanup performed at the error label, leaving ntlm->target_info allocated for the connection-scoped ntlm struct. Subsequent reuse calls Curl_auth_cleanup_ntlm at type1 generation, so it is eventually freed, but within a single failed type-3 attempt the target_info remains allocated and the documented post-condition (cleanup) is not honored on these error paths.","fix":"Replace the early 'return result;' statements in the NTLMv2 branch with 'goto error;' so Curl_auth_cleanup_ntlm and ntlmv2resp free run on every exit path.","locations":[{"ref":"lib/vauth/ntlm.c:618-644","code":"  618 |     result = Curl_rand(data, entropy, 8);\n  619 |     if(result)\n  620 |       return result;\n  621 | \n  622 |     result = Curl_ntlm_core_mk_nt_hash(passwdp, ntbuffer);\n  623 |     if(result)\n  624 |       return result;\n  625 | \n  626 |     result = Curl_ntlm_core_mk_ntlmv2_hash(user, userlen, domain, domlen,\n  627 |                                            ntbuffer, ntlmv2hash);\n  628 |     if(result)\n  629 |       return result;\n  630 | \n  631 |     /* LMv2 response */\n  632 |     result = Curl_ntlm_core_mk_lmv2_resp(ntlmv2hash, entropy,\n  633 |                                          &ntlm->nonce[0], lmresp);\n  634 |     if(result)\n  635 |       return result;\n  636 | \n  637 |     /* NTLMv2 response */\n  638 |     result = Curl_ntlm_core_mk_ntlmv2_resp(ntlmv2hash, entropy,\n  639 |                                            ntlm, &ntlmv2resp, &ntresplen);\n  640 |     if(result)\n  641 |       return result;\n  642 | \n  643 |     ptr_ntresp = ntlmv2resp;\n  644 |   }"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"qlog_callback() (ngtcp2) writes datalen bytes with write() and only checks for rc == -1 to disable further logging. A short write (0 <= rc < datalen, possible for a regular file on a full filesystem or signal) is ignored, silently truncating the qlog without disabling it; subsequent writes continue at the wrong offset producing a corrupt qlog file. This is diagnostic-only output so impact is low.","fix":"Treat a short write (rc >= 0 && (size_t)rc < datalen) the same as an error, or loop to write the remaining bytes.","locations":[{"ref":"lib/vquic/curl_ngtcp2.c:446-460","code":"  446 | static void qlog_callback(void *user_data, uint32_t flags,\n  447 |                           const void *data, size_t datalen)\n  448 | {\n  449 |   struct Curl_cfilter *cf = user_data;\n  450 |   struct cf_ngtcp2_ctx *ctx = cf->ctx;\n  451 |   (void)flags;\n  452 |   if(ctx->qlogfd != -1) {\n  453 |     ssize_t rc = write(ctx->qlogfd, data, datalen);\n  454 |     if(rc == -1) {\n  455 |       /* on write error, stop further write attempts */\n  456 |       curlx_close(ctx->qlogfd);\n  457 |       ctx->qlogfd = -1;\n  458 |     }\n  459 |   }\n  460 | }"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In recvmmsg_packets() the inner loop advances `pkts` by `(msg_len + gso_size - 1) / gso_size`, but the read loop guard is `while(pkts < max_pkts)` and `recvmmsg()` is asked for `n = CURLMIN(CURLMIN(MMSG_NUM, IOV_MAX), max_pkts)` messages. When GRO is active, a single recvmmsg datagram may contain many coalesced packets (UDP_GRO_CNT_MAX up to 64), so a single recvmmsg() call can make `pkts` jump far beyond `max_pkts`. The caller (cf_process_ingress / cf_progress_ingress) passes max_pkts=1000 as an upper bound to avoid starving other work, but a burst of GRO datagrams can process up to MMSG_NUM*UDP_GRO_CNT_MAX = 16*64 ~ 1024 coalesced packets *per* recvmmsg call beyond the limit. This is a soft fairness issue rather than a correctness bug, but the bound is not honored as tightly as the recvmsg/recvfrom variants which increment per-datagram.","fix":"Either cap `n` based on remaining `max_pkts` accounting for the worst-case GRO expansion, or break out of the loop as soon as `pkts >= max_pkts` after processing each mmsg entry (the inner `for` already runs to mcount regardless of max_pkts).","locations":[{"ref":"lib/vquic/vquic.c:470-525","code":"  470 |   while(pkts < max_pkts) {\n  471 |     n = (int)CURLMIN(CURLMIN(MMSG_NUM, IOV_MAX), max_pkts);\n  472 |     memset(&mmsg, 0, sizeof(mmsg));\n  473 |     for(i = 0; i < n; ++i) {\n  474 |       msg_iov[i].iov_base = bufs[i];\n  475 |       msg_iov[i].iov_len = (int)sizeof(bufs[i]);\n  476 |       mmsg[i].msg_hdr.msg_iov = &msg_iov[i];\n  477 |       mmsg[i].msg_hdr.msg_iovlen = 1;\n  478 |       mmsg[i].msg_hdr.msg_name = &remote_addr[i];\n  479 |       mmsg[i].msg_hdr.msg_namelen = sizeof(remote_addr[i]);\n  480 |       mmsg[i].msg_hdr.msg_control = &msg_ctrl[i * CMSG_SPACE(sizeof(int))];\n  481 |       mmsg[i].msg_hdr.msg_controllen = CMSG_SPACE(sizeof(int));\n  482 |     }\n  483 | \n  484 |     while((mcount = recvmmsg(qctx->sockfd, mmsg, n, 0, NULL)) == -1 &&\n  485 |           (SOCKERRNO == SOCKEINTR || SOCKERRNO == SOCKEMSGSIZE))\n  486 |       ;\n  487 |     if(mcount == -1) {\n  488 |       if(SOCKERRNO == EAGAIN || SOCKERRNO == SOCKEWOULDBLOCK) {\n  489 |         CURL_TRC_CF(data, cf, \"ingress, recvmmsg -> EAGAIN\");\n  490 |         goto out;\n  491 |       }\n  492 |       if(!cf->connected && SOCKERRNO == SOCKECONNREFUSED) {\n  493 |         struct ip_quadruple ip;\n  494 |         if(!Curl_cf_socket_peek(cf->next, data, NULL, NULL, &ip))\n  495 |           failf(data, \"QUIC: connection to %s port %u refused\",\n  496 |                 ip.remote_ip, ip.remote_port);\n  497 |         result = CURLE_COULDNT_CONNECT;\n  498 |         goto out;\n  499 |       }\n  500 |       curlx_strerror(SOCKERRNO, errstr, sizeof(errstr));\n  501 |       failf(data, \"QUIC: recvmmsg() unexpectedly returned %d (errno=%d; %s)\",\n  502 |             mcount, SOCKERRNO, errstr);\n  503 |       result = CURLE_RECV_ERROR;\n  504 |       goto out;\n  505 |     }\n  506 | \n  507 |     VERBOSE(++calls);\n  508 |     for(i = 0; i < mcount; ++i) {\n  509 |       /* A zero-length UDP packet is no QUIC packet. Ignore. */\n  510 |       if(!mmsg[i].msg_len)\n  511 |         continue;\n  512 |       total_nread += mmsg[i].msg_len;\n  513 | \n  514 |       gso_size = vquic_msghdr_get_udp_gro(&mmsg[i].msg_hdr);\n  515 |       if(gso_size == 0)\n  516 |         gso_size = mmsg[i].msg_len;\n  517 | \n  518 |       result = recv_cb(bufs[i], mmsg[i].msg_len, gso_size,\n  519 |                        mmsg[i].msg_hdr.msg_name,\n  520 |                        mmsg[i].msg_hdr.msg_namelen, 0, userp);\n  521 |       if(result)\n  522 |         goto out;\n  523 |       pkts += (mmsg[i].msg_len + gso_size - 1) / gso_size;\n  524 |     }\n  525 |   }"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"ossl_keylog_callback() and ossl_log_tls12_secret() ignore the boolean result of Curl_tls_keylog_write_line()/Curl_tls_keylog_write(). A failed keylog write (e.g. the file handle became invalid) is silently dropped. This is informational logging so low severity, but combined with keylog_file_fp being a process-global static with no locking, simultaneous TLS handshakes from multiple threads call fputs() on the same FILE* concurrently. fputs itself is generally thread-safe per-call on POSIX, but interleaving of separate write_line/write calls can corrupt the SSLKEYLOGFILE output across threads.","fix":"Document the keylog file as best-effort/diagnostic, and consider serializing writes (the file is a process-global) if multi-threaded keylogging is to be supported.","locations":[{"ref":"lib/vtls/keylog.c:99-103","code":"   99 |   /* Using fputs here instead of fprintf since libcurl's fprintf replacement\n  100 |      may not be thread-safe. */\n  101 |   fputs(buf, keylog_file_fp);\n  102 |   return TRUE;\n  103 | }"},{"ref":"lib/vtls/keylog.c:143-146","code":"  143 |   /* Using fputs here instead of fprintf since libcurl's fprintf replacement\n  144 |      may not be thread-safe. */\n  145 |   fputs((char *)line, keylog_file_fp);\n  146 |   return TRUE;"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In X509V3_ext(), when BIO_new(BIO_s_mem()) fails the function does `return result`, but at that point `result` is still CURLE_OK (set at the top of the function and not modified before the first loop iteration). An allocation failure for the memory BIO is therefore silently reported as success, and all remaining certificate extensions for that certificate are silently dropped from the gathered cert info. The intent is clearly to bail out, but the returned status hides the OOM and produces an incomplete certinfo without signalling an error.","fix":"On BIO_new() failure return an explicit error, e.g. `result = CURLE_OUT_OF_MEMORY; return result;` (or break out of the loop and propagate the failure), instead of returning the stale CURLE_OK.","locations":[{"ref":"lib/vtls/openssl.c:242-245","code":"  242 |     BIO *bio_out = BIO_new(BIO_s_mem());\n  243 | \n  244 |     if(!bio_out)\n  245 |       return result;"}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"ossl_init_certinfo()/Curl_ssl_init_certinfo() casts the caller-supplied `num` to size_t for curlx_calloc((size_t)num, ...) without validating that num >= 0. A negative num would be converted to a huge size_t and either fail allocation or, if num==0, allocate a zero-element table while still being used. The only in-tree caller (ossl_certchain) bounds numcerts to (0, MAX_ALLOWED_CERT_AMOUNT], so it is currently safe, but the public-looking helper performs no defensive check and a future/other caller passing 0 or a negative value would set ci->num_of_certs accordingly and lead to out-of-range certinfo indexing guarded only by a DEBUGASSERT.","fix":"Validate `num` (reject num <= 0 with CURLE_BAD_FUNCTION_ARGUMENT) before the (size_t) cast and before storing it in ci->num_of_certs.","locations":[{"ref":"lib/vtls/vtls.c:640-657","code":"  640 | CURLcode Curl_ssl_init_certinfo(struct Curl_easy *data, int num)\n  641 | {\n  642 |   struct curl_certinfo *ci = &data->info.certs;\n  643 |   struct curl_slist **table;\n  644 | \n  645 |   /* Free any previous certificate information structures */\n  646 |   Curl_ssl_free_certinfo(data);\n  647 | \n  648 |   /* Allocate the required certificate information structures */\n  649 |   table = curlx_calloc((size_t)num, sizeof(struct curl_slist *));\n  650 |   if(!table)\n  651 |     return CURLE_OUT_OF_MEMORY;\n  652 | \n  653 |   ci->num_of_certs = num;\n  654 |   ci->certinfo = table;\n  655 | \n  656 |   return CURLE_OK;\n  657 | }"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Curl_extract_certinfo() inits the dynbuf `out` (curlx_dyn_init) and then, if Curl_parseX509() fails, executes `return CURLE_PEER_FAILED_VERIFICATION;` directly instead of going through the `done:` label. While curlx_dyn_init() itself does not allocate (so no heap leak), this bypasses the consistent `goto done` cleanup pattern used by every other error exit in the function and is fragile: any future change that allocates during/after init, or before the parse, would leak. It is also an inconsistent error path versus the rest of the function.","fix":"Replace the bare `return` with `result = CURLE_PEER_FAILED_VERIFICATION; goto done;` so cleanup stays centralized.","locations":[{"ref":"lib/vtls/x509asn1.c:1104-1109","code":" 1104 |   curlx_dyn_init(&out, CURL_X509_STR_MAX);\n 1105 |   /* Prepare the certificate information for curl_easy_getinfo(). */\n 1106 | \n 1107 |   /* Extract the certificate ASN.1 elements. */\n 1108 |   if(Curl_parseX509(&cert, beg, end))\n 1109 |     return CURLE_PEER_FAILED_VERIFICATION;"}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"ftp_setopts() declares `CURLcode result;` uninitialized and returns it at the end. The value is only set by the MY_SETOPT_STR macro invocations (which return early on hard errors and otherwise assign `result`). The final `if(config->ftp_pret) my_setopt_long(...)` does not touch `result`, so the returned value is whatever the last MY_SETOPT_STR (CURLOPT_FTP_ALTERNATIVE_TO_USER, line 661) left. That call is unconditional so `result` is technically always assigned before the return, but relying on macro side effects for initialization is fragile: any reordering that makes the last MY_SETOPT_STR conditional would return an uninitialized value. Compare ssl/http/proxy setopt helpers which initialize `result = CURLE_OK;`.","fix":"Initialize `CURLcode result = CURLE_OK;` at declaration to make the function robust regardless of which setopt calls execute.","locations":[{"ref":"src/config2setopts.c:637-668","code":"  637 | static CURLcode ftp_setopts(struct OperationConfig *config, CURL *curl,\n  638 |                             const char *use_proto)\n  639 | {\n  640 |   CURLcode result;\n  641 | \n  642 |   if(use_proto != proto_ftp && use_proto != proto_ftps)\n  643 |     return CURLE_OK;\n  644 | \n  645 |   MY_SETOPT_STR(curl, CURLOPT_FTPPORT, config->ftpport);\n  646 | \n  647 |   if(config->disable_epsv)\n  648 |     /* disable it */\n  649 |     my_setopt_long(curl, CURLOPT_FTP_USE_EPSV, 0);\n  650 | \n  651 |   if(config->disable_eprt)\n  652 |     /* disable it */\n  653 |     my_setopt_long(curl, CURLOPT_FTP_USE_EPRT, 0);\n  654 | \n  655 |   if(config->ftp_ssl_ccc)\n  656 |     my_setopt_enum(curl, CURLOPT_FTP_SSL_CCC, config->ftp_ssl_ccc_mode);\n  657 | \n  658 |   MY_SETOPT_STR(curl, CURLOPT_FTP_ACCOUNT, config->ftp_account);\n  659 |   my_setopt_long(curl, CURLOPT_FTP_SKIP_PASV_IP, config->ftp_skip_ip);\n  660 |   my_setopt_long(curl, CURLOPT_FTP_FILEMETHOD, config->ftp_filemethod);\n  661 |   MY_SETOPT_STR(curl, CURLOPT_FTP_ALTERNATIVE_TO_USER,\n  662 |                 config->ftp_alternative_to_user);\n  663 | \n  664 |   if(config->ftp_pret)\n  665 |     my_setopt_long(curl, CURLOPT_FTP_USE_PRET, 1);\n  666 | \n  667 |   return result;\n  668 | }"}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"In tool_debug_cb(), when opening the trace dump file, `global->trace_stream = curlx_fopen(global->trace_dump, FOPEN_WRITETEXT);` sets `global->trace_fopened = TRUE;` unconditionally, even when curlx_fopen() returns NULL (open failed). This leaves trace_fopened TRUE while trace_stream is NULL, an inconsistent state. It is not currently exploitable because the cleanup in tool_cfgable.c guards with `if(global->trace_fopened && global->trace_stream)` before fclose, but the flag should still only be set on a successful open to keep the invariant clean.","fix":"Only set `global->trace_fopened = TRUE;` after verifying the returned stream is non-NULL, e.g. set it inside an `if(global->trace_stream)` block.","locations":[{"ref":"src/tool_cb_dbg.c:176-179","code":"  176 |     else {\n  177 |       global->trace_stream = curlx_fopen(global->trace_dump, FOPEN_WRITETEXT);\n  178 |       global->trace_fopened = TRUE;\n  179 |     }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"cf_haproxy_adjust_pollset() dereferences cf->next->connected without first\nchecking cf->next for NULL. While the HAPROXY filter is always inserted above\na connected sub-chain in normal operation, every other adjust_pollset / connect\ncallback in these files defensively checks cf->next (e.g. cf_dns_adjust_pollset,\nCurl_cf_def_*). A close() that discards the sub-chain followed by a pollset\nadjust would NULL-deref here.","fix":"Guard with `if(cf->next && cf->next->connected && !cf->connected)` before dereferencing cf->next.","locations":[{"ref":"lib/cf-haproxy.c:186-197","code":"  186 | static CURLcode cf_haproxy_adjust_pollset(struct Curl_cfilter *cf,\n  187 |                                           struct Curl_easy *data,\n  188 |                                           struct easy_pollset *ps)\n  189 | {\n  190 |   if(cf->next->connected && !cf->connected) {\n  191 |     /* If we are not connected, but the filter \"below\" is\n  192 |      * and not waiting on something, we are sending. */\n  193 |     return Curl_pollset_set_out_only(\n  194 |       data, ps, Curl_conn_cf_get_socket(cf, data));\n  195 |   }\n  196 |   return CURLE_OK;\n  197 | }"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"In the Windows SSPI DIGEST-MD5 and HTTP-Digest paths, CompleteAuthToken() is called with the credentials handle (&credentials) instead of the security context handle. The SSPI CompleteAuthToken contract requires the partially formed context handle (phContext), not a credential handle. Compare with ntlm_sspi.c (CompleteAuthToken(ntlm->context, ...)) and spnego_sspi.c (CompleteAuthToken(nego->context, ...)) which correctly pass the context. Although DIGEST-SSP typically does not return SEC_I_COMPLETE_NEEDED, this is incorrect API usage and would misbehave if the package ever requested completion.","fix":"Pass the context handle to CompleteAuthToken (e.g. &context in the MD5 path and digest->http_context in the HTTP path), matching the NTLM and SPNEGO SSPI implementations.","locations":[{"ref":"lib/vauth/digest_sspi.c:195-197","code":"  195 |   if(status == SEC_I_COMPLETE_NEEDED ||\n  196 |      status == SEC_I_COMPLETE_AND_CONTINUE)\n  197 |     Curl_pSecFn->CompleteAuthToken(&credentials, &resp_desc);"},{"ref":"lib/vauth/digest_sspi.c:567-569","code":"  567 |     if(status == SEC_I_COMPLETE_NEEDED ||\n  568 |        status == SEC_I_COMPLETE_AND_CONTINUE)\n  569 |       Curl_pSecFn->CompleteAuthToken(&credentials, &resp_desc);"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"use_certificate_blob(), use_privatekey_blob() and use_certificate_chain_blob() are declared to return an `int` in the 0/1 convention used by OpenSSL's SSL_CTX_use_* functions (the caller client_cert() compares the result with `!= 1`). However on BIO_new_mem_buf() failure they `return CURLE_OUT_OF_MEMORY` (value 27), an enum value that is not part of the 0/1 contract. It happens to work because the caller only checks `!= 1`, but mixing a CURLcode value into an int success/failure flag is fragile and misleading; the resulting error is reported as a generic CERTPROBLEM rather than out-of-memory.","fix":"Return 0 (the failure value for these int-returning helpers) on BIO allocation failure, and let the caller map it to the appropriate error, or change the helpers to return CURLcode consistently.","locations":[{"ref":"lib/vtls/openssl.c:907-909","code":"  907 |   BIO *in = BIO_new_mem_buf(blob->data, (int)(blob->len));\n  908 |   if(!in)\n  909 |     return CURLE_OUT_OF_MEMORY;"},{"ref":"lib/vtls/openssl.c:941-943","code":"  941 |   BIO *in = BIO_new_mem_buf(blob->data, (int)(blob->len));\n  942 |   if(!in)\n  943 |     return CURLE_OUT_OF_MEMORY;"},{"ref":"lib/vtls/openssl.c:969-971","code":"  969 |   BIO *in = BIO_new_mem_buf(blob->data, (int)(blob->len));\n  970 |   if(!in)\n  971 |     return CURLE_OUT_OF_MEMORY;"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"cw_out_append() calls cw_out_bufs_len(ctx) which walks the entire linked list of\nbuffered cw_out_buf chunks summing curlx_dyn_len() for each. It is called on\nevery append while a transfer is paused (or partially written). For a transfer\nthat pauses and accumulates many buffer chunks, this makes appending O(n) per\ncall and the overall buffering O(n^2) in the number of chunks. The trace call on\nline 350-351 also evaluates cw_out_bufs_len() a second time (even though\nCURL_TRC_WRITE may be compiled out, the argument is still evaluated when tracing\nis enabled).","fix":"Maintain a running total of buffered bytes in cw_out_ctx (incremented on append, decremented on flush, similar to cw-pause's buf_total) and compare against DYN_PAUSE_BUFFER instead of recomputing the length by walking the list each time.","locations":[{"ref":"lib/cw-out.c:345-355","code":"  345 | static CURLcode cw_out_append(struct cw_out_ctx *ctx,\n  346 |                               struct Curl_easy *data,\n  347 |                               cw_out_type otype,\n  348 |                               const char *buf, size_t blen)\n  349 | {\n  350 |   CURL_TRC_WRITE(data, \"[OUT] paused, buffering %zu more bytes (%zu/%d)\",\n  351 |                  blen, cw_out_bufs_len(ctx), DYN_PAUSE_BUFFER);\n  352 |   if(cw_out_bufs_len(ctx) + blen > DYN_PAUSE_BUFFER) {\n  353 |     failf(data, \"pause buffer not large enough -> CURLE_TOO_LARGE\");\n  354 |     return CURLE_TOO_LARGE;\n  355 |   }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"When `max_entries` is set, the entry-pointer array growth churns. The growth\ntest is `dynhds->hds_len + 1 >= dynhds->hds_allc`, which triggers a realloc when\nthere is still one free slot. When `nallc` is then clamped to `max_entries`\n(line 152-153), the new allocation can equal the current `hds_allc`, so every\nsubsequent add near the cap reallocates and memcpy-copies the whole array to a\nsame-sized buffer without ever growing it, until the top-of-function\n`hds_len >= max_entries` guard finally rejects the add. For a dynhds used near\nits max_entries limit this produces repeated full-array copies on the hot add\npath.","fix":"Use `dynhds->hds_len >= dynhds->hds_allc` as the growth test, and skip the realloc when the clamped `nallc` is not strictly greater than the current `hds_allc`.","locations":[{"ref":"lib/dynhds.c:148-165","code":"  148 |   if(dynhds->hds_len + 1 >= dynhds->hds_allc) {\n  149 |     size_t nallc = dynhds->hds_len + 16;\n  150 |     struct dynhds_entry **nhds;\n  151 | \n  152 |     if(dynhds->max_entries && nallc > dynhds->max_entries)\n  153 |       nallc = dynhds->max_entries;\n  154 | \n  155 |     nhds = curlx_calloc(nallc, sizeof(struct dynhds_entry *));\n  156 |     if(!nhds)\n  157 |       goto out;\n  158 |     if(dynhds->hds) {\n  159 |       memcpy(nhds, dynhds->hds,\n  160 |              dynhds->hds_len * sizeof(struct dynhds_entry *));\n  161 |       curlx_safefree(dynhds->hds);\n  162 |     }\n  163 |     dynhds->hds = nhds;\n  164 |     dynhds->hds_allc = nallc;\n  165 |   }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"The hash slot table is allocated with the wrong element size. `h->table` is\ndeclared as `struct uint_hash_entry **` (an array of pointers), but the\nallocation uses `sizeof(*he)` where `he` has type `struct uint_hash_entry *`,\nso `*he` is the whole entry struct. This allocates\n`slots * sizeof(struct uint_hash_entry)` bytes instead of\n`slots * sizeof(struct uint_hash_entry *)`. The result is functionally correct\n(it over-allocates, never under-allocates) but wastes memory for every uint\nhash table (the struct is several times larger than a pointer). Compare with\nlib/hash.c:170 which correctly uses `sizeof(struct Curl_hash_element *)`.","fix":"Allocate `curlx_calloc(h->slots, sizeof(*h->table))` (or `sizeof(struct uint_hash_entry *)`) to size the pointer array correctly.","locations":[{"ref":"lib/uint-hash.c:120-124","code":"  120 |   if(!h->table) {\n  121 |     h->table = curlx_calloc(h->slots, sizeof(*he));\n  122 |     if(!h->table)\n  123 |       return FALSE; /* OOM */\n  124 |   }"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"ws_enc_write_payload() masks and writes the WebSocket payload one single byte at a time: for each input byte it XORs with the mask and calls Curl_bufq_write() with length 1. For large outgoing frames this means one bufq call (and the associated bookkeeping) per byte, which is very slow for bulk sends. The code itself acknowledges this with the comment \"not the most performant way to do this\".","fix":"Mask into a small stack buffer (e.g. 1-4 KiB) and write that chunk to the bufq in one Curl_bufq_write() call, looping until the payload is consumed, rather than writing a single byte per call. The mask index (enc->xori) can still be advanced per byte within the chunk.","locations":[{"ref":"lib/ws.c:947-980","code":"  947 | static CURLcode ws_enc_write_payload(struct ws_encoder *enc,\n  948 |                                      struct Curl_easy *data,\n  949 |                                      const uint8_t *buf, size_t buflen,\n  950 |                                      struct bufq *out, size_t *pnwritten)\n  951 | {\n  952 |   CURLcode result;\n  953 |   size_t i, len, n, remain;\n  954 | \n  955 |   *pnwritten = 0;\n  956 |   if(Curl_bufq_is_full(out))\n  957 |     return CURLE_AGAIN;\n  958 | \n  959 |   /* not the most performant way to do this */\n  960 |   len = buflen;\n  961 |   remain = curlx_sotouz_range(enc->payload_remain, 0, SIZE_MAX);\n  962 |   if(remain < len)\n  963 |     len = remain;\n  964 | \n  965 |   for(i = 0; i < len; ++i) {\n  966 |     uint8_t c = buf[i] ^ enc->mask[enc->xori];\n  967 |     result = Curl_bufq_write(out, &c, 1, &n);\n  968 |     if(result) {\n  969 |       if((result != CURLE_AGAIN) || !i)\n  970 |         return result;\n  971 |       break;\n  972 |     }\n  973 |     enc->xori++;\n  974 |     enc->xori &= 3;\n  975 |   }\n  976 |   *pnwritten = i;\n  977 |   enc->payload_remain -= (curl_off_t)i;\n  978 |   ws_enc_info(enc, data, \"buffered\");\n  979 |   return CURLE_OK;\n  980 | }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"negligible","description":"cf_ip_ballers_run() recomputes cf_ai_iter_has_more() for both the IPv4 and IPv6\niterators multiple times per call (once in the !ongoing/do_more decision around\nlines 431-435 and again in the trailing scheduling block at lines 558-562).\nEach cf_ai_iter_has_more() walks the resolved addrinfo list via\nCurl_conn_dns_get_ai up to the current index. For large DNS result sets this is\nrepeated linear scanning within a single connect evaluation.","fix":"Cache the more_possible result computed earlier in the function and reuse it in the trailing scheduling block instead of recomputing.","locations":[{"ref":"lib/cf-ip-happy.c:431-438","code":"  431 |     bool more_possible = cf_ai_iter_has_more(&bs->addr_iter, data);\n  432 | #ifdef USE_IPV6\n  433 |     if(!more_possible)\n  434 |       more_possible = cf_ai_iter_has_more(&bs->ipv6_iter, data);\n  435 | #endif\n  436 |     do_more = more_possible &&\n  437 |       (curlx_ptimediff_ms(Curl_pgrs_now(data), &bs->last_attempt_started) >=\n  438 |        bs->attempt_delay_ms);"},{"ref":"lib/cf-ip-happy.c:558-562","code":"  558 |     more_possible = cf_ai_iter_has_more(&bs->addr_iter, data);\n  559 | #ifdef USE_IPV6\n  560 |     if(!more_possible)\n  561 |       more_possible = cf_ai_iter_has_more(&bs->ipv6_iter, data);\n  562 | #endif"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","description":"multipart_size() keeps iterating over all remaining subparts after one of them reports an unknown size (sz < 0 sets `size = sz`). Once `size` is negative the per-iteration body only recomputes sub-part sizes whose results are discarded, since `if(size >= 0)` is never true again. The function still returns the correct unknown (-1) value, but the work is wasted, and for deeply nested multiparts mime_size()/multipart_size() recursion is re-run needlessly.","fix":"Break out of the loop as soon as `size` becomes negative, e.g. after `size = sz;` do `break;` (the value is already final), or test `if(size < 0) break;` at the top of the loop body.","locations":[{"ref":"lib/mime.c:1563-1586","code":" 1563 | static curl_off_t multipart_size(curl_mime *mime)\n 1564 | {\n 1565 |   curl_off_t size;\n 1566 |   curl_off_t boundarysize;\n 1567 |   curl_mimepart *part;\n 1568 | \n 1569 |   if(!mime)\n 1570 |     return 0;           /* Not present -> empty. */\n 1571 | \n 1572 |   boundarysize = 4 + MIME_BOUNDARY_LEN + 2;\n 1573 |   size = boundarysize;  /* Final boundary - CRLF after headers. */\n 1574 | \n 1575 |   for(part = mime->firstpart; part; part = part->nextpart) {\n 1576 |     curl_off_t sz = mime_size(part);\n 1577 | \n 1578 |     if(sz < 0)\n 1579 |       size = sz;\n 1580 | \n 1581 |     if(size >= 0)\n 1582 |       size += boundarysize + sz;\n 1583 |   }\n 1584 | \n 1585 |   return size;\n 1586 | }"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","description":"Curl_pp_readresp() performs a curlx_dyn_tail() trim on every iteration when pp->nfinal is set, and the inner line-scanning loop repeatedly calls curlx_dyn_ptr()/curlx_dyn_len() and memchr from the buffer start. For a long multi-line response (e.g. a large CAPABILITY or LIST listing arriving in many chunks) each newly appended chunk re-scans from the front and each consumed line triggers a memmove via curlx_dyn_tail(), giving O(n^2) behavior in the number of lines. Server-controlled multi-line responses can therefore be made quadratic.","fix":"Track a scan offset into recvbuf instead of trimming with curlx_dyn_tail() after each line, and only compact the buffer when necessary, to avoid repeated front-anchored memchr/memmove over already-scanned data.","locations":[{"ref":"lib/pingpong.c:287-333","code":"  287 |     do {\n  288 |       const char *line = curlx_dyn_ptr(&pp->recvbuf);\n  289 |       const char *nl = memchr(line, '\\n', curlx_dyn_len(&pp->recvbuf));\n  290 |       if(nl) {\n  291 |         /* a newline is CRLF in pp-talk, so the CR is ignored as\n  292 |            the line is not really terminated until the LF comes */\n  293 |         size_t length = nl - line + 1;\n  294 | \n  295 |         /* output debug output if that is requested */\n  296 |         Curl_debug(data, CURLINFO_HEADER_IN, line, length);\n  297 | \n  298 |         /*\n  299 |          * Pass all response-lines to the callback function registered for\n  300 |          * \"headers\". The response lines can be seen as a kind of headers.\n  301 |          */\n  302 |         result = Curl_client_write(data, CLIENTWRITE_INFO, line, length);\n  303 |         if(result)\n  304 |           return result;\n  305 | \n  306 |         if(pp->endofresp(data, conn, line, length, code)) {\n  307 |           /* When at \"end of response\", keep the endofresp line first in the\n  308 |              buffer since it will be accessed outside (by pingpong\n  309 |              parsers). Store the overflow counter to inform about additional\n  310 |              data in this buffer after the endofresp line. */\n  311 |           pp->nfinal = length;\n  312 |           if(curlx_dyn_len(&pp->recvbuf) > length)\n  313 |             pp->overflow = curlx_dyn_len(&pp->recvbuf) - length;\n  314 |           else\n  315 |             pp->overflow = 0;\n  316 |           *size = pp->nread_resp; /* size of the response */\n  317 |           pp->nread_resp = 0; /* restart */\n  318 |           gotbytes = 0; /* force break out of outer loop */\n  319 |           break;\n  320 |         }\n  321 |         if(curlx_dyn_len(&pp->recvbuf) > length)\n  322 |           /* keep the remaining piece */\n  323 |           curlx_dyn_tail((&pp->recvbuf), curlx_dyn_len(&pp->recvbuf) - length);\n  324 |         else\n  325 |           curlx_dyn_reset(&pp->recvbuf);\n  326 |       }\n  327 |       else {\n  328 |         /* without a newline, there is no overflow */\n  329 |         pp->overflow = 0;\n  330 |         break;\n  331 |       }\n  332 | \n  333 |     } while(1); /* while there is buffer left to scan */"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"negligible","description":"cs_zip_to_str() re-walks the cs_txt blob from the beginning for every index it needs to render: for each output part it loops `for(idx = 1, entry = cs_txt + 1; idx < indexes[i]; idx++) entry += strlen(entry)+1;`. This makes name reconstruction O(parts * CS_TXT_LEN * avg_strlen) instead of O(total length). The lists are small so impact is negligible, but it is needless repeated linear scanning of the static text table.","fix":"Precompute an offset table for cs_txt entries once, or accumulate the scan position across iterations since indexes are processed in ascending textual order only incidentally; at minimum cache strlen results.","locations":[{"ref":"lib/vtls/cipher_suite.c:611-630","code":"  611 |   for(i = 0; i < 8 && indexes[i] != 0 && len < buf_size; i++) {\n  612 |     if(indexes[i] >= CS_TXT_LEN)\n  613 |       return -1;\n  614 | \n  615 |     /* lookup the part string for the index (skip empty string at 0) */\n  616 |     for(idx = 1, entry = cs_txt + 1; idx < indexes[i]; idx++) {\n  617 |       size_t elen = strlen(entry);\n  618 |       entry += elen + 1;\n  619 |     }\n  620 | \n  621 |     /* append the part string to the buffer */\n  622 |     if(i > 0)\n  623 |       r = curl_msnprintf(&buf[len], buf_size - len, \"%c%s\", separator, entry);\n  624 |     else\n  625 |       r = curl_msnprintf(&buf[len], buf_size - len, \"%s\", entry);\n  626 | \n  627 |     if(r < 0)\n  628 |       return -1;\n  629 |     len += r;\n  630 |   }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"tunnel_init() allocates a fresh h1_tunnel_state with curlx_calloc (so httpversion == 0 and dest == NULL, with no Curl_peer_link). It is only reached from cf_h1_proxy_connect() when `pctx->ts` is NULL. However Curl_cf_h1_proxy_insert_after() always sets pctx->ts to a properly initialized state (with dest linked and httpversion set), and the only place ts is cleared (cf_tunnel_free) runs after cf->connected becomes TRUE, after which connect returns early. Thus this path is effectively unreachable; if it ever did run, start_CONNECT() would build a request with http_minor == 0 (HTTP/1.0) and a NULL ts->dest, producing broken/garbage behavior. Either the path is dead code or a latent bug.","fix":"Remove the unused tunnel_init() / fallback branch, or if it is intended as a real fallback, have it Curl_peer_link the destination and carry the correct httpversion (e.g. by storing them in cf_h1_proxy_ctx) instead of producing a zero-initialized state.","locations":[{"ref":"lib/cf-h1-proxy.c:119-142","code":"  119 | static CURLcode tunnel_init(struct Curl_cfilter *cf,\n  120 |                             struct Curl_easy *data,\n  121 |                             struct h1_tunnel_state **pts)\n  122 | {\n  123 |   struct h1_tunnel_state *ts;\n  124 | \n  125 |   if(cf->conn->scheme->flags & PROTOPT_NOTCPPROXY) {\n  126 |     failf(data, \"%s cannot be done over CONNECT\", cf->conn->scheme->name);\n  127 |     return CURLE_UNSUPPORTED_PROTOCOL;\n  128 |   }\n  129 | \n  130 |   ts = curlx_calloc(1, sizeof(*ts));\n  131 |   if(!ts)\n  132 |     return CURLE_OUT_OF_MEMORY;\n  133 | \n  134 |   infof(data, \"allocate connect buffer\");\n  135 | \n  136 |   curlx_dyn_init(&ts->rcvbuf, DYN_PROXY_CONNECT_HEADERS);\n  137 |   curlx_dyn_init(&ts->request_data, DYN_HTTP_REQUEST);\n  138 |   Curl_httpchunk_init(data, &ts->ch, TRUE);\n  139 | \n  140 |   *pts = ts;\n  141 |   return tunnel_reinit(cf, data, ts);\n  142 | }"},{"ref":"lib/cf-h1-proxy.c:835-840","code":"  835 |   if(!ts) {\n  836 |     result = tunnel_init(cf, data, &ts);\n  837 |     if(result)\n  838 |       return result;\n  839 |     pctx->ts = ts;\n  840 |   }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In Curl_pp_statemach() the third branch is unreachable. The first `if` already tests `Curl_conn_data_pending(data, FIRSTSOCKET)` and sets rc=1; the later `else if(!pp->sendleft && Curl_conn_data_pending(data, FIRSTSOCKET))` can only be reached when Curl_conn_data_pending() is FALSE, so its data-pending sub-condition is always FALSE and the branch is dead. The intent was presumably to combine a different condition (e.g. checking the SSL layer separately), but as written it duplicates the first check.","fix":"Remove the redundant `else if(!pp->sendleft && Curl_conn_data_pending(...))` branch, or replace its condition with the genuinely distinct check that was intended (the comment says 'data ready in the SSL library').","locations":[{"ref":"lib/pingpong.c:86-99","code":"   86 |   if(Curl_conn_data_pending(data, FIRSTSOCKET))\n   87 |     rc = 1;\n   88 |   else if(pp->overflow)\n   89 |     /* We are receiving and there is data in the cache so read it */\n   90 |     rc = 1;\n   91 |   else if(!pp->sendleft && Curl_conn_data_pending(data, FIRSTSOCKET))\n   92 |     /* We are receiving and there is data ready in the SSL library */\n   93 |     rc = 1;\n   94 |   else {\n   95 |     rc = Curl_socket_check(pp->sendleft ? CURL_SOCKET_BAD : sock, /* reading */\n   96 |                            CURL_SOCKET_BAD,\n   97 |                            pp->sendleft ? sock : CURL_SOCKET_BAD, /* writing */\n   98 |                            interval_ms);\n   99 |   }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"struct SMTP carries `size_t eob` and `BIT(trailing_crlf)`, and smtp_perform() writes `smtp->trailing_crlf = TRUE;` and `smtp->eob = 2;` (lines 1785-1786), but neither field is ever read anywhere in the SMTP code. End-of-body escaping is now fully handled by the cr_eob_ctx client reader (struct cr_eob_ctx has its own n_eob field). These struct members and their initialization are leftover dead code.","fix":"Remove the unused `eob` and `trailing_crlf` members from struct SMTP and delete the two assignments in smtp_perform().","locations":[{"ref":"lib/smtp.c:132-136","code":"  132 |   size_t eob;              /* Number of bytes of the EOB (End Of Body) that\n  133 |                               have been received so far */\n  134 |   BIT(rcpt_had_ok);        /* Whether any of RCPT TO commands (depends on\n  135 |                               total number of recipients) succeeded so far */\n  136 |   BIT(trailing_crlf);      /* Specifies if the trailing CRLF is present */"},{"ref":"lib/smtp.c:1783-1786","code":" 1783 |   /* Initial data character is the first character in line: it is implicitly\n 1784 |      preceded by a virtual CRLF. */\n 1785 |   smtp->trailing_crlf = TRUE;\n 1786 |   smtp->eob = 2;"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","description":"The struct curl_thrdpool field `fatal_err` (CURLcode) is never written or read\nanywhere in the code base. It is zero-initialized by curlx_calloc() in\nCurl_thrdpool_create() and then never touched. It appears to be a leftover from\nan earlier design and only adds confusion / memory to the struct.","fix":"Remove the unused `fatal_err` member from struct curl_thrdpool.","locations":[{"ref":"lib/thrdpool.c:62-62","code":"   62 |   CURLcode fatal_err;"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","description":"The struct curl_thrdpool bitfield `detached` is set to TRUE in\nCurl_thrdpool_destroy() (when threads are still running and being detached) but\nis never read anywhere. It has no observable effect on behavior and is dead\nstate.","fix":"Either remove the `detached` bit and its assignment, or actually use it (e.g.\nin DEBUGASSERTs / tracing) if it was meant to guard later behavior.","locations":[{"ref":"lib/thrdpool.c:68-68","code":"   68 |   BIT(detached);"},{"ref":"lib/thrdpool.c:357-357","code":"  357 |     tpool->detached = TRUE;"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In http_proxy_cf_connect(), after `if(alpn)` the code uses `else if(!alpn)`. Since the only way to reach the else branch is alpn being falsy, the `!alpn` condition is always true and redundant. Inside that branch alpn is then always assigned a non-NULL fallback, so the later strcmp(alpn, ...) calls can never deref NULL, but the redundant condition is confusing dead logic.","fix":"Replace `else if(!alpn)` with a plain `else` to make it clear the branch handles the no-ALPN case unconditionally.","locations":[{"ref":"lib/http_proxy.c:587-606","code":"  587 |     if(alpn)\n  588 |       infof(data, \"%s: '%s' negotiated\", tunnel_type, alpn);\n  589 |     else if(!alpn) {\n  590 |       /* No ALPN, proxytype rules. Fake ALPN */\n  591 |       infof(data, \"%s: no ALPN negotiated\", tunnel_type);\n  592 |       switch(ctx->proxytype) {\n  593 |       case CURLPROXY_HTTP_1_0:\n  594 |         alpn = \"http/1.0\";\n  595 |         break;\n  596 |       case CURLPROXY_HTTPS2:\n  597 |         alpn = \"h2\";\n  598 |         break;\n  599 |       case CURLPROXY_HTTPS3:\n  600 |         alpn = \"h3\";\n  601 |         break;\n  602 |       default:\n  603 |         alpn = \"http/1.1\";\n  604 |         break;\n  605 |       }\n  606 |     }"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"redirect_url() contains a defensive `if(!base) return CURLUE_MALFORMED_INPUT;`\nimmediately after a DEBUGASSERT(base && relurl && u), but `base` is already\ndereferenced one line earlier when computing\n`protsep = base + strlen(scheme) + 3`. The NULL check is therefore dead with\nrespect to protecting that dereference: if base were NULL the crash would\nalready have happened in the strlen()/pointer arithmetic above. The check can\nnever fire for the intended NULL-base case.","fix":"Move the NULL check before the `protsep = base + ...` computation, or remove it since callers always pass a non-NULL base (as asserted).","locations":[{"ref":"lib/urlapi.c:1247-1250","code":" 1247 |   const char *protsep = base + strlen(scheme) + 3;\n 1248 |   DEBUGASSERT(base && relurl && u); /* all set here */\n 1249 |   if(!base)\n 1250 |     return CURLUE_MALFORMED_INPUT; /* should never happen */"}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In Curl_auth_create_gssapi_security_message (GSSAPI) the variables sec_layer and max_size are validated and then forcibly reset (sec_layer &= GSSAUTH_P_NONE; max_size = 0) before being written into the outgoing message. The 'if(max_size > 0) { max_size = 0; }' block is effectively dead: it unconditionally yields 0, so the conditional and comment add no behavior. Same pattern duplicated in krb5_sspi.c.","fix":"Replace the conditional with a direct 'max_size = 0;' (or drop it and write 0 bytes directly) to remove the no-op branch.","locations":[{"ref":"lib/vauth/krb5_gssapi.c:239-245","code":"  239 |   /* Process the maximum message size the server can receive */\n  240 |   if(max_size > 0) {\n  241 |     /* The server has told us it supports a maximum receive buffer, but as we\n  242 |        do not require one unless we are encrypting data, we tell the server\n  243 |        our receive buffer is zero. */\n  244 |     max_size = 0;\n  245 |   }"},{"ref":"lib/vauth/krb5_sspi.c:323-329","code":"  323 |   /* Process the maximum message size the server can receive */\n  324 |   if(max_size > 0) {\n  325 |     /* The server has told us it supports a maximum receive buffer, but as we\n  326 |        do not require one unless we are encrypting data, we tell the server\n  327 |        our receive buffer is zero. */\n  328 |     max_size = 0;\n  329 |   }"}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In easysrc_perform(), the inner condition `if(easysrc_toohard && !result)` re-tests `easysrc_toohard` even though the whole block is already guarded by `if(easysrc_toohard)` and `easysrc_toohard` is not modified in between. The `easysrc_toohard &&` part of the inner test is always true and is redundant.","fix":"Simplify the inner condition to `if(!result)`.","locations":[{"ref":"src/tool_easysrc.c:131-142","code":"  131 |   if(easysrc_toohard) {\n  132 |     int i;\n  133 |     struct curl_slist *ptr;\n  134 |     result = easysrc_add(&easysrc_code, \"\");\n  135 |     /* Preamble comment */\n  136 |     for(i = 0; srchard[i] && !result; i++)\n  137 |       result = easysrc_add(&easysrc_code, srchard[i]);\n  138 |     /* Each unconverted option */\n  139 |     if(easysrc_toohard && !result) {\n  140 |       for(ptr = easysrc_toohard->first; ptr && !result; ptr = ptr->next)\n  141 |         result = easysrc_add(&easysrc_code, ptr->data);\n  142 |     }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Misleading failure message: the error text claims `nghttp2_session_upgrade2()` failed, but this branch handles a negative return from `nghttp2_submit_request()` (called a few lines above). The wrong function name will mislead anyone debugging proxy CONNECT submission failures.","fix":"Change the message to reference nghttp2_submit_request(), e.g. `failf(data, \"nghttp2_submit_request() failed: %s(%d)\", nghttp2_strerror(stream_id), stream_id);`.","locations":[{"ref":"lib/cf-h2-proxy.c:750-753","code":"  750 |   if(stream_id < 0) {\n  751 |     failf(data, \"nghttp2_session_upgrade2() failed: %s(%d)\",\n  752 |           nghttp2_strerror(stream_id), stream_id);\n  753 |     result = CURLE_SEND_ERROR;"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"checkmonth() comment claims it returns \"the offset or -1, no real offset is -1\", but the function returns the month index 0-11 (a real, valid value of 0 is possible) or -1; the \"offset\" wording is copy-pasted from a timezone-style helper and is misleading for a month-index function. Minor, but can confuse future maintainers about the meaning of the 0 return.","fix":"Reword the trailing comment to: \"return the month index (0-11) or -1 if not a month\".","locations":[{"ref":"lib/parsedate.c:218-231","code":"  218 | static int checkmonth(const char *check, size_t len)\n  219 | {\n  220 |   int i;\n  221 |   const char * const *what = &Curl_month[0];\n  222 |   if(len != 3)\n  223 |     return -1; /* not a month */\n  224 | \n  225 |   for(i = 0; i < 12; i++) {\n  226 |     if(curl_strnequal(check, what[0], 3))\n  227 |       return i;\n  228 |     what++;\n  229 |   }\n  230 |   return -1; /* return the offset or -1, no real offset is -1 */\n  231 | }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment for Curl_async_global_init() in asyn-thrdd.c states \"Does nothing here.\" but the function does perform work when built with c-ares support: it calls ares_library_init(ARES_LIB_INIT_ALL) and returns CURLE_FAILED_INIT on failure. The same misleading \"Does nothing here.\" comment is repeated on Curl_async_global_cleanup() which calls ares_library_cleanup().","fix":"Remove or correct the \"Does nothing here.\" sentences to reflect that the functions initialize/cleanup the c-ares library when USE_ARES is defined.","locations":[{"ref":"lib/asyn-thrdd.c:75-100","code":"   75 | /*\n   76 |  * Curl_async_global_init()\n   77 |  * Called from curl_global_init() to initialize global resolver environment.\n   78 |  * Does nothing here.\n   79 |  */\n   80 | int Curl_async_global_init(void)\n   81 | {\n   82 | #if defined(USE_ARES) && defined(CARES_HAVE_ARES_LIBRARY_INIT)\n   83 |   if(ares_library_init(ARES_LIB_INIT_ALL)) {\n   84 |     return CURLE_FAILED_INIT;\n   85 |   }\n   86 | #endif\n   87 |   return CURLE_OK;\n   88 | }\n   89 | \n   90 | /*\n   91 |  * Curl_async_global_cleanup()\n   92 |  * Called from curl_global_cleanup() to destroy global resolver environment.\n   93 |  * Does nothing here.\n   94 |  */\n   95 | void Curl_async_global_cleanup(void)\n   96 | {\n   97 | #if defined(USE_ARES) && defined(CARES_HAVE_ARES_LIBRARY_INIT)\n   98 |   ares_library_cleanup();\n   99 | #endif\n  100 | }"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment for cf_ip_happy_create() still describes parameters `@param pcf`,\n`@param data`, `@param conn`, `@param cf_create` but the function signature has\nsince changed: it now also takes a `struct Curl_peer *peer` parameter (and uses\nit via Curl_peer_link), which is undocumented, while `data` and `conn` are in\nfact unused (cast to void). The comment is stale relative to the code.","fix":"Update the doc comment to document the `peer` parameter and drop/clarify the now-unused data/conn parameters.","locations":[{"ref":"lib/cf-ip-happy.c:986-1002","code":"  986 | /**\n  987 |  * Create an IP happy eyeball connection filter that uses the, once resolved,\n  988 |  * address information to connect on ip families based on connection\n  989 |  * configuration.\n  990 |  * @param pcf        output, the created cfilter\n  991 |  * @param data       easy handle used in creation\n  992 |  * @param conn       connection the filter is created for\n  993 |  * @param cf_create  method to create the sub-filters performing the\n  994 |  *                   actual connects.\n  995 |  */\n  996 | static CURLcode cf_ip_happy_create(struct Curl_cfilter **pcf,\n  997 |                                    struct Curl_easy *data,\n  998 |                                    struct Curl_peer *peer,\n  999 |                                    struct connectdata *conn,\n 1000 |                                    cf_ip_connect_create *cf_create,\n 1001 |                                    uint8_t transport_in,\n 1002 |                                    uint8_t transport_out)"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In Curl_ntlm_core_mk_ntlmv2_resp the parameter documentation for 'ntresp' is an incomplete sentence: 'The address where a pointer to newly allocated memory holding the NTLMv2 response.' (missing a verb such as 'is stored').","fix":"Complete the sentence, e.g. 'The address where a pointer to newly allocated memory holding the NTLMv2 response is stored.'","locations":[{"ref":"lib/curl_ntlm_core.c:543-544","code":"  543 |  *                         memory holding the NTLMv2 response.\n  544 |  * ntresp_len      [out] - The length of the output message."}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The trace message in cw_out_append() always says \"[OUT] paused, buffering ...\"\nbut cw_out_append() is also called from cw_out_do_write() on the non-paused\npartial-write path (when the client callback consumed only part of the data\nwithout requesting a pause). In that case data is being buffered while the\ntransfer is NOT paused, so the \"paused\" wording in the trace is misleading.","fix":"Reword the trace to e.g. \"[OUT] buffering %zu more bytes\" without asserting that the transfer is paused, or only emit the \"paused\" variant when ctx->paused is set.","locations":[{"ref":"lib/cw-out.c:345-352","code":"  345 | static CURLcode cw_out_append(struct cw_out_ctx *ctx,\n  346 |                               struct Curl_easy *data,\n  347 |                               cw_out_type otype,\n  348 |                               const char *buf, size_t blen)\n  349 | {\n  350 |   CURL_TRC_WRITE(data, \"[OUT] paused, buffering %zu more bytes (%zu/%d)\",\n  351 |                  blen, cw_out_bufs_len(ctx), DYN_PAUSE_BUFFER);\n  352 |   if(cw_out_bufs_len(ctx) + blen > DYN_PAUSE_BUFFER) {"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment block in Curl_loadhostpairs() enumerates \"two reasons\" for deleting an existing cache entry but then lists four numbered reasons (1..4). The prose (\"there are two reasons for this\") is stale/incorrect relative to the list it introduces.","fix":"Update the comment to say \"there are several reasons\" (or the correct count) to match the enumerated list.","locations":[{"ref":"lib/dnscache.c:817-826","code":"  817 |         /* delete old entry, there are two reasons for this\n  818 |          1. old entry may have different addresses.\n  819 |          2. even if entry with correct addresses is already in the cache,\n  820 |             but if it is close to expire, then by the time next http\n  821 |             request is made, it can get expired and pruned because old\n  822 |             entry is not necessarily marked as permanent.\n  823 |          3. when adding a non-permanent entry, we want it to remove and\n  824 |             replace an existing permanent entry.\n  825 |          4. when adding a non-permanent entry, we want it to get a \"fresh\"\n  826 |             timeout that starts _now_. */"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"parse_unix_totalsize() has the comment `/* continue to fall through */` after\nsetting parser->state.UNIX.main = PL_UNIX_FILETYPE inside the\nPL_UNIX_TOTALSIZE_INIT case, but the code then `break;`s out of the switch\nrather than falling through. The actual fall-through to PL_UNIX_FILETYPE happens\none level up in parse_unix() (which re-dispatches after detecting the main-state\nchange), not here. The comment is misleading about local control flow.","fix":"Reword the comment to clarify the re-dispatch happens in parse_unix(), not via a C fall-through here.","locations":[{"ref":"lib/ftplistparser.c:396-400","code":"  396 |     else {\n  397 |       parser->state.UNIX.main = PL_UNIX_FILETYPE;\n  398 |       /* continue to fall through */\n  399 |     }\n  400 |     break;"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment for `Curl_hash_init` says 'Return 1 on error, 0 is fine.', but\nthe function returns `void` and cannot fail (table allocation is now lazy in\nCurl_hash_add2). The comment is stale and misleading about the API contract.","fix":"Update the comment to reflect the void return type and that initialization cannot fail.","locations":[{"ref":"lib/hash.c:71-98","code":"   71 | /* Initializes a hash structure.\n   72 |  * Return 1 on error, 0 is fine.\n   73 |  *\n   74 |  * @unittest: 1602\n   75 |  * @unittest: 1603\n   76 |  */\n   77 | void Curl_hash_init(struct Curl_hash *h,\n   78 |                     size_t slots,\n   79 |                     hash_function hfunc,\n   80 |                     comp_function comparator,\n   81 |                     Curl_hash_dtor dtor)\n   82 | {\n   83 |   DEBUGASSERT(h);\n   84 |   DEBUGASSERT(slots);\n   85 |   DEBUGASSERT(hfunc);\n   86 |   DEBUGASSERT(comparator);\n   87 |   DEBUGASSERT(dtor);\n   88 | \n   89 |   h->table = NULL;\n   90 |   h->hash_func = hfunc;\n   91 |   h->comp_func = comparator;\n   92 |   h->dtor = dtor;\n   93 |   h->size = 0;\n   94 |   h->slots = slots;\n   95 | #ifdef DEBUGBUILD\n   96 |   h->init = HASHINIT;\n   97 | #endif\n   98 | }"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment in http_proxy.c says 'colons in IPv6 addresses MUST be percent-encoded ... (e.g. \"2001:db8::1\" -> \"2001%3Adb8%3A%3A1\")'. The encoding loop emits '%3A' for each ':' using uppercase hex, but RFC 9298 percent-encoding example aside, the surrounding code only handles ':' and leaves other reserved characters unencoded; the comment implies general percent-encoding of the host while the implementation only escapes colons. Minor: the comment overstates what the code does (it is colon-only escaping, not full RFC 3986 percent-encoding of the IPv6 literal).","fix":"Reword the comment to state that only ':' is percent-encoded here (sufficient for IPv6 literals in this URI template position), to avoid implying broader encoding than is implemented.","locations":[{"ref":"lib/http_proxy.c:304-329","code":"  304 |   if(dest->ipv6) {\n  305 |     /* RFC 9298: colons in IPv6 addresses MUST be percent-encoded\n  306 |      * in the URI template (e.g. \"2001:db8::1\" -> \"2001%3Adb8%3A%3A1\") */\n  307 |     const char *s = dest->hostname;\n  308 |     char *d;\n  309 |     size_t hlen = strlen(s);\n  310 |     encoded_host = curlx_malloc(hlen * 3 + 1);\n  311 |     if(!encoded_host) {\n  312 |       result = CURLE_OUT_OF_MEMORY;\n  313 |       goto out;\n  314 |     }\n  315 |     d = encoded_host;\n  316 |     while(*s) {\n  317 |       if(*s == ':') {\n  318 |         *d++ = '%';\n  319 |         *d++ = '3';\n  320 |         *d++ = 'A';\n  321 |       }\n  322 |       else\n  323 |         *d++ = *s;\n  324 |       s++;\n  325 |     }\n  326 |     *d = '\\0';\n  327 |     path = curl_maprintf(\"/.well-known/masque/udp/%s/%u/\",\n  328 |                          encoded_host, (unsigned int)dest->port);\n  329 |   }"}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In cidr4_match() the locals are named `haddr`/`hcheck` (suggesting host byte\norder) and are produced via htonl(). `address`/`check` come from\ncurlx_inet_pton(AF_INET, ...) which already returns network byte order, so the\ncorrect conversion to host order is ntohl(), not htonl(). The code happens to\nwork because on every supported platform htonl() and ntohl() perform the same\ntransformation (identity on big-endian, byte-swap on little-endian) and the\nmask is applied symmetrically to both operands, so the XOR/mask comparison is\ncorrect. The use of htonl() to obtain a value called \"host address\" is however\nmisleading and inconsistent with the variable naming and the standard idiom.","fix":"Use ntohl() instead of htonl() to convert the network-order pton results to host order, matching the haddr/hcheck naming; behavior is unchanged but intent is clear.","locations":[{"ref":"lib/noproxy.c:65-79","code":"   65 |   if(bits && (bits != 32)) {\n   66 |     unsigned int mask = 0xffffffff << (32 - bits);\n   67 |     unsigned int haddr = htonl(address);\n   68 |     unsigned int hcheck = htonl(check);\n   69 | #if 0\n   70 |     curl_mfprintf(stderr, \"Host %s (%x) network %s (%x) \"\n   71 |                   \"bits %u mask %x => %x\\n\",\n   72 |                   ipv4, haddr, network, hcheck, bits, mask,\n   73 |                   (haddr ^ hcheck) & mask);\n   74 | #endif\n   75 |     if((haddr ^ hcheck) & mask)\n   76 |       return FALSE;\n   77 |     return TRUE;\n   78 |   }\n   79 |   return address == check;"}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment for SASL_FLAG_BASE64 handling in build_message() says 'Explicit empty response' sets msg to '=', but the preceding decode path in get_server_message() treats a leading '=' as an empty server message. The comment in pop3_get_message header block also claims it detects 'the supported authentication types and allowed SASL mechanisms', yet pop3_get_message() only extracts the trimmed message text; capability/mech parsing happens in pop3_state_capa_resp(). The doc comment is attached to the wrong function and is misleading about its responsibilities.","fix":"Correct the pop3_get_message() banner comment to describe only message extraction; move the capability-detection description to pop3_endofresp/pop3_state_capa_resp.","locations":[{"ref":"lib/pop3.c:341-347","code":"  341 | /***********************************************************************\n  342 |  *\n  343 |  * pop3_get_message()\n  344 |  *\n  345 |  * Gets the authentication message from the response buffer.\n  346 |  */\n  347 | static CURLcode pop3_get_message(struct Curl_easy *data, struct bufref *out)"}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The closing #endif comment for the SMB feature block claims an extra condition `SIZEOF_CURL_OFF_T > 4` that does not exist in the matching #if at the top of the file. The actual guard is `#if defined(CURL_ENABLE_SMB) && defined(USE_CURL_NTLM_CORE)` (line 28), but the trailing comment reads `#endif /* CURL_ENABLE_SMB && USE_CURL_NTLM_CORE && SIZEOF_CURL_OFF_T > 4 */`. The comment is misleading about the compilation condition.","fix":"Update the trailing comment to match the actual guard: `#endif /* CURL_ENABLE_SMB && USE_CURL_NTLM_CORE */`.","locations":[{"ref":"lib/smb.c:28-28","code":"   28 | #if defined(CURL_ENABLE_SMB) && defined(USE_CURL_NTLM_CORE)"},{"ref":"lib/smb.c:1234-1234","code":" 1234 | #endif /* CURL_ENABLE_SMB && USE_CURL_NTLM_CORE && SIZEOF_CURL_OFF_T > 4 */"}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment on the wrap-around scan in `Curl_uint32_tbl_add` references a field\nname that does not exist: 'no free entry at or above tbl->maybe_next_key'. The\ncode actually uses `tbl->last_key_added` (via `start_pos`). The stale field name\nsuggests a renamed member that was not propagated to the comment.","fix":"Update the comment to refer to `tbl->last_key_added`/`start_pos`.","locations":[{"ref":"lib/uint-table.c:139-140","code":"  139 |   /* no free entry at or above tbl->maybe_next_key, wrap around */\n  140 |   for(key = 0; key < start_pos; ++key) {"}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The function header comment for Curl_auth_decode_ntlm_type2_message contains stray asterisks and broken wording: 'is checked * for validity ... a type-3 message is * written'. The misplaced '*' characters are leftover/garbled and make the doc comment read incorrectly.","fix":"Remove the stray '*' tokens so the sentence reads 'The raw NTLM message is checked for validity before the appropriate data for creating a type-3 message is written to the given NTLM data structure.'","locations":[{"ref":"lib/vauth/ntlm.c:320-334","code":"  320 | /*\n  321 |  * Curl_auth_decode_ntlm_type2_message()\n  322 |  *\n  323 |  * This is used to decode an NTLM type-2 message. The raw NTLM message is\n  324 |  * checked * for validity before the appropriate data for creating a type-3\n  325 |  * message is * written to the given NTLM data structure.\n  326 |  *\n  327 |  * Parameters:\n  328 |  *\n  329 |  * data     [in]     - The session handle.\n  330 |  * type2ref [in]     - The type-2 message.\n  331 |  * ntlm     [in/out] - The NTLM data struct being used and modified.\n  332 |  *\n  333 |  * Returns CURLE_OK on success.\n  334 |  */"}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"cf_quiche_do_expire() has `(void)stream;` at the top of the function, but then dereferences `stream` two lines later (`stream->xfer_result = CURLE_SEND_ERROR;`). The `(void)stream;` cast is misleading/dead: it suggests the parameter is unused while it is in fact used. Copy-paste artifact from a sibling visitor callback (cf_quiche_do_resume uses `(void)user_data;`).","fix":"Remove the bogus `(void)stream;` line in cf_quiche_do_expire().","locations":[{"ref":"lib/vquic/curl_quiche.c:246-257","code":"  246 | static bool cf_quiche_do_expire(struct Curl_cfilter *cf,\n  247 |                                 struct Curl_easy *sdata,\n  248 |                                 struct h3_stream_ctx *stream,\n  249 |                                 void *user_data)\n  250 | {\n  251 |   (void)stream;\n  252 |   (void)user_data;\n  253 |   CURL_TRC_CF(sdata, cf, \"conn closed, mark as dirty\");\n  254 |   stream->xfer_result = CURLE_SEND_ERROR;\n  255 |   Curl_multi_mark_dirty(sdata);\n  256 |   return TRUE;\n  257 | }"}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The closing comment of the sockopt feature block reads `/* IP_TOD || IPV6_TCLASS || SO_PRIORITY */` — 'IP_TOD' is a typo for 'IP_TOS', the macro actually tested in the matching `#if defined(IP_TOS) || defined(IPV6_TCLASS) || defined(SO_PRIORITY)`.","fix":"Fix the comment to read `/* IP_TOS || IPV6_TCLASS || SO_PRIORITY */`.","locations":[{"ref":"src/config2setopts.c:113","code":"  113 | #endif /* IP_TOD || IPV6_TCLASS || SO_PRIORITY */"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"async_ares_get_ai() (asyn-ares.c) and async_thrdd_get_ai() (asyn-thrdd.c) are byte-for-byte identical helper functions that iterate a Curl_addrinfo list and return the index-th entry of a given family. The same pattern is also the body of the two Curl_async_get_ai() switch arms. Maintaining two copies risks the two resolver backends drifting (one already happened with the HTTPS RR name format). Consider hoisting a single shared helper into hostip/asyn-base.","fix":"Move the index-walking helper into a shared compilation unit (e.g. asyn-base.c) and have both backends call it.","locations":[{"ref":"lib/asyn-ares.c:352-366","code":"  352 | static const struct Curl_addrinfo *async_ares_get_ai(\n  353 |   const struct Curl_addrinfo *ai,\n  354 |   int ai_family,\n  355 |   unsigned int index)\n  356 | {\n  357 |   unsigned int i = 0;\n  358 |   for(i = 0; ai; ai = ai->ai_next) {\n  359 |     if(ai->ai_family == ai_family) {\n  360 |       if(i == index)\n  361 |         return ai;\n  362 |       ++i;\n  363 |     }\n  364 |   }\n  365 |   return NULL;\n  366 | }"},{"ref":"lib/asyn-thrdd.c:767-780","code":"  767 | static const struct Curl_addrinfo *async_thrdd_get_ai(\n  768 |   const struct Curl_addrinfo *ai,\n  769 |   int ai_family, unsigned int index)\n  770 | {\n  771 |   unsigned int i = 0;\n  772 |   for(i = 0; ai; ai = ai->ai_next) {\n  773 |     if(ai->ai_family == ai_family) {\n  774 |       if(i == index)\n  775 |         return ai;\n  776 |       ++i;\n  777 |     }\n  778 |   }\n  779 |   return NULL;\n  780 | }"}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"negligible","description":"ascii_to_unicode_le() in curl_ntlm_core.c and unicodecpy() in ntlm.c are byte-for-byte identical (copy src into dest interleaving zero bytes for little-endian UTF-16). The same routine also appears as the body of ascii_uppercase_to_unicode_le minus the toupper. Maintaining three near-identical copies risks divergence.","fix":"Consolidate into a single shared helper (e.g. in curl_ntlm_core) and have ntlm.c call it, parameterizing the optional uppercase transform.","locations":[{"ref":"lib/curl_ntlm_core.c:396-404","code":"  396 | static void ascii_to_unicode_le(unsigned char *dest, const char *src,\n  397 |                                 size_t srclen)\n  398 | {\n  399 |   size_t i;\n  400 |   for(i = 0; i < srclen; i++) {\n  401 |     dest[2 * i] = (unsigned char)src[i];\n  402 |     dest[(2 * i) + 1] = '\\0';\n  403 |   }\n  404 | }"},{"ref":"lib/vauth/ntlm.c:396-403","code":"  396 | static void unicodecpy(unsigned char *dest, const char *src, size_t length)\n  397 | {\n  398 |   size_t i;\n  399 |   for(i = 0; i < length; i++) {\n  400 |     dest[2 * i] = (unsigned char)src[i];\n  401 |     dest[(2 * i) + 1] = '\\0';\n  402 |   }\n  403 | }"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","description":"Potential NULL dereference of ctx->dest in the HTTP/2 proxy CF_QUERY_HOST_PORT handler. It dereferences `ctx->dest->port` and `ctx->dest->hostname` without any NULL check, whereas the analogous HTTP/1 handler (cf_h1_proxy_query) guards with `if(!ts || !ts->dest) break;`. While ctx->dest is normally linked in Curl_cf_h2_proxy_insert_after(), the inconsistent lack of a guard makes this fragile if the query is ever issued before/after dest is set.","fix":"Mirror the h1 handler and guard: `if(!ctx->dest) break;` before dereferencing ctx->dest in the CF_QUERY_HOST_PORT case.","locations":[{"ref":"lib/cf-h2-proxy.c:1432-1435","code":" 1432 |   case CF_QUERY_HOST_PORT:\n 1433 |     *pres1 = (int)ctx->dest->port;\n 1434 |     *((const char **)pres2) = ctx->dest->hostname;\n 1435 |     return CURLE_OK;"},{"ref":"lib/cf-h1-proxy.c:927-932","code":"  927 |   case CF_QUERY_HOST_PORT:\n  928 |     if(!ts || !ts->dest)\n  929 |       break;\n  930 |     *pres1 = (int)ts->dest->port;\n  931 |     *((const char **)pres2) = ts->dest->hostname;\n  932 |     return CURLE_OK;"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","description":"Curl_addr2string() for AF_UNIX copies su->sun_path with curl_msnprintf(\"%s\",...)\nbut only checks that salen > sizeof(CURL_SA_FAMILY_T) to decide the socket has a\nname. sun_path is not guaranteed NUL-terminated when it occupies the full\nbuffer (a path of exactly sizeof(sun_path) bytes). curl_msnprintf(\"%s\") will\nthen read past sun_path until it finds a NUL, potentially reading adjacent\nstack/struct bytes from the Curl_sockaddr_storage. For abstract or\nmaximum-length unix paths this is an over-read.","fix":"Bound the copy by the actual address length, e.g. use the known sun_path length derived from salen and curl_msnprintf with a precision (\"%.*s\") or ensure NUL-termination before formatting.","locations":[{"ref":"lib/connect.c:246-256","code":"  246 | #ifdef USE_UNIX_SOCKETS\n  247 |   case AF_UNIX:\n  248 |     if(salen > (curl_socklen_t)sizeof(CURL_SA_FAMILY_T)) {\n  249 |       su = (struct sockaddr_un *)sa;\n  250 |       curl_msnprintf(addr, MAX_IPADR_LEN, \"%s\", su->sun_path);\n  251 |     }\n  252 |     else\n  253 |       addr[0] = 0; /* socket with no name */\n  254 |     *port = 0;\n  255 |     return TRUE;\n  256 | #endif"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","description":"extend_key_56_to_64() and the DES setup paths treat NTLM password-derived key material; Curl_ntlm_core_mk_lm_hash leaves the working buffer 'pw' (containing the uppercased password) on the stack wit
