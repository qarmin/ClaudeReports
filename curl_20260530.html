 141 | \n  142 |   charset[c] = 1;\n  143 |   if(ISALNUM(c) && *p++ == '-') {\n  144 |     char_class cc = charclass(c);\n  145 |     unsigned char endrange = *p++;\n  146 | \n  147 |     if(endrange == '\\\\')\n  148 |       endrange = *p++;\n  149 |     if(endrange >= c && charclass(endrange) == cc) {\n  150 |       while(c++ != endrange)\n  151 |         if(charclass(c) == cc)  /* Chars in class may be not consecutive. */\n  152 |           charset[c] = 1;\n  153 |       *pp = p;\n  154 |     }\n  155 |   }\n  156 | }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","description":"doh_print_buf() ignores its computed `truncated` flag when calling Curl_hexencode(). When len > LOCAL_PB_HEXMAX/2 it sets truncated=TRUE but still calls Curl_hexencode(buf, len, hexstr, hlen) with the full `len` and the fixed-size hlen buffer. It relies entirely on Curl_hexencode() to clamp output to the destination size; the function never actually shortens `len`, so the \"(truncated)\" label is the only effect. While Curl_hexencode is expected to bound-check, the intent of computing `truncated` from len was presumably to also limit the encoded length; the dead use of the flag indicates the truncation logic is incomplete/relies on an implicit contract. Debug/verbose only.","fix":"Pass a length to Curl_hexencode that is explicitly clamped to (LOCAL_PB_HEXMAX/2) when truncating, instead of passing the full `len` and depending on the encoder to clamp.","locations":[{"ref":"lib/doh.c:197-212","code":"  197 | static void doh_print_buf(struct Curl_easy *data,\n  198 |                           const char *prefix,\n  199 |                           unsigned char *buf, size_t len)\n  200 | {\n  201 |   unsigned char hexstr[LOCAL_PB_HEXMAX];\n  202 |   size_t hlen = LOCAL_PB_HEXMAX;\n  203 |   bool truncated = FALSE;\n  204 | \n  205 |   if(len > (LOCAL_PB_HEXMAX / 2))\n  206 |     truncated = TRUE;\n  207 |   Curl_hexencode(buf, len, hexstr, hlen);\n  208 |   if(!truncated)\n  209 |     infof(data, \"%s: len=%d, val=%s\", prefix, (int)len, hexstr);\n  210 |   else\n  211 |     infof(data, \"%s: len=%d (truncated)val=%s\", prefix, (int)len, hexstr);\n  212 | }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ftp_state_use_pasv() / ftp_pp_statemachine FTP_PASV handling: when the EPSV\n(count1==0) parse succeeds at lines 2074-2085 but the inner `if(sep && ...)`\ncondition is false, `ptr` is set to NULL (line 2087) and then the `if(!ptr)`\nblock returns CURLE_FTP_WEIRD_PASV_REPLY. That is correct. However, when\ncount1==0 and ftpcode is NOT 229 (EPSV failed) the code at lines 2137-2140\ncalls ftp_epsv_disable to fall back to PASV — but if count1==0 and ftpcode==229\nyet the '(' is missing, it returns WEIRD_PASV without attempting the PASV\nfallback, so a server that sends a 229 with a non-standard body that curl\ncannot parse aborts instead of retrying with PASV.","fix":"On a 229 reply that fails to parse, consider falling back to ftp_epsv_disable() (PASV) rather than failing outright, mirroring the EPSV-connect-failure path.","locations":[{"ref":"lib/ftp.c:2065-2092","code":" 2065 |   if((ftpc->count1 == 0) &&\n 2066 |      (ftpcode == 229)) {\n 2067 |     /* positive EPSV response */\n 2068 |     const char *ptr = strchr(str, '(');\n 2069 |     if(ptr) {\n 2070 |       char sep;\n 2071 |       ptr++;\n 2072 |       /* |||12345| */\n 2073 |       sep = ptr[0];\n 2074 |       if(sep && (ptr[1] == sep) && (ptr[2] == sep) && ISDIGIT(ptr[3])) {\n 2075 |         const char *p = &ptr[3];\n 2076 |         curl_off_t num;\n 2077 |         if(curlx_str_number(&p, &num, 0xffff) || (*p != sep)) {\n 2078 |           failf(data, \"Illegal port number in EPSV reply\");\n 2079 |           return CURLE_FTP_WEIRD_PASV_REPLY;\n 2080 |         }\n 2081 |         newport = (unsigned short)num;\n 2082 |         result = ftp_control_addr_dup(data, &newhost);\n 2083 |         if(result)\n 2084 |           return result;\n 2085 |       }\n 2086 |       else\n 2087 |         ptr = NULL;\n 2088 |     }\n 2089 |     if(!ptr) {\n 2090 |       failf(data, \"Weirdly formatted EPSV reply\");\n 2091 |       return CURLE_FTP_WEIRD_PASV_REPLY;\n 2092 |     }"},{"ref":"lib/ftp.c:2137-2144","code":" 2137 |   else if(ftpc->count1 == 0) {\n 2138 |     /* EPSV failed, move on to PASV */\n 2139 |     return ftp_epsv_disable(data, ftpc, conn);\n 2140 |   }\n 2141 |   else {\n 2142 |     failf(data, \"Bad PASV/EPSV response: %03d\", ftpcode);\n 2143 |     return CURLE_FTP_WEIRD_PASV_REPLY;\n 2144 |   }"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In parse_unix_hlinks() (PL_UNIX_HLINKS_NUMBER) the link count is parsed with\n`curlx_str_number(&p, &hlinks, LONG_MAX)` and then stored as\n`info.hardlinks = (long)hlinks`. hlinks is curl_off_t. On platforms where long\nis 32-bit but curl_off_t is 64-bit, LONG_MAX caps the value so the cast is safe;\nbut the cap argument LONG_MAX is passed to a function expecting curl_off_t,\nwhich on LLP64 (Windows 64-bit, long==32-bit) limits hardlink counts to 2^31-1\nsilently — fine — yet info.hardlinks is itself a long, so values are bounded\ncorrectly. No overflow, but the mix of long/curl_off_t here is inconsistent with\nthe size-handling elsewhere (size uses CURL_OFF_T_MAX).","fix":"Use a curl_off_t field or document the deliberate long-typed hardlink count; keep the cap consistent with the destination type.","locations":[{"ref":"lib/ftplistparser.c:487-489","code":"  487 |       if(!curlx_str_number(&p, &hlinks, LONG_MAX)) {\n  488 |         parser->file_data->info.flags |= CURLFINFOFLAG_KNOWN_HLINKCOUNT;\n  489 |         parser->file_data->info.hardlinks = (long)hlinks;"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","description":"start_req() scans the request line backwards for the SP separating TARGET and HTTP-VERSION starting at index parser->line_len: `for(i = parser->line_len; i > m_len; --i) { if(parser->line[i] == ' ') ... }`. The first iteration reads parser->line[parser->line_len], which is one byte past the logical (trimmed) line content. parser->line_len has already been reduced by trim_line() to exclude the trailing CR/LF, so line[line_len] is the stripped CR/LF (or, when scratch is used, the dynbuf NUL terminator). It is within the physical buffer so not an out-of-bounds read, but the loop reads a byte it should not consider; the intended start index is line_len-1.","fix":"Start the backward scan at `i = parser->line_len - 1` (guarding line_len != 0) so the loop only inspects bytes that belong to the trimmed line.","locations":[{"ref":"lib/http1.c:160-168","code":"  160 |   /* URL may contain spaces so scan backwards */\n  161 |   for(i = parser->line_len; i > m_len; --i) {\n  162 |     if(parser->line[i] == ' ') {\n  163 |       hv = &parser->line[i + 1];\n  164 |       hv_len = parser->line_len - i;\n  165 |       target_len = (hv - target) - 1;\n  166 |       break;\n  167 |     }\n  168 |   }"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","description":"if2ip.c (HAVE_GETIFADDRS variant): when curlx_inet_ntop() fails it returns NULL\ninto `ip`, but the code unconditionally sets res = IF2IP_FOUND (line 157) and\nthen calls curl_msnprintf(buf, buf_size, \"%s%s\", ip, scope) with a NULL `ip`.\ncurl's mprintf renders NULL %s as \"(nil)\", so the caller receives IF2IP_FOUND\ntogether with a bogus address string \"(nil)\" which is later fed to\ncurlx_inet_pton() in bindlocal() and fails there. The function should treat an\ninet_ntop failure as not-found rather than reporting a spurious found address.","fix":"Set res = IF2IP_FOUND and write buf only when curlx_inet_ntop() returns non-NULL; otherwise leave res unchanged (NOT_FOUND/AF_NOT_SUPPORTED).","locations":[{"ref":"lib/if2ip.c:157-160","code":"  157 |             res = IF2IP_FOUND;\n  158 |             ip = curlx_inet_ntop(af, addr, ipstr, sizeof(ipstr));\n  159 |             curl_msnprintf(buf, buf_size, \"%s%s\", ip, scope);\n  160 |             break;"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","description":"is_custom_fetch_listing_match() returns the lowercase `true` (C99 stdbool) in two places while the function is declared to return curl's `bool` and the rest of the file uses uppercase TRUE/FALSE. This works only because <stdbool.h>/curl's bool make them equal, but it is an inconsistency that can break on builds where bool is a typedef without stdbool true/false defined, and it diverges from the project's established TRUE/FALSE convention used everywhere else in imap.c.","fix":"Return TRUE/FALSE instead of true/true to match the file-wide convention.","locations":[{"ref":"lib/imap.c:1190-1194","code":" 1190 |   if(*params == ':')\n 1191 |     return true;\n 1192 |   if(*params == ',')\n 1193 |     return true;\n 1194 |   return FALSE;"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Curl_md4it truncates the input length with curlx_uztoui(len) and passes it to my_md4_update whose len parameter is 'unsigned long'. For the pure-C / nettle / wolfSSL backends update accepts the full length, but the truncation to unsigned int happens before the call, so on a 64-bit platform an input >= 4GiB would silently hash only the low 32 bits of the length's worth of data. Unlike Curl_md5it/Curl_sha256it/Curl_hmacit which loop in UINT_MAX chunks, Curl_md4it performs a single truncated call. In practice NTLM inputs are tiny, but the asymmetry is a latent correctness bug.","fix":"Mirror Curl_md5it: loop calling my_md4_update with CURLMIN(len, UINT_MAX)-sized chunks instead of a single curlx_uztoui(len) truncation.","locations":[{"ref":"lib/md4.c:455-464","code":"  455 | CURLcode Curl_md4it(unsigned char *output,\n  456 |                     const unsigned char *input, const size_t len)\n  457 | {\n  458 |   my_md4_ctx ctx;\n  459 |   if(!my_md4_init(&ctx))\n  460 |     return CURLE_FAILED_INIT;\n  461 |   my_md4_update(&ctx, input, curlx_uztoui(len));\n  462 |   my_md4_final(output, &ctx);\n  463 |   return CURLE_OK;\n  464 | }"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Curl_md5it/Curl_sha256it/Curl_hmacit chunk large inputs with a do/while loop using ilen = CURLMIN(len, UINT_MAX). On a platform where size_t is 32-bit (UINT_MAX == SIZE_MAX), if len == UINT_MAX the first iteration consumes ilen = UINT_MAX, len becomes 0, loop ends - fine. But the chunking is only meaningful where size_t > 32-bit; on 32-bit size_t the CURLMIN can never split and ilen could equal len exactly. The construct is correct, however the do/while form means a zero-length input still performs one update(0) call; while harmless for these backends it relies on every backend's update tolerating a 0-length call, which is an implicit contract not asserted.","fix":"Use a while(len) loop (or guard the zero-length case) so a 0-length input performs zero update calls, removing the implicit requirement that every hash backend's update handles len==0.","locations":[{"ref":"lib/md5.c:547-564","code":"  547 | CURLcode Curl_md5it(unsigned char *output,\n  548 |                     const unsigned char *input, size_t len)\n  549 | {\n  550 |   CURLcode result;\n  551 |   my_md5_ctx ctx;\n  552 | \n  553 |   result = my_md5_init(&ctx);\n  554 |   if(!result) {\n  555 |     do {\n  556 |       unsigned int ilen = (unsigned int)CURLMIN(len, UINT_MAX);\n  557 |       my_md5_update(&ctx, input, ilen);\n  558 |       input += ilen;\n  559 |       len -= ilen;\n  560 |     } while(len);\n  561 |     my_md5_final(output, &ctx);\n  562 |   }\n  563 |   return result;\n  564 | }"},{"ref":"lib/sha256.c:485-502","code":"  485 | CURLcode Curl_sha256it(unsigned char *output, const unsigned char *input,\n  486 |                        size_t len)\n  487 | {\n  488 |   CURLcode result;\n  489 |   my_sha256_ctx ctx;\n  490 | \n  491 |   result = my_sha256_init(&ctx);\n  492 |   if(!result) {\n  493 |     do {\n  494 |       unsigned int ilen = (unsigned int)CURLMIN(len, UINT_MAX);\n  495 |       my_sha256_update(&ctx, input, ilen);\n  496 |       len -= ilen;\n  497 |       input += ilen;\n  498 |     } while(len);\n  499 |     my_sha256_final(output, &ctx);\n  500 |   }\n  501 |   return result;\n  502 | }"},{"ref":"lib/hmac.c:156-162","code":"  156 |   /* Update the digest with the given challenge */\n  157 |   do {\n  158 |     unsigned int ilen = (unsigned int)CURLMIN(datalen, UINT_MAX);\n  159 |     Curl_HMAC_update(ctxt, data, ilen);\n  160 |     datalen -= ilen;\n  161 |     data += ilen;\n  162 |   } while(datalen);"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In the MQTT CONNECT packet builder, add_passwd() sets only the password flag (0x40) in the CONNECT flags byte, and is called whenever a password is present even if no username was supplied (ulen == 0, so add_user() / the username flag 0x80 is never set). MQTT 3.1.1 section 3.1.2.9 mandates that the password flag MUST NOT be set unless the username flag is also set; a spec-compliant broker is entitled to reject such a CONNECT. This is a protocol-correctness issue (a password-only URL produces a malformed CONNECT), not a memory-safety problem.","fix":"Reject (or ignore) a password supplied without a username, or set the username flag/length appropriately, so that the password flag is never sent without the username flag as required by the MQTT specification.","locations":[{"ref":"lib/mqtt.c:336-344","code":"  336 |   /* if passwd was provided, add it to the packet */\n  337 |   if(plen) {\n  338 |     rc = add_passwd(creds->passwd, plen, packet, start_pwd, remain_pos);\n  339 |     if(rc) {\n  340 |       failf(data, \"Password too long: [%zu]\", plen);\n  341 |       result = CURLE_WEIRD_SERVER_REPLY;\n  342 |       goto end;\n  343 |     }\n  344 |   }"},{"ref":"lib/mqtt.c:188-205","code":"  188 | /* add the passwd to the CONNECT packet */\n  189 | static int add_passwd(const char *passwd, const size_t plen,\n  190 |                       char *pkt, const size_t start, int remain_pos)\n  191 | {\n  192 |   /* magic number that need to be set properly */\n  193 |   const size_t conn_flags_pos = remain_pos + 8;\n  194 |   if(plen > 0xffff)\n  195 |     return 1;\n  196 | \n  197 |   /* set password flag */\n  198 |   pkt[conn_flags_pos] |= 0x40;\n  199 | \n  200 |   /* length of password provided */\n  201 |   pkt[start] = (char)((plen >> 8) & 0xFF);\n  202 |   pkt[start + 1] = (char)(plen & 0xFF);\n  203 |   memcpy(&pkt[start + 2], passwd, plen);\n  204 |   return 0;\n  205 | }"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","description":"mqtt_verify_suback() rejects a SUBACK whose packet id or return code do not match, but unlike mqtt_verify_connack() (which calls failf() on mismatch) it silently returns CURLE_WEIRD_SERVER_REPLY with no failf()/infof() diagnostic. For a user this surfaces as a generic \"weird server reply\" with no indication that the SUBACK packet id or QoS byte was the problem, making subscription failures hard to diagnose.","fix":"Add a failf(data, \"SUBACK mismatch ...\") before setting result = CURLE_WEIRD_SERVER_REPLY, mirroring the diagnostic style used in mqtt_verify_connack().","locations":[{"ref":"lib/mqtt.c:531-537","code":"  531 |   if(((unsigned char)ptr[0]) != ((mqtt->packetid >> 8) & 0xff) ||\n  532 |      ((unsigned char)ptr[1]) != (mqtt->packetid & 0xff) ||\n  533 |      ptr[2] != 0x00) {\n  534 |     curlx_dyn_reset(&mq->recvbuf);\n  535 |     result = CURLE_WEIRD_SERVER_REPLY;\n  536 |     goto fail;\n  537 |   }"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","description":"On Windows, the \"_netrc\" fallback path is built from a NULL `home` pointer when the NETRC environment variable was set. `home`/`homea` are only assigned inside the `if(!filealloc)` block; if `curl_getenv(\"NETRC\")` returns non-NULL, that block is skipped and `home` stays NULL. If scanning the NETRC-named file then returns NETRC_FILE_MISSING, the #ifdef _WIN32 fallback executes `curl_maprintf(\"%s%s_netrc\", home, DIR_CHAR)` with home == NULL, producing a bogus path (curl_maprintf renders NULL as \"(null)\") and an always-missing file. The fallback is only meaningful for the default-home case, not when an explicit NETRC env var was given.","fix":"Only attempt the _netrc fallback when `home` is non-NULL (i.e. the default-home branch was taken), e.g. guard the #ifdef _WIN32 block with `if(home && retcode == NETRC_FILE_MISSING)`.","locations":[{"ref":"lib/netrc.c:579-643","code":"  579 |   if(!netrcfile) {\n  580 |     char *home = NULL;\n  581 |     char *homea = NULL;\n  582 | #if defined(HAVE_GETPWUID_R) && defined(HAVE_GETEUID)\n  583 |     char pwbuf[1024];\n  584 | #endif\n  585 |     filealloc = curl_getenv(\"NETRC\");\n  586 |     if(!filealloc) {\n  587 |       homea = curl_getenv(\"HOME\"); /* portable environment reader */\n  588 |       if(homea) {\n  589 |         home = homea;\n  590 | #if defined(HAVE_GETPWUID_R) && defined(HAVE_GETEUID)\n  591 |       }\n  592 |       else {\n  593 |         struct passwd pw, *pw_res;\n  594 |         if(!getpwuid_r(geteuid(), &pw, pwbuf, sizeof(pwbuf), &pw_res) &&\n  595 |            pw_res) {\n  596 |           home = pw.pw_dir;\n  597 |         }\n  598 | #elif defined(HAVE_GETPWUID) && defined(HAVE_GETEUID)\n  599 |       }\n  600 |       else {\n  601 |         struct passwd *pw;\n  602 |         pw = getpwuid(geteuid());\n  603 |         if(pw) {\n  604 |           home = pw->pw_dir;\n  605 |         }\n  606 | #elif defined(_WIN32)\n  607 |       }\n  608 |       else {\n  609 |         homea = curl_getenv(\"USERPROFILE\");\n  610 |         if(homea) {\n  611 |           home = homea;\n  612 |         }\n  613 | #endif\n  614 |       }\n  615 | \n  616 |       if(!home)\n  617 |         return NETRC_FILE_MISSING; /* no home directory found (or possibly out\n  618 |                                       of memory) */\n  619 | \n  620 |       filealloc = curl_maprintf(\"%s%s.netrc\", home, DIR_CHAR);\n  621 |       if(!filealloc) {\n  622 |         curlx_free(homea);\n  623 |         retcode = NETRC_OUT_OF_MEMORY;\n  624 |         goto out;\n  625 |       }\n  626 |     }\n  627 |     retcode = netrc_scan_file(\n  628 |       data, store, hostname, user, filealloc, pcreds);\n  629 |     curlx_free(filealloc);\n  630 | #ifdef _WIN32\n  631 |     if(retcode == NETRC_FILE_MISSING) {\n  632 |       /* fallback to the old-style \"_netrc\" file */\n  633 |       filealloc = curl_maprintf(\"%s%s_netrc\", home, DIR_CHAR);\n  634 |       if(!filealloc) {\n  635 |         curlx_free(homea);\n  636 |         return NETRC_OUT_OF_MEMORY;\n  637 |       }\n  638 |       retcode = netrc_scan_file(\n  639 |         data, store, hostname, user, filealloc, pcreds);\n  640 |       curlx_free(filealloc);\n  641 |     }\n  642 | #endif\n  643 |     curlx_free(homea);"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","description":"oldap_url_parse() only calls ldap_url_parse() when there are no user, password or options components in the URL; otherwise `rc` keeps its initialized value LDAP_URL_ERR_BADURL and the function reports CURLE_URL_MALFORMAT with the message \"bad URL\". The effect is correct (LDAP URLs with embedded credentials/options are refused), but the diagnostic is misleading: the URL is not malformed, it simply contains components this code path does not support. A user supplying ldap://user:pass@host/... gets a confusing \"bad URL\" error.","fix":"Emit a distinct, accurate message when user/password/options are present (e.g. \"LDAP URLs with user/password/options in the authority are not supported here\") instead of reusing the generic bad-URL error string.","locations":[{"ref":"lib/openldap.c:182-195","code":"  182 |   *ludp = NULL;\n  183 |   if(!data->state.up.user && !data->state.up.password &&\n  184 |      !data->state.up.options)\n  185 |     rc = ldap_url_parse(Curl_bufref_ptr(&data->state.url), ludp);\n  186 |   if(rc != LDAP_URL_SUCCESS) {\n  187 |     const char *msg = \"url parsing problem\";\n  188 | \n  189 |     result = rc == LDAP_URL_ERR_MEM ? CURLE_OUT_OF_MEMORY :\n  190 |       CURLE_URL_MALFORMAT;\n  191 |     rc -= LDAP_URL_SUCCESS;\n  192 |     if((size_t)rc < CURL_ARRAYSIZE(url_errs))\n  193 |       msg = url_errs[rc];\n  194 |     failf(data, \"LDAP local: %s\", msg);\n  195 |   }"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","description":"datecheck() validates day-of-month only against the universal upper bound 31 (`w->mday > 31`), independent of month, so dates like \"Feb 31\" or \"Apr 31\" parse as valid and are fed to time2epoch(), which uses cumulative_days[] plus the raw mday. The result is a silently wrong epoch (the overflow rolls into the next month) rather than a parse failure. For Set-Cookie/Alt-Svc/HSTS expiry parsing this means a malformed date can yield an unexpected (often slightly larger) expiry time instead of being rejected. The looseness is historically intentional, but worth noting as a correctness gap in security-relevant expiry handling.","fix":"If strict validation is desired, range-check mday against the actual days in w->mon (accounting for leap years for February) before accepting the date; otherwise document the intentional leniency explicitly.","locations":[{"ref":"lib/parsedate.c:488-506","code":"  488 | static int datecheck(struct when *w)\n  489 | {\n  490 |   if(w->sec == -1)\n  491 |     w->sec = w->min = w->hour = 0; /* no time, make it zero */\n  492 | \n  493 |   if((w->mday == -1) || (w->mon == -1) || (w->year == -1))\n  494 |     /* lacks vital info, fail */\n  495 |     return PARSEDATE_FAIL;\n  496 | \n  497 |   /* The Gregorian calendar was introduced 1582 */\n  498 |   else if(w->year < 1583)\n  499 |     return PARSEDATE_FAIL;\n  500 | \n  501 |   else if((w->mday > 31) || (w->mon > 11) || (w->hour > 23) ||\n  502 |           (w->min > 59) || (w->sec > 60))\n  503 |     return PARSEDATE_FAIL; /* clearly an illegal date */\n  504 | \n  505 |   return PARSEDATE_OK;\n  506 | }"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","description":"pop3_get_message() advances past blanks with `for(message += 2; ISBLANK(*message); message++, len--)` after `len -= 2`. The loop relies on the NUL terminator / a non-blank byte appearing within the buffer to stop before len underflows. If a server sends a final response line consisting only of the status code followed by blanks and the dynbuf content after offset 2 were entirely ISBLANK with no terminator inside nfinal, len (size_t) would wrap. In practice the recvbuf is NUL terminated and the trailing CRLF stops the scan, so this is defensive only, but the same pattern is duplicated in imap_get_message() and smtp_get_message() and none bound the decrement on len reaching 0.","fix":"Add a `len &&` guard to the blank-skipping loop condition, e.g. `for(message += 2; len && ISBLANK(*message); message++, len--)`.","locations":[{"ref":"lib/pop3.c:358-371","code":"  358 |   if(len > 2) {\n  359 |     /* Find the start of the message */\n  360 |     len -= 2;\n  361 |     for(message += 2; ISBLANK(*message); message++, len--)\n  362 |       ;\n  363 | \n  364 |     /* Find the end of the message */\n  365 |     while(len--)\n  366 |       if(!ISBLANK(message[len]) && !ISNEWLINE(message[len]))\n  367 |         break;\n  368 | \n  369 |     /* Terminate the message */\n  370 |     message[++len] = '\\0';\n  371 |     Curl_bufref_set(out, message, len, NULL);"},{"ref":"lib/imap.c:437-450","code":"  437 |   if(len > 2) {\n  438 |     /* Find the start of the message */\n  439 |     len -= 2;\n  440 |     for(message += 2; ISBLANK(*message); message++, len--)\n  441 |       ;\n  442 | \n  443 |     /* Find the end of the message */\n  444 |     while(len--)\n  445 |       if(!ISNEWLINE(message[len]) && !ISBLANK(message[len]))\n  446 |         break;\n  447 | \n  448 |     /* Terminate the message */\n  449 |     message[++len] = '\\0';\n  450 |     Curl_bufref_set(out, message, len, NULL);"},{"ref":"lib/smtp.c:546-559","code":"  546 |   if(len > 4) {\n  547 |     /* Find the start of the message */\n  548 |     len -= 4;\n  549 |     for(message += 4; ISBLANK(*message); message++, len--)\n  550 |       ;\n  551 | \n  552 |     /* Find the end of the message */\n  553 |     while(len--)\n  554 |       if(!ISNEWLINE(message[len]) && !ISBLANK(message[len]))\n  555 |         break;\n  556 | \n  557 |     /* Terminate the message */\n  558 |     message[++len] = '\\0';\n  559 |     Curl_bufref_set(out, message, len, NULL);"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Curl_rlimit_drain() guards against signed underflow with\n`if((INT64_MIN + val) < r->tokens) r->tokens -= val; else r->tokens = INT64_MIN;`.\nThe intent is to subtract `val` unless that would underflow below INT64_MIN, i.e.\nthe subtraction is safe whenever `r->tokens >= INT64_MIN + val`. The condition\nused is strict (`<`), so when `r->tokens == INT64_MIN + val` exactly, the code\ntakes the clamp branch and sets INT64_MIN. The computed result would also be\nexactly INT64_MIN, so the observable outcome is identical; this is a harmless\noff-by-one in the boundary test rather than a real bug, but the boundary\ncondition is inconsistent with the analogous overflow check at line 65\n(`(INT64_MAX - token_gain) > r->tokens`).","fix":"Use `>=` for the safe-subtraction test ((INT64_MIN + val) <= r->tokens) to match the boundary semantics, or leave as-is and document that the boundary is intentionally clamped.","locations":[{"ref":"lib/ratelimit.c:225-231","code":"  225 |   {\n  226 |     int64_t val = (int64_t)tokens;\n  227 |     if((INT64_MIN + val) < r->tokens)\n  228 |       r->tokens -= val;\n  229 |     else\n  230 |       r->tokens = INT64_MIN;\n  231 |   }"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","description":"tftp_send_first() builds the request with curl_msnprintf into\nstate->spacket.data + 2 using state->blksize as the size bound, but at the time\nof the first send state->blksize is TFTP_BLKSIZE_DEFAULT (512), while the buffer\nwas allocated as need_blksize (>=512) + 4. If the user requested a blksize\nlarger than 512, the buffer is larger than 512 but msnprintf is still bounded to\n512, so a long filename that would fit the actual buffer is rejected by the\nearlier length check at lines 700-704 (which also uses state->blksize). This is\na conservative under-utilization, not unsafe, but the filename length test and\nthe snprintf bound both assume 512 regardless of the larger allocation.","fix":"Use the negotiated/allocated capacity consistently when bounding the RRQ/WRQ construction and the filename-length check.","locations":[{"ref":"lib/tftp.c:700-709","code":"  700 |     if(strlen(filename) + strlen(mode) + 4 > state->blksize) {\n  701 |       failf(data, \"TFTP filename too long\");\n  702 |       curlx_free(filename);\n  703 |       return CURLE_TFTP_ILLEGAL; /* too long filename field */\n  704 |     }\n  705 | \n  706 |     sbytes = 2 +\n  707 |       curl_msnprintf((char *)state->spacket.data + 2,\n  708 |                      state->blksize,\n  709 |                      \"%s%c%s%c\", filename, '\\0', mode, '\\0');"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","description":"parse_connect_to_string() advances `ptr` by the matched hostname length\n(`ptr += hlen`) after curl_strnequal(ptr, hostname_to_match, hlen). If the\nconnect-to entry's host field is shorter than hlen, curl_strnequal stops at the\nNUL and returns 0, so host_match is FALSE; the subsequent `host_match && *ptr`\nshort-circuits and `*ptr` is not dereferenced, so there is no out-of-bounds\nread. However `ptr` is still advanced past the end of the string and then\n`ptr++` again, leaving `ptr` pointing well beyond the buffer. Because the\n`if(host_match)` block is skipped this stale pointer is never used, so the code\nis safe today, but the unconditional `ptr += hlen; ptr++` on a non-matching,\nshorter input relies entirely on the short-circuit and the skipped block to\navoid UB. It is fragile to future edits.","fix":"Only advance ptr by hlen after confirming the prefix matched and that ptr[hlen] is reachable, e.g. guard with the match result before stepping past the hostname.","locations":[{"ref":"lib/url.c:2342-2374","code":" 2342 |   else {\n 2343 |     /* check whether the URL's hostname matches. Use the URL hostname\n 2344 |      * when it was an IPv6 address. Otherwise use the connection's hostname\n 2345 |      * that has IDN conversion. */\n 2346 |     const char *hostname_to_match = (dest->user_hostname[0] == '[') ?\n 2347 |       dest->user_hostname : dest->hostname;\n 2348 |     size_t hlen = strlen(hostname_to_match);\n 2349 |     host_match = curl_strnequal(ptr, hostname_to_match, hlen);\n 2350 |     ptr += hlen;\n 2351 | \n 2352 |     host_match = host_match && *ptr == ':';\n 2353 |     ptr++;\n 2354 |   }\n 2355 | \n 2356 |   if(host_match) {\n 2357 |     if(*ptr == ':') {\n 2358 |       /* an empty port always matches */\n 2359 |       port_match = TRUE;\n 2360 |       ptr++;\n 2361 |     }\n 2362 |     else {\n 2363 |       /* check whether the URL's port matches */\n 2364 |       const char *ptr_next = strchr(ptr, ':');\n 2365 |       if(ptr_next) {\n 2366 |         curl_off_t port_to_match;\n 2367 |         if(!curlx_str_number(&ptr, &port_to_match, 0xffff) &&\n 2368 |            ((uint16_t)port_to_match == dest->port)) {\n 2369 |           port_match = TRUE;\n 2370 |         }\n 2371 |         ptr = ptr_next + 1;\n 2372 |       }\n 2373 |     }\n 2374 |   }"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In send_packet_no_gso_cf() (tunneled QUIC over a proxy), when the lower filter accepts a partial datagram (sent < len), the code returns CURLE_AGAIN but has already added the partially-sent bytes to *psent. The caller vquic_flush() then does Curl_bufq_skip(&qctx->sendbuf, sent) with this partial count. Since QUIC packets must be sent on whole-datagram boundaries, skipping a partial datagram's bytes means the remainder of that datagram will be re-sent as a standalone (truncated) datagram on the next flush, corrupting the QUIC packet stream over the tunnel. The direct-socket path avoids this because do_sendmsg() reports a full-datagram send or CURLE_AGAIN with 0.","fix":"On a partial lower-filter accept, do not include the partial bytes in *psent (only count fully-accepted datagrams), so vquic_flush() never skips a fraction of a datagram from the sendbuf.","locations":[{"ref":"lib/vquic/vquic.c:266-300","code":"  266 | static CURLcode send_packet_no_gso_cf(struct Curl_cfilter *cf,\n  267 |                                       struct Curl_easy *data,\n  268 |                                       const uint8_t *pkt, size_t pktlen,\n  269 |                                       size_t gsolen, size_t *psent)\n  270 | {\n  271 |   const uint8_t *p, *end = pkt + pktlen;\n  272 |   size_t sent, len;\n  273 |   CURLcode result = CURLE_OK;\n  274 |   VERBOSE(size_t calls = 0);\n  275 | \n  276 |   *psent = 0;\n  277 | \n  278 |   /* Send one datagram-sized chunk per call into the lower filter. */\n  279 |   for(p = pkt; p < end; p += len) {\n  280 |     len = CURLMIN(gsolen, (size_t)(end - p));\n  281 |     result = Curl_conn_cf_send(cf->next, data, p, len, FALSE, &sent);\n  282 |     /* Report forward progress even if we return CURLE_AGAIN later. */\n  283 |     *psent += sent;\n  284 |     VERBOSE(++calls);\n  285 |     /* Preserve lower-filter errors (including CURLE_AGAIN). */\n  286 |     if(result)\n  287 |       goto out;\n  288 |     if(sent < len) {\n  289 |       /* We need whole datagrams here. Partial accept means blocked. */\n  290 |       result = CURLE_AGAIN;\n  291 |       goto out;\n  292 |     }\n  293 |   }\n  294 | \n  295 | out:\n  296 |   CURL_TRC_CF(data, cf,\n  297 |               \"vquic_cf_send(len=%zu, gso=%zu, calls=%zu) -> %d, sent=%zu\",\n  298 |               pktlen, gsolen, calls, result, *psent);\n  299 |   return result;\n  300 | }"},{"ref":"lib/vquic/vquic.c:343-378","code":"  343 |   while(Curl_bufq_peek(&qctx->sendbuf, &buf, &blen)) {\n  344 |     gsolen = qctx->gsolen;\n  345 |     if(qctx->split_len) {\n  346 |       gsolen = qctx->split_gsolen;\n  347 |       if(blen > qctx->split_len)\n  348 |         blen = qctx->split_len;\n  349 |     }\n  350 | \n  351 |     if(qctx->sockfd != CURL_SOCKET_BAD) {\n  352 |       /* Direct UDP socket (via happy eyeballs) */\n  353 |       result = vquic_send_packets(cf, data, qctx, buf, blen, gsolen, &sent);\n  354 |     }\n  355 |     else {\n  356 |       /* Tunneled QUIC (CONNECT-UDP through proxy) */\n  357 |       if(gsolen && (blen > gsolen)) {\n  358 |         /* Send one datagram at a time to preserve packet boundaries. */\n  359 |         result = send_packet_no_gso_cf(cf, data, buf, blen, gsolen, &sent);\n  360 |       }\n  361 |       else {\n  362 |         /* No GSO aggregate to split, regular lower-filter send is enough. */\n  363 |         result = Curl_conn_cf_send(cf->next, data, buf, blen, FALSE, &sent);\n  364 |       }\n  365 |     }\n  366 | \n  367 |     if(result) {\n  368 |       if(result == CURLE_AGAIN) {\n  369 |         Curl_bufq_skip(&qctx->sendbuf, sent);\n  370 |         if(qctx->split_len)\n  371 |           qctx->split_len -= sent;\n  372 |       }\n  373 |       return result;\n  374 |     }\n  375 |     Curl_bufq_skip(&qctx->sendbuf, sent);\n  376 |     if(qctx->split_len)\n  377 |       qctx->split_len -= sent;\n  378 |   }"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","description":"myssh_in_AUTHLIST() casts the signed int returned by ssh_userauth_list() directly to unsigned int and stores it into sshc->auth_methods. ssh_userauth_list() can return SSH_AUTH_ERROR (-1); cast to unsigned this becomes 0xFFFFFFFF, which then makes every `sshc->auth_methods & SSH_AUTH_METHOD_*` test pass. The preceding ssh_userauth_none() call already handles SSH_AUTH_ERROR, so in practice the list call is only reached after a non-error none result, but there is no explicit guard against a -1 return from ssh_userauth_list() here, so a spurious error return would select an arbitrary auth method instead of failing cleanly.","fix":"Check the signed return value of ssh_userauth_list() for < 0 before casting/using it, and route a negative value to myssh_to_ERROR(data, sshc, CURLE_LOGIN_DENIED).","locations":[{"ref":"lib/vssh/libssh.c:820-852","code":"  820 |   sshc->auth_methods =\n  821 |     (unsigned int)ssh_userauth_list(sshc->ssh_session, NULL);\n  822 |   if(sshc->auth_methods)\n  823 |     infof(data, \"SSH authentication methods available: %s%s%s%s\",\n  824 |           sshc->auth_methods & SSH_AUTH_METHOD_PUBLICKEY ?\n  825 |           \"public key, \" : \"\",\n  826 |           sshc->auth_methods & SSH_AUTH_METHOD_GSSAPI_MIC ?\n  827 |           \"GSSAPI, \" : \"\",\n  828 |           sshc->auth_methods & SSH_AUTH_METHOD_INTERACTIVE ?\n  829 |           \"keyboard-interactive, \" : \"\",\n  830 |           sshc->auth_methods & SSH_AUTH_METHOD_PASSWORD ?\n  831 |           \"password\" : \"\");\n  832 |   /* For public key auth we need either the private key or\n  833 |      CURLSSH_AUTH_AGENT. */\n  834 |   if((sshc->auth_methods & SSH_AUTH_METHOD_PUBLICKEY) &&\n  835 |      (data->set.str[STRING_SSH_PRIVATE_KEY] ||\n  836 |       (data->set.ssh_auth_types & CURLSSH_AUTH_AGENT))) {\n  837 |     myssh_to(data, sshc, SSH_AUTH_PKEY_INIT);\n  838 |     infof(data, \"Authentication using SSH public key file\");\n  839 |   }\n  840 |   else if(sshc->auth_methods & SSH_AUTH_METHOD_GSSAPI_MIC) {\n  841 |     myssh_to(data, sshc, SSH_AUTH_GSSAPI);\n  842 |   }\n  843 |   else if(sshc->auth_methods & SSH_AUTH_METHOD_INTERACTIVE) {\n  844 |     myssh_to(data, sshc, SSH_AUTH_KEY_INIT);\n  845 |   }\n  846 |   else if(sshc->auth_methods & SSH_AUTH_METHOD_PASSWORD) {\n  847 |     myssh_to(data, sshc, SSH_AUTH_PASS_INIT);\n  848 |   }\n  849 |   else {                  /* unsupported authentication method */\n  850 |     rc = myssh_to_ERROR(data, sshc, CURLE_LOGIN_DENIED);\n  851 |   }\n  852 |   return rc;"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In ssh_state_auth_pass() (libssh2) a failed password authentication unconditionally transitions to SSH_AUTH_HOST_INIT regardless of why it failed (e.g. wrong password vs. method not offered). This continues the auth ladder even after an explicit credential rejection, which is the intended fallback behavior, but note the asymmetry with ssh_state_auth_pass_init() which already gates on the 'password' method being in authlist. A password rejection (rc != 0, != EAGAIN) therefore silently retries host-based/agent/keyboard auth instead of surfacing CURLE_LOGIN_DENIED, masking the real failure in error reporting.","fix":"Consider distinguishing LIBSSH2_ERROR_AUTHENTICATION_FAILED from other rc values, or document that falling through the auth ladder on any password failure is intentional.","locations":[{"ref":"lib/vssh/libssh2.c:1579-1603","code":" 1579 | static CURLcode ssh_state_auth_pass(struct Curl_easy *data,\n 1580 |                                     struct ssh_conn *sshc)\n 1581 | {\n 1582 |   struct connectdata *conn = data->conn;\n 1583 |   const char *user = Curl_creds_user(conn->creds);\n 1584 |   const char *passwd = Curl_creds_passwd(conn->creds);\n 1585 |   int rc =\n 1586 |     libssh2_userauth_password_ex(sshc->ssh_session, user,\n 1587 |                                  curlx_uztoui(strlen(user)),\n 1588 |                                  passwd,\n 1589 |                                  curlx_uztoui(strlen(passwd)),\n 1590 |                                  NULL);\n 1591 |   if(rc == LIBSSH2_ERROR_EAGAIN) {\n 1592 |     return CURLE_AGAIN;\n 1593 |   }\n 1594 |   if(rc == 0) {\n 1595 |     sshc->authed = TRUE;\n 1596 |     infof(data, \"Initialized password authentication\");\n 1597 |     myssh_to(data, sshc, SSH_AUTH_DONE);\n 1598 |   }\n 1599 |   else {\n 1600 |     myssh_to(data, sshc, SSH_AUTH_HOST_INIT);\n 1601 |   }\n 1602 |   return CURLE_OK;\n 1603 | }"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","description":"hostmatch() performs `strncmp(pattern, \"*.\", 2)` and, in the !*. branch, reads pattern[0]/pattern[1] and later `Curl_host_is_ipnum(hostname)` / `hostname[0]`. The function assumes the inputs are NUL-terminated, but it is documented and named to operate on (ptr,len) pairs that 'do not assume they end in nul-bytes' (see pmatch comment). For a pattern of length 1 (after trailing-dot stripping), strncmp may read one byte past patternlen, and Curl_host_is_ipnum(hostname) scans for a NUL. In the current OpenSSL caller this is safe because callers only invoke Curl_cert_hostcheck after verifying altlen==strlen(altptr) / cnlen==strlen(cn), guaranteeing NUL-termination, but the hostcheck API contract (length-delimited, possibly non-terminated) is violated and any future caller passing genuinely non-terminated buffers would over-read.","fix":"Either document that pattern/hostname must be NUL-terminated, or make the wildcard/IP checks length-aware (guard the strncmp with patternlen>=2 and avoid Curl_host_is_ipnum on a non-terminated buffer).","locations":[{"ref":"lib/vtls/hostcheck.c:92-104","code":"   92 |   if(strncmp(pattern, \"*.\", 2))\n   93 |     return pmatch(hostname, hostlen, pattern, patternlen);\n   94 | \n   95 |   /* detect host as IP address or starting with a dot and fail if so */\n   96 |   else if(Curl_host_is_ipnum(hostname) || (hostname[0] == '.'))\n   97 |     return FALSE;\n   98 | \n   99 |   /* We require at least 2 dots in the pattern to avoid too wide wildcard\n  100 |      match. */\n  101 |   pattern_label_end = memchr(pattern, '.', patternlen);\n  102 |   if(!pattern_label_end ||\n  103 |      (memrchr(pattern, '.', patternlen) == pattern_label_end))\n  104 |     return pmatch(hostname, hostlen, pattern, patternlen);"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Curl_alpn_to_proto_buf() rejects an ALPN list that would exactly fill buf->data. The bounds check `if(off + blen + 1 >= (int)sizeof(buf->data))` uses `>=`, so when `off + blen + 1 == sizeof(buf->data)` (the entry fits exactly with no room to spare and no trailing NUL needed for this wire-format buffer) it returns CURLE_FAILED_INIT even though the data fits. This is an off-by-one over-strict rejection. It is not a memory-safety issue, but it can spuriously fail valid ALPN configurations that are exactly the buffer size.","fix":"Use `if(off + blen + 1 > (int)sizeof(buf->data))` (this binary form has no terminating NUL, unlike Curl_alpn_to_proto_str which correctly needs the extra byte).","locations":[{"ref":"lib/vtls/vtls.c:1945-1951","code":" 1945 |     blen = (unsigned char)len;\n 1946 |     if(off + blen + 1 >= (int)sizeof(buf->data))\n 1947 |       return CURLE_FAILED_INIT;\n 1948 |     buf->data[off++] = blen;\n 1949 |     memcpy(buf->data + off, spec->entries[i], blen);\n 1950 |     off += blen;\n 1951 |   }"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","description":"cf_ssl_peer_key_add_path() on _WIN32 only sets *is_local on _fullpath() failure, but on the realpath() branch it sets *is_local when realpath() fails for a relative path; for an absolute path (path[0]=='/') it neither resolves nor marks local. That is intended (absolute paths are stable). However, on the _WIN32 branch when _fullpath succeeds the absolute path is added, but when a *relative* Windows path cannot be resolved it still appends the raw relative path while marking is_local — consistent. The subtle issue: the function returns early (returns the addf result) on the success branches, so when _fullpath/realpath succeed the trailing `return curlx_dyn_addf(buf, \":%s-%s\", name, path)` is unreachable for those cases but reachable for the absolute-path/fall-through cases, mixing resolved and unresolved path encodings into the same key namespace. Two processes with different CWDs that both fail realpath on the same relative path get the same (is_local) key, which is acceptable, but a process where realpath succeeds and another where it fails produce different keys for the same logical file, defeating cache sharing. This is a minor cache-effectiveness/correctness inconsistency, not a safety bug.","fix":"Make the local/global decision deterministic regardless of whether path resolution happens to succeed (e.g. always mark relative-input keys local), so the generated peer key does not depend on transient realpath success.","locations":[{"ref":"lib/vtls/vtls_scache.c:71-100","code":"   71 | static CURLcode cf_ssl_peer_key_add_path(struct dynbuf *buf,\n   72 |                                          const char *name,\n   73 |                                          const char *path,\n   74 |                                          bool *is_local)\n   75 | {\n   76 |   if(path && path[0]) {\n   77 |     /* We try to add absolute paths, so that the session key can stay valid\n   78 |      * when used in another process with different CWD. When a path does not\n   79 |      * exist, this does not work. Then, we add the path as is. */\n   80 | #ifdef _WIN32\n   81 |     char abspath[_MAX_PATH];\n   82 |     if(_fullpath(abspath, path, _MAX_PATH))\n   83 |       return curlx_dyn_addf(buf, \":%s-%s\", name, abspath);\n   84 |     *is_local = TRUE;\n   85 | #elif defined(HAVE_REALPATH)\n   86 |     if(path[0] != '/') {\n   87 |       char *abspath = realpath(path, NULL);\n   88 |       if(abspath) {\n   89 |         CURLcode result = curlx_dyn_addf(buf, \":%s-%s\", name, abspath);\n   90 |         /* !checksrc! disable BANNEDFUNC 1 */\n   91 |         free(abspath); /* allocated by libc, free without memdebug */\n   92 |         return result;\n   93 |       }\n   94 |       *is_local = TRUE;\n   95 |     }\n   96 | #endif\n   97 |     return curlx_dyn_addf(buf, \":%s-%s\", name, path);\n   98 |   }\n   99 |   return CURLE_OK;\n  100 | }"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In Curl_ssl_session_unpack(), unknown SPACK tags are rejected, but there is no validation that mandatory fields are present after parsing. A packed blob containing only the version byte plus, say, an ALPN field but no CURL_SPACK_TICKET produces a Curl_ssl_session with sdata==NULL/sdata_len==0. Such a session is then handed to the scache as valid; downstream code (e.g. ossl_init_session_and_alpns checks `scs->sdata && scs->sdata_len` and Curl_ssl_session_pack DEBUGASSERTs s->sdata) assumes the ticket data exists. The pack side always writes the ticket, so well-formed input is fine, but the unpack side does not enforce that the ticket (sdata) was actually decoded, so a crafted/truncated import silently yields a ticket-less session object.","fix":"After the decode loop, verify the required fields (at least s->sdata/s->sdata_len) are set, returning CURLE_READ_ERROR otherwise.","locations":[{"ref":"lib/vtls/vtls_spack.c:262-310","code":"  262 | \n  263 |   while(buf < end) {\n  264 |     result = spack_dec8(&val8, &buf, end);\n  265 |     if(result)\n  266 |       goto out;\n  267 | \n  268 |     switch(val8) {\n  269 |     case CURL_SPACK_ALPN:\n  270 |       result = spack_decstr16(&s->alpn, &buf, end);\n  271 |       if(result)\n  272 |         goto out;\n  273 |       break;\n  274 |     case CURL_SPACK_EARLYDATA:\n  275 |       result = spack_dec32(&val32, &buf, end);\n  276 |       if(result)\n  277 |         goto out;\n  278 |       s->earlydata_max = val32;\n  279 |       break;\n  280 |     case CURL_SPACK_IETF_ID:\n  281 |       result = spack_dec16(&val16, &buf, end);\n  282 |       if(result)\n  283 |         goto out;\n  284 |       s->ietf_tls_id = val16;\n  285 |       break;\n  286 |     case CURL_SPACK_QUICTP: {\n  287 |       result = spack_decdata16(&pval8, &s->quic_tp_len, &buf, end);\n  288 |       if(result)\n  289 |         goto out;\n  290 |       s->quic_tp = pval8;\n  291 |       break;\n  292 |     }\n  293 |     case CURL_SPACK_TICKET: {\n  294 |       result = spack_decdata16(&pval8, &s->sdata_len, &buf, end);\n  295 |       if(result)\n  296 |         goto out;\n  297 |       s->sdata = pval8;\n  298 |       break;\n  299 |     }\n  300 |     case CURL_SPACK_VALID_UNTIL:\n  301 |       result = spack_dec64(&val64, &buf, end);\n  302 |       if(result)\n  303 |         goto out;\n  304 |       s->valid_until = (curl_off_t)val64;\n  305 |       break;\n  306 |     default:  /* unknown tag */\n  307 |       result = CURLE_READ_ERROR;\n  308 |       goto out;\n  309 |     }\n  310 |   }"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","description":"tool_readbusy_cb() uses a function-local `static curl_off_t ulprev;` to detect upload stalls (comparing the previous ulnow with the current). Because the variable is static and shared across all easy handles/transfers, when multiple transfers are running concurrently (parallel mode) their ulnow values interleave into the same `ulprev`, so the stall-detection waitfd/sleep heuristic can misfire (sleep when one transfer advanced but another did not, or fail to sleep when it should). This is a correctness/efficiency quirk of busy-read unpausing rather than a crash.","fix":"Track the previous ulnow per-transfer (e.g. store it in struct per_transfer) instead of in a single shared static, so each transfer compares against its own prior value.","locations":[{"ref":"src/tool_cb_rea.c:159-187","code":"  159 | int tool_readbusy_cb(void *clientp,\n  160 |                      curl_off_t dltotal, curl_off_t dlnow,\n  161 |                      curl_off_t ultotal, curl_off_t ulnow)\n  162 | {\n  163 |   struct per_transfer *per = clientp;\n  164 |   struct OperationConfig *config = per->config;\n  165 |   static curl_off_t ulprev;\n  166 | \n  167 |   (void)dltotal;\n  168 |   (void)dlnow;\n  169 |   (void)ultotal;\n  170 |   (void)ulnow;\n  171 | \n  172 |   if(config->readbusy) {\n  173 |     if(ulprev == ulnow) {\n  174 | #ifndef _WIN32\n  175 |       waitfd(1, per->infd);\n  176 | #else\n  177 |       curlx_wait_ms(1); /* sleep */\n  178 | #endif\n  179 |     }\n  180 | \n  181 |     config->readbusy = FALSE;\n  182 |     curl_easy_pause(per->curl, CURLPAUSE_CONT);\n  183 |   }\n  184 | \n  185 |   ulprev = ulnow;\n  186 | \n  187 |   return per->noprogress ? 0 : CURL_PROGRESSFUNC_CONTINUE;"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In parse_header(), when reading headers from a file/stdin, the loop breaks out on the first add2list() failure (err != PARAM_OK). After the loop, `if(error) err = PARAM_READ_ERROR;` can overwrite a previously-set allocation error (PARAM_NO_MEM) with PARAM_READ_ERROR. In practice my_get_line only sets `error` on a genuine read/oom error so the two rarely both occur, but the unconditional overwrite means a real PARAM_NO_MEM from add2list could be masked as PARAM_READ_ERROR if the read also failed in the same iteration.","fix":"Only set err from `error` when err is still PARAM_OK, e.g. `if(error && !err) err = PARAM_READ_ERROR;`.","locations":[{"ref":"src/tool_getparam.c:1306-1316","code":" 1306 |       while(my_get_line(file, &line, &error)) {\n 1307 |         const char *ptr = curlx_dyn_ptr(&line);\n 1308 |         err = add2list(cmd == C_PROXY_HEADER ? /* --proxy-header? */\n 1309 |                        &config->proxyheaders :\n 1310 |                        &config->headers, ptr);\n 1311 |         if(err)\n 1312 |           break;\n 1313 |       }\n 1314 |       if(error)\n 1315 |         err = PARAM_READ_ERROR;\n 1316 |       curlx_dyn_free(&line);"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","description":"secs2ms() bounds the integer seconds part to LONG_MAX/1000 - 1 but then computes `*val = ((long)secs * 1000) + ms;` where `ms` can be up to ~999. With secs == LONG_MAX/1000 - 1, secs*1000 is close to LONG_MAX and adding ms can overflow a signed long on platforms where LONG_MAX is not a multiple of 1000 plus slack (e.g. 32-bit long). The `-1` slack covers up to 1000, so it is safe for ms<1000, but the relationship is implicit and brittle; a future change to the fractional rounding (ms could momentarily exceed 999 if digs handling changed) would overflow. Worth documenting/asserting the invariant.","fix":"Add an explicit clamp/assert that ms is in [0,999] before the final multiply-add, or compute using a wider type (curl_off_t) and range-check before casting to long.","locations":[{"ref":"src/tool_paramhlp.c:312-330","code":"  312 |   if(!str || curlx_str_number(&str, &secs, LONG_MAX / 1000 - 1))\n  313 |     return PARAM_BAD_NUMERIC;\n  314 |   if(!curlx_str_single(&str, '.')) {\n  315 |     curl_off_t fracs;\n  316 |     const char *s = str;\n  317 |     size_t len;\n  318 |     if(curlx_str_number(&str, &fracs, CURL_OFF_T_MAX))\n  319 |       return PARAM_NUMBER_TOO_LARGE;\n  320 |     /* how many milliseconds are in fracs ? */\n  321 |     len = (str - s);\n  322 |     while((len > CURL_ARRAYSIZE(digs) || (fracs > LONG_MAX / 100))) {\n  323 |       fracs /= 10;\n  324 |       len--;\n  325 |     }\n  326 |     ms = ((long)fracs * 100) / digs[len - 1];\n  327 |   }\n  328 | \n  329 |   *val = ((long)secs * 1000) + ms;\n  330 |   return PARAM_OK;"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","description":"add_glob() doubles glob->palloc BEFORE checking whether the new pattern count is acceptable. When the maximum is reached (glob->pnum >= 255) the function returns CURLE_URL_MALFORMAT, but glob->palloc has already been multiplied by 2. Although the error is propagated and the glob is cleaned up, the doubled palloc value is now inconsistent with the actual allocation size of glob->pattern (which was not reallocated on this branch). If any code path were to read palloc after this without aborting, it would over-estimate the array size. It is latent today because the error aborts parsing, but the bookkeeping is wrong.","fix":"Only update glob->palloc after the successful realloc (and the pnum<255 check), e.g. compute the new size in a local, check the limit, realloc, then assign palloc.","locations":[{"ref":"src/tool_urlglob.c:411-423","code":"  411 |   if(++glob->pnum >= glob->palloc) {\n  412 |     struct URLPattern *np = NULL;\n  413 |     glob->palloc *= 2;\n  414 |     if(glob->pnum < 255) { /* avoid ridiculous amounts */\n  415 |       np = curlx_realloc(glob->pattern,\n  416 |                          glob->palloc * sizeof(struct URLPattern));\n  417 |       if(!np)\n  418 |         return globerror(glob, NULL, pos, CURLE_OUT_OF_MEMORY);\n  419 |     }\n  420 |     else\n  421 |       return globerror(glob, \"too many {} sets\", pos, CURLE_URL_MALFORMAT);\n  422 |     glob->pattern = np;\n  423 |   }"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"In curlx_str_quotedword(), an escaped character ('\\\\' followed by a byte)\nincrements the length counter `len` twice (once for the backslash at line 122\nand once for the following byte at line 126), and both increments are checked\nagainst `max`. As a result the reported word length `out->len` counts the\nbackslash escape characters, and the STRE_BIG limit is reached after fewer\nlogical characters than for an unescaped word of the same intended content.\nWhether this matches the intended semantics (length of the raw quoted span vs.\nthe unescaped content) is ambiguous; callers that treat out->len as the\nunescaped content length will be off.","fix":"Clarify/confirm the intended meaning of out->len for quoted words. If it should\nrepresent the raw span, the current behavior is fine; if it should represent\nunescaped content, do not count the backslash toward len.","locations":[{"ref":"lib/curlx/strparse.c:118-127","code":"  118 |   while(*s && (*s != '\\\"')) {\n  119 |     if(*s == '\\\\' && s[1]) {\n  120 |       s++;\n  121 |       if(++len > max)\n  122 |         return STRE_BIG;\n  123 |     }\n  124 |     s++;\n  125 |     if(++len > max)\n  126 |       return STRE_BIG;\n  127 |   }"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"sendrecv_dl() uses `do { ... } while(maxloops--);` with maxloops initialized to\n10. Because the post-decrement is evaluated as the loop condition, the body\nexecutes 11 times (for maxloops values 10,9,...,0 in the condition test) before\nthe loop exits, not 10 as the initializer suggests. This is an off-by-one versus\nthe apparent intent of \"10 loops\" but only affects how many receive iterations\nhappen before yielding; it is not a correctness bug.","fix":"If exactly 10 iterations are intended, use `while(--maxloops)` or a for-loop; otherwise adjust the initializer/comment to reflect the actual 11 iterations.","locations":[{"ref":"lib/transfer.c:228-313","code":"  228 |   int maxloops = 10;\n  229 |   bool is_multiplex = FALSE;\n  230 |   bool rcvd_eagain = FALSE;\n  231 |   bool is_eos = FALSE, rate_limited = FALSE;\n  232 | \n  233 |   result = Curl_multi_xfer_buf_borrow(data, &xfer_buf, &xfer_blen);\n  234 |   if(result)\n  235 |     goto out;\n  236 | \n  237 |   /* This is where we loop until we have read everything there is to\n  238 |      read or we get a CURLE_AGAIN */\n  239 |   do {\n  240 |     size_t bytestoread;\n  241 | \n  242 |     if(!is_multiplex) {\n  243 |       /* Multiplexed connection have inherent handling of EOF and we do not\n  244 |        * have to carefully restrict the amount we try to read.\n  245 |        * Multiplexed changes only in one direction. */\n  246 |       is_multiplex = Curl_conn_is_multiplex(conn, FIRSTSOCKET);\n  247 |     }\n  248 | \n  249 |     buf = xfer_buf;\n  250 |     bytestoread = xfer_blen;\n  251 | \n  252 |     if(bytestoread && Curl_rlimit_active(&data->progress.dl.rlimit)) {\n  253 |       curl_off_t dl_avail = Curl_rlimit_avail(&data->progress.dl.rlimit,\n  254 |                                               Curl_pgrs_now(data));\n  255 | #if 0\n  256 |       DEBUGF(infof(data, \"dl_rlimit, available=%\" FMT_OFF_T, dl_avail));\n  257 | #endif\n  258 |       /* In case of rate limited downloads: if this loop already got data and\n  259 |        * less than 16k is left in the limit, break out. We want to stutter a\n  260 |        * bit to keep in the limit, but too small receives will cost cpu\n  261 |        * unnecessarily. */\n  262 |       if(dl_avail <= 0) {\n  263 |         rate_limited = TRUE;\n  264 |         break;\n  265 |       }\n  266 |       if(dl_avail < (curl_off_t)bytestoread)\n  267 |         bytestoread = (size_t)dl_avail;\n  268 |     }\n  269 | \n  270 |     rcvd_eagain = FALSE;\n  271 |     result = xfer_recv_resp(data, buf, bytestoread, is_multiplex, &blen);\n  272 |     if(result) {\n  273 |       if(result != CURLE_AGAIN)\n  274 |         goto out; /* real error */\n  275 |       rcvd_eagain = TRUE;\n  276 |       result = CURLE_OK;\n  277 |       if(data->req.download_done && data->req.no_body &&\n  278 |          !data->req.resp_trailer) {\n  279 |         DEBUGF(infof(data, \"EAGAIN, download done, no trailer announced, \"\n  280 |                      \"not waiting for EOS\"));\n  281 |         blen = 0;\n  282 |         /* continue as if we received the EOS */\n  283 |       }\n  284 |       else\n  285 |         break; /* get out of loop */\n  286 |     }\n  287 | \n  288 |     /* We only get a 0-length receive at the end of the response */\n  289 |     is_eos = (blen == 0);\n  290 | \n  291 |     if(!blen) {\n  292 |       result = Curl_req_stop_send_recv(data);\n  293 |       if(result)\n  294 |         goto out;\n  295 |       if(k->eos_written) /* already did write this to client, leave */\n  296 |         break;\n  297 |     }\n  298 | \n  299 |     result = Curl_xfer_write_resp(data, buf, blen, is_eos);\n  300 |     if(result || data->req.done)\n  301 |       goto out;\n  302 | \n  303 |     /* if we are done, we stop receiving. On multiplexed connections,\n  304 |      * we should read the EOS. Which may arrive as meta data after\n  305 |      * the bytes. Not taking it in might lead to RST of streams. */\n  306 |     if((!is_multiplex && data->req.download_done) || is_eos) {\n  307 |       CURL_REQ_CLEAR_RECV(data);\n  308 |     }\n  309 |     /* if we stopped receiving, leave the loop */\n  310 |     if(!CURL_REQ_WANT_RECV(data))\n  311 |       break;\n  312 | \n  313 |   } while(maxloops--);"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"parse_localport() computes `config->localportrange -= (config->localport - 1);` after parsing the second port. If the end of the range is numerically smaller than the start, localportrange becomes <= 0 and the `< 1` check rejects it, which is correct. However the subtraction is performed on a `long` that was just validated to be in [0,65535]; if localport is 0 (allowed by str2unummax with max 65535 and min 0) then `localport - 1` is -1 and the range is incremented by 1, producing an off-by-one count for the corner case `--local-port 0-N`. Port 0 is generally meaningless but is accepted here, yielding a slightly wrong range count.","fix":"Reject localport == 0 explicitly, or compute the range count as (end - start + 1) with proper validation that start <= end before adjusting.","locations":[{"ref":"src/tool_getparam.c:1186-1197","code":" 1186 |   curl_msnprintf(buffer, sizeof(buffer), \"%.*s\", (int)plen, nextarg);\n 1187 |   if(str2unummax(&config->localport, buffer, 65535))\n 1188 |     return PARAM_BAD_USE;\n 1189 |   if(!pp)\n 1190 |     config->localportrange = 1; /* default number of ports to try */\n 1191 |   else {\n 1192 |     if(str2unummax(&config->localportrange, pp, 65535))\n 1193 |       return PARAM_BAD_USE;\n 1194 |     config->localportrange -= (config->localport - 1);\n 1195 |     if(config->localportrange < 1)\n 1196 |       return PARAM_BAD_USE;\n 1197 |   }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"The threaded resolver builds a malformed HTTPS/SVCB query name for non-default ports. The DNS query owner name for HTTPS RRs at a non-443 port must be \"_<port>._https.<host>\" (underscore-prefixed \"_https\" label), as correctly done in asyn-ares.c:694 (`\"_%d._https.%s\"`) and doh.c:513 (`\"_%d._https.%s\"`). The threaded version instead uses `\"_%d_.https.%s\"`, producing e.g. \"_8443_.https.example.com\" instead of \"_8443._https.example.com\". This is a copy-paste typo (misplaced underscore/dot) that makes every threaded-resolver HTTPS RR lookup on a non-443 port query the wrong name, so HTTPS RR / ECH / ALPN hints are never retrieved for non-default ports.","fix":"Change the format string in async_rr_start() to match the other call sites:\n`rrname = curl_maprintf(\"_%d._https.%s\", async->port, async->hostname);`","locations":[{"ref":"lib/asyn-thrdd.c:219-223","code":"  219 |   if(async->port != 443) {\n  220 |     rrname = curl_maprintf(\"_%d_.https.%s\", async->port, async->hostname);\n  221 |     if(!rrname)\n  222 |       return CURLE_OUT_OF_MEMORY;\n  223 |   }"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"In tool_ssls_load(), the loop that trims trailing whitespace/EOL from the session-data portion of a line dereferences the wrong pointer. The condition checks `ISBLANK(*line)` (the fixed start of the value) instead of `ISBLANK(*end)` (the moving end pointer). `*line` never changes inside the loop, so if the value begins with a space or tab, `ISBLANK(*line)` is permanently true and the loop keeps writing NUL and decrementing `end` until `end == line`, stripping the entire value down to a single byte regardless of its actual content. This corrupts the base64-encoded sdata before it is decoded and imported, silently breaking session restore for affected lines. The other two conditions (`*end == '\\n'`, `*end == '\\r'`) correctly use `*end`.","fix":"Change the loop condition to test the moving pointer: `while((end > line) && (*end == '\\n' || *end == '\\r' || ISBLANK(*end)))`.","locations":[{"ref":"src/tool_ssls.c:97-102","code":"   97 |     line = c + 1;\n   98 |     end = line + strlen(line) - 1;\n   99 |     while((end > line) && (*end == '\\n' || *end == '\\r' || ISBLANK(*line))) {\n  100 |       *end = '\\0';\n  101 |       --end;\n  102 |     }"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"sasl_choose_oauth() (OAUTHBEARER) gates on `Curl_creds_has_oauth_bearer(data->state.creds)` but builds the message from `sctx->conn->creds`. The sibling sasl_choose_oauth2() (XOAUTH2) consistently uses `sctx->conn->creds` for both the guard and the message. On a reused connection data->state.creds (the new transfer's credentials) and conn->creds (the connection's existing credentials) can differ, so the guard and the data source disagree. The other SASL choosers and Curl_sasl_can_authenticate() all key off conn->creds, making this the odd one out and a likely copy/paste slip.","fix":"Use the same creds source in the guard and the message. Change the guard to `Curl_creds_has_oauth_bearer(sctx->conn->creds)` to match sasl_choose_oauth2() and the rest of the file.","locations":[{"ref":"lib/curl_sasl.c:438-458","code":"  438 | static bool sasl_choose_oauth(struct Curl_easy *data, struct sasl_ctx *sctx)\n  439 | {\n  440 |   if(Curl_creds_has_oauth_bearer(data->state.creds) &&\n  441 |      (sctx->enabledmechs & SASL_MECH_OAUTHBEARER)) {\n  442 |     const char *hostname;\n  443 |     int port;\n  444 |     Curl_conn_get_current_host(data, FIRSTSOCKET, &hostname, &port);\n  445 | \n  446 |     sctx->mech = SASL_MECH_STRING_OAUTHBEARER;\n  447 |     sctx->state1 = SASL_OAUTH2;\n  448 |     sctx->state2 = SASL_OAUTH2_RESP;\n  449 |     sctx->sasl->authused = SASL_MECH_OAUTHBEARER;\n  450 | \n  451 |     if(sctx->sasl->force_ir || data->set.sasl_ir)\n  452 |       sctx->result =\n  453 |         Curl_auth_create_oauth_bearer_message(sctx->conn->creds,\n  454 |                                               hostname, port, &sctx->resp);\n  455 |     return TRUE;\n  456 |   }\n  457 |   return FALSE;\n  458 | }"},{"ref":"lib/curl_sasl.c:460-474","code":"  460 | static bool sasl_choose_oauth2(struct Curl_easy *data, struct sasl_ctx *sctx)\n  461 | {\n  462 |   if(Curl_creds_has_oauth_bearer(sctx->conn->creds) &&\n  463 |      (sctx->enabledmechs & SASL_MECH_XOAUTH2)) {\n  464 |     sctx->mech = SASL_MECH_STRING_XOAUTH2;\n  465 |     sctx->state1 = SASL_OAUTH2;\n  466 |     sctx->sasl->authused = SASL_MECH_XOAUTH2;\n  467 | \n  468 |     if(sctx->sasl->force_ir || data->set.sasl_ir)\n  469 |       sctx->result = Curl_auth_create_xoauth_bearer_message(\n  470 |         sctx->conn->creds, &sctx->resp);\n  471 |     return TRUE;\n  472 |   }\n  473 |   return FALSE;\n  474 | }"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"pop3_perform_apop() null-checks `data->state.creds` before proceeding, but every other POP3 auth path checks `conn->creds` (e.g. pop3_perform_user() at line 530, pop3_perform_authentication() uses Curl_sasl_can_authenticate() which inspects conn->creds). APOP then dereferences conn->creds via Curl_creds_user()/ Curl_creds_passwd(). Because those accessor macros are NULL-safe this is not a crash, but the inconsistency means APOP may decide differently from USER on a reused connection where the two creds pointers diverge, sending empty/wrong credentials. It is an unintended divergence from the sibling functions.","fix":"Check `conn->creds` in pop3_perform_apop() to be consistent with pop3_perform_user() and the SASL path.","locations":[{"ref":"lib/pop3.c:565-571","code":"  565 |   /* Check we have a username and password to authenticate with and end the\n  566 |      connect phase if we do not */\n  567 |   if(!data->state.creds) {\n  568 |     pop3_state(data, POP3_STOP);\n  569 | \n  570 |     return result;\n  571 |   }"},{"ref":"lib/pop3.c:528-534","code":"  528 |   /* Check we have a username and password to authenticate with and end the\n  529 |      connect phase if we do not */\n  530 |   if(!conn->creds) {\n  531 |     pop3_state(data, POP3_STOP);\n  532 | \n  533 |     return result;\n  534 |   }"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In Curl_doh_take_result(), after building the dns entry, the result of Curl_dnscache_add() is captured but `*pdns = dns;` is then assigned unconditionally, and the function falls through to the `error:` label which runs de_cleanup()/Curl_doh_cleanup() and returns the (possibly failing) `result`. If Curl_dnscache_add() returns CURLE_OUT_OF_MEMORY, the function returns an error while leaving `*pdns` pointing at a dns entry that was never inserted into the cache (its refcount is still 1 from Curl_dnscache_mk_entry). Callers treat a non-OK return as \"no result\" and do not reliably unlink `*pdns`, so the entry's single reference leaks. This also violates the convention used elsewhere (e.g. hostip.c, asyn-ares.c) that an error return leaves *pdns NULL.","fix":"Only set `*pdns = dns;` when Curl_dnscache_add() succeeded, and on failure unlink the entry (Curl_dns_entry_unlink) before goto error, so the error return leaves *pdns == NULL and no reference is leaked.","locations":[{"ref":"lib/doh.c:1299-1302","code":" 1299 |       /* and add the entry to the cache */\n 1300 |       result = Curl_dnscache_add(data, dns);\n 1301 |       *pdns = dns;\n 1302 |     } /* address processing done */"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"read_pkt_to_send() (quiche) treats quiche_conn_send() returning a value that is not QUICHE_ERR_DONE and not convertible by curlx_sztouz() as an error. curlx_sztouz() returns false for negative values; thus all negative quiche error codes other than QUICHE_ERR_DONE map to CURLE_SEND_ERROR. That is fine, but a return value of exactly 0 (rv==0) is accepted by curlx_sztouz() as success with *pnread==0. Curl_bufq_sipn() in cf_flush_egress then treats 0 written bytes as 'nread < gsolen' and flushes/loops; combined with quiche only signalling 'no more' via QUICHE_ERR_DONE, a spurious 0-return would not advance and not error. quiche does not document a 0 success return, so this is defensive only, but the contract handling differs from the ngtcp2 path which explicitly handles n==0 as 'nothing to send' -> CURLE_AGAIN.","fix":"Explicitly treat rv==0 from quiche_conn_send() as CURLE_AGAIN (nothing to send) like the ngtcp2 read_pkt_to_send() does, rather than as a zero-length success.","locations":[{"ref":"lib/vquic/curl_quiche.c:739-757","code":"  739 | static CURLcode read_pkt_to_send(void *userp,\n  740 |                                  unsigned char *buf, size_t buflen,\n  741 |                                  size_t *pnread)\n  742 | {\n  743 |   struct read_ctx *x = userp;\n  744 |   struct cf_quiche_ctx *ctx = x->cf->ctx;\n  745 |   ssize_t rv;\n  746 | \n  747 |   *pnread = 0;\n  748 |   rv = quiche_conn_send(ctx->qconn, buf, buflen, &x->send_info);\n  749 |   if(rv == QUICHE_ERR_DONE)\n  750 |     return CURLE_AGAIN;\n  751 | \n  752 |   if(!curlx_sztouz(rv, pnread)) {\n  753 |     failf(x->data, \"quiche_conn_send returned %zd\", rv);\n  754 |     return CURLE_SEND_ERROR;\n  755 |   }\n  756 |   return CURLE_OK;\n  757 | }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In altsvc_load(), Curl_get_line() failures (other than EOF) are silently swallowed: the loop condition is `while(!result && !eof)`, but `result` from Curl_get_line is captured into the function-level `result` which is then returned. However a non-OOM dynbuf/line error (NETRC-style) just stops the loop and is returned to the caller, while altsvc_add() result is intentionally ignored (`altsvc_add(asi, lineptr);` return value discarded). An out-of-memory inside altsvc_add()/altsvc_create() (which returns CURLE_OUT_OF_MEMORY) is discarded, so genuine OOM while loading the alt-svc cache is not propagated. Contrast with hsts_load(), which also ignores hsts_add()'s OOM the same way.","fix":"Capture and propagate the return value of altsvc_add()/hsts_add() (at least the CURLE_OUT_OF_MEMORY case) so that an allocation failure during cache load aborts the load instead of being silently lost.","locations":[{"ref":"lib/altsvc.c:250-258","code":"  250 |       do {\n  251 |         result = Curl_get_line(&buf, fp, &eof);\n  252 |         if(!result) {\n  253 |           const char *lineptr = curlx_dyn_ptr(&buf);\n  254 |           curlx_str_passblanks(&lineptr);\n  255 |           if(curlx_str_single(&lineptr, '#'))\n  256 |             altsvc_add(asi, lineptr);\n  257 |         }\n  258 |       } while(!result && !eof);"},{"ref":"lib/hsts.c:557-571","code":"  557 |       do {\n  558 |         result = Curl_get_line(&buf, fp, &eof);\n  559 |         if(!result) {\n  560 |           const char *lineptr = curlx_dyn_ptr(&buf);\n  561 |           curlx_str_passblanks(&lineptr);\n  562 | \n  563 |           /* Skip empty or commented lines, since we know the line will have\n  564 |              a trailing newline from Curl_get_line we can treat length 1 as\n  565 |              empty. */\n  566 |           if((*lineptr == '#') || strlen(lineptr) <= 1)\n  567 |             continue;\n  568 | \n  569 |           hsts_add(h, lineptr);\n  570 |         }\n  571 |       } while(!result && !eof);"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In capsule_cf_send(), when the pending (partially-sent) capsule is finally fully flushed, *pnwritten is set to ctx->pending_payload (the payload length captured at the time of the original partial write) and CURLE_OK is returned, without validating that the caller re-submitted the same buffer/length. The new `buf`/`len` arguments of this call are ignored entirely on the pending path. This relies on the implicit contract that the caller always retries with the identical leading bytes; if a caller ever resubmits a shorter buffer, the reported written count could exceed the supplied len, advancing the stream incorrectly.","fix":"Either document/enforce the retry-with-same-buffer contract (e.g. DEBUGASSERT(len >= ctx->pending_payload)) or clamp `*pnwritten` to `len` when completing a pending flush.","locations":[{"ref":"lib/cf-capsule.c:113-130","code":"  113 |   if(ctx->pending) {\n  114 |     /* flush remaining bytes from a partially sent capsule */\n  115 |     remaining = ctx->pending_len - ctx->pending_offset;\n  116 |     result = Curl_conn_cf_send(cf->next, data,\n  117 |                                ctx->pending + ctx->pending_offset,\n  118 |                                remaining, FALSE, &nwritten);\n  119 |     if(result && result != CURLE_AGAIN) {\n  120 |       curlx_safefree(ctx->pending);\n  121 |       return result;\n  122 |     }\n  123 |     ctx->pending_offset += nwritten;\n  124 |     if(ctx->pending_offset < ctx->pending_len)\n  125 |       return CURLE_AGAIN;\n  126 |     /* pending capsule has been fully flusehd */\n  127 |     *pnwritten = ctx->pending_payload;\n  128 |     curlx_safefree(ctx->pending);\n  129 |     return CURLE_OK;\n  130 |   }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In the POSIX strerror_r branch of curlx_strerror(), when strerror_r() returns a\nnon-zero value (indicating failure such as ERANGE for a truncated message or\nEINVAL for an unknown error number) the code only overwrites the buffer with a\nfallback \"Unknown error N\" string if buf[0] == '\\0'. If strerror_r() partially\nfilled the buffer (truncation/ERANGE) buf[0] is non-zero, so the truncated /\npossibly misleading partial message is returned and the error from strerror_r\nis silently ignored. This differs from the glibc and plain-strerror branches,\nwhich always format a clean message.","fix":"On a non-zero return from strerror_r, format the fallback \"Unknown error N\"\nunconditionally (when the buffer is large enough) rather than only when buf is\nempty, to avoid returning a truncated/garbage partial message.","locations":[{"ref":"lib/curlx/strerr.c:280-284","code":"  280 |   if(strerror_r(err, buf, buflen) &&\n  281 |      buflen > sizeof(\"Unknown error \") + 20) {\n  282 |     if(buf[0] == '\\0')\n  283 |       SNPRINTF(buf, buflen, \"Unknown error %d\", err);\n  284 |   }"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"dict.c sendf() retries Curl_xfer_send() in a tight loop on a partial write\nwithout waiting for the socket to become writable. On a short write\n(bytes_written < write_len) it immediately loops back and calls\nCurl_xfer_send() again, busy-spinning if the socket is temporarily not\nwritable. Unlike gopher_do() (which uses SOCKET_WRITABLE between sends) there\nis no backoff or poll here.","fix":"Between partial sends, wait for writability (SOCKET_WRITABLE with the remaining timeout) as gopher_do() does, to avoid a potential busy loop.","locations":[{"ref":"lib/dict.c:112-129","code":"  112 |   for(;;) {\n  113 |     /* Write the buffer to the socket */\n  114 |     result = Curl_xfer_send(data, sptr, write_len, FALSE, &bytes_written);\n  115 | \n  116 |     if(result)\n  117 |       break;\n  118 | \n  119 |     Curl_debug(data, CURLINFO_DATA_OUT, sptr, bytes_written);\n  120 | \n  121 |     if(bytes_written != write_len) {\n  122 |       /* if not all was written at once, we must advance the pointer, decrease\n  123 |          the size left and try again! */\n  124 |       write_len -= bytes_written;\n  125 |       sptr += bytes_written;\n  126 |     }\n  127 |     else\n  128 |       break;\n  129 |   }"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`Curl_dynhds_to_nva` calls `curlx_calloc(1, sizeof(nghttp2_nv) * dynhds->hds_len)`.\nWhen `hds_len` is 0 this is `calloc(1, 0)`, which may legitimately return NULL on\nsome allocators. The function then returns NULL with `*pcount` left at 0, which a\ncaller is likely to interpret as an out-of-memory failure rather than the valid\n'empty header set' case. The size multiplication `sizeof(nghttp2_nv) * hds_len`\nis also not overflow-checked, unlike the explicit overflow guards used elsewhere\nin this audit scope (bufq.c).","fix":"Special-case hds_len == 0 (return a non-NULL sentinel or have callers treat NULL+pcount==0 as success), and guard the multiplication against overflow.","locations":[{"ref":"lib/dynhds.c:363-383","code":"  363 | nghttp2_nv *Curl_dynhds_to_nva(struct dynhds *dynhds, size_t *pcount)\n  364 | {\n  365 |   nghttp2_nv *nva = curlx_calloc(1, sizeof(nghttp2_nv) * dynhds->hds_len);\n  366 |   size_t i;\n  367 | \n  368 |   *pcount = 0;\n  369 |   if(!nva)\n  370 |     return NULL;\n  371 | \n  372 |   for(i = 0; i < dynhds->hds_len; ++i) {\n  373 |     struct dynhds_entry *e = dynhds->hds[i];\n  374 |     DEBUGASSERT(e);\n  375 |     nva[i].name = (unsigned char *)e->name;\n  376 |     nva[i].namelen = e->namelen;\n  377 |     nva[i].value = (unsigned char *)e->value;\n  378 |     nva[i].valuelen = e->valuelen;\n  379 |     nva[i].flags = NGHTTP2_NV_FLAG_NONE;\n  380 |   }\n  381 |   *pcount = dynhds->hds_len;\n  382 |   return nva;\n  383 | }"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In the DEBUGBUILD-only event engine, events_socket() is registered as the\nCURLMOPT_SOCKETFUNCTION callback. The socket callback contract uses a return\nvalue of -1 to signal a fatal/abort condition; any other value is treated as\nsuccess. On allocation failure events_socket() does `return CURLE_OUT_OF_MEMORY;`\n(value 27), which is neither 0 nor -1. The out-of-memory condition is therefore\nsilently treated as success (the new socket is simply not monitored), instead of\nbeing reported as an error. The intended return on this path was almost\ncertainly -1. Impact is limited because this code only exists in debug builds\n(curl_easy_perform_ev), but it is still incorrect error handling.","fix":"Return -1 (or 0 and skip monitoring deliberately) on the allocation-failure path rather than a CURLcode value that is misinterpreted by the socket-callback machinery.","locations":[{"ref":"lib/easy.c:484-499","code":"  484 |     else {\n  485 |       m = curlx_malloc(sizeof(struct socketmonitor));\n  486 |       if(m) {\n  487 |         m->next = ev->list;\n  488 |         m->socket.fd = s;\n  489 |         m->socket.events = socketcb2poll(what);\n  490 |         m->socket.revents = 0;\n  491 |         ev->list = m;\n  492 |         infof(data, \"socket cb: socket %\" FMT_SOCKET_T \" A
