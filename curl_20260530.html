hout zeroing it before return. Similarly the v1 NTLM path in Curl_auth_create_ntlm_type3_message keeps ntbuffer/lmbuffer (password hashes) on the stack without scrubbing. Sensitive key material is not wiped, unlike the local md4/md5/sha512_256 finishers which memset their contexts.","fix":"Zero stack buffers holding password-derived material (pw, ntbuffer, lmbuffer, ntlmv2hash) with curlx_memzero before the functions return.","locations":[{"ref":"lib/curl_ntlm_core.c:348-394","code":"  348 | CURLcode Curl_ntlm_core_mk_lm_hash(const char *password,\n  349 |                                    unsigned char *lmbuffer /* 21 bytes */)\n  350 | {\n  351 |   unsigned char pw[14];\n  352 |   static const unsigned char magic[] = {\n  353 |     0x4B, 0x47, 0x53, 0x21, 0x40, 0x23, 0x24, 0x25 /* i.e. KGS!@#$% */\n  354 |   };\n  355 |   size_t len = CURLMIN(strlen(password), 14);\n  356 | \n  357 |   Curl_strntoupper((char *)pw, password, len);\n  358 |   memset(&pw[len], 0, 14 - len);\n  359 | \n  360 |   {\n  361 |     /* Create LanManager hashed password. */\n  362 | #ifdef USE_OPENSSL_DES\n  363 |     DES_key_schedule ks;\n  364 | \n  365 |     setup_des_key(pw, &ks);\n  366 |     DES_ecb_encrypt((DES_cblock *)CURL_UNCONST(magic),\n  367 |                     (DES_cblock *)lmbuffer, &ks, DES_ENCRYPT);\n  368 | \n  369 |     setup_des_key(pw + 7, &ks);\n  370 |     DES_ecb_encrypt((DES_cblock *)CURL_UNCONST(magic),\n  371 |                     (DES_cblock *)(lmbuffer + 8), &ks, DES_ENCRYPT);\n  372 | #elif defined(USE_WOLFSSL_DES)\n  373 |     Des des;\n  374 |     setup_des_key(pw, &des);\n  375 |     wc_Des_EcbEncrypt(&des, lmbuffer, magic, DES_KEY_SIZE);\n  376 |     setup_des_key(pw + 7, &des);\n  377 |     wc_Des_EcbEncrypt(&des, lmbuffer + 8, magic, DES_KEY_SIZE);\n  378 | #elif defined(USE_GNUTLS_DES)\n  379 |     struct des_ctx des;\n  380 |     setup_des_key(pw, &des);\n  381 |     des_encrypt(&des, 8, lmbuffer, magic);\n  382 |     setup_des_key(pw + 7, &des);\n  383 |     des_encrypt(&des, 8, lmbuffer + 8, magic);\n  384 | #elif defined(USE_MBEDTLS_DES) || defined(USE_OS400CRYPTO) || \\\n  385 |   defined(USE_WIN32_CRYPTO)\n  386 |     encrypt_des(magic, lmbuffer, pw);\n  387 |     encrypt_des(magic, lmbuffer + 8, pw + 7);\n  388 | #endif\n  389 | \n  390 |     memset(lmbuffer + 16, 0, 21 - 16);\n  391 |   }\n  392 | \n  393 |   return CURLE_OK;\n  394 | }"},{"ref":"lib/vauth/ntlm.c:609-668","code":"  609 |   if(ntlm->flags & NTLMFLAG_NEGOTIATE_NTLM2_KEY) {\n  610 |     unsigned char ntbuffer[0x18];\n  611 |     unsigned char entropy[8];\n  612 |     unsigned char ntlmv2hash[0x18];\n  613 | \n  614 |     /* Full NTLM version 2\n  615 |        Although this cannot be negotiated, it is used here if available, as\n  616 |        servers featuring extended security are likely supporting also\n  617 |        NTLMv2. */\n  618 |     result = Curl_rand(data, entropy, 8);\n  619 |     if(result)\n  620 |       return result;\n  621 | \n  622 |     result = Curl_ntlm_core_mk_nt_hash(passwdp, ntbuffer);\n  623 |     if(result)\n  624 |       return result;\n  625 | \n  626 |     result = Curl_ntlm_core_mk_ntlmv2_hash(user, userlen, domain, domlen,\n  627 |                                            ntbuffer, ntlmv2hash);\n  628 |     if(result)\n  629 |       return result;\n  630 | \n  631 |     /* LMv2 response */\n  632 |     result = Curl_ntlm_core_mk_lmv2_resp(ntlmv2hash, entropy,\n  633 |                                          &ntlm->nonce[0], lmresp);\n  634 |     if(result)\n  635 |       return result;\n  636 | \n  637 |     /* NTLMv2 response */\n  638 |     result = Curl_ntlm_core_mk_ntlmv2_resp(ntlmv2hash, entropy,\n  639 |                                            ntlm, &ntlmv2resp, &ntresplen);\n  640 |     if(result)\n  641 |       return result;\n  642 | \n  643 |     ptr_ntresp = ntlmv2resp;\n  644 |   }\n  645 |   else {\n  646 | \n  647 |     unsigned char ntbuffer[0x18];\n  648 |     unsigned char lmbuffer[0x18];\n  649 | \n  650 |     /* NTLM version 1 */\n  651 | \n  652 |     result = Curl_ntlm_core_mk_nt_hash(passwdp, ntbuffer);\n  653 |     if(result)\n  654 |       return result;\n  655 | \n  656 |     Curl_ntlm_core_lm_resp(ntbuffer, &ntlm->nonce[0], ntresp);\n  657 | \n  658 |     result = Curl_ntlm_core_mk_lm_hash(passwdp, lmbuffer);\n  659 |     if(result)\n  660 |       return result;\n  661 | \n  662 |     Curl_ntlm_core_lm_resp(lmbuffer, &ntlm->nonce[0], lmresp);\n  663 |     ntlm->flags &= ~(unsigned int)NTLMFLAG_NEGOTIATE_NTLM2_KEY;\n  664 | \n  665 |     /* A safer but less compatible alternative is:\n  666 |      *   Curl_ntlm_core_lm_resp(ntbuffer, &ntlm->nonce[0], lmresp);\n  667 |      * See https://davenport.sourceforge.net/ntlm.html#ntlmVersion2 */\n  668 |   }"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","description":"`Curl_hash_str` casts each key byte via `size_t j = (size_t)*key_str++;` where\n`*key_str` is a plain `char`. On platforms where `char` is signed, bytes >= 0x80\nsign-extend to a huge `size_t` before being XORed into the accumulator. The hash\nremains self-consistent within a single build (so lookups still work), but the\nslot distribution differs between signed-char and unsigned-char platforms and\nhigh-bit bytes contribute pathologically large values. Cast through\n`unsigned char` for a portable, well-distributed hash.","fix":"Use `size_t j = (size_t)(unsigned char)*key_str++;`.","locations":[{"ref":"lib/hash.c:326-339","code":"  326 | size_t Curl_hash_str(void *key, size_t key_length, size_t slots_num)\n  327 | {\n  328 |   const char *key_str = (const char *)key;\n  329 |   const char *end = key_str + key_length;\n  330 |   size_t h = 5381;\n  331 | \n  332 |   while(key_str < end) {\n  333 |     size_t j = (size_t)*key_str++;\n  334 |     h += h << 5;\n  335 |     h ^= j;\n  336 |   }\n  337 | \n  338 |   return (h % slots_num);\n  339 | }"}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"low","description":"Leftover debug/junk log message shipped in production code. In the MQTT_PUB_REMAIN handling of mqtt_read_publish(), when Curl_xfer_recv() returns CURLE_AGAIN the code logs the nonsensical string \"EEEE AAAAGAIN\" via infof(). This is clearly a leftover debugging artifact (note the misspelling and shouting caps) that ends up in the user-visible verbose output of a released library. It provides no actionable information to a user and looks unprofessional / confusing.","fix":"Remove the EEEE AAAAGAIN infof() (the whole `if(result == CURLE_AGAIN)` block), or replace it with a meaningful trace message such as `CURL_TRC_*(data, \"PUBLISH read again\")`.","locations":[{"ref":"lib/mqtt.c:726-730","code":"  726 |     if(result) {\n  727 |       if(result == CURLE_AGAIN) {\n  728 |         infof(data, \"EEEE AAAAGAIN\");\n  729 |       }\n  730 |       goto end;"}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"low","description":"In curl_url_set() for CURLUPART_QUERY with CURLU_APPENDQUERY, the new query is\nappended to the existing one only when querylen != 0 (the `if(querylen)`\nbranch). When the existing query is empty/NULL (querylen == 0) the code falls\nthrough past the append block and stores `newp` directly via the normal\n*storep assignment at the end. That is the intended behavior, but note the\n`enc` dynbuf taken by `newp` is then stored while the just-built `qbuf` path is\nskipped. This is correct, however the asymmetry means appendquery with an empty\nexisting query silently ignores any trailing '&' normalization logic. Not a\nmemory bug, but the appendquery semantics differ depending on whether a prior\nquery existed, which is undocumented.","fix":"Document or unify the appendquery behavior for the empty-existing-query case so the trailing-separator handling is consistent regardless of prior query state.","locations":[{"ref":"lib/urlapi.c:1959-1986","code":" 1959 |     if(appendquery && newp) {\n 1960 |       /* Append the 'newp' string onto the old query. Add a '&' separator if\n 1961 |          none is present at the end of the existing query already */\n 1962 | \n 1963 |       size_t querylen = u->query ? strlen(u->query) : 0;\n 1964 |       bool addamperand = querylen && (u->query[querylen - 1] != '&');\n 1965 |       if(querylen) {\n 1966 |         struct dynbuf qbuf;\n 1967 |         curlx_dyn_init(&qbuf, CURL_MAX_INPUT_LENGTH);\n 1968 | \n 1969 |         if(curlx_dyn_addn(&qbuf, u->query, querylen)) /* add original query */\n 1970 |           goto nomem;\n 1971 | \n 1972 |         if(addamperand) {\n 1973 |           if(curlx_dyn_addn(&qbuf, \"&\", 1))\n 1974 |             goto nomem;\n 1975 |         }\n 1976 |         if(curlx_dyn_add(&qbuf, newp))\n 1977 |           goto nomem;\n 1978 |         curlx_dyn_free(&enc);\n 1979 |         curlx_free(*storep);\n 1980 |         *storep = curlx_dyn_ptr(&qbuf);\n 1981 |         return CURLUE_OK;\n 1982 | nomem:\n 1983 |         curlx_dyn_free(&enc);\n 1984 |         return CURLUE_OUT_OF_MEMORY;\n 1985 |       }\n 1986 |     }"}]},{"id":"OTHER_7","type":"other","type_label":"Other","severity":"low","description":"Curl_auth_create_spnego_message() (SSPI variant) frees *outptr on the failure path but does not reset *outptr to NULL afterwards. When base64 encoding yields a non-NULL pointer but zero length, the function frees that buffer and returns CURLE_REMOTE_ACCESS_DENIED while leaving *outptr pointing at freed memory. The GSSAPI counterpart consistently nulls out its token pointer/length on failure; this path should do the same to avoid a dangling pointer being observed by the caller.","fix":"After curlx_free(*outptr) set *outptr = NULL (and *outlen = 0) before returning the error, mirroring the GSSAPI implementation.","locations":[{"ref":"lib/vauth/spnego_sspi.c:295-308","code":"  295 | CURLcode Curl_auth_create_spnego_message(struct negotiatedata *nego,\n  296 |                                          char **outptr, size_t *outlen)\n  297 | {\n  298 |   /* Base64 encode the already generated response */\n  299 |   CURLcode result = curlx_base64_encode(nego->output_token,\n  300 |                                         nego->output_token_length, outptr,\n  301 |                                         outlen);\n  302 |   if(!result && (!*outptr || !*outlen)) {\n  303 |     curlx_free(*outptr);\n  304 |     result = CURLE_REMOTE_ACCESS_DENIED;\n  305 |   }\n  306 | \n  307 |   return result;\n  308 | }"}]},{"id":"OTHER_8","type":"other","type_label":"Other","severity":"low","description":"cf_ngtcp2_recv() declares `int i;` and loops `for(i = 0; i < 2; ++i)` to (1) check already-known stream results and (2) do one ingress pass then re-check. Inside the loop, after a successful first ingress, the second iteration re-checks stream->closed / xfer_result. However cf_progress_ingress() is only called when `!i` (i==0). If the first iteration's checks pass (stream not closed, no xfer_result) and ingress succeeds, the loop proceeds to i==1 and re-checks; if still nothing, falls through to result=CURLE_AGAIN. This is correct, but the loop structure obscures that ingress runs exactly once; a future edit that changes the bound from 2 would either skip the recheck or run ingress twice. Readability/robustness concern, not a live bug.","fix":"Consider restructuring as an explicit check / ingress / re-check sequence instead of a 2-iteration loop with an `if(!i)` guard, to make the single-ingress invariant obvious.","locations":[{"ref":"lib/vquic/curl_ngtcp2.c:1484-1502","code":" 1484 |   for(i = 0; i < 2; ++i) {\n 1485 |     if(stream->xfer_result) {\n 1486 |       CURL_TRC_CF(data, cf, \"[%\" PRId64 \"] xfer write failed\", stream->id);\n 1487 |       cf_ngtcp2_stream_close(cf, data, stream);\n 1488 |       result = stream->xfer_result;\n 1489 |       goto out;\n 1490 |     }\n 1491 |     else if(stream->closed) {\n 1492 |       result = recv_closed_stream(cf, data, stream, pnread);\n 1493 |       goto out;\n 1494 |     }\n 1495 | \n 1496 |     if(!i && cf_progress_ingress(cf, data, &pktx)) {\n 1497 |       result = CURLE_RECV_ERROR;\n 1498 |       goto out;\n 1499 |     }\n 1500 |   }\n 1501 | \n 1502 |   result = CURLE_AGAIN;"}]},{"id":"OTHER_9","type":"other","type_label":"Other","severity":"low","description":"In Curl_vtls_apple_verify(), the error-description buffer is allocated as curlx_malloc(size + 1) but CFStringGetCString() is then called with bufferSize == size (not size + 1). CFStringGetCString treats its bufferSize argument as the total available bytes including the NUL terminator, so passing `size` under-reports the real buffer by one byte and can cause CFStringGetCString to fail (returning false) for a description whose UTF-8 form needs exactly `size` bytes plus the terminator. Not a buffer overflow, but a correctness/robustness bug that may drop the error text.","fix":"Pass the actual allocated size: `CFStringGetCString(error_ref, err_desc, size + 1, kCFStringEncodingUTF8)`.","locations":[{"ref":"lib/vtls/apple.c:236-243","code":"  236 |         CFIndex size = CFStringGetMaximumSizeForEncoding(\n  237 |           CFStringGetLength(error_ref), kCFStringEncodingUTF8);\n  238 |         err_desc = curlx_malloc(size + 1);\n  239 |         if(err_desc) {\n  240 |           if(!CFStringGetCString(error_ref, err_desc, size,\n  241 |                                  kCFStringEncodingUTF8))\n  242 |             curlx_safefree(err_desc);\n  243 |         }"}]},{"id":"OTHER_10","type":"other","type_label":"Other","severity":"negligible","description":"`Curl_memrchr` decrements `p` past the start of the buffer on the final\nunsuccessful iteration: when `p == q == s` and no match, `p--` makes `p` point to\nthe byte before `s`, and the loop condition `p >= q` then evaluates that pointer.\nForming and comparing a pointer before the start of an array is technically\nundefined behavior in C (only one-past-the-end is permitted). The value is never\ndereferenced and the idiom works on all mainstream targets, but a strict\noptimizer is permitted to misbehave.","fix":"Iterate with an index instead of a pre-start pointer, e.g. `for(i = n; i-- > 0;) if(p[i] == (unsigned char)c) return CURL_UNCONST(&p[i]);`.","locations":[{"ref":"lib/curl_memrchr.c:43-49","code":"   43 |     p += n - 1;\n   44 | \n   45 |     while(p >= q) {\n   46 |       if(*p == (unsigned char)c)\n   47 |         return CURL_UNCONST(p);\n   48 |       p--;\n   49 |     }"}]},{"id":"OTHER_11","type":"other","type_label":"Other","severity":"negligible","description":"httpsrr_decode_alpn() stores up to MAX_HTTPSRR_ALPNS (4) ALPN ids into a fixed array of exactly MAX_HTTPSRR_ALPNS bytes. When 4 distinct known ALPN ids are decoded, idnum reaches 4 and the code correctly avoids writing the ALPN_none terminator (`if(idnum < MAX_HTTPSRR_ALPNS)`), but the resulting array then has no terminator. Current consumers iterate with CURL_ARRAYSIZE() so there is no OOB read today, but other code that scans for an ALPN_none sentinel (matching the function's documented 'terminate the list' contract) would read past the array. The full-array case silently violates the terminator invariant.","fix":"Either size the array MAX_HTTPSRR_ALPNS+1 to always allow a terminator, or document/assert that callers must use the array bound rather than relying on an ALPN_none sentinel.","locations":[{"ref":"lib/httpsrr.c:56-68","code":"   56 |       if(idnum == MAX_HTTPSRR_ALPNS)\n   57 |         break;\n   58 |       if(idnum && memchr(alpns, id, idnum))\n   59 |         /* this ALPN id is already stored */\n   60 |         ;\n   61 |       else\n   62 |         alpns[idnum++] = (unsigned char)id;\n   63 |     }\n   64 |     cp += tlen;\n   65 |     len -= tlen;\n   66 |   }\n   67 |   if(idnum < MAX_HTTPSRR_ALPNS)\n   68 |     alpns[idnum] = ALPN_none; /* terminate the list */"}]},{"id":"OTHER_12","type":"other","type_label":"Other","severity":"negligible","description":"Curl_getdate_capped() treats PARSEDATE_LATER and PARSEDATE_SOONER (time_t overflow/underflow at the ends of the representable range) as success (it only returns non-zero for PARSEDATE_FAIL). For PARSEDATE_SOONER the output is clamped to TIME_T_MIN / 0, meaning a date that underflows becomes a very-past or zero timestamp that callers (cookie/hsts/altsvc) interpret as \"expired/now\" rather than an error. This is the intended \"capped\" behavior for the LATER case, but the SOONER case silently turning a parse-range issue into a near-zero expiry is easy to overlook and is not documented in the function comment.","fix":"Document that Curl_getdate_capped() also returns success for under/overflow (clamping to TIME_T_MIN/TIME_T_MAX), or explicitly treat PARSEDATE_SOONER as an error if callers should reject under-range dates.","locations":[{"ref":"lib/parsedate.c:601-609","code":"  601 | /* Curl_getdate_capped() differs from curl_getdate() in that this will return\n  602 |    TIME_T_MAX in case the parsed time value was too big, instead of an\n  603 |    error. Returns non-zero on error. */\n  604 | \n  605 | int Curl_getdate_capped(const char *p, time_t *tp)\n  606 | {\n  607 |   int rc = parsedate(p, tp);\n  608 |   return (rc == PARSEDATE_FAIL);\n  609 | }"},{"ref":"lib/parsedate.c:521-540","code":"  521 | static int mktimet(curl_off_t seconds, time_t *output)\n  522 | {\n  523 | #if SIZEOF_TIME_T < 5\n  524 |   if(seconds > TIME_T_MAX) {\n  525 |     *output = TIME_T_MAX;\n  526 |     return PARSEDATE_LATER;\n  527 |   }\n  528 |   else if(seconds < TIME_T_MIN) {\n  529 |     *output = TIME_T_MIN;\n  530 |     return PARSEDATE_SOONER;\n  531 |   }\n  532 | #elif defined(HAVE_TIME_T_UNSIGNED)\n  533 |   if(seconds < 0) {\n  534 |     *output = 0;\n  535 |     return PARSEDATE_SOONER;\n  536 |   }\n  537 | #endif\n  538 |   *output = (time_t)seconds;\n  539 |   return PARSEDATE_OK;\n  540 | }"}]},{"id":"OTHER_13","type":"other","type_label":"Other","severity":"negligible","description":"setopt_long_bool() validates the boolean argument range at the very end with\n`if((arg > ok) || (arg < 0)) infof(...)`. Because `ok` defaults to 1 and is\nbumped to 2 only for the VERIFYHOST-style options, options that legitimately\naccept larger long values are not handled here (they live in other setopt_long_*\ngroups), so this is fine. But CURLOPT_GSSAPI_DELEGATION and similar bitmask\noptions are NOT in this function. The note is only that the diagnostic infof()\nfires for any boolean option given e.g. arg==2 even when the option ignores the\nextra value, which can produce noisy/misleading \"treated as\" messages for\noptions where any non-zero is simply truthy. Cosmetic only.","fix":"If undesired, suppress the infof() for options that are pure on/off toggles; otherwise leave as-is (informational only).","locations":[{"ref":"lib/setopt.c:818-822","code":"  818 |   if((arg > ok) || (arg < 0))\n  819 |     /* reserve other values for future use */\n  820 |     infof(data, \"boolean setopt(%d) got unsupported argument %ld,\"\n  821 |           \" treated as %d\", option, arg, enabled);\n  822 | "}]},{"id":"OTHER_14","type":"other","type_label":"Other","severity":"negligible","description":"ntlm_print_hex() takes a FILE* 'handle' parameter, marks it (void)handle, and then unconditionally writes to stderr instead of the passed handle. All callers pass stderr so behavior is correct, but the parameter is misleading dead state and the (void)handle plus hardcoded stderr is inconsistent with ntlm_print_flags() which honors its handle argument. Debug-only code (DEBUG_ME).","fix":"Either use the 'handle' argument in the curl_mfprintf calls or drop the parameter to avoid the misleading signature.","locations":[{"ref":"lib/vauth/ntlm.c:228-237","code":"  228 | static void ntlm_print_hex(FILE *handle, const char *buf, size_t len)\n  229 | {\n  230 |   const char *p = buf;\n  231 | \n  232 |   (void)handle;\n  233 | \n  234 |   curl_mfprintf(stderr, \"0x\");\n  235 |   while(len-- > 0)\n  236 |     curl_mfprintf(stderr, \"%02.2x\", (unsigned int)*p++);\n  237 | }"}]},{"id":"OTHER_15","type":"other","type_label":"Other","severity":"negligible","description":"curl_version_info() mutates the file-static `version_info` struct and the\nfile-static `feature_names[]` array on every call without any synchronization.\nTwo threads calling curl_version_info() concurrently (it is part of the public\nAPI and may be invoked at any time) race on these globals, and a reader holding\na previously returned pointer can observe a transiently inconsistent\nfeatures/feature_names state. The header comment for curl_version() explicitly\ndocuments a careful multi-thread-safe pattern, but curl_version_info() has no\nsuch guarantee and writes shared state unconditionally each call.","fix":"Document that curl_version_info() is not thread-safe with respect to concurrent\ncalls, or compute the features/feature_names only once (guarded\ninitialization) so repeated calls do not rewrite shared globals.","locations":[{"ref":"lib/version.c:577-679","code":"  577 | curl_version_info_data *curl_version_info(CURLversion stamp)\n  578 | {\n  579 |   size_t n;\n  580 |   const struct feat *p;\n  581 |   int features = 0;\n  582 | \n  583 | #ifdef USE_SSH\n  584 |   static char ssh_buf[80];  /* 'ssh_buffer' clashes with libssh/libssh.h */\n  585 | #endif\n  586 | #ifdef USE_SSL\n  587 | #ifdef CURL_WITH_MULTI_SSL\n  588 |   static char ssl_buffer[200];\n  589 | #else\n  590 |   static char ssl_buffer[80];\n  591 | #endif\n  592 | #endif\n  593 | #ifdef HAVE_BROTLI\n  594 |   static char brotli_buffer[80];\n  595 | #endif\n  596 | #ifdef HAVE_ZSTD\n  597 |   static char zstd_buffer[80];\n  598 | #endif\n  599 | \n  600 |   (void)stamp;\n  601 | \n  602 | #ifdef USE_SSL\n  603 |   Curl_ssl_version(ssl_buffer, sizeof(ssl_buffer));\n  604 |   version_info.ssl_version = ssl_buffer;\n  605 | #endif\n  606 | \n  607 | #ifdef HAVE_LIBZ\n  608 |   version_info.libz_version = zlibVersion();\n  609 |   /* libz left NULL if non-existing */\n  610 | #endif\n  611 | #ifdef USE_ARES\n  612 |   {\n  613 |     int aresnum;\n  614 |     version_info.ares = ares_version(&aresnum);\n  615 |     version_info.ares_num = aresnum;\n  616 |   }\n  617 | #endif\n  618 | #ifdef USE_LIBIDN2\n  619 |   /* This returns a version string if we use the given version or later,\n  620 |      otherwise it returns NULL */\n  621 |   version_info.libidn = idn2_check_version(IDN2_VERSION);\n  622 | #endif\n  623 | \n  624 | #ifdef USE_SSH\n  625 |   Curl_ssh_version(ssh_buf, sizeof(ssh_buf));\n  626 |   version_info.libssh_version = ssh_buf;\n  627 | #endif\n  628 | \n  629 | #ifdef HAVE_BROTLI\n  630 |   version_info.brotli_ver_num = BrotliDecoderVersion();\n  631 |   brotli_version(brotli_buffer, sizeof(brotli_buffer));\n  632 |   version_info.brotli_version = brotli_buffer;\n  633 | #endif\n  634 | \n  635 | #ifdef HAVE_ZSTD\n  636 |   version_info.zstd_ver_num = ZSTD_versionNumber();\n  637 |   zstd_version(zstd_buffer, sizeof(zstd_buffer));\n  638 |   version_info.zstd_version = zstd_buffer;\n  639 | #endif\n  640 | \n  641 | #ifdef USE_NGHTTP2\n  642 |   {\n  643 |     nghttp2_info *h2 = nghttp2_version(0);\n  644 |     version_info.nghttp2_ver_num = (unsigned int)h2->version_num;\n  645 |     version_info.nghttp2_version = h2->version_str;\n  646 |   }\n  647 | #endif\n  648 | \n  649 | #if !defined(CURL_DISABLE_HTTP) && defined(USE_HTTP3)\n  650 |   {\n  651 |     static char quicbuffer[80];\n  652 |     Curl_quic_ver(quicbuffer, sizeof(quicbuffer));\n  653 |     version_info.quic_version = quicbuffer;\n  654 |   }\n  655 | #endif\n  656 | \n  657 | #ifdef USE_GSASL\n  658 |   {\n  659 |     version_info.gsasl_version = gsasl_check_version(NULL);\n  660 |   }\n  661 | #endif\n  662 | \n  663 |   /* Get available features, build bitmask and names array. */\n  664 |   n = 0;\n  665 |   for(p = features_table; p->name; p++)\n  666 |     if(!p->present || p->present(&version_info)) {\n  667 |       features |= p->bitmask;\n  668 |       feature_names[n++] = p->name;\n  669 |     }\n  670 | \n  671 | #ifdef DEBUGBUILD\n  672 |   features |= CURL_VERSION_CURLDEBUG; /* for compatibility */\n  673 | #endif\n  674 | \n  675 |   feature_names[n] = NULL;  /* Terminate array. */\n  676 |   version_info.features = features;\n  677 | \n  678 |   return &version_info;\n  679 | }"}]},{"id":"OTHER_16","type":"other","type_label":"Other","severity":"negligible","description":"Curl_vquic_tls_before_recv() OpenSSL branch sets `ctx->ossl.x509_store_setup = TRUE` after a successful Curl_ssl_setup_x509_store(), but the WolfSSL branch does not set `ctx->wssl.x509_store_setup` after Curl_wssl_setup_x509_store(). This is not a bug because Curl_wssl_setup_x509_store() sets the flag internally, but the inconsistency between the two branches is a maintenance hazard: a future refactor of the wolfSSL helper that drops the internal flag-set would silently re-run the store setup on every recv.","fix":"Either set ctx->wssl.x509_store_setup = TRUE explicitly in the WolfSSL branch (mirroring OpenSSL) or add a comment that the flag is set inside Curl_wssl_setup_x509_store().","locations":[{"ref":"lib/vquic/vquic-tls.c:124-142","code":"  124 | #ifdef USE_OPENSSL\n  125 |   if(!ctx->ossl.x509_store_setup) {\n  126 |     CURLcode result = Curl_ssl_setup_x509_store(cf, data, &ctx->ossl);\n  127 |     if(result)\n  128 |       return result;\n  129 |     ctx->ossl.x509_store_setup = TRUE;\n  130 |   }\n  131 | #elif defined(USE_WOLFSSL)\n  132 |   if(!ctx->wssl.x509_store_setup) {\n  133 |     CURLcode result = Curl_wssl_setup_x509_store(cf, data, &ctx->wssl);\n  134 |     if(result)\n  135 |       return result;\n  136 |   }\n  137 | #elif defined(USE_GNUTLS)\n  138 |   if(!ctx->gtls.shared_creds->trust_setup) {\n  139 |     CURLcode result = Curl_gtls_client_trust_setup(cf, data, &ctx->gtls);\n  140 |     if(result)\n  141 |       return result;\n  142 |   }"}]},{"id":"OTHER_17","type":"other","type_label":"Other","severity":"negligible","description":"Curl_cipher_suite_walk_str() uses the expressions `*str[0]` and `*end[0]`. Due to C operator precedence these parse as `*(str[0])` == `**str` and `*(end[0])` == `**end`, which is the intended 'first character of the current string' but is needlessly obfuscated and easy to misread as indexing. It is correct, but the idiom invites future bugs.","fix":"Use the clearer `(*str)[0]` / `(*end)[0]` forms to make the double-dereference intent explicit.","locations":[{"ref":"lib/vtls/cipher_suite.c:663-674","code":"  663 | uint16_t Curl_cipher_suite_walk_str(const char **str, const char **end)\n  664 | {\n  665 |   /* move string pointer to first non-separator or end of string */\n  666 |   for(; cs_is_separator(*str[0]); (*str)++)\n  667 |     ;\n  668 | \n  669 |   /* move end pointer to next separator or end of string */\n  670 |   for(*end = *str; *end[0] != '\\0' && !cs_is_separator(*end[0]); (*end)++)\n  671 |     ;\n  672 | \n  673 |   return Curl_cipher_suite_lookup_id(*str, *end - *str);\n  674 | }"}]},{"id":"OTHER_18","type":"other","type_label":"Other","severity":"negligible","description":"GTime2str() format string emits a fixed `%.4s-%.2s-%.2s %.2s:%.2s` reading bytes beg..beg+11. The switch on `fracp - beg - 12` guarantees at least 12 leading digits exist, so the reads are in-bounds; however the code relies entirely on that implicit invariant with no explicit comment near the printf, making it easy to break in future edits. Documenting the minimum-12-byte precondition would harden the parser. (No defect today.)","fix":"Add a short comment/assert before the curlx_dyn_addf() noting that the preceding switch guarantees fracp-beg >= 12 and therefore beg[0..11] are valid.","locations":[{"ref":"lib/vtls/x509asn1.c:513-572","code":"  513 |   /* Get seconds digits. */\n  514 |   sec1 = '0';\n  515 |   switch(fracp - beg - 12) {\n  516 |   case 0:\n  517 |     sec2 = '0';\n  518 |     break;\n  519 |   case 2:\n  520 |     sec1 = fracp[-2];\n  521 |     FALLTHROUGH();\n  522 |   case 1:\n  523 |     sec2 = fracp[-1];\n  524 |     break;\n  525 |   default:\n  526 |     return CURLE_BAD_FUNCTION_ARGUMENT;\n  527 |   }\n  528 | \n  529 |   /* timezone follows optional fractional seconds. */\n  530 |   tzp = fracp;\n  531 |   fracl = 0; /* no fractional seconds detected so far */\n  532 |   if(fracp < end && (*fracp == '.' || *fracp == ',')) {\n  533 |     /* Have fractional seconds, e.g. \"[.,]\\d+\". How many? */\n  534 |     fracp++; /* should be a digit char or BAD ARGUMENT */\n  535 |     tzp = fracp;\n  536 |     while(tzp < end && ISDIGIT(*tzp))\n  537 |       tzp++;\n  538 |     if(tzp == fracp) /* never looped, no digit after [.,] */\n  539 |       return CURLE_BAD_FUNCTION_ARGUMENT;\n  540 |     fracl = tzp - fracp; /* number of fractional sec digits */\n  541 |     DEBUGASSERT(fracl > 0);\n  542 |     /* Strip trailing zeroes in fractional seconds.\n  543 |      * May reduce fracl to 0 if only '0's are present. */\n  544 |     while(fracl && fracp[fracl - 1] == '0')\n  545 |       fracl--;\n  546 |   }\n  547 | \n  548 |   /* Process timezone. */\n  549 |   if(tzp >= end) {\n  550 |     tzp = \"\";\n  551 |     tzl = 0;\n  552 |   }\n  553 |   else if(*tzp == 'Z') {\n  554 |     sep = \" \";\n  555 |     tzp = \"GMT\";\n  556 |     tzl = 3;\n  557 |   }\n  558 |   else if((*tzp == '+') || (*tzp == '-')) {\n  559 |     sep = \" UTC\";\n  560 |     tzl = end - tzp;\n  561 |   }\n  562 |   else {\n  563 |     sep = \" \";\n  564 |     tzl = end - tzp;\n  565 |   }\n  566 | \n  567 |   return curlx_dyn_addf(store,\n  568 |                         \"%.4s-%.2s-%.2s %.2s:%.2s:%c%c%s%.*s%s%.*s\",\n  569 |                         beg, beg + 4, beg + 6,\n  570 |                         beg + 8, beg + 10, sec1, sec2,\n  571 |                         fracl ? \".\" : \"\", (int)fracl, fracp,\n  572 |                         sep, (int)tzl, tzp);"}]},{"id":"OTHER_19","type":"other","type_label":"Other","severity":"negligible","description":"data_urlencode() casts the file/string size to int when calling curl_easy_escape(enc = curl_easy_escape(NULL, postdata, (int)size)). `size` is a size_t that can be up to MAX_FILE2MEMORY; for inputs larger than INT_MAX this truncates to a (possibly negative) int. file2memory caps the size to fit in an int per its own comment, so this is currently bounded, but the cast is an implicit dependency on that invariant and would silently corrupt the encode length if the cap were ever raised.","fix":"Validate that size <= INT_MAX before the cast (returning PARAM_NUMBER_TOO_LARGE otherwise), or use a length-aware escape API.","locations":[{"ref":"src/tool_getparam.c:709","code":"  709 |     char *enc = curl_easy_escape(NULL, postdata, (int)size);"}]},{"id":"OTHER_20","type":"other","type_label":"Other","severity":"negligible","description":"checkpasswd() uses a fixed 2048-byte stack buffer `passwd` for the prompted password (line 567) and a 256-byte `prompt`. getpass_r() truncates to the buffer size, so passwords longer than 2047 bytes are silently truncated even though the surrounding code uses a MAX_USERPWDLENGTH (100KB) dynbuf, implying much larger inputs are anticipated. This is a silent-truncation usability issue rather than a memory-safety bug.","fix":"Document the password length limit, or read into a larger/dynamic buffer if very long interactive passwords need to be supported.","locations":[{"ref":"src/tool_paramhlp.c:567-595","code":"  567 |     char passwd[2048] = \"\";\n  568 |     char prompt[256];\n  569 |     struct dynbuf dyn;\n  570 | \n  571 |     curlx_dyn_init(&dyn, MAX_USERPWDLENGTH);\n  572 |     if(osep)\n  573 |       *osep = '\\0';\n  574 | \n  575 |     /* build a nice-looking prompt */\n  576 |     if(!i && last)\n  577 |       curl_msnprintf(prompt, sizeof(prompt),\n  578 |                      \"Enter %s password for user '%s':\",\n  579 |                      kind, *userpwd <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-30 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
