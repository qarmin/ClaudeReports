","description":"The branch at lines 299-304 is unreachable dead code: the `if fn_path.is_none()` at line 299 always assigns `fn_path = full_path.clone().into()`, so the immediately following `else if fn_path.is_none()` can never be taken (and is also a logically impossible double-check of the same condition). This is a copy-paste/refactor leftover that obscures intent.","fix":"Remove the unreachable `else if fn_path.is_none()` branch, leaving only the `if fn_path.is_none() { fn_path = full_path.clone().into(); }`.","locations":[{"ref":"crates/jni-macros/src/native_method.rs:299-304","code":"  299 |                 if fn_path.is_none() {\n  300 |                     fn_path = full_path.clone().into();\n  301 |                 } else if fn_path.is_none() {\n  302 |                     // Default to the full path if no => was given\n  303 |                     fn_path = Some(full_path.clone());\n  304 |                 }","lines":6}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"parts.is_empty() can never be true: str::split('.') always yields at least one element, and this branch is only reached when raw_sig.contains('.') (so there are at least two parts). The emptiness check and its error path are unreachable dead code.","fix":"Remove the unreachable is_empty() check, or replace it with the meaningful validation described above (empty-segment / leading-dot handling).","locations":[{"ref":"crates/jni-macros/src/signature.rs:296-302","code":"  296 |             let parts: Vec<&str> = raw_sig.split('.').collect();\n  297 |             if parts.is_empty() {\n  298 |                 return Err(syn::Error::new(\n  299 |                     input.span(),\n  300 |                     format!(\"Empty Java class name in string literal: '{}'\", raw_sig),\n  301 |                 ));\n  302 |             }","lines":7}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In the string-literal branch of `JavaClassName::parse`, the guard `parts.is_empty()` (line 132) is dead: `str::split('.')` always yields at least one element, so the `Vec` is never empty. Only the `parts.len() == 1 && !starts_with('.')` condition can ever fire.","fix":"Drop the `parts.is_empty()` disjunct; keep only the single-segment / leading-dot check.","locations":[{"ref":"crates/jni-macros/src/types.rs:131-137","code":"  131 |             let parts: Vec<&str> = class_str.split('.').collect();\n  132 |             if parts.is_empty() || (parts.len() == 1 && !class_str.starts_with('.')) {\n  133 |                 return Err(syn::Error::new(\n  134 |                     lit.span(),\n  135 |                     \"Java class name in string literal must contain at least one dot (e.g., \\\"java.lang.String\\\" or \\\".NoPackage\\\" for default package)\",\n  136 |                 ));\n  137 |             }","lines":7}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In `call_nonvirtual_method` the `null_check!` context string passed for the `obj` argument is \"call_method obj argument\" rather than referring to `call_nonvirtual_method`. A copy-paste leftover from `call_method` that will produce a misleading error message / NullPtr context if `obj` is null.","fix":"Change the context string to \"call_nonvirtual_method obj argument\".","locations":[{"ref":"crates/jni/src/env.rs:3029","code":" 3029 |         let obj = null_check!(obj, \"call_method obj argument\")?;","lines":1}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The comment in `get_field_unchecked`'s `null_check!` uses the context string \"get_field_typed obj argument\", referring to a non-existent method name `get_field_typed` (likely a renamed/removed method). Misleading in error messages.","fix":"Update the context string to \"get_field_unchecked obj argument\".","locations":[{"ref":"crates/jni/src/env.rs:3871","code":" 3871 |         let obj = null_check!(obj, \"get_field_typed obj argument\")?;","lines":1}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"JCollection method doc comments are copy-pasted from JSet and refer to \"this set\" instead of \"this collection\". `add` says \"Adds the given element to this set if it is not already present\" (a Collection has no such uniqueness contract), and `contains` says \"Checks if the given element is present in this set.\" with throws referring to \"the set\". These are misleading for the generic Collection binding.","fix":"Reword the doc comments to refer to the collection (and drop the not-already-present uniqueness wording from add, which is Set-specific).","locations":[{"ref":"crates/jni/src/objects/jcollection.rs:4-16","code":"    4 |         /// Adds the given element to this set if it is not already present\n    5 |         ///\n    6 |         /// Returns `true` if the collection was modified. Returns false if the collection already contains the element and\n    7 |         /// the collection doesn't allow duplicates.\n    8 |         ///\n    9 |         /// # Throws\n   10 |         ///\n   11 |         /// - `UnsupportedOperationException` - if the add operation is not supported\n   12 |         /// - `ClassCastException` - if the element type isn't compatible with the collection\n   13 |         /// - `NullPointerException` - if the given element is null and the collection does not allow null values\n   14 |         /// - `IllegalArgumentException` - if the element has a property that prevents it from being added to this collection\n   15 |         /// - `IllegalStateException` - if the element cannot be added due to the current state of the collection\n   16 |         fn add(element: JObject) -> bool,","lines":13},{"ref":"crates/jni/src/objects/jcollection.rs:36-44","code":"   36 |         /// Checks if the given element is present in this set.\n   37 |         ///\n   38 |         /// Returns `true` if the element is present, `false` otherwise.\n   39 |         ///\n   40 |         /// # Throws\n   41 |         ///\n   42 |         /// - `ClassCastException` - if the element type isn't compatible with the set\n   43 |         /// - `NullPointerException` - if the given element is null and the set does not allow null values\n   44 |         fn contains(element: JObject) -> bool,","lines":9}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The `LoaderContext` enum is declared with lifetime parameters `<'any_local, 'a>` (object lifetime first, borrow lifetime second), but the `impl` block is written `impl<'a, 'any_local> LoaderContext<'a, 'any_local>`, which binds the impl's `'a` to the struct's `'any_local` slot and vice-versa. It compiles only because none of the methods actually reference the struct's lifetime parameters (they introduce fresh lifetimes), but the swapped names are highly misleading and invite a real lifetime bug the moment someone adds a method that names a struct lifetime. The other usages (jobject_array.rs, jprimitive_array.rs) use the order `LoaderContext<'any_local, '_>`, matching the struct declaration, confirming the impl ordering is the inconsistent one.","fix":"Write the impl header as `impl<'any_local, 'a> LoaderContext<'any_local, 'a>` so the generic parameter names match the struct declaration order.","locations":[{"ref":"crates/jni/src/refs/loader_context.rs:12-12","code":"   12 | pub enum LoaderContext<'any_local, 'a> {","lines":1},{"ref":"crates/jni/src/refs/loader_context.rs:35-35","code":"   35 | impl<'a, 'any_local> LoaderContext<'a, 'any_local> {","lines":1}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Copy-paste doc error: `Weak::null()` doc says \"Creates a [`Global`] wrapper for a `null` reference\" and \"This is equivalent [`Weak::default()`]\". It returns a `Weak`, not a `Global`. The wording was clearly copied from `Global::null()`.","fix":"Change the first doc line to \"Creates a [`Weak`] wrapper for a `null` reference\".","locations":[{"ref":"crates/jni/src/refs/weak.rs:153-161","code":"  153 |     /// Creates a [`Global`] wrapper for a `null` reference\n  154 |     ///\n  155 |     /// This is equivalent [`Weak::default()`]\n  156 |     ///\n  157 |     /// A `null` [`Weak`] acts as-if the object has been garbage collected\n  158 |     /// ([`Self::is_garbage_collected()`] will return `true`).\n  159 |     pub fn null() -> Self {\n  160 |         Self { obj: T::default() }\n  161 |     }","lines":9}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In parse_primitive the error message formats the first raw byte as `first as char`. When the input begins with a multi-byte UTF-8 character, `first` is only the leading byte of that codepoint, so the displayed character in the error is garbage (e.g. a replacement/control glyph) rather than the actual offending character. This is a cosmetic correctness issue in user-facing parse errors.","fix":"Format using the first char of the input string (e.g. input.chars().next()) instead of casting a single byte to char, or show the byte value in hex.","locations":[{"ref":"crates/jni/src/signature.rs:399-405","code":"  399 |         _ => {\n  400 |             return Err(Error::ParseFailed(format!(\n  401 |                 \"expected primitive type, got '{}'\",\n  402 |                 first as char\n  403 |             )));\n  404 |         }\n  405 |     };","lines":7}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment on parse_raw_jni_type says it returns \"the JavaType\", and parse_raw_jni_method_signature's comment references \"JavaType\", but the function actually returns SigType (the macro crate's own enum). The 'JavaType' naming is a leftover from the previous design and is misleading to readers.","fix":"Update the comments to say SigType, matching the actual return type.","locations":[{"ref":"crates/jni-macros/src/signature.rs:464-466","code":"  464 | /// Parse a single JNI type descriptor from a string\n  465 | /// Returns the JavaType and the number of bytes consumed\n  466 | fn parse_raw_jni_type(s: &str) -> Result<(SigType, usize)> {","lines":3}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The `insert_ref_type` error message for core types lists only \"java.lang.Object, java.lang.Class, java.lang.Throwable and java.lang.String\" as core types (lines 813-816), but the actual core set built in `new()` (the `is_core` builtins) is exactly those four (JClass, JObject, JString, JThrowable). The doc comment at lines 543-547 also only mentions Object, Class, String (omitting Throwable). The doc comment is incomplete/misleading relative to the implemented core set.","fix":"Update the doc comment to list all four core classes (Object, Class, String, Throwable) to match the implementation and the error message.","locations":[{"ref":"crates/jni-macros/src/types.rs:543-547","code":"  543 |     /// Set of core Java types that can not be mapped to non-jni-crate types\n  544 |     ///\n  545 |     /// Although some types, like java.util.List, can be remapped to third-party\n  546 |     /// bindings, we don't allow alternative mappings for core java.lang types\n  547 |     /// like java.lang.Object, java.lang.Class, java.lang.String.","lines":5}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The module comments mislabel the two auto-release variants. `auto_elements` is described as 'generic array release' but it handles primitive arrays via Get/Release<Type>ArrayElements (non-critical), and `auto_elements_critical` is described as 'primitive array release' though both are primitive; the distinguishing factor (non-critical vs critical) is not conveyed and is in fact swapped/misleading.","fix":"Reword to: auto_elements = non-critical primitive array elements (Get/ReleaseTypeArrayElements); auto_elements_critical = critical primitive array elements (Get/ReleasePrimitiveArrayCritical).","locations":[{"ref":"crates/jni/src/elements/mod.rs:4-9","code":"    4 | // For automatic pointer-based generic array release\n    5 | mod auto_elements;\n    6 | pub use auto_elements::*;\n    7 | \n    8 | // For automatic pointer-based primitive array release\n    9 | mod auto_elements_critical;","lines":6}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In define_class_jbyte the local `name` is already an `Option<&JNIStr>` after the preceding line, yet the code does `name.as_ref().map_or(...)`, producing an `Option<&&JNIStr>` that only works via auto-deref. The sibling define_class uses the correct `name.map_or(...)`. The extra `.as_ref()` is redundant/misleading and inconsistent with define_class.","fix":"Use `name.map_or(ptr::null(), |n| n.as_ptr())` to match define_class and drop the redundant `.as_ref()`.","locations":[{"ref":"crates/jni/src/env.rs:632-633","code":"  632 |         let name: Option<&JNIStr> = name.as_ref().map(|n| n.as_ref());\n  633 |         let name = name.as_ref().map_or(ptr::null(), |n| n.as_ptr());","lines":2}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"JFieldID, JStaticFieldID, JStaticMethodID doc comments and several inline `// ... Method ID ...` comments were copy-pasted from JMethodID and still say \"method IDs\" / \"Method ID\" where they describe field IDs (e.g. JFieldID says \"implements Send + Sync since method IDs are valid across threads\" and \"every Method ID be associated with a global reference\"). Misleading but not a functional defect.","fix":"Replace \"method ID\"/\"Method ID\" with \"field ID\" in the field-ID wrappers' docs.","locations":[{"ref":"crates/jni/src/ids/jfieldid.rs:3-22","code":"    3 | /// Wrapper around [`jfieldID`] that implements `Send` + `Sync` since method IDs\n    4 | /// are valid across threads (not tied to a `Env`).\n    5 | ///\n    6 | /// There is no lifetime associated with these since they aren't garbage\n    7 | /// collected like objects and their lifetime is not implicitly connected with\n    8 | /// the scope in which they are queried.\n    9 | ///\n   10 | /// It matches C's representation of the raw pointer, so it can be used in any\n   11 | /// of the extern function argument positions that would take a [`jfieldID`].\n   12 | ///\n   13 | /// # Safety\n   14 | ///\n   15 | /// According to the JNI spec field IDs may be invalidated when the\n   16 | /// corresponding class is unloaded.\n   17 | ///\n   18 | /// Since this constraint can't be encoded as a Rust lifetime, and to avoid the\n   19 | /// excessive cost of having every Method ID be associated with a global\n   20 | /// reference to the corresponding class then it is the developers\n   21 | /// responsibility to ensure they hold some class reference for the lifetime of\n   22 | /// cached method IDs.","lines":20},{"ref":"crates/jni/src/ids/jstaticfieldid.rs:20-22","code":"   20 | /// reference to the corresponding class then it is the developers\n   21 | /// responsibility to ensure they hold some class reference for the lifetime of\n   22 | /// cached method IDs.","lines":3}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Misleading doc: both `Global` and `Weak` drop documentation state the thread \"will be temporarily attached using `JavaVM::attach_current_thread_for_scope`\", but the Drop implementations actually use `vm.attach_current_thread_guard(... .scoped(true) ...)`. The referenced API is not the one used, so the linked doc points readers at the wrong function.","fix":"Update the doc to reference the scoped attach-guard path actually used, or remove the specific method name.","locations":[{"ref":"crates/jni/src/refs/global.rs:80-83","code":"   80 | /// reference. If this frequently happens on a thread that is not already\n   81 | /// attached to the JVM, the thread will be temporarily attached using\n   82 | /// [`JavaVM::attach_current_thread_for_scope`], causing a severe performance\n   83 | /// penalty.","lines":4},{"ref":"crates/jni/src/refs/weak.rs:62-65","code":"   62 | /// reference. If this frequently happens on a thread that is not already\n   63 | /// attached to the JVM, the thread will be temporarily attached using\n   64 | /// [`JavaVM::attach_current_thread_for_scope`], causing a severe performance\n   65 | /// penalty.","lines":4}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Copy-paste doc error in `Weak::upgrade_global`: the success-case doc says \"otherwise it returns `Some(new_local_reference)`\" but this method returns a `Global<...>`, not a local reference. The text was copied from `upgrade_local`.","fix":"Reword to \"otherwise it returns `Some(new_global_reference)`\".","locations":[{"ref":"crates/jni/src/refs/weak.rs:183-196","code":"  183 |     /// Creates a new strong global reference to this object.\n  184 |     ///\n  185 |     /// This returns `None` if the object has already been garbage collected, otherwise it returns\n  186 |     /// `Some(new_local_reference)`.\n  187 |     ///\n  188 |     /// If this method returns `Some(r)`, it is guaranteed that the object will not be garbage\n  189 |     /// collected at least until `r` is deleted or becomes invalid.\n  190 |     pub fn upgrade_global(&self, env: &Env) -> Result<Option<Global<T::GlobalKind>>> {\n  191 |         match env.new_global_ref(self) {\n  192 |             Err(Error::ObjectFreed) => Ok(None),\n  193 |             Err(err) => Err(err),\n  194 |             Ok(global_ref) => Ok(Some(global_ref)),\n  195 |         }\n  196 |     }","lines":14}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc on from_cstr states it is for literals where you can be \"almost certain that the input is valid modified UTF-8 because it doesn't contain ... supplementary Unicode characters.\" This is misleading: is_valid_mutf8_cstr actually ACCEPTS supplementary characters when they are encoded as the MUTF-8 six-byte form (two 0xED-led surrogate sequences), as the validator explicitly allows the 0xED 0xA0..0xBF surrogate range. The restriction implied by the comment does not exist in the code.","fix":"Reword the doc to say from_cstr validates full MUTF-8 (including surrogate-encoded supplementary characters), and that the genuine remaining caveat is interior NULs (not representable in a CStr) and 4-byte standard-UTF-8 forms (which are rejected).","locations":[{"ref":"crates/jni/src/strings/ffi_str.rs:329-346","code":"  329 |     /// `const` casts a `&CStr` as a `&JNIStr`, after validating the input.\n  330 |     ///\n  331 |     /// This can be used for zero-copy casting of simple `CStr` literals\n  332 |     /// that can be passed to JNI for things like signatures or\n  333 |     /// class/method/field names where you can be almost certain that the input\n  334 |     /// is valid modified UTF-8 because it doesn't contain any NULs or\n  335 |     /// supplementary Unicode characters.\n  336 |     ///\n  337 |     /// In general though, it's recommended to use the [`crate::jni_str!`] macro\n  338 |     /// to encode string literals, since it has full unicode support and it\n  339 |     /// guarantees that the string is encoded at compile time.\n  340 |     pub const fn from_cstr(cstr: &CStr) -> Option<&JNIStr> {\n  341 |         if !is_valid_mutf8_cstr(cstr) {\n  342 |             return None;\n  343 |         }\n  344 |         // Safety: We have just checked the validity of the bytes.\n  345 |         unsafe { Some(Self::from_cstr_unchecked(cstr)) }\n  346 |     }","lines":18}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"InitArgs::inner_ptr is annotated `#[allow(dead_code)]` but it is actually used at java_vm.rs:290 (args.inner_ptr()). The allow attribute is misleading and suggests the method is unused when it is part of the live code path for JavaVM::new.","fix":"Remove the `#[allow(dead_code)]` attribute since the method is used; if it is conditionally unused under some feature set, gate the allow on that cfg instead.","locations":[{"ref":"crates/jni/src/vm/init_args.rs:356-361","code":"  356 | impl InitArgs<'_> {\n  357 |     #[allow(dead_code)]\n  358 |     pub(crate) fn inner_ptr(&self) -> *mut c_void {\n  359 |         &self.inner as *const _ as _\n  360 |     }\n  361 | }","lines":6},{"ref":"crates/jni/src/vm/java_vm.rs:290","code":"  290 |                 args.inner_ptr(),","lines":1}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment at the end of attach_current_thread_with_config states that a detachment error \"will also have a higher precedence than the result from the closure\" and that this is reasonable. While true, the code unconditionally discards the closure's successful return value `ret` whenever guard.detach()/detach_with_catch_and_throw() returns Err via `?`. This is fine for error precedence but the comment does not make clear that even a *successful* closure result is dropped on a detach error, which can surprise callers expecting their value back.","fix":"Clarify the comment to state explicitly that any successful closure return value is discarded if detachment fails, so callers understand the value is lost on a detach error.","locations":[{"ref":"crates/jni/src/vm/java_vm.rs:629-649","code":"  629 |         // Explicitly detach the guard (instead of relying on Drop) so we can\n  630 |         // return any error from the detachment process.\n  631 |         //\n  632 |         // Any left-over pending exception from the `callback` closure will be\n  633 |         // returned as `Error::CaughtJavaException` here.\n  634 |         //\n  635 |         // Any exception that was caught before running the `callback` closure\n  636 |         // will be re-thrown.\n  637 |         //\n  638 |         // Note: any error here will also have a higher precedence than the\n  639 |         // result from the closure which is probably reasonable because a\n  640 |         // detachment error would probably indicate a serious issue and an\n  641 |         // exception should typically imply that the closure has returned a\n  642 |         // `JavaException` error.\n  643 |         if exceptions_policy == AttachmentExceptionPolicy::Ignore {\n  644 |             guard.detach()?;\n  645 |         } else {\n  646 |             guard.detach_with_catch_and_throw(pre_pending_exception)?;\n  647 |         }\n  648 | \n  649 |         ret","lines":21}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"generate_jni_call_for_return_type, generate_jni_get_field_call, and generate_jni_set_field_call each contain a near-identical primitive-vs-object match arm (the same 9 PrimitiveType variants mapping to format_ident! call names, plus the same object/array fallback, exception-check preamble, null-check, and env.get_raw()/interface boilerplate). This is well over 25 duplicated lines spread across the three functions and is exactly where the copy-paste bug in this file (the getter error message) crept in.","fix":"Factor the primitive->JNI-call-name table and the shared exception-check / null-check / interface-dispatch preamble into helper functions parameterized by the GetStatic/Get/CallStatic/Call prefix, so the three generators share one implementation.","locations":[{"ref":"crates/jni-macros/src/bind_java_type.rs:2612-2710","code":" 2612 |     let (top_check, ca his wrapper will be hidden.\n  113 |             // - A pre-condition of `Reference` is that `T::Kind` must not have any `Drop` side\n  114 |             //   effects so we don't have to worry that creating a second wrapper could lead to a\n  115 |             //   double free when dropped.\n  116 |             // - We're allowed to potentially create a `JObject::Kind` wrapper for a `'static`\n  117 |             //   global reference in this situation where we're not giving ownership of the cast\n  118 |             //   wrapper and we're borrowing from the original reference.\n  119 |             unsafe {\n  120 |                 Ok(Self {\n  121 |                     _from: PhantomData,\n  122 |                     to: To::kind_from_raw::<'any>(from.as_raw()),\n  123 |                 })\n  124 |             }\n  125 |         } else {\n  126 |             Err(Error::WrongObjectType)\n  127 |         }\n  128 |     }","lines":29}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","description":"JValue::as_jni transmutes the whole 8-byte jvalue union to u64 for a trace! log, but for small variants (Byte/Char/Short/Int/Bool/Float, and Void via null pointer aside) only a 1-4 byte field is written, leaving the remaining union bytes uninitialized. Reading those uninitialized bytes via transmute::<jvalue, u64> is undefined behavior in Rust (reading uninit memory), and it runs on every as_jni call when trace logging is compiled in.","fix":"Do not transmute the union to u64. Either initialize the full 8 bytes first (e.g. write the value into a zeroed [u8; 8] / start from jvalue { j: 0 } and overwrite), or log the source JValue enum directly instead of its raw union bits.","locations":[{"ref":"crates/jni/src/jvalue.rs:331-334","code":"  331 |         trace!(\"converted {:?} to jvalue {:?}\", self, unsafe {\n  332 |             ::std::mem::transmute::<jvalue, u64>(val)\n  333 |         });\n  334 |         val","lines":4}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","description":"sig_type_to_rust_arg_type emits `impl AsRef<...>` with an unqualified `AsRef`, relying on the std prelude being in scope at the binding's call site. The rest of the generated code is carefully fully-qualified (e.g. ::core::convert::AsRef, ::std::..., #jni::...). If a user shadows `AsRef` in the module that invokes bind_java_type! (or invokes it in a #![no_implicit_prelude] context), the generated method/field argument types fail to compile. This is a macro-hygiene inconsistency.","fix":"Generate `impl ::core::convert::AsRef<#concrete_type>` to match the fully-qualified style used elsewhere in this file.","locations":[{"ref":"crates/jni-macros/src/bind_java_type.rs:2306-2308","code":" 2306 |     // For objects, arrays, and rust references, wrap in impl AsRef\n 2307 |     let concrete_type = sig_type_to_rust_type_core(sig_type, lifetime, type_mappings, jni);\n 2308 |     quote! { impl AsRef<#concrete_type> }","lines":3}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","description":"AutoElements exposes a public commit() method (Release with JNI_COMMIT to flush a copy without freeing) but the otherwise-parallel AutoElementsCritical does not, despite GetPrimitiveArrayCritical also being able to return a copy (is_copy is tracked). Users holding a critical guard have no way to flush pending writes mid-section; the only difference is unexplained and looks like an oversight rather than a deliberate restriction (the doc text for both types is otherwise symmetric).","fix":"Either add an equivalent commit() to AutoElementsCritical, or document explicitly why commit is intentionally unavailable for the critical variant.","locations":[{"ref":"crates/jni/src/elements/auto_elements.rs:74-77","code":"   74 |     /// Commits the changes to the array, if it is a copy\n   75 |     pub fn commit(&mut self) -> Result<()> {\n   76 |         unsafe { self.release_array_elements(sys::JNI_COMMIT) }\n   77 |     }","lines":4},{"ref":"crates/jni/src/elements/auto_elements_critical.rs:95-126","code":"   95 |     /// Get a reference to the wrapped pointer\n   96 |     pub const fn as_ptr(&self) -> *mut T {\n   97 |         self.ptr.as_ptr()\n   98 |     }\n   99 | \n  100 |     /// Calls `ReleasePrimitiveArrayCritical`.\n  101 |     ///\n  102 |     /// # Safety\n  103 |     ///\n  104 |     /// `mode` must be a valid parameter to the JNI `ReleasePrimitiveArrayCritical` `mode`\n  105 |     /// parameter.\n  106 |     ///\n  107 |     /// If `mode` is not [`sys::JNI_COMMIT`], then `self.ptr` must not have already been released.\n  108 |     unsafe fn release_primitive_array_critical(&mut self, mode: i32) -> Result<()> {\n  109 |         // Safety/Errors:\n  110 |         // - Since we can't construct `AutoElementsCritical` without a valid `Env` reference we know\n  111 |         //   we can call `JavaVM::singleton()` without an error.\n  112 |         // - Since `self` is associated with a local reference frame lifetime we know that the\n  113 |         //   thread is attached and so `with_top_local_frame()` can't return an error.\n  114 |         // - ReleasePrimitiveArrayCritical can be called while there is a pending exception\n  115 |         JavaVM::singleton()?.with_top_local_frame(|env| unsafe {\n  116 |             ex_safe_jni_call_no_post_check_ex!(\n  117 |                 env,\n  118 |                 v1_2,\n  119 |                 ReleasePrimitiveArrayCritical,\n  120 |                 self.array.as_ref().as_raw(),\n  121 |                 self.ptr.as_ptr().cast(),\n  122 |                 mode\n  123 |             );\n  124 |             Ok(())\n  125 |         })\n  126 |     }","lines":32}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","description":"Grammatical/logic error in safety docs for `Reference::kind_from_raw` and `Reference::global_kind_from_raw`: the safety contract reads \"There must not be no other owning wrapper for the given `reference`\" (double negative), which literally states the opposite of the intended invariant. Since these are `unsafe` functions whose entire correctness rests on callers reading the safety contract, an inverted requirement is a real soundness-documentation hazard.","fix":"Reword to \"There must not be any other owning wrapper for the given `reference` (unless it is `null`)\".","locations":[{"ref":"crates/jni/src/refs/reference.rs:367-367","code":"  367 |     /// There must not be no other owning wrapper for the given `reference` (unless it is `null`)","lines":1},{"ref":"crates/jni/src/refs/reference.rs:396-397","code":"  396 |     /// There must not be no other wrapper for the given `global_ref` reference (unless it is\n  397 |     /// `null`)","lines":2}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"low","description":"str_to_cstr_win32 enforces MAX_INPUT_LEN against s.len() (UTF-8 byte length) but the overflow concern documented for WideCharToMultiByte is about the UTF-16 unit count and the output byte count. UTF-8 byte length is a conservative upper bound on UTF-16 units so it is safe, but the comment at line 36 (\"check if the input string (UTF-8) is too long\") and the limit semantics are easy to misread: a string at exactly MAX_INPUT_LEN UTF-8 bytes can still expand to a larger output buffer in some code pages. The test_overflow test relies on the worst case being U+07FF; if a future code page could expand a single UTF-16 unit to more than the assumed max output bytes, required_buffer_space could in principle exceed i32 and the `+ 1` at line 136 would be performed on an `as _` cast value without overflow check.","fix":"Document precisely that MAX_INPUT_LEN bounds UTF-8 bytes and that the chosen value keeps both the UTF-16 length and the maximum possible output byte count within i32. Consider using checked_add for required_buffer_space_usize + 1 to be defensive.","locations":[{"ref":"crates/jni/src/vm/init_args/char_encoding_windows.rs:29-41","code":"   29 | const MAX_INPUT_LEN: usize = 1048576;\n   30 | \n   31 | /// Converts `s` into a `Cow<CStr>` encoded in the specified Windows code page.\n   32 | pub(super) fn str_to_cstr_win32(\n   33 |     s: Cow<str>,\n   34 |     needed_codepage: WCodepage,\n   35 | ) -> Result<Cow<'static, CStr>, JvmError> {\n   36 |     // First, check if the input string (UTF-8) is too long to transcode. Bail early if so.\n   37 |     if s.len() > MAX_INPUT_LEN {\n   38 |         return Err(JvmError::OptStringTooLong {\n   39 |             opt_string: s.into_owned(),\n   40 |         });\n   41 |     }","lines":13},{"ref":"crates/jni/src/vm/init_args/char_encoding_windows.rs:130-136","code":"  130 |     // Convert the required buffer space to `usize`, and increment it by one for the null\n  131 |     // terminator.\n  132 |     //\n  133 |     // This shouldn't overflow (see the comment on `MAX_INPUT_LEN` above), so we won't check for\n  134 |     // overflow here.\n  135 |     let required_buffer_space_usize: usize = required_buffer_space as _;\n  136 |     let required_buffer_space_usize_with_nul: usize = required_buffer_space_usize + 1;","lines":7}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"negligible","description":"On the invalid-descriptor error path, bytes[0] is converted with `as char`, which interprets a raw byte as a Latin-1 code point. For a non-ASCII leading byte (a multibyte UTF-8 lead byte in a malformed signature) the error message 'Invalid type descriptor: <c>' prints a mojibake character rather than the original input, making the diagnostic confusing.","fix":"Match on the leading char via s.chars().next() and report that char (or the byte in hex) so multibyte/invalid input is reported intelligibly.","locations":[{"ref":"crates/jni-macros/src/signature.rs:475-475","code":"  475 |     match bytes[0] as char {","lines":1},{"ref":"crates/jni-macros/src/signature.rs:558-561","code":"  558 |         c => Err(syn::Error::new(\n  559 | rray, JIntArray,\n   33 |         JLongArray, JObjectArray, JPrimitiveArray, JShortArray, LoaderContext,\n   34 |         type_array_sealed::TypeArraySealed,\n   35 |     },\n   36 | };\n   37 | use crate::{objects::AsJArrayRaw, signature::ReturnType};\n   38 | \n   39 | use super::{AttachGuard, objects::Reference};\n   40 | \n   41 | #[cfg(doc)]\n   42 | use crate::{jni_str, objects::JThread, strings::JNIString};\n   43 | \n   44 | /// A non-transparent wrapper around a raw [`sys::JNIEnv`] pointer that provides\n   45 | /// safe access to the Java Native Interface (JNI) functions.\n   46 | ///\n   47 | /// Since [Env] is not a type that is publicly constructible, you must obtain a\n   48 | /// reference, either through a thread attachment, by upgrading an\n   49 | /// [`EnvUnowned`] within a native method, or via the (unsafe)\n   50 | /// [`AttachGuard::from_unowned`] APIs.\n   51 | ///\n   52 | /// See:\n   53 | /// - [`JavaVM::attach_current_thread`]\n   54 | /// - [`JavaVM::attach_current_thread_for_scope`]\n   55 | /// - [`JavaVM::with_local_frame`]\n   56 | /// - [`JavaVM::with_top_local_frame`]\n   57 | /// - [`EnvUnowned::with_env`]\n   58 | ///\n   59 | /// [Env] is a non-transparent wrapper that is not FFI-safe, so it must not be\n   60 | /// used to try and capture a raw [`sys::JNIEnv`] pointer passed to a native\n   61 | /// method.\n   62 | ///\n   63 | /// See [`EnvUnowned`] for a wrapper that is FFI-safe and can be used to capture\n   64 | /// a `sys::JNIEnv` pointer passed to a native method.\n   65 | ///\n   66 | /// # Overview of the API\n   67 | ///\n   68 | /// All the [`Env`] methods aim to follow the JNI specification naming closely\n   69 | /// enough to make it easier to map between the two. This means that method\n   70 | /// names, parameter types, and return types will generally be consistent with\n   71 | /// the JNI specification.\n   72 | ///\n   73 | /// JNI APIs that can logically be thought of as methods, such as\n   74 | /// `GetObjectArrayElement`, can be found as methods on the relevant Rust type,\n   75 | /// in this case [`JObjectArray::get_element`].\n   76 | ///\n   77 | /// # Exception handling\n   78 | ///\n   79 | /// Since we're calling into the JVM with this, many methods also have the\n   80 | /// potential to cause an exception to get thrown. If this is the case, an `Err`\n   81 | /// result will be returned with the error kind [`Error::JavaException`]. Note\n   82 | /// that this will _not_ clear the exception - it's up to the caller to decide\n   83 | /// whether to do so or to let it continue being thrown.\n   84 | ///\n   85 | /// # References and Lifetimes\n   86 | ///\n   87 | /// As in C JNI, interactions with Java objects happen through\n   88 | /// <dfn>references<\/dfn>, either local or global.\n   89 | ///\n   90 | /// This crate provides various safe wrappers around JNI references, such as\n   91 | /// [`JObject`], [`JClass`], [`JString`] and [`JList`] which all implement the\n   92 | /// [`Reference`] trait.\n   93 | ///\n   94 | /// By default these types represent <dfn>local references<\/dfn>, and they will\n   95 | /// be associated with a lifetime that names the local reference frame they\n   96 | /// belong to.\n   97 | ///\n   98 | /// So for example `JObject<'local_1>`  and  `JObject<'local_2>` are local\n   99 | /// reference that are owned by two different local reference frames and\n  100 | /// although they may both be usable from a higher stack frame, it's not\n  101 | /// possible to simply move ownership of a local reference from one local\n  102 | /// reference frame to another.\n  103 | ///\n  104 | /// A global reference can be represented by a [`Global`], which will wrap one\n  105 | /// of the above primitive reference types like `Global<JObject<'static>>`. In\n  106 | /// this case the `'static` lifetime indicates that the reference is not tied to\n  107 | /// a local reference frame and can be used from any thread.\n  108 | ///\n  109 | /// So long as there is at least one reference to a Java object, the JVM garbage\n  110 | /// collector will not reclaim it.\n  111 | ///\n  112 | /// <dfn>Global references<\/dfn> exist until deleted. Deletion occurs when the\n  113 | /// `Global` is dropped.\n  114 | ///\n  115 | /// <dfn>Local references<\/dfn> belong to a local reference frame, and exist\n  116 | /// until [deleted][Env::delete_local_ref] or until the local reference frame is\n  117 | /// exited. A new <dfn>local reference frame<\/dfn> is entered when a native\n  118 | /// method is called from Java, or when Rust code does so explicitly using\n  119 | /// [`Env::with_local_frame`]. That local reference frame is exited when the\n  120 | /// native method or `with_local_frame` returns. When a local reference frame is\n  121 | /// exited, all local references created inside it are deleted.\n  122 | ///\n  123 | /// Unlike C JNI, this crate creates a separate `Env` for each local reference\n  124 | /// frame. The associated Rust lifetime `'local` represents that local reference\n  125 | /// frame. Rust's borrow checker will ensure that local references are not used\n  126 | /// after their local reference frame exits (which would cause undefined\n  127 | /// behavior).\n  128 | ///\n  129 | /// Unlike global references, local references are not deleted when dropped by\n  130 | /// default. This is for performance: it is faster for the JVM to delete all of\n  131 | /// the local references in a frame all at once, than to delete each local\n  132 | /// reference one at a time. However, this can cause a memory leak if the local\n  133 | /// reference frame remains entered for a long time, such as a long-lasting\n  134 | /// loop, in which case local references should be deleted explicitly. Local\n  135 | /// references can be deleted when dropped if desired; use\n  136 | /// [`Env::delete_local_ref`] or wrap with [`IntoAuto::auto`] to arrange that.\n  137 | ///\n  138 | /// ## Lifetime Names\n  139 | ///\n  140 | /// This crate uses the following convention for lifetime names:\n  141 | ///\n  142 | /// * `'local` is the lifetime of a local reference frame, as described above.\n  143 | ///\n  144 | /// * `'other_local`, `'other_local_1`, and `'other_local_2` are the lifetimes\n  145 | ///   of some other local reference frame, which may be but doesn't have to be\n  146 | ///   the same as `'local`. For example, [`Env::new_local_ref`] accepts a local\n  147 | ///   reference in any local reference frame `'other_local` and creates a new\n  148 | ///   local reference to the same object in `'local`.\n  149 | ///\n  150 | /// * `'obj_ref` is the lifetime of a borrow of a JNI reference, like\n  151 | ///   <code>&amp;[JObject]<\/code> or <code>&amp;[Global]<\/code>. For example,\n  152 | ///   [`Env::get_list`] constructs a new [`JList`] that borrows a `&'obj_ref\n  153 | ///   JObject`.\n  154 | ///\n  155 | /// ## `null` Java references\n  156 | /// `null` Java references are handled by the following rules:\n  157 | ///   - Methods that require non-null references will return [Error::NullPtr] if\n  158 | ///     passed a `null` reference.\n  159 | ///   - If a JNI function returns `null` to indicate an error (e.g.\n  160 | ///     [`Env::new_int_array`]), it is converted to `Err`/[`Error::NullPtr`], or\n  161 | ///     some other more applicable error type, such as\n  162 | ///     [`Error::MethodNotFound`].\n  163 | ///   - Otherwise `null` is considered a valid Java reference and is represented\n  164 | ///     as [`JObject::null()`].\n  165 | ///\n  166 | /// ## A `&mut Env` represents the top JNI stack frame\n  167 | ///\n  168 | /// Each `Env<'local>` represents a single local reference frame in the JVM.\n  169 | ///\n  170 | /// A **mutable** `&mut Env` is special: it always represents the *current top*\n  171 | /// local reference frame on the JNI stack.\n  172 | ///\n  173 | /// * You need `&mut Env` when creating new local references, since those can\n  174 | ///   only be created in the top frame.\n  175 | /// * A shared `&Env` is fine for operations that don’t produce new local\n  176 | ///   references.\n  177 | ///\n  178 | /// If you only have a shared `&Env` but need to create temporary local\n  179 | /// references (that won’t escape the scope), you can materialize a new mutable\n  180 | /// handle to the top frame using:\n  181 | ///\n  182 | /// * [`Env::with_local_frame`] – pushes a new frame, returns a mutable `Env`\n  183 | ///   for it.\n  184 | /// * [`Env::with_top_local_frame`] – borrows a mutable `Env` for the existing\n  185 | ///   top frame without pushing a new one.\n  186 | ///\n  187 | /// If you don’t even have an `Env` (e.g. inside a `Drop` implementation), you\n  188 | /// can still get one via:\n  189 | ///\n  190 | /// * [`JavaVM::attach_current_thread`]\n  191 | /// * [`JavaVM::with_top_local_frame`] - if you can guarantee that the thread is\n  192 | ///   already attached, and you just need a handle to the existing top frame.\n  193 | ///\n  194 | /// (and you can access a [`JavaVM`] via [`JavaVM::singleton`]).\n  195 | ///\n  196 | /// These APIs are safe because they constrain the new [`Env`] lifetime to the\n  197 | /// scope of the call, so any references created cannot leak.\n  198 | ///\n  199 | /// ## Runtime Top Frame Checks\n  200 | ///\n  201 | /// Rust’s type system ensures that a mutable `Env<'local>` only produces\n  202 | /// references tied to its frame.\n  203 | ///\n  204 | /// Normally this crate also guarantees that a `&mut Env` represents the top\n  205 | /// frame.\n  206 | ///\n  207 | /// However, because the JVM is global and multiple crates may independently use\n  208 | /// jni-rs, some valid usage patterns can be misused to create multiple mutable\n  209 | /// `Env`s in the same scope. For example:\n  210 | ///\n  211 | /// ```rust,no_run\n  212 | /// # use jni::{JavaVM, errors::Result, objects::JString};\n  213 | /// # fn f(vm: &JavaVM) -> Result<()> {\n  214 | /// vm.attach_current_thread(|env1| -> Result<()> {\n  215 | ///     vm.attach_current_thread(|env2| -> Result<()> {\n  216 | ///         // env1 is still mutable, but no longer the top frame.\n  217 | ///         // This will panic at runtime:\n  218 | ///         JString::from_str(env1, \"not valid here\").unwrap();\n  219 | ///         Ok(())\n  220 | ///     })\n  221 | /// })\n  222 | /// # ; Ok(())\n  223 | /// # }\n  224 | /// ```\n  225 | ///\n  226 | /// To prevent unsoundness, this crate enforces a **runtime check**:\n  227 | ///\n  228 | /// * Creating a new local reference with a mutable `Env` that is *not* the top\n  229 | ///   frame will cause a panic.\n  230 | ///\n  231 | /// ### Rule of thumb\n  232 | ///\n  233 | /// * Keep only one `Env` in scope at a time.\n  234 | /// * Always shadow outer `env` variables when introducing a new one.\n  235 | ///\n  236 | /// As long as you follow this pattern, the type system will ensure that local\n  237 | /// references are only created from the valid top frame.\n  238 | ///\n  239 | /// ## Troubleshooting `cannot borrow as mutable`\n  240 | ///\n  241 | /// If a function takes two or more parameters, one of them is `Env`, and\n  242 | /// another is something returned by a `Env` method (like [`JObject`]), then\n  243 | /// calls to that function may not compile:\n  244 | ///\n  245 | /// ```rust,compile_fail\n  246 | /// # use jni::{jni_sig, jni_str, errors::Result, Env, objects::*};\n  247 | /// #\n  248 | /// # fn f(env: &mut Env) -> Result<()> {\n  249 | /// fn example_function(\n  250 | ///     env: &mut Env,\n  251 | ///     obj: &JObject,\n  252 | /// ) {\n  253 | ///     // ...\n  254 | /// }\n  255 | ///\n  256 | /// example_function(\n  257 | ///     env,\n  258 | ///     // ERROR: cannot borrow `*env` as mutable more than once at a time\n  259 | ///     &env.new_object(\n  260 | ///         jni_str!(\"com/example/SomeClass\"),\n  261 | ///         jni_sig!(\"()V\"),\n  262 | ///         &[],\n  263 | ///     )?,\n  264 | /// )\n  265 | /// # ; Ok(())\n  266 | /// # }\n  267 | /// ```\n  268 | ///\n  269 | /// This comes from the compiler needing to borrow `env` as mutable for the call\n  270 | /// to `new_object`, but also needing to borrow it as mutable for the call to\n  271 | /// `example_function`.\n  272 | ///\n  273 | /// In the past we used to recommend here that you could avoid this by\n  274 | /// reordering the parameters so that `Env` comes last, but in practice this led\n  275 | /// to very inconsistent APIs where some functions had `Env` first and some had\n  276 | /// it last, which was confusing.\n  277 | ///\n  278 | /// Now the recommendation is to just make sure that reference type arguments\n  279 | /// are derived before the call:\n  280 | ///\n  281 | /// ```rust,no_run\n  282 | /// # use jni::{jni_sig, jni_str, errors::Result, Env, objects::JObject};\n  283 | /// #\n  284 | /// # fn f(env: &mut Env) -> Result<()> {\n  285 | /// # fn example_function(\n  286 | /// #     env: &mut Env,\n  287 | /// #     obj: &JObject,\n  288 | /// # ) {\n  289 | /// #    // ...\n  290 | /// # }\n  291 | /// let obj = env.new_object(\n  292 | ///    jni_str!(\"com/example/SomeClass\"),\n  293 | ///    jni_sig!(\"()V\"),\n  294 | ///    &[],\n  295 | /// )?;\n  296 | /// example_function(env, &obj)\n  297 | /// # ; Ok(())\n  298 | /// # }\n  299 | /// ```\n  300 | ///\n  301 | /// Quite often reference type arguments have already been derived in some outer\n  302 | /// scope and don't involve any JNI method calls so this isn't too bad in\n  303 | /// practice and it keeps the APIs more consistent / predictable, with `Env`\n  304 | /// always coming first.\n  305 | ///\n  306 | /// # Checked and unchecked methods\n  307 | ///\n  308 | /// Some of the methods come in two versions: checked (e.g. `call_method`) and\n  309 | /// unchecked (e.g. `call_method_unchecked`). Under the hood, checked methods\n  310 | /// perform some checks to ensure the validity of provided signatures, names and\n  311 | /// arguments, and then call the corresponding unchecked method.\n  312 | ///\n  313 | /// Checked methods are more flexible as they allow passing class names and\n  314 | /// method/field descriptors as strings and may perform lookups of class objects\n  315 | /// and method/field ids for you, also performing all the needed precondition\n  316 | /// checks. However, these lookup operations are expensive, so if you need to\n  317 | /// call the same method (or access the same field) multiple times, it is\n  318 | /// [recommended](https://docs.oracle.com/en/java/javase/11/docs/specs/jni/design.html#accessing-fields-and-methods)\n  319 | /// to cache the instance of the class and the method/field id, e.g.\n  320 | ///   - in loops\n  321 | ///   - when calling the same Java callback repeatedly.\n  322 | ///\n  323 | /// If you do not cache references to classes and method/field ids, you will\n  324 | /// *not* benefit from the unchecked methods.\n  325 | ///\n  326 | /// Calling unchecked methods with invalid arguments and/or invalid class and\n  327 | /// method descriptors may lead to segmentation fault.\n  328 | ///\n  329 | /// # Zero-copy `AsRef<JNIStr>` arguments\n  330 | ///\n  331 | /// The JNI specification for many functions requires that string arguments are\n  332 | /// passed as NUL terminated, Modified UTF-8 encoded byte arrays.\n  333 | ///\n  334 | /// Anything that accepts an `AsRef<JNIStr>` can directly accept a `JNIStr`\n  335 | /// literal like `jni_str!(\"java/lang/String\")` which will be encoded as MUTF-8\n  336 | /// at compile time.\n  337 | ///\n  338 | /// See [jni_str!] for more details.\n  339 | ///\n  340 | /// For non-literal, dynamic strings then you can use [JNIString::new] to encode\n  341 | /// strings as MUTF-8 at runtime (derefs as [`JNIStr`]).\n  342 | ///\n  343 | #[derive(Debug)]\n  344 | pub struct Env<'local> {\n  345 |     /// A non-null JNIEnv pointer\n  346 |     pub(crate) raw: *mut sys::JNIEnv,\n  347 |     /// The current [`jni::AttachGuard`] nesting level, which we assert matches\n  348 |     /// the top/current nesting level whenever some API will return a new local\n  349 |     /// reference\n  350 |     pub(crate) level: usize,\n  351 |     owns_attachment: bool,\n  352 |     _lifetime: PhantomData<&'local ()>,\n  353 | }\n  354 | \n  355 | impl Drop for Env<'_> {\n  356 |     fn drop(&mut self) {\n  357 |         // NOOP - we just implement Drop so that the compiler won't consider\n  358 |         // Env to be FFI safe.\n  359 |     }\n  360 | }\n  361 | \n  362 | #[cfg(test)]\n  363 | mod test {\n  364 |     use crate::Env;\n  365 |     static_assertions::assert_not_impl_any!(Env: Send);\n  366 |     static_assertions::assert_not_impl_any!(Env: Sync);\n  367 | }\n  368 | \n  369 | impl<'local> Env<'local> {\n  370 |     /// Returns an `UnsupportedVersion` error if the current JNI version is\n  371 |     /// lower than the one given.\n  372 |     ///\n  373 |     /// Returns `JavaException` if called while there is a pending exception.\n  374 |     #[allow(unused)]\n  375 |     fn ensure_version(&self, version: JNIVersion) -> Result<()> {\n  376 |         if self.version()? < version {\n  377 |             Err(Error::UnsupportedVersion)\n  378 |         } else {\n  379 |             Ok(())\n  380 |         }\n  381 |     }\n  382 | \n  383 |     /// Create a [`Env`] associated with single JNI local reference frame.\n  384 |     ///\n  385 |     /// `level` represents the nesting level of the [`AttachGuard`] that owns\n  386 |     /// this [`Env`]. This can be compared to [JavaVM::thread_attach_guard_level()]\n  387 |     /// to check that this [`Env`] is associated with the top-most JNI stack frame.\n  388 |     ///\n  389 |     /// `owns_attachment` should be true if this [`Env`] is associated with an\n  390 |     /// attachment that will detach the thread when dropped.\n  391 |     pub(crate) unsafe fn new(raw: *mut sys::JNIEnv, level: usize, owns_attachment: bool) -> Self {\n  392 |         let env = Env {\n  393 |             raw,\n  394 |             level,\n  395 |             owns_attachment,\n  396 |             _lifetime: PhantomData,\n  397 |         };\n  398 |         // Assuming that the application doesn't break the safety rules for\n  399 |         // keeping the `AttachGuard` on the stack, and not re-ordering them,\n  400 |         // we can assert that we only ever create an `Env` for the top-most\n  401 |         // guard on the stack.\n  402 |         env.assert_top();\n  403 |         env\n  404 |     }\n  405 | \n  406 |     /// Runtime check that this [`Env`] represents the top JNI stack frame\n  407 |     ///\n  408 |     /// Any lower-level API that returns a new local reference must call this\n  409 |     /// method to ensure the reference is tied to the correct JNI stack frame.\n  410 |     ///\n  411 |     /// All safe APIs that return a new local reference already call this but you\n  412 |     /// may need to call this in `unsafe` code that uses [`crate::sys`] functions\n  413 |     /// directly.\n  414 |     ///\n  415 |     /// See the safety documentation for [`AttachGuard`] for more details.\n  416 |     #[inline]\n  417 |     pub fn assert_top(&self) {\n  418 |         // Runtime check that the 'local reference lifetime will be tied to\n  419 |         // Env lifetime for the top JNI stack frame\n  420 |         assert_eq!(\n  421 |             self.level,\n  422 |             JavaVM::thread_attach_guard_level(),\n  423 |             r#\" jni runtime check failure: attempt to create a new local reference using an Env<'not_top> that is not associated with the top JNI stack frame.\n  424 | \n  425 | This implies that there is more than one mutable Env in scope.\n  426 | \n  427 | This should only be possible by misusing APIs like JavaVM::attach_current_thread or Env::with_local_frame to materialize a mutable Env when there is already one in scope.\n  428 | \n  429 | To fix this   pub fn get_version(&self) -> Result<JNIVersion> {\n  473 |         self.version()\n  474 |     }\n  475 | \n  476 |     /// Load a class from a buffer of raw class data.\n  477 |     ///\n  478 |     /// If `name` is null, the name of the class is inferred from the buffer.\n  479 |     ///\n  480 |     /// Note: This requires `&mut` because it returns a new local reference to a class.\n  481 |     ///\n  482 |     /// # Safety\n  483 |     ///\n  484 |     /// The `buf` pointer must be valid for `buf_len` bytes.\n  485 |     unsafe fn define_class_impl(\n  486 |         &mut self,\n  487 |         name: *const c_char,\n  488 |         loader: &JClassLoader,\n  489 |         buf: *const jbyte,\n  490 |         buf_len: usize,\n  491 |     ) -> Result<JClass<'local>> {\n  492 |         if buf_len > jsize::MAX as usize {\n  493 |             return Err(Error::JniCall(JniError::InvalidArguments));\n  494 |         }\n  495 |         // Runtime check that the 'local reference lifetime will be tied to\n  496 |         // Env lifetime for the top JNI stack frame\n  497 |         self.assert_top();\n  498 |         // Safety:\n  499 |         // - DefineClass is 1.1 API that must be valid\n  500 |         // - It is valid to potentially pass a `null` `name` to `DefineClass`, since the name can be\n  501 |         // read from the bytecode.\n  502 |         // - A null loader corresponds to the bootstrap class loader.\n  503 |         //\n  504 |         // Throws:\n  505 |         // - `ClassFormatError`: if the class data does not specify a valid class.\n  506 |         // - `ClassCircularityError`: if a class or interface would be its own superclass or\n  507 |         //   superinterface.\n  508 |         // - `OutOfMemoryError`: if the system runs out of memory.\n  509 |         // - `SecurityException`: if the caller attempts to define a class in the `\"java\"` package\n  510 |         //   tree.\n  511 |         unsafe {\n  512 |             jni_call_with_catch_and_null_check!(\n  513 |                 catch |env| {\n  514 |                     crate::exceptions::JClassFormatError =>\n  515 |                         Err(Error::ClassFormatError),\n  516 |                     crate::exceptions::JClassCircularityError =>\n  517 |                         Err(Error::ClassCircularityError),\n  518 |                     crate::exceptions::JOutOfMemoryError =>\n  519 |                         Err(Error::JniCall(JniError::NoMemory)),\n  520 |                     crate::exceptions::JSecurityException =>\n  521 |                         Err(Error::SecurityViolation),\n  522 |                     else => Err(Error::NullPtr(\"Unexpected Exception\")),\n  523 |                 },\n  524 |                 self,\n  525 |                 v1_1,\n  526 |                 DefineClass,\n  527 |                 name,\n  528 |                 loader.as_raw(),\n  529 |                 buf,\n  530 |                 buf_len as jsize\n  531 |             )\n  532 |             .map(|class| JClass::from_raw(self, class))\n  533 |         }\n  534 |     }\n  535 | \n  536 |     /// Load a class from a buffer of raw class data.\n  537 |     ///\n  538 |     /// If `name` is `None` then the name of the loaded class will be inferred, otherwise the given\n  539 |     /// `name` must match the name encoded within the class file data.\n  540 |     ///\n  541 |     /// Typically the `loader` should come from [`JClassLoader::get_system_class_loader`] or the\n  542 |     /// loader from some other application-specific class.\n  543 |     ///\n  544 |     /// If `loader` is `null` then the bootstrap class loader will be used, which may not be able to\n  545 |     /// load dependencies of the defined class.\n  546 |     ///\n  547 |     /// Alternatively, call [`Self::define_class_jbyte`] if your data comes from a [`JByteArray`] or\n  548 |     /// `&[jbyte]`.\n  549 |     ///\n  550 |     /// - Returns [`Error::ClassFormatError`] if the class data does not specify a valid class.\n  551 |     /// - Returns [`Error::ClassCircularityError`] if a class or interface would be its own\n  552 |     ///   superclass or superinterface.\n  553 |     /// - Returns [`Error::JniCall`] + [`JniError::NoMemory`] if the JVM reports running out of\n  554 |     ///   memory.\n  555 |     /// - Returns [`Error::SecurityViolation`] if the caller attempts to define a class in the\n  556 |     ///   `\"java\"` package tree.\n  557 |     ///\n  558 |     /// This API catches exceptions internally and is not expected to return\n  559 |     /// [`Error::JavaException`] (unless called while there is a pending exception).\n  560 |     ///\n  561 |     /// # Portability Note\n  562 |     ///\n  563 |     /// The JNI `DefineClass` function may not be supported by all JVM implementations, even though\n  564 |     /// it is part of the JNI specification.\n  565 |     ///\n  566 |     /// In particular Android's ART runtime does not support it, since all classes must be\n  567 |     /// pre-compiled into DEX format.\n  568 |     pub fn define_class<'any_loader, N, L>(\n  569 |         &mut self,\n  570 |         name: Option<N>,\n  571 |         loader: L,\n  572 |         buf: &[u8],\n  573 |     ) -> Result<JClass<'local>>\n  574 |     where\n  575 |         N: AsRef<JNIStr>,\n  576 |         L: AsRef<JClassLoader<'any_loader>>,\n  577 |     {\n  578 |         let name: Option<&JNIStr> = name.as_ref().map(|n| n.as_ref());\n  579 |         let name = name.map_or(ptr::null(), |n| n.as_ptr());\n  580 |         // Safety: we know the pointer for the u8 slice is valid for buf.len() bytes\n  581 |         unsafe {\n  582 |             self.define_class_impl(\n  583 |                 name,\n  584 |                 loader.as_ref(),\n  585 |                 buf.as_ptr() as *const jbyte,\n  586 |                 buf.len(),\n  587 |             )\n  588 |         }\n  589 |     }\n  590 | \n  591 |     /// Load a class from a buffer of raw class data.\n  592 |     ///\n  593 |     /// If `name` is `None` then the name of the loaded class will be inferred, otherwise the given\n  594 |     /// `name` must match the name encoded within the class file data.\n  595 |     ///\n  596 |     /// Typically the `loader` should come from [`JClassLoader::get_system_class_loader`] or the\n  597 |     /// loader from some other application-specific class.\n  598 |     ///\n  599 |     /// If `loader` is `null` then the bootstrap class loader will be used, which may not be able to\n  600 |     /// load dependencies of the defined class.\n  601 |     ///\n  602 |     /// This is the same as [`Self::define_class`] but takes a `&[jbyte]` instead of `&[u8]`.\n  603 |     ///\n  604 |     /// - Returns [`Error::ClassFormatError`] if the class data does not specify a valid class.\n  605 |     /// - Returns [`Error::ClassCircularityError`] if a class or interface would be its own\n  606 |     ///   superclass or superinterface.\n  607 |     /// - Returns [`Error::JniCall`] + [`JniError::NoMemory`] if the JVM reports running out of\n  608 |     ///   memory.\n  609 |     /// - Returns [`Error::SecurityViolation`] if the caller attempts to define a class in the\n  610 |     ///   `\"java\"` package tree.\n  611 |     ///\n  612 |     /// This API catches exceptions internally and is not expected to return\n  613 |     /// [`Error::JavaException`] (unless called while there is a pending exception).\n  614 |     ///\n  615 |     /// # Portability Note\n  616 |     ///\n  617 |     /// The JNI `DefineClass` function may not be supported by all JVM implementations, even though\n  618 |     /// it is part of the JNI specification.\n  619 |     ///\n  620 |     /// In particular Android's ART runtime does not support it, since all classes must be\n  621 |     /// pre-compiled into DEX format.\n  622 |     pub fn define_class_jbyte<'any_loader, N, L>(\n  623 |         &mut self,\n  624 |         name: Option<N>,\n  625 |         loader: L,\n  626 |         buf: cFieldID, JStaticMethodID,\n   20 |         JString, JThrowable, JValue, JValueOwned, ReleaseMode, TypeArray, Weak,\n   21 |     },\n   22 |     signature::{FieldSignature, JavaType, MethodSignature, Primitive},\n   23 |     strings::{JNIStr, MUTF8Chars},\n   24 |     sys::{\n   25 |         self, JNINativeMethod, jboolean, jbyte, jchar, jdouble, jfloat, jint, jlong, jshort, jsize,\n   26 |         jvalue,\n   27 |     },\n   28 | };\n   29 | use crate::{\n   30 |     errors::ErrorPolicy,\n   31 |     objects::{\n   32 |         Cast, JBooleanArray, JByteArray, JCharArray, JDoubleArray, JFloatArray, JIntArray,\n   33 |         JLongArray, JObjectArray, JPrimitiveArray, JShortArray, LoaderContext,\n   34 |         type_array_sealed::TypeArraySealed,\n   35 |     },\n   36 | };\n   37 | use crate::{objects::AsJArrayRaw, signature::ReturnType};\n   38 | \n   39 | use super::{AttachGuard, objects::Reference};\n   40 | \n   41 | #[cfg(doc)]\n   42 | use crate::{jni_str, objects::JThread, strings::JNIString};\n   43 | \n   44 | /// A non-transparent wrapper around a raw [`sys::JNIEnv`] pointer that provides\n   45 | /// safe access to the Java Native Interface (JNI) functions.\n   46 | ///\n   47 | /// Since [Env] is not a type that is publicly constructible, you must obtain a\n   48 | /// reference, either through a thread attachment, by upgrading an\n   49 | /// [`EnvUnowned`] within a native method, or via the (unsafe)\n   50 | /// [`AttachGuard::from_unowned`] APIs.\n   51 | ///\n   52 | /// See:\n   53 | /// - [`JavaVM::attach_current_thread`]\n   54 | /// - [`JavaVM::attach_current_thread_for_scope`]\n   55 | /// - [`JavaVM::with_local_frame`]\n   56 | /// - [`JavaVM::with_top_local_frame`]\n   57 | /// - [`EnvUnowned::with_env`]\n   58 | ///\n   59 | /// [Env] is a non-transparent wrapper that is not FFI-safe, so it must not be\n   60 | /// used to try and capture a raw [`sys::JNIEnv`] pointer passed to a native\n   61 | /// method.\n   62 | ///\n   63 | /// See [`EnvUnowned`] for a wrapper that is FFI-safe and can be used to capture\n   64 | /// a `sys::JNIEnv` pointer passed to a native method.\n   65 | ///\n   66 | /// # Overview of the API\n   67 | ///\n   68 | /// All the [`Env`] methods aim to follow the JNI specification naming closely\n   69 | /// enough to make it easier to map between the two. This means that method\n   70 | /// names, parameter types, and return types will generally be consistent with\n   71 | /// the JNI specification.\n   72 | ///\n   73 | /// JNI APIs that can logically be thought of as methods, such as\n   74 | /// `GetObjectArrayElement`, can be found as methods on the relevant Rust type,\n   75 | /// in this case [`JObjectArray::get_element`].\n   76 | ///\n   77 | /// # Exception handling\n   78 | ///\n   79 | /// Since we're calling into the JVM with this, many methods also have the\n   80 | /// potential to cause an exception to get thrown. If this is the case, an `Err`\n   81 | /// result will be returned with the error kind [`Error::JavaException`]. Note\n   82 | /// that this will _not_ clear the exception - it's up to the caller to decide\n   83 | /// whether to do so or to let it continue being thrown.\n   84 | ///\n   85 | /// # References and Lifetimes\n   86 | ///\n   87 | /// As in C JNI, interactions with Java objects happen through\n   88 | /// <dfn>references<\/dfn>, either local or global.\n   89 | ///\n   90 | /// This crate provides various safe wrappers around JNI references, such as\n   91 | /// [`JObject`], [`JClass`], [`JString`] and [`JList`] which all implement the\n   92 | /// [`Reference`] trait.\n   93 | ///\n   94 | /// By default these types represent <dfn>local references<\/dfn>, and they will\n   95 | /// be associated with a lifetime that names the local reference frame they\n   96 | /// belong to.\n   97 | ///\n   98 | /// So for example `JObject<'local_1>`  and  `JObject<'local_2>` are local\n   99 | /// reference that are owned by two different local reference frames and\n  100 | /// although they may both be usable from a higher stack frame, it's not\n  101 | /// possible to simply move ownership of a local reference from one local\n  102 | /// reference frame to another.\n  103 | ///\n  104 | /// A global reference can be represented by a [`Global`], which will wrap one\n  105 | /// of the above primitive reference types like `Global<JObject<'static>>`. In\n  106 | /// this case the `'static` lifetime indicates that the reference is not tied to\n  107 | /// a local reference frame and can be used from any thread.\n  108 | ///\n  109 | /// So long as there is at least one reference to a Java object, the JVM garbage\n  110 | /// collector will not reclaim it.\n  111 | ///\n  112 | /// <dfn>Global references<\/dfn> exist until deleted. Deletion occurs when the\n  113 | /// `Global` is dropped.\n  114 | ///\n  115 | /// <dfn>Local references<\/dfn> belong to a local reference frame, and exist\n  116 | /// until [deleted][Env::delete_local_ref] or until the local reference frame is\n  117 | /// exited. A new <dfn>local reference frame<\/dfn> is entered when a native\n  118 | /// method is called from Java, or when Rust code does so explicitly using\n  119 | /// [`Env::with_local_frame`]. That local reference frame is exited when the\n  120 | /// native method or `with_local_frame` returns. When a local reference frame is\n  121 | /// exited, all local references created inside it are deleted.\n  122 | ///\n  123 | /// Unlike C JNI, this crate creates a separate `Env` for each local reference\n  124 | /// frame. The associated Rust lifetime `'local` represents that local reference\n  125 | /// frame. Rust's borrow checker will ensure that local references are not used\n  126 | /// after their local reference frame exits (which would cause undefined\n  127 | /// behavior).\n  128 | ///\n  129 | /// Unlike global references, local references are not deleted when dropped by\n  130 | /// default. This is for performance: it is or::MethodNotFound`].\n  163 | ///   - Otherwise `null` is considered a valid Java reference and is represented\n  164 | ///     as [`JObject::null()`].\n  165 | ///\n  166 | /// ## A `&mut Env` represents the top JNI stack frame\n  167 | ///\n  168 | /// Each `Env<'local>` represents a single local reference frame in the JVM.\n  169 | ///\n  170 | /// A **mutable** `&mut Env` is special: it always represents the *current top*\n  171 | /// local reference frame on the JNI stack.\n  172 | ///\n  173 | /// * You need `&mut Env` when creating new local references, since those can\n  174 | ///   only be created in the top frame.\n  175 | /// * A shared `&Env` is fine for operations that don’t produce new local\n  176 | ///   references.\n  177 | ///\n  178 | /// If you only have a shared `&Env` but need to create temporary local\n  179 | /// references (that won’t escape the scope), you can materialize a new mutable\n  180 | /// handle to the top frame using:\n  181 | ///\n  182 | /// * [`Env::with_local_frame`] – pushes a new frame, returns a mutable `Env`\n  183 | ///   for it.\n  184 | /// * [`Env::with_top_local_frame`] – borrows a mutable `Env` for the existing\n  185 | ///   top frame without pushing a new one.\n  186 | ///\n  187 | /// If you don’t even have an `Env` (e.g. inside a `Drop` implementation), you\n  188 | /// can still get one via:\n  189 | ///\n  190 | /// * [`JavaVM::attach_current_thread`]\n  191 | /// * [`JavaVM::with_top_local_frame`] - if you can guarantee that the thread is\n  192 | ///   already attached, and you just need a handle to the existing top frame.\n  193 | ///\n  194 | /// (and you can access a [`JavaVM`] via [`JavaVM::singleton`]).\n  195 | ///\n  196 | /// These APIs are safe because they constrain the new [`Env`] lifetime to the\n  197 | /// scope of the call, so any references created cannot leak.\n  198 | ///\n  199 | /// ## Runtime Top Frame Checks\n  200 | ///\n  201 | /// Rust’s type system ensures that a mutable `Env<'local>` only produces\n  202 | /// references tied to its frame.\n  203 | ///\n  204 | /// Normally this crate also guarantees that a `&mut Env` represents the top\n  205 | /// frame.\n  206 | ///\n  207 | /// However, because the JVM is global and multiple crates may independently use\n  208 | /// jni-rs, some valid usage patterns can be misused to create multiple mutable\n  209 | /// `Env`s in the same scope. For example:\n  210 | ///\n  211 | /// ```rust,no_run\n  212 | /// # use jni::{JavaVM, errors::Result, objects::JString};\n  213 | /// # fn f(vm: &JavaVM) -> Result<()> {\n  214 | /// vm.attach_current_thread(|env1| -> Result<()> {\n  215 | ///     vm.attach_current_thread(|env2| -> Result<()> {\n  216 | ///         // env1 is still mutable, but no longer the top frame.\n  217 | ///         // This will panic at runtime:\n  218 | ///         JString::from_str(env1, \"not valid here\").unwrap();\n  219 | ///         Ok(())\n  220 | ///     })\n  221 | /// })\n  222 | /// # ; Ok(())\n  223 | /// # }\n  224 | /// ```\n  225 | ///\n  226 | /// To prevent unsoundness, this crate enforces a **runtime check**:\n  227 | ///\n  228 | /// * Creating a new local reference with a mutable `Env` that is *not* the top\n  229 | ///   frame will cause a panic.\n  230 | ///\n  231 | /// ### Rule of thumb\n  232 | ///\n  233 | /// * Keep only one `Env` in scope at a time.\n  234 | /// * Always shadow outer `env` variables when introducing a new one.\n  235 | ///\n  236 | /// As long as you follow this pattern, the type system will ensure that local\n  237 | /// references are only created from the valid top frame.\n  238 | ///\n  239 | /// ## Troubleshooting `cannot borrow as mutable`\n  240 | ///\n  241 | /// If a function takes two or more parameters, one of them is `Env`, and\n  242 | /// another is something returned by a `Env` method (like [`JObject`]), then\n  243 | /// calls to that function may not compile:\n  244 | ///\n  245 | /// ```rust,compile_fail\n  246 | /// # use jni::{jni_sig, jni_str, errors::Result, Env, objects::*};\n  247 | /// #\n  248 | /// # fn f(env: &mut Env) -> Result<()> {\n  249 | /// fn example_function(\n  250 | ///     env: &mut Env,\n  251 | ///     obj: &JObject,\n  252 | /// ) {\n  253 | ///     // ...\n  254 | /// }\n  255 | ///\n  256 | /// example_function(\n  257 | ///     env,\n  258 | ///     // ERROR: cannot borrow `*env` as mutable more than once at a time\n  259 | ///     &env.new_object(\n  260 | ///         jni_str!(\"com/example/SomeClass\"),\n  261 | ///         jni_sig!(\"()V\"),\n  262 | ///         &[],\n  263 | ///     )?,\n  264 | /// )\n  265 | /// # ; Ok(())\n  266 | /// # }\n  267 | /// ```\n  268 | ///\n  269 | /// This comes from the compiler needing to borrow `env` as mutable for the call\n  270 | /// to `new_object`, but also needing to borrow it as mutable for the call to\n  271 | /// `example_function`.\n  272 | ///\n  273 | /// In the past we used to recommend here that you could avoid this by\n  274 | /// reordering the parameters so that `Env` comes last, but in practice this led\n  275 | /// to very inconsistent APIs where some functions had `Env` first and some had\n  276 | /// it last, which was confusing.\n  277 | ///\n  278 | /// Now the recommendation is to just make sure that reference type arguments\n  279 | /// are derived before the call:\n  280 | ///\n  281 | /// ```rust,no_run\n  282 | /// # use jni::{jni_sig, jni_str, errors::Result, Env, objects::JObject};\n  283 | /// #\n  284 | /// # fn f(env: &mut Env) -> Result<()> {\n  285 | /// # fn example_function(\n  286 | /// #     env: &mut Env,\n  287 | /// #     obj: &JObject,\n  288 | /// # ) {\n  289 | /// #    // ...\n  290 | /// # }\n  291 | /// let obj = env.new_object(\n  292 | ///    jni_str!(\"com/example/SomeClass\"),\n  293 | ///    jni_sig!(\"()V\"),\n  294 | ///    &[],\n  295 | /// )?;\n  296 | /// example_function(env, &obj)\n  297 | /// # ; Ok(())\n  298 | /// # }\n  299 | /// ```\n  300 | ///\n  301 | /// Quite often reference type arguments have already been derived in some outer\n  302 | /// scope and don't involve any JNI method calls so this isn't too bad in\n  303 | /// practice and it keeps the APIs more consistent / predictable, with `Env`\n  304 | /// always coming first.\n  305 | ///\n  306 | /// # Checked and unchecked methods\n  307 | ///\n  308 | /// Some of the methods come in two versions: checked (e.g. `call_method`) and\n  309 | /// unchecked (e.g. `call_method_unchecked`). Under the hood, checked methods\n  310 | /// perform some checks to ensure the validity of provided signatures, names and\n  311 | /// arguments, and then call the corresponding unchecked method.\n  312 | ///\n  313 | /// Checked methods are more flexible as they allow passing class names and\n  314 | /// method/field descriptors as strings and may perform lookups of class objects\n  315 | /// and method/field ids for you, also performing all the needed precondition\n  316 | /// checks. However, these lookup operations are expensive, so if you need to\n  317 | /// call the same method (or access the same field) multiple times, it is\n  318 | /// [recommended](https://docs.oracle.com/en/java/javase/11/docs/specs/jni/design.html#accessing-fields-and-methods)\n  319 | /// to cache the instance of the class and the method/field id, e.g.\n  320 | ///   - in loops\n  321 | ///   - when calling the same Java callback repeatedly.\n  322 | ///\n  323 | /// If you do not cache references to classes and method/field ids, you will\n  324 | /// *not* benefit from the unchecked methods.\n  325 | ///\n  326 | /// Calling unchecked methods with invalid arguments and/or invalid class and\n  327 | /// method descriptors may lead to segmentation fault.\n  328 | ///\n  329 | /// # Zero-copy `AsRef<JNIStr>` arguments\n  330 | ///\n  331 | /// The JNI specification for many functions requires that string arguments are\n  332 | /// passed as NUL terminated, Modified UTF-8 encoded byte arrays.\n  333 | ///\n  334 | /// Anything that accepts an `AsRef<JNIStr>` can directly accept a `JNIStr`\n  335 | /// literal like `jni_str!(\"java/lang/String\")` which will be encoded as MUTF-8\n  336 | /// at compile time.\n  337 | ///\n  338 | /// See [jni_str!] for more details.\n  339 | ///\n  340 | /// For non-literal, dynamic strings then you can use [JNIString::new] to encode\n  341 | /// strings as MUTF-8 at runtime (derefs as [`JNIStr`]).\n  342 | ///\n  343 | #[derive(Debug)]\n  344 | pub struct Env<'local> {\n  345 |     /// A non-null JNIEnv pointer\n  346 |     pub(crate) raw: *mut sys::JNIEnv,\n  347 |     /// The current [`jni::AttachGuard`] nesting level, which we assert matches\n  348 |     /// the top/current nesting level whenever some API will return a new local\n  349 |     /// reference\n  350 |     pub(crate) level: usize,\n  351 |     owns_attachment: bool,\n  352 |     _lifetime: PhantomData<&'local ()>,\n  353 | }\n  354 | \n  355 | impl Drop for Env<'_> {\n  356 |     fn drop(&mut self) {\n  357 |         // NOOP - we just implement Drop so that the compiler won't consider\n  358 |         // Env to be FFI safe.\n  359 |     }\n  360 | }\n  361 | \n  362 | #[cfg(test)]\n  363 | mod test {\n  364 |     use crate::Env;\n  365 |     static_assertions::assert_not_impl_any!(Env: Send);\n  366 |     static_assertions::assert_not_impl_any!(Env: Sync);\n  367 | }\n  368 | \n  369 | impl<'local> Env<'local> {\n  370 |     /// Returns an `UnsupportedVersion` error if the current JNI version is\n  371 |     /// lower than the one given.\n  372 |     ///\n  373 |     /// Returns `JavaException` if called while there is a pending exception.\n  374 |     #[allow(unused)]\n  375 |     fn ensure_version(&self, version: JNIVersion) -> Result<()> {\n  376 |         if self.version()? < version {\n  377 |             Err(Error::UnsupportedVersion)\n  378 |         } else {\n  379 |             Ok(())\n  380 |         }\n  381 |     }\n  382 | \n  383 |     /// Create a raw [`crate::sys::JNIEnv`] pointer.\n 4840 |     ///\n 4841 |     /// It should be very uncommon to use this method directly, but could be\n 4842 |     /// useful if you are given a raw [`crate::sys::JNIEnv`] pointer that you\n 4843 |     /// know represents a valid JNI attachment for the current thread.\n 4844 |     ///\n 4845 |     /// If you are implementing a native method in Rust though, you should\n 4846 |     /// prefer to use the [`EnvUnowned`] type as the first argument to your\n 4847 |     /// native method and avoid the need to use a raw pointer.\n 4848 |     ///\n 4849 |     /// If you have a raw [`crate::sys::JNIEnv`] pointer, this API should be\n 4850 |     /// marginally safer than using [`crate::AttachGuard`] manually\n 4851 |     /// since the attach guard management will be hidden within the\n 4852 |     /// [`Self::with_env`] and [`Self::with_env_no_catch`] methods.\n 4853 |     ///\n 4854 |     /// Beware that [`Self::with_env`] and [`Self::with_env_no_catch`] will not\n 4855 |     /// create a new JNI stack frame, so if you are not implementing a native\n 4856 |     /// method with a JNI stack frame that will be cleaned up on return, you may\n 4857 |     /// need to consider the risk of leaking local references into the current\n 4858 |     /// stack frame (JNI references are only cleaned up when the stack frame is\n 4859 |     /// popped)\n 4860 |     ///\n 4861 |     /// # Safety\n 4862 |     ///\n 4863 |     /// The pointer must be a valid, non-null pointer to a `jni_sys::JNIEnv`\n 4864 |     /// that represents an attachment of the current thread to a Java VM.\n 4865 |     ///\n 4866 |     /// The assigned lifetime must not outlive the JNI stack frame that owns the\n 4867 |     /// `Env` pointer. For example it would _never_ be safe to use `'static`.\n 4868 |     pub unsafe fn from_raw(ptr: *mut jni_sys::JNIEnv) -> Self {\n 4869 |         assert!(!ptr.is_null(), \"EnvUnowned pointer must not be null\");\n 4870 |         Self {\n 4871 |
