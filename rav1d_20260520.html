in a constructor, or use `.expect(\"Picture invariant violated: ...\")` with a message that points to the bug.","locations":[{"ref":"src/rust_api.rs:336-447","code":"  336 | impl Picture {\n  337 |     /// Stride in pixels of the `component` for the decoded frame.\n  338 |     pub fn stride(&self, component: PlanarImageComponent) -> u32 {\n  339 |         let s = match component {\n  340 |             PlanarImageComponent::Y => 0,\n  341 |             _ => 1,\n  342 |         };\n  343 |         self.inner.stride[s].try_into().unwrap()\n  344 |     }\n  345 | \n  346 |     /// Plane data of the `component` for the decoded frame.\n  347 |     pub fn plane<'a>(&'a self, component: PlanarImageComponent) -> &'a [u8] {\n  348 |         let data = &self.inner.data.as_ref().unwrap().data;\n  349 |         let component = &data[component.as_index()];\n  350 |         let guard = component.slice::<BitDepth8, _>(..);\n  351 |         // SAFETY: [`Picture`] is only created after decoding is complete\n  352 |         // (in [`Decoder::get_picture`], which calls [`rav1d_get_picture`]).\n  353 |         // Thus, the decoder no longer writes to this data,\n  354 |         // and there are no other safe public ways to have a `&mut` to this data.\n  355 |         unsafe { guard.get_unchecked() }\n  356 |     }\n  357 | \n  358 |     /// Bit depth of the plane data.\n  359 |     ///\n  360 |     /// This returns 8 or 16 for the underlying integer type used for the plane data.\n  361 |     ///\n  362 |     /// Check [`Picture::bits_per_component`] for the number of bits that are used.\n  363 |     pub fn bit_depth(&self) -> usize {\n  364 |         self.inner.p.bpc.into()\n  365 |     }\n  366 | \n  367 |     /// Bits used per component of the plane data.\n  368 |     ///\n  369 |     /// Check [`Picture::bit_depth`] for the number of storage bits.\n  370 |     pub fn bits_per_component(&self) -> Option<BitsPerComponent> {\n  371 |         BitsPerComponent::from_hbd(self.inner.seq_hdr.as_ref().unwrap().hbd).ok()\n  372 |     }\n  373 | \n  374 |     /// Width of the frame.\n  375 |     pub fn width(&self) -> u32 {\n  376 |         self.inner.p.w.try_into().unwrap()\n  377 |     }\n  378 | \n  379 |     /// Height of the frame.\n  380 |     pub fn height(&self) -> u32 {\n  381 |         self.inner.p.h.try_into().unwrap()\n  382 |     }\n  383 | \n  384 |     /// Pixel layout of the frame.\n  385 |     pub fn pixel_layout(&self) -> PixelLayout {\n  386 |         self.inner.p.layout\n  387 |     }\n  388 | \n  389 |     /// Timestamp of the frame.\n  390 |     ///\n  391 |     /// This is the same timestamp as the one provided to [`Decoder::send_data`].\n  392 |     pub fn timestamp(&self) -> Option<i64> {\n  393 |         let ts = self.inner.m.timestamp;\n  394 |         if ts == i64::MIN {\n  395 |             None\n  396 |         } else {\n  397 |             Some(ts)\n  398 |         }\n  399 |     }\n  400 | \n  401 |     /// Duration of the frame.\n  402 |     ///\n  403 |     /// This is the same duration as the one provided to [`Decoder::send_data`] or `0` if none was\n  404 |     /// provided.\n  405 |     pub fn duration(&self) -> i64 {\n  406 |         self.inner.m.duration\n  407 |     }\n  408 | \n  409 |     /// Offset of the frame.\n  410 |     ///\n  411 |     /// This is the same offset as the one provided to [`Decoder::send_data`] or `-1` if none was\n  412 |     /// provided.\n  413 |     pub fn offset(&self) -> i64 {\n  414 |         self.inner.m.offset\n  415 |     }\n  416 | \n  417 |     /// Chromaticity coordinates of the source colour primaries.\n  418 |     pub fn color_primaries(&self) -> pixel::ColorPrimaries {\n  419 |         self.inner.seq_hdr.as_ref().unwrap().pri.into()\n  420 |     }\n  421 | \n  422 |     /// Transfer characteristics function.\n  423 |     pub fn transfer_characteristic(&self) -> pixel::TransferCharacteristic {\n  424 |         self.inner.seq_hdr.as_ref().unwrap().trc.into()\n  425 |     }\n  426 | \n  427 |     /// Matrix coefficients used in deriving luma and chroma signals from the\n  428 |     /// green, blue and red or X, Y and Z primaries.\n  429 |     pub fn matrix_coefficients(&self) -> pixel::MatrixCoefficients {\n  430 |         self.inner\n  431 |             .seq_hdr\n  432 |             .as_ref()\n  433 |             .unwrap()\n  434 |             .mtrx\n  435 |             .try_into()\n  436 |             .unwrap()\n  437 |     }\n  438 | \n  439 |     /// YUV color range.\n  440 |     pub fn color_range(&self) -> pixel::YUVRange {\n  441 |         self.inner.seq_hdr.as_ref().unwrap().color_range.into()\n  442 |     }\n  443 | \n  444 |     /// Sample position for subsampled chroma.\n  445 |     pub fn chroma_location(&self) -> Option<pixel::ChromaLocation> {\n  446 |         self.inner.seq_hdr.as_ref().unwrap().chr.try_into().ok()\n  447 |     }"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","description":"`SubAssign<isize> for WithOffset` computes `-rhs` directly. When `rhs == isize::MIN`, the unary negation overflows and panics in debug (silently wraps in release). Similarly `Sub<isize>` delegates to this. Practically `rhs` comes from buffer arithmetic and is bounded, but this is still unguarded.","fix":"Use `self.offset = self.offset.wrapping_add_signed(rhs.wrapping_neg());` so the overflow path mirrors `AddAssign<isize>` instead of panicking.","locations":[{"ref":"src/with_offset.rs:48-58","code":"   48 | }\n   49 | \n   50 | impl<T> SubAssign<isize> for WithOffset<T> {\n   51 |     #[cfg_attr(debug_assertions, track_caller)]\n   52 |     fn sub_assign(&mut self, rhs: isize) {\n   53 |         self.offset = self.offset.wrapping_add_signed(-rhs);\n   54 |     }\n   55 | }\n   56 | \n   57 | impl<T> Add<usize> for WithOffset<T> {\n   58 |     type Output = Self;"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`InRange::const_new` validates the value via `value as u128 >= MIN && value as u128 <= MAX`. For signed integer types, negative values sign-extend when cast to `u128` (e.g., `-1 as u128 == u128::MAX`), so any negative value silently passes any range check that includes the upper end of u128. The `impl_const_new!` macro is instantiated for `i8`/`i16`/`i32`/`i64`/`i128`, so the asserted range is meaningless for negative inputs. While no current callers use signed `InRange`, the API would silently accept out-of-range values.","fix":"Split the macro into signed/unsigned variants, or compare against signed bounds (e.g., for signed `$T`, perform `assert!(value >= MIN as $T && value <= MAX as $T);` using i128 const arithmetic, or take MIN/MAX as i128 const-generics).","locations":[{"ref":"src/in_range.rs:60-95","code":"   60 | {\n   61 |     fn fmt(&self, f: &mut Formatter) -> fmt::Result {\n   62 |         write!(f, \"{}\", self.0)\n   63 |     }\n   64 | }\n   65 | \n   66 | macro_rules! impl_const_new {\n   67 |     ($T:ty) => {\n   68 |         impl<const MIN: u128, const MAX: u128> DefaultValue for InRange<$T, MIN, MAX> {\n   69 |             const DEFAULT: Self = Self(0);\n   70 |         }\n   71 | \n   72 |         impl<const MIN: u128, const MAX: u128> InRange<$T, MIN, MAX> {\n   73 |             #[allow(unused)]\n   74 |             pub const fn const_new(value: $T) -> Self {\n   75 |                 assert!(value as u128 >= MIN && value as u128 <= MAX);\n   76 |                 Self(value)\n   77 |             }\n   78 | \n   79 |             #[allow(unused)]\n   80 |             pub const fn new_array<const N: usize>(a: [$T; N]) -> [Self; N] {\n   81 |                 let mut b = [DefaultValue::DEFAULT; N];\n   82 |                 const_for!(i in 0..N => {\n   83 |                     b[i] = Self::const_new(a[i]);\n   84 |                 });\n   85 |                 b\n   86 |             }\n   87 |         }\n   88 | \n   89 |         impl<const N: usize, const MIN: u128, const MAX: u128> DefaultValue for [InRange<$T, MIN, MAX>; N] {\n   90 |             const DEFAULT: Self = [DefaultValue::DEFAULT; N];\n   91 |         }\n   92 |     };\n   93 | }\n   94 | \n   95 | impl_const_new!(u8);"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`MemPool::pop_init` returns a recycled buffer without re-initializing it to `init_value` when `size <= buf.len()`. The function name and doc comment promise initialization (e.g. zeroing), but recycled buffers still contain whatever bytes the previous user wrote (e.g., decoded pixel data). Callers like `dav1d_default_picture_alloc` request `pop_init(pic_cap, 0)` expecting zeroed memory; they get stale pixel data instead. Currently safe because AV1 decoding overwrites the full picture before reading, but any future caller that reads before fully writing would observe wrong data.","fix":"Either document that `pop_init` only initializes freshly allocated buffers (rename to `pop_or_init` for clarity) and audit callers, or call `buf.fill(init_value)` (or `buf[..size].fill(init_value)`) before returning the recycled buffer.","locations":[{"ref":"src/pool.rs:31-42","code":"   31 |     pub fn pop_init(&self, size: usize, init_value: T) -> Vec<T>\n   32 |     where\n   33 |         T: Copy,\n   34 |     {\n   35 |         if let Some(buf) = self.bufs.lock().pop() {\n   36 |             if size <= buf.len() {\n   37 |                 return buf;\n   38 |             }\n   39 |         }\n   40 |         // TODO fallible allocation\n   41 |         vec![init_value; size]\n   42 |     }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `add_temporal_candidate`, the line computes `((mv.x - gmv[0].x).abs() | (mv.y - gmv[0].y).abs() >= 16) as i32`. `mv.x` and `gmv[0].x` are `i16`; their difference is computed in `i16` and `.abs()` panics if the difference is `i16::MIN` (e.g. `-32768 - 0`). Although the surrounding MV-clamping logic generally keeps differences smaller than 16384, a `Mv::INVALID` sentinel (`0x8000` = `-32768`) passing through as `gmv[0]` would trigger the panic in debug builds.","fix":"Cast to `i32` before subtracting: `((mv.x as i32 - gmv[0].x as i32).abs() | (mv.y as i32 - gmv[0].y as i32).abs() >= 16) as i32`. dav1d's C version operates on `int`, not `int16_t`.","locations":[{"ref":"src/refmvs.rs:720-730","code":"  720 |     );\n  721 |     fix_mv_precision(frame_hdr, &mut mv);\n  722 | \n  723 |     let last = *cnt;\n  724 |     if r#ref.r#ref[1] == -1 {\n  725 |         if let Some((globalmv_ctx, gmv)) = globalmv {\n  726 |             *globalmv_ctx = ((mv.x - gmv[0].x).abs() | (mv.y - gmv[0].y).abs() >= 16) as i32;\n  727 |         }\n  728 | \n  729 |         for cand in &mut mvstack[..last] {\n  730 |             if cand.mv.mv[0] == mv {"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"low","description":"When ref and current sizes match, `f.svc[i][1].scale` is assigned `0` and then `f.svc[i][0].scale = f.svc[i][1].scale` (reading the just-written zero). The intent is to zero both fields. The current result is correct, but writing this as assign-then-copy-from-sibling (with operands transposed relative to the non-trivial scale branch immediately above) is misleading — a future edit that swaps the order or changes only one line will silently leave one of the two fields stale.","fix":"Write the two zeroings explicitly and independently: `f.svc[i][0].scale = 0; f.svc[i][1].scale = 0;`.","locations":[{"ref":"src/decode.rs:4996-4999","code":" 4996 |             } else {\n 4997 |                 f.svc[i][1].scale = 0;\n 4998 |                 f.svc[i][0].scale = f.svc[i][1].scale;\n 4999 |             }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`OptionError::err_or` has the opposite semantics of `Option::ok_or`: `Some(e) -> Err(e)`, `None -> Ok(ok)`. Neither the trait name, the method name, nor any doc comment communicates this; the API reads exactly like `Option::ok_or` at a glance. A future maintainer reaching for it without re-reading the implementation is likely to introduce a subtle bug that compiles cleanly.","fix":"Add a `///` doc comment explaining the inverted semantics, and rename to something less confusable (e.g. `Option<E>::into_err_result(ok: T) -> Result<T, E>`).","locations":[{"ref":"src/extensions.rs:1-13","code":"    1 | pub trait OptionError<E> {\n    2 |     fn err_or<T>(self, ok: T) -> Result<T, E>;\n    3 | }\n    4 | \n    5 | impl<E> OptionError<E> for Option<E> {\n    6 |     #[inline]\n    7 |     fn err_or<T>(self, ok: T) -> Result<T, E> {\n    8 |         match self {\n    9 |             Some(e) => Err(e),\n   10 |             None => Ok(ok),\n   11 |         }\n   12 |     }\n   13 | }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`generate_scaling` writes `(by + (d >> 16)) as u8` without clipping. dav1d's C equivalent uses `iclip(by + (d >> 16), 0, 255)` (since the result is read by downstream film-grain code that expects values in `0..=255`). Because film-grain points come from a parsed bitstream with limited range, `as u8` and `iclip(_, 0, 255)` agree for valid input, but a malformed bitstream that pushes the linear interpolation outside `[0, 255]` will silently wrap modulo 256 instead of saturating.","fix":"Use `clip(by + (d >> 16), 0, 255) as u8` (or the existing `iclip`) to match dav1d's saturating behaviour.","locations":[{"ref":"src/fg_apply.rs:38-44","code":"   38 |         let delta = dy * ((0x10000 + (dx >> 1)) / dx) as isize;\n   39 |         let mut d = 0x8000;\n   40 |         for x in 0..dx {\n   41 |             scaling[bx + x << shift_x] = (by + (d >> 16)) as u8;\n   42 |             d += delta;\n   43 |         }\n   44 |     }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`IntraEdge::init` uses `EdgeIndex::pop_front`, which does `wrapping_add(1)` on a `u8` index. When `N_TIP == 256` (the sb128 case), the final post-increment wraps to 0, and the post-loop assertion `assert!(indices.tip.index == self.tip.len() as u8)` only passes because `self.tip.len() as u8` also truncates 256 to 0. The assert thus doesn't actually verify completion correctly. If anything ever pushes N_TIP slightly above 256, the wrap masks the bug rather than catching it.","fix":"Store `EdgeIndex.index` as `u16` (or `usize`) and use checked/non-wrapping addition, or change the post-loop check to `assert!(indices.tip.index as usize == self.tip.len())`.","locations":[{"ref":"src/intra_edge.rs:75-100","code":"   75 | #[derive(Clone, Copy)]\n   76 | pub struct EdgeIndex {\n   77 |     index: u8,\n   78 |     kind: EdgeKind,\n   79 | }\n   80 | \n   81 | impl EdgeIndex {\n   82 |     pub const fn root() -> Self {\n   83 |         Self {\n   84 |             index: 0,\n   85 |             kind: EdgeKind::Branch,\n   86 |         }\n   87 |     }\n   88 | \n   89 |     #[must_use]\n   90 |     pub const fn pop_front(mut self) -> (Self, Self) {\n   91 |         let front = self;\n   92 |         self.index = self.index.wrapping_add(1);\n   93 |         (front, self)\n   94 |     }\n   95 | }\n   96 | \n   97 | #[repr(C)]\n   98 | pub struct EdgeNode {\n   99 |     pub o: EdgeFlags,\n  100 |     pub h: [EdgeFlags; 2],"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`level_index` in `intra_edge.rs` uses `usize` internally (`level_size` and `index` are `usize`) and then casts the result `as u8`. With `level > ~4`, `level_size *= B (=4)` grows quickly and `index` may exceed 255 silently. The function is currently called only with `level in 0..=4`, but there is no `debug_assert!(level <= 4)` or compile-time guard, and the silent `as u8` truncation could mask future bugs if a larger level is introduced (e.g., for new sb sizes).","fix":"Either return `usize` (and convert at the use site with an explicit check), or add `assert!(level <= 4)` at the top to make the invariant explicit and panic loudly in debug.","locations":[{"ref":"src/intra_edge.rs:205-225","code":"  205 | struct IntraEdge<const SB128: bool, const N_BRANCH: usize, const N_TIP: usize> {\n  206 |     branch: [EdgeBranch; N_BRANCH],\n  207 |     tip: [EdgeTip; N_TIP],\n  208 | }\n  209 | \n  210 | const fn level_index(mut level: u8) -> u8 {\n  211 |     let mut level_size = 1;\n  212 |     let mut index = 0;\n  213 |     while level > 0 {\n  214 |         index += level_size;\n  215 |         level_size *= B;\n  216 |         level -= 1;\n  217 |     }\n  218 |     index as u8\n  219 | }\n  220 | \n  221 | impl<const SB128: bool, const N_BRANCH: usize, const N_TIP: usize>\n  222 |     IntraEdge<SB128, N_BRANCH, N_TIP>\n  223 | {\n  224 |     #[must_use]\n  225 |     const fn init_mode_node("}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Rav1dChromaSamplePosition::from_repr(gb.get_bits(2) as usize).unwrap()` accepts the reserved codepoint 3 (`_Reserved`) and returns it as a valid chroma position. The AV1 spec marks 3 as reserved. Downstream `Picture::chroma_location` handles it by returning `None`, but the parser silently propagates it into every Rav1dSequenceHeader rather than rejecting it under `strict_std_compliance`.","fix":"Under `strict_std_compliance`, return `Err(Rav1dError::InvalidArgument)` when the parsed value is 3; otherwise fall back to `Unknown`.","locations":[{"ref":"src/obu.rs:432-437","code":"  432 |         }\n  433 |         chr = if ss_hor & ss_ver != 0 {\n  434 |             Rav1dChromaSamplePosition::from_repr(gb.get_bits(2) as usize).unwrap()\n  435 |         } else {\n  436 |             Rav1dChromaSamplePosition::Unknown\n  437 |         };"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Operator precedence in `1 << seqhdr.order_hint_n_bits - 1` and similar shift/mask expressions in OBU header parsing happens to match the spec because Rust binds `-`/`+` tighter than `<<` and `&`. The lack of parens makes the expressions extremely brittle. Additionally, `seqhdr.order_hint_n_bits - 1` underflows `u8` when `order_hint_n_bits == 0`; today the path is gated by `frame_ref_short_signaling != 0` (transitively gated on `order_hint != 0`), but the gating is far away and easy to lose in a refactor.","fix":"Add explicit parens (e.g. `1 << (seqhdr.order_hint_n_bits - 1)` and `(frame_id + (1u32 << n) - delta) & ((1u32 << n) - 1)`), and use `checked_sub` for the underflow-prone subtractions.","locations":[{"ref":"src/obu.rs:686-686","code":"  686 |         let current_frame_offset = 1 << seqhdr.order_hint_n_bits - 1;"},{"ref":"src/obu.rs:791-792","code":"  791 |             let ref_frame_id = frame_id + (1 << seqhdr.frame_id_n_bits) - delta_ref_frame_id\n  792 |                 & (1 << seqhdr.frame_id_n_bits) - 1;"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`parse_tiling` hard-codes `min_log2_rows: 0` in the returned struct, even though it computes a local `min_log2_rows = min_log2_tiles.saturating_sub(log2_cols)` inside the uniform branch and dav1d's C version stores this value in the same struct field. A TODO comment already flags this. The field is currently unread inside the Rust port but is exposed across the C ABI as `Dav1dFrameHeaderTiling.min_log2_rows`; external readers see 0 instead of the actual minimum.","fix":"Hoist `min_log2_rows` out of the uniform branch (compute it in both branches) and assign it to the struct field instead of `0`.","locations":[{"ref":"src/obu.rs:907-923","code":"  907 |     debug.post(gb, \"tiling\");\n  908 |     Ok(Rav1dFrameHeaderTiling {\n  909 |         uniform,\n  910 |         n_bytes,\n  911 |         min_log2_cols,\n  912 |         max_log2_cols,\n  913 |         log2_cols,\n  914 |         cols,\n  915 |         // TODO(kkysen) Never written or read in C; is this correct?\n  916 |         min_log2_rows: 0,\n  917 |         max_log2_rows,\n  918 |         log2_rows,\n  919 |         rows,\n  920 |         col_start_sb,\n  921 |         row_start_sb,\n  922 |         update,\n  923 |     })"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`parse_tile_grp` validates `hdr.start == state.n_tiles` and `hdr.start <= hdr.end` but never enforces `hdr.end < cols * rows`. AV1 spec 6.10.1 requires `tg_end <= NumTiles - 1`. Because `n_bits = log2_cols + log2_rows` can encode values larger than `cols * rows - 1` whenever cols or rows is not a power of two, a malicious bitstream can advance `state.n_tiles` past `cols * rows`, so the submission gate `state.n_tiles == cols * rows` never fires and subsequent tile groups accumulate in `state.tiles` without ever rendering.","fix":"Also reject `hdr.end >= (tiling.cols as i32) * (tiling.rows as i32)` at the same point we already validate `hdr.start`.","locations":[{"ref":"src/obu.rs:2179-2222","code":" 2179 |     fn parse_tile_grp(\n 2180 |         state: &mut Rav1dState,\n 2181 |         r#in: &CArc<[u8]>,\n 2182 |         props: &Rav1dDataProps,\n 2183 |         gb: &mut GetBits,\n 2184 |     ) -> Rav1dResult {\n 2185 |         let hdr = parse_tile_hdr(\n 2186 |             &state\n 2187 |                 .frame_hdr\n 2188 |                 .as_ref()\n 2189 |                 .ok_or(Rav1dError::InvalidArgument)?\n 2190 |                 .tiling,\n 2191 |             gb,\n 2192 |         );\n 2193 |         // Align to the next byte boundary and check for overrun.\n 2194 |         gb.bytealign();\n 2195 |         if gb.has_error() != 0 {\n 2196 |             return Err(Rav1dError::InvalidArgument);\n 2197 |         }\n 2198 | \n 2199 |         let mut data = r#in.clone();\n 2200 |         data.slice_in_place(gb.byte_pos()..);\n 2201 |         data.slice_in_place(..gb.remaining_len());\n 2202 |         // Ensure tile groups are in order and sane; see 6.10.1.\n 2203 |         if hdr.start > hdr.end || hdr.start != state.n_tiles {\n 2204 |             state.tiles.clear();\n 2205 |             state.n_tiles = 0;\n 2206 |             return Err(Rav1dError::InvalidArgument);\n 2207 |         }\n 2208 |         if let Err(_) = state.tiles.try_reserve_exact(1) {\n 2209 |             return Err(Rav1dError::InvalidArgument);\n 2210 |         }\n 2211 |         state.n_tiles += 1 + hdr.end - hdr.start;\n 2212 |         state.tiles.push(Rav1dTileGroup {\n 2213 |             data: Rav1dData {\n 2214 |                 data: Some(data),\n 2215 |                 // TODO(kkysen) Are props needed here?\n 2216 |                 // Also, if it's not needed, we don't need the `Option` for `CArc<[u8]>` either.\n 2217 |                 m: props.clone(),\n 2218 |             },\n 2219 |             hdr,\n 2220 |         });\n 2221 | \n 2222 |         Ok(())"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`check_trailing_bits` only validates the trailing-one marker and zero padding when `strict_std_compliance` is `true`. In non-strict mode (the default) it consumes the supposed trailing bit and returns `Ok(())` regardless of value. This silently accepts malformed OBUs and also masks off-by-one bugs in our own parsing (which would otherwise consume the wrong number of bits and fail this check).","fix":"Always evaluate `!trailing_one_bit || gb.pending_bits() != 0` and at least log a warning in non-strict mode (only error in strict mode), matching dav1d's tolerant-but-loud behaviour.","locations":[{"ref":"src/obu.rs:85-107","code":"   85 | fn check_trailing_bits(gb: &mut GetBits, strict_std_compliance: bool) -> Rav1dResult {\n   86 |     let trailing_one_bit = gb.get_bit();\n   87 | \n   88 |     if gb.has_error() != 0 {\n   89 |         return Err(Rav1dError::InvalidArgument);\n   90 |     }\n   91 | \n   92 |     if !strict_std_compliance {\n   93 |         return Ok(());\n   94 |     }\n   95 | \n   96 |     if !trailing_one_bit || gb.pending_bits() != 0 {\n   97 |         return Err(Rav1dError::InvalidArgument);\n   98 |     }\n   99 | \n  100 |     gb.bytealign();\n  101 | \n  102 |     if gb.get_bytes(gb.remaining_len()).iter().any(|&b| b != 0) {\n  103 |         return Err(Rav1dError::InvalidArgument);\n  104 |     }\n  105 | \n  106 |     Ok(())\n  107 | }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"When `color_description_present` is set, `pri`, `trc`, `mtrx` are parsed via `gb.get_bits(8).try_into().unwrap_or_default()`. Out-of-range / reserved colorimetry codepoints silently default to `Unspecified` (etc.). The defaulted values are then used later to decide whether to force `I444` layout and validate `hbd`, so an attacker can change layout-validation behaviour by setting `mtrx` to a reserved codepoint.","fix":"In strict mode, propagate the conversion error as `Rav1dError::UnsupportedBitstream`; in non-strict mode, log a warning when defaulting.","locations":[{"ref":"src/obu.rs:354-366","code":"  354 |     let color_description_present = gb.get_bit();\n  355 |     let pri;\n  356 |     let trc;\n  357 |     let mtrx;\n  358 |     if color_description_present {\n  359 |         pri = gb.get_bits(8).try_into().unwrap_or_default();\n  360 |         trc = gb.get_bits(8).try_into().unwrap_or_default();\n  361 |         mtrx = gb.get_bits(8).try_into().unwrap_or_default();\n  362 |     } else {\n  363 |         pri = Default::default();\n  364 |         trc = Default::default();\n  365 |         mtrx = Default::default();\n  366 |     }"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","description":"The `Sync` impl for `StableRef<T>` requires `T: Send` instead of `T: Sync`. The doc comment correctly says it should require `T: Sync`, but the bound was copy-pasted from the `Send` impl. This is unsound: `StableRef<T>` is essentially a raw pointer wrapper that yields `&T` via `as_ref()` in `CArc::as_ref`. If a non-`Sync` but `Send` type (e.g., `Cell<u32>`) is ever stored, `&CArc<T>` (which is `Sync` via this bound) could be shared across threads, allowing simultaneous `&T` access from multiple threads which violates `T`'s non-`Sync` contract.","fix":"Change to `unsafe impl<T: Sync + ?Sized> Sync for StableRef<T> {}` to match the documented safety justification.","locations":[{"ref":"src/c_arc.rs:73-74","code":"   73 | /// SAFETY: [`StableRef`]`<T>`, if it follows its safety guarantees, is essentially a `&T`/`&mut T`, which is [`Sync`] if `T: `[`Sync`].\n   74 | unsafe impl<T: Send + ?Sized> Sync for StableRef<T> {}"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"`MemPool::pop_init` discards a popped buffer if its length is less than the requested `size`, instead of growing or re-pushing it. In contrast, `_pop` (`pop`) reserves additional capacity on the popped buffer. The popped `Vec<T>` is dropped silently (its allocation is freed, not leaked, but the pool loses the cached buffer), which defeats the purpose of pooling. Worse, when buffer sizes vary (e.g., resolution changes), the pool can repeatedly throw away buffers it could have reused after reallocation, causing allocator churn on the hot frame-decoding path.","fix":"On the cold path where `size > buf.len()`, either grow the buffer with `buf.resize(size, init_value)` and return it, or push it back into the pool before allocating a fresh `vec![init_value; size]`.","locations":[{"ref":"src/pool.rs:31-42","code":"   31 |     pub fn pop_init(&self, size: usize, init_value: T) -> Vec<T>\n   32 |     where\n   33 |         T: Copy,\n   34 |     {\n   35 |         if let Some(buf) = self.bufs.lock().pop() {\n   36 |             if size <= buf.len() {\n   37 |                 return buf;\n   38 |             }\n   39 |         }\n   40 |         // TODO fallible allocation\n   41 |         vec![init_value; size]\n   42 |     }"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"`CBox::drop` calls `drop_in_place(ptr)` and then `free.free(ptr)`. If the inner `T`'s destructor panics in `drop_in_place`, unwinding skips `free.free(ptr)` and the underlying C allocation is leaked. For long-lived decoders this can be exploited (e.g., panic during destruction of an iterator-of-allocations) to exhaust memory.","fix":"Wrap `drop_in_place` in a guard struct whose own `Drop` calls `free.free(ptr)`, or use `scopeguard::defer!` to ensure the C `free` runs even if Rust drop panics.","locations":[{"ref":"src/c_box.rs:101-113","code":"  101 | impl<T: ?Sized> Drop for CBox<T> {\n  102 |     fn drop(&mut self) {\n  103 |         let Self { data, free } = self;\n  104 |         let ptr = data.pointer.as_ptr();\n  105 |         // SAFETY: See below.\n  106 |         // The [`FnFree`] won't run Rust's `fn drop`,\n  107 |         // so we have to do this ourselves first.\n  108 |         unsafe { drop_in_place(ptr) };\n  109 |         let ptr = ptr.cast();\n  110 |         // SAFETY: See safety docs on [`Self::data`] and [`Self::from_c`].\n  111 |         unsafe { free.free(ptr) }\n  112 |     }\n  113 | }"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"`reset_task_cur_async` performs a `ttd.reset_task_cur.swap(frame_idx, ...)` and then later a `compare_exchange(frame_idx, u32::MAX)`. Between the swap and the compare_exchange, another thread can call `reset_task_cur` (the sync version) which also swaps `reset_task_cur` to `u32::MAX`. The compare_exchange will then fail silently, but more importantly, the `if frame_idx == first && ttd.first.load(...) != first` check at line 129 is a TOCTOU: `first` may change again between the load on line 117 and line 129, leaving the `reset_task_cur` field set to a stale frame index that's now less than `first`, which propagates wrong reset semantics across worker threads.","fix":"Either guard reset_task_cur_async with the ttd.lock mutex (matching reset_task_cur), or restructure to load `first` once and use a CAS loop that re-reads `first` if it changes.","locations":[{"ref":"src/thread_task.rs:116-137","code":"  116 | fn reset_task_cur_async(ttd: &TaskThreadData, mut frame_idx: c_uint, n_frames: c_uint) {\n  117 |     let first = ttd.first.load(Ordering::SeqCst);\n  118 |     if frame_idx < first {\n  119 |         frame_idx += n_frames;\n  120 |     }\n  121 |     let mut last_idx = frame_idx;\n  122 |     loop {\n  123 |         frame_idx = last_idx;\n  124 |         last_idx = ttd.reset_task_cur.swap(frame_idx, Ordering::SeqCst);\n  125 |         if !(last_idx < frame_idx) {\n  126 |             break;\n  127 |         }\n  128 |     }\n  129 |     if frame_idx == first && ttd.first.load(Ordering::SeqCst) != first {\n  130 |         let _ = ttd.reset_task_cur.compare_exchange(\n  131 |             frame_idx,\n  132 |             u32::MAX,\n  133 |             Ordering::SeqCst,\n  134 |             Ordering::SeqCst,\n  135 |         );\n  136 |     }\n  137 | }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"`Rav1dTasks::clear` stores `head` with `Ordering::Relaxed`, but every other access to `head` uses `Ordering::SeqCst`. Mixing Relaxed stores with SeqCst loads breaks the SeqCst total order: a worker thread reading `head` with SeqCst may observe a stale non-None value after `clear` ran, then index into `self.tasks` which `clear` just emptied, causing a panic via the `try_read().unwrap()[index]` in `Self::index`.","fix":"Use `Ordering::SeqCst` (matching all other head accesses) in `clear`, or use `Ordering::Release` paired with `Acquire` loads. The asymmetry serves no purpose.","locations":[{"ref":"src/thread_task.rs:259-265","code":"  259 |     pub fn clear(&self) {\n  260 |         self.tasks.try_write().unwrap().clear();\n  261 |         self.pending_tasks.try_lock().unwrap().clear();\n  262 |         self.pending_tasks_merge.store(false, Ordering::SeqCst);\n  263 |         self.head.store(Default::default(), Ordering::Relaxed);\n  264 |         self.cur_prev.set(Default::default());\n  265 |     }"}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"low","description":"`merge_pending_frame` reads `self.head` with `Ordering::Relaxed` while every other reader uses `Ordering::SeqCst`. Inside the write lock for `tasks` this is mostly benign (the held lock provides synchronization), but the `if head.is_none()` decision drives a `tasks.clear()` that destroys data indexed by `head`. A Relaxed read here can theoretically observe a None that was already overwritten by another thread's SeqCst store, leading to data loss when `tasks` is cleared.","fix":"Use `Ordering::SeqCst` (or at minimum `Acquire`) for the `head.load` at line 307, matching all other accesses to `head`.","locations":[{"ref":"src/thread_task.rs:300-322","code":"  300 |     #[inline]\n  301 |     fn merge_pending_frame(&self, c: &Rav1dContext) -> bool {\n  302 |         let merge = self.pending_tasks_merge.swap(false, Ordering::SeqCst);\n  303 |         if merge {\n  304 |             let mut pending_tasks = self.pending_tasks.lock();\n  305 |             let range = {\n  306 |                 let mut tasks = self.tasks.try_write().unwrap();\n  307 |                 if self.head.load(Ordering::Relaxed).is_none() {\n  308 |                     tasks.clear();\n  309 |                 }\n  310 |                 let start = tasks.len() as u32;\n  311 |                 tasks.extend(pending_tasks.drain(..));\n  312 |                 start..tasks.len() as u32\n  313 |             };\n  314 | \n  315 |             for i in range {\n  316 |                 // 1-based index, so we have to add 1\n  317 |                 let task_idx = Rav1dTaskIndex(NonZeroU32::new(i + 1));\n  318 |                 self.insert_tasks(c, task_idx, task_idx, 0);\n  319 |             }\n  320 |         }\n  321 |         merge\n  322 |     }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The local macros named `update_cdf_1d!` / `update_cdf_2d!` / `update_cdf_3d!` / `update_cdf_4d!` do not actually update CDFs — they only zero a single count cell at index `n_symbols` (e.g. `update_cdf_1d!(N, m.skip)` expands to `dst.m.skip[N] = 0`). The real CDF data is copied via the explicit `dst.coef = src.coef.clone()` / `dst.m = src.m.clone()` / etc. preceding the macro calls. The misleading names make the routine harder to audit.","fix":"Rename to `reset_count_1d!` / `reset_count_2d!` / etc., or add a doc comment to each macro explaining that they zero a single count cell, not a full CDF.","locations":[{"ref":"src/cdf.rs:4946-4974","code":" 4946 |     macro_rules! update_cdf_1d {\n 4947 |         ($n1d:expr, $($name:tt)+) => {\n 4948 |             dst.$($name)+[$n1d] = 0\n 4949 |         }\n 4950 |     }\n 4951 | \n 4952 |     macro_rules! update_cdf_2d {\n 4953 |         ($n1d:expr, $n2d:expr, $($name:tt)+) => {\n 4954 |             for j in 0..$n1d {\n 4955 |                 update_cdf_1d!($n2d, $($name)+[j]);\n 4956 |             }\n 4957 |         }\n 4958 |     }\n 4959 | \n 4960 |     macro_rules! update_cdf_3d {\n 4961 |         ($n1d:expr, $n2d:expr, $n3d:expr, $($name:tt)+) => {\n 4962 |             for k in 0..$n1d {\n 4963 |                 update_cdf_2d!($n2d, $n3d, $($name)+[k]);\n 4964 |             }\n 4965 |         }\n 4966 |     }\n 4967 | \n 4968 |     macro_rules! update_cdf_4d {\n 4969 |         ($n1d:expr, $n2d:expr, $n3d:expr, $n4d:expr, $($name:tt)+) => {\n 4970 |             for l in 0..$n1d {\n 4971 |                 update_cdf_3d!($n2d, $n3d, $n4d, $($name)+[l]);\n 4972 |             }\n 4973 |         }\n 4974 |     }"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Inline comment `/*42*/` next to value `41` is stale. The `base_tok` array dimension is 41 in both the Rust type (`Align8<[[[[u16; 4]; 41]; 2]; 5]>`) and in dav1d C (`uint16_t base_tok[N_TX_SIZES][2][41][4]`), so the `/*42*/` annotation contradicts the actual value being used. The same `/*22*/` annotation appears on line 4989 next to value 11 (where dav1d's array dimension is 11). These stale annotations suggest a memory of older array sizes and risk misleading readers about correctness.","fix":"Remove the stale inline comments so the lines read `update_cdf_4d!(TxfmSize::NUM_SQUARE, 2, 41, 3, coef.base_tok);` and `update_cdf_4d!(TxfmSize::NUM_SQUARE, 2, 11, 1, coef.eob_hi_bit);`.","locations":[{"ref":"src/cdf.rs:4987-4989","code":" 4987 |     update_cdf_4d!(TxfmSize::NUM_SQUARE, 2, 41 /*42*/, 3, coef.base_tok);\n 4988 |     update_cdf_4d!(4, 2, 21, 3, coef.br_tok);\n 4989 |     update_cdf_4d!(TxfmSize::NUM_SQUARE, 2, 11 /*22*/, 1, coef.eob_hi_bit);"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Two SAFETY comments incorrectly say `x < h4` when justifying access to `txa[1][0][0][x]` / `txa[1][1][0][x]`. The relevant invariant is `x < w4` (the second-dimension index of the txa array along the x-direction). The code itself is correct, but the comments document a bound that doesn't match the SAFETY proof obligation.","fix":"Change `// SAFETY: x < h4 ...` to `// SAFETY: x < w4 ...` in both places.","locations":[{"ref":"src/lf_mask.rs:194-198","code":"  194 |         let sidx = (mask >= 0x10000) as usize;\n  195 |         let smask = mask >> (sidx << 4);\n  196 |         // SAFETY: x < h4 so txa[1][0][0][x] is initialized.\n  197 |         let txa_x = unsafe { txa[1][0][0][x].assume_init() };\n  198 |         masks[1][by4][cmp::min(txa_x, a[x]) as usize][sidx].update(|it| it | smask as u16);"},{"ref":"src/lf_mask.rs:231-235","code":"  231 |             // SAFETY: x < w4 so txa[1][0][0][x] is initialized.\n  232 |             let mut ttx = unsafe { txa[1][0][0][x].assume_init() };\n  233 |             // SAFETY: x < h4 and y == 0 so txa[1][1][0][x] is initialized.\n  234 |             let step = unsafe { txa[1][1][0][x].assume_init() } as usize;\n  235 |             let mut y = step;"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"Defensive mask `i as usize & 3` is redundant: `i` is built as `(qidx > 20) as u32 + (qidx > 60) as u32 + (qidx > 120) as u32` (the sum of three `bool`s, max value 3). The mask never changes the index, and the inline comment one line above already states this. It adds visual noise and could mislead a reader into thinking `i` might exceed 3.","fix":"Drop the mask: `coef: DEFAULT_CDF.coef[i as usize].clone(),`.","locations":[{"ref":"src/cdf.rs:5085-5093","code":" 5085 |     CdfThreadContext::QCat((qidx > 20) as u32 + (qidx > 60) as u32 + (qidx > 120) as u32)\n 5086 | }\n 5087 | \n 5088 | pub fn rav1d_cdf_thread_copy(src: &CdfThreadContext) -> CdfContext {\n 5089 |     match src {\n 5090 |         CdfThreadContext::Cdf(src) => src.cdf.try_read().unwrap().clone(),\n 5091 |         &CdfThreadContext::QCat(i) => CdfContext {\n 5092 |             // `i` is the sum of 3 `bool`s\n 5093 |             coef: DEFAULT_CDF.coef[i as usize & 3].clone(),"}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-20 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
render();
})();
</script>
</body></html>
