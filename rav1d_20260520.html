<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"In `decode_b`'s compound-inter (`else` branch for inter motion-vector tracking) Y-plane lowest-pixel computation, the for-loop over reference indices is duplicated verbatim. Lines 3256-3273 and 3275-3293 iterate the same closure `refmvs()` and call the same `affine_lowest_px_luma`/`mc_lowest_px` with identical arguments. dav1d C has only one such Y loop (followed by the uv loop). Because `mc_lowest_px`/`affine_lowest_px_luma` update via `cmp::max`, the second pass is idempotent and the final value stays correct, but every compound-inter block during pass 1 of frame-threaded decoding pays for the work twice.","fix":"Delete the duplicate loop (lines 3275-3293); only one Y loop is needed before the `if has_chroma` (uv) block.","locations":[{"ref":"src/decode.rs:3250-3293","code":" 3250 |             } else {\n 3251 |                 // y\n 3252 |                 let refmvs = || {\n 3253 |                     std::iter::zip(inter.r#ref, inter.nd.one_d.mv)\n 3254 |                         .map(|(r#ref, mv)| (r#ref as usize, mv))\n 3255 |                 };\n 3256 |                 for (r#ref, mv) in refmvs() {\n 3257 |                     if inter.inter_mode == GLOBALMV_GLOBALMV && f.gmv_warp_allowed[r#ref] != 0 {\n 3258 |                         affine_lowest_px_luma(\n 3259 |                             t,\n 3260 |                             &mut lowest_px[r#ref][0],\n 3261 |                             b_dim,\n 3262 |                             &frame_hdr.gmv[r#ref],\n 3263 |                         );\n 3264 |                     } else {\n 3265 |                         mc_lowest_px(\n 3266 |                             &mut lowest_px[r#ref][0],\n 3267 |                             t.b.y,\n 3268 |                             bh4,\n 3269 |                             mv.y,\n 3270 |                             0,\n 3271 |                             &f.svc[r#ref][1],\n 3272 |                         );\n 3273 |                     }\n 3274 |                 }\n 3275 |                 for (r#ref, mv) in refmvs() {\n 3276 |                     if inter.inter_mode == GLOBALMV_GLOBALMV && f.gmv_warp_allowed[r#ref] != 0 {\n 3277 |                         affine_lowest_px_luma(\n 3278 |                             t,\n 3279 |                             &mut lowest_px[r#ref][0],\n 3280 |                             b_dim,\n 3281 |                             &frame_hdr.gmv[r#ref],\n 3282 |                         );\n 3283 |                     } else {\n 3284 |                         mc_lowest_px(\n 3285 |                             &mut lowest_px[r#ref][0],\n 3286 |                             t.b.y,\n 3287 |                             bh4,\n 3288 |                             mv.y,\n 3289 |                             0,\n 3290 |                             &f.svc[r#ref][1],\n 3291 |                         );\n 3292 |                     }\n 3293 |                 }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"`findoddzero` uses `.iter().enumerate().find(|(i, &e)| i & 1 == 1 && e == 0).is_some()`, walking every byte (including even-indexed ones whose `i & 1 == 1` check is always false) when only odd indices need inspection. It is invoked twice per inter block in the OBMC overlappable-neighbours probe on slices up to 32 bytes long — a hot decode path.","fix":"Use `buf.iter().skip(1).step_by(2).any(|&e| e == 0)` so the iterator visits only odd indices and short-circuits on the first hit.","locations":[{"ref":"src/decode.rs:546-552","code":"  546 | #[inline]\n  547 | fn findoddzero(buf: &[u8]) -> bool {\n  548 |     buf.iter()\n  549 |         .enumerate()\n  550 |         .find(|(i, &e)| i & 1 == 1 && e == 0)\n  551 |         .is_some()\n  552 | }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"`put_8tap_scaled_rust`, `prep_8tap_scaled_rust`, `put_bilin_scaled_rust`, and `prep_bilin_scaled_rust` each allocate a `[[i16; 128]; 263]` (~67 KiB) array on the stack inside an `#[inline(never)]` fallback. On default 8 MiB Linux stacks this is fine but on threads with reduced stack sizes (e.g. Windows worker threads or embedded targets) this could exhaust the stack.","fix":"Allocate the scratch buffer once per-task in `Rav1dTaskContext` (mirroring `scratch.lap_buf` etc.) and pass it in, instead of putting it on the stack of every call.","locations":[{"ref":"src/mc.rs:226-232","code":"  226 |     let mut mid = [[0i16; MID_STRIDE]; 256 + 7]; // Default::default()\n  227 | \n  228 |     for y in 0..tmp_h {\n  229 |         let src = src + (y as isize - 3) * src.pixel_stride::<BD>();\n  230 |         let mut imx = mx;\n  231 |         let mut ioff = 0;\n  232 | "},{"ref":"src/mc.rs:347-353","code":"  347 |     let mut mid = [[0i16; MID_STRIDE]; 256 + 7]; // Default::default()\n  348 | \n  349 |     for y in 0..tmp_h {\n  350 |         let src = src + (y as isize - 3) * src.pixel_stride::<BD>();\n  351 |         let mut imx = mx;\n  352 |         let mut ioff = 0;\n  353 |         for x in 0..w {"},{"ref":"src/mc.rs:482-488","code":"  482 |     let mut mid = [[0i16; MID_STRIDE]; 256 + 1];\n  483 | \n  484 |     for y in 0..tmp_h {\n  485 |         let src = src + y as isize * src.pixel_stride::<BD>();\n  486 |         let mut imx = mx;\n  487 |         let mut ioff = 0;\n  488 | "},{"ref":"src/mc.rs:584-590","code":"  584 |     let mut mid = [[0i16; MID_STRIDE]; 256 + 1];\n  585 | \n  586 |     for y in 0..tmp_h {\n  587 |         let src = src + y as isize * src.pixel_stride::<BD>();\n  588 |         let mut imx = mx;\n  589 |         let mut ioff = 0;\n  590 | "}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"Both slots of `mv.comp` are produced by two independent `.clone()` calls on the same `DEFAULT_CDF.mv.comp` (each clones a `CdfMvComponent` containing several aligned CDF tables — ~hundreds of bytes). The second clone could trivially reuse the first.","fix":"Clone once and reuse: `let comp = DEFAULT_CDF.mv.comp.clone(); ... mv: CdfMvContext { comp: [comp.clone(), comp], joint: ... }`.","locations":[{"ref":"src/cdf.rs:5096-5099","code":" 5096 |             mv: CdfMvContext {\n 5097 |                 comp: [DEFAULT_CDF.mv.comp.clone(), DEFAULT_CDF.mv.comp.clone()],\n 5098 |                 joint: DEFAULT_CDF.mv.joint.clone(),\n 5099 |             },"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"In hot loops `filter_plane_cols_y`/`filter_plane_rows_y`/`filter_plane_cols_uv`/`filter_plane_rows_uv`, `mask[y % mask.len()]` is computed per iteration even though `mask.len() == 32` is a compile-time constant. The modulo trick is documented as a hint to elide the bounds check, but a plain bounds-checked `mask[y]` (with `y < 32` already enforced by `endy4`) would be cheaper if combined with a `debug_assert!(endy4 <= 32)`.","fix":"Replace `mask[y % mask.len()]` with `mask[y]` after `debug_assert!(endy4 <= mask.len())` once near the top of the function; the compiler can then keep the bounds elision.","locations":[{"ref":"src/lf_apply.rs:420-430","code":"  420 |         if !have_top && y == 0 {\n  421 |             continue;\n  422 |         }\n  423 |         let vmask = mask[y % mask.len()] // To elide the bounds check.\n  424 |             .each_ref()\n  425 |             .map(|[a, b]| a.get() as u32 | ((b.get() as u32) << 16));\n  426 |         let lvl = |y| lvl + (4 * i * b4_stride + y);\n  427 |         lf_sb.y.v.call::<BD>(f, y_dst(i), &vmask, lvl(1), w);\n  428 |     }\n  429 | }\n  430 | "},{"ref":"src/lf_apply.rs:499-510","code":"  499 |         if !have_top && y == 0 {\n  500 |             continue;\n  501 |         }\n  502 |         let vmask = mask[y % mask.len()] // To elide the bounds check.\n  503 |             .each_ref()\n  504 |             .map(|[a, b]| a.get() as u32 | ((b.get() as u32) << (16 >> ss_hor)));\n  505 |         let vmask = [vmask[0], vmask[1], 0];\n  506 |         let lvl = |y| lvl + (4 * i * b4_stride + y);\n  507 |         lf_sb.uv.v.call::<BD>(f, u_dst(i), &vmask, lvl(2), w);\n  508 |         lf_sb.uv.v.call::<BD>(f, v_dst(i), &vmask, lvl(3), w);\n  509 |     }\n  510 | }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"`backup_4xu` re-borrows `dst` element-by-element through `&mut dst[..u]` + `&mut dst[i]` inside the loop, and computes `dst.len()` (constant 4) per iteration. The doubly-indirect indexing prevents the compiler from hoisting the bounds check and turning the row copy into a contiguous memcpy.","fix":"Iterate with `for (i, row) in dst[..u].iter_mut().enumerate()` so the borrow is taken once per row.","locations":[{"ref":"src/lr_apply.rs:124-140","code":"  124 | }\n  125 | \n  126 | fn backup_4xu<BD: BitDepth>(\n  127 |     dst: &mut [[BD::Pixel; 4]; 128 + 8],\n  128 |     src: Rav1dPictureDataComponentOffset,\n  129 |     u: c_int,\n  130 | ) {\n  131 |     let u = u as usize;\n  132 |     let dst = &mut dst[..u];\n  133 |     for i in 0..u {\n  134 |         let dst = &mut dst[i];\n  135 |         let n = dst.len();\n  136 |         let src = src + (i as isize * src.pixel_stride::<BD>());\n  137 |         let src = &*src.slice::<BD>(n);\n  138 |         BD::pixel_copy(dst, src, n);\n  139 |     }\n  140 | }"}]},{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","description":"`unreachable!()` is used to enforce a bitstream invariant (`uv_lvl != 0` should imply layout != I400). In release builds, `unreachable!()` is still a panic (not UB), so a malformed or corrupted bitstream that violates the invariant would crash the decoder instead of being handled gracefully. The C dav1d code uses `assert()` (compiled out in release) or returns an error.","fix":"Replace with `debug_assert!(layout != Rav1dPixelLayout::I400);` so the check exists in debug builds without crashing in release. Alternatively, propagate the error upward like the rest of the bitstream parsing layer.","locations":[{"ref":"src/cdef_apply.rs:369-372","code":"  369 |                         if uv_lvl != 0 {\n  370 |                             if !(layout != Rav1dPixelLayout::I400) {\n  371 |                                 unreachable!();\n  372 |                             }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"`fix_int_mv_precision` performs `i16` arithmetic on `mv.x`/`mv.y` (e.g. `mv.x - (mv.x >> 15) + 3`) without widening, but the original C code performs these computations on `int` after integer promotion. If `mv.x` is near `i16::MAX` (e.g., 32765..32767), the `+3` overflows `i16` and causes a panic in debug builds and a wrap in release builds, producing wrong motion vectors. Reachable from `fix_mv_precision` with arbitrary decoder input.","fix":"Promote to `i32` for the arithmetic: `mv.x = (((mv.x as i32) - ((mv.x as i32) >> 15) + 3) & !7) as i16;` (and same for y), matching the C behavior.","locations":[{"ref":"src/env.rs:637-645","code":"  637 | }\n  638 | \n  639 | #[inline]\n  640 | fn fix_int_mv_precision(mv: &mut Mv) {\n  641 |     mv.x = (mv.x - (mv.x >> 15) + 3) & !7;\n  642 |     mv.y = (mv.y - (mv.y >> 15) + 3) & !7;\n  643 | }\n  644 | \n  645 | #[inline]"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"`get_gmv_2d` calls `yc.abs()` / `xc.abs()` and then adds `round`. When `yc`/`xc` equals `i32::MIN`, `.abs()` overflows and panics in debug or wraps in release. Even outside that, `xc.abs() + round` can overflow because both can be near `i32::MAX`. Reachable for affine warped motion with adversarial bitstream values for `gmv.matrix[]`.","fix":"Use `wrapping_abs()` or compute via `i64`, mirroring dav1d's `int`-promoted arithmetic, to avoid overflow on extreme inputs.","locations":[{"ref":"src/env.rs:680-695","code":"  680 |             return Mv::ZERO;\n  681 |         }\n  682 |         Rav1dWarpedMotionType::Affine => {}\n  683 |     }\n  684 |     let x = bx4 * 4 + bw4 * 2 - 1;\n  685 |     let y = by4 * 4 + bh4 * 2 - 1;\n  686 |     let xc = (gmv.matrix[2] - (1 << 16)) * x + gmv.matrix[3] * y + gmv.matrix[0];\n  687 |     let yc = (gmv.matrix[5] - (1 << 16)) * y + gmv.matrix[4] * x + gmv.matrix[1];\n  688 |     let shift = 16 - (3 - !hdr.hp as c_int);\n  689 |     let round = 1 << shift >> 1;\n  690 |     let mut res = Mv {\n  691 |         y: apply_sign(yc.abs() + round >> shift << !hdr.hp as c_int, yc) as i16,\n  692 |         x: apply_sign(xc.abs() + round >> shift << !hdr.hp as c_int, xc) as i16,\n  693 |     };\n  694 |     if hdr.force_integer_mv {\n  695 |         fix_int_mv_precision(&mut res);"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"`set_remaining_len` computes `self.index + len` with no overflow check. `len` is `gb.get_uleb128() as usize` (obu.rs:2153) and is bounded only by `u32::MAX`. On 32-bit targets, a sufficiently large `self.index` plus a crafted ULEB128 length wraps: in debug builds the addition panics; in release builds it silently wraps and `self.data.get(..wrapped)` returns a wrong subset of the buffer (or `None`). Reachable from a single malformed OBU whose `obu_length` field is near `u32::MAX`.","fix":"Use `self.index.checked_add(len).and_then(|end| self.data.get(..end))?` so overflow is treated the same as an oversized length.","locations":[{"ref":"src/getbits.rs:216-219","code":"  216 |     pub fn set_remaining_len(&mut self, len: usize) -> Option<()> {\n  217 |         self.data = self.data.get(..self.index + len)?;\n  218 |         Some(())\n  219 |     }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"`dav1d_default_picture_release` unconditionally `unwrap()`s `p.allocator_data`. If a malformed `Dav1dPicture` is passed (e.g., from a C client that zero-initialized the struct or partially populated it after an alloc failure), the `None` value crashes the decoder. Since this runs as a C callback under `extern \"C\"`, the panic crosses an FFI boundary, which is undefined behavior.","fix":"Return early (and possibly log a warning) when `allocator_data` is `None`, or wrap the body in `std::panic::catch_unwind` to prevent UB across the FFI boundary.","locations":[{"ref":"src/picture.rs:153-165","code":"  153 | unsafe extern \"C\" fn dav1d_default_picture_release(\n  154 |     p: *mut Dav1dPicture,\n  155 |     _cookie: Option<SendSyncNonNull<c_void>>,\n  156 | ) {\n  157 |     // SAFETY: Guaranteed by safety preconditions.\n  158 |     let p = unsafe { &mut *p };\n  159 |     let buf = p.allocator_data.unwrap().cast::<MemPoolBuf<u8>>();\n  160 |     // SAFETY: `dav1d_default_picture_alloc` stores `SendSyncNonNull::from_box` of a `Box<MemPoolBuf<u8>>` in `Dav1dPicture::allocator_data`,\n  161 |     // and `(Rav1dPicAllocator::release_picture_callback == dav1d_default_picture_release) == (Rav1dPicAllocator::alloc_picture_callback == dav1d_default_picture_alloc)`.\n  162 |     let buf = unsafe { buf.into_box() };\n  163 |     let MemPoolBuf { pool, buf } = *buf;\n  164 |     pool.push(buf);\n  165 | }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","description":"`Rav1dTasks::index`, `push`, `clear`, `merge_pending_frame`, and many sites in `rav1d_worker_task` call `try_read()/try_write()/try_lock().unwrap()` on the `RwLock`/`Mutex` protecting tasks and `pending_tasks`. These will panic (not block) if any other thread currently holds an incompatible lock. The code relies on a hand-proven invariant that no concurrent access ever happens, but `index` is called from multiple worker threads simultaneously, while `push`/`insert_tasks_between` take write locks. Any unforeseen contention crashes the decoder rather than blocking briefly.","fix":"Replace `try_read().unwrap()`/`try_write().unwrap()` with blocking `read()`/`write()`, or document and verify the invariant with `debug_assert!` in production builds. At minimum, the `index` method that runs on every task lookup should use `read()`.","locations":[{"ref":"src/thread_task.rs:253-261","code":"  253 |         let mut tasks = self.tasks.try_write().unwrap();\n  254 |         tasks.push(task);\n  255 |         // 1-based index into tasks, so we use length after pushing\n  256 |         Rav1dTaskIndex(NonZeroU32::new(tasks.len() as u32))\n  257 |     }\n  258 | \n  259 |     pub fn clear(&self) {\n  260 |         self.tasks.try_write().unwrap().clear();\n  261 |         self.pending_tasks.try_lock().unwrap().clear();"},{"ref":"src/thread_task.rs:283-292","code":"  283 |     #[inline]\n  284 |     fn index<'a>(&'a self, index: Rav1dTaskIndex) -> impl Deref<Target = Rav1dTask> + 'a {\n  285 |         if let Some(index) = index.raw_index() {\n  286 |             RwLockReadGuard::map(self.tasks.try_read().unwrap(), |tasks| {\n  287 |                 &tasks[index as usize]\n  288 |             })\n  289 |         } else {\n  290 |             panic!(\"Cannot index with None\");\n  291 |         }\n  292 |     }"},{"ref":"src/thread_task.rs:300-322","code":"  300 |     #[inline]\n  301 |     fn merge_pending_frame(&self, c: &Rav1dContext) -> bool {\n  302 |         let merge = self.pending_tasks_merge.swap(false, Ordering::SeqCst);\n  303 |         if merge {\n  304 |             let mut pending_tasks = self.pending_tasks.lock();\n  305 |             let range = {\n  306 |                 let mut tasks = self.tasks.try_write().unwrap();\n  307 |                 if self.head.load(Ordering::Relaxed).is_none() {\n  308 |                     tasks.clear();\n  309 |                 }\n  310 |                 let start = tasks.len() as u32;\n  311 |                 tasks.extend(pending_tasks.drain(..));\n  312 |                 start..tasks.len() as u32\n  313 |             };\n  314 | \n  315 |             for i in range {\n  316 |                 // 1-based index, so we have to add 1\n  317 |                 let task_idx = Rav1dTaskIndex(NonZeroU32::new(i + 1));\n  318 |                 self.insert_tasks(c, task_idx, task_idx, 0);\n  319 |             }\n  320 |         }\n  321 |         merge\n  322 |     }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","description":"`rav1d_worker_task` does `task_thread.c.lock().take().unwrap()` on entry. If the worker thread is unparked before the main thread populates `task_thread.c` (e.g., due to a spurious wakeup, an early shutdown signal, or use-after-shutdown), the `unwrap()` panics inside a thread spawned to run video decoding, crashing the process.","fix":"After `thread::park()`, loop and re-park if `task_thread.die.get()` is set or if `task_thread.c.lock()` is None. Return early instead of unwrapping so shutdown is clean.","locations":[{"ref":"src/thread_task.rs:761-765","code":"  761 | pub fn rav1d_worker_task(task_thread: Arc<Rav1dTaskContextTaskThread>) {\n  762 |     // The main thread will unpark us once `task_thread.c` is set.\n  763 |     thread::park();\n  764 |     let c = &*task_thread.c.lock().take().unwrap();\n  765 |     let mut tc = Rav1dTaskContext::new(task_thread);"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"`get_bytes` does `self.index += n` and `&self.data[i..][..n]` with no internal bounds check. Both current call sites pass safe values, so they cannot panic today, but the function provides no internal guarantee. The `Index<usize>` impl (used as `gb[payload_size - 1]` / `gb[payload_size]` in ITU-T T.35 metadata parsing) is similarly unchecked and relies on subtle bookkeeping to keep `self.index + index` in range.","fix":"Return `Option<&[u8]>` from `get_bytes`, setting `self.error = 1` on out-of-bounds; replace the `Index` impl with a checked `try_get(usize) -> Option<u8>` helper or document the precondition.","locations":[{"ref":"src/getbits.rs:209-214","code":"  209 |     pub fn get_bytes(&mut self, n: usize) -> &[u8] {\n  210 |         assert_eq!(self.bits_left, 0);\n  211 |         let i = self.index;\n  212 |         self.index += n;\n  213 |         &self.data[i..][..n]\n  214 |     }"},{"ref":"src/getbits.rs:230-235","code":"  230 | impl<'a> Index<usize> for GetBits<'a> {\n  231 |     type Output = u8;\n  232 |     fn index(&self, index: usize) -> &Self::Output {\n  233 |         self.data.index(self.index + index)\n  234 |     }\n  235 | }"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"`output_picture_ready` predicates on `state.cache.p.data.is_some()` and then unwraps `state.cache.p.frame_hdr.as_ref()` on the next line. `data` and `frame_hdr` are independent `Option`s on `Rav1dPicture`; nothing in this function (or the type system) enforces that they are populated in lockstep. Any code path that mutates one without the other (or a future refactor) leads to a hard panic in the output path.","fix":"Require both via `if let (Some(_), Some(fh)) = (state.cache.p.data.as_ref(), state.cache.p.frame_hdr.as_ref())`, or add `state.cache.p.frame_hdr.is_some()` to the outer predicate before unwrapping.","locations":[{"ref":"src/lib.rs:528-535","code":"  528 |         if state.out.p.data.is_some() && state.cache.p.data.is_some() {\n  529 |             if state.max_spatial_id == state.cache.p.frame_hdr.as_ref().unwrap().spatial_id\n  530 |                 || state.out.flags.contains(PictureFlags::NEW_TEMPORAL_UNIT)\n  531 |             {\n  532 |                 return true;\n  533 |             }\n  534 |             state.cache = mem::take(&mut state.out);\n  535 |             return false;"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"`rav1d_apply_grain` (single-thread branch) calls `Rav1dBitDepthDSPContext::get(bpc).unwrap()` before the `match bpc` below. `get()` returns `None` for any `bpc` outside {8, 10, 12}, panicking. The `match` below has a `_ => {}` catch-all clearly intended to silently ignore unsupported bpcs, but the unconditional `unwrap()` runs first and defeats that safety net; an out-of-range `bpc` aborts the process instead of being skipped.","fix":"Replace with `let Some(dsp) = Rav1dBitDepthDSPContext::get(bpc) else { return Ok(()); };` (or move the DSP lookup into each matched arm) so the `_ => {}` fallthrough remains effective.","locations":[{"ref":"src/lib.rs:738-749","code":"  738 |         } else {\n  739 |             let bpc = out.p.bpc;\n  740 |             let dsp = Rav1dBitDepthDSPContext::get(bpc).unwrap();\n  741 |             let fg = &dsp.fg;\n  742 |             use fg_apply::rav1d_apply_grain;\n  743 |             match bpc {\n  744 |                 #[cfg(feature = \"bitdepth_8\")]\n  745 |                 8 => rav1d_apply_grain::<BitDepth8>(fg, out, in_0),\n  746 |                 #[cfg(feature = \"bitdepth_16\")]\n  747 |                 10 | 12 => rav1d_apply_grain::<BitDepth16>(fg, out, in_0),\n  748 |                 _ => {}\n  749 |             }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","description":"`rav1d_msac_decode_uniform` asserts `n > 0` but then derives `l = ulog2(n) as u8 + 1` and asserts `l > 1`. For `n == 1` the first assert passes but the second guarantees a panic (since `ulog2(1) == 0` ⇒ `l == 1`). All current callers pass `n >= 2`, so this is a dormant invariant rather than a live bug, but the two asserts encode inconsistent preconditions, and a corrupted caller passing `n = 1` produces an obscure panic at the second assert rather than the first.","fix":"Tighten the first assertion to `assert!(n > 1);` and drop the redundant `assert!(l > 1);`.","locations":[{"ref":"src/msac.rs:280-285","code":"  280 | pub fn rav1d_msac_decode_uniform(s: &mut MsacContext, n: c_uint) -> c_int {\n  281 |     assert!(n > 0);\n  282 |     let l = ulog2(n) as u8 + 1;\n  283 |     assert!(l > 1);\n  284 |     let m = (1 << l) - n;\n  285 |     let v = rav1d_msac_decode_bools(s, l - 1);"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","description":"`tile_log2(sz, tgt)` shifts `sz << k` with no bound on `k`. Currently all call sites are safe (max `k` reached is ~13 for realistic AV1 dimensions), but the function offers no internal guard. A refactor that loosens the input bounds, or any new caller passing `tgt` near `i32::MAX`, would shift `i32` past its width (panic in debug, wrap in release); `sz == 0` with `tgt > 0` would be an infinite loop.","fix":"Bound the loop: `while k < 31 && sz << k < tgt`, or rewrite using `tgt.saturating_sub(1).checked_ilog2()`.","locations":[{"ref":"src/obu.rs:657-664","code":"  657 | #[inline]\n  658 | fn tile_log2(sz: c_int, tgt: c_int) -> u8 {\n  659 |     let mut k = 0;\n  660 |     while sz << k < tgt {\n  661 |         k += 1;\n  662 |     }\n  663 |     k\n  664 | }"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","description":"`pal_idx_finish_c` performs four `assert!` calls on every invocation (`bw`/`bh`/`w`/`h` shape). For 4x4 transform blocks this is called frequently from the predictor, adding several conditional branches per call even though the values come from validated bitstream parameters.","fix":"Downgrade to `debug_assert!` to remove the overhead from release builds, since the inputs come from validated bitstream parameters.","locations":[{"ref":"src/pal.rs:65-75","code":"   65 | ) {\n   66 |     let [bw, bh, w, h] = [bw, bh, w, h].map(|it| it as usize);\n   67 | \n   68 |     assert!(bw >= 4 && bw <= 64 && bw.is_power_of_two());\n   69 |     assert!(bh >= 4 && bh <= 64 && bh.is_power_of_two());\n   70 |     assert!(w >= 4 && w <= bw && (w & 3) == 0);\n   71 |     assert!(h >= 4 && h <= bh && (h & 3) == 0);\n   72 | \n   73 |     let idx = if src == dst {\n   74 |         // SAFETY: `src` length sliced in `pal_idx_finish::Fn::call` and
