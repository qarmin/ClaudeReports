<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"StateTable::entry divides by self.class_count, which is read directly from untrusted font data (StateTable::new reads it via data.read_u16(0)). A crafted state table with class_count == 0 causes a divide-by-zero panic. This is reachable from the AAT kern Format1 path (kern::Format1::new -> StateTable::new) while shaping with attacker-controlled fonts.","fix":"After reading class_count in StateTable::new, return None if it is 0; or use checked_div in entry() and propagate None.","locations":[{"ref":"src/internal/aat.rs:209-211","code":"  209 |         let new_state =\n  210 |             (entry.new_state as u32).checked_sub(self.state_array)? / self.class_count as u32;\n  211 |         entry.new_state = new_state as u16;","lines":3},{"ref":"src/internal/aat.rs:169-187","code":"  169 |     pub fn new(data: &Bytes<'a>) -> Option<Self> {\n  170 |         let class_count = data.read_u16(0)?;\n  171 |         let class_offset = data.read_u16(2)? as usize;\n  172 |         let state_array = data.read_u16(4)? as u32;\n  173 |         let entry_table = data.read_u16(6)? as u32;\n  174 |         let first_glyph = data.read_u16(class_offset)?;\n  175 |         let glyph_count = data.read_u16(class_offset + 2)? as usize;\n  176 |         let classes = data.read_bytes(class_offset + 4, glyph_count)?;\n  177 |         let states = data.data().get(state_array as usize..)?;\n  178 |         Some(Self {\n  179 |             data: *data,\n  180 |             class_count,\n  181 |             state_array,\n  182 |             states,\n  183 |             entry_table,\n  184 |             first_glyph,\n  185 |             classes,\n  186 |         })\n  187 |     }","lines":19}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Fvar::get_instance computes `self.inst_size as usize - 2`. inst_size is read straight from the font (Fvar::new reads offset 14). If inst_size < 2 this subtraction underflows and panics in debug builds (and wraps to a huge value in release, defeating the intended equality guard).","fix":"Guard with `self.inst_size as usize >= 2 && ps_name_offset == self.inst_size as usize - 2`, or use checked_sub.","locations":[{"ref":"src/internal/var.rs:98-103","code":"   98 |         let ps_name_offset = 4 + self.axis_count as usize * 4;\n   99 |         let postscript_name_id = if ps_name_offset == self.inst_size as usize - 2 {\n  100 |             b.read::<u16>(ps_name_offset)\n  101 |         } else {\n  102 |             None\n  103 |         };","lines":6},{"ref":"src/internal/var.rs:28-29","code":"   28 |         let inst_count = b.read_or_default::<u16>(12);\n   29 |         let inst_size = b.read_or_default::<u16>(14);","lines":2}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"EmitRgba8::emit indexes both the destination `image[out..out+3]` and the palette/source slices with direct `[]` indexing (e.g. `src[i]`, `src[i+1..i+3]`, `image[out]..image[out+3]`). The function signature returns Option but never performs a bounds check on these accesses; it always returns Some(()). For interlaced PNGs `out = y*width*4 + x*4` with `x = COL_START[pass]` and stride `4*inc`, and `len`/`cols` are derived from the pass formulas - a crafted interlaced image (or one whose decompressed scanline is shorter than expected) can drive `out` or `i` out of range and panic, or read source bytes past the normalized line buffer. The TrueColor/GreyscaleAlpha/Indexed arms read `src[i+1]`, `src[i+2]`, `src[i+3]` without verifying the source line is long enough.","fix":"Replace the raw indexing with checked `get`/`get_mut` returning None on failure (the Option return type already supports this), or validate up-front that `image.len() >= out + len*4*inc` and `source.len() >= len*channels` before the loop.","locations":[{"ref":"src/scale/bitmap/png.rs:474-559","code":"  474 | impl Emit for EmitRgba8 {\n  475 |     fn emit(\n  476 |         state: &State,\n  477 |         source: &[u8],\n  478 |         image: &mut [u8],\n  479 |         x: usize,\n  480 |         y: usize,\n  481 |         width: usize,\n  482 |         inc: usize,\n  483 |         len: usize,\n  484 |     ) -> Option<()> {\n  485 |         use ColorType::*;\n  486 |         let src = source;\n  487 |         let mut out = y * width * 4 + x * 4;\n  488 |         let mut i = 0;\n  489 |         match state.header.color_type {\n  490 |             Indexed => {\n  491 |                 let palette = state.palette;\n  492 |                 let trans = state.trans;\n  493 |                 let palette_len = palette.len();\n  494 |                 let trans_len = trans.len();\n  495 |                 for _ in 0..len {\n  496 |                     let t = src[i] as usize;\n  497 |                     let p = t * 3;\n  498 |                     if p + 2 >= palette_len {\n  499 |                         image[out] = 0;\n  500 |                         image[out + 1] = 0;\n  501 |                         image[out + 2] = 0;\n  502 |                     } else {\n  503 |                         image[out] = palette[p];\n  504 |                         image[out + 1] = palette[p + 1];\n  505 |                         image[out + 2] = palette[p + 2];\n  506 |                     }\n  507 |                     if t >= trans_len {\n  508 |                         image[out + 3] = 255;\n  509 |                     } else {\n  510 |                         image[out + 3] = trans[t];\n  511 |                     }\n  512 |                     i += 1;\n  513 |                     out += 4 * inc;\n  514 |                 }\n  515 |             }\n  516 |             TrueColor => {\n  517 |                 for _ in 0..len {\n  518 |                     image[out] = src[i];\n  519 |                     image[out + 1] = src[i + 1];\n  520 |                     image[out + 2] = src[i + 2];\n  521 |                     image[out + 3] = 255;\n  522 |                     i += 3;\n  523 |                     out += 4 * inc;\n  524 |                 }\n  525 |             }\n  526 |             TrueColorAlpha => {\n  527 |                 for _ in 0..len {\n  528 |                     image[out] = src[i];\n  529 |                     image[out + 1] = src[i + 1];\n  530 |                     image[out + 2] = src[i + 2];\n  531 |                     image[out + 3] = src[i + 3];\n  532 |                     i += 4;\n  533 |                     out += 4 * inc;\n  534 |                 }\n  535 |             }\n  536 |             Greyscale => {\n  537 |                 for c in src[..len].iter().copied() {\n  538 |                     image[out] = c;\n  539 |                     image[out + 1] = c;\n  540 |                     image[out + 2] = c;\n  541 |                     image[out + 3] = 255;\n  542 |                     out += 4 * inc;\n  543 |                 }\n  544 |             }\n  545 |             GreyscaleAlpha => {\n  546 |                 let mut i = 0;\n  547 |                 for _ in 0..len {\n  548 |                     let c = src[i];\n  549 |                     image[out] = c;\n  550 |                     image[out + 1] = c;\n  551 |                     image[out + 2] = c;\n  552 |                     image[out + 3] = src[i + 1];\n  553 |                     i += 2;\n  554 |                     out += 4 * inc;\n  555 |                 }\n  556 |             }\n  557 |         }\n  558 |         Some(())\n  559 |     }","lines":86}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`Chars::next` for the MacRoman encoding indexes the cached byte slice directly with\n`self.bytes[self.cur]`. The iteration length `self.len` is read independently from the name record\n(offset+8), while `self.bytes` is set to `self.bytes().unwrap_or(&[])`. If the string's storage\noffset/length points outside the table, `bytes()` returns `None` and `self.bytes` becomes empty,\nyet `self.len` is still non-zero. The first `next()` then panics with an out-of-bounds index. This\nis reachable from untrusted `name` table data via `LocalizedString::chars()` / `Display`.","fix":"Bound the MacRoman loop by `self.bytes.len()` (e.g. `let Some(b) = self.bytes.get(self.cur) else { return None }`), or derive `len` from the actual decoded byte slice length.","locations":[{"ref":"src/string.rs:328-337","code":"  328 |             Encoding::MacRoman => {\n  329 |                 let c = self.bytes[self.cur] as u32;\n  330 |                 self.cur += 1;\n  331 |                 if c > 127 {\n  332 |                     let idx = c as usize - 128;\n  333 |                     Some(from_u32(MAC_ROMAN[idx] as u32).unwrap_or(rep))\n  334 |                 } else {\n  335 |                     Some(from_u32(c).unwrap_or(rep))\n  336 |                 }\n  337 |             }","lines":10},{"ref":"src/string.rs:232-258","code":"  232 |     pub fn chars(&self) -> Chars<'a> {\n  233 |         let encoding = self.encoding();\n  234 |         if !encoding.is_decodable() {\n  235 |             return Chars {\n  236 |                 record: *self,\n  237 |                 bytes: &[],\n  238 |                 encoding,\n  239 |                 offset: 0,\n  240 |                 len: 0,\n  241 |                 cur: 0,\n  242 |             };\n  243 |         }\n  244 |         let len = self.data.read_or_default::<u16>(self.offset + 8) as usize;\n  245 |         let offset = self.data.read_or_default::<u16>(self.offset + 10) as usize + self.storage;\n  246 |         Chars {\n  247 |             record: *self,\n  248 |             bytes: if encoding == Encoding::MacRoman {\n  249 |                 self.bytes().unwrap_or(&[])\n  250 |             } else {\n  251 |                 &[]\n  252 |             },\n  253 |             encoding,\n  254 |             offset,\n  255 |             len,\n  256 |             cur: 0,\n  257 |         }\n  258 |     }","lines":27}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"compose_hangul has an overly broad input guard that admits invalid jamo pairings, causing integer underflow/overflow that is fed straight into `from_u32_unchecked`, i.e. undefined behavior producing an invalid `char`. The `b` range check on line 110 is `VBASE..(TBASE + TCOUNT)` = 0x1161..0x11C3, which lumps together V-jamo and T-jamo. In the LV+T branch (a >= SBASE, line 116-118) `b` may legitimately fall in the V-jamo range (b < TBASE = 0x11A7), so `b - TBASE` underflows in u32 and `a + (b - TBASE)` yields a garbage scalar value. In the L+V branch (a < SBASE, line 122-125) `b` may be a T-jamo (b >= TBASE), so `vi = b - VBASE` is too large and `SBASE + li*NCOUNT + vi*TCOUNT` overflows the Hangul block into an arbitrary scalar value. Both results are passed to `from_u32_unchecked`. compose_pair is public (char::compose) and is reached from CharCluster::composed() over NFD output of arbitrary user text, so this is attacker-reachable.","fix":"Validate jamo ranges per-branch like the reference Unicode algorithm: in the LV+T branch require `(TBASE < b) && (b < TBASE + TCOUNT)` before computing `b - TBASE`; in the L+V branch require `(VBASE <= b) && (b < VBASE + VCOUNT)` before computing `vi`. Return None otherwise. Prefer checked arithmetic (or `char::from_u32`) instead of `from_u32_unchecked`.","locations":[{"ref":"src/text/compose.rs:107-127","code":"  107 | fn compose_hangul(a: char, b: char) -> Option<char> {\n  108 |     let a = a as u32;\n  109 |     let b = b as u32;\n  110 |     if !(VBASE..(TBASE + TCOUNT)).contains(&b) {\n  111 |         return None;\n  112 |     }\n  113 |     if !(LBASE..(LBASE + LCOUNT)).contains(&a) && !(SBASE..(SBASE + SCOUNT)).contains(&a) {\n  114 |         return None;\n  115 |     }\n  116 |     if a >= SBASE {\n  117 |         if (a - SBASE) % TCOUNT == 0 {\n  118 |             Some(unsafe { from_u32_unchecked(a + (b - TBASE)) })\n  119 |         } else {\n  120 |             None\n  121 |         }\n  122 |     } else {\n  123 |         let li = a - LBASE;\n  124 |         let vi = b - VBASE;\n  125 |         Some(unsafe { from_u32_unchecked(SBASE + li * NCOUNT + vi * TCOUNT) })\n  126 |     }\n  127 | }","lines":21}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"bitmap::blit performs no bounds verification that the destination slices are large enough; it slices `target[dy*dest_pitch..]` and `mask[sy*mask_width..]` then writes `dst_row[dx+i]` / reads `src_row[sx]` with raw indexing. The clipping math computes `source_end_x = source_width.min(dest_width - dest_x + source_x)` etc., but if the caller passed a `target` whose length is smaller than `target_width*target_height*4` (e.g. due to the u32 overflow in the color-outline path above, or a mismatched mask buffer), these indexes panic or write out of bounds. The function trusts its width/height arguments to match the actual buffer lengths.","fix":"Assert/validate `target.len() >= target_height as usize * dest_pitch` and `mask.len() >= source_height*mask_width` at entry and return early on mismatch, or use checked slicing.","locations":[{"ref":"src/scale/bitmap/mod.rs:18-78","code":"   18 | pub fn blit(\n   19 |     mask: &[u8],\n   20 |     mask_width: u32,\n   21 |     mask_height: u32,\n   22 |     x: i32,\n   23 |     y: i32,\n   24 |     color: [u8; 4],\n   25 |     target: &mut [u8],\n   26 |     target_width: u32,\n   27 |     target_height: u32,\n   28 | ) {\n   29 |     if mask_width == 0 || mask_height == 0 || target_width == 0 || target_height == 0 {\n   30 |         return;\n   31 |     }\n   32 |     let source_width = mask_width as usize;\n   33 |     let source_height = mask_height as usize;\n   34 |     let dest_width = target_width as usize;\n   35 |     let dest_heig low","easy":false,"description":"decompose/decompose_compat trust the generated DECOMPOSE/DECOMPOSE_COMPAT tables for both length and validity. `end = 1 + buf[0] as usize` followed by `&buf[1..end]` will panic if a table entry's stored length runs past the slice, and the subsequent `&*(... as *const [u32] as *const [char])` reinterpret is UB if any stored u32 is not a valid scalar value (surrogate or > 0x10FFFF). Additionally decompose_compat's `index == 1` path assumes the canonical `decompose_index(c)` is non-zero; if it is 0 the code reads `DECOMPOSE[0..]` and uses its sentinel length. These are only safe as long as the generated data is perfectly consistent; there is no defensive check.","fix":"Bounds-check `end <= buf.len()` and use `char::from_u32` (or document/verify the generator invariant) instead of the unchecked `[u32]`->`[char]` transmute; handle the decompose_compat `index == 1` && `decompose_index == 0` case explicitly.","locations":[{"ref":"src/text/compose.rs:147-187","code":"  147 | pub fn decompose(c: char) -> Decompose {\n  148 |     if c <= '\\x7F' {\n  149 |         DecomposeInner::Array([c, ' ', ' '], 1).into()\n  150 |     } else if is_hangul(c) {\n  151 |         decompose_hangul(c).into()\n  152 |     } else {\n  153 |         let index = decompose_index(c as usize);\n  154 |         if index == 0 {\n  155 |             DecomposeInner::Array([c, ' ', ' '], 1).into()\n  156 |         } else {\n  157 |             let buf = &DECOMPOSE[index..];\n  158 |             let end = 1 + buf[0] as usize;\n  159 |             DecomposeInner::Slice(unsafe { &*(&buf[1..end] as *const [u32] as *const [char]) })\n  160 |                 .into()\n  161 |         }\n  162 |     }\n  163 | }\n  164 | \n  165 | pub fn decompose_compat(c: char) -> Decompose {\n  166 |     if c <= '\\x7F' {\n  167 |         DecomposeInner::Array([c, ' ', ' '], 1).into()\n  168 |     } else if is_hangul(c) {\n  169 |         decompose_hangul(c).into()\n  170 |     } else {\n  171 everity":"high","easy":false,"description":"var::item_delta computes `let elem_len = (count - short_count) + short_count * 2;` where count = region_index_count and short_count are both read from untrusted data (offsets data_base+4 and data_base+2). If short_count > region_index_count the subtraction underflows, panicking in debug builds. In release it wraps producing a bogus delta_base offset (reads then fail safely via checked read, but the debug panic is a DoS on font parsing).","fix":"Validate that short_count <= region_index_count (return None otherwise) or use saturating/checked arithmetic.","locations":[{"ref":"src/internal/var.rs:272-281","code":"  272 |     let region_index_count = b.read::<u16>(data_base + 4)? as usize;\n  273 |     let (short_count, mut delta_base) = {\n  274 |         let inner = inner as usize;\n  275 |         let short_count = b.read::<u16>(data_base + 2)? as usize;\n  276 |         let count = region_index_count;\n  277 |         let base = data_base + 6 + count * 2;\n  278 |         let elem_len = (count - short_count) + short_count * 2;\n  279 |         let offset = base + inner * elem_len;\n  280 |         (short_count, offset)\n  281 |     };","lines":10}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"var::metric_delta computes `count - 1` where count is the u16 mapping count read from the font (offset+2). When count == 0, `count - 1` underflows: panic in debug, wrap to 0xFFFF in release. Reachable from advance_delta/sb_delta during shaping of variable fonts.","fix":"Return None when count == 0 before computing the clamped index, or use checked_sub.","locations":[{"ref":"src/internal/var.rs:354-363","code":"  354 |     let format = b.read::<u16>(offset)? as u32;\n  355 |     let count = b.read::<u16>(offset + 2)?;\n  356 |     let bit_count = (format & 0xF) + 1;\n  357 |     let entry_size = ((format & 0x30) >> 4) + 1;\n  358 |     let base = offset + 4;\n  359 |     let index = if glyph_id >= count {\n  360 |         count - 1\n  361 |     } else {\n  362 |         glyph_id\n  363 |     } as usize;","lines":10}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"The PNG decoder computes the output buffer size and its only bounds guard as `(w * h * 4)` in u32 arithmetic. `w` and `h` are read directly from the untrusted PNG IHDR (get_u32be at offsets 16/20, see strike.rs Bitmap::new lines 351-352) and can each be near u32::MAX. `w * h * 4` overflows/wraps to a small value. That small value is used both to size the destination buffer (via BitmapFormat::buffer_size in scale/mod.rs:705-744 / strike.rs:319-321) and as the `target.len() < (w * h * 4)` check on png.rs:146. With the check passing on a wrapped value, EmitRgba8 then writes at unchecked indices `out = y*width*4 + x*4` (png.rs:487, 499-555) far past the under-allocated buffer, a heap out-of-bounds write driven entirely by font bytes.","fix":"Compute the size with checked u64/usize arithmetic (w as u64 * h as u64 * 4) and reject the image with DecodeError::LimitExceeded if it overflows usize or exceeds a sane maximum, before any allocation or emit. Apply the same to BitmapFormat::buffer_size.","locations":[{"ref":"src/scale/bitmap/png.rs:146-148","code":"  146 |     if target.len() < (w * h * 4) as usize {\n  147 |         return Err(DecodeError::LimitExceeded);\n  148 |     }","lines":3},{"ref":"src/scale/bitmap/png.rs:485-557","code":"  485 |         use ColorType::*;\n  486 |         let src = source;\n  487 |         let mut out = y * width * 4 + x * 4;\n  488 |         let mut i = 0;\n  489 |         match state.header.color_type {\n  490 |             Indexed => {\n  491 |                 let palette = state.palette;\n  492 |                 let trans = state.trans;\n  493 |                 let palette_len = palette.len();\n  494 |                 let trans_len = trans.len();\n  495 | base_w * base_h * 4) as usize` in u32 arithmetic, where base_w/base_h come from `total_bounds.width()/height().ceil()` of glyph outline points (mod.rs:911-912). Degenerate/huge outline coordinates from a crafted font yield large base_w/base_h whose product overflows u32, under-allocating image.data. bitmap::blit then composites layers into it; blit indexes `dst_row[dx+i]` without a final bounds check tied to this size, enabling an out-of-bounds write.","fix":"Compute base_w/base_h product with checked u64 arithmetic and bail out (return false) on overflow or an unreasonable size before resizing image.data.","locations":[{"ref":"src/scale/mod.rs:906-918","code":"  906 |                         let total_bounds = outline.bounds();\n  907 | \n  908 |                         // need to take offset into account when placing glyph\n  909 |                         let base_x = (total_bounds.min.x + self.offset.x).floor() as i32;\n  910 |                         let base_y = (total_bounds.min.y + self.offset.y).ceil() as i32;\n  911 |                         let base_w = total_bounds.width().ceil() as u32;\n  912 |                         let base_h = total_bounds.height().ceil() as u32;\n  913 | \n  914 |                         image.data.resize((base_w * base_h * 4) as usize, 0);\n  915 |                         image.placement.left = base_x;\n  916 |                         image.placement.top = base_h as i32 + base_y;\n  917 |                         image.placement.width = total_bounds.width().ceil() as u32;\n  918 |                         image.placement.height = total_bounds.height().ceil() as u32;","lines":13}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"kerx Format4::next computes `let diff = index - state.mark;` with two usize values. state.mark is set from a prior glyph index, but the caller controls iteration order/indices; if state.mark > index this underflows and panics in debug builds before the `diff < 255` guard can help.","fix":"Use index.checked_sub(state.mark) and skip the action when None.","locations":[{"ref":"src/internal/aat.rs:1476-1483","code":" 1476 |                         if let Some((x, y)) =\n 1477 |                             self.anchor_offset(mark_index, state.mark_id, cur_index, glyph_id)\n 1478 |                         {\n 1479 |                             let diff = index - state.mark;\n 1480 |                             if diff < 255 {\n 1481 |                                 f(index, diff, x, y);\n 1482 |                             }\n 1483 |                         }","lines":8}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"at::coverage and at::fast_coverage format 2 return `base + glyph_id - start` / `base + (glyph_id - start)` as u16. base, glyph_id and start are all u16; the addition can overflow and (although the binary search guarantees glyph_id >= start) the additions can still overflow u16, panicking in debug builds. fast_coverage performs these with unchecked reads but the index value math is the concern.","fix":"Compute the coverage index using wider arithmetic (u32) and validate it fits in u16, or use wrapping/saturating semantics deliberately with a comment.","locations":[{"ref":"src/internal/at.rs:863-868","code":"  863 |             } else if glyph_id > b.read_unchecked::<u16>(rec + 2) {\n  864 |                 l = i + 1;\n  865 |             } else {\n  866 |                 let base = b.read_unchecked::<u16>(rec + 4);\n  867 |                 return Some(base + glyph_id - start);\n  868 |             }","lines":6},{"ref":"src/internal/at.rs:907-914","code":"  907 |             let start = unsafe { b.read_unchecked::<u16>(rec) };\n  908 |             if glyph_id < start {\n  909 |                 h = i;\n  910 |             } else if glyph_id > unsafe { b.read_unchecked::<u16>(rec + 2) } {\n  911 |                 l = i + 1;\n  912 |             } else {\n  913 |                 let base = unsafe { b.read_unchecked::<u16>(rec + 4) };\n  914 |                 return Some(base + (glyph_id - start));","lines":8}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"cmap::enumerate format 12 computes the glyph id as `(offset + codepoint - start) as u16` where offset, codepoint, start are u32 read from the font. A malformed group with offset+codepoint near u32::MAX overflows in debug builds (panic). map() format 12 uses the equivalent `codepoint - start + delta` with the same concern.","fix":"Use wrapping_add/wrapping_sub deliberately (the result is truncated to u16 anyway) or validate the group ranges.","locations":[{"ref":"src/internal/cmap.rs:180-184","code":"  180 |             for codepoint in start..=end {\n  181 |                 let id = (offset + codepoint - start) as u16;\n  182 |                 if id != 0 {\n  183 |                     f(codepoint, id);\n  184 |                 }","lines":5},{"ref":"src/internal/cmap.rs:97-99","code":"   97 |             } else {\n   98 |                 let delta = unsafe { b.read_unchecked::<u32>(rec + 8) };\n   99 |                 return Some((codepoint - start + delta) as u16);","lines":3}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"xmtx::advance: when long_metric_count == 0 and glyph_id (always >= 0) is not < 0, the else branch computes `(long_metric_count - 1) as usize * 4`, underflowing u16 to 0xFFFF and panicking in debug builds. In release it wraps to a huge offset and read_u16 safely returns 0. long_metric_count comes from hhea/vhea num_long_metrics (untrusted).","fix":"Special-case long_metric_count == 0 (return 0) before subtracting, or use saturating_sub.","locations":[{"ref":"src/internal/xmtx.rs:11-16","code":"   11 |     let offset = if glyph_id < long_metric_count {\n   12 | pe":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In FeatureStore::custom_masks the substitution mask is computed twice. Lines 168-171 build `sub` from\n`self.groups.basic` and, for RTL runs, OR in `self.groups.rtl` (the rtlm feature). That value is then\nimmediately discarded: line 172 shadows `sub` with a fresh result from `custom_masks_for_stage(... self.groups.basic ...)`,\nwhich starts again from `basic` only and never includes `groups.rtl`. As a result, when the caller supplies any\ncustom feature settings, the RTL mirroring substitution feature (rtlm) is silently dropped for right-to-left text,\nproducing incorrect shaping (e.g. wrong mirrored glyphs). The first computation is pure dead code, and the RTL\ndirection argument to custom_masks_for_stage is effectively ignored.","fix":"Pass the direction-adjusted base mask into custom_masks_for_stage: compute `let mut base = self.groups.basic; if dir == Direction::RightToLeft { base |= self.groups.rtl; }` and use `base` as the third argument, then drop the first dead `sub` computation.","locations":[{"ref":"src/shape/at.rs:161-185","code":"  161 |     ) -> (FeatureMask, FeatureMask) {\n  162 |         let sub_count = self.sub_features.len();\n  163 |         sub_args.clear();\n  164 |         sub_args.resize(sub_count, 0);\n  165 |         let pos_count = self.pos_features.len();\n  166 |         pos_args.clear();\n  167 |         pos_args.resize(pos_count, 0);\n  168 |         let mut sub = self.groups.basic;\n  169 |         if dir == Direction::RightToLeft {\n  170 |             sub |= self.groups.rtl;\n  171 |         }\n  172 |         let sub = Self::custom_masks_for_stage(\n  173 |             &self.sub_features,\n  174 |             features,\n  175 |             self.groups.basic,\n  176 |             sub_args.as_mut_slice(),\n  177 |         );\n  178 |         let pos = Self::custom_masks_for_stage(\n  179 |             &self.pos_features,\n  180 |             features,\n  181 |             self.groups.position,\n  182 |             pos_args.as_mut_slice(),\n  183 |         );\n  184 |         (sub, pos)\n  185 |     }","lines":25}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Range accumulation for multi-element runs is computed incorrectly in the reordering helpers. When extending an\nexisting range the code writes `r.start..i - r.start + 1`, but the end of the range must be `i + 1`. For example\nwith an existing range starting at 2 and a new index i=4 this yields `2..3` (length 1) instead of `2..5` (length 3),\nand for larger gaps it can even produce a start > end (which panics when iterated as a Range, or silently yields an\nempty range). This corrupts VPre/VMPre/Anusvara reordering for Myanmar and other complex/Indic scripts. The same\nbroken pattern is duplicated in reorder_myanmar (vpre and anusvara) and reorder_complex (vpre and vmpre).","fix":"Replace `Some(r) => Some(r.start..i - r.start + 1)` with `Some(r) => Some(r.start..i + 1)` in all four sites (these runs are contiguous, so extending the end to i+1 is the intended behavior).","locations":[{"ref":"src/shape/buffer.rs:472-475","code":"  472 |             anus = match anus {\n  473 |                 Some(r) => Some(r.start..i - r.start + 1),\n  474 |                 None => Some(i..i + 1),\n  475 |             };","lines":4},{"ref":"src/shape/buffer.rs:494-497","code":"  494 |             vpre = match vpre {\n  495 |                 Some(r) => Some(r.start..i - r.start + 1),\n  496 |                 None => Some(i..i + 1),\n  497 |             };","lines":4},{"ref":"src/shape/buffer.rs:591-594","code":"  591 |                 vpre = match vpre {\n  592 |                     Some(r) => Some(r.start..i - r.start + 1),\n  593 |                     None => Some(i..i + 1),\n  594 |                 };","lines":4},{"ref":"src/shape/buffer.rs:597-601","code":"  597 |             VMPre => {\n  598 |                 vmpre = match vmpre {\n  599 |                     Some(r) => Some(r.start..i - r.start + 1),\n  600 |                     None => Some(i..i + 1),\n  601 |                 };","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Binary search bug in the EBLC/CBLC index sub-table format 4 lookup. On the `Greater` branch the\nlow bound is updated with `l = i + i` instead of `l = i + 1`. This makes the search incorrect for\nall non-zero midpoints and, critically, when `i == 0` and `glyph_id > id`, `l` stays 0 so the\nmidpoint never advances and the `while l < h` loop never terminates: a malformed/crafted font with\nan index format 4 sub-table can cause an infinite loop (hang / DoS) while resolving a bitmap glyph.","fix":"Change `Greater => l = i + i,` to `Greater => l = i + 1,`.","locations":[{"ref":"src/strike.rs:626-648","code":"  626 |             4 => {\n  627 |                 let mut l = 0;\n  628 |                 let mut h = d.read::<u32>(base)? as usize;\n  629 |                 while l < h {\n  630 |                     use core::cmp::Ordering::*;\n  631 |                     let i = (l + h) / 2;\n  632 |                     let rec = base + i * 4;\n  633 |                     let id = d.read::<u16>(rec)?;\n  634 |                     match glyph_id.cmp(&id) {\n  635 |                         Less => h = i,\n  636 |                         Greater => l = i + i,\n  637 |                         Equal => {\n  638 |                             let offset1 = d.read::<u16>(rec + 2)? as u32;\n  639 |                             let offset2 = d.read::<u16>(rec + 6)? as u32;\n  640 |                             if offset2 <= offset1 {\n  641 |                                 return None;\n  642 |                             }\n  643 |                             loc.offset = image_offset + offset1;\n  644 |                             loc.size = offset2 - offset1;\n  645 |                             return Some(loc);\n  646 |                         }\n  647 |                     }\n  648 |                 }","lines":23}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"cmap::map format 4 rejects codepoint with `if codepoint >= 65535`, which excludes U+FFFF. In OpenType format 4 the final segment is required to map endCode 0xFFFF, so any glyph legitimately mapped at U+FFFF can never be returned. The bound should be `> 0xFFFF` (then cast), matching the enumerate() path which iterates inclusive ranges up to end.","fix":"Change the guard to `if codepoint > 0xFFFF { return None; }`.","locations":[{"ref":"src/internal/cmap.rs:44-48","code":"   44 |     if format == 4 {\n   45 |         if codepoint >= 65535 {\n   46 |             return None;\n   47 |         }\n   48 |         let c = codepoint as u16;","lines":5}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Fvar::get_instance reads the PostScript name id at the absolute table offset `ps_name_offset` (= 4 + axis_count*4) instead of relative to the instance record at `offset`. It should be `b.read::<u16>(offset + ps_name_offset)`. As written it reads bytes from the fvar header region, so postscript_name_id is essentially always wrong whenever the branch is taken.","fix":"Read at `offset + ps_name_offset` so the id is taken from the instance record.","locations":[{"ref":"src/internal/var.rs:95-103","code":"   95 |         let offset = base + index as usize * self.inst_size as usize;\n   96 |         let name_id = b.read::<u16>(offset)?;\n   97 |         let values = b.read_array::<Fixed>(offset + 4, self.axis_count as usize)?;\n   98 |         let ps_name_offset = 4 + self.axis_count as usize * 4;\n   99 |         let postscript_name_id = if ps_name_offset == self.inst_size as usize - 2 {\n  100 |             b.read::<u16>(ps_name_offset)\n  101 |         } else {\n  102 |             None\n  103 |         };","lines":9}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`FontCache` only advances `self.epoch` on a cache miss, never on a hit. On a hit the touched\nentry's epoch is set to the current (unchanged) epoch, so repeatedly re-accessing the same few\nentries does not make them strictly more-recently-used than other entries sharing that epoch value.\nEviction (`find` picks the entry with the lowest epoch) can therefore evict an entry that was just\nused in preference to a truly older one, weakening the LRU guarantee.","fix":"Increment `self.epoch` (or use a separate monotonic access counter) on every access including hits, and stamp the touched entry with the new value.","locations":[{"ref":"src/cache.rs:43-74","code":"   43 |     pub fn get<'a>(\n   44 |         &'a mut self,\n   45 |         font: &FontRef,\n   46 |         id_override: Option<[u64; 2]>,\n   47 |         mut f: impl FnMut(&FontRef) -> T,\n   48 |     ) -> ([u64; 2], &'a T) {\n   49 |         let id = id_override.unwrap_or([font.key.value(), u64::MAX]);\n   50 |         let (found, index) = self.find(id);\n   51 |         if found {\n   52 |             let entry = &mut self.entries[index];\n   53 |             entry.epoch = self.epoch;\n   54 |             (entry.id, &entry.data)\n   55 |         } else {\n   56 |             self.epoch += 1;\n   57 |             let data = f(font);\n   58 |             if index == self.entries.len() {\n   59 |                 self.entries.push(Entry {\n   60 |                     epoch: self.epoch,\n   61 |                     id,\n   62 |                     data,\n   63 |                 });\n   64 |                 let entry = self.entries.last().unwrap();\n   65 |                 (id, &entry.data)\n   66 |             } else {\n   67 |                 let entry = &mut self.entries[index];\n   68 |                 entry.epoch = self.epoch;\n   69 |                 entry.id = id;\n   70 |                 entry.data = data;\n   71 |                 (id, &entry.data)\n   72 |             }\n   73 |         }\n   74 |     }","lines":32},{"ref":"src/cache.rs:76-93","code":"   76 |     fn find(&self, id: [u64; 2]) -> (bool, usize) {\n   77 |         let mut lowest = 0;\n   78 |         let mut lowest_epoch = self.epoch;\n   79 |         for (i, entry) in self.entries.iter().enumerate() {\n   80 |             if entry.id == id {\n   81 |                 return (true, i);\n   82 |             }\n   83 |             if entry.epoch < lowest_epoch {\n   84 |                 lowest_epoch = entry.epoch;\n   85 |                 lowest = i;\n   86 |             }\n   87 |         }\n   88 |         if self.entries.len() < self.max_entries {\n   89 |             (false, self.entries.len())\n   90 |         } else {\n   91 |             (false, lowest)\n   92 |         }\n   93 |     }","lines":18}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"fixed::Div<i32> for Fixed uses plain `self.0 / rhs`, which panics on rhs == 0 and on i32::MIN / -1 (overflow). Unlike fixed::div() which guards b == 0, this operator does not. If any caller divides a Fixed by an attacker-influenced i32 of 0 it panics. (No such call exists in this slice, hence low.)","fix":"Guard rhs == 0 (return MAX/0) and use checked/wrapping division to match div()'s defensive behavior.","locations":[{"ref":"src/internal/fixed.rs:104-110","code":"  104 | impl Div<i32> for Fixed {\n  105 |     type Output = Self;\n  106 |     #[inline(always)]\n  107 |     fn div(self, rhs: i32) -> Self {\n  108 |         Self(self.0 / rhs)\n  109 |     }\n  110 | }","lines":7}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In blit's full-opacity branch, `dst_row[dx + 3] = 255` is written twice (lines 61 and 63) around the RGB copy, the second write being redundant. Additionally the opacity test `a >= 255` is computed as `(src*color_a) >> 8`, which for fully opaque src=255 and color_a=255 yields 254, not 255, so the fast path is effectively never taken for normal opaque pixels and every pixel goes through the slower blend branch. This is a correctness/perf quirk: opaque glyph pixels are blended (and slightly darkened) instead of copied.","fix":"Remove the duplicate `dst_row[dx + 3] = 255`. Use a rounding/division by 255 (e.g. `(src*color_a + 127)/255` or `(x*a + a) >> 8` style) so full opacity reaches 255 and the copy fast-path triggers.","locations":[{"ref":"src/scale/bitmap/mod.rs:59-74","code":"   59 |             let a = (src_row[sx] as u32 * color_a) >> 8;\n   60 |             if a >= 255 {\n   61 |                 dst_row[dx + 3] = 255;\n   62 |                 dst_row[dx..(dx + 3)].copy_from_slice(&color[..3]);\n   63 |                 dst_row[dx + 3] = 255;\n   64 |             } else if a != 0 {\n   65 |                 let inverse_a = 255 - a;\n   66 |                 for i in 0..3 {\n   67 |                     let d = dst_row[dx + i] as u32;\n   68 |                     let c = ((inverse_a * d) + (a * color[i] as u32)) >> 8;\n   69 |                     dst_row[dx + i] = c as u8;\n   70 |                 }\n   71 |                 let d = dst_row[dx + 3] as u32;\n   72 |                 let c = ((inverse_a * d) + a * 255) >> 8;\n   73 |                 dst_row[dx + 3] = c as u8;\n   74 |             }","lines":16}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"normalize() with depth==16 and trunc_16==false (the non-truncating branch) does `dest.copy_from_slice(source)` on big-endian and a byte-swap on little-endian via `source.chunks(2).zip(dest.chunks_mut(2))`. The chunks(2) zip silently ignores a trailing odd byte and, more importantly, copy_from_slice requires dest.len()==source.len() or it panics. dest is the `out_line` slice of length `w*8` (extra_bytes - 2*pitch), while source is `line` of length pitch; for 16-bit these lengths differ, so the big-endian copy_from_slice path would panic. In the current code path decode() always sets trunc_16=true so this branch is unreachable, but the function is public-ish within the module and the mismatch is a latent panic.","fix":"Bound both slices to the same length (e.g. operate on `dest.get_mut(..source.len())?`) before copy_from_slice, mirroring the width-bounded handling used for the sub-byte depths.","locations":[{"ref":"src/scale/bitmap/png.rs:418-432","code":"  418 |     match depth {\n  419 |         16 => {\n  420 |             if trunc_16 {\n  421 |                 for (i, d) in dest.iter_mut().enumerate() {\n  422 |                     *d = source[i * 2];\n  423 |                 }\n  424 |             } else if IS_LITTLE_ENDIAN {\n  425 |                 for (s, d) in source.chunks(2).zip(dest.chunks_mut(2)) {\n  426 |                     d[1] = s[0];\n  427 |                     d[0] = s[1];\n  428 |                 }\n  429 |             } else {\n  430 |                 dest.copy_from_slice(source);\n  431 |             }\n  432 |         }","lines":15}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"ChainContext3 reads `input_count = c.read::<u16>()? as usize - 1` (at.rs:1562) without first checking the value is\nnon-zero. Context3 (at.rs:1413-1417) and RevChainContext1 guard the equivalent count, but ChainContext3 does not:\nwhen a malformed font stores an input glyph count of 0, `0 - 1` underflows. In release this becomes usize::MAX and\nthe subsequent `read_array::<u16>(input_count)` returns None via the `?` (so no OOB read occurs), but in a debug\nbuild this panics with 'attempt to subtract with overflow'. Inconsistent with the sibling format handlers.","fix":"Match the Context3/RevChainContext1 pattern: read the raw count, return None (or treat as no-op) if it is 0, then subtract 1.","locations":[{"ref":"src/shape/at.rs:1562-1571","code":" 1562 |                 let input_count = c.read::<u16>()? as usize - 1;\n 1563 |                 c.skip(2);\n 1564 |                 let mut input_end = cur;\n 1565 |                 if input_count != 0 {\n 1566 |                     let input = c.read_array::<u16>(input_count)?;\n 1567 |                     input_end = self.match_sequence(cur, input_count, |i, id| {\n 1568 |                         self.coverage(base + input.get_or(i, 0) as usize, id)\n 1569 |                             .is_some()\n 1570 |                     })?;\n 1571 |                 }","lines":10}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`BitmapStrikes::find_by_nearest_ppem` assigns `best = Some(strike)` unconditionally on line 177\nbefore the size comparison, then reassigns it inside the `if strike_ppem > best_size` block. The\nunconditional assignment is dead with respect to `best_size` tracking and means that when a later\nstrike has a smaller ppem than the current best (but still contains the glyph) `best` is overwritten\nwith the smaller strike while `best_size` keeps the old larger value, so the function can return a\nstrike that is not the nearest/largest as documented.","fix":"Remove the unconditional `best = Some(strike);` on line 177 and only update `best` together with `best_size` inside the comparison block.","locations":[{"ref":"src/strike.rs:166-188","code":"  166 |     pub fn find_by_nearest_ppem(&self, ppem: u16, glyph_id: GlyphId) -> Option<BitmapStrike<'a>> {\n  167 |         let mut best = None;\n  168 |         let mut best_size = 0;\n  169 |         for i in 0..self.len {\n  170 |             let strike = match self.get(i) {\n  171 |                 Some(strike) => strike,\n  172 |                 _ => continue,\n  173 |             };\n  174 |             if !strike.contains(glyph_id) {\n  175 |                 continue;\n  176 |             }\n  177 |             best = Some(strike);\n  178 |             let strike_ppem = strike.ppem();\n  179 |             if strike_ppem > best_size {\n  180 |                 best = Some(strike);\n  181 |                 best_size = strike_ppem;\n  182 |             }\n  183 |             if strike_ppem >= ppem {\n  184 |                 return Some(strike);\n  185 |             }\n  186 |         }\n  187 |         best\n  188 |     }","lines":23}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_coverage` (EBLC/CBLC, non-sbix path) returns `None` (treated as \"not covered\" by\n`contains`) when the glyph id is below the first range entry, but it `continue`s when above an\nentry's last id. If a range's `last` is read but a subsequent range starts higher than glyph_id, the\nloop returns `None` on the next `first` check - correct - however the initial `glyph_id < b.read(40)`\nrange-min/max guard at lines 514 returns `None` (not `Some(false)`), so a glyph outside the strike's\ndeclared min/max is indistinguishable from a parse error. Minor, but the `None`-vs-`Some(false)`\ndistinction is inconsistent with the sbix branch which always returns `Some(...)`.","fix":"Return `Some(false)` for the in-bounds-but-not-found cases so `contains` reports coverage deterministically; reserve `None` for genuine parse failures.","locations":[{"ref":"src/strike.rs:509-532","code":"  509 | fn get_coverage(table: &[u8], strike_base: usize, is_sbix: bool, glyph_id: u16) -> Option<bool> {\n  510 |     if is_sbix {\n  511 |         return Some(sbix_range(table, strike_base, glyph_id, 0).is_some());\n  512 |     }\n  513 |     let b = Bytes::with_offset(table, strike_base)?;\n  514 |     if glyph_id < b.read(40)? || glyph_id > b.read(42)? {\n  515 |         return None;\n  516 |     }\n  517 |     let count = b.read::<u32>(8)? as usize;\n  518 |     let array_offset = b.read::<u32>(0)? as usize;\n  519 |     let b = Bytes::with_offset(table, array_offset)?;\n  520 |     for i in 0..count {\n  521 |         let offset = i * 8;\n  522 |         let first = b.read::<u16>(offset)?;\n  523 |         if glyph_id < first {\n  524 |             return None;\n  525 |         }\n  526 |         if glyph_id > b.read::<u16>(offset + 2)? {\n  527 |             continue;\n  528 |         }\n  529 |         return Some(true);\n  530 |     }\n  531 |     None\n  532 | }","lines":24}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In parse_standard_tail the medial-consonant sequence accepts MBlw twice (lines 182-183) and never accepts a second distinct class. The USE specification medial sequence is `MPre? MAbv? MBlw? MPst?` (each at most once). The duplicated `self.accept(MBlw)?` is a copy-paste slip: it allows two below-base medials to be absorbed into one cluster, a deviation from the spec. Impact is limited to mis-clustering of malformed/rare medial sequences rather than a crash.","fix":"Remove the duplicate `self.accept(MBlw)?` on line 183 (or replace it with the intended class if a second medial slot was meant).","locations":[{"ref":"src/text/cluster/complex.rs:180-184","code":"  180 |         self.accept(MPre)?;\n  181 |         self.accept(MAbv)?;\n  182 |         self.accept(MBlw)?;\n  183 |         self.accept(MBlw)?;\n  184 |         self.accept(MPst)?;","lines":5}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"at::lookup_data ignores the validity of the extension subtable kind remapping in a subtle way: for non-extension lookups it reads `kind` from base, but `is_ext` only re-reads kind when count > 0. If an extension lookup (kind 7/9) has count == 0, the raw extension kind (7 or 9) falls through to the match arms; for stage 0, kind 7 is unmatched (returns None - fine), but for stage 1 kind 7 maps to Context and kind 9 maps to None - so an empty stage-1 extension PairPos/etc. lookup is silently misclassified as Context. This is a correctness/robustness gap rather than a crash.","fix":"When is_ext is true but count == 0, return None (an extension lookup with no subtables is meaningless) rather than letting the raw 7/9 reach the kind match.","locations":[{"ref":"src/internal/at.rs:571-602","code":"  571 |     let is_sub = stage == 0;\n  572 |     let subtables = base + 6;\n  573 |     let is_ext = (is_sub && kind == 7) || (!is_sub && kind == 9);\n  574 |     if is_ext && count > 0 {\n  575 |         let s = base + b.read::<u16>(subtables)? as usize;\n  576 |         kind = b.read::<u16>(s + 2)? as u8;\n  577 |     }\n  578 |     use LookupKind::*;\n  579 |     let kind = if stage == 0 {\n  580 |         match kind {\n  581 |             1 => SingleSub,\n  582 |             2 => MultiSub,\n  583 |             3 => AltSub,\n  584 |             4 => LigSub,\n  585 |             5 => Context,\n  586 |             6 => ChainContext,\n  587 |             8 => RevChainContext,\n  588 |             _ => return None,\n  589 |         }\n  590 |     } else {\n  591 |         match kind {\n  592 |             1 => SingleAdj,\n  593 |             2 => PairAdj,\n  594 |             3 => Cursive,\n  595 |             4 => MarkToBase,\n  596 |             5 => MarkToLig,\n  597 |             6 => MarkToMark,\n  598 |             7 => Context,\n  599 |             8 => ChainContext,\n  600 |             _ => return None,\n  601 |         }\n  602 |     };","lines":32}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"png.rs decode() handles a zero-width or zero-height image by returning `Ok((w, h, false))` (lines 140-142) without writing anything to target, while State::new likewise early-returns for w==0||h==0. The public wrapper bitmap::decode_png maps this to Some((0,0)) success. Callers in scale_bitmap_impl resize image.data to buffer_size(0,0)=0 and treat the decode as successful, producing a zero-size image silently. This is arguably acceptable, but combined with strike.rs Bitmap::decode returning `true` for an empty PNG, an empty/garbage embedded bitmap is reported as a valid rendered glyph rather than falling through to the next Source.","fix":"Decide explicitly whether a 0x0 image should be a decode failure (return None/Err) so the renderer can fall back to another source, and document the chosen behavior.","locations":[{"ref":"src/scale/bitmap/png.rs:138-142","code":"  138 |     let w = state.header.width;\n  139 |     let h = state.header.height;\n  140 |     if w == 0 || h == 0 {\n  141 |         return Ok((w, h, false));\n  142 |     }","lines":5},{"ref":"src/scale/bitmap/mod.rs:12-16","code":"   12 | pub fn decode_png(data: &[u8], scratch: &mut Vec<u8>, target: &mut [u8]) -> Option<(u32, u32)> {\n   13 |     png::decode(data, scratch, target)\n   14 |         .map(|(w, h, _)| (w, h))\n   15 |         .ok()\n   16 | }","lines":5}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"apply_contextual ignores the result of nested-lookup application for determining success per the GSUB/GPOS spec.\nThe commented-out code (at.rs:1362-1366, 1404-1408, 1477-1481, 1542-1544) shows the intended `if let Some(true) =\n... { return Some(true) }` was replaced with an unconditional `self.apply_contextual(...); return Some(true);`. This\nmeans a contextual rule that matches but whose nested lookups all fail still reports success and advances the cursor\nto `end`, potentially skipping glyphs that should have been retried by a later rule. Behavior diverges from HarfBuzz\nand from this crate's own original intent.","fix":"Return the actual `applied` result from apply_contextual to the subtable match arms and only advance/return success when a nested lookup actually applied, matching the commented-out original logic.","locations":[{"ref":"src/shape/at.rs:1700-1714","code":" 1700 |     fn apply_contextual(&mut self, mut c: Stream<'a>, count: usize, end: usize) -> Option<bool> {\n 1701 |         let mut applied = false;\n 1702 |         let start = self.s.cur;\n 1703 |         for _ in 0..count {\n 1704 |             let first = c.read::<u16>()? as usize;\n 1705 |             let lookup = c.read::<u16>()?;\n 1706 |             if let Some(true) = self.apply_nested(lookup, start, start, end, first) {\n 1707 |                 applied = true;\n 1708 |             }\n 1709 |         }\n 1710 |         if applied {\n 1711 |             self.s.cur = end;\n 1712 |         }\n 1713 |         Some(applied)\n 1714 |     }","lines":15},{"ref":"src/shape/at.rs:1345-1367","code":" 1345 |                 for i in 0..rule_count {\n 1346 |                     let rule_offset = offset + rule_offsets.get(i)? as usize;\n 1347 |                     let mut c = b.stream_at(rule_offset)?;\n 1348 |                     let mut input_count = c.read::<u16>()? as usize;\n 1349 |                     let subst_count = c.read::<u16>()? as usize;\n 1350 |                     let mut input_end = cur;\n 1351 |                     if input_count > 1 {\n 1352 |                         input_count -= 1;\n 1353 |                         let seq = c.read_array::<u16>(input_count)?;\n 1354 |                         if let Some(end) = self\n 1355 |                             .match_sequence(cur, input_count, |i, id| id == seq.get(i).unwrap_or(0))\n 1356 |                         {\n 1357 |                             input_end = end;\n 1358 |                         } else {\n 1359 |                             continue;\n 1360 |                         }\n 1361 |                     }\n 1362 |                     // if let Some(true) = self.apply_contextual(c, subst_count, input_end) {\n 1363 |                     //     return Some(true);\n 1364 |                     // }\n 1365 |                     self.apply_contextual(c, subst_count, input_end);\n 1366 |                     return Some(true);\n 1367 |                 }","lines":23}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the Myanmar Kinzi handling the three `self.advance()` calls (lines 128-130) discard the returned `Option<()>`, unlike every other call site which uses `?`. If `advance` hits the MAX_CLUSTER_SIZE cap or end-of-input mid-Kinzi it sets `done`/returns None, but parsing continues and then re-reads `self.kind()` (line 138) off a token that may not have been advanced as expected. The clone-lookahead guarantees the three chars exist, so the only realistic trigger is the cluster-size cap, making this low impact, but the inconsistency is a latent bug.","fix":"Propagate the result with `?` (e.g. `self.advance()?;`) for the three Kinzi advances, or explicitly bail out of `parse` when an advance fails.","locations":[{"ref":"src/text/cluster/myanmar.rs:118-137","code":"  118 |                 match self.s.cur.ch as u32 {\n  119 |                     0x1004 | 0x101B | 0x105A => {\n  120 |                         let mut iter = self.s.chars.clone();\n  121 |                         if let Some(b) = iter.next() {\n  122 |                             if b.ch == '\\u{103A}' {\n  123 |                                 if let Some(c) = iter.next() {\n  124 |                                     if c.ch == '\\u{1039}' {\n  125 |                                         self.cluster.push(&self.s.cur, ShapeClass::Kinzi);\n  126 |                                         self.cluster.push(&b, ShapeClass::Kinzi);\n  127 |                                         self.cluster.push(&c, ShapeClass::Kinzi);\n  128 |                                         self.advance();\n  129 |                                         self.advance();\n  130 |                                         self.advance();\n  131 |                                     }\n  132 | = name.chars().eq(\"Apple Color Emoji\".chars());\n   40 |             }\n   41 |         } else {\n   42 |             let cblc = font.table_offset(raw_tag(b\"CBLC\"));\n   43 |             if cblc != 0 {\n   44 |                 let cbdt = font.table_offset(raw_tag(b\"CBDT\"));\n   45 |                 if cbdt != 0 {\n   46 |                     color_bitmaps = (cblc, cbdt);\n   47 |                 }\n   48 |             }\n   49 |         }","lines":17}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Fvar::get_axis_by_tag does a linear scan reading the axis tag for each axis (O(n) reads) then calls get_axis which re-reads the same record. The double read of the matched record is minor, but axis tags are not sorted so binary search is not applicable; the redundant re-read in get_axis is avoidable.","fix":"Inline the field reads for the matched axis instead of calling get_axis again, or have get_axis take an already-computed offset.","locations":[{"ref":"src/internal/var.rs:72-83","code":"   72 |     pub fn get_axis_by_tag(&self, tag: RawTag) -> Option<VarAxis> {\n   73 |         let b = &self.data;\n   74 |         let base = self.axis_offset as usize;\n   75 |         let axis_size = self.axis_size as usize;\n   76 |         for i in 0..self.axis_count as usize {\n   77 |             let tag_offset = base + i * axis_size;\n   78 |             if b.read_u32(tag_offset) == Some(tag) {\n   79 |                 return self.get_axis(i as u16);\n   80 |             }\n   81 |         }\n   82 |         None\n   83 |     }","lines":12}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"sample_dir recomputes the per-output-column weights once but re-evaluates the input closure and accumulation for every row inside the column loop, which is correct; however for channels==1 and channels==4 the resample helper builds two full closures and runs two passes allocating nothing extra - fine - but the gaussian filter case constructs a fresh boxed-equivalent closure `&|x| gaussian(x, 0.5)` per resize call and `bicubic` recomputes constant terms (b=0, c=0.5 and the derived polynomial coefficients) on every invocation rather than as constants. In the hot rasterization/resampling loop these recomputations and the per-pixel float divisions add avoidable work.","fix":"Precompute the cubic coefficients as constants and hoist invariant computations out of the per-pixel filter functions. Minor; only worth doing if resampling shows up in profiles.","locations":[{"ref":"src/scale/bitmap/mod.rs:377-392","code":"  377 | fn bicubic(x: f32) -> f32 {\n  378 |     let a = x.abs();\n  379 |     let b = 0.;\n  380 |     let c = 0.5;\n  381 |     let k = if a < 1. {\n  382 |         (12. - 9. * b - 6. * c) * a.powi(3) + (-18. + 12. * b + 6. * c) * a.powi(2) + (6. - 2. * b)\n  383 |     } else if a < 2. {\n  384 |         (-b - 6. * c) * a.powi(3)\n  385 |             + (6. * b + 30. * c) * a.powi(2)\n  386 |             + (-12. * b - 48. * c) * a\n  387 |             + (8. * b + 24. * c)\n  388 |     } else {\n  389 |         0.\n  390 |     };\n  391 |     (k / 6.).abs()\n  392 | }","lines":16},{"ref":"src/scale/bitmap/mod.rs:182-193","code":"  182 |         Gaussian => resample(\n  183 |             image,\n  184 |             width,\n  185 |             height,\n  186 |             channels,\n  187 |             target,\n  188 |             target_width,\n  189 |             target_height,\n  190 |             scratch,\n  191 |             3.,\n  192 |             &|x| gaussian(x, 0.5),\n  193 |         ),","lines":12}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"apply_skip_state / update_glyphs_skip recomputes the `skip` flag for the *entire* buffer (0..glyphs.len()) every\ntime a lookup's skip state differs from the buffer's current skip_state (at.rs:732-769, default range when called\nfrom apply_skip_state). With many lookups whose ignore/mark settings alternate, this is O(lookups * glyphs) per\nshaping pass and can become quadratic on long runs with rich GSUB/GPOS tables. The per-glyph reclassification also\nre-reads GDEF classes already stored on the glyph.","fix":"Only recompute skip flags over the active buffer_range rather than the whole buffer when applying a lookup, and/or cache the last skip_state per range. Reuse the already-computed g.class instead of re-deriving it.","locations":[{"ref":"src/shape/at.rs:732-769","code":"  732 |     fn apply_skip_state(&mut self) {\n  733 |         if self.s.skip_state == self.buf.skip_state {\n  734 |             return;\n  735 |         }\n  736 |         self.buf.skip_state = self.s.skip_state;\n  737 |         self.update_glyphs_skip(None);\n  738 |     }\n  739 | \n  740 |     fn update_glyphs_skip(&mut self, range: Option<Range<usize>>) {\n  741 |         let range = range.unwrap_or(0..self.buf.glyphs.len());\n  742 |         let ss = &self.s.skip_state;\n  743 |         let mask = ss.mask;\n  744 |         if ss.mark_check != 0 {\n  745 |             if ss.mark_set != 0 {\n  746 |                 for g in self.buf.glyphs[range].iter_mut() {\n  747 |                     g.skip = (ss.flags & (1 << g.class) != 0) || (g.mask & mask != mask);\n  748 |                     if !g.skip && g.class == 3 {\n  749 |                         g.skip = self.defs.mark_set_coverage(ss.mark_set, g.id).is_none();\n  750 |                     }\n  751 |                 }\n  752 |             } else {\n  753 |                 for g in self.buf.glyphs[range].iter_mut() {\n  754 |                     g.skip = (ss.flags & (1 << g.class) != 0) || (g.mask & mask != mask);\n  755 |                     if !g.skip && g.class == 3 {\n  756 |                         g.skip = g.mark_type != ss.mark_class;\n  757 |                     }\n  758 |                 }\n  759 |             }\n  760 |         } else if mask != 0 {\n  761 |             for g in self.buf.glyphs[range].iter_mut() {\n  762 |                 g.skip = (ss.flags & (1 << g.class) != 0) || (g.mask & mask != mask);\n  763 |             }\n  764 |         } else {\n  765 |             for g in self.buf.glyphs[range].iter_mut() {\n  766 |                 g.skip = ss.flags & (1 << g.class) != 0;\n  767 |             }\n  768 |         }\n  769 |     }","lines":38},{"ref":"src/shape/at.rs:985-994","code":"  985 |         self.s.skip_state = SkipState {\n  986 |             flags: lookup.ignored,\n  987 |             mask: lookup.mask,\n  988 |             mark_check: lookup.mark_check,\n  989 |             mark_class: lookup.mark_class,\n  990 |             mark_set: lookup.mark_set,\n  991 |         };\n  992 |         self.s.cur = cur;\n  993 |         self.s.end = end.unwrap_or(self.end);\n  994 |         self.apply_skip_state();","lines":10}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"pair_index performs a linear scan of the compose tables on every compose_pair call (COMPOSE0 has 212 entries, COMPOSE1 has 41). The tables are sorted by start codepoint and the scan early-exits on `c < start`, so it is bounded, but composition runs in a per-cluster hot loop (CharCluster::composed iterates all NFD chars) and a binary search would be strictly better for the common case of high codepoints late in the table.","fix":"Replace the linear scan in pair_index with a binary search over the range entries (each entry covers [start, start+len]), keeping the same return mapping.","locations":[{"ref":"src/text/compose.rs:64-90","code":"   64 | pub fn compose_pair(a: char, b: char) -> Option<char> {\n   65 |     if let Some(c) = compose_hangul(a, b) {\n   66 |         return Some(c);\n   67 |     }\n   68 |     let l = pair_index(a as u32, &COMPOSE0[..])?;\n   69 |     let r = pair_index(b as u32, &COMPOSE1[..])?;\n   70 |     let c = compose_index(l * COMPOSE1_COU
