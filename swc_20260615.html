is in fact reachable through an external call whose recording was suppressed. Self-recursion suppression is intentional (so a recursive-but-unused fn can be dropped), and an externally-called recursive fn would also have a non-self reference recorded, so this is likely safe; but the interaction between self-reference suppression and the `None => true` default is subtle and depends on every external reference being recorded elsewhere.","fix":"Add fixture coverage for recursive functions/classes that are (a) only self-referenced and unused, (b) self-referenced and externally called, to lock the behavior; document that `None => true` is sound only because all non-self references are recorded.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:405-447","code":"  405 |     /// Mark `id` as used\n  406 |     fn add(&mut self, id: Id, assign: bool) {\n  407 |         if id.0 == atom!(\"arguments\") {\n  408 |             self.scope.found_arguemnts = true;\n  409 |         }\n  410 | \n  411 |         if let Some(f) = &self.cur_fn_id {\n  412 |             if id == *f {\n  413 |                 return;\n  414 |             }\n  415 |         }\n  416 |         if let Some(f) = &self.cur_class_id {\n  417 |             if id == *f {\n  418 |                 return;\n  419 |             }\n  420 |         }\n  421 | \n  422 |         if self.scope.is_ast_path_empty() {\n  423 |             // Add references from top level items into graph\n  424 |             let idx = self.data.node(&id);\n  425 |             self.data.entries.insert(idx);\n  426 |         } else {\n  427 |             let mut scope = Some(&self.scope);\n  428 | \n  429 |             while let Some(s) = scope {\n  430 |                 for component in &s.ast_path {\n  431 |                     self.data.add_dep_edge(component, &id, assign);\n  432 |                 }\n  433 | \n  434 |                 if s.kind == ScopeKind::Fn && !s.ast_path.is_empty() {\n  435 |                     break;\n  436 |                 }\n  437 | \n  438 |                 scope = s.parent;\n  439 |             }\n  440 |         }\n  441 | \n  442 |         if assign {\n  443 |             self.data.used_names.entry(id).or_default().assign += 1;\n  444 |         } else {\n  445 |             self.data.used_names.entry(id).or_default().usage += 1;\n  446 |         }\n  447 |     }","lines":43},{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:694-713","code":"  694 |     fn can_drop_binding(&self, name: Id, is_var: bool) -> bool {\n  695 |         if !self.config.top_level {\n  696 |             if is_var {\n  697 |                 if !self.in_fn {\n  698 |                     return false;\n  699 |                 }\n  700 |             } else if !self.in_block_stmt {\n  701 |                 return false;\n  702 |             }\n  703 |         }\n  704 | \n  705 |         if self.config.top_retain.contains(&name.0) {\n  706 |             return false;\n  707 |         }\n  708 | \n  709 |         match self.data.used_names.get(&name) {\n  710 |             Some(v) => v.usage == 0 && v.assign == 0,\n  711 |             None => true,\n  712 |         }\n  713 |     }","lines":20}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`can_drop_assignment_to` only consults `used_names[name].usage == 0` (and that the name is resolved / not top-level / not retained). It does NOT consult `assign`. For a compound assignment such as `x += rhs` (handled at lines 547-556), the analyzer records both a usage and an assign for `x`. But for a plain `x = rhs` where `x` has zero further reads, the assignment is dropped even when there exist *other* plain assignments to the same `x` that are themselves not yet dropped and whose RHS the program relies on for ordering/observability via getters is not the concern here, but: dropping `x = sideEffectFreeRhs` is sound only if `x` is truly never c_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`visit_mut_assign_expr` saves `old = self.is_modifying`, sets it for the left, then on line 111 unconditionally sets `self.is_modifying = false` for the right and restores `old` afterwards. The intermediate `self.is_modifying = old` on line 109 is immediately overwritten by line 111, so it is dead. More importantly, forcing `is_modifying = false` for the RHS is correct only when entering from a non-modifying context; if this assignment is itself nested inside another modifying target context, the saved `old` (restored at 113) is the outer value, but the RHS was visited with `false` regardless. Likely intended but the redundant line 109 write is confusing/dead and should be removed.","fix":"Drop the redundant `self.is_modifying = old;` on line 109 (the value is overwritten before any use). Keep set-true around left, set-false around right.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/expr/mod.rs:105-114","code":"  105 |     fn visit_mut_assign_expr(&mut self, n: &mut AssignExpr) {\n  106 |         let old = self.is_modifying;\n  107 |         self.is_modifying = true;\n  108 |         n.left.visit_mut_with(self);\n  109 |         self.is_modifying = old;\n  110 | \n  111 |         self.is_modifying = false;\n  112 |         n.right.visit_mut_with(self);\n  113 |         self.is_modifying = old;\n  114 |     }","lines":10}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `optimize_member_expr`, object key folding builds the key for a numeric index via `Atom::from(i.to_string())` (line 913) but does not guard against non-integer indices the way array indexing does. For `{}.foo`-style access this is fine, but `KnownOp::Index(f64)` may carry a fractional value (e.g. `obj[0.5]`); `0.5_f64.to_string()` yields \"0.5\", which is correct, yet a value like `1e21` stringifies to Rust's \"1000000000000000000000\" while JS String(1e21) is \"1e+21\", so the looked-up key text diverges from the runtime property name. This can fold to the wrong property (or miss/incorrectly match a key) for large/!exponential numeric indexes.","fix":"Use the JS Number-to-String algorithm (the same routine used for codegen / `as_pure_string` of a Number) to derive the property key instead of Rust's `f64::to_string`, or bail out (return) when `i` is outside the safe integer range / not representable identically.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/expr/mod.rs:910-916","code":"  910 |         Expr::Object(ObjectLit { props, span }) => {\n  911 |             // get key\n  912 |             let key = match op {\n  913 |                 KnownOp::Index(i) => Atom::from(i.to_string()),\n  914 |                 KnownOp::IndexStr(key) if key != *\"yield\" && is_literal(props) => key,\n  915 |                 _ => return,\n  916 |             };","lines":7}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_template_element_from_raw`'s `read_escaped` handles `\\x00` followed by a digit specially (writes `\\x00`) but for `\\x000` (NUL escape followed by ASCII '0') the `pending` char '0' falls into the `_ => write!(buf, \"\\0\")` branch and is then appended, producing `\\00` followed by `0` = `\\000`, an octal-looking escape that is a SyntaxError in template literals. Narrow edge case but emits invalid output.","fix":"When `v == 0` and `pending` is a digit '0'..='9' (not only '1'..='9'), emit `\\x00` so the following digit cannot form an octal sequence.","locations":[{"ref":"crates/swc_ecma_codegen/src/lit.rs:1070-1102","code":"","lines":33}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"TsExportAssignment emits no terminating semicolon, whereas the structurally analogous TsImportEqualsDecl emits formatting_semi! (line 360) and span(self.span(), false)?;\n  691 |         Ok(())","lines":8}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"compress_undefined rewrites any identifier whose symbol is `undefined` into `void 0`, without checking that the identifier is the unresolved/global `undefined`. If the user shadows `undefined` with a local binding (legal outside strict mode, e.g. `function*(){ let undefined = 1; yield undefined; }`), this changes the yielded value from the local variable to the real `undefined`, altering semantics. Most other places in swc guard such rewrites with a `unresolved_ctxt` / global check.","fix":"Only rewrite when the ident is unresolved, e.g. `if &**sym == \"undefined\" && ident.ctxt == self.ctx.expr_ctx.unresolved_ctxt`.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/mod.rs:578-584","code":"  578 |     fn compress_undefined(&mut self, e: &mut Expr) {\n  579 |         if let Expr::Ident(Ident { span, sym, .. }) = e {\n  580 |             if &**sym == \"undefined\" {\n  581 |                 *e = *Expr::undefined(*span);\n  582 |             }\n  583 |         }\n  584 |     }","lines":7}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"valid_flag has a misplaced closing parenthesis: the `'d'` (Es2022) alternative is OR'd at the top level of the `if !(allowlist) || (es2022 && 'd')` test instead of being inside the negated allowlist group. As a result, for a `'d'` flag char the first operand `!(matches g/i/m || ...)` is already `true` (since `'d'` is not in the allowlist), so the whole condition is true and the function returns None. The `'d'` clause is therefore dead and `RegExp(\"a\",\"d\")` is never optimized to `/a/d` even on ES2022. The SAFETY comment on line 1086-1087 claims `'d'` is accepted, which is misleading.","fix":"Move the `'d'` alternative inside the parenthesized allowlist group: `if !(matches!(c.to_cha 19 | \n  120 |         node.visit_children_with(self);\n  121 | \n  122 |         self.is_interested = old;\n  123 |     }","lines":16}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ReactLikeVisitor` tracks `current_name` only from `VarDeclarator` (Pat::Ident) and `AssignExpr` with a simple `Ident` target. Assignments to member targets such as `module.exports = function App() {}` or `obj.Foo = () => <div/>` never set `current_name`, so a react-like component assigned to a member expression is not detected by the prefilter and `transform` returns early with no compilation in modes other than `all`/`annotation`. This is a silent functional gap, not just a missed optimization.","fix":"Either document that member-target assignments are intentionally unsupported by the prefilter, or extend `visit_assign_expr` to derive a name from member targets (e.g. the last property of `obj.Foo`).","locations":[{"ref":"crates/swc_ecma_react_compiler/src/prefilter.rs:91-109","code":"   91 |     fn visit_assign_expr(&mut self, expr: &swc::AssignExpr) {\n   92 |         if self.found {\n   93 |             return;\n   94 |         }\n   95 | \n   96 |         let name = match &expr.left {\n   97 |             swc::AssignTarget::Simple(swc::SimpleAssignTarget::Ident(ident)) => {\n   98 |                 Some(ident.id.sym.to_string())\n   99 |             }\n  100 |             _ => None,\n  101 |         };\n  102 | \n  103 |         let prev_name = self.current_name.take();\n  104 |         self.current_name = name;\n  105 | \n  106 |         expr.right.visit_with(self);\n  107 | \n  108 |         self.current_name = prev_name;\n  109 |     }","lines":19},{"ref":"crates/swc_ecma_react_compiler/src/prefilter.rs:123-160","code":"  123 |     fn visit_fn_expr(&mut self, expr: &swc::FnExpr) {\n  124 |         if self.found {\n  125 |             return;\n  126 |         }\n  127 | \n  128 |         if let Some(id) = &expr.iden t will (because the flag is now set) compute its own `collect_decls` and mark them. This chain is correct only because every enclosing scope on the path is a `Function`/`ArrowExpr` whose post-children block re-checks `found_direct_eval`. Block scopes (e.g. a bare `{ }` containing `eval`) are not separate `Analyzer` scopes here, so they share the function scope - acceptable. The subtlety: the doc comment describes a behavior (\"in scope and upper\") that is achieved by a non-obvious flag-propagation chain, making it easy to break when refactoring scope handling.","fix":"Document that outer-scope marking relies on `found_direct_eval` bubbling up so each enclosing function node re-runs `collect_decls`. Add a fixture: `var a; function f(){ function g(){ eval(s) } }` and confirm `a` is retained, to lock the chain against regressions.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:383-402","code":"  383 |         // If we found eval, mark all declarations in scope and upper as used\n  384 |         if child_scope.found_direct_eval {\n  385 |             for id in child_scope.bindings_affected_by_eval {\n  386 |                 self.data.used_names.entry(id).or_default().usage += 1;\n  387 |             }\n  388 | \n  389 |             self.scope.found_direct_eval = true;\n  390 |         }\n  391 | \n  392 |         if child_scope.found_arguemnts {\n  393 |             // Parameters\n  394 | \n  395 |             for id in child_scope.bindings_affected_by_arguements {\n  396 |                 self.data.used_names.entry(id).or_default().usage += 1;\n  397 |             }\n  398 | \n  399 |             if !matches!(kind, ScopeKind::Fn) {\n  400 |                 self.scope.found_arguemnts = true;\n  401 |             }\n  402 |         }","lines":20},{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:577-599","code":"  577 |     fn visit_arrow_expr(&mut self, n: &ArrowExpr) {\n  578 |         self.with_scope(ScopeKind::ArrowFn, |v| {\n  579 |             n.visit_children_with(v);\n  580 | \n  581 |             if v.scope.found_direct_eval {\n  582 |                 v.scope.bindings_affected_by_eval = collect_decls(n);\n  583 |             }\n  584 |         })\n  585 |     }\n  586 | \n  587 |     fn visit_function(&mut self, n: &Function) {\n  588 |         self.with_scope(ScopeKind::Fn, |v| {\n  589 |             n.visit_children_with(v);\n  590 | \n  591 |             if v.scope.found_direct_eval {\n  592 |                 v.scope.bindings_affected_by_eval = collect_decls(n);\n  593 |             }\n  594 | \n  595 |             if v.scope.found_arguemnts {\n  596 |                 v.scope.bindings_affected_by_arguements = find_pat_ids(&n.params);\n  597 |             }\n  598 |         })\n  599 |     }","lines":23}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In `get_ascii_only_ident` (used to emit IDENTIFIERS, not string literals), supplementary-plane chars (> U+FFFF) on an Es5 target are written with literal surrounding double-quote characters via the format string `r#\"\"\\u{h:04X}\\u{l:04X}\"\"#`. This injects stray `\"` characters into the middle of an identifier, producing invalid JS such as `foo\"\\uD834\\uDD1E\"bar`. The quotes were clearly copy-pasted from a string-literal escaping path; identifiers must not be quoted.","fix":"Emit the surrogate escapes without the wrapping quotes: `write!(buf, \"\\\\u{h:04X}\\\\u{l:04X}\")`.","locations":[{"ref":"crates/swc_ecma_codegen/src/lib.rs:1371-1379","code":" 1371 |                     if target <= EsVersion::Es5 {\n 1372 |                         // https://mathiasbynens.be/notes/javascript-encoding#surrogate-formulae\n 1373 |                         let h = ((c as u32 - 0x10000) / 0x400) + 0xd800;\n 1374 |                         let l = (c as u32 - 0x10000) % 0x400 + 0xdc00;\n 1375 | \n 1376 |                         let _ = write!(buf, r#\"\"\\u{h:04X}\\u  953 |             }\n  954 | \n  955 |             let ctx = child\n  956 |                 .ctx\n  957 |                 .with(BitContext::ExecutedMultipleTime, true)\n  958 |                 .with(BitContext::InCond, true);\n  959 | \n  960 |             child.with_ctx(ctx).visit_in_cond(&n.body);\n  961 |         });\n  962 |     }","lines":26}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In the inlining pass (sibling under simplify/), `visit_mut_var_declarator` analysis branch has the match arm `Some(e) | Some(e) if e.is_lit() || e.is_ident()`. The same binding `Some(e)` is repeated in an or-pattern, which is a copy-paste artifact - the second alternative is identical and dead. This is harmless but clearly unintended.","fix":"Collapse to a single `Some(e) if e.is_lit() || e.is_ident() =>`.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/inlining/mod.rs:627-627","code":"  627 |                         Some(e) | Some(e) if e.is_lit() || e.is_ident() => {","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`parse_normal_for_head` parses the `test` expression then calls `self.input_mut().eat(Token::Semi)` and discards the result. A missing second semicolon in a C-style for head (e.g. `for (a; b c)`) is silently accepted instead of producing a diagnostic: after `test = b`, the semicolon is not present, `eat` returns false (ignored), and the `update` branch then parses `c` as the update with no error. This swallows a real syntax error.","fix":"After parsing `test`, require the separating semicolon (e.g. `self.expect(Token::Semi)?` or emit an error when `eat(Token::Semi)` returns false) instead of silently discarding it.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/stmt.rs:67-79","code":"   67 |         let test = if self.input_mut().eat(Token::Semi) {\n   68 | ferent error stream for no principled reason.","fix":"Pick one strategy. For best error recovery on untrusted input, change the two `syntax_error!(self, self.span(start), SyntaxError::ReadOnlyMethod)` calls (lines 1154 and 1371) to `self.emit_err(self.span(start), SyntaxError::ReadOnlyMethod)` so all three readonly-on-method cases recover identically.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/class_and_fn.rs:1096-1098","code":" 1096 |             if readonly.is_some() {\n 1097 |                 self.emit_err(self.span(start), SyntaxError::ReadOnlyMethod);\n 1098 |             }","lines":3},{"ref":"crates/swc_ecma_parser/src/parser/class_and_fn.rs:1153-1155","code":" 1153 |             if readonly.is_some() {\n 1154 |                 syntax_error!(self, self.span(start), SyntaxError::ReadOnlyMethod);\n 1155 |             }","lines":3},{"ref":"crates/swc_ecma_parser/src/parser/class_and_fn.rs:1370-1372","code":" 1370 |             if readonly.is_some() {\n 1371 |                 syntax_error!(self, self.span(start), SyntaxError::ReadOnlyMethod);\n 1372 |             }","lines":3}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The Flow-specific code paths reuse `SyntaxError::TS1003` (\"Identifier expected\") as a generic catch-all for a wide range of unrelated grammar violations: optional rest elements, duplicate enum members, invalid enum member kinds, exact/inexact object misuse, missing type annotations, reserved type names, legacy octal escapes, spread placement, etc. This produces misleading diagnostics for malformed input and makes it hard to distinguish real \"identifier expected\" errors from these reused codes.","fix":"Introduce dedicated Flow-specific `SyntaxError` variants (or reuse the matching tsc error codes) for these distinct conditions instead of overloading TS1003.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:1901-1955","code"
