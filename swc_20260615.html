        }\n 2895 |         }\n 2896 | \n 2897 |         if self.input_mut().eat(Token::DotDotDot) {\n 2898 |             let type_ann = if self.input().syntax().flow()\n 2899 |                 && (self.input().is(Token::RBracket) || self.input().is(Token::Comma))\n 2900 |             {\n 2901 |                 if self.input().is(Token::Comma) {\n 2902 |                     self.emit_err(self.input().cur_span(), SyntaxError::TS1003);","lines":35},{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:4060","code":" 4060 |                     self.emit_err(members[first_idx].span(), SyntaxError::TS1003);","lines":1},{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:4128","code":" 4128 |                     self.emit_err(member.span(), SyntaxError::TS1003);","lines":1}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"convert_fn_decl_as_ts_declare_function serializes each converted param via serde_json::to_value(param).unwrap_or(serde_json::Value::Null). If serialization ever fails, the parameter is silently replaced with Null, producing a structurally valid but semantically wrong TSDeclareFunction (a real param becomes null) with no diagnostic. This swallows a should-never-happen error in a way that corrupts output rather than surfacing it.","fix":"Treat a serialization failure as a hard error (push to File.errors or debug_assert) instead of substituting Null, so a real failure is observable rather than producing a silently malformed param list.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast.rs:1079-1083","code":" 1079 |             params: self\n 1080 |                 .convert_param_list(&f.params)\n 1081 |                 .into_iter()\n 1082 |                 .map(|param| serde_json::to_value(param).unwrap_or(serde_json::Value::Null))\n 1083 |                 .collect(),","lines":5}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`create_symbol` silently no-ops the scope-binding insertion when `scope_id` is out of range (`if let Some(scope) = ... get_mut`). The symbol is still created, but it is never registered in any scope, so its `BindingData.scope` keeps the placeholder `OutScopeId(0)` and it never appears in `iter_bindings_in`. A bad scope id thus produces a silently corrupt binding instead of an error or panic.","fix":"Treat an out-of-range scope id as a programming error (debug_assert or expect), since all internal callers should always pass a valid scope id.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_scope.rs:270-272","code":"  270 |         if let Some(scope) = self.scopes.get_mut(scope_id.0 as usize) {\n  271 |             scope.bindings.insert(name, id);\n  272 |         }","lines":3}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"parse_unicode_escape_sequence (string-literal parser) silently swallows a too-large code point in the `\\u{...}` form. consume_hex_digits returns the value, then `.filter(|&cp| cp <= 0x10_ffff)` turns an out-of-range code point into None, after which the function rewinds and returns Ok(None); the malformed escape is then re-interpreted by the outer loop rather than reported. A value like `\\u{110000}` is within u32 range (no overflow error from consume_hex_digits) but is an invalid code point and should be a syntax error, not a silent fallback.","fix":"When `\\u{` is matched and consume_hex_digits yields a value > 0x10_FFFF (or the closing `}` is missing), emit a proper invalid-unicode-escape diagnostic instead of filtering to None and rewinding.","locations":[{"ref":"crates/swc_ecma_regexp/src/parser/reader/string_literal_parser/parser_impl.rs:369-381","code":"  369 |         if self.eat('u') {\n  370 |             if self.eat('{') {\n  371 |                 if let Some(hex_digits) = self\n  372 |                     .consume_hex_digits(offset_start)?\n  373 |                     .filter(|&cp| cp <= 0x10_ffff)\n  374 |                 {\n  375 |                     if self.eat('}') {\n  376 |                         return Ok(Some(hex_digits));\n  377 |                     }\n  378 |                 }\n  379 |             }\n  380 |             self.rewind(chckpoint);\n  381 |         }","lines":13}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"Third pass that maps resolved references to bindings is quadratic. `get_resolved_reference_ids` linearly scans the entire `references` vector (and allocates a fresh `Vec<ReferenceId>`) on every call, and it is called once per symbol inside the loop over all symbols. Total cost is O(symbols * references) plus one heap allocation per symbol. On large modules with many bindings and references this dominates `into_scope_info`.","fix":"Iterate `self.references` once, look up each reference's `symbol_id` directly, and translate it through `symbol_to_binding` into `ref_node_id_to_binding`. This is a single linear pass with no per-symbol scan or allocation.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_scope.rs:1166-1175","code":" 1166 |         // Third pass: Map all resolved references to bindings\n 1167 |         for symbol_id in self.scoping.symbol_ids() {\n 1168 |             if let Some(&binding_id) = symbol_to_binding.get(&symbol_id) {\n 1169 |                 for ref_id in self.scoping.get_resolved_reference_ids(symbol_id) {\n 1170 |                     let reference = self.scoping.get_reference(ref_id);\n 1171 |                     let start = reference.span.lo.0;\n 1172 |                     ref_node_id_to_binding.insert(start, binding_id);\n 1173 |                 }\n 1174 |             }\n 1175 |         }","lines":10},{"ref":"crates/swc_ecma_react_compiler/src/convert_scope.rs:244-250","code":"  244 |     pub fn get_resolved_reference_ids(&self, symbol_id: SymbolId) -> Vec<ReferenceId> {\n  245 |         self.references\n  246 |             .iter()\n  247 |             .filter(|r| r.symbol_id == Some(symbol_id))\n  248 |             .map(|r| r.id)\n  249 |             .collect()\n  250 |     }","lines":7}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"optimize_arrow_iife_patterns_in_seq performs the full pattern match (Call -> Callee::Expr -> Arrow -> BlockStmtOrExpr::Expr) twice for every sequence element: once read-only to compute can_optimize (1580-1598) and again mutably (1605-1618). The duplicated nested matching is redundant and the first pass also calls can_optimize_arrow_iife_in_seq which re-inspects the same nodes. The whole helper also runs on every SeqExpr in the program (visit_mut_seq_expr), so the doubled traversal is hot.","fix":"Collect the optimization result in a single mutable pass (the borrow can be scoped so the read of arrow/call and the subsequent assignment happen in one match), eliminating the duplicate read-only match and the separate can_optimize_arrow_iife_in_seq round-trip.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1578-1620","code":" 1578 |         for i in 0..seq.exprs.len() {\n 1579 |             // First, check if this expression can be optimized without borrowing conflicts\n 1580 |             let can_optimize = if let Expr::Call(call) = &*seq.exprs[i] {\n 1581 |                 if let Callee::Expr(callee) = &call.callee {\n 1582 |                     if let Expr::Arrow(arrow) = &**callee {\n 1583 |                         // For expression-style arrow functions in sequences,\n 1584 |                         // we can be more aggressive with optimization\n 1585 |                         if let BlockStmtOrExpr::Expr(_body) = &*arrow.body {\n 1586 |                             self.can_optimize_arrow_iife_in_seq(arrow, call)\n 1587 |                         } else {\n 1588 |                             false\n 1589 |                         }\n 1590 |                     } else {\n 1591 |                         false\n 1592 |                     }\n 1593 |                 } else {\n 1594 |                     false\n 1595 |                 }\n 1596 |             } else {\n 1597 |                 false\n 1598 |             };\n 1599 | \n 1600 |             // If we can optimize, perform the mutation\n 1601 |             if can_optimize {\n 1602 |                 // Extract a fresh mutable reference to avoid borrowing conflicts\n 1603 |                 // This block ensures all previous borrows are dropped before we create new ones\n 1604 |                 let expr = &mut seq.exprs[i];\n 1605 |                 if let Expr::Call(call) = &mut **expr {\n 1606 |                     if let Callee::Expr(callee) = &call.callee {\n 1607 |                         if let Expr::Arrow(arrow) = &**callee {\n 1608 |                             if let BlockStmtOrExpr::Expr(_body) = &*arrow.body {\n 1609 |                                 let new_expr = self.optimize_single_arrow_iife_in_seq(arrow, call);\n 1610 | \n 1611 |                                 if let Some(new_expr) = new_expr {\n 1612 |                                     **expr = new_expr;\n 1613 |                                     changed = true;\n 1614 |                                 }\n 1615 |                             }\n 1616 |                         }\n 1617 |                     }\n 1618 |                 }\n 1619 |             }\n 1620 |         }","lines":43}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"optimize_single_arrow_iife_in_seq clones the entire arrow body unconditionally (`(**body).clone()` at 1700 and `(**body).clone()` at 1681) even though the IIFE call is being replaced and the original arrow/call are about to be discarded by the caller. The caller (optimize_arrow_iife_patterns_in_seq) takes `&CallExpr`/`&ArrowExpr` and overwrites `**expr` with the returned value, so the bodies could be moved out via Take instead of cloned. Argument expressions are also cloned (1695) rather than taken.","fix":"Take the call/arrow by &mut and move the body and argument expressions out (Take::take) instead of cloning, since the source node is replaced wholesale.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1680-1707","code":" 1680 |             if arrow.params.is_empty() && call.args.is_empty() {\n 1681 |                 return Some((**body).clone());\n 1682 |             }\n 1683 | \n 1684 |             // For arrow functions with simple parameters, inline them\n 1685 |             if arrow.params.len() == call.args.len() {\n 1686 |                 let can_inline = arrow.params.iter().zip(&call.args).all(|(param, arg)| {\n 1687 |                     param.is_ident() && self.is_simple_expr_for_seq_optimization(&arg.expr)\n 1688 |                 });\n 1689 | \n 1690 |                 if can_inline {\n 1691 |                     // Create a simple substitution for the parameters\n 1692 |                     let mut substitutions = FxHashMap::default();\n 1693 |                     for (param, arg) in arrow.params.iter().zip(&call.args) {\n 1694 |                         if let Pat::Ident(ident) = param {\n 1695 |                             substitutions.insert(ident.to_id(), arg.expr.clone());\n 1696 |                         }\n 1697 |                     }\n 1698 | \n 1699 |                     // Apply substitutions to the body\n 1700 |                     let mut new_body = (**body).clone();\n 1701 |                     if !substitutions.is_empty() {\n 1702 |                         let mut replacer = NormalMultiReplacer::new(&mut substitutions, false);\n 1703 |                         new_body.visit_mut_with(&mut replacer);\n 1704 |                     }\n 1705 | \n 1706 |                     return Some(new_body);\n 1707 |                 }","lines":28}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Resolving every `export default function` reference walks the whole `symbol_to_binding` map matching on symbol name for each default export. Besides being O(symbols) per default export, matching purely by name can bind to the wrong symbol when another binding shares the function name (e.g. a same-named local declared elsewhere), because the first name match in arbitrary HashMap order is taken.","fix":"Look up the function ident's own declaration span in the symbol table (the symbol was created via `declare_symbol_on_scope` in `visit_export_default_decl`) and map the export span to that binding directly, instead of scanning all bindings by name.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_scope.rs:1194-1213","code":" 1194 |         if let Program::Module(module) = program {\n 1195 |             for stmt in &module.body {\n 1196 |                 if let ModuleItem::ModuleDecl(ModuleDecl::ExportDefaultDecl(export)) = stmt {\n 1197 |                     if let DefaultDecl::Fn(func) = &export.decl {\n 1198 |                         if let Some(ident) = &func.ident {\n 1199 |                             let name = ident.sym.as_ref();\n 1200 |                             for (sym_id, &bind_id) in &symbol_to_binding {\n 1201 |                                 if self.scoping.symbol_name(*sym_id) == name {\n 1202 |                                     let export_start = export.span.lo.0;\n 1203 |                                     ref_node_id_to_binding\n 1204 |                                         .entry(export_start)\n 1205 |                                         .or_insert(bind_id);\n 1206 |                                     break;\n 1207 |                                 }\n 1208 |                             }\n 1209 |                         }\n 1210 |                     }\n 1211 |                 }\n 1212 |             }\n 1213 |         }","lines":20}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`lint` only sets `opts.no_emit = true` and then calls the full `transform`, which still runs `convert_program_to_swc` and `apply_renames` to build a `Program` (lib.rs:128-132) that `lint` immediately discards (it returns only `diagnostics`). For a lint-only pass this performs the entire reverse AST conversion and rename application for nothing. The `no_emit` flag is passed to the upstream compiler but the SWC-side reverse conversion/rename work is unconditional.","fix":"Have `transform` (or a shared internal) skip `convert_program_to_swc`/`apply_renames` when `options.no_emit` is set, since the resulting program is never used in the lint path.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/lib.rs:166-179","code":"  166 | pub fn lint(\n  167 |     program: &Program,\n  168 |     source_type: SourceType,\n  169 |     source_text: &str,\n  170 |     comments: Option<&SingleThreadedComments>,\n  171 |     options: PluginOptions,\n  172 | ) -> LintResult {\n  173 |     let mut opts = options;\n  174 |     opts.no_emit = true;\n  175 |     let result = transform(program, source_type, source_text, comments, opts);\n  176 |     LintResult {\n  177 |         diagnostics: result.diagnostics,\n  178 |     }\n  179 | }","lines":14},{"ref":"crates/swc_ecma_react_compiler/src/lib.rs:126-138","code":"  126 | \n  127 |     let rename_plan = build_rename_plan(&scope_info, &renames);\n  128 |     let program = file.map(|file: react_compiler_ast::File| {\n  129 |         let mut compiled = convert_program_to_swc(&file, preserved_ast);\n  130 |         apply_renames(&mut compiled, &rename_plan);\n  131 |         compiled\n  132 |     });\n  133 | \n  134 |     TransformResult {\n  135 |         program,\n  136 |         diagnostics,\n  137 |         events,\n  138 |     }","lines":13}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"`visit_mut_par` ignores its `_threshold` parameter and always runs sequentially, despite the module doc-comment at the top of the file claiming \"This becomes parallel if `concurrent` feature is enabled.\" Every call site passes `cpu_count() * 8` as a threshold (computing `cpu_count()` each time) for a function that never parallelizes and never uses the value. This is both dead computation (repeated `cpu_count()` calls) and a misleading API/comment.","fix":"Either implement the concurrent path under the `concurrent` feature (using the threshold), or drop the unused `_threshold` parameter and the per-call `cpu_count() * 8` computations and fix the misleading doc-comment.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:768-775","code":"  768 |     fn visit_mut_par<N>(&mut self, _threshold: usize, nodes: &mut [N])\n  769 |     where\n  770 |         N: Send + Sync + VisitMutWith<Self>,\n  771 |     {\n  772 |         for n in nodes {\n  773 |             n.visit_mut_with(self);\n  774 |         }\n  775 |     }","lines":8},{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:24-24","code":"   24 | /// Note: This becomes parallel if `concurrent` feature is enabled.","lines":1}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`TplElement::emit` unconditionally allocates two new Strings via `self.raw.replace(\"\\r\\n\", \"\\n\").replace('\\r', \"\\n\")` for every template element, even on the common fast path where the raw text contains no carriage returns and is then emitted as-is. This runs in a hot emit loop.","fix":"Skip the replacement when `!self.raw.contains('\\r')`, e.g. borrow the original raw and only allocate when a `\\r` is actually present (use `memchr`/`Cow`).","locations":[{"ref":"crates/swc_ecma_codegen/src/lib.rs:2179","code":" 2179 |         let raw = self.raw.replace(\"\\r\\n\", \"\\n\").replace('\\r', \"\\n\");","lines":1}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"ReturnStmt recomputes self.arg.as_deref() a second time to derive need_paren even though `arg` is already the bound &Expr from the enclosing `if let Some(arg) = self.arg.as_deref()`. The map/unwrap_or chain is redundant; it can use `arg` directly.","fix":"Replace the need_paren computation with `let need_paren = emitter.has_leading_comment(arg);` using the already-bound `arg`, matching the ThrowStmt pattern at lines 302-303.","locations":[{"ref":"crates/swc_ecma_codegen/src/stmt.rs:144-149","code":"  144 |         if let Some(arg) = self.arg.as_deref() {\n  145 |             let need_paren = self\n  146 |                 .arg\n  147 |                 .as_deref()\n  148 |                 .map(|expr| emitter.has_leading_comment(expr))\n  149 |                 .unwrap_or(false);","lines":6}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"CatchClause allocates a Vec<String> and calls name.to_string() for every catch-binding name solely to defer add_scope_variable calls past the for_each_pat_binding closure. The project style explicitly prefers &str over owned String for this kind of work. Each binding incurs a heap allocation in the scope-tracking emit path.","fix":"Collect borrowed &str into a Vec<&str> (the binding names come from Atom-backed syms and outlive the loop), or restructure so add_scope_variable is invoked without the intermediate owned strings.","locations":[{"ref":"crates/swc_ecma_codegen/src/stmt.rs:225-231","code":"  225 |             if emitter.scope_tracking_enabled() {\n  226 |                 let mut names = vec![];\n  227 |                 for_each_pat_binding(param, &mut |name| names.push(name.to_string()));\n  228 |                 for name in names {\n  229 |                     emitter.add_scope_variable(&name, Some(&name), BindingStorage::Lexical)?;\n  230 |                 }\n  231 |             }","lines":7}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"Needless clone of the Ctx in visit_mut_for_stmt: `ctx` is constructed and only used once, but is passed as `ctx.clone()`. `Ctx` embeds an `ExprCtx` plus bitflags, so this is an avoidable allocation/copy on every for-statement in a hot visit path.","fix":"Pass `ctx` by value: `s.body.visit_mut_with(&mut *self.with_ctx(ctx));` (drop the `.clone()`), once test/update no longer need it - or reuse the same `ctx` for test/update per the first finding.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/mod.rs:2258-2259","code":" 2258 |         let ctx = self.ctx.clone().with(BitCtx::ExecutedMultipleTime, true);\n 2259 |         s.body.visit_mut_with(&mut *self.with_ctx(ctx.clone()));","lines":2}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"On a successful shorthand merge, `new_b.clone()` is used to build the `KeyValueProp` value while `new_b` is still needed afterwards only by the `is_skippable_for_seq(Some(a), &new_b)` check (line 2051). If the branch returned `Ok(true)` immediately (see the logic_error finding) the clone could be eliminated by moving `new_b` into the prop. This runs inside the O(n^2) merge loop, a hot path for large files.","fix":"Once the branch returns early on success, move `new_b` into `value` instead of cloning: `value: Box::new(new_b)`.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/sequences.rs:2039-2048","code":" 2039 |                                     let mut new_b = shorthand.clone().into();\n 2040 |                                     if self.merge_sequential_expr(a, &mut new_b)? {\n 2041 |                                         **prop = Prop::KeyValue(KeyValueProp {\n 2042 |                                             key: Ident::new_no_ctxt(\n 2043 |                                                 shorthand.sym.clone(),\n 2044 |                                                 shorthand.span,\n 2045 |                                             )\n 2046 |                                             .into(),\n 2047 |                                             value: new_b.clone().into(),\n 2048 |                                         });","lines":10}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"Redundant span recomputation in `make_property`. In each match arm `let span = p.span(start);` is computed and bound, then `p.span(start)` is called a second time when constructing the struct (`PrivateProp { span: p.span(start), ... }`), recomputing the identical span instead of reusing the already-bound `span`. Cheap, but pointless duplicate work and a copy-paste smell that diverges from the `Key::Public` arm which reuses `span`.","fix":"In the `Key::Private` arm reuse the bound binding: `PrivateProp { span, ... }` instead of `span: p.span(start)`.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/class_and_fn.rs:871-891","code":"  871 |                 Key::Private(key) => {\n  872 |                     let span = p.span(start);\n  873 |                     if accessibility.is_some() {\n  874 |                         p.emit_err(span.with_hi(key.span_hi()), SyntaxError::TS18010);\n  875 |                     }\n  876 | \n  877 |                     PrivateProp {\n  878 |                         span: p.span(start),\n  879 |                         key,\n  880 |                         value,\n  881 |                         is_static,\n  882 |                         decorators,\n  883 |                         accessibility,\n  884 |                         is_optional,\n  885 |                         is_override,\n  886 |                         readonly,\n  887 |                         type_ann,\n  888 |                         definite,\n  889 |                         ctxt: Default::default(),\n  890 |                     }\n  891 |                     .into()","lines":21}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"On the invalid `**` left-operand path the error formats the left expression with `format!(\"{left:?}\")`, producing a full Debug dump of the AST node into the error message. The code comment already flags this as not ideal (`// FIXME: Use display`). For a large left expression this allocates a potentially huge string on the error path.","fix":"Replace the Debug formatting with a concise Display-based or span-only message, or drop the operand text entirely and rely on the span.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/expr.rs:2148-2155","code":" 2148 |                     syntax_error!(\n 2149 |                         self,\n 2150 |                         SyntaxError::UnaryInExp {\n 2151 |                             // FIXME: Use display\n 2152 |                             left: format!(\"{left:?}\"),\n 2153 |                             left_span: left.span(),\n 2154 |                         }\n 2155 |                     )","lines":8}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`items.clone()` clones the entire `Vec<AssignTargetOrSpread>` (which can contain large boxed expression trees) to pass into `parse_paren_items_as_params`, even though `items` is not used afterwards on this arrow path (the next statement pushes the produced arrow onto `items`). For the common arrow-after-paren case `(x) => ...` this is a needless deep clone in a hot parse path.","fix":"Pass ownership instead of cloning: take the single item out (e.g. `std::mem::take(&mut items)`) before calling `parse_paren_items_as_params`, then push the resulting arrow into the now-empty `items`.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/expr.rs:2556","code":" 2556 |                 let params: Vec<Pat> = self.parse_paren_items_as_params(items.clone(), None)?;","lines":1}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In the TS arrow-in-conditional slow path, `items_ref.clone()` deep-clones the full paren-items vector inside the `try_parse_ts` closure. The closure runs speculatively and the clone happens even when parsing ultimately succeeds and consumes the items. The surrounding code already acknowledges this with a `// TODO: Remove clone` comment.","fix":"Restructure so the speculative parse borrows the items and only takes ownership on the committed branch, avoiding the clone in the success path.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/expr.rs:2627-2641","code":" 2627 |             // TODO: Remove clone\n 2628 |             let items_ref = &paren_items;\n 2629 |             if let Some(expr) = self.try_parse_ts(|p| {\n 2630 |                 let return_type = if p.input().syntax().flow() {\n 2631 |                     p.do_inside_of_context(Context::DisallowFlowAnonFnType, |p| {\n 2632 |                         p.parse_ts_type_or_type_predicate_ann(Token::Colon)\n 2633 |                     })?\n 2634 |                 } else {\n 2635 |                     p.parse_ts_type_or_type_predicate_ann(Token::Colon)?\n 2636 |                 };\n 2637 | \n 2638 |                 expect!(p, Token::Arrow);\n 2639 | \n 2640 |                 let params: Vec<Pat> =\n 2641 |                     p.parse_paren_items_as_params(items_ref.clone(), trailing_comma)?;","lines":15}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`flow_match_expect_case_separator` builds `format!(\"{:?}\", self.input().cur())` unconditionally at the top of the function, before checking whether the separator is present. The allocation/Debug-format work is wasted on the common success path where the token is `:` or `=>`. Although the early `eat(Token::Colon)/eat(Token::Arrow)` returns before reaching the format, the ordering is fine here; the real cost is only on the error path. Note: the format is computed only after the eats fail, so cost is bounded to error path - keep this low. The clone-free `Expected(... .into(), cur)` is acceptable.","fix":"No change strictly required; if optimizing, build the debug string lazily only inside the error branch (it already is). Leave as-is or document.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/stmt.rs:1601-1609","code":" 1601 |     fn flow_match_expect_case_separator(&mut self) -> PResult<()> {\n 1602 |         if self.input_mut().eat(Token::Colon) || self.input_mut().eat(Token::Arrow) {\n 1603 |             return Ok(());\n 1604 |         }\n 1605 | \n 1606 |         let cur = format!(\"{:?}\", self.input().cur());\n 1607 |         let span = self.input().cur_span();\n 1608 |         syntax_error!(self, span, SyntaxError::Expected(\": or =>\".into(), cur))\n 1609 |     }","lines":9}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"convert_ident, convert_ident_name, convert_private_name, convert_prop_name and the JSX identifier helpers all call sym.to_string()/name.to_string(), allocating a fresh String for every identifier in the program. Identifier conversion is one of the hottest paths in AST conversion; the destination `name: String` field forces an allocation, but the conversions also clone idents unnecessarily in some callers (e.g. object shorthand clones the whole Identifier).","fix":"Where the AST type allows, store the atom directly or reuse a single allocation; at minimum avoid the extra Identifier clones in shorthand-property handling (lines 1448-1458, 1531-1547) by constructing key/value from the atom rather than cloning a built Identifier.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast.rs:2625-2643","code":" 2625 |     fn convert_ident(&self, id: &swc::Ident) -> Identifier {\n 2626 |         Identifier {\n 2627 |             base: self.make_base_node(id.span),\n 2628 |             name: id.sym.to_string(),\n 2629 |             type_annotation: None,\n 2630 |             optional: id.optional.then_some(true),\n 2631 |             decorators: None,\n 2632 |         }\n 2633 |     }\n 2634 | \n 2635 |     fn convert_ident_name(&self, id: &swc::IdentName) -> Identifier {\n 2636 |         Identifier {\n 2637 |             base: self.make_base_node(id.span),\n 2638 |             name: id.sym.to_string(),\n 2639 |             type_annotation: None,\n 2640 |             optional: None,\n 2641 |             decorators: None,\n 2642 |         }\n 2643 |     }","lines":19}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Pattern-like TS wrapper variants (TSAsExpression, TSSatisfiesExpression, TSNonNullExpression, TSTypeAssertion, TypeCastExpression) are converted by `.clone()`-ing the whole node into a freshly allocated `Expression` enum just to reuse `convert_expression`. For deeply nested expressions inside patterns this deep-clones the entire subtree.","fix":"Add conversion helpers that borrow the inner node (`&ts`) instead of cloning into a new `Expression`, or convert the underlying expression directly without the wrapper clone.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:1887-1907","code":" 1887 |             PatternLike::TSAsExpression(ts) => swc::Pat::Expr(Box::new(\n 1888 |                 self.convert_expression(&Expression::TSAsExpression(ts.clone())),\n 1889 |             )),\n 1890 |             PatternLike::TSSatisfiesExpression(ts) => swc::Pat::Expr(Box::new(\n 1891 |                 self.convert_expression(&Expression::TSSatisfiesExpression(ts.clone())),\n 1892 |             )),\n 1893 |             PatternLike::TSNonNullExpression(ts) => swc::Pat::Expr(Box::new(\n 1894 |                 self.convert_expression(&Expression::TSNonNullExpression(ts.clone())),\n 1895 |             )),\n 1896 |             PatternLike::TSTypeAssertion(ts) => swc::Pat::Expr(Box::new(\n 1897 |                 self.convert_expression(&Expression::TSTypeAssertion(ts.clone())),\n 1898 |             )),\n 1899 |             PatternLike::TypeCastExpression(type_cast) => self\n 1900 |                 .convert_pattern_like_with_type_ann_mode(\n 1901 |                     &PatternLike::TSAsExpression(TSAsExpression {\n 1902 |                         base: type_cast.base.clone(),\n 1903 |                         expression: type_cast.expression.clone(),\n 1904 |                         type_annotation: type_cast.type_annotation.clone(),\n 1905 |                     }),\n 1906 |                     type_ann_mode,\n 1907 |                 ),","lines":21}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Every referenced identifier allocates a `String` via `ident.sym.to_string()` and pushes it onto `unresolved_references`, then those strings are dragged through `resolve_all_references`. For reference-heavy modules this is a large number of short-lived heap allocations in a hot path; the project guidance explicitly prefers avoiding `String` where `&str`/`Atom` suffice.","fix":"Store the `Atom` (`ident.sym.clone()`, a cheap refcount bump) instead of `String` in `unresolved_references`, and key scope binding maps on `Atom` as well, to avoid per-reference string allocation.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_scope.rs:457-461","code":"  457 |     fn reference_identifier(&mut self, ident: &Ident) {\n  458 |         let reference = Reference::new(ident.span, self.current_scope_id);\n  459 |         let name = ident.sym.to_string();\n  460 |         let _reference_id = self.declare_reference(name, reference);\n  461 |     }","lines":5},{"ref":"crates/swc_ecma_react_compiler/src/convert_scope.rs:319-320","code":"  319 |     /// Flat list of unresolved references: (name, reference_id).\n  320 |     unresolved_references: Vec<(String, ReferenceId)>,","lines":2}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`transform` clones the full `scope_info` (`scope_info.clone()`) to hand to `compile_program`, then still borrows the original `scope_info` afterwards in `build_rename_plan`. `ScopeInfo` holds the binding tables for the whole program; cloning it duplicates potentially large vectors/maps on every compiled file.","fix":"Check whether `compile_program` needs ownership; if it only borrows, pass a reference, or build the rename plan from data returned by `compile_program` to avoid cloning the entire `ScopeInfo`.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/lib.rs:106-127","code":"  106 |     let scope_info = SemanticBuilder::with_source_type(source_type).build(program);\n  107 |     let ConvertResult {\n  108 |         file,\n  109 |         preserved_ast,\n  110 |     } = convert_program(program, source_text, comments);\n  111 |     let result =\n  112 |         react_compiler::entrypoint::program::compile_program(file, scope_info.clone(), options);\n  113 | \n  114 |     let diagnostics = compile_result_to_diagnostics(&result);\n  115 |     let (file, events, renames) = match result {\n  116 |         react_compiler::entrypoint::compile_result::CompileResult::Success {\n  117 |             ast,\n  118 |             events,\n  119 |             renames,\n  120 |             ..\n  121 |         } => (ast, events, renames),\n  122 |         react_compiler::entrypoint::compile_result::CompileResult::Error { events, .. } => {\n  123 |             (None, events, Vec::new())\n  124 |         }\n  125 |     };\n  126 | \n  127 |     let rename_plan = build_rename_plan(&scope_info, &renames);","lines":22}]},{"id":"PERF_21","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`Stmt::DoWhile` handling clones the entire DoWhile statement just to run the conditional-stopper check: `has_conditional_stopper(&[s.clone().into()])`. The clone of the whole loop body is wasteful and runs on every do-while encountered.","fix":"Check the stopper against the borrowed body without cloning, e.g. inspect `&s.body` via a slice/helper that accepts `&Stmt`, avoiding `s.clone()`.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/branch/mod.rs:1139-1142","code":" 1139 |                 Stmt::DoWhile(s) => {\n 1140 |                     if has_conditional_stopper(&[s.clone().into()]) {\n 1141 |                         return s.into();\n 1142 |                     }","lines":4}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"The guard `seq.exprs.is_empty() || seq.exprs.len() <= 1` is redundant: `len() <= 1` already covers the empty case (`is_empty()` is exactly `len() == 0`).","fix":"Simplify to `if seq.exprs.len() <= 1 { return; }`.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/sequences.rs:428","code":"  428 |                 if seq.exprs.is_empty() || seq.exprs.len() <= 1 {","lines":1}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`can_take_init` is initialized to `false` at line 2293, then re-assigned `false` again at line 2370 inside the `is_lit` branch. The write is a no-op and only obscures the intent (it reads as if it were toggling state).","fix":"Drop the redundant `can_take_init = false` assignment; if the branch is meant to document that the literal is kept, replace it with a comment.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/sequences.rs:2369-2373","code":" 2369 |                         if is_lit {\n 2370 |                             can_take_init = false\n 2371 |                         } else {\n 2372 |                             return Ok(false);\n 2373 |                         }","lines":5}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"Unused function parameter `_start_of_output_type` threaded through `parse_fn_inner`. It is accepted, passed in from `parse_fn`, but never read inside `parse_fn_inner` (the leading underscore confirms it is dead). It adds noise to the signature and the caller. Similarly `_start` in `parse_class_inner` is unused.","fix":"Drop `_start_of_output_type` from `parse_fn_inner`'s signature and its call site at line 513-519; drop `_start` from `parse_class_inner` and its caller at line 1798. If kept for symmetry, document why.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/class_and_fn.rs:438-445","code":"  438 |     fn parse_fn_inner(\n  439 |         &mut self,\n  440 |         _start_of_output_type: Option<BytePos>,\n  441 |         start_of_async: Option<BytePos>,\n  442 |         decorators: Vec<Decorator>,\n  443 |         is_fn_expr: bool,\n  444 |         is_ident_required: bool,\n  445 |     ) -> PResult<(Option<Ident>, Box<Function>)> {","lines":8},{"ref":"crates/swc_ecma_parser/src/parser/class_and_fn.rs:1828-1834","code":" 1828 |     fn parse_class_inner(\n 1829 |         &mut self,\n 1830 |         _start: BytePos,\n 1831 |         class_start: BytePos,\n 1832 |         decorators: Vec<Decorator>,\n 1833 |         is_ident_required: bool,\n 1834 |     ) -> PResult<(Option<Ident>, Box<Class>)> {","lines":7}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"Commented-out dead code left in `parse_fn_body`. A multi-line block referencing a removed `self.ctx().span_of_fn_name` API is commented out above the active `emit_err` call. It is misleading (references an API that no longer exists) and should be removed rather than retained.","fix":"Delete the three commented-out lines (the `// self.emit_err(... span_of_fn_name ...)` block).","locations":[{"ref":"crates/swc_ecma_parser/src/parser/class_and_fn.rs:687-691","code":"  687 |             //            self.emit_err(\n  688 |             //                self.ctx().span_of_fn_name.expect(\"we are not in function\"),\n  689 |             //                SyntaxError::TS1183,\n  690 |             //            );\n  691 |             self.emit_err(self.input().cur_span(), SyntaxError::TS1183);","lines":5}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`parse_member_expr` is annotated `#[allow(dead_code)]` and is a thin wrapper over `parse_member_expr_or_new_expr(false)` that nothing in the crate calls. The explicit allow attribute confirms it is unused dead code kept around without callers.","fix":"Remove the unused method, or document why it is retained (e.g. part of a public API surface) and drop the `#[allow(dead_code)]`.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/expr.rs:202-205","code":"  202 |     #[allow(dead_code)]\n  203 |     pub(crate) fn parse_member_expr(&mut self) -> PResult<Box<Expr>> {\n  204 |         self.parse_member_expr_or_new_expr(false)\n  205 |     }","lines":4}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"expr_contains_optional is a trivial wrapper that returns matches!(expr, OptChain(_)), and convert_expr_in_chain immediately re-tests the same condition with `if let swc::Expr::OptChain(chain) = expr`. The helper adds an indirection that is never used for anything else and the double-match is redundant.","fix":"Delete expr_contains_optional and collapse convert_expr_in_chain to a single match: `if let swc::Expr::OptChain(chain) = expr { self.convert_opt_chain_expr(chain) } else { self.convert_expr(expr) }`.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast.rs:788-799","code":"  788 |     fn convert_expr_in_chain(&self, expr: &swc::Expr) -> Expression {\n  789 |         if Self::expr_contains_optional(expr) {\n  790 |             if let swc::Expr::OptChain(chain) = expr {\n  791 |                 return self.convert_opt_chain_expr(chain);\n  792 |             }\n  793 |         }\n  794 |         self.convert_expr(expr)\n  795 |     }\n  796 | \n  797 |     fn expr_contains_optional(expr: &swc::Expr) -> bool {\n  798 |         matches!(expr, swc::Expr::OptChain(_))\n  799 |     }","lines":12}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`reference_to_binding` is always emitted as an empty `IndexMap` while the parallel `ref_node_id_to_binding` is the map actually populated and consumed (apply_renames.rs only reads `ref_node_id_to_binding`). The unconditionally-empty field is dead output that can mislead a reader into thinking reference resolution is exposed through it.","fix":"Either populate `reference_to_binding` if the external API expects it, or add a comment documenting that this crate intentionally leaves it empty and only uses `ref_node_id_to_binding`.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_scope.rs:1222-1223","code":" 1222 |             reference_to_binding: IndexMap::new(),\n 1223 |             ref_node_id_to_binding,","lines":2}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`DiagnosticMessage` carries a `span: Option<(u32, u32)>` field, but every constructor in this crate sets `span: None` (diagnostics.rs lines 63, 89, 102, 106, and lib.rs parse-error path). Notably `LoggerEvent::CompileErrorWithLoc` is matched but its location is discarded, and `CompilerErrorDetailInfo` location data (if present) is never read. Consumers therefore get a permanently `None` span field, which is misleading API surface and loses available diagnostic positions.","fix":"Populate `span` from `CompileErrorWithLoc`/`CompilerErrorDetailInfo` location data where available, or remove the `span` field if it is genuinely unfillable to avoid implying location support that does not exist.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/diagnostics.rs:53-65","code":"   53 | fn error_info_to_diagnostic(error: &CompilerErrorInfo) -> DiagnosticMessage {\n   54 |     let mut message = format!(\"[ReactCompiler] {}\", error.reason);\n   55 |     if let Some(description) = &error.description {\n   56 |         message.push_str(\": \");\n   57 |         message.push_str(description);\n   58 |     }\n   59 | \n   60 |     DiagnosticMessage {\n   61 |         severity: Severity::Error,\n   62 |         message,\n   63 |         span: None,\n   64 |     }\n   65 | }","lines":13},{"ref":"crates/swc_ecma_react_compiler/src/diagnostics.rs:67-91","code":"   67 | fn error_detail_to_diagnostic(detail: &CompilerErrorDetailInfo) -> Option<DiagnosticMessage> {\n   68 |     let message = if let Some(description) = &detail.description {\n   69 |         format!(\n   70 |             \"[ReactCompiler] {}: {}. {}\",\n   71 |             detail.category, detail.reason, description\n   72 |         )\n   73 |     } else {\n   74 |         format!(\"[ReactCompiler] {}: {}\", detail.category, detail.reason)\n   75 |     };\n   76 | \n   77 |     // This is React Compiler's display severity for the diagnostic detail. Fatal\n   78 |     // transform errors are represented separately by `CompileResult::Error`.\n   79 |     let severity = match detail.severity.as_str() {\n   80 |         \"Off\" => return None,\n   81 |         \"Error\" => Severity::Error,\n   82 |         // `Warning`, `Hint`, and any unknown future value surface as warnings.\n   83 |         _ => Severity::Warning,\n   84 |     };\n   85 | \n   86 |     Some(DiagnosticMessage {\n   87 |         severity,\n   88 |         message,\n   89 |         span: None,\n   90 |     })\n   91 | }","lines":25},{"ref":"crates/swc_ecma_react_compiler/src/diagnostics.rs:93-108","code":"   93 | fn event_to_diagnostic(event: &LoggerEvent) -> Option<DiagnosticMessage> {\n   94 |     match event {\n   95 |         LoggerEvent::CompileSuccess { .. } | LoggerEvent::CompileSkip { .. } => None,\n   96 |         LoggerEvent::CompileError { detail, .. }\n   97 |         | LoggerEvent::CompileErrorWithLoc { detail, .. } => error_detail_to_diagnostic(detail),\n   98 |         LoggerEvent::CompileUnexpectedThrow { data, .. } => Some(DiagnosticMessage {\n   99 |             severity: Severity::Error,\n  100 |             message: format!(\"[ReactCompiler] Unexpected error: {data}\"),\n  101 |             span: None,\n  102 |         }),\n  103 |         LoggerEvent::PipelineError { data, .. } => Some(DiagnosticMessage {\n  104 |             severity: Severity::Error,\n  105 |             message: format!(\"[ReactCompiler] Pipeline error: {data}\"),\n  106 |             span: None,\n  107 |         }),\n  108 |     }","lines":16}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`ResourceManagementVisitor::visit_var_decl` overrides the default visitor only to early-return on `self.found` and then recurse, which is exactly what the default impl does. `using`/`await using` declarations are `UsingDecl` nodes, not children of `VarDecl`, so this override can never short-circuit anything meaningful related to `found`; it is redundant boilerplate that just re-implements default traversal.","fix":"Delete the `visit_var_decl` override; rely on the default traversal which already reaches `visit_using_decl`.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/prefilter.rs:53-59","code":"   53 | impl Visit for ResourceManagementVisitor {\n   54 |     fn visit_var_decl(&mut self, decl: &swc::VarDecl) {\n   55 |         if self.found {\n   56 |             return;\n   57 |         }\n   58 |         decl.visit_children_with(self);\n   59 |     }","lines":7}]},{"id":"DEAD_10","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`simplified.iter().clone()` clones the iterator immediately after creating it and binds the clone to `iter`, then consumes it once. Cloning a freshly-made iterator is a no-op with no purpose; it just obscures intent and adds a needless clone per duplicate-name group.","fix":"Replace `let iter = simplified.iter().clone();` with `let iter = simplified.iter();` (or inline `for token in &simplified`).","locations":[{"ref":"crates/swc_ecma_regexp/src/parser/pattern_parser/state.rs:158","code":"  158 |             let iter = simplified.iter().clone();","lines":1}]},{"id":"DEAD_11","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`cold_fill_var_decl_types_from_json` declares an unused parameter named `decl` that shadows itself in the loop, and its body only re-derives `name`; the function name implies it fills 'types' but it rewrites the whole binding pattern. Misleading.","fix":"Rename to reflect that it rebuilds the binding pattern (including type annotations), and clean up the shadowed binding for clarity.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:390-399","code":"  390 |     #[cold]\n  391 |     fn cold_fill_var_decl_types_from_json(\n  392 |         &self,\n  393 |         decl: &mut swc::VarDecl,\n  394 |         declarations: &[VariableDeclarator],\n  395 |     ) {\n  396 |         for (decl, source) in decl.decls.iter_mut().zip(declarations) {\n  397 |             decl.name = self.convert_pattern_like(&source.id);\n  398 |         }\n  399 |     }","lines":10}]},{"id":"DEAD_12","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`convert_variable_declarator` takes a `_kind: swc::VarDeclKind` parameter that is unused, and `convert_variable_declaration` threads `kind` through solely to pass it here. Dead parameter adds noise and a misleading API.","fix":"Remove the unused `_kind` parameter and the corresponding argument at the call site.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:1021-1036","code":" 1021 |     fn convert_variable_declarator(\n 1022 |         &self,\n 1023 |         declarator: &VariableDeclarator,\n 1024 |         _kind: swc::VarDeclKind,\n 1025 |         type_ann_mode: PatternTypeAnnMode,\n 1026 |     ) -> swc::VarDeclarator {\n 1027 |         swc::VarDeclarator {\n 1028 |             span: self.span_from_base(&declarator.base),\n 1029 |             name: self.convert_pattern_like_with_type_ann_mode(&declarator.id, type_ann_mode),\n 1030 |             init: declarator\n 1031 |                 .init\n 1032 |                 .as_ref()\n 1033 |                 .map(|init| Box::new(self.convert_expression(init))),\n 1034 |             definite: declarator.definite.unwrap_or(false),\n 1035 |         }\n 1036 |     }","lines":16}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment at 1602-1603 claims the block 'ensures all previous borrows are dropped before we create new ones', but the code immediately below re-runs the identical nested match it just ran in the can_optimize computation. The comment describes a borrow-checker workaround for a structure that simply duplicates work; it is misleading about why the second match exists.","fix":"Remove the misleading comment and collapse the two matches into one mutable pass.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1601-1618","code":" 1601 |             if can_optimize {\n 1602 |                 // Extract a fresh mutable reference to avoid borrowing conflicts\n 1603 |                 // This block ensures all previous borrows are dropped before we create new ones\n 1604 |                 let expr = &mut seq.exprs[i];\n 1605 |                 if let Expr::Call(call) = &mut **expr {\n 1606 |                     if let Callee::Expr(callee) = &call.callee {\n 1607 |                         if let Expr::Arrow(arrow) = &**callee {\n 1608 |                             if let BlockStmtOrExpr::Expr(_body) = &*arrow.body {\n 1609 |                                 let new_expr = self.optimize_single_arrow_iife_in_seq(arrow, call);\n 1610 | \n 1611 |                                 if let Some(new_expr) = new_expr {\n 1612 |                                     **expr = new_expr;\n 1613 |                                     changed = true;\n 1614 |                                 }\n 1615 |                             }\n 1616 |                         }\n 1617 |                     }\n 1618 |                 }","lines":18}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for compress_lits claims `true` => `!1` and `false` => `!0`, but the code does the opposite: for `v.value == true` it emits `!0.0` (i.e. `!0`, which is `true`), and for `false` it emits `!1` (which is `false`). The mapping in the comment is inverted relative to the implementation.","fix":"Swap the comment lines to `- `true` => `!0`` and `- `false` => `!1``.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/mod.rs:586-604","code":"  586 |     ///\n  587 |     /// - `true` => `!1`\n  588 |     /// - `false` => `!0`\n  589 |     fn compress_lits(&mut self, e: &mut Expr) {\n  590 |         let lit = match e {\n  591 |             Expr::Lit(lit) => lit,\n  592 |             _ => return,\n  593 |         };\n  594 | \n  595 |         if self.options.bools_as_ints || self.options.bools {\n  596 |             if let Lit::Bool(v) = lit {\n  597 |                 self.changed = true;\n  598 |                 report_change!(\"Compressing boolean literal\");\n  599 |                 *e = UnaryExpr {\n  600 |                     span: v.span,\n  601 |                     op: op!(\"!\"),\n  602 |                     arg: Lit::Num(Number {\n  603 |                         span: v.span,\n  604 |                         value: if v.value { 0.0 } else { 1.0 },","lines":19}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `// infinite loop` comment above the `void` handling in visit_mut_unary_expr is misleading. It does not describe the code below it (which ignores the return value of a `void` argument). At best it is a terse note that the `Expr::Lit(Lit::Num)` early-skip guards against re-processing already-simplified `void <num>` forms; as written it reads as a meaningless / confusing label.","fix":"Replace with a comment explaining the actual intent, e.g. `// Avoid reprocessing already-simplified `void <number>`; otherwise drop the side-effect-free arg.`","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/mod.rs:2944-2945","code":" 2944 |         // infinite loop\n 2945 |         if n.op == op!(\"void\") {","lines":2}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Dead commented-out `debug!` block inside a `#[cfg(feature = \"tracing-spans\")]` scope in `visit_expr`. It references fields (`in_update_arg`, `in_assign_lhs`) that no longer exist on `Ctx` (now bit-flag based), so it is stale and misleading and would not compile if uncommented.","fix":"Delete the commented-out debug block (and the now-empty cfg scope).","locations":[{"ref":"crates/swc_ecma_minifier/src/usage_analyzer/analyzer/mod.rs:809-817","code":"  809 |             #[cfg(feature = \"tracing-spans\")]\n  810 |             {\n  811 |                 // debug!(\n  812 |                 //     \"Usage: `{}``; update = {:?}, assign_lhs = {:?} \",\n  813 |                 //     i,\n  814 |                 //     self.ctx.in_update_arg,\n  815 |                 //     self.ctx.in_assign_lhs\n  816 |                 // );\n  817 |             }","lines":9}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `// dbg!(char::from_u32(fast_path_result as u32));` line is a left-over commented-out debugging statement in the string-literal scanner hot loop. It is dead/noise and should not ship.","fix":"Delete the commented-out `dbg!` line.","locations":[{"ref":"crates/swc_ecma_parser/src/lexer/mod.rs:2323","code":" 2323 |             // dbg!(char::from_u32(fast_path_result as u32));","lines":1}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Misleading comment on `parse_args` closure contract. The doc comment on `parse_fn_args_body` states \"`parse_args` closure should not eat '(' or ')'\", but the function itself performs `expect!(p, Token::LParen)` (line 299) and `expect!(p, Token::RParen)` (line 330) around the closure, so the contract is enforced by the caller, not merely a convention for the closure. The comment reads as a warning to closure authors when it is actually a structural guarantee; minor confusion.","fix":"Reword to: \"The `parse_args` closure is invoked between the `(` and `)` which this function consumes, so it must not consume the parentheses itself.\"","locations":[{"ref":"crates/swc_ecma_parser/src/parser/class_and_fn.rs:269-270","code":"  269 |     /// `parse_args` closure should not eat '(' or ')'.\n  270 |     pub(crate) fn parse_fn_args_body<F>(","lines":2}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment claims `parse_no_substitution_template_literal` is given a token whose span excludes only single backticks, but the real correctness concern is undocumented: `span = token_span.hi - BytePos(2)` in `parse_template_head` assumes the `TemplateHead` token is at least 3 bytes (backtick + content + `${`). This invariant is only enforced by `debug_assert!` on the token kind, not on length; a lexer producing a shorter token would underflow the span. Worth an explicit invariant note since these spans feed `read_string`.","fix":"Add a one-line comment documenting the minimum-length invariant relied upon here (TemplateHead >= 3 bytes), or guard with a checked subtraction.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/expr.rs:733-734","code":"  733 |         // exclude the leading `\\`` and the trailing `${`\n  734 |         let span = Span::new_with_checked(token_span.lo + BytePos(1), token_span.hi - BytePos(2));","lines":2}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment block enumerating the matched cases lists `( xxx ?` among them, but the `?` (QuestionMark) case is handled by the separate branch immediately above (lines 2349-2359). This `matches!` only covers `Colon | Comma | Eq`, so the `( xxx ?` line is stale/misleading.","fix":"Remove the `// ( xxx ?` line from the comment so it reflects only the Colon/Comma/Eq cases actually matched here.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:2361-2365","code":" 2361 |             if matches!(cur, Token::Colon | Token::Comma | Token::Eq) {\n 2362 |                 // ( xxx :\n 2363 |                 // ( xxx ,\n 2364 |                 // ( xxx ?\n 2365 |                 // ( xxx =","lines":5}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Comment claims the `Close` branch \"May panic if the pattern has invalid, unbalanced parens\", but the very next line uses `depth.saturating_sub(1)` which cannot panic (and on debug builds plain `depth - 1` would also be the panic site, not this). The comment is misleading: it documents a panic that the code explicitly prevents.","fix":"Update the comment to explain that saturating_sub is used precisely to tolerate unbalanced parens (no panic), or remove the stale panic warning.","locations":[{"ref":"crates/swc_ecma_regexp/src/parser/pattern_parser/state.rs:169-171","code":"  169 |                     SimpleUnit::Close => {\n  170 |                         // May panic if the pattern has invalid, unbalanced parens\n  171 |                         depth = depth.saturating_sub(1);","lines":3}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comments in `drop_usage`/`drop_assign` state \"We subtract the cycle count from the occurrence count, so the value is not correct representation of the actual usage.\" This describes `subtract_cycles`, not these functions; here the code simply decrements a single usage/assign when an AST node is dropped. The comment is copy-pasted and misleading in this location.","fix":"Replace with a comment explaining the actual behavior: decrement the recorded usage/assign count for a removed reference, saturating at zero, and remove the node from the graph once both reach zero.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:118-121","code":"  118 |             // We use `saturating_sub` to avoid underflow.\n  119 |             // We subtract the cycle count from the occurrence count, so the value is not\n  120 |             // correct representation of the actual usage.\n  121 |             e.usage = e.usage.saturating_sub(1);","lines":4},{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:135-138","code":"  135 |             // We use `saturating_sub` to avoid underflow.\n  136 |             // We subtract the cycle count from the occurrence count, so the value is not\n  137 |             // correct representation of the actual usage.\n  138 |             e.assign = e.assign.saturating_sub(1);","lines":4}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Stale/duplicated comment block: `// Handle\n//      var a,;` appears in `parse_using_decl` (lines 343-345) copied verbatim from `parse_var_stmt`, but `parse_using_decl` is about `using` declarations, not `var`. The example is misleading for this function.","fix":"Update the comment to reference `using a,;` or remove the copy-pasted example.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/stmt.rs:343-346","code":"  343 |             // Handle\n  344 |             //      var a,;\n  345 |             //\n  346 |             // NewLine is ok","lines":4}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment on `adjust_if_else_clause` has a typo: `THis function is recursive`. Minor, but it is a public-ish doc comment explaining a stack-overflow-avoidance invariant and should be correct.","fix":"Fix typo: `This function is recursive`.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/stmt.rs:619-622","code":"  619 |     /// Utility function used to parse large if else statements iteratively.\n  620 |     ///\n  621 |     /// THis function is recursive, but it is very cheap so stack overflow will\n  622 |     /// not occur.","lines":4}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on position() states `SWC BytePos values are byte offsets and 1-based`. BytePos values are byte offsets but they are global across the source map and only effectively 1-based for the first file; the code encodes the 1-based assumption via saturating_sub(1). The comment overstates this as an intrinsic property of BytePos rather than an assumption this bridge makes about single-file input.","fix":"Reword the comment to say this converter assumes the source begins at BytePos 1 (single-file input), rather than asserting BytePos is universally 1-based.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast.rs:94-102","code":"   94 |     /// Converts a SWC span to a Babel-compatible position.\n   95 |     ///\n   96 |     /// SWC `BytePos` values are byte offsets and 1-based. Base node offsets\n   97 |     /// stay 1-based so scope keys can use `span.lo` directly, while `loc`\n   98 |     /// follows Babel's 1-based lines and 0-based columns/indices.\n   99 |     ///\n  100 |     /// Assumption: the React Compiler does not receive the original source text\n  101 |     /// from this bridge, so UTF-8 byte offsets are enough for `column` and\n  102 |     /// `index`. If that changes, switch these offsets to UTF-16 code units.","lines":9}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment says the input is in 'Babel format' (line 6), but the converter consumes `react_compiler_ast` nodes (Hermes/Babel-like) and reconstructs SWC AST; calling it simply 'Babel format' is imprecise given the heavy reliance on PreservedAst and the react_compiler_ast types.","fix":"Clarify the comment to state the source is the react_compiler_ast (Babel-like) representation produced by the forward pass, restored against PreservedAst.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:6","code":"    6 | //! Reverse AST converter: `react_compiler_ast` (Babel format) to SWC AST.","lines":1}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"The static-alias finalization logic (call inline_with_multi_replacer, build_aliases_from_counts, then conditionally build a `var` VarDecl from take_var_decls and insert it at index 0, then drop_invalid_stmts) is duplicated almost verbatim between visit_mut_module_items and visit_mut_script. Divergence between the two copies would silently break one of Module vs Script handling.","fix":"Extract a shared helper (e.g. `fn finalize_top_level(&mut self, body: &mut Vec<Stmt>) -> Option<Stmt>` returning the optional alias var stmt) and call it from both visitors.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/mod.rs:2401-2432","code":" 2401 |     fn visi const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};

    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
