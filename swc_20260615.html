<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`read_jsx_entity`'s inner `from_code` calls `char::from_u32(...).expect(\"failed to parse number as char\")`. The preceding `is_hex`/`is_dec` guards only confirm the digits are well-formed, not that the resulting code point is a valid `char`. Malformed JSX source can drive the value to a surrogate or out-of-range code point, panicking the lexer. Reachable examples (all within the 10-iteration cap): `\"&#xD800;\"` (lone surrogate), `\"&#xFFFFFF;\"` (0xFFFFFF > 0x10FFFF), `\"&#99999999;\"` (decimal far above 0x10FFFF). All tokenize untrusted JSX, so this is a remote-input panic.","fix":"Replace both `.expect(...)` calls with proper error handling: parse the integer with `u32::from_str_radix(...).ok()` and `char::from_u32(...)`, and when either is `None` fall through to the existing `reset_to(start_pos)` / return-literal-`&` recovery path (or emit a JSX entity syntax error) instead of panicking.","locations":[{"ref":"crates/swc_ecma_parser/src/lexer/mod.rs:1368-1376","code":" 1368 |         fn from_code(s: &str, radix: u32) -> LexResult<char> {\n 1369 |             // TODO(kdy1): unwrap -> Err\n 1370 |             let c = char::from_u32(\n 1371 |                 u32::from_str_radix(s, radix).expect(\"failed to parse string as number\"),\n 1372 |             )\n 1373 |             .expect(\"failed to parse number as char\");\n 1374 | \n 1375 |             Ok(c)\n 1376 |         }","lines":9}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Unbounded recursion in the TS/Flow type parser allows a stack overflow (process abort) from malformed but cheaply-tokenized input. Each Flow nullable prefix `?` bumps one token and recurses into `parse_ts_non_array_type`, so a source like `type T = ????????...X` (one byte per level) produces recursion depth proportional to input length. The same applies to deeply nested parenthesized types `((((...))))`, `keyof keyof ...`, and array suffixes routed through `parse_ts_non_conditional_type` -> `parse_ts_union_type_or_higher` -> ... -> `parse_ts_non_array_type`. There is no recursion/depth guard anywhere on the `parse_ts_type` path. Reachable directly from untrusted source.","fix":"Add a recursion-depth counter to the parser (increment on entry to `parse_ts_type` / `parse_ts_non_array_type`, decrement on exit) and emit a syntax error once a configurable limit is exceeded, mirroring the explicit stack-overflow guards already used for `if/else` in stmt.rs. Alternatively iterativize the Flow `?` prefix and parenthesized-type unwrapping.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:4572-4600","code":" 4572 |         } else if self.input().syntax().flow() && cur == Token::QuestionMark {\n 4573 |             self.bump();\n 4574 | \n 4575 |             // Flow's nullable type (`?T`) is represented as `T | null | undefined`.\n 4576 |             // Only use the non-conditional parser for actual function forms\n 4577 |             // (`?() =>`, `?(x: T) =>`, `?(...A) =>`) so non-function grouped\n 4578 |             // types keep their original precedence (`?(T)[]` etc.).\n 4579 |             let is_nullable_fn_type = self.input().is(Token::LParen)\n 4580 |                 && self.ts_look_ahead(|p| {\n 4581 |                     p.try_parse_ts(|p| {\n 4582 |                         let ty = p.parse_ts_non_conditional_type()?;\n 4583 | \n 4584 |                         if matches!(\n 4585 |                             &*ty,\n 4586 |                             TsType::TsFnOrConstructorType(TsFnOrConstructorType::TsFnType(..))\n 4587 |                         ) {\n 4588 |                             Ok(Some(()))\n 4589 |                         } else {\n 4590 |                             Ok(None)\n 4591 |                         }\n 4592 |                     })\n 4593 |                     .is_some()\n 4594 |                 });\n 4595 | \n 4596 |             let inner_type = if is_nullable_fn_type {\n 4597 |                 self.parse_ts_non_conditional_type()?\n 4598 |             } else {\n 4599 |                 self.parse_ts_non_array_type()?\n 4600 |             };","lines":29},{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:3548-3578","code":" 3548 |     fn parse_ts_non_conditional_type(&mut self) -> PResult<Box<TsType>> {\n 3549 |         trace_cur!(self, parse_ts_non_conditional_type);\n 3550 | \n 3551 |         debug_assert!(self.input().syntax().typescript());\n 3552 | \n 3553 |         if self.is_flow_syntax() {\n 3554 |             if let Some(fn_type) = self.try_parse_ts(Self::try_parse_flow_anon_fn_type) {\n 3555 |                 return Ok(Box::new(TsType::TsFnOrConstructorType(\n 3556 |                     TsFnOrConstructorType::TsFnType(fn_type),\n 3557 |                 )));\n 3558 |             }\n 3559 |         }\n 3560 | \n 3561 |         if self.is_ts_start_of_fn_type() {\n 3562 |             return self\n 3563 |                 .parse_ts_fn_or_constructor_type(true)\n 3564 |                 .map(TsType::from)\n 3565 |                 .map(Box::new);\n 3566 |         }\n 3567 |         if (self.input().is(Token::Abstract) && peek!(self).is_some_and(|cur| cur == Token::New))\n 3568 |             || self.input().is(Token::New)\n 3569 |         {\n 3570 |             // As in `new () => Date`\n 3571 |             return self\n 3572 |                 .parse_ts_fn_or_constructor_type(false)\n 3573 |                 .map(TsType::from)\n 3574 |                 .map(Box::new);\n 3575 |         }\n 3576 | \n 3577 |         self.parse_ts_union_type_or_higher()\n 3578 |     }","lines":31},{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:3642-3700","code":" 3642 |     pub(crate) fn parse_ts_type(&mut self) -> PResult<Box<TsType>> {\n 3643 |         trace_cur!(self, parse_ts_type);\n 3644 | \n 3645 |         debug_assert!(self.input().syntax().typescript());\n 3646 | \n 3647 |         // Need to set `state.inType` so that we don't parse JSX in a type context.\n 3648 |         debug_assert!(self.ctx().contains(Context::InType));\n 3649 | \n 3650 |         let start = self.cur_pos();\n 3651 | \n 3652 |         self.do_outside_of_context(Context::DisallowConditionalTypes, |p| {\n 3653 |             let ty = p.parse_ts_non_conditional_type()?;\n 3654 |             if p.input().syntax().flow()\n 3655 |                 && !p.input().had_line_break_before_cur()\n 3656 |                 && p.input().is(Token::Arrow)\n 3657 |             {\n 3658 |                 if let TsType::TsThisType(this_ty) = &*ty {\n 3659 |                     let this_ident = BindingIdent {\n 3660 |                         id: Ident::new_no_ctxt(atom!(\"this\"), this_ty.span),\n 3661 |                         type_ann: None,\n 3662 |                     };\n 3663 |                     let type_ann = p.parse_ts_type_or_type_predicate_ann(Token::Arrow)?;\n 3664 |                     return Ok(Box::new(TsType::TsFnOrConstructorType(\n 3665 |                         TsFnOrConstructorType::TsFnType(TsFnType {\n 3666 |                             span: p.span(start),\n 3667 |                             type_params: None,\n 3668 |                             params: vec![TsFnParam::Ident(this_ident)],\n 3669 |                             type_ann,\n 3670 |                         }),\n 3671 |                     )));\n 3672 |                 }\n 3673 |             }\n 3674 |             if p.input().had_line_break_before_cur() || !p.input_mut().eat(Token::Extends) {\n 3675 |                 return Ok(ty);\n 3676 |             }\n 3677 | \n 3678 |             let check_type = ty;\n 3679 |             let extends_type = p.do_inside_of_context(\n 3680 |                 Context::DisallowConditionalTypes,\n 3681 |                 Self::parse_ts_non_conditional_type,\n 3682 |             )?;\n 3683 | \n 3684 |             expect!(p, Token::QuestionMark);\n 3685 | \n 3686 |             let true_type = p.parse_ts_type()?;\n 3687 | \n 3688 |             expect!(p, Token::Colon);\n 3689 | \n 3690 |             let false_type = p.parse_ts_type()?;\n 3691 | \n 3692 |             Ok(Box::new(TsType::TsConditionalType(TsConditionalType {\n 3693 |                 span: p.span(start),\n 3694 |                 check_type,\n 3695 |                 extends_type,\n 3696 |                 true_type,\n 3697 |                 false_type,\n 3698 |             })))\n 3699 |         })\n 3700 |     }","lines":59}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"String index folding for `'str'[n]` uses a UTF-16 index against a WTF-8 *byte* length for its bounds check. `value.len()` (line 770) returns the number of WTF-8 bytes (see hstr/src/wtf8/mod.rs `len()` -> `self.bytes.len()`), but `nth_char` (line 591) indexes by UTF-16 code unit via `to_ill_formed_utf16().nth(idx)`. For any string containing non-ASCII characters the byte length exceeds the UTF-16 code-unit count, so an out-of-range index `idx` can pass `idx as usize >= value.len()` and then `nth_char` hits `unreachable!(\"string is too short\")`, panicking on attacker-controllable input such as `'\\u00e9'[1]`. It also produces wrong results / mis-bounds for in-range cases.","fix":"Compute the UTF-16 code-unit count for the bound, e.g. `value.to_ill_formed_utf16().count()` (or a cached length), and compare `idx as usize >= utf16_len` instead of `value.len()`. Alternatively have `nth_char` return `Option` and bail out instead of `unreachable!`.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/expr/mod.rs:769-789","code":"  769 |             KnownOp::Index(idx) => {\n  770 |                 if idx.fract() != 0.0 || idx < 0.0 || idx as usize >= value.len() {\n  771 |                     // Prototype changes affect indexing if the index is out of bounds, so we\n  772 |                     // don't replace out-of-bound indexes.\n  773 |                     return;\n  774 |                 }\n  775 | \n  776 |                 let c = nth_char(value, idx as _);\n  777 |                 *changed = true;\n  778 | \n  779 |                 // `nth_char` always returns a code point within the UTF-16 range.\n  780 |                 let mut value = Wtf8Buf::with_capacity(2);\n  781 |                 value.push(c);\n  782 | \n  783 |                 *expr = Lit::Str(Str {\n  784 |                     raw: None,\n  785 |                     value: value.into(),\n  786 |                     span: *span,\n  787 |                 })\n  788 |                 .into()\n  789 |             }","lines":21},{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/expr/mod.rs:591-598","code":"  591 | fn nth_char(s: &Wtf8, idx: usize) -> CodePoint {\n  592 |     match s.to_ill_formed_utf16().nth(idx) {\n  593 |         Some(c) =>\n  594 |         // SAFETY: `IllFormedUtf16CodeUnits` always returns code units in the range of UTF-16.\n  595 |         unsafe { CodePoint::from_u32_unchecked(c as u32) },\n  596 |         None => unreachable!(\"string is too short\"),\n  597 |     }\n  598 | }","lines":8}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`assert_and_bump(Token::Gt)` is called after `parse_ts_type_args()` in several places. `assert_and_bump` only `debug_assert!`s that the current token matches and then unconditionally bumps; in debug/test/fuzz builds a mismatch panics. The invariant (cur == `>`) is currently guaranteed by `parse_ts_type_args` ending with `expect_without_advance(Token::Gt)`, but this is a fragile non-local coupling: any path that reaches these calls with a different current token (e.g. future changes to lt/gt splitting via `cut_lshift`/`merge_lt_gt`) becomes a debug-build panic instead of a recoverable syntax error.","fix":"Replace the `assert_and_bump(Token::Gt)` calls with `expect!(self, Token::Gt)` so a mismatch produces a syntax error in all build profiles instead of a debug panic.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:1185-1186","code":" 1185 |             self.assert_and_bump(Token::Gt);\n 1186 |             Some(ret)","lines":2},{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:2289-2290","code":" 2289 |                     let ret = self.parse_ts_type_args()?;\n 2290 |                     self.assert_and_bump(Token::Gt);","lines":2},{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:4217","code":" 4217 |             self.assert_and_bump(Token::Gt);","lines":1},{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:4277","code":" 4277 |             self.assert_and_bump(Token::Gt);","lines":1}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"convert_expr_as_simple_assign_target hits unreachable!() for any UpdateExpr whose argument is not Ident/Member/SuperProp/TS-wrapper. The parser normally guarantees this, but the converter is a public bridge that can receive ASTs built by transforms/plugins (e.g. `++<call()>` or a parenthesized target). Such input panics the whole compilation instead of being handled gracefully.","fix":"Replace the unreachable!() arm with a fallback that converts the argument via convert_expr (or emits an error node), so malformed/synthetic ASTs degrade gracefully instead of aborting.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast.rs:1007-1020","code":" 1007 |     fn convert_expr_as_simple_assign_target(&self, target: &swc::Expr) -> Expression {\n 1008 |         match target {\n 1009 |             swc::Expr::Ident(id) => Expression::Identifier(self.convert_ident(id)),\n 1010 |             swc::Expr::Member(m) => Expression::MemberExpression(self.convert_member_expr(m)),\n 1011 |             swc::Expr::SuperProp(sp) => {\n 1012 |                 Expression::MemberExpression(self.convert_super_prop_expr(sp))\n 1013 | nodes, and the AST also originates from JSON deserialization; any such node reaching this arm aborts the whole compile with a panic instead of a recoverable error.","fix":"Replace the `unreachable!` with a graceful fallback (e.g. emit an Invalid/empty statement or return a diagnostic) so malformed or unexpected input cannot panic the compiler.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:873-891","code":"  873 |             Statement::Unknown(_)\n  874 |             | Statement::TypeAlias(_)\n  875 |             | Statement::OpaqueType(_)\n  876 |             | Statement::InterfaceDeclaration(_)\n  877 |             | Statement::DeclareVariable(_)\n  878 |             | Statement::DeclareFunction(_)\n  879 |             | Statement::DeclareClass(_)\n  880 |             | Statement::DeclareModule(_)\n  881 |             | Statement::DeclareModuleExports(_)\n  882 |             | Statement::DeclareExportDeclaration(_)\n  883 |             | Statement::DeclareExportAllDeclaration(_)\n  884 |             | Statement::DeclareInterface(_)\n  885 |             | Statement::DeclareTypeAlias(_)\n  886 |             | Statement::DeclareOpaqueType(_)\n  887 |             | Statement::EnumDeclaration(_) => {\n  888 |                 // This reverse path only handles AST produced by our SWC forward converter;\n  889 |                 // lossy SWC details are restored from PreservedAst.\n  890 |                 unreachable!(\"unsupported statement in SWC round-trip AST\")\n  891 |             }","lines":19}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`for_each_id_ref_in_expr` calls `s.exprs.last().unwrap()` for `Expr::Seq`. An empty `SeqExpr.exprs` (constructible via AST manipulation feeding the minifier, and treated as possible elsewhere in the codebase) makes this panic. The AST crate handles the same case defensively with `exprs.last().map(...)` (crates/swc_ecma_ast/src/expr.rs:296), so an empty seq is considered reachable.","fix":"Use `if let Some(last) = s.exprs.last() { for_each_id_ref_in_expr(last, op); }` instead of `unwrap()`.","locations":[{"ref":"crates/swc_ecma_minifier/src/usage_analyzer/analyzer/mod.rs:1675-1677","code":" 1675 |         Expr::Seq(s) => {\n 1676 |             for_each_id_ref_in_expr(s.exprs.last().unwrap(), op);\n 1677 |         }","lines":3}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`for_each_id_ref_in_class` hits `unreachable!()` for a constructor parameter of kind `ParamOrTsParamProp::TsParamProp`. This is reached via `for_each_id_ref_in_expr` -> `Expr::Class` from alias/usage collection (e.g. `x = class { constructor(public a) {} }`). If a TypeScript AST with parameter properties reaches the minifier without TS stripping, this panics rather than degrading gracefully like the other defensive branches in this file.","fix":"Replace `unreachable!()` with a no-op (ignore the TsParamProp branch) or conservatively recurse into the underlying pattern, since usage analysis should not assume TS has been fully stripped.","locations":[{"ref":"crates/swc_ecma_minifier/src/usage_analyzer/analyzer/mod.rs:1728-1730","code":" 1728 |                 ParamOrTsParamProp::TsParamProp(..) => {\n 1729 |                     unreachable!()\n 1730 |                 }","lines":3}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Several unreachable!() arms in convert_assign_target cover SWC variants (SimpleAssignTarget::OptChain, TsInstantiation, Invalid; AssignTargetPat::Invalid) that are only ruled out by the parser. Any synthetic or recovered AST containing them will panic the conversion.","fix":"Convert these arms to graceful fallbacks (placeholder identifier / error expression) rather than unreachable!(), since the converter does not control how its input AST was produced.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast.rs:1347-1383","code":" 1347 |             swc::AssignTarget::Simple(swc::SimpleAssignTarget::Paren(p)) => match &*p.expr {\n 1348 |                 swc::Expr::Ident(id) => PatternLike::Identifier(self.convert_ident(id)),\n 1349 |                 swc::Expr::Member(m) => PatternLike::MemberExpression(self.convert_member_expr(m)),\n 1350 |                 _ => unreachable!(\"parenthesized assignment target is not an LVal\"),\n 1351 |             },\n 1352 |             swc::AssignTarget::Simple(swc::SimpleAssignTarget::OptChain(_)) => {\n 1353 |                 unreachable!(\"optional chaining is not a valid assignment target\")\n 1354 |             }\n 1355 |             swc::AssignTarget::Simple(swc::SimpleAssignTarget::TsAs(e)) => {\n 1356 |                 PatternLike::TSAsExpression(self.convert_ts_as_expr(e))\n 1357 |             }\n 1358 |             swc::AssignTarget::Simple(swc::SimpleAssignTarget::TsSatisfies(e)) => {\n 1359 |                 PatternLike::TSSatisfiesExpression(self.convert_ts_satisfies_expr(e))\n 1360 |             }\n 1361 |             swc::AssignTarget::Simple(swc::SimpleAssignTarget::TsNonNull(e)) => {\n 1362 |                 PatternLike::TSNonNullExpression(self.convert_ts_non_null_expr(e))\n 1363 |             }\n 1364 |             swc::AssignTarget::Simple(swc::SimpleAssignTarget::TsTypeAssertion(e)) => {\n 1365 |                 PatternLike::TSTypeAssertion(self.convert_ts_type_assertion(e))\n 1366 |             }\n 1367 |             swc::AssignTarget::Simple(swc::SimpleAssignTarget::TsInstantiation(_)) => {\n 1368 |                 unreachable!(\n 1369 |                     \"AssignTarget::TsInstantiation AST shape is rejected by TS/Babel parser\"\n 1370 |                 )\n 1371 |             }\n 1372 |             swc::AssignTarget::Simple(swc::SimpleAssignTarget::Invalid(_)) => {\n 1373 |                 unreachable!(\"SWC Invalid assignment target cannot be converted\")\n 1374 |             }\n 1375 |             swc::AssignTarget::Pat(swc::AssignTargetPat::Array(a)) => {\n 1376 |                 self.convert_array_pat_as_assign_target(a)\n 1377 |             }\n 1378 |             swc::AssignTarget::Pat(swc::AssignTargetPat::Object(o)) => {\n 1379 |                 PatternLike::ObjectPattern(self.convert_object_pat(o))\n 1380 |             }\n 1381 |             swc::AssignTarget::Pat(swc::AssignTargetPat::Invalid(_)) => {\n 1382 |                 unreachable!()\n 1383 |             }","lines":37}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`convert_declaration` calls `unreachable!` for Flow declaration variants (TypeAlias/OpaqueType/InterfaceDeclaration/EnumDeclaration). Same risk as the statement path: an unexpected node panics rather than degrading gracefully.","fix":"Return `self.invalid_var_decl(...)` or a diagnostic instead of panicking.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:2391-2396","code":" 2391 |             Declaration::TypeAlias(_)\n 2392 |             | Declaration::OpaqueType(_)\n 2393 |             | Declaration::InterfaceDeclaration(_)\n 2394 |             | Declaration::EnumDeclaration(_) => {\n 2395 |                 unreachable!(\"SWC forward conversion does not produce Flow declarations\")\n 2396 |             }","lines":6}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In `subtract_cycles`, the edge weights are subtracted from `used_names` using plain `u32` subtraction (`e.usage -= w.usage; e.assign -= w.assign`). The entry is obtained via `entry(id.clone()).or_default()`, so when an id of a cycle node is not yet present in `used_names` it is freshly created with `usage = 0` / `assign = 0`, and subtracting a non-zero edge weight underflows. In debug builds this panics; in release it wraps to a huge value. A wrapped `usage`/`assign` makes the binding look heavily used and silently disables DCE for it, or (after wrap) could make it look droppable. Unlike `drop_usage`/`drop_assign` which intentionally use `saturating_sub`, this path uses unchecked subtraction.","fix":"Use saturating subtraction here as well: `e.usage = e.usage.saturating_sub(w.usage); e.assign = e.assign.saturating_sub(w.assign);` to match the documented intent and avoid underflow panics / wraparound.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:227-231","code":"  227 |                     if let Some(w) = self.graph.edge_weight(i, j) {\n  228 |                         let e = self.used_names.entry(id.clone()).or_default();\n  229 |                         e.usage -= w.usage;\n  230 |                         e.assign -= w.assign;\n  231 |                     }","lines":5}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Bitwise-NOT folding casts the operand to `i32`/`u32` with `as`, which saturates in Rust, whereas JS `~x` applies ToInt32 (truncation modulo 2^32). For `value >= 0`, `value as u32` saturates at u32::MAX for values >= 2^32, and for `value < 0`, `value as i32` saturates at i32::MIN/MAX. So e.g. `~4294967296` folds incorrectly (JS ToInt32(2^32) == 0 -> result -1, but `4294967296f64 as u32` saturates to u32::MAX -> `!u32::MAX == 0` -> 0). Same truncation hazard as the `to_int32` helper used elsewhere is *not* applied here.","fix":"Use `to_int32(value)` (already imported) and compute `!to_int32(value)` then widen to f64, matching JS ToInt32 wrapping semantics, instead of raw `as i32`/`as u32` casts.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/expr/mod.rs:1367-1383","code":" 1367 |         op!(\"~\") => {\n 1368 |             if let Known(value) = arg.as_pure_number(expr_ctx) {\n 1369 |                 if value.fract() == 0.0 {\n 1370 |                     *changed = true;\n 1371 |                     *expr = Lit::Num(Number {\n 1372 |                         span: *span,\n 1373 |                         value: if value < 0.0 {\n 1374 |                             !(value as i32 as u32) as i32 as f64\n 1375 |                         } else {\n 1376 |                             !(value as u32) as i32 as f64\n 1377 |                         },\n 1378 |                         raw: None,\n 1379 |                     })\n 1380 |                     .into();\n 1381 |                 }\n 1382 |                 // TODO: Report error\n 1383 |             }","lines":17}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"Usage counters (`ref_count`, `usage_count`, `assign_count`, etc. in program_data.rs, incremented from this analyzer's `report_usage`/`report_assign`) are `u32` updated with plain `+= 1` and summed during scope `merge`. Practically unreachable (would need >4e9 references), but the increments are unchecked while the decrement path uses `saturating_sub`, which is an inconsistency worth noting.","fix":"Either leave as-is (acknowledged non-issue at realistic input sizes) or use `saturating_add` consistently with the existing `saturating_sub` on the decrement path for defensive symmetry.","locations":[{"ref":"crates/swc_ecma_minifier/src/usage_analyzer/analyzer/mod.rs:153-170","code":"  153 |     fn report_usage(&mut self, i: &Ident) {\n  154 |         if i.sym == \"arguments\" {\n  155 |             self.scope.mark_used_arguments();\n  156 |         }\n  157 | \n  158 |         let i = i.to_id();\n  159 | \n  160 |         if let Some(recr) = self.used_recursively.get(&i) {\n  161 |             if let RecursiveUsage::Var { can_ignore: false } = recr {\n  162 |                 self.data.report_usage(self.ctx, i.clone());\n  163 |                 self.data.var_or_default(i.clone()).mark_used_above_decl()\n  164 |             }\n  165 |             self.data.var_or_default(i.clone()).mark_used_recursively();\n  166 |             return;\n  167 |         }\n  168 | \n  169 |         self.data.report_usage(self.ctx, i)\n  170 |     }","lines":18}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In `read_number` the legacy-octal check computes `start.0 != self.last_pos().0 - 1`. `last_pos().0` is a `u32` and `- 1` will underflow (panic in debug, wrap in release) if `last_pos` is ever 0. It is currently protected only by the invariant that at least one `0` digit was consumed before this point, so `last_pos >= 1`; the code is correct only by that implicit invariant and would break if the call path changed.","fix":"Use saturating/explicit arithmetic, e.g. compare `start.0 + 1 != self.last_pos().0`, which avoids the underflow entirely.","locations":[{"ref":"crates/swc_ecma_parser/src/lexer/mod.rs:1174","code":" 1174 |                     if start.0 != self.last_pos().0 - 1 {","lines":1}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In the TSX ambiguous-arrow heuristic, `has_trailing_comma` is computed with raw `u32` subtraction `type_parameters.span.hi.0 - single_param.span.hi.0`. This assumes the single type parameter's span hi is always <= the type parameter declaration's span hi. If a malformed type parameter ever produces a param span whose hi exceeds the decl span hi (e.g. via recovery/synthesized spans), this underflows: it panics in debug builds and wraps to a huge value in release, silently making `has_trailing_comma` true and corrupting the JSX-vs-arrow disambiguation.","fix":"Use a saturating/checked comparison, e.g. `type_parameters.span.hi.0.saturating_sub(single_param.span.hi.0) > 1`, or compare positions directly (`single_param.span.hi < type_parameters.span.hi - BytePos(1)` after a bounds check).","locations":[{"ref":"crates/swc_ecma_parser/src/parser/expr.rs:124-125","code":"  124 |                         let has_trailing_comma =\n  125 |                             type_parameters.span.hi.0 - single_param.span.hi.0 > 1;","lines":2}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"Unchecked u32 subtraction `token_span.hi.0 - token_span.lo.0` to compute the length of the leading string token while detecting a `\"use strict\"` directive. For all well-formed Str tokens emitted by the lexer hi >= lo, so this is currently unreachable, but it is a raw subtraction on untrusted-input-derived BytePos values with no debug guard; if any lexer path ever produced an inverted span (e.g. recovery) this panics in debug and wraps in release, then feeds a bogus length into the directive check.","fix":"Use a saturating/checked length: `token_span.hi.0.saturating_sub(token_span.lo.0) == 12`, or compare against the byte length of the read string directly.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/stmt.rs:2190","code":" 2190 |             if token_span.hi.0 - token_span.lo.0 == 12 {","lines":1}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`has_trailing_comma` computes `type_params.span.hi.0 - single_param.span.hi.0` on raw u32 `BytePos` values. This relies on the type-parameter declaration span always ending at or after the single parameter span. If a malformed/synthetic span ever has `single_param.span.hi > type_params.span.hi`, this is an unchecked subtraction that panics in debug builds and wraps in release, flipping the JSX-disambiguation heuristic.","fix":"Use `type_params.span.hi.0.saturating_sub(single_param.span.hi.0) > 1`, or compare positions directly with a guard, to avoid the unchecked subtraction.","locations":[{"ref":"crates/swc_ecma_parser/src/parser/typescript.rs:5223","code":" 5223 |                     let has_trailing_comma = type_params.span.hi.0 - single_param.span.hi.0 > 1;","lines":1}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`span_from_json_value` reads `start`/`end` as `u64` from arbitrary JSON and truncates them with `as u32`. For positions >= 2^32 (or maliciously large JSON), the truncation wraps silently, producing a bogus span (potentially end < start) rather than falling back to DUMMY_SP.","fix":"Use `u32::try_from(start).ok()` and fall back to DUMMY_SP on overflow instead of an unchecked `as u32` cast.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:42-46","code":"   42 |         match (start, end) {\n   43 |             (Some(start), Some(end)) => Span::new(BytePos(start as u32), BytePos(end as u32)),\n   44 |             (Some(start), None) => Span::new(BytePos(start as u32), BytePos(start as u32)),\n   45 |             _ => DUMMY_SP,\n   46 |         }","lines":5}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `get_ascii_only_ident`, the `'\\x01'..='\\x0f'` arm formats control chars with single-hex-digit width, producing invalid JS escapes. The `may_need_quote` branch writes `\\x{:x}` -> e.g. `\\x1` (a `\\x` escape requires exactly 2 hex digits), and the else branch writes `\\u00{:x}` -> e.g. `\\u001` (a `\\u` escape requires exactly 4 hex digits). Both yield malformed output for values 0x01..0x0f. Compare the correct handling in lit.rs which uses the `\\x0` prefix plus one digit.","fix":"Use fixed-width formatting: `write!(buf, \"\\\\x{:02x}\", c as u8)` for the quote path and `write!(buf, \"\\\\u{:04x}\", c as u32)` (or `\\\\x0{:x}` / `\\\\u000{:x}`) for the non-quote path.","locations":[{"ref":"crates/swc_ecma_codegen/src/lib.rs:1326-1333","code":" 1326 |             '\\x01'..='\\x0f' if !first => {\n 1327 |                 if may_need_quote {\n 1328 |                     need_quote = true;\n 1329 |                     let _ = write!(buf, \"\\\\x{:x}\", c as u8);\n 1330 |                 } else {\n 1331 |                     let _ = write!(buf, \"\\\\u00{:x}\", c as u8);\n 1332 |                 }\n 1333 |             }","lines":8}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"can_optimize_arrow_iife_in_seq / optimize_single_arrow_iife_in_seq never check whether the IIFE body captures or reassigns the parameter, nor whether the parameter name is reserved, nor whether eval is present (self.data.top HAS_EVAL_CALL). The standalone path performs all of these checks (can_extract_param, ident_reserved, HAS_EVAL_CALL, idents_captured_by). The seq path bypasses can_inline_fn_like entirely, so an IIFE in a sequence can be inlined in situations the optimizer otherwise considers unsafe (e.g. reserved identifier collisions, eval-affected scopes).","fix":"Route the seq-expr arrow IIFE through the existing can_inline_fn_like / can_extract_param checks (or replicate the eval, reserved-identifier, and capture guards) before substituting, rather than doing an independent, weaker analysis.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1631-1653","code":" 1631 |     fn can_optimize_arrow_iife_in_seq(&self, arrow: &ArrowExpr, call: &CallExpr) -> bool {\n 1632 |         // Only optimize simple arrow functions with expression bodies\n 1633 |         if arrow.is_async || arrow.is_generator {\n 1634 |             return false;\n 1635 |         }\n 1636 | \n 1637 |         // Check if parameters are simple identifiers\n 1638 |         if !arrow.params.iter().all(|p| p.is_ident()) {\n 1639 |             return false;\n 1640 |         }\n 1641 | \n 1642 |         // Ensure no spread arguments\n 1643 |         if call.args.iter().any(|arg| arg.spread.is_some()) {\n 1644 |             return false;\n 1645 |         }\n 1646 | \n 1647 |         // Check if the arrow function body is simple enough for sequence optimization\n 1648 |         if let BlockStmtOrExpr::Expr(body) = &*arrow.body {\n 1649 |             self.is_simple_expr_for_seq_optimization(body)\n 1650 |         } else {\n 1651 |             false\n 1652 |         }\n 1653 |     }","lines":23},{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1672-1712","code":" 1672 |     fn optimize_single_arrow_iife_in_seq(\n 1673 |         &mut self,\n 1674 |         arrow: &ArrowExpr,\n 1675 |         call: &CallExpr,\n 1676 |     ) -> Option<Expr> {\n 1677 |         if let BlockStmtOrExpr::Expr(body) = &*arrow.body {\n 1678 |             // For simple arrow functions with no parameters in sequences,\n 1679 |             // we can directly replace the IIFE with its body\n 1680 |             if arrow.params.is_empty() && call.args.is_empty() {\n 1681 |                 return Some((**body).clone());\n 1682 |             }\n 1683 | \n 1684 |             // For arrow functions with simple parameters, inline them\n 1685 |             if arrow.params.len() == call.args.len() {\n 1686 |                 let can_inline = arrow.params.iter().zip(&call.args).all(|(param, arg)| {\n 1687 |                     param.is_ident() && self.is_simple_expr_for_seq_optimization(&arg.expr)\n 1688 |                 });\n 1689 | \n 1690 |                 if can_inline {\n 1691 |                     // Create a simple substitution for the parameters\n 1692 |                     let mut substitutions = FxHashMap::default();\n 1693 |                     for (param, arg) in arrow.params.iter().zip(&call.args) {\n 1694 |                         if let Pat::Ident(ident) = param {\n 1695 |                             substitutions.insert(ident.to_id(), arg.expr.clone());\n 1696 |                         }\n 1697 |                     }\n 1698 | \n 1699 |                     // Apply substitutions to the body\n 1700 |                     let mut new_body = (**body).clone();\n 1701 |                     if !substitutions.is_empty() {\n 1702 |                         let mut replacer = NormalMultiReplacer::new(&mut substitutions, false);\n 1703 |                         new_body.visit_mut_with(&mut replacer);\n 1704 |                     }\n 1705 | \n 1706 |                     return Some(new_body);\n 1707 |                 }\n 1708 |             }\n 1709 |         }\n 1710 | \n 1711 |         None\n 1712 |     }","lines":41}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"optimize_single_arrow_iife_in_seq inlines arrow-IIFE arguments by raw substitution without consulting any usage info (ref_count, REASSIGNED, etc.) and uses NormalMultiReplacer with should_consume=false, so the argument expression is duplicated once per occurrence of the parameter in the body. Because both the body and the arguments are allowed to be member expressions by is_simple_expr_for_seq_optimization, an argument like `a.b` referenced twice (e.g. `(x => x * x)(a.b)`) is cloned into `a.b * a.b`, evaluating the property getter / proxy trap twice instead of once. This changes observable JS semantics (side-effect count and evaluation). The main inline path guards this via can_inline_fn_arg/ref_count==1; this enhanced-seq path does not.","fix":"Before substituting, look up self.data.vars for each parameter and require ref_count <= 1 and not REASSIGNED, or restrict substituted arguments to side-effect-free, idempotent expressions (Lit/Ident only) so that duplication is safe. Reuse can_inline_fn_arg / the existing inline_fn_param machinery instead of an unchecked clone-and-replace.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1672-1712","code":" 1672 |     fn optimize_single_arrow_iife_in_seq(\n 1673 |         &mut self,\n 1674 |         arrow: &ArrowExpr,\n 1675 |         call: &CallExpr,\n 1676 |     ) -> Option<Expr> {\n 1677 |         if let BlockStmtOrExpr::Expr(body) = &*arrow.body {\n 1678 |             // For simple arrow functions with no parameters in sequences,\n 1679 |             // we can directly replace the IIFE with its body\n 1680 |             if arrow.params.is_empty() && call.args.is_empty() {\n 1681 |                 return Some((**body).clone());\n 1682 |             }\n 1683 | \n 1684 |             // For arrow functions with simple parameters, inline them\n 1685 |             if arrow.params.len() == call.args.len() {\n 1686 |                 let can_inline = arrow.params.iter().zip(&call.args).all(|(param, arg)| {\n 1687 |                     param.is_ident() && self.is_simple_expr_for_seq_optimization(&arg.expr)\n 1688 |                 });\n 1689 | \n 1690 |                 if can_inline {\n 1691 |                     // Create a simple substitution for the parameters\n 1692 |                     let mut substitutions = FxHashMap::default();\n 1693 |                     for (param, arg) in arrow.params.iter().zip(&call.args) {\n 1694 |                         if let Pat::Ident(ident) = param {\n 1695 |                             substitutions.insert(ident.to_id(), arg.expr.clone());\n 1696 |                         }\n 1697 |                     }\n 1698 | \n 1699 |                     // Apply substitutions to the body\n 1700 |                     let mut new_body = (**body).clone();\n 1701 |                     if !substitutions.is_empty() {\n 1702 |                         let mut replacer = NormalMultiReplacer::new(&mut substitutions, false);\n 1703 |                         new_body.visit_mut_with(&mut replacer);\n 1704 |                     }\n 1705 | \n 1706 |                     return Some(new_body);\n 1707 |                 }\n 1708 |             }\n 1709 |         }\n 1710 | \n 1711 |         None\n 1712 |     }","lines":41},{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1685-1707","code":" 1685 |             if arrow.params.len() == call.args.len() {\n 1686 |                 let can_inline = arrow.params.iter().zip(&call.args).all(|(param, arg)| {\n 1687 |                     param.is_ident() && self.is_simple_expr_for_seq_optimization(&arg.expr)\n 1688 |                 });\n 1689 | \n 1690 |                 if can_inline {\n 1691 |                     // Create a simple substitution for the parameters\n 1692 |                     let mut substitutions = FxHashMap::default();\n 1693 |                     for (param, arg) in arrow.params.iter().zip(&call.args) {\n 1694 |                         if let Pat::Ident(ident) = param {\n 1695 |                             substitutions.insert(ident.to_id(), arg.expr.clone());\n 1696 |                         }\n 1697 |                     }\n 1698 | \n 1699 |                     // Apply substitutions to the body\n 1700 |                     let mut new_body = (**body).clone();\n 1701 |                     if !substitutions.is_empty() {\n 1702 |                         let mut replacer = NormalMultiReplacer::new(&mut substitutions, false);\n 1703 |                         new_body.visit_mut_with(&mut replacer);\n 1704 |                     }\n 1705 | \n 1706 |                     return Some(new_body);\n 1707 |                 }","lines":23}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In the object-literal merge path, the `Prop::Shorthand` case rewrites the property to a `KeyValueProp` when `merge_sequential_expr` succeeds, but unlike every sibling branch (spread at 2005-2011, KeyValue at 2055-2063, and the computed-key check at 2024-2032) it does NOT `return Ok(true)`. It falls through to the `is_skippable_for_seq` check and continues iterating props. Because the function reports `Ok(false)` to its caller even though it mutated the AST, `merge_sequences_in_exprs` (lines 875-882) skips `merge_seq_cache.invalidate(a_idx)`/`invalidate(b_idx)`, leaving the ident-usage and top-retain caches stale for the `a`/`b` slots that were just consumed. A subsequent merge can then be made against out-of-date cached identifier sets, which can move a side-effecting expression past a use it actually aliases. The merge contract (\"Returns true if something is modified\") is also violated.","fix":"After rewriting the shorthand into a `KeyValueProp` on a successful inner merge, immediately `return Ok(true)`, mirroring the `Prop::KeyValue` branch: `if self.merge_sequential_expr(a, &mut new_b)? { **prop = Prop::KeyValue(..); return Ok(true); }`.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/sequences.rs:2035-2054","code":" 2035 |                                 Prop::Shorthand(shorthand) => {\n 2036 |                                     // We can't ignore shorthand properties\n 2037 |                                     //\n 2038 |                                     // https://github.com/swc-project/swc/issues/6914\n 2039 |                                     let mut new_b = shorthand.clone().into();\n 2040 |                                     if self.merge_sequential_expr(a, &mut new_b)? {\n 2041 |                                         **prop = Prop::KeyValue(KeyValueProp {\n 2042 |                                             key: Ident::new_no_ctxt(\n 2043 |                                                 shorthand.sym.clone(),\n 2044 |                                                 shorthand.span,\n 2045 |                                             )\n 2046 |                                             .into(),\n 2047 |                                             value: new_b.clone().into(),\n 2048 |                                         });\n 2049 |                                     }\n 2050 | \n 2051 |                                     if !self.is_skippable_for_seq(Some(a), &new_b) {\n 2052 |                                         return Ok(false);\n 2053 |                                     }\n 2054 |                                 }","lines":20}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"compress_array_join formats numeric array elements with Rust's f64 `Display` (`write!(res, \"{}\", n.value)`) instead of ECMAScript Number-to-String semantics. Rust and JS diverge for large/small magnitudes and infinities: JS `[1e21].join()` is `\"1e+21\"` but Rust Display yields `\"1000000000000000000000\"`; JS `[1e-7].join()` is `\"1e-7\"` but Rust yields `\"0.0000001\"`; an infinite num literal (e.g. folded `1e400`) yields JS `\"Infinity\"` but Rust `\"inf\"`. This produces a different observable string at compile time. The crate already has `swc_ecma_utils::ToJsString::to_js_string` (used in evaluate.rs) for exactly this. The main (non-unsafe) join path at line 712 is reachable with default options.","fix":"Use `n.value.to_js_string()` (via `swc_ecma_utils::ToJsString`) instead of `write!(.., \"{}\", n.value)` in all three numeric-literal join sites so the folded string matches `Number.prototype.toString`.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/pure/misc.rs:711-713","code":"  711 |                     Expr::Lit(Lit::Num(n)) => {\n  712 |                         write!(res, \"{}\", n.value).unwrap();\n  713 |                     }","lines":3},{"ref":"crates/swc_ecma_minifier/src/compress/pure/misc.rs:904","code":"  904 |                                 Expr::Lit(Lit::Num(n)) => write!(joined, \"{}\", n.value).unwrap(),","lines":1},{"ref":"crates/swc_ecma_minifier/src/compress/pure/misc.rs:960","code":"  960 |                                 Expr::Lit(Lit::Num(n)) => write!(joined, \"{}\", n.value).unwrap(),","lines":1}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"After the scan loop in `read_jsx_str` breaks on the closing quote (current byte == quote), the code consumes the quote only `if self.input().peek_ahead().is_some()`. `peek_ahead()` inspects the byte at offset +2, not the closing quote at offset 0. When the closing quote is the last (or second-to-last) byte of input, `peek_ahead()` is `None`, so the closing quote is NOT consumed; the lexer stays positioned on the quote and re-lexes it as a new token, corrupting the token stream. The intent is clearly to consume the closing quote whenever the loop terminated normally (not via the unterminated-EOF break).","fix":"Consume the closing quote based on whether the loop ended on the quote, e.g. check `self.cur() == Some(quote)` (or track an explicit `terminated` bool) and `self.bump(1)` in that case, rather than testing `peek_ahead()`.","locations":[{"ref":"crates/swc_ecma_parser/src/lexer/mod.rs:1527-1531","code":" 1527 |         // it might be at the end of the file when\n 1528 |         // the string literal is unterminated\n 1529 |         if self.input().peek_ahead().is_some() {\n 1530 |             self.bump(1);\n 1531 |         }","lines":5}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The pipeline operator `|>` is converted to addition (`BinaryOp::Add`). This silently produces a `+` BinExpr instead of a pipeline, corrupting the program semantics for any pipeline expression that reaches this converter.","fix":"Either map `BinaryOperator::Pipeline` to the correct SWC representation, or, if pipeline is genuinely unsupported in this round-trip, emit an Invalid expression / explicit error rather than silently turning it into `+`.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:2525","code":" 2525 |             BinaryOperator::Pipeline => swc::BinaryOp::Add,","lines":1}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"A `throw` unary expression (Hermes/Flow `throw e` expression form) is mapped to `UnaryOp::Void`. This silently rewrites `throw x` into `void x`, which has completely different runtime behavior (no exception thrown).","fix":"SWC has no throw-expression unary op; emit an Invalid expression or surface an error instead of silently substituting `void`, which changes semantics.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:2546","code":" 2546 |             UnaryOperator::Throw => swc::UnaryOp::Void,","lines":1}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Switch-case literal matching for numbers uses an approximate comparison `(test - d).abs() < 1e-10` (line 719). `switch` uses the strict-equality algorithm (`===`), so the discriminant must equal the case test exactly. With this tolerance, distinct numbers like `switch (1.0000000001) { case 1: ... }` are folded as a match (selecting the wrong case), and any pair within 1e-10 is incorrectly treated as equal. This changes runtime behavior.","fix":"Compare exactly: `test == d` (f64 bit equality semantics already match `===` for numbers, including -0 === 0 and the NaN cases which are excluded earlier). Remove the 1e-10 epsilon.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/branch/mod.rs:717-719","code":"  717 |                                         &Expr::Lit(Lit::Num(Number { value: test, .. })),\n  718 |                                         &Expr::Lit(Lit::Num(Number { value: d, .. })),\n  719 |                                     ) => (test - d).abs() < 1e-10,","lines":3}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The wrapped-ESM unwrapping in `visit_mut_expr` rewrites `(function(){ return {a, b: c}; })()` directly to the object literal `{a, b: c}`. The guard requires the function to be non-async, non-generator, zero-param, single-statement returning an object whose props are all shorthand or `KeyValue` with an ident value. But it does NOT verify that the identifiers referenced inside the returned object (`a`, `c`) are still in scope at the call site after hoisting the object out of the IIFE. If the IIFE body declared those names (e.g. via hoisted function decls in other statements) the single-statement guard prevents that, so it is mostly safe. The subtler problem: the IIFE may capture `this`/`arguments`; an unnamed `function` expression has its own `this` binding, so moving its body's object literal to the enclosing scope changes the meaning of any `this` inside the property value expressions. The guard restricts property values to plain idents (no `this`), so `this` cannot appear - safe. Net: appears safe but extremely subtle and undocumented; a future relaxation of the prop-value guard (e.g. allowing member exprs) would introduce a `this`-rebinding correctness bug.","fix":"Add a comment documenting the exact invariants relied upon (single statement, no params, prop values restricted to plain idents so no `this`/`arguments`/local-binding capture is possible). Guard against future relaxation.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:898-946","code":"  898 |         if let Expr::Call(CallExpr {\n  899 |             callee: Callee::Expr(callee),\n  900 |             args,\n  901 |             ..\n  902 |         }) = n\n  903 |         {\n  904 |             //\n  905 |             if args.is_empty() {\n  906 |                 match &mut **callee {\n  907 |                     Expr::Fn(FnExpr {\n  908 |                         ident: None,\n  909 |                         function: f,\n  910 |                     }) if matches!(\n  911 |                         &**f,\n  912 |                         Function {\n  913 |                             is_async: false,\n  914 |                             is_generator: false,\n  915 |                             body: Some(..),\n  916 |                             ..\n  917 |                         }\n  918 |                     ) && f.params.is_empty()\n  919 |                         && f.body.as_ref().is_some_and(|body| body.stmts.len() == 1) =>\n  920 |                     {\n  921 |                         if let Some(Stmt::Return(ReturnStmt { arg: Some(arg), .. })) =\n  922 |                             f.body.as_mut().and_then(|body| body.stmts.first_mut())\n  923 |                         {\n  924 |                             if let Expr::Object(ObjectLit { props, .. }) = &**arg {\n  925 |                                 if props.iter().all(|p| match p {\n  926 |                                     PropOrSpread::Spread(_) => false,\n  927 |                                     PropOrSpread::Prop(p) => match &**p {\n  928 |                                         Prop::Shorthand(_) => true,\n  929 |                                         Prop::KeyValue(p) => p.value.is_ident(),\n  930 |                                         _ => false,\n  931 |                                     },\n  932 |                                     #[cfg(swc_ast_unknown)]\n  933 |                                     _ => panic!(\"unable to access unknown nodes\"),\n  934 |                                 }) {\n  935 |                                     self.changed = true;\n  936 |                                     debug!(\"Dropping a wrapped esm\");\n  937 |                                     *n = *arg.take();\n  938 |                                     return;\n  939 |                                 }\n  940 |                             }\n  941 |                         }\n  942 |                     }\n  943 |                     _ => (),\n  944 |                 }\n  945 |             }\n  946 |         }","lines":49}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`visit_mut_unary_expr` returns early (skipping all children) for the `delete` operator, but `visit_mut_assign_expr` still drops assignments to a binding whose only remaining reference is inside a `delete`. More importantly, the `Analyzer` (read/usage collection) has no special handling for `delete`: `delete obj.prop` and `delete x` are visited as ordinary member/ident expressions, so `delete x;` records a *usage* of `x`. That part is conservative. However, the asymmetry between the analysis pass (which counts the ident in a `delete` as a use) and the mutate pass `visit_mut_unary_expr` (which skips traversal of the `delete` operand entirely) means the mutate pass never gets a chance to rewrite/inline inside `delete`, while usage counts assume it did. This divergence is fragile: any future change to how `delete` operands contribute to usage in `Analyzer` will silently desync from the mutate side.","fix":"Mirror the `delete` handling between the read-analysis (`Analyzer`) and mutate (`TreeShaker`) passes, or document explicitly why `delete` operands are skipped in the mutate pass but counted as uses in analysis, so the two cannot drift apart.","locations":[{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:1174-1179","code":" 1174 |     fn visit_mut_unary_expr(&mut self, n: &mut UnaryExpr) {\n 1175 |         if matches!(n.op, op!(\"delete\")) {\n 1176 |             return;\n 1177 |         }\n 1178 |         n.visit_mut_children_with(self);\n 1179 |     }","lines":6},{"ref":"crates/swc_ecma_transforms_optimization/src/simplify/dce/mod.rs:522-535","code":"  522 |     fn visit_expr(&mut self, e: &Expr) {\n  523 |         let old_in_var_decl = self.in_var_decl;\n  524 | \n  525 |         self.in_var_decl = false;\n  526 |         if let Expr::Ident(i) = e {\n  527 |             self.add(i.to_id(), false);\n  528 |             self.in_var_decl = old_in_var_decl;\n  529 |             return;\n  530 |         }\n  531 | \n  532 |         e.visit_children_with(self);\n  533 | \n  534 |         self.in_var_decl = old_in_var_decl;\n  535 |     }","lines":14}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"TsMappedType emits hard newlines and indentation unconditionally via emitter.wr.write_line() / increase_indent(), without checking emitter.cfg.minify. The writer's new_line is always \"\\n\" (even in minify mode, the JsWriter is constructed with \"\\n\"), so minified output of a mapped type such as `{ [K in T]: V }` gets stray line breaks and indentation. The sibling TsImportCallOptions guards the exact same calls with `if !emitter.cfg.minify`, confirming this is the intended pattern and that TsMappedType is missing the guard.","fix":"Wrap the write_line()/increase_indent() before the body and the write_line()/decrease_indent() after it in `if !emitter.cfg.minify { ... }`, matching TsImportCallOptions (lines 1070-1083).","locations":[{"ref":"crates/swc_ecma_codegen/src/typescript.rs:561-563","code":"  561 |         punct!(emitter, \"{\");\n  562 |         emitter.wr.write_line()?;\n  563 |         emitter.wr.increase_indent()?;","lines":3},{"ref":"crates/swc_ecma_codegen/src/typescript.rs:639-643","code":"  639 |         formatting_semi!(emitter);\n  640 | \n  641 |         emitter.wr.write_line()?;\n  642 |         emitter.wr.decrease_indent()?;\n  643 |         punct!(emitter, \"}\");","lines":5}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"is_simple_expr_for_seq_optimization (used to gate seq IIFE inlining) treats every unary operator as simple by recursing into the argument (1663). This includes `delete` and `typeof`/`void`, and crucially `delete obj.prop`, which has a side effect. If such an expression is the arrow body and the parameter substitution duplicates it (via the should_consume=false replacer), or if it is an argument substituted into multiple body positions, the side effect is duplicated or reordered. The standalone simple-eval predicate (is_return_arg_simple_enough_for_iife_eval) deliberately does NOT whitelist arbitrary unary expressions.","fix":"Restrict the Unary arm to side-effect-free operators (`!`, `void`, `typeof`, `+`, `-`, `~`) and exclude `delete`, and ensure member-expression args are not duplicated.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1656-1669","code":" 1656 |     fn is_simple_expr_for_seq_optimization(&self, expr: &Expr) -> bool {\n 1657 |         match expr {\n 1658 |             Expr::Lit(..) | Expr::Ident(..) => true,\n 1659 |             Expr::Bin(bin) if !bin.op.may_short_circuit() => {\n 1660 |                 self.is_simple_expr_for_seq_optimization(&bin.left)\n 1661 |                     && self.is_simple_expr_for_seq_optimization(&bin.right)\n 1662 |             }\n 1663 |             Expr::Unary(unary) => self.is_simple_expr_for_seq_optimization(&unary.arg),\n 1664 |             Expr::Member(member) if !member.prop.is_computed() => {\n 1665 |                 self.is_simple_expr_for_seq_optimization(&member.obj)\n 1666 |             }\n 1667 |             _ => false,\n 1668 |         }\n 1669 |     }","lines":14},{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1663","code":" 1663 |             Expr::Unary(unary) => self.is_simple_expr_for_seq_optimization(&unary.arg),","lines":1}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In optimize_single_arrow_iife_in_seq the branch `arrow.params.len() == call.args.len()` silently drops the case where there are extra arguments (args.len() > params.len()). The other inline paths (inline_fn_like, inline_fn_param) preserve extra arguments by pushing them into the expression sequence to keep their side effects. Here, when counts differ the function simply returns None and no optimization occurs, which is safe, but combined with the equal-count path it means evaluation of surplus arguments is never modeled; if this is ever loosened it would drop side effects. More importantly, the equal-count path does not preserve the left-to-right evaluation guarantee that arguments are evaluated before the body, because substitution inlines arg expressions into body positions (reordering evaluation relative to other sequence elements).","fix":"Only inline when each argument is a pure, order-independent value (literal/ident), or model argument evaluation explicitly (prepend the args as a sequence) as the standalone path does, to preserve left-to-right evaluation order.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/iife.rs:1685-1708","code":" 1685 |             if arrow.params.len() == call.args.len() {\n 1686 |                 let can_inline = arrow.params.iter().zip(&call.args).all(|(param, arg)| {\n 1687 |                     param.is_ident() && self.is_simple_expr_for_seq_optimization(&arg.expr)\n 1688 |                 });\n 1689 | \n 1690 |                 if can_inline {\n 1691 |                     // Create a simple substitution for the parameters\n 1692 |                     let mut substitutions = FxHashMap::default();\n 1693 |                     for (param, arg) in arrow.params.iter().zip(&call.args) {\n 1694 |                         if let Pat::Ident(ident) = param {\n 1695 |                             substitutions.insert(ident.to_id(), arg.expr.clone());\n 1696 |                         }\n 1697 |                     }\n 1698 | \n 1699 |                     // Apply substitutions to the body\n 1700 |                     let mut new_body = (**body).clone();\n 1701 |                     if !substitutions.is_empty() {\n 1702 |                         let mut replacer = NormalMultiReplacer::new(&mut substitutions, false);\n 1703 |                         new_body.visit_mut_with(&mut replacer);\n 1704 |                     }\n 1705 | \n 1706 |                     return Some(new_body);\n 1707 |                 }\n 1708 |             }","lines":24}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In visit_mut_for_stmt the loop `test` and `update` expressions are visited with the plain optimizer (`self`), so the `BitCtx::ExecutedMultipleTime` flag is NOT set while optimizing them. Only the loop body (line 2258-2259) sets it. The usage analyzer, by contrast, marks for-loop `test`, `update` and `body` all as ExecutedMultipleTime (see usage_analyzer/analyzer/mod.rs:999-1006). Optimizations that are gated on this flag - for example inline.rs:1006-1010 refuses to inline a Member-expression value when ExecutedMultipleTime is set, precisely to avoid repeating a member access every iteration - will therefore wrongly fire inside a for-loop condition/update. This is an inconsistency that can lead to inlining a side-effectful or repeated-cost expression into code executed every iteration.","fix":"Visit `s.test` and `s.update` under a context with `BitCtx::ExecutedMultipleTime` set to true, mirroring the body and the usage-analyzer side. e.g. build `ctx` first and visit test/update/body all via `self.with_ctx(ctx.clone())`.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/optimize/mod.rs:2250-2260","code":" 2250 |     fn visit_mut_for_stmt(&mut self, s: &mut ForStmt) {\n 2251 |         self.visit_with_prepend(&mut s.init);\n 2252 | \n 2253 |         debug_assert_valid(&s.init);\n 2254 | \n 2255 |         s.test.visit_mut_with(self);\n 2256 |         s.update.visit_mut_with(self);\n 2257 | \n 2258 |         let ctx = self.ctx.clone().with(BitCtx::ExecutedMultipleTime, true);\n 2259 |         s.body.visit_mut_with(&mut *self.with_ctx(ctx.clone()));\n 2260 |     }","lines":11}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"optimize_array converts `Array(n)` / `new Array(n)` with a single numeric arg into an array literal whenever `0 <= n <= 5`, without checking that `n` is an integer. In JS a non-integer (or out-of-range) length throws `RangeError: Invalid array length` at runtime, e.g. `Array(3.5)` throws. Here `3.5 as usize == 3` silently produces `[,,,]`, removing a thrown exception and changing observable semantics.","fix":"Only fold when `num.value` is a non-negative integer in range, e.g. `if num.value >= 0.0 && num.value <= 5.0 && num.value.fract() == 0.0`. Otherwise return None and leave the call intact.","locations":[{"ref":"crates/swc_ecma_minifier/src/compress/pure/misc.rs:1139-1151","code":" 1139 |                     Expr::Lit(Lit::Num(num)) => {\n 1140 |                         if num.value <= 5_f64 && num.value >= 0_f64 {\n 1141 |                             Some(\n 1142 |                                 ArrayLit {\n 1143 |                                     span: *span,\n 1144 |                                     elems: vec![None; num.value as usize],\n 1145 |                                 }\n 1146 |                                 .into(),\n 1147 |                             )\n 1148 |                         } else {\n 1149 |                             None\n 1150 |                         }\n 1151 |                     }","lines":13}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`UsingDecl.is_await` is hardcoded to `false`. An `await using` declaration (if represented via the `Using` kind) loses its `await`, changing disposal semantics from async to sync.","fix":"Derive `is_await` from the source declaration kind/flag (e.g. an `AwaitUsing` variant or an await flag) instead of always emitting `false`.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_ast_reverse.rs:985-990","code":"  985 |         if matches!(decl.kind, VariableDeclarationKind::Using) {\n  986 |             swc::Decl::Using(Box::new(swc::UsingDecl {\n  987 |                 span,\n  988 |                 is_await: false,\n  989 |                 decls,\n  990 |             }))","lines":6}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"A bare `Expression::SpreadElement` is converted by recursing into its argument, dropping the spread (`...`). When a spread appears where this generic `convert_expression` is used (rather than `convert_expression_as .function, ScopeFlags::Function);\n  742 |     }","lines":18}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`node_to_scope`, `node_to_scope_end` and `node_id_to_scope` are keyed solely by `span.lo`. When two distinct scopes share the same starting byte position the later scope silently overwrites the earlier mapping. This can happen for constructs whose scope spans begin at the same position (e.g. an arrow/function whose scope span starts at the same `lo` as a wrapping node), producing an incorrect node->scope lookup for downstream consumers.","fix":"Key the node->scope maps on the full span (start and end) or detect collisions and disambiguate, rather than relying on `span.lo` uniqueness.","locations":[{"ref":"crates/swc_ecma_react_compiler/src/convert_scope.rs:1146-1156","code":" 1146 |             let span = self.scoping.scope_span(scope_id);\n 1147 |             let start = span.lo.0;\n 1148 |             let end = span.hi.0;\n 1149 | \n 1150 |             if end > start {\n 1151 |                 node_to_scope.insert(start, out_scope_id);\n 1152 |                 node_to_scope_end.insert(start, end);\n 1153 |             } else {\n 1154 |                 node_to_scope.insert(start, out_scope_id);\n 1155 |             }\n 1156 |             node_id_to_scope.insert(start, out_scope_id);","lines":11}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `Finder::visit_fn_expr`, interest is accumulated with `|=` rather than overwritten with `=` as in `visit_fn_decl` (line 81) and `visit_var_declarator` (line 113). This means an anonymous or lowercase-named function expression nested inside an already-interested function inherits `is_interested = true` from its parent, while an identically-placed `FnDecl` would reset interest to `false`. The two sibling functions classify the same code differently, an inconsistent and almost certainly unintended divergence (a nested helper closure inside a component can spuriously satisfy the prefilter).","fix":"Use `self.is_interested = node.ident.as_ref().is_some_and(...)` (plain assignment) to match `visit_fn_decl`/`visit_var_declarator`, unless the inherited-interest behavior is genuinely intended (in which case document why fn_expr differs).","locations":[{"ref":"crates/swc_ecma_react_compiler/src/fast_check.rs:89-99","code":"   89 |     fn visit_fn_expr(&mut self, node: &FnExpr) {\n   90 |         let old = self.is_interested;\n   91 | \n   92 |         self.is_interested |= node.ident.as_ref().is_some_and(|ident| {\n   93 |             ident.sym.starts_with(\"use\") || ident.sym.starts_with(|c: char| c.is_ascii_uppercase())\n   94 |         });\n   95 | \n   96 |         node.visit_children_with(self);\n   97 | \n   98 |         self.is_interested = old;\n   99 |     }","lines":11},{"ref":"crates/swc_ecma_react_compiler/src/fast_check.rs:78-87","code":"   78 |     fn visit_fn_decl(&mut self, node: &FnDecl) {\n   79 |         let old = self.is_interested;\n   80 | \n   81 |         self.is_interested = node.ident.sym.starts_with(\"use\")\n   82 |             || node.ident.sym.starts_with(|c: char| c.is_ascii_uppercase());\n   83 | \n   84 |         node.visit_children_with(self);\n   85 | \n   86 |         self.is_interested = old;\n   87 |     }","lines":10}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"consume_decimal_escape truncates a u64 capturing-group index to u32 with `index as u32`. consume_decimal_digits only guards against u64 overflow (~1.8e19), so a DecimalEscape between u32::MAX+1 and that limit (e.g. `\\8589934593`, which is 2^33+1) silently wraps to a small index (here 1). In Unicode mode the spec requires a Syntax Error when CapturingGroupNumber > CountLeftCapturingParensWithin, but the truncated value passes the `num_of_capturing_groups < index` check and is accepted as a
