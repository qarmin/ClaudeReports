                }\n  132 |                 }\n  133 |             }","lines":26}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"VideoQualityManager.getUserSelectedQuality coerces the stored index with coerceAtLeast(0) only (no upper bound), relying on getOrElse to fall back to VideoQuality.HD when the index exceeds the list. That fallback to HD is arbitrary and ignores the user's intent of selecting the highest/closest available quality; a stale high index silently downgrades to HD even if a higher quality exists.","fix":"Coerce the index into the valid range (coerceIn(0, list.lastIndex)) against the supported list so a stale index clamps to the nearest available quality instead of jumping to HD.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/VideoQualityManager.kt:52-59","code":"   52 |     fun getUserSelectedQuality(cameraSelector: CameraSelector): VideoQuality {\n   53 |         val isFrontCamera = cameraSelector == CameraSelector.DEFAULT_FRONT_CAMERA\n   54 |         val selectionIndex = mediaSizeStore.getCurrentSizeIndex(\n   55 |             isPhotoCapture = false,\n   56 |             isFrontCamera = isFrontCamera\n   57 |         ).coerceAtLeast(0)\n   58 |         return getSupportedQualities(cameraSelector).getOrElse(selectionIndex) { VideoQuality.HD }\n   59 |     }","lines":8}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"speedUpZoomBy2X can produce a negative or zero multiplier for small scale factors. For scaleFactor in (0, 0.5), 1.0f - (1.0f - scaleFactor) * 2 becomes <= 0, making the resulting zoom ratio <= 0 before clamping. coerceAtLeast(minZoomRatio) saves the final result, but multiplying zoomRatio by a non-positive factor is conceptually wrong and relies on the clamp to mask it.","fix":"Clamp the speed-up multiplier to a positive minimum, or compute the new ratio additively rather than allowing a non-positive multiplier.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ZoomCalculator.kt:14-20","code":"   14 |     private fun speedUpZoomBy2X(scaleFactor: Float): Float {\n   15 |         return if (scaleFactor > 1f) {\n   16 |             1.0f + (scaleFactor - 1.0f) * 2\n   17 |         } else {\n   18 |             1.0f - (1.0f - scaleFactor) * 2\n   19 |         }\n   20 |     }","lines":7}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"isPhotoCapture is initialized from the initInPhotoMode constructor arg, but the photoModeRunnable/videoModeRunnable also write config.initPhotoMode and flip isPhotoCapture, while bindCameraUseCases relies on isPhotoCapture to choose the capture use case. Because getCaptureUseCase nulls out the other capture field (imageCapture=null or videoCapture=null), the photoModeRunnable's guard (if imageCapture == null) and videoModeRunnable's guard (if videoCapture == null) determine whether to rebind. If a startCamera() fails (caught exception) leaving both null, a subsequent initVideoMode would rebind correctly, but initPhotoMode after a failed video start would see imageCapture==null and rebind too - the guards conflate 'mode not active' with 'binding failed', which can cause redundant rebinds.","fix":"Track the active mode with the isPhotoCapture flag for the guard decision instead of inferring from imageCapture/videoCapture nullability.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:148-169","code":"  148 |     private val photoModeRunnable = Runnable {\n  149 |         if (imageCapture == null) {\n  150 |             isPhotoCapture = true\n  151 |             if (!isThirdPartyIntent) { // we don't want to store the state for 3rd party intents\n  152 |                 config.initPhotoMode = true\n  153 |             }\n  154 |             startCamera()\n  155 |         } else {\n  156 |             listener.onInitPhotoMode()\n  157 |         }\n  158 |     }\n  159 |     private val videoModeRunnable = Runnable {\n  160 |         if (videoCapture == null) {\n  161 |             isPhotoCapture = false\n  162 |             if (!isThirdPartyIntent) { // we don't want to store the state for 3rd party intents\n  163 |                 config.initPhotoMode = false\n  164 |             }\n  165 |             startCamera()\n  166 |         } else {\n  167 |             listener.onInitVideoMode()\n  168 |         }\n  169 |     }","lines":22},{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:276-288","code":"  276 |     private fun getCaptureUseCase(resolution: Size, rotation: Int): UseCase {\n  277 |         return if (isPhotoCapture) {\n  278 |             buildImageCapture(resolution, rotation).also {\n  279 |                 imageCapture = it\n  280 |                 videoCapture = null\n  281 |             }\n  282 |         } else {\n  283 |             buildVideoCapture().also {\n  284 |                 videoCapture = it\n  285 |                 imageCapture = null\n  286 |             }\n  287 |         }\n  288 |     }","lines":13}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"tryTakePicture() captures 'val imageCapture = imageCapture' (local shadow, line 584) but then uses the force-unwrapped member imageCapture!! on line 594 instead of the safe local. The null check on line 579 and the local copy on 584 are both rendered pointless by reverting to the non-null asserted member field, which could in principle be nulled by a concurrent mode switch between the check and the !! call, causing an NPE.","fix":"Use the local non-null copy (after a null check) for takePicture instead of imageCapture!!. Same pattern applies to videoCapture!! in startRecording (lines 686, 694, 702, 711).","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:578-594","code":"  578 |     override fun tryTakePicture() {\n  579 |         if (imageCapture == null) {\n  580 |             activity.toast(R.string.camera_open_error)\n  581 |             return\n  582 |         }\n  583 | \n  584 |         val imageCapture = imageCapture\n  585 | \n  586 |         val metadata = Metadata().apply {\n  587 |             isReversedHorizontal = isFrontCameraInUse() && config.flipPhotos\n  588 |             if (config.savePhotoVideoLocation) {\n  589 |                 location = simpleLocationManager?.getLocation()\n  590 |             }\n  591 |         }\n  592 | \n  593 |         val mediaOutput = mediaOutputHelper.getImageMediaOutput()\n  594 |         imageCapture!!.takePicture(mainExecutor, object : OnImageCapturedCallback() {","lines":17}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"getRandomMediaName is named 'random' but produces a purely timestamp-based name (yyyyMMdd_HHmmss) with second resolution. Two photos captured within the same second (e.g. burst, or a paired photo+video) produce identical base names, risking filename collisions / overwrite. The name is also misleading: nothing random is involved.","fix":"Add a uniqueness suffix (e.g. milliseconds or a counter) and rename the function to reflect that it is timestamp-based.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/extensions/Context.kt:41-48","code":"   41 | fun getRandomMediaName(isPhoto: Boolean): String {\n   42 |     val timestamp = SimpleDateFormat(\"yyyyMMdd_HHmmss\", Locale.getDefault()).format(Date())\n   43 |     return if (isPhoto) {\n   44 |         \"IMG_$timestamp\"\n   45 |     } else {\n   46 |         \"VID_$timestamp\"\n   47 |     }\n   48 | }","lines":8}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"setupSavePhotoVideoLocation: when the permission request callback runs and the permission is still not granted, it constructs an OpenDeviceSettingsDialog but never assigns or shows it. Depending on the dialog implementation this may be a no-op (dialog created but never displayed), so the user gets no guidance after denying location permission. The created object is discarded.","fix":"Verify OpenDeviceSettingsDialog shows itself in its constructor; if not, call its show method. Confirm the dialog actually appears on permanent denial.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/SettingsActivity.kt:200-205","code":"  200 |                         } else {\n  201 |                             OpenDeviceSettingsDialog(\n  202 |                                 activity = this@SettingsActivity,\n  203 |                                 message = getString(org.fossify.commons.R.string.allow_location_permission)\n  204 |                             )\n  205 |                         }","lines":6}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"postError dereferences `errorMessage!!` and `exception!!` with non-null assertions. Several call sites can pass a null exception or message. For example in copyTempFileToDestination the MediaStoreOutput branch sets saveError and errorMessage but leaves `exception` null; if that error path is hit, `exception!!` throws a NullPointerException, masking the real failure with a crash. Same risk for the final `postError(saveError!!, ...)` if saveError were null.","fix":"Make message/exception nullable in postError and construct ImageCaptureException without forcing non-null (e.g. provide a default message and a non-null Throwable, or use the overload that accepts a nullable cause).","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageSaver.kt:235-243","code":"  235 |     private fun postError(saveError: SaveError, errorMessage: String?, exception: Exception?) {\n  236 nwrapping.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/MediaActionSound.kt:202-213","code":"  202 |     private fun getSoundDuration(mediaSound: MediaSound): Long {\n  203 |         releaseMediaPlayer()\n  204 |         mediaPlayer = when (mediaSound) {\n  205 |             is MediaSound.ManufacturerSound -> MediaPlayer.create(\n  206 |                 context,\n  207 |                 Uri.fromFile(File(mediaSound.path))\n  208 |             )\n  209 | \n  210 |             is MediaSound.RawResSound -> MediaPlayer.create(context, mediaSound.resId)\n  211 |         }\n  212 |         return mediaPlayer!!.duration.toLong()\n  213 |     }","lines":12}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"When Bitmap.createBitmap throws OutOfMemoryError during the front-camera flip, the catch only shows a toast and leaves `image` pointing at the original bitmap, then proceeds to compress and report success. The user gets an OOM toast but the image is silently saved unflipped/unrotated. Similarly rotate() returns null on OOM, and the caller assigns that null to `image` (line 110), after which `image.width`/compress will NPE.","fix":"On OOM either abort the save (return \"\") or keep a valid non-null bitmap; do not assign a possibly-null rotate() result to the non-null `image` and then dereference it.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/PhotoProcessor.kt:108-133","code":"  108 |             if (isThirdPartyIntent) {\n  109 |                 // make sure the image itself is rotated at third party intents\n  110 |                 image = rotate(image, totalRotation)\n  111 |             }\n  112 | \n  113 |             if (isUsingFrontCamera) {\n  114 |                 if (activity.config.flipPhotos || deviceRot != 0) {\n  115 |                     val matrix = Matrix()\n  116 |                     val isPortrait = image.width < image.height\n  117 |                     matrix.preScale(if (isPortrait) -1f else 1f, if (isPortrait) 1f else -1f)\n  118 | \n  119 |                     try {\n  120 |                         image = Bitmap.createBitmap(\n  121 |                             image,\n  122 |                             0,\n  123 |                             0,\n  124 |                             image.width,\n  125 |                             image.height,\n  126 |                             matrix,\n  127 |                             false\n  128 |                         )\n  129 |                     } catch (e: OutOfMemoryError) {\n  130 |                         activity.toast(org.fossify.commons.R.string.out_of_memory_error)\n  131 |                     }\n  132 |                 }\n  133 |             }","lines":26},{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/PhotoProcessor.kt:177-194","code":"  177 |     private fun rotate(bitmap: Bitmap, degree: Int): Bitmap? {\n  178 |         if (degree == 0) {\n  179 |             return bitmap\n  180 |         }\n  181 | \n  182 |         val width = bitmap.width\n  183 |         val height = bitmap.height\n  184 | \n  185 |         val matrix = Matrix()\n  186 |         matrix.setRotate(degree.toFloat())\n  187 | \n  188 |         try {\n  189 |             return Bitmap.createBitmap(bitmap, 0, 0, width, height, matrix, true)\n  190 |         } catch (e: OutOfMemoryError) {\n  191 |             activity.showErrorToast(e.toString())\n  192 |         }\n  193 |         return null\n  194 |     }","lines":18}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"startCamera() swallows the real exception. The catch block discards the caught exception 'e' entirely (it is never logged or reported), showing only a generic toast. Crashes/configuration failures during ProcessCameraProvider.get() or bindCameraUseCases() become silent and undiagnosable. The unused variable 'e' is also dead.","fix":"Log the exception (e.g. via the app's logging/crash reporting) before showing the toast, or at minimum reference it. Don't silently drop it.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:203-207","code":"  203 |             } catch (e: Exception) {\n  204 |                 val errorMessage =\n  205 |                     if (switching) R.string.camera_switch_error else R.string.camera_open_error\n  206 |                 activity.toast(errorMessage)\n  207 |             }","lines":5}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Int.toCameraXFlashMode, toAppFlashMode, and toFlashModeId throw IllegalArgumentException for unknown values. toAppFlashMode in particular has no case for FLASH_MODE_OFF mapping back to FLASH_ALWAYS_ON, so a round trip FLASH_ALWAYS_ON -> toCameraXFlashMode (FLASH_MODE_OFF) -> toAppFlashMode yields FLASH_OFF, silently dropping the ALWAYS_ON state. This is a lossy, asymmetric mapping (intentional for the camera, but a latent source of state confusion).","fix":"Document that FLASH_ALWAYS_ON intentionally maps to FLASH_MODE_OFF (torch handled separately), and ensure no code relies on round-tripping app->cameraX->app for the ALWAYS_ON state.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/extensions/Int.kt:11-28","code":"   11 | fun Int.toCameraXFlashMode(): Int {\n   12 |     return when (this) {\n   13 |         FLASH_ON -> ImageCapture.FLASH_MODE_ON\n   14 |         FLASH_OFF -> ImageCapture.FLASH_MODE_OFF\n   15 |         FLASH_AUTO -> ImageCapture.FLASH_MODE_AUTO\n   16 |         FLASH_ALWAYS_ON -> ImageCapture.FLASH_MODE_OFF\n   17 |         else -> throw IllegalArgumentException(\"Unknown mode: $this\")\n   18 |     }\n   19 | }\n   20 | \n   21 | fun Int.toAppFlashMode(): Int {\n   22 |     return when (this) {\n   23 |         ImageCapture.FLASH n  151 |         }\n  152 |         return mediaOutput\n  153 |     }","lines":13}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"SimpleLocationManager.locationManager is initialized with a non-null assertion: activity.getSystemService(LocationManager::class.java)!!. getSystemService can return null on devices/profiles without the service, which would crash construction of the manager rather than degrading gracefully.","fix":"Make locationManager nullable and guard requestLocationUpdates/getLastKnownLocation, or fail soft when the service is unavailable.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/SimpleLocationManager.kt:21","code":"   21 |     private val locationManager = activity.getSystemService(LocationManager::class.java)!!","lines":1}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"ProcessCameraProvider.getInstance is called with activity.applicationContext, but bindToLifecycle and the cameraState observer use the activity directly as LifecycleOwner. The future listener runs on mainExecutor and references activity fields; if the activity is being destroyed when the future resolves, bindCameraUseCases()/setupCameraObservers() will operate on a dead activity. There is no check that the lifecycle is still at least STARTED inside the future callback (unlike onStart which does check).","fix":"Inside the future addListener callback, verify activity.lifecycle.currentState.isAtLeast(STARTED) before binding, mirroring the guard in onStart.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:193-209","code":"  193 |     private fun startCamera(switching: Boolean = false) {\n  194 |         val cameraProviderFuture = ProcessCameraProvider.getInstance(activity.applicationContext)\n  195 |         cameraProviderFuture.addListener({\n  196 |             try {\n  197 |                 val provider = cameraProviderFuture.get()\n  198 |                 cameraProvider = provider\n  199 |                 imageQualityManager.initSupportedQualities()\n  200 |                 videoQualityManager.initSupportedQualities(provider)\n  201 |                 bindCameraUseCases()\n  202 |                 setupCameraObservers()\n  203 |             } catch (e: Exception) {\n  204 |                 val errorMessage =\n  205 |                     if (switching) R.string.camera_switch_error else R.string.camera_open_error\n  206 |                 activity.toast(errorMessage)\n  207 |             }\n  208 |         }, mainExecutor)\n  209 |     }","lines":17}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"DocumentsContract.createDocument is called with `DocumentsContract.Document.COLUMN_MIME_TYPE` (the literal string \"mime_type\") passed as the mimeType argument. The mimeType parameter should be an actual MIME type such as \"video/mp4\". Passing the column-name constant produces a document with a bogus MIME type, which can cause the created file to have the wrong extension/type or fail to be created/recognized as a video.","fix":"Pass the real MIME type, e.g. VIDEO_MIME_TYPE (\"video/mp4\"), as the third argument to DocumentsContract.createDocument.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/MediaOutputHelper.kt:170-175","code":"  170 |             val documentUri = DocumentsContract.createDocument(\n  171 |                 contentResolver,\n  172 |                 parentUri,\n  173 |                 DocumentsContract.Document.COLUMN_MIME_TYPE,\n  174 |                 videoFileName\n  175 |             ) ?: return null","lines":6}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"setupUseEnglish toggles the English setting and immediately calls exitProcess(0) to force a restart so the new locale applies. Calling exitProcess(0) from a UI click is an abrupt kill of the whole process with no graceful teardown (camera resources, sound helper, pending writes). While other Fossify apps use this pattern, it bypasses normal Activity finish/recreate and can lose state; on a camera app any in-flight capture would be killed.","fix":"Prefer recreating the task / restarting the launcher activity (or AppCompatDelegate locale APIs) over exitProcess(0).","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/SettingsActivity.kt:92-96","code":"   92 |         settingsUseEnglishHolder.setOnClickListener {\n   93 |             settingsUseEnglish.toggle()\n   94 |             config.useEnglish = settingsUseEnglish.isChecked\n   95 |             exitProcess(0)\n   96 |         }","lines":5}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"VideoQualityManager.initSupportedQualities calls cameraProvider.bindToLifecycle(activity, camSelector) for each selector BEFORE checking hasCamera(camSelector). bindToLifecycle throws IllegalArgumentException if the camera does not exist, so on a device missing one of the cameras the bind throws and is swallowed by the catch, but the unconditional bind (line 30) happens outside any guard. Also binding with no UseCase just to query qualities is heavy and unbinds all existing use cases (unbindAll) which can disrupt an active preview.","fix":"Check hasCamera(camSelector) before calling bindToLifecycle, and restore/rebind the previous use cases afterward (or query supported qualities without unbinding the active preview).","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/VideoQualityManager.kt:26-50","code":"   26 |     fun initSupportedQualities(cameraProvider: ProcessCameraProvider) {\n   27 |         if (videoQualities.isEmpty()) {\n   28 |             for (camSelector in CAMERA_SELECTORS) {\n   29 |                 cameraProvider.unbindAll()\n   30 |                 val camera = cameraProvider.bindToLifecycle(activity, camSelector)\n   31 |                 try {\n   32 |                     if (cameraProvider.hasCamera(camSelector)) {\n   33 |                         QualitySelector.getSupportedQualities(camera.cameraInfo)\n   34 |                             .filter(QUALITIES::contains)\n   35 |                             .also { allQualities ->\n   36 |                                 val qualities = allQualities.map { it.toVideoQuality() }\n   37 |                                 videoQualities.add(\n   38 |                                     CameraSelectorVideoQualities(\n   39 |                                         camSelector,\n   40 |                                         qualities\n   41 |                                     )\n   42 |                                 )\n   43 |                             }\n   44 |                     }\n   45 |                 } catch (e: Exception) {\n   46 |                     activity.showErrorToast(e)\n   47 |                 }\n   48 |             }\n   49 |         }\n   50 |     }","lines":25}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"Manually stopping a recording does not play the stop sound consistently with start. toggleRecording() stops via currentRecording?.stop() and sets currentRecording = null; the Finalize event handler plays the stop sound. But because currentRecording is nulled here immediately, and the Finalize callback still arrives asynchronously, this is generally fine - however setting currentRecording = null before Finalize means a second rapid tap could be misinterpreted as a new start while finalization is still in flight, producing overlapping recordings or a recorder-in-use error.","fix":"Do not null currentRecording immediately on stop(); let the Finalize handler clear it, and guard against re-entry while a Finalize is pending.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:673-676","code":"  673 |         } else {\n  674 |             currentRecording?.stop()\n  675 |             currentRecording = null\n  676 |         }","lines":4}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"Recording is started with .withAudioEnabled() unconditionally and the method is annotated @SuppressLint(\"MissingPermission\"). If the RECORD_AUDIO permission has not been granted, withAudioEnabled() throws SecurityException at start time. Suppressing the lint warning does not grant the permission; there is no runtime check that audio recording permission is held before enabling audio.","fix":"Check RECORD_AUDIO permission and call withAudioEnabled() only when granted; otherwise start without audio. Do not blanket-suppress MissingPermission.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:679-715","code":"  679 |     @SuppressLint(\"MissingPermission\", \"NewApi\")\n  680 |     private fun startRecording() {\n  681 |         if (videoCapture == null) {\n  682 |             activity.toast(R.string.camera_open_error)\n  683 |             return\n  684 |         }\n  685 | \n  686 |         val videoCapture = videoCapture\n  687 | \n  688 |         val recording = when (val mediaOutput = mediaOutputHelper.getVideoMediaOutput()) {\n  689 |             is MediaOutput.FileDescriptorMediaOutput -> {\n  690 |                 FileDescriptorOutputOptions.Builder(mediaOutput.fileDescriptor).apply {\n  691 |                     if (config.savePhotoVideoLocation) {\n  692 |                         setLocation(simpleLocationManager?.getLocation())\n  693 |                     }\n  694 |                 }.build().let { videoCapture!!.output.prepareRecording(activity, it) }\n  695 |             }\n  696 | \n  697 |             is MediaOutput.FileMediaOutput -> {\n  698 |                 FileOutputOptions.Builder(mediaOutput.file).apply {\n  699 |                     if (config.savePhotoVideoLocation) {\n  700 |                         setLocation(simpleLocationManager?.getLocation())\n  701 |                     }\n  702 |                 }.build().let { videoCapture!!.output.prepareRecording(activity, it) }\n  703 |             }\n  704 | \n  705 |             is MediaOutput.MediaStoreOutput -> {\n  706 |                 MediaStoreOutputOptions.Builder(contentResolver, mediaOutput.contentUri).apply {\n  707 |                     setContentValues(mediaOutput.contentValues)\n  708 |                     if (config.savePhotoVideoLocation) {\n  709 |                         setLocation(simpleLocationManager?.getLocation())\n  710 |                     }\n  711 |                 }.build().let { videoCapture!!.output.prepareRecording(activity, it) }\n  712 |             }\n  713 |         }\n  714 | \n  715 |         currentRecording = recording.withAudioEnabled()","lines":37},{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:715-716","code":"  715 |         currentRecording = recording.withAudioEnabled()\n  716 |             .start(mainExecutor) { recordEvent ->","lines":2}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"Context.config returns Config.newInstance(applicationContext) on every access, constructing a new Config (and thus re-reading SharedPreferences via BaseConfig) each time it is referenced. Config is accessed frequently (e.g. ImageQualityManager.initSupportedQualities reads activity.config multiple times per call). Repeated construction is wasteful.","fix":"Cache a single Config instance (the underlying SharedPreferences is already a singleton, but avoid re-wrapping it on every property read).","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/extensions/Context.kt:13","code":"   13 | val Context.config: Config get() = Config.newInstance(applicationContext)","lines":1}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"BitmapUtils references options.mCancel, an internal/hidden field of BitmapFactory.Options that is not part of the public SDK. Depending on the build setup this either fails to compile against the public API or reads a private field that may be removed; it is fragile API misuse. The whole BitmapUtils class also appears to be dead code (no production callers visible in this slice).","fix":"Remove the mCancel check (use only the outWidth/outHeight == -1 sentinels), and delete BitmapUtils if it is unused.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/BitmapUtils.kt:23-25","code":"   23 |             if (options.mCancel || options.outWidth == -1 || options.outHeight == -1) {\n   24 |                 return null\n   25 |             }","lines":3}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"ImageQualityManager.CAMERA_LENS uses CameraCharacteristics.LENS_FACING_FRONT/BACK while the membership test lensFacing in CAMERA_LENS compares against the value returned by characteristics.get(LENS_FACING). These are the same int constants, so it works, but toCameraSelector also keys off LENS_FACING_FRONT; an external (e.g. EXTERNAL-facing) camera falls through to DEFAULT_BACK_CAMERA silently, which can mis-map an external camera as back.","fix":"Handle LENS_FACING_EXTERNAL explicitly or document that only front/back are supported (the CAMERA_LENS filter already excludes external, so the toCameraSelector fallback is dead for the included set).","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageQualityManager.kt:17-19","code":"   17 |         private val CAMERA_LENS =\n   18 |             arrayOf(CameraCharacteristics.LENS_FACING_FRONT, CameraCharacteristics.LENS_FACING_BACK)\n   19 |     }","lines":3},{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageQualityManager.kt:54-60","code":"   54 |     private fun Int.toCameraSelector(): CameraSelector {\n   55 |         return if (this == CameraCharacteristics.LENS_FACING_FRONT) {\n   56 |             CameraSelector.DEFAULT_FRONT_CAMERA\n   57 |         } else {\n   58 |             CameraSelector.DEFAULT_BACK_CAMERA\n   59 |         }\n   60 |     }","lines":7}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"PhotoProcessor extends android.os.AsyncTask, which has been deprecated since API 30. Beyond deprecation, AsyncTask runs on a shared serial executor by default and holds an implicit reference to MainActivity, risking activity leaks if the task outlives the activity. This is the core save path for non-CameraX captures.","fix":"Migrate to a coroutine (e.g. lifecycleScope + Dispatchers.IO) or ExecutorService, holding a weak/explicitly-cleared reference to the activity.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/PhotoProcessor.kt:31-39","code":"   31 | class PhotoProcessor(\n   32 |     val activity: MainActivity,\n   33 |     val saveUri: Uri?,\n   34 |     val deviceOrientation: Int,\n   35 |     val previewRotation: Int,\n   36 |     val isUsingFrontCamera: Boolean,\n   37 |     val isThirdPartyIntent: Boolean\n   38 | ) :\n   39 |     AsyncTask<ByteArray, Void, String>() {","lines":9}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"OrientationEventListener is enabled in onStart and disabled in onStop, but the listener mutates preview/imageCapture/videoCapture targetRotation directly. These use-case references can be null or stale between unbindAll() and rebind in bindCameraUseCases(); setting targetRotation on a use case that is mid-rebind is benign but the lastRotation gate means after a rebind the new use cases may not receive the current rotation until the next orientation change. A fresh use case is built without seeding it from lastRotation beyond the previewView.display.rotation at build time.","fix":"After building use cases, apply the current lastRotation to them, or reset lastRotation on rebind so the next orientation event re-applies.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:124-146","code":"  124 |     private val orientationEventListener =\n  125 |         object : OrientationEventListener(activity, SensorManager.SENSOR_DELAY_NORMAL) {\n  126 |             @SuppressLint(\"RestrictedApi\")\n  127 |             override fun onOrientationChanged(orientation: Int) {\n  128 |                 if (orientation == UNKNOWN_ORIENTATION) {\n  129 |                     return\n  130 |                 }\n  131 | \n  132 |                 val rotation = when (orientation) {\n  133 |                     in 45 until 135 -> Surface.ROTATION_270\n  134 |                     in 135 until 225 -> Surface.ROTATION_180\n  135 |                     in 225 until 315 -> Surface.ROTATION_90\n  136 |                     else -> Surface.ROTATION_0\n  137 |                 }\n  138 | \n  139 |                 if (lastRotation != rotation) {\n  140 |                     preview?.targetRotation = rotation\n  141 |                     imageCapture?.targetRotation = rotation\n  142 |                     videoCapture?.targetRotation = rotation\n  143 |                     lastRotation = rotation\n  144 |                 }\n  145 |             }\n  146 |         }","lines":23},{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:267-298","code":"  267 |     private fun buildPreview(resolution: Size, rotation: Int): Preview {\n  268 |         return Preview.Builder()\n  269 |             .setTargetRotation(rotation)\n  270 |             .setResolutionSelector(getResolutionSelector(resolution))\n  271 |             .build().apply {\n  272 |                 setSurfaceProvider(previewView.surfaceProvider)\n  273 |             }\n  274 |     }\n  275 | \n  276 |     private fun getCaptureUseCase(resolution: Size, rotation: Int): UseCase {\n  277 |         return if (isPhotoCapture) {\n  278 |             buildImageCapture(resolution, rotation).also {\n  279 |                 imageCapture = it\n  280 |                 videoCapture = null\n  281 |             }\n  282 |         } else {\n  283 |             buildVideoCapture().also {\n  284 |                 videoCapture = it\n  285 |                 imageCapture = null\n  286 |             }\n  287 |         }\n  288 |     }\n  289 | \n  290 |     private fun buildImageCapture(resolution: Size, rotation: Int): ImageCapture {\n  291 |         return Builder()\n  292 |             .setCaptureMode(getCaptureMode())\n  293 |             .setFlashMode(flashMode)\n  294 |             .setJpegQuality(config.photoQuality)\n  295 |             .setTargetRotation(rotation)\n  296 |             .setResolutionSelector(getResolutionSelector(resolution))\n  297 |             .build()\n  298 |     }","lines":32}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"FocusCircleView uses the deprecated Handler() no-arg constructor, which implicitly attaches to the current thread's Looper and is flagged by lint as error-prone (can attach to the wrong Looper). The view always runs on the UI thread, so use the main looper explicitly.","fix":"Use Handler(Looper.getMainLooper()) instead of Handler().","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/views/FocusCircleView.kt:22","code":"   22 |         mHandler = Handler()","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"ShadowDrawable.draw allocates a new Bitmap (createBitmap.extractAlpha()) on every single draw call. extractAlpha allocates a fresh alpha-only bitmap each frame, which is per-frame heap churn directly in the draw path and defeats the careful buffer-reuse done for the other bitmaps in this method. For an animating/invalidated drawable this causes GC pressure and jank.","fix":"Cache the extracted-alpha bitmap (recompute only when the source content bitmap changes), or draw the shadow using a paint with an alpha BlurMaskFilter applied to the source bitmap rather than extracting a new alpha bitmap each draw.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/views/ShadowDrawable.kt:170","code":"  170 |         outputBufferCanvas!!.drawBitmap(createBitmap.extractAlpha(), srcRect, destRect, shadowPaint)","lines":1}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"For content larger than SHARED_BITMAP_BUFFER_SIZE (640px), ShadowDrawable.draw allocates a brand new Bitmap and Canvas (createBitmap = Bitmap.createBitmap(...); canvas2 = Canvas(...)) on every draw call. Unlike the outputBuffer, this large-path scratch bitmap is never cached/reused, so large drawables incur a full-size ARGB_8888 allocation per frame.","fix":"Cache and reuse this scratch bitmap/canvas (reallocating only when dimensions grow), the same way outputBuffer is reused at lines 154-165.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/views/ShadowDrawable.kt:135-142","code":"  135 |         } else {\n  136 |             createBitmap = Bitmap.createBitmap(\n  137 |                 contentBounds.width(),\n  138 |                 contentBounds.height(),\n  139 |                 Bitmap.Config.ARGB_8888\n  140 |             )\n  141 |             canvas2 = Canvas(createBitmap)\n  142 |         }","lines":8}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"setupPreviewImage calls getLatestMediaId(uri) which performs a MediaStore ContentResolver query. It is invoked from onResume, onInitPhotoMode, onInitVideoMode, mediaSaved, and onMediaSaved, potentially on the main thread. A MediaStore query on the UI thread can cause jank, especially on resume.","fix":"Move getLatestMediaId off the main thread (e.g. ensureBackgroundThread) and post the resulting URI back for Glide loading.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:569-580","code":"  569 |     private fun setupPreviewImage(isPhoto: Boolean) {\n  570 |         val uri =\n  571 |             if (isPhoto) MediaStore.Images.Media.EXTERNAL_CONTENT_URI else MediaStore.Video.Media.EXTERNAL_CONTENT_URI\n  572 |         val lastMediaId = getLatestMediaId(uri)\n  573 |         if (lastMediaId == 0L) {\n  574 |             return\n  575 |         }\n  576 | \n  577 |         mPreviewUri = Uri.withAppendedPath(uri, lastMediaId.toString())\n  578 | \n  579 |         loadLastTakenMedia(mPreviewUri)\n  580 |     }","lines":12}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"onResume in SettingsActivity re-runs every setupX() builder on each resume (setupCustomizeColors, setupSound, setupVolumeButtonsAsShutter, setupMaxBrightness, setupFlipPhotos, etc.), re-attaching new OnClickListeners every time the activity resumes. Each resume replaces the listeners (so no accumulation), but rebuilding all of them on every resume is unnecessary work; only state-dependent items (those that can change while the activity is backgrounded) need refreshing in onResume.","fix":"Move one-time listener setup to onCreate and only refresh dynamic values (checked states, folder text) in onResume.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/SettingsActivity.kt:34-63","code":"   34 |     override fun onResume() {\n   35 |         super.onResume()\n   36 |         setupTopAppBar(binding.settingsAppbar, NavigationIcon.Arrow)\n   37 | \n   38 |         setupCustomizeColors()\n   39 |         setupUseEnglish()\n   40 |         setupLanguage()\n   41 |         setupSound()\n   42 |         setupVolumeButtonsAsShutter()\n   43 |         setupMaxBrightness()\n   44 |         setupFlipPhotos()\n   45 |         setupSavePhotoMetadata()\n   46 |         setupSavePhotoVideoLocation()\n   47 |         setupSavePhotosFolder()\n   48 |         setupPhotoQuality()\n   49 |         setupCaptureMode()\n   50 |         updateTextColors(binding.settingsHolder)\n   51 | \n   52 |         val properPrimaryColor = getProperPrimaryColor()\n   53 |         binding.apply {\n   54 |             arrayListOf(\n   55 |                 settingsColorCustomizationLabel,\n   56 |                 settingsGeneralSettingsLabel,\n   57 |                 settingsCameraLabel,\n   58 |                 settingsSavingLabel,\n   59 |             ).forEach {\n   60 |                 it.setTextColor(properPrimaryColor)\n   61 |             }\n   62 |         }\n   63 |     }","lines":30}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"cropJpegByteArray decodes the cropped region into a Bitmap and re-encodes to JPEG. For the common JPEG-format capture path this is a full decode+encode just to crop, with the intermediate bitmap held entirely in memory. It is correctly recycled, but for large captures this is a heavyweight operation; CameraX upstream only does this when cropping is actually required, which is preserved here, so impact is limited to the crop path.","fix":"Acceptable when cropping is needed; consider BitmapRegionDecoder output reuse or lossless JPEG cropping where feasible to avoid recompression artifacts.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageUtil.kt:148-184","code":"  148 |     @Throws(CodecFailedException::class)\n  149 |     private fun cropJpegByteArray(\n  150 |         data: ByteArray,\n  151 |         cropRect: Rect,\n  152 |         @IntRange(from = 1, to = 100) jpegQuality: Int,\n  153 |     ): ByteArray {\n  154 |         val bitmap: Bitmap\n  155 |         try {\n  156 |             val decoder = BitmapRegionDecoder.newInstance(\n  157 |                 data, 0, data.size,\n  158 |                 false\n  159 |             )\n  160 |             bitmap = decoder.decodeRegion(cropRect, BitmapFactory.Options())\n  161 |             decoder.recycle()\n  162 |         } catch (e: IllegalArgumentException) {\n  163 |             throw CodecFailedException(\n  164 |                 \"Decode byte array failed with illegal argument.$e\",\n  165 |                 CodecFailedException.FailureType.DECODE_FAILED\n  166 |             )\n  167 |         } catch (e: IOException) {\n  168 |             throw CodecFailedException(\n  169 |                 \"Decode byte array failed.\",\n  170 |                 CodecFailedException.FailureType.DECODE_FAILED\n  171 |             )\n  172 |         }\n  173 | \n  174 |         val out = ByteArrayOutputStream()\n  175 |         val success = bitmap.compress(Bitmap.CompressFormat.JPEG, jpegQuality, out)\n  176 |         if (!success) {\n  177 |             throw CodecFailedException(\n  178 |                 \"Encode bitmap failed.\",\n  179 |                 CodecFailedException.FailureType.ENCODE_FAILED\n  180 |             )\n  181 |         }\n  182 |         bitmap.recycle()\n  183 |         return out.toByteArray()\n  184 |     }","lines":37}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"getSoundDuration creates a full MediaPlayer (which decodes/prepares the audio file) on every play() that has an onPlayComplete callback, purely to read the clip duration, then immediately schedules a handler and discards it. This is an expensive synchronous prepare on what is effectively the playback hot path and duplicates work the SoundPool already does. The duration could be measured once and cached per sound.","fix":"Cache the duration per MediaSound after first measurement, or use SoundPool's own completion mechanism, to avoid constructing a MediaPlayer on every playback.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/MediaActionSound.kt:193-213","code":"  193 |     private fun playWithSoundPool(sound: SoundState) {\n  194 |         if (playCompletionRunnable != null && sound.mediaSound != null) {\n  195 |             val duration = getSoundDuration(sound.mediaSound)\n  196 |             playTimeHandler.postDelayed(playCompletionRunnable!!, duration)\n  197 |         }\n  198 |         val streamId = soundPool!!.play(sound.loadId, 1.0f, 1.0f, 0, 0, 1.0f)\n  199 |         sound.streamId = streamId\n  200 |     }\n  201 | \n  202 |     private fun getSoundDuration(mediaSound: MediaSound): Long {\n  203 |         releaseMediaPlayer()\n  204 |         mediaPlayer = when (mediaSound) {\n  205 |             is MediaSound.ManufacturerSound -> MediaPlayer.create(\n  206 |                 context,\n  207 |                 Uri.fromFile(File(mediaSound.path))\n  208 |             )\n  209 | \n  210 |             is MediaSound.RawResSound -> MediaPlayer.create(context, mediaSound.resId)\n  211 |         }\n  212 |         return mediaPlayer!!.duration.toLong()\n  213 |     }","lines":21}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"ResolutionSelector resolution filter recomputes the target aspect ratio inside the comparator lambda for every comparison. abs(size.width/size.height - resolution.width/resolution.height) recomputes resolution.width/resolution.height.toFloat() on each invocation of sortedBy's selector. Minor, but the target ratio is constant and should be hoisted out of the lambda.","fix":"Compute val targetRatio = resolution.width / resolution.height.toFloat() once before sortedBy and reference it in the lambda.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:310-315","code":"  310 |             .setResolutionFilter { supportedSizes, rotationDegrees ->\n  311 |                 // Sort by closest image ratio\n  312 |                 supportedSizes.sortedBy {\n  313 |                     size -> abs(size.width / size.height.toFloat() - resolution.width / resolution.height.toFloat())\n  314 |                 }\n  315 |             }","lines":6}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"VideoQuality is a closed enum of exactly 4 entries with fixed dimensions: UHD/FHD/HD are 16:9 and SD (720x480) is 3:2. Therefore the aspect-ratio predicates isFiveToThree, isFourToThree, isTwoToOne, isThreeToFour, isSixToFive, isNineteenToNine, isNineteenToEight, isOneNineToOne, isSquare can never return true for any enum value, and the corresponding branches in getAspectRatio are unreachable dead code. Only isSixteenToNine and isThreeToTwo can ever match.","fix":"Reduce getAspectRatio (and the predicates) to the only reachable cases (16:9, 3:2) or drop the per-instance ratio machinery entirely and hard-code each enum value's aspect-ratio label.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/models/VideoQuality.kt:23-58","code":"   23 |     private fun isSixteenToNine() = ratio == 16 / 9f\n   24 | \n   25 |     private fun isFiveToThree() = ratio == 5 / 3f\n   26 | \n   27 |     private fun isFourToThree() = ratio == 4 / 3f\n   28 | \n   29 |     private fun isTwoToOne() = ratio == 2f\n   30 | \n   31 |     private fun isThreeToFour() = ratio == 3 / 4f\n   32 | \n   33 |     private fun isThreeToTwo() = ratio == 3 / 2f\n   34 | \n   35 |     private fun isSixToFive() = ratio == 6 / 5f\n   36 | \n   37 |     private fun isNineteenToNine() = ratio == 19 / 9f\n   38 | \n   39 |     private fun isNineteenToEight() = ratio == 19 / 8f\n   40 | \n   41 |     private fun isOneNineToOne() = ratio == 1.9f\n   42 | \n   43 |     private fun isSquare() = width == height\n   44 | \n   45 |     fun getAspectRatio(context: Context) = when {\n   46 |         isSixteenToNine() -> \"16:9\"\n   47 |         isFiveToThree() -> \"5:3\"\n kePicture() or remove the unused interface method.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreviewListener.kt:18","code":"   18 |     fun onPhotoCaptureStart()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:578-636","code":"  578 |     override fun tryTakePicture() {\n  579 |         if (imageCapture == null) {\n  580 |             activity.toast(R.string.camera_open_error)\n  581 |             return\n  582 |         }\n  583 | \n  584 |         val imageCapture = imageCapture\n  585 | \n  586 |         val metadata = Metadata().apply {\n  587 |             isReversedHorizontal = isFrontCameraInUse() && config.flipPhotos\n  588 |             if (config.savePhotoVideoLocation) {\n  589 |                 location = simpleLocationManager?.getLocation()\n  590 |             }\n  591 |         }\n  592 | \n  593 |         val mediaOutput = mediaOutputHelper.getImageMediaOutput()\n  594 |         imageCapture!!.takePicture(mainExecutor, object : OnImageCapturedCallback() {\n  595 |             override fun onCaptureSuccess(image: ImageProxy) {\n  596 |                 listener.shutterAnimation()\n  597 |                 playShutterSoundIfEnabled()\n  598 |                 ensureBackgroundThread {\n  599 |                     image.use {\n  600 |                         if (mediaOutput is MediaOutput.BitmapOutput) {\n  601 |                             val imageBytes = ImageUtil.jpegImageToJpegByteArray(image)\n  602 |                             val bitmap = BitmapUtils.makeBitmap(imageBytes)\n  603 |                             activity.runOnUiThread {\n  604 |                                 listener.onPhotoCaptureEnd()\n  605 |                                 if (bitmap != null) {\n  606 |                                     listener.onImageCaptured(bitmap)\n  607 |                                 } else {\n  608 |                                     cameraErrorHandler.handleImag ult(RESULT_OK, this)\n  745 |             }\n  746 |             finish()\n  747 |         }\n  748 |     }\n  749 | \n  750 |     override fun onImageCaptured(bitmap: Bitmap) {\n  751 |         if (isImageCaptureIntent()) {\n  752 |             Intent().apply {\n  753 |                 putExtra(\"data\", bitmap)\n  754 |                 setResult(RESULT_OK, this)\n  755 |             }\n  756 |             finish()\n  757 |         }\n  758 |     }\n  759 | \n  760 |     override fun onChangeFlashMode(flashMode: Int) {\n  761 |         binding.layoutTop.apply {\n  762 |             val flashDrawable = when (flashMode) {\n  763 |                 FLASH_OFF -> R.drawable.ic_flash_off_vector\n  764 |                 FLASH_ON -> R.drawable.ic_flash_on_vector\n  765 |                 FLASH_AUTO -> R.drawable.ic_flash_auto_vector\n  766 |                 else -> R.drawable.ic_flashlight_vector\n  767 |             }\n  768 |             toggleFlash.setShadowIcon(flashDrawable)\n  769 |             toggleFlash.transitionName = \"${getString(R.string.toggle_flash)}$flashMode\"\n  770 |         }\n  771 |     }\n  772 | \n  773 |     override fun onVideoRecordingStarted() {\n  774 |         binding.apply {\n  775 |             cameraModeHolder.beInvisible()\n  776 |             videoRecCurrTimer.beVisible()\n  777 | \n  778 |             toggleCamera.fadeOut()\n  779 |             lastPhotoVideoPreview.fadeOut()\n  780 | \n  781 |             layoutTop.changeResolution.isEnabled = false\n  782 |             layoutTop.settings.isEnabled = false\n  783 |             shutter.post {\n  784 |                 if (!isDestroyed) {\n  785 |                     shutter.isSelected = true\n  786 |                 }\n  787 |             }\n  788 |         }\n  789 |     }\n  790 | \n  791 |     override fun onVideoRecordingStopped() {\n  792 |         binding.apply {\n  793 |             cameraModeHolder.beVisible()\n  794 | \n  795 |             toggleCamera.fadeIn()\n  796 | // Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

  const m = String(text).match(/\.(\s|$)/);

      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
