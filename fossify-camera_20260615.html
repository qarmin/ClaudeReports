<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"scheduleTimer's CountDownTimer.onFinish() force-unwraps mPreview with mPreview!!.tryTakePicture(). The timer runs asynchronously (up to 10 seconds). If the activity is finished/destroyed during the countdown, onDestroy() sets mPreview = null. cancelTimer() is only called from onPause() when !isAskingPermissions, but a configuration change, process death of the camera, or onFinish firing after mPreview was cleared leads to a NullPointerException crash. The same force-unwrap on mPreview is used in initButtons() (toggleCamera, toggleFlash listeners) where it is comparatively safer, but the deferred timer callback is the dangerous one.","fix":"Use mPreview?.tryTakePicture() instead of mPreview!!.tryTakePicture() in onFinish(), consistent with the null-safe calls used elsewhere (shutterPressed).","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:1009-1012","code":" 1009 |             override fun onFinish() {\n 1010 |                 cancelTimer()\n 1011 |                 mPreview!!.tryTakePicture()\n 1012 |             }","lines":4}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Several handlers force-unwrap mPreview (mPreview!!) inside click listeners: toggleCamera and toggleFlash. These are set up in initButtons() which is only called from initializeCamera() after mPreview is assigned, so normally safe. However the rest of the file consistently uses the null-safe mPreview?. operator (shutterPressed, selectFlashMode, setFlashAvailable, etc.), making these force-unwraps an inconsistent and fragile pattern that can NPE if a click is somehow dispatched during teardown.","fix":"Use mPreview?.toggleFrontBackCamera() and mPreview?.handleFlashlightClick() for consistency and safety.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:383","code":"  383 |             mPreview!!.toggleFrontBackCamera()","lines":1},{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:389","code":"  389 |             toggleFlash.setOnClickListener { mPreview!!.handleFlashlightClick() }","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"captureMode getter indexes CaptureMode.values() directly with the stored ordinal. If the persisted value is out of range (e.g. a stored index from a future build with more modes, or corrupted prefs), this throws ArrayIndexOutOfBoundsException and crashes on startup. Compare with timerMode just below, which correctly uses getOrNull(...) ?: TimerMode.OFF for exactly this reason.","fix":"Use CaptureMode.values().getOrNull(prefs.getInt(CAPTURE_MODE, CaptureMode.MINIMIZE_LATENCY.ordinal)) ?: CaptureMode.MINIMIZE_LATENCY, mirroring the timerMode getter.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/Config.kt:90-95","code":"   90 |     var captureMode: CaptureMode\n   91 |         get() = CaptureMode.values()[prefs.getInt(\n   92 |             CAPTURE_MODE,\n   93 |             CaptureMode.MINIMIZE_LATENCY.ordinal\n   94 |         )]\n   95 |         set(captureMode) = prefs.edit().putInt(CAPTURE_MODE, captureMode.ordinal).apply()","lines":6}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"doInBackground returns `photoFile.absolutePath` even when `fos` was null (openOutputStream returned null in the SAF/saveUri branches). In that case the image was never written (the `if (fos != null)` guard skips compress) yet a non-empty path is returned, so onPostExecute calls activity.mediaSaved(path) for a file that does not exist. Downstream consumers that read this path can fail.","fix":"If fos is null (or compress is skipped), return \"\" so onPostExecute does not report a phantom save.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/PhotoProcessor.kt:81-88","code":"   81 |                 fos = activity.contentResolver.openOutputStream(document.uri)\n   82 |             } else {\n   83 |                 fos = if (saveUri == null) {\n   84 |                     FileOutputStream(photoFile)\n   85 |                 } else {\n   86 |                     activity.contentResolver.openOutputStream(saveUri)\n   87 |                 }\n   88 |             }","lines":8},{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/PhotoProcessor.kt:135-167","code":"  135 |             try {\n  136 |                 if (fos != null) {\n  137 |                     image.compress(Bitmap.CompressFormat.JPEG, activity.config.photoQuality, fos)\n  138 |                 }\n  139 |                 if (!isThirdPartyIntent) {\n  140 |                     activity.saveImageRotation(path, totalRotation)\n  141 |                 }\n  142 |             } catch (e: Exception) {\n  143 |                 activity.showErrorToast(e)\n  144 |                 return \"\"\n  145 |             }\n  146 | \n  147 |             if (activity.config.savePhotoMetadata && !isThirdPartyIntent) {\n  148 |                 val exifInterface = if (path.startsWith(activity.internalStoragePath)) {\n  149 |                     ExifInterface(path)\n  150 |                 } else {\n  151 |                     val documentFile = activity.getSomeDocumentFile(path)\n  152 |                     if (documentFile != null) {\n  153 |                         val parcelFileDescriptor =\n  154 |                             activity.contentResolver.openFileDescriptor(documentFile.uri, \"rw\")\n  155 |                         val fileDescriptor = parcelFileDescriptor!!.fileDescriptor\n  156 |                         ExifInterface(fileDescriptor)\n  157 |                     } else {\n  158 |                         null\n  159 |                     }\n  160 |                 }\n  161 | \n  162 |                 if (exifInterface != null) {\n  163 |                     tempExif.copyTo(exifInterface)\n  164 |                 }\n  165 |             }\n  166 | \n  167 |             return photoFile.absolutePath","lines":33},{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/PhotoProcessor.kt:196-201","code":"  196 |     override fun onPostExecute(path: String) {\n  197 |         super.onPostExecute(path)\n  198 |         if (path.isNotEmpty()) {\n  199 |             activity.mediaSaved(path)\n  200 |         }\n  201 |     }","lines":6}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"savePhotosFolder getter calls File(path) where path is the nullable result of prefs.getString(...). If prefs somehow held null, File(null) would NPE, and the final return path!! would also crash. The default supplied is non-null so in practice this is safe, but the mixed nullable handling (using path!! at the end while not guarding the File(path) calls) is fragile.","fix":"Make path a non-null local (use a non-null default and the elvis operator), e.g. val path = prefs.getString(...) ?: defaultDcim, then drop the !!.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/Config.kt:16-29","code":"   16 |     var savePhotosFolder: String\n   17 |         get(): String {\n   18 |             var path = prefs.getString(\n   19 |                 SAVE_PHOTOS,\n   20 |                 Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DCIM).toString()\n   21 |             )\n   22 |             if (!File(path).exists() || !File(path).isDirectory) {\n   23 |                 path = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DCIM)\n   24 |                     .toString()\n   25 |                 savePhotosFolder = path\n   26 |             }\n   27 |             return path!!\n   28 |         }\n   29 |         set(path) = prefs.edit().putString(SAVE_PHOTOS, path).apply()","lines":14}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"previewView.display can be null. In bindCameraUseCases(), previewView.display.rotation is dereferenced (line 230). View.getDisplay() returns null when the view is not attached to a window. startCamera() is normally invoked via doOnLayout (attached), but startCamera() is also called from many other paths (toggleFrontBackCamera, toggleResolutions, showChangeResolution callback, photo/video mode runnables) without re-checking attachment, so a startCamera() that races with detachment would NPE on previewView.display.","fix":"Use previewView.display ?: previewView.context.display with a null-safe fallback, or guard startCamera() with an attached/STARTED check.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:230","code":"  230 |         val rotation = previewView.display.rotation","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"onSingleTapConfirmed dereferences displayManager.getDisplay(Display.DEFAULT_DISPLAY) which can return null on devices/states where the default display is not available, and passes it to DisplayOrientedMeteringPointFactory whose display parameter is non-null. A null here would throw. Also camera?.cameraControl is re-read inside the let block (line 412) rather than using the captured non-null cameraInfo receiver, an inconsistency that could NPE-skip if camera changed mid-gesture (it returns true regardless via the ?. on a separate ref).","fix":"Null-check the Display before building the metering factory; capture cameraControl once alongside cameraInfo at the top of the let.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:397-415","code":"  397 |             override fun onSingleTapConfirmed(event: MotionEvent): Boolean {\n  398 |                 return camera?.cameraInfo?.let {\n  399 |                     val display = displayManager.getDisplay(Display.DEFAULT_DISPLAY)\n  400 |                     val width = previewView.width.toFloat()\n  401 |                     val height = previewView.height.toFloat()\n  402 |                     val factory = DisplayOrientedMeteringPointFactory(display, it, width, height)\n  403 |                     val xPos = event.x\n  404 |                     val yPos = event.y\n  405 |                     val autoFocusPoint = factory.createPoint(xPos, yPos, AF_SIZE)\n  406 |                     val autoExposurePoint = factory.createPoint(xPos, yPos, AE_SIZE)\n  407 |                     val focusMeteringAction =\n  408 |                         FocusMeteringAction.Builder(autoFocusPoint, FocusMeteringAction.FLAG_AF)\n  409 |                             .addPoint(autoExposurePoint, FocusMeteringAction.FLAG_AE)\n  410 |                             .disableAutoCancel()\n  411 |                             .build()\n  412 |                     camera?.cameraControl?.startFocusAndMetering(focusMeteringAction)\n  413 |                     listener.onFocusCamera(event.rawX, event.rawY)\n  414 |                     true\n  415 |                 } ?: false","lines":19}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"MySize.getImageResId and getButtonId throw UnsupportedOperationException for any size that is not full-screen, 16:9, 4:3, or square. getSupportedResolutions filters via isSupported which permits exactly those ratios, so callers are currently safe, but the coupling is implicit: any future change to isSupported (e.g. allowing 3:2) that is not mirrored here will crash at UI-build time.","fix":"Keep getImageResId/getButtonId in sync with isSupported, or provide a safe default branch and assert the invariant in one place.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/models/MySize.kt:69-85","code":"   69 |     @DrawableRes\n   70 |     fun getImageResId(): Int = when {\n   71 |         isFullScreen -> R.drawable.ic_photo_full_vector\n   72 |         isSixteenToNine() -> R.drawable.ic_photo_16x9_vector\n   73 |         isFourToThree() -> R.drawable.ic_photo_4x3_vector\n   74 |         isSquare() -> R.drawable.ic_photo_1x1_vector\n   75 |         else -> throw UnsupportedOperationException(\"This size $this is not supported\")\n   76 |     }\n   77 | \n   78 |     @IdRes\n   79 |     fun getButtonId(): Int = when {\n   80 |         isFullScreen -> R.id.photo_full\n   81 |         isSixteenToNine() -> R.id.photo_16x9\n   82 |         isFourToThree() -> R.id.photo_4x3\n   83 |         isSquare() -> R.id.photo_1x1\n   84 |         else -> throw UnsupportedOperationException(\"This size $this is not supported\")\n   85 |     }","lines":17}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","easy":false,"description":"MediaActionSound.play accesses and mutates playCompletionRunnable on the calling thread, while the SoundPool OnLoadCompleteListener invokes playWithSoundPool from the SoundPool callback thread, which also reads playCompletionRunnable and posts to playTimeHandler. removeHandlerCallbacks (called from play()) nulls playCompletionRunnable without synchronization relative to the load-complete callback, so a play-on-load can either lose its completion callback or fire a stale one. The field is not volatile and access is not guarded by the per-sound lock.","fix":"Guard playCompletionRunnable access with a consistent lock or post all mutations to the main Looper handler so they are serialized.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/MediaActionSound.kt:66","code":"   66 |     private var playCompletionRunnable: Runnable? = null","lines":1},{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/MediaActionSound.kt:160-200","code":"  160 |     fun play(mediaSound: MediaSound, onPlayComplete: (() -> Unit)? = null) {\n  161 |         removeHandlerCallbacks()\n  162 |         if (onPlayComplete != null) {\n  163 |             playCompletionRunnable = Runnable {\n  164 |                 onPlayComplete.invoke()\n  165 |             }\n  166 |         }\n  167 |         val sound = sounds.first { it.mediaSound == mediaSound }\n  168 |         synchronized(sound) {\n  169 |             when (sound.state) {\n  170 |                 STATE_NOT_LOADED -> {\n  171 |                     val soundId = loadSound(sound)\n  172 |                     if (soundId <= 0) {\n  173 |                         Log.e(TAG, \"play() error loading sound: $mediaSound\")\n  174 |                         onPlayComplete?.invoke()\n  175 |                     } else {\n  176 |                         sound.state = STATE_LOADING_PLAY_REQUESTED\n  177 |                     }\n  178 |                 }\n  179 | \n  180 |                 STATE_LOADING -> sound.state = STATE_LOADING_PLAY_REQUESTED\n  181 |                 STATE_LOADED -> {\n  182 |                     playWithSoundPool(sound)\n  183 |                 }\n  184 | \n  185 |                 else -> Log.e(\n  186 |                     TAG,\n  187 |                     \"play() called in wrong state: ${sound.state} for sound: $mediaSound\"\n  188 |                 )\n  189 |             }\n  190 |         }\n  191 |     }\n  192 | \n  193 |     private fun playWithSoundPool(sound: SoundState) {\n  194 |         if (playCompletionRunnable != null && sound.mediaSound != null) {\n  195 |             val duration = getSoundDuration(sound.mediaSound)\n  196 |             playTimeHandler.postDelayed(playCompletionRunnable!!, duration)\n  197 |         }\n  198 |         val streamId = soundPool!!.play(sound.loadId, 1.0f, 1.0f, 0, 0, 1.0f)\n  199 |         sound.streamId = streamId\n  200 |     }","lines":41},{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/MediaActionSound.kt:247-250","code":"  247 |     private fun removeHandlerCallbacks() {\n  248 |         playCompletionRunnable?.let { playTimeHandler.removeCallbacks(it) }\n  249 |         playCompletionRunnable = null\n  250 |     }","lines":4}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"negligible","easy":false,"description":"Constants.kt mixes unrelated concerns: orientation constants, all SharedPreferences keys, flash-state constants, and a free function compensateDeviceRotation in one file. compensateDeviceRotation is logic, not a constant, and is awkwardly placed in a constants file.","fix":"Move compensateDeviceRotation to an orientation/extension helper; optionally group the preference-key constants separately from value constants.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/Constants.kt:1-37","code":"    1 | package org.fossify.camera.helpers\n    2 | \n    3 | const val ORIENT_PORTRAIT = 0\n    4 | const val ORIENT_LANDSCAPE_LEFT = 1\n    5 | const val ORIENT_LANDSCAPE_RIGHT = 2\n    6 | \n    7 | // shared preferences\n    8 | const val SAVE_PHOTOS = \"save_photos\"\n    9 | const val SOUND = \"sound\"\n   10 | const val VOLUME_BUTTONS_AS_SHUTTER = \"volume_buttons_as_shutter\"\n   11 | const val FLIP_PHOTOS = \"flip_photos\"\n   12 | const val LAST_USED_CAMERA = \"last_used_camera_3\"\n   13 | const val LAST_USED_CAMERA_LENS = \"last_used_camera_lens\"\n   14 | const val FLASHLIGHT_STATE = \"flashlight_state\"\n   15 | const val INIT_PHOTO_MODE = \"init_photo_mode\"\n   16 | const val BACK_PHOTO_RESOLUTION_INDEX = \"back_photo_resolution_index_3\"\n   17 | const val BACK_VIDEO_RESOLUTION_INDEX = \"back_video_resolution_index_3\"\n   18 | const val FRONT_PHOTO_RESOLUTION_INDEX = \"front_photo_resolution_index_3\"\n   19 | const val FRONT_VIDEO_RESOLUTION_INDEX = \"front_video_resolution_index_3\"\n   20 | const val SAVE_PHOTO_METADATA = \"save_photo_metadata\"\n   21 | const val SAVE_PHOTO_VIDEO_LOCATION = \"save_photo_video_location\"\n   22 | const val PHOTO_QUALITY = \"photo_quality\"\n   23 | const val CAPTURE_MODE = \"capture_mode\"\n   24 | const val TIMER_MODE = \"timer_mode\"\n   25 | const val MAX_BRIGHTNESS = \"max_brightness\"\n   26 | \n   27 | const val FLASH_OFF = 0\n   28 | const val FLASH_ON = 1\n   29 | const val FLASH_AUTO = 2\n   30 | const val FLASH_ALWAYS_ON = 3\n   31 | \n   32 | fun compensateDeviceRotation(orientation: Int) = when (orientation) {\n   33 |     ORIENT_LANDSCAPE_LEFT -> 270\n   34 |     ORIENT_LANDSCAPE_RIGHT -> 90\n   35 |     else -> 0\n   36 | }","lines":37}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"The FileOutputStream opened to write the temp JPEG is never closed. It is assigned to a local `output` and written to, but there is no `.use { }`, `close()`, or finally block. On every photo save a file descriptor / stream is leaked, and because the stream is never flushed/closed the data may not be fully flushed before the EXIF ExifInterface(tempFile) reopens and rewrites the same file, risking corrupt/partial JPEGs in addition to the leak.","fix":"Wrap the output stream in `FileOutputStream(tempFile).use { output -> output.write(byteArray) }` so it is flushed and closed before the EXIF rewrite, or close it explicitly in a finally block.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageSaver.kt:100-129","code":"  100 |         try {\n  101 |             val output = FileOutputStream(tempFile)\n  102 |             val byteArray: ByteArray = imageToJpegByteArray(image, jpegQuality)\n  103 |             output.write(byteArray)\n  104 | \n  105 |             if (saveExifAttributes) {\n  106 |                 val exifInterface = ExifInterface(tempFile)\n  107 |                 val imageByteArray = jpegImageToJpegByteArray(image)\n  108 |                 val inputStream: InputStream = ByteArrayInputStream(imageByteArray)\n  109 |                 ExifInterface(inputStream).copyTo(exifInterface)\n  110 | \n  111 |                 // Overwrite the original orientation if the quirk exists.\n  112 |                 if (!ExifRotationAvailability().shouldUseExifOrientation(image)) {\n  113 |                     exifInterface.rotate(image.imageInfo.rotationDegrees)\n  114 |                 }\n  115 | \n  116 |                 if (metadata.isReversedHorizontal) {\n  117 |                     exifInterface.flipHorizontally()\n  118 |                 }\n  119 | \n  120 |                 if (metadata.isReversedVertical) {\n  121 |                     exifInterface.flipVertically()\n  122 |                 }\n  123 | \n  124 |                 if (metadata.location != null) {\n  125 |                     exifInterface.setGpsInfo(metadata.location)\n  126 |                 }\n  127 | \n  128 |                 exifInterface.saveAttributes()\n  129 |             }","lines":30}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"SimpleLocationManager registers locationListener via requestLocationUpdates() but dropLocationUpdates() must be called explicitly to remove it. The manager holds a reference to the activity, and the LocationManager holds the listener. If a caller fails to invoke dropLocationUpdates (e.g. on every pause/destroy path, including early returns or exceptions), the activity is leaked and location updates keep running, draining battery. There is no lifecycle binding to guarantee removal.","fix":"Bind to the activity lifecycle (LifecycleObserver) so updates are automatically dropped in onPause/onStop, instead of relying on every caller to manually pair request/drop.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/SimpleLocationManager.kt:60-74","code":"   60 |     @RequiresPermission(anyOf = [Manifest.permission.ACCESS_FINE_LOCATION, Manifest.permission.ACCESS_COARSE_LOCATION])\n   61 |     fun requestLocationUpdates() {\n   62 |         locationManager.allProviders.forEach { provider ->\n   63 |             locationManager.requestLocationUpdates(\n   64 |                 provider,\n   65 |                 LOCATION_UPDATE_MIN_TI  |             if (cameraState.error == null) {\n  350 |                 when (cameraState.type) {\n  351 |                     CameraState.Type.OPENING,\n  352 |                     CameraState.Type.OPEN -> {\n  353 |                         listener.setHasFrontAndBackCamera(hasFrontCamera() && hasBackCamera())\n  354 |                         listener.setCameraAvailable(true)\n  355 |                     }\n  356 | \n  357 |                     CameraState.Type.PENDING_OPEN,\n  358 |                     CameraState.Type.CLOSING,\n  359 |                     CameraState.Type.CLOSED -> {\n  360 |                         listener.setCameraAvailable(false)\n  361 |                     }\n  362 |                 }\n  363 |             } else {\n  364 |                 listener.setCameraAvailable(false)\n  365 |                 cameraErrorHandler.handleCameraError(cameraState.error)\n  366 |             }\n  367 |         }\n  368 |     }","lines":29}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"PhotoProcessor decodes bitmaps with BitmapFactory.decodeByteArray and creates rotated/flipped copies via Bitmap.createBitmap, but none of the intermediate bitmaps are ever recycled. When rotate() or the front-camera flip allocates a new Bitmap, the original `image` reference is overwritten without recycling the previous bitmap. For full-resolution camera captures these are large allocations; relying solely on GC increases OOM risk on repeated captures.","fix":"Recycle the previous bitmap after creating a rotated/flipped copy when the new instance differs from the old one (Bitmap.createBitmap may return the same instance), and recycle the final bitmap after compress().","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/PhotoProcessor.kt:105-133","code":"  105 |             var image = BitmapFactory.decodeByteArray(data, 0, data.size)\n  106 |             val totalRotation = (imageRot + deviceRot + previewRotation) % 360\n  107 | \n  108 |             if (isThirdPartyIntent) {\n  109 |                 // make sure the image itself is rotated at third party intents\n  110 |                 image = rotate(image, totalRotation)\n  111 |             }\n  112 | \n  113 |             if (isUsingFrontCamera) {\n  114 |                 if (activity.config.flipPhotos || deviceRot != 0) {\n  115 |                     val matrix = Matrix()\n  116 |                     val isPortrait = image.width < image.height\n  117 |                     matrix.preScale(if (isPortrait) -1f else 1f, if (isPortrait) 1f else -1f)\n  118 | \n  119 |                     try {\n  120 |                         image = Bitmap.createBitmap(\n  121 |                             image,\n  122 |                             0,\n  123 |                             0,\n  124 |                             image.width,\n  125 |                             image.height,\n  126 |                             matrix,\n  127 |                             false\n  128 |                         )\n  129 |                     } catch (e: OutOfMemoryError) {\n  130 |                         activity.toast(org.fossify.commons.R.string.out_of_memory_error)\n  131 |                     }\n  132 |                 }\n  133 |             }","lines":29},{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/PhotoProcessor.kt:177-194","code":"  177 |     private fun rotate(bitmap: Bitmap, degree: Int): Bitmap? {\n  178 |         if (degree == 0) {\n  179 |             return bitmap\n  180 |         }\n  181 | \n  182 |         val width = bitmap.width\n  183 |         val height = bitmap.height\n  184 | \n  185 |         val matrix = Matrix()\n  186 |         matrix.setRotate(degree.toFloat())\n  187 | \n  188 |         try {\n  189 |             return Bitmap.createBitmap(bitmap, 0, 0, width, height, matrix, true)\n  190 |         } catch (e: OutOfMemoryError) {\n  191 |             activity.showErrorToast(e.toString())\n  192 |         }\n  193 |         return null\n  194 |     }","lines":18}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In the savePhotoMetadata branch, an OutputStream/ParcelFileDescriptor is opened via openFileDescriptor(documentFile.uri, \"rw\") to build an ExifInterface, but the ParcelFileDescriptor is never closed. Each metadata-saving capture leaks a file descriptor. The earlier openOutputStream(document.uri) result is assigned to `fos` and closed in finally, but this second descriptor has no such handling.","fix":"Keep a reference to the ParcelFileDescriptor and close it in the finally block after saveAttributes completes.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/PhotoProcessor.kt:147-165","code":"  147 |             if (activity.config.savePhotoMetadata && !isThirdPartyIntent) {\n  148 |                 val exifInterface = if (path.startsWith(activity.internalStoragePath)) {\n  149 |                     ExifInterface(path)\n  150 |                 } else {\n  151 |                     val documentFile = activity.getSomeDocumentFile(path)\n  152 |                     if (documentFile != null) {\n  153 |                         val parcelFileDescriptor =\n  154 |                             activity.contentResolver.openFileDescriptor(documentFile.uri, \"rw\")\n  155 |                         val fileDescriptor = parcelFileDescriptor!!.fileDescriptor\n  156 |                         ExifInterface(fileDescriptor)\n  157 |                     } else {\n  158 |                         null\n  159 |                     }\n  160 |                 }\n  161 | \n  162 |                 if (exifInterface != null) {\n  163 |                     tempExif.copyTo(exifInterface)\n  164 |                 }\n  165 |             }","lines":19}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"OrientationEventListener (mOrientationEventListener) is enabled in onResume only when hasStorageAndCameraPermissions() is true, and disabled in onPause only when permissions are held and not asking permissions. If permission state changes between resume and pause (e.g. user revokes via a returning settings flow), the enable/disable can become unbalanced, leaving the sensor listener enabled. The onOrientationChanged callback guards with isDestroyed and self-disables, mitigating a true leak, but the enable/disable lifecycle is asymmetric and brittle.","fix":"Disable the orientation listener unconditionally in onPause/onDestroy rather than gating it on permission state.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:121-152","code":"  121 |     override fun onResume() {\n  122 |         super.onResume()\n  123 |         if (hasStorageAndCameraPermissions()) {\n  124 |             val isInPhotoMode = isInPhotoMode()\n  125 |             setupPreviewImage(isInPhotoMode)\n  126 |             mFocusCircleView.setStrokeColor(getProperPrimaryColor())\n  127 |             toggleActionButtons(enabled = true)\n  128 |             mOrientationEventListener.enable()\n  129 |         }\n  130 | \n  131 |         window.addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)\n  132 |         mOriginalBrightness = window.updateBrightness(config.maxBrightness, mOriginalBrightness)\n  133 |         ensureTransparentNavigationBar()\n  134 |         if (ViewCompat.getWindowInsetsController(window.decorView) == null) {\n  135 |             window.decorView.systemUiVisibility =\n  136 |                 View.SYSTEM_UI_FLAG_FULLSCREEN or View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION\n  137 |         }\n  138 |     }\n  139 | \n  140 |     override fun onPause() {\n  141 |         super.onPause()\n  142 |         window.clearFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)\n  143 |         if (!isAskingPermissions) {\n  144 |             cancelTimer()\n  145 |         }\n  146 | \n  147 |         if (!hasStorageAndCameraPermissions() || isAskingPermissions) {\n  148 |             return\n  149 |         }\n  150 | \n  151 |         mOrientationEventListener.disable()\n  152 |     }","lines":32},{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:639-643","code":"  639 |             override fun onOrientationChanged(orientation: Int) {\n  640 |                 if (isDestroyed) {\n  641 |                     mOrientationEventListener.disable()\n  642 |                     return\n  643 |                 }","lines":5}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"FocusCircleView posts a delayed runnable to mHandler that captures the view (via toggleCircle/invalidate). If the view is detached/destroyed within CIRCLE_DURATION the pending message keeps a reference to the view until it fires. drawFocusCircle clears prior callbacks before posting, but nothing clears them on detach, so a detached view can be retained for up to 500ms.","fix":"Override onDetachedFromWindow to call mHandler.removeCallbacksAndMessages(null).","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/views/FocusCircleView.kt:34-43","code":"   34 |     fun drawFocusCircle(x: Float, y: Float) {\n   35 |         mLastCenterX = x\n   36 |         mLastCenterY = y\n   37 |         toggleCircle(true)\n   38 | \n   39 |         mHandler.removeCallbacksAndMessages(null)\n   40 |         mHandler.postDelayed({\n   41 |             toggleCircle(false)\n   42 |         }, CIRCLE_DURATION)\n   43 |     }","lines":10}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"computeInitialSampleSize computes `floor(w / minSideLength)` and `floor(h / minSideLength)` and only later guards against minSideLength < 0; when minSideLength is 0 (not negative) this divides by zero producing Infinity, and `.toInt()` of Infinity is Int.MAX_VALUE, yielding an absurd upperBound. The public makeBitmap always passes minSideLength = -1 so it is not currently triggered, but the helper is unsafe if reused.","fix":"Guard against minSideLength <= 0 rather than < 0, or document/precondition the contract.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/BitmapUtils.kt:60-82","code":"   60 |     private fun computeInitialSampleSize(\n   61 |         options: BitmapFactory.Options,\n   62 |         minSideLength: Int,\n   63 |         maxNumOfPixels: Int\n   64 |     ): Int {\n   65 |         val w = options.outWidth.toDouble()\n   66 |         val h = options.outHeight.toDouble()\n   67 |         val lowerBound = if (maxNumOfPixels < 0) 1 else ceil(sqrt(w * h / maxNumOfPixels)).toInt()\n   68 |         val upperBound =\n   69 |             if (minSideLength < 0) 128 else floor(w / minSideLength).coerceAtMost(floor(h / minSideLength))\n   70 |                 .toInt()\n   71 |         if (upperBound < lowerBound) {\n   72 |             // return the larger one when there is no overlapping zone.\n   73 |             return lowerBound\n   74 |         }\n   75 |         return if (maxNumOfPixels < 0 && minSideLength < 0) {\n   76 |             1\n   77 |         } else if (minSideLength < 0) {\n   78 |             lowerBound\n   79 |         } else {\n   80 |             upperBound\n   81 |         }\n   82 |     }","lines":23}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In copyTempFileToDestination, for FileMediaOutput the code sets `outputUri = Uri.fromFile(targetFile)` even when `renameTo` fails (saveError is set). At the end, `outputUri?.let(onImageSaved) ?: postError(...)` is reached: since outputUri is non-null, onImageSaved is invoked despite the rename failure, and the error is silently swallowed. The user is told the image saved when it did not.","fix":"Only set outputUri when the rename succeeds (move the assignment into the success branch), or check `saveError != null` first and call postError in that case before falling back to onImageSaved.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageSaver.kt:203-216","code":"  203 |                 is MediaOutput.FileMediaOutput -> {\n  204 |                     val targetFile: File = mediaOutput.file\n  205 |                     // Normally File#renameTo will overwrite the targetFile even if it already exists.\n  206 |                     // Just in case of unexpected behavior on certain platforms or devices, delete the\n  207 |                     // target file before renaming.\n  208 |                     if (targetFile.exists()) {\n  209 |                         targetFile.delete()\n  210 |                     }\n  211 |                     if (!tempFile.renameTo(targetFile)) {\n  212 |                         saveError = SaveError.FILE_IO_FAILED\n  213 |                         errorMessage = \"Failed to rename file.\"\n  214 |                     }\n  215 |                     outputUri = Uri.fromFile(targetFile)\n  216 |                 }","lines":14},{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageSaver.kt:232","code":"  232 |         outputUri?.let(onImageSaved) ?: postError(saveError!!, errorMessage, exception)","lines":1}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"onKeyDown treats KEYCODE_VOLUME_UP/DOWN as shutter only when config.volumeButtonsAsShutter is set, returning true to consume the event. But the mIsHardwareShutterHandled latch is shared between the camera key and volume keys. If the user presses the camera hardware key (which sets the latch) and, before releasing, presses a volume key, the volume press is swallowed/ignored. Conversely onKeyUp resets the latch for any of the three keys, so releasing one key clears the latch for the others, defeating debouncing across mixed key presses.","fix":"Track handled state per key (or per key group) rather than a single shared boolean, so independent keys do not interfere.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:203-222","code":"  203 |     override fun onKeyDown(keyCode: Int, event: KeyEvent): Boolean {\n  204 |         return if (keyCode == KeyEvent.KEYCODE_CAMERA && !mIsHardwareShutterHandled) {\n  205 |             mIsHardwareShutterHandled = true\n  206 |             shutterPressed()\n  207 |             true\n  208 |         } else if (!mIsHardwareShutterHandled && config.volumeButtonsAsShutter && (keyCode == KeyEvent.KEYCODE_VOLUME_DOWN || keyCode == KeyEvent.KEYCODE_VOLUME_UP)) {\n  209 |             mIsHardwareShutterHandled = true\n  210 |             shutterPressed()\n  211 |             true\n  212 |         } else {\n  213 |             super.onKeyDown(keyCode, event)\n  214 |         }\n  215 |     }\n  216 | \n  217 |     override fun onKeyUp(keyCode: Int, event: KeyEvent): Boolean {\n  218 |         if (keyCode == KeyEvent.KEYCODE_CAMERA || keyCode == KeyEvent.KEYCODE_VOLUME_DOWN || keyCode == KeyEvent.KEYCODE_VOLUME_UP) {\n  219 |             mIsHardwareShutterHandled = false\n  220 |         }\n  221 |         return super.onKeyUp(keyCode, event)\n  222 |     }","lines":20}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"isInPhotoMode() returns config.initPhotoMode only when mPreview is null and there is no capture intent. But hasStorageAndCameraPermissions() (called in onResume before camera init can complete) relies on isInPhotoMode() to decide whether to check photo vs video permissions. During the window before mPreview is created, the mode reported may disagree with the mode the camera will actually initialize in (tryInitCamera can downgrade video->photo on audio-permission denial by setting config.initPhotoMode=true and re-initing), causing onResume to evaluate the wrong permission set and either skip or wrongly perform setup work.","fix":"Cache the resolved mode once the camera is initialized and use a single source of truth for permission checks, or gate onResume setup on whether the camera/preview is actually initialized rather than re-deriving the mode.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:261-269","code":"  261 |     private fun isInPhotoMode(): Boolean {\n  262 |         return mPreview?.isInPhotoMode() ?: if (isVideoCaptureIntent()) {\n  263 |             false\n  264 |         } else if (isImageCaptureIntent()) {\n  265 |             true\n  266 |         } else {\n  267 |             config.initPhotoMode\n  268 |         }\n  269 |     }","lines":9},{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:599-601","code":"  599 |     private fun hasStorageAndCameraPermissions(): Boolean {\n  600 |         return if (isInPhotoMode()) hasPhotoModePermissions() else hasVideoModePermissions()\n  601 |     }","lines":3}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"loadLastTakenMedia and setupPreviewImage both write to mPreviewUri. setupPreviewImage sets mPreviewUri then calls loadLastTakenMedia(mPreviewUri), which sets mPreviewUri = uri again (redundant double assignment). More importantly, mediaSaved() and onMediaSaved() can be invoked from background/save callbacks; setupPreviewImage queries getLatestMediaId on the calling thread (likely main) and the Glide load is posted to UI thread, but mPreviewUri is mutated without synchronization and read in showLastMediaPreview from the UI thread, creating a benign-but-real shared mutable field touched from multiple callback paths.","fix":"Remove the redundant assignment and ensure mPreviewUri is only mutated on the main thread; document the threading contract.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:569-597","code":"  569 |     private fun setupPreviewImage(isPhoto: Boolean) {\n  570 |         val uri =\n  571 |             if (isPhoto) MediaStore.Images.Media.EXTERNAL_CONTENT_URI else MediaStore.Video.Media.EXTERNAL_CONTENT_URI\n  572 |         val lastMediaId = getLatestMediaId(uri)\n  573 |         if (lastMediaId == 0L) {\n  574 |             return\n  575 |         }\n  576 | \n  577 |         mPreviewUri = Uri.withAppendedPath(uri, lastMediaId.toString())\n  578 | \n  579 |         loadLastTakenMedia(mPreviewUri)\n  580 |     }\n  581 | \n  582 |     private fun loadLastTakenMedia(uri: Uri?) {\n  583 |         mPreviewUri = uri\n  584 |         runOnUiThread {\n  585 |             if (!isDestroyed) {\n  586 |                 val options = RequestOptions()\n  587 |                     .circleCrop()\n  588 |                     .diskCacheStrategy(DiskCacheStrategy.NONE)\n  589 | \n  590 |                 Glide.with(this)\n  591 |                     .load(uri)\n  592 |                     .apply(options)\n  593 |                     .transition(DrawableTransitionOptions.withCrossFade())\n  594 |                     .into(binding.lastPhotoVideoPreview)\n  595 |             }\n  596 |         }\n  597 |     }","lines":29}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Variable shadowing in showImageSizes: a local val mediaSizeToggleGroup is declared (line 852) that shadows the instance field mediaSizeToggleGroup. The .apply { mediaSizeToggleGroup = this } assigns the new group to the FIELD, but the surrounding code line 851 calls removeView(mediaSizeToggleGroup) referring to the FIELD (the previous group, correct), while subsequent references use the local. This works but is confusing and error-prone: the dual use of the same name for field and local makes it easy to introduce a bug where the wrong group is referenced. The field is also never reset to null after removal.","fix":"Rename the local variable (e.g. newToggleGrou  capacity. For a JPEG ImageProxy the meaningful data length is `buffer.remaining()` (limit-position) after rewind, which can be smaller than capacity if the buffer was allocated with slack. Using capacity can append trailing garbage/zero bytes to the JPEG byte array (the JPEG decoder usually tolerates trailing bytes, but it bloats the saved file and the EXIF-source stream).","fix":"After rewind, size the array with `buffer.remaining()` and copy that many bytes (`val data = ByteArray(buffer.remaining()); buffer.get(data)`).","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageUtil.kt:47-55","code":"   47 |     fun jpegImageToJpegByteArray(image: ImageProxy): ByteArray {\n   48 |         require(image.format == ImageFormat.JPEG) { \"Incorrect image format of the input image proxy: \" + image.format }\n   49 |         val planes = image.planes\n   50 |         val buffer = planes[0].buffer\n   51 |         val data = ByteArray(buffer.capacity())\n   52 |         buffer.rewind()\n   53 |         buffer[data]\n   54 |         return data\n   55 |     }","lines":9}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"loadSound iterates `for (soundDir in SOUND_DIRS)` but unconditionally `break`s after the first iteration regardless of whether the load succeeded. The second directory \"/system/media/audio/ui/\" is never tried. On devices where the manufacturer sound only exists under /system, the shutter/focus/video sounds will silently fail to load. The loop is effectively dead and the SOUND_DIRS fallback is non-functional.","fix":"Only break when load returns a valid id (> 0); otherwise continue to the next directory. e.g. `id = soundPool!!.load(soundPath, 1); if (id > 0) break`.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/MediaActionSound.kt:119-127","code":"  119 |         when (sound.mediaSound) {\n  120 |             is MediaSound.ManufacturerSound -> {\n  121 | he resolution change does not wait for finalization.","fix":"Defer startCamera() until the recording Finalize event is received, or disallow resolution changes during active recording.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:496-499","code":"  496 |                 if (changed) {\n  497 |                     currentRecording?.stop()\n  498 |                     startCamera()\n  499 |                 }","lines":4},{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:517-519","code":"  517 |             mediaSizeStore.storeSize(isPhotoCapture, isFrontCameraInUse(), nextIndex)\n  518 |             currentRecording?.stop()\n  519 |             startCamera()","lines":3}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Flash mode for video uses photo-oriented imageCapture state. setFlashlightState() always assigns imageCapture?.flashMode = newFlashMode and stores config.flashlightState even in video mode where imageCapture is null and flash semantics differ (only torch matters). The branch already special-cases video by resetting FLASH_ALWAYS_ON to FLASH_ON, but the subsequent unconditional toCameraXFlashMode()/imageCapture assignment mixes photo flash mode logic into the video path, making the stored flashlightState ambiguous between modes.","fix":"Separate photo flash-mode handling (imageCapture.flashMode, FLASH_MODE_*) from video torch handling so state stored/applied is unambiguous per mode.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:559-576","code":"  559 |     override fun setFlashlightState(state: Int) {\n  560 |         var flashState = state\n  561 |         if (isPhotoCapture) {\n  562 |             camera?.cameraControl?.enableTorch(flashState == FLASH_ALWAYS_ON)\n  563 |         } else {\n  564 |             camera?.cameraControl?.enableTorch(flashState == FLASH_ON || flashState == FLASH_ALWAYS_ON)\n  565 |             // reset to the FLASH_ON for video capture\n  566 |             if (flashState == FLASH_ALWAYS_ON) {\n  567 |                 flashState = FLASH_ON\n  568 |             }\n  569 |         }\n  570 |         val newFlashMode = flashState.toCameraXFlashMode()\n  571 |         flashMode = newFlashMode\n  572 |         imageCapture?.flashMode = newFlashMode\n  573 | \n  574 |         config.flashlightState = flashState\n  575 |         listener.onChangeFlashMode(flashState)\n  576 |     }","lines":18}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Picture capture metadata reads location once at takePicture() call time, but in BitmapOutput path metadata is unused. More importantly, in the file/MediaStore save path, the captured 'metadata' (built on the calling thread) carries isReversedHorizontal and location, but the location is fetched eagerly even if the long-running capture means a fresher fix exists by save time; minor. Bigger issue: the BitmapOutput branch ignores metadata entirely so flipPhotos (isReversedHorizontal) is silently not honored for third-party bitmap-return intents.","fix":"Apply the flip/reverse-horizontal transform when producing the bitmap for BitmapOutput, or document that flip is unsupported for that path.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:586-610","code":"  586 |         val metadata = Metadata().apply {\n  587 |             isReversedHorizontal = isFrontCameraInUse() && config.flipPhotos\n  588 |             if (config.savePhotoVideoLocation) {\n  589 |                 location = simpleLocationManager?.getLocation()\n  590 |             }\n  591 |         }\n  592 | \n  593 |         val mediaOutput = mediaOutputHelper.getImageMediaOutput()\n  594 |         imageCapture!!.takePicture(mainExecutor, object : OnImageCapturedCallback() {\n  595 |             override fun onCaptureSuccess(image: ImageProxy) {\n  596 |                 listener.shutterAnimation()\n  597 |                 playShutterSoundIfEnabled()\n  598 |                 ensureBackgroundThread {\n  599 |                     image.use {\n  600 |                         if (mediaOutput is MediaOutput.BitmapOutput) {\n  601 |                             val imageBytes = ImageUtil.jpegImageToJpegByteArray(image)\n  602 |                             val bitmap = BitmapUtils.makeBitmap(imageBytes)\n  603 |                             activity.runOnUiThread {\n  604 |                                 listener.onPhotoCaptureEnd()\n  605 |                                 if (bitmap != null) {\n  606 |                                     listener.onImageCaptured(bitmap)\n  607 |                                 } else {\n  608 |                                     cameraErrorHandler.handleImageCaptureError(ERROR_CAPTURE_FAILED)\n  609 |                                 }\n  610 |                             }","lines":25}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Mode-switch debounce uses System.currentTimeMillis() for the debounce window but lastCameraStartTime is also updated on the immediate-run path, and the variable is named/used as 'camera start time' while actually tracking 'last mode-switch attempt time'. Rapid alternating initPhotoMode/initVideoMode calls each removeCallbacks of BOTH runnables and post the latest, so the last-requested mode wins, which is intended; however lastCameraStartTime is updated even when the runnable is only scheduled (not run), so a steady stream of taps faster than 500ms can keep pushing the deadline and never actually switch (starvation).","fix":"Only update the timestamp when the runnable actually runs, or use a fixed leading-edge debounce window that does not reset on every tap, so continuous tapping still eventually switches.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:651-661","code":"  651 |     private fun debounceChangeCameraMode(cameraModeRunnable: Runnable) {\n  652 |         val currentTime = System.currentTimeMillis()\n  653 |         if (currentTime - lastCameraStartTime > CAMERA_MODE_SWITCH_WAIT_TIME) {\n  654 |             cameraModeRunnable.run()\n  655 |         } else {\n  656 |             cameraHandler.removeCallbacks(photoModeRunnable)\n  657 |             cameraHandler.removeCallbacks(videoModeRunnable)\n  658 |             cameraHandler.postDelayed(cameraModeRunnable, CAMERA_MODE_SWITCH_WAIT_TIME)\n  659 |         }\n  660 |         lastCameraStartTime = currentTime\n  661 |     }","lines":11}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Stale recordingState across camera rebinds can wedge recording start. toggleRecording() decides to start vs stop based on (currentRecording == null || recordingState is VideoRecordEvent.Finalize). When a recording is manually stopped, currentRecording is set to null but recordingState keeps whatever the last event was. More importantly, recordingState is never reset when the camera is rebound (startCamera) or when switching modes, so a previous session's non-Finalize recordingState combined with a non-null currentRecording can mislead the start/stop branch. The two pieces of recording state (currentRecording and recordingState) are mutated independently and can become inconsistent.","fix":"Reset recordingState = null whenever currentRecording is cleared and when rebinding the camera, or derive recording-active purely from currentRecording and the latest event consistently in one place.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:663-677","code":"  663 |     override fun toggleRecording() {\n  664 |         if (currentRecording == null || recordingState is VideoRecordEvent.Finalize) {\n  665 |             if (config.isSoundEnabled) {\n  666 |                 mediaSoundHelper.playStartVideoRecordingSound(onPlayComplete = {\n  667 |                     startRecording()\n  668 |                 })\n  669 |                 listener.onVideoRecordingStarted()\n  670 |             } else {\n  671 |                 startRecording()\n  672 |             }\n  673 |         } else {\n  674 |             currentRecording?.stop()\n  675 |             currentRecording = null\n  676 |         }\n  677 |     }","lines":15},{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:176-177","code":"  176 |     private var currentRecording: Recording? = null\n  177 |     private var recordingState: VideoRecordEvent? = null","lines":2}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Double onVideoRecordingStarted() callback. In toggleRecording(), when sound is enabled the listener.onVideoRecordingStarted() is invoked immediately (line 669) before the start sound completes and recording begins. Then when recording actually starts, the VideoRecordEvent.Start branch (line 719-721) calls listener.onVideoRecordingStarted() again. The UI start callback fires twice in the sound-enabled path but only once in the no-sound path, an inconsistency that can desync recording UI state.","fix":"Remove the eager listener.onVideoRecordingStarted() call in the sound branch and rely solely on the VideoRecordEvent.Start callback, or remove it from the Start handler. Make both paths consistent.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/implementations/CameraXPreview.kt:664-672","code":"  664 |         if (currentRecording == null || recordingState is VideoRecordEvent.Finalize) {\n  665 |             if (config.isSoundEnabled) {\n  666 |                 mediaSoundHelper.playStartVideoRecordingSound(onPlayComplete = {\n  667 |                     startRecording()\n  668 |                 })\n  669 | _MEGA_PIXEL\n   52 |     }","lines":7}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"MySize computes ratio = width / height.toFloat() and isSupported relies on exact float equality (ratio == 16/9f, ratio == 4/3f, etc.). Real camera sensor sizes rarely produce exactly these float values (e.g. 4032x3024 is exactly 4/3, but 4000x3000 vs 4032x3024 etc. and 1.9 ratios are inexact), so floating-point rounding can cause a valid aspect ratio to be classified as 'other' and filtered out of supported resolutions.","fix":"Compare aspect ratios with a small epsilon tolerance, or compare integer cross-products (width*9 == height*16) instead of float equality.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/models/MySize.kt:14-44","code":"   14 |     private val ratio = width / height.toFloat()\n   15 | \n   16 |     val pixels: Int = width * height\n   17 | \n   18 |     val megaPixels: String = String.format(\"%.1f\", (width * height.toFloat()) / ONE_MEGA_PIXEL)\n   19 | \n   20 |     fun requiresCentering(): Boolean {\n   21 |         return !isFullScreen && (isFourToThree() || isThreeToTwo() || isSquare())\n   22 |     }\n   23 | \n   24 |     fun isSixteenToNine() = ratio == 16 / 9f\n   25 | \n   26 |     private fun isFiveToThree() = ratio == 5 / 3f\n   27 | \n   28 |     private fun isFourToThree() = ratio == 4 / 3f\n   29 | \n   30 |     private fun isTwoToOne() = ratio == 2f\n   31 | \n   32 |     private fun isThreeToFour() = ratio == 3 / 4f\n   33 | \n   34 |     private fun isThreeToTwo() = ratio == 3 / 2f\n   35 | \n   36 |     private fun isSixToFive() = ratio == 6 / 5f\n   37 | \n   38 |     private fun isNineteenToNine() = ratio == 19 / 9f\n   39 | \n   40 |     private fun isNineteenToEight() = ratio == 19 / 8f\n   41 | \n   42 |     private fun isOneNineToOne() = ratio == 1.9f\n   43 | \n   44 |     private fun isSquare() = width == height","lines":31}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"tabSelectedListener handles only VIDEO_MODE_INDEX (0) and PHOTO_MODE_INDEX (1) and throws IllegalStateException for any other tab position. While only two tabs exist, throwing from a UI callback on an unexpected tab index would crash the app rather than degrade gracefully; this is a latent crash if the tab layout ever changes.","fix":"Replace the throw with a logged no-op or a safe default; do not crash from a tab-selection callback.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:77-81","code":"   77 |                     when (tab.position) {\n   78 |                         VIDEO_MODE_INDEX -> mPreview?.initVideoMode()\n   79 |                         PHOTO_MODE_INDEX -> mPreview?.initPhotoMode()\n   80 |                         else -> throw IllegalStateException(\"Unsupported tab position ${tab.position}\")\n   81 |                     }","lines":5}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"onPause cancels the timer only when !isAskingPermissions. If the activity is paused for a reason other than a permission dialog (e.g. screen off, incoming call, recents) the countdown continues running while the activity is not visible, and onFinish() will fire tryTakePicture() while backgrounded, potentially capturing while paused or crashing via the mPreview force-unwrap noted separately.","fix":"Cancel the timer on every onPause that is not strictly a permission prompt, or stop/restart it tied to camera lifecycle rather than to the isAskingPermissions flag.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/MainActivity.kt:140-152","code":"  140 |     override fun onPause() {\n  141 |         super.onPause()\n  142 |         window.clearFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON)\n  143 |         if (!isAskingPermissions) {\n  144 |             cancelT if (!triggerListener) {\n  170 |             removeTabListener()\n  171 |         }\n  172 | \n  173 |         binding.cameraModeTab.getTabAt(PHOTO_MODE_INDEX)?.select()\n  174 |         setTabListener()\n  175 |     }\n  176 | \n  177 |     private fun selectVideoTab(triggerListener: Boolean = false) {\n  178 |         if (!triggerListener) {\n  179 |             removeTabListener()\n  180 |         }\n  181 |         binding.cameraModeTab.getTabAt(VIDEO_MODE_INDEX)?.select()\n  182 |         setTabListener()\n  183 |     }\n  184 | \n  185 |     private fun setTabListener() {\n  186 |         binding.cameraModeTab.addOnTabSelectedListener(tabSelectedListener)\n  187 |     }\n  188 | \n  189 |     private fun removeTabListener() {\n  190 |         binding.cameraModeTab.removeOnTabSelectedListener(tabSelectedListener)\n  191 |     }","lines":24}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"getLastPart calls humanizePath(path) then substringAfterLast(\"/\", humanized), passing the full humanized string as the missingDelimiterValue. If the humanized path contains no '/', the entire humanized path is returned (intended). But if humanizePath returns a value like 'Internal' for the storage root, substringAfterLast behaves fine; the subtle issue is the default value should arguably be the path basename only. Minor: correct for common cases but the fallback semantics are non-obvious and undocumented.","fix":"Document the intent or simplify; the current behavior is acceptable but worth a brief comment explaining the fallback.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/activities/SettingsActivity.kt:143-146","code":"  143 |     private fun getLastPart(path: String): String {\n  144 |         val humanized = humanizePath(path)\n  145 |         return humanized.substringAfterLast(\"/\", humanized)\n  146 |     }","lines":4}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ImageQualityManager.getSupportedResolutions sorts by descending aspect-ratio numerator: sortedByDescending { getAspectRatio(activity).split(\":\").firstOrNull()?.toIntOrNull() }. For ratios like \"1.9:1\" the first token is \"1.9\" and toIntOrNull() returns null, and the localized 'other' string has no ':' so it also yields null. Null sorts together unpredictably, so resolutions whose ratio label is non-integer get an effectively undefined ordering. This is a fragile way to sort aspect ratios (string round-trip through a localized label).","fix":"Sort by the numeric ratio (width/height) directly on MySize rather than parsing the localized aspect-ratio string.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageQualityManager.kt:78-80","code":"   78 |             .sortedByDescending {\n   79 |                 it.getAspectRatio(activity).split(\":\").firstOrNull()?.toIntOrNull()\n   80 |             }","lines":3}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"yuv_420_888toNv21 sizes the NV21 array as `ySize + width*height/2` where ySize is yBuffer.remaining() (which for a non-tightly-packed Y plane includes row-stride padding, i.e. can be larger than width*height). The Y copy loop writes exactly width*height bytes into positions [0, width*height) but the array was sized using the padded remaining(), so the chroma data is written starting at `position` which after the Y loop equals width*height, not ySize. If ySize > width*height (padded plane) there is a gap of zero bytes between Y and chroma planes, corrupting the NV21 layout passed to YuvImage.","fix":"Size the array as `width*height + width*height/2` (NV21 has no padding) rather than using yBuffer.remaining() for the Y portion, so chroma immediately follows the packed Y data.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/ImageUtil.kt:97-142","code":"   97 |     private fun yuv_420_888toNv21(image: ImageProxy): ByteArray {\n   98 |         val yPlane = image.planes[0]\n   99 |         val uPlane = image.planes[1]\n  100 |         val vPlane = image.planes[2]\n  101 |         val yBuffer = yPlane.buffer\n  102 |         val uBuffer = uPlane.buffer\n  103 |         val vBuffer = vPlane.buffer\n  104 |         yBuffer.rewind()\n  105 |         uBuffer.rewind()\n  106 |         vBuffer.rewind()\n  107 |         val ySize = yBuffer.remaining()\n  108 |         var position = 0\n  109 |         val nv21 = ByteArray(ySize + image.width * image.height / 2)\n  110 | \n  111 |         // Add the full y buffer to the array. If rowStride > 1, some padding may be skipped.\n  112 |         for (row in 0 until image.height) {\n  113 |             yBuffer[nv21, position, image.width]\n  114 |             position += image.width\n  115 |             yBuffer.position(\n  116 |                 Math.min(ySize, yBuffer.position() - image.width + yPlane.rowStride)\n  117 |             )\n  118 |         }\n  119 |         val chromaHeight = image.height / 2\n  120 |         val chromaWidth = image.width / 2\n  121 |         val vRowStride = vPlane.rowStride\n  122 |         val uRowStride = uPlane.rowStride\n  123 |         val vPixelStride = vPlane.pixelStride\n  124 |         val uPixelStride = uPlane.pixelStride\n  125 | \n  126 |         // Interleave the u and v frames, filling up the rest of the buffer. Use two line buffers to\n  127 |         // perform faster bulk gets from the byte buffers.\n  128 |         val vLineBuffer = ByteArray(vRowStride)\n  129 |         val uLineBuffer = ByteArray(uRowStride)\n  130 |         for (row in 0 until chromaHeight) {\n  131 |             vBuffer[vLineBuffer, 0, Math.min(vRowStride, vBuffer.remaining())]\n  132 |             uBuffer[uLineBuffer, 0, Math.min(uRowStride, uBuffer.remaining())]\n  133 |             var vLineBufferPosition = 0\n  134 |             var uLineBufferPosition = 0\n  135 |             for (col in 0 until chromaWidth) {\n  136 |                 nv21[position++] = vLineBuffer[vLineBufferPosition]\n  137 |                 nv21[position++] = uLineBuffer[uLineBufferPosition]\n  138 |                 vLineBufferPosition += vPixelStride\n  139 |                 uLineBufferPosition += uPixelStride\n  140 |             }\n  141 |         }\n  142 |         return nv21","lines":46}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"stop() only stops the SoundPool stream when sound.state == STATE_LOADED. If a sound is currently in STATE_LOADING_PLAY_REQUESTED or was just played (state stays STATE_LOADED, but streamId valid) the guard is okay, however a timer-countdown sound that is repeatedly play()ed transitions through STATE_LOADING and may be playing while state != STATE_LOADED, so stopTimerCountdown2SecondsSound() can fail to actually stop an in-flight beep.","fix":"Stop by streamId whenever streamId != 0 regardless of the loading state, rather than gating on STATE_LOADED.","locations":[{"ref":"app/src/main/kotlin/org/fossify/camera/helpers/MediaActionSound.kt:215-229","code":"  215 |     fun stop(mediaSound: MediaSound) {\n  216 |         val sound = sounds.first { it.mediaSound == mediaSound }\n  217 |         synchronized(sound) {\n  218 |             when (sound.state) {\n  219 |                 STATE_LOADED -> {\n  220 |                     soundPool!!.stop(sound.streamId)\n  221 |                 }\n  222 | \n  223 |                 else -> Log.w(\n  224 |                     TAG,\n  225 |                     \"stop() should be called after sound is loaded for sound: $mediaSound\"\n  226 |                 )\n  227 |             }\n  228 |         }\n  229 |     }","lines":15}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"rotate() ignores the device/preview rotation when the resulting bitmap is null and returns null, but
