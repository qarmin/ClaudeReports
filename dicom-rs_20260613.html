<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`Value::to_tag()` in `core/src/value/mod.rs` performs an unchecked index `v[0]` on the Tags\nsmall-vector without verifying the vector is non-empty. If the element was decoded or constructed\nwith `PrimitiveValue::Tags(smallvec![])` (zero-length AT attribute), calling `to_tag()` will\nunconditionally panic at runtime.","fix":"Replace `Ok(v[0])` with `v.first().copied().ok_or_else(|| CastValueError { requested: \"tag\", got: ValueType::Empty })` to return an error instead of panicking on empty Tags.","locations":[{"ref":"core/src/value/mod.rs:749","code":"  749 |             Value::Primitive(PrimitiveValue::Tags(v)) => Ok(v[0]),","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`encode_tag` in both ExplicitVRLittleEndianEncoder and ExplicitVRBigEndianEncoder initializes the\nbuffer as `[0u8, 4]` — a 2-element array containing bytes `[0, 4]` — instead of the intended\n4-byte zero-filled array `[0u8; 4]`. The function then calls:\n  LittleEndian::write_u16(&mut buf[..], tag.group());   // writes 2 bytes, OK\n  LittleEndian::write_u16(&mut buf[2..], tag.element()); // buf[2..] is empty → PANIC (index out of bounds)\nThe `to.write_all(&buf)` that follows would also only write 2 bytes, encoding only the group half\nof the tag even if it did not panic first. The element header functions in the same files allocate\ntheir buffers correctly with `[0u8; 8]` and `[0u8; 12]`, so this is an isolated copy-paste mistake\nin the `encode_tag` methods.","fix":"Change `let mut buf = [0u8, 4];` to `let mut buf = [0u8; 4];` in both `encode_tag` implementations.","locations":[{"ref":"encoding/src/encode/explicit_le.rs:88","code":"   88 |         let mut buf = [0u8, 4];","lines":1},{"ref":"encoding/src/encode/explicit_be.rs:89","code":"   89 |         let mut buf = [0u8, 4];","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `storescp/src/store_sync.rs` (line 221), `storescp/src/store_async.rs`\n(line 223), and `movescu/src/store_async.rs` (line 256), the code calls\n`TransferSyntaxRegistry.get(ts).unwrap()` where `ts` is the transfer syntax string from a\n*negotiated* presentation context. While the association negotiation normally only accepts\ntransfer syntaxes that are registered, the SCP setup loop explicitly adds every non-unsupported\ntransfer syntax from the registry; however, if the registry does not contain the negotiated\nsyntax (e.g., due to a build configuration or registry mismatch), this unwrap will panic and\ncrash the entire server process rather than returning an error to the client.","fix":"Replace `.unwrap()` with proper error handling using `whatever_context`:\n\n```rust\nlet ts_entry = TransferSyntaxRegistry\n    .get(ts)\n    .whatever_context(\"unrecognized negotiated transfer syntax\")?;\nlet obj = InMemDicomObject::read_dataset_with_ts(instance_buffer.as_slice(), ts_entry)\n    .whatever_context(\"failed to read DICOM data object\")?;\n```","locations":[{"ref":"storescp/src/store_sync.rs:221","code":"  221 |                                     TransferSyntaxRegistry.get(ts).unwrap(),","lines":1},{"ref":"storescp/src/store_async.rs:223","code":"  223 |                                     TransferSyntaxRegistry.get(ts).unwrap(),","lines":1},{"ref":"movescu/src/store_async.rs:256","code":"  256 |                                     TransferSyntaxRegistry.get(ts).unwrap(),","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `storescu/src/store_async.rs` (line 106), the async large-object sending\npath calls `pdata.write_all(&object_data).await.unwrap()`. A commented-out line immediately\nbelow (`//.whatever_context(...)`) reveals this was known but left incomplete. Any network error,\nbroken pipe, or back-pressure while streaming large pixel-data objects will cause the thread to\npanic rather than returning a recoverable error to the caller, potentially crashing the entire\nasync runtime task.","fix":"Remove the `.unwrap()` and propagate the error properly:\n\n```rust\npdata\n    .write_all(&object_data)\n    .await\n    .whatever_context(\"Failed to send C-STORE-RQ P-Data\")?;\n```","locations":[{"ref":"storescu/src/store_async.rs:104-108","code":"  104 |             {\n  105 |                 let mut pdata = scu.send_pdata(pc_selected.id);\n  106 |                 pdata.write_all(&object_data).await.unwrap();\n  107 |                 //.whatever_context(\"Failed to send C-STORE-RQ P-Data\")?;\n  108 |             }","lines":5}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In `read_rle_header`, the fragment slice is indexed without any bounds checks. If a malformed RLE fragment is shorter than 4 bytes, the line `LittleEndian::read_u32(&fragment[0..4])` panics. Additionally, if the `nr_segments` value read from the fragment is larger than what the fragment actually contains, the expression `4 * (nr_segments + 1)` can (a) overflow `u32` when `nr_segments == u32::MAX`, and (b) produce an index exceeding `fragment.len()`, causing a bounds-check panic. This function is called directly from `decode` and `decode_frame` in `RleLosslessAdapter`, so any malformed DICOM input triggers it.","fix":"Add an upfront check: ensure `fragment.len() >= 4`, then validate that `4 * (nr_segments as usize + 1) <= fragment.len()` before slicing. Return a `DecodeResult` error instead of panicking.","locations":[{"ref":"transfer-syntax-registry/src/adapters/rle_lossless.rs:227-231","code":"  227 |                 let ii = sample_number * bytes_per_sample + byte_offset;\n  228 |                 let segment = &fragment[offsets[ii] as usize..offsets[ii + 1] as usize];\n  229 |                 let buff = io::Cursor::new(segment);\n  230 |                 let (_, decoder) = PackBitsReader::new(buff, segment.len())\n  231 |                     .map_err(|e| Box::new(e) as Box<_>)","lines":5}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In `collector.rs`, `CollectionSource::raw_reader_mut` (line 431-437) contains:\n\n    CollectionSource::Raw { reader, .. } => reader.as_mut().unwrap(),\n\n`reader` is an `Option<S>` that is `.take()`n inside `set_parser_with_ts` (line 451)\njust before the enum variant is replaced with `Parser`. However, the method\n`read_file_meta` (line 721-741) calls `raw_reader_mut()` directly without checking\nwhether the parser has already been set:\n\n    let reader = self.source.raw_reader_mut();\n    self.file_meta = Some(FileMetaTable::from_reader(reader)...);\n\nIf a caller somehow invokes `read_file_meta()` a second time after a dataset-reading\nmethod (which transitions `source` to a `Parser`), `raw_reader_mut()` will panic with\n\"cannot retrieve raw reader after setting parser\".\n\nThe state machine checks (`if self.state == CollectorState::Preamble`) protect against\nthis in well-formed usage, but the panic itself is unexpected for an API consumer\nwho could encounter an unhelpful program abort rather than a proper error.","fix":"Convert the internal `panic!` calls in `raw_reader_mut()` and `parser()` to return\na `Result<_, Error>` with an `IllegalState*` error, propagating the error to the\ncaller rather than aborting.","locations":[{"ref":"object/src/collector.rs:431-436","code":"  431 |     fn raw_reader_mut(&mut self) -> &mut S {\n  432 |         match self {\n  433 |             CollectionSource::Raw { reader, .. } => reader.as_mut().unwrap(),\n  434 |             CollectionSource::Parser(_) => {\n  435 |                 panic!(\"cannot retrieve raw reader after setting parser\")\n  436 |             }","lines":6},{"ref":"object/src/collector.rs:476-481","code":"  476 |     fn parser(&mut self) -> &mut LazyDataSetReader<DynStatefulDecoder<S>> {\n  477 |         match self {\n  478 |             CollectionSource::Raw { .. } => panic!(\"parser transfer syntax not set\"),\n  479 |             CollectionSource::Parser(parser) => parser,\n  480 |         }\n  481 |     }","lines":6}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"The default implementation of `PixelDecoder::decode_pixel_data_frame` in `lib.rs` slices `data[frame_offset..frame_offset + frame_size]` without first verifying that `frame_offset + frame_size <= data.len()`. If `frame` is out of range (>= `number_of_frames`), or if the data buffer is shorter than expected, both the `Cow::Owned` arm (line 2092) and the `Cow::Borrowed` arm (line 2094) will panic with an index-out-of-bounds rather than returning a `FrameOutOfRange` error.","fix":"Add a bounds check before slicing: if `frame_offset + frame_size > data.len()`, return `FrameOutOfRangeSnafu { frame_number: frame }.fail()?`.","locations":[{"ref":"pixeldata/src/lib.rs:2080-2102","code":" 2080 |     fn decode_pixel_data_frame(&self, frame: u32) -> Result<DecodedPixelData<'_>> {\n 2081 |         let mut px = self.decode_pixel_data()?;\n 2082 | \n 2083 |         // calculate frame offset and size\n 2084 |         let frame_size = px.bits_allocated.div_ceil(8) as usize\n 2085 |             * px.samples_per_pixel as usize\n 2086 |             * px.rows as usize\n 2087 |             * px.cols as usize;\n 2088 |         let frame_offset = frame_size * frame as usize;\n 2089 | \n 2090 |         // crop to frame\n 2091 |         match &mut px.data {\n 2092 |             Cow::Owned(data) => *data = data[frame_offset..frame_offset + frame_size].to_vec(),\n 2093 |             Cow::Borrowed(data) => {\n 2094 |                 *data = &data[frame_offset..frame_offset + frame_size];\n 2095 |             }\n 2096 |         }\n 2097 | \n 2098 |         // reset number of frames\n 2099 |         px.number_of_frames = 1;\n 2100 | \n 2101 |         Ok(px)\n 2102 |     }","lines":23}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`window_level_sigmoid` in `transform.rs` uses `assert!(ww >= 1.)` (a hard panic) instead of a `debug_assert` or a proper error path. `WindowLevelTransform::new` clamps `window_level.width` to `max(width, 1.0)` before storing it, so under normal use this assertion should never fire. However, a `WindowLevelTransform` can be constructed via `WindowLevelTransform { voi_lut_function: VoiLutFunction::Sigmoid, window_level: WindowLevel { width: 0.5, center: 0. } }` if the fields are public, bypassing the clamping. The combination of a public struct with a private clamping constructor and a hard panic is a reliability concern.","fix":"Replace `assert!` with `debug_assert!` to match the pattern used in the Linear and LinearExact functions, or enforce the invariant by making `WindowLevelTransform`'s fields private.","locations":[{"ref":"pixeldata/src/transform.rs:186-194","code":"  186 | fn window_level_sigmoid(value: f64, window_width: f64, window_center: f64, y_max: f64) -> f64 {\n  187 |     let ww = window_width;\n  188 |     let wc = window_center;\n  189 |     assert!(ww >= 1.);\n  190 | \n  191 |     // C.11.2.1.3.1\n  192 | \n  193 |     y_max / (1. + f64::exp(-4. * (value - wc) / ww))\n  194 | }","lines":9}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In `scpproxy/src/main.rs`, the main proxy forwarding loop calls\n`write_pdu(&mut buffer, &pdu).unwrap()` and `scu_stream.write_all(&buffer).unwrap()` (lines\n222-223) and the same pair for the SCP direction (lines 230-231). Any write error to either\nsocket (broken pipe, reset by peer, etc.) will cause an unrecoverable panic in the main thread\nof the proxy process rather than logging an error and closing the connection gracefully.\nAdditionally, `TcpListener::bind(&listen_addr).unwrap()` at line 344 panics on bind failures\n(e.g., port already in use) instead of reporting a proper error.","fix":"Propagate write errors via the `Result` return type of `run()`. For the bind,\nuse `TcpListener::bind(&listen_addr).whatever_context(\"Could not bind listener\")?` inside a\n`Result`-returning function and exit with an error message.","locations":[{"ref":"scpproxy/src/main.rs:222-223","code":"  222 |                             write_pdu(&mut buffer, &pdu).unwrap();\n  223 |                             scu_stream.write_all(&buffer).unwrap();","lines":2},{"ref":"scpproxy/src/main.rs:230-231","code":"  230 |                             write_pdu(&mut buffer, &pdu).unwrap();\n  231 |                             scp_stream.write_all(&buffer).unwrap();","lines":2},{"ref":"scpproxy/src/main.rs:344","code":"  344 |     let listener = TcpListener::bind(&listen_addr).unwrap();","lines":1}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`read_to_end` is called on the `PackBitsReader` decoder and its result is unconditionally `.unwrap()`-ed in both `decode` (line 91) and `decode_frame` (line 202) of `RleLosslessAdapter`. `PackBitsReader::read` can return an `io::Error` in theory (it delegates to `Cursor::read`), and more importantly, the decoded segment may be shorter than the expected `rows * cols` bytes if the RLE stream is truncated. Any I/O error causes a panic rather than a proper `DecodeResult` error.","fix":"Replace `.unwrap()` with `.whatever_context(\"Failed to decompress RLE segment\")?` and propagate the error properly.","locations":[{"ref":"transfer-syntax-registry/src/adapters/rle_lossless.rs:88-91","code":"   88 |             let mut offsets = read_rle_header(fragment);\n   89 |             offsets.push(fragment.len() as u32);\n   90 | \n   91 |             for sample_number in 0..samples_per_pixel {","lines":4},{"ref":"transfer-syntax-registry/src/adapters/rle_lossless.rs:199-202","code":"  199 |         let stride = bytes_per_sample * cols as usize * rows as usize;\n  200 |         let frame_size = stride * samples_per_pixel;\n  201 |         // extend `dst` to make room for decoded pixel data\n  202 |         let base_offset = dst.len();","lines":4}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`AsyncPDataWriter::drop` uses `tokio::task::block_in_place` to flush any remaining data:\n\n    fn drop(&mut self) {\n        tokio::task::block_in_place(move || {\n            tokio::runtime::Handle::current().block_on(async move {\n                let _ = self.finish_impl().await;\n            })\n        })\n    }\n\n`block_in_place` panics when called from a `current_thread` (single-threaded) Tokio\nruntime, which is common in tests (`#[tokio::test]` defaults to `current_thread`).\nIt also panics if there is no Tokio runtime active at all (e.g. the writer is dropped\nfrom a `std` thread that spawned tasks but did not enter a Tokio context).\n\nBecause `AsyncPDataWriter` is `#[must_use]` and drop is the safety net for forgetting\nto call `finish()`, this is a real panic hazard in single-threaded async code.","fix":"Replace `block_in_place` with a best-effort synchronous write, or – preferably – do\nnot do async I/O in `Drop` at all.  A common pattern is to log a warning and skip the\nflush in `Drop`, relying on callers to explicitly call `finish()`.  Alternatively,\ncheck for a `current_thread` runtime with `Handle::try_current()` and skip the flush\nwith a warning when it is unavailable or single-threaded.","locations":[{"ref":"ul/src/association/pdata.rs:582-593","code":"  582 |     impl<W> Drop for AsyncPDataWriter<W>\n  583 |     where\n  584 |         W: AsyncWrite + Unpin,\n  585 |     {\n  586 |         fn drop(&mut self) {\n  587 |             tokio::task::block_in_place(move || {\n  588 |                 tokio::runtime::Handle::current().block_on(async move {\n  589 |                     let _ = self.finish_impl().await;\n  590 |                 })\n  591 |             })\n  592 |         }\n  593 |     }","lines":12}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`parse_tag_part` in `core/src/header.rs:1124` uses `.expect(\"failed to parse tag part\")` after\nmanually validating that all characters are ASCII hex digits. In theory the validation makes the\n`expect` safe, but it is a two-step verify-then-act pattern. If a future refactor disrupts the\ninvariant (e.g. accepting multi-byte characters), the expect will panic instead of returning a\n`ParseTagError`. The call is inside the public `FromStr for Tag` implementation, so it executes on\nuntrusted input.","fix":"Replace `.expect(...)` with `u16::from_str_radix(num, 16).map_err(|_| ParseTagError::Number)?` and propagate the error through the existing `Result` return type.","locations":[{"ref":"core/src/header.rs:1124","code":" 1124 |     let num = u16::from_str_radix(num, 16).expect(\"failed to parse tag part\");","lines":1}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`PrimitiveValue::da_byte_len`, `tm_byte_len`, and `dt_byte_len` (non-pub helper methods in\n`core/src/value/primitive.rs`, lines 490-522) all contain `panic!` calls for input that the type\nsystem does not rule out:\n\n- `da_byte_len` panics for precisions other than Year/Month/Day with\n  `panic!(\"Impossible precision for a DicomDate\")`.\n- `tm_byte_len` panics for precisions other than Hour/Minute/Second/Fraction with\n  `panic!(\"Impossible precision for a Dicomtime\")`, and also panics if\n  `time.fraction_and_precision()` returns `None` despite reporting Fraction precision.\n\nThese helpers are called from `calculate_byte_len`, which is called from `HasLength::length`\nand `update_value`. If `DicomDate` or `DicomTime` can ever carry an unexpected precision value\n(e.g. through deserialization bugs or future precision variants), the panic propagates to safe\npublic API callers.","fix":"Return a default/zero byte length or propagate an error instead of panicking. Since `calculate_byte_len` returns `usize`, consider making these helpers return `Option<usize>` or adding a fallback arm that returns 0.","locations":[{"ref":"core/src/value/primitive.rs:495","code":"  495 |             _ => panic!(\"Impossible precision for a DicomDate\"),","lines":1},{"ref":"core/src/value/primitive.rs:505","code":"  505 |                 None => panic!(\"DicomTime has fraction precision but no fraction can be retrieved\"),","lines":1},{"ref":"core/src/value/primitive.rs:508","code":"  508 |             _ => panic!(\"Impossible precision for a Dicomtime\"),","lines":1}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In `convert_colorspace_u8` and `convert_colorspace_u16`, the chunk iterator accesses `pixel[0]`, `pixel[1]`, and `pixel[2]` unconditionally. `chunks_mut(3)` can yield a trailing chunk smaller than 3 elements if `data.len()` is not a multiple of 3 (malformed pixel data with `samples_per_pixel == 3`). In that case `pixel[1]` or `pixel[2]` panics out-of-bounds. The same applies to the corresponding u16 function.","fix":"Add a check `if pixel.len() < 3 { return; }` at the start of the closure, or use `exact_chunks_mut(3)` if available, to skip any trailing incomplete chunk.","locations":[{"ref":"pixeldata/src/lib.rs:1956-1983","code":" 1956 | fn convert_colorspace_u8(i: &mut [u8]) {\n 1957 |     #[cfg(feature = \"rayon\")]\n 1958 |     let iter = i.par_chunks_mut(3);\n 1959 |     #[cfg(not(feature = \"rayon\"))]\n 1960 |     let iter = i.chunks_mut(3);\n 1961 | \n 1962 |     // Matrix multiplication taken from\n 1963 |     // https://github.com/pydicom/pydicom/blob/f36517e10/pydicom/pixel_data_handlers/util.py#L576\n 1964 |     iter.for_each(|pixel| {\n 1965 |         let y = pixel[0] as f32;\n 1966 |         let b: f32 = pixel[1] as f32;\n 1967 |         let r: f32 = pixel[2] as f32;\n 1968 |         let b = b - 128.0;\n 1969 |         let r = r - 128.0;\n 1970 | \n 1971 |         let cr = (y + 1.402 * r) + 0.5;\n 1972 |         let cg = (y + (0.114 * 1.772 / 0.587) * b + (-0.299 * 1.402 / 0.587) * r) + 0.5;\n 1973 |         let cb = (y + 1.772 * b) + 0.5;\n 1974 | \n 1975 |         let cr = cr.floor().clamp(0.0, u8::MAX as f32) as u8;\n 1976 |         let cg = cg.floor().clamp(0.0, u8::MAX as f32) as u8;\n 1977 |         let cb = cb.floor().clamp(0.0, u8::MAX as f32) as u8;\n 1978 | \n 1979 |         pixel[0] = cr;\n 1980 |         pixel[1] = cg;\n 1981 |         pixel[2] = cb;\n 1982 |     });\n 1983 | }","lines":28},{"ref":"pixeldata/src/lib.rs:2002-2029","code":" 2002 | fn convert_colorspace_u16(i: &mut [u16]) {\n 2003 |     #[cfg(feature = \"rayon\")]\n 2004 |     let iter = i.par_chunks_mut(3);\n 2005 |     #[cfg(not(feature = \"rayon\"))]\n 2006 |     let iter = i.chunks_mut(3);\n 2007 | \n 2008 |     // Matrix multiplication taken from\n 2009 |     // https://github.com/pydicom/pydicom/blob/f36517e10/pydicom/pixel_data_handlers/util.py#L576\n 2010 |     iter.for_each(|pixel| {\n 2011 |         let y = pixel[0] as f32;\n 2012 |         let b: f32 = pixel[1] as f32;\n 2013 |         let r: f32 = pixel[2] as f32;\n 2014 |         let b = b - 32768.0;\n 2015 |         let r = r - 32768.0;\n 2016 | \n 2017 |         let cr = (y + 1.402 * r) + 0.5;\n 2018 |         let cg = (y + (0.114 * 1.772 / 0.587) * b + (-0.299 * 1.402 / 0.587) * r) + 0.5;\n 2019 |         let cb = (y + 1.772 * b) + 0.5;\n 2020 | \n 2021 |         let cr = cr.floor().clamp(0.0, u16::MAX as f32) as u16;\n 2022 |         let cg = cg.floor().clamp(0.0, u16::MAX as f32) as u16;\n 2023 |         let cb = cb.floor().clamp(0.0, u16::MAX as f32) as u16;\n 2024 | \n 2025 |         pixel[0] = cr;\n 2026 |         pixel[1] = cg;\n 2027 |         pixel[2] = cb;\n 2028 |     });\n 2029 | }","lines":28}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`PrimitiveValue::calculate_byte_len()` returns `usize`. Its result is silently cast to `u32` in\ntwo places:\n\n1. `DataElement::update_value()` at `core/src/header.rs:267`:\n   `self.header.len = Length(byte_len as u32);`\n2. `PrimitiveValue::HasLength::length()` at `core/src/value/primitive.rs:4205`:\n   `Length::defined(self.calculate_byte_len() as u32)`\n\nOn 64-bit systems, if the value payload exceeds 4 GiB the truncation is silent. Worse, if the\ntruncated result equals exactly `0xFFFF_FFFF`, `Length::defined` panics (it asserts the value is\nnot the undefined-length sentinel). Even without hitting that exact value, the recorded length\nwill be wrong, leading to corrupt DICOM output.","fix":"Check for overflow before the cast: use `u32::try_from(byte_len).map_err(...)` and propagate an error, or saturate and document the limit. At minimum, add a debug_assert or ensure the DICOM standard 4 GiB per-element limit is enforced earlier.","locations":[{"ref":"core/src/header.rs:267","code":"  267 |                 self.header.len = Length(byte_len as u32);","lines":1},{"ref":"core/src/value/primitive.rs:4205","code":" 4205 |         Length::defined(self.calculate_byte_len() as u32)","lines":1}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`Length::Add<Length>` (operator `+`) and `Length::SubAssign<Length>` (operator `-=`) use\ndebug-only assertions to detect overflow/underflow. In release builds these assertions are\ncompiled out.\n\nIn `Add<Length>` (header.rs:1226), `l1 + l2` is a plain Rust `u32 + u32` addition with no\noverflow guard in release mode. If the result wraps, the caller gets a silently incorrect\n`Length` value (and if the result happens to be exactly `0xFFFFFFFF` it would accidentally\nrepresent an undefined length).\n\nIn `SubAssign<Length>` (header.rs:1271), `self.0 -= l2` is a plain `u32 -= u32`. When\n`l2 > self.0` the subtraction wraps to a huge value in release mode (debug mode panics).\n\nThe `Add<i32>` (line 1244) and `SubAssign<i32>` (line 1296) variants round-trip through `i32`\nwhich allows values outside the normal `u32` range to silently produce incorrect lengths.","fix":"Replace the plain arithmetic with checked/saturating arithmetic (e.g. `checked_add`, `checked_sub`, `saturating_sub`) and convert the `debug_assert!` to proper runtime checks that return an error or clamp to a safe sentinel value.","locations":[{"ref":"core/src/header.rs:1226","code":" 1226 |                 let o = l1 + l2;","lines":1},{"ref":"core/src/header.rs:1271","code":" 1271 |                 self.0 -= l2;","lines":1},{"ref":"core/src/header.rs:1244","code":" 1244 |                 let o = (len as i32 + rhs) as u32;","lines":1},{"ref":"core/src/header.rs:1296","code":" 1296 |                 self.0 = (len as i32 - rhs) as u32;","lines":1}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `fromimage/src/main.rs`, the image dimensions returned by the `image` crate\nas `u32` values are silently cast to `u16` when writing the DICOM `Columns` (0028,0011) and\n`Rows` (0028,0010) attributes (lines 275 and 280). For images wider or taller than 65,535 pixels\nthe cast silently truncates the value (e.g., 65,536 → 0), producing a DICOM object with\nincorrect and potentially zero-valued dimension attributes. The DICOM standard limits Rows and\nColumns to u16, so the truncation may be intentional in context, but there is no check or error\nreported to the user when the input image exceeds this limit.","fix":"Add an explicit bounds check before the cast:\n\n```rust\nlet columns = u16::try_from(width).unwrap_or_else(|_| {\n    eprintln!(\"Image width {width} exceeds DICOM maximum of 65535\");\n    std::process::exit(-2);\n});\nlet rows = u16::try_from(height).unwrap_or_else(|_| {\n    eprintln!(\"Image height {height} exceeds DICOM maximum of 65535\");\n    std::process::exit(-2);\n});\n```","locations":[{"ref":"fromimage/src/main.rs:272-281","code":"  272 |     obj.put(DataElement::new(\n  273 |         tags::COLUMNS,\n  274 |         VR::US,\n  275 |         PrimitiveValue::from(width as u16),\n  276 |     ));\n  277 |     obj.put(DataElement::new(\n  278 |         tags::ROWS,\n  279 |         VR::US,\n  280 |         PrimitiveValue::from(height as u16),\n  281 |     ));","lines":10}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `OddLengthStrategy::NextEven`, when `sanitize_length` is called on a defined\nlength value of exactly `0xFFFF_FFFE` (the largest valid even defined length),\nthe code does:\n\n    OddLengthStrategy::NextEven => Some(length + 1),\n\nOnly odd lengths reach this branch (the outer condition checks `length.0 & 1 != 0`),\nso the maximum odd defined length is `0xFFFF_FFFD`. `Length(0xFFFF_FFFD) + 1` calls\n`Add<i32>::add` which wraps through `(len as i32 + rhs) as u32`. For\n`0xFFFF_FFFD_u32 as i32 = -3`, so `-3 + 1 = -2`, cast back to `u32 = 0xFFFF_FFFE`.\nThis is correct.\n\nHowever, `Add<Length>` for `Length` (used when the argument is `Length(1)`, not `i32`)\nperforms `l1 + l2` on `u32` values. If `sanitize_length` were ever called with\n`Length(0xFFFF_FFFF - 1) = Length(0xFFFF_FFFE)` (an even value, so the outer condition\nis false and this path is never reached), that branch is safe.\n\nMore critically, the two `even_len` functions (encode.rs line 425, mem.rs line 2399):\n\n    fn even_len(l: u32) -> u32 {\n        (l + 1) & !1\n    }\n\noverflow for `l = 0xFFFF_FFFF`: `(0xFFFF_FFFF_u32 + 1)` wraps to `0` in release mode,\nyielding `even_len(0xFFFF_FFFF) = 0`. In the encode path, `even_len` is guarded by a\ncheck `if let Some(len) = de.len.get()` which returns `None` for `0xFFFF_FFFF`, so\nthat particular call is safe. In `encode_item_header` (line 118):\n\n    let len = if len == 0xFFFF_FFFF {\n        len\n    } else {\n        even_len(len)\n    };\n\nThis guard is also correct.\n\nThe `mem.rs` `command_from_iter_with_dict` (line 754) does:\n\n    calculated_length += if l.is_defined() { even_len(l.0) } else { 0 } + 8;\n\nHere `l.is_defined()` is `true` when `l.0 != 0xFFFF_FFFF`, so `even_len(l.0)` is\ncalled with a value that is at most `0xFFFF_FFFE`. Safe for `even_len` itself.\nBut `calculated_length` is a `u32` and the accumulated sum can wrap in release mode\nif the command set contains many large elements, producing a wrong `CommandGroupLength`\n(0000,0000) value.","fix":"Use `calculated_length = calculated_length.saturating_add(...)` or check for\noverflow to avoid silently producing a wrong CommandGroupLength value.","locations":[{"ref":"object/src/mem.rs:747-758","code":"  747 |         let mut calculated_length: u32 = 0;\n  748 |         let mut entries: BTreeMap<_, _> = iter\n  749 |             .into_iter()\n  750 |             .map(|e| {\n  751 |                 // count the length of command set elements\n  752 |                 if e.tag().0 == 0x0000 && e.tag().1 != 0x0000 {\n  753 |                     let l = e.value().length();\n  754 |                     calculated_length += if l.is_defined() { even_len(l.0) } else { 0 } + 8;\n  755 |                 }\n  756 | \n  757 |                 (e.tag(), e)\n  758 |             })","lines":12}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `VoiLutTransform::apply`, the expression `(value_rounded - self.lut.min_pixel_value) as usize` (line 238) performs signed `i32` subtraction before casting to `usize`. The `else` branch is only entered when `value_rounded > self.lut.min_pixel_value`, so the result is always positive. However, if `self.lut.min_pixel_value` is very negative (e.g. `i32::MIN`) and `value_rounded` is close to `i32::MAX`, the subtraction overflows in debug mode (panic) and wraps silently in release mode (producing an enormous `usize` index, which `data.get()` then handles gracefully by returning `None`). This is a signed integer overflow — a panic in debug builds and unintended-but-harmless behavior in release builds.","fix":"Use saturating or checked arithmetic: `(value_rounded as i64 - self.lut.min_pixel_value as i64) as usize` to avoid overflow, then clamp to `usize::MAX` if needed.","locations":[{"ref":"pixeldata/src/transform.rs:231-242","code":"  231 |     pub fn apply(&self, value: f64) -> f64 {\n  232 |         let value_rounded = value.round().clamp(i32::MIN as f64, i32::MAX as f64) as i32;\n  233 |         let y = (*(if value_rounded <= self.lut.min_pixel_value {\n  234 |             self.lut.data.first().unwrap()\n  235 |         } else {\n  236 |             self.lut\n  237 |                 .data\n  238 |                 .get((value_rounded - self.lut.min_pixel_value) as usize)\n  239 |                 .unwrap_or(self.lut.data.last().unwrap())\n  240 |         })) << self.shift;\n  241 |         y as f64\n  242 |     }","lines":12}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`write_chunk_u16` in `pdu/writer.rs` silently truncates the chunk length if the serialised\ncontent exceeds 65535 bytes.\n\n    let length = data.len() as u16;   // line 59: no bounds check\n\nThis affects any variable-length item encoded with a 16-bit length field:\n* Application Context Name (line 568)\n* Presentation Context items (lines 610, 658, 698, 745, 802)\n* User Information item and all sub-items (line 854 and nested calls)\n\nA long UID, a large `SopClassExtendedNegotiationSubItem` payload, or many user-variable\nsub-items can push `data.len()` above 65535.  The written 2-byte length is then `data.len() & 0xFFFF`,\nso the receiving end reads far fewer bytes than were sent, mis-parsing the remainder of the PDU.\nNo error is returned to the caller.","fix":"Replace the cast with a checked conversion and return an error if the content is too large:\n```rust\nlet length = u16::try_from(data.len())\n    .map_err(|_| WriteChunkError::WriteLength { ... })?;\n```","locations":[{"ref":"ul/src/pdu/writer.rs:59","code":"   59 |     let length = data.len() as u16;","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `DataElementVisitor::visit_map`, the conflict guards for \"InlineBinary\" (line 173) and\n\"BulkDataURI\" (line 189) check `values.is_some()` to detect a previously-seen \"Value\" key, but\n`values` is the *output* accumulator (`Option<Value<...>>`) that is only populated after the raw\nJSON has been fully deserialized — it is always `None` during the map traversal. The correct\nvariable to check is `value` (the `Option<serde_json::Value>` that is set when the \"Value\" key\nis seen). As a result, sending both \"Value\" and \"InlineBinary\" (or \"Value\" and \"BulkDataURI\")\nin the same element object is silently accepted instead of returning an error; the last-seen key\nwins, which can produce silently corrupted DICOM objects when parsing malformed JSON.","fix":"Replace `values.is_some()` with `value.is_some()` on both lines:\n\n```rust\n// line 173\nif value.is_some() {\n    return Err(A::Error::custom(\"\"InlineBinary\" conflicts with \"Value\"\"));\n}\n// line 189\nif value.is_some() {\n    return Err(A::Error::custom(\"\"BulkDataURI\" conflicts with \"Value\"\"));\n}\n```","locations":[{"ref":"json/src/de/mod.rs:173-174","code":"  173 |                     if values.is_some() {\n  174 |                         return Err(A::Error::custom(","lines":2},{"ref":"json/src/de/mod.rs:189-191","code":"  189 |                     if values.is_some() {\n  190 |                         return Err(A::Error::custom(\"\\\"BulkDataURI\\\" conflicts with \\\"Value\\\"\"));\n  191 |                     }","lines":3}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `open_file_with_all_options`, after calling `detect_preamble`, the condition for\nreading/skipping 128 preamble bytes is:\n\n    if read_preamble == ReadPreamble::Auto || read_preamble == ReadPreamble::Always {\n\n`detect_preamble` returns `ReadPreamble::Auto` when it cannot detect whether a preamble\nis present (neither `DICM` at byte 128 nor `DICM` at byte 0 was found). In that case the\nbranch skips 128 bytes of the actual DICOM data stream before handing the reader to\n`read_parts_with_all_options_impl`, causing incorrect parsing or an error.\n\nThe equivalent path `from_reader_with_all_options` (line 527) correctly uses only\n`ReadPreamble::Always` for the skip condition, making the two paths inconsistent.\nFor a file without a recognisable preamble or magic code, the file-opening path\nsilently consumes 128 data bytes and then fails to parse the file meta header.","fix":"Change the condition to match the reader path:\n\n    if read_preamble == ReadPreamble::Always {\n        ...\n    }","locations":[{"ref":"object/src/mem.rs:444","code":"  444 |         if read_preamble == ReadPreamble::Auto || read_preamble == ReadPreamble::Always {","lines":1}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `DumpOptions::dump_file_impl`, when the output format is `DumpFormat::Json`,\nthe implementation always writes to `stdout()` (line 241) regardless of the `to: impl Write`\nparameter that was passed in. This means that `DumpOptions::dump_file_to(&mut some_writer, &obj)`\nwith JSON format completely ignores `some_writer` and writes to standard output instead of the\ncaller-supplied destination. The dump-to-file test only covers the Text format, so this path is\nuntested. Note that `dump_object_impl` in the same file correctly uses `to` (line 297), so this\nis an inconsistency between the two methods.","fix":"Replace the hard-coded `stdout()` with the `to` parameter:\n\n```rust\nDumpFormat::Json => {\n    let json_obj = DicomJson::from(obj);\n    serde_json::to_writer_pretty(&mut to, &json_obj)?;\n    Ok(())\n}\n```","locations":[{"ref":"dump/src/lib.rs:239-243","code":"  239 |             DumpFormat::Json => {\n  240 |                 let json_obj = DicomJson::from(obj);\n  241 |                 serde_json::to_writer_pretty(stdout(), &json_obj)?;\n  242 |                 Ok(())\n  243 |             }","lines":5}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `DicomJsonPerson` (json/src/de/value.rs, line 10), the `alphabetic` field\nis a non-optional `String` with no `#[serde(default)]` annotation. According to the DICOM JSON\nencoding standard (PS 3.18 §F.2.2), a person name object may consist of any subset of the three\ncomponent groups (Alphabetic, Ideographic, Phonetic); all three are optional. Any DICOM JSON\ndocument that contains a PN value with only Ideographic or Phonetic components (and no\nAlphabetic key) will fail to deserialize with a missing-field error, making the deserializer\nnon-conformant with the standard.","fix":"Make the `alphabetic` field optional and add a `#[serde(default)]` attribute:\n\n```rust\n#[derive(Debug, Clone, PartialEq, Deserialize)]\npub struct DicomJsonPerson {\n    #[serde(rename = \"Alphabetic\", default)]\n    alphabetic: String,\n    #[serde(rename = \"Ideographic\")]\n    ideographic: Option<String>,\n    #[serde(rename = \"Phonetic\")]\n    phonetic: Option<String>,\n}\n```","locations":[{"ref":"json/src/de/value.rs:8-15","code":"    8 | pub struct DicomJsonPerson {\n    9 |     #[serde(rename = \"Alphabetic\")]\n   10 |     alphabetic: String,\n   11 |     #[serde(rename = \"Ideographic\")]\n   12 |     ideographic: Option<String>,\n   13 |     #[serde(rename = \"Phonetic\")]\n   14 |     phonetic: Option<String>,\n   15 | }","lines":8}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `build_object` in `mem.rs`, when stopping early due to `read_until` or `read_to`\ntags at a `PixelSequenceStart` or `SequenceStart` token, the function simply `break`s\nout of the loop, leaving the underlying parser positioned just past the sequence/pixel\nstart header. The caller may then try to continue parsing from that position,\nbut the parser state will be mid-sequence (it has already emitted the `SequenceStart`\ntoken and is expecting item headers). There is no mechanism to skip the remainder\nof the sequence before returning.\n\nThis is relevant when using `read_until` or `read_to` options that cut off parsing\ninside a sequence. Subsequent reads from the same parser (e.g. via `DicomCollector`'s\n`read_dataset_up_to` + `read_dataset_to_end`) will encounter unexpected tokens and\nlikely return an error.","fix":"When stopping due to a `read_until`/`read_to` tag, skip any partially-consumed\nstructural token (sequence/item start) so that the parser remains in a state where\nthe next call can read cleanly, or document clearly that once an early-stop tag is\nreached, the parser is no longer usable.","locations":[{"ref":"object/src/mem.rs:2155-2230","code":" 2155 |                 DataToken::PixelSequenceStart => {\n 2156 |                     let sq_start_tag = Tag(0x7fe0, 0x0010);\n 2157 |                     // stop reading if reached `read_until` tag (exclusive)\n 2158 |                     if read_until\n 2159 |                         .map(|t| t <= sq_start_tag)\n 2160 |                         .unwrap_or(false)\n 2161 |                     {\n 2162 |                         break;\n 2163 |                     }\n 2164 |                     // stop reading if exceeded `read_to` tag (inclusive)\n 2165 |                     if read_to\n 2166 |                         .map(|t| t < sq_start_tag)\n 2167 |                         .unwrap_or(false)\n 2168 |                     {\n 2169 |                         break;\n 2170 |                     }\n 2171 |                     let value = InMemDicomObject::build_encapsulated_data(&mut *dataset)?;\n 2172 |                     DataElement::new(sq_start_tag, VR::OB, value)\n 2173 |                 }\n 2174 |                 DataToken::ElementHeader(header) => {\n 2175 |                     // stop reading if reached `read_until` tag (exclusive)\n 2176 |                     if read_until.map(|t| t <= header.tag).unwrap_or(false) {\n 2177 |                         break;\n 2178 |                     }\n 2179 |                     // stop reading if exceeded `read_to` tag (inclusive)\n 2180 |                     if read_to.map(|t| t < header.tag).unwrap_or(false) {\n 2181 |                         break;\n 2182 |                     }\n 2183 | \n 2184 |                     // fetch respective value, place it in the entries\n 2185 |                     let next_token = dataset.next().context(MissingElementValueSnafu)?;\n 2186 |                     match next_token.context(ReadTokenSnafu)? {\n 2187 |                         DataToken::PrimitiveValue(v) => InMemElement::new_with_len(\n 2188 |                             header.tag,\n 2189 |                             header.vr,\n 2190 |                             header.len,\n 2191 |                             Value::Primitive(v),\n 2192 |                         ),\n 2193 |                         token => {\n 2194 |                             return UnexpectedTokenSnafu { token }.fail();\n 2195 |                         }\n 2196 |                     }\n 2197 |                 }\n 2198 |                 DataToken::SequenceStart { tag, len } => {\n 2199 |                     // stop reading if reached `read_until` tag (exclusive)\n 2200 |                     if read_until.map(|t| t <= tag).unwrap_or(false) {\n 2201 |                         break;\n 2202 |                     }\n 2203 |                     // stop reading if exceeded `read_to` tag (inclusive)\n 2204 | g` fires first (empty item), the state is left coherent.\n\nA subtler issue: after the offset table item ends and `offset_table_next` is cleared,\nsubsequent items are read as fragment items. However, there is no reset of\n`offset_table_next` when the overall pixel sequence is exited (via `SequenceEnd` or\na `hard_break`). If the iterator is continued after a sequence delimiter (which should\nnormally not happen), `offset_table_next` could be stale. This is a low-severity issue\nbecause the hard_break flag prevents further iteration after a SequenceEnd.\n\nThe real concern is that the `SequenceEnd` branch inside the pixel-data item handling\n(line 410-413) pops the sequence delimiter and sets `in_sequence = false`:\n\n    SequenceItemHeader::SequenceDelimiter => {\n        self.seq_delimiters.pop();\n        self.in_sequence = false;\n        self.delimiter_check_pending = true;\n        Some(Ok(DataToken::SequenceEnd))\n    }\n\nIf `offset_table_next` is still `true` at this point (should not happen in practice\nbut could theoretically if the pixel data sequence immediately ends), it would remain\nset for the next parse phase.","fix":"Reset `offset_table_next = false` whenever a `SequenceEnd` token is produced from\na pixel-data sequence, and when `hard_break` is set.","locations":[{"ref":"parser/src/dataset/read.rs:447-508","code":"  447 |                 if self.offset_table_next {\n  448 |                     // offset table\n  449 |                     let mut offset_table = Vec::with_capacity(len);\n  450 | \n  451 |                     self.offset_table_next = false;\n  452 | \n  453 |                     // need to pop item delimiter on the next iteration\n  454 |                     self.delimiter_check_pending = true;\n  455 | \n  456 |                     Some(\n  457 |                         match self.parser.read_u32_to_vec(len as u32, &mut offset_table) {\n  458 |                             Ok(()) => Ok(DataToken::OffsetTable(offset_table)),\n  459 |                             Err(e) => Err(e).context(ReadItemValueSnafu { len: len as u32 }),\n  460 |                         },\n  461 |                     )\n  462 |                 } else {\n  463 |                     // item value\n  464 |                     let mut value = Vec::with_capacity(len);\n  465 | \n  466 |                     // need to pop item delimiter on the next iteration\n  467 |                     self.delimiter_check_pending = true;\n  468 |                     Some(\n  469 |                         self.parser\n  470 |                             .read_to_vec(len as u32, &mut value)\n  471 |                             .map(|_| Ok(DataToken::ItemValue(value)))\n  472 |                             .unwrap_or_else(|e| {\n  473 |                                 Err(e).context(ReadItemValueSnafu { len: len as u32 })\n  474 |                             }),\n  475 |                     )\n  476 |                 }\n  477 |             } else if let Some(header) = self.last_header {\n  478 |                 if header.is_encapsulated_pixeldata() {\n  479 |                     self.push_sequence_token(SeqTokenType::Sequence, Length::UNDEFINED, true);\n  480 |                     self.last_header = None;\n  481 | \n  482 |                     // encapsulated pixel data, expecting offset table\n  483 |                     match self.parser.decode_item_header() {\n  484 |                         Ok(header) => match header {\n  485 |                             SequenceItemHeader::Item { len } => {\n  486 |                                 let len = match self.sanitize_length(len) {\n  487 |                                     Some(len) => len,\n  488 |                                     None => {\n  489 |                                         return Some(\n  490 |                                             InvalidItemLengthSnafu {\n  491 |                                                 bytes_read: self.parser.position(),\n  492 |                                                 len: len.0,\n  493 |                                             }\n  494 |                                             .fail(),\n  495 |                                         );\n  496 |                                     }\n  497 |                                 };\n  498 | \n  499 |                                 // entered a new item\n  500 |                                 self.in_sequence = false;\n  501 |                                 self.push_sequence_token(SeqTokenType::Item, len, true);\n  502 |                                 // items can be empty\n  503 |                                 if len == Length(0) {\n  504 |                                     self.delimiter_check_pending = true;\n  505 |                                 } else {\n  506 |                                     self.offset_table_next = true;\n  507 |                                 }\n  508 |                                 Some(Ok(DataToken::ItemStart { len }))","lines":62}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`voi_lut_function` in `attribute.rs` returns `Ok(Some(vec![\"LINEAR\".to_string()]))` as its fallback when the `VOILUTFunction` attribute is not present in the DICOM object (line 128). This means `ImagingProperties::from_obj` always stores `Some(vec![VoiLutFunction::Linear])` for `voi_lut_function`, never `None`. Callers that check `if let Some(lut) = self.voi_lut_function()?` will never take the `None` branch, and so code paths that use `VoiLutFunction::Linear` as a default (e.g. at `lib.rs:1072` and `1108`) are unreachable dead code. The real consequence is that the function incorrectly advertises that the DICOM object has an explicit VOI LUT Function attribute even when it does not.","fix":"Return `Ok(None)` when the attribute is absent. The downstream code at every call site already handles `None` correctly and falls back to `VoiLutFunction::Linear`.","locations":[{"ref":"pixeldata/src/attribute.rs:99-130","code":"   99 | pub fn voi_lut_function<D: DataDictionary + Clone>(\n  100 |     obj: &FileDicomObject<InMemDicomObject<D>>,\n  101 | ) -> Result<Option<Vec<String>>> {\n  102 |     let elems = obj\n  103 |         .element(tags::VOILUT_FUNCTION)\n  104 |         .ok()\n  105 |         .map(|v| vec![v])\n  106 |         .or_else(|| {\n  107 |             get_from_shared(obj, [tags::FRAME_VOILUT_SEQUENCE, tags::VOILUT_FUNCTION])\n  108 |                 .map(|inner| inner.collect())\n  109 |         })\n  110 |         .or_else(|| {\n  111 |             get_from_per_frame(obj, [tags::FRAME_VOILUT_SEQUENCE, tags::VOILUT_FUNCTION])\n  112 |                 .map(|inner| inner.collect())\n  113 |         });\n  114 |     if let Some(elems_inner) = elems {\n  115 |         let res = elems_inner\n  116 |             .iter()\n  117 |             .map(|el| {\n  118 |                 (*el)\n  119 |                     .string()\n  120 |                     .context(CastValueSnafu {\n  121 |                         name: AttributeName::VoiLutFunction,\n  122 |                     })\n  123 |                     .map(|v| v.trim().to_string())\n  124 |             })\n  125 |             .collect::<Result<Vec<_>>>()?;\n  126 |         Ok(Some(res))\n  127 |     } else {\n  128 |         Ok(Some(vec![\"LINEAR\".to_string()]))\n  129 |     }\n  130 | }","lines":32},{"ref":"pixeldata/src/lib.rs:2151-2156","code":" 2151 |         let voi_lut_function = voi_lut_function(obj)?;\n 2152 |         let voi_lut_function: Option<Vec<VoiLutFunction>> = voi_lut_function.and_then(|fns| {\n 2153 |             fns.iter()\n 2154 |                 .map(|v| VoiLutFunction::try_from((*v).as_str()).ok())\n 2155 |                 .collect()\n 2156 |         });","lines":6}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The DICOM standard (PS3.8 section 9.3.3.2) states:\n\n  \"When the Result/Reason field has a value other than acceptance (0), this field\n   [Transfer Syntax Sub-Item] shall not be significant and its value shall not be\n   tested when received.\"\n\nThis means a conformant SCP may omit the Transfer Syntax Sub-Item entirely from a\nrejected Presentation Context Result item.  However, the reader unconditionally\nrequires it (line 666):\n\n    transfer_syntax: transfer_syntax.context(MissingTransferSyntaxSnafu)?,\n\nIf a peer sends a rejected presentation context without a Transfer Syntax sub-item,\nthe association establishment fails with `MissingTransferSyntax`, even though the\npeer is behaving correctly according to the standard.","fix":"When `reason != Acceptance`, allow `transfer_syntax` to be `None` and substitute a\nplaceholder (e.g. an empty string or `\"1.2.840.10008.1.2\"`) instead of returning an error:\n```rust\ntransfer_syntax: if reason == PresentationContextResultReason::Acceptance {\n    transfer_syntax.context(MissingTransferSyntaxSnafu)?\n} else {\n    transfer_syntax.unwrap_or_default()\n},\n```","locations":[{"ref":"ul/src/pdu/reader.rs:662-668","code":"  662 |             Ok(Some(PduVariableItem::PresentationContextResult(\n  663 |                 PresentationContextResult {\n  664 |                     id: presentation_context_id,\n  665 |                     reason,\n  666 |                     transfer_syntax: transfer_syntax.context(MissingTransferSyntaxSnafu)?,\n  667 |                 },\n  668 |             )))","lines":7}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`PrimitiveValue::to_multi_int` has an inconsistency in its handling of empty collections.\nFor `U8`, `I16`, `U16`, `U32` the match arms have no `!s.is_empty()` guard, so an empty\ncollection produces `Ok(vec![])`. For `I32`, `U64`, and `I64` the arms carry `if !s.is_empty()`\nguards (lines 1166, 1182, 1198), so an empty `I32`, `U64`, or `I64` value falls through to the\ncatch-all `_` arm at line 1214 and returns an error\n`ConvertValueError { requested: \"integer\", cause: None }`.\nA caller who constructs `PrimitiveValue::I32(smallvec![])` and then calls\n`to_multi_int::<i32>()` receives an unexpected error instead of an empty vector, which is\ninconsistent with the documented semantics (\"if the value is Empty, return an empty vector\").","fix":"Remove the `if !s.is_empty()` guards from the I32, U64, and I64 arms of `to_multi_int` so that empty collections consistently return `Ok(vec![])`, matching the behaviour of the U8/U16/U32 arms.","locations":[{"ref":"core/src/value/primitive.rs:1166","code":" 1166 |             PrimitiveValue::I32(s) if !s.is_empty() => s","lines":1},{"ref":"core/src/value/primitive.rs:1182","code":" 1182 |             PrimitiveValue::U64(s) if !s.is_empty() => s","lines":1},{"ref":"core/src/value/primitive.rs:1198","code":" 1198 |             PrimitiveValue::I64(s) if !s.is_empty() => s","lines":1}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `parse_voi_lut_entry` in `attribute.rs`, the LUT descriptor check `descriptor_elements[0] > 0` (line 668) rejects a `0` first descriptor element. Per the DICOM standard (PS3.3 C.7.6.3.1.5), a first element of 0 in the LUT descriptor means 65536 entries. The current validation incorrectly treats this as an error and returns `InvalidValue`, causing a decoding failure for conformant DICOM files that use this encoding.","fix":"Change the validation to `descriptor_elements[0] >= 0` (or remove the check entirely), and when `descriptor_elements[0] == 0`, treat `expected_lut_len` as `65536`.","locations":[{"ref":"pixeldata/src/attribute.rs:660-674","code":"  660 |     ensure!(\n  661 |         descriptor_elements.len() == 3,\n  662 |         InvalidValueSnafu {\n  663 |             name: AttributeName::LutDescriptor,\n  664 |             value: format!(\"value with multiplicity {}\", descriptor_elements.len()),\n  665 |         }\n  666 |     );\n  667 |     ensure!(\n  668 |         descriptor_elements[0] > 0,\n  669 |         InvalidValueSnafu {\n  670 |             name: AttributeName::LutDescriptor,\n  671 |             value: format!(\"value with LUT length {}\", descriptor_elements[0]),\n  672 |         }\n  673 |     );\n  674 |     let expected_lut_len: usize = descriptor_elements[0] as usize;","lines":15}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `deflated.rs`, `encode_frame` returns an `AttributeOp` that sets `ENCAPSULATED_PIXEL_DATA_VALUE_TOTAL_LENGTH` to `fragment_len` — the size of the single compressed frame (line 141). When a multi-frame image is encoded via the base `encode` method (which calls `encode_frame` for each frame), each call appends its attribute op to a cumulative list. The transcoder then applies all of these ops sequentially, meaning the last frame's compressed size overwrites any prior value, leaving `ENCAPSULATED_PIXEL_DATA_VALUE_TOTAL_LENGTH` set to the last fragment's size rather than the total across all fragments.","fix":"Remove the `ENCAPSULATED_PIXEL_DATA_VALUE_TOTAL_LENGTH` attribute op from `encode_frame` and rely on the transcoder's post-encode computation (which already correctly calculates the total at line 345), or only emit this op from the `encode` method after all frames are processed.","locations":[{"ref":"transfer-syntax-registry/src/adapters/deflated.rs:133-143","code":"  133 | \n  134 |         let fragment_len = dst.len() - len_before;\n  135 | \n  136 |         // provide attribute changes\n  137 |         Ok(vec![\n  138 |             // Encapsulated Pixel Data Value Total Length\n  139 |             AttributeOp::new(\n  140 |                 Tag(0x7FE0, 0x0003),\n  141 |                 AttributeAction::Set(PrimitiveValue::from(fragment_len as u64)),\n  142 |             ),\n  143 |         ])","lines":11},{"ref":"pixeldata/src/transcode.rs:360-375","code":"  360 |     // provide Encapsulated Pixel Data Value Total Length\n  361 |     obj.put(DataElement::new(\n  362 |         tags::ENCAPSULATED_PIXEL_DATA_VALUE_TOTAL_LENGTH,\n  363 |         VR::UV,\n  364 |         PrimitiveValue::from(total_pixeldata_len),\n  365 |     ));\n  366 | \n  367 |     // try to apply operations\n  368 |     for (n, op) in ops.into_iter().enumerate() {\n  369 |         match obj.apply(op) {\n  370 |             Ok(_) => (),\n  371 |             Err(e) => {\n  372 |                 tracing::warn!(\"Could not apply transcoding step #{}: {}\", n, e)\n  373 |             }\n  374 |         }\n  375 |     }","lines":16}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `uncompressed.rs`, the `encode_frame` method returns an `AttributeOp` that sets `ENCAPSULATED_PIXEL_DATA_VALUE_TOTAL_LENGTH` (tag 7FE0,0003) to `len_before` — the total size of the entire uncompressed input pixel data (line 100), not the size of the single encoded fragment. After `encode_and_decode` in `transcode.rs` correctly computes and writes the total length, it then applies the ops returned by the encoder (line 368-375), which overwrites the correct value with the total uncompressed pixel data length. For multi-frame images this produces an incorrect `ENCAPSULATED_PIXEL_DATA_VALUE_TOTAL_LENGTH` in the output DICOM.","fix":"In `encode_frame`, report `frame_data.len()` (the size of the output fragment) in the attribute op, not `len_before`. Alternatively, remove the attribute op from `encode_frame` entirely and let the transcoder handle it after accumulating all fragments.","locations":[{"ref":"transfer-syntax-registry/src/adapters/uncompressed.rs:86-102","code":"   86 |         let len_before = pixeldata_uncompressed.len();\n   87 | \n   88 |         let frame_data = pixeldata_uncompressed\n   89 |             .get(frame_size * frame as usize..frame_size * (frame as usize + 1))\n   90 | iting for more data unnecessarily.\n\nThe symmetric issue exists in the async variant (pdata.rs line 652).","fix":"Use a logical OR to latch the `is_last` flag once it becomes `true`:\n    self.last_pdu = self.last_pdu || pdata_value.is_last;\nThis ensures that if any PDV in the current PDU is the last, the stream is considered\nfinished.","locations":[{"ref":"ul/src/association/pdata.rs:314-325","code":"  314 |                     for pdata_value in data {\n  315 |                         self.presentation_context_id = match self.presentation_context_id {\n  316 |                             None => Some(pdata_value.presentation_context_id),\n  317 |                             Some(cid) if cid == pdata_value.presentation_context_id => Some(cid),\n  318 |                             Some(cid) => {\n  319 |                                 warn!(\"Received PData value of presentation context {}, but should be {}\", pdata_value.presentation_context_id, cid);\n  320 |                                 Some(cid)\n  321 |                             }\n  322 |                         };\n  323 |                         self.buffer.extend(pdata_value.data);\n  324 |                         self.last_pdu = pdata_value.is_last;\n  325 |                     }","lines":12},{"ref":"ul/src/association/pdata.rs:639-653","code":"  639 |                     Pdu::PData { data } => {\n  640 |                         for pdata_value in data {\n  641 |                             self.presentation_context_id = match self.presentation_context_id {\n  642 |                                 None => Some(pdata_value.presentation_context_id),\n  643 |                                 Some(cid) if cid == pdata_value.presentation_context_id => {\n  644 |                                     Some(cid)\n  645 |                                 }\n  646 |                                 Some(cid) => {\n  647 |                                     warn!(\"Received PData value of presentation context {} \nfield — or log it — will receive a misleading type name in the error message.","fix":"Change `requested: \"float32\"` to `requested: \"float64\"` in the final catch-all arm of `to_multi_float64`.","locations":[{"ref":"core/src/value/primitive.rs:1944","code":" 1944 |                 requested: \"float32\",","lines":1}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"Several time-related error context variants are used with the wrong Snafu context in\n`to_multi_naive_time` and `to_multi_time` inside `core/src/value/primitive.rs`.\n\n- In `to_multi_naive_time` (lines 2465, 2481, 2491): parse_time errors are wrapped with\n  `.context(ParseDateSnafu)` instead of `.context(ParseTimeSnafu)`. The error message will\n  say \"Failed to read text as a date\" rather than \"Failed to read text as a time\".\n- In `to_multi_time` (lines 2667, 2683, 2693): the same wrong `.context(ParseDateSnafu)` is used.\n- In `to_multi_datetime` (lines 2832, 2847, 2857): datetime parse errors are wrapped with\n  `.context(ParseDateSnafu)` instead of `.context(ParseDateTimeSnafu)`.\n\nThese context mistakes produce misleading error messages when parsing fails.","fix":"Replace the incorrect `.context(ParseDateSnafu)` calls with the appropriate context: `.context(ParseTimeSnafu)` for time parsing errors and `.context(ParseDateTimeSnafu)` for datetime parsing errors.","locations":[{"ref":"core/src/value/primitive.rs:2465","code":" 2465 |                     .context(ParseDateSnafu)","lines":1},{"ref":"core/src/value/primitive.rs:2481","code":" 2481 |                 .context(ParseDateSnafu)","lines":1},{"ref":"core/src/value/primitive.rs:2491","code":" 2491 |                 .context(ParseDateSnafu)","lines":1},{"ref":"core/src/value/primitive.rs:2667","code":" 2667 |             .context(ParseDateSnafu)","lines":1},{"ref":"core/src/value/primitive.rs:2683","code":" 2683 |                 .map_err(|err| ConvertValueError {","lines":1},{"ref":"core/src/value/primitive.rs:2693","code":" 2693 |                 .map_err(|err| ConvertValueError {","lines":1},{"ref":"core/src/value/primitive.rs:2832","code":" 2832 |             .context(ParseDateSnafu)","lines":1},{"ref":"core/src/value/primitive.rs:2847","code":" 2847 |                 .map_err(|err| ConvertValueError {","lines":1},{"ref":"core/src/value/primitive.rs:2857","code":" 2857 |                 .map_err(|err| ConvertValueError {","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"In `DataSetReader::next`, when reading encapsulated pixel-data item values, the parser\npre-allocates a `Vec` with the full capacity equal to the item's declared length before\nactually reading any bytes:\n\n    let mut offset_table = Vec::with_capacity(len);   // line 449\n    ...\n    let mut value = Vec::with_capacity(len);           // line 464\n\n`len` is cast from a `u32` (up to ~4 GiB) and comes directly from the DICOM item header\nin the input stream. A crafted DICOM file can declare an item of, for example,\n0x7FFF_FFFF bytes (2 GiB) without providing that much data. The `Vec::with_capacity`\ncall will immediately attempt to allocate all that memory, causing out-of-memory or a\nvery long stall (denial of service) before the subsequent I/O call fails.\n\nThe same pattern occurs in the lazy reader:\n\n    let len = len.get().with_context(...)...\n    // decoder is then stored in the token with len u32 — no capacity reservation\n    // but `into_owned` calls `read_to_vec(len, &mut data)` (mod.rs line 291)\n    // where `let mut data = Vec::new(); decoder.read_to_vec(len, &mut data)` avoids\n    // the pre-alloc issue, unlike the eager reader.","fix":"Do not pre-allocate based on the declared length from untrusted input.\nUse `Vec::new()` and rely on the I/O call to grow the buffer as bytes are read,\nor cap the pre-allocation at a reasonable constant (e.g. 64 KiB) and n elements immediately\n\n`len` is a `u32` (up to ~4 GiB) obtained directly from the parsed DICOM stream.\nA crafted file with a header claiming a 4 GiB value will cause immediate OOM before\nany I/O error is returned. This is a denial-of-service vector when parsing untrusted\nDICOM files.","fix":"Cap the initial allocation to a reasonable limit. Read into the buffer in\nchunks and grow only as data is successfully read from the underlying source,\nor read data directly from the stream without pre-allocating the full size.","locations":[{"ref":"parser/src/stateful/decode.rs:458-464","code":"  458 |         header\n  459 |             .length()\n  460 |             .get()\n  461 |             .map(|len| len as usize)\n  462 |             .context(UndefinedValueLengthSnafu {\n  463 |                 position: self.position,\n  464 |                 tag: header.tag,","lines":7},{"ref":"parser/src/stateful/decode.rs:471","code":"  471 |         // tags","lines":1},{"ref":"parser/src/stateful/decode.rs:514","code":"  514 |             .read_exact(&mut self.buffer)","lines":1},{"ref":"parser/src/stateful/decode.rs:534-536","code":"  534 |         } else {\n  535 |             self.buffer\n  536 |                 .split(|v| *v == b'\\\\')","lines":3},{"ref":"parser/src/stateful/decode.rs:549-551","code":"  549 |     }\n  550 | \n  551 |     fn read_value_str(&mut self, header: &DataElementHeader) -> Result<PrimitiveValue> {","lines":3},{"ref":"parser/src/stateful/decode.rs:785-787","code":"  785 |         let len = self.require_known_length(header)?;\n  786 |         // sequence of 64-bit floats\n  787 |         let n = len >> 3;","lines":3}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"In `read_pdu_from_wire` (and its async counterpart `read_pdu_from_wire_async`), when `strict=false`,\na malicious peer can send a PDU whose 4-byte `pdu_length` field claims a very large payload\n(up to ~4 GB, i.e. `MAXIMUM_PDU_SIZE = 0xFFFFFFF9`).\n\n`read_pdu` checks `buf.remaining() < pdu_length as usize` and returns `Ok(None)` because the\nbuffer does not yet have enough data.  The outer loop then reads more bytes from the socket and\nappends them to `read_buffer` (a `BytesMut`) indefinitely until either the peer closes the\nconnection or the process runs out of memory.\n\nWith `strict=true` the `PduTooLarge` error fires as soon as the header is parsed and the loop\nexits; but `strict=false` is a documented mode and is used by `PDataReader` internally (line 290\nand 617 of pdata.rs pass `false`).","fix":"After reading the PDU header (type + length) but before waiting for the body, check that\n`pdu_length` does not exceed `max_pdu_length` unconditionally (regardless of `strict`).\nThe `strict` flag should only gate whether the *peer's* advertised maximum is honoured;\nreceiving a PDU whose claimed length exceeds the local `max_pdu_length` should always be\nan error to prevent unbounded allocation.\n\nAlternatively, cap the amount of data accumulated in `read_buffer` at\n`max_pdu_length + PDU_HEADER_SIZE` bytes and return an error if the limit is exceeded.","locations":[{"ref":"ul/src/association/mod.rs:643-665","code":"  643 |     let msg = loop {\n  644 |         let mut buf = Cursor::new(&read_buffer[..]);\n  645 |         // try to read a PDU according to what's in the buffer\n  646 |         match pdu::read_pdu(&mut buf, max_pdu_length, strict).context(ReceivePduSnafu)? {\n  647 |             Some(pdu) => {\n  648 |                 read_buffer.advance(buf.position() as usize);\n  649 |                 break pdu;\n  650 |             }\n  651 |             None => {\n  652 |                 // Reset position\n  653 |                 buf.set_position(0)\n  654 |             }\n  655 |         }\n  656 |         // Use BufReader to get similar behavior to AsyncRead read_buf\n  657 |         let recv = reader\n  658 |             .fill_buf()\n  659 |             .context(ReadPduSnafu)\n  660 |             .context(ReceivePduSnafu)?;\n  661 |         let bytes_read = recv.len();\n  662 |         read_buffer.extend_from_slice(recv);\n  663 |         reader.consume(bytes_read);\n  664 |         ensure!(bytes_read != 0, ConnectionClosedSnafu);\n  665 |     };","lines":23},{"ref":"ul/src/association/mod.rs:684-703","code":"  684 |     let msg = loop {\n  685 |         let mut buf = Cursor::new(&read_buffer[..]);\n  686 |         match pdu::read_pdu(&mut buf, max_pdu_length, strict).context(ReceivePduSnafu)? {\n  687 |             Some(pdu) => {\n  688 |                 read_buffer.advance(buf.position() as usize);\n  689 |                 break pdu;\n  690 |             }\n  691 |             None => {\n  692 |                 // Reset position\n  693 |                 buf.set_position(0)\n  694 |             }\n  695 |         }\n  696 |         let recv = reader\n  697 |             .read_buf(read_buffer)\n  698 |             .await\n  699 |             .context(ReadPduSnafu)\n  700 |             .context(ReceivePduSnafu)?;\n  701 |         ensure!(recv > 0, ConnectionClosedSnafu);\n  702 |     };\n  703 |     Ok(msg)","lines":20},{"ref":"ul/src/association/pdata.rs:287-309","code":"  287 |             let mut reader = BufReader::new(&mut self.stream);\n  288 |             let msg = loop {\n  289 |                 let mut buf = Cursor::new(&self.read_buffer[..]);\n  290 |                 match read_pdu(&mut buf, self.max_pdu_length, false)\n  291 |                     .map_err(std::io::Error::other)?\n  292 |                 {\n  293 |                     Some(pdu) => {\n  294 |                         self.read_buffer.advance(buf.position() as usize);\n  295 |                         break pdu;\n  296 |                     }\n  297 |                     None => {\n  298 |                         // Reset position\n  299 |                         buf.set_position(0)\n  300 |                     }\n  301 |                 }\n  302 |                 l
