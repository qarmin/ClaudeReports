::from_utf8(bytes).map_err(|e| {\n  150 |                 io::Error::new(\n  151 |                     io::ErrorKind::InvalidData,\n  152 |                     format!(\"invalid UTF-8 in secluded arg: {e}\"),\n  153 |                 )\n  154 |             })?;\n  155 |             args.push(arg);\n  156 |         } else {\n  157 |             current.push(byte[0]);\n  158 |         }\n  159 |     }","lines":42},{"ref":"crates/protocol/src/files_from.rs:166-192","code":"  166 |     let mut filenames = Vec::new();\n  167 |     let mut current = Vec::new();\n  168 | \n  169 |     let mut byte_buf = [0u8; 1];\n  170 |     loop {\n  171 |         let n = reader.read(&mut byte_buf)?;\n  172 |         if n == 0 {\n  173 |             // Unexpected EOF - flush any pending entry then return.\n  174 |             if !current.is_empty() {\n  175 |                 push_decoded_filename(&mut filenames, &current, iconv);\n  176 |                 current.clear();\n  177 |             }\n  178 |             break;\n  179 |         }\n  180 | \n  181 |         let byte = byte_buf[0];\n  182 |         if byte == b'\\0' {\n  183 |             if current.is_empty() {\n  184 |                 // Double-NUL: end of stream.\n  185 |                 break;\n  186 |             }\n  187 |             push_decoded_filename(&mut filenames, &current, iconv);\n  188 |             current.clear();\n  189 |         } else {\n  190 |             current.push(byte);\n  191 |         }\n  192 |     }","lines":27}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"`decode_name` reads an attacker-controlled suffix length and casts it directly to\n`usize` without first checking for a negative value. For XMIT_LONG_NAME entries\nthe length comes from `read_varint(reader)? as usize` (protocol >= 30) or\n`read_int(reader)? as usize` (protocol < 30). A negative `i32` (e.g. -1) becomes\n`usize::MAX` via sign extension. The subsequent guard `same_len + suffix_len >=\nMAXPATHLEN` then performs `255 + usize::MAX`, which panics in debug builds\n(arithmetic overflow) and, in release builds with overflow-checks off, wraps to a\nsmall value (e.g. 254) that PASSES the MAXPATHLEN guard. Execution then reaches\n`vec![0u8; suffix_len]` with `suffix_len == usize::MAX`, triggering an allocation\nfailure/abort. A malicious peer can crash the receiver with a single crafted file\nentry.","fix":"Read the length into an `i32` first and reject negatives before casting:\n`let raw = read_varint(reader)?; if raw < 0 { return Err(InvalidData) }`. Then use\n`same_len.checked_add(suffix_len)` (or compare `suffix_len` against\n`MAXPATHLEN - same_len`) so the overflow guard cannot itself overflow or wrap.","locations":[{"ref":"crates/protocol/src/wire/file_entry_decode/name.rs:66-91","code":"   66 |     let suffix_len = if flags & (XMIT_LONG_NAME as u32) != 0 {\n   67 |         if protocol_version >= 30 {\n   68 |             read_varint(reader)? as usize\n   69 |         } else {\n   70 |             read_int(reader)? as usize\n   71 |         }\n   72 |     } else {\n   73 |         let mut buf = [0u8; 1];\n   74 |         reader.read_exact(&mut buf)?;\n   75 |         buf[0] as usize\n   76 |     };\n   77 | \n   78 |     // upstream: flist.c `l2 >= MAXPATHLEN - l1` overflow exit\n   79 |     if same_len + suffix_len >= MAXPATHLEN {\n   80 |         return Err(io::Error::new(\n   81 |             io::ErrorKind::InvalidData,\n   82 |             format!(\n   83 |                 \"filename length {} exceeds maximum {}\",\n   84 |                 same_len + suffix_len,\n   85 |                 MAXPATHLEN - 1,\n   86 |             ),\n   87 |         ));\n   88 |     }\n   89 | \n   90 |     let mut suffix = vec![0u8; suffix_len];\n   91 |     reader.read_exact(&mut suffix)?;","lines":26}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"`XattrCache::receive_xattr` reads `name_len` and `datum_len` from the wire via\n`read_varint(reader)? as usize` with NO upper-bound validation (lines 159-160),\nunlike the sibling `read_xattr_definitions`/`recv_xattr` in\n`xattr/wire/decode.rs` which check against `MAX_WIRE_XATTR_NAME_LEN` /\n`MAX_WIRE_XATTR_VALUE_LEN`. `read_varint` returns an `i32` that can be negative\nfor hostile input (e.g. a wire-encoded `0x80000000` decodes to a negative\nvalue); casting a negative `i32` to `usize` produces a value near `usize::MAX`.\nThe subsequent `vec![0u8; name_len]` (line 170) / `vec![0u8; dget_len]`\n(line 187) then attempts a multi-exabyte allocation, aborting the process\n(capacity-overflow panic / OOM). This is the primary receiver-side xattr\nreception path (used during file-list reading), so it is reachable directly\nfrom untrusted peer data and constitutes a remotely triggerable DoS.","fix":"Mirror `xattr/wire/decode.rs`: reject negative counts and bound `name_len`\nagainst `MAX_WIRE_XATTR_NAME_LEN` and `datum_len` against\n`MAX_WIRE_XATTR_VALUE_LEN` before allocating. Also bound `count` (line 147)\nagainst `MAX_WIRE_XATTR_COUNT` as `decode.rs` does, and guard the\n`Vec::with_capacity`-equivalent loop.","locations":[{"ref":"crates/protocol/src/xattr/cache.rs:159-190","code":"  159 |             let name_len = read_varint(reader)? as usize;\n  160 |             let datum_len = read_varint(reader)? as usize;\n  161 | \n  162 |             // upstream: dget_len = datum_len > MAX_FULL_DATUM ? 1 + xattr_sum_len : datum_len\n  163 |             let dget_len = if datum_len > MAX_FULL_DATUM {\n  164 |                 MAX_XATTR_DIGEST_LEN\n  165 |             } else {\n  166 |                 datum_len\n  167 |             };\n  168 | \n  169 |             // Read name bytes (includes NUL terminator from upstream)\n  170 |             let mut name = vec![0u8; name_len];\n  171 |             reader.read_exact(&mut name)?;\n  172 | \n  173 |             // upstream: name_len < 1 || name[name_len-1] != '\\0' -> error\n  174 |             if name.is_empty() || name[name_len - 1] != 0 {\n  175 |                 return Err(io::Error::new(\n  176 |                     io::ErrorKind::InvalidData,\n  177 |                     \"invalid xattr name: missing trailing NUL\",\n  178 |                 ));\n  179 |             }\n  180 | \n  181 |             // Strip the NUL terminator for internal storage\n  182 |             name.truncate(name_len - 1);\n  183 | \n  184 |             // Read value or checksum bytes from the wire before any filtering,\n  185 |             // since we must consume the data regardless of whether we keep the entry.\n  186 |             let datum_bytes = {\n  187 |                 let mut buf = vec![0u8; dget_len];\n  188 |                 reader.read_exact(&mut buf)?;\n  189 |                 buf\n  190 |             };","lines":32}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`ModernNdxCodec::read_ndx` / `NdxState::read_ndx` reconstruct the index with plain\n`prev_val + diff` on attacker-controlled `i32` values. After a peer sends the\n4-byte extended form, `prev_positive`/`prev_negative` can be set to a value near\n`i32::MAX`; a following 1-byte or 2-byte diff makes `prev_val + diff` overflow\n`i32`. In debug builds this panics (arithmetic overflow); in release builds it\nwraps (matching upstream's `int32` semantics, so functionally tolerable but still\nan unintended panic surface in any overflow-checked build, including tests/fuzzers).","fix":"Use `wrapping_add` to make the int32 wraparound explicit and panic-free in all\nbuild profiles: `let num = prev_val.wrapping_add(diff);`. This matches upstream\nrsync's documented reliance on 32-bit wraparound while removing the debug-build\npanic.","locations":[{"ref":"crates/protocol/src/codec/ndx/codec.rs:239-257","code":"  239 |         let num = if b[0] == 0xFE {\n  240 |             // Extended encoding\n  241 |             // Upstream io.c:2305-2314\n  242 |             reader.read_exact(&mut b[..1])?;\n  243 |             if b[0] & 0x80 != 0 {\n  244 |                 // 4-byte full value\n  245 |                 // Upstream io.c:2307-2311\n  246 |                 let high = (b[0] & !0x80) as i32;\n  247 |                 reader.read_exact(&mut b[..3])?;\n  248 |                 (high << 24) | (b[0] as i32) | ((b[1] as i32) << 8) | ((b[2] as i32) << 16)\n  249 |             } else {\n  250 |                 reader.read_exact(&mut b[1..2])?;\n  251 |                 let diff = ((b[0] as i32) << 8) | (b[1] as i32);\n  252 |                 prev_val + diff\n  253 |             }\n  254 |         } else {\n  255 |             let diff = b[0] as i32;\n  256 |             prev_val + diff\n  257 |         };","lines":19},{"ref":"crates/protocol/src/codec/ndx/state.rs:116-138","code":"  116 |         let num = if b[0] == 0xFE {\n  117 |             reader.read_exact(&mut b[..1])?;\n  118 |             if b[0] & 0x80 != 0 {\n  119 |                 let high = (b[0] & !0x80) as i32;\n  120 |                 reader.read_exact(&mut b[..3])?;\n  121 |                 (high << 24) | (b[0] as i32) | ((b[1] as i32) << 8) | ((b[2] as i32) << 16)\n  122 |             } else {\n  123 |                 reader.read_exact(&mut b[1..2])?;\n  124 |                 let diff = ((b[0] as i32) << 8) | (b[1] as i32);\n  125 |                 prev_val + diff\n  126 |             }\n  127 |         } else {\n  128 |             let diff = b[0] as i32;\n  129 |             prev_val + diff\n  130 |         };\n  131 | \n  132 |         if is_negative {\n  133 |             self.prev_negative = num;\n  134 |         } else {\n  135 |             self.prev_positive = num;\n  136 |         }\n  137 | \n  138 |         if is_negative { Ok(-num) } else { Ok(num) }","lines":23}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Integer underflow on attacker-controlled hardlink device number (protocol 28-29).\n`read_hardlink_dev_ino` reads `raw_dev` from the wire via `read_longint` (an i64,\nfully attacker-controlled) and computes `let dev = raw_dev - 1;` to undo upstream's\n\"dev + 1\" encoding. If the sender sends `raw_dev == i64::MIN`, the subtraction\noverflows: it panics in debug builds and wraps to `i64::MAX` in release builds.\nReachable when preserve_hard_links is on, protocol is 28-29, the entry is a\nnon-directory with XMIT_HLINKED set and without XMIT_SAME_DEV_pre30.","fix":"Use `raw_dev.wrapping_sub(1)` or `raw_dev.checked_sub(1)` (rejecting the i64::MIN case), matching upstream which performs the subtraction in C wraparound semantics. wrapping_sub preserves the encoding round-trip without a panic.","locations":[{"ref":"crates/protocol/src/flist/read/extras.rs:216-224","code":"  216 |         let dev = if flags.same_dev_pre30() {\n  217 |             self.state.prev_hardlink_dev()\n  218 |         } else {\n  219 |             let raw_dev = crate::read_longint(reader)?;\n  220 |             // Upstream stores dev + 1, so subtract 1\n  221 |             let dev = raw_dev - 1;\n  222 |             self.state.update_hardlink_dev(dev);\n  223 |             dev\n  224 |         };","lines":9}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`AsyncRateLimiter::consume` computes the sleep in `u128` nanoseconds but then\ncasts to `u64` (`Duration::from_nanos(sleep_nanos as u64)`). For a very large\nsingle request (`deficit` near `u64::MAX`) at a low rate, `sleep_nanos` exceeds\n`u64::MAX` and the cast truncates (wraps), producing a far-too-short sleep that\ndefeats the rate limit for that call. The token replenish path is similarly\nclamped only via `.min(u64::MAX)` for `earned`, but the sleep duration has no\nsaturating clamp.","fix":"Saturate before the cast: `let sleep_nanos = u64::try_from(sleep_nanos).unwrap_or(u64::MAX);`\nthen `Duration::from_nanos(sleep_nanos)`.","locations":[{"ref":"crates/bandwidth/src/async_limiter.rs:88-91","code":"   88 |         let sleep_nanos = (deficit as u128) * 1_000_000_000 / (self.rate.get() as u128);\n   89 |         let sleep_duration = Duration::from_nanos(sleep_nanos as u64);\n   90 | \n   91 |         tokio::time::sleep(sleep_duration).await;","lines":4}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`FileEntry::write_to` truncates the `i64` `mtime` to `i32`\n(`write_i32(writer, self.mtime as i32)`) and `read_from` sign-extends it back\nto `i64`. Any modification time outside the signed-32-bit range (after\n2038-01-19 or before 1901) is silently corrupted on round-trip. The type is\ndocumented as an internal/local encoding (not upstream-compatible), so impact\nis limited, but the truncation is a latent data-loss bug if this encoding is\never used for real metadata.","fix":"Serialize the full `i64` mtime with `write_u64`/`read_u64` (or `write_i64`),\nmatching the `size` field which already uses 64-bit width.","locations":[{"ref":"crates/batch/src/format/file_entry.rs:53-54","code":"   53 |         write_u64(writer, self.size)?;\n   54 |         write_i32(writer, self.mtime as i32)?;","lines":2},{"ref":"crates/batch/src/format/file_entry.rs:77-78","code":"   77 |         let size = read_u64(reader)?;\n   78 |         let mtime = read_i32(reader)? as i64;","lines":2}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In `start_compressor` the adaptive controller's recommended level (an i32) is converted with `recommended as u8`. The `== 0` case is handled, but a negative or >255 recommendation would silently wrap to an unexpected u8 and be wrapped in `CompressionLevel::Precise`. The code relies entirely on the controller clamping to valid bounds; there is no defensive clamp at the cast site, so a future controller change (or a codec with a level outside 1..=255) would produce a wrong compression level rather than an error or a clean fallback.","fix":"Clamp `recommended` into the codec's valid range before the cast (e.g. `recommended.clamp(0, 9)` for zlib) or match on out-of-range values and fall back to `self.compression_level()`.","locations":[{"ref":"crates/engine/src/local_copy/context_impl/transfer.rs:11-24","code":"   11 |         let level = if let Some(ctrl) = &self.adaptive_level {\n   12 |             // Convert the adaptive strategy's recommended i32 level to a\n   13 |             // CompressionLevel. The controller clamps to codec-valid bounds.\n   14 |             let recommended = ctrl.current_level();\n   15 |             if recommended == 0 {\n   16 |                 CompressionLevel::None\n   17 |             } else if let Some(nz) = std::num::NonZeroU8::new(recommended as u8) {\n   18 |                 CompressionLevel::Precise(nz)\n   19 |             } else {\n   20 |                 self.compression_level()\n   21 |             }\n   22 |         } else {\n   23 |             self.compression_level()\n   24 |         };","lines":14}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`read_all_batched` computes `(file_size - offset + buf_size - 1) / buf_size` and\n`offset += batch_count * buf_size` using `usize` arithmetic with no checked ops.\n`batch_count * buf_size` is bounded by the config so the increment is fine in\npractice, but `file_size - offset + buf_size - 1` adds `buf_size - 1` to a value\nthat may already be near `usize::MAX` on a 32-bit target with a huge file_size\ncast from u64; the file_size is `self.size as usize`, which already truncates a\n>4 GiB file on 32-bit Windows, leading to a short read rather than an error.","fix":"On 32-bit targets guard `self.size as usize` truncation (reject or chunk files\nlarger than `usize::MAX`), and use `div_ceil` / checked arithmetic for the\nbatch-count and offset math.","locations":[{"ref":"crates/fast_io/src/iocp/file_reader.rs:165-180","code":"  165 |     pub fn read_all_batched(&mut self) -> io::Result<Vec<u8>> {\n  166 |         let file_size = self.size as usize;\n  167 |         if file_size == 0 {\n  168 |             return Ok(Vec::new());\n  169 |         }\n  170 | \n  171 |         let mut result = vec![0u8; file_size];\n  172 |         let buf_size = self.config.buffer_size;\n  173 |         let max_concurrent = self.config.concurrent_ops as usize;\n  174 |         let mut offset: usize = 0;\n  175 | \n  176 |         while offset < file_size {\n  177 |             let batch_count = std::cmp::min(\n  178 |                 max_concurrent,\n  179 |                 (file_size - offset + buf_size - 1) / buf_size,\n  180 |             );","lines":16}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`recv_fd_to_file` truncates the `u64` length to `usize` when calling\n`try_splice_to_file(source_fd, dest_fd, length as usize)`. On a 32-bit target a\n`length >= 4 GiB` silently wraps to a much smaller transfer; the splice path then\nreports far fewer bytes than requested and the loop in the high-level caller may treat\nthe short result as EOF. The fallback `copy_fd_to_fd` correctly keeps the `u64`, so\nonly the splice fast path is affected.","fix":"Clamp per call instead of truncating: pass `length.min(usize::MAX as u64) as usize`\nand loop on the splice path until the full u64 length is drained, or document/guard\nthat `recv_fd_to_file` is 64-bit-only.","locations":[{"ref":"crates/fast_io/src/splice/syscalls.rs:330-343","code":"  330 | #[cfg(target_os = \"linux\")]\n  331 | pub fn recv_fd_to_file(\n  332 |     source_fd: std::os::fd::RawFd,\n  333 |     dest_fd: std::os::fd::RawFd,\n  334 |     length: u64,\n  335 | ) -> std::io::Result<u64> {\n  336 |     if length >= SPLICE_THRESHOLD {\n  337 |         if let Ok(n) = try_splice_to_file(source_fd, dest_fd, length as usize) {\n  338 |             return Ok(n as u64);\n  339 |         }\n  340 |         // Fall through to read/write fallback\n  341 |     }\n  342 |     copy_fd_to_fd(source_fd, dest_fd, length)\n  343 | }","lines":14}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`Nfs4Acl::from_bytes` computes `offset + who_len` where `who_len` is an attacker/\nfilesystem-controlled `u32` widened to `usize`. On 32-bit targets this addition can\nwrap, defeating the `offset + who_len > data.len()` truncation check and causing the\nsubsequent `&data[offset..offset + who_len]` slice to panic (or, in the worst case,\nread past the validated bound). The data originates from the `system.nfs4_acl` xattr,\nwhich on an untrusted/NFS-mounted filesystem is not fully trusted input.","fix":"Use checked arithmetic for the bounds test, e.g.\n`offset.checked_add(who_len).map_or(true, |end| end > data.len())` returning the\ntruncated-ACE error, before slicing.","locations":[{"ref":"crates/metadata/src/nfsv4_acl.rs:373-390","code":"  373 |             let who_len = u32::from_be_bytes(\n  374 |                 data[offset..offset + 4]\n  375 |                     .try_into()\n  376 |                     .map_err(|_| io::Error::new(io::ErrorKind::InvalidData, \"truncated ACE\"))?,\n  377 |             ) as usize;\n  378 |             offset += 4;\n  379 | \n  380 |             if offset + who_len > data.len() {\n  381 |                 return Err(io::Error::new(\n  382 |                     io::ErrorKind::InvalidData,\n  383 |                     \"truncated ACE who field\",\n  384 |                 ));\n  385 |             }\n  386 | \n  387 |             let who = std::str::from_utf8(&data[offset..offset + who_len])\n  388 |                 .map_err(|_| io::Error::new(io::ErrorKind::InvalidData, \"invalid UTF-8 in ACE\"))?\n  389 |                 .to_owned();\n  390 |             offset += who_len;","lines":18}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`decode_symlink_target` casts the wire length via `read_varint30_int(...)? as\nusize`. A negative `i32` length (e.g. -1) becomes `usize::MAX`. The guard\n`if len > MAX_SYMLINK_TARGET_LEN` does catch this (usize::MAX > 4096) and returns\nan error, so there is no allocation/panic here. Flagged only as defense-in-depth /\nconsistency: unlike `decode_name`, this path is safe today purely because the cap\ncheck happens to reject the huge value. A reviewer changing the cap to a\n`saturating`/relative form could reintroduce a vulnerability.","fix":"Reject negative lengths explicitly before the `as usize` cast (read into i32,\ncheck `< 0`) so the safety does not depend on the magnitude relationship between\n`usize::MAX` and the cap constant.","locations":[{"ref":"crates/protocol/src/wire/file_entry_decode/symlink.rs:28-39","code":"   28 | pub fn decode_symlink_target<R: Read>(reader: &mut R, protocol_version: u8) -> io::Result<Vec<u8>> {\n   29 |     let len = read_varint30_int(reader, protocol_version)? as usize;\n   30 |     if len > MAX_SYMLINK_TARGET_LEN {\n   31 |         return Err(io::Error::new(\n   32 |             io::ErrorKind::InvalidData,\n   33 |             format!(\"symlink target length {len} exceeds maximum {MAX_SYMLINK_TARGET_LEN}\"),\n   34 |         ));\n   35 |     }\n   36 |     let mut target = vec![0u8; len];\n   37 |     reader.read_exact(&mut target)?;\n   38 |     Ok(target)\n   39 | }","lines":12}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`recv_xattr_request` accumulates `let num = prior_req + rel;` where both\noperands are `i32` read from / derived from the wire, and `rel` is an\nunbounded `read_varint` value. A hostile sequence of large positive `rel`\ndeltas overflows the `i32` addition, panicking in debug builds. The\nsubsequent `(num - 1) as usize` can also underflow/produce a bogus index,\nthough the `idx < list.len()` guard prevents an out-of-bounds access.","fix":"Use `prior_req.checked_add(rel)` and reject overflow with `InvalidData`;\nlikewise validate `num >= 1` before computing the 0-based index.","locations":[{"ref":"crates/protocol/src/xattr/wire/decode.rs:216-235","code":"  216 | pub fn recv_xattr_request<R: Read>(reader: &mut R, list: &mut XattrList) -> io::Result<Vec<usize>> {\n  217 |     let mut indices = Vec::new();\n  218 |     let mut prior_req = 0i32;\n  219 | \n  220 |     loop {\n  221 |         let rel = read_varint(reader)?;\n  222 |         if rel == 0 {\n  223 |             // upstream: 0 terminates the request list\n  224 |             break;\n  225 |         }\n  226 | \n  227 |         // upstream: ndx = read_varint(f) + prior_req (1-based)\n  228 |         let num = prior_req + rel;\n  229 |         let idx = (num - 1) as usize;\n  230 |         if idx < list.len() {\n  231 |             list.mark_todo(idx);\n  232 |             indices.push(idx);\n  233 |         }\n  234 |         prior_req = num;\n  235 |     }","lines":20}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"`compute_duplicate_extents_params` computes `let end = src_offset + byte_count;`\nand `aligned_end = end.div_ceil(cluster_size) * cluster_size` with unchecked u64\narithmetic. For pathological caller inputs near `u64::MAX` this overflows and\npanics in debug / wraps in release, yielding a bogus (tiny) byte_count for the\nFSCTL. Reachable only via `try_refs_reflink_range` with attacker/caller-supplied\noffsets, which are normally cluster-bounded file offsets, so impact is minimal.","fix":"Use `checked_add` / `saturating` arithmetic for `end` and the round-up, and\nreturn `io::ErrorKind::InvalidInput` on overflow rather than panicking/wrapping.","locations":[{"ref":"crates/fast_io/src/platform_copy/dispatch.rs:752-770","code":"  752 | pub(super) fn compute_duplicate_extents_params(\n  753 |     src_offset: u64,\n  754 |     dst_offset: u64,\n  755 |     byte_count: u64,\n  756 |     cluster_size: u64,\n  757 | ) -> DuplicateExtentsParams {\n  758 |     debug_assert!(cluster_size > 0, \"cluster_size must be positive\");\n  759 | \n  760 |     let aligned_src = (src_offset / cluster_size) * cluster_size;\n  761 |     let aligned_dst = (dst_offset / cluster_size) * cluster_size;\n  762 |     let end = src_offset + byte_count;\n  763 |     let aligned_end = end.div_ceil(cluster_size) * cluster_size;\n  764 | \n  765 |     DuplicateExtentsParams {\n  766 |         source_offset: aligned_src,\n  767 |         target_offset: aligned_dst,\n  768 |         byte_count: aligned_end - aligned_src,\n  769 |     }\n  770 | }","lines":19}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"`MmapStrategy::map_ptr` computes `let start = offset as usize; let end = start\n+ len;`. On a 32-bit target, `offset as usize` truncates a 64-bit offset to 32\nbits, so an offset above 4 GiB could wrap and index a wrong region of the\nmmap. The preceding bounds check at line 56 compares in u64\n(`offset.saturating_add(len as u64) > size`) and would reject out-of-range\noffsets, so this is only reachable if `size` itself exceeds usize on a 32-bit\nbuild (i.e. a >4 GiB mmap, which `MmapReader` could not create on 32-bit\nanyway). Practically unreachable on supported targets; flagged for\ncompleteness given the audit's off-by-one/offset focus.","fix":"Convert via `usize::try_from(offset)` and return `UnexpectedEof`/`InvalidData` on failure, making the truncation impossible by construction.","locations":[{"ref":"crates/transfer/src/map_file/mmap.rs:50-65","code":"   50 |     fn map_ptr(&mut self, offset: u64, len: usize) -> io::Result<&[u8]> {\n   51 |         if len == 0 {\n   52 |             return Ok(&[]);\n   53 |         }\n   54 | \n   55 |         let size = self.mmap.size();\n   56 |         if offset.saturating_add(len as u64) > size {\n   57 |             return Err(io::Error::new(\n   58 |                 io::ErrorKind::UnexpectedEof,\n   59 |                 \"requested range extends past end of file\",\n   60 |             ));\n   61 |         }\n   62 | \n   63 |         let start = offset as usize;\n   64 |         let end = start + len;\n   65 |         Ok(&self.mmap.as_slice()[start..end])","lines":16}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"Client-supplied `@RSYNCD: OPTION ...` lines are fed into `apply_daemon_param_overrides`,\nletting an unauthenticated/remote client mutate security-sensitive module settings.\n\nIn `handle_legacy_session` every `@RSYNCD: OPTION <text>` line the client sends is pushed\ninto `refused_options` (session_runtime.rs:256-260). That same Vec is passed as `options`\nto `respond_with_module_request` -> `process_approved_module`, where it is used for TWO\npurposes: refuse-list matching (intended), and `apply_daemon_param_overrides(options, &mut\ndefinition)` (transfer.rs:538-547), which mutates a per-connection copy of the module\ndefinition.\n\n`apply_daemon_param_overrides` accepts `read only`, `write only`, `use chroot`, `timeout`,\n`max connections`, `bwlimit`, `incoming/outgoing chmod`, `list`, `numeric ids`. A malicious\nclient connecting to a read-only, chrooted module can therefore send:\n  @RSYNCD: OPTION read only=false     -> module becomes writable (defeats read-only check at\n                                         transfer.rs:622)\n  @RSYNCD: OPTION use chroot=false    -> disables the chroot sandbox (privilege.rs apply_chroot\n                                         is skipped because module.use_chroot is now false)\nThese overrides are applied BEFORE authentication and before the read-only / chroot\nenforcement, so they take full effect. This is a remote write-access / sandbox-escape bypass.\n\n`--dparam` is an operator-only daemon CLI mechanism in upstream rsync; the `OPTION` protocol\nline only conveys client option NAMES to be checked against the refuse list. Conflating the\ntwo and letting client input drive `apply_daemon_param_overrides` is the defect.","fix":"Do not apply `apply_daemon_param_overrides` to client-supplied `OPTION` lines. Treat the\n`OPTION` list strictly as option names for refuse-list matching. If per-connection `--dparam`\noverrides are needed, source them only from the operator's daemon command line / config,\nnever from the network peer. At minimum, remove `use chroot`, `read only`, and `write only`\nfrom the set of dparam-overridable keys and stop passing the client list into\napply_daemon_param_overrides.","locations":[{"ref":"crates/daemon/src/daemon/sections/module_access/transfer.rs:536-552","code":"  536 |     let effective_module = {\n  537 |         let mut definition = module.definition.clone();\n  538 |         if !options.is_empty() {\n  539 |             match apply_daemon_param_overrides(options, &mut definition) {\n  540 |                 Ok(()) => {}\n  541 |                 Err(err) => {\n  542 |                     let payload = format!(\"@ERROR: invalid daemon param: {err}\");\n  543 |                     send_error_and_exit(ctx.reader.get_mut(), ctx.limiter, ctx.messages, &payload)?;\n  544 |                     return Ok(());\n  545 |                 }\n  546 |             }\n  547 |         }\n  548 |         let client_addr = ctx.peer_ip.to_string();\n  549 |         let client_host = ctx.effective_host().unwrap_or(&client_addr);\n  550 |         expand_module_vars(&mut definition, &client_addr, client_host);\n  551 |         ModuleRuntime::from(definition)\n  552 |     };","lines":17},{"ref":"crates/daemon/src/daemon/sections/session_runtime.rs:256-260","code":"  256 |             Ok(LegacyDaemonMessage::Other(payload)) => {\n  257 |                 if let Some(option) = parse_daemon_option(payload) {\n  258 |                     refused_options.push(option.to_owned());\n  259 |                     continue;\n  260 |                 }","lines":5},{"ref":"crates/daemon/src/daemon/sections/module_parsing.rs:544-647","code":"  544 | fn apply_daemon_param_overrides(\n  545 |     params: &[String],\n  546 |     module: &mut ModuleDefinition,\n  547 | ) -> Result<(), DaemonError> {\n  548 |     for param in params {\n  549 |         let (key_raw, value_raw) = param\n  550 |             .split_once('=')\n  551 |             .ok_or_else(|| config_error(format!(\"daemon param '{param}' is missing '='\")))?;\n  552 | \n  553 |         let key = key_raw.trim().to_ascii_lowercase();\n  554 |         let value = value_raw.trim();\n  555 | \n  556 |         match key.as_str() {\n  557 |             \"read only\" | \"read-only\" => {\n  558 |                 let parsed = parse_boolean_directive(value).ok_or_else(|| {\n  559 |                     config_error(format!(\"invalid boolean value '{value}' for 'read only'\"))\n  560 |                 })?;\n  561 |                 module.read_only = parsed;\n  562 |             }\n  563 |             \"write only\" | \"write-only\" => {\n  564 |                 let parsed = parse_boolean_directive(value).ok_or_else(|| {\n  565 |                     config_error(format!(\"invalid boolean value '{value}' for 'write only'\"))\n  566 |                 })?;\n  567 |                 module.write_only = parsed;\n  568 |             }\n  569 |             \"list\" => {\n  570 |                 let parsed = parse_boolean_directive(value).ok_or_else(|| {\n  571 |                     config_error(format!(\"invalid boolean value '{value}' for 'list'\"))\n  572 |                 })?;\n  573 |                 module.listable = parsed;\n  574 |             }\n  575 |             \"numeric ids\" | \"numeric-ids\" => {\n  576 |                 let parsed = parse_boolean_directive(value).ok_or_else(|| {\n  577 |                     config_error(format!(\n  578 |                         \"invalid boolean value '{value}' for 'numeric ids'\"\n  579 |                     ))\n  580 |                 })?;\n  581 |                 module.numeric_ids = parsed;\n  582 |             }\n  583 |             \"use chroot\" | \"use-chroot\" => {\n  584 |                 let parsed = parse_boolean_directive(value).ok_or_else(|| {\n  585 |                     config_error(format!(\n  586 |                         \"invalid boolean value '{value}' for 'use chroot'\"\n  587 |                     ))\n  588 |                 })?;\n  589 |                 module.use_chroot = parsed;\n  590 |             }\n  591 |             \"timeout\" => {\n  592 |                 let timeout = parse_timeout_seconds(value)\n  593 |                     .ok_or_else(|| config_error(format!(\"invalid timeout '{value}'\")))?;\n  594 |                 module.timeout = timeout;\n  595 |             }\n  596 |             \"max connections\" | \"max-connections\" => {\n  597 |                 let max = parse_max_connections_directive(value).ok_or_else(|| {\n  598 |                     config_error(format!(\"invalid max connections value '{value}'\"))\n  599 |                 })?;\n  600 |                 module.max_connections = max;\n  601 |             }\n  602 |             \"incoming chmod\" | \"incoming-chmod\" => {\n  603 |                 if value.is_empty() {\n  604 |                     return Err(config_error(\n  605 |                         \"'incoming chmod' dparam must not be empty\".to_owned(),\n  606 |                     ));\n  607 |                 }\n  608 |                 module.incoming_chmod = Some(value.to_owned());\n  609 |             }\n  610 |             \"outgoing chmod\" | \"outgoing-chmod\" => {\n  611 |                 if value.is_empty() {\n  612 |                     return Err(config_error(\n  613 |                         \"'outgoing chmod' dparam must not be empty\".to_owned(),\n  614 |                     ));\n  615 |                 }\n  616 |                 module.outgoing_chmod = Some(value.to_owned());\n  617 |             }\n  618 |             \"bwlimit\" => {\n  619 |                 if value.is_empty() {\n  620 |                     return Err(config_error(\n  621 |                         \"'bwlimit' dparam must not be empty\".to_owned(),\n  622 |                     ));\n  623 |                 }\n  624 |                 let components = parse_runtime_bwlimit(&OsString::from(value))?;\n  625 |                 module.bandwidth_limit = components.rate();\n  626 |                 module.bandwidth_burst = components.burst();\n  627 |                 module.bandwidth_burst_specified = components.burst_specified();\n  628 |                 module.bandwidth_limit_specified = true;\n  629 |                 module.bandwidth_limit_configured = true;\n  630 |             }\n  631 |             // Security-sensitive directives are not overridable via dparam.\n  632 |             \"hosts allow\" | \"hosts-allow\" | \"hosts deny\" | \"hosts-deny\" | \"auth users\"\n  633 |             | \"auth-users\" | \"secrets file\" | \"secrets-file\" | \"refuse options\"\n  634 |             | \"refuse-options\" | \"uid\" | \"gid\" => {\n  635 |                 return Err(config_error(format!(\n  636 |                     \"daemon param '{key_raw}' cannot be overridden via --dparam\"\n  637 |                 )));\n  638 |             }\n  639 |             _ => {\n  640 |                 // Silently ignore unrecognised directives, matching upstream\n  641 |                 // rsync's behaviour of skipping unknown per-module params.\n  642 |             }\n  643 |         }\n  644 |     }\n  645 | \n  646 |     Ok(())\n  647 | }","lines":104}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`--block-size` rejects valid suffixed values (e.g. `-B 1K`, `--block-size=128K`).\nThe early validation parses the value with `value.parse::<u64>()` and errors with\n\"must be a positive integer\" if it is not a bare decimal integer. However the actual\nb  in\nupstream rsync `--copy-unsafe-links` does NOT imply `--safe-links` - the two are\ndistinct (copy the referent of unsafe links vs. silently skip unsafe links). The bug\nmakes unsafe symlinks get filtered out instead of copied as their referents, the exact\nopposite of what `--copy-unsafe-links` requests.","fix":"Set `safe_links` from `--safe-links` only:\n`let safe_links = matches.get_flag(\"safe-links\");`\nDo not OR in `copy_unsafe_links_option == Some(true)`. The two flags are independent and\nalready forwarded separately to the engine.","locations":[{"ref":"crates/cli/src/frontend/arguments/parser/mod.rs:398-410","code":"  398 |     let copy_unsafe_links_option = if matches.get_flag(\"copy-unsafe-links\") {\n  399 |         Some(true)\n  400 |     } else if matches.get_flag(\"safe-links\") {\n  401 |         Some(false)\n  402 |     } else {\n  403 |         None\n  404 |     };\n  405 |     let keep_dirlinks = if matches.get_flag(\"keep-dirlinks\") {\n  406 |         Some(true)\n  407 |     } else {\n  408 |         None\n  409 |     };\n  410 |     let safe_links = matches.get_flag(\"safe-links\") || copy_unsafe_links_option == Some(true);","lines":13}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Remote-to-remote (proxy) transfers abort after 30 seconds of wall-clock time, even when the\ntransfer is progressing normally. `run_bidirectional_relay` spawns two relay threads that each run\n`relay_data` until the underlying stream reaches EOF, and they only report their result on an mpsc\nchannel when that loop finishes. The main thread then waits for the result with\n`s2d_rx.recv_timeout(RELAY_THREAD_TIMEOUT)` where `RELAY_THREAD_TIMEOUT = Duration::from_secs(30)`.\nFor any proxy transfer whose total duration exceeds 30 seconds (i.e. any non-trivial amount of\ndata), the `recv_timeout` fires `RecvTimeoutError::Timeout`, the code sets the shutdown flag and\nreturns \"source->dest relay thread timed out\" with exit code 23, killing a perfectly healthy\ntransfer mid-stream. The constant is meant to bound the *post-completion* drain, but it is applied\nto the entire transfer because the threads do not signal until completion.","fix":"Do not bound the whole transfer with a fixed timeout. Use blocking `recv()` (or `join` the thread\nhandles) so the relay runs to completion, and only apply a short drain timeout after one direction\nhas already signalled EOF. Alternatively join the threads directly and rely on the per-stream I/O\ntimeouts already configured on the SSH connections.","locations":[{"ref":"crates/core/src/client/remote/remote_to_remote.rs:221-293","code":"  221 | /// Timeout for waiting on relay threads to complete after the transfer is done.\n  222 | const RELAY_THREAD_TIMEOUT: Duration = Duration::from_secs(30);\n  223 | \n  224 | /// Runs bidirectional relay between two SSH connections using threads.\n  225 | ///\n  226 | /// Spawns two threads for deadlock-free bidirectional relay:\n  227 | /// - Thread 1: source stdout → destination stdin (file data, protocol messages)\n  228 | /// - Thread 2: destination stdout → source stdin (checksums, acks)\n  229 | ///\n  230 | /// Both threads run concurrently until EOF or error. This mirrors upstream rsync's\n  231 | /// approach of using non-blocking I/O for proxy transfers.\n  232 | ///\n  233 | /// # Arguments\n  234 | ///\n  235 | /// * `source` - SSH connection to the source host (sender/generator)\n  236 | /// * `dest` - SSH connection to the destination host (receiver)\n  237 | ///\n  238 | /// # Returns\n  239 | ///\n  240 | /// Statistics on bytes relayed in each direction on success.\n  241 | fn run_bidirectional_relay(\n  242 |     source: SshConnection,\n  243 |     dest: SshConnection,\n  244 | ) -> Result<ProxyStats, ClientError> {\n  245 |     let (source_reader, source_writer, source_handle) = source.split().map_err(|e| {\n  246 |         invalid_argument_error(&format!(\"failed to split source connection: {e}\"), 23)\n  247 |     })?;\n  248 |     let (dest_reader, dest_writer, dest_handle) = dest.split().map_err(|e| {\n  249 |         invalid_argument_error(&format!(\"failed to split destination connection: {e}\"), 23)\n  250 |     })?;\n  251 | \n  252 |     let shutdown = Arc::new(AtomicBool::new(false));\n  253 | \n  254 |     let (s2d_tx, s2d_rx) = mpsc::channel();\n  255 |     let (d2s_tx, d2s_rx) = mpsc::channel();\n  256 | \n  257 |     let shutdown_s2d = Arc::clone(&shutdown);\n  258 |     thread::spawn(move || {\n  259 |         let result =\n  260 |             run_relay_with_panic_guard(source_reader, dest_writer, shutdown_s2d, \"source→dest\");\n  261 |         let _ = s2d_tx.send(result);\n  262 |     });\n  263 | \n  264 |     let shutdown_d2s = Arc::clone(&shutdown);\n  265 |     thread::spawn(move || {\n  266 |         let result =\n  267 |             run_relay_with_panic_guard(dest_reader, source_writer, shutdown_d2s, \"dest→source\");\n  268 |         let _ = d2s_tx.send(result);\n  269 |     });\n  270 | \n  271 |     let s2d_result = s2d_rx\n  272 |         .recv_timeout(RELAY_THREAD_TIMEOUT)\n  273 |         .map_err(|e| match e {\n  274 |             mpsc::RecvTimeoutError::Timeout => {\n  275 |                 shutdown.store(true, Ordering::SeqCst);\n  276 |                 invalid_argument_error(\"source→dest relay thread timed out\", 23)\n  277 |             }\n  278 |             mpsc::RecvTimeoutError::Disconnected => {\n  279 |                 invalid_argument_error(\"source→dest relay thread terminated unexpectedly\", 23)\n  280 |             }\n  281 |         })??;\n  282 | \n  283 |     let d2s_result = d2s_rx\n  284 |         .recv_timeout(RELAY_THREAD_TIMEOUT)\n  285 |         .map_err(|e| match e {\n  286 |             mpsc::RecvTimeoutError::Timeout => {\n  287 |                 shutdown.store(true, Ordering::SeqCst);\n  288 |                 invalid_argument_error(\"dest→source relay thread timed out\", 23)\n  289 |             }\n  290 |             mpsc::RecvTimeoutError::Disconnected => {\n  291 |                 invalid_argument_error(\"dest→source relay thread terminated unexpectedly\", 23)\n  292 |             }\n  293 |         })??;","lines":73}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Async sparse copy truncates files that end in a zero run. In\n`copy_file_with_progress`, a chunk detected as all-zeros is handled by\nseeking the destination writer forward (`SeekFrom::Current(n)`) instead of\nwriting. After the read loop, the code only `flush`es and never extends the\nfile to `total_bytes`. On a regular file, seeking past the current end\nwithout a subsequent write does NOT grow the file, so if the source's final\nchunk(s) are all zeros, the destination ends up shorter than the source\n(the trailing hole is lost). The existing `test_sparse_detection` masks this\nbecause its payload ends in a non-zero \"TAIL\" marker. rsync semantics require\nthe output file to match the source length. Fix: after the loop, when sparse\ndetection is enabled, `set_len(total_bytes)` (or seek-back-one and write a\nsingle zero byte) so a trailing hole materialises.","fix":"After the read loop (and before/after flush), when `self.sparse_detection`\nis on and `bytes_copied < total_bytes`-equivalent trailing seek occurred,\ncall `writer.get_mut().set_len(bytes_copied).await` (or, after flush, seek to\nend-1 and write a single `\\0`) so the destination length always equals the\nsource length even when it ends in a zero run.","locations":[{"ref":"crates/engine/src/async_io/copier.rs:141-177","code":"  141 |         loop {\n  142 |             let n = reader.read(&mut buffer).await.with_path(source)?;\n  143 | \n  144 |             if n == 0 {\n  145 |                 break;\n  146 |             }\n  147 | \n  148 |             let chunk = &buffer[..n];\n  149 | \n  150 |             if self.sparse_detection && SparseDetector::is_all_zeros(chunk) {\n  151 |                 writer\n  152 |                     .seek(SeekFrom::Current(n as i64))\n  153 |                     .await\n  154 |                     .with_path(destination)?;\n  155 |             } else {\n  156 |                 writer.write_all(chunk).await.with_path(destination)?;\n  157 |             }\n  158 | \n  159 |             bytes_copied += n as u64;\n  160 | \n  161 |             if last_progress.elapsed() >= Duration::from_millis(100) {\n  162 |                 progress(CopyProgress {\n  163 |                     bytes_copied,\n  164 |                     total_bytes,\n  165 |                     elapsed: start.elapsed(),\n  166 |                     source: source.to_path_buf(),\n  167 |                     destination: destination.to_path_buf(),\n  168 |                 });\n  169 |                 last_progress = Instant::now();\n  170 |             }\n  171 |         }\n  172 | \n  173 |         writer.flush().await.with_path(destination)?;\n  174 | \n  175 |         if self.fsync {\n  176 |             writer.get_mut().sync_all().await.with_path(destination)?;\n  177 |         }","lines":37}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`IocpReader::read_at` (and the batched `read_all_batched`) submit overlapped\n`ReadFile` against a handle opened with `FILE_FLAG_OVERLAPPED`, but the reader\nnever calls `SetFileCompletionNotificationModes(FILE_SKIP_COMPLETION_PORT_ON_SUCCESS)`\nthe way `IocpWriter::open_with_disposition` does. When `ReadFile` completes\nsynchronously and returns TRUE, Windows STILL queues a completion packet to the\nassociated completion port. `read_at` takes the inline `if success == TRUE`\nbranch and returns `Ok(n)` without draining that packet. The next `read_at` /\nbatched read then calls `GetQueuedCompletionStatus`, which dequeues the stale\ncompletion from the previous synchronous read instead of the current operation -\nreturning the wrong `transferred` count and copying the wrong buffer. This\ncorrupts read results whenever cached reads complete inline (the common case on\nwarm files). The disk_batch writer documents and handles exactly this (it always\ndrains even on synchronous TRUE); the reader does not.","fix":"Either call `SetFileCompletionNotificationModes(handle,\nFILE_SKIP_COMPLETION_PORT_ON_SUCCESS)` in `IocpReader::open` (matching the\nwriter), in which case the inline TRUE branch is correct and no packet is\nqueued; or, if the skip flag is not set, drain the queued completion via\n`GetQueuedCompletionStatus` even on synchronous TRUE before returning so the\nport never accumulates a stale packet.","locations":[{"ref":"crates/fast_io/src/iocp/file_reader.rs:39-85","code":"   39 |     pub fn open<P: AsRef<Path>>(path: P, config: &IocpConfig) -> io::Result<Self> {\n   40 |         let wide_path = to_wide_path(path.as_ref())?;\n   41 | \n   42 |         // SAFETY: CreateFileW with valid path and standard flags.\n   43 |         // FILE_FLAG_OVERLAPPED enables async I/O.\n   44 |         #[allow(unsafe_code)]\n   45 |         let handle = unsafe {\n   46 |             CreateFileW(\n   47 |                 wide_path.as_ptr(),\n   48 |                 FILE_GENERIC_READ,\n   49 |                 FILE_SHARE_READ,\n   50 |                 std::ptr::null(),\n   51 |                 OPEN_EXISTING,\n   52 |                 FILE_ATTRIBUTE_NORMAL | FILE_FLAG_OVERLAPPED,\n   53 |                 std::ptr::null_mut(),\n   54 |             )\n   55 |         };\n   56 | \n   57 |         if handle == windows_sys::Win32::Foundation::INVALID_HANDLE_VALUE {\n   58 |             return Err(io::Error::last_os_error());\n   59 |         }\n   60 | \n   61 |         let port = CompletionPort::new(1)?;\n   62 |         port.associate(handle, 0)?;\n   63 | \n   64 |         let size = {\n   65 |             // SAFETY: FromRawHandle borrows the handle; mem::forget below\n   66 |             // prevents File from closing it because Drop closes it manually.\n   67 |             #[allow(unsafe_code)]\n   68 |             let file = unsafe {\n   69 |                 use std::os::windows::io::FromRawHandle;\n   70 |                 File::from_raw_handle(handle as *mut std::ffi::c_void)\n   71 |             };\n   72 |             let metadata = file.metadata()?;\n   73 |             let len = metadata.len();\n   74 |             std::mem::forget(file);\n   75 |             len\n   76 |         };\n   77 | \n   78 |         Ok(Self {\n   79 |             handle,\n   80 |             port,\n   81 |             config: config.clone(),\n   82 |             size,\n   83 |             position: 0,\n   84 |         })\n   85 |     }","lines":47},{"ref":"crates/fast_io/src/iocp/file_reader.rs:113-119","code":"  113 |         if success == TRUE {\n  114 |             // ReadFile may complete synchronously even with FILE_FLAG_OVERLAPPED;\n  115 |             // when it does, no completion will be queued so handle it inline.\n  116 |             let n = bytes_read as usize;\n  117 |             buf[..n].copy_from_slice(&op.buffer[..n]);\n  118 |             return Ok(n);\n  119 |         }","lines":7},{"ref":"crates/fast_io/src/iocp/file_reader.rs:210-216","code":"  210 |                 if success != TRUE {\n  211 |                     let err = io::Error::last_os_error();\n  212 |                     if err.raw_os_error() != Some(997) {\n  213 |                         return Err(classify_overlapped_error(err, \"ReadFile(batched)\"));\n  214 |                     }\n  215 |                 }\n  216 |             }","lines":7}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`apply_permissions_from_entry` (the receiver/wire-entry permission path) silently\ndrops `--executability` (-E). The early-return guard at line 401 lets execution\ncontinue when only `options.executability()` is true, but the body then only acts\nwhen `options.permissions()` is true or `options.chmod()` is `Some`. With just\n`-E` set (no `-p`, no `--chmod`) neither branch runs, so the source's execute bits\nare never propagated to the destination. The `fs::Metadata`-based path\n(`apply_permissions_without_chmod`) handles `-E` correctly, so the network-receiver\npath diverges from the local-copy path and from upstream rsync, where\n`PRESERVE_EXECUTABILITY` adjusts the destination's `0o111` bits.","fix":"Add an executability branch to `apply_permissions_from_entry`: when\n`options.executability()` is set and `options.permissions()` is not, read the\ndestination's current mode (from `cached_meta` or a fresh stat), OR/AND the\n`0o111` bits according to `entry.permissions() & 0o111`, and chmod only if the\nresult differs - mirroring `apply_permissions_without_chmod`.","locations":[{"ref":"crates/metadata/src/apply/permissions.rs:391-452","code":"  391 | pub(super) fn apply_permissions_from_entry(\n  392 |     destination: &Path,\n  393 |     entry: &protocol::flist::FileEntry,\n  394 |     options: &MetadataOptions,\n  395 |     cached_meta: Option<&fs::Metadata>,\n  396 | ) -> Result<(), MetadataError> {\n  397 |     #[cfg(unix)]\n  398 |     {\n  399 |         use std::os::unix::fs::PermissionsExt;\n  400 | \n  401 |         if !options.permissions() && !options.executability() && options.chmod().is_none() {\n  402 |             return Ok(());\n  403 |         }\n  404 | \n  405 |         // Track whether the -p path actually changed permissions so the\n  406 |         // --chmod branch below knows if cached_meta is still valid.\n  407 |         let mut perms_changed = false;\n  408 | \n  409 |         if options.permissions() {\n  410 |             let mode = entry.permissions();\n  411 |             // upstream: rsync.c:set_file_attrs() - skips chmod when mode already matches\n  412 |             let needs_chmod = match cached_meta {\n  413 |                 Some(meta) => (meta.permissions().mode() & 0o7777) != (mode & 0o7777),\n  414 |                 None => true,\n  415 |             };\n  416 | \n  417 |             if needs_chmod {\n  418 |                 let permissions = PermissionsExt::from_mode(mode);\n  419 |                 fs::set_permissions(destination, permissions).map_err(|error| {\n  420 |                     MetadataError::new(\"preserve permissions\", destination, error)\n  421 |                 })?;\n  422 |                 perms_changed = true;\n  423 |             }\n  424 |         }\n  425 | \n  426 |         if let Some(chmod) = options.chmod() {\n  427 |             // upstream: rsync.c:set_file_attrs() - read current mode before\n  428 |             // applying chmod modifiers. When -p changed permissions above we\n  429 |             // must re-stat; when -p matched (no change) we reuse cached_meta\n  430 |             // to avoid a redundant stat syscall on the no-change path.\n  431 |             let fresh_meta;\n  432 |             let current_meta = if options.permissions() && perms_changed {\n  433 |                 fresh_meta = fs::metadata(destination)\n  434 |                     .map_err(|error| MetadataError::new(\"read permissions\", destination, error))?;\n  435 |                 &fresh_meta\n  436 |             } else if let Some(meta) = cached_meta {\n  437 |                 meta\n  438 |             } else {\n  439 |                 fresh_meta = fs::metadata(destination)\n  440 |                     .map_err(|error| MetadataError::new(\"read permissions\", destination, error))?;\n  441 |                 &fresh_meta\n  442 |             };\n  443 |             let current_mode = current_meta.permissions().mode();\n  444 | \n  445 |             let new_mode = chmod.apply(current_mode, current_meta.file_type());\n  446 |             if new_mode != current_mode {\n  447 |                 let new_permissions = PermissionsExt::from_mode(new_mode);\n  448 |                 fs::set_permissions(destination, new_permissions)\n  449 |                     .map_err(|error| MetadataError::new(\"apply chmod\", destination, error))?;\n  450 |             }\n  451 |         }\n  452 |     }","lines":62}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`BatchMetadataContext::apply_ownership_cached` ignores ownership overrides, user/group\nname mappings, and fake-super, unlike every other ownership path in the crate\n(`set_owner_like`, `apply_ownership_from_entry`). It only checks `options.owner()` /\n`options.group()` and feeds the raw source uid/gid through `map_uid`/`map_gid`. As a\nresult, when this batch path is used with `--usermap`/`--groupmap`,\n`--chown`/`--owner-override`, or `--fake-super`, those options are silently dropped:\nfiles get the unmapped numeric ids (or a real chown is attempted instead of the\nfake-super xattr). The skip-check `ownership_matches(desired_uid, desired_gid, ...)`\nalso compares against the *unmapped* desired ids, so it can both skip a needed chown\nand perform a wrong one.","fix":"Route batch ownership through the same resolution used by `resolve_ownership`\n(overrides -> mapping -> numeric-id rule) and honor `fake_super_enabled()`, or have\n`BatchMetadataContext::apply_file_metadata` delegate to\n`apply/ownership::set_owner_like` so a single code path handles all ownership\nsemantics. At minimum, document that the batch API does not support mappings/overrides\n/fake-super and reject those option combinations.","locations":[{"ref":"crates/metadata/src/apply_batch.rs:79-134","code":"   79 |     #[cfg(unix)]\n   80 |     fn apply_ownership_cached(\n   81 |         &mut self,\n   82 |         destination: &Path,\n   83 |         metadata: &fs::Metadata,\n   84 |     ) -> Result<(), MetadataError> {\n   85 |         if !self.options.owner() && !self.options.group() {\n   86 |             return Ok(());\n   87 |         }\n   88 | \n   89 |         let desired_uid = if self.options.owner() {\n   90 |             metadata.uid()\n   91 |         } else {\n   92 | correct (SIMD parity is tested), but the CLI\noverride is broken for this path - defeating its intended use for debugging,\nreproducibility, and working around faulty SIMD on a given host.","fix":"Mirror the MD5 dispatcher: import `crate::cpu_features::{SimdFeature,\nfeature_allowed}` and add `if !feature_allowed(SimdFeature::Avx512) { return\nfalse; }` (and the Avx2/Sse2/Neon analogues) at the top of each `has_*` helper\nso MD4 batch dispatch honours the same override as every other dispatcher.","locations":[{"ref":"crates/checksums/src/simd_batch/md4/mod.rs:92-145","code":"   92 |     fn has_avx512() -> bool {\n   93 |         #[cfg(target_arch = \"x86_64\")]\n   94 |         {\n   95 |             is_x86_feature_detected!(\"avx512f\") && is_x86_feature_detected!(\"avx512bw\")\n   96 |         }\n   97 |         #[cfg(not(target_arch = \"x86_64\"))]\n   98 |         {\n   99 |             false\n  100 |         }\n  101 |     }\n  102 | \n  103 |     fn has_avx2() -> bool {\n  104 |         #[cfg(target_arch = \"x86_64\")]\n  105 |         {\n  106 |             is_x86_feature_detected!(\"avx2\")\n  107 |         }\n  108 |         #[cfg(not(target_arch = \"x86_64\"))]\n  109 |         {\n  110 |             false\n  111 |         }\n  112 |     }\n  113 | \n  114 |     fn has_sse2() -> bool {\n  115 |         #[cfg(target_arch = \"x86_64\")]\n  116 |         {\n  117 |             true\n  118 |         }\n  119 |         #[cfg(not(target_arch = \"x86_64\"))]\n  120 |         {\n  121 |             false\n  122 |         }\n  123 |     }\n  124 | \n  125 |     fn has_neon() -> bool {\n  126 |         #[cfg(target_arch = \"aarch64\")]\n  127 |         {\n  128 |             true\n  129 |         }\n  130 |         #[cfg(not(target_arch = \"aarch64\"))]\n  131 |         {\n  132 |             false\n  133 |         }\n  134 |     }\n  135 | \n  136 |     fn has_wasm_simd() -> bool {\n  137 |         #[cfg(all(target_arch = \"wasm32\", target_feature = \"simd128\"))]\n  138 |         {\n  139 |             true\n  140 |         }\n  141 |         #[cfg(not(all(target_arch = \"wasm32\", target_feature = \"simd128\")))]\n  142 |         {\n  143 |             false\n  144 |         }\n  145 |     }","lines":54}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Embedded-SSH transfers double-escape remote path arguments. `run_embedded_push` /\n`run_embedded_pull` call `RemoteInvocationBuilder::build_secluded`, which (when --protect-args is\noff, the default) routes through `build_args_without_program(..., escape_for_shell = true)` and\nbackslash-escapes shell metacharacters in the remote path via `shell_safe_filename_arg`. The\nresulting already-escaped OsString is then passed to `build_remote_command`, which runs every arg\nthrough `shell_escape` again, wrapping anything with special characters in single quotes. A path\nlike \"a b\" becomes backslash-escaped \"a<bs> b\" and is then single-quoted to \"'a<bs> b'\", which the\nremote shell expands to the literal \"a<bs> b\" (the backslash is preserved inside single quotes)\ninstead of \"a b\", so the remote file name is wrong. (<bs> denotes a literal backslash.)","fix":"Pick one escaping layer. For the embedded path, build the invocation args without shell escaping\n(use the stdin/secluded form or a non-escaping builder variant) and let `shell_escape` perform the\nsingle quoting; or skip `shell_escape` for args that the builder already escaped. Add a test with a\nremote path containing spaces/quotes asserting the final command string round-trips to the intended\nfilename.","locations":[{"ref":"crates/core/src/client/remote/embedded_ssh_transfer.rs:124-127","code":"  124 |     let (ssh_config, remote_path) = parse_ssh_url(remote_dest, config)?;\n  125 |     let invocation_builder = RemoteInvocationBuilder::new(config, RemoteRole::Sender);\n  126 |     let secluded = invocation_builder.build_secluded(&[&remote_path]);\n  127 | ","lines":4},{"ref":"crates/core/src/client/remote/embedded_ssh_transfer.rs:394-410","code":"  394 | fn build_remote_command(args: &[OsString]) -> String {\n  395 |     args.iter()\n  396 |         .map(|a| shell_escape(a.to_string_lossy().as_ref()))\n  397 |         .collect::<Vec<_>>()\n  398 |         .join(\" \")\n  399 | }\n  400 | \n  401 | /// Shell-escapes a string for safe inclusion in a remote command.\n  402 | fn shell_escape(s: &str) -> String {\n  403 |     if s.chars()\n  404 |         .all(|c| c.is_ascii_alphanumeric() || \"-_./=\".contains(c))\n  405 |     {\n  406 |         s.to_owned()\n  407 |     } else {\n  408 |         format!(\"'{}'\", s.replace('\\'', \"'\\\\''\"))\n  409 |     }\n  410 | }","lines":17}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The daemon-mode compact flag string (`build_server_flag_string`) and the SSH-mode compact flag\nstring (`RemoteInvocationBuilder::build_flag_string`) have diverged. The daemon builder never emits\nseveral transfer flags that the SSH builder does, and the daemon long-form argument builder\n(`build_full_daemon_args`) does not compensate with long-form equivalents either. Missing over the\ndaemon path: 'k' (--copy-dirlinks), 'K' (--keep-dirlinks), 'E' (--executability when --perms is\noff), 'y' (--fuzzy), and 'm' (--prune-empty-dirs). As a result, options like --fuzzy,\n--prune-empty-dirs, --copy-dirlinks, --keep-dirlinks and standalone --executability are silently\ndropped for rsync:// daemon transfers while working correctly for SSH transfers.","fix":"Reconcile the two flag builders. Either share a single flag-string generator between the SSH and\ndaemon paths, or add the missing flags ('k','K','E','y','m') to `build_server_flag_string` (and any\nthat upstream sends as long-form, add to `build_full_daemon_args`). Add tests asserting parity for\nfuzzy, prune-empty-dirs, copy-dirlinks, keep-dirlinks and executability across both transports.","locations":[{"ref":"crates/core/src/client/remote/flags.rs:24-128","code":"   24 | pub(crate) fn build_server_flag_string(config: &ClientConfig) -> String {\n   25 |     let mut flags = String::from(\"-\");\n   26 | \n   27 |     // upstream: options.c:2169-2173 - --files-from disables recursion and\n   28 |     // enables xfer_dirs. options.c:2188 - --files-from implies --relative.\n   29 |     let files_from_active = config.files_from().is_active();\n   30 |     let effective_recursive = config.recursive() && !files_from_active;\n   31 |     let effective_relative = config.relative_paths() || files_from_active;\n   32 | \n   33 |     if config.links() {\n   34 |         flags.push('l');\n   35 |     }\n   36 |     if config.preserve_owner() {\n   37 |         flags.push('o');\n   38 |     }\n   39 |     if config.preserve_group() {\n   40 |         flags.push('g');\n   41 |     }\n   42 |     if config.preserve_devices() || config.preserve_specials() {\n   43 |         flags.push('D');\n   44 |     }\n   45 |     if config.preserve_times() {\n   46 |         flags.push('t');\n   47 |     }\n   48 |     if config.preserve_atimes() {\n   49 |         flags.push('U');\n   50 |     }\n   51 |     if config.preserve_permissions() {\n   52 |         flags.push('p');\n   53 |     }\n   54 |     if effective_recursive {\n   55 |         flags.push('r');\n   56 |     }\n   57 |     // upstream: options.c:2704 - 'z' is only sent when the compression\n   58 |     // algorithm is the default (no explicit --compress-choice). For\n   59 |     // explicitly chosen algorithms (lz4, zstd), the 'z' flag is omitted\n   60 |     // and --compress-choice=ALGO is sent as a long-form arg instead.\n   61 |     if config.compress()\n   62 |         && config.compression_algorithm()\n   63 |             == compress::algorithm::CompressionAlgorithm::default_algorithm()\n   64 |     {\n   65 |         flags.push('z');\n   66 |     }\n   67 |     if config.checksum() {\n   68 |         flags.push('c')
