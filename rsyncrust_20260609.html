<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"`collect_paths_recursive` (used by `collect_paths_then_metadata_parallel`,\n`collect_lazy_parallel`, `collect_with_batched_stats`, and\n`collect_paths_chunked_parallel`) recurses into symlinked directories whenever\n`follow_symlinks` is true, but unlike the sequential `FileListWalker` it keeps\nno `visited`/canonicalized set and performs no loop detection. A symlink cycle\n(e.g. `a -> .` or two dirs linking to each other) under `follow_symlinks=true`\ncauses unbounded recursion and a stack-overflow abort. The sequential walker\nguards against exactly this via `fs::canonicalize` + a `visited` HashSet\n(file_list_walker.rs:81-87), so the parallel paths are an inconsistent and\ncrash-prone alternative.","fix":"Track canonicalized directory paths in a `HashSet` (as `FileListWalker` does)\nand skip recursion into an already-visited directory; or only descend into\nreal directories and refuse to follow directory symlinks without cycle\ndetection. Mirror the sequential walker's `push_directory` guard.","locations":[{"ref":"crates/flist/src/parallel.rs:417-453","code":"  417 | fn collect_paths_recursive(\n  418 |     root: &PathBuf,\n  419 |     current: &PathBuf,\n  420 |     follow_symlinks: bool,\n  421 | ) -> Vec<(PathBuf, PathBuf, usize, bool)> {\n  422 |     let mut paths = Vec::new();\n  423 |     let is_root = current == root;\n  424 | \n  425 |     let relative_path = if is_root {\n  426 |         PathBuf::new()\n  427 |     } else {\n  428 |         current.strip_prefix(root).unwrap_or(current).to_path_buf()\n  429 |     };\n  430 |     let depth = relative_path.components().count();\n  431 | \n  432 |     paths.push((current.clone(), relative_path, depth, is_root));\n  433 | \n  434 |     let should_recurse = if let Ok(metadata) = fs::symlink_metadata(current) {\n  435 |         metadata.is_dir() || (follow_symlinks && metadata.is_symlink())\n  436 |     } else {\n  437 |         false\n  438 |     };\n  439 | \n  440 |     if should_recurse {\n  441 |         if let Ok(entries) = fs::read_dir(current) {\n  442 |             let mut child_entries: Vec<_> = entries.filter_map(|e| e.ok()).collect();\n  443 |             crate::sort::sort_dir_entries(&mut child_entries);\n  444 | \n  445 |             for entry in child_entries {\n  446 |                 let child_path = entry.path();\n  447 |                 paths.extend(collect_paths_recursive(root, &child_path, follow_symlinks));\n  448 |             }\n  449 |         }\n  450 |     }\n  451 | \n  452 |     paths\n  453 | }","lines":37}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"Unbounded, attacker-controlled allocation when reading a file name.\n`read_name` reads `suffix_len` for XMIT_LONG_NAME via `codec.read_long_name_len`,\nwhich on protocol >= 30 returns `read_varint(...) as usize` and on protocol < 30\nreturns `i32::from_le_bytes(buf) as usize` (codec/protocol/{modern,legacy}.rs).\nNeither path bounds the value. `read_name` then does\n`Vec::with_capacity(same_len + suffix_len)` and `name.resize(start + suffix_len, 0)`\nwith that value. A malicious sender can supply a huge positive length (~2 GiB) to\nforce a giant allocation (DoS), or, on protocol < 30, a negative i32 (e.g.\n0xFFFFFFFF) which sign-extends to a near-`usize::MAX` value, making\n`Vec::with_capacity` panic with a capacity-overflow abort. Unlike the symlink-target\npath (extras.rs, bounded by MAX_SYMLINK_TARGET_LEN) and the prev_name buffer\n(state.rs, MAXPATHLEN = 4096), the received name length is never validated against\nMAXPATHLEN before allocation.","fix":"Reject suffix_len that is negative (when sourced from a fixed i32) or that exceeds a\nsane bound such as MAXPATHLEN (4096, the upstream lastname buffer size) before\nallocating: e.g. `if suffix_len > MAXPATHLEN { return Err(InvalidData) }`. Also bound\n`same_len + suffix_len` with `checked_add`. Upstream caps names at MAXPATHLEN.","locations":[{"ref":"crates/protocol/src/flist/read/name.rs:51-86","code":"   51 |         let suffix_len = if flags.long_name() {\n   52 |             self.codec.read_long_name_len(reader)?\n   53 |         } else {\n   54 |             let mut byte = [0u8; 1];\n   55 |             reader.read_exact(&mut byte)?;\n   56 |             byte[0] as usize\n   57 |         };\n   58 | \n   59 |         debug_log!(\n   60 |             Flist,\n   61 |             4,\n   62 |             \"read_name: same_len={} suffix_len={} long_name={}\",\n   63 |             same_len,\n   64 |             suffix_len,\n   65 |             flags.long_name()\n   66 |         );\n   67 | \n   68 |         if same_len > self.state.prev_name().len() {\n   69 |             return Err(io::Error::new(\n   70 |                 io::ErrorKind::InvalidData,\n   71 |                 format!(\n   72 |                     \"same_len {} exceeds previous name length {}\",\n   73 |                     same_len,\n   74 |                     self.state.prev_name().len()\n   75 |                 ),\n   76 |             ));\n   77 |         }\n   78 | \n   79 |         let mut name = Vec::with_capacity(same_len + suffix_len);\n   80 |         name.extend_from_slice(&self.state.prev_name()[..same_len]);\n   81 | \n   82 |         if suffix_len > 0 {\n   83 |             let start = name.len();\n   84 |             name.resize(start + suffix_len, 0);\n   85 |             reader.read_exact(&mut name[start..])?;\n   86 |         }","lines":36}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"`read_signature` pre-allocates `Vec::with_capacity(block_count as usize)` where\n`block_count` is read from the wire via `read_varint(reader)? as u32` and is fully\nattacker controlled (up to ~2^31). `SignatureBlock` is 32 bytes (u32 + u32 +\nVec<u8> header), so a block count near `i32::MAX` requests a ~64 GiB allocation up\nfront, before any block bytes are read. This aborts the process (allocation\nfailure) and is a trivial remote DoS: the peer only needs to send a few varint\nbytes. The per-iteration `read_exact` would naturally hit EOF, but the eager\n`with_capacity` happens first.","fix":"Do not pre-size from the wire-supplied count. Either cap the reservation\n(`Vec::with_capacity(block_count.min(SOME_SANE_CAP) as usize)`) as is done in\n`internal::read_delta`, or use `Vec::new()` and grow as blocks are read. Also\nreject obviously-impossible counts relative to the remaining input.","locations":[{"ref":"crates/protocol/src/wire/signature.rs:166-189","code":"  166 | pub fn read_signature<R: Read>(reader: &mut R) -> io::Result<(u32, u32, u8, Vec<SignatureBlock>)> {\n  167 |     let block_count = read_varint(reader)? as u32;\n  168 |     let block_length = read_varint(reader)? as u32;\n  169 |     let strong_sum_length = read_varint(reader)? as u8;\n  170 | \n  171 |     let mut blocks = Vec::with_capacity(block_count as usize);\n  172 | \n  173 |     for index in 0..block_count {\n  174 |         let mut rolling_sum_bytes = [0u8; 4];\n  175 |         reader.read_exact(&mut rolling_sum_bytes)?;\n  176 |         let rolling_sum = u32::from_le_bytes(rolling_sum_bytes);\n  177 | \n  178 |         let mut strong_sum = vec![0u8; strong_sum_length as usize];\n  179 |         reader.read_exact(&mut strong_sum)?;\n  180 | \n  181 |         blocks.push(SignatureBlock {\n  182 |             index,\n  183 |             rolling_sum,\n  184 |             strong_sum,\n  185 |         });\n  186 |     }\n  187 | \n  188 |     Ok((block_length, block_count, strong_sum_length, blocks))\n  189 | }","lines":24}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"`generate_script_with_args` indexes `original_args[0]` without checking that\nthe slice is non-empty. It is a public function (`pub fn`) taking\n`original_args: &[String]`; an empty slice (or a caller that drops argv[0])\npanics with an out-of-bounds index instead of returning a `BatchResult` error.\nThe sibling `find_destination` and the `args[1..]` slice handle emptiness, but\nthe program-name read at line 123 does not.","fix":"Guard against an empty slice: e.g. `let program = original_args.first().map(String::as_str).unwrap_or(\"oc-rsync\");`\nor return `BatchError::InvalidFormat` when `original_args.is_empty()`.","locations":[{"ref":"crates/batch/src/script.rs:109-123","code":"  109 | pub fn generate_script_with_args(\n  110 |     config: &BatchConfig,\n  111 |     original_args: &[String],\n  112 |     filter_rules: Option<&str>,\n  113 | ) -> BatchResult<()> {\n  114 |     let script_path = config.script_file_path();\n  115 |     let mut file = File::create(&script_path).map_err(|e| {\n  116 |         BatchError::Io(io::Error::new(\n  117 |             e.kind(),\n  118 |             format!(\"Failed to create script file '{script_path}': {e}\"),\n  119 |         ))\n  120 |     })?;\n  121 | \n  122 |     // upstream: batch.c:261 write_arg(raw_argv[0]) - binary name, no shebang\n  123 |     write!(file, \"{}\", original_args[0])?;","lines":15}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","description":"`recv_rsync_acl` computes `let ndx = ndx_plus_one - 1;` directly on the raw\n`i32` returned by `read_varint`. `read_varint` can return any `i32` including\n`i32::MIN` for hostile input, and `i32::MIN - 1` overflows, panicking in debug\nbuilds (and wrapping to `i32::MAX` in release, which then mis-classifies a\nliteral-data record as a huge cache-hit index). This path is reachable from\nuntrusted wire data via `recv_rsync_acl_cached` / `receive_acl_cached` during\nACL reception.","fix":"Use checked/wrapping-aware logic: read `ndx_plus_one`, and treat any value\n`<= 0` as the literal-data sentinel without subtracting first (e.g.\n`if ndx_plus_one <= 0 { ... literal ... } else { CacheHit((ndx_plus_one - 1) as u32) }`),\nor use `ndx_plus_one.checked_sub(1)` and reject `None`.","locations":[{"ref":"crates/protocol/src/acl/wire/recv.rs:74-79","code":"   74 |     let ndx_plus_one = read_varint(reader)?;\n   75 |     let ndx = ndx_plus_one - 1;\n   76 | \n   77 |     if ndx >= 0 {\n   78 |         return Ok(RecvAclResult::CacheHit(ndx as u32));\n   79 |     }","lines":6}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","description":"`Message::render_prefix` writes the program name, a space, the severity label, and \": \" into the\nfixed 48-byte `MessageScratch::prefix_buffer` using `copy_from_slice` and raw index writes with no\nbounds check (buffer[len] = ...). The program name comes from workspace metadata (Cargo.toml). Today\nthe longest combination (\"oc-rsyncd\" + \" warning: \") fits comfortably, but there is no compile-time\nassertion tying the buffer size to the maximum possible program-name+severity length. If the brand\nprogram name is ever renamed to something long (>~38 bytes), every message render panics with an\nout-of-bounds slice/index. A latent landmine with no guard.","fix":"Add a `const _: () = assert!(MAX_PROGRAM_NAME_LEN + MAX_SEVERITY_LEN + 4 <= 48);` style static\nguard (or size the buffer from those constants), or bounds-check and fall back gracefully so a long\nprogram name cannot turn diagnostics into panics.","locations":[{"ref":"crates/core/src/message/message_impl/mod.rs:135-159","code":"  135 |     fn render_prefix(&self, brand: Brand, scratch: &mut MessageScratch) -> usize {\n  136 |         let program_name = match brand {\n  137 |             Brand::Oc => match self.role {\n  138 |                 Some(Role::Daemon | Role::Server) => Brand::Oc.daemon_program_name(),\n  139 |                 _ => Brand::Oc.client_program_name(),\n  140 |             },\n  141 |             Brand::Upstream => Brand::Upstream.client_program_name(),\n  142 |         };\n  143 |         let severity = self.severity.as_str();\n  144 |         let buffer = scratch.prefix_buffer_mut();\n  145 |         let mut len = 0usize;\n  146 | \n  147 |         buffer[..program_name.len()].copy_from_slice(program_name.as_bytes());\n  148 |         len += program_name.len();\n  149 |         buffer[len] = b' ';\n  150 |         len += 1;\n  151 |         buffer[len..len + severity.len()].copy_from_slice(severity.as_bytes());\n  152 |         len += severity.len();\n  153 |         buffer[len] = b':';\n  154 |         len += 1;\n  155 |         buffer[len] = b' ';\n  156 |         len += 1;\n  157 | \n  158 |         len\n  159 |     }","lines":25}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","description":"`IoUringWriter::write` and `IoUringSocketWriter::write` compute\n`self.buffer_pos + buf.len()` (an unchecked `usize + usize`) in the buffering branch.\nFor a writer whose internal buffer is near `usize::MAX` and a pathologically large\n`buf`, this overflows and in debug builds panics; in release it wraps and could make\nthe `<= self.buffer_size` test spuriously pass, leading to an out-of-bounds slice\ncopy on the next line. Not reachable with normal buffer sizes, but it is an unchecked\narithmetic on attacker/peer-influenced `buf.len()`.","fix":"Use `self.buffer_pos.checked_add(buf.len()).map_or(false, |t| t <= self.buffer_size)`\nor compare via `buf.len() <= self.buffer_size - self.buffer_pos` (buffer_pos is always\n<= buffer_size) to avoid the overflow entirely.","locations":[{"ref":"crates/fast_io/src/io_uring/file_writer.rs:251-255","code":"  251 |         if self.buffer_pos + buf.len() <= self.buffer_size {\n  252 |             self.buffer[self.buffer_pos..self.buffer_pos + buf.len()].copy_from_slice(buf);\n  253 |             self.buffer_pos += buf.len();\n  254 |             return Ok(buf.len());\n  255 |         }","lines":5},{"ref":"crates/fast_io/src/io_uring/socket_writer.rs:191-195","code":"  191 |         if self.buffer_pos + buf.len() <= self.buffer_size {\n  192 |             self.buffer[self.buffer_pos..self.buffer_pos + buf.len()].copy_from_slice(buf);\n  193 |             self.buffer_pos += buf.len();\n  194 |             return Ok(buf.len());\n  195 |         }","lines":5}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","description":"`FlatFileList::get` / `iter` / `sort` resolve header path handles via\n`PathArena::resolve`, which panics (\"PathHandle(..) is not valid for this PathArena\")\nif a header references a handle not produced by this list's interner. The append-only\nbuilders keep handles consistent, but `extend_segment` / `push` accept arbitrary\nexternally-built `FileEntryHeader`s whose `name`/`dirname` handles may belong to a\ndifferent arena; a later `get`/`sort` then panics instead of erroring. Not directly\nreachable from untrusted wire input, but a fragile API contract.","fix":"Have `get`/`iter`/`sort` use `PathArena::get` (which returns Option) and fall back to empty bytes on an unknown handle, or document that callers of push/extend_segment must intern handles into this list's PathArena first.","locations":[{"ref":"crates/protocol/src/flist/flat/flist.rs:131-141","code":"  131 |     pub fn get(&self, index: usize) -> Option<FlatFileEntry<'_>> {\n  132 |         let header = self.headers.get(index)?;\n  133 |         let name = self.paths.resolve(header.name).as_bytes();\n  134 |         let dirname = self.paths.resolve(header.dirname).as_bytes();\n  135 |         Some(FlatFileEntry {\n  136 |             header,\n  137 |             name,\n  138 |             dirname,\n  139 |             extras_arena: None,\n  140 |         })\n  141 |     }","lines":11},{"ref":"crates/protocol/src/flist/flat/intern.rs:131-139","code":"  131 |     pub fn resolve(&self, handle: PathHandle) -> &str {\n  132 |         if handle == PathHandle::NONE {\n  133 |             return \"\";\n  134 |         }\n  135 |         match self.get(handle) {\n  136 |             Some(s) => s,\n  137 |             None => panic!(\"PathHandle({}) is not valid for this PathArena\", handle.0),\n  138 |         }\n  139 |     }","lines":9}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","description":"`read_varlong` computes `result[..min - 1]` (line 105) and `result[min - 1]`\n(line 119) where `min = min_bytes as usize`. If a caller passes `min_bytes == 0`\nthe `min - 1` subtraction underflows and panics (index out of bounds / subtract\noverflow). `min_bytes` is a protocol-internal parameter rather than wire-derived,\nso this is not directly attacker-reachable, but the public `read_varlong` /\n`read_varlong30` API offers no guard, and the matching `write_varlong` tolerates\n`min_bytes == 0` (its `cnt > min_bytes` loop). The asymmetry is a latent\nfoot-gun.","fix":"Add an explicit guard at the top of `read_varlong`: reject `min_bytes == 0` (or\n`min_bytes` outside the valid 1..=8 range) with an `InvalidInput` error, mirroring\nthe implicit contract that upstream's `read_varlong(min_bytes)` is always called\nwith `min_bytes >= 1`.","locations":[{"ref":"crates/protocol/src/varint/decode.rs:92-125","code":"   92 | #[inline]\n   93 | pub fn read_varlong<R: Read + ?Sized>(reader: &mut R, min_bytes: u8) -> io::Result<i64> {\n   94 |     // upstream: io.c:read_varlong() - read min_bytes first, then extra.\n   95 |     let min = min_bytes as usize;\n   96 | \n   97 |     let mut initial = [0u8; 8];\n   98 |     reader.read_exact(&mut initial[..min])?;\n   99 | \n  100 |     let leading = initial[0];\n  101 | \n  102 |     // upstream: io.c:read_varlong() `memcpy(u.b, b2+1, min_bytes-1)` -\n  103 |     // initial data bytes (after the leading tag) land at result[0..min-1].\n  104 |     let mut result = [0u8; 9];\n  105 |     result[..min - 1].copy_from_slice(&initial[1..min]);\n  106 | \n  107 |     let extra = INT_BYTE_EXTRA[(leading / 4) as usize] as usize;\n  108 | \n  109 |     if extra > 0 {\n  110 |         let bit = 1u8 << (8 - extra as u32);\n  111 |         // upstream: `if (min_bytes + extra > (int)sizeof u.b)` where sizeof u.b = 9\n  112 |         if min + extra > 9 {\n  113 |             return Err(invalid_data(\"overflow in read_varlong\"));\n  114 |         }\n  115 |         reader.read_exact(&mut result[min - 1..min - 1 + extra])?;\n  116 |         result[min + extra - 1] = leading & (bit - 1);\n  117 |     } else {\n  118 |         // No extra bytes: all 8 bits of the leading byte are data, no masking.\n  119 |         result[min - 1] = leading;\n  120 |     }\n  121 | \n  122 |     Ok(i64::from_le_bytes([\n  123 |         result[0], result[1], result[2], result[3], result[4], result[5], result[6], result[7],\n  124 |     ]))\n  125 | }","lines":34}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","description":"`recv_xattr` computes `let ndx = ndx_plus_one - 1;` on the raw `read_varint`\nresult. For a wire value decoding to `i32::MIN`, `i32::MIN - 1` overflows and\npanics in debug builds (wraps in release). Same pattern as `recv_rsync_acl`.\nThis is a public API; while the primary literal-reception path is\n`XattrCache::receive_xattr`, callers using `recv_xattr` directly inherit the\npanic on malformed input.","fix":"Avoid the unchecked subtraction: branch on `ndx_plus_one <= 0` for the literal\nsentinel, or use `checked_sub(1)`.","locations":[{"ref":"crates/protocol/src/xattr/wire/decode.rs:142-148","code":"  142 | pub fn recv_xattr<R: Read>(reader: &mut R) -> io::Result<RecvXattrResult> {\n  143 |     let ndx_plus_one = read_varint(reader)?;\n  144 |     let ndx = ndx_plus_one - 1;\n  145 | \n  146 |     if ndx >= 0 {\n  147 |         return Ok(RecvXattrResult::CacheHit(ndx as u32));\n  148 |     }","lines":7}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"critical","description":"`BufferRing::new` writes the ring tail u16 one-past the end of the mmap when the\nentry array exactly fills an integral number of pages, producing an out-of-bounds\nwrite into unmapped (or adjacent) memory.\n\nThe mmap is sized as:\n  ring_region_size = size_of::<IoUringBuf>() * ring_entries   (entry_size = 16)\n  ring_mmap_size   = ring_region_size.next_multiple_of(page_size)\nThe tail word is then written at `tail_offset = ring_entries * entry_size`\n(= ring_region_size). The doc comment claims `ring_mmap_size = ring_entries *\nentry_size + size_of::<u16>()`, but the code never reserves the extra tail bytes.\nWhenever `ring_region_size` is already a multiple of page_size,\n`next_multiple_of` returns `ring_region_size` unchanged, so `tail_offset ==\nring_mmap_size` and the `ptr::write(tail_ptr, ring_entries as u16)` at line 297-299\n(and the later `recycle_buffer` tail store at line 510-520) write 2 bytes starting\nat the first byte past the mapping.\n\nThis is reachable with legitimate, validator-accepted configs: ring_size must be a\npower of two, so e.g. ring_size = 256 -> 256*16 = 4096 (one page), ring_size = 512\n-> 8192, etc. all hit the bug. Result is a SIGSEGV or silent corruption of whatever\nfollows the mapping, plus the kernel reading a bogus tail from the registered ring.","fix":"Reserve space for the tail explicitly before rounding to page size, e.g.\n`let ring_mmap_size = (ring_region_size + std::mem::size_of::<u16>())\n.next_multiple_of(page_size);`. Add a debug_assert that\n`tail_offset + size_of::<u16>() <= ring_mmap_size`. (Separately, verify against the\nio_uring `struct io_uring_buf_ring` ABI: the modern PBUF_RING layout stores the tail\nin the resv field of the first entry, not in a trailing word - the current\ntrailing-word scheme may also be an ABI mismatch.)","locations":[{"ref":"crates/fast_io/src/io_uring/buffer_ring/mod.rs:206-212","code":"  206 |         // The kernel expects: sizeof(io_uring_buf) * ring_entries, plus space\n  207 |         // for the 16-bit tail at the end of the ring page.\n  208 |         let entry_size = std::mem::size_of::<IoUringBuf>();\n  209 |         let ring_region_size = entry_size * ring_entries;\n  210 |         // Round up to page size for mmap.\n  211 |         let page_size = page_size();\n  212 |         let ring_mmap_size = ring_region_size.next_multiple_of(page_size);","lines":7},{"ref":"crates/fast_io/src/io_uring/buffer_ring/mod.rs:287-299","code":"  287 |         // Set the initial tail to ring_entries (all buffers available).\n  288 |         // The tail pointer is at offset `ring_entries * entry_size` from the base\n  289 |         // in the mmap'd region (the kernel reads it from there).\n  290 |         let tail_offset = ring_entries * entry_size;\n  291 |         // SAFETY: the mmap reserves space for the tail word at this offset\n  292 |         // (see `ring_mmap_size = ring_entries * entry_size + size_of::<u16>()`)\n  293 |         // and is `u16`-aligned because `entry_size` is a multiple of 2.\n  294 |         let tail_ptr = unsafe { ring_ptr.add(tail_offset).cast::<u16>() };\n  295 |         // SAFETY: `tail_ptr` is valid and aligned per the comment above; no\n  296 |         // other thread has access to the mapping yet.\n  297 |         unsafe {\n  298 |             ptr::write(tail_ptr, ring_entries as u16);\n  299 |         }","lines":13},{"ref":"crates/fast_io/src/io_uring/buffer_ring/mod.rs:509-520","code":"  509 |         // Write the updated tail to the shared memory location that the kernel reads.\n  510 |         let tail_offset = self.config.ring_size as usize * entry_size;\n  511 |         // SAFETY: `tail_offset` points at the kernel-shared tail word that\n  512 |         // sits immediately after the entry array (sized into the mmap at\n  513 |         // construction). The pointer is `u16`-aligned because `entry_size`\n  514 |         // is a multiple of 2 and the mapping is page-aligned.\n  515 |         let tail_ptr = unsafe { self.ring_ptr.add(tail_offset).cast::<AtomicU16>() };\n  516 |         let new_tail = tail.wrapping_add(1);\n  517 |         // SAFETY: `tail_ptr` references the shared tail word; reborrowing as\n  518 |         // an `AtomicU16` is sound because the kernel uses single-word loads\n  519 |         // with matching alignment per the io_uring buffer-ring ABI.\n  520 |         unsafe { &*tail_ptr }.store(new_tail, Ordering::Release);","lines":12}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"high","description":"`ByteBudget::release` does a non-atomic load-then-store (`retained.load` followed by `retained.store`) instead of `fetch_sub`. Two concurrent releases can both read the same `prev`, both compute `prev - bytes`, and both store that value, losing one decrement. The result is that `retained` drifts permanently higher than the true retained bytes, monotonically shrinking the effective byte budget over the life of the process until admissions are rejected even when the pool is nearly empty. The inline comment claims over-decrement only \"gives the pool slightly more headroom\" - the opposite of the actual failure mode (under-decrement / lost release). This affects the default global pool which ships a 32 MiB byte budget.","fix":"Use `self.retained.fetch_sub(bytes.min(current), Ordering::Relaxed)` in a CAS loop (or a saturating fetch_sub helper) so concurrent releases compose, matching the atomic CAS used in `try_reserve`.","locations":[{"ref":"crates/engine/src/local_copy/buffer_pool/byte_budget.rs:106-118","code":"  106 |     pub(super) fn release(&self, bytes: usize) {\n  107 |         // `fetch_sub` saturates on underflow via the explicit guard below; in\n  108 |         // normal operation reservations and releases are paired so the counter\n  109 |         // never goes negative. The guard exists to keep us robust against\n  110 |         // accounting drift if the buffer's size changes between admission and\n  111 |         // release (e.g. an adaptive buffer larger than the pool default).\n  112 |         let prev = self.retained.load(Ordering::Relaxed);\n  113 |         let new = prev.saturating_sub(bytes);\n  114 |         // A racy store is acceptable here because over-decrement only ever\n  115 |         // gives the pool slightly more headroom, never less - admission\n  116 |         // checks remain correct.\n  117 |         self.retained.store(new, Ordering::Relaxed);\n  118 |     }","lines":13}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"`try_send_zc` permanently discards CQEs that belong to other in-flight operations on\nthe same ring. The drain loop calls `ring.completion().next()` (which *pops* the\nCQE) and, when `cqe.user_data() != tagged`, `continue`s - dropping that completion on\nthe floor. The doc says \"Real callers route those through their own demux\", but the\nCQE has already been consumed and cannot be re-observed, so the operation that\nsubmitted it will block forever / lose its result. With `ZeroCopySender::send_zc`\nthis is mostly masked because the `Arc<Mutex<IoUring>>` serialises submissions, but a\nring shared via `from_shared_ring` can carry queued CQEs from a previous lock holder\n(e.g. an op that errored without being fully reaped), and those are silently eaten\nhere.","fix":"Do not pop CQEs that do not belong to this submission. Either require that\n`try_send_zc` owns the ring exclusively (document and assert the CQ is empty on\nentry), or buffer foreign CQEs and re-post / hand them back to the caller's demux\nrather than discarding them. At minimum, return an error instead of silently dropping\nan unexpected `user_data`.","locations":[{"ref":"crates/fast_io/src/io_uring/send_zc.rs:174-189","code":"  174 |         while let Some(cqe) = ring.completion().next() {\n  175 |             if cqe.user_data() != tagged {\n  176 |                 // CQE belongs to an unrelated SQE on the same ring; ignore\n  177 |                 // it. Real callers route those through their own demux.\n  178 |                 continue;\n  179 |             }\n  180 |             classify_cqe(\n  181 |                 cqe.result(),\n  182 |                 cqe.flags(),\n  183 |                 &mut transfer_result,\n  184 |                 &mut saw_notification,\n  185 |             );\n  186 |             if transfer_result.is_some() && saw_notification {\n  187 |                 break;\n  188 |             }\n  189 |         }","lines":16}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"low","description":"`probe_o_tmpfile` opens an `O_TMPFILE` inode in `dir` with `O_TMPFILE |\nO_WRONLY` but WITHOUT `O_CLOEXEC` (unlike `open_anonymous_tmpfile` which sets\n`O_CLOEXEC`). If another thread forks/execs between the `open` and the `close`,\nthe probe fd leaks into the child. The window is small and the fd is closed\nimmediately, but the inconsistency with the real open path is a latent fd-leak\nacross exec.","fix":"Add `libc::O_CLOEXEC` to the probe's open flags to match `open_anonymous_tmpfile`.","locations":[{"ref":"crates/fast_io/src/o_tmpfile/low_level.rs:84-110","code":"   84 |     fn probe_o_tmpfile(dir: &Path) -> bool {\n   85 |         let dir_cstr = match CString::new(dir.as_os_str().as_bytes()) {\n   86 |             Ok(c) => c,\n   87 |             Err(_) => return false,\n   88 |         };\n   89 | \n   90 |         // Safety: `dir_cstr` is a valid null-terminated C string pointing to an\n   91 |         // existing directory. `O_TMPFILE | O_WRONLY` creates an unnamed inode\n   92 |         // with no directory entry. Mode 0o600 is used for the probe file.\n   93 |         let fd = unsafe {\n   94 |             libc::open(\n   95 |                 dir_cstr.as_ptr(),\n   96 |                 libc::O_TMPFILE | libc::O_WRONLY,\n   97 |                 libc::mode_t::from(0o600u32),\n   98 |             )\n   99 |         };\n  100 | \n  101 |         if fd < 0 {\n  102 |             return false;\n  103 |         }\n  104 | \n  105 |         // Safety: `fd` is a valid open file descriptor returned by `open(2)`.\n  106 |         unsafe {\n  107 |             libc::close(fd);\n  108 |         }\n  109 |         true\n  110 |     }","lines":27}]},{"id":"RACE_4","type":"race_condition","type_label":"Race Condition","severity":"negligible","description":"`rss::store_cached` writes the cached RSS bytes and the cache deadline under\ntwo separate operations (a relaxed atomic store for the value, then a\n`Mutex`-guarded store for the deadline). Concurrent refreshers can interleave\nso the published `RSS_CACHE_BYTES` value and the `RSS_CACHE_DEADLINE`\ntimestamp come from different probes. The values are purely diagnostic\n(RSS-pressure spill heuristic) and both are bounded valid readings, so the\nworst case is using a slightly stale-but-valid RSS for one TTL window. Noted\nfor completeness; not a correctness bug.","fix":"If exactness ever matters, store the (bytes, deadline) pair under the same\nmutex (or pack both into one atomic) so a reader never pairs a value from one\nprobe with a deadline from another.","locations":[{"ref":"crates/engine/src/concurrent_delta/spill/rss.rs:107-112","code":"  107 | fn store_cached(bytes: u64) {\n  108 |     RSS_CACHE_BYTES.store(bytes, Ordering::Relaxed);\n  109 |     if let Ok(mut guard) = RSS_CACHE_DEADLINE.lock() {\n  110 |         *guard = Some(Instant::now() + RSS_CACHE_TTL);\n  111 |     }\n  112 | }","lines":6}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"Unbounded line reads on network input. `read_trimmed_line` uses `BufRead::read_line` with no\nlength cap, and the protocol-30 client-argument reader uses `read_until(b'\\0', ...)` likewise\nuncapped (client_args.rs:31). A connected peer can stream an arbitrarily long line / argument\nwith no terminator, forcing the daemon to grow a single `String`/`Vec` until memory is\nexhausted. The 10s `SOCKET_TIMEOUT` (daemon.rs:115) bounds slow-loris but a fast peer can push\nmany gigabytes within the window; with concurrent connections this is a memory-exhaustion DoS.\nUpstream rsync caps such reads (BIGPATHBUFLEN).","fix":"Impose a maximum line/argument length (e.g. take(MAX) over the reader, or a manual byte loop\nwith a cap) and abort the connection with an error once exceeded, mirroring upstream's bounded\nbuffers. Apply to handshake lines, module name, auth response, and per-argument reads.","locations":[{"ref":"crates/daemon/src/daemon/sections/greeting.rs:65-78","code":"   65 | pub(crate) fn read_trimmed_line<R: BufRead>(reader: &mut R) -> io::Result<Option<String>> {\n   66 |     let mut line = String::new();\n   67 |     let bytes = reader.read_line(&mut line)?;\n   68 | \n   69 |     if bytes == 0 {\n   70 |         return Ok(None);\n   71 |     }\n   72 | \n   73 |     while line.ends_with('\\n') || line.ends_with('\\r') {\n   74 |         line.pop();\n   75 |     }\n   76 | \n   77 |     Ok(Some(line))\n   78 | }","lines":14},{"ref":"crates/daemon/src/daemon/sections/module_access/client_args.rs:21-62","code":"   21 | fn read_client_arguments<R: BufRead>(\n   22 |     reader: &mut R,\n   23 |     protocol: Option<ProtocolVersion>,\n   24 | ) -> io::Result<Vec<String>> {\n   25 |     let use_nulls = protocol.is_some_and(|p| p.as_u8() >= 30);\n   26 |     let mut arguments = Vec::new();\n   27 | \n   28 |     loop {\n   29 |         if use_nulls {\n   30 |             let mut buf = Vec::new();\n   31 |             let bytes_read = reader.read_until(b'\\0', &mut buf)?;\n   32 | \n   33 |             if bytes_read == 0 {\n   34 |                 break;\n   35 |             }\n   36 | \n   37 |             if buf.last() == Some(&b'\\0') {\n   38 |                 buf.pop();\n   39 |             }\n   40 | \n   41 |             if buf.is_empty() {\n   42 |                 break;\n   43 |             }\n   44 | \n   45 |             let arg = String::from_utf8_lossy(&buf).into_owned();\n   46 |             arguments.push(arg);\n   47 |         } else {\n   48 |             let line = match read_trimmed_line(reader)? {\n   49 |                 Some(line) => line,\n   50 |                 None => break,\n   51 |             };\n   52 | \n   53 |             if line.is_empty() {\n   54 |                 break;\n   55 |             }\n   56 | \n   57 |             arguments.push(line);\n   58 |         }\n   59 |     }\n   60 | \n   61 |     Ok(arguments)\n   62 | }","lines":42}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"With `--delay-updates` plus the `AnonymousTempFile` (O_TMPFILE) strategy, each completed file is registered as a `DeferredUpdate` that holds the anonymous file's open fd in memory (inside `GuardStrategy::Anonymous`) until the end-of-run batch commit. Unlike named temp files (which live on disk and cost no fd), this holds one open file descriptor per pending file for the whole transfer. A delay-updates sync of thousands of files can exhaust the process fd limit (EMFILE), aborting the run. `select_write_strategy` permits AnonymousTempFile when only `delay_updates` is set (no partial/temp-dir).","fix":"Disable the AnonymousTempFile strategy when `delay_updates_enabled` is true (fall back to a named staging file), or otherwise bound the number of concurrently held anonymous fds.","locations":[{"ref":"crates/engine/src/local_copy/executor/file/copy/transfer/write_strategy.rs:60-87","code":"   60 | pub(in crate::local_copy) fn select_write_strategy(\n   61 |     append_offset: u64,\n   62 |     inplace_enabled: bool,\n   63 |     partial_enabled: bool,\n   64 |     delay_updates_enabled: bool,\n   65 |     has_existing_destination: bool,\n   66 |     has_temp_directory: bool,\n   67 |     destination: &Path,\n   68 | ) -> WriteStrategy {\n   69 |     if append_offset > 0 {\n   70 |         WriteStrategy::Append\n   71 |     } else if inplace_enabled {\n   72 |         WriteStrategy::Inplace\n   73 |     } else if !partial_enabled && !has_temp_directory && can_use_anonymous_tmpfile(destination) {\n   74 |         // O_TMPFILE preferred on Linux: atomic appearance via linkat(2) with\n   75 |         // kernel auto-cleanup on crash. Avoids orphaned temp files (vs\n   76 |         // TempFileRename) and partial writes visible to readers (vs Direct).\n   77 |         WriteStrategy::AnonymousTempFile\n   78 |     } else if !has_existing_destination\n   79 |         && !partial_enabled\n   80 |         && !delay_updates_enabled\n   81 |         && !has_temp_directory\n   82 |     {\n   83 |         WriteStrategy::Direct\n   84 |     } else {\n   85 |         WriteStrategy::TempFileRename\n   86 |     }\n   87 | }","lines":28},{"ref":"crates/engine/src/local_copy/executor/file/guard.rs:69-73","code":"   69 |     #[cfg(target_os = \"linux\")]\n   70 |     Anonymous {\n   71 |         /// Kept alive so the fd stays open until `link_anonymous_tmpfile`.\n   72 |         file: Option<fs::File>,\n   73 |     },","lines":5},{"ref":"crates/engine/src/local_copy/executor/file/copy/transfer/finalize.rs:47-68","code":"   47 |     if let Some(guard) = guard {\n   48 |         if delay_updates_enabled {\n   49 |             drop(writer_for_metadata.take());\n   50 |             let destination_path = guard.final_path().to_path_buf();\n   51 |             let update = DeferredUpdate::new(\n   52 |                 guard,\n   53 |                 metadata.clone(),\n   54 |                 metadata_options,\n   55 |                 mode,\n   56 |                 OwnedPathContext {\n   57 |                     source: source.to_path_buf(),\n   58 |                     relative: relative_for_removal,\n   59 |                     file_type,\n   60 |                     destination_previously_existed,\n   61 |                 },\n   62 |                 destination_path,\n   63 |                 #[cfg(all(unix, feature = \"xattr\"))]\n   64 |                 preserve_xattrs,\n   65 |                 #[cfg(all(any(unix, windows), feature = \"acl\"))]\n   66 |                 preserve_acls,\n   67 |             );\n   68 |             context.register_deferred_update(update);","lines":22}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"`read_filter_list` reads a 4-byte length `len` and then does\n`vec![0u8; len as usize]` (line 202) for any positive `i32`, i.e. up to\n~2 GiB per rule, with no upper bound. A hostile peer can send a small header\nclaiming a 2 GiB rule length and force a 2 GiB allocation (and a `read_exact`\nthat blocks waiting for that much data) per record, repeated until memory is\nexhausted. Real rsync filter rules are bounded by MAXPATHLEN; there is no\nlegitimate reason for multi-megabyte rules.","fix":"Add a sane upper bound on `len` (e.g. a few KiB, matching upstream's\nMAXPATHLEN-class limits) and return `InvalidData` when exceeded, before\nallocating the buffer.","locations":[{"ref":"crates/protocol/src/filters/wire.rs:188-203","code":"  188 |         let len = read_i32_le(reader)?;\n  189 | \n  190 |         if len == 0 {\n  191 |             // Wire-format terminator (zero-length record).\n  192 |             break;\n  193 |         }\n  194 | \n  195 |         if len < 0 {\n  196 |             return Err(io::Error::new(\n  197 |                 io::ErrorKind::InvalidData,\n  198 |                 format!(\"invalid filter rule length: {len}\"),\n  199 |             ));\n  200 |         }\n  201 | \n  202 |         let mut buf = vec![0u8; len as usize];\n  203 |         reader.read_exact(&mut buf)?;","lines":16}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"`read_file_delta_tokens` allocates `vec![0u8; n as usize]` for a literal token\nwhere `n` is an attacker-controlled positive `i32` read from the batch stream\n(up to ~2 GiB). A malformed/hostile batch file can force a large eager\nallocation before `read_exact` fails. Upstream rsync bounds literal runs to\nCHUNK_SIZE; there is no equivalent cap here, allowing a memory-amplification\nDoS on `--read-batch`.","fix":"Reject or chunk tokens whose length exceeds a sane bound (e.g. the upstream\nCHUNK_SIZE / max literal run) before allocating, or read into a fixed-size\nreusable buffer in bounded chunks.","locations":[{"ref":"crates/batch/src/reader/delta.rs:49-57","code":"   49 |                     Some(n) if n > 0 => {\n   50 |                         let mut data = vec![0u8; n as usize];\n   51 |                         reader.read_exact(&mut data).map_err(|e| {\n   52 |                             BatchError::Io(io::Error::new(\n   53 |                                 e.kind(),\n   54 |                                 format!(\"Failed to read literal data ({n} bytes): {e}\"),\n   55 |                             ))\n   56 |                         })?;\n   57 |                         ops.push(protocol::wire::DeltaOp::Literal(data));","lines":9}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"`IoUringDiskBatch::unregister_fd` calls `self.ring.submitter().unregister_files()`,\nwhich unregisters the ENTIRE fixed-file table, but `begin_file`/`try_register_fd`\nregister exactly one fd at slot 0 per file. The intent (drop the single registered\nfd) works, but `unregister_fd` is also a `&self` method that unconditionally hits the\nsyscall whenever `fixed_fd_slot != NO_FIXED_FD`; if a future change registers more\nthan one fd at a time this will erroneously drop all of them. Additionally, the\nbest-effort `let _ =` discards an EINVAL/ENXIO that could indicate the table was\nalready torn down, hiding genuine ordering bugs.","fix":"Document that the disk batch registers exactly one fd per file (so\n`unregister_files` clearing the whole table is intentional), or switch to\n`register_files_update` to replace just slot 0. Consider logging the unregister error\nat debug level rather than fully discarding it.","locations":[{"ref":"crates/fast_io/src/io_uring/disk_batch.rs:265-272","code":"  265 |     /// Unregisters the fd from the ring's fixed file table.\n  266 |     fn unregister_fd(&self, active: &ActiveFile) {\n  267 |         if active.fixed_fd_slot != NO_FIXED_FD {\n  268 |             // Best-effort unregister - ignore errors since the ring may\n  269 |             // not have the fd registered (e.g., after a failed registration).\n  270 |             let _ = self.ring.submitter().unregister_files();\n  271 |         }\n  272 |     }","lines":8}]},{"id":"RES_6","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In `try_refs_reflink_impl`, after the destination handle is wrapped in a `File`\n(`dst_file`) and `dst_file.set_len(file_size)` is called at the end, the success\npath returns `Ok(())` and `dst_file` drops, closing the handle - fine. But on the\n`set_len(aligned_size)` early-error branch (line ~419) the code closes\n`src_handle` and returns the error; `dst_file` drops and closes its handle too,\nyet the partially-created (CREATE_ALWAYS, possibly zero/aligned-sized)\ndestination file is left on disk. The Linux/macOS dispatch arms remove the\ndestination on failure (`std::fs::remove_file(dst)`), but this Windows reflink\nhelper leaves a stale, wrongly-sized destination behind on the set_len failure\nand on the ioctl failure path (it only `drop`s the file, never unlinks it).","fix":"On the `set_len` and ioctl failure branches, remove the destination file\n(`std::fs::remove_file(dst)`) before returning, matching the cleanup the\nLinux/macOS `platform_copy_impl` arms perform, or document that the caller in\n`platform_copy_impl` already does the `remove_file(dst)` cleanup (it does for the\ntop-level call, but `try_refs_reflink` is also a public stand-alone API where no\nsuch cleanup exists).","locations":[{"ref":"crates/fast_io/src/platform_copy/dispatch.rs:416-461","code":"  416 |     let dst_file = unsafe { std::fs::File::from_raw_handle(dst_raw_handle) };\n  417 | \n  418 |     // Pre-size to the cluster-aligned size required by the ioctl.\n  419 |     if let Err(e) = dst_file.set_len(aligned_size) {\n  420 |         // SAFETY: src_handle is a valid open handle.\n  421 |         unsafe { CloseHandle(src_handle) };\n  422 |         return Err(e);\n  423 |     }\n  424 | \n  425 |     let dst_handle = dst_file.as_raw_handle();\n  426 | \n  427 |     let dup_data = DuplicateExtentsData {\n  428 |         file_handle: src_handle as isize,\n  429 |         source_file_offset: 0,\n  430 |         target_file_offset: 0,\n  431 |         byte_count: aligned_size as i64,\n  432 |     };\n  433 | \n  434 |     let mut bytes_returned: u32 = 0;\n  435 | \n  436 |     // SAFETY: dst_handle is a valid open file handle with read/write access.\n  437 |     // src_handle (inside dup_data.file_handle) is a valid open handle with read access.\n  438 |     // dup_data is a properly initialized DuplicateExtentsData struct with\n  439 |     // cluster-aligned offsets. bytes_returned is a valid output pointer.\n  440 |     let ioctl_result = unsafe {\n  441 |         DeviceIoControl(\n  442 |             dst_handle as HANDLE,\n  443 |             FSCTL_DUPLICATE_EXTENTS_TO_FILE,\n  444 |             &dup_data as *const DuplicateExtentsData as *const std::ffi::c_void,\n  445 |             std::mem::size_of::<DuplicateExtentsData>() as u32,\n  446 |             std::ptr::null_mut(),\n  447 |             0,\n  448 |             &mut bytes_returned,\n  449 |             std::ptr::null_mut(),\n  450 |         )\n  451 |     };\n  452 | \n  453 |     // SAFETY: src_handle is a valid open handle; dst_file will close\n  454 |     // dst_handle on drop.\n  455 |     unsafe { CloseHandle(src_handle) };\n  456 | \n  457 |     if ioctl_result == 0 {\n  458 |         let err = io::Error::last_os_error();\n  459 |         drop(dst_file);\n  460 |         return Err(err);\n  461 |     }","lines":46}]},{"id":"RES_7","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"`recv_secluded_args` and `read_files_from_stream` accumulate
