        self.stats.num_specials += 1;\n  285 |         }\n  286 |     }","lines":17}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In `windows_gnu_eh`'s `ensure_function`, the `loop` already returns/breaks for\nall states (`UNRESOLVED` recomputes then breaks, `MISSING` returns `None`, any\nresolved value returns `Some`). The post-loop `if state == MISSING || state ==\nUNRESOLVED { None } else { Some(...) }` is unreachable for the `MISSING`/\n`UNRESOLVED` arms (those paths already returned) and only the resolved case can\nfall through. The redundant re-check is dead/confusing logic.","fix":"After the loop, `state` is always a resolved pointer value, so simply\n`Some(state as *mut ())`. Remove the redundant `MISSING`/`UNRESOLVED` branch.","locations":[{"ref":"crates/windows-gnu-eh/src/lib.rs:96-126","code":"   96 |         let mut state = cache.load(Ordering::Acquire);\n   97 |         loop {\n   98 |             match state {\n   99 |                 UNRESOLVED => {\n  100 |                     // SAFETY: `symbol` is a static NUL-terminated byte literal (see SYM_REGISTER/SYM_DEREGISTER); resolve_symbol's contract is satisfied.\n  101 |                     let resolved = unsafe { resolve_symbol(symbol) } as usize;\n  102 |                     let new_state = if resolved == 0 { MISSING } else { resolved };\n  103 |                     match cache.compare_exchange(\n  104 |                         UNRESOLVED,\n  105 |                         new_state,\n  106 |                         Ordering::AcqRel,\n  107 |                         Ordering::Acquire,\n  108 |                     ) {\n  109 |                         Ok(_) => {\n  110 |                             state = new_state;\n  111 |                             break;\n  112 |                         }\n  113 |                         Err(actual) => state = actual,\n  114 |                     }\n  115 |                 }\n  116 |                 MISSING => return None,\n  117 |                 value => return Some(value as *mut ()),\n  118 |             }\n  119 |         }\n  120 | \n  121 |         if state == MISSING || state == UNRESOLVED {\n  122 |             None\n  123 |         } else {\n  124 |             Some(state as *mut ())\n  125 |         }\n  126 |     }","lines":31}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","description":"The `--max-delete` handling claims \"upstream allows -1 to mean 'no limit after\nreporting'\" and accepts any `i64` (including negative values) at parse time, but the\nauthoritative downstream parser `parse_max_delete_argument` (numeric.rs:79-122) rejects\nany value beginning with '-' as \"deletion limit must be non-negative\". So `--max-delete=-1`\npasses the early check then fails later, and the documented upstream \"-1 = unlimited\"\nsemantics are never actually implemented. The comment is misleading and the two\nvalidators disagree on the accepted domain.","fix":"Decide on one behavior and make both layers agree. Either implement the documented\n`-1 = unlimited` semantics end to end (e.g. map -1 to an unlimited sentinel and accept\nit in `parse_max_delete_argument`), or drop the misleading comment and reject negatives\nconsistently at the first validation point so the diagnostic is emitted once with the\ncorrect message.","locations":[{"ref":"crates/cli/src/frontend/arguments/parser/mod.rs:160-173","code":"  160 |     let max_delete = match matches.remove_one::<OsString>(\"max-delete\") {\n  161 |         Some(value) => {\n  162 |             let s = value.to_string_lossy();\n  163 |             // upstream allows -1 to mean \"no limit after reporting\"\n  164 |             if s.parse::<i64>().is_err() {\n  165 |                 return Err(clap::Error::raw(\n  166 |                     clap::error::ErrorKind::ValueValidation,\n  167 |                     format!(\"invalid --max-delete value '{s}': must be an integer\\n\"),\n  168 |                 ));\n  169 |             }\n  170 |             Some(value)\n  171 |         }\n  172 |         None => None,\n  173 |     };","lines":14}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","description":"`KqueueLoop::remove` documents \"Idempotent on `ENOENT` (returns `Ok(())` if the\nevent was not registered) so callers can deregister unconditionally on\nshutdown.\" The implementation does no such thing: it calls `kevent_call(...)?`\nwhich propagates the raw error, so an `EV_DELETE` for a never-registered\nfd/filter returns `Err(ENOENT)`. The module's own test\n`remove_is_idempotent_on_missing_registration` actually asserts the OPPOSITE\n(that it errors), directly contradicting the doc comment. Callers following the\ndocumented contract (\"deregister unconditionally on shutdown\") will get an\nunexpected error.","fix":"Either make `remove` actually swallow `ENOENT` (match on\n`err.raw_os_error() == Some(libc::ENOENT)` and return `Ok(())`), matching the\ndoc and giving callers the promised idempotent shutdown behaviour, or rewrite\nthe doc comment to state that ENOENT is propagated.","locations":[{"ref":"crates/fast_io/src/kqueue/mod.rs:170-184","code":"  170 |     /// Removes a previously-registered event for the given fd/filter.\n  171 |     ///\n  172 |     /// Idempotent on `ENOENT` (returns `Ok(())` if the event was not\n  173 |     /// registered) so callers can deregister unconditionally on\n  174 |     /// shutdown.\n  175 |     ///\n  176 |     /// # Errors\n  177 |     ///\n  178 |     /// Returns an `io::Error` for any failure other than `ENOENT`.\n  179 |     pub fn remove(&self, fd: RawFd, filter: KEventFilter) -> io::Result<()> {\n  180 |         let change = make_kevent(fd, filter.as_raw(), libc::EV_DELETE, 0);\n  181 |         let rc = self.kevent_call(Some(&change), None, None)?;\n  182 |         debug_assert_eq!(rc, 0, \"EV_DELETE with no eventlist returns 0 on success\");\n  183 |         Ok(())\n  184 |     }","lines":15}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`ErrorCodification::error_code_name` is documented (lines 102-106) to \"Provide the symbolic name as\ndefined in upstream rsync's errcode.h (e.g., \\\"RERR_SYNTAX\\\", \\\"RERR_PARTIAL\\\")\", but the default\nimplementation returns `self.exit_code().description()` - the human-readable error text, not the\nsymbolic RERR_* name. Any caller relying on the documented contract for logging/metrics gets the\nwrong string.","fix":"Either change the implementation to return the symbolic RERR_* name (add a `const fn rerr_name()`\nto ExitCode), or fix the doc comment to state it returns the human-readable description.","locations":[{"ref":"crates/core/src/exit_code/traits.rs:102-109","code":"  102 |     /// Returns the upstream rsync error code name for debugging.\n  103 |     ///\n  104 |     /// Provides the symbolic name as defined in upstream rsync's `errcode.h`\n  105 |     /// (e.g., \"RERR_SYNTAX\", \"RERR_PARTIAL\"). The default implementation\n  106 |     /// maps the exit code to its description.\n  107 |     fn error_code_name(&self) -> &'static str {\n  108 |         self.exit_code().description()\n  109 |     }","lines":8}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`WalkEntry::metadata` documents that \"The metadata is obtained via\n`symlink_metadata`, so symlinks report their own metadata rather than their\ntarget's.\" That is only true when `WalkConfig::follow_symlinks` is false. The\nmetadata is sourced from jwalk's `dir_entry.metadata()`, which follows\nsymlinks (returns target metadata) when the walker is built with\n`follow_links(true)` (see `WalkdirWalker::new` -> `builder.follow_links(config.follow_symlinks)`).\nWith `--copy-links`-style follow enabled, `is_symlink()` and `len()` will\nreflect the target, contradicting the doc's absolute claim.","fix":"Qualify the doc: metadata is symlink (own) metadata only when the walker was\nconfigured with `follow_symlinks(false)`; with following enabled it reflects\nthe target. Or document that the metadata source tracks the walker's\nfollow-symlinks configuration.","locations":[{"ref":"crates/engine/src/walk/entry.rs:61-68","code":"   61 |     /// Returns the metadata for this entry.\n   62 |     ///\n   63 |     /// The metadata is obtained via `symlink_metadata`, so symlinks\n   64 |     /// report their own metadata rather than their target's.\n   65 |     #[must_use]\n   66 |     pub fn metadata(&self) -> &Metadata {\n   67 |         &self.metadata\n   68 |     }","lines":8}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`walkdir_impl.rs` and its `WalkdirWalker` type/doc repeatedly claim the\nimplementation uses the `walkdir` crate (\"walkdir-based\", \"compared to\nsingle-threaded walkdir\", trait doc \"Default implementation using the\n`walkdir` crate\"), but the actual implementation is built on `jwalk`\n(`use jwalk::{Parallelism, WalkDir}`). The module header is correct (\"jwalk-based\")\nbut the trait doc in `walk/mod.rs` and several struct/method docs still say\nwalkdir. Misleading for maintainers reasoning about traversal ordering and\nthe `skip_current_dir` approximation (jwalk has no native skip_current_dir,\nunlike walkdir).","fix":"Update the trait/struct doc comments to say jwalk (or rename the type) so the\ndocumented backend matches the actual dependency, and keep the\n`skip_current_dir` approximation note prominent.","locations":[{"ref":"crates/engine/src/walk/mod.rs:66-67","code":"   66 | /// - [`WalkdirWalker`]: Default implementation using the `walkdir` crate\n   67 | pub trait DirectoryWalker: Iterator<Item = Result<WalkEntry, WalkError>> {","lines":2},{"ref":"crates/engine/src/walk/walkdir_impl.rs:44-46","code":"   44 | /// ```no_run\n   45 | /// use engine::walk::{DirectoryWalker, WalkConfig, WalkdirWalker};\n   46 | /// use std::path::Path;","lines":3}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment on `generate_delta_from_signature`'s layout reconstruction states\n\"remainder unknown from wire format\", but the remainder is available on the wire\nin `SumHead.remainder` (see `crates/transfer/src/receiver/wire.rs`). The comment\nboth misdocuments the protocol and masks the underlying last-block matching bug\n(see the related logic_error finding). Even if the value is intentionally not\nthreaded through today, the comment's justification is factually wrong.","fix":"Correct the comment to reflect that the remainder is carried by `sum_head` and\nis currently dropped (or, preferably, thread it through and remove the comment).","locations":[{"ref":"crates/transfer/src/generator/delta.rs:138-142","code":"  138 |     // Reconstruct signature layout (remainder unknown, set to 0)\n  139 |     let layout = SignatureLayout::from_raw_parts(\n  140 |         block_length_nz,\n  141 |         0, // remainder unknown from wire format\n  142 |         block_count,","lines":5}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The `BufferRing::new` comment at lines 204-207 states the mmap region is sized as\n\"sizeof(io_uring_buf) * ring_entries, plus space for the 16-bit tail at the end\" and\nthe SAFETY comment at 290-293 claims `ring_mmap_size = ring_entries * entry_size +\nsize_of::<u16>()`. Neither is true: the code computes `ring_region_size.\nnext_multiple_of(page_size)` with no explicit tail reservation. The comment masks the\nOOB bug reported separately; even after that fix the comment text should be corrected.","fix":"Update the comments to describe the actual sizing once the tail reservation is added.","locations":[{"ref":"crates/fast_io/src/io_uring/buffer_ring/mod.rs:204-207","code":"  204 |         // Calculate the mmap region size: ring entries + tail u16 (at the end,\n  205 |         // aligned to the struct size).\n  206 |         // The kernel expects: sizeof(io_uring_buf) * ring_entries, plus space\n  207 |         // for the 16-bit tail at the end of the ring page.","lines":4}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment on `apply_directory_metadata_with_options` claims it applies ownership,\npermissions, and timestamps \"in the same order as upstream rsync's set_file_attrs():\nchown, chmod, then utimensat\", and the function does call them in that order - but it\nnever applies crtime for directories even though the file variant does and upstream's\n`set_file_attrs` handles crtime for directories too (subject to `omit_dir_times`). The\ntrailing comment about directories skipping atime is correct, but the absence of any\ncrtime handling for directories is undocumented and inconsistent with the file path.","fix":"Either apply crtime for directories when `options.crtimes()` is set (mirroring the file\npath, gated by the directory-times policy), or document explicitly why directory crtime\nis intentionally skipped.","locations":[{"ref":"crates/metadata/src/apply/mod.rs:40-53","code":"   40 | pub fn apply_directory_metadata_with_options(\n   41 |     destination: &Path,\n   42 |     metadata: &fs::Metadata,\n   43 |     options: MetadataOptions,\n   44 | ) -> Result<(), MetadataError> {\n   45 |     ownership::set_owner_like(metadata, destination, true, &options, None)?;\n   46 |     permissions::apply_permissions_with_chmod(destination, metadata, &options, None)?;\n   47 |     if options.times() {\n   48 |         timestamps::set_timestamp_like(metadata, destination, true, None, Some(&options))?;\n   49 |     }\n   50 |     // upstream: rsync.c:589 - directories skip atime (`ATTRS_SKIP_ATIME`)\n   51 |     // regardless of `--atimes`; only files get atime preservation.\n   52 |     Ok(())\n   53 | }","lines":14}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","description":"Two independent, near-identical `CleanupManager` global temp-file registries\nexist: `crates/engine/src/cleanup.rs` (exported as `engine::cleanup`) and\n`crates/engine/src/util/cleanup.rs` (re-exported at crate root as\n`engine::CleanupManager` via lib.rs). Each defines its own\n`static CLEANUP_MANAGER: OnceLock<Mutex<CleanupManagerState>>` and its own\n`CleanupManager` unit struct with the same method surface\n(`register_temp_file`, `unregister_temp_file`, `cleanup`, etc.). They are two\ndistinct process-global registries: a temp file registered through one is\ninvisible to the other. A caller using `engine::CleanupManager::global()`\n(util) and a signal handler that sweeps `engine::cleanup::CleanupManager`\n(or vice versa) will silently miss each other's files, leaking temp files on\nabnormal exit. This is a real correctness footgun, not just dead code.","fix":"Collapse to a single `CleanupManager` (one global `OnceLock`) and have the\nother module re-export it, or delete the unused duplicate. Ensure lib.rs\nexposes exactly one canonical path so all registrations land in one registry.","locations":[{"ref":"crates/engine/src/cleanup.rs:1-163","code":"    1 | //! Global cleanup registry for temporary files.\n    2 | //!\n    3 | //! Tracks temporary file paths so they can be removed on abnormal termination\n    4 | //! (e.g., SIGKILL). Normal exits clean up via RAII (`TempFileGuard::drop`),\n    5 | //! but `Drop` is not invoked on SIGKILL. This registry provides a process-wide\n    6 | //! list that a signal handler or atexit hook can sweep.\n    7 | //!\n    8 | //! # Thread Safety\n    9 | //!\n   10 | //! All methods are thread-safe. The internal state is protected by a mutex.\n   11 | \n   12 | use std::collections::HashSet;\n   13 | use std::path::{Path, PathBuf};\n   14 | use std::sync::{Mutex, OnceLock};\n   15 | \n   16 | /// Global cleanup manager instance.\n   17 | static CLEANUP_MANAGER: OnceLock<Mutex<CleanupManagerState>> = OnceLock::new();\n   18 | \n   19 | /// Singleton instance returned by [`CleanupManager::global`].\n   20 | static CLEANUP_MANAGER_INSTANCE: CleanupManager = CleanupManager;\n   21 | \n   22 | /// Global registry for temporary files awaiting cleanup.\n   23 | ///\n   24 | /// Register a temp file path after creation and unregister it after a\n   25 | /// successful commit (rename to final destination). On abnormal shutdown\n   26 | /// the signal handler calls [`cleanup`](Self::cleanup) to sweep any paths\n   27 | /// still registered.\n   28 | ///\n   29 | /// # Examples\n   30 | ///\n   31 | /// ```\n   32 | /// use engine::CleanupManager;\n   33 | /// use std::path::PathBuf;\n   34 | ///\n   35 | /// let temp = PathBuf::from(\"/tmp/rsync.12345.tmp\");\n   36 | /// CleanupManager::global().register_temp_file(temp.clone());\n   37 | ///\n   38 | /// // ... write data, commit ...\n   39 | ///\n   40 | /// CleanupManager::global().unregister_temp_file(&temp);\n   41 | /// ```\n   42 | #[derive(Debug)]\n   43 | pub struct CleanupManager;\n   44 | \n   45 | impl CleanupManager {\n   46 |     /// Returns a reference to the global cleanup manager.\n   47 |     #[must_use]\n   48 |     pub fn global() -> &'static Self {\n   49 |         let _ = CLEANUP_MANAGER.get_or_init(|| Mutex::new(CleanupManagerState::new()));\n   50 |         &CLEANUP_MANAGER_INSTANCE\n   51 |     }\n   52 | \n   53 |     /// Registers a temporary file for cleanup.\n   54 |     ///\n   55 |     /// The file will be deleted when [`cleanup`](Self::cleanup) or\n   56 |     /// [`cleanup_temp_files`](Self::cleanup_temp_files) is called,\n   57 |     /// unless it is unregistered first.\n   58 |     pub fn register_temp_file(&self, path: PathBuf) {\n   59 |         if let Some(state) = CLEANUP_MANAGER.get() {\n   60 |             if let Ok(mut state) = state.lock() {\n   61 |                 state.temp_files.insert(path);  Provides a global cleanup manager that tracks temporary files, partial\n    4 | //! transfers, and other resources that need cleanup on shutdown or error.\n    5 | //! Signal handlers and RAII guards in the `transfer` and `core` crates use\n    6 | //! this registry to ensure stale temp files are removed on abnormal exit.\n    7 | \n    8 | use std::collections::HashSet;\n    9 | use std::path::{Path, PathBuf};\n   10 | use std::sync::{Mutex, OnceLock};\n   11 | \n   12 | /// Global cleanup manager instance.\n   13 | static CLEANUP_MANAGER: OnceLock<Mutex<CleanupManagerState>> = OnceLock::new();\n   14 | \n   15 | /// Cleanup manager for tracking and cleaning up temporary resources.\n   16 | ///\n   17 | /// This type provides a global registry for temporary files and resources\n   18 | /// that should be cleaned up on shutdown or error. It works with signal\n   19 | /// handlers and RAII guards to ensure stale temp files are removed.\n   20 | ///\n   21 | /// # Thread Safety\n   22 | ///\n   23 | /// All methods are thread-safe and can be called from multiple threads\n   24 | /// simultaneously. The internal state is protected by a mutex.\n   25 | ///\n   26 | /// # Examples\n   27 | ///\n   28 | /// ```\n   29 | /// use engine::CleanupManager;\n   30 | /// use std::path::PathBuf;\n   31 | ///\n   32 | /// // Register a temp file for cleanup\n   33 | /// let temp_file = PathBuf::from(\"/tmp/rsync.12345.tmp\");\n   34 | /// CleanupManager::global().register_temp_file(temp_file.clone());\n   35 | ///\n   36 | /// // Do work...\n   37 | ///\n   38 | /// // If successful, unregister so it's not cleaned up\n   39 | /// CleanupManager::global().unregister_temp_file(&temp_file);\n   40 | ///\n   41 | /// // Or if there's an error, cleanup all registered files\n   42 | /// // CleanupManager::global().cleanup();\n   43 | /// ```\n   44 | #[derive(Debug)]\n   45 | pub struct CleanupManager;\n   46 | \n   47 | impl CleanupManager {\n   48 |     /// Returns a reference to the anup_callbacks.push(callback);\n   91 |             }\n   92 |         }\n   93 |     }\n   94 | \n   95 |     /// Performs cleanup of all registered resources.\n   96 |     ///\n   97 |     /// This method:\n   98 |     /// 1. Runs all registered cleanup callbacks in reverse order (LIFO)\n   99 |     /// 2. Deletes all registered temporary files\n  100 |     /// 3. Clears all registered resources\n  101 |     ///\n  102 |     /// Cleanup errors are logged but do not prevent other cleanup from proceeding.\n  103 |     pub fn cleanup(&self) {\n  104 |         if let Some(state) = CLEANUP_MANAGER.get() {\n  105 |             if let Ok(mut state) = state.lock() {\n  106 |                 state.cleanup();\n  107 |             }\n  108 |         }\n  109 |     }\n  110 | \n  111 |     /// Cleans up only the registered temporary files.\n  112 |     ///\n  113 |     /// Similar to [`cleanup`](Self::cleanup) but only removes temporary files,\n  114 |     /// without running cleanup callbacks.\n  115 |     pub fn cleanup_temp_files(&self) {\n  116 |         if let Some(state) = CLEANUP_MANAGER.get() {\n  117 |             if let Ok(mut state) = state.lock() {\n  118 |                 state.cleanup_temp_files();\n  119 |             }\n  120 |         }\n  121 |     }\n  122 | \n  123 |     /// Returns the number of registered temporary files.\n  124 |     ///\n  125 |     /// Primarily useful for testing and diagnostics.\n  126 |     #[must_use]\n  127 |     pub fn temp_file_count(&self) -> usize {\n  128 |         if let Some(state) = CLEANUP_MANAGER.get() {\n  129 |             if let Ok(state) = state.lock() {\n  130 |                 return state.temp_files.len();\n  131 |             }\n  132 |         }\n  133 |         0\n  134 |     }\n  135 | \n  136 |     /// Clears all registered resources without performing cleanup.\n  137 |     ///\n  138 |     /// Primarily useful for testing.\n  139 |     #[doc(hidden)]\n  140 |     pub fn reset_for_testing(&self) {\n  141 | duction code in the workspace; they are exercised only by their own in-module tests.","fix":"Consolidate into a single platform-copy facade (or drop the unused public wrappers) and have one `copy_file_standard`. If kept as public API, route the engine's real copy path through them so they are not dead.","locations":[{"ref":"crates/engine/src/local_copy/win_copy.rs:119-228","code":"  119 | pub fn copy_file_optimized(src: &Path, dst: &Path) -> io::Result<WinCopyResult> {\n  120 |     copy_file_optimized_with(&DefaultPlatformCopy::new(), src, dst)\n  121 | }\n  122 | \n  123 | /// Variant of [`copy_file_optimized`] that uses a caller-supplied [`PlatformCopy`].\n  124 | ///\n  125 | /// Allows injecting a fake strategy in tests or wiring the strategy stored in\n  126 | /// `LocalCopyOptions` so engine paths share a single copy backend.\n  127 | ///\n  128 | /// # Errors\n  129 | ///\n  130 | /// Returns an error if every mechanism in the supplied strategy fails.\n  131 | pub fn copy_file_optimized_with(\n  132 |     platform_copy: &dyn PlatformCopy,\n  133 |     src: &Path,\n  134 |     dst: &Path,\n  135 | ) -> io::Result<WinCopyResult> {\n  136 |     let size_hint = std::fs::metadata(src).map(|m| m.len()).unwrap_or(0);\n  137 |     let result = platform_copy.copy_file(src, dst, size_hint)?;\n  138 |     // Zero-copy reflink methods (clonefile/FICLONE/ReFS) return\n  139 |     // bytes_copied=0 because no data physically traversed userspace.\n  140 |     // The caller-facing byte count is the logical file size so that\n  141 |     // progress and statistics reflect the data made available at the\n  142 |     // destination, matching upstream rsync's accounting.\n  143 |     let bytes = if result.is_zero_copy() {\n  144 |         size_hint\n  145 |     } else {\n  146 |         result.bytes_copied\n  147 |     };\n  148 |     match result.method {\n  149 |         CopyMethod::CopyFileEx | CopyMethod::ReFsReflink => Ok(WinCopyResult::WindowsCopy(bytes)),\n  150 |         _ => Ok(WinCopyResult::StandardCopy(bytes)),\n  151 |     }\n  152 | }\n  153 | \n  154 | /// Copy a file using Windows CopyFileExW (Windows only).\n  155 | ///\n  156 | /// Returns `Unsupported` error on non-Windows platforms. Delegates to\n  157 | /// [`fast_io::copy_file_ex::try_copy_file_ex`].\n  158 | ///\n  159 | /// # Platform Support\n  160 | ///\n  161 | /// - **Windows**: Calls `CopyFileExW` syscall with optional `COPY_FILE_NO_BUFFERING` flag\n  162 | /// - **Other platforms**: Always returns `ErrorKind::Unsupported`\n  163 | ///\n  164 | /// # Arguments\n  165 | ///\n  166 | /// * `src` - Source file path\n  167 | /// * `dst` - Destination file path\n  168 | /// * `_use_no_buffering` - Ignored; no-buffering is applied automatically based on file size\n  169 | ///\n  170 | /// # Errors\n  171 | ///\n  172 | /// Returns an error if:\n  173 | /// - Platform doesn't support CopyFileExW (non-Windows)\n  174 | /// - Source doesn't exist or isn't readable\n  175 | /// - Destination cannot be created\n  176 | /// - I/O error during copy\n  177 | ///\n  178 | /// # Examples\n  179 | ///\n  180 | /// ```\n  181 | /// use engine::local_copy::win_copy::try_win_copy;\n  182 | /// use tempfile::TempDir;\n  183 | ///\n  184 | /// let temp = TempDir::new().unwrap();\n  185 | /// let src = temp.path().join(\"source.txt\");\n  186 | /// let dst = temp.path().join(\"dest.txt\");\n  187 | /// std::fs::write(&src, b\"data\").unwrap();\n  188 | ///\n  189 | /// // On Windows: might succeed; on Linux: returns Unsupported\n  190 | /// let result = try_win_copy(&src, &dst, false);\n  191 | /// # #[cfg(not(target_os = \"windows\"))]\n  192 | /// # assert!(result.is_err());\n  193 | /// ```\n  194 | pub fn try_win_copy(src: &Path, dst: &Path, _use_no_buffering: bool) -> io::Result<u64> {\n  195 |     fast_io::copy_file_ex::try_copy_file_ex(src, dst)\n  196 | }\n  197 | \n  198 | /// Standard file copy (always available on all platforms).\n  199 | ///\n  200 | /// Uses `std::fs::co :"The strong-checksum-length and block-length heuristics are implemented twice,\nverbatim, in two separate modules: `block_size.rs::calculate_checksum_length` /\n`derive_block_length_sqrt` and `layout.rs::derive_strong_sum_length` /\n`derive_block_length`. Both copies contain the identical bias loop, the\nidentical `(bias + 1 - 32 + 7) / 8` formula, the identical sqrt binary search,\nand the identical clamping/constants (BLOCKSUM_BIAS=10, BLOCK_SIZE=700,\nMAX_BLOCK_SIZE=1<<17, OLD_MAX_BLOCK_SIZE=1<<29). They even redefine the same\nconstants under two names (e.g. `MAX_BLOCK_SIZE_V30` vs `MAX_BLOCK_SIZE`). This\nis a correctness-maintenance hazard: a future fix to one copy (e.g. an upstream\ncompatibility correction to the bias math) can easily be applied to only one\nmodule, silently producing divergent block layouts / checksum lengths depending\non which entry point a caller used.","fix":"Have `layout.rs` call into the `block_size.rs` functions (or vice versa) rather\nthan reimplementing them, and define each magic constant once. At minimum, add\na cross-reference test asserting the two paths agree across a sweep of file /\nblock sizes so divergence is caught.","locations":[{"ref":"crates/signature/src/block_size.rs:192-331","code":"  192 | pub fn calculate_checksum_length(\n  193 |     file_size: u64,\n  194 |     block_length: u32,\n  195 |     protocol_version: u8,\n  196 |     requested_checksum_length: u8,\n  197 | ) -> u8 {\n  198 |     // Protocol versions < 27 lack adaptive checksum length negotiation.\n  199 |     if protocol_version < 27 {\n  200 |         return requested_checksum_length;\n  201 |     }\n  202 | \n  203 |     // Phase 2 redo short-circuit: full collision resistance for retransmits.\n  204 |     if requested_checksum_length == MAX_SUM_LENGTH {\n  205 |         return MAX_SUM_LENGTH;\n  206 |     }\n  207 | \n  208 |     let mut bias = BLOCKSUM_BIAS;\n  209 |     let mut l = file_size;\n  210 |     while l >> 1 != 0 {\n  211 |         l >>= 1;\n  212 |         bias += 2;\n  213 |     }\n  214 | \n  215 |     let mut current = block_length;\n  216 |     while current >> 1 != 0 && bias > 0 {\n  217 |         current >>= 1;\n  218 |         bias -= 1;\n  219 |     }\n  220 | \n  221 |     let mut checksum_len = (bias + 1 - 32 + 7) / 8;\n  222 | \n  223 |     let min_len = i32::from(requested_checksum_length);\n  224 |     if checksum_len < min_len {\n  225 |         checksum_len = min_len;\n  226 |     }\n  227 | \n  228 |     let max_len = i32::from(MAX_SUM_LENGTH);\n  229 |     if checksum_len > max_len {\n  230 |         checksum_len = max_len;\n  231 |     }\n  232 | \n  233 |     checksum_len as u8\n  234 | }\n  235 | \n  236 | /// Calculates the number of blocks needed for a file.\n  237 | ///\n  238 | /// Returns the number of complete and partial blocks required to cover\n  239 | /// the entire file.\n  240 | ///\n  241 | /// # Arguments\n  242 | ///\n  243 | /// * `file_size` - Size of the file in bytes\n  244 | /// * `block_length` - Block size in bytes\n  245 | ///\n  246 | /// # Returns\n  247 | ///\n  248 | /// Number of blocks. Returns 0 for empty files.\n  249 | ///\n  250 | /// # Examples\n  251 | ///\n  252 | /// ```rust\n  253 | /// use signature::block_size::calculate_checksum_count;\n  254 | ///\n  255 | /// assert_eq!(calculate_checksum_count(0, 700), 0);\n  256 | /// assert_eq!(calculate_checksum_count(700, 700), 1);\n  257 | /// assert_eq!(calculate_checksum_count(701, 700), 2);\n  258 | /// assert_eq!(calculate_checksum_count(1400, 700), 2);\n  259 | /// assert_eq!(calculate_checksum_count(1401, 700), 3);\n  260 | /// ```\n  261 | #[must_use]\n  262 | pub fn calculate_checksum_count(file_size: u64, block_length: u32) -> u64 {\n  263 |     if file_size == 0 {\n  264 |         return 0;\n  265 |     }\n  266 | \n  267 |     let block_len = u64::from(block_length);\n  268 |     let full_blocks = file_size / block_len;\n  269 |     let remainder = file_size % block_len;\n  270 | \n  271 |     if remainder == 0 {\n  272 |         full_blocks\n  273 |     } else {\n  274 |         full_blocks + 1\n  275 |     }\n  276 | }\n  277 | \n  278 | /// Derives the block length using rsync's square root algorithm.\n  279 | ///\n  280 | /// This is the core block sizing heuristic. For files larger than\n  281 | /// `DEFAULT_BLOCK_SIZE²`, it computes an approximation of sqrt(file_size)\n  282 | /// by iteratively finding the largest value where `block_length² ≤ file_size`.\n  283 | ///\n  284 | /// The algorithm:\n  285 | /// 1. Start with a power-of-2 upper bound\n  286 | /// 2. Iteratively test bits from high to low\n  287 | /// 3. Set bits that keep `block_length² ≤ file_size`\n  288 | /// 4. Round down to multiples of 8 bytes\n  289 | ///\n  290 | /// This mirrors `generator.c:sum_sizes_sqroot()` from upstream rsync.\n  291 | fn derive_block_length_sqrt(file_size: u64, protocol_version: u8) -> u32 {\n  292 |     if file_size <= u64::from(DEFAULT_BLOCK_SIZE) * u64::from(DEFAULT_BLOCK_SIZE) {\n  293 |         return DEFAULT_BLOCK_SIZE;\n  294 |     }\n  295 | \n  296 |     let max_block_length = if protocol_version < 30 {\n  297 |         MAX_BLOCK_SIZE_OLD\n  298 |     } else {\n  299 |         MAX_BLOCK_SIZE_V30\n  300 |     };\n  301 | \n  302 |     // c = 2^(floor(log2(file_size)/2)): power-of-2 upper bound for sqrt(file_size).\n  303 |     let mut c: u64 = 1;\n  304 |     let mut l = file_size;\n  305 |     while l >> 2 != 0 {\n  306 |         c <<= 1;\n  307 |         l >>= 2;\n  308 |     }\n  309 | \n  310 |     if c >= u64::from(max_block_length) {\n  311 |         return max_block_length;\n  312 |     }\n  313 | \n  314 |     // Binary search for the largest block_length where block_length^2 <= file_size.\n  315 |     let mut block_length = 0u64;\n  316 |     let mut current = c;\n  317 |     while current >= 8 {\n  318 |         block_length |= current;\n  319 |         let candidate = u128::from(block_length);\n  320 |         if u128::from(file_size) < candidate * candidate {\n  321 |             block_length &= !current;\n  322 |         }\n  323 |         current >>= 1;\n  324 |     }\n  325 | \n  326 |     let block_length = block_length.max(u64::from(DEFAULT_BLOCK_SIZE));\n  327 | \n  328 |     #[allow(clippy::cast_possible_truncation)]\n  329 |     let result = block_length as u32;\n  330 |     result\n  331 | }","lines":140},{"ref":"crates/signature/src/layout.rs:231-316","code":"  231 | fn derive_block_length(file_length: u64, protocol: ProtocolVersion) -> u32 {\n  232 |     if file_length <= u64::from(BLOCK_SIZE).saturating_mul(u64::from(BLOCK_SIZE)) {\n  233 |         return BLOCK_SIZE;\n  234 |     }\n  235 | \n  236 |     let max_block_length = if protocol.as_u8() < 30 {\n  237 |         OLD_MAX_BLOCK_SIZE\n  238 |     } else {\n  239 |         MAX_BLOCK_SIZE\n  240 |     };\n  241 | \n  242 |     let mut c: u64 = 1;\n  243 |     let mut l = file_length;\n  244 |     while l >> 2 != 0 {\n  245 |         c <<= 1;\n  246 |         l >>= 2;\n  247 |     }\n  248 | \n  249 |     if c >= u64::from(max_block_length) {\n  250 |         return max_block_length;\n  251 |     }\n  252 | \n  253 |     let mut block_length = 0u64;\n  254 |     let mut current = c;\n  255 |     while current >= 8 {\n  256 |         block_length |= current;\n  257 |         let candidate = u128::from(block_length);\n  258 |         if u128::from(file_length) < candidate.saturating_mul(candidate) {\n  259 |             block_length &= !current;\n  260 |         }\n  261 |         current >>= 1;\n  262 |     }\n  263 | \n  264 |     let block_length = block_length.max(u64::from(BLOCK_SIZE));\n  265 |     block_length as u32\n  266 | }\n  267 | \n  268 | /// Computes the strong checksum length for a given file and block size.\n  269 | ///\n  270 | /// Behavior depends on the transfer phase:\n  271 | /// - **Phase 1** (`checksum_length = SHORT_SUM_LENGTH = 2`): dynamically computes\n  272 | ///   a length between 2-16 bytes us on, checksum verify, byte accumulation, permission-\nerror handling, warning formatting) differing only in the receive call\n(`try_recv` vs blocking `recv`) and the loop condition. The verbatim duplication\nof the warning string formatting and the permission-error path is a maintenance\nhazard - the two already drifted in their `pending_commits` decrement style\n(saturating vs bare). A bug fixed in one is easy to miss in the other.","fix":"Extract a single `handle_result(&mut self, result: io::Result<CommitResult>,\nbytes: &mut u64, meta_errors: &mut Vec<_>)` and have both drain methods call it,\nkeeping only the recv strategy and loop guard distinct.","locations":[{"ref":"crates/transfer/src/pipeline/receiver.rs:153-200","code":"  153 |     pub fn drain_ready_results(&mut self) -> io::Result<(u64, Vec<(PathBuf, String)>)> {\n  154 |         let mut bytes = 0u64;\n  155 |         let mut meta_errors = Vec::new();\n  156 | \n  157 |         loop {\n  158 |             match self.result_rx.try_recv() {\n  159 |                 Ok(Ok(result)) => {\n  160 |                     self.collect_delayed_update(&result);\n  161 |                     self.verify_checksum(&result)?;\n  162 |                     bytes += result.bytes_written;\n  163 |                     if let Some(err) = result.metadata_error {\n  164 |                         meta_errors.push(err);\n  165 |                     }\n  166 |                     self.pending_commits = self.pending_commits.saturating_sub(1);\n  167 |                 }\n  168 |                 Ok(Err(e)) => {\n  169 |                     self.pending_commits = self.pending_commits.saturating_sub(1);\n  170 |                     let pending = self.expected_checksums.pop_front();\n  171 |                     if is_permission_error(&e) {\n  172 |                         let path = pending.map(|p| p.file_path).unwrap_or_default();\n  173 |                         // upstream: sender.c:362 - rsyserr(FERROR_XFER, errno,\n  174 | hat the seeded variant substitutes `D::digest_with_seed` /\n`D::with_seed` for `D::digest` / `D::new`. The whole mmap-first / read-loop /\nresult-wrapping body (~40 lines) is duplicated. A bug fix to the I/O path (e.g.\nthe file-shrinks-during-read edge case) must be applied in both places.","fix":"Factor the common body into a single helper parameterised by a closure that\nproduces the digest from the bytes (`Fn(&[u8]) -> D::Digest`) and the streaming\nhasher, so the seeded and unseeded paths share one implementation.","locations":[{"ref":"crates/checksums/src/parallel/files.rs:22-71","code":"   22 | fn hash_file_internal<D>(path: &Path, config: &FileHashConfig) -> FileHashResult<D::Digest>\n   23 | where\n   24 |     D: StrongDigest,\n   25 |     D::Seed: Default,\n   26 | {\n   27 |     let result = (|| -> io::Result<(D::Digest, u64)> {\n   28 |         let mut file = File::open(path)?;\n   29 |         let metadata = file.metadata()?;\n   30 |         let size = metadata.len();\n   31 | \n   32 |         if size <= config.max_memory_file_size {\n   33 |             let mut data = vec![0u8; size as usize];\n   34 |             file.read_exact(&mut data)?;\n   35 |             return Ok((D::digest(&data), size));\n   36 |         }\n   37 | \n   38 |         if size >= MMAP_THRESHOLD {\n   39 |             if let Ok(mmap) = MmapReader::open(path) {\n   40 |                 let _ = mmap.advise_sequential();\n   41 |                 return Ok((D::digest(mmap.as_slice()), size));\n   42 |             }\n   43 |         }\n   44 | \n   45 |         // upstream: checksum.c - pre-sized read loop avoids trailing EOF probe\n   46 |         let mut hasher = D::new();\n   47 |         let mut buffer = vec![0u8; config.buffer_size];\n   48 |         let mut remaining = size;\n   49 |         while remaining > 0 {\n   50 |             let to_read = (remaining as usize).min(buffer.len());\n   51 |             file.read_exact(&mut buffer[..to_read])?;\n   52 |             hashe 239 |         while remaining > 0 {\n  240 |             let to_read = (remaining as usize).min(buffer.len());\n  241 |             file.read_exact(&mut buffer[..to_read])?;\n  242 |             hasher.update(&buffer[..to_read]);\n  243 |             remaining -= to_read as u64;\n  244 |         }\n  245 | \n  246 |         Ok((hasher.finalize(), size))\n  247 |     })();\n  248 | \n  249 |     match result {\n  250 |         Ok((digest, size)) => FileHashResult {\n  251 |             path: path.to_path_buf(),\n  252 |             digest: Ok(digest),\n  253 |             size,\n  254 |         },\n  255 |         Err(e) => FileHashResult {\n  256 |             path: path.to_path_buf(),\n  257 |             digest: Err(e),\n  258 |             size: 0,\n  259 |         },\n  260 |     }\n  261 | }","lines":54}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"high","description":"Path-traversal bypass in `validate_client_paths_in_module`: when `path.canonicalize()` fails\n(the common case for a `--temp-dir` / `--partial-dir` / `--backup-dir` that does not yet\nexist) the code falls back to the raw, non-canonicalized path and tests it with\n`canonical.starts_with(&module_root)`. `Path::starts_with` is purely component-based and does\nNOT resolve `..` segments, so an absolute path such as\n`--temp-dir=/srv/module/../../../etc` has components [/, srv, module, .., .., .., etc] and\nDOES start with `/srv/module`, passing the check. With chroot disabled (the default for many\nmodules, and now also reachable via the OPTION/dparam bug above), the transfer engine then\nwrites through that path, escaping the module root.","fix":"When canonicalize fails, do not silently accept the raw path. Either reject the path\noutright, or lexically normalize it (resolve `.`/`..` without touching the filesystem, e.g.\nvia a normalize routine) before the `starts_with(&module_root)` comparison, and reject any\npath that still escapes after normalization. Canonicalize the existing ancestor and join the\nremaining components, rejecting traversal that climbs above module_root.","locations":[{"ref":"crates/daemon/src/daemon/sections/module_access/transfer.rs:131-193","code":"  131 | fn validate_client_paths_in_module(\n  132 |     ctx: &mut ModuleRequestContext<'_>,\n  133 |     module: &ModuleRuntime,\n  134 |     client_args: &[String],\n  135 | ) -> io::Result<bool> {\n  136 |     let Ok(module_root) = module.path.canonicalize() else {\n  137 |         // Module path failed to canonicalize - the existence check above\n  138 |         // already succeeded, so this is a race or a permission problem; let\n  139 |         // the transfer continue and fail with a more precise error later.\n  140 |         return Ok(true);\n  141 |     };\n  142 | \n  143 |     let mut iter = client_args.iter().peekable();\n  144 |     while let Some(arg) = iter.next() {\n  145 |         let candidate = if let Some(rest) = arg.strip_prefix(\"--temp-dir=\") {\n  146 |             Some((\"--temp-dir\", rest.to_owned()))\n  147 |         } else if let Some(rest) = arg.strip_prefix(\"--partial-dir=\") {\n  148 |             Some((\"--partial-dir\", rest.to_owned()))\n  149 |         } else if let Some(rest) = arg.strip_prefix(\"--backup-dir=\") {\n  150 |             Some((\"--backup-dir\", rest.to_owned()))\n  151 |         } else if matches!(\n  152 |             arg.as_str(),\n  153 |             \"--temp-dir\" | \"--partial-dir\" | \"--backup-dir\"\n  154 |         ) {\n  155 |             iter.next().map(|v| (arg.as_str(), v.clone()))\n  156 |         } else {\n  157 |             None\n  158 |         };\n  159 | \n  160 |         let Some((flag, raw_path)) = candidate else {\n  161 |             continue;\n  162 |         };\n  163 | \n  164 |         // Relative paths resolve under the module root (or under the\n  165 |         // current cwd inside chroot), so they cannot escape - skip them.\n  166 |         let path = Path::new(&raw_path);\n  167 |         if path.is_relative() {\n  168 |             continue;\n  169 |         }\n  170 | \n  171 |         let canonical = path.canonicalize().unwrap_or_else(|_| path.to_path_buf());\n  172 |         if canonical.starts_with(&module_root) {\n  173 |             continue;\n  174 |         }\n  175 | \n  176 |         let payload = format!(\"@ERROR: {flag} path '{raw_path}' is outside module root\");\n  177 |         send_error_and_exit(ctx.reader.get_mut(), ctx.limiter, ctx.messages, &payload)?;\n  178 |         if let Some(log) = ctx.log_sink {\n  179 |             let text = format!(\n  180 |                 \"module '{}': rejected {flag}='{raw_path}' from {} ({}) - outside module root '{}'\",\n  181 |                 ctx.request,\n  182 |                 ctx.effective_host().unwrap_or(\"unknown\"),\n  183 |                 ctx.peer_ip,\n  184 |                 module_root.display(),\n  185 |             );\n  186 |             let message = rsync_error!(1, text).with_role(Role::Daemon);\n  187 |             log_message(log, &message);\n  188 |         }\n  189 |         return Ok(false);\n  190 |     }\n  191 | \n  192 |     Ok(true)\n  193 | }","lines":63}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"high","description":"Command injection via `%h` (and other) substitution into exec command strings. `expand_exec_command`\nperforms `%`-escape substitution on `pre-xfer exec` / `post-xfer exec` / early-exec / name-converter\ncommand strings, substituting `%h` (peer reverse-DNS hostname), `%a` (peer IP) and `%u`\n(username) directly into the command text, which is then executed via `sh -c <command>`\n(xfer_exec.rs build_xfer_command / NameConverter::spawn). The reverse-DNS hostname (`%h`) is\nattacker-controlled: a client whose PTR record resolves to e.g.\n`x$(rm -rf /srv)x` (or with backticks / `;`) injects shell commands when a module config uses\n`%h` in an exec directive. Upstream rsync passes these dynamic values only as environment\nvariables (R xpansion to exec command strings.\n  217 | ///\n  218 | /// Expands `%P`, `%m`, `%u`, `%a`, `%h`, `%p`, and `%%` in the exec command\n  219 | /// template using the provided path expansion context. Called before passing\n  220 | /// exec commands to the shell.\n  221 | ///\n  222 | /// upstream: `clientserver.c` - exec command strings are expanded at runtime\n  223 | /// before being passed to `sh -c`.\n  224 | fn expand_exec_command(command: &str, ctx: &PathExpansionContext<'_>) -> String {\n  225 |     expand_daemon_path(command, ctx)\n  226 | }","lines":42},{"ref":"crates/daemon/src/daemon/sections/xfer_exec.rs:40-70","code":"   40 | fn build_xfer_command(command: &str, ctx: &XferExecContext<'_>) -> ProcessCommand {\n   41 |     #[cfg(unix)]\n   42 |     let mut cmd = {\n   43 |         let mut c = ProcessCommand::new(\"sh\");\n   44 |         c.args([\"-c\", command]);\n   45 |         c\n   46 |     };\n   47 | \n   48 |     #[cfg(windows)]\n   49 |     let mut cmd = {\n   50 |         let mut c = ProcessCommand::new(\"cmd\");\n   51 |         c.args([\"/C\", command]);\n   52 |         c\n   53 |     };\n   54 | \n   55 |     cmd.env(\"RSYNC_MODULE_NAME\", ctx.module_name);\n   56 |     cmd.env(\"RSYNC_MODULE_PATH\", ctx.module_path);\n   57 |     cmd.env(\"RSYNC_HOST_ADDR\", ctx.host_addr.to_string());\n   58 |     cmd.env(\"RSYNC_HOST_NAME\", ctx.host_name.unwrap_or_default());\n   59 |     cmd.env(\"RSYNC_USER_NAME\", ctx.user_name.unwrap_or_default());\n   60 |     cmd.env(\"RSYNC_REQUEST\", ctx.request);\n   61 |     cmd.env(\"RSYNC_PID\", std::process::id().to_string());\n   62 | \n   63 |     // upstream: clientserver.c:write_pre_exec_args() - set numbered RSYNC_ARG<n>\n   64 |     // env vars from the client's argument list.\n   65 |     for (i, arg) in ctx.client_args.iter().enumerate() {\n   66 |         cmd.env(format!(\"RSYNC_ARG{i}\"), arg);\n   67 |     }\n   68 | \n   69 |     cmd\n   70 | }","lines":31},{"ref":"crates/daemon/src/daemon/sections                  if let Some(log) = ctx.log_sink {\n  801 |                     let message = rsync_error!(1, err.message).with_role(Role::Daemon);\n  802 |                     log_message(log, &message);\n  803 |                 }\n  804 |                 return Ok(());\n  805 |             }\n  806 |             Err(io_err) => {\n  807 |                 let error_msg = format!(\n  808 |                     \"failed to run pre-xfer exec command for module '{}': {io_err}\",\n  809 |                     ctx.request\n  810 |                 );\n  811 |                 let payload = format!(\"@ERROR: {error_msg}\");\n  812 |                 send_error_and_exit(ctx.reader.get_mut(), ctx.limiter, ctx.messages, &payload)?;\n  813 |                 if let Some(log) = ctx.log_sink {\n  814 |                     let message = rsync_error!(1, error_msg).with_role(Role::Daemon);\n  815 |                     log_message(log, &message);\n  816 |                 }\n  817 |                 return Ok(());\n  818 |             }\n  819 |         }\n  820 |     }","lines":54}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"medium","description":"`MemoryCap::wait_and_reserve` loops forever when `requested > limit`: the condition `current.saturating_add(requested) <= self.limit` can never become true, so the thread blocks on the condvar indefinitely (no timeout, no error). `acquire_adaptive_from` / `acquire_controlled_from` reserve `adaptive_buffer_size(file_size)` (up to 1 MiB) or the controller's recommended size, neither of which is clamped to the memory cap. A pool configured via `with_memory_cap`/`init_global_buffer_pool` with a cap below the per-buffer adaptive size therefore deadlocks the worker thread on the first large-file acquire.","fix":"Detect `requested > limit` in `wait_and_reserve`/`try_reserve` and either reserve the full limit (single-buffer override) or return an error; alternatively clamp the adaptive/controller buffer size to `memory_cap` in the acquire paths as `recommended_buffer_size` already does.","locations":[{"ref":"crates/engine/src/local_copy/buffer_pool/memory_cap.rs:56-109","code":"   56 |     pub(super) fn wait_and_reserve(&self, requested: usize) {\n   57 |         // Fast path: try to reserve with CAS, no locking needed.\n   58 |         loop {\n   59 |             let current = self.outstanding.load(Ordering::Acquire);\n   60 |             if current.saturating_add(requested) > self.limit {\n   61 |                 break; // Fall through to slow path.\n   62 |             }\n   63 |             if self\n   64 |                 .outstanding\n   65 |                 .compare_exchange_weak(\n   66 |                     current,\n   67 |                     current + requested,\n   68 |                     Ordering::AcqRel,\n   69 |                     Ordering::Acquire,\n   70 |                 )\n   71 |                 .is_ok()\n   72 |             {\n   73 |                 return;\n   74 |             }\n   75 |             // CAS failed due to concurrent modification, retry.\n   76 |         }\n   77 | \n   78 |         // Slow path: wait on the condvar and reserve with CAS.\n   79 |         // The mutex serializes waiters against each other, but the fast path\n   80 |         // can still succeed concurrently (lockless), so we must use CAS here\n   81 |         // too - a plain store would clobber a concurrent fast-path increment.\n   82 |         let mut guard = self\n   83 |             .backpressure\n   84 |             .lock()\n   85 |             .expect(\"backpressure mutex poisoned\");\n   86 |         loop {\n   87 |             let current = self.outstanding.load(Ordering::Acquire);\n   88 |             if current.saturating_add(requested) <= self.limit {\n   89 |                 if self\n   90 |                     .outstanding\n   91 |                     .compare_exchange(\n   92 |                         current,\n   93 |                         current + requested,\n   94 |                         Ordering::AcqRel,\n   95 |                         Ordering::Acquire,\n   96 |                     )\n   97 |                     .is_ok()\n   98 |                 {\n   99 |                     return;\n  100 |                 }\n  101 |                 // CAS failed - fast path grabbed it; re-check without waiting.\n  102 |                 continue;\n  103 |             }\n  104 |             guard = self\n  105 |                 .returned\n  106 |                 .wait(guard)\n  107 |                 .expect(\"backpressure condvar poisoned\");\n  108 |         }\n  109 |     }","lines":54},{"ref":"crates/engine/src/local_copy/buffer_pool/pool.rs:571-588","code":"  571 |     pub fn acquire_adaptive_from(pool: Arc<Self>, file_size: u64) -> BufferGuard<A> {\n  572 |         let desired = adaptive_buffer_size(file_size);\n  573 | \n  574 |         if desired == pool.buffer_size {\n  575 |             // Fast path: adaptive size matches pool default - check TLS and pool.\n  576 |             return Self::acquire_from(pool);\n  577 |         }\n  578 | \n  579 |         // Slow path: non-standard size - allocate fresh, skip TLS.\n  580 |         // On drop the guard will pass it through `return_buffer` which\n  581 |         // resizes it to the pool default before returning it.\n  582 |         pool.wait_and_reserve_memory(desired);\n  583 |         let buffer = pool.allocator.allocate(desired);\n  584 |         BufferGuard {\n  585 |             buffer: Some(buffer),\n  586 |             pool,\n  587 |         }\n  588 |     }","lines":18}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","description":"In the daemon handshake the username used for authentication and the module name are written into\nthe line-oriented daemon protocol without validating that they contain no newline. `module_request`\nis `format!(\"{}\\n\", request.module)` and the auth line is `format!(\"{username} {digest_response}\\n\")`,\nwhere both `modul ide\n  278 |                 .map(|s| s.to_vec())\n  279 |                 .or_else(load_daemon_password)\n  280 |                 .ok_or_else(|| {\n  281 |                     daemon_error(\n  282 |                         \"daemon requires authentication but no password source available \\\n  283 |                          (use --password-command, --password-file, or RSYNC_PASSWORD)\",\n  284 |                         CLIENT_SERVER_PROTOCOL_EXIT_CODE,\n  285 |                     )\n  286 |                 })?;\n  287 | \n  288 |             let username = request.username.clone().unwrap_or_else(|| {\n  289 |                 std::env::var(\"USER\")\n  290 |                     .or_else(|_| std::env::var(\"USERNAME\"))\n  291 |                     .unwrap_or_else(|_| \"rsync\".to_owned())\n  292 |             });\n  293 | \n  294 |             // upstream: compat.c:858 - fallback depends on protocol version\n  295 |             let digest = select_daemon_digest(&advertised_digests, remote_protocol.as_u8());\n  296 | \n  297 |             // upstream: compat.c:865-868 - `DEBUG_GTE(NSTR, 1)` emits\n  298 |             // \"Client negotiated auth: <name>\" after the strongest mutual\n  299 |             // digest is selected.\n  300 |             trace_daemon_auth_negotiated(digest.name());\n  301 | \n  302 |             // Send auth credentials via the writer (not through BufReader).\n  303 |             let digest_response = compute_daemon_auth_response(&secret, challenge, digest);\n  304 |             let auth_line = format!(\"{username} {digest_response}\\n\");\n  305 |             writer.write_all(auth_line.as_bytes()).map_err(|e| {\n  306 |                 socket_error(\n  307 |                     \"send auth credentials to\",\n  308 |                     request.address.socket_addr_display(),\n  309 |                     e,\n  310 |                 )\n  311 |             })?;\n  312 |             writer\n  313 |                 .flush()\n  314 |                 .map_err(|e| socket_error(\"flush to\", request.address.socket_addr_display(), e))?;\n  315 | \n  316 |             continue;","lines":68}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"low","description":"Secrets-file permission check does not verify ownership and follows symlinks. `SecretsFile::\ncheck_permissions` (and the module-side check) use `fs::metadata` (which follows symlinks) and\nonly reject group/other-readable bits (`mode & 0o044`). It does not verify the file is owned\nby root/the daemon user. A secrets file owned by an unprivileged user but mode 0600 passes,\nallowing that user to control daemon passwords. Upstream additionally warns/refuses on\nunexpected ownership.","fix":"Also check `metadata.uid()` against the expected owner (root or the daemon's effective uid)\nand consider using symlink_metadata or O_NOFOLLOW semantics so a symlinked secrets file cannot\nmask a permissive target. Reject when ownership is unexpected.","locations":[{"ref":"crates/daemon/src/auth.rs:360-381","code":"  360 |     #[cfg(unix)]\n  361 |     pub fn check_permissions(path: &Path) -> io::Result<()> {\n  362 |         use std::os::unix::fs::PermissionsExt;\n  363 | \n  364 |         let metadata = fs::metadata(path)?;\n  365 |         let permissions = metadata.permissions();\n  366 |         let mode = permissions.mode();\n  367 | \n  368 |         // Check for world-readable (bit 2) or group-readable (bit 5)\n  369 |         if (mode & 0o044) != 0 {\n  370 |             return Err(io::Error::new(\n  371 |                 io::ErrorKind::PermissionDenied,\n  372 |                 format!(\n  373 |                     \"secrets file '{}' must not be readable by group or others (mode {:o})\",\n  374 |                     path.display(),\n  375 |                     mode & 0o777\n  376 |                 ),\n  377 |             ));\n  378 |         }\n  379 | \n  380 |         Ok(())\n  381 |     }","lines":22}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"negligible","description":"On Windows, `device_identifier` derives the hard-link device id solely from the path prefix (drive letter or hashed UNC server/share) because the std volume-serial accessor is unstable. Two distinct volumes mounted under directory mount points on the same drive letter share the same derived device id, so cross-device hard-link detection can misclassify files as same-device (potential `EXDEV` at link time) or, conversely, treat files on the same volume reached via different prefixes as cross-device. Documented as a fallback, but worth flagging as a correctness gap for hard-link preservation on Windows mount points.","fix":"When available, query the real volume serial number via GetFileInformationByHandle (BY_HANDLE_FILE_INFORMATION.dwVolumeSerialNumber) for an accurate per-volume id instead of deriving it from the path prefix.","locations":[{"ref":"crates/engine/src/local_copy/overrides.rs:112-152","code":"  112 |     #[cfg(windows)]\n  113 |     {\n  114 |         use std::borrow::Cow;\n  115 |         use std::hash::{Hash, Hasher};\n  116 |         use std::path::{Component, Prefix};\n  117 | \n  118 |         fn normalize_path<'a>(path: &'a Path) -> Cow<'a, Path> {\n  119 |             if path.is_absolute() {\n  120 |                 Cow::Borrowed(path)\n  121 |             } else {\n  122 |                 std::env::current_dir()\n  123 |                     .map(|cwd| Cow::Owned(cwd.join(path)))\n  124 |                     .unwrap_or_else(|_| Cow::Borrowed(path))\n  125 |             }\n  126 |         }\n  127 | \n  128 |         fn device_from_components(path: &Path) -> Option<u64> {\n  129 |             let mut components = path.components();\n  130 |             match components.next()? {\n  131 |                 Component::Prefix(prefix) => match prefix.kind() {\n  132 |                     Prefix::Disk(letter) | Prefix::VerbatimDisk(letter) => Some(letter as u64),\n  133 |                     Prefix::UNC(server, share) | Prefix::VerbatimUNC(server, share) => {\n  134 |                         let mut hasher = std::collections::hash_map::DefaultHasher::new();\n  135 |                         server.hash(&mut hasher);\n  136 |                         share.hash(&mut hasher);\n  137 |                         Some(hasher.finish())\n  138 |                     }\n  139 |                     _ => None,\n  140 |                 },\n  141 |                 _ => None,\n  142 |             }\n  143 |         }\n  144 | \n  145 |         let absolute = normalize_path(path);\n  146 |         // The standard library's `MetadataExt::volume_serial_number` accessor is currently\n  147 |         // unstable on Windows, so fall back to deriving the device identifier from the path\n  148 |         // components instead.\n  149 |         let _ = metadata;\n  150 | \n  151 |         device_from_components(absolute.as_ref())\n  152 |     }","lines":41}]},{"id":"ARCHIT_1","type":"architecture","type_label":"Architecture","severity":"high","description":"Process-wide chroot/privilege drop applied per-connection in a thread-per-connection model.\nThe daemon uses `thread::spawn` per connection (server_runtime/connection.rs:204) rather than\nfork-per-connection. `apply_chroot` and `drop_privileges` (privilege.rs) call process-global\n`chroot(2)` / `setuid(2)` / `setgid(2)` syscalls, which affect EVERY thread of the process,\nnot just the connection that triggered them. Consequences:\n- A connection to module A with `use chroot = yes` chroots the whole daemon, breaking or\n  mis-rooting concurrent connections to other modules.\n- `setuid` is irreversible: once one connection drops to e.g. nobody, all subsequent\n  connections (and the accept loop) run as nobody and can no longer chroot or drop to other\n  uids, silently weakening or breaking per-module privilege separation.\n- A connection that has not yet dropped privileges may suddenly find itself running as a\n  different uid mid-transfer due to another thread's drop (TOCTOU on the global credential).\nThe code comments acknowledge this, but it is a real security/correctness defect for any\ndaemon serving more than one module or more than one concurrent connection with differing\nchroot/uid/gid settings.","fix":"Per-connection chroot and uid/gid drop are only safe with a fork-per-connection model. Either\nfork a child process per connection before chroot/setuid (as upstream rsync does), or restrict\nthe daemon to a single module / single global identity and apply chroot+drop once before the\naccept loop. Do not apply per-module chroot/setuid from worker threads of a shared process.","locations":[{"ref":"crates/daemon/src/daemon/sections/privilege.rs:24-124","code":"   24 | #[cfg(unix)]\n   25 | fn apply_chroot(module_path: &Path, log_sink: &SharedLogSink) -> io::Result<()> {\n   26 |     if let Err(err) = platform::privilege::apply_chroot(module_path) {\n   27 |         let text = format!(\"chroot to '{}' failed: {}\", module_path.display(), err);\n   28 |         let message = rsync_error!(1, text).with_role(Role::Daemon);\n   29 |         log_message(log_sink, &message);\n   30 |         return Err(err);\n   31 |     }\n   32 | \n   33 |     protocol::chdir::trace_change_dir(protocol::chdir::ChdirRole::PreForkReceiver, \"/\");\n   34 | \n   35 |     let text = format!(\"chroot applied: '{}'\", module_path.display());\n   36 |     let message = rsync_info!(text).with_role(Role::Daemon);\n   37 |     log_message(log_sink, &message);\n   38 | \n   39 |     Ok(())\n   40 | }\n   41 | \n   42 | /// No-op chroot stub for non-Unix platforms.\n   43 | #[cfg(not(unix))]\n   44 | fn apply_chroot(_module_path: &Path, _log_sink: &SharedLogSink) -> io::Result<()> {\n   45 |     Ok(())\n   46 | }\n   47 | \n   48 | /// Drops process privileges to the specified uid and gid.\n   49 | ///\n   50 | /// Delegates to `platform::privilege::drop_privileges()`. The underlying call\n   51 | /// sequence is `setgroups` -> `s ,\n  412 |     filter_program: Option<FilterProgram>,\n  413 | }\n  414 | \n  415 | impl<'a> LocalCopyOptionsBuilder<'a> {\n  416 |     const fn new(config: &'a ClientConfig, filter_program: Option<FilterProgram>) -> Self {\n  417 |         Self {\n  418 |             config,\n  419 |             filter_program,\n  420 |         }\n  421 |     }\n  422 | \n  423 |     fn build(self) -> LocalCopyOptions {\n  424 |         let config = self.config;\n  425 |         let mut options = LocalCopyOptions::default();\n  426 | \n  427 |         options = self.apply_recursion_and_delete(options, config);\n  428 |         options = self.apply_core_limits_and_bandwidth(options, config);\n  429 |         options = self.apply_compression(options, config);\n  430 |         options = self.apply_metadata_preservation(options, config);\n  431 |         options = self.apply_behavioral_flags(options, config);\n  432 |         options = self.apply_paths_and_backups(options, config);\n  433 |         options = self.apply_time_and_timeout(options, config);\n  434 |         options = self.apply_reference_directories(options, config);\n  435 |         options = self.apply_iconv(options, config);\n  436 |         options = Self::apply_cow_policy(options, config);\n  437 |         options = self.apply_filter_program(options);\n  438 |         options = Self::apply_zero_copy_policy(options, config);\n  439 | \n  440 |         options\n  441 |     }\n  442 | \n  443 |     /// Swaps in [`fast_io::NoZeroCopyPlatformCopy`] when the user passed\n  444 |     /// `--no-zero-copy`, forcing whole-file copies through the portable\n  445 |     /// `std::fs::copy` fallback.\n  446 |     ///\n  447 |     /// `Auto` and `Enabled` leave the engine's default platform copy\n  448 |     /// strategy in place so the platform fallback chain\n  449 |     /// (`FICLONE`/`copy_file_range` on Linux, `clonefile`/`fcopyfile` on\n  450 |     /// macOS, `CopyFileExW`/ReFS on Windows) remains active.\n  451 |     fn apply
