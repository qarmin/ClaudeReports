| \n  381 |     let buffered = buf_reader.buffer().to_vec();\n  382 |     let mut reader_half = buf_reader.into_inner();\n  383 | \n  384 |     match role {\n  385 |         RemoteRole::Receiver => run_pull_transfer(\n  386 |             config,\n  387 |             &mut reader_half,\n  388 |             &mut writer_half,\n  389 |             guard,\n  390 |             &local_paths,\n  391 |             protocol,\n  392 |             batch_ctx,\n  393 |             buffered,\n  394 |             observer,\n  395 |         ),\n  396 |         RemoteRole::Sender => run_push_transfer(\n  397 |             config,\n  398 |             &mut reader_half,\n  399 |             &mut writer_half,\n  400 |             guard,\n  401 |             &local_paths,\n  402 |             protocol,\n  403 |             batch_ctx,\n  404 |             buffered,\n  405 |             observer,\n  406 |         ),\n  407 |         RemoteRole::Proxy => {\n  408 |             unreachable!(\"Proxy transfers via daemon-over-remote-shell are rejected earlier\")\n  409 |         }\n  410 |     }\n  411 | }","lines":83},{"ref":"crates/core/src/client/module_list/connect/mod.rs:269-283","code":"  269 | pub(crate) enum DaemonStreamGuard {\n  270 |     /// No resource to guard (TCP).\n  271 |     None,\n  272 |     /// Owns a connect program child process.\n  273 |     Child(std::process::Child),\n  274 | }\n  275 | \n  276 | impl Drop for DaemonStreamGuard {\n  277 |     fn drop(&mut self) {\n  278 |         if let Self::Child(child) = self {\n  279 |             let _ = child.kill();\n  280 |             let _ = child.wait();\n  281 |         }\n  282 |     }\n  283 | }","lines":15}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"PROXY protocol header parsing wraps the stream in a fresh `BufReader` (`BufReader::new(&mut\n*stream)`) and parses the header through it, then drops the BufReader. v2 parsing uses\n`read_exact`, but the BufReader may have read ahead (default 8 KiB) beyond the PROXY header\ninto the subsequent `@RSYNCD:` greeting bytes when a proxy/client pipelines the header and the\nrsync data in one segment. Those buffered-but-unconsumed bytes are discarded when the\nBufReader is dropped, corrupting/truncating the rsync handshake that follows. Only triggered\nwhen `proxy protocol = true`, but PROXY-emitting front-ends commonly coalesce the header with\nfollowing data.","fix":"Parse the PROXY header by reading directly from the stream (the v2 path is fully length-\nprefixed and the v1 path already reads byte-by-byte), so no read-ahead occurs; or propagate\nthe same BufReader into the rest of the session so any buffered bytes are preserved. Do not\ncreate and drop a transient BufReader over the live socket.","locations":[{"ref":"crates/daemon/src/daemon/sections/proxy_protocol.rs:214-217","code":"  214 | pub(crate) fn parse_proxy_header(stream: &mut DaemonStream) -> io::Result<Option<SocketAddr>> {\n  215 |     let mut reader = BufReader::new(&mut *stream);\n  216 |     parse_proxy_header_from(&mut reader)\n  217 | }","lines":4}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`DeferredSync::flush_files` syncs only the first pending file's filesystem when more than 10 files are queued and `syncfs()` succeeds, then returns Ok and skips all other files. If the queued files span multiple filesystems/mount points (a transfer can write across bind mounts, subvolumes, or different `--link-dest`/temp-dir devices), files on every filesystem other than the first one are never fsynced even though the user requested `--fsync`. The durability guarantee is silently broken for those files.","fix":"Group pending files by device id (statx/dev) and call syncfs once per distinct filesystem, or fall back to per-file fsync for files not on the synced filesystem. Do not early-return after syncing a single fd.","locations":[{"ref":"crates/engine/src/local_copy/deferred_sync.rs:184-206","code":"  184 |     fn flush_files(&self) -> io::Result<()> {\n  185 |         // For large batches, syncfs() amortises the syscall cost across the\n  186 |         // entire filesystem in one call. Fall back to per-file fsync on\n  187 |         // platforms without syncfs or when the call fails.\n  188 |         #[cfg(target_os = \"linux\")]\n  189 |         if self.pending_files.len() > 10 {\n  190 |             if let Some(first) = self.pending_files.first() {\n  191 |                 if sync_filesystem(first).is_ok() {\n  192 |                     return Ok(());\n  193 |                 }\n  194 |             }\n  195 |         }\n  196 | \n  197 |         for path in &self.pending_files {\n  198 |             if let Err(e) = sync_file(path) {\n  199 |                 // A vanished file is not a fatal sync error; skip and continue.\n  200 |                 if e.kind() != io::ErrorKind::NotFound {\n  201 |                     return Err(e);\n  202 |                 }\n  203 |             }\n  204 |         }\n  205 |         Ok(())\n  206 |     }","lines":23}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`sync_file` opens the destination read+write to satisfy Windows `FlushFileBuffers`, but on Unix a read-only destination file (e.g. mode 0444, common when `--perms` copies read-only sources, or when running as a non-owner) cannot be opened with `write(true)` and returns `PermissionDenied`. In `flush_files` only `NotFound` is tolerated, so any read-only file in the pending batch makes the whole `--fsync` flush return an error and aborts the transfer's sync stage. A read-only file should still be syncable via a read-only handle on Unix.","fix":"On Unix, open the file read-only for fsync (sync_all works on an O_RDONLY fd); only Windows needs the write handle. Alternatively, tolerate PermissionDenied in flush_files the same way NotFound is tolerated, or fsync via the still-open write fd before the guard closes it.","locations":[{"ref":"crates/engine/src/local_copy/deferred_sync.rs:254-260","code":"  254 | fn sync_file(path: &Path) -> io::Result<()> {\n  255 |     let file = std::fs::OpenOptions::new()\n  256 |         .read(true)\n  257 |         .write(true)\n  258 |         .open(path)?;\n  259 |     file.sync_all()\n  260 | }","lines":7},{"ref":"crates/engine/src/local_copy/deferred_sync.rs:197-204","code":"  197 |         for path in &self.pending_files {\n  198 |             if let Err(e) = sync_file(path) {\n  199 |                 // A vanished file is not a fatal sync error; skip and continue.\n  200 |                 if e.kind() != io::ErrorKind::NotFound {\n  201 |                     return Err(e);\n  202 |                 }\n  203 |             }\n  204 |         }","lines":8}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In the streaming token loop, two error paths in the `BlockRef` arm propagate\nerrors with `?` WITHOUT first sending `FileMessage::Abort` to the disk thread,\nunlike every other error path in the same function which calls\n`send_abort(...)` before returning. Specifically `basis_map.map_ptr(offset,\nbytes_to_copy)?` (line 179) and `token_reader.see_token(block_data)?` (line\n183). When either fails (e.g. a corrupt/short basis file, or a decompressor\ndesync), the network thread returns Err but the disk thread is left waiting on\nthe channel for more Chunk/Commit messages for the in-progress file. It will\nonly unblock when the channel is dropped (disconnect), at which point the\nin-progress temp file is treated as a disconnect rather than an explicit\nabort. This is an inconsistency that can change partial-retention behavior and\nmuddles error reporting versus the explicit-Abort paths.","fix":"Wrap both fallible calls so they send an Abort before returning, mirroring the\nother arms, e.g.:\n`let block_data = match basis_map.map_ptr(offset, bytes_to_copy) { Ok(b) => b,\nErr(e) => { send_abort(file_tx, format!(\"basis read error: {e}\")); return\nErr(e); } };` and the same pattern around `see_token`.","locations":[{"ref":"crates/transfer/src/transfer_ops/token_loop.rs:179-183","code":"  179 |                     let block_data = basis_map.map_ptr(offset, bytes_to_copy)?;\n  180 | \n  181 |                     // upstream: token.c:631 - see_deflate_token() keeps the\n  182 |                     // decompressor dictionary in sync after block matches.\n  183 |                     token_reader.see_token(block_data)?;","lines":5}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`apply_delta_ops` is a public API whose Copy block for the last block uses the\ncaller-supplied `remainder`. If a caller passes `remainder == 0` for a file\nwhose size is an exact multiple of `block_length` (a plausible value: 0 means\n\"no short final block\"), the final block writes 0 bytes via `effective_length`,\nsilently truncating the reconstructed file. The internal caller in\ndelta_phase.rs avoids this by mapping `remainder_wire == 0` to `block_length`,\nbut the public function does not document or enforce that invariant.","fix":"Treat `remainder == 0` as a full `block_length` final block inside\n`apply_delta_ops` (e.g. `let effective_remainder = if remainder == 0 { block_length } else { remainder };`),\nor document the precondition and debug-assert it.","locations":[{"ref":"crates/batch/src/replay/delta.rs:150-156","code":"  150 |                 let effective_length = if length > 0 {\n  151 |                     length as usize\n  152 |                 } else if block_count > 0 && block_index == block_count - 1 {\n  153 |                     remainder\n  154 |                 } else {\n  155 |                     block_length\n  156 |                 };","lines":7}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"The async SSH transport (`run_async_session`) never collects or maps the remote SSH child's exit\nstatus. After the blocking server task finishes it simply awaits/drops the pump tasks and returns\nthe server outcome. Unlike the synchronous path (`run_server_over_ssh_connection`), a remote rsync\nprocess that exits non-zero while the protocol stream still completed normally will be reported as\nsuccess. This path is gated behind the `async-ssh` feature and the `OC_RSYNC_ASYNC_SSH` env var and\nis documented as scaffolding, hence low severity.","fix":"Capture the SSH child's exit status from `AsyncSshTransport` after the pumps drain and map it via\n`map_child_exit_status`, propagating the worst of the transfer and child exit codes, matching the\nsynchronous SSH path.","locations":[{"ref":"crates/core/src/client/remote/async_ssh_transport.rs:259-392","code":"  259 |     runtime.block_on(async move {\n  260 |         let transport = AsyncSshTransport::execute_remote_rsync(\n  261 |             &plan.remote,\n  262 |             &plan.invocation_args,\n  263 |             &plan.config,\n  264 |         )\n  265 |         .await\n  266 |         .map_err(|e| {\n  267 |             invalid_argument_error(\n  268 |                 &format!(\"failed to spawn async SSH connection: {e}\"),\n  269 |                 super::super::IPC_EXIT_CODE,\n  270 |             )\n  271 |         })?;\n  272 | \n  273 |         let (mut async_reader, mut async_writer) = transport_split(transport);\n  274 | \n  275 |         // upstream: rsync.c:283-320 send_protected_args() ships the\n  276 |         // null-separated arg list over stdin before protocol negotiation.\n  277 |         // Done here on the async side because AsyncSshTransport owns\n  278 |         // stdin until we hand it to the pump below.\n  279 |         if !stdin_args.is_empty() {\n  280 |             let arg_refs: Vec<&str> = stdin_args.iter().map(String::as_str).collect();\n  281 |             protocol::cmd::trace_protected_args(&arg_refs);\n  282 |             let payload = encode_secluded_args(&arg_refs, iconv_converter.as_ref());\n  283 |             async_writer.write_all(&payload).await.map_err(|e| {\n  284 |                 invalid_argument_error(\n  285 |                     &format!(\"failed to send secluded args: {e}\"),\n  286 |                     super::super::IPC_EXIT_CODE,\n  287 |                 )\n  288 |             })?;\n  289 |             async_writer.flush().await.map_err(|e| {\n  290 |                 invalid_argument_error(\n  291 |                     &format!(\"failed to flush secluded args: {e}\"),\n  292 |                     super::super::IPC_EXIT_CODE,\n  293 |                 )\n  294 |             })?;\n  295 |         }\n  296 | \n  297 |         // Async-side channels driving the ChannelReader/Writer adapters.\n  298 |         let (sync_to_ssh_tx, sync_to_ssh_rx) = tokio_mpsc::channel::<Vec<u8>>(CHANNEL_CAPACITY);\n  299 |         let (ssh_to_sync_tx, ssh_to_sync_rx) = tokio_mpsc::channel::<Vec<u8>>(CHANNEL_CAPACITY);\n  300 | \n  301 |         let mut writer_bridge = ChannelReader::new(sync_to_ssh_rx);\n  302 |         let mut reader_bridge = ChannelWriter::new(ssh_to_sync_tx);\n  303 | \n  304 |         // Outbound pump: drain sync writes from the channel and push them\n  305 |         // into the ssh stdin half.\n  306 |         let outbound = tokio::spawn(async move {\n  307 |             let mut buf = vec![0u8; PUMP_BUF];\n  308 |             loop {\n  309 |                 let n = writer_bridge.read(&mut buf).await?;\n  310 |                 if n == 0 {\n  311 |                     break;\n  312 |                 }\n  313 |                 async_writer.write_all(&buf[..n]).await?;\n  314 |             }\n  315 |             async_writer.shutdown().await?;\n  316 |             Ok::<(), io::Error>(())\n  317 |         });\n  318 | \n  319 |         // Inbound pump: read ssh stdout and forward bytes to the sync\n  320 |         // reader via ChannelWriter.\n  321 |         let inbound = tokio::spawn(async move {\n  322 |             let mut buf = vec![0u8; PUMP_BUF];\n  323 |             loop {\n  324 |                 let n = async_reader.read(&mut buf).await?;\n  325 |                 if n == 0 {\n  326 |                     break;\n  327 |                 }\n  328 |                 reader_bridge.write_all(&buf[..n]).await?;\n  329 |             }\n  330 |             reader_bridge.shutdown().await?;\n  331 |             Ok::<(), io::Error>(())\n  332 |         });\n  333 | \n  334 |         // Sync side of the bridge: SyncReader/SyncWriter that the\n  335 |         // blocking server thread sees, fed by std_mpsc channels which are\n  336 |         // in turn pumped to/from the tokio mpsc channels above.\n  337 |         let (sync_reader_tx, sync_reader_rx) = std_mpsc::sync_channel::<Vec<u8>>(CHANNEL_CAPACITY);\n  338 |         let (sync_writer_tx, sync_writer_rx) = std_mpsc::sync_channel::<Vec<u8>>(CHANNEL_CAPACITY);\n  339 | \n  340 |         let mut ssh_to_sync_rx = ssh_to_sync_rx;\n  341 |         let reader_fanout = tokio::spawn(async move {\n  342 |             while let Some(chunk) = ssh_to_sync_rx.recv().await {\n  343 |                 if sync_reader_tx.send(chunk).is_err() {\n  344 |                     break;\n  345 |                 }\n  346 |             }\n  347 |         });\n  348 | \n  349 |         let writer_fanin = tokio::task::spawn_blocking(move || {\n  350 |             while let Ok(chunk) = sync_writer_rx.recv() {\n  351 |                 if sync_to_ssh_tx.blocking_send(chunk).is_err() {\n  352 |                     break;\n  353 |                 }\n  354 |             }\n  355 |         });\n  356 | \n  357 |         let sync_reader = SyncReader::new(sync_reader_rx);\n  358 |         let sync_writer = SyncWriter::new(sync_writer_tx);\n  359 | \n  360 |         let batch_ctx_for_blocking = batch_ctx;\n  361 |         let server_handle = tokio::task::spawn_blocking(move || {\n  362 |             let start = Instant::now();\n  363 |             run_blocking_server(\n  364 |                 server_config,\n  365 |                 sync_reader,\n  366 |                 sync_writer,\n  367 |                 batch_ctx_for_blocking,\n  368 |                 start,\n  369 |             )\n  370 |         });\n  371 | \n  372 |         let server_outcome = server_handle.await.map_err(|e| {\n  373 |             invalid_argument_error(\n  374 |                 &format!(\"async SSH server task panicked: {e}\"),\n  375 |                 ExitCode::WaitChild.as_i32(),\n  376 |             )\n  377 |         })?;\n  378 | \n  379 |         // Drain background tasks so nothing outlives this future. Pump\n  380 |         // errors are advisory; the authoritative result is the server\n  381 |         // outcome.\n  382 |         let _ = reader_fanout.await;\n  383 |         let _ = writer_fanin.await;\n  384 |         let _ = outbound.await;\n  385 |         let _ = inbound.await;\n  386 | \n  387 |         match server_outcome {\n  388 |             Ok((stats, elapsed)) => Ok(convert_server_stats_to_summary(stats, elapsed)),\n  389 |             Err(err) => Err(err),\n  390 |         }\n  391 |     })\n  392 | }","lines":134}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `punch_hole` (Linux), Strategy 1 (PUNCH_HOLE) and Strategy 2 (ZERO_RANGE) both have a catch-all `Err(_) => {}` arm identical to the expected-fallback arm, so a genuine I/O failure (EIO, ENOSPC, EBADF) is silently swallowed and the code falls through to writing explicit zeros. A real error during hole punching is thereby masked and may surface only later (or never, masking ENOSPC by allocating instead of deallocating). Currently low impact because the function is dead in production (see the hole-punch dead-code finding).","fix":"Match only the genuine unsupported errnos (OPNOTSUPP/NOSYS/INVAL) for fallthrough and propagate other errnos as errors before falling back to the next strategy.","locations":[{"ref":"crates/engine/src/local_copy/executor/file/sparse/hole_punch.rs:64-87","code":"   64 |     match fallocate(fd, punch_flags, pos, len) {\n   65 |         Ok(()) => {\n   66 |             file.seek(SeekFrom::Start(pos + len))\n   67 |                 .map_err(|e| LocalCopyError::io(\"seek after hole punch\", path, e))?;\n   68 |             return Ok(());\n   69 |         }\n   70 |         Err(Errno::OPNOTSUPP | Errno::NOSYS | Errno::INVAL) => {}\n   71 |         Err(_) => {}\n   72 |     }\n   73 | \n   74 |     // Strategy 2: ZERO_RANGE zeroes the range without allocation on some\n   75 |     // filesystems.\n   76 |     match fallocate(fd, FallocateFlags::ZERO_RANGE, pos, len) {\n   77 |         Ok(()) => {\n   78 |             file.seek(SeekFrom::Start(pos + len))\n   79 |                 .map_err(|e| LocalCopyError::io(\"seek after zero range\", path, e))?;\n   80 |             return Ok(());\n   81 |         }\n   82 |         Err(Errno::OPNOTSUPP | Errno::NOSYS | Errno::INVAL) => {}\n   83 |         Err(_) => {}\n   84 |     }\n   85 | \n   86 |     // Strategy 3: write zeros - universal but allocates disk space.\n   87 |     write_zeros_fallback(file, path, len)","lines":24}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`IocpWriter::open_with_disposition` calls\n`SetFileCompletionNotificationModes(handle, FILE_SKIP_COMPLETION_PORT_ON_SUCCESS)`\nand discards the return value entirely (no `let _ =`, no check). The SAFETY\ncomment claims failures are \"non-fatal because the writer also handles sync\ncompletions explicitly below\", but `write_at` does NOT drain on synchronous\nTRUE - it returns `Ok(bytes_written)` inline assuming the skip flag took effect.\nIf `SetFileCompletionNotificationModes` silently failed (e.g. a downlevel\nkernel or an underlying object that rejects it), a synchronous WriteFile would\nqueue a completion packet that `write_at` never drains, leaving a stale packet\nfor the next op's `GetQueuedCompletionStatus` - the same stale-completion class\nas the reader bug, just gated on the flag-set failing.","fix":"Check the `SetFileCompletionNotificationModes` return; if it fails, either\npropagate the error or have `write_at` fall back to draining the port on\nsynchronous TRUE so correctness does not silently depend on the flag.","locations":[{"ref":"crates/fast_io/src/iocp/file_writer.rs:104-118","code":"  104 |         // completion that the next overlapped submission would dequeue out\n  105 |         // of order, freeing the previous op's pinned buffer while the kernel\n  106 |         // is still draining bytes from it. The skip flag is supported on\n  107 |         // Vista+; failures here are non-fatal because the writer also handles\n  108 |         // sync completions explicitly below, so we ignore the return value\n  109 |         // rather than block downlevel kernels.\n  110 |         //\n  111 |         // SAFETY: `handle` is a freshly opened overlapped file handle owned\n  112 |         // by this writer; the call only mutates the kernel's notification\n  113 |         // flag for that handle and does not retain the pointer.\n  114 |         #[allow(unsafe_code)]\n  115 |         unsafe {\n  116 |             SetFileCompletionNotificationModes(handle, FILE_SKIP_COMPLETION_PORT_ON_SUCCESS as u8);\n  117 |         }\n  118 | ","lines":15},{"ref":"crates/fast_io/src/iocp/file_writer.rs:181-183","code":"  181 |         if success == TRUE {\n  182 |             return Ok(bytes_written as usize);\n  183 |         }","lines":3}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `try_vmsplice_to_file` / `SplicePipe::vmsplice_to_file`, a `vmsplice` that returns\na positive value less than the requested chunk is accepted as `vspliced` and then\nfully drained, but the loop never detects the case where `vmsplice` returns short\nbecause the pipe filled. That is handled by looping, which is fine - however the\nSAFETY note (\"buffer must remain valid until the function returns\") is the only thing\nguaranteeing soundness, and the `drain_pipe_to_fd` is what holds the buffer pages\nreferenced. This is correct ONLY because no `SPLICE_F_GIFT` is used; if a future edit\nadds `SPLICE_F_GIFT` the kernel would take ownership of the pages and the borrowed\n`&[u8]` contract would become unsound. Worth a guard comment / assertion that GIFT is\nnever set.","fix":"Add an explicit comment/`const` asserting the vmsplice flags never include\n`SPLICE_F_GIFT`, since the whole borrowed-slice soundness argument depends on the\nkernel not retaining the user pages past the synchronous drain.","locations":[{"ref":"crates/fast_io/src/splice/syscalls.rs:229-268","code":"  229 |     while remaining > 0 {\n  230 |         let offset = total;\n  231 |         let chunk = remaining.min(SPLICE_CHUNK_SIZE);\n  232 | \n  233 |         // Phase 1: vmsplice the buffer slice into the pipe write end.\n  234 |         // SAFETY: The iovec points to buf[offset..offset+chunk], which is valid\n  235 |         // for the duration of this call. pipe.write_fd is valid (owned by SplicePipe).\n  236 |         // SPLICE_F_MORE hints that more data follows within this transfer.\n  237 |         let iov = libc::iovec {\n  238 |             iov_base: buf[offset..].as_ptr() as *mut libc::c_void,\n  239 |             iov_len: chunk,\n  240 |         };\n  241 | \n  242 |         let vspliced = loop {\n  243 |             let result = unsafe { libc::vmsplice(pipe.write_fd(), &iov, 1, libc::SPLICE_F_MORE) };\n  244 |             if result < 0 {\n  245 |                 let err = io::Error::last_os_error();\n  246 |                 if err.kind() == io::ErrorKind::Interrupted {\n  247 |                     continue; // Retry on EINTR\n  248 |                 }\n  249 |                 return Err(err);\n  250 |             }\n  251 |             break result as usize;\n  252 |         };\n  253 | \n  254 |         if vspliced == 0 {\n  255 |             break;\n  256 |         }\n  257 | \n  258 |         // Phase 2: splice from the pipe read end into the file.\n  259 |         // Must drain exactly vspliced bytes - the kernel holds a reference to\n  260 |         // the buffer pages until the pipe consumer reads them.\n  261 |         drain_pipe_to_fd(&pipe, file_fd, vspliced)?;\n  262 | \n  263 |         total += vspliced;\n  264 |         remaining -= vspliced;\n  265 |     }\n  266 | \n  267 |     Ok(total)\n  268 | }","lines":40},{"ref":"crates/fast_io/src/splice/mod.rs:274-309","code":"  274 |         while remaining > 0 {\n  275 |             let offset = total;\n  276 |             let chunk = remaining.min(SPLICE_CHUNK_SIZE);\n  277 | \n  278 |             let iov = libc::iovec {\n  279 |                 iov_base: buf[offset..].as_ptr() as *mut libc::c_void,\n  280 |                 iov_len: chunk,\n  281 |             };\n  282 | \n  283 |             // SAFETY: The iovec points to buf[offset..offset+chunk], which is\n  284 |             // valid for the duration of this call. self.write_fd is a valid pipe\n  285 |             // fd owned by this SplicePipe.\n  286 |             let vspliced = loop {\n  287 |                 let result = unsafe { libc::vmsplice(self.write_fd, &iov, 1, libc::SPLICE_F_MORE) };\n  288 |                 if result < 0 {\n  289 |                     let err = io::Error::last_os_error();\n  290 |                     if err.kind() == io::ErrorKind::Interrupted {\n  291 |                         continue;\n  292 |                     }\n  293 |                     return Err(err);\n  294 |                 }\n  295 |                 break result as usize;\n  296 |             };\n  297 | \n  298 |             if vspliced == 0 {\n  299 |                 break;\n  300 |             }\n  301 | \n  302 |             drain_pipe_to_fd(self, dest_fd, vspliced)?;\n  303 | \n  304 |             total += vspliced;\n  305 |             remaining -= vspliced;\n  306 |         }\n  307 | \n  308 |         Ok(total)\n  309 |     }","lines":36}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`apply_ownership_from_entry` discards user/group mapping errors. Inside the `owner`/\n`group` closures it uses `if let Ok(Some(mapped)) = mapping.map_uid(...)`, so an `Err`\nfrom `map_uid`/`map_gid` (e.g. an NSS/IO failure surfaced as `io::Error`) is silently\nswallowed and the unmapped id is used instead. The path-metadata sibling\n(`resolve_ownership`) propagates the same error via `?` and turns it into a\n`MetadataError`. The receiver path should not silently fall back to the wrong owner on\na mapping failure.","fix":"Propagate the mapping error: replace the `if let Ok(Some(mapped))` pattern with `?`\non a `Result`-returning helper (as `resolve_ownership` does), mapping the error into a\n`MetadataError` with the \"apply user mapping\"/\"apply group mapping\" context.","locations":[{"ref":"crates/metadata/src/apply/ownership.rs:300-330","code":"  300 |     let owner = if let Some(uid_override) = options.owner_override() {\n  301 |         Some(ownership::uid_from_raw(uid_override as RawUid))\n  302 |     } else if options.owner() {\n  303 |         entry.uid().and_then(|uid| {\n  304 |             let mut mapped_uid = uid as RawUid;\n  305 |             if let Some(mapping) = options.user_mapping()\n  306 |                 && let Ok(Some(mapped)) = mapping.map_uid(mapped_uid)\n  307 |             {\n  308 |                 mapped_uid = mapped;\n  309 |             }\n  310 |             map_uid(mapped_uid, options.numeric_ids_enabled())\n  311 |         })\n  312 |     } else {\n  313 |         None\n  314 |     };\n  315 | \n  316 |     let group = if let Some(gid_override) = options.group_override() {\n  317 |         Some(ownership::gid_from_raw(gid_override as RawGid))\n  318 |     } else if options.group() {\n  319 |         entry.gid().and_then(|gid| {\n  320 |             let mut mapped_gid = gid as RawGid;\n  321 |             if let Some(mapping) = options.group_mapping()\n  322 |                 && let Ok(Some(mapped)) = mapping.map_gid(mapped_gid)\n  323 |             {\n  324 |                 mapped_gid = mapped;\n  325 |             }\n  326 |             map_gid(mapped_gid, options.numeric_ids_enabled())\n  327 |         })\n  328 |     } else {\n  329 |         None\n  330 |     };","lines":31}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`MplexReader::read` returns `Ok(0)` for an empty MSG_DATA frame (payload length 0).\n`std::io::Read` consumers treat a `read` return of 0 as end-of-stream, so a peer\nthat legitimately sends an empty MSG_DATA frame mid-stream will cause callers using\n`read_to_end`/`Read::bytes`/`copy` to silently stop early, even though more frames\nfollow. The unit test `mplex_reader_empty_data_message` documents this behavior as\nintended, but it conflicts with the `Read` contract and can truncate transfers.","fix":"On receiving an empty DATA frame, loop to fetch the next frame instead of returning\n`Ok(0)` (return 0 only when `buf.is_empty()`), so a zero-length payload does not\nmasquerade as EOF.","locations":[{"ref":"crates/protocol/src/multiplex/reader.rs:216-237","code":"  216 | impl<R: Read> Read for MplexReader<R> {\n  217 |     fn read(&mut self, buf: &mut [u8]) -> io::Result<usize> {\n  218 |         if self.pos < self.buffer.len() {\n  219 |             let available = self.buffer.len() - self.pos;\n  220 |             let to_copy = available.min(buf.len());\n  221 |             buf[..to_copy].copy_from_slice(&self.buffer[self.pos..self.pos + to_copy]);\n  222 |             self.pos += to_copy;\n  223 |             return Ok(to_copy);\n  224 |         }\n  225 | \n  226 |         // Buffer exhausted: pump out-of-band frames through the handler until\n  227 |         // the next DATA frame arrives, then return its bytes to the caller.\n  228 |         loop {\n  229 |             if self.read_message()? {\n  230 |                 let to_copy = self.buffer.len().min(buf.len());\n  231 |                 buf[..to_copy].copy_from_slice(&self.buffer[..to_copy]);\n  232 |                 self.pos = to_copy;\n  233 |                 return Ok(to_copy);\n  234 |             }\n  235 |         }\n  236 |     }\n  237 | }","lines":22}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"During binary negotiation, the remote compatibility-flags byte is read via\n`stream.read(&mut first)?` and a result of `Ok(0)` (EOF) is silently mapped to\n`CompatibilityFlags::EMPTY` rather than being treated as a truncated handshake.\nUpstream rsync reads the compat-flags byte as a mandatory field (read_byte errors\non EOF). Treating a premature EOF as \"no flags\" can mask a peer that closed the\nconnection mid-handshake and let the session proceed with an incorrect (empty)\nflag set instead of surfacing an `UnexpectedEof`.","fix":"Decide explicitly whether an EOF here is acceptable; if upstream requires the byte, return `io::ErrorKind::UnexpectedEof` for the `0` arm instead of defaulting to `CompatibilityFlags::EMPTY`. If lenient behaviour is intentional, document it.","locations":[{"ref":"crates/rsync_io/src/binary/negotiate.rs:131-143","code":"  131 |     let remote_compatibility_flags = if negotiated_protocol.uses_binary_negotiation() {\n  132 |         let mut first = [0u8; 1];\n  133 |         match stream.read(&mut first)? {\n  134 |             0 => CompatibilityFlags::EMPTY,\n  135 |             read @ 1 => {\n  136 |                 let mut chained = (&first[..read]).chain(&mut stream);\n  137 |                 CompatibilityFlags::read_from(&mut chained)?\n  138 |             }\n  139 |             _ => unreachable!(\"single-byte buffer limits read results to 0 or 1\"),\n  140 |         }\n  141 |     } else {\n  142 |         CompatibilityFlags::EMPTY\n  143 |     };","lines":13}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"On the permission-error branch of `drain_ready_results` / `drain_all_results`,\nthe pending `expected_checksums` entry is popped but `collect_delayed_update` is\nnot consulted, and more importantly the popped entry is the wrong one relative to\n`verify_checksum`'s FIFO assumption only when a delayed-update peek happened on a\nprior successful result. In the normal flow this is consistent, but the two drain\nmethods diverge: `drain_ready_results` uses `pending_commits.saturating_sub(1)`\nwhile `drain_all_results` uses `pending_commits -= 1`. The bare `-=` is only safe\nbecause the loop guard is `> 0`; if a future refactor calls the body outside that\nguard it underflows-panics. The divergence between the two near-identical methods\nis an easy copy-paste hazard.","fix":"Use `saturating_sub(1)` consistently in both methods (or factor the shared\nresult-handling body into one helper) so the two drain paths cannot drift.","locations":[{"ref":"crates/transfer/src/pipeline/receiver.rs:166-169","code":"  166 |                     self.pending_commits = self.pending_commits.saturating_sub(1);\n  167 |                 }\n  168 |                 Ok(Err(e)) => {\n  169 |                     self.pending_commits = self.pending_commits.saturating_sub(1);","lines":4},{"ref":"crates/transfer/src/pipeline/receiver.rs:226-229","code":"  226 |                     self.pending_commits -= 1;\n  227 |                 }\n  228 |                 Ok(Err(e)) => {\n  229 |                     self.pending_commits -= 1;","lines":4}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"The receiver-side `handle_delayed_updates` (transfer.rs) renames staged files\nwith a plain `fs::rename` and reports failures via `eprintln!`. This diverges\nfrom `disk_commit::process::handle_delayed_updates`, which uses\n`rename_with_io_uring_fallback` (handling EXDEV cross-device with copy+remove).\nWhile the staging dir `.~tmp~` is normally on the same filesystem as the final\npath (so EXDEV is unlikely), the two implementations of \"the same\" sweep have\ndivergent robustness. Additionally `eprintln!` is used here despite repeated\ncomments elsewhere in this crate warning that direct stderr writes can\ndeadlock the global stderr mutex in daemon handler threads; this sweep runs on\nthe main receiver thread so the deadlock risk is low, but the inconsistency is\nworth noting.","fix":"Reuse `disk_commit::process::handle_delayed_updates` (or its EXDEV-aware rename helper) for the receiver sweep, and route failures through the logging facility instead of `eprintln!`.","locations":[{"ref":"crates/transfer/src/receiver/transfer.rs:78-139","code":"   78 | pub(in crate::receiver) fn handle_delayed_updates(\n   79 |     delayed: &[(PathBuf, PathBuf)],\n   80 |     backup_config: Option<crate::disk_commit::BackupConfig>,\n   81 | ) {\n   82 |     use std::collections::HashSet;\n   83 |     use std::fs;\n   84 | \n   85 |     let mut staging_dirs: HashSet<PathBuf> = HashSet::new();\n   86 | \n   87 |     for (staging_path, final_path) in delayed {\n   88 |         // upstream: receiver.c:431-432 - make_backup(fname, False)\n   89 |         if let Some(ref bc) = backup_config {\n   90 |             if final_path.exists() {\n   91 |                 let backup_path = engine::compute_backup_path(\n   92 |                     &bc.dest_dir,\n   93 |                     final_path,\n   94 |                     None,\n   95 |                     bc.backup_dir.as_deref(),\n   96 |                     &bc.suffix,\n   97 |                 );\n   98 |                 if let Some(parent) = backup_path.parent() {\n   99 |                     if !parent.exists() {\n  100 |                         let _ = fs::create_dir_all(parent);\n  101 |                     }\n  102 |                 }\n  103 |                 if let Err(e) = fs::rename(final_path, &backup_path) {\n  104 |                     eprintln!(\"rsync: backup failed for {}: {e}\", final_path.display());\n  105 |                 }\n  106 |             }\n  107 |         }\n  108 | \n  109 |         // upstream: receiver.c:433-435 - DEBUG_GTE(RECV, 1) rename notice\n  110 |         debug_log!(\n  111 |             Recv,\n  112 |             1,\n  113 |             \"renaming {} to {}\",\n  114 |             staging_path.display(),\n  115 |             final_path.display()\n  116 |         );\n  117 | \n  118 |         // upstream: receiver.c:439 - do_rename(partialptr, fname)\n  119 |         if let Err(e) = fs::rename(staging_path, final_path) {\n  120 |             eprintln!(\n  121 |                 \"rsync: rename failed for {} (from {}): {e}\",\n  122 |                 final_path.display(),\n  123 |                 staging_path.display()\n  124 |             );\n  125 |             continue;\n  126 |         }\n  127 | \n  128 |         // Track parent staging directories for cleanup.\n  129 |         if let Some(parent) = staging_path.parent() {\n  130 |             staging_dirs.insert(parent.to_path_buf());\n  131 |         }\n  132 |     }\n  133 | \n  134 |     // upstream: receiver.c:446 - handle_partial_dir(partialptr, PDIR_DELETE)\n  135 |     // Remove empty .~tmp~ staging directories.\n  136 |     for dir in &staging_dirs {\n  137 |         let _ = fs::remove_dir(dir);\n  138 |     }\n  139 | }","lines":62}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"`SplicePipe::Drop` ignores the return value of both `libc::close` calls. A close()\nfailure on the pipe fds (e.g. EINTR on some kernels, or a previously-closed fd) is\nswallowed. This is conventional for Drop and harmless here since the fds are\nsingle-owned, but on Linux a close() that returns EINTR may leave the fd in an\nunspecified state; the existing comment already acknowledges this. Noted for\ncompleteness, not actionable beyond the existing single-ownership invariant.","fix":"No change required; optionally log on close() error in debug builds.","locations":[{"ref":"crates/fast_io/src/splice/mod.rs:312-324","code":"  312 | #[cfg(target_os = \"linux\")]\n  313 | impl Drop for SplicePipe {\n  314 |     fn drop(&mut self) {\n  315 |         // SAFETY: fds were created by pipe2 and are still valid (not closed elsewhere).\n  316 |         // close() on an already-closed fd is harmless in practice but we ensure\n  317 |         // single-ownership by making SplicePipe the sole owner.\n  318 |         #[allow(unsafe_code)]\n  319 |         unsafe {\n  320 |             libc::close(self.read_fd);\n  321 |             libc::close(self.write_fd);\n  322 |         }\n  323 |     }\n  324 | }","lines":13}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"The embedded transport's `ChannelReader::read` has the same empty-buffer hazard\nas `SyncReader`: with an empty `buf` and no `partial` data it blocks on\n`self.rx.recv()` instead of returning `Ok(0)`. Additionally, if `buf` is empty\nbut a chunk arrives, `n = min(data.len(), buf.len()) == 0`, so the whole chunk is\nstored as `partial` and `Ok(0)` is returned - a zero-length read that needlessly\npulled a chunk off the channel. A zero-length read should be a cheap no-op.","fix":"Add `if buf.is_empty() { return Ok(0); }` at the start of `read` before draining `partial` or calling `recv()`.","locations":[{"ref":"crates/rsync_io/src/ssh/embedded/connect.rs:55-80","code":"   55 |     fn read(&mut self, buf: &mut [u8]) -> std::io::Result<usize> {\n   56 |         // Drain any leftover data from a previous read.\n   57 |         if let Some(ref mut rb) = self.partial {\n   58 |             let remaining = &rb.data[rb.offset..];\n   59 |             let n = std::cmp::min(remaining.len(), buf.len());\n   60 |             buf[..n].copy_from_slice(&remaining[..n]);\n   61 |             rb.offset += n;\n   62 |             if rb.offset >= rb.data.len() {\n   63 |                 self.partial = None;\n   64 |             }\n   65 |             return Ok(n);\n   66 |         }\n   67 | \n   68 |         // Wait for next chunk from the channel.\n   69 |         match self.rx.recv() {\n   70 |             Ok(data) => {\n   71 |                 let n = std::cmp::min(data.len(), buf.len());\n   72 |                 buf[..n].copy_from_slice(&data[..n]);\n   73 |                 if n < data.len() {\n   74 |                     self.partial = Some(ReadBuffer { data, offset: n });\n   75 |                 }\n   76 |                 Ok(n)\n   77 |             }\n   78 |             Err(_) => Ok(0), // Channel closed = EOF\n   79 |         }\n   80 |     }","lines":26}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"`SyncReader::read` does not handle an empty destination buffer. When called with\n`buf.len() == 0` and no buffered data (`self.offset >= self.buffered.len()`), it\nfalls through to `self.rx.recv()` and blocks indefinitely waiting for a chunk\nfrom the channel, even though the `std::io::Read` contract permits a zero-length\nread and expects it to return `Ok(0)` without side effects. A caller probing with\nan empty buffer (or a generic adapter that passes a zero-length slice) will hang\nthe bridging thread instead of returning immediately. The subsequent\n`buf[..n].copy_from_slice(&remaining[..n])` works for n==0 but only after a chunk\nhas been (needlessly) consumed and stashed in `self.buffered`.","fix":"Add `if buf.is_empty() { return Ok(0); }` at the top of `read`, before the `recv()` call, matching the guard already present in `SyncWriter::write` and in `ChannelReader::poll_read`.","locations":[{"ref":"crates/rsync_io/src/ssh/embedded/sync_bridge.rs:167-189","code":"  167 |     fn read(&mut self, buf: &mut [u8]) -> io::Result<usize> {\n  168 |         if self.offset >= self.buffered.len() {\n  169 |             match self.rx.recv() {\n  170 |                 Ok(chunk) => {\n  171 |                     if chunk.is_empty() {\n  172 |                         return Ok(0);\n  173 |                     }\n  174 |                     self.buffered = chunk;\n  175 |                     self.offset = 0;\n  176 |                 }\n  177 |                 Err(_) => return Ok(0),\n  178 |             }\n  179 |         }\n  180 |         let remaining = &self.buffered[self.offset..];\n  181 |         let n = remaining.len().min(buf.len());\n  182 |         buf[..n].copy_from_slice(&remaining[..n]);\n  183 |         self.offset += n;\n  184 |         if self.offset >= self.buffered.len() {\n  185 |             self.buffered.clear();\n  186 |             self.offset = 0;\n  187 |         }\n  188 |         Ok(n)\n  189 |     }","lines":23}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"The `-VV` JSON renderer writes algorithm names and capability values directly into JSON string\nliterals without escaping. `write_json_list` (lines 343-357) emits `\\\"{entry}\\\"` and\n`write_json_entry` (lines 590-625) emits `\\\"...\\\": \\\"{prefix}\\\"` with no quoting of `\"` or `\\`.\nThe algorithm lists are caller-supplied via `with_checksum_algorithms`/`with_compress_algorithms`/\n`with_daemon_auth_algorithms` (lines 152-182) accepting arbitrary `Into<Cow<str>>`. A value\ncontaining a quote or backslash produces malformed JSON, breaking any consumer that parses `-VV`\noutput.","fix":"Escape `\"` and `\\` (and control chars) when emitting JSON string contents, or document that the\nalgorithm setters must receive JSON-safe values and assert/validate it.","locations":[{"ref":"crates/core/src/version/report/renderer.rs:343-357","code":"  343 |     fn write_json_list<W: FmtWrite>(\n  344 |         &self,\n  345 |         writer: &mut W,\n  346 |         name: &str,\n  347 |         entries: &[Cow<'static, str>],\n  348 |     ) -> fmt::Result {\n  349 |         write!(writer, \",\\n  \\\"{name}\\\": [\\n   \")?;\n  350 |         for (i, entry) in entries.iter().enumerate() {\n  351 |             if i > 0 {\n  352 |                 write!(writer, \",\")?;\n  353 |             }\n  354 |             write!(writer, \" \\\"{entry}\\\"\")?;\n  355 |         }\n  356 |         write!(writer, \"\\n  ]\")\n  357 |     }","lines":15},{"ref":"crates/core/src/version/report/renderer.rs:590-625","code":"  590 | fn write_json_entry<W: FmtWrite>(writer: &mut W, text: &str, needs_comma: bool) -> fmt::Result {\n  591 |     let comma = if needs_comma { \",\" } else { \"\" };\n  592 | \n  593 |     if let Some(space_pos) = text.find(' ') {\n  594 |         let prefix = &text[..space_pos];\n  595 |         let suffix = &text[space_pos + 1..];\n  596 | \n  597 |         if prefix == \"no\" {\n  598 |             // \"no crtimes\" -> \"crtimes\": false\n  599 |             let key = json_key(suffix);\n  600 |             write!(writer, \"\\n    \\\"{key}\\\": false{comma}\")\n  601 |         } else if prefix.starts_with(|c: char| c.is_ascii_digit()) {\n  602 |             // \"64-bit files\" -> \"file_bits\": 64\n  603 |             let val = if let Some(dash) = prefix.find('-') {\n  604 |                 &prefix[..dash]\n  605 |             } else {\n  606 |                 prefix\n  607 |             };\n  608 |             // Item is the word after space; drop trailing 's' and append \"_bits\"\n  609 |             let mut key = String::from(suffix);\n  610 |             if key.ends_with('s') {\n  611 |                 key.pop();\n  612 |             }\n  613 |             key.push_str(\"_bits\");\n  614 |             let key = json_key(&key);\n  615 |             write!(writer, \"\\n    \\\"{key}\\\": {val}{comma}\")\n  616 |         } else {\n  617 |             // \"optional secluded-args\" -> \"secluded_args\": \"optional\"\n  618 |             let key = json_key(suffix);\n  619 |             write!(writer, \"\\n    \\\"{key}\\\": \\\"{prefix}\\\"{comma}\")\n  620 |         }\n  621 |     } else {\n  622 |         // Simple boolean: \"crtimes\" -> \"crtimes\": true\n  623 |         let key = json_key(text);\n  624 |         write!(writer, \"\\n    \\\"{key}\\\": true{comma}\")\n  625 |     }","lines":36}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"`SharedRing` registers a `RegisteredBufferGroup` (via `RegisteredBufferGroup::try_new`\nin `new_inner`) but never exposes it or uses READ_FIXED/WRITE_FIXED - all submit paths\nuse the unregistered `Read`/`Send` opcodes. The registered buffers therefore pin\n`registered_buffer_count * buffer_size` bytes of memory (default 8 * 64KiB = 512KiB)\nin the kernel for the life of every SharedRing with no functional benefit, and the\ngroup is only released on Drop. This is wasted pinned memory / dead registration.","fix":"Either wire the registered buffer group into a READ_FIXED submit path, or stop\nregistering buffers in SharedRing until that path exists (set\n`registered_buffers = None`) to avoid pinning unused memory.","locations":[{"ref":"crates/fast_io/src/io_uring/shared_ring.rs:171-204","code":"  171 |         let registered_buffers = if config.ring.register_buffers {\n  172 |             RegisteredBufferGroup::try_new(\n  173 |                 &ring,\n  174 |                 config.ring.buffer_size,\n  175 |                 config.ring.registered_buffer_count,\n  176 |             )\n  177 |         } else {\n  178 |             None\n  179 |         };\n  180 | \n  181 |         Ok(Self {\n  182 |             ring,\n  183 |             reader_slot,\n  184 |             writer_slot,\n  185 |             reader_fd,\n  186 |             writer_fd,\n  187 |             poll_add_supported,\n  188 |             registered_buffers,\n  189 |         })\n  190 |     }\n  191 | \n  192 |     /// Returns whether `IORING_OP_POLL_ADD` was probed as supported when this\n  193 |     /// ring was constructed. Always `true` for a successfully constructed\n  194 |     /// ring; exposed for diagnostics and tests.\n  195 |     #[must_use]\n  196 |     pub fn poll_add_supported(&self) -> bool {\n  197 |         self.poll_add_supported\n  198 |     }\n  199 | \n  200 |     /// Returns whether the optional registered buffer pool is active.\n  201 |     #[must_use]\n  202 |     pub fn has_registered_buffers(&self) -> bool {\n  203 |         self.registered_buffers.is_some()\n  204 |     }","lines":34}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"The non-Windows `iocp_stub` module is documented to \"provide the same public\nAPI as the real `iocp` module\", but it omits several symbols the real module\nre-exports: `post_completion` (real pump.rs), and the `#[doc(hidden)]`\n`inject_next_write_error_for_test` / `clear_injected_write_error_for_test`\n(real disk_batch). Cross-platform call sites or tests that reference these\nthrough `crate::iocp::...` compile on Windows but fail to compile on Linux/macOS,\ndefeating the stated cross-compile goal.","fix":"Add matching stub definitions/re-exports for `post_completion` and the\n`#[doc(hidden)]` fault-injection hooks to `iocp_stub` so the two modules expose\nan identical surface.","locations":[{"ref":"crates/fast_io/src/iocp_stub/mod.rs:17-50","code":"   17 | #![allow(dead_code)]\n   18 | \n   19 | /// Stub IOCP configuration and availability probes mirroring the Windows backend.\n   20 | pub mod config;\n   21 | mod disk_batch;\n   22 | /// Typed IOCP error variants mirroring the Windows backend.\n   23 | pub mod error;\n   24 | mod file_factory;\n   25 | mod file_reader;\n   26 | mod file_writer;\n   27 | mod pump;\n   28 | /// Cross-platform stub for the Windows-only `iocp::socket` module.\n   29 | pub mod socket;\n   30 | \n   31 | #[cfg(test)]\n   32 | mod tests;\n   33 | \n   34 | pub use config::{\n   35 |     IOCP_MIN_FILE_SIZE, IocpConfig, MAX_CONCURRENT_OPS, MIN_CONCURRENT_OPS,\n   36 |     concurrent_ops_for_cpus, default_concurrent_ops, iocp_availability_reason, is_iocp_available,\n   37 |     skip_event_optimization_available,\n   38 | };\n   39 | #[doc(hidden)]\n   40 | pub use disk_batch::reset_bounce_copies_avoided_for_test;\n   41 | pub use disk_batch::{IocpDiskBatch, bounce_copies_avoided};\n   42 | pub use error::IocpError;\n   43 | pub use file_factory::{\n   44 |     IocpOrStdReader, IocpOrStdWriter, IocpReaderFactory, IocpWriterFactory, reader_from_path,\n   45 |     writer_from_file,\n   46 | };\n   47 | pub use file_reader::IocpReader;\n   48 | pub use file_writer::IocpWriter;\n   49 | pub use pump::{CompletionHandler, CompletionPump, IocpPumpConfig, oneshot_handler};","lines":34},{"ref":"crates/fast_io/src/iocp/mod.rs:51-67","code":"   51 | #[doc(hidden)]\n   52 | pub use disk_batch::{\n   53 |     clear_injected_write_error_for_test, inject_next_write_error_for_test,\n   54 |     reset_bounce_copies_avoided_for_test,\n   55 | };\n   56 | pub use error::IocpError;\n   57 | pub use file_factory::{\n   58 |     IocpOrStdReader, IocpOrStdWriter, IocpReaderFactory, IocpWriterFactory, reader_from_path,\n   59 |     writer_from_file,\n   60 | };\n   61 | pub use file_reader::IocpReader;\n   62 | pub use file_writer::IocpWriter;\n   63 | pub use pump::{\n   64 |     CompletionHandler, CompletionPump, IocpPumpConfig, oneshot_handler, post_completion,\n   65 | };\n   66 | #[cfg(feature = \"transmitfile\")]\n   67 | pub use transmit_file::{TRANSMIT_FILE_MAX_BYTES, try_transmit_file};","lines":17}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"The io_uring data-write fast path reads the entire source file into a single heap `Vec` via `Vec::with_capacity(file_size)` + `read_to_end`, with no upper size bound (the only gate is a 1 MiB *minimum*). For multi-GB files this allocates the whole file in RAM at once, bypassing the buffer pool and any memory cap, and risks OOM. Gated behind the opt-in `iouring-data-writes` feature, so not in default builds.","fix":"Cap the io_uring fast path to a sane maximum file size (or chunk the read/write through a bounded registered buffer) so memory use does not scale with file size.","locations":[{"ref":"crates/engine/src/local_copy/executor/file/copy/transfer/execute/iouring.rs:180-207","code":"  180 | fn dispatch_iouring_data_write(\n  181 |     context: &mut CopyContext,\n  182 |     reader: &mut fs::File,\n  183 |     copy_source: &Path,\n  184 |     destination: &Path,\n  185 |     file_size: u64,\n  186 |     start: Instant,\n  187 | ) -> Result<Option<IoUringDataWriteOutcome>, LocalCopyError> {\n  188 |     if !fast_io::is_io_uring_available() {\n  189 |         return Ok(None);\n  190 |     }\n  191 | \n  192 |     let mut buf = Vec::with_capacity(file_size as usize);\n  193 |     reader\n  194 |         .read_to_end(&mut buf)\n  195 |         .map_err(|error| LocalCopyError::io(\"copy file\", copy_source, error))?;\n  196 | \n  197 |     match fast_io::write_file_with_io_uring(destination, &buf) {\n  198 |         Ok(()) => {\n  199 |             context.register_progress();\n  200 |             Ok(Some(IoUringDataWriteOutcome {\n  201 |                 elapsed: start.elapsed(),\n  202 |             }))\n  203 |         }\n  204 |         Err(error) if error.kind() == std::io::ErrorKind::Unsupported => Ok(None),\n  205 |         Err(error) => Err(LocalCopyError::io(\"copy file\", destination, error)),\n  206 |     }\n  207 | }","lines":28}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"`RegisteredBufferGroup::available()` and the bgid allocator's `current_in_flight()` /\n`remaining()` take the global free-list `Mutex` (or iterate every bitset word) on\nevery call, and `BgidAllocator::deallocate` / `deallocate_batch` do an O(n)\n`free_list.contains()` scan per id under the lock to enforce no-duplicates. For a\ndaemon recycling many bgids this is quadratic in the free-list length while holding\nthe process-wide mutex, serialising all allocation. The free list could use a\n`HashSet`/bitset for O(1) membership.","fix":"Back the bgid free-list with a bitset or `HashSet<u16>` so `deallocate` membership\nchecks are O(1) instead of O(n) under the global mutex. The 16-bit namespace fits a\nsingle 8 KiB bitset.","locations":[{"ref":"crates/fast_io/src/io_uring/buffer_ring/allocator.rs:380-421","code":"  380 |     pub fn deallocate_batch(bgids: &[u16]) {\n  381 |         if bgids.is_empty() {\n  382 |             return;\n  383 |         }\n  384 |         let mut free_list = bgid_free_list().lock().expect(\"bgid free-list poisoned\");\n  385 |         for &bgid in bgids {\n  386 |             if !free_list.contains(&bgid) {\n  387 |                 free_list.push(bgid);\n  388 |             }\n  389 |         }\n  390 |     }\n  391 | \n  392 |     /// Returns a previously-allocated bgid to the free-list for reuse.\n  393 |     ///\n  394 |     /// Wired into [`super::BufferRing`]'s `Drop` implementation when the\n  395 |     /// ring's bgid was issued by [`allocate`](Self::allocate); callers\n  396 |     /// should not normally invoke this directly. The next call to\n  397 |     /// [`allocate`](Self::allocate) will return this id before advancing\n  398 |     /// the monotonic counter.\n  399 |     ///\n  400 |     /// # Idempotence\n  401 |     ///\n  402 |     /// Calling `deallocate` more than once for the same bgid is a no-op\n  403 |     /// after the first call - the duplicate is silently dropped so the\n  404 |     /// free-list never contains the same id twice. This defends against\n  405 |     /// double-drop scenarios where, e.g., a buffer ring is moved out of an\n  406 |     /// `Option` and the original holder is also dropped.\n  407 |     ///\n  408 |     /// # Assumption\n  409 |     ///\n  410 |     /// The caller must own `bgid`: it must have been returned by a prior\n  411 |     /// [`allocate`](Self::allocate) call and not handed back through this\n  412 |     /// method since. Returning a caller-provided constant (a bgid that was\n  413 |     /// never issued by this allocator) pollutes the free-list and causes a\n  414 |     /// later [`allocate`](Self::allocate) to issue an id that may collide\n  415 |     /// with a ring active elsewhere in the process.\n  416 |     pub fn deallocate(bgid: u16) {\n  417 |         let mut free_list = bgid_free_list().lock().expect(\"bgid free-list poisoned\");\n  418 |         if !free_list.contains(&bgid) {\n  419 |             free_list.push(bgid);\n  420 |         }\n  421 |     }","lines":42},{"ref":"crates/fast_io/src/io_uring/registered_buffers/registry.rs:309-316","code":"  309 |     /// Returns the number of currently available (free) buffer slots.\n  310 |     #[must_use]\n  311 |     pub fn available(&self) -> usize {\n  312 |         self.free_bitset\n  313 |             .iter()\n  314 |             .map(|word| word.load(Ordering::Relaxed).count_ones() as usize)\n  315 |             .sum()\n  316 |     }","lines":8}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"In `submit_one_write` the `BOUNCE_COPIES_AVOIDED` telemetry counter is\nincremented BEFORE the `WriteFile` call, and is not decremented when the\nsubmission fails (synchronous error other than ERROR_IO_PENDING returns `Err`\nwithout touching the counter). The counter therefore over-reports \"bounce copies\navoided\" by the number of failed aligned submissions. Pure telemetry, no\ncorrectness impact, but the count is wrong under any write-error path.","fix":"Increment `BOUNCE_COPIES_AVOIDED` only after `WriteFile` reports success\n(TRUE or ERROR_IO_PENDING), i.e. move the `fetch_add` past the success check.","locations":[{"ref":"crates/fast_io/src/iocp/disk_batch/writer.rs:240-266","code":"  240 |     if use_aligned {\n  241 |         BOUNCE_COPIES_AVOIDED.fetch_add(1, Ordering::Relaxed);\n  242 |     }\n  243 |     #[allow(unsafe_code)]\n  244 |     let success = unsafe {\n  245 |         WriteFile(\n  246 |             handle,\n  247 |             op.buffer.as_ptr().cast(),\n  248 |             op.buffer.len() as u32,\n  249 |             &mut bytes_written,\n  250 |             overlapped_ptr,\n  251 |         )\n  252 |     };\n  253 | \n  254 |     if success == TRUE {\n  255 |         // Synchronous success still queues a completion packet because we\n  256 |         // do not opt into FILE_SKIP_COMPLETION_PORT_ON_SUCCESS; drop into\n  257 |         // the drain loop just like an ERROR_IO_PENDING.\n  258 |         return Ok(op);\n  259 |     }\n  260 | \n  261 |     let err = io::Error::last_os_error();\n  262 |     // ERROR_IO_PENDING (997) is the documented \"queued\" code; any other\n  263 |     // error is fatal for this submission.\n  264 |     if err.raw_os_error() != Some(997) {\n  265 |         return Err(err);\n  266 |     }","lines":27}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"`FileListWalker::push_directory` calls `fs::canonicalize` for every directory\nentered, purely to populate the `visited` loop-detection set. On large trees\nwithout symlinks this doubles path-resolution syscalls (canonicalize resolves\nevery component). The cost is incurred unconditionally even when\n`follow_symlinks` is false and cycles are impossible.","fix":"Only canonicalize (and consult `visited`) when `follow_symlinks` is enabled,\nsince plain directory trees cannot form cycles without followed symlinks. For\nthe non-follow case, use the device+inode pair from already-fetched metadata\nwhere available instead of a full canonicalize.","locations":[{"ref":"crates/flist/src/file_list_walker.rs:75-93","code":"   75 |     fn push_directory(\n   76 |         &mut self,\n   77 |         fs_path: PathBuf,\n   78 |         relative_prefix: PathBuf,\n   79 |         depth: usize,\n   80 |     ) -> Result<(), FileListError> {\n   81 |         let canonical = fs::canonicalize(&fs_path)\n   82 |             .map_err(|error| FileListError::canonicalize(fs_path.clone(), error))?;\n   83 | \n   84 |         if !self.visited.insert(canonical) {\n   85 |             debug_log!(Dup, 1, \"skipping already visited directory: {:?}\", fs_path);\n   86 |             return Ok(());\n   87 |         }\n   88 | \n   89 |         debug_log!(Flist, 2, \"entering directory: {:?}\", fs_path);\n   90 |         let state = DirectoryState::new(fs_path, relative_prefix, depth)?;\n   91 |         self.stack.push(state);\n   92 |         Ok(())\n   93 |     }","lines":19}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"`recv_secluded_args` reads the stream one byte at a time via a per-byte\n`reader.read_exact(&mut byte)` loop with no buffering. For an argument list of\nN bytes this issues N syscalls/read calls. The same single-byte pattern appears\nin `read_files_from_stream` (`files_from.rs:169-192`). On a raw socket this is\na measurable per-arg / per-filename overhead.","fix":"Wrap the reader in a `BufReader` (or read into a chunk buffer and scan for NUL\nin-memory) so the NUL-delimited parsing operates on buffered data instead of\none syscall per byte.","locations":[{"ref":"crates/protocol/src/secluded_args.rs:114-159","code":"  114 | pub fn recv_secluded_args<R: Read>(\n  115 |     reader: &mut R,\n  116 |     iconv: Option<&FilenameConverter>,\n  117 | ) -> io::Result<Vec<String>> {\n  118 |     let mut args = Vec::new();\n  119 |     let mut current = Vec::new();\n  120 |     let mut byte = [0u8; 1];\n  121 | \n rite_token_block_match(writer, *block_index)?;\n  503 | \n  504 |                         // Read block data for checksum computation.\n  505 |                         let len = *length as usize;\n  506 |                         read_buf.clear();\n  507 |                         read_buf.resize(len, 0);\n  508 |                         if let Some(ref mut file) = source_file {\n  509 |                             file.seek(SeekFrom::Start(source_offset))?;\n  510 |                             file.read_exact(&mut read_buf)?;\n  511 |                         }\n  512 |                         verifier.update(&read_buf);\n  513 |                         source_offset += u64::from(*length);\n  514 |                     }","lines":50}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"SPSC `Sender::send` and `Receiver::recv` busy-spin with `std::hint::spin_loop()`\nand no backoff or yield. When the consumer (disk-commit thread) stalls on a slow\nfsync/rename, the producer (network ingest) burns a full core spinning on a full\nqueue, and vice versa on an empty queue. On oversubscribed core counts (workers\n> physical cores, common for million-file transfers) this can starve the very\nthread the spinner is waiting on, hurting throughput rather than helping latency.","fix":"Add bounded backoff: after N spin iterations fall back to `std::thread::yield_now()`,\nand after a larger threshold to a short `park_timeout`. `crossbeam_utils::Backoff`\nimplements exactly this pattern and pairs naturally with the existing\n`crossbeam_queue::ArrayQueue`.","locations":[{"ref":"crates/transfer/src/pipeline/spsc.rs:74-87","code":"   74 |     pub fn send(&self, mut item: T) -> Result<(), SendError<T>> {\n   75 |         loop {\n   76 |             if !self.0.consumer_alive.load(Ordering::Relaxed) {\n   77 |                 return Err(SendError(item));\n   78 |             }\n   79 |             match self.0.queue.push(item) {\n   80 | 20 |         // Status: 1 byte tag + optional string.\n  521 |         let status_size = match &self.status {\n  522 |             DeltaResultStatus::Success => 0,\n  523 |             DeltaResultStatus::NeedsRedo { reason } | DeltaResultStatus::Failed { reason } => {\n  524 |                 // String: 24 bytes (String struct) + heap data.\n  525 |                 24 + reason.len()\n  526 |             }\n  527 |         };\n  528 |         // Include struct overhead (padding, enum discriminant).\n  529 |         36 + status_size + 16\n  530 |     }","lines":13}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"negligible","description":"In the batch delta capture path, every literal/block token is encoded into a freshly allocated `Vec::new()`/`Vec::with_capacity` and then written to the cursor. `flush_literal_chunk` and `copy_matched_block` allocate a temporary Vec per token, and `capture_batch_whole_file` allocates per 32 KB chunk. Only reachable in batch mode, but for large files this is one heap allocation per chunk in a hot loop.","fix":"Encode tokens directly into the Cursor's underlying Vec (write_token_* take a Write), or reuse a single scratch buffer across iterations instead of allocating per token/chunk.","locations":[{"ref":"crates/engine/src/local_copy/context_impl/delta_transfer.rs:262-275","code":"  262 |         if let Some(delta_writer) = self.batch_delta_writer() {\n  263 |             let mut encoded = Vec::new();\n  264 |             protocol::wire::delta::write_token_literal(&mut encoded, chunk).map_err(|e| {\n  265 |                 LocalCopyError::io(\n  266 |                     \"encode batch literal token\",\n  267 |                     destination.to_path_buf(),\n  268 |                     e,\n  269 |                 )\n  270 |             })?;\n  271 | \n  272 |             delta_writer.write_all(&encoded).map_err(|e| {\n  273 |                 LocalCopyError::io(\"write batch literal token\", destination.to_path_buf(), e)\n  274 |             })?;\n  275 |         }","lines":14},{"ref":"crates/engine/src/local_copy/context_impl/options/batch.rs:306-340","code":"  306 |         let mut buf = vec![0u8; 32 * 1024]; // CHUNK_SIZE\n  307 |         let mut remaining = file_size;\n  308 | \n  309 |         while remaining > 0 {\n  310 |             let to_read = (remaining as usize).min(buf.len());\n  311 |             use std::io::Read;\n  312 |             let n = reader.read(&mut buf[..to_read]).map_err(|e| {\n  313 |                 crate::local_copy::LocalCopyError::io(\n  314 |                     \"read source for batch capture\",\n  315 |                     source.to_path_buf(),\n  316 |                     e,\n  317 |                 )\n  318 |             })?;\n  319 |             if n == 0 {\n  320 |                 break;\n  321 |             }\n  322 |             remaining = remaining.saturating_sub(n as u64);\n  323 | \n  324 |             let mut encoded = Vec::with_capacity(n + 4);\n  325 |             protocol::wire::delta::write_token_literal(&mut encoded, &buf[..n]).map_err(|e| {\n  326 |                 crate::local_copy::LocalCopyError::io(\n  327 |                     \"encode batch literal token\",\n  328 |                     source.to_path_buf(),\n  329 |                     e,\n  330 |                 )\n  331 |             })?;\n  332 | \n  333 |             delta_file.write_all(&encoded).map_err(|e| {\n  334 |                 crate::local_copy::LocalCopyError::io(\n  335 |                     \"write batch literal token\",\n  336 |                     source.to_path_buf(),\n  337 |                     e,\n  338 |                 )\n  339 |             })?;\n  340 |         }","lines":35}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","description":"`IncrementalFileList::release_pending_children` is recursive over directory nesting\ndepth. A malicious or pathological sender that delivers a very deeply nested chain of\npending directories (each released triggering release of its child) could recurse\nonce per nesting level when the chain is finally unblocked, risking stack growth for\nextreme depths. Directory paths are already implicitly bounded by the name-length cap\nonce that is enforced, so impact is minor.","fix":"Convert the recursion to an explicit work-stack (push children to a Vec/VecDeque and loop) to make it depth-independent, mirroring the iterative `collect_missing_ancestors`.","locations":[{"ref":"crates/protocol/src/flist/incremental/mod.rs:179-191","code":"  179 |     fn release_pending_children(&mut self, dir_name: &str) {\n  180 |         if let Some(children) = self.pending.remove(dir_name) {\n  181 |             let released_count = children.len();\n  182 |             for child in children {\n  183 |                 if child.is_dir() {\n  184 |                     self.created_dirs.insert(child.name().to_string());\n  185 |                     self.release_pending_children(child.name());\n  186 |                 }\n  187 |                 self.ready.push_back(child);\n  188 |             }\n  189 |             self.entries_pending = self.entries_pending.saturating_sub(released_count);\n  190 |         }\n  191 |     }","lines":13}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"negligible","description":"`copy_bytes_into_vec` reserves `bytes.len().saturating_sub(target.len())` extra\ncapacity and then immediately `target.clear()`s the vector before extending with\n`bytes`. When `target` already had more elements than `bytes.len()`, the reserve\nis a no-op (saturating_sub yields 0) and after clear the existing capacity covers\nthe copy, so the result is correct; but the intent (\"reserve room for bytes.len()\nafter clearing\") is obscured and relies on the pre-clear length still being valid\nfor the reserve math. This is fragile to future edits even though it is currently\ncorrect.","fix":"Clear first, then `target.try_reserve(bytes.len())?`, then extend. The reserve amount then directly expresses the required capacity and does not depend on the stale pre-clear length.","locations":[{"ref":"crates/rsync_io/src/negotiation/buffer/storage.rs:299-310","code":"  299 |     fn copy_bytes_into_vec(target: &mut Vec<u8>, bytes: &[u8]) -> Result<usize, TryReserveError> {\n  300 |         let len = target.len();\n  301 |         target.try_reserve(bytes.len().saturating_sub(len))?;\n  302 |         target.clear();\n  303 | \n  304 |         if bytes.is_empty() {\n  305 |             return Ok(0);\n  306 |         }\n  307 | \n  308 |         target.extend_from_slice(bytes);\n  309 |         Ok(bytes.len())\n  310 |     }","lines":12}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","description":"`produce_file_jobs` clones the entire `FileEntry` per job (`Arc::new(entry.clone())`)\neven though the file list is already held behind `Arc<Vec<FileEntry>>`. For\nmillion-file transfers this is one full FileEntry deep-clone (path + extras) per\nfile, allocating a fresh Arc each time, when the producer could hand out indices\ninto the shared `Arc<Vec<FileEntry>>` instead.","fix":"Store `Arc<Vec<FileEntry>>` + index in `FileJob` (or have `FileJob` borrow the\nshared list) so no per-file clone is needed; the entry is reachable as\n`shared[ndx]`.","locations":[{"ref":"crates/transfer/src/pipeline/async_dispatch.rs:37-52","code":"   37 |     for (ndx, entry) in entries.iter().enumerate() {\n   38 |         if !entry.is_file() {\n   39 |             continue;\n   40 |         }\n   41 | \n   42 |         let dest_path = dest_dir.join(entry.path());\n   43 |         let entry_arc = Arc::new(entry.clone());\n   44 | \n   45 |         #[allow(clippy::cast_possible_truncation)]\n   46 |         let job = FileJob::new(ndx as u32, dest_path, entry_arc);\n   47 | \n   48 |         if tx.send(job).await.is_err() {\n   49 |             // Consumer dropped - stop producing.\n   50 |             break;\n   51 |         }\n   52 |         dispatched += 1;","lines":16}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`deletion/strategy.rs` (DeletionContext, should_delete_entry, is_extraneous_entry, build_keep_set, DeletionError) is re-exported via `deletion/mod.rs` but never consumed by production code. The real extraneous-entry deletion logic lives in the executor (`executor/directory/recursive/deletion.rs`, out of scope). The strategy module duplicates that decision logic and is only exercised by `deletion/tests.rs`.","fix":"Remove the dead module, or make the executor's deletion path actually use should_delete_entry/build_keep_set so a single deletion-decision implementation is shared.","locations":[{"ref":"crates/engine/src/local_copy/deletion/strategy.rs:125-159","code":"  125 | /// Returns `true` if `entry_name` does not appear in `source_entries`.\n  126 | pub fn is_extraneous_entry<S: AsRef<OsStr>>(entry_name: &OsStr, source_entries: &[S]) -> bool {\n  127 |     !source_entries.iter().any(|s| s.as_ref() == entry_name)\n  128 | }\n  129 | \n  130 | /// Determines if an entry should be deleted based on context and filters.\n  131 | ///\n  132 | /// Checks deletion-enabled state, `--max-delete` limits, extraneous\n  133 | /// membership, and filter rules before returning `true`.\n  134 | pub fn should_delete_entry<S, F>(\n  135 |     entry_name: &OsStr,\n  136 |     source_entries: &[S],\n  137 |     context: &DeletionContext<'_>,\n  138 |     filter_allows_deletion: F,\n  139 | ) -> bool\n  140 | where\n  141 |     S: AsRef<OsStr>,\n  142 |     F: FnOnce(&Path, bool) -> bool,\n  143 | {\n  144 |     if !context.delete_enabled {\n  145 |         return false;\n  146 |     }\n  147 |     if !context.can_delete() {\n  148 |         return false;\n  149 |     }\n  150 |     if !is_extraneous_entry(entry_name, source_entries) {\n  151 |         return false;\n  152 |     }\n  153 | \n  154 | 4 |     /// The tag table rejects non-matches in O(1) before the hash probe.\n  115 |     pub fn find_weak_matches(&self, checksum: u32) -> &[usize] {\n  116 |         if !self.tag_table.might_match(checksum) {\n  117 |             return &[];\n  118 |         }\n  119 | \n  120 |         self.table\n  121 |             .get(&checksum)\n  122 |             .map(|v| v.as_slice())\n  123 |             .unwrap_or(&[])\n  124 |     }\n  125 | \n  126 |     /// Returns the block entry if its strong checksum equals `strong`.\n  127 |     pub fn verify_match(&self, block_idx: usize, strong: &[u8]) -> Option<&BlockEntry> {\n  128 |         let block = &self.blocks[block_idx];\n  129 |         if block.strong_checksum == strong {\n  130 |             Some(block)\n  131 |         } else {\n  132 |             None\n  133 |         }\n  134 |     }\n  135 | \n  136 |     /// Finds a matching block via tag-table rejection, rolling-checksum\n  137 |     /// lookup, then strong-checksum verification.\n  138 |     pub fn find_match(&self, rolling_checksum: u32, strong_checksum: &[u8]) -> Option<&BlockEntry> {\n  139 |         let weak_matches = self.find_weak_matches(rolling_checksum);\n  140 | \n  141 |         for &block_idx in weak_matches {\n  142 |             if let Some(block) = self.verify_match(block_idx, strong_checksum) {\n  143 |                 return Some(block);\n  144 |             }\n  145 |         }\n  146 | \n  147 |         None\n  148 |     }\n  149 | \n  150 |     /// Returns the number of blocks in the table.\n  151 |     pub fn len(&self) -> usize {\n  152 |         self.blocks.len()\n  153 |     }\n  154 | \n  155 |     /// Returns `true` if the table contains no blocks.\n  156 |     pub fn is_empty(&self) -> bool {\n  157 |         self.blocks.is_empty()\n  158 |     }\n  159 | \n  160 |     /// Returns `true` if blocks are sorted by checksum (sequential-scan\n  161 |     /// optimization enabled).\n  162 |     pub fn is_sorted(&self) -> bool {\n  163 |
