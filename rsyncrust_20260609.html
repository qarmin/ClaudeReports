rand before it\nchecks whether a slash precedes the colon. A local path that legitimately contains a double colon\n(e.g. `./weird::name`, `dir/a::b`, or a relative path produced by a tool) is therefore misclassified\nas a `host::module` daemon spec and routed to the daemon transport instead of the local-copy engine.\nUpstream rsync's `check_for_hostspec` only treats `::`/`:` as a host spec when the colon appears\nbefore the first `/`. The same premature `contains(\"::\")` test is duplicated in the dispatch and\nbatch code (`run/mod.rs:199-201`, `run/batch.rs:35-37`, `daemon_transfer/mod.rs:97-99`), so the\nmisclassification propagates everywhere.","fix":"Only treat `::`/`:` as a host spec when it occurs before the first path separator, matching upstream\n`check_for_hostspec`: compute the first `/` (and `\\` on Windows) index and ignore any colon that\nappears after it. Apply the corrected predicate consistently and remove the ad-hoc\n`contains(\"::\")` checks in `run/mod.rs` and `run/batch.rs`.","locations":[{"ref":"crates/core/src/client/remote/invocation/transfer_role.rs:25-56","code":"   25 | pub fn operand_is_remote(path: &OsStr) -> bool {\n   26 |     let text = path.to_string_lossy();\n   27 | \n   28 |     if text.starts_with(\"rsync://\") || text.starts_with(\"ssh://\") {\n   29 |         return true;\n   30 |     }\n   31 | \n   32 |     if text.contains(\"::\") {\n   33 |         return true;\n   34 |     }\n   35 | \n   36 |     if let Some(colon_index) = text.find(':') {\n   37 |         #[cfg(windows)]\n   38 |         if colon_index == 1\n   39 |             && text\n   40 |                 .chars()\n   41 |                 .next()\n   42 |                 .map_or(false, |c| c.is_ascii_alphabetic())\n   43 |         {\n   44 |             return false;\n   45 |         }\n   46 | \n   47 |         let before = &text[..colon_index];\n   48 |         if before.contains('/') || before.contains('\\\\') {\n   49 |             return false;\n   50 |         }\n   51 | \n   52 |         return true;\n   53 |     }\n   54 | \n   55 |     false\n   56 | }","lines":32}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`verify_append_prefix` treats any short `read()` as a prefix mismatch: it issues one `read` per chunk for source and destination and bails with `Ok(false)` whenever `source_read != destination_read` or either is 0 before `remaining` reaches 0. `Read::read` is allowed to return fewer bytes than requested even when more data exists, so two byte-identical files can spuriously fail verification, disabling `--append` and forcing a full retransfer of the file. Data is never corrupted, but the append optimization is defeated non-deterministically.","fix":"Use `read_exact` (or a fill loop) for each `chunk`-sized read on both files instead of treating a partial read as a mismatch.","locations":[{"ref":"crates/engine/src/local_copy/executor/file/append.rs:105-129","code":"  105 |     while remaining > 0 {\n  106 |         let chunk = remaining.min(half_size as u64) as usize;\n  107 |         let source_read = reader\n  108 |             .read(&mut source_buffer[..chunk])\n  109 |             .map_err(|error| LocalCopyError::io(\"copy file\", source, error))?;\n  110 |         let destination_read = destination_file\n  111 |             .read(&mut destination_buffer[..chunk])\n  112 |             .map_err(|error| {\n  113 |                 LocalCopyError::io(\n  114 |                     \"read existing destination\",\n  115 |                     destination.to_path_buf(),\n  116 |                     error,\n  117 |                 )\n  118 |             })?;\n  119 | \n  120 |         if source_read == 0 || destination_read == 0 || source_read != destination_read {\n  121 |             return Ok(false);\n  122 |         }\n  123 | \n  124 |         if source_buffer[..source_read] != destination_buffer[..destination_read] {\n  125 |             return Ok(false);\n  126 |         }\n  127 | \n  128 |         remaining = remaining.saturating_sub(source_read as u64);\n  129 |     }","lines":25}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`compare_files_lockstep` (used by `files_checksum_match` for `--checksum` and backup content verification) returns `Ok(false)` whenever a single `read()` on the source and destination return different byte counts, even though the sizes were already verified equal by the caller. Because `read` may legitimately return short reads (different filesystems, EOF boundaries), two identical files can be reported as differing, causing `--checksum` mode to needlessly re-copy in-sync files. Safe direction (extra copy, no data loss) but defeats the skip optimization.","fix":"Read both files with `read_exact` into equal-size chunks driven by the known file length, or fill each buffer fully before comparing, rather than equating raw per-call read counts.","locations":[{"ref":"crates/engine/src/local_copy/executor/file/comparison.rs:203-234","code":"  203 | fn compare_files_lockstep<F>(source: &Path, destination: &Path, mut on_chunk: F) -> io::Result<bool>\n  204 | where\n  205 |     F: FnMut(&[u8], &[u8]) -> LockstepCheck,\n  206 | {\n  207 |     let mut source_file = fs::File::open(source)?;\n  208 |     let mut destination_file = fs::File::open(destination)?;\n  209 |     let mut source_buffer = vec![0u8; COPY_BUFFER_SIZE];\n  210 |     let mut destination_buffer = vec![0u8; COPY_BUFFER_SIZE];\n  211 | \n  212 |     loop {\n  213 |         let source_read = source_file.read(&mut source_buffer)?;\n  214 |         let destination_read = destination_file.read(&mut destination_buffer)?;\n  215 | \n  216 |         if source_read != destination_read {\n  217 |             return Ok(false);\n  218 |         }\n  219 | \n  220 |         if source_read == 0 {\n  221 |             break;\n  222 |         }\n  223 | \n  224 |         match on_chunk(\n  225 |             &source_buffer[..source_read],\n  226 |             &destination_buffer[..destination_read],\n  227 |         ) {\n  228 |             LockstepCheck::Continue => {}\n  229 |             LockstepCheck::Diverged => return Ok(false),\n  230 |         }\n  231 |     }\n  232 | \n  233 |     Ok(true)\n  234 | }","lines":32}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`read_then_write` (and `LinkedChain` generally) silently turns any short read into a\nhard error and discards the partially-read data. With `IOSQE_IO_LINK`, the kernel\nbreaks the chain on the FIRST short or failed completion: a `read` that returns fewer\nbytes than requested (routine for pipes, sockets, NFS, and even regular files near\nEOF) causes the linked `write` SQE to be cancelled with `ECANCELED`. `read_then_write`\nthen surfaces the write CQE's `ECANCELED` via `into_io_result()` as an `io::Error`,\neven though the read succeeded partially and wrote real data into `buf` that is now\nthrown away. Callers treating this as a fatal copy failure will mis-handle the common\nshort-read case.","fix":"Inspect the read CQE (results[0]) before treating the write cancellation as an error:\nif the read returned a non-negative short count, return that count (or re-issue the\nwrite for the bytes actually read) rather than propagating ECANCELED. Document that\nthe IO_LINK fast path only succeeds end-to-end on a full read, and provide a\nfallback so the caller can retry the residual without losing the bytes already in\n`buf`.","locations":[{"ref":"crates/fast_io/src/io_uring/linked_chain.rs:307-357","code":"  307 | pub fn read_then_write(\n  308 |     mut lease: RingLease<'_>,\n  309 |     src_fd: RawFd,\n  310 |     src_offset: u64,\n  311 |     dst_fd: RawFd,\n  312 |     dst_offset: u64,\n  313 |     buf: &mut [u8],\n  314 | ) -> io::Result<u32> {\n  315 |     let len = u32::try_from(buf.len()).unwrap_or(u32::MAX);\n  316 |     let ptr = buf.as_mut_ptr();\n  317 | \n  318 |     let read_entry = opcode::Read::new(types::Fd(src_fd), ptr, len)\n  319 |         .offset(src_offset)\n  320 |         .build()\n  321 |         .user_data(0)\n  322 |         .flags(squeue::Flags::IO_LINK);\n  323 |     let write_entry = opcode::Write::new(types::Fd(dst_fd), ptr.cast_const(), len)\n  324 |         .offset(dst_offset)\n  325 |         .build()\n  326 |         .user_data(1);\n  327 | \n  328 |     // SAFETY: `buf` is borrowed for the entire call, so the pointer remains\n  329 |     // valid until both CQEs are drained below. The fds are caller-owned and\n  330 |     // outlive the call. The read and write reference the same memory but the\n  331 |     // kernel runs them strictly in order thanks to IOSQE_IO_LINK; only one\n  332 |     // op touches the buffer at a time.\n  333 |     unsafe {\n  334 |         let mut sq = lease.submission();\n  335 |         sq.push(&read_entry)\n  336 |             .map_err(|_| io::Error::other(\"submission queue full\"))?;\n  337 |         sq.push(&write_entry)\n  338 |             .map_err(|_| io::Error::other(\"submission queue full\"))?;\n  339 |     }\n  340 |     lease.submit_and_wait(2)?;\n  341 | \n  342 |     let mut results: [Option<CqeResult>; 2] = [None, None];\n  343 |     while let Some(cqe) = lease.completion().next() {\n  344 |         let idx = cqe.user_data() as usize;\n  345 |         if idx < results.len() {\n  346 |             results[idx] = Some(CqeResult {\n  347 |                 index: idx as u32,\n  348 |                 result: cqe.result(),\n  349 |             });\n  350 |         }\n  351 |     }\n  352 |     // The write CQE carries the bytes-transferred we care about. A failed\n  353 |     // read cancels the write with ECANCELED, which we surface as an error.\n  354 |     results[1]\n  355 |         .ok_or_else(|| io::Error::other(\"missing write CQE in read_then_write chain\"))?\n  356 |         .into_io_result()\n  357 | }","lines":51},{"ref":"crates/fast_io/src/io_uring/linked_chain.rs:216-264","code":"  216 |     pub fn submit_and_wait(mut self) -> io::Result<Vec<CqeResult>> {\n  217 |         if self.ops.is_empty() {\n  218 |             return Ok(Vec::new());\n  219 |         }\n  220 | \n  221 |         let n = self.ops.len();\n  222 |         let last = n - 1;\n  223 | \n  224 |         // SAFETY: Each SQE references a buffer that is borrowed by the\n  225 |         // chain (via the `'r` lifetime captured in `StagedOp`). The chain\n  226 |         // holds those borrows for the entire submit-and-wait cycle, so the\n  227 |         // kernel cannot access a freed or reused buffer. The fd is\n  228 |         // owned/borrowed by the caller and outlives the call. The\n  229 |         // `user_data` we attach is the chain index, which lets us attribute\n  230 |         // CQEs back to their originating SQE when the completion queue\n  231 |         // reorders them.\n  232 |         unsafe {\n  233 |             let mut sq = self.lease.submission();\n  234 |             for (idx, op) in self.ops.iter().enumerate() {\n  235 |                 let entry = build_entry(op, idx as u64);\n  236 |                 let flags = if idx == last {\n  237 |                     squeue::Flags::empty()\n  238 |                 } else {\n  239 |                     squeue::Flags::IO_LINK\n  240 |                 };\n  241 |                 let entry = entry.flags(flags);\n  242 |                 sq.push(&entry)\n  243 |                     .map_err(|_| io::Error::other(\"submission queue full\"))?;\n  244 |             }\n  245 |         }\n  246 | \n  247 |         self.lease.submit_and_wait(n)?;\n  248 | \n  249 |         let mut out = Vec::with_capacity(n);\n  250 |         while let Some(cqe) = self.lease.completion().next() {\n  251 |             out.push(CqeResult {\n  252 |                 index: cqe.user_data() as u32,\n  253 |                 result: cqe.result(),\n  254 |             });\n  255 |         }\n  256 |         if out.len() < n {\n  257 |             return Err(io::Error::other(format!(\n  258 |                 \"io_uring linked chain: expected {n} CQEs, got {}\",\n  259 |                 out.len()\n  260 |             )));\n  261 |         }\n  262 |         out.sort_by_key(|c| c.index);\n  263 |         Ok(out)\n  264 |     }","lines":49}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`KqueueLoop::wait_with_capacity` decodes every returned `libc::kevent` via\n`decode_kevent` and never inspects `EV_ERROR`. When the kernel reports an error\non a registered filter it sets `EV_ERROR` in `flags` and stuffs the errno into\nthe `data` field; the event is still returned by `kevent(2)`. The decode path\nturns this into a normal `KEvent` whose `data` (the errno) is misinterpreted as\n\"bytes available / writable\" per the `KEvent::data` doc. A consumer that reads\n`ev.data` as a byte count after an EV_ERROR event would act on a bogus value\n(e.g. treat an errno like EBADF=9 as 9 readable bytes). `KEvent::is_error()`\nexists but is never consulted internally, and nothing surfaces the error to the\ncaller.","fix":"In the wait decode path, check `ev.flags & libc::EV_ERROR`; when set, either\nsurface it as an `io::Error::from_raw_os_error(ev.data as i32)` or filter the\nevent out / flag it so consumers do not read `data` as a byte count. At minimum\ndocument that `data` is an errno when `is_error()` is true.","locations":[{"ref":"crates/fast_io/src/kqueue/mod.rs:222-240","code":"  222 |     pub fn wait_with_capacity(\n  223 |         &self,\n  224 |         timeout: Option<Duration>,\n  225 |         max_events: usize,\n  226 |     ) -> io::Result<Vec<KEvent>> {\n  227 |         let max_events = max_events.max(1);\n  228 |         let mut events: Vec<libc::kevent> = (0..max_events).map(|_| empty_kevent()).collect();\n  229 |         let ts = timeout.map(duration_to_timespec);\n  230 |         let returned = match self.kevent_call(None, Some(&mut events), ts.as_ref()) {\n  231 |             Ok(n) => n,\n  232 |             Err(err) if err.kind() == io::ErrorKind::Interrupted => return Ok(Vec::new()),\n  233 |             Err(err) => return Err(err),\n  234 |         };\n  235 |         Ok(events\n  236 |             .into_iter()\n  237 |             .take(returned as usize)\n  238 |             .filter_map(decode_kevent)\n  239 |             .collect())\n  240 |     }","lines":19},{"ref":"crates/fast_io/src/kqueue/mod.rs:325-334","code":"  325 | fn decode_kevent(ev: libc::kevent) -> Option<KEvent> {\n  326 |     let filter = KEventFilter::from_raw(ev.filter)?;\n  327 |     Some(KEvent {\n  328 |         fd: ev.ident as RawFd,\n  329 |         filter,\n  330 |         user_data: ev.udata as u64,\n  331 |         data: ev.data as i64,\n  332 |         flags: ev.flags,\n  333 |     })\n  334 | }","lines":10}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`o_tmpfile_available` caches its result in a single process-wide atomic\n`O_TMPFILE_STATUS`, but the support answer is per-filesystem (ext4/xfs/btrfs/\ntmpfs support O_TMPFILE; NFS, FUSE, and some others do not - as the module's own\ndocs note). The first directory probed sets the global verdict for every\nsubsequent directory regardless of which filesystem it lives on. A first probe\non a supporting fs caches AVAILABLE; a later `open_anonymous_tmpfile` on an\nunsupported fs then takes the \"available\" fast path and fails. The reverse\n(first probe on unsupported fs) permanently disables O_TMPFILE for all\nfilesystems in the process. The graceful caller (`open_temp_file`) hides the\ncrash but silently loses the optimization or forces an avoidable per-call\nsyscall failure.","fix":"Key the cache by filesystem identity (e.g. `statfs`/`f_type` or `st_dev` of the\ndirectory) instead of a single global atomic, or drop the cache and probe per\ndirectory. At minimum document that the cache assumes all temp dirs share one\nfilesystem type.","locations":[{"ref":"crates/fast_io/src/o_tmpfile/low_level.rs:40-110","code":"   40 |     /// Cached probe result for `O_TMPFILE` support.\n   41 |     ///\n   42 |     /// 0 = unknown, 1 = available, 2 = unavailable.\n   43 |     static O_TMPFILE_STATUS: AtomicU8 = AtomicU8::new(0);\n   44 | \n   45 |     const STATUS_UNKNOWN: u8 = 0;\n   46 |     const STATUS_AVAILABLE: u8 = 1;\n   47 |     const STATUS_UNAVAILABLE: u8 = 2;\n   48 | \n   49 |     /// Probes whether `O_TMPFILE` is supported on the filesystem containing `dir`.\n   50 |     ///\n   51 |     /// Opens an anonymous file in `dir` and immediately closes it. The result\n   52 |     /// is cached process-wide so subsequent calls are free. Returns `true` if\n   53 |     /// `O_TMPFILE` is usable, `false` otherwise.\n   54 |     ///\n   55 |     /// # Arguments\n   56 |     ///\n   57 |     /// * `dir` - directory on the target filesystem to probe. Must exist and be\n   58 |     ///   writable by the current process.\n   59 |     #[must_use]\n   60 |     pub fn o_tmpfile_available(dir: &Path) -> bool {\n   61 |         let status = O_TMPFILE_STATUS.load(Ordering::Relaxed);\n   62 |         if status != STATUS_UNKNOWN {\n   63 |             return status == STATUS_AVAILABLE;\n   64 |         }\n   65 | \n   66 |         let available = probe_o_tmpfile(dir);\n   67 |         O_TMPFILE_STATUS.store(\n   68 |             if available {\n   69 |                 STATUS_AVAILABLE\n   70 |             } else {\n   71 |                 STATUS_UNAVAILABLE\n   72 |             },\n   73 |             Ordering::Relaxed,\n   74 |         );\n   75 |         available\n   76 |     }\n   77 | \n   78 |     /// Resets the cached probe result. Only intended for testing.\n   79 |     #[cfg(test)]\n   80 |     pub(crate) fn reset_probe_cache() {\n   81 |         O_TMPFILE_STATUS.store(STATUS_UNKNOWN, Ordering::Relaxed);\n   82 |     }\n   83 | \n   84 |     fn probe_o_tmpfile(dir: &Path) -> bool {\n   85 |         let dir_cstr = match CString::new(dir.as_os_str().as_bytes()) {\n   86 |             Ok(c) => c,\n   87 |             Err(_) => return false,\n   88 |         };\n   89 | \n   90 |         // Safety: `dir_cstr` is a valid null-terminated C string pointing to an\n   91 |         // existing directory. `O_TMPFILE | O_WRONLY` creates an unnamed inode\n   92 |         // with no directory entry. Mode 0o600 is used for the probe file.\n   93 |         let fd = unsafe {\n   94 |             libc::open(\n   95 |                 dir_cstr.as_ptr(),\n   96 |                 libc::O_TMPFILE | libc::O_WRONLY,\n   97 |                 libc::mode_t::from(0o600u32),\n   98 |             )\n   99 |         };\n  100 | \n  101 |         if fd < 0 {\n  102 |             return false;\n  103 |         }\n  104 | \n  105 |         // Safety: `fd` is a valid open file descriptor returned by `open(2)`.\n  106 |         unsafe {\n  107 |             libc::close(fd);\n  108 |         }\n  109 |         true\n  110 |     }","lines":71}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`delete_on_close_available` has the same single-global-atomic cache problem as\nthe O_TMPFILE probe: `STATUS` is process-wide but delete-on-close\n(`FileDispositionInfo`) support varies by filesystem/share (e.g. SMB, WebDAV,\nsome network redirectors). The first directory probed fixes the answer for all\nlater directories. A misleading verdict here makes the writer either skip the\ncrash-safe temp path on a capable volume or attempt it on an incapable one.","fix":"Key the cache by volume (e.g. volume serial number from\n`GetVolumeInformationByHandleW`/`GetFileInformationByHandle`) or probe per\ndirectory, mirroring whatever fix the O_TMPFILE probe adopts.","locations":[{"ref":"crates/fast_io/src/win_tmpfile/low_level.rs:326-345","code":"  326 |     pub fn delete_on_close_available(dir: &Path) -> bool {\n  327 |         use std::sync::atomic::AtomicU8;\n  328 | \n  329 |         static STATUS: AtomicU8 = AtomicU8::new(0);\n  330 |         const UNKNOWN: u8 = 0;\n  331 |         const AVAILABLE: u8 = 1;\n  332 |         const UNAVAILABLE: u8 = 2;\n  333 | \n  334 |         let status = STATUS.load(Ordering::Relaxed);\n  335 |         if status != UNKNOWN {\n  336 |             return status == AVAILABLE;\n  337 |         }\n  338 | \n  339 |         let available = probe_delete_on_close(dir);\n  340 |         STATUS.store(\n  341 |             if available { AVAILABLE } else { UNAVAILABLE },\n  342 |             Ordering::Relaxed,\n  343 |         );\n  344 |         available\n  345 |     }","lines":20}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The `C` rule modifier (cvs_mode) is parsed in `parse_modifiers` and stored on\n`RuleModifiers.cvs_mode`, but it is never read anywhere in the crate\n(`RuleModifiers::apply` ignores it and no other code references the field).\nIn upstream rsync the per-rule `C` modifier sets `FILTRULE_CVS_IGNORE`, which\nchanges how a merge/dir-merge file is interpreted (CVS-style: word-split,\nexclude-only, no modifier parsing) and, for a standalone rule, pulls in the\ndefault CVS exclusion list. Here a rule such as `:C .cvsignore` or `-C ...`\nparses without error but silently behaves like a plain rule, so CVS-ignore\nsemantics are dropped. Confirmed via grep: the only references to `cvs_mode`\nare the doc table, the field declaration, and the assignment.","fix":"Either honour the modifier (when `cvs_mode` is set on a merge/dir-merge rule,\nmark the resulting merge rule so its contents are parsed in CVS-ignore mode and\nappend the default CVS patterns; for a non-merge rule, treat it as\n`--cvs-exclude`), or, if CVS-per-rule mode is intentionally unsupported, reject\nthe `C` modifier with a parse error instead of silently accepting and dropping\nit. Add a regression test that a `C`-modified rule changes rmissions::apply_permissions_without_chmod`.","locations":[{"ref":"crates/metadata/src/apply_batch.rs:146-172","code":"  146 |     #[cfg(unix)]\n  147 |     fn apply_permissions_cached(\n  148 |         &mut self,\n  149 |         destination: &Path,\n  150 |         metadata: &fs::Metadata,\n  151 |     ) -> Result<(), MetadataError> {\n  152 |         if !self.options.permissions() && !self.options.executability() {\n  153 |             return Ok(());\n  154 |         }\n  155 | \n  156 |         let desired_mode = metadata.permissions().mode();\n  157 | \n  158 |         let needs_chmod = match self.cache.mode_matches(destination, desired_mode) {\n  159 |             Ok(matches) => !matches,\n  160 |             Err(_) => true,\n  161 |         };\n  162 | \n  163 |         if needs_chmod {\n  164 |             let permissions = PermissionsExt::from_mode(desired_mode);\n  165 |             fs::set_permissions(destination, permissions)\n  166 |                 .map_err(|error| MetadataError::new(\"preserve permissions\", destination, error))?;\n  167 | \n  168 |             self.cache.invalidate(destination);\n  169 |         }\n  170 | \n  171 |         Ok(())\n  172 |     }","lines":27}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The convenience entry point `read_entry`/`read_file_entry` silently produces a\ncorrupt entry for abbreviated hardlink followers. `read_entry` calls\n`read_entry_with_flist(reader, &[])` with an empty segment slice. When the entry is\nan abbreviated follower (`is_abbreviated_follower` true), the leader lookup\n`segment_entries.get(leader_local_idx)` always returns `None`, so the code takes the\nfallback branch that fabricates zeroed metadata (size 0, mode 0, mtime 0,\ncontent_dir true) WITHOUT updating compression state. Because the compression state\nis not advanced to match the sender's statics, every subsequent entry in the stream\ncan then be decoded with the wrong same_* baseline, cascading into corrupt or\nmis-parsed entries. The fallback comment acknowledges this. The public single-entry\nAPI is thus unsafe to use whenever hardlinks are preserved.","fix":"Either return an explicit error when an abbreviated follower is encountered with no segment_entries available, or document `read_entry`/`read_file_entry` as unusable with preserve_hard_links and steer callers to `read_entry_with_flist`. Do not silently fabricate zeroed metadata and skip the compression-state update.","locations":[{"ref":"crates/protocol/src/flist/read/mod.rs:469-474","code":"  469 |     pub fn read_entry<R: Read + ?Sized>(\n  470 |         &mut self,\n  471 |         reader: &mut R,\n  472 |     ) -> io::Result<Option<FileEntry>> {\n  473 |         self.read_entry_with_flist(reader, &[])\n  474 |     }","lines":6},{"ref":"crates/protocol/src/flist/read/mod.rs:583-609","code":"  583 |                 } else {\n  584 |                     // Leader not available (segment_entries not provided or\n  585 |                     // index out of range) - fall back to zero metadata.\n  586 |                     // Compression state is NOT updated, which may cause\n  587 |                     // subsequent decode errors if the caller didn't pass\n  588 |                     // segment_entries.\n  589 |                     (\n  590 |                         0u64,\n  591 |                         MetadataResult {\n  592 |                             mtime: 0,\n  593 |                             nsec: 0,\n  594 |                             mode: 0,\n  595 |                             uid: None,\n  596 |                             gid: None,\n  597 |                             user_name: None,\n  598 |                             group_name: None,\n  599 |                             atime: None,\n  600 |                             atime_nsec: 0,\n  601 |                             crtime: None,\n  602 |                             content_dir: true,\n  603 |                         },\n  604 |                         None,\n  605 |                         None,\n  606 |                         None,\n  607 |                         None,\n  608 |                     )\n  609 |                 }","lines":27}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`generate_delta_from_signature` discards the basis file's last-block remainder\nlength. It reconstructs the `SignatureLayout` with `remainder = 0` and a comment\nclaiming \"remainder unknown from wire format\", but the remainder IS on the wire:\nthe receiver sends it in the `sum_head` (`SumHead.remainder`, read in\n`run_transfer_loop`) and it is dropped before building `DeltaGeneratorConfig`\n(which has no remainder field). With remainder forced to 0 the engine treats the\nfinal basis block as a full `block_length` block, so the sender computes the\nwrong expected length / rolling sum coverage for the trailing partial block and\ncan never match it. The result is the trailing partial block is always\nre-transmitted as literal data instead of a Copy token - a silent delta-\nefficiency regression for every non-block-aligned file (the common case). Output\nstays correct (literals reconstruct the file), but the whole point of delta\ntransfer is lost for the file tail.","fix":"Thread `sum_head.remainder` through `DeltaGeneratorConfig` into\n`generate_delta_from_signature` and pass it to\n`SignatureLayout::from_raw_parts(block_length_nz, remainder, block_count, ...)`\ninstead of the hardcoded 0. Update the misleading \"remainder unknown from wire\nformat\" comment.","locations":[{"ref":"crates/transfer/src/generator/delta.rs:136-161","code":"  136 |     let block_count = config.sig_blocks.len() as u64;\n  137 | \n  138 |     // Reconstruct signature layout (remainder unknown, set to 0)\n  139 |     let layout = SignatureLayout::from_raw_parts(\n  140 |         block_length_nz,\n  141 |         0, // remainder unknown from wire format\n  142 |         block_count,\n  143 |         strong_sum_length_nz,\n  144 |     );\n  145 | \n  146 |     // Convert wire blocks to engine signature blocks (consumes sig_blocks)\n  147 |     let engine_blocks: Vec<SignatureBlock> = config\n  148 |         .sig_blocks\n  149 |         .into_iter()\n  150 |         .map(|wire_block| {\n  151 |             SignatureBlock::from_raw_parts(\n  152 |                 wire_block.index as u64,\n  153 |                 RollingDigest::from_value(wire_block.rolling_sum, config.block_length as usize),\n  154 |                 &wire_block.strong_sum,\n  155 |             )\n  156 |         })\n  157 |         .collect();\n  158 | \n  159 |     // Calculate total bytes (approximation since we don't know exact remainder)\n  160 |     let total_bytes = (block_count.saturating_sub(1)) * u64::from(config.block_length);\n  161 |     let signature = FileSignature::from_raw_parts(layout, engine_blocks, total_bytes);","lines":26},{"ref":"crates/transfer/src/generator/transfer/transfer_loop.rs:385-416","code":"  385 |             let sig_blocks = read_signature_blocks(&mut *reader, &sum_head)?;\n  386 |             let bytes_per_block = 4 + sum_head.s2length as u64;\n  387 |             self.timing.total_bytes_read += sum_head.count as u64 * bytes_per_block;\n  388 | \n  389 |             let block_length = sum_head.blength;\n  390 |             let strong_sum_length = sum_head.s2length as u8;\n  391 |             let has_basis = !sum_head.is_empty();\n  392 | \n  393 |             if !file_entry.is_file() {\n  394 |                 continue;\n  395 |             }\n  396 | \n  397 |             let file_size = file_entry.size();\n  398 | \n  399 |             if has_basis {\n  400 |                 let source: Box<dyn Read> = match self.open_source_reader(source_path, file_size) {\n  401 |                     Ok(r) => r,\n  402 |                     Err(e) => {\n  403 |                         self.record_open_failure(&mut *writer, wire_ndx      algorithm: protocol::ChecksumAlgorithm,\n  340 |     expected: &[u8],\n  341 | ) -> bool {\n  342 |     use std::io::Read;\n  343 | \n  344 |     use crate::delta_apply::ChecksumVerifier;\n  345 | \n  346 |     let Ok(mut file) = fs::File::open(path) else {\n  347 |         return false;\n  348 |     };\n  349 |     let mut hasher = ChecksumVerifier::for_algorithm(algorithm);\n  350 |     // upstream: rsync.h:159 MAX_MAP_SIZE = 256*1024\n  351 |     let mut buf = vec![0u8; 256 * 1024];\n  352 |     let mut remaining = file_size;\n  353 |     while remaining > 0 {\n  354 |         let to_read = buf.len().min(remaining as usize);\n  355 |         if file.read_exact(&mut buf[..to_read]).is_err() {\n  356 |             return false;\n  357 |         }\n  358 |         hasher.update(&buf[..to_read]);\n  359 |         remaining -= to_read as u64;\n  360 |     }\n  361 |     let mut digest = [0u8; ChecksumVerifier::MAX_DIGEST_LEN];\n  362 |     let len = hasher.finalize_into(&mut digest);\n  363 |     let cmp_len = expected.len().min(len);\n  364 |     digest[..cmp_len] == expected[..cmp_len]\n  365 | }","lines":30}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`--modify-window` is validated twice with inconsistent ranges. The clap-stage check\nparses the value as `i32` and rejects `n < 0` (parser/mod.rs:203-227, max ~2.1e9), while\nthe authoritative `parse_modify_window_argument` parses as `u64` (numeric.rs:171-217).\nA value such as `--modify-window=5000000000` is rejected at the i32 stage even though the\nreal parser would accept it. The early `i32` parse is a redundant, narrower gate that can\nreject otherwise-valid input.","fix":"Drop the redundant early `i32` parse (consistent with how `min-size`/`max-size` defer to\ntheir dedicated parsers) or widen it to match `parse_modify_window_argument`'s `u64`\ndomain so the two layers agree.","locations":[{"ref":"crates/cli/src/frontend/arguments/parser/mod.rs:203-227","code":"  203 |     let modify_window = match matches.remove_one::<OsString>(\"modify-window\") {\n  204 |         Some(value) => {\n  205 |             let s = value.to_string_lossy();\n  206 |             match s.parse::<i32>() {\n  207 |                 Ok(n) if n >= 0 => Some(value),\n  208 |                 Ok(_) => {\n  209 |                     return Err(clap::Error::raw(\n  210 |                         clap::error::ErrorKind::ValueValidation,\n  211 |                         format!(\n  212 |                             \"invalid --modify-window value '{s}': must be a non-negative integer\\n\"\n  213 |                         ),\n  214 |                     ));\n  215 |                 }\n  216 |                 Err(_) => {\n  217 |                     return Err(clap::Error::raw(\n  218 |                         clap::error::ErrorKind::ValueValidation,\n  219 |                         format!(\n  220 |                             \"invalid --modify-window value '{s}': must be a non-negative integer\\n\"\n  221 |                         ),\n  222 |                     ));\n  223 |                 }\n  224 |             }\n  225 |         }\n  226 |         None => None,\n  227 |     };","lines":25}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`--protocol` empty/whitespace handling is inconsistent. `display` is computed from the\ntrimmed text, but the value passed to `ProtocolVersion::from_str` is the untrimmed\n`text.as_ref()`. A value like `--protocol=\" 30 \"` is parsed with surrounding whitespace\nand fails as an invalid digit, even though the trimming logic at the top suggests\nwhitespace was meant to be tolerated. Either trimming should be applied to the parsed\nvalue too, or it should not be computed for display only.","fix":"Parse the trimmed string: `ProtocolVersion::from_str(trimmed)` instead of\n`text.as_ref()`, so the leading/trailing-whitespace handling is consistent with the\nother numeric : &str) -> Option<(Option<&str>, &str, &str)> {\n  312 |     if let Some(double_colon_pos) = uri.find(\"::\") {\n  313 |         let host_part = &uri[..double_colon_pos];\n  314 |         let path_part = &uri[double_colon_pos..];\n  315 | \n  316 |         if let Some(at_pos) = host_part.find('@') {\n  317 |             let user = &host_part[..at_pos];\n  318 |             let host = &host_part[at_pos + 1..];\n  319 |             return Some((Some(user), host, path_part));\n  320 |         } else {\n  321 |             return Some((None, host_part, path_part));\n  322 |         }\n  323 |     }\n  324 | \n  325 |     let colon_pos = uri.find(':')?;\n  326 |     let host_part = &uri[..colon_pos];\n  327 |     let path_part = &uri[colon_pos + 1..];\n  328 | \n  329 |     if let Some(at_pos) = host_part.find('@') {\n  330 |         let user = &host_part[..at_pos];\n  331 |         let host = &host_part[at_pos + 1..];\n  332 |         Some((Some(user), host, path_part))\n  333 |     } else {\n  334 |         Some((None, host_part, path_part))\n  335 |     }\n  336 | }","lines":26}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The module-level doc example in signal/mod.rs calls `SignalHandler::install()?`, but no such\nassociated function exists - the public installer is the free function `install_signal_handlers()`\n(unix.rs:203 / stub.rs:105). The example is a ```no_run``` block, which is still compiled by\n`cargo test --doc`, so it fails to compile as written (the body also calls\n`std::process::exit(20)`, fine, but the constructor call is invalid).","fix":"Replace `let handler = SignalHandler::install()?;` with\n`let handler = core::signal::install_signal_handlers()?;` (and import accordingly), matching the\nactual API.","locations":[{"ref":"crates/core/src/signal/mod.rs:34-56","code":"   34 | //! ```no_run\n   35 | //! use core::signal::{SignalHandler, CleanupManager};\n   36 | //! use std::path::PathBuf;\n   37 | rotocol_version: Option<ProtocolVersion>,\n  161 | ) -> io::Result<bool> {\n  162 |     let secrets_path = match &module.secrets_file {\n  163 |         Some(path) => path,\n  164 |         None => return Ok(false),\n  165 |     };\n  166 | \n  167 |     if module.strict_modes {\n  168 |         check_secrets_file_permissions(secrets_path)?;\n  169 |     }\n  170 | \n  171 |     let contents = fs::read_to_string(secrets_path)?;\n  172 | \n  173 |     for raw_line in contents.lines() {\n  174 |         let line = raw_line.trim_end_matches('\\r');\n  175 |         if line.is_empty() || line.starts_with('#') {\n  176 |             continue;\n  177 |         }\n  178 | \n  179 |         if let Some((user, secret)) = line.split_once(':')\n  180 |             && user == username\n  181 |             && verify_daemon_auth_response(\n  182 |                 secret.as_bytes(),\n  183 |                 challenge,\n  184 |                 response,\n  185 |                 protocol_version.map(|v| v.as_u8()),\n  186 |             )\n  187 |         {\n  188 |             return Ok(true);\n  189 |         }\n  190 |     }\n  191 | \n  192 |     Ok(false)\n  193 | }","lines":39}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`ReorderBuffer::take` decrements `count` but never decrements\n`high_water_offset`, unlike `next_in_order` which does\n`high_water_offset = high_water_offset.saturating_sub(1)` and resets it to 0\nwhen the buffer empties. The spill layer's `spill_excess` calls `take` to\nremove items for serialization. After items are taken so the buffer empties\n(count == 0), `high_water_offset` can remain non-zero. Subsequent adaptive\nshrink uses `floor = gap_window.max(min)` where `gap_window` is the stale\n`high_water_offset`, preventing the ring from shrinking back toward `min`\n(wasted memory). The `resize_to` debug_assert (`new_capacity >= high_water_offset`)\nis also keyed off the stale value. Functionally non-fatal (it only blocks a\nshrink and inflates the assert floor), but it makes the adaptive policy\nunder-shrink after spill extraction.","fix":"In `take`, recompute or decrement `high_water_offset` consistently with\n`next_in_order` (e.g. reset to 0 when `count` reaches 0, or scan the ring to\nrecompute the highest occupied offset), so the adaptive shrink floor reflects\nthe true live window after extraction.","locations":[{"ref":"crates/engine/src/concurrent_delta/reorder/mod.rs:678-690","code":"  678 |     pub fn take(&mut self, sequence: u64) -> Option<T> {\n  679 |         if self.bypass {\n  680 |             // Bypass mode does not support indexed extraction.\n  681 |             return None;\n  682 |         }\n  683 |         let idx = self.slot_index(sequence)?;\n  684 |         let item = self.slots[idx].take()?;\n  685 |         self.count -= 1;\n  686 |         // Do not adjust high_water_offset here - it remains valid as an\n  687 |         // upper bound. The adaptive policy will naturally recalibrate.\n  688 |         self.refresh_stall_state();\n  689 |         Some(item)\n  690 |     }","lines":13}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`parse_filter_directive_line` tests the comment prefix on the raw, un-trimmed line: `if text.is_empty() || text.starts_with('#')`. A leading-whitespace comment such as \"  # note\" is not recognized as a comment (the `#` check runs before `trim_start`). After trimming it becomes \"# note\", fails all directive branches, and falls through to the unsupported-directive error, turning an indented comment in a per-directory merge file into a hard parse error.","fix":"Compute the trimmed line first, then test `trimmed.starts_with('#')` for the comment shortcut (the Lines parser in load.rs already does this on the trimmed line).","locations":[{"ref":"crates/engine/src/local_copy/dir_merge/parse/line.rs:131-140","code":"  131 |     if text.is_empty() || text.starts_with('#') {\n  132 |         return Ok(None);\n  133 |     }\n  134 | \n  135 |     let trimmed = text.trim_start();\n  136 |     if trimmed.is_empty() {\n  137 |         return Ok(None);\n  138 |     }\n  139 | \n  140 |     let trimmed = trimmed.trim_end();","lines":10}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`exit_code()` maps `LocalCopyErrorKind::InvalidArgument` (empty operand, remote-operand-unsupported, replace-dir-with-file, etc.) to `INVALID_OPERAND_EXIT_CODE` (23 = RERR_PARTIAL) and `code_name()` returns \"RERR_PARTIAL\" for it. Upstream rsync reports operand/argument-syntax problems as RERR_SYNTAX (1), not RERR_PARTIAL (23). Returning a partial-transfer exit code for what are actually argument-validation failures can mislead scripts that branch on exit codes. (MissingSourceOperands correctly maps to 1.)","fix":"Map InvalidArgument to exit code 1 (RERR_SYNTAX) / code_name \"RERR_SYNTAX\", or confirm and document why operand errors intentionally use RERR_PARTIAL if that mirrors a specific upstream path.","locations":[{"ref":"crates/engine/src/local_copy/error.rs:93-109","code":"   93 |     pub fn exit_code(&self) -> i32 {\n   94 |         match &self.kind {\n   95 |             LocalCopyErrorKind::MissingSourceOperands => MISSING_OPERANDS_EXIT_CODE,\n   96 |             LocalCopyErrorKind::InvalidArgument(_) => INVALID_OPERAND_EXIT_CODE,\n   97 |             LocalCopyErrorKind::Io { source, .. } => {\n   98 |                 if source.kind() == io::ErrorKind::NotFound {\n   99 |                     VANISHED_EXIT_CODE\n  100 |                 } else {\n  101 |                     INVALID_OPERAND_EXIT_CODE\n  102 |                 }\n  103 |             }\n  104 |             LocalCopyErrorKind::Timeout { .. } | LocalCopyErrorKind::StopAtReached { .. } => {\n  105 |                 TIMEOUT_EXIT_CODE\n  106 |             }\n  107 |             LocalCopyErrorKind::DeleteLimitExceeded { .. } => MAX_DELETE_EXI directory\",\n  358 |                 path_buf.clone(),\n  359 |                 error,\n  360 |             ));\n  361 |         }\n  362 |     };\n  363 |     for entry in read_dir {\n  364 |         context.enforce_timeout()?;\n  365 |         let entry = entry.map_err(|error| {\n  366 |             LocalCopyError::io(\"read extraneous directory entry\", path_buf.as_path(), error)\n  367 |         })?;\n  368 |         let name = entry.file_name();\n  369 |         path_buf.push(&name);\n  370 |         relative_buf.push(&name);\n  371 |         let file_type = entry.file_type().map_err(|error| {\n  372 |             LocalCopyError::io(\n  373 |                 \"inspect extraneous directory entry\",\n  374 |                 path_buf.clone(),\n  375 |                 error,\n  376 |             )\n  377 |         })?;\n  378 |         if file_type.is_dir() {\n  379 |             record_directory_subtree(context, path_buf, relative_buf)?;\n  380 |             info_log!(Del, 1, \"deleting directory {}\", relative_buf.display());\n  381 |         } else {\n  382 |             info_log!(Del, 1, \"deleting {}\", relative_buf.display());\n  383 |         }\n  384 |         context.summary_mut().record_deletion();\n  385 |         context.record(LocalCopyRecord::new(\n  386 |             relative_buf.clone(),\n  387 |             LocalCopyAction::EntryDeleted,\n  388 |             0,\n  389 |             None,\n  390 |             Duration::default(),\n  391 |             None,\n  392 |         ));\n  393 |         context.register_progress();\n  394 |         relative_buf.pop();\n  395 |         path_buf.pop();\n  396 |     }\n  397 |     Ok(())\n  398 | }","lines":116}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`SparseWriter::write_sparse` over-counts `zero_runs_detected`. The check `if self.pending_zeros > 0` at the flush site runs *after* `self.pending_zeros = self.pending_zeros.saturating_add(leading)`, so any );\n  258 |             }","lines":66}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`metadata_unchanged` does not account for `--executability` when computing the chmod\nbase mode (or at all). It evaluates the permission quick-check only under\n`options.permissions()` and the chmod base under `permissions()` vs raw `cached_meta`,\nbut never considers the `executability()`-only case. Combined with the\n`apply_permissions_from_entry` gap above, a file whose only required change is its\nexecute bits (under `-E`) can be reported as \"unchanged\" and skipped, or - if the apply\npath is taken - left unmodified anyway. The two functions must agree on what\n\"unchanged\" means for executability.","fix":"Add an executability branch to `metadata_unchanged`: when `options.executability()` is\nset, compare `cached_meta.mode() & 0o111` against `entry.permissions() & 0o111` and\nreturn `false` on mismatch, keeping it consistent with the (fixed) apply path.","locations":[{"ref":"crates/metadata/src/apply/mod.rs:210-298","code":"  210 | pub fn metadata_unchanged(\n  211 |     entry: &protocol::flist::FileEntry,\n  212 |     options: &MetadataOptions,\n  213 |     cached_meta: &fs::Metadata,\n  214 | ) -> bool {\n  215 |     #[cfg(unix)]\n  216 |     {\n  217 |         use std::os::unix::fs::MetadataExt;\n  218 | \n  219 |         // upstream: generator.c:487-488 - perms_differ(file, sxp)\n  220 |         if options.permissions() && (cached_meta.mode() & 0o7777) != (entry.permissions() & 0o7777)\n  221 |         {\n  222 |             return false;\n  223 |         }\n  224 | \n  225 |         // upstream: generator.c:489-490 - ownership_differs(file, sxp)\n  226 |         if options.owner() {\n  227 |             if let Some(uid) = entry.uid() {\n  228 |                 if cached_meta.uid() != uid {\n  229 |                     return false;\n  230 |                 }\n  231 |             }\n  232 |         }\n  233 |         if 495-502 - chmod modifiers applied on top of the\n  280 |     // entry's mode. Evaluate the modifier against the current stat and only\n  281 |     // fall through to the full apply path when the result would differ.\n  282 |     #[cfg(unix)]\n  283 |     if let Some(chmod) = options.chmod() {\n  284 |         use std::os::unix::fs::MetadataExt;\n  285 |         let base_mode = if options.permissions() {\n  286 |             entry.permissions()\n  287 |         } else {\n  288 |             cached_meta.mode()\n  289 |         };\n  290 |         let new_mode = chmod.apply(base_mode, cached_meta.file_type());\n  291 |         if (cached_meta.mode() & 0o7777) != (new_mode & 0o7777) {\n  292 |             return false;\n  293 |         }\n  294 |     }\n  295 |     #[cfg(not(unix))]\n  296 |     if options.chmod().is_some() {\n  297 |         return false;\n  298 |     }","lines":89}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`apply_crtime_from_source_metadata` silently discards creation times at or before the\nUnix epoch: it only calls `set_crtime` when `secs > 0`, so a birth time of exactly\n1970-01-01 00:00:00 UTC (secs == 0) or any pre-1970 birth time\n(`duration_since(UNIX_EPOCH)` returns `Err`, also skipped) is never applied. The\n`FileEntry` path (`apply_crtime_from_entry`) calls `set_crtime` unconditionally with\nthe raw value, so the two crtime paths disagree on epoch/negative handling. On macOS\n`setattrlist` accepts a zero or negative `tv_sec`, so the guard needlessly drops valid\ncrtimes.","fix":"Drop the `secs > 0` gate (use `>= 0` only if negative crtimes are genuinely\nunsupported on the target), and handle the pre-epoch `Err` from `duration_since` by\ncomputing a negative `tv_sec` via `UNIX_EPOCH.duration_since(created)` so the two\ncrtime paths behave identically.","locations":[{"ref":"crates/metadata/src/apply/timestamps.rs:295-308","code":"  295 | pub(super) fn apply_crtime_from_source_metadata(\n  296 |     destination: &Path,\n  297 |     metadata: &fs::Metadata,\n  298 | ) -> Result<(), MetadataError> {\n  299 |     if let Ok(created) = metadata.created() {\n  300 |         if let Ok(duration) = created.duration_since(std::time::UNIX_EPOCH) {\n  301 |             let secs = duration.as_secs() as i64;\n  302 |             if secs > 0 {\n  303 |                 set_crtime(destination, secs)?;\n  304 |             }\n  305 |         }\n  306 |     }\n  307 |     Ok(())\n  308 | }","lines":14}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The chmod symbolic-permission parser accepts uppercase `R` and `W` as read/write and\nuppercase who-letters `U`/`G`/`O`/`A` as user/group/other/all. Neither GNU chmod nor\nupstream rsync's `--chmod` recognize these: the only uppercase tokens with meaning are\n`X` (conditional exec) and the special-bit shorthands. Accepting `R`/`W`/`U`/`G`/`O`\nmeans malformed specs that should error (e.g. `uRw`, `U+x`) are silently parsed as if\nthey were valid, diverging from upstream and masking user typos.","fix":"Match only the lowercase who-letters (`u`/`g`/`o`/`a`) and the documented perm tokens\n(`r`/`w`/`x`/`X`/`s`/`t`/`u`/`g`/`o`), returning `ChmodError` for any other character,\nto match GNU chmod / upstream `--chmod` parsing.","locations":[{"ref":"crates/metadata/src/chmod/parse.rs:63-87","code":"   63 |     loop {\n   64 |         match chars.peek().copied() {\n   65 |             Some('u') | Some('U') => {\n   66 |                 who.user = true;\n   67 |                 consumed_who = true;\n   68 |                 chars.next();\n   69 |             }\n   70 |             Some('g') | Some('G') => {\n   71 |                 who.group = true;\n   72 |                 consumed_who = true;\n   73 |                 chars.next();\n   74 |             }\n   75 |             Some('o') | Some('O') => {\n   76 |                 who.other = true;\n   77 |                 consumed_who = true;\n   78 |                 chars.next();\n   79 |             }\n   80 |             Some('a') | Some('A') => {\n   81 |                 who = WhoMask::new(true, true, true);\n   82 |                 consumed_who = true;\n   83 |                 chars.next();\n   84 |             }\n   85 |             _ => break,\n   86 |         }\n   87 |     }","lines":25},{"ref":"crates/metadata/src/chmod/parse.rs:142-158","code":"  142 |     for ch in perms.chars() {\n  143 |         match ch {\n  144 |             'r' | 'R' => spec.read = true,\n  145 |             'w' | 'W' => spec.write = true,\n  146 |             'x' => spec.exec = true,\n  147 |             'X' => spec.exec_if_conditional = true,\n  148 |             's' | 'S' => {\n  149 |                 spec.setuid = true;\n  150 |                 spec.setgid = true;\n  151 |             }\n  152 |             't' | 'T' => spec.sticky = true,\n  153 |             'u' | 'U' => spec.copy_user = true,\n  154 |             'g' | 'G' => spec.copy_group = true,\n  155 |             'o' | 'O' => spec.copy_other = true,\n  156 |             _ => return Err(ChmodError::new(format!(\"unsupported chmod token '{ch}'\"))),\n  157 |         }\n  158 |     }","lines":17}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`AckBatcher::write_batch` clamps the entry count to `u16::MAX` and then writes\nonly the first `count` entries (`batch.iter().take(count as usize)`). If a\nbatch ever contains more than 65535 entries, the excess ACKs are silently\ndropped from the wire while the in-memory `take_batch()` already considered\nthem \"sent\" (incrementing `total_sent`). The default config bounds batch size\nwell below this, so it is not currently reachable through normal flushing, but\n`force_flush`/`flush_if_needed` operate on `self.pending` whose growth is not\notherwise capped to <= u16::MAX, so a misconfiguration or future caller could\nhit silent ACK loss.","fix":"Either assert/return an error when `batch.len() > u16::MAX`, or split oversized batches into multiple length-prefixed wire frames so no ACK is dropped.","locations":[{"ref":"crates/transfer/src/ack_batcher/batcher.rs:167-180","code":"  167 |     pub fn write_batch<W: Write + ?Sized>(batch: &[AckEntry], writer: &mut W) -> io::Result<()> {\n  168 |         if batch.is_empty() {\n  169 |             return Ok(());\n  170 |         }\n  171 | \n  172 |         let count = batch.len().min(u16::MAX as usize) as u16;\n  173 |         writer.write_all(&count.to_le_bytes())?;\n  174 | \n  175 |         for entry in batch.iter().take(count as usize) {\n  176 |             entry.write(writer)?;\n  177 |         }\n  178 | \n  179 |         Ok(())\n  180 |     }","lines":14}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"`ExitCode::description()` returns wrong text for `Terminated` (16) and `Crashed` (15), and\n`Terminated` is a verbatim copy of `Signal`'s string. Line 162 maps `Self::Terminated` to\n\"received SIGINT, SIGTERM, or SIGHUP\" - identical to `Self::Signal` on line 164 - but exit code 16\nis RERR_TERMINATED (\"sibling process terminated abnormally\"). Line 161 maps `Self::Crashed` to\n\"received SIGSEGV or SIGBUS or SIGABRT\" while upstream RERR_CRASHED (15) is \"sibling process\ncrashed\". These also contradict the variants' own doc comments (lines 73-81: \"Sibling process\ncrashed\" / \"Sibling terminated abnormally\") and the canonical table in message/strings.rs (lines\n105-106), which already have the correct upstream wording. A caller distinguishing crash vs.\nsignal-termination via the description string cannot tell `Terminated` from `Signal`.","fix":"Align with upstream rerr_names and the strings.rs table: `Self::Crashed => \"sibling process\ncrashed\"` (or \"received SIGSEGV or SIGBUS or SIGABRT\" per the variant intent, but pick one and make\nit distinct from Signal) and `Self::Terminated => \"sibling process terminated abnormally\"`. Ideally\nhave description() delegate to message::strings so the two tables cannot drift.","locations":[{"ref":"crates/core/src/exit_code/codes.rs:161-164","code":"  161 |             Self::Crashed => \"received SIGSEGV or SIGBUS or SIGABRT\",\n  162 |             Self::Terminated => \"received SIGINT, SIGTERM, or SIGHUP\",\n  163 |             Self::Signal1 => \"received SIGUSR1\",\n  164 |             Self::Signal => \"received SIGINT, SIGTERM, or SIGHUP\",","lines":4}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"The parallel delete consumer's directory-not-empty detection diverges from\nthe sequential emitter. In `parallel_consumer.rs`, `is_not_empty` only checks\n`io::ErrorKind::DirectoryNotEmpty`, whereas the sequential emitter\n(`emitter/mod.rs::is_not_empty`) additionally treats raw errno 39 (Linux\nENOTEMPTY) and 66 (BSD/macOS ENOTEMPTY) as not-empty. On platforms/libc\nversions where `rmdir` surfaces a raw errno that std does not map to\n`DirectoryNotEmpty`, the parallel consumer's `dispatch_dir` will treat\nENOTEMPTY as a hard error and return it instead of recursing via\n`remove_dir_all`, breaking the recursive directory peel that the sequential\npath performs. The two code paths are meant to be byte-for-byte equivalent\n(DEL-2.d migration), so this is a parity/copy-paste divergence.","fix":"Make the parallel consumer's `is_not_empty` match the sequential emitter:\nalso return true for `err.raw_os_error() == Some(39) | Some(66)`. Better,\nshare a single `is_not_empty` helper between the two modules.","locations":[{"ref":"crates/engine/src/delete/parallel_consumer.rs:378-388","code":"  378 | fn dispatch_dir<F: DeleteFs>(fs: &F, path: &std::path::Path) -> io::Result<()> {\n  379 |     match fs.rmdir(path) {\n  380 |         Ok(()) => Ok(()),\n  381 |         Err(err) if is_not_empty(&err) => fs.remove_dir_all(path),\n  382 |         Err(err) => Err(err),\n  383 |     }\n  384 | }\n  385 | \n  386 | fn is_not_empty(err: &io::Error) -> bool {\n  387 |     matches!(err.kind(), io::ErrorKind::DirectoryNotEmpty)\n  388 | }","lines":11},{"ref":"crates/engine/src/delete/emitter/mod.rs:558-565","code":"  558 | fn is_not_empty(err: &io::Error) -> bool {\n  559 |     if err.kind() == io::ErrorKind::DirectoryNotEmpty {\n  560 |         return true;\n  561 |     }\n  562 |     // ENOTEMPTY is 39 on Linux, 66 on BSD/macOS. Keep the check raw so\n  563 |     // it works on any platform without a libc dep.\n  564 |     matches!(err.raw_os_error(), Some(39) | Some(66))\n  565 | }","lines":8}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"`run_daemon_over_remote_shell` spawns the system ssh process and wraps its stdio in a\n`DaemonStream::from_child_process`. After the transfer, the child is owned by `DaemonStreamGuard`,\nwhose `Drop` impl does `child.kill(); child.wait()` unconditionally. The remote rsync exit status is\nnever collected and never mapped to an rsync exit code, and the remote process is killed even on a\nclean shutdown rather than being allowed to exit and flush. This both loses the remote error/exit\ncode (so a remote-side failure can be reported as success) and can truncate the final goodbye. The\ndirect-SSH path correctly uses `wait_with_stderr` + `map_child_exit_status`; the daemon-over-rsh\npath does not.","fix":"Before dropping the guard, close the writer to signal EOF, wait on the child, and map its exit\nstatus with `map_child_exit_status`, propagating the worst of the transfer and child exit codes\n(mirroring `run_server_over_ssh_connection`). Reserve the kill-on-drop behaviour for the\nerror/early-return path only.","locations":[{"ref":"crates/core/src/client/remote/daemon_transfer/mod.rs:329-411","code":"  329 |     let mut child = cmd.spawn().map_err(|e| {\n  330 |         invalid_argument_error(\n  331 |             &format!(\"failed to spawn remote shell for daemon
