716 |             quotaIt.value() = qMin(quotaIt.value(), _fileToUpload._size - 1);\n  717 |         } else {\n  718 |             propagator()->_folderQuota[path] = _fileToUpload._size - 1;\n  719 |         }\n  720 | \n  721 |         // Set up the error\n  722 |         status = SyncFileItem::DetailError;\n  723 |         errorString = tr(\"Upload of %1 exceeds the quota for the folder\").arg(Utility::octetsToString(_fileToUpload._size));\n  724 |         emit propagator()->insufficientRemoteStorage();"}]},{"id":"LOGIC_99","type":"logic_error","type_label":"Logic Error","severity":"low","description":"doStartUpload (NG) computes `_transferId = uint(...) ^ (uint(_fileToUpload._size) << 16) ^ ...`. _fileToUpload._size is a qint64; truncating to uint and shifting left by 16 discards the high bytes of the size, so very large files contribute little entropy and the comment elsewhere (slotPropfindFinished line 156-157) claiming 'size is xor'ed with the transfer id, therefore impossible that there is more data on the server than on the file' is not actually guaranteed by this weak hashing.","fix":"Document that _transferId is only a best-effort uniqueness token, and keep the explicit `_sent > _fileToUpload._size` runtime check (which is correctly present) as the real safeguard; do not rely on the XOR for correctness.","locations":[{"ref":"src/libsync/propagateuploadng.cpp:251","code":"  251 |     _transferId = uint(Utility::rand() ^ uint(_item->_modtime) ^ (uint(_fileToUpload._size) << 16) ^ qHash(_fileToUpload._file));"},{"ref":"src/libsync/propagateuploadng.cpp:156-161","code":"  156 |     if (_sent > _fileToUpload._size) {\n  157 |         // Normally this can't happen because the size is xor'ed with the transfer id, and it is\n  158 |         // therefore impossible that there is more data on the server than on the file.\n  159 |         qCCritical(lcPropagateUploadNG) << \"Inconsistency while resuming \" << _item->_file\n  160 |                                       << \": the size on the server (\" << _sent << \") is bigger than the size of the file (\"\n  161 |                                       << _fileToUpload._size << \")\";"}]},{"id":"LOGIC_100","type":"logic_error","type_label":"Logic Error","severity":"low","description":"slotUploadProgress reports `_sent + sent - total` as the progress value. _sent was already advanced by _currentChunkSize before the PUT started (startNextChunk increments _sent += _currentChunkSize at line 381), and `sent - total` is negative until the chunk fully uploads, so the reported progress is _sent minus the not-yet-sent remainder. This double-counting/edge arithmetic can momentarily report progress beyond the file size or jump backwards between chunks.","fix":"Track the base offset of the current chunk separately from the post-increment _sent, and report base + sent, clamped to file size.","locations":[{"ref":"src/libsync/propagateuploadng.cpp:560-570","code":"  560 | void PropagateUploadFileNG::slotUploadProgress(qint64 sent, qint64 total)\n  561 | {\n  562 |     // Completion is signaled with sent=0, total=0; avoid accidentally\n  563 |     // resetting progress due to the sent being zero by ignoring it.\n  564 |     // finishedSignal() is bound to be emitted soon anyway.\n  565 |     // See https://bugreports.qt.io/browse/QTBUG-44782.\n  566 |     if (sent == 0 && total == 0) {\n  567 |         return;\n  568 |     }\n  569 |     propagator()->reportProgress(*_item, _sent + sent - total);\n  570 | }"},{"ref":"src/libsync/propagateuploadng.cpp:381","code":"  381 |     _sent += _currentChunkSize;"}]},{"id":"LOGIC_101","type":"logic_error","type_label":"Logic Error","severity":"low","description":"UpdateE2eeFolderUsersMetadataJob::scheduleSubJobs() and slotSubJobFinished() drive sub-jobs strictly sequentially by always starting `_subJobs.values().last()`. Because QSet iteration order is unspecified and the same 'last()' may not correspond to a not-yet-started job, and removal happens in slotSubJobFinished, a job could be started twice or a job never started if ordering assumptions break, leaving the folder locked. There is no per-job started flag.","fix":"Use an ordered container (QList/queue) of pending sub-jobs and track started state explicitly rather than relying on QSet::values().last().","locations":[{"ref":"src/libsync/updatee2eefolderusersmetadatajob.cpp:170-179","code":"  170 |         scheduleSubJobs();\n  171 |         if (_subJobs.isEmpty()) {\n  172 |             if (_keepLock) {\n  173 |                 emit finished(200);\n  174 |             } else {\n  175 |                 unlockFolder(EncryptedFolderMetadataHandler::UnlockFolderWithResult::Success);\n  176 |             }\n  177 |         } else {\n  178 |             _subJobs.values().last()->start();\n  179 |         }"},{"ref":"src/libsync/updatee2eefolderusersmetadatajob.cpp:269-277","code":"  269 |     _subJobs.remove(job);\n  270 |     job->deleteLater();\n  271 | \n  272 |     if (_subJobs.isEmpty()) {\n  273 |         subJobsFinished(true);\n  274 |     } else {\n  275 |         _subJobs.values().last()->start();\n  276 |     }\n  277 | }"}]},{"id":"LOGIC_102","type":"logic_error","type_label":"Logic Error","severity":"low","description":"cfApiFetchDataCallback connects a readyRead handler to signalSocket that sets hydrationRequestCancelled, but signalSocket's readyRead is connected to capture-by-reference lambda using &loop as context; the connection is never disconnected before the function returns and signalSocket goes out of scope at end of function. While destruction disconnects, the cancellation socket data is only checked opportunistically in the data readyRead handler, so a cancellation that arrives between blocks of data (with no further data) is not acted upon until the next data arrives or the loop exits, potentially sending stale data after a cancel.","fix":"Quit/abort the event loop directly from the cancellation readyRead handler so cancellation is acted on immediately rather than only on the next data chunk.","locations":[{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:332-389","code":"  332 |     auto hydrationRequestCancelled = false;\n  333 |     QObject::connect(&signalSocket, &QLocalSocket::readyRead, &loop, [&] {\n  334 |         hydrationRequestCancelled = true;\n  335 |         qCCritical(lcCfApiWrapper) << \"Hydration canceled for \" << path << requestId;\n  336 |     });\n  337 | \n  338 |     // CFAPI expects sent blocks to be of a multiple of a block size.\n  339 |     // Only the last sent block is allowed to be of a different size than\n  340 |     // a multiple of a block size\n  341 |     constexpr auto cfapiBlockSize = 4096;\n  342 |     qint64 dataOffset = 0;\n  343 |     QByteArray protrudingData;\n  344 | \n  345 |     const auto alignAndSendData = [&](const QByteArray &receivedData) {\n  346 |         QByteArray data = protrudingData + receivedData;\n  347 |         protrudingData.clear();\n  348 |         if (data.size() < cfapiBlockSize) {\n  349 |             protrudingData = data;\n  350 |             return;\n  351 |         }\n  352 |         const auto protudingSize = data.size() % cfapiBlockSize;\n  353 |         protrudingData = data.right(protudingSize);\n  354 |         data.chop(protudingSize);\n  355 |         sendTransferInfo(data, dataOffset);\n  356 |         dataOffset += data.size();\n  357 |     };\n  358 | \n  359 |     QObject::connect(&socket, &QLocalSocket::readyRead, &loop, [&] {\n  360 |         if (hydrationRequestCancelled) {\n  361 |             qCDebug(lcCfApiWrapper) << \"Don't transfer data because request\" << requestId << \"was cancelled\";\n  362 |             return;\n  363 |         }\n  364 | \n  365 |         const auto receivedData = socket.readAll();\n  366 |         if (receivedData.isEmpty()) {\n  367 |             qCWarning(lcCfApiWrapper) << \"Unexpected empty data received\" << requestId;\n  368 |             sendTransferError();\n  369 |             protrudingData.clear();\n  370 |             loop.quit();\n  371 |             return;\n  372 |         }\n  373 |         alignAndSendData(receivedData);\n  374 |     });\n  375 | \n  376 |     QObject::connect(vfs, &OCC::VfsCfApi::hydrationRequestFinished, &loop, [&](const QString &id) {\n  377 |         qDebug(lcCfApiWrapper) << \"Hydration finished for request\" << id;\n  378 |         if (requestId == id) {\n  379 |             loop.quit();\n  380 |         }\n  381 |     });\n  382 | \n  383 |     qCDebug(lcCfApiWrapper) << \"Starting event loop 2\";\n  384 |     loop.exec();\n  385 | \n  386 |     if (!hydrationRequestCancelled && !protrudingData.isEmpty()) {\n  387 |         qDebug(lcCfApiWrapper) << \"Send remaining protruding data. Size:\" << protrudingData.size();\n  388 |         sendTransferInfo(protrudingData, dataOffset);\n  389 |     }"}]},{"id":"LOGIC_103","type":"logic_error","type_label":"Logic Error","severity":"low","description":"getCurrentTokenInformation logs and uses `lastError` captured after the first (size-probe) GetTokenInformation call when the second GetTokenInformation call fails. The error message reports the stale ERROR_INSUFFICIENT_BUFFER from the probe rather than the real failure reason of the second call (GetLastError() is not re-read), producing misleading diagnostics.","fix":"Re-read GetLastError() inside the second failure branch before logging.","locations":[{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:744-760","code":"  744 |     auto tokenInfoSize = DWORD{0};\n  745 | \n  746 |     const auto tokenSizeCallSucceeded = ::GetTokenInformation(tokenHandle, TokenUser, nullptr, 0, &tokenInfoSize);\n  747 |     const auto lastError = GetLastError();\n  748 |     Q_ASSERT(!tokenSizeCallSucceeded && lastError == ERROR_INSUFFICIENT_BUFFER);\n  749 |     if (tokenSizeCallSucceeded || lastError != ERROR_INSUFFICIENT_BUFFER) {\n  750 |         qCCritical(lcCfApiWrapper) << \"GetTokenInformation for token size has failed with error\" << lastError;\n  751 |         return {};\n  752 |     }\n  753 | \n  754 |     std::unique_ptr<TOKEN_USER> tokenInfo;\n  755 | \n  756 |     tokenInfo.reset(reinterpret_cast<TOKEN_USER*>(new char[tokenInfoSize]));\n  757 |     if (!::GetTokenInformation(tokenHandle, TokenUser, tokenInfo.get(), tokenInfoSize, &tokenInfoSize)) {\n  758 |         qCCritical(lcCfApiWrapper) << \"GetTokenInformation failed with error\" << lastError;\n  759 |         return {};\n  760 |     }"}]},{"id":"LOGIC_104","type":"logic_error","type_label":"Logic Error","severity":"low","description":"createSyncRootRegistryKeys: on failure to set any registry value it attempts to roll back via registryDeleteKeyTree and then `Q_ASSERT(!deleteKeyResult)`. registryDeleteKeyTree returns true on success, so asserting that the delete result is falsy means a *successful* cleanup trips the assert in debug builds. The assert condition is inverted relative to the function's success semantics.","fix":"Assert the cleanup succeeded: `Q_ASSERT(deleteKeyResult);` (or drop the assert).","locations":[{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:815-817","code":"  815 |             const auto deleteKeyResult = OCC::Utility::registryDeleteKeyTree(HKEY_LOCAL_MACHINE, providerSyncRootIdRegistryKey);\n  816 |             Q_ASSERT(!deleteKeyResult);\n  817 |             return false;"}]},{"id":"LOGIC_105","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"In cmd.cpp option parsing, `-h` sets options->ignoreHiddenFiles = false, which is already the default value set in main(). The help text says '-h Sync hidden files, do not ignore them', so the flag is intended to be meaningful, but as written passing or omitting -h has identical effect; the flag is effectively dead.","fix":"Default options.ignoreHiddenFiles to true and have -h set it to false, so the flag actually toggles behavior (or remove the dead flag).","locations":[{"ref":"src/cmd/cmd.cpp:241-242","code":"  241 |         } else if (option == \"-h\") {\n  242 |             options->ignoreHiddenFiles = false;"},{"ref":"src/cmd/cmd.cpp:313","code":"  313 |     options.ignoreHiddenFiles = false; // Default is to sync hidden files"}]},{"id":"LOGIC_106","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"Flow2Auth::fetchNewToken success lambda sets _isBusy=false and _hasToken=true unconditionally at the end, even though the actionOpenBrowser path may have already emitted result(NotSupported) when the browser could not be opened. The state flags are then left as if a token poll is in progress, which can let the poll timer proceed against a flow the UI already abandoned.","fix":"Set the busy/token flags consistently with the emitted result (e.g. stop the timer / clear _hasToken on the NotSupported path).","locations":[{"ref":"src/gui/creds/flow2auth.cpp:131-148","code":"  131 |         switch (action) {\n  132 |         case actionOpenBrowser:\n  133 |             // Try to open Browser\n  134 |             if (!Utility::openBrowser(authorisationLink())) {\n  135 |                 // We cannot open the browser, then we claim we don't support Flow2Auth.\n  136 |                 // Our UI callee will ask the user to copy and open the link.\n  137 |                 emit result(NotSupported);\n  138 |             }\n  139 |             break;\n  140 |         case actionCopyLinkToClipboard:\n  141 |             QApplication::clipboard()->setText(authorisationLink().toString(QUrl::FullyEncoded));\n  142 |             emit statusChanged(PollStatus::statusCopyLinkToClipboard, 0);\n  143 |             break;\n  144 |         }\n  145 | \n  146 |         _isBusy = false;\n  147 |         _hasToken = true;\n  148 |     });"}]},{"id":"LOGIC_107","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"ConfigFile::updateSegment() uses Utility::rand() % 99 producing values 0..98, but the validity check accepts 0..99 inclusive (segment < 0 || segment > 99). A stored value of exactly 99 (which the generator never produces but a manually-edited config could) is accepted while the generator range is 0..98, an inconsistency between the accepted range and the generated range.","fix":"Make the generator and validator agree (e.g. rand()%100 for 0..99, or validate >98).","locations":[{"ref":"src/libsync/configfile.cpp:664-677","code":"  664 | int ConfigFile::updateSegment() const\n  665 | {\n  666 |     QSettings settings(configFile(), QSettings::IniFormat);\n  667 |     int segment = settings.value(QLatin1String(updateSegmentC), -1).toInt();\n  668 | \n  669 |     // Invalid? (Unset at the very first launch)\n  670 |     if(segment < 0 || segment > 99) {\n  671 |         // Save valid segment value, normally has to be done only once.\n  672 |         segment = Utility::rand() % 99;\n  673 |         settings.setValue(QLatin1String(updateSegmentC), segment);\n  674 |     }\n  675 | \n  676 |     return segment;\n  677 | }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"FileSystem::isFile() initializes its result from fileInfo.isDir() instead of fileInfo.isFile(). On the (common) code path where the passed-in QFileInfo already matches the filename, the function returns whether the path is a directory rather than a file - the exact opposite of what callers expect. The value is only corrected when fileInfo.filePath() differs from filename. This is a clear copy-paste error from isDir().","fix":"Change the initializer to `bool re = fileInfo.isFile();`.","locations":[{"ref":"src/common/filesystembase.cpp:471-488","code":"  471 | bool FileSystem::isFile(const QString &filename, const QFileInfo &fileInfo)\n  472 | {\n  473 | #ifdef Q_OS_WIN\n  474 |     if (isLnkFile(filename)) {\n  475 |         // Use a native check.\n  476 |         return isFileWin(filename);\n  477 |     }\n  478 | #endif\n  479 |     bool re = fileInfo.isDir();\n  480 |     // if the filename is different from the filename in fileInfo, the fileInfo is\n  481 |     // not valid. There needs to be one initialised here. Otherwise the incoming\n  482 |     // fileInfo is re-used.\n  483 |     if (fileInfo.filePath() != filename) {\n  484 |         QFileInfo myFI(filename);\n  485 |         re = myFI.isFile();\n  486 |     }\n  487 |     return re;\n  488 | }"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"VfsXAttr::dehydratePlaceholder reads the pin state of item._file but then sets the pin state of item._renameTarget. In the xattr backend there is no rename to a suffix (dehydrate happens in place), so item._renameTarget is typically empty or unrelated, meaning the 'ensure pin state isn't contradictory' fix-up is applied to the wrong path (and a setPinState on an empty path). This logic was copy-pasted from VfsSuffix::dehydratePlaceholder where renameTarget is meaningful.","fix":"Use item._file consistently: `setPinState(item._file, PinState::Unspecified);` (matching the pinState(item._file) check above).","locations":[{"ref":"src/libsync/vfs/xattr/vfs_xattr.cpp:127-132","code":"  127 |     // Ensure the pin state isn't contradictory\n  128 |     const auto pin = pinState(item._file);\n  129 |     if (pin && *pin == PinState::AlwaysLocal) {\n  130 |         setPinState(item._renameTarget, PinState::Unspecified);\n  131 |     }\n  132 |     return {};"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"critical","description":"EncryptionHelper::generateRandom() ignores the return value of RAND_bytes(). If the CSPRNG fails (ret != 1) it only logs an info message and returns a buffer that is still all-zeroes (or partially filled). The result is used directly as AES-GCM IVs/nonces, the symmetric metadata key (metadataKeySize=16), per-file content encryption keys and the 40-byte private-key salt. A zeroed/predictable key or a repeated/zeroed GCM nonce catastrophically breaks confidentiality and integrity of E2EE data.","fix":"Return an error (or throw) when RAND_bytes() != 1 and make every caller treat a failure as fatal (abort the encryption operation) instead of silently using a possibly all-zero buffer.","locations":[{"ref":"src/libsync/clientsideencryption.cpp:226-237","code":"  226 | QByteArray generateRandom(int size)\n  227 | {\n  228 |     QByteArray result(size, '\\0');\n  229 | \n  230 |     int ret = RAND_bytes(unsignedData(result), size);\n  231 |     if (ret != 1) {\n  232 |         qCInfo(lcCse()) << \"Random byte generation failed!\";\n  233 |         // Error out?\n  234 |     }\n  235 | \n  236 |     return result;\n  237 | }"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"critical","description":"EncryptionHelper::encryptPrivateKey() checks every OpenSSL return value but on failure only logs qCInfo and continues executing (no return). A failure of EVP_EncryptInit_ex / EVP_CIPHER_CTX_ctrl / EVP_EncryptUpdate / EVP_EncryptFinal_ex / EVP_CTRL_GCM_GET_TAG still produces a 'result' string that is then stored on the server as the user's encrypted private key. This can persist a corrupt/weakly-encrypted or untagged private key, and the all-error path is indistinguishable from success to the caller.","fix":"Return an empty QByteArray (and have encryptPrivateKey()/the StorePrivateKeyApiJob path abort) whenever any OpenSSL call fails, mirroring the early-return pattern already used in encryptStringSymmetric().","locations":[{"ref":"src/libsync/clientsideencryption.cpp:314-387","code":"  314 | QByteArray encryptPrivateKey(\n  315 |     const QByteArray& key,\n  316 |     const QByteArray& privateKey,\n  317 |     const QByteArray& salt\n  318 |     ) {\n  319 | \n  320 |     QByteArray iv = generateRandom(12);\n  321 | \n  322 |     CipherCtx ctx;\n  323 | \n  324 |     /* Create and initialise the context */\n  325 |     if(!ctx) {\n  326 |         qCInfo(lcCse()) << \"Error creating cipher\" << handleErrors();\n  327 |     }\n  328 | \n  329 |     /* Initialise the decryption operation. */\n  330 |     if(!EVP_EncryptInit_ex(ctx, EVP_aes_256_gcm(), nullptr, nullptr, nullptr)) {\n  331 |         qCInfo(lcCse()) << \"Error initializing context with aes_256\" << handleErrors();\n  332 |     }\n  333 | \n  334 |     // No padding\n  335 |     EVP_CIPHER_CTX_set_padding(ctx, 0);\n  336 | \n  337 |     /* Set IV length. */\n  338 |     if(!EVP_CIPHER_CTX_ctrl(ctx, EVP_CTRL_GCM_SET_IVLEN, iv.size(), nullptr)) {\n  339 |         qCInfo(lcCse()) << \"Error setting iv length\" << handleErrors();\n  340 |     }\n  341 | \n  342 |     /* Initialise key and IV */\n  343 |     if(!EVP_EncryptInit_ex(ctx, nullptr, nullptr, reinterpret_cast<const unsigned char*>(key.constData()), reinterpret_cast<const unsigned char*>(iv.constData()))) {\n  344 |         qCInfo(lcCse()) << \"Error initialising key and iv\" << handleErrors();\n  345 |     }\n  346 | \n  347 |     // We write the base64 encoded private key\n  348 |     QByteArray privateKeyB64 = privateKey.toBase64();\n  349 | \n  350 |     // Make sure we have enough room in the cipher text\n  351 |     QByteArray ctext(privateKeyB64.size() + 32, '\\0');\n  352 | \n  353 |     // Do the actual encryption\n  354 |     int len = 0;\n  355 |     if(!EVP_EncryptUpdate(ctx, unsignedData(ctext), &len, reinterpret_cast<const unsigned char*>(privateKeyB64.constData()), privateKeyB64.size())) {\n  356 |         qCInfo(lcCse()) << \"Error encrypting\" << handleErrors();\n  357 |     }\n  358 | \n  359 |     int clen = len;\n  360 | \n  361 |     /* Finalise the encryption. Normally ciphertext bytes may be written at\n  362 |      * this stage, but this does not occur in GCM mode\n  363 |      */\n  364 |     if(1 != EVP_EncryptFinal_ex(ctx, unsignedData(ctext) + len, &len)) {\n  365 |         qCInfo(lcCse()) << \"Error finalizing encryption\" << handleErrors();\n  366 |     }\n  367 |     clen += len;\n  368 | \n  369 |     /* Get the e2EeTag */\n  370 |     QByteArray e2EeTag(OCC::Constants::e2EeTagSize, '\\0');\n  371 |     if(1 != EVP_CIPHER_CTX_ctrl(ctx, EVP_CTRL_GCM_GET_TAG, OCC::Constants::e2EeTagSize, unsignedData(e2EeTag))) {\n  372 |         qCInfo(lcCse()) << \"Error getting the e2EeTag\" << handleErrors();\n  373 |     }\n  374 | \n  375 |     QByteArray cipherTXT;\n  376 |     cipherTXT.reserve(clen + OCC::Constants::e2EeTagSize);\n  377 |     cipherTXT.append(ctext, clen);\n  378 |     cipherTXT.append(e2EeTag);\n  379 | \n  380 |     QByteArray result = cipherTXT.toBase64();\n  381 |     result += '|';\n  382 |     result += iv.toBase64();\n  383 |     result += '|';\n  384 |     result += salt.toBase64();\n  385 | \n  386 |     return result;\n  387 | }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"SqlQuery::exec() retry loop on SQLITE_LOCKED overwrites rc with the return value of sqlite3_reset(): `rc = sqlite3_reset(_stmt);`. If reset returns SQLITE_OK the loop terminates with rc==SQLITE_OK, which is neither SQLITE_DONE nor SQLITE_ROW, so the statement is reported as failed (exec returns false) and an error is logged, even though the real cause was transient lock contention. The original step result is lost.","fix":"Do not assign the result of sqlite3_reset() to rc; keep stepping. Preserve the SQLITE_LOCKED/BUSY status for the loop condition and only treat genuine error codes as failures.","locations":[{"ref":"src/common/ownsql.cpp:282-318","code":"  282 | bool SqlQuery::exec()\n  283 | {\n  284 |     if (!_stmt) {\n  285 |         qCWarning(lcSql) << \"Can't exec query, statement unprepared.\";\n  286 |         return false;\n  287 |     }\n  288 | \n  289 |     // Don't do anything for selects, that is how we use the lib :-|\n  290 |     if (!isSelect() && !isPragma()) {\n  291 |         int rc = 0, n = 0;\n  292 |         do {\n  293 |             rc = sqlite3_step(_stmt);\n  294 |             if (rc == SQLITE_LOCKED) {\n  295 |                 rc = sqlite3_reset(_stmt); /* This will also return SQLITE_LOCKED */\n  296 |                 n++;\n  297 |                 OCC::Utility::usleep(SQLITE_SLEEP_TIME_USEC);\n  298 |             } else if (rc == SQLITE_BUSY) {\n  299 |                 OCC::Utility::usleep(SQLITE_SLEEP_TIME_USEC);\n  300 |                 n++;\n  301 |             }\n  302 |         } while ((n < SQLITE_REPEAT_COUNT) && ((rc == SQLITE_BUSY) || (rc == SQLITE_LOCKED)));\n  303 |         _errId = rc;\n  304 | \n  305 |         if (_errId != SQLITE_DONE && _errId != SQLITE_ROW) {\n  306 |             _error = QString::fromUtf8(sqlite3_errmsg(_db));\n  307 |             qCWarning(lcSql) << \"Sqlite exec statement error:\" << _errId << _error << \"in\" << _sql;\n  308 |             if (_errId == SQLITE_IOERR) {\n  309 |                 qCWarning(lcSql) << \"IOERR extended errcode: \" << sqlite3_extended_errcode(_db);\n  310 | #if SQLITE_VERSION_NUMBER >= 3012000\n  311 |                 qCWarning(lcSql) << \"IOERR system errno: \" << sqlite3_system_errno(_db);\n  312 | #endif\n  313 |             }\n  314 |         }\n  315 |         return (_errId == SQLITE_DONE); // either SQLITE_ROW or SQLITE_DONE\n  316 |     }\n  317 | \n  318 |     return true;"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"ConnectionValidator::slotNoStatusFound() does `auto job = qobject_cast<CheckServerJob *>(sender());` then immediately calls `job->errorString()` (line 154) and later `job->errorString()` (line 168) without checking job for null. If the slot is ever invoked outside the expected signal context (sender() not a CheckServerJob), job is null and is dereferenced. The sibling slotAuthFailed() has the same unchecked qobject_cast<PropfindJob*>(sender()) dereference.","fix":"Null-check the qobject_cast result before dereferencing job, or use Q_ASSERT plus a guarded early return.","locations":[{"ref":"src/gui/connectionvalidator.cpp:151-171","code":"  151 | void ConnectionValidator::slotNoStatusFound(QNetworkReply *reply)\n  152 | {\n  153 |     auto job = qobject_cast<CheckServerJob *>(sender());\n  154 |     qCWarning(lcConnectionValidator) << reply->error() << reply->errorString() << job->errorString() << reply->peek(1024);\n  155 |     if (reply->error() == QNetworkReply::SslHandshakeFailedError) {\n  156 |         if (const auto hstsError = AbstractNetworkJob::hstsErrorStringFromReply(reply)) {\n  157 |             _errors.append(*hstsError);\n  158 |         }\n  159 |         reportResult(SslError);\n  160 |         return;\n  161 |     }\n  162 | \n  163 |     if (!_account->credentials()->stillValid(reply)) {\n  164 |         // Note: Why would this happen on a status.php request?\n  165 |         _errors.append(tr(\"Authentication error: Either username or password are wrong.\"));\n  166 |     } else {\n  167 |         //_errors.append(tr(\"Unable to connect to %1\").arg(_account->url().toString()));\n  168 |         _errors.append(job->errorString());\n  169 |     }\n  170 |     reportResult(StatusNotFound);\n  171 | }"},{"ref":"src/gui/connectionvalidator.cpp:202-204","code":"  202 | void ConnectionValidator::slotAuthFailed(QNetworkReply *reply)\n  203 | {\n  204 |     auto job = qobject_cast<PropfindJob *>(sender());"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"slotEtagResponseHeaderReceived dereferences the result of qvariant_cast<AccountState*>(sender()->property(...)) without a null check before calling setNotificationsEtagResponseHeader on it. If the property is missing/invalid the cast yields nullptr and this crashes. (slotNotificationsReceived at line 101 reads the same property into `accountState` and likewise uses it unchecked at lines 108/160/186.)","fix":"Null-check the qvariant_cast result (or prefer the already-known _accountState member) before dereferencing.","locations":[{"ref":"src/gui/tray/notificationhandler.cpp:63-70","code":"   63 | void ServerNotificationHandler::slotEtagResponseHeaderReceived(const QByteArray &value, int statusCode)\n   64 | {\n   65 |     if (statusCode == successStatusCode) {\n   66 |         qCInfo(lcServerNotification) << \"New Notification ETag Response Header received \" << value;\n   67 |         auto *account = qvariant_cast<AccountState *>(sender()->property(propertyAccountStateC));\n   68 |         account->setNotificationsEtagResponseHeader(value);\n   69 |     }\n   70 | }"},{"ref":"src/gui/tray/notificationhandler.cpp:101-108","code":"  101 |     auto accountState = qvariant_cast<AccountState *>(sender()->property(propertyAccountStateC));\n  102 | \n  103 |     ActivityList list;\n  104 |     ActivityList callList;\n  105 | \n  106 |     for (const auto &element : notifies) {\n  107 |         const auto json = element.toObject();\n  108 |         auto activity = Activity::fromActivityJson(json, accountState->account());"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In slotPutFinished, when the server reply does not contain an entry for a file AND there was a network error, abortWithError() is called once per missing file inside the loop. abortWithError -> abort(Synchronous) + done() will be invoked repeatedly for multiple files in the same batch, and done() emits itemCompleted and may trigger propagator()->abort() multiple times. The per-file abort inside the loop combined with the unconditional finalize() afterwards leads to double-processing of items.","fix":"Collect the missing/errored items and report them once, or break out of the loop after the first network-error abort; do not call abortWithError() repeatedly while continuing to iterate and then also call finalize().","locations":[{"ref":"src/libsync/bulkpropagatorjob.cpp:504-516","code":"  504 |     for (const auto &singleFile : _filesToUpload) {\n  505 |         if (!fullReplyObject.contains(singleFile._remotePath)) {\n  506 |             if (jobError != QNetworkReply::NoError) {\n  507 |                 singleFile._item->_status = SyncFileItem::NormalError;\n  508 |                 abortWithError(singleFile._item, SyncFileItem::NormalError, tr(\"Network error: %1\").arg(jobError));\n  509 |             }\n  510 |             continue;\n  511 |         }\n  512 |         const auto singleReplyObject = fullReplyObject[singleFile._remotePath].toObject();\n  513 |         slotPutFinishedOneFile(singleFile, job, singleReplyObject);\n  514 |     }\n  515 | \n  516 |     finalize(fullReplyObject);"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"generateSignatureCryptographicMessageSyntax() asserts on contentInfo == nullptr but in release builds Q_ASSERT is compiled out; the following `if (!contentInfo) return {};` returns an empty signature. An empty metadata signature is then base64-stored and the v2 metadata is uploaded with an empty X-NC-E2EE-SIGNATURE header (StoreMetaDataApiJob only logs a warning for empty signature, line ~106). This silently disables the metadata signature protection rather than failing the upload.","fix":"Propagate signature-generation failure as a hard error up to the metadata upload path and refuse to upload v2 metadata without a valid signature.","locations":[{"ref":"src/libsync/clientsideencryption.cpp:1458-1488","code":" 1458 | QByteArray ClientSideEncryption::generateSignatureCryptographicMessageSyntax(const QByteArray &data) const\n 1459 | {\n 1460 |     Bio certificateBio;\n 1461 |     const auto certificatePem = _encryptionCertificate.getCertificate().toPem();\n 1462 |     BIO_write(certificateBio, certificatePem.constData(), certificatePem.size());\n 1463 |     const auto x509Certificate = X509Certificate::readCertificate(certificateBio);\n 1464 |     if (!x509Certificate) {\n 1465 |         qCInfo(lcCse()) << \"Client certificate is invalid. Could not check it against the server public key\";\n 1466 |         return {};\n 1467 |     }\n 1468 | \n 1469 |     const auto privateKey = _encryptionCertificate.getEvpPrivateKey();\n 1470 | \n 1471 |     Bio dataBio;\n 1472 |     BIO_write(dataBio, data.constData(), data.size());\n 1473 | \n 1474 |     const auto contentInfo = CMS_sign(x509Certificate, privateKey, nullptr, dataBio, CMS_DETACHED);\n 1475 | \n 1476 |     Q_ASSERT(contentInfo);\n 1477 |     if (!contentInfo) {\n 1478 |         return {};\n 1479 |     }\n 1480 | \n 1481 |     Bio i2dCmsBioOut;\n 1482 |     [[maybe_unused]] auto resultI2dCms = i2d_CMS_bio(i2dCmsBioOut, contentInfo);\n 1483 |     const auto i2dCmsBio = BIO2ByteArray(i2dCmsBioOut);\n 1484 | \n 1485 |     CMS_ContentInfo_free(contentInfo);\n 1486 | \n 1487 |     return i2dCmsBio;\n 1488 | }"},{"ref":"src/libsync/clientsideencryptionjobs.cpp:102-108","code":"  102 |     if (_account->capabilities().clientSideEncryptionVersion() >= 2.0) {\n  103 |         if (!_signature.isEmpty()) {\n  104 |             req.setRawHeader(e2eeSignatureHeaderName, _signature);\n  105 |         } else {\n  106 |             qCWarning(lcCseJob()) << \"empty signature for\" << _fileId;\n  107 |         }\n  108 |     }"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"EncryptionHelper::fileEncryption() logs but ignores failures to open the input and output QFile (the if-blocks have no return). If the output cannot be opened, encryption proceeds writing to a closed device and the function can still return true with an empty/partial ciphertext, which is then uploaded as the encrypted file.","fix":"Return false immediately if either input->open() or output->open() fails.","locations":[{"ref":"src/libsync/clientsideencryption.cpp:2408-2415","code":" 2408 | bool EncryptionHelper::fileEncryption(const QByteArray &key, const QByteArray &iv, QFile *input, QFile *output, QByteArray& returnTag)\n 2409 | {\n 2410 |     if (!input->open(QIODevice::ReadOnly)) {\n 2411 |         qCWarning(lcCse) << \"Could not open input file for reading\" << input->errorString();\n 2412 |     }\n 2413 |     if (!output->open(QIODevice::WriteOnly)) {\n 2414 |         qCWarning(lcCse) << \"Could not oppen output file for writing\" << output->errorString();\n 2415 |     }"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"HttpCredentials::slotReadJobDone uses dynamic_cast<QKeychain::ReadPasswordJob*>(incoming) and then immediately dereferences job (job->error(), job->textData()) without a null check. If the cast ever fails (different job type) this is a null-pointer dereference. Every other slot in this file uses qobject_cast and at least the keychainUnavailableRetryLater path; this one is inconsistent and unguarded.","fix":"Check the cast result before use, or use qobject_cast and bail/log if null, consistent with the other slots.","locations":[{"ref":"src/libsync/creds/httpcredentials.cpp:330-345","code":"  330 | void HttpCredentials::slotReadJobDone(QKeychain::Job *incoming)\n  331 | {\n  332 |     auto *job = dynamic_cast<QKeychain::ReadPasswordJob *>(incoming);\n  333 |     QKeychain::Error error = job->error();\n  334 | \n  335 |     // If we can't find the credentials at the keys that include the account id,\n  336 |     // try to read them from the legacy locations that don't have a account id.\n  337 |     if (!_keychainMigration && error == QKeychain::EntryNotFound) {\n  338 |         qCWarning(lcHttpCredentials)\n  339 |             << \"Could not find keychain entries, attempting to read from legacy locations\";\n  340 |         _keychainMigration = true;\n  341 |         fetchFromKeychainHelper();\n  342 |         return;\n  343 |     }\n  344 | \n  345 |     _password = job->textData();"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"OwncloudPropagator::staticUpdateMetadata() maps Vfs::ConvertToPlaceholderResult::Locked to a successful 'Ok'-style return only via the explicit Locked branch, but the trailing 'return Vfs::ConvertToPlaceholderResult::Ok;' collapses any other non-error result to Ok. More concretely, callers like CleanupPollsJob check only !result (the error), so a 'Locked' placeholder during poll cleanup is treated as full success and the upload info is cleared, potentially losing the in-use state.","fix":"Propagate the Locked result to callers and have CleanupPollsJob::slotPollFinished handle Locked (retry/another sync) rather than treating any non-error as success.","locations":[{"ref":"src/libsync/owncloudpropagator.cpp:1100-1120","code":" 1100 | Result<Vfs::ConvertToPlaceholderResult, QString> OwncloudPropagator::staticUpdateMetadata(const SyncFileItem &item,\n 1101 |                                                                                           const QString localDir,\n 1102 |                                                                                           Vfs *vfs,\n 1103 |                                                                                           SyncJournalDb *const journal,\n 1104 |                                                                                           Vfs::UpdateMetadataTypes updateType)\n 1105 | {\n 1106 |     const QString fsPath = localDir + item.destination();\n 1107 |     auto record = item.toSyncJournalFileRecordWithInode(fsPath);\n 1108 |     const auto dBresult = journal->setFileRecord(record);\n 1109 |     if (!dBresult) {\n 1110 |         return dBresult.error();\n 1111 |     }\n 1112 | \n 1113 |     const auto result = vfs->convertToPlaceholder(fsPath, item, {}, updateType);\n 1114 |     if (!result) {\n 1115 |         return result.error();\n 1116 |     } else if (*result == Vfs::ConvertToPlaceholderResult::Locked) {\n 1117 |         return Vfs::ConvertToPlaceholderResult::Locked;\n 1118 |     }\n 1119 |     return Vfs::ConvertToPlaceholderResult::Ok;\n 1120 | }"},{"ref":"src/libsync/owncloudpropagator.cpp:1770-1782","code":" 1770 |     } else if (job->_item->_status != SyncFileItem::Success) {\n 1771 |         qCWarning(lcCleanupPolls) << \"There was an error with file \" << job->_item->_file << job->_item->_errorString;\n 1772 |     } else {\n 1773 |         if (!OwncloudPropagator::staticUpdateMetadata(*job->_item, _localPath, _vfs.data(), _journal, Vfs::AllMetadata)) {\n 1774 |             qCWarning(lcCleanupPolls) << \"database error\";\n 1775 |             job->_item->_status = SyncFileItem::FatalError;\n 1776 |             job->_item->_errorString = tr(\"Error writing metadata to the database\");\n 1777 |             emit aborted(job->_item->_errorString, ErrorCategory::GenericError);\n 1778 |             deleteLater();\n 1779 |             return;\n 1780 |         }\n 1781 |         _journal->setUploadInfo(job->_item->_file, SyncJournalDb::UploadInfo());\n 1782 |     }"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"fromProperties() parses 'size' with QString::toInt() into a qint64 _size field. toInt() returns a 32-bit int, so files larger than 2GiB overflow/clamp to 0 on parse failure, corrupting the item size used for quota and propagation decisions.","fix":"Use properties.value(QStringLiteral(\"size\")).toLongLong() to match the qint64 _size field.","locations":[{"ref":"src/libsync/syncfileitem.cpp:184","code":"  184 |     item->_size = isDirectory ? 0 : properties.value(QStringLiteral(\"size\")).toInt();"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"WordList::getRandomNumber() computes num % max but never checks the return value of RAND_bytes(). On RAND_bytes failure the buffer d is uninitialized, yielding non-random output for mnemonic/passphrase generation; with max==0 it would divide by zero. RAND_bytes can fail (e.g. entropy source unavailable).","fix":"Check RAND_bytes return value and abort/retry on failure; guard against max<=0.","locations":[{"ref":"src/libsync/wordlist.cpp:13-25","code":"   13 | int getRandomNumber(int max) {\n   14 |     unsigned char d[8];\n   15 |     RAND_bytes(d, 8);\n   16 | \n   17 |     unsigned int num = 0;\n   18 | \n   19 |     for (unsigned char c : d) {\n   20 |         num = num << 8;\n   21 |         num += c;\n   22 |     }\n   23 | \n   24 |     return static_cast<int>(num % max);\n   25 | }"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"checkDb() runs `quick_check.next()` and then reads stringValue(0) without checking the NextResult. If next() returned no data (e.g. an empty result on certain error conditions), stringValue(0) reads column 0 of a statement that produced no row, returning an empty/garbage string that then fails the 'ok' comparison and triggers DB deletion. The result of next() should be validated.","fix":"Capture `auto r = quick_check.next();` and treat `!r.hasData` distinctly (do not delete the DB) instead of feeding an unread column into the comparison.","locations":[{"ref":"src/common/ownsql.cpp:90-104","code":"   90 |     if (!quick_check.exec()) {\n   91 |         qCWarning(lcSql) << \"Error running quick_check on database\";\n   92 |         _errId = quick_check.errorId();\n   93 |         _error = quick_check.error();\n   94 |         return CheckDbResult::CantExec;\n   95 |     }\n   96 | \n   97 |     quick_check.next();\n   98 |     QString result = quick_check.stringValue(0);\n   99 |     if (result != QLatin1String(\"ok\")) {\n  100 |         qCWarning(lcSql) << \"quick_check returned failure:\" << result;\n  101 |         return CheckDbResult::NotOk;\n  102 |     }\n  103 | \n  104 |     return CheckDbResult::Ok;"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"ConnectionValidator::slotCapabilitiesRecieved() only calls slotUserFetched(nullptr) (skipping user fetch) when the account isPublicShareLink(); otherwise the function relies on checkServerTermsOfService() -> termsOfServiceCheckDone() -> fetchUser() chain. However checkServerTermsOfService() is invoked before the isPublicShareLink early return, so for a public share link the terms-of-service job is started AND slotUserFetched(nullptr) is called, racing two completion paths (TermsOfServiceChecker::done and the e2e initializationFinished) both of which can reach reportResult(Connected)/reportConnected. This can produce duplicate connectionResult emissions.","fix":"Return early (and skip checkServerTermsOfService) for public share links, or ensure only one completion path leads to reportResult().","locations":[{"ref":"src/gui/connectionvalidator.cpp:257-280","code":"  257 | void ConnectionValidator::slotCapabilitiesRecieved(const QJsonDocument &json)\n  258 | {\n  259 |     auto caps = json.object().value(\"ocs\").toObject().value(\"data\").toObject().value(\"capabilities\").toObject();\n  260 |     qCInfo(lcConnectionValidator) << \"Server capabilities\" << caps;\n  261 |     _account->setCapabilities(caps.toVariantMap());\n  262 | \n  263 |     // New servers also report the version in the capabilities\n  264 |     QString serverVersion = caps[\"core\"].toObject()[\"status\"].toObject()[\"version\"].toString();\n  265 |     if (!serverVersion.isEmpty() && !setAndCheckServerVersion(serverVersion)) {\n  266 |         return;\n  267 |     }\n  268 | \n  269 |     // Check for the directEditing capability\n  270 |     QUrl directEditingURL = QUrl(caps[\"files\"].toObject()[\"directEditing\"].toObject()[\"url\"].toString());\n  271 |     QString directEditingETag = caps[\"files\"].toObject()[\"directEditing\"].toObject()[\"etag\"].toString();\n  272 |     _account->fetchDirectEditors(directEditingURL, directEditingETag);\n  273 | \n  274 |     checkServerTermsOfService();\n  275 | \n  276 |     if (_account->isPublicShareLink()) {\n  277 |         slotUserFetched(nullptr);\n  278 |         return;\n  279 |     }\n  280 | }"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"EditLocallyJob::fileLockError() builds the title with `tr(\"File %1 could not be locked.\")` but never calls .arg(_fileName), so the user-visible notification shows a literal \"%1\" instead of the file name.","fix":"Add .arg(_fileName) to the title string, as the other fileLock* handlers do.","locations":[{"ref":"src/gui/editlocallyjob.cpp:540-544","code":"  540 | void EditLocallyJob::fileLockError(const QString &errorMessage)\n  541 | {\n  542 |     qCWarning(lcEditLocallyJob()) << \"File lock failed, showing notification\" << _relPath << errorMessage;\n  543 |     fileLockProcedureComplete(tr(\"File %1 could not be locked.\"), errorMessage, false);\n  544 | }"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"FolderMan::setupFoldersHelper aborts with qFatal('Could not load plugin') (line 367) when createVfsFromPlugin fails for a configured folder, terminating the whole application. A single unreadable/unavailable VFS plugin (or a folder configured for a VFS mode not available on this machine) brings down the client at startup instead of skipping/disabling that one folder. Note the migration branch a few lines above (line 326-329) handles the same failure with only a warning.","fix":"Log a warning and skip (or fall back to Vfs::Off for) the affected folder instead of qFatal.","locations":[{"ref":"src/gui/folderman.cpp:364-368","code":"  364 |             auto vfs = createVfsFromPlugin(folderDefinition.virtualFilesMode);\n  365 |             if (!vfs) {\n  366 |                 // TODO: Must do better error handling\n  367 |                 qFatal(\"Could not load plugin\");\n  368 |             }"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"termsofservicecheckwidget poll timer never clears _isBusy on the poll-now path. In slotPollTimerTimeout(), when _secondsLeft reaches 0 it sets status to statusPollNow and emits pollNow() but does not reset `_isBusy = false`. _isBusy is only cleared again by termsNotAcceptedYet(). If the subsequent ToS check never reports back (network error, or the checker emits done() with accepted leading away from this widget), the timer remains permanently busy and the countdown stops working should the page be revisited.","fix":"Reset _isBusy in the result/error callbacks of the ToS checker (or via a timeout) so a failed/unanswered poll re-arms the countdown.","locations":[{"ref":"src/gui/wizard/termsofservicecheckwidget.cpp:85-102","code":"   85 | void TermsOfServiceCheckWidget::slotPollTimerTimeout()\n   86 | {\n   87 |     if (_isBusy) {\n   88 |         return;\n   89 |     }\n   90 | \n   91 |     _isBusy = true;\n   92 | \n   93 |     _secondsLeft--;\n   94 |     if (_secondsLeft > 0) {\n   95 |         statusChanged(Status::statusPollCountdown);\n   96 |         _isBusy = false;\n   97 |         return;\n   98 |     }\n   99 | \n  100 |     statusChanged(Status::statusPollNow);\n  101 |     Q_EMIT pollNow();\n  102 | }"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"finalize() (success path) calls done() with ErrorCategory::GenericError even when the item succeeded: `done(singleFile._item, singleFile._item->_status, {}, ErrorCategory::GenericError);`. Passing GenericError as the error category for a successful item is misleading and may be propagated to itemCompleted listeners that key behaviour off the category.","fix":"Pass ErrorCategory::NoError when the item status is Success, and GenericError only for actual error statuses.","locations":[{"ref":"src/libsync/bulkpropagatorjob.cpp:593","code":"  593 |         done(singleFile._item, singleFile._item->_status, {}, ErrorCategory::GenericError);"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"gzipThenEncryptData() calls EncryptionHelper::dataEncryption() but ignores its bool return value. If encryption fails, outputData may be empty/partial yet the function returns it as if successful, and the caller (encryptedMetadata) base64-encodes and uploads it. dataDecryption() failures are handled, but the encryption side is not.","fix":"Check the return of dataEncryption() and return an empty QByteArray on failure so encryptedMetadata() can abort.","locations":[{"ref":"src/libsync/clientsideencryption.cpp:2760-2783","code":" 2760 | QByteArray EncryptionHelper::gzipThenEncryptData(const QByteArray &key, const QByteArray &inputData, const QByteArray &iv, QByteArray &returnTag)\n 2761 | {\n 2762 |     QBuffer gZipBuffer;\n 2763 |     auto gZipCompressionDevice = KCompressionDevice(&gZipBuffer, false, KCompressionDevice::GZip);\n 2764 |     if (!gZipCompressionDevice.open(QIODevice::WriteOnly)) {\n 2765 |         return {};\n 2766 |     }\n 2767 |     const auto bytesWritten = gZipCompressionDevice.write(inputData);\n 2768 |     gZipCompressionDevice.close();\n 2769 |     if (bytesWritten < 0) {\n 2770 |         return {};\n 2771 |     }\n 2772 | \n 2773 |     if (!gZipBuffer.open(QIODevice::ReadOnly)) {\n 2774 |         return {};\n 2775 |     }\n 2776 | \n 2777 |     QByteArray outputData;\n 2778 |     returnTag.clear();\n 2779 |     const auto gZippedAndNotEncrypted = gZipBuffer.readAll();\n 2780 |     EncryptionHelper::dataEncryption(key, iv, gZippedAndNotEncrypted, outputData, returnTag);\n 2781 |     gZipBuffer.close();\n 2782 |     return outputData;\n 2783 | }"}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"CheckServerJob::finished() logs 'status.php from server is not valid JSON' when QJsonDocument::fromJson fails but then continues to call status.object().contains(\"installed\") on the null/empty document, relying on it returning false. The warning path does not emit instanceNotFound, so an invalid-JSON response with no 'installed' key falls into the else and does emit instanceNotFound — but a JSON parse error that still yields an object containing 'installed' (impossible) aside, the control flow after the warning is misleading and the parse failure is not surfaced distinctly.","fix":"Return/emit instanceNotFound immediately on JSON parse error instead of falling through.","locations":[{"ref":"src/libsync/networkjobs.cpp:699-712","code":"  699 |         QJsonParseError error{};\n  700 |         auto status = QJsonDocument::fromJson(body, &error);\n  701 |         // empty or invalid response\n  702 |         if (error.error != QJsonParseError::NoError || status.isNull()) {\n  703 |             qCWarning(lcCheckServerJob) << \"status.php from server is not valid JSON!\" << body << reply()->request().url() << error.errorString();\n  704 |         }\n  705 | \n  706 |         qCInfo(lcCheckServerJob) << \"status.php returns: \" << status << \" \" << reply()->error() << \" Reply: \" << reply();\n  707 |         if (status.object().contains(\"installed\")) {\n  708 |             emit instanceFound(_serverUrl, status.object());\n  709 |         } else {\n  710 |             qCWarning(lcCheckServerJob) << \"No proper answer on \" << reply()->url();\n  711 |             emit instanceNotFound(reply());\n  712 |         }"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"JsonApiJob::finished() emits jsonReceived(json, statusCode) twice in the invalid-JSON path: once inside the 'if ((error || json.isNull()) && httpStatusCode != notModified)' block (line 1161, then returns) — that part is fine — but when httpStatusCode == notModified and JSON is empty/invalid, it skips that block and falls through to emit jsonReceived(json, statusCode) at the end with a null document, which downstream handlers may not expect for a 304. The two emission sites make the contract ambiguous.","fix":"Consolidate to a single emit and clearly document the 304/empty-body contract.","locations":[{"ref":"src/libsync/networkjobs.cpp:1156-1166","code":" 1156 |     QJsonParseError error{};\n 1157 |     auto json = QJsonDocument::fromJson(jsonStr.toUtf8(), &error);\n 1158 |     // empty or invalid response and status code is != 304 because jsonStr is expected to be empty\n 1159 |     if ((error.error != QJsonParseError::NoError || json.isNull()) && httpStatusCode != notModifiedStatusCode) {\n 1160 |         qCWarning(lcJsonApiJob) << \"invalid JSON!\" << jsonStr << error.errorString();\n 1161 |         emit jsonReceived(json, statusCode);\n 1162 |         return true;\n 1163 |     }\n 1164 | \n 1165 |     emit jsonReceived(json, statusCode);\n 1166 |     return true;"}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"PropagateRemoteMkdir::slotMkdir uses done(SyncFileItem::NormalError, {}, ...) with an empty error string when getFileRecord for the parent path fails. An empty error message gives the user/log no indication of what went wrong, unlike other failure paths in the same file which provide descriptive tr() strings.","fix":"Provide a descriptive error string, e.g. tr(\"Could not get file %1 from local DB\").arg(parentPath).","locations":[{"ref":"src/libsync/propagateremotemkdir.cpp:196-200","code":"  196 |     bool ok = propagator()->_journal->getFileRecord(parentPath, &parentRec);\n  197 |     if (!ok) {\n  198 |         done(SyncFileItem::NormalError, {}, ErrorCategory::GenericError);\n  199 |         return;\n  200 |     }"}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"PropagateUploadFileCommon constructor reads the parent file record (getFileRecord) and, on failure, simply `return;`s from the constructor. The retrieved parentRec is then discarded entirely and nothing is stored, so the whole block is dead work; the real lookup is redone in start(). This is leftover/duplicated logic that does nothing useful and is misleading.","fix":"Remove the redundant getFileRecord block from the constructor (the same lookup is performed in start()), or actually use/store the result.","locations":[{"ref":"src/libsync/propagateupload.cpp:183-198","code":"  183 | PropagateUploadFileCommon::PropagateUploadFileCommon(OwncloudPropagator *propagator, const SyncFileItemPtr &item)\n  184 |     : PropagateItemJob(propagator, item)\n  185 |     , _finished(false)\n  186 |     , _deleteExisting(false)\n  187 |     , _aborting(false)\n  188 | {\n  189 |     const auto path = _item->_file;\n  190 |     const auto slashPosition = path.lastIndexOf('/');\n  191 |     const auto parentPath = slashPosition >= 0 ? path.left(slashPosition) : QString();\n  192 | \n  193 |     SyncJournalFileRecord parentRec;\n  194 |     bool ok = propagator->_journal->getFileRecord(parentPath, &parentRec);\n  195 |     if (!ok) {\n  196 |         return;\n  197 |     }\n  198 | }"}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"PushNotifications::handleNotifyFileId() iterates jsonDoc.array() but reads 'const auto jsonArray = jsonDoc.array()' before checking 'jsonDoc.isArray()' in the same if-statement. While QJsonDocument::array() on a non-array returns an empty array (so no crash), the ordering is misleading and relies on that fallback; additionally each element uses 'fileid = jsonFileid.toInteger()' computed before the 'jsonFileid.isDouble()' guard, so non-numeric entries compute a default before being filtered.","fix":"Check isArray()/isDouble() before extracting values for clarity and correctness.","locations":[{"ref":"src/libsync/pushnotifications.cpp:227-233","code":"  227 |     if (const auto jsonArray = jsonDoc.array(); jsonDoc.isArray()) {\n  228 |         for (const auto& jsonFileid : jsonArray) {\n  229 |             if (const auto fileid = jsonFileid.toInteger(); jsonFileid.isDouble()) {\n  230 |                 fileIds.push_back(fileid);\n  231 |             }\n  232 |         }\n  233 |     }"}]},{"id":"ERR_25","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"SyncEngine::slotItemDiscovered(): when setFileRecord fails during the UPDATE_METADATA fast path it sets _status=NormalError, _instruction=ERROR, _errorString, and logs a warning, but unlike the surrounding error paths it does NOT emit itemCompleted() or return early — it falls through to 'emit itemCompleted(item, NoError)' at the end of the Down branch, reporting a DB write failure as NoError to the GUI/status tracker.","fix":"On setFileRecord failure, emit itemCompleted with an error category (and return) consistent with the other failure branches above it.","locations":[{"ref":"src/libsync/syncengine.cpp:418-426","code":"  418 |             if (!_journal->setFileRecord(rec)) {\n  419 |                 item->_status = SyncFileItem::Status::NormalError;\n  420 |                 item->_instruction = CSYNC_INSTRUCTION_ERROR;\n  421 |                 item->_errorString = tr(\"Could not set file record to local DB: %1\").arg(rec.path());\n  422 |                 qCWarning(lcEngine) << \"Could not set file record to local DB\" << rec.path();\n  423 |             }\n  424 | \n  425 |             // This might have changed the shared flag, so we must notify SyncFileStatusTracker for example\n  426 |             emit itemCompleted(item, ErrorCategory::NoError);"}]},{"id":"ERR_26","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"cfApiFetchPlaceHolders dereferences callbackInfo->ProcessInfo->ProcessId (line 528 in debug log and line 560 in the self-hydration check) without the null check that cfApiFetchDataCallback performs. The sync root is connected with CF_CONNECT_FLAG_REQUIRE_PROCESS_INFO so ProcessInfo is normally present, but the inconsistency with the data callback (which explicitly null-checks ProcessInfo) means a null ProcessInfo here is an unguarded null dereference.","fix":"Null-check callbackInfo->ProcessInfo before dereferencing, mirroring cfApiFetchDataCallback (send transfer error and return if missing).","locations":[{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:528-529","code":"  528 |     qDebug(lcCfApiWrapper) << \"Fetch placeholders requested by proccess id:\" << callbackInfo->ProcessInfo->ProcessId;\n  529 |     qDebug(lcCfApiWrapper) << \"Fetch placeholders requested by application id:\" << QString(QString::fromWCharArray(callbackInfo->ProcessInfo->ApplicationId));"},{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:560-564","code":"  560 |     if (QCoreApplication::applicationPid() == callbackInfo->ProcessInfo->ProcessId) {\n  561 |         qCCritical(lcCfApiWrapper) << \"implicit hydration triggered by the client itself. Will lead to a deadlock. Cancel\" << path << requestId;\n  562 |         sendTransferError();\n  563 |         return;\n  564 |     }"}]},{"id":"ERR_27","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"SqlDatabase::error() has the `_error.clear()` line commented out (line 170) with no explanation, while a stale `_error` will persist across queries. Combined with the macro SQLITE_DO only setting _error on failure, a later successful operation that does not touch _error can still report a previous error string via error(). This is a misleading-state hazard noted by the dead/commented code.","fix":"Either remove the commented-out line and document that _error is sticky until next failure, or clear _error at the start of each exec/prepare so error() reflects only the latest operation.","locations":[{"ref":"src/common/ownsql.cpp:167-172","code":"  167 | QString SqlDatabase::error() const\n  168 | {\n  169 |     const QString err(_error);\n  170 |     // _error.clear();\n  171 |     return err;\n  172 | }"}]},{"id":"ERR_28","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"SslErrorDialog constructor calls okButton->setEnabled(false) at line 84 before the `if (okButton)` null guard at line 90, so the guard is meaningless (a null okButton would already have crashed) and cancelButton is never null-checked at all though both are used.","fix":"Perform the null checks before first use, or drop the redundant guard.","locations":[{"ref":"src/gui/sslerrordialog.cpp:80-94","code":"   80 |     QPushButton *okButton =\n   81 |         _ui->_dialogButtonBox->button(QDialogButtonBox::Ok);\n   82 |     QPushButton *cancelButton =\n   83 |         _ui->_dialogButtonBox->button(QDialogButtonBox::Cancel);\n   84 |     okButton->setEnabled(false);\n   85 | \n   86 |     _ui->_cbTrustConnect->setEnabled(!Theme::instance()->forbidBadSSL());\n   87 |     connect(_ui->_cbTrustConnect, &QAbstractButton::clicked,\n   88 |         okButton, &QWidget::setEnabled);\n   89 | \n   90 |     if (okButton) {\n   91 |         okButton->setDefault(true);\n   92 |         connect(okButton, &QAbstractButton::clicked, this, &QDialog::accept);\n   93 |         connect(cancelButton, &QAbstractButton::clicked, this, &QDialog::reject);\n   94 |     }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"Systray::setTrayEngine receives a QQmlApplicationEngine* and does `_trayEngine = std::make_unique<QQmlApplicationEngine>(trayEngine);`. The QQmlApplicationEngine(QObject* parent) constructor treats the passed-in engine as a PARENT object, not as the engine to adopt. So a brand-new engine is created and the caller-supplied engine (created in owncloudgui.cpp:91 as `new QQmlApplicationEngine(this)`) is never used as an engine — it merely becomes the parent. This is confusing/wasteful and likely not the intended behavior; the passed engine's image providers / NAM factory are never configured.","fix":"Either adopt the passed engine directly (`_trayEngine.reset(trayEngine)` with appropriate ownership) or pass a parent QObject rather than an engine instance; do not wrap an engine as the parent of a new engine.","locations":[{"ref":"src/gui/systray.cpp:60-71","code":"   60 | void Systray::setTrayEngine(QQmlApplicationEngine *trayEngine)\n   61 | {\n   62 |     _trayEngine = std::make_unique<QQmlApplicationEngine>(trayEngine);\n   63 | \n   64 |     _trayEngine->setNetworkAccessManagerFactory(&_accessManagerFactory);\n   65 | \n   66 |     _trayEngine->addImportPath(QCoreApplication::applicationDirPath() + \"/qml\");\n   67 |     _trayEngine->addImportPath(\"qrc:/qml/theme\");\n   68 |     _trayEngine->addImageProvider(\"avatars\", new ImageProvider);\n   69 |     _trayEngine->addImageProvider(QLatin1String(\"svgimage-custom-color\"), new OCC::Ui::SvgImageProvider);\n   70 |     _trayEngine->addImageProvider(QLatin1String(\"tray-image-provider\"), new TrayImageProvider);\n   71 | }"},{"ref":"src/gui/owncloudgui.cpp:91","code":"   91 |     _tray->setTrayEngine(new QQmlApplicationEngine(this));"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"checkServerPublicKeyValidity() reads the server's PUBLIC key with PKey::readPrivateKey(serverPublicKeyBio) (PEM_read_bio_PrivateKey). A public key PEM is not a private key, so this normally yields a null/empty PKey; X509_verify() is then called against a likely-null key. The validity check can silently mis-behave (and is misleading to readers), weakening the binding check between the client certificate and the server key.","fix":"Use PKey::readPublicKey() (PEM_read_bio_PUBKEY) for the server public key and check the returned key is non-null before X509_verify().","locations":[{"ref":"src/libsync/clientsideencryption.cpp:1397-1418","code":" 1397 | bool ClientSideEncryption::checkServerPublicKeyValidity(const QByteArray &serverPublicKeyString) const\n 1398 | {\n 1399 |     Bio serverPublicKeyBio;\n 1400 |     BIO_write(serverPublicKeyBio, serverPublicKeyString.constData(), serverPublicKeyString.size());\n 1401 |     const auto serverPublicKey = PKey::readPrivateKey(serverPublicKeyBio);\n 1402 | \n 1403 |     Bio certificateBio;\n 1404 |     const auto certificatePem = _encryptionCertificate.getCertificate().toPem();\n 1405 |     BIO_write(certificateBio, certificatePem.constData(), certificatePem.size());\n 1406 |     const auto x509Certificate = X509Certificate::readCertificate(certificateBio);\n 1407 |     if (!x509Certificate) {\n 1408 |         qCInfo(lcCse()) << \"Client certificate is invalid. Could not check it against the server public key\";\n 1409 |         return false;\n 1410 |     }\n 1411 | \n 1412 |     if (X509_verify(x509Certificate, serverPublicKey) == 0) {\n 1413 |         qCInfo(lcCse()) << \"Client certificate is not valid against the server public key\";\n 1414 |         return false;\n 1415 |     }\n 1416 | \n 1417 |     qCDebug(lcCse()) << \"Client certificate is valid against server public key\";\n 1418 |     return true;"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"ClientStatusReportingDatabase uses QSqlQuery with the default database connection (no QSqlDatabase passed) but the DB is created via QSqlDatabase::addDatabase(\"QSQLITE\") with the default connection name. Default QSqlDatabase connections are not safe to use across threads, yet these queries run both on the constructing thread and inside network-reply callbacks. Combined with the missing lock in delete, the SQLite connection can be used from multiple threads.","fix":"Use a uniquely-named connection bound to one thread, or serialize all access through the mutex (and add the missing lock).","locations":[{"ref":"src/libsync/clientstatusreportingdatabase.cpp:24-57","code":"   24 | ClientStatusReportingDatabase::ClientStatusReportingDatabase(const Account *account)\n   25 | {\n   26 |     const auto dbPath = makeDbPath(account);\n   27 |     _database = QSqlDatabase::addDatabase(QStringLiteral(\"QSQLITE\"));\n   28 |     _database.setDatabaseName(dbPath);\n   29 | \n   30 |     if (!_database.open()) {\n   31 |         qCWarning(lcClientStatusReportingDatabase) << \"Could not setup client reporting, database connection error.\";\n   32 |         return;\n   33 |     }\n   34 | \n   35 |     QSqlQuery query;\n   36 |     const auto prepareResult =\n   37 |         query.prepare(QStringLiteral(\"CREATE TABLE IF NOT EXISTS clientstatusreporting(\"\n   38 |                                      \"name VARCHAR(4096) PRIMARY KEY,\"\n   39 |                                      \"status INTEGER(8),\"\n   40 |                                      \"count INTEGER,\"\n   41 |                                      \"lastOccurrence INTEGER(8))\"));\n   42 |     if (!prepareResult || !query.exec()) {\n   43 |         qCWarning(lcClientStatusReportingDatabase) << \"Could not setup client clientstatusreporting table:\" << query.lastError().text();\n   44 |         return;\n   45 |     }\n   46 | \n   47 |     if (!query.prepare(QStringLiteral(\"CREATE TABLE IF NOT EXISTS keyvalue(key VARCHAR(4096), value VARCHAR(4096), PRIMARY KEY(key))\")) || !query.exec()) {\n   48 |         qCWarning(lcClientStatusReportingDatabase) << \"Could not setup client keyvalue table:\" << query.lastError().text();\n   49 |         return;\n   50 |     }\n   51 | \n   52 |     if (!updateStatusNamesHash()) {\n   53 |         return;\n   54 |     }\n   55 | \n   56 |     _isInitialized = true;\n   57 | }"},{"ref":"src/libsync/clientstatusreportingdatabase.cpp:72-86","code":"   72 |     QSqlQuery query;\n   73 |     if (!query.prepare(QStringLiteral(\"SELECT * FROM clientstatusreporting\")) || !query.exec()) {\n   74 |         qCWarning(lcClientStatusReportingDatabase) << \"Could not get records from clientstatusreporting:\" << query.lastError().text();\n   75 |         return records;\n   76 |     }\n   77 | \n   78 |     while (query.next()) {\n   79 |         ClientStatusReportingRecord record;\n   80 |         record._status = query.value(query.record().indexOf(QStringLiteral(\"status\"))).toLongLong();\n   81 |         record._name = query.value(query.record().indexOf(QStringLiteral(\"name\"))).toByteArray();\n   82 |         record._numOccurences = query.value(query.record().indexOf(QStringLiteral(\"count\"))).toLongLong();\n   83 |         record._lastOccurence = query.value(query.record().indexOf(QStringLiteral(\"lastOccurrence\"))).toLongLong();\n   84 |         records.push_back(record);\n   85 |     }\n   86 |     return records;"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"PutMultiFileJob::start() reads every upload device fully into memory via oneDevice._device->readAll() and stuffs the bytes into a QHttpPart body. For a bulk batch sized up to maxChunkSize across many files this materializes the whole batch in RAM at once (plus QHttpMultiPart copies). On large batches or low-memory devices this is a significant memory spike compared to streaming the device.","fix":"Stream the device into the QHttpPart (setBodyDevice) instead of readAll() where feasible, or enforce a conservative byte cap on bulk batches so the in-memory body stays bounded.","locations":[{"ref":"src/libsync/putmultifilejob.cpp:35-63","code":"   35 |     for(const auto &oneDevice : _devices) {\n   36 |         // Our rate limits in UploadDevice::readData will cause an application freeze if used here.\n   37 |         // QHttpMultiPart's internal QHttpMultiPartIODevice::readData will loop over and over trying\n   38 |         // to read data from our UploadDevice while there is data left to be read; this will cause\n   39 |         // a deadlock as we will never have a chance to progress the data read\n   40 |         oneDevice._device->setChoked(false);\n   41 |         oneDevice._device->setBandwidthLimited(false);\n   42 | \n   43 |         auto onePart = QHttpPart{};\n   44 | \n   45 |         if (oneDevice._device->size() == 0) {\n   46 |             onePart.setBody({});\n   47 |         } else {\n   48 |             const auto allData = oneDevice._device->readAll();\n   49 |             onePart.setBody(allData);\n   50 |         }\n   51 | \n   52 |         if (oneDevice._device->isOpen()) {\n   53 |             oneDevice._device->close();\n   54 |         }\n   55 | \n   56 |         for (auto it = oneDevice._headers.begin(); it != oneDevice._headers.end(); ++it) {\n   57 |             onePart.setRawHeader(it.key(), it.value());\n   58 |         }\n   59 | \n   60 |         req.setPriority(QNetworkRequest::LowPriority); // Long uploads must not block non-propagation jobs.\n   61 | \n   62 |         _body.append(onePart);\n   63 |     }"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"IconJob constructor passes 'url' twice: QNetworkRequest request(url) is built, then account->sendRawRequest(\"GET\", url, request) is called. Account::sendRawRequest internally does req.setUrl(url), so the URL set on the locally-built request is redundant; harmless but indicates copy/paste. More notably, RedirectPolicyAttribute is set to 'true' (a bool implicitly converted to QVariant) instead of a QNetworkRequest::RedirectPolicy enum value, which is not the documented way to enable redirect following and may not behave as intended given AccessManager forces ManualRedirectPolicy unless already set.","fix":"Set RedirectPolicyAttribute to a proper QNetworkRequest::RedirectPolicy value (e.g. NoLessSafeRedirectPolicy) and drop the redundant url on the request.","locations":[{"ref":"src/libsync/iconjob.cpp:10-17","code":"   10 | IconJob::IconJob(AccountPtr account, const QUrl &url, QObject *parent)\n   11 |     : QObject(parent)\n   12 | {\n   13 |     QNetworkRequest request(url);\n   14 |     request.setAttribute(QNetworkRequest::RedirectPolicyAttribute, true);\n   15 |     const auto reply = account->sendRawRequest(QByteArrayLiteral(\"GET\"), url, request);\n   16 |     connect(reply, &QNetworkReply::finished, this, &IconJob::finished);\n   17 | }"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"createPlaceholderInfo sets FileIdentityLength = fileId.length() (raw byte count) while convertToPlaceholder sets it to (wstring length + 1) * sizeof(wchar_t) for a UTF-8-derived wstring, and cfApiSendPlaceholdersTransferInfo uses (length+1)*sizeof(wchar_t) over a byte buffer. These three callers disagree on how FileIdentity/FileIdentityLength is encoded (raw bytes vs wide chars). At minimum this is inconsistent and the wide-char-times-byte-length computation in cfApiSendPlaceholdersTransferInfo over a QByteArray fileId likely over-reports the identity length, which can later mismatch when CfAPI returns the identity.","fix":"Standardize the FileIdentity encoding and length across all create/convert/transfer paths (pick raw bytes consistently and use fileId.size()), so the stored and round-tripped identities match.","locations":[{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:1081-1082","code":" 1081 |     cloudEntry.FileIdentity = fileId.data();\n 1082 |     cloudEntry.FileIdentityLength = static_cast<DWORD>(fileId.length());"},{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:158-160","code":"  158 |         const auto fileIdentity = entryInfo.parsedProperties.fileId;\n  159 |         newPlaceholder.FileIdentity = fileIdentity.data();\n  160 |         newPlaceholder.FileIdentityLength = (fileIdentity.length() + 1) * sizeof(wchar_t);"},{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:1220-1225","code":" 1220 |     const QByteArray &fileId = item._fileId;\n 1221 |     const auto fileIdentity = QString::fromUtf8(fileId).toStdWString();\n 1222 |     const auto fileIdentitySize = (fileIdentity.length() + 1) * sizeof(wchar_t);\n 1223 |     const auto createPlaceholderFlags = CF_CONVERT_FLAG_MARK_IN_SYNC | (item.isDirectory() ? (item._type == ItemType::ItemTypeVirtualDirectory ? CF_CONVERT_FLAG_ENABLE_ON_DEMAND_POPULATION : CF_CONVERT_FLAG_ALWAYS_FULL) : CF_CONVERT_FLAG_MARK_IN_SYNC);\n 1224 | \n 1225 |     const auto result = CfConvertToPlaceholder(handleForPath(path).get(), fileIdentity.data(), sizeToDWORD(fileIdentitySize), createPlaceholderFlags, nullptr, nullptr);"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","description":"WebFlowCredentialsDialog constructor creates both _layout and _containerLayout with `new QVBoxLayout(this)`, i.e. installs two layouts on the same widget. The second assignment plus the later setLayout(_layout) causes Qt to emit \"QLayout: Attempting to add QLayout ... which already has a layout\" warnings; _containerLayout should not take `this` as parent since it is nested via _layout->addLayout().","fix":"Construct _containerLayout without a parent (new QVBoxLayout()) before adding it into _layout.","locations":[{"ref":"src/gui/creds/webflowcredentialsdialog.cpp:32-40","code":"   32 |     _layout = new QVBoxLayout(this);\n   33 |     int spacing = _layout->spacing();\n   34 |     auto margin = _layout->contentsMargins();\n   35 |     _layout->setSpacing(0);\n   36 |     _layout->setContentsMargins(0, 0, 0, 0);\n   37 | \n   38 |     _containerLayout = new QVBoxLayout(this);\n   39 |     _containerLayout->setSpacing(spacing);\n   40 |     _containerLayout->setContentsMargins(margin);"},{"ref":"src/gui/creds/webflowcredentialsdialog.cpp:79-80","code":"   79 |     _layout->addLayout(_containerLayout);\n   80 |     setLayout(_layout);"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","description":"askExperimentalVirtualFilesFeature() declares `Q_UNREACHABLE()` for the Vfs::XAttr case. On platforms where XAttr is a valid best-available VFS mode, reaching this switch with XAttr would invoke undefined behaviour. While the wizard currently restricts itself to CfApi/WithSuffix paths, the unreachable assumption is fragile if XAttr ever becomes the best mode here.","fix":"Handle Vfs::XAttr explicitly (treat it like WithSuffix, prompting the user) instead of asserting unreachable.","locations":[{"ref":"src/gui/wizard/owncloudwizard.cpp:530-533","code":"  530 |     case Vfs::XAttr:\n  531 |     case Vfs::Off:\n  532 |         Q_UNREACHABLE();\n  533 |     }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"tableColumns() calls checkConnect() on every invocation, and it is called many times in sequence during updateMetadataTableStructure()/updateErrorBlacklistTableStructure() (for metadata, uploadinfo, conflicts, blacklist). Each call re-runs the QFile::exists check and isOpen logic. More notably, addColumn()/removeColumn() each issue an individual ALTER plus a commitInternal() (transaction commit) per column, producing a long series of small transactions during schema upgrade rather than batching them.","fix":"Batch the schema-migration ALTER statements within a single transaction and avoid committing after every single column; cache table column lists instead of repeatedly issuing PRAGMA table_info.","locations":[{"ref":"src/common/syncjournaldb.cpp:751-921","code":"  751 | bool SyncJournalDb::updateMetadataTableStructure()\n  752 | {\n  753 |     auto columns = tableColumns(\"metadata\");\n  754 |     bool re = true;\n  755 | \n  756 |     // check if the file_id column is there and create it if not\n  757 |     if (columns.isEmpty()) {\n  758 |         return false;\n  759 |     }\n  760 | \n  761 |     const auto columnExists = [&col  false;\n  903 | \n  904 |         if (columnExists(quotaBytesUsed) && !hasDefaultValue(quotaBytesUsed)) {\n  905 |             result = removeColumn(quotaBytesUsed);\n  906 |         }\n  907 | \n  908 |         if (columnExists(quotaBytesAvailable) && !hasDefaultValue(quotaBytesAvailable)) {\n  909 |             result = removeColumn(quotaBytesAvailable);\n  910 |         }\n  911 | \n  912 |         if (result) {\n  913 |             columns = tableColumns(\"metadata\");\n  914 |         }\n  915 | \n  916 |         addColumn(quotaBytesUsed, bigInt, false, defaultCommand);\n  917 |         addColumn(quotaBytesAvailable, bigInt, false, defaultCommand);\n  918 |     }\n  919 | \n  920 |     return re;\n  921 | }"},{"ref":"src/common/syncjournaldb.cpp:986-1001","code":"  986 | QVector<QByteArray> SyncJournalDb::tableColumns(const QByteArray &table)\n  987 | {\n  988 |     QVector<QByteArray> columns;\n  989 |     if (!checkConnect()) {\n  990 |         return columns;\n  991 |     }\n  992 |     SqlQuery query(\"PRAGMA table_info('\" + table + \"');\", _db);\n  993 |     if (!query.exec()) {\n  994 |         return columns;\n  995 |     }\n  996 |     while (query.next().hasData) {\n  997 |         columns.append(query.baValue(1));\n  998 |     }\n  999 |     qCDebug(lcDb) << \"Columns in the current journal:\" << columns;\n 1000 |     return columns;\n 1001 | }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"FolderStatusModel::slotFolderScheduleQueueChanged calls slotFolderSyncStateChange for every folder in the FolderMan map on each schedule-queue change. slotFolderSyncStateChange itself, for NotYetStarted folders, iterates the entire map again (to count running folders) and the schedule queue. This is O(folders^2) work triggered on every queue mutation; with many folders the settings dialog can become sluggish.","fix":"Only update folders belonging to this model's account, and precompute the running-folder count
