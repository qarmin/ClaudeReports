ctories; consider storing QPointer<ProcessDirectoryJob> to detect deletion.","locations":[{"ref":"src/libsync/discoveryphase.cpp:270-293","code":"  270 | void DiscoveryPhase::startJob(ProcessDirectoryJob *job)\n  271 | {\n  272 |     Q_ASSERT(!_currentRootJob);\n  273 |     connect(this, &DiscoveryPhase::itemDiscovered, this, &DiscoveryPhase::slotItemDiscovered, Qt::UniqueConnection);\n  274 |     connect(job, &ProcessDirectoryJob::finished, this, [this, job] {\n  275 |         Q_ASSERT(_currentRootJob == sender());\n  276 |         _currentRootJob = nullptr;\n  277 |         if (job->_dirItem)\n  278 |             emit itemDiscovered(job->_dirItem);\n  279 |         job->deleteLater();\n  280 | \n  281 |         // Once the main job has finished recurse here to execute the remaining\n  282 |         // jobs for queued deleted directories.\n  283 |         if (!_queuedDeletedDirectories.isEmpty()) {\n  284 |             auto nextJob = _queuedDeletedDirectories.take(_queuedDeletedDirectories.firstKey());\n  285 |             startJob(nextJob);\n  286 |         } else {\n  287 |             markPermanentDeletionRequests();\n  288 |             emit finished();\n  289 |         }\n  290 |     });\n  291 |     _currentRootJob = job;\n  292 |     job->start();\n  293 | }"},{"ref":"src/libsync/discoveryphase.cpp:200-205","code":"  200 |     if (auto *otherJob = _queuedDeletedDirectories.take(originalPath)) {\n  201 |         oldEtag = otherJob->_dirItem->_etag;\n  202 |         delete otherJob;\n  203 |         result = true;\n  204 |     }\n  205 |     return { result, oldEtag };"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"metadataReceived() computes topLevelFolderPath by splitting topLevelPath on '/' and re-joining with '/': topLevelPathSplit.join(u'/') which is just topLevelPath again (a no-op round trip). The variable name and comment suggest it should derive the relevant parent/top-level path, but the split/join produces the identical string, so the computation is misleading and likely not what was intended.","fix":"Either assign topLevelFolderPath = topLevelPath directly (removing the misleading split/join) or implement the intended path transformation.","locations":[{"ref":"src/libsync/discoveryphase.cpp:648-652","code":"  648 |         if (_subPath.startsWith(topLevelPath + u'/')) {\n  649 |             const auto topLevelPathSplit = topLevelPath.split(u'/');\n  650 |             topLevelFolderPath = topLevelPathSplit.join(u'/');\n  651 |             break;\n  652 |         }"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"FolderMetadata::initMetadata()/setupExistingMetadata() report E2EeError and return early on several failures (invalid version, bad users array, decrypt failure, signature/checksum failure) but never set _isMetadataValid; however initMetadata() still calls emitSetupComplete() unconditionally. Combined with setupExistingMetadata returning without emitting any failure signal, callers relying solely on isValid() are correct, but the duplicated 'report-and-return' branches make it easy to add a path that leaves _isMetadataValid stale-true after a partial setup. Notably setupExistingMetadata can return after _binaryMetadataKeyForEncryption was set from a previous attempt while signature/key checks failed.","fix":"Explicitly set _isMetadataValid=false at the start of setupExistingMetadata() and only set it true at the very end after all checks pass, so any early return leaves the object invalid.","locations":[{"ref":"src/libsync/foldermetadata.cpp:96-110","code":"   96 | void FolderMetadata::initMetadata()\n   97 | {\n   98 |     if (_initialMetadata.isEmpty()) {\n   99 |         initEmptyMetadata();\n  100 |         return;\n  101 |     }\n  102 | \n  103 |     qCDebug(lcCseMetadata()) << \"Setting up existing metadata\";\n  104 |     setupExistingMetadata(_initialMetadata);\n  105 | \n  106 |     if (binaryMetadataKeyForDecryption().isEmpty() || binaryMetadataKeyForEncryption().isEmpty()) {\n  107 |         qCWarning(lcCseMetadata()) << \"Failed to setup FolderMetadata. Could not parse/create metadataKey!\";\n  108 |     }\n  109 |     emitSetupComplete();\n  110 | }"},{"ref":"src/libsync/foldermetadata.cpp:176-198","code":"  176 |     if (_initialSignature.isEmpty()) {\n  177 |         qCWarning(lcCseMetadata()) << \"Signature is empty\";\n  178 |         _account->reportClientStatus(OCC::ClientStatusReportingStatus::E2EeError_GeneralError);\n  179 |         return;\n  180 |     }\n  181 | \n  182 |     if (_folderUsers.contains(_account->davUser())) {\n  183 |         const auto currentFolderUser = _folderUsers.value(_account->davUser());\n  184 |         const auto currentUserCertificate = QSslCertificate{currentFolderUser.certificatePem};\n  185 |         _binaryMetadataKeyForEncryption = QByteArray::fromBase64(decryptDataWithPrivateKey(currentFolderUser.encryptedMetadataKey, currentUserCertificate.digest(QCryptographicHash::Sha256).toBase64()));\n  186 |         _binaryMetadataKeyForDecryption = _binaryMetadataKeyForEncryption;\n  187 |     }\n  188 | \n  189 |     if (!parseFileDropPart(metaDataDoc)) {\n  190 |         qCWarning(lcCseMetadata()) << \"Could not parse filedrop part\";\n  191 |         return;\n  192 |     }\n  193 | \n  194 |     if (binaryMetadataKeyForDecryption().isEmpty() || binaryMetadataKeyForEncryption().isEmpty()) {\n  195 |         qCWarning(lcCseMetadata()) << \"Could not setup metadata key!\";\n  196 |         _account->reportClientStatus(OCC::ClientStatusReportingStatus::E2EeError_GeneralError);\n  197 |         return;\n  198 |     }"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"FolderMetadata counter handling is effectively a no-op: setupExistingMetadata reads _counter from server metadata (with a TODO admitting it is not validated), and newCounter() simply returns _ {"ref":"src/libsync/networkjobs.cpp:87-89","code":"   87 |     if (reply()->error() != QNetworkReply::NoError) {\n   88 |         qCWarning(lcEtagJob) << \"request network error: \" << reply()->errorString();\n   89 |     }"},{"ref":"src/libsync/networkjobs.cpp:1350-1354","code":" 1350 |     const auto reply = sendRequest(verb, url, req, requestBody);\n 1351 | \n 1352 |     if (reply->error() != QNetworkReply::NoError) {\n 1353 |         qCWarning(lcSimpleFileJob) << verb << \" Network error: \" << reply->errorString();\n 1354 |     }"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"LsColXMLParser::parse() dereferences the output pointer fileInfo unconditionally for the 'fileid' property: (*fileInfo)[currentHref].fileId = ... with no null check, while the adjacent 'size' branch correctly guards with 'if (ok && fileInfo)'. If a caller passes fileInfo == nullptr (the signature allows it) and the response contains a fileid element, this is a null-pointer dereference.","fix":"Guard the fileid (and resourcetype/folders) accesses with a fileInfo null check, consistent with the size branch.","locations":[{"ref":"src/libsync/networkjobs.cpp:262-270","code":"  262 |             } else if (name == QLatin1String(\"size\")) {\n  263 |                 bool ok = false;\n  264 |                 auto s = propertyContent.toLongLong(&ok);\n  265 |                 if (ok && fileInfo) {\n  266 |                     (*fileInfo)[currentHref].size = s;\n  267 |                 }\n  268 |             } else if (name == QLatin1String(\"fileid\")) {\n  269 |                 (*fileInfo)[currentHref].fileId = propertyContent.toUtf8();\n  270 |             }"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"JsonApiJob::finished() detects an OCS error embedded in an XML body by substring-matching jsonStr.contains(\"<?xml version=\\\"1.0\\\"?>\") with no spaces, but servers commonly emit '<?xml version=\"1.0\" encoding=\"UTF-8\"?>' or with differing whitespace/quotes. When the literal does not match, the code falls through to the JSON statuscode regex which will not match XML, leaving statusCode at 0 and the error status being lost.","fix":"Detect XML via content-type or a tolerant check (e.g. trimmed startsWith(\"<?xml\")) rather than an exact-spacing substring.","locations":[{"ref":"src/libsync/networkjobs.cpp:1131-1149","code":" 1131 |     QString jsonStr = QString::fromUtf8(reply()->readAll());\n 1132 |     if (jsonStr.contains(\"<?xml version=\\\"1.0\\\"?>\")) {\n 1133 |         static const QRegularExpression rex(\"<statuscode>(\\\\d+)<\/statuscode>\");\n 1134 |         const auto rexMatch = rex.match(jsonStr);\n 1135 |         if (rexMatch.hasMatch()) {\n 1136 |             // this is a error message coming back from ocs.\n 1137 |             statusCode = rexMatch.captured(1).toInt();\n 1138 |         }\n 1139 |     } else if(jsonStr.isEmpty() && httpStatusCode == notModifiedStatusCode){\n 1140 |         qCWarning(lcJsonApiJob) << \"Nothing changed so nothing to retrieve - status code: \" << httpStatusCode;\n 1141 |         statusCode = httpStatusCode;\n 1142 |     } else {\n 1143 |         static const QRegularExpression rex(R\"(\"statuscode\":(\\d+))\");\n 1144 |         // example: \"{\"ocs\":{\"meta\":{\"status\":\"ok\",\"statuscode\":100,\"message\":null},\"data\":{\"version\":{\"major\":8,\"minor\":\"... (504)\n 1145 |         const auto rxMatch = rex.match(jsonStr);\n 1146 |         if (rxMatch.hasMatch()) {\n 1147 |             statusCode = rxMatch.captured(1).toInt();\n 1148 |         }\n 1149 |     }"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"PushNotifications::onWebSocketSslErrors() emits authenticationFailed() on SSL errors, whereas onWebSocketError() emits connectionLost(). In Account::trySetupPushNotifications both are wired to the same disablePushNotifications handler, but authenticationFailed semantically indicates bad credentials and triggers the reconnect-attempt counter path elsewhere; treating transient SSL errors as authentication failures is incorrect and can permanently disable push notifications after MAX_ALLOWED_FAILED_AUTHENTICATION_ATTEMPTS even though credentials are valid.","fix":"Emit connectionLost() (or a dedicated transport-error signal) for SSL errors rather than authenticationFailed().","locations":[{"ref":"src/libsync/pushnotifications.cpp:160-165","code":"  160 | void PushNotifications::onWebSocketSslErrors(const QList<QSslError> &errors)\n  161 | {\n  162 |     qCWarning(lcPushNotifications) << \"Websocket ssl errors on with account\" << _account->displayName() << _account->url() << errors;\n  163 |     closeWebSocket();\n  164 |     emit authenticationFailed();\n  165 | }"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"checkErrorBlacklisting() returns false (treating the item as not blacklisted) whenever item._modtime == 0 or entry._lastTryModtime == 0 for Up items, and similarly for empty etags on Down items. While intended to expire entries when data is unknown, this means an item with a genuinely-zero modtime (which discovery flags elsewhere as an error) bypasses blacklisting entirely and will be retried every sync, potentially hammering the server for a permanently failing file.","fix":"Distinguish 'unknown/zero modtime' from 'changed modtime'; do not unconditionally clear blacklisting when the modtime is zero for items that are otherwise stable.","locations":[{"ref":"src/libsync/syncengine.cpp:155-174","code":"  155 |     if (item._direction == SyncFileItem::Up) { // check the modtime\n  156 |         if (item._modtime == 0 || entry._lastTryModtime == 0) {\n  157 |             return false;\n  158 |         } else if (item._modtime != entry._lastTryModtime) {\n  159 |             qCInfo(lcEngine) << item._file << \" is blacklisted, but has changed mtime!\";\n  160 |             return false;\n  161 |         } else if (item._renameTarget != entry._renameTarget) {\n  162 |             qCInfo(lcEngine) << item._file << \" is blacklisted, but rename target changed from\" << entry._renameTarget;\n  163 |             return false;\n  164 |         }\n  165 |     } else if (item._direction == SyncFileItem::Down) {\n  166 |         // download, check the etag.\n  167 |         if (item._etag.isEmpty() || entry._lastTryEtag.isEmpty()) {\n  168 |             qCInfo(lcEngine) << item._file << \"one ETag is empty, no blacklisting\";\n  169 |             return false;\n  170 |         } else if (item._etag != entry._lastTryEtag) {\n  171 |             qCInfo(lcEngine) << item._file << \" is blacklisted, but has changed etag!\";\n  172 |             return false;\n  173 |         }\n  174 |     }"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"SyncEngine::startSync() only enables Windows filename compatibility enforcement when ALL four forbidden lists (filenames, basenames, extensions, chars) are non-empty (forbiddenFilenames && forbiddenBasenames && forbiddenExtensions && forbiddenChars). A server that provides only some of these lists (e.g. forbidden chars but no forbidden extensions) will not get enforcement enabled at all, defeating the protection on partially-configured servers.","fix":"Enable enforcement if ANY of the forbidden lists is non-empty (use || instead of &&), or evaluate each list independently.","locations":[{"ref":"src/libsync/syncengine.cpp:672-678","code":"  672 |     if (!forbiddenFilenames.isEmpty() &&\n  673 |         !forbiddenBasenames.isEmpty() &&\n  674 |         !forbiddenExtensions.isEmpty() &&\n  675 |         !forbiddenChars.isEmpty()) {\n  676 |         _shouldEnforceWindowsFileNameCompatibility = true;\n  677 |         _discoveryPhase->_shouldEnforceWindowsFileNameCompatibility = _shouldEnforceWindowsFileNameCompatibility;\n  678 |     }"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"SyncEngine::finishSync() contains a no-op intended fix: when both _hasDownloadRemovedItems and _hasUploadErrorItems are set, it loops over _syncItems matching ERROR+Up items but the only action (item->_instruction = CSYNC_INSTRUCTION_IGNORE) is commented out. The loop therefore does nothing except set _anotherSyncNeeded = ImmediateFollowUp, while the comment/structure implies upload-error items in a download-removed tree should be suppressed. Either dead code or an unfinished fix that leaves the items in ERROR state.","fix":"Remove the dead loop or restore the intended behavior (uncomment the instruction change) after confirming correctness.","locations":[{"ref":"src/libsync/syncengine.cpp:1066-1073","code":" 1066 |     if (_discoveryPhase && _discoveryPhase->_hasDownloadRemovedItems && _discoveryPhase->_hasUploadErrorItems) {\n 1067 |         for (const auto &item : std::as_const(_syncItems)) {\n 1068 |             if (item->_instruction == CSYNC_INSTRUCTION_ERROR && item->_direction == SyncFileItem::Up) {\n 1069 |                 // item->_instruction = CSYNC_INSTRUCTION_IGNORE;\n 1070 |             }\n 1071 |         }\n 1072 |         _anotherSyncNeeded = ImmediateFollowUp;\n 1073 |     }"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"groupNeededScheduledSyncRuns() copies the bucket value out of the QHash with QHash::value() (auto bucketValue = intervalSyncBuckets.value(key)), mutates the copy, then re-inserts it. This is correct but wasteful; more importantly the surrounding logic re-reads value() after a contains() check (double lookup). The copy-modify-reinsert pattern works but means every additional file in a bucket triggers a full QVector copy of the accumulated file list (O(n^2) for large buckets).","fix":"Use a reference into the hash (auto &bucketValue = intervalSyncBuckets[intervalBucketKey];) and append in place, avoiding repeated copies and the redundant contains()/value() lookups.","locations":[{"ref":"src/libsync/syncengine.cpp:1597-1606","code":" 1597 |         if (!intervalSyncBuckets.contains(intervalBucketKey)) {\n 1598 |             intervalSyncBuckets.insert(intervalBucketKey, {syncScheduledSecs, {file}});\n 1599 |             continue;\n 1600 |         }\n 1601 | \n 1602 |         auto bucketValue = intervalSyncBuckets.value(intervalBucketKey);\n 1603 |         bucketValue.scheduledSyncTimerSecs = qMax(bucketValue.scheduledSyncTimerSecs, syncScheduledSecs);\n 1604 |         bucketValue.files.append(file);\n 1605 |         intervalSyncBuckets.insert(intervalBucketKey, bucketValue);\n 1606 |     }"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"fromProperties() asserts the parsed last-modified date is valid (Q_ASSERT(date.isValid())) but then only assigns _modtime when date.toSecsSinceEpoch() > 0. In release builds the assert is compiled out; if the server sends an unparseable getlastmodified the item silently keeps _modtime == 0, which later causes 'invalid modification time' errors. A malformed/empty date from the server should be handled gracefully, not asserted.","fix":"Remove the Q_ASSERT and handle an invalid/zero date explicitly (log and leave modtime unset, or treat as an error), rather than relying on a debug-only assertion against server-controlled data.","locations":[{"ref":"src/libsync/syncfileitem.cpp:228-234","code":"  228 |     auto getlastmodifiedValue = properties.value(QStringLiteral(\"getlastmodified\"));\n  229 |     getlastmodifiedValue.replace(\"GMT\", \"+0000\");\n  230 |     const auto date = QDateTime::fromString(getlastmodifiedValue, Qt::RFC2822Date);\n  231 |     Q_ASSERT(date.isValid());\n  232 |     if (date.toSecsSinceEpoch() > 0) {\n  233 |         item->_modtime = date.toSecsSinceEpoch();\n  234 |     }"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"SyncFileStatusTracker::incSyncCountAndEmitStatusChanged/decSyncCountAndEmitStatusChanged recurse to parents, and slotAboutToPropagate asserts _syncCount.isEmpty() at start. slotSyncFinished() swaps and clears _syncCount to mitigate 'unsymmetrical inc/dec calls', acknowledging inc/dec can be unbalanced (e.g. aborted directory jobs). If inc/dec become unbalanced mid-sync, decSyncCount can decrement a count to negative (--_syncCount[relativePath] on an absent key creates 0 then -1), and the !count check (==0) is then never true for the negative path while a positive sibling stays stuck, leaving folders permanently displayed as syncing until slotSyncFinished clears them.","fix":"Guard decSyncCount against decrementing absent/zero entries (e.g. only decrement if present and >0), so an unbalanced dec cannot create a negative stuck count.","locations":[{"ref":"src/libsync/syncfilestatustracker.cpp:200-220","code":"  200 | void SyncFileStatusTracker::decSyncCountAndEmitStatusChanged(const QString &relativePath, SharedFlag sharedFlag)\n  201 | {\n  202 |     int count = --_syncCount[relativePath];\n  203 |     if (!count) {\n  204 |         // Remove from the map, same as 0\n  205 |         _syncCount.remove(relativePath);\n  206 | \n  207 |         SyncFileStatus status = sharedFlag == UnknownShared\n  208 |             ? fileStatus(relativePath)\n  209 |             : resolveSyncAndErrorStatus(relativePath, sharedFlag);\n  210 |         emit fileStatusChanged(getSystemDestination(relativePath), status);\n  211 | \n  212 |         // We passed from SYNC to OK, decrement our parent.\n  213 |         ASSERT(!relativePath.endsWith('/'));\n  214 |         int lastSlashIndex = relativePath.lastIndexOf('/');\n  215 |         if (lastSlashIndex != -1)\n  216 |             decSyncCountAndEmitStatusChanged(relativePath.left(lastSlashIndex), UnknownShared);\n  217 |         else if (!relativePath.isEmpty())\n  218 |             decSyncCountAndEmitStatusChanged(QString(), UnknownShared);\n  219 |     }\n  220 | }"},{"ref":"src/libsync/syncfilestatustracker.cpp:308-321","code":"  308 | void SyncFileStatusTracker::slotSyncFinished()\n  309 | {\n  310 |     // Clear the sync counts to reduce the impact of unsymetrical inc/dec calls (e.g. when directory job abort)\n  311 |     QHash<QString, int> oldSyncCount;\n  312 |     std::swap(_syncCount, oldSyncCount);\n  313 |     for (auto it = oldSyncCount.begin(); it != oldSyncCount.end(); ++it) {\n  314 |         // Don't announce folders, fileStatus expect only paths without '/', otherwise it asserts\n  315 |         if (it.key().endsWith('/')) {\n  316 |             continue;\n  317 |         }\n  318 | \n  319 |         emit fileStatusChanged(getSystemDestination(it.key()), fileStatus(it.key()));\n  320 |     }\n  321 | }"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"SyncResult::processCompletedItem() counts new/removed/updated/renamed items only when item->_direction == SyncFileItem::Down (line 146 guard). Uploads (Up direction) are therefore never counted toward _numNewItems/_numRemovedItems/_numUpdatedItems/_numRenamedItems, so the summary statistics (and firstItemNew etc.) silently exclude all upload activity. If the counters are meant to reflect both directions this under-reports; if intentional the naming/comment is misleading.","fix":"Clarify intent: either drop the Direction::Down restriction to count uploads too, or rename/document the counters to make clear they are download-only.","locations":[{"ref":"src/libsync/syncresult.cpp:145-169","code":"  145 |     } else {\n  146 |         if (!item->hasErrorStatus() && item->_status != SyncFileItem::FileIgnored && item->_direction == SyncFileItem::Down) {\n  147 |             switch (item->_instruction) {\n  148 |             case CSYNC_INSTRUCTION_NEW:\n  149 |             case CSYNC_INSTRUCTION_TYPE_CHANGE:\n  150 |                 _numNewItems++;\n  151 |                 if (!_firstItemNew)\n  152 |                     _firstItemNew = item;\n  153 |                 break;\n  154 |             case CSYNC_INSTRUCTION_REMOVE:\n  155 |                 _numRemovedItems++;\n  156 |                 if (!_firstItemDeleted)\n  157 |                     _firstItemDeleted = item;\n  158 |                 break;\n  159 |             case CSYNC_INSTRUCTION_SYNC:\n  160 |                 _numUpdatedItems++;\n  161 |                 if (!_firstItemUpdated)\n  162 |                     _firstItemUpdated = item;\n  163 |                 break;\n  164 |             case CSYNC_INSTRUCTION_RENAME:\n  165 |                 if (!_firstItemRenamed) {\n  166 |                     _firstItemRenamed = item;\n  167 |                 }\n  168 |                 _numRenamedItems++;\n  169 |                 break;"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"xattrGet uses a fixed 256-byte buffer. If the stored attribute value is larger than 256 bytes, getxattr fails with ERANGE and returns -1, which the function maps to 'attribute not present' (returns empty Optional). A placeholder whose marker happens to exceed the buffer would be silently treated as a regular file. The size should be queried first (getxattr with size 0) or ERANGE handled by re-reading with a larger buffer.","fix":"Call getxattr(path, name, nullptr, 0) to obtain the real size, then resize and read; or loop on ERANGE growing the buffer.","locations":[{"ref":"src/libsync/vfs/xattr/xattrwrapper_linux.cpp:21-30","code":"   21 |     constexpr auto bufferSize = 256;\n   22 |     QByteArray result;\n   23 |     result.resize(bufferSize);\n   24 |     const auto count = getxattr(path.constData(), name.constData(), result.data(), bufferSize);\n   25 |     if (count >= 0) {\n   26 |         result.resize(static_cast<int>(count) - 1);\n   27 |         return result;\n   28 |     } else {\n   29 |         return {};\n   30 |     }"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ChecksumCalculator::calculate() asserts the algorithm result without distinguishing a genuinely empty file from a failure. For an empty input file (size 0) the crypto branch produces the hash of zero bytes (non-empty hex), but the Adler32 branch returns QByteArray::number(_adlerHash,16) for the initial seed; meanwhile calcCryptoHash() in checksums.cpp returns an EMPTY QByteArray for empty data. These two code paths therefore disagree on the checksum of an empty file (one returns the real digest, the other returns empty), which can cause spurious content-change detection / re-upload.","fix":"Make empty-input handling consistent between ChecksumCalculator and calcCryptoHash (either both return the digest of zero bytes, or both return empty).","locations":[{"ref":"src/common/checksumcalculator.cpp:67-132","code":"   67 | QByteArray ChecksumCalculator::calculate()\n   68 | {\n   69 |     QByteArray result;\n   70 | \n   71 |     if (!_isInitialized) {\n   72 |         return result;\n   73 |     }\n   74 | \n   75 |     Q_ASSERT(!_device->isOpen());\n   76 |     if (_device->isOpen()) {\n   77 |         qCWarning(lcChecksumCalculator) << \"Device already open. Ignoring.\";\n   78 |     }\n   79 | \n   80 |     if (!_device->isOpen() && !_device->open(QIODevice::ReadOnly)) {\n   81 |         if (auto file = qobject_cast<QFile *>(_device.data())) {\n   82 |             qCWarning(lcChecksumCalculator) << \"Could not open file\" << file->fileName() << \"for reading to compute a checksum\" << file->errorString();\n   83 |         } else {\n   84 |             qCWarning(lcChecksumCalculator) << \"Could not open device\" << _device.data() << \"for reading to compute a checksum\" << _device->errorString();\n   85 |         }\n   86 |         return result;\n   87 |     }\n   88 | \n   89 |     for (;;) {\n   90 |         QMutexLocker locker(&_deviceMutex);\n   91 |         if (!_device->isOpen() || _device->atEnd()) {\n   92 |             break;\n   93 |         }\n   94 |         const auto toRead = qMin(_device->bytesAvailable(), bufSize);\n   95 |         if (toRead <= 0) {\n   96 |             break;\n   97 |         }\n   98 |         QByteArray buf(toRead, Qt::Uninitialized);\n   99 |         const auto sizeRead = _device->read(buf.data(), toRead);\n  100 |         if (sizeRead <= 0) {\n  101 |             break;\n  102 |         }\n  103 |         if (!addChunk(buf, sizeRead)) {\n  104 |             break;\n  105 |         }\n  106 |     }\n  107 | \n  108 |     {\n  109 |         QMutexLocker locker(&_deviceMutex);\n  110 |         if (!_device->isOpen()) {\n  111 |             return result;\n  112 |         }\n  113 |     }\n  114 | \n  115 |     if (_algorithmType == AlgorithmType::Adler32) {\n  116 |         result = QByteArray::number(_adlerHash, 16);\n  117 |     } else {\n  118 |         Q_ASSERT(_cryptographicHash);\n  119 |         if (_cryptographicHash) {\n  120 |             result = _cryptographicHash->result().toHex();\n  121 |         }\n  122 |     }\n  123 | \n  124 |     {\n  125 |         QMutexLocker locker(&_deviceMutex);\n  126 |         if (_device->isOpen()) {\n  127 |             _device->close();\n  128 |         }\n  129 |     }\n  130 | \n  131 |     return result;\n  132 | }"},{"ref":"src/common/checksums.cpp:82-90","code":"   82 | static QByteArray calcCryptoHash(const QByteArray &data, QCryptographicHash::Algorithm algo)\n   83 | {\n   84 |     if (data.isEmpty()) {\n   85 |         return {};\n   86 |     }\n   87 |     QCryptographicHash crypto(algo);\n   88 |     crypto.addData(data);\n   89 |     return crypto.result().toHex();\n   90 | }"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","description":"findBestChecksum() searches for the algorithm offset `i` inside a QString (UTF-16 code units) built from _checksums, then uses that index `i` to call _checksums.mid(i, end-i) and _checksums.indexOf(' ', i) on the original QByteArray (bytes). For any non-ASCII bytes preceding the checksum token the QString index and QByteArray byte offset diverge, yielding a wrong/garbled substring. In practice checksum headers are ASCII so this is latent, but the mixed indexing is incorrect.","fix":"Perform all the indexing on a single representation: search and slice on the QByteArray (e.g. using QByteArray::indexOf with case handling) or convert end offsets via the same QString.","locations":[{"ref":"src/common/checksums.cpp:107-131","code":"  107 | QByteArray findBestChecksum(const QByteArray &_checksums)\n  108 | {\n  109 |     if (_checksums.isEmpty()) {\n  110 |         return {};\n  111 |     }\n  112 |     const auto checksums = QString::fromUtf8(_checksums);\n  113 |     int i = 0;\n  114 |     // The order of the searches here defines the preference ordering.\n  115 |     if (-1 != (i = checksums.indexOf(QLatin1String(\"SHA3-256:\"), 0, Qt::CaseInsensitive))\n  116 |         || -1 != (i = checksums.indexOf(QLatin1String(\"SHA256:\"), 0, Qt::CaseInsensitive))\n  117 |         || -1 != (i = checksums.indexOf(QLatin1String(\"SHA1:\"), 0, Qt::CaseInsensitive))\n  118 |         || -1 != (i = checksums.indexOf(QLatin1String(\"MD5:\"), 0, Qt::CaseInsensitive))\n  119 |         || -1 != (i = checksums.indexOf(QLatin1String(\"ADLER32:\"), 0, Qt::CaseInsensitive))) {\n  120 |         // Now i is the start of the best checksum\n  121 |         // Grab it until the next space or end of xml or end of string.\n  122 |         int end = _checksums.indexOf(' ', i);\n  123 |         // workaround for https://github.com/owncloud/core/pull/38304\n  124 |         if (end == -1) {\n  125 |             end = _checksums.indexOf('<', i);\n  126 |         }\n  127 |         return _checksums.mid(i, end - i);\n  128 |     }\n  129 |     qCWarning(lcChecksums) << \"Failed to parse\" << _checksums;\n  130 |     return {};\n  131 | }"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","description":"getRootE2eFolderRecord() returns true (success) after exhausting all path components without finding a top-level encrypted folder record. The output rec is left in whatever state the last getFileRecord() produced (possibly a valid but non-toplevel record, or invalid). Callers checking only the bool return value cannot distinguish 'found root e2ee folder' from 'walked to the top and found nothing', risking acting on a stale/incorrect record.","fix":"Return false (or clear rec) when the loop completes without locating a top-level encrypted folder, so the not-found case is distinguishable from success.","locations":[{"ref":"src/common/syncjournaldb.cpp:1136-1170","code":" 1136 | bool SyncJournalDb::getRootE2eFolderRecord(const QString &remoteFolderPath, SyncJournalFileRecord *rec)\n 1137 | {\n 1138 |     Q_ASSERT(rec);\n 1139 |     rec->_path.clear();\n 1140 |     Q_ASSERT(!rec->isValid());\n 1141 | \n 1142 |     Q_ASSERT(!remoteFolderPath.isEmpty());\n 1143 | \n 1144 |     Q_ASSERT(!remoteFolderPath.isEmpty() && remoteFolderPath != QStringLiteral(\"/\"));\n 1145 |     if (remoteFolderPath.isEmpty() || remoteFolderPath == QStringLiteral(\"/\")) {\n 1146 |         qCWarning(lcDb) << \"Invalid folder path!\";\n 1147 |         return false;\n 1148 |     }\n 1149 | \n 1150 |     auto remoteFolderPathSplit = remoteFolderPath.split(QLatin1Char('/'), Qt::SkipEmptyParts);\n 1151 | \n 1152 |     if (remoteFolderPathSplit.isEmpty()) {\n 1153 |         qCWarning(lcDb) << \"Invalid folder path!\";\n 1154 |         return false;\n 1155 |     }\n 1156 | \n 1157 |     while (!remoteFolderPathSplit.isEmpty()) {\n 1158 |         const auto result = getFileRecord(remoteFolderPathSplit.join(QLatin1Char('/')), rec);\n 1159 |         if (!result) {\n 1160 |             return false;\n 1161 |         }\n 1162 |         if (rec->isE2eEncrypted() && rec->_e2eMangledName.isEmpty()) {\n 1163 |             // it's a toplevel folder record\n 1164 |             return true;\n 1165 |         }\n 1166 |         remoteFolderPathSplit.removeLast();\n 1167 |     }\n 1168 | \n 1169 |     return true;\n 1170 | }"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","description":"listFilesInPath() guards against parent_hash() collisions with `rec._path.indexOf(\"/\", path.size() + 1) > 0`. Using `> 0` instead of `>= 0` (or `!= -1`) means a '/' located exactly at byte offset 0 would be treated as 'no deeper slash'; while offset 0 is unlikely for these relative paths, the idiomatic and correct test for 'contains a separator' is `!= -1`. The current comparison can misclassify edge cases as non-collisions and pass through records that are actually in a sub-directory.","fix":"Use `rec._path.indexOf(\"/\", path.size() + 1) != -1` to detect any deeper path separator.","locations":[{"ref":"src/common/syncjournaldb.cpp:1636-1639","code":" 1636 |         if (!rec._path.startsWith(path) || rec._path.indexOf(\"/\", path.size() + 1) > 0) {\n 1637 |             qWarning(lcDb) << \"hash collision\" << path << rec.path();\n 1638 |             continue;\n 1639 |         }"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","description":"AccountManager::backwardMigrationSettingsKeys() is documented/used to fill `deleteKeys` and `ignoreKeys`, but restore() calls it as `backwardMigrationSettingsKeys(&skipSettingsKeys, &skipSettingsKeys)` passing the SAME list for both out-params. If accountsVersion > maxAccountsVersion the whole 'Accounts' group is appended to deleteKeys (== skipSettingsKeys), and the code at line 111 then treats the entire Accounts container as skipped. The dual-purpose aliasing makes the delete-vs-ignore distinction meaningless at this call site and relies on the caller never needing to actually delete the future keys (they are only skipped, never deleted).","fix":"Pass distinct lists and actually act on deleteKeys (remove the future container) vs ignoreKeys, or rename/simplify the API to reflect that only a single skip-list is ever used.","locations":[{"ref":"src/gui/accountmanager.cpp:101-116","code":"  101 |     QStringList skipSettingsKeys;\n  102 |     backwardMigrationSettingsKeys(&skipSettingsKeys, &skipSettingsKeys);\n  103 | \n  104 |     const auto settings = ConfigFile::settingsWithGroup(QLatin1String(accountsC));\n  105 |     if (settings->status() != QSettings::NoError || !settings->isWritable()) {\n  106 |         qCWarning(lcAccountManager) << \"Could not read settings from\" << settings->fileName()\n  107 |                                     << settings->status();\n  108 |         return AccountsRestoreFailure;\n  109 |     }\n  110 | \n  111 |     if (skipSettingsKeys.contains(settings->group())) {\n  112 |         // Should not happen: bad container keys should have been deleted\n  113 |         qCWarning(lcAccountManager) << \"Accounts structure is too new, ignoring\";\n  114 |         emit(accountListInitialized());\n  115 |         return AccountsRestoreSuccessWithSkipped;\n  116 |     }"},{"ref":"src/gui/accountmanager.cpp:169-192","code":"  169 | void AccountManager::backwardMigrationSettingsKeys(QStringList *deleteKeys, QStringList *ignoreKeys)\n  170 | {\n  171 |     const auto settings = ConfigFile::settingsWithGroup(QLatin1String(accountsC));\n  172 |     const auto accountsVersion = settings->value(QLatin1String(versionC)).toInt();\n  173 | \n  174 |     qCInfo(lcAccountManager) << \"Checking for accounts versions.\";\n  175 |     qCInfo(lcAccountManager) << \"Config accounts version:\" << accountsVersion;\n  176 |     qCInfo(lcAccountManager) << \"Max accounts Version is set to:\" << maxAccountsVersion;\n  177 |     if (accountsVersion <= maxAccountsVersion) {\n  178 |         const auto settingsChildGroups = settings->childGroups();\n  179 |         for (const auto &accountId : settingsChildGroups) {\n  180 |             settings->begin SyncConflictsModel::flags(const QModelIndex &index) const\n  139 | {\n  140 |     auto result = Qt::ItemFlags{};\n  141 | \n  142 |     if (!index.parent().isValid()) {\n  143 |         result = QAbstractListModel::flags(index);\n  144 |         return result;\n  145 |     }\n  146 | \n  147 |     result = Qt::ItemIsSelectable | Qt::ItemIsEditable;\n  148 |     return result;\n  149 | }"}]},{"id":"LOGIC_68","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Systray::create() emits `activated(QSystemTrayIcon::ActivationReason::Unknown)` directly (line 142). ownCloudGui connects QSystemTrayIcon::activated to slotTrayClicked, which only acts on Trigger/DoubleClick, so Unknown is a no-op today — but synthesizing the platform 'activated' signal with a fabricated reason is fragile API misuse: any future handler reacting to Unknown (or to the mere emission) will be triggered spuriously at tray creation.","fix":"Use a dedicated internal signal/slot for post-creation initialization rather than re-emitting QSystemTrayIcon::activated with a fake reason.","locations":[{"ref":"src/gui/systray.cpp:142","code":"  142 |     emit activated(QSystemTrayIcon::ActivationReason::Unknown);"}]},{"id":"LOGIC_69","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Activity::fromActivityJson only parses subject_rich when `richSubjectData.size() > 1`. The server format is `[displayString, paramsObject]`; when there are zero parameters the array may legitimately be `[string]` (size 1) or `[string, {}]`. With size 1 the rich subject (and _subjectDisplay) is dropped entirely, so the activity falls back to the raw _subject. Also, `_subjectRichParameters[word]` inside the replacement loop default-inserts an empty RichSubjectParameter when a placeholder name is absent from the params map.","fix":"Handle size >= 1 (use index 0 as display string, treat missing index 1 as empty params), and use contains()/value() instead of operator[] when substi lkNotificationData.messageId = objectIdData.last();\n  148 |             } else {\n  149 |                 qCInfo(lcServerNotification) << \"Replying directly to Talk conversation\" << activity._talkNotificationData.conversationToken\n  150 |                                              << \"will not be possible because the notification doesn't contain the message ID.\";\n  151 |             }\n  152 | \n  153 |             if (activity._subjectRichParameters.contains(\"user\"_L1)) {\n  154 | \n  155 |                 // callback then it is the primary action\n  156 |                 if (activity._objectType == \"call\"_L1) {\n  157 |                     link._primary = false;\n  158 |                 }\n  159 | \n  160 |                 activity._talkNotificationData.userAvatar = accountState->account()->url().toString()\n  161 |                     + QStringLiteral(\"/index.php/avatar/\")\n  162 |                     + activity._subjectRichParameters[\"user\"_L1].value<Activity::RichSubjectParameter>().id\n  163 |                     + QStringLiteral(\"/128\");\n  164 |             }"}]},{"id":"LOGIC_71","type":"logic_error","type_label":"Logic Error","severity":"low","description":"SortedActivityListModel::lessThan returns based only on the LEFT operand's type for the dummy rows: DummyFetchingActivityType left always returns true and DummyMoreActivitiesAvailableType left always returns false, without inspecting the right operand. lessThan(x,x) for a dummy-fetching row returns true, violating the irreflexivity required for a strict weak ordering, which is undefined behavior for std::sort/QSortFilterProxyModel and can cause inconsistent ordering.","fix":"Compare both sides, e.g. handle the case where left and right are the same dummy type (return false) and where the right side is a dummy type, before the unconditional returns.","locations":[{"ref":"src/gui/tray/sortedactivitylistmodel.cpp:56-64","code":"   56 |     const auto leftType = leftActivity._type;\n   57 | \n   58 |     if (leftType == Activity::DummyFetchingActivityType) {\n   59 |         // The fetching activities dummy activity always goes at the top\n   60 |         return true;\n   61 |     } else if (leftType == Activity::DummyMoreActivitiesAvailableType) {\n   62 |         // Likewise the dummy \"more activities available\" activity always goes at the bottom\n   63 |         return false;\n   64 |     }"}]},{"id":"LOGIC_72","type":"logic_error","type_label":"Logic Error","severity":"low","description":"parseResultsForProvider uses `auto &provider = _providers[providerId];` which default-inserts an empty UnifiedSearchProvider into the map when providerId is unknown. The subsequent `if (provider._id.isEmpty() && fetchedMore)` removes it, but for the non-fetchedMore path the code proceeds to populate results using a provider with empty _id/_name/_order, and leaves the spurious empty entry inserted into _providers. Use _providers.find()/contains() and bail out for unknown providers instead of operator[].","fix":"Look up with find()/value() and return early if the provider is not present, rather than inserting via operator[].","locations":[{"ref":"src/gui/tray/unifiedsearchresultslistmodel.cpp:533-543","code":"  533 | void UnifiedSearchResultsListModel::parseResultsForProvider(const QJsonObject &data, const QString &providerId, bool fetchedMore)\n  534 | {\n  535 |     const auto cursor = data.value(\"cursor\"_L1).toInt();\n  536 |     const auto entries = data.value(\"entries\"_L1).toVariant().toList();\n  537 | \n  538 |     auto &provider = _providers[providerId];\n  539 | \n  540 |     if (provider._id.isEmpty() && fetchedMore) {\n  541 |         _providers.remove(providerId);\n  542 |         return;\n  543 |     }"}]},{"id":"LOGIC_73","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Provider page-size is initialized from the cursor value: `if (provider._pageSize == -1) provider._pageSize = cursor;`. The cursor is a pagination offset, not a page size; using it as the page size makes the later `entries.size() < provider._pageSize` heuristic that disables pagination behave incorrectly (e.g. first response cursor of 0 sets pageSize 0; a large cursor inflates pageSize). Likely a copy/paste of the wrong field.","fix":"Set _pageSize from entries.size() (the number of returned entries) on the first page, not from the cursor.","locations":[{"ref":"src/gui/tray/unifiedsearchresultslistmodel.cpp:558-570","code":"  558 |     provider._isPaginated = data.value(\"isPaginated\"_L1).toBool();\n  559 |     provider._cursor = cursor;\n  560 | \n  561 |     if (provider._pageSize == -1) {\n  562 |         provider._pageSize = cursor;\n  563 |     }\n  564 | \n  565 |     if ((provider._pageSize != -1 && entries.size() < provider._pageSize)\n  566 |         || entries.size() < minimumEntresNumberToShowLoadMore) {\n  567 |         // for some providers we are still getting a non-null cursor and isPaginated true even thought\n  568 |         // there are no more results to paginate\n  569 |         provider._isPaginated = false;\n  570 |     }"}]},{"id":"LOGIC_74","type":"logic_error","type_label":"Logic Error","severity":"low","description":"showDesktopNotification(const ActivityList&) computes notificationId as `-static_cast<int>(qHash(subject))` where subject is the translated '%n notification(s)' string. The id therefore depends only on the COUNT of notifications, not their content, so two distinct batches with the same count share an id and the second batch is suppressed by canShowNotification's _notifiedNotifications dedup.","fix":"Derive the dedup id from the actual activity ids/content, not from the localized count string.","locations":[{"ref":"src/gui/tray/usermodel.cpp:396-421","code":"  396 | void User::showDesktopNotification(const ActivityList &activityList)\n  397 | {\n  398 |     const auto subject = tr(\"%n notification(s)\", nullptr, activityList.count());\n  399 |     const auto notificationId = -static_cast<int>(qHash(subject));\n  400 | \n  401 |     if (!canShowNotification(notificationId)) {\n  402 |         return;\n  403 |     }\n  404 | \n  405 |     const auto multipleAccounts = AccountManager::instance()->accounts().count() > 1;\n  406 |     const auto message = multipleAccounts ? activityList.constFirst()._accName : QString();\n  407 | \n  408 |     // Notification ids are uints, which are 4 bytes. Error activities don't have ids, however, so we generate one.\n  409 |     // To avoid possible collisions between the activity ids which are actually the notification ids received from\n  410 |     // the server (which are always positive) and our \"fake\" error activity ids, we assign a negative id to the\n  411 |     // error notification.\n  412 |     //\n  413 |     // To ensure that we can still treat an unsigned int as normal, we use a long, which is 8 bytes.\n  414 | \n  415 |     Logger::instance()->postGuiLog(subject, message);\n  416 | \n  417 |     for (const auto &activity : activityList) {\n  418 |         _notifiedNotifications.insert(activity._id);\n  419 |         _activityModel->addNotificationToActivityList(activity);\n  420 |     }\n  421 | }"}]},{"id":"LOGIC_75","type":"logic_error","type_label":"Logic Error","severity":"low","description":"AbstractNetworkJob::slotTimeout() early-returns when the static enableTimeout flag is false, but does NOT set _timedout and does NOT restart any handling, meaning a genuinely stuck request will hang forever with no timeout. The flag is a global workaround (issue 7184) that, when toggled off, disables ALL job timeouts process-wide, which is a heavy-handed and easily-forgotten kill switch.","fix":"Scope the timeout disable per-job or per-account, or document/guard the global flag's lifetime.","locations":[{"ref":"src/libsync/abstractnetworkjob.cpp:385-395","code":"  385 | void AbstractNetworkJob::slotTimeout()\n  386 | {\n  387 |     // TODO: workaround, find cause of https://github.com/nextcloud/desktop/issues/7184\n  388 |     if (!AbstractNetworkJob::enableTimeout) {\n  389 |         return;\n  390 |     }\n  391 | \n  392 |     _timedout = true;\n  393 |     qCWarning(lcNetworkJob) << \"Network job timeout\" << (reply() ? reply()->request().url() : path());\n  394 |     onTimedOut();\n  395 | }"}]},{"id":"LOGIC_76","type":"logic_error","type_label":"Logic Error","severity":"low","description":"AccessManager authenticationRequired handler sets a random UUID username when the authenticator user is empty, to avoid Qt re-prompting. This injects a bogus credential into the request which the server will reject; the comment intent is to break Qt's retry loop, but for proxies/servers expecting empty-then-real credentials this can cause spurious 401/407 and confuse the auth-type detection logic that inspects WWW-Authenticate.","fix":"Document the workaround clearly and ensure it does not interfere with DetermineAuthTypeJob (which already sets DontAddCredentialsAttribute).","locations":[{"ref":"src/libsync/accessmanager.cpp:36-43","code":"   36 |     connect(this, &QNetworkAccessManager::authenticationRequired, this, [](QNetworkReply *reply, QAuthenticator *authenticator) {\n   37 |         Q_UNUSED(reply)\n   38 | \n   39 |         if (authenticator->user().isEmpty()) {\n   40 |             qCWarning(lcAccessManager) << \"Server requested authentication and we didn't provide a user\";\n   41 |             authenticator->setUser(QUuid::createUuid().toString());\n   42 |         }\n   43 |     });"}]},{"id":"LOGIC_77","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Account::accentColor() casts (1 - getColorDarkness(accentColor)) * 8 to int then squares it. getColorDarkness returns [0,1], so the factor is 0..8; squaring yields up to 64 added to baseAdjustment 125, giving darker(189) max. This is fine for valid colors, but if serverColor() is an invalid QColor (default-constructed from a bad server theming string), getColorDarkness reads red()/green()/blue() of an invalid color (returns -1 each), producing darkness>1 and a negative darknessAdjustment, then darker(negative) which QColor treats as lighter — an unintended inversion for malformed server colors.","fix":"Validate accentColor.isValid() and fall back to a default before computing darkness adjustments.","locations":[{"ref":"src/libsync/account.cpp:252-262","code":"  252 | QColor Account::accentColor() const\n  253 | {\n  254 |     const auto accentColor = serverColor();\n  255 |     constexpr auto effectMultiplier = 8;\n  256 | \n  257 |     auto darknessAdjustment = static_cast<int>((1 - Theme::getColorDarkness(accentColor)) * effectMultiplier);\n  258 |     darknessAdjustment *= darknessAdjustment; // Square the value to pronounce the darkness more in lighter colours\n  259 |     constexpr auto baseAdjustment = 125;\n  260 |     const auto adjusted = Theme::isDarkColor(accentColor) ? accentColor : accentColor.darker(baseAdjustment + darknessAdjustment);\n  261 |     return adjusted;\n  262 | }"}]},{"id":"LOGIC_78","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Account::setUrl() detects public links via regex but on the non-match branch sets _url = url while the match branch sets _url via QUrl::fromUserInput. _userVisibleUrl is always set to the raw url including, for public links, the embedded share token and (set) username — leaking the share token into the user-visible URL used by deprecatedPrivateLinkUrl and display paths.","fix":"Set _userVisibleUrl to the sanitized base URL for public links rather than the full token-bearing input.","locations":[{"ref":"src/libsync/account.cpp:561-576","code":"  561 | void Account::setUrl(const QUrl &url)\n  562 | {\n  563 |     const QRegularExpression discoverPublicLinks(R\"(((https|http)://[^/]*).*/s/([^/]*)$)\");\n  564 |     const auto isPublicLink = discoverPublicLinks.match(url.toString());\n  565 |     if (isPublicLink.hasMatch()) {\n  566 |         _url = QUrl::fromUserInput(isPublicLink.captured(1));\n  567 |         _url.setUserName(isPublicLink.captured(3));\n  568 |         setDavUser(isPublicLink.captured(3));\n  569 |         _isPublicLink = true;\n  570 |         _publicShareLinkUrl = url;\n  571 |     } else {\n  572 |         _url = url;\n  573 |     }\n  574 | \n  575 |     _userVisibleUrl = url;\n  576 | }"}]},{"id":"LOGIC_79","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Account::serverVersionInt() parses serverVersion().split('.') and feeds components.value(0/1/2).toInt() into makeServerVersion. A version string with extra suffix like '28.0.1 (build x)' makes the patch component '1 (build x)'.toInt() return 0 silently, and any non-numeric major yields 0 making the client treat the server as undetected/oldest. No validation/logging of malformed version strings.","fix":"Use QVersionNumber::fromString (which stops at the first non-numeric) or validate components and log on failure.","locations":[{"ref":"src/libsync/account.cpp:792-799","code":"  792 | int Account::serverVersionInt() const\n  793 | {\n  794 |     // FIXME: Use Qt 5.5 QVersionNumber\n  795 |     const auto components = serverVersion().split('.');\n  796 |     return makeServerVersion(components.value(0).toInt(),\n  797 |         components.value(1).toInt(),\n  798 |         components.value(2).toInt());\n  799 | }"}]},{"id":"LOGIC_80","type":"logic_error","type_label":"Logic Error","severity":"low","description":"BulkPropagatorDownloadJob::addDownloadItem asserts the item is a directory OR a virtual file, but the body then warns and returns for directories (and any non-virtual file). Yet start() Q_ASSERTs fileToDownload->_type == ItemTypeVirtualFile for every queued item. ItemTypeVirtualFileDehydration items are accepted by addDownloadItem but would trip the assert in start(). The accepted-type set is inconsistent between the two methods.","fix":"Make the accepted item types consistent: either reject dehydration items in addDownloadItem, or relax the Q_ASSERT in start() to allow the same types addDownloadItem allows.","locations":[{"ref":"src/libsync/bulkpropagatordownloadjob.cpp:30-38","code":"   30 | void BulkPropagatorDownloadJob::addDownloadItem(const SyncFileItemPtr &item)\n   31 | {\n   32 |     Q_ASSERT(item->isDirectory() || item->_type == ItemTypeVirtualFileDehydration || item->_type == ItemTypeVirtualFile);\n   33 |     if (item->isDirectory() || (item->_type != ItemTypeVirtualFileDehydration && item->_type != ItemTypeVirtualFile)) {\n   34 |         qCWarning(lcBulkPropagatorDownloadJob) << \"Failed to process bulk download for a non-virtual file\" << item->_originalFile;\n   35 |         return;\n   36 |     }\n   37 |     _filesToDownload.push_back(item);\n   38 | }"},{"ref":"src/libsync/bulkpropagatordownloadjob.cpp:72-73","code":"   72 |     for (const auto &fileToDownload : std::as_const(_filesToDownload)) {\n   73 |         Q_ASSERT(fileToDownload->_type == ItemTypeVirtualFile);"}]},{"id":"LOGIC_81","type":"logic_error","type_label":"Logic Error","severity":"low","description":"BulkPropagatorDownloadJob::finalizeOneFile always emits itemCompleted with ErrorCategory::GenericError, including for successfully created placeholders (status Success). Same category-mislabeling problem as in BulkPropagatorJob::finalize; success cases should not be tagged GenericError.","fix":"Choose the ErrorCategory based on the item status (NoError for Success).","locations":[{"ref":"src/libsync/bulkpropagatordownloadjob.cpp:60-63","code":"   60 | void BulkPropagatorDownloadJob::finalizeOneFile(const SyncFileItemPtr &file)\n   61 | {\n   62 |     emit propagator()->itemCompleted(file, ErrorCategory::GenericError);\n   63 | }"}]},{"id":"LOGIC_82","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Capabilities::clientSideEncryptionAvailable() requires (major >= 1 && minor >= 0) so a future API version like 2.0 with minor==0 still passes, but a version like 1.5 also passes while 0.9 fails as intended; however 'minor >= 0' is always true for unsigned-style parsing and the real intent is 'major >= 1'. More importantly, if api-version is e.g. '2' (no minor), splittedVersion.size()<=1 makes minor=0 with ok=false handling — but the code sets minor only when size>1, otherwise minor stays 0 and ok stays false, causing the function to return false for a valid '2' version.","fix":"Treat a missing minor component as minor=0 with ok=true; only fail when a present minor component fails to parse.","locations":[{"ref":"src/libsync/capabilities.cpp:148-159","code":"  148 |     ok = false;\n  149 |     const auto minor = splittedVersion.size() > 1 ? splittedVersion.at(1).toInt(&ok) : 0;\n  150 |     if (!ok) {\n  151 |         qCWarning(lcServerCapabilities) << \"Didn't understand version scheme (minor), E2EE disabled\" << version;\n  152 |         return false;\n  153 |     }\n  154 | \n  155 |     const auto capabilityAvailable = (major >= 1 && minor >= 0);\n  156 |     if (!capabilityAvailable) {\n  157 |         qCInfo(lcServerCapabilities) << \"Incompatible E2EE API version:\" << version;\n  158 |     }\n  159 |     return capabilityAvailable;"}]},{"id":"LOGIC_83","type":"logic_error","type_label":"Logic Error","severity":"low","description":"SystemProxyRunnable::run() and the DefaultProxy lookup discard all proxies beyond the first. proxyForQuery/systemProxyForQuery can legitimately return multiple proxies (e.g. SOCKS + HTTP); only the first is ever applied, so non-primary system proxies are silently ignored. The FIXME comment acknowledges this but it remains a functional limitation.","fix":"Iterate the returned proxies and pick the most appropriate one, or document why only the first is acceptable.","locations":[{"ref":"src/libsync/clientproxy.cpp:168-179","code":"  168 | void SystemProxyRunnable::run()\n  169 | {\n  170 |     qRegisterMetaType<QNetworkProxy>(\"QNetworkProxy\");\n  171 |     QList<QNetworkProxy> proxies = QNetworkProxyFactory::systemProxyForQuery(QNetworkProxyQuery(_url));\n  172 | \n  173 |     if (proxies.isEmpty()) {\n  174 |         emit systemProxyLookedUp(QNetworkProxy(QNetworkProxy::NoProxy));\n  175 |     } else {\n  176 |         emit systemProxyLookedUp(proxies.first());\n  177 |         // FIXME Would we really ever return more?\n  178 |     }\n  179 | }"}]},{"id":"LOGIC_84","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ConfigFile::setupDefaultExcludeFilePaths() logs 'Migrating system list <legacyList> to user list' but uses legacyList in the message while actually copying systemList (QFile::copy(systemList, userList)). Misleading log: it reports the wrong source file when migrating from the system list.","fix":"Log systemList instead of legacyList in the system-list migration branch.","locations":[{"ref":"src/libsync/configfile.cpp:1330-1332","code":" 1330 |         } else if (QFile::copy(systemList, userList)) {\n 1331 |             qCInfo(lcConfigFile) << \"Migrating system list\" << legacyList << \"to user list\" << userList;\n 1332 |         }"}]},{"id":"LOGIC_85","type":"logic_error","type_label":"Logic Error","severity":"low","description":"CookieJar operator>>(): after parsing each stored cookie blob it does 'if (stream.atEnd()) break;' at the end of the loop body. If the last entry is consumed exactly when count is reached but stream still has trailing bytes, or conversely if atEnd() triggers early due to a partially corrupt blob, fewer than 'count' cookies are restored silently. The break also makes the count value largely redundant and can mask truncated files.","fix":"Rely on count for the loop bound and validate stream status explicitly rather than breaking on atEnd mid-iteration.","locations":[{"ref":"src/libsync/cookiejar.cpp:45-59","code":"   45 |     quint32 count = 0;\n   46 |     stream >> count;\n   47 |     for (quint32 i = 0; i < count; ++i) {\n   48 |         QByteArray value;\n   49 |         stream >> value;\n   50 |         QList<QNetworkCookie> newCookies = QNetworkCookie::parseCookies(value);\n   51 |         if (newCookies.count() == 0 && value.length() != 0) {\n   52 |             qCWarning(lcCookieJar) << \"CookieJar: Unable to parse saved cookie:\" << value;\n   53 |         }\n   54 |         for (int j = 0; j < newCookies.count(); ++j)\n   55 |             list.append(newCookies.at(j));\n   56 |         if (stream.atEnd())\n   57 |             break;\n   58 |     }\n   59 |     return stream;"}]},{"id":"LOGIC_86","type":"logic_error","type_label":"Logic Error","severity":"low","description":"queryEditorsKeepingFileBusy() hardcodes appending the literal 'PowerPDF.exe' to the matched-editors list whenever any editor matched, in addition to the actual detected process names. This produces a misleading editor name in the user-facing error string ('Could not upload file, because it is open in \"...PowerPDF.exe\"') that may not be the real process, and couples generic logic to one specific product.","fix":"Remove the unconditional push_back of 'PowerPDF.exe' (it is already covered by editorNamesForDelayedUpload matching), or only append it when actually detected.","locations":[{"ref":"src/libsync/discovery.cpp:2141-2143","code":" 2141 |     if (!matchingEditorsKeepingFileBusy.isEmpty()) {\n 2142 |         matchingEditorsKeepingFileBusy.push_back(\"PowerPDF.exe\");\n 2143 |     }"}]},{"id":"LOGIC_87","type":"logic_error","type_label":"Logic Error","severity":"low","description":"DiscoverySingleDirectoryJob::directoryListingIteratedSlot parses the first-directory 'size' property with QString::toInt() into the int64_t _size member, truncating folder sizes above 2GiB. Although _size is only used for the optional folder-size-limit feature, the 32-bit parse can misreport large folders as small and bypass the big-folder confirmation.","fix":"Parse with toLongLong() to match the int64_t _size field.","locations":[{"ref":"src/libsync/discoveryphase.cpp:525-527","code":"  525 |         if (map.contains(\"size\"_L1)) {\n  526 |             _size = map.value(\"size\"_L1).toInt();\n  527 |         }"}]},{"id":"LOGIC_88","type":"logic_error","type_label":"Logic Error","severity":"low","description":"lsJobFinishedWithErrorSlot() builds an error string with a stray trailing curly closing quote character: tr(\"...reach out to your server administrator.”\") ends with U+201D (right double quotation mark) plus a closing paren, an obvious typo that leaks a stray '”' into the user-visible message.","fix":"Remove the stray U+201D character at the end of the translated string.","locations":[{"ref":"src/libsync/discoveryphase.cpp:603","code":"  603 |         errorString = tr(\"The server returned an unexpected response that couldn’t be read. Please reach out to your server administrator.”\");"}]},{"id":"LOGIC_89","type":"logic_error","type_label":"Logic Error","severity":"low","description":"EncryptedFolderMetadataHandler::slotMetadataReceived() unconditionally sets _fetchMode = FetchMode::NonEmptyMetadata at the top. When called via slotMetadataReceivedError for AllowEmptyMetadata (404) it re-enters here and overwrites the mode; if the FolderMetadata setup later fails the AllowEmptyMetadata intent is lost for any subsequent retry logic relying on _fetchMode.","fix":"Do not mutate _fetchMode inside slotMetadataReceived, or restore it; track the empty-metadata case via the already-existing _isNewMetadataCreated flag only.","locations":[{"ref":"src/libsync/encryptedfoldermetadatahandler.cpp:163-196","code":"  163 | void EncryptedFolderMetadataHandler::slotMetadataReceived(const QJsonDocument &json, int statusCode)\n  164 | {\n  165 |     qCDebug(lcFetchAndUploadE2eeFolderMetadataJob) << \"Metadata Received, parsing it and decrypting\" << json.toVariant();\n  166 | \n  167 |     const auto job = qobject_cast<GetMetadataApiJob *>(sender());\n  168 |     Q_ASSERT(job);\n  169 |     if (!job) {\n  170 |         qCDebug(lcFetchAndUploadE2eeFolderMetadataJob) << \"slotMetadataReceived must be called from GetMetadataApiJob's signal\";\n  171 |         emit fetchFinished(statusCode, tr(\"Error fetching metadata.\"));\n  172 |         return;\n  173 |     }\n  174 | \n  175 |     _fetchMode = FetchMode::NonEmptyMetadata;\n  176 | \n  177 |     if (statusCode != 200 && statusCode != 404) {\n  178 |         // neither successfully fetched, nor a folder without a metadata, fail further logic\n  179 |         qCWarning(lcFetchAndUploadE2eeFolderMetadataJob) << \"Error fetching metadata for folder\" << _folderFullRemotePath;\n  180 |         emit fetchFinished(statusCode, tr(\"Error fetching metadata.\"));\n  181 |         return;\n  182 |     }\n  183 | \n  184 |     const auto rawMetadata = statusCode == 404\n  185 |         ? QByteArray{} : json.toJson(QJsonDocument::Compact);\n  186 |     const auto metadata(QSharedPointer<FolderMetadata>::create(_account, _remoteFolderRoot, rawMetadata, _rootEncryptedFolderInfo, job->signature()));\n  187 |     connect(metadata.data(), &FolderMetadata::setupComplete, this, [this, metadata] {\n  188 |         if (!metadata->isValid()) {\n  189 |             qCWarning(lcFetchAndUploadE2eeFolderMetadataJob) << \"Error parsing or decrypting metadata for folder\" << _folderFullRemotePath;\n  190 |             emit fetchFinished(-1, tr(\"Error parsing or decrypting metadata.\"));\n  191 |             return;\n  192 |         }\n  193 |         _folderMetadata = metadata;\n  194 |         emit fetchFinished(200);\n  195 |     });\n  196 | }"}]},{"id":"LOGIC_90","type":"logic_error","type_label":"Logic Error","severity":"low","description":"EncryptFolderJob::uploadMetadata() builds the empty FolderMetadata and connects to setupComplete, but never handles the case where the FolderMetadata setup fails asynchronously without ever emitting setupComplete (e.g. when startFetchRootE2eeFolderMetadata path is taken and fails). There is also no timeout, so a folder lock could be left held / the job stalls silently.","fix":"Ensure FolderMetadata always emits setupComplete (even on failure, leaving isValid()==false), or add a failure/timeout path in uploadMetadata().","locations":[{"ref":"src/libsync/encryptfolderjob.cpp:96-130","code":"   96 | void EncryptFolderJob::uploadMetadata()\n   97 | {\n   98 |     const auto currentPath = !_pathNonEncrypted.isEmpty() ? _pathNonEncrypted : _path;\n   99 |     const auto currentPathRelative = Utility::fullRemotePathToRemoteSyncRootRelative(currentPath, _remoteSyncRootPath);\n  100 |     SyncJournalFileRecord rec;\n  101 |     if (!_journal->getRootE2eFolderRecord(currentPathRelative, &rec)) {\n  102 |         emit finished(Error, EncryptionStatusEnums::ItemEncryptionStatus::NotEncrypted);\n  103 |         return;\n  104 |     }\n  105 | \n  106 |     const auto emptyMetadata(QSharedPointer<FolderMetadata>::create(\n  107 |         _account,\n  108 |         _remoteSyncRootPath,\n  109 |         QByteArray{},\n  110 |         RootEncryptedFolderInfo(RootEncryptedFolderInfo::createRootPath(currentPathRelative, rec.path())),\n  111 |         QByteArray{}));\n  112 | \n  113 |     connect(emptyMetadata.data(), &FolderMetadata::setupComplete, this, [this, emptyMetadata] {\n  114 |         const auto encryptedMetadata = !emptyMetadata->isValid() ? QByteArray{} : emptyMetadata->encryptedMetadata();\n  115 |         if (encryptedMetadata.isEmpty()) {\n  116 |             // TODO: Mark the folder as unencrypted as the metadata generation failed.\n  117 |             _errorString =\n  118 |                 tr(\"Could not generate the metadata for encryption, Unlocking the folder.\\n\"\n  119 |                    \"This can be an issue with your OpenSSL libraries.\");\n  120 |             emit finished(Error, EncryptionStatusEnums::ItemEncryptionStatus::NotEncrypted);\n  121 |             return;\n  122 |         }\n  123 |         _encryptedFolderMetadataHandler->setPrefetchedMetadataAndId(emptyMetadata, _fileId);\n  124 |         connect(_encryptedFolderMetadataHandler.data(),\n  125 |                 &EncryptedFolderMetadataHandler::uploadFinished,\n  126 |                 this,\n  127 |                 &EncryptFolderJob::slotUploadMetadataFinished);\n  128 |         _encryptedFolderMetadataHandler->uploadMetadata();\n  129 |     });\n  130 | }"}]},{"id":"LOGIC_91","type":"logic_error","type_label":"Logic Error","severity":"low","description":"setupExistingMetadataLegacy() applies QByteArray::fromBase64 three times for the 1.1/1.2 metadata key and twice for the 1.0 key 'to stick with the old wrong way'. fromBase64 silently ignores invalid input, so a corrupted or attacker-truncated metadata key decodes to a shorter/empty key without any error, and the resulting (possibly empty) key is then used as the AES key. Combined with verifyMetadataKey returning true for legacy versions, there is no integrity check on the legacy metadata key length.","fix":"Validate the decoded metadata key length (must equal metadataKeySize) before using it, and reject metadata when the decoded key is empty/short.","locations":[{"ref":"src/libsync/foldermetadata.cpp:280-318","code":"  280 |     const auto metadataKeyFromJson = fullMetaDataObj[metadataKeyKey].toString().toLocal8Bit();\n  281 |     if (!metadataKeyFromJson.isEmpty()) {\n  282 |         // parse version 1.1 and 1.2 (both must have a single \"metadataKey\"), not \"metadataKeys\" as 1.0\n  283 |         const auto decryptedMetadataKeyBase64 = decryptDataWithPrivateKey(metadataKeyFromJson, _account->e2e()->certificateSha256Fingerprint());\n  284 |         if (!decryptedMetadataKeyBase64.isEmpty()) {\n  285 |             // fromBase64() multiple times just to stick with the old wrong way\n  286 |             _binaryMetadataKeyForDecryption = QByteArray::fromBase64(QByteArray::fromBase64(QByteArray::fromBase64(decryptedMetadataKeyBase64)));\n  287 |         }\n  288 |     }\n  289 | \n  290 |     if (binaryMetadataKeyForDecryption().isEmpty() && _existingMetadataVersion < MetadataVersion::Version1_2) {\n  291 |         // parse version 1.0 (before security-vulnerability fix for metadata keys was released\n  292 |         qCDebug(lcCseMetadata()) << \"Migrating from\" << _existingMetadataVersion << \"to\"\n  293 |                                  << latestSupportedMetadataVersion();\n  294 |         const auto metadataKeys = fullMetaDataObj[\"metadataKeys\"].toObject();\n  295 |         if (metadataKeys.isEmpty()) {\n  296 |             qCWarning(lcCseMetadata()) << \"Could not migrate. No metadata keys found!\";\n  297 |             _account->reportClientStatus(OCC::ClientStatusReportingStatus::E2EeError_GeneralError);\n  298 |             return;\n  299 |         }\n  300 | \n  301 |         const auto &allKeys = metadataKeys.keys();\n  302 |         const auto &lastMetadataKeyFromJson = allKeys.last().toLocal8Bit();\n  303 |         if (!lastMetadataKeyFromJson.isEmpty()) {\n  304 |             const auto lastMetadataKeyValueFromJson = metadataKeys.value(lastMetadataKeyFromJson).toString().toLocal8Bit();\n  305 |             if (!lastMetadataKeyValueFromJson.isEmpty()) {\n  306 |                 const auto lastMetadataKeyValueFromJsonBase64 = decryptDataWithPrivateKey(lastMetadataKeyValueFromJson, _account->e2e()->certificateSha256Fingerprint());\n  307 |                 if (!lastMetadataKeyValueFromJsonBase64.isEmpty()) {\n  308 |                     _binaryMetadataKeyForDecryption = QByteArray::fromBase64(QByteArray::fromBase64(lastMetadataKeyValueFromJsonBase64));\n  309 |                 }\n  310 |             }\n  311 |         }\n  312 |     }\n  313 | \n  314 |     if (binaryMetadataKeyForDecryption().isEmpty()) {\n  315 |         qCWarning(lcCseMetadata()) << \"Could not setup existing metadata with missing metadataKeys!\";\n  316 |         _account->reportClientStatus(OCC::ClientStatusReportingStatus::E2EeError_GeneralError);\n  317 |         return;\n  318 |     }"}]},{"id":"LOGIC_92","type":"logic_error","type_label":"Logic Error","severity":"low","description":"LocalDiscoveryTracker::slotItemCompleted erases successful items from _previousLocalDiscoveryPaths but inserts failed items into _localDiscoveryPaths. For a successful RENAME it erases both _file and _renameTarget from the previous set, but a failed item only inserts item->_file (not _renameTarget). A failed rename therefore will not schedule rediscovery of the rename target path, so a partially-applied rename's destination may not be rechecked next sync.","fix":"On failure also insert item->_renameTarget into _localDiscoveryPaths when it is non-empty.","locations":[{"ref":"src/libsync/localdiscoverytracker.cpp:50-72","code":"   50 | void LocalDiscoveryTracker::slotItemCompleted(const SyncFileItemPtr &item)\n   51 | {\n   52 |     // For successes, we want to wipe the file from the list to ensure we don't\n   53 |     // rediscover it even if this overall sync fails.\n   54 |     //\n   55 |     // For failures, we want to add the file to the list so the next sync\n   56 |     // will be able to retry it.\n   57 |     if (item->_status == SyncFileItem::Success\n   58 |         || item->_status == SyncFileItem::FileIgnored\n   59 |         || item->_status == SyncFileItem::Restoration\n   60 |         || item->_status == SyncFileItem::Conflict\n   61 |         || (item->_status == SyncFileItem::NoStatus\n   62 |                && (item->_instruction == CSYNC_INSTRUCTION_NONE\n   63 |                       || item->_instruction == CSYNC_INSTRUCTION_UPDATE_METADATA))) {\n   64 |         if (_previousLocalDiscoveryPaths.erase(item->_file.toUtf8()))\n   65 |             qCDebug(lcLocalDiscoveryTracker) << \"wiped successful item\" << item->_file;\n   66 |         if (!item->_renameTarget.isEmpty() && _previousLocalDiscoveryPaths.erase(item->_renameTarget.toUtf8()))\n   67 |             qCDebug(lcLocalDiscoveryTracker) << \"wiped successful item\" << item->_renameTarget;\n   68 |     } else {\n   69 |         _localDiscoveryPaths.insert(item->_file.toUtf8());\n   70 |         qCWarning(lcLocalDiscoveryTracker) << \"inserted error item\" << item->_file;\n   71 |     }\n   72 | }"}]},{"id":"LOGIC_93","type":"logic_error","type_label":"Logic Error","severity":"low","description":"LsColJob::propertyMapToRemoteInfo() asserts Q_ASSERT(date.isValid()) on the parsed getlastmodified value coming straight from the server. A malformed/absent date from a misbehaving server triggers an assertion abort in debug builds; in release the assert is a no-op but modtime silently stays 0. Server-controlled input should not drive an assertion.","fix":"Drop the assert and handle invalid dates gracefully (already partially handled by the toSecsSinceEpoch>0 check).","locations":[{"ref":"src/libsync/networkjobs.cpp:386-393","code":"  386 |         } else if (property == \"getlastmodified\"_L1) {\n  387 |             value.replace(\"GMT\", \"+0000\");\n  388 |             const auto date = QDateTime::fromString(value, Qt::RFC2822Date);\n  389 |             Q_ASSERT(date.isValid());\n  390 |             result.modtime = 0;\n  391 |             if (date.toSecsSinceEpoch() > 0) {\n  392 |                 result.modtime = date.toSecsSinceEpoch();\n  393 |             }"}]},{"id":"LOGIC_94","type":"logic_error","type_label":"Logic Error","severity":"low","description":"clearAtEndOfToTimestamp() week handling computes days = Qt::Sunday - QDate::currentDate().dayOfWeek() then addDays(days + 1). Qt::Sunday is 7 and dayOfWeek() returns 1..7 (Mon..Sun). On Sunday this gives days=0, addDays(1)=next Monday; on Monday days=6, addDays(7)=next Monday. The 'end of week' therefore lands on the Monday after next week's start rather than the end of the current week, an off-by-one in the clear-status timing.","fix":"Recompute to target the intended end-of-week boundary (e.g. days to upcoming Sunday/Monday) without the extra +1.","locations":[{"ref":"src/libsync/ocsuserstatusconnector.cpp:110-113","code":"  110 |     } else if (clearAt._endof == \"week\"_L1) {\n  111 |         const auto days = Qt::Sunday - QDate::currentDate().dayOfWeek();\n  112 |         return QDate::currentDate().addDays(days + 1).startOfDay().toSecsSinceEpoch();\n  113 |     }"}]},{"id":"LOGIC_95","type":"logic_error","type_label":"Logic Error","severity":"low","description":"PropagatorCompositeJob::slotSubJobFinished records _hasError = status for SoftError as well as hard errors, then finalize() emits Success only if _hasError==NoStatus. A transient SoftError on one subjob thus causes the whole composite (e.g. a whole directory) to report failure status, which can prevent the directory etag update even though the rest of the directory propagated fine. SoftError is documented elsewhere as 'more like an information'.","fix":"Reconsider whether SoftError should propagate as a composite failure; if a SoftError should not block the directory etag update, exclude it from the _hasError set.","locations":[{"ref":"src/libsync/owncloudpropagator.cpp:1332-1358","code":" 1332 |     // Any sub job error will cause the whole composite to fail. This is important\n 1333 |     // for knowing whether to update the etag in PropagateDirectory, for example.\n 1334 |     if (status == SyncFileItem::FatalError\n 1335 |         || status == SyncFileItem::NormalError\n 1336 |         || status == SyncFileItem::SoftError\n 1337 |         || status == SyncFileItem::DetailError\n 1338 |         || status == SyncFileItem::BlacklistedError) {\n 1339 |         _hasError = status;\n 1340 |     }\n 1341 | \n 1342 |     if (_jobsToDo.isEmpty() && _tasksToDo.isEmpty() && _runningJobs.isEmpty()) {\n 1343 |         finalize();\n 1344 |     } else {\n 1345 |         propagator()->scheduleNextJob();\n 1346 |     }\n 1347 | }\n 1348 | \n 1349 | void PropagatorCompositeJob::finalize()\n 1350 | {\n 1351 |     // The propagator will do parallel scheduling and this could be posted\n 1352 |     // multiple times on the event loop, ignore the duplicate calls.\n 1353 |     if (_state == Finished) {\n 1354 |         return;\n 1355 |     }\n 1356 | \n 1357 |     _state = Finished;\n 1358 |     emit finished(_hasError == SyncFileItem::NoStatus ? SyncFileItem::Success : _hasError);"}]},{"id":"LOGIC_96","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In conflictChecksumComputed, after FileSystem::getModTime, the code does Q_ASSERT(_item->_modtime > 0) followed by `if (_item->_modtime <= 0) { qCWarning(...); return; }`. The early return on invalid modtime leaves the download silently aborted with no done() call: the PropagateItemJob never reports completion, so the item can hang in a non-finished state for this code path (no done() and no startDownload()).","fix":"Call done() with an appropriate error status before returning when the freshly-read modtime is invalid, instead of returning without finishing the job.","locations":[{"ref":"src/libsync/propagatedownload.cpp:615-622","code":"  615 |         _item->_modtime = FileSystem::getModTime(fn);\n  616 |         Q_ASSERT(_item->_modtime > 0);\n  617 |         if (_item->_modtime <= 0) {\n  618 |             qCWarning(lcPropagateDownload()) << \"invalid modified time\" << _item->_file << _item->_modtime;\n  619 |             return;\n  620 |         }\n  621 |         updateMetadata(/*isConflict=*/false);\n  622 |         return;"}]},{"id":"LOGIC_97","type":"logic_error","type_label":"Logic Error","severity":"low","description":"UploadDevice::open() rejects WriteOnly but then computes the file size and opens for shared read regardless of the requested mode (it never validates ReadOnly). Callers always pass ReadOnly, but the function silently accepts any non-WriteOnly mode (e.g. ReadWrite) even though writeData() asserts false. The mode contract is only half-enforced.","fix":"Validate that the mode is exactly ReadOnly (reject anything with WriteOnly bit set, which it does) and document that only ReadOnly is supported; or assert on unexpected modes.","locations":[{"ref":"src/libsync/propagateupload.cpp:491-510","code":"  491 | bool UploadDevice::open(QIODevice::OpenMode mode)\n  492 | {\n  493 |     if (mode & QIODevice::WriteOnly)\n  494 |         return false;\n  495 | \n  496 |     // Get the file size now: _file.fileName() is no longer reliable\n  497 |     // on all platforms after openAndSeekFileSharedRead().\n  498 |     auto fileDiskSize = FileSystem::getSize(_file.fileName());\n  499 | \n  500 |     QString openError;\n  501 |     if (!FileSystem::openAndSeekFileSharedRead(&_file, &openError, _start)) {\n  502 |         setErrorString(openError);\n  503 |         return false;\n  504 |     }\n  505 | \n  506 |     _size = qBound(0ll, _size, fileDiskSize - _start);\n  507 |     _read = 0;\n  508 | \n  509 |     return QIODevice::open(mode);\n  510 | }"}]},{"id":"LOGIC_98","type":"logic_error","type_label":"Logic Error","severity":"low","description":"commonErrorHandling() updates the folder-quota guess to `_fileToUpload._size - 1` when a 507 is received. If _fileToUpload._size is 0 this stores -1 (which then compares as a smaller quota than any real size) and for size 0 the subtraction underflows the intended semantics. The '-1' hack to make the next size > quotaGuess is fragile when size is 0.","fix":"Guard against size 0 (store 0, not -1) or use an explicit `quotaGuess = qMax(0, _fileToUpload._size - 1)` style clamp.","locations":[{"ref":"src/libsync/propagateupload.cpp:708-724","code":"  708 |     if (_item->_httpErrorCode == 507) {\n  709 |         // Update the quota expectation\n  710 |         /* store the quota for the real local file using the information\n  711 |          * on the file to upload, that could have been modified by\n  712 |          * filters or something. */\n  713 |         const auto path = QFileInfo(_item->_file).path();\n  714 |         auto quotaIt = propagator()->_folderQuota.find(path);\n  715 |         if (quotaIt != propagator()->_folderQuota.end()) {\n
