missions,\n  462 |     const QString &password)\n  463 | {\n  464 |     auto job = new OcsShareJob(_account);\n  465 |     connect(job, &OcsJob::ocsError, this, &ShareManager::slotOcsError);\n  466 |     connect(job, &OcsShareJob::shareJobFinished, this,\n  467 |         [=, this](const QJsonDocument &reply) {\n  468 |             // Find existing share permissions (if this was shared with us)\n  469 |             Share::Permissions existingPermissions = SharePermissionAll;\n  470 |             const auto &replyObject = reply.object();\n  471 |             const auto &ocsObject = replyObject[\"ocs\"_L1].toObject();\n  472 |             const auto &dataArray = ocsObject[\"data\"_L1].toArray();\n  473 |             for (const auto &element : dataArray) {\n  474 |                 auto map = element.toObject();\n  475 |                 if (map[\"file_target\"_L1] == path)\n  476 |                     existingPermissions = Share::Permissions(map[\"permissions\"_L1].toInt());\n  477 |             }\n  478 | \n  479 |             // Limit the permissions we request for a share to the ones the item\n  480 |             // was shared with initially.\n  481 |             auto validPermissions = desiredPermissions;\n  482 |             if (validPermissions == SharePermissionAll) {\n  483 |                 validPermissions = existingPermissions;\n  484 |             }\n  485 |             if (existingPermissions != SharePermissionAll) {\n  486 |                 validPermissions &= existingPermissions;\n  487 |             }\n  488 | \n  489 |             auto *job = new OcsShareJob(_account);\n  490 |             connect(job, &OcsShareJob::shareJobFinished, this, &ShareManager::slotShareCreated);\n  491 |             connect(job, &OcsJob::ocsError, this, &ShareManager::slotOcsError);\n  492 |             job->createShare(path, shareType, shareWith, validPermissions, password);\n  493 |         });\n  494 |     job->getSharedWithMe();\n  495 | }"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"setSearchTerm always performs a beginResetModel/endResetModel to clear results on every keystroke that changes the term (and startSearch likewise resets), in addition to the 800ms debounce timer. Combined with re-fetching providers and per-provider jobs, every term change tears down and rebuilds the whole model. For incremental typing this causes repeated full model resets and view rebuilds.","fix":"Reset results once when the debounced search actually starts rather than on every intermediate term change.","locations":[{"ref":"src/gui/tray/unifiedsearchresultslistmodel.cpp:317-322","code":"  317 |     if (!_results.isEmpty()) {\n  318 |         beginResetModel();\n  319 |         _results.clear();\n  320 |         endResetModel();\n  321 |     }\n  322 | }"},{"ref":"src/gui/tray/unifiedsearchresultslistmodel.cpp:493-497","code":"  493 |     if (!_results.isEmpty()) {\n  494 |         beginResetModel();\n  495 |         _results.clear();\n  496 |         endResetModel();\n  497 |     }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"Capabilities accessors call _capabilities[\"files_sharing\"].toMap() (and similar nested .toMap() chains) repeatedly, each creating a new QMap copy of the whole sub-object on every call. shareEmailPasswordEnabled/Enforced and the many sharePublicLink* methods each rebuild 2-4 nested maps per invocation; these are called frequently from UI code.","fix":"Cache parsed sub-maps, or fetch the sub-map once into a local before chaining.","locations":[{"ref":"src/libsync/capabilities.cpp:36-123","code":"   36 | bool Capabilities::shareEmailPasswordEnabled() const\n   37 | {\n   38 |     return _capabilities[\"files_sharing\"].toMap()[\"sharebymail\"].toMap()[\"password\"].toMap()[\"enabled\"].toBool();\n   39 | }\n   40 | \n   41 | bool Capabilities::shareEmailPasswordEnforced() const\n   42 | {\n   43 |     return _capabilities[\" s once per directory during discovery. For deep trees with many directories this repeats an identical DB query that only needs to be evaluated once per sync.","fix":"Compute _noCaseConflictRecordsInDb once when the discovery phase starts (root job) rather than in every ProcessDirectoryJob::start().","locations":[{"ref":"src/libsync/discovery.cpp:77-81","code":"   77 | void ProcessDirectoryJob::start()\n   78 | {\n   79 |     qCInfo(lcDisco) << \"STARTING\" << _currentFolder._server << _queryServer << _currentFolder._local << _queryLocal;\n   80 | \n   81 |     _discoveryData->_noCaseConflictRecordsInDb = _discoveryData->_statedb->caseClashConflictRecordPaths().isEmpty();"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"DiscoveryPhase::recursiveCheckForDeletedParents() calls _deletedItem.keys() (allocating a full QList copy of all keys) and join()s them into a string on every invocation purely for debug logging, even when the debug category is disabled. recursiveCheckForDeletedParents is called per-file during discovery, so this is a per-item allocation of the entire deleted-items key set plus a string join that runs regardless of logging level.","fix":"Guard the keys()/join() behind lcDiscovery().isDebugEnabled(), and use _deletedItem.contains()/find() directly without materializing all keys.","locations":[{"ref":"src/libsync/discoveryphase.cpp:221-246","code":"  221 | bool DiscoveryPhase::recursiveCheckForDeletedParents(const QString &itemPath) const\n  222 | {\n  223 |     const auto &allKeys = _deletedItem.keys();\n  224 |     qCDebug(lcDiscovery()) << allKeys.join(\", \");\n  225 | \n  226 |     auto result = false;\n  227 |     const auto &pathElements = itemPath.split('/');\n  228 |     auto currentParentFolder = QString{};\n  229 |     for (const auto &onePathComponent : pathElements) {\n  230 |         if (!currentParentFolder.isEmpty()) {\n  231 |             currentParentFolder += '/';\n  232 |         }\n  233 |         currentParentFolder += onePathComponent;\n  234 | \n  235 |         qCDebug(lcDiscovery()) << \"checks\" << currentParentFolder << \"for\" << allKeys.join(\", \");\n  236 |         if (_deletedItem.find(currentParentFolder) == _deletedItem.end()) {\n  237 |             continue;\n  238 |         }\n  239 | \n  240 |         qCDebug(lcDiscovery()) << \"deleted parent found\";\n  241 |         result = true;\n  242 |         break;\n  243 |     }\n  244 | \n  245 |     return result;\n  246 | }"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"SyncEngine::slotItemDiscovered inserts each discovered item into _syncItems using std::lower_bound + vector insert (O(n) shift per insert, O(n^2) total) to keep the vector sorted. For syncs with very large item counts this is a notable cost; items could be appended and sorted once, or a different container used.","fix":"Append items and sort once after discovery (the code already asserts is_sorted later), or use a container with cheaper sorted insertion.","locations":[{"ref":"src/libsync/syncengine.cpp:476-478","code":"  476 |     // Insert sorted\n  477 |     auto it = std::lower_bound( _syncItems.begin(), _syncItems.end(), item ); // the _syncItems is sorted\n  478 |     _syncItems.insert( it, item );"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","description":"PlaceHolderInfo's constructor takes an rvalue reference std::vector<char>&& buffer but initializes the member with `_data(buffer)`, which copies (buffer is an lvalue inside the body/init-list) instead of moving. The buffer (placeholder info blob) is needlessly copied even though findPlaceholderInfo passes std::move(buffer).","fix":"Initialize with a move: `: _data(std::move(buffer))`.","locations":[{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:714-717","code":"  714 | OCC::CfApiWrapper::PlaceHolderInfo::PlaceHolderInfo(std::vector<char> &&buffer)\n  715 |     : _data(buffer)\n  716 | {\n  717 | }"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"negligible","description":"slotPropfindIterate compares `name == chunkUploadFolderUrl().path()` and slotPropfindFinished/iterate call chunkUploadFolderUrl() repeatedly; each call rebuilds the URL via string concatenation and Utility::concatUrlPath. In the propfind iteration this URL is recomputed for every listed chunk entry.","fix":"Cache chunkUploadFolderUrl() (or its .path()) once per propfind run and reuse it in the iterate callback.","locations":[{"ref":"src/libsync/propagateuploadng.cpp:125-139","code":"  125 | void PropagateUploadFileNG::slotPropfindIterate(const QString &name, const QMap<QString, QString> &properties)\n  126 | {\n  127 |     if (name == chunkUploadFolderUrl().path()) {\n  128 |         return; // skip the info about the path itself\n  129 |     }\n  130 | \n  131 |     bool ok = false;\n  132 |     QString chunkName = name.mid(name.lastIndexOf('/') + 1);\n  133 |     auto chunkId = chunkName.toLongLong(&ok);\n  134 | \n  135 |     if (ok) {\n  136 |         ServerChunkInfo chunkinfo = { properties[\"getcontentlength\"].toLongLong(), chunkName };\n  137 |         _serverChunks[chunkId] = chunkinfo;\n  138 |     }\n  139 | }"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","description":"computeRecursiveHydrationAndPinStates recurses over the entire directory tree calling QFileInfo/QDir::entryList and findPlaceholderInfo (which opens a CfAPI handle) for every file on each availability() query. For large sync folders this is an expensive O(tree) filesystem + handle-open walk performed synchronously.","fix":"Consider caching availability/hydration aggregates or limiting recursion depth for interactive availability queries.","locations":[{"ref":"src/libsync/vfs/cfapi/vfs_cfapi.cpp:607-656","code":"  607 | VfsCfApi::HydratationAndPinStates VfsCfApi::computeRecursiveHydrationAndPinStates(const QString &folderPath, const Optional<PinState> &basePinState)\n  608 | {\n  609 |     Q_ASSERT(!folderPath.endsWith('/'));\n  610 |     const auto fullPath = QString{params().filesystemPath + folderPath};\n  611 |     QFileInfo info(params().filesystemPath + folderPath);\n  612 | \n  613 |     if (!FileSystem::fileExists(fullPath)) {\n  614 |         return {};\n  615 |     }\n  616 |     const auto effectivePin = pinState(folderPath);\n  617 |     const auto pinResult = (!effectivePin && !basePinState) ? Optional<PinState>()\n  618 |                          : (!effectivePin || !basePinState) ? PinState::Inherited\n  619 |                          : (*effectivePin == *basePinState) ? *effectivePin\n  620 |                          : PinState::Inherited;\n  621 | \n  622 |     if (FileSystem::isDir(fullPath)) {\n  623 |         const auto dirState = HydratationAndPinStates {\n  624 |             pinResult,\n  625 |             {}\n  626 |         };\n  627 |         const auto dir = QDir(info.absoluteFilePath());\n  628 |         Q_ASSERT(dir.exists());\n  629 |         const auto children = dir.entryList();\n  630 |         return std::accumulate(std::cbegin(children), std::cend(children), dirState, [=, this](const HydratationAndPinStates &currentState, const QString &name) {\n  631 |             if (name == QStringLiteral(\"..\") || name == QStringLiteral(\".\")) {\n  632 |                 return currentState;\n  633 |             }\n  634 | \n  635 |             // if the folderPath.isEmpty() we don't want to end up having path \"/example.file\" because this will lead to double slash later, when appending to \"SyncFolder/\"\n  636 |             const auto path = folderPath.isEmpty() ? name : folderPath + '/' + name;\n  637 |             const auto states = computeRecursiveHydrationAndPinStates(path, currentState.pinState);\n  638 |             return HydratationAndPinStates {\n  639 |                 states.pinState,\n  640 |                 {\n  641 |                     states.hydrationStatus.hasHydrated || currentState.hydrationStatus.hasHydrated,\n  642 |                     states.hydrationStatus.hasDehydrated || currentState.hydrationStatus.hasDehydrated,\n  643 |                 }\n  644 |             };\n  645 |         });\n  646 |     } else { // file case\n  647 |         const auto isDehydrated = isDehydratedPlaceholder(info.absoluteFilePath());\n  648 |         return {\n  649 |             pinResult,\n  650 |             {\n  651 |                 !isDehydrated,\n  652 |                 isDehydrated\n  653 |             }\n  654 |         };\n  655 |     }\n  656 | }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"medium","description":"`break;` placed before `emit groupFoldersChanged();` makes the emit unreachable, and the break exits the comparison loop on the first differing element without ever notifying. As a result, when the group-folder list changes in content but not in size, `groupFoldersChanged()` is never emitted and the QML tray view is not refreshed.","fix":"Swap the statements: `emit groupFoldersChanged(); break;` (and emit outside the loop, only once).","locations":[{"ref":"src/gui/tray/usermodel.cpp:2057-2065","code":" 2057 |     } else {\n 2058 |         for (int i = 0; i < oldTrayFolderInfos.size(); ++i) {\n 2059 |             const auto oldFolderInfo = oldTrayFolderInfos.at(i).template value<TrayFolderInfo>();\n 2060 |             const auto newFolderInfo = _trayFolderInfos.at(i).template value<TrayFolderInfo>();\n 2061 |             if (oldFolderInfo._folderType != newFolderInfo._folderType || oldFolderInfo._fullPath != newFolderInfo._fullPath) {\n 2062 |                 break;\n 2063 |                 emit groupFoldersChanged();\n 2064 |             }\n 2065 |         }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"In Flow2Auth::handleResponse() the error-reason if/else chain has an unreachable branch: `else if (jsonParseError.error != NoError || json.isEmpty())` is immediately followed by `else if (json.isEmpty())`. Any case satisfying the second condition was already caught by the first, so the dedicated \"did not contain all expected fields\" message can never be shown.","fix":"Split the conditions: keep `jsonParseError.error != NoError` for the parse-failure message and a separate `json.isEmpty()` branch for the missing-fields message.","locations":[{"ref":"src/gui/creds/flow2auth.cpp:274-282","code":"  274 |         } else if (jsonParseError.error != QJsonParseError::NoError || json.isEmpty()) {\n  275 |             // Could not parse the JSON returned from the server\n  276 |             errorReason = tr(\"We couldn't parse the server response. \"\n  277 |                 \"Please try connecting again later or contact your server administrator if the issue continues.\");\n  278 |         } else if (json.isEmpty()) {\n  279 |             // The reply from the server did not contain all expected fields\n  280 |             errorReason = tr(\"The server did not reply with the expected data. \"\n  281 |                 \"Please try connecting again later or contact your server administrator if the issue continues.\");\n  282 |         }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"NetworkSettings::saveBWLimitSettings() contains `else if (_account) { useDownloadLimit = -2; }` / `useUploadLimit = -2` branches that can never execute: the download/upload radio buttons live in mutually-exclusive button groups, so exactly one of (limit / noLimit) radio is always checked, meaning the third branch is unreachable. The -2 (LegacyGlobalLimit) value is thus never written from this UI path.","fix":"Remove the unreachable `else if (_account)` branches, or fix the radio-button grouping if a third 'use global' state was actually intended.","locations":[{"ref":"src/gui/networksettings.cpp:206-220","code":"  206 |     if (_ui->downloadLimitRadioButton->isChecked()) {\n  207 |         useDownloadLimit = 1;\n  208 |     } else if (_ui->noDownloadLimitRadioButton->isChecked()) {\n  209 |         useDownloadLimit = 0;\n  210 |     } else if (_account) {\n  211 |         useDownloadLimit = -2;\n  212 |     }\n  213 | \n  214 |     if (_ui->uploadLimitRadioButton->isChecked()) {\n  215 |         useUploadLimit = 1;\n  216 |     } else if (_ui->noUploadLimitRadioButton->isChecked()) {\n  217 |         useUploadLimit = 0;\n  218 |     } else if (_account) {\n  219 |         useUploadLimit = -2;\n  220 |     }"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","description":"processFileFinalize() has a sanity check built from a chain of '!=' comparisons combined with || that can never be false: (type != VirtualFile || type != VirtualFileDownload || type != VirtualFileDehydration) is always true because a single _type value cannot equal all three at once, so the negation is always false and the qCCritical/Q_ASSERT branch is unreachable dead code. The intended check (warn when type is none of the allowed enum values) is not actually performed.","fix":"Rewrite the condition with && (e.g. !(isDirectory || vfsOn || type==VirtualFile || type==VirtualFileDownload || type==VirtualFileDehydration)) so it actually detects an unexpected type.","locations":[{"ref":"src/libsync/discovery.cpp:1931-1938","code":" 1931 |     if (!(item->isDirectory() ||\n 1932 |           (!_discoveryData->_syncOptions._vfs || _discoveryData->_syncOptions._vfs->mode() != OCC::Vfs::Off) ||\n 1933 |           item->_type != CSyncEnums::ItemTypeVirtualFile ||\n 1934 |           item->_type != CSyncEnums::ItemTypeVirtualFileDownload ||\n 1935 |           item->_type != CSyncEnums::ItemTypeVirtualFileDehydration)) {\n 1936 |         qCCritical(lcDisco()) << \"wong item type for\" << item->_file << item->_type;\n 1937 |         Q_ASSERT(false);\n 1938 |     }"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","description":"PropagateRemoteMkdir constructor performs a getFileRecord lookup into parentRec and discards the result, returning early on failure without storing anything. Identical dead pattern as in PropagateUploadFileCommon: the value is never used and the real lookup happens again in slotMkdir().","fix":"Remove the unused getFileRecord block from the constructor.","locations":[{"ref":"src/libsync/propagateremotemkdir.cpp:25-37","code":"   25 | PropagateRemoteMkdir::PropagateRemoteMkdir(OwncloudPropagator *propagator, const SyncFileItemPtr &item)\n   26 |     : PropagateItemJob(propagator, item)\n   27 | {\n   28 |     const auto path = _item->_file;\n   29 |     const auto slashPosition = path.lastIndexOf('/');\n   30 |     const auto parentPath = slashPosition >= 0 ? path.left(slashPosition) : QString();\n   31 | \n   32 |     SyncJournalFileRecord parentRec;\n   33 |     bool ok = propagator->_journal->getFileRecord(parentPath, &parentRec);\n   34 |     if (!ok) {\n   35 |         return;\n   36 |     }\n   37 | }"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"low","description":"VfsCfApi::availability has a `return AvailabilityError::NoSuchItem;` statement after the basePinState branch whose inner if/else-if/else all return, making this line unreachable dead code.","fix":"Remove the unreachable return (or restructure so the intent is clear).","locations":[{"ref":"src/libsync/vfs/cfapi/vfs_cfapi.cpp:386-395","code":"  386 |         } else {\n  387 |             if (pin && *pin == PinState::OnlineOnly) {\n  388 |                 return VfsItemAvailability::OnlineOnly;\n  389 |             } else if (pin && *pin == PinState::AlwaysLocal) {\n  390 |                 return VfsItemAvailability::AlwaysLocal;\n  391 |             } else {\n  392 |                 return VfsItemAvailability::AllDehydrated;\n  393 |             }\n  394 |         }\n  395 |         return AvailabilityError::NoSuchItem;"}]},{"id":"DEAD_7","type": . The block comment describes resolving to '~/Library/Containers/com.nextcloud.desktopclient/Data' and performs an elaborate path-budget calculation (93 vs 103 bytes) for that container path, but the function actually returns `QDir::homePath() + \"/si\"`, a completely different and much shorter path. The comment no longer matches the implementation.","fix":"Update the comment to describe the actual path used (homePath()+\"/si\"), or restore the intended container-based path if that was the design.","locations":[{"ref":"src/gui/macOS/singleinstancemanager_mac.mm:66-77","code":"   66 | QString SingleInstanceManager::socketPath()\n   67 | {\n   68 |     // In a sandboxed macOS app QDir::homePath() resolves to\n   69 |     //   ~/Library/Containers/com.nextcloud.desktopclient/Data\n   70 |     // The App Sandbox grants both file-write and network-bind access to this\n   71 |     // directory on all macOS versions, without any extra entitlements.\n   72 |     //\n   73 |     // Path budget check (worst case: macOS-maximum 31-char username):\n   74 |     //   /Users/<31 chars>/Library/Containers/com.nextcloud.desktopclient/Data/si\n   75 |     //   = 7 + 31 + 20 + 27 + 5 + 3 = 93 bytes  (limit: 103)\n   76 |     return QDir::homePath() + QStringLiteral(\"/si\");\n   77 | }"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"handleErrors() contains the comment 'This line is not printing anything.' next to ERR_print_errors(bioErrors), and the function is widely used to obtain the OpenSSL error text for logging. If the comment is accurate, all the qCInfo(...) << handleErrors() diagnostics in the crypto paths emit empty strings, obscuring real OpenSSL failures during debugging of E2EE issues.","fix":"Verify whether ERR_print_errors writes to the mem BIO; if not, drain the error queue with ERR_get_error_line()/ERR_error_string() (as debugOpenssl() does) and remove/replace the misleading comment.","locations":[{"ref":"src/libsync/clientsideencryption.cpp:211-216","code":"  211 | QByteArray handleErrors()\n  212 | {\n  213 |     Bio bioErrors;\n  214 |     ERR_print_errors(bioErrors); // This line is not printing anything.\n  215 |     return BIO2ByteArray(bioErrors);\n  216 | }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"OwncloudPropagator::smallFileSize() declares 'const qint64 smallFileSize = 100 * 1024;' with the comment '//default to 1 MB'. 100*1024 is 100KiB, not 1MB. The comment is wrong and misleading about the actual threshold used for small-file classification.","fix":"Correct the comment to 100 KiB (or change the value to match the intended 1 MB).","locations":[{"ref":"src/libsync/owncloudpropagator.cpp:496-500","code":"  496 | qint64 OwncloudPropagator::smallFileSize()\n  497 | {\n  498 |     const qint64 smallFileSize = 100 * 1024; //default to 1 MB. Not dynamic right now.\n  499 |     return smallFileSize;\n  500 | }"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment states 'ignore the file if its name is longer than 254 chars' but the guard is `blen > 254`, which only excludes names of length 255 or more (i.e. names of exactly 254 chars are NOT excluded). Off-by-one between comment and code.","fix":"Either change the comment to 'longer than 254' meaning >=255, or change the condition to `blen >= 254` to match the stated intent. Keep it consistent with createDownloadTmpFileName as the comment requests.","locations":[{"ref":"src/csync/csync_exclude.cpp:156-160","code":"  156 |     // check the strlen and ignore the file if its name is longer than 254 chars.\n  157 |     // whenever changing this also check createDownloadTmpFileName\n  158 |     if (blen > 254) {\n  159 |         return CSYNC_FILE_EXCLUDE_LONG_FILENAME;\n  160 |     }"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"AccountState::checkConnectivity() retains a large commented block and the comment '#ifdef Q_OS_WIN ... There seems to be a bug in Qt on Windows ...' but the ifdef is disabled and the reset always runs on all platforms. The surrounding comment still describes the behavior as Windows-specific ('As an attempted workaround, reset the QNAM regularly') while the code now resets the QNAM unconditionally for every disconnected account, which is misleading.","fix":"Update the comment to state the QNAM/SSL reset now applies to all platforms, and remove the stale #ifdef scaffolding.","locations":[{"ref":"src/gui/accountstate.cpp:330-342","code":"  330 |         // Let's try this for all OS and see if it fixes the Qt issues we have on Linux  #4720 #3888 #4051\n  331 |         //#ifdef Q_OS_WIN\n  332 |         // There seems to be a bug in Qt on Windows where QNAM sometimes stops\n  333 |         // working correctly after the computer woke up from sleep. See #2895 #2899\n  334 |         // and #2973.\n  335 |         // As an attempted workaround, reset the QNAM regularly if the account is\n  336 |         // disconnected.\n  337 |         account()->resetNetworkAccessManager();\n  338 | \n  339 |         // If we don't reset the ssl config a second CheckServerJob can produce a\n  340 |         // ssl config that does not have a sensible certificate chain.\n  341 |         account()->setSslConfiguration(QSslConfiguration::defaultConfiguration());\n  342 |         //#endif"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"FolderWatcher::changeDetected carries a stale TODO comment block questioning the 1-second same-path dedup ('why is the timeout only 1 second?', 'what if there is more than one file...'). The logic underneath was changed to operate on a QSet of paths (pathsSet) rather than a single path, so parts of the comment ('the same path') no longer match the implementation and may mislead readers.","fix":"Update the comment to reflect the set-based dedup, or remove the outdated questions.","locations":[{"ref":"src/gui/folderwatcher.cpp:228-239","code":"  228 |     // TODO: this shortcut doesn't look very reliable:\n  229 |     //   - why is the timeout only 1 second?\n  230 |     //   - what if there is more than one file being updated frequently?\n  231 |     //   - why do we skip the file altogether instead of e.g. reducing the upload frequency?\n  232 | \n  233 |     // Check if the same path was reported within the last second.\n  234 |     const auto pathsSet = QSet<QString>{paths.begin(), paths.end()};\n  235 |     if (pathsSet == _lastPaths && _timer.elapsed() < 1000) {\n  236 |         // the same path was reported within the last second. Skip.\n  237 |         return;\n  238 |     }\n  239 |     _lastPaths = pathsSet;"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Typo and stale wording in comments: 'In theory the server should five us a 304' (should be 'give'), and the duplicated roleNames assignment `roles[IsCurrentUserFileActivityRole] = \"isCurrentUserFileActivity\";` appears twice (harmless duplicate).","fix":"Fix the typo and remove the duplicated roleNames line.","locations":[{"ref":"src/gui/tray/notificationhandler.cpp:88","code":"   88 |     // In theory the server should five us a 304 Not Modified if there are no new notifications."},{"ref":"src/gui/tray/activitylistmodel.cpp:77-78","code":"   77 |     roles[IsCurrentUserFileActivityRole] = \"isCurrentUserFileActivity\";\n   78 |     roles[IsCurrentUserFileActivityRole] = \"isCurrentUserFileActivity\";"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"DetermineAuthTypeJob::checkAllDone() comment 'Do not conitunue until eve' is a truncated/typo'd comment that conveys no meaning. Also lcDetermineAuthTypeJob logs the PROPFIND WWW-Authenticate branch with qCWarning even on the normal empty-header case.","fix":"Fix the comment to e.g. 'Do not continue until every parallel request finished.'","locations":[{"ref":"src/libsync/networkjobs.cpp:1267-1270","code":" 1267 | void DetermineAuthTypeJob::checkAllDone()\n 1268 | {\n 1269 |     // Do not conitunue until eve\n 1270 |     if (!_getDone || !_propfindDone || !_oldFlowDone) {"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"Comment says 'the device deletes itself via a QScopedPointer' / 'job takes ownership of device via a QScopedPointer', but PUTFileJob actually stores the device as a raw pointer and reparents it with _device->setParent(this) (see propagateupload.h ctor). There is no QScopedPointer involved; the comment is outdated and misleading about the ownership mechanism.","fix":"Update the comment to reflect that PUTFileJob takes a std::unique_ptr in its constructor and reparents the device to itself (QObject parent ownership).","locations":[{"ref":"src/libsync/propagateuploadng.cpp:384-386","code":"  384 |     // job takes ownership of device via a QScopedPointer. Job deletes itself when finishing\n  385 |     const auto devicePtr = device.get(); // for connections later\n  386 |     const auto job = new PUTFileJob(propagator()->account(), url, std::move(device), headers, _currentChunk, this);"},{"ref":"src/libsync/propagateuploadv1.cpp:155-157","code":"  155 |     // job takes ownership of device via a QScopedPointer. Job deletes itself when finishing\n  156 |     auto devicePtr = device.get(); // for connections later\n  157 |     auto *job = new PUTFileJob(propagator()->account(), propagator()->fullRemotePath(path), std::move(device), headers, _currentChunk, this);"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","description":"Both branches of the if/else-if call deleteOldDbRecord(previousNameInDb) with the exact same argument, so the else-if is dead and the intent is unclear. The `fileAlreadyMoved` flag is meant to select which DB record to delete (previousNameInDb vs _item->_originalFile), mirroring the getFileRecord() call just above at line 490, but the original-file path is never used here. This likely leaves a stale DB record for _item->_originalFile when the file had not already been moved.","fix":"Delete the record matching what was queried: `deleteOldDbRecord(fileAlreadyMoved ? previousNameInDb : _item->_originalFile)`. Remove the redundant duplicated branch.","locations":[{"ref":"src/libsync/propagatorjobs.cpp:489-501","code":"  489 |     SyncJournalFileRecord oldRecord;\n  490 |     if (!propagator()->_journal->getFileRecord(fileAlreadyMoved ? previousNameInDb : _item->_originalFile, &oldRecord)) {\n  491 |         qCWarning(lcPropagateLocalRename) << \"Could not get file from local DB\" << _item->_originalFile;\n  492 |         done(SyncFileItem::NormalError, tr(\"Could not get file %1 from local DB\").arg(_item->_originalFile), ErrorCategory::GenericError);\n  493 |         return;\n  494 |     }\n  495 | \n  496 |     if (fileAlreadyMoved && !deleteOldDbRecord(previousNameInDb)) {\n  497 |         return;\n  498 |     } else if (!deleteOldDbRecord(previousNameInDb)) {\n  499 |         qCWarning(lcPropagateLocalRename) << \"Could not delete file from local DB\" << _item->_originalFile;\n  500 |         return;\n  501 |     }"}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"negligible","description":"FolderMan has three near-identical routines that collect folders for an account and remove/wipe them: slotAccountRemoved, slotRemoveFoldersForAccount, and slotWipeFolderForAccount. They duplicate the gather-then-remove pattern (with subtly different container types QVector vs QVarLengthArray and different deletion handling), which is error-prone — see the leak in slotWipeFolderForAccount that the other two do not have.","fix":"Extract a common helper that gathers folders for an account and performs consistent removal/deletion.","locations":[{"ref":"src/gui/folderman.cpp:1237-1248","code":" 1237 | void FolderMan::slotAccountRemoved(AccountState *accountState)\n 1238 | {\n 1239 |     QVector<Folder *> foldersToRemove;\n 1240 |     for (const auto &folder : std::as_const(_folderMap)) {\n 1241 |         if (folder->accountState() == accountState) {\n 1242 |             foldersToRemove.push_back(folder);\n 1243 |         }\n 1244 |     }\n 1245 |     for (const auto &folder : std::as_const(foldersToRemove)) {\n 1246 |         removeFolder(folder);\n 1247 |     }\n 1248 | }"},{"ref":"src/gui/folderman.cpp:1250-1266","code":" 1250 | void FolderMan::slotRemoveFoldersForAccount(AccountState *accountState)\n 1251 | {\n 1252 |     QVarLengthArray<Folder *, 16> foldersToRemove;\n 1253 |     Folder::MapIterator i(_folderMap);\n 1254 |     while (i.hasNext()) {\n 1255 |         i.next();\n 1256 |         Folder *folder = i.value();\n 1257 |         if (folder->accountState() == accountState) {\n 1258 |             foldersToRemove.append(folder);\n 1259 |         }\n 1260 |     }\n 1261 | \n 1262 |     for (const auto &f : std::as_const(foldersToRemove)) {\n 1263 |         removeFolder(f);\n 1264 |     }\n 1265 |     emit folderListChanged(_folderMap);\n 1266 | }"},{"ref":"src/gui/folderman.cpp:1677-1744","code":" 1677 | void FolderMan::slotWipeFolderForAccount(AccountState *accountState)\n 1678 | {\n 1679 |     QVarLengthArray<Folder *, 16> foldersToRemove;\n 1680 |     Folder::MapIterator i(_folderMap);\n 1681 |     while (i.hasNext()) {\n 1682 |         i.next();\n 1683 |         Folder *folder = i.value();\n 1684 |         if (folder->accountState() == accountState) {\n 1685 |             foldersToRemove.append(folder);\n 1686 |         }\n 1687 |     }\n 1688 | \n 1689 |     bool success = false;\n 1690 |     for (const auto &f : std::as_const(foldersToRemove)) {\n 1691 |         if (!f) {\n 1692 |             qCCritical(lcFolderMan) << \"Can not remove null <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-06-03 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
