<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"TermsOfServiceChecker::checkServerTermsOfService() checks `if (!_account)` and emits done() but does NOT return. It then unconditionally constructs `new JsonApiJob(_account, ...)` with a null AccountPtr and calls job->start(), dereferencing the null account inside JsonApiJob. The missing return turns a guarded early-out into a guaranteed null dereference / crash whenever _account is null.","fix":"Add a `return;` after emit done() inside the `if (!_account)` block.","locations":[{"ref":"src/gui/connectionvalidator.cpp:406-422","code":"  406 | void TermsOfServiceChecker::checkServerTermsOfService()\n  407 | {\n  408 |     if (!_account) {\n  409 |         qCInfo(lcConnectionValidator) << \"done\";\n  410 |         emit done();\n  411 |     }\n  412 | \n  413 |     // The main flow now needs the capabilities\n  414 |     auto *job = new JsonApiJob(_account, QLatin1String(\"ocs/v2.php/apps/terms_of_service/terms\"), this);\n  415 |     job->setTimeout(timeoutToUseMsec);\n  416 |     QObject::connect(job, &JsonApiJob::jsonReceived, this, &TermsOfServiceChecker::slotServerTermsOfServiceRecieved);\n  417 |     QObject::connect(job, &JsonApiJob::networkError, this, [] (QNetworkReply *reply)\n  418 |                      {\n  419 |                          qCInfo(lcConnectionValidator()) << \"network error\" << reply->error();\n  420 |                      });\n  421 |     job->start();\n  422 | }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"In Folder::startSync, `_folderWatcher->canSetPermissions()` is dereferenced unconditionally. `_folderWatcher` is a QScopedPointer that is only created by registerFolderWatcher(), which bails out early (returns) when the local folder path does not yet exist. FolderMan::slotStartScheduledFolderSync calls registerFolderWatcher() right before startSync(), but if the path does not exist the watcher stays null, so this line null-derefs and crashes. Note the same function null-checks `_folderWatcher` a few lines earlier (line 1210), confirming it can legitimately be null here.","fix":"Guard the call: `_engine->setFilesystemPermissionsReliable(_folderWatcher && _folderWatcher->canSetPermissions());` (or default to false when the watcher is absent).","locations":[{"ref":"src/gui/folder.cpp:1225","code":" 1225 |     _engine->setFilesystemPermissionsReliable(_folderWatcher->canSetPermissions());"},{"ref":"src/gui/folder.cpp:1210-1225","code":" 1210 |     } else if (_folderWatcher && _folderWatcher->isReliable()\n 1211 |         && hasDoneFullLocalDiscovery\n 1212 |         && !periodicFullLocalDiscoveryNow) {\n 1213 |         qCInfo(lcFolder) << \"Allowing local discovery to read from the database\";\n 1214 |         _engine->setLocalDiscoveryOptions(\n 1215 |             LocalDiscoveryStyle::DatabaseAndFilesystem,\n 1216 |             _localDiscoveryTracker->localDiscoveryPaths());\n 1217 |         _localDiscoveryTracker->startSyncPartialDiscovery();\n 1218 |     } else {\n 1219 |         qCInfo(lcFolder) << \"Forbidding local discovery to read from the database\";\n 1220 |         _engine->setLocalDiscoveryOptions(LocalDiscoveryStyle::FilesystemOnly);\n 1221 |         _localDiscoveryTracker->startSyncFullDiscovery();\n 1222 |     }\n 1223 | \n 1224 |     _engine->setIgnoreHiddenFiles(_definition.ignoreHiddenFiles);\n 1225 |     _engine->setFilesystemPermissionsReliable(_folderWatcher->canSetPermissions());"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"Possible null-pointer dereference of credentials in the public-share-link branch. `AbstractCredentials *creds = _ocWizard->getCredentials();` may return nullptr (getCredentials() returns nullptr when _credentialsPage is null). The code guards the first use with `if (creds) { ... }`, but the subsequent public-share-link block calls `creds->user()` unconditionally, dereferencing a possibly-null pointer.","fix":"Guard the public-share-link block with the same null check, e.g. wrap lines 362-373 in `if (creds) { ... }` or early-return when `!creds`.","locations":[{"ref":"src/gui/owncloudsetupwizard.cpp:356-364","code":"  356 |     AbstractCredentials *creds = _ocWizard->getCredentials();\n  357 |     if (creds) {\n  358 |         _ocWizard->account()->setCredentials(creds);\n  359 |         creds->persist();\n  360 |     }\n  361 | \n  362 |     if (_ocWizard->account()->isPublicShareLink()) {\n  363 |         _ocWizard->account()->setDavUser(creds->user());\n  364 |         _ocWizard->account()->setDavDisplayName(creds->user());"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"SyncConflictsModel::data() and setData() index _conflictData[index.row()] but rowCount() returns _data.size(). _conflictData is (re)built in updateConflictsData(); although it normally mirrors _data (one entry per conflict, including empty placeholders), data() is also gated only by checkIndex against rowCount() which uses _data. If _conflictData and _data ever diverge in size (e.g. updateConflictsData not yet run, or a folder lookup path that pushes fewer entries), the row index can be out of bounds for _conflictData, causing OOB access. The two containers should share a single size source of truth.","fix":"Have rowCount() return _conflictData.size() (the container actually indexed), or assert/guarantee _data.size() == _conflictData.size() and bounds-check index.row() against _conflictData before indexing.","locations":[{"ref":"src/gui/syncconflictsmodel.cpp:21-75","code":"   21 | int SyncConflictsModel::rowCount(const QModelIndex &parent) const\n   22 | {\n   23 |     if (parent.isValid()) {\n   24 |         return 0;\n   25 |     }\n   26 | \n   27 |     return _data.size();\n   28 | }\n   29 | \n   30 | QVariant SyncConflictsModel::data(const QModelIndex &index, int role) const\n   31 | {\n   32 |     auto result = QVariant{};\n   33 | \n   34 |     Q_ASSERT(checkIndex(index, CheckIndexOption::IndexIsValid | CheckIndexOption::ParentIsInvalid));\n   35 | \n   36 |     if (index.parent().isValid()) {\n   37 |         return result;\n   38 |     }\n   39 | \n   40 |     if (role >= static_cast<int>(SyncConflictRoles::ExistingFileName) && role <= static_cast<int>(SyncConflictRoles::ConflictPreviewUrl)) {\n   41 |         const auto convertedRole = static_cast<SyncConflictRoles>(role);\n   42 | \n   43 |         switch (convertedRole) {\n   44 |         case SyncConflictRoles::ExistingFileName:\n   45 |             result = _conflictData[index.row()].mExistingFileName;\n   46 |             break;\n   47 |         case SyncConflictRoles::ExistingSize:\n   48 |             result = _conflictData[index.row()].mExistingSize;\n   49 |             break;\n   50 |         case SyncConflictRoles::ConflictSize:\n   51 |             result = _conflictData[index.row()].mConflictSize;\n   52 |             break;\n   53 |         case SyncConflictRoles::ExistingDate:\n   54 |             result = _conflictData[index.row()].mExistingDate;\n   55 |             break;\n   56 |         case SyncConflictRoles::ConflictDate:\n   57 |             result = _conflictData[index.row()].mConflictDate;\n   58 |             break;\n   59 |         case SyncConflictRoles::ExistingSelected:\n   60 |             result = _conflictData[index.row()].mExistingSelected == ConflictInfo::ConflictSolution::SolutionSelected;\n   61 |             break;\n   62 |         case SyncConflictRoles::ConflictSelected:\n   63 |             result = _conflictData[index.row()].mConflictSelected == ConflictInfo::ConflictSolution::SolutionSelected;\n   64 |             break;\n   65 |         case SyncConflictRoles::ExistingPreviewUrl:\n   66 |             result = _conflictData[index.row()].mExistingPreviewUrl;\n   67 |             break;\n   68 |         case SyncConflictRoles::ConflictPreviewUrl:\n   69 |             result = _conflictData[index.row()].mConflictPreviewUrl;\n   70 |             break;\n   71 |         }\n   72 |     }\n   73 | \n   74 |     return result;\n   75 | }"},{"ref":"src/gui/syncconflictsmodel.cpp:235-274","code":"  235 | void SyncConflictsModel::updateConflictsData()\n  236 | {\n  237 |     _conflictData.clear();\n  238 |     _conflictData.reserve(_data.size());\n  239 | \n  240 |     for (const auto &oneConflict : std::as_const(_data)) {\n  241 |         const auto folder = FolderMan::instance()->folder(oneConflict._folder);\n  242 |         if (!folder) {\n  243 |             qCWarning(lcSyncConflictsModel) << \"no Folder instance for\" << oneConflict._folder;\n  244 |             _conflictData.push_back({});\n  245 |             continue;\n  246 |         }\n  247 | \n  248 |         const auto conflictedRelativePath = oneConflict._file;\n  249 |         const auto baseRelativePath = folder->journalDb() ? folder->journalDb()->conflictFileBaseName(conflictedRelativePath.toUtf8()) : QString{};\n  250 | \n  251 |         const auto dir = QDir(folder->path());\n  252 |         const auto conflictedPath = dir.filePath(conflictedRelativePath);\n  253 |         const auto basePath = dir.filePath(baseRelativePath);\n  254 | \n  255 |         const auto existingFileInfo = QFileInfo(basePath);\n  256 |         const auto conflictFileInfo = QFileInfo(conflictedPath);\n  257 | \n  258 |         auto newConflictData = ConflictInfo{\n  259 |             existingFileInfo.fileName(),\n  260 |             _locale.formattedDataSize(existingFileInfo.size()),\n  261 |             _locale.formattedDataSize(conflictFileInfo.size()),\n  262 |             existingFileInfo.lastModified().toString(),\n  263 |             conflictFileInfo.lastModified().toString(),\n  264 |             QUrl{QStringLiteral(\"image://tray-image-provider/:/fileicon\") + existingFileInfo.filePath()},\n  265 |             QUrl{QStringLiteral(\"image://tray-image-provider/:/fileicon\") + conflictFileInfo.filePath()},\n  266 |             ConflictInfo::ConflictSolution::SolutionDeselected,\n  267 |             ConflictInfo::ConflictSolution::SolutionDeselected,\n  268 |             existingFileInfo.filePath(),\n  269 |             conflictFileInfo.filePath(),\n  270 |         };\n  271 | \n  272 |         _conflictData.push_back(std::move(newConflictData));\n  273 |     }\n  274 | }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"Possible null dereference in ActivityListModel::data(). The guard `if (!accountState && _accountState != accountState.data()) return QVariant();` only returns when `accountState` is null AND `_accountState` is non-null. When both `accountState` (lookup by name) and `_accountState` are null, execution falls through and later code dereferences `accountState->account()` (e.g. getFilePath/getDisplayPath via findFileInLocalFolders, and the ActivityIntegrationRole/AccountConnectedRole branches), crashing. The condition does not actually protect the subsequent unconditional `accountState->account()` uses.","fix":"Return early whenever `accountState` is null (`if (!accountState) return QVariant();`) before any `accountState->account()` access.","locations":[{"ref":"src/gui/tray/activitylistmodel.cpp:144-148","code":"  144 |     const auto activity = _finalList.at(index.row());\n  145 |     const auto accountState = AccountManager::instance()->account(activity._accName);\n  146 |     if (!accountState && _accountState != accountState.data()) {\n  147 |         return QVariant();\n  148 |     }"},{"ref":"src/gui/tray/activitylistmodel.cpp:386-388","code":"  386 |         return QVariant::fromValue(activity);\n  387 |     case ActivityIntegrationRole:\n  388 |         return accountState->account()->serverHasIntegration();"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","description":"UserModel::data() indexes `_users[index.row()]` for every role with no bounds check (unlike UserAppsModel::data which guards). It is also reachable from non-Qt-view code paths and after rows are removed. An out-of-range or stale QModelIndex causes an out-of-bounds access / crash. There is no `index.isValid()` or row range check anywhere in the function.","fix":"Add `if (!index.isValid() || index.row() < 0 || index.row() >= _users.size()) return {};` at the top of data(), mirroring UserAppsModel::data.","locations":[{"ref":"src/gui/tray/usermodel.cpp:2448-2504","code":" 2448 | QVariant UserModel::data(const QModelIndex &index, int role) const\n 2449 | {\n 2450 |     auto result = QVariant{};\n 2451 |     switch (static_cast<UserRoles>(role))\n 2452 |     {\n 2453 |     case NameRole:\n 2454 |         result = _users[index.row()]->name();\n 2455 |         break;\n 2456 |     case ServerRole:\n 2457 |         result = _users[index.row()]->server();\n 2458 |         break;\n 2459 |     case ServerHasUserStatusRole:\n 2460 |         result = _users[index.row()]->serverHasUserStatus();\n 2461 |         break;\n 2462 |     case StatusRole:\n 2463 |         result = QVariant::fromValue(_users[index.row()]->status());\n 2464 |         break;\n 2465 |     case StatusIconRole:\n 2466 |         result = _users[index.row()]->statusIcon();\n 2467 |         break;\n 2468 |     case StatusEmojiRole:\n 2469 |         result = _users[index.row()]->statusEmoji();\n 2470 |         break;\n 2471 |     case StatusMessageRole:\n 2472 |         result = _users[index.row()]->statusMessage();\n 2473 |         break;\n 2474 |     case DesktopNotificationsAllowedRole:\n 2475 |         result = _users[index.row()]->isDesktopNotificationsAllowed();\n 2476 |         break;\n 2477 |     case AvatarRole:\n 2478 |         result = _users[index.row()]->avatarUrl();\n 2479 |         break;\n 2480 |     case IsCurrentUserRole:\n 2481 |         result = _users[index.row()]->isCurrentUser();\n 2482 |         break;\n 2483 |     case IsConnectedRole:\n 2484 |         result = _users[index.row()]->isConnected();\n 2485 |         break;\n 2486 |     case IdRole:\n 2487 |         result = index.row();\n 2488 |         break;\n 2489 |     case CanLogoutRole:\n 2490 |         result = _users[index.row()]->canLogout();\n 2491 |         break;\n 2492 |     case RemoveAccountTextRole:\n 2493 |         result = _users[index.row()]->isPublicShareLink() ? tr(\"Leave share\") : tr(\"Remove account\");\n 2494 |         break;\n 2495 |     case SyncStatusIconRole:\n 2496 |         result = _users[index.row()]->syncStatusIcon();\n 2497 |         break;\n 2498 |     case SyncStatusOkRole:\n 2499 |         result = _users[index.row()]->syncStatusOk();\n 2500 |         break;\n 2501 |     }\n 2502 | \n 2503 |     return result;\n 2504 | }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","description":"Dereference of an error-state Result. When updateMetadata() fails (!result) but the target file does not exist on disk, the first `if (!result && QFileInfo::exists(targetFile))` is skipped, and control falls into the `else if (*result == Vfs::ConvertToPlaceholderResult::Locked)` branch which dereferences `*result` on a Result that holds an error, not a value. This is undefined behaviour / a crash for the (admittedly rare) case where metadata update fails and the renamed target is missing.","fix":"Check `if (!result)` first and handle the error unconditionally (or only dereference *result inside an `else` that is reached only when result holds a value), e.g. `if (!result) { if (QFileInfo::exists(targetFile)) { done(FatalError...); return; } } else if (*result == ...Locked) { ... }`.","locations":[{"ref":"src/libsync/propagateremotemove.cpp:287-294","code":"  287 |     const auto result = propagator()->updateMetadata(newItem);\n  288 |     if (!result && QFileInfo::exists(targetFile)) {\n  289 |         done(SyncFileItem::FatalError, tr(\"Error updating metadata: %1\").arg(result.error()), ErrorCategory::GenericError);\n  290 |         return;\n  291 |     } else if (*result == Vfs::ConvertToPlaceholderResult::Locked) {\n  292 |         done(SyncFileItem::SoftError, tr(\"The file %1 is currently in use\").arg(newItem._file), ErrorCategory::GenericError);\n  293 |         return;\n  294 |     }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"parseOptions calls it.peekNext() guarded only by an option name check, without verifying it.hasNext(). When a value-taking option (e.g. --httpproxy, --user, --password, --exclude, --unsyncedfolders, --max-sync-retries, --uplimit, --downlimit, --path) is supplied as the LAST command-line argument with no following token, QStringListIterator::peekNext() is called past the end, which is undefined behavior (typically a crash/assert in debug builds).","fix":"Guard each value option with `it.hasNext()` before calling it.peekNext()/it.next(), e.g. `if (option == \"--httpproxy\" && it.hasNext() && !it.peekNext().startsWith(\"-\"))`.","locations":[{"ref":"src/cmd/cmd.cpp:230-264","code":"  230 |     while (it.hasNext()) {\n  231 |         const QString option = it.next();\n  232 | \n  233 |         if (option == \"--httpproxy\" && !it.peekNext().startsWith(\"-\")) {\n  234 |             options->proxy = it.next();\n  235 |         } else if (option == \"-s\" || option == \"--silent\") {\n  236 |             options->silent = true;\n  237 |         } else if (option == \"--trust\") {\n  238 |             options->trustSSL = true;\n  239 |         } else if (option == \"-n\") {\n  240 |             options->useNetrc = true;\n  241 |         } else if (option == \"-h\") {\n  242 |             options->ignoreHiddenFiles = false;\n  243 |         } else if (option == \"--non-interactive\") {\n  244 |             options->interactive = false;\n  245 |         } else if ((option == \"-u\" || option == \"--user\") && !it.peekNext().startsWith(\"-\")) {\n  246 |             options->user = it.next();\n  247 |         } else if ((option == \"-p\" || option == \"--password\") && !it.peekNext().startsWith(\"-\")) {\n  248 |             options->password = it.next();\n  249 |         } else if (option == \"--exclude\" && !it.peekNext().startsWith(\"-\")) {\n  250 |             options->exclude = it.next();\n  251 |         } else if (option == \"--unsyncedfolders\" && !it.peekNext().startsWith(\"-\")) {\n  252 |             options->unsyncedfolders = it.next();\n  253 |         } else if (option == \"--max-sync-retries\" && !it.peekNext().startsWith(\"-\")) {\n  254 |             options->restartTimes = it.next().toInt();\n  255 |         } else if (option == \"--uplimit\" && !it.peekNext().startsWith(\"-\")) {\n  256 |             options->uplimit = it.next().toInt() * 1000;\n  257 |         } else if (option == \"--downlimit\" && !it.peekNext().startsWith(\"-\")) {\n  258 |             options->downlimit = it.next().toInt() * 1000;\n  259 |         } else if (option == \"--logdebug\") {\n  260 |             Logger::instance()->setLogFile(\"-\");\n  261 |             Logger::instance()->setLogDebug(true);\n  262 |         } else if (option == \"--path\" && !it.peekNext().startsWith(\"-\")) {\n  263 |             options->remotePath = it.next();\n  264 |         }"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"In FolderMan::addFolder, after `addFolderInternal(...)` returns, `folder->setSaveBackwardsCompatible(oneAccountOnly)` is called unconditionally at line 1428 BEFORE the `if (folder)` null check at line 1430. addFolderInternal can return nullptr (e.g. createVfsFromPlugin failures upstream), so this is a null-pointer dereference. Also note the redundant duplicate setSaveBackwardsCompatible call inside the if-block.","fix":"Move the first setSaveBackwardsCompatible() call inside the `if (folder)` block (and drop the duplicate), or early-return when folder is null.","locations":[{"ref":"src/gui/folderman.cpp:1419-1435","code":" 1419 |     auto folder = addFolderInternal(definition, accountState, std::move(vfs));\n 1420 | \n 1421 |     // Migration: The first account that's configured for a local folder shall\n 1422 |     // be saved in a backwards-compatible way.\n 1423 |     const auto folderList = FolderMan::instance()->map();\n 1424 |     const auto oneAccountOnly = std::none_of(folderList.cbegin(), folderList.cend(), [folder](const auto *other) {\n 1425 |         return other != folder && other->cleanPath() == folder->cleanPath();\n 1426 |     });\n 1427 | \n 1428 |     folder->setSaveBackwardsCompatible(oneAccountOnly);\n 1429 | \n 1430 |     if (folder) {\n 1431 |         folder->setSaveBackwardsCompatible(oneAccountOnly);\n 1432 |         folder->saveToSettings();\n 1433 |         emit folderSyncStateChange(folder);\n 1434 |         emit folderListChanged(_folderMap);\n 1435 |     }"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"FolderStatusDelegate::sizeHint (line 58) and paint (line 165) call `dynamic_cast<const FolderStatusModel *>(index.model())->classify(index)` without checking the dynamic_cast result. If the view is ever driven by a proxy model or any non-FolderStatusModel, the cast returns nullptr and this crashes. The rest of the file assumes the concrete model unconditionally.","fix":"Null-check the dynamic_cast result and fall back to QStyledItemDelegate default behaviour when it is null.","locations":[{"ref":"src/gui/folderstatusdelegate.cpp:58","code":"   58 |     auto classif = dynamic_cast<const FolderStatusModel *>(index.model())->classify(index);"},{"ref":"src/gui/folderstatusdelegate.cpp:165","code":"  165 |     if (dynamic_cast<const FolderStatusModel *>(index.model())->classify(index) != FolderStatusModel::RootFolder) {"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"FolderStatusModel::data for the SubFolder case does `static_cast<SubFolderInfo *>(index.internalPointer())->_subs.at(index.row())` with no null check on internalPointer and using QList::at() which asserts/UB on out-of-range index. Elsewhere (infoForIndex) the model carefully bounds-checks index.row() against _subs.size(); this code path does not, so a stale/invalid index (e.g. after model reset while a delegate still references an old index) can read out of bounds.","fix":"Use infoForIndex(index) (which bounds-checks and null-checks) instead of the raw cast + .at(index.row()).","locations":[{"ref":"src/gui/folderstatusmodel.cpp:160-208","code":"  160 |     case SubFolder: {\n  161 |         const auto &subfolderInfo = static_cast<SubFolderInfo *>(index.internalPointer())->_subs.at(index.row());\n  162 |         const auto supportsSelectiveSync = subfolderInfo._folder && subfolderInfo._folder->supportsSelectiveSync();\n  163 | \n  164 |         switch (role) {\n  165 |         case Qt::DisplayRole: {\n  166 |             //: Example text: \"File.txt (23KB)\"\n  167 |             const auto &xParent = static_cast<SubFolderInfo *>(index.internalPointer());\n  168 |             const auto suffix = (subfolderInfo._isNonDecryptable && subfolderInfo._checked && (!xParent || !xParent->isEncrypted()))\n  169 |                 ? QStringLiteral(\" - \") + tr(\"Could not decrypt!\")\n  170 |                 : QString{};\n  171 |             return subfolderInfo._size < 0 ? QString(subfolderInfo._name + suffix) : QString(tr(\"%1 (%2)\").arg(subfolderInfo._name, Utility::octetsToString(subfolderInfo._size)) + suffix);\n  172 |         }\n  173 |         case Qt::ToolTipRole:\n  174 |             return QString(QLatin1String(\"<qt>\") + Utility::escape(subfolderInfo._size < 0 ? subfolderInfo._name : tr(\"%1 (%2)\").arg(subfolderInfo._name, Utility::octetsToString(subfolderInfo._size))) + QLatin1String(\"<\/qt>\"));\n  175 |         case Qt::CheckStateRole:\n  176 |             if (supportsSelectiveSync) {\n  177 |                 return subfolderInfo._checked;\n  178 |             } else {\n  179 |                 return {};\n  180 |             }\n  181 |         case Qt::DecorationRole: {\n  182 |             if (subfolderInfo._isNonDecryptable && subfolderInfo._checked) {\n  183 |                 return QIcon(QLatin1String(\":/client/theme/lock-broken.svg\"));\n  184 |             }\n  185 |             if (subfolderInfo.isEncrypted()) {\n  186 |                 return QIcon(QLatin1String(\":/client/theme/lock-https.svg\"));\n  187 |             } else if (subfolderInfo._size > 0 && isAnyAncestorEncrypted(index)) {\n  188 |                 return QIcon(QLatin1String(\":/client/theme/lock-broken.svg\"));\n  189 |             }\n  190 |             return _fileIconProvider.icon(subfolderInfo._isExternal ? QFileIconProvider::Network : QFileIconProvider::Folder);\n  191 |         }\n  192 |         case Qt::ForegroundRole:\n  193 |             if (subfolderInfo._isUndecided || (subfolderInfo._isNonDecryptable && subfolderInfo._checked)) {\n  194 |                 return QColor(Qt::red);\n  195 |             }\n  196 |             break;\n  197 |         case FileIdRole:\n  198 |             return subfolderInfo._fileId;\n  199 |         case FolderStatusDelegate::FolderPathRole:\n  200 |         {\n  201 |             if (const auto folder = subfolderInfo._folder) {\n  202 |                 return {folder->path() + subfolderInfo._path};\n  203 |             }\n  204 |             return {};\n  205 |         }\n  206 |         }\n  207 |         return {};\n  208 |     }"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","description":"FileActionsModel::createRequest(int row) and processRequest() index _fileActions.at(row) with a row that comes from QML / a stored job property. createRequest is Q_INVOKABLE from QML so an out-of-range row is undefined behaviour. More realistically, parseEndpoints()/resetActions() can clear or shrink _fileActions while a JsonApiJob created by createRequest() is still in flight; when the reply arrives processRequest() reads sender()->property(rowC) and calls _fileActions.at(row) with a now-stale index, causing OOB access/crash.","fix":"Bounds-check row against _fileActions.size() in createRequest and processRequest; capture the needed action data by value when starting the job instead of re-indexing after the async reply.","locations":[{"ref":"src/gui/integration/fileactionsmodel.cpp:344-366","code":"  344 | void FileActionsModel::createRequest(const int row)\n  345 | {\n  346 |     if (!_accountState) {\n  347 |         qCWarning(lcFileActions) << \"No account state for\"\n  348 |                                  << _localPath;\n  349 |         return;\n  350 |     }\n  351 | \n  352 |     auto job = new JsonApiJob(_accountState->account(),\n  353 |                                 _fileActions.at(row).url,\n  354 |                                 this);\n  355 |     connect(job, &JsonApiJob::jsonReceived,\n  356 |             this, &FileActionsModel::processRequest);\n  357 |     for (const auto &param : std::as_const(_fileActions.at(row).params)) {\n  358 |         QUrlQuery query;\n  359 |         query.addQueryItem(param.name, param.value);\n  360 |         job->addQueryParams(query);\n  361 |     }\n  362 |     const auto verb = job->stringToVerb(_fileActions.at(row).method);\n  363 |     job->setVerb(verb);\n  364 |     job->setProperty(rowC, row);\n  365 |     job->start();\n  366 | }"},{"ref":"src/gui/integration/fileactionsmodel.cpp:368-371","code":"  368 | void FileActionsModel::processRequest(const QJsonDocument &json, int statusCode)\n  369 | {\n  370 |     const auto row = sender()->property(rowC).toInt();\n  371 |     const auto fileAction = _fileActions.at(row).name;"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","description":"getDirectEditorForLocalFile() dereferences fileData.folder->accountState()->account() on the very first line, BEFORE the null check `if (fileData.folder ...)` on the next line. FileData::get() returns a FileData with folder == nullptr for any path outside a sync root, so calling this with such a path is an immediate null-pointer dereference. The null check that follows is misordered/dead. Current callers (command_EDIT, command_GET_MENU_ITEMS) happen to guard folder beforehand, but the function is unsafe by itself and reachable via untrusted local socket input.","fix":"Move the capabilities lookup inside the `if (fileData.folder && fileData.folder->accountState()->isConnected())` block, after the null check.","locations":[{"ref":"src/gui/socketapi/socketapi.cpp:1505-1510","code":" 1505 | DirectEditor* SocketApi::getDirectEditorForLocalFile(const QString &localFile)\n 1506 | {\n 1507 |     FileData fileData = FileData::get(localFile);\n 1508 |     auto capabilities = fileData.folder->accountState()->account()->capabilities();\n 1509 | \n 1510 |     if (fileData.folder && fileData.folder->accountState()->isConnected()) {"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","description":"Possible division/modulo by zero in slideshow navigation. nextSlide() computes `(_currentIndex + 1) % _labels.count()` and prevSlide() uses `_labels.count()` as a fallback index; if no slides have been added (_labels empty) the modulo divides by zero (crash) and the fallback index is invalid. The slideshow timer (timerEvent -> nextSlide) and the next/prev buttons can be triggered before addSlide() is ever called.","fix":"Guard both functions: `if (_labels.isEmpty()) return;` before computing indices.","locations":[{"ref":"src/gui/wizard/slideshow.cpp:114-124","code":"  114 | void SlideShow::nextSlide()\n  115 | {\n  116 |     setCurrentSlide((_currentIndex + 1) % _labels.count());\n  117 |     _reverse = false;\n  118 | }\n  119 | \n  120 | void SlideShow::prevSlide()\n  121 | {\n  122 |     setCurrentSlide((_currentIndex > 0 ? _currentIndex : _labels.count()) - 1);\n  123 |     _reverse = true;\n  124 | }"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","description":"Potential null dereference of QScreen. tryToSetWizardSize() calls `QGuiApplication::screenAt(window->pos())->geometry()` without checking the result. QGuiApplication::screenAt returns nullptr when the point is not on any screen (e.g. window positioned off-screen or between displays), causing a crash on `->geometry()`.","fix":"Fetch the screen into a local, fall back to QGuiApplication::primaryScreen() if null, then use its geometry.","locations":[{"ref":"src/gui/wizard/webviewpage.cpp:69-72","code":"   69 |     const auto window = _ocWizard->window();\n   70 |     const auto screenGeometry = QGuiApplication::screenAt(window->pos())->geometry();\n   71 |     const auto windowWidth = screenGeometry.width();\n   72 |     const auto windowHeight = screenGeometry.height();"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","description":"EncryptedFolderMetadataHandler::slotFolderEncryptedIdReceived() calls list.first() and indexes job->_folderInfos.value(list.first()) without checking that the directoryListingSubfolders list is non-empty. An empty PROPFIND result (e.g. server returns no subfolders) triggers undefined behaviour / crash on QStringList::first().","fix":"Guard for `list.isEmpty()` (and a null `job`) and emit fetchFinished with an error before accessing list.first().","locations":[{"ref":"src/libsync/encryptedfoldermetadatahandler.cpp:142-149","code":"  142 | void EncryptedFolderMetadataHandler::slotFolderEncryptedIdReceived(const QStringList &list)\n  143 | {\n  144 |     qCDebug(lcFetchAndUploadE2eeFolderMetadataJob) << \"Received id of folder. Fetching metadata...\";\n  145 |     const auto job = qobject_cast<LsColJob *>(sender());\n  146 |     const auto &folderInfo = job->_folderInfos.value(list.first());\n  147 |     _folderId = folderInfo.fileId;\n  148 |     startFetchMetadata();\n  149 | }"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","description":"Theme::wizardApplicationLogo() in the non-custom-logo branded branch contains 'const auto size = Theme::isHidpi() ?: 200 : 100;' which is a malformed conditional expression (GNU elvis ?: followed by a dangling : 100). This does not compile when built branded without APPLICATION_WIZARD_USE_CUSTOM_LOGO; the intent was a normal ternary 'isHidpi() ? 200 : 100'.","fix":"Replace with: const auto size = Theme::isHidpi() ? 200 : 100;","locations":[{"ref":"src/libsync/theme.cpp:799","code":"  799 |     const auto size = Theme::isHidpi() ?: 200 : 100;"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","description":"VfsCfApi::createPlaceholders dereferences items[0] without first checking that the list is non-empty. An empty items list (a callable public API) causes an out-of-bounds QList access and a crash.","fix":"Guard at the top: `if (items.isEmpty()) { return {}; }` before accessing items[0].","locations":[{"ref":"src/libsync/vfs/cfapi/vfs_cfapi.cpp:214-216","code":"  214 | Result<void, QString> VfsCfApi::createPlaceholders(const QList<SyncFileItemPtr> &items)\n  215 | {\n  216 |     const auto fileInfo = QFileInfo(_setupParams.filesystemPath + items[0]->_file);"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","description":"xattrGet resizes the result to count-1 unconditionally. getxattr returns the raw byte length; if an attribute has a zero-length value (count == 0), QByteArray::resize(-1) is invoked, which is invalid and aborts/asserts. The -1 also silently assumes every stored value is null-terminated (only true for values written by this codebase via xattrSet).","fix":"Clamp the new size: `result.resize(count > 0 ? static_cast<int>(count) - 1 : 0);` and only subtract 1 when a trailing NUL is actually expected.","locations":[{"ref":"src/libsync/vfs/xattr/xattrwrapper_linux.cpp:24-27","code":"   24 |     const auto count = getxattr(path.constData(), name.constData(), result.data(), bufferSize);\n   25 |     if (count >= 0) {\n   26 |         result.resize(static_cast<int>(count) - 1);\n   27 |         return result;"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","description":"Application constructor (line 494) and slotParseMessage (line 858) call `AccountSetupCommandLineManager::instance()->isCommandLineParsed()` without a null check, even though the same class is null-checked at line 364 (`if (AccountSetupCommandLineManager::instance())`) and destroyed via AccountSetupCommandLineManager::destroy() at lines 497/861. The inconsistent guarding suggests instance() can return null (after destroy), which would null-deref on a second-instance MSG_PARSEOPTIONS path.","fix":"Null-check instance() before calling isCommandLineParsed() in both places, matching line 364.","locations":[{"ref":"src/gui/application.cpp:494-497","code":"  494 |     if (AccountSetupCommandLineManager::instance()->isCommandLineParsed()) {\n  495 |         AccountSetupCommandLineManager::instance()->setupAccountFromCommandLine();\n  496 |     }\n  497 |     AccountSetupCommandLineManager::destroy();"},{"ref":"src/gui/application.cpp:858-861","code":"  858 |         if (AccountSetupCommandLineManager::instance()->isCommandLineParsed()) {\n  859 |             AccountSetupCommandLineManager::instance()->setupAccountFromCommandLine();\n  860 |         }\n  861 |         AccountSetupCommandLineManager::destroy();"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","description":"WebFlowCredentials::slotReadPasswordJobDone() does `auto job = qobject_cast<ReadPasswordJob*>(incomingJob); QKeychain::Error error = job->error();` with no null check. If the finished signal ever originates from a Job that is not a ReadPasswordJob the cast yields nullptr and job->error() dereferences null. Same unchecked-cast pattern appears in InvalidFilenameDialog::onMoveJobFinished (qobject_cast<MoveJob*>(sender())->reply()).","fix":"Null-check the qobject_cast result before dereferencing.","locations":[{"ref":"src/gui/creds/webflowcredentials.cpp:536-538","code":"  536 | void WebFlowCredentials::slotReadPasswordJobDone(Job *incomingJob) {\n  537 |     auto job = qobject_cast<ReadPasswordJob *>(incomingJob);\n  538 |     QKeychain::Error error = job->error();"},{"ref":"src/gui/invalidfilenamedialog.cpp:256-259","code":"  256 | void InvalidFilenameDialog::onMoveJobFinished()\n  257 | {\n  258 |     const auto job = qobject_cast<MoveJob *>(sender());\n  259 |     const auto error = job->reply()->error();"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","description":"settingsViewWidget() dereferences rootObject() without a null check. `settingsViewWidget->rootObject()->setProperty(...)` will crash if the QML at fpSettingsQmlPath fails to load (e.g. resource missing or QML error), in which case rootObject() returns nullptr.","fix":"Check `if (const auto root = settingsViewWidget->rootObject()) { root->setProperty(...); }` and log/handle the load failure otherwise.","locations":[{"ref":"src/gui/macOS/fileprovidersettingscontroller_mac.mm:354-358","code":"  354 |     const auto settingsViewWidget = new QQuickWidget(Systray::instance()->trayEngine(), parent);\n  355 |     settingsViewWidget->setResizeMode(resizeMode);\n  356 |     settingsViewWidget->setSource(QUrl(fpSettingsQmlPath));\n  357 |     settingsViewWidget->rootObject()->setProperty(fpAccountUserIdAtHostProp, accountUserIdAtHost);\n  358 |     return settingsViewWidget;"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","description":"ownCloudGui::slotTrayClicked dereferences `UserModel::instance()->currentUser()->hasLocalFolder()` without checking currentUser() for null. On a double-click before any account/user exists (or transiently during account teardown) currentUser() can be null, causing a crash.","fix":"Guard: `if (reason == QSystemTrayIcon::DoubleClick && UserModel::instance()->currentUser() && UserModel::instance()->currentUser()->hasLocalFolder())`.","locations":[{"ref":"src/gui/owncloudgui.cpp:228","code":"  228 |     if (reason == QSystemTrayIcon::DoubleClick && UserModel::instance()->currentUser()->hasLocalFolder()) {"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","description":"AsyncImageResponse constructor calls `idSplit.last()` after splitting `id` with Qt::SkipEmptyParts. If `id` is non-empty but contains only '/' characters, idSplit is empty and last() dereferences past the end (QList::last on empty list is undefined behavior / assert). The empty-id case is handled earlier but the all-separators case is not.","fix":"Guard with `if (!idSplit.isEmpty())` before calling idSplit.last().","locations":[{"ref":"src/gui/tray/asyncimageresponse.cpp:24-31","code":"   24 |     auto actualId = id;\n   25 |     const auto idSplit = id.split('/'_L1, Qt::SkipEmptyParts);\n   26 |     const auto color = QColor(idSplit.last());\n   27 | \n   28 |     if(color.isValid()) {\n   29 |         _svgRecolor = color;\n   30 |         actualId.remove(\"/\" % idSplit.last());\n   31 |     }"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"low","description":"UnifiedSearchResultsListModel::data uses `_results.at(index.row())` guarded only by a Q_ASSERT (compiled out in release). QVector::at performs no bounds clamping; an invalid/stale row in a release build is undefined behavior. The model lacks an explicit isValid()/range check before access.","fix":"Add an explicit `if (!checkIndex(index, CheckIndexOption::IndexIsValid)) return {};` (or row range check) at the top of data().","locations":[{"ref":"src/gui/tray/unifiedsearchresultslistmodel.cpp:194-227","code":"  194 | QVariant UnifiedSearchResultsListModel::data(const QModelIndex &index, int role) const\n  195 | {\n  196 |     Q_ASSERT(checkIndex(index, QAbstractItemModel::CheckIndexOption::IndexIsValid));\n  197 | \n  198 |     switch (role) {\n  199 |     case ProviderNameRole:\n  200 |         return _results.at(index.row())._providerName;\n  201 |     case ProviderIdRole: \n  202 |         return _results.at(index.row())._providerId;\n  203 |     case DarkImagePlaceholderRole:\n  204 |         return imagePlaceholderUrlForProviderId(_results.at(index.row())._providerId, true);\n  205 |     case LightImagePlaceholderRole:\n  206 |         return imagePlaceholderUrlForProviderId(_results.at(index.row())._providerId, false);\n  207 |     case DarkIconsRole:\n  208 |         return _results.at(index.row())._darkIcons;\n  209 |     case LightIconsRole:\n  210 |         return _results.at(index.row())._lightIcons;\n  211 |     case DarkIconsIsThumbnailRole:\n  212 |         return _results.at(index.row())._darkIconsIsThumbnail;\n  213 |     case LightIconsIsThumbnailRole:\n  214 |         return _results.at(index.row())._lightIconsIsThumbnail;\n  215 |     case TitleRole:\n  216 |         return _results.at(index.row())._title;\n  217 |     case SublineRole:\n  218 |         return _results.at(index.row())._subline;\n  219 |     case ResourceUrlRole:\n  220 |         return _results.at(index.row())._resourceUrl;\n  221 |     case RoundedRole:\n  222 |         return _results.at(index.row())._isRounded;\n  223 |     case TypeRole:\n  224 |         return _results.at(index.row())._type;\n  225 |     case TypeAsStringRole:\n  226 |         return UnifiedSearchResult::typeAsString(_results.at(index.row())._type);\n  227 |     }"}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","description":"OCUpdater network reply slots qobject_cast<QNetworkReply*>(sender()) and then dereference the result without a null check (slotVersionInfoArrived calls reply->error()/readAll after reply->deleteLater(); slotDownloadFinished and slotWriteFile likewise). If ever invoked with a non-reply sender these are null derefs. slotWriteFile also assumes _file is non-null.","fix":"Guard each qobject_cast result (and _file) before use.","locations":[{"ref":"src/gui/updater/ocupdater.cpp:262-272","code":"  262 | void OCUpdater::slotVersionInfoArrived()\n  263 | {\n  264 |     qCDebug(lcUpdater) << \"received a reply\";\n  265 |     _timeoutWatchdog->stop();\n  266 |     auto *reply = qobject_cast<QNetworkReply *>(sender());\n  267 |     reply->deleteLater();\n  268 |     if (reply->error() != QNetworkReply::NoError) {\n  269 |         qCWarning(lcUpdater) << \"Failed to reach version check url: \" << reply->errorString();\n  270 |         setDownloadState(DownloadTimedOut);\n  271 |         return;\n  272 |     }"},{"ref":"src/gui/updater/ocupdater.cpp:298-304","code":"  298 | void NSISUpdater::slotWriteFile()\n  299 | {\n  300 |     auto *reply = qobject_cast<QNetworkReply *>(sender());\n  301 |     if (_file->isOpen()) {\n  302 |         _file->write(reply->readAll());\n  303 |     }\n  304 | }"},{"ref":"src/gui/updater/ocupdater.cpp:334-341","code":"  334 | void NSISUpdater::slotDownloadFinished()\n  335 | {\n  336 |     auto *reply = qobject_cast<QNetworkReply *>(sender());\n  337 |     reply->deleteLater();\n  338 |     if (reply->error() != QNetworkReply::NoError) {\n  339 |         setDownloadState(DownloadFailed);\n  340 |         return;\n  341 |     }"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","description":"HttpLogger::requestVerb() falls through to Q_UNREACHABLE() for QNetworkAccessManager::UnknownOperation. If a reply is ever created/logged with UnknownOperation, this aborts the process (in release Q_UNREACHABLE is UB). UnknownOperation is a real enum value that Qt may report.","fix":"Return an empty/placeholder QByteArray for UnknownOperation instead of Q_UNREACHABLE().","locations":[{"ref":"src/libsync/httplogger.cpp:124-128","code":"  124 |     case QNetworkAccessManager::UnknownOperation:\n  125 |         break;\n  126 |     }\n  127 |     Q_UNREACHABLE();\n  128 | }"}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","description":"pathForHandle asserts result < MAX_PATH but does not handle the failure case: GetFinalPathNameByHandle returns 0 on error or a value >= MAX_PATH if the buffer is too small, in which case `buffer` is not null-terminated and std::wstring(buffer) reads out of bounds. In release builds (asserts disabled) this is an OOB read.","fix":"Check the return value: if it is 0 or >= MAX_PATH, return an empty string (or retry with a larger buffer) instead of constructing the wstring.","locations":[{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:661-667","code":"  661 | std::wstring pathForHandle(const OCC::CfApiWrapper::FileHandle &handle)\n  662 | {\n  663 |     wchar_t buffer[MAX_PATH];\n  664 |     const qint64 result = GetFinalPathNameByHandle(handle.get(), buffer, MAX_PATH, VOLUME_NAME_DOS);\n  665 |     Q_ASSERT(result < MAX_PATH);\n  666 |     return std::wstring(buffer);\n  667 | }"}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"low","description":"PlaceHolderInfo::pinState() contains `if (!this) return {};`, which is undefined behavior: calling a non-static member function through a null pointer is UB before the check can execute, and modern compilers may optimize the check away. The function is also effectively dead within this slice (callers read info->PinState directly after an explicit `if (info)` check), so the null-this guard is both unsafe and unnecessary.","fix":"Remove the `if (!this)` check; callers must verify the PlaceHolderInfo via operator bool() before calling pinState().","locations":[{"ref":"src/libsync/vfs/cfapi/cfapiwrapper.cpp:719-726","code":"  719 | OCC::Optional<OCC::PinState> OCC::CfApiWrapper::PlaceHolderInfo::pinState() const\n  720 | {\n  721 |     if (!this) {\n  722 |         return {};\n  723 |     }\n  724 | \n  725 |     return cfPinStateToPinState(get()->PinState);\n  726 | }"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"AccountState::checkConnectivity() constructs `ConnectionValidator(AccountStatePtr(this), ...)`. AccountState derives from QSharedData and is normally owned via QExplicitlySharedDataPointer (AccountStatePtr). Wrapping the raw `this` in a fresh AccountStatePtr creates a second, independent refcount over the same object. When that temporary AccountStatePtr chain (held by ConnectionValidator) drops its last reference, it can delete the AccountState even though AccountManager still holds it via its own AccountStatePtr, leading to a double-free / use-after-free of the AccountState.","fix":"Do not synthesize a new AccountStatePtr from raw `this`. Pass the existing shared pointer (e.g. obtained from AccountManager) or change ConnectionValidator to take a QPointer/raw AccountState* that it does not own.","locations":[{"ref":"src/gui/accountstate.cpp:318-319","code":"  318 |     auto *conValidator = new ConnectionValidator(AccountStatePtr(this), _connectionErrors);\n  319 |     _connectionValidator = conValidator;"}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"CloudProviderWrapper shares a single global `actionGroup` (file-scope static) across all instances. getActionGroup() does g_clear_object(&actionGroup) and recreates it bound to `this`, and slotSyncPausedChanged() operates on that global. With more than one sync folder, every wrapper's actions/state target the LAST-created wrapper. Worse, the destructor does g_object_unref(actionGroup); actionGroup = nullptr — so destroying one wrapper releases and nulls the GObject still referenced by the others, then their own destructors call g_object_unref(nullptr) / operate on a freed object.","fix":"Make the GSimpleActionGroup a per-instance member (e.g. _actionGroup) instead of a global, create/own/unref it per wrapper, and reference the per-instance group in slotSyncPausedChanged().","locations":[{"ref":"src/gui/cloudproviders/cloudproviderwrapper.cpp:26","code":"   26 | GSimpleActionGroup *actionGroup = nullptr;"},{"ref":"src/gui/cloudproviders/cloudproviderwrapper.cpp:65-72","code":"   65 | CloudProviderWrapper::~CloudProviderWrapper()\n   66 | {\n   67 |     g_object_unref(_cloudProviderAccount);\n   68 |     g_object_unref(_mainMenu);\n   69 |     g_object_unref(actionGroup);\n   70 |     actionGroup = nullptr;\n   71 |     g_object_unref(_recentMenu);\n   72 | }"},{"ref":"src/gui/cloudproviders/cloudproviderwrapper.cpp:368-386","code":"  368 | GActionGroup* CloudProviderWrapper::getActionGroup()\n  369 | {\n  370 |     g_clear_object (&actionGroup);\n  371 |     actionGroup = g_simple_action_group_new ();\n  372 |     g_action_map_add_action_entries (G_ACTION_MAP (actionGroup), actions, G_N_ELEMENTS (actions), this);\n  373 |     bool state = _folder->syncPaused();\n  374 |     GAction *pause = g_action_map_lookup_action(G_ACTION_MAP(actionGroup), \"pause\");\n  375 |     g_simple_action_set_state(G_SIMPLE_ACTION(pause), g_variant_new_boolean(state));\n  376 |     return G_ACTION_GROUP (g_object_ref (actionGroup));\n  377 | }\n  378 | \n  379 | void CloudProviderWrapper::slotSyncPausedChanged(Folder *folder, bool state)\n  380 | {\n  381 |     Q_UNUSED(folder);\n  382 |     _paused = state;\n  383 |     GAction *pause = g_action_map_lookup_action(G_ACTION_MAP(actionGroup), \"pause\");\n  384 |     g_simple_action_set_state (G_SIMPLE_ACTION(pause), g_variant_new_boolean(state));\n  385 |     updatePauseStatus();\n  386 | }"}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"Lambda connected as a slot captures the enclosing function's locals by reference (`[&, activityIndex]`). The lambda is stored and invoked later when TalkReply emits replyMessageSent (asynchronously, after the network reply). By then slotSendReplyMessage has returned and any by-reference captures are dangling. Only `activityIndex` is captured by value; `this` is captured via `&`. Additionally the connect() is made AFTER sendReplyMessage() is invoked, so if the reply were ever synchronous the signal would be missed.","fix":"Capture explicitly by value: `connect(talkReply, &TalkReply::replyMessageSent, this, [this, activityIndex](const QString &message){ _activityModel->setReplyMessageSent(activityIndex, message); });` and connect before calling sendReplyMessage.","locations":[{"ref":"src/gui/tray/usermodel.cpp:1643-1650","code":" 1643 | void User::slotSendReplyMessage(const int activityIndex, const QString &token, const QString &message, const QString &replyTo)\n 1644 | {\n 1645 |     QPointer<TalkReply> talkReply = new TalkReply(_account.data(), this);\n 1646 |     talkReply->sendReplyMessage(token, message, replyTo);\n 1647 |     connect(talkReply, &TalkReply::replyMessageSent, this, [&, activityIndex](const QString &message) {\n 1648 |         _activityModel->setReplyMessageSent(activityIndex, message);\n 1649 |     });\n 1650 | }"}]},{"id":"UAF_4","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"Dangling reference captured into a long-lived connection. In initializePage() a QTimer::singleShot lambda creates a local `ConfigFile cfg;` and then connects an inner lambda to OwncloudWizard::accepted capturing `[&]` (i.e. `cfg` by reference). The inner lambda outlives the outer lambda's stack frame, so when the `accepted` signal fires later, `cfg` is a dangling reference and `cfg.setOverrideServerUrl({})` / `cfg.setOverrideLocalDir({})` operate on a destroyed object.","fix":"Do not capture the local ConfigFile by reference into a longer-lived lambda. Either construct a fresh ConfigFile inside the accepted-handler lambda, or capture by value, and avoid `[&]`.","locations":[{"ref":"src/gui/wizard/owncloudadvancedsetuppage.cpp:217-228","code":"  217 |     if (Theme::instance()->forceOverrideServerUrl()) {\n  218 |         QTimer::singleShot(0, this, [this]() {\n  219 |             ConfigFile cfg;\n  220 |             connect(_ocWizard, &QDialog::accepted, [&]() {\n  221 |                 cfg.setOverrideServerUrl({});\n  222 |                 cfg.setOverrideLocalDir({});\n  223 |             });\n  224 |             if (!cfg.overrideLocalDir().isEmpty()) {\n  225 |                 _ocWizard->accept();\n  226 |             }\n  227 |         });\n  228 |     }"}]},{"id":"UAF_5","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"In VfsCfApi::createPlaceholders the local fileInfo is std::move'd into emplace_back as the first argument while fileInfo.fileName() and QDir::toNativeSeparators(fileInfo.fileName()) are read as later arguments to the same call. The order of evaluation of function arguments is unspecified in C++, so fileInfo may already be moved-from (left in a valid-but-unspecified state) when fileName() is read. This can produce empty/garbage relative file names and native paths for placeholders, corrupting the on-demand population entries.","fix":"Compute the dependent values into named locals before the move, e.g. `auto name = fileInfo.fileName(); auto nativeName = QDir::toNativeSeparators(name).toStdWString(); allPlaceholdersInfo.emplace_back(std::move(fileInfo), name, std::move(nativeName), ...);`","locations":[{"ref":"src/libsync/vfs/cfapi/vfs_cfapi.cpp:220-223","code":"  220 |     for (const auto &oneItem : items) {\n  221 |         auto fileInfo = QFileInfo(_setupParams.filesystemPath + oneItem->_file);\n  222 |         allPlaceholdersInfo.emplace_back(std::move(fileInfo), fileInfo.fileName(), QDir::toNativeSeparators(fileInfo.fileName()).toStdWString(), oneItem->_fileId, oneItem->_modtime, oneItem->_size);\n  223 |     }"}]},{"id":"UAF_6","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"Folder::slotFilesLockReleased connects two one-shot lambdas to Account::lockFileSuccess and Account::lockFileError. The success lambda only `disconnect(_officeFileLockReleaseUnlockSuccess)` — it never disconnects the failure connection, and the failure lambda only disconnects itself. So after a successful unlock the failure connection lingers and will fire on the next unrelated lockFileError, calling a stale captured `remoteFilePath`. Compare slotLockedFilesFound (lines 820-830) which correctly disconnects BOTH connections in each lambda.","fix":"In each lambda disconnect both _officeFileLockReleaseUnlockSuccess and _officeFileLockReleaseUnlockFailure, mirroring slotLockedFilesFound.","locations":[{"ref":"src/gui/folder.cpp:769-777","code":"  769 |         _officeFileLockReleaseUnlockSuccess = connect(_accountState->account().data(), &Account::lockFileSuccess, this, [this, remoteFilePath]() {\n  770 |             disconnect(_officeFileLockReleaseUnlockSuccess);\n  771 |             qCDebug(lcFolder) << \"Unlocking an office file succeeded\" << remoteFilePath;\n  772 |             startSync();\n  773 |         });\n  774 |         _officeFileLockReleaseUnlockFailure = connect(_accountState->account().data(), &Account::lockFileError, this, [this, remoteFilePath](const QString &message) {\n  775 |             disconnect(_officeFileLockReleaseUnlockFailure);\n  776 |             qCWarning(lcFolder) << \"Failed to unlock a file:\" << remoteFilePath << message;\n  777 |         });"}]},{"id":"UAF_7","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"TalkReply::sendReplyMessage connects the JsonApiJob::jsonReceived handler with a `[&]` capture. The lambda is invoked asynchronously when the network reply arrives, long after sendReplyMessage has returned, so any by-reference capture of locals/params is a dangling reference (only `this` is needed here, but `[&]` also captures the function arguments). Should capture `this` (or nothing) explicitly by value.","fix":"Use `[this]` instead of `[&]` in the lambda capture list.","locations":[{"ref":"src/gui/tray/talkreply.cpp:34-43","code":"   34 |     QObject::connect(apiJob, &JsonApiJob::jsonReceived, this, [&](const QJsonDocument &response, const int statusCode) {\n   35 |         if(statusCode != 200) {\n   36 |             qCWarning(lcTalkReply) << \"Status code\" << statusCode;\n   37 |         }\n   38 | \n   39 |         const auto responseObj = response.object().value(\"ocs\"_L1).toObject().value(\"data\"_L1).toObject();\n   40 |         emit replyMessageSent(responseObj.value(\"message\"_L1).toString());\n   41 | \n   42 |         deleteLater();\n   43 |     });"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"ClientStatusReportingDatabase::deleteClientStatusReportingRecords() is the only DB accessor that does NOT take QMutexLocker(&_mutex), unlike getClientStatusReportingRecords/setClientStatusReportingRecord/get/setStatusNamesHash. It executes a DELETE on the shared default QSqlDatabase connection and is called from reportToServerSentSuccessfully() (network reply callback) and updateStatusNamesHash(), which can race with concurrently-locked readers/writers on the same connection.","fix":"Add QMutexLocker locker(&_mutex); at the start of deleteClientStatusReportingRecords().","locations":[{"ref":"src/libsync/clientstatusreportingdatabase.cpp:89-98","code":"   89 | Result<void, QString> ClientStatusReportingDatabase::deleteClientStatusReportingRecords() const\n   90 | {\n   91 |     QSqlQuery query;\n   92 |     if (!query.prepare(QStringLiteral(\"DELETE FROM clientstatusreporting\")) || !query.exec()) {\n   93 |         const auto errorMessage = query.lastError().text();\n   94 |         qCWarning(lcClientStatusReportingDatabase) << \"Could not delete records from clientstatusreporting:\" << errorMessage;\n   95 |         return errorMessage;\n   96 |     }\n   97 |     return {};\n   98 | }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"DiscoverySingleLocalDirectoryJob::run() executes on a QThreadPool worker thread (started via pool->start in startAsyncLocalQuery) yet emits itemDiscovered with a freshly created SyncFileItemPtr and reads _localPath/_vfs that are owned/used by the main-thread discovery objects. The 'static QTextCodec *codec' initialization inside run() is also not thread-safe across the first concurrent invocations (multiple local-dir jobs can run in parallel), risking a data race on the static pointer initialization path beyond the C++ guaranteed-once guard if compiled without thread-safe statics.","fix":"Ensure the codec is obtained once on the main thread (or use a function-local with guaranteed thread-safe init) and confirm all cross-thread emissions use queued connections; avoid touching shared discovery state directly from the worker.","locations":[{"ref":"src/libsync/discoveryphase.cpp:346-423","code":"  346 | void DiscoverySingleLocalDirectoryJob::run() {\n  347 |     QString localPath = _localPath;\n  348 |     if (localPath.endsWith('/')) // Happens if _currentFolder._local.isEmpty()\n  349 |         localPath.chop(1);\n  350 | \n  351 |     auto dh = csync_vio_local_opendir(localPath);\n  352 |     if (!dh) {\n  353 |         qCInfo(lcDiscovery) << \"Error while opening directory\" << (localPath) << errno;\n  354 |         QString errorString = tr(\"Error while opening directory %1\").arg(localPath);\n  355 |         if (errno == EACCES) {\n  356 |             errorString = tr(\"Directory not accessible on client, permission denied\");\n  357 |             emit finishedNonFatalError(errorString);\n  358 |             return;\n  359 |         } else if (errno == ENOENT) {\n  360 |             errorString = tr(\"Directory not found: %1\").arg(localPath);\n  361 |         } else if (errno == ENOTDIR) {\n  362 |             // Not a directory..\n  363 |             // Just consider it is empty\n  364 |             return;\n  365 |         }\n  366 |         emit finishedFatalError(errorString);\n  367 |         return;\n  368 |     }\n  369 | \n  370 |     QVector<LocalInfo> results;\n  371 |     while (true) {\n  372 |         errno = 0;\n  373 |         auto dirent = csync_vio_local_readdir(dh, _vfs, _fileSystemReliablePermissions);\n  374 |         if (!dirent)\n  375 |             break;\n  376 |         if (dirent->type == ItemTypeSkip)\n  377 |             continue;\n  378 |         LocalInfo i;\n  379 |         static QTextCodec *codec = QTextCodec::codecForName(\"UTF-8\");\n  380 |         ASSERT(codec);\n  381 |         QTextCodec::ConverterState state;\n  382 |         i.name = codec->toUnicode(dirent->path, dirent->path.size(), &state);\n  383 |         if (state.invalidChars > 0 || state.remainingChars > 0) {\n  384 |             emit childIgnored(true);\n  385 |             auto item = SyncFileItemPtr::create();\n  386 |             //item->_file = _currentFolder._target + i.name;\n  387 |             // FIXME ^^ do we really need to use _target or is local fine?\n  388 |             item->_file = _localPath + i.name;\n  389 |             item->_instruction = CSYNC_INSTRUCTION_IGNORE;\n  390 |             item->_status = SyncFileItem::NormalError;\n  391 |             item->_errorString = tr(\"Filename encoding is not valid\");\n  392 |             emit itemDiscovered(item);\n  393 |             continue;\n  394 |         }\n  395 |         i.modtime = dirent->modtime;\n  396 |         i.size = dirent->size;\n  397 |         i.inode = dirent->inode;\n  398 |         i.isDirectory = dirent->type == ItemTypeDirectory || dirent->type == ItemTypeVirtualDirectory;\n  399 |         i.isHidden = dirent->is_hidden;\n  400 |         i.isSymLink = dirent->type == ItemTypeSoftLink;\n  401 |         i.isVirtualFile = dirent->type == ItemTypeVirtualFile || dirent->type == ItemTypeVirtualFileDownload;\n  402 |         i.isMetadataMissing = dirent->is_metadata_missing;\n  403 |         i.isPermissionsInvalid = dirent->isPermissionsInvalid;\n  404 |         i.type = dirent->type;\n  405 |         results.push_back(i);\n  406 |     }\n  407 |     if (errno != 0) {\n  408 |         csync_vio_local_closedir(dh);\n  409 | \n  410 |         // Note: Windows vio converts any error into EACCES\n  411 |         qCWarning(lcDiscovery) << \"readdir failed for file in \" << localPath << \" - errno: \" << errno;\n  412 |         emit finishedFatalError(tr(\"Error while reading directory %1\").arg(localPath));\n  413 |         return;\n  414 |     }\n  415 | \n  416 |     errno = 0;\n  417 |     csync_vio_local_closedir(dh);\n  418 |     if (errno != 0) {\n  419 |         qCWarning(lcDiscovery) << \"closedir failed for file in \" << localPath << \" - errno: \" << errno;\n  420 |     }\n  421 | \n  422 |     emit finished(results);\n  423 | }"},{"ref":"src/libsync/discovery.cpp:2364-2414","code":" 2364 | void ProcessDirectoryJob::startAsyncLocalQuery()\n 2365 | {\n 2366 |     QString localPath = _discoveryData->_localDir + _currentFolder._local;\n 2367 |     auto localJob = new DiscoverySingleLocalDirectoryJob(_discoveryData->_account, localPath, _discoveryData->_syncOptions._vfs.data(), _discoveryData->_fileSystemReliablePermissions);\n 2368 | \n 2369 |     _discoveryData->_currentlyActiveJobs++;\n 2370 |     _pendingAsyncJobs++;\n 2371 | \n 2372 |     connect(localJob, &DiscoverySingleLocalDirectoryJob::itemDiscovered, _discoveryData, &DiscoveryPhase::itemDiscovered);\n 2373 | \n 2374 |     connect(localJob, &DiscoverySingleLocalDirectoryJob::childIgnored, this, [this](bool b) {\n 2375 |         _childIgnored = b;\n 2376 |     });\n 2377 | \n 2378 |     connect(localJob, &DiscoverySingleLocalDirectoryJob::finishedFatalError, this, [this](const QString &msg) {\n 2379 |         _discoveryData->_currentlyActiveJobs--;\n 2380 |         _pendingAsyncJobs--;\n 2381 |         if (_serverJob)\n 2382 |             _serverJob->abort();\n 2383 | \n 2384 |         emit _discoveryData->fatalError(msg, ErrorCategory::NetworkError);\n 2385 |     });\n 2386 | \n 2387 |     connect(localJob, &DiscoverySingleLocalDirectoryJob::finishedNonFatalError, this, [this](const QString &msg) {\n 2388 |         _discoveryData->_currentlyActiveJobs--;\n 2389 |         _pendingAsyncJobs--;\n 2390 | \n 2391 |         if (_dirItem) {\n 2392 |             _dirItem->_instruction = CSYNC_INSTRUCTION_IGNORE;\n 2393 |             _dirItem->_errorString = msg;\n 2394 |             emit this->finished();\n 2395 |         } else {\n 2396 |             // Fatal for the root job since it has no SyncFileItem\n 2397 |             emit _discoveryData->fatalError(msg, ErrorCategory::GenericError);\n 2398 |         }\n 2399 |     });\n 2400 | \n 2401 |     connect(localJob, &DiscoverySingleLocalDirectoryJob::finished, this, [this](const auto &results) {\n 2402 |         _discoveryData->_currentlyActiveJobs--;\n 2403 |         _pendingAsyncJobs--;\n 2404 | \n 2405 |         _localNormalQueryEntries = results;\n 2406 |         _localQueryDone = true;\n 2407 | \n 2408 |         if (_serverQueryDone)\n 2409 |             this->process();\n 2410 |     });\n 2411 | \n 2412 |     QThreadPool *pool = QThreadPool::globalInstance();\n 2413 |     pool->start(localJob); // QThreadPool takes ownership\n 2414 | }"}]},{"id":"RACE_3","type":"race_condition","type_label":"Race Condition","severity":"low","description":"TOCTOU in maybeMigrateDb(): each old DB file (db, -wal, -shm) is checked for existence (FileSystem::fileExists) and unconditionally renamed afterwards. The main db existence is checked but the -wal/-shm old files are renamed without verifying they exist; if the old -wal/-shm files do not exist (common when WAL was checkpointed), FileSystem::rename will fail and the whole migration aborts returning false, even though the migration of the main db already succeeded. This leaves migration half-done.","fix":"Only attempt to rename the -wal/-shm side files if the corresponding old file exists; treat a missing side file as success rather than a hard failure.","locations":[{"ref":"src/common/syncjournaldb.cpp:148-207","code":"  148 | bool SyncJournalDb::maybeMigrateDb(const QString &localPath, const QString &absoluteJournalPath)\n  149 | {\n  150 |     const QString oldDbName = localPath + QLatin1String(\".csync_journal.db\");\n  151 |     if (!FileSystem::fileExists(oldDbName)) {\n  152 |         return true;\n  153 |     }\n  154 |     const QString oldDbNameShm = oldDbName + QStringLiteral(\"-shm\");\n  155 |     const QString oldDbNameWal = oldDbName + QStringLiteral(\"-wal\");\n  156 | \n  157 |     const QString newDbName = absoluteJournalPath;\n  158 |     const QString newDbNameShm = newDbName + QStringLiteral(\"-shm\");\n  159 |     const QString newDbNameWal = newDbName + QStringLiteral(\"-wal\");\n  160 | \n  161 |     // Whenever there is an old db file, migrate it to the new db path.\n  162 |     // This is done to make switching from older versions to newer versions\n  163 |     // work correctly even if the user had previously used a new version\n  164 |     // and therefore already has an (outdated) new-style db file.\n  165 |     QString error;\n  166 | \n  167 |     if (FileSystem::fileExists(newDbName)) {\n  168 |         if (!FileSystem::remove(newDbName, &error)) {\n  169 |             qCWarning(lcDb) << \"Database migration: Could not remove db file\" << newDbName\n  170 |                             << \"due to\" << error;\n  171 |             return false;\n  172 |         }\n  173 |     }\n  174 |     if (FileSystem::fileExists(newDbNameWal)) {\n  175 |         if (!FileSystem::remove(newDbNameWal, &error)) {\n  176 |             qCWarning(lcDb) << \"Database migration: Could not remove db WAL file\" << newDbNameWal\n  177 |                             << \"due to\" << error;\n  178 |             return false;\n  179 |         }\n  180 |     }\n  181 |     if (FileSystem::fileExists(newDbNameShm)) {\n  182 |         if (!FileSystem::remove(newDbNameShm, &error)) {\n  183 |             qCWarning(lcDb) << \"Database migration: Could not remove db SHM file\" << newDbNameShm\n  184 |                             << \"due to\" << error;\n  185 |             return false;\n  186 |         }\n  187 |     }\n  188 | \n  189 |     if (!FileSystem::rename(oldDbName, newDbName, &error)) {\n  190 |         qCWarning(lcDb) << \"Database migration: could not rename\" << oldDbName\n  191 |                         << \"to\" << newDbName << \":\" << error;\n  192 |         return false;\n  193 |     }\n  194 |     if (!FileSystem::rename(oldDbNameWal, newDbNameWal, &error)) {\n  195 |         qCWarning(lcDb) << \"Database migration: could not rename\" << oldDbNameWal\n  196 |                         << \"to\" << newDbNameWal << \":\" << error;\n  197 |         return false;\n  198 |     }\n  199 |     if (!FileSystem::rename(oldDbNameShm, newDbNameShm, &error)) {\n  200 |         qCWarning(lcDb) << \"Database migration: could not rename\" << oldDbNameShm\n  201 |                         << \"to\" << newDbNameShm << \":\" << error;\n  202 |         return false;\n  203 |     }\n  204 | \n  205 |     qCInfo(lcDb) << \"Journal successfully migrated from\" << oldDbName << \"to\" << newDbName;\n  206 |     return true;\n  207 | }"}]},{"id":"RACE_4","type":"race_condition","type_label":"Race Condition","severity":"low","description":"WatcherThread::watchChanges (Windows) declares `OVERLAPPED overlapped;` on the stack and only sets `overlapped.hEvent`. The remaining fields (Internal, InternalHigh, Offset, OffsetHigh) are left uninitialized. ReadDirectoryChangesW requires the Offset/OffsetHigh fields to be zero for directory change reads; passing garbage is undefined behavior and can cause missed or corrupted notifications.","fix":"Zero-initialize the structure: `OVERLAPPED overlapped{};` then set hEvent.","locations":[{"ref":"src/gui/folderwatcher_win.cpp:46-47","code":"   46 |     OVERLAPPED overlapped;\n   47 |     overlapped.hEvent = _resultEvent;"}]},{"id":"RACE_5","type":"race_condition","type_label":"Race Condition","severity":"low","description":"FinderSyncService delegate callbacks capture the raw C++ `service` (`service = _service`) pointer into a lambda dispatched to SocketApi's thread via Qt::QueuedConnection. If the FinderSyncService is destroyed between the XPC callback firing and the queued lambda executing, `service->getFileStatus()/getMenuItems()` dereferences a freed object. The invoke target (socketApi) thread-affinity is handled, but the lifetime of `service` itself is not.","fix":"Capture a QPointer<FinderSyncService> (or otherwise guard the lifetime) and bail out if it has been destroyed before invoking its methods.","locations":[{"ref":"src/gui/macOS/findersyncservice.mm:60-75","code":"   60 |     QMetaObject::invokeMethod(socketApi, [service = _service, qPath, copiedHandler]() {\n   61 |         auto handler = (void(^)(NSString *, NSError *))copiedHandler;\n   62 |         // Get file status via FinderSyncService helper (which has friend access to FileData)\n   63 |         const auto [hasFolder, statusString] = service->getFileStatus(qPath);\n   64 | \n   65 |         if (!hasFolder) {\n   66 |             qCDebug(OCC::lcMacFinderSyncService) << \"File not in any sync folder:\" << qPath;\n   67 |             handler(@\"NOP\", nil);\n   68 |             [copiedHandler release];\n   69 |             return;\n   70 |         }\n   71 | \n   72 |         qCDebug(OCC::lcMacFinderSyncService) << \"Returning file status:\" << statusString << \"for:\" << qPath;\n   73 |         handler(statusString.toNSString(), nil);\n   74 |         [copiedHandler release];\n   75 |     }, Qt::QueuedConnection);"},{"ref":"src/gui/macOS/findersyncservice.mm:146-164","code":"  146 |     QMetaObject::invokeMethod(socketApi, [service = _service, qPaths, copiedHandler]() {\n  147 |         auto handler = (void(^)(NSArray<NSDictionary *> *, NSError *))copiedHandler;\n  148 |         // Get menu items from SocketApi via FinderSyncService helper\n  149 |         const auto qMenuItems = service->getMenuItems(qPaths);\n  150 | \n  151 |         // Convert QList<QMap> to NSArray<NSDictionary>\n  152 |         NSMutableArray *menuItems = [NSMutableArray array];\n
