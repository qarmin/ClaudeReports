s small at entry the buffer may be smaller than later reads need. reply()->read(buffer.data(), toRead) with toRead possibly larger than the allocated buffer (after _bandwidthLimited reduces it the buffer is fine, but bufferSize itself never grows) is benign here but the buffer-sizing-once pattern is fragile.","fix":"Recompute the buffer size inside the loop (or allocate a fixed 8KB buffer and always read up to its capacity) so toRead never exceeds the allocated buffer and large bursts are drained efficiently.","locations":[{"ref":"src/libsync/propagatedownload.cpp:287-326","code":"  287 | void GETFileJob::slotReadyRead()\n  288 | {\n  289 |     if (!reply())\n  290 |         return;\n  291 |     int bufferSize = qMin(1024 * 8ll, reply()->bytesAvailable());\n  292 |     QByteArray buffer(bufferSize, Qt::Uninitialized);\n  293 | \n  294 |     while (reply()->bytesAvailable() > 0 && _saveBodyToFile) {\n  295 |         if (_bandwidthChoked) {\n  296 |             qCWarning(lcGetJob) << \"Download choked\";\n  297 |             break;\n  298 |         }\n  299 |         qint64 toRead = bufferSize;\n  300 |         if (_bandwidthLimited) {\n  301 |             toRead = qMin(qint64(bufferSize), _bandwidthQuota);\n  302 |             if (toRead == 0) {\n  303 |                 qCDebug(lcGetJob) << \"Out of quota\";\n  304 |                 break;\n  305 |             }\n  306 |             _bandwidthQuota -= toRead;\n  307 |         }\n  308 | \n  309 |         const qint64 readBytes = reply()->read(buffer.data(), toRead);\n  310 |         if (readBytes < 0) {\n  311 |             _errorString = networkReplyErrorString(*reply());\n  312 |             _errorStatus = SyncFileItem::NormalError;\n  313 |             qCWarning(lcGetJob) << \"Error while reading from device: \" << _errorString;\n  314 |             reply()->abort();\n  315 |             return;\n  316 |         }\n  317 | \n  318 |         const qint64 writtenBytes = writeToDevice(buffer.left(readBytes));\n  319 |         if (writtenBytes != readBytes) {\n  320 |             _errorString = _device->errorString();\n  321 |             _errorStatus = SyncFileItem::NormalError;\n  322 |             qCWarning(lcGetJob) << \"Error while writing to file\" << writtenBytes << readBytes << _errorString;\n  323 |             reply()->abort();\n  324 |             return;\n  325 |         }\n  326 |     }"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"In FolderMan::slotWipeFolderForAccount, folders are unloaded via unloadFolder(f) but only deleted `if (currentlyRunning)`. For folders that are NOT the current running sync folder (the common case), `f` is removed from the map but never deleted, leaking the Folder QObject and its SyncEngine/journal/watcher resources. Contrast with removeFolder() which deletes non-running folders directly.","fix":"Delete (or deleteLater) the folder in the non-running branch as well, mirroring removeFolder().","locations":[{"ref":"src/gui/folderman.cpp:1732-1735","code":" 1732 |         unloadFolder(f);\n 1733 |         if (currentlyRunning) {\n 1734 |             delete f;\n 1735 |         }"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"FileProviderXPC is double-allocated. `_xpc = std::make_unique<FileProviderXPC>(new FileProviderXPC(this));` constructs an inner `FileProviderXPC(this)` and passes its pointer as the `QObject *parent` argument of the outer FileProviderXPC. This creates two FileProviderXPC objects (the inner one is leaked/owned only as the parent of the outer, inverting the intended parent relationship) instead of one parented to the FileProvider instance.","fix":"Construct a single object with the correct parent: `_xpc = std::make_unique<FileProviderXPC>(this);`.","locations":[{"ref":"src/gui/macOS/fileprovider_mac.mm:69","code":"   69 |     _xpc = std::make_unique<FileProviderXPC>(new FileProviderXPC(this));"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"Objective-C retain leak in processClientCommunicationConnections(). The remote service object is retained with `[clientCommService retain]`, but if the subsequent getFileProviderDomainIdentifier() returns nil the code `continue`s to the next connection without ever releasing clientCommService, leaking the retained object. The other early-`continue` (clientCommService == nil) is fine because retain happens after it, but the domainIdentifier == nil path leaks.","fix":"Release before continuing on the nil-domainIdentifier path, e.g. add `[clientCommService release];` immediately before the `continue;` at line 285.","locations":[{"ref":"src/gui/macOS/fileproviderxpc_mac_utils.mm:279-286","code":"  279 |         [clientCommService retain];\n  280 | \n  281 |         const auto domainIdentifier = getFileProviderDomainIdentifier(clientCommService);\n  282 | \n  283 |         if (domainIdentifier == nil) {\n  284 |             qCWarning(lcFileProviderXPCUtils) << \"Could not retrieve domain id from file provider service\";\n  285 |             continue;\n  286 |         }"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"In hBitmapAndAlphaTypeFromData the Gdiplus::Bitmap returned by Bitmap::FromStream is never deleted, and the IStream returned by SHCreateMemStream is never Released. Both leak on every thumbnail request. The leak occurs on every code path (success and the GetHBITMAP-failure path).","fix":"Wrap the IStream in a smart COM pointer (or call stream->Release()) and `delete gdiPlusBitmap;` before returning on all paths; prefer RAII to also cover the GdiplusShutdown.","locations":[{"ref":"src/libsync/vfs/cfapi/shellext/thumbnailprovider.cpp:64-83","code":"   64 |     const std::vector<unsigned char> bitmapData(thumbnailData.begin(), thumbnailData.end());\n   65 |     auto const stream{::SHCreateMemStream(&bitmapData[0], static_cast<UINT>(bitmapData.size()))};\n   66 | \n   67 |     if (!stream) {\n   68 |         return handleFailure();\n   69 |     }\n   70 |     gdiPlusBitmap = Gdiplus::Bitmap::FromStream(stream);\n   71 | \n   72 |     auto hasAlpha = false;\n   73 |     HBITMAP hBitmap = NULL;\n   74 |     if (gdiPlusBitmap) {\n   75 |         hasAlpha = Gdiplus::IsAlphaPixelFormat(gdiPlusBitmap->GetPixelFormat());\n   76 |         if (gdiPlusBitmap->GetHBITMAP(Gdiplus::Color(0, 0, 0), &hBitmap) != Gdiplus::Status::Ok) {\n   77 |             return handleFailure();\n   78 |         }\n   79 |     }\n   80 | \n   81 |     Gdiplus::GdiplusShutdown(gdiPlusToken);\n   82 | \n   83 |     return {hBitmap, hasAlpha ? WTSAT_ARGB : WTSAT_RGB};"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"ThumbnailProvider::Initialize obtains the display name via IShellItem::GetDisplayName, which allocates pszName with CoTaskMemAlloc, but never calls CoTaskMemFree(pszName). Leaks the path string each time a thumbnail item is initialized.","fix":"After copying into _shellItemPath, call CoTaskMemFree(pszName); free it on the error path too.","locations":[{"ref":"src/libsync/vfs/cfapi/shellext/thumbnailprovider.cpp:127-135","code":"  127 |     LPWSTR pszName = NULL;\n  128 |     hresult = _shellItem->GetDisplayName(SIGDN_FILESYSPATH, &pszName);\n  129 |     if (FAILED(hresult)) {\n  130 |         return hresult;\n  131 |     }\n  132 | \n  133 |     _shellItemPath = QString::fromWCharArray(pszName);\n  134 | \n  135 |     return S_OK;"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"ExternalWebEnginePage objects created in createWindow() are never given a parent and are not tracked, so each external-link navigation that triggers createWindow() allocates a QWebEnginePage that is never deleted. Since the page is returned to QtWebEngine merely to capture the navigation request (acceptNavigationRequest opens the URL externally n  712 |                 result.e2eMangledName = _subPath.mid(1) + u'/' + result.name;\n  713 |                 result.name = encryptedFileInfo->originalFilename;\n  714 |             }\n  715 |             return result;\n  716 |         });\n  717 | \n  718 |         emit finished(_results);\n  719 |         deleteLater();\n  720 |     });\n  721 | }"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"createDownloadTmpFileName uses Utility::rand() % 0xFFFFFFFF to build a unique suffix. rand() returns an int (typically 31-bit positive), so the high bit and the full 32-bit range are never produced, and `% 0xFFFFFFFF` (not 0x100000000) biases/limits the value. The collision space is far smaller than the 8 hex digits suggest, increasing the chance of temporary-file name collisions for parallel downloads of similarly named files.","fix":"Use a wider/better entropy source (e.g. QRandomGenerator::global()->generate() for a full 32-bit value) and mask with 0xFFFFFFFF rather than modulo by 0xFFFFFFFF.","locations":[{"ref":"src/libsync/propagatedownload.cpp:54-60","code":"   54 |     int overhead = 1 + 1 + 2 + 8; // slash dot dot-tilde ffffffff\"\n   55 |     int spaceForFileName = qMin(254, tmpFileName.length() + overhead) - overhead;\n   56 |     if (tmpPath.length() > 0) {\n   57 |         return tmpPath + '/' + '.' + tmpFileName.left(spaceForFileName) + \".~\" + (QString::number(uint(Utility::rand() % 0xFFFFFFFF), 16));\n   58 |     } else {\n   59 |         return '.' + tmpFileName.left(spaceForFileName) + \".~\" + (QString::number(uint(Utility::rand() % 0xFFFFFFFF), 16));\n   60 |     }"}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"openAndSeekFileSharedRead (Windows branch): after the QFile successfully adopts the fd, SetFilePointer is called on the raw fileHandle. On failure it sets the error string and returns false, but the QFile (owning the fd/handle) is a caller-provided pointer that remains open. More importantly the early-return paths before file->open close the handle, but once ownership is transferred to QFile, a failed seek returns false while leaving the file open with the file pointer in an undefined position; callers that ignore the bool may read from offset 0. The handle itself is not leaked, but the half-open state on seek failure is mishandled.","fix":"On SetFilePointer failure, explicitly close the QFile (file->close()) before returning false so the caller cannot accidentally use a wrongly-positioned open file.","locations":[{"ref":"src/common/filesystembase.cpp:293-301","code":"  293 |     // Seek to the right spot\n  294 |     auto li = reinterpret_cast<LARGE_INTEGER *>(&seek);\n  295 |     DWORD newFilePointer = SetFilePointer(fileHandle, li->LowPart, &li->HighPart, FILE_BEGIN);\n  296 |     if (newFilePointer == 0xFFFFFFFF && GetLastError() != NO_ERROR) {\n  297 |         error = qt_error_string();\n  298 |         return false;\n  299 |     }\n  300 | \n  301 |     return true;"}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"Folder::slotFilesLockReleased / slotLockedFilesFound register a new lambda connection on every invocation via member QMetaObject::Connection handles, but these connections are not Qt::UniqueConnection and the disconnect only fires when the signal arrives. If a lock/unlock request never produces lockFileSuccess/lockFileError (e.g. the request is dropped), the connection and its captured state accumulate across repeated lock-state changes.","fix":"Disconnect any prior pending connection before establishing a new one, or use a single persistent slot that looks up state rather than per-call lambdas.","locations":[{"ref":"src/gui/folder.cpp:769-786","code":"  769 |         _officeFileLockReleaseUnlockSuccess = connect(_accountState->account().data(), &Account::lockFileSuccess, this, [this, remoteFilePath]() {\n  770 |             d scaledSvg);\n  143 |         return;\n  144 |     }\n  145 | \n  146 |     QImage image(_requestedImageSize, QImage::Format_ARGB32);\n  147 |     image.fill(_svgRecolor);\n  148 |     QPainter imagePainter(&image);\n  149 |     imagePainter.setCompositionMode(QPainter::CompositionMode_DestinationIn);\n  150 |     imagePainter.drawImage(0, 0, scaledSvg);\n  151 |     setImageAndEmitFinished(image);\n  152 | }"}]},{"id":"RES_8","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"ClientSideEncryption::cacheTokenPin() starts a 24h (86400000 ms) QTimer::singleShot capturing `this` to clear the cached PIN. The cached PIN (a sensitive secret) lives in memory for up to a full day, and the timer keeps firing logic tied to the object lifetime. forgetSensitiveData() does not clear _cachedPin, so the token PIN survives a logout/forget-keys operation in process memory until the 24h timer elapses.","fix":"Clear _cachedPin in forgetSensitiveData()/failedToInitialize() and consider a much shorter cache lifetime; zero the QString memory if feasible.","locations":[{"ref":"src/libsync/clientsideencryption.cpp:1912-1918","code":" 1912 | void ClientSideEncryption::cacheTokenPin(const QString pin)\n 1913 | {\n 1914 |     _cachedPin = pin;\n 1915 |     QTimer::singleShot(86400000, this, [this] () {\n 1916 |         _cachedPin.clear();\n 1917 |     });\n 1918 | }"},{"ref":"src/libsync/clientsideencryption.cpp:1763-1801","code":" 1763 | void ClientSideEncryption::forgetSensitiveData()\n 1764 | {\n 1765 |     if (!sensitiveDataRemaining()) {\n 1766 |         checkAllSensitiveDataDeleted();\n 1767 |         return;\n 1768 |     }\n 1769 | \n 1770 |     const auto createDeleteJob = [this](const QString user) {\n 1771 |         auto *job = new DeletePasswordJob(Theme::instance()->appName());\n 1772 |         job->setInsecureFallback(false);\n 1773 |         job->setKey(AbstractCredentials::keychainKey(_account->url().toString(), user, _account->id()));\n 1774 |         return job;\n 1775 |     };\n 1776 | \n 1777 |     if (!_account->credentials()) {\n 1778 |         return;\n 1779 |     }\n 1780 | \n 1781 |     const auto user = _account->credentials()->user();\n 1782 |     const auto deletePrivateKeyJob = createDeleteJob(user + e2e_private);\n 1783 |     const auto deleteCertJob = createDeleteJob(user + e2e_cert);\n 1784 |     const auto deleteMnemonicJob = createDeleteJob(user + e2e_mnemonic);\n 1785 | \n 1786 |     connect(deletePrivateKeyJob, &DeletePasswordJob::finished, this, &ClientSideEncryption::handlePrivateKeyDeleted);\n 1787 |     connect(deleteCertJob, &DeletePasswordJob::finished, this, &ClientSideEncryption::handleCertificateDeleted);\n 1788 |     connect(deleteMnemonicJob, &DeletePasswordJob::finished, this, &ClientSideEncryption::handleMnemonicDeleted);\n 1789 |     deletePrivateKeyJob->start();\n 1790 |     deleteCertJob->start();\n 1791 |     deleteMnemonicJob->start();\n 1792 |     _usbTokenInformation.setSha256Fingerprint({});\n 1793 |     _account->setEncryptionCertificateFingerprint({});\n 1794 |     _tokenSlots.reset();\n 1795 |     _encryptionCertificate.clear();\n 1796 |     _otherCertificates.clear();\n 1797 |     _context.clear();\n 1798 |     Q_EMIT canDecryptChanged();\n 1799 |     Q_EMIT canEncryptChanged();\n 1800 |     Q_EMIT userCertificateNeedsMigrationChanged();\n 1801 | }"}]},{"id":"RES_9","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"OcsProfileConnector::startFetchIconJob() creates 'new IconJob{..., this}' and connects its signals but never stores the pointer. IconJob deletes itself on finish via deleteLater(), so on success it is fine; however on the error path IconJob also calls deleteLater() before emitting, so OK. The real issue: these jobs are parented to 'this' and capture hovercardActionIndex by value; if fetchIcons() is called again before previous jobs finish (new hovercard), stale indices may be applied to a replaced _currentHovercard, and many simultaneous jobs accumulate under the parent until completion.","fix":"Track in-flight icon jobs and cancel/clear them when a new hovercard is fetched; validate the icon URL still matches before applying.","locations":[{"ref":"src/libsync/ocsprofileconnector.cpp:149-166","code":"  149 | void OcsProfileConnector::startFetchIconJob(const std::size_t hovercardActionIndex)\n  150 | {\n  151 |     const auto hovercardAction = _currentHovercard._actions[hovercardActionIndex];\n  152 |     const auto iconJob = new IconJob{_account, hovercardAction._iconUrl, this};\n  153 |     connect(iconJob, &IconJob::jobFinished,\n  154 |         [this, hovercardActionIndex](QByteArray iconData) { loadHovercardActionIcon(hovercardActionIndex, iconData); });\n  155 |     connect(iconJob, &IconJob::error, this, [](QNetworkReply::NetworkError errorType) {\n  156 |         qCWarning(lcOcsProfileConnector) << \"Could not fetch icon:\" << errorType;\n  157 |     });\n  158 | }\n  159 | \n  160 | void OcsProfileConnector::fetchIcons()\n  161 | {\n  162 |     for (auto hovercardActionIndex = 0u; hovercardActionIndex < _currentHovercard._actions.size();\n  163 |          ++hovercardActionIndex) {\n  164 |         startFetchIconJob(hovercardActionIndex);\n  165 |     }\n  166 | }"}]},{"id":"RES_10","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"HydrationJob::onCancellationServerNewConnection asserts !_signalSocket but if a second connection arrives on the cancellation server (asserts disabled in release), the previously stored _signalSocket is overwritten by nextPendingConnection() without closing/deleting it, leaking the QLocalSocket and its underlying pipe handle. Pending connections are parented to the server so they are eventually freed, but the slot's intent (single connection) is not enforced.","fix":"If _signalSocket is already set, close/deleteLater the new pending connection (or ignore it) rather than overwriting the member.","locations":[{"ref":"src/libsync/vfs/cfapi/hydrationjob.cpp:224-230","code":"  224 | void OCC::HydrationJob::onCancellationServerNewConnection()\n  225 | {\n  226 |     Q_ASSERT(!_signalSocket);\n  227 | \n  228 |     qCInfo(lcHydration) << \"Got new connection on cancellation server\" << _requestId << _folderPath;\n  229 |     _signalSocket = _signalServer->nextPendingConnection();\n  230 | }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"In FolderWatcherPrivate::slotReceivedNotification (Linux), `int len = read(...)` may return -1 on error. The EINVAL retry loop only handles the too-small-buffer case; any other error (e.g. EINTR, EBADF) leaves `len` negative. Then `unsigned int ulen = len;` converts the negative value to a huge unsigned number, and the event-parsing loop `for (i = 0; i + sizeof(inotify_event) < ulen; ...)` iterates over the buffer reading out-of-bounds garbage as inotify_event structs, leading to OOB reads / crashes.","fix":"After the retry loop, bail out when `len <= 0` (e.g. `if (len <= 0) return;`) before computing `ulen` and entering the parse loop.","locations":[{"ref":"src/gui/folderwatcher_linux.cpp:130-152","code":"  130 |     len = read(fd, buffer.data(), buffer.size());\n  131 |     error = errno;\n  132 |     /**\n  133 |       * From inotify documentation:\n  134 |       *\n  135 |       * The behavior when the buffer given to read(2) is too\n  136 |       * small to return information about the next event\n  137 |       * depends on the kernel version: in kernels  before 2.6.21,\n  138 |       * read(2) returns 0; since kernel 2.6.21, read(2) fails with\n  139 |       * the error EINVAL.\n  140 |       */\n  141 |     while (len < 0 && error == EINVAL) {\n  142 |         // double the buffer size\n  143 |         buffer.resize(buffer.size() * 2);\n  144 | \n  145 |         /* and try again ... */\n  146 |         len = read(fd, buffer.data(), buffer.size());\n  147 |         error = errno;\n  148 |     }\n  149 | \n  150 |     // iterate events in buffer\n  151 |     unsigned int ulen = len;\n  152 |     for (i = 0; i + sizeof(inotify_event) < ulen; i += sizeof(inotify_event) + (event ? event->len : 0)) {"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"batchDataSize is declared `auto batchDataSize = 0` (int) and accumulates currentItem->_size which is qint64. Summing several large file sizes can overflow a 32-bit int, producing a negative value that keeps the loop running and pulls the entire queue into a single bulk batch, defeating the maxChunkSize() limit and risking very large POST bodies / memory use (PutMultiFileJob::start reads each device fully into memory).","fix":"Declare batchDataSize as qint64 (e.g. `qint64 batchDataSize = 0`).","locations":[{"ref":"src/libsync/bulkpropagatorjob.cpp:79-100","code":"   79 |     for(auto batchDataSize = 0; batchDataSize <= PropagatorJob::propagator()->syncOptions().maxChunkSize() && !_items.empty(); ) {\n   80 |         const auto currentItem = _items.front();\n   81 |         _items.pop_front();\n   82 |         _pendingChecksumFiles.insert(currentItem->_file);\n   83 | \n   84 |         batchDataSize += currentItem->_size;\n   85 | \n   86 |         QMetaObject::invokeMethod(this, [this, currentItem] {\n   87 |             UploadFileInfo fileToUpload;\n   88 |             fileToUpload._file = currentItem->_file;\n   89 |             fileToUpload._size = currentItem->_size;\n   90 |             fileToUpload._path = propagator()->fullLocalPath(fileToUpload._file);\n   91 | \n   92 |             qCDebug(lcBulkPropagatorJob) << \"Scheduling bulk propagator job:\" << this\n   93 |                                          << \"and starting upload of item\"\n   94 |                                          << \"with file:\" << fileToUpload._file\n   95 |                                          << \"with size:\" << fileToUpload._size\n   96 |                                          << \"with path:\" << fileToUpload._path;\n   97 | \n   98 |             startUploadFile(currentItem, fileToUpload);\n   99 |         }); // We could be in a different thread (neon jobs)\n  100 |     }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"fillFromEnvironmentVariables() reads chunk sizes with QByteArray::toUInt() into qint64 fields (_initialChunkSize, _minChunkSize, _maxChunkSize). toUInt() caps at 32 bits, so values above ~4GB (legitimate for chunkV2MaxChunkSize default of 5GB) cannot be expressed and large overrides are truncated or fail. _targetChunkUploadDuration also uses toUInt().","fix":"Use toLongLong() for the qint64 chunk-size fields (and a suitable wider type for the duration) instead of toUInt().","locations":[{"ref":"src/libsync/syncoptions.cpp:42-63","code":"   42 | void SyncOptions::fillFromEnvironmentVariables()\n   43 | {\n   44 |     QByteArray chunkSizeEnv = qgetenv(\"OWNCLOUD_CHUNK_SIZE\");\n   45 |     if (!chunkSizeEnv.isEmpty())\n   46 |         _initialChunkSize = chunkSizeEnv.toUInt();\n   47 | \n   48 |     QByteArray minChunkSizeEnv = qgetenv(\"OWNCLOUD_MIN_CHUNK_SIZE\");\n   49 |     if (!minChunkSizeEnv.isEmpty())\n   50 |         _minChunkSize = minChunkSizeEnv.toUInt();\n   51 | \n   52 |     QByteArray maxChunkSizeEnv = qgetenv(\"OWNCLOUD_MAX_CHUNK_SIZE\");\n   53 |     if (!maxChunkSizeEnv.isEmpty())\n   54 |         _maxChunkSize = maxChunkSizeEnv.toUInt();\n   55 | \n   56 |     QByteArray targetChunkUploadDurationEnv = qgetenv(\"OWNCLOUD_TARGET_CHUNK_UPLOAD_DURATION\");\n   57 |     if (!targetChunkUploadDurationEnv.isEmpty())\n   58 |         _targetChunkUploadDuration = std::chrono::milliseconds(targetChunkUploadDurationEnv.toUInt());\n   59 | \n   60 |     int maxParallel = qgetenv(\"OWNCLOUD_MAX_PARALLEL\").toInt();\n   61 |     if (maxParallel > 0)\n   62 |         _parallelNetworkJobs = maxParallel;\n   63 | }"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"GeneralSettings::slotRemotePollIntervalChanged() computes `std::chrono::milliseconds interval(seconds * 1000)` where `seconds` is an int from the spin box and the multiplication is performed in int. If the spin box maximum is large (no clamp visible here), seconds*1000 can overflow a 32-bit int before being widened to milliseconds (int64), producing a wrong/negative poll interval.","fix":"Promote before multiplying, e.g. std::chrono::seconds(seconds) converted to milliseconds, or use `std::chrono::milliseconds(qint64(seconds) * 1000)`.","locations":[{"ref":"src/gui/generalsettings.cpp:799-808","code":"  799 | void GeneralSettings::slotRemotePollIntervalChanged(int seconds)\n  800 | {\n  801 |     if (_currentlyLoading) {\n  802 |         return;\n  803 |     }\n  804 | \n  805 |     ConfigFile cfgFile;\n  806 |     std::chrono::milliseconds interval(seconds * 1000);\n  807 |     cfgFile.setRemotePollInterval(interval);\n  808 | }"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"Updater::Helper::versionToInt() computes `major << 56`. major is a qint64 holding the parsed major version; for major >= 128 the shift sets/overruns the sign bit of the 64-bit result, producing a negative version integer and breaking all currentVersion >= remoteVersion comparisons (updateSucceeded, versionInfoArrived). Not exploitable today but a latent correctness bug as version numbers grow.","fix":"Mask each component to its byte (e.g. (major & 0xFF) << 56) or use a wider/typed packing, and validate parsed components.","locations":[{"ref":"src/gui/updater/updater.cpp:142-145","code":"  142 | qint64 Updater::Helper::versionToInt(qint64 major, qint64 minor, qint64 patch, qint64 build)\n  143 | {\n  144 |     return major << 56 | minor << 48 | patch << 40 | build;\n  145 | }"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In AccountManager::restore(), settings->beginGroup(accountId) is called at the start of each loop iteration, but settings->endGroup() is only called inside the if branch (when the account is loaded). When an account is skipped because it is 'too new' (the else branch), endGroup() is never called. Additionally, when loadAccountHelper() returns null and the loop does `continue` (line 142-143), endGroup() is also skipped. Both cases leave QSettings with an unbalanced open group, so all subsequent accountId beginGroup() calls nest inside the previous (e.g. Accounts/0/1), causing those accounts to be read from the wrong/nonexistent group and silently fail to load.","fix":"Use a scope guard or call endGroup() in all paths: move settings->endGroup() out of the if/else so it always runs at the end of the iteration, and ensure the `continue` on null acc also ends the group (e.g. wrap the body and endGroup() before continue).","locations":[{"ref":"src/gui/accountmanager.cpp:137-159","code":"  137 |     for (const auto &accountId : settingsChildGroups) {\n  138 |         settings->beginGroup(accountId);\n  139 |         if (!skipSettingsKeys.contains(settings->group())) {\n  140 |             const auto acc = loadAccountHelper(*settings);\n  141 |             if (!acc) {\n  142 |                 continue;\n  143 |             }\n  144 |             acc->_id = accountId;\n  145 |             const auto accState = new AccountState(acc);\n  146 |             const auto jar = qobject_cast<CookieJar*>(acc->_networkAccessManager->cookieJar());\n  147 |             Q_ASSERT(jar);\n  148 |             if (jar) {\n  149 |                 jar->restore(acc->cookieJarPath());\n  150 |             }\n  151 |             addAccountState(accState);\n  152 |             migrateNetworkSettings(acc, *settings);\n  153 |             settings->endGroup();\n  154 |         } else {\n  155 |             qCInfo(lcAccountManager) << \"Account\" << accountId << \"is too new, ignoring\";\n  156 |             _additionalBlockedAccountIds.insert(accountId);\n  157 |             result = AccountsRestoreSuccessWithSkipped;\n  158 |         }\n  159 |     }"},{"ref":"src/gui/accountmanager.cpp:140-143","code":"  140 |             const auto acc = loadAccountHelper(*settings);\n  141 |             if (!acc) {\n  142 |                 continue;\n  143 |             }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"ShareModel duplicate-display-name tracking keys `_duplicateDisplayNameShareIndices` (and the per-bucket QSet) by row index, but slotRemoveShareWithId() removes a row from `_shares` (shifting every subsequent index down by one) without ever re-keying these maps. After any removal the stored indices no longer correspond to the actual rows, so dataChanged() is emitted for wrong rows and the wrong shares are flagged as duplicates (verbose display string applied to the wrong entry). The cleanup at lines 709-719 also only looks up the removed row, never adjusting the others.","fix":"Stop keying duplicate-name tracking by mutable row index; key by share id instead, or fully rebuild _duplicateDisplayNameShareIndices after every insert/remove.","locations":[{"ref":"src/gui/filedetails/sharemodel.cpp:501-534","code":"  501 |     // Perform forward pass on shares and check for duplicate display names; store these indeces so\n  502 |     // we can check for these and display the specific user identifier in the display string later\n  503 |     _duplicateDisplayNameShareIndices.clear();\n  504 |     const auto shareCount = _shares.count();\n  505 |     for (auto i = 0; i < shareCount; ++i) {\n  506 |         if (_duplicateDisplayNameShareIndices.contains(i)) {\n  507 |             continue;\n  508 |         }\n  509 | \n  510 |         const auto sharee = _shares.at(i)->getShareWith();\n  511 |         if (sharee == nullptr) {\n  512 |             continue;\n  513 |         }\n  514 | \n  515 |         const auto duplicateIndices = QSharedPointer<QSet<unsigned int>>::create();\n  516 |         const auto handleDuplicateIndex = [this, duplicateIndices](const unsigned int idx) {\n  517 |             duplicateIndices->insert(idx);\n  518 |             _duplicateDisplayNameShareIndices[idx] = duplicateIndices;\n  519 |             const auto targetIdx = index(idx);\n  520 |             dataChanged(targetIdx, targetIdx, {Qt::DisplayRole});\n  521 |         };\n  522 | \n  523 |         for (auto j = i + 1; j < shareCount; ++j) {\n  524 |             const auto otherSharee = _shares.at(j)->getShareWith();\n  525 |             if (otherSharee == nullptr || sharee->format() != otherSharee->format()) {\n  526 |                 continue;\n  527 |             }\n  528 |             handleDuplicateIndex(j);\n  529 |         }\n  530 | \n  531 |         if (!duplicateIndices->isEmpty()) {\n  532 |             handleDuplicateIndex(i);\n  533 |         }\n  534 |     }"},{"ref":"src/gui/filedetails/sharemodel.cpp:682-724","code":"  682 | void ShareModel::slotRemoveShareWithId(const QString &shareId)\n  683 | {\n  684 |     if (_shares.empty() || shareId.isEmpty() || !_shareIdIndexHash.contains(shareId)) {\n  685 |         return;\n  686 |     }\n  687 | \n  688 |     _shareIdRecentlySetPasswords.remove(shareId);\n  689 |     const auto shareIndex = _shareIdIndexHash.take(shareId);\n  690 | \n  691 |     if (!checkIndex(shareIndex, QAbstractItemModel::CheckIndexOption::IndexIsValid | QAbstractItemModel::CheckIndexOption::ParentIsInvalid)) {\n  692 |         qCWarning(lcShareModel) << \"Won't remove share with id:\" << shareId\n  693 |                                 << \", invalid share index: \" << shareIndex;\n  694 |         return;\n  695 |     }\n  696 | \n  697 |     const auto share = shareIndex.data(ShareModel::ShareRole).value<SharePtr>();\n  698 |     const auto sharee = share->getShareWith();\n  699 |     slotRemoveSharee(sharee);\n  700 | \n  701 |     const auto shareRow = shareIndex.row();\n  702 |     beginRemoveRows({}, shareRow, shareRow);\n  703 |     _shares.removeAt(shareRow);\n  704 |     endRemoveRows();\n  705 | \n  706 |     // Handle display name duplicates now. First remove the index from the bucket it was in; then,\n  707 |     // check if this removal means the remaining index in the bucket is no longer a duplicate.\n  708 |     // If this is the case then handle the update for this item too.\n  709 |     const auto duplicateShares = _duplicateDisplayNameShareIndices.value(shareRow);\n  710 |     if (duplicateShares) {\n  711 |         duplicateShares->remove(shareRow);\n  712 |         if (duplicateShares->count() == 1) {\n  713 |             const auto noLongerDuplicateIndex = *(duplicateShares->begin());\n  714 |             _duplicateDisplayNameShareIndices.remove(noLongerDuplicateIndex);\n  715 |             const auto noLongerDuplicateModelIndex = index(noLongerDuplicateIndex);\n  716 |             Q_EMIT dataChanged(noLongerDuplicateModelIndex, noLongerDuplicateModelIndex, {Qt::DisplayRole});\n  717 |         }\n  718 |         _duplicateDisplayNameShareIndices.remove(shareRow);\n  719 |     }\n  720 | \n  721 |     handleLinkShare();\n  722 | \n  723 |     Q_EMIT sharesChanged();\n  724 | }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"slotCreateRemoteFolderFinished() compares a QNetworkReply::NetworkError enum value against HTTP status codes. `auto error = reply->error();` yields a QNetworkReply::NetworkError (e.g. NoError=0, OperationCanceledError=5), but the branches test `error == 202` and `error > 202 && error < 300` as if `error` were an HTTP status code. Those conditions are essentially always false for the NetworkError domain, so the 'remote folder already exists (HTTP 202)' and 'HTTP 3xx error code' branches are dead, and any non-cancel error falls through to the generic failure branch. To inspect the real HTTP code the code must read reply->attribute(QNetworkRequest::HttpStatusCodeAttribute).","fix":"Read the HTTP status separately: `const int httpCode = reply->attribute(QNetworkRequest::HttpStatusCodeAttribute).toInt();` and branch on httpCode (202, 3xx) while using reply->error() only for transport-level errors like OperationCanceledError.","locations":[{"ref":"src/gui/owncloudsetupwizard.cpp:635-666","code":"  635 | void OwncloudSetupWizard::slotCreateRemoteFolderFinished(QNetworkReply *reply)\n  636 | {\n  637 |     auto error = reply->error();\n  638 |     qCWarning(lcWizard) << \"** webdav mkdir request finished \" << error;\n  639 |     //    disconnect(ownCloudInfo::instance(), SIGNAL(webdavColCreated(QNetworkReply::NetworkError)),\n  640 |     //               this, SLOT(slotCreateRemoteFolderFinished(QNetworkReply::NetworkError)));\n  641 | \n  642 |     bool success = true;\n  643 |     if (error == 202) {\n  644 |         _ocWizard->appendToConfigurationLog(tr(\"The remote folder %1 already exists. Connecting it for syncing.\").arg(_remoteFolder));\n  645 |     } else if (error > 202 && error < 300) {\n  646 |         _ocWizard->displayError(tr(\"The folder creation resulted in HTTP error code %1\").arg(static_cast<int>(error)), false);\n  647 | \n  648 |         _ocWizard->appendToConfigurationLog(tr(\"The folder creation resulted in HTTP error code %1\").arg(static_cast<int>(error)));\n  649 |     } else if (error == QNetworkReply::OperationCanceledError) {\n  650 |         _ocWizard->displayError(tr(\"The remote folder creation failed because the provided credentials \"\n  651 |                                    \"are wrong!\"\n  652 |                                    \"<br/>Please go back and check your credentials.<\/p>\"),\n  653 |             false);\n  654 |         _ocWizard->appendToConfigurationLog(tr(\"<p><font color=\\\"red\\\">Remote folder creation failed probably because the provided credentials are wrong.<\/font>\"\n  655 |                                                \"<br/>Please go back and check your credentials.<\/p>\"));\n  656 |         _remoteFolder.clear();\n  657 |         success = false;\n  658 |     } else {\n  659 |         _ocWizard->appendToConfigurationLog(tr(\"Remote folder %1 creation failed with error <tt>%2<\/tt>.\").arg(Utility::escape(_remoteFolder)).arg(QString::number(error)));\n  660 |         _ocWizard->displayError(tr(\"Remote folder %1 creation failed with error <tt>%2<\/tt>.\").arg(Utility::escape(_remoteFolder)).arg(QString::number(error)), false);\n  661 |         _remoteFolder.clear();\n  662 |         success = false;\n  663 |     }\n  664 | \n  665 |     finalizeSetup(success);\n  666 | }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"SyncConflictsModel::setData() sets `result = true` for the editable roles (ExistingSelected/ConflictSelected) inside the switch, but immediately after the switch executes `result = false;` unconditionally (line 115). As a result setData() always returns false even when the edit succeeded, violating the QAbstractItemModel contract and breaking views that rely on the boolean return to confirm a successful edit.","fix":"Remove the stray `result = false;` at line 115 (it should not reset the value already set by the matched cases).","locations":[{"ref":"src/gui/syncconflictsmodel.cpp:90-118","code":"   90 |         switch(convertedRole) {\n   91 |         case SyncConflictRoles::ExistingFileName:\n   92 |             break;\n   93 |         case SyncConflictRoles::ExistingSize:\n   94 |             break;\n   95 |         case SyncConflictRoles::ConflictSize:\n   96 |             break;\n   97 |         case SyncConflictRoles::ExistingDate:\n   98 |             break;\n   99 |         case SyncConflictRoles::ConflictDate:\n  100 |             break;\n  101 |         case SyncConflictRoles::ExistingSelected:\n  102 |             setExistingSelected(value.toBool(), index, role);\n  103 |             result = true;\n  104 |             break;\n  105 |         case SyncConflictRoles::ConflictSelected:\n  106 |             setConflictingSelected(value.toBool(), index, role);\n  107 |             result = true;\n  108 |             break;\n  109 |         case SyncConflictRoles::ExistingPreviewUrl:\n  110 |             break;\n  111 |         case SyncConflictRoles::ConflictPreviewUrl:\n  112 |             break;\n  113 |         }\n  114 | \n  115 |         result = false;\n  116 |     }\n  117 | \n  118 |     return result;"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Capabilities::supportedChecksumTypes() constructs the result with QList<QByteArray> list(supportedTypes.count()), which pre-fills the list with N default-constructed (empty) QByteArrays, then push_back() appends the real values after them. The returned list therefore has 2*N entries where the first N are empty. uploadChecksumType() then returns supported.first() which is an empty QByteArray, silently disabling checksum selection.","fix":"Use QList<QByteArray> list; list.reserve(supportedTypes.count()); then push_back, or index-assign instead of push_back.","locations":[{"ref":"src/libsync/capabilities.cpp:203-211","code":"  203 | QList<QByteArray> Capabilities::supportedChecksumTypes() const\n  204 | {\n  205 |     const auto supportedTypes = _capabilities[\"checksums\"].toMap()[\"supportedTypes\"].toList();\n  206 |     QList<QByteArray> list(supportedTypes.count());\n  207 |     for (const auto &t : supportedTypes) {\n  208 |         list.push_back(t.toByteArray());\n  209 |     }\n  210 |     return list;\n  211 | }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Capabilities::httpErrorCodesThatResetFailingChunkedUploads() has the same bug: QList<int> list(httpErrorCodes.count()) pre-fills N zeros, then push_back appends the real codes. The returned list contains N spurious leading 0 entries, so HTTP status 0 is incorrectly treated as a code that resets failing chunked uploads.","fix":"Construct an empty list and reserve(count), or assign by index; do not size-construct then push_back.","locations":[{"ref":"src/libsync/capabilities.cpp:375-383","code":"  375 | QList<int> Capabilities::httpErrorCodesThatResetFailingChunkedUploads() const\n  376 | {\n  377 |     const auto httpErrorCodes = _capabilities[\"dav\"].toMap()[\"httpErrorCodesThatResetFailingChunkedUploads\"].toList();\n  378 |     QList<int> list(httpErrorCodes.count());\n  379 |     for (const auto &t : httpErrorCodes) {\n  380 |         list.push_back(t.toInt());\n  381 |     }\n  382 |     return list;\n  383 | }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","description":"setupExistingMetadata() only verifies the CMS metadata signature when (_isRootEncryptedFolder && !_initialSignature.isEmpty()). For nested (non-root) encrypted folders in v2, and for any folder where the server supplies an empty signature, the signature is never checked against the folder users. While there is a later guard that aborts when _initialSignature is empty, the verification block itself is gated on _isRootEncryptedFolder, so a malicious/forged metadata blob for a non-root folder is parsed and decrypted without authenticating the signer set.","fix":"Verify the metadata signature for all encrypted folders that are expected to carry one (or explicitly document and enforce that nested folders inherit/require the root signature), and fail closed when verification cannot be performed.","locations":[{"ref":"src/libsync/foldermetadata.cpp:160-180","code":"  160 |     if (_isRootEncryptedFolder && !_initialSignature.isEmpty()) {\n  161 |         const auto metadataForSignature = prepareMetadataForSignature(metaDataDoc);\n  162 | \n  163 |         QVector<QByteArray> certificatePems;\n  164 |         certificatePems.reserve(_folderUsers.size());\n  165 |         for (const auto &folderUser : std::as_const(_folderUsers)) {\n  166 |             certificatePems.push_back(folderUser.certificatePem);\n  167 |         }\n  168 | \n  169 |         if (!_account->e2e()->verifySignatureCryptographicMessageSyntax(QByteArray::fromBase64(_initialSignature), metadataForSignature.toBase64(), certificatePems)) {\n  170 |             qCWarning(lcCseMetadata()) << \"Could not parse encrypred folder metadata. Failed to verify signature!\";\n  171 |             _account->reportClientStatus(OCC::ClientStatusReportingStatus::E2EeError_GeneralError);\n  172 |             return;\n  173 |         }\n  174 |     }\n  175 | \n  176 |     if (_initialSignature.isEmpty()) {\n  177 |         qCWarning(lcCseMetadata()) << \"Signature is empty\";\n  178 |         _account->reportClientStatus(OCC::ClientStatusReportingStatus::E2EeError_GeneralError);\n  179 |         return;\n  180 |     }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","description":"FolderMetadata::verifyMetadataKey() returns true whenever _keyChecksums is empty (`return _keyChecksums.contains(...) || _keyChecksums.isEmpty();`). For a v2.0+ root folder the keyChecksums come from server-controlled metadata; an attacker who can strip/empty the keyChecksums array causes verification of the metadata key to be unconditionally accepted, defeating the integrity check that the metadata key was not swapped. The accompanying comment even admits '_keyChecksums should not be empty'.","fix":"Do not treat an empty checksum set as success for Version2_0+. Require a non-empty _keyChecksums and a matching checksum; report E2EeError and refuse to use the metadata key otherwise.","locations":[{"ref":"src/libsync/foldermetadata.cpp:1154-1165","code":" 1154 | bool FolderMetadata::verifyMetadataKey(const QByteArray &metadataKey) const\n 1155 | {\n 1156 |     if (_existingMetadataVersion < MetadataVersion::Version2_0) {\n 1157 |         return true;\n 1158 |     }\n 1159 |     if (metadataKey.isEmpty() || metadataKey.size() < metadataKeySize ) {\n 1160 |         return false;\n 1161 |     }\n 1162 |     const QByteArray metadataKeyLimitedLength(metadataKey.data(), metadataKeySize );\n 1163 |     // _keyChecksums should not be empty, fix this by taking a proper _keyChecksums from the topLevelFolder\n 1164 |     return _keyChecksums.contains(calcSha256(metadataKeyLimitedLength)) || _keyChecksums.isEmpty();\n 1165 | }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","description":"PropagateDirectory::slotSubJobsFinished(): in the CSYNC_INSTRUCTION_NEW + Down branch, when _item->_modtime <= 0 it sets status/_item->_status = NormalError and logs, but then falls through and still calls FileSystem::setModTime() with the invalid modtime and continues into the etag/metadata update block, eventually emitting finished() with the error status mixed with a successful metadata update. The error is set but propagation is not actually aborted, so a directory with an invalid modtime is half-processed.","fix":"After setting NormalError for an invalid modtime, emit finished(status) and return instead of proceeding to setModTime and the metadata update.","locations":[{"ref":"src/libsync/owncloudpropagator.cpp:1488-1500","code":" 1488 |         if (_item->_instruction == CSYNC_INSTRUCTION_NEW && _item->_direction == SyncFileItem::Down) {\n 1489 |             // special case for local MKDIR, set local directory mtime\n 1490 |             // (it's not synced later at all, but can be nice to have it set initially)\n 1491 | \n 1492 |             if (_item->_modtime <= 0) {\n 1493 |                 status = _item->_status = SyncFileItem::NormalError;\n 1494 |                 _item->_errorString = tr(\"Error updating metadata due to invalid modification time\");\n 1495 |                 qCWarning(lcDirectory) << \"Error writing to the database for file\" << _item->_file;\n 1496 |             }\n 1497 | \n 1498 |             qCDebug(lcPropagator()) << \"setModTime\" << propagator()->fullLocalPath(_item->destination()) << _item->_modtime;\n 1499 |             FileSystem::setModTime(propagator()->fullLocalPath(_item->destination()), _item->_modtime);\n 1500 |         }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Inverted branch when clearing the resumable download info after a successful download. The download info is always stored under _item->_file in startDownload() (line 718). But in updateMetadata, when the item IS encrypted the code clears the download info of _item->_file, and when it is NOT encrypted it clears _item->_encryptedFileName (which is empty for non-encrypted items). For an unencrypted file this clears the wrong (empty) key and leaves the real DownloadInfo for _item->_file stale in the journal, while for encrypted files it never clears the entry that may have been keyed under the plaintext name. The two branches are reversed.","fix":"Always clear the download info under the key that was used to store it (_item->_file), or swap the branches so the encrypted case clears _item->_encryptedFileName and the unencrypted case clears _item->_file, matching how setDownloadInfo() was keyed in startDownload().","locations":[{"ref":"src/libsync/propagatedownload.cpp:1349-1353","code":" 1349 |     if (isEncrypted()) {\n 1350 |         propagator()->_journal->setDownloadInfo(_item->_file, SyncJournalDb::DownloadInfo());\n 1351 |     } else {\n 1352 |         propagator()->_journal->setDownloadInfo(_item->_encryptedFileName, SyncJournalDb::DownloadInfo());\n 1353 |     }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In PropagateDownloadEncrypted::slotFetchMetadataJobFinished(), when metadata is null or invalid the code emits failed() but does NOT return. Execution falls through to `metadata->files()` on the next line, dereferencing a potentially null/invalid metadata pointer and continuing the matching loop, which can crash or proceed with bogus data after the failure was already signalled.","fix":"Add `return;` immediately after emit failed() inside the `if (!metadata || !metadata->isValid())` block.","locations":[{"ref":"src/libsync/propagatedownloadencrypted.cpp:60-67","code":"   60 |     const auto metadata = _encryptedFolderMetadataHandler->folderMetadata();\n   61 | \n   62 |     if (!metadata || !metadata->isValid()) {\n   63 |         emit failed();\n   64 |         qCCritical(lcPropagateDownloadEncrypted) << \"Failed to find encrypted metadata information of remote file\" << _info.fileName();\n   65 |     }\n   66 | \n   67 |     const auto files = metadata->files();"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"high","description":"SyncOptions::setMinChunkSize() clamps the new value using the current _minChunkSize itself as the lower bound: ::qBound(_minChunkSize, minChunkSize, _maxChunkSize). Because qBound's lower bound is the field being assigned, any requested value smaller than the current _minChunkSize is silently ignored (raised back to the old value). The intent is clearly to bound the requested value between an absolute floor (e.g. chunkV2MinChunkSize) and _maxChunkSize. As written, _minChunkSize can never be lowered, so env/config overrides smaller than the default 5MB are ignored.","fix":"Use a fixed absolute lower bound, e.g. _minChunkSize = ::qBound(chunkV2MinChunkSize, minChunkSize, _maxChunkSize); (and similarly fix setMaxChunkSize).","locations":[{"ref":"src/libsync/syncoptions.cpp:27-30","code":"   27 | void SyncOptions::setMinChunkSize(const qint64 minChunkSize)\n   28 | {\n   29 |     _minChunkSize = ::qBound(_minChunkSize, minChunkSize, _maxChunkSize);\n   30 | }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"high","description":"SyncOptions::setMaxChunkSize() clamps with ::qBound(_minChunkSize, maxChunkSize, _maxChunkSize), using the current _maxChunkSize as the upper bound. Any requested value larger than the current _maxChunkSize is clamped down to the old value, so the maximum chunk size can only ever be lowered, never raised. This defeats config/env overrides intended to increase the max chunk size.","fix":"Bound against the absolute ceiling, e.g. _maxChunkSize = ::qBound(_minChunkSize, maxChunkSize, chunkV2MaxChunkSize);","locations":[{"ref":"src/libsync/syncoptions.cpp:37-40","code":"   37 | void SyncOptions::setMaxChunkSize(const qint64 maxChunkSize)\n   38 | {\n   39 |     _maxChunkSize = ::qBound(_minChunkSize, maxChunkSize, _maxChunkSize);\n   40 | }"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"high","description":"WordList::getRandomWords() loops while(randomWords.size() != nr) appending unique words. If nr is greater than the wordlist size (2048) the set of unique words can never reach nr and the loop spins forever. If nr is negative the loop also never terminates. No bound check on nr exists.","fix":"Clamp/validate nr against wordList.size() (and reject negatives) before the loop, or break when no new unique word can be found.","locations":[{"ref":"src/libsync/wordlist.cpp:2080-2087","code":" 2080 |     QStringList randomWords;\n 2081 |     while(randomWords.size() != nr) {\n 2082 |         QString currWord = wordList.at(getRandomNumber(wordList.size()));\n 2083 |         if (!randomWords.contains(currWord)) {\n 2084 |             randomWords.append(currWord);\n 2085 |         }\n 2086 |     }\n 2087 |     return randomWords;"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"PreparedSqlQueryManager::get(key, sql, db) asserts !sqlite3_stmt_busy(query._stmt) at line 35 before checking whether query._stmt is null (lines 37-41). On the first use of a key the SqlQuery is default-constructed with _stmt == nullptr. sqlite3_stmt_busy(nullptr) is being relied upon to return 0; passing a null statement handle to sqlite3 APIs is not contractually defined for all builds and is fragile. The busy check should occur after confirming a prepared statement exists.","fix":"Move the Q_ASSERT(!sqlite3_stmt_busy(query._stmt)) inside the `if (query._stmt)` branch (i.e. only assert when a statement actually exists).","locations":[{"ref":"src/common/preparedsqlquerymanager.cpp:32-43","code":"   32 | const PreparedSqlQuery PreparedSqlQueryManager::get(PreparedSqlQueryManager::Key key, const QByteArray &sql, SqlDatabase &db)\n   33 | {\n   34 |     auto &query = _queries[key];\n   35 |     Q_ASSERT(!sqlite3_stmt_busy(query._stmt));\n   36 |     ENFORCE(!query._sqldb || &db == query._sqldb)\n   37 |     if (!query._stmt) {\n   38 |         query._sqldb = &db;\n   39 |         query._db = db.sqliteDb();\n   40 |         return { &query, query.prepare(sql) == 0 };\n   41 |     }\n   42 |     return { &query };\n   43 | }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"forgetEncryptionOnDeviceForAccount() uses a switch on the QMessageBox result with `case QMessageBox::Ok` and `case QMessageBox::Cancel: break;` followed by a bare `Q_UNREACHABLE();` placed after the Cancel case's break but still inside the switch body with no case label. It is effectively dead/misplaced: it can only be reached by fall-through which never happens (Cancel breaks), and if the dialog ever returned another value the default path silently does nothing instead of asserting. The intent (assert on unexpected values) is not achieved.","fix":"Move Q_UNREACHABLE() into a proper `default:` label, or remove it; ensure unexpected dialog results are handled.","locations":[{"ref":"src/gui/accountsettings.cpp:1233-1243","code":" 1233 |     const auto ret = dialog.exec();\n 1234 |     switch(ret) {\n 1235 |     case QMessageBox::Ok:\n 1236 |         connect(account->e2e(), &ClientSideEncryption::sensitiveDataForgotten,\n 1237 |                 this, &AccountSettings::forgetE2eEncryption);\n 1238 |         account->e2e()->forgetSensitiveData();\n 1239 |         break;\n 1240 |     case QMessageBox::Cancel:\n 1241 |         break;\n 1242 |     Q_UNREACHABLE();\n 1243 |     }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"FileDetails::updateFileTagModel() treats _fileRecord.path() inconsistently. serverPath is built as remotePathTrailingSlash() + _fileRecord.path() (i.e. path() is folder-relative), but relPath is computed as `_fileRecord.path().mid(_folder->cleanPath().length() + 1)`, which chops the relative path as though it were an absolute local path. relPath (passed to FileTagModel) is therefore wrong/empty for normal records, so tags are loaded for the wrong path.","fix":"Use the folder-relative path directly (relPath = _fileRecord.path(), or _localPath.mid(_folder->cleanPath().length()+1)); do not .mid() a path that is already relative.","locations":[{"ref":"src/gui/filedetails/filedetails.cpp:177-191","code":"  177 | void FileDetails::updateFileTagModel()\n  178 | {\n  179 |     const auto localPath = _fileRecord.path();\n  180 |     const auto relPath = localPath.mid(_folder->cleanPath().length() + 1);\n  181 |     QString serverPath = _folder->remotePathTrailingSlash() + _fileRecord.path();\n  182 |  \n  183 |     if (const auto vfsMode = _folder->vfs().mode(); _fileRecord.isVirtualFile() && vfsMode == Vfs::WithSuffix) {\n  184 |         if (const auto suffix = _folder->vfs().fileSuffix(); !suffix.isEmpty() && serverPath.endsWith(suffix)) {\n  185 |             serverPath.chop(suffix.length());\n  186 |         }\n  187 |     }\n  188 | \n  189 |     _fileTagModel = std::make_unique<FileTagModel>(relPath, _folder->accountState()->account());\n  190 |     Q_EMIT fileTagModelChanged();\n  191 | }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Folder overlap detection uses raw string prefix matching without path-component boundaries. In isComplete() the checks `targetPath.startsWith(remoteDir)` and `remoteDir.startsWith(targetPath)` treat e.g. '/foobar' as a subfolder of '/foo', producing false 'already syncing' warnings for sibling folders whose names share a prefix. The exact-match branch above correctly uses QDir::cleanPath, but the prefix branches do not normalise or require a trailing '/'.","fix":"Compare cleaned paths and require a path-separator boundary, e.g. treat A as ancestor of B only when `B == A || B.startsWith(A.endsWith('/') ? A : A + '/')` after QDir::cleanPath().","locations":[{"ref":"src/gui/folderwizard.cpp:503-526","code":"  503 |     for (const auto folder : std::as_const(FolderMan::instance()->map())) {\n  504 |         if (folder->accountState()->account() != _account) {\n  505 |             continue;\n  506 |         }\n  507 | \n  508 |         const auto remoteDir = folder->remotePathTrailingSlash();\n  509 |         const auto localDir = folder->cleanPath();\n  510 |         if (QDir::cleanPath(targetPath) == QDir::cleanPath(remoteDir)) {\n  511 |             showWarn(tr(\"Please choose a different location. %1 is already being synced to %2.\").arg(Utility::escape(remoteDir), Utility::escape(localDir)));\n  512 |             break;\n  513 |         }\n  514 | \n  515 |         if (targetPath.startsWith(remoteDir)) {\n  516 |             _ui.warnFrame->show();\n  517 |             _ui.warnLabel->hide();\n  518 |             _ui.infoLabel->setText(tr(\"You are already syncing the subfolder %1 at %2.\").arg(Utility::escape(targetPath), Utility::escape(localDir)));\n  519 |             break;\n  520 |         }\n  521 | \n  522 |         if (remoteDir.startsWith(targetPath)) {\n  523 |             showWarn(tr(\"Please choose a different location. %1 is already being synced to %2.\").arg(Utility::escape(remoteDir), Utility::escape(localDir)));\n  524 |             break;\n  525 |         }\n  526 |     }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"ProxyAuthHandler constructor calls beginGroup(\"Proxy\") then beginGroup(\"Credentials\") on _settings but there is no matching endGroup, and keychainUsernameKey()/keychainPasswordKey() build keys as `<proxy>/username`. The QSettings stays permanently nested in Proxy/Credentials. While intentional for this single-purpose settings object, _settings is also passed to QKeychain ReadPasswordJob::setSettings/WritePasswordJob::setSettings which use it for insecure fallback storage; the permanently-open nested groups mean any other use of this QSettings would read/write under the wrong group. Fragile and easy to misuse.","fix":"Document the invariant clearly or build full key paths explicitly instead of relying on a permanently-open group nesting on a shared QSettings.","locations":[{"ref":"src/gui/proxyauthhandler.cpp:33-37","code":"   33 |     _configFile.reset(new ConfigFile);\n   34 |     _settings.reset(new QSettings(_configFile->configFile(), QSettings::IniFormat));\n   35 |     _settings->beginGroup(QLatin1String(\"Proxy\"));\n   36 |     _settings->beginGroup(QLatin1String(\"Credentials\"));\n   37 | }"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"SettingsDialog::accountAdded() always calls `accountAction->trigger()` after inserting each account page at stack index 0. During SettingsDialog construction it iterates all existing accounts (line 205-208) and each one triggers, so the last account page ends up shown; then a QTimer::singleShot to showFirstPage() is queued. The repeated trigger() on every accountAdded (including runtime additions) forcibly switches the visible page to the newly added account, which can yank the user away from whatever page they were viewing.","fix":"Only trigger the action for the initial/explicitly-requested account, or avoid switching pages on runtime account additions unless the dialog has no current selection.","locations":[{"ref":"src/gui/settingsdialog.cpp:347-356","code":"  347 |     auto accountSettings = new AccountSettings(s, this);\n  348 |     QString objectName = QLatin1String(\"accountSettings_\");\n  349 |     objectName += s->account()->displayName();\n  350 |     accountSettings->setObjectName(objectName);\n  351 |     _stack->insertWidget(0 , accountSettings);\n  352 | \n  353 |     _actionGroup->addAction(accountAction);\n  354 |     _actionGroupWidgets.insert(accountAction, accountSettings);\n  355 |     _actionForAccount.insert(s->account().data(), accountAction);\n  356 |     accountAction->trigger();"},{"ref":"src/gui/settingsdialog.cpp:205-210","code":"  205 |     const auto accountsList = AccountManager::instance()->accounts();\n  206 |     for (const auto &account : accountsList) {\n  207 |         accountAdded(account.data());\n  208 |     }\n  209 | \n  210 |     QTimer::singleShot(1, this, &SettingsDialog::showFirstPage);"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In Systray::taskbarOrientation (Linux branch), the minimum distance is computed as `std::min({distRight, distTop, distBottom})` — distLeft is computed but omitted from the set. The following dispatch then tests `else if (minDist == distLeft)`, a branch that can essentially never be taken since distLeft is not part of the minimum. As a result a taskbar on the left edge is mis-detected (the final else returns Right). The tray window can be positioned on the wrong screen edge.","fix":"Include distLeft in the min set: `std::min({distRight, distTop, distBottom, distLeft})`.","locations":[{"ref":"src/gui/systray.cpp:912-931","code":"  912 |     const auto screenRect = currentScreenRect();\n  913 |     const auto trayIconCenter = calcTrayIconCenter();\n  914 | \n  915 |     const auto distBottom = screenRect.bottom() - trayIconCenter.y();\n  916 |     const auto distRight = screenRect.right() - trayIconCenter.x();\n  917 |     const auto distLeft = trayIconCenter.x() - screenRect.left();\n  918 |     const auto distTop = trayIconCenter.y() - screenRect.top();\n  919 | \n  920 |     const auto minDist = std::min({distRight, distTop, distBottom});\n  921 | \n  922 |     if (minDist == distBottom) {\n  923 |         return TaskBarPosition::Bottom;\n  924 |     } else if (minDist == distLeft) {\n  925 |         return TaskBarPosition::Left;\n  926 |     } else if (minDist == distTop) {\n  927 |         return TaskBarPosition::Top;\n  928 |     } else {\n  929 |         return TaskBarPosition::Right;\n  930 |     }\n  931 | #endif"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"ActivityListModel constructor connects AccountState::stateChanged to the accountStateChanged SIGNAL, whereas setAccountState() connects the same signal to the accountStateHasChanged SLOT (which maintains _durationSinceDisconnection used to decide when to surface network-error activities). For Users created via the AccountState constructor (the normal path in User::User), the disconnection timer is therefore never started/invalidated, so addErrorToActivityList(NetworkError) never satisfies its `_durationSinceDisconnection.isValid() && hasExpired(3min)` guard and network errors are silently dropped.","fix":"In the constructor connect to &ActivityListModel::accountStateHasChanged (the slot), matching setAccountState().","locations":[{"ref":"src/gui/tray/activitylistmodel.cpp:46-50","code":"   46 |     if (_accountState) {\n   47 |         connect(_accountState, &AccountState::stateChanged,\n   48 |                 this, &ActivityListModel::accountStateChanged);\n   49 |         _accountStateWasConnected = false;\n   50 |     }"},{"ref":"src/gui/tray/activitylistmodel.cpp:99-103","code":"   99 |     if (_accountState) {\n  100 |         connect(_accountState, &AccountState::stateChanged,\n  101 |                 this, &ActivityListModel::accountStateHasChanged);\n  102 |         _accountStateWasConnected = false;\n  103 |     }"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Off-by-one when splitting activity links between action buttons and the overflow context menu. `convertLinksToActionButtons` loops with `i < activity._links.size() && static_cast<quint32>(i) <= maxActionButtons()` (note `<=`), so it emits up to maxActionButtons()+1 (4 when MaxActionButtons==3) buttons. `convertLinksToMenuEntries` starts its overflow loop at `i = maxActionButtons()` (i.e. index 3). The link at index == maxActionButtons() is therefore rendered BOTH as an action button and as a context-menu entry (duplicated action). The `<=` should be `<`.","fix":"Change the button loop condition to `static_cast<quint32>(i) < maxActionButtons()` so index maxActionButtons() falls only into the overflow menu.","locations":[{"ref":"src/gui/tray/activitylistmodel.cpp:943-955","code":"  943 |     for (int i = 0; i < activity._links.size() && static_cast<quint32>(i) <= maxActionButtons(); ++i) {\n  944 |         const auto activityLink = activity._links[i];\n  945 | \n  946 |         // Use the isDismissable model role to present custom dismiss button if needed\n  947 |         // Also don't show \"View chat\" for talk activities, default action will open chat anyway\n  948 |         const auto isUseCustomDeleteAction = activityLink._verb == \"DELETE\"\n  949 |             && activity._objectType != QStringLiteral(\"remote_share\");\n  950 |         if (isUseCustomDeleteAction || (activityLink._verb == \"WEB\" && activity._objectType == \"chat\")) {\n  951 |             continue;\n  952 |         }\n  953 | \n  954 |         customList << ActivityListModel::convertLinkToActionButton(activityLink);\n  955 |     }"},{"ref":"src/gui/tray/activitylistmodel.cpp:984-988","code":"  984 |     for (int i = maxActionButtons(); i < activity._links.size(); ++i) {\n  985 |         const auto activityLinkLabel = activity._links[i]._label;\n  986 |         const auto menuEntry = QVariantMap{{\"actionIndex\", i}, {\"label\", activityLinkLabel}};\n  987 |         customList << menuEntry;\n  988 |     }"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Inverted/incorrect ETag de-duplication condition. The guard reads `if (!_preFetchEtagHeader.isEmpty() || _preFetchEtagHeader == postFetchEtagHeader)`. The comment says it should return early only when the ETag is unchanged, i.e. `_preFetchEtagHeader == postFetchEtagHeader`. With the `||` and the negated isEmpty() check the branch fires whenever `_preFetchEtagHeader` is non-empty regardless of equality. In addition, `ServerNotificationHandler` is constructed fresh for every fetch (usermodel.cpp slotRefreshNotifications), so `_preFetchEtagHeader` is always empty for the instance and the assignment on the next line is effectively dead — the entire ETag de-dup is non-functional. Net effect: server-side ETag optimization to skip processing of unchanged notification lists never works.","fix":"Use `if (!_preFetchEtagHeader.isEmpty() && _preFetchEtagHeader == postFetchEtagHeader)`, and persist the ServerNotificationHandler (or its ETag) across fetches so the comparison has meaningful state; otherwise drop the dead code.","locations":[{"ref":"src/gui/tray/notificationhandler.cpp:90-97","code":"   90 |     const auto postFetchEtagHeader = _accountState->notificationsEtagResponseHeader();\n   91 |     if (!_preFetchEtagHeader.isEmpty() || _preFetchEtagHeader == postFetchEtagHeader) {\n   92 |         qCInfo(lcServerNotification) << \"Notifications ETag header is the same as before, no new notifications.\";\n   93 |         deleteLater();\n   94 |         emit jobFinished();\n   95 |         return;\n   96 |     }\n   97 |     _preFetchEtagHeader = postFetchEtagHeader;"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Stale row index captured by value in UserModel::addUser lambdas. Each per-user signal->dataChanged lambda captures `row` (the insertion index at creation time). When an account is removed via removeAccount(), `_users.removeAt(id)` shifts all later users down, but their lambdas still emit dataChanged for the original (now wrong) row, updating the wrong list item or an out-of-range row.","fix":"Capture the User* (or look up the current row via findUserIdForAccount / _users.indexOf at emit time) instead of the fixed integer row.","locations":[{"ref":"src/gui/tray/usermodel.cpp:2242-2265","code":" 2242 |         connect(u, &User::avatarChanged, this, [this, row] {\n 2243 |            emit dataChanged(index(row, 0), index(row, 0), {UserModel::AvatarRole});\n 2244 |         });\n 2245 | \n 2246 |         connect(u, &User::statusChanged, this, [this, row] {\n 2247 |             emit dataChanged(index(row, 0), index(row, 0), {UserModel::StatusRole,\n 2248 |                                                             UserModel::StatusIconRole,\n 2249 |                                                             UserModel::StatusEmojiRole,\n 2250 |                                                             UserModel::StatusMessageRole});\n 2251 |         });\n 2252 |         \n 2253 |         connect(u, &User::desktopNotificationsAllowedChanged, this, [this, row] {\n 2254 |             emit dataChanged(index(row, 0), index(row, 0), { UserModel::DesktopNotificationsAllowedRole });\n 2255 |         });\n 2256 |         \n 2257 |         connect(u, &User::accountStateChanged, this, [this, row] {\n 2258 |             emit dataChanged(index(row, 0), index(row, 0), { UserModel::IsConnectedRole });\n 2259 |         });\n 2260 |         connect(u, &User::accountStateChanged, this, &UserModel::updateSyncErrorUsers);\n 2261 | \n 2262 |         connect(u, &User::syncStatusChanged, this, [this, row] {\n 2263 |             emit dataChanged(index(row, 0), index(row, 0), { UserModel::SyncStatusIconRole,\n 2264 |                                                             UserModel::SyncStatusOkRole });\n 2265 |         });"},{"ref":"src/gui/tray/usermodel.cpp:2417-2419","code":" 2417 |     beginRemoveRows(QModelIndex(), id, id);\n 2418 |     _users.removeAt(id);\n 2419 |     endRemoveRows();"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"_currentBatchSize is computed by handleBatchSize() (halving on error) but is never consulted by scheduleSelfOrChild(), which always batches purely by maxChunkSize()/size. As a result the 'cut batch size in half after an error' retry logic has no effect on how many items are actually grouped into the next bulk upload; only the maxChunkSize byte budget governs batching.","fix":"Use _currentBatchSize to cap the number of items pulled into a batch in scheduleSelfOrChild (e.g. break the loop once the count reaches _currentBatchSize), or remove the unused batch-size machinery if byte-based batching is intended.","locations":[{"ref":"src/libsync/bulkpropagatorjob.cpp:69-103","code":"   69 | bool BulkPropagatorJob::scheduleSelfOrChild()\n   70 | {\n   71 |     if (_items.empty() || !_pendingChecksumFiles.empty()) {\n   72 |         return false;\n   73 |     }\n   74 | \n   75 |     _state = Running;\n   76 | \n   77 |     qCDebug(lcBulkPropagatorJob()) << \"max chunk size\" << PropagatorJob::propagator()->syncOptions().maxChunkSize();\n   78 | \n   79 |     for(auto batchDataSize = 0; batchDataSize <= PropagatorJob::propagator()->syncOptions().maxChunkSize() && !_items.empty(); ) {\n   80 |         const auto currentItem = _items.front();\n   81 |         _items.pop_front();\n   82 |         _pendingChecksumFiles.insert(currentItem->_file);\n   83 | \n   84 |         batchDataSize += currentItem->_size;\n   85 | \n   86 |         QMetaObject::invokeMethod(this, [this, currentItem] {\n   87 |             UploadFileInfo fileToUpload;\n   88 |             fileToUpload._file = currentItem->_file;\n   89 |             fileToUpload._size = currentItem->_size;\n   90 |             fileToUpload._path = propagator()->fullLocalPath(fileToUpload._file);\n   91 | \n   92 |             qCDebug(lcBulkPropagatorJob) << \"Scheduling bulk propagator job:\" << this\n   93 |                                          << \"and starting upload of item\"\n   94 |                                          << \"with file:\" << fileToUpload._file\n   95 |                                          << \"with size:\" << fileToUpload._size\n   96 |                                          << \"with path:\" << fileToUpload._path;\n   97 | \n   98 |             startUploadFile(currentItem, fileToUpload);\n   99 |         }); // We could be in a different thread (neon jobs)\n  100 |     }\n  101 | \n  102 |     return _items.empty() && _filesToUpload.empty();\n  103 | }"},{"ref":"src/libsync/bulkpropagatorjob.cpp:105-126","code":"  105 | bool BulkPropagatorJob::handleBatchSize()\n  106 | {\n  107 |     // no error, no batch size to change\n  108 |     if (_finalStatus == SyncFileItem::Success || _finalStatus == SyncFileItem::NoStatus) {\n  109 |         qCDebug(lcBulkPropagatorJob) << \"No error, no need to change the bulk upload batch size!\";\n  110 |         return true;\n  111 |     }\n  112 | \n  113 |     // change batch size before trying it again\n  114 |     const auto halfBatchSize = static_cast<int>(_items.size() / 2);\n  115 | \n  116 |     // we already tried to upload with half of the batch size\n  117 |     if(_currentBatchSize == halfBatchSize) {\n  118 |         qCWarning(lcBulkPropagatorJob) << \"There was another error, stop syncing now!\";\n  119 |         return false;\n  120 |     }\n  121 | \n  122 |     // try to upload with half of the batch size\n  123 |     _currentBatchSize = halfBatchSize;\n  124 |     qCWarning(lcBulkPropagatorJob) << \"There was an error, sync again with bulk upload batch size cut to half!\";\n  125 |     return true;\n  126 | }"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"commonErrorHandling() (called from slotPutFinishedOneFile when an individual file reply has _httpErrorCode != 200) calls abortWithError(), which aborts the whole multi-file job and marks ALL files in the batch as failed even though only one file in the bulk reply reported an error. A single 412/precondition failure on one file thus fails the entire batch rather than just that item.","fix":"For per-file errors in a bulk reply, mark only that singleFile._item as errored (set status/errorString) and continue processing the remaining files, instead of aborting the whole job via abortWithError().","locations":[{"ref":"src/libsync/bulkpropagatorjob.cpp:431-437","code":"  431 |     if (singleFile._item->_httpErrorCode != 200) {\n  432 |         commonErrorHandling(singleFile._item, fileReply[QStringLiteral(\"message\")].toString());\n  433 |         const auto exceptionParsed = getExceptionFromReply(job->reply());\n  434 |         singleFile._item->_errorExceptionName = exceptionParsed.first;\n  435 |         singleFile._item->_errorExceptionMessage = exceptionParsed.second;\n  436 |         return;\n  437 |     }"},{"ref":"src/libsync/bulkpropagatorjob.cpp:702-708","code":"  702 | void BulkPropagatorJob::commonErrorHandling(SyncFileItemPtr item,\n  703 |                                             const QString &errorMessage)\n  704 | {\n  705 |     // Ensure errors that should eventually reset the chunked upload are tracked.\n  706 |     checkResettingErrors(item);\n  707 |     abortWithError(item, SyncFileItem::NormalError, errorMessage);\n  708 | }"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"ClientProxy::setupQtProxyFromConfig() DefaultProxy branch calls proxies.first() on the result of QNetworkProxyFactory::proxyForQuery() without checking emptiness. QNetworkProxyFactory documents it always returns at least one entry, but if the platform backend returns an empty list this dereferences the first element of an empty QList (undefined behavior / crash).","fix":"Guard: if proxies.isEmpty() use QNetworkProxy::NoProxy, else proxies.first().","locations":[{"ref":"src/libsync/clientproxy.cpp:95-106","code":"   95 |         case QNetworkProxy::DefaultProxy:\n   96 |             qCInfo(lcClientProxy) << \"Set proxy configuration to use the preferred system proxy for http tcp connections\";\n   97 |             {\n   98 |                 QNetworkProxyQuery query;\n   99 |                 query.setProtocolTag(\"http\");\n  100 |                 query.setQueryType(QNetworkProxyQuery::TcpSocket);\n  101 |                 auto proxies = QNetworkProxyFactory::proxyForQuery(query);\n  102 |                 proxy = proxies.first();\n  103 |             }\n  104 |             QNetworkProxyFactory::setUseSystemConfiguration(false);\n  105 |             QNetworkProxy::setApplicationProxy(proxy);\n  106 |             break;"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"ClientSideEncryption::decryptPrivateKey() tries three password derivations in sequence, but the fallback chain unconditionally overwrites the private key: if the modern password fails it tries the deprecated-SHA1 password, and if that also fails it stores the result of decryptPrivateKey(deprecatedPassword,...) even when that returns empty. After a wrong passphrase this sets an empty/garbage private key and only the later getPrivateKey().isNull() check saves it; the loop then re-prompts. The nested if/else makes it easy to store a non-empty but wrong-key result on partial base64 success.","fix":"Only assign setPrivateKeyData() when a candidate decryption produced a non-empty result, and verify each candidate with checkEncryptionIsWorking() before committing instead of blindly assigning the last fallback.","locations":[{"ref":"src/libsync/clientsideencryption.cpp:2300-2324","code":" 2300 |             // split off salt\n 2301 |             const auto salt = EncryptionHelper::extractPrivateKeySalt(key);\n 2302 | \n 2303 |             const auto deprecatedPassword = EncryptionHelper::deprecatedGeneratePassword(mnemonic, salt);\n 2304 |             const auto deprecatedSha1Password = EncryptionHelper::deprecatedSha1GeneratePassword(mnemonic, salt);\n 2305 |             const auto password = EncryptionHelper::generatePassword(mnemonic, salt);\n 2306 | \n 2307 |             const auto privateKey = EncryptionHelper::decryptPrivateKey(password, key);\n 2308 |             if (!privateKey.isEmpty()) {\n 2309 |                 _encryptionCertificate.setPrivateKeyData(privateKey);\n 2310 |             } else {\n 2311 |                 const auto deprecatedSha1PrivateKey = EncryptionHelper::decryptPrivateKey(deprecatedSha1Password, key);\n 2312 |                 if (!deprecatedSha1PrivateKey.isEmpty()) {\n 2313 |                     _encryptionCertificate.setPrivateKeyData(deprecatedSha1PrivateKey);\n 2314 |                 } else {\n 2315 |                     _encryptionCertificate.setPrivateKeyData(EncryptionHelper::decryptPrivateKey(deprecatedPassword, key));\n 2316 |                 }\n 2317 |             }\n 2318 | \n 2319 |             if (!getPrivateKey().isNull() && checkEncryptionIsWorking(_encryptionCertificate)) {\n 2320 |                 writePrivateKey();\n 2321 |                 writeCertificate();\n 2322 |                 writeMnemonic([] () {});\n 2323 |                 break;\n 2324 |             }"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"processFileAnalyzeRemoteInfo() computes lock expiration timeRemaining with QDateTime::currentDateTime() (local time) versus QDateTime::fromSecsSinceEpoch(lockExpirationTime) (which interprets the epoch seconds in local time too) — using currentDateTime() instead of currentDateTimeUtc() is inconsistent with the rest of the engine that uses UTC, and secsTo across
