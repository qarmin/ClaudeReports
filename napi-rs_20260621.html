n: Option<&str>) -> Result<JsSymbol<'_>> {\n  233 |     let mut result = ptr::null_mut();\n  234 |     check_status!(unsafe {\n  235 |       sys::napi_create_symbol(\n  236 |         self.0,\n  237 |         description\n  238 |           .and_then(|desc| self.create_string(desc).ok())\n  239 |           .map(|string| string.0.value)\n  240 |           .unwrap_or(ptr::null_mut()),\n  241 |         &mut result,\n  242 |       )\n  243 |     })?;","lines":12,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L232-L243"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`checkGitCommand` uses `exec('git --version')` and resolves on the 'exit' event with `code === 0`, but never consumes or limits stdout. For `git --version` output is tiny so harmless, but the pattern of leaving an exec'd child without reading its piped stdout/stderr can deadlock for commands with large output. Same applies to `downloadTemplate`'s `exec('git fetch origin')` which can produce substantial progress output on stderr that is never drained while only 'exit'/'error' are awaited.","fix":"Use spawn with stdio configured (or read/ignore the streams) for commands that may emit large output, or pass maxBuffer and ensure streams are consumed.","locations":[{"ref":"cli/src/api/new.ts:40-50","code":"   40 | async function checkGitCommand(): Promise<boolean> {\n   41 |   return new Promise<boolean>((resolve) => {\n   42 |     const cp = exec('git --version')\n   43 |     cp.on('error', () => {\n   44 |       resolve(false)\n   45 |     })\n   46 |     cp.on('exit', (code) => {\n   47 |       resolve(code === 0)\n   48 |     })\n   49 |   })\n   50 | }","lines":11,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/new.ts#L40-L50"},{"ref":"cli/src/api/new.ts:71-85","code":"   71 |       await new Promise<void>((resolve, reject) => {\n   72 |         const cp = exec('git fetch origin', { cwd: templatePath })\n   73 |         cp.on('error', reject)\n   74 |         cp.on('exit', (code) => {\n   75 |           if (code === 0) {\n   76 |             resolve()\n   77 |           } else {\n   78 |             reject(\n   79 |               new Error(\n   80 |                 `Failed to fetch latest changes, git process exited with code ${code}`,\n   81 |               ),\n   82 |             )\n   83 |           }\n   84 |         })\n   85 |       })","lines":15,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/new.ts#L71-L85"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`JsObject::add_finalizer` uses `Box::leak` to allocate the `(native, finalize_cb, ptr::null_mut())` wrap_context and the `finalize_hint` box, relying on `finalize_callback` to reconstruct and drop them via `Box::from_raw`. If `napi_add_finalizer` returns an error (propagated by `?`), both leaked Boxes (the wrap_context and the finalize_hint) are permanently leaked because the finalizer that would free them is never registered. Memory leak on the error path.","fix":"On the error path of `napi_add_finalizer`, reconstruct and drop both Boxes (`Box::from_raw`) before returning the error, instead of using `Box::leak` which strands them on failure.","locations":[{"ref":"crates/napi/src/js_values/object.rs:55-87","code":"   55 |   pub fn add_finalizer<T, Hint, F>(\n   56 |     &mut self,\n   57 |     native: T,\n   58 |     finalize_hint: Hint,\n   59 |     finalize_cb: F,\n   60 |   ) -> Result<()>\n   61 |   where\n   62 |     T: 'static,\n   63 |     Hint: 'static,\n   64 |     F: FnOnce(FinalizeContext<T, Hint>) + 'static,\n   65 |   {\n   66 |     let mut maybe_ref = ptr::null_mut();\n   67 |     let wrap_context = Box::leak(Box::new((native, finalize_cb, ptr::null_mut())));\n   68 |     check_status!(unsafe {\n   69 |       sys::napi_add_finalizer(\n   70 |         self.0.env,\n   71 |         self.0.value,\n   72 |         wrap_context as *mut _ as *mut c_void,\n   73 |         Some(\n   74 |           finalize_callback::<T, Hint, F>\n   75 |             as unsafe extern \"C\" fn(\n   76 |               env: sys::napi_env,\n   77 |               finalize_data: *mut c_void,\n   78 |               finalize_hint: *mut c_void,\n   79 |             ),\n   80 |         ),\n   81 |         Box::leak(Box::new(finalize_hint)) as *mut _ as *mut c_void,\n   82 |         &mut maybe_ref, // Note: this does not point to the boxed one…\n   83 |       )\n   84 |     })?;\n   85 |     wrap_context.2 = maybe_ref;\n   86 |     Ok(())\n   87 |   }","lines":33,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/object.rs#L55-L87"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`UnknownRef::unref` calls `napi_reference_unref` with `&mut 0` (a temporary) for the out ref-count, ignoring whether the count reached zero, then unconditionally `napi_delete_reference`. Deleting the reference regardless of remaining count is intended here (the type owns one ref), but discarding the count via `&mut 0` to a temporary is a code smell repeated in `Ref::unref` and `SymbolRef`. More notably, `SymbolRef::unref` (symbol.rs:89) only deletes the reference and never calls `napi_reference_unref` first, inconsistent with `UnknownRef::unref` and `Ref::unref` which unref then delete. The inconsistency suggests one of them is wrong about the intended refcount handling.","fix":"Make the unref/delete sequence consistent across `UnknownRef`, `SymbolRef`, and `Ref`. If a single owned ref-count is the model, `napi_delete_reference` alone suffices (it drops the strong count); the extra `napi_reference_unref` in two of three impls is either redundant or the symbol impl is missing it. Pick one and apply uniformly.","locations":[{"ref":"crates/napi/src/js_values/unknown.rs:131-142","code":"  131 |   pub fn unref(mut self, env: &Env) -> Result<()> {\n  132 |     check_status!(\n  133 |       unsafe { sys::napi_reference_unref(env.0, self.inner, &mut 0) },\n  134 |       \"unref Ref failed\"\n  135 |     )?;\n  136 |     check_status!(\n  137 |       unsafe { sys::napi_delete_reference(env.0, self.inner) },\n  138 |       \"delete Ref failed\"\n  139 |     )?;\n  140 |     self.inner = ptr::null_mut();\n  141 |     Ok(())\n  142 |   }","lines":12,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/unknown.rs#L131-L142"},{"ref":"crates/napi/src/js_values/symbol.rs:89-96","code":"   89 |   pub fn unref(mut self, env: &Env) -> Result<()> {\n   90 |     check_status!(\n   91 |       unsafe { sys::napi_delete_reference(env.0, self.inner) },\n   92 |       \"delete Ref failed\"\n   93 |     )?;\n   94 |     self.inner = ptr::null_mut();\n   95 |     Ok(())\n   96 |   }","lines":8,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/symbol.rs#L89-L96"},{"ref":"crates/napi/src/js_values/value_ref.rs:33-45","code":"   33 |   pub fn unref(&mut self, env: &Env) -> Result<()> {\n   34 |     check_status!(\n   35 |       unsafe { sys::napi_reference_unref(env.0, self.raw_ref, &mut 0) },\n   36 |       \"unref Ref failed\"\n   37 |     )?;\n   38 | \n   39 |     check_status!(\n   40 |       unsafe { sys::napi_delete_reference(env.0, self.raw_ref) },\n   41 |       \"delete Ref failed\"\n   42 |     )?;\n   43 |     self.taken = true;\n   44 |     Ok(())\n   45 |   }","lines":13,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/value_ref.rs#L33-L45"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`get_napi_version` walks the JS object graph on every call: it fetches the\nglobal object, then `process`, then `process.versions`, then parses\n`process.versions.napi` from a String. This is an expensive path (multiple\nN-API calls + string allocation + parse) for what is effectively a constant for\nthe lifetime of the process. There is also a dedicated N-API\n`napi_get_version` that returns the supported version directly without touching\nJS, which would be far cheaper and not subject to `process` being shimmed.","fix":"Use `sys::napi_get_version` to read the N-API version directly, or cache the parsed value. Note `napi_get_version` returns the highest N-API version supported which matches `process.versions.napi`.","locations":[{"ref":"crates/napi/src/env.rs:1076-1084","code":" 1076 |   pub fn get_napi_version(&self) -> Result<u32> {\n 1077 |     let global = self.get_global()?;\n 1078 |     let process: Object = global.get_named_property(\"process\")?;\n 1079 |     let versions: Object = process.get_named_property(\"versions\")?;\n 1080 |     let napi_version: String = versions.get_named_property(\"napi\")?;\n 1081 |     napi_version\n 1082 |       .parse()\n 1083 |       .map_err(|e| Error::new(Status::InvalidArg, format!(\"{e}\")))\n 1084 |   }","lines":9,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L1076-L1084"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`collectNodeBinaries` recurses the entire output tree sequentially with `await` inside a `for` loop, awaiting one subdirectory at a time. For large artifact trees this serializes all I/O. The sibling `collectArtifacts` then does a `Promise.all` over files, so the inconsistency suggests the recursion could also be parallelized.","fix":"Collect subdirectory recursions with `Promise.all(dirs.map(...))` and flatten, instead of awaiting each in sequence.","locations":[{"ref":"cli/src/api/artifacts.ts:154-171","code":"  154 | async function collectNodeBinaries(root: string) {\n  155 |   const files = await readdirAsync(root, { withFileTypes: true })\n  156 |   const nodeBinaries = files\n  157 |     .filter(\n  158 |       (file) =>\n  159 |         file.isFile() &&\n  160 |         (file.name.endsWith('.node') || file.name.endsWith('.wasm')),\n  161 |     )\n  162 |     .map((file) => join(root, file.name))\n  163 | \n  164 |   const dirs = files.filter((file) => file.isDirectory())\n  165 |   for (const dir of dirs) {\n  166 |     if (dir.name !== 'node_modules') {\n  167 |       nodeBinaries.push(...(await collectNodeBinaries(join(root, dir.name))))\n  168 |     }\n  169 |   }\n  170 |   return nodeBinaries\n  171 | }","lines":18,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/artifacts.ts#L154-L171"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`KNOWN_TYPES` is built with ~15 separate `map.extend([...])` calls, but more\nnotably `handle_known_type`'s `Either` branch does an O(n^2) dedup with\n`Vec::contains` inside a `fold`:\n\n    let union_args = args.fold(vec![], |mut acc, cur| {\n      if !acc.contains(&cur) { acc.push(cur); }\n      acc\n    });\n\nFor the larger `EitherN` (up to `Either26`) this is quadratic in the number of\narguments. This is build-time only and N is small, so impact is negligible, but\nworth noting alongside the repeated `format!`/`clone` allocations in\n`process_generic_arguments` and `gen_ts_func_args` where strings are rebuilt per\nargument.","fix":"Acceptable as-is given small N; if desired, dedup via a small `IndexSet`/`HashSet`-backed pass to make it linear.","locations":[{"ref":"crates/backend/src/typegen.rs:602-614","code":"  602 |   if rust_ty.starts_with(\"Either\") {\n  603 |     let union_args = args.fold(vec![], |mut acc, cur| {\n  604 |       if !acc.contains(&cur) {\n  605 |         acc.push(cur);\n  606 |       }\n  607 |       acc\n  608 |     });\n  609 |     // EitherN has the same ts types, like Either<f64, u32> -> number\n  610 |     if union_args.len() == 1 {\n  611 |       Some((union_args[0].to_owned(), false))\n  612 |     } else {\n  613 |       Some((fill_ty(known_ty, union_args), false))\n  614 |     }","lines":13,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen.rs#L602-L614"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `napi_fn_from_decl` the per-argument callback lookup builds the argument type string with `p.ty.to_token_stream().to_string()` and then does a HashMap lookup keyed by that string, for every argument of every function. Stringifying token streams per arg is allocation-heavy and is the kind of work multiplied across a large codebase's macro expansions. Same stringify-as-key pattern is used to build `callback_traits` in `extract_fn_closure_generics`.","fix":"This is inherent to matching where-clause bounds to args by spelling; acceptable, but could be reduced by interning or comparing idents directly when the bound is a single type param. Low priority.","locations":[{"ref":"crates/macro/src/parser/mod.rs:606-607","code":"  606 |         let ty_str = p.ty.to_token_stream().to_string();\n  607 |         if let Some(path_arguments) = callback_traits.get(&ty_str) {","lines":2,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/parser/mod.rs#L606-L607"},{"ref":"crates/macro/src/parser/mod.rs:502-504","code":"  502 |                       map.insert(\n  503 |                         bounded_ty.to_token_stream().to_string(),\n  504 |                         segment.arguments.clone(),","lines":3,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/parser/mod.rs#L502-L504"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`From<Buffer> for Vec<u8>` does `buf.as_ref().to_vec()`, always copying the bytes, even though when\n`Buffer` was created from a `Vec<u8>` (`raw == None`) it already owns a heap allocation with\n`inner`/`len`/`capacity` that could be moved out via `Vec::from_raw_parts` + `mem::forget` without\ncopying. On the hot path of returning buffer data back to Rust this forces an extra allocation+copy.","fix":"When `buf.raw.is_none()`, reconstruct and move the owned Vec (`Vec::from_raw_parts(inner, len,\ncapacity)` + `mem::forget(buf)`) instead of copying; only copy when the data is JS-owned (`raw`\nis Some).","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/buffer.rs:401-405","code":"  401 | impl From<Buffer> for Vec<u8> {\n  402 |   fn from(buf: Buffer) -> Self {\n  403 |     buf.as_ref().to_vec()\n  404 |   }\n  405 | }","lines":5,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/buffer.rs#L401-L405"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`wait_first_thread_registered` busy-spins with `spin_loop()` on `FIRST_MODULE_REGISTERED` with no yield or backoff. If the first module's registration is slow (large export table, blocking work in a register hook), every other thread burns a full core spinning. SeqCst load in a tight loop also adds memory-bus traffic.","fix":"Use a `std::sync::Once`/`Condvar`/park-based wait, or at least `std::thread::yield_now()` with exponential backoff after a few spins.","locations":[{"ref":"crates/napi/src/bindgen_runtime/module_register.rs:154-160","code":"  154 | #[cfg(not(feature = \"noop\"))]\n  155 | #[inline]\n  156 | fn wait_first_thread_registered() {\n  157 |   while !FIRST_MODULE_REGISTERED.load(Ordering::SeqCst) {\n  158 |     std::hint::spin_loop();\n  159 |   }\n  160 | }","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/module_register.rs#L154-L160"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`JsStringLatin1::take` clones via `self.as_slice().to_vec()` even though `self` is taken by value. For the native non-copied case `buf` points into `_inner_buf` (which is empty `vec![]`) or external memory, so a copy is needed there, but for the WASM/owned case `_inner_buf` already owns the bytes and could be moved. More importantly the data-source asymmetry means `take()`/`From<_> for Vec<u8>` always copy.","fix":"Where `_inner_buf` owns the data (WASM / from_data path), move it out instead of copying. At minimum document that this always copies for external strings.","locations":[{"ref":"crates/napi/src/js_values/string/latin1.rs:409-411","code":"  409 |   pub fn take(self) -> Vec<u8> {\n  410 |     self.as_slice().to_vec()\n  411 |   }","lines":3,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/string/latin1.rs#L409-L411"},{"ref":"crates/napi/src/js_values/string/utf16.rs:444-448","code":"  444 | impl From<JsStringUtf16<'_>> for Vec<u16> {\n  445 |   fn from(value: JsStringUtf16) -> Self {\n  446 |     value.as_slice().to_vec()\n  447 |   }\n  448 | }","lines":5,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/string/utf16.rs#L444-L448"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`JsStringUtf8::into_owned` does `String::from_utf8_unchecked(self.buf.to_vec())` - it clones the buffer into a new Vec even though `self` is consumed by value and already owns `self.buf`. The copy is unnecessary; the owned Vec can be moved directly. Same wasteful `.to_vec()` in `take()` which also clones a buffer it owns by value.","fix":"Use `String::from_utf8_unchecked(self.buf)` and `self.buf` directly (move out of `self`) instead of `self.buf.to_vec()`.","locations":[{"ref":"crates/napi/src/js_values/string/utf8.rs:29-35","code":"   29 |   pub fn into_owned(self) -> Result<String> {\n   30 |     Ok(unsafe { String::from_utf8_unchecked(self.buf.to_vec()) })\n   31 |   }\n   32 | \n   33 |   pub fn take(self) -> Vec<u8> {\n   34 |     self.buf.to_vec()\n   35 |   }","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/string/utf8.rs#L29-L35"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Object::define_properties` collects the property descriptors iterator into a `Vec` solely to take\n`.as_ptr()` (line 500-502), and separately `clone()`s the iterator earlier (line 472) to gather\nclosure data. The temporary `Vec<napi_property_descriptor>` is allocated on every call; for objects\nwith many properties on a hot construction path this is an extra allocation that could reuse a\nstack/SmallVec buffer.","fix":"Collect once into a single Vec and reuse it; or use a SmallVec to avoid heap allocation for small property counts.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/object.rs:465-505","code":"  465 |   fn define_properties(&mut self, properties: &[Property]) -> Result<()> {\n  466 |     let properties_iter = properties.iter().map(|property| property.raw());\n  467 |     let env = self.value().env;\n  468 |     #[cfg(feature = \"napi5\")]\n  469 |     {\n  470 |       if !properties.is_empty() {\n  471 |         let mut closures = properties_iter\n  472 |           .clone()\n  473 |           .map(|p| p.data)\n  474 |           .filter(|data| !data.is_null())\n  475 |           .collect::<Vec<*mut std::ffi::c_void>>();\n  476 |         if !closures.is_empty() {\n  477 |           let finalize_hint = Box::into_raw(Box::new((closures.len(), closures.capacity())));\n  478 |           check_status!(\n  479 |             unsafe {\n  480 |               sys::napi_add_finalizer(\n  481 |                 env,\n  482 |                 self.value().value,\n  483 |                 closures.as_mut_ptr().cast(),\n  484 |                 Some(finalize_closures),\n  485 |                 finalize_hint.cast(),\n  486 |                 ptr::null_mut(),\n  487 |               )\n  488 |             },\n  489 |             \"Failed to add finalizer\"\n  490 |           )?;\n  491 |           std::mem::forget(closures);\n  492 |         }\n  493 |       }\n  494 |     }\n  495 |     check_status!(unsafe {\n  496 |       sys::napi_define_properties(\n  497 |         env,\n  498 |         self.value().value,\n  499 |         properties.len(),\n  500 |         properties_iter\n  501 |           .collect::<Vec<sys::napi_property_descriptor>>()\n  502 |           .as_ptr(),\n  503 |       )\n  504 |     })\n  505 |   }","lines":41,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/object.rs#L465-L505"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In `napi_register_module_v1`, the first pass folds `register_callback` into a `HashMap<Option<&str>, Vec<...>>` by cloning every `(name, cb)` tuple into per-module vecs, then iterates. For modules with many exports this allocates a transient HashMap + Vec per module unnecessarily; the items could be grouped by sorting or processed in place since the source is already a `Vec`.","fix":"Group by `js_mod` once (e.g. sort or use the entry API without cloning into intermediate vecs), or iterate the original vec while caching the current mod's export object.","locations":[{"ref":"crates/napi/src/bindgen_runtime/module_register.rs:313-383","code":"  313 |     register_callback\n  314 |       .iter_mut()\n  315 |       .fold(\n  316 |         HashMap::<Option<&'static str>, Vec<(&'static str, ExportRegisterCallback)>>::new(),\n  317 |         |mut acc, (js_mod, item)| {\n  318 |           if let Some(k) = acc.get_mut(js_mod) {\n  319 |             k.push(*item);\n  320 |           } else {\n  321 |             acc.insert(*js_mod, vec![*item]);\n  322 |           }\n  323 |           acc\n  324 |         },\n  325 |       )\n  326 |       .iter()\n  327 |       .for_each(|(js_mod, items)| {\n  328 |         let mut exports_js_mod = ptr::null_mut();\n  329 |         if let Some(js_mod_str) = js_mod {\n  330 |           let mod_name_c_str =\n  331 |             unsafe { CStr::from_bytes_with_nul_unchecked(js_mod_str.as_bytes()) };\n  332 |           if exports_objects.contains(*js_mod_str) {\n  333 |             check_status_or_throw!(\n  334 |               env,\n  335 |               unsafe {\n  336 |                 sys::napi_get_named_property(\n  337 |                   env,\n  338 |                   exports,\n  339 |                   mod_name_c_str.as_ptr(),\n  340 |                   &mut exports_js_mod,\n  341 |                 )\n  342 |               },\n  343 |               \"Get mod {} from exports failed\",\n  344 |               js_mod_str,\n  345 |             );\n  346 |           } else {\n  347 |             check_status_or_throw!(\n  348 |               env,\n  349 |               unsafe { sys::napi_create_object(env, &mut exports_js_mod) },\n  350 |               \"Create export JavaScript Object [{}] failed\",\n  351 |               js_mod_str\n  352 |             );\n  353 |             check_status_or_throw!(\n  354 |               env,\n  355 |               unsafe {\n  356 |                 sys::napi_set_named_property(env, exports, mod_name_c_str.as_ptr(), exports_js_mod)\n  357 |               },\n  358 |               \"Set exports Object [{}] into exports object failed\",\n  359 |               js_mod_str\n  360 |             );\n  361 |             exports_objects.insert(js_mod_str.to_string());\n  362 |           }\n  363 |         }\n  364 |         for (name, callback) in items {\n  365 |           unsafe {\n  366 |             let js_name = CStr::from_bytes_with_nul_unchecked(name.as_bytes());\n  367 |             if let Err(e) = callback(env).and_then(|v| {\n  368 |               let exported_object = if exports_js_mod.is_null() {\n  369 |                 exports\n  370 |               } else {\n  371 |                 exports_js_mod\n  372 |               };\n  373 |               check_status!(\n  374 |                 sys::napi_set_named_property(env, exported_object, js_name.as_ptr(), v),\n  375 |                 \"Failed to register export `{}`\",\n  376 |                 name,\n  377 |               )\n  378 |             }) {\n  379 |               JsError::from(e).throw_into(env)\n  380 |             }\n  381 |           }\n  382 |         }\n  383 |       });","lines":71,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/module_register.rs#L313-L383"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Status::Display` and `ValueType::Display` allocate a `String` via\n`format!(\"{self:?}\")` just to write it, on every Display call. Since both\nalready have an `as_ref()`/Debug-derived name, Display could write the static\nstr directly without allocating.","fix":"For Status, `write!(f, \"{}\", self.as_ref())`. For ValueType, write the variant name directly with `f.write_str(...)` instead of allocating a String.","locations":[{"ref":"crates/napi/src/status.rs:36-41","code":"   36 | impl Display for Status {\n   37 |   fn fmt(&self, f: &mut Formatter<'_>) -> Result {\n   38 |     let status_string = format!(\"{self:?}\");\n   39 |     write!(f, \"{status_string}\")\n   40 |   }\n   41 | }","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/status.rs#L36-L41"},{"ref":"crates/napi/s turn_type\n  680 |           // if not and just keep the origin's logic\n  681 |           if is_function_with_lifetime {\n  682 |             is_return_type = index != 1;\n  683 |           }","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen.rs#L678-L683"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The `BUILT_FLAG` doc comment in expand/napi.rs describes a `compare_exchange(false, true, Acquire, Relaxed)` pattern whose `if ... .is_ok()` body is the first-expansion logic. The actual code at lines 22-27 nests `if !built` inside the `Ok(built)` arm, but `compare_exchange` returns `Ok` only when the prior value equalled `false`, so `built` is always `false` in that arm and the inner `if !built` is always true (dead guard). The comment shows the simpler/correct intended form; the code has a redundant always-true check.","fix":"Drop the inner `if !built` (it is always true on the success arm), matching the documented pattern: `if BUILT_FLAG.compare_exchange(...).is_ok() { typedef::prepare_type_def_file(); }`.","locations":[{"ref":"crates/macro/src/expand/napi.rs:9-27","code":"    9 | /// a flag indicate whether or never at least one `napi` macro has been expanded.\n   10 | /// ```ignore\n   11 | /// if BUILT_FLAG\n   12 | ///  .compare_exchange(false, true, Ordering::Acquire, Ordering::Relaxed)\n   13 | ///  .is_ok() {\n   14 | ///   // logic on first macro expansion\n   15 | /// }\n   16 | ///\n   17 | /// ```\n   18 | static BUILT_FLAG: AtomicBool = AtomicBool::new(false);\n   19 | \n   20 | pub fn expand(attr: TokenStream, input: TokenStream) -> BindgenResult<TokenStream> {\n   21 |   // logic on first macro expansion\n   22 |   if let Ok(built) = BUILT_FLAG.compare_exchange(false, true, Ordering::Acquire, Ordering::Relaxed)\n   23 |   {\n   24 |     if !built {\n   25 |       typedef::prepare_type_def_file();\n   26 | tic`. It conveys no span/location and clutters output.","fix":"Remove the `println!`; the `#diagnostic` token stream already surfaces the error to the compiler. If a trace is desired, gate it behind the existing `NAPI_DEBUG_GENERATED_CODE` env check.","locations":[{"ref":"crates/macro/src/lib.rs:35-39","code":"   35 |     Err(diagnostic) => {\n   36 |       println!(\"`napi` macro expand failed.\");\n   37 | \n   38 |       (quote! { #diagnostic }).into()\n   39 |     }","lines":5,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/lib.rs#L35-L39"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`WriteableStream` is misspelled (should be `WritableStream`) throughout the public type name and `TypeName::type_name()` returns \"WriteableStream\", while `ValidateNapiValue` correctly checks the JS global `WritableStream`. The mismatch means generated TypeScript / error messages use the wrong name 'WriteableStream', and the type name will not match the actual JS class name.","fix":"Rename the struct to `WritableStream` and return \"WritableStream\" from `type_name()` (with a deprecated alias if backward compatibility is needed).","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/stream/write.rs:10-36","code":"   10 | pub struct WriteableStream<'env> {\n   11 |   pub(crate) value: sys::napi_value,\n   12 |   pub(crate) env: sys::napi_env,\n   13 |   pub(crate) _scope: &'env PhantomData<()>,\n   14 | }\n   15 | \n   16 | impl<'env> JsValue<'env> for WriteableStream<'env> {\n   17 |   fn value(&self) -> Value {\n   18 |     Value {\n   19 |       env: self.env,\n   20 |       value: self.value,\n   21 |       value_type: ValueType::Object,\n   22 |     }\n   23 |   }\n   24 | }\n   25 | \n   26 | impl<'env> JsObjectValue<'env> for WriteableStream<'env> {}\n   27 | \n   28 | impl TypeName for WriteableStream<'_> {\n   29 |   fn type_name() -> &'static str {\n   30 |     \"WriteableStream\"\n   31 |   }\n   32 | \n   33 |   fn value_type() -> ValueType {\n   34 |     ValueType::Object\n   35 |   }\n   36 | }","lines":27,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/stream/write.rs#L10-L36"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"In the dyn-symbols `generate!` macro, `load` writes to the `static mut NAPI` and reads `NAPI.$name` (for the stub fallback) within the same assignment expression. This relies on `static mut` access which is increasingly lint-flagged (Rust 2024 `static_mut_refs`). More importantly, `load` is not thread-safe: if two threads call `setup`/`load` concurrently they race on `NAPI`. Node-API addons typically load once on the main thread, so this is low severity, but the global mutable function table has no synchronization.","fix":"Document the single-call/main-thread requirement (the `setup` doc partly does), and consider migrating to `OnceLock`/`addr_of_mut!` to satisfy the 2024 lint and remove the data race.","locations":[{"ref":"crates/sys/src/lib.rs:38-70","code":"   38 |     static mut NAPI: Napi = {\n   39 |       $(\n   40 |         generate!(@stub_fn $name($($param: $ptype,)*) $( -> $rtype)?);\n   41 |       )*\n   42 | \n   43 |       Napi {\n   44 |         $(\n   45 |           $name,\n   46 |         )*\n   47 |       }\n   48 |     };\n   49 | \n   50 |     #[allow(clippy::missing_safety_doc)]\n   51 |     pub unsafe fn load(\n   52 |       host: &libloading::Library,\n   53 |     ) -> Result<(), libloading::Error> {\n   54 |       NAPI = Napi {\n   55 |         $(\n   56 |           $name: {\n   57 |             let symbol: Result<libloading::Symbol<unsafe extern \"C\" fn ($(_: $ptype,)*)$( -> $rtype)*>, libloading::Error> = host.get(stringify!($name).as_bytes());\n   58 |             match symbol {\n   59 |               Ok(f) => *f,\n   60 |      ) *\n   94 |     }\n   95 |   };\n   96 | }","lines":11,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/sys/src/lib.rs#L86-L96"}]},{"id":"DATA_R_1","type":"data_race","type_label":"Data Race","severity":"medium","easy":false,"description":"`create_custom_gc` decides whether to create the CustomGC threadsafe function based on `!FIRST_MODULE_REGISTERED.load(SeqCst)`, but `FIRST_MODULE_REGISTERED` is only stored `true` at the very end of `napi_register_module_v1` (line 544), after `create_custom_gc` runs (line 508). When multiple worker threads register concurrently, the first-thread guard (`MODULE_COUNT.fetch_add != 0` -> `wait_first_thread_registered`) makes later threads spin until the flag is set, but `create_custom_gc` is also reached by those later threads and re-reads the same not-yet-final flag, so the intended `CUSTOM_GC_TSFN.store` 'only once' invariant relies on serialization that is not actually enforced by an atomic CAS. A second store would overwrite/leak the first TSFN pointer.","fix":"Guard TSFN creation with a dedicated `AtomicBool`/`OnceLock` using compare-exchange (or create it before releasing `FIRST_MODULE_REGISTERED`), instead of reading a flag that is only set later.","locations":[{"ref":"crates/napi/src/bindgen_runtime/module_register.rs:565-617","code":"  565 | #[cfg(all(feature = \"napi4\", not(feature = \"noop\")))]\n  566 | fn create_custom_gc(env: sys::napi_env) {\n  567 |   if !FIRST_MODULE_REGISTERED.load(Ordering::SeqCst) {\n  568 |     let mut custom_gc_fn = ptr::null_mut();\n  569 |     check_status_or_throw!(\n  570 |       env,\n  571 |       unsafe {\n  572 |         sys::napi_create_function(\n  573 |           env,\n  574 |           c\"custom_gc\".as_ptr(),\n  575 |           9,\n  576 |           Some(empty),\n  577 |           ptr::null_mut(),\n  578 |           &mut custom_gc_fn,\n  579 |         )\n  580 |       },\n  581 |       \"Create Custom GC Function in napi_register <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
