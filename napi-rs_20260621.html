alues/arraybuffer.rs:756-758","code":"  756 |         let ratio = mem::size_of::<$rust_type>();\n  757 |         let val_length = val.length;\n  758 |         let length = val_length * ratio;","lines":3,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/arraybuffer.rs#L756-L758"},{"ref":"crates/napi/src/bindgen_runtime/js_values/arraybuffer.rs:830-832","code":"  830 |         let ratio = mem::size_of::<$rust_type>();\n  831 |         let val_length = val.length;\n  832 |         let length = val_length * ratio;","lines":3,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/arraybuffer.rs#L830-L832"},{"ref":"crates/napi/src/bindgen_runtime/js_values/arraybuffer.rs:963-964","code":"  963 |         let len = data.len();\n  964 |         let array_buffer_len = len * mem::size_of::<$rust_type>();","lines":2,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/arraybuffer.rs#L963-L964"},{"ref":"crates/napi/src/bindgen_runtime/js_values/arraybuffer.rs:1076","code":" 1076 |         let array_buffer_len = data_len * mem::size_of::<$rust_type>();","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/arraybuffer.rs#L1076"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`js_name.len() as isize - 1` is passed as the class-name length to `napi_define_class`. `js_name` is a NUL-terminated `&'static str`, so `len()` includes the trailing NUL and `- 1` strips it. If a malformed registration ever passed an empty string (len 0), this becomes `-1` (i.e. NAPI_AUTO_LENGTH), which silently changes semantics rather than erroring. Minor, since macro-generated names are always non-empty NUL-terminated, but the cast/subtraction is fragile.","fix":"Compute the length defensively (`js_name.len().saturating_sub(1) as isize`) or assert the name is NUL-terminated and non-empty.","locations":[{"ref":"crates/napi/src/bindgen_runtime/module_register.rs:444-444","code":"  444 |               raw_props.len(),","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/module_register.rs#L444"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Numerous string/length conversions cast `usize`/`len()` to `isize` with `as`\n(e.g. `s.len() as isize`, `name.len() as isize`, `chars.len() as isize`). On a\n64-bit platform a string longer than isize::MAX would wrap to a negative length;\nN-API would then interpret a negative length as NAPI_AUTO_LENGTH (-1) or reject\nit. In practice such lengths are unreachable for real strings, but the casts are\nunchecked truncations on external/user data. The hardcoded literal `27` for the\nlength of the async-resource-name string in threadsafe_function is also a magic\nnumber that must stay in sync with the constant (it is the byte length of\n\"napi_rs_threadsafe_function\").","fix":"Use `.try_into()` with explicit error handling for the length casts, or at minimum document the invariant. For the `27` literal use `THREAD_SAFE_FUNCTION_ASYNC_RESOURCE_NAME.len() as isize` so it cannot drift.","locations":[{"ref":"crates/napi/src/env.rs:180-180","code":"  180 |     unsafe { self.create_string_from_c_char(s.as_ptr().cast(), s.len() as isize) }","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L180"},{"ref":"crates/napi/src/env.rs:185-185","code":"  185 |     unsafe { self.create_string_from_c_char(s.as_ptr().cast(), s.len() as isize) }","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L185"},{"ref":"crates/napi/src/threadsafe_function.rs:298-301","code":"  298 |           27,\n  299 |           None,\n  300 |           ptr::null_mut(),\n  301 |           &mut async_resource_name,","lines":4,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/threadsafe_function.rs#L298-L301"},{"ref":"crates/napi/src/threadsafe_function.rs:315-318","code":"  315 |           THREAD_SAFE_FUNCTION_ASYNC_RESOURCE_NAME.as_ptr().cast(),\n  316 |           27,\n  317 |           &mut async_resource_name,\n  318 |         )","lines":4,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/threadsafe_function.rs#L315-L318"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`len*2 + 1` in `into_latin1_string` can overflow `usize` (panic in debug, wraparound in release leading to an undersized allocation and out-of-bounds write inside `convert_latin1_to_str`) for an extremely large latin1 string (len > usize::MAX/2). Reachable only for absurdly large strings but unguarded.","fix":"Use checked arithmetic or `encoding_rs::mem::convert_latin1_to_str` requires dst at least 2x src; allocate with `self.len().checked_mul(2).and_then(|v| v.checked_add(1))` and error on overflow.","locations":[{"ref":"crates/napi/src/js_values/string/latin1.rs:419","code":"  419 |     let mut dst_str = unsafe { String::from_utf8_unchecked(vec![0; self.len() * 2 + 1]) };","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/string/latin1.rs#L419"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Artifact dist-dir matching uses substring `includes` instead of an exact suffix/equality check: `distDirs.find((dir) => dir.includes(platformArchABI))`. `platformArchABI` values like `linux-x64-gnu` and `linux-x64-musl` are fine, but values that are prefixes of others (e.g. `darwin-arm64` vs a hypothetical `darwin-arm64-...`, or `linux-arm` vs `linux-arm64`) can match the wrong directory, copying a binary into the wrong scoped npm package. Path-substring matching is also fragile if the npm dir path itself happens to contain the token.","fix":"Compare against the directory's basename for equality, e.g. `distDirs.find((dir) => parse(dir).base === platformArchABI)`.","locations":[{"ref":"cli/src/api/artifacts.ts:60-69","code":"   60 |           const dir = distDirs.find((dir) => dir.includes(platformArchABI))\n   61 |           if (!dir && universalSourceBins.has(platformArchABI)) {\n   62 |             debug.warn(\n   63 |               `[${platformArchABI}] has no dist dir but it is source bin for universal arch, skip`,\n   64 |             )\n   65 |             return\n   66 |           }\n   67 |           if (!dir) {\n   68 |             throw new Error(`No dist dir found for ${filePath}`)\n   69 |           }","lines":10,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/artifacts.ts#L60-L69"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`NapiConst::gen_module_register` registers the exported constant under the Rust\nidentifier `self.name` instead of the JavaScript name `self.js_name`. The\nnull-terminated literal that is passed to `register_module_export` as the export\nkey is built from `self.name`:\n\n    let js_name_lit = Literal::string(&format!(\"{}\\0\", self.name));\n\nEvery other code generator uses `js_name` for the export key (e.g.\n`codegen/enum.rs:223` `format!(\"{}\\0\", &self.js_name)`, `codegen/fn.rs:776`\n`format!(\"{}\\0\", &self.js_name)`). Meanwhile the TypeScript `.d.ts` produced by\n`typegen/const.rs` emits `export const {js_name}: ...`. So when a const is\nrenamed via `#[napi(js_name = \"...\")]`, the runtime registers the export under\nthe Rust name while the type definition declares the JS name, producing a name\nmismatch (the declared constant is missing at runtime).","fix":"Use `self.js_name` when building `js_name_lit`: `Literal::string(&format!(\"{}\\0\", self.js_name))`, matching enum/fn codegen.","locations":[{"ref":"crates/backend/src/codegen/const.rs:25-25","code":"   25 |     let js_name_lit = Literal::string(&format!(\"{}\\0\", self.name));","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/codegen/const.rs#L25"},{"ref":"crates/backend/src/typegen/const.rs:20-25","code":"   20 |       original_name: Some(self.name.to_string()),\n   21 |       def: format!(\n   22 |         \"export const {}: {}\",\n   23 |         &self.js_name,\n   24 |         ty_to_ts_type(&self.type_name, false, false, false).0\n   25 |       ),","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen/const.rs#L20-L25"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Duplicate-constructor detection in `check_recorded_struct_for_impl` is gated behind `!cfg!(debug_assertions)`, so in debug builds (the default `cargo build`) defining two `#[napi(constructor)]` methods for the same struct is silently allowed and never flagged. The guard appears intended to avoid false positives from rust-analyzer / multiple expansions, but it disables a real correctness check for the most common build profile, deferring the error to release builds only.","fix":"Reassess the `!cfg!(debug_assertions)` guard. If the goal is to avoid double-counting from re-expansion, track expansion identity instead of disabling the check entirely; at minimum document why duplicate constructors are only rejected in release builds.","locations":[{"ref":"crates/macro/src/parser/attrs.rs:374-387","code":"  374 |   if let Some(parsed) = map.get_mut(&struct_name) {\n  375 |     if opts.constructor().is_some() && !cfg!(debug_assertions) {\n  376 |       if parsed.ctor_defined {\n  377 |         bail_span!(\n  378 |           ident,\n  379 |           \"Constructor has already been defined for struct `{}`\",\n  380 |           &struct_name\n  381 |         );\n  382 |       } else {\n  383 |         parsed.ctor_defined = true;\n  384 |       }\n  385 |     }\n  386 | \n  387 |     Ok(parsed.js_name.clone())","lines":14,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/parser/attrs.rs#L374-L387"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`NaiveDateTime::from_napi_value` allocates `String::with_capacity(iso_string_length + 1)` but then\npasses `iso_string_length` (NOT `iso_string_length + 1`) as the buffer size to the second\n`napi_get_value_string_utf8` call. Node-API needs room for the trailing NUL, so with a buffer size\nof exactly `iso_string_length` it writes only `iso_string_length - 1` characters plus a NUL\nterminator, and reports `written_char_count` accordingly. The code then does\n`set_len(iso_string_length)`, which (a) is larger than the bytes actually written and (b) includes\nthe NUL byte. The resulting string is one character short and contains a trailing NUL, so\n`NaiveDateTime::from_str` will almost always fail (or parse a corrupted string). Compare with the\ncorrect pattern in `string.rs` (`String::from_napi_value`) which does `len += 1` and passes the\nincremented `len` as the buffer size. Here `set_len` uses the SECOND `iso_string_length` value\nreturned by the call, which compounds the issue.","fix":"Allocate with `iso_string_length + 1` capacity AND pass `iso_string_length + 1` as the buffer-size\nargument, then `set_len(written_char_count)` using the count returned by the call (not the original\nlength). Mirror the implementation in `string.rs::String::from_napi_value`.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/date.rs:80-117","code":"   80 |     let mut iso_string_length = 0;\n   81 |     check_status!(\n   82 |       unsafe {\n   83 |         sys::napi_get_value_string_utf8(\n   84 |           env,\n   85 |           iso_string_value,\n   86 |           ptr::null_mut(),\n   87 |           0,\n   88 |           &mut iso_string_length,\n   89 |         )\n   90 |       },\n   91 |       \"Get ISOString length failed\"\n   92 |     )?;\n   93 |     let mut iso_string = String::with_capacity(iso_string_length + 1);\n   94 |     check_status!(\n   95 |       unsafe {\n   96 |         sys::napi_get_value_string_utf8(\n   97 |           env,\n   98 |           iso_string_value,\n   99 |           iso_string.as_mut_ptr().cast(),\n  100 |           iso_string_length,\n  101 |           &mut iso_string_length,\n  102 |         )\n  103 |       },\n  104 |       \"Get ISOString length failed\"\n  105 |     )?;\n  106 | \n  107 |     unsafe { iso_string.as_mut_vec().set_len(iso_string_length) };\n  108 | \n  109 |     let naive = NaiveDateTime::from_str(iso_string.as_str()).map_err(|err| {\n  110 |       Error::new(\n  111 |         Status::InvalidArg,\n  112 |         format!(\"Failed to convert napi value into rust type `NaiveDateTime` {err} {iso_string}\"),\n  113 |       )\n  114 |     })?;\n  115 | \n  116 |     Ok(naive)\n  117 |   }","lines":38,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/date.rs#L80-L117"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`ReadableStream::cancel` documents and intends to call the stream's `cancel()` method but actually fetches and invokes the `abort` named property (`c\"abort\"`). The `ReadableStream` Web API has no `abort` method (that belongs to `WritableStream`); the correct method is `cancel`. As written, `napi_get_named_property` returns `undefined` for `abort`, and the subsequent `napi_call_function` on a non-function will fail, so `cancel(reason)` never cancels the readable stream.","fix":"Fetch `c\"cancel\".as_ptr()` instead of `c\"abort\"` and update the error messages accordingly.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/stream/read.rs:104-133","code":"  104 |   pub fn cancel(&mut self, reason: Option<String>) -> Result<PromiseRaw<'_, ()>> {\n  105 |     let mut cancel_fn = ptr::null_mut();\n  106 |     check_status!(\n  107 |       unsafe {\n  108 |         sys::napi_get_named_property(\n  109 |           self.env,\n  110 |           self.value,\n  111 |           c\"abort\".as_ptr().cast(),\n  112 |           &mut cancel_fn,\n  113 |         )\n  114 |       },\n  115 |       \"Get abort property failed\"\n  116 |     )?;\n  117 |     let reason_value = unsafe { ToNapiValue::to_napi_value(self.env, reason)? };\n  118 |     let mut promise = ptr::null_mut();\n  119 |     check_status!(\n  120 |       unsafe {\n  121 |         sys::napi_call_function(\n  122 |           self.env,\n  123 |           self.value,\n  124 |           cancel_fn,\n  125 |           1,\n  126 |           [reason_value].as_ptr(),\n  127 |           &mut promise,\n  128 |         )\n  129 |       },\n  130 |       \"Call abort function failed\"\n  131 |     )?;\n  132 |     Ok(PromiseRaw::new(self.env, promise))\n  133 |   }","lines":30,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/stream/read.rs#L104-L133"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`From<Unknown> for Error` (non-wasm) creates a napi reference with refcount 1\n(`napi_create_reference(..., 1, &mut result)`) and stores it in `maybe_raw`. The\n`Drop` impl for `Error` unrefs and, on reaching 0, deletes the reference. But\n`maybe_env` is captured as `value.0.env`, and there is no guarantee the env is\nstill valid (or that Drop runs on the JS thread) when the Error is dropped —\nErrors are `Send`/`Sync` (declared unsafe impl) and routinely moved across\nthreads (e.g. into futures, threadsafe-function callbacks). Calling\n`napi_reference_unref`/`napi_delete_reference` from a non-JS thread or after env\nteardown is undefined behavior. The Drop prints to stderr on non-ok status but\nstill performs the unsafe call unconditionally.","fix":"Only touch the napi reference from the owning JS thread. Either make Error carry a thread/env guard, route reference cleanup through the threadsafe-function/main-thread, or document and enforce that an Error carrying maybe_raw must not be dropped off-thread. At minimum, the unsafe Send/Sync should be reconsidered for the maybe_raw-carrying case.","locations":[{"ref":"crates/napi/src/error.rs:34-53","code":"   34 | #[cfg(not(feature = \"noop\"))]\n   35 | impl<S: AsRef<str>> Drop for Error<S> {\n   36 |   fn drop(&mut self) {\n   37 |     // @TODO: deal with Error created with reference and leave it to drop in `async fn`\n   38 |     if !self.maybe_raw.is_null() {\n   39 |       let mut ref_count = 0;\n   40 |       let status =\n   41 |         unsafe { sys::napi_reference_unref(self.maybe_env, self.maybe_raw, &mut ref_count) };\n   42 |       if status != sys::Status::napi_ok {\n   43 |         eprintln!(\"unref error reference failed: {}\", Status::from(status));\n   44 |       }\n   45 |       if ref_count == 0 {\n   46 |         let status = unsafe { sys::napi_delete_reference(self.maybe_env, self.maybe_raw) };\n   47 |         if status != sys::Status::napi_ok {\n   48 |           eprintln!(\"delete error reference failed: {}\", Status::from(status));\n   49 |         }\n   50 |       }\n   51 |     }\n   52 |   }\n   53 | }","lines":20,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/error.rs#L34-L53"},{"ref":"crates/napi/src/error.rs:102-103","code":"  102 | unsafe impl<S> Send for Error<S> where S: Send + AsRef<str> {}\n  103 | unsafe impl<S> Sync for Error<S> where S: Sync + AsRef<str> {}","lines":2,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/error.rs#L102-L103"},{"ref":"crates/napi/src/error.rs:134-169","code":"  134 | #[cfg(not(target_family = \"wasm\"))]\n  135 | impl From<Unknown<'_>> for Error {\n  136 |   fn from(value: Unknown) -> Self {\n  137 |     let mut result = std::ptr::null_mut();\n  138 |     let status = unsafe { sys::napi_create_reference(value.0.env, value.0.value, 1, &mut result) };\n  139 |     if status != sys::Status::napi_ok {\n  140 |       return Error::new(\n  141 |         Status::from(status),\n  142 |         \"Create Error reference failed\".to_owned(),\n  143 |       );\n  144 |     }\n  145 |     let maybe_env = value.0.env;\n  146 |     let maybe_error_message = value\n  147 |       .coerce_to_string()\n  148 |       .and_then(|a| a.into_utf8().and_then(|a| a.into_owned()));\n  149 |     let maybe_cause = extract_error_cause(value).unwrap_or(None);\n  150 | \n  151 |     if let Ok(error_message) = maybe_error_message {\n  152 |       return Self {\n  153 |         status: Status::GenericFailure,\n  154 |         reason: error_message,\n  155 |         cause: maybe_cause,\n  156 |         maybe_raw: result,\n  157 |         maybe_env,\n  158 |       };\n  159 |     }\n  160 | \n  161 |     Self {\n  162 |       status: Status::GenericFailure,\n  163 |       reason: \"\".to_string(),\n  164 |       cause: maybe_cause,\n  165 |       maybe_raw: result,\n  166 |       maybe_env,\n  167 |     }\n  168 |   }\n  169 | }","lines":36,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/error.rs#L134-L169"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`serialize_struct_variant` builds an `outer` object, attaches the inner object under the variant name, but then discards `outer` entirely and returns a StructSerializer wrapping a brand-new empty `Object`. The result is that struct-variant enums serialize to a plain object of the fields WITHOUT the variant wrapper, and the `inner` object that was attached to `outer` is never populated (the StructSerializer writes into the third, unrelated object). This produces incorrect JSON for externally-tagged struct-variant enums (e.g. `{ \"Variant\": { ...fields } }` is expected, but the produced value is `{ ...fields }` with no variant key).","fix":"Return `Ok(StructSerializer { obj: inner })` and return the `outer` object from `end()`. Restructure StructSerializer so the variant case keeps a reference to `outer` and serializes fields into `inner`; `end()` for the variant must return `outer.0`, not `inner`/the discarded object.","locations":[{"ref":"crates/napi/src/js_values/ser.rs:348-371","code":"  348 |   fn serialize_struct_variant(\n  349 |     self,\n  350 |     _name: &'static str,\n  351 |     _variant_index: u32,\n  352 |     variant: &'static str,\n  353 |     _len: usize,\n  354 |   ) -> Result<Self::SerializeStructVariant> {\n  355 |     let mut outer = Object::new(self.0)?;\n  356 |     let inner = Object::new(self.0)?;\n  357 |     outer.set_named_property(\n  358 |       variant,\n  359 |       Object(\n  360 |         Value {\n  361 |           env: inner.0.env,\n  362 |           value: inner.0.value,\n  363 |           value_type: ValueType::Object,\n  364 |         },\n  365 |         PhantomData,\n  366 |       ),\n  367 |     )?;\n  368 |     Ok(StructSerializer {\n  369 |       obj: Object::new(self.0)?,\n  370 |     })\n  371 |   }","lines":24,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/ser.rs#L348-L371"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"BINDGEN_EXTRA_CLANG_ARGS is built with a stray trailing `}` brace. The template literal `--sysroot=${this.envs.TARGET_SYSROOT}}` interpolates the sysroot path and then appends a literal closing brace, producing e.g. `--sysroot=/path/to/sysroot}`. clang/bindgen will receive a malformed sysroot path that does not exist, breaking cross-compilation header resolution when using `--use-napi-cross`.","fix":"Remove the extra brace: `--sysroot=${this.envs.TARGET_SYSROOT}`.","locations":[{"ref":"cli/src/api/build.ts:260-263","code":"  260 |       this.setEnvIfNotExists(\n  261 |         'BINDGEN_EXTRA_CLANG_ARGS',\n  262 |         `--sysroot=${this.envs.TARGET_SYSROOT}}`,\n  263 |       )","lines":4,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/build.ts#L260-L263"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Rust package-name sanitization in `renameProject` uses `String.prototype.replace` with plain string patterns, which only replaces the FIRST occurrence. `options.binaryName.replace('@', '').replace('/', '_')` will leave any second `@` or `/` intact, producing an invalid Cargo package name for scoped names containing more than one such character (e.g. unusual monorepo names). Only the `-` replacement uses a global regex.","fix":"Use global replacements: `.replaceAll('@', '').replaceAll('/', '_').replace(/-/g, '_').toLowerCase()` (or regex with /g).","locations":[{"ref":"cli/src/api/rename.ts:84-89","code":"   84 |     const sanitizedName = options.binaryName\n   85 |       .replace('@', '')\n   86 |       .replace('/', '_')\n   87 |       .replace(/-/g, '_')\n   88 |       .toLowerCase()\n   89 |     cargoToml.package.name = sanitizedName","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/rename.ts#L84-L89"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`fetchNapiVersion` sets the inquirer select default to `this.minNodeApiVersion - 1` with the comment `// choice index`, assuming the napi-version values map 1:1 onto choice indices (NapiVersion 1 -> index 0, etc). But `getNapiVersionChoices` returns choices whose `value` is the NapiVersion number and inquirer `select` `default` is matched against the choice VALUE, not an index. Passing `minNodeApiVersion - 1` therefore preselects the wrong entry (off by one): e.g. default minNodeApiVersion=4 preselects value 3 (Napi3) instead of Napi4. The 'choice index' comment is also wrong since select compares by value.","fix":"Pass the value directly as the default: `default: this.minNodeApiVersion` (remove the `- 1` and the misleading comment), since inquirer matches `default` against choice `value`.","locations":[{"ref":"cli/src/commands/new.ts:85-94","code":"   85 |   private async fetchNapiVersion(): Promise<number> {\n   86 |     return select({\n   87 |       message: 'Minimum node-api version (with node version requirement)',\n   88 |       loop: false,\n   89 |       pageSize: 10,\n   90 |       choices: getNapiVersionChoices(),\n   91 |       // choice index\n   92 |       default: this.minNodeApiVersion - 1,\n   93 |     })\n   94 |   }","lines":10,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/commands/new.ts#L85-L94"},{"ref":"cli/src/commands/new.ts:21-26","code":"   21 | export function getNapiVersionChoices() {\n   22 |   return SUPPORTED_NAPI_VERSIONS.map((version) => ({\n   23 |     name: `napi${version} (${napiEngineRequirement(version)})`,\n   24 |     value: version,\n   25 |   }))\n   26 | }","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/commands/new.ts#L21-L26"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`readNapiConfig` merges config via es-toolkit `merge` and then handles targets separately, but when both a `napi` field in package.json AND a separate config file exist it does `Object.assign(userNapiConfig, separatedConfig)`. Object.assign is a shallow merge, so nested objects like `wasm.browser` from the package.json napi field are entirely replaced (not deep-merged) by the separate config's `wasm`, even if the separate config only sets `wasm.initialMemory`. This can silently drop browser wasm settings when a user splits config across both locations.","fix":"Deep-merge separatedConfig over the package.json napi field (use the same `merge` helper) instead of shallow Object.assign, or document that the separate config fully replaces the napi field.","locations":[{"ref":"cli/src/utils/config.ts:204-226","code":"  204 |   const userNapiConfig = pkgJson.napi ?? {}\n  205 |   if (pkgJson.napi && separatedConfig) {\n  206 |     const pkgJsonPath = underline(path)\n  207 |     const configPathUnderline = underline(configPath!)\n  208 |     console.warn(\n  209 |       yellow(\n  210 |         `Both napi field in ${pkgJsonPath} and [NAPI-RS config](${configPathUnderline}) file are found, the NAPI-RS config file will be used.`,\n  211 |       ),\n  212 |     )\n  213 |   }\n  214 |   if (separatedConfig) {\n  215 |     Object.assign(userNapiConfig, separatedConfig)\n  216 |   }\n  217 |   const napiConfig: NapiConfig = merge(\n  218 |     {\n  219 |       binaryName: 'index',\n  220 |       packageName: pkgJson.name,\n  221 |       targets: [],\n  222 |       packageJson: pkgJson,\n  223 |       npmClient: 'npm',\n  224 |     },\n  225 |     omit(userNapiConfig, ['targets']),\n  226 |   )","lines":23,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/utils/config.ts#L204-L226"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"String-enum union generation uses an overly broad regex. For the type-only union branch, `line.def.replaceAll(/.*=/g, '').replaceAll(',', '|')` strips everything up to the LAST `=` on each line because `.*` is greedy and the regex is multiline-unaware/global. If an enum variant's value text contains an `=` (or the def spans constructs with `=`), the wrong portion is removed. It also turns commas inside the resulting text into `|` indiscriminately, which can corrupt values that legitimately contain commas.","fix":"Parse the def line-by-line and extract the right-hand string literal of each `name = 'value'` pair explicitly, rather than a single global greedy `.*=` strip; build the union from the parsed literals.","locations":[{"ref":"cli/src/utils/typegen.ts:71-79","code":"   71 |     case TypeDefKind.StringEnum: {\n   72 |       if (constEnum) {\n   73 |         s += `${exportDeclare(ambient)} const enum ${line.name} {\\n${line.def}\\n}`\n   74 |       } else if (runtimeStringEnum) {\n   75 |         s += `${exportDeclare(ambient)} enum ${line.name} {\\n${line.def}\\n}`\n   76 |       } else {\n   77 |         s += `export type ${line.name} = ${line.def.replaceAll(/.*=/g, '').replaceAll(',', '|')};`\n   78 |       }\n   79 |       break","lines":9,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/utils/typegen.ts#L71-L79"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`parseNodeVersion` requires a full `major.minor.patch`, but the NAPI_VERSION_MATRIX entries are split on `'|'` while the matrix strings use `' | '` (spaces around the pipe). `requirement.split('|')` yields entries with leading/trailing spaces like ` 9.0.0 `; the regex `/v?([0-9]+)\\.([0-9]+)\\.([0-9]+)/i` tolerates surrounding whitespace so it works, but `toEngineRequirement` then emits `>= 9.0.0` etc. This is fragile: any matrix entry without all three version components (none currently) would throw. Lower risk, but the split delimiter not matching the literal separator is a latent bug if the matrix format changes.","fix":"Split on /\\s*\\|\\s*/ and/or validate entries explicitly; keep the separator handling robust to spacing.","locations":[{"ref":"cli/src/utils/version.ts:54-62","code":"   54 | function requiredNodeVersions(napiVersion: NapiVersion): NodeVersion[] {\n   55 |   const requirement = NAPI_VERSION_MATRIX.get(napiVersion)\n   56 | \n   57 |   if (!requirement) {\n   58 |     return [parseNodeVersion('10.0.0')]\n   59 |   }\n   60 | \n   61 |   return requirement.split('|').map(parseNodeVersion)\n   62 | }","lines":9,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/utils/version.ts#L54-L62"},{"ref":"cli/src/utils/version.ts:16-26","code":"   16 | const NAPI_VERSION_MATRIX = new Map<NapiVersion, string>([\n   17 |   [NapiVersion.Napi1, '8.6.0 | 9.0.0 | 10.0.0'],\n   18 |   [NapiVersion.Napi2, '8.10.0 | 9.3.0 | 10.0.0'],\n   19 |   [NapiVersion.Napi3, '6.14.2 | 8.11.2 | 9.11.0 | 10.0.0'],\n   20 |   [NapiVersion.Napi4, '10.16.0 | 11.8.0 | 12.0.0'],\n   21 |   [NapiVersion.Napi5, '10.17.0 | 12.11.0 | 13.0.0'],\n   22 |   [NapiVersion.Napi6, '10.20.0 | 12.17.0 | 14.0.0'],\n   23 |   [NapiVersion.Napi7, '10.23.0 | 12.19.0 | 14.12.0 | 15.0.0'],\n   24 |   [NapiVersion.Napi8, '12.22.0 | 14.17.0 | 15.12.0 | 16.0.0'],\n   25 |   [NapiVersion.Napi9, '18.17.0 | 20.3.0 | 21.1.0'],\n   26 | ])","lines":11,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/utils/version.ts#L16-L26"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Diagnostic::panic` recurses into itself for the `Multi` case while annotated\n`#[allow(unconditional_recursion)]`:\n\n    pub fn panic(&self) -> ! {\n      match &self.inner {\n        ...\n        Repr::Multi { diagnostics } => diagnostics[0].panic(),\n      }\n    }\n\nIf a `Multi` diagnostic is ever constructed with an empty `diagnostics` vector,\n`diagnostics[0]` panics with an index-out-of-bounds instead of reporting the\nintended error message. `Diagnostic::from_vec` guards against the empty case,\nbut `Repr::Multi` is a plain enum variant that can be built elsewhere; the\nindexing is an unguarded assumption.","fix":"Use `if let Some(first) = diagnostics.first() { first.panic() } else { panic!(\"empty diagnostic\") }` to avoid a misleading index panic.","locations":[{"ref":"crates/backend/src/error.rs:84-92","code":"   84 |   /// Immediately trigger a panic from this `Diagnostic`\n   85 |   #[allow(unconditional_recursion)]\n   86 |   pub fn panic(&self) -> ! {\n   87 |     match &self.inner {\n   88 |       Repr::Single { text, .. } => panic!(\"{}\", text),\n   89 |       Repr::SynError(error) => panic!(\"{}\", error),\n   90 |       Repr::Multi { diagnostics } => diagnostics[0].panic(),\n   91 |     }\n   92 |   }","lines":9,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/error.rs#L84-L92"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`handle_option_type` adds `| undefined | null` for non-return positions but only\n`| null` for return positions, and for struct fields it returns the bare type\nwith `is_optional = true` (so the `?:`/`| null` is added later in `gen_field`).\nHowever, `gen_field` in `typegen/struct.rs` applies the override `f.ts_type`\nAFTER computing `is_optional` from `ty_to_ts_type`:\n\n    let (arg, is_optional) = ty_to_ts_type(&f.ty, false, true, false);\n    let arg = f.ts_type.as_ref().map(|ty| ty.to_string()).unwrap_or(arg);\n    ...\n    let arg = match is_optional { false => ..., true => ... };\n\nWhen a field has an explicit `#[napi(ts_type = \"Foo\")]` override but the\nunderlying Rust type is `Option<...>`, `is_optional` is still `true`, so the\ngenerated field becomes `name?: Foo` / `name: Foo | null` even though the user\nexplicitly supplied the full type string `Foo`. The override cannot suppress the\nappended optionality, which is surprising and may emit a doubled\n`Foo | null | null` if the user wrote `Foo | null`.","fix":"When `f.ts_type` is an explicit override, treat the field as already-complete: skip the optional/nullable wrapping (set a local `is_optional = false` when the override is present).","locations":[{"ref":"crates/backend/src/typegen/struct.rs:176-187","code":"  176 |     let (arg, is_optional) = ty_to_ts_type(&f.ty, false, true, false);\n  177 |     let arg = f.ts_type.as_ref().map(|ty| ty.to_string()).unwrap_or(arg);\n  178 |     let js_name = format_js_property_name(&f.js_name);\n  179 | \n  180 |     let arg = match is_optional {\n  181 |       false => format!(\"{}: {}\", &js_name, arg),\n  182 |       true => match self.use_nullable {\n  183 |         false => format!(\"{}?: {}\", &js_name, arg),\n  184 |         true => format!(\"{}: {} | null\", &js_name, arg),\n  185 |       },\n  186 |     };\n  187 |     field_str.push_str(&arg);","lines":12,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen/struct.rs#L176-L187"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Redundant / suspect target_env check inside the windows arm. The outer match is on `target_os`, and the windows arm then re-reads `CARGO_CFG_TARGET_ENV` and only calls `setup_gnu()` when it is `gnu`. But `target_env` was already read into a variable at line 25; this re-reads the env var via a second `env::var(...).as_deref()` call instead of reusing `target_env`. Minor inconsistency / duplicate env read that can drift.","fix":"Reuse the already-bound `target_env` variable: `if target_env == \"gnu\" { windows::setup_gnu(); }`.","locations":[{"ref":"crates/build/src/lib.rs:25","code":"   25 |   let target_env = env::var(\"CARGO_CFG_TARGET_ENV\").expect(\"CARGO_CFG_TARGET_ENV is not set\");","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/build/src/lib.rs#L25"},{"ref":"crates/build/src/lib.rs:39-43","code":"   39 |     \"windows\" => {\n   40 |       if let Ok(\"gnu\") = env::var(\"CARGO_CFG_TARGET_ENV\").as_deref() {\n   41 |         windows::setup_gnu();\n   42 |       }\n   43 |     }","lines":5,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/build/src/lib.rs#L39-L43"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"wasi setup links `setjmp` only when `libsetjmp.a` exists, but it appends the wasi-sysroot lib search path and links `static=setjmp` based on a path hardcoded to `wasm32-wasip1-threads`. If `TARGET` is a different wasi triple (e.g. a future `wasm32-wasip2` or non-threads variant), the hardcoded `wasm32-wasip1-threads` segment is wrong, silently skipping setjmp linking even though a sysroot exists. The earlier `crt1-reactor.o` path correctly uses the dynamic `target` variable, so this hardcoding is inconsistent.","fix":"Derive the sysroot lib subdir from the `TARGET` env var (as done for `crt1-reactor.o`) instead of hardcoding `wasm32-wasip1-threads`.","locations":[{"ref":"crates/build/src/wasi.rs:48-61","code":"   48 |   if let Ok(wasi_sdk_path) = env::var(\"WASI_SDK_PATH\") {\n   49 |     println!(\n   50 |       \"cargo:rustc-link-search={wasi_sdk_path}/share/wasi-sysroot/lib/wasm32-wasip1-threads\"\n   51 |     );\n   52 |     let setjmp_static_lib = Path::new(&wasi_sdk_path)\n   53 |       .join(\"share\")\n   54 |       .join(\"wasi-sysroot\")\n   55 |       .join(\"lib\")\n   56 |       .join(\"wasm32-wasip1-threads\")\n   57 |       .join(\"libsetjmp.a\");\n   58 |     if setjmp_static_lib.exists() {\n   59 |       println!(\"cargo:rustc-link-lib=static=setjmp\");\n   60 |     }\n   61 |   }","lines":14,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/build/src/wasi.rs#L48-L61"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`replace_napi_attr_in_mod` unwraps `BindgenAttrs::try_from(&new_attr).unwrap()`. `new_attr` is constructed from user attribute tokens via `parse_quote!` and re-parsed; if the user's existing `#[napi(...)]` contents combine with the injected `namespace = ...` in a way that fails `BindgenAttrs` parsing, this panics inside the proc-macro instead of producing a span diagnostic. The error path is reachable from malformed user attributes inside a `#[napi] mod`.","fix":"Propagate the error: change the helper to return `BindgenResult<Option<BindgenAttrs>>` and `?` the `try_from`, surfacing a proper diagnostic to the user.","locations":[{"ref":"crates/macro/src/expand.rs:107-123","code":"","lines":17,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/expand.rs#L107-L123"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"When merging a pre-existing `#[napi]` whose meta is a `NameValue` (e.g. someone wrote `#[napi = something]`) inside a module, the code reconstructs the attr as `#[napi(#existing, namespace = ...)]`, silently turning a NameValue form into a list form using only the value expression and dropping the original key. This mishandles the NameValue edge case and can produce surprising/incorrect attribute contents rather than rejecting the invalid `#[napi = ...]` form.","fix":"Reject `Meta::NameValue` for `#[napi]` with a span error (the supported forms are `#[napi]` and `#[napi(...)]`), rather than splicing its value expression into a generated list.","locations":[{"ref":"crates/macro/src/expand.rs:115-118","code":"","lines":4,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/expand.rs#L115-L118"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Wrong error-message product name in enum discriminant parsing: errors reference `#[wasm_bindgen]` (\"enums with #[wasm_bindgen] can only support numbers... / may only have number literal values\"). This is napi-rs, not wasm-bindgen (the code was borrowed from wasm-bindgen per the attrs.rs note). Users get a confusing diagnostic naming the wrong macro.","fix":"Change the two `bail_span!` messages to reference `#[napi]` instead of `#[wasm_bindgen]`.","locations":[{"ref":"crates/macro/src/parser/mod.rs:1694-1706","code":" 1694 |                       bail_span!(\n 1695 |                         int_lit,\n 1696 |                         \"enums with #[wasm_bindgen] can only support \\\n 1697 |                       numbers that can be represented as i32\",\n 1698 |                       );\n 1699 |                     }\n 1700 |                   },\n 1701 |                   _ => bail_span!(\n 1702 |                     expr,\n 1703 |                     \"enums with #[wasm_bindgen] may only have \\\n 1704 |                   number literal values\",\n 1705 |                   ),\n 1706 |                 }","lines":13,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/parser/mod.rs#L1694-L1706"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`execute` writes the computed value into `work.value` (a `MaybeUninit`) but if a\ntask is cancelled, `execute` may never run while `complete` still takes the\nnon-cancelled `else` branch in some races (e.g. status != napi_cancelled but\nstatus.get() logic). The `complete_impl` reads `work.value.assume_init()`\nunconditionally in the `else` branch. If `execute` never ran (work was queued\nthen the env torn down delivering a non-cancelled status), `assume_init` reads\nuninitialized memory -> UB. The safety relies entirely on N-API always\ndelivering `napi_cancelled` when execute was skipped, which is the documented\ncontract but is not defended in code.","fix":"Track whether execute ran (e.g. a flag in AsyncWork or use Option) and only assume_init when it did; otherwise reject the deferred. This removes reliance on N-API never delivering a non-cancelled status without running execute.","locations":[{"ref":"crates/napi/src/async_work.rs:109-113","code":"  109 | unsafe extern \"C\" fn execute<'task, T: ScopedTask<'task>>(_env: sys::napi_env, data: *mut c_void) {\n  110 |   let work = Box::leak(unsafe { Box::from_raw(data as *mut AsyncWork<T>) });\n  111 |   let value = work.inner_task.compute();\n  112 |   work.value.write(value);\n  113 | }","lines":5,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/async_work.rs#L109-L113"},{"ref":"crates/napi/src/async_work.rs:144-145","code":"  144 |   } else {\n  145 |     let value_ptr = unsafe { work.value.assume_init() };","lines":2,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/async_work.rs#L144-L145"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`generator_next_fn` (async iterator) converts `T::Next::from_napi_value` and on conversion error throws a JS error via `napi_throw_error`, then continues with `None` and proceeds to `spawn_future_with_callback`. After scheduling a JS error to be thrown, the function still builds and returns a promise, so a JS exception is left pending while a normal value is returned. The sync `generator_next` has the same pattern. This produces undefined behavior in the JS engine (returning a value with a pending exception).","fix":"On `from_napi_value` error, return early (`return Err(e)` / `return ptr::null_mut()`) instead of swallowing the error and continuing with `None`.","locations":[{"ref":"crates/napi/src/bindgen_runtime/async_iterator.rs:329-342","code":"  329 |     g.next(match unsafe { T::Next::from_napi_value(env, argv[0]) } {\n  330 |       Ok(input) => Some(input),\n  331 |       Err(e) => {\n  332 |         unsafe {\n  333 |           sys::napi_throw_error(\n  334 |             env,\n  335 |             format!(\"{}\", e.status).as_ptr().cast(),\n  336 |             e.reason.as_ptr().cast(),\n  337 |           )\n  338 |         };\n  339 |         None\n  340 |       }\n  341 |     })\n  342 |   };","lines":14,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/async_iterator.rs#L329-L342"},{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:424-436","code":"  424 |         match unsafe { T::Next::from_napi_value(env, argv[0]) } {\n  425 |           Ok(input) => Some(input),\n  426 |           Err(e) => {\n  427 |             unsafe {\n  428 |               sys::napi_throw_error(\n  429 |                 env,\n  430 |                 format!(\"{}\", e.status).as_ptr().cast(),\n  431 |                 e.reason.as_ptr().cast(),\n  432 |               )\n  433 |             };\n  434 |             None\n  435 |           }\n  436 |         },","lines":13,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L424-L436"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the async `generator_throw`, the `catch` future result is mapped with `obj.set(\"done\", false)` unconditionally, but per the async iterator protocol `AsyncGenerator.throw()` that resolves should generally surface the yielded value with `done` reflecting completion. More concretely, `generator_throw` always produces `{ value, done: false }` even when the user `catch` returns `Ok(None)` (which should signal completion / `done: true`). Compare with the sync `generator_throw` which correctly sets `done: true` for the `Ok(None)` case (line 647-649).","fix":"In the async `generator_throw` callback, set `done` based on whether `value` is `Some`/`None` (mirror the sync implementation), instead of hardcoding `false`.","locations":[{"ref":"crates/napi/src/bindgen_runtime/async_iterator.rs:485-490","code":"  485 |   match Env::from_raw(env).spawn_future_with_callback(caught, |env, value| {\n  486 |     let mut obj = Object::new(env)?;\n  487 |     obj.set(\"value\", value)?;\n  488 |     obj.set(\"done\", false)?;\n  489 |     Ok(obj)\n  490 |   }) {","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/async_iterator.rs#L485-L490"},{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:644-650","code":"  644 |     Ok(Some(v)) => {\n  645 |       set_generator_value(env, result, v);\n  646 |     }\n  647 |     Ok(None) => {\n  648 |       generator_state_value = true;\n  649 |     }\n  650 |   }","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L644-L650"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`FunctionCallContext::try_get` has dead/contradictory branches. After `if index >= len { return\nErr(...) }`, the `else if index < len` is always true (since `index < len` is the negation of\n`index >= len`), so the final `else { Ok(Either::B(())) }` branch is unreachable. The method is\ndocumented/named as a fallible getter that should return `Either::B(())` when the argument is\nmissing, but it actually returns an `Err` for out-of-range indices and never yields `Either::B`.\nThis makes `try_get` behave identically to `get` (wrapped in `Either::A`) and never produce the\n\"absent\" case it was designed for.","fix":"Return `Ok(Either::B(()))` when `index >= len` instead of erroring, so the \"missing optional\nargument\" case is actually reachable; drop the redundant `else if`.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/function.rs:544-559","code":"  544 |   pub fn try_get<ArgType: TypeName + FromNapiValue>(\n  545 |     &self,\n  546 |     index: usize,\n  547 |   ) -> Result<Either<ArgType, ()>> {\n  548 |     let len = self.length();\n  549 |     if index >= len {\n  550 |       Err(crate::Error::new(\n  551 |         crate::Status::GenericFailure,\n  552 |         \"Arguments index out of range\".to_owned(),\n  553 |       ))\n  554 |     } else if index < len {\n  555 |       unsafe { ArgType::from_napi_value(self.env.0, self.args[index]) }.map(Either::A)\n  556 |     } else {\n  557 |       Ok(Either::B(()))\n  558 |     }\n  559 |   }","lines":16,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/function.rs#L544-L559"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The `IndexMap` `ToNapiValue` impl gates its `obj.set` fallback on\n`#[cfg(not(all(feature = \"experimental\", feature = \"node_version_detect\", feature = \"dyn-symbols\")))]`\nwhile the fast-path `if`/`else` block above it is gated on\n`#[cfg(all(feature = \"napi10\", feature = \"node_version_detect\", feature = \"dyn-symbols\", ...))]`.\nThe `experimental` feature in the `not(...)` no longer matches the `napi10` feature used by the\npositive branch (the HashMap/BTreeMap variants correctly use `napi10` in both). As a result, with\nthe `napi10`+`node_version_detect`+`dyn-symbols` feature set enabled, BOTH branches compile and each\nkey/value is inserted twice (fast path then the `not(experimental...)` fallback), or with other\nfeature combinations a key may be inserted zero times -- a copy-paste mismatch from the\nHashMap/BTreeMap impls.","fix":"Replace `feature = \"experimental\"` with `feature = \"napi10\"` in the `not(all(...))` cfg so it mirrors the HashMap/BTreeMap impls and the two branches are mutually exclusive.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/map.rs:200-220","code":"  200 |     for (k, v) in val.into_iter() {\n  201 |       #[cfg(all(\n  202 |         feature = \"napi10\",\n  203 |         feature = \"node_version_detect\",\n  204 |         feature = \"dyn-symbols\",\n  205 |         not(feature = \"noop\"),\n  206 |       ))]\n  207 |       {\n  208 |         if node_version.major >= 20 && node_version.minor >= 18 {\n  209 |           fast_set_property(raw_env, obj.0.value, k, v)?;\n  210 |         } else {\n  211 |           obj.set(k.as_ref(), v)?;\n  212 |         }\n  213 |       }\n  214 |       #[cfg(not(all(\n  215 |         feature = \"experimental\",\n  216 |         feature = \"node_version_detect\",\n  217 |         feature = \"dyn-symbols\"\n  218 |       )))]\n  219 |       obj.set(k.as_ref(), v)?;\n  220 |     }","lines":21,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/map.rs#L200-L220"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`IteratorValue::from_napi_value` reads `value` BEFORE checking `done`. When the JS reader yields `{ done: true, value: undefined }`, it still calls `T::from_napi_value(env, value)` on `undefined`, which for many `T` (e.g. non-Option, primitives) returns an `InvalidArg` error and turns a normal stream end into a spurious error. The struct keeps `done` separately, so `value` should only be converted when `!done`.","fix":"Short-circuit: if `done` is true, set `value: None` without attempting `T::from_napi_value`; only convert `value` when `done` is false.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/stream/read.rs:544-564","code":"  544 | impl<T: FromNapiValue> FromNapiValue for IteratorValue<'_, T> {\n  545 |   unsafe fn from_napi_value(env: sys::napi_env, napi_val: sys::napi_value) -> Result<Self> {\n  546 |     let mut done = ptr::null_mut();\n  547 |     check_status!(\n  548 |       unsafe { sys::napi_get_named_property(env, napi_val, c\"done\".as_ptr().cast(), &mut done) },\n  549 |       \"Get done property failed\"\n  550 |     )?;\n  551 |     let done = unsafe { FromNapiValue::from_napi_value(env, done)? };\n  552 |     let mut value = ptr::null_mut();\n  553 |     check_status!(\n  554 |       unsafe { sys::napi_get_named_property(env, napi_val, c\"value\".as_ptr().cast(), &mut value) },\n  555 |       \"Get value property failed\"\n  556 |     )?;\n  557 |     let value = unsafe { FromNapiValue::from_napi_value(env, value)? };\n  558 |     Ok(Self {\n  559 |       value,\n  560 |       done,\n  561 |       _marker: PhantomData,\n  562 |     })\n  563 |   }\n  564 | }","lines":21,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/stream/read.rs#L544-L564"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`raw_finalize_unchecked`: when `data.finalize(env)` returns an error it throws into env and returns EARLY, BEFORE removing the entry from `REFERENCE_MAP` and deleting the napi reference / running the stored finalize callbacks. A failing user `finalize` thus leaks the `napi_ref`, the boxed finalize closure (`Box::from_raw` never runs), and leaves a stale entry in `REFERENCE_MAP` keyed on the now-freed `finalize_data` pointer (the `Box<T>` was already consumed by `Box::from_raw` at the top, so the data is freed but cleanup is skipped).","fix":"Run the `REFERENCE_MAP` removal and reference/closure cleanup regardless of the `finalize` result (e.g. perform cleanup first or in all branches), only using the error path to additionally throw.","locations":[{"ref":"crates/napi/src/bindgen_runtime/mod.rs:40-69","code":"   40 |   let data: Box<T> = unsafe { Box::from_raw(finalize_data.cast()) };\n   4 s_number.trunc() - js_number).abs() < f64::EPSILON {\n   36 |           visitor.visit_i64(js_number as i64)\n   37 |         } else {\n   38 |           visitor.visit_f64(js_number)\n   39 |         }\n   40 |       }","lines":8,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/de.rs#L33-L40"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`JsObjectAccess::next_value_seed` error message has the index and range swapped: `format!(\"Index:{} out of range: {}\", self.property_len, self.idx)` prints the length where the index should be and vice versa. Misleading diagnostic. (The guard `self.idx >= self.property_len` is also logically unreachable because `next_key_seed` returns `None` first, but if reached the message is backwards.)","fix":"Swap the arguments: `format!(\"Index:{} out of range: {}\", self.idx, self.property_len)`.","locations":[{"ref":"crates/napi/src/js_values/de.rs:390-394","code":"  390 |     if self.idx >= self.property_len {\n  391 |       return Err(Error::new(\n  392 |         Status::InvalidArg,\n  393 |         format!(\"Index:{} out of range: {}\", self.property_len, self.idx),\n  394 |       ));","lines":5,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/de.rs#L390-L394"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`JsStringLatin1::into_latin1_string` allocates `vec![0; self.len()*2 + 1]` and converts via `encoding_rs::mem::convert_latin1_to_str`, but then returns the String with its full padded length (capacity `len*2+1`), never truncating to the number of bytes actually written by `convert_latin1_to_str` (its return value, the written length, is discarded). The resulting String contains trailing NUL bytes for any latin1 input whose UTF-8 expansion is shorter than `len*2`, i.e. es ;\n  125 |     check_status!(unsafe {\n  126 |       sys::napi_get_value_string_utf16(\n  127 |         self.0.env,\n  128 |         self.0.value,\n  129 |         buf_ptr,\n  130 |         len,\n  131 |         &mut written_char_count,\n  132 |       )\n  133 |     })?;\n  134 | \n  135 |     Ok(JsStringUtf16 {\n  136 |       inner: self,\n  137 |       buf: unsafe { std::slice::from_raw_parts(buf_ptr.cast(), len) },\n  138 |       _inner_buf: result,\n  139 |     })\n  140 |   }","lines":21,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/string/mod.rs#L120-L140"},{"ref":"crates/napi/src/js_values/string/utf16.rs:405-415","code":"  405 |   pub fn as_slice(&self) -> &[u16] {\n  406 |     self.buf\n  407 |   }\n  408 | \n  409 |   pub fn len(&self) -> usize {\n  410 |     self.buf.len()\n  411 |   }\n  412 | \n  413 |   pub fn is_empty(&self) -> bool {\n  414 |     self.buf.is_empty()\n  415 |   }","lines":11,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/string/utf16.rs#L405-L415"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"On the WASM path of `JsStringUtf16::from_data`/`from_external` (and latin1 equivalents), `buf` is built with `std::slice::from_raw_parts(data_ptr/buf_ptr, len)` pointing into `buffer`/`data` which is then moved into `_inner_buf`. Same owned-Vec-aliased-by-raw-slice pattern as the into_utf16 finding: the wrapper holds both an owning Vec (`_inner_buf`) and a raw slice (`buf`) into the same allocation. Moving the Vec into the struct field keeps the pointer valid (no realloc), but it is fragile aliasing; any future code that mutates `_inner_buf` would invalidate `buf`.","fix":"Avoid storing a raw `from_raw_parts` slice aliasing an owned Vec field; instead store only the Vec and provide `as_slice()` returning `_inner_buf.as_slice()`, eliminating th ates/napi/src/js_values/string/latin1.rs:284-295","code":"  284 |       Ok(Self {\n  285 |         inner: JsString(\n  286 |           Value {\n  287 |             env: env.0,\n  288 |             value: raw_value,\n  289 |             value_type: ValueType::String,\n  290 |           },\n  291 |           std::marker::PhantomData,\n  292 |         ),\n  293 |         buf: unsafe { std::slice::from_raw_parts(buf_ptr, buf_len) },\n  294 |         _inner_buf: buffer,\n  295 |       })","lines":12,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/string/latin1.rs#L284-L295"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`thread_finalize_cb` upgrades the `Weak<ThreadsafeFunctionHandle>` and, if the\nupgrade succeeds, sets `aborted = true`. But it unconditionally drops the boxed\nuser callback (`finalize_hint`). If the upgrade FAILS (handle already dropped),\nthat is fine. The subtle issue: the `if !*aborted_guard { *aborted_guard = true }`\nblock is pointless — it always just sets aborted to true and the inner `if` is\nredundant (it sets true only when already false, but the net effect is identical\nto an unconditional `*aborted_guard = true`). Minor, but it obscures intent and\nsuggests the author intended to do something conditionally that was lost.","fix":"Replace the redundant `if !*aborted_guard { *aborted_guard = true; }` with a plain `*aborted_guard = true;`.","locations":[{"ref":"crates/napi/src/threadsafe_function.rs:767-773","code":"  767 |   if let Some(handle) = handle_option {\n  768 |     handle.with_write_aborted(|mut aborted_guard| {\n  769 |       if !*aborted_guard {\n  770 |         *aborted_guard = true;\n  771 |       }\n  772 |     });\n  773 |   }","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/threadsafe_function.rs#L767-L773"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`call_js_cb`: when the JS callback throws and the call variant is\n`WithCallback`, the code creates a napi reference to the exception with refcount\n1 (`napi_create_reference(raw_env, exception, 1, &mut error_reference)`) and\nstores it in `Error.maybe_raw`. If `get_error_message_and_stack_trace` returns\n`Err` (the `.and_then` short-circuits), the freshly created `error_reference` is\nleaked — it is never wrapped into an Error and thus never unref'd/deleted by\nError::Drop. Only the success branch builds the Error that owns the reference.","fix":"If get_error_message_and_stack_trace fails, delete the created reference (napi_delete_reference) before propagating, or create the reference only after the message extraction succeeds.","locations":[{"ref":"crates/napi/src/threadsafe_function.rs:846-868","code":"  846 |         let callback_arg = if status == sys::Status::napi_pending_exception {\n  847 |           let mut exception = ptr::null_mut();\n  848 |           unsafe { sys::napi_get_and_clear_last_exception(raw_env, &mut exception) };\n  849 |           let mut error_reference = ptr::null_mut();\n  850 |           let raw_status = status;\n  851 |           status =\n  852 |             unsafe { sys::napi_create_reference(raw_env, exception, 1, &mut error_reference) };\n  853 | \n  854 |           get_error_message_and_stack_trace(raw_env, exception).and_then(|reason| {\n  855 |             Err(Error {\n  856 |               maybe_raw: error_reference,\n  857 |               maybe_env: raw_env,\n  858 |               // SAFETY: `raw_env` and `exception` are valid pointers obtained from\n  859 |               // `napi_get_and_clear_last_exception` above, which guarantees they are\n  860 |               // non-null and live for the duration of this callback.\n  861 |               cause: extract_error_cause(unsafe {\n  862 |                 Unknown::from_raw_unchecked(raw
