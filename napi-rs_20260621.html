:"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`gen_callback_type` passes callback argument types through `FnArgList`, which\ntreats an arg literally named `this` specially (pulls it out as a TS `this:`\nparameter). Callback args are auto-named `arg0`, `arg1`, ... so this never\ntriggers for them, but `FnArgList`'s `from_iter` also recomputes\n`last_required` to drop trailing-optional `?` markers based on argument order.\nFor a synthesized callback type like `(arg0: A, arg1?: B) => R`, if a later\nnon-optional arg follows an optional one, the optional marker is silently\ndropped - which is correct for TS call signatures, but the callback return type\nis computed with `ty_to_ts_type(ty, true, ...)` (is_return_ty=true) whereas the\nargs use `false`; an `Option<T>` return becomes `T | null` while an `Option<T>`\narg becomes `T | undefined | null`, an asymmetry that is easy to overlook but\nintentional. Flagging the `this`-name coupling as a latent footgun: a callback\nwhose first param is destructured/named `this` via `ts_arg_type` override would\nbe mis-handled.","fix":"Document that `FnArgList`'s `this` extraction is keyed purely on the literal arg name `\"this\"`; consider a dedicated flag instead of a magic string to avoid accidental matches.","locations":[{"ref":"crates/backend/src/typegen/fn.rs:120-141","code":"  120 | fn gen_callback_type(callback: &CallbackArg) -> String {\n  121 |   format!(\n  122 |     \"({args}) => {ret}\",\n  123 |     args = &callback\n  124 |       .args\n  125 |       .iter()\n  126 |       .enumerate()\n  127 |       .map(|(i, arg)| {\n  128 |         let (ts_type, is_optional) = ty_to_ts_type(arg, false, false, false);\n  129 |         FnArg {\n  130 |           arg: format!(\"arg{i}\"),\n  131 |           ts_type,\n  132 |           is_optional,\n  133 |         }\n  134 |       })\n  135 |       .collect::<FnArgList>(),\n  136 |     ret = match &callback.ret {\n  137 |       Some(ty) => ty_to_ts_type(ty, true, false, false).0,\n  138 |       None => \"void\".to_owned(),\n  139 |     }\n  140 |   )\n  141 | }","lines":22,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen/fn.rs#L120-L141"},{"ref":"crates/backend/src/typegen/fn.rs:55-78","code":"   55 | impl FromIterator<FnArg> for FnArgList {\n   56 |   fn from_iter<T: IntoIterator<Item = FnArg>>(iter: T) -> Self {\n   57 |     let mut args = Vec::new();\n   58 |     let mut this = None;\n   59 |     for arg in iter.into_iter() {\n   60 |       if arg.arg != \"this\" {\n   61 |         args.push(arg);\n   62 |       } else {\n   63 |         this = Some(arg);\n   64 |       }\n   65 |     }\n   66 |     let last_required = args\n   67 |       .iter()\n   68 |       .enumerate()\n   69 |       .rfind(|(_, arg)| !arg.is_optional)\n   70 |       .map(|(i, _)| i);\n   71 |     FnArgList {\n   72 |       this,\n   73 |       args,\n   74 |       last_required,\n   75 |       is_setter: false,\n   76 |     }\n   77 |   }\n   78 | }","lines":24,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen/fn.rs#L55-L78"}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Silent error suppression: in `setup()`, android setup is invoked as `if android::setup().is_ok() {}` - the empty body and discarded `Err` mean any failure from `android::setup()` (which returns `io::Result`) is completely ignored, with no warning emitted. A failure to set up the android link search would produce a confusing later link error rather than a clear build-script diagnostic.","fix":"Handle the error, e.g. `if let Err(e) = android::setup() { println!(\"cargo:warning=android setup failed: {e}\"); }`.","locations":[{"ref":"crates/build/src/lib.rs:28-29","code":"   28 |   match target_os.as_str() {\n   29 |     \"android\" => if android::setup().is_ok() {},","lines":2,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/build/src/lib.rs#L28-L29"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`use_nullable` defaults to `false` while `enumerable`/`writable`/`configurable`/`object_from_js`/`object_to_js` default to `true` (attrs.rs:62-80). The bare-flag form `#[napi(use_nullable)]` (no `= true`) goes through the Option<bool> parser which, with no `=`, returns `Some($default_value)` = `Some(false)`. So writing `#[napi(use_nullable)]` as a bare flag yields `false`, i.e. the flag does nothing when written bare - a surprising footgun where presence of the flag does not enable it.","fix":"Either make bare presence of `use_nullable` mean `true` (special-case the no-`=` branch for flags whose default is false), or document that `use_nullable` must be written as `use_nullable = true`.","locations":[{"ref":"crates/macro/src/parser/attrs.rs:80","code":"   80 |       (use_nullable, UseNullable(Span, Option<bool>), false),","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/parser/attrs.rs#L80"},{"ref":"crates/macro/src/parser/attrs.rs:497-499","code":"  497 |           } else {\n  498 |             return Ok(BindgenAttr::$variant(attr_span, Some($default_value)))\n  499 |           }","lines":3,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/parser/attrs.rs#L497-L499"}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The Option<bool> attribute parser treats a non-bool RHS after `=` as `true` rather than an error: `match input.parse::<syn::LitBool>() { Ok -> value, Err(_) -> (true, ...) }` parses any non-bool ident (e.g. `writable = yes`, `enumerable = foo`) and silently records `true`. A typo'd value is accepted and inverted-from-intent rather than rejected with a diagnostic. This affects `enumerable`, `writable`, `configurable`, `object_from_js`, `object_to_js`.","fix":"On the `Err(_)` branch, return a `syn::Error` (\"expected a boolean literal\") instead of defaulting the value to `true`.","locations":[{"ref":"crates/macro/src/parser/attrs.rs:487-500","code":"  487 |         (@parser $variant:ident(Span, Option<bool>), $default_value:literal) => ({\n  488 |           if let Ok(_) = input.parse::<Token![=]>() {\n  489 |             let (val, _) = match input.parse::<syn::LitBool>() {\n  490 |               Ok(str) => (str.value(), str.span()),\n  491 |               Err(_) => {\n  492 |                 let ident = input.parse::<AnyIdent>()?.0;\n  493 |                 (true, ident.span())\n  494 |               }\n  495 |             };\n  496 |             return Ok::<BindgenAttr, syn::Error>(BindgenAttr::$variant(attr_span, Some(val)))\n  497 |           } else {\n  498 |             return Ok(BindgenAttr::$variant(attr_span, Some($default_value)))\n  499 |           }\n  500 |         });","lines":14,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/parser/attrs.rs#L487-L500"}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `generator_throw` (sync), when the user `catch` returns `Err(e)`, it sets the generator state and then `napi_throw(env, e.0.value)` and returns null. But `e.0.value` is the `Unknown` originally passed in (the thrown value) re-thrown; if the user `catch` constructed a *different* error to propagate, there is no way for it to do so because `catch` only returns the original `Unknown` on the `Err` path (the `Err` variant always carries the input `Unknown`). This restricts `catch` to re-throwing the same value, which the trait signature (`Result<Option<Yield>, Unknown>`) superficially suggests can be any Unknown but in practice the only Unknown available is the input.","fix":"Document that the `Err(Unknown)` returned is re-thrown as-is, or allow `catch` to return an owned error type that can be converted to a thrown value.","locations":[{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:636-642","code":"  636 |       let throw_status = unsafe { sys::napi_throw(env, e.0.value) };\n  637 |       debug_assert!(\n  638 |         throw_status == sys::Status::napi_ok,\n  639 |         \"Failed to throw error {}\",\n  640 |         crate::Status::from(throw_status)\n  641 |       );\n  642 |       return ptr::null_mut();","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L636-L642"},{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:82-88","code":"   82 |   fn catch(\n   83 |     &'env mut self,\n   84 |     env: &'env Env,\n   85 |     value: Unknown<'env>,\n   86 |   ) -> Result<Option<Self::Yield>, Unknown<'env>> {\n   87 |     Err(value)\n   88 |   }","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L82-L88"}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`Array::set` updates the cached length with `self.len = index + 1` where `index: u32`. If a caller\nsets element at `u32::MAX`, `index + 1` overflows and panics in debug / wraps to 0 in release,\nsilently corrupting the cached length. `insert` calls `set(self.len(), val)` so repeated inserts up\nto u32::MAX hit the same issue.","fix":"Use `self.len = index.saturating_add(1);` or `index.checked_add(1)` with an error on overflow.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/array.rs:65-86","code":"   65 |   pub fn set<T: ToNapiValue>(&mut self, index: u32, val: T) -> Result<()> {\n   66 |     unsafe {\n   67 |       let napi_val = T::to_napi_value(self.env, val)?;\n   68 | \n   69 |       check_status!(\n   70 |         sys::napi_set_element(self.env, self.inner, index, napi_val),\n   71 |         \"Failed to set element with index `{}`\",\n   72 |         index,\n   73 |       )?;\n   74 | \n   75 |       if index >= self.len() {\n   76 |         self.len = index + 1;\n   77 |       }\n   78 | \n   79 |       Ok(())\n   80 |     }\n   81 |   }\n   82 | \n   83 |   pub fn insert<T: ToNapiValue>(&mut self, val: T) -> Result<()> {\n   84 |     self.set(self.len(), val)?;\n   85 |     Ok(())\n   86 |   }","lines":22,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/array.rs#L65-L86"}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`BigInt::get_i128` returns the `lossless` flag for the 2-word case as `len == 2 && self.words[1] as\ni64 >= 0`. This treats the value as lossless only when the high word's top bit is clear, but the\ncombined magnitude `words[0] + (words[1] << 64)` can still exceed `i128::MAX` whenever\n`words[1] >= 0x8000_0000_0000_0000` -- which the `as i64 >= 0` check does catch -- yet for positive\nvalues exactly at the boundary (`words[1] == 0x8000... `, magnitude == i128::MIN.unsigned_abs())\nonly the negative branch is special-cased, so a positive BigInt of that magnitude is reported as a\nwrapped negative `i128` value with `lossless == false` instead of being flagged distinctly. The\n\"lossless or the value is truncated\" doc wording is also self-contradictory (it returns whether the\nvalue is lossless, not whether it was truncated).","fix":"Compute losslessness by checking that the magnitude fits in `i128` for the given sign\n(`val <= i128::MAX as u128` for positive, `val <= i128::MIN.unsigned_abs()` for negative) rather than\ninspecting only the high word's sign bit; fix the doc comment.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/bigint.rs:117-138","code":"  117 |   /// (value, lossless)\n  118 |   /// get the first two words of the BigInt as `i128` with the sign applied\n  119 |   /// return true if the value is lossless\n  120 |   /// or the value is truncated\n  121 |   pub fn get_i128(&self) -> (i128, bool) {\n  122 |     let len = self.words.len();\n  123 |     if len == 1 {\n  124 |       (\n  125 |         self.words[0] as i128 * if self.sign_bit { -1 } else { 1 },\n  126 |         true,\n  127 |       )\n  128 |     } else {\n  129 |       let val = self.words[0] as u128 + ((self.words[1] as u128) << 64);\n  130 |       if self.sign_bit && val == i128::MIN.unsigned_abs() {\n  131 |         return (i128::MIN, len > 2);\n  132 |       }\n  133 |       (\n  134 |         val as i128 * if self.sign_bit { -1 } else { 1 },\n  135 |         len == 2 && self.words[1] as i64 >= 0,\n  136 |       )\n  137 |     }\n  138 |   }","lines":22,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/bigint.rs#L117-L138"}]},{"id":"LOGIC_62","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`HashMap`/`BTreeMap`/`IndexMap` `FromNapiValue` use `Object::keys` which calls\n`napi_get_property_names` -- that returns only enumerable string keys including inherited prototype\nproperties (the default mode of `napi_get_property_names` is `include_prototypes` + `enumerable`).\nThis means deserializing a JS object into a Rust map can pick up inherited enumerable properties,\nnot just own properties, which is surprising for a \"to map\" conversion and differs from typical\nJSON-object semantics (own enumerable only). `serde.rs`'s `Map` impl shares this via `Object::keys`.","fix":"Use `napi_get_all_property_names` with `own_only` + `enumerable` + `skip_symbols` (napi6+) for map\ndeserialization, or document that inherited enumerable keys are included.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/map.rs:75-87","code":"   75 |   unsafe fn from_napi_value(env: sys::napi_env, napi_val: sys::napi_value) -> Result<Self> {\n   76 |     let obj = unsafe { Object::from_napi_value(env, napi_val)? };\n   77 |     let keys = Object::keys(&obj)?;\n   78 |     let mut map: HashMap<K, V, S> = HashMap::with_capacity_and_hasher(keys.len(), S::default());\n   79 |     for key in keys.into_iter() {\n   80 |       if let Some(val) = obj.get(&key)? {\n   81 |         map.insert(K::from(key), val);\n   82 |       }\n   83 |     }\n   84 | \n   85 |     Ok(map)\n   86 |   }\n   87 | }","lines":13,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/map.rs#L75-L87"},{"ref":"crates/napi/src/bindgen_runtime/js_values/object.rs:802-819","code":"  802 |   pub fn keys(obj: &Object) -> Result<Vec<String>> {\n  803 |     let mut names = ptr::null_mut();\n  804 |     unsafe {\n  805 |       check_status!(\n  806 |         sys::napi_get_property_names(obj.0.env, obj.0.value, &mut names),\n  807 |         \"Failed to get property names of given object\"\n  808 |       )?;\n  809 |     }\n  810 | \n  811 |     let names = unsafe { Array::from_napi_value(obj.0.env, names)? };\n  812 |     let mut ret = vec![];\n  813 | \n  814 |     for i in 0..names.len() {\n  815 |       ret.push(names.get_element::<String>(i)?);\n  816 |     }\n  817 | \n  818 |     Ok(ret)\n  819 |   }","lines":18,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/object.rs#L802-L819"}]},{"id":"LOGIC_63","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Promise::from_napi_value` registers `.then` and `.catch` sharing a single `Rc<Cell<Option<tx>>>`.\nOnly the first of then/catch to fire sends on the oneshot; the other observes `None` and drops its\nvalue. This is correct for settle-once semantics, but the `catch` arm converts the rejection via\n`ctx.value.into()` where `ctx.value: Unknown` -> `Error`. If the rejection reason is not an Error\nobject, `Unknown::into::<Error>` may produce a generic/empty error, losing the original rejection\ndetail. Also, neither `then` nor `catch` failing to register is recoverable: the second `?` on\n`.catch(...)` runs after `.then(...)` already attached a callback and wrapped a finalizer, so a\nfailure there leaks the then-callback's allocations (handled only by GC finalizer, never by an error\npath).","fix":"Preserve the original rejection value faithfully; ensure callback allocations are reclaimed if `.catch` registration fails.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/promise.rs:61-87","code":"   61 | impl<T: FromNapiValue> FromNapiValue for Promise<T> {\n   62 |   unsafe fn from_napi_value(env: sys::napi_env, napi_val: sys::napi_value) -> crate::Result<Self> {\n   63 |     let (tx, rx) = channel();\n   64 |     let promise_object = unsafe { PromiseRaw::<T>::from_napi_value(env, napi_val)? };\n   65 |     let tx_box = Rc::new(Cell::new(Some(tx)));\n   66 |     let tx_in_catch = tx_box.clone();\n   67 |     promise_object\n   68 |       .then(move |ctx| {\n   69 |         if let Some(sender) = tx_box.replace(None) {\n   70 |           // no need to handle the send error here, the receiver has been dropped\n   71 |           let _ = sender.send(Ok(ctx.value));\n   72 |         }\n   73 |         Ok(())\n   74 |       })?\n   75 |       .catch(move |ctx: CallbackContext<Unknown>| {\n   76 |         if let Some(sender) = tx_in_catch.replace(None) {\n   77 |           // no need to handle the send error here, the receiver has been dropped\n   78 |           let _ = sender.send(Err(ctx.value.into()));\n   79 |         }\n   80 |         Ok(())\n   81 |       })?;\n   82 | \n   83 |     Ok(Promise {\n   84 |       value: Box::pin(rx),\n   85 |     })\n   86 |   }\n   87 | }","lines":27,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/promise.rs#L61-L87"}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`serde.rs`'s `ToNapiValue for &Number` has dead-code / fall-through issues in the `is_u64` branch\nwhen `n > u32::MAX`: under `feature = \"napi6\"` it evaluates `unsafe { BigInt::to_napi_value(...) }`\nas the block's tail expression but there is no `return`, and the following\n`#[cfg(not(feature = \"napi6\"))] return ...;` is the alternative -- with napi6 the BigInt expression\nis the value of the `{ }` block which is then the value of the `else` arm, OK; but the structure\nrelies on exactly one cfg being active and is brittle. More concretely, `FromNapiValue for Number`\nconverts any integral f64 in `[0, u32::MAX]` to `u32` and `[i32::MIN, 0)` to `i32`, but integral\nvalues in `(u32::MAX, 2^53]` (safely representable, e.g. 5_000_000_000.0) fall to `Number::from_f64`\nand are stored as floats, losing the integer typing that a JS `Number` of that magnitude logically\nhas.","fix":"Add explicit `return` to the napi6 BigInt branch; in `from_napi_value`, map integral f64 in i64/u64 safe-integer range to `Number::from(i64/u64)` before falling back to float.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/serde.rs:163-230","code":"  163 | impl ToNapiValue for &Number {\n  164 |   unsafe fn to_napi_value(env: sys::napi_env, n: Self) -> Result<sys::napi_value> {\n  165 |     #[cfg(feature = \"napi6\")]\n  166 |     const MAX_SAFE_INT: i64 = 9007199254740991i64; // 2 ^ 53 - 1\n  167 |     if n.is_i64() {\n  168 |       let n = n.as_i64().unwrap();\n  169 |       #[cfg(feature = \"napi6\")]\n  170 |       {\n  171 |         if !(-MAX_SAFE_INT..=MAX_SAFE_INT).contains(&n) {\n  172 |           return unsafe { BigInt::to_napi_value(env, BigInt::from(n)) };\n  173 |         }\n  174 |       }\n  175 | \n  176 |       unsafe { i64::to_napi_value(env, n) }\n  177 |     } else if n.is_f64() {\n  178 |       unsafe { f64::to_napi_value(env, n.as_f64().unwrap()) }\n  179 |     } else {\n  180 |       let n = n.as_u64().unwrap();\n  181 |       if n > u32::MAX as u64 {\n  182 |         #[cfg(feature = \"napi6\")]\n  183 |         {\n  184 |           unsafe { BigInt::to_napi_value(env, BigInt::from(n)) }\n  185 |         }\n  186 | \n  187 |         #[cfg(not(feature = \"napi6\"))]\n  188 |         return unsafe { String::to_napi_value(env, n.to_string()) };\n  189 |       } else {\n  190 |         unsafe { u32::to_napi_value(env, n as u32) }\n  191 |       }\n  192 |     }\n  193 |   }\n  194 | }\n  195 | \n  196 | impl ToNapiValue for Number {\n  197 |   unsafe fn to_napi_value(env: sys::napi_env, n: Self) -> Result<sys::napi_value> {\n  198 |     ToNapiValue::to_napi_value(env, &n)\n  199 |   }\n  200 | }\n  201 | \n  202 | impl FromNapiValue for Number {\n  203 |   unsafe fn from_napi_value(env: sys::napi_env, napi_val: sys::napi_value) -> Result<Self> {\n  204 |     let n = unsafe { f64::from_napi_value(env, napi_val)? };\n  205 |     // Try to auto-convert to integers\n  206 |     let n = if n.trunc() == n {\n  207 |       if n >= 0.0f64 && n <= u32::MAX as f64 {\n  208 |         // This can be represented as u32\n  209 |         Some(Number::from(n as u32))\n  210 |       } else if n < 0.0f64 && n >= i32::MIN as f64 {\n  211 |         Some(Number::from(n as i32))\n  212 |       } else {\n  213 |         // must be a float\n  214 |         Number::from_f64(n)\n  215 |       }\n  216 |     } else {\n  217 |       // must be a float\n  218 |       Number::from_f64(n)\n  219 |     };\n  220 | \n  221 |     let n = n.ok_or_else(|| {\n  222 |       Error::new(\n  223 |         Status::InvalidArg,\n  224 |         \"Failed to convert js number to serde_json::Number\".to_owned(),\n  225 |       )\n  226 |     })?;\n  227 | \n  228 |     Ok(n)\n  229 |   }\n  230 | }","lines":68,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/serde.rs#L163-L230"}]},{"id":"LOGIC_65","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`get_all` on `CallContext` iterates `self.args` (length == arg_len) rather than\n`self.length` (the actual JS arguments count). The struct's own doc explains\narg_len is the macro-declared count and `.length` is the real arguments count,\nand that when `length < arg_len` the extra slots are JsUndefined. So `get_all`\nreturns trailing JsUndefined padding instead of the actual arguments the caller\npassed. The commented-out alternative directly above also iterates arg_len, so\nthis may be intentional, but it contradicts the documented meaning of \"all\narguments\".","fix":"If the intent is the real JS args, iterate `self.args[..self.length.min(self.args.len())]`. Otherwise document that get_all includes undefined padding up to arg_len.","locations":[{"ref":"crates/napi/src/call_context.rs:76-83","code":"   76 |   pub fn get_all(&self) -> Vec<crate::Unknown<'_>> {\n   77 |     /* (0 .. self.arg_len()).map(|i| self.get(i).unwrap()).collect() */\n   78 |     self\n   79 |       .args\n   80 |       .iter()\n   81 |       .map(|&raw| unsafe { crate::Unknown::from_raw_unchecked(self.env.0, raw) })\n   82 |       .collect()\n   83 |   }","lines":8,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/call_context.rs#L76-L83"},{"ref":"crates/napi/src/call_context.rs:17-31","code":"   17 | impl<'env> CallContext<'env> {\n   18 |   /// The number of N-api obtained values. In practice this is the numeric\n   19 |   /// parameter provided to the `#[js_function(arg_len)]` macro.\n   20 |   ///\n   21 |   /// As a comparison, the (arguments) `.length` represents the actual number\n   22 |   /// of arguments given at a specific function call.\n   23 |   ///\n   24 |   /// If `.length < .arg_len`, then the elements in the `length .. arg_len`\n   25 |   /// range are just len is still 0. N-API writes up to `argc`\n(initially 4) elements into the backing storage. Only afterward, in the `argc <=\n4` branch, is `set_len(argc)` called. This relies on capacity-4 backing being\nwritable (it is), but if `argc` came back as e.g. 4 and the first call wrote 4\nslots, that is exactly capacity — fine. The subtle risk: the initial `argc = 4`\nis passed and N-API may write up to 4 values into uninitialized capacity, which\nis sound only because capacity >= 4. It is correct but fragile and undocumented;\na reviewer cannot easily confirm the capacity invariant matches the `argc=4`\nliteral.","fix":"Add an assertion/comment tying the `with_capacity(4)` to the `argc = 4` literal, or use a fixed `[ptr::null_mut(); 4]` array for the fast path to make the bound self-evident.","locations":[{"ref":"crates/napi/src/env.rs:1594-1632","code":" 1594 |   // Fast path for 4 arguments or less.\n 1595 |   let mut argc = 4;\n 1596 |   let mut raw_args = Vec::with_capacity(4);\n 1597 |   let mut raw_this = ptr::null_mut();\n 1598 |   let mut closure_data_ptr = ptr::null_mut();\n 1599 | \n 1600 |   check_status!(\n 1601 |     unsafe {\n 1602 |       sys::napi_get_cb_info(\n 1603 |         raw_env,\n 1604 |         cb_info,\n 1605 |         &mut argc,\n 1606 |         raw_args.as_mut_ptr(),\n 1607 |         &mut raw_this,\n 1608 |         &mut closure_data_ptr,\n 1609 |       )\n 1610 |     },\n 1611 |     \"napi_get_cb_info failed\"\n 1612 |   )\n 1613 |   .and_then(|_| {\n 1614 |     // Arguments length greater than 4, resize the vector.\n 1615 |     if argc > 4 {\n 1616 |       raw_args = vec![ptr::null_mut(); argc];\n 1617 |       check_status!(\n 1618 |         unsafe {\n 1619 |           sys::napi_get_cb_info(\n 1620 |             raw_env,\n 1621 |             cb_info,\n 1622 |             &mut argc,\n 1623 |             raw_args.as_mut_ptr(),\n 1624 |             &mut raw_this,\n 1625 |             &mut closure_data_ptr,\n 1626 |           )\n 1627 |         },\n 1628 |         \"napi_get_cb_info failed\"\n 1629 |       )?;\n 1630 |     } else {\n 1631 |       unsafe { raw_args.set_len(argc) };\n 1632 |     }","lines":39,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L1594-L1632"}]},{"id":"LOGIC_68","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`de.rs` bigint deserialization classifies word size by `words.len() < 2` (word_sized) and then for the signed+word_sized case calls `get_i64()`, for signed+!word_sized `get_i128()`, etc. A BigInt that needs exactly 2 words but whose signed value fits in i64 still goes through i128; conversely a value with 1 word but representing 2^63..2^64 with sign_bit=false correctly goes u64. The bigger issue: `sign_bit` from `BigInt` indicates negativity, but `word_sized = words.len() < 2` uses raw 64-bit word count, so a positive value in [2^63, 2^64) (1 word, sign_bit false) is sent to `get_u64()` (fine), but a value exactly needing 2 words that fits i128 may lose precision if it exceeds i128 (loss flag ignored). The `lossless`/`loss` return flags from get_i64/get_u64/get_i128/get_u128 are all discarded, so silent precision loss on out-of-range BigInts is possible.","fix":"Inspect and honor the lossless/loss flags returned by the BigInt getters; on loss, fall back to a wider type or return an error rather than silently truncating.","locations":[{"ref":"crates/napi/src/js_values/de.rs:65-78","code":"   65 |       #[cfg(feature = \"napi6\")]\n   66 |       ValueType::BigInt => {\n   67 |         let js_bigint = unsafe { BigInt::from_napi_value(self.0.env, self.0.value)? };\n   68 | \n   69 |         let BigInt { sign_bit, words } = &js_bigint;\n   70 |         let word_sized = words.len() < 2;\n   71 | \n   72 |         match (sign_bit, word_sized) {\n   73 |           (true, true) => visitor.visit_i64(js_bigint.get_i64().0),\n   74 |           (true, false) => visitor.visit_i128(js_bigint.get_i128().0),\n   75 |           (false, true) => visitor.visit_u64(js_bigint.get_u64().1),\n   76 |           (false, false) => visitor.visit_u128(js_bigint.get_u128().1),\n   77 |         }\n   78 |       }","lines":14,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/de.rs#L65-L78"}]},{"id":"LOGIC_69","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`JsFunction::call`/`new_instance` map args via `arg.raw()` into a `raw_args` Vec, but pass `args.len()` / `length` (the original slice length) as the count to `napi_call_function`/`napi_new_instance` while passing `raw_args.as_ptr()`. These lengths always match here, so correct, but `call` uses `args.len()` directly rather than `raw_args.len()`; if the map ever filtered (it cannot here) this would desync. Minor robustness note. More relevant: `call`/`call_without_args` synthesize `this` from `ToNapiValue::to_napi_value(env, ())` via `.ok()`, discarding the actual error and substituting a generic 'Get raw this failed' message, losing the underlying N-API failure reason.","fix":"Propagate the real error from `to_napi_value(env, ())` instead of `.ok().ok_or_else(...)`. Use `raw_args.len()` for the count for self-consistency.","locations":[{"ref":"crates/napi/src/js_values/function.rs:46-93","code":"   46 |   pub fn call<V>(&self, this: Option<&JsObject>, args: &[V]) -> Result<Unknown<'_>>\n   47 |   where\n   48 |     V: NapiRaw,\n   49 |   {\n   50 |     let raw_this = this\n   51 |       .map(|v| unsafe { v.raw() })\n   52 |       .or_else(|| unsafe { ToNapiValue::to_napi_value(self.0.env, ()) }.ok())\n   53 |       .ok_or_else(|| Error::new(Status::GenericFailure, \"Get raw this failed\".to_owned()))?;\n   54 |     let raw_args = args\n   55 |       .iter()\n   56 |       .map(|arg| unsafe { arg.raw() })\n   57 |       .collect::<Vec<sys::napi_value>>();\n   58 |     let mut return_value = ptr::null_mut( tores the serialized key into `self.key` via `JsString(key.serialize(...)?, PhantomData)` (asserting it is a String Value), and `serialize_value` then reconstructs a JsString from `self.key.0` to use as the property key. If a map key serializes to a non-string JS value (numbers, etc. - serde maps can have non-string keys), wrapping the resulting Value in `JsString` and using it as a property name is incorrect; `set_property` will coerce it, but the type tag in `Value` is a lie. `serialize_entry` similarly force-wraps the key as `JsString`. Non-string map keys are mishandled / mislabeled.","fix":"Use `Unknown`/`Object::set_property` with the raw serialized key Value rather than forcing it into a `JsString` wrapper, or coerce keys to string explicitly and document the limitation.","locations":[{"ref":"crates/napi/src/js_values/ser.rs:480-512","code":"  480 |   fn serialize_key<T>(&mut self, key: &T) -> StdResult<(), Self::Error>\n  481 |   where\n  482 |     T: ?Sized + Serialize,\n  483 |   {\n  484 |     let env = Env::from_raw(self.obj.0.env);\n  485 |     self.key = JsString(key.serialize(Ser::new(&env))?, std::marker::PhantomData);\n  486 |     Ok(())\n  487 |   }\n  488 | \n  489 |   fn serialize_value<T>(&mut self, value: &T) -> StdResult<(), Self::Error>\n  490 |   where\n  491 |     T: ?Sized + Serialize,\n  492 |   {\n  493 |     let env = Env::from_raw(self.obj.0.env);\n  494 |     self.obj.set_property(\n  495 |       JsString::from_raw(self.key.0.env, self.key.0.value),\n  496 |       Unknown(value.serialize(Ser::new(&env))?, std::marker::PhantomData),\n  497 |     )?;\n  498 |     Ok(())\n  499 |   }\n  500 | \n  501 |   fn serialize_entry<K, V>(&mut self, key: &K, value: &V) -> StdResult<(), Self::Error>\n  502 |   where\n  503 |     K: ?Sized + Serialize,\n  504 |     V: ?Sized + Serialize,\n  505 |   {\n  506 |     let env = Env::from_raw(self.obj.0.env);\n  507 |     self.obj.set_property(\n  508 |       JsString(key.serialize(Ser::new(&env))?, std::
