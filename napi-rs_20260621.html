lete_reference(env, val.inner) },\n  176 |       \"Failed to delete reference\"\n  177 |     )?;\n  178 |     Ok(result)\n  179 |   }\n  180 | }","lines":81,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/unknown.rs#L100-L180"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"`generateIntermediateTypeDefFolder` calls `mkdirAsync(folder, { recursive: true })` without `await`. `mkdirAsync` is `fs/promises.mkdir`, so the directory creation is fire-and-forget: the function returns the folder path immediately and a floating promise is left dangling. The returned path is stored into `NAPI_TYPE_DEF_TMP_FOLDER` and passed to cargo as the type-def output dir. If the mkdir promise has not resolved (or rejects) the napi-derive build may fail to write intermediate type-def files, and any mkdir error is an unhandled promise rejection rather than being surfaced. The surrounding function is not even async.","fix":"Make the method async and `await mkdirAsync(...)`, propagating the call chain (setEnvs/build) to await it, or use a synchronous `mkdirSync` here as is done elsewhere in this file.","locations":[{"ref":"cli/src/api/build.ts:700-719","code":"  700 |   private generateIntermediateTypeDefFolder() {\n  701 |     let folder = join(\n  702 |       this.targetDir,\n  703 |       'napi-rs',\n  704 |       `${this.crate.name}-${createHash('sha256')\n  705 |         .update(this.crate.manifest_path)\n  706 |         .update(CLI_VERSION)\n  707 |         .digest('hex')\n  708 |         .substring(0, 8)}`,\n  709 |     )\n  710 | \n  711 |     if (!this.options.dtsCache) {\n  712 |       rmSync(folder, { recursive: true, force: true })\n  713 |       folder += `_${Date.now()}`\n  714 |     }\n  715 | \n  716 |     mkdirAsync(folder, { recursive: true })\n  717 | \n  718 |     return folder\n  719 |   }","lines":20,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/build.ts#L700-L719"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"`module_exports` proc-macro `panic!`s when the decorated function does not have exactly 1 or 2 arguments. A proc-macro should emit a span-based compile error (e.g. via `bail_span!`/`syn::Error`) rather than panic, otherwise the user gets an opaque internal-compiler-style `proc-macro panicked` message instead of a helpful diagnostic pointing at their code.","fix":"Replace the `panic!` with a compile error returned as tokens, e.g. emit `syn::Error::new_spanned(&fn_name, \"Arguments length of #[module_exports] function must be 1 or 2\").to_compile_error()` instead of panicking.","locations":[{"ref":"crates/macro/src/lib.rs:146-152","code":"  146 |   let call_expr = if args_len == 1 {\n  147 |     quote! { #fn_name(exports) }\n  148 |   } else if args_len == 2 {\n  149 |     quote! { #fn_name(exports, env) }\n  150 |   } else {\n  151 |     panic!(\"Arguments length of #[module_exports] function must be 1 or 2\");\n  152 |   };","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/lib.rs#L146-L152"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In watch mode the build's `postBuild()` is triggered from a stderr `data` listener whenever the `Finished \\`dev\\`/\\`release\\`` line is seen, with `.catch(() => {})` swallowing all errors. Any failure during artifact copy / type-def generation / js-binding writing in watch mode is silently discarded, so the user sees a 'Finished' build but stale or missing bindings with no diagnostic. Additionally this can run concurrently with the `buildTask.then(() => this.postBuild())` path, causing two overlapping postBuild runs that race on the same output files.","fix":"Log the caught error (at least via debug.error) instead of swallowing it, and guard against concurrent postBuild runs (e.g. a single-flight lock / queue) so watch-mode and the main task don't race on the output files.","locations":[{"ref":"cli/src/api/build.ts:324-337","code":"  324 |       // watch mode only, they are piped through stderr\n  325 |       buildProcess.stderr?.on('data', (data) => {\n  326 |         const output = data.toString()\n  327 |         console.error(output)\n  328 |         if (/Finished\\s(`dev`|`release`)/.test(output)) {\n  329 |           this.postBuild().catch(() => {})\n  330 |         }\n  331 |       })\n  332 |     })\n  333 | \n  334 |     return {\n  335 |       task: buildTask.then(() => this.postBuild()),\n  336 |       abort: () => controller.abort(),\n  337 |     }","lines":14,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/build.ts#L324-L337"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`generateTypeDef` catches a failure to write the `.d.ts` file and only logs it (debug.error), then continues. Immediately afterward, if `exports.length > 0`, it pushes a `{ kind: 'dts', path: dest }` Output entry as if the file were written. Downstream consumers (e.g. the `--pipe` loop in commands/build.ts which runs a command on each output path) will then operate on a `.d.ts` file that does not exist, causing a confusing secondary failure instead of the real write error.","fix":"On write failure, rethrow or skip adding the dts output entry; only push the output when the write succeeded.","locations":[{"ref":"cli/src/api/build.ts:884-896","code":"  884 |     try {\n  885 |       debug('Writing type def to:')\n  886 |       debug('  %i', dest)\n  887 |       await writeFileAsync(dest, dts, 'utf-8')\n  888 |     } catch (e) {\n  889 |       debug.error('Failed to write type def file')\n  890 |       debug.error(e as Error)\n  891 |     }\n  892 | \n  893 |     if (exports.length > 0) {\n  894 |       const dest = join(this.outputDir, this.options.dts ?? 'index.d.ts')\n  895 |       this.outputs.push({ kind: 'dts', path: dest })\n  896 |     }","lines":13,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/build.ts#L884-L896"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`processOptions` runs `execSync('rustup target list')` with no try/catch. If rustup is not installed (a common case for users on a single prebuilt toolchain, or in minimal CI images), this throws an uncaught exception and aborts `napi new` even though the user only happened to list the legacy `wasm32-wasi-preview1-threads` target. The whole purpose here is a best-effort alias remap, so a missing rustup should not be fatal.","fix":"Wrap the `execSync('rustup target list')` call in try/catch; on failure, skip the alias remap (or fall back to assuming WASI_TARGET is available) instead of throwing.","locations":[{"ref":"cli/src/api/new.ts:366-377","code":"  366 |   if (\n  367 |     options.targets.some((target) => target === 'wasm32-wasi-preview1-threads')\n  368 |   ) {\n  369 |     const out = execSync(`rustup target list`, {\n  370 |       encoding: 'utf8',\n  371 |     })\n  372 |     if (out.includes(WASI_TARGET)) {\n  373 |       options.targets = options.targets.map((target) =>\n  374 |         target === 'wasm32-wasi-preview1-threads' ? WASI_TARGET : target,\n  375 |       )\n  376 |     }\n  377 |   }","lines":12,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/new.ts#L366-L377"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `universalizeBinaries`, the lipo invocation `universalizers[process.platform]?.(srcFiles, output)` is called via optional chaining; if `process.platform` somehow has no universalizer the call is a no-op, then the very next line checks `fileExists(output)` and throws 'Universal binary was not created'. But the earlier guard at line 71 already throws when `!universalizers[process.platform]`, so the optional-chaining at line 96 is dead defensive code that masks intent. More importantly `createDarwinUniversalBinary` runs `lipo` with `stdio: 'inherit'` and the inputs are user/config-derived absolute paths spread directly as argv (acceptable since spawnSync without shell), but `output` collisions are not checked - an existing universal file is silently overwritten.","fix":"Remove the redundant optional chaining at the call site (the guard above guarantees presence), and optionally warn before overwriting an existing universal output.","locations":[{"ref":"cli/src/api/universalize.ts:63-102","code":"   63 |   const srcFiles = UniArchsByPlatform[process.platform]?.map((arch) =>\n   64 |     resolve(\n   65 |       options.cwd,\n   66 |       options.outputDir,\n   67 |       `${config.binaryName}.${process.platform}-${arch}.node`,\n   68 |     ),\n   69 |   )\n   70 | \n   71 |   if (!srcFiles || !universalizers[process.platform]) {\n   72 |     throw new Error(\n   73 |       `'universal' arch for platform '${process.platform}' not supported.`,\n   74 |     )\n   75 |   }\n   76 | \n   77 |   debug(`Looking up source binaries to combine: `)\n   78 |   debug('  %O', srcFiles)\n   79 | \n   80 |   const srcFileLookup = await Promise.all(srcFiles.map((f) => fileExists(f)))\n   81 | \n   82 |   const notFoundFiles = srcFiles.filter((_, i) => !srcFileLookup[i])\n   83 | \n   84 |   if (notFoundFiles.length) {\n   85 |     throw new Error(\n   86 |       `Some binary files were not found: ${JSON.stringify(notFoundFiles)}`,\n   87 |     )\n   88 |   }\n   89 | \n   90 |   const output = resolve(\n   91 |     options.cwd,\n   92 |     options.outputDir,\n   93 |     `${config.binaryName}.${process.platform}-universal.node`,\n   94 |   )\n   95 | \n   96 |   universalizers[process.platform]?.(srcFiles, output)\n   97 | \n   98 |   if (!(await fileExists(output))) {\n   99 |     throw new Error(`Universal binary was not created: ${output}`)\n  100 |   }\n  101 | \n  102 |   debug(`Produced universal binary: ${output}`)","lines":40,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/universalize.ts#L63-L102"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"The compat-mode proc-macros unwrap several Options populated by the `Fold` impl: `js_fn.name.unwrap()`, `js_fn.signature.unwrap()`, `js_fn.signature_raw.unwrap()`. If the folded item somehow lacks a signature/name (e.g. future syn changes, unusual input), these panic with no span, producing a bad diagnostic instead of a compile error.","fix":"Guard the Options and emit a `syn::Error::to_compile_error()` if absent, or restructure `JsFunction` so the signature/name are non-optional after folding.","locations":[{"ref":"crates/macro/src/lib.rs:49-51","code":"   49 |   let fn_name = js_fn.name.unwrap();\n   50 |   let fn_block = js_fn.block;\n   51 |   let signature = js_fn.signature.unwrap();","lines":3,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/lib.rs#L49-L51"},{"ref":"crates/macro/src/lib.rs:86-88","code":"   86 |   let fn_name = js_fn.name.unwrap();\n   87 |   let fn_block = js_fn.block;\n   88 |   let signature = js_fn.signature.unwrap();","lines":3,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/lib.rs#L86-L88"},{"ref":"crates/macro/src/lib.rs:143-144","code":"  143 |   let fn_name = js_fn.name.unwrap();\n  144 |   let signature = js_fn.signature_raw.unwrap();","lines":2,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/lib.rs#L143-L144"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`generator_next_fn` and the other async generator callbacks throw errors using `e.reason.as_ptr()` as a C string: `sys::napi_throw_error(env, format!(\"{}\", e.status).as_ptr().cast(), e.reason.as_ptr().cast())`. Both `format!(...)` and `e.reason` are Rust `String`s that are NOT NUL-terminated; `napi_throw_error` expects NUL-terminated C strings and will read past the buffer end, leaking adjacent memory into the error code/message or reading out of bounds. Additionally the temporary `format!` string is dropped at the end of the statement, so the pointer dangles even before napi reads it.","fix":"Build NUL-terminated `CString`s (and keep them alive for the duration of the call), or use `JsError::from(e).throw_into(env)` which handles lengths correctly.","locations":[{"ref":"crates/napi/src/bindgen_runtime/async_iterator.rs:333-338","code":"  333 |           sys::napi_throw_error(\n  334 |             env,\n  335 |             format!(\"{}\", e.status).as_ptr().cast(),\n  336 |             e.reason.as_ptr().cast(),\n  337 |           )\n  338 |         };","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/async_iterator.rs#L333-L338"},{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:428-433","code":"  428 |               sys::napi_throw_error(\n  429 |                 env,\n  430 |                 format!(\"{}\", e.status).as_ptr().cast(),\n  431 |                 e.reason.as_ptr().cast(),\n  432 |               )\n  433 |             };","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L428-L433"},{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:493-498","code":"  493 |             sys::napi_throw_error(\n  494 |               env,\n  495 |               format!(\"{}\", e.status).as_ptr().cast(),\n  496 |               e.reason.as_ptr().cast(),\n  497 |             )\n  498 |           };","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L493-L498"},{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:688-693","code":"  688 |         sys::napi_throw_error(\n  689 |           env,\n  690 |           format!(\"{}\", e.status).as_ptr().cast(),\n  691 |           e.reason.as_ptr().cast(),\n  692 |         )\n  693 |       };","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L688-L693"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`Reference::drop` only unrefs (`napi_reference_unref`) when `Arc::strong_count > 1`, and NEVER calls\n`napi_delete_reference`. The comment says when strong count == 1 the object is dropped on GC at\nprocess exit, but in the normal case (count > 1) the napi_ref is unref'd but the `napi_ref` handle\nitself is never deleted by `Reference`. Reference handles are created in `class.rs::new_instance`\n(`napi_wrap` produces `object_ref`) and stored in `REFERENCE_MAP`; nothing in the shown `Drop`\ndeletes them. If the only deletion happens in `Reference::add_ref` when a *duplicate* insert evicts\na previous entry (`napi_delete_reference(env, previous_ref)`), then references that are never\nre-inserted leak their `napi_ref` for the lifetime of the env. At minimum the unbalanced\nunref-without-delete is fragile and relies on GC finalization ordering.","fix":"Document precisely who owns and deletes the `napi_ref` (the GC finalizer via `finalize_callbacks`),\nand ensure the ref is deleted exactly once. Verify against the wrap finalizer that the\nunref-here / delete-on-finalize split is balanced for the count==1 case.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/value_ref.rs:44-66","code":"   44 | impl<T> Drop for Reference<T> {\n   45 |   fn drop(&mut self) {\n   46 |     let rc_strong_count = Arc::strong_count(&self.finalize_callbacks);\n   47 |     let mut ref_count = 0;\n   48 |     // If Rc strong count == 1, then the referenced object is dropped on GC\n   49 |     // It would happen when the process is exiting\n   50 |     // In general, the `drop` of the `Reference` would happen first\n   51 |     if rc_strong_count > 1 {\n   52 |       let status = unsafe {\n   53 |         crate::sys::napi_reference_unref(\n   54 |           self.env as crate::sys::napi_env,\n   55 |           self.napi_ref,\n   56 |           &mut ref_count,\n   57 |         )\n   58 |       };\n   59 |       debug_assert!(\n   60 |         status == crate::sys::Status::napi_ok,\n   61 |         \"Reference unref failed, status code: {}\",\n   62 |         crate::Status::from(status)\n   63 |       );\n   64 |     };\n   65 |   }\n   66 | }","lines":23,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/value_ref.rs#L44-L66"},{"ref":"crates/napi/src/bindgen_runtime/js_values/value_ref.rs:71-80","code":"   71 |   pub fn add_ref(env: crate::sys::napi_env, t: *mut c_void, value: RefInformation) {\n   72 |     REFERENCE_MAP.with(|cell| {\n   73 |       cell.borrow_mut(|map| {\n   74 |         if let Some((_, previous_ref, previous_rc)) = map.insert(t, value) {\n   75 |           unsafe { Arc::from_raw(previous_rc) };\n   76 |           unsafe { crate::sys::napi_delete_reference(env, previous_ref) };\n   77 |         }\n   78 |       })\n   79 |     });\n   80 |   }","lines":10,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/value_ref.rs#L71-L80"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`napi_create_reference` return status is ignored when creating the class constructor ref (`sys::napi_create_reference(env, class_ptr, 1, &mut ctor_ref)`). Every other napi call in this function is wrapped in `check_status_or_throw!`. If this call fails, `ctor_ref` stays null and a null `napi_ref` is inserted into `registered_classes`, later returned by `get_class_constructor`, leading to misbehavior with no diagnostic.","fix":"Wrap the `napi_create_reference` call in `check_status_or_throw!` like the surrounding calls.","locations":[{"ref":"crates/napi/src/bindgen_runtime/module_register.rs:456-459","code":"  456 |           let mut ctor_ref = ptr::null_mut();\n  457 |           sys::napi_create_reference(env, class_ptr, 1, &mut ctor_ref);\n  458 | \n  459 |           registered_classes.insert(js_name.to_string(), ctor_ref);","lines":4,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/module_register.rs#L456-L459"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`throw_syntax_error` (napi9) uses `CString::new(...).expect(...)` on both the\ncode and the message. Any caller-supplied string containing an interior NUL byte\nwill panic the whole process instead of returning an error. Unlike the other\n`throw_*` methods which return `Result<()>` and use `CString::new(...)?`, this\none takes no Result and panics. A JS-facing throw helper should never abort the\nprocess due to input content.","fix":"Make `throw_syntax_error` return `Result<()>` and use `CString::new(...)?`, or replace interior NULs / fall back gracefully instead of `.expect`.","locations":[{"ref":"crates/napi/src/env.rs:761-775","code":"  761 |   #[cfg(feature = \"napi9\")]\n  762 |   pub fn throw_syntax_error<S: AsRef<str>, C: AsRef<str>>(&self, msg: S, code: Option<C>) {\n  763 |     use crate::check_status_or_throw;\n  764 | \n  765 |     let code = code.as_ref().map(|c| c.as_ref()).unwrap_or(\"\");\n  766 |     let c_code = CString::new(code).expect(\"code must be a valid utf-8 string\");\n  767 |     let code_ptr = c_code.as_ptr();\n  768 |     let msg: CString = CString::new(msg.as_ref()).expect(\"msg must be a valid utf-8 string\");\n  769 |     let msg_ptr = msg.as_ptr();\n  770 |     check_status_or_throw!(\n  771 |       self.0,\n  772 |       unsafe { sys::node_api_throw_syntax_error(self.0, code_ptr, msg_ptr,) },\n  773 |       \"Throw syntax error failed\"\n  774 |     );\n  775 |   }","lines":15,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L761-L775"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`spawn_future_with_callback` transmutes a stack-local `Env` reference to the\n`'env` lifetime: `core::mem::transmute::<&Env, &'env Env>(&env)`. The `env`\nlocal is created inside the resolver closure that runs later on the JS thread;\nextending a reference to a stack local to `'env` (the caller's lifetime) and\nhanding it to the user callback is unsound if the callback stashes the `&'env\nEnv` anywhere outliving the closure invocation. The user callback signature\n`FnOnce(&'env Env, T)` invites exactly that. `Env` is `Copy`, so passing it by\nvalue would avoid the transmute entirely.","fix":"Pass `Env` by value (it is Copy) to the callback rather than transmuting a stack-local reference to an arbitrary `'env` lifetime.","locations":[{"ref":"crates/napi/src/env.rs:1203-1224","code":" 1203 |   pub fn spawn_future_with_callback<\n 1204 |     'env,\n 1205 |     T: 'static + Send,\n 1206 |     V: ToNapiValue,\n 1207 |     F: 'static + Send + Future<Output = Result<T>>,\n 1208 |     R: 'static + FnOnce(&'env Env, T) -> Result<V>,\n 1209 |   >(\n 1210 |     &'env self,\n 1211 |     fut: F,\n 1212 |     callback: R,\n 1213 |   ) -> Result<PromiseRaw<'env, V>> {\n 1214 |     use crate::tokio_runtime;\n 1215 | \n 1216 |     let promise = tokio_runtime::execute_tokio_future(self.0, fut, move |env, val| unsafe {\n 1217 |       let env = Env::from_raw(env);\n 1218 |       let static_env = core::mem::transmute::<&Env, &'env Env>(&env);\n 1219 |       let val = callback(static_env, val)?;\n 1220 |       ToNapiValue::to_napi_value(env.0, val)\n 1221 |     })?;\n 1222 | \n 1223 |     Ok(PromiseRaw::new(self.0, promise))\n 1224 |   }","lines":22,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L1203-L1224"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`UnknownRef` and `SymbolRef` Drop impls only `eprintln!` a leak warning but never actually release the napi reference. The doc comment admits the reference 'will be leaked forever' if `unref` is not called. This is by design but the warning message is misleading: it says 'ObjectRef is not unref' for both UnknownRef and SymbolRef (copy-paste; should say UnknownRef / SymbolRef respectively), making leak diagnostics point at the wrong type.","fix":"Fix the warning text to name the actual type (`UnknownRef`/`SymbolRef`). Consider whether Drop should attempt a best-effort release given a stored env, since silent leaks are easy to hit.","locations":[{"ref":"crates/napi/src/js_values/unknown.rs:111-117","code":"  111 | impl<const LEAK_CHECK: bool> Drop for UnknownRef<LEAK_CHECK> {\n  112 |   fn drop(&mut self) {\n  113 |     if LEAK_CHECK && !self.inner.is_null() {\n  114 |       eprintln!(\"ObjectRef is not unref, it considered as a memory leak\");\n  115 |     }\n  116 |   }\n  117 | }","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/unknown.rs#L111-L117"},{"ref":"crates/napi/src/js_values/symbol.rs:69-75","code":"   69 | impl<const LEAK_CHECK: bool> Drop for SymbolRef<LEAK_CHECK> {\n   70 |   fn drop(&mut self) {\n   71 |     if LEAK_CHECK && !self.inner.is_null() {\n   72 |       eprintln!(\"ObjectRef is not unref, it considered as a memory leak\");\n   73 |     }\n   74 |   }\n   75 | }","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/symbol.rs#L69-L75"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`JsValue::escape` calls `sys::napi_escape_handle` inside an `unsafe` block but ignores its returned `napi_status`. If escaping fails (e.g. scope already escaped, which is a common N-API error since a scope may only be escaped once), `result` stays null and is passed straight to `from_napi_value`, silently producing a value wrapping a null pointer instead of surfacing an error. Every other method in this trait wraps its N-API call in `check_status!`.","fix":"Wrap the `napi_escape_handle` call in `check_status!(unsafe { ... })?;` before constructing the escaped value.","locations":[{"ref":"crates/napi/src/js_values/value.rs:162-176","code":"  162 |   fn escape<'scope, E: JsValue<'scope> + FromNapiValue>(\n  163 |     &self,\n  164 |     escapable_handle_scope: EscapableHandleScope<'scope>,\n  165 |   ) -> Result<E> {\n  166 |     let mut result = ptr::null_mut();\n  167 |     unsafe {\n  168 |       sys::napi_escape_handle(\n  169 |         escapable_handle_scope.env,\n  170 |         escapable_handle_scope.scope,\n  171 |         self.raw(),\n  172 |         &mut result,\n  173 |       )\n  174 |     };\n  175 |     unsafe { <E as FromNapiValue>::from_napi_value(self.value().env, result) }\n  176 |   }","lines":15,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/value.rs#L162-L176"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`pickCrossToolchain` wraps the entire napi-cross setup in a try/catch that on ANY error logs `debug.warn('Pick cross toolchain failed', e)` and silently continues the build with the cross toolchain only partially configured (some env vars set, some not). A failure midway (e.g. download succeeds but unpack throws, or require of @napi-rs/cross-toolchain fails) leaves the build to proceed with the default linker, likely producing a confusing cargo linker error far from the real cause.","fix":"Narrow the catch to the optional `require` of @napi-rs/cross-toolchain; let genuine setup failures (mkdir/unpack) propagate so the user sees the real error.","locations":[{"ref":"cli/src/api/build.ts:204-286","code":"  204 |     try {\n  205 |       const { version, download } = require('@napi-rs/cross-toolchain')\n  206 | \n  207 |       const alias: Record<string, string> = {\n  208 |         's390x-unknown-linux-gnu': 's390x-ibm-linux-gnu',\n  209 |       }\n  210 | \n  211 |       const toolchainPath = join(\n  212 |         homedir(),\n  213 |         '.napi-rs',\n  214 |         'cross-toolchain',\n  215 |         version,\n  216 |         this.target.triple,\n  217 |       )\n  218 |       mkdirSync(toolchainPath, { recursive: true })\n  219 |       if (existsSync(join(toolchainPath, 'package.json'))) {\n  220 |         debug(`Toolchain ${toolchainPath} exists, skip extracting`)\n  221 |       } else {\n  222 |         const tarArchive = download(process.arch, this.target.triple)\n  223 |         tarArchive.unpack(toolchainPath)\n  224 |       }\n  225 |       const upperCaseTarget = targetToEnvVar(this.target.triple)\n  226 |       const crossTargetName = alias[this.target.triple] ?? this.target.triple\n  227 |       const linkerEnv = `CARGO_TARGET_${upperCaseTarget}_LINKER`\n  228 |       this.setEnvIfNotExists(\n  229 |         linkerEnv,\n  230 |         join(toolchainPath, 'bin', `${crossTargetName}-gcc`),\n  231 |       )\n  232 |       this.setEnvIfNotExists(\n  233 |         'TARGET_SYSROOT',\n  234 |         join(toolchainPath, crossTargetName, 'sysroot'),\n  235 |       )\n  236 |       this.setEnvIfNotExists(\n  237 |         'TARGET_AR',\n  238 |         join(toolchainPath, 'bin', `${crossTargetName}-ar`),\n  239 |       )\n  240 |       this.setEnvIfNotExists(\n  241 |         'TARGET_RANLIB',\n  242 |         join(toolchainPath, 'bin', `${crossTargetName}-ranlib`),\n  243 |       )\n  244 |       this.setEnvIfNotExists(\n  245 |         'TARGET_READELF',\n  246 |         join(toolchainPath, 'bin', `${crossTargetName}-readelf`),\n  247 |       )\n  248 |       this.setEnvIfNotExists(\n  249 |         'TARGET_C_INCLUDE_PATH',\n  250 |         join(toolchainPath, crossTargetName, 'sysroot', 'usr', 'include/'),\n  251 |       )\n  252 |       this.setEnvIfNotExists(\n  253 |         'TARGET_CC',\n  254 |         join(toolchainPath, 'bin', `${crossTargetName}-gcc`),\n  255 |       )\n  256 |       this.setEnvIfNotExists(\n  257 |         'TARGET_CXX',\n  258 |         join(toolchainPath, 'bin', `${crossTargetName}-g++`),\n  259 |       )\n  260 |       this.setEnvIfNotExists(\n  261 |         'BINDGEN_EXTRA_CLANG_ARGS',\n  262 |         `--sysroot=${this.envs.TARGET_SYSROOT}}`,\n  263 |       )\n  264 | \n  265 |       if (\n  266 |         process.env.TARGET_CC?.startsWith('clang') ||\n  267 |         (process.env.CC?.startsWith('clang') && !process.env.TARGET_CC)\n  268 |       ) {\n  269 |         const TARGET_CFLAGS = process.env.TARGET_CFLAGS ?? ''\n  270 |         this.envs.TARGET_CFLAGS = `--sysroot=${this.envs.TARGET_SYSROOT} --gcc-toolchain=${toolchainPath} ${TARGET_CFLAGS}`\n  271 |       }\n  272 |       if (\n  273 |         (process.env.CXX?.startsWith('clang++') && !process.env.TARGET_CXX) ||\n  274 |         process.env.TARGET_CXX?.startsWith('clang++')\n  275 |       ) {\n  276 |         const TARGET_CXXFLAGS = process.env.TARGET_CXXFLAGS ?? ''\n  277 |         this.envs.TARGET_CXXFLAGS = `--sysroot=${this.envs.TARGET_SYSROOT} --gcc-toolchain=${toolchainPath} ${TARGET_CXXFLAGS}`\n  278 |       }\n  279 |       this.envs.PATH = this.envs.PATH\n  280 |         ? `${toolchainPath}/bin:${this.envs.PATH}:${process.env.PATH}`\n  281 |         : `${toolchainPath}/bin:${process.env.PATH}`\n  282 |     } catch (e) {\n  283 |       debug.warn('Pick cross toolchain failed', e as Error)\n  284 |       // ignore, do nothing\n  285 |     }\n  286 |     return this","lines":83,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/build.ts#L204-L286"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`createGhRelease` swallows the GitHub release-creation error with `console.error(e)` and continues, returning a valid-looking `{ owner, repo, pkgInfo, octokit }`. The later asset-upload loop then assumes the release exists and calls `getReleaseByTag`; if the release truly failed to create for a non-'already exists' reason, the user gets a confusing downstream 404 instead of the original creation error being surfaced as fatal.","fix":"Distinguish 'release already exists' from other errors; rethrow unexpected errors instead of logging and proceeding.","locations":[{"ref":"cli/src/api/pre-publish.ts:60-83","code":"   60 |     if (!options.dryRun) {\n   61 |       try {\n   62 |         await octokit.repos.createRelease({\n   63 |           owner,\n   64 |           repo,\n   65 |           tag_name: pkgInfo.tag,\n   66 |           name: options.ghReleaseName,\n   67 |           prerelease:\n   68 |             version.includes('alpha') ||\n   69 |             version.includes('beta') ||\n   70 |             version.includes('rc'),\n   71 |         })\n   72 |       } catch (e) {\n   73 |         debug(\n   74 |           `Params: ${JSON.stringify(\n   75 |             { owner, repo, tag_name: pkgInfo.tag },\n   76 |             null,\n   77 |             2,\n   78 |           )}`,\n   79 |         )\n   80 |         console.error(e)\n   81 |       }\n   82 |     }\n   83 |     return { owner, repo, pkgInfo, octokit }","lines":24,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/pre-publish.ts#L60-L83"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`updatePackageJson` reads and `JSON.parse`s the target package.json with no try/catch. A malformed or partially-written package.json (e.g. concurrent writes during publish) throws a raw SyntaxError with no file-path context, unlike `readNapiConfig` which wraps parse errors with the offending path.","fix":"Wrap the JSON.parse in try/catch and rethrow with the file path in the message (matching readNapiConfig's pattern).","locations":[{"ref":"cli/src/utils/misc.ts:67-81","code":"   67 | export async function updatePackageJson(\n   68 |   path: string,\n   69 |   partial: Record<string, any>,\n   70 | ) {\n   71 |   const exists = await fileExists(path)\n   72 |   if (!exists) {\n   73 |     debug(`File not exists ${path}`)\n   74 |     return\n   75 |   }\n   76 |   const old = JSON.parse(await readFileAsync(path, 'utf8'))\n   77 |   await writeFileAsync(\n   78 |     path,\n   79 |     JSON.stringify(mergePackageJson(old, partial), null, 2),\n   80 |   )\n   81 | }","lines":15,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/utils/misc.ts#L67-L81"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`fill_ty` silently returns the string `\"any\"` when the number of `{}`\nplaceholders does not match the number of supplied args:\n\n    if args.len() != matches.len() {\n      return String::from(\"any\");\n    }\n\nThis swallows what is almost always a real bug (a KNOWN_TYPES template whose\narity disagrees with the actual generic arguments, e.g. `HashMap` after the\nKNOWN_TYPES_IGNORE_ARG filtering went wrong). Instead of a diagnostic the user\ngets a silently-degraded `any` in their `.d.ts`, which is hard to notice and\ndefeats type checking. Codegen is build-time so this cannot be surfaced as a\nhard error easily, but the silent fallback hides template/arity mismatches.","fix":"At minimum keep the `any` fallback but emit a build warning (eprintln!/cargo:warning) including the template and arg count so arity mismatches are diagnosable.","locations":[{"ref":"crates/backend/src/typegen.rs:422-438","code":"  422 | fn fill_ty(template: &str, args: Vec<String>) -> String {\n  423 |   let matches = template.match_indices(\"{}\").collect::<Vec<_>>();\n  424 |   if args.len() != matches.len() {\n  425 |     return String::from(\"any\");\n  426 |   }\n  427 | \n  428 |   let mut ret = String::from(\"\");\n  429 |   let mut prev = 0;\n  430 |   matches.into_iter().zip(args).for_each(|((index, _), arg)| {\n  431 |     ret.push_str(&template[prev..index]);\n  432 |     ret.push_str(&arg);\n  433 |     prev = index + 2;\n  434 |   });\n  435 | \n  436 |   ret.push_str(&template[prev..]);\n  437 |   ret\n  438 | }","lines":17,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen.rs#L422-L438"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`windows::setup_gnu` and `search_libnode_path` interplay can `panic!` (\"libnode.dll not found in any search path\") during a build. Build-script panics are acceptable for hard-stop misconfiguration, but here the panic fires whenever a gnu-target windows build lacks libnode on LIBNODE_PATH/LIBPATH/PATH, which is an ordinary environment issue better surfaced as a clear actionable message; also `search_libnode_path` only checks that `LIBNODE_PATH` dir `exists()` but not that it contains libnode.dll before returning it, then `setup_gnu` re-checks and panics with a different message - two divergent failure paths for the same condition.","fix":"Unify the not-found handling: have `search_libnode_path` only return dirs that actually contain `libnode.dll` (apply the same `.join(\"libnode.dll\").exists()` check it uses for LIBPATH/PATH to the LIBNODE_PATH branch), and emit a single clear error/`cargo:warning` message.","locations":[{"ref":"crates/build/src/windows.rs:4-17","code":"    4 | pub fn setup_gnu() {\n    5 |   let libnode_path = search_libnode_path();\n    6 |   if let Some(libnode_dir) = libnode_path {\n    7 |     let node_lib_path = libnode_dir.join(\"libnode.dll\");\n    8 |     if node_lib_path.exists() {\n    9 |       println!(\"cargo:rustc-link-search=native={}\", libnode_dir.display());\n   10 |       println!(\"cargo:rustc-link-lib=node\");\n   11 |     } else {\n   12 |       panic!(\"libnode.dll not found in {}\", libnode_dir.display());\n   13 |     }\n   14 |   } else {\n   15 |     panic!(\"libnode.dll not found in any search path\");\n   16 |   }\n   17 | }","lines":14,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/build/src/windows.rs#L4-L17"},{"ref":"crates/build/src/windows.rs:19-44","code":"   19 | fn search_libnode_path() -> Option<PathBuf> {\n   20 |   if let Ok(path) = env::var(\"LIBNODE_PATH\") {\n   21 |     let libnode_dir = PathBuf::from(path);\n   22 |     if libnode_dir.exists() {\n   23 |       return Some(libnode_dir);\n   24 |     }\n   25 |   }\n   26 | \n   27 |   if let Ok(paths) = env::var(\"LIBPATH\") {\n   28 |     for path in env::split_paths(&paths) {\n   29 |       if path.join(\"libnode.dll\").exists() {\n   30 |         return Some(path);\n   31 |       }\n   32 |     }\n   33 |   }\n   34 | \n   35 |   if let Ok(paths) = env::var(\"PATH\") {\n   36 |     for path in env::split_paths(&paths) {\n   37 |       if path.join(\"libnode.dll\").exists() {\n   38 |         return Some(path);\n   39 |       }\n   40 |     }\n   41 |   }\n   42 | \n   43 |   None\n   44 | }","lines":26,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/build/src/windows.rs#L19-L44"}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`output_type_def` and `remove_existed_def_file` swallow filesystem errors: write failures are printed via `println!` (and only in debug for the remove case) but never fail the build. A failed type-def write produces a silently incomplete/missing `.d.ts` with a successful compile, which is hard to diagnose. The `println!` also pollutes build stdout.","fix":"At minimum emit `cargo:warning=...` (recognized by cargo) instead of `println!`, and consider surfacing persistent write failures more loudly so missing type defs are noticed.","locations":[{"ref":"crates/macro/src/expand/typedef/type_def.rs:33-44","code":"   33 | fn remove_existed_def_file() {\n   34 |   if let Some(file) = get_type_def_file() {\n   35 |     if file.exists() {\n   36 |       if let Err(_e) = fs::remove_file(&file) {\n   37 |         #[cfg(debug_assertions)]\n   38 |         {\n   39 |           println!(\"Failed to manipulate type def file {file:?}: {_e:?}\");\n   40 |         }\n   41 |       }\n   42 |     }\n   43 |   }\n   44 | }","lines":12,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/expand/typedef/type_def.rs#L33-L44"},{"ref":"crates/macro/src/expand/typedef/type_def.rs:46-63","code":"   46 | pub fn output_type_def(napi: &Napi) {\n   47 |   if let Some(file) = get_type_def_file() {\n   48 |     if let Some(type_def) = napi.to_type_def() {\n   49 |       fs::OpenOptions::new()\n   50 |         .append(true)\n   51 |         .create(true)\n   52 |         .open(&file)\n   53 |         .and_then(|file| {\n   54 |           let mut writer = BufWriter::<fs::File>::new(file);\n   55 |           writer.write_all(type_def.to_string().as_bytes())?;\n   56 |           writer.write_all(\"\\n\".as_bytes())?;\n   57 |           writer.flush()\n   58 |         })\n   59 |         .unwrap_or_else(|e| {\n   60 |           println!(\"Failed to write type def file: {e:?}\");\n   61 |         });\n   62 |     }\n   63 |   }","lines":18,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/expand/typedef/type_def.rs#L46-L63"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`throw_error` in promise_raw.rs ignores the status of every Node-API call it makes\n(`napi_create_string_latin1`, `napi_create_string_utf8`, `napi_create_error`, `napi_throw`). If\ncreating the code/message strings or the error object fails (e.g. pending exception, OOM), it still\ncalls `napi_throw` with a potentially null `err`, and returns null. A failed `napi_throw` leaves no\nexception pending while the Rust side believes it threw, which can lead to the promise callback\nsilently swallowing the error.","fix":"Check each status; if string/error creation fails, fall back to throwing a minimal known-good error and avoid `napi_throw(env, null)`.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/promise_raw.rs:502-535","code":"  502 | #[inline(never)]\n  503 | fn throw_error(env: sys::napi_env, err: Error, default_msg: &str) -> sys::napi_value {\n  504 |   const GENERIC_FAILURE: &str = \"GenericFailure\\0\";\n  505 |   let code = if err.status.as_ref().is_empty() {\n  506 |     GENERIC_FAILURE\n  507 |   } else {\n  508 |     err.status.as_ref()\n  509 |   };\n  510 |   let mut code_string = ptr::null_mut();\n  511 |   let msg = if err.reason.is_empty() {\n  512 |     default_msg\n  513 |   } else {\n  514 |     err.reason.as_ref()\n  515 |   };\n  516 |   let mut msg_string = ptr::null_mut();\n  517 |   let mut err = ptr::null_mut();\n  518 |   unsafe {\n  519 |     sys::napi_create_string_latin1(\n  520 |       env,\n  521 |       code.as_ptr().cast(),\n  522 |       code.len() as isize,\n  523 |       &mut code_string,\n  524 |     );\n  525 |     sys::napi_create_string_utf8(\n  526 |       env,\n  527 |       msg.as_ptr().cast(),\n  528 |       msg.len() as isize,\n  529 |       &mut msg_string,\n  530 |     );\n  531 |     sys::napi_create_error(env, code_string, msg_string, &mut err);\n  532 |     sys::napi_throw(env, err);\n  533 |   };\n  534 |   ptr::null_mut()\n  535 | }","lines":34,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/promise_raw.rs#L502-L535"}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`NODE_VERSION` node version `release` field is built with `CStr::from_ptr(node_version.release).to_str().unwrap()`. If a runtime ever supplied a non-UTF8 release string, this `.unwrap()` panics during module registration (during `napi_register_module_v1`), aborting module load with an opaque panic across the FFI boundary.","fix":"Use `.to_str().unwrap_or(\"\")` or `to_string_lossy()` and store an owned/lossy string.","locations":[{"ref":"crates/napi/src/bindgen_runtime/module_register.rs:298-298","code":"  298 |         release: unsafe { CStr::from_ptr(node_version.release).to_str().unwrap() },","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/module_register.rs#L298"}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`get_words` reserves `Vec::with_capacity(self.word_count)` then passes `words.as_mut_ptr()` with `word_count = &mut self.word_count` (initially self.word_count) to napi_get_value_bigint_words, then unconditionally `words.set_len(self.word_count)`. If napi writes fewer words than capacity (it updates word_count to the actual count), set_len to the (possibly updated) self.word_count is correct only if napi reduced it; but if napi were to report MORE words than the pre-reserved capacity, the pointer write would overflow the allocation (buffer overflow). Since word_count was obtained earlier via the count query this matches, but there is no re-check that the post-call word_count does not exceed the reserved capacity before set_len, so a BigInt that grows between the count query and this call (not possible for immutable BigInt, but the invariant is undocumented) would corrupt memory.","fix":"Assert `self.word_count <= capacity` after the call before `set_len`, or reserve based on the count returned by a fresh query. Document the immutability invariant.","locations":[{"ref":"crates/napi/src/js_values/bigint.rs:155-173","code":"  155 |   pub fn get_words(&mut self) -> Result<(bool, Vec<u64>)> {\n  156 |     let mut words: Vec<u64> = Vec::with_capacity(self.word_count);\n  157 |     let word_count = &mut self.word_count;\n  158 |     let mut sign_bit = 0;\n  159 |     check_status!(unsafe {\n  160 |       sys::napi_get_value_bigint_words(\n  161 |         self.raw.env,\n  162 |         self.raw.value,\n  163 |         &mut sign_bit,\n  164 |         word_count,\n  165 |         words.as_mut_ptr(),\n  166 |       )\n  167 |     })?;\n  168 | \n  169 |     unsafe {\n  170 |       words.set_len(self.word_count);\n  171 |     };\n  172 | \n  173 |     Ok((sign_bit == 1, words))","lines":19,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/bigint.rs#L155-L173"}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In `napi_resolve_deferred`, when rejection fails on the non-debug build, nothing happens (the deferred is never settled and the promise hangs). On debug it creates a generic 'Rejection failed' error with `napi_create_string_utf8(..., 0, ...)` - passing length 0 means an empty string is created from the `c\"Rejection failed\"` literal, so the error message is empty rather than 'Rejection failed'. The length arg should be the byte length of the literal (or NAPI_AUTO_LENGTH).","fix":"Pass the correct length (16) or `sys::NAPI_AUTO_LENGTH` so the diagnostic message is non-empty; consider settling the promise even on release builds to avoid a hung promise.","locations":[{"ref":"crates/napi/src/js_values/deferred.rs:312-321","code":"  312 |         if cfg!(debug_assertions) {\n  313 |           eprintln!(\"Failed to reject deferred: {err:?}\");\n  314 |           let mut err = ptr::null_mut();\n  315 |           let mut err_msg = ptr::null_mut();\n  316 |           unsafe {\n  317 |             sys::napi_create_string_utf8(env, c\"Rejection failed\".as_ptr().cast(), 0, &mut err_msg);\n  318 |             sys::napi_create_error(env, ptr::null_mut(), err_msg, &mut err);\n  319 |             sys::napi_reject_deferred(env, deferred, err);\n  320 |           }\n  321 |         }","lines":10,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/deferred.rs#L312-L321"}]},{"id":"ERR_25","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`shutdown_async_runtime` calls `rt.shutdown_background()` which does NOT wait for\nspawned tasks to finish — it abandons them. Combined with `spawn`/`block_on`\nthat can be re-created by `start_async_runtime`, a future spawned via\n`execute_tokio_future` (which spawns a JoinHandle-awaiting task to catch panics)\nmay be silently dropped mid-flight, leaving the associated `JsDeferred`\nunresolved (promise pending forever) and any captured resources leaked. The doc\non `spawn` even warns callers to await/abort, but the runtime shutdown path does\nnot honor that.","fix":"Document that shutdown_background abandons in-flight tasks and may leave JS promises unresolved; consider shutdown_timeout to drain, or ensure deferreds are rejected on runtime shutdown.","locations":[{"ref":"crates/napi/src/tokio_runtime.rs:94-99","code":"   94 | #[cfg(not(feature = \"noop\"))]\n   95 | pub fn shutdown_async_runtime() {\n   96 |   if let Some(rt) = RT.write().ok().and_then(|mut rt| rt.take()) {\n   97 |     rt.shutdown_background();\n   98 |   }\n   99 | }","lines":6,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/tokio_runtime.rs#L94-L99"},{"ref":"crates/napi/src/tokio_runtime.rs:106-114","code":"  106 | pub fn spawn<F>(fut: F) -> tokio::task::JoinHandle<F::Output>\n  107 | where\n  108 |   F: 'static + Send + Future<Output = ()>,\n  109 | {\n  110 |   RT.read()\n  111 |     .ok()\n  112 |     .and_then(|rt| rt.as_ref().map(|rt| rt.spawn(fut)))\n  113 |     .expect(\"Access tokio runtime failed in spawn\")\n  114 | }","lines":9,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/tokio_runtime.rs#L106-L114"}]},{"id":"ERR_26","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`ObjectRef`'s `Drop` (with `LEAK_CHECK = true`) only `eprintln!`s a warning when the ref was not\nunref'd; it never actually deletes the reference, so a forgotten `ObjectRef` leaks a `napi_ref`\nsilently apart from a stderr line. The doc comment says \"the object under the hood will be leaked\nforever\" which is accurate, but relying on a printed warning rather than RAII cleanup is unusual and\nthe message goes to stderr unconditionally (noisy in production).","fix":"Consider deleting the reference in Drop when an Env is recoverable, or gate the eprintln behind a debug/feature flag.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/object.rs:839-851","code":"  839 | pub struct ObjectRef<const LEAK_CHECK: bool = true> {\n  840 |   pub(crate) inner: sys::napi_ref,\n  841 | }\n  842 | \n  843 | unsafe impl<const LEAK_CHECK: bool> Send for ObjectRef<LEAK_CHECK> {}\n  844 | \n  845 | impl<const LEAK_CHECK: bool> Drop for ObjectRef<LEAK_CHECK> {\n  846 |   fn drop(&mut self) {\n  847 |     if LEAK_CHECK && !self.inner.is_null() {\n  848 |       eprintln!(\"ObjectRef is not unref, it considered as a memory leak\");\n  849 |     }\n  850 |   }\n  851 | }","lines":13,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/object.rs#L839-L851"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`getLatestWasmRuntimeVersion` builds the registry URL by concatenating `npmRegistryBase` with the package name `@napi-rs/wasm-runtime` without URL-encoding the scope slash. Most registries accept `@napi-rs/wasm-runtime`, but the official metadata endpoint expects the scoped name URL-encoded (`@napi-rs%2Fwasm-runtime`) for the package document; relying on the un-encoded form is registry-dependent and can 404 against stricter/proxy registries configured via `npm_config_registry`.","fix":"Use `encodeURIComponent(WASM_RUNTIME_PACKAGE_NAME)` when constructing the metadata URL.","locations":[{"ref":"cli/src/api/create-npm-dirs.ts:31-52","code":"   31 | async function getLatestWasmRuntimeVersion() {\n   32 |   const npmRegistryBase =\n   33 |     process.env.npm_config_registry?.replace(/\\/?$/, '/') ??\n   34 |     'https://registry.npmjs.org/'\n   35 |   const packageMetadataUrl = `${npmRegistryBase}${WASM_RUNTIME_PACKAGE_NAME}`\n   36 |   let response: Response\n   37 | \n   38 |   try {\n   39 |     response = await fetch(packageMetadataUrl)\n   40 |   } catch (error) {\n   41 |     throw new Error(\n   42 |       `Failed to fetch ${packageMetadataUrl} while resolving ${WASM_RUNTIME_PACKAGE_NAME}. Check your network connection and npm registry availability.`,\n   43 |       { cause: error },\n   44 |     )\n   45 |   }\n   46 | \n   47 |   if (!response.ok) {\n   48 |     throw new Error(\n   49 |       `Failed to fetch ${packageMetadataUrl} while resolving ${WASM_RUNTIME_PACKAGE_NAME}: npm registry responded with ${response.status} ${response.statusText || 'Unknown Status'}`,\n   50 |     )\n   51 |   }\n   52 | ","lines":22,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/create-npm-dirs.ts#L31-L52"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`copyDirectory` recursion in `napi new` does NOT skip `node_modules`. The template repo is a git clone, but if a previous interrupted run or git hooks left a `node_modules` in the cached template `repo/`, the entire tree is deep-copied into the new project, which is slow and pollutes the scaffold. (Compare with `collectNodeBinaries` in artifacts.ts which explicitly skips `node_modules`.)","fix":"Skip `node_modules` (and other non-template dirs like `target`) during recursive copy, mirroring the skip done in artifacts.ts:166.","locations":[{"ref":"cli/src/api/new.ts:106-139","code":"  106 | async function copyDirectory(\n  107 |   src: string,\n  108 |   dest: string,\n  109 |   includeWasiBindings: boolean,\n  110 | ): Promise<void> {\n  111 |   await mkdirAsync(dest, { recursive: true })\n  112 |   const entries = await fs.readdir(src, { withFileTypes: true })\n  113 | \n  114 |   for (const entry of entries) {\n  115 |     const srcPath = path.join(src, entry.name)\n  116 |     const destPath = path.join(dest, entry.name)\n  117 | \n  118 |     // Skip .git directory\n  119 |     if (entry.name === '.git') {\n  120 |       continue\n  121 |     }\n  122 | \n  123 |     if (entry.isDirectory()) {\n  124 |       await copyDirectory(srcPath, destPath, includeWasiBindings)\n  125 |     } else {\n  126 |       if (\n  127 |         !includeWasiBindings &&\n  128 |         (entry.name.endsWith('.wasi-browser.js') ||\n  129 |           entry.name.endsWith('.wasi.cjs') ||\n  130 |           entry.name.endsWith('wasi-worker-browser.mjs') ||\n  131 |           entry.name.endsWith('wasi-worker.mjs') ||\n  132 |           entry.name === 'browser.js')\n  133 |       ) {\n  134 |         continue\n  135 |       }\n  136 |       await fs.copyFile(srcPath, destPath)\n  137 |     }\n  138 |   }\n  139 | }","lines":34,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/cli/src/api/new.ts#L106-L139"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`Env::get_global` returns `JsGlobal<'static>` built from `self.0` (the raw env). Hardcoding `'static` for a value tied to a borrowed `&self` Env detaches the returned global object's lifetime from the env it came from, allowing the `napi_value` to be held past the validity of the originating scope/env (e.g. across an await point or after the env is torn down), a dangling-value hazard. Other `Env` accessors in this codebase tie returned values to `&self`.","fix":"Return `JsGlobal<'_>` borrowing `&self` rather than `'static`, so the global cannot outlive the env borrow.","locations":[{"ref":"crates/napi/src/bindgen_runtime/env.rs:12-26","code":"   12 |   pub fn get_global(&self) -> Result<JsGlobal<'static>> {\n   13 |     let mut global = std::ptr::null_mut();\n   14 |     crate::check_status!(\n   15 |       unsafe { sys::napi_get_global(self.0, &mut global) },\n   16 |       \"Get global object from Env failed\"\n   17 |     )?;\n   18 |     Ok(JsGlobal(\n   19 |       crate::Value {\n   20 |         value: global,\n   21 |         env: self.0,\n   22 |         value_type: crate::ValueType::Object,\n   23 |       },\n   24 |       std::marker::PhantomData,\n   25 |     ))\n   26 |   }","lines":15,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/env.rs#L12-L26"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`Symbol::from_napi_value` ignores the incoming napi value entirely and returns a fresh\n`Symbol { desc: None, for_desc: None }`. A `Symbol` round-tripped from JS therefore loses its\ndescription and its `for`/registry identity, and re-emitting it via `to_napi_value` creates a brand\nnew, unrelated symbol rather than the original. For a value-conversion type this is silently\nincorrect: `fn(s: Symbol) -> Symbol` does not preserve identity.","fix":"Either store the original napi_value/ref inside `Symbol` so `to_napi_value` can return the same\nsymbol, or document loudly that `Symbol` is write-only and use `JsSymbol` for round-tripping.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/symbol.rs:100-111","code":"  100 | impl FromNapiValue for Symbol {\n  101 |   unsafe fn from_napi_value(\n  102 |     _env: sys::napi_env,\n  103 |     _napi_val: sys::napi_value,\n  104 |   ) -> crate::Result<Self> {\n  105 |     Ok(Self {\n  106 |       desc: None,\n  107 |       #[cfg(feature = \"napi9\")]\n  108 |       for_desc: None,\n  109 |     })\n  110 |   }\n  111 | }","lines":12,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/symbol.rs#L100-L111"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"Mutable statics `NODE_VERSION_MAJOR/MINOR/PATCH` are plain `pub static mut u32` written inside `napi_register_module_v1` (unsynchronized) and readable from any thread. With multiple worker threads registering concurrently these are unsynchronized writes/reads to shared mutable statics — a data race (UB
