<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`CallbackInfo::get_arg` indexes `self.args[index]` directly. `args` is a fixed `[napi_value; N]` where `N` is the declared arg count, but `napi_get_cb_info` only fills as many slots as JS actually passed (the rest stay null) and `index` comes from generated call sites. With `required_argc` set to `Some(N)` callers are protected, but `get_arg` is `pub` and any path that constructs `CallbackInfo` with `required_argc = None` (optional/variadic args) and then reads `get_arg(i)` for `i >= N` will panic with an out-of-bounds index. The bounds are not validated against the declared array length here.","fix":"Use `self.args.get(index).copied().unwrap_or(ptr::null_mut())` so an out-of-range index yields a JS `undefined`-equivalent null rather than panicking across the FFI boundary.","locations":[{"ref":"crates/napi/src/bindgen_runtime/callback_info.rs:82-84","code":"   82 |   pub fn get_arg(&self, index: usize) -> sys::napi_value {\n   83 |     self.args[index]\n   84 |   }","lines":3,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/callback_info.rs#L82-L84"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`handle_threadsafe_function_type` unwraps the result of building the `fn_args`\nstring:\n\n    let fn_args = args\n      .get(2)\n      .or_else(|| args.first())\n      .map(|(arg, _)| { ... })\n      .unwrap();\n\nIf `args` is empty (a `ThreadsafeFunction` path whose generic arguments were all\nfiltered out by `process_generic_arguments`, e.g. only lifetimes), both\n`args.get(2)` and `args.first()` are `None` and the `.unwrap()` panics, breaking\nthe build. ThreadsafeFunction signatures with unusual generic forms are exactly\nthe kind of input that reaches here.","fix":"Provide a default when no args exist, e.g. fall back to `\"arg: unknown\".to_owned()` instead of unwrapping.","locations":[{"ref":"crates/backend/src/typegen.rs:548-568","code":"  548 | fn handle_threadsafe_function_type(args: &[(String, bool)]) -> Option<(String, bool)> {\n  549 |   let handled_tsfn = match args.get(4) {\n  550 |     Some((arg, _)) => arg == \"true\",\n  551 |     _ => true,\n  552 |   };\n  553 | \n  554 |   let fn_args = args\n  555 |     .get(2)\n  556 |     .or_else(|| args.first())\n  557 |     .map(|(arg, _)| {\n  558 |       // If the argument is just a type without parameter names (e.g., \"string\"),\n  559 |       // we need to add a parameter name for function signatures\n  560 |       if arg.contains(':') || arg.is_empty() {\n  561 |         // Already has parameter names or is empty\n  562 |         arg.clone()\n  563 |       } else {\n  564 |         // Single type without parameter name, add one\n  565 |         format!(\"arg: {arg}\")\n  566 |       }\n  567 |     })\n  568 |     .unwrap();","lines":21,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen.rs#L548-L568"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`handle_type_path` calls `.unwrap()` on `args.first()` for `Result` (when it is\na return type) and for `FnArgs`:\n\n    if rust_ty == \"Result\" && is_return_ty {\n      Some(args.first().unwrap().to_owned())\n    } ...\n    } else if rust_ty == \"FnArgs\" {\n      is_passthrough_type = true;\n      Some(args.first().unwrap().to_owned())\n    }\n\n`args` comes from `process_generic_arguments`, which only collects entries for\ngeneric arguments it recognizes (Type / const-bool / etc.). A `Result` or\n`FnArgs` path whose generic argument list is empty, or contains only arguments\nthat `process_generic_arguments` filters out (e.g. only a lifetime), yields an\nempty `args`, and the `.unwrap()` panics, aborting the build with no useful\ndiagnostic. A bare `Result` (no angle brackets) hits the same path.","fix":"Replace `.unwrap()` with a graceful fallback, e.g. `args.first().cloned().unwrap_or_else(|| (\"any\".to_owned(), false))`.","locations":[{"ref":"crates/backend/src/typegen.rs:766-778","code":"  766 |     if rust_ty == \"Result\" && is_return_ty {\n  767 |       Some(args.first().unwrap().to_owned())\n  768 |     } else if rust_ty == \"Option\" {\n  769 |       handle_option_type(&args, is_struct_field, is_return_ty)\n  770 |     } else if rust_ty == \"AsyncTask\" {\n  771 |       handle_async_task_type(&args)\n  772 |     } else if rust_ty == \"Reference\" || rust_ty == \"WeakReference\" {\n  773 |       handle_reference_type(&args, rust_ty)\n  774 |     } else if rust_ty == \"AsyncBlock\" {\n  775 |       handle_async_block_type(&args, rust_ty)\n  776 |     } else if rust_ty == \"FnArgs\" {\n  777 |       is_passthrough_type = true;\n  778 |       Some(args.first().unwrap().to_owned())","lines":13,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen.rs#L766-L778"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`extract_result_ty` calls `path.segments.last().unwrap()` on an arbitrary user type path, and `args.first().unwrap()` on the angle-bracketed args of a `Result`. A path can technically be empty, and `Result<>` with zero generic args (e.g. a user type alias `type Result = ...;` used bare, or `Result` with empty `<>`) would make `args.first()` return None and panic. Proc-macro parsing of user types should bail with a span error, not unwrap.","fix":"Replace `path.segments.last().unwrap()` with a match that `bail_span!`s on an empty path, and replace `args.first().unwrap()` with a check that `bail_span!`s when `Result` has no type argument.","locations":[{"ref":"crates/macro/src/parser/mod.rs:334-359","code":"  334 | fn extract_result_ty(ty: &syn::Type) -> BindgenResult<Option<syn::Type>> {\n  335 |   match ty {\n  336 |     syn::Type::Path(syn::TypePath { qself: None, path }) => {\n  337 |       let segment = path.segments.last().unwrap();\n  338 |       if segment.ident != \"Result\" {\n  339 |         Ok(None)\n  340 |       } else {\n  341 |         match &segment.arguments {\n  342 |           syn::PathArguments::AngleBracketed(syn::AngleBracketedGenericArguments {\n  343 |             args, ..\n  344 |           }) => {\n  345 |             let ok_arg = args.first().unwrap();\n  346 |             match ok_arg {\n  347 |               syn::GenericArgument::Type(ty) => Ok(Some(ty.clone())),\n  348 |               _ => bail_span!(ok_arg, \"unsupported generic type\"),\n  349 |             }\n  350 |           }\n  351 |           _ => {\n  352 |             bail_span!(segment, \"unsupported generic type\")\n  353 |           }\n  354 |         }\n  355 |       }\n  356 |     }\n  357 |     _ => Ok(None),\n  358 |   }\n  359 | }","lines":26,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/parser/mod.rs#L334-L359"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`BigInt::from_napi_value` calls `words.set_len(word_count)` after `napi_get_value_bigint_words`,\nrelying on the second call writing exactly `word_count` words into the `Vec` reserved with\n`Vec::with_capacity(word_count)`. If the Node-API implementation writes fewer words than the\nrequested `word_count` (the API may clamp/return a different count), `set_len(word_count)` exposes\nuninitialized memory as initialized `u64`s. More directly, `get_u64`/`get_i64`/`get_i128`/`get_u128`\nindex `self.words[0]` and `self.words[1]` without bounds checks; while `from_napi_value` pushes\n`vec![0]` when `word_count == 0`, a `BigInt` constructed directly by a user with an empty `words`\nvec will panic on `self.words[0]` in `get_u64`/`get_i64`. These accessors are public API.","fix":"Use `words.get(0).copied().unwrap_or(0)` (and same for index 1) in the accessors so an empty\n`words` vec cannot panic. In `from_napi_value`, `set_len` to the count actually returned by the\nsecond call rather than assuming it equals the first `word_count`.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/bigint.rs:66-87","code":"   66 |     let mut words: Vec<u64> = Vec::with_capacity(word_count);\n   67 |     let mut sign_bit = 0;\n   68 | \n   69 |     unsafe {\n   70 |       check_status!(sys::napi_get_value_bigint_words(\n   71 |         env,\n   72 |         napi_val,\n   73 |         &mut sign_bit,\n   74 |         &mut word_count,\n   75 |         words.as_mut_ptr(),\n   76 |       ))?;\n   77 | \n   78 |       words.set_len(word_count);\n   79 |     }\n   80 |     if word_count == 0 {\n   81 |       words = vec![0];\n   82 |     }\n   83 |     Ok(BigInt {\n   84 |       sign_bit: sign_bit == 1,\n   85 |       words,\n   86 |     })\n   87 |   }","lines":22,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/bigint.rs#L66-L87"},{"ref":"crates/napi/src/bindgen_runtime/js_values/bigint.rs:95-152","code":"   95 |   pub fn get_u64(&self) -> (bool, u64, bool) {\n   96 |     (\n   97 |       self.sign_bit,\n   98 |       self.words[0],\n   99 |       !self.sign_bit && self.words.len() == 1,\n  100 |     )\n  101 |   }\n  102 | \n  103 |   /// (value, lossless)\n  104 |   /// get the first word of the BigInt as `i64` with the sign applied\n  105 |   /// return true if the value is lossless\n  106 |   /// or the value is truncated\n  107 |   pub fn get_i64(&self) -> (i64, bool) {\n  108 |     if self.sign_bit && self.words[0] == i64::MIN.unsigned_abs() {\n  109 |       return (i64::MIN, self.words.len() == 1);\n  110 |     }\n  111 |     (\n  112 |       self.words[0] as i64 * if self.sign_bit { -1 } else { 1 },\n  113 |       self.words.len() == 1 && self.words[0] as i64 >= 0,\n  114 |     )\n  115 |   }\n  116 | \n  117 |   /// (value, lossless)\n  118 |   /// get the first two words of the BigInt as `i128` with the sign applied\n  119 |   /// return true if the value is lossless\n  120 |   /// or the value is truncated\n  121 |   pub fn get_i128(&self) -> (i128, bool) {\n  122 |     let len = self.words.len();\n  123 |     if len == 1 {\n  124 |       (\n  125 |         self.words[0] as i128 * if self.sign_bit { -1 } else { 1 },\n  126 |         true,\n  127 |       )\n  128 |     } else {\n  129 |       let val = self.words[0] as u128 + ((self.words[1] as u128) << 64);\n  130 |       if self.sign_bit && val == i128::MIN.unsigned_abs() {\n  131 |         return (i128::MIN, len > 2);\n  132 |       }\n  133 |       (\n  134 |         val as i128 * if self.sign_bit { -1 } else { 1 },\n  135 |         len == 2 && self.words[1] as i64 >= 0,\n  136 |       )\n  137 |     }\n  138 |   }\n  139 | \n  140 |   /// (signed, value, lossless)\n  141 |   /// get the first two words of the BigInt as `u128`\n  142 |   /// return true if the value is lossless\n  143 |   /// or the value is truncated\n  144 |   pub fn get_u128(&self) -> (bool, u128, bool) {\n  145 |     let len = self.words.len();\n  146 |     if len == 1 {\n  147 |       (self.sign_bit, self.words[0] as u128, true)\n  148 |     } else {\n  149 |       let val = self.words[0] as u128 + ((self.words[1] as u128) << 64);\n  150 |       (self.sign_bit, val, len == 2)\n  151 |     }\n  152 |   }","lines":58,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/bigint.rs#L95-L152"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`JsTypedArrayValue`'s `AsRef`/`AsMut` impls call `is_valid_as_ref` which `panic!`s when the typedarray's runtime element type does not match the Rust slice type requested (e.g. dereferencing a JS `Float64Array` as `&[u8]`). This panic is reachable _type, self.length) }\n  321 |       }\n  322 |     }","lines":37,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/arraybuffer.rs#L286-L322"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`handle_generic_type` unwraps `split_once('<')`:\n\n    ty = alias.split_once('<').map(|(t, _)| t).unwrap();\n\nThis branch is only entered when `alias.contains('<')` is implied? No - it is\nentered whenever a type alias exists AND `!args.is_empty()`. The `.unwrap()`\nassumes the alias string contains a `<`. If a user registers a type alias\n(`#[napi]` `type` whose js_name has no `<`) and that aliased name is then used\nwith generic arguments, `split_once('<')` returns `None` and the `.unwrap()`\npanics. The surrounding comment even claims \"If alias contains '<'\", but the\nguard does not actually check that.","fix":"Guard the split: `ty = alias.split_once('<').map(|(t, _)| t).unwrap_or(alias.as_str());` (taking the whole alias when it has no generic brackets).","locations":[{"ref":"crates/backend/src/typegen.rs:644-650","code":"  644 |       .join(\", \");\n  645 |     let mut ty = rust_ty;\n  646 |     if let Some((alias, _)) = type_alias {\n  647 |       // If alias contains '<', take the base type as &str, then convert to String for formatting\n  648 |       ty = alias.split_once('<').map(|(t, _)| t).unwrap();\n  649 |       return Some((format!(\"{}<{}>\", ty, arg_str), false));\n  650 |     }","lines":7,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/backend/src/typegen.rs#L644-L650"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In the noop typedef expansion, `find_and_remove_napi_attr` indexes `m.path().segments[0]` directly. An attribute with an empty path segment list would panic. Other code in this crate (attrs.rs) uses `.segments.last()`/`.first()` with `map` to avoid this; this raw index is inconsistent and panic-prone.","fix":"Use `m.path().segments.first().map(|s| s.ident == \"napi\").unwrap_or(false)` (or `m.path().is_ident(\"napi\")`) instead of indexing `[0]`.","locations":[{"ref":"crates/macro/src/expand/noop.rs:24-27","code":"   24 |     let napi_attr = attrs\n   25 |       .iter()\n   26 |       .enumerate()\n   27 |       .find(|&(_, m)| m.path().segments[0].ident == \"napi\");","lines":4,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/macro/src/expand/noop.rs#L24-L27"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`fatal_error` is documented as taking ownership (`self`) and terminating the\nprocess, but the `#[allow(clippy::expect_fun_call)]` attribute is stale — the\nfunction body contains no `expect`/panic at all (it just calls\n`sys::napi_fatal_error`). The allow is dead/misleading and the doc comment\nimplies a panic-like behavior that the napi_fatal_error C call provides, not\nRust. Minor: the unused allow attribute should be removed.","fix":"Remove the stale `#[allow(clippy::expect_fun_call)]` attribute on `fatal_error`.","locations":[{"ref":"crates/napi/src/env.rs:777-793","code":"  777 |   #[allow(clippy::expect_fun_call)]\n  778 |   /// In the event of an unrecoverable error in a native module\n  779 |   ///\n  780 |   /// A fatal error can be thrown to immediately terminate the process.\n  781 |   pub fn fatal_error(self, location: &str, message: &str) {\n  782 |     let location_len = location.len();\n  783 |     let message_len = message.len();\n  784 | \n  785 |     unsafe {\n  786 |       sys::napi_fatal_error(\n  787 |         location.as_ptr().cast(),\n  788 |         location_len as isize,\n  789 |         message.as_ptr().cast(),\n  790 |         message_len as isize,\n  791 |       )\n  792 |     }\n  793 |   }","lines":17,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L777-L793"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`set_instance_finalize_callback` calls `value.object.unwrap()` on the\n`TaggedObject`'s `Option<T>`. If the object was somehow already taken (None),\nthis panics inside an N-API finalizer callback, which runs during GC/teardown\nwhere unwinding across the FFI boundary is undefined behavior.","fix":"Handle the None case gracefully (skip the callback or log) instead of unwrap inside the extern \"C\" finalizer.","locations":[{"ref":"crates/napi/src/env.rs:1540-1547","code":" 1540 |   let (value, callback) = unsafe { *Box::from_raw(finalize_data as *mut (TaggedObject<T>, F)) };\n 1541 |   let hint = unsafe { *Box::from_raw(finalize_hint as *mut Hint) };\n 1542 |   let env = Env::from_raw(raw_env);\n 1543 |   callback(FinalizeContext {\n 1544 |     value: value.object.unwrap(),\n 1545 |     hint,\n 1546 |     env,\n 1547 |   });","lines":8,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L1540-L1547"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"`generator_next`/`generator_return`/`generator_throw` and the async equivalents reconstruct the user generator via `Box::leak(Box::from_raw(generator_ptr as *mut T))`. `Box::from_raw` followed by `Box::leak` is sound only because the pointer is never actually freed here, but the same `generator_ptr` is the wrapped instance data; if the underlying instance was already finalized/dropped (GC of the class instance before the iterator function is invoked), `generator_ptr` dangles and `Box::from_raw` produces a reference to freed memory. For the sync iterator there is no reference keeping the instance alive (only the async path adds an `[[InstanceRef]]`), so a sync generator whose owning instance is collected mid-iteration is a use-after-free.","fix":"Mirror the async iterator fix (issue #3119): attach a strong reference to the instance on the iterator/generator object (or on the functions' data) so the wrapped Rust value cannot be finalized while iteration is in progress.","locations":[{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:413-413","code":"  413 |     let g = unsafe { Box::leak(Box::from_raw(generator_ptr as *mut T)) };","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L413"},{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:484-484","code":"  484 |   let g = unsafe { Box::leak(Box::from_raw(generator_ptr as *mut T)) };","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L484"},{"ref":"crates/napi/src/bindgen_runtime/iterator.rs:574-574","code":"  574 |   let g = unsafe { Box::leak(Box::from_raw(generator_ptr as *mut T)) };","lines":1,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/iterator.rs#L574"}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"`ClassInstance::from_napi_value` does `Box::from_raw(value as *mut T)` then `Box::leak`. `value`\ncomes from `napi_unwrap`, which returns the pointer that was passed to `napi_wrap` (in\n`class.rs::new_instance` that is `wrapped_value`). Reconstructing a `Box<T>` from a `napi_unwrap`\npointer and leaking it is only sound if that pointer was originally a `Box<T>` allocation of exactly\n`T` -- but `new_instance` wraps `wrapped_value` whose provenance/layout is defined elsewhere, and the\nsame underlying object is ALSO referenced by `Reference<T>` (via `REFERENCE_MAP`) which separately\ntakes ownership through `Box::from_raw(self.raw)` in `Deref`/`share_with`. Two independent\n`Box::from_raw` reconstructions of the same pointer (here and in `value_ref.rs`) create aliasing\n`Box`es over one allocation; when either drop path runs (GC finalizer `raw_finalize_unchecked`,\n`Reference::drop`, or a leaked Box that is later actually dropped) the allocation can be freed while\nthe other still holds a pointer -> use-after-free / double-free risk.","fix":"Do not reconstruct/leak a `Box` to obtain a reference; use `&mut *(value as *mut T)` to form a\nborrow without claiming ownership, and centralize ownership in exactly one place (the GC finalizer).\nAudit all `Box::from_raw`/`Box::leak` pairs over `napi_unwrap` pointers to ensure single ownership.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values/class.rs:195-211","code":"  195 | impl<'env, T: 'env> FromNapiValue for ClassInstance<'env, T> {\n  196 |   unsafe fn from_napi_value(env: sys::napi_env, napi_val: sys::napi_value) -> crate::Result<Self> {\n  197 |     let mut value = ptr::null_mut();\n  198 |     check_status!(\n  199 |       unsafe { sys::napi_unwrap(env, napi_val, &mut value) },\n  200 |       \"Unwrap value [{}] from class failed\",\n  201 |       type_name::<T>(),\n  202 |     )?;\n  203 |     let value = unsafe { Box::from_raw(value as *mut T) };\n  204 |     Ok(Self {\n  205 |       value: napi_val,\n  206 |       inner: Box::leak(value),\n  207 |       env,\n  208 |       _phantom: &PhantomData,\n  209 |     })\n  210 |   }\n  211 | }","lines":17,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/class.rs#L195-L211"},{"ref":"crates/napi/src/bindgen_runtime/js_values/value_ref.rs:166-193","code":"  166 |     let s = f(Box::leak(unsafe { Box::from_raw(self.raw) }))?;\n  167 |     let s_ptr = Box::into_raw(Box::new(s));\n  168 |     let prev_drop_fn = unsafe { Box::from_raw(self.finalize_callbacks.get()) };\n  169 |     let drop_fn = Box::new(move || {\n  170 |       drop(unsafe { Box::from_raw(s_ptr) });\n  171 |       prev_drop_fn();\n  172 |     });\n  173 |     self.finalize_callbacks.set(Box::into_raw(drop_fn));\n  174 |     Ok(SharedReference {\n  175 |       raw: s_ptr,\n  176 |       owner: self,\n  177 |     })\n  178 |   }\n  179 | }\n  180 | \n  181 | impl<T: 'static> Deref for Reference<T> {\n  182 |   type Target = T;\n  183 | \n  184 |   fn deref(&self) -> &Self::Target {\n  185 |     unsafe { Box::leak(Box::from_raw(self.raw)) }\n  186 |   }\n  187 | }\n  188 | \n  189 | impl<T: 'static> DerefMut for Reference<T> {\n  190 |   fn deref_mut(&mut self) -> &mut Self::Target {\n  191 |     unsafe { Box::leak(Box::from_raw(self.raw)) }\n  192 |   }\n  193 | }","lines":28,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values/value_ref.rs#L166-L193"}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"`get_last_error_info` does `ptr::read(raw_extended_error)` to copy the\n`napi_extended_error_info` out of N-API, then runs the `TryFrom` conversion\n(which calls `CStr::from_ptr(value.error_message)`). The `error_message` field\nis a borrowed pointer owned by N-API whose contents, per the N-API contract and\nthe doc comment right above this method (\"only valid up until an n-api function\nis called on the same env\"), may be invalidated by any subsequent N-API call.\nMore importantly `ptr::read` makes a bitwise copy of the struct including the\nraw `error_message`/`engine_reserved` pointers; the struct itself is never\nowned by Rust so this is benign, but the resulting `ExtendedErrorInfo` then\ndereferences `error_message` which is only guaranteed valid transiently. It is\neasy for callers to hold the returned struct and read a dangling string.","fix":"Document that the string must be copied immediately (it already is copied to an owned String in TryFrom, which is fine) but ensure no N-API call happens between napi_get_last_error_info and the CStr read; currently the read happens inside try_into() with no intervening calls, so the real risk is the engine_reserved/engine_error_code pointer being exposed. Consider not exposing the raw engine_reserved pointer in the public struct.","locations":[{"ref":"crates/napi/src/env.rs:710-714","code":"  710 |   pub fn get_last_error_info(&self) -> Result<ExtendedErrorInfo> {\n  711 |     let mut raw_extended_error = ptr::null();\n  712 |     check_status!(unsafe { sys::napi_get_last_error_info(self.0, &mut raw_extended_error) })?;\n  713 |     unsafe { ptr::read(raw_extended_error) }.try_into()\n  714 |   }","lines":5,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/env.rs#L710-L714"},{"ref":"crates/napi/src/error.rs:322-342","code":"  322 | impl TryFrom<sys::napi_extended_error_info> for ExtendedErrorInfo {\n  323 |   type Error = Error;\n  324 | \n  325 |   fn try_from(value: sys::napi_extended_error_info) -> Result<Self> {\n  326 |     Ok(Self {\n  327 |       message: if value.error_message.is_null() {\n  328 |         String::new()\n  329 |       } else {\n  330 |         unsafe {\n  331 |           CStr::from_ptr(value.error_message.cast())\n  332 |             .to_str()\n  333 |             .map_err(|e| Error::new(Status::GenericFailure, format!(\"{e}\")))?\n  334 |             .to_owned()\n  335 |         }\n  336 |       },\n  337 |       engine_error_code: value.engine_error_code,\n  338 |       engine_reserved: value.engine_reserved,\n  339 |       error_code: Status::from(value.error_code),\n  340 |     })\n  341 |   }\n  342 | }","lines":21,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/error.rs#L322-L342"}]},{"id":"UAF_4","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"`into_utf16` allocates `result` of length `len` (= utf16_len + 1), captures `buf_ptr` from it, then moves `result` into the `_inner_buf` field while `buf` is built via `slice::from_raw_parts(buf_ptr, len)`. Unlike `into_utf8`/`into_latin1` which `mem::forget` the Vec and rebuild it, here the same Vec is both kept alive in `_inner_buf` AND aliased by the raw `buf` slice pointing at its data via `buf_ptr`. The pointer is captured before the move; a Vec move does not reallocate so it currently happens to stay valid, but this is fragile aliasing of an owned Vec's buffer through a separate raw slice (mutable owner + shared raw slice to same allocation). It is undefined-behavior-adjacent and differs from the documented pattern used by the other two conversions.","fix":"Build the `buf` slice from `_inner_buf.as_ptr()` after the move (i.e. `self._inner_buf` once stored), or store only the Vec and expose `buf` as a method returning `_inner_buf.as_slice()`. Do not keep a raw `from_raw_parts` slice aliasing a Vec you also retain ownership of.","locations":[{"ref":"crates/napi/src/js_values/string/mod.rs:120-140","code":"  120 |   pub fn into_utf16(self) -> Result<JsStringUtf16<'env>> {\n  121 |     let mut written_char_count = 0usize;\n  122 |     let len = self.utf16_len()? + 1;\n  123 |     let mut result = vec![0; len];\n  124 |     let buf_ptr = result.as_mut_ptr();\n  125 |     check_status!(unsafe {\n  126 |       sys::napi_get_value_string_utf16(\n  127 |         self.0.env,\n  128 |         self.0.value,\n  129 |         buf_ptr,\n  130 |         len,\n  131 |         &mut written_char_count,\n  132 |       )\n  133 |     })?;\n  134 | \n  135 |     Ok(JsStringUtf16 {\n  136 |       inner: self,\n  137 |       buf: unsafe { std::slice::from_raw_parts(buf_ptr.cast(), len) },\n  138 |       _inner_buf: result,\n  139 |     })\n  140 |   }","lines":21,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/string/mod.rs#L120-L140"}]},{"id":"UAF_5","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"`Array::f es)` so the Vec backing store leaks intentionally to keep the pointer array alive for the finalizer. But `napi_add_finalizer` is passed `closures.as_mut_ptr()` as finalize_data and a hint Box of `(len, capacity)`. If the subsequent `napi_define_properties` call fails (returns via `?`), the finalizer registered on `self` may still run later and free the closures, but the leaked `closures` Vec backing array itself is reconstructed in the finalizer - however on the error path the `Property::raw()` for each property already `Box::into_raw`'d a `PropertyClosures` copy that is now only reachable through the closures array; double bookkeeping between `object_property.rs::raw()` allocating a `Box<PropertyClosures>` and this code collecting `p.data` makes the ownership/free path unclear and error-prone.","fix":"Audit the closure-ownership contract: `Property::raw()` boxes a `PropertyClosures` and returns its pointer as `data`; `define_properties` then collects those `data` pointers and registers `finalize_closures`. Ensure exactly one finalizer owns/frees each boxed `PropertyClosures`, and that the early-return on a failed `napi_define_properties` does not leak the boxed closures (they are already forgotten). Add a test for the define-properties failure path.","locations":[{"ref":"crates/napi/src/js_values/mod.rs:612-646","code":"  612 |       pub fn define_properties(&mut self, properties: &[Property]) -> Result<()> {\n  613 |         let properties_iter = properties.iter().map(|property| property.raw());\n  614 |         #[cfg(feature = \"napi5\")]\n  615 |         {\n  616 |           let mut closures = properties_iter\n  617 |             .clone()\n  618 |             .map(|p| p.data)\n  619 |             .filter(|data| !data.is_null())\n  620 |             .collect::<Vec<*mut std::ffi::c_void>>();\n  621 |           if !closures.is_empty() {\n  622 |             let finalize_hint = Box::into_raw(Box::new((closures.len(), closures.capacity())));\n  623 |             chec |       #[cfg(not(feature = \"napi5\"))]\n  191 |       data: ptr::null_mut(),\n  192 |       #[cfg(feature = \"napi5\")]\n  193 |       data,\n  194 |     }\n  195 |   }","lines":27,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/js_values/object_property.rs#L169-L195"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"`Result<T> as ToNapiValue` computes `error_code` via `String::to_napi_value(env, format!(\"{:?}\", e.status))` but never NUL/length concerns aside, the created `error_code` and `reason` napi strings plus the error object are fine; however the original `Result::Err` branch drops `e` (consuming `e.reason.clone()` rather than moving) — `clone()` allocates a throwaway `String` on every error conversion path even though `e` is owned and could be moved. Minor avoidable allocation on the error path.","fix":"Move `e.reason` instead of cloning (`String::to_napi_value(env, e.reason)`), since `e` is owned by value here.","locations":[{"ref":"crates/napi/src/bindgen_runtime/js_values.rs:269-279","code":"  269 |       Err(e) => {\n  270 |         let error_code = unsafe { String::to_napi_value(env, format!(\"{:?}\", e.status))? };\n  271 |         let reason = unsafe { String::to_napi_value(env, e.reason.clone())? };\n  272 |         let mut error = ptr::null_mut();\n  273 |         check_status!(\n  274 |           unsafe { sys::napi_create_error(env, error_code, reason, &mut error) },\n  275 |           \"Failed to create napi error\"\n  276 |         )?;\n  277 | \n  278 |         Ok(error)\n  279 |       }","lines":11,"link":"https://github.com/napi-rs/napi-rs/blob/ee58383da4d91950e95355dcd8b93885f78f20e5/crates/napi/src/bindgen_runtime/js_values.rs#L269-L279"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`deserialize_any` casts `js_number as i64` for any double it
