self.create_date = data.strings().get(0).cloned(),\n  138 |           (ExifTag::ModifyDate, Value::Ascii(data)) => self.modify_date = data.strings().get(0).cloned(),\n  139 |           (ExifTag::ExposureProgram, Value::Short(data)) => self.exposure_program = data.get(0).cloned(),\n  140 |           (ExifTag::TimeZoneOffset, Value::SShort(data)) => self.timezone_offset = Some(data.clone()),\n  141 |           (ExifTag::OffsetTime, Value::Ascii(data)) => self.offset_time = data.strings().get(0).cloned(),\n  142 |           (ExifTag::OffsetTimeOriginal, Value::Ascii(data)) => self.offset_time_original = data.strings().get(0).cloned(),\n  143 |           (ExifTag::OffsetTimeDigitized, Value::Ascii(data)) => self.offset_time_digitized = data.strings().get(0).cloned(),\n  144 |           (ExifTag::SubSecTime, Value::Ascii(data)) => self.sub_sec_time = data.strings().get(0).cloned(),\n  145 |           (ExifTag::SubSecTimeOriginal, Value::Ascii(data)) => self.sub_sec_time_original = data.strings().get(0).cloned(),\n  146 |           (ExifTag::SubSecTimeDigitized, Value::Ascii(data)) => self.sub_sec_time_digitized = data.strings().get(0).cloned(),\n  147 |           (ExifTag::ShutterSpeedValue, Value::SRational(data)) => self.shutter_speed_value = data.get(0).cloned(),\n  148 |           (ExifTag::MaxApertureValue, Value::Rational(data)) => self.max_aperture_value = data.get(0).cloned(),\n  149 |           (ExifTag::SubjectDistance, Value::Rational(data)) => self.subject_distance = data.get(0).cloned(),\n  150 |           (ExifTag::MeteringMode, Value::Short(data)) => self.metering_mode = data.get(0).cloned(),\n  151 |           (ExifTag::LightSource, Value::Short(data)) => self.light_source = data.get(0).cloned(),\n  152 |           (ExifTag::Flash, Value::Short(data)) => self.flash = data.get(0).cloned(),\n  153 |           (ExifTag::FocalLength, Value::Rational(data)) => self.focal_length = data.get(0).cloned(),\n  154 |           (ExifTag::ImageNumber, Value::Long(data)) => self.image_number = data.get(0).cloned(),\n  155 |           (ExifTag::ColorSpace, Value::Short(data)) => self.color_space = data.get(0).cloned(),\n  156 |           (ExifTag::FlashEnergy, Value::Rational(data)) => self.flash_energy = data.get(0).cloned(),\n  157 |           (ExifTag::ExposureMode, Value::Short(data)) => self.exposure_mode = data.get(0).cloned(),\n  158 |           (ExifTag::WhiteBalance, Value::Short(data)) => self.white_balance = data.get(0).cloned(),\n  159 |           (ExifTag::SceneCaptureType, Value::Short(data)) => self.scene_capture_type = data.get(0).cloned(),\n  160 |           (ExifTag::SubjectDistanceRange, Value::Short(data)) => self.subject_distance_range = data.get(0).cloned(),\n  161 |           (ExifTag::OwnerName, Value::Ascii(data)) => self.owner_name = data.strings().get(0).map(trim),\n  162 |           (ExifTag::SerialNumber, Value::Ascii(data)) => self.serial_number = data.strings().get(0).map(trim),\n  163 |           (ExifTag::LensSerialNumber, Value::Ascii(data)) => self.lens_serial_number = data.strings().get(0).map(trim),\n  164 |           (ExifTag::UserComment, Value::Ascii(data)) => self.user_comment = data.strings().get(0).map(trim),\n  165 |           //(ExifTag::MakerNotes, Value::Undefined(data)) => self.makernotes = Some(data.clone()),\n  166 |           (tag, _value) => {\n  167 |             log::debug!(\"Ignoring EXIF tag: {:?}\", tag);\n  168 |           }\n  169 |         }\n  170 |       }\n  171 |     }\n  172 |     Ok(())","lines":55}]},{"id":"LOGIC_91","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Exif::extend_from_ifd() silently discards EXIF tags whose value type does not match the expected variant. For example, if ISOSpeedRatings arrives as Value::Long instead of Value::Short, it is silently dropped and logged only at debug level. This can lead to missing metadata with no user-visible warning.","fix":"Upgrade the log level to warn for unexpected tag types, or attempt a type coercion before discarding.","locations":[{"ref":"rawler/src/exif.rs:166-169","code":"  166 |           (tag, _value) => {\n  167 |             log::debug!(\"Ignoring EXIF tag: {:?}\", tag);\n  168 |           }\n  169 |         }","lines":4}]},{"id":"LOGIC_92","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"mdhd.rs always stores the language field as the literal string \"FIXME\" (line 48), ignoring the parsed language_code. Any consumer of MdhdBox::language will receive wrong data.","fix":"Implement language_string() to decode the packed 15-bit ISO-639-2/T code and use it.","locations":[{"ref":"rawler/src/formats/bmff/mdhd.rs:46-48","code":"   46 |     let _language_code = reader.read_u16::<BigEndian>()?;\n   47 |     //let language = language_string(language_code); // TODO\n   48 |     let language = String::from(\"FIXME\");","lines":3}]},{"id":"LOGIC_93","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"bmff/mod.rs Bmff::compatible_brand() always returns true regardless of the brand string, with a FIXME comment. Code that relies on this check for format detection will incorrectly accept all BMFF files.","fix":"Implement proper brand checking against self.filebox.ftyp.compatible_brands.","locations":[{"ref":"rawler/src/formats/bmff/mod.rs:324-327","code":"  324 |   pub fn compatible_brand(&self, _brand: &str) -> bool {\n  325 |     true // FIXME\n  326 |   }\n  327 | }","lines":4}]},{"id":"LOGIC_94","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"stsc.rs first_sample calculation for subsequent entries (line 65) uses (entry.first_chunk - holdback.first_sample) * holdback.samples_per_chunk. The formula should use holdback.first_chunk, not holdback.first_sample. The number of chunks in the holdback run is (entry.first_chunk - holdback.first_chunk), so the correct formula is: holdback.first_sample + (entry.first_chunk - holdback.first_chunk) * holdback.samples_per_chunk.","fix":"Change (entry.first_chunk - holdback.first_sample) to (entry.first_chunk - holdback.first_chunk).","locations":[{"ref":"rawler/src/formats/bmff/stsc.rs:65","code":"   65 |         entry.first_sample = holdback.first_sample + ((entry.first_chunk - holdback.first_sample) * holdback.samples_per_chunk);","lines":1}]},{"id":"LOGIC_95","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ciff/mod.rs CiffIFD::new_file() calls file.as_vec() to load the entire file into memory. For very large CR2 files this is wasteful and may OOM. The rest of the CIFF parser then indexes into this Vec by raw offsets, which is fine for correctness but not for memory.","fix":"Consider streaming or memory-mapping instead, consistent with how RawSource is used elsewhere.","locations":[{"ref":"rawler/src/formats/ciff/mod.rs:50","code":"   50 |     let data = file.as_vec().map_err(|err| format!(\"Failed to read whole file: {:?}\", err))?;","lines":1}]},{"id":"LOGIC_96","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"jfif.rs Unknown segment handler subtracts 2 from len when seeking (line 246: SeekFrom::Current(len as i64 - 2)). The JFIF segment length field includes the two length bytes themselves, so subtracting 2 is correct. But if len < 2 (malformed file) the cast to i64 produces a large negative, seeking backward and potentially looping forever.","fix":"Check len >= 2 before computing the seek offset.","locations":[{"ref":"rawler/src/formats/jfif.rs:246","code":"  246 |           reader.seek(SeekFrom::Current(len as i64 - 2))?;","lines":1}]},{"id":"LOGIC_97","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ifd.rs extend_sub_ifds() calls new_root_with_correction() for each sub-IFD offset (line 298). This re-reads the TIFF header (byte-order marker and magic) at the given offset, which is wrong: sub-IFDs do not have their own TIFF header. IFD::new() should be called instead.","fix":"Replace new_root_with_correction() with IFD::new() so sub-IFDs are parsed without expecting a TIFF header.","locations":[{"ref":"rawler/src/formats/tiff/ifd.rs:297-300","code":"  297 |           for off in offsets {\n  298 |             let ifd = Self::new_root_with_correction(reader, *off, self.base, self.corr, 10, &[])?;\n  299 |             subs.push(ifd);\n  300 |           }","lines":4}]},{"id":"LOGIC_98","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ifd.rs tile_data() does not apply self.base to the tile offsets (line 568: rawsource.subview(*offset as u64, ...)). strip_data() (line 541) correctly adds self.base. The missing base addition means tile data is read from the wrong file offset when base != 0.","fix":"Change *offset as u64 to (self.base + *offset) as u64 to match strip_data().","locations":[{"ref":"rawler/src/formats/tiff/ifd.rs:567-569","code":"  567 |     offsets.iter().zip(byte_counts.iter()).for_each(|(offset, size)| {\n  568 |       tile_slices.push(rawsource.subview(*offset as u64, *size as u64).map_err(TiffError::Io));\n  569 |     });","lines":3}]},{"id":"LOGIC_99","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"reader.rs GenericTiffReader::is_tiff() checks only the first byte (buffer[0] == 0x49 || buffer[0] == 0x4d) and the comment says TODO. A file starting with 'I' or 'M' but not being a TIFF would pass this check. The second byte and magic number are not validated.","fix":"Check at least the first two bytes (0x4949 or 0x4d4d) and ideally the magic word 42.","locations":[{"ref":"rawler/src/formats/tiff/reader.rs:207-210","code":"  207 |   pub fn is_tiff<T: AsRef<[u8]>>(buffer: T) -> bool {\n  208 |     let buffer = buffer.as_ref();\n  209 |     buffer[0] == 0x49 || buffer[0] == 0x4d // TODO\n  210 |   }","lines":4}]},{"id":"LOGIC_100","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"value.rs TiffAscii::count() returns the sum of string lengths plus one NUL per string. But TiffAscii::byte_size() (called from Value::byte_size()) uses this count as the stored byte length. If the raw data was stored in plain (the field set by new_from_raw), the plain field length can differ from count(), making byte_size() inaccurate for the purpose of deciding whether data fits inline in a TIFF IFD entry.","fix":"Ensure count() always reflects the actual wire-format byte count, or store it explicitly.","locations":[{"ref":"rawler/src/formats/tiff/value.rs:1030-1032","code":" 1030 |   pub fn count(&self) -> usize {\n 1031 |     self.strings.iter().map(|s| s.len() + 1).sum::<usize>()\n 1032 |   }","lines":3},{"ref":"rawler/src/formats/tiff/value.rs:822","code":"  822 |       Self::Ascii(v) => v.count(),","lines":1}]},{"id":"LOGIC_101","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"value.rs TiffAscii::new_from_raw() has a commented-out multi-string loop (lines 1048-1053). It only parses the first null-terminated string, silently discarding any subsequent strings in the raw bytes. The TODO comment acknowledges this.","fix":"Implement proper multi-string parsing by looping until the end of the raw slice.","locations":[{"ref":"rawler/src/formats/tiff/value.rs:1047-1053","code":" 1047 |     // TODO: fixme multiple strings\n 1048 |     //while nul_range_end < raw.len() {\n 1049 |     nul_range_end = raw[nul_range_end..].iter().position(|&c| c == b'\\0').unwrap_or(raw.len()); // default to length if no `\\0` present\n 1050 |     let s = ::std::str::from_utf8(&raw[0..nul_range_end]).unwrap_or(\"!!!INVALID UTF8!!!\");\n 1051 |     strings.push(String::from(s));\n 1052 |     //nul_range_end += 1;\n 1053 |     // }","lines":7}]},{"id":"LOGIC_102","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In clip() in imgop/mod.rs the NaN check is placed after the p > max and p < min guards. Because NaN comparisons always return false, a NaN value falls through all guards and reaches the final else branch, returning the NaN unchanged instead of the intended min. The #[allow(clippy::if_same_then_else)] attribute is a sign the author noticed something odd here.","fix":"Move the NaN check before the other comparisons, or use f32::clamp() with explicit NaN handling.","locations":[{"ref":"rawler/src/imgop/mod.rs:67-78","code":"   67 | #[allow(clippy::if_same_then_else)]\n   68 | pub fn clip(p: f32, min: f32, max: f32) -> f32 {\n   69 |   if p > max {\n   70 |     max\n   71 |   } else if p < min {\n   72 |     min\n   73 |   } else if p.is_nan() {\n   74 |     min\n   75 |   } else {\n   76 |     p\n   77 |   }\n   78 | }","lines":12}]},{"id":"LOGIC_103","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"scale_double_to_u16() and scale_double_to_u8() use x.abs() before scaling, silently treating negative f32 values as positive. Negative pixel values should probably be clamped to zero or flagged as an error, not reflected into the positive range.","fix":"Clamp x to 0.0 before scaling, or add an assertion that x >= 0.0.","locations":[{"ref":"rawler/src/imgop/mod.rs:237-247","code":"  237 | pub fn scale_double_to_u16(x: f32) -> u16 {\n  238 |   (x.abs() * u16::MAX as f32) as u16\n  239 | }\n  240 | \n  241 | pub fn scale_u8_to_double(x: u8) -> f32 {\n  242 |   x as f32 / u8::MAX as f32\n  243 | }\n  244 | \n  245 | pub fn scale_double_to_u8(x: f32) -> u8 {\n  246 |   (x.abs() * u8::MAX as f32) as u8\n  247 | }","lines":11}]},{"id":"LOGIC_104","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In convert_to_f32_scaled(), when black != T::default(), each pixel is computed as `(x - black) / (white - black)`. If any pixel value x is less than black the subtraction wraps around (or panics in debug mode) for unsigned integer types that do not implement saturating subtraction.","fix":"Use saturating_sub or clamp the pixel value to black before subtracting to avoid unsigned underflow.","locations":[{"ref":"rawler/src/imgop/mod.rs:293-300","code":"  293 |     pix\n  294 |       .iter()\n  295 |       .copied()\n  296 |       .map(|x| x - black)\n  297 |       .map(f32::from)\n  298 |       .map(|x| x / f32::from(white - black))\n  299 |       .collect()\n  300 |   }","lines":8}]},{"id":"LOGIC_105","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"correct_blacklevel_cfa() uses par_chunks_exact_mut(width * 2), which silently discards the last row if the image height is odd. The old commented-out assertions for even width/height were removed without being replaced by proper handling.","fix":"Handle the remainder row (the case where height is odd) explicitly, or re-add the assertion and document the constraint.","locations":[{"ref":"rawler/src/imgop/raw.rs:161-186","code":"  161 | pub fn correct_blacklevel_cfa(raw: &mut [f32], width: usize, _height: usize, blacklevel: &[f32; 4], whitelevel: &[f32; 4]) {\n  162 |   //assert_eq!(width % 2, 0, \"width is {}\", width);\n  163 |   //assert_eq!(height % 2, 0, \"height is {}\", height);\n  164 |   // max value can be pre-computed for all channels.\n  165 |   let max = [\n  166 |     whitelevel[0] - blacklevel[0],\n  167 |     whitelevel[1] - blacklevel[1],\n  168 |     whitelevel[2] - blacklevel[2],\n  169 |     whitelevel[3] - blacklevel[3],\n  170 |   ];\n  171 |   let clip = |v: f32| {\n  172 |     if v.is_sign_negative() { 0.0 } else { v }\n  173 |   };\n  174 |   // Process two bayer lines at once.\n  175 |   raw.par_chunks_exact_mut(width * 2).for_each(|lines| {\n  176 |     // It's bayer data, so we have two lines for sure.\n  177 |     let (line0, line1) = lines.split_at_mut(width);\n  178 |     //line0.array_chunks_mut::<2>().zip(line1.array_chunks_mut::<2>()).for_each(|(a, b)| {\n  179 |     line0.chunks_exact_mut(2).zip(line1.chunks_exact_mut(2)).for_each(|(a, b)| {\n  180 |       a[0] = clip(a[0] - blacklevel[0]) / max[0];\n  181 |       a[1] = clip(a[1] - blacklevel[1]) / max[1];\n  182 |       b[0] = clip(b[0] - blacklevel[2]) / max[2];\n  183 |       b[1] = clip(b[1] - blacklevel[3]) / max[3];\n  184 |     });\n  185 |   });\n  186 | }","lines":26}]},{"id":"LOGIC_106","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the Bilinear4Channel demosaic (bayer/bilinear.rs), corner and border pixels are set by directly writing specific CFA channel values (e.g. ch(0,1), ch(1,0)) into the pixel at (0,0). When multiple CFA positions map to the same channel index, some channels are written twice (the second write wins) and others remain zero. This gives incorrect results for CFA patterns where the 2x2 neighbourhood around a corner holds two pixels of the same color.","fix":"Accumulate and average neighbor values per channel for border/corner pixels rather than blindly copying individual sample positions.","locations":[{"ref":"rawler/src/imgop/sensor/bayer/bilinear.rs:46-64","code":"   46 |     out.at_mut(0, 0)[ch(0, 0)] = *pixels.at(0, 0);\n   47 |     out.at_mut(0, 0)[ch(0, 1)] = *pixels.at(0, 1);\n   48 |     out.at_mut(0, 0)[ch(1, 0)] = *pixels.at(1, 0);\n   49 |     out.at_mut(0, 0)[ch(1, 1)] = *pixels.at(1, 1);\n   50 | \n   51 |     out.at_mut(0, dim.w - 1)[ch(0, dim.w - 1)] = *pixels.at(0, dim.w - 1);\n   52 |     out.at_mut(0, dim.w - 1)[ch(0, dim.w - 2)] = *pixels.at(0, dim.w - 2);\n   53 |     out.at_mut(0, dim.w - 1)[ch(1, dim.w - 1)] = *pixels.at(1, dim.w - 1);\n   54 |     out.at_mut(0, dim.w - 1)[ch(1, dim.w - 2)] = *pixels.at(1, dim.w - 2);\n   55 | \n   56 |     out.at_mut(dim.h - 1, 0)[ch(dim.h - 1, 0)] = *pixels.at(dim.h - 1, 0);\n   57 |     out.at_mut(dim.h - 1, 0)[ch(dim.h - 1, 1)] = *pixels.at(dim.h - 1, 1);\n   58 |     out.at_mut(dim.h - 1, 0)[ch(dim.h - 2, 0)] = *pixels.at(dim.h - 2, 0);\n   59 |     out.at_mut(dim.h - 1, 0)[ch(dim.h - 2, 1)] = *pixels.at(dim.h - 2, 1);\n   60 | \n   61 |     out.at_mut(dim.h - 1, dim.w - 1)[ch(dim.h - 1, dim.w - 1)] = *pixels.at(dim.h - 1, dim.w - 1);\n   62 |     out.at_mut(dim.h - 1, dim.w - 1)[ch(dim.h - 1, dim.w - 2)] = *pixels.at(dim.h - 1, dim.w - 2);\n   63 |     out.at_mut(dim.h - 1, dim.w - 1)[ch(dim.h - 2, dim.w - 1)] = *pixels.at(dim.h - 2, dim.w - 1);\n   64 |     out.at_mut(dim.h - 1, dim.w - 1)[ch(dim.h - 2, dim.w - 2)] = *pixels.at(dim.h - 2, dim.w - 2);","lines":19}]},{"id":"LOGIC_107","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"LensResolver::resolve() logs a warning and optionally panics when no lens is found, but the Display impl for LensResolver has a format bug: the 'Make' field is printed with an unclosed single-quote: \"Make: '{\"  (missing the closing ' after the value). The closing quote is forgotten.","fix":"Change the format string to \"Make: '{}'\", name\".","locations":[{"ref":"rawler/src/lens.rs:280-281","code":"  280 |       s.push(format!(\"Make: '{}\", name));\n  281 |     }","lines":2}]},{"id":"LOGIC_108","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Pix2D::new_uninit creates a Vec with only capacity reserved but no elements (len == 0), then sets initialized = false. However all methods that access data use debug_assert!(self.initialized) as the guard. In release builds, calling pixels(), row(), at() etc. on an uninit Pix2D will not panic but will instead index into the empty Vec, causing real out-of-bounds panics. The 'initialized' flag provides safety only in debug builds.","fix":"Either document that all data-access methods have a precondition of initialized == true and enforce it in release builds too, or use MaybeUninit.","locations":[{"ref":"rawler/src/pixarray.rs:76-84","code":"   76 |   pub fn new_uninit(width: usize, height: usize) -> Self {\n   77 |     let data = Vec::with_capacity(width * height);\n   78 |     Self {\n   79 |       data,\n   80 |       width,\n   81 |       height,\n   82 |       initialized: false,\n   83 |     }\n   84 |   }","lines":9}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"`decompress_10le_lsb16` reports the wrong function name in its error message. The error\nstring says `\"decompress_10be(): buffer too short\"` but the enclosing function is\n`decompress_10le_lsb16`. This makes diagnosing buffer-overrun errors misleading.","fix":"Change the error string to `\"decompress_10le_lsb16(): buffer too short\"`.","locations":[{"ref":"rawler/src/decompressors/packed.rs:386","code":"  386 |     return Err(format!(\"decompress_10be(): buffer too short ({} < {})\", buf.len(), need));","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In cr3.rs Ctmd::get_as_tiff(), when a record or block is not found the function emits a warn!() at line 689 and returns Ok(None). In read_cr3_metadata(), the callers at lines 541-574 silently accept None for mandatory records like record 8 (COLORDATA). If the CTMD is present but record 8 is missing, WB/blacklevel/whitelevel all remain None and the image decodes with fallback values without any user-visible error.","fix":"Distinguish between 'record not present at all' and 'record present but block missing'. Only warn when the record exists but the expected block is absent.","locations":[{"ref":"rawler/src/decoders/cr3.rs:685-691","code":"  685 |   pub fn get_as_tiff(&self, record: u16, tag: u16) -> Result<Option<GenericTiffReader>> {\n  686 |     if let Some(block) = self.records.get(&record).and_then(|rec| rec.blocks.get(&tag)) {\n  687 |       Ok(Some(GenericTiffReader::new_with_buffer(block, 0, 0, Some(0))?))\n  688 |     } else {\n  689 |       warn!(\"Unable to find CTMD record {}, tag 0x{:X}\", record, tag);\n  690 |       Ok(None)\n  691 |     }","lines":7},{"ref":"rawler/src/decoders/cr3.rs:547-570","code":"  547 |       if let Some(rec8) = ctmd.get_as_tiff(8, CR3_CTMD_BLOCK_MAKERNOTES)? {\n  548 |         if let Some(colordata) = rec8.get_entry(Cr3MakernoteTag::ColorData) {\n  549 |           let colordata = cr2::parse_colordata(colordata)?;\n  550 |           //rec8.root_ifd().dump::<TiffCommonTag>(10).iter().for_each(|line| eprintln!(\"MKD: {}\", line));\n  551 |           md.wb = Some(normalize_wb(colordata.wb));\n  552 |           md.blacklevels = colordata.blacklevel;\n  553 |           md.whitelevel = colordata.specular_whitelevel;\n  554 |           /*\n  555 |           if let crate::formats::tiff::Value::Short(v) = &levels.value {\n  556 |             if let Some(offset) = self.camera.param_usize(\"colordata_wbcoeffs\") {\n  557 |               let raw_wb = [v[offset] as f32, v[offset + 1] as f32, v[offset + 2] as f32, v[offset + 3] as f32];\n  558 |               md.wb = Some(normalize_wb(raw_wb));\n  559 |             }\n  560 |             if let Some(offset) = self.camera.param_usize(\"colordata_blacklevel\") {\n  561 |               debug!(\"Blacklevel offset: {:x}\", offset);\n  562 |               md.blacklevels = Some([v[offset], v[offset + 1], v[offset + 2], v[offset + 3]]);\n  563 |             }\n  564 |             if let Some(offset) = self.camera.param_usize(\"colordata_whitelevel\") {\n  565 |               md.whitelevel = Some(v[offset]);\n  566 |             }\n  567 |           }\n  568 |            */\n  569 |         }\n  570 |         md.ctmd_rec8 = Some(rec8);","lines":24}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"value.rs ValueConvertError From<TryFromIntError> and From<Infallible> both call todo!() (lines 368 and 374). These are reachable through the TryInto chains in get_u8/get_u16/etc. when conversion fails. A todo!() panics with 'not yet implemented', which is worse than a proper error.","fix":"Implement the conversions to return a real ValueConvertError instead of panicking.","locations":[{"ref":"rawler/src/formats/tiff/value.rs:367-376","code":"  367 |   fn from(_: TryFromIntError) -> Self {\n  368 |     todo!()\n  369 |   }\n  370 | }\n  371 | \n  372 | impl From<Infallible> for ValueConvertError {\n  373 |   fn from(_: Infallible) -> Self {\n  374 |     todo!()\n  375 |   }\n  376 | }","lines":10}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In cr3.rs, Ctmd::new() calls data.get_bytes(size as usize - 12) where `size` comes from get_u32(). If a malformed file provides a size smaller than 12, the subtraction underflows (u32 wraps to a huge value) and get_bytes attempts to read gigabytes of data.","fix":"Check that `size >= 12` before the subtraction and break/skip on invalid records.","locations":[{"ref":"rawler/src/decoders/cr3.rs:643","code":"  643 |         blocks: HashMap::new(),","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `client.rs` `stor()`, the entire uploaded file is read into a `Vec<u8>` in memory (`receive_data`) before being written to disk. For large RAW files (potentially hundreds of MB) this doubles the peak memory usage.","fix":"Stream the incoming data directly to the destination (file or callback) rather than buffering the complete payload.","locations":[{"ref":"embedftp/src/client.rs:625-652","code":"  625 |   async fn stor(&mut self, path: PathBuf) -> Result<()> {\n  626 |     self.initiate_data_connection().await?;\n  627 |     if self.data_reader.is_some() {\n  628 |       if invalid_path(&path) {\n  629 |         return Err(Error::Io(io::ErrorKind::PermissionDenied.into()));\n  630 |       }\n  631 |       let path = self.cwd.join(path);\n  632 |       self\n  633 |         .send(Answer::new(ResultCode::DataConnectionAlreadyOpen, \"Starting to send file...\"))\n  634 |         .await?;\n  635 |       let data = self.receive_data().await?;\n  636 |       info!(\"Received file: {:?}, {} bytes\", path, data.len());\n  637 |       self.close_data_connection();\n  638 |       match self.put_file(path, Arc::new(data)).await {\n  639 |         Ok(_) => {\n  640 |           self.send(Answer::new(ResultCode::ClosingDataConnection, \"Transfer done\")).await?;\n  641 |         }\n  642 |         Err(e) => {\n  643 |           error!(\"Failed STOR command: {:?}\", e);\n  644 |           self.send(Answer::new(ResultCode::LocalErrorInProcessing, \"Failed to store the file\")).await?;\n  645 |         }\n  646 |       }\n  647 |     } else {\n  648 |       warn!(\"No opened data connection\");\n  649 |       self.send(Answer::new(ResultCode::ConnectionClosed, \"No opened data connection\")).await?;\n  650 |     }\n  651 |     Ok(())\n  652 |   }","lines":28},{"ref":"embedftp/src/client.rs:665-671","code":"  665 |   /// Receive data from a data connection and take out the reader\n  666 |   async fn receive_data(&mut self) -> Result<Vec<u8>> {\n  667 |     let mut reader = self.data_reader.take().ok_or_else(|| Error::from(\"No data reader\"))?;\n  668 |     let mut buf = Vec::new();\n  669 |     tokio::io::copy(&mut reader, &mut buf).await?;\n  670 |     Ok(buf)\n  671 |   }","lines":7}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `codec.rs` `encode()`, response data is written to a temporary `Vec<u8>` buffer and then extended into the target `BytesMut`. This incurs an extra allocation per response. Writing directly into `BytesMut` using a `Writer` wrapper would eliminate the intermediate allocation.","fix":"Use `buf.writer()` (from `bytes::BufMut`) to write directly into the `BytesMut` buffer.","locations":[{"ref":"embedftp/src/codec.rs:33-52","code":"   33 |   fn encode(&mut self, answer: Answer, buf: &mut BytesMut) -> io::Result<()> {\n   34 |     let mut buffer = vec![];\n 0 |         _ => \"unknown\",\n  521 |       };\n  522 |       debug!(\"Canon CLog mode: {}\", clog);\n  523 |     }\n  524 | \n  525 |     if let Some(xpacket_box) = self.bmff.filebox.cr3xpacket.as_ref() {\n  526 |       let offset = xpacket_box.header.offset + xpacket_box.header.header_len;\n  527 |       let size = xpacket_box.header.size - xpacket_box.header.header_len;\n  528 |       let buf = rawfile\n  529 |         .subview(offset, size)\n  530 |         .map_err(|e| RawlerError::with_io_error(\"CR3: failed to read XPACKET\", rawfile.path(), e))?;\n  531 |       md.xpacket = Some(buf.to_vec());\n  532 |     }\n  533 | \n  534 |     if let Some(ctmd) = self.read_ctmd(rawfile, params.image_index as u32)? {\n  535 |       if let Some(rec5) = ctmd.exposure_info()? {\n  536 |         debug!(\"CTMD Rec(5): {:?}\", rec5);\n  537 |         md.ctmd_exposure = Some(rec5);\n  538 |       }\n  539 |       md.ctmd_focallen = ctmd.focal_len()?;\n  540 | \n  541 |       if let Some(rec7) = ctmd.get_as_tiff(7, CR3_CTMD_BLOCK_EXIFIFD)? {\n  542 |         md.ctmd_rec7_exif = Some(rec7);\n  543 |       }\n  544 |       if let Some(rec7) = ctmd.get_as_tiff(7, CR3_CTMD_BLOCK_MAKERNOTES)? {\n  545 |         md.ctmd_rec7_makernotes = Some(rec7);\n  546 |       }\n  547 |       if let Some(rec8) = ctmd.get_as_tiff(8, CR3_CTMD_BLOCK_MAKERNOTES)? {\n  548 |         if let Some(colordata) = rec8.get_entry(Cr3MakernoteTag::ColorData) {\n  549 |           let colordata = cr2::parse_colordata(colordata)?;\n  550 |           //rec8.root_ifd().dump::<TiffCommonTag>(10).iter().for_each(|line| eprintln!(\"MKD: {}\", line));\n  551 |           md.wb = Some(normalize_wb(colordata.wb));\n  552 |           md.blacklevels = colordata.blacklevel;\n  553 |           md.whitelevel = colordata.specular_whitelevel;\n  554 |           /*\n  555 |           if let crate::formats::tiff::Value::Short(v) = &levels.value {\n  556 |             if let Some(offset) = self.camera.param_usize(\"colordata_wbcoeffs\") {\n  557 |               let raw_wb = [v[offset] as f32, v[offset + 1] as f32, v[offset + 2] as f32, v[offset + 3] as f32];\n  558 |               md.wb = Some(normalize_wb(raw_wb));\n  559 |             }\n  560 |             if let Some(offset) = self.camera.param_usize(\"colordata_blacklevel\") {\n  561 |               debug!(\"Blacklevel offset: {:x}\", offset);\n  562 |               md.blacklevels = Some([v[offset], v[offset + 1], v[offset + 2], v[offset + 3]]);\n  563 |             }\n  564 |             if let Some(offset) = self.camera.param_usize(\"colordata_whitelevel\") {\n  565 |               md.whitelevel = Some(v[offset]);\n  566 |             }\n  567 |           }\n  568 |            */\n  569 |         }\n  570 |         md.ctmd_rec8 = Some(rec8);\n  571 |       }\n  572 |       if let Some(rec9) = ctmd.get_as_tiff(9, CR3_CTMD_BLOCK_MAKERNOTES)? {\n  573 |         md.ctmd_rec9 = Some(rec9);\n  574 |       }\n  575 |     }\n  576 | \n  577 |     let resolver = LensResolver::new()\n  578 |       .with_lens_keyname(self.read_lens_name()?)\n  579 |       .with_camera(&self.camera) // must follow with_lens_keyname() as it my override key\n  580 |       .with_lens_id(self.read_lens_id()?)\n  581 |       .with_aperture(md.ctmd_exposure.as_ref().map(|x| x.fnumber.clone()))\n  582 |       .with_focal_len(md.ctmd_focallen.clone())\n  583 |       .with_mounts(&[CANON_CN_MOUNT.into(), CANON_EF_MOUNT.into(), CANON_RF_MOUNT.into()]);\n  584 |     md.lens_description = resolver.resolve();\n  585 | \n  586 |     debug!(\"CR3 blacklevels: {:?}\", md.blacklevels);\n  587 |     debug!(\"CR3 whitelevel: {:?}\", md.whitelevel);\n  588 | \n  589 |     self.md_cache.set(params, md.clone());\n  590 |     Ok(md)\n  591 |   }","lines":111}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In dng/writer.rs dng_put_raw_ljpeg(), tile_offsets and tile_sizes are built by a sequential for loop over lj92_data after   157 |   }","lines":3}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"The function `_to_uppercase` in command.rs is prefixed with an underscore to suppress the unused-code warning, but it is never called anywhere. It reimplements ASCII uppercasing that the standard library already provides via `to_ascii_uppercase`, making it doubly dead.","fix":"Remove the function entirely.","locations":[{"ref":"embedftp/src/command.rs:128-134","code":"  128 | fn _to_uppercase(data: &mut [u8]) {\n  129 |   for byte in data {\n  130 |     if *byte >= b'a' && *byte <= b'z' {\n  131 |       *byte -= 32;\n  132 |     }\n  133 |   }\n  134 | }","lines":7}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"_get_masked_areas() in DngDecoder is prefixed with underscore indicating it is dead code. It is never called.","fix":"Either use the function or remove it.","locations":[{"ref":"rawler/src/decoders/dng.rs:393-406","code":"  393 |   fn _get_masked_areas(&self, raw: &IFD) -> Vec<Rect> {\n  394 |     let mut areas = Vec::new();\n  395 | \n  396 |     if let Some(masked_area) = raw.get_entry(TiffCommonTag::MaskedAreas) {\n  397 |       for x in (0..masked_area.count() as usize).step_by(4) {\n  398 |         areas.push(Rect::new_with_points(\n  399 |           Point::new(masked_area.force_usize(x), masked_area.force_usize(x + 1)),\n  400 |           Point::new(masked_area.force_usize(x + 2), masked_area.force_usize(x + 3)),\n  401 |         ));\n  402 |       }\n  403 |     }\n  404 | \n  405 |     areas\n  406 |   }","lines":14}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"Multiple commented-out debug dump lines are left in production code: makernote.dump in NefDecoder::new(), makernote.dump in ArwDecoder::new(), a println! in decode_snef_compressed, and priv_tiff.dump in ArwDecoder::get_params(). These are debugging OPT_QP: u32 = 4; // Don't scale the diff values","lines":3}]},{"id":"ARCH_4","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"ifd.rs contains a large commented-out impl block (lines 241-288) that is dead code. It duplicates the signature of the active IFD::new() function, suggesting an incomplete refactor.","fix":"Remove the commented-out block.","locations":[{"ref":"rawler/src/formats/tiff/ifd.rs:241-288","code":"  241 |   /*\n  242 |   pub fn new<R: Read + Seek>(reader: &mut R, offset: u32, base: u32, corr: i32, endian: Endian, sub_tags: &[u16]) -> Result<Self> {\n  243 |     reader.seek(SeekFrom::Start((base + offset) as u64))?;\n  244 |     let mut sub_ifd_offsets = Vec::new();\n  245 |     let mut reader = EndianReader::new(reader, endian);\n  246 |     let entry_count = reader.read_u16()?;\n  247 |     let mut entries = BTreeMap::new();\n  248 |     let mut sub = Vec::new();\n  249 |     for _ in 0..entry_count {\n  250 |       //let embedded = reader.read_u32()?;\n  251 |       let tag = reader.read_u16()?;\n  252 |       if tag == LegacyTiffRootTag::SubIFDs.into() || sub_tags.contains(&tag) {\n  253 |         let entry = Entry::parse(&mut reader, base, corr, tag)?;\n  254 |         match entry.value {\n  255 |           Value::Long(offsets) => {\n  256 |             sub_ifd_offsets.extend_from_slice(&offsets);\n  257 |           }\n  258 |           _ => {\n  259 |             todo!()\n  260 |           }\n  261 |         }\n  262 |       } else {\n  263 |         let entry = Entry::parse(&mut reader, base, corr, tag)?;\n  264 |         entries.insert(entry.tag, entry);\n  265 |       }\n  266 |     }\n  267 |     let next_ifd = reader.read_u32()?;\n  268 | \n  269 |     // Process SubIFDs\n  270 |     let pos = reader.position()?;\n  271 |     let reader = reader.into_inner();\n  272 |     for offset in sub_ifd_offsets {\n  273 |       let ifd = IFD::new(reader, apply_corr(offset, corr), base, corr, endian, sub_ <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
