n  297 |           if v2[j] <= sm_val {\n  298 |             sm_num = j as u32;\n  299 |             sm_val = v2[j];\n  300 |           }\n  301 |         }\n  302 |         htable.huffval[i] = sm_num;\n  303 |         v2[sm_num as usize] = 0xffffffff;\n  304 |       }","lines":12}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In decompress_quicktake_100(), `pix` is a statically sized 2D array of `[[0x80_i16; 644]; 484]`. The loops use `height + 2` as the row bound and `width + 2` as the column bound. If width > 642 or height > 482 the inner indexing like `pix[row + 2][col + 2]` will index out of bounds.","fix":"Add an upfront check that width <= 640 and height <= 480 before entering the decode loops.","locations":[{"ref":"rawler/src/decoders/qtk.rs:170-228","code":"  170 |     let mut pix = [[0x80_i16; 644]; 484];\n  171 | \n  172 |     for row in 2..(height + 2) {\n  173 |       let cstart = 2 + (row & 1);\n  174 |       let mut val = 0;\n  175 |       for col in (cstart..(width + 2)).step_by(2) {\n  176 |         val = (((pix[row - 1][col - 1] + 2 * pix[row - 1][col + 1] + pix[row][col - 2]) >> 2) + GSTEP[pump.get_bits(4) as usize]).clamp(0, 255);\n  177 |         pix[row][col] = val;\n  178 |         if col < 4 {\n  179 |           pix[row][col - 2] = val;\n  180 |           pix[row + 1][(!row) & 1] = val;\n  181 |         }\n  182 |         if row == 2 {\n  183 |           pix[row - 1][col + 1] = val;\n  184 |           pix[row - 1][col + 3] = val;\n  185 |         }\n  186 |       }\n  187 |       pix[row][width + 2 + (row & 1)] = val; // last column\n  188 |     }\n  189 | \n  190 |     for rb in 0..2 {\n  191 |       for row in ((2 + rb)..(height + 2)).step_by(2) {\n  192 |         for col in ((3 - (row & 1))..(width + 2)).step_by(2) {\n  193 |           let sharp = if row < 4 || col < 4 {\n  194 |             2\n  195 |           } else {\n  196 |             let val = (pix[row - 2][col] - pix[row][col - 2]).abs() as i32\n  197 |               + (pix[row - 2][col] - pix[row - 2][col - 2]).abs() as i32\n  198 |               + (pix[row][col - 2] - pix[row - 2][col - 2]).abs() as i32;\n  199 |             match val {\n  200 |               0..4 => 0,\n  201 |               4..8 => 1,\n  202 |               8..16 => 2,\n  203 |               16..32 => 3,\n  204 |               32..48 => 4,\n  205 |               _ => 5,\n  206 |             }\n  207 |           };\n  208 | \n  209 |           let val = (((pix[row - 2][col] + pix[row][col - 2]) >> 1) + RSTEP[sharp][pump.get_bits(2) as usize]).clamp(0, 255);\n  210 | \n  211 |           pix[row][col] = val;\n  212 |           if row < 4 {\n  213 |             pix[row - 2][col + 2] = val;\n  214 |           };\n  215 |           if col < 4 {\n  216 |             pix[row + 2][col - 2] = val;\n  217 |           };\n  218 |         }\n  219 |       }\n  220 |     }\n  221 | \n  222 |     for row in 2..(height + 2) {\n  223 |       for col in ((3 - (row & 1))..(width + 2)).step_by(2) {\n  224 |         let val = ((pix[row][col - 1] + (pix[row][col] << 2) + pix[row][col + 1]) >> 1) - 0x100;\n  225 |         pix[row][col] = val.clamp(0, 255);\n  226 |       }\n  227 |     }\n  228 | ","lines":59}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"decode_dbp() hardcodes `n_tiles = 8` and derives `tile_width = width / n_tiles`. If width is not evenly divisible by 8, the tile_width calculation truncates and the total decoded pixels will be less than width * height. The remaining columns are left uninitialised.","fix":"Assert or check that width % 8 == 0, or handle the remainder columns.","locations":[{"ref":"rawler/src/decoders/raf/dbp.rs:15-16","code":"   15 |   let n_tiles = 8;\n   16 |   let tile_width = width / n_tiles;","lines":2}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In get_crop(), the crop Rect is built using `crop_right - crop_left` for width and `crop_bottom - crop_top` for height (subtraction). If crop_right < crop_left or crop_bottom < crop_top due to malformed metadata, this underflows (usize arithmetic). The result would be a nonsensical huge rectangle.","fix":"Use checked_sub or validate that crop_right >= crop_left and crop_bottom >= crop_top before computing the difference.","locations":[{"ref":"rawler/src/decoders/rw2.rs:321-328","code":"  321 |       let crop_right = fetch_tiff_tag!(self.tiff, PanasonicTag::CropRight).force_usize(0);\n  322 |       let crop_bottom = fetch_tiff_tag!(self.tiff, PanasonicTag::CropBottom).force_usize(0);\n  323 |       Ok(Some(Rect::new(\n  324 |         Point::new(crop_left, crop_top),\n  325 |         Dim2::new(crop_right - crop_left, crop_bottom - crop_top),\n  326 |       )))\n  327 |     } else {\n  328 |       Ok(None)","lines":8}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In get_active_area(), similarly, sensor_right - sensor_left and sensor_bottom - sensor_top can underflow if sensor values are inconsistent in the file.","fix":"Add validation or use saturating_sub.","locations":[{"ref":"rawler/src/decoders/rw2.rs:332-344","code":"  332 |   fn get_active_area(&self) -> Result<Option<Rect>> {\n  333 |     if self.tiff.has_entry(PanasonicTag::SensorLeftBorder) {\n  334 |       let sensor_left = fetch_tiff_tag!(self.tiff, PanasonicTag::SensorLeftBorder).force_usize(0);\n  335 |       let sensor_top = fetch_tiff_tag!(self.tiff, PanasonicTag::SensorTopBorder).force_usize(0);\n  336 |       let sensor_right = fetch_tiff_tag!(self.tiff, PanasonicTag::SensorRightBorder).force_usize(0);\n  337 |       let sensor_bottom = fetch_tiff_tag!(self.tiff, PanasonicTag::SensorBottomBorder).force_usize(0);\n  338 |       Ok(Some(Rect::new(\n  339 |         Point::new(sensor_left, sensor_top),\n  340 |         Dim2::new(sensor_right - sensor_left, sensor_bottom - sensor_top),\n  341 |       )))\n  342 |     } else {\n  343 |       Ok(None)\n  344 |     }","lines":13}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In decode_strip(), the col & 3 ordering for the 4-pixel group is: col & 3 == 0 writes destpixel[0], col & 3 == 2 writes destpixel[1], col & 3 == 1 writes destpixel[2], col & 3 == 3 writes destpixel[3]. The interleaved ordering (0, 2, 1, 3 mod-4 sequence) suggests the pixels within a group are decoded non-sequentially, which may be intentional but is confusing and could indicate an indexing error.","fix":"Add a comment explaining the non-sequential RGRG interleave layout, or verify against the reference C++ implementation.","locations":[{"ref":"rawler/src/decoders/rw2/v8decompressor.rs:449-463","code":"  449 |       let destpixel = &mut linebuf[col & !0x3..];\n  450 | \n  451 |       if col & 3 == 2 {\n  452 |         let val = state.current_base.coeff[1] as i32 + delta;\n  453 |         destpixel[1] = clamp(val, 0, state.datamax) as u16;\n  454 |       } else if col & 3 == 1 {\n  455 |         let val = state.current_base.coeff[2] as i32 + delta;\n  456 |         destpixel[2] = clamp(val, 0, state.datamax) as u16;\n  457 |       } else if col & 3 != 0 {\n  458 |         let val = state.current_base.coeff[3] as i32 + delta;\n  459 |         destpixel[3] = clamp(val, 0, state.datamax) as u16;\n  460 |       } else {\n  461 |         let val = state.current_base.coeff[0] as i32 + delta;\n  462 |         destpixel[0] = clamp(val, 0, state.datamax) as u16;\n  463 |       }","lines":15}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In idwt.rs getline(), the index expression `(self.flt_tap_h as i32 - self.cur_h as i32 + 5) as usize % 5 + 3` can produce a negative intermediate when cast - if flt_tap_h < cur_h and the difference is greater than 5, the addition of 5 may not recover the sign, producing a large usize value that indexes out of bounds into line_buf (len 8). The debug_assert on line 81 only catches cur_h == 0 but not the index range.","fix":"Use modular arithmetic that handles negative values: `((self.flt_tap_h as i32 - self.cur_h as i32).rem_euclid(5)) as usize + 3`","locations":[{"ref":"rawler/src/decompressors/crx/idwt.rs:80","code":"   80 |     let result = &self.line_buf[(self.flt_tap_h as i32 - self.cur_h as i32 + 5) as usize % 5 + 3];","lines":1}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In iquant.rs get_subband_row(), line 334: `row - self.row_end_addon` is used in the middle branch, but the condition is `row < self.height - self.row_end_addon`. The subtrahend in the return should be `self.row_start_addon`, not `self.row_end_addon`, to correctly compute the row index into the QStep table. Using row_end_addon as offset produces wrong row indices for multi-tile images with non-zero row_start_addon.","fix":"Change the return to `row - self.row_start_addon`.","locations":[{"ref":"rawler/src/decompressors/crx/mdat.rs:334","code":"  334 |       row - self.row_end_addon","lines":1}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"rawdb::retry_delay() for attempt == 2 computes 60u64.saturating_mul(1u64 << (2 - 2)) == 60 * 1 == 60s, and for attempt == 3 gives 60 * 2 == 120s. However, for attempt == 4 and beyond (should MAX_RETRIES ever increase), the shift 1u64 << (n - 2) can overflow if n >= 66, causing saturating_mul to still be very large but the shift itself is well-defined in Rust only up to 63 for u64.","fix":"Cap the retry delay at a maximum duration to avoid potential overflow for large n, or clamp (n - 2) to at most 63.","locations":[{"ref":"rawler/src/devtools/rawdb.rs:99-103","code":"   99 | fn retry_delay(attempt: u32) -> Duration {\n  100 |   match attempt {\n  101 |     1 => Duration::from_secs(10),\n  102 |     n => Duration::from_secs(60u64.saturating_mul(1u64 << (n - 2))),\n  103 |   }","lines":5}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In write_to_stream() the index table stores (chunks.len() + 1) offsets: one for the start of chunk 0, then one end-offset per chunk. The new() reader, however, reads (raw_fork_blocks + 1) offsets - where raw_fork_blocks = raw_fork_size.div_ceil(COMPRESS_BLOCK_SIZE). If compression produces a different number of chunks than div_ceil predicts (e.g. for very small inputs), the reader and writer disagree on how many index entries exist, leading to corrupt reads.","fix":"Store the actual chunk count in the header, or make both sides use the same formula.","locations":[{"ref":"rawler/src/dng/original.rs:33-55","code":"   33 |     let raw_fork_blocks: u32 = raw_fork_size.div_ceil(COMPRESS_BLOCK_SIZE); // (raw_fork_size + (COMPRESS_BLOCK_SIZE - 1)) / COMPRESS_BLOCK_SIZE\n   34 | \n   35 |     let mut index_list: Vec<u32> = Vec::with_capacity(raw_fork_blocks as usize + 1);\n   36 | \n   37 |     for _ in 0..raw_fork_blocks + 1 {\n   38 |       let idx = stream.read_u32::<BigEndian>()?;\n   39 |       index_list.push(idx);\n   40 |     }\n   41 | \n   42 |     let mut chunks = Vec::with_capacity(index_list.len());\n   43 |     let mut iter = index_list.into_iter().map(u64::from);\n   44 | \n   45 |     if let Some(mut offset) = iter.next() {\n   46 |       stream.seek(SeekFrom::Start(start + offset))?;\n   47 |       for end in iter {\n   48 |         let len = end\n   49 |           .checked_sub(offset)\n   50 |           .ok_or_else(|| io::Error::new(io::ErrorKind::InvalidInput, \"Offset underflow\"))?;\n   51 |         let mut chunk = vec![0; len as usize];\n   52 |         stream.read_exact(&mut chunk)?;\n   53 |         chunks.push(ForkBlock::new(chunk));\n   54 |         offset = end;\n   55 |       }","lines":23},{"ref":"rawler/src/dng/original.rs:136-144","code":"  136 |     let chunks_start: u32 = (size_of::<u32>() + (self.chunks.len() + 1) * size_of::<u32>()) as u32;\n  137 |     // Offset of first chunk\n  138 |     stream.write_all(&chunks_start.to_be_bytes())?;\n  139 |     // Write all other end offsets.\n  140 |     for end in self.chunks.iter().map(ForkBlock::len).scan(chunks_start, |end, len| {\n  141 |       *end += len as u32;\n  142 |       Some(*end)\n  143 |     }) {\n  144 |       stream.write_all(&end.to_be_bytes())?;","lines":9}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In original.rs compress(), the compressed chunks are produced in parallel via par_iter(), but the ordering of results from rayon's parallel flat_map is not guaranteed to match the input order. If chunks arrive out of order, the written index table will be wrong and decompression will return corrupt data.","fix":"Use par_iter().map(...).collect::<Result<Vec<_>>>() (which preserves order) instead of par_iter().flat_map(). Rayon's parallel collect preserves element order; flat_map on a parallel iterator does not guarantee it.","locations":[{"ref":"rawler/src/dng/original.rs:120","code":"  120 |     let chunks = forks.par_iter().flat_map(ForkBlock::compress).collect();","lines":1}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In write_to_stream(), 7 zero u32 words are appended unconditionally after the compressed chunks. There is no comment explaining what these trailing zeros represent, and no corresponding read-back in new(). They bloat every stored original and will confuse any reader that relies on the length derived from the index table.","fix":"Remove the padding if it is not required by the DNG spec, or document the exact field they represent and read them back in new().","locations":[{"ref":"rawler/src/dng/original.rs:149-156","code":"  149 |     stream.write_all(&0u32.to_be_bytes())?;\n  150 |     stream.write_all(&0u32.to_be_bytes())?;\n  151 |     stream.write_all(&0u32.to_be_bytes())?;\n  152 |     stream.write_all(&0u32.to_be_bytes())?;\n  153 |     stream.write_all(&0u32.to_be_bytes())?;\n  154 |     stream.write_all(&0u32.to_be_bytes())?;\n  155 |     stream.write_all(&0u32.to_be_bytes())?;\n  156 |     Ok(())","lines":8}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In dng/writer.rs write_rawimage(), the matrix selection prefers Illuminant::A twice: `remove_entry(&Illuminant::A).or_else(|| available_matrices.remove_entry(&Illuminant::A))`. The second fallback is identical to the first and will never match anything the first did not, making it dead code. This was likely meant to be a different illuminant.","fix":"Replace one of the duplicate `Illuminant::A` entries with the intended illuminant (e.g. Illuminant::Tungsten or another standard).","locations":[{"ref":"rawler/src/dng/writer.rs:160-163","code":"  160 |         let first_matrix = available_matrices\n  161 |           .remove_entry(&Illuminant::A)\n  162 |           .or_else(|| available_matrices.remove_entry(&Illuminant::A))\n  163 |           .or_else(|| available_matrices.remove_entry(&first_key))","lines":4}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In dng/writer.rs preview(), the JPEG quality is computed as `(quality * 100.0).max(100.0) as u8`. The .max(100.0) clamps the value to a *minimum* of 100, so any quality below 1.0 is silently promoted to 100 (maximum quality). Passing quality = 0.75 yields 75.0, which is less than 100.0, so .max(100.0) returns 100.0 and JPEG is always written at full quality.","fix":"Use `.min(100.0)` instead of `.max(100.0)` to cap quality at 100 without raising it.","locations":[{"ref":"rawler/src/dng/writer.rs:344","code":"  344 |     let jpeg_encoder = JpegEncoder::new_with_quality(&mut self.writer.dng.writer, (quality * 100.0).max(100.0) as u8);","lines":1}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ftyp.rs brand_count calculation is (header.size - 16) / 4. If header.size < 16 this underflows to a huge u64, leading to an enormous allocation and read attempt. header.size of 0 is valid for extended boxes (size==0 means \"to EOF\") but the ftyp check (header.size % 4 != 0) does not catch size < 16.","fix":"Check header.size >= 16 before the subtraction.","locations":[{"ref":"rawler/src/formats/bmff/ftyp.rs:26-29","code":"   26 |     if header.size % 4 != 0 {\n   27 |       return Err(BmffError::Parse(\"invalid ftyp size\".into()));\n   28 |     }\n   29 |     let brand_count = (header.size - 16) / 4; // header + major + minor","lines":4}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"bmff/mod.rs BoxHeader::parse() reads size as u32 and casts to u64, then reads a u64 if size == 1 (extended box). It does NOT handle size == 0, which per the BMFF spec means the box extends to the end of file. end_offset() would then return 0, causing all child-box parsers to immediately exit their while loops.","fix":"Handle size == 0 by computing end_offset as the file size.","locations":[{"ref":"rawler/src/formats/bmff/mod.rs:72-76","code":"   72 |     let mut size = reader.read_u32::<BigEndian>()? as u64;\n   73 |     let typ = reader.read_u32::<BigEndian>()?.into();\n   74 |     if size == 1 {\n   75 |       size = reader.read_u64::<BigEndian>()?;\n   76 |     }","lines":5},{"ref":"rawler/src/formats/bmff/mod.rs:94-96","code":"   94 |   pub fn end_offset(&self) -> u64 {\n   95 |     self.offset + self.size\n   96 |   }","lines":3}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"bmff/mod.rs FileBox::parse() calls file.seek(SeekFrom::End(0)) to get the file size, but uses the return value of this seek (which is the resulting position, i.e. file size) as the sentinel for the outer loop. If the file is empty this returns 0 and the loop body is never entered, silently producing a parse error from the ok_or_else() calls - which is fine. However, the returned size from seek(End(0)) is used as-is while current starts at 0 (from seek(Start(0))). If the file has a box whose size field is larger than the actual file, child parsers will seek past EOF without error (Seek past EOF on a File typically succeeds on many platforms), then fail on subsequent reads.","fix":"Validate each box header's size against the remaining file length.","locations":[{"ref":"rawler/src/formats/bmff/mod.rs:140-191","code":"  140 |     let size = file.seek(SeekFrom::End(0))?;\n  141 |     let mut current = file.seek(SeekFrom::Start(0))?;\n  142 | \n  143 |     let mut ftyp = None;\n  144 |     let mut moov = None;\n  145 |     let mut mdat = None;\n  146 |     let mut vendors = Vec::new();\n  147 |     let mut cr3xpacket = None;\n  148 | \n  149 |     while current < size {\n  150 |       // get box?\n  151 | \n  152 |       let header = BoxHeader::parse(&mut file)?;\n  153 | \n  154 |       //let ftyp = Some(FtypBox::read_box(&mut file, header)?);\n  155 | \n  156 |       match header.typ {\n  157 |         FtypBox::TYP => {\n  158 |           debug!(\"Found ftyp box\");\n  159 |           ftyp = Some(FtypBox::read_box(&mut file, header)?);\n  160 |         }\n  161 |         MoovBox::TYP => {\n  162 |           debug!(\"Found moov box\");\n  163 |           moov = Some(MoovBox::read_box(&mut file, header)?);\n  164 |         }\n  165 |         MdatBox::TYP => {\n  166 |           debug!(\"Found mdat box\");\n  167 |           mdat = Some(MdatBox::read_box(&mut file, header)?);\n  168 |         }\n  169 |         _ => {\n  170 |           if let Some(uuid) = header.uuid {\n  171 |             if uuid == Uuid::from_bytes(Cr3XpacketBox::UUID) {\n  172 |               cr3xpacket = Some(Cr3XpacketBox::read_box(&mut file, header)?);\n  173 |             } else {\n  174 |               debug!(\"Vendor box found in filebox: {:?}\", header.typ);\n  175 |               let vendor = VendorBox::read_box(&mut file, header)?;\n  176 |               vendors.push(vendor);\n  177 |             }\n  178 |           } else {\n  179 |             debug!(\"Vendor box found in filebox: {:?}\", header.typ);\n  180 |             let vendor = VendorBox::read_box(&mut file, header)?;\n  181 |             vendors.push(vendor);\n  182 |           }\n  183 |         }\n  184 |       }\n  185 |       if file.stream_position()? != current {\n  186 |         current = file.stream_position()?;\n  187 |       } else {\n  188 |         // If parsing has not moved cursor, we probably have a corrupt file or it's not a BMFF at all.\n  189 |         return Err(BmffError::Parse(\"Unable to find valid BMFF box, corrupt file?\".into()));\n  190 |       }\n  191 |     }","lines":52}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"jfif.rs App1::read_segment() returns Err when the EXIF IFD parse fails (line 170) but has already advanced the reader past the APP1 segment payload. The Jfif::parse() loop catches this with a continue (line 233-237) but then re-reads from the wrong position, potentially misidentifying subsequent segments.","fix":"Seek to pos + len before returning the error, so the stream position is always consistent regardless of parse outcome.","locations":[{"ref":"rawler/src/formats/jfif.rs:162-170","code":"  162 | \n  163 |         if let Ok(ifd) = ifd {\n  164 |           return Ok(Self {\n  165 |             len,\n  166 |             payload: Payload::Exif(ifd),\n  167 |           });\n  168 |         }\n  169 | \n  170 |         return Err(JfifError::General(\"Failed to read exif\".into()));","lines":9}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"jfif.rs Jfif::parse() continues without pushing a Segment on a failed APP1 parse (line 233-237), which means sym still holds the old value. However, pos is re-read from stream_position at the bottom of the loop only after the segment is pushed. The continue skips both the push and the sym re-read, so pos is stale on the next iteration.","fix":"Update pos after every segment regardless of success/failure, or restructure to always seek to a known position.","locations":[{"ref":"rawler/src/formats/jfif.rs:231-237","code":"  231 |         0xFFE1 => match App1::read_segment(&mut reader, symbol) {\n  232 |           Ok(app1) => Segment::APP1 { offset: pos, app1 },\n  233 |           Err(err) => {\n  234 |             log::warn!(\"Failed to read APP1 (EXIF) segement, maybe corrupt: {:?}\", err);\n  235 |             continue;\n  236 |           }\n  237 |         },","lines":7},{"ref":"rawler/src/formats/jfif.rs:256-259","code":"  256 |         break; // EOI reached\n  257 |       }\n  258 |       pos = reader.stream_position()?;\n  259 |       sym = reader.read_u16::<BigEndian>().ok();","lines":4}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ifd.rs new_root_with_correction() applies apply_corr to next_ifd at line 79, then passes that corrected value to IFD::new() which internally does NOT apply corr again. But inside the while loop at line 87, it applies corr again to what is already a corrected next_ifd (ifd.next_ifd was already corrected in IFD::new() at line 223). This double-correction is a latent bug that only does not manifest because corr is typically 0.","fix":"Decide whether offsets stored in next_ifd are pre-corrected or raw; apply corr in exactly one place.","locations":[{"ref":"rawler/src/formats/tiff/ifd.rs:79-98","code":"   79 |     next_ifd = apply_corr(next_ifd, corr);\n   80 |     let mut root = IFD::new(reader, next_ifd, base, corr, endian, &multi_sub_tags)?;\n   81 |     if root.entries.is_empty() {\n   82 |       return Err(TiffError::General(\"TIFF is invalid, IFD must contain at least one entry\".to_string()));\n   83 |     }\n   84 |     next_ifd = root.next_ifd;\n   85 | \n   86 |     while next_ifd != 0 {\n   87 |       next_ifd = apply_corr(next_ifd, corr);\n   88 |       let ifd = IFD::new(reader, next_ifd, base, corr, endian, &multi_sub_tags)?;\n   89 |       if ifd.entries.is_empty() {\n   90 |         return Err(TiffError::General(\"TIFF is invalid, IFD must contain at least one entry\".to_string()));\n   91 |       }\n   92 |       next_ifd = ifd.next_ifd;\n   93 |       root.chain.push(ifd);\n   94 | \n   95 |       if root.chain.len() > max_chain && max_chain > 0 {\n   96 |         break;\n   97 |       }\n   98 |     }","lines":20},{"ref":"rawler/src/formats/tiff/ifd.rs:219-228","code":"  219 |     Ok(IFD {\n  220 |       offset,\n  221 |       base,\n  222 |       corr,\n  223 |       next_ifd: if next_ifd == 0 { 0 } else { apply_corr(next_ifd, corr) },\n  224 |       entries,\n  225 |       endian,\n  226 |       sub,\n  227 |       chain: vec![],\n  228 |     })","lines":10}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ifd.rs Value::Unknown arm in sub-IFD offset handling (line 156-158) accesses offsets[0] directly without checking that the byte vector has at least 4 bytes. A 0-length Unknown entry would panic.","fix":"Use offsets.get(0..4) and parse with checked conversion, returning a warning if too short.","locations":[{"ref":"rawler/src/formats/tiff/ifd.rs:156-158","code":"  156 |               Value::Unknown(tag, offsets) => {\n  157 |                 sub_ifd_offsets.insert(*tag, vec![offsets[0] as u32]);\n  158 |               }","lines":3}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ifd.rs new() reads the next-IFD pointer after iterating entries (line 192-201), but at that point reader.position() may point anywhere because Entry::parse() seeks around the file. The comment on line 190 admits this. The position is supposed to be restored via the goto(next_pos) mechanism in the loop, but if an entry read fails the next_pos advance still happens, desynchronizing the next-IFD pointer read.","fix":"Explicitly seek to the end of the IFD directory (offset + 2 + entry_count * 12) before reading the next-IFD pointer.","locations":[{"ref":"rawler/src/formats/tiff/ifd.rs:190-201","code":"  190 |     // Some TIFF writers skip the next ifd pointer\n  191 |     // If we get an I/O error, we fallback to 0, signaling the end of IFD chains.\n  192 |     let next_ifd = match reader.read_u32() {\n  193 |       Ok(ptr) => ptr,\n  194 |       Err(e) => {\n  195 |         debug!(\n  196 |           \"TIFF IFD reader failed to get next IFD pointer, fallback to 0 and continue. Original error was: {}\",\n  197 |           e\n  198 |         );\n  199 |         0\n  200 |       }\n  201 |     };","lines":12}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"reader.rs parse_file() silently ignores an invalid TIFF magic number (line 152-154): the error return is commented out. Any file with a wrong magic but valid byte-order marker will be parsed as if it were a valid TIFF.","fix":"Restore the error return for invalid magic, or at minimum log a warning.","locations":[{"ref":"rawler/src/formats/tiff/reader.rs:151-154","code":"  151 |     let magic = reader.read_u16()?;\n  152 |     if magic != 42 {\n  153 |       //return Err(TiffError::General(format!(\"Invalid magic marker for TIFF: {}\", magic)));\n  154 |     }","lines":4}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In develop.rs develop_intermediate(), the CropDefault step checks `intermediate.dim().w == rawimage.active_area.map(|area| area.d).unwrap_or(rawimage.dim()).w / 2` to detect superpixel debayer. Integer division by 2 discards the remainder, so an odd-width image that has nothing to do with superpixel could accidentally satisfy the condition and apply a spurious 0.5x crop scale.","fix":"Track whether superpixel demosaicing was actually used with a boolean flag rather than inferring it from dimension ratios.","locations":[{"ref":"rawler/src/imgop/develop.rs:301-305","code":"  301 |         if intermediate.dim().w == rawimage.active_area.map(|area| area.d).unwrap_or(rawimage.dim()).w / 2 {\n  302 |           // Superpixel debayer used\n  303 |           crop.scale(0.5);\n  304 |           log::debug!(\"Scale crop to 0.5: {:?}\", crop);\n  305 |         }","lines":5}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Dim2::is_empty() returns true only when BOTH w and h are zero. An image with w=0 but h>0 (or vice versa) is also empty / degenerate, but is_empty() returns false, leading callers to treat it as a valid non-empty image.","fix":"Change the condition to `self.w == 0 || self.h == 0`.","locations":[{"ref":"rawler/src/imgop/mod.rs:61-63","code":"   61 |   pub fn is_empty(&self) -> bool {\n   62 |     self.w == 0 && self.h == 0\n   63 |   }","lines":3}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"spline.rs prepare() computes alpha[i] but never uses it. The algorithm on the Wikipedia page linked in the comment uses alpha in subsequent Gaussian elimination to compute mu and z. Skipping this step means mu and z are never set to their correct values (they stay at zero), so all c, b, d coefficients will be wrong.","fix":"Implement the full tridiagonal solve: after computing alpha, compute mu and z via forward sweep, then back-substitute to get c, then derive b and d.","locations":[{"ref":"rawler/src/imgop/spline.rs:36-53","code":"   36 |     for i in 1..self.num_segments {\n   37 |       let sp = &self.segments[i - 1];\n   38 |       let s = &self.segments[i];\n   39 |       let sn = &self.segments[i + 1];\n   40 | \n   41 |       alpha[i] = (3. / h[i]) * (sn.a - s.a) - (3. / h[i - 1]) * (s.a - sp.a);\n   42 |     }\n   43 | \n   44 |     mu[0] = 1.0;\n   45 |     z[0] = 0.0;\n   46 | \n   47 |     for i in (0..self.num_segments).rev() {\n   48 |       let sn = self.segments[i + 1].clone();\n   49 |       let s = &mut self.segments[i];\n   50 |       s.c = z[i] - mu[i] * sn.c;\n   51 |       s.b = (sn.a - s.a) / h[i] - h[i] * (sn.c + 2. * s.c) / 3.;\n   52 |       s.d = (sn.c - s.c) / (3. * h[i]);\n   53 |     }","lines":18}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Color2DPtr::at() has a debug_assert condition 'row * col < self.height * self.width' which is wrong. The correct bounds check is 'row < self.height && col < self.width', or equivalently 'row * self.width + col < self.height * self.width'. The current condition fails to catch many out-of-bounds accesses (e.g., row=10, col=0 on a 5x5 image: 10*0=0 which passes) and produces false positives for others.","fix":"Replace the assert with: debug_assert!(row < self.height && col < self.width);","locations":[{"ref":"rawler/src/pixarray.rs:586-589","code":"  586 |       debug_assert!(row * col < self.height * self.width);\n  587 |       &*self.ptr.add(row * self.width + col)\n  588 |     }\n  589 |   }","lines":4}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"BlackLevel::shift() clones the struct, then overwrites trans.levels in place - but the inner loop reads from self.levels and writes to trans.levels. This is correct for a simple copy, but the intermediate writes into trans could alias reads for multi-row patterns if (yn, xn) and (ys, xs) refer to the same cell (when y % h == 0 and x % w == 0). In that degenerate case the function is a no-op, which is correct, but not obviously safe. More importantly, if called with x >= w or y >= h (which is valid since % is used), the function works correctly; however this is not validated or documented.","fix":"Add a comment explaining why the clone + in-place write is safe; document that x and y may be >= pattern dimension.","locations":[{"ref":"rawler/src/rawimage.rs:146-162","code":"  146 |   pub fn shift(&self, x: usize, y: usize) -> Self {\n  147 |     if self.sample_count() == 1 {\n  148 |       self.clone()\n  149 |     } else {\n  150 |       let mut trans = self.clone();\n  151 |       let (w, h, cpp) = (trans.width, trans.height, trans.cpp);\n  152 |       for yn in 0..h {\n  153 |         for xn in 0..w {\n  154 |           let ys = (yn + y) % h;\n  155 |           let xs = (xn + x) % w;\n  156 |           trans.levels[yn * w * cpp + xn * cpp..yn * w * cpp + xn * cpp + cpp]\n  157 |             .copy_from_slice(&self.levels[ys * w * cpp + xs * cpp..ys * w * cpp + xs * cpp + cpp]);\n  158 |         }\n  159 |       }\n  160 |       trans\n  161 |     }\n  162 |   }","lines":17}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `convert.rs` `generate_job()`, when the `index` argument cannot be parsed as `usize`, `unwrap_or(0)` silently falls back to index 0. An unparseable non-'all' value like '2x' is treated as index 0 without any warning to the user.","fix":"Return an `Err(AppError::InvalidCmdSwitch(...))` when parsing fails rather than silently defaulting.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/convert.rs:99-108","code":"   99 |   let (do_batch, index) = match options.get_one::<String>(\"index\") {\n  100 |     Some(index) => {\n  101 |       if index.to_lowercase().eq(\"all\") {\n  102 |         (true, 0)\n  103 |       } else {\n  104 |         (false, index.parse::<usize>().unwrap_or(0))\n  105 |       }\n  106 |     }\n  107 |     None => (false, 0),\n  108 |   };","lines":10}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `ftpconv.rs` `FtpState::stor_file()`, when `self.params.keep_mtime` is true the code calls `dng.into_inner()` to obtain the inner `File` for setting mtime. If the BufWriter's internal flush fails (e.g. disk full), `into_inner()` returns an `IntoInnerError` and the mtime is not set. However the conversion itself already succeeded (`File::create` and all writes completed), and the error is returned to the caller of `stor_file`, causing the FTP server to report the upload as failed even though the DNG file was written correctly.","fix":"Flush the `BufWriter` explicitly before calling `into_inner()`, and treat a flush failure as a hard error earlier in the flow.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/ftpconv.rs:38-44","code":"   38 |             &rawfile,\n   39 |             &dng\n   40 |               .into_inner()\n   41 |               .map_err(|e| std::io::Error::new(std::io::ErrorKind::Other, format!(\"Can't access inner file: {e}\")))?,\n   42 |             None,\n   43 |             &self.params,\n   44 |           ) {","lines":7}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `jobs/extractraw.rs` the `duration` field of a successfully extracted `JobResult` is hardcoded to `0.0` (line 87) with a 'TODO: fixme' comment, while the actual elapsed time is measured and stored correctly for the process-raw and raw2dng job types.","fix":"Pass the elapsed duration from `execute()` into the result returned by `internal_exec`, or compute it inside `internal_exec` with `Instant::now()`.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/jobs/extractraw.rs:85-89","code":"   85 |         Ok(JobResult {\n   86 |           job: self.clone(),\n   87 |           duration: 0.0, // TODO: fixme\n   88 |           error: None,\n   89 |         })","lines":5}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `jobs/process_raw.rs` the `duration` field of a successfully converted `JobResult` is also hardcoded to `0.0` (line 99).","fix":"Same fix as for `extractraw.rs`.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/jobs/process_raw.rs:95-101","code":"   95 |         }\n   96 |         drop(file);\n   97 |         Ok(JobResult {\n   98 |           job: self.clone(),\n   99 |           duration: 0.0,\n  100 |           error: None,\n  101 |         })","lines":7}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `jobs/raw2dng.rs` the `duration` field of a successfully converted `JobResult` is also hardcoded to `0.0` (line 96-97).","fix":"Same fix as for the other job types.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/jobs/raw2dng.rs:94-99","code":"   94 |         drop(file);\n   95 |         Ok(JobResult {\n   96 |           job: self.clone(),\n   97 |           duration: 0.0,\n   98 |           error: None,\n   99 |         })","lines":6}]},{"id":"LOGIC_62","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The same silent `unwrap_or(0)` fallback for unparseable index values exists in `process_raw.rs` `generate_job()`.","fix":"Return an error on parse failure instead of silently defaulting to 0.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/process_raw.rs:99-108","code":"   99 |   let (do_batch, index) = match options.get_one::<String>(\"index\") {\n  100 |     Some(index) => {\n  101 |       if index.to_lowercase().eq(\"all\") {\n  102 |         (true, 0)\n  103 |       } else {\n  104 |         (false, index.parse::<usize>().unwrap_or(0))\n  105 |       }\n  106 |     }\n  107 |     None => (false, 0),\n  108 |   };","lines":10}]},{"id":"LOGIC_63","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `process_raw.rs` `generate_job()`, the `thumbnail` field of `RawProcessingParams` is hardcoded to `true` with a comment `//options.get_flag(\"thumbnail\")` (line 120). The user has no way to disable thumbnail generation from the CLI even though the comment implies it was once configurable.","fix":"Either add a `--thumbnail` CLI argument for the `process-raw` subcommand and wire it up, or remove the dead comment.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/process_raw.rs:120","code":"  120 |       thumbnail: true, //options.get_flag(\"thumbnail\"),","lines":1}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `client.rs` `complete_path()`, the function calls `directory.canonicalize()` which resolves symlinks. If a symlink inside `server_root` points to a location outside `server_root`, the check `dir.starts_with(&self.server_root)` will correctly reject it. However, if `server_root` itself was obtained without canonicalization, the prefix check can fail spuriously or be bypassed (e.g. if `server_root` contains a trailing slash vs not, or contains relative components). The `server_root` is never canonicalized when stored in `Client`.","fix":"Canonicalize `server_root` when constructing the `Client` (or when it is passed to `serve`).","locations":[{"ref":"embedftp/src/client.rs:258-271","code":"  258 |   fn complete_path(&self, path: &Path) -> result::Result<PathBuf, io::Error> {\n  259 |     let directory = self.server_root.join(if path.has_root() {\n  260 |       path.iter().skip(1).clone().collect()\n  261 |     } else {\n  262 |       path.to_path_buf()\n  263 |     });\n  264 |     let dir = directory.canonicalize();\n  265 |     if let Ok(ref dir) = dir {\n  266 |       if !dir.starts_with(&self.server_root) {\n  267 |         return Err(io::ErrorKind::PermissionDenied.into());\n  268 |       }\n  269 |     }\n  270 |     dir\n  271 |   }","lines":14},{"ref":"embedftp/src/server.rs:21-36","code":"   21 | pub async fn serve<T>(handle: Handle, server_root: PathBuf, config: Config, env: T) -> io::Result<()>\n   22 | where\n   23 |   T: FtpCallback + Clone + Send + Sync + 'static,\n   24 | {\n   25 |   let port = config.server_port;\n   26 |   let addr = SocketAddr::new(config.server_addr, port);\n   27 |   let listener = TcpListener::bind(&addr).await?;\n   28 | \n   29 |   info!(\"Listening for clients on port {}...\", port);\n   30 |   loop {\n   31 |     let (stream, addr) = listener.accept().await?;\n   32 |     info!(\"New client connected: {}\", addr);\n   33 |     handle.spawn(handle_client(addr, stream, handle.clone(), server_root.clone(), config.clone(), env.clone()));\n   34 |   }\n   35 |   //Ok(())\n   36 | }","lines":16}]},{"id":"LOGIC_65","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `client.rs` `nlst()`, when `path` is absolute (line 408-413) the server sends a 501 error response and then calls `self.close_data_connection()`, but it never sends a `ClosingDataConnection` reply. The FTP client may wait indefinitely for the transfer-complete acknowledgement.","fix":"After sending the error reply, also send a `ResultCode::ClosingDataConnection` or skip the close-data-connection step and let the outer code handle it.","locations":[{"ref":"embedftp/src/client.rs:407-414","code":"  407 |         let pattern = if let Some(p) = path {\n  408 |           if p.is_absolute() {\n  409 |             self\n  410 |               .send(Answer::new(ResultCode::InvalidParameterOrArgument, \"No such file or directory\"))\n  411 |               .await?;\n  412 |             self.close_data_connection();\n  413 |             return Ok(());\n  414 |           }","lines":8}]},{"id":"LOGIC_66","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `client.rs` `add_file_info()`, the file path string is split on '/' to get the filename. On Windows, path separators are '\\', so `split('/')` would return the full path instead of just the filename, sending an incorrect listing entry to the client.","fix":"Use `path.file_name()` from the `Path` type instead of splitting on '/' manually. The same pattern appears in `add_file_info_nlst` at line 779-785.","locations":[{"ref":"embedftp/src/client.rs:747-753","code":"  747 |   let path = match path.to_str() {\n  748 |     Some(path) => match path.split('/').next_back() {\n  749 |       Some(path) => path,\n  750 |       _ => return,\n  751 |     },\n  752 |     _ => return,\n  753 |   };","lines":7}]},{"id":"LOGIC_67","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`add_file_info_nlst()` duplicates the same filename-extraction logic as `add_file_info()`, splitting on '/' to get the last component.","fix":"Extract a shared helper that uses `Path::file_name()` and reuse it in both functions.","locations":[{"ref":"embedftp/src/client.rs:777-790","code":"  777 | fn add_file_info_nlst(path: PathBuf, out: &mut Vec<u8>) {\n  778 |   let extra = if path.is_dir() { \"/\" } else { \"\" };\n  779 |   let path = match path.to_str() {\n  780 |     Some(path) => match path.split('/').next_back() {\n  781 |       Some(path) => path,\n  782 |       _ => return,\n  783 |     },\n  784 |     _ => return,\n  785 |   };\n  786 | \n  787 |   let file_str = format!(\"{path}{extra}\\r\\n\", path = path, extra = extra);\n  788 |   out.extend(file_str.as_bytes());\n  789 |   debug!(\"==> {:?}\", &file_str);\n  790 | }","lines":14}]},{"id":"LOGIC_68","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `config.rs`, `Config::new()` accepts a file path parameter `_file_path` but ignores it entirely. The function always returns the same hard-coded default configuration. The parameter name is suppressed with a leading underscore, but the API surface implies it reads from a config file.","fix":"Either implement reading from the file, or change the API to a `Config::default()` / builder pattern so callers are not misled.","locations":[{"ref":"embedftp/src/config.rs:32-44","code":"   32 |   pub fn new<P: AsRef<Path>>(_file_path: P) -> Option<Config> {\n   33 |     Some(Self {\n   34 |       server_port: 8054,\n   35 |       server_addr: \"::1\".parse().expect(\"Failed to parse IPv6 addr\"),\n   36 |       users: vec![User {\n   37 |         name: \"anonymous\".into(),\n   38 |         password: \"anonymous@example.com\".into(),\n   39 |       }],\n   40 |       anonymous: true,\n   41 |       greeting: String::from(\"Welcome to this FTP server!\"),\n   42 |     })\n   43 |   }\n   44 | }","lines":13}]},{"id":"LOGIC_69","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `error.rs` the `cause()` method is implemented on the `Error` type (line 46-55). The `cause()` method was deprecated in Rust 1.33 in favour of `source()`. The implementation delegates to `source()` semantically but uses the deprecated API.","fix":"Replace `fn cause()` with `fn source()` (from `std::error::Error`) and remove the deprecated implementation.","locations":[{"ref":"embedftp/src/error.rs:46-55","code":"   46 |   fn cause(&self) -> Option<&dyn error::Error> {\n   47 |     let cause: &dyn error::Error = match *self {\n   48 |       FromUtf8(ref error) => error,\n   49 |       Io(ref error) => error,\n   50 |       Utf8(ref error) => error,\n   51 |       Msg(_) => return None,\n   52 |     };\n   53 |     Some(cause)\n   54 |   }\n   55 | }","lines":10}]},{"id":"LOGIC_70","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"CFA::try_from(char) maps both 'E' and 'C' to CFAColor::CYAN. The character 'E' is documented in the CFA string format as representing CYAN, but 'C' already exists as the canonical representation. There is no color for 'E' independently. This means that if 'C' is mistakenly used in a 4-color Fuji pattern where 'E' is expected, no error is raised.","fix":"Verify the intended usage and either remove 'E' as a synonym or add a dedicated CFAColor variant for it. Document the mapping.","locations":[{"ref":"rawler/src/cfa.rs:41-54","code":"   41 |     Ok(match value {\n   42 |       'R' => Self::RED,\n   43 |       'G' => Self::GREEN,\n   44 |       'B' => Self::BLUE,\n   45 |       'E' => Self::CYAN,\n   46 |       'M' => Self::MAGENTA,\n   47 |       'Y' => Self::YELLOW,\n   48 |       'C' => Self::CYAN,\n   49 |       _ => {\n   50 |         return Err(format!(\"Unknown CFA color \\\"{}\\\"\", value));\n   51 |       }\n   52 |     })\n   53 |   }\n   54 | }","lines":14}]},{"id":"LOGIC_71","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"raw_metadata() reads a header at 0x0a98 (2712) bytes, but ExposureTime is at offset 0x018C (396), LensFocalLen at 0x037C (892), LensModel at 0x0398 (920). All are within the buffer. However, ExposureIndexASA is at 0x0074 (116), which is also within range. The buffer read of 0x0a98 bytes seems unnecessarily large.","fix":"Minor: reduce the buffer size to the actual maximum tag offset used.","locations":[{"ref":"rawler/src/decoders/ari.rs:65","code":"   65 |     let buffer = file.subview(0, 0x0a98)?; // max header","lines":1}]},{"id":"LOGIC_72","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In cr2.rs normalize_wb(), when raw_wb[1] (G1) is 0.0 or subnormal, the division `*v /= div` produces infinity or NaN for non-zero channels. The check `v.is_normal()` skips the division for subnormal/zero values but the divisor `div` itself (raw_wb[1]) is not checked. If div is exactly 0.0 (not subnormal), all channels get NaN or infinity.","fix":"Guard with `if div.is_normal()` before the normalization loop, returning raw values unchanged or a fallback.","locations":[{"ref":"rawler/src/decoders/cr2.rs:801-812","code":"  801 | fn normalize_wb(raw_wb: [f32; 4]) -> [f32; 4] {\n  802 |   debug!(\"CR2 raw wb: {:?}\", raw_wb);\n  803 |   // We never have more then RGB colors so far (no RGBE etc.)\n  804 |   // So we combine G1 and G2 to get RGB wb.\n  805 |   let div = raw_wb[1]; // G1 should be 1024 and we use this as divisor\n  806 |   let mut norm = raw_wb;\n  807 |   norm.iter_mut().for_each(|v| {\n  808 |     if v.is_normal() {\n  809 |       *v /= div\n  810 |     }\n  811 |   });\n  812 |   [norm[0], (norm[1] + norm[2]) / 2.0, norm[3], f32::NAN]","lines":12}]},{"id":"LOGIC_73","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In cr3.rs, the `iad1_box()` method (line 129) directly indexes `self.bmff.filebox.moov.traks[trak_idx]` without bounds checking. If trak_idx is out of range for the traks vector, this panics. The caller does not always verify the index is valid before calling this method.","fix":"Use `.get(trak_idx)` and propagate None/error instead of direct indexing.","locations":[{"ref":"rawler/src/decoders/cr3.rs:129","code":"  129 |     let trak = &self.bmff.filebox.moov.traks[trak_idx];","lines":1}]},{"id":"LOGIC_74","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In cr3.rs preview_image(), the code directly indexes `self.bmff.filebox.moov.traks[0]` at lines 427 and 435. If the traks vector is empty, this panics. The method already handles errors with ok_or_else for co64, but the trak access itself is unchecked.","fix":"Use `.get(0).ok_or_else(...)` before accessing the trak.","locations":[{"ref":"rawler/src/decoders/cr3.rs:427","code":"  427 |     let offset = self.bmff.filebox.moov.traks[0]","lines":1},{"ref":"rawler/src/decoders/cr3.rs:435","code":"  435 |     let size = self.bmff.filebox.moov.traks[0].mdia.minf.stbl.stsz.sample_sizes[0] as usize;","lines":1}]},{"id":"LOGIC_75","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In cr3.rs Ctmd::new(), when a CTMD block tag is encountered a second time (double tag), the code hits `assert_eq!(rec.blocks.contains_key(&tag), false, \"Double tag found?!\")` which panics. This could be triggered by a malformed or future-format CR3 file containing duplicate block tags.","fix":"Replace the assert_eq! with a log warning and skip or overwrite the duplicate entry.","locations":[{"ref":"rawler/src/decoders/cr3.rs:662","code":"  662 |               assert_eq!(rec.blocks.contains_key(&tag), false, \"Double tag found?!\");","lines":1}]},{"id":"LOGIC_76","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In new_makernote(), the tag type 2 is labeled 'Short values' in the comment but is stored as Value::Long (a u32 vector), not Value::Short. This could cause incorrect value interpretations downstream if callers expect Short values.","fix":"Either store as Value::Short or correct the comment.","locations":[{"ref":"rawler/src/decoders/iiq.rs:214-216","code":"  214 |       2 => {\n  215 |         entries.insert(tag, (byte_count, tiff::Value::Long(vec![data as u32])));\n  216 |       }","lines":3}]},{"id":"LOGIC_77","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"blacklevel() returns a RawlerError with message 'Unable to find lacklevel' (typo: missing 'b' in 'blacklevel').","fix":"Fix the typo: 'lacklevel' -> 'blacklevel'.","locations":[{"ref":"rawler/src/decoders/iiq.rs:752","code":"  752 |       _ => Err(RawlerError::DecoderFailed(\"Unable to find lacklevel in IIQ makernotes\".to_string())),","lines":1}]},{"id":"LOGIC_78","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In decode_tiles(), the error message says 'trying to decode {} tiles from {} offsets' but the context refers to tile count vs. the length of the offset table. The wording is confusing because both values describe the tile-related counts.","fix":"Clarify: 'expected {} tiles ({}cols x {}rows) but found {} offsets'.","locations":[{"ref":"rawler/src/decoders/mod.rs:784-785","code":"  784 |   if coltiles * rowtiles != tiles_src.len() as usize {\n  785 |     return Err(format_args!(\"DNG: trying to decode {} tiles from {} offsets\", coltiles * rowtiles, tiles_src.len()).into());","lines":2}]},{"id":"LOGIC_79","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In RawLoader::new(), naked cameras (filesize-matched) are only populated from the last camera with that filesize because `naked.insert` overwrites earlier entries. If two cameras share the same raw filesize, one is silently dropped.","fix":"Either add a warning when a collision occurs, or store a Vec of cameras per filesize and pick the best match.","locations":[{"ref":"rawler/src/decoders/mod.rs:884-890","code":"  884 |     let mut naked = HashMap::new();\n  885 |     for cam in cams {\n  886 |       map.insert((cam.make.clone(), cam.model.clone(), cam.mode.clone()), cam.clone());\n  887 |       if cam.filesize > 0 {\n  888 |         naked.insert(cam.filesize, cam);\n  889 |       }\n  890 |     }","lines":7}]},{"id":"LOGIC_80","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In MrwDecoder::new_jfif(), the WB swapped case at line 220 in raw_image(): `wb_vals[0]` is used twice for the green channels (`self.wb_vals[2] as f32, self.wb_vals[0] as f32, self.wb_vals[0] as f32`). The second and third fields should be G1 and G2 or G and G, using the same index twice appears correct only if G1==G2, but using wb_vals[2] for the G value is suspicious.","fix":"Verify the swapped_wb hint behavior is correct for the cameras that use it.","locations":[{"ref":"rawler/src/decoders/mrw.rs:219-222","code":"  219 |     let wb_coeffs = if self.camera.find_hint(\"swapped_wb\") {\n  220 |       [self.wb_vals[2] as f32, self.wb_vals[0] as f32, self.wb_vals[0] as f32, self.wb_vals[1] as f32]\n  221 |     } else {\n  222 |       [self.wb_vals[0] as f32, self.wb_vals[1] as f32, self.wb_vals[2] as f32, self.wb_vals[3] as f32]","lines":4}]},{"id":"LOGIC_81","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"normalize_wb() averages norm[1] and norm[2] to form the single G channel. norm[2] is always the raw value that was passed as the fourth element (wb[3]), which in get_wb() is always the blue multiplier OlympusBlueMul or wbs.force_f32(1). Using it as a second green channel is semantically wrong; the return from get_wb() already stores blue at index 3 and green at index 1, leaving indices 2 and 3 undefined.","fix":"Align the wb array layout: ensure exactly two green values are populated before averaging, or change the normalization to use [norm[0], norm[1], norm[3], NAN] without averaging.","locations":[{"ref":"rawler/src/decoders/orf.rs:456-466","code":"  456 | fn normalize_wb(raw_wb: [f32; 4]) -> [f32; 4] {\n  457 |   log::debug!(\"ORF raw wb: {:?}\", raw_wb);\n  458 |   let div = raw_wb[1];\n  459 |   let mut norm = raw_wb;\n  460 |   norm.iter_mut().for_each(|v| {\n  461 |     if v.is_normal() {\n  462 |       *v /= div\n  463 |     }\n  464 |   });\n  465 |   [norm[0], (norm[1] + norm[2]) / 2.0, norm[3], f32::NAN]\n  466 | }","lines":11},{"ref":"rawler/src/decoders/orf.rs:439-453","code":"  439 |   fn get_wb(&self) -> Result<[f32; 4]> {\n  440 |     let redmul = self.makernote.get_entry(OrfMakernotes::OlympusRedMul);\n  441 |     let bluemul = self.makernote.get_entry(OrfMakernotes::OlympusBlueMul);\n  442 |     match (redmul, bluemul) {\n  443 |       (Some(redmul), Some(bluemul)) => Ok([redmul.force_u32(0) as f32, 256.0, 256.0, bluemul.force_u32(0) as f32]),\n  444 |       _ => {\n  445 |         let ifd = self.makernote.find_ifds_with_tag(OrfImageProcessing::OrfBlackLevels);\n  446 |         if ifd.is_empty() {\n  447 |           return Err(RawlerError::DecoderFailed(\"ORF: Couldn't find ImgProc IFD\".to_string()));\n  448 |         }\n  449 |         let wbs = fetch_tiff_tag!(ifd[0], OrfImageProcessing::WB_RBLevels);\n  450 |         Ok([wbs.force_f32(0), 256.0, 256.0, wbs.force_f32(1)])\n  451 |       }\n  452 |     }\n  453 |   }","lines":15}]},{"id":"LOGIC_82","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In RafDecoder::new(), the camera lookup error branch does `rawloader.check_supported(&ifd)?` again with the same IFD, which is identical to the first call that already failed. The comment 'trying without mode' is misleading because both calls use mode=''.","fix":"Remove the duplicate call or implement a genuine fallback.","locations":[{"ref":"rawler/src/decoders/raf.rs:233-239","code":"  233 |     let camera = match rawloader.check_supported(&ifd) {\n  234 |       Ok(camera) => camera,\n  235 |       Err(err) => {\n  236 |         log::debug!(\"Camera not found, trying without mode: {:?}\", err);\n  237 |         rawloader.check_supported(&ifd)?\n  238 |       }\n  239 |     };","lines":7}]},{"id":"LOGIC_83","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In decode_panasonic_v6(), the 14-bit path reads only 14 values into pixelbuffer[0..13] but pixels_per_block is 11. Only indices 0..10 are consumed by the next_pixel() closure. Indices 11, 12, 13 are read from the bitstream but never used, wasting 3 reads and misaligning the stream for subsequent blocks.","fix":"Verify the correct number of raw values to read per block for 14-bit mode.","locations":[{"ref":"rawler/src/decoders/rw2/v6decompressor.rs:63-79","code":"   63 |           14 => {\n   64 |             // We fill from reverse, because bitstream is reversed\n   65 |             pump.get_bits(4); // padding bits, ignore it\n   66 |             pixelbuffer[13] = pump.get_bits(10) as u16;\n   67 |             pixelbuffer[12] = pump.get_bits(10) as u16;\n   68 |             pixelbuffer[11] = pump.get_bits(10) as u16;\n   69 |             pixelbuffer[10] = pump.get_bits(2) as u16;\n   70 |             pixelbuffer[9] = pump.get_bits(10) as u16;\n   71 |             pixelbuffer[8] = pump.get_bits(10) as u16;\n   72 |             pixelbuffer[7] = pump.get_bits(10) as u16;\n   73 |             pixelbuffer[6] = pump.get_bits(2) as u16;\n   74 |             pixelbuffer[5] = pump.get_bits(10) as u16;\n   75 |             pixelbuffer[4] = pump.get_bits(10) as u16;\n   76 |             pixelbuffer[3] = pump.get_bits(10) as u16;\n   77 |             pixelbuffer[2] = pump.get_bits(2) as u16;\n   78 |             pixelbuffer[1] = pump.get_bits(14) as u16;\n   79 |             pixelbuffer[0] = pump.get_bits(14) as u16;","lines":17}]},{"id":"LOGIC_84","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"calc_gamma() at line 319 computes idx as `(((x as u64 | 0x5_00000000u64) - ...) >> 32) as usize` for the case where x >= gamma_slopes[4]. The 0x5_00000000 magic constant is undocumented. If the subtraction underflows in u64, the shift produces an unexpected large index which could be used as an array index into gamma_points[idx] without bounds checking on the next lines.","fix":"Add bounds check on idx before indexing into gamma_points and gamma_slopes arrays, or document the invariant.","locations":[{"ref":"rawler/src/decoders/rw2/v8decompressor.rs:319-326","code":"  319 |         if x >= (0xFFFF & gamma_slopes[4]) {\n  320 |           idx = (((x as u64 | 0x5_00000000u64) - (0xFFFF & gamma_slopes[5]) as u64) >> 32) as usize;\n  321 |         }\n  322 |       }\n  323 |     }\n  324 |   }\n  325 | \n  326 |   let point = gamma_points[idx];","lines":8}]},{"id":"LOGIC_85","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In cr2.rs decode_top_line_rounded() (line 506), the remaining==1 branch reads a bit code and applies rounding to p.line_buf[1][p.line_pos], but the line at 503-506 uses `p.line_buf[1][p.line_pos] += ...` without first initializing line_buf[1][p.line_pos] (unlike decode_top_line() which explicitly sets it to p.coeff_a() first). The buffer content is whatever was left from the previous decode iteration, causing potential corruption of the last pixel in rounded top-line decoding.","fix":"Initialize the pixel before accumulating: add `p.line_buf[1][p.line_pos] = 0;` (or the appropriate predictor) before the `+=` at line 506.","locations":[{"ref":"rawler/src/decompressors/crx/decoder.rs:503-506","code":"  503 |     if remaining == 1 {\n  504 |       let bit_code = p.rice.adaptive_rice_decode(true, PREDICT_K_ESCAPE, PREDICT_K_ESCBITS, PREDICT_K_MAX)?;\n  505 |       let code = error_code_signed(bit_code);\n  506 |       p.line_buf[1][p.line_pos] += p.rounded_bits_mask * 2 * code + (code >> 31);","lines":4}]},{"id":"LOGIC_86","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `decode_ljpeg_420` (the standard, non-Sony version), the first block's Y samples are\npredicted as a chain: `y1 = base + diff`, `y2 = y1 + diff`, `y3 = y2 + diff`, `y4 = y3\n+ diff` (lines 218-221). However, in subsequent blocks (inside the loop at lines 238-241),\nthe same chain is used: `y3 = y2 + diff` (predictor is the in-row left sample). This is\ninconsistent with the Sony version where `y3` always refers to a different row's sample.\nThe standard 420 predictor chain means y1/y2 and y3/y4 are predicted as a single\nsequential chain rather than two independent pairs from different rows, which may produce\nincorrect results for some cameras implementing standard LJPEG 4:2:0.","fix":"Verify against the LJPEG 4:2:0 specification whether y3 should predict from y1 (vertical/inter-row predictor) or from y2 (intra-row chain). Add a comment documenting the chosen behaviour.","locations":[{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:218-221","code":"  218 |   let y1 = base_prediction + htable1.huff_decode(&mut pump)?;\n  219 |   let y2 = y1 + htable1.huff_decode(&mut pump)?;\n  220 |   let y3 = y2 + htable1.huff_decode(&mut pump)?;\n  221 |   let y4 = y3 + htable1.huff_decode(&mut pump)?;","lines":4},{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:238-241","code":"  238 |       let y1 = (py as i32) + htable1.huff_decode(&mut pump)?;\n  239 |       let y2 = (y1 as i32) + htable1.huff_decode(&mut pump)?;\n  240 |       let y3 = (y2 as i32) + htable1.huff_decode(&mut pump)?;\n  241 |       let y4 = (y3 as i32) + htable1.huff_decode(&mut pump)?;","lines":4}]},{"id":"LOGIC_87","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `LjpegDecompressor::decode`, line 345 uses an explicit `return` keyword for the\n`decode_ljpeg_422` branch while all other branches (lines 343, 348, 349, 350) use\nimplicit tail expressions. This inconsistency suggests a copy-paste from a different\ncontext and makes the control flow harder to read, though it is not a semantic bug.","fix":"Remove the `return` keyword on line 345 to match the implicit-return style used throughout the function.","locations":[{"ref":"rawler/src/decompressors/ljpeg/mod.rs:343-351","code":"  343 |       decode_ljpeg_420(self, out, width, height)\n  344 |     } else if self.sof.components[0].super_h == 2 && self.sof.components[0].super_v == 1 {\n  345 |       return decode_ljpeg_422(self, out, width, height);\n  346 |     } else if self.sof.components[0].super_h == 1 && self.sof.components[0].super_v == 1 {\n  347 |       match self.predictor {\n  348 |         1 | 2 | 3 | 4 | 5 | 6 | 7 => decode_ljpeg(self, out, x, stripwidth, width, height),\n  349 |         8 => decode_hasselblad(self, out, width),\n  350 |         p => Err(format!(\"ljpeg: predictor {} not supported\", p)),\n  351 |       }","lines":9}]},{"id":"LOGIC_88","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`decompress_12le_wcontrol` and `decompress_12be_wcontrol` silently drop trailing pixels\nwhen `width` is not a multiple of 10. The inner loop uses `out.chunks_exact_mut(10)`,\nwhich ignores the remainder, so if `width = 15`, the last 5 pixels of every row are\nnever written (left as zero). There is no assertion or error check for this.","fix":"Add a debug assertion `debug_assert_eq!(width % 10, 0)` at the top of each function, or handle the remainder pixels explicitly after the main loop.","locations":[{"ref":"rawler/src/decompressors/packed.rs:683-712","code":"  683 | pub(crate) fn decompress_12le_wcontrol(buf: &[u8], width: usize, height: usize, dummy: bool) -> std::result::Result<PixU16, String> {\n  684 |   // Calulate expected bytes per line.\n  685 |   let perline = width * 12 / 8 + ((width + 2) / 10);\n  686 | \n  687 |   let need = height * perline;\n  688 |   if buf.len() < need {\n  689 |     return Err(format!(\"decompress_12le_wcontrol(): buffer too short ({} < {})\", buf.len(), need));\n  690 |   }\n  691 | \n  692 |   decompress_lines_fn(\n  693 |     width,\n  694 |     height,\n  695 |     dummy,\n  696 |     &(|out: &mut [u16], row| {\n  697 |       let inb = &buf[(row * perline)..];\n  698 | \n  699 |       for (oc, ic) in out.chunks_exact_mut(10).zip(inb.chunks_exact(16)) {\n  700 |         for (o, i) in oc.chunks_exact_mut(2).zip(ic.chunks_exact(3)) {\n  701 |           let g1: u16 = i[0] as u16;\n  702 |           let g2: u16 = i[1] as u16;\n  703 |           let g3: u16 = i[2] as u16;\n  704 | \n  705 |           o[0] = ((g2 & 0x0f) << 8) | g1;\n  706 |           o[1] = (g3 << 4) | (g2 >> 4);\n  707 |         }\n  708 |       }\n  709 |       Ok(())\n  710 |     }),\n  711 |   )\n  712 | }","lines":30},{"ref":"rawler/src/decompressors/packed.rs:731-760","code":"  731 | pub(crate) fn decompress_12be_wcontrol(buf: &[u8], width: usize, height: usize, dummy: bool) -> std::result::Result<PixU16, String> {\n  732 |   // Calulate expected bytes per line.\n  733 |   let perline = width * 12 / 8 + ((width + 2) / 10);\n  734 | \n  735 |   let need = height * perline;\n  736 |   if buf.len() < need {\n  737 |     return Err(format!(\"decompress_12be_wcontrol(): buffer too short ({} < {})
