 3.;\n   52 |       s.d = (sn.c - s.c) / (3. * h[i]);\n   53 |     }","lines":7}]},{"id":"PANIC_95","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"xyY_to_XYZ() panics with an explicit panic!() when y is zero or subnormal. This function is called from library code that processes decoded camera metadata, making the panic reachable from untrusted input.","fix":"Return an Option or Result instead of panicking.","locations":[{"ref":"rawler/src/imgop/xyz.rs:185-191","code":"  185 | pub fn xyY_to_XYZ(x: f32, y: f32, Y: f32) -> [f32; 3] {\n  186 |   if y.is_normal() && y.is_sign_positive() {\n  187 |     [x * Y / y, Y, (1.0 - x - y) * Y / y]\n  188 |   } else {\n  189 |     panic!(\"xy_to_XYZ(): 'y' argument must be greater than zero\");\n  190 |   }\n  191 | }","lines":7}]},{"id":"PANIC_96","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"BitPumpJPEG::peek_bits accesses self.buffer[self.pos + 1] without checking that pos + 1 < buffer.len(). When self.pos is the last byte in the buffer and that byte is 0xFF, the code reads one byte past the end.","fix":"Add a bounds check before accessing self.buffer[self.pos + 1]; treat missing byte as a non-0xFF value or set finished = true.","locations":[{"ref":"rawler/src/pumps.rs:286-292","code":"  286 |               if nextbyte != 0xff {\n  287 |                 nextbyte\n  288 |               } else if self.buffer[self.pos + 1] == 0x00 {\n  289 |                 self.pos += 1; // Skip the extra byte used to mark 255\n  290 |                 nextbyte\n  291 |               } else {\n  292 |                 self.finished = true;","lines":7}]},{"id":"PANIC_97","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ByteStream::skip_to_marker reads self.buffer[self.pos + 1] while only checking self.pos < self.buffer.len() AFTER the access. If the loop position reaches the last byte, self.pos + 1 is out of bounds.","fix":"Check self.pos + 1 < self.buffer.len() before the two-byte access inside the while condition.","locations":[{"ref":"rawler/src/pumps.rs:422-433","code":"  422 |   pub fn skip_to_marker(&mut self) -> Result<usize, String> {\n  423 |     let mut skip_count = 0;\n  424 |     while !(self.buffer[self.pos] == 0xFF && self.buffer[self.pos + 1] != 0 && self.buffer[self.pos + 1] != 0xFF) {\n  425 |       self.pos += 1;\n  426 |       skip_count += 1;\n  427 |       if self.pos >= self.buffer.len() {\n  428 |         return Err(\"No marker found inside rest of buffer\".to_string());\n  429 |       }\n  430 |     }\n  431 |     self.pos += 1; // Make the next byte the marker\n  432 |     Ok(skip_count + 1)\n  433 |   }","lines":12}]},{"id":"PANIC_98","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"RawImage::calc_black_levels() has a hard assert 'assert_eq!(cfa.width * cfa.height, 4)' which panics for any non-2x2 CFA (e.g., X-Trans 6x6 sensors). This assert is also noted with a TODO comment, confirming it is a known limitation that can crash at runtime for valid inputs.","fix":"Return None or an error for non-4-cell CFA patterns rather than panicking, and remove or generalize the assert.","locations":[{"ref":"rawler/src/rawimage.rs:313-314","code":"  313 |       assert_eq!(cfa.width * cfa.height, 4);\n  314 |       Some(BlackLevel::new(&[blacklevels[0], blacklevels[1], blacklevels[2], blacklevels[3]], 2, 2, 1))","lines":2}]},{"id":"PANIC_99","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"RawImage::new() and new_with_data() call unwrap_or_else(|| panic!('Need whitelevel in config: ...')) when the camera has no whitelevel configured. This panics at runtime for any camera definition missing a whitelevel, with no recovery path for the decoder caller.","fix":"Return Result<RawImage, RawlerError> from the constructors so the error can be propagated.","locations":[{"ref":"rawler/src/rawimage.rs:376","code":"  376 |       .unwrap_or_else(|| panic!(\"Need whitelevel in config: {}\", cam.clean_model));","lines":1},{"ref":"rawler/src/rawimage.rs:463-466","code":"  463 |     let whitelevel = cam\n  464 |       .make_whitelevel(cpp)\n  465 |       .or(whitelevel)\n  466 |       .unwrap_or_else(|| panic!(\"Need whitelvel in config: {}\", cam.clean_model));","lines":4}]},{"id":"PANIC_100","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"RawImage::pixels_u16() and pixels_u16_mut() panic with 'Data ist not u16' (note: also a typo - 'ist' should be 'is') when called on a Float image. These are public API methods with no documented preconditions, making callers responsible for preventing a crash with no guidance.","fix":"Return Option<&[u16]> / Option<&mut [u16]> or Result to let callers handle the mismatch. Fix the typo 'ist' -> 'is' in the message.","locations":[{"ref":"rawler/src/rawimage.rs:500-514","code":"  500 |   pub fn pixels_u16(&self) -> &[u16] {\n  501 |     if let RawImageData::Integer(data) = &self.data {\n  502 |       data\n  503 |     } else {\n  504 |       panic!(\"Data ist not u16\");\n  505 |     }\n  506 |   }\n  507 | \n  508 |   pub fn pixels_u16_mut(&mut self) -> &mut [u16] {\n  509 |     if let RawImageData::Integer(data) = &mut self.data {\n  510 |       data\n  511 |     } else {\n  512 |       panic!(\"Data ist not u16\");\n  513 |     }\n  514 |   }","lines":15}]},{"id":"PANIC_101","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"IntoTilesIter::next() calls assert!(self.count <= self.tile_count()) which panics if the iterator is over-consumed. However, ExactSizeIterator is implemented, which implies the caller can trust size_hint. If tile_count() is ever wrong (e.g., non-multiple-of-tile total), the assert fires mid-iteration.","fix":"Replace the assert with 'if self.count > self.tile_count() { return None; }' for defensive behavior.","locations":[{"ref":"rawler/src/tiles.rs:198-199","code":"  198 |     assert!(self.count <= self.tile_count());\n  199 | ","lines":2}]},{"id":"PANIC_102","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"update_from_toml() panics on every unknown TOML key with `panic!(\"Unknown key: {}\", key)`. This means any future key added to cameras.toml that this code is not aware of will crash on startup.","fix":"Log a warning instead of panicking on unknown keys.","locations":[{"ref":"rawler/src/decoders/camera.rs:244-246","code":"  244 |         key => {\n  245 |           panic!(\"Unknown key: {}\", key);\n  246 |         }","lines":3}]},{"id":"PANIC_103","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In Cr2Decoder::get_firmware(), `v.parse().expect(\"Only digits here\")` panics if the firmware string produces an empty component (e.g. a trailing dot '1.0.'). The filter keeps only digits and dots, so a trailing dot yields an empty split segment which parse::<u8>() fails on.","fix":"Replace .expect() with proper error handling, or filter out empty segments: `.filter(|s| !s.is_empty()).map(|v| v.parse::<u8>().unwrap_or(0))`","locations":[{"ref":"rawler/src/decoders/cr2.rs:519","code":"  519 |           let v: Vec<u8> = str.split('.').map(|v| v.parse().expect(\"Only digits here\")).collect();","lines":1}]},{"id":"PANIC_104","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In CrwDecoder::create_hufftable(), `htable.initialize().expect(\"failed to initialize CRW Huffman table\")` panics. Since the input tables are compile-time constants this is unlikely in practice, but the expect hides any future table corruption.","fix":"Propagate the error up through decode_compressed() -> raw_image() instead of panicking.","locations":[{"ref":"rawler/src/decoders/crw.rs:174","code":"  174 |     htable.initialize().expect(\"failed to initialize CRW Huffman table\");","lines":1}]},{"id":"PANIC_105","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"SensorType::from_cfa() calls unimplemented!() for CFA patterns that are neither 2x2 nor 6x6. Any future sensor format or corrupted CFA will panic the process.","fix":"Return an Option<SensorType> or Result<SensorType, _> instead.","locations":[{"ref":"rawler/src/imgop/sensor/mod.rs:43-46","code":"   43 |     } else {\n   44 |       unimplemented!()\n   45 |     }\n   46 |   }","lines":4}]},{"id":"PANIC_106","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"WhiteLevel::new_bits panics if bits > 32 via an explicit panic!, but the level is computed as ((1_u64 << bits) - 1) as u32. If bits == 32, (1_u64 << 32) - 1 == 4294967295 which fits u32 correctly, but if the panic guard were not present at bits == 33, the cast would silently truncate. The guard is correct but uses a panic rather than returning an error.","fix":"Return Result<WhiteLevel, Error> to allow callers to recover instead of aborting.","locations":[{"ref":"rawler/src/rawimage.rs:44-48","code":"   44 |     if bits > 32 {\n   45 |       panic!(\"Whitelevel can only be calculated for max. 32 bits, but {} bits given\", bits);\n   46 |     }\n   47 |     let level: u32 = ((1_u64 << bits) - 1) as u32;\n   48 |     Self(vec![level; cpp])","lines":5}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","easy":false,"description":"In `client.rs` `pasv()`, a `TcpListener` is bound and immediately accepts exactly one connection (blocking the async task until a client connects). If the FTP client sends the PASV command but never opens the data connection, the server task is blocked indefinitely waiting on `listener.accept()`. No timeout is applied. The listener is not stored in the struct and cannot be cancelled.","fix":"Apply a `tokio::time::timeout` around `listener.accept()` and return a suitable FTP error code to the client if the data connection is not established within a reasonable time.","locations":[{"ref":"embedftp/src/client.rs:468-515","code":"  468 |   async fn pasv(&mut self) -> Result<()> {\n  469 |     if self.data_writer.is_some() {\n  470 |       self.send(Answer::new(ResultCode::DataConnectionAlreadyOpen, \"Already listening...\")).await?;\n  471 |       return Ok(());\n  472 |     }\n  473 |     self.active_data_port = None;\n  474 |     //let port = if let Some(port) = self.data_port { port } else { 0 };\n  475 |     let port = 0; // auto configure port\n  476 |     let mut addr = self.local_addr;\n  477 |     addr.set_port(port);\n  478 | \n  479 |     // If it's a IPv4 address but mapped into v6 as defined in IETF RFC 4291 section 2.5.5.2,\n  480 |     // use the canonical value.\n  481 |     match &addr.ip().to_canonical() {\n  482 |       IpAddr::V4(v4addr) => {\n  483 |         let listener = TcpListener::bind(&addr).await?;\n  484 |         let port = listener.local_addr()?.port();\n  485 |         let octets = v4addr.octets();\n  486 | \n  487 |         self\n  488 |           .send(Answer::new(\n  489 |             ResultCode::EnteringPassiveMode,\n  490 |             &format!(\n  491 |               \"Entering passive mode ({},{},{},{},{},{}).\",\n  492 |               octets[0],\n  493 |               octets[1],\n  494 |               octets[2],\n  495 |               octets[3],\n  496 |               port >> 8,\n  497 |               port & 0xFF\n  498 |             ),\n  499 |           ))\n  500 |           .await?;\n  501 | \n  502 |         debug!(\"Waiting for data clients on port {}...\", port);\n  503 |         {\n  504 |           let (stream, _addr) = listener.accept().await?;\n  505 |           let (r, w) = stream.into_split();\n  506 |           self.data_writer = Some(w);\n  507 |           self.data_reader = Some(r);\n  508 |         }\n  509 |       }\n  510 |       IpAddr::V6(_v6addr) => {\n  511 |         return Err(Error::Msg(\"PASV is not possible for IPv6 connections.\".into()));\n  512 |       }\n  513 |     }\n  514 |     Ok(())\n  515 |   }","lines":48}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","easy":false,"description":"Same issue in `epsv()`: the method binds a listener and calls `listener.accept().await?` with no timeout. If the client sends EPSV but never initiates the data connection, the task hangs forever.","fix":"Same fix as for `pasv()`: wrap `listener.accept()` with a timeout.","locations":[{"ref":"embedftp/src/client.rs:517-554","code":"  517 |   async fn epsv(&mut self, proto: Option<String>) -> Result<()> {\n  518 |     //let port = if let Some(port) = self.data_port { port } else { 0 };\n  519 |     let port = 0;\n  520 | \n  521 |     if let Some(proto) = proto {\n  522 |       if proto.to_uppercase().eq(\"ALL\") {\n  523 |         self.data_writer = None;\n  524 |         return Ok(());\n  525 |       }\n  526 |     }\n  527 | \n  528 |     if self.data_writer.is_some() {\n  529 |       self.send(Answer::new(ResultCode::DataConnectionAlreadyOpen, \"Already listening...\")).await?;\n  530 |       return Ok(());\n  531 |     }\n  532 | \n  533 |     self.active_data_port = None;\n  534 | \n  535 |     let mut addr = self.local_addr;\n  536 |     addr.set_port(port);\n  537 |     let listener = TcpListener::bind(&addr).await?;\n  538 |     let port = listener.local_addr()?.port();\n  539 | \n  540 |     self\n  541 |       .send(Answer::new(ResultCode::ExtendedEnteringPassiveMode, &format!(\" (|||{}|)\", port,)))\n  542 |       .await?;\n  543 | \n  544 |     debug!(\"Waiting for data clients on port {}...\", port);\n  545 |     {\n  546 |       let (stream, _addr) = listener.accept().await?;\n  547 |       let (r, w) = stream.into_split();\n  548 | \n  549 |       self.data_writer = Some(w);\n  550 |       self.data_reader = Some(r);\n  551 |     }\n  552 | \n  553 |     Ok(())\n  554 |   }","lines":38}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"low","easy":false,"description":"rawdb::write_atomic() creates a temporary .part file and then renames it to final_path. If io::copy or sync_all fails after the file is created, the .part file is left on disk with no cleanup. The file handle is dropped (closing it) but the .part path is never deleted on error.","fix":"On error from io::copy or sync_all, delete the .part file with fs::remove_file before returning the error.","locations":[{"ref":"rawler/src/devtools/rawdb.rs:124-134","code":"  124 | fn write_atomic(final_path: &Path, mut reader: impl io::Read) -> io::Result<()> {\n  125 |   let mut tmp = final_path.as_os_str().to_owned();\n  126 |   tmp.push(\".part\");\n  127 |   let tmp = PathBuf::from(tmp);\n  128 |   {\n  129 |     let mut f = fs::File::create(&tmp)?;\n  130 |     io::copy(&mut reader, &mut f)?;\n  131 |     f.sync_all()?;\n  132 |   }\n  133 |   fs::rename(&tmp, final_path)\n  134 | }","lines":11}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"low","easy":false,"description":"In convert_raw_file(), if internal_convert() returns an error after the original_compress_thread has been spawned but before the thread is joined, the JoinHandle is dropped without joining. The spawned thread continues running in the background and its resources (file handle clone, CPU) are never reclaimed until the process exits.","fix":"Join the thread (ignoring its result) in an error path, or use a scoped thread.","locations":[{"ref":"rawler/src/dng/convert.rs:76-83","code":"   76 |   let original_compress_thread = if params.embedded {\n   77 |     let orig_source = rawfile.clone();\n   78 |     Some(std::thread::spawn(move || OriginalCompressed::compress(&mut orig_source.reader())))\n   79 |   } else {\n   80 |     None\n   81 |   };\n   82 | \n   83 |   internal_convert(&rawfile, dng, original_filename, original_compress_thread, params)","lines":8}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"extend_binary_floating_point() decrements wide_exponent in a loop for subnormal numbers: 'wide_exponent -= 1'. If the input narrow subnormal has enough leading zeros in the wide_fraction, this can underflow to u32::MAX (wrapping subtraction, because u32 arithmetic in Rust is checked in debug, panicking). Specifically, if WIDE::FRACTION_WIDTH is 23 and the narrow fraction is 1 (single bit), the loop runs up to 23 times, and the starting wide_exponent = (1 - NARROW::BIAS + WIDE::BIAS) can be zero for certain NARROW/WIDE combinations.","fix":"Add an underflow guard: break or return a zero/flush-to-zero result when wide_exponent reaches 0.","locations":[{"ref":"rawler/src/bits.rs:344-349","code":"  344 |       wide_exponent = (1 - NARROW::BIAS + WIDE::BIAS) as u32;\n  345 |       while 0 == (wide_fraction & (1 << WIDE::FRACTION_WIDTH)) {\n  346 |         wide_exponent -= 1;\n  347 |         wide_fraction <<= 1;\n  348 |       }\n  349 |       wide_fraction &= (1 << WIDE::FRACTION_WIDTH) - 1;","lines":6}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In decode_segment(), `bits + (j ^ 8)` where j iterates 0, 8, 16, 24 means the shifts applied to input bytes are 8, 0, 24, 16. For j=16 the shift is 24, and for j=24 the shift is 16. These are XOR-based byte reordering. Combined with the accumulation into `bitbuf: u64`, if `bits` starts at 0 and grows by 8 each step but j^8 can be 0 or 24 simultaneously, overflow in the intermediate `bits + (j^8)` as usize is theoretically possible if bits is large.","fix":"Add a comment explaining the XOR-shuffle intent and verify that bits+j^8 stays within u32 shift range.","locations":[{"ref":"rawler/src/decoders/dcr.rs:153-155","code":"  153 |         for j in (0..32).step_by(8) {\n  154 |           bitbuf += (input.get_u8() as u64) << (bits + (j ^ 8));\n  155 |         }","lines":3}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In NefDecoder::raw_image(), the total strip size is computed as 'let full_size: u32 = data.iter().copied().sum()'. The elements are u32 and the accumulator is inferred as u32, so summing many large strips silently overflows in release builds, causing a smaller-than-expected buffer subview and potential subsequent panics or corrupted decode.","fix":"Sum into u64: let full_size: u64 = data.iter().map(|&x| x as u64).sum(); and update the subsequent type usage.","locations":[{"ref":"rawler/src/decoders/nef.rs:220-221","code":"  220 |       let full_size: u32 = match fetch_tiff_tag!(raw, TiffCommonTag::StripByteCounts) {\n  221 |         Value::Long(data) => data.iter().copied().sum(),","lines":2}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In NefDecoder::get_wb() (WB version 0x204/0x205) and lensdata::from_makernote(), version bytes are parsed as 'buf[i] - b'0'' where b'0' is 48. If any of the first 4 bytes is less than 48 (malformed file), the subtraction wraps/panics in debug mode (u8 underflow). The same pattern appears in do_decode for v0/v1.","fix":"Validate that each byte is in b'0'..=b'9' before subtracting, or use a checked subtraction and return an error on invalid input.","locations":[{"ref":"rawler/src/decoders/nef.rs:441","code":"  441 |         version = (version << 4) + (levels.get_data()[i] - b'0') as u32;","lines":1},{"ref":"rawler/src/decoders/nef/lensdata.rs:62","code":"   62 |       version = (version << 4) + (buf[i] - b'0') as u32;","lines":1}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"preview_image(): `image.width() - x - borders[3] as u32` and `image.height() - y - borders[1] as u32` perform unsigned subtraction on u32. If the border values exceed the image dimensions the result wraps around, producing a huge width/height and an out-of-bounds crop.","fix":"Use checked_sub or clamp to avoid unsigned underflow before calling crop_imm.","locations":[{"ref":"rawler/src/decoders/pef.rs:179-181","code":"  179 |         let width = image.width() - x - borders[3] as u32;\n  180 |         let height = image.height() - y - borders[1] as u32;\n  181 |         return Ok(Some(image.crop_imm(x, y, width, height)));","lines":3}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In SrwDecoder::decode_srw3(), diff_bits_mode values can underflow (saturate to u32::MAX) in release mode when a diff-flag of 2 is applied and the current mode value is 0. The underflowed value then triggers the 'too many bits' panic check at line 436 - but in debug builds the underflow panics first with a less informative message.","fix":"Use saturating_sub(1) instead of plain subtraction: diff_bits[i] = diff_bits_mode[colornum][0].saturating_sub(1);","locations":[{"ref":"rawler/src/decoders/srw.rs:427","code":"  427 |                 diff_bits[i] = diff_bits_mode[colornum][0] - 1;","lines":1},{"ref":"rawler/src/decoders/srw.rs:436","code":"  436 |             if diff_bits[i] > bit_depth + 1 {","lines":1}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In cr3.rs integrate_cfa(), the col_offset is computed as `tile_col_idx * codec.tile_width` (line 737) while the row_offset as `tile_row_idx * codec.tile_width` (line 735). The row_offset should use tile_height, not tile_width. For non-square tile configurations this produces incorrect row offsets, writing plane data to wrong CFA positions.","fix":"Change line 735 to `let row_offset = tile_row_idx * codec.tile_height;`","locations":[{"ref":"rawler/src/decompressors/crx/decoder.rs:735-736","code":"  735 |   let row_offset = tile_row_idx * codec.tile_width;\n  736 |   // Offset from left","lines":2}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In iquant.rs, the `q_scale` calculation `Q_STEP_TBL[...] * (1 << (param.q_param / 6 + 26))` at line 103 can overflow a u32 in release mode when `param.q_param / 6 >= 6`. The comment at iquant.rs:150-158 in make_qstep acknowledges this exact problem for make_qstep but the same overflow exists in decode_line_with_iquantization for the older version (None branch) and is not fixed there.","fix":"Apply the same wrapping_shl fix used in make_qstep (line 158): `Q_STEP_TBL[...].wrapping_shl(param.q_param / 6 + 26)`","locations":[{"ref":"rawler/src/decompressors/crx/iquant.rs:103","code":"  103 |           Q_STEP_TBL[param.q_param as usize % 6] * (1 << (param.q_param / 6 + 26))","lines":1}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In rice.rs predict_k_param_max(), `new_k -= 1` is performed on a u32 without a zero-check. If new_k is already 0, this subtraction wraps to u32::MAX in release builds (debug builds panic). k_param is then used as a shift amount, causing large bit-reads.","fix":"Use saturating_sub(1): `new_k = new_k.saturating_sub(1);`","locations":[{"ref":"rawler/src/decompressors/crx/rice.rs:102-103","code":"  102 |     if value < ((1 << prev_k) >> 1) {\n  103 |       new_k -= 1;","lines":2}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"rect_to_dng_area() in dng/mod.rs casts usize coordinates to u16 without range checking. For images larger than 65535 pixels in any dimension (common in modern sensors), the cast silently truncates, producing wrong ActiveArea / DefaultCropOrigin / DefaultCropSize values in the output DNG.","fix":"Return [u32; 4] (DNG supports 32-bit coordinates) or add explicit range assertions before casting.","locations":[{"ref":"rawler/src/dng/mod.rs:22-38","code":"   22 | pub fn rect_to_dng_area(area: &Rect) -> [u16; 4] {\n   23 |   [\n   24 |     area.p.y as u16,\n   25 |     area.p.x as u16,\n   26 |     area.p.y as u16 + area.d.h as u16,\n   27 |     area.p.x as u16 + area.d.w as u16,\n   28 |   ]\n   29 |   /*\n   30 |   [\n   31 |     image.crops[0] as u16, // top\n   32 |     image.crops[3] as u16, // left\n   33 |     //(image.height-image.crops[0]-image.crops[2]) as u16, // bottom\n   34 |     //(image.width-image.crops[1]-image.crops[3]) as u16, // Right\n   35 |     (image.height - (image.crops[2])) as u16, // bottom coord\n   36 |     (image.width - (image.crops[1])) as u16,  // Right coord\n   37 |   ]\n   38 |   */","lines":17}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In dng/writer.rs write_rawimage(), DefaultCropOrigin and DefaultCropSize are written as [u16; 2]. For sensors wider/taller than 65535, the subtraction `crop.p.x - active_area.p.x` is computed in usize and then cast to u16, silently truncating for any coordinate > 65535.","fix":"Use u32 tags (DNG spec allows it) or validate that coordinates fit in u16 and return an error otherwise.","locations":[{"ref":"rawler/src/dng/writer.rs:201-215","code":"  201 |         self.ifd_mut().add_tag(\n  202 |           DngTag::DefaultCropOrigin,\n  203 |           [(crop.p.x - active_area.p.x) as u16, (crop.p.y - active_area.p.y) as u16],\n  204 |         );\n  205 |         self.ifd_mut().add_tag(DngTag::DefaultCropSize, [crop.d.w as u16, crop.d.h as u16]);\n  206 |       }\n  207 |       CropMode::Best => {\n  208 |         let crop = rawimage.crop_area.unwrap_or(active_area);\n  209 |         assert!(crop.p.x >= active_area.p.x);\n  210 |         assert!(crop.p.y >= active_area.p.y);\n  211 |         self.ifd_mut().add_tag(\n  212 |           DngTag::DefaultCropOrigin,\n  213 |           [(crop.p.x - active_area.p.x) as u16, (crop.p.y - active_area.p.y) as u16],\n  214 |         );\n  215 |         self.ifd_mut().add_tag(DngTag::DefaultCropSize, [crop.d.w as u16, crop.d.h as u16]);","lines":15}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"entry.rs parse() computes bytesize as (count as usize) << DATASHIFTS[compat_typ as usize]. For a count near usize::MAX / 8 with shift 3 (RATIONAL/SRATIONAL/DOUBLE/LONG), this left-shift overflows on 32-bit targets, leading to an allocation of a tiny buffer and then an out-of-bounds read.","fix":"Use checked_shl or saturating_shl and return an error on overflow.","locations":[{"ref":"rawler/src/formats/tiff/entry.rs:90","code":"   90 |     let bytesize: usize = (count as usize) << DATASHIFTS[compat_typ as usize];","lines":1}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"entry.rs parse() counts Rational entries as count * 2 u32 values (line 147: vec![0; count as usize * 2]). If count is close to usize::MAX / 2 this multiplication overflows on 32-bit platforms, causing a mis-sized allocation.","fix":"Use count.checked_mul(2).ok_or(...)? before allocating.","locations":[{"ref":"rawler/src/formats/tiff/entry.rs:147","code":"  147 |         let mut tmp = vec![0; count as usize * 2]; // Rational is 2x u32","lines":1}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"reader.rs EndianReader::position() also casts stream_position() from u64 to u32 (line 285). Same truncation risk for large files or embedded TIFFs at high offsets.","fix":"Use u32::try_from and return an error.","locations":[{"ref":"rawler/src/formats/tiff/reader.rs:284-286","code":"  284 |   pub fn position(&mut self) -> Result<u32> {\n  285 |     Ok(self.inner.stream_position().map(|v| v as u32)?)\n  286 |   }","lines":3}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"writer.rs TiffWriter::position() casts stream_position() from u64 to u32 with a plain 'as' cast (line 137). For files larger than 4 GiB this silently truncates the offset, causing all subsequent seeks and offset records to be wrong. This affects all TIFF files written by this code.","fix":"Use u32::try_from(pos).map_err(|_| TiffError::Overflow(...))? and propagate the error.","locations":[{"ref":"rawler/src/formats/tiff/writer.rs:137","code":"  137 |     Ok(self.writer.stream_position().map(|v| v as u32)?) // TODO: try_from?","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"DngVersion enum variants V1_2 and V1_3 have their DNG byte arrays swapped in `as_dng_value`. `DngVersion::V1_3` maps to `dng::DNG_VERSION_V1_2` and `DngVersion::V1_2` maps to `dng::DNG_VERSION_V1_3`. This means selecting version 1.2 on the CLI produces a 1.3 DNG and vice versa.","fix":"Swap the match arms: `DngVersion::V1_2 => dng::DNG_VERSION_V1_2` and `DngVersion::V1_3 => dng::DNG_VERSION_V1_3`.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/makedng.rs:683-691","code":"  683 |       DngVersion::V1_0 => dng::DNG_VERSION_V1_0,\n  684 |       DngVersion::V1_1 => dng::DNG_VERSION_V1_1,\n  685 |       DngVersion::V1_3 => dng::DNG_VERSION_V1_2,\n  686 |       DngVersion::V1_2 => dng::DNG_VERSION_V1_3,\n  687 |       DngVersion::V1_4 => dng::DNG_VERSION_V1_4,\n  688 |       DngVersion::V1_5 => dng::DNG_VERSION_V1_5,\n  689 |       DngVersion::V1_6 => dng::DNG_VERSION_V1_6,\n  690 |     }\n  691 |   }","lines":9}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `client.rs` `stor()`, the path-traversal check `invalid_path(&path)` (line 628) operates on the *relative* path supplied by the client, before joining it with `self.cwd`. However, the actual file is written at `self.server_root.join(path.iter().skip(1))` inside `put_file` (line 656), which only strips the first component. If the client first uses CWD to navigate to a deep directory and then sends `STOR ../../../etc/passwd`, the relative `path` passed to `invalid_path` might not contain `..` but the joined path can still escape. Additionally `invalid_path` only checks for `Component::ParentDir` in the path itself, not in `self.cwd`.","fix":"After constructing the full server filesystem path in `put_file`, call `canonicalize` on the parent and verify it still starts with `server_root`, analogous to `complete_path`.","locations":[{"ref":"embedftp/src/client.rs:625-652","code":"  625 |   async fn stor(&mut self, path: PathBuf) -> Result<()> {\n  626 |     self.initiate_data_connection().await?;\n  627 |     if self.data_reader.is_some() {\n  628 |       if invalid_path(&path) {\n  629 |         return Err(Error::Io(io::ErrorKind::PermissionDenied.into()));\n  630 |       }\n  631 |       let path = self.cwd.join(path);\n  632 |       self\n  633 |         .send(Answer::new(ResultCode::DataConnectionAlreadyOpen, \"Starting to send file...\"))\n  634 |         .await?;\n  635 |       let data = self.receive_data().await?;\n  636 |       info!(\"Received file: {:?}, {} bytes\", path, data.len());\n  637 |       self.close_data_connection();\n  638 |       match self.put_file(path, Arc::new(data)).await {\n  639 |         Ok(_) => {\n  640 |           self.send(Answer::new(ResultCode::ClosingDataConnection, \"Transfer done\")).await?;\n  641 |         }\n  642 |         Err(e) => {\n  643 |           error!(\"Failed STOR command: {:?}\", e);\n  644 |           self.send(Answer::new(ResultCode::LocalErrorInProcessing, \"Failed to store the file\")).await?;\n  645 |         }\n  646 |       }\n  647 |     } else {\n  648 |       warn!(\"No opened data connection\");\n  649 |       self.send(Answer::new(ResultCode::ConnectionClosed, \"No opened data connection\")).await?;\n  650 |     }\n  651 |     Ok(())\n  652 |   }","lines":28},{"ref":"embedftp/src/client.rs:655-663","code":"  655 |   async fn put_file(&mut self, path: PathBuf, content: Arc<Vec<u8>>) -> Result<()> {\n  656 |     let path = PathBuf::from(&self.server_root).join(path.iter().skip(1).collect::<PathBuf>());\n  657 |     let handled = self.env.stor_file(&path, content.clone())?;\n  658 |     if !handled {\n  659 |       let mut file = File::create(path)?;\n  660 |       file.write_all(&content)?;\n  661 |     }\n  662 |     Ok(())\n  663 |   }","lines":9},{"ref":"embedftp/src/client.rs:709-717","code":"  709 | /// Check if the path contains \"..\"\n  710 | fn invalid_path(path: &Path) -> bool {\n  711 |   for component in path.components() {\n  712 |     if let Component::ParentDir = component {\n  713 |       return true;\n  714 |     }\n  715 |   }\n  716 |   false\n  717 | }","lines":9}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In ArwDecoder::image_a100(), the WBG block White Balance parsing reads offset +14 for BOTH G1 (wb_coeffs[1]) and G2 (wb_coeffs[2]). The G2 green channel should be at offset +16. Because both G channels end up identical, the green averaging in normalize_wb produces a trivially correct 1.0 and the actual G2 value from offset 16 is silently dropped, potentially producing incorrect white balance.","fix":"Change wb_coeffs[2] = LEu16(buf, currpos + 14) to wb_coeffs[2] = LEu16(buf, currpos + 16) to correctly read the G2 channel.","locations":[{"ref":"rawler/src/decoders/arw.rs:358-361","code":"  358 |         wb_coeffs[0] = LEu16(buf, currpos + 12) as f32;\n  359 |         wb_coeffs[1] = LEu16(buf, currpos + 14) as f32;\n  360 |         wb_coeffs[2] = LEu16(buf, currpos + 14) as f32;\n  361 |         wb_coeffs[3] = LEu16(buf, currpos + 18) as f32;","lines":4}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In colordata.rs, the Undefined value branch at line 47 returns an error for any version other than -4 and -3 ('Unknown2 COLORDATA version'). However, the same versions -4 and -3 are also handled identically in the Short branch below (lines 97-99). If Canon cameras produce Short-type entries for these models, they fall through to version matching and work fine. But for Undefined-type entries of any other version (which real cameras do produce), the function fails when it could fall through to the commented-out length-based matching. The Undefined branch is therefore incomplete and will reject valid data.","fix":"Extend the Undefined branch match to include all other known versions (1, 2, 3, ..., 48, 64, 65, 66), mirroring the Short branch logic.","locations":[{"ref":"rawler/src/decoders/cr2/colordata.rs:41-49","code":"   41 |       Ok(match version {\n   42 |         // -4 (M100/M5/M6)\n   43 |         -4 => ColorData::new(data, version, 0x47, Some(0x14d), Some(0x0569), Some(0x056a)),\n   44 |         // -3 (M10/M3)\n   45 |         -3 => ColorData::new(data, version, 0x47, Some(0x108), None, None),\n   46 | \n   47 |         _ => return Err(format!(\"Unknown2 COLORDATA version: {}\", data[0]).into()),\n   48 |       })\n   49 | ","lines":9}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In rotate_image(), the comment on line 606 acknowledges a bug: `active_area[2]` and `active_area[3]` are used in reverse order for cropheight. The code subtracts active_area[3] (which should be top/bottom) from height, but active_area is [left, top, right, bottom] by convention, so cropheight should use active_area[3] not active_area[2].","fix":"Verify the active_area layout. If it is [left, top, right, bottom] then: cropwidth = width - active_area[2] - active_area[0]; cropheight = height - active_area[3] - active_area[1].","locations":[{"ref":"rawler/src/decoders/raf.rs:602-606","code":"  602 |     if let Some(active_area) = self.camera.active_area {\n  603 |       let x = active_area[0];\n  604 |       let y = active_area[1];\n  605 |       let cropwidth = width - active_area[2] - x;\n  606 |       let cropheight = height - active_area[3] - y; // TODO: bug, invalid order of crop index","lines":5}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In decode_panasonic(), raw_format values 3 and 4 both call decode_panasonic_v4 (lines 360-361). This is almost certainly a copy-paste bug: format 3 and format 4 are treated identically. If they differ in behavior, one branch is wrong.","fix":"Verify the Panasonic format specification to determine if format 3 and format 4 actually use the same decoder.","locations":[{"ref":"rawler/src/decoders/rw2.rs:359-361","code":"  359 |     Ok(match raw_format {\n  360 |       3 => decode_panasonic_v4(buf, width, height, split, dummy),\n  361 |       4 => decode_panasonic_v4(buf, width, height, split, dummy),","lines":3}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`JpegXLDecompressor::decompress` contains broken `skip_rows` logic. The outer loop does\n`for line in lines.skip(skip_rows)` which skips `skip_rows` entries from the *output*\niterator, leaving those output rows uninitialised. Meanwhile, the inner `while skip_rows\n> 0` loop consumes rows from the JXL stream to discard them, but only runs during the\n*first* output line (because `skip_rows` reaches 0 after the first iteration). The result\nis that the output rows at indices 0..skip_rows-1 are never filled, and the remaining\noutput rows receive incorrect data from the stream.\n\nThis is currently latent because `can_skip_rows()` returns `false`, so `decode_strips`\nalways calls with `skip_rows=0`. However, if `can_skip_rows` is ever changed to `true`,\nor if the function is called directly with non-zero `skip_rows`, the bug activates.","fix":"Consume and discard `skip_rows` rows from the stream *before* the output loop, without using `lines.skip()`. For example: `for _ in 0..skip_rows { stream.write_to_buffer(&mut tmp); }` followed by a plain `for line in lines` loop.","locations":[{"ref":"rawler/src/decompressors/jpegxl.rs:62-88","code":"   62 |       8 => {\n   63 |         let mut tmp = vec![0_u8; line_width];\n   64 | \n   65 |         for line in lines.skip(skip_rows) {\n   66 |           while skip_rows > 0 {\n   67 |             let written = stream.write_to_buffer(&mut tmp);\n   68 |             assert_eq!(line.len(), written);\n   69 |             skip_rows -= 1;\n   70 |           }\n   71 |           let written = stream.write_to_buffer(&mut tmp);\n   72 |           assert_eq!(line.len(), written);\n   73 |           for (p, x) in line.iter_mut().zip(tmp.iter()) {\n   74 |             *p = *x as u16; // Only change storage format, you MUST NOT scale up!\n   75 |           }\n   76 |         }\n   77 |       }\n   78 |       9..=16 => {\n   79 |         for line in lines.skip(skip_rows) {\n   80 |           while skip_rows > 0 {\n   81 |             let written = stream.write_to_buffer(line);\n   82 |             assert_eq!(line.len(), written);\n   83 |             skip_rows -= 1;\n   84 |           }\n   85 |           let written = stream.write_to_buffer(line);\n   86 |           assert_eq!(line.len(), written);\n   87 |         }\n   88 |       }","lines":27}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"decompress() returns the length of the LAST chunk only, not the total decompressed size. The variable `total` is overwritten on every iteration instead of being accumulated with `total += buf.len()`.","fix":"Change `total = buf.len()` to `total += buf.len()`.","locations":[{"ref":"rawler/src/dng/original.rs:71","code":"   71 |       total = buf.len();","lines":1}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"entry.rs parse() does not seek past the inline data when bytesize <= 4. For inline (embedded) entries, it calls reader.goto(base + offset) where offset = reader.position() - base (the current stream position minus base). This correctly points to the inline data bytes, reads them, then seeks to pos + 12 to advance. However, when bytesize <= 4 and the entry type is unknown (the x arm, lines 228-236), it also reads from the inline position, which is correct. The real issue is that reader.goto(base + offset) when offset = reader.position() - base means it seeks back to exactly the current position - so no actual seek occurs for inline data. This is correct by accident but the comment \"offset for reader\" is misleading.","fix":"Rename or document the embedded field more clearly to reflect its dual role (inline data value vs. file offset for large data).","locations":[{"ref":"rawler/src/formats/tiff/entry.rs:91-95","code":"   91 |     let offset: u32 = if bytesize <= 4 {\n   92 |       reader.position()? - base\n   93 |     } else {\n   94 |       apply_corr(reader.read_u32()?, corr)\n   95 |     };","lines":5},{"ref":"rawler/src/formats/tiff/entry.rs:33-35","code":"   33 |   // Embedded value for writer, offset for reader\n   34 |   // This is only None when building an IFD for writing.\n   35 |   pub embedded: Option<u32>, // TODO: rename it","lines":3}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"ResolutionUnit::extract() reads from TiffCommonTag::Predictor instead of TiffCommonTag::ResolutionUnit. This means calling ResolutionUnit::extract() on an IFD will silently return the Predictor tag value (or None if Predictor is absent), never the actual resolution unit.","fix":"Change the tag in ResolutionUnit::extract() from TiffCommonTag::Predictor to TiffCommonTag::ResolutionUnit.","locations":[{"ref":"rawler/src/formats/tiff/mod.rs:195-204","code":"  195 |     let tag = TiffCommonTag::Predictor;\n  196 |     if let Some(entry) = ifd.get_entry(tag) {\n  197 |       let x = entry.value.force_u16(0);\n  198 |       Ok(Some(\n  199 |         Self::n(x).ok_or_else(|| TiffError::General(format!(\"Unknown value {} for {:?}\", x, tag)))?,\n  200 |       ))\n  201 |     } else {\n  202 |       Ok(None)\n  203 |     }\n  204 |   }","lines":10}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `extract.rs` `get_original_name()`, the function indexes `orig_name.strings()[0]` without checking if the strings slice is non-empty. If the DNG tag exists but has an empty ASCII value array, this will panic.","fix":"Use `.strings().first().cloned()` and return `None` when the slice is empty.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/extract.rs:138-148","code":"  138 | fn get_original_name(file: &GenericTiffReader) -> Option<String> {\n  139 |   if let Some(Entry {\n  140 |     value: Value::Ascii(orig_name),\n  141 |     ..\n  142 |   }) = file.get_entry(DngTag::OriginalRawFileName)\n  143 |   {\n  144 |     Some(orig_name.strings()[0].clone())\n  145 |   } else {\n  146 |     None\n  147 |   }\n  148 | }","lines":11}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `makedng.rs` `makedng()` (lines 44-53), when `makedng_internal` fails, the code attempts to remove `dest_path`. However `makedng_internal` creates and opens `dest_path` with `File::create` (line 78) and may have written partial data. The cleanup attempt calls `remove_file(dest_path)` and logs any error but returns the original error. If `makedng_internal` fails *before* creating the file (e.g. argument validation), `remove_file` will fail on a non-existent path and log a spurious error.","fix":"Only attempt cleanup if the file actually exists, or track whether the file was created inside `makedng_internal`.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/makedng.rs:44-53","code":"   44 |   match makedng_internal(options, dest_path).await {\n   45 |     Ok(_) => Ok(()),\n   46 |     Err(err) => {\n   47 |       if let Err(err) = remove_file(dest_path) {\n   48 |         log::error!(\"Failed to delete DNG file after decompress error: {:?}\", err);\n   49 |       }\n   50 |       Err(err)\n   51 |     }\n   52 |   }\n   53 | }","lines":10}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `makedng.rs`, when a 16-bit RGB input image is used and no linearization table is specified, the WhiteLevel tag is set to `[u16::MAX, u16::MAX, u16::MAX]` (line 148). This is the correct value, but the comment on line 146 still reads 'so from 8 bit image there is a maximum white level of 255', copied from the 8-bit branch directly above it. The comment is wrong and misleading.","fix":"Update the comment to say '16 bit image, maximum white level is 65535 (u16::MAX)'.","locations":[{"ref":"bin/dnglab/dnglab-lib/src/makedng.rs:144-149","code":"  144 |             frame.ifd_mut().add_tag(DngTag::LinearizationTable, linear_table_input);\n  145 |           } else {\n  146 |             // We have no linearization table, so from 8 bit image there is a maximum\n  147 |             // white level of 255.\n  148 |             frame.ifd_mut().add_tag(DngTag::WhiteLevel, [u16::MAX, u16::MAX, u16::MAX]);\n  149 |           }","lines":6}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `client.rs` `handle_cmd()`, `Command::Syst` is also reachable by unauthenticated clients (falls through to the outer match). While RFC 959 allows SYST before login, responding with the OS type leaks information. More importantly `Command::Feat` and `Command::NoOp` are also handled in the same outer block without any login check, which is inconsistent with the intent.","fix":"Decide explicitly which commands are allowed before login and restrict the rest.","locations":[{"ref":"embedftp/src/client.rs:158-231","code":"  158 |     match cmd {\n  159 |       Command::Auth => {\n  160 |         //warn!(\"Auth not implemented\");\n  161 |         self.send(Answer::new(ResultCode::CommandNotImplemented, \"Not implemented\")).await?\n  162 |       }\n  163 |       Command::Quit => self.quit().await?,\n  164 |       Command::Syst => {\n  165 |         self.send(Answer::new(ResultCode::SystemType, \"UNIX Type: L8\")).await?;\n  166 |       }\n  167 |       Command::Type(typ) => {\n  168 |         self.transfer_type = typ;\n  169 |         self.send(Answer::new(ResultCode::Ok, \"Transfer type changed successfully\")).await?;\n  170 |       }\n  171 |       Command::User(content) => {\n  172 |         if content.is_empty() {\n  173 |           self.send(Answer::new(ResultCode::InvalidParameterOrArgument, \"Invalid username\")).await?;\n  174 |         } else {\n  175 |           let mut name = None;\n  176 |           let mut pass_required = true;\n  177 | \n  178 |           if self.config.anonymous && content == \"anonymous\" {\n  179 |             name = Some(content.clone());\n  180 |           }\n  181 | \n  182 |           if name.is_none() {\n  183 |             for user in &self.config.users {\n  184 |               if user.name == content {\n  185 |                 name = Some(content.clone());\n  186 |                 pass_required = !user.password.is_empty();\n  187 |                 break;\n  188 |               }\n  189 |             }\n  190 |           }\n  191 |           if name.is_none() {\n  192 |             self.send(Answer::new(ResultCode::NotLoggedIn, \"Unknown user...\")).await?;\n  193 |           } else {\n  194 |             self.name = name.clone();\n  195 |             if pass_required {\n  196 |               self.waiting_password = true;\n  197 |               self\n  198 |                 .send(Answer::new(\n  199 |                   ResultCode::UserNameOkayNeedPassword,\n  200 |                   &format!(\n  201 |                     \"Login OK, password needed for {}\",\n  202 |                     name.as_deref().expect(\"name verified as Some in else branch\")\n  203 |                   ),\n  204 |                 ))\n  205 |                 .await?;\n  206 |             } else {\n  207 |               self.waiting_password = false;\n  208 |               self.send(Answer::new(ResultCode::UserLoggedIn, &format!(\"Welcome {}!\", content))).await?;\n  209 |             }\n  210 |           }\n  211 |         }\n  212 |       }\n  213 |       Command::Feat => {\n  214 |         let features = [String::from(\"UTF8\")];\n  215 |         self.send(Answer::new_multiline(ResultCode::SystemStatus, \"Feature list\", &features)).await?;\n  216 |       }\n  217 |       Command::NoOp => self.send(Answer::new(ResultCode::Ok, \"Doing nothing\")).await?,\n  218 |       Command::Unknown(s) => {\n  219 |         warn!(\"Unknown command\");\n  220 |         self\n  221 |           .send(Answer::new(ResultCode::UnknownCommand, &format!(\"\\\"{}\\\": Not implemented\", s)))\n  222 |           .await?\n  223 |       }\n  224 |       _ => {\n  225 |         warn!(\"Please login first\");\n  226 |         // It means that the user tried to send a command while they weren't logged yet.\n  227 |         self.send(Answer::new(ResultCode::NotLoggedIn, \"Please log first\")).await?;\n  228 |       }\n  229 |     }\n  230 |     Ok(())\n  231 |   }","lines":74}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `client.rs` `handle_cmd()`, the `Command::Type` arm is handled in the fall-through `match cmd` block (lines 167-169), which is reached regardless of whether the user is logged in. A non-authenticated client can change the transfer type.","fix":"Move `Command::Type` handling inside the `if self.is_logged()` branch.","locations":[{"ref":"embedftp/src/client.rs:158-231","code":"  158 |     match cmd {\n  159 |       Command::Auth => {\n  160 |         //warn!(\"Auth not implemented\");\n  161 |         self.send(Answer::new(ResultCode::CommandNotImplemented, \"Not implemented\")).await?\n  162 |       }\n  163 |       Command::Quit => self.quit().await?,\n  164 |       Command::Syst => {\n  165 |         self.send(Answer::new(ResultCode::SystemType, \"UNIX Type: L8\")).await?;\n  166 |       }\n  167 |       Command::Type(typ) => {\n  168 |         self.transfer_type = typ;\n  169 |         self.send(Answer::new(ResultCode::Ok, \"Transfer type changed successfully\")).await?;\n  170 |       }\n  171 |       Command::User(content) => {\n  172 |         if content.is_empty() {\n  173 |           self.send(Answer::new(ResultCode::InvalidParameterOrArgument, \"Invalid username\")).await?;\n  174 |         } else {\n  175 |           let mut name = None;\n  176 |           let mut pass_required = true;\n  177 | \n  178 |           if self.config.anonymous && content == \"anonymous\" {\n  179 |             name = Some(content.clone());\n  180 |           }\n  181 | \n  182 |           if name.is_none() {\n  183 |             for user in &self.config.users {\n  184 |               if user.name == content {\n  185 |                 name = Some(content.clone());\n  186 |                 pass_required = !user.password.is_empty();\n  187 |                 break;\n  188 |               }\n  189 |             }\n  190 |           }\n  191 |           if name.is_none() {\n  192 |             self.send(Answer::new(ResultCode::NotLoggedIn, \"Unknown user...\")).await?;\n  193 |           } else {\n  194 |             self.name = name.clone();\n  195 |             if pass_required {\n  196 |               self.waiting_password = true;\n  197 |               self\n  198 |                 .send(Answer::new(\n  199 |                   ResultCode::UserNameOkayNeedPassword,\n  200 |                   &format!(\n  201 |                     \"Login OK, password needed for {}\",\n  202 |                     name.as_deref().expect(\"name verified as Some in else branch\")\n  203 |                   ),\n  204 |                 ))\n  205 |                 .await?;\n  206 |             } else {\n  207 |               self.waiting_password = false;\n  208 |               self.send(Answer::new(ResultCode::UserLoggedIn, &format!(\"Welcome {}!\", content))).await?;\n  209 |             }\n  210 |           }\n  211 |         }\n  212 |       }\n  213 |       Command::Feat => {\n  214 |         let features = [String::from(\"UTF8\")];\n  215 |         self.send(Answer::new_multiline(ResultCode::SystemStatus, \"Feature list\", &features)).await?;\n  216 |       }\n  217 |       Command::NoOp => self.send(Answer::new(ResultCode::Ok, \"Doing nothing\")).await?,\n  218 |       Command::Unknown(s) => {\n  219 |         warn!(\"Unknown command\");\n  220 |         self\n  221 |           .send(Answer::new(ResultCode::UnknownCommand, &format!(\"\\\"{}\\\": Not implemented\", s)))\n  222 |           .await?\n  223 |       }\n  224 |       _ => {\n  225 |         warn!(\"Please login first\");\n  226 |         // It means that the user tried to send a command while they weren't logged yet.\n  227 |         self.send(Answer::new(ResultCode::NotLoggedIn, \"Please log first\")).await?;\n  228 |       }\n  229 |     }\n  230 |     Ok(())\n  231 |   }","lines":74}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `client.rs` `epsv()`, when the parameter is the literal string `\"ALL\"` the method sets `self.data_writer = None` and returns `Ok(())` without sending any response to the client. Per RFC 2428 the server must reply with code 229 after `EPSV ALL` (or 200/502). Returning silently breaks the FTP protocol handshake.","fix":"Send an appropriate reply (e.g. `ResultCode::Ok` or `ResultCode::CommandNotImplemented`) before returning.","locations":[{"ref":"embedftp/src/client.rs:521-525","code":"  521 |     if let Some(proto) = proto {\n  522 |       if proto.to_uppercase().eq(\"ALL\") {\n  523 |         self.data_writer = None;\n  524 |         return Ok(());\n  525 |       }","lines":5}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"LookupTable::new() computes base = center - ((upper - lower + 2) / 4). Since all values are u16, the subtraction 'center - ...' wraps if the result would be negative, silently producing a large base value and a corrupted dither output instead of clamping to zero.","fix":"Use saturating_sub: let base = center.saturating_sub((upper - lower + 2) / 4);","locations":[{"ref":"rawler/src/bits.rs:222-223","code":"  222 |       let base = if center == 0 { 0 } else { center - ((upper - lower + 2) / 4) };\n  223 |       let delta = upper - lower;","lines":2}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"CFA::color_at() and cfa_color_at() use (row + 48) % 48 and (col + 48) % 48 to index into the pattern array. This only works when row < 96 and col < 96. For rows or columns >= 96, (row + 48) overflows modular arithmetic and returns the wrong pattern cell. The comment says 'designed to be fast for inner loops' but the modulo trick silently gives wrong results for large coordinates.","fix":"Use row % self.height and col % self.width (with early return for empty CFA), or row % 48 and col % 48 which is correct for the 48x48 pre-expanded table without the +48 bias.","locations":[{"ref":"rawler/src/cfa.rs:167-176","code":"  167 |   pub fn color_at(&self, row: usize, col: usize) -> usize {\n  168 |     self.pattern[(row + 48) % 48][(col + 48) % 48] as usize\n  169 |   }\n  170 | \n  171 |   /// from inner loops without performance issues.\n  172 |   pub fn cfa_color_at(&self, row: usize, col: usize) -> CFAColor {\n  173 |     (self.pattern[(row + 48) % 48][(col + 48) % 48])\n  174 |       .try_into()\n  175 |       .expect(\"invalid CFA color value in pattern\")\n  176 |   }","lines":10}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"CFA::unique_colors() iterates over all 48x48 cells of the pre-expanded pattern array rather than just the self.height x self.width repeating tile. For a 2x2 RGGB pattern it still counts duplicates from 2304 cells, which accidentally still gives the correct unique count, but the implementation intent is misleading and wastes work. For an empty CFA (width == 0 or height == 0) the full array is scanned, returning up to 256 unique zeros which would be reported as 1.","fix":"Iterate only over pattern[..self.height][..self.width] and handle the empty case explicitly.","locations":[{"ref":"rawler/src/cfa.rs:191-193","code":"  191 |   pub fn unique_colors(&self) -> usize {\n  192 |     self.pattern.iter().flatten().unique().count()\n  193 |   }","lines":3}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"char_slice_to_string() always returns Some(...) even for an empty slice (it would return Some(\"\")). The caller at line 35 uses unwrap_or(\"\") unnecessarily. More importantly, if the buf does not contain a null terminator within 30 bytes the entire 30-byte slice is used as the model name without truncation.","fix":"The function is correct (it stops at null), but the comment about its behavior should be added. Also check: if the buffer has no null, chars past legitimate data are included.","locations":[{"ref":"rawler/src/decoders/ari.rs:35","code":"   35 |     let model = String::from_utf8_lossy(buffer).split_terminator('\\0').next().unwrap_or(\"\").to_string();","lines":1},{"ref":"rawler/src/decoders/ari.rs:102-104","code":"  102 | fn char_slice_to_string(buf: &[u8]) -> Option<String> {\n  103 |   Some(buf.iter().take_while(|&&c| c != 0).map(|&c| char::from(c)).collect())\n  104 | }","lines":3}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In crw.rs get_wb(), when CiffTag::ColorInfo1 is found and the camera has the wb_mangle hint, the green channel (index 1) and blue channel (index 2) are assigned the same value: `cinfo.get_force_u16(off + 0) ^ key[0]`. Index 0 is used for both channels 1 and 2. This is likely a copy-paste error; channel 2 should use a different offset (probably off+1 swapped with off+0 in a different order).","fix":"Verify against libraw/dcraw reference: channels 1 and 2 should use distinct offsets. Likely fix is `cinfo.get_force_u16(off + 1) ^ key[0]` for channel 2 or similar.","locations":[{"ref":"rawler/src/decoders/crw.rs:150-153","code":"  150 |         (cinfo.get_force_u16(off + 1) ^ key[1]) as f32,\n  151 |         (cinfo.get_force_u16(off + 0) ^ key[0]) as f32,\n  152 |         (cinfo.get_force_u16(off + 0) ^ key[0]) as f32,\n  153 |         (cinfo.get_force_u16(off + 2) ^ key[0]) as f32,","lines":4}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In decode_segment(), `lens[i + 1]` is accessed when i iterates 0..size with step_by(2), so the maximum i is size - 2 (for even size) or size - 1 (for odd size). However `lens[i]` uses peek_u8() and `lens[i+1]` uses get_u8(). When `size` is odd and `i == size - 1`, `lens[i+1]` writes to `lens[size]` which is in-bounds (lens is size 256), but the loop condition `i..size step_by 2` only runs i up to size-1 for odd size, so i+1 == size which would be out-of-bounds if size > 255.","fix":"Verify the maximum size value passed and add a bounds check on `size <= 255`.","locations":[{"ref":"rawler/src/decoders/dcr.rs:138-141","code":"  138 |     for i in (0..size).step_by(2) {\n  139 |       lens[i] = (input.peek_u8() & 15) as usize;\n  140 |       lens[i + 1] = (input.get_u8() >> 4) as usize;\n  141 |     }","lines":4}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"get_wb() accesses levels.get_data() at byte offsets 48 and 50, which assumes at least 52 bytes of data in the EpsonWB tag. The count check only verifies count == 256 (entries), but does not check the byte size of the tag data. If the tag stores 8-bit values, 256 entries is only 256 bytes, but BEu16 reads 2-byte values and offset 50 reads entry at index 25.","fix":"Add a check that the raw data slice is at least 52 bytes long before accessing it.","locations":[{"ref":"rawler/src/decoders/erf.rs:96-103","code":"   96 |     let levels = fetch_tiff_tag!(self.makernote, TiffCommonTag::EpsonWB);\n   97 |     if levels.count() != 256 {\n   98 |       Err(RawlerError::DecoderFailed(\"ERF: Levels count is off\".to_string()))\n   99 |     } else {\n  100 |       let r = BEu16(levels.get_data(), 48) as f32;\n  101 |       let b = BEu16(levels.get_data(), 50) as f32;\n  102 |       Ok([r * 508.0 * 1.078 / 65536.0, 1.0, b * 382.0 * 1.173 / 65536.0, f32::NAN])\n  103 |     }","lines":8}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In decode_compressed_sv2(), the error-recovery path (lines 1144-1157) re-uses the pump savepoint, but `prev_pix_value` is not reset before the re-decode loop. This means the recovery path computes deltas using the corrupted values from the first (failed) pass, producing incorrect pixel values.","fix":"Save and restore prev_pix_value along with the pump savepoint.","locations":[{"ref":"rawler/src/decoders/iiq.rs:1143-1157","code":" 1143 |               warn!(\"Error in IIQ Sv2 decompressor, run error recovery\");\n 1144 |               // restore pump\n 1145 |               pump = pump_savepoint;\n 1146 |               for i in 0..8 {\n 1147 |                 let value = if bit_check[i & 1] == 9 {\n 1148 |                   // Just get the value straight out the bit pump\n 1149 |                   pump.get_bits(14)\n 1150 |                 } else {\n 1151 |                   // Otherwise reconstruct the value\n 1152 |                   let tmp = prev_pix_value[i & 1] as i32 + (pump.get_bits(nbits) << corr[i & 1]) as i32 - diff[i & 1] as i32;\n 1153 |                   clamp(tmp as i32, 0, 0x3FFF) as u32\n 1154 |                 };\n 1155 |                 cluster[i] = (value as u16) << value_shift;\n 1156 |                 prev_pix_value[i & 1] = value;\n 1157 |               }","lines":15}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In get_decoder(), the JFIF branch only dispatches to MrwDecoder for 'Konica Minolta Photo Imaging, Inc.' make. Other makes within JFIF containers are silently ignored with only a warning log. This means files from other makes that embed RAW data in JFIF containers are not decoded.","fix":"Either document that only Minolta MRW-in-JFIF is supported, or dispatch to other decoders.","locations":[{"ref":"rawler/src/decoders/mod.rs:927-943","code":"  927 |     if jfif::is_exif(rawfile) {\n  928 |       let exif = jfif::Jfif::new(rawfile)?;\n  929 |       if let Some(make) = exif\n  930 |         .exif_ifd()\n  931 |         .and_then(|ifd| ifd.get_entry(TiffCommonTag::Make))\n  932 |         .and_then(|entry| entry.value.as_string().map(|s| s.as_str().trim_end()))\n  933 |       {\n  934 |         match make {\n  935 |           \"Konica Minolta Photo Imaging, Inc.\" => {\n  936 |             let dec = Box::new(mrw::MrwDecoder::new_jfif(rawfile, exif, self)?);\n  937 |             return Ok(dec as Box<dyn Decoder>);\n  938 |           }\n  939 |           _ => {\n  940 |             log::warn!(\"Unknown make for EXIF file: {}\", make);\n  941 |           }\n  942 |         }\n  943 |       }","lines":17}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"xmp_tag() parses XMP with naive string searching using xmp.find(). The start index is computed as `start + tag.len() + 7` where 7 is the length of `<tiff:>`. This calculation is correct only for single-char tag names. For longer names the calculation `start + tag.len() + 7` should give the position after `<tiff:{tag}>`, i.e., start + 7 + tag.len(). Since that is what the code computes, it may be correct, but the end boundary `end` points to the `<` of the closing tag, so the substring `xmp[start + tag.len() + 7..end]` would start after the opening tag and end before the closing tag. However, this only works if there is no whitespace or attributes in the tag. Corner cases will silently return wrong data.","fix":"Use a proper XMP/XML parser or add better boundary validation.","locations":[{"ref":"rawler/src/decoders/mos.rs:110-118","code":"  110 |   fn xmp_tag(tiff: &GenericTiffReader, tag: &str) -> Result<String> {\n  111 |     let xmp_bytes = fetch_tiff_tag!(tiff, TiffCommonTag::Xmp).get_data();\n  112 |     let xmp = String::from_utf8_lossy(xmp_bytes);\n  113 |     let error = format!(\"MOS: Couldn't find XMP tag {}\", tag);\n  114 |     let start = xmp.find(&format!(\"<tiff:{}>\", tag)).ok_or_else(|| error.clone())?;\n  115 |     let end = xmp.find(&format!(\"<\/tiff:{}>\", tag)).ok_or(error)?;\n  116 | \n  117 |     Ok(xmp[start + tag.len() + 7..end].to_string())\n  118 |   }","lines":9}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In get_mly_wb(), the MLY scanning loop reads 16-bit words from the full raw file buffer until `buf.position() < data_offset`. It uses a heuristic pattern match (wb[1]==256 && wb[3]==256 && ...) which is inherently fragile. Any random data matching this pattern would be accepted as a valid WB.","fix":"Document the known-good offset range or add additional validation to reduce false positives.","locations":[{"ref":"rawler/src/decoders/mrw.rs:84-100","code":"   84 |         let mut cam_mul = [1_u16; 4];\n   85 | \n   86 |         while buf.position() < data_offset {\n   87 |           wb[0] = wb[2];\n   88 |           wb[2] = wb[1];\n   89 |           wb[1] = wb[3];\n   90 |           wb[3] = match buf.read_u16::<byt
