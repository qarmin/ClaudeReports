<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":false,"description":"new_sensor_correction() panics with `panic!(\"No sensor calibration data found.\")` when IiqTag::SensorCorrection is missing from the makernotes. This means any IIQ file without sensor calibration data (which could be normal or a future format) will crash the process instead of returning an error.","fix":"Return a RawlerError::DecoderFailed or log a warning and return a default SensorCalibration with no corrections applied.","locations":[{"ref":"rawler/src/decoders/iiq.rs:907","code":"  907 |       _ => panic!(\"No sensor calibration data found.\"),","lines":1}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"BitArray::push() and pop() call panic!() directly for overflow and underflow. These panics are unconditional and propagate to the calling thread with no opportunity for recovery, making callers that operate on untrusted bit-stream sizes vulnerable to crashes.","fix":"Return Result<(), BitArrayError> or Option from push/pop to allow callers to handle the error.","locations":[{"ref":"rawler/src/bitarray.rs:87-93","code":"   87 |     if self.is_full() {\n   88 |       panic!(\"BitArray is full\");\n   89 |     } else {\n   90 |       self.nbits += 1;\n   91 |       self.storage = self.storage | (T::from(bit) << (T::bit_size() - self.nbits));\n   92 |     }\n   93 |   }","lines":7},{"ref":"rawler/src/bitarray.rs:96-105","code":"   96 |     if self.is_empty() {\n   97 |       panic!(\"BitArray is empty\");\n   98 |     } else {\n   99 |       let mask = T::from(true) << (T::bit_size() - self.nbits);\n  100 |       let bit = self.storage & mask;\n  101 |       self.storage = self.storage & !mask;\n  102 |       self.nbits -= 1;\n  103 |       bit != T::from(false)\n  104 |     }\n  105 |   }","lines":10}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In ArwDecoder::raw_image(), when cpp is not 1 or 3, 'panic!(\"Unsupported cpp == {}\", cpp)' fires. This can be triggered by files with unexpected SamplesPerPixel values, causing an uncontrolled process termination instead of a handled error.","fix":"Return Err(RawlerError::DecoderFailed(format!(\"ARW: Unsupported cpp: {}\", cpp))) instead of panicking.","locations":[{"ref":"rawler/src/decoders/arw.rs:190","code":"  190 |       _ => panic!(\"Unsupported cpp == {}\", cpp),","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"correct_raw_flatfield() panics with `panic!(\"Unsupported flat field typ\")` for unknown flat field type values. Malformed or future format files with unknown type codes will panic.","fix":"Skip unknown types with a log warning instead of panicking.","locations":[{"ref":"rawler/src/decoders/iiq.rs:519-521","code":"  519 |         _ => {\n  520 |           panic!(\"Unsupported flat field typ\");\n  521 |         }","lines":3}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"For the DC120 model, `self.tiff.find_ifds_with_tag(TiffCommonTag::CFAPattern)[0]` uses direct index [0] without checking if the vector is non-empty. If no IFD with CFAPattern is found, this panics.","fix":"Use .first().ok_or_else(...) to propagate an error.","locations":[{"ref":"rawler/src/decoders/kdc.rs:68","code":"   68 |       let raw = self.tiff.find_ifds_with_tag(TiffCommonTag::CFAPattern)[0];","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"For the DC50 model, `self.tiff.find_ifds_with_tag(TiffCommonTag::CFAPattern)[0]` uses direct index [0] without checking if the vector is non-empty.","fix":"Use .first().ok_or_else(...) to propagate an error.","locations":[{"ref":"rawler/src/decoders/kdc.rs:93","code":"   93 |       let raw = self.tiff.find_ifds_with_tag(TiffCommonTag::CFAPattern)[0];","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"For general KDC: `if offset.count() < 13 { panic!(\"KDC Decoder: Couldn't find the KDC offset\"); }`. This panics on truncated or malformed files instead of returning an error.","fix":"Return a RawlerError::DecoderFailed instead of panicking.","locations":[{"ref":"rawler/src/decoders/kdc.rs:121-123","code":"  121 |     if offset.count() < 13 {\n  122 |       panic!(\"KDC Decoder: Couldn't find the KDC offset\");\n  123 |     }","lines":3}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In NefDecoder::raw_image(), 'assert_eq!(self.tiff.little_endian(), self.makernote.endian == Endian::Little)' fires on any NEF/NRW file where the TIFF and the embedded makernote use different endianness. This is a hard panic rather than a graceful error.","fix":"Replace with a proper error check: if self.tiff.little_endian() != (self.makernote.endian == Endian::Little) { return Err(...); }","locations":[{"ref":"rawler/src/decoders/nef.rs:232","code":"  232 |     assert_eq!(self.tiff.little_endian(), self.makernote.endian == Endian::Little);","lines":1}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In NefDecoder::raw_image(), 'assert_eq!(image.width, width * cpp)' panics if the decompressed image width does not match the expected width. This assertion fires for any decoder path that returns a differently-sized buffer and terminates the process instead of returning an error.","fix":"Replace with an error return: if image.width != width * cpp { return Err(RawlerError::DecoderFailed(...)); }","locations":[{"ref":"rawler/src/decoders/nef.rs:290","code":"  290 |     assert_eq!(image.width, width * cpp);","lines":1}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In NefDecoder::is_uncompressed(), when height == 0, the code reaches 'let per_row_padding = total_padding / height' (and 'total_padding % height'), which is integer division by zero and panics at runtime. A height of 0 is reachable from a crafted TIFF tag.","fix":"Add an early return None (or return Ok(None)) if height == 0 before entering the size-comparison logic.","locations":[{"ref":"rawler/src/decoders/nef.rs:554-565","code":"  554 |     } else if size >= req_input_bytes {\n  555 |       // Some models (D6) using row padding, so the row width is slightly larger.\n  556 |       // This should be no more than 16 extra bytes.\n  557 |       let total_padding = size - req_input_bytes;\n  558 |       let per_row_padding = total_padding / height;\n  559 |       if total_padding % height != 0 {\n  560 |         None\n  561 |       } else if per_row_padding < 16 {\n  562 |         Some(per_row_padding)\n  563 |       } else {\n  564 |         None\n  565 |       }","lines":12}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In NefDecoder::do_decode(), the line 'assert!(stream.remaining_bytes() >= 2110)' panics on any malformed NEF file where the metadata stream (NefMeta1 or NefMeta2) is shorter than 2112 bytes. This is triggered for files with v0==73 or v1==88 and is not converted into a recoverable error.","fix":"Replace the assert! with a length check that returns Err(RawlerError::DecoderFailed(...)).","locations":[{"ref":"rawler/src/decoders/nef.rs:599-602","code":"  599 |     if v0 == 73 || v1 == 88 {\n  600 |       assert!(stream.remaining_bytes() >= 2110);\n  601 |       stream.consume_bytes(2110);\n  602 |     }","lines":4}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In lensdata::from_makernote(), an unrecognized lens data version falls through to todo!(\"Lensdata version: 0x{:x} not implemented\"), which panics at runtime. This is triggered whenever a Nikon camera with a newer lens data format is encountered.","fix":"Return Ok(None) (treating the lens as unrecognized) or return Err(RawlerError::Unsupported(...)) instead of using todo!().","locations":[{"ref":"rawler/src/decoders/nef/lensdata.rs:98","code":"   98 |       _ => todo!(\"Lensdata version: 0x{:x} not implemented\", version),","lines":1}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Slice index out-of-bounds: data[0..9] is checked unconditionally even when data is shorter than 9 bytes. The earlier check only guarantees 5 bytes (data[0..5]), and the data[0..7] check only guarantees 7 bytes. If the MakerNote blob is 5-8 bytes long the data[0..9] access panics.","fix":"Guard each slice comparison with a prior length check: `data.len() >= 9 && data[0..9] == b\"OM SYSTEM\"[..]`.","locations":[{"ref":"rawler/src/decoders/orf.rs:60-67","code":"   60 |         if data[0..5] == b\"OLYMP\"[..] {\n   61 |           off += 8;\n   62 |           if data[0..7] == b\"OLYMPUS\"[..] {\n   63 |             off += 4;\n   64 |           }\n   65 |         }\n   66 |         // OM Digital Solutions put their name in front of the TIFF structure, too\n   67 |         if data[0..9] == b\"OM SYSTEM\"[..] {","lines":8}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"preview_image() falls through to todo!() at line 187 when `image` is None (i.e., when len or offset is 0). Any camera with a missing preview will panic at runtime.","fix":"Replace the trailing `todo!()` with `Ok(None)` to return gracefully when no preview is available.","locations":[{"ref":"rawler/src/decoders/pef.rs:163-188","code":"  163 |         } else {\n  164 |           None\n  165 |         }\n  166 |       }\n  167 |       _ => todo!(),\n  168 |     };\n  169 | \n  170 |     if let Some(image) = image {\n  171 |       // This tag contains the border definitions for the preview image.\n  172 |       // We cut away these black borders.\n  173 |       if let Some(Entry {\n  174 |         value: Value::Byte(borders), ..\n  175 |       }) = self.makernote.get_entry(PefMakernote::PreviewImageBorders)\n  176 |       {\n  177 |         let y = borders[0] as u32;\n  178 |         let x = borders[2] as u32;\n  179 |         let width = image.width() - x - borders[3] as u32;\n  180 |         let height = image.height() - y - borders[1] as u32;\n  181 |         return Ok(Some(image.crop_imm(x, y, width, height)));\n  182 |       } else {\n  183 |         return Ok(Some(image));\n  184 |       }\n  185 |     }\n  186 | \n  187 |     todo!()\n  188 |   }","lines":26}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"read_code() panics with `panic!(\"Invalid code: {}\", code)` when the decoded code value is out of range. Malformed or truncated compressed data can trigger this panic through normal file parsing.","fix":"Return a Result error instead of panicking, propagating the error up through the decompression stack.","locations":[{"ref":"rawler/src/decoders/raf/fuji_decompressor.rs:918-920","code":"  918 |   if code < 0 || code >= q_table.total_values as i32 {\n  919 |     panic!(\"Invalid code: {}\", code);\n  920 |   }","lines":3}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"HuffmanDecoder::get_next() panics with an explicit panic!() when the input bit pattern does not match any Huffman symbol. Malformed file data can trigger this.","fix":"Return a Result::Err instead of panicking.","locations":[{"ref":"rawler/src/decoders/rw2/v8decompressor.rs:241-243","code":"  241 |     } else {\n  242 |       panic!(\"Input value {:016b} starts not with a valid huffman symbol\", next_bits);\n  243 |     }","lines":3}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"decode_unwrapped() explicitly panics with `panic!(\"Trying an image larger than 64x64\")` and `panic!(\"Trying an SRF style image that's too big\")`. While these panic messages are defensive, they contradict the caller which wraps them with catch_unwind. The panic is still observable as a DecoderFailed error, but using explicit panics for these checks is poor practice.","fix":"Return Err instead of panicking.","locations":[{"ref":"rawler/src/decoders/unwrapped.rs:16-18","code":"   16 |   if width > 64 || height > 64 {\n   17 |     panic!(\"Trying an image larger than 64x64\");\n   18 |   }","lines":3},{"ref":"rawler/src/decoders/unwrapped.rs:77-79","code":"   77 |         panic!(\"Trying an SRF style image that's too big\");\n   78 |       }\n   79 | ","lines":3}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"decompress_arw6() in arw6/mod.rs is called for Sony ARW files with compression type 32766 but is fully unimplemented (calls unimplemented!()). Any file using the newer wavelet-based ARW6 compression causes a panic at runtime.","fix":"Either implement ARW6 decompression or return a proper RawlerError::Unsupported before calling into the unimplemented function.","locations":[{"ref":"rawler/src/decompressors/arw6/mod.rs:7-9","code":"    7 | pub(crate) fn decompress_arw6(_buf: &[u8], _width: usize, _height: usize, _curve: &LookupTable, _dummy: bool) -> Result<PixU16> {\n    8 |   unimplemented!()\n    9 | }","lines":3},{"ref":"rawler/src/decoders/arw.rs:149-151","code":"  149 |       32766 => {\n  150 |         let curve = ArwDecoder::get_curve(raw)?;\n  151 |         ArwDecoder::decode_arw6(src, width, height, &curve, dummy)?","lines":3}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Unconditional assert!() on file data in Tile::new(). The assertion `assert!(terminator == 0)` inside the qp_data branch panics on malformed input where the terminator field is non-zero.","fix":"Replace with `if terminator != 0 { return Err(CrxError::General(...)); }`","locations":[{"ref":"rawler/src/decompressors/crx/mdat.rs:53","code":"   53 |       assert!(terminator == 0);","lines":1}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Unconditional assert!() on file data in Tile::new(). The assertion `assert!((size == 8 && tail_sign == 0) || (size == 16 && tail_sign == 0x4000))` panics on any CR3 file whose tile header does not match the expected pattern. This is a parser-level panic triggered by untrusted input, not an internal invariant.","fix":"Replace the assert! with a proper error return: `if !(...) { return Err(CrxError::General(...)); }`","locations":[{"ref":"rawler/src/decompressors/crx/mdat.rs:64","code":"   64 |     assert!((size == 8 && tail_sign == 0) || (size == 16 && tail_sign == 0x4000));","lines":1}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Unconditional assert!() on file data in Plane::new(). The assertion `assert!(flags & 0x00FFFFFF == 0)` panics on any plane flags that use the lower 24 bits, which may occur in new camera firmware variants.","fix":"Return an error or at most emit a warning instead of asserting.","locations":[{"ref":"rawler/src/decompressors/crx/mdat.rs:171","code":"  171 |     Ok(Plane {","lines":1}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Unconditional assert!() on file data in Subband::new(). The assertion `assert!((size == 8 && ind == 0xFF03) || (size == 16 && ind == 0xFF13))` panics if a malformed CR3 file contains unexpected subband header sizes.","fix":"Return a proper CrxError instead of asserting.","locations":[{"ref":"rawler/src/decompressors/crx/mdat.rs:247","code":"  247 |     assert!((size == 8 && ind == 0xFF03) || (size == 16 && ind == 0xFF13));","lines":1}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`base_prediction = 1 << (ljpeg.sof.precision - ljpeg.point_transform - 1)` is a `usize`\nsubtraction. If `point_transform >= sof.precision`, the subtraction underflows in debug\nmode (panic) or silently wraps to a huge value in release mode, producing garbage output.\n`point_transform` is read as `(byte & 0xf)` which can be 0..=15, while `precision` is\nvalidated as 10..=16. An adversarial or malformed stream with e.g. `precision=10` and\n`point_transform=11` triggers this on every decompressor path that computes\n`base_prediction`.","fix":"Validate `point_transform < precision` in `parse_sos` and return `Err` if the constraint is violated.","locations":[{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:23","code":"   23 |   let base_prediction = 1 << (ljpeg.sof.precision - ljpeg.point_transform - 1);","lines":1},{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:145","code":"  145 |   let base_prediction = 1 << (ljpeg.sof.precision - ljpeg.point_transform - 1);","lines":1},{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:217","code":"  217 |   let base_prediction = 1 << (ljpeg.sof.precision - ljpeg.point_transform - 1);","lines":1},{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:283","code":"  283 |   let base_prediction = 1 << (ljpeg.sof.precision - ljpeg.point_transform - 1);","lines":1},{"ref":"rawler/src/decompressors/ljpeg/mod.rs:377","code":"  377 |     let bpred = 1 << (self.sof.precision - self.point_transform - 1);","lines":1}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`decode_sony_ljpeg_420`, `decode_ljpeg_420`, and `decode_ljpeg_422` all access\n`ljpeg.sof.components[1]` and `ljpeg.sof.components[2]` without verifying that\n`sof.cps >= 3`. `parse_sof` accepts `cps` in the range 1..=4, so a 1- or 2-component\nYUV-type LJPEG stream (malformed or unusual) will cause an out-of-bounds index panic.\nSimilarly, `decode_leaf` accesses `components[1]` without checking `cps >= 2`.","fix":"Add a cps check (`if ljpeg.sof.cps < 3 { return Err(...) }`) at the top of each 420/422 decoder and a cps >= 2 check in `decode_leaf`.","locations":[{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:141-142","code":"  141 |   let htable2 = &ljpeg.dhts[ljpeg.sof.components[1].dc_tbl_num];\n  142 |   let htable3 = &ljpeg.dhts[ljpeg.sof.components[2].dc_tbl_num];","lines":2},{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:213-214","code":"  213 |   let htable2 = &ljpeg.dhts[ljpeg.sof.components[1].dc_tbl_num];\n  214 |   let htable3 = &ljpeg.dhts[ljpeg.sof.components[2].dc_tbl_num];","lines":2},{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:279-280","code":"  279 |   let htable2 = &ljpeg.dhts[ljpeg.sof.components[1].dc_tbl_num];\n  280 |   let htable3 = &ljpeg.dhts[ljpeg.sof.components[2].dc_tbl_num];","lines":2},{"ref":"rawler/src/decompressors/ljpeg/mod.rs:376","code":"  376 |     let htable2 = &self.dhts[self.sof.components[1].dc_tbl_num];","lines":1}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`decode_leaf` computes `(height - 1) / 8 + 1` using `usize` arithmetic at line 370. If\n`height == 0` is passed (possible when a TIFF tag returns 0), the subtraction underflows\nand panics at runtime. The caller in `mos.rs` reads height directly from the TIFF tag\nwithout validating it is non-zero before calling `decode_leaf`.","fix":"Guard with `if height == 0 { return Err(...) }` at the start of `decode_leaf`.","locations":[{"ref":"rawler/src/decompressors/ljpeg/mod.rs:370","code":"  370 |     let nstrips = (height - 1) / 8 + 1;","lines":1}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In dng/convert.rs internal_convert(), rawimage.fuji_rotation_width.expect() will panic if a camera has fuji_rotation or fuji_rotation_alt hints set but no fuji_rotation_width value, which is a plausible decoder inconsistency.","fix":"Return a proper error instead of calling expect().","locations":[{"ref":"rawler/src/dng/convert.rs:135","code":"  135 |     let fuji_rotation_width = rawimage.fuji_rotation_width.expect(\"fuji_rotate: no rotation width found\");","lines":1}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"iad1.rs read_box() panics with panic!(\"Invalid iad1 type\") for any image_type value other than 0 or 2. Untrusted CR3 data with any other value will abort the process instead of returning an error.","fix":"Return Err(BmffError::Parse(...)) instead of panicking.","locations":[{"ref":"rawler/src/formats/bmff/ext_cr3/iad1.rs:106","code":"  106 |         panic!(\"Invalid iad1 type\"); // TODO","lines":1}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"StblBox::get_sample_offset() indexes co64.entries[chunk as usize - 1] (line 34) without bounds checking. A corrupt stsc/co64 combination can provide a chunk number that exceeds the co64 entries vector length, causing a panic.","fix":"Use co64.entries.get(chunk as usize - 1) and propagate None.","locations":[{"ref":"rawler/src/formats/bmff/stbl.rs:34","code":"   34 |       let chunk_offset = co64.entries[chunk as usize - 1];","lines":1}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"StscBox::get_entry_for_sample() has an Err(i) arm that returns &self.entries[i - 1] (line 35). When binary_search_by returns Err(0), i - 1 underflows to usize::MAX and the index panics.","fix":"Handle Err(0) explicitly: return &self.entries[0] or return the first entry when i == 0.","locations":[{"ref":"rawler/src/formats/bmff/stsc.rs:35","code":"   35 |       Err(i) => &self.entries[i - 1],","lines":1}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"StszBox::sample_size() indexes self.sample_sizes[sample as usize - 1] without bounds checking (line 27). If the caller provides a sample number greater than the number of entries the function panics.","fix":"Return Option<u32> or Result and use .get(sample as usize - 1).","locations":[{"ref":"rawler/src/formats/bmff/stsz.rs:27","code":"   27 |       self.sample_sizes[sample as usize - 1]","lines":1}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In ifd.rs strip_data(), the fold starting accumulator directly indexes offsets[0] without first checking that offsets is non-empty. If offsets is empty the earlier length-mismatch check passes (both are 0) and the fold panics on offsets[0].","fix":"Guard the fold with an early return or use offsets.first() instead of offsets[0] in the accumulator.","locations":[{"ref":"rawler/src/formats/tiff/ifd.rs:531-537","code":"  531 |     let (is_continous, end_off) =\n  532 |       offsets.iter().zip(sizes.iter()).fold(\n  533 |         (true, offsets[0]),\n  534 |         |acc, val| {\n  535 |           if acc.0 && acc.1 == *val.0 { (true, acc.1 + *val.1) } else { (false, 0) }\n  536 |         },\n  537 |       );","lines":7}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"ifd.rs parse_makernote() performs unchecked slice indexing on data (e.g. data[0..5], data[0..7], data[0..8], data[0..9], data[0..6], data[0..4]) without first verifying that data is long enough. A TIFF MakerNote tag shorter than 9 bytes will panic.","fix":"Add length guards before each slice index, e.g. if data.len() >= 5 && data[0..5] == b\"OLYMP\"[..] { ... }","locations":[{"ref":"rawler/src/formats/tiff/ifd.rs:593-629","code":"  593 |           // Olympus starts the makernote with their own name, sometimes truncated\n  594 |           if data[0..5] == b\"OLYMP\"[..] {\n  595 |             off += 8;\n  596 |             if data[0..7] == b\"OLYMPUS\"[..] {\n  597 |               off += 4;\n  598 |             }\n  599 |           }\n  600 | \n  601 |           // Epson starts the makernote with its own name\n  602 |           if data[0..5] == b\"EPSON\"[..] {\n  603 |             off += 8;\n  604 |           }\n  605 | \n  606 |           // Fujifilm has 12 extra bytes\n  607 |           if data[0..8] == b\"FUJIFILM\"[..] {\n  608 |             off += 12;\n  609 |           }\n  610 | \n  611 |           // Sony has 12 extra bytes\n  612 |           if data[0..9] == b\"SONY DSC \"[..] {\n  613 |             off += 12;\n  614 |           }\n  615 | \n  616 |           // Pentax makernote starts with AOC\\0 - If it's there, skip it\n  617 |           if data[0..4] == b\"AOC\\0\"[..] {\n  618 |             off += 4;\n  619 |           }\n  620 | \n  621 |           // Pentax can also start with PENTAX and in that case uses different offsets\n  622 |           if data[0..6] == b\"PENTAX\"[..] {\n  623 |             off += 8;\n  624 |             let endian = if data[off..off + 2] == b\"II\"[..] { Endian::Little } else { Endian::Big };\n  625 |             // All offsets in this IFD are relative to the start of this tag,\n  626 |             // so wie use the offset as correction value.\n  627 |             let corr = offset as i32;\n  628 |             // The IFD itself starts 10 bytes after tag offset.\n  629 |             return Ok(Some(IFD::new(reader, offset + 10, self.base, corr, endian, sub_tags)?));","lines":37}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"ifd.rs parse_makernote() indexes data[off..off+2] without checking that off+2 <= data.len() after each off increment (lines 624, 634, 639, 643). A truncated MakerNote can panic.","fix":"Check data.len() >= off + 2 before each two-byte slice.","locations":[{"ref":"rawler/src/formats/tiff/ifd.rs:624-643","code":"  624 |             let endian = if data[off..off + 2] == b\"II\"[..] { Endian::Little } else { Endian::Big };\n  625 |             // All offsets in this IFD are relative to the start of this tag,\n  626 |             // so wie use the offset as correction value.\n  627 |             let corr = offset as i32;\n  628 |             // The IFD itself starts 10 bytes after tag offset.\n  629 |             return Ok(Some(IFD::new(reader, offset + 10, self.base, corr, endian, sub_tags)?));\n  630 |           }\n  631 | \n  632 |           if data[0..7] == b\"Nikon\\0\\x02\"[..] {\n  633 |             off += 10;\n  634 |             let endian = if data[off..off + 2] == b\"II\"[..] { Endian::Little } else { Endian::Big };\n  635 |             return Ok(Some(IFD::new(reader, 8, self.base + offset + 10, 0, endian, sub_tags)?));\n  636 |           }\n  637 | \n  638 |           // Some have MM or II to indicate endianness - read that\n  639 |           if data[off..off + 2] == b\"II\"[..] {\n  640 |             off += 2;\n  641 |             endian = Endian::Little;\n  642 |           }\n  643 |           if data[off..off + 2] == b\"MM\"[..] {","lines":20}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"From<f32> for Rational panics via panic!() on negative inputs (line 237). This is exposed to untrusted data paths when floating-point TIFF tag values are converted. A panic instead of a Result makes it impossible for callers to recover.","fix":"Return a Result or use an absolute value / clamp instead of panicking.","locations":[{"ref":"rawler/src/formats/tiff/value.rs:236-245","code":"  236 |     if value.is_sign_negative() {\n  237 |       panic!(\"Can not convert {} to Rational type\", value);\n  238 |     }\n  239 |     let ratio = num::rational::Ratio::from_float(value).expect(\"Failed to convert float\");\n  240 |     // TODO: This is a workaround, need to implement better routine\n  241 |     Self::new(\n  242 |       ratio.numer().try_into().expect(\"Rational numerator overflows u32\"),\n  243 |       ratio.denom().try_into().expect(\"Rational denominator overflows u32\"),\n  244 |     )\n  245 |   }","lines":10}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"From<f32> for Rational also calls expect() twice (lines 239, 242-243). num::rational::Ratio::from_float returns None for infinity or NaN, and the numerator/denominator may not fit in u32 for large floats, both causing panics on untrusted data.","fix":"Replace expect() with proper error handling; validate the float before conversion.","locations":[{"ref":"rawler/src/formats/tiff/value.rs:239-243","code":"  239 |     let ratio = num::rational::Ratio::from_float(value).expect(\"Failed to convert float\");\n  240 |     // TODO: This is a workaround, need to implement better routine\n  241 |     Self::new(\n  242 |       ratio.numer().try_into().expect(\"Rational numerator overflows u32\"),\n  243 |       ratio.denom().try_into().expect(\"Rational denominator overflows u32\"),","lines":5}]},{"id":"PANIC_36","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In value.rs as_embedded(), the Self::Short and Self::SShort arms unconditionally index v[0] without checking count() > 0. Although as_embedded() returns Err for empty values at line 838-840, that check is on self.count() which for Short/SShort uses v.len(). If v is empty the check triggers correctly, but for a non-empty v the embedded.replace() path in the writer panics here for any Rational, SRational, or Double value with byte_size <= 4 (which should be impossible, but the panic at line 885 proves the code considers it possible).","fix":"Use v.get(0).copied().unwrap_or(0) instead of v[0] to stay consistent with the surrounding pattern.","locations":[{"ref":"rawler/src/formats/tiff/value.rs:861-862","code":"  861 |         Self::Short(v) => Ok((v[0] as u32) | ((*v.get(1).unwrap_or(&0) as u32) << 16)),\n  862 |         Self::Long(v) => Ok(v[0]),","lines":2},{"ref":"rawler/src/formats/tiff/value.rs:875","code":"  875 |         Self::SShort(v) => Ok((v[0] as u32) | ((*v.get(1).unwrap_or(&0) as u32) << 16)),","lines":1}]},{"id":"PANIC_37","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"correct_blacklevel_channels() can divide by zero when whitelevel equals blacklevel (max[i] == 0). This silently produces infinity or NaN pixel values rather than an error.","fix":"Guard against max[i] == 0.0 before dividing; return an error or clamp to 0.0.","locations":[{"ref":"rawler/src/imgop/raw.rs:94-113","code":"   94 | fn correct_blacklevel_channels<const CH: usize>(raw: &mut [f32], blacklevel: &[f32; CH], whitelevel: &[f32; CH]) {\n   95 |   // max value can be pre-computed for all channels.\n   96 |   let mut max = *whitelevel;\n   97 |   max.iter_mut().enumerate().for_each(|(i, x)| *x -= blacklevel[i]);\n   98 | \n   99 |   let clip = |v: f32| {\n  100 |     if v.is_sign_negative() { 0.0 } else { v }\n  101 |   };\n  102 |   if CH == 1 {\n  103 |     let max = max[0];\n  104 |     let blacklevel = blacklevel[0];\n  105 |     raw.iter_mut().for_each(|p| *p = clip(*p - blacklevel) / max);\n  106 |   } else {\n  107 |     raw.chunks_exact_mut(CH).for_each(|block| {\n  108 |       for i in 0..CH {\n  109 |         block[i] = clip(block[i] - blacklevel[i]) / max[i];\n  110 |       }\n  111 |     });\n  112 |   }\n  113 | }","lines":20}]},{"id":"PANIC_38","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"correct_blacklevel() panics with an explicit panic!() macro when blacklevel and whitelevel slice lengths differ. For a library function that processes untrusted camera data, this will terminate the process instead of returning an error.","fix":"Return a Result<(), String> instead of panicking, propagating the mismatch as an error.","locations":[{"ref":"rawler/src/imgop/raw.rs:150","code":"  150 |     _ => panic!(\"Blacklevel ({}) and Whitelevel ({}) count mismatch\", blacklevel.len(), whitelevel.len()),","lines":1}]},{"id":"PANIC_39","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"BitPumpLSB, BitPumpMSB, and BitPumpMSB32 all call panic!() inside refill() when the buffer is exhausted. Any caller that reads more bits than the buffer contains will abort the process rather than returning an error. This is triggered by corrupt or crafted input during decoding.","fix":"Return a Result or an Option from refill(), and propagate the error through peek_bits/get_bits so callers can handle end-of-buffer gracefully.","locations":[{"ref":"rawler/src/pumps.rs:40-42","code":"   40 |       panic!(\"Can't refill bitpump, buffer exhausted\");\n   41 |     }\n   42 |   }","lines":3},{"ref":"rawler/src/pumps.rs:75-78","code":"   75 |       }\n   76 |     } else {\n   77 |       panic!(\"Can't refill bitpump, buffer exhausted\");\n   78 |     }","lines":4},{"ref":"rawler/src/pumps.rs:117-120","code":"  117 |       }\n  118 |     } else {\n  119 |       panic!(\"Can't refill bitpump, buffer exhausted\");\n  120 |     }","lines":4}]},{"id":"PANIC_40","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"BitPumpReverseBitsMSB::peek_bits always tries to read 4 bytes from self.buffer at self.pos with BEu32() without checking whether pos + 4 <= buffer.len(). If the buffer is smaller than 4 bytes, or the remaining bytes are fewer than 4, this indexes out of bounds and panics.","fix":"Guard the read with a length check; fall back to a byte-by-byte slow path or return an error when fewer than 4 bytes remain.","locations":[{"ref":"rawler/src/pumps.rs:466-475","code":"  466 |       let mut raw: [u8; 4] = BEu32(self.buffer, self.pos).to_ne_bytes();\n  467 |       raw[0] = raw[0].reverse_bits();\n  468 |       raw[1] = raw[1].reverse_bits();\n  469 |       raw[2] = raw[2].reverse_bits();\n  470 |       raw[3] = raw[3].reverse_bits();\n  471 |       let inbits: u64 = u32::from_ne_bytes(raw) as u64;\n  472 |       self.bits = (self.bits << 32) | inbits;\n  473 |       self.pos += 4;\n  474 |       self.nbits += 32;\n  475 |     }","lines":10}]},{"id":"PANIC_41","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"ImageTiler iterator: when extending a row with 'buf.extend_from_within((row - 1) * ..)', if the tile starts on the very first row of data (row == 0 in the first tile), this will subtract 1 from 0, panicking on underflow (usize). The branch is only reached when 'offset >= self.data.len()' which happens when the image has fewer rows than th, meaning row > 0 cannot be guaranteed.","fix":"Handle the case where row == 0 by filling with a default value instead of extending from the previous row, which does not exist.","locations":[{"ref":"rawler/src/tiles.rs:90-92","code":"   90 |           //println!(\"extend row: {}\", row);\n   91 |           buf.extend_from_within((row - 1) * self.tw * self.cpp..((row - 1) * self.tw * self.cpp) + self.tw * self.cpp);\n   92 |         }","lines":3}]},{"id":"PANIC_42","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"BitArray::get_lsb() and from_lsb() both perform a shift of (T::bit_size() - nbits). If nbits == 0 (for get_lsb) or nbits == 0 (for from_lsb), the shift amount equals T::bit_size() which is an overflow for integer shift in Rust in debug builds (panic) and undefined in the mathematical sense.","fix":"Guard with if nbits == 0 { return T::default() } before shifting, or use checked_shr.","locations":[{"ref":"rawler/src/bitarray.rs:111-113","code":"  111 |   pub fn get_lsb(&self) -> T {\n  112 |     self.storage >> (T::bit_size() - self.nbits)\n  113 |   }","lines":3},{"ref":"rawler/src/bitarray.rs:119-125","code":"  119 |   pub fn from_lsb(nbits: usize, value: T) -> Self {\n  120 |     Self {\n  121 |       storage: value << (T::bit_size() - nbits),\n  122 |       nbits,\n  123 |     }\n  124 |   }\n  125 | }","lines":7}]},{"id":"PANIC_43","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"scale_u16() in bits.rs will produce f32 Inf or NaN when bits == 0, because ((1_u32 << 0) - 1) == 0, making max == 0 and dividing p as f32 by 0.0. The result of the cast (Inf/NaN) as u16 is implementation-defined but will almost certainly produce 0 silently.","fix":"Guard with if bits == 0 { return p; } or assert bits > 0.","locations":[{"ref":"rawler/src/bits.rs:56-59","code":"   56 | pub fn scale_u16(p: u16, bits: u32) -> u16 {\n   57 |   let max = ((1_u32 << bits) - 1) as u16;\n   58 |   ((p as f32 / max as f32) * u16::MAX as f32) as u16\n   59 | }","lines":4}]},{"id":"PANIC_44","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"CFA::new() panics on any pattern string whose length is not 0, 4, 16, 36, or 144. A caller passing an arbitrary string from untrusted file data will crash the process.","fix":"Return Result<CFA, CfaError> instead of panicking, so callers can propagate the error.","locations":[{"ref":"rawler/src/cfa.rs:118-125","code":"  118 |     let (width, height) = match patname.len() {\n  119 |       0 => (0, 0),\n  120 |       4 => (2, 2),\n  121 |       36 => (6, 6),\n  122 |       16 => (2, 8),\n  123 |       144 => (12, 12),\n  124 |       _ => panic!(\"Unknown CFA size \\\"{}\\\"\", patname),\n  125 |     };","lines":8}]},{"id":"PANIC_45","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"CFA::shift() panics with 'Unknown CFA color' if any pattern cell value is not in 0..=5. Since pattern cells are stored as raw u8 values derived from CFAColor as u8, the value 6 (WHITE) and 7 (FUJI_GREEN) would trigger a panic inside the shift name-building loop.","fix":"Extend the match arm to cover WHITE, FUJI_GREEN and UNKNOWN, or convert the cell back through CFAColor::try_from and use its Display.","locations":[{"ref":"rawler/src/cfa.rs:246-256","code":"  246 |         name.push_str(match pattern[row][col] {\n  247 |           0 => \"R\",\n  248 |           1 => \"G\",\n  249 |           2 => \"B\",\n  250 |           3 => \"C\",\n  251 |           4 => \"M\",\n  252 |           5 => \"Y\",\n  253 |           x => panic!(\"Unknown CFA color \\\"{}\\\"\", x),\n  254 |         });\n  255 |       }\n  256 |     }","lines":11}]},{"id":"PANIC_46","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In ArwDecoder::image_a100(), 'assert_eq!(entry.value_type(), 0x1)' panics if DNGPrivateArea is not of type BYTE. This assertion is used to validate a tag type but terminates the process instead of returning an error. A malformed file can trigger this.","fix":"Replace with an explicit check: if entry.value_type() != 0x1 { return Err(RawlerError::DecoderFailed(...)); }","locations":[{"ref":"rawler/src/decoders/arw.rs:342","code":"  342 |       assert_eq!(entry.value_type(), 0x1);","lines":1}]},{"id":"PANIC_47","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In ArwDecoder::decode_ljpeg() for the cpp==1 path, output indices are computed as 'col * twidth + i * 2 + 1' and 'width + col * twidth + i * 2 + 1'. For the last column tile when image width is not a multiple of twidth, these indices can exceed the output slice length and cause a panic. The same issue exists in the cpp==3 path with 'col * twidth * cpp'.","fix":"Add bounds checks before writing: only write pixels where col * twidth + i * 2 < width (cpp==1) or col * twidth + actual_col < width (cpp==3). Alternatively, clip the last tile to the remaining image width.","locations":[{"ref":"rawler/src/decoders/arw.rs:572-575","code":"  572 |                 strip[col * twidth + i * 2 + 0] = chunk[0];\n  573 |                 strip[col * twidth + i * 2 + 1] = chunk[1];\n  574 |                 strip[width + col * twidth + i * 2 + 0] = chunk[2];\n  575 |                 strip[width + col * twidth + i * 2 + 1] = chunk[3];","lines":4},{"ref":"rawler/src/decoders/arw.rs:534-537","code":"  534 |             for line in data.chunks_exact(w * cpp) {\n  535 |               let base = col * twidth * cpp;\n  536 |               strip[base..base + w * cpp].copy_from_slice(line);\n  537 | ","lines":4}]},{"id":"PANIC_48","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"make_blacklevel() panics with `panic!(\"Invalid blacklevel data\")` when the stored blacklevel length does not match 1 or `cfa.width * cfa.height * cpp`. This is triggered by camera configuration data (TOML), not file data, but a misconfigured camera entry would still panic at runtime.","fix":"Return an Option::None with a log warning, or use a Result.","locations":[{"ref":"rawler/src/decoders/camera.rs:93","code":"   93 |     })","lines":1}]},{"id":"PANIC_49","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"make_whitelevel() panics with `panic!(\"Invalid whitelevel data\")` for the same reason.","fix":"Return an Option::None with a log warning, or use a Result.","locations":[{"ref":"rawler/src/decoders/camera.rs:104","code":"  104 |       }","lines":1}]},{"id":"PANIC_50","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"assert!() in cr2.rs panics when the RawImage already has a crop_area set and the file also contains embedded sensor crop parameters. While the message is developer-friendly, this is a user-visible panic for certain camera/config combinations.","fix":"Return a RawlerError::DecoderFailed with the same message text.","locations":[{"ref":"rawler/src/decoders/cr2.rs:271-274","code":"  271 |         img.crop_area.is_none(),\n  272 |         \"Camera {} has embedded crop params, remove crop from config file!\",\n  273 |         self.camera.clean_make\n  274 |       );","lines":4}]},{"id":"PANIC_51","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"assert!() calls in cr3.rs decode path panic on valid but unexpected geometry. Lines 353-354 assert crop fits inside image bounds and lines 372-375 assert crop/active relationships. These assertions fire on real-world files (the code already works around one case with the `activearea_bug` hint at line 380) and turn recoverable geometry mismatches ut cj = WB_KEYMAP[keyno & 0xff] as u32;\n  496 |           let mut ck = 0x60_u32;\n  497 |           let mut buf = [0_u8; 280];\n  498 |           for i in 0..280 {\n  499 |             cj += ci * ck;\n  500 |             ck += 1;\n  501 |             buf[i] = src[i] ^ (cj as u8);","lines":14}]},{"id":"PANIC_59","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In lensdata::parse_lensdata_0x800(), buf[0x04..0x04+16] is accessed (requires len >= 20) and buf[48..] is iterated (requires len >= 48) without any prior length check. A malformed lens-data block shorter than 48 bytes causes a panic.","fix":"Add a guard before line 178: if buf.len() < 48 { return Err(\"NEF lens data 0x80X: buffer too short\".into()); }","locations":[{"ref":"rawler/src/decoders/nef/lensdata.rs:178-179","code":"  178 |   let old_data_avail = !buf[0x04..0x04 + 16].iter().all(|&x| x == 0);\n  179 |   let new_data_avail = !buf[48..].iter().all(|&x| x == 0);","lines":2}]},{"id":"PANIC_60","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In NakedDecoder::raw_image() in nkd.rs, bits = size * 8 / width / height. If camera.raw_width or camera.raw_height is 0 (possible from a misconfigured camera definition), this is an integer division by zero and panics.","fix":"Validate width and height are nonzero before the division and return RawlerError::DecoderFailed if either is 0.","locations":[{"ref":"rawler/src/decoders/nkd.rs:29","code":"   29 |     let bits = size * 8 / width / height;","lines":1}]},{"id":"PANIC_61","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"assert_eq! on untrusted file data at line 69: `assert_eq!(data[12..14], b\"II\"[..])`. If the OM SYSTEM header is present but the byte-order marker at offset 12 is not \"II\", this panics instead of returning an error.","fix":"Replace with a proper error check: `if data[12..14] != b\"II\"[..] { return Err(...); }`.","locations":[{"ref":"rawler/src/decoders/orf.rs:69","code":"   69 |           assert_eq!(data[12..14], b\"II\"[..]);","lines":1}]},{"id":"PANIC_62","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"decompress_quicktake_100() uses `assert!(width > height)` as a precondition. This panics if the image dimensions are square or portrait after the swap at line 91.","fix":"Return an error instead of asserting.","locations":[{"ref":"rawler/src/decoders/qtk.rs:144","code":"  144 |     assert!(width > height);","lines":1}]},{"id":"PANIC_63","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In raw_image(), the call `fuji_rot_width.expect(\"fuji_rot_width must be Some when not rotating for DNG\")` at line 401 will panic if rotate_for_dng is false (the only code path) but fuji_rot_width is None because the fuji_rotation branch was not taken. The panic message itself contradicts the surrounding control flow.","fix":"Restructure so that fuji_rot_width is only accessed in the arm that sets it, or convert to a proper error.","locations":[{"ref":"rawler/src/decoders/raf.rs:401","code":"  401 |       let rotated_dim = fuji_calc_dimension(image.width, fuji_rot_width.expect(\"fuji_rot_width must be Some when not rotating for DNG\"));","lines":1}]},{"id":"PANIC_64","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In correct_raw_flatfield() in iiq.rs (same file family), and fuji_decompressor: `debug_assert_eq!` calls in `fuji_xtrans_pass` and `decompress_strip` fire in debug builds but silently allow undefined behavior in release builds. These guards protect against index-out-of-range accesses in linebuf.","fix":"For these safety-critical checks, use assert! (non-debug) or return a proper error.","locations":[{"ref":"rawler/src/decoders/raf/fuji_decompressor.rs:190-191","code":"  190 |       debug_assert_eq!(header.is_lossless(), q_bases.is_none());\n  191 |       // init grads and main qtable","lines":2},{"ref":"rawler/src/decoders/raf/fuji_decompressor.rs:203-210","code":"  203 |           for j in 0..3 {\n  204 |             debug_assert_eq!(info_block.grad_even[j].lossless_grads.len(), 41);\n  205 |             debug_assert_eq!(info_block.grad_odd[j].lossless_grads.len(), 41);\n  206 |             for i in 0..41 {\n  207 |               info_block.grad_even[j].lossless_grads[i].0 = max_diff;\n  208 |               info_block.grad_even[j].lossless_grads[i].1 = 1;\n  209 |               info_block.grad_odd[j].lossless_grads[i].0 = max_diff;\n  210 |               info_block.grad_odd[j].lossless_grads[i].1 = 1;","lines":8}]},{"id":"PANIC_65","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`assert!(stream.remaining_bytes() <= 16)` at line 327 panics if block size data in the file is inconsistent. This is untrusted file data.","fix":"Replace the assert with a proper error return.","locations":[{"ref":"rawler/src/decoders/raf/fuji_decompressor.rs:327","code":"  327 |   assert!(stream.remaining_bytes() <= 16);","lines":1}]},{"id":"PANIC_66","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"decode_panasonic() uses `todo!()` for unknown raw_format values instead of returning an error. Any camera with an unsupported format panics at runtime.","fix":"Return a proper RawlerError::Unsupported or RawlerError::DecoderFailed error.","locations":[{"ref":"rawler/src/decoders/rw2.rs:366","code":"  366 |       _ => todo!(\"Format {} is not implemented\", raw_format), // TODO: return error","lines":1}]},{"id":"PANIC_67","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"decode_panasonic_v4() calls `.expect(\"Failed to decode\")` on the result of decompress_strips_fn. The comment 'Decoder should never fail' is incorrect: the closure can read out-of-bounds from `buf` if the file is truncated, causing the panic to propagate.","fix":"Propagate the error with `?` and change the function signature lines 374 and 476 operate on data derived from untrusted file content (strip widths, linebuf length). These will panic on corrupted or unexpected files.","fix":"Return errors instead of asserting.","locations":[{"ref":"rawler/src/decoders/rw2/v8decompressor.rs:374","code":"  374 |   assert_eq!(","lines":1},{"ref":"rawler/src/decoders/rw2/v8decompressor.rs:476","code":"  476 |     assert_eq!(linebuf.len(), 2 * width);","lines":1}]},{"id":"PANIC_72","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"assert_eq!(shift_down, 0, \"CF2HufShiftDown samples required\") at line 424 panics if any real-world file has a non-zero shift_down value. This should be a graceful error or the implementation should handle non-zero values.","fix":"Implement support for non-zero shift_down or return an unsupported-feature error.","locations":[{"ref":"rawler/src/decoders/rw2/v8decompressor.rs:424","code":"  424 |       assert_eq!(shift_down, 0, \"CF2HufShiftDown samples required\");","lines":1}]},{"id":"PANIC_73","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"SrwDecoder::raw_image() asserts 'assert!(coffset > 0, ...)' when the SrwSensorAreas offset is 0 (start of file). A crafted SRW file with a zero sensor-area offset causes a panic instead of a graceful error.","fix":"Replace with: if coffset == 0 { return Err(RawlerError::DecoderFailed(\"SRW: sensor areas offset is zero\".into())); }","locations":[{"ref":"rawler/src/decoders/srw.rs:103","code":"  103 |           assert!(coffset > 0, \"Surely this can't be the start of the file\");","lines":1}]},{"id":"PANIC_74","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"SrwDecoder::format_dump() and NakedDecoder::format_dump() both call todo!() unconditionally. Any caller requesting format dump analysis for SRW or NKD files will panic.","fix":"Implement a minimal FormatDump or return a stub/placeholder variant instead of todo!().","locations":[{"ref":"rawler/src/decoders/srw.rs:122","code":"  122 |     todo!()","lines":1},{"ref":"rawler/src/decoders/nkd.rs:45","code":"   45 |     todo!()","lines":1}]},{"id":"PANIC_75","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"SrwDecoder::decode_srw3() uses three panic!() calls to handle malformed compressed SRW files (motion at start of image, previous-line lookup on first two lines, too many difference bits). While they include a 'File corrupted?' message, these panics terminate the process rather than returning an error to the caller.","fix":"Convert each panic!() to return Err(RawlerError::DecoderFailed(...)) or propagate the error upward. decode_srw3 currently returns PixU16 by value (infallible), so it must be changed to return Result<PixU16>.","locations":[{"ref":"rawler/src/decoders/srw.rs:373","code":"  373 |           panic!(\"SRW Decoder: At start of image and motion isn't 7. File corrupted?\")","lines":1},{"ref":"rawler/src/decoders/srw.rs:385","code":"  385 |             panic!(\"SRW: Got a previous line lookup on first two lines. File corrupted?\");","lines":1},{"ref":"rawler/src/decoders/srw.rs:437","code":"  437 |               panic!(\"SRW Decoder: Too many difference bits. File corrupted?\");","lines":1}]},{"id":"PANIC_76","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"get_wb() uses `assert_eq!(levels.count(), 3)` which panics on malformed metadata.","fix":"Return an error instead of asserting.","locations":[{"ref":"rawler/src/decoders/tfr.rs:167","code":"  167 |     assert_eq!(levels.count(), 3);","lines":1}]},{"id":"PANIC_77","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"assert!() in Subband::new() checks end_marker == 0 only with assert!, which panics on corrupt input for 0xFF13 subbands.","fix":"Use `if end_marker != 0 { return Err(...); }`","locations":[{"ref":"rawler/src/decompressors/crx/mdat.rs:288","code":"  288 |         assert!(end_marker == 0);","lines":1}]},{"id":"PANIC_78","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Unconditional assert!() inside process_tiles() fires on valid but unexpected file data. Assertions `assert!(band.subband_size != 0)`, `assert_eq!(band.subband_size % 8, 0)`, `assert_eq!(plane.plane_size, band_sizes)`, and `assert_eq!(tile.tile_size - tile.extra_size(), plane_sizes)` will panic instead of returning a decode error for corrupt or future-format CR3 files.","fix":"Replace panicking assertions with error returns via the Result type already used in the codebase.","locations":[{"ref":"rawler/src/decompressors/crx/mod.rs:244-254","code":"  244 |           assert!(band.subband_size != 0);\n  245 |           assert_eq!(band.subband_size % 8, 0);\n  246 |           band_sizes += band.subband_size;\n  247 |         }\n  248 |         assert_eq!(plane.plane_size, band_sizes);\n  249 |         plane_sizes += plane.plane_size;\n  250 |       }\n  251 |       // Tile may contain some extra bytes for quantization\n  252 |       // This extra size must be subtracted before comaring to the\n  253 |       // sum of plane sizes.\n  254 |       assert_eq!(tile.tile_size - tile.extra_size(), plane_sizes);","lines":11}]},{"id":"PANIC_79","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`DeflateDecompressor::new` panics with `panic!(\"DeflateDecompressor: Unsupported\npredictor ...\")` for any predictor value other than 3, 34894, and 34895. Similarly,\n`DeflateDecompressor::decompress` panics with `panic!(\"DeflateDecompressor: bps {} not\nsupported\")` for bit depths other than 16, 24, 32, and `assert!(bytesps >= 2 &&\nbytesps <= 4)` panics on the same condition reached via a different path. These should\nreturn `Err` instead of panicking so the caller can handle unsupported formats gracefully.","fix":"Change `DeflateDecompressor::new` to return `Result<Self, String>` and propagate unknown predictors as `Err`. Replace the `panic!` and `assert!` in `decompress` with `return Err(...)`.","locations":[{"ref":"rawler/src/decompressors/deflate.rs:60-68","code":"   60 |   pub fn new(cpp: usize, predictor: u16, bps: u32) -> Self {\n   61 |     let pred_factor = cpp\n   62 |       * match predictor {\n   63 |         3 => 1,\n   64 |         34894 => 2,\n   65 |         34895 => 4,\n   66 |         _ => panic!(\"DeflateDecompressor: Unsupported predictor {predictor}\"),\n   67 |       };\n   68 |     Self { pred_factor, bps }","lines":9},{"ref":"rawler/src/decompressors/deflate.rs:94","code":"   94 |     assert!(bytesps >= 2 && bytesps <= 4);","lines":1},{"ref":"rawler/src/decompressors/deflate.rs:107","code":"  107 |         _ => panic!(\"DeflateDecompressor: bps {} not supported\", self.bps),","lines":1}]},{"id":"PANIC_80","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`JpegXLDecompressor::decompress` uses `unimplemented!()` (line 89) for `bps` values\noutside 8 and 9..=16, and `unimplemented!(\"JPEG-XL bit-depth {} not supported yet\")`\n(line 53) for JXL streams with internal bit-depth other than 8 or 16. Both macro\ninvocations unconditionally panic rather than returning `Err`, which means any\nunsupported DNG file causes a process crash instead of a recoverable error.","fix":"Return `Err(format!(\"...\"))` in both cases instead of `unimplemented!()`.","locations":[{"ref":"rawler/src/decompressors/jpegxl.rs:53","code":"   53 |         unimplemented!(\"JPEG-XL bit-depth {} not supported yet\", header.bit_depth.bits_per_sample());","lines":1},{"ref":"rawler/src/decompressors/jpegxl.rs:89","code":"   89 |       _ => unimplemented!(),","lines":1}]},{"id":"PANIC_81","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`decode_leaf_strip` unconditionally writes to `out[0]` and `out[1]` on lines 338-339\nbefore entering the row loop. If `width == 0` (or `out.len() < 2`), this panics with an\nout-of-bounds index. Width comes from TIFF metadata and is not validated by the caller\nbefore being passed to `decode_leaf_strip` via the closure in `decode_leaf`.","fix":"Add `if width < 2 || out.len() < 2 { return Err(...) }` at the start of `decode_leaf_strip`.","locations":[{"ref":"rawler/src/decompressors/ljpeg/decompressors.rs:338-339","code":"  338 |   out[0] = (bpred + htable1.huff_decode(&mut pump)?) as u16;\n  339 |   out[1] = (bpred + htable2.huff_decode(&mut pump)?) as u16;","lines":2}]},{"id":"PANIC_82","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"If a Huffman table slot is never initialised by a DHT segment (`dht_init[i] == false`),\n`HuffTable::empty()` is stored. When code later calls `huff_decode` on that empty table,\nthe cache lookup returns `None` for every code, so `huff_decode_slow` is called, which\ncalls `huff_len`, which does `pump.peek_bits(self.nbits=0)` to get `code = 0`, then\nindexes `self.hufftable[0]` on an empty `Vec` - causing a panic. This is reachable if a\ncomponent's `dc_tbl_num` references a DHT slot that was not defined in the stream.","fix":"Return `Err` from `huff_decode` / `huff_len` when `self.nbits == 0` (table uninitialized), or add a validation step after parsing that checks every referenced table is initialised.","locations":[{"ref":"rawler/src/decompressors/ljpeg/huffman.rs:86-99","code":"   86 |   pub fn empty() -> HuffTable {\n   87 |     HuffTable {\n   88 |       bits: [0; 17],\n   89 |       huffval: [0; 256],\n   90 |       shiftval: [0; 256],\n   91 |       dng_bug: false,\n   92 |       disable_cache: false,\n   93 | \n   94 |       nbits: 0,\n   95 |       hufftable: Vec::new(),\n   96 |       decodecache: [None; 1 << DECODE_CACHE_BITS],\n   97 |       initialized: false,\n   98 |     }\n   99 |   }","lines":14},{"ref":"rawler/src/decompressors/ljpeg/huffman.rs:194-197","code":"  194 |   pub fn huff_len(&self, pump: &mut dyn BitPump) -> (u8, u8, u8) {\n  195 |     let code = pump.peek_bits(self.nbits) as usize;\n  196 |     let (bits, len, shift) = self.hufftable[code];\n  197 |     pump.consume_bits(bits as u32);","lines":4}]},{"id":"PANIC_83","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`HuffDecoder::new` in `radc.rs` (line 67) computes `(1 << (cbpp - 1))` where `cbpp` is\na `u8`. If `cbpp == 0`, this underflows to 255 in `u8` arithmetic and `1 << 255` is\nundefined - in practice this wraps to 0 in release and panics in debug for shift amounts\nthat exceed the integer width. Additionally, line 66 computes `8 - cbpp` which panics on\nunderflow if `cbpp > 8`. There is no validation of `cbpp` before constructing\n`HuffDecoder`.","fix":"Validate `cbpp` is in range 1..=7 (or whatever the legal RADC range is) in `decompress` before calling `HuffDecoder::new`, and return `Err` for invalid values.","locations":[{"ref":"rawler/src/decompressors/radc.rs:54-68","code":"   54 |   fn new(cbpp: u8) -> Self {\n   55 |     let mut cache = [[HuffSymbol::default(); 256]; 19];\n   56 |     let mut a = 0;\n   57 |     for x in HUFF_INIT {\n   58 |       for _ in 0..(256 >> x.0) {\n   59 |         // max bit value in cache\n   60 |         cache.as_flattened_mut()[a].bitcnt = x.0;\n   61 |         cache.as_flattened_mut()[a].value = x.1 as u8;\n   62 |         a += 1;\n   63 |       }\n   64 |     }\n   65 |     for c in 0..256 {\n   66 |       cache[18][c].bitcnt = 8 - cbpp;\n   67 |       cache[18][c].value = ((c as u8) >> cbpp << cbpp) | (1 << (cbpp - 1));\n   68 |     }","lines":15},{"ref":"rawler/src/decompressors/radc.rs:84-103","code":"   84 | pub fn decompress(src: &PaddedBuf, width: usize, height: usize, cbpp: u8, dummy: bool) -> Result<PixU16> {\n   85 |   log::debug!(\"RADC decompress with cbpp: {}, width: {}, height: {}\", cbpp, width, height);\n   86 |   let mut out = alloc_image_ok!(width, height, dummy);\n   87 | \n   88 |   let mut last: [i16; 3] = [16, 16, 16];\n   89 |   let mut mul: [i16; 3];\n   90 |   let mut buf: [[[i16; 386]; 3]; 3] = [[[2048; 386]; 3]; 3];\n   91 | \n   92 |   let tbl = {\n   93 |     const PT: [(usize, f32); 6] = [(0, 0.0), (1280, 1344.0), (2320, 3616.0), (3328, 8000.0), (4095, 16383.0), (65535, 16383.0)];\n   94 |     let mut curve = vec![0; 65536];\n   95 |     for i in 1..PT.len() {\n   96 |       for c in PT[i - 1].0..=PT[i].0 {\n   97 |         curve[c] = ((c - PT[i - 1].0) as f32 / (PT[i].0 - PT[i - 1].0) as f32 * (PT[i].1 - PT[i - 1].1) + PT[i - 1].1 + 0.5) as u16;\n   98 |       }\n   99 |     }\n  100 |     LookupTable::new_with_bits(&curve, 16)\n  101 |   };\n  102 | \n  103 |   let dec = HuffDecoder::new(cbpp);","lines":20}]},{"id":"PANIC_84","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"devtools/mod.rs dump_buf and dump_buf_u16 use expect() and panic on file creation and write failure. These are dev-tool helpers but if called from test infrastructure on a read-only filesystem (e.g., CI) they will abort the entire test process rather than returning an error.","fix":"Return std::io::Result<()> to let callers handle file creation failures.","locations":[{"ref":"rawler/src/devtools/mod.rs:39-42","code":"   39 |   let mut f = BufWriter::new(File::create(path).expect(\"Unable to create file\"));\n   40 |   f.write_all(buf.as_ref()).expect(\"Failed to dump buffer to file\");\n   41 |   f.flush().expect(\"Failed to flush file\");\n   42 | }","lines":4},{"ref":"rawler/src/devtools/mod.rs:47-52","code":"   47 | {\n   48 |   let mut f = BufWriter::new(File::create(path).expect(\"Unable to create file\"));\n   49 |   for v in buf.as_ref().iter() {\n   50 |     f.write_u16::<LittleEndian>(*v).expect(\"Failed to dump buffer to file\");\n   51 |   }\n   52 |   f.flush().expect(\"Failed to flush file\");","lines":6}]},{"id":"PANIC_85","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ctmd.rs read_box() uses assert!() to verify reader position equals header.end_offset() (line 62). A size mismatch in a corrupt CR3 file causes a panic rather than a parse error.","fix":"Replace assert!() with a proper error return.","locations":[{"ref":"rawler/src/formats/bmff/ext_cr3/ctmd.rs:62","code":"   62 |     assert!(reader.stream_position()? == header.end_offset());","lines":1}]},{"id":"PANIC_86","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"mvhd.rs and mdhd.rs both call assert_eq!(version, 0) when the version byte is not 1. A corrupt or future-version BMFF file with an unrecognized version byte will panic instead of returning an error.","fix":"Return Err(BmffError::Parse(...)) for unknown versions.","locations":[{"ref":"rawler/src/formats/bmff/mvhd.rs:39","code":"   39 |       assert_eq!(version, 0);","lines":1},{"ref":"rawler/src/formats/bmff/mdhd.rs:38","code":"   38 |       assert_eq!(version, 0);","lines":1}]},{"id":"PANIC_87","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"stsd.rs CrawBox and CtmdBox parsers use assert_eq!() to guard against duplicate boxes (lines 51, 55). A malformed CR3 file with duplicate CRAW or CTMD boxes will panic instead of returning an error.","fix":"Return Err(BmffError::Parse(...)) instead of using assert_eq!().","locations":[{"ref":"rawler/src/formats/bmff/stsd.rs:51","code":"   51 |           assert_eq!(craw, None, \"Found second CRAW box\");","lines":1},{"ref":"rawler/src/formats/bmff/stsd.rs:55","code":"   55 |           assert_eq!(ctmd, None, \"Found second CTMD box\");","lines":1}]},{"id":"PANIC_88","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ciff/mod.rs CiffEntry::get_u32() panics with a formatted message for unknown type values (line 150). This is reachable from untrusted data.","fix":"Return Option<u32> or Result<u32, _> instead of panicking.","locations":[{"ref":"rawler/src/formats/ciff/mod.rs:150","code":"  150 |       _ => panic!(\"{}\", format!(\"Trying to read typ {} for a u32\", self.typ)),","lines":1}]},{"id":"PANIC_89","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"reader.rs TiffReader::root_ifd() panics when the IFD chain is empty (line 37). While the construction path checks for an empty chain, any code path that constructs a GenericTiffReader outside the normal parse_file() route could trigger this.","fix":"Return Option<&IFD> instead of panicking, or document the invariant clearly.","locations":[{"ref":"rawler/src/formats/tiff/reader.rs:36-39","code":"   36 |     if self.file().chain.is_empty() {\n   37 |       panic!(\"TIFF must have at least one root IFD but the IFD list is empty\");\n   38 |     }\n   39 |     &self.file().chain[0]","lines":4}]},{"id":"PANIC_90","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"value.rs get_data() panics for Value variants other than Ascii, Byte, Undefined, and Unknown (line 438-440). It is a public method and callers may invoke it on Short, Long, etc.","fix":"Return Option<&Vec<u8>> or Result instead of panicking.","locations":[{"ref":"rawler/src/formats/tiff/value.rs:431-441","code":"  431 |   pub fn get_data(&self) -> &Vec<u8> {\n  432 |     match self {\n  433 |       Value::Ascii(data) => data.as_bytes(),\n  434 |       Value::Byte(data) => data,\n  435 |       Value::Undefined(data) => data,\n  436 |       Value::Unknown(_, data) => data,\n  437 |       _ => {\n  438 |         panic!(\"Unable to call get_data() on this value type\");\n  439 |       }\n  440 |     }\n  441 |   }","lines":11}]},{"id":"PANIC_91","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"value.rs as_embedded() has a catch-all arm that panics for Rational, SRational, and Double (line 884-886). These types always have byte_size > 4, so the caller (writer.rs:248) should never reach the embedded path for them - but the panic instead of a proper error makes this brittle.","fix":"Return Err(TiffError::General(...)) instead of panicking.","locations":[{"ref":"rawler/src/formats/tiff/value.rs:884-886","code":"  884 |         _ => {\n  885 |           panic!(\"unsupported: {:?}\", self);\n  886 |         }","lines":3}]},{"id":"PANIC_92","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"writer.rs DirectoryWriter::build() calls panic!(\"TIFF value is empty, tag: {:?}\", tag) (line 251) when a tag has a count of zero. This is triggered by caller-controlled data if a DirectoryWriter is given an empty Value.","fix":"Return Err(TiffError::General(...)) instead of panicking.","locations":[{"ref":"rawler/src/formats/tiff/writer.rs:250-252","code":"  250 |         if value.count() == 0 {\n  251 |           panic!(\"TIFF value is empty, tag: {:?}\", tag);\n  252 |         }","lines":3}]},{"id":"PANIC_93","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"illuminant_to_XYZ_tristimulus() in chromatic_adaption.rs calls todo!() for Fluorescent, Tungsten, FineWeather, CloudyWeather, Shade, DaylightFluorescent, DaylightWhiteFluorescent, CoolWhiteFluorescent, WhiteFluorescent, Unknown, and IsoStudioTungsten illuminants. A DNG file that declares any of these as its calibration illuminant will cause a hard panic during Bradford adaptation.","fix":"Return an Option or Result from illuminant_to_XYZ_tristimulus() and propagate errors instead of panicking.","locations":[{"ref":"rawler/src/imgop/chromatic_adaption.rs:28-59","code":"   28 | fn illuminant_to_XYZ_tristimulus(illuminant: &Illuminant) -> [f32; 3] {\n   29 |   match illuminant {\n   30 |     Illuminant::Unknown => todo!(),\n   31 |     Illuminant::Daylight => {\n   32 |       // There is no official CIE XYZ tristimulus white point for \"Daylight\" illuminants.\n   33 |       // We use D65 as an approximation\n   34 |       CIE_1931_TRISTIMULUS_D65\n   35 |     }\n   36 |     Illuminant::Fluorescent => todo!(),\n   37 |     Illuminant::Tungsten => todo!(),\n   38 |     Illuminant::Flash => {\n   39 |       // There is no official CIE XYZ tristimulus white point for \"Flash\" illuminants.\n   40 |       // We use D55 as an approximation assuming flash CCT ≈ 5500 K\n   41 |       CIE_1931_TRISTIMULUS_D55\n   42 |     }\n   43 |     Illuminant::FineWeather => todo!(),\n   44 |     Illuminant::CloudyWeather => todo!(),\n   45 |     Illuminant::Shade => todo!(),\n   46 |     Illuminant::DaylightFluorescent => todo!(),\n   47 |     Illuminant::DaylightWhiteFluorescent => todo!(),\n   48 |     Illuminant::CoolWhiteFluorescent => todo!(),\n   49 |     Illuminant::WhiteFluorescent => todo!(),\n   50 |     Illuminant::A => CIE_1931_TRISTIMULUS_A,\n   51 |     Illuminant::B => CIE_1931_TRISTIMULUS_B,\n   52 |     Illuminant::C => CIE_1931_TRISTIMULUS_C,\n   53 |     Illuminant::D55 => CIE_1931_TRISTIMULUS_D55,\n   54 |     Illuminant::D65 => CIE_1931_TRISTIMULUS_D65,\n   55 |     Illuminant::D75 => CIE_1931_TRISTIMULUS_D75,\n   56 |     Illuminant::D50 => CIE_1931_TRISTIMULUS_D50,\n   57 |     Illuminant::IsoStudioTungsten => todo!(),\n   58 |   }\n   59 | }","lines":32}]},{"id":"PANIC_94","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In spline.rs prepare(), the loop `for i in (0..self.num_segments).rev()` accesses self.segments[i + 1], but i ranges up to num_segments - 1, so i + 1 == num_segments. That index is valid only because segments was allocated with num_coords == num_segments + 1 entries. This is subtle and fragile; if segments.len() is ever reduced before prepare() is called, it panics.","fix":"Add an explicit length assertion before the loop, or restructure to avoid the off-by-one dependency on the extra slot.","locations":[{"ref":"rawler/src/imgop/spline.rs:47-53","code":"   47 |     for i in (0..self.num_segments).rev() {\n   48 |       let sn = self.segments[i + 1].clone();\n   49 |       let s = &mut self.segments[i];\n   50 |       s.c = z[i] - mu[i] * sn.c;\n   51 |       s.b = (sn.a - s.a) / h[i] - h[i] * (sn.c + 2. * s.c) /
