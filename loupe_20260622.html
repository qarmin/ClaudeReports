ing dimensions to f32 and computes `for_width as f32 / for_height as f32`. When `for_height` is 0 (initial allocation before the widget has a size) this is inf; the branch then allocates `(for_height as f32 * ratio) as i32 == 0`. Not fatal but produces a zero-size page and a transient GTK allocation of 0.","fix":"Early-return a zero/clamped size when `for_width` or `for_height` is 0 to avoid the inf intermediate.","locations":[{"ref":"src/widgets/print_preview.rs:170-181","code":"  170 |         fn aspect_preserving_size(&self, for_width: i32, for_height: i32) -> (i32, i32) {\n  171 |             let print = self.obj().print();\n  172 | \n  173 |             let ratio = (print.page_setup().paper_width(gtk::Unit::Inch)\n  174 |                 / print.page_setup().paper_height(gtk::Unit::Inch)) as f32;\n  175 | \n  176 |             if ratio > for_width as f32 / for_height as f32 {\n  177 |                 (for_width, (for_width as f32 / ratio) as i32)\n  178 |             } else {\n  179 |                 ((for_height as f32 * ratio) as i32, for_height)\n  180 |             }\n  181 |         }","lines":12,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print_preview.rs#L170-181"}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`remove` (sliding_view) only unparents a page immediately when `current_index.abs_diff(index) > 1`; otherwise it relies on a later allocation to unparent. But `remove_lazy` (used by `update_sliding_view`) does not queue an explicit re-check beyond `queue_allocate`, and `size_allocate` only unparents stale children when in `PositionTracking::Position` state (not during StackedCards/step animations). If a near page is removed while a step animation is in progress, it stays parented until the animation ends and another allocation occurs - acceptable, but a removed page that is the `prev_image` of an in-flight StackedCards animation will keep being allocated/shown by `size_allocate_stacked_cards`, which references `stacked_cards.prev_image` even though it was removed from `pages`.","fix":"When removing a page that equals the in-flight StackedCards `prev_image`, cancel/finish the step animation or clear the StackedCards tracking before removal.","locations":[{"ref":"src/widgets/sliding_view.rs:506-527","code":"  506 |     fn remove(&self, page: &LpImagePage, lazy: bool) {\n  507 |         let current_index = self.current_index();\n  508 | \n  509 |         if let Some(index) = self.index_of(page) {\n  510 |             // Only unparent if far enough away to not be involved in delete animation\n  511 |             if current_index.is_some_and(|x| x.abs_diff(index) as isize > 1) {\n  512 |                 page.unparent();\n  513 |             }\n  514 | \n  515 |             self.imp().pages.borrow_mut().remove(index);\n  516 | \n  517 |             self.queue_allocate();\n  518 | \n  519 |             self.shift_position(current_index);\n  520 | \n  521 |             if self.is_empty() && !lazy {\n  522 |                 self.clear(false);\n  523 |             }\n  524 |         } else {\n  525 |             tracing::error!(\"Trying to remove non-existent page.\");\n  526 |         }\n  527 |     }","lines":22,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L506-527"},{"ref":"src/widgets/sliding_view.rs:246-264","code":"  246 |             if matches!(\n  247 |                 *self.position_tracking.borrow(),\n  248 |                 PositionTracking::Position(_)\n  249 |             ) && let Some(mut child) = obj.first_child()\n  250 |             {\n  251 |                 let mut children = vec![child.clone()];\n  252 |                 while let Some(new_child) = child.next_sibling() {\n  253 |                     child = new_child;\n  254 |                     children.push(child.clone());\n  255 |                 }\n  256 | \n  257 |                 for child in children {\n  258 |                     if let Ok(page) = child.downcast::<LpImagePage>()\n  259 |                         && obj.index_of(&page).is_none()\n  260 |                     {\n  261 |                         page.unparent();\n  262 |                     }\n  263 |                 }\n  264 |             }","lines":19,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L246-264"},{"ref":"src/widgets/sliding_view.rs:383-432","code":"  383 |         fn size_allocate_stacked_cards(\n  384 |             &self,\n  385 |             stacked_cards: &StackedCards,\n  386 |             width: i32,\n  387 |             height: i32,\n  388 |         ) {\n  389 |             let obj = self.obj().to_owned();\n  390 |             if let Some(new_page) = obj.current_page() {\n  391 |                 let prev_page = &stacked_cards.prev_image;\n  392 | \n  393 |                 let mut direction_sign = if stacked_cards.backward { -1. } else { 1. };\n  394 |                 if self.is_rtl() {\n  395 |                     direction_sign *= -1.;\n  396 |                 }\n  397 | \n  398 |                 let progress = stacked_cards.progress;\n  399 | \n  400 |                 //New Page\n  401 | \n  402 |                 // Ensure that new image is on top\n  403 |                 new_page.unparent();\n  404 |                 new_page.insert_after(&obj, Some(prev_page));\n  405 | \n  406 |                 // Don't show spinner or error during animation\n  407 |                 if new_page.image().is_loaded() {\n  408 |                     new_page.set_child_visible(true);\n  409 |                 } else {\n  410 |                     // Set explicity since re-parenting resets the state\n  411 |                     new_page.set_child_visible(false);\n  412 |                 }\n  413 | \n  414 |                 let x = direction_sign * STEP_PIXEL_SHIFT * (1. cations":[{"ref":"src/widgets/window.rs:132-142","code":"  132 |             glib::timeout_add_local_once(\n  133 |                 std::time::Duration::from_millis(SHOW_WINDOW_AFTER),\n  134 |                 glib::clone!(\n  135 |                     #[weak]\n  136 |                     obj,\n  137 |                     move || if !obj.is_visible() {\n  138 |                         tracing::debug!(\"Showing window after timeout\");\n  139 |                         obj.present()\n  140 |                     }\n  141 |                 ),\n  142 |             );","lines":11,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/window.rs#L132-142"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`resize_default` checks `window_natural_width < min_width_for_overlay && window_natural_height < min_height_for_overlay` (both must be small) to decide whether to widen the window for the properties sidebar. The breakpoint condition it claims to mirror ('overlay-properties') would normally be an OR (overlay triggers when width OR height is too small). Using AND means when only the width is below threshold but the height is large, the workaround does not kick in and the properties panel still collapses into a bottom sheet, contradicting the stated intent in the comment.","fix":"Verify against the actual breakpoint condition in window.ui; if the breakpoint uses OR, change the `&&` to `||`.","locations":[{"ref":"src/widgets/window.rs:189-201","code":"  189 |             let (width, height) = if shows_properties\n  190 |                 && window_natural_width < min_width_for_overlay\n  191 |                 && window_natural_height < min_height_for_overlay\n  192 |             {\n  193 |                 // Avoid overlaying bottom sheet being triggered for the image properties by\n  194 |                 // using a window wide enough to allow for a sidebar\n  195 |                 (min_width_for_overlay.saturating_add(1), -1)\n  196 |             } else {\n  197 |                 // this lets the window determine the default size from LpImage's natural size\n  198 |                 (-1, -1)\n  199 |             };\n  200 | \n  201 |             self.set_default_size(width, height);","lines":13,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/window.rs#L189-201"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"In actions.rs the keybindings table maps `Action::RotateCw` to Ctrl+r and `Action::RotateCcw` to Ctrl+Shift+r, while the action handlers map RotateCw to `rotate_image(-90.0)` and RotateCcw to `rotate_image(90.0)`. The negative angle for clockwise vs positive for counter-clockwise is unusual (clockwise is typically a positive/negative depending on the y-axis convention). Worth confirming the sign matches `rotate_image`'s expected direction; an inverted sign would rotate the wrong way for both shortcuts.","fix":"Verify against LpImageView::rotate_image semantics that CW=-90 / CCW=+90 produce the visually correct rotation; add a comment documenting the angle-sign convention.","locations":[{"ref":"src/widgets/image_window/actions.rs:156-166","code":"  156 |                 Action::RotateCw => {\n  157 |                     klass.install_action(&action, None, |win, _, _| {\n  158 |                         win.rotate_image(-90.0);\n  159 |                     });\n  160 |                 }\n  161 | \n  162 |                 Action::RotateCcw => {\n  163 |                     klass.install_action(&action, None, |win, _, _| {\n  164 |                         win.rotate_image(90.0);\n  165 |                     });\n  166 |                 }","lines":11,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_window/actions.rs#L156-166"},{"ref":"src/widgets/image_window.rs:571-573","code":"  571 |     fn rotate_image(&self, angle: f64) {\n  572 |         self.imp().image_view.rotate_image(angle)\n  573 |     }","lines":3,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_window.rs#L571-573"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":false,"description":"Comment typo \"Only make submit button sensitive if entry value is tifferent\" (tifferent -> different) and earlier doc comments contain \"it's content\" (its), \"slided\" and \"Usualy\"/\"explicity\". Minor but indicates copy/paste of unreviewed text in load-bearing UI logic comments.","fix":"Fix the typos.","locations":[{"ref":"src/widgets/image_view.rs:239-240","code":"  239 |                         // Only make submit button sensitive if entry value is tifferent from\n  240 |                         // current zoom value","lines":2,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_view.rs#L239-240"},{"ref":"src/widgets/sliding_view.rs:346","code":"  346 |         /// Usualy allocate or during scroll animation","lines":1,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L346"},{"ref":"src/widgets/sliding_view.rs:410","code":"  410 |                     // Set explicity since re-parenting resets the state","lines":1,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L410"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`load_directory` uses `OnceCell::set(...).unwrap()` on `directory` and `monitor`. If `load_directory` is ever called twice on the same model (or the cell is otherwise already set), this panics instead of returning the `anyhow::Result<()>` the function signature promises. A fallible function should not panic on a re-entry / programming-but-recoverable condition that depends on call sequencing.","fix":"Handle the `Err` from `set()` (log and return early, or `bail!`) instead of `.unwrap()`.","locations":[{"ref":"src/file_model.rs:174-194","code":"  174 |     pub async fn load_directory(&self, directory: gio::File) -> anyhow::Result<()> {\n  175 |         let instant = Instant::now();\n  176 |         self.imp().directory.set(directory.clone()).unwrap();\n  177 | \n  178 |         let monitor =\n  179 |             directory.monitor_directory(gio::FileMonitorFlags::WATCH_MOVES, gio::Cancellable::NONE);\n  180 |         match monitor {\n  181 |             Ok(monitor) => {\n  182 |                 monitor.connect_changed(glib::clone!(\n  183 |                     #[weak(rename_to = obj)]\n  184 |                     self,\n  185 |                     move |_monitor, file_a, file_b, event| {\n  186 |                         obj.file_monitor_cb(event, file_a, file_b);\n  187 |                     }\n  188 |                 ));\n  189 |                 self.imp().monitor.set(monitor).unwrap();\n  190 |             }\n  191 |             Err(err) => {\n  192 |                 tracing::info!(\"Cannot monitor directory: {err}\");\n  193 |             }\n  194 |         }","lines":21,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/file_model.rs#L174-194"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`set_drop_target` and `swipe_tracker.set(...)` use `.unwrap()` on the `OnceCell::set` result. `set_drop_target` is the setter for a `construct_only` property; if the property is ever set twice (e.g. via `glib::Object::builder().property(...)` plus a UI file default) the unwrap panics. While construct-only normally guards this, the `notify` afterwards plus the public setter path make double-set possible from buildable construction edge cases.","fix":"Handle the `Err` from `OnceCell::set` by logging instead of panicking, or assert via `debug_assert`.","locations":[{"ref":"src/widgets/drag_overlay.rs:83-96","code":"   83 |         pub fn set_drop_target(&self, drop_target: gtk::DropTarget) {\n   84 |             drop_target.connect_current_drop_notify(glib::clone!(\n   85 |                 #[weak(rename_to = revealer)]\n   86 |                 self.revealer,\n   87 |                 move |target| {\n   88 |                     let reveal = target.current_drop().is_some();\n   89 |                     revealer.set_reveal_child(reveal);\n   90 |                 }\n   91 |             ));\n   92 | \n   93 |             self.drop_target.set(drop_target).unwrap();\n   94 | \n   95 |             self.obj().notify(\"drop-target\");\n   96 |         }","lines":14,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/drag_overlay.rs#L83-96"},{"ref":"src/widgets/sliding_view.rs:190","code":"  190 |             self.swipe_tracker.set(swipe_tracker).unwrap();","lines":1,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L190"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`show_print_dialog` sets the output URI to `format!(\"{uri}.pdf\")` derived from the source image URI. For non-file URIs (e.g. recent/portal/`mtp:` URIs) this builds an invalid output target, and there is no validation. Additionally the `setup_future` error path only logs `tracing::warn!` with a TODO 'show error', so the user gets no feedback when print setup fails.","fix":"Only set OUTPUT_URI when the source is a local file (`file.path().is_some()`), and surface setup failures to the user via a toast/dialog instead of only logging.","locations":[{"ref":"src/widgets/print.rs:491-505","code":"  491 |         let uri = file.uri();\n  492 |         print_settings.set(gtk::PRINT_SETTINGS_OUTPUT_URI, Some(&format!(\"{uri}.pdf\")));\n  493 | \n  494 |         glib::spawn_future_local(async move {\n  495 |             let print_setup = match print_dialog.setup_future(Some(&parent)).await {\n  496 |                 Err(err) => {\n  497 |                     // TODO: show error\n  498 |                     tracing::warn!(\"Failed to print: {err}\");\n  499 |                     return;\n  500 |                 }\n  501 |                 Ok(print_setup) => print_setup,\n  502 |             };\n  503 | \n  504 |             Self::new(image, preview_image, parent, print_dialog, print_setup);\n  505 |         });","lines":15,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L491-505"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the SVG decode loop, when `image.specific_frame` returns an error the error is reported via `updater.send_error(err)` but the loop simply continues to the next tile instruction. A persistent per-tile failure (e.g. invalid clip) thus floods the renderer with repeated error updates for every tile in the request, and on an unsupported-format error this re-runs the full metadata+error sequence each iteration.","fix":"On a hard error, break out of the per-tile loop (and optionally mark the request failed) instead of continuing to request every remaining tile.","locations":[{"ref":"src/decoder/formats/svg.rs:151-154","code":"  151 |                                 Err(err) => {\n  152 |                                     updater.send_error(err);\n  153 |                                 }\n  154 |                             }","lines":4,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/formats/svg.rs#L151-154"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `Entry::new`, if a file-info query for a path segment fails, the loop `break`s, silently producing a shorter `sort` key (missing the upper path segments). Two files whose only difference is in a higher path segment that failed to query would then sort as equal/by a truncated key, giving an unstable/incorrect ordering rather than surfacing the error. The error is only logged, not propagated.","fix":"On query failure, fall back to a key derived from the URI/basename instead of dropping the segment, so sort keys stay comparable and complete.","locations":[{"ref":"src/file_model.rs:55-99","code":"   55 |         loop {\n   56 |             let uri = frac_file.uri();\n   57 | \n   58 |             let key = if let Some(cached_key) = collation_key_cache.get(&uri) {\n   59 |                 cached_key.clone()\n   60 |             } else {\n   61 |                 let file_info = if let Some(file_info) = available_file_info {\n   62 |                     file_info\n   63 |                 } else {\n   64 |                     frac_file\n   65 |                         .query_info_future(\n   66 |                             gio::FILE_ATTRIBUTE_STANDARD_DISPLAY_NAME,\n   67 |                             gio::FileQueryInfoFlags::NONE,\n   68 |                             glib::Priority::LOW,\n   69 |                         )\n   70 |                         .await\n   71 |                 };\n   72 | \n   73 |                 match file_info {\n   74 |                     Ok(parent) => {\n   75 |                         let key = glib::FilenameCollationKey::from(parent.display_name());\n   76 |                         // Using this cache since each file info query can take noticable time (1 ms\n   77 |                         // on local SMB). Only cache keys resulting from queries in this function\n   78 |                         // since these will be path segments that can be (and are likely to) be\n   79 |                         // repeated.\n   80 |                         collation_key_cache.insert(uri, key.clone());\n   81 |                         key\n   82 |                     }\n   83 | \n   84 |                     Err(err) => {\n   85 |                         tracing::error!(\"Failed to obtain information for sorting '{uri}': {err}\",);\n   86 |                         break;\n   87 |                     }\n   88 |                 }\n   89 |             };\n   90 | \n   91 |             sort.push_front(key);\n   92 | \n   93 |             if let Some(parent) = frac_file.parent() {\n   94 |                 frac_file = parent;\n   95 |                 available_file_info = None;\n   96 |             } else {\n   97 |                 break;\n   98 |             }\n   99 |         }","lines":45,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/file_model.rs#L55-99"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`main()` (lib.rs) uses `.unwrap()` on `bindtextdomain`, `textdomain`, and `gio::Resource::from_data`. The resource bytes are compiled-in so that unwrap is essentially infallible, but `bindtextdomain`/`textdomain` can fail at runtime (e.g. invalid LOCALEDIR) and would abort the process at startup with a bare panic rather than degrading to untranslated strings.","fix":"Log and continue on gettext setup failure instead of unwrapping; keep unwrap only for the compiled-in resource.","locations":[{"ref":"src/lib.rs:106-113","code":"  106 |     bindtextdomain(\"loupe\", config::LOCALEDIR).unwrap();\n  107 |     textdomain(\"loupe\").unwrap();\n  108 | \n  109 |     tracing::trace!(\"gettext initialized\");\n  110 | \n  111 |     gio::resources_register(\n  112 |         &gio::Resource::from_data(&glib::Bytes::from_static(GRESOURCE_BYTES)).unwrap(),\n  113 |     );","lines":8,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/lib.rs#L106-113"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `save_overwrite`, the cancellation/error handling for `trash_result` and `move_result` checks `if result.is_err()` (CancellableFuture cancellation) first, then `else if let Ok(Err(err))`. But a genuine cancellation and a real error are both possible; the code treats any outer Err strictly as 'canceled' and silently returns, even though `CancellableFuture` can produce an Err for reasons other than the explicit cancel in some versions. More importantly, on the trash/move failure paths the temporary `.tmp` file that was already written is never cleaned up, leaving a stray file next to the original.","fix":"On the failure/cancel branches after the tmp file was written, delete the leftover tmp_file. Distinguish explicit cancellation from real errors where the API allows.","locations":[{"ref":"src/widgets/edit_window.rs:276-326","code":"  276 |                 if written {\n  277 |                     tracing::debug!(\"Moving image to trash '{}'\", original_file.uri());\n  278 |                     let trash_result = gio::CancellableFuture::new(\n  279 |                         original_file.trash_future(glib::Priority::DEFAULT),\n  280 |                         cancellable.clone(),\n  281 |                     )\n  282 |                     .await;\n  283 | \n  284 |                     if trash_result.is_err() {\n  285 |                         // Canceled\n  286 |                         tracing::debug!(\"Trashing image canceled\");\n  287 |                         return;\n  288 |                     } else if let Ok(Err(err)) = trash_result {\n  289 |                         obj.window_show_error(\n  290 |                                     &gettext(\"Failed to save image.\"),\n  291 |                                     &format!(\"Failed to move image {current_path:?} to trash and therefore couldn't save image: {err}\"),\n  292 |                                     ErrorType::General,\n  293 |                                 );\n  294 |                         return;\n  295 |                     }\n  296 | \n  297 |                     tracing::debug!(\"Moving '{}' to '{}'\", tmp_file.uri(), original_file.uri());\n  298 |                     let move_result = gio::CancellableFuture::new(\n  299 |                         tmp_file\n  300 |                             .move_future(\n  301 |                                 &original_file,\n  302 |                                 gio::FileCopyFlags::NONE,\n  303 |                                 glib::Priority::DEFAULT,\n  304 |                             )\n  305 |                             .0,\n  306 |                         cancellable.clone(),\n  307 |                     )\n  308 |                     .await;\n  309 | \n  310 |                     if move_result.is_err() {\n  311 |                         // Canceled\n  312 |                         tracing::debug!(\"Moving image canceled\");\n  313 |                         return;\n  314 |                     } else if let Ok(Err(err)) = move_result {\n  315 |                         obj.window_show_error(\n  316 |                                         &gettext(\"Failed to save image.\"),\n  317 |                                         &format!(\n  318 |                                             \"Failed to move image image to {current_path:?}: {err} move {:?} to {:?}\", tmp_file.path().unwrap(), original_file.path().unwrap()\n  319 |                                         ),\n  320 |                                         ErrorType::General,\n  321 |                                     );\n  322 |                         return;\n  323 |                     }\n  324 | \n  325 |                     obj.window_inspect(|w| w.show_specific_image(original_file));\n  326 |                 }","lines":51,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit_window.rs#L276-326"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `update_save_state`, the action enabled state uses bitwise `&` on bools: `enabled & self.can_trash.get()`. While `&` on `bool` is valid and non-short-circuiting, this is almost certainly a typo for the logical `&&`; using bitwise here evaluates both operands (harmless for these getters) but is a code smell and inconsistent with idiomatic Rust used elsewhere.","fix":"Use `enabled && self.can_trash.get()`.","locations":[{"ref":"src/widgets/edit_window.rs:447-454","code":"  447 |         pub fn update_save_state(&self, force_disabled: bool) {\n  448 |             let obj = self.obj();\n  449 |             let enabled = self.is_save_sensitive() && !force_disabled;\n  450 | \n  451 |             self.save.set_sensitive(enabled);\n  452 |             obj.action_set_enabled(\"edit.save-overwrite\", enabled & self.can_trash.get());\n  453 |             obj.action_set_enabled(\"edit.save-copy\", enabled);\n  454 |         }","lines":8,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit_window.rs#L447-454"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"set_file_changed compares file extensions via `old_file.basename().map(|x| x.extension().map(|x| x.to_owned()))`. basename() returns a PathBuf; calling .extension() then .to_owned() yields Option<Option<OsString>>. A file with no basename yields None at the outer level, a file with basename but no extension yields Some(None). The comparison `old != new` therefore treats 'no basename' (None) and 'has basename, no extension' (Some(None)) as different even when both files genuinely have no extension, potentially triggering an unnecessary full reload, or conversely masking a real extension change in edge cases. The double-Option semantics are subtle and likely unintended.","fix":"Normalize to a single Option<OsString> via `old_file.basename().and_then(|p| p.extension().map(|e| e.to_owned()))` on both sides before comparing.","locations":[{"ref":"src/widgets/image/loading.rs:35-52","code":"   35 |     async fn set_file_changed(&self, old_file: &gio::File, new_file: &gio::File) {\n   36 |         let obj = self.obj();\n   37 |         let old_filename_ext = old_file\n   38 |             .basename()\n   39 |             .map(|x| x.extension().map(|x| x.to_owned()));\n   40 |         let new_filename_ext = new_file\n   41 |             .basename()\n   42 |             .map(|x| x.extension().map(|x| x.to_owned()));\n   43 | \n   44 |         self.file.replace(Some(new_file.clone()));\n   45 |         self.reload_file_info().await;\n   46 | \n   47 |         // Reload if file extension changed since other decoding path might be\n   48 |         // responsible now\n   49 |         if old_filename_ext != new_filename_ext {\n   50 |             obj.load(new_file).await;\n   51 |             return;\n   52 |         }","lines":18,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/loading.rs#L35-52"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`about.rs` `os_release()` reads /etc/os-release (or /run/host/etc) with `unwrap_or_default()`, silently producing empty OS info in debug reports when the read fails (permissions, missing file). Acceptable for a debug-info string but the failure is invisible.","fix":"Optionally log the read error so missing debug info is explainable.","locations":[{"ref":"src/about.rs:60-63","code":"   60 | fn os_release() -> String {\n   61 |     let os_release = etc().join(\"os-release\");\n   62 |     std::fs::read_to_string(os_release).unwrap_or_default()\n   63 | }","lines":4,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/about.rs#L60-63"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"The decoder update channel is created with `mpsc::unbounded()` and `UpdateSender::send` uses `force_send`, which on an unbounded channel never blocks and the `Ok(Some(msg))` 'replaced message' branch can never occur (force_send only replaces on bounded channels). More importantly, an unbounded channel combined with a fast tile producer (many Redraw messages per push) can grow without bound if the renderer side stalls, and the dead `Ok(Some(_))` arm signals confusion about the channel type.","fix":"Either use a bounded channel (then force_send semantics and the replace branch are meaningful and provide backpressure), or drop the dead `Ok(Some(msg))` handling and rely on plain `send`/`try_send`; coalesce repeated Redraw signals.","locations":[{"ref":"src/decoder.rs:80-88","code":"   80 |     pub fn send(&self, update: DecoderUpdate) {\n   81 |         let result = self.sender.force_send(update);\n   82 | \n   83 |         match result {\n   84 |             Err(err) => tracing::error!(\"Failed to send update: {err}\"),\n   85 |             Ok(Some(msg)) => tracing::error!(\"Unexpectedly replaced the message {msg:?}\"),\n   86 |             _ => {}\n   87 |         }\n   88 |     }","lines":9,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder.rs#L80-88"},{"ref":"src/decoder.rs:154","code":"  154 |         let (sender, receiver) = mpsc::unbounded();","lines":1,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder.rs#L154"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`set_crop_width`/`set_crop_height` log rejected negative values with `eprintln!` while the sibling `set_crop_x`/`set_crop_y` use `tracing::error!`. `eprintln!` bypasses the project's tracing/logging infrastructure (no level filtering, no structured output) and is almost certainly a leftover debugging artifact.","fix":"Replace both `eprintln!` calls with `tracing::error!` to match the rest of the file.","locations":[{"ref":"src/widgets/edit/crop_selection.rs:882-885","code":"  882 |         pub(super) fn set_crop_width(&self, width: f32) {\n  883 |             if width < 0. {\n  884 |                 eprintln!(\"Tried to set width to {width}\");\n  885 |                 return;","lines":4,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L882-885"},{"ref":"src/widgets/edit/crop_selection.rs:897-901","code":"  897 |         pub(super) fn set_crop_height(&self, height: f32) {\n  898 |             if height < 0. {\n  899 |                 eprintln!(\"Tried to set height to {height}\");\n  900 |                 return;\n  901 |             }","lines":5,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L897-901"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"background_color_guess captures `texture` (a gdk::Texture, a GObject) and moves it into `gio::spawn_blocking`, then calls `texture.width()`/`texture.height()` from a worker thread. GTK/GDK objects are generally not Send and must be touched on the main thread; gdk::Texture download is thread-safe but calling GObject methods (width/height) off the main thread is contractually unsafe under GTK. The width/height are already known on the main thread and could be captured as plain integers before spawning.","fix":"Capture `let (tw, th) = (texture.width() as usize, texture.height());` on the main thread before `gio::spawn_blocking`, and do not move the texture into the worker closure.","locations":[{"ref":"src/widgets/image/background_color.rs:103-158","code":"  103 |         gio::spawn_blocking(move || {\n  104 |             let mut has_transparency = false;\n  105 |             let mut bytes_iter = bytes.iter();\n  106 |             // Number of transparent pixels\n  107 |             let mut completely_transparent = 0;\n  108 |             // Number of non-transparent pixels with bad contrast\n  109 |             let mut bad_contrast = 0;\n  110 |             'img: loop {\n  111 |                 for _ in 0..texture.width() {\n  112 |                     let Some(r) = bytes_iter.next() else {\n  113 |                         break 'img;\n  114 |                     };\n  115 |                     let Some(g) = bytes_iter.next() else {\n  116 |                         break 'img;\n  117 |                     };\n  118 |                     let Some(b) = bytes_iter.next() else {\n  119 |                         break 'img;\n  120 |                     };\n  121 |                     let Some(a) = bytes_iter.next() else {\n  122 |                         break 'img;\n  123 |                     };\n  124 | \n  125 |                     if *a < 255 {\n  126 |                         has_transparency = true;\n  127 |                     }\n  128 | \n  129 |                     if *a == 0 {\n  130 |                         completely_transparent += 1;\n  131 |                     } else {\n  132 |                         let fg = gdk::RGBA::new(\n  133 |                             *r as f32 / 255.,\n  134 |                             *g as f32 / 255.,\n  135 |                             *b as f32 / 255.,\n  136 |                             *a as f32 / 255.,\n  137 |                         );\n  138 |                         let contrast = crate::util::contrast_ratio(&default_color, &fg);\n  139 | \n  140 |                         if contrast < BACKGROUND_GUESS_LOW_CONTRAST_RATIO {\n  141 |                             bad_contrast += 1;\n  142 |                         }\n  143 |                     }\n  144 |                 }\n  145 | \n  146 |                 let advance_by = stride - 4 * texture.width() as usize;\n  147 | \n  148 |                 if advance_by > 0 {\n  149 |                     bytes_iter.nth(advance_by - 1);\n  150 |                 }\n  151 |             }\n  152 | \n  153 |             if !has_transparency {\n  154 |                 tracing::trace!(\"This image does not have transparency\");\n  155 |                 return Some(default_color);\n  156 |             }\n  157 | \n  158 |             let n_pixels = texture.width() * texture.height();","lines":56,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/background_color.rs#L103-158"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"In input_handling, the double-click handler calls `obj.activate_action(\"win.toggle-fullscreen\", None).unwrap()`. If the widget is not yet in a window with that action installed (e.g. detached, during teardown, or used standalone such as in the editing/print preview where the action may not exist), activate_action returns Err and this unwraps to a panic in a GTK signal callback.","fix":"Replace `.unwrap()` with `if let Err(err) = obj.activate_action(...) { tracing::warn!(...) }`.","locations":[{"ref":"src/widgets/image/input_handling.rs:163-166","code":"  163 |                 } else {\n  164 |                     // fullscreen\n  165 |                     obj.activate_action(\"win.toggle-fullscreen\", None).unwrap();\n  166 |                 }","lines":4,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/input_handling.rs#L163-166"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`new_image_page` connects `connect_is_error_notify` capturing `self` (the LpImageView) by `#[weak]`, but the closure calls `obj.model().remove(&file)` and `obj.update_sliding_view(...)` while the notify is being emitted from within the image's property change - which happens during page construction/loading that itself may be triggered from inside `update_sliding_view`/`insert`. Removing pages and mutating the model re-entrantly from a notify handler that can fire during allocation/iteration risks borrowing `imp().model` / `imp().pages` while another borrow is live, leading to a RefCell double-borrow panic. The model `remove` -> `model_content_changed_cb` -> `update_sliding_view` chain can re-enter.","fix":"Defer the removal via `glib::idle_add_local_once`/`spawn_future_local` so model mutation does not happen synchronously inside the property-notify emission.","locations":[{"ref":"src/widgets/image_view.rs:679-703","code":"  679 |         page.image().connect_is_error_notify(glib::clone!(\n  680 |             #[weak(rename_to = obj)]\n  681 |             self,\n  682 |             move |image| {\n  683 |                 if matches!(\n  684 |                     image.specific_error(),\n  685 |                     Some(DecoderError::UnsupportedFormat(_, _))\n  686 |                 ) {\n  687 |                     if obj.current_image().as_ref() == Some(image) {\n  688 |                         tracing::debug!(\n  689 |                             \"Image format unsupported but not removing since current image\"\n  690 |                         );\n  691 |                         return;\n  692 |                     }\n  693 | \n  694 |                     if let Some(file) = image.file() {\n  695 |                         tracing::debug!(\"Removing image with unsupported format {:?}\", file.uri());\n  696 |                         obj.model().remove(&file);\n  697 |                         if let Some(current_file) = obj.current_file() {\n  698 |                             obj.update_sliding_view(&current_file);\n  699 |                         }\n  700 |                     }\n  701 |                 }\n  702 |             }\n  703 |         ));","lines":25,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_view.rs#L679-703"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`current_image_signals` lazily initializes a SignalGroup inside `get_or_init` and, within that closure, calls `self.connect_current_page_notify(...)` capturing `signal_group` by `#[weak]`. The very first caller is `constructed` (line 176), which is fine, but `get_or_init`'s closure borrows `self` while the OnceCell is mid-initialization; `connect_current_page_notify` ultimately may emit/notify synchronously. More importantly the SignalGroup's target is only updated on `current-page` notifications - the initial target is never set, so signals on the first/initial current image (set during `insert` when n_pages==1, before this group exists) are missed until the next page change.","fix":"After creating the group, set its initial target with `signal_group.set_target(self.current_image().as_ref())`.","locations":[{"ref":"src/widgets/image_view.rs:772-784","code":"  772 |     pub fn current_image_signals(&self) -> &glib::SignalGroup {\n  773 |         self.imp().current_image_signals.get_or_init(move || {\n  774 |             let signal_group = glib::SignalGroup::new::<LpImage>();\n  775 |             self.connect_current_page_notify(clone!(\n  776 |                 #[weak]\n  777 |                 signal_group,\n  778 |                 move |obj| {\n  779 |                     signal_group.set_target(obj.current_image().as_ref());\n  780 |                 }\n  781 |             ));\n  782 |             signal_group\n  783 |         })\n  784 |     }","lines":13,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_view.rs#L772-784"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`on_size_unit_changed` declares `let _ui_updates_disabled = self.disable_ui_updates();` twice (lines 804 and 818). The second binding shadows the first; both guards are alive until end of scope so the disable counter is incremented to 2 and decremented to 0 at function end - functionally harmless but clearly a copy/paste mistake indicating confusion about the guard's lifetime, and it doubles the counter churn.","fix":"Remove the duplicate `let _ui_updates_disabled = self.disable_ui_updates();` on line 818.","locations":[{"ref":"src/widgets/print.rs:804-818","code":"  804 |         let _ui_updates_disabled = self.disable_ui_updates();\n  805 | \n  806 |         let (orig_width, orig_height) = self.original_size();\n  807 | \n  808 |         let unit = self.size_unit();\n  809 |         let width_factor = unit.factor(self.dpi(), orig_width);\n  810 |         let height_factor = unit.factor(self.dpi(), orig_height);\n  811 | \n  812 |         let width = imp.width.value() * width_factor / self.width_unit_factor();\n  813 |         let height = imp.height.value() * height_factor / self.height_unit_factor();\n  814 | \n  815 |         self.set_width_unit_factor(width_factor);\n  816 |         self.set_height_unit_factor(height_factor);\n  817 | \n  818 |         let _ui_updates_disabled = self.disable_ui_updates();","lines":15,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L804-818"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"SVG `FrameRequest::clip` is called with `area.x() as u32, area.y() as u32, area.width() as u32, area.height() as u32` where `area = tile_instructions.area_with_bleed()`. `area_with_bleed` insets by `-bleed`, so x/y can become negative (for an edge tile bled outward at coordinate 0). Casting a negative f32 to u32 saturates to 0, silently shifting the clip origin and mismatching the texture that is later positioned at `tile_instructions.area.x()` (without bleed). For bleed>0 this can misalign the rendered tile.","fix":"Clamp the bled area to image bounds (or to >=0) before casting to u32, and ensure the clip origin used for rendering matches the position used to place the resulting texture.","locations":[{"ref":"src/decoder/formats/svg.rs:120-149","code":"  120 |                             let (total_width, total_height) =\n  121 |                                 tile_instructions.tiling.scaled_dimensions();\n  122 |                             let area = tile_instructions.area_with_bleed();\n  123 | \n  124 |                             let frame_request = glycin::FrameRequest::new()\n  125 |                                 .scale(total_width, total_height)\n  126 |                                 .clip(\n  127 |                                     area.x() as u32,\n  128 |                                     area.y() as u32,\n  129 |                                     area.width() as u32,\n  130 |                                     area.height() as u32,\n  131 |                                 );\n  132 | \n  133 |                             match image.specific_frame(frame_request).await {\n  134 |                                 Ok(frame) => {\n  135 |                                     if is_first_frame {\n  136 |                                         is_first_frame = false;\n  137 | \n  138 |                                         let mut metadata: Metadata = Metadata::default();\n  139 |                                         metadata.set_frame_metadata(&frame);\n  140 | \n  141 |                                         updater.send(DecoderUpdate::Metadata(Box::new(metadata)));\n  142 |                                     }\n  143 | \n  144 |                                     let position = (\n  145 |                                         tile_instructions.area.x() as u32,\n  146 |                                         tile_instructions.area.y() as u32,\n  147 |                                     );\n  148 | \n  149 |                                     tiles.push_tile(tiling, position, frame.texture());","lines":30,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/formats/svg.rs#L120-149"},{"ref":"src/decoder/tiling.rs:514-519","code":"  514 | impl TileInstructions {\n  515 |     pub fn area_with_bleed(&self) -> graphene::Rect {\n  516 |         let bleed = self.tiling.bleed as f32;\n  517 |         self.area.inset_r(-bleed, -bleed)\n  518 |     }\n  519 | }","lines":6,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L514-519"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`load_directory` filters images using `FILE_ATTRIBUTE_STANDARD_FAST_CONTENT_TYPE` only, with a comment that FAST is preferred because GVfs/smb may omit the regular content type. However the enumeration also requests the regular content type indirectly nowhere; meanwhile `file_monitor_cb`/`is_image` uses `FILE_ATTRIBUTE_STANDARD_CONTENT_TYPE` (the slow/accurate one). So the directory-load filter and the live-monitor filter use two different content-type attributes and can disagree about whether the same file is an image (e.g. ambiguous png/apng), causing files to appear on reload but not via monitor or vice versa.","fix":"Use the same content-type attribute (and the same fast/slow fallback logic) in both the enumeration filter and the monitor `is_image` check.","locations":[{"ref":"src/file_model.rs:198-250","code":"  198 |         let enumerator = directory\n  199 |             .enumerate_children_future(\n  200 |                 &format!(\n  201 |                     \"{},{},{},{}\",\n  202 |                     gio::FILE_ATTRIBUTE_STANDARD_NAME,\n  203 |                     gio::FILE_ATTRIBUTE_STANDARD_FAST_CONTENT_TYPE,\n  204 |                     gio::FILE_ATTRIBUTE_STANDARD_IS_HIDDEN,\n  205 |                     gio::FILE_ATTRIBUTE_STANDARD_DISPLAY_NAME,\n  206 |                 ),\n  207 |                 gio::FileQueryInfoFlags::NONE,\n  208 |                 glib::Priority::LOW,\n  209 |             )\n  210 |             .await\n  211 |             .context(gettext(\"Could not list other files in directory.\"))?;\n  212 | \n  213 |         let mut collation_key_cache = Default::default();\n  214 | \n  215 |         loop {\n  216 |             let info = enumerator.next_files_future(1, glib::Priority::LOW).await;\n  217 |             match info {\n  218 |                 Err(err) => {\n  219 |                     tracing::warn!(\"Unreadable entry in directory: {err}\");\n  220 |                     break;\n  221 |                 }\n  222 |                 Ok(mut info) => {\n  223 |                     if let Some(info) = info.pop() {\n  224 |                         // GVfs smb does not provide a CONTENT_TYPE if the content type is\n  225 |                         // ambiguous. This happens for png/apng. Since we\n  226 |                         // only need to know if something is probably an\n  227 |                         // image, we can use the FAST_CONTENT_TYPE in these cases.\n  228 |                         let content_type =\n  229 |                             info.attribute_string(gio::FILE_ATTRIBUTE_STANDARD_FAST_CONTENT_TYPE);\n  230 | \n  231 |                         if let Some(content_type) =\n  232 |                             content_type.and_then(|x| gio::content_type_get_mime_type(&x))\n  233 |                         {\n  234 |                             let hidden =\n  235 |                                 if info.has_attribute(gio::FILE_ATTRIBUTE_STANDARD_IS_HIDDEN) {\n  236 |                                     info.is_hidden()\n  237 |                                 } else {\n  238 |                                     false\n  239 |                                 };\n  240 | \n  241 |                             // Filter out non-images types. The final decision if images are\n  242 |                             // supported/kept will later be done by glycin when starting to load the\n  243 |                             // images. Usually by inspecting the magic bytes.\n  244 |                             if content_type.starts_with(\"image/\") && !hidden {\n  245 |                                 let file = directory.child(info.name());\n  246 |                                 let entry =\n  247 |                                     Entry::new(file, Some(info), &mut collation_key_cache).await;\n  248 |                                 new_files.insert(entry.file.uri(), entry);\n  249 |                             }\n  250 |                         }","lines":53,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/file_model.rs#L198-250"},{"ref":"src/file_model.rs:366-382","code":"  366 |     fn is_image(info: &gio::FileInfo) -> bool {\n  367 |         info.content_type()\n  368 |             .map(|t| t.to_string())\n  369 |             .filter(|t| t.starts_with(\"image/\"))\n  370 |             .is_some()\n  371 |     }\n  372 | \n  373 |     fn is_image_file(file: &gio::File) -> bool {\n  374 |         let Ok(info) =\n  375 |             util::query_attributes(file, vec![gio::FILE_ATTRIBUTE_STANDARD_CONTENT_TYPE])\n  376 |         else {\n  377 |             tracing::warn!(\"Could not query file info: {}\", file.uri());\n  378 |             return false;\n  379 |         };\n  380 | \n  381 |         Self::is_image(&info)\n  382 |     }","lines":17,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/file_model.rs#L366-382"}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"print_data realizes a fresh gsk::CairoRenderer, renders, then unrealizes it. realize_for_display can fail (handled via .ok()?), but if render_texture succeeds and then unrealize() is called, the returned texture must not depend on the renderer; this is generally fine for CairoRenderer. However if `to_node()` returns None the function returns None without ever realizing the renderer (fine), but if realize succeeds and render is fine, there's no error path leak. Minor: the texture is rendered at `scale` with Trilinear filtering but background_color None, so transparent areas around a rotated image will be transparent in the print output, which may print as black or unexpected on some print backends.","fix":"Consider providing an explicit white/opaque background for printing instead of None, to avoid transparent->black artifacts on print backends.","locations":[{"ref":"src/widgets/image/printing.rs:21-56","code":"   21 |     pub fn print_data(&self, scale: f64) -> Option<gdk::Texture> {\n   22 |         let orientation = self.metadata().orientation();\n   23 | \n   24 |         let render_options = tiling::RenderOptions {\n   25 |             scaling_filter: gsk::ScalingFilter::Trilinear,\n   26 |             background_color: None,\n   27 |             scaling: 1.,\n   28 |         };\n   29 | \n   30 |         let snapshot = gtk::Snapshot::new();\n   31 | \n   32 |         self.imp().snapshot_rotate_mirror(\n   33 |             &snapshot,\n   34 |             -(orientation.rotate().degrees() as f32),\n   35 |             orientation.mirror(),\n   36 |             scale,\n   37 |         );\n   38 | \n   39 |         self.imp()\n   40 |             .frame_buffer\n   41 |             .load()\n   42 |             .add_to_snapshot(&snapshot, scale, &render_options);\n   43 | \n   44 |         let node = snapshot.to_node()?;\n   45 | \n   46 |         let renderer = gsk::CairoRenderer::new();\n   47 |         renderer\n   48 |             .realize_for_display(&gdk::Display::default()?)\n   49 |             .ok()?;\n   50 | \n   51 |         let texture = renderer.render_texture(&node, None);\n   52 | \n   53 |         renderer.unrealize();\n   54 | \n   55 |         Some(texture)\n   56 |     }","lines":36,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/printing.rs#L21-56"}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`getlocale` uses `unsafe` FFI into `gettext_sys::setlocale` with a null pointer to query the current locale, then parses the returned bytes. Passing `category as i32` relies on the Rust enum's discriminant matching the C `LC_*` constant values; if `gettextrs::LocaleCategory`'s repr ever diverges from the platform's LC_* integer values this silently queries the wrong category. This coupling is undocumented.","fix":"Map `LocaleCategory` to the libc `LC_*` constants explicitly instead of relying on `as i32` of the enum discriminant, or add an invariant comment/assertion.","locations":[{"ref":"src/widgets/print.rs:972-982","code":"  972 | // TODO: Upstream to gettext if possible\n  973 | pub fn getlocale(category: gettextrs::LocaleCategory) -> Option<Vec<u8>> {\n  974 |     unsafe {\n  975 |         let ret = gettext_sys::setlocale(category as i32, std::ptr::null());\n  976 |         if ret.is_null() {\n  977 |             None\n  978 |         } else {\n  979 |             Some(std::ffi::CStr::from_ptr(ret).to_bytes().to_owned())\n  980 |         }\n  981 |     }\n  982 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L972-982"}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`SlidingViewEditor`'s `Drop` doc says \"Trigger everything that hasn't been done by lazy updates\" but only calls `clear(false)` when empty. The lazy `remove_lazy` path skips emptiness-triggered `clear` (passing lazy=true), and the Drop covers that, but any other deferred notification implied by \"everything\" is not handled - the abstraction over-promises. If future lazy operations are added (e.g. lazy current-page notify) they will silently not fire. Fragile contract.","fix":"Either restrict the doc comment to the empty-clear behavior, or implement an explicit list of pending lazy actions flushed on drop.","locations":[{"ref":"src/widgets/sliding_view.rs:837-844","code":"  837 | impl Drop for SlidingViewEditor {\n  838 |     fn drop(&mut self) {\n  839 |         // Trigger everything that hasn't been done by lazy updates\n  840 |         if self.is_empty() {\n  841 |             self.clear(false);\n  842 |         }\n  843 |     }\n  844 | }","lines":8,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L837-844"},{"ref":"src/widgets/sliding_view.rs:818-827","code":"  818 |     /// Removes the page giving notifications later\n  819 |     pub fn remove_lazy(&self, page: &LpImagePage) {\n  820 |         self.remove(page, true)\n  821 |     }\n  822 | \n  823 |     /// Removes all pages giving notifications later\n  824 |     pub fn clear_lazy(&self) {\n  825 |         self.clear(true)\n  826 |     }\n  827 | }","lines":10,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L818-827"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"`SharedFrameBuffer::push`, `push_tile`, and `set_original_dimensions` each deep-clone the entire `FrameBuffer` (every `TiledImage`, every `TileLayer`, every `Tile` including all `gdk::Texture` handles) inside an `ArcSwap::rcu` closure on every single tile push. During SVG tiling or any multi-tile load this is O(n^2) cloning of the growing tile set per tile produced, on the path that also fires a Redraw. For images with many tiles this is a serious, repeated allocation/clone cost in the hot decode path.","fix":"Hold the frame buffer behind a `Mutex`/`RwLock` (or use a structure with cheap incremental updates) so pushing a tile mutates in place instead of cloning the whole buffer per push; `gdk::Texture` clone is cheap (refcount) but cloning the entire BTreeMap structure repeatedly is not.","locations":[{"ref":"src/decoder/tiling.rs:590-612","code":"  590 |     pub fn push(&self, tile: Tile) {\n  591 |         self.buffer.rcu(|tiling_store| {\n  592 |             let mut new_store = (**tiling_store).clone();\n  593 |             new_store.current().push(tile.clone());\n  594 |             Arc::new(new_store)\n  595 |         });\n  596 |         if let Some(updater) = &self.buffer.load().update_sender {\n  597 |             updater.send(DecoderUpdate::Redraw);\n  598 |         }\n  599 |     }\n  600 | \n  601 |     pub fn push_tile(&self, tiling: Tiling, position: Coordinates, texture: gdk::Texture) {\n  602 |         self.buffer.rcu(|tiling_store| {\n  603 |             let mut new_store = (**tiling_store).clone();\n  604 |             new_store\n  605 |                 .current()\n  606 |                 .push_tile(tiling, position, texture.clone());\n  607 |             Arc::new(new_store)\n  608 |         });\n  609 |         if let Some(updater) = &self.buffer.load().update_sender {\n  610 |             updater.send(DecoderUpdate::Redraw);\n  611 |         }\n  612 |     }","lines":23,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L590-612"},{"ref":"src/decoder/tiling.rs:683-694","code":"  683 |     pub fn set_original_dimensions(&self, size: Coordinates) {\n  684 |         self.buffer.rcu(|tiling_store| {\n  685 |             let mut new_store = (**tiling_store).clone();\n  686 |             new_store.current().original_dimensions = Some(size);\n  687 |             new_store.original_dimensions();\n  688 |             Arc::new(new_store)\n  689 |         });\n  690 | \n  691 |         if let Some(updater) = &self.buffer.load().update_sender {\n  692 |             updater.send(DecoderUpdate::Dimensions);\n  693 |         }\n  694 |     }","lines":12,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L683-694"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`file_monitor_cb` calls `Self::is_image_file` for the `ChangesDoneHint` event (among Created/MovedIn). `ChangesDoneHint` fires after every batch of content writes to a file, and `is_image_file` performs a synchronous, blocking `query_info` (util::query_attributes) on the GLib main thread for each such event. For files being actively written (e.g. a download in progress in the watched directory) this repeatedly blocks the UI thread on synchronous I/O.","fix":"Use the async `query_attributes_future` / query inside the spawned future instead of the synchronous `query_attributes`, and/or debounce ChangesDoneHint events.","locations":[{"ref":"src/file_model.rs:373-382","code":"  373 |     fn is_image_file(file: &gio::File) -> bool {\n  374 |         let Ok(info) =\n  375 |             util::query_attributes(file, vec![gio::FILE_ATTRIBUTE_STANDARD_CONTENT_TYPE])\n  376 |         else {\n  377 |             tracing::warn!(\"Could not query file info: {}\", file.uri());\n  378 |             return false;\n  379 |         };\n  380 | \n  381 |         Self::is_image(&info)\n  382 |     }","lines":10,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/file_model.rs#L373-382"},{"ref":"src/file_model.rs:426-449","code":"  426 |             gio::FileMonitorEvent::Created\n  427 |             | gio::FileMonitorEvent::MovedIn\n  428 |             | gio::FileMonitorEvent::ChangesDoneHint\n  429 |                 if Self::is_image_file(file_a) =>\n  430 |             {\n  431 |                 // ^^^^\n  432 |                 // Changing file content could theoretically make it an image\n  433 |                 // by adding a magic byte\n  434 | \n  435 |                 tracing::debug!(\"File added: {uri_a}\");\n  436 | \n  437 |                 glib::spawn_future_local(glib::clone!(\n  438 |                     #[strong(rename_to=obj)]\n  439 |                     self,\n  440 |                     #[strong]\n  441 |                     file_a,\n  442 |                     async move {\n  443 |                         let changed = obj.insert(file_a.clone()).await;\n  444 |                         if changed {\n  445 |                             obj.emmit_changed(&FileEvent::New(uri_a.to_string()));\n  446 |                         }\n  447 |                     }\n  448 |                 ));\n  449 |             }","lines":24,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/file_model.rs#L426-449"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"In the snapshot hot path, `self.background_color()` is called twice (once to append the background rect, once when building RenderOptions), and `background_color()` clones an Option<gdk::RGBA> out of a RefCell each call (borrow + unwrap_or_else). Minor, but snapshot runs every frame. Also `self.scaling()` is invoked multiple times per snapshot (in RenderOptions and inside round_f64 via every translate), each doing a native()->surface()->scale() chain.","fix":"Compute background_color and scaling once at the top of snapshot() and reuse the locals.","locations":[{"ref":"src/widgets/image/rendering.rs:87-101","code":"   87 |         let render_options = tiling::RenderOptions {\n   88 |             scaling_filter,\n   89 |             scaling: self.scaling(),\n   90 |             background_color: Some(self.background_color()),\n   91 |         };\n   92 | \n   93 |         // Operations on e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L836-909"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"duplicate_from does `original_imp.frame_buffer.load_full()` then clones the whole inner FrameBuffer `(*(...)).clone()` and swaps it into a new Arc. Cloning an entire tiled frame buffer (potentially many textures) is expensive; for a duplicate that is immediately reloaded this may be wasteful. Also it copies orientation but not metadata/file extension info, so the duplicate is only partially initialized.","fix":"If the duplicate is reloaded anyway, avoid deep-cloning the frame buffer; share the Arc or copy lazily. Confirm whether the partial state is intended.","locations":[{"ref":"src/widgets/image.rs:399-410","code":"  399 |     pub fn duplicate_from(&self, original: &LpImage) {\n  400 |         let original_imp = original.imp();\n  401 | \n  402 |         let imp = self.imp();\n  403 | \n  404 |         *imp.file.borrow_mut() = original_imp.file.borrow().clone();\n  405 |         imp.frame_buffer\n  406 |             .swap(Arc::new((*(original_imp.frame_buffer).load_full()).clone()));\n  407 | \n  408 |         imp.original_orientation\n  409 |             .set(Some(original_imp.metadata.borrow().orientation()));\n  410 |     }","lines":12,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image.rs#L399-410"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`set_images_from_files` adds every file to the RecentManager synchronously in a loop, then for the multi-file case `load_files` builds the whole model and pages. RecentManager IO and uri() formatting per file is done on the main thread before any UI shows. For a large multi-selection this delays first paint. Minor but main-thread-blocking.","fix":"Defer RecentManager additions (idle/async) or batch them off the critical
