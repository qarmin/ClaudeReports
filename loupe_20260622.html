<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`LpErrorDetails::new` is invoked from `image_page.rs` with `&obj.root().unwrap()`. The error \"more info\" button handler captures the page weakly, but at the moment the button is clicked the page may have been unparented from the sliding view (pages are routinely removed/unparented by `update_sliding_view`, `scroll_to_neighbor`, `remove`). A widget that has been unparented has `root() == None`, so `root().unwrap()` panics. The error page can remain visible (it is the current page's stack child) while still being detachable, so this is reachable.","fix":"Use `if let Some(root) = obj.root()` and bail out (or fall back to a stored window reference) instead of `.unwrap()`.","locations":[{"ref":"src/widgets/image_page.rs:278-284","code":"  278 |             imp.error_more_info.connect_clicked(glib::clone!(\n  279 |                 #[weak(rename_to = obj)]\n  280 |                 self,\n  281 |                 move |_| {\n  282 |                     LpErrorDetails::new(&obj.root().unwrap(), &details, ErrorType::Loader);\n  283 |                 }\n  284 |             ));","lines":7,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_page.rs#L278-284"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`draw_page` calls `image.print_data(texture_scale).unwrap()` and `cairo::ImageSurface::create_for_data(...).unwrap()`. `print_data` can fail (returns a Result/Option) and `create_for_data` fails if stride/size are invalid or the surface is too large. Since this runs in the print path on user-controlled image sizes/scales, a failure aborts the whole process via panic instead of surfacing a print error.","fix":"Propagate these with `?` into the `anyhow::Result` that `draw_page` already returns instead of `.unwrap()`, so the error is logged via the existing `tracing::warn!(\"Print error: {err}\")` handler in `print()`.","locations":[{"ref":"src/widgets/print.rs:929-950","code":"  929 |             image.print_data(texture_scale).unwrap()\n  930 |         };\n  931 | \n  932 |         let image_surface = {\n  933 |             let mut downloader = gdk::TextureDownloader::new(&texture);\n  934 |             downloader.set_format(gdk::MemoryFormat::B8g8r8a8Premultiplied);\n  935 | \n  936 |             let (data, stride) = downloader.download_bytes();\n  937 |             let data = data.to_vec();\n  938 | \n  939 |             let width = texture.width();\n  940 |             let height = texture.height();\n  941 | \n  942 |             cairo::ImageSurface::create_for_data(\n  943 |                 data,\n  944 |                 cairo::Format::ARgb32,\n  945 |                 width,\n  946 |                 height,\n  947 |                 stride as i32,\n  948 |             )\n  949 |             .unwrap()\n  950 |         };","lines":22,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L929-950"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In the SVG decoder loop the current request is read with `request_store.read().ok().unwrap()`, which panics if the lock is poisoned. The companion `request()` method on the same lock deliberately maps poisoning to an error via `.ok().context(\"RwLock is poisoned\")?`, so poisoning is treated as a recoverable condition elsewhere; here it crashes the spawned task instead. A panic in any code path holding the write lock (e.g. while a future is polled) would poison this lock and turn the next read into a hard panic.","fix":"Avoid `.ok().unwrap()`. Use `request_store.read().map(|r| r.is_waiting()).unwrap_or(false)` (or `if let Ok(r) = request_store.read() { if r.is_waiting() { break; } }`) so a poisoned lock does not abort the decoder thread.","locations":[{"ref":"src/decoder/formats/svg.rs:109-111","code":"  109 |                             if request_store.read().ok().unwrap().is_waiting() {\n  110 |                                 break;\n  111 |                             }","lines":3,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/formats/svg.rs#L109-111"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`ParentWindow::window()` does `self.root().and_downcast().unwrap()`. If the widget is not yet rooted or its root is not an `LpWindow` (e.g. it lives under an `LpEditWindow` or is unmapped), this panics, taking down the whole app. The error is logged immediately before the unwrap, confirming the authors know the None case is reachable, yet they still unwrap.","fix":"Return a fallible/optional type, or have callers use the existing `try_window()`; avoid `.unwrap()` on a value the code itself reports can be None.","locations":[{"ref":"src/util/root.rs:23-36","code":"   23 |     #[track_caller]\n   24 |     fn window(&self) -> LpWindow {\n   25 |         let result = self.root().and_downcast();\n   26 | \n   27 |         if result.is_none() {\n   28 |             tracing::error!(\n   29 |                 \"Couldn't find LpWindow for {self:?}. mapped={}. caller={}\",\n   30 |                 self.is_mapped(),\n   31 |                 std::panic::Location::caller(),\n   32 |             );\n   33 |         }\n   34 | \n   35 |         result.unwrap()\n   36 |     }","lines":14,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/util/root.rs#L23-36"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`image()` in the crop selection unwraps the result of `ancestor(LpEditCrop::static_type())` and the subsequent downcast. If `crop_area_widget_coord`/`size_allocate` (or any path calling `image()`) runs while the widget is not yet parented under an `LpEditCrop` (e.g. during teardown or reparenting), both unwraps panic. size_allocate is called by GTK and can fire in edge cases before/after the ancestor chain is established.","fix":"Return `Option<LpImage>` and have callers handle the None case gracefully, or guard with `try_get`/`ancestor(...).and_then(...)` and bail out of size_allocate when no image is available.","locations":[{"ref":"src/widgets/edit/crop_selection.rs:937-945","code":"  937 |         pub(super) fn image(&self) -> LpImage {\n  938 |             let crop = self\n  939 |                 .obj()\n  940 |                 .ancestor(LpEditCrop::static_type())\n  941 |                 .unwrap()\n  942 |                 .downcast::<LpEditCrop>()\n  943 |                 .unwrap();\n  944 |             crop.image()\n  945 |         }","lines":9,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L937-945"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`LpImagePage::file` does `self.image().file().unwrap()`. `LpImage::file()` returns `Option<gio::File>`; if a page's image was constructed but `init`/`load` not yet completed or the file was cleared, this panics. `file()` is called pervasively (sliding_view error logging, `pages()`, `get()`, every `tracing::error!`), including in error paths where the file may legitimately be absent. A page whose file is None turns diagnostic/error logging into a panic.","fix":"Return `Option<gio::File>` or provide a fallback; avoid `unwrap` on a value that is logically optional.","locations":[{"ref":"src/widgets/image_page.rs:192-194","code":"  192 |     pub fn file(&self) -> gio::File {\n  193 |         self.image().file().unwrap()\n  194 |     }","lines":3,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_page.rs#L192-194"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`file()` does `self.image().file().unwrap()`. `LpImage::file()` returns an `Option` and is None for images without a backing GFile. `show_print_dialog` guards against a missing file before constructing the dialog, but `file()` is a public method and is also called during `constructed` (line 358 via `obj.file()`); any code path reaching an LpPrint whose image lost its file (or a future caller) panics.","fix":"Return `Option<gio::File>` from `file()` and handle None, or document/enforce the invariant; at minimum avoid unwrap in `constructed`.","locations":[{"ref":"src/widgets/print.rs:544-546","code":"  544 |     pub fn file(&self) -> gio::File {\n  545 |         self.image().file().unwrap()\n  546 |     }","lines":3,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L544-546"},{"ref":"src/widgets/print.rs:357-361","code":"  357 |             let basename = obj\n  358 |                 .file()\n  359 |                 .basename()\n  360 |                 .map(|x| x.display().to_string())\n  361 |                 .unwrap_or_default();","lines":5,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L357-361"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`image.file().unwrap()` in the SVG branch of `draw_page` will panic if the image has no file. Same root cause as the `file()` unwrap, but in the async print drawing path.","fix":"Use the already-fallible context: bail with an error (`?`/`anyhow::bail!`) when `image.file()` is None instead of unwrapping.","locations":[{"ref":"src/widgets/print.rs:920-927","code":"  920 |         let texture = if image.metadata().is_svg() {\n  921 |             // Render SVG to exact needed sizes\n  922 |             decoder::formats::Svg::render_print(\n  923 |                 &image.file().unwrap(),\n  924 |                 (orig_width * texture_scale) as i32,\n  925 |                 (orig_height * texture_scale) as i32,\n  926 |             )\n  927 |             .await?","lines":8,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L920-927"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`get_layer_tiling_or_default` on `SharedFrameBuffer` performs the work inside an `rcu` closure that captures `tiling = Some(...)` and then `tiling.unwrap()` after. Because `rcu` may run its closure multiple times under contention, the side-effecting `get_layer_tiling_or_default` (which inserts a default TileLayer into the cloned store) is executed repeatedly and only the last clone is committed; the unwrap itself is safe only because the closure runs at least once. This is fragile: the mutation must be idempotent, which is not documented or obviously guaranteed.","fix":"Capture the result more robustly (the closure must remain pure-ish); document that rcu may re-run the closure, and ensure `get_layer_tiling_or_default` is idempotent. Consider computing tiling without mutating, then inserting once after the rcu settles.","locations":[{"ref":"src/decoder/tiling.rs:638-650","code":"  638 |     pub fn get_layer_tiling_or_default(&self, zoom: f64, viewport: graphene::Rect) -> Tiling {\n  639 |         let mut tiling = None;\n  640 |         self.buffer.rcu(|tiling_store| {\n  641 |             let mut new_store = (**tiling_store).clone();\n  642 |             tiling = Some(\n  643 |                 new_store\n  644 |                     .current()\n  645 |                     .get_layer_tiling_or_default(zoom, viewport),\n  646 |             );\n  647 |             Arc::new(new_store)\n  648 |         });\n  649 |         tiling.unwrap()\n  650 |     }","lines":13,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L638-650"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`query_attributes` calls `attributes.remove(0)` on the passed Vec without checking it is non-empty. An empty `attributes` vector causes an index-out-of-bounds panic. The async sibling `query_attributes_future` correctly guards this with `.first().context(\"No attributes\")?`, so the synchronous version is inconsistent and unsafe.","fix":"Guard against an empty vec (return an error) as `query_attributes_future` does, e.g. `let mut attr_str = String::from(*attributes.first().context(\"No attributes\")?);`.","locations":[{"ref":"src/util.rs:61-74","code":"   61 | pub fn query_attributes(file: &gio::File, attributes: Vec<&str>) -> anyhow::Result<gio::FileInfo> {\n   62 |     let mut attributes = attributes;\n   63 |     let mut attr_str = String::from(attributes.remove(0));\n   64 |     for attr in attributes {\n   65 |         write!(attr_str, \",{attr}\")?;\n   66 |     }\n   67 | \n   68 |     file.query_info(\n   69 |         &attr_str,\n   70 |         gio::FileQueryInfoFlags::empty(),\n   71 |         gio::Cancellable::NONE,\n   72 |     )\n   73 |     .context(\"Failed to query string\")\n   74 | }","lines":14,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/util.rs#L61-74"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`LpPrintPreviewPage::dispose` calls `self.obj().first_child().unwrap().unparent()`. If the page never received a child (e.g. preview_image was never set because `init()` was not called - which only happens on `image-notify`), `first_child()` is None and dispose panics during teardown.","fix":"Use `if let Some(child) = self.obj().first_child() { child.unparent(); }`.","locations":[{"ref":"src/widgets/print_preview.rs:53-56","code":"   53 |         fn dispose(&self) {\n   54 |             self.obj().first_child().unwrap().unparent();\n   55 |         }\n   56 |     }","lines":4,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print_preview.rs#L53-56"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`LpShyBin` measure and size_allocate both call `self.obj().child().unwrap()`. If the bin is realized/allocated without a child set, this panics. adw::Bin allows a null child, and GTK can measure a widget before its child is assigned (e.g. during template instantiation or transient states), making the unwrap reachable.","fix":"Guard with `if let Some(child) = self.obj().child()` and return a zero measure / no-op allocate when absent.","locations":[{"ref":"src/widgets/shy_bin.rs:54-70","code":"   54 |         fn measure(&self, orientation: gtk::Orientation, for_size: i32) -> (i32, i32, i32, i32) {\n   55 |             let mut measure = self.obj().child().unwrap().measure(orientation, for_size);\n   56 | \n   57 |             if orientation == gtk::Orientation::Horizontal {\n   58 |                 // Set natural size to minimal size\n   59 |                 measure.1 = measure.0;\n   60 |             }\n   61 | \n   62 |             measure\n   63 |         }\n   64 | \n   65 |         fn size_allocate(&self, width: i32, height: i32, baseline: i32) {\n   66 |             self.obj()\n   67 |                 .child()\n   68 |                 .unwrap()\n   69 |                 .allocate(width, height, baseline, None);\n   70 |         }","lines":17,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/shy_bin.rs#L54-70"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":false,"description":"set_hadjustment/set_vadjustment connect a new `value_changed` signal handler to the incoming adjustment every time they are called, but never disconnect the handler from the previously stored adjustment. GtkScrolledWindow re-sets adjustments on the scrollable, so each re-parenting / reconfiguration leaks a closure that strong-captures (via weak `obj`, but still keeps a SignalHandler connection alive on the old Adjustment for as long as that adjustment lives). Old adjustments that GTK keeps around will keep firing into a stale handler, and handlers accumulate. The handler should be disconnected from the old adjustment before replacing it (store the SignalHandlerId, or use a SignalGroup as is done for the surface).","fix":"Track the SignalHandlerId for each adjustment and disconnect it from the previous adjustment in `self.hadjustment`/`self.vadjustment` before replacing, or route through a glib::SignalGroup like `surface_signals`.","locations":[{"ref":"src/widgets/image/scrollable.rs:26-60","code":"   26 |     pub fn set_hadjustment(&self, hadjustment: Option<gtk::Adjustment>) {\n   27 |         let obj = self.obj();\n   28 | \n   29 |         let adjustment = hadjustment.unwrap_or_default();\n   30 | \n   31 |         adjustment.connect_value_changed(glib::clone!(\n   32 |             #[weak]\n   33 |             obj,\n   34 |             move |_| {\n   35 |                 obj.imp().request_tiles();\n   36 |                 obj.queue_draw();\n   37 |             }\n   38 |         ));\n   39 | \n   40 |         self.hadjustment.replace(adjustment);\n   41 |         self.configure_adjustments();\n   42 |     }\n   43 | \n   44 |     pub fn set_vadjustment(&self, vadjustment: Option<gtk::Adjustment>) {\n   45 |         let obj = self.obj();\n   46 | \n   47 |         let adjustment = vadjustment.unwrap_or_default();\n   48 | \n   49 |         adjustment.connect_value_changed(glib::clone!(\n   50 |             #[weak]\n   51 |             obj,\n   52 |             move |_| {\n   53 |                 obj.imp().request_tiles();\n   54 |                 obj.queue_draw();\n   55 |             }\n   56 |         ));\n   57 | \n   58 |         self.vadjustment.replace(adjustment);\n   59 |         self.configure_adjustments();\n   60 |     }","lines":35,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/scrollable.rs#L26-60"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"`show_error` is connected to `image.connect_is_error_notify` and runs every time the `is-error` property is notified. Each invocation calls `imp.error_more_info.connect_clicked(...)` and connects a brand new \"clicked\" handler without disconnecting previous ones. If `is-error` is notified more than once (e.g. error cleared and re-set, or notified on reload), handlers accumulate on the same button, so a single click opens multiple error dialogs and leaks closures (each captures a strong-ish weak ref to the page). The connection should be set up once in `constructed`, not inside the repeatable `show_error`.","fix":"Connect the `error_more_info` clicked handler once in `constructed`, storing the current `details`/`type` in a cell that `show_error` updates; or disconnect the previous handler before connecting a new one.","locations":[{"ref":"src/widgets/image_page.rs:139-145","code":"  139 |             obj.image().connect_is_error_notify(clone!(\n  140 |                 #[weak]\n  141 |                 obj,\n  142 |                 move |_| {\n  143 |                     glib::spawn_future_local(async move { obj.show_error().await });\n  144 |                 }\n  145 |             ));","lines":7,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_page.rs#L139-145"},{"ref":"src/widgets/image_page.rs:278-291","code":"  278 |             imp.error_more_info.connect_clicked(glib::clone!(\n  279 |                 #[weak(rename_to = obj)]\n  280 |                 self,\n  281 |                 move |_| {\n  282 |                     LpErrorDetails::new(&obj.root().unwrap(), &details, ErrorType::Loader);\n  283 |                 }\n  284 |             ));\n  285 | \n  286 |             imp.error_page.set_description(Some(&description));\n  287 | \n  288 |             imp.error_more_info.set_visible(true);\n  289 |             imp.stack.set_visible_child(&*imp.error_page);\n  290 |         }\n  291 |     }","lines":14,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_page.rs#L278-291"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"Decoder update listener: load() spawns a future_local that loops `while let Ok(update) = decoder_update.recv().await` upgrading a weak ref. When a new load() is called, a new decoder + new channel + new spawned future are created, but the old spawned future only terminates when its old decoder_update sender is dropped. The old decoder Arc is replaced in imp.decoder, but if anything else holds the old Decoder Arc (e.g. a tick_callback closure referencing it, or in-flight work), the old receiver loop keeps running. Each reload spawns another listener task; they should mostly clean up, but there is no explicit cancellation, relying on sender drop. Worth confirming the old Decoder/sender is actually dropped on every reload.","fix":"Hold a generation token / AbortHandle for the listener task and abort the previous one in load(), rather than relying solely on channel-sender drop.","locations":[{"ref":"src/widgets/image/loading.rs:342-355","code":"  342 |         let (decoder, decoder_update) = Decoder::new(file.clone(), tiles.clone()).await;\n  343 | \n  344 |         let weak_obj = self.downgrade();\n  345 |         glib::spawn_future_local(async move {\n  346 |             while let Ok(update) = decoder_update.recv().await {\n  347 |                 if let Some(obj) = weak_obj.upgrade() {\n  348 |                     obj.imp().update(update);\n  349 |                 }\n  350 |             }\n  351 |             tracing::debug!(\"Stopped listening to decoder since sender is gone\");\n  352 |         });\n  353 | \n  354 |         imp.decoder.replace(Some(Arc::new(decoder)));\n  355 |     }","lines":14,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/loading.rs#L342-355"},{"ref":"src/widgets/image/loading.rs:317-355","code":"  317 |     pub async fn load(&self, file: &gio::File) {\n  318 |         let imp = self.imp();\n  319 |         tracing::debug!(\"Loading file {}\", file.uri());\n  320 | \n  321 |         if imp.rotation_animation().state() == adw::AnimationState::Playing {\n  322 |             tracing::debug!(\"Queueing image reload due to playing rotate animation.\");\n  323 |             self.imp().queued_reload.replace(Some(file.clone()));\n  324 |             return;\n  325 |         }\n  326 | \n  327 |         imp.metadata.replace(Metadata::default());\n  328 |         self.imp().emmit_metadata_changed();\n  329 |         self.imp().set_file_loaded(file).await;\n  330 | \n  331 |         let tiles = &self.imp().frame_buffer;\n  332 | \n  333 |         // Delete all stored textures for reloads\n  334 |         let previous_frame_buffer = tiles.reset();\n  335 |         // Store previos frames to show until new texture is loaded\n  336 |         self.imp()\n  337 |             .previous_frame_buffer\n  338 |             .swap(previous_frame_buffer.load_full());\n  339 |         // Reset background color for reloads\n  340 |         imp.set_background_color(None);\n  341 | \n  342 |         let (decoder, decoder_update) = Decoder::new(file.clone(), tiles.clone()).await;\n  343 | \n  344 |         let weak_obj = self.downgrade();\n  345 |         glib::spawn_future_local(async move {\n  346 |             while let Ok(update) = decoder_update.recv().await {\n  347 |                 if let Some(obj) = weak_obj.upgrade() {\n  348 |                     obj.imp().update(update);\n  349 |                 }\n  350 |             }\n  351 |             tracing::debug!(\"Stopped listening to decoder since sender is gone\");\n  352 |         });\n  353 | \n  354 |         imp.decoder.replace(Some(Arc::new(decoder)));\n  355 |     }","lines":39,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/loading.rs#L317-355"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In `print_preview.rs`, `set_print` connects `print.connect_image_notify` with a closure that strongly captures `page` (a clone of the page widget). The `LpPrint` holds the preview which holds the page; capturing the page strongly into a signal on `print` (which is reachable from the preview/page tree) sets up a strong reference from the print object back into the widget subtree. Depending on ownership this can form a reference cycle keeping the page (and the heavy preview image) alive after the dialog closes.","fix":"Use a weak reference (`glib::clone!(#[weak] page, ...)`) for the captured page in the connect_image_notify closure.","locations":[{"ref":"src/widgets/print_preview.rs:160-168","code":"  160 |         fn set_print(&self, print: LpPrint) {\n  161 |             let page = self.page.clone();\n  162 |             print.connect_image_notify(move |_| {\n  163 |                 page.init();\n  164 |             });\n  165 | \n  166 |             self.print.replace(Some(print));\n  167 |             self.obj().notify_print();\n  168 |         }","lines":9,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print_preview.rs#L160-168"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`tile_width`/`tile_height` are computed as `u16::max(MIN_TILE_SIZE, viewport.width() as u16)`. The cast `viewport.width() as f32 -> u16` is a saturating/truncating float-to-int cast: a physical viewport wider than 65535 (large/HiDPI displays operate in physical pixels here) truncates the float to a small or zero u16 before `u16::max` runs, yielding a far-too-small tile size and producing far more tiles than intended (severe performance/memory blow-up), rather than a single large tile.","fix":"Clamp before casting, e.g. compute the desired tile size in f64/u32 and only narrow to u16 after `min(u16::MAX as f64, ...)`, or store tile dimensions as u32.","locations":[{"ref":"src/decoder/tiling.rs:282-289","code":"  282 |         let tiling = Tiling {\n  283 |             origin: (viewport.x() as u32, viewport.y() as u32),\n  284 |             tile_width: u16::max(MIN_TILE_SIZE, viewport.width() as u16),\n  285 |             tile_height: u16::max(MIN_TILE_SIZE, viewport.height() as u16),\n  286 |             zoom,\n  287 |             bleed: 0,\n  288 |             original_dimensions: self.original_dimensions.unwrap_or_default(),\n  289 |         };","lines":8,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L282-289"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`relevant_tiles` builds the loop bounds by casting f32 tile-grid coordinates to `i32` (`x0 as i32..=x1 as i32`, same for y) and iterates with `step_by`. For very large scaled SVG dimensions / high zoom these floats can exceed i32 range and saturate, and even when in range an inclusive range over millions of pixels with a ~500px step still allocates a `Vec` of potentially enormous size, then sorts it. There is no upper bound check tying the tile count to the actual preload area size, so a pathological zoom/area can OOM or stall.","fix":"Validate/clamp x0..x1 and y0..y1 against the scaled image dimensions before iterating, and bound the number of generated tiles; reserve the Vec with a sane capacity and bail out (or log) if the count is unreasonable.","locations":[{"ref":"src/decoder/tiling.rs:468-502","code":"  468 |     pub fn relevant_tiles(&self, preload_area: &graphene::Rect) -> Vec<TileInstructions> {\n  469 |         let original_width = self.scaled_dimensions().0 as f32;\n  470 |         let original_height = self.scaled_dimensions().1 as f32;\n  471 | \n  472 |         let tile_width = self.tile_width as f32;\n  473 |         let tile_height = self.tile_height as f32;\n  474 | \n  475 |         let x0 = (preload_area.x() / tile_width).floor() * tile_width + self.origin_shift_x();\n  476 |         let x1 = ((preload_area.x() + preload_area.width()) / tile_width).ceil() * tile_width\n  477 |             + self.origin_shift_x();\n  478 |         let y0 = (preload_area.y() / tile_height).floor() * tile_height + self.origin_shift_y();\n  479 |         let y1 = ((preload_area.y() + preload_area.height()) / tile_height).ceil() * tile_height\n  480 |             + self.origin_shift_y();\n  481 | \n  482 |         let mut tiles = Vec::new();\n  483 |         for x in (x0 as i32..=x1 as i32).step_by(self.tile_width.into()) {\n  484 |             for y in (y0 as i32..=y1 as i32).step_by(self.tile_height.into()) {\n  485 |                 let area = graphene::Rect::new(x as f32, y as f32, tile_width, tile_height);\n  486 |                 let Some(restricted_area) = area.restrict(original_width, original_height) else {\n  487 |                     continue;\n  488 |                 };\n  489 | \n  490 |                 let tile = TileInstructions {\n  491 |                     tiling: *self,\n  492 |                     area: restricted_area,\n  493 |                     coordinates: (restricted_area.x() as u32, restricted_area.y() as u32),\n  494 |                 };\n  495 |                 tiles.push(tile);\n  496 |             }\n  497 |         }\n  498 | \n  499 |         tiles.sort_by_key(|tile| tile.area.center().distance(&preload_area.center()).0 as u32);\n  500 | \n  501 |         tiles\n  502 |     }","lines":35,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L468-502"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Several allocation sizes in `size_allocate` are computed as `i32` subtractions that can go negative and are then passed to `allocate()`. E.g. `space_right` width is `total_width - x as i32 - width as i32` and `space_bottom` height is `total_height - y as i32 - height as i32`. During transient states (e.g. crop rect momentarily larger than total, or rounding via `round_extents`/`img_to_draw_coord`) these can be negative, which is invalid for widget allocation and triggers GTK warnings or mis-sizing.","fix":"Clamp the computed widths/heights to `>= 0` (e.g. `.max(0)`) before passing to `allocate()`.","locations":[{"ref":"src/widgets/edit/crop_selection.rs:450-473","code":"  450 |             self.space_right.allocate(\n  451 |                 total_width - x as i32 - width as i32,\n  452 |                 height as i32,\n  453 |                 -1,\n  454 |                 Some(\n  455 |                     gsk::Transform::new()\n  456 |                         .translate(&graphene::Point::new(x + width + total_x, y + total_y)),\n  457 |                 ),\n  458 |             );\n  459 |             self.space_bottom.allocate(\n  460 |                 total_width,\n  461 |                 total_height - y as i32 - height as i32,\n  462 |                 -1,\n  463 |                 Some(\n  464 |                     gsk::Transform::new()\n  465 |                         .translate(&graphene::Point::new(total_x, y + height + total_y)),\n  466 |                 ),\n  467 |             );\n  468 |             self.space_left.allocate(\n  469 |                 x as i32,\n  470 |                 height as i32,\n  471 |                 -1,\n  472 |                 Some(gsk::Transform::new().translate(&graphene::Point::new(total_x, y + total_y))),\n  473 |             );","lines":24,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L450-473"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`originally_created` casts EXIF date-time fields with `naive.month() as i32`, `day() as i32`, etc., and `fixed.timezone().local_minus_utc() * 60`. The timezone offset multiplication `local_minus_utc() * 60` is an i32 multiply on attacker-controlled EXIF; an extreme offset could overflow in debug builds (panic) though glib would later reject it. Values are not range-checked before being handed to glib::DateTime constructors.","fix":"Use checked arithmetic for the offset (`local_minus_utc().checked_mul(60)`) and fall back to `date_time.to_string()` on overflow / out-of-range.","locations":[{"ref":"src/metadata.rs:211-236","code":"  211 |     pub fn originally_created(&self) -> Option<String> {\n  212 |         if let Some(date_time) = &self.metadata.date_time_original() {\n  213 |             let glib_date_time = match date_time {\n  214 |                 DateTime::Naive(naive) => glib::DateTime::from_local(\n  215 |                     naive.year(),\n  216 |                     naive.month() as i32,\n  217 |                     naive.day() as i32,\n  218 |                     naive.hour() as i32,\n  219 |                     naive.minute() as i32,\n  220 |                     naive.second() as f64,\n  221 |                 )\n  222 |                 .ok(),\n  223 |                 DateTime::FixedOffset(fixed) => {\n  224 |                     let naive = fixed.naive_utc();\n  225 |                     glib::DateTime::new(\n  226 |                         &TimeZone::from_offset(fixed.timezone().local_minus_utc() * 60),\n  227 |                         naive.year(),\n  228 |                         naive.month() as i32,\n  229 |                         naive.day() as i32,\n  230 |                         naive.hour() as i32,\n  231 |                         naive.minute() as i32,\n  232 |                         naive.second() as f64,\n  233 |                     )\n  234 |                     .ok()\n  235 |                 }\n  236 |             };","lines":26,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/metadata.rs#L211-236"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"nth_snapshot is a Cell<u8> incremented with `self.nth_snapshot.get() + 1` on every snapshot. Although it is only stored when `< 3`, the addition `get() + 1` is evaluated every frame. Once the stored value reaches 2 it is never stored again (guard `nth_snapshot < 3`), so it stays at 2 and `2 + 1 = 3` never overflows. This is safe but fragile: the field is documented 'debug only' and the `+ 1` on a u8 read each frame is dead-ish bookkeeping. Not a live bug, but the comment 'Number of snapshots created' is misleading since it stops counting at 2.","fix":"Either remove the counter or saturate explicitly and fix the doc comment to say it only tracks the first few snapshots.","locations":[{"ref":"src/widgets/image.rs:266-267","code":"  266 |         /// Number of snapshots created, debug only\n  267 |         pub(super) nth_snapshot: Cell<u8>,","lines":2,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image.rs#L266-267"},{"ref":"src/widgets/image/rendering.rs:70-74","code":"   70 |         let nth_snapshot = self.nth_snapshot.get() + 1;\n   71 |         if nth_snapshot < 3 {\n   72 |             self.nth_snapshot.set(nth_snapshot);\n   73 |             tracing::trace!(\"Creating snapshot #{nth_snapshot}\");\n   74 |         }","lines":5,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/rendering.rs#L70-74"},{"ref":"src/widgets/image/rendering.rs:146-148","code":"  146 |         if nth_snapshot < 3 {\n  147 |             tracing::trace!(\"Snapshot #{nth_snapshot} created\");\n  148 |         }","lines":3,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/rendering.rs#L146-148"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`source.set_icon(Some(&paintable), paintable.intrinsic_width() / 2 - 6 + 16, -12)`. `intrinsic_width()` returns i32; for a 1px thumbnail `1/2 - 6 + 16 = 10`, fine, but the arithmetic `width/2 - 6 + 16` is computed in i32 and for a paintable with `intrinsic_width()` near i32::MAX (degenerate/corrupt thumbnail) the `+16` could overflow in debug builds. Low likelihood, but the hotspot math is unchecked and the magic numbers (-6, +16, -12) are unexplained beyond a terse comment.","fix":"Use saturating arithmetic or clamp the thumbnail dimensions; document the offsets.","locations":[{"ref":"src/widgets/image_view.rs:343-349","code":"  343 |                     if let Some(paintable) = obj.current_image().and_then(|p| p.thumbnail()) {\n  344 |                         // -6 for cursor width, +16 for margin in .drag-icon\n  345 |                         source.set_icon(\n  346 |                             Some(&paintable),\n  347 |                             paintable.intrinsic_width() / 2 - 6 + 16,\n  348 |                             -12,\n  349 |                         );","lines":7,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_view.rs#L343-349"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"zoom_to_full clamps zoom to min_zoom (lines 245-251) and then to max_zoom (lines 253-260). For an SVG, max_zoom() can be smaller than min_zoom() (e.g. tiny rsvg max size divided by a large long_side, or an image where min_zoom is forced to 1.0 because a dimension is below SMALLEST_RENDERED_PIXEL_SIZE). When min_zoom > max_zoom, the code first raises zoom up to min_zoom (sets is_min_zoom true) then lowers it to max_zoom (sets is_max_zoom true), leaving both flags true and zoom pinned at max_zoom < min_zoom, violating the min constraint. The two clamps are applied independently with no `min_zoom <= max_zoom` reconciliation.","fix":"Compute `let lo = min_zoom; let hi = max_zoom.max(lo);` (or clamp min against max) and use a single `zoom.clamp(lo, hi)`, setting the flags from the final clamped value.","locations":[{"ref":"src/widgets/image/zoom.rs:244-260","code":"  244 |         let min_zoom = self.min_zoom();\n  245 |         if zoom <= min_zoom {\n  246 |             tracing::trace!(zoom, min_zoom, \"Zoom reached minimum zoom level\");\n  247 |             zoom = min_zoom;\n  248 |             obj.set_is_min_zoom(true);\n  249 |         } else {\n  250 |             obj.set_is_min_zoom(false);\n  251 |         }\n  252 | \n  253 |         let max_zoom = self.max_zoom();\n  254 |         if zoom >= max_zoom {\n  255 |             tracing::trace!(zoom, max_zoom, \"Zoom reached maximum zoom level\");\n  256 |             zoom = max_zoom;\n  257 |             obj.set_is_max_zoom(true);\n  258 |         } else {\n  259 |             obj.set_is_max_zoom(false);\n  260 |         }","lines":17,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/zoom.rs#L244-260"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Division-by-zero / NaN risk in print geometry. `user_scale` divides `user_width()` by `orig_width`, `fill_space_width` computes `height * orig_width / orig_height`, and `fill_space_height` divides by `orig_width`. `original_size` returns `image_size()` (raw pixels) when no inch dimensions are available; for a not-yet-loaded or degenerate image `image_size()` can be (0,0), making `orig_width`/`orig_height` zero. The resulting NaN/inf propagates into spin-row ranges (`set_range`), `set_value`, and the cairo surface scale, producing GTK criticals or a blank/garbage print.","fix":"Clamp `original_size` to a minimum of (1.0, 1.0) (or guard each divisor) so downstream geometry never divides by zero.","locations":[{"ref":"src/widgets/print.rs:526-538","code":"  526 |     pub fn original_size(&self) -> (f64, f64) {\n  527 |         let image = self.image();\n  528 |         let metadata = image.metadata();\n  529 |         if let Some((w, h)) = metadata.dimensions_inch() {\n  530 |             let dpi = self.dpi();\n  531 | \n  532 |             ((w * dpi).round(), (h * dpi).round())\n  533 |         } else {\n  534 |             let (w, h) = self.image().image_size();\n  535 | \n  536 |             (w as f64, h as f64)\n  537 |         }\n  538 |     }","lines":13,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L526-538"},{"ref":"src/widgets/print.rs:644-655","code":"  644 |     pub fn user_scale(&self) -> f64 {\n  645 |         let (orig_width, _) = self.original_size();\n  646 | \n  647 |         self.user_width() / orig_width\n  648 |     }\n  649 | \n  650 |     /// Returns scaling of the original image based on selected image size\n  651 |     pub fn user_scale_original(&self) -> f64 {\n  652 |         let (orig_width, _) = self.image().image_size();\n  653 | \n  654 |         self.user_width() / orig_width as f64\n  655 |     }","lines":12,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L644-655"},{"ref":"src/widgets/print.rs:752-768","code":"  752 |     /// Returns width that makes the image fill the page\n  753 |     fn fill_space_width(&self) -> f64 {\n  754 |         let width1 = self.paper_width() - 2. * self.user_margin_horizontal();\n  755 | \n  756 |         let height = self.paper_height() - 2. * self.user_margin_vertical();\n  757 |         let (orig_width, orig_height) = self.original_size();\n  758 |         let width2 = height * orig_width / orig_height;\n  759 | \n  760 |         f64::min(width1, width2)\n  761 |     }\n  762 | \n  763 |     /// Returns height that makes the image fill the page\n  764 |     fn fill_space_height(&self) -> f64 {\n  765 |         let (orig_width, orig_height) = self.original_size();\n  766 | \n  767 |         self.fill_space_width() * orig_height / orig_width\n  768 |     }","lines":17,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L752-768"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`step_to` sets `current_page` and starts the TimedAnimation, but if there is no current page yet (`self.current_page()` is None) or `index_of` fails for either page, the `if let` block is skipped entirely and only the trailing `self.set_current_page(Some(page))` runs - without ever entering StackedCards mode or playing the animation, and crucially without updating `position_tracking` to the new index. The position then stays at the old value while current_page points elsewhere, leaving the view desynchronized (blank/wrong allocation until next queue_allocate with a correct position). `scroll_to_neighbor` and `animate_to` both call `step_to`.","fix":"Handle the else branch: when there is no previous page or indices are missing, fall back to `instant_to`/`scroll_to` so position and current_page stay consistent.","locations":[{"ref":"src/widgets/sliding_view.rs:612-628","code":"  612 |     fn step_to(&self, page: &LpImagePage) {\n  613 |         let animation = self.step_animation();\n  614 |         if let Some(prev_page) = self.current_page()\n  615 |             && let (Some(prev_index), Some(new_index)) =\n  616 |                 (self.index_of(&prev_page), self.index_of(page))\n  617 |         {\n  618 |             let backward = new_index < prev_index;\n  619 | \n  620 |             *self.imp().position_tracking.borrow_mut() =\n  621 |                 PositionTracking::StackedCards(StackedCards::new(prev_page, backward));\n  622 |             // Set current page here as well, to make sure it's set when animation completes\n  623 |             // for disabled animations\n  624 |             self.set_current_page(Some(page));\n  625 |             animation.play();\n  626 |         }\n  627 |         self.set_current_page(Some(page));\n  628 |     }","lines":17,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L612-628"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`cleanup` is documented as 'the most buggy function ever'. When the top (most zoomed-out) layer is not a `Covering::Tiling` it executes `return`, abandoning the entire cleanup and leaving `self.tile_layers` completely unmodified (no tiles pruned), instead of just skipping that layer. A `Simple` top layer (which is a legitimate state, e.g. a non-tiled raster frame produced by `push`/`push_frame`) therefore disables all tile pruning, causing unbounded tile/texture (VRAM) growth as the user zooms/pans.","fix":"Replace the `return` in the `else` branch with `continue`/skip of just the top-layer copy step (or handle the `Simple` layer by keeping its single tile), so cleanup still prunes the remaining layers.","locations":[{"ref":"src/decoder/tiling.rs:343-353","code":"  343 |         // Keep tiles in total-zoom-out layer\n  344 |         // TODO: Change the top layer if window size changes\n  345 |         if let Some((_, top_layer)) = self.tile_layers.iter().next() {\n  346 |             for tile in top_layer.tiles.values() {\n  347 |                 if let Covering::Tiling(tiling) = top_layer.covering {\n  348 |                     kept_tiles.push_tile(tiling, tile.position, tile.texture.clone());\n  349 |                 } else {\n  350 |                     return;\n  351 |                 }\n  352 |             }\n  353 |         }","lines":11,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L343-353"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `relevant_tiles` the loop steps by `self.tile_width`/`self.tile_height`, but the tile rectangle is created with `tile_width`/`tile_height` as width/height and stepping starts at x0 (already aligned plus origin_shift). The clip area passed to glycin later uses `area.width() as u32` etc.; a tile whose `restrict` result has width or height that floors to 0 (e.g. a sliver at the image edge after restrict) would request a 0-sized clip from glycin. `restrict` guards `width <= 0.` but a positive fractional width like 0.4 survives and truncates to 0 in the u32 clip, producing a degenerate/empty frame request.","fix":"After computing the clip, skip tiles whose `area.width() as u32 == 0 || area.height() as u32 == 0`, or round clip dimensions up to at least 1 before calling `FrameRequest::clip`.","locations":[{"ref":"src/decoder/tiling.rs:483-497","code":"  483 |         for x in (x0 as i32..=x1 as i32).step_by(self.tile_width.into()) {\n  484 |             for y in (y0 as i32..=y1 as i32).step_by(self.tile_height.into()) {\n  485 |                 let area = graphene::Rect::new(x as f32, y as f32, tile_width, tile_height);\n  486 |                 let Some(restricted_area) = area.restrict(original_width, original_height) else {\n  487 |                     continue;\n  488 |                 };\n  489 | \n  490 |                 let tile = TileInstructions {\n  491 |                     tiling: *self,\n  492 |                     area: restricted_area,\n  493 |                     coordinates: (restricted_area.x() as u32, restricted_area.y() as u32),\n  494 |                 };\n  495 |                 tiles.push(tile);\n  496 |             }\n  497 |         }","lines":15,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L483-497"},{"ref":"src/decoder/formats/svg.rs:120-131","code":"  120 |                             let (total_width, total_height) =\n  121 |                                 tile_instructions.tiling.scaled_dimensions();\n  122 |                             let area = tile_instructions.area_with_bleed();\n  123 | \n  124 |                             let frame_request = glycin::FrameRequest::new()\n  125 |                                 .scale(total_width, total_height)\n  126 |                                 .clip(\n  127 |                                     area.x() as u32,\n  128 |                                     area.y() as u32,\n  129 |                                     area.width() as u32,\n  130 |                                     area.height() as u32,\n  131 |                                 );","lines":12,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/formats/svg.rs#L120-131"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`push_frame` appends a new frame to `images` via rcu but, unlike `push`/`push_tile`/`set_original_dimensions`, never sends a `DecoderUpdate::Redraw`/`Dimensions`. In `glycin_proxy.rs` the first animated frame compensates by sending `Redraw` manually right after the first `push_frame`, but subsequent buffered frames pushed in the inner loop (line 104) rely solely on `frame_timeout`/tick callbacks to ever be drawn. This implicit contract (push_frame deliberately silent) is undocumented and fragile; a future caller adding a frame will see nothing happen.","fix":"Document that `push_frame` intentionally does not notify (frames are advanced by the animation tick), or make the notification policy explicit/consistent with the other push methods.","locations":[{"ref":"src/decoder/tiling.rs:614-625","code":"  614 |     pub fn push_frame(&self, tile: Tile, dimensions: Coordinates, delay: Duration) {\n  615 |         let mut store = TiledImage::default();\n  616 |         store.push(tile);\n  617 |         store.original_dimensions = Some(dimensions);\n  618 |         store.delay = delay;\n  619 | \n  620 |         self.buffer.rcu(|tiling_store| {\n  621 |             let mut new_store = (**tiling_store).clone();\n  622 |             new_store.images.push_back(store.clone());\n  623 |             Arc::new(new_store)\n  624 |         });\n  625 |     }","lines":12,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L614-625"},{"ref":"src/decoder/formats/glycin_proxy.rs:87-104","code":"   87 |                     tiles.push_frame(tile, dimensions, delay);\n   88 |                     updater.send(DecoderUpdate::Redraw);\n   89 | \n   90 |                     loop {\n   91 |                         if next_frame_recv.recv().await.is_ok() {\n   92 |                             loop {\n   93 |                                 let frame = image.next_frame().await?;\n   94 | \n   95 |                                 let position = (0, 0);\n   96 | \n   97 |                                 let tile = tiling::Tile {\n   98 |                                     position,\n   99 |                                     zoom_level: tiling::zoom_to_level(1.),\n  100 |                                     bleed: 0,\n  101 |                                     texture: frame.texture(),\n  102 |                                 };\n  103 | \n  104 |                                 tiles.push_frame(tile, dimensions, frame.delay().unwrap_or(delay));","lines":18,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/formats/glycin_proxy.rs#L87-104"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the file monitor 'Renamed' handler, the old URI is removed from the model synchronously (shift_remove), setting `changed = true`, but the `emmit_changed` signal is only emitted from inside the async block that runs when `is_image_file(file_b)` is true. If the renamed-to file is NOT an image (e.g. an image renamed to a non-image extension, or `is_image_file` fails to query), the entry is removed from the model but no 'changed' signal is ever emitted. Listeners (the image view) are never told the file disappeared, leaving stale navigation entries that point to a no-longer-listed file.","fix":"Move the removal/emission logic so that when the destination is not an image, a `FileEvent::Removed` is still emitted for `uri_a` whenever the synchronous removal returned true.","locations":[{"ref":"src/file_model.rs:464-491","code":"  464 |             gio::FileMonitorEvent::Renamed => {\n  465 |                 if let Some(file_b) = file_b {\n  466 |                     {\n  467 |                         let uri_b = file_b.uri();\n  468 |                         tracing::debug!(\"File moved from '{uri_a}' to '{uri_b}'\");\n  469 |                         let mut changed =\n  470 |                             self.imp().files.borrow_mut().shift_remove(&uri_a).is_some();\n  471 | \n  472 |                         if Self::is_image_file(file_b) {\n  473 |                             glib::spawn_future_local(glib::clone!(\n  474 |                                 #[strong(rename_to=obj)]\n  475 |                                 self,\n  476 |                                 #[strong]\n  477 |                                 file_b,\n  478 |                                 async move {\n  479 |                                     changed |= obj.insert(file_b.clone()).await;\n  480 | \n  481 |                                     if changed {\n  482 |                                         obj.emmit_changed(&FileEvent::Moved(\n  483 |                                             uri_a.to_string(),\n  484 |                                             uri_b.to_string(),\n  485 |                                         ));\n  486 |                                     }\n  487 |                                 }\n  488 |                             ));\n  489 |                         }\n  490 |                     }\n  491 |                 }","lines":28,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/file_model.rs#L464-491"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `LpAspectRatio::num`, for the `Original` ratio the code picks `(width, height)` if `width > height` else `(height, width)`, i.e. it always builds a >=1 ratio of the longer over shorter side, then applies orientation. But for `Free`/`Original` the `frac()` returns None and `Original` is handled separately - however the orientation transform then computes `x/y` for Landscape and `y/x` for Portrait. Because the (x,y) pair was already normalized to longer/shorter, 'Original' + 'Portrait' yields shorter/longer of the *original*, which may not match the image's true original orientation when the image itself is portrait. The 'Original' aspect ratio is thus not guaranteed to equal the image's real aspect ratio.","fix":"For `Original`, derive the ratio directly from the image's actual width/height without the longer/shorter normalization, and let orientation flip it, or document precisely the intended semantics.","locations":[{"ref":"src/widgets/edit/crop_selection.rs:121-141","code":"  121 |     fn num(&self, crop: &LpEditCropSelection) -> Option<f32> {\n  122 |         let (x, y) = if matches!(self, Self::Original) {\n  123 |             let (width, height) = crop.image().image_size();\n  124 |             let (width, height) = (width as u32, height as u32);\n  125 | \n  126 |             if width > height {\n  127 |                 (width, height)\n  128 |             } else {\n  129 |                 (height, width)\n  130 |             }\n  131 |         } else {\n  132 |             self.frac()?\n  133 |         };\n  134 | \n  135 |         let result = match crop.orientation() {\n  136 |             LpOrientation::Landscape => x as f32 / y as f32,\n  137 |             LpOrientation::Portrait => y as f32 / x as f32,\n  138 |         };\n  139 | \n  140 |         Some(result)\n  141 |     }","lines":21,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L121-141"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`new_crop_area` clamps a shrinking edge by setting width/height to 0 when it goes negative (lines 513-525), then aspect-ratio/free post-processing enforces MIN_SELECTION_SIZE. But in `new_crop_area_aspect_free`, after enforcing MIN_SELECTION_SIZE it adds `width += x` when `x < 0` (line 586) which can pull width below MIN_SELECTION_SIZE again, and the subsequent `x + width > total_width` clamp (line 595) can further shrink it. The min-size guarantee is therefore not actually upheld in corner cases where the selection is pushed against an image edge, allowing a selection smaller than MIN_SELECTION_SIZE.","fix":"Re-clamp to MIN_SELECTION_SIZE after the edge-containment adjustments, or restructure so containment is applied before the minimum-size enforcement and then minimum-size wins.","locations":[{"ref":"src/widgets/edit/crop_selection.rs:559-604","code":"  559 |         fn new_crop_area_aspect_free(\n  560 |             &self,\n  561 |             resize: &InResize,\n  562 |             (x, y): (f64, f64),\n  563 |         ) -> graphene::Rect {\n  564 |             let (mut x, mut y, mut width, mut height) =\n  565 |                 self.new_crop_area(resize, (x, y)).into_tuple();\n  566 | \n  567 |             if width < MIN_SELECTION_SIZE {\n  568 |                 let x_diff = width - MIN_SELECTION_SIZE;\n  569 |                 width = MIN_SELECTION_SIZE;\n  570 | \n  571 |                 if matches!(resize.handle.h_edge(), Some(HEdge::Left)) {\n  572 |                     x += x_diff;\n  573 |                 }\n  574 |             }\n  575 | \n  576 |             if height < MIN_SELECTION_SIZE {\n  577 |                 let y_diff = height - MIN_SELECTION_SIZE;\n  578 |                 height = MIN_SELECTION_SIZE;\n  579 | \n  580 |                 if matches!(resize.handle.v_edge(), Some(VEdge::Top)) {\n  581 |                     y += y_diff;\n  582 |                 }\n  583 |             }\n  584 | \n  585 |             if x < 0. {\n  586 |                 width += x;\n  587 |                 x = 0.;\n  588 |             }\n  589 | \n  590 |             if y < 0. {\n  591 |                 height += y;\n  592 |                 y = 0.;\n  593 |             }\n  594 | \n  595 |             if x + width > self.total_width() as f32 {\n  596 |                 width = self.total_width() as f32 - x;\n  597 |             }\n  598 | \n  599 |             if y + height > self.total_height() as f32 {\n  600 |                 height = self.total_height() as f32 - y;\n  601 |             }\n  602 | \n  603 |             graphene::Rect::new(x, y, width, height)\n  604 |         }","lines":46,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L559-604"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`rect_limit_left` (the function clamping `y < 0`) only writes the result back into `*rect` inside the `if y < 0.` branch, whereas the sibling functions `rect_limit_top`, `rect_limit_bottom`, `rect_limit_right` always write back. This asymmetry is benign only because nothing is mutated when the branch is not taken, but it makes the code fragile: any future edit that mutates a local before the branch would be silently discarded. Combined with the swapped naming this is easy to get wrong.","fix":"Move the `*rect = graphene::Rect::new(x, y, width, height);` write outside the `if` block to match the other three rect_limit_* functions for consistency.","locations":[{"ref":"src/widgets/edit/crop_selection.rs:721-742","code":"  721 |         /// Limit Rect to not leave image area at to the left\n  722 |         fn rect_limit_left(\n  723 |             &self,\n  724 |             rect: &mut graphene::Rect,\n  725 |             aspect_ratio: f32,\n  726 |             edge: Option<HEdge>,\n  727 |         ) {\n  728 |             let (mut x, mut y, mut width, mut height) = rect.into_tuple();\n  729 | \n  730 |             if y < 0. {\n  731 |                 height += y;\n  732 |                 y = 0.;\n  733 |                 let old_width = width;\n  734 |                 width = height * aspect_ratio;\n  735 | \n  736 |                 if matches!(edge, Some(HEdge::Left)) {\n  737 |                     x += old_width - width;\n  738 |                 }\n  739 | \n  740 |                 *rect = graphene::Rect::new(x, y, width, height);\n  741 |             }\n  742 |         }","lines":22,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L721-742"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`crop_area_image_coord` computes width/height as `(x2 - x1)` and `(y2 - y1)` then casts to `u32`. `widget_to_img_coord` can yield x2 < x1 / y2 < y1 (e.g. for a flipped/rotated/mirrored image transform, or sub-pixel rounding at edges), making the difference negative; `negative_f64.round() as u32` saturates to 0 in Rust, silently producing a zero-size crop region rather than the intended area.","fix":"Compute min/max of the two transformed corners before taking differences, e.g. `let w = (x2 - x1).abs()`, and validate the resulting rectangle is non-degenerate before returning Some.","locations":[{"ref":"src/widgets/edit/crop_selection.rs:987-1011","code":"  987 |         pub(super) fn crop_area_image_coord(&self) -> Option<(u32, u32, u32, u32)> {\n  988 |             let obj = self.obj();\n  989 | \n  990 |             if !self.is_cropped() {\n  991 |                 return None;\n  992 |             }\n  993 | \n  994 |             let image = self.image();\n  995 | \n  996 |             let (x1, y1) = image.widget_to_img_coord((\n  997 |                 image.image_rendering_x() + obj.crop_x() as f64,\n  998 |                 image.image_rendering_y() + obj.crop_y() as f64,\n  999 |             ));\n 1000 |             let (x2, y2) = image.widget_to_img_coord((\n 1001 |                 image.image_rendering_x() + obj.crop_x() as f64 + obj.crop_width() as f64,\n 1002 |                 image.image_rendering_y() + obj.crop_y() as f64 + obj.crop_height() as f64,\n 1003 |             ));\n 1004 | \n 1005 |             Some((\n 1006 |                 x1.round() as u32,\n 1007 |                 y1.round() as u32,\n 1008 |                 (x2 - x1).round() as u32,\n 1009 |                 (y2 - y1).round() as u32,\n 1010 |             ))\n 1011 |         }","lines":25,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L987-1011"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`save_copy` searches for a free '(Edited N)' filename only for `i in 1..20` (i.e. 1..=19). If all 19 candidates exist, it falls back to `current_file` as the suggested save name, i.e. it suggests overwriting the original instead of a new copy - surprising and potentially destructive default in the save dialog.","fix":"Increase/remove the arbitrary cap or fall back to a clearly-new name (e.g. append a timestamp) rather than the original file.","locations":[{"ref":"src/widgets/edit_window.rs:191-227","code":"  191 |                         for i in 1..20 {\n  192 |                             let mut new_path = path.clone();\n  193 |                             let mut new_filename = basename.to_os_string();\n  194 | \n  195 |                             // Translators: Filename suffix, {} is replaced by a number\n  196 |                             new_filename.push(ngettext(\" (Edited)\", \" (Edited {})\", i));\n  197 | \n  198 |                             if let Some(ext) = path.extension() {\n  199 |                                 new_filename.push(\".\");\n  200 |                                 new_filename.push(ext);\n  201 |                             }\n  202 | \n  203 |                             new_path.set_file_name(new_filename);\n  204 | \n  205 |                             let file = gio::File::for_path(&new_path);\n  206 |                             let file_exists = file\n  207 |                                 .query_info_future(\n  208 |                                     gio::FILE_ATTRIBUTE_STANDARD_NAME,\n  209 |                                     gio::FileQueryInfoFlags::NONE,\n  210 |                                     glib::Priority::DEFAULT,\n  211 |                                 )\n  212 |                                 .await\n  213 |                                 .is_ok();\n  214 | \n  215 |                             if !file_exists {\n  216 |                                 suggested_file = Some(file);\n  217 |                                 break;\n  218 |                             }\n  219 |                         }\n  220 | \n  221 |                         suggested_file.unwrap_or_else(|| current_file.clone())\n  222 |                     } else {\n  223 |                         current_file.clone()\n  224 |                     }\n  225 |                 } else {\n  226 |
