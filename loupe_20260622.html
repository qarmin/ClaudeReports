Some(r) = bytes_iter.next() else {\n  113 |                         break 'img;\n  114 |                     };\n  115 |                     let Some(g) = bytes_iter.next() else {\n  116 |                         break 'img;\n  117 |                     };\n  118 |                     let Some(b) = bytes_iter.next() else {\n  119 |                         break 'img;\n  120 |                     };\n  121 |                     let Some(a) = bytes_iter.next() else {\n  122 |                         break 'img;\n  123 |                     };\n  124 | \n  125 |                     if *a < 255 {\n  126 |                         has_transparency = true;\n  127 |                     }\n  128 | \n  129 |                     if *a == 0 {\n  130 |                         completely_transparent += 1;\n  131 |                     } else {\n  132 |                         let fg = gdk::RGBA::new(\n  133 |                             *r as f32 / 255.,\n  134 |                             *g as f32 / 255.,\n  135 |                             *b as f32 / 255.,\n  136 |                             *a as f32 / 255.,\n  137 |                         );\n  138 |                         let contrast = crate::util::contrast_ratio(&default_color, &fg);\n  139 | \n  140 |                         if contrast < BACKGROUND_GUESS_LOW_CONTRAST_RATIO {\n  141 |                             bad_contrast += 1;\n  142 |                         }\n  143 |                     }\n  144 |                 }\n  145 | \n  146 |                 let advance_by = stride - 4 * texture.width() as usize;\n  147 | \n  148 |                 if advance_by > 0 {\n  149 |                     bytes_iter.nth(advance_by - 1);\n  150 |                 }\n  151 |             }","lines":49,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/background_color.rs#L103-151"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"thumbnail() computes `let scale = f32::min(1., THUMBNAIL_SIZE / long_side as f32);` where long_side = i32::max(width, height) from image_size(). If image_size() returns (0,0) (dimensions unknown / not yet loaded), long_side is 0 and THUMBNAIL_SIZE/0.0 = +inf, min(1, inf) = 1.0, so scale becomes 1.0 and the full-size image is rendered as a 'thumbnail' for drag-and-drop. Worse, if a dimension is negative-cast nonsense it is unguarded. Should guard against zero size.","fix":"Return None (or use scale 1.0 deliberately) when long_side <= 0, and document the zero-size case.","locations":[{"ref":"src/widgets/image/drag.rs:29-57","code":"   29 |     pub fn thumbnail(&self) -> Option<gdk::Paintable> {\n   30 |         let imp = self.imp();\n   31 | \n   32 |         let (width, height) = self.image_size();\n   33 |         let long_side = i32::max(width, height);\n   34 |         let orientation = self.metadata().orientation();\n   35 | \n   36 |         let scale = f32::min(1., THUMBNAIL_SIZE / long_side as f32);\n   37 |         let render_options = tiling::RenderOptions {\n   38 |             scaling_filter: gsk::ScalingFilter::Trilinear,\n   39 |             scaling: imp.scaling(),\n   40 |             background_color: Some(imp.background_color()),\n   41 |         };\n   42 | \n   43 |         let snapshot = gtk::Snapshot::new();\n   44 | \n   45 |         imp.snapshot_rotate_mirror(\n   46 |             &snapshot,\n   47 |             -(orientation.rotate().degrees() as f32),\n   48 |             orientation.mirror(),\n   49 |             scale as f64,\n   50 |         );\n   51 | \n   52 |         imp.frame_buffer\n   53 |             .load()\n   54 |             .add_to_snapshot(&snapshot, scale as f64, &render_options);\n   55 | \n   56 |         snapshot.to_paintable(None)\n   57 |     }","lines":29,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/drag.rs#L29-57"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"set_operations builds a temp snapshot from active_frame_buffer at zoom 1.0 then calls apply_operations to recompute overwrite_dimensions. If active_frame_buffer is empty (mid reload, both current and previous buffers empty) to_node() returns None and it logs 'Render node is empty' and returns Ok(()) WITHOUT updating overwrite_dimensions (which was just reset to None on line 61). Subsequent rendering then uses original_dimensions which may not reflect the operations, and the editor state is silently inconsistent. The error is swallowed (Ok returned).","fix":"Return an EditingError (or retry once the frame buffer is populated) when the render node is empty instead of returning Ok with stale/None dimensions.","locations":[{"ref":"src/widgets/image/editing.rs:54-87","code":"   54 | impl LpImage {\n   55 |     pub fn set_operations(\n   56 |         &self,\n   57 |         operations: Option<Arc<glycin::Operations>>,\n   58 |     ) -> Result<(), EditingError> {\n   59 |         let imp = self.imp();\n   60 | \n   61 |         imp.overwrite_dimensions.set(None);\n   62 |         imp.operations.replace(operations);\n   63 | \n   64 |         // Let dimension rewrite by calculating the new image\n   65 |         let tmp_snapshot = gtk::Snapshot::new();\n   66 |         imp.active_frame_buffer().add_to_snapshot(\n   67 |             &tmp_snapshot,\n   68 |             1.,\n   69 |             &RenderOptions {\n   70 |                 background_color: None,\n   71 |                 scaling: 1.,\n   72 |                 scaling_filter: gsk::ScalingFilter::Nearest,\n   73 |             },\n   74 |         );\n   75 | \n   76 |         if let Some(node) = tmp_snapshot.to_node() {\n   77 |             imp.apply_operations(node, &gtk::Snapshot::new())?;\n   78 |         } else {\n   79 |             tracing::error!(\"Render node is empty\");\n   80 |         }\n   81 | \n   82 |         imp.configure_best_fit();\n   83 |         self.queue_draw();\n   84 | \n   85 |         Ok(())\n   86 |     }\n   87 | }","lines":34,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/editing.rs#L54-87"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the rotate gesture connect_angle_changed, when the Scale gesture is locked in it does `obj.imp().rotation.set(obj.imp().rotation_target.get())` directly on the Cell, bypassing the set_rotation wrapper. This means it does not call configure_adjustments(), notify_rotation(), or queue_draw(). If a prior rotation delta had already changed the displayed rotation, snapping rotation back to rotation_target via the raw Cell leaves the widget without a redraw/notify, so the view can show a stale rotated frame until something else triggers a draw.","fix":"Call obj.set_rotation(obj.imp().rotation_target.get()) instead of setting the Cell directly, so adjustments/notify/queue_draw run.","locations":[{"ref":"src/widgets/image/input_handling.rs:244-248","code":"  244 |                 // Only reset rotation if scale gesture is locked in\n  245 |                 if let Some(Gesture::Scale) = obj.imp().locked_gestured.get() {\n  246 |                     obj.imp().rotation.set(obj.imp().rotation_target.get());\n  247 |                     return;\n  248 |                 }","lines":5,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/input_handling.rs#L244-248"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"image_size_available() uses `self.obj().image_size() > (0, 0)`. Tuple comparison is lexicographic, so a degenerate size like (0, 5) compares greater than (0, 0) (first elements equal, second 5 > 0) and reports the size as available even though width is 0. Likewise (5, 0) reports available with height 0. The intent is clearly 'both dimensions known/positive'.","fix":"Check both dimensions explicitly: `let (w, h) = self.obj().image_size(); w > 0 && h > 0`.","locations":[{"ref":"src/widgets/image/metadata.rs:94-96","code":"   94 |     pub(super) fn image_size_available(&self) -> bool {\n   95 |         self.obj().image_size() > (0, 0)\n   96 |     }","lines":3,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/metadata.rs#L94-96"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"snapshot() renders via `self.active_frame_buffer()` (which falls back to the previous frame buffer when the current one is empty) only on the non-editing path. But for the snapshot_rotate_mirror transform it computes width/height from `untransformed_dimensions()` / `image_width(zoom)`, while the editing branch (operations present) also uses `active_frame_buffer()`. The two branches are consistent, however the editing branch performs `frame_buffer.add_to_snapshot` into a temp snapshot and then `apply_operations`; if `to_node()` returns None (empty buffer mid-reload) it logs an error and draws nothing for that frame, producing a visible flash/blank instead of falling back to the previous frame the way the non-editing path does. The editing path does not benefit from the previous-frame fallback semantics symmetrically.","fix":"When the temp snapshot node is empty during a reload, skip drawing rather than logging at error level, or reuse the previous-frame node so the editing path matches the non-editing fallback behavior.","locations":[{"ref":"src/widgets/image/rendering.rs:118-142","code":"  118 | \n  119 |         // Don't use current frame buffer if it empty during an image reload\n  120 |         let frame_buffer = self.active_frame_buffer();\n  121 | \n  122 |         if self.operations.borrow().is_some() {\n  123 |             let tmp_snapshot = gtk::Snapshot::new();\n  124 |             frame_buffer.add_to_snapshot(&tmp_snapshot, applicable_zoom, &render_options);\n  125 |             if let Some(node) = tmp_snapshot.to_node() {\n  126 |                 if let Err(err) = self.apply_operations(node, snapshot) {\n  127 |                     tracing::error!(\"Failed to apply operations to node: {err}\");\n  128 |                 }\n  129 |             } else {\n  130 |                 tracing::error!(\"Render node is empty\");\n  131 |             }\n  132 |         } else {\n  133 |             // Apply rotation and mirroring\n  134 |             self.snapshot_rotate_mirror(\n  135 |                 snapshot,\n  136 |                 obj.rotation() as f32,\n  137 |                 obj.mirrored(),\n  138 |                 applicable_zoom,\n  139 |             );\n  140 | \n  141 |             frame_buffer.add_to_snapshot(snapshot, applicable_zoom, &render_options);\n  142 |         }","lines":25,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/rendering.rs#L118-142"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"widget_to_img_coord divides by `imp.applicable_zoom()`. applicable_zoom() returns zoom_normalize(zoom)/scaling. zoom_normalize calls zoom_to_level `(zoom * 10^digits) as u32`; if zoom is extremely small or zero (e.g. during early init or a degenerate best-fit producing 0), zoom_normalize returns 0 and widget_to_img_coord divides by zero, yielding inf/NaN image coordinates. These NaNs then feed zoom_cursor_target and adj_for_position during zoom animations.","fix":"Clamp applicable_zoom to a small positive floor (e.g. f64::max(result, f64::EPSILON)) before using it as a divisor in coordinate conversions.","locations":[{"ref":"src/widgets/image/rendering.rs:388-395","code":"  388 |     pub fn widget_to_img_coord(&self, (cur_x, cur_y): (f64, f64)) -> (f64, f64) {\n  389 |         let imp = self.imp();\n  390 |         let zoom = imp.applicable_zoom();\n  391 |         let x = (cur_x - self.image_rendering_x() + imp.hadj_value()) / zoom;\n  392 |         let y = (cur_y - self.image_rendering_y() + imp.vadj_value()) / zoom;\n  393 | \n  394 |         (x, y)\n  395 |     }","lines":8,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/rendering.rs#L388-395"},{"ref":"src/widgets/image/zoom.rs:91-97","code":"   91 |     pub(super) fn applicable_zoom(&self) -> f64 {\n   92 |         self.applicable_zoom_for(self.obj().zoom())\n   93 |     }\n   94 | \n   95 |     pub(super) fn applicable_zoom_for(&self, zoom: f64) -> f64 {\n   96 |         decoder::tiling::zoom_normalize(zoom) / self.scaling()\n   97 |     }","lines":7,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/zoom.rs#L91-97"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"reset_rotation() sets rotation_target then calls set_mirrored and set_rotation, but it does NOT pause or reset the rotation_animation. update() calls obj.reset_rotation() on DecoderUpdate::Metadata. If a rotation animation is currently playing (e.g. user rotated then a reload/metadata update arrives), the PropertyAnimationTarget on \"rotation\" will continue animating from its old from/to values and overwrite the freshly reset rotation on the next animation tick, fighting the reset.","fix":"Pause the rotation_animation (and zoom_animation if best-fit) at the start of reset_rotation(), mirroring what configure_best_fit does for zoom.","locations":[{"ref":"src/widgets/image/rotation.rs:74-84","code":"   74 | impl LpImage {\n   75 |     /// Set rotation and mirroring to the state would have after loading\n   76 |     pub fn reset_rotation(&self) {\n   77 |         tracing::debug!(\"Resetting rotation\");\n   78 |         let orientation = self.metadata().orientation();\n   79 |         self.imp()\n   80 |             .rotation_target\n   81 |             .set(orientation.rotate().degrees() as f64);\n   82 |         self.set_mirrored(orientation.mirror());\n   83 |         self.set_rotation(orientation.rotate().degrees() as f64);\n   84 |     }","lines":11,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/rotation.rs#L74-84"},{"ref":"src/widgets/image/loading.rs:84-96","code":"   84 |         match update {\n   85 |             DecoderUpdate::Metadata(metadata) => {\n   86 |                 tracing::debug!(\"Received metadata\");\n   87 |                 self.metadata.borrow_mut().merge(*metadata);\n   88 |                 self.emmit_metadata_changed();\n   89 | \n   90 |                 obj.reset_rotation();\n   91 |                 glib::spawn_future_local(glib::clone!(\n   92 |                     #[weak(rename_to=obj)]\n   93 |                     self,\n   94 |                     async move { obj.check_editable().await },\n   95 |                 ));\n   96 |             }","lines":13,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/loading.rs#L84-96"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"zoom_level_best_fit_for_rotation divides untransformed_dimensions by scaling and computes aspect ratios. If image_height is 0 (image dimensions not yet known: untransformed_dimensions returns (0,0) before DecoderUpdate::Dimensions), texture_aspect_ratio = 0/0 = NaN and the subsequent `widget_width / image_width` is division by zero producing inf/NaN. NaN then propagates into zoom.set and configure_adjustments. configure_best_fit is called from DecoderUpdate::Dimensions and size_allocate, both of which can run before/with zero dimensions.","fix":"Early-return a safe default (e.g. 1.0) when image_width or image_height is 0, or guard the divisions.","locations":[{"ref":"src/widgets/image/zoom.rs:41-70","code":"   41 |     pub(super) fn zoom_level_best_fit_for_rotation(&self, rotation: f64) -> f64 {\n   42 |         let rotated = rotation.to_radians().sin().abs();\n   43 |         let (image_width, image_height) = (\n   44 |             self.untransformed_dimensions().0 as f64 / self.scaling(),\n   45 |             self.untransformed_dimensions().1 as f64 / self.scaling(),\n   46 |         );\n   47 |         let texture_aspect_ratio = image_width / image_height;\n   48 |         let widget_aspect_ratio = self.widget_width() / self.widget_height();\n   49 | \n   50 |         let max_zoom_factor = match self.fit_mode.get() {\n   51 |             // Do not allow to zoom larger than original size\n   52 |             FitMode::BestFit | FitMode::ExactVolatile => 1.,\n   53 |             // Allow arbitrary zoom\n   54 |             FitMode::LargeFit => f64::MAX,\n   55 |         };\n   56 | \n   57 |         let default_zoom = if texture_aspect_ratio > widget_aspect_ratio {\n   58 |             (self.widget_width() / image_width).min(max_zoom_factor)\n   59 |         } else {\n   60 |             (self.widget_height() / image_height).min(max_zoom_factor)\n   61 |         };\n   62 | \n   63 |         let rotated_zoom = if 1. / texture_aspect_ratio > widget_aspect_ratio {\n   64 |             (self.widget_width() / image_height).min(max_zoom_factor)\n   65 |         } else {\n   66 |             (self.widget_height() / image_width).min(max_zoom_factor)\n   67 |         };\n   68 | \n   69 |         rotated * rotated_zoom + (1. - rotated) * default_zoom\n   70 |     }","lines":30,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/zoom.rs#L41-70"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `measure`, the natural size is computed as `i32::max(child_natural, min)` and the overlay *natural* sizes are never considered (only overlay minimums feed into `min`). Because `min` already includes the overlay minimum, natural can never drop below the combined overlay minimum, but the overlays' own natural widths are discarded entirely. The earlier `overlay1_natural`/`overlay2_natural` are explicitly thrown away with `_`. If overlay natural > child natural (e.g. wide controls), the reported natural is too small, which can clip the controls. The comment claims the goal is making both overlays fit, but only minimums are honored for natural.","fix":"Also measure overlay naturals and fold them into the natural computation the same way minimums are folded, or document why only minimums matter.","locations":[{"ref":"src/widgets/image_view.rs:377-396","code":"  377 |         fn measure(&self, orientation: gtk::Orientation, for_size: i32) -> (i32, i32, i32, i32) {\n  378 |             // Measure child of AdwBin\n  379 |             let (child_min, child_natural, _, _) = self.bin_child.measure(orientation, for_size);\n  380 | \n  381 |             // measure size of controls overlays\n  382 |             let (overlay1_min, _, _, _) = self.controls_box_start.measure(orientation, for_size);\n  383 |             let (overlay2_min, _, _, _) = self.controls_box_end.measure(orientation, for_size);\n  384 | \n  385 |             let overlay_min = match orientation {\n  386 |                 gtk::Orientation::Horizontal => overlay1_min + overlay2_min,\n  387 |                 gtk::Orientation::Vertical => i32::max(overlay1_min, overlay2_min),\n  388 |                 _ => unreachable!(),\n  389 |             };\n  390 | \n  391 |             // take as minimum whatever is larger\n  392 |             let min = i32::max(child_min, overlay_min);\n  393 |             // take as natural whatever is larger\n  394 |             let natural = i32::max(child_natural, min);\n  395 | \n  396 |             (min, natural, -1, -1)","lines":20,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_view.rs#L377-396"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `load_file`, when `is_same_directory` is false a new model is created and `update_sliding_view(&file)` is called *before* `load_directory` completes. `update_sliding_view` calls `model().files_around(...)`, but the freshly created `from_file` model only contains the single file until `load_directory` finishes. The subsequent second `update_sliding_view(&file)` (line 522) fixes it, but if `load_directory` errors out (line 513) the function returns early after only the single-file view, and the neighbors never populate even though the directory listing might partially exist. The error toast formats `\"{} {}\"` with both `err` and `err.root_cause()` which typically duplicates the message.","fix":"Populate neighbors only after a successful directory load, and use a single error representation in the toast (`err.root_cause()` alone or the full chain, not both concatenated).","locations":[{"ref":"src/widgets/image_view.rs:501-524","code":"  501 |         glib::spawn_future_local(glib::clone!(\n  502 |             #[strong(rename_to = obj)]\n  503 |             self,\n  504 |             async move {\n  505 |                 let model = LpFileModel::from_file(file.clone()).await;\n  506 |                 obj.set_model(model);\n  507 |                 tracing::debug!(\"New model created\");\n  508 | \n  509 |                 obj.update_sliding_view(&file);\n  510 | \n  511 |                 // List other files in directory\n  512 |                 if let Some(directory) = directory {\n  513 |                     if let Err(err) = obj.model().load_directory(directory.clone()).await {\n  514 |                         tracing::warn!(\"Failed to load directory: {}\", err.root_cause());\n  515 |                         obj.window_show_toast(\n  516 |                             &format!(\"{} {}\", err, err.root_cause()),\n  517 |                             adw::ToastPriority::High,\n  518 |                         );\n  519 |                         return;\n  520 |                     }\n  521 | \n  522 |                     obj.update_sliding_view(&file);\n  523 |                 }\n  524 |             }","lines":24,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_view.rs#L501-524"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`scroll_sliding_view` removes the target page from the IndexMap returned by `pages()` via `swap_remove`, but `pages()` constructs a *fresh* IndexMap of clones on every call (see lines 560-568). The `swap_remove` mutates that throwaway map, not the widget's page vector - which is presumably the intent (just to fetch the page). It works, but the use of `swap_remove` for a pure lookup is misleading and allocates a whole IndexMap (cloning every page Rc) just to retrieve one entry. `get(file)` already exists and does the same without the allocation.","fix":"Replace with `self.sliding_view().get(file)` to avoid building and cloning the full page map.","locations":[{"ref":"src/widgets/image_view.rs:633-640","code":"  633 |     fn scroll_sliding_view(&self, file: &gio::File, animated: bool) {\n  634 |         let Some(current_page) = self.sliding_view().pages().swap_remove(&file.uri()) else {\n  635 |             tracing::error!(\n  636 |                 \"Current path not available in sliding_view for scrolling: {}\",\n  637 |                 file.uri()\n  638 |             );\n  639 |             return;\n  640 |         };","lines":8,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_view.rs#L633-640"},{"ref":"src/widgets/sliding_view.rs:560-578","code":"  560 |     pub fn pages(&self) -> IndexMap<glib::GString, LpImagePage> {\n  561 |         self.imp()\n  562 |             .pages\n  563 |             .borrow()\n  564 |             .iter()\n  565 |             .cloned()\n  566 |             .map(|x| (x.file().uri(), x))\n  567 |             .collect()\n  568 |     }\n  569 | \n  570 |     pub fn get(&self, file: &gio::File) -> Option<LpImagePage> {\n  571 |         let uri = file.uri();\n  572 |         self.imp()\n  573 |             .pages\n  574 |             .borrow()\n  575 |             .iter()\n  576 |             .find(|x| x.file().uri() == uri)\n  577 |             .cloned()\n  578 |     }","lines":19,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L560-578"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`trash` calls `image_view.current_file()` twice and binds both `file` and `path` from independent calls. Between the two calls the current file could change (navigation), so `file` and `path` may refer to different images - a TOCTOU. The first `file` is then trashed but `path` (used for the Undo restore) could belong to a different image.","fix":"Call `current_file()` once, bind it, and derive `path` from that single value: `let Some(file) = image_view.current_file() else {...}; let Some(path) = file.path() else {...};`.","locations":[{"ref":"src/widgets/image_window.rs:621-660","code":"  621 |     async fn trash(&self) {\n  622 |         let image_view = self.image_view();\n  623 |         let (Some(file), Some(path)) = (\n  624 |             image_view.current_file(),\n  625 |             image_view.current_file().and_then(|x| x.path()),\n  626 |         ) else {\n  627 |             tracing::error!(\"No file to trash\");\n  628 |             return;\n  629 |         };\n  630 | \n  631 |         let result = file.trash_future(glib::Priority::default()).await;\n  632 | \n  633 |         match result {\n  634 |             Ok(()) => {\n  635 |                 let toast = adw::Toast::builder()\n  636 |                     .title(gettext(\"Image moved to trash\"))\n  637 |                     .button_label(gettext(\"Undo\"))\n  638 |                     .priority(adw::ToastPriority::High)\n  639 |                     .build();\n  640 |                 toast.connect_button_clicked(glib::clone!(\n  641 |                     #[weak(rename_to = obj)]\n  642 |                     self,\n  643 |                     move |_| {\n  644 |                         let path = path.clone();\n  645 |                         glib::spawn_future_local(async move {\n  646 |                             obj.image_view()\n  647 |                                 .set_trash_restore(Some(gio::File::for_path(&path)));\n  648 |                             let result = crate::util::untrash(&path).await;\n  649 |                             if let Err(err) = result {\n  650 |                                 tracing::error!(\"Failed to untrash {path:?}: {err}\");\n  651 |                                 obj.window_show_toast(\n  652 |                                     &gettext(\"Failed to restore image from trash\"),\n  653 |                                     adw::ToastPriority::High,\n  654 |                                 );\n  655 |                             }\n  656 |                         });\n  657 |                     }\n  658 |                 ));\n  659 |                 self.window_add_toast(toast);\n  660 |             }","lines":40,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_window.rs#L621-660"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `set_ranges`, the minimum (ceil) of the height spin row range is computed using `self.width_unit_factor()` instead of `self.height_unit_factor()`. The maximum on the next line correctly uses `height_unit_factor`. When the width and height unit factors differ (which they do for the Percent unit, where the factor is `100/total_size` and depends on the dimension), the height spin row gets a wrong lower bound, so the entered height value can be clamped incorrectly.","fix":"Change line 747 from `size_unit.ceil(self.width_unit_factor())` to `size_unit.ceil(self.height_unit_factor())`.","locations":[{"ref":"src/widgets/print.rs:746-749","code":"  746 |         imp.height.set_range(\n  747 |             size_unit.ceil(self.width_unit_factor()),\n  748 |             size_unit.floor(max_height * self.height_unit_factor()),\n  749 |         );","lines":4,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L746-749"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`display_scale` in the preview page divides widget width by `page_width = paper_width(Inch) * dpi`. If the print settings report a zero resolution (dpi == 0) or a zero paper width, this divides by zero giving inf/NaN, which then feeds `image.allocate` sizes. `dpi()` is `print_settings().resolution() as f64` and resolution can be 0 for some printers/PDF setups.","fix":"Fall back to a sane default DPI (e.g. 72/300) when `resolution()` is 0, and guard `display_scale` against a zero denominator.","locations":[{"ref":"src/widgets/print_preview.rs:88-92","code":"   88 |         fn display_scale(&self) -> f64 {\n   89 |             let print = self.print();\n   90 |             let page_width = print.page_setup().paper_width(gtk::Unit::Inch) * print.dpi();\n   91 |             self.obj().width() as f64 / page_width\n   92 |         }","lines":5,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print_preview.rs#L88-92"},{"ref":"src/widgets/print.rs:583-585","code":"  583 |     pub fn dpi(&self) -> f64 {\n  584 |         self.print_settings().resolution() as f64\n  585 |     }","lines":3,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L583-585"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`size_allocate_position` compares floats for exact equality to decide visibility: `page_position == (scroll_position + position_shift).floor()` / `.ceil()`. `page_position` is `page_index as f32` (an exact integer), and `.floor()`/`.ceil()` of an f32 are exact integers too, so this usually works - but when `scroll_position + position_shift` is itself an exact integer, floor == ceil, so only that single page is shown and its sole neighbor is hidden mid-allocation; combined with f32 rounding of the `position_shift` (an f64 truncated to f32) the equality can miss, hiding the page that should be visible and flashing a blank frame.","fix":"Compute the visible index range with integer arithmetic from a rounded scroll position, or compare with a tolerance, rather than relying on exact f32 floor/ceil equality.","locations":[{"ref":"src/widgets/sliding_view.rs:354-379","code":"  354 |             let scroll_position = self.obj().position() as f32;\n  355 |             let position_shift = self.position_shift.get() as f32;\n  356 |             let page_position = page_index as f32;\n  357 | \n  358 |             // Reset from potential stacked cards animation\n  359 |             page.set_opacity(1.);\n  360 | \n  361 |             // reverse page order for RTL languages\n  362 |             let direction_sign = if self.is_rtl() { -1. } else { 1. };\n  363 | \n  364 |             // This positions the pages within the carousel and shifts them\n  365 |             // according to the position that should currently be shown.\n  366 |             let x = direction_sign\n  367 |                 * (page_position - scroll_position - position_shift)\n  368 |                 * (width as f32 + self.page_spacing(width));\n  369 | \n  370 |             // Only show visible images\n  371 |             if page_position == (scroll_position + position_shift).floor()\n  372 |                 || page_position == (scroll_position + position_shift).ceil()\n  373 |             {\n  374 |                 page.set_child_visible(true);\n  375 |                 let transform = gsk::Transform::new().translate(&graphene::Point::new(x, 0.));\n  376 |                 page.allocate(width, height, 0, Some(transform));\n  377 |             } else {\n  378 |                 page.set_child_visible(false);\n  379 |             }","lines":26,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L354-379"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`page_at` computes `let index = (position + self.position_shift()) as usize;`. `position` can be negative (overshoot is enabled on the SwipeTracker via `lower_overshoot(true)`), and `position_shift` can be negative. A negative f64 cast to `usize` saturates to 0 in Rust (since 1.45 `as` is saturating), so a negative computed index silently becomes index 0 instead of \"no page\", causing `end_swipe` to scroll to the first page on overshoot at the start. Also a fractional position is truncated rather than rounded, so `page_at` may land on the wrong neighbor.","fix":"Guard against negative values explicitly (return None if `position + shift < 0.`), and round instead of truncate to select the nearest snap point.","locations":[{"ref":"src/widgets/sliding_view.rs:671-674","code":"  671 |     fn page_at(&self, position: f64) -> Option<LpImagePage> {\n  672 |         let index = (position + self.position_shift()) as usize;\n  673 |         self.imp().pages.borrow().get(index).cloned()\n  674 |     }","lines":4,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L671-674"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`shift_position` only updates `position_shift` when *both* the old current index and the new current index are `Some`. During `insert` when this is the very first page, `current_index()` before insert is None (no current page), so no shift is applied - fine. But during `move_to`/`remove` when the current page was just removed (so new `current_index()` is None), the shift is silently skipped, leaving `position_shift` stale relative to the new page vector. The animation/position math (`snap_points`, `size_allocate_position`) then uses an inconsistent shift, which can place pages at wrong offsets until the next consistent operation.","fix":"Define and apply a well-specified shift even when the current page is removed (e.g. recompute position relative to the nearest surviving page), or reset position_shift when current_page becomes None.","locations":[{"ref":"src/widgets/sliding_view.rs:706-711","code":"  706 |     fn shift_position(&self, old_index: Option<usize>) {\n  707 |         if let (Some(old_index), Some(new_index)) = (old_index, self.current_index()) {\n  708 |             let shift = new_index as f64 - old_index as f64;\n  709 |             self.imp().position_shift.set(self.position_shift() + shift);\n  710 |         }\n  711 |     }","lines":6,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L706-711"},{"ref":"src/widgets/sliding_view.rs:506-527","code":"  506 |     fn remove(&self, page: &LpImagePage, lazy: bool) {\n  507 |         let current_index = self.current_index();\n  508 | \n  509 |         if let Some(index) = self.index_of(page) {\n  510 |             // Only unparent if far enough away to not be involved in delete animation\n  511 |             if current_index.is_some_and(|x| x.abs_diff(index) as isize > 1) {\n  512 |                 page.unparent();\n  513 |             }\n  514 | \n  515 |             self.imp().pages.borrow_mut().remove(index);\n  516 | \n  517 |             self.queue_allocate();\n  518 | \n  519 |             self.shift_position(current_index);\n  520 | \n  521 |             if self.is_empty() && !lazy {\n  522 |                 self.clear(false);\n  523 |             }\n  524 |         } else {\n  525 |             tracing::error!(\"Trying to remove non-existent page.\");\n  526 |         }\n  527 |     }","lines":22,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/sliding_view.rs#L506-527"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`fill_frame_buffer` on `Decoder` logs an error ('Trying to fill frame buffer for decoder without animation support') for any non-Glycin decoder. The SVG decoder and the `Failed` decoder both hit this branch. Since `tick_callback` in loading.rs calls `fill_frame_buffer()` whenever a frame advances, and only animated images add a tick callback, in practice this should not fire for SVG; but the `Failed` variant routing through here on any spurious call produces misleading error spam.","fix":"Make `fill_frame_buffer` a no-op (debug log) for non-animated/failed decoders rather than logging at error level.","locations":[{"ref":"src/decoder.rs:211-217","code":"  211 |     pub fn fill_frame_buffer(&self) {\n  212 |         if let FormatDecoder::Glycin(decoder) = &self.decoder {\n  213 |             decoder.fill_frame_buffer();\n  214 |         } else {\n  215 |             tracing::error!(\"Trying to fill frame buffer for decoder without animation support\");\n  216 |         }\n  217 |     }","lines":7,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder.rs#L211-217"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `Tiling::origin_shift_x`/`origin_shift_y` the local variable for the x case is named `width` (and `height` for y), but it holds `self.origin.0` / `self.origin.1` (the origin offset), not a width/height. This is a misleading copy/paste-style naming that obscures the rem_euclid alignment math and makes the shift logic hard to verify.","fix":"Rename the locals to `origin_x`/`origin_y` (or `pos`) to reflect that they are origin offsets, not dimensions.","locations":[{"ref":"src/decoder/tiling.rs:444-462","code":"  444 |     pub fn origin_shift_x(&self) -> f32 {\n  445 |         let width = self.origin.0 as f32;\n  446 |         let rem = width.rem_euclid(self.tile_width as f32);\n  447 |         if rem > 0. {\n  448 |             rem - self.tile_width as f32\n  449 |         } else {\n  450 |             0.\n  451 |         }\n  452 |     }\n  453 | \n  454 |     pub fn origin_shift_y(&self) -> f32 {\n  455 |         let height = self.origin.1 as f32;\n  456 |         let rem = height.rem_euclid(self.tile_height as f32);\n  457 |         if rem > 0. {\n  458 |             rem - self.tile_height as f32\n  459 |         } else {\n  460 |             0.\n  461 |         }\n  462 |     }","lines":19,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L444-462"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `frame_timeout` the front frame is bound to a variable named `next_frame` and the comment says 'Only move to next image if there is one buffered'. `images.front()` is the currently displayed frame, not the next one. The logic (advance when elapsed >= current frame's delay) is correct, but the misleading name/comment invites a future reader to 'fix' it into an off-by-one (skipping or double-showing frames).","fix":"Rename the binding to `current_frame` and update the comment to clarify that the front frame's delay is how long the current frame is shown before advancing.","locations":[{"ref":"src/decoder/tiling.rs:654-668","code":"  654 |     pub fn frame_timeout(&self, elapsed: Duration) -> bool {\n  655 |         let images = &self.buffer.load().images;\n  656 | \n  657 |         // Only move to next image if there is one buffered\n  658 |         if images.len() > 1\n  659 |             && images\n  660 |                 .front()\n  661 |                 .is_some_and(|next_frame| elapsed >= next_frame.delay)\n  662 |         {\n  663 |             self.next_frame();\n  664 |             return true;\n  665 |         }\n  666 | \n  667 |         false\n  668 |     }","lines":15,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/decoder/tiling.rs#L654-668"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`from_files` inserts files in the order given and never calls `Self::sort`, unlike `load_directory` which sorts by collation key. When the app is launched with multiple files (application.rs open() -> set_images_from_files), the navigation order is the argument order rather than the sorted order used everywhere else, which is inconsistent and surprising for prev/next navigation.","fix":"Call `Self::sort(&mut stored_files)` before storing, or document explicitly that command-line order is intentionally preserved.","locations":[{"ref":"src/file_model.rs:154-169","code":"  154 |     pub async fn from_files(files: Vec<gio::File>) -> Self {\n  155 |         let model = Self::default();\n  156 |         let mut collation_key_cache = Default::default();\n  157 | \n  158 |         let mut stored_files: IndexMap<GString, Entry> = IndexMap::new();\n  159 |         for file in files {\n  160 |             stored_files.insert(\n  161 |                 file.uri(),\n  162 |                 Entry::new(file, None, &mut collation_key_cache).await,\n  163 |             );\n  164 |         }\n  165 | \n  166 |         *model.imp().files.borrow_mut() = stored_files;\n  167 | \n  168 |         model\n  169 |     }","lines":16,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/file_model.rs#L154-169"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`load_directory` does not clear or reset `directory`/`monitor` on the error path, and the `enumerate_children_future` error returns after the monitor has already been installed and the OnceCells set. A subsequent retry would hit the OnceCell `.unwrap()` panic (see separate finding), and a monitor remains active for a directory whose listing failed.","fix":"Install the monitor and set the directory cell only after the enumeration succeeds, or make the function idempotent/retryable.","locations":[{"ref":"src/file_model.rs:174-211","code":"  174 |     pub async fn load_directory(&self, directory: gio::File) -> anyhow::Result<()> {\n  175 |         let instant = Instant::now();\n  176 |         self.imp().directory.set(directory.clone()).unwrap();\n  177 | \n  178 |         let monitor =\n  179 |             directory.monitor_directory(gio::FileMonitorFlags::WATCH_MOVES, gio::Cancellable::NONE);\n  180 |         match monitor {\n  181 |             Ok(monitor) => {\n  182 |                 monitor.connect_changed(glib::clone!(\n  183 |                     #[weak(rename_to = obj)]\n  184 |                     self,\n  185 |                     move |_monitor, file_a, file_b, event| {\n  186 |                         obj.file_monitor_cb(event, file_a, file_b);\n  187 |                     }\n  188 |                 ));\n  189 |                 self.imp().monitor.set(monitor).unwrap();\n  190 |             }\n  191 |             Err(err) => {\n  192 |                 tracing::info!(\"Cannot monitor directory: {err}\");\n  193 |             }\n  194 |         }\n  195 | \n  196 |         let mut new_files = IndexMap::new();\n  197 | \n  198 |         let enumerator = directory\n  199 |             .enumerate_children_future(\n  200 |                 &format!(\n  201 |                     \"{},{},{},{}\",\n  202 |                     gio::FILE_ATTRIBUTE_STANDARD_NAME,\n  203 |                     gio::FILE_ATTRIBUTE_STANDARD_FAST_CONTENT_TYPE,\n  204 |                     gio::FILE_ATTRIBUTE_STANDARD_IS_HIDDEN,\n  205 |                     gio::FILE_ATTRIBUTE_STANDARD_DISPLAY_NAME,\n  206 |                 ),\n  207 |                 gio::FileQueryInfoFlags::NONE,\n  208 |                 glib::Priority::LOW,\n  209 |             )\n  210 |             .await\n  211 |             .context(gettext(\"Could not list other files in directory.\"))?;","lines":38,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/file_model.rs#L174-211"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`metadata.rs` exposure_time computes `num as f64 / denom as f64` from EXIF-derived rational values. With untrusted EXIF a `denom` of 0 yields infinity (not a panic), then `1. / speed` and `format!(\"{:.0}\", ...)` can print 'inf' or '0' producing nonsense exposure strings shown to the user. No validation of the denominator.","fix":"Reject/skip when `denom == 0` (return None) before dividing.","locations":[{"ref":"src/metadata.rs:263-282","code":"  263 |     pub fn exposure_time(&self) -> Option<String> {\n  264 |         if let Some((num, denom)) = self.metadata.exposure_time() {\n  265 |             let speed = num as f64 / denom as f64;\n  266 |             if speed <= 0.5 {\n  267 |                 let exposure = format!(\"{:.0}\", 1. / speed);\n  268 |                 // Translators: Fractional exposure time (photography) in seconds\n  269 |                 Some(gettext_f(r\"1\\u{2215}{}\\u{202F}s\", [exposure]))\n  270 |             } else {\n  271 |                 let exposure = if speed < 5. {\n  272 |                     format!(\"{:.1}\", speed)\n  273 |                 } else {\n  274 |                     format!(\"{:.0}\", speed)\n  275 |                 };\n  276 |                 // Translators: Exposure time (photography) in seconds\n  277 |                 Some(gettext_f(r\"{}\\u{202F}s\", [exposure]))\n  278 |             }\n  279 |         } else {\n  280 |             None\n  281 |         }\n  282 |     }","lines":20,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/metadata.rs#L263-282"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`FileInfo::new` treats `size == 0` as 'no file size' (`if size > 0 { Some(size as u64) }`). A legitimately empty (0-byte) file then reports an unknown size rather than '0 bytes'. Also `gio::FileInfo::size()` returns `i64`; a negative value (error sentinel) would pass the `> 0` filter as false but the cast is otherwise fine. The 0-byte conflation is the real issue.","fix":"Query whether the SIZE attribute is present (`has_attribute`) to decide presence, and keep 0 as a valid size.","locations":[{"ref":"src/metadata/file.rs:46-47","code":"   46 |         let size = file_info.size();\n   47 |         let file_size = if size > 0 { Some(size as u64) } else { None };","lines":2,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/metadata/file.rs#L46-47"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `aspect_ratio_changed`, the new area is seeded from `current_area.height() * aspect_ratio` for width but uses the unchanged `height` and `y`. The four rect_limit_* calls are invoked with hardcoded edges (Bottom, Right, Left, Top) that don't correspond to any actual drag handle; this is an approximation for the animation target. If `current_area.height()` is 0 (degenerate selection) the new width becomes 0 and `rect_limit_minumum_size` then divides MIN_SELECTION_SIZE by aspect_ratio - benign here but the seeding ignores the possibility of a zero-height starting area producing a collapsed target.","fix":"Guard against a zero/near-zero `current_area.height()` before computing the target width, or clamp the seed to MIN_SELECTION_SIZE up front.","locations":[{"ref":"src/widgets/edit/crop_selection.rs:791-829","code":"  791 |         pub(super) fn aspect_ratio_changed(&self) {\n  792 |             let Some(aspect_ratio) = self.aspect_ratio() else {\n  793 |                 return;\n  794 |             };\n  795 | \n  796 |             let obj = self.obj();\n  797 | \n  798 |             // Store current state as reference for animation\n  799 |             let current_area = self.crop_area();\n  800 |             let (_, y, _, height) = current_area.into_tuple();\n  801 | \n  802 |             let width = current_area.height() * aspect_ratio;\n  803 |             let x = f32::max(0., current_area.x() + (current_area.width() - width) / 2.);\n  804 | \n  805 |             let mut new_area = graphene::Rect::new(x, y, width, height);\n  806 | \n  807 |             self.rect_limit_top(&mut new_area, aspect_ratio, Some(VEdge::Bottom));\n  808 |             self.rect_limit_left(&mut new_area, aspect_ratio, Some(HEdge::Right));\n  809 |             self.rect_limit_bottom(&mut new_area, aspect_ratio, Some(HEdge::Left));\n  810 |             self.rect_limit_right(&mut new_area, aspect_ratio, Some(VEdge::Top));\n  811 | \n  812 |             self.rect_limit_minumum_size(&mut new_area, aspect_ratio, RectHandle::BottomLeft);\n  813 | \n  814 |             self.rect_make_contained(&mut new_area);\n  815 | \n  816 |             self.aspect_ratio_animation()\n  817 |                 .set_target(&adw::CallbackAnimationTarget::new(glib::clone!(\n  818 |                     #[weak]\n  819 |                     obj,\n  820 |                     move |progress| {\n  821 |                         let imp = obj.imp();\n  822 | \n  823 |                         // Linear interpolate between old and target value\n  824 |                         imp.set_crop(current_area.interpolate(&new_area, progress));\n  825 |                     }\n  826 |                 )));\n  827 | \n  828 |             self.aspect_ratio_animation().play();\n  829 |         }","lines":39,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L791-829"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_cropped` compares float crop dimensions to the integer total via `obj.crop_width() as i32 == self.total_width()`. Because `crop_width` is stored as f32 and updated through `img_to_draw_coord` round-trips, the truncating cast to i32 can be off by one from `total_width` even when the selection visually covers the whole image, so `is_cropped` may report `true` when the user has not actually cropped (enabling the apply button / save state spuriously).","fix":"Compare with a tolerance (e.g. `(obj.crop_width() - self.total_width() as f32).abs() < 1.0`) or round instead of truncate.","locations":[{"ref":"src/widgets/edit/crop_selection.rs:1049-1058","code":" 1049 |         pub(super) fn is_cropped(&self) -> bool {\n 1050 |             let obj = self.obj();\n 1051 | \n 1052 |             let untouched: bool = obj.crop_x() == 0.\n 1053 |                 && obj.crop_y() == 0.\n 1054 |                 && obj.crop_width() as i32 == self.total_width()\n 1055 |                 && obj.crop_height() as i32 == self.total_height();\n 1056 | \n 1057 |             !untouched\n 1058 |         }","lines":10,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/edit/crop_selection.rs#L1049-1058"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_save_sensitive` ts/edit_window.rs#L437-445"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"rotation gesture connect_angle_changed also sets rotation via the raw Cell when applying the correction (`obj.set_rotation(...)` on line 265 is fine), but the locked Scale branch at 246 mutates the private rotation Cell. Separately, on connect_end the code computes `(obj.rotation()/90.).round()*90. - rotation_target` and calls rotate_by(angle). rotate_by always pushes a glycin Rotate operation and writes to the image whenever the snapped delta maps to a non-zero Rotation. A no-op rotate gesture (angle rounds to 0) correctly skips, but tiny residual gesture noise that rounds to 90 will silently commit a real on-disk rotation edit to the file from an accidental small two-finger twist.","fix":"Only commit the rotation edit on gesture end if the user clearly intended a rotation (e.g. require the rotate gesture to have locked in), not merely because the snapped angle is a multiple of 90.","locations":[{"ref":"src/widgets/image/input_handling.rs:269-279","code":"  269 |         rotation_gesture.connect_end(glib::clone!(\n  270 |             #[weak]\n  271 |             obj,\n  272 |             move |_, _| {\n  273 |                 tracing::debug!(\"Rotate gesture end\");\n  274 | \n  275 |                 let angle = (obj.rotation() / 90.).round() * 90. - obj.imp().rotation_target.get();\n  276 |                 obj.rotate_by(angle);\n  277 |                 obj.imp().locked_gestured.set(None);\n  278 |             }\n  279 |         ));","lines":11,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/input_handling.rs#L269-279"},{"ref":"src/widgets/image/rotation.rs:86-116","code":"   86 |     pub fn rotate_by(&self, angle: f64) {\n   87 |         let imp = self.imp();\n   88 | \n   89 |         tracing::debug!(\"Rotate by {} degrees\", angle);\n   90 |         let target = &self.imp().rotation_target;\n   91 |         target.set(target.get() + angle);\n   92 | \n   93 |         let rotation_animation = imp.rotation_animation();\n   94 | \n   95 |         rotation_animation.set_value_from(self.rotation());\n   96 |         rotation_animation.set_value_to(target.get());\n   97 |         rotation_animation.play();\n   98 | \n   99 |         if self.is_best_fit() {\n  100 |             let zoom_animation = imp.zoom_animation();\n  101 | \n  102 |             zoom_animation.set_value_from(self.zoom());\n  103 |             zoom_animation.set_value_to(imp.zoom_level_best_fit_for_rotation(target.get()));\n  104 |             zoom_animation.play();\n  105 |         }\n  106 | \n  107 |         if let Ok(r) = gufo_common::orientation::Rotation::try_from(angle)\n  108 |             && r != gufo_common::orientation::Rotation::_0\n  109 |         {\n  110 |             tracing::debug!(\"Editing image to rotate by {r:?}\");\n  111 |             let operation = glycin::Operation::Rotate(r);\n  112 |             let editing_queue = &self.imp().editing_queue;\n  113 |             editing_queue.push(operation);\n  114 |             editing_queue.write_to_image(self);\n  115 |         }\n  116 |     }","lines":31,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/rotation.rs#L86-116"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"tick_callback computes elapsed = clock.frame_time() - last_animated_frame and builds a Duration via `std::time::Duration::from_micros(elapsed as u64)`. last_animated_frame is initialized to 0 (Cell default). On the very first tick after an animation starts, last_animated_frame is 0 so elapsed equals the absolute frame_time (a large monotonic microsecond value), producing a huge Duration and immediately satisfying frame_timeout, skipping the first frame's intended delay. Also if frame_time() ever decreases (clock reset) elapsed goes negative and `as u64` wraps to an enormous value.","fix":"Initialize last_animated_frame to the current frame_time when the tick callback is installed, and use saturating/checked subtraction (clamp negative elapsed to 0).","locations":[{"ref":"src/widgets/image/loading.rs:158-181","code":"  158 |     fn tick_callback(&self, clock: &gdk::FrameClock) -> glib::ControlFlow {\n  159 |         let obj = self.obj();\n  160 | \n  161 |         // Do not animate if not visible\n  162 |         if !obj.is_mapped() {\n  163 |             return glib::ControlFlow::Continue;\n  164 |         }\n  165 | \n  166 |         let elapsed = clock.frame_time() - self.last_animated_frame.get();\n  167 |         let duration = std::time::Duration::from_micros(elapsed as u64);\n  168 | \n  169 |         // Check if it's time to show the next frame\n  170 |         if self.frame_buffer.frame_timeout(duration) {\n  171 |             // Just draw since frame_timeout updated to new frame\n  172 |             obj.queue_draw();\n  173 |             self.last_animated_frame.set(clock.frame_time());\n  174 |             if let Some(decoder) = self.decoder.borrow().as_ref() {\n  175 |                 // Decode new frame and load it into buffer\n  176 |                 decoder.fill_frame_buffer();\n  177 |             }\n  178 |         }\n  179 | \n  180 |         glib::ControlFlow::Continue\n  181 |     }","lines":24,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/loading.rs#L158-181"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"pan() reads the adjustment value, adds sign*step_increment, then clamps to `(0., max)` where max = max_hadjustment_value() / max_vadjustment_value(). But configure_adjustments sets the adjustment upper to content_width and page_size to min(widget,content); the true maximum reachable value is `upper - page_size` (used everywhere else via set_hadj_value). max_hadjustment_value() returns `image_displayed_width - widget_width`, which equals upper - page_size only when content > widget. The values can diverge by rounding (configure_adjustments rounds content via round_f64, pan uses unrounded image_displayed_width), letting pan set a value slightly inconsistent with what set_hadj_value would allow.","fix":"Have pan() reuse set_hadj_value/set_vadj_value (which clamp to upper - page_size) instead of clamping to max_*adjustment_value() directly, for consistency.","locations":[{"ref":"src/widgets/image/pan.rs:34-49","code":"   34 |         let (adjustment, max) = match direction {\n   35 |             gtk::PanDirection::Left | gtk::PanDirection::Right => {\n   36 |                 (self.hadj(), imp.max_hadjustment_value())\n   37 |             }\n   38 |             gtk::PanDirection::Up | gtk::PanDirection::Down => {\n   39 |                 (self.vadj(), imp.max_vadjustment_value())\n   40 |             }\n   41 |             _ => {\n   42 |                 tracing::error!(\"Unknown pan direction {direction:?}\");\n   43 |                 return;\n   44 |             }\n   45 |         };\n   46 | \n   47 |         let value = (adjustment.value() + sign * adjustment.step_increment()).clamp(0., max);\n   48 | \n   49 |         adjustment.set_value(value);","lines":16,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/pan.rs#L34-49"},{"ref":"src/widgets/image/scrollable.rs:114-140","code":"  114 |     pub fn set_hadj_value(&self, value: f64) {\n  115 |         let hadjustment = self.obj().hadj();\n  116 |         let value = value.clamp(0., hadjustment.upper() - hadjustment.page_size());\n  117 |         hadjustment.set_value(value);\n  118 |     }\n  119 | \n  120 |     pub fn set_vadj_value(&self, value: f64) {\n  121 |         let vadjustment = self.obj().vadj();\n  122 |         let value = value.clamp(0., vadjustment.upper() - vadjustment.page_size());\n  123 |         vadjustment.set_value(value);\n  124 |     }\n  125 | \n  126 |     pub fn hadj_value(&self) -> f64 {\n  127 |         self.obj().hadj().value()\n  128 |     }\n  129 | \n  130 |     pub fn vadj_value(&self) -> f64 {\n  131 |         self.obj().vadj().value()\n  132 |     }\n  133 | \n  134 |     pub fn max_hadjustment_value(&self) -> f64 {\n  135 |         f64::max(self.image_displayed_width() - self.widget_width(), 0.)\n  136 |     }\n  137 | \n  138 |     pub fn max_vadjustment_value(&self) -> f64 {\n  139 |         f64::max(self.image_displayed_height() - self.widget_height(), 0.)\n  140 |     }","lines":27,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/scrollable.rs#L114-140"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"configure_adjustments clamps the existing value to max_*adjustment_value() for the `value` field but passes `content_width` (rounded) as upper and `min(widget,content)` as page_size. The max_*adjustment_value() uses the UNrounded image_displayed_width while upper uses the rounded content_width. The clamp bound (image_displayed_width - widget_width) and the GTK-internal bound (upper - page_size = content_width - min(widget,content)) can differ by sub-pixel rounding, so the initial value clamp is not perfectly consistent with the adjustment's own constraints.","fix":"Clamp the value to `upper - page_size` using the same rounded content values used to configure the adjustment, or have max_*adjustment_value reuse the rounded content size.","locations":[{"ref":"src/widgets/image/scrollable.rs:71-111","code":"   71 |     pub(super) fn configure_adjustments(&self) {\n   72 |         let obj = self.obj();\n   73 | \n   74 |         let hadjustment = obj.hadj();\n   75 |         // round to application pixels to avoid tiny rounding errors from zoom\n   76 |         let content_width = self.round_f64(self.image_displayed_width());\n   77 |         let widget_width = self.widget_width();\n   78 | \n   79 |         hadjustment.configure(\n   80 |             // value\n   81 |             hadjustment.value().clamp(0., self.max_hadjustment_value()),\n   82 |             // lower\n   83 |             0.,\n   84 |             // upper\n   85 |             content_width,\n   86 |             // arrow button and shortcut step\n   87 |             widget_width * 0.1,\n   88 |             // page up/down step\n   89 |             widget_width * 0.9,\n   90 |             // page size\n   91 |             f64::min(widget_width, content_width),\n   92 |         );\n   93 | \n   94 |         let vadjustment = obj.vadj();\n   95 |         // round to application pixels to avoid tiny rounding errors from zoom\n   96 |         let content_height = self.round_f64(self.image_displayed_height());\n   97 |         let widget_height = self.widget_height();\n   98 | \n   99 |         vadjustment.configure(\n  100 |             vadjustment.value().clamp(0., self.max_vadjustment_value()),\n  101 |             // lower\n  102 |             0.,\n  103 |             // upper\n  104 |             content_height,\n  105 |             // arrow button and shortcut step\n  106 |             widget_height * 0.1,\n  107 |             // page up/down step\n  108 |             widget_height * 0.9,\n  109 |             // page_size\n  110 |             f64::min(widget_height, content_height),\n  111 |         );","lines":41,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/scrollable.rs#L71-111"},{"ref":"src/widgets/image/scrollable.rs:134-140","code":"  134 |     pub fn max_hadjustment_value(&self) -> f64 {\n  135 |         f64::max(self.image_displayed_width() - self.widget_width(), 0.)\n  136 |     }\n  137 | \n  138 |     pub fn max_vadjustment_value(&self) -> f64 {\n  139 |         f64::max(self.image_displayed_height() - self.widget_height(), 0.)\n  140 |     }","lines":7,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/scrollable.rs#L134-140"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"min_zoom(): when fit_mode is ExactVolatile it returns f64::min(zoom_level, LOWEST_MENU_ZOOM_LEVEL). For a small image where zoom_level was forced to 1.0 (a dimension below SMALLEST_RENDERED_PIXEL_SIZE), this min returns LOWEST_MENU_ZOOM_LEVEL (0.5), allowing the small image to be zoomed below the intended 'block zooming out entirely' floor of 1.0. The ExactVolatile override defeats the small-image protection, so a tiny image can be rendered below SMALLEST_RENDERED_PIXEL_SIZE in ExactVolatile mode.","fix":"Apply the LOWEST_MENU_ZOOM_LEVEL relaxation only when the computed zoom_level is itself below it (i.e. for genuinely large images), not when zoom_level was clamped up to 1.0 for tiny images.","locations":[{"ref":"src/widgets/image/zoom.rs:100-123","code":"  100 |     pub(super) fn min_zoom(&self) -> f64 {\n  101 |         let (width, height) = self.untransformed_dimensions();\n  102 | \n  103 |         let zoom_level = if (width as f64) < SMALLEST_RENDERED_PIXEL_SIZE\n  104 |             || (height as f64) < SMALLEST_RENDERED_PIXEL_SIZE\n  105 |         {\n  106 |             // If the image is smaller than the smallest rendered pixel size,\n  107 |             // block zooming out entirely\n  108 |             1.0\n  109 |         } else if width < height {\n  110 |             // Prevent the rendered size from going below SMALLEST_RENDERED_PIXEL_SIZE\n  111 |             SMALLEST_RENDERED_PIXEL_SIZE / (width as f64)\n  112 |         } else {\n  113 |             SMALLEST_RENDERED_PIXEL_SIZE / (height as f64)\n  114 |         };\n  115 | \n  116 |         if matches!(self.obj().fit_mode(), FitMode::ExactVolatile) {\n  117 |             // Allow zoom menu to allways function. We are allowing this since disabling the\n  118 |             // zoom menu entries would probably be more complicated.\n  119 |             f64::min(zoom_level, LOWEST_MENU_ZOOM_LEVEL)\n  120 |         } else {\n  121 |             zoom_level\n  122 |         }\n  123 |     }","lines":24,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/zoom.rs#L100-123"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"set_zoom_aiming early-returns `if zoom == obj.zoom()` using exact float equality (line 185). After rubberbanding transforms zoom via powf, exact equality with the stored zoom is essentially never true except in trivial cases, so this guard rarely fires and is mostly dead. More importantly the later zoom_to_full uses the same exact-equality abort (line 296), which can fail to short-circuit redundant work when zoom differs by a float epsilon, causing extra configure_adjustments/queue_draw churn.","fix":"Compare with a small epsilon tolerance (or against zoom_normalize'd integer levels) rather than exact f64 equality.","locations":[{"ref":"src/widgets/image/zoom.rs:185-187","code":"  185 |         if zoom == obj.zoom() {\n  186 |             return;\n  187 |         }","lines":3,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/zoom.rs#L185-187"},{"ref":"src/widgets/image/zoom.rs:296-299","code":"  296 |         if zoom == obj.zoom() {\n  297 |             tracing::trace!(\"Already at correct zoom level\");\n  298 |             return;\n  299 |         }","lines":4,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image/zoom.rs#L296-299"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`spinner_revealer.connect_map` schedules a 200ms timeout that calls `revealer.set_reveal_child(true)` capturing a strong clone of the revealer. If the page is unmapped (and possibly destroyed/hidden) within those 200ms, the timeout still fires and reveals the spinner on a now-hidden page, and the strong clone keeps the revealer alive for up to 200ms past unmap. Each map schedules a new timeout with no cancellation, so rapid map/unmap cycles (fast navigation) stack timeouts.","fix":"Store the timeout SourceId and cancel it on unmap, or check `revealer.is_mapped()` inside the callback before revealing.","locations":[{"ref":"src/widgets/image_page.rs:147-152","code":"  147 |             self.spinner_revealer.connect_map(|revealer| {\n  148 |                 let revealer = revealer.clone();\n  149 |                 glib::timeout_add_local_once(Duration::from_millis(200), move || {\n  150 |                     revealer.set_reveal_child(true);\n  151 |                 });\n  152 |             });","lines":6,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_page.rs#L147-152"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`zoom_value.connect_changed` reads `obj.current_image()` and only updates the submit button sensitivity if there *is* a current image. If there is no current image (transient state) the submit button keeps whatever stale sensitivity/`suggested-action` css it had, including possibly remaining enabled. Also the whole block is gated on `if let Some(image) = obj.current_image()` but `image` is only used for `zoom_target()`; when None the button is never reset to insensitive.","fix":"Handle the None case by disabling the submit button and removing the css class.","locations":[{"ref":"src/widgets/image_view.rs:232-257","code":"  232 |             self.zoom_value.connect_changed(glib::clone!(\n  233 |                 #[weak]\n  234 |                 obj,\n  235 |                 move |_| {\n  236 |                     if let Some(image) = obj.current_image() {\n  237 |                         let imp = obj.imp();\n  238 | \n  239 |                         // Only make submit button sensitive if entry value is tifferent from\n  240 |                         // current zoom value\n  241 |                         let sensitive = if let Some(value) = obj.zoom_value_f64() {\n  242 |                             let a = (value * 10_000.).round() / 10_000.;\n  243 |                             let b = (image.zoom_target() * 10_000.).round() / 10_000.;\n  244 |                             a != b\n  245 |                         } else {\n  246 |                             false\n  247 |                         };\n  248 | \n  249 |                         imp.submit_zoom.set_sensitive(sensitive);\n  250 |                         if sensitive {\n  251 |                             imp.submit_zoom.add_css_class(\"suggested-action\");\n  252 |                         } else {\n  253 |                             imp.submit_zoom.remove_css_class(\"suggested-action\");\n  254 |                         }\n  255 |                     }\n  256 |                 }\n  257 |             ));","lines":26,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_view.rs#L232-257"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_next_available` returns true whenever the current file's index is not the last index. But `index_of(&file)` returning `None` (file not in model, e.g. delayed insertion state) compares `None != Some(last)` which is true, so the function reports a next image is available even when the current file is not tracked by the model at all. `is_previous_available` has the analogous bug: `index_of != Some(0)` is true for `None`, falsely reporting a previous image.","fix":"Treat `index_of == None` as \"unavailable\" explicitly rather than letting the `!=` comparison default to available.","locations":[{"ref":"src/widgets/image_view.rs:413-433","code":"  413 |         pub fn is_previous_available(&self) -> bool {\n  414 |             let obj = self.obj();\n  415 | \n  416 |             if let Some(file) = obj.current_file() {\n  417 |                 obj.model().index_of(&file) != Some(0)\n  418 |             } else {\n  419 |                 false\n  420 |             }\n  421 |         }\n  422 | \n  423 |         /// Returns `true` if there is an image after the current one\n  424 |         pub fn is_next_available(&self) -> bool {\n  425 |             let obj = self.obj();\n  426 | \n  427 |             if let Some(file) = obj.current_file() {\n  428 |                 let model = obj.model();\n  429 |                 model.index_of(&file) != Some(model.n_files().saturating_sub(1))\n  430 |             } else {\n  431 |                 false\n  432 |             }\n  433 |         }","lines":21,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_view.rs#L413-433"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`delete_future` builds the confirmation body via `PathBuf::from(&path.file_name().unwrap_or_default())`. `path.file_name()` returns `Option<&OsStr>`; `unwrap_or_default()` yields an empty `OsStr` for paths ending in `..` or `/`, producing an empty filename in the dialog ('After deleting the image \"\"'). Minor UX bug but the message becomes meaningless.","fix":"Fall back to the full path display or the URI basename when `file_name()` is None.","locations":[{"ref":"src/widgets/image_window.rs:689-698","code":"  689 |     async fn delete_future(&self, path: &Path) {\n  690 |         let dialog = adw::AlertDialog::builder()\n  691 |             .heading(gettext(\"Permanently Delete Image?\"))\n  692 |             .body(gettext_f(\n  693 |                 \"After deleting the image “{}” it will be permanently lost.\",\n  694 |                 [PathBuf::from(&path.file_name().unwrap_or_default())\n  695 |                     .display()\n  696 |                     .to_string()],\n  697 |             ))\n  698 |             .build();","lines":10,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/image_window.rs#L689-698"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`indirect_disable_fill_space` sets `previous_width` to None and turns off `fill_space`. But `on_fill_space_changed` restores `previous_width` only when fill_space is toggled off and a value exists. When the user manually edits width (`on_width_changed`) the previous_width is cleared, so a later manual toggle of fill-space off cannot restore the pre-fill width - it simply keeps whatever the fill computed. This is a subtle state-machine inconsistency around the previous_width memory.","fix":"Clarify the previous_width lifecycle: only capture it when enabling fill-space, and don't null it on manual width edits unless fill-space is currently off.","locations":[{"ref":"src/widgets/print.rs:587-600","code":"  587 |     fn indirect_disable_fill_space(&self) {\n  588 |         self.imp().previous_width.set(None);\n  589 |         self.imp().fill_space.set_active(false);\n  590 |     }\n  591 | \n  592 |     pub fn on_width_changed(&self) {\n  593 |         if self.ui_updates() {\n  594 |             let _ui_updates_disabled = self.disable_ui_updates();\n  595 |             // Disable 'fill space' when manually changing size\n  596 |             self.indirect_disable_fill_space();\n  597 |             self.update_height();\n  598 |             self.draw_preview();\n  599 |         }\n  600 |     }","lines":14,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L587-600"},{"ref":"src/widgets/print.rs:859-873","code":"  859 |     fn on_fill_space_changed(&self) {\n  860 |         let imp = self.imp();\n  861 |         if self.fill_space() {\n  862 |             imp.previous_width.set(Some(imp.width.value()));\n  863 |             let _ui_updates_disabled = self.disable_ui_updates();\n  864 |             self.update_width();\n  865 |             self.update_height();\n  866 |             self.draw_preview();\n  867 |         } else if let Some(width) = imp.previous_width.get() {\n  868 |             let _ui_updates_disabled = self.disable_ui_updates();\n  869 |             imp.width.set_value(width);\n  870 |             self.update_height();\n  871 |             self.draw_preview();\n  872 |         }\n  873 |     }","lines":15,"link":"https://gitlab.gnome.org/GNOME/loupe/-/blob/bb35c8d8197d3277e25877507ed3a45b0e855231/src/widgets/print.rs#L859-873"}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`on_height_changed` recomputes width from height using `imp.height.value() * orig_width / orig_height`, but unlike `on_width_changed`/`update_height` it does not account for `width_unit_factor`/`height_unit_factor`. Since `height.value()` is in display units and width is set via `set_value` in display units, mixing the raw ratio without the unit factors gives a wrong width whenever width and height factors differ (again, the Percent unit case).","fix":"Convert height value to pixels (divide by height_unit_factor), apply the pixel aspect ratio, then convert back to width display units (multiply by width_unit_factor) before set_value.","locations":[{"ref":"src/widgets/print.rs:602-617","code":"  602 |     pub fn on_height_changed(&self) {\n  603 |         if self.ui_updates() {\n  604 |             let imp = self.imp();\n  605 |             let _ui_updates_disabled = self.disable_ui_updates();\n  606 |             // Disable 'fill space' when manually changing size\n  607 |             self.indirect_disable_fill_space();\n  608 | \
