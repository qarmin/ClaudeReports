<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"print_file_thread returns the task result on the dest == NULL path (g_task_return_boolean) but does not return afterward, so execution falls through and dereferences dest->name, dest->num_options and dest->options on a NULL pointer. The function then also calls g_task_return_boolean a second time on the same GTask further down, a double-return contract violation.","fix":"Add a return statement immediately after the g_task_return_boolean call in the dest == NULL branch, and ensure only one g_task_return_boolean call is reachable per execution path.","locations":[{"ref":"panels/printers/pp-printer.c:405-436","code":"  405 | static void\n  406 | print_file_thread (GTask *task, gpointer source_object, gpointer task_data, GCancellable *cancellable)\n  407 | {\n  408 |     PpPrinter *self = PP_PRINTER (source_object);\n  409 |     PrintFileData *print_file_data;\n  410 |     cups_dest_t *dest = NULL;\n  411 |     gboolean ret = FALSE;\n  412 |     gint job_id = 0;\n  413 | \n  414 |     dest = cupsGetNamedDest (CUPS_HTTP_DEFAULT, self->printer_name, NULL);\n  415 | \n  416 |     if (dest == NULL) {\n  417 |         g_warning (\"Failed to get the destination %s - %s.\", self->printer_name, cupsLastErrorString ());\n  418 |         g_task_return_boolean (task, ret);\n  419 |     }\n  420 | \n  421 |     print_file_data = g_task_get_task_data (task);\n  422 | \n  423 |     job_id = cupsPrintFile2 (CUPS_HTTP_DEFAULT, dest->name, print_file_data->filename, print_file_data->job_name,\n  424 |                              dest->num_options, dest->options);\n  425 | \n  426 |     if (job_id < 1)\n  427 |         g_warning (\"An error has occurred during printing of test page - %s\", cupsLastErrorString ());\n  428 |     else\n  429 |         ret = TRUE;\n  430 | \n  431 |     cupsFreeDests (1, dest);\n  432 | \n  433 |     if (g_task_set_return_on_cancel (task, FALSE)) {\n  434 |         g_task_return_boolean (task, ret);\n  435 |     }\n  436 | }","lines":32,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-printer.c#L405-436"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"cc_screen_time_statistics_row_set_selected_date() dereferences selected_date with `self->selected_date = *selected_date;` even when selected_date is NULL. The early-return guard only covers the cases of (already NULL, staying NULL) and (already set, same date) but not (currently valid, caller wants to clear it to NULL). This path is reached during normal UI use whenever the bar chart selection is cleared while a date was previously selected.","fix":"Add an explicit branch: if selected_date is NULL and self->selected_date is currently valid, clear self->selected_date (e.g. via g_date_clear) and update the UI/emit notify, then return, instead of falling through to the unconditional `*selected_date` dereference.","locations":[{"ref":"panels/wellbeing/cc-screen-time-statistics-row.c:1241-1264","code":" 1241 | void\n 1242 | cc_screen_time_statistics_row_set_selected_date (CcScreenTimeStatisticsRow *self, const GDate *selected_date)\n 1243 | {\n 1244 |     g_return_if_fail (CC_IS_SCREEN_TIME_STATISTICS_ROW (self));\n 1245 | \n 1246 |     if ((!g_date_valid (&self->selected_date) && selected_date == NULL)\n 1247 |         || (g_date_valid (&self->selected_date) && selected_date != NULL\n 1248 |             && g_date_compare (&self->selected_date, selected_date) == 0))\n 1249 |         return;\n 1250 | \n 1251 |     /* Log the selected date */\n 1252 |     {\n 1253 |         char date_str[200];\n 1254 |         if (selected_date != NULL)\n 1255 |             g_date_strftime (date_str, sizeof (date_str), \"%x\", selected_date);\n 1256 |         g_debug (\"%s: %s\", G_STRFUNC, (selected_date != NULL) ? date_str : \"(unset)\");\n 1257 |     }\n 1258 | \n 1259 |     self->selected_date = *selected_date;\n 1260 | \n 1261 |     update_ui_for_model_or_selected_date (self);\n 1262 | \n 1263 |     g_object_notify_by_pspec (G_OBJECT (self), props[PROP_SELECTED_DATE]);\n 1264 | }","lines":24,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wellbeing/cc-screen-time-statistics-row.c#L1241-1264"},{"ref":"panels/wellbeing/cc-screen-time-statistics-row.c:1047-1064","code":" 1047 | static void\n 1048 | bar_chart_notify_selected_index_cb (GObject *object, GParamSpec *pspec, gpointer user_data)\n 1049 | {\n 1050 |     CcScreenTimeStatisticsRow *self = CC_SCREEN_TIME_STATISTICS_ROW (user_data);\n 1051 |     GDate new_selected_date;\n 1052 |     GDate *new_selected_date_ptr;\n 1053 |     size_t idx = 0;\n 1054 | \n 1055 |     if (cc_bar_chart_get_selected_index (self->bar_chart, &idx)) {\n 1056 |         get_first_day_of_week (&self->selected_date, &new_selected_date);\n 1057 |         g_date_add_days (&new_selected_date, idx);\n 1058 |         new_selected_date_ptr = &new_selected_date;\n 1059 |     } else {\n 1060 |         new_selected_date_ptr = NULL;\n 1061 |     }\n 1062 | \n 1063 |     cc_screen_time_statistics_row_set_selected_date (self, new_selected_date_ptr);\n 1064 | }","lines":18,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wellbeing/cc-screen-time-statistics-row.c#L1047-1064"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"variant_get_key_combos() leaves `bindings` as NULL when the input GVariant is neither a string nor a string array, then unconditionally passes it to translate_above_tab(), which dereferences `*original_bindings` on its very first loop iteration with no NULL check, crashing immediately. This is reachable from cc_keyboard_item_load_from_global_shortcuts(), which looks up the \"shortcuts\" key from D-Bus/portal-supplied global-shortcuts data with no type filter (g_variant_dict_lookup_value with a NULL type), so malformed or unexpected external data triggers a crash.","fix":"In variant_get_key_combos(), if the variant is neither G_VARIANT_TYPE_STRING nor G_VARIANT_TYPE_STRING_ARRAY, allocate `bindings` as an empty NULL-terminated array (e.g. g_malloc0_n(1, sizeof(char *))) or return an empty GList early instead of leaving it NULL. Alternatively, add a NULL check at the top of translate_above_tab().","locations":[{"ref":"panels/keyboard/cc-keyboard-item.c:471-480","code":"  471 | static gboolean\n  472 | translate_above_tab (char **original_bindings, char ***new_bindings)\n  473 | {\n  474 |     GPtrArray *replaced_bindings;\n  475 |     g_autofree guint *above_tab_keysyms = NULL;\n  476 |     gboolean needs_translation = FALSE;\n  477 |     char **str;\n  478 | \n  479 |     for (str = original_bindings; *str && !needs_translation; str++)\n  480 |         needs_translation = strstr (*str, \"Above_Tab\") != NULL;","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/keyboard/cc-keyboard-item.c#L471-480"},{"ref":"panels/keyboard/cc-keyboard-item.c:510-528","code":"  510 | static GList *\n  511 | variant_get_key_combos (GVariant *variant)\n  512 | {\n  513 |     GList *combos = NULL;\n  514 |     char **translated_bindings, **str;\n  515 |     g_auto(GStrv) bindings = NULL;\n  516 | \n  517 |     if (g_variant_is_of_type (variant, G_VARIANT_TYPE_STRING)) {\n  518 |         bindings = g_malloc0_n (2, sizeof (char *));\n  519 |         if (g_strcmp0 (g_variant_get_string (variant, NULL), \"\") != 0)\n  520 |             bindings[0] = g_variant_dup_string (variant, NULL);\n  521 |     } else if (g_variant_is_of_type (variant, G_VARIANT_TYPE_STRING_ARRAY)) {\n  522 |         bindings = g_variant_dup_strv (variant, NULL);\n  523 |     }\n  524 | \n  525 |     if (translate_above_tab (bindings, &translated_bindings)) {\n  526 |         g_strfreev (bindings);\n  527 |         bindings = translated_bindings;\n  528 |     }","lines":19,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/keyboard/cc-keyboard-item.c#L510-528"},{"ref":"panels/keyboard/cc-keyboard-item.c:631-633","code":"  631 |     shortcuts = g_variant_dict_lookup_value (&dict, \"shortcuts\", NULL);\n  632 |     if (shortcuts)\n  633 |         item->key_combos = variant_get_key_combos (shortcuts);","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/keyboard/cc-keyboard-item.c#L631-633"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"process_app_info calls app_info_get_id(app_info), which returns NULL whenever the app's desktop ID/filename does not end in \".desktop\" (see app_info_get_id's own early return). The NULL result is passed straight into g_strcanon(app_id, ...) and then indexed in the following for-loop (app_id[i]), neither of which is NULL-safe; this crashes the process when scanning any installed .desktop file whose ID/basename lacks a \".desktop\" suffix in a way app_info_get_id rejects, or whenever g_desktop_app_info_get_filename's basename doesn't end with .desktop.","fix":"Check app_id == NULL immediately after calling app_info_get_id() in process_app_info and return early if so, before calling g_strcanon.","locations":[{"ref":"panels/notifications/cc-notifications-panel.c:303-325","code":"  303 | static char *\n  304 | app_info_get_id (GAppInfo *app_info)\n  305 | {\n  306 |     const char *desktop_id;\n  307 |     g_autofree gchar *ret = NULL;\n  308 |     const char *filename;\n  309 |     int l;\n  310 | \n  311 |     desktop_id = g_app_info_get_id (app_info);\n  312 |     if (desktop_id != NULL) {\n  313 |         ret = g_strdup (desktop_id);\n  314 |     } else {\n  315 |         filename = g_desktop_app_info_get_filename (G_DESKTOP_APP_INFO (app_info));\n  316 |         ret = g_path_get_basename (filename);\n  317 |     }\n  318 | \n  319 |     if (G_UNLIKELY (g_str_has_suffix (ret, \".desktop\") == FALSE))\n  320 |         return NULL;\n  321 | \n  322 |     l = strlen (ret);\n  323 |     *(ret + l - strlen (\".desktop\")) = '\\0';\n  324 |     return g_steal_pointer (&ret);\n  325 | }","lines":23,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/notifications/cc-notifications-panel.c#L303-325"},{"ref":"panels/notifications/cc-notifications-panel.c:336-344","code":"  336 |     app_id = app_info_get_id (app_info);\n  337 |     g_strcanon (app_id,\n  338 |                 \"0123456789\"\n  339 |                 \"abcdefghijklmnopqrstuvwxyz\"\n  340 |                 \"ABCDEFGHIJKLMNOPQRSTUVWXYZ\"\n  341 |                 \"-\",\n  342 |                 '-');\n  343 |     for (i = 0; app_id[i] != '\\0'; i++)\n  344 |         app_id[i] = g_ascii_tolower (app_id[i]);","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/notifications/cc-notifications-panel.c#L336-344"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"tz_load_db() splits each /usr/share/zoneinfo/zone.tab line with g_strsplit(buf, \"\\t\", 6) and immediately does `latstr = g_strdup(tmpstrarr[1])` without checking the split produced at least 2 fields. If a line has fewer than 2 tab-separated fields, tmpstrarr[1] is NULL, making latstr NULL. The very next statement `p = latstr + 1;` computes a pointer one past NULL, and the following `while (*p != '-' && *p != '+') p++;` loop dereferences it - a near-certain crash, with no bounds check on the loop either if the string lacks a +/- sign.","fix":"After g_strsplit, check `if (g_strv_length(tmpstrarr) < 3) continue;` before indexing tmpstrarr[0..2], and ensure the +/- scan loop has an explicit bound (e.g. `while (*p && *p != '-' && *p != '+') p++;`) followed by a check that *p is non-NUL before proceeding.","locations":[{"ref":"panels/system/datetime/tz.c:68-92","code":"   68 |     while (fgets (buf, sizeof (buf), tzfile)) {\n   69 |         g_auto(GStrv) tmpstrarr = NULL;\n   70 |         g_autofree gchar *latstr = NULL;\n   71 |         g_autofree gchar *lngstr = NULL;\n   72 |         gchar *p;\n   73 |         TzLocation *loc;\n   74 | \n   75 |         if (*buf == '#')\n   76 |             continue;\n   77 | \n   78 |         g_strchomp (buf);\n   79 |         tmpstrarr = g_strsplit (buf, \"\\t\", 6);\n   80 | \n   81 |         latstr = g_strdup (tmpstrarr[1]);\n   82 |         p = latstr + 1;\n   83 |         while (*p != '-' && *p != '+')\n   84 |             p++;\n   85 |         lngstr = g_strdup (p);\n   86 |         *p = '\\0';\n   87 | \n   88 |         loc = g_new0 (TzLocation, 1);\n   89 |         loc->country = g_strdup (tmpstrarr[0]);\n   90 |         loc->zone = g_strdup (tmpstrarr[2]);\n   91 |         loc->latitude = convert_pos (latstr, 2);\n   92 |         loc->longitude = convert_pos (lngstr, 3);","lines":25,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/datetime/tz.c#L68-92"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"file_dialog_open_cb() loads an image with gdk_pixbuf_new_from_stream(); if loading fails, pixbuf is NULL and a warning is logged, but execution falls through unconditionally to gdk_pixbuf_apply_embedded_orientation(pixbuf) and then cc_avatar_chooser_crop(self, pixbuf2) with a NULL pixbuf. cc_avatar_chooser_crop ultimately calls cc_crop_area_set_paintable(CC_CROP_AREA(self->crop_area), GDK_PAINTABLE(gdk_texture_new_for_pixbuf(pixbuf))) - gdk_texture_new_for_pixbuf has a non-NULL GdkPixbuf contract, so this crashes when the user picks pe":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"get_gtk_gles_renderer() calls gl_version = g_strdup((char *) glGetString(GL_VERSION)) and then immediately does strstr(gl_version, \"NVIDIA\") without a NULL check. glGetString() can legitimately return NULL (e.g. if called with no current context bound, or before extension support is established), making gl_version NULL and strstr(NULL, ...) a NULL pointer dereference. This runs in a small standalone helper binary (gnome-control-center-print-renderer) launched to determine GPU rendering details for the system-details report.","fix":"Guard with `if (gl_version != NULL && strstr(gl_version, \"NVIDIA\") != NULL) { ... }`.","locations":[{"ref":"panels/system/about/gnome-control-center-print-renderer.c:28-71","code":"   28 | static char *\n   29 | get_gtk_gles_renderer (void)\n   30 | {\n   31 |     GdkSurface *surface;\n   32 |     GtkNative *native;\n   33 |     GtkWidget *win;\n   34 |     GdkGLContext *context;\n   35 |     g_autofree char *renderer = NULL;\n   36 |     g_autofree char *gl_version = NULL;\n   37 | \n   38 |     win = gtk_window_new ();\n   39 |     gtk_widget_realize (win);\n   40 |     native = gtk_widget_get_native (win);\n   41 |     surface = gtk_native_get_surface (native);\n   42 |     context = gdk_surface_create_gl_context (surface, NULL);\n   43 |     if (!context)\n   44 |         return NULL;\n   45 |     gdk_gl_context_make_current (context);\n   46 |     renderer = g_strdup ((char *) glGetString (GL_RENDERER));\n   47 |     gl_version = g_strdup ((char *) glGetString (GL_VERSION));\n   48 |     gdk_gl_context_clear_current ();\n   49 |     g_object_unref (context);\n   50 | \n   51 |     if (strstr (gl_version, \"NVIDIA\") != NULL) {\n   52 |         const char *glvnd_libname = g_getenv (\"__GLX_VENDOR_LIBRARY_NAME\");\n   53 |         const char *dri_prime = g_getenv (\"DRI_PRIME\");\n   54 |         if (g_strcmp0 (glvnd_libname, \"nvidia\") != 0 && dri_prime != NULL) {\n   55 |             /* This helper is launched with parameters from a\n   56 |              * non-NVIDIA GPU, but is running using a NVIDIA\n   57 |              * library. As such, DRI_PRIME envvar from switcheroo\n   58 |              * does not actually take effect, and the GPU name is\n   59 |              * invalid.\n   60 |              *\n   61 |              * If there is no DRI_PRIME envvar neither, assuming\n   62 |              * we failed to use switcheroo to get GPU names, and\n   63 |              * this is called with basic envvars listed in\n   64 |              * cc-system-details-window.c:get_renderer_from_helper()\n   65 |              */\n   66 |             return NULL;\n   67 |         }\n   68 |     }\n   69 | \n   70 |     return g_steal_pointer (&renderer);\n   71 | }","lines":44,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/about/gnome-control-center-print-renderer.c#L28-71"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"match_all(gchar **words, const gchar *str) calls strstr(str, *w) for each filter word with no NULL check on `str`. It is called from region_visible() with locale_current_name/locale_untranslated_name, which are the result of cc_util_normalize_casefold_and_unaccent() applied to gnome_get_country_from_locale(locale_id, NULL) / (locale_id, \"C\") - both of which can return NULL even when the 'locale-name' data succeeded (confirmed: cc_util_normalize_casefold_and_unaccent in panels/common/cc-util.c returns NULL when its input is NULL). This makes strstr(NULL, ...) reachable while typing in the Region/Format chooser's search box, crashing the panel.","fix":"Add a NULL guard at the top of match_all(): `if (str == NULL) return FALSE;` (or treat NULL as automatically non-matching for that field and fall through to the next candidate string).","locations":[{"ref":"panels/system/region/cc-format-chooser.c:290-300","code":"  290 | static gboolean\n  291 | match_all (gchar **words, const gchar *str)\n  292 | {\n  293 |     gchar **w;\n  294 | \n  295 |     for (w = words; *w; ++w)\n  296 |         if (!strstr (str, *w))\n  297 |             return FALSE;\n  298 | \n  299 |     return TRUE;\n  300 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/region/cc-format-chooser.c#L290-300"},{"ref":"panels/system/region/cc-format-chooser.c:302-332","code":"  302 | static gboolean\n  303 | region_visible (GtkListBoxRow *row, gpointer user_data)\n  304 | {\n  305 |     CcFormatChooser *self = user_data;\n  306 |     g_autofree gchar *locale_name = NULL;\n  307 |     g_autofree gchar *locale_current_name = NULL;\n  308 |     g_autofree gchar *locale_untranslated_name = NULL;\n  309 |     gboolean match = TRUE;\n  310 | \n  311 |     if (!self->filter_words)\n  312 |         goto end;\n  313 | \n  314 |     locale_name = cc_util_normalize_casefold_and_unaccent (g_object_get_data (G_OBJECT (row), \"locale-name\"));\n  315 |     if (match_all (self->filter_words, locale_name))\n  316 |         goto end;\n  317 | \n  318 |     locale_current_name =\n  319 |         cc_util_normalize_casefold_and_unaccent (g_object_get_data (G_OBJECT (row), \"locale-current-name\"));\n  320 |     if (match_all (self->filter_words, locale_current_name))\n  321 |         goto end;\n  322 | \n  323 |     locale_untranslated_name =\n  324 |         cc_util_normalize_casefold_and_unaccent (g_object_get_data (G_OBJECT (row), \"locale-untranslated-name\"));\n  325 | \n  326 |     match = match_all (self->filter_words, locale_untranslated_name);\n  327 | \n  328 | end:\n  329 |     if (match)\n  330 |         self->no_results = FALSE;\n  331 |     return match;\n  332 | }","lines":31,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/region/cc-format-chooser.c#L302-332"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"cc_background_xml_load_xml_internal calls xmlDocGetRootElement(wplist) and immediately dereferences the result via root->children without a NULL check. xmlDocGetRootElement returns NULL for a well-formed but rootless XML document, which causes a NULL pointer dereference crash while parsing user/system wallpaper-list XML files.","fix":"Check `if (root == NULL) { xmlFreeDoc (wplist); return retval; }` before dereferencing root->children.","locations":[{"ref":"panels/background/cc-background-xml.c:162-164","code":"  162 |     root = xmlDocGetRootElement (wplist);\n  163 | \n  164 |     for (list = root->children; list != NULL; list = list->next) {","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/background/cc-background-xml.c#L162-164"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"single_xml_added asserts *ret == NULL on every invocation, but cc_background_xml_load_xml_internal emits the \"added\" signal once per <wallpaper> element found in the file. If cc_background_xml_get_item is ever called on an XML file containing more than one <wallpaper> entry, the second signal emission triggers g_assert(*ret == NULL) and aborts the process. The function is currently unused elsewhere in the tree (latent/dead-but-exported API), so the bug isn't presently reachable, but the exported function is unsafe for any file with multiple entries.","fix":"Disconnect the signal handler (or break out) after the first item is received, or change single_xml_added to only capture the first match and ignore/warn on subsequent emissions instead of asserting.","locations":[{"ref":"panels/background/cc-background-xml.c:454-476","code":"  454 | static void\n  455 | single_xml_added (CcBackgroundXml *xml, CcBackgroundItem *item, CcBackgroundItem **ret)\n  456 | {\n  457 |     g_assert (*ret == NULL);\n  458 |     *ret = g_object_ref (item);\n  459 | }\n  460 | \n  461 | CcBackgroundItem *\n  462 | cc_background_xml_get_item (const char *filename)\n  463 | {\n  464 |     g_autoptr(CcBackgroundXml) xml = NULL;\n  465 |     CcBackgroundItem *item = NULL;\n  466 | \n  467 |     if (g_file_test (filename, G_FILE_TEST_IS_REGULAR) == FALSE)\n  468 |         return NULL;\n  469 | \n  470 |     xml = cc_background_xml_new ();\n  471 |     g_signal_connect (G_OBJECT (xml), \"added\", G_CALLBACK (single_xml_added), &item);\n  472 |     if (cc_background_xml_load_xml (xml, filename) == FALSE)\n  473 |         return NULL;\n  474 | \n  475 |     return item;\n  476 | }","lines":23,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/background/cc-background-xml.c#L454-476"},{"ref":"panels/background/cc-background-xml.c:310-315","code":"  310 |             g_hash_table_insert (xml->wp_hash, g_strdup (id), g_object_ref (item));\n  311 |             if (in_thread)\n  312 |                 emit_added_in_idle (xml, g_object_ref (G_OBJECT (item)));\n  313 |             else\n  314 |                 g_signal_emit (G_OBJECT (xml), signals[ADDED], 0, item);\n  315 |             retval = TRUE;","lines":6,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/background/cc-background-xml.c#L310-315"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In input_source_row_new()'s IBus branch, display_name is computed as engine_get_display_name(g_hash_table_lookup(self->ibus_engines, id)). If `id` is not present in self->ibus_engines, the lookup returns NULL, and engine_get_display_name() (cc-ibus-utils.c) does not NULL-check its `engine_desc` parameter before calling ibus_engine_desc_get_longname() on it. In practice `id` is always sourced from iterating  On failure, contents and length are uninitialized stack garbage; g_bytes_new_take takes ownership of `contents` as a heap pointer to free later via g_free(), so it will eventually call free() on an arbitrary garbage address - heap corruption / crash. This path is reachable whenever the credential cache file write/read fails (disk full, permissions, race on the temp file).","fix":"Move g_task_return_pointer inside the success branch only: \\n if (g_file_get_contents (filename, &contents, &length, &error)) {\\n     g_debug (\"Read in credential cache: %s\", filename);\\n     g_task_return_pointer (task, g_bytes_new_take (contents, length), (GDestroyNotify) g_bytes_unref);\\n } else {\\n     g_warning (\"Couldn't read credential cache: %s: %s\", filename, error->message);\\n     g_task_return_new_error (task, CC_REALM_ERROR, CC_REALM_ERROR_GENERIC, \"%s\", error->message);\\n }","locations":[{"ref":"panels/system/users/cc-realm-manager.c:593-632","code":"  593 | static void\n  594 | kinit_thread_func (GTask *t, gpointer object, gpointer task_data, GCancellable *cancellable)\n  595 | {\n  596 |     g_autoptr(GTask) task = t;\n  597 |     LoginClosure *login = task_data;\n  598 |     krb5_context k5 = NULL;\n  599 |     krb5_error_code code;\n  600 |     g_autofree gchar *filename = NULL;\n  601 |     gchar *contents;\n  602 |     gsize length;\n  603 |     gint temp_fd;\n  604 | \n  605 |     filename = g_build_filename (g_get_user_runtime_dir (), \"um-krb5-creds.XXXXXX\", NULL);\n  606 |     temp_fd = g_mkstemp_full (filename, O_RDWR, S_IRUSR | S_IWUSR);\n  607 |     if (temp_fd == -1) {\n  608 |         g_warning (\"Couldn't create credential cache file: %s: %s\", filename, g_strerror (errno));\n  609 |         g_clear_pointer (&filename, g_free);\n  610 |     } else {\n  611 |         close (temp_fd);\n  612 |     }\n  613 | \n  614 |     code = krb5_init_context (&k5);\n  615 |     if (code == 0) {\n  616 |         code = login_perform_kinit (k5, login->realm, login->user, login->password, filename);\n  617 |     }\n  618 | \n  619 |     switch (code) {\n  620 |     case 0:\n  621 |         if (filename != NULL) {\n  622 |             g_autoptr(GError) error = NULL;\n  623 | \n  624 |             if (g_file_get_contents (filename, &contents, &length, &error)) {\n  625 |                 g_debug (\"Read in credential cache: %s\", filename);\n  626 |             } else {\n  627 |                 g_warning (\"Couldn't read credential cache: %s: %s\", filename, error->message);\n  628 |             }\n  629 | \n  630 |             g_task_return_pointer (task, g_bytes_new_take (contents, length), (GDestroyNotify) g_bytes_unref);\n  631 |         }\n  632 |         break;","lines":40,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/users/cc-realm-manager.c#L593-632"}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":false,"description":"cc_application_shortcut_dialog_new stores the caller-owned pointer directly (dialog->app_id = app_id) without copying it. The caller in cc-applications-panel.c passes self->current_app_id, which is freed/reassigned whenever the panel's selected app changes (update_panel, finalize). Since the dialog is an AdwDialog the user can leave open, app_id can dangle and is dereferenced later in shortcut_changed_cb, on_remove_dialog_response_cb and reset_all_activated_cb.","fix":"Make app_id an owned gchar* (g_strdup the input in the constructor) and free it in finalize, instead of storing the caller's raw pointer.","locations":[{"ref":"panels/applications/cc-application-shortcut-dialog.c:193-214","code":"  193 | CcApplicationShortcutDialog *\n  194 | cc_application_shortcut_dialog_new (const char *app_id)\n  195 | {\n  196 |     CcApplicationShortcutDialog *dialog;\n  197 |     g_autofree char *explanation_str = NULL;\n  198 |     g_autofree char *formatted_name = NULL;\n  199 |     g_autofree ction_changed() with a use-after-free'd row pointer as user_data.","fix":"Connect these signals with g_signal_connect_object (settings, ..., row, 0) so they are automatically disconnected when the row widget is destroyed, or store the handler IDs and disconnect them in a dispose handler for CcWacomStylusPage.","locations":[{"ref":"panels/wacom/cc-wacom-stylus-page.c:343-352","code":"  343 |     g_signal_connect (G_OBJECT (page->stylus_settings), \"changed::button-action\", G_CALLBACK (on_button_action_changed),\n  344 |                       page->stylus_button1_action_row);\n  345 |     g_signal_connect (G_OBJECT (page->stylus_settings), \"changed::secondary-button-action\",\n  346 |                       G_CALLBACK (on_button_action_changed), page->stylus_button2_action_row);\n  347 |     g_signal_connect (G_OBJECT (page->stylus_settings), \"changed::tertiary-button-action\",\n  348 |                       G_CALLBACK (on_button_action_changed), page->stylus_button3_action_row);\n  349 | \n  350 |     on_button_action_changed (page->stylus_settings, \"button-action\", page->stylus_button1_action_row);\n  351 |     on_button_action_changed (page->stylus_settings, \"secondary-button-action\", page->stylus_button2_action_row);\n  352 |     on_button_action_changed (page->stylus_settings, \"tertiary-button-action\", page->stylus_button3_action_row);","lines":10,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wacom/cc-wacom-stylus-page.c#L343-352"},{"ref":"panels/wacom/cc-wacom-panel.c:305-318","code":"  305 |     g_hash_table_iter_init (&iter, self->stylus_pages);\n  306 |     while (g_hash_table_iter_next (&iter, (gpointer *) &tool, (gpointer *) &page)) {\n  307 |         if (g_list_find (total, tool))\n  308 |             continue;\n  309 | \n  310 |         if (page == self->highlighted_stylus_page) {\n  311 |             g_clear_object (&self->highlighted_stylus_page);\n  312 |             g_clear_h (strv, NULL); /* NULL-terminate the strv data array */\n  546 | \n  547 |     return strv;\n  548 | }","lines":19,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wwan/cc-wwan-panel.c#L530-548"},{"ref":"panels/wwan/cc-wwan-panel.c:556-582","code":"  556 |     case PROP_PARAMETERS: {\n  557 |         GVariant *parameters;\n  558 | \n  559 |         reset_command_line_args (self);\n  560 | \n  561 |         parameters = g_value_get_variant (value);\n  562 |         if (parameters) {\n  563 |             g_autoptr(GPtrArray) array = NULL;\n  564 |             const gchar **args;\n  565 | \n  566 |             array = variant_av_to_string_array (parameters);\n  567 |             args = (const gchar **) array->pdata;\n  568 | \n  569 |             g_debug (\"Invoked with operation %s\", args[0]);\n  570 | \n  571 |             if (args[0])\n  572 |                 self->arg_operation = cmdline_operation_from_string (args[0]);\n  573 |             if (args[0] && args[1])\n  574 |                 self->arg_device = g_strdup (args[1]);\n  575 | \n  576 |             if (!verify_argv (self, (const char **) args)) {\n  577 |                 reset_command_line_args (self);\n  578 |                 return;\n  579 |             }\n  580 |             g_debug (\"Calling handle_argv() after setting property\");\n  581 |             handle_argv (self);\n  582 |         }","lines":27,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wwan/cc-wwan-panel.c#L556-582"}]},{"id":"UAF_8","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"cc_default_apps_page_init obtains the MMManager singleton via cc_object_storage_get_object (transfer-full, long-lived process-wide object) and connects its signals with g_signal_connect_swapped instead of g_signal_connect_object, with no corresponding disconnect in dispose/final es, got_transition_proxy_cb still fires and dereferences the now-dangling self.","fix":"Pass cc_panel_get_cancellable (CC_PANEL (self)) instead of NULL, matching the pattern used elsewhere in the codebase (e.g. cc-applications-panel.c).","locations":[{"ref":"panels/background/cc-background-panel.c:508-516","code":"  508 |     g_signal_connect_object (self->interface_settings, \"changed::\" INTERFACE_COLOR_SCHEME_KEY,\n  509 |                              G_CALLBACK (reload_color_scheme), self, G_CONNECT_SWAPPED);\n  510 | \n  511 |     g_signal_connect_object (self->interface_settings, \"changed::\" INTERFACE_ACCENT_COLOR_KEY,\n  512 |                              G_CALLBACK (reload_accent_color_toggles), self, G_CONNECT_SWAPPED);\n  513 | \n  514 |     g_dbus_proxy_new_for_bus (G_BUS_TYPE_SESSION, G_DBUS_PROXY_FLAGS_NONE, NULL, \"org.gnome.Shell\", \"/org/gnome/Shell\",\n  515 |                               \"org.gnome.Shell\", NULL, got_transition_proxy_cb, self);\n  516 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/background/cc-background-panel.c#L508-516"},{"ref":"panels/background/cc-background-panel.c:248-260","code":"  248 | static void\n  249 | got_transition_proxy_cb (GObject *source_object, GAsyncResult *res, gpointer data)\n  250 | {\n  251 |     g_autoptr(GError) error = NULL;\n  252 |     CcBackgroundPanel *self = data;\n  253 | \n  254 |     self->proxy = g_dbus_proxy_new_for_bus_finish (res, &error);\n  255 | \n  256 |     if (self->proxy == NULL) {\n  257 |         g_warning (\"Error creating proxy: %s\", error->message);\n  258 |         return;\n  259 |     }\n  260 | }","lines":13,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/background/cc-background-panel.c#L248-260"}]},{"id":"UAF_10","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"place_query_info_ready() is an async GIO callback whose user_data is a raw, unreffed AdwActionRow* (`row`). If the row is removed from the list (e.g. via other_places_refresh()'s gtk_list_box_remove calls) while the g_file_query_info_async() call is still in flight, GTK/GObject finalizes the row, which triggers place_free() as the \"place\" qdata destroy-notify (cancelling place->cancellable and freeing the Place struct). When the (now cancelled) async operation completes, place_query_info_ready() still unconditionally dereferences `row` via ADW_ACTION_ROW(user_data) and calls g_object_get_data(G_OBJECT(row), \"place\") and g_clear_object(&place->cancellable) on a place pointer obtained from a row that may already be freed, and on a place struct that may itself already have been freed by place_free(). This is a use-after-free.","fix":"Hold a reference on `row` for the duration of the async call (e.g. g_object_ref the row when starting the query and g_object_unref in the callback), or pass the Place's own GCancellable check at the top of the callback (g_cancellable_is_cancelled) and return early before touching `row`/`place`, or use g_object_weak_ref to detect row destruction and skip the qdata access if the row is gone.","locations":[{"ref":"panels/search/cc-search-locations-page.c:155-165","code":"  155 | static void\n  156 | place_free (Place *p)\n  157 | {\n  158 |     g_cancellable_cancel (p->cancellable);\n  159 |     g_clear_object (&p->cancellable);\n  160 | \n  161 |     g_object_unref (p->location);\n  162 |     g_free (p->display_name);\n  163 | \n  164 |     g_free (p);\n  165 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/search/cc-search-locations-page.c#L155-165"},{"ref":"panels/search/cc-search-locations-page.c:457-472","code":"  457 | static void\n  458 | place_query_info_ready (GObject *source, GAsyncResult *res, gpointer user_data)\n  459 | {\n  460 |     AdwActionRow *row = ADW_ACTION_ROW (user_data);\n  461 |     g_autoptr(GFileInfo) info = NULL;\n  462 |     g_autoptr(GError) error = NULL;\n  463 |     Place *place;\n  464 | \n  465 |     info = g_file_query_info_finish (G_FILE (source), res, &error);\n  466 | \n  467 |     if (g_error_matches (error, G_IO_ERROR, G_IO_ERROR_NOT_FOUND))\n  468 |         adw_action_row_set_subtitle (row, _(\"Location not found\"));\n  469 | \n  470 |     place = g_object_get_data (G_OBJECT (row), \"place\");\n  471 |     g_clear_object (&place->cancellable);\n  472 | }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/search/cc-search-locations-page.c#L457-472"}]},{"id":"UAF_11","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"cc_ua_seeing_page_init() calls g_dbus_proxy_new_for_bus() passing `self` as the raw user_data with no reference taken and no GCancellable tied to the widget's lifetime. If the CcUaSeeingPage is destroyed (e.g. user navigates back) before the asynchronous D-Bus proxy creation completes, on_orca_proxy_ready() will later fire with a dangling `self` pointer and immediately dereference it via the CC_IS_UA_SEEING_PAGE() type-check macro and gtk_widget_set_visible() on freed memory.","fix":"Create a GCancellable stored on self, cancel it in dispose, and pass it to g_dbus_proxy_new_for_bus so the callback receives G_IO_ERROR_CANCELLED and can bail out safely instead of touching self; alternatively take a g_object_ref on self for the duration of the async call and release it in the callback.","locations":[{"ref":"panels/universal-access/cc-ua-seeing-page.c:358-359","code":"  358 |     g_dbus_proxy_new_for_bus (G_BUS_TYPE_SESSION, G_DBUS_PROXY_FLAGS_NONE, NULL, \"org.gnome.Orca.Service\",\n  359 |                               \"/org/gnome/Orca/Service\", \"org.gnome.Orca.Service\", NULL, on_orca_proxy_ready, self);","lines":2,"link":"https://gitlab.gnome.org/G play-panel.c#L385-407"},{"ref":"panels/display/cc-display-panel.c:1014-1015","code":" 1014 |     self->display_settings = g_settings_new (DISPLAY_SCHEMA);\n 1015 |     g_signal_connect_object (self->display_settings, \"changed::night-light-enabled\",","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/display/cc-display-panel.c#L1014-1015"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"cc_keyboard_item_load_from_global_shortcuts() calls g_variant_dict_init(&dict, properties) but never calls g_variant_dict_clear(&dict) before returning, leaking the dict's internal hash table on every call. It also obtains `shortcuts` via g_variant_dict_lookup_value(), which returns a new (transfer-full) reference, but never unrefs it after passing it to variant_get_key_combos() (which only reads from it). This runs once per global shortcut on every panel load/reload.","fix":"Call g_variant_dict_clear(&dict) before every return path (or use g_autoptr-friendly cleanup), and wrap `shortcuts` in g_autoptr(GVariant) or call g_variant_unref(shortcuts) after building the key combo list.","locations":[{"ref":"panels/keyboard/cc-keyboard-item.c:616-636","code":"  616 | cc_keyboard_item_load_from_global_shortcuts (CcKeyboardItem *item, const char *shortcut_id, GVariant *properties)\n  617 | {\n  618 |     GVariantDict dict;\n  619 |     GVariant *shortcuts;\n  620 |     g_autoptr(GSettings) settings = NULL;\n  621 | \n  622 |     g_variant_dict_init (&dict, properties);\n  623 | \n  624 |     item->type = CC_KEYBOARD_ITEM_TYPE_GLOBAL_SHORTCUT;\n  625 |     item->key = g_strdup (shortcut_id);\n  626 |     item->editable = TRUE;\n  627 |     g_variant_dict_lookup (&dict, \"description\", \"s\", &item->description);\n  628 |     item->desc_editable = FALSE;\n  629 |     item->can_set_multiple = TRUE;\n  630 | \n  631 |     shortcuts = g_variant_dict_lookup_value (&dict, \"shortcuts\", NULL);\n  632 |     if (shortcuts)\n  633 |         item->key_combos = variant_get_key_combos (shortcuts);\n  634 | \n  635 |     return TRUE;\n  636 | }","lines":21,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/keyboard/cc-keyboard-item.c#L616-636"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"cc_xkb_modifier_page_init() unconditionally creates self->input_source_settings = g_settings_new(\"org.gnome.desktop.input-sources\") and connects a changed::xkb-options signal handler to it. The only constructor, cc_xkb_modifier_page_new(), then immediately overwrites self->input_source_settings = g_object_ref(input_settings) without releasing the GSettings object created in _init, leaking it on every CcXkbModifierPage instance. The leaked GSettings object also keeps its signal connection alive (tied to `self`'s lifetime via g_signal_connect_object), so on_xkb_options_changed_cb() runs twice per xkb-options change for the lifetime of the page.","fix":"In cc_xkb_modifier_page_init(), don't create a GSettings instance; instead set self->input_source_settings and connect the changed signal in cc_xkb_modifier_page_new() after assigning the ref'd input_settings (or g_clear_object the old value before reassigning in _new()).","locations":[{"ref":"panels/keyboard/cc-xkb-modifier-page.c:324-332","code":"  324 | static void\n  325 | cc_xkb_modifier_page_init (CcXkbModifierPage *self)\n  326 | {\n  327 |     gtk_widget_init_template (GTK_WIDGET (self));\n  328 | \n  329 |     self->input_source_settings = g_settings_new (\"org.gnome.desktop.input-sources\");\n  330 |     g_signal_connect_object (self->input_source_settings, \"changed::xkb-options\",\n  331 |                              G_CALLBACK (on_xkb_options_changed_cb), self, G_CONNECT_SWAPPED);\n  332 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-control- assword entry, each keystroke that leaves the password over the length limit leaks one allocation.","fix":"Change password_error_label to a g_autofree gchar * (or explicitly g_free() it after gtk_label_set_label()) so the g_strdup_printf() result is released once it has been copied into the label.","locations":[{"ref":"panels/network/cc-wifi-hotspot-dialog.c:202-250","code":"  202 | static void\n  203 | hotspot_entry_changed_cb (CcWifiHotspotDialog *self)\n  204 | {\n  205 |     const gchar *ssid, *ssid_error_label, *password, *password_error_label;\n  206 |     gboolean valid_ssid, valid_password;\n  207 | \n  208 |     g_assert (CC_IS_WIFI_HOTSPOT_DIALOG (self));\n  209 | \n  210 |     valid_ssid = FALSE;\n  211 |     ssid = gtk_editable_get_text (GTK_EDITABLE (self->name_entry));\n  212 |     password = gtk_editable_get_text (GTK_EDITABLE (self->password_entry));\n  213 | \n  214 |     if (!ssid || !*ssid) {\n  215 |         ssid_error_label = _(\"Network name cannot be empty\");\n  216 |         widget_set_error (GTK_WIDGET (self->name_entry));\n  217 |     } else if (strlen (ssid) > 32) {\n  218 |         /* SSID length needs to be in the 1-32 byte range */\n  219 |         ssid_error_label = _(\"Network name is too long\");\n  220 |         widget_set_error (GTK_WIDGET (self->name_entry));\n  221 |     } else {\n  222 |         valid_ssid = TRUE;\n  223 |         ssid_error_label = \"\";\n  224 |         widget_unset_error (GTK_WIDGET (self->name_entry));\n  225 |     }\n  226 | \n  227 |     valid_password = hotspot_password_is_valid (self, password);\n  228 | \n  229 |     if (valid_password) {\n  230 |         password_error_label = \"\";\n  231 |         widget_unset_error (GTK_WIDGET (self->password_entry));\n  232 |     } else {\n  233 |         if (strlen (password) < 8) {\n  234 |             password_error_label = _(\"Must have a minimum of 8 characters\");\n  235 |         } else {\n  236 |             /* 63 is the maximum WPA-PSK passphrase length ( job, auth_info, NULL, pp_job_authenticate_cb, self);\n  391 |         }\n  392 |     }\n  393 | \n  394 |     g_strfreev (auth_info);\n  395 | }","lines":29,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-jobs-dialog.c#L367-395"}]},{"id":"MEM_10","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In search_address, scheme and host returned by parse_uri are plain gchar * (not g_autofree). They are only transferred into a THostSearchData (and later freed) when g_network_address_parse_uri succeeds (conn != NULL). When conn is NULL, or when host itself is NULL, scheme and/or host are leaked. This triggers on every keystroke in the host search entry that does not yet parse to a complete valid network address, a very common case while typing a partial hostname.","fix":"Declare scheme and host as g_autofree gchar *, or explicitly g_free them on the conn == NULL and host == NULL paths before falling out of scope.","locations":[{"ref":"panels/printers/pp-new-printer-dialog.c:1042-1083","code":" 1042 |         if (text && text[0] != '\\0') {\n 1043 |             g_autoptr(GSocketConnectable) conn = NULL;\n 1044 |             g_autofree gchar *test_uri = NULL;\n 1045 |             g_autofree gchar *test_port = NULL;\n 1046 |             gchar *scheme = NULL;\n 1047 |             gchar *host = NULL;\n 1048 |             gint port;\n 1049 | \n 1050 |             parse_uri (text, &scheme, &host, &port);\n 1051 | \n 1052 |             if (host != NULL) {\n 1053 |                 if (port >= 0)\n 1054 |                     test_port = g_strdup_printf (\":%d\", port);\n 1055 |                 else\n 1056 |                     test_port = g_strdup (\"\");\n 1057 | \n 1058 |                 test_uri = g_strdup_printf (\"%s://%s%s\", scheme != NULL && scheme[0] != '\\0' ? scheme : \"none\", host,\n 1059 |                                             test_port);\n 1 ree the previous self->list with ppd_list_free (or g_clear_pointer) before assigning the newly copied list.","locations":[{"ref":"panels/printers/pp-new-printer-dialog.c:1562-1569","code":" 1562 | void\n 1563 | pp_new_printer_dialog_set_ppd_list (PpNewPrinterDialog *self, PPDList *list)\n 1564 | {\n 1565 |     self->list = ppd_list_copy (list);\n 1566 | \n 1567 |     if (self->ppd_selection_dialog)\n 1568 |         pp_ppd_selection_dialog_set_ppd_list (self->ppd_selection_dialog, self->list);\n 1569 | }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-new-printer-dialog.c#L1562-1569"}]},{"id":"MEM_12","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"check_clean_heads_maintenance_command and printer_clean_heads_cb each take an extra g_object_ref on a PpPrinter/related object that is never matched by a corresponding unref, leaking a reference on every invocation (printer head cleaning is a user-triggered, possibly repeated action).","fix":"Remove the redundant g_object_ref, or pair it with g_object_unref once the async operation completes/fails.","locations":[{"ref":"panels/printers/pp-printer-entry.c:406-417","code":"  406 | static void\n  407 | check_clean_heads_maintenance_command (PpPrinterEntry *self)\n  408 | {\n  409 |     if (self->clean_command == NULL)\n  410 |         return;\n  411 | \n  412 |     g_object_ref (self->clean_command);\n  413 |     self->check_clean_heads_cancellable = g_cancellable_new ();\n  414 | \n  415 |     pp_maintenance_command_is_supported_async (self->clean_command, self->check_clean_heads_cancellable,\n  416 |                                                check_clean_heads_maintenance_command_cb, self);\n  417 | }","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-printer-entry.c#L406-417"},{"ref":"panels/printers/pp-printer-entry.c:429-437","code":"  429 | static void\n  430 | printer_clean_heads_cb (PpPrinterEntry *self, const char *action_name, GVariant *parameter)\n  431 | {\n  432 |     if (self->clean_command == NULL)\n  433 |         return;\n  434 | \n  435 |     g_object_ref (self->clean_command);\n  436 |     pp_maintenance_command_execute_async (self->clean_command, NULL, clean_heads_maintenance_command_cb, self);\n  437 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-printer-entry.c#L429-437"}]},{"id":"MEM_13","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"pp_printer_entry_update overwrites self->printer_make_and_model with a new string without freeing the previous value first; the old string is only ever freed in pp_printer_entry_dispose, so every refresh of the printer entry while the widget is alive leaks the prior string.","fix":"Use g_clear_pointer/g_free on self->printer_make_and_model (or g_set_str) before assigning the new value.","locations":[{"ref":"panels/printers/pp-printer-entry.c:787-787","code":"  787 |     self->printer_make_and_model = sanitize_printer_model (printer_make_and_model);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-printer-entry.c#L787"}]},{"id":"MEM_14","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"printer_rename allocates member_names and uses it to build a D-Bus call, but never frees it, unlike the sibling users_allowed/users_denied arrays in the same function which are correctly freed.","fix":"Free member_names the same way users_allowed/users_denied are freed (matching frees for both the array and its strings, depending on ownership).","locations":[{"ref":"panels/printers/pp-utils.c:374-460","code":"  374 |                     member_names = g_ne 2/panels/printers/pp-utils.c#L374-460"}]},{"id":"MEM_15","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"get_ppd_names_async_dbus_scb builds a GList * (driver_list) via g_list_append, then copies each node's data pointer into a result[] array in a loop, but never calls g_list_free on the list spine afterward. get_all_ppds_func later in the same file performs the identical data-pointer-migration pattern and correctly frees the list spine with g_list_free, confirming this is an oversight rather than intentional.","fix":"Call g_list_free (driver_list) after copying the data pointers into result[], matching the pattern used in get_all_ppds_func.","locations":[{"ref":"panels/printers/pp-utils.c:1510-1586","code":" 1510 | static void\n 1511 | get_ppd_names_async_dbus_scb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n 1512 | {\n 1513 |     g_autoptr(GVariant) output = NULL;\n 1514 |     PPDName *ppd_item;\n 1515 |     PPDName **result = NULL;\n 1516 |     g_autoptr(GPNData) data = user_data;\n 1517 |     g_autoptr(GError) error = NULL;\n 1518 |     GList *driver_list = NULL;\n 1519 |     GList *iter;\n 1520 |     gint i, j, n = 0;\n 1521 |     static const char *const match_levels[] = { \"exact-cmd\", \"exact\", \"close\", \"generic\", \"none\" };\n 1522 | \n 1523 |     output = g_dbus_connection_call_finish (G_DBUS_CONNECTION (source_object), res, &error);\n 1524 | \n 1525 |     if (output) {\n 1526 |         g_autoptr(GVariant) array = NULL;\n 1527 | \n 1528 |         g_variant_get (output, \"(@a(ss))\", &array);\n 1529 | \n 1530 |         for (j = 0; j < G_N_ELEMENTS (match_levels) && n < data->count; j++) {\n 1531 |             g_autoptr(GVariantIter) iter = NULL;\n 1532 |             const gchar *driver, *match;\n 1533 | \n 1534 |             g_variant_get (array, \"a(ss)\", &iter);\n 1535 | \n 1536 |             while (g_variant_iter_next (iter, \"(&s&s)\", &driver, &match)) {\n 1537 | ta)\n  273 | {\n  274 |     CcCameraPage *self = user_data;\n  275 |     GVariant *ret, *permissions, *permissions_data;\n  276 |     g_autoptr(GVariant) boxed_permission_data = NULL;\n  277 |     g_autoptr(GError) error = NULL;\n  278 | \n  279 |     ret = g_dbus_proxy_call_finish (G_DBUS_PROXY (source_object), res, &error);\n  280 |     if (ret == NULL) {\n  281 |         if (!g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED))\n  282 |             g_warning (\"Failed fetch permissions from flatpak permission store: %s\", error->message);\n  283 |         return;\n  284 |     }\n  285 | \n  286 |     permissions = g_variant_get_child_value (ret, 0);\n  287 |     boxed_permission_data = g_variant_get_child_value (ret, 1);\n  288 |     permissions_data = g_variant_get_variant (boxed_permission_data);\n  289 |     update_perm_store (user_data, permissions, permissions_data);\n  290 | \n  291 |     g_signal_connect_object (source_object, \"g-signal\", G_CALLBACK (on_perm_store_signal), self, 0);\n  292 | }","lines":22,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/privacy/camera/cc-camera-page.c#L271-292"}]},{"id":"MEM_19","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"on_perm_store_lookup_done in the location page has the identical bug as the camera page: ret is a plain GVariant * holding the transfer-full result of g_dbus_proxy_call_finish, and it is never unreffed, leaking one GVariant on every successful permission-store lookup. This is the same copy-pasted bug duplicated across two panel files.","fix":"Change ret to g_autoptr(GVariant) ret = NULL; so it is freed automatically when the function returns.","locations":[{"ref":"panels/privacy/location/cc-location-page.c:278-297","code":"  278 | on_perm_store_lookup_done (GObject *source_object, GAsyncResult *res, gpointer user_data)\n  279 | {\n  280 |     g_autoptr(GError) error = NULL;\n  281 |     g_autoptr(GVariant) boxed_permission_data = NULL;\n  282 |     GVariant *ret, *permissions, *permissions_data;\n  283 | \n  284 |     ret = g_dbus_proxy_call_finish (G_DBUS_PROXY (source_object), res, &error);\n  285 |     if (ret == NULL) {\n  286 |         if (!g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED))\n  287 |             g_warning (\"Failed fetch permissions from flatpak permission store: %s\", error->message);\n  288 |         return;\n  289 |     }\n  290 | \n  291 |     permissions = g_variant_get_child_value (ret, 0);\n  292 |     boxed_permission_data = g_variant_get_child_value (ret, 1);\n  293 |     permissions_data = g_variant_get_variant (boxed_permission_data);\n  294 |     update_perm_store (user_data, permissions, permissions_data);\n  295 | \n  296 |     g_signal_connect_object (source_object, \"g-signal\", G_CALLBACK (on_perm_store_signal), user_data, 0);\n  297 | }","lines":20,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/privacy/location/cc-location-page.c#L278-297"}]},{"id":"MEM_20","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"CcUaSeeingPage creates self->proxy asynchronously in on_orca_proxy_ready() via g_dbus_proxy_new_for_bus_finish() (transfer-full), but cc_ua_seeing_page_dispose() never clears it with g_clear_object(&self->proxy). The GDBusProxy (and its D-Bus name-watching/signal subscriptions) leaks every time the Universal Access Seeing subpage is closed and re-opened, since g_dbus_proxy_new_for_bus is called again in cc_ua_seeing_page_init for the new instance.","fix":"Add `g_clear_object (&self->proxy);` inside cc_ua_seeing_page_dispose().","locations":[{"ref":"panels/universal-access/cc-ua-seeing-page.c:264-274","code":"  264 | cc_ua_seeing_page_dispose (GObject *object)\n  265 | {\n  266 |     CcUaSeeingPage *self = (CcUaSeeingPage *) object;\n  267 | \n  268 |     g_clear_object (&self->kb_settings);\n  269 |     g_clear_object (&self->interface_settings);\n  270 |     g_clear_object (&self->application_settings);\n  271 |     g_clear_object (&self->a11y_interface_settings);\n  272 | \n  273 |     G_OBJECT_CLASS (cc_ua_seeing_page_parent_class)->dispose (object);\n  274 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/universal-access/cc-ua-seeing-page.c#L264-274"},{"ref":"panels/universal-access/cc-ua-seeing-page.c:140-154","code":"  140 | static void\n  141 | on_orca_proxy_ready (GObject *source_object, GAsyncResult *res, gpointer data)\n  142 | {\n  143 |     g_autoptr(GError) error = NULL;\n  144 |     CcUaSeeingPage *self = data;\n  145 | \n  146 |     g_assert (CC_IS_UA_SEEING_PAGE (self));\n  147 | \n  148 |     self->proxy = g_dbus_proxy_new_for_bus_finish (res, &error);\n  149 | \n  150 |     if (self->proxy == NULL) {\n  151 |         g_warning (\"Error creating proxy: %s\", error->message);\n  152 |         gtk_widget_set_visible (GTK_WIDGET (self->configure_screen_reader_row), FALSE);\n  153 |     }\n  154 | }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/universal-access/cc-ua-seeing-page.c#L140-154"}]},{"id":"MEM_21","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In cc_tablet_tool_map_add_relation, the existing GList looked up from map->tablet_map is mutated with g_list_prepend (allocating a new head node referencing the old nodes), but only a fresh g_list_copy of it is stored back via g_hash_table_replace. The replace call frees the previous value (the very nodes the prepended list's tail still points to) via the table's g_list_free destroy notifier, while the locally prepended head node itself is never freed since the table now holds an unrelated copy. This leaks one GList node per stylus association with an already-known tablet device (e.g. every time a user switches between multiple pens on the same tablet).","fix":"Avoid the redundant prepend+copy: either insert the prepended list directly with g_hash_table_steal/g_hash_table_insert (transferring ownership of the new head node and reusing the old tail), or build a single fresh list via g_list_copy first and then prepend onto the copy, then insert that same list without copying it again.","locations":[{"ref":"panels/wacom/cc-tablet-tool-map.c:339-343","code":"  339 |     styli = g_hash_table_lookup (map->tablet_map, device_key);\n  340 | \n  341 |     if (!g_list_find (styli, tool)) {\n  342 |         styli = g_list_prepend (styli, tool);\n  343 |         g_hash_table_replace (map->tablet_map, g_strdup (device_key), g_list_copy (styli));","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wacom/cc-tablet-tool-map.c#L339-343"}]},{"id":"MEM_22","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"update_settings_bindings() is called multiple times over the panel's lifetime (once from init, and again every time the async session-limits-changed/get_session_limits_cb path resolves). Each time the non-parental-controls branch is taken, it unconditionally does `self->screen_time_limits_settings_changed_history_enabled_id = g_signal_connect_swapped(...)` without first disconnecting any previous connection, overwriting the stored handler ID and leaking the older connection. In addition, dispose() never disconnects screen_time_limits_settings_changed_history_enabled_id at all (unlike the other screen_time_limits_settings handler IDs, which are all cleared via g_clear_signal_handler), so the swapped callback (which holds no ref on self) remains connected to self->screen_time_limits_settings after the panel is destroyed, risking a dangling self pointer being passed to update_screen_time_limits_enabled() the next time the GSettings key changes.","fix":"Before connecting at lines 303-305, call g_clear_signal_handler(&self->screen_time_limits_settings_changed_history_enabled_id, self->screen_time_limits_settings) to disconnect any prior connection, and add the corresponding g_clear_signal_handler call to cc_wellbeing_panel_dispose() alongside the other screen_time_limits_settings handlers.","locations":[{"ref":"panels/wellbeing/cc-wellbeing-panel.c:271-306","code":"  271 | static void\n  272 | update_settings_bindings (CcWellbeingPanel *self)\n  273 | {\n  274 | #ifdef HAVE_MALCONTENT\n  275 |     if (is_parental_controls_enabled (self)) {\n  276 |         gboolean daily_limit;\n  277 |         unsigned int limit_secs;\n  278 | \n  279 |         g_settings_unbind (self->screen_time_limit_row, \"active\");\n  280 |         g_settings_unbind (self->daily_time_limit_row, \"duration\");\n  281 |         g_settings_unbind (self->grayscale_row, \"active\");\n  282 | \n  283 |         g_clear_signal_handler (&self->screen_time_limits_settings_writable_changed_daily_limit_seconds_id,\n  284 |                                 self->screen_time_limits_settings);\n  285 | \n  286 |         daily_limit = mct_session_limits_get_daily_limit (self->limits, &limit_secs);\n  287 | \n  288 |         adw_switch_row_set_active (self->screen_time_limit_row, daily_limit);\n  289 |         cc_duration_row_set_duration (CC_DURATION_ROW (self->daily_time_limit_row), limit_secs / 60);\n  290 |         adw_switch_row_set_active (self->grayscale_row, FALSE);\n  291 | \n  292 |         return;\n  293 |     }\n  294 | #endif\n  295 |     g_settings_bind (self->screen_time_limits_settings, \"daily-limit-enabled\", self->screen_time_limit_row, \"active\",\n  296 |                      G_SETTINGS_BIND_DEFAULT | G_SETTINGS_BIND_NO_SENSITIVITY);\n  297 |     g_settings_bind_with_mapping (self->screen_time_limits_settings, \"daily-limit-seconds\", self->daily_time_limit_row,\n  298 |                                   \"duration\", G_SETTINGS_BIND_DEFAULT | G_SETTINGS_BIND_NO_SENSITIVITY,\n  299 |                                   seconds_to_minutes, minutes_to_seconds, NULL, NULL);\n  300 |     g_settings_bind (self->screen_time_limits_settings, \"grayscale\", self->grayscale_row, \"active\",\n  301 |                      G_SETTINGS_BIND_DEFAULT | G_SETTINGS_BIND_NO_SENSITIVITY);\n  302 | \n  303 |     self->screen_time_limits_settings_changed_history_enabled_id =\n  304 |         g_signal_connect_swapped (self->screen_time_limits_settings, \"changed::history-enabled\",\n  305 |                                   G_CALLBACK (update_screen_time_limits_enabled), self);\n  306 | }","lines":36,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wellbeing/cc-wellbeing-panel.c#L271-306"},{"ref":"panels/wellbeing/cc-wellbeing-panel.c:303-305","code":"  303 |     self->screen_time_limits_settings_changed_history_enabled_id =\n  304 |         g_signal_connect_swapped (self->screen_time_limits_settings, \"changed::history-enabled\",\n  305 |                                   G_CALLBACK (update_screen_time_limits_enabled), self);","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wellbeing/cc-wellbeing-panel.c#L303-305"},{"ref":"panels/wellbeing/cc-wellbeing-panel.c:650-692","code":"  650 | static void\n  651 | cc_wellbeing_panel_dispose (GObject *object)\n  652 | {\n  653 |     CcWellbeingPanel *self = CC_WELLBEING_PANEL (object);\n  654 | \n  655 |     g_clear_signal_handler (&self->screen_time_limits_settings_writable_changed_daily_limit_seconds_id,\n  656 |                             self->screen_time_limits_settings);\n  657 |     g_clear_signal_handler (&self->screen_time_limits_settings_writable_changed_grayscale_id,\n  658 |                             self->screen_time_limits_settings);\n  659 |     g_clear_signal_handler (&self->screen_time_limits_settings_writab 0893b0a83da7ab339672/panels/applications/cc-application-shortcut-dialog.c#L151-160"}]},{"id":"MEM_24","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"self->model (a GListStore created in cc_default_apps_row_constructed and handed to adw_combo_row_set_model) is never released. cc_default_apps_row_finalize only frees content_type and filters, leaking the GListStore (and the GAppInfo items appended into it) every time a CcDefaultAppsRow is destroyed.","fix":"Add g_clear_object (&self->model) to cc_default_apps_row_finalize (or store it in dispose if it should be released earlier).","locations":[{"ref":"panels/applications/cc-default-apps-row.c:86-94","code":"   86 | cc_default_apps_row_finalize (GObject *object)\n   87 | {\n   88 |     CcDefaultAppsRow *self = CC_DEFAULT_APPS_ROW (object);\n   89 | \n   90 |     g_clear_pointer (&self->content_type, g_free);\n   91 |     g_clear_pointer (&self->filters, g_free);\n   92 | \n   93 |     G_OBJECT_CLASS (cc_default_apps_row_parent_class)->finalize (object);\n   94 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/applications/cc-default-apps-row.c#L86-94"},{"ref":"panels/applications/cc-default-apps-row.c:110-133","code":"  110 |     self->model = g_list_store_new (G_TYPE_APP_INFO);\n  111 | \n  112 |     /* Add the default separately because it may not be in the list of recommended apps */\n  113 |     if (G_IS_APP_INFO (default_app))\n  114 |         g_list_store_append (self->model, default_app);\n  115 | \n  116 |     for (l = recommended_apps; l != NULL; l = l->next) {\n  117 |         GAppInfo *app = l->data;\n  118 | \n  119 |         if (!G_IS_APP_INFO (app) || (default_app != NULL && g_app_info_equal (app, default_app)))\n  120 |             continue;\n  121 | \n  122 |         g_list_store_append (self->model, app);\n  123 |     }\n  124 | \n  125 |     if (g_list_model_get_n_items (G_LIST_ ill not show hostname, hostnamed not installed\");\n   94 | \n   95 |         gtk_widget_set_sensitive (GTK_WIDGET (self), FALSE);\n   96 | \n   97 |         return;\n   98 |     }\n   99 | \n  100 |     if (g_permission_get_allowed (permission))\n  101 |         gtk_widget_set_sensitive (GTK_WIDGET (self), TRUE);\n  102 |     else {\n  103 |         g_debug (\"Not allowed to change the hostname\");\n  104 |         gtk_widget_set_sensitive (GTK_WIDGET (self), FALSE);\n  105 |     }\n  106 | \n  107 |     str = cc_hostname_get_display_hostname (cc_hostname_get_default ());\n  108 |     if (str != NULL)\n  109 |         gtk_editable_set_text (GTK_EDITABLE (self), str);\n  110 |     else\n  111 |         gtk_editable_set_text (GTK_EDITABLE (self), \"\");\n  112 | \n  113 |     g_signal_connect (self, \"apply\", G_CALLBACK (text_changed_cb), NULL);\n  114 | \n  115 |     adw_entry_row_set_show_apply_button (ADW_ENTRY_ROW (self), TRUE);\n  116 | }","lines":38,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/common/cc-hostname-entry.c#L79-116"}]},{"id":"MEM_26","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In bus_gotten(), the first g_dbus_proxy_get_cached_property() call for \"ApplyMonitorsConfigAllowed\" returns a new transfer-full GVariant stored in `variant`, but it is never unreffed before `variant` is reassigned to the result of the second g_dbus_proxy_get_cached_property() call for \"NightLightSupported\" two lines later. Because `variant` is a g_autoptr(GVariant), only the second value gets freed at scope exit; the first GVariant returned by the ApplyMonitorsConfigAllowed lookup leaks every time this D-Bus bus-gotten callback runs (i.e. once per CcDisplayConfigManager construction).","fix":"Use a separate g_autoptr(GVariant) for each property lookup, or explicitly g_variant_unref() the first variant before reassigning, e.g. introduce `g_autoptr(GVariant) allowed_variant` and `g_autoptr(GVariant) night_light_variant`.","locations":[{"ref":"panels/display/cc-display-config-manager.c:119-129","code":"  119 |     variant = g_dbus_proxy_get_cached_property (proxy, \"ApplyMonitorsConfigAllowed\");\n  120 |     if (variant)\n  121 |         self->apply_allowed = g_variant_get_boolean (variant);\n  122 |     else\n  123 |         g_warning (\"Missing property 'ApplyMonitorsConfigAllowed' on DisplayConfig API\");\n  124 | \n  125 |     variant = g_dbus_proxy_get_cached_property (proxy, \"NightLightSupported\");\n  126 |     if (variant)\n  127 |         self->night_light_supported = g_variant_get_boolean (variant);\n  128 |     else\n  129 |         g_warning (\"Missing property 'NightLightSupported' on DisplayConfig API\");","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/display/cc-display-config-manager.c#L119-129"}]},{"id":"MEM_27","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"CcMousePanel creates pointingstick_settings in cc_mouse_panel_init() but cc_mouse_panel_dispose() only clears mouse_settings and touchpad_settings, never pointingstick_settings. The GSettings object is leaked every time the panel is destroyed/recreated.","fix":"Add g_clear_object (&self->pointingstick_settings); to cc_mouse_panel_dispose().","locations":[{"ref":"panels/mouse/cc-mouse-panel.c:65-67","code":"   65 |     GSettings *mouse_settings;\n   66 |     GSettings *touchpad_settings;\n   67 |     GSettings *pointingstick_settings;","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/mouse/cc-mouse-panel.c#L65-67"},{"ref":"panels/mouse/cc-mouse-panel.c:373-382","code":"  373 | cc_mouse_panel_dispose (GObject *object)\n  374 | {\n  375 |     CcMousePanel *self = CC_MOUSE_PANEL (object);\n  376 | \n  377 |     g_clear_object (&self->mouse_settings);\n
