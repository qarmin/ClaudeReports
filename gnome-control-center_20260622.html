e with g_free once it is no longer needed, or switch to g_autofree.","locations":[{"ref":"panels/printers/pp-host.c:548-565","code":"  548 |                 found_queue = g_strdup (candidate);\n  549 |                 break;\n  550 |             }\n  551 |         }\n  552 | \n  553 |         if (found_queue != NULL) {\n  554 |             g_autofree gchar *device_uri = NULL;\n  555 |             PpPrintDevice *device;\n  556 | \n  557 |             device_uri = g_strdup_printf (\"lpd://%s:%d/%s\", priv->hostname, port, found_queue);\n  558 | \n  559 |             device = g_object_new (PP_TYPE_PRINT_DEVICE, \"is-network-device\", TRUE, \"device-uri\", device_uri,\n  560 |                                    /* Translators: The found device is a Line Printer Daemon printer */\n  561 |                                    \"device-name\",\n  562 |                                    _(\"LPD Printer\"), \"host-name\", priv->hostname, \"host-port\", port,\n  563 |                                      \"acquisition-method\", ACQUISITION_METHOD_LPD, NULL);\n  564 |             g_ptr_array_add (devices, device);\n  565 |         }","lines":18,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-host.c#L548-565"}]},{"id":"MEM_30","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"bolt_client_new returns FALSE instead of NULL on the early bus-connection failure path. The function's declared return type is BoltClient *, so this is a type mismatch (harmless because FALSE == 0 == NULL, but sloppy and inconsistent with the rest of the function).","fix":"Return NULL instead of FALSE to match the declared pointer return type.","locations":[{"ref":"panels/privacy/bolt/bolt-client.c:145-164","code":"  145 | BoltClient *\n  146 | bolt_client_new (GError **error)\n  147 | {\n  148 |     BoltClient *cli;\n  149 |     GDBusConnection *bus;\n  150 | \n  151 |     bus = g_bus_g ew PIN\"));\n  276 |         gcr_prompt_set_warning (prompt, \"\");\n  277 |     }\n  278 | \n  279 |     warning = _(\"PIN code should be a 4-8 digit number\");\n  280 |     while (password && !cc_wwan_device_pin_valid (password, MM_MODEM_LOCK_SIM_PIN)) {\n  281 |         password = gcr_prompt_password (prompt, self->cancellable, &error);\n  282 |         gcr_prompt_set_warning (prompt, warning);\n  283 |     }\n  284 | \n  285 |     pin = g_strdup (password);\n  286 |     gcr_prompt_close (prompt);\n  287 |     g_object_unref (prompt);\n  288 | \n  289 |     if (error)\n  290 |         g_warning (\"Error: %s\", error->message);\n  291 | \n  292 |     /* Error or User cancelled PIN */\n  293 |     if (!pin)\n  294 |         return;\n  295 | \n  296 |     gtk_button_set_label (self->unlock_button, _(\"Unlocking…\"));\n  297 |     gtk_widget_set_sensitive (GTK_WIDGET (self->unlock_button), FALSE);\n  298 | \n  299 |     if (lock == MM_MODEM_LOCK_SIM_PIN)\n  300 |         cc_wwan_device_send_pin (self->device, pin, self->cancellable, cc_wwan_device_page_unlocked_cb, self);\n  301 |     else if (lock == MM_MODEM_LOCK_SIM_PUK) {\n  302 |         cc_wwan_device_send_puk (self->device, puk, pin, self->cancellable, cc_wwan_device_page_unlocked_cb, self);\n  303 |     } else {\n  304 |         g_warn_if_reached ();\n  305 |     }\n  306 | }","lines":73,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wwan/cc-wwan-device-page.c#L234-306"}]},{"id":"MEM_35","type":"memory_leak","type_label":"Memory Leak","severity":"negligible","easy":false,"description":"create_actions_combo() creates a GtkListStore with gtk_list_store_new() (a full initial reference) and passes it to gtk_combo_box_new_with_model(), which adds its own reference to the model property; the function's own initial reference on `model` is never released.","fix":"Call g_object_unref (model) after gtk_combo_box_new_with_model(), or wrap model in g_aut -by-one and would corrupt the stack if a caller ever passed digits=9 (the guard's own stated limit).","fix":"Either shrink the allowed digits to `digits > 8` in the guard, or enlarge the buffer to `gchar whole[11]` to match the documented digits<=9 contract.","locations":[{"ref":"panels/system/datetime/tz.c:385-408","code":"  385 | static float\n  386 | convert_pos (gchar *pos, int digits)\n  387 | {\n  388 |     gchar whole[10];\n  389 |     gchar *fraction;\n  390 |     gint i;\n  391 |     float t1, t2;\n  392 | \n  393 |     if (!pos || strlen (pos) < 4 || digits > 9)\n  394 |         return 0.0;\n  395 | \n  396 |     for (i = 0; i < digits + 1; i++)\n  397 |         whole[i] = pos[i];\n  398 |     whole[i] = '\\0';\n  399 |     fraction = pos + digits + 1;\n  400 | \n  401 |     t1 = g_strtod (whole, NULL);\n  402 |     t2 = g_strtod (fraction, NULL);\n  403 | \n  404 |     if (t1 >= 0.0)\n  405 |         return t1 + t2 / pow (10.0, strlen (fraction));\n  406 |     else\n  407 |         return t1 - t2 / pow (10.0, strlen (fraction));\n  408 | }","lines":24,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/datetime/tz.c#L385-408"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"cc_calibrator_finish() computes scale_x = 1/(float)c->geometry.width and scale_y = 1/(float)c->geometry.height without checking for zero. cc_calib_area_size_allocate() feeds live GTK width/height straight into cc_calibrator_update_geometry(), and width/height can legitimately be 0 during early allocation passes before the calibration window is fullscreened. A zero dimension produces an infinite scale factor and can propagate Inf/NaN into the computed XYinfo axis, which is then written into the device's GSettings 'area' calibration key, corrupting the tablet's persisted calibration until manually reset.","fix":"Guard cc_calibrator_update_geometry()/cc_calibrator_finish() against width == 0 or height == 0 (e.g. ignore the allocation or reset/skip the calibration calculation) before dividing.","locations":[{"ref":"panels/wacom/calibrator/calibrator.c:250-264","code":"  250 |     swap_xy = (c->geometry.width < c->geometry.height);\n  251 | \n  252 |     /* Compute the scale to transform from pixel positions to [0..1]. */\n  253 |     scale_x = 1 / (float) c->geometry.width;\n  254 |     scale_y = 1 / (float) c->geometry.height;\n  255 | \n  256 |     axis.x_min = ((((c->clicked[CC_CALIBRATOR_STATE_UPPER_LEFT].x + c->clicked[CC_CALIBRATOR_STATE_LOWER_LEFT].x) / 2))\n  257 |                   * scale_x);\n  258 |     axis.x_max =\n  259 |         ((((c->clicked[CC_CALIBRATOR_STATE_UPPER_RIGHT].x + c->clicked[CC_CALIBRATOR_STATE_LOWER_RIGHT].x) / 2))\n  260 |          * scale_x);\n  261 |     axis.y_min = ((((c->clicked[CC_CALIBRATOR_STATE_UPPER_LEFT].y + c->clicked[CC_CALIBRATOR_STATE_UPPER_RIGHT].y) / 2))\n  262 |                   * scale_y);\n  263 |     axis.y_max = ((((c->clicked[CC_CALIBRATOR_STATE_LOWER_LEFT].y + c->clicked[CC_CALIBRATOR_STATE_LOWER_RIGHT].y) / 2))\n  264 |                   * scale_y);","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wacom/calibrator/calibrator.c#L250-264"},{"ref":"panels/wacom/calibrator/calibrator-gui.c:208-218","code":"  208 | static void\n  209 | cc_calib_area_size_allocate (GtkWidget *widget, int width, int height, int baseline)\n  210 | {\n  211 |     CcCalibArea *calib_area = CC_CALIB_AREA (widget);\n  212 | \n  213 |     cc_calibrator_update_geometry (calib_area->calibrator, width, height);\n  214 |     if (cc_calibrator_get_state (calib_area->calibrator) == CC_CALIBRATOR_STATE_UPPER_LEFT)\n  215 |         set_active_target (calib_area, CC_CALIBRATOR_STATE_UPPER_LEFT);\n  216 | \n  217 |     GTK_WIDGET_CLASS (cc_calib_area_parent_class)->size_allocate (widget, width, height, baseline);\n  218 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wacom/calibrator/calibrator-gui.c#L208-218"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"cc_break_schedule_compare() returns the result of subtracting two guint fields (interval_secs, duration_secs) directly as a gint. If the difference between the two unsigned values exceeds G_MAXINT, the implicit conversion produces an incorrect sign, leading to wrong sort order when used as a GCompareFunc in g_list_store_sort(). Current callers only use small values (max ~1800 seconds) so this is not exploitable today, but the function has no defensive bound and would silently misbehave if larger values were ever introduced.","fix":"Use explicit comparison instead of subtraction, e.g. return (a->interval_secs > b->interval_secs) - (a->interval_secs < b->interval_secs), and similarly for duration_secs.","locations":[{"ref":"panels/wellbeing/cc-break-schedule-row.c:116-124","code":"  116 | gint\n  117 | cc_break_schedule_compare (CcBreakSchedule *a, CcBreakSchedule *b)\n  118 | {\n  119 |     if (a->interval_secs != b->interval_secs)\n  120 |         return a->interval_secs - b->interval_secs;\n  121 |     if (a->duration_secs != b->duration_secs)\n  122 |         return a->duration_secs - b->duration_secs;\n  123 |     return 0;\n  124 | }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wellbeing/cc-break-schedule-row.c#L116-124"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"_pp_maintenance_command_execute_thread can reach two g_task_return_* calls on the same GTask along certain control-flow paths (the success path falls through into the error-handling block instead of returning), which is a contract violation for GTask and leads to undefined behavior / critical warnings.","fix":"Add an explicit return after the first g_task_return_* call on each path, or restructure with else branches so only one g_task_return_* runs.","locations":[{"ref":"panels/printers/pp-maintenance-command.c:160-216","code":"  160 | static void\n  161 | _pp_maintenance_command_execute_thread (GTask *task, gpointer source_object, gpointer task_data,\n  162 |                                         GCancellable *cancellable)\n  163 | {\n  164 |     PpMaintenanceCommand *self = PP_MAINTENANCE_COMMAND (source_object);\n  165 |     gboolean success = FALSE;\n  166 |     GError *error = NULL;\n  167 | \n  168 |     if (_pp_maintenance_command_is_supported (self->printer_name, self->command)) {\n  169 |         ipp_t *request;\n  170 |         ipp_t *response = NULL;\n  171 |         g_autofree gchar *printer_uri = NULL;\n  172 |         g_autofree gchar *file_name = NULL;\n  173 |         int fd = -1;\n  174 | \n  175 |         printer_uri = g_strdup_printf (\"ipp://localhost/printers/%s\", self->printer_name);\n  176 | \n  177 |         request = ippNewRequest (IPP_PRINT_JOB);\n  178 | \n  179 |         ippAddString (request, IPP_TAG_OPERATION, IPP_TAG_URI, \"printer-uri\", NULL, printer_uri);\n  180 |         ippAddString (request, IPP_TAG_OPERATION, IPP_TAG_NAME, \"job-name\", NULL, self->title);\n  181 |         ippAddString (request, IPP_TAG_JOB, IPP_TAG_MIMETYPE, \"document-format\", NULL, \"application/vnd.cups-command\");\n  182 | \n  183 |         fd = g_file_open_tmp (\"ccXXXXXX\", &file_name, &error);\n  184 | \n  185 |         if (fd != -1) {\n  186 |             FILE *file;\n  187 | \n  188 |             file = fdopen (fd, \"w\");\n  189 |             fprintf (file, \"#CUPS-COMMAND\\n\");\n  190 |             fprintf (file, \"%s\", self->command);\n  191 |             if (self->parameters)\n  192 |                 fprintf (file, \" %s\", self->parameters);\n  193 |             fprintf (file, \"\\n\");\n  194 |             fclose (file);\n  195 | \n  196 |             response = cupsDoFileRequest (CUPS_HTTP_DEFAULT, request, \"/\", file_name);\n  197 |             g_unlink (file_name);\n  198 | \n  199 |             if (response != NULL) {\n  200 |                 if (ippGetStatusCode (response) <= IPP_OK_CONFLICT) {\n  201 |                     success = TRUE;\n  202 |                 }\n  203 | \n  204 |                 ippDelete (response);\n  205 |             }\n  206 |         }\n  207 |     } else {\n  208 |         success = TRUE;\n  209 |     }\n  210 | \n  211 |     if (!success) {\n  212 |         g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_FAILED, \"Execution of maintenance command failed.\");\n  213 |     }\n  214 | \n  215 |     g_task_return_boolean (task, success);\n  216 | }","lines":57,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-maintenance-command.c#L160-216"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"pp_maintenance_command_execute_cb only calls printer_configure_async_finish (and sets data->autoconfigure_finished) on success or on a non-cancelled error. When the operation is cancelled, the function falls through doing nothing: autoconfigure_finished is never set and printer_configure_async_finish is never invoked for that join. Since printer_configure_async_finish's join condition requires autoconfigure_finished (unless is_network_device), the outer self->task created in pp_new_printer_add_async is never completed when cancelled, permanently orphaning the original caller's GAsyncReadyCallback and leaking PCData.","fix":"In the cancelled-error branch, also set data->autoconfigure_finished = TRUE and call printer_configure_async_finish (data), the same as the other two branches, so the join can always complete.","locations":[{"ref":"panels/printers/pp-new-printer.c:810-834","code":"  810 | static void\n  811 | pp_maintenance_command_execute_cb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n  812 | {\n  813 |     g_autoptr(GError) error = NULL;\n  814 |     PCData *data;\n  815 |     gboolean result;\n  816 | \n  817 |     result = pp_maintenance_command_execute_finish (PP_MAINTENANCE_COMMAND (source_object), res, &error);\n  818 | \n  819 |     if (result) {\n  820 |         data = (PCData *) user_data;\n  821 | \n  822 |         data->autoconfigure_finished = TRUE;\n  823 |         printer_configure_async_finish (data);\n  824 |     } else {\n  825 |         if (!g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED)) {\n  826 |             data = (PCData *) user_data;\n  827 | \n  828 |             g_warning (\"%s\", error->message);\n  829 | \n  830 |             data->autoconfigure_finished = TRUE;\n  831 |             printer_configure_async_finish (data);\n  832 |         }\n  833 |     }\n  834 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-new-printer.c#L810-834"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In load_backward_tz(), when parsing the embedded 'backward' tzdata file, if a Link line fails to yield both `real` and `alias` tokens, the code logs a warning via g_warning() but does not `continue` the loop. Execution falls through to `g_str_equal(real, \"Etc/UTC\")` and `g_hash_table_insert(tz_db->backward, g_strdup(alias), g_strdup(real))`, both of which dereference real/alias - if either is NULL this is a NULL pointer dereference crash (g_str_equal and g_strdup both assert/crash on NULL via g_return checks, terminating the process).","fix":"Add `continue;` immediately after the warning: \\n if (real == NULL || alias == NULL) {\\n     g_warning (\"Could not parse line: %s\", lines[i]);\\n     continue;\\n }","locations":[{"ref":"panels/system/datetime/tz.c:482-489","code":"  482 |         if (real == NULL || alias == NULL)\n  483 |             g_warning (\"Could not parse line: %s\", lines[i]);\n  484 | \n  485 |         /* We don't need more than one name for it */\n  486 |         if (g_str_equal (real, \"Etc/UTC\") || g_str_equal (real, \"Etc/UCT\"))\n  487 |             real = \"Etc/GMT\";\n  488 | \n  489 |         g_hash_table_insert (tz_db->backward, g_strdup (alias), g_strdup (real));","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/datetime/tz.c#L482-489"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"on_reset_all_dialog_response_cb() intends to skip custom shortcuts while resetting all others, as stated by the comment \"Don't reset custom shortcuts\", but uses `return;` instead of `continue;`. Since the \"custom\" section is always sorted last (see compare_sections_title placing the \"custom\" id last) and almost always contains at least one CC_KEYBOARD_ITEM_TYPE_GSETTINGS_PATH item if non-empty, the function returns as soon as it reaches the first custom shortcut, skipping the trailing adw_switch_row_set_active(self->overview_shortcut_row, TRUE) call. This means clicking \"Reset All\" silently fails to restore the Activities Overview shortcut switch whenever any custom shortcuts exist.","fix":"Replace `return;` at line 332 with `continue;` so only the current item is skipped and the outer loop, including the trailing adw_switch_row_set_active() call, still runs to completion.","locations":[{"ref":"panels/keyboard/cc-keyboard-shortcut-page.c:312-341","code":"  312 | static void\n  313 | on_reset_all_dialog_response_cb (CcKeyboardShortcutPage *self)\n  314 | {\n  315 |     guint n_items, j_items;\n  316 | \n  317 |     n_items = g_list_model_get_n_items (G_LIST_MODEL (self->sections));\n  318 | \n  319 |     for (guint i = 0; i < n_items; i++) {\n  320 |         g_autoptr(GListModel) section = NULL;\n  321 | \n  322 |         section = g_list_model_get_item (G_LIST_MODEL (self->sections), i);\n  323 |         j_items = g_list_model_get_n_items (section);\n  324 | \n  325 |         for (guint j = 0; j < j_items; j++) {\n  326 |             g_autoptr(CcKeyboardItem) item = NULL;\n  327 | \n  328 |             item = g_list_model_get_item (section, j);\n  329 | \n  330 |             /* Don't reset custom shortcuts */\n  331 |             if (cc_keyboard_item_get_item_type (item) == CC_KEYBOARD_ITEM_TYPE_GSETTINGS_PATH)\n  332 |                 return;\n  333 | \n  334 |             /* cc_keyboard_manager_reset_shortcut() already resets conflicting shortcuts,\n  335 |              * so no other check is needed here. */\n  336 |             cc_keyboard_manager_reset_shortcut (self->manager, item);\n  337 |         }\n  338 |     }\n  339 | \n  340 |     adw_switch_row_set_active (self->overview_shortcut_row, TRUE);\n  341 | }","lines":30,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/keyboard/cc-keyboard-shortcut-page.c#L312-341"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"on_get_job_attributes_cb looks up printer_entry via g_hash_table_lookup and immediately calls pp_printer_entry_update_jobs_count on it without a NULL check, while the otherwise-identical lookups in execute_action (same file) both guard with an explicit NULL check and warning. A JobCreated/JobCompleted D-Bus notification referencing a printer not yet present in self->printer_entries (a timing race during panel startup or printer list refresh) triggers a NULL dereference.","fix":"Add the same NULL check used in execute_action: if (printer_entry != NULL) pp_printer_entry_update_jobs_count (printer_entry); else g_warning (...).","locations":[{"ref":"panels/printers/cc-printers-panel.c:308-343","code":"  308 | on_get_job_attributes_cb (GObject *source_object, GAsyncResult *res, gpointer user_data)\n  309 | {\n  310 |     CcPrintersPanel *self = (CcPrintersPanel *) user_data;\n  311 |     const gchar *job_originating_user_name;\n  312 |     const gchar *job_printer_uri;\n  313 |     g_autoptr(GVariant) attributes = NULL;\n  314 |     g_autoptr(GError) error = NULL;\n  315 | \n  316 |     attributes = pp_job_get_attributes_finish (PP_JOB (source_object), res, &error);\n  317 | \n  318 |     if (attributes != NULL) {\n  319 |         g_autoptr(GVariant) username = NULL;\n  320 | \n  321 |         if ((username = g_variant_lookup_value (attributes, \"job-originating-user-name\", G_VARIANT_TYPE (\"as\")))\n  322 |             != NULL) {\n  323 |             g_autoptr(GVariant) printer_uri = NULL;\n  324 | \n  325 |             if ((printer_uri = g_variant_lookup_value (attributes, \"job-printer-uri\", G_VARIANT_TYPE (\"as\"))) != NULL) {\n  326 |                 job_originating_user_name = g_variant_get_string (g_variant_get_child_value (username, 0), NULL);\n  327 |                 job_printer_uri = g_variant_get_string (g_variant_get_child_value (printer_uri, 0), NULL);\n  328 | \n  329 |                 if (job_originating_user_name != NULL && job_printer_uri != NULL\n  330 |                     && g_strcmp0 (job_originating_user_name, cupsUser ()) == 0 && g_strrstr (job_printer_uri, \"/\") != 0\n  331 |                     && self->dests != NULL) {\n  332 |                     PpPrinterEntry *printer_entry;\n  333 |                     gchar *printer_name;\n  334 | \n  335 |                     printer_name = g_strrstr (job_printer_uri, \"/\") + 1;\n  336 |                     printer_entry = PP_PRINTER_ENTRY (g_hash_table_lookup (self->printer_entries, printer_name));\n  337 | \n  338 |                     pp_printer_entry_update_jobs_count (printer_entry);\n  339 |                 }\n  340 |             }\n  341 |         }\n  342 |     }\n  343 | }","lines":36,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/cc-printers-panel.c#L308-343"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In change_clock_settings_cb(), `GDesktopClockFormat value;` is declared uninitialized and only assigned inside two non-exhaustive `if` statements (not if/else) checking active_name against \"twenty-four\" and \"am-pm\". If adw_toggle_group_get_active_name() ever returns a different/unexpected string (e.g. future UI change, programming error, or a toggle group with no active selection), `value` is used uninitialized at g_settings_set_enum() and self->clock_format = value, writing garbage to GSettings and panel state.","fix":"Initialize `GDesktopClockFormat value = G_DESKTOP_CLOCK_FORMAT_24H;` at declaration, or change the second `if` to `else if` and add a final `else` with a g_warning/default case.","locations":[{"ref":"panels/system/datetime/cc-datetime-page.c:163-185","code":"  163 | static void\n  164 | change_clock_settings_cb (CcDateTimePage *self)\n  165 | {\n  166 |     GDesktopClockFormat value;\n  167 |     const char *active_name;\n  168 | \n  169 |     g_signal_handlers_block_by_func (self->clock_settings, clock_settings_changed_cb, self);\n  170 | \n  171 |     active_name = adw_toggle_group_get_active_name (self->time_format_toggle_group);\n  172 | \n  173 |     if (g_str_equal (active_name, \"twenty-four\"))\n  174 |         value = G_DESKTOP_CLOCK_FORMAT_24H;\n  175 |     if (g_str_equal (active_name, \"am-pm\"))\n  176 |         value = G_DESKTOP_CLOCK_FORMAT_12H;\n  177 | \n  178 |     g_settings_set_enum (self->clock_settings, CLOCK_FORMAT_KEY, value);\n  179 |     g_settings_set_enum (self->filechooser_settings, CLOCK_FORMAT_KEY, value);\n  180 |     self->clock_format = value;\n  181 | \n  182 |     update_time (self);\n  183 | \n  184 |     g_signal_handlers_unblock_by_func (self->clock_settings, clock_settings_changed_cb, self);\n  185 | }","lines":23,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/datetime/cc-datetime-page.c#L163-185"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"kinit_thread_func()'s case 0 branch only calls g_task_return_pointer/g_task_return_new_error when `filename != NULL`. If g_mkstemp_full() failed earlier (temp file creation failed), filename is cleared to NULL at line 609, and if krb5 login then succeeds (code == 0), the switch's case 0 body does nothing at all - the GTask is never completed. Callers awaiting this async login operation will hang indefinitely.","fix":"Add an else branch for the `filename == NULL` case inside `case 0:` that calls g_task_return_new_error() with an appropriate CC_REALM_ERROR so the task always completes.","locations":[{"ref":"panels/system/users/cc-realm-manager.c:605-632","code":"  605 |     filename = g_build_filename (g_get_user_runtime_dir (), \"um-krb5-creds.XXXXXX\", NULL);\n  606 |     temp_fd = g_mkstemp_full (filename, O_RDWR, S_IRUSR | S_IWUSR);\n  607 |     if (temp_fd == -1) {\n  608 |         g_warning (\"Couldn't create credential cache file: %s: %s\", filename, g_strerror (errno));\n  609 |         g_clear_pointer (&filename, g_free);\n  610 |     } else {\n  611 |         close (temp_fd);\n  612 |     }\n  613 | \n  614 |     code = krb5_init_context (&k5);\n  615 |     if (code == 0) {\n  616 |         code = login_perform_kinit (k5, login->realm, login->user, login->password, filename);\n  617 |     }\n  618 | \n  619 |     switch (code) {\n  620 |     case 0:\n  621 |         if (filename != NULL) {\n  622 |             g_autoptr(GError) error = NULL;\n  623 | \n  624 |             if (g_file_get_contents (filename, &contents, &length, &error)) {\n  625 |                 g_debug (\"Read in credential cache: %s\", filename);\n  626 |             } else {\n  627 |                 g_warning (\"Couldn't read credential cache: %s: %s\", filename, error->message);\n  628 |             }\n  629 | \n  630 |             g_task_return_pointer (task, g_bytes_new_take (contents, length), (GDestroyNotify) g_bytes_unref);\n  631 |         }\n  632 |         break;","lines":28,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/users/cc-realm-manager.c#L605-632"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Both sort_func (bg-recent-source.c) and file_sort_func compute modified_b - modified_a where both operands are guint64, then implicitly truncate/return the result as a plain int. Because the subtraction is unsigned, when modified_a > modified_b the result wraps around to a huge value before truncation, which can produce an incorrect (even non-transitive) sort order for the 'recent backgrounds' list instead of a simple sign-correct comparison.","fix":"Use explicit comparison instead of subtraction, e.g. return (modified_b > modified_a) - (modified_b < modified_a);","locations":[{"ref":"panels/background/bg-recent-source.c:42-59","code":"   42 | static int\n   43 | sort_func (gconstpointer a, gconstpointer b, gpointer user_data)\n   44 | {\n   45 |     CcBackgroundItem *item_a;\n   46 |     CcBackgroundItem *item_b;\n   47 |     guint64 modified_a;\n   48 |     guint64 modified_b;\n   49 |     int retval;\n   50 | \n   51 |     item_a = (CcBackgroundItem *) a;\n   52 |     item_b = (CcBackgroundItem *) b;\n   53 |     modified_a = cc_background_item_get_modified (item_a);\n   54 |     modified_b = cc_background_item_get_modified (item_b);\n   55 | \n   56 |     retval = modified_b - modified_a;\n   57 | \n   58 |     return retval;\n   59 | }","lines":18,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/background/bg-recent-source.c#L42-59"},{"ref":"panels/background/bg-recent-source.c:164-175","code":"  164 | static int\n  165 | file_sort_func (gconstpointer a, gconstpointer b)\n  166 | {\n  167 |     GFileInfo *file_a = G_FILE_INFO (a);\n  168 |     GFileInfo *file_b = G_FILE_INFO (b);\n  169 |     guint64 modified_a, modified_b;\n  170 | \n  171 |     modified_a = g_file_info_get_attribute_uint64 (file_a, G_FILE_ATTRIBUTE_TIME_MODIFIED);\n  172 |     modified_b = g_file_info_get_attribute_uint64 (file_b, G_FILE_ATTRIBUTE_TIME_MODIFIED);\n  173 | \n  174 |     return modified_b - modified_a;\n  175 | }","lines":12,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/background/bg-recent-source.c#L164-175"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_profile_prefix_and_kind() leaves the local variable `kind` uninitialized if neither the EDID, STANDARD, nor TEST metadata-source branches match (e.g. unknown/missing CD_PROFILE_METADATA_DATA_SOURCE). When kind_out is non-NULL, *kind_out is set to this uninitialized value and used by the caller, producing undefined behavior.","fix":"Initialize `guint kind = 0;` at declaration so the fallback case has a defined value.","locations":[{"ref":"panels/color/cc-color-panel.c:122-155","code":"  122 | static const char *\n  123 | get_profile_prefix_and_kind (CdProfile *profile, guint *kind_out)\n  124 | {\n  125 |     const char *prefix = NULL;\n  126 |     const char *id;\n  127 |     guint kind;\n  128 | \n  129 |     id = cd_profile_get_metadata_item (profile, CD_PROFILE_METADATA_DATA_SOURCE);\n  130 |     if (g_strcmp0 (id, CD_PROFILE_METADATA_DATA_SOURCE_EDID) == 0) {\n  131 |         /* TRANSLATORS: this is a profile prefix to signify the\n  132 |          * profile has been auto-generated for this hardware */\n  133 |         prefix = _(\"Default: \");\n  134 |         kind = 1;\n  135 |     }\n  136 | #if CD_CHECK_VERSION(0, 1, 14)\n  137 |     if (g_strcmp0 (id, CD_PROFILE_METADATA_DATA_SOURCE_STANDARD) == 0) {\n  138 |         /* TRANSLATORS: this is a profile prefix to signify the\n  139 |          * profile his a standard space like AdobeRGB */\n  140 |         prefix = _(\"Colorspace: \");\n  141 |         kind = 2;\n  142 |     }\n  143 |     if (g_strcmp0 (id, CD_PROFILE_METADATA_DATA_SOURCE_TEST) == 0) {\n  144 |         /* TRANSLATORS: this is a profile prefix to signify the\n  145 |          * profile is a test profile */\n  146 |         prefix = _(\"Test profile: \");\n  147 |         kind = 3;\n  148 |     }\n  149 | #endif\n  150 | \n  151 |     if (kind_out)\n  152 |         *kind_out = kind;\n  153 | \n  154 |     return prefix;\n  155 | }","lines":34,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/color/cc-color-panel.c#L122-155"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"cc_bolt_page_add_device is declared to return CcBoltDeviceEntry * but the early-return path for non-peripheral devices returns FALSE (an integer 0) instead of NULL. This compiles and is functionally equivalent to NULL, but it is a type-incorrect return that also leaves the passed-in dev reference unhandled on that path.","fix":"Return NULL instead of FALSE, and ensure dev is unreffed/handled consistently on this early-return path.","locations":[{"ref":"panels/privacy/bolt/cc-bolt-page.c:294-329","code":"  294 | static CcBoltDeviceEntry *\n  295 | cc_bolt_page_add_device (CcBoltPage *self, BoltDevice *dev)\n  296 | {\n  297 |     CcBoltDeviceEntry *entry;\n  298 |     BoltDeviceType type;\n  299 |     BoltStatus status;\n  300 |     const char *path;\n  301 | \n  302 |     type = bolt_device_get_device_type (dev);\n  303 | \n  304 |     if (type != BOLT_DEVICE_PERIPHERAL)\n  305 |         return FALSE;\n  306 | \n  307 |     entry = cc_bolt_device_entry_new (dev, FALSE);\n  308 |     path = g_dbus_proxy_get_object_path (G_DBUS_PROXY (dev));\n  309 | \n  310 |     /* add to the list box */\n  311 |     status = bolt_device_get_status (dev);\n  312 | \n  313 |     if (bolt_status_is_pending (status)) {\n  314 |         gtk_list_box_append (self->pending_list, GTK_WIDGET (entry));\n  315 |         gtk_widget_set_visible (GTK_WIDGET (self->pending_list), TRUE);\n  316 |         gtk_widget_set_visible (GTK_WIDGET (self->pending_box), TRUE);\n  317 |     } else {\n  318 |         gtk_list_box_append (self->devices_list, GTK_WIDGET (entry));\n  319 |         gtk_widget_set_visible (GTK_WIDGET (self->devices_list), TRUE);\n  320 |         gtk_widget_set_visible (GTK_WIDGET (self->devices_box), TRUE);\n  321 |     }\n  322 | \n  323 |     g_signal_connect_object (entry, \"status-changed\", G_CALLBACK (on_device_entry_status_changed_cb), self, 0);\n  324 | \n  325 |     gtk_stack_set_visible_child_name (self->devices_stack, \"have-devices\");\n  326 |     g_hash_table_insert (self->devices, (gpointer) path, entry);\n  327 | \n  328 |     return entry;\n  329 | }","lines":36,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/privacy/bolt/cc-bolt-page.c#L294-329"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In load_credentials(), if the keyring lookup for the username fails (returns NULL) AND getpwuid(getuid()) also fails (returns NULL, e.g. user removed from NSS or sandboxed/unusual environment), `username` remains NULL but is passed unconditionally to gtk_editable_set_text(GTK_EDITABLE(self->username_entry), username) at line 376. gtk_editable_set_text's `text` parameter is documented non-nullable, so this hands GTK a NULL string. Separately, on the normal success path the function calls gtk_editable_set_text for the username twice (once at line 364 inside the success branch, again unconditionally at line 376), which is redundant but harmless.","fix":"Guard the final gtk_editable_set_text call: `if (username != NULL) gtk_editable_set_text (GTK_EDITABLE (self->username_entry), username);` and remove the now-redundant duplicate call at line 364.","locations":[{"ref":"panels/system/remote-desktop/cc-desktop-sharing-page.c:355-383","code":"  355 | static void\n  356 | load_credentials (CcDesktopSharingPage *self)\n  357 | {\n  358 |     g_autofree gchar *username = NULL;\n  359 |     g_autofree gchar *password = NULL;\n  360 | \n  361 |     username = cc_grd_lookup_rdp_username (self->cancellable);\n  362 |     password = cc_grd_lookup_rdp_password (self->cancellable);\n  363 |     if (username != NULL)\n  364 |         gtk_editable_set_text (GTK_EDITABLE (self->username_entry), username);\n  365 |     if (password != NULL)\n  366 |         gtk_editable_set_text (GTK_EDITABLE (self->password_entry), password);\n  367 | \n  368 |     /* No credentials available. Let's create them. */\n  369 |     if (username == NULL) {\n  370 |         struct passwd *pw = getpwuid (getuid ());\n  371 |         if (pw != NULL)\n  372 |             username = g_strdup (pw->pw_name);\n  373 |         else\n  374 |             g_warning (\"Failed to get username: %s\", g_strerror (errno));\n  375 |     }\n  376 |     gtk_editable_set_text (GTK_EDITABLE (self->username_entry), username);\n  377 | \n  378 |     if (password == NULL) {\n  379 |         g_autofree gchar *pw = cc_generate_password ();\n  380 |         if (pw != NULL)\n  381 |             gtk_editable_set_text (GTK_EDITABLE (self->password_entry), pw);\n  382 |     }\n  383 | }","lines":29,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/remote-desktop/cc-desktop-sharing-page.c#L355-383"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"configure_screen_reader_activated_cb() calls g_dbus_proxy_call(self->proxy, \"ShowPreferences\", ...) without checking whether self->proxy is NULL. self->proxy is only set asynchronously once on_orca_proxy_ready() completes; if the user activates configure_screen_reader_row before the proxy creation finishes (or after it failed, if the row's visibility hasn't been updated yet), this calls g_dbus_proxy_call with a NULL proxy, which is invalid API usage (g_return_if_fail will reject it, silently doing nothing, but signals a logic gap).","fix":"Add a NULL check at the top of configure_screen_reader_activated_cb (if (self->proxy == NULL) return;) to avoid relying solely on the row's visibility state.","locations":[{"ref":"panels/universal-access/cc-ua-seeing-page.c:254-261","code":"  254 | static void\n  255 | configure_screen_reader_activated_cb (CcUaSeeingPage *self)\n  256 | {\n  257 |     g_assert (CC_IS_UA_SEEING_PAGE (self));\n  258 | \n  259 |     g_dbus_proxy_call (self->proxy, \"ShowPreferences\", NULL, G_DBUS_CALL_FLAGS_NONE, -1, NULL, orca_show_preferences_cb,\n  260 |                        NULL);\n  261 | }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/universal-access/cc-ua-seeing-page.c#L254-261"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"cc_wacom_device_get_button_settings() bounds-checks with `if (button > cc_wacom_device_get_num_buttons (device)) return NULL;`, which is an off-by-one: valid button indices are 0..num_buttons-1, so the check should reject button >= num_buttons. As written, a caller passing button == num_buttons would pass the check and build a settings path for a button index one past the last real button. The current single caller in cc-wacom-page.c happens to always pass i < n_buttons, so this is not currently triggered, but the function's own contract is wrong and unsafe for any future or external caller.","fix":"Change the condition to `if (button >= cc_wacom_device_get_num_buttons (device)) return NULL;`.","locations":[{"ref":"panels/wacom/cc-wacom-device.c:406-407","code":"  406 |     if (button > cc_wacom_device_get_num_buttons (device))\n  407 |         return NULL;","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wacom/cc-wacom-device.c#L406-407"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"check_remove_pad() unconditionally calls cc_wacom_device_get_device (page->pad) before checking whether page->pad is non-NULL. Since a CcWacomPage commonly has no associated pad (page->pad == NULL) until/unless a matching pad device is added, every device-removed signal for any unrelated pad-type device triggers a CC_IS_WACOM_DEVICE(NULL) g_return_val_if_fail critical warning.","fix":"Add an early `if (!page->pad) return;` guard before calling cc_wacom_device_get_device (page->pad), e.g. `if (!page->pad || cc_wacom_device_get_device (page->pad) != gsd_device) return;`.","locations":[{"ref":"panels/wacom/cc-wacom-page.c:707-717","code":"  707 | static void\n  708 | check_remove_pad (CcWacomPage *page, GsdDevice *gsd_device)\n  709 | {\n  710 |     if ((gsd_device_get_device_type (gsd_device) & GSD_DEVICE_TYPE_PAD) == 0)\n  711 |         return;\n  712 | \n  713 |     if (cc_wacom_device_get_device (page->pad) == gsd_device) {\n  714 |         g_clear_object (&page->pad);\n  715 |         update_pad_availability (page);\n  716 |     }\n  717 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wacom/cc-wacom-page.c#L707-717"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In run_operation_from_params(), g_variant_get_string (v, NULL) is called to read device_name before g_variant_is_of_type (v, G_VARIANT_TYPE_STRING) validates that v actually is a string variant. If a caller (e.g. a malformed command-line activation request) supplies a non-string variant as the last parameter, g_variant_get_string is invoked on the wrong type before the type check that is supposed to guard against exactly this, triggering a GLib type-check critical from the wrong call site instead of the intended graceful warning-and-return path.","fix":"Move the g_variant_is_of_type() check before the g_variant_get_string() call so invalid types are rejected before being dereferenced as strings.","locations":[{"ref":"panels/wacom/cc-wacom-panel.c:186-193","code":"  186 |     g_variant_get_child (parameters, n_params - 1, \"v\", &v);\n  187 |     device_name = g_variant_get_string (v, NULL);\n  188 | \n  189 |     if (!g_variant_is_of_type (v, G_VARIANT_TYPE_STRING)) {\n  190 |         g_warning (\"Wrong type for the second argument GVariant, expected 's' but got '%s'\",\n  191 |                    g_variant_get_type_string (v));\n  192 |         return;\n  193 |     }","lines":8,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wacom/cc-wacom-panel.c#L186-193"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"cc_shell_model_iter_matches_search matches name and description with strstr (substring match anywhere in the string), but matches keywords with strstr (keywords[i], term) == keywords[i] (prefix match only at the start of the keyword string). This makes keyword-based search inconsistent with name/description search: a search term that appears in the middle of a keyword will not match, even though the same term appearing in the middle of the name or description would match.","fix":"Use strstr (keywords[i], term) != NULL for keyword matching too, for consistent substring search behavior across all three fields.","locations":[{"ref":"shell/cc-shell-model.c:292-316","code":"  292 | gboolean\n  293 | cc_shell_model_iter_matches_search (CcShellModel *model, GtkTreeIter *iter, const char *term)\n  294 | {\n  295 |     g_autofree gchar *name = NULL;\n  296 |     g_autofree gchar *description = NULL;\n  297 |     gboolean result;\n  298 |     g_auto(GStrv) keywords = NULL;\n  299 | \n  300 |     gtk_tree_model_get (GTK_TREE_MODEL (model), iter, COL_CASEFOLDED_NAME, &name, COL_CASEFOLDED_DESCRIPTION,\n  301 |                         &description, COL_KEYWORDS, &keywords, -1);\n  302 | \n  303 |     result = (strstr (name, term) != NULL);\n  304 | \n  305 |     if (!result && description)\n  306 |         result = (strstr (description, term) != NULL);\n  307 | \n  308 |     if (!result && keywords) {\n  309 |         gint i;\n  310 | \n  311 |         for (i = 0; !result && keywords[i]; i++)\n  312 |             result = (strstr (keywords[i], term) == keywords[i]);\n  313 |     }\n  314 | \n  315 |     return result;\n  316 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/shell/cc-shell-model.c#L292-316"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"set_wallpaper_allowed and set_screenshot_allowed call set_portal_permissions() with self->current_app_id, while every sibling setter (background, notification, device, location) and all getters use self->current_portal_app_id. This writes the permission under the wrong portal-store key (the bundle/exec ID instead of the portal app ID), so the toggle silently fails to take effect for flatpak/snap apps whose two IDs differ.","fix":"Change both setters to use self->current_portal_app_id, matching set_background_allowed, set_notification_allowed, set_device_allowed and set_location_allowed.","locations":[{"ref":"panels/applications/cc-applications-panel.c:504-529","code":"  504 |     set_portal_permissions (self, \"wallpaper\", \"wallpaper\", self->current_app_id, perms);\n  505 | }\n  5 3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"In gcm_calibrate_get_tooltip_text-equivalent logic, the device-kind check duplicates CD_DEVICE_KIND_DISPLAY in both the if and else-if branches (lines 183 and 185), so the printer threshold branch (GCM_SETTINGS_RECALIBRATE_PRINTER_THRESHOLD) is dead code and unreachable for any device kind.","fix":"Change the second comparison to CD_DEVICE_KIND_PRINTER (or the appropriate non-display kind) so the printer threshold branch is reachable.","locations":[{"ref":"panels/color/cc-color-profile.c:183-187","code":"  183 |     if (cd_device_get_kind (self->device) == CD_DEVICE_KIND_DISPLAY) {\n  184 |         g_settings_get (self->settings, GCM_SETTINGS_RECALIBRATE_DISPLAY_THRESHOLD, \"u\", &threshold_days);\n  185 |     } else if (cd_device_get_kind (self->device) == CD_DEVICE_KIND_DISPLAY) {\n  186 |         g_settings_get (self->settings, GCM_SETTINGS_RECALIBRATE_PRINTER_THRESHOLD, \"u\", &threshold_days);\n  187 |     }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/color/cc-color-profile.c#L183-187"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"pp_new_printer_dialog_get_new_printer sets both the 'ppd-name' and 'ppd-file-name' GObject properties to the same value (pp_print_device_get_device_ppd (self->new_device)). printer_add_real_async in pp-new-printer.c always prefers ppd_name when both are set, so ppd-file-name is dead weight here, never actually used as a file path in this flow. Functionally harmless but confusing and likely an unintentional duplication.","fix":"Set 'ppd-file-name' to the actual PPD file path (if available) or omit it entirely if not applicable, rather than duplicating the ppd-name value.","locations":[{"ref":"panels/printers/pp-new-printer-dialog.c:1571-1590","code":" 1571 | PpNewPrinter *\n 1572 | pp_new_printer_dialog ale);\n  376 |     gtk_widget_class_bind_template_child (widget_class, CcUaZoomPage, crosshair_length_scale);","lines":2,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/universal-access/cc-ua-zoom-page.c#L375-376"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"renew_subscription_thread returns early when the operation is cancelled (checked via g_cancellable_is_cancelled) without ever calling g_task_return_boolean/g_task_return_error. A GTask that is never completed leaks its callback and leaves the caller's GAsyncReadyCallback permanently unfired.","fix":"Call g_task_return_error with a G_IO_ERROR_CANCELLED error (or g_task_return_boolean(task, FALSE)) before returning on the cancellation path.","locations":[{"ref":"panels/printers/pp-cups.c:183-235","code":"  183 | static void\n  184 | renew_subscription_thread (GTask *task, gpointer source_object, gpointer task_data, GCancellable *cancellable)\n  185 | {\n  186 |     ipp_attribute_t *attr = NULL;\n  187 |     CRSData *subscription_data = task_data;\n  188 |     ipp_t *request;\n  189 |     ipp_t *response = NULL;\n  190 |     gint result = -1;\n  191 | \n  192 |     if (g_cancellable_is_cancelled (cancellable))\n  193 |         return;\n  194 | \n  195 |     if (subscription_data->id > 0) {\n  196 |         request = ippNewRequest (IPP_RENEW_SUBSCRIPTION);\n  197 |         ippAddString (request, IPP_TAG_OPERATION, IPP_TAG_URI, \"printer-uri\", NULL, \"/\");\n  198 |         ippAddString (request, IPP_TAG_OPERATION, IPP_TAG_NAME, \"requesting-user-name\", NULL, cupsUser ());\n  199 |         ippAddInteger (request, IPP_TAG_OPERATION, IPP_TAG_INTEGER, \"notify-subscription-id\", subscription_data->id);\n  200 |         ippAddInteger (request, IPP_TAG_SUBSCRIPTION, IPP_TAG_INTEGER, \"notify-lease-duration\",\n  201 |                        subscription_data->lease_duration);\n  202 |         response = cupsDoRequest (CUPS_HTTP_DEFAULT, request, \"/\");\n  203 |         if (response != NULL && ippGetStatusCode (response) <= IPP_OK_CONFLICT) {\n  204 |             if ((attr = ippFindAttribute (response, \"notify-lease-duration\", IPP_TAG_INTEGER)) == NULL)\n  205 |                 g_debug (\"No notify-lease-duration in response!\\n\");\n  206 |             else if (ippGetInteger (attr, 0) == subscription_data->lease_duration)\n  207 |                 result = subscription_data->id;\n  208 |         }\n  209 |     }\n  210 | \n  211 |     if (result < 0) {\n  212 |         request = ippNewRequest (IPP_CREATE_PRINTER_SUBSCRIPTION);\n  213 |         ippAddString (request, IPP_TAG_OPERATION, IPP_TAG_URI, \"printer-uri\", NULL, \"/\");\n  214 |         ippAddString (request, IPP_TAG_OPERATION, IPP_TAG_NAME, \"requesting-user-name\", NULL, cupsUser ());\n  215 |         ippAddStrings (request, IPP_TAG_SUBSCRIPTION, IPP_TAG_KEYWORD, \"notify-events\",\n  216 |                        g_strv_length (subscription_data->events), NULL,\n  217 |                        (const char *const *) subscription_data->events);\n  218 |         ippAddString (request, IPP_TAG_SUBSCRIPTION, IPP_TAG_KEYWORD, \"notify-pull-method\", NULL, \"ippget\");\n  219 |         ippAddString (request, IPP_TAG_SUBSCRIPTION, IPP_TAG_URI, \"notify-recipient-uri\", NULL, \"dbus://\");\n  220 |         ippAddInteger (request, IPP_TAG_SUBSCRIPTION, IPP_TAG_INTEGER, \"notify-lease-duration\",\n  221 |                        subscription_data->lease_duration);\n  222 |         response = cupsDoRequest (CUPS_HTTP_DEFAULT, request, \"/\");\n  223 | \n  224 |         if (response != NULL && ippGetStatusCode (response) <= IPP_OK_CONFLICT) {\n  225 |             if ((attr = ippFindAttribute (response, \"notify-subscription-id\", IPP_TAG_INTEGER)) == NULL)\n  226 |                 g_debug (\"No notify-subscription-id in response!\\n\");\n  227 |             else\n  228 |                 result = ippGetInteger (attr, 0);\n  229 |         }\n  230 |     }\n  231 | \n  232 |     ippDelete (response);\n  233 | \n  234 |     g_task_return_int (task, result);\n  235 | }","lines":53,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-cups.c#L183-235"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"ppd_file_select_response_cb passes NULL instead of &error to gtk_file_dialog_open_finish, so the subsequent error-handling code that inspects 'error' is dead, and the result of gtk_file_dialog_open_finish (file) is used without checking for NULL, risking a NULL dereference if the dialog is cancelled or fails.","fix":"Pass &error to gtk_file_dialog_open_finish, check it for failure/cancellation, and verify file is non-NULL before dereferencing it.","locations":[{"ref":"panels/printers/pp-details-dialog.c:191-212","code":"  191 | static void\n  192 | ppd_file_select_response_cb (GObject *source, GAsyncResult *result, gpointer user_data)\n  193 | {\n  194 |     PpDetailsDialog *self = PP_DETAILS_DIALOG (user_data);\n  195 |     GtkFileDialog *dialog = GTK_FILE_DIALOG (source);\n  196 |     g_autoptr(GFile) file = NULL;\n  197 |     g_autoptr(GError) error = NULL;\n  198 |     g_autofree gchar *ppd_filename = NULL;\n  199 | \n  200 |     file = gtk_file_dialog_open_finish (dialog, result, NULL);\n  201 |     if (error != NULL) {\n  202 |         g_warning (\"Failed to select ppd file: %s\", error->message);\n  203 |         return;\n  204 |     }\n  205 | \n  206 |     ppd_filename = g_file_get_path (file);\n  207 |     if (self->printer_name && ppd_filename) {\n  208 |         g_set_str (&self->ppd_file_name, ppd_filename);\n  209 | \n  210 |         printer_set_ppd_file_async (self->printer_name, ppd_filename, self->cancellable, set_ppd_cb, self);\n  211 |     }\n  212 | }","lines":22,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-details-dialog.c#L191-212"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In cc_remote_login_page_init(), if polkit_permission_new_sync() fails, self->permission is NULL (error is logged but execution continues). sync_permissions(self) is then called and g_signal_connect_swapped(self->permission, \"notify::allowed\", ...) is invoked with a NULL GObject instance, which silently fails to connect (g_signal_connect on NULL instance triggers a critical warning and does nothing). The remote-login permission UI is left non-functional with no user-visible error and no retry path.","fix":"After the NULL/error check, either return early and disable the whole permission-dependent UI section, or skip the g_signal_connect_swapped call when self->permission is NULL, and surface a visible error state to the user (e.g. via cc_permission_infobar).","locations":[{"ref":"panels/system/remote-desktop/cc-remote-login-page.c:601-638","code":"  601 | static void\n  602 | cc_remote_login_page_init (CcRemoteLoginPage *self)\n  603 | {\n  604 |     g_autoptr(GtkCssProvider) provider = NULL;\n  605 |     g_autoptr(GVariant) credentials = NULL;\n  606 |     g_autoptr(GError) error = NULL;\n  607 |     g_autofree gchar *hostname = NULL;\n  608 | \n  609 |     gtk_widget_init_template (GTK_WIDGET (self));\n  610 | \n  611 |     self->cancellable = g_cancellable_new ();\n  612 | \n  613 |     hostname = cc_hostname_get_static_hostname (cc_hostname_get_default ());\n  614 |     adw_action_row_set_subtitle (self->hostname_row, hostname);\n  615 | \n  616 |     g_signal_connect_swapped (self->username_entry, \"notify::text\", G_CALLBACK (on_credentials_changed), self);\n  617 |     g_signal_connect_swapped (self->password_entry, \"notify::text\", G_CALLBACK (on_credentials_changed), self);\n  618 | \n  619 |     g_signal_connect_object (self->remote_login_row, \"notify::active\", G_CALLBACK (on_remote_login_active_changed),\n  620 |                              self, G_CONNECT_SWAPPED);\n  621 | \n  622 |     self->permission =\n  623 |         (GPermission *) polkit_permission_new_sync (REMOTE_LOGIN_PERMISSION, NULL, self->cancellable, &error);\n  624 | \n  625 |     if (error != NULL) {\n  626 |         g_warning (\"Cannot create '%s' permission: %s\", REMOTE_LOGIN_PERMISSION, error->message);\n  627 |         g_clear_error (&error);\n  628 |     }\n  629 | \n  630 |     sync_permissions (self);\n  631 |     g_signal_connect_swapped (self->permission, \"notify::allowed\", G_CALLBACK (sync_permissions), self);\n  632 | \n  633 |     g_object_bind_property (self->password_entry, \"sensitive\", self->generate_password_button_row, \"sensitive\",\n  634 |                             G_BINDING_SYNC_CREATE);\n  635 |     cc_permission_infobar_set_permission (self->permission_infobar, self->permission);\n  636 | \n  637 |     connect_to_remote_desktop_configuration_rdp_server (self);\n  638 | }","lines":38,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/system/remote-desktop/cc-remote-login-page.c#L601-638"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"on_properties_bus_done_cb extracts the HostSecurityId property from a D-Bus Properties.Get reply using g_variant_get_data (val), which returns the raw serialized bytes of the whole reply tuple, not a NUL-terminated string unwrapped from the (v) variant box. The sibling function fwupd_get_property in cc-firmware-security-dialog.c correctly unwraps the same kind of reply with g_variant_get (variant, \"(v)\", &inner) followed by g_variant_get_string (inner, NULL), confirming this is the correct pattern and that cc-firmware-security-page.c's approach is wrong. In practice hsi_str here is not a valid C string from the GVariant API contract, so the HSI number parsing in this function is unreliable / relies on undefined memory layout.","fix":"Unwrap val the same way fwupd_get_property does: g_variant_get (val, \"(v)\", &inner); then read the string with g_variant_get_string (inner, NULL) instead of g_variant_get_data (val).","locations":[{"ref":"panels/privacy/firmware-security/cc-firmware-security-page.c:480-501","code":"  480 | on_properties_bus_done_cb (GObject *source, GAsyncResult *res, gpointer user_data)\n  481 | {\n  482 |     g_autoptr(GError) error = NULL;\n  483 |     g_autoptr(GVariant) val = NULL;\n  484 |     const gchar *hsi_str = NULL;\n  485 |     CcFirmwareSecurityPage *self = CC_FIRMWARE_SECURITY_PAGE (user_data);\n  486 | \n  487 |     val = g_dbus_proxy_call_finish (G_DBUS_PROXY (source), res, &error);\n  488 |     if (val == NULL) {\n  489 |         g_warning (\"failed to get HSI number\");\n  490 |         return;\n  491 |     }\n  492 | \n  493 |     /* parse value */\n  494 |     hsi_str = g_variant_get_data (val);\n  495 |     if (hsi_str != NULL && g_str_has_prefix (hsi_str, \"HSI:INVALID\")) {\n  496 |         self->hsi_number = G_MAXUINT;\n  497 |     } else if (hsi_str != NULL && g_str_has_prefix (hsi_str, \"HSI:\")) {\n  498 |         self->hsi_number = g_ascii_strtoll (hsi_str + 4, NULL, 10);\n  499 |     }\n  500 |     set_hsi_button_view (self);\n  501 | }","lines":22,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/privacy/firmware-security/cc-firmware-security-page.c#L480-501"},{"ref":"panels/privacy/firmware-security/cc-firmware-security-dialog.c:172-197","code":"  172 | static gchar *\n  173 | fwupd_get_property (const char *property_name)\n  174 | {\n  175 |     g_autoptr(GDBusConnection) connection = NULL;\n  176 |     g_autoptr(GError) error = NULL;\n  177 |     g_autoptr(GVariant) inner = NULL;\n  178 |     g_autoptr(GVariant) variant = NULL;\n  179 |     const gchar *ret_property;\n  180 | \n  181 |     connection = g_bus_get_sync (G_BUS_TYPE_SYSTEM, NULL, &error);\n  182 |     if (!connection) {\n  183 |         g_warning (\"system bus not available: %s\", error->message);\n  184 |         return NULL;\n  185 |     }\n  186 |     variant = g_dbus_connection_call_sync (connection, \"org.freedesktop.fwupd\", \"/\", \"org.freedesktop.DBus.Properties\",\n  187 |                                            \"Get\", g_variant_new (\"(ss)\", \"org.freedesktop.fwupd\", property_name), NULL,\n  188 |                                            G_DBUS_CALL_FLAGS_NONE, -1, NULL, &error);\n  189 |     if (!variant) {\n  190 |         g_warning (\"Cannot get org.freedesktop.fwupd: %s\", error->message);\n  191 |         return NULL;\n  192 |     }\n  193 |     g_variant_get (variant, \"(v)\", &inner);\n  194 |     ret_property = g_variant_get_string (inner, NULL);\n  195 | \n  196 |     return g_strdup (ret_property);\n  197 | }","lines":26,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/privacy/firmware-security/cc-firmware-security-dialog.c#L172-197"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"cc_permission_infobar_set_permission() stores the caller-supplied GPermission directly into self->permission without calling g_object_ref(). The header declares no transfer-ownership annotation, and cc_permission_infobar_dispose() never clears/unrefs self->permission. If the caller does not keep its own reference alive for the lifetime of the infobar, self->permission becomes a dangling pointer that is still used via the signal connected at line 155 and dereferenced in on_permission_changed(); if the caller does keep it alive, the struct still violates normal GObject ownership conventions and is fragile to future caller changes.","fix":"Take a reference when storing the permission (`self->permission = g_object_ref (permission);`) and add `g_clear_object (&self->permission);` to cc_permission_infobar_dispose(), or clearly document transfer-none semantics and g_signal_connect with a weak-ref guard if the field is meant to be a borrowed pointer.","locations":[{"ref":"panels/common/cc-permission-infobar.c:143-157","code":"  143 | void\n  144 | cc_permission_infobar_set_permission (CcPermissionInfobar *self, GPermission *permission)\n  145 | {\n  146 |     g_return_if_fail (CC_IS_PERMISSION_INFOBAR (self));\n  147 | \n  148 |     if (permission == NULL) {\n  149 |         g_warning (\"Missing GPermission object\");\n  150 |         return;\n  151 |     }\n  152 | \n  153 |     self->permission = permission;\n  154 | \n  155 |     g_signal_connect_object (permission, \"notify\", G_CALLBACK (on_permission_changed), self, G_CONNECT_SWAPPED);\n  156 |     on_permission_changed (self);\n  157 | }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/common/cc-permission-infobar.c#L143-157"},{"ref":"panels/common/cc-permission-infobar.c:108-120","code":"  108 | static void\n  109 | cc_permission_infobar_dispose (GObject *object)\n  110 | {\n  111 |     CcPermissionInfobar *self = CC_PERMISSION_INFOBAR (object);\n  112 | \n  113 |     if (self->cancellable != NULL) {\n  114 |         g_cancellable_cancel (self->cancellable);\n  115 |     }\n  116 | \n  117 |     g_clear_object (&self->cancellable);\n  118 | \n  119 |     G_OBJECT_CLASS (cc_permission_infobar_parent_class)->dispose (object);\n  120 | }","lines":13,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/common/cc-permission-infobar.c#L108-120"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"cc_app_notifications_page_new unconditionally does self->perm_store = g_object_ref(perm_store). The caller, select_app() in cc-notifications-panel.c, passes self->perm_store from CcNotificationsPanel, which is NULL until the asynchronous on_perm_store_ready D-Bus callback completes (it is set only inside that callback). If the user opens an app's notification subpage before the portal proxy finishes connecting, perm_store is NULL and g_object_ref(NULL) is called, which is not NULL-safe in GLib and triggers a critical assertion warning (G_IS_OBJECT (object) failed).","fix":"Use g_set_object (&self->perm_store, perm_store) or guard with `if (perm_store) self->perm_store = g_object_ref (perm_store);` to tolerate a NULL perm_store at construction time, consistent with the existing `if (self->perm_store == NULL)` guard later in set_portal_permissions_for_app.","locations":[{"ref":"panels/notifications/cc-app-notifications-page.c:275-297","code":"  275 | CcAppNotificationsPage *\n  276 | cc_app_notifications_page_new (const gchar *app_id, const gchar *title, GSettings *settings, GSettings *master_settings,\n  277 |                                GDBusProxy *perm_store)\n  278 | {\n  279 |     CcAppNotificationsPage *self;\n  280 | \n  281 |     self = g_object_new (CC_TYPE_APP_NOTIFICATIONS_PAGE, NULL);\n  282 | \n  283 |     adw_navigation_page_set_title (ADW_NAVIGATION_PAGE (self), title);\n  284 |     self->settings = g_object_ref (settings);\n  285 |     self->master_settings = g_object_ref (master_settings);\n  286 |     self->app_id = g_strdup (app_id);\n  287 |     self->perm_store = g_object_ref (perm_store);\n  288 | \n  289 |     g_settings_bind (self->settings, \"enable\", self->notifications_row, \"active\", G_SETTINGS_BIND_DEFAULT);\n  290 |     g_settings_bind (self->settings, \"enable-sound-alerts\", self->sound_alerts_row, \"active\", G_SETTINGS_BIND_DEFAULT);\n  291 | \n  292 |     update_switches (self);\n  293 |     self->notifications_page_change_signal_handler_id =\n  294 |         g_signal_connect (self->settings, \"changed\", G_CALLBACK (on_app_notification_settings_changed), self);\n  295 | \n  296 |     return self;\n  297 | }","lines":23,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/notifications/cc-app-notifications-page.c#L275-297"},{"ref":"panels/notifications/cc-notifications-panel.c:96-111","code":"   96 | static void\n   97 | on_perm_store_ready (GObject *source_object, GAsyncResult *res, gpointer user_data)\n   98 | {\n   99 |     CcNotificationsPanel *self;\n  100 |     GDBusProxy *proxy;\n  101 |     g_autoptr(GError) error = NULL;\n  102 | \n  103 |     proxy = g_dbus_proxy_new_for_bus_finish (res, &error);\n  104 |     if (proxy == NULL) {\n  105 |         if (!g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED))\n  106 |             g_warning (\"Failed to connect to xdg-app permission store: %s\", error->message);\n  107 |         return;\n  108 |     }\n  109 |     self = user_data;\n  110 |     self->perm_store = proxy;\n  111 | }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/notifications/cc-notifications-panel.c#L96-111"},{"ref":"panels/notifications/cc-notifications-panel.c:414-429","code":"  414 | select_app (CcNotificationsPanel *self, GtkListBoxRow *row)\n  415 | {\n  416 |     Application *app;\n  417 |     g_autofree gchar *app_id = NULL;\n  418 |     CcAppNotificationsPage *page;\n  419 | \n  420 |     app = g_object_get_qdata (G_OBJECT (row), application_quark ());\n  421 | \n  422 |     app_id = g_strdup (g_app_info_get_id (app->app_info));\n  423 |     if (g_str_has_suffix (app_id, \".desktop\"))\n  424 |         app_id[strlen (app_id) - strlen (\".desktop\")] = '\\0';\n  425 | \n  426 |     page = cc_app_notifications_page_new (app_id, g_app_info_get_name (app->app_info), app->settings,\n  427 |                                           self->master_settings, self->perm_store);\n  428 |     cc_panel_push_subpage (CC_PANEL (self), ADW_NAVIGATION_PAGE (page));\n  429 | }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/notifications/cc-notifications-panel.c#L414-429"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"cc_input_chooser_get_source() is declared to return CcInputSource * but one early-return path returns `FALSE` (i.e. integer 0) instead of NULL. This is harmless at runtime since FALSE == 0 == NULL, but is a type-mismatch that a compiler with stricter warnings would flag, and is inconsistent with the rest of the function's NULL returns.","fix":"Change `return FALSE;` to `return NULL;` to match the declared CcInputSource * return type.","locations":[{"ref":"panels/keyboard/cc-input-chooser.c:1072","code":" 1072 |         return FALSE;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/keyboard/cc-input-chooser.c#L1072"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"add_shortcuts() looks up `keys = g_hash_table_lookup(get_hash_for_group(self, group), id)` and immediately dereferences `keys->len` with no NULL check, unlike the defensive style used elsewhere in the file. While append_section() currently keeps the GtkListStore and hash table in sync so a miss should not occur in practice, this is fragile: any future code path that adds a section row without a matching hash table entry will crash here.","fix":"Add a NULL check after the g_hash_table_lookup call (e.g. `if (!keys) { can_continue = ...; continue; }`) before dereferencing keys->len.","locations":[{"ref":"panels/keyboard/cc-keyboard-manager.c:232-234","code":"  232 |         keys = g_hash_table_lookup (get_hash_for_group (self, group), id);\n  233 | \n  234 |         for (i = 0; i < keys->len; i++) {","lines":3,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/keyboard/cc-keyboard-manager.c#L232-234"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"pp_new_printer_add_async stores g_object_ref (cancellable) without checking cancellable for NULL first; g_object_ref(NULL) is undefined per GLib contract. Currently the single call site in cc-printers-panel.c always passes a non-NULL cancellable, so this is not presently reachable, but the public API itself is fragile to future callers.","fix":"Use g_set_object or check cancellable != NULL before taking a reference, so the function is safe to call with a NULL cancellable as its signature implies is allowed.","locations":[{"ref":"panels/printers/pp-new-printer.c:903-938","code":"  903 | void\n  904 | pp_new_printer_add_async (PpNewPrinter *self, GCancellable *cancellable, GAsyncReadyCallback callback,\n  905 |                           gpointer user_data)\n  906 | {\n  907 |     g_autoptr(GTask) task = NULL;\n  908 | \n  909 |     self->task = g_task_new (self, cancellable, callback, user_data);\n  910 |     self->cancellable = g_object_ref (cancellable);\n  911 | \n  912 |     if (self->ppd_name || self->ppd_file_name) {\n  913 |         /* We have everything we need */\n  914 |         printer_add_real_async (self);\n  915 |     } else if (self->device_id) {\n  916 |         g_autoptr(GDBusConnection) bus = NULL;\n  917 |         g_autoptr(GError) error = NULL;\n  918 | \n  919 |         /* Try whether CUPS has a driver for the new printer */\n  920 |         bus = g_bus_get_sync (G_BUS_TYPE_SESSION, NULL, &error);\n  921 |         if (bus) {\n  922 |             g_dbus_connection_call (bus, SCP_BUS, SCP_PATH, SCP_IFACE, \"GetBestDrivers\",\n  923 |                                     g_variant_new (\"(sss)\", self->device_id,\n  924 |                                                    self->make_and_model ? self->make_and_model : \"\",\n  925 |                                                    self->device_uri ? self->device_uri : \"\"),\n  926 |                                     G_VARIANT_TYPE (\"(a(ss))\"), G_DBUS_CALL_FLAGS_NONE, DBUS_TIMEOUT_LONG, cancellable,\n  927 |                                     printer_add_async_scb, self);\n  928 |         } else {\n  929 |             g_warning (\"Failed to get system bus: %s\", error->message);\n  930 |             _pp_new_printer_add_async_cb (FALSE, self);\n  931 |         }\n  932 |     } else if (self->original_name && self->host_name) {\n  933 |         /* Try to get PPD from remote CUPS */\n  934 |         printer_get_ppd_async (self->original_name, self->host_name, self->host_port, printer_add_async_scb4, self);\n  935 |     } else {\n  936 |         _pp_new_printer_add_async_cb (FALSE, self);\n  937 |     }\n  938 | }","lines":36,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-new-printer.c#L903-938"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"cc_wacom_stylus_action_dialog_finalize() frees self->key with the libc free() instead of g_free(), even though self->key is allocated with g_strdup() in cc_wacom_stylus_action_dialog_new(). Mixing GLib's allocator with libc free() is incorrect API usage that can break if GLib's memory vtable is ever overridden (e.g. with g_mem_set_vtable for debugging/profiling builds).","fix":"Use g_clear_pointer (&self->key, g_free); instead of free.","locations":[{"ref":"panels/wacom/cc-wacom-stylus-action-dialog.c:59","code":"   59 |     g_clear_pointer (&self->key, free);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wacom/cc-wacom-stylus-action-dialog.c#L59"},{"ref":"panels/wacom/cc-wacom-stylus-action-dialog.c:224","code":"  224 |     dialog->key = g_strdup (key);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/wacom/cc-wacom-stylus-action-dialog.c#L224"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"set_portal_permissions_for_app issues a synchronous, blocking D-Bus call (g_dbus_proxy_call_sync for the \"Lookup\" method) on the main thread every time the per-app \"enable\" GSettings key changes. This stalls the UI while waiting for the xdg-desktop-portal PermissionStore to respond, unlike the immediately following \"Set\" call which is correctly dispatched asynchronously via on_perm_store_set_done.","fix":"Replace the synchronous Lookup call with g_dbus_proxy_call (async) and move the rest of the permission-merging logic into its completion callback.","locations":[{"ref":"panels/notifications/cc-app-notifications-page.c:79-129","code":"   79 | static void\n   80 | set_portal_permissions_for_app (CcAppNotificationsPage *self)\n   81 | {\n   82 |     gboolean allow = g_settings_get_boolean (self->settings, \"enable\");\n   83 |     g_autoptr(GVariant) perms = NULL;\n   84 |     g_autoptr(GVariant) new_perms = NULL;\n   85 |     g_autoptr(GVariant) data = NULL;\n   86 |     GVariantBuilder builder;\n   87 |     gboolean found;\n   88 |     int i;\n   89 |     const char *yes_strv[] = { \"yes\", NULL };\n   90 |     const char *no_strv[] = { \"no\", NULL };\n   91 |     g_autoptr(GVariant) reply = NULL;\n   92 | \n   93 |     if (self->perm_store == NULL) {\n   94 |         g_warning (\"Could not find PermissionStore, not syncing notification permissions\");\n   95 |         return;\n   96 |     }\n   97 | \n   98 |     new_perms = g_variant_new_strv (allow ? yes_strv : no_strv, 1);\n   99 |     g_variant_ref_sink (new_perms);\n  100 | \n  101 |     g_variant_builder_init (&builder, G_VARIANT_TYPE (\"a{sas}\"));\n  102 |     found = FALSE;\n  103 | \n  104 |     reply = g_dbus_proxy_call_sync (self->perm_store, \"Lookup\", g_variant_new (\"(ss)\", \"notifications\", \"notification\"),\n  105 |                                     G_DBUS_CALL_FLAGS_NONE, -1, NULL, NULL);\n  106 |     if (reply) {\n  107 |         g_variant_get (reply, \"(@a{sas}v)\", &perms, &data);\n  108 | \n  109 |         for (i = 0; i < g_variant_n_children (perms); i++) {\n  110 |             const char *key;\n  111 |             g_autoptr(GVariant) value = NULL;\n  112 | \n  113 |             g_variant_get_child (perms, i, \"{&s@as}\", &key, &value);\n  114 |             if (g_strcmp0 (key, self->app_id) == 0) {\n  115 |                 found = TRUE;\n  116 |                 g_variant_builder_add (&builder, \"{s@as}\", key, new_perms);\n  117 |             } else\n  118 |                 g_variant_builder_add (&builder, \"{s@as}\", key, value);\n  119 |         }\n  120 |     }\n  121 | \n  122 |     if (!found)\n  123 |         g_variant_builder_add (&builder, \"{s@as}\", self->app_id, new_perms);\n  124 | \n  125 |     g_dbus_proxy_call (self->perm_store, \"Set\",\n  126 |                        g_variant_new (\"(sbsa{sas}v)\", \"notifications\", TRUE, \"notification\", &builder,\n  127 |                                       data ? data : g_variant_new_byte (0)),\n  128 |                        G_DBUS_CALL_FLAGS_NONE, -1, NULL, on_perm_store_set_done, data);\n  129 | }","lines":51,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/notifications/cc-app-notifications-page.c#L79-129"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"CcTimelikeEditor allocates a GSettings object for the \"org.gtk.Settings.FileChooser\" schema (self->filechooser_settings) in cc_timelike_editor_init() and properly frees it in finalize(), but the field is never read or queried anywhere in the file. It is allocated and destroyed but serves no functional purpose.","fix":"Remove the unused FILECHOOSER_SCHEMA define, the filechooser_setting n  878 |         command = pp_maintenance_command_new (self->name, \"autoconfigure\", NULL,\n  879 |                                               /* Translators: Name of job which makes printer to autoconfigure itself */\n  880 |                                               _(\"Automatic configuration\"));\n  881 | \n  882 |         pp_maintenance_command_execute_async (command, NULL, pp_maintenance_command_execute_cb, data);\n  883 |     }\n  884 | \n  885 |     /* Set media size for printer */\n  886 |     values = g_new0 (gchar *, 2);\n  887 |     values[0] = g_strdup (get_page_size_from_locale ());\n  888 | \n  889 |     printer_add_option_async (self->name, \"PageSize\", values, FALSE, NULL, pao_cb, data);","lines":33,"link":"https://gitlab.gnome.org/GNOME/gnome-control-center/-/blob/c32bf57320a98fb34b0e0893b0a83da7ab339672/panels/printers/pp-new-printer.c#L857-889"}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"medium","easy":false,"description":"populate_options starts several async CUPS/D-Bus operations using self as user_data with no GWeakRef protection and no GCancellable, while pp_options_dialog_dispose does not cancel any in-flight operations. If the dialog is closed/disposed while a callback is still pending, the callback later runs against a freed PpOptionsDialog, a use-after-free risk.","fix":"Create and store a GCancellable on the dialog, pass it to every async call started in populate_options, and cancel it in dispose; alternatively guard each callback with a GWeakRef to the dialog.","locations":[{"ref":"panels/printers/pp-options-dialog.c:576-606","code":"  576 | static void\n  577 | populate_options (PpOptionsDialog *self)\n  578 | {\n  579 |     GtkTreeViewColumn *column;\n  580 |     GtkCellRenderer *renderer;\n  581 |     /*\n  582 |      * Options which we need to obtain through an IPP request\n  583 |      * to be able to fill the options dialog.\n  584 |      * *-supported - possible values of the option\n
