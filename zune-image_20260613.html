 size\")` for every image with at least one pixel.\nThe `*2` belongs to a byte-sized API, not to a `[u16]` element count.","fix":"Make the comparison unit-consistent. Either give `decode_into` an element-count target\n(`num_components*width*height`, no `*2`) when validating a `[u16]` sink, or keep\n`output_buffer_size()` returning bytes and divide by 2 before comparing/allocating in the\n`[u16]` paths. Add a round-trip test that decodes a real farbfeld image.","locations":[{"ref":"crates/zune-farbfeld/src/decoder.rs:92-104","code":"   92 |     pub fn output_buffer_size(&self) -> Option<usize> {\n   93 |         if self.decoded_headers {\n   94 |             Some(\n   95 |                 FARBFELD_COLORSPACE\n   96 |                     .num_components() /*RGBA*/\n   97 |                     .checked_mul(self.width)?\n   98 |                     .checked_mul(self.height)?\n   99 |                     .checked_mul(2 /*depth*/)?,\n  100 |             )\n  101 |         } else {\n  102 |             None\n  103 |         }\n  104 |     }","lines":13},{"ref":"crates/zune-farbfeld/src/decoder.rs:120-143","code":"  120 |     pub fn decode_into(&mut self, sink: &mut [u16]) -> Result<(), FarbFeldErrors> {\n  121 |         if !self.decoded_headers {\n  122 |             self.decode_headers()?;\n  123 |         }\n  124 |         let expected_len = self\n  125 |             .output_buffer_size()\n  126 |             .ok_or(FarbFeldErrors::Generic(\"Overflowed int\"))?;\n  127 | \n  128 |         if sink.len() < expected_len {\n  129 |             return Err(FarbFeldErrors::Generic(\"Too small output buffer size\"));\n  130 |         }\n  131 | \n  132 |         let sink = &mut sink[..expected_len];\n  133 | \n  134 |         // farbfeld uses big endian, and we want output in native endian\n  135 |         // so we read data as big endian and then convert it to native endian\n  136 |         // This should be a no-op in BE systems, a bswap in LE systems\n  137 |         for datum in sink.iter_mut() {\n  138 |             let pix = self.stream.get_u16_be_err()?;\n  139 |             *datum = pix;\n  140 |         }\n  141 | \n  142 |         Ok(())\n  143 |     }","lines":24},{"ref":"crates/zune-farbfeld/src/decoder.rs:155-171","code":"  155 |     pub fn decode(&mut self) -> Result<Vec<u16>, FarbFeldErrors> {\n  156 |         self.decode_headers()?;\n  157 | \n  158 |         let size = FARBFELD_COLORSPACE\n  159 |             .num_components() /*RGBA*/\n  160 |             .checked_mul(self.width)\n  161 |             .ok_or(FarbFeldErrors::Generic(\"Overflowed int\"))?\n  162 |             .checked_mul(self.height)\n  163 |             .ok_or(FarbFeldErrors::Generic(\"Overflowed int\"))?;\n  164 | \n  165 |         // NOTE: This can be done via data.align() + decode_into()\n  166 |         // but that's unsafe, and doesn't please the Rust gods\n  167 |         let mut data = vec![0; size];\n  168 | \n  169 |         self.decode_into(&mut data)?;\n  170 |         Ok(data)\n  171 |     }","lines":17}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The SIMD remainder/tail handling in the grayscale conversion is wrong. After the\nchunked loop, the leftover element count is `rem = r.len() % CHUNK_SIZE`, and the\nremainder should start at `start = r.len() - rem` for all four slices. Instead the\nsource slices are sliced from `c_start = r.len() - (rem / 3)`, which is a different\n(smaller) offset. The scalar fallback then zips `c1`/`c2`/`c3` (length `rem/3`) with\n`gr[start..]` (length `rem`); because `zip` stops at the shorter iterator, only\n`rem/3` of the `rem` tail output pixels are written. The remaining `rem - rem/3`\noutput pixels are left at whatever value the output channel was allocated with\n(zero). This corrupts the trailing pixels of any RGB->grayscale conversion whose\npixel count is not a multiple of the SIMD chunk size, whenever the `avx2`/`sse41`\nfeature is enabled and detected at runtime. It is a copy-paste of the same wrong\nexpression in both files.","fix":"Use the same start offset for the source slices and the output, e.g.\n`let c1 = &r[start..]; let c2 = &g[start..]; let c3 = &b[start..];`\nand pass `&mut gr[start..]`. Remove the bogus `c_start = r.len() - (rem / 3)`.","locations":[{"ref":"crates/zune-image/src/core_filters/colorspace/grayscale/avx2.rs:76-87","code":"   76 |     if r.len() % CHUNK_SIZE != 0 {\n   77 |         // do the remainder\n   78 |         let rem = r.len() % CHUNK_SIZE;\n   79 |         let start = r.len() - rem;\n   80 |         let c_start = r.len() - (rem / 3);\n   81 | \n   82 |         let c1 = &r[c_start..];\n   83 |         let c2 = &g[c_start..];\n   84 |         let c3 = &b[c_start..];\n   85 | \n   86 |         convert_rgb_to_grayscale_scalar(c1, c2, c3, &mut gr[start..], 255);\n   87 |     }","lines":12},{"ref":"crates/zune-image/src/core_filters/colorspace/grayscale/sse41.rs:74-85","code":"   74 |     if r.len() % CHUNK_SIZE != 0 {\n   75 |         // assume r ,g and b are equal lengths.\n   76 |         let rem = r.len() % CHUNK_SIZE;\n   77 |         let start = r.len() - rem;\n   78 |         let c_start = r.len() - (rem / 3);\n   79 | \n   80 |         let c1 = &r[c_start..];\n   81 |         let c2 = &g[c_start..];\n   82 |         let c3 = &b[c_start..];\n   83 | \n   84 |         convert_rgb_to_grayscale_scalar(c1, c2, c3, &mut gr[start..], 255);\n   85 |     }","lines":12}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The buffer-size guard in `u16_to_an_endian` is inverted. `length` is the number of\noutput bytes required (`channels[0].len() * channels.len()`). The check\n`if length < into.len() { return Err(BufferTooSmall) }` fires when the supplied\nbuffer is *larger* than needed (wrongly rejecting a valid call), and does NOT fire\nwhen the buffer is *smaller* than needed. With a too-small `into`, the function\nproceeds and the various `chunks_exact_mut` loops silently produce truncated output\n(only `into.len()` bytes get written) while the function still returns `Ok(length)`,\nreporting more bytes than were actually written. The condition is backwards and the\nfield naming (`expected`/`actual`) is also swapped relative to its meaning.","fix":"Change the guard to `if into.len() < length { return Err(ChannelErrors::BufferTooSmall { expected: length, actual: into.len() }); }`.","locations":[{"ref":"crates/zune-image/src/frame.rs:430-436","code":"  430 |         let length = self.channels[0].len() * self.channels.len();\n  431 |         if length < into.len() {\n  432 |             return Err(ChannelErrors::BufferTooSmall {\n  433 |                 expected: length,\n  434 |                 actual: into.len(),\n  435 |             });\n  436 |         }","lines":7}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`trc_linear` (the `TransferFunction::Linear` transfer curve, used for both\n`linearize` and `gamma`) is implemented as `v.min(1.).min(0.)`. `min` with 0.0\nforces the result to <= 0.0 for every input, so any non-negative pixel maps to\n0.0. The Linear (identity) transfer should clamp to [0,1], i.e.\n`v.max(0.0).min(1.0)`. As written, applying a `TransferCurve` with\n`TransferFunction::Linear` (reachable via `FilterExt::transfer_curve` and the\nLUT builders in transfer_curve.rs) zeroes the entire image.","fix":"Replace `v.min(1.).min(0.)` with `v.max(0.0).min(1.0)` (clamp to the unit range).","locations":[{"ref":"crates/zune-imageprocs/src/transfer_curve/trc.rs:222-225","code":"  222 | /// Gamma transfer function for HLG\n  223 | pub fn trc_linear(v: f32) -> f32 {\n  224 |     v.min(1.).min(0.)\n  225 | }","lines":4}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`from_numpy` accepts `uint32` numpy arrays (the `dims == 2` branch at lines 835-841 and the\n`dims == 3` branch at lines 873-879 explicitly downcast to `PyArray2<u32>` / `PyArray3<u32>` and\ncall `convert_2d` / `convert_3d`). However neither `convert_2d` nor `convert_3d` has a `TypeId`\nbranch for `u32`: they only match `u8`, `u16`, `f32` and `f64`. A `u32` array therefore falls\nthrough to the final error return (\"The type ... is not supported\") instead of being ingested.\nThe public docstring at line 799 explicitly promises `uint32 -> u16 via a saturating cast`, so the\ndocumented behaviour is unimplemented and the dedicated downcast code is dead. Users passing a\nperfectly valid uint32 array get a confusing \"not supported\" error.","fix":"Either add a `u32` branch to `convert_2d`/`convert_3d` that performs the saturating cast to `u16`\n(matching the documentation), or remove the `u32` downcast arms and the doc claim. Given the doc\ncontract, add something like:\n`if TypeId::of::<T>() == TypeId::of::<u32>() { let dc = numpy.downcast::<PyArray2<u32>>()?.try_readonly()?;\nlet v: Vec<u16> = dc.as_slice()?.iter().map(|&x| x.min(u32::from(u16::MAX)) as u16).collect();\nreturn Ok(ZImage::from_u16(&v, dims[1], dims[0], ZColorSpace::Luma)); }`.","locations":[{"ref":"crates/zune-python/src/py_image.rs:653-696","code":"  653 | #[allow(clippy::cast_possible_truncation)]\n  654 | fn convert_2d<T: Element + 'static>(numpy: &Bound<'_, PyArray2<T>>) -> PyResult<ZImage> {\n  655 |     let dims = numpy.shape();\n  656 |     if TypeId::of::<T>() == TypeId::of::<u8>() {\n  657 |         let downcasted: &Bound<'_, PyArray2<u8>> = numpy.downcast()?;\n  658 |         let dc = downcasted.try_readonly()?;\n  659 |         let bytes = dc.as_slice()?;\n  660 |         return Ok(ZImage::from_u8(bytes, dims[1], dims[0], ZColorSpace::Luma));\n  661 |     }\n  662 |     if TypeId::of::<T>() == TypeId::of::<u16>() {\n  663 |         let downcasted: &Bound<'_, PyArray2<u16>> = numpy.downcast()?;\n  664 |         let dc = downcasted.try_readonly()?;\n  665 |         let bytes = dc.as_slice()?;\n  666 |         return Ok(ZImage::from_u16(bytes, dims[1], dims[0], ZColorSpace::Luma));\n  667 |     }\n  668 |     if TypeId::of::<T>() == TypeId::of::<f32>() {\n  669 |         let downcasted: &Bound<'_, PyArray2<f32>> = numpy.downcast()?;\n  670 | \n  671 |         let dc = downcasted.try_readonly()?;\n  672 |         let bytes = dc.as_slice()?;\n  673 |         return Ok(ZImage::from_f32(bytes, dims[1], dims[0], ZColorSpace::Luma));\n  674 |     }\n  675 |     if TypeId::of::<T>() == TypeId::of::<f64>() {\n  676 |         warn!(\"The library doesn't natively support f64, the data will be converted to f32\");\n  677 |         let downcasted: &Bound<'_, PyArray2<f64>> = numpy.downcast()?;\n  678 | \n  679 |         let dc = downcasted.try_readonly()?;\n  680 |         let bytes = dc\n  681 |             .as_slice()?\n  682 |             .iter()\n  683 |             .map(|x| *x as f32)\n  684 |             .collect::<Vec<f32>>();\n  685 |         return Ok(ZImage::from_f32(\n  686 |             &bytes,\n  687 |             dims[1],\n  688 |             dims[0],\n  689 |             ZColorSpace::Luma\n  690 |         ));\n  691 |     }\n  692 |     Err(PyErr::new::<PyException, _>(format!(\n  693 |         \"The type {:?} is not supported supported types are u16,u8, and f32  (the types f64 is converted to f32)\",\n  694 |         numpy.dtype()\n  695 |     )))\n  696 | }","lines":44},{"ref":"crates/zune-python/src/py_image.rs:698-782","code":"  698 | #[allow(clippy::cast_possible_truncation)]\n  699 | pub fn convert_3d<T: Element + 'static>(\n  700 |     numpy: &Bound<'_, PyArray3<T>>, suggested_colorspace: Option<ColorSpace>\n  701 | ) -> PyResult<ZImage> {\n  702 |     let dims = numpy.shape();\n  703 |     let mut expected_colorspace: ZColorSpace = match dims[2] {\n  704 |         1 => ZColorSpace::Luma,\n  705 |         2 => ZColorSpace::LumaA,\n  706 |         3 => ZColorSpace::RGB,\n  707 |         4 => ZColorSpace::RGBA,\n  708 | es":7},{"ref":"crates/zune-python/src/py_image.rs:796-799","code":"  796 | /// # Supported types\n  797 | /// - `float32`,`uint8`,`uint16` - Data is ingested as is\n  798 | ///  - float64` - Image is converted into f32 type\n  799 | /// - `uint32`  - Image is converted into u16 type using a saturating cast","lines":4}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`ZReader::peek_at` rewinds by the wrong amount on the oversized-request error\npath. When `num_bytes > 20 MiB`, the code does `self.rewind(num_bytes)?` and\nreturns an error, but at that point it has only advanced the stream by `position`\n(via the earlier `self.skip(position)`), not by `num_bytes`. Rewinding by\n`num_bytes` moves the cursor to an incorrect (too-early, or saturated-to-zero)\nlocation, corrupting subsequent reads instead of restoring the original position.","fix":"On the oversize path, restore the original position with `self.rewind(position)?`\n(only if `position != 0`), matching the other error/success paths, rather than\n`self.rewind(num_bytes)`.","locations":[{"ref":"crates/zune-core/src/bytestream/reader.rs:252-282","code":"  252 |     #[inline]\n  253 |     pub fn peek_at(&mut self, position: usize, num_bytes: usize) -> Result<&[u8], ZByteIoError> {\n  254 |         // short circuit for zero\n  255 |         // important since implementations like File will\n  256 |         // cause a syscall on skip\n  257 |         if position != 0 {\n  258 |             // skip position bytes from start\n  259 |             self.skip(position)?;\n  260 |         }\n  261 |         if num_bytes > 20 * 1024 * 1024 {\n  262 |             self.rewind(num_bytes)?;\n  263 |             // resize of 20 MBs, skipping too much, so panic\n  264 |             return Err(ZByteIoError::Generic(\"Too many bytes skipped\"));\n  265 |         }\n  266 |         // resize buffer\n  267 |         self.temp_buffer.resize(num_bytes, 0);\n  268 |         // read bytes\n  269 |         match self.inner.peek_exact_bytes(&mut self.temp_buffer[..]) {\n  270 |             Ok(_) => {\n  271 |                 // rewind back to where we were\n  272 |                 if position != 0 {\n  273 |                     self.rewind(position)?;\n  274 |                 }\n  275 |                 Ok(&self.temp_buffer)\n  276 |             }\n  277 |             Err(e) => {\n  278 |                 self.rewind(position)?;\n  279 |                 Err(e)\n  280 |             }\n  281 |         }\n  282 |     }","lines":31}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`NeighborTracker::set_pred_mode`, `set_part_mode`, and `set_nonzero_coefficient` iterate\n`cx in unit_x..(unit_x + width_in_units)` and index `self.blocks.get_mut(offset + cx)` where\n`offset = cy * self.width_in_units`. When a block straddles the right frame edge, `cx` exceeds\n`self.width_in_units`, so `offset + cx` silently lands in the NEXT row's data (a valid but wrong\nindex) instead of being skipped. Other setters (set_intra_mode, update_cu_info, update_qp,\nupdate_block_depth) correctly check `gx < self.width_in_units && gy < self.height_in_units`. The\ninconsistency corrupts neighbor state for edge blocks and can affect deblocking/intra decisions.","fix":"Add the same `gx < self.width_in_units && gy < self.height_in_units` guard used by the other\nsetters, computing gx/gy explicitly rather than relying on `get_mut(offset + cx)` to catch only\ntotal-length overruns.","locations":[{"ref":"crates/zune-heic/src/hevc_decoder/neighbor_tracker.rs:303-320","code":"  303 |     pub fn set_pred_mode(&mut self, x: usize, y: usize, log2_blk_size: u8, mode: PredMode) {\n  304 |         let unit_x = x >> self.log2_unit_size;\n  305 |         let unit_y = y >> self.log2_unit_size;\n  306 | \n  307 |         // Calculate how many 8x8 units we need to fill\n  308 |         // (e.g., a 32x32 block is 4 units wide)\n  309 |         let width_in_units = 1 << (log2_blk_size - self.log2_unit_size);\n  310 | \n  311 |         for cy in unit_y..(unit_y + width_in_units) {\n  312 |             let offset = cy * self.width_in_units;\n  313 |             for cx in unit_x..(unit_x + width_in_units) {\n  314 |                 // Now setting the actual field inside your blocks vector\n  315 |                 if let Some(block) = self.blocks.get_mut(offset + cx) {\n  316 |                     block.pred_mode = mode;\n  317 |                 }\n  318 |             }\n  319 |         }\n  320 |     }","lines":18},{"ref":"crates/zune-heic/src/hevc_decoder/neighbor_tracker.rs:337-350","code":"  337 |     pub fn set_part_mode(&mut self, x: usize, y: usize, log2_blk_size: u8, mode: PartMode) {\n  338 |         let unit_x = x >> self.log2_unit_size;\n  339 |         let unit_y = y >> self.log2_unit_size;\n  340 |         let width_in_units = 1 << (log2_blk_size - self.log2_unit_size);\n  341 | \n  342 |         for cy in unit_y..(unit_y + width_in_units) {\n  343 |             let offset = cy * self.width_in_units;\n  344 |             for cx in unit_x..(unit_x + width_in_units) {\n  345 |                 if let Some(block) = self.blocks.get_mut(offset + cx) {\n  346 |                     block.part_mode = mode;\n  347 |                 }\n  348 |             }\n  349 |         }\n  350 |     }","lines":14},{"ref":"crates/zune-heic/src/hevc_decoder/neighbor_tracker.rs:428-443","code":"  428 |     pub fn set_nonzero_coefficient(&mut self, x: usize, y: usize, log2_trafo_size: u8) {\n  429 |         let unit_x = x >> self.log2_unit_size;\n  430 |         let unit_y = y >> self.log2_unit_size;\n  431 | \n  432 |         // How many 8x8 units wide is this TU?\n  433 |         let width_in_units = 1 << (log2_trafo_size - self.log2_unit_size);\n  434 | \n  435 |         for cy in unit_y..(unit_y + width_in_units) {\n  436 |             let offset = cy * self.width_in_units;\n  437 |             for cx in unit_x..(unit_x + width_in_units) {\n  438 |                 if let Some(block) = self.blocks.get_mut(offset + cx) {\n  439 |                     block.has_nonzero_coeff = true;\n  440 |                 }\n  441 |             }\n  442 |         }\n  443 |     }","lines":16}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Channel::push` uses a broken growth formula for reallocation:\n`self.realloc(self.capacity.saturating_mul(size.saturating_mul(3)) / 2)`. This is\n`capacity * (3 * size_of::<T>()) / 2`, so for a u16 push it grows capacity ~3x, for\nu32/f32 ~6x, instead of the intended 1.5x (`capacity * 3 / 2`). It also ignores the\nfact that the element being pushed needs `size` extra bytes: if `self.capacity` is 0\nor 1, `capacity * 3 * size / 2` can be smaller than `length + size`, and the\nsubsequent unchecked `self.ptr.add(self.length).copy_from(..., size)` would write out\nof bounds. In practice channels are created with capacity >= length and a default of\n10, so the OOB path is hard to hit, but the formula is still incorrect and wastes\nmemory.","fix":"Grow by a correct amount that guarantees space for the new element, e.g.\n`let new_cap = (self.capacity * 3 / 2).max(self.length + size);` then\n`self.realloc(new_cap);`. The growth factor should not depend on `size_of::<T>()`.","locations":[{"ref":"crates/zune-image/src/channel.rs:554-577","code":"  554 |     pub fn push<T: Copy + 'static + Zeroable>(&mut self, elm: T) {\n  555 |         let size = core::mem::size_of::<T>(); // compile time\n  556 | \n  557 |         if !self.has_capacity(size) {\n  558 |             unsafe {\n  559 |                 // extend\n  560 |                 // use 3/2 formula\n  561 |                 self.realloc(self.capacity.saturating_mul(size.saturating_mul(3)) / 2);\n  562 |             }\n  563 |         }\n  564 |         // safety:\n  565 |         // We ensured above there that we have space enough for one more element\n  566 |         unsafe {\n  567 |             // Store elm in a 1 element array in order to cast it's\n  568 |             // pointer to u8 so that we can copy it\n  569 |             let arr = [elm];\n  570 | \n  571 |             self.ptr\n  572 |                 .add(self.length)\n  573 |                 .copy_from(arr.as_ptr().cast(), size);\n  574 |         }\n  575 |         // increment length by number of bytes it takes to represent this type.\n  576 |         self.length += size;\n  577 |     }","lines":24}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`ImageMetadata::serialize` declares the struct field count as\n`const STRUCT_FIELDS: usize = 7;` and passes it to `serialize_struct`, but then\nserializes 8 fields unconditionally (width, height, colorspace, depth, format,\ncolor_transfer_characteristics, gamma_value, is_linear) plus a 9th (`exif`) when the\n`metadata` feature is enabled. For self-describing formats (JSON/YAML) the count is\nignored, but for length-prefixed formats (bincode, MessagePack, etc.) an incorrect\nfield count corrupts the serialized output. The declared count must match the actual\nnumber of `serialize_field` calls.","fix":"Set the count to the actual number of serialized fields (8, or 9 with the `metadata`\nfeature). Compute it with a `cfg!(feature = \"metadata\")` adjustment so it stays in\nsync.","locations":[{"ref":"crates/zune-image/src/serde.rs:24-67","code":"   24 |         const STRUCT_FIELDS: usize = 7;\n   25 |         let mut state = serializer.serialize_struct(\"Metadata\", STRUCT_FIELDS)?;\n   26 | \n   27 |         state.serialize_field(\"width\", &self.width)?;\n   28 |         state.serialize_field(\"height\", &self.height)?;\n   29 |         state.serialize_field(\"colorspace\", &self.colorspace)?;\n   30 |         state.serialize_field(\"depth\", &self.depth)?;\n   31 |         state.serialize_field(\"format\", &self.format)?;\n   32 |         state.serialize_field(\"color_transfer_characteristics\", &self.color_trc)?;\n   33 |         state.serialize_field(\"gamma_value\", &self.default_gamma)?;\n   34 |         (state).serialize_field(\"is_linear\", &self.is_linear)?;\n   35 | \n   36 |         #[cfg(feature = \"metadata\")]\n   37 |         {\n   38 |             let mut fields = BTreeMap::new();\n   39 |             if let Some(ex) = &self.exif {\n   40 |                 for f in ex {\n   41 |                     let key = f.tag.to_string();\n   42 | \n   43 |                     // some tags may have leading quotes yet they\n   44 |                     // are enclosed in a string.\n   45 |                     // This helps remove them\n   46 |                     let value = f\n   47 |                         .display_value()\n   48 |                         .with_unit(f)\n   49 |                         .to_string()\n   50 |                         .trim_start_matches('\\\"')\n   51 |                         .trim_end_matches('\\\"')\n   52 |                         .to_string();\n   53 | \n   54 |                     if value.len() < 100 {\n   55 |                         fields.insert(key, value);\n   56 |                     }\n   57 |                 }\n   58 |             }\n   59 |             if fields.is_empty() {\n   60 |                 state.serialize_field::<Option<BTreeMap<String, String>>>(\"exif\", &None)?;\n   61 |             } else {\n   62 |                 state.serialize_field(\"exif\", &fields)?;\n   63 |             }\n   64 |         }\n   65 | \n   66 |         state.end()\n   67 |     }","lines":44}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"HaldClut never converts the target image to `new_depth` before processing.\n`new_depth = clut_depth.bit_type().max(target_depth.bit_type())`, and the\nmatch on `new_depth` calls `Image::par_process_frame_regions::<u16/f32>` on the\ntarget frame whose channels are still in the target's original depth. When the\nCLUT depth is greater than the target depth (e.g. u16 CLUT applied to a u8\ntarget), the target channels are reinterpreted at the wrong width, producing an\nerror or corrupted output. The depth is only restored (`convert_depth`) after\nthe loop, which is too late and assumes a conversion that never happened.","fix":"Convert the target image to `new_depth` (target_img.convert_depth) before the par_process loop, then restore the original depth afterwards.","locations":[{"ref":"crates/zune-imageprocs/src/hald_clut.rs:82-165","code":"   82 |         let clut_depth = clut_img.depth();\n   83 |         let target_depth = target_img.depth();\n   84 |         let new_depth = clut_depth.bit_type().max(target_depth.bit_type());\n   85 | \n   86 |         let working_cs = target_img.colorspace();\n   87 | \n   88 |         // Determine channel mapping to handle RGB vs BGR safely\n   89 |         let is_bgr = working_cs == ColorSpace::BGR || working_cs == ColorSpace::BGRA;\n   90 |         let (r_idx, g_idx, b_idx) = if is_bgr { (2, 1, 0) } else { (0, 1, 2) };\n   91 | \n   92 |         // Extract dimensions upfront\n   93 |         let target_width = target_img.width();\n   94 |         let target_height = target_img.height();\n   95 | \n   96 |         let Some(clut_frame) = clut_img.frames_ref().first() else {\n   97 |             return Err(ImageErrors::GenericStr(\"No first frame in clut image\"));\n   98 |         };\n   99 | \n  100 |         for target_frame in target_img.frames_mut().iter_mut() {\n  101 |             let c_channels = clut_frame.channels_ref(working_cs, false);\n  102 | \n  103 |             match new_depth {\n  104 |                 BitType::U8 => {\n  105 |                     let clut_r = c_channels[r_idx].reinterpret_as::<u8>()?;\n  106 |                     let clut_g = c_channels[g_idx].reinterpret_as::<u8>()?;\n  107 |                     let clut_b = c_channels[b_idx].reinterpret_as::< hable\nfor images with `width < 8` or `width > 0x7fff`, hence low severity, but the output is wrong.","fix":"Copy to the current write cursor instead of the literal 4, e.g.\n`scanline.copy_within(scanline_offset - 4..scanline_offset, scanline_offset)` (verify\nagainst the radiance old-RLE spec / a reference decoder before changing).","locations":[{"ref":"crates/zune-hdr/src/decoder.rs:412-435","code":"  412 |             if scanline[scanline_offset] == 1\n  413 |                 && scanline[scanline_offset + 1] == 1\n  414 |                 && scanline[scanline_offset + 2] == 1\n  415 |             {\n  416 |                 let run = scanline[scanline_offset + 3];\n  417 | \n  418 |                 let mut i = i32::from(run) << shift;\n  419 | \n  420 |                 while width > 0 && scanline_offset > 4 && i > 0 {\n  421 |                     scanline.copy_within(scanline_offset - 4..scanline_offset, 4);\n  422 |                     scanline_offset += 4;\n  423 |                     i -= 1;\n  424 |                     width -= 4;\n  425 |                 }\n  426 |                 shift += 8;\n  427 | \n  428 |                 if shift > 16 {\n  429 |                     break;\n  430 |                 }\n  431 |             } else {\n  432 |                 scanline_offset += 4;\n  433 |                 width -= 1;\n  434 |                 shift = 0;\n  435 |             }","lines":24}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`decode_ftyp` computes the `have` field of the PayloadTooShort error as `8 - full_size` inside the\n`if full_size < 8` branch, but the intent is clearly to report how many bytes are present (i.e.\n`full_size`), not `8 - full_size`. The `needed` is 8 and `have` should be `full_size`. The error\nmessage will be misleading (e.g. full_size=2 reports have=6). Not a panic (8-full_size stays\npositive because full_size<8), but the diagnostic is wrong.","fix":"Report `have: full_size` instead of `have: 8 - full_size`.","locations":[{"ref":"crates/zune-heic/src/headers.rs:49-57","code":"   49 |     let mut full_size = get_length(box_header)?;\n   50 | \n   51 |     if full_size < 8 {\n   52 |         return Err(HeicErrors::PayloadTooShort {\n   53 |             box_type: box_header.box_type,\n   54 |             needed: 8,\n   55 |             have: 8 - full_size,\n   56 |         });\n   57 |     }","lines":9}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `decode_ipma`, the per-entry guard re-checks `entry_count > MAX_ENTRIES` (the outer total count)\ninstead of validating `assoc_count` (the per-entry association count read just above). `assoc_count`\nis an unbounded u8 (0..=255) read from the stream and is used as `Vec::with_capacity(assoc_count)`;\nthe inner loop reads that many associations. The copy-pasted check is dead/ineffective because\nentry_count was already validated at the top of the function. While u8 capacity is small, the check\nclearly intended to bound the inner loop.","fix":"Remove the redundant `entry_count > MAX_ENTRIES` re-check, or replace it with a meaningful check\non `assoc_count` if a per-entry cap is desired. The byte budget (`bytes_left`) already bounds total\nwork via subtract_value.","locations":[{"ref":"crates/zune-heic/src/headers.rs:988-1019","code":"  988 |         let assoc_count = reader.read_u8();\n  989 | \n  990 |         bytes_left = subtract_value(bytes_left, 1)?;\n  991 | \n  992 |         if entry_count > MAX_ENTRIES {\n  993 |             // chosen by rng dice\n  994 |             return Err(HeicErrors::Generic {\n  995 |                 msg: format!(\n  996 |                     \"Entry count for IPMA sub-section too many {entry_count} (possibly corrupt) (max library supported entries {MAX_ENTRIES})\"\n  997 |                 )\n  998 |             });\n  999 |         }\n 1000 | \n 1001 |         let mut associations = Vec:             .for_each(|(x, y)| *x = x.saturating_add(*y));\n   86 |                 }\n   87 |             }\n   88 |             BitType::F32 => {\n   89 |                 for (prev, rhs_c) in new_img\n   90 |                     .channels_mut(true)\n   91 |                     .iter_mut()\n   92 |                     .zip(rhs.channels_ref(true))\n   93 |                 {\n   94 |                     let channel_px = prev.reinterpret_as_mut::<f32>().unwrap();\n   95 |                     let channel_rhs = rhs_c.reinterpret_as::<f32>().unwrap();\n   96 | \n   97 |                     channel_px\n   98 |                         .iter_mut()\n   99 |                         .zip(channel_rhs.iter())\n  100 |                         .for_each(|(x, y)| *x += *y);\n  101 |                 }\n  102 |             }\n  103 |             d => unimplemented!(\"Unimplemented for {:?}\", d)\n  104 |         }\n  105 |         new_img\n  106 |     }\n  107 | }\n  108 | \n  109 | impl Sub for Image {\n  110 |     type Output = Image;\n  111 | \n  112 |     fn sub(self, rhs: Image) -> Self::Output {\n  113 |         check_full_compatibility(&self, &rhs);\n  114 | \n  115 |         let mut new_img = self;\n  116 | \n  117 |         match new_img.depth().bit_type() {\n  118 |             BitType::U8 => {\n  119 |                 for (prev, rhs_c) in new_img\n  120 |                     .channels_mut(true)\n  121 |                     .iter_mut()\n  122 |                     .zip(rhs.channels_ref(true))\n  123 |                 {\n  124 |                     let channel_px = prev.reinterpret_as_mut::<u8>().unwrap();\n  125 |                     let channel_rhs = rhs_c.reinterpret_as::<u8>().unwrap();\n  126 | \n  127 |                     channel_px\n  128 |                         .iter_mut()\n  129 |                         .zip(channel_rhs.iter())\n  130 |                         .for_each(|(x, y)| *x = x.saturating_sub(*y));\n  131 |                 }\n  132 |             }\n  133 |             BitType::U16 => {\n  134 |                 for (prev, rhs_c) in new_img\n  135 |                     .channels_mut(true)\n  136 |                     .iter_mut()\n  137 |                     .zip(rhs.channels_ref(true))\n  138 |                 {\n  139 |                     let channel_px = prev.reinterpret_as_mut::<u16>().unwrap();\n  140 |                     let channel_rhs = rhs_c.reinterpret_as::<u16>().unwrap();\n  141 | \n  142 |                     channel_px\n  143 |                         .iter_mut()\n  144 |                         .zip(channel_rhs.iter())\n  145 |                         .for_each(|(x, y)| *x = x.saturating_sub(*y));\n  146 |                 }\n  147 |             }\n  148 |             BitType::F32 => {\n  149 |                 for (prev, rhs_c) in new_img\n  150 |                     .channels_mut(true)\n  151 |                     .iter_mut()\n  152 |                     .zip(rhs.channels_ref(true))\n  153 |                 {\n  154 |                     let channel_px = prev.reinterpret_as_mut::<f32>().unwrap();\n  155 |                     let channel_rhs = rhs_c.reinterpret_as::<f32>().unwrap();\n  156 | \n  157 |                     channel_px\n  158 |                         .iter_mut()\n  159 |                         .zip(channel_rhs.iter())\n  160 |                         .for_each(|(x, y)| *x -= *y);\n  161 |                 }\n  162 |             }\n  163 |             d => unimplemented!(\"Unimplemented for {:?}\", d)\n  164 |         }\n  165 |         new_img\n  166 |     }\n  167 | }","lines":146}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In Sharpen's U8 path the user-supplied `threshold: u16` is cast with `as u8`,\ntruncating values > 255 (e.g. threshold 300 becomes 44) instead of clamping. The\nF32 path correctly clamps via `u8::try_from(self.threshold.clamp(0,255))`. This\nmakes the U8 unsharp-mask threshold behave unexpectedly for
