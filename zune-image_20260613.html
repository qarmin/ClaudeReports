"ref":"crates/zune-inflate/src/streaming_decoder.rs:1007-1012","code":" 1007 |                 if (entry & HUFFDEC_SUITABLE_POINTER) != 0 {\n 1008 |                     let extra = self.stream.peek_var_bits(((entry >> 8) & 0x3F) as usize);\n 1009 |                     entry = litlen_decode_table[(entry >> 16) as usize + extra];\n 1010 |                     saved_bitbuf = self.stream.buffer;\n 1011 |                     self.stream.drop_bits((entry & 0xFF) as u8);\n 1012 |                 }","lines":6},{"ref":"crates/zune-inflate/src/streaming_decoder.rs:866-872","code":"  866 |                         let entry_position = ((entry >> 8) & 0x3F) as usize;\n  867 |                         let mut pos = (entry >> 16) as usize;\n  868 | \n  869 |                         saved_bitbuf = self.stream.buffer;\n  870 |                         pos += self.stream.peek_var_bits(entry_position);\n  871 |                         entry = litlen_decode_table[pos.min(LITLEN_ENOUGH - 1)];\n  872 |                         self.stream.drop_bits(entry as u8);","lines":7}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`drop_bits` uses `self.bits_left = self.bits_left.saturating_sub(n)` (the debug_assert that `bits_left >= n` is commented out as fuzzer-noisy), while `get_bits` uses `self.bits_left.wrapping_sub(n_bits)`. The two consumption paths disagree on how an over-consumption is represented (`bits_left` saturating at 0 vs wrapping to a large value), and `decode_huff!` guards with `code_length > bits_left` only in the slow path. Inconsistent bit accounting on corrupt streams can let the decoder read more bits than were actually present without surfacing an error, yielding silent garbage rather than a clean `ExhaustedData`.","fix":"Make `get_bits` and `drop_bits` consistent (both saturating, with a single bits-left guard) so over-reads are detected uniformly.","locations":[{"ref":"crates/zune-jpeg/src/bitstream.rs:291-309","code":"  291 |     fn drop_bits(&mut self, n: u8) {\n  292 |         // PS: Its a good check, but triggers fuzzer and a lot of false positives\n  293 |         //debug_assert!(self.bits_left >= n);\n  294 |         //self.bits_left -= n;\n  295 |         self.bits_left = self.bits_left.saturating_sub(n);\n  296 |         self.aligned_buffer <<= n;\n  297 |     }\n  298 | \n  299 |     /// Read `n_bits` from the buffer  and discard them\n  300 |     #[inline(always)]\n  301 |     #[allow(clippy::cast_possible_truncation)]\n  302 |     fn get_bits(&mut self, n_bits: u8) -> i32 {\n  303 |         let mask = (1_u64 << n_bits) - 1;\n  304 | \n  305 |         self.aligned_buffer = self.aligned_buffer.rotate_left(u32::from(n_bits));\n  306 |         let bits = (self.aligned_buffer & mask) as i32;\n  307 |         self.bits_left = self.bits_left.wrapping_sub(n_bits);\n  308 |         bits\n  309 |     }","lines":19}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Components::from` validates `horizontal_sample` is a power of two but only checks `vertical_sample != 0` (the power-of-two check is commented out), while both are merely required to be `<= MAX_SAMP_FACTOR (4)`. A vertical sampling factor of 3 is therefore accepted, producing `SampleRatios::Generic(h, 3)` and asymmetric handling versus the horizontal axis. Sampling factors that are not 1/2/4 stress the generic-upsampler and stride math that this code repeatedly works around (`fix_an_annoying_bug`, padded-width Generic branch).","fix":"Apply the same power-of-two (or explicit 1/2/4) check to `vertical_sample` as to `horizontal_sample`, or document and test the Generic(_,3) path explicitly.","locations":[{"ref":"crates/zune-jpeg/src/components.rs:106-144","code":"  106 |         let horizontal_sample = (a[1] >> 4) as usize;\n  107 |         let vertical_sample = (a[1] & 0x0f) as usize;\n  108 |         // Match libjpeg turbo on checking for sampling factors\n  109 |         // Reject anything above 4\n  110 |         if horizontal_sample > MAX_SAMP_FACTOR {\n  111 |             return Err(DecodeErrors::Format(format!(\n  112 |                 \"Bogus Horizontal Sampling Factor {horizontal_sample}\"\n  113 |             )));\n  114 |         }\n  115 |         if vertical_sample > MAX_SAMP_FACTOR {\n  116 |             return Err(DecodeErrors::Format(format!(\n  117 |                 \"Bogus Vertical Sampling Factor {vertical_sample}\"\n  118 |             )));\n  119 |         }\n  120 | \n  121 |         let quantization_table_number = a[2];\n  122 |         // confirm quantization number is between 0 and MAX_COMPONENTS\n  123 |         if usize::from(quantization_table_number) >= MAX_COMPONENTS {\n  124 |             return Err(DecodeErrors::Format(format!(\n  125 |                 \"Too large quantization number :{quantization_table_number}, expected value between 0 and {MAX_COMPONENTS}\"\n  126 |             )));\n  127 |         }\n  128 |         // check that upsampling ratios are powers of two\n  129 |         // if these fail, it's probably a corrupt image.\n  130 |         if !horizontal_sample.is_power_of_two() {\n  131 |             return Err(DecodeErrors::Format(format!(\n  132 |                 \"Horizontal sample is not a power of two({horizontal_sample}) cannot decode\"\n  133 |             )));\n  134 |         }\n  135 | \n  136 |         // if !vertical_sample.is_power_of_two() {\n  137 |         //     return Err(DecodeErrors::Format(format!(\n  138 |         //         \"Vertical sub-sample is not power of two({vertical_sample}) cannot decode\"\n  139 |         //     )));\n  140 |         // }\n  141 |         if vertical_sample == 0 {\n  142 |             // Check for invalid vertical sample\n  143 |             return Err(DecodeErrors::Format(\"Vertical sample is zero\".to_string()));\n  144 |         }","lines":39}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`parse_trns` for palette images validates the tRNS length against the palette's\nallocated capacity rather than the number of palette entries actually present. The\npalette is always `resize(256, ...)` in `parse_plte` regardless of how many PLTE\nentries existed, so the check `self.palette.len() < chunk.length` is effectively\n`256 < chunk.length`. A tRNS chunk is therefore accepted as long as it is <= 256 entries\neven if the PLTE only defined, say, 4 colors. The spec says tRNS for a palette image must\nnot contain more entries than the palette. This is not a memory-safety issue (indices\nstay < 256), but it silently accepts malformed files and writes alpha into palette slots\nthat were never defined by PLTE.","fix":"Track the real number of PLTE entries written (e.g. store `chunk.length/3` from\n`parse_plte`) and validate `chunk.length` for tRNS against that count rather than the\nfixed 256-entry capacity.","locations":[{"ref":"crates/zune-png/src/headers/readers.rs:169-182","code":"  169 |             PngColor::Palette => {\n  170 |                 if self.palette.is_empty() {\n  171 |                     return Err(PngDecodeErrors::GenericStatic(\"tRNS chunk before plTE\"));\n  172 |                 }\n  173 |                 if self.palette.len() < chunk.length {\n  174 |                     return Err(PngDecodeErrors::Generic(format!(\n  175 |                         \"tRNS chunk with too long entries {}\",\n  176 |                         chunk.length\n  177 |                     )));\n  178 |                 }\n  179 |                 for i in 0..chunk.length {\n  180 |                     self.palette[i].0[3] = self.stream.read_u8();\n  181 |                 }\n  182 |             }","lines":14}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`to_numpy_from_bytes` validates the buffer length only with a `debug_assert_eq!` (line 44). In a\nrelease build (the only build that ships) the assertion is compiled out, so if `data.len()` ever\nmismatches `width * height * num_components`, the subsequent `copy_from_slice` (lines 51, 60, 68, 76)\npanics with a length-mismatch abort instead of producing a clean error, and the overflow in the\n`width * height * num_components` multiplication inside the assert is itself unchecked.","fix":"Replace the `debug_assert_eq!` with a real runtime check that returns a `PyException` on mismatch,\nusing checked multiplication: `let expected = width.checked_mul(height).and_then(|v| v.checked_mul(color.num_components()));`\nand compare to `data.len()`.","locations":[{"ref":"crates/zune-python/src/py_functions.rs:41-78","code":"   41 | fn to_numpy_from_bytes<'py, T: Copy + Default + 'static + numpy::Element + Send>(\n   42 |     py: Python<'py>, data: &[T], width: usize, height: usize, color: ColorSpace\n   43 | ) -> PyResult<Bound<'py, PyAny>> {\n   44 |     debug_assert_eq!(data.len(), width * height * color.num_components());\n   45 | \n   46 |     unsafe {\n   47 |         return match color.num_components() {\n   48 |             1 => {\n   49 |                 let arr = PyArray2::<T>::new_bound(py, [height, width], false);\n   50 |                 let mut write_array = arr.try_readwrite()?;\n   51 |                 write_array.as_slice_mut()?.copy_from_slice(data);\n   52 | \n   53 |                 Ok(arr.into_any())\n   54 |             }\n   55 |             2 => {\n   56 |                 let arr =\n   57 |                     PyArray3::<T>::new_bound(py, [height, width, color.num_components()], false);\n   58 |                 //\n   59 |                 let mut write_array = arr.try_readwrite()?;\n   60 |                 write_array.as_slice_mut()?.copy_from_slice(data);\n   61 |                 Ok(arr.into_any())\n   62 |             }\n   63 |             3 => {\n   64 |                 let arr =\n   65 |                     PyArray3::<T>::new_bound(py, [height, width, color.num_components()], false);\n   66 |                 //\n   67 |                 let mut write_array = arr.try_readwrite()?;\n   68 |                 write_array.as_slice_mut()?.copy_from_slice(data);\n   69 |                 Ok(arr.into_any())\n   70 |             }\n   71 |             4 => {\n   72 |                 let arr =\n   73 |                     PyArray3::<T>::new_bound(py, [height, width, color.num_components()], false);\n   74 | \n   75 |                 let mut write_array = arr.try_readwrite()?;\n   76 |                 write_array.as_slice_mut()?.copy_from_slice(data);\n   77 |                 Ok(arr.into_any())\n   78 |             }","lines":38}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In `imdecode_inner`, the QOI branch decodes using `JpegDecoder` instead of a QOI\ndecoder: `ImageFormat::QOI => { let mut decoder = JpegDecoder::new(data); ... }`.\nA QOI image will be fed to the JPEG decoder, which will fail or misbehave; QOI\ndecoding via this FFI path is effectively broken.","fix":"Use the QOI decoder (e.g. `zune_image::codecs::qoi::QoiDecoder::new(data)`) in the\nQOI branch, mirroring the JPEG/PNG/BMP branches.","locations":[{"ref":"crates/zune-capi/src/imread.rs:464-469","code":"  464 |             ImageFormat::QOI => {\n  465 |                 // just write into buffer\n  466 |                 let mut decoder = JpegDecoder::new(data);\n  467 | \n  468 |                 decoder.decode_into(output)?;\n  469 |             }","lines":6}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"`EncoderOptions::set_jpeg_encode_progressive` sets the wrong flag: it assigns to\n`self.flags.jpeg_optimize_huffman = yes` instead of\n`self.flags.jpeg_encode_progressive = yes`. As a result, asking for progressive\nJPEG encoding actually toggles optimized huffman tables and never enables\nprogressive mode. The CLI `--progressive` flag (wired through\n`encoder_options` -> `set_jpeg_encode_progressive`) is therefore a no-op for\nprogressive encoding.","fix":"Set `self.flags.jpeg_encode_progressive = yes;` instead of `jpeg_optimize_huffman`.","locations":[{"ref":"crates/zune-core/src/options/encoder.rs:247-250","code":"  247 |     pub fn set_jpeg_encode_progressive(mut self, yes: bool) -> Self {\n  248 |         self.flags.jpeg_optimize_huffman = yes;\n  249 |         self\n  250 |     }","lines":4}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In the CLI color-transform parser, `\"bt-2020\"` is mapped to\n`ColorProfiles::DisplayP3` (identical to the `\"display-p3\"` arm). Selecting the\nBT.2020 color profile silently performs a Display-P3 transform instead, producing\nincorrect colors with no error.","fix":"Map `\"bt-2020\"` to the correct BT.2020 profile variant of `ColorProfiles` (or\nreturn an error if BT.2020 is not yet supported), rather than `DisplayP3`.","locations":[{"ref":"crates/zune-bin/src/cmd_parsers/filters.rs:96-102","code":"   96 |             let color_profile = match value.to_lowercase().as_str() {\n   97 |                 \"rgb\" => ColorProfiles::sRGB,\n   98 |                 \"adobe-rgb\" => ColorProfiles::AdobeRgb,\n   99 |                 \"display-p3\" => ColorProfiles::DisplayP3,\n  100 |                 \"bt-2020\" => ColorProfiles::DisplayP3,\n  101 |                 _ => return Err(format!(\"Unknown color profile: {value}\")),\n  102 |             };","lines":7}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"In `setup_component_params` the per-component `y` (a vertical extent) is computed with horizontal terms: `(img_height * component.horizontal_sample + img.h_max - 1) / img.v_max`. It mixes `horizontal_sample`/`h_max` into a height calculation (the parallel `x` line correctly uses horizontal terms) and also uses truncating `/` instead of `div_ceil`. This is a clear copy-paste from the `x` line; it produces a wrong value, masked only because `component.y` is never read elsewhere.","fix":"If `y` is needed, compute `(img_height * component.vertical_sample).div_ceil(img.v_max)`; otherwise remove the dead `x`/`y`/`w2` fields entirely (see the dead-code finding).","locations":[{"ref":"crates/zune-jpeg/src/misc.rs:232-237","code":"  232 |         let x = (usize::from(img_width) * component.horizontal_sample).div_ceil(img.h_max);\n  233 |         let y = (usize::from(img_height) * component.horizontal_sample + img.h_max - 1) / img.v_max;\n  234 |         component.x = x;\n  235 |         component.w2 = img.mcu_x * component.horizontal_sample * 8;\n  236 |         // probably not needed. :)\n  237 |         component.y = y;","lines":6}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"`ZStatus::new` does not check the result of `zil_malloc`. If `mem` is NULL\n(allocation failure), `libc::strcpy(mem.cast(), msg.as_ptr())` writes through a\nnull pointer -> null-pointer write / UB. The struct's `message` is then also set\nto NULL and later freed/read without a guard.","fix":"Check `mem.is_null()` after `zil_malloc`; on failure store a null message and a\ndistinct status, or fall back to a static message, instead of unconditionally\ncalling `strcpy`.","locations":[{"ref":"crates/zune-capi/src/errno.rs:59-74","code":"   59 |     pub fn new<T>(message: T, status: ZStatusType) -> ZStatus\n   60 |     where\n   61 |         T: Into<Vec<u8>>\n   62 |     {\n   63 |         let msg = CString::new(message).unwrap();\n   64 |         let mem = unsafe { zil_malloc(msg.as_bytes_with_nul().len()) };\n   65 |         // copy to memory\n   66 |         unsafe {\n   67 |             libc::strcpy(mem.cast(), msg.as_ptr());\n   68 |         }\n   69 | \n   70 |         ZStatus {\n   71 |             status,\n   72 |             message: mem.cast()\n   73 |         }\n   74 |     }","lines":16}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"`parse_gama` desynchronizes the chunk stream when a non-strict decoder encounters a\ngAMA chunk whose length is not 4. In strict mode a wrong length is rejected, but in the\ndefault (non-strict) mode the code falls through and unconditionally reads exactly one\nu32 (4 bytes) of data and then `skip(4)` for the CRC. If `chunk.length > 4`, the extra\n`chunk.length - 4` data bytes are never consumed, so the reader is left pointing into\nthe middle of the gAMA payload. The subsequent `read_chunk_header` then interprets\narbitrary bytes as the next chunk length/type, leading to bogus chunk parsing, spurious\n\"unknown but necessary\" errors, or skipping huge/negative amounts. Every other lenient\nchunk parser in this file (e.g. `parse_time`, `parse_actl`, `parse_exif`) correctly\ndoes `self.stream.skip(chunk.length + 4)` on a bad length. gAMA does not, so a single\nmalformed-but-tolerated ancillary chunk corrupts decoding of an otherwise valid image.","fix":"On the non-strict path, when `chunk.length != 4` skip the whole chunk plus CRC and\nreturn, mirroring `parse_time`:\n```\nif chunk.length != 4 {\n    if self.options.strict_mode() { return Err(...); }\n    warn!(...);\n    self.stream.skip(chunk.length + 4)?;\n    return Ok(());\n}\n```","locations":[{"ref":"crates/zune-png/src/headers/readers.rs:195-213","code":"  195 |     pub(crate) fn parse_gama(&mut self, chunk: PngChunk) -> Result<(), PngDecodeErrors> {\n  196 |         if self.options.strict_mode() && chunk.length != 4 {\n  197 |             let error = format!(\"Gama chunk length is not 4 but {}\", chunk.length);\n  198 |             return Err(PngDecodeErrors::Generic(error));\n  199 |         }\n  200 | \n  201 |         let mut gama = (self.stream.get_u32_be() as f64 / 100000.0) as f32;\n  202 |         if gama == 0.0 {\n  203 |             // this is invalid gama\n  204 |             // warn and set it to 2.2 which is the default gama\n  205 |             warn!(\"Gamma value of 0.0 is invalid, setting it to 2.2\");\n  206 |             gama = 1.0 / 2.2;\n  207 |         }\n  208 |         self.png_info.gamma = Some(gama);\n  209 |         // skip crc\n  210 |         self.stream.skip(4)?;\n  211 | \n  212 |         Ok(())\n  213 |     }","lines":19}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`decode_hardware_videotoolbox` calls `decoder.decode_sample(&sample).unwrap()` inside the per-tile\nprocessor closure. `decode_sample` returns `Result<(), OSStatus>`; any VideoToolbox/CoreMedia\nfailure (which can be triggered by malformed parameter sets) panics instead of being surfaced as a\nHeicErrors. The closure already returns `Result<(), HeicErrors>`, so the error could be mapped and\nreturned.","fix":"Replace `.unwrap()` with `.map_err(|s| HeicErrors::Generic { msg: format!(\"decode_sample failed:\n{s}\") })?`.","locations":[{"ref":"crates/zune-heic/src/apple_videotoolbox.rs:513-516","code":"  513 |             if let Some(decoder) = hardware_decoder.as_ref() {\n  514 |                 decoder.decode_sample(&sample).unwrap();\n  515 |             }\n  516 |             Ok(())","lines":4}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"For 16-bit images, several encoders feed raw bytes obtained from `Image::to_u8()`,\nwhich serializes `u16` samples using `Endianness::Native`\n(`u16_to_u8_endian(Endianness::Native)`). Farbfeld is defined as big-endian 16-bit\nRGBA, so on little-endian hosts the bytes handed to `zune_farbfeld::FarbFeldEncoder`\nare byte-swapped relative to the format, producing corrupt output unless the\ndelegate re-swaps them itself (the JPEG encoder path explicitly uses\n`Endianness::Big` for PNG, showing native-endian is not generally safe). The QOI and\nJXL 16-bit paths share the same `to_u8()` native-endian assumption and are suspect\nfor the same reason.","fix":"Use an explicit endianness matching each format's spec (e.g. big-endian for farbfeld)\nvia `frame.u16_to_u8_endian(Endianness::Big)` rather than `to_u8()`'s native endian,\nor verify each delegate encoder expects native-endian byte slices and document it.","locations":[{"ref":"crates/zune-image/src/codecs/farbfeld.rs:111-127","code":"  111 |     fn encode_inner<T: ZByteWriterTrait>(\n  112 |         &mut self, image: &Image, sink: T\n  113 |     ) -> Result<usize, ImageErrors> {\n  114 |         let options = create_options_for_encoder(self.options, image);\n  115 | \n  116 |         assert_eq!(image.depth(), BitDepth::Sixteen);\n  117 | \n  118 |         let data = &image.to_u8()[0];\n  119 | \n  120 |         let encoder = zune_farbfeld::FarbFeldEncoder::new(data, options);\n  121 | \n  122 |         let data = encoder\n  123 |             .encode(sink)\n  124 |             .map_err(<FarbFeldEncoderErrors as Into<ImgEncodeErrors>>::into)?;\n  125 | \n  126 |         Ok(data)\n  127 |     }","lines":17},{"ref":"crates/zune-image/src/image.rs:198-210","code":"  198 |     #[allow(dead_code)]\n  199 |     pub(crate) fn to_u8(&self) -> Vec<Vec<u8>> {\n  200 |         if self.metadata.depth() == BitDepth::Eight {\n  201 |             self.flatten_frames::<u8>()\n  202 |         } else if self.metadata.depth() == BitDepth::Sixteen {\n  203 |             self.frames_ref()\n  204 |                 .iter()\n  205 |                 .map(|z| z.u16_to_u8_endian(Endianness::Native).unwrap())\n  206 |                 .collect()\n  207 |         } else {\n  208 |             todo!(\"Unimplemented\")\n  209 |         }\n  210 |     }","lines":13},{"ref":"crates/zune-image/src/codecs/qoi.rs:105-119","code":"  105 |     fn encode_inner<T: ZByteWriterTrait>(\n  106 |         &mut self, image: &Image, sink: T\n  107 |     ) -> Result<usize, ImageErrors> {\n  108 |         let options = create_options_for_encoder(self.options, image);\n  109 | \n  110 |         let data = &image.to_u8()[0];\n  111 | \n  112 |         let mut qoi_encoder = zune_qoi::QoiEncoder::new(data, options);\n  113 | \n  114 |         let bytes_written = qoi_encoder\n  115 |             .encode(sink)\n  116 |             .map_err(<QoiEncodeErrors as Into<ImgEncodeErrors>>::into)?;\n  117 | \n  118 |         Ok(bytes_written)\n  119 |     }","lines":15},{"ref":"crates/zune-image/src/codecs/jpeg_xl.rs:69-83","code":"   69 |     fn encode_inner<T: ZByteWriterTrait>(\n   70 |         &mut self, image: &Image, sink: T\n   71 |     ) -> Result<usize, ImageErrors> {\n   72 |         let options = create_options_for_encoder(self.options, image);\n   73 | \n   74 |         let data = &image.to_u8()[0];\n   75 | \n   76 |         let encoder = JxlSimpleEncoder::new(data, options);\n   77 | \n   78 |         let data = encoder\n   79 |             .encode(sink)\n   80 |             .map_err(<JxlEncodeErrors as Into<ImgEncodeErrors>>::into)?;\n   81 | \n   82 |         Ok(data)\n   83 |     }","lines":15}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"The Python `imread` decode paths use `.unwrap()` on header-derived metadata after `decode_headers`\nsucceeds: `decoder.dimensions().unwrap()`, `decoder.colorspace().unwrap()`, `decoder.depth().unwrap()`,\netc. (PNG lines 161-164, JPEG 226-227, BMP 245-247, PPM 265-266, PSD 279-280, Qoi 311-312, HDR 331-333).\nWhile these are normally populated after a successful `decode_headers`, the `match decoder.depth().unwrap()`\narm at line 216 reaches `_ => unreachable!()` for any depth other than Eight/Sixteen. PNG can in\nprinciple report other bit depths (1/2/4-bit are expanded, but the `unreachable!` assumes only 8/16\never appear); if a depth slips through it is a panic from the binding rather than a raised Python\nexception. These should be converted to `PyException`s rather than panics for robustness against\nmalformed inputs.","fix":"Convert the `.unwrap()`s on post-header metadata into `?`-propagated `PyException`s, and replace the\n`_ => unreachable!()` depth arm with an explicit error: `d => return Err(PyErr::new::<PyException, _>(\nformat!(\"Unsupported PNG depth {d:?}\")))`.","locations":[{"ref":"crates/zune-python/src/py_functions.rs:161-217","code":"  161 |                     let (width, height) = decoder.dimensions().unwrap();\n  162 |                     let color = decoder.colorspace().unwrap();\n  163 | \n  164 |                     match decoder.depth().unwrap() {\n  165 |                         BitDepth::Eight => {\n  166 |                             let arr = PyArray3::<u8>::zeros_bound(\n  167 |                                 py,\n  168 |                                 [height, width, color.num_components()],\n  169 |                                 false\n  170 |                             );\n  171 |                             let mut write_array = arr.try_readwrite()?;\n  172 |                             let slice = write_array.as_slice_mut()?;\n  173 | \n  174 |                             decoder\n  175 |                                 .decode_into(slice)\n  176 |                                 .map_err(|x| PyErr::new::<PyException, _>(format!(\"{x:?}\")))?;\n  177 | \n  178 |                             return Ok(arr.into_any());\n  179 |                         }\n  180 |                         BitDepth::Sixteen => {\n  181 |                             let arr = PyArray3::<u16>::zeros_bound(\n  182 |                                 py,\n  183 |                                 [height, width, color.num_components()],\n  184 |                                 false\n  185 |                             );\n  186 |                             let mut write_array = arr.try_readwrite()?;\n  187 |                             let slice = write_array.as_slice_mut()?;\n  188 |                             // safety:\n  189 |                             // we can alias strong types to weak types, e.g u16->u8 works, we only care\n  190 |                             // about alignment so it should be fine\n  191 |                             //\n  192 |                             // Reason:\n  193 |                             // Saves us an unnecessary image allocation which is expensive\n  194 |                             let (a, b, c) = unsafe { slice.align_to_mut::<u8>() };\n  195 |                             assert_eq!(a.len(), 0);\n  196 |                             assert_eq!(c.len(), 0);\n  197 |                             assert_eq!(b.len(), width * height * color.num_components() * 2);\n  198 |                             // set sample endianness to match platform\n  199 |                             #[cfg(target_endian = \"little\")]\n  200 |                             {\n  201 |                                 let options = decoder.options().set_byte_endian(ByteEndian::LE);\n  202 |                                 decoder.set_options(options);\n  203 |                             }\n  204 |                             #[cfg(target_endian = \"big\")]\n  205 |                             {\n  206 |                                 let options = decoder.get_options().set_byte_endian(ByteEndian::BE);\n  207 |                                 decoder.set_options(options);\n  208 |                             }\n  209 | \n  210 |                             decoder\n  211 |                                 .decode_into(b)\n  212 |                                 .map_err(|x| PyErr::new::<PyException, _>(format!(\"{x:?}\")))?;\n  213 | \n  214 |                             return Ok(arr.into_any());\n  215 |                         }\n  216 |                         _ => unreachable!()\n  217 |                     }","lines":57}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`QoiDecoder::output_buffer_size` returns `Option<usize>` to signal overflow, but the inner\n`width.checked_mul(self.height).unwrap()` panics instead of returning `None` when\n`width*height` overflows `usize`. `decode()` and `decode_into` then call\n`output_buffer_size().unwrap()` again. With caller-raised `set_max_width`/`set_max_height`\nlimits (each up to `u32::MAX` from the header), `width*height` can overflow on the inner\n`unwrap`, turning a recoverable condition into a panic on attacker-controlled dimensions.\nThe doc comment even advertises \"# Panics\", which contradicts the `Option` contract.","fix":"Use a fully checked chain that returns None on any overflow:\n`self.width.checked_mul(self.height)?.checked_mul(self.colorspace.num_components())`\nand have `decode`/`decode_into` map a `None` to an error instead of unwrapping.","locations":[{"ref":"crates/zune-qoi/src/decoder.rs:196-205","code":"  196 |     pub fn output_buffer_size(&self) -> Option<usize> {\n  197 |         if self.decoded_headers {\n  198 |             self.width\n  199 |                 .checked_mul(self.height)\n  200 |                 .unwrap()\n  201 |                 .checked_mul(self.colorspace.num_components())\n  202 |         } else {\n  203 |             None\n  204 |         }\n  205 |     }","lines":10},{"ref":"crates/zune-qoi/src/decoder.rs:222-231","code":"  222 |     pub fn decode(&mut self) -> Result<Vec<u8>, QoiErrors> {\n  223 |         if !self.decoded_headers {\n  224 |             self.decode_headers()?;\n  225 |         }\n  226 |         let mut output = vec![0; self.output_buffer_size().unwrap()];\n  227 | \n  228 |         self.decode_into(&mut output)?;\n  229 | \n  230 |         Ok(output)\n  231 |     }","lines":10},{"ref":"crates/zune-qoi/src/decoder.rs:251-256","code":"  251 |         if pixels.len() < self.output_buffer_size().unwrap() {\n  252 |             return Err(QoiErrors::InsufficientData(\n  253 |                 self.output_buffer_size().unwrap(),\n  254 |                 pixels.len()\n  255 |             ));\n  256 |         }","lines":6}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`ZReader::write_all` increments `self.bytes_written += buf.len()` after\n`self.buffer.write_all_bytes(buf)?`. While the `?` guards the all-or-nothing\ncontract, the std `Write` implementation's `write_all` and the Vec impl always\nwrite all bytes, but the `&mut [u8]` no_std impl returns `NotEnoughBuffer` and\nwrites nothing on failure - so the `?` correctly short-circuits. The subtle issue\nis more in the partial path: `write` (line 42-46) adds the actually-written count,\nbut there is no observable bug here. Lower-confidence; primarily flagged because\n`bytes_written` is trusted by encoders as an exact output length.","fix":"No change strictly required; if desired, document that `bytes_written` reflects\nrequested-and-confirmed bytes. Consider asserting consistency in debug builds.","locations":[{"ref":"crates/zune-core/src/bytestream/writer.rs:41-61","code":"   41 |     #[inline]\n   42 |     pub fn write(&mut self, buf: &[u8]) -> Result<usize, ZByteIoError> {\n   43 |         let bytes_written = self.buffer.write_bytes(buf)?;\n   44 |         self.bytes_written += bytes_written;\n   45 |         Ok(bytes_written)\n   46 |     }\n   47 |     /// Write all bytes from `buf` into the bytestream and return\n   48 |     /// and panic if not all bytes were written to the bytestream\n   49 |     ///\n   50 |     /// # Arguments\n   51 |     /// - `buf`: The bytes to be written into the bytestream\n   52 |     ///\n   53 |     ///# Returns\n   54 |     /// - `Ok(())`: Indicates all bytes were written into the bytestream\n   55 |     /// - `Err(&static str)`: In case all the bytes could not be written\n   56 |     ///   to the stream\n   57 |     pub fn write_all(&mut self, buf: &[u8]) -> Result<(), ZByteIoError> {\n   58 |         self.buffer.write_all_bytes(buf)?;\n   59 |         self.bytes_written += buf.len();\n   60 |         Ok(())\n   61 |     }","lines":21}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`extract_icc_profile_inner` unwraps `iprp.ipco.as_ref().unwrap()` inside the loop, but the caller\n`decode_headers` ignores its result entirely (`let _ = self.extract_icc_profile_inner();`). The\nfunction returns Option<()> and uses `?` for the outer accesses, yet the inner `.unwrap()` on\n`ipco` will panic if iprp exists but ipco is None (a legal-but-unusual structure). Since the return\nvalue is discarded the panic is the only observable effect.","fix":"Replace `iprp.ipco.as_ref().unwrap()` with `iprp.ipco.as_ref()?` to propagate None instead of panicking.","locations":[{"ref":"crates/zune-heic/src/decoder.rs:672-690","code":"  672 |     #[allow(clippy::collapsible_if,clippy::collapsible_match)]\n  673 |     fn extract_icc_profile_inner(&mut self) -> Option<()> {\n  674 |         let iprp = self.meta_section.as_ref()?.iprp.as_ref()?;\n  675 | \n  676 |         // 2. Iterate through the properties in 'ipco'\n  677 |         for item in &iprp.ipco.as_ref().unwrap().properties {\n  678 |             if let ItemProperty::Colr(c) = item {\n  679 |                 if let ColourInformation::IccProfile {\n  680 |                     profile_type: _,\n  681 |                     profile_data,\n  682 |                 } = c {\n  683 |                     trace!(\"Icc profile ({} bytes)\", profile_data.len());\n  684 |                     self.icc_data = Some(profile_data.clone());\n  685 |                     break;\n  686 |                 }\n  687 |             }\n  688 |         }\n  689 |         Some(())\n  690 |     }","lines":19}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`swizzle_channels`'s single-channel branch uses `output.copy_from_slice(...)`, which\npanics if `output.len() != channel.len()`, whereas every other arm tolerates a\nmismatched/shorter `output` by using `chunks_exact_mut` and clamping the returned size\nwith `min`. The documented contract says the function \"will ignore\" when output is\nsmaller, but the 1-channel path violates that and panics instead.","fix":"For the 1-channel case copy `min(output.len(), src.len())` elements (e.g. via\n`output[..n].copy_from_slice(&src[..n])`) to match the documented behavior of the\nother arms.","locations":[{"ref":"crates/zune-image/src/utils.rs:118-139","code":"  118 | pub fn swizzle_channels<T: Copy + Default + 'static>(\n  119 |     channels: &[Channel], output: &mut [T]\n  120 | ) -> Result<usize, ChannelErrors> {\n  121 |     match channels.len() {\n  122 |         0 => Ok(0),\n  123 |         // copy\n  124 |         1 => {\n  125 |             output.copy_from_slice(channels[0].reinterpret_as()?);\n  126 |             Ok(output.len())\n  127 |         }\n  128 |         2 => {\n  129 |             for ((output, a), b) in output\n  130 |                 .chunks_exact_mut(2)\n  131 |                 .zip(channels[0].reinterpret_as()?.iter())\n  132 |                 .zip(channels[1].reinterpret_as()?.iter())\n  133 |             {\n  134 |                 output[0] = *a;\n  135 |                 output[1] = *b;\n  136 |             }\n  137 |             let size = min(channels[0].reinterpret_as::<T>()?.len() * 2, output.len());\n  138 |             Ok(size)\n  139 |         }","lines":22}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"PNG chunk CRCs are never verified during decoding. `read_chunk_header` reads only the\nlength and type, and every `parse_*` routine ends with `self.stream.skip(4)` to step\nover the CRC field without ever computing or comparing it. The `crc` module\n(`calc_crc`, `crc32_slice8`) exists and is used by the encoder, and `PngDecodeErrors`\neven has a `BadCrc(u32,u32)` variant, but the decoder path never produces it. This means\ncorrupted chunk payloads that still satisfy the length checks are accepted silently.\nThis is a deliberate speed tradeoff, but combined with the gAMA desync above it removes a\nsafety net; at minimum it is worth a `confirm_checksum`-style option as zune-inflate has.","fix":"Optionally validate the CRC: capture the chunk bytes (type+data), compute\n`calc_crc`, compare against the trailing 4 bytes, and return `PngDecodeErrors::BadCrc`\non mismatch when a (new) strict/verify option is enabled. At least expose it behind a\nDecoderOptions flag instead of always discarding the CRC.\"","locations":[{"ref":"crates/zune-png/src/decoder.rs:526-560","code":"  526 |     pub(crate) fn read_chunk_header(&mut self) -> Result<PngChunk, PngDecodeErrors> {\n  527 |         // Format is length - chunk type - [data] -  crc chunk, load crc chunk now\n  528 |         let chunk_length = self.stream.get_u32_be_err()? as usize;\n  529 |         let chunk_type_int = self.stream.get_u32_be_err()?.to_be_bytes();\n  530 | \n  531 |         let chunk_type = match &chunk_type_int {\n  532 |             b\"IHDR\" => PngChunkType::IHDR,\n  533 |             b\"tRNS\" => PngChunkType::tRNS,\n  534 |             b\"PLTE\" => PngChunkType::PLTE,\n  535 |             b\"IDAT\" => PngChunkType::IDAT,\n  536 |             b\"IEND\" => PngChunkType::IEND,\n  537 |             b\"pHYs\" => PngChunkType::pHYs,\n  538 |             b\"tIME\" => PngChunkType::tIME,\n  539 |             b\"gAMA\" => PngChunkType::gAMA,\n  540 |             b\"acTL\" => PngChunkType::acTL,\n  541 |             b\"fcTL\" => PngChunkType::fcTL,\n  542 |             b\"iCCP\" => PngChunkType::iCCP,\n  543 |             b\"iTXt\" => PngChunkType::iTXt,\n  544 |             b\"eXIf\" => PngChunkType::eXIf,\n  545 |             b\"zTXt\" => PngChunkType::zTXt,\n  546 |             b\"tEXt\" => PngChunkType::tEXt,\n  547 |             b\"fdAT\" => PngChunkType::fdAT,\n  548 |             b\"cHRM\" => PngChunkType::cHRM,\n  549 |             b\"cLLI\" => PngChunkType::cLLI,\n  550 |             b\"cICP\" => PngChunkType::cICP,\n  551 |             b\"sBIT\" => PngChunkType::sBIT,\n  552 |             _ => PngChunkType::unkn,\n  553 |         };\n  554 | \n  555 |         Ok(PngChunk {\n  556 |             length: chunk_length,\n  557 |             chunk: chunk_type_int,\n  558 |             chunk_type,\n  559 |         })\n  560 |     }","lines":35},{"ref":"crates/zune-png/src/crc.rs:47-52","code":"   47 | pub fn calc_crc(data: &[u8]) -> u32 {\n   48 |     !crc32_slice8(data, u32::MAX)\n   49 | }\n   50 | pub fn calc_crc_with_bytes(data: &[u8], value: u32) -> u32 {\n   51 |     crc32_slice8(data, value)\n   52 | }","lines":6}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"The `test_status_works` test creates a status with `zil_status_new()` and frees it\nwith `zil_free(c.cast())` instead of `zil_status_free`. This bypasses the Drop /\nmessage cleanup, leaking the internal `message` buffer. While only a test, it also\nmodels incorrect usage (the message buffer must be freed via `zil_status_free`).","fix":"Free with `zil_status_free(c)` in the test to exercise the correct teardown path.","locations":[{"ref":"crates/zune-capi/src/lib.rs:64-74","code":"   64 | #[test]\n   65 | fn test_status_works() {\n   66 |     use crate::errno::zil_status_new;\n   67 |     use crate::utils::zil_free;\n   68 | \n   69 |     unsafe {\n   70 |         let c = zil_status_new();\n   71 |         assert!(!c.is_null());\n   72 |         zil_free(c.cast());\n   73 |     }\n   74 | }","lines":11}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`par_process_regions_out_of_place` exposes inconsistent slice semantics that are easy\nto misuse. The destination channels are sliced to the region range\n(`from_raw_parts_mut(ptr.add(start_idx), slice_len)`), so they are region-relative and\nzero-based. The source channels, however, are handed out as the *entire* channel\nslice (`current_src[c] = src_ptrs[c]`), so consumers must index them with absolute\noffsets (`start_idx + ...`) while indexing dest with region-relative offsets. The two\nsides use different coordinate origins for the same region, which is a subtle trap\neven though it matches the doc comment \"entire immutable source\".","fix":"Either slice the source the same way as the dest (region-relative) and expose only the\nregion, or rename/document the field to make the absolute-offset contract explicit and\nprovide the `y_offset`/`start_idx` so callers compute the source index correctly.","locations":[{"ref":"crates/zune-image/src/planar_regions.rs:186-223","code":"  186 |             (0..num_regions).into_par_iter().for_each(|i| {\n  187 |                 let y_offset = i * lines_per_region;\n  188 |                 let current_height = std::cmp::min(lines_per_region, height - y_offset);\n  189 | \n  190 |                 let start_idx = y_offset * width;\n  191 |                 let end_idx = start_idx + (current_height * width);\n  192 | \n  193 |                 let mut current_src: [&[T]; MAX_SUPPORTED_CHANNELS] =\n  194 |                     std::array::from_fn(|_| &[] as &[T]);\n  195 | \n  196 |                 let mut current_dest: [&mut [T]; MAX_SUPPORTED_CHANNELS] =\n  197 |                     std::array::from_fn(|_| &mut [] as &mut [T]);\n  198 | \n  199 |                 for c in 0..num_channels {\n  200 |                     let safe_end = std::cmp::min(end_idx, lengths[c]);\n  201 |                     let slice_len = safe_end.saturating_sub(start_idx);\n  202 | \n  203 |                     unsafe {\n  204 |                         current_src[c] =\n  205 |                             if let Some(src_slice) = src_ptrs[c] { src_slice } else { &[] };\n  206 |                         // Dest is strictly chunked\n  207 |                         current_dest[c] = std::slice::from_raw_parts_mut(\n  208 |                             dest_ptrs[c].0.add(start_idx),\n  209 |                             slice_len,\n  210 |                         );\n  211 |                     }\n  212 |                 }\n  213 | \n  214 |                 let mut region = PlanarRegionOut {\n  215 |                     y_offset,\n  216 |                     height: current_height,\n  217 |                     width,\n  218 |                     src_channels: &current_src[..num_channels],\n  219 |                     dest_channels: &mut current_dest[..num_channels],\n  220 |                 };\n  221 | \n  222 |                 op(&mut region);\n  223 |             });","lines":38}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`Image::flatten_to_u8`/`flatten_to_u16` clone the entire image (all frames, all\nchannels) when a depth conversion is required, then run `Depth::execute` on the clone\nand flatten it. For large images this doubles peak memory and copies the whole buffer\nsolely to avoid mutating `self`. The same whole-image clone pattern is used by\n`EncoderTrait::encode` whenever a colorspace/depth/alpha conversion is needed. This is\nacknowledged in the crate docs but remains a real cost for the common\n\"open f32/16-bit, save as 8-bit\" path.","fix":"Where the public method already produces an owned result (a fresh Vec), convert the\nchannel data directly into the output without cloning the source image; or provide a\nconsuming `into_flatten`/`into_depth` API for callers that do not need the original.","locations":[{"ref":"crates/zune-image/src/image.rs:234-278","code":"  234 |     pub fn flatten_to_u8(&self) -> Vec<Vec<u8>> {\n  235 |         if self.depth() == BitDepth::Eight {\n  236 |             self.flatten_frames::<u8>()\n  237 |         } else {\n  238 |             let mut im_clone = self.clone();\n  239 |             Depth::new(BitDepth::Eight).execute(&mut im_clone).unwrap();\n  240 |             im_clone.flatten_frames::<u8>()\n  241 |         }\n  242 |     }\n  243 |     /// Flatten every channel of every frame into a `Vec<Vec<u16>>`.\n  244 |     ///\n  245 |     /// Each inner `Vec<u16>` corresponds to one channel (in channel order),\n  246 |     /// and contains every pixel in that channel laid out in row-major order.\n  247 |     ///\n  248 |     /// If the image is already 16-bit the channel data is copied directly.\n  249 |     /// Otherwise the image is cloned and converted to 16-bit before flattening;\n  250 |     /// the original image is left unchanged.\n  251 |     ///\n  252 |     /// # Panics\n  253 |     ///\n  254 |     /// Panics if the internal depth conversion fails.\n  255 |     ///\n  256 |     /// # Example\n  257 |     ///\n  258 |     /// ```rust\n  259 |     /// use zune_core::colorspace::ColorSpace;\n  260 |     /// use zune_image::image::Image;\n  261 |     ///\n  262 |     /// let image = Image::from_u8(&[0, 128, 255], 3, 1, ColorSpace::Luma);\n  263 |     /// let channels = image.flatten_to_u16();\n  264 |     /// // values are scaled from 8-bit to 16-bit\n  265 |     /// assert_eq!(channels[0][0], 0);\n  266 |     /// assert_eq!(channels[0][2], 65535);\n  267 |     /// ```\n  268 |     pub fn flatten_to_u16(&self) -> Vec<Vec<u16>> {\n  269 |         if self.depth() == BitDepth::Sixteen {\n  270 |             self.flatten_frames::<u16>()\n  271 |         } else {\n  272 |             let mut im_clone = self.clone();\n  273 |             Depth::new(BitDepth::Sixteen)\n  274 |                 .execute(&mut im_clone)\n  275 |                 .unwrap();\n  276 |             im_clone.flatten_frames::<u16>()\n  277 |         }\n  278 |     }","lines":45},{"ref":"crates/zune-image/src/traits.rs:356-398","code":"  356 |         if !supported_colorspaces.contains(&colorspace)\n  357 |             || !self.supported_bit_depth().contains(&depth)\n  358 |             || image.metadata.alpha != NonPreMultiplied\n  359 |         {\n  360 |             let mut image_clone = image.clone();\n  361 | \n  362 |             if !supported_colorspaces.contains(&colorspace) {\n  363 |                 // get default colorspace\n  364 |                 let default_colorspace = self.default_colorspace(colorspace);\n  365 |                 let image_format = self.format();\n  366 | \n  367 |                 trace!(\"Image is in {colorspace:?} colorspace,converting it to {default_colorspace:?} which is the default configured colorspace of {image_format:?}\");\n  368 |                 // try converting  it to a supported colorspace\n  369 |                 let converter = ColorspaceConv::new(default_colorspace);\n  370 | \n  371 |                 converter.execute(&mut image_clone)?\n  372 |             }\n  373 |             let image_depth = image.depth();\n  374 | \n  375 |             if !self.supported_bit_depth().contains(&depth) {\n  376 |                 trace!(\n  377 |                     \"Image depth is in {:?}, but {} encoder supports {:?}\",\n  378 |                     image.depth(),\n  379 |                     self.name(),\n  380 |                     self.supported_bit_depth()\n  381 |                 );\n  382 |                 trace!(\n  383 |                     \"Converting image to a depth of {:?}\",\n  384 |                     self.default_depth(image_depth)\n  385 |                 );\n  386 | \n  387 |                 let depth = Depth::new(self.default_depth(image_depth));\n  388 | \n  389 |                 depth.execute(&mut image_clone)?;\n  390 |             }\n  391 | \n  392 |             // confirm again we didn't mess up\n  393 |             confirm_invariants(&image_clone)?;\n  394 | \n  395 |             self.encode_inner(&image_clone, sink)\n  396 |         } else {\n  397 |             self.encode_inner(image, sink)\n  398 |         }","lines":43}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `BmpDecoder::decode_headers`, when an ICC/color-profile is present (BMP v5,\n`ihsize > 108`) the decoder eagerly seeks to the profile offset and copies the profile\nbytes during header parsing, even though the profile normally sits AFTER the pixel data.\nThe in-code comment (`[tag=perf]`) acknowledges this forces an extra seek/jump on a path\nthat is hit for every v5 image regardless of whether the caller wants the ICC profile.","fix":"Defer ICC profile extraction until `icc_profile()` is actually called, or read it lazily\nafter pixel decoding, to avoid the seek during header parsing for callers that ignore it.","locations":[{"ref":"crates/zune-bmp/src/decoder.rs:405-437","code":"  405 |                         // NB: (cae) [tag=perf]: The main format is usually to have the profile\n  406 |                         // after pixels, so this may cause unnecessary jumps/seeks\n  407 |                         // but that's okay, as I prefer it here to confirm to the notion\n  408 |                         // that all headers are decoded after calling decode_header()\n  409 | \n  410 |                         let icc_bytes = self.bytes.peek_at(\n  411 |                             true_position.saturating_sub(current_pos) as usize,\n  412 |                             profile_size as usize\n  413 |                         );\n  414 |                         match icc_bytes {\n  415 |                             Ok(bytes) => {\n  416 |                                 if colorspace_type == PROFILE_LINKED {\n  417 |                                     // NB: (cae) [tag=bug]: The format is windows characters.\n  418 |                                     // but I don't feel like adding the encoding_rs crate\n  419 |                                     // to correctly map the characters, so those that can't\n  420 |                                     // be represented by utf-8 will be filled with the replacement\n  421 |                                     // character\n  422 | \n  423 |                                     trace!(\n  424 |                                         \"File: {}\",\n  425 |                                         alloc::string::String::from_utf8_lossy(bytes)\n  426 |                                     );\n  427 |                                 }\n  428 |                                 if colorspace_type == PROFILE_EMBEDDED {\n  429 |                                     trace!(\"Read ICC profile from BMP file\");\n  430 |                                     self.icc_bytes = Some(bytes.to_vec())\n  431 |                                 }\n  432 |                             }\n  433 |                             Err(e) => {\n  434 |                                 error!(\"Error reading ICC profile. {e:?}\");\n  435 |                             }\n  436 |                         }\n  437 |                     }","lines":33}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`load_exif_data` reads the EXIF blob one byte at a time in a loop, each iteration calling\n`self.stream.read_fixed_bytes_or_error::<1>()?[0]`, for `exif_data_length` bytes (can be megabytes).\nThis is far slower than a single `read_exact_bytes(&mut exif_bytes)` call and produces a per-byte\nfallible call overhead.","fix":"Allocate `vec![0; exif_data_length]` and read it in one `read_exact_bytes(&mut exif_bytes)` call.","locations":[{"ref":"crates/zune-heic/src/decoder.rs:645-653","code":"  645 |         if exif_data_length > 0 {\n  646 |             trace!(\"Exif data length: ({exif_data_length} bytes)\");\n  647 |             let mut exif_bytes = vec![0; exif_data_length];\n  648 |             for i in 0..exif_data_length {\n  649 |                 exif_bytes[i] = self.stream.read_fixed_bytes_or_error::<1>()?[0];\n  650 | n  147 |                 image.par_process_regions_out_of_place::<f32, _>(\n  148 |                     &mut dest_image,\n  149 |                     true,\n  150 |                     |region| {\n  151 |                         let _ = convolve_region(region, &self.weights, self.scale);\n  152 |                     },\n  153 |                 )?;\n  154 |             }\n  155 |             d => return Err(ImageErrors::ImageOperationNotImplemented(self.name(), d)),\n  156 |         }\n  157 | \n  158 |         // Overwrite original image with the convolved output\n  159 |         *image = dest_image;","lines":36},{"ref":"crates/zune-imageprocs/src/median.rs:110-135","code":"  110 |         // Pre-allocate the destination buffer\n  111 |         let mut dest_image = image.clone();\n  112 | \n  113 |         // Median usually ignores alpha channel\n  114 |         let ignore_alpha = true;\n  115 | \n  116 |         match depth.bit_type() {\n  117 |             BitType::U8 => {\n  118 |                 image.par_process_regions_out_of_place::<u8, _>(\n  119 |                     &mut dest_image,\n  120 |                     ignore_alpha,\n  121 |                     |region| median_region_u8(region, self.radius),\n  122 |                 )?;\n  123 |             }\n  124 |             BitType::U16 => {\n  125 |                 image.par_process_regions_out_of_place::<u16, _>(\n  126 |                     &mut dest_image,\n  127 |                     ignore_alpha,\n  128 |                     |region| median_region_u16(region, self.radius),\n  129 |                 )?;\n  130 |             }\n  131 |             d => return Err(ImageErrors::ImageOperationNotImplemented(self.name(), d)),\n  132 |         }\n  133 | \n  134 |         // Overwrite the original image\n  135 |         *image = dest_image;","lines":26},{"ref":"crates/zune-imageprocs/src/sobel.rs:61-98","code":"   61 |         // Pre-allocate the destination buffer\n   62 |         let mut dest_image = image.c >(\n   48 |                     &mut dest_image,\n   49 |                     ignore_alpha,\n   50 |                     |region| {\n   51 |                         spatial_region(region, self.radius, self.operation);\n   52 |                     },\n   53 |                 )?;\n   54 |             }\n   55 |             d => return Err(ImageErrors::ImageOperationNotImplemented(self.name(), d)),\n   56 |         }\n   57 | \n   58 |         *image = dest_image;","lines":27}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In the one-shot deflate fast loop, `start_deflate_block_inner` checks output-buffer\nheadroom inside the inner `'sequence` loop with `dest_offset + FASTLOOP_MAX_BYTES_WRITTEN\n> out_block.len()` and, when short, resizes by only `FASTLOOP_MAX_BYTES_WRITTEN +\nRESIZE_BY` (decoder.rs:721-724). Because the growth increment is a small fixed amount\n(~4KB + ~280) rather than geometric, decoding a large stream into the default\nsize_hint-sized vector triggers many repeated `Vec::resize` reallocations/copies in the\nhottest loop. A geometric growth policy (e.g. doubling) would amortize reallocation cost.\nThis is a throughput concern, not a correctness one.","fix":"Grow the output buffer geometrically (e.g. `out_block.len().max(... ) * 2` capped at the\nconfigured limit) rather than by a fixed `RESIZE_BY` step, so repeated growth is O(log n)\nreallocations instead of O(n).\"","locations":[{"ref":"crates/zune-inflate/src/decoder.rs:719-724","code":"  719 |                         // Resize the output vector here to ensure we can always have\n  720 |                         // enough space for sloppy copies\n  721 |                         if dest_offset + FASTLOOP_MAX_BYTES_WRITTEN > out_block.len() {\n  722 |                             let curr_len = out_block.len();\n  723 |                             out_block.resize(curr_len + FASTLOOP_MAX_BYTES_WRITTEN + RESIZE_BY, 0)\n  724 |                         }","lines":6}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`to_numpy_from_bytes` (py_functions.rs) allocates the numpy array and then `copy_from_slice`s the\ndecoded buffer into it (lines 49-77). For PPM/PSD this is the documented double-allocation, but the\n4 match arms for 1/2/3/4 components are identical except for the shape of the 2-component+ arms\nversus the 1-component arm; the 2/3/4 arms are byte-for-byte duplicates (lines 55-78) and differ\nonly in nothing - they all build `PyArray3` with `[height, width, color.num_components()]`. This is\npure duplicate code that could be a single arm `2 | 3 | 4 => {...}`.","fix":"Collapse the `2`, `3`, `4` arms into one `2..=4 =>` arm building the `PyArray3`; keep the `1 =>` arm and the catch-all error arm.","locations":[{"ref":"crates/zune-python/src/py_functions.rs:46-83","code":"   46 |     unsafe {\n   47 |         return match color.num_components() {\n   48 |             1 => {\n   49 |                 let arr = PyArray2::<T>::new_bound(py, [height, width], false);\n   50 |                 let mut write_array = arr.try_readwrite()?;\n   51 |                 write_array.as_slice_mut()?.copy_from_slice(data);\n   52 | \n   53 |                 Ok(arr.into_any())\n   54 |             }\n   55 |             2 => {\n   56 |                 let arr =\n   57 |                     PyArray3::<T>::new_bound(py, [height, width, color.num_components()], false);\n   58 |                 //\n   59 |                 let mut write_array = arr.try_readwrite()?;\n   60 |                 write_array.as_slice_mut()?.copy_from_slice(data);\n   61 |                 Ok(arr.into_any())\n   62 |             }\n   63 |             3 => {\n   64 |                 let arr =\n   65 |                     PyArray3::<T>::new_bound(py, [height, width, color.num_components()], false);\n   66 |                 //\n   67 |                 let mut write_array = arr.try_readwrite()?;\n   68 |                 write_array.as_slice_mut()?.copy_from_slice(data);\n   69 |                 Ok(arr.into_any())\n   70 |             }\n   71 |             4 => {\n   72 |                 let arr =\n   73 |                     PyArray3::<T>::new_bound(py, [height, width, color.num_components()], false);\n   74 | \n   75 |                 let mut write_array = arr.try_readwrite()?;\n   76 |                 write_array.as_slice_mut()?.copy_from_slice(data);\n   77 |                 Ok(arr.into_any())\n   78 |             }\n   79 |             e => Err(PyErr::new::<PyException, _>(format!(\n   80 |                 \"Unimplemented color components {e}\"\n   81 |             )))\n   82 |         };\n   83 |     }","lines":38}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In the WASM `decode` error branch, when `format.decoder(content)` returns `Err`, the code logs the\nerror by calling `format.decoder(ZCursor::new(bytes))` a SECOND time just to extract `.err()`\n(lines 516-520). This re-runs decoder construction (and re-reads the header) purely for the log\nmessage, doubling that work on every failed decode. The original error from the first\n`format.decoder(content)` call was discarded by the `if let Ok(...)` instead of being captured.","fix":"Capture the first error: `match format.decoder(content) { Ok(mut decoder) => {...}\nErr(e) => error!(\"Could not decode {:?}\", e) }` instead of re-calling `format.decoder`.","locations":[{"ref":"crates/zune-wasm/src/lib.rs:507-521","code":"  507 |     if let Some((format, content)) = ImageFormat::guess_format(ZCursor::new(bytes)) {\n  508 |         if let Ok(mut decoder) = format.decoder(content) {\n  509 |             let mut image = decoder.decode().unwrap();\n  510 | \n  511 |             // WASM works with 8 bit images, so convert this to an 8 biy image\n  512 |             Depth::new(BitDepth::Eight).execute(&mut image).unwrap();\n  513 | \n  514 | 2 | ///  │                 iinf (Item Information Box)                 │\n  223 | ///  ├─────────┬─────────┬───────────────────┬─────────────────────┤\n  224 | ///  │ Offset  │ Size    │ Field Name        │ Description         │\n  225 | ///  ├─────────┼─────────┼───────────────────┼─────────────────────┤\n  226 | ///  │         │         │                   │                     │\n  227 | ///  │  0x00   │ 4 bytes │ size              │ Total box size      │\n  228 | ///  │  0x04   │ 4 bytes │ type              │ 'iinf'              │\n  229 | ///  │         │         │                   │                     │\n  230 | ///  ├─────────┼─────────┼───────────────────┼─────────────────────┤\n  231 | ///  │         │         │                   │                     │\n  232 | ///  │  0x08   │ 1 byte  │ version           │ 0x00, 0x01, or 0x02 │\n  233 | ///  │  0x09   │ 3 bytes │ flags             │ Usually 0x000000    │\n  234 | ///  │         │         │                   │                     │\n  235 | ///  ├─────────┼─────────┼───────────────────┼─────────────────────┤\n  236 | ///  │         │         │                   │                     │\n  237 | ///  │  0x0C   │ 2 or 4  │ entry_count       │ Number of items in  │\n  238 | ///  │         │ bytes   │                   │ the file (e.g., 51) │\n  239 | ///  │         │         │                   │                     │\n  240 | ///  ├─────────┼─────────┼───────────────────┼─────────────────────┤\n  241 | ///  │         │         │                   │                     │\n  242 | ///  │Variable │Variable │ entries[]         │ A sequential list   │\n  243 | ///  │         │         │                   │ of 'infe' child     │\n  244 | ///  │         │         │                   │ boxes.              │\n  245 | ///  │         │         │                   │                     │\n  246 | ///  └─────────┴─────────┴───────────────────┴─────────────────────┘\n  247 | /// ```\n  248 | pub fn decode_iinf<R: ZByteRe ock_inner` is a single ~590-line function containing the entire deflate\nstate machine: stored-block handling, the unrolled fast literal/match loop, the slow\nloop, multiple nested `'decode`/`'sequence`/`'match_lengths` labelled loops, and inline\nerror/truncation handling. The logic is duplicated almost verbatim between the one-shot\ndecoder (decoder.rs) and the streaming decoder's `decode_data` (streaming_decoder.rs),\nincluding the fast-literal unrolling and the rep-match copy variants. This makes the\nhot, security-sensitive code hard to audit and means bug fixes (such as the index clamp\nnoted separately) must be applied in two places and can drift. Consider extracting the\nshared match-copy / literal-decode primitives so the two decoders share one\nimplementation.","fix":"Factor the common per-symbol decode steps (fast literal unroll, length/offset extraction,\nrep-match copy) into shared helper functions/macros used by both the one-shot and\nstreaming decoders, reducing the duplicated hot loop and keeping bounds/clamp logic in\none place.","locations":[{"ref":"crates/zune-inflate/src/decoder.rs:554-1141","code":"  554 |     #[allow(unused_assignments)]\n  555 |     #[allow(clippy::never_loop)]\n  556 |     fn start_deflate_block_inner(\n  557 |         &mut self, out_block: &mut Vec<u8>,\n  558 |     ) -> Result<(), InflateDecodeErrors> {\n  559 |         // start deflate decode\n  560 |         // re-read the stream so that we can remove code read by zlib\n  561 |         self.stream = BitStreamReader::new(&self.data[self.position..], true);\n  562 | \n  563 |         self.stream.refill();\n  564 | \n  565 |         // Output space for our decoded bytes.\n  566 |         // bits used\n  567 | \n  568 |         let mut src_offset = 0;\n  569 |         let mut dest_offset = 0;\n  570 | \n  571 |         loop {\n  572 |             self.stream.refill();\n  573 | \n  574 |             self.is_last_block = self.stream.get_bits(1) == 1;\n  575 |             let bl nconsistent. Current\ncallers happen to stay in bounds, so this is a latent unsafe-correctness hazard\nrather than an active OOB, but the safety guard does not actually cover the\nunsafe accesses.","fix":"Make the asserts cover the full access span: `7*in_stride + 8 <= in_matrix.len()` (u8) and `3*in_stride + 4 <= in_matrix.len()` (f32), matching the u16 version.","locations":[{"ref":"crates/zune-imageprocs/src/transpose/sse41.rs:138-146","code":"  138 | unsafe fn transpose_8_by_8_u8(\n  139 |     in_matrix: &[u8], out: &mut [u8], in_stride: usize, out_stride: usize\n  140 | ) {\n  141 |     // Godbolt :https://godbolt.org/z/axoorxT8o\n  142 |     // Stack overflow: https://stackoverflow.com/a/42316675\n  143 | \n  144 |     assert!((7 * out_stride) <= out.len());\n  145 | \n  146 |     assert!((7 * in_stride) <= in_matrix.len());","lines":9},{"ref":"crates/zune-imageprocs/src/transpose/sse41.rs:425-431","code":"  425 | #[target_feature(enable = \"sse4.1\")]\n  426 | unsafe fn transpose_sse_float_4x4_inner(\n  427 |     in_matrix: &[f32], out: &mut [f32], in_stride: usize, out_stride: usize\n  428 | ) {\n  429 |     assert!((3 * out_stride) <= out.len());\n  430 | \n  431 |     assert!((3 * in_stride) <= in_matrix.len());","lines":7},{"ref":"crates/zune-imageprocs/src/transpose/sse41.rs:79-85","code":"   79 | unsafe fn transpose_8_by_8_u16(\n   80 |     in_matrix: &[u16], out: &mut [u16], in_stride: usize, out_stride: usize,\n   81 | )\n   82 | {\n   83 |     // ensure the writes are safe\n   84 |     assert!(in_stride * 7 + 8 <= in_matrix.len(), \"{},{}\", in_stride * 7 + 8, in_matrix.len());\n   85 |     assert!(out_stride * 7 + 8 <= out.len());","lines":7}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"negligible","easy":false,"description":"Skipped files (auto-generated / table-only or trivial, no findings): cabac_tables.rs (CABAC init\ntables), idct/x86_64.rs, idct/aarch64.rs, idct/std_simd.rs (SIMD IDCT kernels, large constant\ntables and ar
