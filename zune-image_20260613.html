<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`ZStatus::new` calls `CString::new(message).unwrap()`. The message comes from\narbitrary error strings (and in some paths from data influenced by inputs). If the\nmessage contains an interior NUL byte, `CString::new` returns Err and `unwrap`\npanics. This panic occurs inside functions that are called from `extern \"C\"`\nentry points (e.g. every error path of `zil_imread`, `zil_imdecode_into`, etc.),\nso it can unwind across the FFI boundary = UB.","fix":"Handle the error without unwinding, e.g. `CString::new(message).unwrap_or_else(|_|\nCString::new(\"error message contained interior nul\").unwrap())`, or sanitize the\nbytes by stripping NULs before constructing the CString.","locations":[{"ref":"crates/zune-capi/src/errno.rs:59-74","code":"   59 |     pub fn new<T>(message: T, status: ZStatusType) -> ZStatus\n   60 |     where\n   61 |         T: Into<Vec<u8>>\n   62 |     {\n   63 |         let msg = CString::new(message).unwrap();\n   64 |         let mem = unsafe { zil_malloc(msg.as_bytes_with_nul().len()) };\n   65 |         // copy to memory\n   66 |         unsafe {\n   67 |             libc::strcpy(mem.cast(), msg.as_ptr());\n   68 |         }\n   69 | \n   70 |         ZStatus {\n   71 |             status,\n   72 |             message: mem.cast()\n   73 |         }\n   74 |     }","lines":16}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`zil_zimg_new` does not check the result of `libc::malloc`. On allocation failure\n`malloc` returns NULL and `unsafe { *ptr = ZImage::new(...) }` writes a `ZImage`\nthrough a null pointer -> UB. The function is documented as the recommended way to\ncreate an image, so callers will assume it is robust.","fix":"Check `ptr.is_null()` after malloc and return `ptr::null_mut()` on failure before\nthe `*ptr = ...` write (mirroring the null checks done in `zil_zimg_from_u8` etc.).","locations":[{"ref":"crates/zune-capi/src/image.rs:157-162","code":"  157 | #[no_mangle]\n  158 | pub extern \"C\" fn zil_zimg_new() -> *mut ZImage {\n  159 |     let ptr = unsafe { libc::malloc(std::mem::size_of::<ZImage>()) }.cast();\n  160 |     unsafe { *ptr = ZImage::new(vec![], BitDepth::Unknown, 1, 1, ColorSpace::Unknown) };\n  161 |     ptr\n  162 | }","lines":6}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Several FFI entry points dereference the `file`/`output_file` C string pointer via\n`CStr::from_ptr(file)` WITHOUT first checking it for null, unlike `zil_imread`\nwhich does check. Passing NULL (a normal mistake for a C caller) is immediate UB.\nAffected: `zil_imread_into` (file), `zil_read_headers_from_file` (file),\n`zil_zimg_open` (file), `zil_zimg_write_to_disk` (output_file),\n`zil_zimg_write_to_disk_with_format` (output_file).","fix":"Add `if file.is_null() { set status / return error }` (or for the void-returning\nfunctions, set status and return) before each `CStr::from_ptr` call, consistent\nwith the null check already present in `zil_imread`.","locations":[{"ref":"crates/zune-capi/src/imread.rs:134-143","code":"  134 | pub extern \"C\" fn zil_imread_into(\n  135 |     file: *const c_char, output: *mut u8, output_size: usize, width: *mut usize,\n  136 |     height: *mut usize, depth: *mut ZImageDepth, channels: *mut usize, status: *mut ZStatus,\n  137 | ) -> i64 {\n  138 |     if status.is_null() {\n  139 |         return STATUS_IS_NULL;\n  140 |     }\n  141 |     // safety: The caller is supposed to uphold this\n  142 |     let binding = unsafe { CStr::from_ptr(file) }.to_string_lossy();\n  143 |     let file_cstr = binding.as_ref();","lines":10},{"ref":"crates/zune-capi/src/imread.rs:168-176","code":"  168 | pub extern \"C\" fn zil_read_headers_from_file(\n  169 |     file: *const c_char, metadata_storage: *mut ZImageMetadata, status: *mut ZStatus,\n  170 | ) -> i64 {\n  171 |     if status.is_null() {\n  172 |         return STATUS_IS_NULL;\n  173 |     }\n  174 |     // safety: The caller is supposed to uphold this\n  175 |     let binding = unsafe { CStr::from_ptr(file) }.to_string_lossy();\n  176 |     let file_cstr = binding.as_ref();","lines":9},{"ref":"crates/zune-capi/src/image.rs:185-192","code":"  185 | pub extern \"C\" fn zil_zimg_open(file: *const c_char, image: *mut ZImage, status: *mut ZStatus) {\n  186 |     if image.is_null() {\n  187 |         if !status.is_null() {\n  188 |             unsafe { *status = ZStatus::new(\"Image null\", ZilImageIsNull) };\n  189 |         }\n  190 |         return;\n  191 |     }\n  192 |     let c_str = unsafe { CStr::from_ptr(file) }.to_bytes();","lines":8},{"ref":"crates/zune-capi/src/image.rs:255-265","code":"  255 | pub extern \"C\" fn zil_zimg_write_to_disk(\n  256 |     output_file: *const c_char, image: *const ZImage, status: *mut ZStatus\n  257 | ) {\n  258 |     if image.is_null() {\n  259 |         if !status.is_null() {\n  260 |             unsafe { *status = ZStatus::new(\"Image null\", ZilImageIsNull) };\n  261 |         }\n  262 |         return;\n  263 |     }\n  264 | \n  265 |     let c_str = unsafe { CStr::from_ptr(output_file) }.to_bytes();","lines":11},{"ref":"crates/zune-capi/src/image.rs:296-306","code":"  296 | pub extern \"C\" fn zil_zimg_write_to_disk_with_format(\n  297 |     output_file: *const c_char, image: *const ZImage, format: ZImageFormat, status: *mut ZStatus\n  298 | ) {\n  299 |     if image.is_null() {\n  300 |         if !status.is_null() {\n  301 |             unsafe { *status = ZStatus::new(\"Image null\", ZilImageIsNull) };\n  302 |         }\n  303 |         return;\n  304 |     }\n  305 | \n  306 |     let c_str = unsafe { CStr::from_ptr(output_file) }.to_bytes();","lines":11}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`zil_free` asserts that the pointer is non-null with `assert!(!ptr.is_null(), ...)`.\nThis panic unwinds across the `extern \"C\"` boundary, which is undefined behaviour.\nIt also contradicts the very next line `if !ptr.is_null()`, which implies null was\nmeant to be tolerated. Many C `free`-style APIs are expected to accept NULL as a\nno-op; here passing NULL aborts/UB instead.","fix":"Drop the `assert!`. Just keep the `if !ptr.is_null() { libc::free(ptr) }` guard so\nthat freeing a null pointer is a harmless no-op, matching C `free` semantics and\navoiding an unwind across FFI.","locations":[{"ref":"crates/zune-capi/src/utils.rs:47-53","code":"   47 | pub unsafe extern \"C\" fn zil_free(ptr: *mut c_void) {\n   48 |     assert!(!ptr.is_null(), \"Trying to free a null ptr!!\");\n   49 |     if !ptr.is_null() {\n   50 |         unsafe { libc::free(ptr) };\n   51 |         // set it to be null\n   52 |     }\n   53 | }","lines":7}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`decode_pps` allows `pps_id` up to 63 (`HEVC_MAX_PPS_COUNT = 64`, checked with `pps_id >= 64`), but\n`HevcDecoder::pps_storage` is only 16 entries long (`vec![None; 16]`). In `hevc_decoder.rs` the\nreturned pps id is used directly as an index: `self.pps_storage[pps_id] = Some(pps)` and\n`self.pps_storage[pps_id] = Some(pps)` in `parse_extradata`. A malformed HEVC PPS NAL with a\npps_id in 16..=63 indexes out of bounds and panics on attacker-controlled input.","fix":"Either size `pps_storage` to 64 entries, or reject pps_id >= pps_storage.len() before indexing, or\nuse `pps_storage.get_mut(pps_id)` and return a NalError on None. The cleanest fix is to cap\nHEVC_MAX_PPS_COUNT to the actual storage length (and likewise verify sps_id/vps_id against storage\nlength).","locations":[{"ref":"crates/zune-heic/src/hevc_decoder.rs:95-99","code":"   95 |                 NalUnitType::PpsNut => {\n   96 |                     let pps = decode_pps(&nal, &self.sps_storage)?;\n   97 |                     let pps_id = pps.pps_id as usize;\n   98 |                     self.pps_id = pps.pps_id as usize;\n   99 |                     self.pps_storage[pps_id] = Some(pps);","lines":5},{"ref":"crates/zune-heic/src/hevc_decoder.rs:164-167","code":"  164 |                 NalUnitType::PpsNut => {\n  165 |                     let pps = decode_pps(&nal, &self.sps_storage)?;\n  166 |                     let pps_id = pps.pps_id as usize;\n  167 |                     self.pps_storage[pps_id] = Some(pps);","lines":4},{"ref":"crates/zune-heic/src/hevc_decoder/nal_unit_parsers/pps.rs:13-32","code":"   13 |     const HEVC_MAX_PPS_COUNT: u8 = 64;\n   14 |     // 7.4.3.2.1: sps_seq_parameter_set_id is in [0, 15].\n   15 |     const HEVC_MAX_SPS_COUNT: u8 = 16;\n   16 |     // 7.4.3.1: vps_max_dec_pic_buffering_minus1[i] is in [0, MaxDpbSize - 1].\n   17 |     const HEVC_MAX_REFS: u8 = 16;\n   18 | \n   19 |     let mut r = BitReader::new(nal.payload);\n   20 |     r.refill();\n   21 | \n   22 |     let mut pps = Pps::default();\n   23 | \n   24 |     pps.pps_id = r.read_ue_u8()?;\n   25 | \n   26 |     if pps.pps_id >= HEVC_MAX_PPS_COUNT {\n   27 |         return Err(NalError::ParameterOutOfRange {\n   28 |             limit: HEVC_MAX_PPS_COUNT.into(),\n   29 |             value: pps.pps_id.into(),\n   30 |             field: \"pps.pps_id\"\n   31 |         });\n   32 |     }","lines":20},{"ref":"crates/zune-heic/src/hevc_decoder.rs:52-64","code":"   52 |     pub fn new() -> Self {\n   53 |         Self {\n   54 |             vps_storage:              vec![None; 16],\n   55 |             sps_storage:              vec![None; 16],\n   56 |             pps_storage:              vec![None; 16],\n   57 |             width:                    0,\n   58 |             height:                   0,\n   59 |             pps_id:                   0,\n   60 |             sps_id:                   0,\n   61 |             neighbor_tracker:         None,\n   62 |             dependent_slice_contexts: N    let addr_rs = y * pic_width_in_ctbs + x;\n  375 |                     pps.tile_id_rs[addr_rs] = tile_id;\n  376 |                 }\n  377 |             }\n  378 |         }\n  379 |     }\n  380 | }","lines":55},{"ref":"crates/zune-heic/src/hevc_decoder/nal_unit_parsers/pps.rs:111-127","code":"  111 |     if pps.tiles_enabled_flag {\n  112 |         pps.num_tile_columns = r.read_ue()? + 1;\n  113 |         pps.num_tile_rows = r.read_ue()? + 1;\n  114 |         pps.uniform_spacing_flag = r.read_flag()?;\n  115 | \n  116 |         if !pps.uniform_spacing_flag {\n  117 |             pps.column_width.reserve(pps.num_tile_columns as _);\n  118 |             pps.row_height.reserve(pps.num_tile_rows as _);\n  119 | \n  120 |             for _ in 0..(pps.num_tile_columns - 1) {\n  121 |                 pps.column_width.push(r.read_ue()? + 1);\n  122 |             }\n  123 |             for _ in 0..(pps.num_tile_rows - 1) {\n  124 |                 pps.row_height.push(r.read_ue()? + 1);\n  125 |             }\n  126 |         }\n  127 |         pps.loop_filter_across_tiles_enabled_flag = r.read_flag()?;","lines":17}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`decode_slice` unwraps several Options/Results that are derived from attacker-controlled NAL data.\n`pps_storage.get(...).ok_or(...)?.as_ref().unwrap()` will panic if the slot exists but is None,\nand `sps_storage[pps.sps_id as usize].as_ref().unwrap()` indexes and unwraps without checking the\nslot is populated. `hevc_decoder.neighbor_tracker.as_mut().unwrap()` panics if no tracker was set\nup (e.g. SPS not seen). These are reachable when parameter-set ids are inconsistent across NALs.","fix":"Use the same ok_or/`?` pattern already used in decode_slice_header: replace each `.unwrap()` with\na proper NalError, and bounds-check `pps.sps_id` against `sps_storage.len()` before indexing.","locations":[{"ref":"crates/zune-heic/src/hevc_decoder/quadtree.rs:43-53", s) before the modulo/division and return an error. Bounds-check the\nsource slice (`src + len <= tile_data.pixels.len()`) and destination against the canvas length\nbefore copy_from_slice instead of relying on tile dimensions matching expectations.","locations":[{"ref":"crates/zune-heic/src/processor.rs:425-465","code":"  425 |         for (index, &item_id) in self.ordered_tile_ids.iter().enumerate() {\n  426 |             if let Some(Ok(tile_data)) = tiles.get(&item_id) {\n  427 |                 let tile_w = tile_data.width;\n  428 |                 let tile_h = tile_data.height;\n  429 | \n  430 |                 let col = index % (self.cols as usize);\n  431 |                 let row = index / (self.cols as usize);\n  432 | \n  433 |                 // Use the DYNAMIC tile width/height!\n  434 |                 let base_x = col * tile_w;\n  435 |                 let base_y = row * tile_h;\n  436 | \n  437 |                 let tile_stride = tile_w * channels;\n  438 |                 let grid_stride = unrotated_w * channels;\n  439 | \n  440 |                 for ty in 0..tile_h {\n  441 |                     let canvas_y = base_y + ty;\n  442 | \n  443 |                     // Crop bounds if tiles overflow the final target resolution\n  444 |                     if canvas_y >= unrotated_h {\n  445 |                         break;\n  446 |                     }\n  447 |                     if base_x >= unrotated_w {\n  448 |                         continue;\n  449 |                     }\n  450 | \n  451 |                     let copy_width = tile_w.min(unrotated_w - base_x);\n  452 |                     let len = copy_width * channels;\n  453 | \n  454 |                     let src = ty * tile_stride;\n  455 |                     let dst = canvas_y * grid_stride + base_x * channels;\n  456 | \n  457 |                     target_canvas[dst..dst + len]\n  458 |                         .copy_from_slice(&tile_data.pixels[src..src + len]);\n  459 |                 }\n  460 |             } else {\n  461 |                 return Err(HeicErrors::Generic {\n  462 |                     msg: format!(\"Tile missing or errored: {item_id}\")\n  463 |                 });\n  464 |             }\n  465 |         }","lines":41}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Image::pixels` (the public pixel iterator constructor) indexes `self.frames[0]`\ndirectly. An `Image` constructed via `Image::new_frames(vec![], ...)` (or one whose\nframes were drained) has no frames, so this panics with an out-of-bounds index rather\nthan returning an error. Several other public methods also assume `frames[0]` exists\n(e.g. `to_u8`/`flatten_frames` paths). Given `pixels` returns a `Result`, an empty\nimage should produce an error, not a panic.","fix":"Use `self.frames.first().ok_or(...)` (or return an empty iterator) instead of\n`self.frames[0]`.","locations":[{"ref":"crates/zune-image/src/iters.rs:127-149","code":"  127 |     pub fn pixels<T>(&self) -> Result<PixelIterator<'_, T>, ChannelErrors>\n  128 |     where\n  129 |         T: ZuneInts<T> + Default + Copy + 'static + Pod,\n  130 |     {\n  131 |         let colorspace = self.colorspace();\n  132 |         let (width, height) = self.dimensions();\n  133 | \n  134 |         let frame = &self.frames[0];\n  135 |         let mut channels: [&[T]; MAX_CHANNELS] = [&[]; MAX_CHANNELS];\n  136 | \n  137 |         for (pos, channel) in frame.channels_ref(colorspace, false).iter().enumerate() {\n  138 |             channels[pos] = channel.reinterpret_as::<T>()?;\n  139 |         }\n  140 | \n  141 |         Ok(PixelIterator {\n  142 |             channels,\n  143 |             width,\n  144 |             components: colorspace.num_components(),\n  145 |             current_pos: 0,\n  146 |             pixel: [T::default(); MAX_CHANNELS],\n  147 |             total_pixels: width * height,\n  148 |         })\n  149 |     }","lines":23}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`BitStreamReader::refill_slow` (one-shot deflate path) slices `&self.src[self.position..]`\nwith no bounds guard. If `self.position > self.src.len()` this panics with an\nout-of-range slice. The streaming variant in streaming_bitstream.rs:70 was written\ndefensively as `src.get(self.position..).unwrap_or(&[])`, but the one-shot reader was\nnot. `position` is advanced unchecked in several places - most notably after an\nuncompressed deflate block where `start_deflate_block_inner` sets\n`self.stream.position = len + (self.stream.position - (bits_left>>3))` (decoder.rs:659).\nFor a crafted stored block near the end of the input this can push `position` past\n`src.len()`, so the next `refill()` -> `get(position..position+8)` returns `None` ->\n`refill_slow` indexes out of range and panics on malformed input.","fix":"Mirror the streaming reader: in `refill_slow` use\n`let bytes = self.src.get(self.position..).unwrap_or(&[]);` so an over-advanced position\nyields an empty slice (and, for non-final streams, simply stops refilling) instead of\npanicking.","locations":[{"ref":"crates/zune-inflate/src/bitstream.rs:70-92","code":"   70 |     #[inline(never)]\n   71 |     fn refill_slow(&mut self) {\n   72 |         let bytes = &self.src[self.position..];\n   73 | \n   74 |         for byte in bytes {\n   75 |             if self.bits_left >= 56 {\n   76 |                 break;\n   77 |             }\n   78 | \n   79 |             self.buffer |= u64::from(*byte) << self.bits_left;\n   80 |             self.bits_left += 8;\n   81 |             self.position += 1;\n   82 |         }\n   83 | \n   84 |         // ONLY pad with dummy zeros if we are absolutely sure\n   85 |         // there is no more data coming.\n   86 |         if self.is_final {\n   87 |             while self.bits_left < 56 {\n   88 |                 self.bits_left += 8;\n   89 |                 self.over_read += 1;\n   90 |             }\n   91 |         }\n   92 |     }","lines":23},{"ref":"crates/zune-inflate/src/decoder.rs:658-662","code":"  658 |                 // get the new position to write.\n  659 |                 self.stream.position =\n  660 |                     len + (self.stream.position - usize::from(self.stream.bits_left >> 3));\n  661 | \n  662 |                 self.stream.reset();","lines":5}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"The AVX2 IDCT `permute_store!` macro and the zero-AC fast-path `store!` macro use `out_vector.get_mut($index..$index+8).unwrap()`, which panics if the output channel slice is shorter than required. The scalar `idct_int`/`idct4x4` instead use `get_mut(..).unwrap_or(&mut tmp)` and silently absorb short buffers, so the AVX2 path diverges and can panic on the same malformed input the scalar path tolerates.","fix":"Mirror the scalar fallback (write to a local scratch when the destination range is out of bounds) so all IDCT variants behave identically and none panic on truncated/garbled component buffers.","locations":[{"ref":"crates/zune-jpeg/src/idct/avx2.rs:56-75","code":"   56 |         // store first vector\n   57 |         _mm_storeu_si128(\n   58 |             ($out)\n   59 |                 .get_mut($index..$index + 8)\n   60 |                 .unwrap()\n   61 |                 .as_mut_ptr()\n   62 |                 .cast(),\n   63 |             _mm256_extractf128_si256::<0>(c),\n   64 |         );\n   65 |         $index += $stride;\n   66 |         // second vector\n   67 |         _mm_storeu_si128(\n   68 |             ($out)\n   69 |                 .get_mut($index..$index + 8)\n   70 |                 .unwrap()\n   71 |                 .as_mut_ptr()\n   72 |                 .cast(),\n   73 |             _mm256_extractf128_si256::<1>(c),\n   74 |         );\n   75 |         $index += $stride;","lines":20},{"ref":"crates/zune-jpeg/src/idct/avx2.rs:136-159","code":"  136 |         macro_rules! store {\n  137 |             ($pos:tt,$value:tt) => {\n  138 |                 // store\n  139 |                 _mm_storeu_si128(\n  140 |                     out_vector\n  141 |                         .get_mut($pos..$pos + 8)\n  142 |                         .unwrap()\n  143 |                         .as_mut_ptr()\n  144 |                         .cast(),\n  145 |                     $value,\n  146 |                 );\n  147 |                 $pos += stride;\n  148 |             };\n  149 |         }\n  150 |         store!(pos, idct_value);\n  151 |         store!(pos, idct_value);\n  152 |         store!(pos, idct_value);\n  153 |         store!(pos, idct_value);\n  154 | \n  155 |         store!(pos, idct_value);\n  156 |         store!(pos, idct_value);\n  157 |         store!(pos, idct_value);\n  158 |         store!(pos, idct_value);\n  159 | ","lines":24}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`idct_int_1x1` writes directly into `out_vector[..8]` and repeatedly re-slices `out_vector = &mut out_vector[stride..]` with no bounds protection, unlike `idct_int`/`idct4x4` which fall back to a scratch `tmp` via `get_mut(..).unwrap_or(&mut tmp)`. It is reached through `idct_1x1_func` in the hot loop with `channel.get_mut(idct_position..).unwrap()`. A malformed image whose component stride / sampling factors leave fewer than `7*stride + 8` elements past `idct_position` will panic via slice indexing instead of erroring.","fix":"Bound-check inside `idct_int_1x1` the same way `idct_int` does (write into a scratch `tmp` when the destination is too short), or validate that `raw_coeff`/channel length is always >= idct_position + 7*stride + 8 before calling.","locations":[{"ref":"crates/zune-jpeg/src/idct/scalar.rs:30-40","code":"   30 | #[inline]\n   31 | pub fn idct_int_1x1(in_vector: &mut [i32; 64], mut out_vector: &mut [i16], stride: usize) {\n   32 |     let coeff = ((wa(wa(in_vector[0], 4), 1024) >> 3).clamp(0, 255)) as i16;\n   33 | \n   34 |     out_vector[..8].fill(coeff);\n   35 |     for _ in 0..7 {\n   36 |         out_vector = &mut out_vector[stride..];\n   37 |         out_vector[..8].fill(coeff);\n   38 | \n   39 |     }\n   40 | }","lines":11},{"ref":"crates/zune-jpeg/src/mcu.rs:739-742","code":"  739 |                             let idct_pos = channel.get_mut(idct_position..).unwrap();\n  740 | \n  741 |                             if len <= 1 {\n  742 |                                 (self.idct_1x1_func)(tmp, idct_pos, component.width_stride);","lines":4}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Multiple `try_readwrite().expect(\"This should be safe...\")` and `as_slice_mut().unwrap()` calls in\n`to_numpy_generic` (numpy_bindings.rs lines 43-46, 63-65, 106-109). The freshly allocated arrays are\nindeed owned and not yet exposed, so these are usually safe, but they are `expect`/`unwrap` on the\nhot path of every `to_numpy()` call. More importantly `self.image.frames_ref()[0]` (lines 67 and 87)\nindexes frame 0 without checking the frame list is non-empty; an image constructed with zero frames\n(e.g. via a future `from_numpy` edge case or an empty decode) would panic with an index-out-of-bounds\nfrom a plain attribute access rather than raising a Python exception.","fix":"Guard the frame access: `let frame = self.image.frames_ref().first().ok_or_else(|| PyErr::new::<PyException,_>(\"image has no frames\"))?;`.\nThe `try_readwrite().expect(...)` can stay (the invariant holds) but prefer `?` to avoid any abort.","locations":[{"ref":"crates/zune-python/src/py_image/numpy_bindings.rs:43-46","code":"   43 |             let mut arr_v = arr\n   44 |                 .try_readwrite()\n   45 |                 .expect(\"This should be safe as we own the array and haven't exposed it\");\n   46 |             let pix_values = arr_v.as_slice_mut().unwrap();","lines":4},{"ref":"crates/zune-python/src/py_image/numpy_bindings.rs:63-72","code":"   63 |                     .try_readwrite()\n   64 |                     .expect(\"This should be safe as we own the array and haven't exposed it\");\n   65 |                 let pix_values = arr_v.as_slice_mut().unwrap();\n   66 | \n   67 |                 let channels = self.image.frames_ref()[0].channels_ref(colorspace, false);\n   68 |                 pix_values.copy_from_slice(\n   69 |                     channels[0]\n   70 |                         .reinterpret_as()\n   71 |                         .map_err(|x| PyErr::new::<PyException, _>(format!(\"{x:?}\")))?\n   72 |                 );","lines":10},{"ref":"crates/zune-python/src/py_image/numpy_bindings.rs:87-109","code":"   87 |                 let channels = self.image.frames_ref()[0].channels_ref(colorspace, false);\n   88 |                 for chan in channels {\n   89 |                     if chan.reinterpret_as::<T>().is_err() {\n   90 |                         return Err(PyErr::new::<PyException, _>(format!(\n   91 |                             \"The image depth {:?} is not u8 use image.convert_depth({:?}) to convert to 8 bit \\nWe do not implicitly convert to desired depth\", self.image.depth(), expected\n   92 |                         )));\n   93 |                     }\n   94 |                 }\n   95 | \n   96 |                 let width = self.width();\n   97 |                 let height = self.height();\n   98 | \n   99 |                 let dims = height.checked_mul(width);\n  100 |                 // check for overflow\n  101 |                 if dims.is_none() {\n  102 |                     return Err(PyErr::new::<PyException, _>(format!(\n  103 |                         \"width * height overflowed to big of dimensions ({width},{height})\"\n  104 |                     )));\n  105 |                 }\n  106 |                 let mut arr_v = arr\n  107 |                     .try_readwrite()\n  108 |                     .expect(\"This should be safe as we own the array and haven't exposed it\");\n  109 |                 let pix_values = arr_v.as_slice_mut().unwrap();","lines":23}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`WasmColorspace::from_colorspace` panics (`panic!(\"Unknown colorspace {e:?}\")`, line 53) for any\ncolorspace not in its explicit list. It is called from the exported `WasmImage::colorspace` getter\n(lib.rs:259-261). If an image ends up in a colorspace the enum does not enumerate (e.g. CMYK is\nmapped but a future/intermediate colorspace such as a 1-component CMYK-derived space is not), the\nJS-facing getter panics and aborts the WASM module instead of returning a value or error.","fix":"Map the unhandled arm to `WasmColorspace::Unknown` instead of panicking, mirroring how the Python\n`ColorSpace::from` (py_enums.rs) handles unknown variants with a catch-all `=> ColorSpace::Unknown`.","locations":[{"ref":"crates/zune-wasm/src/enums.rs:37-55","code":"   37 | impl WasmColorspace {\n   38 |     pub fn from_colorspace(colorspace: ColorSpace) -> WasmColorspace {\n   39 |         match colorspace {\n   40 |             ColorSpace::RGB => Self::RGB,\n   41 |             ColorSpace::RGBA => Self::RGBA,\n   42 |             ColorSpace::YCbCr => Self::YCbCr,\n   43 |             ColorSpace::Luma => Self::Luma,\n   44 |             ColorSpace::LumaA => Self::LumaA,\n   45 |             ColorSpace::YCCK => Self::YCCK,\n   46 |             ColorSpace::CMYK => Self::CYMK,\n   47 |             ColorSpace::Unknown => Self::Unknown,\n   48 |             ColorSpace::BGR => Self::BGR,\n   49 |             ColorSpace::BGRA => Self::BGRA,\n   50 |             ColorSpace::ARGB => Self::ARGB,\n   51 |             ColorSpace::HSL => Self::HSL,\n   52 |             ColorSpace::HSV => Self::HSV,\n   53 |             e => panic!(\"Unknown colorspace {e:?}\")\n   54 |         }\n   55 |     }","lines":19},{"ref":"crates/zune-wasm/src/lib.rs:259-261","code":"  259 |     pub fn colorspace(&mut self) -> WasmColorspace {\n  260 |         WasmColorspace::from_colorspace(self.image.colorspace())\n  261 |     }","lines":3}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`show_gui::open_in_default_app` uses `unwrap()` extensively on fallible operations:\nopening the temp file, encoding the PNG, `path.to_str().unwrap()`, and spawning /\nwaiting on the external viewer process. Any failure (read-only temp dir, encode\nerror, non-UTF-8 temp path, missing `xdg-open`/`open`) panics instead of reporting\na clean error. This is `--view` only, hence low severity, but still a crash on a\nnormal failure mode (e.g. xdg-open not installed).","fix":"Propagate errors (change the signature to return `Result`) or log a warning and\nreturn, instead of unwrapping. Handle the missing-viewer-binary case gracefully.","locations":[{"ref":"crates/zune-bin/src/show_gui.rs:20-82","code":"   20 | pub fn open_in_default_app(image: &Image, options: EncoderOptions) {\n   21 |     if log_enabled!(log::Level::Trace) {\n   22 |         println!()\n   23 |     }\n   24 |     let time = format!(\n   25 |         \"{}.png\",\n   26 |         std::time::SystemTime::now()\n   27 |             .duration_since(UNIX_EPOCH)\n   28 |             .unwrap()\n   29 |             .as_millis()\n   30 |     );\n   31 |     let mut path = temp_dir();\n   32 | \n   33 |     path.push(time);\n   34 | \n   35 |     let file = OpenOptions::new()\n   36 |         .write(true)\n   37 |         .truncate(true)\n   38 |         .create(true)\n   39 |         .open(&path)\n   40 |         .unwrap();\n   41 | \n   42 |     let mut buffered = BufWriter::new(file);\n   43 | \n   44 |     let start = Instant::now();\n   45 |     let options = options.set_png_compression_level(PngCompression::Fastest);\n   46 |     let size = PngEncoder::new_with_options(options)\n   47 |         .encode(image, &mut buffered)\n   48 |         .unwrap();\n   49 |     trace!(\n   50 |         \"Wrote {:?} bytes to {:?} in {:?}\",\n   51 |         size,\n   52 |         path,\n   53 |         start.elapsed()\n   54 |     );\n   55 |     #[cfg(target_os = \"linux\")]\n   56 |     {\n   57 |         std::process::Command::new(\"xdg-open\")\n   58 |             .arg(path.to_str().unwrap())\n   59 |             .spawn()\n   60 |             .unwrap()\n   61 |             .wait()\n   62 |             .unwrap();\n   63 |     }\n   64 |     #[cfg(target_os = \"windows\")]\n   65 |     {\n   66 |         std::process::Command::new(\"start\")\n   67 |             .arg(path.to_str().unwrap())\n   68 |             .spawn()\n   69 |             .unwrap()\n   70 |             .wait()\n   71 |             .unwrap();\n   72 |     }\n   73 |     #[cfg(target_os = \"macos\")]\n   74 |     {\n   75 |         std::process::Command::new(\"open\")\n   76 |             .arg(path.to_str().unwrap())\n   77 |             .spawn()\n   78 |             .unwrap()\n   79 |             .wait()\n   80 |             .unwrap();\n   81 |     }\n   82 | }","lines":63}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ZCursor::peek_bytes_impl` uses `self.stream.as_ref().get(start..end).unwrap()`.\n`start` and `end` are both clamped via `min(..., stream_end)`, and `start <= end`\nholds because `self.position <= self.position + buf.len()` UNLESS\n`self.position + buf.len()` overflows usize. `position` is advanced with\n`wrapping_add` in `skip` (zcursor_no_std.rs:33-36) and can be set arbitrarily via\nseek, so a pathological position close to usize::MAX plus a buffer could make\n`end < start`, turning the slice index into a panic (`unwrap` on None). Low because\nit requires an extreme/seek-abused position.","fix":"Avoid the `unwrap`: compute `end = end.max(start)` or use\n`get(start..end).unwrap_or(&[])`, and/or guard against `position` overflow in\n`skip`/seek. Prefer not using `wrapping_add` for position advancement.","locations":[{"ref":"crates/zune-core/src/bytestream/reader/no_std_readers.rs:106-118","code":"  106 |     #[inline(always)]\n  107 |     pub (crate) fn peek_bytes_impl(&mut self, buf: &mut [u8]) -> Result<usize, ZByteIoError> {\n  108 |         let stream_end = self.stream.as_ref().len();\n  109 | \n  110 |         let start = core::cmp::min(self.position, stream_end);\n  111 |         let end = core::cmp::min(self.position + buf.len(), stream_end);\n  112 | \n  113 |         let slice = self.stream.as_ref().get(start..end).unwrap();\n  114 |         buf[..slice.len()].copy_from_slice(slice);\n  115 |         let len = slice.len();\n  116 | \n  117 |         Ok(len)\n  118 |     }","lines":13},{"ref":"crates/zune-core/src/bytestream/reader/no_std_readers.rs:32-36","code":"   32 |     #[inline]\n   33 |     pub fn skip(&mut self, num: usize) {\n   34 |         // Can this overflow ??\n   35 |         self.position = self.position.wrapping_add(num);\n   36 |     }","lines":5}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`EncoderOptions::height()` asserts `assert_ne!(self.height, 0)` and panics if the\nheight is zero, while `width()` has no such assertion and the default-constructed\n`EncoderOptions` has `height: 0`. Calling `height()` on a freshly defaulted\noptions object (a plausible mistake) panics. The asymmetry with `width()` is also\nsurprising for an API getter.","fix":"Either make `height()` a plain `const fn` returning the field (consistent with\n`width()`), or document the panic prominently and validate height at construction\ntime instead of in the getter.","locations":[{"ref":"crates/zune-core/src/options/encoder.rs:118-123","code":"  118 |     /// # Panics\n  119 |     /// If height is zero\n  120 |     pub fn height(&self) -> usize {\n  121 |         assert_ne!(self.height, 0);\n  122 |         self.height\n  123 |     }","lines":6}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`HdrDecoder::decode` allocates with the unchecked expression\n`vec![0.0f32; self.width * self.height * 3]`, bypassing the checked `output_buffer_size()`\nhelper that exists for exactly this purpose. Width/height are parsed from the header and\nbounded only by `max_width`/`max_height`; with caller-raised limits `width*height*3` can\noverflow `usize` and panic. `decode_into` correctly uses the checked helper, so the public\n`decode` is the inconsistent path.","fix":"Allocate using `self.output_buffer_size().ok_or(...overflow...)?` (as `decode_into`\nalready does) instead of the raw multiplication.","locations":[{"ref":"crates/zune-hdr/src/decoder.rs:248-255","code":"  248 |     pub fn decode(&mut self) -> Result<Vec<f32>, HdrDecodeErrors> {\n  249 |         self.decode_headers()?;\n  250 |         let mut buffer = vec![0.0f32; self.width * self.height * 3];\n  251 | \n  252 |         self.decode_into(&mut buffer)?;\n  253 | \n  254 |         Ok(buffer)\n  255 |     }","lines":8},{"ref":"crates/zune-hdr/src/decoder.rs:264-270","code":"  264 |     pub fn output_buffer_size(&self) -> Option<usize> {\n  265 |         if self.decoded_headers {\n  266 |             Some(self.width.checked_mul(self.height)?.checked_mul(3)?)\n  267 |         } else {\n  268 |             None\n  269 |         }\n  270 |     }","lines":7}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`decode_vps` uses `ptl_info.expect(\"NO Profile Info\")`. `decode_profile_data` is called with\n`profile_present = true`, so it should always return Some, but relying on `.expect()` for a value\nderived from parsed data is fragile; any future change making profile optional would turn this\ninto a reachable panic. Prefer returning a NalError.","fix":"Replace `.expect(\"NO Profile Info\")` with `.ok_or(NalError::GenericStr(\"VPS missing PTL\"))?`.","locations":[{"ref":"crates/zune-heic/src/hevc_decoder/nal_unit_parsers/vps.rs:62-69","code":"   62 |     let vps = Vps {\n   63 |         vps_id: vps_id as u8,\n   64 |         max_layers: max_layers as u8,\n   65 |         max_sub_layers: max_sub_layers as u8,\n   66 |         profile_info: ptl_info.expect(\"NO Profile Info\"),\n   67 |         max_dec_pic_buffering,\n   68 |         max_num_reorder_pics\n   69 |     };","lines":8}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`decode_tu` builds a `&mut [i16; 1024]` from `ctx.idct_scratchpad` via `try_into().unwrap()` and\n`&mut ctx.math_scratchpad[..N]` slices via `try_into().unwrap()` / `.expect(...)`. These rely on\nthe scratchpads being exactly the expected length and on N being one of 4/8/16/32. N is derived\nfrom `1 << log2_size` where log2_size flows from the transform tree recursion; if a malformed\nstream produces a log2_size outside 2..=5 (e.g. via inconsistent SPS transform-size fields and\nunchecked `log2_trafo_size - 2` style arithmetic in residual_block), the `unreachable!()` arm or a\nslice try_into can panic. The scaling/IDCT path assumes N<=32 but does not defensively validate.","fix":"Validate log2_trafo_size is in 2..=5 at the entry of decode_residual_block / decode_tu and return a\nNalError otherwise, so `sb_width = 1 << (log2_trafo_size - 2)` and the fixed-size try_into casts\ncannot be driven out of range (also guards the `log2_trafo_size - 2` subtraction against underflow\nfor log2_trafo_size < 2).","locations":[{"ref":"crates/zune-heic/src/hevc_decoder/quadtree/transform_unit.rs:138-186","code":"  138 |         if ctx.transform_skip_flag[c_idx] == 0 {\n  139 |             // Pick DST for Luma 4x4 Intra, otherwise IDCT\n  140 |             let use_dst = c_idx == 0 && n_t == 4 && cu_pred_mode == PredMode::ModeIntra;\n  141 | \n  142 |             // scratchpad can be reused without reset-ing as the buffer is overwritten\n  143 |             // so no need to reset it every time\n  144 |                   idct_32x32_hevc(block, idct_scratchpad, bit_depth);\n  183 |                     }\n  184 |                     _ => unreachable!(\"HEVC TU sizes are 4, 8, 16, or 32\"),\n  185 |                 }\n  186 |             }","lines":49},{"ref":"crates/zune-heic/src/hevc_decoder/quadtree/residual_block.rs:595-621","code":"  595 |     let scan_order_sub = get_scan_order(log2_trafo_size - 2, scan_idx);\n  596 | \n  597 |     // ScanOrderPos: Order of coefficients within a 4x4 sub-block\n  598 |     // (Always size 2, because sub-blocks are always 4x4)\n  599 |     let scan_order_pos = get_scan_order(2, scan_idx);\n  600 | \n  601 |     if DEBUG_MORE {\n  602 |         // libde265 style tracing\n  603 |         let mut scan_pos_trace = String::from(\"ScanOrderPos: \");\n  604 |         for n in 0..16 {\n  605 |             let pos = scan_order_pos[n];\n  606 |             let _ = write!(scan_pos_trace, \"({},{}) \", pos.x, pos.y);\n  607 |         }\n  608 |         debug_more!(\"{}\", scan_pos_trace);\n  609 |     }\n  610 |     // --- 7. Find last sub-block and last scan position ---\n  611 |     let last_scan_p = get_scan_position(last_sig_x, last_sig_y, scan_idx, log2_trafo_size);\n  612 | \n  613 |     let last_scan_pos = last_scan_p.scan_pos;\n  614 |     let last_sub_block = last_scan_p.sub_block;\n  615 | \n  616 |     // sb_width is the number of 4x4 sub-blocks across the TU\n  617 |     let sb_width = 1_usize << (log2_trafo_size - 2);\n  618 | \n  619 |     // coded_sub_block_neighbors tracks which 4x4 groups have coefficients\n  620 |     // Max TU is 32x32, so max sb_width is 8. 8*8 = 64.\n  621 |     let mut coded_sub_block_neighbors = vec![0u8; sb_width * sb_width];","lines":27}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`is_aligned` computes `(ptr as usize) & (size - 1) == 0` where `size = size_of::<T>()`.\nThis alignment test is only correct for power-of-two sizes. All current callers ecodeErrors(e.to_string()))?;\n   41 | \n   42 |         let mut img = Image::from_u8(&raw_pixels, w, h, self.out_colorspace());\n   43 |         img.metadata.format = Some(ImageFormat::WEBP);\n   44 | \n   45 |         Ok(img)\n   46 |     }","lines":17},{"ref":"crates/zune-image/src/codecs/webp.rs:66-77","code":"   66 |     fn read_headers(&mut self) -> Result<Option<ImageMetadata>, ImageErrors> {\n   67 |         let (w, h) = self.dimensions().expect(\"Failed to determine dimensions\");\n   68 |         Ok(Some(ImageMetadata {\n   69 |             width: w,\n   70 |             height: h,\n   71 |             colorspace: self.out_colorspace(),\n   72 |             depth: BitDepth::Eight,\n   73 |             format: Some(ImageFormat::WEBP),\n   74 |             ..ImageMetadata::default()\n   75 |         }))\n   76 |     }\n   77 | }","lines":12},{"ref":"crates/zune-image/src/codecs/webp.rs:189-194","code":"  189 |     fn decode_output_buffer_size(&mut self) -> Result<usize, ImageErrors> {\n  190 |         Ok(self\n  191 |             .inner\n  192 |             .output_buffer_size()\n  193 |             .expect(\"Max output size greater than usize max\"))\n  194 |     }","lines":6}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`decode_mcu_ac_first` (arithmetic) indexes `ac_table.v[(pos - 1) as usize]` with `pos = self.spec_start` and `decode_mcu_ac_refine` does `assert!(k >= 1)`. `v` has length 63. If an AC scan ever reached these with `spec_start == 0`, `(pos-1)` wraps to 255 (OOB panic) or the assert fires. It is currently guarded only by the dispatcher in `parse_entropy_coded_data` choosing AC paths when `spec_start != 0`; there is no local guard, so a refactor or alternate caller could reintroduce the panic.","fix":"Validate `spec_start >= 1` (and `spec_end <= 63`) at the start of the AC decode routines and return a `DecodeErrors` rather than relying on the caller and `assert!`.","locations":[{"ref":"crates/zune-jpeg/src/bitstream_arith.rs:886-889","code":"  886 |         let mut pos: u8 = self.spec_start;\n  887 | \n  888 |         while pos <= self.spec_end {\n  889 |             let dse = self.decode_bit(&mut ac_table.v[(pos - 1) as usize].se, reader)?;","lines":4},{"ref":"crates/zune-jpeg/src/bitstream_arith.rs:929-935","code":"  929 |         let mut k = self.spec_start;\n  930 |         assert!(k >= 1);\n  931 | \n  932 |         // Derive end of band index from block contents (the first zero position\n  933 |         // of the trailing run, or spec_end.)\n  934 |         let mut eobx: u8 = self.spec_end + 1;\n  935 |         while eobx > 0 && block[UN_ZIGZAG[(eobx - 1) as usize & 63]] == 0 {","lines":7}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`JpegDecoder::decode` and `decode_into` call `self.output_buffer_size().unwrap()`. `output_buffer_size` returns `None` when `width * height * num_components` overflows `usize`. On 32-bit targets a header declaring near-maximal dimensions (each up to 65535) with 4 output components overflows a 32-bit usize, so the unwrap panics on attacker-controlled header values instead of returning an error.","fix":"Propagate the `None` as a `DecodeErrors` (e.g. `LargeDimensions`) instead of unwrapping; `decode_into` already has an error path it can reuse.","locations":[{"ref":"crates/zune-jpeg/src/decoder.rs:573-578","code":"  573 |     pub fn decode(&mut self) -> Result<Vec<u8>, DecodeErrors> {\n  574 |         self.decode_headers()?;\n  575 |         let size = self.output_buffer_size().unwrap();\n  576 |         let mut out = vec![0; size];\n  577 |         self.decode_into(&mut out)?;\n  578 |         Ok(out)","lines":6},{"ref":"crates/zune-jpeg/src/decoder.rs:1422-1427","code":" 1422 |         let expected_size = self.output_buffer_size().unwrap();\n 1423 | \n 1424 |         if out.len() < expected_size {\n 1425 |             // too small of a size\n 1426 |             return Err(DecodeErrors::TooSmallOutput(expected_size, out.len()));\n 1427 |         }","lines":6}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`upsample_horizontal`, `upsample_vertical`, and `upsample_hv` use `assert_eq!`/`assert!` on buffer-length relationships. These functions are reached via the `up_sampler` fn pointer during post-processing of sub-sampled images; on malformed sampling factors the slices handed in can violate the asserted invariants and abort the process with a panic rather than a decode error.","fix":"Replace the asserts with checked length validation that returns `DecodeErrors::FormatStatic`, matching how `worker::upsample` already guards the `V`/`HV` path before calling the sampler.","locations":[{"ref":"crates/zune-jpeg/src/upsampler/scalar.rs:9-21","code":"    9 | pub fn upsample_horizontal(\n   10 |     input: &[i16], _ref: &[i16], _in_near: &[i16], _scratch: &mut [i16], output: &mut [i16]\n   11 | ) {\n   12 |     assert_eq!(\n   13 |         input.len() * 2,\n   14 |         output.len(),\n   15 |         \"Input length is not half the size of the output length\"\n   16 |     );\n   17 |     assert!(\n   18 |         output.len() > 4 && input.len() > 2,\n   19 |         \"Too Short of a vector, cannot upsample\"\n   20 |     );\n   21 | ","lines":13},{"ref":"crates/zune-jpeg/src/upsampler/scalar.rs:56-84","code":"   56 | pub fn upsample_vertical(\n   57 |     input: &[i16], in_near: &[i16], in_far: &[i16], _scratch_space: &mut [i16], output: &mut [i16]\n   58 | ) {\n   59 |     assert_eq!(input.len() * 2, output.len());\n   60 |     assert_eq!(in_near.len(), input.len());\n   61 |     assert_eq!(in_far.len(), input.len());\n   62 | \n   63 |     let middle = output.len() / 2;\n   64 | \n   65 |     let (out_top, out_bottom) = output.split_at_mut(middle);\n   66 | \n   67 |     // for the first row, closest row is in_near\n   68 |     for ((near, far), x) in input.iter().zip(in_near.iter()).zip(out_top) {\n   69 |         *x = (((3 * near) + 2) + far) >> 2;\n   70 |     }\n   71 |     // for the second row, the closest row to input is in_far\n   72 |     for ((near, far), x) in input.iter().zip(in_far.iter()).zip(out_bottom) {\n   73 |         *x = (((3 * near) + 2) + far) >> 2;\n   74 |     }\n   75 | }\n   76 | \n   77 | pub fn upsample_hv(\n   78 |     input: &[i16], in_near: &[i16], in_far: &[i16], scratch_space: &mut [i16], output: &mut [i16]\n   79 | ) {\n   80 | \n   81 |     assert_eq!(input.len() * 4, output.len());\n   82 | \n   83 |     assert!(input.len() * 2 <= scratch_space.len());\n   84 |     let scratch_space = &mut scratch_space[..input.len() * 2];","lines":29}]},{"id":"PANIC_36","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`add_alpha` ends with a catch-all `panic!` for any colorspace/depth combination it does\nnot explicitly handle (`(a, b) => panic!(...)`). It is reached via\n`post_process_row_direct` when `png_set_add_alpha_channel(true)` is set. The four handled\narms cover Luma/RGB at 8/16 bit; Palette is converted earlier and LumaA/RGBA already have\nalpha so `add_alpha` is guarded by `!info.color.has_alpha()`. The guard makes the panic\ncurrently unreachable for valid color types, but it is a latent abort-on-input hazard if\nthe upstream guard logic ever changes (e.g. a new color type), since it turns a\nformatting branch into a hard panic rather than a recoverable error.","fix":"Return a `PngDecodeErrors` (and propagate `Result`) for the unexpected combination\ninstead of `panic!`, or `debug_assert!(false, ...)` and fall back to a no-op so malformed\ninternal state cannot abort the process.","locations":[{"ref":"crates/zune-png/src/utils.rs:384-387","code":"  384 |         (a, b) => {\n  385 |             panic!(\"Unknown combination of depth {a:?} and color type for expand alpha {b:?}\")\n  386 |         }\n  387 |     }","lines":4}]},{"id":"PANIC_37","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`WasmImageFormats::from_formats` contains `_ => todo!(\"Support format {:?}\", format)` (line 115).\nIt is reachable from the exported `guess_format` function (lib.rs:529-534) and `WasmImage::colorspace`\nis unrelated, but any image format the guesser can return that is not enumerated here will hit the\n`todo!()` and panic-abort the WASM module. All current `ImageFormat` variants are listed, so this is\nlatent, but it is a panic-on-unknown-input pattern that will silently arm itself the moment a new\ncodec is added to the workspace.","fix":"Replace `todo!(...)` with `_ => Self::Unknown` so unknown formats degrade gracefully.","locations":[{"ref":"crates/zune-wasm/src/utils.rs:102-117","code":"","lines":16},{"ref":"crates/zune-wasm/src/lib.rs:528-534","code":"  528 | #[wasm_bindgen]\n  529 | pub fn guess_format(bytes: &[u8]) -> Option<WasmImageFormats> {\n  530 |     if let Some((format, _)) = ImageFormat::guess_format(ZCursor::new(bytes)) {\n  531 |         return Some(WasmImageFormats::from_formats(format));\n  532 |     }\n  533 |     None\n  534 | }","lines":7}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"critical","easy":false,"description":"`zil_status_free` frees the `message` buffer twice. It first calls\n`zil_free((*status).message.cast())` (line 164), then calls\n`status.drop_in_place()` (line 166) which runs `Drop for ZStatus`\n(errno.rs:81-85), and that `Drop` impl ALSO calls\n`zil_free(self.message.cast())`. So the same `message` pointer is passed\nto `libc::free` twice -> double free / heap corruption / UB, exploitable\nfrom the C side just by creating a status and freeing it normally.","fix":"Remove the explicit `zil_free((*status).message.cast())` on line 164 and\nlet `drop_in_place` (which triggers the Drop impl) free the message exactly\nonce. I.e. just `status.drop_in_place()` then `zil_free(status.cast())`.","locations":[{"ref":"crates/zune-capi/src/errno.rs:161-171","code":"  161 | #[no_mangle]\n  162 | pub extern \"C\" fn zil_status_free(status: *mut ZStatus) {\n  163 |     if !status.is_null() {\n  164 |         unsafe { zil_free((*status).message.cast()) }\n  165 |         // free object\n  166 |         unsafe { status.drop_in_place() }\n  167 | \n  168 |         // free memory holding it\n  169 |         unsafe { zil_free(status.cast()) }\n  170 |     }\n  171 | }","lines":11},{"ref":"crates/zune-capi/src/errno.rs:81-85","code":"   81 | impl Drop for ZStatus {\n   82 |     fn drop(&mut self) {\n   83 |         unsafe { zil_free(self.message.cast()) };\n   84 |     }\n   85 | }","lines":5}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"`zil_status_new` leaks the `mem` (message) allocation when the `ptr` (ZStatus)\nallocation fails. If `zil_malloc(size_of::<ZStatus>())` returns null, the function\nstill allocates `mem`, then the `if !ptr.is_null()` block is skipped and `ptr`\n(null) is returned, so `mem` is never freed nor reachable -> leak. Also note `mem`\nis null-checked but `ptr` is only guarded, never reported as failure to the\ncaller (returns null silently, which is at least consistent).","fix":"Check `ptr.is_null()` first; if it is null, free `mem` (or allocate `mem` only\nafter confirming `ptr` is non-null) before returning null.","locations":[{"ref":"crates/zune-capi/src/errno.rs:105-125","code":"  105 | #[no_mangle]\n  106 | pub unsafe extern \"C\" fn zil_status_new() -> *mut ZStatus {\n  107 |     unsafe {\n  108 |         let ptr = zil_malloc(size_of::<ZStatus>());\n  109 | \n  110 |         let msg = CString::new(\"\").unwrap();\n  111 |         let mem = zil_malloc(msg.as_bytes_with_nul().len());\n  112 |         if mem.is_null() {\n  113 |             return ptr::null_mut();\n  114 |         }\n  115 |         // copy to memory\n  116 |         libc::strcpy(mem.cast(), msg.as_ptr());\n  117 | \n  118 |         if !ptr.is_null() {\n  119 |             (*ptr.cast::<ZStatus>()).message = mem.cast();\n  120 |             (*ptr.cast::<ZStatus>()).status = ZStatusType::ZilOk;\n  121 |         }\n  122 |         // make pointer\n  123 |         ptr.cast()\n  124 |     }\n  125 | }","lines":21}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In `zil_imread` the output buffer size is computed as\n`let new_size = w * h * colorspace * im_depth;` with no overflow check. For a\nmaliciously crafted header (large width/height) this multiplication can wrap on a\nusize, producing a small `new_size`. `zil_malloc(new_size)` then allocates a small\nbuffer while the decoder believes it has a full-size buffer (the size check in\n`zil_imdecode_into` re-derives `size` the same wrapped way), enabling a heap\nbuffer overflow. `zil_imdecode`/`zil_imdecode_into` (image.rs uses `checked_mul`,\nbut imread.rs does not) have the same unchecked pattern.","fix":"Use checked multiplication (like the `checked_mul` helper in image.rs) when\ncomputing the allocation/expected size, and bail out with an error status on\noverflow before allocating or decoding.","locations":[{"ref":"crates/zune-capi/src/imread.rs:68-96","code":"   68 |             if let Some(im_metadata) = zune_image::utils::decode_info(ZCursor::new(&data)) {\n   69 |                 // allocate a space big enough\n   70 |                 let (w, h) = im_metadata.dimensions();\n   71 |                 let colorspace = im_metadata.colorspace().num_components();\n   72 |                 let im_depth = im_metadata.depth().size_of();\n   73 | \n   74 |                 let new_size = w * h * colorspace * im_depth;\n   75 | \n   76 |                 let output = unsafe { zil_malloc(new_size) };\n   77 |                 if output.is_null() {\n   78 |                     unsafe {\n   79 |                         *status = ZStatus::new(\n   80 |                             format!(\"Malloc failed to allocate buffer with size of {new_size}\"),\n   81 |                             ZStatusType::ZilMallocFailed,\n   82 |                         )\n   83 |                     };\n   84 |                     return ERROR;\n   85 |                 }\n   86 |                 zil_imdecode_into(\n   87 |                     data.as_ptr(),\n   88 |                     data.len(),\n   89 |                     output.cast(),\n   90 |                     new_size,\n   91 |                     width,\n   92 |                     height,\n   93 |                     depth,\n   94 |                     channels,\n   95 |                     status,\n   96 |                 )","lines":29},{"ref":"crates/zune-capi/src/imread.rs:266-295","code":"  266 |         Some(metadata) => {\n  267 |             let (w, h) = metadata.dimensions();\n  268 |             let im_depth = metadata.depth();\n  269 |             let colorspace = metadata.colorspace();\n  270 |             let size = w * h * im_depth.size_of() * colorspace.num_components();\n  271 | \n  272 |             let output = unsafe { zil_malloc(size) };\n  273 |             if output.is_null() {\n  274 |                 unsafe {\n  275 |                     *status = ZStatus::new(\n  276 |                         format!(\"Malloc failed to allocate buffer with size of {size}\"),\n  277 |                         ZStatusType::ZilMallocFailed,\n  278 |                     )\n  279 |                 };\n  280 |                 return ERROR;\n  281 |             }\n  282 |             zil_imdecode_into(\n  283 |                 input,\n  284 |                 input_size,\n  285 |                 output.cast(),\n  286 |                 size,\n  287 |                 width,\n  288 |                 height,\n  289 |                 depth,\n  290 |                 channels,\n  291 |                 status,\n  292 |             )\n  293 |         }\n  294 |     }\n  295 | }","lines":30},{"ref":"crates/zune-capi/src/imread.rs:331-343","code":"  331 ,"easy":true,"description":"`find_contrast` computes `maximum + minimum` with the plain `Add` operator on\nthe integer pixel type before the `.saturating_add(T::one())`. For u8/u16 this\noverflows whenever max+min exceeds the type maximum (e.g. u8 max=200, min=100 ->\n300), which panics in debug builds and wraps in release builds. Only the `+1`\nis saturating; the `maximum + minimum` term is not protected.","fix":"Use a wider accumulator (e.g. compute in u32/u64) or `maximum.saturating_add(minimum)` for the denominator.","locations":[{"ref":"crates/zune-imageprocs/src/spatial_ops.rs:73-82","code":"   73 | pub(crate) fn find_contrast<T>(data: &[T]) -> T\n   74 | where\n   75 |     T: PartialOrd + Copy + NumOps<T> + Sub<Output = T> + Add<Output = T> + Div<Output = T>,\n   76 | {\n   77 |     let minimum = find_min(data);\n   78 |     let maximum = find_max(data);\n   79 |     let num = maximum - minimum;\n   80 |     let div = (maximum + minimum).saturating_add(T::one());\n   81 |     num / div\n   82 | }","lines":10}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`PngDecoder::decode` computes the output length with plain (unchecked) multiplication:\n`let new_len = info.width * info.height * out_n;` and then allocates\n`vec![0; new_len * usize::from(...)]`. width and height come from the IHDR chunk and are\nonly bounded by `options.max_width()`/`max_height()` (defaults are large, e.g. up to\n1<<31). On 32-bit targets `width * height * out_n` can overflow a usize and wrap to a\nsmall value, producing an undersized buffer (later writes/scatter then operate on wrong\nsizes), or in debug builds panic. The sibling routine `output_frame_size` (streaming.rs)\nand `output_buffer_size` (decoder.rs) both already use `checked_mul`, so `decode`\nsilently uses a less-safe path for the same computation. This parses untrusted\ndimensions.","fix":"Reuse `output_frame_size()`/`output_buffer_size()` (which use `checked_mul`) to compute\n`new_len`, or replace the bare multiplies with `checked_mul` and return\n`PngDecodeErrors` on overflow instead of multiplying directly.","locations":[{"ref":"crates/zune-png/src/decoder.rs:869-887","code":"  869 |         let info = &self.png_info;\n  870 |         let bytes = if info.depth == 16 { 2 } else { 1 };\n  871 | \n  872 |         let out_n = self.colorspace().unwrap().num_components();\n  873 |         let new_len = info.width * info.height * out_n;\n  874 | \n  875 |         let mut out_u8: Vec<u8> = vec![0; new_len * usize::from(info.depth != 16)];\n  876 |         let mut out_u16: Vec<u16> = vec![0; new_len * usize::from(info.depth == 16)];\n  877 | \n  878 |         // use either out_u8 or out_u16 depending on the expected type for the output\n  879 |         let out = if bytes == 1 {\n  880 |             &mut out_u8\n  881 |         } else {\n  882 |             let b = convert_u16_to_u8_slice(&mut out_u16);\n  883 | \n  884 |             assert_eq!(b.len(), new_len * 2); // length should be twice that of u8\n  885 |             b\n  886 |         };\n  887 |         self.decode_stream_into(out)?;","lines":19}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`PPMDecoder::decode` computes the allocation size with unchecked multiplication\n`size = self.width * self.height * self.colorspace.num_components() * self.bit_depth.size_of()`\nand uses it directly in `vec![0; size]` / `vec![0; size/2]` / the F32 paths. Width and\nheight come from header integers bounded only by `max_width`/`max_height`; if a caller\nraises those limits the product can overflow `usize` and panic, or wrap in release builds\nand mis-size the output buffer. Unlike other decoders here there is no checked\n`output_buffer_size` helper guarding this path.","fix":"Compute `size` with `checked_mul` and return a decode error on overflow before allocating,\nmirroring the checked size ng the slice check and corrupting\ndecode bounds. `decode_into` is a public entry point reachable without going through the\nchecked `required_len()`.","fix":"Compute the length once via the checked `required_len()` and reuse it in `decode_into`\ninstead of recomputing with `*`, returning the existing overflow error on `None`.","locations":[{"ref":"crates/zune-psd/src/decoder.rs:387-405","code":"  387 |     pub fn decode_into(&mut self, output: &mut [u8]) -> Result<usize, PSDDecodeErrors> {\n  388 |         if !self.decoded_header {\n  389 |             self.decode_headers()?;\n  390 |         }\n  391 | \n  392 |         let pixel_count = self.width * self.height;\n  393 |         let bytes_per_sample = match self.depth {\n  394 |             BitDepth::Eight => 1,\n  395 |             BitDepth::Sixteen => 2,\n  396 |             _ => return Err(PSDDecodeErrors::Generic(\"Unsupported bit depth\")),\n  397 |         };\n  398 | \n  399 |         let required_len = pixel_count * self.channel_count * bytes_per_sample;\n  400 | \n  401 |         if output.len() < required_len {\n  402 |             return Err(PSDDecodeErrors::Generic(\"Output buffer too small\"));\n  403 |         }\n  404 | \n  405 |         let out = &mut output[..required_len];","lines":19},{"ref":"crates/zune-psd/src/decoder.rs:308-329","code":"  308 |     pub fn required_len(&self) -> Result<usize, PSDDecodeErrors> {\n  309 |         if !self.decoded_header {\n  310 |             return Err(PSDDecodeErrors::Generic(\"Headers not decoded\"));\n  311 |         }\n  312 | \n  313 |         let bytes_per_sample = match self.depth {\n  314 |             BitDepth::Eight => 1usize,\n  315 |             BitDepth::Sixteen => 2usize,\n  316 |             _ => return Err(PSDDecodeErrors::Generic(\"Unsupported bit depth\")),\n  317 |         };\n  318 | \n  319 |         let pixel_count = self.width\n  320 |             .checked_mul(self.height)\n  321 |             .ok_or(PSDDecodeErrors::Generic(\"Dimension \n  412 |     where\n  413 |         F: Fn(usize, usize, &mut [T; MAX_CHANNELS]),\n  414 |         T: ZuneInts<T> + Copy + Clone + 'static + Default + Debug + Zeroable + Pod,\n  415 |     {\n  416 |         let size = width * height * T::depth().size_of();\n  417 | \n  418 |         let mut channels = vec![Channel::new_with_length::<T>(size); COMPONENTS];\n  419 | \n  420 |         // convert the channels into mutable T's\n  421 |         //\n  422 |         // Iterate to number of components,\n  423 |         // map the channels to &mut [T], using reintepret_as_mut\n  424 |         // collect the items into a temporary vec\n  425 |         // convert that vec to a fixed size array\n  426 |         // panic if everything goes wrong\n  427 |         let channels_ref: [&mut [T]; COMPONENTS] = channels\n  428 |             .get_mut(0..COMPONENTS)\n  429 |             .unwrap()\n  430 |             .iter_mut()\n  431 |             .map(|x| x.reinterpret_as_mut().unwrap())\n  432 |             .collect::<Vec<&mut [T]>>()\n  433 |             .try_into()\n  434 |             .unwrap();\n  435 | \n  436 |         let mut pxs = [T::default(); MAX_CHANNELS];\n  437 | \n  438 |         for y in 0..height {\n  439 |             for x in 0..width {\n  440 |                 (func)(y, x, &mut pxs);\n  441 | \n  442 |                 let offset = y * width + x;\n  443 | \n  444 |                 for i in 0..COMPONENTS {\n  445 |                     channels_ref[i][offset] = pxs[i];\n  446 |                 }\n  447 |             }\n  448 |         }\n  449 | \n  450 |         Image::new(channels, T::depth(), width, height, colorspace)\n  451 |     }","lines":43},{"ref":"crates/zune-image/src/core_filters/colorspace/conversion_functions.rs:66-67","code":"   66 |     let (width, height) = image.dimensions();\n   67 |     let size = width * height * image.depth().size_of();","lines":2},{"ref":"crates/zune-image/src/iters.rs:141-148","code":"  141 |         Ok(PixelIterator {\n  142 | ).num_components()))\n 1604 | }","lines":8},{"ref":"crates/zune-jpegxl/src/encoder.rs:1111-1117","code":" 1111 |         let expected = calculate_expected_input(&self.options)\n 1112 |             .ok_or(JxlEncodeErrors::Generic(\"Input dimensions overflowed\"))?;\n 1113 |         let found = self.data.len();\n 1114 | \n 1115 |         if expected != found {\n 1116 |             return Err(JxlEncodeErrors::LengthMismatch(expected, found));\n 1117 |         }","lines":7},{"ref":"crates/zune-jpegxl/src/encoder.rs:768-770","code":"  768 |         let row_start = row_stride * (y0 + y) + x0 * channels * BitDepth::K_INPUT_BYTES;\n  769 | \n  770 |         let rgba_row = &pixels[row_start..];","lines":3}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In `decode_headers`, `let p = self.hsize.wrapping_sub(self.ihszie).wrapping_sub(14)`\nreads the struct fields `self.hsize` and `self.ihszie`, but those fields are only assigned\nlater at lines 592-593 (after this point they are still their constructor value 0). So `p`\nis always `0u32.wrapping_sub(0).wrapping_sub(14) = 0xFFFFFFF2`, not the intended\n`hsize - ihsize - 14`. This corrupts the palette-size logic that depends on `p`:\n`colors = 256.min(p/3)` (line 546) always yields 256, and the OS/2 guard\n`if p < colors*3` (line 553) can never trigger. The local `hsize`/`ihsize` values parsed\nin this function are what should have been used.","fix":"Use the locals computed in this function: `let p = hsize.wrapping_sub(ihsize).wrapping_sub(14);`\n(or assign `self.hsize`/`self.ihszie` before line 527). Then re-validate the OS/2 palette\nbounds against the real value.","locations":[{"ref":"crates/zune-bmp/src/decoder.rs:527-527","code":"  527 |         let p = self.hsize.wrapping_sub(self.ihszie).wrapping_sub(14);","lines":1},{"ref":"crates/zune-bmp/src/decoder.rs:545-554","code":"  545 |             } else {\n  546 |                 colors = 256.min(p / 3);\n  547 |
