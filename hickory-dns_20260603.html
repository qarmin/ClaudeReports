response_meta =\n  333 |                         Metadata::new(update.metadata.id, MessageType::Response, OpCode::Update);\n  334 |                     response_meta.response_code = response_code;\n  335 |                     let tbs_response = MessageResponseBuilder::new(&update.queries, response_edns)\n  336 |                         .build_no_records(response_meta);\n  337 |                     if let Err(error) = tbs_response.destructive_emit(&mut encoder) {\n  338 |                         error!(%error, \"error encoding response\");\n  339 |                         return send_error_response(\n  340 |                             update,\n  341 |                             ResponseCode::ServFail,\n  342 |                             response_edns,\n  343 |                             response_handle,\n  344 |                         )\n  345 |                         .await;\n  346 |                     }\n  347 |                     match signer.sign(&tbs_response_buf) {\n  348 |                         Ok(signature) => response.set_signature(signature),\n  349 |                         Err(error) => {\n  350 |                             error!(%error, \"error signing response\");\n  351 |                             return send_error_response(\n  352 |                                 update,\n  353 |                                 ResponseCode::ServFail,\n  354 |                                 response_edns,\n  355 |                                 response_handle,\n  356 |                             )\n  357 |                             .await;\n  358 |                         }\n  359 |                     }\n  360 |                 }\n  361 | \n  362 |                 match response_handle.send_response(response).await {\n  363 |                     Err(error) => {\n  364 |                         error!(%error, \"error sending message\");\n  365 |                         return ResponseInfo::serve_failed(update);\n  366 |                     }\n  367 |                     Ok(response_info) => return response_info,\n  368 |                 }\n  369 |             }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"In tsig.rs, the try_borrow() implementation names its local variable 'csync' at line 438. The variable should be named 'tsig' since this is the TSIG record implementation. This is a copy-paste artifact from the CSYNC implementation. The same pattern exists in opt.rs line 343 ('csync' in OPT::try_borrow), hinfo.rs line 142 ('csync' in HINFO::try_borrow), null.rs line 82 ('csync'), openpgpkey.rs line 93 ('csync'), and naptr.rs line 288 ('csync').","fix":"Rename the pattern variable in each try_borrow() to match the record type (e.g., 'tsig', 'opt', 'hinfo', 'null', 'key', 'naptr').","locations":[{"ref":"crates/proto/src/rr/rdata/tsig.rs:436-441","code":"  436 |     fn try_borrow(data: &RData) -> Option<&Self> {\n  437 |         match data {\n  438 |             RData::TSIG(csync) => Some(csync),\n  439 |             _ => None,\n  440 |         }\n  441 |     }"},{"ref":"crates/proto/src/rr/rdata/opt.rs:341-346","code":"  341 |     fn try_borrow(data: &RData) -> Option<&Self> {\n  342 |         match data {\n  343 |             RData::OPT(csync) => Some(csync),\n  344 |             _ => None,\n  345 |         }\n  346 |     }"},{"ref":"crates/proto/src/rr/rdata/hinfo.rs:141-146","code":"  141 |     fn try_borrow(data: &RData) -> Option<&Self> {\n  142 |         match data {\n  143 |             RData::HINFO(csync) => Some(csync),\n  144 |             _ => None,\n  145 |         }\n  146 |     }"},{"ref":"crates/proto/src/rr/rdata/null.rs:82-87","code":"   82 |     fn try_borrow(data: &RData) -> Option<&Self> {\n   83 |         match data {\n   84 |             RData::NULL(csync) => Some(csync),\n   85 |             _ => None,\n   86 |         }\n   87 |     }"},{"ref":"crates/proto/src/rr/rdata/openpgpkey.rs:92-97","code":"   92 | impl RecordData for OPENPGPKEY {\n   93 |     fn try_borrow(data: &RData) -> Option<&Self> {\n   94 |         match data {\n   95 |             RData::OPENPGPKEY(csync) => Some(csync),\n   96 |             _ => None,\n   97 |         }"},{"ref":"crates/proto/src/rr/rdata/naptr.rs:287-292","code":"  287 |     fn try_borrow(data: &RData) -> Option<&Self> {\n  288 |         match data {\n  289 |             RData::NAPTR(csync) => Some(csync),\n  290 |             _ => None,\n  291 |         }\n  292 |     }"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"In `tsig.rs`, the `TSigResponseContext::new` doc comment duplicates the first line: 'Create a new TSIG response context' appears twice consecutively on lines 60-61.","fix":"Remove the duplicate doc comment line.","locations":[{"ref":"crates/proto/src/rr/tsig.rs:59-61","code":"   59 |     /// Create a new TSIG response context\n   60 |     /// Create a new TSIG response context\n   61 |     pub fn new("}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"fetch_ds_records() silently discards network errors, causing Bogus proof to be cached.\n\nAt line 822, the Err(_) arm discards any error from the DS lookup:\n  Err(_) => {}\n\nThe function then falls through to return Err(ProofError::ds_should_exist(zone)) which carries\nProof::Bogus. The caller (fetch_ds_records -> verify_dnskey_rrset) propagates this Bogus error.\nThe validation cache (line 428-436 in verify_rrsets) only exempts ProofErrorKind::Net errors\nfrom caching. A ds_should_exist error (which looks like a Bogus DNS state rather than a\ntransient network failure) WILL be cached, meaning a temporary DNS network failure during DS\nlookup causes the DNSKEY to be permanently marked Bogus until the cache entry expires.\n\nAn attacker who can transiently block DS lookups can cause legitimate DNSSEC zones to be\npermanently (up to TTL) marked as Bogus.","fix":"Propagate network errors as ProofErrorKind::Net instead of silently discarding them:\n\n  Err(net) => {\n      return Err(ProofError::new(\n          Proof::Bogus,\n          ProofErrorKind::Net {\n              query: Query::new(zone.clone(), RecordType::DS),\n              net,\n          },\n      ));\n  }\n\nThis ensures the error is not cached (consistent with the existing Net error handling at line 430).","locations":[{"ref":"crates/net/src/dnssec/mod.rs:822-825","code":"  822 |             Err(_) => {}\n  823 |         }\n  824 | \n  825 |         Err(ProofError::ds_should_exist(zone))"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `QuicStream::receive_bytes()`, if the initial `read_exact()` call to read\nthe 2-byte length prefix fails (line 195), the error is propagated via `?`\nwithout calling `self.reset(DoqErrorCode::ProtocolError)`. However, when the\nsecond `read_exact()` call (reading the message body) fails (line 205-211), the\ncode *does* call `self.reset()`. This inconsistency means that a broken-length\nprefix error leaves the stream open without signalling a protocol error to the\nremote peer, contrary to the RFC 9250 expectation.","fix":"Apply the same `reset(DoqErrorCode::ProtocolError)` treatment when the length\nprefix read fails:\n```rust\nlet mut len = [0u8; 2];\nif let Err(e) = self.receive_stream.read_exact(&mut len).await {\n    if let Err(error) = self.reset(DoqErrorCode::ProtocolError) {\n        debug!(%error, \"stream already closed\");\n    }\n    return Err(NetError::from(e));\n}\nlet len = u16::from_be_bytes(len) as usize;\n```","locations":[{"ref":"crates/net/src/quic/quic_stream.rs:192-212","code":"  192 |     pub async fn receive_bytes(&mut self) -> Result<BytesMut, NetError> {\n  193 |         // following above, the data should be first the length, followed by the message(s)\n  194 |         let mut len = [0u8; 2];\n  195 |         self.receive_stream.read_exact(&mut len).await?;\n  196 |         let len = u16::from_be_bytes(len) as usize;\n  197 | \n  198 |         // RFC: DoQ queries and responses are sent on QUIC streams, which in theory can carry up to\n  199 |         // 2^62 bytes.  However, DNS messages are restricted in practice to a maximum size of 65535\n  200 |         // bytes.  This maximum size is enforced by the use of a 2-octet message length field in DNS\n  201 |         // over TCP [RFC1035] and DoT [RFC7858], and by the definition of the\n  202 |         // \"application/dns-message\" for DoH [RFC8484].  DoQ enforces the same restriction.\n  203 |         let mut bytes = BytesMut::with_capacity(len);\n  204 |         bytes.resize(len, 0);\n  205 |         if let Err(e) = self.receive_stream.read_exact(&mut bytes[..len]).await {\n  206 |             debug!(\"received bad packet len: {} bytes: {:?}\", len, bytes);\n  207 | \n  208 |             if let Err(error) = self.reset(DoqErrorCode::ProtocolError) {\n  209 |                 debug!(%error, \"stream already closed\");\n  210 |             }\n  211 |             return Err(NetError::from(e));\n  212 |         }"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In `ValidatingRecursor::resolve()` (recursor/mod.rs line 504-511), when the response code is\nNXDomain, the code calls `DnsError::from_response(response)`, expects an `Err` variant, and if\nit gets an unexpected `Ok` returns a `RecursorError` with the literal string\n`\"unable to build ProtoError from response {response:?}\"` — note the `{response:?}` is a\nstring literal with braces, not an actual format insertion, because the variable `response` was\nconsumed by `from_response()` on the same line. The error message is therefore always wrong\nand unhelpful for debugging.","fix":"The `response` variable is moved into `DnsError::from_response()` so it cannot be referenced\nin the error string. Fix the error message to not reference `response`, or restructure to\npreserve the information needed for the message before moving the value.","locations":[{"ref":"crates/resolver/src/recursor/mod.rs:503-511","code":"  503 |             use crate::recursor::RecursorError;\n  504 | \n  505 |             let Err(dns_error) = DnsError::from_response(response) else {\n  506 |                 return Err(RecursorError::from(\n  507 |                     \"unable to build ProtoError from response {response:?}\",\n  508 |                 ));\n  509 |             };\n  510 | \n  511 |             Err(RecursorError::Net(NetError::from(dns_error)))"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"In UdpStream::poll_next and UdpClientStream::send, the receive buffer is allocated as a stack array of 4096 bytes (`[0u8; MAX_RECEIVE_BUFFER_SIZE]` in UdpStream) or a heap Vec of up to 4096 bytes per send (UdpClientStream). In UdpStream this is a 4KB stack allocation on every poll_next call. While not a heap allocation, this 4KB stack frame contributes to larger stack usage in deeply nested async contexts. In UdpClientStream, the response buffer `vec![0; self.recv_buf_size]` is freshly allocated for every single DNS query attempt, and also re-used only for 3 response attempts in the inner loop.","fix":"For UdpStream, consider making the receive buffer a field of the struct so it is allocated once rather than on every poll call. For UdpClientStream, the current per-query allocation is acceptable but could be replaced with a pre-allocated buffer in UdpClientStream fields if memory pressure is a concern.","locations":[{"ref":"crates/net/src/udp/udp_stream.rs:185","code":"  185 |         let mut buf = [0u8; MAX_RECEIVE_BUFFER_SIZE];"},{"ref":"crates/net/src/udp/udp_client_stream.rs:217","code":"  217 |         let mut recv_buf = vec![0; self.recv_buf_size];"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"The `Ord` implementation for `RData` (line 1322-1327) calls `self.to_bytes()` and `other.to_bytes()` on every comparison, which allocates two `Vec<u8>` and serializes both RData values to binary. This is used whenever `RData` values are compared (e.g., in BTreeMap/BTreeSet lookups, sorting for DNSSEC canonical ordering). For types like OPT or TXT with large payloads, this means O(n) allocation per comparison, leading to O(n log n) allocations in a sort of n records.","fix":"Cache the serialized form in a `OnceCell<Vec<u8>>` inside each `RData` variant, or implement `Ord` structurally per variant. Alternatively, store a pre-computed canonical byte representation alongside the decoded RData.","locations":[{"ref":"crates/proto/src/rr/record_data.rs:1322-1327","code":" 1322 |     fn cmp(&self, other: &Self) -> Ordering {\n 1323 |         // TODO: how about we just store the bytes with the decoded data?\n 1324 |         //  the decoded data is useful for queries, the encoded data is needed for transfers, signing\n 1325 |         //  and ordering.\n 1326 |         self.to_bytes().cmp(&other.to_bytes())\n 1327 |     }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"ValidationCache uses DefaultHasher (non-cryptographic, collision-prone) as the sole cache key.\n\nRrsetVerificationContext::key() at lines 1638-1658 builds a ValidationCacheKey from a single\nu64 produced by DefaultHasher. This has two problems:\n\n1. Hash collisions: Two distinct RRSET contexts may produce the same u64 key, causing a cached\n   validation result for one RRSET to be returned for a completely different RRSET. This can\n   cause false Secure or false Bogus results for RRSETs that were never actually validated.\n\n2. DefaultHasher is not deterministic across Rust versions/compilations and could theoretically\n   be influenced in pathological ways if an attacker can craft DNS responses to cause collisions\n   (though this requires significant knowledge of the hasher internals).\n\nWith DEFAULT_VALIDATION_CACHE_SIZE of 1,048,576 entries and a 64-bit hash space, the birthday\nparadox gives a collision probability of roughly 1 in 2^32 per lookup, which may be acceptable,\nbut the cache provides no collision detection.","fix":"Use a proper compound key (e.g., a struct with query name, record type, and a hash of the\nRRSET content) instead of a single u64 hash. At minimum, store the full hashed value in a\nu128 by using two DefaultHasher calls with different seeds, or use a dedicated struct key with\nEq checking.\n\nConsider using a (LowerName, RecordType, u64) tuple as the cache key, where the u64 is used\nonly as a quick discriminant and actual equality is verified before returning cached results.","locations":[{"ref":"crates/net/src/dnssec/mod.rs:1638-1658","code":" 1638 |     fn key(&self) -> ValidationCacheKey {\n 1639 |         let mut hasher = DefaultHasher::new();\n 1640 |         self.query.name.hash(&mut hasher);\n 1641 |         self.query.query_class.hash(&mut hasher);\n 1642 |         self.query.query_type.hash(&mut hasher);\n 1643 |         self.key.name.hash(&mut hasher);\n 1644 |         self.key.record_type.hash(&mut hasher);\n 1645 | \n 1646 |         for rec in self.rrset.records.iter() {\n 1647 |             rec.name.hash(&mut hasher);\n 1648 |             rec.dns_class.hash(&mut hasher);\n 1649 |             rec.data.hash(&mut hasher);\n 1650 |         }\n 1651 |         for rec in self.rrset.signatures.iter() {\n 1652 |             rec.name.hash(&mut hasher);\n 1653 |             rec.dns_class.hash(&mut hasher);\n 1654 |             rec.data.hash(&mut hasher);\n 1655 |         }\n 1656 | \n 1657 |         ValidationCacheKey(hasher.finish())\n 1658 |     }"},{"ref":"crates/net/src/dnssec/mod.rs:1661-1662","code":" 1661 | #[derive(Hash, Eq, PartialEq)]\n 1662 | struct ValidationCacheKey(u64);"},{"ref":"crates/net/src/dnssec/mod.rs:1975-1977","code":" 1975 | /// The default validation cache size.  This is somewhat arbitrary, but set to the same size as the default\n 1976 | /// recursor response cache\n 1977 | const DEFAULT_VALIDATION_CACHE_SIZE: usize = 1_048_576;"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"`QuicStream::receive()` parses the received DNS bytes twice. It first calls\n`Message::from_vec(&bytes)` (line 177) solely to inspect the message ID field,\nand then calls `DnsResponse::from_buffer(bytes.to_vec())` (line 187) which\ndeserializes the same bytes a second time into a `DnsResponse`. For a DNS\nserver handling high query rates, this double-deserialization is unnecessary\noverhead.","fix":"Construct a `DnsResponse` from the already-parsed `Message` instead of\nre-parsing the raw bytes:\n```rust\npub async fn receive(&mut self) -> Result<DnsResponse, NetError> {\n    let bytes = self.receive_bytes().await?;\n    let message = Message::from_vec(&bytes)?;\n    if message.id != 0 {\n        if let Err(error) = self.reset(DoqErrorCode::ProtocolError) {\n            debug!(%error, \"stream already closed\");\n        }\n        return Err(NetError::QuicMessageIdNot0(message.id));\n    }\n    Ok(DnsResponse::from(message))\n}\n```","locations":[{"ref":"crates/net/src/quic/quic_stream.rs:175-188","code":"  175 |     pub async fn receive(&mut self) -> Result<DnsResponse, NetError> {\n  176 |         let bytes = self.receive_bytes().await?;\n  177 |         let message = Message::from_vec(&bytes)?;\n  178 | \n  179 |         // assert that the message id is 0, this is a bad dns-over-quic packet if not\n  180 |         if message.id != 0 {\n  181 |             if let Err(error) = self.reset(DoqErrorCode::ProtocolError) {\n  182 |                 debug!(%error, \"stream already closed\");\n  183 |             }\n  184 |             return Err(NetError::QuicMessageIdNot0(message.id));\n  185 |         }\n  186 | \n  187 |         Ok(DnsResponse::from_buffer(bytes.to_vec())?)\n  188 |     }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"In UdpClientStream::send (UdpRequest::send), the sent message bytes are re-decoded from the serialized wire format to validate the question section (`Message::from_vec(msg.bytes())?` on line 285). This performs a full DNS message deserialization just to extract the query list for comparison, even though the original DnsRequest already carries the parsed queries. This is wasteful on every UDP send attempt including all retries.","fix":"Instead of re-parsing `msg.bytes()`, use `self.request.queries` directly (which is already available as `&request.queries`). The request was cloned into UdpRequest at construction time, so the original query list is available without re-decoding.","locations":[{"ref":"crates/net/src/udp/udp_client_stream.rs:285-310","code":"  285 |             let request_message = Message::from_vec(msg.bytes())?;\n  286 |             let request_queries = &request_message.queries;\n  287 |             let response_queries = &mut response.queries;\n  288 | \n  289 |             let question_matches = response_queries\n  290 |                 .iter()\n  291 |                 .all(|elem| request_queries.contains(elem));\n  292 |             if self.case_randomization\n  293 |                 && question_matches\n  294 |                 && !response_queries.iter().all(|elem| {\n  295 |                     request_queries\n  296 |                         .iter()\n  297 |                         .any(|req_q| req_q == elem && req_q.name.eq_case(&elem.name))\n  298 |                 })\n  299 |             {\n  300 |                 warn!(\n  301 |                     \"case of question section did not match: we expected '{request_queries:?}', but received '{response_queries:?}' from server {src}\"\n  302 |                 );\n  303 |                 return Err(NetError::QueryCaseMismatch);\n  304 |             }\n  305 |             if !question_matches {\n  306 |                 warn!(\n  307 |                     \"detected forged question section: we expected '{request_queries:?}', but received '{response_queries:?}' from server {src}\"\n  308 |                 );\n  309 |                 continue;\n  310 |             }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"In UdpStream::poll_next (line 188) and MdnsStream::poll_next (line 303), received UDP data is copied byte-by-byte using iterator chaining (`buf.iter().take(len).cloned().collect()`) instead of a direct slice copy. This is significantly slower than `buf[..len].to_vec()` or `Vec::from(&buf[..len])` and generates more iterator overhead per received packet.","fix":"Replace `buf.iter().take(len).cloned().collect()` with `buf[..len].to_vec()`. This performs a single memcpy instead of an element-by-element iterator copy.","locations":[{"ref":"crates/net/src/udp/udp_stream.rs:188","code":"  188 |         let serial_message = SerialMessage::new(buf.iter().take(len).cloned().collect(), src);"},{"ref":"crates/net/src/multicast/mdns_stream.rs:303","code":"  303 |                         buf.iter().take(len).cloned().collect(),"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"`AccessControlSetBuilder::build` counts the elements in the allow prefix sets by calling\n`self.0.v4_allow.iter().count() + self.0.v6_allow.iter().count()` (lines 81-82). This iterates\nover potentially large prefix sets just to determine if they are non-empty. The\n`PrefixSet::is_empty()` method should be used instead, which is an O(1) operation.","fix":"Replace the count with an emptiness check:\n```rust\nlet deny_empty = self.0.v4_deny.is_empty() && self.0.v6_deny.is_empty();\nlet allow_non_empty = !self.0.v4_allow.is_empty() || !self.0.v6_allow.is_empty();\nif deny_empty && allow_non_empty {\n    return Err(...);\n}\n```","locations":[{"ref":"crates/proto/src/access_control.rs:79-88","code":"   79 |     pub fn build(self) -> Result<AccessControlSet, ProtoError> {\n   80 |         let deny_empty = self.0.v4_deny.is_empty() && self.0.v6_deny.is_empty();\n   81 |         let allowed_count = self.0.v4_allow.iter().count() + self.0.v6_allow.iter().count();\n   82 |         if deny_empty && allowed_count != 0 {\n   83 |             return Err(format!(\n   84 |                 \"access control set {name:?} has {allowed_count} allowed overrides, but no denied networks to override\",\n   85 |                 name = self.0.name\n   86 |             ).into());\n   87 |         }\n   88 |         Ok(self.0)"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","description":"`DNSKEY::calculate_key_tag_internal()` and the `key_tag()` function in `ds.rs` implement the same\nRFC 2535 Appendix C checksum, but are separate copies. `DNSKEY::calculate_key_tag_internal` sums\n`key[i] << 8` for even indices and `key[i]` for odd indices. The `key_tag()` function in `ds.rs`\nimplements the same logic with slightly different code (using `usize` accumulator with the same\nshift). Both are public or crate-visible, creating duplicate implementations that may diverge.\nFurthermore, the comment in `ds.rs` line 450 (\"this is unnecessary, no?\") indicates the author\nwas uncertain about the final truncation, which is a maintainability concern.","fix":"Remove the private `key_tag()` function in `ds.rs` (or make it a call to\n`DNSKEY::calculate_key_tag_internal`) to eliminate the duplicate. The truncation `as u16` at line\n450 is correct (the accumulator can exceed u16::MAX after the carry fold) and the comment should\nbe removed.","locations":[{"ref":"crates/proto/src/dnssec/rdata/dnskey.rs:384-391","code":"  384 |     pub fn calculate_key_tag_internal(bytes: &[u8]) -> u16 {\n  385 |         let mut ac: u32 = 0;\n  386 |         for (i, k) in bytes.iter().enumerate() {\n  387 |             ac += u32::from(*k) << if i & 0x01 != 0 { 0 } else { 8 };\n  388 |         }\n  389 |         ac += ac >> 16;\n  390 |         (ac & 0xFFFF) as u16\n  391 |     }"},{"ref":"crates/proto/src/dnssec/rdata/ds.rs:438-451","code":"  438 | fn key_tag(public_key: &[u8]) -> u16 {\n  439 |     let mut ac = 0;\n  440 | \n  441 |     for (i, k) in public_key.iter().enumerate() {\n  442 |         ac += if i & 0x0001 == 0x0001 {\n  443 |             *k as usize\n  444 |         } else {\n  445 |             (*k as usize) << 8\n  446 |         };\n  447 |     }\n  448 | \n  449 |     ac += (ac >> 16) & 0xFFFF;\n  450 |     (ac & 0xFFFF) as u16 // this is unnecessary, no?\n  451 | }"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","description":"`emit_message_parts` in `message.rs` calls `edns.cloned()` on `Option<&Edns>` (line 597), which\nclones the entire `Edns` struct (including its internal `OPT` map) every time a message is\nserialized, just to call `set_rcode_high` on the clone. This is wasteful since the EDNS rcode\nbyte could be computed and emitted directly without cloning the entire `Edns` object.","fix":"Instead of cloning `Edns` and mutating the clone, emit the OPT record fields directly in the\nencoder by reading from the existing `Edns` reference and passing the response code high bits as\na separate parameter, or compute the TTL field inline:\n```rust\nlet mut ttl = u32::from(metadata.response_code.high()) << 24;\nttl |= u32::from(edns.version()) << 16;\nttl |= u32::from(u16::from(*edns.flags()));\n// ... emit OPT record directly\n```\nThis avoids allocating a full clone of the options map on every message serialization.","locations":[{"ref":"crates/proto/src/op/message.rs:597-603","code":"  597 |     if let Some(mut edns) = edns.cloned() {\n  598 |         // need to commit the error code\n  599 |         edns.set_rcode_high(metadata.response_code.high());\n  600 | \n  601 |         let count = count_was_truncated(encoder.emit_iter([&Record::from(&edns)]))?;\n  602 |         additional_count.0 += count.0;\n  603 |         additional_count.1 |= count.1;"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","description":"In opt.rs, the OPT record read_data() implementation uses a byte-at-a-time state machine (OptReadState::Data) that pops one byte per iteration instead of reading the full option data in a single call. For options with large values (up to 65535 bytes), this is O(n) loop iterations with function call overhead per byte. The TODO comments at lines 301 and 312 acknowledge this. For a DoS scenario with crafted large EDNS options, this degrades performance significantly.","fix":"Replace the byte-at-a-time loop with a single decoder.read_vec(length) call. The existing zero-length fast path at line 294 already shows the right pattern. Remove the OptReadState::Data variant and merge the logic into the Code branch.","locations":[{"ref":"crates/proto/src/rr/rdata/opt.rs:307-323","code":"  307 |                 OptReadState::Data {\n  308 |                     code,\n  309 |                     length,\n  310 |                     mut collected,\n  311 |                 } => {\n  312 |                     // TODO: can this be replaced by read_slice()?\n  313 |                     collected.push(decoder.pop()?.unverified(/*byte array is safe*/));\n  314 |                     if length == collected.len() {\n  315 |                         options.push((code, (code, &collected as &[u8]).try_into()?));\n  316 |                         state = OptReadState::ReadCode;\n  317 |                     } else {\n  318 |                         state = OptReadState::Data {\n  319 |                             code,\n  320 |                             length,\n  321 |                             collected,\n  322 |                         };\n  323 |                     }"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","description":"In svcb.rs, the Mandatory::fmt() and Alpn::fmt() and IpHint::fmt() Display implementations all output trailing commas after the last element (lines 975-980, 1145-1150, 1323-1328). This produces invalid presentation format for SVCB/HTTPS records since the comma-separated list should not have a trailing comma. When a SVCB record is displayed and then re-parsed, the trailing comma may cause a parse error or an empty element to be parsed as the last list entry.","fix":"Use itertools or manual join logic to only emit commas between elements, not after the last one. For example, use 'self.0.iter().map(|k| k.to_string()).collect::<Vec<_>>().join(\",\")' pattern, or track whether it's the first element and only emit ',' before non-first elements.","locations":[{"ref":"crates/proto/src/rr/rdata/svcb.rs:974-980","code":"  974 |         for key in self.0.iter() {\n  975 |             // TODO: confirm in the RFC that trailing commas are ok\n  976 |             write!(f, \"{key},\")?;\n  977 |         }\n  978 | \n  979 |         Ok(())\n  980 |     }"},{"ref":"crates/proto/src/rr/rdata/svcb.rs:1144-1151","code":" 1144 |     fn fmt(&self, f: &mut fmt::Formatter<'_>) -> Result<(), fmt::Error> {\n 1145 |         for alpn in self.0.iter() {\n 1146 |             // TODO: confirm in the RFC that trailing commas are ok\n 1147 |             write!(f, \"{alpn},\")?;\n 1148 |         }\n 1149 | \n 1150 |         Ok(())\n 1151 |     }"},{"ref":"crates/proto/src/rr/rdata/svcb.rs:1323-1329","code":" 1323 |     fn fmt(&self, f: &mut fmt::Formatter<'_>) -> Result<(), fmt::Error> {\n 1324 |         for ip in self.0.iter() {\n 1325 |             write!(f, \"{ip},\")?;\n 1326 |         }\n 1327 | \n 1328 |         Ok(())\n 1329 |     }"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","description":"In `RecordTypeSet::emit` (record_type_set.rs lines 79-116), when `original_encoding` is `None`, the encoder builds a `BTreeMap<u8, Vec<u8>>` and then iterates it to emit the bitmap. This means every call to `emit` without a cached encoding re-allocates the map and all the per-window byte vectors. For a record type that is encoded many times (e.g. NSEC in a large zone signing operation), this creates significant allocation pressure.","fix":"Compute and cache the encoded form in `original_encoding` on first emission, similar to how it is preserved during decoding. Alternatively, pre-compute the encoding once during construction when `original_encoding` is None.","locations":[{"ref":"crates/proto/src/rr/record_type_set.rs:79-116","code":"   79 |     fn emit(&self, encoder: &mut BinEncoder<'_>) -> ProtoResult<()> {\n   80 |         if let Some(encoded_bytes) = &self.original_encoding {\n   81 |             return encoder.emit_slice(encoded_bytes);\n   82 |         }\n   83 | \n   84 |         let mut hash: BTreeMap<u8, Vec<u8>> = BTreeMap::new();\n   85 | \n   86 |         // collect the bitmaps\n   87 |         for rr_type in self.types.iter() {\n   88 |             let code = u16::from(*rr_type);\n   89 |             let window = (code >> 8) as u8;\n   90 |             let low = (code & 0x00FF) as u8;\n   91 | \n   92 |             let bit_map = hash.entry(window).or_default();\n   93 |             // len + left is the block in the bitmap, divided by 8 for the bits, + the bit in the current_byte\n   94 |             let index = low / 8;\n   95 |             let bit = 0b1000_0000 >> (low % 8);\n   96 | \n   97 |             // adding necessary space to the vector\n   98 |             if bit_map.len() < (index as usize + 1) {\n   99 |                 bit_map.resize(index as usize + 1, 0_u8);\n  100 |             }\n  101 | \n  102 |             bit_map[index as usize] |= bit;\n  103 |         }\n  104 | \n  105 |         // output bitmaps\n  106 |         for (window, bitmap) in hash {\n  107 |             window.emit(encoder)?;\n  108 |             // the hashset should never be larger that 255 based on above logic.\n  109 |             (bitmap.len() as u8).emit(encoder)?;\n  110 |             for bits in bitmap {\n  111 |                 bits.emit(encoder)?;\n  112 |             }\n  113 |         }\n  114 | \n  115 |         Ok(())\n  116 |     }"}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"low","description":"In `RecordSet::insert`, when updating a record with matching RData but different TTL, the method clones the record unnecessarily (line 373: `self.records.push(record.clone())`). Since `swap_remove` is used immediately after, and there should only ever be one matching record (RData equality is unique within a set), `record.clone()` is wasteful. The comment on the same line acknowledges this: 'TODO: this shouldn't really need a clone since there should only be one'.","fix":"Instead of cloning and push+swap_remove, directly replace: `self.records[i] = record; self.ttl = self.records[i].ttl;`. Break out of the loop after the first replacement since RData uniqueness means at most one match exists.","locations":[{"ref":"crates/proto/src/rr/rr_set.rs:370-378","code":"  370 |             }\n  371 | \n  372 |             // TODO: this shouldn't really need a clone since there should only be one...\n  373 |             self.records.push(record.clone());\n  374 |             self.records.swap_remove(i);\n  375 |             self.ttl = record.ttl;\n  376 |             self.updated(serial);\n  377 |             replaced = true;\n  378 |         }"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"low","description":"In CachingClient::inner_lookup, `client.clone()` is called unconditionally\nbefore checking the cache (line 165 passes `self.clone()` to `inner_lookup`).\nThe CachingClient clone includes cloning a `ResponseCache` (an Arc clone, cheap)\nand `C` (the underlying DnsHandle, which may itself be cheap or expensive\ndepending on the impl). More significantly, for every inner_lookup recursion\nthe client is cloned again (`client.clone()` on line 467/471), meaning each\nCNAME hop produces a new client clone even though the client is immutable\nand shared via Arc. The `mut client` parameter is required only to call\n`lookup_from_cache` and `cache()` which take `&self` — the `mut` is spurious.","fix":"Change `mut client: Self` to `client: Self` in `inner_lookup` since the\nparameter is never mutably borrowed (only `&mut self` methods on the contained\nfields are called and those already take `&mut client`). Pass `&client` or\n`client.clone()` only where genuinely needed. This avoids misleading mutability\nannotations and makes the cloning intent explicit.","locations":[{"ref":"crates/resolver/src/caching_client.rs:104-116","code":"  104 |     pub fn lookup(\n  105 |         &self,\n  106 |         query: Query,\n  107 |         options: DnsRequestOptions,\n  108 |     ) -> impl Future<Output = Result<Lookup, NetError>> {\n  109 |         Self::inner_lookup(\n  110 |             query,\n  111 |             options,\n  112 |             self.clone(),\n  113 |             vec![],\n  114 |             DepthTracker::default(),\n  115 |         )\n  116 |     }"},{"ref":"crates/resolver/src/caching_client.rs:118-122","code":"  118 |     async fn inner_lookup(\n  119 |         query: Query,\n  120 |         options: DnsRequestOptions,\n  121 |         mut client: Self,\n  122 |         preserved_records: Vec<Record>,"},{"ref":"crates/resolver/src/caching_client.rs:463-476","code":"  463 |         // It was a CNAME, but not included in the request...\n  464 |         if was_cname && !depth.is_exhausted() {\n  465 |             let next_query = Query::new(search_name, query.query_type);\n  466 |             Ok(Records::CnameChain {\n  467 |                 next: Box::pin(Self::inner_lookup(\n  468 |                     next_query,\n  469 |                     options,\n  470 |                     client.clone(),\n  471 |                     #[cfg(test)]\n  472 |                     preserved_records.clone(),\n  473 |                     #[cfg(not(test))]\n  474 |                     preserved_records,\n  475 |                     depth.nest(),\n  476 |                 )),"}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","description":"PoolState::try_send clones the entire servers Vec on every call to try_send\n(`let mut servers = self.servers.clone()`). For deployments with many\nconfigured name servers this is an O(N) allocation on every DNS query, even\nwhen the pool has a single server. The clone is needed only so that the local\n`servers` variable can be rotated/sorted, but it clones all Arc<NameServer<P>>\ninstances unconditionally.","fix":"Avoid the unconditional clone by either (a) taking a &[Arc<NameServer<P>>] slice\nand only materialising an owned Vec when rotation/sorting is actually required\n(UserProvidedOrder never needs one), or (b) sorting/rotating indices instead of\nthe objects themselves.","locations":[{"ref":"crates/resolver/src/name_server_pool.rs:254-254","code":"  254 |         let mut servers = self.servers.clone();"}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","description":"`BlocklistZoneHandler::is_blocked()` builds a fresh `Vec` of wildcard candidates on every\nlookup call (line 279-289) using `self.wildcards(name)`, which allocates a new vector and\niterates over all labels each time. For high-QPS servers with wildcard blocklists enabled, this\nproduces significant per-query heap allocation pressure. The wildcard expansion is stateless\nand purely derived from the query name; there is no caching of intermediate results.","fix":"Avoid allocating a `Vec` inside the hot path. Consider iterating over wildcard candidates lazily\nusing an iterator/closure instead of collecting into a `Vec`, or cache recently-queried wildcard\nresults with a small LRU cache.","locations":[{"ref":"crates/server/src/store/blocklist.rs:278-290","code":"  278 |     fn is_blocked(&self, name: &LowerName) -> bool {\n  279 |         let mut match_list = vec![name.to_owned()];\n  280 | \n  281 |         if self.wildcard_match {\n  282 |             match_list.append(&mut self.wildcards(name));\n  283 |         }\n  284 | \n  285 |         trace!(\"blocklist match list: {match_list:?}\");\n  286 | \n  287 |         match_list\n  288 |             .iter()\n  289 |             .any(|entry| self.blocklist.contains_key(entry))\n  290 |     }"}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","description":"In `InnerInMemory::additional_search()`, the deduplication check at line 370 uses\n`additionals.contains(&additional)`, which is an O(n) linear scan over the accumulated\nadditionals list on every iteration. For zones with many additional records (e.g., large MX or\nNS sets with glue), this quadratic behavior degrades lookup performance.","fix":"Use a `HashSet<*const RecordSet>` (by pointer identity, since these are Arc-wrapped) or a\n`HashSet` keyed on `(name, record_type)` to perform O(1) deduplication, retaining order in the\n`Vec` only for the final result.","locations":[{"ref":"crates/server/src/store/in_memory/inner.rs:369-371","code":"  369 |                     // assuming no crazy long chains...\n  370 |                     if !additionals.contains(&additional) {\n  371 |                         additionals.push(additional.clone());"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"The `ZoneUsage::reverse` and `ZoneUsage::test` methods in `usage.rs` (lines 488-513) are identical in their bodies — both produce the same set of usage values (`Normal, Normal, Normal, NonRecursive, Local, Normal, Reserved`). They are separate constructors with different names but no semantic difference in their output. Additionally, neither `reverse` nor `test` appear to be called anywhere within the defined static `Lazy` values in the same file, making these helper constructors potentially dead code.","fix":"Verify whether `reverse` and `test` are used elsewhere in the codebase. If `test` is unused, remove it. If they are meant to have different semantics in the future, add a comment explaining why they're kept separate despite identical implementations.","locations":[{"ref":"crates/proto/src/rr/domain/usage.rs:488-513","code":"  488 |     pub fn reverse(name: Name) -> Self {\n  489 |         Self::new(\n  490 |             name,\n  491 |             UserUsage::Normal,\n  492 |             AppUsage::Normal,\n  493 |             ResolverUsage::Normal,\n  494 |             CacheUsage::NonRecursive,\n  495 |             AuthUsage::Local,\n  496 |             OpUsage::Normal,\n  497 |             RegistryUsage::Reserved,\n  498 |         )\n  499 |     }\n  500 | \n  501 |     /// Restrictions for the .test. zone\n  502 |     pub fn test(name: Name) -> Self {\n  503 |         Self::new(\n  504 |             name,\n  505 |             UserUsage::Normal,\n  506 |             AppUsage::Normal,\n  507 |             ResolverUsage::Normal,\n  508 |             CacheUsage::NonRecursive,\n  509 |             AuthUsage::Local,\n  510 |             OpUsage::Normal,\n  511 |             RegistryUsage::Reserved,\n  512 |         )\n  513 |     }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"The `DNSKEY::to_digest` method calls `name.to_lowercase().emit(...)`, but the encoder is already\nconfigured with `NameEncoding::UncompressedLowercase`. This means the name is lowercased twice —\nonce via `to_lowercase()` and once by the encoder setting. While harmless (lowercasing an already\nlowercase name is idempotent), it is redundant and misleading.","fix":"Remove the redundant `.to_lowercase()` call and let the encoder's `UncompressedLowercase` setting\nhandle case normalization:\n  name.emit(&mut encoder)\n      .and_then(|_| self.emit(&mut encoder))","locations":[{"ref":"crates/proto/src/dnssec/rdata/dnskey.rs:300-316","code":"  300 |     pub fn to_digest(&self, name: &Name, digest_type: DigestType) -> ProtoResult<Digest> {\n  301 |         let mut buf: Vec<u8> = Vec::new();\n  302 |         {\n  303 |             let mut encoder = BinEncoder::new(&mut buf);\n  304 |             encoder.name_encoding = NameEncoding::UncompressedLowercase;\n  305 |             if let Err(e) = name\n  306 |                 .to_lowercase()\n  307 |                 .emit(&mut encoder)\n  308 |                 .and_then(|_| self.emit(&mut encoder))\n  309 |             {\n  310 |                 tracing::warn!(\"error serializing dnskey: {e}\");\n  311 |                 return Err(format!(\"error serializing dnskey: {e}\").into());\n  312 |             }\n  313 |         }\n  314 | \n  315 |         Ok(Digest::new(&buf, digest_type)?)\n  316 |     }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"RFC reference typo in verify_response(): cites RFC 5515 instead of RFC 5155.\n\nAt line 290-291:\n  // Both NSEC and NSEC3 records cannot coexist during\n  // transition periods, as per RFC 5515 10.4.3 and\n  // 10.5.2\n\nRFC 5515 is an unrelated RFC (a calendar extension for iCalendar). The correct reference is\nRFC 5155 (NSEC3), which does not contain sections 10.4.3 or 10.5.2 either — the correct sections\nfor NSEC/NSEC3 coexistence are RFC 5155 section 10.5.2 and RFC 4035/5155 transition guidance.","fix":"Correct the RFC citation from 5515 to 5155 and verify the section numbers:\n  // Both NSEC and NSEC3 records cannot coexist during\n  // transition periods, as per RFC 5155 10.5.2","locations":[{"ref":"crates/net/src/dnssec/mod.rs:289-292","code":"  289 |         // Both NSEC and NSEC3 records cannot coexist during\n  290 |         // transition periods, as per RFC 5515 10.4.3 and\n  291 |         // 10.5.2\n  292 |         let nsec_proof = match (!nsec3s.is_empty(), !nsecs.is_empty(), must_validate_nsec) {"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In `QuicStream::send_bytes()`, the `debug!` message at line 163 reads\n`\"received packet len: {} bytes: {:x?}\"` but the function is on the **send**\npath, not the receive path. This is a copy-paste error from `receive_bytes()`\nthat makes log analysis confusing.","fix":"Change the debug log to accurately reflect the send path:\n```rust\ndebug!(\"sending packet len: {} bytes: {:x?}\", bytes_len, bytes);\n```","locations":[{"ref":"crates/net/src/quic/quic_stream.rs:163","code":"  163 |         debug!(\"received packet len: {} bytes: {:x?}\", bytes_len, bytes);"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`edns.rs` line 160 contains `// FIXME: this should be a TryFrom` — a FIXME comment that has been\npresent for a long time and tracks an unfixed design problem. The entire `From<&Record> for Edns`\nconversion is acknowledged to be incorrect (it panics rather than returning an error), yet the\ncomment has not been converted to a tracked issue or fixed. This is a code quality concern that\ntracks a real panic risk (see related finding above).","fix":"Either fix the issue (convert to TryFrom) or open a tracking issue and replace the inline FIXME\nwith a reference to that issue number so it is not forgotten.","locations":[{"ref":"crates/proto/src/op/edns.rs:160","code":"  160 | // FIXME: this should be a TryFrom"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"`response_code.rs` lines 263-265 contain a commented-out code line and comment:\n```\n// this looks to be backwards compat for 4 bit ResponseCodes.\n// 16    BADVERS    Bad OPT Version    [RFC6891]\n// 16 => ResponseCode::BADVERS,\n```\nThis is dead / commented-out code that conflates the BADVERS and BADSIG issue described in\na separate finding. The presence of the comment without resolution creates confusion about\nwhether BADVERS is intentionally excluded from the `From<u16>` mapping.","fix":"Either restore the BADVERS variant as a separate match arm (if the wire-level disambiguation\nis feasible) or add a comment explicitly explaining why BADVERS is intentionally mapped to\nBADSIG and remove the commented-out code to keep the codebase clean.","locations":[{"ref":"crates/proto/src/op/response_code.rs:263-266","code":"  263 |             // this looks to be backwards compat for 4 bit ResponseCodes.\n  264 |             // 16    BADVERS    Bad OPT Version    [RFC6891]\n  265 |             // 16 => ResponseCode::BADVERS,\n  266 |             16 => Self::BADSIG, // 16    BADSIG    TSIG Signature Failure               [RFC2845]"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In `usage.rs`, the doc comment for `IP6_ARPA_FE_8` (line 116), `IP6_ARPA_FE_9` (line 124), and `IP6_ARPA_FE_B` (line 133) all say '254.169.in-addr.arpa. usage link-local, i.e. mDNS' — this is a copy-paste error from the `IN_ADDR_ARPA_169_254` comment. The actual zones are `8.e.f.ip6.arpa.`, `9.e.f.ip6.arpa.`, and `b.e.f.ip6.arpa.` respectively.","fix":"Update the doc comments to accurately describe each zone: '8.e.f.ip6.arpa. usage link-local, i.e. mDNS', '9.e.f.ip6.arpa. usage link-local, i.e. mDNS', 'b.e.f.ip6.arpa. usage link-local, i.e. mDNS'.","locations":[{"ref":"crates/proto/src/rr/domain/usage.rs:115-116","code":"  115 | /// 254.169.in-addr.arpa. usage link-local, i.e. mDNS\n  116 | pub static IP6_ARPA_FE_8: Lazy<ZoneUsage> = Lazy::new(|| {"},{"ref":"crates/proto/src/rr/domain/usage.rs:123-124","code":"  123 | });\n  124 | /// 254.169.in-addr.arpa. usage link-local, i.e. mDNS"},{"ref":"crates/proto/src/rr/domain/usage.rs:132-133","code":"  132 | });\n  133 | /// 254.169.in-addr.arpa. usage link-local, i.e. mDNS"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In cert.rs, there is a commented-out line at line 522: '// let cert_type = decoder.read_u16()?.unverified(/*valid as any u16*/);'. This dead code comment was left in place after refactoring to use CertType::read(). Dead comments can mislead maintainers and suggest the code above may be an alternative or experimental approach.","fix":"Remove the commented-out line entirely.","locations":[{"ref":"crates/proto/src/rr/rdata/cert.rs:522-523","code":"  522 |         // let cert_type = decoder.read_u16()?.unverified(/*valid as any u16*/);\n  523 |         let cert_type = CertType::read(decoder)?;"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In svcb.rs, Mandatory::emit() at line 945 contains the error message 'Alpn expects at least one value' when the Mandatory list is empty. This is clearly a copy-paste error from the Alpn::emit() function (line 1130 has the identical error). The error message should say 'Mandatory expects at least one value'.","fix":"Change the error message from 'Alpn expects at least one value' to 'Mandatory expects at least one value'.","locations":[{"ref":"crates/proto/src/rr/rdata/svcb.rs:944-946","code":"  944 |         if self.0.is_empty() {\n  945 |             return Err(ProtoError::from(\"Alpn expects at least one value\"));\n  946 |         }"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In `serial_number.rs`, the module-level doc comment on line 9 contains a typo: 'signaure' should be 'signature'. Additionally, the comment says 'The signaure fields (expireation, inception) defined in RFC 4034, section 3.1.5 are serial numbers' — the RRSIG expiration and inception fields are not typically described as \"serial numbers\" per RFC 4034; they are timestamps following serial number arithmetic (RFC 1982). The description is technically imprecise.","fix":"Fix the typo 'signaure' -> 'signature' and revise to: 'The signature validity fields (expiration, inception) in RRSIG records (RFC 4034 Section 3.1.5) are timestamps that follow serial number arithmetic as defined in RFC 1982.'","locations":[{"ref":"crates/proto/src/rr/serial_number.rs:9","code":"    9 | /// in RFC 1982. The signaure fields (expireation, inception) defined in RFC 4034, section 3.1.5"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"In `recursor/mod.rs`, the `DnssecPolicy` enum derives `Clone` and `Default`, but the comment\nabove it reads 'Copy can only be implemented when `dnssec` is disabled we don't want to remove\na trait implementation when a feature is enabled as features are meant to be additive'. This\ncomment is misleading: `Copy` is intentionally NOT derived here, and the comment is explaining\na design rationale that is poorly placed and might confuse readers into thinking `Copy` is\nconditionally implemented somewhere. It is not.","fix":"Rewrite the comment to be a clear explanation of the conscious design decision:\n// `Copy` is intentionally not derived: `DnssecConfig` (used in the `ValidateWithStaticKey`\n// variant) contains `Arc` which is not `Copy`, and adding `Copy` when the dnssec feature\n// is disabled would create a feature-additive breakage.","locations":[{"ref":"crates/resolver/src/recursor/mod.rs:689-691","code":"  689 | // `Copy` can only be implemented when `dnssec` is disabled we don't want to remove a trait\n  690 | // implementation when a feature is enabled as features are meant to be additive\n  691 | #[derive(Clone, Default)]"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In UdpStream::connect_with_bind (line 325-332), the call to actually connect the socket to the remote address is commented out with `// TODO: research connect more, it appears to break UDP receiving tests`. As a result, the UdpSocket is only bound to the local address but never 'connected' to the remote peer. This means the socket will accept packets from any source address on the OS level, and source-address validation must be done entirely in userspace (which it is, on line 231-243 of udp_client_stream.rs). The comment is misleading because it implies this is an unresolved question, when in reality the decision was already made to do userspace filtering.","fix":"Either remove the TODO comment and document the deliberate design decision to use unconnected sockets with userspace filtering, or evaluate whether connecting the socket would improve security (the kernel would then drop packets from wrong addresses) and fix the tests that broke.","locations":[{"ref":"crates/net/src/udp/udp_stream.rs:329-330","code":"  329 |         // socket.connect(addr).await?;\n  330 | "}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"`Message::max_payload` and `MessageRequest::max_payload` contain identical implementations:\n```rust\nlet max_size = self.edns.as_ref().map_or(512, Edns::max_payload);\nif max_size < 512 { 512 } else { max_size }\n```\nThese are duplicated across two structs. The logic belongs in `Edns::max_payload` or a shared\nhelper function.","fix":"Extract the logic into a standalone function or add it as a method on `Option<&Edns>`:\n```rust\nfn effective_max_payload(edns: Option<&Edns>) -> u16 {\n    edns.map_or(512, Edns::max_payload).max(512)\n}\n```\nBoth structs can call this shared function.","locations":[{"ref":"crates/proto/src/op/message.rs:370-373","code":"  370 |     pub fn max_payload(&self) -> u16 {\n  371 |         let max_size = self.edns.as_ref().map_or(512, Edns::max_payload);\n  372 |         if max_size < 512 { 512 } else { max_size }\n  373 |     }"},{"ref":"crates/proto/src/op/message_request.rs:134-137","code":"  134 |     pub fn max_payload(&self) -> u16 {\n  135 |         let max_size = self.edns.as_ref().map_or(512, Edns::max_payload);\n  136 |         if max_size < 512 { 512 } else { max_size }\n  137 |     }"}]},{"id":"SECURI_1","type":"security","type_label":"Security","severity":"high","description":"QUIC/DoQ and H3 client code in `connect_quic()` (`quic_client_stream.rs`\nlines 348-350) only sets the required ALPN protocol when\n`crypto_config.alpn_protocols` is **empty**. If a caller passes a\n`rustls::ClientConfig` that already has ALPN set to a *different* value (e.g.\n`h2` instead of `doq`, or `h3` instead of `doq`), the wrong ALPN token is\nsilently accepted. A server that negotiates the wrong protocol may respond with\nunexpected data, potentially causing mis-parsing of the DNS stream.\n\nThe same issue exists in `h2.rs` `connect()` lines 243-248: a caller-supplied\nClientConfig with a non-`h2` ALPN list is used unchanged.","fix":"Always ensure the correct protocol is present in the ALPN list rather than\nskipping the update when any protocol is already set. Either:\n- Always overwrite with the correct list, or\n- Assert/validate that the required protocol token is included and return an\n  error if it is not:\n```rust\nif !crypto_config.alpn_protocols.iter().any(|p| p == protocol) {\n    return Err(NetError::from(\"supplied ClientConfig is missing required ALPN protocol\"));\n}\n```","locations":[{"ref":"crates/net/src/quic/quic_client_stream.rs:348-350","code":"  348 |     if crypto_config.alpn_protocols.is_empty() {\n  349 |         crypto_config.alpn_protocols = vec![protocol.to_vec()];\n  350 |     }"},{"ref":"crates/net/src/h2.rs:243-248","code":"  243 |     if client_config.alpn_protocols.is_empty() {\n  244 |         let mut client_cfg = (*client_config).clone();\n  245 |         client_cfg.alpn_protocols = vec![ALPN_H2.to_vec()];\n  246 | \n  247 |         client_config = Arc::new(client_cfg);\n  248 |     }"}]},{"id":"SECURI_2","type":"security","type_label":"Security","severity":"medium","description":"QUIC/DoQ client (`quic_client_stream.rs` lines 361-365) sends DNS queries over\nTLS 1.3 0-RTT (early data) when `crypto_config.enable_early_data` is `true`.\nDNS queries sent in 0-RTT data are vulnerable to **replay attacks**: an\nattacker on-path can capture 0-RTT packets and replay them later against the\nsame server, causing duplicate DNS queries to be processed. RFC 9250 section\n5.6.1 advises against sending queries in 0-RTT without server-side replay\nprotection (which QUIC implementations rarely provide for application-level\ndata).\n\nThe TLS client for DoT (`tls.rs` lines 126-127, 164-165) has the same issue.","fix":"Disable early data by default for DNS connections. The `QuicClientStreamBuilder`\ndefault implementation and `tls_client_connect_with_bind_addr()` should ensure\n`enable_early_data` is `false`, or at minimum document the replay risk\nprominently. If 0-RTT is desired for performance, restrict it to idempotent\nquery types only (A, AAAA, etc.) and ensure the server uses replay protection\ntokens.","locations":[{"ref":"crates/net/src/quic/quic_client_stream.rs:351-368","code":"  351 |     let early_data_enabled = crypto_config.enable_early_data;\n  352 | \n  353 |     let mut client_config = ClientConfig::new(Arc::new(QuicClientConfig::try_from(crypto_config)?));\n  354 |     client_config.transport_config(transport_config.clone());\n  355 | \n  356 |     endpoint.set_default_client_config(client_config);\n  357 | \n  358 |     let connecting = endpoint.connect(addr, &server_name)?;\n  359 |     // TODO: for Client/Dynamic update, don't use RTT, for queries, do use it.\n  360 | \n  361 |     Ok(if early_data_enabled {\n  362 |         match connecting.into_0rtt() {\n  363 |             Ok((new_connection, _)) => new_connection,\n  364 |             Err(connecting) => connecting.await?,\n  365 |         }\n  366 |     } else {\n  367 |         connecting.await?\n  368 |     })"},{"ref":"crates/net/src/tls.rs:126-127","code":"  126 |     let early_data_enabled = client_config.enable_early_data;\n  127 |     let tls_connector = TlsConnector::from(client_config).early_data(early_data_enabled);"},{"ref":"crates/net/src/tls.rs:164-165","code":"  164 |     let early_data_enabled = client_config.enable_early_data;\n  165 |     let tls_connector = TlsConnector::from(client_config).early_data(early_data_enabled);"}]},{"id":"SECURI_3","type":"security","type_label":"Security","severity":"medium","description":"`tls_exchange()` in `tls.rs` (line 66) unconditionally disables SNI\n(`config.enable_sni = false`) for all DNS-over-TLS connections. The stated\nrationale is \"ISP block by the SNI name\", but RFC 7858 section 3.2 explicitly\nstates that TLS SNI SHOULD be used. Disabling SNI:\n1. Breaks servers that use SNI for virtual hosting or certificate selection.\n2. Makes it impossible for the server to present the correct certificate for\n   the given hostname.\n3. Reduces privacy (ironically), since without SNI the encrypted connection\n   leaks the server IP but not the hostname, while with SNI both are visible —\n   the intended privacy gain is already lost at the IP level.\nThe workaround is not appropriate as a hard-coded default for all callers.","fix":"Remove the forced `enable_sni = false`. Callers who specifically need to\nsuppress SNI (e.g. testing) can disable it in their own `ClientConfig`.\nAlternatively, expose a parameter or builder option, defaulting to SNI enabled\nto comply with RFC 7858.","locations":[{"ref":"crates/net/src/tls.rs:65-66","code":"   65 |     // The port (853) of DOT is for dns dedicated, SNI is unnecessary. (ISP block by the SNI name)\n   66 |     config.enable_sni = false;"}]}]</script>

<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
