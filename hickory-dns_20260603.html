<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"verify_dnskey_rrset() panics when given a DNSKEY RRset with zero records.\n\nAt line 572-573, dnskey_proofs is initialized as:\n  vec![(Proof::Bogus, None, None); rrset.records.len()]\n\nIf rrset.records is empty (possible when a DNS response contains RRSIG(DNSKEY) records but no\nactual DNSKEY records), dnskey_proofs is an empty Vec.\n\nAt line 664, the check:\n  if dnskey_proofs.iter().all(|(proof, ..)| proof.is_secure())\n\n.all() on an empty iterator returns true (vacuous truth). Then at line 665:\n  let proof = dnskey_proofs.pop().unwrap(/* This can not happen due to above test */);\n\nThis unwrap panics because the Vec is empty. The comment \"This can not happen due to above test\"\nis incorrect — the above test does not guard against an empty Vec.\n\nA malformed response (containing only RRSIG records for a DNSKEY rrset but no DNSKEY records)\ncould trigger this panic, causing the entire resolver to crash.","fix":"Add an early return or guard before the dnskey_proofs.pop().unwrap() line:\n\n  if dnskey_proofs.iter().all(|(proof, ..)| proof.is_secure()) {\n      let Some(proof) = dnskey_proofs.pop() else {\n          // Empty records: nothing to validate\n          return Err(ProofError::new(\n              Proof::Bogus,\n              ProofErrorKind::DnskeyNotFound { name: Name::from(&key.name) },\n          ));\n      };\n      return Ok(RrsetProof {\n          proof: proof.0,\n          adjusted_ttl: proof.1,\n          rrsig_index: proof.2,\n      });\n  }","locations":[{"ref":"crates/net/src/dnssec/mod.rs:572-573","code":"  572 |         let mut dnskey_proofs: Vec<(Proof, Option<u32>, Option<usize>)> =\n  573 |             vec![(Proof::Bogus, None, None); rrset.records.len()];"},{"ref":"crates/net/src/dnssec/mod.rs:664-670","code":"  664 |         if dnskey_proofs.iter().all(|(proof, ..)| proof.is_secure()) {\n  665 |             let proof = dnskey_proofs.pop().unwrap(/* This can not happen due to above test */);\n  666 |             return Ok(RrsetProof {\n  667 |                 proof: proof.0,\n  668 |                 adjusted_ttl: proof.1,\n  669 |                 rrsig_index: proof.2,\n  670 |             });"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"`send_message()` panics rather than returning an error stream when called on a\nshutdown stream. Both `HttpsClientStream`, `H3ClientStream`, and\n`QuicClientStream` unconditionally `panic!()` if `is_shutdown` is true. Because\nthese types implement `DnsRequestSender`, callers may reasonably call\n`send_message()` after `shutdown()` (e.g. during a race or reconnect path).\nA panic here aborts the entire task/thread instead of allowing the caller to\nhandle the error gracefully.","fix":"Replace the `panic!` with an early `return` of an error `DnsResponseStream`:\n```rust\nif self.is_shutdown {\n    return NetError::from(\"stream is already shutdown\").into();\n}\n```","locations":[{"ref":"crates/net/src/h2.rs:115-118","code":"  115 |     fn send_message(&mut self, mut request: DnsRequest) -> DnsResponseStream {\n  116 |         if self.is_shutdown {\n  117 |             panic!(\"can not send messages after stream is shutdown\")\n  118 |         }"},{"ref":"crates/net/src/h3/h3_client_stream.rs:236-239","code":"  236 |     fn send_message(&mut self, mut request: DnsRequest) -> DnsResponseStream {\n  237 |         if self.is_shutdown {\n  238 |             panic!(\"can not send messages after stream is shutdown\")\n  239 |         }"},{"ref":"crates/net/src/quic/quic_client_stream.rs:166-169","code":"  166 |     fn send_message(&mut self, request: DnsRequest) -> DnsResponseStream {\n  167 |         if self.is_shutdown {\n  168 |             panic!(\"can not send messages after stream is shutdown\")\n  169 |         }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"`H3Server::with_socket_and_tls_config()` calls `.unwrap()` on\n`QuicServerConfig::try_from(tls_config)` (line 68). This conversion fails when\nthe supplied `TlsServerConfig` does not support TLS 1.3 or uses an incompatible\ncrypto provider — both possible with a caller-supplied config. The panic occurs\ninside a `Result`-returning function, so it is entirely avoidable.\n\nBy contrast, the equivalent method `QuicServer::with_socket_and_tls_config()`\n(quic_server.rs line 65) correctly propagates the error with `?`.","fix":"Replace `.unwrap()` with `?` to propagate the error, exactly like the QUIC server does:\n```rust\nlet mut server_config =\n    ServerConfig::with_crypto(Arc::new(QuicServerConfig::try_from(tls_config)?));\n```","locations":[{"ref":"crates/net/src/h3/h3_server.rs:66-68","code":"   66 |     ) -> Result<Self, NetError> {\n   67 |         let mut server_config =\n   68 |             ServerConfig::with_crypto(Arc::new(QuicServerConfig::try_from(tls_config).unwrap()));"},{"ref":"crates/net/src/quic/quic_server.rs:63-65","code":"   63 |     ) -> Result<Self, NetError> {\n   64 |         let mut server_config =\n   65 |             ServerConfig::with_crypto(Arc::new(QuicServerConfig::try_from(tls_config)?));"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"DnsMultiplexer::send_message panics when called after shutdown. The check `if self.is_shutdown { panic!(...) }` at the top of send_message will unconditionally panic rather than returning an error. The same pattern appears in UdpClientStream::send_message. While callers are expected not to call send_message after shutdown, this can be triggered in a race condition via DnsExchange: the background task sets is_shutdown and then an in-flight message is dequeued and forwarded via send_message. In practice DnsExchange calls io_stream.send_message after already setting is_shutdown in some shutdown paths. Panicking in a library function (rather than returning an error) is inappropriate since it kills the entire thread/task.","fix":"Replace the panic with returning an error stream, e.g. `return NetError::from(\"stream is shutdown\").into();`. This makes the shutdown transition graceful without aborting the process.","locations":[{"ref":"crates/net/src/xfer/dns_multiplexer.rs:202-205","code":"  202 |     fn send_message(&mut self, request: DnsRequest) -> DnsResponseStream {\n  203 |         if self.is_shutdown {\n  204 |             panic!(\"can not send messages after stream is shutdown\")\n  205 |         }"},{"ref":"crates/net/src/udp/udp_client_stream.rs:76-78","code":"   76 |         if self.is_shutdown {\n   77 |             panic!(\"can not send messages after stream is shutdown\")\n   78 |         }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"`DNSSECRData::read()` contains an explicit `panic!` for non-DNSSEC record types. The function is\n`pub(crate)` and is called from the wire-format decoding path. Although the caller is expected to\nonly pass DNSSEC record types, this is an unconditional panic rather than a proper error return.\nAny future refactor that widens the call site or introduces a coding mistake in a caller could\ncause a remote crash when parsing network data.","fix":"Replace the `panic!` branch with a proper error:\n  r => Err(DecodeError::UnknownRecordTypeForDnssec(r)),\nor map to the `Unknown` variant instead of panicking.","locations":[{"ref":"crates/proto/src/dnssec/rdata/mod.rs:504-507","code":"  504 |             r => {\n  505 |                 panic!(\"not a dnssec RecordType: {}\", r);\n  506 |             }\n  507 |         }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","description":"`Edns::from(&Record)` panics if the record data is not OPT, NULL, Update0, or OPT.\nThe function is a `From<&Record>` implementation marked with a `// FIXME: this should be a TryFrom` comment,\nmeaning it is called as an infallible conversion. Any code path that calls `Edns::from(record)` with an\nincorrectly typed record (possible in fuzzing or malformed-message scenarios) will panic with 'rr_type doesn't\nmatch the RData'. There is also a leading `assert!` that panics if the record type is not OPT. Neither failure\nreturns an error — they abort the process.","fix":"Convert `From<&Record> for Edns` into `TryFrom<&Record> for Edns` returning a `Result<Self, ProtoError>`.\nReplace the `assert!(value.record_type() == RecordType::OPT)` with a proper check and the `panic!` in the\nmatch arm with `Err(...)`. Update all call-sites accordingly (they currently all appear to go through\n`read_records` which has already verified the record type).","locations":[{"ref":"crates/proto/src/op/edns.rs:160-191","code":"  160 | // FIXME: this should be a TryFrom\n  161 | impl<'a> From<&'a Record> for Edns {\n  162 |     fn from(value: &'a Record) -> Self {\n  163 |         assert!(value.record_type() == RecordType::OPT);\n  164 | \n  165 |         let rcode_high = ((value.ttl & 0xFF00_0000u32) >> 24) as u8;\n  166 |         let version = ((value.ttl & 0x00FF_0000u32) >> 16) as u8;\n  167 |         let flags = EdnsFlags::from((value.ttl & 0x0000_FFFFu32) as u16);\n  168 |         let max_payload = u16::from(value.dns_class);\n  169 | \n  170 |         let options = match &value.data {\n  171 |             RData::Update0(..) | RData::NULL(..) => {\n  172 |                 // NULL, there was no data in the OPT\n  173 |                 OPT::default()\n  174 |             }\n  175 |             RData::OPT(option_data) => {\n  176 |                 option_data.clone() // TODO: Edns should just refer to this, have the same lifetime as the Record\n  177 |             }\n  178 |             _ => {\n  179 |                 // this should be a coding error, as opposed to a parsing error.\n  180 |                 panic!(\"rr_type doesn't match the RData: {:?}\", value.data) // valid panic, never should happen\n  181 |             }\n  182 |         };\n  183 | \n  184 |         Self {\n  185 |             rcode_high,\n  186 |             version,\n  187 |             flags,\n  188 |             max_payload,\n  189 |             options,\n  190 |         }\n  191 |     }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","description":"In `Name::extend_name`, the label_ends vector stores byte offsets as `u8`. When label_data grows beyond 255 bytes, the cast `self.label_data.len() as u8` silently wraps, corrupting the label_ends index. A domain name with total label_data larger than 255 bytes can never be formed (the outer 255-byte length check fires first), but the check in `extend_name` uses `encoded_len()` which already includes the root byte and the length prefix bytes, so if `label_data` alone approaches 253 bytes the cast is still fine — however, `into_wildcard` bypasses `extend_name` entirely and directly pushes `label_data.len() as u8` without any bounds check (line 932), and since it can process a near-maximum name this cast can in principle reach values that only fit in u8 if the prior checks elsewhere happened to catch them. More concretely, any path that builds label_data without going through `extend_name` (e.g. `to_lowercase` which clones the raw bytes, line 319-328) does not re-validate lengths. The root issue is that `label_ends` uses `u8` storage for byte offsets but the `MAX_LENGTH` is 255, so the maximum valid offset is 254 (fitting in u8), meaning the cast is technically safe only because of the 255-byte domain name length restriction — but this invariant is not locally enforced in every code path, making the code fragile.","fix":"Add a debug_assert or explicit check that `self.label_data.len() <= 255` before every `as u8` cast on label_data lengths. In `into_wildcard`, add an assert or use a checked cast. Consider changing `label_ends` to `TinyVec<[u16; 24]>` to remove the dependency on the 255-byte invariant for correctness.","locations":[{"ref":"crates/proto/src/rr/domain/name.rs:67","code":"   67 |         self.label_ends.push(self.label_data.len() as u8);"},{"ref":"crates/proto/src/rr/domain/name.rs:930-933","code":"  930 |         for label in self.iter().skip(1) {\n  931 |             label_data.extend_from_slice(label);\n  932 |             label_ends.push(label_data.len() as u8);\n  933 |         }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"MemoizeClientHandle::inner_send calls `request.queries.first().expect(\"no query!\")` unconditionally. A DNS request with an empty queries list (e.g. a Notify or Update message) will panic at runtime. The expect propagates into every send() call through the public DnsHandle::send interface.","fix":"Replace the expect with a graceful fallback. Either return an error stream for requests without queries, or use the full request as a cache key. For example: `let query = match request.queries.first() { Some(q) => q.clone(), None => return stream::empty().boxed() };`","locations":[{"ref":"crates/net/src/client/memoize_client_handle.rs:56","code":"   56 |         let query = request.queries.first().expect(\"no query!\").clone();"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"ClientHandle::delete_rrset and ClientHandle::delete_all both contain unconditional assert! macros that panic if the zone_origin is not an ancestor of the supplied record/name. These panics propagate through the public API (trait default methods) and can be triggered by any caller passing mismatched inputs, crashing the entire thread.","fix":"Replace assert! with a checked error path that returns ClientResponse wrapping an immediate Err, or add validation before calling send and return an error. For example, if `!zone_origin.zone_of(&record.name)` return `ClientResponse(stream::once(async { Err(NetError::from(\"record not in zone\")) }).boxed())`.","locations":[{"ref":"crates/net/src/client/mod.rs:517","code":"  517 |         assert!(zone_origin.zone_of(&record.name));"},{"ref":"crates/net/src/client/mod.rs:552","code":"  552 |         assert!(zone_origin.zone_of(&name_of_records));"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"MdnsStream::poll_next contains an assert! that panics if both `self.datagram` and `self.multicast` are None. This can be reached in a Passive query type where `datagram` is always None because next_bound_local_address returns None for non-sender types. If the multicast socket also fails to initialise (which is silently swallowed during setup), both fields will be None, triggering a panic in the stream driver loop.","fix":"Replace the assert with a graceful return: `if self.datagram.is_none() && self.multicast.is_none() { return Poll::Ready(None); }`. Log a debug message explaining the condition.","locations":[{"ref":"crates/net/src/multicast/mdns_stream.rs:268","code":"  268 |         assert!(self.datagram.is_some() || self.multicast.is_some());"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"`KeyTrust::from(u16)` and `KeyUsage::from(u16)` both contain `panic!(\"All other bit fields should\nhave been cleared\")` in their catch-all match arms. Both functions are called immediately after\nmasking the input flags with the relevant bits, so the catch-all should be unreachable. However,\nrelying on a `panic!` in a conversion routine that is invoked during wire-format decoding is\nfragile. A compiler-internal change or a future refactor that removes the masking could cause a\ncrash. In a security-sensitive parser this should be an unreachable hint or a proper error.","fix":"Replace `panic!(...)` with `unreachable!()` (which makes the intent explicit and still provides a\nuseful message in debug builds), or restructure the match to be exhaustive without a wildcard arm,\nsince only two bits are inspected and all four combinations are already covered.","locations":[{"ref":"crates/proto/src/dnssec/rdata/key.rs:506-508","code":"  506 |             _ => panic!(\"All other bit fields should have been cleared\"),\n  507 |         }\n  508 |     }"},{"ref":"crates/proto/src/dnssec/rdata/key.rs:553-555","code":"  553 |             0b0000_0011_0000_0000 => Self::Reserved,\n  554 |             _ => panic!(\"All other bit fields should have been cleared\"),\n  555 |         }"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","description":"`Edns::emit()` contains a debug assertion `assert!(len <= u16::MAX as usize)` that will panic in debug\nbuilds if the options section of an EDNS OPT record is larger than 65535 bytes. Although this cannot\nnormally be reached via honest DNS traffic (OPT rdata is bounded by the wire format), it could be triggered\nby programmatically constructing an `Edns` object with a huge options map and then calling `to_vec()` or\n`emit()`. In a release build the assert is removed but the cast `len as u16` then silently wraps, producing a\ncorrupt length field and potentially an un-parseable message sent to a peer.","fix":"Replace the `assert!` with a proper error check:\n```rust\nlet len = encoder.len_since_place(&place);\nlet len = u16::try_from(len).map_err(|_| ProtoError::Message(\"EDNS options too large\"))?;\nplace.replace(encoder, len)?;\n```","locations":[{"ref":"crates/proto/src/op/edns.rs:225-232","code":"  225 | \n  226 |         // write the opts as rdata...\n  227 |         let place = encoder.place::<u16>()?;\n  228 |         self.options.emit(encoder)?;\n  229 |         let len = encoder.len_since_place(&place);\n  230 |         assert!(len <= u16::MAX as usize);\n  231 | \n  232 |         place.replace(encoder, len as u16)?;"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","description":"`Queries::new` (the test/testing helper that constructs a `Queries` from a `LowerQuery`) calls\n`inner.emit(&mut encoder).unwrap()`. If encoding fails for any reason (e.g. a name label that\nexceeds the buffer limit) this panics instead of propagating an error. Since `Queries::new` is\navailable under `cfg(any(test, feature = \"testing\"))`, it can also be used in production code when\nthe `testing` feature is enabled.","fix":"Return a `Result<Self, ProtoError>` from `Queries::new` and propagate the encoding error, or\nalternatively panic with an explicit expect message so failures are obvious in tests.","locations":[{"ref":"crates/proto/src/op/message_request.rs:194-204","code":"  194 |     #[cfg(any(test, feature = \"testing\"))]\n  195 |     pub fn new(inner: LowerQuery) -> Self {\n  196 |         let mut encoded = Vec::new();\n  197 |         let mut encoder = BinEncoder::new(&mut encoded);\n  198 |         inner.emit(&mut encoder).unwrap();\n  199 | \n  200 |         Self {\n  201 |             inner,\n  202 |             original: encoded.into_boxed_slice(),\n  203 |         }\n  204 |     }"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","description":"TsigAlgorithm::to_name() calls .unwrap() on Name::from_ascii() for all named algorithm variants. Although the strings are static and valid, the comment 'should not fail with static strings' acknowledges the risk. More importantly, the Unknown(name) arm clones the name and returns Ok(name.clone()), so the unwrap on that arm is safe, but the pattern creates a silent assumption that every future static string will always be valid. Any typo or future addition could cause a panic at runtime, since this is called from BinEncodable::emit() and fmt::Display.","fix":"Return Result<Name> instead of Name from to_name(), propagate the error in emit() and fmt::Display. Alternatively, store the canonical Name directly in each variant so no parsing is needed.","locations":[{"ref":"crates/proto/src/rr/rdata/tsig.rs:536-550","code":"  536 |     pub fn to_name(&self) -> Name {\n  537 |         use TsigAlgorithm::*;\n  538 |         match self {\n  539 |             HmacMd5 => Name::from_ascii(\"HMAC-MD5.SIG-ALG.REG.INT\"),\n  540 |             Gss => Name::from_ascii(\"gss-tsig\"),\n  541 |             HmacSha1 => Name::from_ascii(\"hmac-sha1\"),\n  542 |             HmacSha224 => Name::from_ascii(\"hmac-sha224\"),\n  543 |             HmacSha256 => Name::from_ascii(\"hmac-sha256\"),\n  544 |             HmacSha256_128 => Name::from_ascii(\"hmac-sha256-128\"),\n  545 |             HmacSha384 => Name::from_ascii(\"hmac-sha384\"),\n  546 |             HmacSha384_192 => Name::from_ascii(\"hmac-sha384-192\"),\n  547 |             HmacSha512 => Name::from_ascii(\"hmac-sha512\"),\n  548 |             HmacSha512_256 => Name::from_ascii(\"hmac-sha512-256\"),\n  549 |             Unknown(name) => Ok(name.clone()),\n  550 |         }.unwrap(/* should not fail with static strings*/)"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","description":"In `RecordSet::new_record`, the code calls `.expect(\"insert failed\")` after `add_rdata` + `find` (line 234). If `insert` returns `false` because the record is a duplicate and is skipped, the subsequent `find` still succeeds (the record already exists), so this is not panicking in the duplicate path. However if `insert` somehow does not add the record (e.g. due to a TTL-only change to a SOA record that gets discarded), the `find` will return `None` and trigger the expect-panic in production code.","fix":"Return `Option<&Record>` instead of panicking, or propagate the result through `add_rdata` to confirm success before calling `find`.","locations":[{"ref":"crates/proto/src/rr/rr_set.rs:228-235","code":"  228 |     pub fn new_record(&mut self, rdata: &RData) -> &Record {\n  229 |         self.add_rdata(rdata.clone());\n  230 | \n  231 |         self.records\n  232 |             .iter()\n  233 |             .find(|r| &r.data == rdata)\n  234 |             .expect(\"insert failed\")\n  235 |     }"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","description":"In `RecordSet::insert`, there are two `assert!` calls (lines 292 and 350) that will panic in production code if the caller passes a record whose type doesn't match the RecordSet's expected invariants (SOA set with more than 1 record, or CNAME/ANAME set with more than 1 record). While these assert the internal invariant, they are in a `pub` function and the assertions fire on externally-supplied data (e.g. when replaying zone data or processing an untrusted update), which can cause a server crash. The two assertions on lines 279-280 (`assert_eq!` on name and record_type) also panic on mismatched records from external input.","fix":"Replace `assert!`/`assert_eq!` with returning `false` (or a `Result`) and logging a warning. For a public API, panicking on bad input is a denial-of-service vector.","locations":[{"ref":"crates/proto/src/rr/rr_set.rs:279-280","code":"  279 |         assert_eq!(&record.name, &self.name);\n  280 |         assert_eq!(record.record_type(), self.record_type);"},{"ref":"crates/proto/src/rr/rr_set.rs:292","code":"  292 |                 assert!(self.records.len() <= 1);"},{"ref":"crates/proto/src/rr/rr_set.rs:350","code":"  350 |                 assert!(self.records.len() <= 1);"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","description":"`BinEncoder::slice_of` contains `assert!(start < self.offset)` which panics if `start >= self.offset`.\nThis method is called from `store_label_pointer` and `get_label_pointer`. If either is called with\n`start == self.offset` (i.e. trying to capture a zero-length label pointer right at the current write\nposition), the assertion fires. The invariant may be violated if the caller forgets to advance the\noffset before taking a snapshot. The assert produces an unhelpful panic rather than a recoverable error.","fix":"Change the assert to a debug_assert if this invariant is truly guaranteed by all callers, or return\na `ProtoResult` and propagate the error to callers. At minimum, add a comment explaining when\n`start == self.offset` is legal/illegal.","locations":[{"ref":"crates/proto/src/serialize/binary/encoder.rs:226-230","code":"  226 |     pub fn slice_of(&self, start: usize, end: usize) -> &[u8] {\n  227 |         assert!(start < self.offset);\n  228 |         assert!(end <= self.buffer.len());\n  229 |         &self.buffer.buffer()[start..end]\n  230 |     }"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","description":"`RecursorDnsHandle::new()` calls `assert!(!roots.is_empty(), ...)` at line 67. If the caller\npasses an empty root slice (e.g., the roots file parses to zero A/AAAA records because the file\ncontains only NS records without glue, or all IPs are in a filtered network), the process panics\ninstead of returning a graceful `Err`. This affects the public `Recursor::new()` and\n`Recursor::with_options()` constructors.","fix":"Replace `assert!` with a checked return:\n    if roots.is_empty() {\n        return Err(RecursorError::from(\"roots must not be empty\"));\n    }","locations":[{"ref":"crates/resolver/src/recursor/handle.rs:67","code":"   67 |         assert!(!roots.is_empty(), \"roots must not be empty\");"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","description":"`InnerInMemory::increment_soa_serial()` at line 406 contains an explicit `panic!()` guarded by\nthe comment \"valid panic, never should happen\". It fires when the record retrieved by its RrKey\nis not an SOA. Because records are keyed by (name, RecordType::SOA), this path requires the\nstore to be in an internally inconsistent state, which is theoretically impossible but\ndefensively should return an error rather than crashing the process. Any concurrency bug or\nconstruction-time mistake that inserts a non-SOA RData under a SOA key would crash the whole\nserver.","fix":"Replace the `panic!()` with an `error!()` log and return `0` (or bubble up a proper error type)\nto degrade gracefully rather than crash the server on data inconsistency.","locations":[{"ref":"crates/server/src/store/in_memory/inner.rs:402-407","code":"  402 |         let serial = if let RData::SOA(soa_rdata) = &mut record.data {\n  403 |             soa_rdata.increment_serial();\n  404 |             soa_rdata.serial\n  405 |         } else {\n  406 |             panic!(\"This was not an SOA record\"); // valid panic, never should happen\n  407 |         };"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","description":"hash_and_label() in nsec3.rs has two .unwrap() calls that can panic on unexpected inputs.\n\nLine 590: self.hash_algorithm.hash(self.salt, name, self.iterations).unwrap()\nThe hash function can return Err if name.emit() fails (e.g., for a name that fails BinEncoder\nserialization). While the comment claims all names are guaranteed valid, the validity is not\nverified by the type system. If a malformed name (e.g., a very long name from CNAME expansion)\nreaches this path, it panics.\n\nLine 597: Label::from_ascii(&base32_encoded).unwrap()\nFor SHA1 hashes (20 bytes), the base32-encoded length is 32 characters, well within the 63-byte\nlabel limit. However, if the hash algorithm is ever extended to produce longer output (e.g., SHA256\n= 32 bytes = 52 base32 chars, still ok; but SHA512 = 64 bytes = 103 chars > 63), this panics.","fix":"Return an error instead of panicking:\n\n  fn hash_and_label(&self, name: &Name) -> Option<(Vec<u8>, Label)> {\n      let hash = self\n          .hash_algorithm\n          .hash(self.salt, name, self.iterations)\n          .ok()?\n          .as_ref()\n          .to_vec();\n      let base32_encoded = data_encoding::BASE32_DNSSEC.encode(&hash);\n      let label = Label::from_ascii(&base32_encoded).ok()?;\n      Some((hash, label))\n  }\n\nUpdate all call sites to handle the None case by returning Proof::Bogus.","locations":[{"ref":"crates/net/src/dnssec/nsec3.rs:583-598","code":"  583 |     fn hash_and_label(&self, name: &Name) -> (Vec<u8>, Label) {\n  584 |         let hash = self\n  585 |             .hash_algorithm\n  586 |             .hash(self.salt, name, self.iterations)\n  587 |             // We only compute hashes of names between `query_name` and `soa_name`\n  588 |             // and wildcards between `*.query_name.base_name()` and `*.soa_name`.\n  589 |             // All of them are guaranteed to be valid names.\n  590 |             .unwrap()\n  591 |             .as_ref()\n  592 |             .to_vec();\n  593 | \n  594 |         let base32_encoded = data_encoding::BASE32_DNSSEC.encode(&hash);\n  595 |         // Unwrap safety: The length of the hashed name is valid because it is the output of the above\n  596 |         // hash function. The input is all alphanumeric ASCII characters by construction.\n  597 |         let label = Label::from_ascii(&base32_encoded).unwrap();\n  598 |         (hash, label)"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","description":"NextRandomUdpSocket (mdns_stream.rs) panics with an unhelpful message when sending IPv6 multicast and the interface index is not provided. The panic message `\"for ipv6 multicasting the interface must be specified\"` appears inside prepare_sender, called from poll(), which is called lazily from async code. This panic cannot be caught by the caller and terminates the task.","fix":"Return an io::Error instead of panicking. Change the unwrap_or_else to return `Err(io::Error::new(io::ErrorKind::InvalidInput, \"for ipv6 multicasting the interface must be specified\"))` and propagate it via `?`.","locations":[{"ref":"crates/net/src/multicast/mdns_stream.rs:341-343","code":"  341 |                 let ipv6_if = self.ipv6_if.unwrap_or_else(|| {\n  342 |                     panic!(\"for ipv6 multicasting the interface must be specified\")\n  343 |                 });"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","description":"NextRandomUdpSocket::poll (in mdns_stream.rs) returns Poll::Pending and calls cx.waker().wake_by_ref() after exhausting 10 port-binding attempts. This will spin the executor in a tight loop because the future immediately schedules itself again without any actual I/O readiness event to wait for. This is effectively a busy-wait / spin loop that will consume 100% CPU until a port becomes available or the future is dropped.","fix":"Use an exponential backoff timer (e.g. tokio::time::sleep) instead of immediately re-waking the executor, or return a proper Err after exhausting retries rather than Pending.","locations":[{"ref":"crates/net/src/multicast/mdns_stream.rs:408-413","code":"  408 |             debug!(\"could not get next random port, delaying\");\n  409 | \n  410 |             // TODO: this replaced a task::current().notify, is it correct?\n  411 |             cx.waker().wake_by_ref();\n  412 |             Poll::Pending\n  413 |         }"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","description":"The `Message::insert_answers`, `Message::insert_authorities`, and `Message::insert_additionals`\nmethods use `assert!(self.section.is_empty())` to guard against overwriting existing data. These\nare public methods and panicking on misuse is surprising for a library. An external caller who\naccidentally calls `insert_answers` on a message that already has answers will get a process abort.","fix":"Either return a `Result<(), ProtoError>` and replace the assertions with proper errors, or\nrename these to `_unchecked` variants and document the panic precondition clearly. At minimum,\nchange `assert!` to a named expect: `assert!(self.answers.is_empty(), \"insert_answers called on non-empty answers section\")`.","locations":[{"ref":"crates/proto/src/op/message.rs:255-261","code":"  255 |     /// # Panics\n  256 |     ///\n  257 |     /// Will panic if the Answer section is already non-empty.\n  258 |     pub fn insert_answers(&mut self, records: Vec<Record>) {\n  259 |         assert!(self.answers.is_empty());\n  260 |         self.answers = records;\n  261 |     }"},{"ref":"crates/proto/src/op/message.rs:284-290","code":"  284 |     /// # Panics\n  285 |     ///\n  286 |     /// Will panic if the Authority section is already non-empty.\n  287 |     pub fn insert_authorities(&mut self, records: Vec<Record>) {\n  288 |         assert!(self.authorities.is_empty());\n  289 |         self.authorities = records;\n  290 |     }"},{"ref":"crates/proto/src/op/message.rs:313-319","code":"  313 |     /// # Panics\n  314 |     ///\n  315 |     /// Will panic if additional records are already associated to the message.\n  316 |     pub fn insert_additionals(&mut self, records: Vec<Record>) {\n  317 |         assert!(self.additionals.is_empty());\n  318 |         self.additionals = records;\n  319 |     }"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","description":"`BinDecoder::read_i32` and `BinDecoder::read_u32` contain `assert!(s.len() == 4)` inside closures\npassed to `Restrict::map`. These assertions fire after `read_slice(4)` has already succeeded (so the\nslice will always be exactly 4 bytes), making them redundant dead assertions. They are harmless in\npractice but obscure the code and could mislead reviewers into thinking there is a real validation\nhappening here. They do constitute a latent panic if the invariant were ever broken by a refactor.","fix":"Remove the redundant `assert!` calls; `read_slice(4)` already guarantees the slice length.\nAlternatively, use array destructuring: `i32::from_be_bytes(s.try_into().unwrap())` — but\nthe cleanest fix is simply `i32::from_be_bytes([s[0], s[1], s[2], s[3]])` without the assert.","locations":[{"ref":"crates/proto/src/serialize/binary/decoder.rs:183-188","code":"  183 |     pub fn read_i32(&mut self) -> Result<Restrict<i32>, DecodeError> {\n  184 |         Ok(self.read_slice(4)?.map(|s| {\n  185 |             assert!(s.len() == 4);\n  186 |             i32::from_be_bytes([s[0], s[1], s[2], s[3]])\n  187 |         }))\n  188 |     }"},{"ref":"crates/proto/src/serialize/binary/decoder.rs:198-203","code":"  198 |     pub fn read_u32(&mut self) -> Result<Restrict<u32>, DecodeError> {\n  199 |         Ok(self.read_slice(4)?.map(|s| {\n  200 |             assert!(s.len() == 4);\n  201 |             u32::from_be_bytes([s[0], s[1], s[2], s[3]])\n  202 |         }))\n  203 |     }"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"low","description":"`Place::replace` contains two `assert!` calls:\n1. `assert!(self.start_index < current_index)` — panics if the encoder's offset did not advance\n   past the place (i.e. nothing was written after `place`).\n2. `assert!((encoder.offset - self.start_index) == T::LEN)` — panics if the replacement write\n   produced a wrong number of bytes.\nBoth are programming-error assertions and are entirely reasonable to have, but they produce opaque\npanics rather than useful messages. In particular, the second assert fires after `data.emit(encoder)`\nhas already modified `encoder.offset`, leaving the encoder in a partially corrupt state.","fix":"Add descriptive messages to both assertions, e.g. `assert!(self.start_index < current_index, \"Place::replace called before any data was written after place\")`\nso that if they ever fire the root cause is immediately obvious.","locations":[{"ref":"crates/proto/src/serialize/binary/encoder.rs:438-458","code":"  438 |     pub fn replace(self, encoder: &mut BinEncoder<'_>, data: T) -> ProtoResult<()> {\n  439 |         // preserve current index\n  440 |         let current_index = encoder.offset;\n  441 | \n  442 |         // reset the current index back to place before writing\n  443 |         //   this is an assert because it's programming error for it to be wrong.\n  444 |         assert!(self.start_index < current_index);\n  445 |         encoder.offset = self.start_index;\n  446 | \n  447 |         // emit the data to be written at this place\n  448 |         let emit_result = data.emit(encoder);\n  449 | \n  450 |         // double check that the current number of bytes were written\n  451 |         //   this is an assert because it's programming error for it to be wrong.\n  452 |         assert!((encoder.offset - self.start_index) == T::LEN);\n  453 | \n  454 |         // reset to original location\n  455 |         encoder.offset = current_index;\n  456 | \n  457 |         emit_result\n  458 |     }"}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","description":"ProtocolTransportState::get_mut and ::get both contain an `unreachable!()` branch\n(lines 724, 735) that fires when called with any Protocol other than Tls or Quic.\nThese methods are only called from NameServerTransportState methods that are\ngated on `cfg(any(feature = \"__tls\", feature = \"__quic\"))`. However, if a caller\never passes a Protocol::Udp or Protocol::Tcp value (e.g. from the\nopportunistic-encryption probe path if a future code change introduces a new\nprotocol), the process will panic with an unrecoverable error. The methods are\npub(crate) and nothing in the call chain statically prevents passing a\nnon-encrypted protocol.","fix":"Replace the `unreachable!()` with a graceful `return` or return a sensible\ndefault state, or add a compile-time assertion / type-level guard that\nensures only encrypted protocols can ever be passed to these methods.","locations":[{"ref":"crates/resolver/src/name_server_pool.rs:718-736","code":"  718 |     fn get_mut(&mut self, protocol: Protocol) -> &mut TransportState {\n  719 |         match protocol {\n  720 |             #[cfg(feature = \"__tls\")]\n  721 |             Protocol::Tls => &mut self.tls,\n  722 |             #[cfg(feature = \"__quic\")]\n  723 |             Protocol::Quic => &mut self.quic,\n  724 |             _ => unreachable!(\"unsupported opportunistic encryption protocol: {protocol:?}\"),\n  725 |         }\n  726 |     }\n  727 | \n  728 |     #[cfg_attr(not(any(feature = \"__tls\", feature = \"__quic\")), allow(dead_code))]\n  729 |     fn get(&self, protocol: Protocol) -> &TransportState {\n  730 |         match protocol {\n  731 |             #[cfg(feature = \"__tls\")]\n  732 |             Protocol::Tls => &self.tls,\n  733 |             #[cfg(feature = \"__quic\")]\n  734 |             Protocol::Quic => &self.quic,\n  735 |             _ => unreachable!(\"unsupported opportunistic encryption protocol: {protocol:?}\"),\n  736 |         }"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"negligible","description":"`From<core::convert::Infallible> for ParseError` in `errors.rs` is implemented by calling\n`panic!(\"infallible\")`. The `Infallible` type can never be constructed, so this code is\nunreachable, but it is still a `panic!` in a library code path. The correct implementation\nshould be `match _e {}` (exhaustive match on an uninhabited type) which would tell the compiler\nthe code is unreachable without the `panic!` macro. The current code looks alarming to reviewers\nand might mislead static analysis tools into thinking there is a reachable panic here.","fix":"Replace the body with an exhaustive match:\n```rust\nimpl From<core::convert::Infallible> for ParseError {\n    fn from(e: core::convert::Infallible) -> Self {\n        match e {}\n    }\n}\n```","locations":[{"ref":"crates/proto/src/serialize/txt/errors.rs:127-131","code":"  127 | impl From<core::convert::Infallible> for ParseError {\n  128 |     fn from(_e: core::convert::Infallible) -> Self {\n  129 |         panic!(\"infallible\")\n  130 |     }\n  131 | }"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"DecayingSrtt::update has a TOCTOU race between taking the SyncMutex lock on\n`last_update` and performing the atomic fetch_update on `srtt_microseconds`.\nThe lock is dropped before the CAS loop begins (the closure captures the old\n`last_update` value by move). A second concurrent call can therefore:\n  1. Race into `update`, read its own `last_update` snapshot and replace the\n     lock value,\n  2. Then execute the atomic update itself,\n  3. Interleaved with the first call's atomic CAS.\nThe result is that two concurrent updates can both see the same (or wrong)\n`last_update` timestamp: the second thread's update_fn will receive the\ntimestamp that the FIRST thread stored rather than its own, producing a\nsilently incorrect EWMA value. While the saturating arithmetic prevents a panic,\nthe SRTT calculation can be systematically skewed under heavy parallel query\nload, leading to incorrect server ranking.","fix":"Hold the SyncMutex lock for the entire duration of both the timestamp capture\nAND the atomic update, or restructure so that both the timestamp and the SRTT\nvalue are updated within a single critical section (e.g. store them together in\na Mutex<(Instant, u32)> and update under one lock acquisition).","locations":[{"ref":"crates/resolver/src/name_server.rs:653-668","code":"  653 |     fn update(&self, default: u32, update_fn: impl Fn(u32, Instant) -> u32) {\n  654 |         let last_update = self.last_update.lock().replace(Instant::now());\n  655 |         let _ = self.srtt_microseconds.fetch_update(\n  656 |             Ordering::SeqCst,\n  657 |             Ordering::SeqCst,\n  658 |             move |cur_srtt_microseconds| {\n  659 |                 Some(\n  660 |                     last_update\n  661 |                         .map_or(default, |last_update| {\n  662 |                             update_fn(cur_srtt_microseconds, last_update)\n  663 |                         })\n  664 |                         .min(Self::MAX_SRTT_MICROS),\n  665 |                 )\n  666 |             },\n  667 |         );\n  668 |     }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"high","description":"`persist_to_journal()` contains acknowledged TODO comments stating that the AXFR marker insertion\nand subsequent record insertions are NOT wrapped in a SQLite transaction. If the process crashes\nor is interrupted between writing the AXFR marker and writing all zone records, the journal is\nleft in a partially-written, inconsistent state. On the next restart, `recover_with_journal()`\nwill replay the partial snapshot, potentially yielding a corrupt in-memory zone (missing records\nor an incomplete authoritative dataset). The comments explicitly say\n'TODO: THIS NEEDS TO BE IN A TRANSACTION!!!' and 'TODO: COMMIT THE TRANSACTION!!!', confirming\nthis is a known gap. Impact: data loss or silent zone corruption after an unclean shutdown during\na full-zone persist.","fix":"Wrap the AXFR marker insert and the subsequent per-record inserts in a single SQLite transaction.\nBegin the transaction before line 260, write all records, then commit at the end of the loop.\nRoll back and return an error if any write fails.","locations":[{"ref":"crates/server/src/store/sqlite/mod.rs:253-279","code":"  253 |     pub async fn persist_to_journal(&self) -> Result<(), PersistenceError> {\n  254 |         if let Some(journal) = self.journal.lock().await.as_ref() {\n  255 |             let serial = self.in_memory.serial().await;\n  256 | \n  257 |             info!(\"persisting zone to journal at SOA.serial: {serial}\");\n  258 | \n  259 |             // TODO: THIS NEEDS TO BE IN A TRANSACTION!!!\n  260 |             journal.insert_record(\n  261 |                 serial,\n  262 |                 &Record::update0(Name::new(), 0, RecordType::AXFR).into_record_of_rdata(),\n  263 |             )?;\n  264 | \n  265 |             for rr_set in self.in_memory.records().await.values() {\n  266 |                 // TODO: should we preserve rr_sets or not?\n  267 |                 for record in rr_set.records_without_rrsigs() {\n  268 |                     journal.insert_record(serial, record)?;\n  269 | \n  270 |                     #[cfg(feature = \"metrics\")]\n  271 |                     self.metrics.zone_records.increment(1);\n  272 |                 }\n  273 |             }\n  274 | \n  275 |             // TODO: COMMIT THE TRANSACTION!!!\n  276 |         }\n  277 | \n  278 |         Ok(())\n  279 |     }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"MemoizeClientHandle never evicts entries from the active_queries map. Completed RcStream entries are never removed because poll_next on RcStream returns Poll::Ready(None) once the inner stream is exhausted, but nothing removes the entry from the HashMap. Over time the map grows unboundedly, holding on to all query keys and their completed response data for the lifetime of the client. With long-lived clients handling many unique queries this is a memory leak. The comment on line 61 (`// TODO: we need to consider TTL on the records here at some point`) confirms this is known.","fix":"After RcStream is exhausted (poll_next returns None), remove its entry from the HashMap. One approach: wrap RcStream in a wrapper that calls a cleanup callback, or periodically sweep the map for entries whose inner stream has terminated. A simpler short-term fix is to remove entries when a new send is issued for the same query and the existing stream has been fully consumed.","locations":[{"ref":"crates/net/src/client/memoize_client_handle.rs:59-71","code":"   59 |         let mut active_queries = active_queries.lock().await;\n   60 | \n   61 |         // TODO: we need to consider TTL on the records here at some point\n   62 |         // If the query is running, grab that existing one...\n   63 |         if let Some(rc_stream) = active_queries.get(&query) {\n   64 |             return rc_stream.clone();\n   65 |         };\n   66 | \n   67 |         // Otherwise issue a new query and store in the map\n   68 |         active_queries\n   69 |             .entry(query)\n   70 |             .or_insert_with(|| rc_stream(client.send(request)))\n   71 |             .clone()"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In the retry<Provider> function in udp_client_stream.rs, when multiple send() futures are outstanding (after retry timer fires), all in-flight futures are held in FuturesUnordered. If the first future to complete returns an error, the function returns immediately, dropping the remaining in-flight futures. Each in-flight future holds an open UDP socket via NextRandomUdpSocket. The socket is created inside UdpRequest::send and is dropped when the future is dropped, which should trigger the OS to close the socket. In Rust this is correct via RAII, so this is not a true leak, but the comment 'It does not implement an overall timeout to bound the work' on line 440 suggests retries are not cleaned up by a bounded timeout - they are only bounded by the external P::Timer::timeout wrapper in send_message. If that outer timeout fires, the FuturesUnordered holding open sockets is dropped, closing all sockets correctly.","fix":"No code change needed (RAII handles cleanup). Add a comment clarifying that socket cleanup is handled by the future's Drop impl when the FuturesUnordered is dropped, to make the resource safety explicit.","locations":[{"ref":"crates/net/src/udp/udp_client_stream.rs:442-472","code":"  442 | async fn retry<Provider: RuntimeProvider>(\n  443 |     request: impl Request,\n  444 |     retry_interval_time: Duration,\n  445 |     max_tasks: usize,\n  446 | ) -> Result<DnsResponse, NetError> {\n  447 |     let mut futures = FuturesUnordered::new();\n  448 | \n  449 |     let retry_timer = Provider::Timer::delay_for(retry_interval_time).fuse();\n  450 |     pin_mut!(retry_timer);\n  451 | \n  452 |     futures.push(request.send());\n  453 |     let mut tasks = 1;\n  454 | \n  455 |     loop {\n  456 |         futures_util::select! {\n  457 |             result = futures.next() => {\n  458 |                 match result {\n  459 |                     Some(result) => return result,\n  460 |                     None => return Err(NetError::from(\"no tasks successful\")),\n  461 |                 }\n  462 |             }\n  463 |             _ = &mut retry_timer => {\n  464 |                 if tasks < max_tasks {\n  465 |                     tasks += 1;\n  466 |                     futures.push(request.send());\n  467 |                     retry_timer.set(Provider::Timer::delay_for(retry_interval_time).fuse());\n  468 |                 }\n  469 |             }\n  470 |         }\n  471 |     }\n  472 | }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In TcpStream::poll_next, the outgoing message buffer length is silently truncated from usize to u16 via `buffer.len() as u16`. DNS over TCP uses a 2-byte length prefix (max 65535 bytes per RFC 1035). If a message exceeds 65535 bytes, the cast wraps silently (in release builds) producing an incorrect length header, which will corrupt the TCP framing and confuse the remote peer. There is no check or error returned.","fix":"Add an explicit check before the cast: `if buffer.len() > u16::MAX as usize { return Poll::Ready(Some(Err(io::Error::new(io::ErrorKind::InvalidData, \"DNS message too large for TCP framing\")))); }` Then the cast is safe.","locations":[{"ref":"crates/net/src/tcp/tcp_stream.rs:281","code":"  281 |                         let len = u16::to_be_bytes(buffer.len() as u16);"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In tsig.rs emit_tsig_for_mac(), the other.len() is cast to u16 with 'as u16' at line 282 without overflow checking. If other.len() exceeds 65535, this silently truncates. The main emit() function does properly validate via u16::try_from(), but emit_tsig_for_mac() (used when computing the MAC) skips this check entirely. An adversary who constructs a TSIG with an oversized other field could cause the MAC to be computed over a misrepresented length, leading to a signature bypass.","fix":"Replace '(self.other.len() as u16).emit' with a u16::try_from(self.other.len()) check that returns a ProtoError on overflow, consistent with the approach used in the emit() method.","locations":[{"ref":"crates/proto/src/rr/rdata/tsig.rs:282-283","code":"  282 |         (self.other.len() as u16).emit(&mut encoder)?;\n  283 |         encoder.emit_slice(&self.other)?;"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"find_covering_record() in nsec3.rs has inverted logic in the wraparound case.\n\nFor the wraparound NSEC3 record (where owner_hash > next_hash, i.e., the last record in the chain\nthat wraps back to the beginning of the hash space), a target hash is covered if it falls outside\nthe range [next_hash, owner_hash], i.e., target > owner OR target < next.\n\nThe code at lines 648-649 instead checks:\n  record.base32_hashed_name > *target_base32_hashed_name  // owner > target (i.e., target < owner)\n  || target_hashed_name > record.nsec3_data.next_hashed_owner_name()  // target > next\n\nThis evaluates to: target < owner OR target > next, which covers almost everything (every hash\nthat is either below the maximum or above the minimum), effectively accepting almost any target\nas \"covered\" by the wraparound record. For example, a hash Y in the middle of the ordered chain\n(A...Y...Z) where the wraparound record is (Z -> A) would be incorrectly considered \"covered\",\nallowing an NXDomain or NoData response to be falsely validated as Secure.\n\nThe comment at line 645-646 describes what the code does (not what it should do), so it is also\nwrong.\n\nThe correct condition should be:\n  *target_base32_hashed_name > record.base32_hashed_name  // target > owner\n  || target_hashed_name < record.nsec3_data.next_hashed_owner_name()  // target < next","fix":"Change the wraparound branch to:\n  // Wraparound case: target must be greater than the hashed owner name or less than the\n  // next hashed owner name.\n  *target_base32_hashed_name > record.base32_hashed_name\n      || target_hashed_name < record.nsec3_data.next_hashed_owner_name()","locations":[{"ref":"crates/net/src/dnssec/nsec3.rs:640-651","code":"  640 |         if record.base32_hashed_name < *record_next_hashed_owner_name_base32 {\n  641 |             // Normal case: target must be between the hashed owner name and the next hashed owner\n  642 |             // name.\n  643 |             record.base32_hashed_name < *target_base32_hashed_name\n  644 |                 && target_hashed_name < record.nsec3_data.next_hashed_owner_name()\n  645 |         } else {\n  646 |             // Wraparound case: target must be less than the hashed owner name or greater than the\n  647 |             // next hashed owner name.\n  648 |             record.base32_hashed_name > *target_base32_hashed_name\n  649 |                 || target_hashed_name > record.nsec3_data.next_hashed_owner_name()\n  650 |         }\n  651 |     })"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"find_covering_record() mixes two different comparison orderings.\n\nIn the normal (non-wraparound) case, the condition at lines 643-644 uses:\n  1. record.base32_hashed_name < *target_base32_hashed_name  (Label/base32 ordering)\n  2. target_hashed_name < record.nsec3_data.next_hashed_owner_name()  (raw byte ordering)\n\nBASE32_DNSSEC (standard RFC 4648 base32, alphabet a-z2-7) does NOT preserve sort order of the\nunderlying binary data. In particular, the character '2' (mapped to value 26, ASCII 50) sorts\nBEFORE 'a' (value 0, ASCII 97) in ASCII/Label ordering, but the opposite is true in binary\nordering. For example:\n  - bytes 0xD0... base32-encodes to '2...' (starts with '2', ASCII 50)\n  - bytes 0x00... base32-encodes to 'a...' (starts with 'a', ASCII 97)\n  - Binary: 0xD0... > 0x00..., but base32 label: '2...' < 'a...'\n\nThis inconsistency means the same hash may satisfy one comparison type but not the other,\nleading to incorrect cover determinations. A covering record may be falsely rejected (causing\nBogus on a valid response) or falsely accepted (allowing an invalid response to pass).\n\nThe same inconsistency exists in the wraparound branch (lines 648-649).\n\nPer RFC 5155 section 6.1, all NSEC3 comparisons must use the raw hash values as binary strings.","fix":"Use a single consistent comparison type for all NSEC3 cover checks. Since the RFC specifies\nbinary ordering on hash values, use raw byte comparisons throughout. The base32_hashed_name\nLabel fields should only be used for equality matching (matching records), and all ordering\ncomparisons (covering checks) should use the raw hashed_name bytes.\n\nReplace:\n  record.base32_hashed_name < *target_base32_hashed_name\n      && target_hashed_name < record.nsec3_data.next_hashed_owner_name()\nWith:\n  record_hashed_name < target_hashed_name\n      && target_hashed_name < record.nsec3_data.next_hashed_owner_name()\n\nWhere record_hashed_name is the raw binary hash (already available or decoded from base32).\nConsider adding a raw_hashed_name field to Nsec3RecordPair.","locations":[{"ref":"crates/net/src/dnssec/nsec3.rs:640-651","code":"  640 |         if record.base32_hashed_name < *record_next_hashed_owner_name_base32 {\n  641 |             // Normal case: target must be between the hashed owner name and the next hashed owner\n  642 |             // name.\n  643 |             record.base32_hashed_name < *target_base32_hashed_name\n  644 |                 && target_hashed_name < record.nsec3_data.next_hashed_owner_name()\n  645 |         } else {\n  646 |             // Wraparound case: target must be less than the hashed owner name or greater than the\n  647 |             // next hashed owner name.\n  648 |             record.base32_hashed_name > *target_base32_hashed_name\n  649 |                 || target_hashed_name > record.nsec3_data.next_hashed_owner_name()\n  650 |         }\n  651 |     })"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In both the H2 client (`h2.rs` `send()`) and the H3 client\n(`h3_client_stream.rs` `inner_send()`), the full response body is accumulated\ninto a `BytesMut` *before* the HTTP status code is checked. A malicious or\nmisbehaving server can return a large error body (e.g. a multi-megabyte HTML\npage with a 400/500 status) without a `Content-Length` header. The client\nbuffers all of it before discovering the failure, wasting memory.\n\nAdditionally, when `Content-Length` is present, the buffer capacity is clamped\nto `4096` but the actual `BytesMut` grows without bound via `extend()` / `put()`\nuntil `response_bytes.len() >= content_length` — so a `Content-Length` larger\nthan 65535 (the DNS message maximum) forces unlimited allocation before the\ncheck.","fix":"1. Check `response_stream.status().is_success()` *before* reading the body.\n   For error responses, either skip the body or read only a small capped excerpt\n   for the error message.\n2. Enforce a hard maximum on accumulated bytes (e.g. 65535, the DNS wire-format\n   limit) regardless of whether `Content-Length` is present:\n```rust\nif response_bytes.len() > 65_535 {\n    return Err(NetError::from(\"response exceeds maximum DNS message size\"));\n}\n```","locations":[{"ref":"crates/net/src/h2.rs:346-386","code":"  346 |     let mut response_bytes =\n  347 |         BytesMut::with_capacity(content_length.unwrap_or(512).clamp(512, 4_096));\n  348 | \n  349 |     while let Some(partial_bytes) = response_stream.body_mut().data().await {\n  350 |         let partial_bytes =\n  351 |             partial_bytes.map_err(|e| NetError::from(format!(\"bad http request: {e}\")))?;\n  352 | \n  353 |         debug!(\"got bytes: {}\", partial_bytes.len());\n  354 |         response_bytes.extend(partial_bytes);\n  355 | \n  356 |         // assert the length\n  357 |         if let Some(content_length) = content_length {\n  358 |             if response_bytes.len() >= content_length {\n  359 |                 break;\n  360 |             }\n  361 |         }\n  362 |     }\n  363 | \n  364 |     // assert the length\n  365 |     if let Some(content_length) = content_length {\n  366 |         if response_bytes.len() != content_length {\n  367 |             // TODO: make explicit error type\n  368 |             return Err(NetError::from(format!(\n  369 |                 \"expected byte length: {}, got: {}\",\n  370 |                 content_length,\n  371 |                 response_bytes.len()\n  372 |             )));\n  373 |         }\n  374 |     }\n  375 | \n  376 |     // Was it a successful request?\n  377 |     if !response_stream.status().is_success() {\n  378 |         let error_string = String::from_utf8_lossy(response_bytes.as_ref());\n  379 | \n  380 |         // TODO: make explicit error type\n  381 |         return Err(NetError::from(format!(\n  382 |             \"http unsuccessful code: {}, message: {}\",\n  383 |             response_stream.status(),\n  384 |             error_string\n  385 |         )));\n  386 |     } else {"},{"ref":"crates/net/src/h3/h3_client_stream.rs:113-177","code":"  113 |         let mut response_bytes =\n  114 |             BytesMut::with_capacity(content_length.unwrap_or(512).clamp(512, 4_096));\n  115 | \n  116 |         while let Some(partial_bytes) = stream\n  117 |             .recv_data()\n  118 |             .await\n  119 |             .map_err(|e| NetError::from(format!(\"h3 recv_data error: {e}\")))?\n  120 |         {\n  121 |             debug!(\"got bytes: {}\", partial_bytes.remaining());\n  122 |             response_bytes.put(partial_bytes);\n  123 | \n  124 |             // assert the length\n  125 |             if let Some(content_length) = content_length {\n  126 |                 if response_bytes.len() >= content_length {\n  127 |                     break;\n  128 |                 }\n  129 |             }\n  130 |         }\n  131 | \n  132 |         // assert the length\n  133 |         if let Some(content_length) = content_length {\n  134 |             if response_bytes.len() != content_length {\n  135 |                 // TODO: make explicit error type\n  136 |                 return Err(NetError::from(format!(\n  137 |                     \"expected byte length: {}, got: {}\",\n  138 |                     content_length,\n  139 |                     response_bytes.len()\n  140 |                 )));\n  141 |             }\n  142 |         }\n  143 | \n  144 |         // Was it a successful request?\n  145 |         if !response.status().is_success() {\n  146 |             let error_string = String::from_utf8_lossy(response_bytes.as_ref());\n  147 | \n  148 |             // TODO: make explicit error type\n  149 |             return Err(NetError::from(format!(\n  150 |                 \"http unsuccessful code: {}, message: {}\",\n  151 |                 response.status(),\n  152 |                 error_string\n  153 |             )));\n  154 |         } else {\n  155 |             // verify content type\n  156 |             {\n  157 |                 // in the case that the ContentType is not specified, we assume it's the standard DNS format\n  158 |                 let content_type = response\n  159 |                     .headers()\n  160 |                     .get(header::CONTENT_TYPE)\n  161 |                     .map(|h| {\n  162 |                         h.to_str().map_err(|err| {\n  163 |                             // TODO: make explicit error type\n  164 |                             NetError::from(format!(\"ContentType header not a string: {err}\"))\n  165 |                         })\n  166 |                     })\n  167 |                     .unwrap_or(Ok(crate::http::MIME_APPLICATION_DNS))?;\n  168 | \n  169 |                 if content_type != crate::http::MIME_APPLICATION_DNS {\n  170 |                     return Err(NetError::from(format!(\n  171 |                         \"ContentType unsupported (must be '{}'): '{}'\",\n  172 |                         crate::http::MIME_APPLICATION_DNS,\n  173 |                         content_type\n  174 |                     )));\n  175 |                 }\n  176 |             }\n  177 |         };"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`message_from_post()` in `h2.rs` (the server-side inbound request parser) has\nno upper bound on byte accumulation when `Content-Length` is absent. A client\nthat streams data indefinitely without closing the stream will cause the server\nto buffer an unbounded amount of data. DNS messages have a hard upper limit of\n65535 bytes (RFC 9250 / RFC 1035), so requests exceeding this should be\nrejected immediately.","fix":"Add an explicit maximum size check inside the accumulation loop:\n```rust\nconst DNS_MAX_MESSAGE_SIZE: usize = 65_535;\nif bytes.len() > DNS_MAX_MESSAGE_SIZE {\n    return Err(\"request exceeds maximum DNS message size\".into());\n}\n```\nAlso apply the same check in the server-side path of `message_from()` when\nvalidating the `Content-Length` header value.","locations":[{"ref":"crates/net/src/h2.rs:456-490","code":"  456 | pub(crate) async fn message_from_post<R>(\n  457 |     mut request_stream: R,\n  458 |     length: Option<usize>,\n  459 | ) -> Result<BytesMut, NetError>\n  460 | where\n  461 |     R: Stream<Item = Result<Bytes, h2::Error>> + 'static + Send + Debug + Unpin,\n  462 | {\n  463 |     let mut bytes = BytesMut::with_capacity(length.unwrap_or(0).clamp(512, 4_096));\n  464 | \n  465 |     loop {\n  466 |         match request_stream.next().await {\n  467 |             Some(Ok(mut frame)) => bytes.extend_from_slice(&frame.split_off(0)),\n  468 |             Some(Err(err)) => return Err(err.into()),\n  469 |             None => {\n  470 |                 return if let Some(length) = length {\n  471 |                     // wait until we have all the bytes\n  472 |                     if bytes.len() == length {\n  473 |                         Ok(bytes)\n  474 |                     } else {\n  475 |                         Err(\"not all bytes received\".into())\n  476 |                     }\n  477 |                 } else {\n  478 |                     Ok(bytes)\n  479 |                 };\n  480 |             }\n  481 |         };\n  482 | \n  483 |         if let Some(length) = length {\n  484 |             // wait until we have all the bytes\n  485 |             if bytes.len() == length {\n  486 |                 return Ok(bytes);\n  487 |             }\n  488 |         }\n  489 |     }\n  490 | }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The QoS message-receive counter in DnsMultiplexer::poll_next is updated as `messages_received = i` (loop index, 0-based), but the limit check afterward compares `messages_received == QOS_MAX_RECEIVE_MSGS` (which is 100). Because `i` goes from 0 to 99, the last possible value of `messages_received` after processing all 100 messages is 99, never 100. The wake-by-ref call on line 360 is therefore dead code and will never execute. If the QoS limit is truly hit (all 100 slots consumed), the waker will NOT be called, meaning the executor may not wake the multiplexer even though there are more messages to process, stalling DNS query responses until some other I/O event fires.","fix":"Change the comparison to `messages_received == QOS_MAX_RECEIVE_MSGS - 1` (i.e. `99`) or change the assignment to `messages_received = i + 1` so the check `messages_received == QOS_MAX_RECEIVE_MSGS` actually fires when all slots are consumed.","locations":[{"ref":"crates/net/src/xfer/dns_multiplexer.rs:307-361","code":"  307 |         let mut messages_received = 0;\n  308 |         for i in 0..QOS_MAX_RECEIVE_MSGS {\n  309 |             match self.stream.poll_next_unpin(cx) {\n  310 |                 Poll::Ready(Some(Ok(buffer))) => {\n  311 |                     messages_received = i;\n  312 | \n  313 |                     //   deserialize or log decode_error\n  314 |                     match DnsResponse::from_buffer(buffer.into_parts().0) {\n  315 |                         Ok(response) => match self.active_requests.entry(response.id) {\n  316 |                             Entry::Occupied(mut request_entry) => {\n  317 |                                 // send the response, complete the request...\n  318 |                                 let active_request = request_entry.get_mut();\n  319 |                                 #[cfg(feature = \"__dnssec\")]\n  320 |                                 if let Some(verifier) = &mut active_request.verifier {\n  321 |                                     ignore_send(\n  322 |                                         active_request.completion.try_send(\n  323 |                                             verifier\n  324 |                                                 .verify(response.as_buffer())\n  325 |                                                 .map_err(NetError::from),\n  326 |                                         ),\n  327 |                                     );\n  328 |                                 } else {\n  329 |                                     ignore_send(active_request.completion.try_send(Ok(response)));\n  330 |                                 }\n  331 |                                 #[cfg(not(feature = \"__dnssec\"))]\n  332 |                                 ignore_send(active_request.completion.try_send(Ok(response)));\n  333 |                             }\n  334 |                             Entry::Vacant(..) => debug!(\"unexpected request_id: {}\", response.id),\n  335 |                         },\n  336 |                         // TODO: return src address for diagnostics\n  337 |                         Err(error) => debug!(%error, \"error decoding message\"),\n  338 |                     }\n  339 |                 }\n  340 |                 Poll::Ready(err) => {\n  341 |                     let err = match err {\n  342 |                         Some(Err(e)) => e,\n  343 |                         None => NetError::from(\"stream closed\"),\n  344 |                         _ => unreachable!(),\n  345 |                     };\n  346 | \n  347 |                     self.stream_closed_close_all(err);\n  348 |                     self.is_shutdown = true;\n  349 |                     return Poll::Ready(None);\n  350 |                 }\n  351 |                 Poll::Pending => break,\n  352 |             }\n  353 |         }\n  354 | \n  355 |         // If still active, then if the qos (for _ in 0..100 loop) limit\n  356 |         // was hit then \"yield\". This'll make sure that the future is\n  357 |         // woken up immediately on the next turn of the event loop.\n  358 |         if messages_received == QOS_MAX_RECEIVE_MSGS {\n  359 |             // FIXME: this was a task::current().notify(); is this right?\n  360 |             cx.waker().wake_by_ref();\n  361 |         }"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`EcdsaSigningKey::to_public_key()` strips the first byte of the ring/aws-lc-rs public key with\n`bytes.remove(0)` before calling `PublicKeyBuf::new`. Ring returns the uncompressed EC point with a\nleading 0x04 prefix byte, which DNSSEC omits. This is intentional, but `bytes.remove(0)` will\n**panic** if `bytes` is unexpectedly empty (e.g. if the underlying library's behaviour ever\nchanges or a zero-length public key is returned). There is no length check before the removal.\nAdditionally, `remove(0)` on a `Vec` is O(n) because it shifts all remaining bytes; a more\nidiomatic approach would be to use a slice starting at index 1.","fix":"Guard against empty bytes and use a slice instead of Vec::remove:\n  fn to_public_key(&self) -> DnsSecResult<PublicKeyBuf> {\n      let raw = self.inner.public_key().as_ref();\n      if raw.is_empty() {\n          return Err(\"empty ECDSA public key\".into());\n      }\n      Ok(PublicKeyBuf::new(raw[1..].to_vec(), self.algorithm))\n  }","locations":[{"ref":"crates/proto/src/dnssec/crypto.rs:134-138","code":"  134 |     fn to_public_key(&self) -> DnsSecResult<PublicKeyBuf> {\n  135 |         let mut bytes = self.inner.public_key().as_ref().to_vec();\n  136 |         bytes.remove(0);\n  137 |         Ok(PublicKeyBuf::new(bytes, self.algorithm))\n  138 |     }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The `DnssecSigner::test_key` method is entirely commented out and always returns `Ok(())` without\nactually testing the key. The doc comment states \"This will panic if the `key` is not a private\nkey and can be used for signing.\" but the function does nothing. Callers that invoke `test_key()`\nexpecting validation of key usability will silently get a success result even if the key is\nunusable, broken, or mismatched.","fix":"Either implement the function body (sign test data and verify it), or remove the public API\nentirely and deprecate it. Leaving a no-op `Ok(())` that claims to test the key provides false\nassurance to callers.","locations":[{"ref":"crates/proto/src/dnssec/signer.rs:362-374","code":"  362 |     /// Test that this key is capable of signing and verifying data\n  363 |     pub fn test_key(&self) -> DnsSecResult<()> {\n  364 |         // use proto::rr::dnssec::PublicKey;\n  365 | \n  366 |         // // TODO: why doesn't this work for ecdsa_256 and 384?\n  367 |         // let test_data = TBS::from(b\"DEADBEEF\" as &[u8]);\n  368 | \n  369 |         // let signature = self.sign(&test_data).map_err(|e| {println!(\"failed to sign, {:?}\", e); e})?;\n  370 |         // let pk = self.key.to_public_key()?;\n  371 |         // pk.verify(self.algorithm, test_data.as_ref(), &signature).map_err(|e| {println!(\"failed to verify, {:?}\", e);
