 764 |                 nameserver_pool.clone()\n  765 |             };"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `blocklist.rs`, `try_from_config()` constructs a file path by string concatenation:\n`format!(\"{base_dir}/{bl}\")` where `bl` comes directly from user-supplied configuration\n(the `lists` field). If `bl` contains path traversal sequences such as `../../../etc/passwd`,\nthe server will open arbitrary files on the filesystem relative to `base_dir`.\nWhile this is a configuration-time operation (not runtime), it allows an operator who can write\nthe config file to read arbitrary files from the server process's perspective.","fix":"Validate that `bl` does not escape `base_dir` using `Path::join` followed by\n`canonicalize()` and checking that the result starts with the canonicalized `base_dir`. Or\nuse `Path::join` and verify the resulting path is a descendant of `base_dir`:\n    let candidate = Path::new(base_dir_str).join(&bl);\n    // ensure candidate is within base_dir","locations":[{"ref":"crates/server/src/store/blocklist.rs:118","code":"  118 |             let file = match File::open(format!(\"{base_dir}/{bl}\")) {"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `BlocklistZoneHandler::wildcards()`, the function builds wildcard candidates from\n`host.iter()` which iterates labels from the root toward the leaf. The index `i` represents the\nnumber of labels kept counting from the root. The guard `i > ((self.min_wildcard_depth - 1) as usize)`\nis intended to enforce that the wildcard covers at least `min_wildcard_depth` static labels.\nHowever, when `min_wildcard_depth` is 0, `(0u8 - 1)` underflows, producing 255 as a `usize`\nafter the cast, which means NO wildcard entries will ever match (the condition is never true for\na reasonable label count). This silently disables wildcard matching when the operator configures\n`min_wildcard_depth = 0`.","fix":"Avoid the underflow: use saturating subtraction or check for zero before casting:\n    let threshold = self.min_wildcard_depth.saturating_sub(1) as usize;\n    if i > threshold { ... }\nOr explicitly handle the zero case separately.","locations":[{"ref":"crates/server/src/store/blocklist.rs:266-274","code":"  266 |             .filter_map(|(i, _x)| {\n  267 |                 if i > ((self.min_wildcard_depth - 1) as usize) {\n  268 |                     Some(host.trim_to(i + 1).into_wildcard().into())\n  269 |                 } else {\n  270 |                     None\n  271 |                 }\n  272 |             })\n  273 |             .collect()\n  274 |     }"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The `zone_transfer` function in `catalog.rs` handles AXFR responses but does NOT check whether\nthe source is authorized at the catalog layer before dispatching to individual zone handlers.\nThe catalog calls `handler.zone_transfer()` (line 635) and relies entirely on each handler's\n`authorize_axfr()` method. If a handler returns `None` (skips), the catalog continues to the\nnext handler, which could be a handler with a more permissive AXFR policy for the same zone.\nAn attacker querying for AXFR will have the request tried against every chained handler, and\nif any handler allows AXFR (e.g., the in-memory fallback), they receive a full zone dump.\nThis is a zone-transfer security issue in chained handler configurations.","fix":"The catalog should enforce a consistent AXFR policy across all handlers for a zone. Consider\nfailing closed: if the first matching handler denies AXFR, do not fall through to subsequent\nhandlers. Or require AXFR authorization to be checked at the catalog level before delegating.","locations":[{"ref":"crates/server/src/zone_handler/catalog.rs:617-731","code":"  617 | async fn zone_transfer(\n  618 |     request_info: RequestInfo<'_>,\n  619 |     handlers: &[Arc<dyn ZoneHandler>],\n  620 |     request: &Request,\n  621 |     response_edns: Option<&Edns>,\n  622 |     now: u64,\n  623 |     mut response_handle: impl ResponseHandler,\n  624 | ) -> ResponseInfo {\n  625 |     let request_edns = request.edns.as_ref();\n  626 |     let lookup_options = LookupOptions::from_edns(request_edns);\n  627 |     for handler in handlers.iter() {\n  628 |         debug!(\n  629 |             query = %request_info.query,\n  630 |             origin = %handler.origin(),\n  631 |             request_id = request.metadata.id,\n  632 |             \"performing zone transfer\"\n  633 |         );\n  634 |         #[cfg_attr(not(feature = \"__dnssec\"), expect(unused))]\n  635 |         let Some((result, signer)) = handler.zone_transfer(request, lookup_options, now).await\n  636 |         else {\n  637 |             continue;\n  638 |         };\n  639 | \n  640 |         let mut response_meta = Metadata::response_from_request(&request.metadata);\n  641 |         let zone_transfer = match result {\n  642 |             Ok(zone_transfer) => {\n  643 |                 response_meta.response_code = ResponseCode::NoError;\n  644 |                 response_meta.authoritative = true;\n  645 |                 Some(zone_transfer)\n  646 |             }\n  647 |             Err(e) => {\n  648 |                 match e {\n  649 |                     LookupError::ResponseCode(\n  650 |                         rcode @ ResponseCode::Refused | rcode @ ResponseCode::NotAuth,\n  651 |                     ) => {\n  652 |                         response_meta.response_code = rcode;\n  653 |                     }\n  654 |                     _ => {\n  655 |                         if e.is_nx_domain() {\n  656 |                             response_meta.response_code = ResponseCode::NXDomain;\n  657 |                         }\n  658 |                     }\n  659 |                 }\n  660 |                 None\n  661 |             }\n  662 |         };\n  663 | \n  664 |         // TODO(issue #351): Send more than one message in response as needed.\n  665 |         #[cfg_attr(not(feature = \"__dnssec\"), expect(unused_mut))]\n  666 |         let mut message_response = MessageResponseBuilder::new(&request.queries, response_edns)\n  667 |             .build(\n  668 |                 response_meta,\n  669 |                 zone_transfer\n  670 |                     .iter()\n  671 |                     .flat_map(|zone_transfer| zone_transfer.iter()),\n  672 |                 iter::empty(),\n  673 |                 iter::empty(),\n  674 |                 iter::empty(),\n  675 |             );\n  676 | \n  677 |         #[cfg(feature = \"__dnssec\")]\n  678 |         if let Some(signer) = signer {\n  679 |             let mut tbs_response_buf = Vec::with_capacity(512);\n  680 |             let mut encoder = BinEncoder::new(&mut tbs_response_buf);\n  681 |             let tbs_response = MessageResponseBuilder::new(&request.queries, response_edns).build(\n  682 |                 response_meta,\n  683 |                 zone_transfer\n  684 |                     .iter()\n  685 |                     .flat_map(|zone_transfer| zone_transfer.iter()),\n  686 |                 iter::empty(),\n  687 |                 iter::empty(),\n  688 |                 iter::empty(),\n  689 |             );\n  690 |             if let Err(error) = tbs_response.destructive_emit(&mut encoder) {\n  691 |                 error!(%error, \"error encoding response\");\n  692 |                 return send_error_response(\n  693 |                     request,\n  694 |                     ResponseCode::ServFail,\n  695 |                     response_edns,\n  696 |                     response_handle,\n  697 |                 )\n  698 |                 .await;\n  699 |             }\n  700 |             match signer.sign(&tbs_response_buf) {\n  701 |                 Ok(signature) => message_response.set_signature(signature),\n  702 |                 Err(error) => {\n  703 |                     error!(%error, \"error signing response\");\n  704 |                     return send_error_response(\n  705 |                         request,\n  706 |                         ResponseCode::ServFail,\n  707 |                         response_edns,\n  708 |                         response_handle,\n  709 |                     )\n  710 |                     .await;\n  711 |                 }\n  712 |             }\n  713 |         }\n  714 | \n  715 |         match response_handle.send_response(message_response).await {\n  716 |             Err(error) => {\n  717 |                 error!(%error, \"error sending response\");\n  718 |                 return ResponseInfo::serve_failed(request);\n  719 |             }\n  720 |             Ok(response_info) => return response_info,\n  721 |         }\n  722 |     }\n  723 | \n  724 |     error!(\"end of chained zone handler loop with all zone handlers not answering\");\n  725 |     send_error_response(\n  726 |         request,\n  727 |         ResponseCode::ServFail,\n  728 |         response_edns,\n  729 |         response_handle,\n  730 |     )\n  731 |     .await"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In ClientStreamXfr (client/mod.rs), the IXFR state machine uses `answers.last().unwrap()` on line 779 inside the Ixfr branch. This is only reached when `even` is true (meaning an even number of SOA records was seen so far), which implies at least one SOA was present in the answers slice, and answers is non-empty because the function returns early for empty slices (line 688-690). However, the logic does not guarantee `answers` is non-empty when `even` is true at this point in the fold - it is technically possible for `even` to be true with an empty `answers` slice if answers was empty and the default `even` parameter passed in was already true. The early return guards against empty answers at the top of process(), so this specific unwrap is safe given the current call structure, but it is fragile.","fix":"Replace `.unwrap()` with `.expect(\"answers non-empty guaranteed by early return\")` or restructure to use `if let Some(last) = answers.last()` to make the safety invariant explicit and guard against future refactoring.","locations":[{"ref":"crates/net/src/client/mod.rs:779","code":"  779 |                     if let Some(serial) = get_serial(answers.last().unwrap()) {"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","description":"verify_response() early-return for insecure authorities may incorrectly skip NSEC validation.\n\nAt lines 242-249, if the authorities section is non-empty and ALL authority records (records and\nsignatures) are Proof::Insecure, the function returns Ok(message) without performing any\nNSEC/NSEC3 validation.\n\nThe condition uses AND between records.all(Insecure) and signatures.all(Insecure). If an\nauthority rrset has insecure records but ZERO signatures, then signatures.all(Insecure) is\nvacuously true (empty iterator), meaning the early return fires based purely on the record\nproof — but an empty signature set is different from \"all signatures are insecure.\"\n\nMore critically, this check evaluates the VerifiedRrsetMap (already-verified authorities), not\nthe raw message authorities. An adversary who crafts a response where the authority section\ncontains only insecure (unsigned) records could bypass the NSEC/NSEC3 validation step entirely\nfor that response.\n\nNormally, the insecure check is valid (if the zone is insecure, NSEC is not required). However,\nthe check should also verify that the absence of NSEC/NSEC3 records is consistent with the\nzone being provably insecure (i.e., there are no Secure authority records mixed in).","fix":"Add a check that no authority record has Proof::Secure to prevent the early return from\nmasking situations where only some authority records are insecure:\n\n  if !authorities.is_empty()\n      && authorities.iter().all(|(_, rrset)| {\n          rrset.records.iter().all(|x| x.proof == Proof::Insecure)\n              && rrset.signatures.iter().all(|x| x.proof == Proof::Insecure)\n      })\n      && authorities.iter().all(|(_, rrset)| {\n          rrset.records.iter().all(|x| x.proof != Proof::Secure)\n      })\n  {\n      return Ok(message);\n  }","locations":[{"ref":"crates/net/src/dnssec/mod.rs:242-249","code":"  242 |         if !authorities.is_empty()\n  243 |             && authorities.iter().all(|(_, rrset)| {\n  244 |                 rrset.records.iter().all(|x| x.proof == Proof::Insecure)\n  245 |                     && rrset.signatures.iter().all(|x| x.proof == Proof::Insecure)\n  246 |             })\n  247 |         {\n  248 |             return Ok(message);\n  249 |         }"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`H3ClientStream::shutdown()` (line 257-259) only sets `is_shutdown = true`; it\ndoes **not** signal the background driver task to terminate. The driver task is\nonly informed via `shutdown_tx` being dropped, which happens when the last clone\nof `H3ClientStream` is dropped — not when `shutdown()` is called. During the\ngap between `shutdown()` being called and the struct being dropped, the driver\ntask continues running and holds the underlying QUIC connection open, preventing\ntimely resource release. The background task also never calls\n`h3::client::Connection::shutdown()` (GOAWAY), so the server may not be\nnotified of orderly client termination.","fix":"Send a message on `shutdown_tx` in `shutdown()` to immediately signal the\nbackground task, and call the H3 driver shutdown inside the task:\n```rust\nfn shutdown(&mut self) {\n    self.is_shutdown = true;\n    let _ = self.shutdown_tx.try_send(());\n}\n```\nInside the background task, call `driver.shutdown(0).await` before exiting to\nsend a proper GOAWAY frame.","locations":[{"ref":"crates/net/src/h3/h3_client_stream.rs:257-263","code":"  257 |     fn shutdown(&mut self) {\n  258 |         self.is_shutdown = true;\n  259 |     }\n  260 | \n  261 |     fn is_shutdown(&self) -> bool {\n  262 |         self.is_shutdown\n  263 |     }"},{"ref":"crates/net/src/h3/h3_client_stream.rs:458-474","code":"  458 |         let (shutdown_tx, mut shutdown_rx) = mpsc::channel::<()>(1);\n  459 | \n  460 |         // TODO: hand this back for others to run rather than spawning here?\n  461 |         debug!(\"h3 connection is ready: {}\", name_server);\n  462 |         tokio::spawn(async move {\n  463 |             tokio::select! {\n  464 |                 error = poll_fn(|cx| driver.poll_close(cx)) => {\n  465 |                     // `poll_close()` strangely unconditionally returns a `ConnectionError`\n  466 |                     if !error.is_h3_no_error() {\n  467 |                         warn!(%error, \"h3 connection failed to close\")\n  468 |                     }\n  469 |                 }\n  470 |                 _ = shutdown_rx.recv() => {\n  471 |                     debug!(\"h3 connection is shutting down: {}\", name_server);\n  472 |                 }\n  473 |             }\n  474 |         });"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The `verify()` function in `http.rs` (lines 112-136) only accepts `Accept`\nheader values of `application/dns-message` and `application/*`. It rejects\n`*/*`, which is the default `Accept` header sent by many HTTP clients and\nlibraries (e.g. `curl`, `reqwest` with defaults). RFC 8484 section 4.1 says\nclients SHOULD include `application/dns-message` — it does not mandate\nrejection of `*/*`. Rejecting `*/*` causes valid DoH clients to fail with an\nopaque \"does not accept content type\" error.","fix":"Add `*/*` to the list of accepted `Accept` header values in the match arm:\n```rust\nSome(mime) if mime.trim() == \"*/*\" => {\n    found = true;\n    break;\n}\n```","locations":[{"ref":"crates/net/src/http.rs:112-136","code":"  112 |     match request.headers().get(ACCEPT).map(|v| v.to_str()) {\n  113 |         Some(Ok(ctype)) => {\n  114 |             let mut found = false;\n  115 |             for mime_and_quality in ctype.split(',') {\n  116 |                 let mut parts = mime_and_quality.splitn(2, ';');\n  117 |                 match parts.next() {\n  118 |                     Some(mime) if mime.trim() == MIME_APPLICATION_DNS => {\n  119 |                         found = true;\n  120 |                         break;\n  121 |                     }\n  122 |                     Some(mime) if mime.trim() == \"application/*\" => {\n  123 |                         found = true;\n  124 |                         break;\n  125 |                     }\n  126 |                     _ => continue,\n  127 |                 }\n  128 |             }\n  129 | \n  130 |             if !found {\n  131 |                 return Err(\"does not accept content type\".into());\n  132 |             }\n  133 |         }\n  134 |         Some(Err(e)) => return Err(e.into()),\n  135 |         None => return Err(\"Accept is unspecified\".into()),\n  136 |     };"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`QuicClientStream::poll_next()` always returns `Poll::Ready(Some(Ok(())))` when\n`is_shutdown` is `false`, regardless of the actual health of the underlying\n`Connection`. Unlike `H3ClientStream::poll_next()` which checks\n`shutdown_tx.is_closed()` to detect a dead background driver, `QuicClientStream`\nnever checks connection liveness. A broken connection will not be detected until\na subsequent `send_message()` call attempts to open a new stream, causing\ndelayed error propagation to the connection pool.","fix":"Check connection liveness in `poll_next()`. `quinn::Connection` exposes\n`close_reason()` which returns `Some(reason)` if the connection is closed:\n```rust\nfn poll_next(self: Pin<&mut Self>, _cx: &mut Context<'_>) -> Poll<Option<Self::Item>> {\n    if self.is_shutdown {\n        return Poll::Ready(None);\n    }\n    if let Some(reason) = self.quic_connection.close_reason() {\n        return Poll::Ready(Some(Err(NetError::from(format!(\"QUIC connection closed: {reason}\")))));\n    }\n    Poll::Ready(Some(Ok(())))\n}\n```","locations":[{"ref":"crates/net/src/quic/quic_client_stream.rs:185-195","code":"  185 | impl Stream for QuicClientStream {\n  186 |     type Item = Result<(), NetError>;\n  187 | \n  188 |     fn poll_next(self: Pin<&mut Self>, _cx: &mut Context<'_>) -> Poll<Option<Self::Item>> {\n  189 |         if self.is_shutdown {\n  190 |             Poll::Ready(None)\n  191 |         } else {\n  192 |             Poll::Ready(Some(Ok(())))\n  193 |         }\n  194 |     }\n  195 | }"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","description":"UdpClientStream::send_message clamps the retry_interval to retry_interval_floor (lines 84-88), but the floor comparison is applied at the stream level before per-request timeout context is available. If a request comes in with a very short retry_interval (e.g. 0ms), the floor prevents it from being honoured, but the overall timeout still applies. This may silently alter user-specified retry behaviour without any warning or error.","fix":"Log a debug/warn message when the retry_interval is clamped to the floor, so callers can detect that their configured interval was overridden.","locations":[{"ref":"crates/net/src/udp/udp_client_stream.rs:80-88","code":"   80 |         let retry_interval_time = request.options().retry_interval;\n   81 |         let request = UdpRequest::new(request, self);\n   82 | \n   83 |         let max_retries = self.max_retries;\n   84 |         let retry_interval = if retry_interval_time < self.retry_interval_floor {\n   85 |             self.retry_interval_floor\n   86 |         } else {\n   87 |             retry_interval_time\n   88 |         };"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In DnsExchangeBackground::poll, when the outbound_messages channel is exhausted (Poll::Ready(None)), io_stream.shutdown() is called, but the loop then immediately continues back to poll io_stream. On the next iteration io_stream.is_shutdown() is checked before polling outbound_messages again. However, after io_stream.poll_next returns Poll::Pending (not None), the code executes `()` and falls through to poll outbound_messages again. This means after the outbound channel closes, if io_stream returns Pending, the loop iterates again, polls the already-exhausted outbound_messages channel again, which will return Poll::Ready(None) a second time and call shutdown() a second time. Calling shutdown() multiple times should be idempotent, but the repeated call is wasteful and indicates the loop logic is not quite correct.","fix":"After calling io_stream.shutdown(), set a local flag or break out of the inner loop immediately so that outbound_messages is not re-polled after closure. Alternatively, once is_shutdown is true, skip the outbound_messages poll branch entirely.","locations":[{"ref":"crates/net/src/xfer/dns_exchange.rs:127-192","code":"  127 |     fn poll(mut self: Pin<&mut Self>, cx: &mut Context<'_>) -> Poll<Self::Output> {\n  128 |         let (io_stream, outbound_messages) = self.pollable_split();\n  129 |         let mut io_stream = Pin::new(io_stream);\n  130 |         let mut outbound_messages = Pin::new(outbound_messages);\n  131 | \n  132 |         // this will not accept incoming data while there is data to send\n  133 |         //  makes this self throttling.\n  134 |         loop {\n  135 |             // poll the underlying stream, to drive it...\n  136 |             match io_stream.as_mut().poll_next(cx) {\n  137 |                 // The stream is ready\n  138 |                 Poll::Ready(Some(Ok(()))) => (),\n  139 |                 Poll::Pending => {\n  140 |                     if io_stream.is_shutdown() {\n  141 |                         // the io_stream is in a shutdown state, we are only waiting for final results...\n  142 |                         return Poll::Pending;\n  143 |                     }\n  144 | \n  145 |                     // NotReady and not shutdown, see if there are more messages to send\n  146 |                     ()\n  147 |                 } // underlying stream is complete.\n  148 |                 Poll::Ready(None) => {\n  149 |                     debug!(\"io_stream is done, shutting down\");\n  150 |                     return Poll::Ready(());\n  151 |                 }\n  152 |                 Poll::Ready(Some(Err(error))) => {\n  153 |                     debug!(\n  154 |                         %error,\n  155 |                         \"io_stream hit an error, shutting down\"\n  156 |                     );\n  157 | \n  158 |                     return Poll::Ready(());\n  159 |                 }\n  160 |             }\n  161 | \n  162 |             // then see if there is more to send\n  163 |             match outbound_messages.as_mut().poll_next(cx) {\n  164 |                 // already handled above, here to make sure the poll() pops the next message\n  165 |                 Poll::Ready(Some(dns_request)) => {\n  166 |                     // if there is no peer, this connection should die...\n  167 |                     let (dns_request, serial_response): (DnsRequest, _) = dns_request.into_parts();\n  168 | \n  169 |                     // Try to forward the `DnsResponseStream` to the requesting task. If we fail,\n  170 |                     // it must be because the requesting task has gone away / is no longer\n  171 |                     // interested. In that case, we can just log a warning, but there's no need\n  172 |                     // to take any more serious measures (such as shutting down this task).\n  173 |                     match serial_response.send_response(io_stream.send_message(dns_request)) {\n  174 |                         Ok(()) => (),\n  175 |                         Err(_) => {\n  176 |                             debug!(\"failed to associate send_message response to the sender\");\n  177 |                         }\n  178 |                     }\n  179 |                 }\n  180 |                 // On not ready, this is our time to return...\n  181 |                 Poll::Pending => return Poll::Pending,\n  182 |                 Poll::Ready(None) => {\n  183 |                     // if there is nothing that can use this connection to send messages, then this is done...\n  184 |                     io_stream.shutdown();\n  185 | \n  186 |                     // now we'll await the stream to shutdown... see io_stream poll above\n  187 |                 }\n  188 |             }\n  189 | \n  190 |             // else we loop to poll on the outbound_messages\n  191 |         }\n  192 |     }"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","description":"DnsResponseStream::poll_next silently converts NetError::Timeout into Poll::Ready(None) (line 96). This means a timeout during a DNS request looks identical to a clean end-of-stream from the caller's perspective. Callers using the stream via `for await` or `StreamExt::next()` will see `None` and cannot distinguish between a normal stream end and a request timeout, potentially treating a timeout as a successful empty response.","fix":"Consider returning `Poll::Ready(Some(Err(NetError::Timeout)))` rather than None, so callers can distinguish timeout from clean stream termination. Audit all callers that already handle the None case to check whether they correctly map None to a timeout error (e.g. ClientResponse already maps None to Err(NetError::Timeout), but other callers may not).","locations":[{"ref":"crates/net/src/xfer/mod.rs:95-98","code":"   95 |         match result {\n   96 |             Err(NetError::Timeout) => Poll::Ready(None),\n   97 |             r => Poll::Ready(Some(r)),\n   98 |         }"}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The `debug_assert!(algorithm.is_supported())` call in `crypto::decode_public_key()` is a\ndebug-only assertion. In release builds, if an unsupported algorithm (e.g. `Algorithm::RSAMD5` or\n`Algorithm::DSA`) is passed to this function, the code falls through to the catch-all `_ =>\nErr(\"public key algorithm not supported\".into())` branch, which correctly returns an error.\nHowever, the debug assertion implies that callers are expected never to pass unsupported algorithms,\nwhich is an undocumented API contract. If a caller does pass an unsupported algorithm in a release\nbuild, the error message is unhelpful compared to including the algorithm name. The more serious\nconcern is that deprecated but wire-present algorithms (RSAMD5, DSA) will silently be decoded as\n`Algorithm::Unknown` by `Algorithm::from_u8` and then trigger the catch-all, effectively treating\nthem as unsupported — which is the correct security behaviour, but it happens implicitly rather\nthan explicitly.","fix":"Replace the `debug_assert!` with an explicit check that returns a descriptive error including the\nalgorithm name, or document the precondition in the function's doc comment. Consider matching on\ndeprecated algorithms explicitly to give a better error message when they are encountered.","locations":[{"ref":"crates/proto/src/dnssec/crypto.rs:36-55","code":"   36 | pub(super) fn decode_public_key<'a>(\n   37 |     public_key: &'a [u8],\n   38 |     algorithm: Algorithm,\n   39 | ) -> ProtoResult<Arc<dyn PublicKey + 'a>> {\n   40 |     // try to keep this and `Algorithm::is_supported` in sync\n   41 |     debug_assert!(algorithm.is_supported());\n   42 | \n   43 |     #[allow(deprecated)]\n   44 |     match algorithm {\n   45 |         Algorithm::ECDSAP256SHA256 | Algorithm::ECDSAP384SHA384 => Ok(Arc::new(\n   46 |             ECPublicKey::from_public_bytes(public_key, algorithm)?,\n   47 |         )),\n   48 |         Algorithm::ED25519 => Ok(Arc::new(Ed25519::from_public_bytes(public_key.into())?)),\n   49 |         Algorithm::RSASHA1\n   50 |         | Algorithm::RSASHA1NSEC3SHA1\n   51 |         | Algorithm::RSASHA256\n   52 |         | Algorithm::RSASHA512 => Ok(Arc::new(Rsa::from_public_bytes(public_key, algorithm)?)),\n   53 |         _ => Err(\"public key algorithm not supported\".into()),\n   54 |     }\n   55 | }"}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `RsaSigningKey::to_public_key()`, the exponent-length prefix encoding handles keys with\nexponent length > 255 correctly per RFC 3110 (emitting 0x00, high_byte, low_byte). However, the\ncapacity pre-allocation on line 392 does NOT account for the extra 2 or 3 bytes of the\nexponent-length prefix field. For RSA keys with exponent length ≤ 255 (the common case), 1 extra\nbyte is needed; for exponent length > 255, 3 extra bytes are needed. The `Vec::with_capacity` call\nallocates exactly `e.len() + n.len()`, causing an immediate reallocation when the prefix bytes are\npushed. This is a minor performance issue but not a correctness bug.","fix":"Pre-allocate the correct capacity including the length prefix:\n  let prefix_len = if components.e.len() > 255 { 3 } else { 1 };\n  let mut buf = Vec::with_capacity(prefix_len + components.e.len() + components.n.len());","locations":[{"ref":"crates/proto/src/dnssec/crypto.rs:389-401","code":"  389 |     fn to_public_key(&self) -> DnsSecResult<PublicKeyBuf> {\n  390 |         let components = PublicKeyComponents::<Vec<u8>>::from(self.inner.public_key());\n  391 | \n  392 |         let mut buf = Vec::with_capacity(components.e.len() + components.n.len());\n  393 |         if components.e.len() > 255 {\n  394 |             buf.push(0);\n  395 |             buf.push((components.e.len() >> 8) as u8);\n  396 |         }\n  397 | \n  398 |         buf.push(components.e.len() as u8);\n  399 |         buf.extend(&components.e);\n  400 |         buf.extend(&components.n);\n  401 |         Ok(PublicKeyBuf::new(buf, self.algorithm))"}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`Nsec3HashAlgorithm::hash()` in `mod.rs` performs the NSEC3 iterated hashing using a counter that\ncounts down from `iterations`. The initial hash is computed as `H(name || salt)` with\n`iterations` decrements, but RFC 5155 §5 defines:\n  IH(salt, x, 0) = H(x || salt)\n  IH(salt, x, k) = H(IH(salt, x, k-1) || salt), if k > 0\nThe result is `IH(salt, owner, iterations)` which means `iterations` additional rounds beyond the\nbase hash, for a total of `iterations + 1` hash operations. The code does exactly this (base hash\nplus a while loop running `iterations` times). This appears correct. However, the `Digest::iterated`\nfunction (in `crypto.rs`) takes `mut iterations: u16` and subtracts from it in the while-loop\nbody (post-decrement), meaning when `iterations == 0` on entry, the loop does NOT execute and\n`cur` is the initial `hash_iter([bytes, salt], alg)` which represents `IH(salt, x, 0)` — matching\nthe RFC. This is correct. No bug here, but the code is non-obvious and deserves a clarifying\ncomment.","fix":"Add an explanatory comment clarifying that `Digest::iterated` performs the NSEC3 iterated-hash\nformula from RFC 5155 §5: the initial hash corresponds to IH(salt, x, 0) and the loop runs\n`iterations` additional rounds. This prevents future developers from introducing an off-by-one.","locations":[{"ref":"crates/proto/src/dnssec/crypto.rs:413-428","code":"  413 | impl Digest {\n  414 |     /// Hashes the given `data` `iterations` times with the given `salt` and `r#type`.\n  415 |     pub fn iterated(\n  416 |         salt: &[u8],\n  417 |         bytes: &[u8],\n  418 |         r#type: DigestType,\n  419 |         mut iterations: u16,\n  420 |     ) -> Result<Self, DecodeError> {\n  421 |         let alg = r#type.try_into()?;\n  422 |         let mut cur = hash_iter([bytes, salt], alg);\n  423 |         while iterations > 0 {\n  424 |             cur = hash_iter([cur.as_ref(), salt], alg);\n  425 |             iterations -= 1;\n  426 |         }\n  427 |         Ok(Self(cur))\n  428 |     }"}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The `NSEC3PARAM` decoder in `nsec3param.rs` validates the salt length against `decoder.len()`\n(the number of bytes remaining in the decoder buffer), while the `NSEC3` decoder validates the\nsalt length against the computed `salt_len_max` derived from the RDATA length field. The\n`NSEC3PARAM` approach using `decoder.len()` is more permissive — it allows a salt that extends\nbeyond the declared RDATA boundary if the decoder's total buffer is large enough. This could cause\nthe decoder to read bytes belonging to the next DNS record as part of the salt, silently\ncorrupting the parse.","fix":"In `NSEC3PARAM::read()`, replace the `decoder.len()` bound with a bound derived from the declared\nRDATA length, following the same pattern used in `NSEC3::read_data()`:\n  let remaining = /* compute from length field like NSEC3 does */;\n  let salt_len: usize = decoder.read_u8()?.map(|u| u as usize)\n      .verify_unwrap(|salt_len| *salt_len <= remaining)\n      .map_err(|salt_len| DecodeError::IncorrectRDataLengthRead { ... })?;\nNote that `NSEC3PARAM::read` implements `BinDecodable` (no length parameter), so it would need to\nbe refactored to `RecordDataDecodable` to have access to the RDATA length.","locations":[{"ref":"crates/proto/src/dnssec/rdata/nsec3param.rs:197-204","code":"  197 |         let salt_len: usize = decoder\n  198 |             .read_u8()?\n  199 |             .map(|u| u as usize)\n  200 |             .verify_unwrap(|salt_len| *salt_len <= decoder.len())\n  201 |             .map_err(|salt_len| DecodeError::IncorrectRDataLengthRead {\n  202 |                 read: decoder.len(),\n  203 |                 len: salt_len,\n  204 |             })?;"},{"ref":"crates/proto/src/dnssec/rdata/nsec3.rs:318-335","code":"  318 |         let salt_len = decoder.read_u8()?.map(|u| u as usize);\n  319 |         let salt_len_max = length\n  320 |             .map(|u| u as usize)\n  321 |             .checked_sub(decoder.index() - start_idx)\n  322 |             .map_err(|len| DecodeError::IncorrectRDataLengthRead {\n  323 |                 read: decoder.index() - start_idx,\n  324 |                 len,\n  325 |             })?;\n  326 |         let salt_len = salt_len\n  327 |             .verify_unwrap(|salt_len| {\n  328 |                 *salt_len <= salt_len_max.unverified(/*safe in comparison usage*/)\n  329 |             })\n  330 |             .map_err(|salt_len| DecodeError::IncorrectRDataLengthRead {\n  331 |                 read: salt_len_max.unverified(/*safe in error context*/),\n  332 |                 len: salt_len,\n  333 |             })?;\n  334 |         let salt: Vec<u8> =\n  335 |             decoder.read_vec(salt_len)?.unverified(/*salt is any valid array of bytes*/);"}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`RRSIG::authenticated_ttl()` uses `SerialNumber` wrapped `u32` for `sig_expiration` and computes\nthe remaining validity with `self.input.sig_expiration.0.saturating_sub(current_time)`. The use\nof `saturating_sub` means that if `current_time` is past the expiration (i.e. the signature is\nexpired), the function returns 0 rather than signalling an error. The caller therefore gets back a\nTTL of 0 for expired signatures instead of an error, which could cause the record to be cached\nwith a TTL of 0 rather than being rejected outright. The function does not validate that the\nsignature has not already expired.","fix":"Validate that `current_time <= sig_expiration.0` before computing the TTL. If the signature is\nexpired, return an error or a sentinel value that the caller can use to reject the record:\n  if current_time > self.input.sig_expiration.0 {\n      return 0; // or return an Err\n  }\n  record.ttl\n      .min(self.input.original_ttl)\n      .min(self.input.sig_expiration.0 - current_time)","locations":[{"ref":"crates/proto/src/dnssec/rdata/rrsig.rs:78-83","code":"   78 |     pub fn authenticated_ttl(&self, record: &Record, current_time: u32) -> u32 {\n   79 |         record\n   80 |             .ttl\n   81 |             .min(self.input.original_ttl)\n   82 |             .min(self.input.sig_expiration.0.saturating_sub(current_time))\n   83 |     }"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`SigInput::from_rrset()` computes `sig_expiration` and `sig_inception` by casting\n`OffsetDateTime::unix_timestamp() as u32`. If the system time is after year 2106 (when a u32\nUnix timestamp overflows) this silently wraps. Additionally, for negative timestamps (dates before\n1970), casting a negative i64 to u32 will wrap to a large positive value, potentially producing\na sig_inception in the far future. This is a theoretical concern for long-lived systems but\nrepresents incorrect RFC 4034 timestamp handling.","fix":"Use checked conversion and return an error if the timestamp does not fit in u32:\n  let exp_ts = u32::try_from(expiration.unix_timestamp())\n      .map_err(|_| ProtoError::from(\"signature expiration timestamp out of range\"))?;\n  let inc_ts = u32::try_from(inception.unix_timestamp())\n      .map_err(|_| ProtoError::from(\"signature inception timestamp out of range\"))?;","locations":[{"ref":"crates/proto/src/dnssec/rdata/sig.rs:418-419","code":"  418 |             sig_expiration: SerialNumber(expiration.unix_timestamp() as u32),\n  419 |             sig_inception: SerialNumber(inception.unix_timestamp() as u32),"}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`zone_transfer` in `update_message.rs` asserts `zone_origin == soa.mname` when `last_soa` is\nprovided. The assertion uses `assert_eq!` which panics (non-recoverable) if the caller passes\nmismatched arguments. This is a public API function and panicking on invalid input is a poor\nchoice for a library — it should return a `Result` error instead.\nSimilarly, the other `update_message` functions (`create`, `append`, `compare_and_swap`,\n`delete_by_rdata`, `delete_rrset`, `delete_all`) all use `assert!` to validate that\n`zone_origin.zone_of(name)` holds, which also panics on misuse.","fix":"Convert all public `update_message` functions to return `Result<Message, ProtoError>` and replace\nthe `assert!` / `assert_eq!` calls with `if !condition { return Err(...) }`. This transforms\npanics into recoverable errors for library users.","locations":[{"ref":"crates/proto/src/op/update_message.rs:170-201","code":"  170 | pub fn create(rrset: RecordSet, zone_origin: Name, use_edns: bool) -> Message {\n  171 |     // TODO: assert non-empty rrset?\n  172 |     assert!(zone_origin.zone_of(rrset.name()));\n  173 | \n  174 |     // for updates, the query section is used for the zone\n  175 |     let mut zone: Query = Query::root();\n  176 |     zone.set_name(zone_origin)\n  177 |         .set_query_class(rrset.dns_class())\n  178 |         .set_query_type(RecordType::SOA);\n  179 | \n  180 |     // build the message\n  181 |     let mut message = Message::query();\n  182 |     message.metadata.op_code = OpCode::Update;\n  183 |     message.metadata.recursion_desired = false;\n  184 |     message.add_zone(zone);\n  185 | \n  186 |     let mut prerequisite = Record::update0(rrset.name().clone(), 0, rrset.record_type());\n  187 |     prerequisite.dns_class = DNSClass::NONE;\n  188 |     message.add_pre_requisite(prerequisite.into_record_of_rdata());\n  189 |     message.add_updates(rrset);\n  190 | \n  191 |     // Extended dns\n  192 |     if use_edns {\n  193 |         message\n  194 |             .set_max_payload(DEFAULT_MAX_PAYLOAD_LEN)\n  477 |             .set_version(0);\n  478 |     }\n  479 | \n  480 |     message\n  481 | }"},{"ref":"crates/proto/src/op/update_message.rs:509-549","code":"  509 | pub fn delete_all(\n  510 |     name_of_records: Name,\n  511 |     zone_origin: Name,\n  512 |     dns_class: DNSClass,\n  513 |     use_edns: bool,\n  514 | ) -> Message {\n  515 |     assert!(zone_origin.zone_of(&name_of_records));\n  516 | \n  517 |     // for updates, the query section is used for the zone\n  518 |     let mut zone: Query = Query::root();\n  519 |     zone.set_name(zone_origin)\n  520 |         .set_query_class(dns_class)\n  521 |         .set_query_type(RecordType::SOA);\n  522 | \n  523 |     // build the message\n  524 |     let mut message = Message::query();\n  525 |     message.metadata.op_code = OpCode::Update;\n  526 |     message.metadata.recursion_desired = false;\n  527 |     message.add_zone(zone);\n  528 | \n  529 |     // the TTL should be 0\n  530 |     // the rdata must be null to delete all rrsets\n  531 |     // the record type must be any\n  532 |     let mut record = Record::update0(name_of_records, 0, RecordType::ANY);\n  533 | \n  534 |     // the class must be any to delete all rrsets\n  535 |     record.dns_class = DNSClass::ANY;\n  536 | \n  537 |     message.add_update(record.into_record_of_rdata());\n  538 | \n  539 |     // Extended dns\n  540 |     if use_edns {\n  541 |         message\n  542 |             .edns\n  543 |             .get_or_insert_with(Edns::new)\n  544 |             .set_max_payload(DEFAULT_MAX_PAYLOAD_LEN)\n  545 |             .set_version(0);\n  546 |     }\n  547 | \n  548 |     message\n  549 | }"},{"ref":"crates/proto/src/op/update_message.rs:560-563","code":"  560 | pub fn zone_transfer(zone_origin: Name, last_soa: Option<SOA>) -> Message {\n  561 |     if let Some(soa) = &last_soa {\n  562 |         assert_eq!(zone_origin, soa.mname);\n  563 |     }"}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `Name::is_empty` (name.rs line 476-478), the method always returns `false` with a comment that '.' counts as 1'. While technically correct for the `len()` method, it means `is_empty()` is useless — callers who want to check for an empty non-FQDN name (i.e. `Name::new()`) have no way to do so via this method. This is misleading and could lead to bugs if callers rely on `is_empty()` to detect an unset/default Name.","fix":"Consider returning `self.label_ends.is_empty() && !self.is_fqdn` (a truly empty/uninitialized name), or at minimum document prominently that this method always returns false and why.","locations":[{"ref":"crates/proto/src/rr/domain/name.rs:476-478","code":"  476 |     pub fn is_empty(&self) -> bool {\n  477 |         false\n  478 |     }"}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `LowerName::zone_of` (lower_name.rs line 114-116), the method delegates to `self.0.zone_of_case(&name.0)` which does a **case-sensitive** comparison. Since `LowerName` guarantees all labels are already lowercased, this is functionally equivalent to case-insensitive comparison for well-formed `LowerName` values. However, the choice of `zone_of_case` (case-sensitive) instead of `zone_of` (case-insensitive) is surprising and fragile: if a `LowerName` is constructed via `DerefMut` mutation (which exposes the inner `Name` as mutable, line 273-276) and uppercase bytes are injected, the zone_of check will silently fail.","fix":"Either remove the `DerefMut` implementation (which breaks the lowercase invariant by exposing mutable access to the inner Name), or use `zone_of` (case-insensitive) in `LowerName::zone_of` as a defensive measure.","locations":[{"ref":"crates/proto/src/rr/lower_name.rs:114-116","code":"  114 |     pub fn zone_of(&self, name: &Self) -> bool {\n  115 |         self.0.zone_of_case(&name.0)\n  116 |     }"},{"ref":"crates/proto/src/rr/lower_name.rs:272-276","code":"  272 | impl DerefMut for LowerName {\n  273 |     fn deref_mut(&mut self) -> &mut Self::Target {\n  274 |         &mut self.0\n  275 |     }\n  276 | }"}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In caa.rs, the from_tokens() text parser at line 162 stores the raw 'value_str' bytes without any validation or stripping of surrounding quotes. If the presentation-format value is quoted (e.g., 'issue \"ca.example.net\"'), the quotes become part of the stored value, making value_as_issue() fail to parse the domain name correctly. In practice, by the time from_tokens() is called the lexer should have stripped outer quotes, but this dependency on caller behavior is implicit and fragile.","fix":"Add explicit stripping of surrounding double-quotes from value_str in from_tokens(), or document the contract that tokens must already be unquoted by the caller.","locations":[{"ref":"crates/proto/src/rr/rdata/caa.rs:149-170","code":"  149 |         let value_str: &str = tokens\n  150 |             .next()\n  151 |             .ok_or(ParseError::Message(\"caa value not present\"))?;\n  152 | \n  153 |         // parse the flags\n  154 |         let flags = flags_str.parse::<u8>()?;\n  155 |         let issuer_critical = (flags & 0b1000_0000) != 0;\n  156 |         let reserved_flags = flags & 0b0111_1111;\n  157 |         if reserved_flags != 0 {\n  158 |             warn!(\"unexpected flag values in caa (0 or 128): {}\", flags);\n  159 |         }\n  160 | \n  161 |         let tag = tag_str.to_owned();\n  162 |         let value = value_str.as_bytes().to_vec();\n  163 | \n  164 |         // return the new CAA record\n  165 |         Ok(CAA {\n  166 |             issuer_critical,\n  167 |             reserved_flags,\n  168 |             tag,\n  169 |             value,\n  170 |         })"}]},{"id":"LOGIC_62","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In caa.rs, read_tag() validates that the tag length is between 1 and 15 inclusive (verify_unwrap at line 568). However, RFC 8659 section 4.1 does not specify a maximum tag length of 15; it only requires the tag to consist of ASCII alphanumeric characters. The 15-character limit appears to come from CAA property tag registration requirements but is not a wire-format constraint. Tags longer than 15 characters (e.g., 'issuewild' is 9 chars but other custom tags could be longer) will be rejected, potentially causing interoperability issues when receiving records from other implementations.","fix":"Raise the maximum tag length limit from 15 to at least 15 (or the full u8::MAX = 255, the tag length field size), or document why 15 is the chosen limit with a reference to the relevant IANA registry.","locations":[{"ref":"crates/proto/src/rr/rdata/caa.rs:565-583","code":"  565 | fn read_tag(decoder: &mut BinDecoder<'_>, len: Restrict<u8>) -> Result<String, DecodeError> {\n  566 |     let len = len\n  567 |         .map(|len| len as usize)\n  568 |         .verify_unwrap(|len| *len > 0 && *len <= 15)\n  569 |         .map_err(|_| DecodeError::CaaTagInvalid)?;\n  570 |     let mut tag = String::with_capacity(len);\n  571 | \n  572 |     for _ in 0..len {\n  573 |         let ch = decoder\n  574 |             .pop()?\n  575 |             .map(char::from)\n  576 |             .verify_unwrap(|ch| matches!(ch, 'a'..='z' | 'A'..='Z' | '0'..='9'))\n  577 |             .map_err(|_| DecodeError::CaaTagInvalid)?;\n  578 | \n  579 |         tag.push(ch);\n  580 |     }\n  581 | \n  582 |     Ok(tag)\n  583 | }"}]},{"id":"LOGIC_63","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In caa.rs emit_tag() at line 586, the maximum tag length is checked against u8::MAX (255), but the function signature takes a &mut [u8] buffer of 255 bytes (u8::MAX). If tag.len() == 255, then len == 255 == u8::MAX, and 'if len > u8::MAX as usize' is false so no error is returned. But then 'Ok(len as u8)' would return 255, and writing 255 bytes to the encoder would be correct. However, the subsequent check 'if buf.len() < len' would fail at 255 == 255, so buf[0..255] is used. This is correct but the check 'if len > u8::MAX as usize' should use >= 256, not > 255. Since 255 IS a valid u8 and 256 is the first invalid one, the check should be 'len > 255' which is what '>u8::MAX as usize' evaluates to. This is actually correct but confusingly written.","fix":"Use 'len > u8::MAX as usize' (current code) or add a comment explaining that len == 255 is valid. Add a separate validation that the tag contains only alphanumeric ASCII characters, as the wire decoder enforces this but the encoder does not.","locations":[{"ref":"crates/proto/src/rr/rdata/caa.rs:586-605","code":"  586 | fn emit_tag(buf: &mut [u8], tag: &str) -> ProtoResult<u8> {\n  587 |     let len = tag.len();\n  588 |     if len > u8::MAX as usize {\n  589 |         return Err(format!(\"CAA property too long: {len}\").into());\n  590 |     }\n  591 |     if buf.len() < len {\n  592 |         return Err(format!(\n  593 |             \"insufficient capacity in CAA buffer: {} for tag: {}\",\n  594 |             buf.len(),\n  595 |             len\n  596 |         )\n  597 |         .into());\n  598 |     }\n  599 | \n  600 |     // copy into the buffer\n  601 |     let buf = &mut buf[0..len];\n  602 |     buf.copy_from_slice(tag.as_bytes());\n  603 | \n  604 |     Ok(len as u8)\n  605 | }"}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In opt.rs, the OPT PartialEq implementation at line 219-228 checks that every entry in self appears in other and that the counts match. However, this is O(n²) due to Vec::contains on a Vec<(EdnsCode, EdnsOption)>. More importantly, if self has duplicate entries but other does not (or vice versa), the count check handles it, but the logic is subtle and fragile. Consider: if self = [(A, x), (A, x)] and other = [(A, x)], then matching_elements_count = 2 (both elements of self find a match in other), but self.len() = 2 and other.len() = 1, so equality correctly returns false. The logic is technically correct but O(n²).","fix":"Sort both option lists before comparing, or use a BTreeMap. This would also make the Hash implementation consistent (which already sorts, but PartialEq does not, meaning two OPTs that hash equally may not compare equal if they have duplicates with different ordering of distinct duplicates).","locations":[{"ref":"crates/proto/src/rr/rdata/opt.rs:218-228","code":"  218 | impl PartialEq for OPT {\n  219 |     fn eq(&self, other: &Self) -> bool {\n  220 |         let matching_elements_count = self\n  221 |             .options\n  222 |             .iter()\n  223 |             .filter(|entry| other.options.contains(entry))\n  224 |             .count();\n  225 |         matching_elements_count == self.options.len()\n  226 |             && matching_elements_count == other.options.len()\n  227 |     }\n  228 | }"}]},{"id":"LOGIC_65","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In opt.rs, the Hash implementation (lines 233-238) sorts self.options before hashing, while PartialEq does an order-independent membership check. These are consistent for sets without duplicates, but for OPT records with multiple options sharing the same code (which is explicitly allowed), the sorted hash and the PartialEq logic can diverge. Two OPT records that are equal under PartialEq (same multiset of options) will produce the same sorted hash — this appears correct. But both operations are O(n log n) / O(n²) which is needlessly expensive for what is typically a small collection.","fix":"Document the invariant explicitly, or switch the internal representation to a sorted Vec or BTreeMap to make both Eq and Hash O(n log n) without extra allocations.","locations":[{"ref":"crates/proto/src/rr/rdata/opt.rs:232-238","code":"  232 | impl Hash for OPT {\n  233 |     fn hash<H: Hasher>(&self, state: &mut H) {\n  234 |         let mut sorted = self.options.clone();\n  235 |         sorted.sort();\n  236 |         sorted.hash(state);\n  237 |     }\n  238 | }"}]},{"id":"LOGIC_66","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In soa.rs, increment_serial() at line 226 increments the serial with '+= 1' and has a TODO comment asking 'what to do on overflow?'. A u32 serial wrapping from 0xFFFFFFFF to 0x00000000 is defined behavior per RFC 1982 (serial number arithmetic), but the wrapping_add semantics need to be explicit. In Rust debug builds, this will panic on overflow; in release builds it wraps silently. Both behaviors may be undesirable.","fix":"Replace 'self.serial += 1' with 'self.serial = self.serial.wrapping_add(1)' to ensure defined wrapping behavior in both debug and release builds, per RFC 1982 serial number arithmetic.","locations":[{"ref":"crates/proto/src/rr/rdata/soa.rs:226-228","code":"  226 |     pub fn increment_serial(&mut self) {\n  227 |         self.serial += 1; // TODO: what to do on overflow?\n  228 |     }"}]},{"id":"LOGIC_67","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In sshfp.rs, from_tokens() at line 140-141 uses .filter() to check tokens.next().is_none() to ensure no extra tokens remain. However, this filter consumes the first extra token but does not verify there are no more. If the input has more than one extra token, only the first is consumed and the error is triggered, which is the intended behavior. This is actually correct but the pattern is unusual — calling tokens.next() inside a filter side-effectfully is potentially confusing for code readers.","fix":"Clarify with a comment or refactor to an explicit 'if tokens.next().is_some() { return Err(...) }' pattern after constructing the SSHFP value.","locations":[{"ref":"crates/proto/src/rr/rdata/sshfp.rs:139-141","code":"  139 |         Some(Self::new(algorithm, fingerprint_type, fingerprint))\n  140 |             .filter(|_| tokens.next().is_none())\n  141 |             .ok_or(ParseError::Message(\"too many fields for SSHFP\"))"}]},{"id":"LOGIC_68","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In svcb.rs, the parse_no_default_alpn() function at line 339 rejects any value at all ('if value.is_some()'). However, per RFC 9460 section 7.1, in the presentation format 'no-default-alpn' can appear with an empty value (e.g., 'no-default-alpn=\"\"'), since the value is expected to be empty. The current check will reject 'no-default-alpn=\"\"' if the tokenizer passes an empty string rather than None for the value. Whether this is a practical issue depends on how the tokenizer handles empty-quoted strings.","fix":"Change the check to also accept value == Some(\"\") by using 'if value.is_some_and(|v| !v.is_empty())' to reject only non-empty values.","locations":[{"ref":"crates/proto/src/rr/rdata/svcb.rs:339-344","code":"  339 | fn parse_no_default_alpn(value: Option<&str>) -> Result<SvcParamValue, ParseError> {\n  340 |     if value.is_some() {\n  341 |         return Err(ParseError::Message(\"no value expected for NoDefaultAlpn\"));\n  342 |     }\n  343 | \n  344 |     Ok(SvcParamValue::NoDefaultAlpn)"}]},{"id":"LOGIC_69","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In svcb.rs, Unknown::fmt() at line 1375 appends a trailing comma unconditionally: 'write!(f, \"\\\"{}\\\",\", ...)'. Since Unknown is emitted as a single SvcParamValue (not a list), the trailing comma will always appear and produce malformed presentation output. This also differs from the no-trailing-comma issue in Mandatory/Alpn/IpHint which at least have lists.","fix":"Remove the trailing comma from Unknown::fmt(): change the format string from '\"{}\",\"' to '\"{}\"'.","locations":[{"ref":"crates/proto/src/rr/rdata/svcb.rs:1374-1379","code":" 1374 |     fn fmt(&self, f: &mut fmt::Formatter<'_>) -> Result<(), fmt::Error> {\n 1375 |         // TODO: this needs to be properly encoded\n 1376 |         write!(f, \"\\\"{}\\\",\", String::from_utf8_lossy(&self.0))?;\n 1377 | \n 1378 |         Ok(())\n 1379 |     }"}]},{"id":"LOGIC_70","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In tlsa.rs, from_tokens() at lines 418-428 rejects TLSA records where cert_data is empty (the hex-decoded data is empty). However, the wire format decoder (read_data) at lines 455-477 accepts empty cert_data (rdata_length of 3 results in cert_len of 0). This inconsistency means a TLSA record with empty cert_data can be decoded from wire format but cannot be created from text presentation. RFC 6698 does not explicitly forbid empty cert_data (matching type 0 = raw would be nonsensical but types 1/2 hashes have defined lengths), so the text parser is more restrictive than the wire decoder.","fix":"Either remove the 'if !cert_data.is_empty()' check in from_tokens() to accept empty cert_data, or add a corresponding minimum-length check in read_data() to reject TLSA records with empty cert_data, making both code paths consistent.","locations":[{"ref":"crates/proto/src/rr/rdata/tlsa.rs:418-428","code":"  418 |         if !cert_data.is_empty() {\n  419 |             Ok(Self {\n  420 |                 cert_usage,\n  421 |                 selector,\n  422 |                 matching,\n  423 |                 cert_data,\n  424 |             })\n  425 |         } else {\n  426 |             Err(ParseError::Message(\"TLSA data field missing\"))\n  427 |         }\n  428 |     }"},{"ref":"crates/proto/src/rr/rdata/tlsa.rs:455-477","code":"  455 |     fn read_data(\n  456 |         decoder: &mut BinDecoder<'_>,\n  457 |         rdata_length: Restrict<u16>,\n  458 |     ) -> Result<Self, DecodeError> {\n  459 |         let cert_usage = decoder.read_u8()?.unverified(/*CertUsage is verified*/).into();\n  460 |         let selector = decoder.read_u8()?.unverified(/*Selector is verified*/).into();\n  461 |         let matching = decoder.read_u8()?.unverified(/*Matching is verified*/).into();\n  462 | \n  463 |         // the remaining data is for the cert\n  464 |         let cert_len = rdata_length\n  465 |         .map(|u| u as usize)\n  466 |         .checked_sub(3)\n  467 |         .map_err(|len| DecodeError::IncorrectRDataLengthRead { read: 3, len })?\n  468 |         .unverified(/*used purely as length safely*/);\n  469 |         let cert_data = decoder.read_vec(cert_len)?.unverified(/*will fail in usage if invalid*/);\n  470 | \n  471 |         Ok(Self {\n  472 |             cert_usage,\n  473 |             selector,\n  474 |             matching,\n  475 |             cert_data,\n  476 |         })\n  477 |     }"}]},{"id":"LOGIC_71","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In tsig.rs, the TSIG Display implementation at line 463 outputs the TsigError as a u16 integer using 'error = self.error.map(Into::into).unwrap_or(0)'. This embeds the error as a plain integer in the display output, but there is no corresponding text parser for TSIG records (it has no from_tokens() method). The issue is that the Display output format is not documented and not round-trippable, yet the format string at line 457-466 uses specific field separators that could mislead users who attempt to use the output as valid zone file format. TSIG is a meta-RR and should not appear in zone files, but the Display output is still confusing.","fix":"Add a comment above the Display impl noting that this is for debugging purposes only and does not represent valid zone file format. Alternatively, implement a proper structured debug output using fmt::Debug derivation and label the Display impl clearly.","locations":[{"ref":"crates/proto/src/rr/rdata/tsig.rs:453-467","code":"  453 | impl fmt::Display for TSIG {\n  454 |     fn fmt(&self, f: &mut fmt::Formatter<'_>) -> Result<(), fmt::Error> {\n  455 |         write!(\n  456 |             f,\n  457 |             \"{algorithm} {time} {fudge} {mac} {oid} {error} {other}\",\n  458 |             algorithm = self.algorithm,\n  459 |             time = self.time,\n  460 |             fudge = self.fudge,\n  461 |             mac = sshfp::HEX.encode(&self.mac),\n  462 |             oid = self.oid,\n  463 |             error = self.error.map(Into::into).unwrap_or(0),\n  464 |             other = sshfp::HEX.encode(&self.other),\n  465 |         )\n  466 |     }\n  467 | }"}]},{"id":"LOGIC_72","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `RecordSet::insert`, the SOA update logic (lines 291-319) uses a plain integer comparison `new_soa.serial <= existing_soa.serial` to decide whether to reject the update, but SOA serial numbers follow RFC 1982 serial number arithmetic (wrapping comparison). A new serial that has wrapped around (e.g. existing=0xFFFFFFF0, new=0x00000010) would be incorrectly rejected even though it represents a newer zone version. The `SerialNumber` type with proper RFC 1982 `PartialOrd` is defined in the same crate but not used here.","fix":"Replace the raw integer comparison with `SerialNumber(new_soa.serial) <= SerialNumber(existing_soa.serial)` (using the `PartialOrd` impl on `SerialNumber` that implements RFC 1982 arithmetic), and handle the `None` case (undefined ordering when serials differ by exactly 2^31) appropriately.","locations":[{"ref":"crates/proto/src/rr/rr_set.rs:297-304","code":"  297 |                             if let RData::SOA(new_soa) = &record.data {\n  298 |                                 if new_soa.serial <= existing_soa.serial {\n  299 |                                     info!(\n  300 |                                         \"update ignored serial out of data: {:?} <= {:?}\",\n  301 |                                         new_soa, existing_soa\n  302 |                                     );\n  303 |                                     return false;\n  304 |                                 }"}]},{"id":"LOGIC_73","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `RrsetRecords::is_empty` (rr_set.rs line 487-489), the method only returns `true` for the `Empty` variant and `false` for all others. However, a `RecordsOnly` iterator wrapping an empty slice (which can occur if `records` becomes empty after construction) would return `false` from `is_empty` even though iterating it yields no elements. The comment acknowledges 'This is a best effort emptiness check', but callers may not notice this caveat.","fix":"Either document more prominently that this is approximate, or make `records_without_rrsigs` and `records_with_rrsigs` always return `RrsetRecords::Empty` when `self.records.is_empty()` (which `records_without_rrsigs` already does on line 182-186, so the issue is minimal in practice but worth noting for future code paths).","locations":[{"ref":"crates/proto/src/rr/rr_set.rs:485-490","code":"  485 | impl RrsetRecords<'_> {\n  486 |     /// This is a best effort emptiness check\n  487 |     pub fn is_empty(&self) -> bool {\n  488 |         matches!(*self, RrsetRecords::Empty)\n  489 |     }\n  490 | }"}]},{"id":"LOGIC_74","type":"logic_error","type_label":"Logic Error","severity":"low","description":"The `Lexer::next_token` method in `zone_lex.rs` has a bounds check assertion inside a loop:\n`assert!(i < 4095)` at line 41, inside a `for i in 0..4_096` loop. The loop condition\n`i in 0..4_096` already guarantees that `i` never equals or exceeds 4095 because the loop runs\nfor values 0..=4094 (exclusive upper bound 4096 means the last value is 4095). Wait — 0..4_096\niterates 0,1,...,4095, so `i` CAN be 4095, and the assert `assert!(i < 4095)` fires when i==4095\nif the loop reaches that iteration. This means any token that requires 4096 iterations to lex\n(extremely long but valid data) will panic rather than return an error. The intent is clearly to\nmake the loop finite but the off-by-one means it panics one iteration early.","fix":"Either increase the limit and keep the assert consistent:\n  `for i in 0..8_192 { assert!(i < 8_191); ... }`\nOr remove the assert entirely since the `for` loop bound already provides termination:\n  `for _ in 0..4_096 { ... }`\nOr convert to a `loop` with an explicit counter and return a `LexerError::TokenTooLong` on overflow.\nThe current combination of `0..4_096` with `assert!(i < 4095)` will panic on iteration 4095 (the last\niteration) for any token that legitimately takes exactly 4096 loop cycles.","locations":[{"ref":"crates/proto/src/serialize/txt/zone_lex.rs:39-41","code":"   39 |         for i in 0..4_096 {\n   40 |             // max chars in a single lex, helps with issues in the lexer...\n   41 |             assert!(i < 4095); // keeps the bounds of the loop defined (nothing lasts forever)"}]},{"id":"LOGIC_75","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `cache.rs`, `ResponseCache::insert()` silently discards all `Err` variants that are NOT\n`NetError::Dns(DnsError::NoRecordsFound(...))` (line 69: `Err(_) => return`). This means\ntransient errors like `NetError::Timeout`, `NetError::Io`, and others are never cached. For a\nrecursor or forwarder under heavy load or attack, repeated queries for unreachable domains will\nalways miss the cache and always trigger new upstream queries, potentially amplifying load.\nNegative caching of transient errors (with a short TTL) would reduce repeated upstream traffic.","fix":"Consider caching certain transient errors (e.g., timeouts) with a short TTL (e.g.,\n1-5 seconds) to provide a brief negative cache that prevents thundering herds on failing\nupstream queries. This is a policy decision, but the current unconditional discard is\nsuboptimal for high-traffic deployments.","locations":[{"ref":"crates/resolver/src/cache.rs:69","code":"   69 |             Err(_) => return,"}]},{"id":"LOGIC_76","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `cache.rs`, `ResponseCache::get()` calls `entry.is_current(now)` at line 85 and returns\n`None` if the entry is stale. However, the `moka` cache's `EntryExpiry` implementation also\nexpires entries independently. Between the moka expiry check and the manual `is_current` check\nthere is a TOCTOU window: `cache.get(&query)` may return `Some(entry)` from moka, then\n`entry.is_current(now)` finds the entry expired (because `valid_until` was computed from\n`now + ttl` at insert time, but moka might use a slightly different internal clock). This\ncauses the entry to exist in the moka cache but be manually rejected, wasting memory and\npotentially causing spurious cache misses on entries that moka has not yet evicted. The dual\nexpiry mechanism is redundant and the manual check shadows moka's own eviction.","fix":"Remove the manual `entry.is_current(now)` check and rely solely on moka's `EntryExpiry` to\nexpire entries, or remove the moka expiry configuration and rely solely on the manual check.\nHaving two independent expiry mechanisms is redundant and can cause confusion.","locations":[{"ref":"crates/resolver/src/cache.rs:83-89","code":"   83 |     pub fn get(&self, query: &Query, now: Instant) -> Option<Result<Message, NetError>> {\n   84 |         let entry = self.cache.get(query)?;\n   85 |         if !entry.is_current(now) {\n   86 |             return None;\n   87 |         }\n   88 |         Some(entry.updated_ttl(now))\n   89 |     }"},{"ref":"crates/resolver/src/cache.rs:264-283","code":"  264 | impl Expiry<Query, Entry> for EntryExpiry {\n  265 |     fn expire_after_create(\n  266 |         &self,\n  267 |         _key: &Query,\n  268 |         value: &Entry,\n  269 |         created_at: Instant,\n  270 |     ) -> Option<Duration> {\n  271 |         Some(value.ttl(created_at))\n  272 |     }\n  273 | \n  274 |     fn expire_after_update(\n  275 |         &self,\n  276 |         _key: &Query,\n  277 |         value: &Entry,\n  278 |         updated_at: Instant,\n  279 |         _duration_until_expiry: Option<Duration>,\n  280 |     ) -> Option<Duration> {\n  281 |         Some(value.ttl(updated_at))\n  282 |     }\n  283 | }"}]},{"id":"LOGIC_77","type":"logic_error","type_label":"Logic Error","severity":"low","description":"compute_srtt_factor (name_server.rs line 691) clamps the elapsed time to a\nminimum of 1.0 second with `.max(1.0)`. This means that if two RTT observations\nare recorded within sub-second intervals (common for fast local resolvers),\nthe EWMA factor is computed as if 1 full second had elapsed rather than the\nactual elapsed time. For sub-millisecond or sub-second query intervals this\nproduces a systematically wrong (too aggressive decay) weighting — recent fast\nobservations are discounted more than they should be, causing slower servers\nto be ranked higher than they deserve during rapid-fire query bursts.","fix":"Remove the `.max(1.0)` clamp or reduce it to a smaller value (e.g. 0.001 to\nprevent division by near-zero). If the goal is to avoid rapid oscillation,\ndocument the reason and consider using a different stabilisation mechanism such\nas a minimum weight parameter rather than clamping the time measurement.","locations":[{"ref":"crates/resolver/src/name_server.rs:690-693","code":"  690 | fn compute_srtt_factor(last_update: Instant, weight: u32) -> f64 {\n  691 |     let exponent = (-last_update.elapsed().as_secs_f64().max(1.0)) / f64::from(weight);\n  692 |     exponent.exp()\n  693 | }"}]},{"id":"LOGIC_78","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In PoolState::try_send the RoundRobin strategy computes the rotation index as:\n\n    let index = self.next.fetch_add(num_concurrent_reqs, SeqCst) % servers.len();\n\n`self.next` is an AtomicUsize that grows without bound. After ~usize::MAX/2\nqueries the modulo arithmetic still works, but after exactly usize::MAX queries\nthe counter wraps to 0 — this is harmless by itself. However, `num_concurrent_reqs`\nis added each time, not 1. If `num_concurrent_reqs` and `servers.len()` share\na common factor greater than 1, only a subset of servers are ever selected —\nthe other servers are permanently starved. For example, with 4 servers and\nnum_concurrent_reqs=2, only servers at indices 0,1 are ever chosen; indices 2,3\nnever receive queries.","fix":"Increment `next` by 1 rather than by `num_concurrent_reqs`, or use a rotation\nof `(index + i) % servers.len()` for each of the `num_concurrent_reqs` parallel\nslots, so that successive batches cover all servers evenly.","locations":[{"ref":"crates/resolver/src/name_server_pool.rs:263-276","code":"  263 |             ServerOrderingStrategy::RoundRobin => {\n  264 |                 let num_concurrent_reqs = if self.cx.options.num_concurrent_reqs > 1 {\n  265 |                     self.cx.options.num_concurrent_reqs\n  266 |                 } else {\n  267 |                     1\n  268 |                 };\n  269 |                 if num_concurrent_reqs < servers.len() {\n  270 |                     let index = self\n  271 |                         .next\n  272 |                         .fetch_add(num_concurrent_reqs, AtomicOrdering::SeqCst)\n  273 |                         % servers.len();\n  274 |                     servers.rotate_left(index);\n  275 |                 }\n  276 |             }"}]},{"id":"LOGIC_79","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In PoolState::try_send, `policy.disable_udp` is set to `true` when a\nQueryCaseMismatch error is received (line 387) and also when a truncated\nresponse arrives (line 363). The policy variable is local to try_send, so it\ncorrectly applies only to this particular request. However, the condition on\nline 317 (`!busy.is_empty() && backoff < Duration::from_millis(300)`) that\nre-queues busy servers uses `policy.allows_server()` to filter — which means if\nUDP was disabled due to spoofing/truncation and the only busy server supports\nonly UDP, it will be silently dropped from the retry queue (line 326) without\nupdating `err` to reflect why. The caller will then receive whatever `err` was\nset to before the busy server was added, which may be an unrelated error or the\ninitial `NetError::NoConnections`.","fix":"When filtering busy servers at line 326, if a server is excluded by policy\n(because it only supports UDP and UDP is disabled), update `err` to reflect\nthe filtering reason, or return a more descriptive error such as\n`NetError::NoConnections` with a message indicating that remaining servers\nwere excluded by protocol policy.","locations":[{"ref":"crates/resolver/src/name_server_pool.rs:316-330","code":"  316 |             if par_servers.is_empty() {\n  317 |                 if !busy.is_empty() && backoff < Duration::from_millis(300) {\n  318 |                     // Cap the backoff sleep so we don't sleep past the deadline.\n  319 |                     let remaining = deadline.saturating_duration_since(Instant::now());\n  320 |                     if remaining.is_zero() {\n  321 |                         return Err(NetError::Timeout);\n  322 |                     }\n  323 |                     <<P as ConnectionProvider>::RuntimeProvider as RuntimeProvider>::Timer::delay_for(\n  324 |                         backoff.min(remaining),\n  325 |                     ).await;\n  326 |                     servers.extend(busy.drain(..).filter(|ns| policy.allows_server(ns)));\n  327 |                     backoff *= 2;\n  328 |                     continue;\n  329 |                 }\n  330 |                 return Err(err);"}]},{"id":"LOGIC_80","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In NameServerPool::send the `active_requests` deduplication map uses a CacheKey\nthat includes the full `queries` Vec. For case-randomization enabled resolvers,\neach outgoing DnsRequest has its query name randomly capitalised before being\nhanded to the pool. Two concurrent lookups for `www.Example.com.` vs\n`Www.example.COM.` will generate different CacheKeys and therefore bypass\ndeduplication entirely, each creating its own network round-trip. The\ndeduplication that was intended to coalesce identical in-flight queries silently\ndoes nothing under case-randomization.","fix":"Build the CacheKey from the ORIGINAL (case-normalised / lowercased) query name,\nnot the randomised one. Case-randomization should be applied per-wire-request\nafter the deduplication key is computed.","locations":[{"ref":"crates/resolver/src/name_server_pool.rs:921-954","code":"  921 | #[derive(PartialEq, Eq, Hash)]\n  922 | struct CacheKey {\n  923 |     op_code: OpCode,\n  924 |     recursion_desired: bool,\n  925 |     checking_disabled: bool,\n  926 |     queries: Vec<Query>,\n  927 |     dnssec_ok: bool,\n  928 |     client_subnet: Option<ClientSubnet>,\n  929 | }\n  930 | \n  931 | impl CacheKey {\n  932 |     fn from_request(request: &DnsRequest) -> Self {\n  933 |         let dnssec_ok;\n  934 |         let client_subnet;\n  935 |         if let Some(edns) = &request.edns {\n  936 |             dnssec_ok = edns.flags().dnssec_ok;\n  937 |             if let Some(EdnsOption::Subnet(subnet)) = edns.option(EdnsCode::Subnet) {\n  938 |                 client_subnet = Some(*subnet);\n  939 |             } else {\n  940 |                 client_subnet = None;\n  941 |             }\n  942 |         } else {\n  943 |             dnssec_ok = false;\n  944 |             client_subnet = None;\n  945 |         }\n  946 |         Self {\n  947 |             op_code: request.op_code,\n  948 |             recursion_desired: request.recursion_desired,\n  949 |             checking_disabled: request.checking_disabled,\n  950 |             queries: request.queries.clone(),\n  951 |             dnssec_ok,\n  952 |             client_subnet,\n  953 |         }\n  954 |     }"},{"ref":"crates/resolver/src/name_server_pool.rs:162-163","code":"  162 |             let key = Arc::new(CacheKey::from_request(&request));\n  163 | "}]},{"id":"LOGIC_81","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `system_conf/unix.rs`, `parse_resolv_conf()` fails with an error if the nameservers list is\nempty (line 61: `Err(io::Error::other(\"no nameservers found in config\"))?`). However this\nreturns the opaque message \"no nameservers found in config\" wrapped inside a `NetError`, with\nno indication of which file was being parsed. Combined with the fact that `read_resolv_conf`\ndoes not pass the path through to `parse_resolv_conf`, callers that catch this error cannot\neasily diagnose which configuration file caused the issue.","fix":"Either include the file path in the error message, or use a structured error type that carries\nthe source path. Minor quality-of-life improvement for operators diagnosing DNS resolver\nmisconfiguration.","locations":[{"ref":"crates/resolver/src/system_conf/unix.rs:60-62","code":"   60 |     if nameservers.is_empty() {\n   61 |         Err(io::Error::other(\"no nameservers found in config\"))?;\n   62 |     }"}]},{"id":"LOGIC_82","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `catalog.rs` `update()`, the handler loop is annotated with `#[allow(clippy::never_loop)]`\nand always breaks after the first iteration (lines 302-369). If multiple handlers are registered\nfor a zone and the first handler is a `ZoneType::Secondary` (returns `NotImp`) or a non-Primary\ntype (returns `NotAuth`), the update response goes back to the client and all remaining handlers\nare silently ignored. If the intent is to allow chained update handlers (e.g., primary at index\n1 after a secondary at index 0), the current logic never reaches the primary.","fix":"Either remove the never-loop pattern and iterate properly through all handlers until one accepts\nthe update, or document explicitly that only the first registered handler for a zone will ever\nhandle DNS updates.","locations":[{"ref":"crates/server/src/zone_handler/catalog.rs:302-369","code":"  302 |             #[allow(clippy::never_loop)]\n  303 |             for handler in handlers {\n  304 |                 #[cfg_attr(not(feature = \"__dnssec\"), expect(unused))]\n  305 |                 let (response_code, signer) = match handler.zone_type() {\n  306 |                     ZoneType::Secondary => {\n  307 |                         error!(\"secondary forwarding for update not yet implemented\");\n  308 |                         (ResponseCode::NotImp, None)\n  309 |                     }\n  310 |                     ZoneType::Primary => {\n  311 |                         let (update_result, signer) = handler.update(update, now).await;\n  312 |                         match update_result {\n  313 |                             // successful update\n  314 |                             Ok(_) => (ResponseCode::NoError, signer),\n  315 |                             Err(response_code) => (response_code, signer),\n  316 |                         }\n  317 |                     }\n  318 |                     _ => (ResponseCode::NotAuth, None),\n  319 |                 };\n  320 | \n  321 |                 let response = MessageResponseBuilder::new(&update.queries, response_edns);\n  322 |                 let mut response_meta =\n  323 |                     Metadata::new(update.metadata.id, MessageType::Response, OpCode::Update);\n  324 |                 response_meta.response_code = response_code;\n  325 |                 #[cfg_attr(not(feature = \"__dnssec\"), expect(unused_mut))]\n  326 |                 let mut response = response.build_no_records(response_meta);\n  327 | \n  328 |                 #[cfg(feature = \"__dnssec\")]\n  329 |                 if let Some(signer) = signer {\n  330 |                     let mut tbs_response_buf = Vec::with_capacity(512);\n  331 |                     let mut encoder = BinEncoder::new(&mut tbs_response_buf);\n  332 |                     let mut
