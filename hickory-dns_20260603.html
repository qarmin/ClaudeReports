e})?;\n  372 | \n  373 |         Ok(())\n  374 |     }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`ResponseCode::high()` incorrectly extracts bits 11-4 (mask 0x0FF0 >> 4) of the 12-bit extended\nresponse code, but the EDNS OPT TTL encodes the upper 8 bits as bits 11-4 of the full 12-bit code.\nRFC 6891 §6.1.3 says the TTL field of the OPT record encodes the upper 8 bits of the RCODE in the\nmost-significant byte. The correct mask to extract those 8 bits from the u16 representation (where\nthe full 12-bit code is stored) should be `(value >> 4) & 0xFF`, i.e. mask `0x0FF0` is correct but\nthe bit of concern is that this extracts bits [11:4] of a 12-bit number which IS correct.\n\nHowever, in `ResponseCode::from(high: u8, low: u8)` the combination is\n`(high << 4) | (low & 0xF)` — this means `high` is stored in bits [11:4] and `low` in bits [3:0],\ni.e. a 12-bit number. When converting back via `ResponseCode::high()`, the same 0x0FF0 mask with\n>> 4 recovers the original 8-bit `high`. So the round-trip is consistent.\n\nBUT the `From<u16>` conversion maps numeric value 16 to `ResponseCode::BADSIG` (not `BADVERS`),\nand `ResponseCode::BADVERS | ResponseCode::BADSIG => 16` in `From<ResponseCode> for u16` means\nboth BADVERS and BADSIG serialize to value 16. This means that if a peer sends BADVERS (code 16),\nthis library decodes it as BADSIG, and re-encoding BADVERS also produces BADSIG on the wire. The\ntwo error codes are indistinguishable at the wire level from the perspective of this library.","fix":"RFC 6891 §9 and RFC 2845 both define numeric value 16 as BADVERS and BADSIG respectively. Since\nBADVERS is in the EDNS extended space, it only appears when the high 8 bits are non-zero (value >=\n16 in the extended 12-bit code). BADSIG is a TSIG error and appears with numeric value 16 in the\nbasic 12-bit space. The two share the same wire value. The current implementation conflates them.\nDocument this explicitly. If the distinction matters, add context-sensitive decoding (e.g. a flag\nindicating whether EDNS is present). At minimum, update comments and ensure `to_str()` returns the\nsame description for both, rather than different strings.","locations":[{"ref":"crates/proto/src/op/response_code.rs:206-236","code":"  206 | impl From<ResponseCode> for u16 {\n  207 |     fn from(rt: ResponseCode) -> Self {\n  208 |         match rt {\n  209 |             ResponseCode::NoError => 0, // 0   NoError    No Error                              [RFC1035]\n  210 |             ResponseCode::FormErr => 1, // 1   FormErr    Format Error                          [RFC1035]\n  211 |             ResponseCode::ServFail => 2, // 2   ServFail   Server Failure                        [RFC1035]\n  212 |             ResponseCode::NXDomain => 3, // 3   NXDomain   Non-Existent Domain                   [RFC1035]\n  213 |             ResponseCode::NotImp => 4, // 4   NotImp     Not Implemented                       [RFC1035]\n  214 |             ResponseCode::Refused => 5, // 5   Refused    Query Refused                         [RFC1035]\n  215 |             ResponseCode::YXDomain => 6, // 6   YXDomain   Name Exists when it should not        [RFC2136][RFC6672]\n  216 |             ResponseCode::YXRRSet => 7, // 7   YXRRSet    RR Set Exists when it should not      [RFC2136]\n  217 |             ResponseCode::NXRRSet => 8, // 8   NXRRSet    RR Set that should exist does not     [RFC2136]\n  218 |             ResponseCode::NotAuth => 9, // 9   NotAuth    Server Not Authoritative for zone     [RFC2136]\n  219 |             ResponseCode::NotZone => 10, // 10  NotZone    Name not contained in zone            [RFC2136]\n  220 |             //\n  221 |             // 11-15    Unassigned\n  222 |             //\n  223 |             // 16  BADVERS  Bad OPT Version         [RFC6891]\n  224 |             // 16  BADSIG   TSIG Signature Failure  [RFC2845]\n  225 |             ResponseCode::BADVERS | ResponseCode::BADSIG => 16,\n  226 |             ResponseCode::BADKEY => 17, // 17  BADKEY    Key not recognized                     [RFC2845]\n  227 |             ResponseCode::BADTIME => 18, // 18  BADTIME   Signature out of time window           [RFC2845]\n  228 |             ResponseCode::BADMODE => 19, // 19  BADMODE   Bad TKEY Mode                          [RFC2930]\n  229 |             ResponseCode::BADNAME => 20, // 20  BADNAME   Duplicate key name                     [RFC2930]\n  230 |             ResponseCode::BADALG => 21, // 21  BADALG    Algorithm not supported                [RFC2930]\n  231 |             ResponseCode::BADTRUNC => 22, // 22  BADTRUNC  Bad Truncation                         [RFC4635]\n  232 |             ResponseCode::BADCOOKIE => 23, // 23  BADCOOKIE Bad/missing Server Cookie              [RFC7873]\n  233 |             ResponseCode::Unknown(code) => code,\n  234 |         }\n  235 |     }\n  236 | }"},{"ref":"crates/proto/src/op/response_code.rs:249-277","code":"  249 | impl From<u16> for ResponseCode {\n  250 |     fn from(value: u16) -> Self {\n  251 |         match value {\n  252 |             0 => Self::NoError, // 0    NoError    No Error                             [RFC1035]\n  253 |             1 => Self::FormErr, // 1    FormErr    Format Error                         [RFC1035]\n  254 |             2 => Self::ServFail, // 2    ServFail   Server Failure                       [RFC1035]\n  255 |             3 => Self::NXDomain, // 3    NXDomain   Non-Existent Domain                  [RFC1035]\n  256 |             4 => Self::NotImp,  // 4    NotImp     Not Implemented                      [RFC1035]\n  257 |             5 => Self::Refused, // 5    Refused    Query Refused                        [RFC1035]\n  258 |             6 => Self::YXDomain, // 6    YXDomain   Name Exists when it should not       [RFC2136][RFC6672]\n  259 |             7 => Self::YXRRSet,  // 7    YXRRSet    RR Set Exists when it should not     [RFC2136]\n  260 |             8 => Self::NXRRSet,  // 8    NXRRSet    RR Set that should exist does not    [RFC2136]\n  261 |             9 => Self::NotAuth,  // 9    NotAuth    Server Not Authoritative for zone    [RFC2136]\n  262 |             10 => Self::NotZone, // 10   NotZone    Name not contained in zone           [RFC2136]\n  263 |             // this looks to be backwards compat for 4 bit ResponseCodes.\n  264 |             // 16    BADVERS    Bad OPT Version    [RFC6891]\n  265 |             // 16 => ResponseCode::BADVERS,\n  266 |             16 => Self::BADSIG, // 16    BADSIG    TSIG Signature Failure               [RFC2845]\n  267 |             17 => Self::BADKEY, // 17    BADKEY    Key not recognized                   [RFC2845]\n  268 |             18 => Self::BADTIME, // 18    BADTIME   Signature out of time window         [RFC2845]\n  269 |             19 => Self::BADMODE, // 19    BADMODE   Bad TKEY Mode                        [RFC2930]\n  270 |             20 => Self::BADNAME, // 20    BADNAME   Duplicate key name                   [RFC2930]\n  271 |             21 => Self::BADALG, // 21    BADALG    Algorithm not supported              [RFC2930]\n  272 |             22 => Self::BADTRUNC, // 22    BADTRUNC  Bad Truncation                       [RFC4635]\n  273 |             23 => Self::BADCOOKIE, // 23    BADCOOKIE Bad/missing Server Cookie            [RFC7873]\n  274 |             code => Self::Unknown(code),\n  275 |         }\n  276 |     }\n  277 | }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In CachingClient::handle_noerror, when following a CNAME chain across multiple\nhops (Records::CnameChain path), the inner_lookup is called recursively with\n`preserved_records`. However in non-test builds (cfg(not(test))) the\n`preserved_records` Vec is moved into the recursive call (line 474), while in\ntest builds it is `.clone()`d (line 472). The asymmetry means the CnameChain\nvariant exposes `preserved_records` only in test builds. More critically,\nthe CNAME chain resolution is purely recursive (up to MAX_QUERY_DEPTH=8 levels),\nand the `inner_lookup` future is recursively boxed. With a depth of 8 each hop\nallocates a new boxed future, new Vec<Record>, and clones the CachingClient —\ncausing O(depth) heap allocations per CNAME hop. For a legitimate 8-hop CNAME\nchain this creates 8 nested Box<dyn Future>, 8 CachingClient clones, and 8\nVec<Record> copies, with each level holding the allocations of all inner levels\nalive simultaneously.","fix":"Convert the recursive CNAME resolution into an iterative loop (e.g. a `loop`\nblock that updates `query` and `preserved_records` in place) to avoid the\nO(depth) nested allocations. The depth counter can remain to enforce the limit.\nThis also removes the cfg(test)/cfg(not(test)) asymmetry in preserved_records\nhandling.","locations":[{"ref":"crates/resolver/src/caching_client.rs:463-489","code":"  463 |         // It was a CNAME, but not included in the request...\n  464 |         if was_cname && !depth.is_exhausted() {\n  465 |             let next_query = Query::new(search_name, query.query_type);\n  466 |             Ok(Records::CnameChain {\n  467 |                 next: Box::pin(Self::inner_lookup(\n  468 |                     next_query,\n  469 |                     options,\n  470 |                     client.clone(),\n  471 |                     #[cfg(test)]\n  472 |                     preserved_records.clone(),\n  473 |                     #[cfg(not(test))]\n  474 |                     preserved_records,\n  475 |                     depth.nest(),\n  476 |                 )),\n  477 |                 #[cfg(test)]\n  478 |                 preserved_records,\n  479 |             })\n  480 |         } else {\n  481 |             // TODO: review See https://tools.ietf.org/html/rfc2308 for NoData section\n  482 |             // Note on DNSSEC, in secure_client_handle, if verify_nsec fails then the request fails.\n  483 |             //   this will mean that no unverified negative caches will make it to this point and be stored\n  484 |             let mut new = NoRecords::new(query.clone(), response_code);\n  485 |             new.soa = soa.map(Box::new);\n  486 |             new.negative_ttl = negative_ttl;\n  487 |             Err(new.into())\n  488 |         }\n  489 |     }"},{"ref":"crates/resolver/src/caching_client.rs:44-61","code":"   44 | #[derive(Default, Clone, Copy)]\n   45 | struct DepthTracker {\n   46 |     query_depth: u8,\n   47 | }\n   48 | \n   49 | impl DepthTracker {\n   50 |     fn nest(self) -> Self {\n   51 |         Self {\n   52 |             query_depth: self.query_depth + 1,\n   53 |         }\n   54 |     }\n   55 | \n   56 |     fn is_exhausted(self) -> bool {\n   57 |         self.query_depth + 1 >= Self::MAX_QUERY_DEPTH\n   58 |     }\n   59 | \n   60 |     const MAX_QUERY_DEPTH: u8 = 8; // arbitrarily chosen number...\n   61 | }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In `SqliteZoneHandler::update_records()`, when `auto_signing_and_increment` is true and records\nwere updated, the function persists the update records to the journal WAL *before* applying them\nto the in-memory store (line 731 writes to the journal before lines 776-898 mutate in-memory\nstate). If the in-memory update subsequently fails (e.g., `ResponseCode::FormErr` returned at\nline 895), the journal already has the write-ahead record but the update was never applied\nin-memory. On recovery the record would be replayed, potentially creating a divergence between\nwhat the operator intended and what ends up in the zone. The WAL should be written only after\nconfirming the in-memory operation is valid (or use the pre-scan validation more strictly before\nany journal write).","fix":"Move `journal.insert_records(serial, records)` to after the in-memory update succeeds, or\nensure `pre_scan()` has already been called (and verified) before the write-ahead log entry is\nwritten. The current call order allows partially-invalid batches to taint the journal.","locations":[{"ref":"crates/server/src/store/sqlite/mod.rs:729-736","code":"  729 |         //  subsequent to a failure of the server.\n  730 |         if let Some(journal) = &*self.journal.lock().await {\n  731 |             if let Err(error) = journal.insert_records(serial, records) {\n  732 |                 error!(\"could not persist update records: {error}\");\n  733 |                 return Err(ResponseCode::ServFail);\n  734 |             }\n  735 |         }\n  736 | "},{"ref":"crates/server/src/store/sqlite/mod.rs:776-898","code":"  776 |         for rr in records {\n  777 |             let rr_name = LowerName::from(&rr.name);\n  778 |             let rr_key = RrKey::new(rr_name.clone(), rr.record_type());\n  779 | \n  780 |             match rr.dns_class {\n  781 |                 class if class == self.in_memory.class() => {\n  782 |                     // RFC 2136 - 3.4.2.2. Any Update RR whose CLASS is the same as ZCLASS is added to\n  783 |                     //  the zone.  In case of duplicate RDATAs (which for SOA RRs is always\n  784 |                     //  the case, and for WKS RRs is the case if the ADDRESS and PROTOCOL\n  785 |                     //  fields both match), the Zone RR is replaced by Update RR.  If the\n  786 |                     //  TYPE is SOA and there is no Zone SOA RR, or the new SOA.SERIAL is\n  787 |                     //  lower (according to [RFC1982]) than or equal to the current Zone SOA\n  788 |                     //  RR's SOA.SERIAL, the Update RR is ignored.  In the case of a CNAME\n  789 |                     //  Update RR and a non-CNAME Zone RRset or vice versa, ignore the CNAME\n  790 |                     //  Update RR, otherwise replace the CNAME Zone RR with the CNAME Update\n  791 |                     //  RR.\n  792 | \n  793 |                     // zone     rrset    rr       Add to an RRset\n  794 |                     info!(\"upserting record: {rr:?}\");\n  795 |                     let upserted = self.in_memory.upsert(rr.clone(), serial).await;\n  796 | \n  797 |                     #[cfg(all(feature = \"metrics\", feature = \"__dnssec\"))]\n  798 |                     if auto_signing_and_increment {\n  799 |                         if upserted {\n  800 |                             self.metrics.added();\n  801 |                         } else {\n  802 |                             self.metrics.updated();\n  803 |                         }\n  804 |                     }\n  805 | \n  806 |                     updated = upserted || updated\n  807 |                 }\n  808 |                 DNSClass::ANY => {\n  809 |                     // This is a delete of entire RRSETs, either many or one. In either case, the spec is clear:\n  810 |                     match rr.record_type() {\n  811 |                         t @ RecordType::SOA | t @ RecordType::NS if rr_name == *self.origin() => {\n  812 |                             // SOA and NS records are not to be deleted if they are the origin records\n  813 |                             info!(\"skipping delete of {t:?} see RFC 2136 - 3.4.2.3\");\n  814 |                             continue;\n  815 |                         }\n  816 |                         RecordType::ANY => {\n  817 |                             // RFC 2136 - 3.4.2.3. For any Update RR whose CLASS is ANY and whose TYPE is ANY,\n  818 |                             //   all Zone RRs with the same NAME are deleted, unless the NAME is the\n  819 |                             //   same as ZNAME in which case only those RRs whose TYPE is other than\n  820 |                             //   SOA or NS are deleted.\n  821 | \n  822 |                             // ANY      ANY      empty    Delete all RRsets from a name\n  823 |                             info!(\n  824 |                                 \"deleting all records at name (not SOA or NS at origin): {rr_name:?}\"\n  825 |                             );\n  826 |                             let origin = self.origin();\n  827 | \n  828 |                             let mut records = self.in_memory.records_mut().await;\n  829 |                             let old_size = records.len();\n  830 |                             records.retain(|k, _| {\n  831 |                                 k.name != rr_name\n  832 |                                     || ((k.record_type == RecordType::SOA\n  833 |                                         || k.record_type == RecordType::NS)\n  834 |                                         && k.name != *origin)\n  835 |                             });\n  836 |                             let new_size = records.len();\n  837 |                             drop(records);\n  838 | \n  839 |                             if new_size < old_size {\n  840 |                                 updated = true;\n  841 |                             }\n  842 | \n  843 |                             #[cfg(all(feature = \"metrics\", feature = \"__dnssec\"))]\n  844 |                             for _ in 0..old_size - new_size {\n  845 |                                 if auto_signing_and_increment {\n  846 |                                     self.metrics.deleted()\n  847 |                                 }\n  848 |                             }\n  849 |                         }\n  850 |                         _ => {\n  851 |                             // RFC 2136 - 3.4.2.3. For any Update RR whose CLASS is ANY and\n  852 |                             //   whose TYPE is not ANY all Zone RRs with the same NAME and TYPE are\n  853 |                             //   deleted, unless the NAME is the same as ZNAME in which case neither\n  854 |                             //   SOA or NS RRs will be deleted.\n  855 | \n  856 |                             // ANY      rrset    empty    Delete an RRset\n  857 |                             if let RData::Update0(_) | RData::NULL(..) = rr.data {\n  858 |                                 let deleted = self.in_memory.records_mut().await.remove(&rr_key);\n  859 |                                 info!(\"deleted rrset: {deleted:?}\");\n  860 |                                 updated = updated || deleted.is_some();\n  861 | \n  862 |                                 #[cfg(all(feature = \"metrics\", feature = \"__dnssec\"))]\n  863 |                                 if auto_signing_and_increment {\n  864 |                                     self.metrics.deleted()\n  865 |                                 }\n  866 |                             } else {\n  867 |                                 info!(\"expected empty rdata: {rr:?}\");\n  868 |                                 return Err(ResponseCode::FormErr);\n  869 |                             }\n  870 |                         }\n  871 |                     }\n  872 |                 }\n  873 |                 DNSClass::NONE => {\n  874 |                     info!(\"deleting specific record: {rr:?}\");\n  875 |                     // NONE     rrset    rr       Delete an RR from an RRset\n  876 |                     if let Some(rrset) = self.in_memory.records_mut().await.get_mut(&rr_key) {\n  877 |                         // b/c this is an Arc, we need to clone, then remove, and replace the node.\n  878 |                         let mut rrset_clone: RecordSet = RecordSet::clone(&*rrset);\n  879 |                         let deleted = rrset_clone.remove(rr, serial);\n  880 |                         info!(\"deleted ({deleted}) specific record: {rr:?}\");\n  881 |                         updated = updated || deleted;\n  882 | \n  883 |                         if deleted {\n  884 |                             *rrset = Arc::new(rrset_clone);\n  885 |                         }\n  886 | \n  887 |                         #[cfg(all(feature = \"metrics\", feature = \"__dnssec\"))]\n  888 |                         if auto_signing_and_increment {\n  889 |                             self.metrics.deleted()\n  890 |                         }\n  891 |                     }\n  892 |                 }\n  893 |                 class => {\n  894 |                     info!(\"unexpected DNS Class: {:?}\", class);\n  895 |                     return Err(ResponseCode::FormErr);\n  896 |                 }\n  897 |             }\n  898 |         }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"fetch_ds_records() includes Bogus-proof DS records in the supported_records list.\n\nThe filter logic at lines 785-794 is intended to exclude DS records with unsupported algorithms\nwhile keeping those with supported ones. The comment at line 783 says \"we should not trust BOGUS\nor other records.\" However, records with:\n  - Unsupported algorithm AND Bogus/Indeterminate proof  (do NOT match the skip condition)\n\nfall through to line 792 (all_unknown = Some(false)) and line 794 (pushed to supported_records).\n\nThe skip condition requires BOTH unsupported algorithm AND (secure OR insecure proof). A DS\nrecord with an unsupported algorithm that happens to have a Bogus proof escapes the filter and\nenters the supported_records list.\n\nWhile verify_dnskey() re-checks ds.proof.is_secure() at line 1197 and thus won't use these\nBogus records for actual validation, the incorrect filtering adds unnecessary processing overhead\nand could lead to subtle bugs if the filter logic is later changed.","fix":"Filter out records with non-secure proofs explicitly, independent of algorithm support:\n\n  for record in all_records {\n      if !record.proof.is_secure() && !record.proof.is_insecure() {\n          // Skip Bogus and Indeterminate records regardless of algorithm\n          continue;\n      }\n      if !record.data.algorithm().is_supported() || !record.data.digest_type().is_supported() {\n          all_unknown.get_or_insert(true);\n          continue;\n      }\n      all_unknown = Some(false);\n      supported_records.push(record);\n  }","locations":[{"ref":"crates/net/src/dnssec/mod.rs:782-794","code":"  782 |                 for record in all_records {\n  783 |                     // A chain can be either SECURE or INSECURE, but we should not trust BOGUS or other\n  784 |                     // records.\n  785 |                     if (!record.data.algorithm().is_supported()\n  786 |                         || !record.data.digest_type().is_supported())\n  787 |                         && (record.proof.is_secure() || record.proof.is_insecure())\n  788 |                     {\n  789 |                         all_unknown.get_or_insert(true);\n  790 |                         continue;\n  791 |                     }\n  792 |                     all_unknown = Some(false);\n  793 | \n  794 |                     supported_records.push(record);"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"MAX_RRSIGS_PER_RRSET off-by-one: the limit allows 9 RRSIGs, not 8.\n\nIn verify_default_rrset() at line 932:\n  if i > MAX_RRSIGS_PER_RRSET {\n\nMAX_RRSIGS_PER_RRSET is 8 (line 1973). Using strict greater-than means indices 0 through 8 are\nall processed (9 total RRSIGs). The check should use >= to limit to exactly 8.\n\nThis means up to 9 DNSKEY lookups (one per RRSIG) are performed instead of the intended 8,\nslightly increasing the DoS exposure (KeyTrap-style amplification). The documentation comment\nsays \"maximum 8 RRSIGs per RRSET\" but the code allows 9.","fix":"Change line 932 from:\n  if i > MAX_RRSIGS_PER_RRSET {\nTo:\n  if i >= MAX_RRSIGS_PER_RRSET {\n\nOr alternatively, increase MAX_RRSIGS_PER_RRSET to 9 and update the comment to reflect that\nindices 0..=8 (9 items) are accepted.","locations":[{"ref":"crates/net/src/dnssec/mod.rs:932-940","code":"  932 |                 if i > MAX_RRSIGS_PER_RRSET {\n  933 |                     warn!(\n  934 |                         rrset_name = ?key.name,\n  935 |                         rrset_type = ?key.record_type,\n  936 |                         count = rrset.signatures.len(),\n  937 |                         \"too many RRSIGs for rrset; skipping\"\n  938 |                     );\n  939 |                     return None;\n  940 |                 }"},{"ref":"crates/net/src/dnssec/mod.rs:1972-1973","code":" 1972 | /// The maximum number of RRSIGs to attempt to validate for each RRSET.\n 1973 | const MAX_RRSIGS_PER_RRSET: usize = 8;"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"MdnsStream::poll_next will loop infinitely when both datagram is None and multicast is None becomes true mid-stream. The loop at line 278 calls `self.rcving_mcast = None` and then checks `if let Some(socket) = &self.multicast`. When multicast is None, the loop body does nothing and immediately loops again, creating an infinite busy loop that starves the executor. This can occur if multicast is initially Some but is later dropped or replaced with None (currently not possible via the API, but it is a structural hazard).","fix":"Add a `else { return Poll::Pending; }` after the `if let Some(socket)` block so that when no multicast socket is available, the stream returns Pending rather than spinning. The waker will be triggered when new I/O arrives.","locations":[{"ref":"crates/net/src/multicast/mdns_stream.rs:278-310","code":"  278 |         loop {\n  279 |             let msg = if let Some(receiving) = self.rcving_mcast.as_mut() {\n  280 |                 // TODO: should we drop this packet if it's not from the same src as dest?\n  281 |                 let msg = ready!(receiving.as_mut().poll_unpin(cx))?;\n  282 | \n  283 |                 Some(Poll::Ready(Some(Ok(msg))))\n  284 |             } else {\n  285 |                 None\n  286 |             };\n  287 | \n  288 |             self.rcving_mcast = None;\n  289 | \n  290 |             if let Some(msg) = msg {\n  291 |                 return msg;\n  292 |             }\n  293 | \n  294 |             // let socket = Arc::clone(socket);\n  295 |             if let Some(socket) = &self.multicast {\n  296 |                 let socket = Arc::clone(socket);\n  297 |                 let receive_future = async {\n  298 |                     let socket = socket;\n  299 |                     let mut buf = [0u8; 2_048];\n  300 |                     let (len, src) = socket.recv_from(&mut buf).await?;\n  301 | \n  302 |                     Ok(SerialMessage::new(\n  303 |                         buf.iter().take(len).cloned().collect(),\n  304 |                         src,\n  305 |                     ))\n  306 |                 };\n  307 | \n  308 |                 self.rcving_mcast = Some(Box::pin(receive_future));\n  309 |             }\n  310 |         }"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In TcpStream::poll_next, the vectored write for WriteTcpState::LenBytes adds `wrote` directly to `pos`, where `pos` is intended to be an index into the concatenation of `length` and `bytes`. However, poll_write_vectored returns the total bytes written across all IoSlices. When the write spans the boundary between the length header (2 bytes) and the message bytes, `pos` will overshoot `length.len()` and the subsequent state transition correctly computes `pos - length.len()` for the Bytes state. This is technically correct, but the vectored write starting at `&length[*pos..]` will panic with an index out-of-bounds if `pos > 2` at the start of a write iteration (i.e. after the length header was fully written but the state was not yet transitioned). In practice the state machine transitions pos before re-entering this branch, but the logic is fragile and hard to reason about.","fix":"Separate the length-header write and the body write into two distinct state machine steps so that each step only tracks its own offset. This eliminates the composite-offset arithmetic and makes the code clearly correct.","locations":[{"ref":"crates/net/src/tcp/tcp_stream.rs:211-216","code":"  211 |                     Some(WriteTcpState::LenBytes { pos, length, bytes }) => {\n  212 |                         let wrote = ready!(socket.as_mut().poll_write_vectored(\n  213 |                             cx,\n  214 |                             &[IoSlice::new(&length[*pos..]), IoSlice::new(bytes)]\n  215 |                         ))?;\n  216 |                         *pos += wrote;"},{"ref":"crates/net/src/tcp/tcp_stream.rs:232-243","code":"  232 |                 match current_state {\n  233 |                     Some(WriteTcpState::LenBytes { pos, length, bytes }) => {\n  234 |                         if pos < length.len() {\n  235 |                             *send_state = Some(WriteTcpState::LenBytes { pos, length, bytes });\n  236 |                         } else if pos < length.len() + bytes.len() {\n  237 |                             *send_state = Some(WriteTcpState::Bytes {\n  238 |                                 pos: pos - length.len(),\n  239 |                                 bytes,\n  240 |                             });\n  241 |                         } else {\n  242 |                             *send_state = Some(WriteTcpState::Flushing);\n  243 |                         }"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"UdpClientStream::poll_next always returns Poll::Ready(Some(Ok(()))) when not shutdown, making it appear to the DnsExchange background task that the stream is always immediately ready. This means DnsExchangeBackground::poll will never stall on the io_stream poll, always immediately proceeding to check outbound_messages. This bypasses the intended self-throttling of the exchange loop (described in the comment on line 133 of dns_exchange.rs: 'this will not accept incoming data while there is data to send'). For UdpClientStream the throttling is entirely absent.","fix":"The comment in the code acknowledges this is essentially a no-op ('Technically the Stream doesn't actually do anything'). Consider returning Poll::Pending instead of Poll::Ready(Some(Ok(()))) when the shutdown is not set, to properly integrate with the exchange's flow-control logic. Alternatively document clearly that UdpClientStream does not participate in back-pressure.","locations":[{"ref":"crates/net/src/udp/udp_client_stream.rs:107-118","code":"  107 | impl<P> Stream for UdpClientStream<P> {\n  108 |     type Item = Result<(), NetError>;\n  109 | \n  110 |     fn poll_next(self: Pin<&mut Self>, _cx: &mut Context<'_>) -> Poll<Option<Self::Item>> {\n  111 |         // Technically the Stream doesn't actually do anything.\n  112 |         if self.is_shutdown {\n  113 |             Poll::Ready(None)\n  114 |         } else {\n  115 |             Poll::Ready(Some(Ok(())))\n  116 |         }\n  117 |     }\n  118 | }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"RetryDnsHandle does not clone the request message ID or any per-request mutable state when retrying. The DnsMultiplexer will assign a new query ID on each send_message call (overwriting request.metadata.id), so ID collision is not directly an issue. However, RetryDnsHandle retries indefinitely on NetError::Busy without decrementing remaining_attempts, creating a potential infinite loop if the underlying stream is permanently busy. If the stream is shutdown or the channel is full for an extended period, the retry loop will spin producing NetError::Busy responses with no back-off.","fix":"Add a retry delay or backoff when encountering NetError::Busy, or cap the number of Busy retries separately. At minimum, document the behavior clearly so callers understand that Busy does not consume retry budget.","locations":[{"ref":"crates/net/src/xfer/retry_dns_handle.rs:93-98","code":"   93 |                 ) => return Poll::Ready(Some(Err(err))),\n   94 |                 // Don't count `Busy` as an attempt\n   95 |                 (_, NetError::Busy) => {}\n   96 |                 // Try again and count this as one attempt\n   97 |                 (_, _) => self.remaining_attempts -= 1,\n   98 |             }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`DS::from_key()` computes the key_tag using only `public_key.public_bytes()`, which is the raw\npublic key material without the flags, protocol, and algorithm bytes. However, the actual DNSKEY\nkey_tag computation per RFC 4034 Appendix B must be performed over the entire DNSKEY RDATA\n(flags || protocol || algorithm || public_key). The `key_tag` function in `ds.rs` at line 438\noperates only on the `public_key` bytes. This means the key_tag stored in the DS record created\nby `DS::from_key()` is incorrect — it is computed over the public key bytes alone, not over the\nfull DNSKEY RDATA. The authoritative `DNSKEY::calculate_key_tag()` method (used by\n`DnssecSigner::calculate_key_tag()`) does compute over the full RDATA, creating an inconsistency.","fix":"In `DS::from_key()`, compute the key tag from the full DNSKEY RDATA, not just from the public key\nbytes. Use `DNSKEY::from_key(public_key).calculate_key_tag()?` to produce the correct key_tag\nvalue, then pass it to `DS::new(...)`. The local `key_tag(public_key)` helper function is\nincorrect and should either be removed or fixed to include all DNSKEY RDATA fields.","locations":[{"ref":"crates/proto/src/dnssec/rdata/ds.rs:94-107","code":"   94 |     pub fn from_key(\n   95 |         public_key: &dyn PublicKey,\n   96 |         name: &Name,\n   97 |         digest_type: DigestType,\n   98 |     ) -> Result<Self, DnsSecError> {\n   99 |         let tag = key_tag(public_key.public_bytes());\n  100 |         let dnskey = DNSKEY::from_key(public_key);\n  101 |         Ok(Self::new(\n  102 |             tag,\n  103 |             public_key.algorithm(),\n  104 |             digest_type,\n  105 |             dnskey.to_digest(name, digest_type)?.as_ref().to_owned(),\n  106 |         ))\n  107 |     }"},{"ref":"crates/proto/src/dnssec/rdata/ds.rs:438-451","code":"  438 | fn key_tag(public_key: &[u8]) -> u16 {\n  439 |     let mut ac = 0;\n  440 | \n  441 |     for (i, k) in public_key.iter().enumerate() {\n  442 |         ac += if i & 0x0001 == 0x0001 {\n  443 |             *k as usize\n  444 |         } else {\n  445 |             (*k as usize) << 8\n  446 |         };\n  447 |     }\n  448 | \n  449 |     ac += (ac >> 16) & 0xFFFF;\n  450 |     (ac & 0xFFFF) as u16 // this is unnecessary, no?\n  451 | }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`DS::covers()` checks `key.zone_key()` as a guard before comparing the digest, but this check\nonly validates the DNSKEY zone-key flag — it does not validate the DNSKEY algorithm field against\nthe DS algorithm field. A DS record with algorithm A could be presented alongside a DNSKEY with\nalgorithm B and a matching digest (if somehow hashes collide under a different algorithm context).\nRFC 4034 §5.2 requires that the algorithm fields match. The missing check means a DS record with\none algorithm could appear to cover a DNSKEY with a different algorithm if the digest bytes happen\nto match.","fix":"Add an algorithm field comparison:\n  pub fn covers(&self, name: &Name, key: &DNSKEY) -> ProtoResult<bool> {\n      if self.algorithm() != key.public_key().algorithm() {\n          return Ok(false);\n      }\n      key.to_digest(name, self.digest_type())\n          .map(|hash| key.zone_key() && hash.as_ref() == self.digest())\n  }","locations":[{"ref":"crates/proto/src/dnssec/rdata/ds.rs:275-278","code":"  275 |     pub fn covers(&self, name: &Name, key: &DNSKEY) -> ProtoResult<bool> {\n  276 |         key.to_digest(name, self.digest_type())\n  277 |             .map(|hash| key.zone_key() && hash.as_ref() == self.digest())\n  278 |     }"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The NSEC3 hash iteration count (`iterations: u16`) is accepted from the wire with no upper-bound\nvalidation during decoding in `NSEC3::read_data` and `NSEC3PARAM::read`. RFC 9276 (BCP 236,\npublished 2022) mandates that validators MUST treat NSEC3 records with iterations > 100 as\ninsecure. RFC 5155 §10.3 also defines recommended limits (2500/500/150 for different key sizes).\nAn attacker can craft an NSEC3 record with iterations = 65535 to cause a CPU denial-of-service\nwhen the implementation calls `Nsec3HashAlgorithm::hash()`, which runs the SHA-1 hash 65535+1\ntimes per name lookup. No limit is enforced anywhere in the decoding or hashing paths.","fix":"Enforce an iteration cap during decoding or hashing. Per RFC 9276, treat records with iterations\n> 100 as if the zone is insecure (return an appropriate error or a non-secure proof). At minimum,\nadd a constant and reject extreme values:\n  const MAX_NSEC3_ITERATIONS: u16 = 2500;\n  if iterations > MAX_NSEC3_ITERATIONS {\n      return Err(DecodeError::Nsec3IterationsTooHigh(iterations));\n  }","locations":[{"ref":"crates/proto/src/dnssec/rdata/nsec3.rs:315","code":"  315 |         let iterations: u16 = decoder.read_u16()?.unverified(/*valid as any u16*/);"},{"ref":"crates/proto/src/dnssec/rdata/nsec3param.rs:196","code":"  196 |         let iterations: u16 = decoder.read_u16()?.unverified(/*valid as any u16*/);"},{"ref":"crates/proto/src/dnssec/mod.rs:188-203","code":"  188 |     pub fn hash(self, salt: &[u8], name: &Name, iterations: u16) -> Result<Digest, ProtoError> {\n  189 |         match self {\n  190 |             // if there ever is more than just SHA1 support, this should be a genericized method\n  191 |             Self::SHA1 => {\n  192 |                 let mut buf: Vec<u8> = Vec::new();\n  193 |                 {\n  194 |                     let mut encoder = BinEncoder::new(&mut buf);\n  195 |                     let mut encoder =\n  196 |                         encoder.with_name_encoding(NameEncoding::UncompressedLowercase);\n  197 |                     name.emit(&mut encoder)?;\n  198 |                 }\n  199 | \n  200 |                 Ok(Digest::iterated(salt, &buf, DigestType::SHA1, iterations)?)\n  201 |             }\n  202 |         }\n  203 |     }"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The `TBS::new` function in `tbs.rs` filters the input records to keep only those matching `name`,\n`dns_class`, and `type_covered`. The filtering is correct for these three fields. However, the\nfunction then calls `rrset.sort()` on `Record` objects to produce canonical ordering (RFC 4034\n§6.3: records must be sorted by their wire-format RDATA). The `Record` sort order is not\ndocumented to match the canonical wire-format RDATA lexicographic ordering required by RFC 4034.\nIf `Record`'s `Ord` implementation orders by anything other than the canonical wire-format RDATA\nbytes (e.g. by name or TTL first), the TBS will be constructed in the wrong order, causing\nsignature verification failures against compliant signers and potentially allowing a dishonest\nresponder to present records in a different order that still passes verification.","fix":"Verify and document that `Record`'s `Ord` implementation matches RFC 4034 §6.3 canonical ordering\n(lexicographic on the canonical wire-format RDATA bytes). If it does not, replace the `rrset.sort()`\nwith a sort using a custom comparator that serializes each record's RDATA to bytes and compares\nlexicographically:\n  rrset.sort_by(|a, b| {\n      let mut a_buf = Vec::new();\n      let mut b_buf = Vec::new();\n      // encode canonical RDATA only\n      a.data.emit(&mut BinEncoder::new(&mut a_buf)).ok();\n      b.data.emit(&mut BinEncoder::new(&mut b_buf)).ok();\n      a_buf.cmp(&b_buf)\n  });","locations":[{"ref":"crates/proto/src/dnssec/tbs.rs:77-78","code":"   77 |         // put records in canonical order\n   78 |         rrset.sort();"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`TrustAnchors::contains()` compares trust anchor keys by comparing raw `public_bytes()` and\n`algorithm()`. For the root DNSSEC anchors stored in `trust_anchor.rs` (ROOT_ANCHOR_2018 and\nROOT_ANCHOR_2024), the bytes stored are in DNSKEY public-key wire format (without the 0x04 EC\nprefix for ECDSA, and with the RFC 3110 exponent-length prefix for RSA). The comparison will\ncorrectly match when both sides are in the same format, but there is no documented invariant\nenforcing this, making it fragile for future additions. More critically, two different algorithms\nwith identical public-key bytes would erroneously match if only the bytes are compared and the\nalgorithm check is accidentally removed or bypassed.","fix":"This is low risk as currently written, but add a comment documenting the invariant that\n`public_bytes()` must always be in canonical DNSKEY public-key wire format, and consider adding a\ntype-level guarantee (e.g. wrapping in a newtype that enforces the format).","locations":[{"ref":"crates/proto/src/dnssec/trust_anchor.rs:55-58","code":"   55 |     pub fn contains<P: PublicKey + ?Sized>(&self, other_key: &P) -> bool {\n   56 |         self.pkeys.iter().any(|k| {\n   57 |             other_key.public_bytes() == k.public_bytes() && other_key.algorithm() == k.algorithm()\n   58 |         })"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`DnsResponse::contains_answer` has a logic error in the `q_type` (catch-all) branch: if\n`self.answers` is non-empty it immediately returns `true` regardless of whether any answer record\nactually matches the query name or type. This means a response that carries answer records for a\ncompletely different name than the question will be reported as containing an answer, which is\nincorrect. CNAME chains and wildcard responses will also be mis-reported for the wrong reasons.","fix":"In the `q_type` branch, replace the early return on `!self.answers.is_empty()` with the same\nfiltering as the else branch: check that at least one answer record matches the query name or is a\nCNAME from the query name. The current shortcut is over-broad and will produce false positives.","locations":[{"ref":"crates/proto/src/op/dns_response.rs:138-165","code":"  138 |     pub fn contains_answer(&self) -> bool {\n  139 |         for q in &self.queries {\n  140 |             let found = match q.query_type {\n  141 |                 RecordType::ANY => self.all_sections().any(|r| r.name == q.name),\n  142 |                 RecordType::SOA => {\n  143 |                     // for SOA name must be part of the SOA zone\n  144 |                     self.all_sections()\n  145 |                         .filter(|r| r.record_type().is_soa())\n  146 |                         .any(|r| r.name.zone_of(&q.name))\n  147 |                 }\n  148 |                 q_type => {\n  149 |                     if !self.answers.is_empty() {\n  150 |                         true\n  151 |                     } else {\n  152 |                         self.all_sections()\n  153 |                             .filter(|r| r.record_type() == q_type)\n  154 |                             .any(|r| r.name == q.name)\n  155 |                     }\n  156 |                 }\n  157 |             };\n  158 | \n  159 |             if found {\n  160 |                 return true;\n  161 |             }\n  162 |         }\n  163 | \n  164 |         false\n  165 |     }"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`Message::maybe_strip_dnssec_records` (lines 203-212) uses the predicate:\n```rust\nlet predicate = |record: &Record| {\n    let record_type = record.record_type();\n    record_type == query_type || !record_type.is_dnssec()\n};\n```\nThis only keeps records whose type equals the query type OR is not DNSSEC. However, DNSSEC\nvalidation requires NSEC/NSEC3 records in the authority section to prove non-existence, and\nRRSIG records to prove authenticity. Stripping all DNSSEC records when the query type is (say)\nA will remove RRSIG records for A records (since RRSIG != A and is_dnssec() == true), and NSEC\nrecords that should accompany a NXDOMAIN response. The `answers.retain` + `authorities.retain` +\n`additionals.retain` applies the same predicate to all sections, including the authority section\nwhere NSEC/NSEC3 legitimately appear regardless of the query type.","fix":"The RFC 4035 §3.2.1 rule is: strip DNSSEC RRs from the answer section that don't match the query\ntype *unless* the DO bit is set. NSEC/NSEC3 records in the authority section and RRSIG covering\nrecords in the answer section should still be kept. Consider using a section-specific predicate\nthat applies the stripping only to the answer section, or exclude NSEC/NSEC3/RRSIG record types\nfrom stripping in the authority section.","locations":[{"ref":"crates/proto/src/op/message.rs:194-213","code":"  194 |     pub fn maybe_strip_dnssec_records(mut self, query_has_dnssec_ok: bool) -> Self {\n  195 |         if query_has_dnssec_ok {\n  196 |             return self;\n  197 |         }\n  198 | \n  199 |         let Some(query_type) = self.queries.first().map(|q| q.query_type) else {\n  200 |             return self; // No query, return unchanged\n  201 |         };\n  202 | \n  203 |         let predicate = |record: &Record| {\n  204 |             let record_type = record.record_type();\n  205 |             record_type == query_type || !record_type.is_dnssec()\n  206 |         };\n  207 | \n  208 |         self.answers.retain(predicate);\n  209 |         self.authorities.retain(predicate);\n  210 |         self.additionals.retain(predicate);\n  211 | \n  212 |         self\n  213 |     }"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `Name::from_encoded_str`, escape sequences are parsed as octal (base-8) but the DNS standard (RFC 1035 Section 5.1) mandates decimal (base-10) escape sequences. The code calls `ch.to_digit(8)` for each digit of a `\\DDD` escape, interpreting the three digits as octal rather than decimal. For example `\\065` would be treated as octal 065 (= decimal 53 = '5') instead of decimal 65 (= 'A'). This silently produces wrong output for any escape sequence using digits 8 or 9 (they return `None` from `to_digit(8)` and produce an error instead of being parsed as decimal), and produces subtly wrong results for digits 0-7.","fix":"Replace all three `ch.to_digit(8)` calls and the octal arithmetic `(i * 8 * 8) + (ii * 8) + digit` with decimal parsing: `ch.to_digit(10)` and `(i * 100) + (ii * 10) + digit`. The computed value must be in range 0-255 and the resulting `char::from_u32` call already handles the range check.","locations":[{"ref":"crates/proto/src/rr/domain/name.rs:614-648","code":"  614 |                             ch.to_digit(8)\n  615 |                                 .ok_or_else(|| ProtoError::from(format!(\"illegal char: {ch}\")))?,\n  616 |                         );\n  617 |                     } else {\n  618 |                         // it's a single escaped char\n  619 |                         label.push(ch);\n  620 |                         state = ParseState::Label;\n  621 |                     }\n  622 |                 }\n  623 |                 ParseState::Escape2(i) => {\n  624 |                     if ch.is_numeric() {\n  625 |                         state = ParseState::Escape3(\n  626 |                             i,\n  627 |                             ch.to_digit(8)\n  628 |                                 .ok_or_else(|| ProtoError::from(format!(\"illegal char: {ch}\")))?,\n  629 |                         );\n  630 |                     } else {\n  631 |                         return Err(ProtoError::from(format!(\"unrecognized char: {ch}\")));\n  632 |                     }\n  633 |                 }\n  634 |                 ParseState::Escape3(i, ii) => {\n  635 |                     if ch.is_numeric() {\n  636 |                         // octal conversion\n  637 |                         let val: u32 = (i * 8 * 8)\n  638 |                             + (ii * 8)\n  639 |                             + ch.to_digit(8)\n  640 |                                 .ok_or_else(|| ProtoError::from(format!(\"illegal char: {ch}\")))?;\n  641 |                         let new: char = char::from_u32(val)\n  642 |                             .ok_or_else(|| ProtoError::from(format!(\"illegal char: {ch}\")))?;\n  643 |                         label.push(new);\n  644 |                         state = ParseState::Label;\n  645 |                     } else {\n  646 |                         return Err(format!(\"unrecognized char: {ch}\").into());\n  647 |                     }\n  648 |                 }"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `Name::read_inner` (the binary name decoder), the domain-name length is checked **after** the full name has been parsed (line 1358-1360), not incrementally. The condition `len >= 255` rejects names of exactly 255 bytes, but RFC 1035 Section 3.1 allows names up to 255 bytes inclusive (the root zero-length label counts as 1 byte). A valid 255-byte name will be incorrectly rejected with `DomainNameTooLong`. In contrast, `extend_name` uses `new_len > Self::MAX_LENGTH` (i.e. `> 255`) which is correct. The post-decode check uses the wrong comparison operator.","fix":"Change `if len >= 255` to `if len > 255` to correctly reject only names strictly exceeding the 255-byte maximum, consistent with the check in `extend_name`.","locations":[{"ref":"crates/proto/src/rr/domain/name.rs:1358-1360","code":" 1358 |     let len = name.len();\n 1359 |     if len >= 255 {\n 1360 |         return Err(DecodeError::DomainNameTooLong(len));"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In cert.rs, the CERT::read_data() validates rdata_length <= 5 (returning error) and then immediately uses it again via 'length.map(...).checked_sub(decoder.index() - start_idx)'. The minimum valid CERT RDATA is 5 bytes (2 cert_type + 2 key_tag + 1 algorithm), meaning cert_data can be empty. The check on line 513 'if rdata_length <= 5' rejects exactly-5-byte records which would have an empty cert_data field. Per RFC 4398, the certificate/CRL field can potentially be empty (e.g., for URI or OID types pointing to external data). This overly strict validation rejects potentially valid records.","fix":"Change the check from '<= 5' to '< 5' to allow rdata_length == 5 (empty cert_data), which is the minimum valid length for the fixed fields.","locations":[{"ref":"crates/proto/src/rr/rdata/cert.rs:512-518","code":"  512 | \n  513 |         if rdata_length <= 5 {\n  514 |             return Err(DecodeError::IncorrectRDataLengthRead {\n  515 |                 read: rdata_length,\n  516 |                 len: 6,\n  517 |             });\n  518 |         }"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In csync.rs, the flags verification in read_data() at line 215 checks 'flags & 0b1111_1100 == 0', which only validates the lower 8 bits of the 16-bit flags field. The mask 0b1111_1100 is an 8-bit mask that, when applied to a u16, only checks bits 2-7. Bits 8-15 of the flags field are not checked for being zero. RFC 7477 section 2.1.1.2 says 'Parental agents MUST NOT process a CSYNC record if it contains a 1 value for a flag that is unknown to or unsupported by the parental agent.' The check should use 0b1111_1111_1111_1100u16 (the full 16-bit mask).","fix":"Change the mask from '0b1111_1100' to '0b1111_1111_1111_1100u16' to check all reserved bits in the 16-bit flags field. Note that the flags() method at line 186 already correctly uses '0b1111_1111_1111_1100', so align read_data() with that mask.","locations":[{"ref":"crates/proto/src/rr/rdata/csync.rs:213-216","code":"  213 |         let flags: u16 = decoder\n  214 |             .read_u16()?\n  215 |             .verify_unwrap(|flags| flags & 0b1111_1100 == 0)\n  216 |             .map_err(DecodeError::UnrecognizedCsyncFlags)?;"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In opt.rs, the OPT record byte-at-a-time decoder at lines 307-323 tracks 'collected: Vec<u8>' which is re-created at each iteration by moving out of the enum variant (line 310: 'mut collected') and then moving back in at line 320 ('state = OptReadState::Data { code, length, collected }'). This causes repeated heap re-allocation of the state machine enum because Vec<u8> is moved in and out. On each loop iteration for a data option, the entire enum (including the Vec's heap metadata) is reconstructed. While Rust's optimizer may optimize this away, it is not guaranteed, especially at higher levels of inlining inhibition.","fix":"Refactor to use decoder.read_vec(length) as suggested by the TODO comment at line 301, eliminating the per-byte loop entirely.","locations":[{"ref":"crates/proto/src/rr/rdata/opt.rs:307-323","code":"  307 |                 OptReadState::Data {\n  308 |                     code,\n  309 |                     length,\n  310 |                     mut collected,\n  311 |                 } => {\n  312 |                     // TODO: can this be replaced by read_slice()?\n  313 |                     collected.push(decoder.pop()?.unverified(/*byte array is safe*/));\n  314 |                     if length == collected.len() {\n  315 |                         options.push((code, (code, &collected as &[u8]).try_into()?));\n  316 |                         state = OptReadState::ReadCode;\n  317 |                     } else {\n  318 |                         state = OptReadState::Data {\n  319 |                             code,\n  320 |                             length,\n  321 |                             collected,\n  322 |                         };\n  323 |                     }"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In svcb.rs, SVCB::read_data() at line 1446 uses 'while remainder_len >= 4' to loop over SvcParams. This means if exactly 1, 2, or 3 bytes remain in the RDATA after parsing the target name, those trailing bytes are silently ignored rather than returning a malformed record error. RFC 9460 section 2.2 states clients MUST consider an RR malformed if 'the end of the RDATA occurs within a SvcParam'. A partial key (1-3 bytes) should be flagged as malformed.","fix":"After the while loop, check if remainder_len > 0 and if so return Err(DecodeError::SvcParamsOutOfOrder) or a new DecodeError variant for trailing garbage bytes.","locations":[{"ref":"crates/proto/src/rr/rdata/svcb.rs:1446-1471","code":" 1446 |         while remainder_len >= 4 {\n 1447 |             // a 2 octet field containing the SvcParamKey as an integer in\n 1448 |             //      network byte order.  (See Section 14.3.2 for the defined values.)\n 1449 |             let key = SvcParamKey::read(decoder)?;\n 1450 | \n 1451 |             // a 2 octet field containing the length of the SvcParamValue as an\n 1452 |             //      integer between 0 and 65535 in network byte order (but constrained\n 1453 |             //      by the RDATA and DNS message sizes).\n 1454 |             let value = SvcParamValue::read(key, decoder)?;\n 1455 | \n 1456 |             if let Some(last_key) = svc_params.last().map(|(key, _)| key) {\n 1457 |                 if last_key >= &key {\n 1458 |                     return Err(DecodeError::SvcParamsOutOfOrder);\n 1459 |                 }\n 1460 |             }\n 1461 | \n 1462 |             svc_params.push((key, value));\n 1463 |             remainder_len = rdata_length\n 1464 |                 .map(|len| len as usize)\n 1465 |                 .checked_sub(decoder.index() - start_index)\n 1466 |                 .map_err(|len| DecodeError::IncorrectRDataLengthRead {\n 1467 |                     read: decoder.index() - start_index,\n 1468 |                     len,\n 1469 |                 })?\n 1470 |                 .unverified(); // valid len\n 1471 |         }"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In tsig.rs read_data(), the mac_size verification at line 402 checks 'decoder.index() + size as usize + 6 <= end_idx'. The constant 6 represents 3 remaining u16 fields (oid, error, other_len). However this does not account for the variable-length 'other' data itself. The check allows mac_size values that would leave insufficient room for the 'other' data after the fixed fields. The subsequent other_len check at line 416 then validates 'decoder.index() + size as usize == end_idx', but by that point an inconsistency could cause the decoder to read out of bounds if the underlying buffer is unexpectedly short.","fix":"The mac_size verification should only check that there are at least (size + 6) bytes remaining, which it does. However the arithmetic 'end_idx - decoder.index()' on error line 404 may underflow if decoder.index() > end_idx. Add a checked subtraction here.","locations":[{"ref":"crates/proto/src/rr/rdata/tsig.rs:400-406","code":"  400 |         let mac_size = decoder\n  401 |             .read_u16()?\n  402 |             .verify_unwrap(|&size| decoder.index() + size as usize + 6 /* 3 u16 */ <= end_idx)\n  403 |             .map_err(|size| DecodeError::IncorrectRDataLengthRead {\n  404 |                 read: end_idx - decoder.index(),\n  405 |                 len: size as usize + 6,\n  406 |             })?;"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"TsigAlgorithm::supported() doc comment says HmacSha512_256 is supported, but the implementation only matches HmacSha256, HmacSha384, and HmacSha512. The doc comment at line 616 explicitly lists HmacSha512_256 as supported. This is a discrepancy between documentation and implementation. Users relying on the doc comment will incorrectly assume HmacSha512_256 operations are supported.","fix":"Either remove HmacSha512_256 from the doc comment, or add it to the match arm if it is indeed intended to be supported.","locations":[{"ref":"crates/proto/src/rr/rdata/tsig.rs:616-621","code":"  616 |     /// - HmacSha512\n  617 |     /// - HmacSha512_256\n  618 |     pub fn supported(&self) -> bool {\n  619 |         use TsigAlgorithm::*;\n  620 |         matches!(self, HmacSha256 | HmacSha384 | HmacSha512)\n  621 |     }"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `TSigVerifier::verify` (tsig.rs line 432), the time-range check `range.contains(&self.request_time)` verifies the server's reported time is within fudge seconds of the **client's request time**, not the current clock time. This means replay protection based on time is only as strong as the fudge window around the moment the request was sent. If a response arrives much later than expected (e.g. due to network delays), the validation still passes as long as the server's TSIG time falls within fudge of the original request time. Additionally, `tsig.time - tsig.fudge as u64` on line 325 can underflow: if `tsig.time < tsig.fudge as u64`, this wraps around to a very large u64 (since both are unsigned), creating an enormous validity window that effectively disables the lower time bound.","fix":"For the underflow: use `tsig.time.saturating_sub(tsig.fudge as u64)` for the range start. For the time validation: document clearly that `request_time` is the local client time at which the request was sent and ensure it reflects actual clock time, or compare against the current time instead.","locations":[{"ref":"crates/proto/src/rr/tsig.rs:324-328","code":"  324 |             Range {\n  325 |                 start: tsig.time - tsig.fudge as u64,\n  326 |                 end: tsig.time + tsig.fudge as u64,\n  327 |             },\n  328 |         ))"},{"ref":"crates/proto/src/rr/tsig.rs:432","code":"  432 |         if rt >= self.remote_time && range.contains(&self.request_time) {"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`escape_seq` in `zone_lex.rs` misimplements the DNS zone-file `\\DDD` decimal escape sequence.\nThe spec (RFC 1035 §5.1) says `\\DDD` is a decimal octet value in the range 0-255 where DDD is\na 3-digit decimal number. The code computes:\n  `val = (d1 << 16) + (d2 << 8) + d3`\nThis is a weighted bit-shift calculation that does NOT compute the decimal number DDD. For example,\n`\\065` (decimal 65, ASCII 'A') would compute val = (0 << 16) + (6 << 8) + 5 = 1541, not 65.\nThe correct formula is `val = d1 * 100 + d2 * 10 + d3`.\nThis bug means that zone files with `\\DDD` decimal escapes (other than trivial cases like `\\000`)\nare mis-parsed, producing incorrect character values. This affects DNS record names and RDATA\nthat use decimal-escaped octets.","fix":"Replace the shift arithmetic with decimal arithmetic:\n```rust\nlet val: u32 = d1 * 100 + d2 * 10 + d3;\n```\nAlso add a range check to ensure val <= 255 before calling `char::from_u32`, since DNS only\nsupports single-octet decimal escapes.","locations":[{"ref":"crates/proto/src/serialize/txt/zone_lex.rs:274-299","code":"  274 |     fn escape_seq(&mut self) -> LexerResult<char> {\n  275 |         // escaped character, let's decode it.\n  276 |         self.txt.next(); // consume the escape\n  277 |         let ch = self.peek().ok_or(LexerError::EOF)?;\n  278 | \n  279 |         if !ch.is_control() {\n  280 |             if ch.is_numeric() {\n  281 |                 // in this case it's an escaped octal: \\DDD\n  282 |                 let d1: u32 = self\n  283 |                     .txt\n  284 |                     .next()\n  285 |                     .ok_or(LexerError::EOF)\n  286 |                     .map(|c| c.to_digit(10).ok_or(LexerError::IllegalCharacter(c)))??; // gobble\n  287 |                 let d2: u32 = self\n  288 |                     .txt\n  289 |                     .next()\n  290 |                     .ok_or(LexerError::EOF)\n  291 |                     .map(|c| c.to_digit(10).ok_or(LexerError::IllegalCharacter(c)))??; // gobble\n  292 |                 let d3: u32 = self\n  293 |                     .txt\n  294 |                     .next()\n  295 |                     .ok_or(LexerError::EOF)\n  296 |                     .map(|c| c.to_digit(10).ok_or(LexerError::IllegalCharacter(c)))??; // gobble\n  297 | \n  298 |                 let val: u32 = (d1 << 16) + (d2 << 8) + d3;\n  299 |                 let ch: char = char::from_u32(val).ok_or(LexerError::UnrecognizedOctet(val))?;"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"CachingClient::lookup_from_cache computes `valid_until` using only the minimum\nTTL from `message.answers`. When the cache returns a message that was originally\na NODATA or NXDOMAIN response (stored via the Err branch), this code path is not\nreached (the Err arm returns early at line 271). However for successful responses\nthat contain zero answer records (e.g. an empty ANSWER section from a weird\nserver), `message.answers.iter().min()` returns `None` and the code falls back\nto `MAX_TTL` (2^31−1 seconds, ~68 years). A pathological upstream server\nreturning an empty NOERROR answer with no records will be cached indefinitely\nuntil the resolver is restarted.","fix":"When `message.answers` is empty, use `0` or a configured minimum TTL as the\n`valid_until` value rather than `MAX_TTL`, to prevent indefinitely caching an\nempty answer. Alternatively, also consider authority SOA TTL (negative TTL) when\nthe answer section is empty.","locations":[{"ref":"crates/resolver/src/caching_client.rs:274-285","code":"  274 |         let valid_until = now\n  275 |             + Duration::from_secs(\n  276 |                 message\n  277 |                     .answers\n  278 |                     .iter()\n  279 |                     .map(|r| r.ttl)\n  280 |                     .min()\n  281 |                     .unwrap_or(MAX_TTL)\n  282 |                     .into(),\n  283 |             );\n  284 | \n  285 |         Some(Ok(Lookup::new(message, valid_until)))"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In handle_noerror, the CNAME chain folding logic (lines 325-350) iterates all\n`response.answers` and follows CNAME targets only when `search_name == r.name`.\nFor an out-of-order CNAME chain (e.g. the server returns them in reverse order),\nthe fold will stop following the chain prematurely: if record B→C comes before\nA→B in the answers slice, the fold will see B→C but the current search_name is\nstill A, so it skips the record. The fold will then see A→B and update\nsearch_name to B, but B→C was already passed. The result is that `search_name`\nis set to B instead of C, and the final lookup will be issued for B (which may\nalready be in the answer section as a CNAME source) rather than for the actual\ntarget C, causing an incorrect recursive lookup.","fix":"After folding, verify that `search_name` is truly the final target by\niterating again to follow any remaining hops, or sort the CNAME chain\ninto correct order before folding. RFC 1035 does not guarantee CNAME\nrecords appear in order in the answer section.","locations":[{"ref":"crates/resolver/src/caching_client.rs:325-350","code":"  325 |                     response.answers.iter().fold(\n  326 |                         (Cow::Borrowed(&query.name), INITIAL_TTL, false),\n  327 |                         |(search_name, cname_ttl, was_cname), r| {\n  328 |                             match &r.data {\n  329 |                                 RData::CNAME(CNAME(cname)) => {\n  330 |                                     // take the minimum TTL of the cname_ttl and the next record in the chain\n  331 |                                     let ttl = cname_ttl.min(r.ttl);\n  332 |                                     debug_assert_eq!(r.record_type(), RecordType::CNAME);\n  333 |                                     if search_name.as_ref() == &r.name {\n  334 |                                         return (Cow::Owned(cname.clone()), ttl, true);\n  335 |                                     }\n  336 |                                 }\n  337 |                                 RData::SRV(srv) => {\n  338 |                                     // take the minimum TTL of the cname_ttl and the next record in the chain\n  339 |                                     let ttl = cname_ttl.min(r.ttl);\n  340 |                                     debug_assert_eq!(r.record_type(), RecordType::SRV);\n  341 | \n  342 |                                     // the search name becomes the srv.target\n  343 |                                     return (Cow::Owned(srv.target.clone()), ttl, true);\n  344 |                                 }\n  345 |                                 _ => (),\n  346 |                             }\n  347 | \n  348 |                             (search_name, cname_ttl, was_cname)\n  349 |                         },\n  350 |                     )"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In CachingClient::cname (lines 492-499), when the CNAME chain resolution\nsucceeds and the Lookup result from the recursive inner_lookup is stored in the\ncache, a new Message is constructed that aggregates all answers/authorities/\nadditionals from the completed Lookup. This Message is then inserted into the\ncache keyed by the ORIGINAL query (e.g. `www.example.com. A`). However, the\nrecords inserted are already TTL-clamped by the chain's minimum TTL. The\n`cache.insert(query, Ok(message), now)` call does NOT go through the\n`clamp_positive_ttls` path that the normal `CachingClient::cache()` helper uses\n(lines 502-527). As a result, for CNAME-chain responses the per-type positive\nTTL clamping from `TtlConfig` is bypassed, potentially caching responses with\nTTLs that violate the configured `positive_min_ttl` / `positive_max_ttl` bounds.","fix":"Route the CNAME final result through the same `self.cache(query, Ok(message))`\nhelper method used for non-CNAME responses, so that `clamp_positive_ttls` is\napplied consistently. If the TTL was already reduced by the chain minimum, the\nclamp will only further reduce it (never increase above the chain minimum).","locations":[{"ref":"crates/resolver/src/caching_client.rs:492-499","code":"  492 |     fn cname(&self, lookup: Lookup, query: Query) -> Result<Lookup, NetError> {\n  493 |         let mut message = Message::response(0, OpCode::Query);\n  494 |         message.add_query(query.clone());\n  495 |         message.add_answers(lookup.answers().iter().cloned());\n  496 |         message.add_authorities(lookup.authorities().iter().cloned());\n  497 |         message.add_additionals(lookup.additionals().iter().cloned());\n  498 |         self.cache.insert(query, Ok(message), Instant::now());\n  499 |         Ok(lookup)"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In NameServerPool::send the answer_address_filter is applied AFTER the shared\ndeduplication lookup completes. Multiple concurrent callers share the same\n`SharedLookup` future and all receive the same DnsResponse, but the filter is\nre-applied independently by each caller. This means:\n  (a) The filter runs redundantly O(waiters) times for a single network round\n      trip, and\n  (b) If the AccessControlSet is mutable and changes between the creator\n      completing and a waiter waking up, different callers for the identical\n      query can observe different responses — a subtle correctness problem for\n      any dynamic deny-list scenario.","fix":"Apply the answer_address_filter once, inside the creator's async block (before\nsharing the result), so all waiters receive the already-filtered response.\nAlternatively, document clearly that the filter is intentionally applied per\ncaller.","locations":[{"ref":"crates/resolver/src/name_server_pool.rs:197-241","code":"  197 |             let response = lookup.await;\n  198 |             let mut response = response?;\n  199 | \n  200 |             if acs.allows_all() {\n  201 |                 return Ok(response);\n  202 |             }\n  203 | \n  204 |             let answer_filter = |record: &Record| {\n  205 |                 let ip = match &record.data {\n  206 |                     RData::A(A(ipv4)) => (*ipv4).into(),\n  207 |                     RData::AAAA(AAAA(ipv6)) => (*ipv6).into(),\n  208 |                     _ => return true,\n  209 |                 };\n  210 | \n  211 |                 if acs.denied(ip) {\n  212 |                     error!(\n  213 |                         %query,\n  214 |                         %ip,\n  215 |                         \"removing ip from response: answer filter matched\"\n  216 |                     );\n  217 | \n  218 |                     false\n  219 |                 } else {\n  220 |                     true\n  221 |                 }\n  222 |             };\n  223 | \n  224 |             let answers_len = response.answers.len();\n  225 |             let authorities_len = response.authorities.len();\n  226 | \n  227 |             response.additionals.retain(answer_filter);\n  228 |             response.answers.retain(answer_filter);\n  229 |             response.authorities.retain(answer_filter);\n  230 | \n  231 |             if response.answers.is_empty() && answers_len != 0\n  232 |                 || (response.answers.is_empty()\n  233 |                     && response.authorities.is_empty()\n  234 |                     && authorities_len != 0)\n  235 |             {\n  236 |                 return Err(NoRecords::new(Box::new(query.clone()), ResponseCode::NXDomain).into());\n  237 |             }\n  238 | \n  239 |             // Since the message might have changed, create a new response from\n  240 |             // the message to update the buffer.\n  241 |             DnsResponse::from_message(response.into_message()).map_err(NetError::from)"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In PoolState::try_send, the `policy.disable_udp` flag is set to `true` whenever\na truncated response or a QueryCaseMismatch error is received from ANY server in\nthe pool. The flag is local to the call frame, but once set it is never cleared\nfor the remainder of that try_send invocation. If a truncated response causes\n`policy.disable_udp = true` and the same server is re-pushed to the front of\nthe queue (line 365), subsequent iterations will filter out ALL servers that\nonly support UDP — including ones that never contributed to the truncation.\nWith a single-UDP-server pool this leads to `NetError::NoConnections` instead\nof a successful TCP retry on the same server.","fix":"Instead of using a pool-wide `policy.disable_udp` flag, associate the\ndisable_udp state with the specific server being retried (e.g. pass it through\nthe per-request retry path), or only apply the flag to the specific server that\nreturned the truncated/mismatched response.","locations":[{"ref":"crates/resolver/src/name_server_pool.rs:361-367","code":"  361 |                     Ok(response) if response.truncation => {\n  362 |                         debug!(\"truncated response received, retrying over TCP\");\n  363 |                         policy.disable_udp = true;\n  364 |                         err = NetError::from(\"received truncated response\");\n  365 |                         servers.push_front(server);\n  366 |                         continue;\n  367 |                     }"},{"ref":"crates/resolver/src/name_server_pool.rs:385-388","code":"  385 |                     NetError::QueryCaseMismatch => {\n  386 |                         servers.push_front(server);\n  387 |                         policy.disable_udp = true;\n  388 |                         continue;"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `ns_pool_for_name()`, when the name-server cache entry is found but its TTL has expired\n(line 503–504), the code does NOT remove the stale entry from the cache. It falls through and\nincrements `depth`, queries upstream again, and later (line 677) re-inserts the updated pool.\nHowever, if the upstream query fails (all the `Err` arms at lines 537–547 that call `continue`),\nthe stale cache entry is never evicted. Subsequent iterations of the outer loop will find the\nsame expired entry, log \"cached name server pool expired\", and try again on every label — but\nthe stale entry persists until the LRU cache evicts it, and meanwhile every new query re-checks\nit without benefit. More critically, if `continue` is taken (no zone cut found), `nameserver_pool`\nis NOT updated, so the stale pool remains the working pool for deeper labels.","fix":"When `ns.ttl_expired()` is true, remove the entry from the cache before falling through:\n    let mut cache = self.name_server_cache.lock();\n    cache.remove(&zone);\n    drop(cache);\nThis ensures the stale pool is not used again before a fresh response is received.","locations":[{"ref":"crates/resolver/src/recursor/handle.rs:502-511","code":"  502 |             if let Some(ns) = self.name_server_cache.lock().get_mut(&zone) {\n  503 |                 match ns.ttl_expired() {\n  504 |                     true => debug!(?zone, \"cached name server pool expired\"),\n  505 |                     false => {\n  506 |                         debug!(?zone, \"already have cached name server pool for zone\");\n  507 |                         nameserver_pool = ns.clone();\n  508 |                         continue;\n  509 |                     }\n  510 |                 }\n  511 |             };"},{"ref":"crates/resolver/src/recursor/handle.rs:534-548","code":"  534 |             let response = match lookup_res {\n  535 |                 Ok(response) => response,\n  536 |                 // Short-circuit on NXDOMAIN, per RFC 8020.\n  537 |                 Err(e) if e.is_nx_domain() => return Err(e),\n  538 |                 // Short-circuit on timeouts. Requesting a longer name from the same pool would likely\n  539 |                 // encounter them again.\n  540 |                 Err(e) if e.is_timeout() => return Err(e),\n  541 |                 // The name `zone` is not a zone cut. Return the same pool of name servers again, but do\n  542 |                 // not cache it. If this was recursively called by `ns_pool_for_name()`, the outer call\n  543 |                 // will try again with one more label added to the iterative query name.\n  544 |                 Err(_) => {\n  545 |                     trace!(?zone, \"no zone cut at zone\");\n  546 |                     continue;\n  547 |                 }\n  548 |             };"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `ns_pool_for_name()`, `depth` is incremented for every non-cached zone label (line 514).\nFor a name like `a.b.c.d.e.com.` (6 labels), up to 6 increments may happen in a single call.\nWhen called recursively from `append_ips_from_lookup()` for out-of-bailiwick NS hostnames, the\npassed `depth` is used as a fixed base but the increments accumulate multiplicatively. A\nmoderately long DNS name combined with a few levels of NS referrals can exhaust the\n`ns_recursion_limit` much faster than intended, producing spurious SERVFAIL responses for
