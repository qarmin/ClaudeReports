<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"No validation that bit_offset < 8 in the bits take() parsers. If a caller passes a (input, offset) tuple where offset >= 8, the inner loop initialises `offset = bit_offset` and then evaluates `byte << offset` on a u8 (panics in debug, wraps to 0 in release) and `8 - offset` (usize underflow, panics in debug). The condition `remaining < 8 - offset` also evaluates `8 - offset` with the same risk. Both complete and streaming variants are affected.","fix":"Validate at entry that bit_offset < 8: if bit_offset >= 8 { return Err(from_error_kind(..., ErrorKind::Eof/Incomplete)) }. Alternatively assert/debug_assert the invariant to make the contract explicit.","locations":[{"ref":"src/bits/complete.rs:51-78","code":"   51 |       let cnt = (count + bit_offset).div(8);\n   52 |       let mut acc: O = 0_u8.into();\n   53 |       let mut offset: usize = bit_offset;\n   54 |       let mut remaining: usize = count;\n   55 |       let mut end_offset: usize = 0;\n   56 | \n   57 |       for byte in input.iter_elements().take(cnt + 1) {\n   58 |         if remaining == 0 {\n   59 |           break;\n   60 |         }\n   61 |         let val: O = if offset == 0 {\n   62 |           byte.into()\n   63 |         } else {\n   64 |           ((byte << offset) >> offset).into()\n   65 |         };\n   66 | \n   67 |         if remaining < 8 - offset {\n   68 |           acc += val >> (8 - offset - remaining);\n   69 |           end_offset = remaining + offset;\n   70 |           break;\n   71 |         } else {\n   72 |           acc += val << (remaining - (8 - offset));\n   73 |           remaining -= 8 - offset;\n   74 |           offset = 0;\n   75 |         }\n   76 |       }\n   77 |       Ok(((input.take_from(cnt), end_offset), acc))\n   78 |     }","lines":28},{"ref":"src/bits/streaming.rs:23-55","code":"   23 |       let cnt = (count + bit_offset).div(8);\n   24 |       if input.input_len() * 8 < count + bit_offset {\n   25 |         Err(Err::Incomplete(Needed::new(count)))\n   26 |       } else {\n   27 |         let mut acc: O = 0_u8.into();\n   28 |         let mut offset: usize = bit_offset;\n   29 |         let mut remaining: usize = count;\n   30 |         let mut end_offset: usize = 0;\n   31 | \n   32 |         for byte in input.iter_elements().take(cnt + 1) {\n   33 |           if remaining == 0 {\n   34 |             break;\n   35 |           }\n   36 |           let val: O = if offset == 0 {\n   37 |             byte.into()\n   38 |           } else {\n   39 |             ((byte << offset) >> offset).into()\n   40 |           };\n   41 | \n   42 |           if remaining < 8 - offset {\n   43 |             acc += val >> (8 - offset - remaining);\n   44 |             end_offset = remaining + offset;\n   45 |             break;\n   46 |           } else {\n   47 |             acc += val << (remaining - (8 - offset));\n   48 |             remaining -= 8 - offset;\n   49 |             offset = 0;\n   50 |           }\n   51 |         }\n   52 |         Ok(((input.take_from(cnt), end_offset), acc))\n   53 |       }\n   54 |     }\n   55 |   }","lines":33}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`Finish::finish` panics with a long human-readable message when called on\n`Err(Err::Incomplete(_))`. This is intentional by design and documented, but the panic gives no\nway for the caller to handle it without catching panics. Callers that are not 100% certain the\nparser returned a non-Incomplete result (e.g., after wrapping a streaming parser) will\nexperience a runtime panic. The API provides no non-panicking `try_finish` alternative.","fix":"Add a `try_finish(self) -> Result<Result<(I, O), E>, Err<E>>` (or returning an Option) that\navoids panicking so callers can handle Incomplete gracefully. Keep `finish` for ergonomics but\nprovide the safe escape hatch.","locations":[{"ref":"src/internal.rs:36-46","code":"   36 | impl<I, O, E> Finish<I, O, E> for IResult<I, O, E> {\n   37 |   fn finish(self) -> Result<(I, O), E> {\n   38 |     match self {\n   39 |       Ok(res) => Ok(res),\n   40 |       Err(Err::Error(e)) | Err(Err::Failure(e)) => Err(e),\n   41 |       Err(Err::Incomplete(_)) => {\n   42 |         panic!(\"Cannot call `finish()` on `Err(Err::Incomplete(_))`: this result means that the parser does not have enough data to decide, you should gather more data and try to reapply the parser instead\")\n   43 |       }\n   44 |     }\n   45 |   }\n   46 | }","lines":11}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`HexDisplay::to_hex_from` calls `self.chunks(chunk_size)` unconditionally. The standard\n`slice::chunks` method panics when `chunk_size == 0` with \"chunk size must be positive\".\nThere is no guard before calling it, so any public caller passing 0 (e.g.,\n`some_bytes.to_hex(0)`) will panic.","fix":"Add an early return or panic with a clearer message at the start of the function:\n`assert!(chunk_size > 0, \"chunk_size must be positive\");` or replace with a saturating max\nof 1: `let chunk_size = chunk_size.max(1);`.","locations":[{"ref":"src/traits.rs:1340-1378","code":" 1340 |   fn to_hex_from(&self, chunk_size: usize, from: usize) -> String {\n 1341 |     let mut v = Vec::with_capacity(self.len() * 3);\n 1342 |     let mut i = from;\n 1343 |     for chunk in self.chunks(chunk_size) {\n 1344 |       let s = format!(\"{:08x}\", i);\n 1345 |       for &ch in s.as_bytes().iter() {\n 1346 |         v.push(ch);\n 1347 |       }\n 1348 |       v.push(b'\\t');\n 1349 | \n 1350 |       i += chunk_size;\n 1351 | \n 1352 |       for &byte in chunk {\n 1353 |         v.push(CHARS[(byte >> 4) as usize]);\n 1354 |         v.push(CHARS[(byte & 0xf) as usize]);\n 1355 |         v.push(b' ');\n 1356 |       }\n 1357 |       if chunk_size > chunk.len() {\n 1358 |         for j in 0..(chunk_size - chunk.len()) {\n 1359 |           v.push(b' ');\n 1360 |           v.push(b' ');\n 1361 |           v.push(b' ');\n 1362 |         }\n 1363 |       }\n 1364 |       v.push(b'\\t');\n 1365 | \n 1366 |       for &byte in chunk {\n 1367 |         if matches!(byte, 32..=126 | 128..=255) {\n 1368 |           v.push(byte);\n 1369 |         } else {\n 1370 |           v.push(b'.');\n 1371 |         }\n 1372 |       }\n 1373 |       v.push(b'\\n');\n 1374 |     }\n 1375 | \n 1376 |     String::from_utf8_lossy(&v[..]).into_owned()\n 1377 |   }\n 1378 | }","lines":39}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In `hex_u32` (both `complete.rs` and `streaming.rs`), the accumulation map is:\n\n    digit.to_digit(16).unwrap_or(0) << (k * 4)\n\n`k` is a `usize` and `digit.to_digit(16)` returns `u32`, so the shift is applied\nto a `u32` value by a `usize` amount. In **debug builds** Rust panics on shift\noverflow (shift amount >= 32). With the current 8-character cap (bound `<= 8`)\n`k` runs from 0 to at most 7 and `k * 4` reaches at most 28, which is safe.\n\nHowever, the cap check is `o.input_len() <= 8` (line 1206 complete.rs / line\n1174 streaming.rs), which means **exactly 8 characters** passes through uncapped.\nWith exactly 8 hex chars, `k` via `.rev().enumerate()` iterates 0..7 (max shift\n28). So the panic trigger is not reached with valid ASCII hex input. BUT: the\n`AsChar`-generic API means that if a custom `Input::Item` maps to a char whose\n`as_char()` is a hex digit but whose `to_digit(16)` somehow returns `None`\n(shouldn't happen for ASCII, but is possible for pathological implementations),\n`unwrap_or(0)` silently inserts a zero digit, corrupting the result without any\nerror. This is an incorrect-error-handling issue layered on top of the\noverflow-adjacent design.","fix":"1. Replace `unwrap_or(0)` with an explicit error return so that unexpected None\n   values from `to_digit` surface as parse errors rather than silent corruption.\n2. Assert or document the invariant that the shift amount never reaches 32.","locations":[{"ref":"src/number/complete.rs:1212-1223","code":" 1212 |   let res = parsed\n 1213 |     .as_bytes()\n 1214 |     .iter()\n 1215 |     .rev()\n 1216 |     .enumerate()\n 1217 |     .map(|(k, &v)| {\n 1218 |       let digit = v as char;\n 1219 |       digit.to_digit(16).unwrap_or(0) << (k * 4)\n 1220 |     })\n 1221 |     .sum();\n 1222 | \n 1223 |   Ok((remaining, res))","lines":12},{"ref":"src/number/streaming.rs:1180-1191","code":" 1180 |   let res = parsed\n 1181 |     .as_bytes()\n 1182 |     .iter()\n 1183 |     .rev()\n 1184 |     .enumerate()\n 1185 |     .map(|(k, &v)| {\n 1186 |       let digit = v as char;\n 1187 |       digit.to_digit(16).unwrap_or(0) << (k * 4)\n 1188 |     })\n 1189 |     .sum();\n 1190 | \n 1191 |   Ok((remaining, res))","lines":12}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"The expressions `count + bit_offset` and `input.input_len() * 8` in the take() parsers can overflow usize in both debug mode (panic) and release mode (silent wrap producing a wrong comparison result). A caller supplying a very large count or an extremely large input slice can trigger this. In complete.rs the overflow occurs in the bounds check (line 45) before any other check; in streaming.rs it occurs even earlier (line 23) before the bounds check.","fix":"Use checked arithmetic: count.checked_add(bit_offset) and input.input_len().checked_mul(8), returning an error on overflow instead of letting the addition wrap.","locations":[{"ref":"src/bits/complete.rs:45","code":"   45 |     } else if input.input_len() * 8 < count + bit_offset {","lines":1},{"ref":"src/bits/complete.rs:51","code":"   51 |       let cnt = (count + bit_offset).div(8);","lines":1},{"ref":"src/bits/streaming.rs:23","code":"   23 |       let cnt = (count + bit_offset).div(8);","lines":1},{"ref":"src/bits/streaming.rs:24","code":"   24 |       if input.input_len() * 8 < count + bit_offset {","lines":1}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `le_uint` (mod.rs line 397), the shift amount is computed as `8 * index as u8`.\nDue to Rust operator precedence, this is `8 * (index as u8)`, not\n`(8 * index) as u8`. For index values 0-15 (the current maximum, from `le_u128`\nwith bound=16), the narrowing cast is safe: `15 as u8 = 15` and `8 * 15 = 120`\nfits in u8. However the function is generic over `bound: usize` with no upper-\nbound check. If a caller ever passes a bound > 31 (which would require a `Uint`\ntype supporting shifts > 248), `index as u8` wraps silently in release mode and\nproduces the wrong shift value, corrupting the assembled integer. More concretely,\nfor `bound = 32`, `index = 32 as u8 = 32`, `8 * 32 = 256`, which wraps to 0 as\nu8, making byte 32 shift left by 0 instead of 256 and silently overlay byte 0.","fix":"Use an explicit wider type for the shift: `(8 * index) as u32` (or u64) to avoid\nthe narrowing truncation and make the arithmetic overflow visible. Also add a\ndebug_assert that `bound * 8 <= size_of::<Uint>() * 8`.","locations":[{"ref":"src/number/mod.rs:397","code":"  397 |           res = res + (Uint::from(byte) << (8 * index as u8));","lines":1}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"All four `Offset` implementations compute `snd as usize - fst as usize` with plain subtraction.\nThe doc comment acknowledges this: \"the argument must be a part of self, otherwise this can fail\nwith arithmetic underflows\". In debug builds this panics; in release builds it silently wraps\n(returning a huge positive number). There is no defensive check or even a `debug_assert!`, so\ncallers who accidentally pass the wrong slice order get silent corruption in release mode.","fix":"Add `debug_assert!(snd >= fst, \"second slice must start at or after self\")` before the\nsubtraction, or use `snd.wrapping_sub(fst as usize)` with a checked assertion, or use\n`snd.checked_sub(fst as usize).expect(...)`.","locations":[{"ref":"src/traits.rs:577-582","code":"  577 |   fn offset(&self, second: &Self) -> usize {\n  578 |     let fst = self.as_ptr();\n  579 |     let snd = second.as_ptr();\n  580 | \n  581 |     snd as usize - fst as usize\n  582 |   }","lines":6},{"ref":"src/traits.rs:586-592","code":"  586 |   fn offset(&self, second: &Self) -> usize {\n  587 |     let fst = self.as_ptr();\n  588 |     let snd = second.as_ptr();\n  589 | \n  590 |     snd as usize - fst as usize\n  591 |   }\n  592 | }","lines":7},{"ref":"src/traits.rs:594-600","code":"  594 | impl Offset for str {\n  595 |   fn offset(&self, second: &Self) -> usize {\n  596 |     let fst = self.as_ptr();\n  597 |     let snd = second.as_ptr();\n  598 | \n  599 |     snd as usize - fst as usize\n  600 |   }","lines":7},{"ref":"src/traits.rs:603-610","code":"  603 | impl<'a> Offset for &'a str {\n  604 |   fn offset(&self, second: &Self) -> usize {\n  605 |     let fst = self.as_ptr();\n  606 |     let snd = second.as_ptr();\n  607 | \n  608 |     snd as usize - fst as usize\n  609 |   }\n  610 | }","lines":8}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"EscapedTransform infinite-loop when the normal parser accepts empty input after position 0.\n\nThe zero-progress guard at line 974 compares `i2.input_len() == current_len`, but `current_len` is\nassigned as `input.input_len()` (the *full* original input length, constant throughout the loop),\nwhile `i2` is the result of running `normal` on `remainder = input.take_from(index)`.\nWhen `index > 0`, `remainder` is shorter than `input`, so `i2.input_len()` can never equal\n`current_len` even when `normal` makes zero progress.  The else-branch then recomputes\n`index = input.offset(&i2)`, which returns the same `index`, repeating forever.\n\nBy contrast, `Escaped` (line 772) correctly sets `current_len = i.input_len()` where `i` is the\nrunning cursor, so the comparison always detects stagnation.\n\nThe hang is reproducible whenever:\n  - `normal` can accept empty input (e.g. `alpha0`, `opt(...)`)\n  - a non-control character is encountered after the parser has advanced past position 0","fix":"Replace `let current_len = input.input_len();` with `let current_len = remainder.input_len();` so that the zero-progress check compares i2 against the slice actually passed to normal, matching the pattern used in Escaped.","locations":[{"ref":"src/bytes/mod.rs:958-978","code":"  958 |     while index < input.input_len() {\n  959 |       let current_len = input.input_len();\n  960 |       let remainder = input.take_from(index);\n  961 |       match self.normal.process::<OM>(remainder.clone()) {\n  962 |         Ok((i2, o)) => {\n  963 |           res = OM::Output::combine(o, res, |o, mut res| {\n  964 |             o.extend_into(&mut res);\n  965 |             res\n  966 |           });\n  967 |           if i2.input_len() == 0 {\n  968 |             if OM::Incomplete::is_streaming() {\n  969 |               return Err(Err::Incomplete(Needed::Unknown));\n  970 |             } else {\n  971 |               let index = input.input_len();\n  972 |               return Ok((input.take_from(index), res));\n  973 |             }\n  974 |           } else if i2.input_len() == current_len {\n  975 |             return Ok((remainder, res));\n  976 |           } else {\n  977 |             index = input.offset(&i2);\n  978 |           }","lines":21}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"FoldManyMN returns Err::Error (recoverable) when min > max, but ManyMN returns Err::Failure (unrecoverable/cut) for the same precondition. This inconsistency means a caller that wraps fold_many_m_n in an alt combinator could silently try alternatives when given an invalid range, whereas the equivalent many_m_n would not. The asymmetry makes reasoning about error handling harder and is almost certainly unintentional.","fix":"Change FoldManyMN's min > max guard (line 1317) to return `Err::Failure` to match ManyMN's behavior, or explicitly document the intentional difference.","locations":[{"ref":"src/multi/mod.rs:1316-1320","code":" 1316 |     if self.min > self.max {\n 1317 |       return Err(Err::Error(OM::Error::bind(|| {\n 1318 |         <F as Parser<I>>::Error::from_error_kind(input, ErrorKind::ManyMN)\n 1319 |       })));\n 1320 |     }","lines":5},{"ref":"src/multi/mod.rs:629-634","code":"  629 |     if self.min > self.max {\n  630 |       return Err(Err::Failure(<F as Parser<I>>::Error::from_error_kind(\n  631 |         input,\n  632 |         ErrorKind::ManyMN,\n  633 |       )));\n  634 |     }","lines":6}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Many1's infinite-loop guard emits ErrorKind::Many0 instead of ErrorKind::Many1. When the inner parser succeeds without consuming any input in the continuation loop, the error returned carries the wrong kind, making diagnostics misleading. Many0 uses ErrorKind::Many0 correctly at line 106; the copy in Many1 was not updated.","fix":"Change `ErrorKind::Many0` to `ErrorKind::Many1` in the infinite-loop error path inside `Many1::process`.","locations":[{"ref":"src/multi/mod.rs:209-211","code":"  209 |                 return Err(Err::Error(OM::Error::bind(|| {\n  210 |                   <F as Parser<I>>::Error::from_error_kind(i, ErrorKind::Many0)\n  211 |                 })));","lines":3}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"ManyTill's infinite-loop guard emits ErrorKind::Many0 instead of ErrorKind::ManyTill. When the element parser `f` succeeds without consuming input (after `g` has failed), the error carries the wrong kind. Callers that match on ErrorKind to distinguish stopping conditions will incorrectly interpret this as a many0 issue.","fix":"Change `ErrorKind::Many0` to `ErrorKind::ManyTill` in the infinite-loop error path inside `ManyTill::process`.","locations":[{"ref":"src/multi/mod.rs:313-315","code":"  313 |                 return Err(Err::Error(OM::Error::bind(|| {\n  314 |                   E::from_error_kind(i, ErrorKind::Many0)\n  315 |                 })));","lines":3}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"LengthCount::process computes max_initial_capacity using size_of::<F::Output>() - the output type of the LENGTH parser (e.g. u8, u16) - rather than size_of::<G::Output>() - the output type of the ELEMENT parser that actually fills the Vec. The cap is meant to prevent allocating more than MAX_INITIAL_CAPACITY_BYTES for the Vec's elements, but because the length parser's output is usually a small integer type (often 1 byte), the capacity limit is effectively disabled. For element types that are large (e.g. fat pointers, structs), far more initial memory than intended may be allocated.","fix":"Change the capacity calculation to divide by `crate::lib::std::mem::size_of::<<G as Parser<I>>::Output>().max(1)` so the cap applies to the actual element size being stored in the Vec.","locations":[{"ref":"src/multi/mod.rs:1547-1550","code":" 1547 |         let max_initial_capacity = MAX_INITIAL_CAPACITY_BYTES\n 1548 |           / crate::lib::std::mem::size_of::<<F as Parser<I>>::Output>().max(1);\n 1549 |         let mut res = OM::Output::bind(|| {\n 1550 |           crate::lib::std::vec::Vec::with_capacity(count.min(max_initial_capacity))","lines":4}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `recognize_float_parts` in `complete.rs` (lines 1358-1364) and `streaming.rs`\n(lines 1328-1334), the trailing-zero trimming logic for the fraction part has a\nsubtle edge case. The branch:\n\n    } else if zero_count == position {\n        position - zero_count + 1\n\nfires when every scanned digit is a zero (e.g., fraction \"000\" before a\nnon-digit). It retains one zero, giving `index = 1`. This means \".000e5\" becomes\nfraction = \"0\", which is correct. However the complementary branch:\n\n    } else {\n        position - zero_count\n\ntrims all trailing zeros when there are non-zero digits followed by zeros.\nFor \"1.10\", `position = 2` (stopped at 'e' or end), `zero_count = 1`,\n`index = 1`, giving fraction = \"1\" - correct.\n\nThe problem arises with \"0.0\": `zero_count == position` so `index = 1`.\n`integer` is \"0\" (kept from the leading-zero logic on line 1329/1299), and\n`fraction` is \"0\". This is technically fine numerically but the representation\npassed to `minimal_lexical` (in the commented-out path) would differ from \"0.0\"\n-> fraction \"0\" vs. the intended trimmed form. Since the code path using\n`recognize_float_parts` is currently commented out, the practical impact is zero,\nbut if re-enabled the subtle trimming inconsistency could affect round-trip\naccuracy for numbers like \"0.0000000001\" where leading fraction zeros matter.","fix":"Document the trimming contract precisely, or replace with a clearer two-pass\napproach: first find the end of the digit run, then strip trailing zeros from the\nright. Also add a unit test for edge cases like \"0.0\", \"0.000\", \"0.10\", \"1.000\".","locations":[{"ref":"src/number/complete.rs:1329-1366","code":" 1329 |   if integer.input_len() == 0 && zeroes.input_len() > 0 {\n 1330 |     // keep the last zero if integer is empty\n 1331 |     integer = zeroes.take_from(zeroes.input_len() - 1);\n 1332 |   }\n 1333 | \n 1334 |   let (i, opt_dot) = opt(tag(&b\".\"[..])).parse(i)?;\n 1335 |   let (i, fraction) = if opt_dot.is_none() {\n 1336 |     let i2 = i.clone();\n 1337 |     (i2, i.take(0))\n 1338 |   } else {\n 1339 |     // match number, trim right zeroes\n 1340 |     let mut zero_count = 0usize;\n 1341 |     let mut position = None;\n 1342 |     for (pos, c) in i.as_bytes().iter().enumerate() {\n 1343 |       if *c >= b'0' && *c <= b'9' {\n 1344 |         if *c == b'0' {\n 1345 |           zero_count += 1;\n 1346 |         } else {\n 1347 |           zero_count = 0;\n 1348 |         }\n 1349 |       } else {\n 1350 |         position = Some(pos);\n 1351 |         break;\n 1352 |       }\n 1353 |     }\n 1354 | \n 1355 |     #[allow(clippy::or_fun_call)]\n 1356 |     let position = position.unwrap_or(i.input_len());\n 1357 | \n 1358 |     let index = if zero_count == 0 {\n 1359 |       position\n 1360 |     } else if zero_count == position {\n 1361 |       position - zero_count + 1\n 1362 |     } else {\n 1363 |       position - zero_count\n 1364 |     };\n 1365 | \n 1366 |     (i.take_from(position), i.take(index))","lines":38},{"ref":"src/number/streaming.rs:1297-1336","code":" 1297 |   if integer.input_len() == 0 && zeroes.input_len() > 0 {\n 1298 |     // keep the last zero if integer is empty\n 1299 |     integer = zeroes.take_from(zeroes.input_len() - 1);\n 1300 |   }\n 1301 | \n 1302 |   let (i, opt_dot) = opt(tag(&b\".\"[..])).parse(i)?;\n 1303 |   let (i, fraction) = if opt_dot.is_none() {\n 1304 |     let i2 = i.clone();\n 1305 |     (i2, i.take(0))\n 1306 |   } else {\n 1307 |     // match number, trim right zeroes\n 1308 |     let mut zero_count = 0usize;\n 1309 |     let mut position = None;\n 1310 |     for (pos, c) in i.as_bytes().iter().enumerate() {\n 1311 |       if *c >= b'0' && *c <= b'9' {\n 1312 |         if *c == b'0' {\n 1313 |           zero_count += 1;\n 1314 |         } else {\n 1315 |           zero_count = 0;\n 1316 |         }\n 1317 |       } else {\n 1318 |         position = Some(pos);\n 1319 |         break;\n 1320 |       }\n 1321 |     }\n 1322 | \n 1323 |     let position = match position {\n 1324 |       Some(p) => p,\n 1325 |       None => return Err(Err::Incomplete(Needed::new(1))),\n 1326 |     };\n 1327 | \n 1328 |     let index = if zero_count == 0 {\n 1329 |       position\n 1330 |     } else if zero_count == position {\n 1331 |       position - zero_count + 1\n 1332 |     } else {\n 1333 |       position - zero_count\n 1334 |     };\n 1335 | \n 1336 |     (i.take_from(position), i.take(index))","lines":40}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`compare_no_case` for `&str` uses byte-length comparison (`.len()`) to decide between `Ok` and\n`Incomplete` after doing a character-level zip comparison. When the two strings have equal char\ncounts but different byte lengths (e.g., self = \"k\" (1 byte) vs t = Kelvin sign K U+212A\n(3 bytes)), the zip exhausts both iterators without finding a mismatch, but then\n`self.len() < t.len()` returns `Incomplete` instead of `Ok`. A concrete reproducer: the Unicode\nKelvin sign (U+212A, 3 UTF-8 bytes) should compare equal to ASCII `k` case-insensitively, but\nthe function returns `CompareResult::Incomplete` instead of `CompareResult::Ok`.","fix":"Replace the byte-length completion check with a char-count check:\ncount self.chars().count() and t.chars().count() (or track while zipping), then use those to\ndetermine Ok vs Incomplete instead of comparing `.len()` values.","locations":[{"ref":"src/traits.rs:943-959","code":"  943 |   fn compare_no_case(&self, t: &'b str) -> CompareResult {\n  944 |     let pos = self\n  945 |       .chars()\n  946 |       .zip(t.chars())\n  947 |       .position(|(a, b)| a.to_lowercase().ne(b.to_lowercase()));\n  948 | \n  949 |     match pos {\n  950 |       Some(_) => CompareResult::Error,\n  951 |       None => {\n  952 |         if self.len() >= t.len() {\n  953 |           CompareResult::Ok\n  954 |         } else {\n  955 |           CompareResult::Incomplete\n  956 |         }\n  957 |       }\n  958 |     }\n  959 |   }","lines":17}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The `impl_parser_for_tuple!` macro always uses `OutputM<Emit, OM::Error, OM::Incomplete>` for\nevery sub-parser invocation, forcing each parser to emit its output value even when the overall\nmode is `Check`. The FIXME comment on line 540 acknowledges this: the intermediate output\nvalues are produced and then discarded by `OM::Output::bind`. This means tuple parsers never\nbenefit from the `Check` mode optimization and always allocate/compute all intermediate outputs.","fix":"Propagate `OM::Output` to each sub-parser instead of hardcoding `Emit`. This requires\naccumulating the output only when the output mode is Emit, which may need a two-pass approach\nor a restructured macro to correctly thread the mode through all tuple elements.","locations":[{"ref":"src/internal.rs:537-544","code":"  537 |       fn process<OM: OutputMode>(&mut self, i: I) -> PResult<OM, I, Self::Output, Self::Error> {\n  538 |         let ($(ref mut $parser),+,) = *self;\n  539 | \n  540 |         // FIXME: is there a way to avoid producing the output values?\n  541 |         $(let(i, $output) = $parser.process::<OutputM<Emit, OM::Error, OM::Incomplete>>(i)?;)+\n  542 | \n  543 |         // ???\n  544 |         Ok((i, OM::Output::bind(|| ($($output),+,))))","lines":8}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`FindToken<char> for &[u8]` casts the `char` token to `u8` before comparing:\n`*i == token as u8`. Any `char` with a code point above 255 (e.g., `'€'` = U+20AC) is\nsilently truncated: `'€' as u8 = 0xAC`. The search will then spuriously match the byte 0xAC in\nthe slice rather than the real UTF-8 encoding of the character. This gives wrong results for\nall non-Latin-1 characters.","fix":"Either reject non-ASCII chars (return false if `token as u32 > 127`) or encode the char\nto its UTF-8 bytes and search for the byte sequence. At a minimum, add a check:\n`if token as u32 > 0xFF { return false; }` to prevent silently wrong matches.","locations":[{"ref":"src/traits.rs:1003-1007","code":" 1003 | impl<'a> FindToken<char> for &'a [u8] {\n 1004 |   fn find_token(&self, token: char) -> bool {\n 1005 |     self.iter().any(|i| *i == token as u8)\n 1006 |   }\n 1007 | }","lines":5}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"`complete::le_i8` calls `be_u8` instead of `le_u8`. The function is supposed to\nbe the little-endian signed 1-byte parser, but it delegates to the big-endian\nunsigned byte reader. For a single byte be and le are numerically identical, so\nthere is no observable runtime difference, but the naming is wrong and could\nmislead anyone reading or auditing the code.","fix":"Change `be_u8.map(|x| x as i8)` to `le_u8.map(|x| x as i8)` to match the streaming counterpart and the intent of the function.","locations":[{"ref":"src/number/complete.rs:475","code":"  475 |   be_u8.map(|x| x as i8).parse(input)","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"LengthValue::process constructs Err::Incomplete directly at line 1460 instead of going through OM::Incomplete::incomplete(). Every other combinator in the multi module propagates incomplete errors through the OutputMode machinery (using OM::Incomplete), which allows the same combinator to behave correctly in both streaming and complete modes. Because LengthValue bypasses this, using it with a complete-mode parser (process::<OutputM<Emit, Emit, Complete>>) still returns Err::Incomplete instead of converting it to Err::Error(ErrorKind::Complete), silently breaking complete-mode parsing.","fix":"Replace `Err(Err::Incomplete(Needed::Size(needed)))` with `Err(OM::Incomplete::incomplete(Needed::Size(needed), || E::from_error_kind(i.clone(), ErrorKind::Complete)))` (or equivalent), matching the pattern used by bytes::take and other combinators that respect OM::Incomplete.","locations":[{"ref":"src/multi/mod.rs:1456-1461","code":" 1456 |     if let Some(needed) = length\n 1457 |       .checked_sub(i.input_len())\n 1458 |       .and_then(NonZeroUsize::new)\n 1459 |     {\n 1460 |       Err(Err::Incomplete(Needed::Size(needed)))\n 1461 |     } else {","lines":6}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In src/bits/streaming.rs, cnt = (count + bit_offset) / 8 is computed on line 23 unconditionally, before the bounds check on line 24. This means the potentially-overflowing arithmetic always executes even when the function is about to return Incomplete. The equivalent code in complete.rs correctly computes cnt only after a successful bounds check (line 45 checks first, cnt is on line 51 inside the success branch).","fix":"Move the cnt computation inside the else branch (after the bounds check passes), matching the structure used in complete.rs.","locations":[{"ref":"src/bits/streaming.rs:23-26","code":"   23 |       let cnt = (count + bit_offset).div(8);\n   24 |       if input.input_len() * 8 < count + bit_offset {\n   25 |         Err(Err::Incomplete(Needed::new(count)))\n   26 |       } else {","lines":4}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"bits::streaming::take() returns Err(Err::Incomplete(Needed::new(count))) where count is measured in BITS, not bytes. This violates the standard nom contract that Needed::Size represents additional bytes required. The bits() wrapper in mod.rs compensates by dividing by 8 (line 54), so using streaming::take through bits() works correctly. However, any other consumer of Incomplete from bits::streaming (e.g., combinators that inspect the Needed count directly, or custom wrappers) will misinterpret the value as bytes, silently requesting the wrong amount of additional input.","fix":"Document clearly that the Needed value from bits::streaming is in bits, not bytes, and is only meaningful when consumed by the bits() wrapper. Alternatively, compute and return the byte-level Needed directly (ceil((count + bit_offset) / 8) - input.input_len()) so the value has standard semantics.","locations":[{"ref":"src/bits/streaming.rs:25","code":"   25 |         Err(Err::Incomplete(Needed::new(count)))","lines":1},{"ref":"src/bits/mod.rs:54","code":"   54 |     Err(Err::Incomplete(n)) => Err(Err::Incomplete(n.map(|u| u.get() / 8 + 1))),","lines":1}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `streaming::crlf`, when `compare(\"\\r\\n\")` returns `CompareResult::Incomplete` (meaning the input is a strict prefix of `\"\\r\\n\"`, i.e. a single `\\r` byte), the function returns `Err(Err::Incomplete(Needed::new(2)))`. `Needed::Size` is documented to hold the number of bytes *still needed*, not the total. With one byte already in hand the caller only needs 1 more byte, so the correct value is `Needed::new(2 - input.input_len())`. Returning 2 instead of 1 causes any caller that uses the `Needed` size to over-allocate or incorrectly compute buffer sizes.","fix":"Replace `Needed::new(2)` with `Needed::new(2 - input.input_len())` so the `Needed` value accurately reflects the additional bytes required.","locations":[{"ref":"src/character/streaming.rs:130-130","code":"  130 |     CompareResult::Incomplete => Err(Err::Incomplete(Needed::new(2))),","lines":1}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `streaming::line_ending`, the inner branch that compares `\"\\r\\n\"` returns `Err(Err::Incomplete(Needed::new(2)))` when the comparison is `Incomplete`. At that point the input already contains `\\r` (1 byte), so only 1 more byte is needed, not 2. The same off-by-one as in `streaming::crlf` applies here.","fix":"Replace `Needed::new(2)` with `Needed::new(2 - input.input_len())` in the `CompareResult::Incomplete` arm of the inner `\"\\r\\n\"` match.","locations":[{"ref":"src/character/streaming.rs:209-209","code":"  209 |         CompareResult::Incomplete => Err(Err::Incomplete(Needed::new(2))),","lines":1}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `streaming::recognize_float_parts` (streaming.rs line 1323-1326), when the\nfraction scanning loop reaches the end of input without finding a non-digit\ndelimiter, the code returns `Err::Incomplete(Needed::new(1))`. This is correct for\nstreaming semantics. However in `complete::recognize_float_parts` (complete.rs\nlines 1355-1357), the equivalent case uses `position.unwrap_or(i.input_len())`,\nconsuming all remaining bytes as the fraction - which is also correct for complete\nmode. The asymmetry is intentional.\n\nThe actual error is that `streaming::recognize_float_parts` returns `Incomplete`\neven when the fraction portion is syntactically complete (e.g., input is\n\"1.5\" with no trailing data). Any string float ending with a digit (not followed\nby 'e'/'E' or another non-digit) will always return `Incomplete` in streaming\nmode, making `streaming::float` / `streaming::double` unusable on any input that\nends with a digit without a sentinel character. The fix is the responsibility of\nthe *caller* to append a sentinel, but the documentation does not mention this\ncritical constraint.","fix":"Document prominently in the `streaming::float` and `streaming::double` doc-\ncomments that the input MUST be followed by a non-digit non-exponent character\n(e.g., a semicolon or whitespace) when used in streaming mode, otherwise the\nparser will always return `Incomplete`. Alternatively, detect end-of-fraction\nreliably by peeking at the next byte.","locations":[{"ref":"src/number/streaming.rs:1323-1326","code":" 1323 |     let position = match position {\n 1324 |       Some(p) => p,\n 1325 |       None => return Err(Err::Incomplete(Needed::new(1))),\n 1326 |     };","lines":4}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the precedence() parser, all fold() error paths (postfix reduction loop, binary reduction loop, and final drain loop) attach the error to `i` (the input position at the START of the current main-loop iteration) rather than `i1` (the current parse position). This means that when fold returns Err, the reported error position is behind where the failing operator actually appeared, making error messages misleading.","fix":"Use i1 (the current position) instead of i (the start-of-iteration position) in from_external_error() calls inside the postfix and binary fold loops. In the final drain loop i and i1 are already identical so no change is needed there.","locations":[{"ref":"nom-language/src/precedence/mod.rs:273-279","code":"  273 |               let result = match fold(operation) {\n  274 |                 Err(e) => {\n  275 |                   return Err(Err::Error(E::from_external_error(\n  276 |                     i,\n  277 |                     ErrorKind::Precedence,\n  278 |                     e,\n  279 |                   )))","lines":7},{"ref":"nom-language/src/precedence/mod.rs:313-319","code":"  313 |             let result = match fold(operation) {\n  314 |               Err(e) => {\n  315 |                 return Err(Err::Error(E::from_external_error(\n  316 |                   i,\n  317 |                   ErrorKind::Precedence,\n  318 |                   e,\n  319 |                 )))","lines":7},{"ref":"nom-language/src/precedence/mod.rs:350-357","code":"  350 |       let result = match fold(operation) {\n  351 |         Ok(r) => r,\n  352 |         Err(e) => {\n  353 |           return Err(Err::Error(E::from_external_error(\n  354 |             i,\n  355 |             ErrorKind::Precedence,\n  356 |             e,\n  357 |           )))","lines":8}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"The `not` combinator passes the caller's full `OM` output mode to its inner parser, causing it to build and allocate an output value that is immediately thrown away on success (the `Ok(_)` arm discards the output entirely).\n\nCombinators like `recognize` and `opt` correctly use `OutputM<Check, ...>` when they do not need the inner parser's output. `not` should do the same for both the output and error slots, since both are discarded.","fix":"Call the inner parser as `self.parser.process::<OutputM<Check, Check, OM::Incomplete>>(input)` so no output or error value is allocated when the inner parser succeeds (and when it fails, the error is already discarded by the `Err(Err::Error(_)) =>` arm).","locations":[{"ref":"src/combinator/mod.rs:604-613","code":"  604 |   fn process<OM: OutputMode>(&mut self, input: I) -> PResult<OM, I, Self::Output, Self::Error> {\n  605 |     let i = input.clone();\n  606 |     match self.parser.process::<OM>(input) {\n  607 |       Ok(_) => Err(Err::Error(OM::Error::bind(|| {\n  608 |         <F as Parser<I>>::Error::from_error_kind(i, ErrorKind::Not)\n  609 |       }))),\n  610 |       Err(Err::Error(_)) => Ok((i, OM::Output::bind(|| ()))),\n  611 |       Err(e) => Err(e),\n  612 |     }\n  613 |   }","lines":10}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Many0 and Many1 hard-code an initial Vec capacity of 4 without any element-size guard. All other vec-producing combinators (count, many_m_n, length_count) divide MAX_INITIAL_CAPACITY_BYTES by the element size to cap the initial allocation. For parsers whose output type is large (e.g. a large tuple or struct), many0/many1 may wastefully pre-allocate 4 * size_of::<Output> bytes even when the parser is likely to match only 0-1 times.","fix":"Apply the same `MAX_INITIAL_CAPACITY_BYTES / size_of::<Output>().max(1)` cap used by the count and many_m_n combinators when choosing the initial Vec capacity.","locations":[{"ref":"src/multi/mod.rs:92","code":"   92 |     let mut acc = OM::Output::bind(|| crate::lib::std::vec::Vec::with_capacity(4));","lines":1},{"ref":"src/multi/mod.rs:190-191","code":"  190 |           let mut acc = crate::lib::std::vec::Vec::with_capacity(4);\n  191 |           acc.push(o);","lines":2}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Count::process clones the incoming `i` at line 902 (`let mut input = i.clone()`) solely to preserve `i` for the error-reporting closure at line 921. Since `i` is already owned (passed by value), the clone is the only way to keep it for later use - but an identical pattern in Fill::process (line 985) and LengthCount::process (line 1546) means every call site pays a clone even when no error occurs. The clone could be avoided by capturing the error position lazily: move `i` into `input` directly and, on error, use `input` (which still points to the iteration-start position) for error reporting instead.","fix":"Move `i` directly into `input` (no clone). On the error branch, use `input` as the error position, since `input` was updated only after a successful parse and still reflects the position where the failing iteration started.","locations":[{"ref":"src/multi/mod.rs:901-902","code":"  901 |   fn process<OM: OutputMode>(&mut self, i: I) -> crate::PResult<OM, I, Self::Output, Self::Error> {\n  902 |     let mut input = i.clone();","lines":2},{"ref":"src/multi/mod.rs:984-985","code":"  984 |   fn process<OM: OutputMode>(&mut self, i: I) -> crate::PResult<OM, I, Self::Output, Self::Error> {\n  985 |     let mut input = i.clone();","lines":2},{"ref":"src/multi/mod.rs:1545-1546","code":" 1545 |         let count = count.to_usize();\n 1546 |         let mut input = i.clone();","lines":2}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`HexDisplay::to_hex_from` pre-allocates with `Vec::with_capacity(self.len() * 3)`. The actual\noutput is significantly larger: each chunk contributes 9 address bytes + 1 tab + 3 bytes per\ndata byte + 1 tab + 1 byte per data byte + 1 newline. For the default chunk size of 8 that\nis ~43 bytes for 8 input bytes (~5.4x), while the allocation ratio is 3x. This causes\nreallocation on all but tiny inputs.","fix":"Use a tighter capacity estimate: `self.len() * 4 + (self.len() / chunk_size + 1) * 12` or\nsimply bump the multiplier to at least 6.","locations":[{"ref":"src/traits.rs:1341","code":" 1341 |     let mut v = Vec::with_capacity(self.len() * 3);","lines":1}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"medium","easy":false,"description":"`recognize_float_parts` is exported in both `complete` and `streaming`, but the\nonly callers (inside `float` and `double`) have been commented out in favour of a\n`recognize_float_or_exceptions` + `parse_to` approach. The function body is never\nreached through any non-commented call site. Keeping it public inflates the API\nsurface and forces users to rely on an untested, unmaintained code path.","fix":"Either remove `recognize_float_parts` or, if it is intentionally kept for user use, restore or add tests and document that the `minimal_lexical` migration was abandoned.","locations":[{"ref":"src/number/complete.rs:1304-1387","code":" 1304 | pub fn recognize_float_parts<T, E: ParseError<T>>(input: T) -> IResult<T, (bool, T, T, i32), E>\n 1305 | where\n 1306 |   T: Clone + Offset,\n 1307 |   T: Input,\n 1308 |   <T as Input>::Item: AsChar,\n 1309 |   T: for<'a> Compare<&'a [u8]>,\n 1310 |   T: AsBytes,\n 1311 | {\n 1312 | ","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"The `many` combinator (line 1713) uses `self.range.bounded_iter()`, which for an unbounded range like `0..` yields exactly `usize::MAX` iterations before the for loop terminates naturally, capping results at `usize::MAX - 1`. The `fold` combinator (line 1841) uses `self.range.saturating_iter()`, which saturates at `usize::MAX` indefinitely and relies on an error/break to stop. This means `many(0.., parser)` can collect at most `usize::MAX - 1` elements, while `fold(0.., parser, ...)` can accumulate more. The inconsistency silently imposes a different semantic ceiling on two combinators that are supposed to be equivalent.","fix":"Either use `saturating_iter` in both (with the break path as the exit), or document the distinction explicitly. The `fold` approach is more uniform.","locations":[{"ref":"src/multi/mod.rs:1713","code":" 1713 |     for count in self.range.bounded_iter() {","lines":1},{"ref":"src/multi/mod.rs:1841","code":" 1841 |     for count in self.range.saturating_iter() {","lines":1}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`src/traits.rs` is 1682 lines and mixes several distinct responsibilities: the `Input` parsing\ntrait (with full specialised implementations for `&[u8]` and `&str` that individually repeat\nall `split_at_position*` and `split_at_position_mode*` variants), character classification\n(`AsChar`), comparison (`Compare`), token search (`FindToken`, `FindSubstring`), numeric\nconversion helpers (`ToUsize`, `ExtendInto`), debug display (`HexDisplay`), and range\nabstractions (`NomRange`, `SaturatingIterator`). This makes the file hard to navigate and\nviolates single-responsibility expectations for a core module.","fix":"Split into focused sub-modules: e.g., `traits/input.rs`, `traits/char.rs`,\n`traits/compare.rs`, `traits/range.rs`, `traits/hex.rs`, re-exporting from `traits/ <script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: 'text/markdown'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
