<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"CancelToken::cancel_query() builds a new Tokio runtime with .unwrap() (same FIXME comment as Config::connect). Runtime creation can fail under OS resource pressure and will panic instead of returning an Err to the caller, which is especially bad here because cancel_query is often called from a separate thread as a last-resort operation.","fix":"Return the runtime build error as an io::Error or tokio_postgres::Error instead of panicking. e.g.: `runtime::Builder::new_current_thread().enable_all().build().map_err(|e| Error::from(io::Error::from(e)))?.block_on(...)`","locations":[{"ref":"postgres/src/cancel_token.rs:29-32","code":"   29 |         runtime::Builder::new_current_thread()\n   30 |             .enable_all()\n   31 |             .build()\n   32 |             .unwrap() // FIXME don't unwrap","lines":4}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"Config::connect() calls runtime::Builder::new_current_thread().enable_all().build().unwrap() with a FIXME comment acknowledging the problem. Runtime creation can fail under OS resource pressure (e.g., epoll_create exhaustion) and will panic the calling thread instead of returning an error to the caller.","fix":"Propagate the runtime build error: change `.unwrap()` to `.map_err(|e| Error::__private_api_timeout())?` or introduce a dedicated error variant. Match the pattern used elsewhere in the codebase for IO errors.","locations":[{"ref":"postgres/src/config.rs:460-463","code":"  460 |         let runtime = runtime::Builder::new_current_thread()\n  461 |             .enable_all()\n  462 |             .build()\n  463 |             .unwrap(); // FIXME don't unwrap","lines":4}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`Client::__private_api_rollback` calls `frontend::query(...).unwrap()` on lines 779 and 781. This function is called from `Transaction::drop` (via the Drop impl which calls `__private_api_rollback`). A panic inside Drop causes process abort. An oversized savepoint name or query string could trigger this.","fix":"Return early or log+swallow the error instead of unwrapping. The error path in Drop must never panic.","locations":[{"ref":"tokio-postgres/src/client.rs:779-781","code":"  779 |             } else {\n  780 |                 frontend::query(\"ROLLBACK\", buf).unwrap();\n  781 |             }","lines":3}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"The `ToSql` domain body generated by `#[derive(ToSql)]` for single-field tuple structs contains `_ => unreachable!()` when the type's `Kind` is not `Domain`. This panics at runtime if `to_sql` is called directly (bypassing `to_sql_checked!`) with a non-domain type. In contrast, the `FromSql` domain body handles this gracefully by falling back to the original type (`_ => _type`). The asymmetry means direct use of `to_sql` on a derived domain type with a non-domain postgres `Type` will panic.","fix":"Mirror the `FromSql` approach: change `_ => unreachable!()` to `_ => _type` so the inner `ToSql::to_sql` is called with the original type, matching `from_sql` behavior and eliminating the panic.","locations":[{"ref":"postgres-derive/src/tosql.rs:160-168","code":"  160 | fn domain_body() -> TokenStream {\n  161 |     quote! {\n  162 |         let type_ = match *_type.kind() {\n  163 |             postgres_types::Kind::Domain(ref type_) => type_,\n  164 |             _ => unreachable!(),\n  165 |         };\n  166 | \n  167 |         postgres_types::ToSql::to_sql(&self.0, type_, buf)\n  168 |     }","lines":9},{"ref":"postgres-derive/src/fromsql.rs:179-187","code":"  179 | fn domain_body(ident: &Ident, field: &syn::Field) -> TokenStream {\n  180 |     let ty = &field.ty;\n  181 |     quote! {\n  182 |         <#ty as postgres_types::FromSql>::from_sql(match *_type.kind() {\n  183 |             postgres_types::Kind::Domain(ref _type) => _type,\n  184 |             _ => _type\n  185 |         }, buf).map(#ident)\n  186 |     }\n  187 | }","lines":9}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"ScramSha256::message() panics (via explicit panic!) when called after the state machine has transitioned to the Done state. This is a hard panic rather than a returned error, making it impossible for callers to handle the misuse gracefully. Any bug in a SASL exchange state machine that causes an extra call to message() will crash the process.","fix":"Return Option<&[u8]> or Result<&[u8], io::Error> instead of panicking. Change `panic!(\"invalid SCRAM state\")` to `return None` or `return Err(io::Error::other(\"invalid SCRAM state\"))`.","locations":[{"ref":"postgres-protocol/src/authentication/sasl.rs:175-179","code":"  175 |     pub fn message(&self) -> &[u8] {\n  176 |         if let State::Done = self.state {\n  177 |             panic!(\"invalid SCRAM state\");\n  178 |         }\n  179 |         self.message.as_bytes()","lines":5}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"The deprecated ErrorField::value() method (deprecated since 0.6.7) calls .expect() on str::from_utf8, which will panic if the PostgreSQL server sends non-UTF-8 bytes in an error field. A misbehaving or adversarial server can trigger this panic in any code path that iterates error response fields and calls the old method.","fix":"The safe replacement value_bytes() already exists. The deprecated method should be removed or changed to return Result<&str, io::Error> to avoid the panic. Since it is already deprecated, an accelerated removal policy should be applied.","locations":[{"ref":"postgres-protocol/src/message/backend.rs:654-659","code":"  654 |     #[inline]\n  655 |     #[deprecated(note = \"use value_bytes instead\", since = \"0.6.7\")]\n  656 |     pub fn value(&self) -> &str {\n  657 |         str::from_utf8(self.value).expect(\"error field value contained non-UTF8 bytes\")\n  658 |     }\n  659 | ","lines":6}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `Inner::drop` in portal.rs, `frontend::close(b'P', &self.name, buf).unwrap()` is called inside a `Drop` impl. Same risk as the statement drop - a panic in `Drop` causes a process abort.","fix":"Replace `.unwrap()` with error logging and a no-op fallback, matching the fix for StatementInner::drop.","locations":[{"ref":"tokio-postgres/src/portal.rs:17-17","code":"   17 |             let buf = client.with_buf(|buf| {","lines":1}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `extract_row_affected`, the `tag().rsplit(' ').next()` call is followed by `.unwrap()`. While `rsplit(' ').next()` on a non-empty string can never return `None` (it always yields at least one element), the empty string from `tag()` would return Some(\"\"), which then silently parses to 0 via `unwrap_or(0)`. The real issue is the `.unwrap()` on the parse result is masked by `unwrap_or(0)` but only after the intermediate `.unwrap()` on `rsplit().next()` which panics if `tag()` returns an empty slice (it does not today, but the invariant is undocumented and the code relies on it silently).","fix":"Replace the chained `.unwrap()` with `?` propagation or an explicit error: `let tag = body.tag().map_err(Error::parse)?; let rows = tag.rsplit(' ').next().and_then(|s| s.parse().ok()).unwrap_or(0); Ok(rows)`.","locations":[{"ref":"tokio-postgres/src/query.rs:197-205","code":"  197 |     let rows = body\n  198 |         .tag()\n  199 |         .map_err(Error::parse)?\n  200 |         .rsplit(' ')\n  201 |         .next()\n  202 |         .unwrap()\n  203 |         .parse()\n  204 |         .unwrap_or(0);\n  205 |     Ok(rows)","lines":9}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In `StatementInner::drop`, `frontend::close(b'S', &self.name, buf).unwrap()` is called. `frontend::close` returns an `io::Result`. Calling `.unwrap()` inside `Drop` will abort the process (panicking in a destructor causes an abort) if the close message cannot be encoded, for example if the statement name is too long for the protocol buffer.","fix":"Replace `.unwrap()` with error logging and a no-op fallback: `if let Err(e) = frontend::close(b'S', &self.name, buf) { /* log or ignore */ return; }`.","locations":[{"ref":"tokio-postgres/src/statement.rs:23-23","code":"   23 |                 frontend::close(b'S', &self.name, buf).unwrap();","lines":1}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Message::parse() in backend.rs calls .unwrap() on (&buf[1..5]).read_u32::<BigEndian>() at line 120. While this particular call cannot panic in practice (the code checks buf.len() >= 5 on line 113 and byteorder's read_u32 is infallible on a 4-byte slice), the .unwrap() call obscures the invariant and could silently become dangerous if the prior length check is ever refactored or reordered.","fix":"Use the fallible read path and propagate the error: replace the unwrap with `?` so any future code movement near the check does not introduce a latent panic. Alternatively add a clear safety comment explaining why the unwrap is guaranteed.","locations":[{"ref":"postgres-protocol/src/message/backend.rs:119-121","code":"  119 |         let tag = buf[0];\n  120 |         let len = (&buf[1..5]).read_u32::<BigEndian>().unwrap();\n  121 | ","lines":3}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The `FromSql` impl for `Vec<T>` (line 600) and for `[T; N]` (line 627) and the `ToSql` impl for `&[T]` (line 1005) contain `panic!(\"expected array type\")` in their hot paths. While the `accepts()` method correctly rejects non-array types, calling `from_sql` or `to_sql` directly (bypassing `to_sql_checked!` or the `accepts` check) with a non-array type will panic rather than returning an error. This is a latent panic for any code that calls these trait methods directly.","fix":"Replace the `panic!` calls with `return Err(\"expected array type\".into())` to propagate errors instead of panicking.","locations":[{"ref":"postgres-types/src/lib.rs:598-602","code":"  598 |         let member_type = match *ty.kind() {\n  599 |             Kind::Array(ref member) => member,\n  600 |             _ => panic!(\"expected array type\"),\n  601 |         };\n  602 | ","lines":5},{"ref":"postgres-types/src/lib.rs:624-628","code":"  624 |     fn from_sql(ty: &Type, raw: &'a [u8]) -> Result<Self, Box<dyn Error + Sync + Send>> {\n  625 |         let member_type = match *ty.kind() {\n  626 |             Kind::Array(ref member) => member,\n  627 |             _ => panic!(\"expected array type\"),\n  628 |         };","lines":5},{"ref":"postgres-types/src/lib.rs:1003-1006","code":" 1003 |         let member_type = match *ty.kind() {\n 1004 |             Kind::Array(ref member) => member,\n 1005 |             _ => panic!(\"expected array type\"),\n 1006 |         };","lines":4}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In the `ToSql` impl for `SystemTime`, the closure `to_usec` computes `d.as_secs() * USEC_PER_SEC` (where `USEC_PER_SEC = 1_000_000`) using unchecked u64 multiplication. For timestamps more than ~584,942 years past the epoch this overflows u64 silently in release builds (panics in debug). The result is then cast to i64 via `as`, producing a silently wrong timestamp value instead of an error.","fix":"Use `.checked_mul()` on the seconds and return an error if overflow occurs, e.g.: `let usec = d.as_secs().checked_mul(USEC_PER_SEC).and_then(|us| us.checked_add(u64::from(d.subsec_nanos()) / NSEC_PER_USEC)).ok_or(\"value too large to transmit\")?; let time = i64::try_from(usec).map_err(|_| \"value too large to transmit\")?;`","locations":[{"ref":"postgres-types/src/lib.rs:1245-1251","code":" 1245 |         let to_usec =\n 1246 |             |d: Duration| d.as_secs() * USEC_PER_SEC + u64::from(d.subsec_nanos()) / NSEC_PER_USEC;\n 1247 | \n 1248 |         let time = match self.duration_since(epoch) {\n 1249 |             Ok(duration) => to_usec(duration) as i64,\n 1250 |             Err(e) => -(to_usec(e.duration()) as i64),\n 1251 |         };","lines":7}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `binary_copy.rs`, `write_raw` casts `this.types.len()` to `i16` without bounds checking: `this.buf.put_i16(this.types.len() as i16)`. If a table has more than 32767 columns (pathological but possible in theory), this silently truncates the field count written to the binary copy header, causing the server to reject or misparse the payload.","fix":"Add a bounds check: `let ncols = i16::try_from(this.types.len()).map_err(|e| Error::encode(io::Error::new(io::ErrorKind::InvalidInput, e)))?; this.buf.put_i16(ncols);`","locations":[{"ref":"tokio-postgres/src/binary_copy.rs:77-77","code":"   77 |         this.buf.put_i16(this.types.len() as i16);","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the derived `FromSql` for composite types (generated by `composite_body` in `fromsql.rs`), the match on `field.name()` contains `_ => unreachable!()` at line 227. This branch fires when the server's composite type reports a field name that is not present in the Rust struct. Although `accepts()` is meant to validate the type matches before `from_sql` is called, the server's type definition can change between when `accepts()` is evaluated (at statement prepare time) and when `from_sql` is called (at row fetch time) - causing a runtime panic instead of a recoverable error.","fix":"Change `_ => unreachable!()` to `_ => return Err(format!(\"unexpected composite field \\\"{}\\\"\" , field.name()).into())` to return an error instead of panicking.","locations":[{"ref":"postgres-derive/src/fromsql.rs:197-228","code":"  197 |     quote! {\n  198 |         let fields = match *_type.kind() {\n  199 |             postgres_types::Kind::Composite(ref fields) => fields,\n  200 |             _ => unreachable!(),\n  201 |         };\n  202 | \n  203 |         let mut buf = buf;\n  204 |         let num_fields = postgres_types::private::read_be_i32(&mut buf)?;\n  205 |         if num_fields as usize != fields.len() {\n  206 |             return std::result::Result::Err(\n  207 |                 std::convert::Into::into(format!(\"invalid field count: {} vs {}\", num_fields, fields.len())));\n  208 |         }\n  209 | \n  210 |         #(\n  211 |             let mut #temp_vars = std::option::Option::None;\n  212 |         )*\n  213 | \n  214 |         for field in fields {\n  215 |             let oid = postgres_types::private::read_be_i32(&mut buf)? as u32;\n  216 |             if oid != field.type_().oid() {\n  217 |                 return std::result::Result::Err(std::convert::Into::into(\"unexpected OID\"));\n  218 |             }\n  219 | \n  220 |             match field.name() {\n  221 |                 #(\n  222 |                     #field_names => {\n  223 |                         #temp_vars = std::option::Option::Some(\n  224 |                             postgres_types::private::read_value(field.type_(), &mut buf)?);\n  225 |                     }\n  226 |                 )*\n  227 |                 _ => unreachable!(),\n  228 |             }","lines":32}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"SCRAM update() only rejects iteration_count > MAX_ITERATION_COUNT but does not reject iteration_count == 0. RFC 5802 mandates the iteration count MUST be a positive integer (>= 1). When i=0, hi() skips the accumulation loop and returns U1 (the first PBKDF2 block) instead of the all-zeros value the spec implies. A malicious server can send i=0 to effectively eliminate all password key-stretching, making the derived key as weak as a single HMAC round rather than thousands of rounds. The check should be `parsed.iteration_count < 1 || parsed.iteration_count > MAX_ITERATION_COUNT`.","fix":"Change the condition at line 205 to: `if parsed.iteration_count < 1 || parsed.iteration_count > MAX_ITERATION_COUNT`. This rejects the i=0 case and matches RFC 5802 requirements.","locations":[{"ref":"postgres-protocol/src/authentication/sasl.rs:205-210","code":"  205 |         if parsed.iteration_count > MAX_ITERATION_COUNT {\n  206 |             return Err(io::Error::new(\n  207 |                 io::ErrorKind::InvalidInput,\n  208 |                 \"SCRAM iteration count exceeds the maximum allowed\",\n  209 |             ));\n  210 |         }","lines":6},{"ref":"postgres-protocol/src/authentication/sasl.rs:48-68","code":"   48 | pub(crate) fn hi(str: &[u8], salt: &[u8], i: u32) -> [u8; 32] {\n   49 |     let mut hmac =\n   50 |         Hmac::<Sha256>::new_from_slice(str).expect(\"HMAC is able to accept all key sizes\");\n   51 |     hmac.update(salt);\n   52 |     hmac.update(&[0, 0, 0, 1]);\n   53 |     let mut prev = hmac.finalize().into_bytes();\n   54 | \n   55 |     let mut hi = prev;\n   56 | \n   57 |     for _ in 1..i {\n   58 |         let mut hmac = Hmac::<Sha256>::new_from_slice(str).expect(\"already checked above\");\n   59 |         hmac.update(&prev);\n   60 |         prev = hmac.finalize().into_bytes();\n   61 | \n   62 |         for (hi, prev) in hi.iter_mut().zip(prev) {\n   63 |             *hi ^= prev;\n   64 |         }\n   65 |     }\n   66 | \n   67 |     hi.into()\n   68 | }","lines":21}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `binary_copy.rs`, `BinaryCopyOutStream::poll_next` when the raw stream returns `None` (i.e. normal end of CopyOutStream), it returns `Poll::Ready(Some(Err(Error::closed())))` instead of `Poll::Ready(None)`. The CopyOutStream already emits `None` on `CopyDone`, so the outer stream reaching `None` means an unexpected close. However, if `CopyDone` was consumed by `CopyOutStream` as `None`, control never reaches here, meaning this arm fires only on a genuine premature close - but the error kind (`closed`) is misleading; a better error would be `parse` with a message about truncated binary copy data.","fix":"Return `Poll::Ready(Some(Err(Error::parse(io::Error::new(io::ErrorKind::UnexpectedEof, \"unexpected end of binary copy stream\")))))` to give callers a more actionable error.","locations":[{"ref":"tokio-postgres/src/binary_copy.rs:147-148","code":"  147 |             None => return Poll::Ready(Some(Err(Error::closed()))),\n  148 |         };","lines":2}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `connect_tls.rs`, when `SslMode::Require` is set but `has_hostname` is false (e.g., connecting by raw IP without a hostname), the function returns `Err(Error::tls(\"no hostname provided for TLS handshake\"))` after successfully completing the SSL negotiation with the server. This means `SslMode::Require` connections to bare IP addresses without a hostname always fail even if no certificate verification is needed. `SslMode::Prefer` falls through the same path identically.","fix":"Consider separating the hostname check from the TLS requirement: only fail if the TLS backend itself requires a hostname (checked via a TlsConnect capability). Alternatively, document this limitation clearly.","locations":[{"ref":"tokio-postgres/src/connect_tls.rs:50-52","code":"   50 |     if !has_hostname {\n   51 |         return Err(Error::tls(\"no hostname provided for TLS handshake\".into()));\n   52 |     }","lines":3}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `connection.rs`, `poll_read` handles the case where `self.responses` is empty and a `BackendMessage::Normal` arrives. If the first message in that batch is not an `ErrorResponse` it falls through to `_ => return Err(Error::unexpected_message())`. However if the first message IS an `ErrorResponse` the error is surfaced as a fatal connection error. This means any server-sent error that arrives out-of-band without a matching pending request (for example, an error on an implicit transaction) tears down the entire connection rather than being routed as a query error. While this edge case is rare in practice, it means dropped/aborted pipelines can kill the connection.","fix":"Consider pushing such orphan errors to a pending-error queue that can be drained on the next request, or at least log the error and continue rather than treating it as a fatal connection error.","locations":[{"ref":"tokio-postgres/src/connection.rs:138-144","code":"  138 |             let mut response = match self.responses.pop_front() {\n  139 |                 Some(response) => response,\n  140 |                 None => match messages.next().map_err(Error::parse)? {\n  141 |                     Some(Message::ErrorResponse(error)) => return Err(Error::db(error)),\n  142 |                     _ => return Err(Error::unexpected_message()),\n  143 |                 },\n  144 |             };","lines":7}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"path_from_sql() reads the point count as i32 but does not validate that it is non-negative. A malformed server message with a negative count stores it as-is in Path::points. When PathPoints::size_hint() is later called, it casts i32 to usize without a sign check, producing a near-maximum usize value (e.g., -1i32 as usize = 18446744073709551615 on 64-bit). Code that relies on size_hint for pre-allocation (e.g., FallibleIterator::collect) will attempt to allocate an enormous vector and immediately OOM-abort or exhaust the heap.","fix":"Validate the point count in path_from_sql: add `if points < 0 { return Err(\"invalid path point count\".into()); }` after reading it. Alternatively, store the count as u32 and cast at read time.","locations":[{"ref":"postgres-protocol/src/types/mod.rs:914-923","code":"  914 | pub fn path_from_sql(mut buf: &[u8]) -> Result<Path<'_>, StdBox<dyn Error + Sync + Send>> {\n  915 |     let closed = buf.read_u8()? != 0;\n  916 |     let points = buf.read_i32::<BigEndian>()?;\n  917 | \n  918 |     Ok(Path {\n  919 |         closed,\n  920 |         points,\n  921 |         buf,\n  922 |     })\n  923 | }","lines":10},{"ref":"postgres-protocol/src/types/mod.rs:971-980","code":"  971 | \n  972 |         Ok(Some(Point { x, y }))\n  973 |     }\n  974 | \n  975 |     #[inline]\n  976 |     fn size_hint(&self) -> (usize, Option<usize>) {\n  977 |         let len = self.remaining as usize;\n  978 |         (len, Some(len))\n  979 |     }\n  980 | }","lines":10}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `binary_copy.rs`, the `has_oids` path in `poll_next` increments `len` by 1 (`len += 1`) to account for the OID column before comparing against `this.types.len()`. However, the user-provided `types` slice never includes an OID type, so when `has_oids` is true the column count check always fails unless the caller has added an extra phantom type. PostgreSQL has deprecated OID columns and modern servers never set this flag, but the code is still subtly wrong.","fix":"Document that OID columns are unsupported (or skip the OID value after reading it without counting it against the type list).","locations":[{"ref":"tokio-postgres/src/binary_copy.rs:181-184","code":"  181 |         if has_oids {\n  182 |             len += 1;\n  183 |         }\n  184 |         if len as usize != this.types.len() {","lines":4}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `config.rs`, `connect_timeout` and `tcp_user_timeout` are parsed as `i64` and only applied when positive (`if timeout > 0`). A value of `0` is silently ignored rather than returning an error or using it as \"no timeout\". This is inconsistent with the documentation which says `connect_timeout=0` should mean no limit, but the code just silently ignores it (leaving whatever the previous value was).","fix":"Either document that 0 means no-op (not \"no timeout\"), or explicitly set `self.connect_timeout = None` when `timeout == 0` to allow resetting to the default via the string form.","locations":[{"ref":"tokio-postgres/src/config.rs:629-635","code":"  629 |             \"connect_timeout\" => {\n  630 |                 let timeout = value\n  631 |                     .parse::<i64>()\n  632 |                     .map_err(|_| Error::config_parse(Box::new(InvalidValue(\"connect_timeout\"))))?;\n  633 |                 if timeout > 0 {\n  634 |                     self.connect_timeout(Duration::from_secs(timeout as u64));\n  635 |                 }","lines":7},{"ref":"tokio-postgres/src/config.rs:637-644","code":"  637 |             \"tcp_user_timeout\" => {\n  638 |                 let timeout = value\n  639 |                     .parse::<i64>()\n  640 |                     .map_err(|_| Error::config_parse(Box::new(InvalidValue(\"tcp_user_timeout\"))))?;\n  641 |                 if timeout > 0 {\n  642 |                     self.tcp_user_timeout(Duration::from_secs(timeout as u64));\n  643 |                 }\n  644 |             }","lines":8}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"The `DateTime::to_sql` implementation in `jiff_01.rs` rounds the span using `s.round(round_us())` without a `.relative()` anchor point, while the equivalent implementation in `jiff_02.rs` correctly uses `s.round(round_us().relative(base()))`. In jiff, rounding a civil `DateTime` span without a relative reference can fail or produce incorrect results for very large durations that include calendar units. The jiff_01 version silently omits the relative anchor that jiff_02 added as a fix.","fix":"In `jiff_01.rs` line 56, change `.and_then(|s| s.round(round_us()))` to `.and_then(|s| s.round(round_us().relative(base())))` to match the jiff_02 implementation.","locations":[{"ref":"postgres-types/src/jiff_01.rs:52-65","code":"   52 | impl ToSql for DateTime {\n   53 |     fn to_sql(&self, _: &Type, w: &mut BytesMut) -> Result<IsNull, Box<dyn Error + Sync + Send>> {\n   54 |         let v = self\n   55 |             .since(base())\n   56 |             .and_then(|s| s.round(round_us()))\n   57 |             .map_err(transmit_err)?\n   58 |             .get_microseconds();\n   59 |         types::timestamp_to_sql(v, w);\n   60 |         Ok(IsNull::No)\n   61 |     }\n   62 | \n   63 |     accepts!(TIMESTAMP);\n   64 |     to_sql_checked!();\n   65 | }","lines":14},{"ref":"postgres-types/src/jiff_02.rs:52-65","code":"   52 | impl ToSql for DateTime {\n   53 |     fn to_sql(&self, _: &Type, w: &mut BytesMut) -> Result<IsNull, Box<dyn Error + Sync + Send>> {\n   54 |         let v = self\n   55 |             .since(base())\n   56 |             .and_then(|s| s.round(round_us().relative(base())))\n   57 |             .map_err(transmit_err)?\n   58 |             .get_microseconds();\n   59 |         types::timestamp_to_sql(v, w);\n   60 |         Ok(IsNull::No)\n   61 |     }\n   62 | \n   63 |     accepts!(TIMESTAMP);\n   64 |     to_sql_checked!();\n   65 | }","lines":14}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `copy_in.rs`, when the `CopyInReceiver` channel is dropped (the `None` arm of `poll_next`), `frontend::copy_fail(\"\", buf).unwrap()` is called. This is inside a `Stream::poll_next` implementation where `.unwrap()` will panic the task if `copy_fail` returns an error. The empty reason string is unlikely to cause an error in practice, but `.unwrap()` is unsafe here.","fix":"Handle the error instead: `if let Err(_) = frontend::copy_fail(\"\", &mut buf) { /* skip copy_fail, send sync anyway */ }`.","locations":[{"ref":"tokio-postgres/src/copy_in.rs:58-58","code":"   58 |                 frontend::copy_fail(\"\", &mut buf).unwrap();","lines":1}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In `cancel_token.rs`, `cancel_query_raw` hardcodes `has_hostname = true` when delegating to `cancel_query_raw::cancel_query_raw`. This means TLS connections for cancel requests always expect a hostname, but the original connection may have been established without one (direct IP). If the TLS implementation requires a hostname for cert verification, this forces a spurious error.","fix":"Pass the actual `has_hostname` value derived from whether the stream's peer address has a hostname, or at minimum document why `true` is always correct here.","locations":[{"ref":"tokio-postgres/src/cancel_token.rs:57-57","code":"   57 |             stream,","lines":1}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"CopyInWriter::write() flushes the internal buffer to the server whenever self.buf.len() > 4096. Because the flush is triggered BEFORE the new data is appended, a write of 1 byte when buf is at 4097 bytes causes a flush of 4097 bytes, then the buf grows to 1 byte, then the next 1-byte write causes another flush. An application writing many small chunks just above the threshold causes one network send per write. A more efficient threshold would flush after appending or use >= instead of > to align with a true 4096-byte chunk boundary.","fix":"Either append to buf first and then flush if buf.len() > 4096, or change the threshold to `>= 4096` so a full 4096-byte chunk is sent rather than triggering at 4097.","locations":[{"ref":"postgres/src/copy_in_writer.rs:47-49","code":"   47 |         if self.buf.len() > 4096 {\n   48 |             self.flush()?;\n   49 |         }","lines":3}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `client.rs`, `InnerClient` acquires a `parking_lot::Mutex` lock for each individual getter/setter of `CachedTypeInfo` (`typeinfo()`, `set_typeinfo()`, `typeinfo_composite()`, etc.). The type-info lookup path in `prepare.rs` calls several of these in sequence, each acquiring and releasing the lock separately. Since all accesses are from the same async task (no contention expected), this causes unnecessary repeated mutex round-trips.","fix":"Provide a single `with_typeinfo<F, R>(&self, f: F) -> R` method analogous to `with_buf` so callers hold the lock for the entire type-info operation.","locations":[{"ref":"tokio-postgres/src/client.rs:109-139","code":"  109 |     pub fn typeinfo(&self) -> Option<Statement> {\n  110 |         self.cached_typeinfo.lock().typeinfo.clone()\n  111 |     }\n  112 | \n  113 |     pub fn set_typeinfo(&self, statement: &Statement) {\n  114 |         self.cached_typeinfo.lock().typeinfo = Some(statement.clone());\n  115 |     }\n  116 | \n  117 |     pub fn typeinfo_composite(&self) -> Option<Statement> {\n  118 |         self.cached_typeinfo.lock().typeinfo_composite.clone()\n  119 |     }\n  120 | \n  121 |     pub fn set_typeinfo_composite(&self, statement: &Statement) {\n  122 |         self.cached_typeinfo.lock().typeinfo_composite = Some(statement.clone());\n  123 |     }\n  124 | \n  125 |     pub fn typeinfo_enum(&self) -> Option<Statement> {\n  126 |         self.cached_typeinfo.lock().typeinfo_enum.clone()\n  127 |     }\n  128 | \n  129 |     pub fn set_typeinfo_enum(&self, statement: &Statement) {\n  130 |         self.cached_typeinfo.lock().typeinfo_enum = Some(statement.clone());\n  131 |     }\n  132 | \n  133 |     pub fn type_(&self, oid: Oid) -> Option<Type> {\n  134 |         self.cached_typeinfo.lock().types.get(&oid).cloned()\n  135 |     }\n  136 | \n  137 |     pub fn set_type(&self, oid: Oid, type_: &Type) {\n  138 |         self.cached_typeinfo.lock().types.insert(oid, type_.clone());\n  139 |     }","lines":31}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `query.rs`, `query_typed` and `execute_typed` are essentially identical - both send the same Parse/Bind/Describe/Execute/Sync sequence and differ only in how they consume the responses. The protocol buffer encoding logic is copy-pasted between the two functions (lines 71-84 vs 132-145 in query.rs).","fix":"Extract the buffer-encoding portion into a shared private function `encode_typed_query` that returns `Bytes`, then call it from both `query_typed` and `execute_typed`.","locations":[{"ref":"tokio-postgres/src/query.rs:62-121","code":"   62 | pub async fn query_typed<P, I>(\n   63 |     client: &Arc<InnerClient>,\n   64 |     query: &str,\n   65 |     params: I,\n   66 | ) -> Result<RowStream, Error>\n   67 | where\n   68 |     P: BorrowToSql,\n   69 |     I: IntoIterator<Item = (P, Type)>,\n   70 | {\n   71 |     let buf = {\n   72 |         let params = params.into_iter().collect::<Vec<_>>();\n   73 |         let param_oids = params.iter().map(|(_, t)| t.oid()).collect::<Vec<_>>();\n   74 | \n   75 |         client.with_buf(|buf| {\n   76 |             frontend::parse(\"\", query, param_oids, buf).map_err(Error::parse)?;\n   77 |             encode_bind_raw(\"\", params, \"\", buf)?;\n   78 |             frontend::describe(b'S', \"\", buf).map_err(Error::encode)?;\n   79 |             frontend::execute(\"\", 0, buf).map_err(Error::encode)?;\n   80 |             frontend::sync(buf);\n   81 | \n   82 |             Ok(buf.split().freeze())\n   83 | <div class="project-info"><div class="pi-name">rust-postgres</div><div class="pi-row"><a class="pi-repo-btn" href="https://github.com/rust-postgres/rust-postgres" target="_blank" rel="noopener">&#128279; https://github.com/rust-postgres/rust-postgres</a><span><span class="pi-k">branch</span> <code>master</code></span><span><span class="pi-k">commit</span> <a href="https://github.com/rust-postgres/rust-postgres/commit/e506ab93b960dd0ab4a7aa69d80aad195b894e27" target="_blank" rel="noopener"><code>e506ab93b9</code></a></span></div></div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
  <button class="action-btn" data-action="download-md">&#11015; MD</button>
  <button class="action-btn" data-action="download-md-short">&#11015; MD Short</button>
  <button class="action-btn" data-action="download-toml">&#11015; TOML</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
