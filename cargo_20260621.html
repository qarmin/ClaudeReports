SourceId::for_path(&path)\n 2428 |             } else {\n 2429 |                 Ok(manifest_ctx.source_id)\n 2430 |             }\n 2431 |         }","lines":18,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml/mod.rs#L2414-L2431"}]},{"id":"ERR_25","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`path_field` does `relpath.to_str().unwrap()` after `pathdiff::diff_paths`. If the computed relative path contains non-UTF8 components (possible on Unix), this panics rather than returning the `CargoResult` error the function signature promises. The sibling normalization in `prepare_target_for_publish` uses `normalize_path_sep` which returns a proper error for non-UTF8 paths; this helper should do the same.","fix":"Return an error for non-UTF8 paths instead of `.unwrap()`, e.g. `.to_str().ok_or_else(|| anyhow::format_err!(\"non-UTF8 path\"))?`.","locations":[{"ref":"src/cargo/util/toml_mut/dependency.rs:749-752","code":"  749 |     let relpath = pathdiff::diff_paths(&source.path, relative_to)\n  750 |         .expect(\"PathSource::path and workspace path must be absolute\");\n  751 |     let relpath = relpath.to_str().unwrap().replace('\\\\', \"/\");\n  752 |     Ok(relpath)","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml_mut/dependency.rs#L749-L752"}]},{"id":"ERR_26","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`log_file` sorts directory entries with `a.file_name().to_str().cmp(&b.file_name().to_str())`, comparing `Option<&str>`. If any log file name is not valid UTF-8, its key becomes `None`, which sorts before all `Some` values, silently corrupting chronological ordering rather than failing loudly. Log file names are controlled by cargo so this is unlikely, but the silent fallback is a latent trap.","fix":"Compare on `OsString`/`file_name()` directly (which is `Ord`) instead of going through `to_str()` Options.","locations":[{"ref":"crates/cargo-test-support/src/paths.rs:152-153","code":"  152 |     // Sort them to get chronological order\n  153 |     log_files.sort_unstable_by(|a, b| a.file_name().to_str().cmp(&b.file_name().to_str()));","lines":2,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/paths.rs#L152-L153"}]},{"id":"ERR_27","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`print_lockfile_generation` uses `unreachable!()` for all non-`Added` change kinds (lines 594-599), relying on the invariant that `PackageChange::new` only emits `Added` entries when there is no previous resolve. This invariant currently holds (`PackageDiff::new` pushes only to `added`), so it is not presently triggerable, but it is a hard panic guarding an invariant maintained in a different module/function; a future change to `PackageDiff`/`with_diff` (e.g. emitting `Unchanged`) would turn it into a crash rather than a graceful error.","fix":"Prefer a defensive `continue` or `internal(...)` error over `unreachable!` for the non-Added arms, decoupling the panic from an invariant enforced elsewhere.","locations":[{"ref":"src/cargo/ops/cargo_update.rs:594-600","code":"  594 |             PackageChangeKind::Upgraded\n  595 |             | PackageChangeKind::Downgraded\n  596 |             | PackageChangeKind::Removed\n  597 |             | PackageChangeKind::Unchanged => {\n  598 |                 unreachable!(\"without a previous resolve, everything should be added\")\n  599 |             }\n  600 |         }","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_update.rs#L594-L600"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"The libsecret FFI types declare the variadic attribute functions with `extern \"C\" fn(..., ...)`.\nThe real libsecret functions (`secret_password_store_sync` etc.) take a NULL-terminated\nlist of (attribute-name, attribute-value) C string pairs. The calls pass\n`attr_url, index_url_c.as_ptr(), null() as *const gchar` which is correct, but the\n`SecretSchema.attributes` array is sized `[SecretSchemaAttribute; 32]` while the real\nstruct is `[SecretSchemaAttribute; 32]` only by ABI accident; libsecret defines it as a\nfixed-size array of 32, so this matches. The genuine concern is that only `attributes[0]`\nis initialized to `url`; entries 1..32 have `name: null()` which libsecret treats as the\nterminator - this is fine. No fix strictly required, but the hardcoded 32 couples to\nlibsecret's private ABI and could break if libsecret changes.","fix":"Add a comment documenting that the array size 32 and field layout must match libsecret's `SecretSchema` ABI exactly; consider a static assertion on size.","locations":[{"ref":"credential/cargo-credential-libsecret/src/lib.rs:46-58","code":"   46 |     struct SecretSchema {\n   47 |         name: *const gchar,\n   48 |         flags: SecretSchemaFlags,\n   49 |         attributes: [SecretSchemaAttribute; 32],\n   50 |         reserved: gint,\n   51 |         reserved1: gpointer,\n   52 |         reserved2: gpointer,\n   53 |         reserved3: gpointer,\n   54 |         reserved4: gpointer,\n   55 |         reserved5: gpointer,\n   56 |         reserved6: gpointer,\n   57 |         reserved7: gpointer,\n   58 |     }","lines":13,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L46-L58"},{"ref":"credential/cargo-credential-libsecret/src/lib.rs:108-130","code":"  108 |     fn schema() -> SecretSchema {\n  109 |         let mut attributes = [SecretSchemaAttribute {\n  110 |             name: null(),\n  111 |             attr_type: SecretSchemaAttributeType::String,\n  112 |         }; 32];\n  113 |         attributes[0] = SecretSchemaAttribute {\n  114 |             name: c\"url\".as_ptr() as *const gchar,\n  115 |             attr_type: SecretSchemaAttributeType::String,\n  116 |         };\n  117 |         SecretSchema {\n  118 |             name: c\"org.rust-lang.cargo.registry\".as_ptr() as *const gchar,\n  119 |             flags: SecretSchemaFlags::None,\n  120 |             attributes,\n  121 |             reserved: 0,\n  122 |             reserved1: null_mut(),\n  123 |             reserved2: null_mut(),\n  124 |             reserved3: null_mut(),\n  125 |             reserved4: null_mut(),\n  126 |             reserved5: null_mut(),\n  127 |             reserved6: null_mut(),\n  128 |             reserved7: null_mut(),\n  129 |         }\n  130 |     }","lines":23,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L108-L130"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In `traverse_and_share`, when building the `unit_probe` to detect whether a debuginfo-canonical counterpart exists in the original `unit_graph`, the probe is interned using the ORIGINAL unit's fields (`unit.dep_hash`, `unit.artifact_target_for_features`, `unit.skip_non_compile_time_dep`) together with the canonicalized profile and `to_host` kind. The probe is then looked up against `unit_graph` (the pre-rebuild graph), which is correct for those original-keyed fields, but the surrounding logic is subtle and fragile: the probe must match the keys used when the graph was originally built. Mixing `canonical_profile`/`to_host.unwrap()` (post-rebuild values) with original `dep_hash` only works because the original graph used `dep_hash = 0` and host kind for build deps. This coupling is undocumented and a future change to how units are keyed will silently break debuginfo weakening. At minimum it deserves a comment explaining why original `dep_hash`/`artifact_target_for_features` are used here.","fix":"Add a comment documenting the invariant that the probe must be keyed identically to how the unit was inserted into the pre-rebuild `unit_graph` (original dep_hash, original artifact_target_for_features, host kind), and consider a debug assertion.","locations":[{"ref":"src/cargo/ops/cargo_compile/mod.rs:956-994","code":"  956 |     if unit_is_for_host\n  957 |         && to_host.is_some()\n  958 |         && profile.debuginfo.is_deferred()\n  959 |         && !unit.artifact.is_true()\n  960 |     {\n  961 |         // We create a \"probe\" test to see if a unit with the same explicit debuginfo level exists\n  962 |         // in the graph. This is the level we'd expect if it was set manually or the default value\n  963 |         // set by a profile for a runtime dependency: its canonical value.\n  964 |         let canonical_debuginfo = profile.debuginfo.finalize();\n  965 |         let mut canonical_profile = profile.clone();\n  966 |         canonical_profile.debuginfo = canonical_debuginfo;\n  967 |         let unit_probe = interner.intern(\n  968 |             &unit.pkg,\n  969 |             &unit.target,\n  970 |             canonical_profile,\n  971 |             to_host.unwrap(),\n  972 |             unit.mode,\n  973 |             unit.features.clone(),\n  974 |             unit.rustflags.clone(),\n  975 |             unit.rustdocflags.clone(),\n  976 |             unit.links_overrides.clone(),\n  977 |             unit.is_std,\n  978 |             unit.dep_hash,\n  979 |             unit.artifact,\n  980 |             unit.artifact_target_for_features,\n  981 |             unit.skip_non_compile_time_dep,\n  982 |         );\n  983 | \n  984 |         // We can now turn the deferred value into its actual final value.\n  985 |         profile.debuginfo = if unit_graph.contains_key(&unit_probe) {\n  986 |             // The unit is present in both build time and runtime subgraphs: we canonicalize its\n  987 |             // level to the other unit's, thus ensuring reuse between the two to optimize build times.\n  988 |             canonical_debuginfo\n  989 |         } else {\n  990 |             // The unit is only present in the build time subgraph, we can weaken its debuginfo\n  991 |             // level to optimize build times.\n  992 |             canonical_debuginfo.weaken()\n  993 |         }\n  994 |     }","lines":39,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_compile/mod.rs#L956-L994"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`is_present` on the `RerunIfEnvChanged` wrapper (and on `ProcessEnv`) is implemented by calling `get`, which allocates an `OsString` just to check presence. For `ProcessEnv` this calls `std::env::var_os` and discards the value; `std::env::var_os(..).is_some()` works but a presence-only API exists conceptually. Minor wasted allocation in a hot-ish path (every cfg presence query).","fix":"Use a non-allocating presence check where possible; impact is small so this is low priority.","locations":[{"ref":"crates/build-rs/src/input.rs:42-45","code":"   42 | \n   43 |     fn is_present(&self, key: &str) -> bool {\n   44 |         self.get(key).is_some()\n   45 |     }","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/input.rs#L42-L45"},{"ref":"crates/build-rs/src/input.rs:64-67","code":"   64 |     #[track_caller]\n   65 |     fn is_present(&self, key: &str) -> bool {\n   66 |         self.get(key).is_some()\n   67 |     }","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/input.rs#L64-L67"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`encodable_source_id` calls `.expect(\"source ID should have valid URLs\")` on `TomlLockfileSourceId::new(...)`. This is on the serialization path for a `Cargo.lock`; if a `SourceId`'s encoded/plain URL string ever fails the `TomlLockfileSourceId` validation (e.g. an unusual git ref or registry URL surviving from a hand-edited or future-format lockfile), Cargo panics while writing the lockfile instead of producing a proper error.","fix":"Propagate the error as a `CargoResult`/serde error instead of `expect`, or document why the URL is guaranteed valid here.","locations":[{"ref":"src/cargo/core/resolver/encode.rs:663-676","code":"  663 | fn encodable_source_id(id: SourceId, version: ResolveVersion) -> Option<TomlLockfileSourceId> {\n  664 |     if id.is_path() {\n  665 |         None\n  666 |     } else {\n  667 |         Some(\n  668 |             if version >= ResolveVersion::V4 {\n  669 |                 TomlLockfileSourceId::new(id.as_encoded_url().to_string())\n  670 |             } else {\n  671 |                 TomlLockfileSourceId::new(id.as_url().to_string())\n  672 |             }\n  673 |             .expect(\"source ID should have valid URLs\"),\n  674 |         )\n  675 |     }\n  676 | }","lines":14,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/resolver/encode.rs#L663-L676"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"`is_transitive_dep` takes `seen_units: &Vec<Unit>` instead of `&[Unit]` (clippy ptr_arg), needlessly restricting callers for no benefit.","fix":"Change the parameter type to `&[Unit]`.","locations":[{"ref":"src/cargo/diagnostics/rules/unused_dependencies.rs:384-388","code":"  384 | fn is_transitive_dep(\n  385 |     direct_dep_unit: &Unit,\n  386 |     seen_units: &Vec<Unit>,\n  387 |     bcx: &BuildContext<'_, '_>,\n  388 | ) -> bool {","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unused_dependencies.rs#L384-L388"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"In `report_timings::prepare_context`, the final sort of unit data uses `partial_cmp(...).unwrap()` on `f64` start times (line 375). If any `start` value is NaN (which can arise from corrupted/garbage log input that still deserializes), `partial_cmp` returns `None` and this panics. Log parsing elsewhere in this function is deliberately tolerant (it warns and skips bad messages), so a panic here is inconsistent with that robustness goal.","fix":"Use `a.start.total_cmp(&b.start)` (total ordering on f64) instead of `partial_cmp(...).unwrap()`.","locations":[{"ref":"src/cargo/ops/cargo_report/timings.rs:375","code":"  375 |         .sorted_unstable_by(|a, b| a.start.partial_cmp(&b.start).unwrap())","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_report/timings.rs#L375"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`directory.rs` builds the checksum path redundantly: `cksum_file =\npath.join(\".cargo-checksum.json\")` already yields an absolute path, but it is\nthen passed again through `path.join(cksum_file)` in the `paths::read` call.\n`Path::join` with an absolute argument discards the left side, so it happens to\nwork, but the double join is confusing dead computation and obscures intent.","fix":"Read directly from `cksum_file`: `paths::read(&cksum_file)` (drop the redundant `path.join`).","locations":[{"ref":"src/cargo/sources/directory.rs:140-148","code":"  140 |             let cksum_file = path.join(\".cargo-checksum.json\");\n  141 |             let cksum = paths::read(&path.join(cksum_file)).with_context(|| {\n  142 |                 format!(\n  143 |                     \"failed to load checksum `.cargo-checksum.json` \\\n  144 |                      of {} v{}\",\n  145 |                     pkg.package_id().name(),\n  146 |                     pkg.package_id().version()\n  147 |                 )\n  148 |             })?;","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/directory.rs#L140-L148"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"`read_new_post` uses the deprecated/awkward `f.seek(SeekFrom::Current(0))` to query the current position. `Seek::stream_position()` exists for exactly this and is clearer.","fix":"Replace `f.seek(SeekFrom::Current(0))` with `f.stream_position()`.","locations":[{"ref":"crates/cargo-test-support/src/publish.rs:140-142","code":"  140 |     // Check at end.\n  141 |     let current = f.seek(SeekFrom::Current(0)).unwrap();\n  142 |     assert_eq!(f.seek(SeekFrom::End(0)).unwrap(), current);","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/publish.rs#L140-L142"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":true,"description":"`build_command_with_argfile` passes `&mut buf` to `Write::write_all`, which takes `&[u8]`. The mutable borrow is unnecessary (it coerces to a shared slice) and is misleading about intent. No behavioral bug, just sloppy.","fix":"Use `tmp.write_all(&buf)?;`.","locations":[{"ref":"crates/cargo-util/src/process_builder.rs:488","code":"  488 |         tmp.write_all(&mut buf)?;","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-util/src/process_builder.rs#L488"}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":true,"description":"Misspelled local variable `sectipn` (should be `section`). Harmless but it is a typo in maintained code and slightly hurts readability/grep-ability.","fix":"Rename `sectipn` to `section`.","locations":[{"ref":"crates/xtask-lint-docs/src/main.rs:28-34","code":"   28 |             let sectipn = match lint.primary_group.default_level {\n   29 |                 LintLevel::Allow => &mut allow,\n   30 |                 LintLevel::Warn => &mut warn,\n   31 |                 LintLevel::Deny => &mut deny,\n   32 |                 LintLevel::Forbid => &mut forbid,\n   33 |             };\n   34 |             sectipn.push(lint.name);","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/xtask-lint-docs/src/main.rs#L28-L34"}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"`get_credential_libsecret` documents itself as 'not threadsafe' and uses `OnceLock::get()`/`set()` with a comment acknowledging a possible double-load race. This is accepted (worst case a temporary extra libsecret ref count), but `OnceExt::try_borrow_with` (defined in this same slice) already implements exactly this best-effort pattern and could be reused for consistency.","fix":"Reuse `OnceExt::try_borrow_with` here for the same best-effort init semantics with shared code.","locations":[{"ref":"src/cargo/util/auth/mod.rs:537-556","code":"  537 | /// Retrieves a cached instance of `LibSecretCredential`.\n  538 | /// Must be cached to avoid repeated load/unload cycles, which are not supported by `glib`.\n  539 | #[cfg(target_os = \"linux\")]\n  540 | fn get_credential_libsecret()\n  541 | -> CargoResult<&'static cargo_credential_libsecret::LibSecretCredential> {\n  542 |     static CARGO_CREDENTIAL_LIBSECRET: std::sync::OnceLock<\n  543 |         cargo_credential_libsecret::LibSecretCredential,\n  544 |     > = std::sync::OnceLock::new();\n  545 |     // Unfortunately `get_or_try_init` is not yet stable. This workaround is not threadsafe but\n  546 |     // loading libsecret twice will only temporary increment the ref counter, which is decrement\n  547 |     // again when `drop` is called.\n  548 |     match CARGO_CREDENTIAL_LIBSECRET.get() {\n  549 |         Some(lib) => Ok(lib),\n  550 |         None => {\n  551 |             let _ = CARGO_CREDENTIAL_LIBSECRET\n  552 |                 .set(cargo_credential_libsecret::LibSecretCredential::new()?);\n  553 |             Ok(CARGO_CREDENTIAL_LIBSECRET.get().unwrap())\n  554 |         }\n  555 |     }\n  556 | }","lines":20,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/auth/mod.rs#L537-L556"}]},{"id":"API_12","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"`Drop for LockServerStarted` and `Drop for StartedServer` both call `self.thread.take().unwrap().join()`. Unwrapping inside a Drop impl is risky: if it ever panicked during an unwind it would abort the process. The `Option` is always `Some` for a normally constructed value today, so this is latent, but `if let Some(...)` would be safer.","fix":"Replace `self.thread.take().unwrap().join()` with `if let Some(t) = self.thread.take() { let _ = t.join(); }`.","locations":[{"ref":"src/cargo/util/lockserver.rs:148-157","code":"  148 | impl Drop for LockServerStarted {\n  149 |     fn drop(&mut self) {\n  150 |         self.done.store(true, Ordering::SeqCst);\n  151 |         // Ignore errors here as this is largely best-effort\n  152 |         if TcpStream::connect(&self.addr).is_err() {\n  153 |             return;\n  154 |         }\n  155 |         drop(self.thread.take().unwrap().join());\n  156 |     }\n  157 | }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/lockserver.rs#L148-L157"},{"ref":"src/cargo/util/diagnostic_server.rs:309-318","code":"  309 | impl Drop for StartedServer {\n  310 |     fn drop(&mut self) {\n  311 |         self.done.store(true, Ordering::SeqCst);\n  312 |         // Ignore errors here as this is largely best-effort\n  313 |         if TcpStream::connect(&self.addr).is_err() {\n  314 |             return;\n  315 |         }\n  316 |         drop(self.thread.take().unwrap().join());\n  317 |     }\n  318 | }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/diagnostic_server.rs#L309-L318"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"`is_transitive_dep` does a BFS over `bcx.unit_graph` with no visited/seen set, pushing nodes onto the queue every time they are reached via any path. For diamond-shaped dependency graphs this re-expands shared subgraphs repeatedly, risking exponential time/memory on large workspaces, and would loop forever on any cycle. Runs once per unused extern per package.","fix":"Track a `HashSet` of visited units and only enqueue a unit if not already visited; this makes traversal linear and cycle-safe.","locations":[{"ref":"src/cargo/diagnostics/rules/unused_dependencies.rs:383-412","code":"  383 | #[instrument(skip_all)]\n  384 | fn is_transitive_dep(\n  385 |     direct_dep_unit: &Unit,\n  386 |     seen_units: &Vec<Unit>,\n  387 |     bcx: &BuildContext<'_, '_>,\n  388 | ) -> bool {\n  389 |     let mut queue = std::collections::VecDeque::new();\n  390 |     for root_unit in seen_units {\n  391 |         for unit_dep in &bcx.unit_graph[root_unit] {\n  392 |             if root_unit.pkg.package_id() == unit_dep.unit.pkg.package_id() {\n  393 |                 continue;\n  394 |             }\n  395 |             if unit_dep.unit == *direct_dep_unit {\n  396 |                 continue;\n  397 |             }\n  398 |             queue.push_back(&unit_dep.unit);\n  399 |         }\n  400 |     }\n  401 | \n  402 |     while let Some(dep_unit) = queue.pop_front() {\n  403 |         for unit_dep in &bcx.unit_graph[dep_unit] {\n  404 |             if unit_dep.unit == *direct_dep_unit {\n  405 |                 return true;\n  406 |             }\n  407 |             queue.push_back(&unit_dep.unit);\n  408 |         }\n  409 |     }\n  410 | \n  411 |     false\n  412 | }","lines":30,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unused_dependencies.rs#L383-L412"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`get_git_items_to_clean_size` computes git_db sizes live by calling `cargo_util::du` on each git_db directory in a loop, unlike registry crate/src and git checkouts which read a stored `size` from the DB. `du` walks the entire directory tree; for users with many/large git dependencies this is a potentially expensive full-disk scan performed on every size-based clean, even though git_db is a parent whose children already store sizes.","fix":"Persist git_db size in the schema as is done for checkouts/src and read it, or document why a live du is required.","locations":[{"ref":"src/cargo/core/global_cache_tracker.rs:1206-1220","code":" 1206 |         let mut stmt = conn.prepare_cached(\"SELECT rowid, name, timestamp FROM git_db\")?;\n 1207 |         let mut git_info = stmt\n 1208 |             .query_map([], |row| {\n 1209 |                 let rowid: i64 = row.get_unwrap(0);\n 1210 |                 let name: String = row.get_unwrap(1);\n 1211 |                 let timestamp: Timestamp = row.get_unwrap(2);\n 1212 |                 // Size is added below so that the error doesn't need to be\n 1213 |                 // converted to a rusqlite error.\n 1214 |                 Ok((timestamp, rowid, None, name, 0))\n 1215 |             })?\n 1216 |             .collect::<Result<Vec<_>, _>>()?;\n 1217 |         for info in &mut git_info {\n 1218 |             let size = cargo_util::du(&base.git_db.join(&info.3), &[])?;\n 1219 |             info.4 = size;\n 1220 |         }","lines":15,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/global_cache_tracker.rs#L1206-L1220"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`Registry::add_owners` deserializes the response body into `OwnerResponse` twice: once for the `assert!(...ok)` check and again to extract `.msg`. The body is parsed (and the struct allocated) redundantly.","fix":"Deserialize once into a local: `let resp: OwnerResponse = serde_json::from_str(&body)?; assert!(resp.ok); Ok(resp.msg)`.","locations":[{"ref":"crates/crates-io/lib.rs:258-263","code":"  258 |     pub fn add_owners(&mut self, krate: &str, owners: &[&str]) -> RegistryResult<String, T::Error> {\n  259 |         let body = serde_json::to_string(&OwnersReq { users: owners })?;\n  260 |         let body = self.put(&format!(\"/crates/{}/owners\", krate), Some(body.as_bytes()))?;\n  261 |         assert!(serde_json::from_str::<OwnerResponse>(&body)?.ok);\n  262 |         Ok(serde_json::from_str::<OwnerResponse>(&body)?.msg)\n  263 |     }","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/crates-io/lib.rs#L258-L263"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`get_id_map` prepares a single-row `SELECT name ... WHERE id = ?1` and executes it once per id in a loop (N+1 query pattern), called from age/size clean helpers with the full list of affected ids.","fix":"Use a single `WHERE id IN (...)` query (or a temp table / rarray) and build the map from the result set.","locations":[{"ref":"src/cargo/core/global_cache_tracker.rs:392-407","code":"  392 |     fn get_id_map(\n  393 |         conn: &Connection,\n  394 |         table_name: &str,\n  395 |         ids: &[i64],\n  396 |     ) -> CargoResult<HashMap<i64, PathBuf>> {\n  397 |         let mut stmt =\n  398 |             conn.prepare_cached(&format!(\"SELECT name FROM {table_name} WHERE id = ?1\"))?;\n  399 |         ids.iter()\ ource));\n  150 |         }\n  151 |         let mut report = vec![primary];\n  152 |         if let Some(document) = document\n  153 |             && let Some(contents) = contents\n  154 |             && let Some(span) = get_key_value_span(document, &[\"build-dependencies\", dep_name])\n  155 |         {\n  156 |             let span = span.key.start..span.value.end;\n  157 |             let mut help = Group::with_title(Level::HELP.secondary_title(\"remove the dependency\"));\n  158 |             help = help.element(\n  159 |                 Snippet::source(contents)\n  160 |                     .path(&manifest_path)\n  161 |                     .patch(Patch::new(span, \"\")),\n  162 |             );\n  163 |             report.push(help);\n  164 |         }","lines":30,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unused_dependencies.rs#L135-L164"},{"ref":"src/cargo/diagnostics/rules/unused_dependencies.rs:320-351","code":"  320 |                 if let Some(document) = document\n  321 |                     && let Some(contents) = contents\n  322 |                     && let Some(span) = get_key_value_span(document, &toml_path)\n  323 |                 {\n  324 |                     let span = span.key.start..span.value.end;\n  325 |                     primary = primary.element(\n  326 |                         Snippet::source(contents)\n  327 |                             .path(&manifest_path)\n  328 |                             .annotation(AnnotationKind::Primary.span(span)),\n  329 |                     );\n  330 |                 } else {\n  331 |                     primary = primary.element(Origin::path(&manifest_path));\n  332 |                 }\n  333 |                 if lint_count == 0 {\n  334 |                     primary = primary.element(Level::NOTE.message(emitted_source));\n  335 |                 }\n  336 |                 lint_count += 1;\n  337 |                 let mut report = vec![primary];\n  338 |                 if let Some(document) = document\n  339 |                     && let Some(contents) = contents\n  340 |                     && let Some(span) = get_key_value_span(document, &toml_path)\n  341 |                 {\n  342 |                     let span = span.key.start..span.value.end;\n  343 |                     let mut help =\n  344 |                         Group::with_title(Level::HELP.secondary_title(\"remove the dependency\"));\n  345 |                     help = help.element(\n  346 |                         Snippet::source(contents)\n  347 |                             .path(&manifest_path)\n  348 |                             .patch(Patch::new(span, \"\")),\n  349 |                     );\n  350 |                     report.push(help);\n  351 |                 }","lines":32,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unused_dependencies.rs#L320-L351"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `cargo_add::add`, `print_action_msg` and `print_dep_table_msg` are called for each dependency, and `dep.features()` (in DependencyUI) does a BFS over `available_features` building several `IndexSet`s and sorting them, recomputed independently in the unknown-features check, in `print_dep_table_msg`. For dependencies with many features this recomputes the activated/deactivated sets multiple times per dependency. Not hot for typical use but redundant work.","fix":"Compute the `(activated, deactivated)` feature sets once per dependency and reuse the result across the unknown-feature check and the printing functions.","locations":[{"ref":"src/cargo/ops/cargo_add/mod.rs:1154-1189","code":" 1154 |     fn features(&self) -> (IndexSet<&str>, IndexSet<&str>) {\n 1155 |         let mut activated: IndexSet<_> =\n 1156 |             self.features.iter().flatten().map(|s| s.as_str()).collect();\n 1157 |         if self.default_features().unwrap_or(true) {\n 1158 |             activated.insert(\"default\");\n 1159 |         }\n 1160 |         activated.extend(self.inherited_features.iter().flatten().map(|s| s.as_str()));\n 1161 |         let mut walk: VecDeque<_> = activated.iter().cloned().collect();\n 1162 |         while let Some(next) = walk.pop_front() {\n 1163 |             walk.extend(\n 1164 |                 self.available_features\n 1165 |                     .get(next)\n 1166 |                     .into_iter()\n 1167 |                     .flatten()\n 1168 |                     .map(|s| s.as_str())\n 1169 |                     .filter(|s| !activated.contains(s)),\n 1170 |             );\n 1171 |             activated.extend(\n 1172 |                 self.available_features\n 1173 |                     .get(next)\n 1174 |                     .into_iter()\n 1175 |                     .flatten()\n 1176 |                     .map(|s| s.as_str()),\n 1177 |             );\n 1178 |         }\n 1179 |         activated.swap_remove(\"default\");\n 1180 |         activated.sort();\n 1181 |         let mut deactivated = self\n 1182 |             .available_features\n 1183 |             .keys()\n 1184 |             .filter(|f| !activated.contains(f.as_str()) && *f != \"default\")\n 1185 |             .map(|f| f.as_str())\n 1186 |             .collect::<IndexSet<_>>();\n 1187 |         deactivated.sort();\n 1188 |         (activated, deactivated)\n 1189 |     }","lines":36,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_add/mod.rs#L1154-L1189"},{"ref":"src/cargo/ops/cargo_add/mod.rs:1302-1302","code":" 1302 |     let (activated, deactivated) = dep.features();","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_add/mod.rs#L1302"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`LocalDependencies::has_dependencies` iterates all nodes and, for each, materializes the edges iterator just to check `next().is_some()`. For a graph this is fine, but more notably `sort()` clones every `(Package, T)` value out of the map. `Package` clones are not cheap. `package_with_dep_graph`/`do_package` call `local_deps` then `sort()`, cloning all packages. Given packages are already owned in the map, this is acceptable but the repeated full clone of `Package` for ordering is a minor inefficiency worth noting.","fix":"Consider having `sort()` return references or move semantics where possible, or store `Rc<Package>` to avoid deep clones of `Package` when only ordering is needed.","locations":[{"ref":"src/cargo/ops/cargo_package/mod.rs:404-418","code":"  404 | impl<T: Clone> LocalDependencies<T> {\n  405 |     pub fn sort(&self) -> Vec<(Package, T)> {\n  406 |         self.graph\n  407 |             .sort()\n  408 |             .into_iter()\n  409 |             .map(|name| self.packages[&name].clone())\n  410 |             .collect()\n  411 |     }\n  412 | \n  413 |     pub fn has_dependencies(&self) -> bool {\n  414 |         self.graph\n  415 |             .iter()\n  416 |             .any(|node| self.graph.edges(node).next().is_some())\n  417 |     }\n  418 | }","lines":15,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_package/mod.rs#L404-L418"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`find_log_file` with an explicit id calls `list_log_files` and then linearly scans, comparing `run_id.to_string() == requested_id.to_string()` (line 71), allocating two Strings per candidate. `RunId` is parsed from the filename and is already a typed value; string-formatting both sides on every iteration is wasteful and relies on Display round-tripping for equality.","fix":"Derive/implement `PartialEq` on `RunId` and compare `&run_id == requested_id` directly, avoiding per-iteration String allocations.","locations":[{"ref":"src/cargo/ops/cargo_report/util.rs:69-74","code":"   69 |         Some(requested_id) => {\n   70 |             for (path, run_id) in list_log_files(gctx, ws)? {\n   71 |                 if run_id.to_string() == requested_id.to_string() {\n   72 |                     return Ok(Some((path, run_id)));\n   73 |                 }\n   74 |             }","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_report/util.rs#L69-L74"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`GitDatabase::contains` checks for the presence of an object by calling\n`self.repo.revparse_single(&oid.to_string())`, which formats the oid to a hex\nstring and runs full revision-spec parsing just to test object existence. This\nis on the hot path for locked git dependencies (`fetch_db` calls\n`db.contains(*oid)` for every locked git source on every resolve). `git2`\nprovides cheaper existence checks (e.g. `repo.find_object(oid, None)` or going\nthrough the odb) that avoid string formatting and the general revparse machinery.","fix":"Use `self.repo.find_object(oid, None).is_ok()` (or an odb `exists` check) instead of `revparse_single(&oid.to_string())`.","locations":[{"ref":"src/cargo/sources/git/utils.rs:211-213","code":"  211 |     pub fn contains(&self, oid: git2::Oid) -> bool {\n  212 |         self.repo.revparse_single(&oid.to_string()).is_ok()\n  213 |     }","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/git/utils.rs#L211-L213"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`remove_from_table` calls `self.get_sections()` (which clones every dependency table in the manifest via `.clone()` on each matching `Item`) only on the not-found error path, purely to build a help message pointing at where a similarly-named dependency lives. For large manifests this clones potentially many tables to produce a diagnostic. It is on a cold path but the full deep-clone of all dep sections is heavier than needed (only key membership is checked).","fix":"Search the live `self.data` tables for the key without cloning, or have `get_sections` expose a borrow-only variant for membership checks.","locations":[{"ref":"src/cargo/util/toml_mut/manifest.rs:457-463","code":"  457 |                 // Search in other tables.\n  458 |                 let sections = self.get_sections();\n  459 |                 let found_table_path = sections.iter().find_map(|(t, i)| {\n  460 |                     let table_path: Vec<String> =\n  461 |                         t.to_table().iter().map(|s| s.to_string()).collect();\n  462 |                     i.get(name).is_some().then(|| table_path)\n  463 |                 });","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml_mut/manifest.rs#L457-L463"},{"ref":"src/cargo/util/toml_mut/manifest.rs:152-189","code":"  152 |     pub fn get_sections(&self) -> Vec<(DepTable, toml_edit::Item)> {\n  153 |         let mut sections = Vec::new();\n  154 | \n  155 |         for table in DepTable::KINDS {\n  156 |             let dependency_type = table.kind.kind_table();\n  157 |             // Dependencies can be in the three standard sections...\n  158 |             if self\n  159 |                 .data\n  160 |                 .get(dependency_type)\n  161 |                 .map(|t| t.is_table_like())\n  162 |                 .unwrap_or(false)\n  163 |             {\n  164 |                 sections.push((table.clone(), self.data[dependency_type].clone()))\n  165 |             }\n  166 | \n  167 |             // ... and in `target.<target>.(build-/dev-)dependencies`.\n  168 |             let target_sections = self\n  169 |                 .data\n
