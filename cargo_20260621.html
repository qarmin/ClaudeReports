ns(\"-nightly\") || vers.contains(\"-dev\"));\n  310 |     let minor = vers\n  311 |         .split('.')\n  312 |         .skip(1)\n  313 |         .next()\n  314 |         .expect(\"malformed rustc version (not semver)\")\n  315 |         .parse()\n  316 |         .expect(\"malformed rustc version (minor version was not u32)\");\n  317 |     (minor, is_nightly)","lines":16,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-macro/src/lib.rs#L302-L317"}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`match_contains` uses `if e.len() == 0` to detect empty expected input. Clippy's `len_zero` lint prefers `e.is_empty()`. Trivial, but this crate is otherwise lint-clean and `e` is a `Vec`.","fix":"Use `if e.is_empty()`.","locations":[{"ref":"crates/cargo-test-support/src/compare.rs:357-359","code":"  357 |     if e.len() == 0 {\n  358 |         bail!(\"expected length must not be zero\");\n  359 |     }","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/compare.rs#L357-L359"}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In `build_command_with_argfile` the capacity hint `cap` is computed from `self.get_args()` (which includes the wrapper programs and skips the main program) while the loop that fills `buf` iterates over `self.args` only. The capacity estimate therefore does not match what is actually written; it over- or under-counts depending on wrappers. Harmless but the hint is wrong.","fix":"Compute `cap` from `self.args` (`self.args.iter().map(|a| a.len() + 1).sum()`).","locations":[{"ref":"crates/cargo-util/src/process_builder.rs:468-487","code":"  468 |         let cap = self.get_args().map(|arg| arg.len() + 1).sum::<usize>();\n  469 |         let mut buf = Vec::with_capacity(cap);\n  470 |         for arg in &self.args {\n  471 |             let arg = arg.to_str().ok_or_else(|| {\n  472 |                 io::Error::new(\n  473 |                     io::ErrorKind::Other,\n  474 |                     format!(\n  475 |                         \"argument for argfile contains invalid UTF-8 characters: `{}`\",\n  476 |                         arg.to_string_lossy()\n  477 |                     ),\n  478 |                 )\n  479 |             })?;\n  480 |             if arg.contains('\\n') {\n  481 |                 return Err(io::Error::new(\n  482 |                     io::ErrorKind::Other,\n  483 |                     format!(\"argument for argfile contains newlines: `{arg}`\"),\n  484 |                 ));\n  485 |             }\n  486 |             writeln!(buf, \"{arg}\")?;\n  487 |         }","lines":20,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-util/src/process_builder.rs#L468-L487"}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`escape` in the man formatter performs ~16 sequential `String::replace` passes over the whole string, allocating a new `String` each pass. For large documents this is O(16*n) allocations/copies. A single-pass char scan building one output string would be markedly cheaper. The function is called on essentially every text/code event.","fix":"Replace the chained `.replace(...)` calls with a single pass over `s.chars()` that appends the escaped form per character.","locations":[{"ref":"crates/mdman/src/format/man.rs:430-465","code":"  430 | #[allow(clippy::collapsible_str_replace)]\n  431 | fn escape(s: &str) -> Result<String, Error> {\n  432 |     // Note: Possible source on output escape sequences: https://man7.org/linux/man-pages/man7/groff_char.7.html.\n  433 |     //       Otherwise, use generic escaping in the form `\\[u1EE7]` or `\\[u1F994]`.\n  434 | \n  435 |     let mut replaced = s\n  436 |         .replace('\\\\', \"\\\\(rs\")\n  437 |         .replace('-', \"\\\\-\")\n  438 |         .replace('\\u{00A0}', \"\\\\ \") // non-breaking space (non-stretchable)\n  439 |         .replace('–', \"\\\\[en]\") // \\u{2013} en-dash\n  440 |         .replace('—', \"\\\\[em]\") // \\u{2014} em-dash\n  441 |         .replace('‘', \"\\\\[oq]\") // \\u{2018} left single quote\n  442 |         .replace('’', \"\\\\[cq]\") // \\u{2019} right single quote or apostrophe\n  443 |         .replace('“', \"\\\\[lq]\") // \\u{201C} left double quote\n  444 |         .replace('”', \"\\\\[rq]\") // \\u{201D} right double quote\n  445 |         .replace('…', \"\\\\[u2026]\") // \\u{2026} ellipsis\n  446 |         .replace('│', \"|\") // \\u{2502} box drawing light vertical (could use \\[br])\n  447 |         .replace('├', \"|\") // \\u{251C} box drawings light vertical and right\n  448 |         .replace('└', \"`\") // \\u{2514} box drawings light up and right\n  449 |         .replace('─', \"\\\\-\") // \\u{2500} box drawing light horizontal\n  450 |     ;\n  451 |     if replaced.starts_with('.') {\n  452 |         replaced = format!(\"\\\\&.{}\", &replaced[1..]);\n  453 |     }\n  454 | \n  455 |     if let Some(ch) = replaced.chars().find(|ch| {\n  456 |         !matches!(ch, '\\n' | ' ' | '!'..='/' | '0'..='9'\n  457 |             | ':'..='@' | 'A'..='Z' | '['..='`' | 'a'..='z' | '{'..='~')\n  458 |     }) {\n  459 |         bail!(\n  460 |             \"character {:?} is not allowed (update the translation table if needed)\",\n  461 |             ch\n  462 |         );\n  463 |     }\n  464 |     Ok(replaced)\n  465 | }","lines":36,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/man.rs#L430-L465"}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In the credential `doit` loop, a fresh `String` buffer is allocated for every request\nline (`let mut buffer = String::new();` inside the loop). Reusing a single buffer with\n`buffer.clear()` between iterations would avoid reallocation. Negligible given low\nmessage volume, noted for completeness.","fix":"Allocate `buffer` once before the loop and `buffer.clear()` each iteration.","locations":[{"ref":"credential/cargo-credential/src/lib.rs:251-257","code":"  251 |     loop {\n  252 |         let mut buffer = String::new();\n  253 |         let len = std::io::stdin().read_line(&mut buffer)?;\n  254 |         if len == 0 {\n  255 |             return Ok(());\n  256 |         }\n  257 |         let request = deserialize_request(&buffer)?;","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential/src/lib.rs#L251-L257"}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`CleanContext::remove_paths` computes the progress bar maximum by fully walking every path with `walkdir` and counting entries (lines 606-609) before then walking them all again to delete in `rm_rf`. For large target directories this doubles the directory traversal cost just to size a progress bar.","fix":"Either accept an approximate/uncounted progress style for the whole-directory case, or reuse a single traversal to both count and delete.","locations":[{"ref":"src/cargo/ops/cargo_clean.rs:605-615","code":"  605 |     pub fn remove_paths(&mut self, paths: &[PathBuf]) -> CargoResult<()> {\n  606 |         let num_paths = paths\n  607 |             .iter()\n  608 |             .map(|path| walkdir::WalkDir::new(path).into_iter().count())\n  609 |             .sum();\n  610 |         self.progress = Box::new(CleaningFolderBar::new(self.gctx, num_paths));\n  611 |         for path in paths {\n  612 |             self.rm_rf(path)?;\n  613 |         }\n  614 |         Ok(())\n  615 |     }","lines":11,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_clean.rs#L605-L615"}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`tree::graph::Edges::add_edge` does a linear `contains(&edge)` scan over the existing edges of that kind before pushing, making edge insertion O(n) and overall edge construction O(n^2) for nodes with many edges of the same kind. For typical dependency graphs the per-kind edge count is small, but for very large workspaces/feature graphs this can add up.","fix":"If edge counts per kind grow large, consider de-duplicating with a `HashSet<Edge>` alongside the `Vec`, or dedup once after construction instead of on every insert.","locations":[{"ref":"src/cargo/ops/tree/graph.rs:122-127","code":"  122 |     fn add_edge(&mut self, edge: Edge) {\n  123 |         let indexes = self.0.entry(edge.kind()).or_default();\n  124 |         if !indexes.contains(&edge) {\n  125 |             indexes.push(edge)\n  126 |         }\n  127 |     }","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/tree/graph.rs#L122-L127"}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`RecursivePathSource::read_packages` and `query` call `first_package(...)` which\nmay emit a duplicate-package warning, but they iterate `self.packages` in\n`HashMap` order, so when there are duplicate package IDs the choice of which\npackage becomes `pkgs[0]` (and thus which is kept vs. warned-about) depends on\ninsertion/walk order. `read_packages` is also O(n) clones of each chosen\npackage. Not a correctness bug given the dedup, but the nondeterministic-looking\n'in favor of' message ordering can confuse users.","fix":"Consider sorting duplicate candidates deterministically (e.g. by manifest path) before picking `pkgs[0]` so the warning is reproducible.","locations":[{"ref":"src/cargo/sources/path.rs:253-269","code":"  253 |     pub fn read_packages(&mut self) -> CargoResult<Vec<Package>> {\n  254 |         self.load()?;\n  255 |         Ok(self\n  256 |             .packages\n  257 |             .borrow()\n  258 |             .iter()\n  259 |             .map(|(pkg_id, v)| {\n  260 |                 first_package(\n  261 |                     *pkg_id,\n  262 |                     v,\n  263 |                     &mut self.warned_duplicate.borrow_mut(),\n  264 |                     self.gctx,\n  265 |                 )\n  266 |                 .clone()\n  267 |             })\n  268 |             .collect())\n  269 |     }","lines":17,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/path.rs#L253-L269"},{"ref":"src/cargo/sources/path.rs:518-548","code":"  518 | fn first_package<'p>(\n  519 |     pkg_id: PackageId,\n  520 |     pkgs: &'p Vec<Package>,\n  521 |     warned_duplicate: &mut HashSet<PackageId>,\n  522 |     gctx: &GlobalContext,\n  523 | ) -> &'p Package {\n  524 |     if pkgs.len() != 1 && warned_duplicate.insert(pkg_id) {\n  525 |         let ignored = pkgs[1..]\n  526 |             .iter()\n  527 |             // We can assume a package with publish = false isn't intended to be seen\n  528 |             // by users so we can hide the warning about those since the user is unlikely\n  529 |             // to care about those cases.\n  530 |             .filter(|pkg| pkg.publish().is_none())\n  531 |             .collect::<Vec<_>>();\n  532 |         if !ignored.is_empty() {\n  533 |             use std::fmt::Write as _;\n  534 | \n  535 |             let plural = if ignored.len() == 1 { \"\" } else { \"s\" };\n  536 |             let mut msg = String::new();\n  537 |             let _ = writeln!(&mut msg, \"skipping duplicate package{plural} `{pkg_id}`:\");\n  538 |             for ignored in ignored {\n  539 |                 let manifest_path = ignored.manifest_path().display();\n  540 |                 let _ = writeln!(&mut msg, \"  {manifest_path}\");\n  541 |             }\n  542 |             let manifest_path = pkgs[0].manifest_path().display();\n  543 |             let _ = writeln!(&mut msg, \"in favor of {manifest_path}\");\n  544 |             let _ = gctx.shell().warn(msg);\n  545 |         }\n  546 |     }\n  547 |     &pkgs[0]\n  548 | }","lines":31,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/path.rs#L518-L548"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`cargo_cfg_var` rejects any `cfg` that is not an ASCII identifier via `is_ascii_ident` (which disallows `-`), then immediately calls `cfg.to_uppercase().replace('-', \"_\")`. The `.replace('-', \"_\")` can never do anything because a `-` would already have caused a panic. Misleading dead code suggesting `-` is accepted (unlike `cargo_feature`/`dep_metadata`, which genuinely allow and convert `-`).","fix":"Drop the `.replace('-', \"_\")` (only `.to_uppercase()` is meaningful), or, if hyphenated cfg names are intended to be accepted, relax `is_ascii_ident` accordingly.","locations":[{"ref":"crates/build-rs/src/input.rs:144-152","code":"  144 | #[track_caller]\n  145 | fn cargo_cfg_var(cfg: &str) -> String {\n  146 |     if !is_ascii_ident(cfg) {\n  147 |         panic!(\"invalid configuration option {cfg:?}\")\n  148 |     }\n  149 |     let cfg = cfg.to_uppercase().replace('-', \"_\");\n  150 |     let key = format!(\"CARGO_CFG_{cfg}\");\n  151 |     key\n  152 | }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/input.rs#L144-L152"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"Leftover debug `println!` in the HTTP download handler prints the resolved file path to stdout on every `/dl/...` request served by the test registry. This is noise in test output (and unlike the rest of the server code, it is not gated behind any verbosity flag).","fix":"Remove the `println!(\"{}\", file.display());` line.","locations":[{"ref":"crates/cargo-test-support/src/registry.rs:1075-1079","code":" 1075 |     pub fn dl(&self, req: &Request) -> Response {\n 1076 |         let file = self\n 1077 |             .dl_path\n 1078 |             .join(req.url.path().strip_prefix(\"/dl/\").unwrap());\n 1079 |         println!(\"{}\", file.display());","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/registry.rs#L1075-L1079"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"`RemainingDeps::iter` takes `&mut self` but only reads `self.data` (it calls `DepsFrame::flatten`, which uses `remaining_siblings.remaining()`, a read-only view, not `iter()`). The mutable borrow is unnecessary and forces callers to hold a `&mut RemainingDeps` where `&self` would suffice, which in turn shows up in `activate_deps_loop` where `remaining_deps.iter()` is called on the mutable local.","fix":"Change the receiver of `RemainingDeps::iter` to `&self`.","locations":[{"ref":"src/cargo/core/resolver/types.rs:315-317","code":"  315 |     pub fn iter(&mut self) -> impl Iterator<Item = (PackageId, &Dependency)> + '_ {\n  316 |         self.data.iter().flat_map(|(other, _)| other.flatten())\n  317 |     }","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/resolver/types.rs#L315-L317"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In `set_resolve_behavior`, the `ResolveBehavior::V3` arm of `match self.resolve_behavior()` contains `if self.resolve_behavior == ResolveBehavior::V3 { ... }`. Since `resolve_behavior()` just returns `self.resolve_behavior`, reaching the V3 arm already guarantees the condition is true; the inner `if` is always-true dead code.","fix":"Remove the redundant inner `if` and set the field directly in the V3 arm.","locations":[{"ref":"src/cargo/core/workspace.rs:334-341","code":"  334 |         match self.resolve_behavior() {\n  335 |             ResolveBehavior::V1 | ResolveBehavior::V2 => {}\n  336 |             ResolveBehavior::V3 => {\n  337 |                 if self.resolve_behavior == ResolveBehavior::V3 {\n  338 |                     self.resolve_honors_rust_version = true;\n  339 |                 }\n  340 |             }\n  341 |         }","lines":8,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/workspace.rs#L334-L341"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"`ArgMatchesExt::value_of_i32` has no callers anywhere in `src/` or `tests/` (only `value_of_u32` is used). It is a near-duplicate of `value_of_u32`.","fix":"Remove `value_of_i32`, or annotate `#[allow(dead_code)]` if intentionally part of the helper surface.","locations":[{"ref":"src/cargo/util/command_prelude.rs:608-619","code":"  608 |     fn value_of_i32(&self, name: &str) -> CargoResult<Option<i32>> {\n  609 |         let arg = match self._value_of(name) {\n  610 |             None => None,\n  611 |             Some(arg) => Some(arg.parse::<i32>().map_err(|_| {\n  612 |                 clap::Error::raw(\n  613 |                     clap::error::ErrorKind::ValueValidation,\n  614 |                     format!(\"invalid value: could not parse `{}` as a number\", arg),\n  615 |                 )\n  616 |             })?),\n  617 |         };\n  618 |         Ok(arg)\n  619 |     }","lines":12,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/command_prelude.rs#L608-L619"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"In `matches_caret_prerelease`, the match on `(major>0, minor.is_some(), patch.is_some())` reaches the `(_, true, _)`/final arms only when the tuple is `(false, true, true)` (major==0, minor present, patch present); the earlier arms at the `patch=false` positions already consume every case where `patch` is `None`. Therefore the `if upper.patch.is_none() { upper.patch = Some(1); }` branch is unreachable dead code -- patch is always `Some` there.","fix":"Drop the unreachable `is_none()` branch and unconditionally increment the already-present patch value.","locations":[{"ref":"src/cargo/util/semver_eval_ext.rs:259-268","code":"  259 |         (_, true, _) if upper.minor.unwrap() > 0 => {\n  260 |             upper.minor = Some(upper.minor.unwrap() + 1);\n  261 |             upper.patch = Some(0);\n  262 |         }\n  263 |         (_, true, _) if upper.minor.unwrap() == 0 => {\n  264 |             if upper.patch.is_none() {\n  265 |                 upper.patch = Some(1);\n  266 |             } else {\n  267 |                 upper.patch = Some(upper.patch.unwrap() + 1);\n  268 |             }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/semver_eval_ext.rs#L259-L268"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"`log_bits` returns early when `x == 0`, then immediately afterwards executes `assert!(x > 0);`. At that point `x` is guaranteed to be `> 0`, so the assertion can never fail and is dead/redundant.","fix":"Remove the redundant `assert!(x > 0);` line.","locations":[{"ref":"crates/resolver-tests/src/sat.rs:15-21","code":"   15 | fn log_bits(x: usize) -> usize {\n   16 |     if x == 0 {\n   17 |         return 0;\n   18 |     }\n   19 |     assert!(x > 0);\n   20 |     (num_bits::<usize>() as u32 - x.leading_zeros()) as usize\n   21 | }","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/resolver-tests/src/sat.rs#L15-L21"}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`OnePasswordKeychain::modify` and `create` take a `_name: Option<&str>` / `name`\nparameter, but the only callers pass `None` (modify) for the name. The `modify` function\nignores `_name` entirely. The parameter is dead in `modify`.","fix":"Drop the unused `_name` parameter from `modify`.","locations":[{"ref":"credential/cargo-credential-1password/src/main.rs:198-211","code":"  198 |     fn modify(\n  199 |         &self,\n  200 |         session: &Option<String>,\n  201 |         id: &str,\n  202 |         token: Secret<&str>,\n  203 |         _name: Option<&str>,\n  204 |     ) -> Result<(), Error> {\n  205 |         let cmd = self.make_cmd(\n  206 |             session,\n  207 |             &[\"item\", \"edit\", id, &format!(\"password={}\", token.expose())],\n  208 |         );\n  209 |         self.run_cmd(cmd)?;\n  210 |         Ok(())\n  211 |     }","lines":14,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-1password/src/main.rs#L198-L211"},{"ref":"credential/cargo-credential-1password/src/main.rs:295-295","code":"  295 |                     op.modify(&session, &id, token.as_deref(), None)?;","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-1password/src/main.rs#L295"}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"Redundant identity closures `.map(|name| name)` over `cargo_lints.keys()` that do nothing.","fix":"Remove `.map(|name| name)` and iterate the keys directly.","locations":[{"ref":"src/cargo/diagnostics/rules/unknown_lints.rs:129","code":"  129 |     for lint_name in cargo_lints.keys().map(|name| name) {","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unknown_lints.rs#L129"},{"ref":"src/cargo/diagnostics/rules/missing_lints_features.rs:74","code":"   74 |     for lint_name in cargo_lints.keys().map(|name| name) {","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/missing_lints_features.rs#L74"}]},{"id":"DEAD_10","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`RustupToolchainSource::is_implicit_override` is annotated `#[allow(dead_code)]` at the impl block, and the enum has `Other(String)` plus variants that are only ever constructed from the `RUSTUP_TOOLCHAIN_SOURCE` env var parsing. The `#[allow(dead_code)]` suggests parts of this API are unused; specifically the `is_implicit_override` returning `Option<bool>` with a `None` arm for `Other` is only used in one place. The allow attribute masks potential dead variants and should be reviewed/narrowed.","fix":"Remove the broad `#[allow(dead_code)]` and instead allow/remove only what is genuinely needed, so future dead code in this impl is surfaced.","locations":[{"ref":"src/cargo/ops/cargo_install.rs:55-67","code":"   55 | #[allow(dead_code)]\n   56 | impl RustupToolchainSource {\n   57 |     fn is_implicit_override(&self) -> Option<bool> {\n   58 |         match self {\n   59 |             Self::Default => Some(false),\n   60 |             Self::Environment => Some(true),\n   61 |             Self::CommandLine => Some(false),\n   62 |             Self::OverrideDB => Some(true),\n   63 |             Self::ToolchainFile => Some(true),\n   64 |             Self::Other(_) => None,\n   65 |         }\n   66 |     }\n   67 | }","lines":13,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_install.rs#L55-L67"}]},{"id":"DEAD_11","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`detect_source_paths_and_types` builds `let name = package_name;` and also reuses `path` aliasing but the duplicate-binary check keys the `duplicates_checker` BTreeMap solely on `name` (the package name) regardless of which file produced it (lines 388-403). Since all bin sources share the same `name` key, the map is effectively a single-slot \"have we already seen a bin\" flag; the BTreeMap and its `&str` key add complexity over a simple `Option<&SourceFileInformation>`.","fix":"Replace the single-key BTreeMap with an `Option<&SourceFileInformation>` to track the first detected binary source.","locations":[{"ref":"src/cargo/ops/cargo_new.rs:387-403","code":"  387 |     let mut previous_lib_relpath: Option<&str> = None;\n  388 |     let mut duplicates_checker: BTreeMap<&str, &SourceFileInformation> = BTreeMap::new();\n  389 | \n  390 |     for i in detected_files {\n  391 |         if i.bin {\n  392 |             if let Some(x) = BTreeMap::get::<str>(&duplicates_checker, &name) {\n  393 |                 anyhow::bail!(\n  394 |                     \"\\\n  395 | multiple possible binary sources found:\n  396 |   {}\n  397 |   {}\n  398 | cannot automatically generate Cargo.toml as the main target would be ambiguous\",\n  399 |                     &x.relative_path,\n  400 |                     &i.relative_path\n  401 |                 );\n  402 |             }\n  403 |             duplicates_checker.insert(name, i);","lines":17,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_new.rs#L387-L403"}]},{"id":"DEAD_12","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`IndexSummary::map_summary` calls `v.clone()` on `v: u32` in the `Unsupported`\narm (`IndexSummary::Unsupported(f(s), v.clone())`). `u32` is `Copy`, so the\n`.clone()` is a no-op redundancy that triggers `clippy::clone_on_copy`.","fix":"Drop `.clone()`: `IndexSummary::Unsupported(f(s), v)`.","locations":[{"ref":"src/cargo/sources/registry/index/mod.rs:166","code":"  166 |             IndexSummary::Unsupported(s, v) => IndexSummary::Unsupported(f(s), v.clone()),","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/registry/index/mod.rs#L166"}]},{"id":"DEAD_13","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`set_comparator` has two arms producing the identical error via `unsupported_version_req`: the explicit `Greater | GreaterEq | Less | LessEq` arm (lines 68-71) and the catch-all `_` arm (lines 74-77). Since `semver::Op` is `#[non_exhaustive]` the catch-all is needed, but the explicit comparison arm is fully redundant with it - both build `pred.to_string()` and call `unsupported_version_req`. The explicit arm adds no behavior.","fix":"Drop the explicit `Greater | GreaterEq | Less | LessEq` arm and let the `_` arm handle them, or keep it only if a distinct message is desired.","locations":[{"ref":"src/cargo/util/toml_mut/upgrade.rs:68-77","code":"   68 |         semver::Op::Greater | semver::Op::GreaterEq | semver::Op::Less | semver::Op::LessEq => {\n   69 |             let user_pred = pred.to_string();\n   70 |             Err(unsupported_version_req(user_pred))\n   71 |         }\n   72 |         semver::Op::Tilde => Ok(assign_partial_req(version, pred)),\n   73 |         semver::Op::Caret => Ok(assign_partial_req(version, pred)),\n   74 |         _ => {\n   75 |             let user_pred = pred.to_string();\n   76 |             Err(unsupported_version_req(user_pred))\n   77 |         }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml_mut/upgrade.rs#L68-L77"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment in `check_token` claims the allowed set is \"visible ASCII characters (0x21-0x7e), space, and tab\", but the predicate is `b >= 32 && b < 127`, i.e. 0x20-0x7e (which already includes space, 0x20). Listing both \"0x21-0x7e\" and \"space\" separately is inconsistent with the single range the code actually uses; a reader checking the bounds against the comment will be misled.","fix":"Update the comment to say the range is 0x20-0x7e (space through tilde) plus tab (0x09).","locations":[{"ref":"crates/crates-io/lib.rs:505-511","code":"  505 |     if token.bytes().all(|b| {\n  506 |         // This is essentially the US-ASCII limitation of\n  507 |         // https://www.rfc-editor.org/rfc/rfc9110#name-field-values. That is,\n  508 |         // visible ASCII characters (0x21-0x7e), space, and tab. We want to be\n  509 |         // able to pass this in an HTTP header without encoding.\n  510 |         b >= 32 && b < 127 || b == b'\\t'\n  511 |     }) {","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/crates-io/lib.rs#L505-L511"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc comment for parse_edge_kinds is wrong: typo `no_proc_marco` (should be `no_proc_macro`), and it claims a 2-element return while the function returns a 3-tuple `(HashSet<EdgeKind>, bool, bool)`; the third element (the `public` flag) is undocumented.","fix":"Document all three returned values and fix the `marco` typo.","locations":[{"ref":"src/bin/cargo/commands/tree.rs:267-269","code":"  267 | /// Parses `--edges` option.\n  268 | ///\n  269 | /// Returns a tuple of `EdgeKind` map and `no_proc_marco` flag.","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/bin/cargo/commands/tree.rs#L267-L269"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Doc comment for `extra_args` lists the source precedence as env vars, then `target.*`/\n`host.*`, then `build.rustflags` as a single linear \"if none found\" fallback chain. But the\nactual control flow returns ONLY `host.*` flags (exclusively, before consulting env/target/\nbuild) when `host_artifact_uses_only_host_config` is true. Placing `host.*.rustflags` as a\nthird fallback item in the same chain contradicts that early exclusive return.","fix":"Reword to make clear `host.*.rustflags` is an exclusive early-return path, not a fallback in the env/target/build chain.","locations":[{"ref":"src/cargo/core/compiler/build_context/target_info.rs:760-790","code":"  760 | /// then if none of those were found\n  761 | ///\n  762 | ///  - `target.*.rustflags` from the config (.cargo/config)\n  763 | ///  - `target.cfg(..).rustflags` from the config\n  764 | ///  - `host.*.rustflags` from the config if compiling a host artifact or without `--target`\n  765 | ///     (requires `-Zhost-config`)\n  766 | ///\n  767 | /// then if none of those were found\n  768 | ///\n  769 | ///  - `build.rustflags` from the config\n  770 | ///\n  771 | /// The behavior differs slightly when cross-compiling (or, specifically, when `--target` is\n  772 | /// provided) for artifacts that are always built for the host (plugins, build scripts, ...).\n  773 | /// For those artifacts, _only_ `host.*.rustflags` is respected, and no other configuration\n  774 | /// sources, _regardless of the value of `target-applies-to-host`_. This is counterintuitive, but\n  775 | /// necessary to retain backwards compatibility with older versions of Cargo.\n  776 | ///\n  777 | /// Rules above also applies to rustdoc. Just the key would be `rustdocflags`/`RUSTDOCFLAGS`.\n  778 | fn extra_args(\n  779 |     gctx: &GlobalContext,\n  780 |     requested_kinds: &[CompileKind],\n  781 |     host_triple: &str,\n  782 |     target_cfg: Option<&[Cfg]>,\n  783 |     kind: CompileKind,\n  784 |     flags: Flags,\n  785 | ) -> CargoResult<Vec<String>> {\n  786 |     if host_artifact_uses_only_host_config(gctx, requested_kinds, kind)? {\n  787 |         return Ok(rustflags_from_host(gctx, flags, host_triple)?.unwrap_or_else(Vec::new));\n  788 |     }\n  789 | \n  790 |     // All other artifacts pick up the RUSTFLAGS, [target.*], and [build], in that order.","lines":31,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/build_context/target_info.rs#L760-L790"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Comments claim the env-var dep-info entries use the marker `# env-var:...`, but the parser actually strips the prefix `# env-dep:` (the real rustc marker). The doc comment on `RustcDepInfo::env` and the module-level doc in `mod.rs` both say `# env-var:...`, which is misleading for anyone trying to understand or modify the dep-info parser.","fix":"Change the comments to reference `# env-dep:` to match the actual marker parsed at dep_info.rs:392.","locations":[{"ref":"src/cargo/core/compiler/fingerprint/dep_info.rs:45-46","code":"   45 |     /// These are from the special `# env-var:...` comments.\n   46 |     pub env: Vec<(String, Option<String>)>,","lines":2,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/dep_info.rs#L45-L46"},{"ref":"src/cargo/core/compiler/fingerprint/mod.rs:190-191","code":"  190 | //! Note that Cargo parses the special `# env-var:...` comments in dep-info\n  191 | //! files to learn about environment variables that the rustc compile depends on.","lines":2,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/mod.rs#L190-L191"},{"ref":"src/cargo/core/compiler/fingerprint/dep_info.rs:392-392","code":"  392 |         if let Some(rest) = line.strip_prefix(\"# env-dep:\") {","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/dep_info.rs#L392"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc comment on `LockManager::downgrade_to_shared` reads \"Upgrades an existing exclusive\nlock into a shared lock.\" Exclusive -> shared is a downgrade, not an upgrade; the comment\ncontradicts the method name and the actual behavior, misleading readers about lock-strength\ndirection.","fix":"Reword to \"Downgrades an existing exclusive lock into a shared lock.\"","locations":[{"ref":"src/cargo/core/compiler/locking.rs:73-82","code":"   73 |     /// Upgrades an existing exclusive lock into a shared lock.\n   74 |     #[instrument(skip(self))]\n   75 |     pub fn downgrade_to_shared(&self, key: &LockKey) -> CargoResult<()> {\n   76 |         let locks = self.locks.read().unwrap();\n   77 |         let Some(lock) = locks.get(key) else {\n   78 |             bail!(\"lock was not found in lock manager: {key}\");\n   79 |         };\n   80 |         lock.file().lock_shared()?;\n   81 |         Ok(())\n   82 |     }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/locking.rs#L73-L82"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"`UnitFor::new_compiler` comment says it forces plugins to use `panic=abort` so panics in the compiler are caught, but the code sets `panic_setting: PanicSetting::AlwaysUnwind` (i.e. unwind, not abort). The comment directly contradicts the code and misleads anyone reasoning about panic strategy for compiler plugins.","fix":"Reword the comment to match the actual behavior (AlwaysUnwind, the same rationale as build scripts/proc-macros to maximize dependency sharing), or correct the code if abort was truly intended.","locations":[{"ref":"src/cargo/core/profiles.rs:1108-1111","code":" 1108 |             // Force plugins to use `panic=abort` so panics in the compiler do\n 1109 |             // not abort the process but instead end with a reasonable error\n 1110 |             // message that involves catching the panic in the compiler.\n 1111 |             panic_setting: PanicSetting::AlwaysUnwind,","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/profiles.rs#L1108-L1111"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"When resolving the `resolver.lockfile-path` template, the UnexpectedBracket error message reads `... in build.build-dir path `{raw_template}``. This is a copy-paste from the build-dir handler; the context here is `resolver.lockfile-path`, so the diagnostic points the user at the wrong config key.","fix":"Change the message to reference `resolver.lockfile-path` instead of `build.build-dir`.","locations":[{"ref":"src/cargo/core/workspace.rs:386-388","code":"  386 |                             anyhow!(\n  387 |                                 \"unexpected {btype} bracket `{literal}` in build.build-dir path `{raw_template}`\"\n  388 |                             )","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/workspace.rs#L386-L388"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Placeholder lint description: `desc: \"blanket_hint_mostly_unused lint\"`. Every other lint has a human-readable desc, and desc is surfaced to users (unknown_lints formats `\"{}: ...\", LINT.desc`).","fix":"Replace with a descriptive sentence matching the report title used by the lint.","locations":[{"ref":"src/cargo/diagnostics/rules/blanket_hint_mostly_unused.rs:25","code":"   25 |     desc: \"blanket_hint_mostly_unused lint\",","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/blanket_hint_mostly_unused.rs#L25"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Help title has an unclosed backtick: \"to inherit `workspace.lints, add:\" (the backtick before workspace.lints is never closed).","fix":"Change to \"to inherit `workspace.lints`, add:\".","locations":[{"ref":"src/cargo/diagnostics/rules/missing_lints_inheritance.rs:99","code":"   99 |             Group::with_title(Level::HELP.secondary_title(\"to inherit `workspace.lints, add:\"));","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/missing_lints_inheritance.rs#L99"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `collect_statuses` describes behavior that no longer matches the signature. It says it writes \"dirty files outside `relative_package_root` into `dirty_files_outside_package_root`, and all *everything else* into `dirty_files`\", but the function only has a single `dirty_files` output parameter and pushes everything into it. There is no `dirty_files_outside_package_root` parameter. The comment is stale and misleading.","fix":"Update the doc comment to reflect that all dirty/untracked/ignored files matched by the pathspec are pushed into the single `dirty_files` vector.","locations":[{"ref":"src/cargo/ops/cargo_package/vcs.rs:274-283","code":"  274 | /// Helper to collect dirty statuses for a single repo.\n  275 | /// `relative_package_root` is `Some` if the root is a sub-directory of the workdir.\n  276 | /// Writes dirty files outside `relative_package_root` into `dirty_files_outside_package_root`,\n  277 | /// and all *everything else* into `dirty_files`.\n  278 | #[must_use]\n  279 | fn collect_statuses(\n  280 |     repo: &gix::Repository,\n  281 |     workdir: &Path,\n  282 |     relative_package_root: Option<&Path>,\n  283 |     dirty_files: &mut Vec<PathBuf>,","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_package/vcs.rs#L274-L283"}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `add_feature` says \"Returns a tuple `(missing, index)`. `missing` is true if this feature edge was already added.\" This is contradictory/incorrect: the code returns `(true, ...)` (the `missing` bool) when the node was NOT found (i.e. newly added) and `(false, ...)` when it already existed. So `missing == true` means the node was newly created / previously absent, not \"already added\". The comment inverts the meaning and the name `missing` is used in callers (`add_feature_rec`) to mean \"newly added, so recurse\".","fix":"Reword the doc comment: `missing` is true when the feature node did not exist yet and was newly added (so callers should recurse), false when it already existed.","locations":[{"ref":"src/cargo/ops/tree/graph.rs:572-606","code":"  572 | /// Returns a tuple `(missing, index)`.\n  573 | /// `missing` is true if this feature edge was already added.\n  574 | /// `index` is the index of the index in the graph of the `Feature` node.\n  575 | fn add_feature(\n  576 |     graph: &mut Graph<'_>,\n  577 |     name: InternedString,\n  578 |     from: Option<NodeId>,\n  579 |     to: Edge,\n  580 | ) -> (bool, NodeId) {\n  581 |     // `to` *must* point to a package node.\n  582 |     assert!(matches! {graph.node(to.node()), Node::Package{..}});\n  583 |     let node = Node::Feature {\n  584 |         node_index: to.node(),\n  585 |         name,\n  586 |     };\n  587 |     let (missing, node_index) = match graph.index.get(&node) {\n  588 |         Some(idx) => (false, *idx),\n  589 |         None => (true, graph.add_node(node)),\n  590 |     };\n  591 |     if let Some(from) = from {\n  592 |         let from_edge = Edge {\n  593 |             kind: to.kind(),\n  594 |             node: node_index,\n  595 |             public: to.public(),\n  596 |         };\n  597 |         graph.edges_mut(from).add_edge(from_edge);\n  598 |     }\n  599 |     let to_edge = Edge {\n  600 |         kind: EdgeKind::Feature,\n  601 |         node: to.node(),\n  602 |         public: true,\n  603 |     };\n  604 |     graph.edges_mut(node_index).add_edge(to_edge);\n  605 |     (missing, node_index)\n  606 | }","lines":35,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/tree/graph.rs#L572-L606"}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment on `max_unpack_size`'s env-var parse for the compression ratio\nsays `.expect(\"a max compression ratio in bytes\")`. A compression ratio is\ndimensionless, not measured in bytes; the message is copy-pasted from the size\nparse just above it and is misleading if it ever fires.","fix":"Change the expect message to e.g. `\"a max compression ratio\"`.","locations":[{"ref":"src/cargo/sources/registry/mod.rs:926-932","code":"  926 |     let max_compression_ratio = if cfg!(debug_assertions) && gctx.get_env(RATIO_VAR).is_ok() {\n  927 |         // For integration test only.\n  928 |         gctx.get_env(RATIO_VAR)\n  929 |             .unwrap()\n  930 |             .parse()\n  931 |             .expect(\"a max compression ratio in bytes\")\n  932 |     } else {","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/registry/mod.rs#L926-L932"}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The `alt_init` doc comment and call sequence: `alt_init` first calls `init()` (setting up the main dummy registry) and discards its `TestRegistry`, then builds and returns only the alternative registry. The returned value's name (`alt_init`) and signature suggest it yields the alternative registry, which it does, but the dropped main `TestRegistry` from the inner `init()` is non-obvious: if `init()` ever started an HTTP server (it doesn't by default), dropping it would immediately stop that server. The behavior is currently fine but undocumented; the discarded `init()` result is an easy source of confusion.","fix":"Add a comment explaining that `init()` is called only for its config side effects and its handle is intentionally dropped (safe because the default registry has no server).","locations":[{"ref":"crates/cargo-test-support/src/registry.rs:636-642","code":"  636 | /// Setup a local \"alternative\" [`TestRegistry`]\n  637 | ///\n  638 | /// When calling `cargo publish`, see instead [`crate::publish`].\n  639 | pub fn alt_init() -> TestRegistry {\n  640 |     init();\n  641 |     RegistryBuilder::new().alternative().build()\n  642 | }","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/registry.rs#L636-L642"}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment for `read` says \"Equivalent to `std::fs::read_to_string` with better error messages\" but the function additionally produces a custom \"was not valid utf-8\" error distinct from `read_to_string`'s behavior, and is implemented on top of `read_bytes` rather than `read_to_string`. Minor: the \"equivalent\" claim glosses over the differing utf-8 error path.","fix":"Reword to note it reads bytes then validates UTF-8 with a dedicated error message.","locations":[{"ref":"crates/cargo-util/src/paths.rs:164-172","code":"  164 | /// Reads a file to a string.\n  165 | ///\n  166 | /// Equivalent to [`std::fs::read_to_string`] with better error messages.\n  167 | pub fn read(path: &Path) -> Result<String> {\n  168 |     match String::from_utf8(read_bytes(path)?) {\n  169 |         Ok(s) => Ok(s),\n  170 |         Err(_) => anyhow::bail!(\"path at `{}` was not valid utf-8\", path.display()),\n  171 |     }\n  172 | }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-util/src/paths.rs#L164-L172"}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment on `util.rs` starts with `///!` which is not a valid Rust doc-comment form for an inner/module doc; `///!` is parsed as an outer doc comment `//` plus `/!` content applied to the following item (the `use`), not as the intended module-level `//!` documentation. The text 'General utilities.' is therefore attached to the `use` statement, not the module.","fix":"Change `///! General utilities.` to `//! General utilities.`.","locations":[{"ref":"crates/mdman/src/util.rs:1-2","code":"    1 | ///! General utilities.\n    2 | use crate::EventIter;","lines":2,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/util.rs#L1-L2"}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment typo: `/// Finds a auiltin command.` should be `builtin`.","fix":"Change to `/// Finds a builtin command.`","locations":[{"ref":"src/bin/cargo/commands/help.rs:205","code":"  205 | /// Finds a auiltin command.","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/bin/cargo/commands/help.rs#L205"}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Doc comment on `Work` (\"Each proc should send its description before starting. It should\nsend either once or close immediately.\") is stale/vague: `Work` is just a boxed\n`FnOnce(&JobState) -> CargoResult<()>`; there is no \"proc\" and nothing \"closes\". It\npredates refactors and no longer describes the type.","fix":"Reword to describe `Work` as a closure executed once via `call`.","locations":[{"ref":"src/car (k, v)?,\n 1451 |             \"rustdoc-depinfo\" => self.rustdoc_depinfo = parse_empty(k, v)?,\n 1452 |             \"rustdoc-map\" => self.rustdoc_map = parse_empty(k, v)?,\n 1453 |             \"rustdoc-mergeable-info\" => self.rustdoc_mergeable_info = parse_empty(k, v)?,\n 1454 |             \"rustdoc-scrape-examples\" => self.rustdoc_scrape_examples = parse_empty(k, v)?,\n 1455 |             \"sbom\" => self.sbom = parse_empty(k, v)?,\n 1456 |             \"section-timings\" => self.section_timings = parse_empty(k, v)?,\n 1457 |             \"separate-nightlies\" => self.separate_nightlies = parse_empty(k, v)?,\n 1458 |             \"checksum-freshness\" => self.checksum_freshness = parse_empty(k, v)?,\n 1459 |             \"skip-rustdoc-fingerprint\" => self.skip_rustdoc_fingerprint = parse_empty(k, v)?,\n 1460 |             \"script\" => self.script = parse_empty(k, v)?,\n 1461 |             \"target-applies-to-host\" => self.target_applies_to_host = parse_empty(k, v)?,\n 1462 |             \"panic-immediate-abort\" => self.panic_immediate_abort = parse_empty(k, v)?,\n 1463 |             \"unstable-options\" => self.unstable_options = parse_empty(k, v)?,","lines":66,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/features.rs#L1398-L1463"}]},{"id":"CMT_20","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Function `maybe_newer_span` and its callers (`newer_time_span_for_config`, `set_max_download_age`) are named/doc'd as picking the 'newer' span, but the doc explicitly and correctly says they return the SHORTER duration. The 'newer' naming is the opposite of the actual semantics (a shorter max-age is a more aggressive/older cutoff), which is confusing for maintainers.","fix":"Rename to `shorter_span`/`shorter_time_span_for_config` (or similar) to match what the functions actually compute.","locations":[{"ref":"src/cargo/core/gc.rs:313-343","code":"  313 | /// Returns the shorter duration from `cur_span` versus `config_span`.\n  314 | ///\n  315 | /// This is used because the user may specify multiple options which overlap,\n  316 | /// and this will pick whichever one is shorter.\n  317 | ///\n  318 | /// * `cur_span` is the span we are comparing against (the value from the CLI\n  319 | ///   option). If None, just returns the config duration.\n  320 | /// * `config_name` is the name of the config option the span is loaded from.\n  321 | /// * `config_span` is the span value loaded from config.\n  322 | fn newer_time_span_for_config(\n  323 |     cur_span: Option<Duration>,\n  324 |     config_name: &str,\n  325 |     config_span: &str,\n  326 | ) -> CargoResult<Option<Duration>> {\n  327 |     let config_span = parse_time_span_for_config(config_name, config_span)?;\n  328 |     Ok(Some(maybe_newer_span(config_span, cur_span)))\n  329 | }\n  330 | \n  331 | /// Returns whichever [`Duration`] is shorter.\n  332 | fn maybe_newer_span(a: Duration, b: Option<Duration>) -> Duration {\n  333 |     match b {\n  334 |         Some(b) => {\n  335 |             if b < a {\n  336 |                 b\n  337 |             } else {\n  338 |                 a\n  339 |             }\n  340 |         }\n  341 |         None => a,\n  342 |     }\n  343 | }","lines":31,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/gc.rs#L313-L343"}]},{"id":"CMT_21","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Two doc-comment problems. (a) `get_git_db_items_to_clean` is documented as keeping total size under a max size, but it actually deletes by AGE (`WHERE timestamp < ?1`); size-based git cleaning is the separate `get_git_items_to_clean_size`. (b) The four `insert_*_from_cache` helpers all say 'clearing `registry_index_timestamps`' (copy-paste leftover); each actually clears its own respective timestamps map.","fix":"Reword (a only for `parent.is_none()`, so the invariant currently holds — but it is enforced only by convention across `resolve()`/`activate_deps_loop`/`generalize_conflicting` (all of which hardcode `first_version = None` when a parent exists). A future caller passing a non-None `first_version` with `parent.is_some()` would silently return cached results for the wrong ordering.","fix":"Add a debug assertion in `build_deps` that `first_version.is_none() == parent.is_some()` (or include `first_version` in the key) to make the invariant self-checking.","locations":[{"ref":"src/cargo/core/resolver/dep_cache.rs:212-221","code":"  212 |     /// a cache of `Dependency`s that are required for a `Summary`\n  213 |     ///\n  214 |     /// HACK: `first_version` is not kept in the cache key is it is 1:1 with\n  215 |     /// `parent.is_none()` (the first element of the cache key) as it doesn't change through\n  216 |     /// execution.\n  217 |     summary_cache: HashMap<\n  218 |         (Option<PackageId>, Summary, ResolveOpts),\n  219 |         (Rc<(HashSet<InternedString>, Rc<Vec<DepInfo>>)>, bool),\n  220 |     >,\n  221 | }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/resolver/dep_cache.rs#L212-L221"},{"ref":"src/cargo/core/resolver/dep_cache.rs:291-351","code":"  291 |     pub fn build_deps(\n  292 |         &mut self,\n  293 |         cx: &ResolverContext,\n  294 |         parent: Option<PackageId>,\n  295 |         candidate: &Summary,\n  296 |         opts: &ResolveOpts,\n  297 |         first_version: Option<VersionOrdering>,\n  298 |     ) -> ActivateResult<Rc<(HashSet<InternedString>, Rc<Vec<DepInfo>>)>> {\n  299 |         // if we have calculated a result before, then we can just return it,\n  300 |         // as it is a \"pure\" query of its arguments.\n  301 |         if let Some(out) = self\n  302 |             .summary_cache\n  303 |             .get(&(parent, candidate.clone(), opts.clone()))\n  304 |         {\n  305 |             return Ok(out.0.clone());\n  306 |         }\n  307 |         // First, figure out our set of dependencies based on the requested set\n  308 |         // of features. This also calculates what features we're going to enable\n  309 |         // for our own dependencies.\n  310 |         let (used_features, deps) = resolve_features(parent, candidate, opts)?;\n  311 | \n  312 |         // Next, transform all dependencies into a list of possible candidates\n  313 |         // which can satisfy that dependency.\n  314 |         let mut all_ready = true;\n  315 |         let mut deps = deps\n  316 |             .into_iter()\n  317 |             .filter_map(|(dep, features)| match self.query(&dep, first_version) {\n  318 |                 Poll::Ready(Ok(candidates)) => Some(Ok((dep, candidates, features))),\n  319 |                 Poll::Pending => {\n  320 |                     all_ready = false;\n  321 |                     // we can ignore Pending deps, resolve will be repeatedly called\n  322 |                     // until there are none to ignore\n  323 |                     None\n  324 |                 }\n  325 |                 Poll::Ready(Err(e)) => Some(Err(e).with_context(|| {\n  326 |                     format!(\n  327 |                         \"failed to get `{}` as a dependency of {}\",\n  328 |                         dep.package_name(),\n  329 |                         describe_path_in_context(cx, &candidate.package_id()),\n  330 |                     )\n  331 |                 })),\n  332 |             })\n  333 |             .collect::<CargoResult<Vec<DepInfo>>>()?;\n  334 | \n  335 |         // Attempt to resolve dependencies with fewer candidates before trying\n  336 |         // dependencies with more candidates. This way if the dependency with\n  337 |         // only one candidate can't be resolved we don't have to do a bunch of\n  338 |         // work before we figure that out.\n  339 |         deps.sort_by_key ix":"Correct `dev-dependencoes` to `dev-dependencies`.","locations":[{"ref":"src/cargo/diagnostics/rules/unused_dependencies.rs:62","code":"   62 | - `cargo check --all-targets` will still only lint `[build-dependencies]` and `[dependencies]` and not `[dev-dependencoes]`","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unused_dependencies.rs#L62"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"HTTP debug logging redacts `authorization:`, `h2h3 [authorization:`, and `set-cookie` header lines, but does NOT redact `Proxy-Authorization:` (nor its `h2h3 [proxy-authorization:` variant). When `http.debug = true`, proxy credentials are written verbatim to the network debug log. The module configures proxies and explicitly intends to scrub credentials from logs, so this is a genuine gap.","fix":"Add a redaction branch for lines starting with `proxy-authorization:` (and the `h2h3 [proxy-authorization:` form), matching the existing `authorization` handling.","locations":[{"ref":"src/cargo/util/network/http.rs:251-265","code":"  251 |     let starts_with_ignore_case = |line: &str, text: &str| -> bool {\n  252 |         let line = line.as_bytes();\n  253 |         let text = text.as_bytes();\n  254 |         line[..line.len().min(text.len())].eq_ignore_ascii_case(text)\n  255 |     };\n  256 |     match str::from_utf8(data) {\n  257 |         Ok(s) => {\n  258 |             for mut line in s.lines() {\n  259 |                 if starts_with_ignore_case(line, \"authorization:\") {\n  260 |                     line = \"Authorization: [REDACTED]\";\n  261 |                 } else if starts_with_ignore_case(line, \"h2h3 [authorization:\") {\n  262 |                     line = \"h2h3 [Authorization: [REDACTED]]\";\n  263 |                 } else if starts_with_ignore_case(line, \"set-cookie\") {\n  264 |                     line = \"set-cookie: [REDACTED]\";\n  265 |                 }","lines":15,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/network/http.rs#L251-L265"}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"negligible","easy":false,"description":"Naming inconsistency: `cargo_target_family` is the only `CARGO_CFG_*`-backed accessor in the cfg module not prefixed `cargo_cfg_` (its siblings are `cargo_cfg_target_os`, `cargo_cfg_target_env`, etc., and it itself reads `cargo_cfg_var(\"target_family\")` i.e. `CARGO_CFG_TARGET_FAMILY`). The odd name will confuse discovery and breaks the otherwise-strict naming pattern.","fix":"Rename to `cargo_cfg_target_family` (keeping a deprecated alias if back-compat is required).","locations":[{"ref":"crates/build-rs/src/input.rs:305-309","code":"  305 |     /// The [target family](https://doc.rust-lang.org/stable/reference/conditional-compilation.html#target_family).\n  306 |     #[track_caller]\n  307 |     pub fn cargo_target_family() -> Vec<String> {\n  308 |         to_strings(var_or_panic(&cargo_cfg_var(\"target_family\")), ',')\n  309 |     }","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/input.rs#L305-L309"}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"negligible","easy":false,"description":"`CompileMode::Doc` is a fieldless unit variant but is matched as `Doc { .. }` (struct-rest\npattern) in the serializer and in `is_doc`. This compiles but is misleading: it visually\nimplies `Doc` carries fields, easy to confuse with `UserIntent::Doc` which does. Other\nmodes are compared with `==`.","fix":"Use bare `CompileMode::Doc` (no braces) to match the fieldless declaration.","locations":[{"ref":"src/cargo/core/compiler/build_config.rs:199","code":"  199 |             Doc { .. } => \"doc\".serialize(s),","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/ca
