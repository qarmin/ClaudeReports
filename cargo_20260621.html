<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`PackageIdSpec::Display` unconditionally calls `url.path_segments().unwrap().next_back().unwrap()` when a url is present. While `parse`/`from_url` guarantee a non-empty path, the public constructors `with_url`/`set_url` accept an arbitrary `Url`. A url without path segments (e.g. `https://crates.io` or a `data:`/`mailto:`-style url where `path_segments()` returns `None`) makes `Display` (and thus `Serialize`, which calls `to_string`) panic.","fix":"Guard the comparison: use `url.path_segments().and_then(|mut s| s.next_back())` and only emit `#name` when the last segment is missing or differs from `self.name`, instead of unwrapping.","locations":[{"ref":"crates/cargo-util-schemas/src/core/package_id_spec.rs:248-251","code":"  248 |                 if url.path_segments().unwrap().next_back().unwrap() != &*self.name {\n  249 |                     printed_name = true;\n  250 |                     write!(f, \"#{}\", self.name)?;\n  251 |                 }","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-util-schemas/src/core/package_id_spec.rs#L248-L251"},{"ref":"crates/cargo-util-schemas/src/core/package_id_spec.rs:203-205","code":"  203 |     pub fn set_url(&mut self, url: Url) {\n  204 |         self.url = Some(url);\n  205 |     }","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-util-schemas/src/core/package_id_spec.rs#L203-L205"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`CString::new(registry.index_url).unwrap()` and `CString::new(read_token(...).expose()).unwrap()`\npanic if the index URL or the user-provided token contains an interior NUL byte. The\ntoken is read from stdin/command line, so a malformed token causes a panic instead of a\nclean error. The `label()` helper has the same `.unwrap()` problem.","fix":"Use `CString::new(...).map_err(|e| format!(\"invalid value: {e}\"))?` to return a structured error instead of panicking.","locations":[{"ref":"credential/cargo-credential-libsecret/src/lib.rs:169-169","code":"  169 |             let index_url_c = CString::new(registry.index_url).unwrap();","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L169"},{"ref":"credential/cargo-credential-libsecret/src/lib.rs:209-209","code":"  209 |                     let token = CString::new(read_token(options, registry)?.expose()).unwrap();","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L209"},{"ref":"credential/cargo-credential-libsecret/src/lib.rs:104-106","code":"  104 |     fn label(index_url: &str) -> CString {\n  105 |         CString::new(format!(\"cargo-registry:{}\", index_url)).unwrap()\n  106 |     }","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L104-L106"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`SecKeychain::default().unwrap()` will panic if the default keychain cannot be opened\n(e.g. no keychain configured, running in a headless/CI context, or the Security\nframework returns an error). A credential provider should return a structured\n`Error` so Cargo can try the next provider, not abort with a panic that prints an\nunhelpful backtrace to the user.","fix":"Replace `.unwrap()` with `.map_err(Box::new)?` to convert into `Error::Other`.","locations":[{"ref":"credential/cargo-credential-macos-keychain/src/lib.rs:33-33","code":"   33 |             let keychain = SecKeychain::default().unwrap();","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-macos-keychain/src/lib.rs#L33"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"get_toolchains_from_rustup() unwraps `Command::new(\"rustup\")...output()` and unwraps `String::from_utf8` on stdout. Cargo can be installed without rustup, in which case `output()` returns Err(NotFound) and the `.unwrap()` panics. This runs inside shell-completion candidate generation, so completion panics instead of degrading. The function already returns an empty Vec on non-success exit status, so a spawn failure should do the same; from_utf8 should also be lossy to avoid panicking on non-UTF8 output.","fix":"Return `vec![]` on spawn failure (`let Ok(output) = ...output() else { return vec![]; };`) and use `String::from_utf8_lossy(&output.stdout)`.","locations":[{"ref":"src/bin/cargo/cli.rs:741-756","code":"  741 | fn get_toolchains_from_rustup() -> Vec<String> {\n  742 |     let output = std::process::Command::new(\"rustup\")\n  743 |         .arg(\"toolchain\")\n  744 |         .arg(\"list\")\n  745 |         .arg(\"-q\")\n  746 |         .output()\n  747 |         .unwrap();\n  748 | \n  749 |     if !output.status.success() {\n  750 |         return vec![];\n  751 |     }\n  752 | \n  753 |     let stdout = String::from_utf8(output.stdout).unwrap();\n  754 | \n  755 |     stdout.lines().map(|line| format!(\"+{}\", line)).collect()\n  756 | }","lines":16,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/bin/cargo/cli.rs#L741-L756"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`OnDiskReports::last_id` calls `.unwrap()` on `self.reports.last()`. If `reports` is\nempty (an `OnDiskReports` produced via `Default`, or a malformed/empty on-disk report\nfile that deserializes with an empty `reports` vec), this panics instead of producing a\nclean \"no reports available\" error. This is reachable from the `cargo report\nfuture-incompat` path that resolves the default/last report ID.","fix":"Return `Option<u32>` (or `CargoResult<u32>`) and let callers emit a proper error when there are no reports.","locations":[{"ref":"src/cargo/core/compiler/future_incompat.rs:228-231","code":"  228 |     /// Returns the most recent report ID.\n  229 |     pub fn last_id(&self) -> u32 {\n  230 |         self.reports.last().map(|r| r.id).unwrap()\n  231 |     }","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/future_incompat.rs#L228-L231"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`get_dependency_tables_mut` calls `v.as_table_like_mut().unwrap()` on the `workspace` key (line 490) and the `target` key (line 502) without first checking that the value is actually a table. These iterate over the raw `toml_edit` document before semantic validation, so a manifest with `workspace = true` (a bool) or `target = \"x\"` (a string) - which is malformed but syntactically valid TOML - will panic instead of producing a clean error. This path is reachable from `cargo add` / `cargo remove` editing.","fix":"Use `if let Some(tbl) = v.as_table_like_mut()` (matching the pattern already used for the dep-kind branch) instead of `.unwrap()`, returning an empty `Vec` when the value is not a table.","locations":[{"ref":"src/cargo/util/toml_mut/manifest.rs:489-500","code":"  489 |             } else if k == \"workspace\" {\n  490 |                 v.as_table_like_mut()\n  491 |                     .unwrap()\n  492 |                     .iter_mut()\n  493 |                     .filter_map(|(k, v)| {\n  494 |                         if k.get() == \"dependencies\" {\n  495 |                             v.as_table_like_mut()\n  496 |                         } else {\n  497 |                             None\n  498 |                         }\n  499 |                     })\n  500 |                     .collect::<Vec<_>>()","lines":12,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml_mut/manifest.rs#L489-L500"},{"ref":"src/cargo/util/toml_mut/manifest.rs:501-519","code":"  501 |             } else if k == \"target\" {\n  502 |                 v.as_table_like_mut()\n  503 |                     .unwrap()\n  504 |                     .iter_mut()\n  505 |                     .flat_map(|(_, v)| {\n  506 |                         v.as_table_like_mut().into_iter().flat_map(|v| {\n  507 |                             v.iter_mut().filter_map(|(k, v)| {\n  508 |                                 if DepTable::KINDS\n  509 |                                     .iter()\n  510 |                                     .any(|dt| dt.kind.kind_table() == k.get())\n  511 |                                 {\n  512 |                                     v.as_table_like_mut()\n  513 |                                 } else {\n  514 |                                     None\n  515 |                                 }\n  516 |                             })\n  517 |                         })\n  518 |                     })\n  519 |                     .collect::<Vec<_>>()","lines":19,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml_mut/manifest.rs#L501-L519"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`upgrade_requirement` parses the incoming requirement string with `semver::VersionReq::parse(&req_text).expect(\"semver to generate valid version requirements\")`. The comment/justification assumes the string was produced by semver, but the caller at `cargo_update.rs:503` passes `current`, a version-requirement string taken from the user's manifest dependency entry. `Dependency::version()` returns the raw stored string, which can include forms that `VersionReq::parse` rejects (e.g. trailing/odd input), turning a recoverable manifest error into a hard panic. The function returns `CargoResult`, so a parse error should be propagated rather than `expect`ed.","fix":"Replace `.expect(...)` with `?` so an invalid requirement returns an `Err` instead of panicking, e.g. `let raw_req = semver::VersionReq::parse(&req_text)?;`.","locations":[{"ref":"src/cargo/util/toml_mut/upgrade.rs:11-13","code":"   11 |     let req_text = req.to_string();\n   12 |     let raw_req = semver::VersionReq::parse(&req_text)\n   13 |         .expect(\"semver to generate valid version requirements\");","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml_mut/upgrade.rs#L11-L13"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`assert_deps`'s internal byte readers (`read_usize`, `read_u8`, `read_u64`, `read_bytes`) slice the input with fixed ranges (`&bytes[..4]`, `&bytes[..8]`, `&bytes[..n]`) with no length checks. A truncated or corrupt dep-info file produces an out-of-bounds slice panic with no context instead of a useful diagnostic. Since this is a test helper consuming binary fingerprint data, a format change in cargo's dep-info encoding would surface as a cryptic index panic.","fix":"Add bounds checks (e.g. `if bytes.len() < 4 { panic!(\"dep-info truncated\") }`) before slicing, with a descriptive message.","locations":[{"ref":"crates/cargo-test-support/src/lib.rs:1698-1727","code":" 1698 |     fn read_usize(bytes: &mut &[u8]) -> usize {\n 1699 |         let ret = &bytes[..4];\n 1700 |         *bytes = &bytes[4..];\n 1701 | \n 1702 |         u32::from_le_bytes(ret.try_into().unwrap()) as usize\n 1703 |     }\n 1704 | \n 1705 |     fn read_u8(bytes: &mut &[u8]) -> u8 {\n 1706 |         let ret = bytes[0];\n 1707 |         *bytes = &bytes[1..];\n 1708 |         ret\n 1709 |     }\n 1710 | \n 1711 |     fn read_bool(bytes: &mut &[u8]) -> bool {\n 1712 |         read_u8(bytes) != 0\n 1713 |     }\n 1714 | \n 1715 |     fn read_u64(bytes: &mut &[u8]) -> u64 {\n 1716 |         let ret = &bytes[..8];\n 1717 |         *bytes = &bytes[8..];\n 1718 | \n 1719 |         u64::from_le_bytes(ret.try_into().unwrap())\n 1720 |     }\n 1721 | \n 1722 |     fn read_bytes<'a>(bytes: &mut &'a [u8]) -> &'a [u8] {\n 1723 |         let n = read_usize(bytes);\n 1724 |         let ret = &bytes[..n];\n 1725 |         *bytes = &bytes[n..];\n 1726 |         ret\n 1727 |     }","lines":30,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/lib.rs#L1698-L1727"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`trim_tags` in the markdown formatter uses `panic!` for `unexpected nested tag` / `unexpected nested char ref` on input it does not understand, rather than returning a `Result`. Since this processes rendered option terms derived from user-authored markdown, malformed/unexpected HTML (e.g. a literal `<` inside an already-open tag span) aborts the whole conversion with a bare panic instead of a contextual error. The surrounding `render_option` already returns `Result`.","fix":"Return a `Result<String, Error>` from `trim_tags` and `bail!` with context instead of panicking, or handle the nested case gracefully.","locations":[{"ref":"crates/mdman/src/format/md.rs:82-109","code":"   82 | fn trim_tags(s: &str) -> String {\n   83 |     // This is a hack. It removes all HTML tags.\n   84 |     let mut in_tag = false;\n   85 |     let mut in_char_ref = false;\n   86 |     s.chars()\n   87 |         .filter(|&ch| match ch {\n   88 |             '<' if in_tag => panic!(\"unexpected nested tag\"),\n   89 |             '&' if in_char_ref => panic!(\"unexpected nested char ref\"),\n   90 |             '<' => {\n   91 |                 in_tag = true;\n   92 |                 false\n   93 |             }\n   94 |             '&' => {\n   95 |                 in_char_ref = true;\n   96 |                 false\n   97 |             }\n   98 |             '>' if in_tag => {\n   99 |                 in_tag = false;\n  100 |                 false\n  101 |             }\n  102 |             ';' if in_char_ref => {\n  103 |                 in_char_ref = false;\n  104 |                 false\n  105 |             }\n  106 |             _ => !in_tag && !in_char_ref,\n  107 |         })\n  108 |         .collect()\n  109 | }","lines":28,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/md.rs#L82-L109"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`join_url` panics (via `unwrap_or_else(|e| panic!(...))`) when a relative link cannot be joined to the base URL. This turns a single bad relative link in user markdown into an abort of the whole conversion with no `Result` context, even though the surrounding pipeline is `Result`-based. The parser closure cannot return an error, so the panic is the only escape, but it is still a hard crash on recoverable input.","fix":"Where feasible, validate/join links in a context that can surface a proper `Error`, or at minimum keep the original `dest` on join failure (lossy) rather than aborting.","locations":[{"ref":"crates/mdman/src/lib.rs:101-116","code":"  101 | fn join_url<'a>(base: Option<&Url>, dest: CowStr<'a>) -> CowStr<'a> {\n  102 |     match base {\n  103 |         Some(base_url) => {\n  104 |             // Absolute URL or page-relative anchor doesn't need to be translated.\n  105 |             if dest.contains(':') || dest.starts_with('#') {\n  106 |                 dest\n  107 |             } else {\n  108 |                 let joined = base_url.join(&dest).unwrap_or_else(|e| {\n  109 |                     panic!(\"failed to join URL `{}` to `{}`: {}\", dest, base_url, e)\n  110 |                 });\n  111 |                 String::from(joined).into()\n  112 |             }\n  113 |         }\n  114 |         None => dest,\n  115 |     }\n  116 | }","lines":16,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/lib.rs#L101-L116"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`beta_and_stable_branch` pops the two highest-version release branches with `release_branches.pop().unwrap()` twice. If the repository has fewer than two `<remote>/rust-1.*.0` branches (e.g. a shallow/partial clone, or a fresh checkout), both/one `unwrap()` panics with an opaque `Option::unwrap` message rather than a helpful diagnostic about missing release branches.","fix":"Replace the two `.unwrap()`s with explicit checks that `release_branches.len() >= 2`, bailing with `anyhow::bail!` explaining that the full history of release branches is required.","locations":[{"ref":"crates/xtask-bump-check/src/xtask.rs:345-372","code":"  345 | fn beta_and_stable_branch(repo: &git2::Repository) -> CargoResult<[git2::Branch<'_>; 2]> {\n  346 |     let mut release_branches = Vec::new();\n  347 |     for branch in repo.branches(Some(git2::BranchType::Remote))? {\n  348 |         let (branch, _) = branch?;\n  349 |         let name = branch.name()?.unwrap();\n  350 |         let Some((_, version)) = name.split_once(\"/rust-\") else {\n  351 |             tracing::trace!(\"branch `{name}` is not in the format of `<remote>/rust-<semver>`\");\n  352 |             continue;\n  353 |         };\n  354 |         let Ok(version) = version.parse::<semver::Version>() else {\n  355 |             tracing::trace!(\"branch `{name}` is not a valid semver: `{version}`\");\n  356 |             continue;\n  357 |         };\n  358 |         release_branches.push((version, branch));\n  359 |     }\n  360 |     release_branches.sort_unstable_by(|a, b| a.0.cmp(&b.0));\n  361 |     release_branches.dedup_by(|a, b| a.0 == b.0);\n  362 | \n  363 |     let beta = release_branches.pop().unwrap();\n  364 |     let stable = release_branches.pop().unwrap();\n  365 | \n  366 |     assert_eq!(beta.0.major, 1);\n  367 |     assert_eq!(beta.0.patch, 0);\n  368 |     assert_eq!(stable.0.major, 1);\n  369 |     assert_eq!(stable.0.patch, 0);\n  370 |     assert_ne!(beta.0.minor, stable.0.minor);\n  371 | \n  372 |     Ok([beta.1, stable.1])","lines":28,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/xtask-bump-check/src/xtask.rs#L345-L372"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`xtask-stale-label` is riddled with `unwrap()`/`expect()` on filesystem and TOML access that turn ordinary environment problems into panics: `e.unwrap()` on each `read_dir` entry (a transient IO error while iterating aborts the whole check), `strip_prefix(&ws_root).unwrap()` (fails if `read_dir` yields a path not under ws_root, e.g. via a symlink), `to_str().unwrap()` (panics on non-UTF-8 paths despite the nearby comment only justifying UTF-8 for TOML content, not for on-disk paths), and `v.as_str().unwrap()` on array entries. A robust CI lint should report problems, not panic on them.","fix":"Replace the per-entry `unwrap()`s with graceful handling (skip/`filter_map` on errored dir entries, lossy path conversion, and a clear error if a trigger_files entry is not a string).","locations":[{"ref":"crates/xtask-stale-label/src/main.rs:42-66","code":"   42 |         let missing_files: Vec<_> = trigger_files\n   43 |             .iter()\n   44 |             // Hey TOML content is strict UTF-8.\n   45 |             .map(|v| v.as_str().unwrap())\n   46 |             .filter(|f| {\n   47 |                 // triagebot checks with `starts_with` only.\n   48 |                 // See https://github.com/rust-lang/triagebot/blob/0e4b48ca86ffede9cc70fb1611e658e4d013bce2/src/handlers/autolabel.rs#L45\n   49 |                 let path = ws_root.join(f);\n   50 |                 if path.exists() {\n   51 |                     return false;\n   52 |                 }\n   53 |                 let Some(mut read_dir) = path.parent().and_then(|p| p.read_dir().ok()) else {\n   54 |                     return true;\n   55 |                 };\n   56 |                 !read_dir.any(|e| {\n   57 |                     e.unwrap()\n   58 |                         .path()\n   59 |                         .strip_prefix(&ws_root)\n   60 |                         .unwrap()\n   61 |                         .to_str()\n   62 |                         .unwrap()\n   63 |                         .starts_with(f)\n   64 |                 })\n   65 |             })\n   66 |             .collect();","lines":25,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/xtask-stale-label/src/main.rs#L42-L66"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`discover_crate_type` decodes rustc output with `str::from_utf8(&output.stderr).unwrap()`\nand `str::from_utf8(&output.stdout).unwrap()`, which panic on non-UTF8 bytes. Every other\nrustc-output path in this module goes through `cached_output` which returns already-decoded\n`String`s; this manual path is the only one that can hard-panic instead of propagating an\nerror.","fix":"Use `String::from_utf8_lossy(...)` or propagate the error with `?`/`with_context`.","locations":[{"ref":"src/cargo/core/compiler/build_context/target_info.rs:566-569","code":"  566 | \n  567 |         let error = str::from_utf8(&output.stderr).unwrap();\n  568 |         let output = str::from_utf8(&output.stdout).unwrap();\n  569 |         parse_crate_type(crate_type, &process, output, error, &mut output.lines())","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/build_context/target_info.rs#L566-L569"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`DirtyReason::present_to` resolves dependency unit names via `index_to_unit.get(dep_unit).map(|u| u.pkg.name()).unwrap()` in three places. `UnitIndex` for dependency fingerprints is `#[serde(skip)]` and defaults to `UnitIndex::default()` when a fingerprint is loaded from disk. If a `StaleDependency`/`StaleDepFingerprint`/`UnitDependencyInfoChanged` reason ever carries an index that isn't present in `index_to_unit` (default/zero index, or a stale index from a prior build), the diagnostic printer panics instead of degrading gracefully.","fix":"Use `unwrap_or` with a placeholder name (e.g. `\"<unknown>\"`) instead of `.unwrap()` when the index is not found.","locations":[{"ref":"src/cargo/core/compiler/fingerprint/dirty_reason.rs:228-228","code":"  228 |                 let dep_name = index_to_unit.get(dep_unit).map(|u| u.pkg.name()).unwrap();","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/dirty_reason.rs#L228"},{"ref":"src/cargo/core/compiler/fingerprint/dirty_reason.rs:316-316","code":"  316 |                     let dep_name = index_to_unit.get(dep_unit).map(|u| u.pkg.name()).unwrap();","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/dirty_reason.rs#L316"},{"ref":"src/cargo/core/compiler/fingerprint/dirty_reason.rs:323-324","code":"  323 |                 FsStatus::StaleDepFingerprint { unit: dep_unit } => {\n  324 |                     let dep_name = index_to_unit.get(dep_unit).map(|u| u.pkg.name()).unwrap();","lines":2,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/dirty_reason.rs#L323-L324"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`check_filesystem` looks up the rmeta output of a dependency with `dep_mtimes.iter().find(|(path,_)| ext == rmeta).expect(\"failed to find rmeta\")`. If a dependency flagged `only_requires_rmeta` ever has an `UpToDate` mtime map that does not contain a `.rmeta` output (e.g. an output-filter change, a non-lib unit erroneously marked rmeta-only, or a future FileFlavor change), this panics during an otherwise recoverable freshness check instead of treating the unit as stale.","fix":"Replace the `expect` with a fallback that marks the unit stale (e.g. `FsStatus::StaleItem`/`StaleDependency`) when no rmeta output is found, rather than panicking.","locations":[{"ref":"src/cargo/core/compiler/fingerprint/mod.rs:1302-1308","code":" 1302 |             let (dep_path, dep_mtime) = if dep.only_requires_rmeta {\n 1303 |                 dep_mtimes\n 1304 |                     .iter()\n 1305 |                     .find(|(path, _mtime)| {\n 1306 |                         path.extension().and_then(|s| s.to_str()) == Some(\"rmeta\")\n 1307 |                     })\n 1308 |                     .expect(\"failed to find rmeta\")","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/mod.rs#L1302-L1308"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"Report sorting uses `partial_cmp(...).unwrap()` on `f64` durations/start times. If any\nvalue is NaN this panics, discarding the timing report after a completed build. Durations\ncome from `as_secs_f64()` so NaN is extremely unlikely in practice, but `total_cmp` is a\nsafe drop-in.","fix":"Use `b.duration.total_cmp(&a.duration)` and `a.0.total_cmp(&b.0)` (or `unwrap_or(Ordering::Equal)`).","locations":[{"ref":"src/cargo/core/compiler/timings/report.rs:268","code":"  268 |     units.sort_unstable_by(|a, b| b.duration.partial_cmp(&a.duration).unwrap());","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/timings/report.rs#L268"},{"ref":"src/cargo/core/compiler/timings/report.rs:426-431","code":"  426 |     events.sort_by(|a, b| {\n  427 |         a.0.partial_cmp(&b.0)\n  428 |             .unwrap()\n  429 |             .then_with(|| a.1.cmp(&b.1))\n  430 |             .then_with(|| a.2.cmp(&b.2))\n  431 |     });","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/timings/report.rs#L426-L431"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`Edition::previous()` is documented as 'Returns the previous edition from this edition. Returns `None` for 2015.' but for `EditionFuture` it does `panic!(\"future does not have a previous edition\")` instead of returning None. Sibling methods (saturating_next, first_version, is_stable) all handle EditionFuture gracefully, and EditionFuture is a member of `Edition::ALL`, so iterating ALL and calling previous() panics. The documented Option-returning contract is violated.","fix":"Return None for EditionFuture, or at minimum document the panic in the doc comment.","locations":[{"ref":"src/cargo/core/features.rs:248-260","code":"  248 |     /// Returns the previous edition from this edition.\n  249 |     ///\n  250 |     /// Returns `None` for 2015.\n  251 |     pub fn previous(&self) -> Option<Edition> {\n  252 |         use Edition::*;\n  253 |         match self {\n  254 |             Edition2015 => None,\n  255 |             Edition2018 => Some(Edition2015),\n  256 |             Edition2021 => Some(Edition2018),\n  257 |             Edition2024 => Some(Edition2021),\n  258 |             EditionFuture => panic!(\"future does not have a previous edition\"),\n  259 |         }\n  260 |     }","lines":13,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/features.rs#L248-L260"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`merge_profile` does `panic!(\"Unexpected panic setting `{}`\", panic)` for any panic string other than unwind/abort/immediate-abort. This relies entirely on `TomlProfile::validate` having rejected bad values earlier. If any code path constructs a Profile merge from a TomlProfile that bypassed validation (e.g. a config profile path that skipped validate), this aborts the whole process instead of returning a CargoResult error.","fix":"Return a CargoResult error (bail!) instead of panicking, or document the invariant and use debug_assert!/unreachable! with a clear contract.","locations":[{"ref":"src/cargo/core/profiles.rs:560-568","code":"  560 |     if let Some(panic) = &toml.panic {\n  561 |         profile.panic = match panic.as_str() {\n  562 |             \"unwind\" => PanicStrategy::Unwind,\n  563 |             \"abort\" => PanicStrategy::Abort,\n  564 |             \"immediate-abort\" => PanicStrategy::ImmediateAbort,\n  565 |             // This should be validated in TomlProfile::validate\n  566 |             _ => panic!(\"Unexpected panic setting `{}`\", panic),\n  567 |         };\n  568 |     }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/profiles.rs#L560-L568"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the Display impl for a git SourceId, the precise field is truncated to 8 bytes via `&s[..len]` where `len = min(s.len(), 8)`. For `Precise::GitUrlFragment` (hex) this is safe, but `Precise::Updated { name, from, to }` Display-formats as `{name}={from}->{to}` where `name` is an arbitrary InternedString that can contain multibyte UTF-8. Byte-slicing at index 8 can fall on a char boundary mid-codepoint and panic. A git source normally only carries GitUrlFragment precise, so this is latent, but the slice is not boundary-safe.","fix":"Use a char-boundary-safe truncation, e.g. `s.chars().take(8).collect::<String>()` or `floor_char_boundary`, instead of byte slicing.","locations":[{"ref":"src/cargo/core/source_id.rs:657-661","code":"  657 |                 if let Some(s) = &self.inner.precise {\n  658 |                     let s = s.to_string();\n  659 |                     let len = cmp::min(s.len(), 8);\n  660 |                     write!(f, \"#{}\", &s[..len])?;\n  661 |                 }","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/source_id.rs#L657-L661"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`rebuild_unit_graph_shared` maps scrape units via `memo.get(unit).unwrap().clone()`. The comment just above acknowledges that scrape units may not have been discovered during traversal (\"they won't have been discovered in traverse_and_share and hence won't be in memo. So we filter out missing scrape units.\") but the code uses `.unwrap()` rather than filtering. If a scrape unit truly is absent from `memo`, this panics, directly contradicting the comment which claims missing ones are filtered out.","fix":"Use `filter_map(|unit| memo.get(unit).cloned())` to actually filter out scrape units missing from `memo`, matching the comment, or update the comment if the unwrap is intentional and guaranteed.","locations":[{"ref":"src/cargo/ops/cargo_compile/mod.rs:864-870","code":"  864 |     // If no unit in the unit graph ended up having scrape units attached as dependencies,\n  865 |     // then they won't have been discovered in traverse_and_share and hence won't be in\n  866 |     // memo. So we filter out missing scrape units.\n  867 |     let new_scrape_units = scrape_units\n  868 |         .iter()\n  869 |         .map(|unit| memo.get(unit).unwrap().clone())\n  870 |         .collect();","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_compile/mod.rs#L864-L870"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`serialize_resolve` unconditionally indexes `toml[\"package\"]` and unwraps it as an array (line 164), and similarly unwraps `patch[\"unused\"]` (line 173) and `meta.as_table()` (line 187). These rely on the exact serialized shape of `Resolve`. While `Resolve` currently always serializes a `package` array, these unguarded index/unwrap calls will panic rather than error if the serialization shape ever changes or if a malformed `Resolve` is serialized, instead of producing a `CargoResult` error.","fix":"Use `toml.get(\"package\").and_then(|v| v.as_array())` with graceful handling, or document/assert the invariant explicitly; at minimum prefer `.get(...)` over `[...]` indexing to avoid a hard panic.","locations":[{"ref":"src/cargo/ops/lockfile.rs:160-193","code":"  160 |     if let Some(version) = toml.get(\"version\") {\n  161 |         out.push_str(&format!(\"version = {}\\n\\n\", version));\n  162 |     }\n  163 | \n  164 |     let deps = toml[\"package\"].as_array().unwrap();\n  165 |     for dep in deps {\n  166 |         let dep = dep.as_table().unwrap();\n  167 | \n  168 |         out.push_str(\"[[package]]\\n\");\n  169 |         emit_package(dep, &mut out);\n  170 |     }\n  171 | \n  172 |     if let Some(patch) = toml.get(\"patch\") {\n  173 |         let list = patch[\"unused\"].as_array().unwrap();\n  174 |         for entry in list {\n  175 |             out.push_str(\"[[patch.unused]]\\n\");\n  176 |             emit_package(entry.as_table().unwrap(), &mut out);\n  177 |             out.push('\\n');\n  178 |         }\n  179 |     }\n  180 | \n  181 |     if let Some(meta) = toml.get(\"metadata\") {\n  182 |         // 1. We need to ensure we print the entire tree, not just the direct members of `metadata`\n  183 |         //    (which `toml_edit::Table::to_string` only shows)\n  184 |         // 2. We need to ensure all children tables have `metadata.` prefix\n  185 |         let meta_table = meta\n  186 |             .as_table()\n  187 |             .expect(\"validation ensures this is a table\")\n  188 |             .clone();\n  189 |         let mut meta_doc = toml::Table::new();\n  190 |         meta_doc.insert(\"metadata\".to_owned(), toml::Value::Table(meta_table));\n  191 | \n  192 |         out.push_str(&meta_doc.to_string());\n  193 |     }","lines":34,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/lockfile.rs#L160-L193"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`SummariesCache::parse` calls `iter.next().unwrap()` to read the JSON blob that\nshould follow each version entry. If an on-disk cache file is truncated or\ncorrupted such that the last version has no trailing blob (an odd number of\nNUL-delimited fields after the header), this unwraps `None` and panics instead\nof returning the existing `CargoResult` error. All other malformed-input cases\nin this function return an error via `bail!`/`?`, so this is an inconsistent and\navoidable panic on attacker-or-corruption-controlled cache data.","fix":"Replace `let summary = iter.next().unwrap();` with a checked `let Some(summary) = iter.next() else { bail!(\"malformed cache\"); };`.","locations":[{"ref":"src/cargo/sources/registry/index/cache.rs:192-197","code":"  192 |         while let Some(version) = iter.next() {\n  193 |             let version = str::from_utf8(version)?;\n  194 |             let version = Version::parse(version)?;\n  195 |             let summary = iter.next().unwrap();\n  196 |             ret.versions.push((version, summary));\n  197 |         }","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/registry/index/cache.rs#L192-L197"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`truncate_with_ellipsis` computes `max_width - 1` without guarding `max_width == 0`. With `max_width == 0` this underflows: panic in debug builds, `take(usize::MAX)` in release (returning the whole string plus possibly an ellipsis, the opposite of truncation). It is a public helper; current callers pass >= 80, but the function is unsafe for small inputs and easy to misuse.","fix":"Handle `max_width == 0` (return empty String) and use `max_width.saturating_sub(1)`; better, truncate by display width budget so the ellipsis fits within `max_width`.","locations":[{"ref":"src/cargo/util/mod.rs:133-143","code":"  133 | pub fn truncate_with_ellipsis(s: &str, max_width: usize) -> String {\n  134 |     // We should truncate at grapheme-boundary and compute character-widths,\n  135 |     // yet the dependencies on unicode-segmentation and unicode-width are\n  136 |     // not worth it.\n  137 |     let mut chars = s.chars();\n  138 |     let mut prefix = (&mut chars).take(max_width - 1).collect::<String>();\n  139 |     if chars.next().is_some() {\n  140 |         prefix.push('…');\n  141 |     }\n  142 |     prefix\n  143 | }","lines":11,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/mod.rs#L133-L143"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Collector::bytes_pending` reads the cross-thread `AtomicI64` `dl_remaining` and does `.try_into::<u64>().unwrap()`. The global counter is updated by separate `fetch_add` calls in `progress` and in `Drop`, so the sum observed by the reader thread can momentarily dip below zero between a transfer's last progress update and its Drop while another transfer's remaining count is decreasing. Any negative read makes the `unwrap` panic, aborting a download. The sole caller already clamps with `if remaining > 0`, so the u64 type is not even needed.","fix":"Return the raw `i64` (or `v.max(0) as u64`) instead of `.try_into().unwrap()`.","locations":[{"ref":"src/cargo/util/network/http_async.rs:171-178","code":"  171 |     /// Returns the number pending bytes across all active transfers.\n  172 |     pub fn bytes_pending(&self) -> u64 {\n  173 |         self.stats\n  174 |             .dl_remaining\n  175 |             .load(Ordering::Acquire)\n  176 |             .try_into()\n  177 |             .unwrap()\n  178 |     }","lines":8,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/network/http_async.rs#L171-L178"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"`commit_info_from_git` does `String::from_utf8(output.stdout).unwrap()`. Git output is normally UTF-8, but a corrupt/locale-mangled commit message could make this panic the build script. Since other failures in this path return `None` gracefully, the bare `unwrap()` is an inconsistent hard-failure point in the build.","fix":"Use `String::from_utf8(output.stdout).ok()?` to fall back to no commit info rather than panicking the build.","locations":[{"ref":"build.rs:77-85","code":"   77 |     let stdout = String::from_utf8(output.stdout).unwrap();\n   78 |     let mut parts = stdout.split_whitespace().map(|s| s.to_string());\n   79 | \n   80 |     Some(CommitInfo {\n   81 |         hash: parts.next()?,\n   82 |         short_hash: parts.next()?,\n   83 |         date: parts.next()?,\n   84 |     })\n   85 | }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/build.rs#L77-L85"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In the wincred `Get` path, if `String::from_utf8(bytes.to_vec())` succeeds and\n`CredFree` runs, all is fine. But the `bytes` slice borrows from `(*p_credential)` via\n`from_raw_parts`; `bytes.to_vec()` copies before `CredFree`, which is correct ordering.\nThe actual issue: `token` is computed (`from_utf8(...).map_err(Box::new)`), then\n`CredFree` is called, then `token?` may early-return Err. The credential is freed in all\ncases, so no leak. This is correct - flagging only that the ordering is subtle and a\nfuture edit moving `token?` before `CredFree` would leak the credential buffer.","fix":"Add a comment noting that `CredFree` must run before `token?` is propagated, or use a guard/RAII wrapper around `p_credential`.","locations":[{"ref":"credential/cargo-credential-wincred/src/lib.rs:67-78","code":"   67 |                         std::slice::from_raw_parts(\n   68 |                             (*p_credential).CredentialBlob,\n   69 |                             (*p_credential).CredentialBlobSize as usize,\n   70 |                         )\n   71 |                     };\n   72 |                     let token = String::from_utf8(bytes.to_vec()).map_err(Box::new);\n   73 |                     unsafe { CredFree(p_credential as *mut _) };\n   74 |                     Ok(CredentialResponse::Get {\n   75 |                         token: token?.into(),\n   76 |                         cache: CacheControl::Session,\n   77 |                         operation_independent: true,\n   78 |                     })","lines":12,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-wincred/src/lib.rs#L67-L78"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In `Registry::publish` the tarball length is read as a `u64` (`tarball_len`) but written into the upload header as `(tarball_len as u32).to_le_bytes()`. For tarballs >= 4 GiB this silently truncates the length prefix, producing a corrupted upload body (the server will read the wrong number of bytes). The `Error::Timeout(tarball_len)` path keeps the full `u64`, so the truncation is purely in the wire framing.","fix":"Reject (or error) when `tarball_len > u32::MAX` before building the header, or change the upload framing to use a wider integer if the registry protocol allows it. At minimum, return a clear error instead of silently truncating.","locations":[{"ref":"crates/crates-io/lib.rs:295-303","code":"  295 |         let tarball_len = tarball.seek(SeekFrom::End(0))?;\n  296 |         tarball.seek(SeekFrom::Start(0))?;\n  297 |         let header = {\n  298 |             let mut w = Vec::new();\n  299 |             w.extend(&(json.len() as u32).to_le_bytes());\n  300 |             w.extend(json.as_bytes().iter().cloned());\n  301 |             w.extend(&(tarball_len as u32).to_le_bytes());\n  302 |             w\n  303 |         };","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/crates-io/lib.rs#L295-L303"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`max_width = 78 - indent` underflows and panics if `indent >= 78`. Tables nested inside deeply indented structures (nested lists/blockquotes/option definitions, where indent grows by 3-4 per level and option defs add +4) can push `indent` past 78, panicking on this subtraction. Same risk applies to `78 - indent`-derived values.","fix":"Use `let max_width = 78usize.saturating_sub(indent).max(MIN_TABLE_WIDTH);` to avoid the panic and guarantee a usable minimum.","locations":[{"ref":"crates/mdman/src/format/text.rs:526-528","code":"  526 |         let max_width = 78 - indent;\n  527 |         // Include total len for | characters, and +1 for final |.\n  528 |         let total_width = col_widths.iter().sum::<usize>() + col_widths.len() + 1;","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/text.rs#L526-L528"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Table column shrinking rounds every column's reduction UP independently (`.ceil()`), so a narrow column can be reduced to exactly 0 (verified: with widths like [2, 1000] the width-2 column gets reduction 2). The loop subtraction itself does not go negative, but a width of 0 (or 1) then flows into `fill_cell(cell, *width - 2, ...)` (line 586) and underflows/panics there. The ceil-per-column also over-shrinks: total reductions can exceed `to_shrink`, making the table narrower than necessary.","fix":"Enforce a minimum column width (>= 3) during the shrink loop and use saturating arithmetic, so downstream `*width - 2` can never underflow; also distribute the shrink so totals don't exceed `to_shrink`.","locations":[{"ref":"crates/mdman/src/format/text.rs:529-537","code":"  529 |         if total_width > max_width {\n  530 |             let to_shrink = total_width - max_width;\n  531 |             // Compute percentage widths, and shrink each column based on its\n  532 |             // total percentage.\n  533 |             for width in &mut col_widths {\n  534 |                 let percent = *width as f64 / total_width as f64;\n  535 |                 *width -= (to_shrink as f64 * percent).ceil() as usize;\n  536 |             }\n  537 |         }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/text.rs#L529-L537"},{"ref":"crates/mdman/src/format/text.rs:586","code":"  586 |         .map(|((cell, width), alignment)| fill_cell(cell, *width - 2, *alignment))","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/text.rs#L586"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`fill_cell(cell, *width - 2, *alignment)` subtracts 2 from the column width. After the proportional shrink loop, a column width can be reduced below 2 (it is only guaranteed `>= 0`), so `*width - 2` underflows and panics. Even without shrinking, the +2/+3 accounting in `render` does not guarantee every final width is >= 2 once shrinking has run.","fix":"Guard with saturating subtraction (`width.saturating_sub(2)`) and enforce a minimum column width during the shrink step so cells never get a negative inner width.","locations":[{"ref":"crates/mdman/src/format/text.rs:581-587","code":"  581 | fn fill_row(row: &[String], col_widths: &[usize], alignment: &[Alignment]) -> Vec<Vec<String>> {\n  582 |     let mut cell_lines = row\n  583 |         .iter()\n  584 |         .zip(col_widths)\n  585 |         .zip(alignment)\n  586 |         .map(|((cell, width), alignment)| fill_cell(cell, *width - 2, *alignment))\n  587 |         .collect::<Vec<_>>();","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/text.rs#L581-L587"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`max_deps = max_versions * (max_crates * (max_crates - 1)) / shrinkage` underflows (panics in debug) if `max_crates == 0`, and `version_from_raw` / `raw_version = ..max_versions.pow(3)` divide by `max_versions`, panicking on `max_versions == 0`. `registry_strategy` is a public function; callers in this repo pass non-zero values, but the function has no guard or documented precondition, so a 0 argument is an unguarded panic / subtraction overflow.","fix":"Add `assert!(max_crates > 0 && max_versions > 0)` with a clear message at the top of `registry_strategy`, or document/clamp the minimums.","locations":[{"ref":"crates/resolver-tests/src/lib.rs:268-306","code":"  268 | pub fn registry_strategy(\n  269 |     max_crates: usize,\n  270 |     max_versions: usize,\n  271 |     shrinkage: usize,\n  272 | ) -> impl Strategy<Value = PrettyPrintRegistry> {\n  273 |     let name = string_regex(\"[A-Za-z][A-Za-z0-9_-]*(-sys)?\").unwrap();\n  274 | \n  275 |     let raw_version = ..max_versions.pow(3);\n  276 |     let version_from_raw = move |r: usize| {\n  277 |         let major = ((r / max_versions) / max_versions) % max_versions;\n  278 |         let minor = (r / max_versions) % max_versions;\n  279 |         let patch = r % max_versions;\n  280 |         format!(\"{}.{}.{}\", major, minor, patch)\n  281 |     };\n  282 | \n  283 |     // If this is false then the crate will depend on the nonexistent \"bad\"\n  284 |     // instead of the complex set we generated for it.\n  285 |     let allow_deps = prop::bool::weighted(0.99);\n  286 | \n  287 |     let list_of_versions =\n  288 |         btree_map(raw_version, allow_deps, 1..=max_versions).prop_map(move |ver| {\n  289 |             ver.into_iter()\n  290 |                 .map(|a| (version_from_raw(a.0), a.1))\n  291 |                 .collect::<Vec<_>>()\n  292 |         });\n  293 | \n  294 |     let list_of_crates_with_versions =\n  295 |         btree_map(name, list_of_versions, 1..=max_crates).prop_map(|mut vers| {\n  296 |             // root is the name of the thing being compiled\n  297 |             // so it would be confusing to have it in the index\n  298 |             vers.remove(\"root\");\n  299 |             // bad is a name reserved for a dep that won't work\n  300 |             vers.remove(\"bad\");\n  301 |             vers\n  302 |         });\n  303 | \n  304 |     // each version of each crate can depend on each crate smaller than it.\n  305 |     // In theory shrinkage should be 2, but in practice we get better trees with a larger value.\n  306 |     let max_deps = max_versions * (max_crates * (max_crates - 1)) / shrinkage;","lines":39,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/resolver-tests/src/lib.rs#L268-L306"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`FileTimeDiff::fmt` computes `ns_diff = self.new_time.nanoseconds() - self.old_time.nanoseconds()` as an unsigned `u32` subtraction in the branch where the whole-second difference is `< 1`. The `After` constructor is always called with `(old=earlier, new=later)` for the cases observed, but the type is public within the module and `FileTimeDiff` is also constructed directly; if it is ever fed times whose seconds are equal but whose `new` nanosecond component is smaller than `old`'s (which is possible if the two mtimes are not strictly ordered), this underflows and panics in debug builds / wraps in release. The seconds branch uses signed `i64` and is fine; only the nanosecond branch is unguarded.","fix":"Compute the nanosecond difference with `i64`/`saturating_sub`, or `abs_diff`, to avoid the unsigned underflow.","locations":[{"ref":"src/cargo/core/compiler/fingerprint/dirty_reason.rs:103-112","code":"  103 |     fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {\n  104 |         let s_diff = self.new_time.seconds() - self.old_time.seconds();\n  105 |         if s_diff >= 1 {\n  106 |             write!(f, \"{:#}\", jiff::SignedDuration::from_secs(s_diff))\n  107 |         } else {\n  108 |             // format nanoseconds as it is, jiff would display ms, us and ns\n  109 |             let ns_diff = self.new_time.nanoseconds() - self.old_time.nanoseconds();\n  110 |             write!(f, \"{ns_diff}ns\")\n  111 |         }\n  112 |     }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/dirty_reason.rs#L103-L112"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In `clean_inner`, each max_age cutoff is computed as `now - max_age.as_secs()` (5 occurrences). `now` is current epoch seconds; `max_age.as_secs()` is user-supplied (e.g. --max-index-age). A very large age (> current epoch, ~1.7e9 s) underflows the u64 subtraction: panic in debug, wraparound in release. A wrapped huge cutoff makes the `timestamp < cutoff` test true for everything, potentially deleting the entire cache.","fix":"Use `now.saturating_sub(max_age.as_secs())`.","locations":[{"ref":"src/cargo/core/global_cache_tracker.rs:581-609","code":"  581 |             let max_age = now - max_age.as_secs();\n  582 |             Self::get_registry_index_to_clean(&tx, max_age, &base, &mut delete_paths)?;\n  583 |         }\n  584 |         if let Some(max_age) = gc_opts.max_src_age {\n  585 |             let max_age = now - max_age.as_secs();\n  586 |             Self::get_registry_items_to_clean_age(\n  587 |                 &tx,\n  588 |                 max_age,\n  589 |                 REGISTRY_SRC_TABLE,\n  590 |                 &base.src,\n  591 |                 &mut delete_paths,\n  592 |             )?;\n  593 |         }\n  594 |         if let Some(max_age) = gc_opts.max_crate_age {\n  595 |             let max_age = now - max_age.as_secs();\n  596 |             Self::get_registry_items_to_clean_age(\n  597 |                 &tx,\n  598 |                 max_age,\n  599 |                 REGISTRY_CRATE_TABLE,\n  600 |                 &base.crate_dir,\n  601 |                 &mut delete_paths,\n  602 |             )?;\n  603 |         }\n  604 |         if let Some(max_age) = gc_opts.max_git_db_age {\n  605 |             let max_age = now - max_age.as_secs();\n  606 |             Self::get_git_db_items_to_clean(&tx, max_age, &base, &mut delete_paths)?;\n  607 |         }\n  608 |         if let Some(max_age) = gc_opts.max_git_co_age {\n  609 |             let max_age = now - max_age.as_secs();","lines":29,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/global_cache_tracker.rs#L581-L609"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"The DB update predicates compute `new_timestamp - UPDATE_RESOLUTION` (UPDATE_RESOLUTION = 300) on a u64 epoch-seconds value in the insert_or_update_parent! macro and the three child-insert helpers. If an entry is marked with a SystemTime earlier than UNIX_EPOCH+300s (e.g. via mark_*_used_stamp with a skewed clock, or __CARGO_TEST_LAST_USE_NOW below 300), the subtraction underflows: panic in debug, huge wraparound in release that defeats the 'only update if older' optimization (treats every timestamp as stale).","fix":"Use `new_timestamp.saturating_sub(UPDATE_RESOLUTION)` everywhere.","locations":[{"ref":"src/cargo/core/global_cache_tracker.rs:1396","code":" 1396 |                 if timestamp < new_timestamp - UPDATE_RESOLUTION {","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/global_cache_tracker.rs#L1396"},{"ref":"src/cargo/core/global_cache_tracker.rs:1672","code":" 1672 |                 timestamp - UPDATE_RESOLUTION","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/global_cache_tracker.rs#L1672"},{"ref":"src/cargo/core/global_cache_tracker.rs:1697","code":" 1697 |                 timestamp - UPDATE_RESOLUTION","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/global_cache_tracker.rs#L1697"},{"ref":"src/cargo/core/global_cache_tracker.rs:1721","code":" 1721 |                 timestamp - UPDATE_RESOLUTION","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/global_cache_tracker.rs#L1721"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`MetricsCounter::rate` computes `latest.0 - oldest.0` and `latest.1 - oldest.1` using unsigned/`Instant` subtraction. The stored `data` value is a cumulative byte counter supplied by callers (git transfer progress in sources/git). If the counter ever decreases between the oldest and newest slot (e.g. a transfer phase resets the byte count, or a caller passes a smaller value), `latest.0 - oldest.0` underflows and panics in debug builds / wraps to a huge value in release. The `Instant` subtraction `latest.1 - oldest.1` assumes monotonic insertion order, which holds, but the data subtraction is the fragile one.","fix":"Use `latest.0.saturating_sub(oldest.0)` (and guard the duration) so a decreasing or reset counter yields 0 rather than underflowing.","locations":[{"ref":"src/cargo/util/counter.rs:29-35","code":"   29 |     pub fn rate(&self) -> f32 {\n   30 |         let latest = self.slots[self.index.checked_sub(1).unwrap_or(N - 1)];\n   31 |         let oldest = self.slots[self.index];\n   32 |         let duration = (latest.1 - oldest.1).as_secs_f32();\n   33 |         let avg = (latest.0 - oldest.0) as f32 / duration;\n   34 |         if f32::is_nan(avg) { 0f32 } else { avg }\n   35 |     }","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/counter.rs#L29-L35"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Linux `pct_idle` subtracts most `/proc/stat` counters with plain unsigned subtraction (`next.user - prev.user`, etc.); only `iowait` uses `saturating_sub`. CPU counters in `/proc/stat` are normally monotonic, but they can decrease across CPU hotplug or namespace changes (which is exactly why `iowait` was already special-cased). Any such decrease in user/nice/system/idle/irq/softirq/steal/guest panics in debug builds / wraps in release, and a wrapped huge value yields a garbage idle percentage.","fix":"Use `saturating_sub` for all of the per-field deltas (or clamp the computed percentage), consistent with the existing `iowait` handling.","locations":[{"ref":"src/cargo/util/cpu.rs:69-82","code":"   69 |         let user = next.user - prev.user;\n   70 |         let nice = next.nice - prev.nice;\n   71 |         let system = next.system - prev.system;\n   72 |         let idle = next.idle - prev.idle;\n   73 |         let iowait = next.iowait.saturating_sub(prev.iowait);\n   74 |         let irq = next.irq - prev.irq;\n   75 |         let softirq = next.softirq - prev.softirq;\n   76 |         let steal = next.steal - prev.steal;\n   77 |         let guest = next.guest - prev.guest;\n   78 |         let guest_nice = next.guest_nice - prev.guest_nice;\n   79 |         let total =\n   80 |             user + nice + system + idle + iowait + irq + softirq + steal + guest + guest_nice;\n   81 | \n   82 |         (idle as f64) / (total as f64) * 100.0","lines":14,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/cpu.rs#L69-L82"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In version(), the fallback path (cargo not built by bootstrap) computes `env!(\"CARGO_PKG_VERSION_MINOR\").parse::<u8>().unwrap() - 1`. If the minor version is ever 0 this underflows and panics in debug (wraps in release). It is also fragile to a minor version > 255 (u8 parse panics). Only the non-bootstrap fallback is affected, but it is reachable for library/non-bootstrap builds.","fix":"Use a wider type and saturating sub, e.g. parse to u16 and `minor.saturating_sub(1)`, or assert the invariant explicitly.","locations":[{"ref":"src/cargo/version.rs:79-81","code":"   79 |         let minor = env!(\"CARGO_PKG_VERSION_MINOR\").parse::<u8>().unwrap() - 1;\n   80 |         let patch = env!(\"CARGO_PKG_VERSION_PATCH\").parse::<u8>().unwrap();\n   81 |         format!(\"1.{}.{}\", minor, patch)","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/version.rs#L79-L81"}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"`should_run_auto_gc` computes `last_auto_gc + frequency.as_secs() < now()`, an unchecked u64 add on a value read from the on-disk DB. A corrupted/huge last_auto_gc can overflow (panic in debug).","fix":"Use `last_auto_gc.saturating_add(frequency.as_secs()) < now()`.","locations":[{"ref":"src/cargo/core/global_cache_tracker.rs:525-525","code":"  525 |         let should_run = last_auto_gc + frequency.as_secs() < now();","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/global_cache_tracker.rs#L525"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In the macOS keychain `Login` action, when `find_generic_password` returns an error\nthat is NOT `errSecItemNotFound`, the error is silently swallowed and the function\nreturns `Ok(CredentialResponse::Login)` without ever storing the token. The match arm\n`Err(e) => { if e.code() == not_found { ... } }` has no `else`, so any other keychain\nerror (locked keychain, permission denied, etc.) is treated as a successful login even\nthough nothing was saved. The user is told login succeeded but no credential exists,\nand a subsequent `Get` will report `NotFound`.","fix":"Add an `else` branch that propagates the error, e.g.\n`Err(e) if e.code() == not_found => { keychain.add_generic_password(...)?; }`\nand `Err(e) => return Err(Box::new(e).into())`, mirroring the Get/Logout arms.","locations":[{"ref":"credential/cargo-credential-macos-keychain/src/lib.rs:51-67","code":"   51 |                     match keychain.find_generic_password(&service_name, ACCOUNT) {\n   52 |                         Err(e) => {\n   53 |                             if e.code() == not_found {\n   54 |                                 keychain\n   55 |                                     .add_generic_password(\n   56 |                                         &service_name,\n   57 |                                         ACCOUNT,\n   58 |                                         token.expose().as_bytes(),\n   59 |                                     )\n   60 |                                     .map_err(Box::new)?;\n   61 |                             }\n   62 |                         }\n   63 |                         Ok((_, mut item)) => {\n   64 |                             item.set_password(token.expose().as_bytes())\n   65 |                                 .map_err(Box::new)?;\n   66 |                         }\n   67 |                     }","lines":17,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-macos-keychain/src/lib.rs#L51-L67"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`default_members_mut` builds its membership set by mapping each `default_members` entry through `.parent().unwrap().to_owned()` (turning manifest paths into directories), then compares that set against `path` from `packages.iter_mut()`, which are full manifest paths (`.../Cargo.toml`). A directory never equals a manifest path, so `members.contains(path)` is always false and the iterator yields nothing. The sibling `members_mut` correctly uses the paths as-is. This silently breaks any mutation of default members.","fix":"Drop the `.parent().unwrap().to_owned()` mapping so the set holds manifest paths, mirroring `members_mut`.","locations":[{"ref":"src/cargo/core/workspace.rs:669-686","code":"  669 |     pub fn default_members_mut(&mut self) -> impl Iterator<Item = &mut Package> {\n  670 |         let packages = &mut self.packages.packages;\n  671 |         let members: HashSet<_> = self\n  672 |             .default_members\n  673 |             .iter()\n  674 |             .map(|path| path.parent().unwrap().to_owned())\n  675 |             .collect();\n  676 | \n  677 |         packages.iter_mut().filter_map(move |(path, package)| {\n  678 |             if members.contains(path) {\n  679 |                 if let MaybePackage::Package(p) = package {\n  680 |                     return Some(p);\n  681 |                 }\n  682 |             }\n  683 | \n  684 |             None\n  685 |         })\n  686 |     }","lines":18,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/workspace.rs#L669-L686"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The 'emitted source' NOTE (telling the user where the lint level came from) is attached only when the bin's enumerate index `i == 0` (line 125). But the loop `continue`s past bins whose name is already kebab-case (lines 101-103). If the first bin (index 0) is already kebab-case and is skipped, every actually-emitted diagnostic has `i != 0`, so the source NOTE is never shown. The sibling lint implicit_minimum_version_req.rs does this correctly with a mutable flag flipped only after a diagnostic is actually emitted. unknown_lints.rs (same file family) also uses the correct `emitted_source.is_none()` flag pattern.","fix":"Declare `let mut emit_source = true;` before the loop; gate the NOTE on `emit_source` and set it to false after the first emitted report, instead of keying off the enumerate index `i == 0`.","locations":[{"ref":"src/cargo/diagnostics/rules/non_kebab_case_bins.rs:96-127","code":"   96 |     for (i, bin) in manifest.normalized_toml().bin.iter().flatten().enumerate() {\n   97 |         let Some(original_name) = bin.name.as_deref() else {\n   98 |             continue;\n   99 |         };\n  100 |         let kebab_case = heck::ToKebabCase::to_kebab_case(original_name);\n  101 |         if kebab_case == original_name {\n  102 |             continue;\n  103 |         }\n  104 | \n  105 |         let document = manifest.document();\n  106 |         let contents = manifest.contents();\n  107 |         let level = lint_level.to_diagnostic_level();\n  108 |         let emitted_source = LINT.emitted_source(lint_level, source);\n  109 | \n  110 |         let mut primary_source = ws.target_dir().as_path_unlocked().to_owned();\n  111 |         // Elide profile/platform as we don't have that context\n  112 |         primary_source.push(\"...\");\n  113 |         primary_source.push(\"\");\n  114 |         let mut primary_source = primary_source.display().to_string();\n  115 |         let primary_span_start = primary_source.len();\n  116 |         let primary_span_end = primary_span_start + original_name.len();\n  117 |         primary_source.push_str(original_name);\n  118 |         primary_source.push_str(std::env::consts::EXE_SUFFIX);\n  119 |         let mut primary_group =\n  120 |             level\n  121 |                 .primary_title(LINT.desc)\n  122 |                 .element(Snippet::source(&primary_source).annotation(\n  123 |                     AnnotationKind::Primary.span(primary_span_start..primary_span_end),\n  124 |                 ));\n  125 |         if i == 0 {\n  126 |             primary_group = primary_group.element(Level::NOTE.message(emitted_source));\n  127 |         }","lines":32,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/non_kebab_case_bins.rs#L96-L127"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In the unknown-lints loop, when the manifest document/contents are present but `get_key_value_span` cannot find the key span, the code does `return Ok(())`, aborting the ENTIRE function and silently skipping all remaining unknown lints. The comment (\"This lint is handled by either package or workspace lint\") clearly implies the intent is to skip just this one entry. With multiple unknown lints, every unknown lint listed after the one with the missing span is silently never reported.","fix":"Replace `return Ok(());` at line 164 with `continue;` so only the current lint is skipped and the remaining unknown lints are still reported.","locations":[{"ref":"src/cargo/diagnostics/rules/unknown_lints.rs:159-165","code":"  159 |         if let Some(document) = manifest.document()\n  160 |             && let Some(contents) = manifest.contents()\n  161 |         {\n  162 |             let Some(span) = get_key_value_span(document, key_path) else {\n  163 |                 // This lint is handled by either package or workspace lint.\n  164 |                 return Ok(());\n  165 |             };","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unknown_lints.rs#L159-L165"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Several output directives validate flags only against space and newline (or only newline), so a flag/value containing `\\r` (carriage return) or other control chars passes through. Since the protocol is line-based on stdout, a `\\r` can corrupt terminal display or, combined with how some consumers split lines, allow injection. More concretely `rustc_env` validates the value only for `\\n` but not `\\r`, and `warning`/`error`/`metadata`/`rustc_flags`/`rustc_cdylib_link_arg` likewise only check `\\n`. A `\\r\\n` sequence in untrusted input is not caught.","fix":"Reject `\\r` (and ideally all ASCII control characters) in addition to `\\n` across these validators, e.g. check `contains(['\\n', '\\r'])`.","locations":[{"ref":"crates/build-rs/src/output.rs:248-253","code":"  248 | pub fn rustc_flags(flags: &str) {\n  249 |     if flags.contains('\\n') {\n  250 |         panic!(\"cannot emit rustc-flags: invalid flags\");\n  251 |     }\n  252 |     emit(\"rustc-flags\", flags);\n  253 | }","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/output.rs#L248-L253"},{"ref":"crates/build-rs/src/output.rs:369-377","code":"  369 | pub fn rustc_env(key: &str, value: &str) {\n  370 |     if key.contains(['=', '\\n']) {\n  371 |         panic!(\"cannot emit rustc-env: invalid key {key:?}\");\n  372 |     }\n  373 |     if value.contain
