s('\\n') {\n  374 |         panic!(\"cannot emit rustc-env: invalid value {value:?}\");\n  375 |     }\n  376 |     emit(\"rustc-env\", format_args!(\"{key}={value}\"));\n  377 | }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/output.rs#L369-L377"},{"ref":"crates/build-rs/src/output.rs:404-410","code":"  404 | #[track_caller]\n  405 | pub fn warning(message: &str) {\n  406 |     if message.contains('\\n') {\n  407 |         panic!(\"cannot emit warning: message contains newline\");\n  408 |     }\n  409 |     emit(\"warning\", message);\n  410 | }","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/output.rs#L404-L410"},{"ref":"crates/build-rs/src/output.rs:424-430","code":"  424 | #[track_caller]\n  425 | pub fn error(message: &str) {\n  426 |     if message.contains('\\n') {\n  427 |         panic!(\"cannot emit error: message contains newline\");\n  428 |     }\n  429 |     emit(\"error\", message);\n  430 | }","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/output.rs#L424-L430"},{"ref":"crates/build-rs/src/output.rs:433-443","code":"  433 | #[track_caller]\n  434 | pub fn metadata(key: &str, val: &str) {\n  435 |     if !is_ascii_ident(key) {\n  436 |         panic!(\"cannot emit metadata: invalid key {key:?}\");\n  437 |     }\n  438 |     if val.contains('\\n') {\n  439 |         panic!(\"cannot emit metadata: invalid value {val:?}\");\n  440 |     }\n  441 | \n  442 |     emit(\"metadata\", format_args!(\"{key}={val}\"));\n  443 | }","lines":11,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/output.rs#L433-L443"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`Ident` derives `Ord`/`PartialOrd` (which compare both `name` and `raw`) but has a hand-written `PartialEq` and `Hash` that intentionally ignore `raw` (so `foo == r#foo`). This makes `Ord` inconsistent with `Eq`: for `foo` vs `r#foo`, `partial_cmp` returns `Some(Greater/Less)` while `eq` returns `true`. The standard library requires `a == b` iff `a.cmp(b) == Equal`. Because `Ident` is embedded in `Cfg` and `CfgExpr` (both derive `Ord` and are used as keys / in sorted collections), this can produce surprising results: two values that compare equal can sort differently, breaking `BTreeMap`/`BTreeSet` and binary-search invariants.","fix":"Implement `Ord`/`PartialOrd` for `Ident` manually to compare only `name` (mirroring `PartialEq`/`Hash`), or include `raw` in `PartialEq`/`Hash` so all four impls agree. The former matches the documented intent that `foo == r#foo`.","locations":[{"ref":"crates/cargo-platform/src/cfg.rs:28-37","code":"   28 | #[derive(Eq, Ord, PartialOrd, Clone, Debug)]\n   29 | pub struct Ident {\n   30 |     /// The identifier\n   31 |     pub name: String,\n   32 |     /// Is this a raw ident: `r#async`\n   33 |     ///\n   34 |     /// It's mainly used for display and doesn't take\n   35 |     /// part in the hash or equality (`foo` == `r#foo`).\n   36 |     pub raw: bool,\n   37 | }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-platform/src/cfg.rs#L28-L37"},{"ref":"crates/cargo-platform/src/cfg.rs:73-95","code":"   73 | impl Hash for Ident {\n   74 |     fn hash<H: Hasher>(&self, state: &mut H) {\n   75 |         self.name.hash(state);\n   76 |     }\n   77 | }\n   78 | \n   79 | impl PartialEq<str> for Ident {\n   80 |     fn eq(&self, other: &str) -> bool {\n   81 |         self.name == other\n   82 |     }\n   83 | }\n   84 | \n   85 | impl PartialEq<&str> for Ident {\n   86 |     fn eq(&self, other: &&str) -> bool {\n   87 |         self.name == *other\n   88 |     }\n   89 | }\n   90 | \n   91 | impl PartialEq<Ident> for Ident {\n   92 |     fn eq(&self, other: &Ident) -> bool {\n   93 |         self.name == other.name\n   94 |     }\n   95 | }","lines":23,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-platform/src/cfg.rs#L73-L95"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`meta_cmp` matches `[..]` wildcards by greedily taking the leftmost occurrence of each literal part via `b.find(part)` without any backtracking. When an earlier literal part can match in a position that strands a later part, the function returns a false negative even though a valid match exists. Concrete example: `meta_cmp(\"a[..]bb\", \"abbb\")` returns `false`, but the pattern (literal `a`, wildcard, trailing `bb`) clearly matches `abbb` (the `[..]` should absorb a single `b`). The leftmost `find(\"bb\")` consumes the first `bb`, leaving a stray `b` that fails the final `b.is_empty()` check. This drives `match_contains` / `with_stderr_contains` / `with_stdout_contains` and can make assertions spuriously fail (or, in the inverse `match_does_not_contain`, spuriously pass) whenever the trailing literal repeats characters that overlap with the wildcard region. The doc says `[..]` is non-greedy, but the real defect is the lack of backtracking, not greediness.","fix":"Implement a backtracking match (or anchor the final part with `rfind` for the last segment, and use a proper substring-search-with-resume for the middle parts). A simple correct approach: for the last part, use `b.ends_with(part)` / `rfind`; for interior parts, retry later occurrences if the remainder ultimately fails.","locations":[{"ref":"crates/cargo-test-support/src/compare.rs:494-507","code":"  494 | fn meta_cmp(a: &str, mut b: &str) -> bool {\n  495 |     for (i, part) in a.split(\"[..]\").enumerate() {\n  496 |         match b.find(part) {\n  497 |             Some(j) => {\n  498 |                 if i == 0 && j != 0 {\n  499 |                     return false;\n  500 |                 }\n  501 |                 b = &b[j + part.len()..];\n  502 |             }\n  503 |             None => return false,\n  504 |         }\n  505 |     }\n  506 |     b.is_empty() || a.ends_with(\"[..]\")\n  507 | }","lines":14,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/compare.rs#L494-L507"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the libsecret provider, `error` is a single `*mut GError` declared once (line 170)\nand shared across the Get/Login/Logout match arms. While only one arm runs per call so\nno leak occurs in practice, libsecret functions that fail set `error` but the code never\ncalls `g_error_free` on the returned `GError`. On any failing store/lookup/clear the\n`GError` allocated by libsecret is leaked. For a short-lived process this is benign, but\nit is a real memory leak and the comment/structure implies the error is handled cleanly.","fix":"Load and call `g_error_free(error)` after reading `(*error).message`, or accept the leak and document it.","locations":[{"ref":"credential/cargo-credential-libsecret/src/lib.rs:183-191","code":"  183 |                     if !error.is_null() {\n  184 |                         return Err(format!(\n  185 |                             \"failed to get token: {}\",\n  186 |                             CStr::from_ptr((*error).message)\n  187 |                                 .to_str()\n  188 |                                 .unwrap_or_default()\n  189 |                         )\n  190 |                         .into());\n  191 |                     }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L183-L191"},{"ref":"credential/cargo-credential-libsecret/src/lib.rs:222-230","code":"  222 |                         if !error.is_null() {\n  223 |                             return Err(format!(\n  224 |                                 \"failed to store token: {}\",\n  225 |                                 CStr::from_ptr((*error).message)\n  226 |                                     .to_str()\n  227 |                                     .unwrap_or_default()\n  228 |                             )\n  229 |                             .into());\n  230 |                         }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L222-L230"},{"ref":"credential/cargo-credential-libsecret/src/lib.rs:244-252","code":"  244 |                         if !error.is_null() {\n  245 |                             return Err(format!(\n  246 |                                 \"failed to erase token: {}\",\n  247 |                                 CStr::from_ptr((*error).message)\n  248 |                                     .to_str()\n  249 |                                     .unwrap_or_default()\n  250 |                             )\n  251 |                             .into());\n  252 |                         }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L244-L252"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In the wincred `Login` path, `CredentialBlob` is set to `token.as_bytes().as_ptr()`\nwhere `token` is the `String` returned by `read_token(...)?.expose()`. The `CREDENTIALW`\nstruct stores a raw pointer into `token`'s buffer; `CredWriteW` is called while `token`\nis still alive, which is correct. However the token bytes are written to the persistent\nWindows Credential Manager as a UTF-8 blob, and read back via `String::from_utf8` in\nGet - consistent. The real concern: `CredentialBlobSize: token.len() as u32` truncates\nsilently if the token were ever larger than 4 GiB (`as u32`). Practically impossible for\na token, so negligible, but the unchecked cast is worth noting.","fix":"Negligible in practice; if hardened, use `u32::try_from(token.len())` and error on overflow.","locations":[{"ref":"credential/cargo-credential-wincred/src/lib.rs:93-94","code":"   93 |                         CredentialBlobSize: token.len() as u32,\n   94 |                         CredentialBlob: token.as_bytes().as_ptr() as *mut u8,","lines":2,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-wincred/src/lib.rs#L93-L94"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`serde_file_time` serializes `FileTime` as f64 milliseconds (`unix_seconds * 1000.0 + nanos / 1e6`) and deserializes back. f64 has only 52 bits of mantissa, so a Unix-seconds value multiplied by 1000 loses sub-millisecond (and eventually millisecond) precision for any realistic timestamp (e.g. ~1.7e9 s * 1000 = 1.7e12, leaving only ~microsecond granularity, and nanosecond information is entirely discarded). These `FileTime`s feed `StaleDependency`/`ChangedFile` diagnostics and the round-trip in `_compare_old_fingerprint`/`write_fingerprint` is debug-asserted to equal the original hash. Because mtimes are only persisted inside `fs_status` (which is `#[serde(skip)]` for the hash and only used for diagnostics) this is currently cosmetic, but it silently corrupts the mtime values shown to users in `cargo build -v`/JSON dirty reasons (the `_mtime` fields), which can show times off by nanoseconds-to-milliseconds versus the real filesystem value.","fix":"Serialize FileTime losslessly as a pair `(i64 unix_seconds, u32 nanoseconds)` (or two integer fields) instead of an f64 millisecond value.","locations":[{"ref":"src/cargo/core/compiler/fingerprint/mod.rs:727-752","code":"  727 | mod serde_file_time {\n  728 |     use filetime::FileTime;\n  729 |     use serde::Deserialize;\n  730 |     use serde::Serialize;\n  731 | \n  732 |     /// Serialize FileTime as milliseconds with nano.\n  733 |     pub(super) fn serialize<S>(ft: &FileTime, s: S) -> Result<S::Ok, S::Error>\n  734 |     where\n  735 |         S: serde::Serializer,\n  736 |     {\n  737 |         let secs_as_millis = ft.unix_seconds() as f64 * 1000.0;\n  738 |         let nanos_as_millis = ft.nanoseconds() as f64 / 1_000_000.0;\n  739 |         (secs_as_millis + nanos_as_millis).serialize(s)\n  740 |     }\n  741 | \n  742 |     /// Deserialize FileTime from milliseconds with nano.\n  743 |     pub(super) fn deserialize<'de, D>(d: D) -> Result<FileTime, D::Error>\n  744 |     where\n  745 |         D: serde::Deserializer<'de>,\n  746 |     {\n  747 |         let millis = f64::deserialize(d)?;\n  748 |         let secs = (millis / 1000.0) as i64;\n  749 |         let nanos = ((millis % 1000.0) * 1_000_000.0) as u32;\n  750 |         Ok(FileTime::from_unix_time(secs, nanos))\n  751 |     }\n  752 | }","lines":26,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/mod.rs#L727-L752"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Checksum::compute` for an `Entry::Occupied` cache hit in `find_stale_file` returns the cached checksum without ever validating the file's recorded length, while the `Entry::Vacant` path first compares `current_file_len != file_len` and reports `FileSizeChanged`. More importantly, on the very first miss the file length check happens before the checksum is computed, but a cached entry (populated by a *different* prior `find_stale_file` call for the same path with a possibly different expected `file_len`) is reused for an entry whose `file_len` differs, bypassing the size check entirely. Two units depending on the same file with diverging stored file sizes would silently treat the file as matching based only on the cached checksum.","fix":"Cache `(file_len, checksum)` and compare the stored `file_len` against the cached length on hits, or key the cache only by content checksum and keep the size check unconditional.","locations":[{"ref":"src/cargo/core/compiler/fingerprint/mod.rs:2111-2154","code":" 2111 |         if use_checksums {\n 2112 |             let Some((file_len, prior_checksum)) = prior_checksum else {\n 2113 |                 return Some(StaleItem::MissingChecksum {\n 2114 |                     path: path.to_path_buf(),\n 2115 |                 });\n 2116 |             };\n 2117 |             let path_buf = path.to_path_buf();\n 2118 | \n 2119 |             let path_checksum = match checksum_cache.entry(path_buf) {\n 2120 |                 Entry::Occupied(o) => *o.get(),\n 2121 |                 Entry::Vacant(v) => {\n 2122 |                     let Ok(current_file_len) = fs::metadata(&path).map(|m| m.len()) else {\n 2123 |                         return Some(StaleItem::FailedToReadMetadata {\n 2124 |                             path: path.to_path_buf(),\n 2125 |                         });\n 2126 |                     };\n 2127 |                     if current_file_len != file_len {\n 2128 |                         return Some(StaleItem::FileSizeChanged {\n 2129 |                             path: path.to_path_buf(),\n 2130 |                             new_size: current_file_len,\n 2131 |                             old_size: file_len,\n 2132 |                         });\n 2133 |                     }\n 2134 |                     let Ok(file) = File::open(path) else {\n 2135 |                         return Some(StaleItem::MissingFile {\n 2136 |                             path: path.to_path_buf(),\n 2137 |                         });\n 2138 |                     };\n 2139 |                     let Ok(checksum) = Checksum::compute(prior_checksum.algo(), file) else {\n 2140 |                         return Some(StaleItem::UnableToReadFile {\n 2141 |                             path: path.to_path_buf(),\n 2142 |                         });\n 2143 |                     };\n 2144 |                     *v.insert(checksum)\n 2145 |                 }\n 2146 |             };\n 2147 |             if path_checksum == prior_checksum {\n 2148 |                 continue;\n 2149 |             }\n 2150 |             return Some(StaleItem::ChangedChecksum {\n 2151 |                 source: path.to_path_buf(),\n 2152 |                 stored_checksum: prior_checksum,\n 2153 |                 new_checksum: path_checksum,\n 2154 |             });","lines":44,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/fingerprint/mod.rs#L2111-L2154"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the timings report, the table column `headers` are taken from the FIRST unit (after\nsorting by duration) that has any sections via `aggregated.iter().find_map(|s| s.as_ref())`.\nThose names become the only columns for the whole table. The comment at lines 317-320\nclaims the code supports \"an arbitrary set of headers, and an arbitrary set of sections\nper unit\", but in reality any section whose name is not present in that first unit's set\nis silently dropped from every row (it never matches in `cells.remove(header)`). With\n`-Zsection-timings`, units can legitimately have heterogeneous section sets (e.g. one\nunit has a Link section another lacks), so data is silently omitted and the comment is\ninaccurate.","fix":"Build `headers` as the stable-ordered union of section names across all units instead of from a single unit.","locations":[{"ref":"src/cargo/core/compiler/timings/report.rs:270-284","code":"  270 |     let aggregated: Vec<Option<_>> = units.iter().map(|u| u.sections.as_ref()).collect();\n  271 | \n  272 |     let headers: Vec<_> = aggregated\n  273 |         .iter()\n  274 |         .find_map(|s| s.as_ref())\n  275 |         .map(|sections| {\n  276 |             sections\n  277 |                 .iter()\n  278 |                 // We don't want to show the \"Other\" section in the table,\n  279 |                 // as it is usually a tiny portion out of the entire unit.\n  280 |                 .filter(|(name, _)| !matches!(name, SectionName::Other))\n  281 |                 .map(|s| s.0.clone())\n  282 |                 .collect()\n  283 |         })\n  284 |         .unwrap_or_default();","lines":15,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/timings/report.rs#L270-L284"},{"ref":"src/cargo/core/compiler/timings/report.rs:317-329","code":"  317 |         // This is a bit complex, as we assume the most general option - we can have an\n  318 |         // arbitrary set of headers, and an arbitrary set of sections per unit, so we always\n  319 |         // initiate the cells to be empty, and then try to find a corresponding column for which\n  320 |         // we might have data.\n  321 |         let mut cells: HashMap<_, _> = aggregated_sections\n  322 |             .iter()\n  323 |             .flat_map(|sections| sections.into_iter().map(|s| (&s.0, &s.1)))\n  324 |             .collect();\n  325 | \n  326 |         let cells = headers\n  327 |             .iter()\n  328 |             .map(|header| format!(\"<td>{}<\/td>\", format_duration(cells.remove(header))))\n  329 |             .join(\"\\n\");","lines":13,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/timings/report.rs#L317-L329"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `into_resolve`, when checksums were found in the `[metadata]` section but the lockfile is already `>= V2`, the code calls `checksums.drain()` to discard everything. `HashMap::drain()` returns an iterator that is immediately dropped; while this does clear the map, the surrounding intent ('discard all checksums and regenerate') is fragile: any `checksums` entries inserted from per-package `checksum` fields earlier in the same function (lines 208-211, which also bump version to >=V2) are silently thrown away here too, not just the bad `[metadata]` ones. A lockfile that legitimately mixes inline V2 checksums with a stray leftover `checksum ` metadata key (e.g. a bad merge) loses all of its valid inline checksums, forcing avoidable re-download/re-verify.","fix":"Only remove the checksums that came from the `[metadata]` `checksum ` keys (the ids in `to_remove`'s resolved ids), or scope the drop to metadata-derived entries instead of clearing the whole map.","locations":[{"ref":"src/cargo/core/resolver/encode.rs:347-355","code":"  347 |     // If `checksum` was listed in `[metadata]` but we were previously\n  348 |     // listed as `V2` then assume some sort of bad git merge happened, so\n  349 |     // discard all checksums and let's regenerate them later.\n  350 |     if !to_remove.is_empty() && version >= ResolveVersion::V2 {\n  351 |         checksums.drain();\n  352 |     }\n  353 |     for k in to_remove {\n  354 |         metadata.remove(&k);\n  355 |     }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/resolver/encode.rs#L347-L355"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"report.rs `workspace_rel_path` has a no-op if/else: `if let Ok(path) = path.strip_prefix(&root) { path } else { path }` returns `path` in both arms (the stripped sub-path in the Ok arm shadows the original, but the else arm rebinds to the original full path). It happens to be correct because the bindings differ, but the construct is a confusing identity-looking expression that reads like a bug and is easy to break in maintenance.","fix":"Make intent explicit: `path.strip_prefix(&root).unwrap_or(path).display().to_string()`.","locations":[{"ref":"src/cargo/diagnostics/report.rs:21-27","code":"   21 |     if let Ok(path) = path.strip_prefix(&root) {\n   22 |         path\n   23 |     } else {\n   24 |         path\n   25 |     }\n   26 |     .display()\n   27 |     .to_string()","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/report.rs#L21-L27"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"find_lint_or_group matches `l.name == name` against canonical underscore lint/group names with no dash normalization, but cargo lint keys are commonly hyphenated and unknown_lints itself does `lint_name.replace(\"-\", \"_\")` when suggesting a similar name, acknowledging keys may contain dashes. Consequence: a feature-gated lint written with a dash is skipped by missing_lints_features, and a validly-spelled but hyphenated known lint is flagged as unknown by unknown_lints.","fix":"Normalize the key (`replace('-', \"_\")`) before calling find_lint_or_group, consistent with the suggestion logic already in unknown_lints.","locations":[{"ref":"src/cargo/diagnostics/rules/mod.rs:230-244","code":"  230 | fn find_lint_or_group<'a>(\n  231 |     name: &str,\n  232 | ) -> Option<(&'static str, &LintLevel, &Option<&'static Feature>)> {\n  233 |     if let Some(lint) = LINTS.iter().find(|l| l.name == name) {\n  234 |         Some((\n  235 |             lint.name,\n  236 |             &lint.primary_group.default_level,\n  237 |             &lint.feature_gate,\n  238 |         ))\n  239 |     } else if let Some(group) = LINT_GROUPS.iter().find(|g| g.name == name) {\n  240 |         Some((group.name, &group.default_level, &group.feature_gate))\n  241 |     } else {\n  242 |         None\n  243 |     }\n  244 | }","lines":15,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/mod.rs#L230-L244"},{"ref":"src/cargo/diagnostics/rules/unknown_lints.rs:129-133","code":"  129 |     for lint_name in cargo_lints.keys().map(|name| name) {\n  130 |         let Some(_) = find_lint_or_group(lint_name) else {\n  131 |             unknown_lints.push(lint_name);\n  132 |             continue;\n  133 |         };","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unknown_lints.rs#L129-L133"},{"ref":"src/cargo/diagnostics/rules/missing_lints_features.rs:74-77","code":"   74 |     for lint_name in cargo_lints.keys().map(|name| name) {\n   75 |         let Some((name, default_level, feature_gate)) = find_lint_or_group(lint_name) else {\n   76 |             continue;\n   77 |         };","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/missing_lints_features.rs#L74-L77"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In unused_workspace_dependencies::lint_workspace, iterating `ws.members()` does `let Some(original_toml) = member.manifest().original_toml() else { return Ok(()); };`. A single member lacking an original_toml aborts the lint for the entire workspace, so all workspace deps are treated as inherited and no diagnostics are emitted. A member that cannot be inspected should be skipped, not abort the whole pass.","fix":"Use `continue;` instead of `return Ok(())` so other members still contribute to the inherited-deps set.","locations":[{"ref":"src/cargo/diagnostics/rules/unused_workspace_dependencies.rs:72-75","code":"   72 |     for member in ws.members() {\n   73 |         let Some(original_toml) = member.manifest().original_toml() else {\n   74 |             return Ok(());\n   75 |         };","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unused_workspace_dependencies.rs#L72-L75"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`check_metadata`'s `lacking!` macro computes `missing` field names but the message-building code at the end does `missing[..missing.len() - 1].join(\", \")` then appends ` or ` and the last element. If `missing` ever became empty this would underflow (`missing.len() - 1` on 0usize). It is guarded by the outer `if !missing.is_empty()`, so it is currently safe, but the construction is fragile: the `lacking!` macro pushes one entry per failing group, and the index arithmetic assumes at least one element. A future edit adding an early path could reintroduce the underflow panic.","fix":"Use a safer join (e.g. build the human list with `split_last`) so the code cannot panic on an empty `missing` even if the outer guard changes.","locations":[{"ref":"src/cargo/ops/cargo_package/mod.rs:828-843","code":"  828 |     if !missing.is_empty() {\n  829 |         // Only warn if publishing to crates.io based on resolved registry\n  830 |         let should_warn = match reg_or_index {\n  831 |             Some(RegistryOrIndex::Registry(reg_name)) => reg_name == CRATES_IO_REGISTRY,\n  832 |             None => true,                             // Default is crates.io\n  833 |             Some(RegistryOrIndex::Index(_)) => false, // Custom index, not crates.io\n  834 |         };\n  835 | \n  836 |         if should_warn {\n  837 |             let mut things = missing[..missing.len() - 1].join(\", \");\n  838 |             // `things` will be empty if and only if its length is 1 (i.e., the only case\n  839 |             // to have no `or`).\n  840 |             if !things.is_empty() {\n  841 |                 things.push_str(\" or \");\n  842 |             }\n  843 |             things.push_str(missing.last().unwrap());","lines":16,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_package/mod.rs#L828-L843"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`download::download` returns a cached `.crate` file as `MaybeLock::Ready` as\nsoon as it finds an existing file with non-zero length, without verifying its\nchecksum (\"For already downloaded `.crate` files, it does not validate the\nchecksum, assuming the filesystem does not suffer from corruption or\nmanipulation\", per the trait doc). The `checksum` argument is accepted but\nunused on this path. While this is a deliberate performance trade-off, the\nconsequence is that an existing-but-wrong cache file (e.g. left by a previous\ninterrupted/partial write that still has length > 0, or tampered-with) is\nunpacked and used without integrity checking. The 0-length guard only catches\nfully-empty interrupted downloads, not partial ones.","fix":"Consider verifying the checksum of a found cache file (at least opportunistically, or behind a flag), or document/strengthen the invariant that cached files are always complete and trusted.","locations":[{"ref":"src/cargo/sources/registry/download.rs:40-58","code":"   40 |     // Attempt to open a read-only copy first to avoid an exclusive write\n   41 |     // lock and also work with read-only filesystems. Note that we check the\n   42 |     // length of the file like below to handle interrupted downloads.\n   43 |     //\n   44 |     // If this fails then we fall through to the exclusive path where we may\n   45 |     // have to redownload the file.\n   46 |     if let Ok(dst) = File::open(path) {\n   47 |         let meta = dst.metadata()?;\n   48 |         if meta.len() > 0 {\n   49 |             gctx.deferred_global_last_use()?.mark_registry_crate_used(\n   50 |                 global_cache_tracker::RegistryCrate {\n   51 |                     encoded_registry_name,\n   52 |                     crate_filename: pkg.tarball_name().into(),\n   53 |                     size: meta.len(),\n   54 |                 },\n   55 |             );\n   56 |             return Ok(MaybeLock::Ready(dst));\n   57 |         }\n   58 |     }","lines":19,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/registry/download.rs#L40-L58"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`LocalRegistry::set_quiet` ignores its `quiet` argument and unconditionally sets\n`self.quiet = true`. This means calling `set_quiet(false)` (e.g. to re-enable\nstatus output) will instead silence the source, and once any call is made the\nlocal registry can never be made non-quiet again. Compare with the sibling\nimplementations in `remote.rs` (`self.quiet = quiet`) and `http_remote.rs`\n(`self.inner().quiet.set(quiet)`), which correctly forward the parameter.","fix":"Change the body to `self.quiet = quiet;`.","locations":[{"ref":"src/cargo/sources/registry/local.rs:165-167","code":"  165 |     fn set_quiet(&mut self, _quiet: bool) {\n  166 |         self.quiet = true;\n  167 |     }","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/registry/local.rs#L165-L167"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Struct-in-array deserialization fails for absent optional fields. `ArrayItemMapAccess::with_struct` seeds the map iterator with ALL declared struct fields (`given_fields`), so `next_key_seed` yields every field even if absent from the underlying `CV::Table`. `next_value_seed` then does `map.get(&key)` and, for a missing field, returns `Err(\"missing config key\")` instead of letting serde fill it with `None`/default. Thus any `Vec<SomeStruct>` config where a struct has an unset optional field fails to deserialize. The non-array path (`ConfigMapAccess::new_struct`) correctly yields only present keys.","fix":"In `with_struct`, only yield fields actually present in the table (intersect `given_fields` with the table keys), mirroring `new_struct`; or make `next_value_seed` deserialize a None/default for absent keys.","locations":[{"ref":"src/cargo/util/context/de.rs:739-753","code":"  739 |     fn with_struct(cv: CV, given_fields: &[&str], key_path: &'err mut ArrayItemKeyPath) -> Self {\n  740 |         // TODO: We might want to warn unused fields,\n  741 |         // like what we did in ConfigMapAccess::new_struct\n  742 |         let keys = given_fields\n  743 |             .into_iter()\n  744 |             .map(|s| s.to_string())\n  745 |             .collect::<Vec<_>>()\n  746 |             .into_iter();\n  747 |         Self {\n  748 |             cv,\n  749 |             keys,\n  750 |             current_key: None,\n  751 |             key_path,\n  752 |         }\n  753 |     }","lines":15,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/context/de.rs#L739-L753"},{"ref":"src/cargo/util/context/de.rs:772-798","code":"  772 |     fn next_value_seed<V>(&mut self, seed: V) -> Result<V::Value, Self::Error>\n  773 |     where\n  774 |         V: de::DeserializeSeed<'de>,\n  775 |     {\n  776 |         let key = self.current_key.take().unwrap();\n  777 |         match &self.cv {\n  778 |             CV::Table(map, _) => {\n  779 |                 if let Some(cv) = map.get(&key) {\n  780 |                     let de = ArrayItemDeserializer {\n  781 |                         cv: cv.clone(),\n  782 |                         key_path: self.key_path,\n  783 |                     };\n  784 |                     seed.deserialize(de)\n  785 |                         .inspect_err(|_| self.key_path.push_key(key))\n  786 |                 } else {\n  787 |                     Err(ConfigError::new(\n  788 |                         format!(\"missing config key `{key}`\"),\n  789 |                         self.cv.definition().clone(),\n  790 |                     ))\n  791 |                 }\n  792 |             }\n  793 |             _ => Err(ConfigError::new(\n  794 |                 \"expected table\".to_string(),\n  795 |                 self.cv.definition().clone(),\n  796 |             )),\n  797 |         }\n  798 |     }","lines":27,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/context/de.rs#L772-L798"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Off-by-one in the 'closing code fence has fewer dashes' diagnostic. The recovery loop searches with `input.find_slice(&nl_fence_pattern[0..len])`; `nl_fence_pattern` is a newline followed by `fence_length` dashes, so `[0..len]` contains the `\\n` plus only `len - 1` dashes. The code then (a) `input.next_slice(len)` consumes `len` characters as the close span even though only `len-1` were verified as dashes (the extra char is whatever follows the fence -- and can panic by slicing past EOF if the short fence ends the input), and (b) reports `fewer_dashes = fence_length - len`, undercounting the real difference by 1. The existing tests only cover the more-dashes branch, so this path is unexercised.","fix":"Use `dashes = len - 1` for both the consumed span (`next_slice(start+1)` then `next_slice(dashes)`) and the reported `fewer_dashes = fence_length - dashes`.","locations":[{"ref":"src/cargo/util/frontmatter.rs:108-123","code":"  108 |             for len in (2..(nl_fence_pattern.len() - 1)).rev() {\n  109 |                 let Some(frontmatter_nl) = input.find_slice(&nl_fence_pattern[0..len]) else {\n  110 |                     continue;\n  111 |                 };\n  112 |                 let _ = input.next_slice(frontmatter_nl.start + 1);\n  113 |                 let close_start = input.current_token_start();\n  114 |                 let _ = input.next_slice(len);\n  115 |                 let close_end = input.current_token_start();\n  116 |                 let fewer_dashes = fence_length - len;\n  117 |                 return Err(FrontmatterError::new(\n  118 |                     format!(\n  119 |                         \"closing code fence has {fewer_dashes} less `-` than the opening fence\"\n  120 |                     ),\n  121 |                     close_start..close_end,\n  122 |                 )\n  123 |                 .push_visible_span(open_start..open_end));","lines":16,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/frontmatter.rs#L108-L123"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`rustc_check_cfg_values(key, &[])` (empty values) silently falls back to `rustc_check_cfgs(&[key])`, emitting `cfg(key)` (the no-value form) instead of `cfg(key, values())` (the value form with no expected values). These are semantically different to rustc's unexpected_cfgs lint: `cfg(key)` permits `--cfg key` with no value, while `cfg(key, values())` permits the key only with an explicit value set. Callers asking for the values-form with an empty list get the wrong directive.","fix":"When `values.is_empty()`, emit `cfg({key}, values())` rather than delegating to `rustc_check_cfgs`, or document and rename to make the fallback intentional.","locations":[{"ref":"crates/build-rs/src/output.rs:337-355","code":"  337 | pub fn rustc_check_cfg_values(key: &str, values: &[&str]) {\n  338 |     if !is_ident(key) {\n  339 |         panic!(\"cannot emit rustc-check-cfg: invalid key {key:?}\");\n  340 |     }\n  341 |     if values.is_empty() {\n  342 |         rustc_check_cfgs(&[key]);\n  343 |         return;\n  344 |     }\n  345 | \n  346 |     let mut directive = format!(\"\\\"{}\\\"\", values[0].escape_default());\n  347 |     for value in &values[1..] {\n  348 |         write!(directive, \", \\\"{}\\\"\", value.escape_default())\n  349 |             .expect(\"writing to string should be infallible\");\n  350 |     }\n  351 |     emit(\n  352 |         \"rustc-check-cfg\",\n  353 |         format_args!(\"cfg({key}, values({directive}))\"),\n  354 |     );\n  355 | }","lines":19,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/output.rs#L337-L355"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In the `>=1.NN` rule handler, the \"ignored\" reason message reports the *current* rustc minor version instead of the *required* minimum version. `min_minor` is the parsed minimum (e.g. 64 from `>=1.64`), `minor` is the rustc actually in use. The ignore message is built with `minor`, so when a test is skipped for being on too-old a rustc it prints something like \"requires rustc 1.60 or newer\" while running on 1.60 - a nonsensical / misleading reason. It should report `min_minor`.","fix":"Change the format string to use the required minimum: `set_ignore!(minor < min_minor, \"requires rustc 1.{min_minor} or newer\");`","locations":[{"ref":"crates/cargo-test-macro/src/lib.rs:150-155","code":"  150 |             s if s.starts_with(\">=1.\") => {\n  151 |                 requires_reason = true;\n  152 |                 let min_minor = s[4..].parse().unwrap();\n  153 |                 let minor = version().0;\n  154 |                 set_ignore!(minor < min_minor, \"requires rustc 1.{minor} or newer\");\n  155 |             }","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-macro/src/lib.rs#L150-L155"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The test-name extraction assumes the function declaration begins with exactly one identifier (`fn`) before the name. It counts idents: the first ident increments `num` to 1, the second ident (expected to be the name) is captured. If a `#[cargo_test]` function is declared with any qualifier before `fn` - e.g. `pub fn`, `async fn`, `pub(crate) fn`, `const fn`, `unsafe fn` - the first captured ident will be `fn` (or the wrong token), producing a wrong sandbox/test name passed to `paths::test_dir`. Today all cargo tests are plain `fn`, so it is latent, but it is fragile and silent.","fix":"Scan for the `fn` keyword explicitly and take the following identifier as the test name, instead of counting identifiers positionally.","locations":[{"ref":"crates/cargo-test-macro/src/lib.rs:203-237","code":"  203 |     let mut test_name = None;\n  204 |     let mut num = 0;\n  205 | \n  206 |     // Find where the function body starts, and add the boilerplate at the start.\n  207 |     for token in item {\n  208 |         let group = match token {\n  209 |             TokenTree::Group(g) => {\n  210 |                 if g.delimiter() == Delimiter::Brace {\n  211 |                     g\n  212 |                 } else {\n  213 |                     ret.extend(Some(TokenTree::Group(g)));\n  214 |                     continue;\n  215 |                 }\n  216 |             }\n  217 |             TokenTree::Ident(i) => {\n  218 |                 // The first time through it will be `fn` the second time is the\n  219 |                 // name of the test.\n  220 |                 if test_name.is_none() && num == 1 {\n  221 |                     test_name = Some(i.to_string())\n  222 |                 } else {\n  223 |                     num += 1;\n  224 |                 }\n  225 |                 ret.extend(Some(TokenTree::Ident(i)));\n  226 |                 continue;\n  227 |             }\n  228 |             other => {\n  229 |                 ret.extend(Some(other));\n  230 |                 continue;\n  231 |             }\n  232 |         };\n  233 | \n  234 |         let name = &test_name\n  235 |             .clone()\n  236 |             .map(|n| n.split(\"::\").next().unwrap().to_string())\n  237 |             .unwrap();","lines":35,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-macro/src/lib.rs#L203-L237"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ArgLineCommandExt::arg_line` strips surrounding quotes but a single quote character (an argument that is just `\"` or `'`) is treated as a quoted-empty string. `arg = \"\\\"\"` satisfies both `starts_with('\"')` and `ends_with('\"')` (same char), and `&arg[1..(arg.len()-1).max(1)]` yields `\"\"`, silently dropping the literal quote character rather than passing it through. The `.max(1)` guard avoids a panic but masks the intent: a lone quote becomes an empty arg. Tests that legitimately pass a single quote as an argument would get the wrong value.","fix":"Only strip quotes when `arg.len() >= 2` and both ends are the same quote char; otherwise pass the argument through unchanged.","locations":[{"ref":"crates/cargo-test-support/src/lib.rs:1504-1516","code":" 1504 |     fn arg_line(mut self, s: &str) -> Self {\n 1505 |         for mut arg in s.split_whitespace() {\n 1506 |             if (arg.starts_with('\"') && arg.ends_with('\"'))\n 1507 |                 || (arg.starts_with('\\'') && arg.ends_with('\\''))\n 1508 |             {\n 1509 |                 arg = &arg[1..(arg.len() - 1).max(1)];\n 1510 |             } else if arg.contains(&['\"', '\\''][..]) {\n 1511 |                 panic!(\"shell-style argument parsing is not supported\")\n 1512 |             }\n 1513 |             self = self.arg(arg);\n 1514 |         }\n 1515 |         self\n 1516 |     }","lines":13,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/lib.rs#L1504-L1516"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`HttpServer::start` reads the request line and takes `parts.next().unwrap()` for the method and again for the path. The path `unwrap()` will panic the server thread if a client sends a request line with only one token (e.g. a bare `GET\\r\\n` or a malformed line). Because this runs on the dedicated server thread, a panic there poisons/kills the server and any subsequent test request will hang or fail with a connection error rather than a clear assertion. While unusual, cargo itself or a misbehaving test client could trigger it. The `method == \"stop\"` shortcut path also relies on the first token existing.","fix":"Validate the parsed request line; respond with a 400 (or `continue 'server`) when the path token is missing instead of unwrapping.","locations":[{"ref":"crates/cargo-test-support/src/registry.rs:770-782","code":"  770 |             let mut parts = line.split_ascii_whitespace();\n  771 |             let method = parts.next().unwrap().to_ascii_lowercase();\n  772 |             if method == \"stop\" {\n  773 |                 // Shutdown the server.\n  774 |                 return;\n  775 |             }\n  776 |             let addr = self.listener.local_addr().unwrap();\n  777 |             let url = format!(\n  778 |                 \"http://{}/{}\",\n  779 |                 addr,\n  780 |                 parts.next().unwrap().trim_start_matches('/')\n  781 |             );\n  782 |             let url = Url::parse(&url).unwrap();","lines":13,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/registry.rs#L770-L782"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`HttpServer::index` builds the conditional-request response with a flawed boolean scheme. It tracks `any_match`/`all_match` and returns 304 only when `any_match && all_match`. When a request supplies *both* `If-None-Match` and `If-Modified-Since` and only one of them matches, `all_match` becomes false and a full 200 body is returned -- which is correct -- but when *neither* header is present, `any_match` stays false and `all_match` stays true, so it correctly returns 200. The subtle issue: if only `If-Modified-Since` is sent and matches (etag header absent), `any_match=true, all_match=true` -> 304, which is the intent. The logic happens to work for current tests but the `any_match`/`all_match` combination is hard to reason about and does not mirror real HTTP precedence rules (ETag should take precedence over Last-Modified). A future test mixing the two headers could get surprising results.","fix":"Document the simplified semantics, or implement the standard precedence: if `If-None-Match` is present, decide solely on the ETag; otherwise fall back to `If-Modified-Since`.","locations":[{"ref":"crates/cargo-test-support/src/registry.rs:1103-1138","code":" 1103 |             // Start to construct our response:\n 1104 |             let mut any_match = false;\n 1105 |             let mut all_match = true;\n 1106 |             if let Some(expected) = &req.if_none_match {\n 1107 |                 if &etag != expected {\n 1108 |                     all_match = false;\n 1109 |                 } else {\n 1110 |                     any_match = true;\n 1111 |                 }\n 1112 |             }\n 1113 |             if let Some(expected) = &req.if_modified_since {\n 1114 |                 // NOTE: Equality comparison is good enough for tests.\n 1115 |                 if &last_modified != expected {\n 1116 |                     all_match = false;\n 1117 |                 } else {\n 1118 |                     any_match = true;\n 1119 |                 }\n 1120 |             }\n 1121 | \n 1122 |             if any_match && all_match {\n 1123 |                 return Response {\n 1124 |                     body: Vec::new(),\n 1125 |                     code: 304,\n 1126 |                     headers: vec![],\n 1127 |                 };\n 1128 |             } else {\n 1129 |                 return Response {\n 1130 | y":"low","easy":false,"description":"Text renderer's horizontal rule width `\"_\".repeat(79 - self.indent * 2)` underflows/panics when `self.indent * 2 > 79` (indent >= 40). Deeply nested content with a thematic break (`---`) can reach that indent. Note it multiplies indent by 2 which is inconsistent with the table code that uses `indent` directly, so the rule is also drawn much shorter than the available width even at moderate indent.","fix":"Use `\"_\".repeat((79usize).saturating_sub(self.indent))` (matching the single-indent convention used elsewhere) to fix both the underflow and the over-aggressive width reduction.","locations":[{"ref":"crates/mdman/src/format/text.rs:358-363","code":"  358 |                 Event::Rule => {\n  359 |                     self.flush();\n  360 |                     self.push_indent(self.indent);\n  361 |                     self.push_to_line(&\"_\".repeat(79 - self.indent * 2));\n  362 |                     self.flush();\n  363 |                 }","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/text.rs#L358-L363"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`flush_word` wraps when `self.line.len() + self.word.len() >= 79` using byte lengths (`str::len`), not display width. Multi-byte UTF-8 text (e.g. accented characters or CJK) is counted by bytes, so lines containing such text wrap earlier than intended (and CJK, which is double-width, wraps later than it should visually). The 79-column target is therefore inaccurate for non-ASCII content. Same byte-vs-width assumption appears in `fill_cell`/`render` table sizing.","fix":"Measure width with `chars().count()` or a unicode-width crate instead of `len()` for wrapping decisions.","locations":[{"ref":"crates/mdman/src/format/text.rs:389-406","code":"  389 |     fn flush_word(&mut self) {\n  390 |         if self.word.is_empty() {\n  391 | he `// todo: word.len() > width` comment but does nothing.","fix":"Hard-break words longer than `width` (split the word into width-sized chunks) before/while filling, so no produced line exceeds the column width.","locations":[{"ref":"crates/mdman/src/format/text.rs:611-632","code":"  611 |         // Word-wrap the cell.\n  612 |         let mut result = Vec::new();\n  613 |         let mut line = String::new();\n  614 |         for word in text.split_whitespace() {\n  615 |             if line.len() + word.len() >= width {\n  616 |                 // todo: word.len() > width\n  617 |                 result.push(fill_width(&line));\n  618 |                 line.clear();\n  619 |             }\n  620 |             if line.is_empty() {\n  621 |                 line.push_str(word);\n  622 |             } else {\n  623 |                 line.push(' ');\n  624 |                 line.push_str(&word);\n  625 |             }\n  626 |         }\n  627 |         if !line.is_empty() {\n  628 |             result.push(fill_width(&line));\n  629 |         }\n  630 | \n  631 |         result\n  632 |     }","lines":22,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/text.rs#L611-L632"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`unwrap` (used to strip wrapper tags like `<p>`/`<dt>`) uses `trim_start_matches`/`trim_end_matches`, which strip ALL leading/trailing repetitions of the pattern, not just one. For input like `<p><p>text<\/p><\/p>` (or a term that legitimately begins with the literal tag text repeated) this removes more than the single wrapper pair intended, silently corrupting content.","fix":"Use `strip_prefix`/`strip_suffix` to remove exactly one occurrence of the front/back marker (falling back to the original on mismatch).","locations":[{"ref":"crates/mdman/src/util.rs:42-44","code":"   42 | pub fn unwrap<'t>(text: &'t str, front: &str, with('-') => {\n   65 |                     return Err(format!(\"unknown option {}\", s).into());\n   66 |                 }\n   67 |                 _ => {\n   68 |                     if action {\n   69 |                         return Err(\"too many arguments\".into());\n   70 |                     } else {\n   71 |                         action = true;\n   72 |                     }\n   73 |                 }\n   74 |             }\n   75 |         }\n   76 |         Ok(OnePasswordKeychain {\n   77 |             account: account.map(|s| s.to_string()),\n   78 |             vault: vault.map(|s| s.to_string()),\n   79 |         })\n   80 |     }","lines":30,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-1password/src/main.rs#L51-L80"}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`deserialize_request` checks `request.v != PROTOCOL_VERSION_1` and rejects, but the\nhello message advertises only `PROTOCOL_VERSION_1`. The error message\n`format!(\"unsupported protocol version {}\", request.v)` is fine. However the doc\ncomment for `PROTOCOL_VERSION_1` describes a multi-version negotiation scheme that is\nnot implemented (no `v` list is consulted beyond a single equality check). Not a bug\ntoday, but the comment overstates current capability.","fix":"Trim the doc comment to reflect that only a single protocol version is currently supported, or implement the described negotiation.","locations":[{"ref":"credential/cargo-credential/src/lib.rs:214-221","code":"  214 | /// Credential process JSON protocol version.\n  215 | ///\n  216 | /// If the protocol needs to make\n  217 | /// a breaking change, a new protocol version should be defined (`PROTOCOL_VERSION_2`).\n  218 | /// This library should offer support for both protocols if possible, by signaling\n  219 | /// in the `CredentialHello` message. Cargo will then choose which protocol t te deps_output once per kind, or use a representation that holds per-unit dirs for the new layout; the per-unit loop overwriting a kind-keyed map is wrong.","locations":[{"ref":"src/cargo/core/compiler/build_runner/mod.rs:484-494","code":"  484 |             if self.bcx.gctx.cli_unstable().build_dir_new_layout {\n  485 |                 for (unit, _) in self.bcx.unit_graph.iter() {\n  486 |                     let dep_dir = self.files().deps_dir(unit);\n  487 |                     paths::create_dir_all(&dep_dir)?;\n  488 |                     self.compilation.deps_output.insert(kind, dep_dir);\n  489 |                 }\n  490 |             } else {\n  491 |                 self.compilation\n  492 |                     .deps_output\n  493 |                     .insert(kind, layout.build_dir().legacy_deps().to_path_buf());\n  494 |             }","lines":11,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/build_runner/mod.rs#L484-L494"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `build_sbom_graph`, `visited` is keyed only on the `Unit`, but the meaningful traversal\nstate is `(unit, is_build_dep)`. The first time a unit is reached fixes how all of its\ntransitive descendants are classified (Normal vs Build). If a unit is reachable both under\na build-dependency subtree and a normal subtree, whichever the LIFO `pop()` reaches first\nwins and the other context's subtree is never re-traversed, so deeper descendants can\ninherit a build-dep flag that does not match all reachable paths.","fix":"If the dedup is intended, document that descendant build-dep classification is path-independent; otherwise key `visited` on `(unit, is_build_dep)`.","locations":[{"ref":"src/cargo/core/compiler/output_sbom.rs:147-179","code":"  147 |     let mut queue = Vec::new();\n  148 |     let mut sbom_graph: BTreeMap<&Unit, BTreeSet<(&Unit, SbomDependencyType)>> = BTreeMap::new();\n  149 |     let mut visited = HashSet::new();\n  150 | \n  151 |     // Search to collect all dependencies of the root unit.\n  152 |     queue.push((root, root, false));\n  153 |     while let Some((node, parent, is_build_dep)) = queue.pop() {\n  154 |         let dependencies = sbom_graph.entry(parent).or_default();\n  155 |         for dep in build_runner.unit_deps(node) {\n  156 |             let dep = &dep.unit;\n  157 |             let (next_parent, next_is_build_dep) = if dep.mode == CompileMode::RunCustomBuild {\n  158 |                 // Nodes in the SBOM graph for building/running build scripts are moved on to their parent as build dependencies.\n  159 |                 (parent, true)\n  160 |             } else {\n  161 |                 // Proc-macros and build scripts are marked as build dependencies.\n  162 |                 let dep_type = match is_build_dep || dep.target.proc_macro() {\n  163 |                     false => SbomDependencyType::Normal,\n  164 |                     true => SbomDependencyType::Build,\n  165 |                 };\n  166 |                 dependencies.insert((dep, dep_type));\n  167 |                 tracing::trace!(\n  168 |                     \"adding sbom edge {} -> {} ({:?})\",\n  169 |                     parent.pkg.package_id(),\n  170 |                     dep.pkg.package_id(),\n  171 |                     dep_type,\n  172 |                 );\n  173 |                 (dep, false)\n  174 |             };\n  175 |             if visited.insert(dep) {\n  176 |                 queue.push((dep, next_parent, next_is_build_dep));\n  177 |             }\n  178 |         }\n  179 |     }","lines":33,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/output_sbom.rs#L147-L179"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`resolve_std` calls `std_crates(crates, default, &[])` atures.is_empty() {\n  388 |                     None\n  389 |                 } else {\n  390 |                     Some(((*pkg_id, *for_host), removed_features))\n  391 |                 }\n  392 |             })\n  393 |             .collect()\n  394 |     }","lines":27,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/resolver/features.rs#L368-L394"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`ActivationsKey` implements `Hash` by intentionally omitting `self.2` (the `SourceId`) while its `Eq`/`Ord` do compare the `SourceId`. This is a deliberate optimization (comment says packages differing only by SourceId are rare), and is technically valid for `Hash`/`Eq` consistency (equal keys still hash equal). However, it means every distinct-source package that shares name+SemverCompatibility collides into the same hash bucket; in pathological workspaces with many same-name/same-major packages across many sources (e.g. heavy `[patch]`/mirror use) this degrades the `Activations` `im_rc::HashMap` to linear probing/scan behavior during the hot resolver loop.","fix":"Consider hashing the `SourceId` as well (or a cheap discriminant of it); benchmark against the documented assumption before keeping the omission.","locations":[{"ref":"src/cargo/core/resolver/types.rs:183-189","code":"  183 | impl std::hash::Hash for ActivationsKey {\n  184 |     fn hash<H: std::hash::Hasher>(&self, state: &mut H) {\n  185 |         self.0.hash(state);\n  186 |         self.1.hash(state);\n  187 |         // self.2.hash(state); // Packages that only differ by SourceId are rare enough to not be worth hashing\n  188 |     }\n  189 | }","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/resolver/types.rs#L183-L189"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`VersionPreferences::sort_summaries`, when `first_version.is_some()`, sorts then `split_off(1)` to keep only one summary. The sort comparator uses `first_version.unwrap_or(self.version_ordering)` for the version tie-break but still applies the `should_prefer` and `msrv_compat_count` priorities first. Therefore the single retained summary may be a 'preferred' (lock-file/patch) version or an MSRV-compatible one rather than the strict min/max requested by `direct_minimal_versions` (`first_version`). For `-Zdirect-minimal-versions` the intent is to pick the strictly minimal version; preferring a locked/MSRV version here can defeat that flag.","fix":"When `first_version.is_some()`, bypass the `should_prefer`/`msrv_compat_count` priorities (or document that they intentionally take precedence) so the retained candidate is the true min/max version.","locations":[{"ref":"src/cargo/core/resolver/version_prefs.rs:119-144","code":"  119 |         summaries.sort_unstable_by(|a, b| {\n  120 |             let prefer_a = self.should_prefer(&a.package_id());\n  121 |             let prefer_b = self.should_prefer(&b.package_id());\n  122 |             let previous_cmp = prefer_a.cmp(&prefer_b).reverse();\n  123 |             if previous_cmp != Ordering::Equal {\n  124 |                 return previous_cmp;\n  125 |             }\n  126 | \n  127 |             if !self.rust_versions.is_empty() {\n  128 |                 let a_compat_count = self.msrv_compat_count(a);\n  129 |                 let b_compat_count = self.msrv_compat_count(b);\n  130 |                 if b_compat_count != a_compat_count {\n  131 |                     return b_compat_count.cmp(&a_compat_count);\n  132 |                 }\n  133 |             }\n  134 | \n  135 |             let cmp = a.version().cmp(b.version());\n  136 |             match first_version.unwrap_or(self.version_ordering) {\n  137 |                 VersionOrdering::MaximumVersionsFirst => cmp.reverse(),\n  138 |                 VersionOrdering::MinimumVersionsFirst => cmp,\n  139 |             }\n  140 |         });\n  141 |         if first_version.is_some() && !summaries.is_empty() {\n  142 |             let _ = summaries.split_off(1);\n  143 |         }\n  144 |     }","lines":26,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/resolver/version_prefs.rs#L119-L144"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In unused_workspace_dependencies and unused_workspace_package_fields, when the document/contents are present but get_key_value_span returns None, the primary snippet is emitted with NO annotation (a full bare source snippet) and the help patch is a no-op, producing a degenerate diagnostic. The no-document path correctly falls back to Origin::path; the span-missing path should too.","fix":"On span lookup failure, fall back to Origin::path for the primary group and skip the unhelpful patch help group.","locations":[{"ref":"src/cargo/diagnostics/rules/unused_workspace_dependencies.rs:136-167","code":"  136 |         if let Some(document) = document\n  137 |             && let Some(contents) = contents\n  138 |         {\n  139 |             let mut snippet = Snippet::source(contents).path(&manifest_path);\n  140 |             if let Some(span) =\n  141 |                 get_key_value_span(document, &[\"workspace\", \"dependencies\", unused.as_str()])\n  142 |             {\n  143 |                 snippet = snippet.annotation(AnnotationKind::Primary.span(span.key));\n  144 |             }\n  145 |             primary = primary.element(snippet);\n  146 |         } else {\n  147 |             primary = primary.element(Origin::path(&manifest_path));\n  148 |         }\n  149 |         if i == 0 {\n  150 |             primary = primary.element(Level::NOTE.message(emitted_source));\n  151 |         }\n  152 |         let mut report = vec![primary];\n  153 |         if let Some(document) = document\n  154 |             && let Some(contents) = contents\n  155 |         {\n  156 |             let mut help = Group::with_title(\n  157 |                 Level::HELP.secondary_title(\"consider removing the unused dependency\"),\n  158 |             );\n  159 |             let mut snippet = Snippet::source(contents).path(&manifest_path);\n  160 |             if let Some(span) =\n  161 |                 get_key_value_span(document, &[\"workspace\", \"dependencies\", unused.as_str()])\n  162 |             {\n  163 |                 snippet = snippet.patch(Patch::new(span.key.start..span.value.end, \"\"));\n  164 |             }\n  165 |             help = help.element(snippet);\n  166 |             report.push(help);\n  167 |         }","lines":32,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unused_workspace_dependencies.rs#L136-L167"},{"ref":"src/cargo/diagnostics/rules/unused_workspace_package_fields.rs:105-136","code":"  105 |         if let Some(document) = document\n  106 |             && let Some(contents) = contents\n  107 |         {\n  108 |             let mut snippet = Snippet::source(contents).path(&manifest_path);\n  109 |             if let Some(span) =\n  110 |                 get_key_value_span(document, &[\"workspace\", \"package\", unused.as_ref()])\n  111 |             {\n  112 |                 snippet = snippet.annotation(AnnotationKind::Primary.span(span.key));\n  113 |             }\n  114 |             primary = primary.element(snippet);\n  115 |         } else {\n  116 |             primary = primary.element(Origin::path(&manifest_path));\n  117 |         }\n  118 |         if i == 0 {\n  119 |             primary = primary.element(Level::NOTE.message(emitted_source));\n  120 |         }\n  121 |         let mut report = vec![primary];\n  122 |         if let Some(document) = document\n  123 |             && let Some(contents) = contents\n  124 |         {\n  125 |             let mut help = Group::with_title(\n  126 |                 Level::HELP.secondary_title(\"consider removing the unused field\"),\n  127 |             );\n  128 |             let mut snippet = Snippet::source(contents).path(&manifest_path);\n  129 |             if let Some(span) =\n  130 |                 get_key_value_span(document, &[\"workspace\", \"package\", unused.as_ref()])\n  131 |             {\n  132 |                 snippet = snippet.patch(Patch::new(span.key.start..span.value.end, \"\"));\n  133 |             }\n  134 |             help = help.element(snippet);\n  135 |             report.push(help);\n  136 |         }","lines":32,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/unused_workspace_package_fields.rs#L105-L136"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`crate_spec::resolve` calls `CrateSpec::resolve(&suggested_pkg_id.as_str())` recursively to test whether inserting an `@` makes the spec parse. `suggested_pkg_id.as_str()` already yields `&str`, so `&...as_str()` produces `&&str` which is then auto-deref'd; harmless but sloppy. More importantly, the recursive `resolve` is invoked purely to check parseability and its `Ok` result is discarded, doing a full `VersionReq::parse` and `PackageName::new` again - acceptable since it's only on the error path, but the recursion could be surprising for very long names with many non-ident chars (it retries per offending char index).","fix":"Drop the extraneous `&...as_str()` (pass `&suggested_pkg_id`). Optionally break out of the loop after the first successful suggestion (it already returns, so this is fine), but the per-char retry is bounded by the suggestion-returning early `return`.","locations":[{"ref":"src/cargo/ops/cargo_add/crate_spec.rs:32-45","code":"   32 |         if !pkg_id.contains(\"@\") && package_name.is_err() {\n   33 |             for (idx, ch) in pkg_id.char_indices() {\n   34 |                 if !(unicode_ident::is_xid_continue(ch) || ch == '-') {\n   35 |                     let mut suggested_pkg_id = pkg_id.to_string();\n   36 |                     suggested_pkg_id.insert_str(idx, \"@\");\n   37 |                     if let Ok(_) = CrateSpec::resolve(&suggested_pkg_id.as_str()) {\n   38 |                         let err = package_name.unwrap_err();\n   39 |                         return Err(\n   40 |                             anyhow::format_err!(\"{err}\\n\\n\\\n   41 |                                 help: if this is meant to be a package name followed by a version, insert an `@` like `{suggested_pkg_id}`\").into());\n   42 |                     }\n   43 |                 }\n   44 |             }\n   45 |         }","lines":14,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_add/crate_spec.rs#L32-L45"}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `install` (single-or-zero krate path), `installed_anything` is initialized to `true` and only set to the real result inside `if let Some(installable_pkg)`. When `InstallablePackage::new` returns `Ok(None)` (package already installed / nothing to do), `installed_anything` stays `true`, causing the post-install PATH warning logic to run as if something was installed. For the already-installed case this prints the \"be sure to add ... to your PATH\" warning even though nothing new was installed.","fix":"Initialize `installed_anything` to `false` and set it to `true` only after a successful install, or set it from `install_one`'s return for the Some branch and leave it false for the None branch.","locations":[{"ref":"src/cargo/ops/cargo_install.rs:743-767","code":"  743 |     let (installed_anything, scheduled_error) = if krates.len() <= 1 {\n  744 |         let (krate, vers) = krates\n  745 |             .iter()\n  746 |             .next()\n  747 |             .map(|(k, v)| (Some(k.as_str()), v.as_ref()))\n  748 |             .unwrap_or((None, None));\n  749 |         let installable_pkg = InstallablePackage::new(\n  750 |             gctx,\n  751 |             root,\n  752 |             map,\n  753 |             krate,\n  754 |             source_id,\n  755 |             from_cwd,\n  756 |             vers,\n  757 |             opts,\n  758 |             force,\n  759 |             no_track,\n  760 |             true,\n  761 |             current_rust_version.as_ref(),\n  762 |         )?;\n  763 |         let mut installed_anything = true;\n  764 |         if let Some(installable_pkg) = installable_pkg {\n  765 |             installed_anything = installable_pkg.install_one(dry_run)?;\n  766 |         }\n  767 |         (installed_anything, false)","lines":25,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_install.rs#L743-L767"}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`cargo init` prints the wrong project kind in its status line. `init` computes the auto-detected project kind into `kind` (line 512) and returns it / uses it for `has_bin` (line 524), but the \"Creating ... package\" status message uses `opts.kind` (line 514), which for auto-detection always defaults to `Bin`. So when `cargo init` auto-detects a library (e.g. an existing `src/lib.rs`), it prints `Creating binary (application) package` while actually creating a library.","fix":"Use the resolved `kind` in the status message: `format!(\"{} package\", kind)` instead of `opts.kind`.","locations":[{"ref":"src/cargo/ops/cargo_new.rs:512-514","code":"  512 |     let kind = calculate_new_project_kind(opts.kind, opts.auto_detect_kind, &src_paths_types);\n  513 |     gctx.shell()\n  514 |         .status(\"Creating\", format!(\"{} package\", opts.kind))?;","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_new.rs#L512-L514"}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`update_manifest_with_new_member` decides whether to re-sort the members array based on `members.iter().map(Value::as_str).is_sorted()` (line 1030). `Value::as_str` returns `Option<&str>`, so a members array containing any non-string entry yields `None` elements; `Option` ordering makes the sortedness check and the subsequent `sort_by(|lhs, rhs| lhs.as_str().cmp(&rhs.as_str()))` behave on `None`s, which can reorder/!preserve non-string members unexpectedly. Non-string members are otherwise rejected earlier only inside the matched-pattern loop, not before the push/sort.","fix":"Either bail on non-string members before deciding to sort, or guard the sort to only run when all members are strings.","locations":[{"ref":"src/cargo/ops/cargo_new.rs:1030-1034","code":" 1030 |         let was_sorted = members.iter().map(Value::as_str).is_sorted();\n 1031 |         members.push(display_path);\n 1032 |         if was_sorted {\n 1033 |             members.sort_by(|lhs, rhs| lhs.as_str().cmp(&rhs.as_str()));\n 1034 |         }","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_new.rs#L1030-L1034"}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `do_package`, when `opts.list` is true, the per-package `local_reg` is created if `verify_registry_allow_list` (i.e. a registry was passed on the CLI) is true, but the list output path never adds packages to `local_reg` and never verifies. More subtly, `needs_local_reg` requires `opts.include_lockfile || opts.verify`, but for `--list` neither lockfile generation nor verification produces side effects that need the overlay; still a `TmpRegistry` (which creates directories and acquires a lock) is constructed merely to validate the publish allow-list. This does filesystem work (creating tmp-registry dir, locking) during a pure `--list`.","fix":"For `opts.list`, validate the registry allow-list via `get_registry` without constructing a full `TmpRegistry` (which creates/locks directories), since no overlay is needed for listing.","locations":[{"ref":"src/cargo/ops/cargo_package/mod.rs:281-291","code":"  281 |     let needs_local_reg = deps.has_dependencies() && (opts.include_lockfile || opts.verify);\n  282 |     let verify_registry_allow_list = opts.reg_or_index.is_some();\n  283 |     let mut local_reg = if !opts.list && (needs_local_reg || verify_registry_allow_list) {\n  284 |         let sid = get_registry(ws.gctx(), &just_pkgs, opts.reg_or_index.clone())?;\n  285 |         debug!(\"packaging for registry {}\", sid);\n  286 |         let reg_dir = ws.build_dir().join(\"package\").join(\"tmp-registry\");\n  287 |         let local_reg = TmpRegistry::new(ws.gctx(), reg_dir, sid)?;\n  288 |         Some(local_reg)\n  289 |     } else {\n  290 |         None\n  291 |     };","lines":11,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_package/mod.rs#L281-L291"}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `report_timings::prepare_context`, units that are reported with `FingerprintStatus::New` are counted into `ctx.total_dirty` together with `Dirty` (lines 236-240), while the rebuilds report (`rebuilds.rs`) keeps `New` as a separate `total_new` category. The timings summary therefore conflates newly-built units with rebuilt (dirty) units, which can misrepresent the fresh/dirty breakdown shown to the user for a clean first build (everything new is shown as dirty).","fix":"Decide whether `New` should be reported distinctly (as rebuilds.rs does) and, if so, add a separate counter; otherwise add a comment documenting why New is intentionally folded into dirty.","locations":[{"ref":"src/cargo/ops/cargo_report/timings.rs:236-240","code":"  236 |             LogMessage::UnitFingerprint { status, .. } => match status {\n  237 |                 FingerprintStatus::New => ctx.total_dirty += 1,\n  238 |                 FingerprintStatus::Dirty => ctx.total_dirty += 1,\n  239 |                 FingerprintStatus::Fresh => ctx.total_fresh += 1,\n  240 |             },","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_report/timings.rs#L236-L240"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `upgrade_dependency`, after a successful upgrade, the matched spec is removed from `remaining_specs` using only a name + is-registry check, ignoring the spec's url/version qualifiers that were used to select it (lines 331-341). If a user passes two specs for the same crate name that differ only by url or version (e.g. `foo@1` and a url-qualified `foo`), upgrading one will silently drop both from `remaining_specs`, so a genuinely unmatched spec would not be reported in the `did not match any direct dependencies` error.","fix":"Match the same predicate used for selection (name + registry + url + version) when retaining specs, or remove the exact `PackageIdSpec` that was matched rather than retaining by name.","locations":[{"ref":"src/cargo/ops/cargo_update.rs:416-419","code":"  416 |     // Remove this spec from remaining_specs since we successfully upgraded it\n  417 |     remaining_specs\n  418 |         .retain(|spec| !(spec.name() == name.as_str() && dependency.source_id().is_registry()));\n  419 | ","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_update.rs#L416-L419"}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `fix::migrate_manifests`, the per-package branch reloads `ws_original_toml` from `ws.root_maybe()` for every package and passes it to `remove_ignored_default_features_2024`. But `remove_ignored_default_features_2024` only inspects `ws_original_toml.workspace.dependencies` to decide whether a member's `default-features=false` is redundant. For a package that is itself the workspace root package (non-virtual), `ws.root_maybe()` returns that same package, which is fine, but for the workspace `[workspace.dependencies]` migration in the virtual branch and the per-package branch both call `rename_dep_fields_2024(workspace, \"dependencies\")` on the package's own `[workspace]` table - meaning if a package is BOTH a member and declares `[workspace]`, the workspace dependencies could be migrated twice across the two code paths. The HACK comment acknowledges duplicate logic; this is a latent double-fix risk.","fix":"Ensure the `[workspace.dependencies]` migration happens exactly once (only in the workspace-root code path), and avoid re-running it in the per-package loop for the root package.","locations":[{"ref":"src/cargo/ops/fix/mod.rs:324-356","code":"  324 |     // HACK: Duplicate workspace migration logic between virtual manifests and real manifests to\n  325 |     // reduce multiple Migrating messages being reported for the same file to the user\n  326 |     if matches!(ws.root_maybe(), MaybePackage::Virtual(_)) {\n  327 |         // Warning: workspaces do not have an edition so this should only include changes needed by\n  328 |         // packages that preserve the behavior of the workspace on all editions\n  329 |         let highest_edition = pkgs\n  330 |             .iter()\n  331 |             .map(|p| p.manifest().edition())\n  332 |             .max()\n  333 |             .unwrap_or_default();\n  334 |         let prepare_for_edition = edition_mode.next_edition(highest_edition);\n  335 |         if highest_edition == prepare_for_edition\n  336 |             || (!prepare_for_edition.is_st
