      target,\n  446 |                     \"dev-dependencies\",\n  447 |                     ws_original_toml,\n  448 |                 );\n  449 |                 fixes += rename_table(target, \"build_dependencies\", \"build-dependencies\");\n  450 |                 fixes += rename_dep_fields_2024(target, \"build-dependencies\");\n  451 |                 fixes += remove_ignored_default_features_2024(\n  452 |                     target,\n  453 |                     \"build-dependencies\",\n  454 |                     ws_original_toml,\n  455 |                 );\n  456 |             }","lines":55,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/fix/mod.rs#L402-L456"}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `tree::build_and_print`, `root_indexes.len() == 0` is checked with `== 0` instead of `.is_empty()` (clippy::len_zero), a minor style/idiom issue. More relevant: when `opts.duplicates` is set, `graph = graph.from_reachable(...)` then `find_duplicates()`; `from_reachable` asserts `self.dep_name_map.is_empty()` and `find_duplicates` also asserts it. Combined with `opts.graph_features` (which populates dep_name_map), passing both `--duplicates` and `--edges features`/feature graph would hit an assert panic rather than a user-facing error.","fix":"Convert `root_indexes.len() == 0` to `root_indexes.is_empty()`, and validate at CLI/option level that `--duplicates` is incompatible with feature-graph mode, returning a clear error instead of relying on the internal `assert!`.","locations":[{"ref":"src/cargo/ops/tree/mod.rs:236-244","code":"  236 |         if root_indexes.len() == 0 {\n  237 |             ws.gctx().shell().warn(\n  238 |                 \"nothing to print.\\n\\n\\\n  239 |             To find dependencies that require specific target platforms, \\\n  240 |             try to use option `--target all` first, and then narrow your search scope accordingly.\",\n  241 |             )?;\n  242 |         } else {\n  243 |             print(ws, opts, root_indexes, &pkgs_to_prune, &graph)?;\n  244 |         }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/tree/mod.rs#L236-L244"},{"ref":"src/cargo/ops/tree/graph.rs:251-253","code":"  251 |     pub fn from_reachable(&self, roots: &[NodeId]) -> Graph<'a> {\n  252 |         // Graph built with features does not (yet) support --duplicates.\n  253 |         assert!(self.dep_name_map.is_empty());","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/tree/graph.rs#L251-L253"},{"ref":"src/cargo/ops/tree/graph.rs:310-312","code":"  310 |     pub fn find_duplicates(&self) -> Vec<NodeId> {\n  311 |         // Graph built with features does not (yet) support --duplicates.\n  312 |         assert!(self.dep_name_map.is_empty());","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/tree/graph.rs#L310-L312"}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`prepare_toml_for_vendor` has a typo in an `expect` message: \"venedored manifests must have packages\". More importantly, it `expect`s that a vendored manifest always has a `[package]` table. Vendoring is driven from resolved dependency packages so this should hold, but using `expect` (panic) for a manifest-shape assumption is fragile; a virtual-manifest path crate slipping through would panic rather than error cleanly.","fix":"Fix the typo (\"vendored\") and, if feasible, convert the `expect` into a proper `bail!`/error to avoid a panic on unexpected manifests.","locations":[{"ref":"src/cargo/ops/vendor.rs:538-541","code":"  538 |     let package = me\n  539 |         .package\n  540 |         .as_mut()\n  541 |         .expect(\"venedored manifests must have packages\");","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/vendor.rs#L538-L541"}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In `maybe_gc_repo`, the test override for the packfile limit is passed as a\nsingle argv element: `cmd.arg(format!(\"-c gc.autoPackLimit={}\", limit))`. Git's\n`-c name=value` syntax requires `-c` and `name=value` to be two separate\narguments (or be joined with no space as `-cname=value`); passing the literal\nstring `\"-c gc.autoPackLimit=5\"` as one argument makes git treat it as an\nunknown option and fail/ignore it. This only affects the `__CARGO_PACKFILE_LIMIT`\ntest path, but it means the override silently does not work.","fix":"Use two args: `cmd.arg(\"-c\").arg(format!(\"gc.autoPackLimit={}\", limit));`.","locations":[{"ref":"src/cargo/sources/git/utils.rs:1385-1387","code":" 1385 |     if let Ok(limit) = gctx.get_env(\"__CARGO_PACKFILE_LIMIT\") {\n 1386 |         cmd.arg(format!(\"-c gc.autoPackLimit={}\", limit));\n 1387 |     }","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/git/utils.rs#L1385-L1387"}]},{"id":"LOGIC_62","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_short_hash_of` uses `long_hash.get(..rev.len())` to compare a candidate\nrevision against an oid's full hex string. If `rev.len()` exceeds the oid hex\nlength (e.g. a 64-char SHA-256-style rev compared against a 40-char SHA-1 oid),\n`get(..rev.len())` returns `None` and the function returns `false`, which is\ncorrect, but the comparison silently treats an over-length rev as 'not a short\nhash' rather than as malformed. Combined with `looks_like_commit_hash` only\nchecking `>= 7` and all-hex, a rev longer than the repo's hash size flows into\nthe github fast path as a non-match and then through `rev_to_oid` (which requires\nexact length). Behavior is safe but the length relationship between `rev` and the\nhash family is never validated up front, making the control flow fragile.","fix":"Document the length assumptions, or validate that `rev.len()` does not exceed the oid hex length explicitly rather than relying on `get` returning `None`.","locations":[{"ref":"src/cargo/sources/git/utils.rs:1652-1663","code":" 1652 | fn looks_like_commit_hash(rev: &str) -> bool {\n 1653 |     rev.len() >= 7 && rev.chars().all(|ch| ch.is_ascii_hexdigit())\n 1654 | }\n 1655 | \n 1656 | /// Whether `rev` is a shorter hash of `oid`.\n 1657 | fn is_short_hash_of(rev: &str, oid: Oid) -> bool {\n 1658 |     let long_hash = oid.to_string();\n 1659 |     match long_hash.get(..rev.len()) {\n 1660 |         Some(truncated_long_hash) => truncated_long_hash.eq_ignore_ascii_case(rev),\n 1661 |         None => false,\n 1662 |     }\n 1663 | }","lines":12,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/git/utils.rs#L1652-L1663"}]},{"id":"LOGIC_63","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`HttpRegistry::config_opt_inner` writes the freshly fetched config.json to the\non-disk cache only inside `if paths::create_dir_all(...).is_ok()`. If creating\nthe parent dir fails (read-only cache, permissions), the config is silently not\ncached and no warning is emitted, so every subsequent invocation re-fetches\nconfig.json over the network. Unlike the index cache manager\n(`CacheManager::put`), which warns once on write failure, this path is entirely\nsilent beyond a `tracing::debug`.","fix":"Surface a one-time warning (as `CacheManager` does) when the config cache cannot be written, to aid diagnosing repeated network fetches.","locations":[{"ref":"src/cargo/sources/registry/http_remote.rs:164-170","code":"  164 |                 let config = Some(serde_json::from_slice(&raw_data)?);\n  165 |                 if paths::create_dir_all(&config_json_path.parent().unwrap()).is_ok() {\n  166 |                     if let Err(e) = fs::write(&config_json_path, &raw_data) {\n  167 |                         tracing::debug!(\"failed to write config.json cache: {}\", e);\n  168 |                     }\n  169 |                 }\n  170 |                 Ok(config)","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/registry/http_remote.rs#L164-L170"}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`unpack` accumulates `bytes_written += entry.size()` (the size declared in the\ntar header) *before* calling `entry.unpack_in(parent)`, and skipped entries\n(`PACKAGE_SOURCE_LOCK`) are correctly excluded, but entries filtered out by the\n`include` closure are also already `continue`d earlier so they don't count.\nHowever, the returned `bytes_written` is the sum of header-declared sizes, not\nthe actual bytes written to disk, and it is reported to the global cache tracker\nas the on-disk size (`size: Some(bytes_written)`). For directory entries\n`entry.size()` is 0 and for regular files it is the logical size, so this is an\napproximation; the variable name and the cache-tracker field both imply real\non-disk bytes. Minor, but the size accounting can diverge from reality.","fix":"Either rename to reflect it is the declared/uncompressed size, or accumulate the actual written byte counts.","locations":[{"ref":"src/cargo/sources/registry/mod.rs:1009-1011","code":" 1009 |         // Unpacking failed\n 1010 |         bytes_written += entry.size();\n 1011 |         let mut result = entry.unpack_in(parent).map_err(anyhow::Error::from);","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/registry/mod.rs#L1009-L1011"},{"ref":"src/cargo/sources/registry/mod.rs:604-610","code":"  604 |         self.gctx\n  605 |             .deferred_global_last_use()?\n  606 |             .mark_registry_src_used(global_cache_tracker::RegistrySrc {\n  607 |                 encoded_registry_name: self.name,\n  608 |                 package_dir: package_dir.into(),\n  609 |                 size: Some(bytes_written),\n  610 |             });","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/registry/mod.rs#L604-L610"}]},{"id":"LOGIC_65","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Greedy regex `\\{(.*)\\}` used to report an unexpected template variable in build-dir paths. For a template containing more than one `{...}` group (e.g. `{foo}-{bar}`), the capture matches `foo}-{bar`, so `UnexpectedVariable.variable` becomes the entire span rather than the first offending variable, and the downstream `closest_msg` suggestion in `custom_build_dir` is computed against nonsense. The error still fires (good) but the message/suggestion is wrong.","fix":"Use a non-greedy, balanced capture such as `\\{([^{}]*)\\}` so only the first `{...}` content is captured.","locations":[{"ref":"src/cargo/util/context/path.rs:53-59","code":"   53 |         let re = Regex::new(r\"\\{(.*)\\}\").unwrap();\n   54 |         if let Some(caps) = re.captures(&value) {\n   55 |             return Err(ResolveTemplateError::UnexpectedVariable {\n   56 |                 variable: caps[1].to_string(),\n   57 |                 raw_template: self.0.val.clone(),\n   58 |             });\n   59 |         };","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/context/path.rs#L53-L59"}]},{"id":"LOGIC_66","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Collector::progress` early-returns when libcurl reports `dlnow > dltotal` (common with unknown/compressed content length) without updating `dl_remaining_delta` or subtracting its prior contribution from the global counter. The transfer's stale (often large positive) remaining estimate stays in the aggregate until Drop, so `bytes_pending` over-reports remaining bytes for the lifetime of such transfers.","fix":"In the early-return branch, subtract the existing `dl_remaining_delta` from the global counter and reset `self.dl_remaining_delta = 0` before returning.","locations":[{"ref":"src/cargo/util/network/http_async.rs:473-487","code":"  473 |     fn progress(&mut self, dltotal: f64, dlnow: f64, _ultotal: f64, _ulnow: f64) -> bool {\n  474 |         if dlnow > dltotal {\n  475 |             return true;\n  476 |         }\n  477 |         let dl_total = dltotal as i64;\n  478 |         let dl_current = dlnow as i64;\n  479 | \n  480 |         let remaining = dl_total - dl_current;\n  481 | \n  482 |         self.global_stats\n  483 |             .dl_remaining\n  484 |             .fetch_add(remaining - self.dl_remaining_delta, Ordering::Release);\n  485 |         self.dl_remaining_delta = remaining;\n  486 |         true\n  487 |     }","lines":15,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/network/http_async.rs#L473-L487"}]},{"id":"LOGIC_67","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Format::progress` begins with `assert!(cur <= max)`. Progress reporting is purely cosmetic, but a caller miscount (off-by-one in download/build accounting) aborts cargo with a panic instead of rendering a slightly wrong bar. The rest of the function already tolerates degenerate inputs (pct is guarded for non-finite / max==0).","fix":"Clamp `cur` to `max` or downgrade to `debug_assert!` so a miscount never crashes a real build.","locations":[{"ref":"src/cargo/util/progress.rs:341-341","code":"  341 |         assert!(cur <= max);","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/progress.rs#L341"}]},{"id":"LOGIC_68","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`missing_dep_diagnostic` searches `orig_toml.dependencies`, `orig_toml.build_dependencies`, and per-target normal/build dependency tables for the unused optional dependency, but never includes `dev_dependencies` or `target.<name>.dev_dependencies`. A weak-optional dependency declared as a dev-dependency that is referenced by a feature will fall into the `else` branch (line 1963-1964) producing a less helpful diagnostic (no context annotation / help) than intended. Note dev-deps cannot normally be optional in published crates, but this branch runs for arbitrary local manifests.","fix":"Add `orig_toml.dev_dependencies` and the per-target dev-dependencies tables (with `DepKind::Development.kind_table()`) to the `orig_deps` search list.","locations":[{"ref":"src/cargo/util/toml/mod.rs:1923-1942","code":" 1923 |                 let mut orig_deps = vec![\n 1924 |                     (\n 1925 |                         orig_toml.dependencies.as_ref(),\n 1926 |                         vec![DepKind::Normal.kind_table()],\n 1927 |                     ),\n 1928 |                     (\n 1929 |                         orig_toml.build_dependencies.as_ref(),\n 1930 |                         vec![DepKind::Build.kind_table()],\n 1931 |                     ),\n 1932 |                 ];\n 1933 |                 for (name, platform) in orig_toml.target.iter().flatten() {\n 1934 |                     orig_deps.push((\n 1935 |                         platform.dependencies.as_ref(),\n 1936 |                         vec![\"target\", name, DepKind::Normal.kind_table()],\n 1937 |                     ));\n 1938 |                     orig_deps.push((\n 1939 |                         platform.build_dependencies.as_ref(),\n 1940 |                         vec![\"target\", name, DepKind::Normal.kind_table()],\n 1941 |                     ));\n 1942 |                 }","lines":20,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml/mod.rs#L1923-L1942"}]},{"id":"LOGIC_69","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Typo in error message: `Unrecognized\\` dependency entry format for \\`{key}` has a stray backtick after `Unrecognized` and a missing closing backtick after `{key}`. The backticks are unbalanced, producing a malformed user-facing message.","fix":"Fix to `anyhow::bail!(\"Unrecognized dependency entry format for `{key}`\")`.","locations":[{"ref":"src/cargo/util/toml_mut/dependency.rs:380","code":"  380 |             anyhow::bail!(\"Unrecognized` dependency entry format for `{key}\");","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml_mut/dependency.rs#L380"}]},{"id":"LOGIC_70","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Dependency::to_toml` for a workspace source plus extra flags falls into the catch-all inline-table branch and emits `workspace = true` alongside keys like `default-features`, `features`, `optional`, `public`. Unlike `update_toml` (which for `Source::Workspace` removes `default-features` and `package` and only keeps inherited keys), `to_toml` will happily write `default-features` next to `workspace = true`, which Cargo rejects when re-parsed (`default-features` cannot be combined with an inherited workspace dependency in newer editions). The two code paths for the same source are inconsistent.","fix":"Make the workspace-source case in `to_toml` mirror `update_toml`: only emit `workspace = true` plus the inheritance-compatible keys (features, optional, public) and never `default-features`/`package`/`version`/`registry`.","locations":[{"ref":"src/cargo/util/toml_mut/dependency.rs:438-501","code":"  438 |             // Other cases are represented as an inline table\n  439 |             (_, _, _, _, _, _, _) => {\n  440 |                 let mut table = toml_edit::InlineTable::default();\n  441 | \n  442 |                 match &self.source {\n  443 |                     Some(Source::Registry(src)) => {\n  444 |                         table.insert(\"version\", src.version.as_str().into());\n  445 |                     }\n  446 |                     Some(Source::Path(src)) => {\n  447 |                         let relpath =\n  448 |                             path_field(&src, gctx, workspace_root, crate_root, unstable_features)?;\n  449 |                         if let Some(r) = src.version.as_deref() {\n  450 |                             table.insert(\"version\", r.into());\n  451 |                         }\n  452 |                         if let Some(base) = &src.base {\n  453 |                             table.insert(\"base\", base.into());\n  454 |                         }\n  455 |                         table.insert(\"path\", relpath.into());\n  456 |                     }\n  457 |                     Some(Source::Git(src)) => {\n  458 |                         table.insert(\"git\", src.git.as_str().into());\n  459 |                         if let Some(branch) = src.branch.as_deref() {\n  460 |                             table.insert(\"branch\", branch.into());\n  461 |                         }\n  462 |                         if let Some(tag) = src.tag.as_deref() {\n  463 |                             table.insert(\"tag\", tag.into());\n  464 |                         }\n  465 |                         if let Some(rev) = src.rev.as_deref() {\n  466 |                             table.insert(\"rev\", rev.into());\n  467 |                         }\n  468 |                         if let Some(r) = src.version.as_deref() {\n  469 |                             table.insert(\"version\", r.into());\n  470 |                         }\n  471 |                     }\n  472 |                     Some(Source::Workspace(_)) => {\n  473 |                         table.insert(\"workspace\", true.into());\n  474 |                     }\n  475 |                     None => {}\n  476 |                 }\n  477 |                 if table.contains_key(\"version\") {\n  478 |                     if let Some(r) = self.registry.as_deref() {\n  479 |                         table.insert(\"registry\", r.into());\n  480 |                     }\n  481 |                 }\n  482 | \n  483 |                 if self.rename.is_some() {\n  484 |                     table.insert(\"package\", self.name.as_str().into());\n  485 |                 }\n  486 |                 if let Some(v) = self.default_features {\n  487 |                     table.insert(\"default-features\", v.into());\n  488 |                 }\n  489 |                 if let Some(features) = self.features.as_ref() {\n  490 |                     let features: toml_edit::Value = features.iter().cloned().collect();\n  491 |                     table.insert(\"features\", features);\n  492 |                 }\n  493 |                 if let Some(v) = self.optional {\n  494 |                     table.insert(\"optional\", v.into());\n  495 |                 }\n  496 |                 if let Some(v) = self.public {\n  497 |                     table.insert(\"public\", v.into());\n  498 |                 }\n  499 | \n  500 |                 toml_edit::value(toml_edit::Value::InlineTable(table))\n  501 |             }","lines":64,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml_mut/dependency.rs#L438-L501"}]},{"id":"LOGIC_71","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`split_index_features` takes `mut features` by value but then calls `split_index_features(features.clone())` is not the issue -- rather, `create_index_line` clones `features` before passing it (`split_index_features(features.clone())`) even though `split_index_features` already takes ownership and `features` "severity":"negligible","easy":true,"description":"`Edition::from_str` only emits the friendly 'this version of Cargo is older than the {y} edition' diagnostic for `2024 < y < 2050`. A plausible future numeric edition like '2050'/'2099' falls through to the generic '... is unknown' message instead, so the helpful diagnostic stops working for the very years it was meant to cover. The 2050 cap is arbitrary.","fix":"Drop the `y < 2050` upper bound (just check `y > 2024`).","locations":[{"ref":"src/cargo/core/features.rs:351-355","code":"  351 |             s if s.parse().map_or(false, |y: u16| y > 2024 && y < 2050) => bail!(\n  352 |                 \"this version of Cargo is older than the `{}` edition, \\\n  353 |                  and only supports `2015`, `2018`, `2021`, and `2024` editions.\",\n  354 |                 s\n  355 |             ),","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/features.rs#L351-L355"}]},{"id":"LOGIC_74","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"`parse_human_size` regex `^([0-9]+(\\.[0-9])?) ?(...)$` only allows a single fractional digit, but the error message and the f64 parse path advertise float sizes. `parse_human_size(\"1.55kb\")` is rejected even though the value is a perfectly reasonable float, and the surrounding code/error text (\"expected an integer or float\") implies arbitrary floats are accepted.","fix":"Change the fractional group to `(\\.[0-9]+)?` to accept multiple decimal digits, matching the documented float behavior.","locations":[{"ref":"src/cargo/core/gc.rs:377-405","code":"  377 | pub fn parse_human_size(input: &str) -> CargoResult<u64> {\n  378 |     let re = regex::Regex::new(r\"(?i)^([0-9]+(\\.[0-9])?) ?(b|kb|mb|gb|kib|mib|gib)?$\").unwrap();\n  379 |     let cap = re.captures(input).ok_or_else(|| {\n  380 |         format_err!(\n  381 |             \"invalid size `{input}`, \\\n  382 |              expected a number with an optional B, kB, MB, GB, kiB, MiB, or GiB suffix\"\n  383 |         )\n  384 |     })?;\n  385 |     let factor = match cap.get(3) {\n  386 |         Some(suffix) => match suffix.as_str().to_lowercase().as_str() {\n  387 |             \"b\" => 1.0,\n  388 |             \"kb\" => 1_000.0,\n  389 |             \"mb\" => 1_000_000.0,\n  390 |             \"gb\" => 1_000_000_000.0,\n  391 |             \"kib\" => 1024.0,\n  392 |             \"mib\" => 1024.0 * 1024.0,\n  393 |             \"gib\" => 1024.0 * 1024.0 * 1024.0,\n  394 |             s => unreachable!(\"suffix `{s}` out of sync with regex\"),\n  395 |         },\n  396 |         None => {\n  397 |             return cap[1]\n  398 |                 .parse()\n  399 |                 .with_context(|| format!(\"expected an integer size, got `{}`\", &cap[1]));\n  400 |         }\n  401 |     };\n  402 |     let num = cap[1]\n  403 |         .parse::<f64>()\n  404 |         .with_context(|| format!(\"expected an integer or float, found `{}`\", &cap[1]))?;\n  405 |     Ok((num * factor) as u64)","lines":29,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/gc.rs#L377-L405"}]},{"id":"LOGIC_75","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`emit_package` always emits a trailing blank line after the `dependencies` key block even when the dependency array is empty: the `out.push('\\n')` at line 250 is inside the `if let Some(dependencies)` arm but outside the `if !slice.is_empty()` guard. A package entry that has an empty (but present) `dependencies` array thus gets an extra blank line that a package without the key would not. For V2+ resolves the trailing-newline trimming at the end masks this only at end-of-file.","fix":"Move the `out.push('\\n')` inside the `if !slice.is_empty()` block, or only emit the separator when something was written.","locations":[{"ref":"src/cargo/ops/lockfile.rs:238-250","code":"  238 |     if let Some(s) = dep.get(\"dependencies\") {\n  239 |         let slice = s.as_array().unwrap();\n  240 | \n  241 |         if !slice.is_empty() {\n  242 |             out.push_str(\"dependencies = [\\n\");\n  243 | \n  244 |             for child in slice.iter() {\n  245 |                 out.push_str(&format!(\" {},\\n\", child));\n  246 |             }\n  247 | \n  248 |             out.push_str(\"]\\n\");\n  249 |         }\n  250 |         out.push('\\n');","lines":13,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/lockfile.rs#L238-L250"}]},{"id":"LOGIC_76","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`search` truncates each description to `description_length = max(80, 128 - description_margin)` (line 41). When `description_margin` exceeds 128 (a very long `name = \"version\"` line), `128 - description_margin` underflows in unsigned arithmetic. `description_margin` is `usize`; `128 - description_margin` would panic in debug or wrap to a huge value in release, defeating the `cmp::max(80, ...)` intent (it would pick the huge wrapped value). Crate names plus versions long enough to exceed 124 chars are unusual but not impossible.","fix":"Use saturating arithmetic: `cmp::max(80, 128usize.saturating_sub(description_margin))`.","locations":[{"ref":"src/cargo/ops/registry/search.rs:39-41","code":"   39 |     let description_margin = names.iter().map(|s| s.len()).max().unwrap_or_default() + 4;\n   40 | \n   41 |     let description_length = cmp::max(80, 128 - description_margin);","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/registry/search.rs#L39-L41"}]},{"id":"LOGIC_77","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In `Queue::pop`, after popping it notifies `bounded_cv` only when `state.items.len() < self.bound`. A producer in `push_bounded` waits while `len >= bound`, so the wake condition is correct, but `push` (the unbounded variant) can grow the queue well past `bound`; after a single pop from a queue far over capacity, `len < bound` is false and no waiter is woken even though capacity may have freed for them relative to where they will land. In practice waiters are re-woken on subsequent pops, so this is only a minor wake-up efficiency note, not a hang.","fix":"Consider `notify_all` after a pop when over capacity, or document that mixing `push` and `push_bounded` weakens the bound guarantee.","locations":[{"ref":"src/cargo/util/queue.rs:57-73","code":"   57 |     /// Pops an item from the queue, blocking if the queue is empty.\n   58 |     pub fn pop(&self, timeout: Duration) -> Option<T> {\n   59 |         let (mut state, result) = self\n   60 |             .popper_cv\n   61 |             .wait_timeout_while(self.state.lock().unwrap(), timeout, |s| s.items.is_empty())\n   62 |             .unwrap();\n   63 |         if result.timed_out() {\n   64 |             None\n   65 |         } else {\n   66 |             let value = state.items.pop_front()?;\n   67 |             if state.items.len() < self.bound {\n   68 |                 // Assumes threads cannot be canceled.\n   69 |                 self.bounded_cv.notify_one();\n   70 |             }\n   71 |             Some(value)\n   72 |         }\n   73 |     }","lines":17,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/queue.rs#L57-L73"}]},{"id":"LOGIC_78","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`infer_subdirectory` only treats a sub-directory as a target if it contains `main.rs`, while the error-message helper `target_path_not_found_error_message` documents and suggests `<dir>/main.rs` for subdirectory targets, keeping them in sync. However `infer_file` accepts any `*.rs` file regardless of stem, so a directory whose name collides with a desired target but lacks `main.rs` is silently ignored with no hint. Minor UX gap, not a correctness bug, but worth noting since the modules explicitly claim to stay in sync (comment at targets.rs:976).","fix":"Consider emitting a hint when a same-named subdirectory exists without `main.rs`; otherwise update the 'need to sync' comment to clarify the asymmetry.","locations":[{"ref":"src/cargo/util/toml/targets.rs:764-777","code":"  764 | fn infer_subdirectory(package_root: &Path, entry: &DirEntry) -> Option<(String, PathBuf)> {\n  765 |     let path = entry.path();\n  766 |     let main = path.join(\"main.rs\");\n  767 |     let name = path.file_name()?.to_str()?.to_owned();\n  768 |     if main.exists() {\n  769 |         let main = main\n  770 |             .strip_prefix(package_root)\n  771 |             .map(|p| p.to_owned())\n  772 |             .unwrap_or(main);\n  773 |         Some((name, main))\n  774 |     } else {\n  775 |         None\n  776 |     }\n  777 | }","lines":14,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml/targets.rs#L764-L777"}]},{"id":"LOGIC_79","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`fix_feature_activations`, in the `DependencyStatus::Required` match (lines 653-659), the arm `(FeatureValue::Dep { dep_name }, _) => dep_name == dep_key` removes a `dep:foo` activation when the dependency became required. But for an explicit dep activation that is required, removing `dep:foo` could drop a needed explicit activation if any other (non-default) feature still relies on it being explicit. The interaction between `explicit_dep_activation` and per-feature removal is subtle; this is more of a maintainability/clarity concern than a confirmed bug, but the logic deserves a comment explaining why unconditional removal is safe here.","fix":"Add a clarifying comment on the invariant, or audit whether `dep:` removal should also be gated on `!explicit_dep_activation`.","locations":[{"ref":"src/cargo/util/toml_mut/manifest.rs:653-659","code":"  653 |                 DependencyStatus::Required => match (parsed_value, explicit_dep_activation) {\n  654 |                     (FeatureValue::Feature(dep_name), false)\n  655 |                     | (FeatureValue::Dep { dep_name }, _) => dep_name == dep_key,\n  656 |                     (FeatureValue::Feature(_), true) | (FeatureValue::DepFeature { .. }, _) => {\n  657 |                         false\n  658 |                     }\n  659 |                 },","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml_mut/manifest.rs#L653-L659"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"Doc example for the `non_snake_case_packages` lint is copy-pasted from non_kebab_case_packages and is backwards. The lint enforces snake-case names (desc 'packages should have a snake-case name', uses to_snake_case), but the example shows input `name = \"foo_bar\"` 'should be written as' `name = \"foo-bar\"` - that is the kebab transformation, the exact opposite. Worse, `foo_bar` is already snake_case so this lint can never fire on it; the example input would never trigger the lint.","fix":"Swap the example: bad input `name = \"foo-bar\"`, corrected `name = \"foo_bar\"`, mirroring non_snake_case_features.rs.","locations":[{"ref":"src/cargo/diagnostics/rules/non_snake_case_packages.rs:44-56","code":"   44 | ### Example\n   45 | \n   46 | ```toml\n   47 | [package]\n   48 | name = \"foo_bar\"\n   49 | ```\n   50 | \n   51 | Should be written as:\n   52 | \n   53 | ```toml\n   54 | [package]\n   55 | name = \"foo-bar\"\n   56 | ```","lines":13,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/non_snake_case_packages.rs#L44-L56"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In `missing_dep_diagnostic`, when building the list of dependency tables to search for the missing optional dependency in `target.<name>` sections, the build-dependencies entry is given the wrong TOML path. It uses `DepKind::Normal.kind_table()` (\"dependencies\") for `platform.build_dependencies`, when it should be `DepKind::Build.kind_table()` (\"build-dependencies\"). Because of this the subsequent `get_key_value_span` lookup will either look at the wrong table or fail to find the dependency span for a weak-optional build dependency declared under a `target.<cfg>.build-dependencies` table, degrading the diagnostic (and potentially producing a wrong source annotation). It mirrors the correct top-level entry on line 1930 which uses `DepKind::Build`.","fix":"Change the `vec![\"target\", name, DepKind::Normal.kind_table()]` on line 1940 to use `DepKind::Build.kind_table()`.","locations":[{"ref":"src/cargo/util/toml/mod.rs:1938-1941","code":" 1938 |                     orig_deps.push((\n 1939 |                         platform.build_dependencies.as_ref(),\n 1940 |                         vec![\"target\", name, DepKind::Normal.kind_table()],\n 1941 |                     ));","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml/mod.rs#L1938-L1941"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In the `--man` argument parser, when the section fails to parse as u8 the error message interpolates `parts.1` (the link/URL after `=`) instead of `key_parts.1` (the section string that actually failed to parse). This produces a confusing/incorrect error message pointing at the wrong value. `parts.1` is the link; `key_parts.1` is the section.","fix":"Change the `with_context` message to interpolate `key_parts.1` instead of `parts.1`: `format!(\"expected unsigned integer for section, got `{}`\", key_parts.1)`.","locations":[{"ref":"crates/mdman/src/main.rs:106-112","code":"  106 |                 let key_parts = parts.0.split_once(':').ok_or_else(|| {\n  107 |                     anyhow::format_err!(\"--man expected value with form name:1=link\")\n  108 |                 })?;\n  109 |                 let section: u8 = key_parts.1.parse().with_context(|| {\n  110 |                     format!(\"expected unsigned integer for section, got `{}`\", parts.1)\n  111 |                 })?;\n  112 |                 man_map.insert((key_parts.0.to_string(), section), parts.1.to_string());","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/main.rs#L106-L112"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"bench.rs collects BENCHNAME into the bench args but, unlike test.rs, does not narrow the compile filter to all-bench-targets when a name is given and the filter is not specific. test.rs resets filter to all_test_targets() in that case to avoid compiling unrelated targets; bench lacks the equivalent, so `cargo bench NAME` still builds examples/etc. Asymmetry between two otherwise-parallel commands; may be intentional but looks like an omission.","fix":"If desired, mirror the test.rs logic for bench: when BENCHNAME is given and `!compile_opts.filter.is_specific()`, set the filter to the all-bench-targets equivalent.","locations":[{"ref":"src/bin/cargo/commands/bench.rs:74-78","code":"   74 |     let bench_args = args.get_one::<String>(\"BENCHNAME\").into_iter();\n   75 |     let bench_args = bench_args.chain(args.get_many::<String>(\"args\").unwrap_or_default());\n   76 |     let bench_args = bench_args.map(String::as_str).collect::<Vec<_>>();\n   77 | \n   78 |     ops::run_benches(&ws, &ops, &bench_args)","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/bin/cargo/commands/bench.rs#L74-L78"},{"ref":"src/bin/cargo/commands/test.rs:99-105","code":"   99 |     } else if test_name.is_some() && !compile_opts.filter.is_specific() {\n  100 |         // If arg `TESTNAME` is provided, assumed that the user knows what\n  101 |         // exactly they wants to test, so we use `all_test_targets` to\n  102 |         // avoid compiling unnecessary targets such as examples, which are\n  103 |         // included by the logic of default target filter.\n  104 |         compile_opts.filter = ops::CompileFilter::all_test_targets();\n  105 |     }","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/bin/cargo/commands/test.rs#L99-L105"}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The `Drawbacks` text of non_snake_case_packages (\"Users have to mentally translate package names to namespaces in Rust.\") is copied from the kebab-case package lint. Rust crate/module paths use underscores, so a snake_case package name maps directly to the Rust namespace; this drawback is the rationale against kebab-case names and does not apply to the snake-case lint.","fix":"Replace with a drawback relevant to enforcing snake_case names, or remove.","locations":[{"ref":"src/cargo/diagnostics/rules/non_snake_case_packages.rs:40-42","code":"   40 | ### Drawbacks\n   41 | \n   42 | Users have to mentally translate package names to namespaces in Rust.","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/diagnostics/rules/non_snake_case_packages.rs#L40-L42"}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"`CrateListingV2::remove_bin` panics with the message \"v1 unexpected missing\" but this is the v2 listing (CrateListingV2), not v1. This is a copy-paste error from `CrateListingV1::remove_bin`. While `CrateListingV2::remove` (just above) correctly says \"v2 unexpected missing\". The misleading message would make debugging a corrupted-metadata panic harder.","fix":"Change the panic message in `CrateListingV2::remove_bin` from `\"v1 unexpected missing `{}`\"` to `\"v2 unexpected missing `{}`\"`.","locations":[{"ref":"src/cargo/ops/common_for_install_and_uninstall.rs:498-507","code":"  498 |     fn remove_bin(&mut self, pkg_id: PackageId, bin: &str) {\n  499 |         let mut info_entry = match self.installs.entry(pkg_id) {\n  500 |             btree_map::Entry::Occupied(e) => e,\n  501 |             btree_map::Entry::Vacant(..) => panic!(\"v1 unexpected missing `{}`\", pkg_id),\n  502 |         };\n  503 |         info_entry.get_mut().bins.remove(bin);\n  504 |         if info_entry.get().bins.is_empty() {\n  505 |             info_entry.remove();\n  506 |         }\n  507 |     }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/common_for_install_and_uninstall.rs#L498-L507"}]},{"id":"CPY_7","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"Wrong error label: in the readme path-relocation branch of `prepare_toml_for_publish`, the non-UTF8 error message reads `non-UTF8 \\`package.license-file\\`` while the code is actually processing the `readme` field. The earlier license-file branch (line 3048) legitimately uses the same message; this one was copy-pasted without updating the field name, so a user with a non-UTF8 readme path gets a misleading error.","fix":"Change the message to `non-UTF8 \\`package.readme\\``.","locations":[{"ref":"src/cargo/util/toml/mod.rs:3079-3081","code":" 3079 |                                 .ok_or_else(|| {\n 3080 |                                     anyhow::format_err!(\"non-UTF8 `package.license-file`\")\n 3081 |                                 })?","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/toml/mod.rs#L3079-L3081"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`check_formatting` reports the rustfmt *check* failure (formatting mismatch) with the message \"failed to run rustfmt: {status}\". rustfmt exiting non-zero in `--check` mode means the example is misformatted, not that rustfmt failed to run; the error text is misleading and gives a contributor no hint that the actual problem is code formatting in the semver doc example. The same misleading string is also used for the genuine spawn failure (the `Err(e)` arm), conflating two distinct failure modes.","fix":"Distinguish the two cases: on non-zero status report e.g. `\"example is not rustfmt-formatted ({path}): {status}\"`, and keep \"failed to run rustfmt\" only for the spawn `Err` arm.","locations":[{"ref":"crates/semver-check/src/main.rs:155-169","code":"  155 | fn check_formatting(path: &Path) -> Result<(), Box<dyn Error>> {\n  156 |     match Command::new(\"rustfmt\")\n  157 |         .args(&[\"--edition=2018\", \"--check\"])\n  158 |         .arg(path)\n  159 |         .status()\n  160 |     {\n  161 |         Ok(status) => {\n  162 |             if !status.success() {\n  163 |                 return Err(format!(\"failed to run rustfmt: {}\", status).into());\n  164 |             }\n  165 |             Ok(())\n  166 |         }\n  167 |         Err(e) => Err(format!(\"failed to run rustfmt: {}\", e).into()),\n  168 |     }\n  169 | }","lines":15,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/semver-check/src/main.rs#L155-L169"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`cargo_credential::main` only serializes/prints the result when it is an `Err`. On the\n`Ok(())` path (normal loop exit on EOF) nothing more is printed, which is correct. But\n`doit` runs an infinite loop and serializes each response inside the loop; if\n`serde_json::to_writer(stdout, &response)` fails (broken pipe when Cargo closed the\nconnection), the `?` propagates out of `doit`, gets wrapped as `Error::Other`, and then\n`main` tries to serialize that error to the same already-broken stdout, where the\n`.expect(\"failed to serialize credential provider error\")` will panic. A broken pipe\nfrom Cargo thus turns into a panic.","fix":"Ignore broken-pipe write errors gracefully (treat as clean exit) instead of `.expect()`-panicking when the final error cannot be serialized.","locations":[{"ref":"credential/cargo-credential/src/lib.rs:233-240","code":"  233 | pub fn main(credential: impl Credential) {\n  234 |     let result = doit(credential).map_err(|e| Error::Other(e));\n  235 |     if result.is_err() {\n  236 |         serde_json::to_writer(std::io::stdout(), &result)\n  237 |             .expect(\"failed to serialize credential provider error\");\n  238 |         println!();\n  239 |     }\n  240 | }","lines":8,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential/src/lib.rs#L233-L240"},{"ref":"credential/cargo-credential/src/lib.rs:262-264","code":"  262 |         serde_json::to_writer(std::io::stdout(), &response)?;\n  263 |         println!();\n  264 |     }","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential/src/lib.rs#L262-L264"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`verify_dependencies` (publish) uses `panic!` for an unexpected dependency source kind (line 503). This path runs during `cargo publish` on user-provided manifests; while the comment claims `prepare_for_publish` rewrites deps, an unexpected source kind (e.g. a future/never-registry source that is neither path, git, nor registry) would abort cargo with a panic/backtrace instead of a clean error. The adjacent comment even acknowledges that matching exhaustively would be safer.","fix":"Return a `bail!`/`anyhow::bail!` error describing the unsupported dependency source instead of `panic!`.","locations":[{"ref":"src/cargo/ops/registry/publish.rs:498-504","code":"  498 |         if dep.source_id() != registry_src {\n  499 |             if !dep.source_id().is_registry() {\n  500 |                 // Consider making SourceId::kind a public type that we can\n  501 |                 // exhaustively match on. Using match can help ensure that\n  502 |                 // every kind is properly handled.\n  503 |                 panic!(\"unexpected source kind for dependency {:?}\", dep);\n  504 |             }","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/registry/publish.rs#L498-L504"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`Client::request` (async HTTP worker) uses `self.channel.as_ref().unwrap().send(req).unwrap()` and later `receiver.await.unwrap()`. If the worker thread panics (it has several `.expect(...)` calls in `worker_loop`) or otherwise exits, the channel receiver / oneshot sender is dropped and every in-flight and subsequent `request()` panics instead of returning a clean error. This turns a recoverable network/worker failure into a hard cargo crash.","fix":"Map the `SendError` to an `anyhow::Error` and return it; handle `oneshot::Canceled` from `receiver.await` by returning a descriptive error (e.g. 'HTTP worker thread terminated unexpectedly').","locations":[{"ref":"src/cargo/util/network/http_async.rs:117-118","code":"  117 |         self.channel.as_ref().unwrap().send(req).unwrap();\n  118 |         receiver.await.unwrap()","lines":2,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/network/http_async.rs#L117-L118"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`to_string` (input.rs) handles non-UTF-8 env values by calling `std::str::from_utf8(value.as_encoded_bytes()).unwrap_err()` to obtain an error to panic with. `OsStr::as_encoded_bytes()` is documented as NOT guaranteed to be valid UTF-8 nor a stable encoding, and on a value that happens to be valid UTF-8 in its encoded form but failed `into_string` (which cannot happen on most platforms but is not contractually impossible), `from_utf8` would return `Ok` and `.unwrap_err()` would itself panic with a misleading message. The error path is fragile.","fix":"Panic with a direct message that includes the lossy value (e.g. `panic!(\"environment variable is not valid UTF-8: {}\", value.to_string_lossy())`) instead of relying on `as_encoded_bytes` + `unwrap_err`.","locations":[{"ref":"crates/build-rs/src/input.rs:625-634","code":"  625 | #[track_caller]\n  626 | fn to_string(value: std::ffi::OsString) -> String {\n  627 |     match value.into_string() {\n  628 |         Ok(s) => s,\n  629 |         Err(value) => {\n  630 |             let err = std::str::from_utf8(value.as_encoded_bytes()).unwrap_err();\n  631 |             panic!(\"{err}\")\n  632 |         }\n  633 |     }\n  634 | }","lines":10,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/build-rs/src/input.rs#L625-L634"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`Container::create_container` acquires the build lock with `BUILD_LOCK.lock().map_err(|_| panic!(...))`. The `.map_err` closure panics, so the intended behavior (panic if the mutex is poisoned) works, but the resulting `Result<MutexGuard, ()>` is bound to `_lock`. Relying on the `Ok`-wrapped guard staying alive through a discarded-via-`_`-prefix binding is fragile and confusing: a future refactor that unwraps or drops the Result would silently release the lock immediately, defeating the serialization of `docker build`. It is clearer and less error-prone to hold the guard directly.","fix":"Use `let _lock = BUILD_LOCK.lock().unwrap_or_else(|_| panic!(\"previous docker build failed, unable to run test\"));` so the binding is the guard, not a `Result`.","locations":[{"ref":"crates/cargo-test-support/src/containers.rs:80-82","code":"   80 |         let _lock = BUILD_LOCK\n   81 |             .lock()\n   82 |             .map_err(|_| panic!(\"previous docker build failed, unable to run test\"));","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-test-support/src/containers.rs#L80-L82"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`PackageIdSpec::parse` calls `std::env::current_dir().unwrap_or_default()` and then `abs.exists()` purely to produce a nicer \"looks like a file path\" diagnostic. If the current directory cannot be read it falls back to an empty path, which changes which paths are considered to \"exist\" and can make the heuristic produce a misleading `MaybeFilePath` error (or miss it). The filesystem access also makes a pure parsing function depend on process CWD and disk state.","fix":"Skip the existence heuristic when `current_dir()` fails (only run it when an absolute base is available), so parsing semantics don't silently change based on a missing CWD.","locations":[{"ref":"crates/cargo-util-schemas/src/core/package_id_spec.rs:85-96","code":"   85 |         } else if spec.contains('/') || spec.contains('\\\\') {\n   86 |             let abs = std::env::current_dir().unwrap_or_default().join(spec);\n   87 |             if abs.exists() {\n   88 |                 let maybe_url = Url::from_file_path(abs)\n   89 |                     .map_or_else(|_| \"a file:// URL\".to_string(), |url| url.to_string());\n   90 |                 return Err(ErrorKind::MaybeFilePath {\n   91 |                     spec: spec.into(),\n   92 |                     maybe_url,\n   93 |                 }\n   94 |                 .into());\n   95 |             }\n   96 |         }","lines":12,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-util-schemas/src/core/package_id_spec.rs#L85-L96"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `TomlLockfileSourceId::new`, when `kind != \"sparse\"` the code parses the post-`+` substring `url`, but for the `sparse` case it parses the full `source` string. The `InvalidUrl` error always reports `url: url.to_string()` (the split substring), so a malformed `sparse+...` source produces an error message that points at the wrong (split) string rather than the actual string that failed to parse.","fix":"Capture the actual string passed to `Url::parse` in a local and use it in the error's `url` field, e.g. `let to_parse = if kind == \"sparse\" { &source } else { url }; Url::parse(to_parse).map_err(|msg| ... url: to_parse.to_string() ...)`.","locations":[{"ref":"crates/cargo-util-schemas/src/lockfile.rs:114-119","code":"  114 |         let url = Url::parse(if kind == \"sparse\" { &source } else { url }).map_err(|msg| {\n  115 |             TomlLockfileSourceIdErrorKind::InvalidUrl {\n  116 |                 url: url.to_string(),\n  117 |                 msg: msg.to_string(),\n  118 |             }\n  119 |         })?;","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/cargo-util-schemas/src/lockfile.rs#L114-L119"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Text formatter writes link destination URLs verbatim with `write!(self.word, \"<{}>\", dest_url)` without any escaping, whereas the man formatter escapes it via `escape(&dest_url)`. A URL containing characters meaningful to the text wrapper (or simply long URLs) is emitted raw; more importantly the asymmetry means man output validates/escapes the URL while text output does not, so malformed input that man rejects passes silently through text.","fix":"Apply consistent handling; at minimum document why text needs no escaping, or run the same validation the man path uses.","locations":[{"ref":"crates/mdman/src/format/text.rs:282-284","code":"  282 |                             self.flush_word();\n  283 |                             write!(self.word, \"<{}>\", dest_url)?;\n  284 |                         }","lines":3,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/text.rs#L282-L284"},{"ref":"crates/mdman/src/format/man.rs:326","code":"  326 |                                 write!(self.output, \"<{}>\", escape(&dest_url)?)?;","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/mdman/src/format/man.rs#L326"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`get_base_commit` selects `upstream_branches[0]` as the upstream ref but only warns about ambiguity *after* picking, and the warning is emitted via `let _ = ...warn(...)` which silently drops any error. More importantly the choice of `[0]` is arbitrary (branch iteration order is unspecified), so when multiple remotes both have a `master` branch the baseline may be picked nondeterministically without a way for the user to influence it beyond passing `--base-rev` explicitly.","fix":"Prefer a well-known remote (e.g. `origin`/`upstream`) deterministically, or bail when ambiguous, rather than silently taking the first branch.","locations":[{"ref":"crates/xtask-bump-check/src/xtask.rs:262-289","code":"  262 |         None => {\n  263 |             let upstream_branches = repo\n  264 |                 .branches(Some(git2::BranchType::Remote))?\n  265 |                 .filter_map(|r| r.ok())\n  266 |                 .filter(|(b, _)| {\n  267 |                     b.name()\n  268 |                         .ok()\n  269 |                         .flatten()\n  270 |                         .unwrap_or_default()\n  271 |                         .ends_with(&format!(\"/{UPSTREAM_BRANCH}\"))\n  272 |                 })\n  273 |                 .map(|(b, _)| b)\n  274 |                 .collect::<Vec<_>>();\n  275 |             if upstream_branches.is_empty() {\n  276 |                 anyhow::bail!(\n  277 |                     \"could not find `base-sha` for `{UPSTREAM_BRANCH}`, pass it in directly\"\n  278 |                 );\n  279 |             }\n  280 |             let upstream_ref = upstream_branches[0].get();\n  281 |             if upstream_branches.len() > 1 {\n  282 |                 let name = upstream_ref.name().expect(\"name is valid UTF-8\");\n  283 |                 let _ = gctx.shell().warn(format!(\n  284 |                     \"multiple `{UPSTREAM_BRANCH}` found, picking {name}\"\n  285 |                 ));\n  286 |             }\n  287 |             upstream_ref.peel_to_commit()?\n  288 |         }\n  289 |     };","lines":28,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/xtask-bump-check/src/xtask.rs#L262-L289"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The result of running `typos` is discarded: `Command::new(bin_path)...status()?` propagates only a spawn error, but the child's exit status is ignored. When `typos` finds spelling problems it exits non-zero; `exec` still returns `Ok(())`, so `xtask-spellcheck` reports success even though the spellcheck failed. A CI lint wrapper should propagate the tool's failure.","fix":"Capture the `ExitStatus` and return a non-success error (or `process::exit(status.code())`) when `!status.success()`.","locations":[{"ref":"crates/xtask-spellcheck/src/main.rs:105-111","code":"  105 |     eprintln!(\"running {BIN_NAME}\");\n  106 |     Command::new(bin_path)\n  107 |         .current_dir(workspace_root)\n  108 |         .args(args)\n  109 |         .status()?;\n  110 | \n  111 |     Ok(())","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/xtask-spellcheck/src/main.rs#L105-L111"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`ensure_version_or_cargo_install` reads `env::var(\"PATH\").unwrap()` when building the child `PATH`. If `PATH` is unset (uncommon but possible in stripped CI/container environments) this panics instead of degrading gracefully (e.g. starting from an empty path). The surrounding code is otherwise careful with errors, so this lone `unwrap()` is an inconsistent failure mode.","fix":"Use `env::var_os(\"PATH\").unwrap_or_default()` so a missing PATH yields an empty iterator instead of a panic.","locations":[{"ref":"crates/xtask-spellcheck/src/main.rs:172-179","code":"  172 |         .env(\n  173 |             \"PATH\",\n  174 |             env::join_paths(\n  175 |                 env::split_paths(&env::var(\"PATH\").unwrap())\n  176 |                     .chain(std::iter::once(tool_bin_dir.clone())),\n  177 |             )\n  178 |             .expect(\"build dir contains invalid char\"),\n  179 |         );","lines":8,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/crates/xtask-spellcheck/src/main.rs#L172-L179"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the 1password provider, `child.stdout.as_mut().unwrap()` is used in both `signin` and\n`run_cmd`. Since stdout is configured with `Stdio::piped()` just before spawn, the\n`unwrap` cannot fail in normal operation. Acceptable, but a panic-on-unwrap in a\ncredential helper is undesirable; an explicit error would be cleaner and matches the\nerror-handling style used everywhere else in the file.","fix":"Replace `.unwrap()` with `.ok_or(\"failed to capture `op` stdout\")?`.","locations":[{"ref":"credential/cargo-credential-1password/src/main.rs:99-104","code":"   99 |         child\n  100 |             .stdout\n  101 |             .as_mut()\n  102 |             .unwrap()\n  103 |             .read_to_string(&mut buffer)\n  104 |             .map_err(|e| format!(\"failed to get session from `op`: {}\", e))?;","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-1password/src/main.rs#L99-L104"},{"ref":"credential/cargo-credential-1password/src/main.rs:146-151","code":"  146 |         child\n  147 |             .stdout\n  148 |             .as_mut()\n  149 |             .unwrap()\n  150 |             .read_to_string(&mut buffer)\n  151 |             .map_err(|e| format!(\"failed to read `op` output: {}\", e))?;","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-1password/src/main.rs#L146-L151"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The libsecret FFI return values of `secret_password_store_sync` (gboolean) and\n`secret_password_clear_sync` (gboolean) are ignored; only the `error` out-parameter is\nchecked. Per libsecret semantics the boolean result and the error should be consistent,\nbut relying solely on `error` being non-null is the documented pattern, so this is minor.\nHowever the lookup result token pointer is checked for null which is correct. The\ninconsistency is that `error` is reused without being reset to null between the (mutually\nexclusive) branches; if the code were ever refactored to run multiple operations this\nwould read a stale error.","fix":"Declare `error` locally inside each match arm, or reset to null before each FFI call, to avoid future stale-error bugs.","locations":[{"ref":"credential/cargo-credential-libsecret/src/lib.rs:170-170","code":"  170 |             let mut error: *mut GError = null_mut();","lines":1,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L170"},{"ref":"credential/cargo-credential-libsecret/src/lib.rs:211-221","code":"  211 |                         secret_password_store_sync(\n  212 |                             &schema,\n  213 |                             c\"default\".as_ptr() as *const gchar,\n  214 |                             label.as_ptr(),\n  215 |                             token.as_ptr(),\n  216 |                             null_mut(),\n  217 |                             &mut error,\n  218 |                             attr_url,\n  219 |                             index_url_c.as_ptr(),\n  220 |                             null() as *const gchar,\n  221 |                         );","lines":11,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L211-L221"},{"ref":"credential/cargo-credential-libsecret/src/lib.rs:236-243","code":"  236 |                         secret_password_clear_sync(\n  237 |                             &schema,\n  238 |                             null_mut(),\n  239 |                             &mut error,\n  240 |                             attr_url,\n  241 |                             index_url_c.as_ptr(),\n  242 |                             null() as *const gchar,\n  243 |                         );","lines":8,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L236-L243"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In libsecret Get, when `error` is non-null the message is read with\n`CStr::from_ptr((*error).message).to_str().unwrap_or_default()`. If libsecret ever set\n`(*error).message` to NULL (uncommon but not guaranteed non-null by the GError contract\nin all paths), `CStr::from_ptr` on a NULL pointer is undefined behavior. The code assumes\n`message` is always a valid C string when `error` is non-null.","fix":"Guard with `if (*error).message.is_null()` before calling `CStr::from_ptr`, falling back to a generic message.","locations":[{"ref":"credential/cargo-credential-libsecret/src/lib.rs:186-189","code":"  186 |                             CStr::from_ptr((*error).message)\n  187 |                                 .to_str()\n  188 |                                 .unwrap_or_default()\n  189 |                         )","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L186-L189"},{"ref":"credential/cargo-credential-libsecret/src/lib.rs:225-228","code":"  225 |                                 CStr::from_ptr((*error).message)\n  226 |                                     .to_str()\n  227 |                                     .unwrap_or_default()\n  228 |                             )","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L225-L228"},{"ref":"credential/cargo-credential-libsecret/src/lib.rs:247-250","code":"  247 |                                 CStr::from_ptr((*error).message)\n  248 |                                     .to_str()\n  249 |                                     .unwrap_or_default()\n  250 |                             )","lines":4,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/credential/cargo-credential-libsecret/src/lib.rs#L247-L250"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`OnDiskReports::save_report` builds the JSON with `serde_json::to_vec(&self).unwrap()`,\nwhich would panic on a serialization failure. While these plain structs effectively cannot\nfail to serialize, this is inconsistent with the surrounding code, which carefully reports\nthe subsequent file-write error via `display_warning_with_error` rather than panicking. A\npanic here aborts the whole build at its very end.","fix":"Fold `to_vec` into the same error-handling chain as the write so any failure is reported as a warning.","locations":[{"ref":"src/cargo/core/compiler/future_incompat.rs:160-170","code":"  160 |         self.reports.push(report);\n  161 |         if self.reports.len() > MAX_REPORTS {\n  162 |             self.reports.remove(0);\n  163 |         }\n  164 |         let on_disk = serde_json::to_vec(&self).unwrap();\n  165 |         if let Err(e) = ws\n  166 |             .build_dir()\n  167 |             .open_rw_exclusive_create(\n  168 |                 FUTURE_INCOMPAT_FILE,\n  169 |                 ws.gctx(),\n  170 |                 \"Future incompatibility report\",","lines":11,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/future_incompat.rs#L160-L170"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`LockManager::unlock` silently returns `Ok(())` when the key is absent from the map,\nwhereas its siblings `lock` and `downgrade_to_shared` both `bail!` on a missing key. This\nasymmetry means unlocking a never-registered key (a logic error / flow mistake) is silently\nswallowed and can mask bugs.","fix":"Add an `else { bail!(...) }` for consistency, or document why a missing key is acceptable for unlock.","locations":[{"ref":"src/cargo/core/compiler/locking.rs:84-92","code":"   84 |     #[instrument(skip(self))]\n   85 |     pub fn unlock(&self, key: &LockKey) -> CargoResult<()> {\n   86 |         let locks = self.locks.read().unwrap();\n   87 |         if let Some(lock) = locks.get(key) {\n   88 |             lock.file().unlock()?;\n   89 |         };\n   90 | \n   91 |         Ok(())\n   92 |     }","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/compiler/locking.rs#L84-L92"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`PublishAgePolicy::too_new` computes `max_pubtime` via `SignedDuration::try_from(min_age).ok().and_then(|d| invocation_time.checked_sub(d).ok())`. When the configured age is so large that either the conversion or the subtraction overflows, `max_pubtime` is `None` and the code then treats *every* version as too-new (`None => Some(publish_age())`). A user who configures a very large but well-intentioned `min-publish-age` (the test even exercises `u64::MAX seconds`) silently has all packages rejected rather than getting a clear 'value out of range' error.","fix":"Distinguish 'age larger than any possible publish time' (accept nothing is intended) from an arithmetic-overflow error, and surface a configuration error for the latter rather than rejecting all versions.","locations":[{"ref":"src/cargo/core/resolver/version_prefs.rs:252-272","code":"  252 |     pub fn too_new(&self, summary: &Summary) -> Option<PublishAgeViolation> {\n  253 |         let pubtime = summary.pubtime()?;\n  254 |         let MinPublishAge::Age(min_age, config) = self.min_age(summary.source_id()) else {\n  255 |             return None;\n  256 |         };\n  257 | \n  258 |         let max_pubtime = jiff::SignedDuration::try_from(*min_age)\n  259 |             .ok()\n  260 |             .and_then(|min_age| self.invocation_time.checked_sub(min_age).ok());\n  261 | \n  262 |         let age = self.invocation_time.duration_since(pubtime);\n  263 |         let publish_age = || PublishAgeViolation {\n  264 |             age,\n  265 |             config: config.clone(),\n  266 |         };\n  267 | \n  268 |         match max_pubtime {\n  269 |             Some(max_pubtime) => (pubtime > max_pubtime).then(publish_age),\n  270 |             None => Some(publish_age()),\n  271 |         }\n  272 |     }","lines":21,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/core/resolver/version_prefs.rs#L252-L272"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `print_action_msg`, when a dependency is added to a target-specific section the code unconditionally indexes `section[2]` and `section[1]`. This relies on the invariant that a target section always has exactly 3 path components (`[\"target\", \"<triple>\", \"<kind>\"]`). If that invariant is ever violated (e.g. a malformed DepTable with length 2 or >3), this panics with an out-of-bounds index instead of producing a clear error. The `else` branch is reached for any `section.len() != 1`, so length-2 sections would panic.","fix":"Match explicitly on `section.len()` (1 vs 3) and handle unexpected lengths gracefully, or document and assert the 3-component invariant.","locations":[{"ref":"src/cargo/ops/cargo_add/mod.rs:1284-1289","code":" 1284 |     let section = if section.len() == 1 {\n 1285 |         section[0].clone()\n 1286 |     } else {\n 1287 |         format!(\"{} for target `{}`\", &section[2], &section[1])\n 1288 |     };\n 1289 |     write!(message, \" {section}\")?;","lines":6,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/ops/cargo_add/mod.rs#L1284-L1289"}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`DependencyConfusionThreatOverlaySource::download` treats *any* `Err` from the\nlocal source as \"package not present locally\" and silently falls back to the\nremote source. If the local source genuinely contains the package but fails to\ndownload it for a real reason (I/O error, checksum failure, corrupt file), that\nerror is discarded and the remote is queried instead. For a source whose entire\npurpose is to prevent dependency confusion, masking a local failure and reaching\nout to the remote is exactly the failure mode that should be surfaced, not\nswallowed.","fix":"Distinguish 'not found' from real errors (e.g. only fall back when the local source reports the package is absent), and propagate other local errors.","locations":[{"ref":"src/cargo/sources/overlay.rs:96-110","code":"   96 |         if let Ok(pkg) = self\n   97 |             .local\n   98 |             .download(package.map_source(remote_source, local_source))\n   99 |             .await\n  100 |             .map(|maybe_pkg| match maybe_pkg {\n  101 |                 MaybePackage::Ready(pkg) => {\n  102 |                     MaybePackage::Ready(pkg.map_source(local_source, remote_source))\n  103 |                 }\n  104 |                 x => x,\n  105 |             })\n  106 |         {\n  107 |             return Ok(pkg);\n  108 |         }\n  109 |         self.remote.download(package).await\n  110 |     }","lines":15,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/overlay.rs#L96-L110"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `fetch_uncached_no_retry`, several response-header reads use\n`header.to_str().unwrap()` (for `ETAG` and `LAST_MODIFIED` when building\n`response_index_version`). HTTP header values are arbitrary bytes and are not\nguaranteed to be valid UTF-8/visible-ASCII; a registry/proxy returning a\nnon-ASCII `ETag` or `Last-Modified` would panic Cargo instead of producing an\nerror. Other header reads in the same function defensively use\n`to_str().unwrap_or_default()`.","fix":"Use `.to_str().ok()` / `unwrap_or_default()` and skip building the version string when the header is not valid text.","locations":[{"ref":"src/cargo/sources/registry/http_remote.rs:548-555","code":"  548 |                 let response_index_version =\n  549 |                     if let Some(etag) = response.headers.get(http::header::ETAG) {\n  550 |                         format!(\"{}: {}\", ETAG, etag.to_str().unwrap())\n  551 |                     } else if let Some(lm) = response.headers.get(http::header::LAST_MODIFIED) {\n  552 |                         format!(\"{}: {}\", LAST_MODIFIED, lm.to_str().unwrap())\n  553 |                     } else {\n  554 |                         UNKNOWN.to_string()\n  555 |                     };","lines":8,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/sources/registry/http_remote.rs#L548-L555"}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`impl Error for ConfigError` implements `source()` as `self.error.source()`, which returns the source of the inner anyhow error and skips the inner anyhow error's own top-level message. When a `ConfigError` is wrapped and the chain is walked via `Error::source()`, that context message is silently dropped (Display still shows it, but `.source()` iteration does not).","fix":"Remove the custom `source()` (let it default to None, relying on Display) or restructure so the inner anyhow message is preserved in the source chain.","locations":[{"ref":"src/cargo/util/context/error.rs:70-74","code":"   70 | impl std::error::Error for ConfigError {\n   71 |     fn source(&self) -> Option<&(dyn std::error::Error + 'static)> {\n   72 |         self.error.source()\n   73 |     }\n   74 | }","lines":5,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/context/error.rs#L70-L74"}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `CredentialProcessCredential::run`, the result of `output_from_child.read_line(&mut buffer)` is `?`-propagated for IO errors but the returned byte count is ignored. If the credential process exits/closes stdout without writing a hello line (0 bytes read), `buffer` is empty and the subsequent `serde_json::from_str(\"\")` produces a confusing 'failed to deserialize hello' parse error rather than a clear 'credential provider exited without sending hello' message. Same pattern for the response read.","fix":"Check the returned count; if 0 bytes were read, return a descriptive error indicating the credential process produced no output (and surface its exit status).","locations":[{"ref":"src/cargo/util/credential/process.rs:37-43","code":"   37 |         // Read the CredentialHello\n   38 |         output_from_child\n   39 |             .read_line(&mut buffer)\n   40 |             .context(\"failed to read hello from credential provider\")?;\n   41 |         let credential_hello: CredentialHello =\n   42 |             serde_json::from_str(&buffer).context(\"failed to deserialize hello\")?;\n   43 |         tracing::debug!(\"credential-process > {credential_hello:?}\");","lines":7,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/credential/process.rs#L37-L43"},{"ref":"src/cargo/util/credential/process.rs:66-74","code":"   66 |         buffer.clear();\n   67 |         output_from_child\n   68 |             .read_line(&mut buffer)\n   69 |             .context(\"failed to read response from credential provider\")?;\n   70 | \n   71 |         // Read the Credential Response\n   72 |         let response: Result<CredentialResponse, Error> =\n   73 |             serde_json::from_str(&buffer).context(\"failed to deserialize response\")?;\n   74 |         tracing::debug!(\"credential-process > {response:?}\");","lines":9,"link":"https://github.com/rust-lang/cargo/blob/a595d0da21f228b7fdae64d3d5c0e527ea66bb59/src/cargo/util/credential/process.rs#L66-L74"}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `to_dependency_source_id`, when a path dependency is resolved and the parent source is NOT a path source, the resolved `path` is computed (`path.resolve(...)`) but then discarded and the parent `source_id` is returned unchanged (lines 2424-2430). That is intentional for registry publishing, but `path.resolve` may have side effects/cost and the resolved value is never used in this branch, making the call on line 2415 wasted work for the non-path-source case. Minor.","fix":"Only resolve the path inside the `if manifest_ctx.source_id.is_path()` branch where it is actually consumed.","locations":[{"ref":"src/cargo/util/toml/mod.rs:2414-2431","code":" 2414 |         (None, Some(path), _, _) => {\n 2415 |             let path = path.resolve(manifest_ctx.gctx);\n 2416 |             // If the source ID for the package we're parsing is a path\n 2417 |             // source, then we normalize the path here to get rid of\n 2418 |             // components like `..`.\n 2419 |             //\n 2420 |             // The purpose of this is to get a canonical ID for the package\n 2421 |             // that we're depending on to ensure that builds of this package\n 2422 |             // always end up hashing to the same value no matter where it's\n 2423 |             // built from.\n 2424 |             if manifest_ctx.source_id.is_path() {\n 2425 |                 let path = manifest_ctx.file.parent().unwrap().join(path);\n 2426 |                 let path = paths::normalize_path(&path);\n 2427 |
