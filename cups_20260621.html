<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In cupsAdminSetServerSettings, lines parsed by cupsFileGetConf can have a NULL value (the guard that sets value to a non-empty pointer in cupsAdminGetServerSettings is absent here). When a <Policy>, <Location>, or <Limit> tag has no argument, value is NULL and is passed to _cups_strcasecmp/strcmp/cupsFilePrintf without a NULL check, causing a crash. The else-if handling `line[0] == '<'` with NULL value proves value can be NULL for tag lines.","fix":"Mirror the guard from cupsAdminGetServerSettings (set value to line+strlen(line) when NULL and the line is not a closing tag), or add explicit `value &&` checks before each deref.","locations":[{"ref":"cups/adminutil.c:774-781","code":"  774 |     else if (!_cups_strcasecmp(line, \"<Policy\"))\n  775 |     {\n  776 |       in_default_policy = !_cups_strcasecmp(value, \"default\");\n  777 |       in_policy         = 1;\n  778 | \n  779 |       cupsFilePrintf(temp, \"%s %s>\\n\", line, value);\n  780 |       indent += 2;\n  781 |     }","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/adminutil.c#L774-L781"},{"ref":"cups/adminutil.c:804-818","code":"  804 |     else if (!_cups_strcasecmp(line, \"<Location\"))\n  805 |     {\n  806 |       in_location = 1;\n  807 |       indent += 2;\n  808 |       if (!strcmp(value, \"/admin\"))\n  809 | \tin_admin_location = 1;\n  810 |       else if (!strcmp(value, \"/admin/conf\"))\n  811 | \tin_conf_location = 1;\n  812 |       else if (!strcmp(value, \"/admin/log\"))\n  813 | \tin_log_location = 1;\n  814 |       else if (!strcmp(value, \"/\"))\n  815 | \tin_root_location = 1;\n  816 | \n  817 |       cupsFilePrintf(temp, \"%s %s>\\n\", line, value);\n  818 |     }","lines":15,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/adminutil.c#L804-L818"},{"ref":"cups/adminutil.c:919-967","code":"  919 |     else if (!_cups_strcasecmp(line, \"<Limit\"))\n  920 |     {\n  921 |       if (in_default_policy)\n  922 |       {\n  923 |        /*\n  924 | \t* See if the policy limit is for the Cancel-Job operation...\n  925 | \t*/\n  926 | \n  927 | \tchar\t*valptr;\t\t/* Pointer into value */\n  928 | \n  929 | \n  930 | \tif (!_cups_strcasecmp(value, \"cancel-job\") && user_cancel_any >= 0)\n  931 | \t{\n  932 | \t /*\n  933 | \t  * Don't write anything for this limit section...\n  934 | \t  */\n  935 | \n  936 | \t  in_cancel_job = 2;\n  937 | \t}\n  938 | \telse\n  939 | \t{\n  940 | \t  cupsFilePrintf(temp, \"%*s%s\", indent, \"\", line);\n  941 | \n  942 | \t  while (*value)\n  943 | \t  {\n  944 | \t    for (valptr = value; *valptr && !_cups_isspace(*valptr); valptr ++);\n  945 | \n  946 | \t    if (*valptr)\n  947 | \t      *valptr++ = '\\0';\n  948 | \n  949 | \t    if (!_cups_strcasecmp(value, \"cancel-job\") && user_cancel_any >= 0)\n  950 | \t    {\n  951 | \t     /*\n  952 | \t      * Write everything except for this definition...\n  953 | \t      */\n  954 | \n  955 | \t      in_cancel_job = 1;\n  956 | \t    }\n  957 | \t    else\n  958 | \t      cupsFilePrintf(temp, \" %s\", value);\n  959 | \n  960 | \t    for (value = valptr; _cups_isspace(*value); value ++);\n  961 | \t  }\n  962 | \n  963 | \t  cupsFilePuts(temp, \">\\n\");\n  964 | \t}\n  965 |       }\n  966 |       else\n  967 |         cupsFilePrintf(temp, \"%*s%s %s>\\n\", indent, \"\", line, value);","lines":49,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/adminutil.c#L919-L967"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In _cupsJSONDelete, after finding a matching KEY node, the code reads sibling = current->sibling (the value node) and unconditionally dereferences sibling->sibling and passes sibling to delete_json. If a KEY node has no following value sibling (malformed/partially-built object where the key is the last child), sibling is NULL and sibling->sibling is a NULL-pointer dereference.","fix":"Check `if (sibling)` before dereferencing: relink using sibling ? sibling->sibling : NULL, and only call delete_json(sibling) when sibling is non-NULL.","locations":[{"ref":"cups/json.c:113-122","code":"  113 |       sibling = current->sibling;\n  114 | \n  115 |       if (prev)\n  116 |         prev->sibling = sibling->sibling;\n  117 |       else\n  118 |         json->value.child = sibling->sibling;\n  119 | \n  120 |       // Delete the key and value...\n  121 |       delete_json(current);\n  122 |       delete_json(sibling);","lines":10,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/json.c#L113-L122"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"cupsSignCredentialsRequest() hand-parses attacker-controlled extension DER from the CSR. Loops such as `for (j = 4; j < datalen; j += data[j + 1] + 2)` and the SAN loop read data[j+1], data[j+9], and memcpy(temp, data+j+2, data[j+1]) without validating that j+1, j+9, or j+2+data[j+1] remain within datalen, allowing out-of-bounds reads driven by a crafted CSR on a CA signing service.","fix":"Replace manual DER walking with OpenSSL accessors (X509v3_get_ext_by_NID, X509V3_EXT_d2i, EXTENDED_KEY_USAGE, GENERAL_NAMES). If kept manual, bounds-check every index against datalen before each read.","locations":[{"ref":"cups/tls-openssl.c:1206-1351","code":" 1206 |   for (i = 0; i < num_exts; i ++)\n 1207 |   {\n 1208 |     // Get the extension object...\n 1209 |     bool\t\tadd_ext = false;\t// Add this extension?\n 1210 |     ASN1_OBJECT\t\t*obj;\t\t\t// Extension object\n 1211 |     ASN1_OCTET_STRING\t*extdata;\t\t// Extension data string\n 1212 |     unsigned char\t*data = NULL;\t\t// Extension data bytes\n 1213 |     int\t\t\tdatalen;\t\t// Length of extension data\n 1214 | \n 1215 |     ext     = sk_X509_EXTENSION_value(exts, i);\n 1216 |     obj     = X509_EXTENSION_get_object(ext);\n 1217 |     extdata = X509_EXTENSION_get_data(ext);\n 1218 |     datalen = i2d_ASN1_OCTET_STRING(extdata, &data);\n 1219 | \n 1220 | #ifdef DEBUG\n 1221 |     char *tempptr;\t\t\t\t// Pointer into string\n 1222 | \n 1223 |     for (j = 0, tempptr = temp; j < datalen; j ++, tempptr += 2)\n 1224 |       snprintf(tempptr, sizeof(temp) - (size_t)(tempptr - temp), \"%02X\", data[j]);\n 1225 | \n 1226 |     DEBUG_printf(\"1cupsSignCredentialsRequest: EXT%d=%s\", OBJ_obj2nid(obj), temp);\n 1227 | #endif // DEBUG\n 1228 | \n 1229 |     switch (OBJ_obj2nid(obj))\n 1230 |     {\n 1231 |       case NID_ext_key_usage :\n 1232 |           add_ext       = true;\n 1233 |           saw_ext_usage = true;\n 1234 | \n 1235 |           if (datalen < 12 || data[2] != 0x30 || data[3] != (datalen - 4))\n 1236 |           {\n 1237 |             _cupsSetError(IPP_STATUS_ERROR_INTERNAL, _(\"Bad keyUsage extension in X.509 certificate request.\"), 1);\n 1238 | \t    goto done;\n 1239 |           }\n 1240 | \n 1241 |           for (purpose = 0, j = 4; j < datalen; j += data[j + 1] + 2)\n 1242 |           {\n 1243 |             if (data[j] != 0x06 || data[j + 1] != 8 || memcmp(data + j + 2, \"+\\006\\001\\005\\005\\007\\003\", 7))\n 1244 |             {\n 1245 | \t      _cupsSetError(IPP_STATUS_ERROR_INTERNAL, _(\"Bad keyUsage extension in X.509 certificate request.\"), 1);\n 1246 | \t      goto done;\n 1247 |             }\n 1248 | \n 1249 |             switch (data[j + 9])\n 1250 |             {\n 1251 |               case 1 :\n 1252 |                   purpose |= CUPS_CREDPURPOSE_SERVER_AUTH;\n 1253 |                   break;\n 1254 |               case 2 :\n 1255 |                   purpose |= CUPS_CREDPURPOSE_CLIENT_AUTH;\n 1256 |                   break;\n 1257 |               case 3 :\n 1258 |                   purpose |= CUPS_CREDPURPOSE_CODE_SIGNING;\n 1259 | st.","fix":"Guard the cupsdLogClient and the document-format-detected snprintf/ippAddString with 'if (filetype)', matching the pattern used in send_document(), so the existing not-supported error path handles NULL.","locations":[{"ref":"scheduler/ipp.c:8645-8651","code":" 8645 |     if (!filetype)\n 8646 |       filetype = mimeType(MimeDatabase, super, type);\n 8647 | \n 8648 |     cupsdLogClient(con, CUPSD_LOG_INFO, \"Request file type is %s/%s.\", filetype->super, filetype->type);\n 8649 | \n 8650 |     snprintf(mimetype, sizeof(mimetype), \"%s/%s\", filetype->super, filetype->type);\n 8651 |     ippAddString(con->request, IPP_TAG_JOB, IPP_TAG_MIMETYPE, \"document-format-detected\", NULL, mimetype);","lines":7,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L8645-L8651"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"In send_document() the auto-typing path builds a mimetype string by dereferencing filetype->super/filetype->type unconditionally even though filetype may be NULL. mimeFileType() can return NULL and the fallback mimeType(MimeDatabase, \"application\", \"octet-stream\") can also return NULL if that type is not registered in the MIME database. The preceding log line at 9868-9870 is correctly guarded by 'if (filetype)', proving the author knew filetype could be NULL, but the snprintf() on the next line is not guarded, causing a NULL pointer dereference (crash) reachable from an untrusted Send-Document request.","fix":"Only build/add document-format-detected when filetype is non-NULL; move the snprintf/ippAddString inside the 'if (filetype)' block, and let the existing 'else if (!filetype)' branch at 9897 handle the NULL case.","locations":[{"ref":"scheduler/ipp.c:9865-9873","code":" 9865 |     if (!filetype)\n 9866 |       filetype = mimeType(MimeDatabase, super, type);\n 9867 | \n 9868 |     if (filetype)\n 9869 |       cupsdLogJob(job, CUPSD_L "PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"cups_dest_query_cb() parses an untrusted DNS-SD TXT record into key[256]/value[256]. The key-copy loop `for (ptr = key; txt < txtnext && *txt != '='; txt++) *ptr++ = *txt;` is bounded only by the key/value buffer sizes being 256 and txtlen being a uint8_t (<=255), as the comment claims. That reasoning holds for the key, but the value copy uses `memcpy(value, txt, (size_t)(txtnext - txt))` where txtnext-txt can be up to 255 and value is 256, which is safe; however if the format ever produced a key without '=' up to 255 bytes plus separately a long value the combined assumption is brittle. The real concern: there is no check that the whole record (key + '=' + value) fits the assumption simultaneously - it relies entirely on the 8-bit length cap. Document/assert this invariant since the buffers are exactly sized to the maximum.","fix":"Add explicit bounds checks (or assertions) that `ptr - key < sizeof(key)` in the key loop and that `(txtnext - txt) < sizeof(value)` before the memcpy, instead of relying solely on the uint8_t length implication.","locations":[{"ref":"cups/dest.c:2759-2789","code":" 2759 |     for (txt = rdata, txtend = txt + rdlen; txt < txtend; txt = txtnext)\n 2760 |     {\n 2761 |       // Read a key/value pair starting with an 8-bit length.  Since the\n 2762 |       // length is 8 bits and the size of the key/value buffers is 256, we\n 2763 |       // don't need to check for overflow...\n 2764 |       txtlen = *txt++;\n 2765 | \n 2766 |       if (!txtlen || (txt + txtlen) > txtend)\n 2767 | \tbreak;\n 2768 | \n 2769 |       txtnext = txt + txtlen;\n 2770 | \n 2771 |       for (ptr = key; txt < txtnext && *txt != '='; txt ++)\n 2772 | \t*ptr++ = (char)*txt;\n 2773 |       *ptr = '\\0';\n 2774 | \n 2775 |       if (txt < txtnext && *txt == '=')\n 2776 |       {\n 2777 | \ttxt ++;\n 2778 | \n 2779 | \tif (txt < txtnext)\n 2780 | \t  memcpy(value, txt, (size_t)(txtnext - txt));\n 2781 | \tvalue[txtnext - txt] = '\\0';\n 2782 | \n 2783 | \tDEBUG_printf(\"6cups_dest_query_cb: %s=%s\", key, value);\n 2784 |       }\n 2785 |       else\n 2786 |       {\n 2787 | \tDEBUG_printf(\"6cups_dest_query_cb: '%s' with no value.\", key);\n 2788 | \tcontinue;\n 2789 |       }","lines":31,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dest.c#L2759-L2789"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In the OpenSSL branch of hash_data(), EVP_MD_CTX_new() can return NULL on allocation failure and EVP_DigestInit/Update/Final are then called unconditionally on ctx, causing a NULL dereference. The OpenSSL call return values are also never checked.","fix":"Check ctx != NULL after EVP_MD_CTX_new() and return -1 on failure; also check the EVP_Digest* return values.","locations":[{"ref":"cups/hash.c:248-256","code":"  248 |   if (md)\n  249 |   {\n  250 |     ctx = EVP_MD_CTX_new();\n  251 |     EVP_DigestInit(ctx, md);\n  252 |     EVP_DigestUpdate(ctx, a, alen);\n  253 |     if (b && blen)\n  254 |       EVP_DigestUpdate(ctx, b, blen);\n  255 |     EVP_DigestFinal(ctx, hashtemp, &hashlen);\n  256 |     EVP_MD_CTX_free(ctx);","lines":9,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/hash.c#L248-L256"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"httpGetHostByName() dereferences name unconditionally (strcmp(name,\"localhost\"), name[0], the digit-scan loop, DEBUG_printf). Every other accessor in this file guards against NULL; a NULL name here is an immediate NULL dereference / crash.","fix":"Add an early 'if (!name) return (NULL);' check at the top of httpGetHostByName().","locations":[{"ref":"cups/http-addr.c:632-636","code":"  632 |   DEBUG_printf(\"httpGetHostByName(name=\\\"%s\\\")\", name);\n  633 | \n  634 |   // Avoid lookup delays and configuration problems when connecting\n  635 |   // to the localhost address...\n  636 |   if (!strcmp(name, \"localhost\"))","lines":5,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addr.c#L632-L636"},{"ref":"cups/http-addr.c:670","code":"  670 |   for (nameptr = name; isdigit(*nameptr & 255) || *nameptr == '.'; nameptr ++);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addr.c#L670"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"http_resolve_cb computes hostptr = host + strlen(host) - 7 and fqdn + strlen(fqdn) - 6 for a suffix test. When host/fqdn (DNS-SD resolver data) is shorter than the offset, the arithmetic forms a pointer before the buffer (undefined behavior), and only the '> host' / '<= fqdn' comparison guards the subsequent _cups_strcasecmp from an out-of-bounds read.","fix":"Compute length first: size_t n = strlen(host); if (n >= 7 && !_cups_strcasecmp(host + n - 7, \".local.\")) ... to avoid forming out-of-bounds pointers.","locations":[{"ref":"cups/http-support.c:1921","code":" 1921 |   if ((uribuf->options & HTTP_RESOLVE_FQDN) && (hostptr = host + strlen(host) - 7) > host && !_cups_strcasecmp(hostptr, \".local.\"))","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L1921"},{"ref":"cups/http-support.c:1941","code":" 1941 | \t  if ((hostptr = fqdn + strlen(fqdn) - 6) <= fqdn || _cups_strcasecmp(hostptr, \".local\"))","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L1941"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"cupsJWTHasValidSignature() emits a DEBUG_printf that unconditionally reads jwt->signature[jwt->sigsize - 4 .. -1]. The earlier guard only checks jwt->signature != NULL, not its size; for a signature shorter than 4 bytes (or sigsize==0 paired with a non-NULL buffer) this reads out of bounds. (DEBUG-only build, hence medium.)","fix":"Guard the trailing-byte access with a `jwt->sigsize >= 4` check as done in cupsJWTImportString.","locations":[{"ref":"cups/jwt.c:426","code":"  426 |   DEBUG_printf(\"1cupsJWTHasValidSignature: sigalg=%d, orig sig[%u]=<%02X%02X%02X%02X...%02X%02X%02X%02X>\", jwt->sigalg, (unsigned)jwt->sigsize, jwt->signature[0], jwt->signature[1], jwt->signature[2], jwt->signature[3], jwt->signature[jwt->sigsize - 4], jwt->signature[jwt->sigsize - 3], jwt->signature[jwt->sigsize - 2], jwt->signature[jwt->sigsize - 1]);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L426"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"cupsLangEncoding dereferences lang_encodings[lang->encoding] with no bounds check on lang->encoding; _cupsEncodingName range-checks the same table, so this is an inconsistent/missing guard that reads out of bounds if encoding is ever out of range.","fix":"Validate lang->encoding against the table size (as _cupsEncodingName does) and return lang_encodings[0] when out of range.","locations":[{"ref":"cups/language.c:157-164","code":"  157 | const char *\t\t\t\t/* O - Character encoding */\n  158 | cupsLangEncoding(cups_lang_t *lang)\t/* I - Language data */\n  159 | {\n  160 |   if (lang == NULL)\n  161 |     return ((char*)lang_encodings[0]);\n  162 |   else\n  163 |     return ((char*)lang_encodings[lang->encoding]);\n  164 | }","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/language.c#L157-L164"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"setpagedevice reads obj[1], obj[2], obj[3] for HWResolution and PageSize array values (e.g. obj[1].type == CUPS_PS_NUMBER ... obj[3].type == CUPS_PS_END_ARRAY) without verifying that obj+3 is within the dictionary bounds (<= end). A crafted PS dictionary ending with '/HWResolution [' as the last entries lets these accesses read past the end of the parsed object range.","fix":"Before indexing obj[1..3], confirm (obj + 3) <= end (or < st->objs + st->num_objs as appropriate) and return -1 otherwise.","locations":[{"ref":"cups/raster-interpret.c:1498-1509","code":" 1498 |     else if (!strcmp(name, \"HWResolution\") && obj->type == CUPS_PS_START_ARRAY)\n 1499 |     {\n 1500 |       if (obj[1].type == CUPS_PS_NUMBER && obj[2].type == CUPS_PS_NUMBER &&\n 1501 |           obj[3].type == CUPS_PS_END_ARRAY)\n 1502 |       {\n 1503 |         h->HWResolution[0] = (unsigned)obj[1].value.number;\n 1504 | \th->HWResolution[1] = (unsigned)obj[2].value.number;\n 1505 | \tobj += 3;\n 1506 |       }\n 1507 |       else\n 1508 |         return (-1);\n 1509 |     }","lines":12,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/raster-interpret.c#L1498-L1509"},{"ref":"cups/raster-interpret.c:1543-1558","code":" 1543 |     else if (!strcmp(name, \"PageSize\") && obj->type == CUPS_PS_START_ARRAY)\n 1544 |     {\n 1545 |       if (obj[1].type == CUPS_PS_NUMBER && obj[2].type == CUPS_PS_NUMBER &&\n 1546 |           obj[3].type == CUPS_PS_END_ARRAY)\n 1547 |       {\n 1548 |         h->cupsPageSize[0] = (float)obj[1].value.number;\n 1549 | \th->cupsPageSize[1] = (float)obj[2].value.number;\n 1550 | \n 1551 |         h->PageSize[0] = (unsigned)obj[1].value.number;\n 1552 | \th->PageSize[1] = (unsigned)obj[2].value.number;\n 1553 | \n 1554 | \tobj += 3;\n 1555 |       }\n 1556 |       else\n 1557 |         return (-1);\n 1558 |     }","lines":16,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/raster-interpret.c#L1543-L1558"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"cupsGetResponse dereferences attr->values[0].string.text assuming a well-formed status-message attribute with at least one value. A malicious server response whose TEXT-tagged status-message attribute has count 0 or a NULL string yields a NULL/invalid read.","fix":"Guard with attr && ippGetCount(attr) > 0 && ippGetString(attr,0,NULL) before dereferencing values[0].string.text.","locations":[{"ref":"cups/request.c:481-485","code":"  481 |     attr = ippFindAttribute(response, \"status-message\", IPP_TAG_TEXT);\n  482 | \n  483 |     DEBUG_printf(\"1cupsGetResponse: status-code=%s, status-message=\\\"%s\\\"\", ippErrorString(response->request.op_status), attr ? attr->values[0].string.text : \"\");\n  484 | \n  485 |     _cupsSetError(response->request.op_status, attr ? attr->values[0].string.text : ippErrorString(response->request.op_status), 0);","lines":5,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/request.c#L481-L485"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"cups_read_client_conf calls cups_set_* helpers; most call sites guard with '&& value' but BrowseDomains/FilterLocation/FilterType are called without a NULL check on value. The cups_set_digestoptions/encryption/uatokens/ssl_options helpers call _cups_strcasecmp(value, ...) which crashes if ever passed NULL, making the inconsistent guarding fragile.","fix":"Make the cups_set_* helpers uniformly NULL-tolerant (treat NULL as 'unset'), or add the missing '&& value' guards consistently.","locations":[{"ref":"cups/usersys.c:1622-1641","code":" 1622 |     if (!_cups_strcasecmp(line, \"BrowseDomains\"))\n 1623 |       cups_set_browse_domains(cc, value);\n 1624 |     else if (!_cups_strcasecmp(line, \"DigestOptions\") && value)\n 1625 |       cups_set_digestoptions(cc, value);\n 1626 |     else if (!_cups_strcasecmp(line, \"Encryption\") && value)\n 1627 |       cups_set_encryption(cc, value);\n 1628 |     else if (!_cups_strcasecmp(line, \"FilterLocation\"))\n 1629 |       cups_set_filter_location(cc, value);\n 1630 |     else if (!_cups_strcasecmp(line, \"FilterType\"))\n 1631 |       cups_set_filter_type(cc, value);\n 1632 | #ifndef __APPLE__\n 1633 |     // The ServerName directive is not supported on macOS due to app\n 1634 |     // sandboxing restrictions, i.e. not all apps request network access.\n 1635 |     else if (!_cups_strcasecmp(line, \"ServerName\") && value)\n 1636 |       cups_set_server_name(cc, value);\n 1637 | #endif // !__APPLE__\n 1638 |     else if (!_cups_strcasecmp(line, \"User\") && value)\n 1639 |       cups_set_user(cc, value);\n 1640 |     else if (!_cups_strcasecmp(line, \"UserAgentTokens\") && value)\n 1641 |       cups_set_uatokens(cc, value);","lines":20,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/usersys.c#L1622-L1641"},{"ref":"cups/usersys.c:1707-1731","code":" 1707 |   if (!_cups_strcasecmp(value, \"DenyMD5\"))\n 1708 |     cc->digestoptions = _CUPS_DIGESTOPTIONS_DENYMD5;\n 1709 |   else if (!_cups_strcasecmp(value, \"None\"))\n 1710 |     cc->digestoptions = _CUPS_DIGESTOPTIONS_NONE;\n 1711 | }\n 1712 | \n 1713 | \n 1714 | //\n 1715 | // 'cups_set_encryption()' - Set the Encryption value.\n 1716 | //\n 1717 | \n 1718 | static void\n 1719 | cups_set_encryption(\n 1720 |     _cups_client_conf_t *cc,\t\t// I - client.conf values\n 1721 |     const char          *value)\t\t// I - Value\n 1722 | {\n 1723 |   if (!_cups_strcasecmp(value, \"never\"))\n 1724 |     cc->encryption = HTTP_ENCRYPTION_NEVER;\n 1725 |   else if (!_cups_strcasecmp(value, \"always\"))\n 1726 |     cc->encryption = HTTP_ENCRYPTION_ALWAYS;\n 1727 |   else if (!_cups_strcasecmp(value, \"required\"))\n 1728 |     cc->encryption = HTTP_ENCRYPTION_REQUIRED;\n 1729 |   else\n 1730 |     cc->encryption = HTTP_ENCRYPTION_IF_REQUESTED;\n 1731 | }","lines":25,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/usersys.c#L1707-L1731"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"cupsDNSSDServicePublish() and other Avahi-path functions dereference service->dnssd / service->group without a NULL check on `service`. cupsDNSSDServicePublish() takes a service pointer and immediately calls avahi_lock(service->dnssd, ...) in the Avahi build with no range check, unlike most sibling functions (cupsDNSSDServiceDelete checks). A NULL service crashes.","fix":"Add `if (!service) return (false);` at the top of cupsDNSSDServicePublish() to match the range-checking convention of the other public functions.","locations":[{"ref":"cups/dnssd.c:1799-1822","code":" 1799 | bool\t\t\t\t\t// O - `true` on success, `false` on failure\n 1800 | cupsDNSSDServicePublish(\n 1801 |     cups_dnssd_service_t *service)\t// I - Service\n 1802 | {\n 1803 |   bool\t\tret = true;\t\t// Return value\n 1804 | \n 1805 | \n 1806 |   DEBUG_printf(\"cupsDNSSDServicePublish(service=%p)\", (void *)service);\n 1807 | \n 1808 | #if _WIN32\n 1809 |   (void)service;\n 1810 | #elif defined(HAVE_MDNSRESPONDER)\n 1811 |   (void)service;\n 1812 | #else // HAVE_AVAHI\n 1813 |   avahi_lock(service->dnssd, \"cupsDNSSDServicePublish\");\n 1814 | \n 1815 |   avahi_entry_group_commit(service->group);\n 1816 | \n 1817 |   avahi_unlock(service->dnssd, \"cupsDNSSDServicePublish\");\n 1818 | #endif // _WIN32\n 1819 | \n 1820 |   DEBUG_printf(\"2cupsDNSSDServicePublish: Returning %s.\", ret ? \"true\" : \"false\");\n 1821 |   return (ret);\n 1822 | }","lines":24,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dnssd.c#L1799-L1822"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"globals.c (Windows) uses getenv(\"USERPROFILE\") into snprintf %s without a NULL check; if USERPROFILE is unset, userprofile is NULL and the snprintf is undefined behavior (the POSIX path falls back to a temp dir, so the guarding is inconsistent).","fix":"Guard userprofile (and other getenv results used in snprintf) against NULL and fall back to a temp directory like the POSIX path.","locations":[{"ref":"cups/globals.c:282-286","code":"  282 |       const char\t*userprofile = getenv(\"USERPROFILE\");\n  283 | \t\t\t\t// User profile (home) directory\n  284 |       char\t*userptr;\t// Pointer into userconfig\n  285 | \n  286 |       snprintf(userconfig, sizeof(userconfig), \"%s/AppData/Local/cups\", userprofile);","lines":5,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/globals.c#L282-L286"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"httpPrintf() writes http->error on the overflow path (line 2082) without a NULL check on http, while every other accessor in this file guards http. More importantly, vsnprintf can return a negative value on encoding error; bytes is ssize_t and 'bytes > (ssize_t)(sizeof(buf)-1)' is false for negative, so a negative bytes falls through and is passed as (size_t)bytes to httpWrite2/http_write, producing a huge length.","fix":"Check 'if (bytes < 0 || bytes > (ssize_t)(sizeof(buf)-1))' and treat negative as an error; also null-check http before dereferencing it.","locations":[{"ref":"cups/http.c:2075-2099","code":" 2075 |   bytes = vsnprintf(buf, sizeof(buf), format, ap);\n 2076 |   va_end(ap);\n 2077 | \n 2078 |   DEBUG_printf(\"3httpPrintf: (\" CUPS_LLFMT \" bytes) %s\", CUPS_LLCAST bytes, buf);\n 2079 | \n 2080 |   if (bytes > (ssize_t)(sizeof(buf) - 1))\n 2081 |   {\n 2082 |     http->error = ENOMEM;\n 2083 |     return (-1);\n 2084 |   }\n 2085 |   else if (http->data_encoding == HTTP_ENCODING_FIELDS)\n 2086 |   {\n 2087 |     return ((int)httpWrite2(http, buf, (size_t)bytes));\n 2088 |   }\n 2089 |   else\n 2090 |   {\n 2091 |     if (http->wused)\n 2092 |     {\n 2093 |       DEBUG_puts(\"4httpPrintf: flushing existing data...\");\n 2094 | \n 2095 |       if (httpFlushWrite(http) < 0)\n 2096 | \treturn (-1);\n 2097 |     }\n 2098 | \n 2099 |     return ((int)http_write(http, buf, (size_t)bytes));","lines":25,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http.c#L2075-L2099"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"httpSetDefaultField() dereferences http_fields[field] in its DEBUG_printf before validating that field is in range (the field <= HTTP_FIELD_UNKNOWN || field >= HTTP_FIELD_MAX check happens on the next line). In DEBUG builds an out-of-range field index causes an out-of-bounds read of the http_fields[] array. The same pattern appears in httpSetField().","fix":"Move the range check above the DEBUG_printf, or guard the array access with a bounds check before indexing http_fields[field].","locations":[{"ref":"cups/http.c:2680-2683","code":" 2680 |   DEBUG_printf(\"httpSetDefaultField(http=%p, field=%d(%s), value=\\\"%s\\\")\", (void *)http, field, http_fields[field], value);\n 2681 | \n 2682 |   if (!http || field <= HTTP_FIELD_UNKNOWN || field >= HTTP_FIELD_MAX)\n 2683 |     return;","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http.c#L2680-L2683"},{"ref":"cups/http.c:2762-2765","code":" 2762 |   DEBUG_printf(\"httpSetField(http=%p, field=%d(%s), value=\\\"%s\\\")\", (void *)http, field, http_fields[field], value);\n 2763 | \n 2764 |   if (!http || field <= HTTP_FIELD_UNKNOWN || field >= HTTP_FIELD_MAX || !value)\n 2765 |     return;","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http.c#L2762-L2765"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"http_send() indexes codes[request] in its very first DEBUG_printf (line 4350) before the http==NULL/uri==NULL check, and codes[] contains NULL entr ipp->state = IPP_STATE_IDLE;\n 4208 | \n 4209 |   return (ippWriteIO(&fd, (ipp_iocb_t)ipp_write_file, 1, NULL, ipp));","lines":9,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ipp.c#L4201-L4209"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"cups_unquote: when a backslash is the last character before the terminating NUL, the code advances s past the NUL after copying it, so the outer while(*s) loop reads one byte beyond the string end (out-of-bounds read).","fix":"After advancing past a backslash, break/return if *s == '\\0' instead of falling through and advancing past the NUL.","locations":[{"ref":"cups/language.c:1221-1248","code":" 1221 |     if (*s == '\\\\')\n 1222 |     {\n 1223 |       s ++;\n 1224 |       if (isdigit(*s))\n 1225 |       {\n 1226 | \t*d = 0;\n 1227 | \n 1228 | \twhile (isdigit(*s))\n 1229 | \t{\n 1230 | \t  *d = *d * 8 + *s - '0';\n 1231 | \t  s ++;\n 1232 | \t}\n 1233 | \n 1234 | \td ++;\n 1235 |       }\n 1236 |       else\n 1237 |       {\n 1238 | \tif (*s == 'n')\n 1239 | \t  *d ++ = '\\n';\n 1240 | \telse if (*s == 'r')\n 1241 | \t  *d ++ = '\\r';\n 1242 | \telse if (*s == 't')\n 1243 | \t  *d ++ = '\\t';\n 1244 | \telse\n 1245 | \t  *d++ = *s;\n 1246 | \n 1247 | \ts ++;\n 1248 |       }","lines":28,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/language.c#L1221-L1248"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In ppd_read(), after trimming trailing whitespace the code dereferences *strptr without confirming the trimmed string is non-empty. If the value after ':' is all whitespace, strptr is decremented to lineptr-1 and 'if (*strptr == '\\\"')' reads one byte before the buffer start (lineptr[-1]). A 1-byte out-of-bounds read on a heap buffer driven by untrusted PPD content.","fix":"Guard the quote check: 'if (strptr >= lineptr && *strptr == '\\\"')' (and only adjust lineptr when the string is non-empty).","locations":[{"ref":"cups/ppd.c:3382-3394","code":" 3382 |       strptr = lineptr + strlen(lineptr) - 1;\n 3383 |       while (strptr >= lineptr && _cups_isspace(*strptr))\n 3384 |         *strptr-- = '\\0';\n 3385 | \n 3386 |       if (*strptr == '\\\"')\n 3387 |       {\n 3388 |        /*\n 3389 |         * Quoted string by itself, remove quotes...\n 3390 | \t*/\n 3391 | \n 3392 |         *strptr = '\\0';\n 3393 | \tlineptr ++;\n 3394 |       }","lines":13,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ppd.c#L3382-L3394"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"cupsUTF8ToCharset ISO-8859-1/ASCII fast path reads `*src` and, for a 2-byte sequence, `*src++` again after testing `(*src & 0xc0) == 0x80`. If the input ends with a lead byte 0xC0-0xDF immediately followed by the NUL terminator, the inner test `(*src & 0xc0) == 0x80` is false (NUL), so no second read occurs - safe. But for a 3/4-byte lead byte at end of string the code writes '?' and does NOT consume the continuation bytes, so the loop re-reads them as fresh lead bytes; malformed trailing bytes are emitted as separate '?'s rather than one. Minor incorrect handling of truncated multibyte sequences.","fix":"After emitting '?' for a 3/4-byte lead, advance src past the expected continuation bytes (bounded by NUL) so a truncated sequence is counted as one replacement character.","locations":[{"ref":"cups/transcode.c:242-266","code":"  242 |     while (*src && destptr < destend)\n  243 |     {\n  244 |       ch = *src++;\n  245 | \n  246 |       if ((ch & 0xe0) == 0xc0 && (*src & 0xc0) == 0x80)\n  247 |       {\n  248 |         // 2-byte UTF-8\n  249 | \tch = ((ch & 0x1f) << 6) | (*src++ & 0x3f);\n  250 | \n  251 | \tif (ch < maxch)\n  252 |           *destptr++ = (char)ch;\n  253 | \telse\n  254 |           *destptr++ = '?';\n  255 |       }\n  256 |       else if ((ch & 0xf0) == 0xe0 || (ch & 0xf8) == 0xf0)\n  257 |       {\n  258 |         // 3-byte or 4-byte UTF-8\n  259 |         *destptr++ = '?';\n  260 |       }\n  261 |       else if (!(ch & 0x80))\n  262 |       {\n  263 |         // ASCII\n  264 | \t*destptr++ = (char)ch;\n  265 |       }\n  266 |     }","lines":25,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/transcode.c#L242-L266"}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"copy_banner() reads job->attrs->attrs->next->values[0].string.text assuming the job request always has at least a second attribute (attributes-natural-language). This is normally guaranteed by cupsdProcessIPPRequest validation, but copy_banner is also called from cupsdTimeoutJob() after cupsdLoadJob() loads job attributes from disk; a job file with fewer than two attributes (e.g. corrupted/crafted spool file) would cause a NULL dereference.","fix":"Validate that job->attrs->attrs and job->attrs->attrs->next are non-NULL (and use ippGetName/ippGetString accessors) before copying the language value into attrname.","locations":[{"ref":"scheduler/ipp.c:4037-4038","code":" 4037 |   cupsCopyString(attrname, job->attrs->attrs->next->values[0].string.text,\n 4038 |           sizeof(attrname));","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L4037-L4038"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"_httpTLSStop() frees the SSL_CTX before freeing the SSL object. The SSL object holds a reference to its SSL_CTX; the correct OpenSSL order is SSL_free() first (which drops the SSL's reference to the CTX), then SSL_CTX_free(). Freeing the CTX while the live SSL still references it risks use-after-free.","fix":"Reorder to SSL_shutdown(); SSL_free(http->tls); SSL_CTX_free(context);.","locations":[{"ref":"cups/tls-openssl.c:2040-2052","code":" 2040 | void\n 2041 | _httpTLSStop(http_t *http)\t\t// I - Connection to server\n 2042 | {\n 2043 |   SSL_CTX\t*context;\t\t// Context for encryption\n 2044 | \n 2045 | \n 2046 |   context = SSL_get_SSL_CTX(http->tls);\n 2047 | \n 2048 |   SSL_shutdown(http->tls);\n 2049 |   SSL_CTX_free(context);\n 2050 |   SSL_free(http->tls);\n 2051 | \n 2052 |   http->tls = NULL;","lines":13,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L2040-L2052"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In cupsAdminSetServerSettings, after opening cupsd.conf into `cupsd`, if the subsequent cupsAdminGetServerSettings call fails the function returns 0 without calling cupsFileClose(cupsd), leaking the open file handle.","fix":"Call cupsFileClose(cupsd) (and unlink the temp file if remote) before the early return.","locations":[{"ref":"cups/adminutil.c:481-496","code":"  481 |     if ((cupsd = cupsFileOpen(cupsdconf, \"r\")) == NULL)\n  482 |     {\n  483 |       _cupsSetError(IPP_STATUS_ERROR_INTERNAL, NULL, 0);\n  484 |       return (0);\n  485 |     }\n  486 |   }\n  487 |   else\n  488 |     return (0);\n  489 | \n  490 |  /*\n  491 |   * Get current settings...\n  492 |   */\n  493 | \n  494 |   if (!cupsAdminGetServerSettings(http, &cupsd_num_settings,\n  495 | \t\t\t\t  &cupsd_settings))\n  496 |     return (0);","lines":16,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/adminutil.c#L481-L496"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"cups_globals_alloc always strdup()s cg->userconfig, but cups_globals_free (which frees it and the globals) is only compiled when HAVE_PTHREAD_H || _WIN32, and even on pthread builds the destructor only runs for non-main threads. On a build with neither threading model, and for the main thread generally, the globals and userconfig leak for the process lifetime.","fix":"Provide a cups_globals_free path (atexit/main-thread cleanup) for all build configurations, or document the single-allocation-per-process intent and ensure userconfig is always freed when globals are freed.","locations":[{"ref":"cups/globals.c:356-363","code":"  356 |     cg->userconfig = strdup(cg->sysconfig);\n  357 |     return (cg);\n  358 |   }\n  359 |   else if (cups_userconfig)\n  360 |   {\n  361 |     // Use the value of the CUPS_USERCONFIG environment variable...\n  362 |     cg->userconfig = strdup(cups_userconfig);\n  363 |     return (cg);","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/globals.c#L356-L363"},{"ref":"cups/globals.c:433-476","code":"  433 | #if defined(HAVE_PTHREAD_H) || defined(_WIN32)\n  434 | static void\n  435 | cups_globals_free(_cups_globals_t *cg)\t/* I - Pointer to global data */\n  436 | {\n  437 |   _cups_buffer_t\t*buffer,\t/* Current read/write buffer */\n  438 | \t\t\t*next;\t\t/* Next buffer */\n  439 | \n  440 | \n  441 |   if (cg->last_status_message)\n  442 |     _cupsStrFree(cg->last_status_message);\n  443 | \n  444 |   for (buffer = cg->cups_buffers; buffer; buffer = next)\n  445 |   {\n  446 |     next = buffer->next;\n  447 |     free(buffer);\n  448 |   }\n  449 | \n  450 |   cupsArrayDelete(cg->leg_size_lut);\n  451 |   cupsArrayDelete(cg->ppd_size_lut);\n  452 |   cupsArrayDelete(cg->pwg_size_lut);\n  453 | \n  454 |   httpClose(cg->http);\n  455 | \n  456 |   _httpFreeCredentials(cg->credentials);\n  457 | \n  458 |   cupsFileClose(cg->stdio_files[0]);\n  459 |   cupsFileClose(cg->stdio_files[1]);\n  460 |   cupsFileClose(cg->stdio_files[2]);\n  461 | \n  462 |   cupsArrayDelete(cg->browse_domains);\n  463 |   cupsArrayDelete(cg->filter_location_array);\n  464 |   if (cg->filter_location_regex)\n  465 |   {\n  466 |     regfree(cg->filter_location_regex);\n  467 |     free(cg->filter_location_regex);\n  468 |   }\n  469 | \n  470 |   cupsFreeOptions(cg->cupsd_num_settings, cg->cupsd_settings);\n  471 | \n  472 |   free(cg->userconfig);\n  473 |   free(cg->raster_error.start);\n  474 |   free(cg);\n  475 | }\n  476 | #endif /* HAVE_PTHREAD_H || _WIN32 */","lines":44,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/globals.c#L433-L476"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"_httpFreeCredentials() frees hcreds->certs and hcreds but never frees hcreds->key (the EVP_PKEY loaded in _httpCreateCredentials). Every client-credential lifecycle leaks a private-key object.","fix":"Free the key before freeing the struct: `if (hcreds->key) EVP_PKEY_free(hcreds->key);`.","locations":[{"ref":"cups/tls-openssl.c:1611-1626","code":" 1611 | void\n 1612 | _httpFreeCredentials(\n 1613 |     _http_tls_credentials_t *hcreds)\t// I - Internal credentials\n 1614 | {\n 1615 |   if (!hcreds)\n 1616 |     return;\n 1617 | \n 1618 |   if (hcreds->use)\n 1619 |     hcreds->use --;\n 1620 | \n 1621 |   if (hcreds->use)\n 1622 |     return;\n 1623 | \n 1624 |   sk_X509_free(hcreds->certs);\n 1625 |   free(hcreds);\n 1626 | }","lines":16,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L1611-L1626"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"cups_create_localizations() leaks the message catalog array on the alternate-host path. When httpConnect2() succeeds but cupsTempFile2() fails (or the GET does not return HTTP_STATUS_OK), dinfo->localizations is never assigned, so subsequent callers re-invoke cups_create_localizations() on every call (it only short-circuits when dinfo->localizations is non-NULL). This is a repeated-work/again-and-again behavior rather than a one-time leak, but combined with the early returns at lines 478, 491 it means localizations stays NULL and the function keeps re-connecting/re-fetching.","fix":"On every exit path of cups_create_localizations(), ensure dinfo->localizations is set to at least an empty catalog (_cupsMessageNew(NULL)) so the function is not retried indefinitely.","locations":[{"ref":"cups/dest-localization.c:474-518","code":"  474 |     if ((http2 = httpConnect2(hostname, port, NULL, AF_UNSPEC, encryption, 1,\n  475 |                               30000, NULL)) == NULL)\n  476 |     {\n  477 |       DEBUG_printf(\"4cups_create_localizations: Unable to connect to %s:%d: %s\", hostname, port, cupsGetErrorString());\n  478 |       return;\n  479 |     }\n  480 |   }\n  481 | \n  482 |  /*\n  483 |   * Get a temporary file...\n  484 |   */\n  485 | \n  486 |   if ((temp = cupsTempFile2(tempfile, sizeof(tempfile))) == NULL)\n  487 |   {\n  488 |     DEBUG_printf(\"4cups_create_localizations: Unable to create temporary file: %s\", cupsGetErrorString());\n  489 |     if (http2 != http)\n  490 |       httpClose(http2);\n  491 |     return;\n  492 |   }\n  493 | \n  494 |   status = cupsGetFd(http2, resource, cupsFileNumber(temp));\n  495 |   cupsFileClose(temp);\n  496 | \n  497 |   DEBUG_printf(\"4cups_create_localizations: GET %s = %s\", resource, httpStatusString(status));\n  498 | \n  499 |   if (status == HTTP_STATUS_OK)\n  500 |   {\n  501 |    /*\n  502 |     * Got the file, read it...\n  503 |     */\n  504 | \n  505 |     dinfo->localizations = _cupsMessageLoad(NULL, tempfile, _CUPS_MESSAGE_STRINGS);\n  506 |   }\n  507 | \n  508 |   DEBUG_printf(\"4cups_create_localizations: %d messages loaded.\", cupsArrayCount(dinfo->localizations));\n  509 | \n  510 |  /*\n  511 |   * Cleanup...\n  512 |   */\n  513 | \n  514 |   unlink(tempfile);\n  515 | \n  516 |   if (http2 != http)\n  517 |     httpClose(http2);\n  518 | }","lines":45,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dest-localization.c#L474-L518"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"gnutls_load_crl() calls gnutls_x509_crl_init(&tls_crl) unconditionally on every invocation with no guard; a second call overwrites and leaks the previously allocated tls_crl.","fix":"Guard re-initialization, e.g. return early if tls_crl is already set.","locations":[{"ref":"cups/tls-gnutls.c:2237-2239","code":" 2237 |   cupsMutexLock(&tls_mutex);\n 2238 | \n 2239 |   if (!gnutls_x509_crl_init(&tls_crl))","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L2237-L2239"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"create_local_bg_thread() opens an HTTP connection but only calls httpClose(http) on the single success path at line 5306. Every error path that uses 'goto finish_response' after the connection is established (e.g. media attribute missing 5279-5291, ippValidateAttributes failure 5294-5304, PPD open/create failures 5331-5369, _ppdCreateFromIPP failure 5400-5411) skips httpClose, leaking the http_t connection object and its socket for the lifetime of the (long-lived) cupsd process. Repeated failing CUPS-Create-Local-Printer / everywhere driver requests accumulate leaked connections.","fix":"Close the connection in the finish_response cleanup block (track http and call httpClose(http) there) instead of only on the success path, or close it on each error path.","locations":[{"ref":"scheduler/ipp.c:5194-5306","code":" 5194 |   if ((http = httpConnectURI(device_uri, host, sizeof(host), &port, resource, sizeof(resource), /*blocking*/true, /*msec*/30000, /*cancel*/NULL, /*require_ca*/false)) == NULL)\n 5195 |   {\n 5196 |     cupsdLogPrinter(printer, CUPSD_LOG_ERROR, \"Unable to connect to '%s': %s\", device_uri, cupsGetErrorString());\n 5197 | \n 5198 |     /* Force printer to timeout
