lement == num_values grows the value array by exactly one which is intended, but passing a larger element is rejected only by the '> num_values' guards in the public setters - ipp_set_value itself does not bound element, so any internal caller passing a large element triggers an unbounded single realloc and writes at temp->values+element, a potential out-of-bounds if a future caller omits the guard.","fix":"Have ipp_set_value validate that element is within a sane bound (e.g. <= num_values) and fail otherwise, instead of relying on every public caller to pre-validate.","locations":[{"ref":"cups/ipp.c:6028-6123","code":" 6028 | static _ipp_value_t *\t\t\t// O  - IPP value element or NULL on error\n 6029 | ipp_set_value(ipp_t           *ipp,\t// IO - IPP message\n 6030 |               ipp_attribute_t **attr,\t// IO - IPP attribute\n 6031 |               int             element)\t// I  - Value number (`0`-based)\n 6032 | {\n 6033 |   ipp_attribute_t\t*temp,\t\t// New attribute pointer\n 6034 | \t\t\t*current,\t// Current attribute in list\n 6035 | \t\t\t*prev;\t\t// Previous attribute in list\n 6036 |   int\t\t\talloc_values;\t// Allocated values\n 6037 | \n 6038 | \n 6039 |   // If we are setting an existing value element, return it...\n 6040 |   temp = *attr;\n 6041 | \n 6042 |   if (temp->num_values <= 1)\n 6043 |     alloc_values = 1;\n 6044 |   else\n 6045 |     alloc_values = (temp->num_values + IPP_MAX_VALUES - 1) & ~(IPP_MAX_VALUES - 1);\n 6046 | \n 6047 |   if (element < alloc_values)\n 6048 |   {\n 6049 |     if (element >= temp->num_values)\n 6050 |       temp->num_values = element + 1;\n 6051 | \n 6052 |     return (temp->values + element);\n 6053 |   }\n 6054 | \n 6055 |   // Otherwise re-allocate the attribute - we allocate in groups of\n 6056 |   // IPP_MAX_VALUE values when num_values > 1.\n 6057 |   if (alloc_values < IPP_MAX_VALUES)\n 6058 |     alloc_values = IPP_MAX_VALUES;\n 6059 |   else\n 6060 |     alloc_values += IPP_MAX_VALUES;\n 6061 | \n 606        {\n  978 |               // 3-byte UTF-8\n  979 |               *ptr++ = (char)(0xe0 | (ch >> 12));\n  980 |               *ptr++ = (char)(0x80 | ((ch >> 6) & 0x3f));\n  981 |               *ptr++ = (char)(0x80 | (ch & 0x3f));\n  982 |             }","lines":19,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/json.c#L964-L982"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In cupsJSONImportString, the array-close (']') branch does parent = parent->parent without the NULL check that the object-close branch has, so a top-level stray ']' can leave parent NULL and the next loop iteration dereferences parent->type (NULL deref).","fix":"Mirror the object-close handling: after parent = parent->parent, break out of the loop if parent is NULL.","locations":[{"ref":"cups/json.c:1077-1080","code":" 1077 |       parent = parent->parent;\n 1078 |       count  = cupsJSONGetCount(parent);\n 1079 |       prev   = NULL;\n 1080 |       s ++;","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/json.c#L1077-L1080"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"cups_unquote's octal-escape parser uses isdigit (accepting 8 and 9) rather than an octal check and consumes an unbounded number of digits, computing *d = *d * 8 + *s - '0' in a signed char, so sequences like \\999 produce wrong values and can overflow the char. Standard C octal escapes are at most 3 digits and only 0-7.","fix":"Limit to at most 3 octal digits and accept only '0'-'7'; compute into an int and cast.","locations":[{"ref":"cups/language.c:1224-1235","code":" 1224 |       if (isdigit(*s))\n 1225 |       {\n 1226 | \t*d = 0;\n 1227 | \n 1228 | \twhile (isdigit(*s))\n 1229 | \t{\n 1230 | \t  *d = *d * 8 + *s - '0';\n 1231 | \t  s ++;\n 1232 | \t}\n 1233 | \n 1234 | \td ++;\n 1235 |       }","lines":12,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/language.c#L1224-L1235"}]},{"id":"LOGIC_35","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In cupsOAuthGetTokens(), at_hash validation compares only 16 bytes and requires at_hash_bytes == 16. For an ES384/RS384 (SHA-384) or 512 id_token the at_hash is the left-most half of a SHA-384/512 digest (24/32 bytes), but the code always hashes the access_token with sha2-256 and compares 16 bytes, so the at_hash check is only correct for SHA-256 tokens and will spuriously fail (goto done, discarding valid tokens) for SHA-384/512 signed id_tokens.","fix":"Select the hash algorithm and compared length based on the id_token's signature algorithm (cupsJWTGetAlgorithm) per the OIDC at_hash spec.","locations":[{"ref":"cups/oauth.c:1377-1391","code":" 1377 |     if (access_value && (at_hash = cupsJWTGetClaimString(jwt, \"at_hash\")) != NULL)\n 1378 |     {\n 1379 |       unsigned char sha256[32],\t\t// Hash of the access_token value\n 1380 | \t\tat_hash_buffer[32];\t// at_hash bytes\n 1381 |       size_t\tat_hash_bytes = sizeof(at_hash_buffer);\n 1382 | \t\t      \t\t\t// Number of at_hash bytes\n 1383 | \n 1384 |       cupsHashData(\"sha2-256\", access_value, strlen(access_value), sha256, sizeof(sha256));\n 1385 |       httpDecode64_3((char *)at_hash_buffer, &at_hash_bytes, at_hash, /*end*/NULL);\n 1386 |       if (at_hash_bytes != 16 || memcmp(sha256, at_hash_buffer, 16))\n 1387 |       {\n 1388 |         DEBUG_puts(\"1cupsOAuthGetTokens: at_hash doesn't match SHA-256 of access_token.\");\n 1389 |         goto done;\n 1390 |       }\n 1391 |     }","lines":15,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/oauth.c#L1377-L1391"}]},{"id":"LOGIC_36","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The boolean 'no' prefix han ,"type_label":"Logic Error","severity":"medium","easy":true,"description":"Tautological value-tag test plus wrong attribute in preset 'add as-is' branch. The condition 'ippGetValueTag(attr) == IPP_TAG_BOOLEAN || ippGetValueTag(attr) != IPP_TAG_INTEGER || ippGetValueTag(attr) != IPP_TAG_KEYWORD' is always true (no tag can equal both INTEGER and KEYWORD, so one of the != tests always holds). It also inspects 'attr' (the outer job-presets-supported attribute) while the body stringifies 'member'. The value-tag filter does nothing and the validation targets the wrong attribute.","fix":"Use member and AND the intended tags: 'else if (ippValidateAttribute(member) && (ippGetValueTag(member) == IPP_TAG_BOOLEAN || ippGetValueTag(member) == IPP_TAG_INTEGER || ippGetValueTag(member) == IPP_TAG_KEYWORD))'.","locations":[{"ref":"cups/ppd-cache.c:5118-5125","code":" 5118 |         else if (ippValidateAttribute(attr) && (ippGetValueTag(attr) == IPP_TAG_BOOLEAN || ippGetValueTag(attr) != IPP_TAG_INTEGER || ippGetValueTag(attr) != IPP_TAG_KEYWORD))\n 5119 |         {\n 5120 |          /*\n 5121 |           * Add attribute name and value as-is...\n 5122 |           */\n 5123 | \n 5124 |           ippAttributeString(member, member_value, sizeof(member_value));\n 5125 |           cupsFilePrintf(fp, \"*%s %s\\n\", member_name, member_value);","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ppd-cache.c#L5118-L5125"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Double localization lookup in ppdLocalizeIPPReason() fallback. 'message' is already the localized string returned by _cupsLangString(lang, msgid); the code then passes that localized text back into _cupsLangString(lang, message) when copying into the buffer. The second lookup will not find 'message' as a message id and returns it unchanged only by luck; the intent was to copy 'message' directly.","fix":"Copy the already-resolved string: 'cupsCopyString(buffer, message, bufsize);'.","locations":[{"ref":"cups/ppd-localize.c:280-285","code":"  280 |       message = _cupsLangString(lang, msgid);\n  281 | \n  282 |       if (message && strcmp(message, msgid))\n  283 |       {\n  284 |         cupsCopyString(buffer, _cupsLangString(lang, message), bufsize);\n  285 | \treturn (buffer);","lines":6,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ppd-localize.c#L280-L285"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"setpagedevice's unknown-name skip loop 'while (obj[1].type != CUPS_PS_NAME && obj < end) obj ++;' dereferences obj[1] BEFORE checking obj < end. When obj == end-1 the loop reads obj[1] == end (one past the meaningful range) and, more importantly, the bound check order means it can advance obj past end and read obj[1] beyond the stack region. The condition order should be reversed so the bound is tested first.","fix":"Test the bound before the dereference: 'while (obj < end && obj[1].type != CUPS_PS_NAME) obj ++;'.","locations":[{"ref":"cups/raster-interpret.c:1625-1626","code":" 1625 |       while (obj[1].type != CUPS_PS_NAME && obj < end)\n 1626 |         obj ++;","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/raster-interpret.c#L1625-L1626"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In cupsRasterInitHeader the sheet_back handling for the non-tumble case is mis-parenthesized: the condition '(!strcmp(sheet_back, \"manual-tumble\") && h->Tumble) || (!strcmp(sheet_back, \"rotated\") || !h->Tumble)' always evaluates true whenever Tumble is 0 (because of the trailing '|| !h->Tumble'), so ANY sheet_back string that is not 'flipped' (including invalid values) silently takes the rotate transform branch instead of falling throu eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/request.c#L652-L657"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"cupsWriteRequestData decides whether to poll for a server response using the heuristic '(wused > 0 && (size_t)http->wused == length)'. This triggers only in the narrow coincidence that post-write buffer occupancy exactly equals the just-written length, which is not a reliable flush signal, so a mid-stream server error/close can be missed until a later write fails.","fix":"Detect an actual flush (buffer became full or wused decreased) rather than the coincidental equality, or always probe with _httpWait after a flush.","locations":[{"ref":"cups/request.c:967-996","code":"  967 |   if (length >= HTTP_MAX_BUFFER ||\n  968 |       http->wused < wused ||\n  969 |       (wused > 0 && (size_t)http->wused == length))\n  970 |   {\n  971 |    /*\n  972 |     * We've written something to the server, so check for response data...\n  973 |     */\n  974 | \n  975 |     if (_httpWait(http, 0, 1))\n  976 |     {\n  977 |       http_status_t\tstatus;\t\t/* Status from _httpUpdate */\n  978 | \n  979 |       _httpUpdate(http, &status);\n  980 |       if (status >= HTTP_STATUS_MULTIPLE_CHOICES)\n  981 |       {\n  982 |         _cupsSetHTTPError(http, status);\n  983 | \n  984 | \tdo\n  985 | \t{\n  986 | \t  status = httpUpdate(http);\n  987 | \t}\n  988 | \twhile (status != HTTP_STATUS_ERROR && http->state == HTTP_STATE_POST_RECV);\n  989 | \n  990 |         httpFlush(http);\n  991 |       }\n  992 | \n  993 |       DEBUG_printf(\"1cupsWriteRequestData: Returning %d.\\n\", status);\n  994 |       return (status);\n  995 |     }\n  996 |   }","lines":30,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/request.c#L967-L996"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Windows cupsThreadCreate: ong)timeout, nsec=(long)(1e9*(timeout-sec)), then add to the clock_gettime result.","locations":[{"ref":"cups/thread.c:455-468","code":"  455 |   if (timeout > 0.0)\n  456 |   {\n  457 |     struct timespec abstime;\t\t// Timeout\n  458 | \n  459 |     clock_gettime(CLOCK_REALTIME, &abstime);\n  460 | \n  461 |     abstime.tv_sec  += (long)timeout;\n  462 |     abstime.tv_nsec += (long)(1000000000.0 * (timeout - (double)abstime.tv_sec));\n  463 | \n  464 |     while (abstime.tv_nsec >= 1000000000)\n  465 |     {\n  466 |       abstime.tv_nsec -= 1000000000;\n  467 |       abstime.tv_sec ++;\n  468 |     };","lines":14,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/thread.c#L455-L468"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"cupsCharsetToUTF8 ISO-8859-1 fast path sets destend = dest + maxout - 2 and writes up to two bytes per input char, but the loop condition `destptr < destend` is checked only once per iteration; when destptr == destend-1 and the next char is >=128, two bytes are written, reaching destend, then `*destptr = '\\0'` writes at destend which is dest+maxout-2+? - within bounds, but a char needing 2 bytes when destptr==destend-1 writes to destend-1 and destend (== dest+maxout-2 and dest+maxout-1), then NUL at dest+maxout-1 overwrites. Off-by-one risk: the -2 slack assumes worst case but the terminator placement after a 2-byte write at the boundary can leave an incomplete sequence or overwrite the second byte.","fix":"After writing a 2-byte sequence, re-check the destptr bound before the next iteration and ensure the NUL terminator never overwrites a needed byte; verify the -2 slack covers the terminator plus a full 2-byte sequence.","locations":[{"ref":"cups/transcode.c:118-135","code":"  118 |     destend = dest + maxout - 2;\n  119 | \n  120 |     while (*src && destptr < destend)\n  121 |     {\n  122 |       ch = *src++ & 255;\n  \n  699 |     // Copy the data to a C string...\n  700 |     memcpy(key, txtptr, keylen);\n  701 |     key[keylen] = '\\0';\n  702 | \n  703 |     if ((value = strchr(key, '=')) != NULL)\n  704 |     {\n  705 |       // Got value separator, add it...\n  706 |       *value++ = '\\0';\n  707 | \n  708 |       num_txt = cupsAddOption(key, value, num_txt, txt);\n  709 |     }\n  710 |     else\n  711 |     {\n  712 |       // No value, stop...\n  713 |       break;\n  714 |     }\n  715 |   }","lines":24,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dnssd.c#L692-L715"}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"hash_data's HMAC block-size selection uses strncmp(algorithm, \"sha2-512\", 8), which also matches names like 'sha2-512-224'/'sha2-512-256'; this prefix match is inconsistent with the exact strcmp dispatch used elsewhere and is a latent correctness trap.","fix":"Use exact strcmp for the block-size decision to match the algorithm dispatch and avoid accidental prefix matches.","locations":[{"ref":"cups/hash.c:147","code":"  147 |   if (!strcmp(algorithm, \"sha2-384\") || !strncmp(algorithm, \"sha2-512\", 8))","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/hash.c#L147"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"http_tls_upgrade() does memcpy(&myhttp, http, sizeof(myhttp)) to shallow-copy the entire http_t (including all pointer members) onto the stack, runs an OPTIONS request that mutates http->fields/_fields, then restores only fields/_fields/data_* from myhttp. Any pointer field freed/reallocated during the OPTIONS exchange that is not among the restored members leaves myhttp holding a stale copy; the pattern is extremely fragile and silently depends on httpOptions/httpUpdate not touching other pointer members.","fix":" n 4624 |   http->digest_tries    = myhttp.digest_tries;\n 4625 |   http->tls_upgrade     = 0;","lines":44,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http.c#L4582-L4625"}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In parse_value the IPP_TAG_STRING octetString hex decoder bounds tempptr with 'tempptr < (temp + sizeof(temp))' while writing one byte per two input hex chars. Because each iteration also reads valueptr[1] without first confirming valueptr[1] exists when the '<...>' content has an odd inner length, the leading 'valuelen & 1' parity check on the WHOLE value (including the '<' and '>') is relied upon to guarantee even inner length; if value is e.g. \"<>\" valuelen is 2 (even) and the loop body is skipped, but for malformed input where the closing '>' is missing the isxdigit check on valueptr[1] reads the NUL terminator which is fine, yet the error path correctly reports. The subtle coupling between the outer parity check and inner pair reads is fragile and undocumented.","fix":"Validate inner content length and the presence of valueptr[1] explicitly inside the loop rather than depending on the outer 'valuelen & 1' parity of the full quoted string.","locations":[{"ref":"cups/ipp-file.c:1798-1845","code":" 1798 |     case IPP_TAG_STRING :\n 1799 |         valuelen = strlen(value);\n 1800 | \n 1801 |         if (value[0] == '<' && value[strlen(value) - 1] == '>')\n 1802 |         {\n 1803 |           if (valuelen & 1)\n 1804 |           {\n 1805 | \t    report_error(file, \"Bad octetString value on line %d of '%s'.\", file->linenum, file->filename);\n 1806 | \t    return (false);\n 1807 |           }\n 1808 | \n 1809 |           valueptr = value + 1;\n 1810 |           tempptr  = temp;\n 1811 | \n 1812 |           while (*valueptr && *valueptr != '>' && tempptr < (temp + sizeof(temp)))\n 1813 |           {\n 1814 | \t    if (!isxdigit(valuept ity":"low","easy":false,"description":"ippGetString calls ippGetValueTag(attr) to compute 'tag' before the '!attr' NULL check on the next line. ippGetValueTag tolerates NULL (returns IPP_TAG_ZERO) so there is no crash, but the ordering is misleading and the explicit '!attr' test is effectively dead with respect to the tag computation.","fix":"Reorder to test '!attr' (and element bounds) before calling ippGetValueTag, or fold the NULL check into the same condition first.","locations":[{"ref":"cups/ipp.c:2390-2392","code":" 2390 |   tag = ippGetValueTag(attr);\n 2391 | \n 2392 |   if (!attr || element < 0 || element >= attr->num_values || (tag != IPP_TAG_TEXTLANG && tag != IPP_TAG_NAMELANG && (tag < IPP_TAG_TEXT || tag > IPP_TAG_MIMETYPE)))","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ipp.c#L2390-L2392"}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"cupsJWTImportString() limits inputs to a fixed 65536-byte stack buffer `data`. For the JSON (non-compact) format the Base64URL payload/header/signature values can each be larger; decoding silently fails or truncates rather than handling larger tokens, and a 64KB stack buffer is large for embedded use.","fix":"Document the size cap and reject over-large inputs explicitly, or allocate dynamically based on the decoded length.","locations":[{"ref":"cups/jwt.c:564","code":"  564 |   char\t\tdata[65536];\t\t// Data","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L564"}]},{"id":"LOGIC_62","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In cupsLangGet's Chinese region remap, the comparison uses the post-loop input cursor pointer rather than the parsed language name, so the HANS->CN / HANT->TW mapping almost never matches and is effectively dead code.","fix":"Compare against the parsed language name (e.g. !strcmp(langname, \"zh\")) rather than the input cursor.","locations":[{"ref":"cups/language.c:457-460","code":"  457 |       if (!strcmp(language, \"zh\") && !strcmp(country, \"HANS\"))\n  458 |         cupsCopyString(country, \"CN\", sizeof(country));\n  459 |       if (!strcmp(language, \"zh\") && !strcmp(country, \"HANT\"))\n  460 |         cupsCopyString(country, \"TW\", sizeof(country));","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/language.c#L457-L460"}]},{"id":"LOGIC_63","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"cupsOAuthMakeAuthorizationURL() checks oauth_metadata_contains(metadata, \"response_type_supported\", ...). The correct RFC 8414 / OpenID metadata field is \"response_types_supported\" (plural). The misspelled key never matches, so the 'code id_token' response type is never selected even when the server supports it; it always falls back to 'code'.","fix":"Use the correct metadata key name \"response_types_supported\".","locations":[{"ref":"cups/oauth.c:1609","code":" 1609 |   if (oauth_metadata_contains(metadata, \"response_type_supported\", \"code id_token\"))","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/oauth.c#L1609"}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"pwg_scan_measurement computes the integer portion as 'value = value * 10 + digit' with value as int and no overflow check; a long all-digit dimension string from an untrusted PPD/PWG media name overflows the int (undefined behavior) before the final 'value * numer / denom' which can also overflow. These dimensions flow into media width/length used elsewhere.","fix":"Bound the number of digits scanned or use a wider accumulator and clamp to a reasonable maximum, returning a sentinel on overflow.","locations":[{"ref":"cups/pwg-media.c:1197-1235"," ounds: stop the loop at dst + dstsize - 2 so that dstptr[1] always lands at or before dst[dstsize-1], or write the -1 terminator at *dstptr after the loop.","locations":[{"ref":"cups/snmp.c:484-511","code":"  484 |   for (dstend = dst + dstsize - 1, dstptr = dst, *dstptr = 0;\n  485 |        *src && dstptr < dstend;\n  486 |        src ++)\n  487 |   {\n  488 |     if (*src == '.' && src[1])\n  489 |     {\n  490 |       dstptr ++;\n  491 |       *dstptr = 0;\n  492 |     }\n  493 |     else if (isdigit(*src & 255))\n  494 |     {\n  495 |       if ((*dstptr * 10 + *src - '0') > 0xffff)\n  496 |         break;\n  497 | \n  498 |       *dstptr = *dstptr * 10 + *src - '0';\n  499 |     }\n  500 |     else\n  501 |       break;\n  502 |   }\n  503 | \n  504 |   if (*src)\n  505 |     return (NULL);\n  506 | \n  507 |  /*\n  508 |   * Terminate the end of the OID array and return...\n  509 |   */\n  510 | \n  511 |   dstptr[1] = -1;","lines":28,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/snmp.c#L484-L511"}]},{"id":"LOGIC_66","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"asn1_decode_snmp treats a zero length as an error for most fields, but the value-length test 'if ((length = asn1_get_length(...)) == 0 && object_type != NULL_VALUE && object_type != OCTET_STRING)' then falls through to the switch with length==0 for OCTET_STRING; asn1_get_string is called with length 0 which is fine, but for an OCTET_STRING the indefinite-length (length==0) case is silently accepted as an empty string while all other indefinite lengths are rejected, which is inconsistent with the SNMP framing the rest of the function enforces.","fix":"Document or unify the handling: if indefinite length is genuinely invalid, reject it for OCTET_STRING too; otherwise add a comment explaining why empty strings are permitted here.","locations":[{"ref":"cups/snmp.c:1001-1033","code":" 1001 | \t    if ((length =
