lob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/string.c#L1113-L1121"}]},{"id":"LOGIC_69","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"cupsCreateCredentials() defaults the country argument to 'US' when NULL but then sets the certificate country DN to the literal 'US' regardless of the caller-supplied country, silently discarding it (the CSR path uses country correctly).","fix":"Use country: gnutls_x509_crt_set_dn_by_oid(crt, GNUTLS_OID_X520_COUNTRY_NAME, 0, country, (unsigned)strlen(country));.","locations":[{"ref":"cups/tls-gnutls.c:268-272","code":"  268 |   if (!country)\n  269 |     country = \"US\";\n  270 | \n  271 |   gnutls_x509_crt_init(&crt);\n  272 |   gnutls_x509_crt_set_dn_by_oid(crt, GNUTLS_OID_X520_COUNTRY_NAME, 0, \"US\", 2);","lines":5,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L268-L272"}]},{"id":"LOGIC_70","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Certificate serial numbers are derived solely from time(NULL) (8 bytes). Two certificates created in the same second get identical, predictable serials. For the CA path (cupsSignCredentialsRequest) duplicate serials under the same issuer violate RFC 5280 uniqueness and can break revocation.","fix":"Add a random component (gnutls_rnd) to the serial, or combine time with random bytes/a counter.","locations":[{"ref":"cups/tls-gnutls.c:1141-1149","code":" 1141 |   curtime   = time(NULL);\n 1142 |   serial[0] = (unsigned char)(curtime >> 56);\n 1143 |   serial[1] = (unsigned char)(curtime >> 48);\n 1144 |   serial[2] = (unsigned char)(curtime >> 40);\n 1145 |   serial[3] = (unsigned char)(curtime >> 32);\n 1146 |   serial[4] = (unsigned char)(curtime >> 24);\n 1147 |   serial[5] = (unsigned char)(curtime >> 16);\n 1148 |   serial[6] = (unsigned char)(curtime >> 8);\n 1149 |   serial[7] = (unsigned char)(curtime);","lines":9,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L1141-L1149"},{"ref":"cups/tls-gnutls.c:250-258","code":"  250 |   curtime   = time(NULL);\n  251 |   serial[0] = (unsigned char)(curtime >> 56);\n  252 |   serial[1] = (unsigned char)(curtime >> 48);\n  253 |   serial[2] = (unsigned char)(curtime >> 40);\n  254 |   serial[3] = (unsigned char)(curtime >> 32);\n  255 |   serial[4] = (unsigned char)(curtime >> 24);\n  256 |   serial[5] = (unsigned char)(curtime >> 16);\n  257 |   serial[6] = (unsigned char)(curtime >> 8);\n  258 |   serial[7] = (unsigned char)(curtime);","lines":9,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L250-L258"}]},{"id":"LOGIC_71","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"cupsUTF32ToUTF8 detects a leading BOM with `swap = *src == 0xfffe0000` and skips a BOM when `*src == 0xfffe0000 || *src == 0xfeff`. The big-endian/inverted BOM constant 0xfffe0000 and the normal BOM 0xfeff are both checked, but a normal big-endian-stored BOM 0x0000feff (UTF-32BE) is not detected, and the byte-swap only swaps 24 of 32 bits (per the comment), so a true 4-byte byte-swap of code points needing the high byte is mishandled.","fix":"Handle all four UTF-32 BOM forms explicitly and perform a full 32-bit byte swap (the values are limited to 0x10ffff so the top byte is zero, but the swap expression should still be correct for the defined range).","locations":[{"ref":"cups/transcode.c:586-608","code":"  586 |   start = dest;\n  587 |   swap  = *src == 0xfffe0000;\n  588 | \n  589 |   DEBUG_printf(\"4cupsUTF32ToUTF8: swap=%d\", swap);\n  590 | \n  591 |   if (*src == 0xfffe0000 || *src == 0xfeff)\n  592 |     src ++;\n  593 | \n  594 |  /*\n  595 |   * Convert input UTF-32 to output UTF-8...\n  596 |   */\n  597 | \n  598 |   for (i = maxout - 1; *src && i > 0;)\n  599 |   {\n  600 |     ch = *src++;\n  601 | \n  602 |    /*\n  603 |     * Byte swap input UTF-32, if necessary...\n  604 |     * (only byte-swapping 24 of 32 bits)\n  605 |     */\n  606 | \n  607 |     if (swap)\n  608 |       ch = ((ch >> 24) | ((ch >> 8) & 0xff00) | ((ch << 8) & 0xff0000));","lines":23,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/transcode.c#L586-L608"}]},{"id":"LOGIC_72","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The tls_versions[] debug table has the last two entries both labeled 'TLS1.3' (indices 4 and 5), a copy-paste duplicate; if a future enum value is added without extending the table the indexing DEBUG_printf reads out of bounds.","fix":"Make the table size/labels match the enum exactly (no duplicate) and bound-check the index.","locations":[{"ref":"cups/usersys.c:133-141","code":"  133 | static const char * const tls_versions[] =\n  134 | {\t\t\t\t\t// TLS/SSL version numbers\n  135 |   \"SSL3.0\",\n  136 |   \"TLS1.0\",\n  137 |   \"TLS1.1\",\n  138 |   \"TLS1.2\",\n  139 |   \"TLS1.3\",\n  140 |   \"TLS1.3\"\n  141 | };","lines":9,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/usersys.c#L133-L141"},{"ref":"cups/usersys.c:1329","code":" 1329 |   DEBUG_printf(\"1_cupsSetDefaults: SSLOptions%s%s%s%s Min%s Max%s\", cc.ssl_options == _HTTP_TLS_NONE ? \" none\" : \"\", (cc.ssl_options & _HTTP_TLS_ALLOW_RC4) ? \" AllowRC4\" : \"\", (cc.ssl_options & _HTTP_TLS_ALLOW_DH) ? \" AllowDH\" : \"\", (cc.ssl_options & _HTTP_TLS_DENY_CBC) ? \" DenyCBC\" : \"\", tls_versions[cc.ssl_min_version], tls_versions[cc.ssl_max_version]);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/usersys.c#L1329"}]},{"id":"LOGIC_73","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In add_job(), when no job-sheets/job-sheets-col attribute is present and the printer is NOT remote, the default job-sheets are only added inside the 'if (... ippFindAttribute(job-sheets) == NULL)' block; but the subsequent code at 1775-1788 unconditionally dereferences attr->values[0].string.text for the start banner. If the printer is non-remote, attr was just set, so it is fine; however if job-sheets-col was found (BEGIN_COLLECTION) attr points to a collection and attr->values[0].string.text is read as a banner name at line 1778, which is a type-confused read of the collection value union.","fix":"When attr is a job-sheets-col collection, derive the banner name via the already-computed job_sheets variable (or ippGetString on the nested job-sheets) instead of attr->values[0].string.text.","locations":[{"ref":"scheduler/ipp.c:1716-1788","code":" 1716 |     if ((attr = ippFindAttribute(job->attrs, \"job-sheets-col\", IPP_TAG_BEGIN_COLLECTION)) == NULL)\n 1717 |     {\n 1718 |       if ((attr = ippFindAttribute(job->attrs, \"job-sheets\",\n 1719 | \t\t\t\t   IPP_TAG_ZERO)) == NULL)\n 1720 |       {\n 1721 | \tcupsdLogClient(con, CUPSD_LOG_DEBUG, \"Adding default job-sheets values \\\"%s,%s\\\".\", printer->job_sheets[0], printer->job_sheets[1]);\n 1722 | \n 1723 | \tattr = ippAddStrings(job->attrs, IPP_TAG_JOB, IPP_TAG_NAME, \"job-sheets\",\n 1724 | \t\t\t     2, NULL, NULL);\n 1725 | \tippSetString(job->attrs, &attr, 0, printer->job_sheets[0]);\n 1726 | \tippSetString(job->attrs, &attr, 1, printer->job_sheets[1]);\n 1727 |       }\n 1728 |     }\n 1729 | \n 1730 |     job->job_sheets = attr;\n 1731 | \n 1732 |     if (ippGetValueTag(attr) == IPP_TAG_BEGIN_COLLECTION)\n 1733 |       job_sheets = ippGetString(ippFindAttribute(ippGetCollection(attr, 0), \"job-sheets\", IPP_TAG_ZERO), 0, NULL);\n 1734 |     else\n 1735 |       job_sheets = ippGetString(attr, 0, NULL);\n 1736 | \n 1737 |     if (!job_sheets)\n 1738 |       job_sheets = \"none\";\n 1739 | \n 1740 |    /*\n 1741 |     * Enforce classification level if set...\n 1742 |     */\n 1743 | \n 1744 |     if (Classification)\n 1745 |     {\n 1746 |       cupsdLogClient(con, CUPSD_LOG_DEBUG, \"Classification=\\\"%s\\\", ClassifyOverride=%d\", Classification, ClassifyOverride);\n 1747 | \n 1748 |       if (ClassifyOverride && strcmp(job_sheets, Classification))\n 1749 |       {\n 1750 |         // Force the leading banner to have the classification on it...\n 1751 | \tif (ippGetValueTag(attr) == IPP_TAG_BEGIN_COLLECTION)\n 1752 | \t{\n 1753 | \t  ipp_t *col = ippGetCollection(attr, 0);\n 1754 | \t  ipp_attribute_t *attr2 = ippFindAttribute(col, \"job-sheets\", IPP_TAG_ZERO);\n 1755 | \t  if (attr2)\n 1756 | \t    ippSetString(col, &attr2, 0, Classification);\n 1757 | \t  else\n 1758 | \t    ippAddString(col, IPP_TAG_ZERO, IPP_TAG_NAME, \"job-sheets\", NULL, Classification);\n 1759 | \t}\n 1760 | \telse\n 1761 | \t{\n 1762 | \t  ippSetString(job->attrs, &attr, 0, Classification);\n 1763 | \t  if (ippGetCount(attr) > 1)\n 1764 | \t    ippDeleteValues(job->attrs, &attr, 1, ippGetCount(attr) - 1);\n 1765 | \t}\n 1766 | \n 1767 | \tcupsdLogJob(job, CUPSD_LOG_NOTICE, \"CLASSIFICATION FORCED: job-sheets=\\\"%s\\\", job-originating-user-name=\\\"%s\\\"\", Classification, job->username);\n 1768 |       }\n 1769 |     }\n 1770 | \n 1771 |    /*\n 1772 |     * See if we need to add the starting sheet...\n 1773 |     */\n 1774 | \n 1775 |     if (!(printer->type & CUPS_PTYPE_REMOTE))\n 1776 |     {\n 1777 |       cupsdLogJob(job, CUPSD_LOG_INFO, \"Adding start banner page \\\"%s\\\".\",\n 1778 | \t\t  attr->values[0].string.text);\n 1779 | \n 1780 |       if ((kbytes = copy_banner(con, job, attr->values[0].string.text)) < 0)\n 1781 |       {\n 1782 |         cupsdSetJobState(job, IPP_JSTATE_ABORTED, CUPSD_JOB_PURGE,\n 1783 | \t                 \"Aborting job because the start banner could not be \"\n 1784 | \t\t\t \"copied.\");\n 1785 |         return (NULL);\n 1786 |       }\n 1787 | \n 1788 |       cupsdUpdateQuota(printer, job->username, 0, kbytes);","lines":73,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L1716-L1788"}]},{"id":"LOGIC_74","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"The _httpUpdate() state switch deliberately falls through from the GET/POST/POST_RECV/PUT cases (after http->state++) into POST_SEND/HEAD, but there is no /* fall through */ annotation, which trips -Wimplicit-fallthrough and obscures intent for readers.","fix":"Add an explicit fall-through comment/attribute after the http->state++ block.","locations":[{"ref":"cups/http.c:2987-3006","code":" 2987 |     switch (http->state)\n 2988 |     {\n 2989 |       case HTTP_STATE_GET :\n 2990 |       case HTTP_STATE_POST :\n 2991 |       case HTTP_STATE_POST_RECV :\n 2992 |       case HTTP_STATE_PUT :\n 2993 | \t  http->state ++;\n 2994 | \n 2995 | \t  DEBUG_printf(\"1_httpUpdate: Set state to %s.\", httpStateString(http->state));\n 2996 | \n 2997 |       case HTTP_STATE_POST_SEND :\n 2998 |       case HTTP_STATE_HEAD :\n 2999 | \t  break;\n 3000 | \n 3001 |       default :\n 3002 | \t  http->state = HTTP_STATE_WAITING;\n 3003 | \n 3004 | \t  DEBUG_puts(\"1_httpUpdate: Reset state to HTTP_STATE_WAITING.\");\n 3005 | \t  break;\n 3006 |     }","lines":20,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http.c#L2987-L3006"}]},{"id":"LOGIC_75","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"ippDateToTime documents UTC hours as '0 to 14' (and ippValidateAttribute enforces <= 14) while ippTimeToDate's header comment states 'UTC hours (0 to 11)'. The two comments disagree on the valid range for the same field.","fix":"Make both comments state the same range (0 to 14 per the validation code).","locations":[{"ref":"cups/ipp.c:3624","code":" 3624 |   //   9        UTC hours (0 to 11)","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ipp.c#L3624"},{"ref":"cups/ipp.c:1650","code":" 1650 |   //    9        UTC hours (0 to 14)","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ipp.c#L1650"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In the Avahi branch of cupsDNSSDBrowseNew(), the per-domain browser loop uses the wrong index when selecting the domain string. The outer loop variable is `i` (index into the types array) and the inner loop variable is `j` (index into dnssd->domains), but the call passes `dnssd->domains[i]` instead of `dnssd->domains[j]`. For any sub-type list with i>=1 this indexes the wrong (or out-of-bounds-relative-to-intent) domain, and when num_domains <= i it reads stale/empty domain slots, so browsing for additional domains is broken and can read uninitialized domain entries.","fix":"Pass `dnssd->domains[j]` to avahi_service_browser_new() inside the inner `for (j = 0; ...)` loop.","locations":[{"ref":"cups/dnssd.c:519-523","code":"  519 |       for (j = 0; j < dnssd->num_domains && browse->num_browsers < _CUPS_DNSSD_MAX; j ++)\n  520 |       {\n  521 | \tif ((browse->browsers[browse->num_browsers] = avahi_service_browser_new(dnssd->client, avahi_if_index(if_index), AVAHI_PROTO_UNSPEC, typename, dnssd->domains[i], /*flags*/0, (AvahiServiceBrowserCallback)avahi_browse_cb, browse)) != NULL)\n  522 | \t  browse->num_browsers ++;\n  523 |       }","lines":5,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dnssd.c#L519-L523"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In ippFileWriteAttributes, the boolean 1setOf writer loops over additional values but always reads element 1 instead of element i: 'ippGetBoolean(attr, 1)'. A multi-value boolean attribute is therefore serialized with every value after the first equal to value[1], silently corrupting written IPP data files.","fix":"Change 'ippGetBoolean(attr, 1)' to 'ippGetBoolean(attr, i)' inside the for-loop.","locations":[{"ref":"cups/ipp-file.c:1270-1271","code":" 1270 | \t  for (i = 1; i < count; i ++)\n 1271 | \t    ret &= cupsFilePuts(file->fp, ippGetBoolean(attr, 1) ? \",true\" : \",false\");","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ipp-file.c#L1270-L1271"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"_httpTLSStop() reports the gnutls_bye error with gnutls_strerror(errno) - it passes errno (unrelated/stale) instead of the GnuTLS return code stored in `error`, producing misleading diagnostics.","fix":"Pass the GnuTLS error code: gnutls_strerror(error).","locations":[{"ref":"cups/tls-gnutls.c:2007-2009","code":" 2007 |   error = gnutls_bye(http->tls, GNUTLS_SHUT_WR);\n 2008 |   if (error != GNUTLS_E_SUCCESS)\n 2009 |     _cupsSetError(IPP_STATUS_ERROR_INTERNAL, gnutls_strerror(errno), 0);","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L2007-L2009"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"Two swapped extension error messages: in the extKeyUsage parsing block the error says 'Bad keyUsage extension' while in the keyUsage block it says 'Bad extKeyUsage extension'. Also DEBUG labels are wrong: '1cupsSignRequest:' and '1cupsCreateCredentials:' appear inside cupsSignCredentialsRequest, and the CSR generator logs 'Generating self-signed X.509 certificate' though it produces a CSR.","fix":"Swap the two error strings and correct the DEBUG labels.","locations":[{"ref":"cups/tls-openssl.c:1235-1239","code":" 1235 |           if (datalen < 12 || data[2] != 0x30 || data[3] != (datalen - 4))\n 1236 |           {\n 1237 |             _cupsSetError(IPP_STATUS_ERROR_INTERNAL, _(\"Bad keyUsage extension in X.509 certificate request.\"), 1);\n 1238 | \t    goto done;\n 1239 |           }","lines":5,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L1235-L1239"},{"ref":"cups/tls-openssl.c:1288-1290","code":" 1288 |           if (datalen < 6 || datalen > 7 || data[2] != 0x03 || data[3] != (datalen - 4))\n 1289 |           {\n 1290 |             _cupsSetError(IPP_STATUS_ERROR_INTERNAL, _(\"Bad extKeyUsage extension in X.509 certificate request.\"), 1);","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L1288-L1290"},{"ref":"cups/tls-openssl.c:628","code":"  628 |   DEBUG_puts(\"1cupsCreateCredentialsRequest: Generating self-signed X.509 certificate.\");","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L628"}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":true,"description":"NumBins error/diagnostic messages print num_sizes instead of num_bins. Copy-pasted from the NumSizes handler; the values are unrelated, so the debug output is misleading when diagnosing a bad NumBins line or a bins allocation failure.","fix":"Use num_bins in both DEBUG_printf calls in the NumBins block.","locations":[{"ref":"cups/ppd-cache.c:681-688","code":"  681 |         DEBUG_printf(\"_ppdCacheCreateWithFile: Bad NumBins value %d on line %d.\", num_sizes, linenum);\n  682 | \t_cupsSetError(IPP_STATUS_ERROR_INTERNAL, _(\"Bad PPD cache file.\"), 1);\n  683 | \tgoto create_error;\n  684 |       }\n  685 | \n  686 |       if ((pc->bins = calloc((size_t)num_bins, sizeof(pwg_map_t))) == NULL)\n  687 |       {\n  688 |         DEBUG_printf(\"_ppdCacheCreateWithFile: Unable to allocate %d bins.\", num_sizes);","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ppd-cache.c#L681-L688"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"The write() return value is ignored in the cupsGetFd download loop. On a full disk, an invalid fd, or a partial write, the function still returns HTTP_STATUS_OK and the caller (e.g. cupsGetFile) treats the download as successful even though the file on disk is truncated/empty; short writes are not retried either.","fix":"Check write()'s return; on error or short write set an error status, record http->error = errno, and break so callers detect the failure.","locations":[{"ref":"cups/getputfile.c:187-188","code":"  187 |     while ((bytes = httpRead2(http, buffer, sizeof(buffer))) > 0)\n  188 |       write(fd, buffer, (size_t)bytes);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L187-L188"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"Throughout cupsCreateCredentials() the return values of certificate-construction and signing calls are ignored, including X509_sign(). A failed X509_sign silently produces an unsigned/garbage certificate that is then written to disk and trusted. openssl_create_name() can return NULL (on X509_NAME_new failure) and is passed unchecked into X509_set_subject_name.","fix":"Check return values; in particular verify X509_sign() != 0 before exporting/writing the certificate, and null-check openssl_create_name().","locations":[{"ref":"cups/tls-openssl.c:319-336","code":"  319 |   notBefore = ASN1_TIME_new();\n  320 |   ASN1_TIME_set(notBefore, curtime);\n  321 |   X509_set_notBefore(cert, notBefore);\n  322 |   ASN1_TIME_free(notBefore);\n  323 | \n  324 |   notAfter = ASN1_TIME_new();\n  325 |   ASN1_TIME_set(notAfter, expiration_date);\n  326 |   X509_set_notAfter(cert, notAfter);\n  327 |   ASN1_TIME_free(notAfter);\n  328 | \n  329 |   serial = ASN1_INTEGER_new();\n  330 |   ASN1_INTEGER_set(serial, (long)curtime);\n  331 |   X509_set_serialNumber(cert, serial);\n  332 |   ASN1_INTEGER_free(serial);\n  333 | \n  334 |   X509_set_pubkey(cert, pkey);\n  335 | \n  336 |   name = openssl_create_name(organization, org_unit, locality, state_province, country, common_name, email);","lines":18,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L319-L336"},{"ref":"cups/tls-openssl.c:379-442","code":"  379 |   exts = sk_X509_EXTENSION_new_null();\n  380 | \n  381 |   if (ca_cert)\n  382 |   {\n  383 |     // Add extensions that are required to make Chrome happy...\n  384 |     openssl_add_ext(exts, NID_basic_constraints, \"critical,CA:TRUE,pathlen:0\");\n  385 |   }\n  386 |   else\n  387 |   {\n  388 |     // Add extension with DNS names and free buffer for GENERAL_NAME\n  389 |     if ((ext = openssl_create_san(common_name, num_alt_names, alt_names)) == NULL)\n  390 |       goto done;\n  391 | \n  392 |     sk_X509_EXTENSION_push(exts, ext);\n  393 | \n  394 |     // Add extensions that are required to make Chrome happy...\n  395 |     openssl_add_ext(exts, NID_basic_constraints, \"critical,CA:FALSE,pathlen:0\");\n  396 |   }\n  397 | \n  398 |   cupsCopyString(temp, \"critical\", sizeof(temp));\n  399 |   for (tempptr = temp + strlen(temp), i = 0, usage_bit = CUPS_CREDUSAGE_DIGITAL_SIGNATURE; i < (sizeof(tls_usage_strings) / sizeof(tls_usage_strings[0])); i ++, usage_bit *= 2)\n  400 |   {\n  401 |     if (!(usage & usage_bit))\n  402 |       continue;\n  403 | \n  404 |     snprintf(tempptr, sizeof(temp) - (size_t)(tempptr - temp), \",%s\", tls_usage_strings[i]);\n  405 | \n  406 |     tempptr += strlen(tempptr);\n  407 |   }\n  408 |   openssl_add_ext(exts, NID_key_usage, temp);\n  409 | \n  410 |   temp[0] = '\\0';\n  411 |   for (tempptr = temp, i = 0, purpose_bit = CUPS_CREDPURPOSE_SERVER_AUTH; i < (sizeof(tls_purpose_oids) / sizeof(tls_purpose_oids[0])); i ++, purpose_bit *= 2)\n  412 |   {\n  413 |     if (!(purpose & purpose_bit))\n  414 |       continue;\n  415 | \n  416 |     if (tempptr == temp)\n  417 |       cupsCopyString(temp, tls_purpose_oids[i], sizeof(temp));\n  418 |     else\n  419 |       snprintf(tempptr, sizeof(temp) - (size_t)(tempptr - temp), \",%s\", tls_purpose_oids[i]);\n  420 | \n  421 |     tempptr += strlen(tempptr);\n  422 |   }\n  423 |   openssl_add_ext(exts, NID_ext_key_usage, temp);\n  424 | \n  425 |   openssl_add_ext(exts, NID_subject_key_identifier, \"hash\");\n  426 |   openssl_add_ext(exts, NID_authority_key_identifier, \"keyid,issuer\");\n  427 | \n  428 |   while ((ext = sk_X509_EXTENSION_pop(exts)) != NULL)\n  429 |   {\n  430 |     if (!X509_add_ext(cert, ext, -1))\n  431 |     {\n  432 |       sk_X509_EXTENSION_pop_free(exts, X509_EXTENSION_free);\n  433 |       goto done;\n  434 |     }\n  435 |   }\n  436 | \n  437 |   X509_set_version(cert, 2); // v3\n  438 | \n  439 |   if (root_key)\n  440 |     X509_sign(cert, root_key, EVP_sha256());\n  441 |   else\n  442 |     X509_sign(cert, pkey, EVP_sha256());","lines":64,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L379-L442"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In the _WIN32 branch of cupsDNSSDServiceAdd(), srv->txt is allocated with calloc() but the return value is never checked. If calloc() returns NULL, the following loop writes through `ptr = srv->txt` via win32_wstrcpy(), dereferencing NULL and crashing. TXT data originates from caller-supplied options.","fix":"Check `srv->txt` for NULL after calloc() and report_error()/return false (or skip TXT) on allocation failure.","locations":[{"ref":"cups/dnssd.c:1530-1543","code":" 1530 |     if (length > 0)\n 1531 |     {\n 1532 |       srv->txt = calloc(length, sizeof(WCHAR));\n 1533 | \n 1534 |       for (j = 0, ptr = srv->txt, end = srv->txt + length; j < num_txt; j ++)\n 1535 |       {\n 1536 |         win32_wstrcpy(ptr, txt[j].name, (size_t)(end - ptr) * sizeof(WCHAR));\n 1537 |         keys[j] = ptr;\n 1538 |         ptr     += strlen(txt[j].name) + 1;\n 1539 | \n 1540 |         win32_wstrcpy(ptr, txt[j].value, (size_t)(end - ptr) * sizeof(WCHAR));\n 1541 |         values[j] = ptr;\n 1542 |         ptr     += strlen(txt[j].value) + 1;\n 1543 |       }","lines":14,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dnssd.c#L1530-L1543"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"cupsFileOpenFd's compressed-write setup frees fp with free(fp) on cups_write or deflateInit2 failure, but the FD_CLOEXEC fcntl and other initialization happen after; more importantly the caller cupsFileOpen, on a NULL return from cupsFileOpenFd, closes the fd, but cupsFileOpenFd has already partially set up a deflate stream that is leaked (deflateInit2 succeeded path then cups_write fails is not possible, but if deflateInit2 succeeds and a later step failed there would be a leak). The header-write failure path frees fp without deflateEnd because the stream is not yet initialized - correct - but the structure is fragile.","fix":"Ensure every early-return after deflateInit2 success calls deflateEnd before free(fp); keep allocation/teardown strictly paired.","locations":[{"ref":"cups/file.c:1088-1105","code":" 1088 | \t  if (cups_write(fp, (char *)header, 10) < 10)\n 1089 | \t  {\n 1090 |             free(fp);\n 1091 | \t    return (NULL);\n 1092 | \t  }\n 1093 | \n 1094 |           // Initialize the compressor...\n 1095 |           if (deflateInit2(&(fp->stream), mode[1] - '0', Z_DEFLATED, -15, 8, Z_DEFAULT_STRATEGY) < Z_OK)\n 1096 |           {\n 1097 |             free(fp);\n 1098 | \t    return (NULL);\n 1099 |           }\n 1100 | \n 1101 | \t  fp->stream.next_out  = fp->cbuf;\n 1102 | \t  fp->stream.avail_out = sizeof(fp->cbuf);\n 1103 | \t  fp->compressed       = 1;\n 1104 | \t  fp->crc              = crc32(0L, Z_NULL, 0);\n 1105 | \t}","lines":18,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/file.c#L1088-L1105"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In cupsPutFd the local read() is not checked for -1: 'while ((bytes = read(fd, buffer, sizeof(buffer))) > 0)' treats a read error identically to EOF, so a partial-read failure silently uploads a truncated file and still reports success; errno is never propagated to http->error.","fix":"Distinguish read() == -1 from == 0: on -1 set http->error = errno and an error status and break before finalizing the upload.","locations":[{"ref":"cups/getputfile.c:393-401","code":"  393 |       while ((bytes = read(fd, buffer, sizeof(buffer))) > 0)\n  394 | \tif (httpCheck(http))\n  395 | \t{\n  396 |           if ((status = httpUpdate(http)) != HTTP_STATUS_CONTINUE)\n  397 |             break;\n  398 | \t}\n  399 | \telse\n  400 |           httpWrite2(http, buffer, (size_t)bytes);\n  401 |     }","lines":9,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L393-L401"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"httpWrite2 return values are ignored in the cupsPutFd upload loop and the terminating-chunk write. If the connection breaks mid-upload, httpWrite2 returns -1 but the loop keeps reading the local file and finalizes as if successful.","fix":"Check httpWrite2()'s return; on a value other than the requested byte count set an error status and break.","locations":[{"ref":"cups/getputfile.c:400","code":"  400 |           httpWrite2(http, buffer, (size_t)bytes);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L400"},{"ref":"cups/getputfile.c:405","code":"  405 |       httpWrite2(http, buffer, 0);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L405"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"httpGetDateString2 calls gmtime_r(&t, &tdate) without checking the return value. gmtime_r returns NULL for an out-of-range time_t, leaving tdate uninitialized; the subsequent snprintf then indexes http_days[tdate.tm_wday] (7 elements) and http_months[tdate.tm_mon] (12 elements) with garbage, an out-of-bounds read.","fix":"Check gmtime_r's return; on NULL write an empty string and return. Optionally clamp tm_wday to 0..6 and tm_mon to 0..11 before indexing.","locations":[{"ref":"cups/http-support.c:740-742","code":"  740 |   gmtime_r(&t, &tdate);\n  741 | \n  742 |   snprintf(s, (size_t)slen, \"%s, %02d %s %d %02d:%02d:%02d GMT\", http_days[tdate.tm_wday], tdate.tm_mday, http_months[tdate.tm_mon], tdate.tm_year + 1900, tdate.tm_hour, tdate.tm_min, tdate.tm_sec);","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L740-L742"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"cupsJSONImportFile reads with a single read() call and treats only bytes<0 as error; a short read (fewer than st_size bytes, common on pipes/special files or after signals) silently truncates the JSON, which is then parsed, producing misleading errors or a partial tree.","fix":"Loop on read() until st_size bytes are read or EOF/error.","locations":[{"ref":"cups/json.c:712-721","code":"  712 |   // Read the file into the allocated string...\n  713 |   if ((bytes = read(fd, s, (size_t)fileinfo.st_size)) < 0)\n  714 |   {\n  715 |     _cupsSetError(IPP_STATUS_ERROR_INTERNAL, strerror(errno), 0);\n  716 |     close(fd);\n  717 |     free(s);\n  718 |     return (NULL);\n  719 |   }\n  720 | \n  721 |   s[bytes] = '\\0';","lines":10,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/json.c#L712-L721"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In the OpenSSL RSA/ECDSA verify and sign paths, cupsHashData() result hash_len is validated only with assert(hash_len > 0). assert is compiled out under NDEBUG; a hash failure then passes a negative ssize_t as the length argument (e.g. RSA_verify/ECDSA_do_verify/RSA_sign), which is converted to a large unsigned value causing OOB reads or undefined behavior in release builds.","fix":"Replace assert with a real runtime check: if (hash_len <= 0) goto/return failure.","locations":[{"ref":"cups/jwt.c:453-454","code":"  453 |         hash_len = cupsHashData(cups_jwa_algorithms[jwt->sigalg], text, text_len, hash, sizeof(hash));\n  454 |         assert(hash_len > 0);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L453-L454"},{"ref":"cups/jwt.c:490-491","code":"  490 |         hash_len = cupsHashData(cups_jwa_algorithms[jwt->sigalg], text, text_len, hash, sizeof(hash));\n  491 |         assert(hash_len > 0);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L490-L491"},{"ref":"cups/jwt.c:2125-2126","code":" 2125 |       hash_len = cupsHashData(cups_jwa_algorithms[alg], text, text_len, hash, sizeof(hash));\n 2126 |       assert(hash_len > 0);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L2125-L2126"},{"ref":"cups/jwt.c:2174-2175","code":" 2174 |       hash_len = cupsHashData(cups_jwa_algorithms[alg], text, text_len, hash, sizeof(hash));\n 2175 |       assert(hash_len > 0);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L2174-L2175"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"make_ec_key() ignores return values of OpenSSL calls that can fail on attacker-controlled JWK coordinates: EC_POINT_set_affine_coordinates_GFp (point not on curve), EC_KEY_set_public_key, EC_KEY_set_private_key, EC_POINT_mul. An invalid point silently yields an EC_KEY used for verification; combined with unchecked errors this can produce misleading verification behavior. EC_POINT_new() may also return NULL and is used unchecked.","fix":"Check each return value (and null-check EC_POINT_new/EC_GROUP), goto ec_done with ec=NULL on failure.","locations":[{"ref":"cups/jwt.c:1721-1739","code":" 1721 |   group = (EC_GROUP *)EC_KEY_get0_group(ec);\n 1722 |   point = EC_POINT_new(group);\n 1723 | \n 1724 |   if (d)\n 1725 |   {\n 1726 |     // Set private key...\n 1727 |     EC_KEY_set_private_key(ec, d);\n 1728 | \n 1729 |     // Create a new public key\n 1730 |     EC_POINT_mul(group, point, d, NULL, NULL, NULL);\n 1731 |   }\n 1732 |   else\n 1733 |   {\n 1734 |     // Create a public key using the supplied coordinates...\n 1735 |     EC_POINT_set_affine_coordinates_GFp(group, point, x, y, NULL);\n 1736 |   }\n 1737 | \n 1738 |   // Set public key...\n 1739 |   EC_KEY_set_public_key(ec, point);","lines":19,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L1721-L1739"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"cupsOAuthGetUserId() passes the result of oauth_copy_response() into cupsJSONImportString() and then cupsJWTNew() without checking that the HTTP request succeeded or that user_id_value is non-NULL/valid JSON. A failed userinfo request body is parsed as claims; there is no check of the httpUpdate() status before treating the body as authoritative user identity.","fix":"Check the final httpUpdate status == HTTP_STATUS_OK and that user_id_value parses before constructing the JWT/identity.","locations":[{"ref":"cups/oauth.c:1485-1518","code":" 1485 |     do\n 1486 |     {\n 1487 |       status = httpUpdate(http);\n 1488 |     } while (status == HTTP_STATUS_CONTINUE);\n 1489 | \n 1490 |     user_id_value  = oauth_copy_response(http);\n 1491 |     user_id_claims = cupsJSONImportString(user_id_value);\n 1492 | \n 1493 |     // Verify that the access token hasn't expired...\n 1494 |     if (cupsJSONFind(user_id_claims, \"error\"))\n 1495 |     {\n 1496 |       // Expired or bad access token, get rid of this one...\n 1497 |       const char *error_desc = cupsJSONGetString(cupsJSONFind(user_id_claims, \"error_description\"));\n 1498 | \t\t\t\t\t// Description of error\n 1499 | \n 1500 |       DEBUG_printf(\"1cupsOAuthGetUserId: Error from userinfo - %s, %s.\", cupsJSONGetString(cupsJSONFind(user_id_claims, \"error\")), error_desc);\n 1501 |       _cupsSetError(IPP_STATUS_ERROR_INTERNAL, error_desc, false);\n 1502 | \n 1503 |       cupsJSONDelete(user_id_claims);\n 1504 |       oauth_save_value(auth_uri, access_uri, _CUPS_OTYPE_USER_ID, /*value*/NULL);\n 1505 |     }\n 1506 |     else if ((user_id = cupsJWTNew(/*type*/NULL, user_id_claims)) != NULL)\n 1507 |     {\n 1508 |       // Created a new JWT with the JSON user information, save it for future use...\n 1509 |       free(user_id_value);\n 1510 | \n 1511 |       user_id_value = cupsJWTExportString(user_id, CUPS_JWS_FORMAT_COMPACT);\n 1512 |       oauth_save_value(auth_uri, access_uri, _CUPS_OTYPE_USER_ID, user_id_value);\n 1513 |     }\n 1514 |     else\n 1515 |     {\n 1516 |       // Free the JSON information since we couldn't create the JWT...\n 1517 |       cupsJSONDelete(user_id_claims);\n 1518 |     }","lines":34,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/oauth.c#L1485-L1518"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"On realloc failure cupsAddOption returns 0 but does not free or preserve the original *options buffer state; returning 0 tells the caller there are zero options, so the caller typically stops tracking/freeing the array, leaking the original allocation, and a later cupsFreeOptions(0, *options) becomes a no-op.","fix":"On realloc failure, leave *options and num_options unchanged and return the original num_options (the old buffer is still valid).","locations":[{"ref":"cups/options.c:106-115","code":"  106 |     if (num_options == 0)\n  107 |       temp = (cups_option_t *)malloc(sizeof(cups_option_t));\n  108 |     else\n  109 |       temp = (cups_option_t *)realloc(*options, sizeof(cups_option_t) * (size_t)(num_options + 1));\n  110 | \n  111 |     if (!temp)\n  112 |     {\n  113 |       DEBUG_puts(\"3cupsAddOption: Unable to expand option array, returning 0\");\n  114 |       return (0);\n  115 |     }","lines":10,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/options.c#L106-L115"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In cupsDoIORequest, when writing trailing response data to outfile, a failed or short write() just breaks the loop and the function still returns the response as if successful; the caller cannot tell the output file is incomplete/truncated.","fix":"On write() failure or short write, set an error via _cupsSetError and propagate failure (delete the response / return NULL).","locations":[{"ref":"cups/request.c:251-260","code":"  251 |     if (response && outfile >= 0)\n  252 |     {\n  253 |      /*\n  254 |       * Write trailing data to file...\n  255 |       */\n  256 | \n  257 |       while ((bytes = httpRead2(http, buffer, sizeof(buffer))) > 0)\n  258 | \tif (write(outfile, buffer, (size_t)bytes) < bytes)\n  259 | \t  break;\n  260 |     }","lines":10,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/request.c#L251-L260"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"cupsAreCredentialsValidForName() ignores the return of gnutls_x509_crt_get_serial(). On failure cserial is uninitialized stack and cserial_size stays at sizeof(cserial), so the subsequent CRL memcmp compares garbage and a revoked certificate may be treated as not revoked (fail-open).","fix":"Check the return value of gnutls_x509_crt_get_serial and fail closed (return false) on error.","locations":[{"ref":"cups/tls-gnutls.c:71-72","code":"   71 |       cserial_size = sizeof(cserial);\n   72 |       gnutls_x509_crt_get_serial(certs[0], cserial, &cserial_size);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L71-L72"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"cupsCreateCredentials/cupsCreateCredentialsRequest/cupsSignCredentialsRequest ignore return codes of the gnutls_x509_crt_set_* / gnutls_x509_crq_set_* / signing (gnutls_x509_crt_sign, gnutls_x509_crq_sign2) and gnutls_x509_privkey_generate calls. A mid-construction or signing failure goes undetected and a partially-built or unsigned certificate is exported and written, reported as success.","fix":"Check the return of the key generation and signing calls at minimum and goto done / return false on error.","locations":[{"ref":"cups/tls-gnutls.c:1151-1152","code":" 1151 |   gnutls_x509_crt_init(&crt);\n 1152 |   gnutls_x509_crt_set_crq(crt, crq);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L1151-L1152"},{"ref":"cups/tls-gnutls.c:2090-2120","code":" 2090 |   gnutls_x509_privkey_init(&key);\n 2091 | \n 2092 |   switch (type)\n 2093 |   {\n 2094 |     case CUPS_CREDTYPE_ECDSA_P256_SHA256 :\n 2095 | \tgnutls_x509_privkey_generate(key, GNUTLS_PK_ECDSA, GNUTLS_CURVE_TO_BITS(GNUTLS_ECC_CURVE_SECP256R1), 0);\n 2096 | \tbreak;\n 2097 | \n 2098 |     case CUPS_CREDTYPE_ECDSA_P384_SHA256 :\n 2099 | \tgnutls_x509_privkey_generate(key, GNUTLS_PK_ECDSA, GNUTLS_CURVE_TO_BITS(GNUTLS_ECC_CURVE_SECP384R1), 0);\n 2100 | \tbreak;\n 2101 | \n 2102 |     case CUPS_CREDTYPE_ECDSA_P521_SHA256 :\n 2103 | \tgnutls_x509_privkey_generate(key, GNUTLS_PK_ECDSA, GNUTLS_CURVE_TO_BITS(GNUTLS_ECC_CURVE_SECP521R1), 0);\n 2104 | \tbreak;\n 2105 | \n 2106 |     case CUPS_CREDTYPE_RSA_2048_SHA256 :\n 2107 | \tgnutls_x509_privkey_generate(key, GNUTLS_PK_RSA, 2048, 0);\n 2108 | \tbreak;\n 2109 | \n 2110 |     default :\n 2111 |     case CUPS_CREDTYPE_RSA_3072_SHA256 :\n 2112 | \tgnutls_x509_privkey_generate(key, GNUTLS_PK_RSA, 3072, 0);\n 2113 | \tbreak;\n 2114 | \n 2115 |     case CUPS_CREDTYPE_RSA_4096_SHA256 :\n 2116 | \tgnutls_x509_privkey_generate(key, GNUTLS_PK_RSA, 4096, 0);\n 2117 | \tbreak;\n 2118 |   }\n 2119 | \n 2120 |   return (key);","lines":31,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L2090-L2120"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"openssl_get_date() ignores the return of ASN1_TIME_to_tm; on a malformed certificate date exptm is left uninitialized and mktime(&exptm) returns garbage used in trust/expiry decisions. mktime also interprets the broken-down time as LOCAL time while certificate times are UTC, introducing a timezone offset error in expiration comparisons.","fix":"Check ASN1_TIME_to_tm's return value; convert using timegm() (UTC) or compare with X509_cmp_time() directly.","locations":[{"ref":"cups/tls-openssl.c:2450-2463","code":" 2450 | static time_t\t\t\t\t// O - UNIX time in seconds\n 2451 | openssl_get_date(X509 *cert,\t\t// I - Certificate\n 2452 |                  int  which)\t\t// I - 0 for notBefore, 1 for notAfter\n 2453 | {\n 2454 |   struct tm\texptm;\t\t\t// Expiration date components\n 2455 | \n 2456 | \n 2457 |   if (which)\n 2458 |     ASN1_TIME_to_tm(X509_get0_notAfter(cert), &exptm);\n 2459 |   else\n 2460 |     ASN1_TIME_to_tm(X509_get0_notBefore(cert), &exptm);\n 2461 | \n 2462 |   return (mktime(&exptm));\n 2463 | }","lines":14,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L2450-L2463"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"cupsCharsetToUTF8 / cupsUTF8ToCharset call iconv() but ignore its return value (the count of irreversible conversions or (size_t)-1 on error). On a partial/failed conversion (e.g. E2BIG when output buffer fills, or EILSEQ on invalid input) the functions still return the bytes produced so far as if successful, silently truncating output and masking encoding errors.","fix":"Check the iconv() return value; on (size_t)-1 inspect errno (E2BIG/EILSEQ/EINVAL) and either report an error (-1) or document the truncation behavior explicitly.","locations":[{"ref":"cups/transcode.c:158-171","code":"  158 |   if (map_to_utf8 != (iconv_t)-1)\n  159 |   {\n  160 |     char *altdestptr = (char *)dest;\t/* Silence bogus GCC type-punned */\n  161 | \n  162 |     srclen       = strlen(src);\n  163 |     outBytesLeft = (size_t)maxout - 1;\n  164 | \n  165 |     iconv(map_to_utf8, (char **)&src, &srclen, &altdestptr, &outBytesLeft);\n  166 |     *altdestptr = '\\0';\n  167 | \n  168 |     cupsMutexUnlock(&map_mutex);\n  169 | \n  170 |     return ((int)(altdestptr - (char *)dest));\n  171 |   }","lines":14,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/transcode.c#L158-L171"},{"ref":"cups/transcode.c:293-306","code":"  293 |   if (map_from_utf8 != (iconv_t)-1)\n  294 |   {\n  295 |     char *altsrc = (char *)src;\t\t/* Silence bogus GCC type-punned */\n  296 | \n  297 |     srclen       = strlen((char *)src);\n  298 |     outBytesLeft = (size_t)maxout - 1;\n  299 | \n  300 |     iconv(map_from_utf8, &altsrc, &srclen, &destptr, &outBytesLeft);\n  301 |     *destptr = '\\0';\n  302 | \n  303 |     cupsMutexUnlock(&map_mutex);\n  304 | \n  305 |     return ((int)(destptr - dest));\n  306 |   }","lines":14,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/transcode.c#L293-L306"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"get_document() (CUPS-Get-Document, which returns the raw contents of a user's print file) checks only cupsdCheckPolicy(DefaultPolicyPtr, con, job->username) and does not use the destination printer's op_policy_ptr, unlike get_job_attrs() which selects policy = printer->op_policy_ptr. As a result a per-queue operation policy restricting who may read documents is ignored for Get-Document, potentially allowing document content disclosure when an admin tightened the printer policy but left the default policy looser.","fix":"Resolve the printer for the job (job->printer or cupsdFindDest(job->dest)) and use its op_policy_ptr (falling back to DefaultPolicyPtr) for the policy check, mirroring get_job_attrs().","locations":[{"ref":"scheduler/ipp.c:6428-6433","code":" 6428 |   if ((status = cupsdCheckPolicy(DefaultPolicyPtr, con,\n 6429 |                                  job->username)) != HTTP_STATUS_OK)\n 6430 |   {\n 6431 |     send_http_error(con, status, NULL);\n 6432 |     return;\n 6433 |   }","lines":6,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L6428-L6433"},{"ref":"scheduler/ipp.c:6570-6584","code":" 6570 |   if ((printer = job->printer) == NULL)\n 6571 |     printer = cupsdFindDest(job->dest);\n 6572 | \n 6573 |   if (printer)\n 6574 |     policy = printer->op_policy_ptr;\n 6575 |   else\n 6576 |     policy = DefaultPolicyPtr;\n 6577 | \n 6578 |   if ((status = cupsdCheckPolicy(policy, con, job->username)) != HTTP_STATUS_OK)\n 6579 |   {\n 6580 |     send_http_error(con, status, NULL);\n 6581 |     return;\n 6582 |   }\n 6583 | \n 6584 |   exclude = cupsdGetPrivateAttrs(policy, con, printer, job->username);","lines":15,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L6570-L6584"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"cups_gss_getname() uses the obsolete, non-thread-safe gethostbyname() to canonicalize a non-FQDN hostname for the Kerberos service name. Besides thread-safety, it can resolve to an attacker-influenced name used to build the GSS target principal.","fix":"Use getaddrinfo()/getnameinfo() with AI_CANONNAME, or avoid name canonicalization for the service principal.","locations":[{"ref":"cups/auth.c:937-952","code":"  937 |       if (!strchr(http->gsshost, '.'))\n  938 |       {\n  939 |         // The hostname is not a FQDN, so look it up...\n  940 | \tstruct hostent\t*host;\t\t// Host entry to get FQDN\n  941 | \n  942 | \tif ((host = gethostbyname(http->gsshost)) != NULL && host->h_name)\n  943 | \t{\n  944 | \t  // Use the resolved hostname...\n  945 | \t  cupsCopyString(http->gsshost, host->h_name, sizeof(http->gsshost));\n  946 | \t}\n  947 | \telse\n  948 | \t{\n  949 | \t  DEBUG_printf(\"1cups_gss_getname: gethostbyname(\\\"%s\\\") failed.\", http->gsshost);\n  950 | \t  http->gsshost[0] = '\\0';\n  951 | \t  return (NULL);\n  952 | \t}","lines":16,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/auth.c#L937-L952"}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In _cups_debug_printf, cupsFormatStringv may return a negative value on error; 'bytes = cupsFormatStringv(...) + 19' then 'buffer[bytes - 1]' / 'buffer[bytes++]' would index with a small/negative value. The puts() variant assigns snprintf's int directly to ssize_t and likewise dereferences buffer[bytes-1] without checking for a negative return.","fix":"Check the formatting function return value for < 0 before using it as an index.","locations":[{"ref":"cups/debug.c:118-131","code":"  118 |   va_start(ap, format);\n  119 |   bytes = cupsFormatStringv(buffer + 19, sizeof(buffer) - 20, format, ap) + 19;\n  120 |   va_end(ap);\n  121 | \n  122 |   if ((size_t)bytes >= (sizeof(buffer) - 1))\n  123 |   {\n  124 |     buffer[sizeof(buffer) - 2] = '\\n';\n  125 |     bytes = sizeof(buffer) - 1;\n  126 |   }\n  127 |   else if (buffer[bytes - 1] != '\\n')\n  128 |   {\n  129 |     buffer[bytes++] = '\\n';\n  130 |     buffer[bytes]   = '\\0';\n  131 |   }","lines":14,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/debug.c#L118-L131"},{"ref":"cups/debug.c:185-196","code":"  185 |   bytes = snprintf(buffer, sizeof(buffer), \"T%03d %02d:%02d:%02d.%03d  %s\", debug_thread_id(), (int)((curtime.tv_sec / 3600) % 24), (int)((curtime.tv_sec / 60) % 60), (int)(curtime.tv_sec % 60), (int)(curtime.tv_usec / 1000), s);\n  186 | \n  187 |   if ((size_t)bytes >= (sizeof(buffer) - 1))\n  188 |   {\n  189 |     buffer[sizeof(buffer) - 2] = '\\n';\n  190 |     bytes = sizeof(buffer) - 1;\n  191 |   }\n  192 |   else if (buffer[bytes - 1] != '\\n')\n  193 |   {\n  194 |     buffer[bytes++] = '\\n';\n  195 |     buffer[bytes]   = '\\0';\n  196 |   }","lines":12,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/debug.c#L185-L196"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"cupsConnectDest() ignores the return value of httpConnect2() at line 635: `http` may be NULL (connection object allocation failure), after which the code proceeds to httpReconnect2(http, ...) and httpClose(http) with a NULL http. While httpReconnect2/httpClose may tolerate NULL, the non-CUPS_DEST_FLAGS_UNCONNECTED path will report success/failure based on a NULL connection and can return NULL only via the reconnect failure path, masking the original allocation failure.","fix":"Check `http` for NULL immediately after httpConnect2() and invoke the error callback / return NULL before attempting httpReconnect2().","locations":[{"ref":"cups/dest.c:635-666","code":"  635 |   http = httpConnect2(hostname, port, addrlist, AF_UNSPEC, encryption, 1, 0, NULL);\n  636 |   httpAddrFreeList(addrlist);\n  637 | \n  638 |   //\n  639 |   // Connect if requested...\n  640 |   //\n  641 | \n  642 |   if (flags & CUPS_DEST_FLAGS_UNCONNECTED)\n  643 |   {\n  644 |     if (cb)\n  645 |       (*cb)(user_data, CUPS_DEST_FLAGS_UNCONNECTED, dest);\n  646 |   }\n  647 |   else\n  648 |   {\n  649 |     if (cb)\n  650 |       (*cb)(user_data, CUPS_DEST_FLAGS_UNCONNECTED | CUPS_DEST_FLAGS_CONNECTING, dest);\n  651 | \n  652 |     if (httpReconnect2(http, msec, cancel))\n  653 |     {\n  654 |       if (cb)\n  655 |       {\n  656 |         if (cancel && *cancel)\n  657 |           (*cb)(user_data, CUPS_DEST_FLAGS_UNCONNECTED | CUPS_DEST_FLAGS_CONNECTING, dest);\n  658 |         else\n  659 |           (*cb)(user_data, CUPS_DEST_FLAGS_UNCONNECTED | CUPS_DEST_FLAGS_ERROR, dest);\n  660 |       }\n  661 |       httpClose(http);\n  662 |       return (NULL);\n  663 |     }\n  664 |     else if (cb)\n  665 |       (*cb)(user_data, CUPS_DEST_FLAGS_NONE, dest);\n  666 |   }","lines":32,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dest.c#L635-L666"}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"_cupsCreateDest() does not check the cupsDoRequest() response before ippFindAttribute(): if cupsDoRequest returns NULL (connection/IPP error), ippFindAttribute(NULL, ...) is relied upon to return NULL and the function returns NULL - which works, but the subsequent retry loop `while (state == IPP_PSTATE_STOPPED && cupsGetError() == IPP_STATUS_OK)` will spin sleeping 1 second each iteration as long as the server keeps returning OK with a stopped state, with no overall timeout or iteration cap. A misbehaving/slow local printer creation can hang the caller indefinitely.","fix":"Add a bounded retry count or wall-clock timeout to the state-polling loop instead of looping unboundedly while state==STOPPED.","locations":[{"ref":"cups/dest.c:837-852","code":"  837 |   while (state == IPP_PSTATE_STOPPED && cupsGetError() == IPP_STATUS_OK)\n  838 |   {\n  839 |     sleep(1);\n  840 |     ippDelete(response);\n  841 | \n  842 |     request = ippNewRequest(IPP_OP_GET_PRINTER_ATTRIBUTES);\n  843 | \n  844 |     ippAddString(request, IPP_TAG_OPERATION, IPP_TAG_URI, \"printer-uri\", NULL, uri);\n  845 |     ippAddString(request, IPP_TAG_OPERATION, IPP_TAG_NAME, \"requesting-user-name\", NULL, cupsGetUser());\n  846 |     ippAddString(request, IPP_TAG_OPERATION, IPP_TAG_KEYWORD, \"requested-attributes\", NULL, \"printer-state\");\n  847 | \n  848 |     response = cupsDoRequest(http, request, \"/\");\n  849 | \n  850 |     if ((attr = ippFindAttribute(response, \"printer-state\", IPP_TAG_ENUM)) != NULL)\n  851 |       state = (ipp_pstate_t)ippGetInteger(attr, 0);\n  852 |   }","lines":16,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dest.c#L837-L852"}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"mdns_strerror() has its default/unknown case ordered before several explicit cases via `case kDNSServiceErr_Unknown : default :` early in the switch. This works because each case returns, but the `default` label appearing in the middle of the switch (line 2344) rather than at the end is unusual and makes it easy to accidentally insert a fallthrough. Minor maintainability hazard in untrusted-error-to-string conversion.","fix":"Move the `default:` label to the end of the switch for clarity, or keep but add a comment noting every case returns.","locations":[{"ref":"cups/dnssd.c:2343-2345","code":" 2343 |     case kDNSServiceErr_Unknown :\n 2344 |     default :\n 2345 |         return (\"Unknown error\");","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dnssd.c#L2343-L2345"}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"cupsFileOpen for write mode calls ftruncate(fd, 0) (or _chsize) without checking the return value. If truncation fails (e.g. on a special file), the file may retain stale trailing data beyond the newly written content, silently corrupting the output.","fix":"Check the ftruncate/_chsize return value and fail the open (close fd, return NULL) if truncation fails.","locations":[{"ref":"cups/file.c:975-980","code":"  975 | \tif (fd >= 0)\n  976 | #ifdef _WIN32\n  977 | \t  _chsize(fd, 0);\n  978 | #else\n  979 | \t  ftruncate(fd, 0);\n  980 | #endif // _WIN32","lines":6,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/file.c#L975-L980"}]},{"id":"ERR_25","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In cupsPutFd the lseek(fd, 0, SEEK_SET) return value is unchecked. If fd is a pipe/socket/non-seekable descriptor (callers may pass an arbitrary fd), lseek fails with ESPIPE and the read starts from the current offset, silently uploading wrong/partial data.","fix":"Check lseek's return and treat failure on an expected-seekable descriptor as an error, or document that fd must be seekable.","locations":[{"ref":"cups/getputfile.c:391","code":"  391 |       lseek(fd, 0, SEEK_SET);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L391"}]},{"id":"ERR_26","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"cups_globals_alloc (Windows) ignores RegQueryValueExA's return value; on failure or a non-NUL-terminated REG_SZ value, the subsequent `for (ptr = installdir; *ptr; ...)` scan can read past the buffer.","fix":"Check RegQueryValueExA's return code and explicitly NUL-terminate installdir before scanning it.","locations":[{"ref":"cups/globals.c:233-235","code":"  233 |       size = sizeof(installdir);\n  234 |       RegQueryValueExA(key, \"installdir\", NULL, NULL, installdir, &size);\n  235 |       RegCloseKey(key);","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/globals.c#L233-L235"}]},{"id":"ERR_27","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"http_resolve_cb ignores httpAssembleURIf's return value; on overflow/failure httpAssembleURI writes an empty string into uribuf->buffer, which the httpResolveURI loop interprets as 'not resolved yet' and keeps spinning until the 90s timeout, turning an assembly failure into a long hang.","fix":"Check the httpAssembleURIf return value and abort the resolve loop / signal an error on failure.","locations":[{"ref":"cups/http-support.c:1958-1961","code":" 1958 |   if ((!strcmp(scheme, \"ipp\") || !strcmp(scheme, \"ipps\")) && !strcmp(uribuf->resource, \"/cups\"))\n 1959 |     httpAssembleURIf(HTTP_URI_CODING_ALL, uribuf->buffer, uribuf->bufsize, scheme, NULL, host, port, \"/%s?snmp=false\", resource);\n 1960 |   else\n 1961 |     httpAssembleURIf(HTTP_URI_CODING_ALL, uribuf->buffer, uribuf->bufsize, scheme, NULL, host, port, \"/%s\", resource);","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L1958-L1961"}]},{"id":"ERR_28","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In httpWrite2's end-of-request handling the terminating 0-length chunk write http_write(http, \"0\\r\\n\\r\\n\", 5) ignores its return value (line 3362). If that final write fails the connection error is not propagated and the function may still return a positive byte count, so callers believe the chunked body was fully sent.","fix":"Check the return of the terminating http_write(); on failure set http->error and return -1.","locations":[{"ref":"cups/http.c:3359-3367","code":" 3359 |     if (http->data_encoding == HTTP_ENCODING_CHUNKED)\n 3360 |     {\n 3361 |       // Send a 0-length chunk at the end of the request...\n 3362 |       http_write(http, \"0\\r\\n\\r\\n\", 5);\n 3363 | \n 3364 |       // Reset the data state...\n 3365 |       http->data_encoding  = HTTP_ENCODING_FIELDS;\n 3366 |       http->data_remaining = 0;\n 3367 |     }","lines":9,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http.c#L3359-L3367"}]},{"id":"ERR_29","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"ippFileExpandVars is documented to return the required size for the expansion, but on the range-check failure path it 'return (false)' which is 0 - indistinguishable from a legitimate empty expansion. Callers cannot detect the error via the return value and a sentinel/error indication is lost.","fix":"Return a clearly invalid sentinel (e.g. (size_t)-1) on the EINVAL path, or document that 0 means error and ensure valid empty expansions are distinguishable.","locations":[{"ref":"cups/ipp-file.c:130-148","code":"  130 | size_t\t\t\t\t\t// O - Required size for expanded variables\n  131 | ippFileExpandVars(ipp_file_t *file,\t// I - IPP data file\n  132 |                   char       *dst,\t// I - Destination buffer\n  133 |                   const char *src,\t// I - Source string\n  134 |                   size_t     dstsize)\t// I - Size of destination buffer\n  135 | {\n  136 |   char\t\t*dstptr,\t\t// Pointer into destination\n  137 | \t\t*dstend,\t\t// End of destination\n  138 | \t\ttemp[256],\t\t// Temporary string\n  139 | \t\t*tempptr;\t\t// Pointer into temporary string\n  140 |   const char\t*value;\t\t\t// Value to substitute\n  141 | \n  142 | \n  143 |   // Range check input...\n  144 |   if (!file || !dst || !src || dstsize < 32)\n  145 |   {\n  146 |     _cupsSetError(IPP_STATUS_ERROR_INTERNAL, strerror(EINVAL), 0);\n  147 |     return (false);\n  148 |   }","lines":19,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ipp-file.c#L130-L148"}]},{"id":"ERR_30","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"cupsJSONExportFile calls write() once and only checks for <0; a partial write (>=0 but less than strlen(s)) is treated as success, silently truncating the output file.","fix":"Loop until all bytes are written, or treat a short write as failure.","locations":[{"ref":"cups/json.c:204-211","code":"  204 |   if (write(fd, s, strlen(s)) < 0)\n  205 |   {\n  206 |     _cupsSetError(IPP_STATUS_ERROR_INTERNAL, strerror(errno), 0);\n  207 |     close(fd);\n  208 |     unlink(filename);\n  209 |     free(s);\n  210 |     return (false);\n  211 |   }","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/json.c#L204-L211"}]},{"id":"ERR_31","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"cupsJWTMakePrivateKey() ignores the return of RAND_bytes()/RSA_generate_key()/EC_KEY_generate_key()/gnutls generate. RAND_bytes can fail (returns 0) leaving the HMAC key buffer uninitialized, and RSA_generate_key (deprecated) can return NULL, leading to NULL deref in make_bnstring(RSA_get0_n(NULL),...).","fix":"Check RAND_bytes()==1 and that the generated key is non-NULL before use; prefer RSA_generate_key_ex / EVP_PKEY APIs.","locations":[{"ref":"cups/jwt.c:1042-1044","code":" 1042 |     RAND_bytes(key, key_len);\n 1043 | #else // HAVE_GNUTLS\n 1044 |     gnutls_rnd(GNUTLS_RND_KEY, key, key_len);","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L1042-L1044"},{"ref":"cups/jwt.c:1066-1076","code":" 1066 |     rsa = RSA_generate_key(3072, 0x10001, NULL, NULL);\n 1067 |     make_bnstring(RSA_get0_n(rsa), n, sizeof(n));\n 1068 |     make_bnstring(RSA_get0_e(rsa), e, sizeof(e));\n 1069 |     make_bnstring(RSA_get0_d(rsa), d, sizeof(d));\n 1070 |     make_bnstring(RSA_get0_p(rsa), p, sizeof(p));\n 1071 |     make_bnstring(RSA_get0_q(rsa), q, sizeof(q));\n 1072 |     make_bnstring(RSA_get0_dmp1(rsa), dp, sizeof(dp));\n 1073 |     make_bnstring(RSA_get0_dmq1(rsa), dq, sizeof(dq));\n 1074 |     make_bnstring(RSA_get0_iqmp(rsa), qi, sizeof(qi));\n 1075 | \n 1076 |     RSA_free(rsa);","lines":11,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L1066-L1076"}]},{"id":"ERR_32","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"cupsOAuthGetAuthorizationCode() Windows browser-launch uses _spawnl(_P_WAIT, \"start\", \"\", url, NULL). 'start' is a cmd.exe builtin, not an executable, so _spawnl will not launch it; and passing an attacker-influenced auth URL to a shell-style invocation is risky. The function then proceeds to wait for a redirect that may never come.","fix":"Use ShellExecuteW(NULL, L\"open\", url, ...) on Windows to open the default browser safely.","locations":[{"ref":"cups/oauth.c:506-508","code":"  506 | #elif defined(_WIN32)\n  507 |   if (_spawnl(_P_WAIT, \"start\", \"\", url, NULL))\n  508 |     goto done;","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/oauth.c#L506-L508"}]},{"id":"ERR_33","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"oauth_load_value(), cupsOAuthGetMetadata() metadata copy, and oauth_save_value() ignore the return value of read()/write(). A short or failed read yields a silently truncated cached token/metadata/secret; a short write produces a corrupt cache file reported as success.","fix":"Check read()/write() return values; loop on partial writes and treat errors as failures (remove the partial file).","locations":[{"ref":"cups/oauth.c:1998-1999","code":" 1998 |     if (!fstat(fd, &fileinfo) && fileinfo.st_size <= 65536 && (value = calloc(1, (size_t)fileinfo.st_size + 1)) != NULL)\n 1999 |       read(fd, value, (size_t)fileinfo.st_size);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/oauth.c#L1998-L1999"},{"ref":"cups/oauth.c:1167-1168","code":" 1167 |       while ((bytes = httpRead(http, buffer, sizeof(buffer))) > 0)\n 1168 |         write(fd, buffer, (size_t)bytes);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/oauth.c#L1167-L1168"},{"ref":"cups/oauth.c:2308-2310","code":" 2308 |       // Write the value and close...\n 2309 |       write(fd, value, strlen(value));\n 2310 |       close(fd);","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/oauth.c#L2308-L2310"}]},{"id":"ERR_34","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Numerous strdup()/calloc() results in the PPD-cache parser are stored without NULL checks (e.g. map->pwg/map->ppd in the Bin and Size handlers). On allocation failure these silently store NULL; later code that compares or prints these fields (cupsFilePrintf(\"%s\", map->pwg) in _ppdCacheWriteFile, _cups_strcasecmp against map.ppd) will dereference/pass NULL. The data originates from parsing untrusted cache/PPD files.","fix":"Check each strdup/calloc result and 'goto create_error' on NULL, consistent with the array allocations already guarded in the same function.","locations":[{"ref":"cups/ppd-cache.c:709-713","code":"  709 |       map      = pc->bins + pc->num_bins;\n  710 |       map->pwg = strdup(pwg_keyword);\n  711 |       map->ppd = strdup(ppd_keyword);\n  712 | \n  713 |       pc->num_bins ++;","lines":5,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ppd-cache.c#L709-L713"},{"ref":"cups/ppd-cache.c:760-762","code":"  760 | \n  761 |       size->map.pwg = strdup(pwg_keyword);\n  762 |       size->map.ppd = strdup(ppd_keyword);","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ppd-cache.c#L760-L762"}]},{"id":"ERR_35","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"_cupsRasterReadHeader for Apple raster computes cupsBitsPerColor = cupsBitsPerPixel / cupsNumColors with cupsBitsPerPixel taken directly from appleheader[0] (attacker-controlled, 0-255). If appleheader[0] is 0 then cupsBitsPerColor is 0; division is safe because cupsNumColors is forced >= 1, but the resulting non-standard bits-per-color/pixel values rely entirely on cups_raster_update to reject them. The header parser itself performs no sanity check, so any future code path that consumes the header before update() runs would use bogus dimensions.","fix":"Validate cupsBitsPerPixel (and the derived per-color value) immediately after reading the Apple header rather than relying solely on the later cups_raster_update call.","locations":[{"ref":"cups/raster-stream.c:974-980","code":"  974 |           r->header.cupsBitsPerPixel = appleheader[0];\n  975 |           r->header.cupsColorSpace   = appleheader[1] >= (sizeof(rawcspace) / sizeof(rawcspace[0])) ? CUPS_CSPACE_DEVICE1 : rawcspace[appleheader[1]];\n  976 |           r->header.cupsNumColors    = appleheader[1] >= (sizeof(rawnumcolors) / sizeof(rawnumcolors[0])) ? 1 : rawnumcolors[appleheader[1]];\n  977 |           r->header.cupsBitsPerColor = r->header.cupsBitsPerPixel / r->header.cupsNumColors;\n  978 |           r->header.cupsWidth        = ((unsigned)appleheader[12] << 24) | ((unsigned)appleheader[13] << 16) | ((unsigned)appleheader[14] << 8) | (unsigned)appleheader[15];\n  979 |           r->header.cupsHeight       = ((unsigned)appleheader[16] << 24) | ((unsigned)appleheader[17] << 16) | ((unsigned)appleheader[18] << 8) | (unsigned)appleheader[19];\n  980 |           r->header.cupsBytesPerLine = r->header.cupsWidth * r->header.cupsBitsPerPixel / 8;","lines":7,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/raster-stream.c#L974-L980"}]},{"id":"ERR_36","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"_cupsStrScand returns 0.0 and sets *bufptr = NULL on overflow of the 1024-byte temp buffer, but a 0.0 return is indistinguishable from a legitimately-parsed 0.0; callers that do not check bufptr for NULL will silently treat an overflowed (truncated) number as zero.","fix":"Document that callers MUST check *bufptr for NULL to distinguish error from a parsed zero, and ensure all call sites do so.","locations":[{"ref":"cups/string.c:873-916","code":"  873 |   while (isdigit(*buf & 255))\n  874 |     if (tempptr < (temp + sizeof(temp) - 1))\n  875 |       *tempptr++ = *buf++;\n  876 |     else\n  877 |     {\n  878 |       if (bufptr)\n  879 | \t*bufptr = NULL;\n  880 | \n  881 |       return (0.0);\n  882 |     }\n  883 | \n  884 |   if (*buf == '.')\n  885 |   {\n  886 |    /*\n  887 |     * Read fractional portion of number...\n  888 |     */\n  889 | \n  890 |     buf ++;\n  891 | \n  892 |     if (loc && loc->decimal_point)\n  893 |     {\n  894 |       cupsCopyString(tempptr, loc->decimal_point, sizeof(temp) - (size_t)(tempptr - temp));\n  895 |       tempptr += strlen(tempptr);\n  896 |     }\n  897 |     else if (tempptr < (temp + sizeof(temp) - 1))\n  898 |       *tempptr++ = '.';\n  899 |     else\n  900 |     {\n  901 |       if (bufptr)\n  902 |         *bufptr = NULL;\n  903 | \n  904 |       return (0.0);\n  905 |     }\n  906 | \n  907 |     while (isdigit(*buf & 255))\n  908 |       if (tempptr < (temp + sizeof(temp) - 1))\n  909 | \t*tempptr++ = *buf++;\n  910 |       else\n  911 |       {\n  912 | \tif (bufptr)\n  913 | \t  *bufptr = NULL;\n  914 | \n  915 | \treturn (0.0);\n  916 |       }","lines":44,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/string.c#L873-L916"}]},{"id":"ERR_37","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"httpCopyPeerCredentials() silently skips a certificate when http_der_to_pem() or realloc() fails, returning a truncated chain with no error indication; callers treat the partial chain as the peer's full credentials, potentially altering trust decisions. On realloc failure the original credentials buffer is also leaked (overwritten with NULL).","fix":"On failure free the accumulated buffer and return NULL; use a temp pointer for the realloc result to avoid leaking on failure.","locations":[{"ref":"cups/tls-gnutls.c:1420-1439","code":" 1420 |       while (count > 0)\n 1421 |       {\n 1422 | \t// Expand credentials string...\n 1423 | \tchar *pem = http_der_to_pem(certs->data, certs->size);\n 1424 | \t\t\t\t\t// PEM-encoded certificate\n 1425 | \tsize_t\tpemsize;\t\t// Length of PEM-encoded certificate\n 1426 | \n 1427 | \tif (pem && (credentials = realloc(credentials, alloc_creds + (pemsize = strlen(pem)) + 1)) != NULL)\n 1428 | \t{\n 1429 | \t  // Copy PEM-encoded data...\n 1430 | \t  memcpy(credentials + alloc_creds, pem, pemsize);\n 1431 | \t  credentials[alloc_creds + pemsize] = '\\0';\n 1432 | \t  alloc_creds += pemsize;\n 1433 | \t}\n 1434 | \n 1435 |         free(pem);\n 1436 | \n 1437 |         certs ++;\n 1438 |         count --;\n 1439 |       }","lines":20,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L1420-L1439"}]},{"id":"ERR_38","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"cupsGetUserAgent recomputes the full user-agent (uname/sysctl/registry calls) on every call whenever cg->user_agent[0] is empty, but _CUPS_UATOKENS_NONE legitimately sets user_agent to the empty string, so the cache is defeated and the expensive computation reruns on each call when None is configured.","fix":"Use a separate 'computed' flag rather than testing user_agent[0], so the None (empty) result is cached.","locations":[{"ref":"cups/usersys.c:310-313","code":"  310 |   if (!cg->user_agent[0])\n  311 |     cupsSetUserAgent(NULL);\n  312 | \n  313 |   return (cg->user_agent);","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/usersys.c#L310-L313"},{"ref":"cups/usersys.c:692-695","code":"  692 |       default :\n  693 |       case _CUPS_UATOKENS_NONE :\n  694 | \t  cg->user_agent[0] = '\\0';\n  695 | \t  break;","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/usersys.c#L692-L695"}]},{"id":"ERR_39","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"cupsCancelJob2 ignores the return value of httpAssembleURIf; if URI assembly fails (name too long) the request is built with a truncated/empty uri. cupsGetJobs2 checks this return value.","fix":"Check httpAssembleURIf's return value and set an error / return on failure, matching cupsGetJobs2.","locations":[{"ref":"cups/util.c:104-113","code":"  104 |   if (name)\n  105 |   {\n  106 |     httpAssembleURIf(HTTP_URI_CODING_ALL, uri, sizeof(uri), \"ipp\", NULL,\n  107 |                      \"localhost\", ippPort(), \"/printers/%s\", name);\n  108 | \n  109 |     ippAddString(request, IPP_TAG_OPERATION, IPP_TAG_URI, \"printer-uri\", NULL,\n  110 |                  uri);\n  111 |     ippAddInteger(request, IPP_TAG_OPERATION, IPP_TAG_INTEGER, \"job-id\",\n  112 |                   job_id);\n  113 |   }","lines":10,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/util.c#L104-L113"}]},{"id":"ERR_40","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"add_file() calls realloc() directly into the local 'compressions'/'filetypes' pointers but, when realloc fails, the original job->compressions/job->filetypes blocks are still referenced via job-> only because the code conditionally assigns (lines 1095-1099). However on realloc failure the freshly-allocated-but-not-assigned case for num_files==0 leaks nothing, yet on failure the function aborts the whole job with CUPSD_JOB_PURGE - acceptable - but the realloc result is leaked only if exactly one of the two reallocs succeeds: the succeeding one is assigned to job-> while the job is then purged, which is fine, but the temporary on the failing branch is fine too. The real issue: when num_files==0 and only one of the two malloc()s succeeds, the succeeded buffer is assigned to job-> and then the job is purged - no leak - but if both succeed for num_files==0 the old (NULL) is replaced; no problem. Low-risk but the conditional-assign-then-check pattern is error-prone.","fix":"Allocate into temporaries, check both for success before assigning either into job->, and free any partially successful allocation on the error path to make the ownership explicit.","locations":[{"ref":"scheduler/ipp.c:1081-1111","code":" 1081 |   if (job->num_files == 0)\n 1082 |   {\n 1083 |     compressions = (int *)malloc(sizeof(int));\n 1084 |     filetypes    = (mime_type_t **)malloc(sizeof(mime_type_t *));\n 1085 |   }\n 1086 |   else\n 1087 |   {\n 1088 |     compressions = (int *)realloc(job->compressions,\n 1089 |                                   (size_t)(job->num_files + 1) * sizeof(int));\n 1090 |     filetypes    = (mime_type_t **)realloc(job->filetypes,\n 1091 |                                            (size_t)(job->num_files + 1) *\n 1092 | \t\t\t\t\t   sizeof(mime_type_t *));\n 1093 |   }\n 1094 | \n 1095 |   if (compressions)\n 1096 |     job->compressions = compressions;\n 1097 | \n 1098 |   if (filetypes)\n 1099 |     job->filetypes = filetypes;\n 1100 | \n 1101 |   if (!compressions || !filetypes)\n 1102 |   {\n 1103 |     cupsdSetJobState(job, IPP_JSTATE_ABORTED, CUPSD_JOB_PURGE,\n 1104 |                      \"Job aborted because the scheduler ran out of memory.\");\n 1105 | \n 1106 |     if (con)\n 1107 |       send_ipp_status(con, IPP_STATUS_ERROR_INTERNAL,\n 1108 | \t\t      _(\"Unable to allocate memory for file types.\"));\n 1109 | \n 1110 |     return (-1);\n 1111 |   }","lines":31,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L1081-L1111"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"In cupsCharsetToUTF8 / cupsUTF8ToCharset, when map_encoding != encoding the code opens BOTH map_from_utf8 and map_to_utf8 via iconv_open, but only checks/uses the one relevant to the direction. If one iconv_open succeeds and the other returns (iconv_t)-1, the cached map_encoding is still set to encoding, so a later ations":[{"ref":"cups/http-addr.c:382-398","code":"  382 | #ifdef HAVE_RES_INIT\n  383 |   // STR #2920: Initialize resolver after failure in cups-polld\n  384 |   //\n  385 |   // If the previous lookup failed, re-initialize the resolver to prevent\n  386 |   // temporary network errors from persisting.  This *should* be handled by\n  387 |   // the resolver libraries, but apparently the glibc folks do not agree.\n  388 |   //\n  389 |   // We set a flag at the end of this function if we encounter an error that\n  390 |   // requires reinitialization of the resolver functions.  We then call\n  391 |   // res_init() if the flag is set on the next call here or in httpAddrLookup().\n  392 |   if (cg->need_res_init)\n  393 |   {\n  394 |     res_init();\n  395 | \n  396 |     cg->need_res_init = 0;\n  397 |   }\n  398 | #endif // HAVE_RES_INIT","lines":17,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addr.c#L382-L398"},{"ref":"cups/http-addr.c:406-407","code":"  406 |     if (error == EAI_FAIL)\n  407 |       cg->need_res_init = 1;","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addr.c#L406-L407"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Comment says 'rgb_16: 16-bit per component (32-bit) DeviceRGB' but 16-bit per component RGB is 48-bit, and the code sets cupsBitsPerPixel = 48 for rgb_16. The '(32-bit)' is a typo/copy-paste error.","fix":"Change '(32-bit)' to '(48-bit)' in the doc comment for rgb_16.","locations":[{"ref":"cups/raster-stream.c:209-210","code":"  209 | // - \"rgb_8\": 8-bit per component (24-bit) DeviceRGB\n  210 | // - \"rgb_16\": 16-bit per component (32-bit) DeviceRGB","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/raster-stream.c#L209-L210"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Inva
