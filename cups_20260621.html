equested-attributes\", NULL, \"all\");\n 5239 | \n 5240 |     response = cupsDoRequest(http, request, resource);\n 5241 | \n 5242 |     cupsdLogPrinter(printer, CUPSD_LOG_DEBUG, \"IPP/1.1 Get-Printer-Attributes returned %s (%s)\", ippErrorString(cupsGetError()), cupsGetErrorString());\n 5243 |   }\n 5244 | \n 5245 |  /*\n 5246 |   * If we did not succeed to obtain the \"media-col-database\" attribute\n 5247 |   * try to get it separately\n 5248 |   */\n 5249 | \n 5250 |   if (ippFindAttribute(response, \"media-col-database\", IPP_TAG_BEGIN_COLLECTION) == NULL)\n 5251 |   {\n 5252 |     ipp_t *response2;\t\t\t/* Second response */\n 5253 | \n 5254 |     cupsdLogPrinter(printer, CUPSD_LOG_DEBUG, \"Querying \\\"media-col-database\\\" attribute separately.\");\n 5255 |     request = ippNewRequest(IPP_OP_GET_PRINTER_ATTRIBUTES);\n 5256 |     ippSetVersion(request, 2, 0);\n 5257 |     ippAddString(request, IPP_TAG_OPERATION, IPP_TAG_URI, \"printer-uri\", NULL, device_uri);\n 5258 |     ippAddString(request, IPP_TAG_OPERATION, IPP_TAG_KEYWORD, \"requested-attributes\", NULL, \"media-col-database\");\n 5259 |     response2 = cupsDoRequest(http, request, resource);\n 5260 |     //ipp_status = cupsGetError();\n 5261 |     if (response2)\n 5262 |     {\n 5263 |       if ((attr = ippFindAttribute(response2, \"media-col-database\", IPP_TAG_BEGIN_COLLECTION)) != NULL)\n 5264 |       {\n 5265 |        /*\n 5266 | \t* Copy \"media-col-database\" attribute into the original\n 5267 | \t* IPP response\n 5268 | \t*/\n 5269 | \n 5270 | \tcupsdLogPrinter(printer, CUPSD_LOG_WARN, \"The printer does not support requests with attribute set \\\"all,media-col-database\\\", which breaks IPP conformance (RFC 8011, 4.2.5.1 \\\"requested-attributes\\\") - report the issue to your printer manufacturer\");\n 5271 | \n 5272 | \tcupsdLogPrinter(printer, CUPSD_LOG_DEBUG, \"\\\"media-col-database\\\" attribute found.\");\n 5273 | \tippCopyAttribute(response, attr, 0);\n 5274 |       }\n 5275 |       ippDelete(response2);\n 5276 |     }\n 5277 |   }\n 5278 | \n 5279 |   if (ippFindAttribute(response, \"media-col-database\", IPP_TAG_BEGIN_COLLECTION) == NULL && ippFindAttribute(response, \"media-supported\", IPP_TAG_ZERO) == NULL && ippFindAttribute(response, \"media-size-supported\", IPP_TAG_BEGIN_COLLECTION) == NULL)\n 5280 |   {\n 5281 |     cupsdLogPrinter(printer, CUPSD_LOG_ERROR, \"The printer doesn't provide attributes \\\"media-col-database\\\", \\\"media-size-supported\\\", or \\\"media-supported\\\" required for generating the PPD file.\");\n 5282 | \n 5283 |     /* Force printer to timeout and be deleted */\n 5284 |     cupsRWLockWrite(&printer->lock);\n 5285 |     printer->state_time = 0;\n 5286 |     printer->temporary = 1;\n 5287 |     cupsRWUnlock(&printer->lock);\n 5288 | \n 5289 |     send_ipp_status(con, IPP_STATUS_ERROR_DEVICE, _(\"The printer does not provide attributes required for IPP Everywhere.\"));\n 5290 |     goto finish_response;\n 5291 |   }\n 5292 | \n 5293 |   // Validate response from printer...\n 5294 |   if (!ippValidateAttributes(response))\n 5295 |   {\n 5296 |     /* Force printer to timeout and be deleted */\n 5297 |     cupsRWLockWrite(&printer->lock);\n 5298 |     printer->state_time = 0;\n 5299 |     printer->temporary = 1;\n 5300 |     cupsRWUnlock(&printer->lock);\n 5301 | \n 5302 |     send_ipp_status(con, IPP_STATUS_ERROR_DEVICE, _(\"Printer returned invalid data: %s\"), cupsGetErrorString());\n 5303 |     goto finish_response;\n 5304 |   }\n 5305 | \n 5306 |   httpClose(http);","lines":113,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L5194-L5306"},{"ref":"scheduler/ipp.c:5427-5464","code":" 5427 |   finish_response:\n 5428 | \n 5429 |   if (ippGetStatusCode(con->response) >= IPP_STATUS_ERROR_BAD_REQUEST && response)\n 5430 |   {\n 5431 |     ipp_tag_t\t\tgroup;\t\t/* Current group tag */\n 5432 | \n 5433 |     cupsdLogClient(con, CUPSD_LOG_DEBUG, \"Printer attributes:\");\n 5434 | \n 5435 |     for (group = IPP_TAG_ZERO, attr = ippFirstAttribute(response); attr; attr = ippNextAttribute(response))\n 5436 |     {\n 5437 |       const char  *name;                /* Attribute name */\n 5438 |       char        value[1024];          /* Attribute value */\n 5439 | \n 5440 |       if (group != ippGetGroupTag(attr))\n 5441 |       {\n 5442 |         group = ippGetGroupTag(attr);\n 5443 |         if (group != IPP_TAG_ZERO)\n 5444 |           cupsdLogClient(con, CUPSD_LOG_DEBUG, \"%s\", ippTagString(group));\n 5445 |       }\n 5446 | \n 5447 |       if ((name = ippGetName(attr)) == NULL)\n 5448 |         continue;\n 5449 | \n 5450 |       ippAttributeString(attr, value, sizeof(value));\n 5451 | \n 5452 |       cupsdLogClient(con, CUPSD_LOG_DEBUG, \"%s %s%s '%s'\", name, ippGetCount(attr) > 1 ? \"1setOf \" : \"\", ippTagString(ippGetValueTag(attr)), value);\n 5453 |     }\n 5454 | \n 5455 |     cupsdLogClient(con, CUPSD_LOG_DEBUG, \"end-of-attributes-tag\");\n 5456 |   }\n 5457 | \n 5458 |   ippDelete(response);\n 5459 | \n 5460 |   send_response(con);\n 5461 | \n 5462 |   con->bg_pending = 0;\n 5463 | \n 5464 |   return (NULL);","lines":38,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L5427-L5464"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"cupsFormatStringv computes field width into an int via `width = width * 10 + *format++ - '0'` with no bound. A format like \"%2147483648d\" overflows width (signed int, UB) and the later guard `(size_t)(width + 2) > sizeof(temp)` casts a possibly-negative width to size_t. For the 'c' (character array) case, width is used directly as a memcpy length: `memcpy(bufptr, va_arg(ap, char *), (size_t)width)` after clamping only to (bufend - bufptr); a large width passes the `(bufptr + width) > bufend` check arithmetic with pointer overflow and can read/write out of bounds.","fix":"Bound width/prec parsing to a sane maximum (e.g. reject if width > some limit), and validate width as a non-negative, in-range size before using it as a memcpy length.","locations":[{"ref":"cups/string.c:242-248","code":"  242 | \twhile (isdigit(*format & 255))\n  243 | \t{\n  244 | \t  if (tptr < (tformat + sizeof(tformat) - 1))\n  245 | \t    *tptr++ = *format;\n  246 | \n  247 | \t  width = width * 10 + *format++ - '0';\n  248 | \t}","lines":7,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/string.c#L242-L248"},{"ref":"cups/string.c:380-398","code":"  380 |         case 'c' : // Character or character array\n  381 | \t    bytes += width;\n  382 | \n  383 | \t    if (bufptr < bufend)\n  384 | \t    {\n  385 | \t      if (width <= 1)\n  386 | \t      {\n  387 | \t        *bufptr++ = (char)va_arg(ap, int);\n  388 | \t      }\n  389 | \t      else\n  390 | \t      {\n  391 | \t\tif ((bufptr + width) > bufend)\n  392 | \t\t  width = (int)(bufend - bufptr);\n  393 | \n  394 | \t\tmemcpy(bufptr, va_arg(ap, char *), (size_t)width);\n  395 | \t\tbufptr += width;\n  396 | \t      }\n  397 | \t    }\n  398 | \t    break;","lines":19,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/string.c#L380-L398"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"cups_array_add grows the element array by doubling (count = alloc_elements * 2) up to 1024 then +1024, with count as a plain int. For very large arrays the doubling and the `(size_t)count * sizeof(void *)` multiply can overflow int (count) before the size_t cast, yielding a small/negative allocation and subsequent heap overflow. num_elements/alloc_elements are all int.","fix":"Use size_t for count and the growth arithmetic, and check for overflow before multiplying by sizeof(void *).","locations":[{"ref":"cups/array.c:1079-1112","code":" 1079 |   if (a->num_elements >= a->alloc_elements)\n 1080 |   {\n 1081 |     // Allocate additional elements; start with 16 elements, then\n 1082 |     // double the size until 1024 elements, then add 1024 elements\n 1083 |     // thereafter...\n 1084 |     void\t**temp;\t\t\t// New array elements\n 1085 |     int\t\tcount;\t\t\t// New allocation count\n 1086 | \n 1087 | \n 1088 |     if (a->alloc_elements == 0)\n 1089 |     {\n 1090 |       count = 16;\n 1091 |       temp  = malloc((size_t)count * sizeof(void *));\n 1092 |     }\n 1093 |     else\n 1094 |     {\n 1095 |       if (a->alloc_elements < 1024)\n 1096 |         count = a->alloc_elements * 2;\n 1097 |       else\n 1098 |         count = a->alloc_elements + 1024;\n 1099 | \n 1100 |       temp = realloc(a->elements, (size_t)count * sizeof(void *));\n 1101 |     }\n 1102 | \n 1103 |     DEBUG_printf(\"9cups_array_add: count=\" CUPS_LLFMT, CUPS_LLCAST count);\n 1104 | \n 1105 |     if (!temp)\n 1106 |     {\n 1107 |       DEBUG_puts(\"9cups_array_add: allocation failed, returning 0\");\n 1108 |       return (0);\n 1109 |     }\n 1110 | \n 1111 |     a->alloc_elements = count;\n 1112 |     a->elements       = temp;","lines":34,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/array.c#L1079-L1112"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"cupsFilePrintf/cupsFilePuts compare the formatted/string length against sizeof(fp->buf) with `(size_t)bytes > sizeof(fp->buf)`. The buffer is 4096 bytes; when bytes == sizeof(fp->buf) exactly, the else branch is taken and memcpy(fp->ptr, ..., bytes) copies a full 4096 bytes into a buffer that may already hold data (cupsFileFlush only flushes when ptr+bytes > end, and end == buf+sizeof(buf)). Boundary handling between the direct-write path and the buffered path is off-by-one relative to cupsFileWrite which uses `bytes > sizeof(fp->buf)` only because it flushed first; the printf/puts paths flush with the same condition but then memcpy up to the full buffer size which can exactly fill but leaves no slack and relies on the prior flush check `(fp->ptr + bytes) > fp->end`.","fix":"Audit the boundary so a length exactly equal to sizeof(fp->buf) always takes the direct cups_write/cups_compress path (use `>=`), matching cupsFileWrite's intent, to avoid a memcpy that fills the buffer with no room for subsequent buffered writes.","locations":[{"ref":"cups/file.c:1237-1253","code":" 1237 |   if ((size_t)bytes > sizeof(fp->buf))\n 1238 |   {\n 1239 |     if (fp->compressed)\n 1240 |       return ((int)cups_compress(fp, fp->printf_buffer, (size_t)bytes));\n 1241 |     else\n 1242 |       return ((int)cups_write(fp, fp->printf_buffer, (size_t)bytes));\n 1243 |   }\n 1244 |   else\n 1245 |   {\n 1246 |     memcpy(fp->ptr, fp->printf_buffer, (size_t)bytes);\n 1247 |     fp->ptr += bytes;\n 1248 | \n 1249 |     if (fp->is_stdio && cupsFileFlush(fp))\n 1250 |       return (-1);\n 1251 |     else\n 1252 |       return ((int)bytes);\n 1253 |   }","lines":17,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/file.c#L1237-L1253"},{"ref":"cups/file.c:1434-1450","code":" 1434 |   if ((size_t)bytes > sizeof(fp->buf))\n 1435 |   {\n 1436 |     if (fp->compressed)\n 1437 |       return ((int)cups_compress(fp, s, (size_t)bytes));\n 1438 |     else\n 1439 |       return ((int)cups_write(fp, s, (size_t)bytes));\n 1440 |   }\n 1441 |   else\n 1442 |   {\n 1443 |     memcpy(fp->ptr, s, (size_t)bytes);\n 1444 |     fp->ptr += bytes;\n 1445 | \n 1446 |     if (fp->is_stdio && cupsFileFlush(fp))\n 1447 |       return (-1);\n 1448 |     else\n 1449 |       return ((int)bytes);\n 1450 |   }","lines":17,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/file.c#L1434-L1450"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"hash_data() casts size_t lengths to int when calling _cupsMD5Append ((int)alen, (int)blen). For data >= 2GB this truncates/becomes negative, silently producing a wrong MD5 or skipping data. cupsHashData accepts a size_t datalen so callers can exceed INT_MAX.","fix":"Change _cupsMD5Append to take size_t, or feed the MD5 in <=INT_MAX chunks instead of a single truncating cast.","locations":[{"ref":"cups/hash.c:217-219","code":"  217 |     _cupsMD5Append(&state, a, (int)alen);\n  218 |     if (b && blen)\n  219 |       _cupsMD5Append(&state, b, (int)blen);","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/hash.c#L217-L219"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"httpGetDateTime parses year/day/hour/min/sec from untrusted input via sscanf but only bounds year on the high side (year > 9999). A negative year (sscanf %d accepts a leading '-') passes, and the days arithmetic (year - 1970)*365 + ... underflows to a wildly wrong time_t. day/hour/min/sec are never range-checked either.","fix":"Validate 1970 <= year <= sane-max, 1 <= day <= 31, 0 <= hour <= 23, 0 <= min/sec <= 59 before computing; return 0 otherwise.","locations":[{"ref":"cups/http-support.c:769-807","code":"  769 |   if (sscanf(s, \"%*s%d%15s%d%d:%d:%d\", &day, mon, &year, &hour, &min, &sec) < 6)\n  770 |     return (0);\n  771 | \n  772 |   DEBUG_printf(\"4httpGetDateTime: day=%d, mon=\\\"%s\\\", year=%d, hour=%d, min=%d, sec=%d\", day, mon, year, hour, min, sec);\n  773 | \n  774 |   // Check for invalid year (RFC 7231 says it's 4DIGIT)\n  775 |   if (year > 9999)\n  776 |     return (0);\n  777 | \n  778 |   // Convert the month name to a number from 0 to 11.\n  779 |   for (i = 0; i < 12; i ++)\n  780 |   {\n  781 |     if (!_cups_strcasecmp(mon, http_months[i]))\n  782 |       break;\n  783 |   }\n  784 | \n  785 |   if (i >= 12)\n  786 |     return (0);\n  787 | \n  788 |   DEBUG_printf(\"4httpGetDateTime: i=%d\", i);\n  789 | \n  790 |   // Now convert the date and time to a UNIX time value in seconds since\n  791 |   // 1970.  We can't use mktime() since the timezone may not be UTC but\n  792 |   // the date/time string *is* UTC.\n  793 |   if ((year & 3) == 0 && ((year % 100) != 0 || (year % 400) == 0))\n  794 |     days = leap_days[i] + day - 1;\n  795 |   else\n  796 |     days = normal_days[i] + day - 1;\n  797 | \n  798 |   DEBUG_printf(\"4httpGetDateTime: days=%ld\", days);\n  799 | \n  800 |   days += (year - 1970) * 365 +\t\t// 365 days per year (normally)\n  801 |           ((year - 1) / 4 - 492) -\t// + leap days\n  802 | \t  ((year - 1) / 100 - 19) +\t// - 100 year days\n  803 |           ((year - 1) / 400 - 4);\t// + 400 year days\n  804 | \n  805 |   DEBUG_printf(\"4httpGetDateTime: days=%ld\\n\", days);\n  806 | \n  807 |   return (days * 86400 + hour * 3600 + min * 60 + sec);","lines":39,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L769-L807"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"http_write_chunk() formats the chunk-size header with snprintf(header, sizeof(header), \"%x\\r\\n\", (unsigned)length). On a 64-bit platform size_t length is truncated to unsigned (32-bit), so for a single write larger than 4 GiB the emitted chunk size disagrees with the number of body bytes subsequently written by http_write(buffer, length), corrupting the chunked HTTP framing.","fix":"Use a width-correct format for size_t (e.g. CUPS_LLFMT with CUPS_LLCAST, or \"%zx\") so the chunk-size header matches the actual byte count.","locations":[{"ref":"cups/http.c:4778-4797","code":" 4778 | static ssize_t\t\t\t\t// O - Number bytes written\n 4779 | http_write_chunk(http_t     *http,\t// I - HTTP connection\n 4780 |                  const char *buffer,\t// I - Buffer to write\n 4781 | \t\t size_t        length)\t// I - Length of buffer\n 4782 | {\n 4783 |   char\t\theader[16];\t\t// Chunk header\n 4784 |   ssize_t\tbytes;\t\t\t// Bytes written\n 4785 | \n 4786 | \n 4787 |   DEBUG_printf(\"7http_write_chunk(http=%p, buffer=%p, length=\" CUPS_LLFMT \")\", (void *)http, (void *)buffer, CUPS_LLCAST length);\n 4788 | \n 4789 |   // Write the chunk header, data, and trailer.\n 4790 |   snprintf(header, sizeof(header), \"%x\\r\\n\", (unsigned)length);\n 4791 |   if (http_write(http, header, strlen(header)) < 0)\n 4792 |   {\n 4793 |     DEBUG_puts(\"8http_write_chunk: http_write of length failed.\");\n 4794 |     return (-1);\n 4795 |   }\n 4796 | \n 4797 |   if ((bytes = http_write(http, buffer, length)) < 0)","lines":20,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http.c#L4778-L4797"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Possible negative/empty-attribute array index when emitting raster print-quality resolutions. count = ippGetCount(attr) for pwg-raster-document-resolution-supported; if the attribute exists but has 0 values, the High branch can still be entered via 'ippContainsInteger(quality, IPP_QUALITY_HIGH)' and then reads resolutions[count - 1] = resolutions[-1] (out-of-bounds stack read) and calls ippGetResolution(attr, -1, ...). The Normal/Draft paths call ippGetResolution on an empty attribute too. Untrusted IPP input controls count.","fix":"After 'count = ippGetCount(attr)', bail out (skip the block / goto error) when count < 1 before generating quality options.","locations":[{"ref":"cups/ppd-cache.c:4156-4214","code":" 4156 |     count = ippGetCount(attr);\n 4157 |     if (count > (int)(sizeof(resolutions) / sizeof(resolutions[0])))\n 4158 |       count = (int)(sizeof(resolutions) / sizeof(resolutions[0]));\n 4159 | \n 4160 |     resolutions[0] = 0; /* Not in loop to silence Clang static analyzer... */\n 4161 |     for (i = 1; i < count; i ++)\n 4162 |       resolutions[i] = i;\n 4163 | \n 4164 |     for (i = 0; i < (count - 1); i ++)\n 4165 |     {\n 4166 |       for (j = i + 1; j < count; j ++)\n 4167 |       {\n 4168 |         int       ix, iy,               /* First X and Y resolution */\n 4169 |                   jx, jy,               /* Second X and Y resolution */\n 4170 |                   temp;                 /* Swap variable */\n 4171 |         ipp_res_t units;                /* Resolution units */\n 4172 | \n 4173 |         ix = ippGetResolution(attr, resolutions[i], &iy, &units);\n 4174 |         jx = ippGetResolution(attr, resolutions[j], &jy, &units);\n 4175 | \n 4176 |         if (ix > jx || (ix == jx && iy > jy))\n 4177 |         {\n 4178 |          /*\n 4179 |           * Swap these two resolutions...\n 4180 |           */\n 4181 | \n 4182 |           temp           = resolutions[i];\n 4183 |           resolutions[i] = resolutions[j];\n 4184 |           resolutions[j] = temp;\n 4185 |         }\n 4186 |       }\n 4187 |     }\n 4188 | \n 4189 |    /*\n 4190 |     * Generate print quality options...\n 4191 |     */\n 4192 | \n 4193 |     pwg_ppdize_resolution(attr, resolutions[count / 2], &xres, &yres, ppdname, sizeof(ppdname));\n 4194 |     cupsFilePrintf(fp, \"*DefaultResolution: %s\\n\", ppdname);\n 4195 | \n 4196 |     cupsFilePuts(fp, \"*OpenUI *cupsPrintQuality: PickOne\\n\"\n 4197 | \t\t     \"*OrderDependency: 10 AnySetup *cupsPrintQuality\\n\"\n 4198 | \t\t     \"*DefaultcupsPrintQuality: Normal\\n\");\n 4199 |     if (count > 2 || ippContainsInteger(quality, IPP_QUALITY_DRAFT))\n 4200 |     {\n 4201 |       pwg_ppdize_resolution(attr, resolutions[0], &xres, &yres, NULL, 0);\n 4202 |       cupsFilePrintf(fp, \"*cupsPrintQuality Draft: \\\"<<\/HWResolution[%d %d]>>setpagedevice\\\"\\n\", xres, yres);\n 4203 |       have_qdraft = 1;\n 4204 |     }\n 4205 | \n 4206 |     pwg_ppdize_resolution(attr, resolutions[count / 2], &xres, &yres, NULL, 0);\n 4207 |     cupsFilePrintf(fp, \"*cupsPrintQuality Normal: \\\"<<\/HWResolution[%d %d]>>setpagedevice\\\"\\n\", xres, yres);\n 4208 | \n 4209 |     if (count > 1 || ippContainsInteger(quality, IPP_QUALITY_HIGH))\n 4210 |     {\n 4211 |       pwg_ppdize_resolution(attr, resolutions[count - 1], &xres, &yres, NULL, 0);\n 4212 |       cupsFilePrintf(fp, \"*cupsPrintQuality High: \\\"<<\/HWResolution[%d %d]>>setpagedevice\\\"\\n\", xres, yres);\n 4213 |       have_qhigh = 1;\n 4214 |     }","lines":59,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ppd-cache.c#L4156-L4214"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"_cupsRasterReadPixels (uncompressed path) decrements r->remaining by 'len / r->header.cupsBytesPerLine' without checking that len is a multiple of cupsBytesPerLine or that the quotient does not exceed r->remaining. A caller (RIP filter handling an untrusted stream) passing a len larger than remaining*cupsBytesPerLine underflows the unsigned r->remaining to a huge value, which can cause subsequent reads to be treated as if many rows remain.","fix":"Clamp the row decrement to r->remaining (e.g. rows = len / cupsBytesPerLine; if (rows > r->remaining) rows = r->remaining; r->remaining -= rows;) consistent with the compressed path which decrements one row at a time under a 'r->remaining > 0' guard.","locations":[{"ref":"cups/raster-stream.c:1060-1063","code":" 1060 |   if (!r->compressed)\n 1061 |   {\n 1062 |     // Read without compression...\n 1063 |     r->remaining -= len / r->header.cupsBytesPerLine;","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/raster-stream.c#L1060-L1063"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"_cupsRasterWritePixels decrements r->remaining by 'len / r->header.cupsBytesPerLine' with no clamp; if len exceeds remaining*cupsBytesPerLine the unsigned subtraction underflows. Same class of issue as the read path.","fix":"Clamp the computed row count to r->remaining before subtracting.","locations":[{"ref":"cups/raster-stream.c:1427-1430","code":" 1427 |   if (!r->compressed)\n 1428 |   {\n 1429 |     // Without compression, just write the raster data raw unless the data needs to be swapped...\n 1430 |     r->remaining -= len / r->header.cupsBytesPerLine;","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/raster-stream.c#L1427-L1430"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Content-Length is computed as ippLength(request) + (size_t)fileinfo.st_size. st_size is signed off_t; on a 32-bit size_t platform or with a crafted/huge file this addition can wrap, producing a Content-Length smaller than the data actually streamed and corrupting HTTP framing.","fix":"Use a 64-bit width for length and check for overflow before adding st_size to ippLength(); fall back to chunked encoding if the sum would overflow.","locations":[{"ref":"cups/request.c:176-183","code":"  176 |     if (!S_ISREG(fileinfo.st_mode))\n  177 |       length = 0;\t\t\t/* Chunk when piping */\n  178 |     else\n  179 | #endif /* !_WIN32 */\n  180 |     length = ippLength(request) + (size_t)fileinfo.st_size;\n  181 |   }\n  182 |   else\n  183 |     length = ippLength(request);","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/request.c#L176-L183"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"In cupsSideChannelSNMPGet, real_datalen is computed as 'real_datalen -= real_oidlen' where real_oidlen is strlen(real_data)+1. If the backend returns a malformed response whose first string is longer than real_datalen (which equals the bytes actually read), real_datalen becomes negative. The subsequent test '(real_datalen + 1) > *datalen' is a signed comparison that a negative value passes, and then memcpy(data, ..., (size_t)real_datalen) casts the negative int to a huge size_t, causing a massive out-of-bounds copy.","fix":"After computing real_datalen, reject the response when real_oidlen > real_datalen (i.e. real_datalen < 0) by returning CUPS_SC_STATUS_BAD_MESSAGE before the memcpy.","locations":[{"ref":"cups/sidechannel.c:322-334","code":"  322 |     real_oidlen  = (int)strlen(real_data) + 1;\n  323 |     real_datalen -= real_oidlen;\n  324 | \n  325 |     if ((real_datalen + 1) > *datalen)\n  326 |     {\n  327 |       _cupsBufferRelease(real_data);\n  328 |       return (CUPS_SC_STATUS_TOO_BIG);\n  329 |     }\n  330 | \n  331 |     memcpy(data, real_data + real_oidlen, (size_t)real_datalen);\n  332 |     data[real_datalen] = '\\0';\n  333 | \n  334 |     *datalen = real_datalen;","lines":13,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/sidechannel.c#L322-L334"}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"cupsFormatStringv float/integer/pointer cases guard with `if ((size_t)(width + 2) > sizeof(temp)) break;`. width is a user-controlled int; (width + 2) can overflow to a negative int which, cast to size_t, becomes huge and passes the > sizeof(temp) test (break) - that is safe-ish, but a width like INT_MAX-1 yields (size_t)(INT_MAX+1) overflow UB. The check relies on signed-overflow-free arithmetic that is not guaranteed.","fix":"Perform the comparison without signed overflow, e.g. `if (width < 0 || (size_t)width + 2 > sizeof(temp)) break;`.","locations":[{"ref":"cups/string.c:321-322","code":"  321 | \t    if ((size_t)(width + 2) > sizeof(temp))\n  322 | \t      break;","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/string.c#L321-L322"},{"ref":"cups/string.c:343-344","code":"  343 | \t    if ((size_t)(width + 2) > sizeof(temp))\n  344 | \t      break;","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/string.c#L343-L344"},{"ref":"cups/string.c:366-367","code":"  366 | \t    if ((size_t)(width + 2) > sizeof(temp))\n  367 | \t      break;","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/string.c#L366-L367"}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In the WGS-84 detection in cupsDNSSDServiceSetLocation(), the geo coordinate conversion casts a double to int with no range checking: `(int)(lat * 3600000.0) + 0x40000000 + 0x40000000`. For out-of-range latitude/longitude (e.g. a malformed geo: URI with very large values) the double-to-int conversion is undefined behavior and the subsequent unsigned bias arithmetic produces garbage LOC records. Latitude/longitude are parsed from an untrusted string via sscanf with no bounds enforcement.","fix":"Clamp lat to [-90,90] and lon to [-180,180] (and alt to a sane range) before the integer conversion, or reject the URI if values are out of range.","locations":[{"ref":"cups/dnssd.c:1867-1870","code":" 1867 |   sscanf(geo_uri, \"geo:%lf,%lf,%lf\", &lat, &lon, &alt);\n 1868 |   lat_ksec = (unsigned)((int)(lat * 3600000.0) + 0x40000000 + 0x40000000);\n 1869 |   lon_ksec = (unsigned)((int)(lon * 3600000.0) + 0x40000000 + 0x40000000);\n 1870 |   alt_cm   = (unsigned)((int)(alt * 100.0) + 10000000);","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dnssd.c#L1867-L1870"}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In cups_fill, the gzip extra-field length is read as `bytes = (ptr[1] << 8) | ptr[0]` into an ssize_t, then `ptr += 2 + bytes`. ptr/end are within the initial 4096-byte buffer; a crafted extra length up to 65535 makes `ptr + 2 + bytes` overflow past end, which is checked (`if (ptr > end)`), but the pointer arithmetic itself advances ptr far beyond the buffer before the check, which is technically undefined behavior (forming a pointer more than one-past-the-end).","fix":"Validate `bytes <= (size_t)(end - ptr - 2)` before advancing ptr, comparing lengths rather than forming an out-of-bounds pointer.","locations":[{"ref":"cups/file.c:1996-2008","code":" 1996 | \tbytes = (ptr[1] << 8) | ptr[0];\n 1997 | \tptr   += 2 + bytes;\n 1998 | \n 1999 | \tif (ptr > end)\n 2000 | \t{\n 2001 | \t  // Can't read from file!\n 2002 | \t  DEBUG_puts(\"9cups_fill: Extra gzip header data does not fit in initial buffer, returning -1.\");\n 2003 | \n 2004 |           fp->eof = 1;\n 2005 | \t  errno   = EIO;\n 2006 | \n 2007 | \t  return (-1);\n 2008 | \t}","lines":13,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/file.c#L1996-L2008"}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"httpAssembleURIf checks '(size_t)bytes >= sizeof(resource)' but vsnprintf may return negative on error; casting a negative int to size_t yields a huge value (overflow branch taken, safe) yet conflates encoding-error with overflow.","fix":"Use 'if (bytes < 0 || (size_t)bytes >= sizeof(resource))' and treat negative as an explicit error.","locations":[{"ref":"cups/http-support.c:366-373","code":"  366 |   bytes = vsnprintf(resource, sizeof(resource), resourcef, ap);\n  367 |   va_end(ap);\n  368 | \n  369 |   if ((size_t)bytes >= sizeof(resource))\n  370 |   {\n  371 |     *uri = '\\0';\n  372 |     return (HTTP_URI_STATUS_OVERFLOW);\n  373 |   }","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L366-L373"}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"cupsJSONImportString's \\u hex decoder and digit classification call isdigit on a possibly-signed char without the & 255 mask used elsewhere in the file, risking misclassification/UB for bytes >= 0x80.","fix":"Mask the argument to isdigit/tolower with & 255 to match the rest of the file and avoid UB on signed-char platforms.","locations":[{"ref":"cups/json.c:954-962","code":"  954 |             for (ch = 0, digit = 0; digit < 4; digit ++)\n  955 |             {\n  956 |               s ++;\n  957 |               ch <<= 4;\n  958 |               if (isdigit(*s))\n  959 |                 ch |= *s - '0';\n  960 |               else\n  961 |                 ch |= tolower(*s) - 'a' + 10;\n  962 |             }","lines":9,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/json.c#L954-L962"}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"_cupsMD5Append takes nbytes as int and computes nbits = (unsigned)(nbytes << 3); for nbytes > INT_MAX/8 the signed shift overflows (UB) and the bit-length accounting becomes incorrect. The API forces int for a conceptually size_t length.","fix":"Take a size_t length and compute the bit count in 64-bit arithmetic, or restrict/loop callers to <= INT_MAX/8 per call.","locations":[{"ref":"cups/md5.c:282-296","code":"  282 | _cupsMD5Append(_cups_md5_state_t *pms, const unsigned char *data, int nbytes)\n  283 | {\n  284 |     const unsigned char *p = data;\n  285 |     int left = nbytes;\n  286 |     int offset = (pms->count[0] >> 3) & 63;\n  287 |     unsigned int nbits = (unsigned int)(nbytes << 3);\n  288 | \n  289 |     if (nbytes <= 0)\n  290 | \treturn;\n  291 | \n  292 |     /* Update the message length. */\n  293 |     pms->count[1] += (unsigned)nbytes >> 29;\n  294 |     pms->count[0] += nbits;\n  295 |     if (pms->count[0] < nbits)\n  296 | \tpms->count[1]++;","lines":15,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/md5.c#L282-L296"}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"cups_find_option computes the binary-search midpoint as (left + right) / 2 with int operands; for large option arrays left + right can overflow INT_MAX (UB / wrong index / OOB).","fix":"Compute the midpoint as left + (right - left) / 2.","locations":[{"ref":"cups/options.c:677","code":"  677 |     current = (left + right) / 2;","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/options.c#L677"}]},{"id":"OVF_19","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"asn1_get_oid stores OID sub-identifiers as int and asn1_get_packed accumulates 'value = (value << 7) | ...' with no overflow guard, so a long packed integer overflows the signed int (undefined behavior) and can produce negative OID components that are then printed/compared. Untrusted SNMP responses control this.","fix":"Cap the number of continuation bytes / use unsigned accumulation and clamp the value, rejecting sub-identifiers that exceed a sane bound.","locations":[{"ref":"cups/snmp.c:1357-1383","code":" 1357 | static int\t\t\t\t/* O  - Value */\n 1358 | asn1_get_packed(\n 1359 |     unsigned char **buffer,\t\t/* IO - Pointer in buffer */\n 1360 |     unsigned char *bufend)\t\t/* I  - End of buffer */\n 1361 | {\n 1362 |   int\tvalue;\t\t\t\t/* Value */\n 1363 | \n 1364 | \n 1365 |   if (*buffer >= bufend)\n 1366 |     return (0);\n 1367 | \n 1368 |   value = 0;\n 1369 | \n 1370 |   while (*buffer < bufend && (**buffer & 128))\n 1371 |   {\n 1372 |     value = (value << 7) | (**buffer & 127);\n 1373 |     (*buffer) ++;\n 1374 |   }\n 1375 | \n 1376 |   if (*buffer < bufend)\n 1377 |   {\n 1378 |     value = (value << 7) | **buffer;\n 1379 |     (*buffer) ++;\n 1380 |   }\n 1381 | \n 1382 |   return (value);\n 1383 | }","lines":27,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/snmp.c#L1357-L1383"},{"ref":"cups/snmp.c:1339-1345","code":" 1339 |   while (*buffer < valend)\n 1340 |   {\n 1341 |     number = asn1_get_packed(buffer, valend);\n 1342 | \n 1343 |     if (oidptr < oidend)\n 1344 |       *oidptr++ = number;\n 1345 |   }","lines":7,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/snmp.c#L1339-L1345"}]},{"id":"OVF_20","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"Several quota/size computations cast or add signed off_t/time values without overflow checks: print_job/send_document compute kbytes = (fileinfo.st_size + 1023) / 1024 into an int (8714, 9937), and copy_banner computes kbytes = (cupsFileTell(out) + 1023) / 1024 (4244). A file larger than ~2GB makes the int kbytes negative, which then feeds cupsdUpdateQuota and job->koctets / job-k-octets, corrupting quota accounting (e.g. wrapping a user under quota or producing negative octet counts).","fix":"Compute kbytes using a 64-bit type and clamp to a sane maximum (or reject oversized documents) before storing into the int kbytes / job-k-octets attribute.","locations":[{"ref":"scheduler/ipp.c:8711-8718","code":" 8711 |   if (stat(con->filename, &fileinfo))\n 8712 |     kbytes = 0;\n 8713 |   else\n 8714 |     kbytes = (fileinfo.st_size + 1023) / 1024;\n 8715 | \n 8716 |   cupsdUpdateQuota(printer, job->username, 0, kbytes);\n 8717 | \n 8718 |   job->koctets += kbytes;","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L8711-L8718"},{"ref":"scheduler/ipp.c:9934-9941","code":" 9934 |   if (stat(con->filename, &fileinfo))\n 9935 |     kbytes = 0;\n 9936 |   else\n 9937 |     kbytes = (fileinfo.st_size + 1023) / 1024;\n 9938 | \n 9939 |   cupsdUpdateQuota(printer, job->username, 0, kbytes);\n 9940 | \n 9941 |   job->koctets += kbytes;","lines":8,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L9934-L9941"},{"ref":"scheduler/ipp.c:4244-4249","code":" 4244 |   kbytes = (cupsFileTell(out) + 1023) / 1024;\n 4245 | \n 4246 |   job->koctets += kbytes;\n 4247 | \n 4248 |   if ((attr = ippFindAttribute(job->attrs, \"job-k-octets\", IPP_TAG_INTEGER)) != NULL)\n 4249 |     attr->values[0].integer += kbytes;","lines":6,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/scheduler/ipp.c#L4244-L4249"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In both cupsGetFd and cupsPutFd 'status' is a local declared without an initializer and is read by the do/while loop condition; on any path through the loop body that does not assign status before reaching the condition, an indeterminate value is used.","fix":"Initialize status = HTTP_STATUS_ERROR (or HTTP_STATUS_NONE) at declaration in both functions.","locations":[{"ref":"cups/getputfile.c:38","code":"   38 |   http_status_t\tstatus;\t\t\t/* HTTP status from server */","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L38"},{"ref":"cups/getputfile.c:290","code":"  290 |   http_status_t\tstatus;\t\t\t/* HTTP status from server */","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L290"},{"ref":"cups/getputfile.c:174-175","code":"  174 |   }\n  175 |   while (status == HTTP_STATUS_UNAUTHORIZED || status == HTTP_STATUS_UPGRADE_REQUIRED);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L174-L175"},{"ref":"cups/getputfile.c:482","code":"  482 |   while (status == HTTP_STATUS_UNAUTHORIZED || status == HTTP_STATUS_UPGRADE_REQUIRED || status == HTTP_STATUS_NONE);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L482"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"cupsGetFile opens the destination with O_WRONLY | O_EXCL | O_TRUNC but without O_CREAT. O_EXCL is only meaningful with O_CREAT, so it has no effect, and without O_CREAT the open fails if the file does not already exist - so 'create the file' (per the comment) never actually creates a new file.","fix":"Use open(filename, O_WRONLY | O_CREAT | O_TRUNC, 0644). Drop O_EXCL unless exclusive-create is genuinely wanted (in which case keep O_CREAT|O_EXCL and drop O_TRUNC).","locations":[{"ref":"cups/getputfile.c:235-248","code":"  235 |  /*\n  236 |   * Create the file...\n  237 |   */\n  238 | \n  239 |   if ((fd = open(filename, O_WRONLY | O_EXCL | O_TRUNC)) < 0)\n  240 |   {\n  241 |    /*\n  242 |     * Couldn't open the file!\n  243 |     */\n  244 | \n  245 |     http->error = errno;\n  246 | \n  247 |     return (HTTP_STATUS_ERROR);\n  248 |   }","lines":14,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/getputfile.c#L235-L248"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"The POLLHUP workaround in httpAddrConnect2 is gated on the global errno (errno == EINPROGRESS / WSAGetLastError()). After poll(), errno does not reflect a per-socket connect status, so it almost never equals EINPROGRESS. As a result the getsockopt(SO_ERROR) salvage check is usually skipped and sockets reporting POLLHUP together with POLLIN/POLLOUT (which several platforms raise for successful async connects) fall into the error branch and get closed even when the connection succeeded, causing spurious connect failures.","fix":"Drop the errno==EINPROGRESS gate. Whenever revents contains POLLHUP with POLLIN/POLLOUT, always call getsockopt(SO_ERROR); on serr==0 (or EINPROGRESS) clear POLLHUP and treat as connected, otherwise set POLLERR.","locations":[{"ref":"cups/http-addrlist.c:288-318","code":"  288 | #  ifdef _WIN32\n  289 | \tif (((WSAGetLastError() == WSAEINPROGRESS) && (pfds[i].revents & POLLIN) && (pfds[i].revents & POLLOUT)) ||\n  290 | \t    ((pfds[i].revents & POLLHUP) && (pfds[i].revents & (POLLIN|POLLOUT))))\n  291 | #  else\n  292 | \tif (((errno == EINPROGRESS) && (pfds[i].revents & POLLIN) && (pfds[i].revents & POLLOUT)) ||\n  293 | \t    ((pfds[i].revents & POLLHUP) && (pfds[i].revents & (POLLIN|POLLOUT))))\n  294 | #  endif /* _WIN32 */\n  295 | \t{\n  296 | \t  // Some systems generate POLLIN or POLLOUT together with POLLHUP when doing\n  297 | \t  // asynchronous connections. The solution seems to be to use getsockopt to\n  298 | \t  // check the SO_ERROR value and ignore the POLLHUP if there is no error or\n  299 | \t  // the error is EINPROGRESS.\n  300 | \n  301 | \t  int\t    sres,\t\t /* Return value from getsockopt() - 0, or -1 if error */\n  302 | \t\t    serr;\t\t /* Option SO_ERROR value */\n  303 | \t  socklen_t slen = sizeof(serr); /* Option value size */\n  304 | \n  305 | \t  sres = getsockopt(fds[i], SOL_SOCKET, SO_ERROR, &serr, &slen);\n  306 | \n  307 | \t  if (sres || serr)\n  308 | \t  {\n  309 | \t    pfds[i].revents |= POLLERR;\n  310 | #  ifdef DEBUG\n  311 | \t    DEBUG_printf(\"1httpAddrConnect2: getsockopt returned: %d with error: %s\", sres, strerror(serr));\n  312 | #  endif\n  313 | \t  }\n  314 | \t  else if (pfds[i].revents && (pfds[i].revents & POLLHUP) && (pfds[i].revents & (POLLIN | POLLOUT)))\n  315 | \t  {\n  316 | \t    pfds[i].revents &= ~POLLHUP;\n  317 | \t  }\n  318 | \t}","lines":31,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addrlist.c#L288-L318"},{"ref":"cups/http-addrlist.c:333-347","code":"  333 | \telse if (pfds[i].revents & (POLLERR | POLLHUP))\n  334 |         {\n  335 |          /*\n  336 |           * Error on socket, remove from the \"pool\"...\n  337 |           */\n  338 | \n  339 | \t  httpAddrClose(NULL, fds[i]);\n  340 |           nfds --;\n  341 |           if (i < nfds)\n  342 |           {\n  343 |             memmove(fds + i, fds + i + 1, (size_t)(nfds - i) * (sizeof(fds[0])));\n  344 |             memmove(addrs + i, addrs + i + 1, (size_t)(nfds - i) * (sizeof(addrs[0])));\n  345 |           }\n  346 |           i --;\n  347 |         }","lines":15,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addrlist.c#L333-L347"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"httpResolveURI blocks up to 90 seconds in a usleep poll loop when the cancel callback is NULL, while resolving untrusted device URIs. A single request can tie up a daemon thread for 90s, enabling resource-exhaustion/DoS. The input scheme is also not validated against an allowlist before resolution/assembly.","fix":"Bound or make the timeout configurable; require a cancel callback for untrusted callers, and validate the scheme against an allowlist before resolving.","locations":[{"ref":"cups/http-support.c:1679-1702","code":" 1679 |     domain_time = time(NULL) + 2;\n 1680 |     end_time    = time(NULL) + 90;\n 1681 | \n 1682 |     while (!resolved_uri[0] && time(NULL) < end_time)\n 1683 |     {\n 1684 |       // Start the domain resolve as needed...\n 1685 |       if (time(NULL) >= domain_time && _cups_strcasecmp(domain, \"local.\"))\n 1686 |       {\n 1687 | \tcupsDNSSDResolveNew(dnssd, if_index, name, regtype, domain, http_resolve_cb, &uribuf);\n 1688 | \tdomain_time = end_time;\n 1689 |       }\n 1690 | \n 1691 |       // Sleep 1/4 second to allow time for resolve...\n 1692 |       usleep(250000);\n 1693 | \n 1694 |       if (resolved_uri[0])\n 1695 |         break;\n 1696 |     }\n 1697 | \n 1698 |     cupsDNSSDDelete(dnssd);\n 1699 | \n 1700 |     // Save the results of the resolve...\n 1701 |     uri = *resolved_uri ? resolved_uri : NULL;\n 1702 |   }","lines":24,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L1679-L1702"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"find_key() matches an octet (HMAC) key by comparing the JWK 'kty' against the string \"ocy\". The correct key type for symmetric keys is \"oct\". As written, a key set whose entries carry the correct kty=\"oct\" will not be matched for HS256/384/512 by type; the branch only succeeds when kty is absent (!curkty). This is a copy/paste typo that breaks correct JWKS key selection for HMAC algorithms.","fix":"Compare against \"oct\" instead of \"ocy\".","locations":[{"ref":"cups/jwt.c:1618","code":" 1618 |         if (((!curkty || !strcmp(curkty, \"ocy\")) && alg >= CUPS_JWA_HS256 && alg <= CUPS_JWA_HS512) || (curkty && !strcmp(curkty, \"RSA\") && alg >= CUPS_JWA_RS256 && alg <= CUPS_JWA_RS512) || (curkty && !strcmp(curkty, \"EC\") && alg >= CUPS_JWA_ES256 && alg <= CUPS_JWA_ES512))","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L1618"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"ECDSA P-256 keys are created/imported with NID_secp256k1 instead of NID_X9_62_prime256v1 (P-256/secp256r1) in the OpenSSL paths of make_ec_key(), cupsJWTMakePrivateKey(), and cupsJWTLoadCredentials(). The curve-name mapping in cupsJWTLoadCredentials() additionally treats NID_secp256k1 as the curve corresponding to 'P-256'. Using the Koblitz secp256k1 curve for JWS ES256 is non-conformant (RFC 7518 requires P-256) and interoperates incorrectly with conforming verifiers/signers.","fix":"Use NID_X9_62_prime256v1 for P-256 in all three OpenSSL paths.","locations":[{"ref":"cups/jwt.c:1712-1717","code":" 1712 |   if (!strcmp(crv, \"P-256\"))\n 1713 |     ec = EC_KEY_new_by_curve_name(NID_secp256k1);\n 1714 |   else if (!strcmp(crv, \"P-384\"))\n 1715 |     ec = EC_KEY_new_by_curve_name(NID_secp384r1);\n 1716 |   else if (!strcmp(crv, \"P-521\"))\n 1717 |     ec = EC_KEY_new_by_curve_name(NID_secp521r1);","lines":6,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L1712-L1717"},{"ref":"cups/jwt.c:1134-1139","code":" 1134 |     if (alg == CUPS_JWA_ES256)\n 1135 |       ec = EC_KEY_new_by_curve_name(NID_secp256k1);\n 1136 |     else if (alg == CUPS_JWA_ES384)\n 1137 |       ec = EC_KEY_new_by_curve_name(NID_secp384r1);\n 1138 |     else\n 1139 |       ec = EC_KEY_new_by_curve_name(NID_secp521r1);","lines":6,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L1134-L1139"},{"ref":"cups/jwt.c:880-882","code":"  880 |       case NID_secp256k1 :\n  881 |           crv = \"P-256\";\n  882 |           break;","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/jwt.c#L880-L882"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In cupsParseOptions2 the returned end pointer is computed as arg + (ptr - copyarg). ptr indexes into copyarg, which is destructively shortened in place via _cups_strcpy(ptr, ptr+1) during quote/escape handling. After any such shift, (ptr - copyarg) no longer corresponds to the same logical offset in the original arg, so *end points to the wrong (too-early) position, corrupting callers that resume parsing from end.","fix":"Track bytes consumed from the original arg separately, or compute end from a parallel index into arg rather than from the mutated copy.","locations":[{"ref":"cups/options.c:364-405","code":"  364 |       else if (*ptr == '\\'' || *ptr == '\\\"')\n  365 |       {\n  366 |         // Quoted string constant...\n  367 | \tquote = *ptr;\n  368 | \t_cups_strcpy(ptr, ptr + 1);\n  369 | \n  370 | \twhile (*ptr != quote && *ptr)\n  371 | \t{\n  372 | \t  if (*ptr == '\\\\' && ptr[1])\n  373 | \t    _cups_strcpy(ptr, ptr + 1);\n  374 | \n  375 | \t  ptr ++;\n  376 | \t}\n  377 | \n  378 | \tif (*ptr)\n  379 | \t  _cups_strcpy(ptr, ptr + 1);\n  380 |       }\n  381 |       else if (*ptr == '{')\n  382 |       {\n  383 |         // Collection value...\n  384 | \tint depth;\t\t\t// Nesting depth for braces\n  385 | \n  386 | \tfor (depth = 0; *ptr; ptr ++)\n  387 | \t{\n  388 | \t  if (*ptr == '{')\n  389 | \t  {\n  390 | \t    depth ++;\n  391 | \t  }\n  392 | \t  else if (*ptr == '}')\n  393 | \t  {\n  394 | \t    depth --;\n  395 | \t    if (!depth)\n  396 | \t    {\n  397 | \t      ptr ++;\n  398 | \t      break;\n  399 | \t    }\n  400 | \t  }\n  401 | \t  else if (*ptr == '\\\\' && ptr[1])\n  402 | \t  {\n  403 | \t    _cups_strcpy(ptr, ptr + 1);\n  404 | \t  }\n  405 | \t}","lines":42,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/options.c#L364-L405"},{"ref":"cups/options.c:437-439","code":"  437 |   // Save the progress in the input string...\n  438 |   if (end)\n  439 |     *end = arg + (ptr - copyarg);","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/options.c#L437-L439"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In _ppdCreateFromIPP() preset emission, inner loops reuse the outer loop's counters 'i' and 'count'. The outer loop 'for (i = 0, count = ippGetCount(attr); i < count; i++)' iterates job-presets-supported collections, but the 'finishings' and 'finishings-col' member handlers run 'for (i = 0, count = ippGetCount(member); i < count; i++)' on the same variables. After cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/ppd-cache.c#L5277-L5302"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"cupsDoIORequest's 'while (response == NULL)' auth-retry loop re-sends the full request on UNAUTHORIZED/UPGRADE_REQUIRED, but only lseek()s the infile back to 0 when S_ISREG. For a pipe/socket the body was already consumed on the first attempt and cannot be replayed, so the retried request silently transmits a truncated/empty document.","fix":"Detect a non-seekable infile on retry and fail with a clear error, or buffer piped input so it can be replayed.","locations":[{"ref":"cups/request.c:198-229","code":"  198 |   while (response == NULL)\n  199 |   {\n  200 |     DEBUG_puts(\"2cupsDoIORequest: setup...\");\n  201 | \n  202 |    /*\n  203 |     * Send the request...\n  204 |     */\n  205 | \n  206 |     status = cupsSendRequest(http, request, resource, length);\n  207 | \n  208 |     DEBUG_printf(\"2cupsDoIORequest: status=%d\", status);\n  209 | \n  210 |     if (status == HTTP_STATUS_CONTINUE && request->state == IPP_STATE_DATA && infile >= 0)\n  211 |     {\n  212 |       DEBUG_puts(\"2cupsDoIORequest: file write...\");\n  213 | \n  214 |      /*\n  215 |       * Send the file with the request...\n  216 |       */\n  217 | \n  218 | #ifndef _WIN32\n  219 |       if (S_ISREG(fileinfo.st_mode))\n  220 | #endif /* _WIN32 */\n  221 |       lseek(infile, 0, SEEK_SET);\n  222 | \n  223 |       while ((bytes = read(infile, buffer, sizeof(buffer))) > 0)\n  224 |       {\n  225 |         if ((status = cupsWriteRequestData(http, buffer, (size_t)bytes))\n  226 |                 != HTTP_STATUS_CONTINUE)\n  227 | \t  break;\n  228 |       }\n  229 |     }","lines":32,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/request.c#L198-L229"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"_cupsNextDelay computes the retry backoff as 'next = (current + *previous) % 12;'. The % 12 breaks the documented Fibonacci sequence (e.g. current=8,previous=5 yields 13%12=1 instead of 13) and can return 0, meaning no sleep between retries and a tight retry/busy loop against the server.","fix":"Remove the '% 12' (true Fibonacci is next = current + *previous) and ensure the returned delay is always >= 1; cap the maximum explicitly if a ceiling is desired.","locations":[{"ref":"cups/request.c:518-545","code":"  518 | /*\n  519 |  * '_cupsNextDelay()' - Return the next retry delay value.\n  520 |  *\n  521 |  * This function currently returns the Fibonacci sequence 1 1 2 3 5 8.\n  522 |  *\n  523 |  * Pass 0 for the current delay value to initialize the sequence.\n  524 |  */\n  525 | \n  526 | int\t\t\t\t\t/* O  - Next delay value */\n  527 | _cupsNextDelay(int current,\t\t/* I  - Current delay value or 0 */\n  528 |                int *previous)\t\t/* IO - Previous delay value */\n  529 | {\n  530 |   int\tnext;\t\t\t\t/* Next delay value */\n  531 | \n  532 | \n  533 |   if (current > 0)\n  534 |   {\n  535 |     next      = (current + *previous) % 12;\n  536 |     *previous = next < current ? 0 : current;\n  537 |   }\n  538 |   else\n  539 |   {\n  540 |     next      = 1;\n  541 |     *previous = 0;\n  542 |   }\n  543 | \n  544 |   return (next);\n  545 | }","lines":28,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/request.c#L518-L545"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"cupsSideChannelSNMPWalk uses sizeof(real_data) where real_data is a 'char *', so sizeof() yields the pointer size (typically 8), not the _CUPS_SC_MAX_BUFFER (65540) buffer length. The guard 'if ((size_t)real_datalen < sizeof(real_data)) real_data[real_datalen] = 0;' therefore only NUL-terminates when real_datalen < 8, and for any normal response leaves real_data unterminated before strlen() is called on it at the next line, risking an out-of-bounds read. The intent was clearly to compare against the buffer capacity.","fix":"Track the buffer capacity explicitly (e.g. a const size_t bufsize = _CUPS_SC_MAX_BUFFER) and compare real_datalen against that, not sizeof(real_data). Better still, since cupsSideChannelRead already bounds *datalen to the read length, terminate based on that known size.","locations":[{"ref":"cups/sidechannel.c:452-455","code":"  452 |       if ((size_t)real_datalen < sizeof(real_data))\n  453 |         real_data[real_datalen] = '\\0';\n  454 | \n  455 |       real_oidlen  = strlen(real_data) + 1;","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/sidechannel.c#L452-L455"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"cupsGetCredentialsTrust()'s site-CA check validates a multi-cert chain by a raw byte tail comparison: strcmp(credentials + (credslen - tcredslen), tcreds). This only checks that the trusted root's PEM text appears verbatim as the suffix of the supplied chain; it does not cryptographically verify the leaf->intermediate->root signature links. An attacker can append the known site root PEM to an unrelated self-signed chain and pass the check.","fix":"Verify the chain with gnutls_x509_crt_list_verify / gnutls_x509_trust_list_verify_crt against the trusted root instead of comparing PEM text.","locations":[{"ref":"cups/tls-gnutls.c:960-986","code":"  960 |   else if (num_certs > 1)\n  961 |   {\n  962 |     if (!http_check_roots(credentials))\n  963 |     {\n  964 |       // See if we have a site CA certificate we can compare...\n  965 |       if ((tcreds = cupsCopyCredentials(path, \"_site_\")) != NULL)\n  966 |       {\n  967 | \tsize_t\tcredslen,\t\t// Length of credentials\n  968 | \t\t  tcredslen;\t\t// Length of trust root\n  969 | \n  970 | \n  971 | \t// Do a tail comparison of the root...\n  972 | \tcredslen  = strlen(credentials);\n  973 | \ttcredslen = strlen(tcreds);\n  974 | \tif (credslen <= tcredslen || strcmp(credentials + (credslen - tcredslen), tcreds))\n  975 | \t{\n  976 | \t  // Certificate isn't directly generated from the CA cert...\n  977 | \t  trust = HTTP_TRUST_INVALID;\n  978 | \t}\n  979 | \n  980 | \tif (trust != HTTP_TRUST_OK)\n  981 | \t  _cupsSetError(IPP_STATUS_ERROR_CUPS_PKI, _(\"Credentials do not validate against site CA certificate.\"), 1);\n  982 | \n  983 | \tfree(tcreds);\n  984 |       }\n  985 |     }\n  986 |   }","lines":27,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L960-L986"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"cupsSignCredentialsRequest() signs a certificate via gnutls_x509_crt_set_crq(), which copies only the DN and public key - NOT extensions. The calls that would copy subjectAltName, key-purpose OIDs, and keyUsage into the signed cert are all commented out (`#if 0` and `//`). Result: signed certificates contain no subjectAltName and therefore fail hostname verification (gnutls_x509_crt_check_hostname), making them unusable for TLS server authentication. The SAN validation loop validates entries then discards them.","fix":"Re-enable explicit extension copying: gnutls_x509_crt_set_subject_alt_name, gnutls_x509_crt_set_key_purpose_oid, gnutls_x509_crt_set_key_usage (or gnutls_x509_crt_set_crq_extensions).","locations":[{"ref":"cups/tls-gnutls.c:1152","code":" 1152 |   gnutls_x509_crt_set_crq(crt, crq);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L1152"},{"ref":"cups/tls-gnutls.c:1198-1220","code":" 1198 |   for (i = 0; i < 100; i ++)\n 1199 |   {\n 1200 |     unsigned type;\t\t\t// Name type\n 1201 | \n 1202 |     tempsize = sizeof(temp) - 1;\n 1203 |     if (gnutls_x509_crq_get_subject_alt_name(crq, i, temp, &tempsize, &type, NULL) < 0)\n 1204 |       break;\n 1205 | \n 1206 |     temp[tempsize] = '\\0';\n 1207 | \n 1208 |     DEBUG_printf(\"1cupsSignCredentialsRequest: SAN %s\", temp);\n 1209 | \n 1210 |     if (type != GNUTLS_SAN_DNSNAME || (cb)(common_name, temp, cb_data))\n 1211 |     {\n 1212 |       // Good subjectAltName\n 1213 | //      gnutls_x509_crt_set_subject_alt_name(crt, type, temp, (unsigned)strlen(temp), i ? GNUTLS_FSAN_APPEND : GNUTLS_FSAN_SET);\n 1214 |     }\n 1215 |     else\n 1216 |     {\n 1217 |       _cupsSetError(IPP_STATUS_ERROR_INTERNAL, _(\"Validation of subjectAltName in X.509 certificate request failed.\"), 1);\n 1218 |       goto done;\n 1219 |     }\n 1220 |   }","lines":23,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L1198-L1220"},{"ref":"cups/tls-gnutls.c:1248-1259","code":" 1248 | #if 0\n 1249 |   if (purpose == 0 || (purpose & CUPS_CREDPURPOSE_SERVER_AUTH))\n 1250 |     gnutls_x509_crt_set_key_purpose_oid(crt, GNUTLS_KP_TLS_WWW_SERVER, 0);\n 1251 |   if (purpose & CUPS_CREDPURPOSE_CLIENT_AUTH)\n 1252 |     gnutls_x509_crt_set_key_purpose_oid(crt, GNUTLS_KP_TLS_WWW_CLIENT, 0);\n 1253 |   if (purpose & CUPS_CREDPURPOSE_CODE_SIGNING)\n 1254 |     gnutls_x509_crt_set_key_purpose_oid(crt, GNUTLS_KP_CODE_SIGNING, 0);\n 1255 |   if (purpose & CUPS_CREDPURPOSE_EMAIL_PROTECTION)\n 1256 |     gnutls_x509_crt_set_key_purpose_oid(crt, GNUTLS_KP_EMAIL_PROTECTION, 0);\n 1257 |   if (purpose & CUPS_CREDPURPOSE_OCSP_SIGNING)\n 1258 |     gnutls_x509_crt_set_key_purpose_oid(crt, GNUTLS_KP_OCSP_SIGNING, 0);\n 1259 | #endif // 0","lines":12,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L1248-L1259"},{"ref":"cups/tls-gnutls.c:1297","code":" 1297 | //  gnutls_x509_crt_set_key_usage(crt, gnutls_usage);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-gnutls.c#L1297"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"cupsSignCredentialsRequest() verifies the CSR self-signature with `X509_REQ_verify(crq, X509_REQ_get_pubkey(crq)) < 0`. X509_REQ_verify returns 1 on success, 0 on verification FAILURE (bad signature), and -1 on error. The `< 0` test therefore accepts a CSR whose signature does not match its embedded public key (return 0 passes), allowing a CA service to sign forged/tampered CSRs. Additionally X509_REQ_get_pubkey returns a new EVP_PKEY reference that is never freed (leak).","fix":"Use `EVP_PKEY *rk = X509_REQ_get_pubkey(crq); if (X509_REQ_verify(crq, rk) != 1) { ...error... } EVP_PKEY_free(rk);`.","locations":[{"ref":"cups/tls-openssl.c:1165-1169","code":" 1165 |   if (X509_REQ_verify(crq, X509_REQ_get_pubkey(crq)) < 0)\n 1166 |   {\n 1167 |     _cupsSetError(IPP_STATUS_ERROR_INTERNAL, _(\"Unable to verify X.509 certificate request.\"), 1);\n 1168 |     goto done;\n 1169 |   }","lines":5,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L1165-L1169"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"openssl_create_key() maps CUPS_CREDTYPE_ECDSA_P256_SHA256 to NID_secp256k1, which is the Koblitz secp256k1 curve (used by Bitcoin), NOT NIST P-256. P-256 is NID_X9_62_prime256v1 (secp256r1). This generates certificates/keys on the wrong, non-standard curve; many TLS peers reject secp256k1 and it is not the documented intent. P-384/P-521 below correctly use NID_secp384r1/NID_secp521r1.","fix":"Change curveid = NID_secp256k1; to curveid = NID_X9_62_prime256v1; for the P-256 case.","locations":[{"ref":"cups/tls-openssl.c:2307-2310","code":" 2307 |     case CUPS_CREDTYPE_ECDSA_P256_SHA256 :\n 2308 |         algid   = EVP_PKEY_EC;\n 2309 |         curveid = NID_secp256k1;\n 2310 | \tbreak;","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/tls-openssl.c#L2307-L2310"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"cupsArrayAddStrings uses `status &= cupsArrayAdd(a, start)` mixing a bool (status) with the int return of cupsArrayAdd via bitwise-AND. cupsArrayAdd returns 0 or 1 so it works today, but the single-value path above uses `status = cupsArrayAdd(...) != 0` (correct), making the two paths inconsistent; if cupsArrayAdd ever returned a non-1 truthy value the &= would corrupt status.","fix":"Use `status = status && (cupsArrayAdd(a, start) != 0);` for consistency and correctness with the other path.","locations":[{"ref":"cups/array.c:166-167","code":"  166 |       if (!cupsArrayFind(a, start))\n  167 |         status &= cupsArrayAdd(a, start);","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/array.c#L166-L167"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"cupsArrayGetElement / cupsArrayIndex set a->current = n with no bounds check before calling cupsArrayGetCurrent. While cupsArrayGetCurrent re-validates the range, a->current is left at an out-of-range value (e.g. negative or >= num_elements) after the call, so a subsequent cupsArrayGetNext (which does `if (a->current < a->num_elements) a->current++`) or cupsArrayGetPrev can advance from a bogus index, producing incorrect iteration state.","fix":"Clamp/validate n into [-1, num_elements] (or set current to -1 when out of range) so iterator state stays well-defined after an out-of-range index.","locations":[{"ref":"cups/array.c:498-508","code":"  498 | void *\t\t\t\t\t// O - N-th element or `NULL`\n  499 | cupsArrayGetElement(cups_array_t *a,\t// I - Array\n  500 |                     int          n)\t// I - Index into array, starting at 0\n  501 | {\n  502 |   if (!a)\n  503 |     return (NULL);\n  504 | \n  505 |   a->current = n;\n  506 | \n  507 |   return (cupsArrayGetCurrent(a));\n  508 | }","lines":11,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/array.c#L498-L508"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"cups_do_local_auth() PeerCred path calls getpwnam_r() and checks `result && pwd.pw_uid == getuid()` but ignores getpwnam_r's return value. On error getpwnam_r can return nonzero with result==NULL (handled) but the username compared comes from cupsGetUser() (env-influenced), so the check only confirms the name maps to the current uid, not that the connecting peer is that uid. The actual socket peer credentials (SO_PEERCRED) are never read/compared, so 'PeerCred' authentication trusts the client-asserted username as long as it resolves to the running uid.","fix":"Read the real peer uid via getsockopt(SO_PEERCRED) on the connection and verify it matches the resolved username's uid, rather than only comparing to getuid().","locations":[{"ref":"cups/auth.c:804-819","code":"  804 |     // Verify that the current cupsGetUser() matches the current UID...\n  805 |     struct passwd\tpwd;\t\t// Password information\n  806 |     struct passwd\t*result;\t// Auxiliary pointer\n  807 |     const char\t\t*username;\t// Current username\n  808 | \n  809 |     username = cupsGetUser();\n  810 | \n  811 |     getpwnam_r(username, &pwd, cg->pw_buf, PW_BUF_SIZE, &result);\n  812 |     if (result && pwd.pw_uid == getuid())\n  813 |     {\n  814 |       httpSetAuthString(http, \"PeerCred\", username);\n  815 | \n  816 |       DEBUG_printf(\"8cups_local_auth: Returning authstring=\\\"%s\\\", returning true.\", http->authstring);\n  817 | \n  818 |       return (true);\n  819 |     }","lines":16,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/auth.c#L804-L819"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"cupsLocalizeDestMedia2() looks up the media-key localization with the wrong search key. At line 176 it formats \"media-key.%s\" into `temp`, but `key.msg` was set to point at `temp` earlier (line 164) and is never reassigned; cupsArrayFind() therefore searches with whatever `key.msg` references. Because key.msg==temp this happens to work today, but it is an extremely fragile coupling: the code relies on key.msg aliasing the temp buffer rather than re-setting `key.msg = temp` after the second snprintf, so any refactor that changes temp/key.msg ordering silently breaks the media-key lookup.","fix":"Explicitly re-assign `key.msg = temp;` after the snprintf on line 176 so the search key is unambiguous and refactor-safe.","locations":[{"ref":"cups/dest-localization.c:163-181","code":"  163 |   snprintf(temp, sizeof(temp), \"media.%s\", media->media);\n  164 |   key.msg = temp;\n  165 | \n  166 |   if ((match = (_cups_message_t *)cupsArrayFind(dinfo->localizations, &key)) != NULL)\n  167 |   {\n  168 |     lsize = match->str;\n  169 |   }\n  170 |   else\n  171 |   {\n  172 |    /*\n  173 |     * Not a media name, try a media-key name...\n  174 |     */\n  175 | \n  176 |     snprintf(temp, sizeof(temp), \"media-key.%s\", media->media);\n  177 |     if ((match = (_cups_message_t *)cupsArrayFind(dinfo->localizations, &key)) != NULL)\n  178 |       lsize = match->str;\n  179 |     else\n  180 |       lsize = NULL;\n  181 |   }","lines":19,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dest-localization.c#L163-L181"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In cups_enum_dests(), the second (DNS-SD completed) instance-application loop declares `for (j = (size_t)(user_dest - data.dests); j < data.num_dests; ...)` where j is declared `int` (line 3116) but is assigned a size_t cast result and compared against `data.num_dests` (int). The first, near-identical loop at line 3225 uses `for (j = user_dest - data.dests; ...)` without the cast. The inconsistent casting between the two otherwise-duplicated blocks is a sign of copy-paste drift; with int j and int num_dests the size_t cast is pointless and potentially misleading (and would mismatch if num_dests were ever large/negative).","fix":"Make the two duplicated instance-application loops consistent (same type and cast for j); since j and data.num_dests are int, drop the (size_t) cast on line 3435.","locations":[{"ref":"cups/dest.c:3225-3226","code":" 3225 |         for (j = user_dest - data.dests; j < data.num_dests; j ++, user_dest ++)\n 3226 |         {","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dest.c#L3225-L3226"},{"ref":"cups/dest.c:3435-3436","code":" 3435 | \t    for (j = (size_t)(user_dest - data.dests); j < data.num_dests; j ++, user_dest ++)\n 3436 | \t    {","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dest.c#L3435-L3436"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"avahi_resolve_cb() and the browse/query callbacks set dnssd->in_callback = true/false to suppress mutex re-locking, but in_callback is a plain bool with no synchronization and is set on the Avahi monitor thread while avahi_lock/avahi_unlock read it from arbitrary caller threads (e.g. cupsDNSSDResolveNew runs avahi_lock from the caller thread). If a public API call races with a callback, in_callback can be observed in the wrong state, causing either a double-lock (deadlock) or an unlocked access to Avahi state. The flag assumes callbacks and API calls never interleave across threads, which the threaded monitor design does not guarantee.","fix":"Make in_callback thread-local to the monitor thread, or use recursive mutexes / an explicit owner-thread check instead of a shared bool, so callback re-entrancy detection is correct across threads.","locations":[{"ref":"cups/dnssd.c:2788-2790","code":" 2788 |   browse->dnssd->in_callback = true;\n 2789 |   (browse->cb)(browse, browse->cb_data, cups_flags, (uint32_t)if_index, name, type, domain);\n 2790 |   browse->dnssd->in_callback = false;","lines":3,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dnssd.c#L2788-L2790"},{"ref":"cups/dnssd.c:2922-2933","code":" 2922 | static void\n 2923 | avahi_lock(cups_dnssd_t *dnssd,\t\t// I - DNS-SD context\n 2924 |            const char   *name)\t\t// I - Who is locking?\n 2925 | {\n 2926 |   (void)name;\n 2927 | \n 2928 |   if (!dnssd->in_callback)\n 2929 |   {\n 2930 |     DEBUG_printf(\"2avahi_lock: Locking mutex for %s.\", name);\n 2931 |     cupsMutexLock(&dnssd->mutex);\n 2932 |   }\n 2933 | }","lines":12,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dnssd.c#L2922-L2933"},{"ref":"cups/dnssd.c:3123-3136","code":" 3123 | static void\n 3124 | avahi_unlock(cups_dnssd_t *dnssd,\t// I - DNS-SD context\n 3125 |              const char   *name)\t// I - Who is unlocking?\n 3126 | {\n 3127 |   (void)name;\n 3128 | \n 3129 |   if (!dnssd->in_callback)\n 3130 |   {\n 3131 |     DEBUG_printf(\"2avahi_unlock: Unlocking mutex for %s.\", name);\n 3132 |     cupsMutexUnlock(&dnssd->mutex);\n 3133 | \n 3134 |     avahi_simple_poll_wakeup(dnssd->poll);\n 3135 |   }\n 3136 | }","lines":14,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/dnssd.c#L3123-L3136"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"httpAddrListen() accepts port == 0 (only port < 0 is rejected) but the bind path routes through httpAddrSetPort(addr, port), which explicitly ignores any port <= 0. So requesting an ephemeral port (port 0) silently leaves whatever value was already in the sockaddr instead of zeroing it, making the bound port unpredictable.","fix":"Set the port field directly before bind() for the ephemeral case, or change httpAddrSetPort to reject only port < 0 so port 0 is honored.","locations":[{"ref":"cups/http-addr.c:201","code":"  201 |   if (!addr || port < 0)","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addr.c#L201"},{"ref":"cups/http-addr.c:254","code":"  254 |     httpAddrSetPort(addr, port);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addr.c#L254"},{"ref":"cups/http-addr.c:490-491","code":"  490 |   if (!addr || port <= 0)\n  491 |     return;","lines":2,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addr.c#L490-L491"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Timeout accounting subtracts a fixed 100/250 ms per loop instead of measured elapsed time. poll() is given a variable timeout, but 'remaining' is always reduced by a fixed constant regardless of how long poll() actually blocked (it can return immediately on a ready fd or on EINTR/EAGAIN). The connect attempt can therefore give up well before the caller-requested msec.","fix":"Record a millisecond timestamp before/after poll() and subtract the real elapsed time from 'remaining'.","locations":[{"ref":"cups/http-addrlist.c:270","code":"  270 |       result = poll(pfds, (nfds_t)nfds, addrlist ? 100 : remaining > 250 ? 250 : remaining);","lines":1,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addrlist.c#L270"},{"ref":"cups/http-addrlist.c:368-371","code":"  368 |     if (addrlist)\n  369 |       remaining -= 100;\n  370 |     else\n  371 |       remaining -= 250;","lines":4,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addrlist.c#L368-L371"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The two-loop cleanup that closes every socket except the connected one (fds[i]) depends on i being unchanged after the inner loop breaks, yet the same scan mutates i during the error-compaction path. The connected-fd skip is uncommented and easily broken by future edits, risking a double-close or a closed/leaked connected socket.","fix":"Replace with 'for (j = 0; j < nfds; j ++) if (j != i) httpAddrClose(NULL, fds[j]);' and comment that fds[i] is the returned socket.","locations":[{"ref":"cups/http-addrlist.c:340-364","code":"  340 |           nfds --;\n  341 |           if (i < nfds)\n  342 |           {\n  343 |             memmove(fds + i, fds + i + 1, (size_t)(nfds - i) * (sizeof(fds[0])));\n  344 |             memmove(addrs + i, addrs + i + 1, (size_t)(nfds - i) * (sizeof(addrs[0])));\n  345 |           }\n  346 |           i --;\n  347 |         }\n  348 |       }\n  349 | \n  350 |       if (connaddr)\n  351 |       {\n  352 |        /*\n  353 |         * Connected on one address, close all of the other sockets we have so\n  354 |         * far and return...\n  355 |         */\n  356 | \n  357 |         for (j = 0; j < i; j ++)\n  358 |           httpAddrClose(NULL, fds[j]);\n  359 | \n  360 |         for (j ++; j < nfds; j ++)\n  361 |           httpAddrClose(NULL, fds[j]);\n  362 | \n  363 |         return (connaddr);\n  364 |       }","lines":25,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-addrlist.c#L340-L364"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"httpAssembleUUID is documented and built as an RFC 4122 version-3 (name-based, deterministic) UUID yet mixes in two cupsGetRand() words, making it non-deterministic and inconsistent with version-3 semantics and the function's stated purpose. Long server/name inputs also silently truncate the MD5 source string in data[1024].","fix":"Either drop the random component for a true v3 name-based UUID, or relabel it as a random identifier; align the comment with the behavior.","locations":[{"ref":"cups/http-support.c:405-414","code":"  405 |   // Build a version 3 UUID conforming to RFC 4122.\n  406 |   //\n  407 |   // Start with the MD5 sum of the server, port, object name and\n  408 |   // number, and some random data on the end.\n  409 |   snprintf(data, sizeof(data), \"%s:%d:%s:%d:%04x:%04x\", server, port, name ? name : server, number, (unsigned)cupsGetRand() & 0xffff, (unsigned)cupsGetRand() & 0xffff);\n  410 | \n  411 |   cupsHashData(\"md5\", (unsigned char *)data, strlen(data), md5sum, sizeof(md5sum));\n  412 | \n  413 |   // Generate the UUID from the MD5...\n  414 |   snprintf(buffer, bufsize, \"urn:uuid:%02x%02x%02x%02x-%02x%02x-%02x%02x-%02x%02x-%02x%02x%02x%02x%02x%02x\", md5sum[0], md5sum[1], md5sum[2], md5sum[3], md5sum[4], md5sum[5], (md5sum[6] & 15) | 0x30, md5sum[7], (md5sum[8] & 0x3f) | 0x40, md5sum[9], md5sum[10], md5sum[11], md5sum[12], md5sum[13], md5sum[14], md5sum[15]);","lines":10,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L405-L414"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"httpSeparateURI silently rewrites a missing scheme: '//host/...' becomes scheme 'ipp' (HP workaround) and '/path' becomes 'file', only signaling via HTTP_URI_STATUS_MISSING_SCHEME which callers commonly ignore. For untrusted device URIs this is a scheme-confusion vector.","fix":"Document and require callers to check MISSING_SCHEME, or gate the HP workaround behind an explicit decoding flag rather than defaulting silently.","locations":[{"ref":"cups/http-support.c:910-921","code":"  910 |   if (!strncmp(uri, \"//\", 2))\n  911 |   {\n  912 |     // Workaround for HP IPP client bug...\n  913 |     cupsCopyString(scheme, \"ipp\", (size_t)schemelen);\n  914 |     status = HTTP_URI_STATUS_MISSING_SCHEME;\n  915 |   }\n  916 |   else if (*uri == '/')\n  917 |   {\n  918 |     // Filename...\n  919 |     cupsCopyString(scheme, \"file\", (size_t)schemelen);\n  920 |     status = HTTP_URI_STATUS_MISSING_SCHEME;\n  921 |   }","lines":12,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L910-L921"},{"ref":"cups/http-support.c:947-958","code":"  947 |   if (!strcmp(scheme, \"http\"))\n  948 |     *port = 80;\n  949 |   else if (!strcmp(scheme, \"https\"))\n  950 |     *port = 443;\n  951 |   else if (!strcmp(scheme, \"ipp\") || !strcmp(scheme, \"ipps\"))\n  952 |     *port = 631;\n  953 |   else if (!_cups_strcasecmp(scheme, \"lpd\"))\n  954 |     *port = 515;\n  955 |   else if (!strcmp(scheme, \"socket\"))\t// Not yet registered with IANA...\n  956 |     *port = 9100;\n  957 |   else if (strcmp(scheme, \"file\") && strcmp(scheme, \"mailto\") && strcmp(scheme, \"tel\"))\n  958 |     status = HTTP_URI_STATUS_UNKNOWN_SCHEME;","lines":12,"link":"https://github.com/OpenPrinting/cups/blob/877b7eee3f42300b4ed45c8226d7bf1ba367a3b9/cups/http-support.c#L947-L958"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"http_copy_encode operates on a signed char: '*src & 128', '*src >> 4', and hex[*src & 15] for bytes >= 0x80 invoke implementation-defined signed right shift and rely on the &15 mask to mask back the value. The base64 code elsewhere carefully uses (x & 255); this path does not.","fix":"Use 'unsigned ch = (unsigned char)*src;' then test ch & 128 and use hex[(ch >> 4) & 15], hex[ch & 15].","locations":[{"ref":"cups/http-support.c:1809-1821","code":" 1809 |     if (encode && (*src == '%' || *src <= ' ' || *src & 128 ||\n 1810 |                    (reserved && strchr(
