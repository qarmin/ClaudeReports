<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`encode_image_progressive` produces an invalid JPEG when `set_progressive_scans(scans)` is called with `scans` in 34..=64. With `scans = scans - 1` AC scans and `values_per_scan = 64 / scans`, once `scans-1 >= 33`, `values_per_scan` is 1. The first iteration then computes `start = (0 * 1).max(1) = 1` and `end = 1 * 1 = 1`, so it writes a scan header with `Ss=1, Se=end-1=0` (Ss > Se). Per the JPEG spec (T.81 Annex B) this is illegal and most decoders will reject the file. The public `set_progressive_scans` API accepts values up to 64 (documented), so this is reachable via supported configuration.","fix":"Either tighten the `set_progressive_scans` precondition to scans <= 33 (max 32 AC scans for 64 coefficients), or compute `values_per_scan` with a `max(2)` floor (the first AC band must span at least Ss=1..=Se=1 i.e. 2 indices), or treat the first AC scan specially so that it always spans at least one index. Whatever fix is chosen, also apply to the mirror logic in `optimize_huffman_table` at src/encoder.rs:1122-1162 so the frequency counts match what is actually encoded.","locations":[{"ref":"src/encoder.rs:925-944","code":"  925 |         let scans = scans as usize - 1;\n  926 | \n  927 |         let values_per_scan = 64 / scans;\n  928 | \n  929 |         for scan in 0..scans {\n  930 |             let start = (scan * values_per_scan).max(1);\n  931 |             let end = if scan == scans - 1 {\n  932 |                 // ensure last scan is always transfers the remaining coefficients\n  933 |                 64\n  934 |             } else {\n  935 |                 (scan + 1) * values_per_scan\n  936 |             };\n  937 | \n  938 |             for (i, component) in self.components.iter().enumerate() {\n  939 |                 let restart_interval = self.restart_interval.unwrap_or(0);\n  940 |                 let mut restarts = 0;\n  941 |                 let mut restarts_to_go = restart_interval;\n  942 | \n  943 |                 self.writer\n  944 |                     .write_scan_header(&[component], Some((start as u8, end as u8 - 1)))?;"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"`bits[size] += 1` indexes into a fixed `[0u8; 33]` array using the canonical Huffman code size produced by the K.2 algorithm. With 257 input symbols and skewed frequencies (worst case is Fibonacci-like with magnitudes up to u32::MAX), the resulting tree depth can exceed 32, causing an out-of-bounds array access (panic / abort). libjpeg's own implementation uses the same size and explicitly checks for this overflow; this port omits the check. Triggering requires adversarial image content but is theoretically reachable in optimized-huffman mode.","fix":"Either bump `bits` to `[0u32; 257]` (matching libjpeg's MAX_CLEN budget and treating all plausible depths) and clamp afterward, or before the loop assert/error when any `codesize[i] > 32`. The K.3 length-limiting pass that follows already assumes lengths fit in `bits[1..=32]`, so the cleanest fix is to detect the overflow up front and return a default (non-optimized) table when it would happen.","locations":[{"ref":"src/huffman.rs:159-165","code":"  159 |         let mut bits = [0u8; 33];\n  160 | \n  161 |         for &size in codesize.iter() {\n  162 |             if size > 0 {\n  163 |                 bits[size] += 1;\n  164 |             }\n  165 |         }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`while bits[i] == 0 { i -= 1; }` has no underflow guard except a `debug_assert!`. If all entries of `bits` happen to be zero (which would mean the K.2 loop produced no codes at all — possible only when the input frequency array is degenerate, e.g. nothing but the sentinel `freq[256]=1`), then `i` is decremented past 0, wrapping to `usize::MAX` and indexing OOB in release builds. Currently `optimize_huffman_table` always feeds at least one real frequency in addition to the sentinel, so this is not reachable today, but the assertion shows the author was aware of the risk and a future caller change could expose it.","fix":"Replace the `debug_assert!` with a real check that returns the default table (or an error) when no non-zero entries remain instead of underflowing `i`.","locations":[{"ref":"src/huffman.rs:188-192","code":"  188 |         while bits[i] == 0 {\n  189 |             debug_assert!(i > 0, \"Error creating codesizes for frequency {:?}\", freq);\n  190 |             i -= 1;\n  191 |         }\n  192 |         bits[i] -= 1;"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`required_data_len = width as usize * height as usize * color_type.get_bytes_per_pixel()` can overflow `usize` on 32-bit targets. With width = height = 65535 and 4 bpp (RGBA/CMYK) the product is ≈ 1.7e10, far above `usize::MAX` on 32-bit. The wrapped, much smaller value then silently passes the `data.len() < required_data_len` check, and downstream `get_block` / `get_line` can read out of bounds of `data`, panicking (or worse, returning garbage if the caller passes an oversize buffer). The crate's MSRV/feature set does not exclude 32-bit targets.","fix":"Use `checked_mul`: `let required = (width as usize).checked_mul(height as usize).and_then(|p| p.checked_mul(bpp)).ok_or(EncodingError::BadImageData{ length: data.len(), required: usize::MAX })?;` and compare against `data.len()` only when the multiplication succeeded.","locations":[{"ref":"src/encoder.rs:447-453","code":"  447 |         let required_data_len = width as usize * height as usize * color_type.get_bytes_per_pixel();\n  448 | \n  449 |         if data.len() < required_data_len {\n  450 |             return Err(EncodingError::BadImageData {\n  451 |                 length: data.len(),\n  452 |                 required: required_data_len,\n  453 |             });"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"On 32-bit targets `BUFFER_SIZE = mem::size_of::<usize>() * 8 = 32`. `write_bits` is called with `size` up to 32 (Huffman code 16 bits + DC/AC extension bits up to 16). When the buffer is full and a full-width (size = 32) write happens, `self.bit_buffer << (size + free_bits)` becomes `<< 0` and `value >> -free_bits` becomes `value >> 32` on a `usize` that is 32 bits wide — this is a shift-by-bit-width which Rust panics on in debug and gives an implementation-defined result in release (LLVM `poison`). On 64-bit targets the value can never reach 64 with current callers, so this is only a 32-bit hazard.","fix":"Pre-handle the `size == BUFFER_SIZE` case explicitly (flush a full buffer, then store `value` directly) before doing the variable-width shift, or compute the high part with `if -free_bits >= BUFFER_SIZE { 0 } else { value >> -free_bits }`.","locations":[{"ref":"src/writer.rs:186-202","code":"  186 |     pub fn write_bits(&mut self, value: u32, size: u8) -> Result<(), EncodingError> {\n  187 |         let size = size as i8;\n  188 |         let value = value as usize;\n  189 | \n  190 |         let free_bits = self.free_bits - size;\n  191 | \n  192 |         if free_bits < 0 {\n  193 |             self.bit_buffer = (self.bit_buffer << (size + free_bits)) | (value >> -free_bits);\n  194 |             self.write_bit_buffer()?;\n  195 |             self.bit_buffer = value;\n  196 |             self.free_bits = free_bits + BUFFER_SIZE as i8;\n  197 |         } else {\n  198 |             self.free_bits = free_bits;\n  199 |             self.bit_buffer = (self.bit_buffer << size) | value;\n  200 |         }\n  201 |         Ok(())\n  202 |     }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","description":"`get_num_bits(i16::MIN)` and `get_code(i16::MIN)` both negate the input with `-value` / `value.abs()`, which on i16 overflows for `MIN` (panic in debug, identity wrap in release). The coefficient stream after FDCT and quantization is bounded by ~16k in magnitude, so `i16::MIN` is not reachable from any current code path, but the footgun is unguarded.","fix":"Use widened arithmetic: `let v = (value as i32).unsigned_abs() as u32;` then count bits on that, avoiding the i16 negation entirely.","locations":[{"ref":"src/encoder.rs:1244-1257","code":" 1244 | fn get_num_bits(mut value: i16) -> u8 {\n 1245 |     if value < 0 {\n 1246 |         value = -value;\n 1247 |     }\n 1248 | \n 1249 |     let mut num_bits = 0;\n 1250 | \n 1251 |     while value > 0 {\n 1252 |         num_bits += 1;\n 1253 |         value >>= 1;\n 1254 |     }\n 1255 | \n 1256 |     num_bits\n 1257 | }"},{"ref":"src/writer.rs:456-470","code":"  456 | pub(crate) fn get_code(value: i16) -> (u8, u16) {\n  457 |     let temp = value - (value.is_negative() as i16);\n  458 |     let temp2 = value.abs();\n  459 | \n  460 |     /*\n  461 |      * Doing this instead of 16 - temp2.leading_zeros()\n  462 |      * Gives the compiler the information that leadings_zeros\n  463 |      * is always called on a non zero value, which removes a branch on x86\n  464 |      */\n  465 |     let num_bits = 15 - (temp2 << 1 | 1).leading_zeros() as u16;\n  466 | \n  467 |     let coefficient = temp & ((1 << num_bits as usize) - 1);\n  468 | \n  469 |     (num_bits as u8, coefficient as u16)\n  470 | }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"`Adobe` APP14 segment writes the Version field as `\\0\\0` instead of the conventional `\\x01\\x00` (Adobe's documented \"100\"). Some strict CMYK/YCCK readers may reject or warn on version 0. The ColorTransform byte (last byte) is correct (0 for CMYK, 2 for YCCK).","fix":"Use `b\"Adobe\\x00\\x64\\x00\\x00\\x00\\x00\\x00\"` for CMYK and `b\"Adobe\\x00\\x64\\x00\\x00\\x00\\x00\\x02\"` for YCCK so the Version field is 100 like libjpeg/Photoshop emit.","locations":[{"ref":"src/encoder.rs:540-550","code":"  540 |         if jpeg_color_type == JpegColorType::Cmyk {\n  541 |             //Set ColorTransform info to \"Unknown\"\n  542 |             let app_14 = b\"Adobe\\0\\0\\0\\0\\0\\0\\0\";\n  543 |             self.writer\n  544 |                 .write_segment(Marker::APP(14), app_14.as_ref())?;\n  545 |         } else if jpeg_color_type == JpegColorType::Ycck {\n  546 |             //Set ColorTransform info to YCCK\n  547 |             let app_14 = b\"Adobe\\0\\0\\0\\0\\0\\0\\x02\";\n  548 |             self.writer\n  549 |                 .write_segment(Marker::APP(14), app_14.as_ref())?;\n  550 |         }"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"`From<Marker> for u8` does no validation on the embedded `u8`. `RST(v) => 0xD0 + v` silently wraps into other markers when `v > 7` (e.g. RST(8) becomes 0xD8 which is SOI). Likewise `APP(v) => 0xE0 + v` for v > 15 collides with `JPGn`, and `JPGn(v)` with v > 15 wraps past 0xFF. All current internal callers mask via `& 7` or validate, but the type itself accepts illegal values and would emit corrupted JPEGs if a future caller forgot to mask.","fix":"Either change `RST(v)` to `RST(u8 /* 0..=7 */)` with a constructor that masks, or assert/debug_assert `v` is within the legal range inside the `From` impl.","locations":[{"ref":"src/marker.rs:101-111","code":"  101 |             RST(v) => 0xD0 + v,\n  102 |             SOI => 0xD8,\n  103 |             EOI => 0xD9,\n  104 |             SOS => 0xDA,\n  105 |             DQT => 0xDB,\n  106 |             DNL => 0xDC,\n  107 |             DRI => 0xDD,\n  108 |             DHP => 0xDE,\n  109 |             EXP => 0xDF,\n  110 |             APP(v) => 0xE0 + v,\n  111 |             JPGn(v) => 0xF0 + v,"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The doc comment for `add_icc_profile` claims a maximum data length of 16,707,345 bytes (= 255 × 65,519), but the validation `if num_chunks >= 255 { return Err(...) }` rejects exactly 255 chunks, so the true maximum is 254 × 65,519 = 16,641,826 bytes. Anyone right at the documented limit will get an unexpected `IccTooLarge` error.","fix":"Either change the limit check to `> 255` (matching the doc, since chunk indices 1..=255 fit in `u8`), or update the doc to read \"16,641,826 bytes\". The chunk index field is u8 and goes 1..=num_chunks, so 255 chunks is actually representable; the off-by-one rejection is the bug.","locations":[{"ref":"src/encoder.rs:385-417","code":"  385 |     /// Add an ICC profile\n  386 |     ///\n  387 |     /// The maximum allowed data length is 16,707,345 bytes.\n  388 |     ///\n  389 |     /// # Errors\n  390 |     ///\n  391 |     /// Returns an Error if the data exceeds the maximum size for the ICC profile\n  392 |     pub fn add_icc_profile(&mut self, data: &[u8]) -> Result<(), EncodingError> {\n  393 |         // Based on https://www.color.org/ICC_Minor_Revision_for_Web.pdf\n  394 |         // B.4  Embedding ICC profiles in JFIF files\n  395 | \n  396 |         const MARKER: &[u8; 12] = b\"ICC_PROFILE\\0\";\n  397 |         const MAX_CHUNK_LENGTH: usize = 65535 - 2 - 12 - 2;\n  398 | \n  399 |         let num_chunks = data.len().div_ceil(MAX_CHUNK_LENGTH);\n  400 | \n  401 |         // Sequence number is stored as a byte and starts with 1\n  402 |         if num_chunks >= 255 {\n  403 |             return Err(EncodingError::IccTooLarge(data.len()));\n  404 |         }\n  405 | \n  406 |         for (i, data) in data.chunks(MAX_CHUNK_LENGTH).enumerate() {\n  407 |             let mut chunk_data = Vec::with_capacity(MAX_CHUNK_LENGTH);\n  408 |             chunk_data.extend_from_slice(MARKER);\n  409 |             chunk_data.push(i as u8 + 1);\n  410 |             chunk_data.push(num_chunks as u8);\n  411 |             chunk_data.extend_from_slice(data);\n  412 | \n  413 |             self.add_app_segment(2, chunk_data)?;\n  414 |         }\n  415 | \n  416 |         Ok(())\n  417 |     }"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"Doc comment for `new_file` says \"Create a new decoder\" but the function returns an `Encoder`. Likely copy-paste from a sibling decoder crate.","fix":"Change \"decoder\" to \"encoder\" in the doc comment.","locations":[{"ref":"src/encoder.rs:1204-1219","code":" 1204 | impl Encoder<BufWriter<File>> {\n 1205 |     /// Create a new decoder that writes into a file\n 1206 |     ///\n 1207 |     /// See [new](Encoder::new) for further information.\n 1208 |     ///\n 1209 |     /// # Errors\n 1210 |     ///\n 1211 |     /// Returns an `IoError(std::io::Error)` if the file can't be created\n 1212 |     pub fn new_file<P: AsRef<Path>>(\n 1213 |         path: P,\n 1214 |         quality: u8,\n 1215 |     ) -> Result<Encoder<BufWriter<File>>, EncodingError> {\n 1216 |         let file = File::create(path)?;\n 1217 |         let buf = BufWriter::new(file);\n 1218 |         Ok(Self::new(buf, quality))\n 1219 |     }"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"In `image_buffer.rs` the macro body uses the identifier `chuck` instead of `chunk` for the loop variable. This is a misspelling of an existing word and propagates through the generated code; not a bug, but harms readability. Comment at line 156 also says \"convertion\" instead of \"conversion\".","fix":"Rename `chuck` → `chunk` and fix the spelling \"convertion\" → \"conversion\".","locations":[{"ref":"src/image_buffer.rs:156-180","code":"  156 |                 // Doing the convertion in chunks allows the compiler to vectorize the code\n  157 |                 // A size of 16 seems optimal for SSE and AVX capable hardware\n  158 |                 const CHUNK_SIZE: usize = 16;\n  159 | \n  160 |                 let mut y_buffer = [0; CHUNK_SIZE];\n  161 |                 let mut cb_buffer = [0; CHUNK_SIZE];\n  162 |                 let mut cr_buffer = [0; CHUNK_SIZE];\n  163 | \n  164 |                 for chuck in line.chunks_exact($num_colors * CHUNK_SIZE) {\n  165 |                     for i in (0..CHUNK_SIZE) {\n  166 |                         let (y, cb, cr) = rgb_to_ycbcr(\n  167 |                             chuck[i * $num_colors + $o1],\n  168 |                             chuck[i * $num_colors + $o2],\n  169 |                             chuck[i * $num_colors + $o3],\n  170 |                         );\n  171 | \n  172 |                         y_buffer[i] = y;\n  173 |                         cb_buffer[i] = cb;\n  174 |                         cr_buffer[i] = cr;\n  175 |                     }\n  176 | \n  177 |                     buffers[0].extend_from_slice(&y_buffer);\n  178 |                     buffers[1].extend_from_slice(&cb_buffer);\n  179 |                     buffers[2].extend_from_slice(&cr_buffer);\n  180 |                 }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`let z = ZIGZAG[i] as usize & 0x3f;` — the `& 0x3f` mask is a no-op because every entry in `ZIGZAG` is in `0..=63` (verified by the table contents in `writer.rs`). The mask reads as if it were defensive but adds no safety; it just obscures intent and slightly muddies optimizer analysis.","fix":"Drop the `& 0x3f`: `let z = ZIGZAG[i] as usize;`.","locations":[{"ref":"src/encoder.rs:1266-1271","code":" 1266 |     fn quantize_block(block: &AlignedBlock, q_block: &mut AlignedBlock, table: &QuantizationTable) {\n 1267 |         for i in 0..64 {\n 1268 |             let z = ZIGZAG[i] as usize & 0x3f;\n 1269 |             q_block.data[i] = table.quantize(block.data[z], z);\n 1270 |         }\n 1271 |     }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`QuantizationTableType::index()` has a `Custom(_) => panic!(\"Custom types not supported\")` arm. The only caller (`QuantizationTable::new_with_quality`) handles the `Custom` variant through a different match arm and never calls `.index()` on a `Custom`. The panic is unreachable.","fix":"Either move `index()` into a sealed helper that takes a non-Custom enum and remove the panic arm, or document the invariant with `unreachable!(\"Custom handled separately\")`.","locations":[{"ref":"src/quantization.rs:42-58","code":"   42 | impl QuantizationTableType {\n   43 |     fn index(&self) -> usize {\n   44 |         use QuantizationTableType::*;\n   45 | \n   46 |         match self {\n   47 |             Default => 0,\n   48 |             Flat => 1,\n   49 |             CustomMsSsim => 2,\n   50 |             CustomPsnrHvs => 3,\n   51 |             ImageMagick => 4,\n   52 |             KleinSilversteinCarney => 5,\n   53 |             DentalXRays => 6,\n   54 |             VisualDetectionModel => 7,\n   55 |             ImprovedDetectionModel => 8,\n   56 |             Custom(_) => panic!(\"Custom types not supported\"),\n   57 |         }\n   58 |     }"},{"ref":"src/quantization.rs:221-230","code":"  221 |         let table = match table {\n  222 |             QuantizationTableType::Custom(table) => Self::get_user_table(table),\n  223 |             table => {\n  224 |                 let table = if luma {\n  225 |                     &DEFAULT_LUMA_TABLES[table.index()]\n  226 |                 } else {\n  227 |                     &DEFAULT_CHROMA_TABLES[table.index()]\n  228 |                 };\n  229 |                 Self::get_with_quality(table, quality)\n  230 |             }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`compute_reciprocal` has a `if divisor <= 1 { return (1, 0) }` early return, but every caller goes through `QuantizationTable::new_with_quality`, which always pre-multiplies the table value by 8 (`<< 3`). So `divisor` is always ≥ 8 in practice — the `divisor <= 1` branch is unreachable.","fix":"Either delete the early-return and add a debug_assert that divisor >= 2 (matching the SHIFT == 15 invariant), or remove the dead branch entirely.","locations":[{"ref":"src/quantization.rs:187-191","code":"  187 | fn compute_reciprocal(divisor: u32) -> (i32, i32) {\n  188 |     if divisor <= 1 {\n  189 |         return (1, 0);\n  190 |     }\n  191 | "}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"`get_user_table` clamps each table value to `1..=2048` then shifts left by 3 (max 16384, fits in u16). After the clamp the value is always ≥ 8, so `NonZeroU16::new(...)` always returns `Some`, and the `None => panic!(\"Invalid quantization table value: {}\")` branch is unreachable.","fix":"Replace the `match`/panic with `NonZeroU16::new(...).unwrap()` (still panics on logic error but is shorter), or use the unchecked constructor with a comment explaining the post-clamp invariant.","locations":[{"ref":"src/quantization.rs:250-259","code":"  250 |     fn get_user_table(table: &[u16; 64]) -> [NonZeroU16; 64] {\n  251 |         let mut q_table = [NonZeroU16::new(1).unwrap(); 64];\n  252 |         for (i, &v) in table.iter().enumerate() {\n  253 |             q_table[i] = match NonZeroU16::new(v.clamp(1, 2 << 10) << 3) {\n  254 |                 Some(v) => v,\n  255 |                 None => panic!(\"Invalid quantization table value: {}\", v),\n  256 |             };\n  257 |         }\n  258 |         q_table\n  259 |     }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"`encode_blocks` buffers the entire image (all rows, all components) before encoding. `buffer_size = num_cols * num_rows * 64` and the four per-channel `Vec<u8>` rows together hold every pixel of the full padded image, and then a second pass allocates `[Vec<AlignedBlock>; 4]` holding every 8×8 block. For a 4000×3000 RGB image this is ≈36 MB of row buffers + ≈72 MB of block buffers = ≈108 MB held simultaneously, where the interleaved path holds only one MCU strip. This is the hot path for both `optimize_huffman_table = true` and progressive mode.","fix":"Process MCU-rows incrementally: for non-optimized progressive mode, buffer only one strip at a time and re-run the strip for each pass. For optimized-huffman mode, the frequency counts can be gathered in a first streaming pass (no need to keep blocks) and then the encoding done in a second streaming pass. If keeping the two-pass design, at minimum size each channel's `Vec<AlignedBlock>` to its actual `cols * rows` (see related finding) rather than `buffer_size / 64`.","locations":[{"ref":"src/encoder.rs:977-1056","code":"  977 |     fn encode_blocks<I: ImageBuffer, OP: Operations>(\n  978 |         &mut self,\n  979 |         image: &I,\n  980 |         q_tables: &[QuantizationTable; 2],\n  981 |     ) -> [Vec<AlignedBlock>; 4] {\n  982 |         let width = image.width();\n  983 |         let height = image.height();\n  984 | \n  985 |         let (max_h_sampling, max_v_sampling) = self.get_max_sampling_size();\n  986 | \n  987 |         let num_cols = usize::from(width).div_ceil(8 * max_h_sampling) * max_h_sampling;\n  988 |         let num_rows = usize::from(height).div_ceil(8 * max_v_sampling) * max_v_sampling;\n  989 | \n  990 |         debug_assert!(num_cols > 0);\n  991 |         debug_assert!(num_rows > 0);\n  992 | \n  993 |         let buffer_width = num_cols * 8;\n  994 |         let buffer_size = num_cols * num_rows * 64;\n  995 | \n  996 |         let mut row: [Vec<_>; 4] = self.init_rows(buffer_size);\n  997 | \n  998 |         for y in 0..num_rows * 8 {\n  999 |             let y = (y.min(usize::from(height) - 1)) as u16;\n 1000 | \n 1001 |             image.fill_buffers(y, &mut row);\n 1002 | \n 1003 |             for _ in usize::from(width)..num_cols * 8 {\n 1004 |                 for channel in &mut row {\n 1005 |                     if !channel.is_empty() {\n 1006 |                         channel.push(channel[channel.len() - 1]);\n 1007 |                     }\n 1008 |                 }\n 1009 |             }\n 1010 |         }\n 1011 | \n 1012 |         let num_cols = usize::from(width).div_ceil(8);\n 1013 |         let num_rows = usize::from(height).div_ceil(8);\n 1014 | \n 1015 |         debug_assert!(num_cols > 0);\n 1016 |         debug_assert!(num_rows > 0);\n 1017 | \n 1018 |         let mut blocks: [Vec<_>; 4] = self.init_block_buffers(buffer_size / 64);\n 1019 | \n 1020 |         for (i, component) in self.components.iter().enumerate() {\n 1021 |             let h_scale = max_h_sampling / component.horizontal_sampling_factor as usize;\n 1022 |             let v_scale = max_v_sampling / component.vertical_sampling_factor as usize;\n 1023 | \n 1024 |             let cols = num_cols.div_ceil(h_scale);\n 1025 |             let rows = num_rows.div_ceil(v_scale);\n 1026 | \n 1027 |             debug_assert!(cols > 0);\n 1028 |             debug_assert!(rows > 0);\n 1029 | \n 1030 |             for block_y in 0..rows {\n 1031 |                 for block_x in 0..cols {\n 1032 |                     let mut block = get_block(\n 1033 |                         &row[i],\n 1034 |                         block_x * 8 * h_scale,\n 1035 |                         block_y * 8 * v_scale,\n 1036 |                         h_scale,\n 1037 |                         v_scale,\n 1038 |                         buffer_width,\n 1039 |                     );\n 1040 | \n 1041 |                     OP::fdct(&mut block);\n 1042 | \n 1043 |                     let mut q_block = AlignedBlock::default();\n 1044 | \n 1045 |                     OP::quantize_block(\n 1046 |                         &block,\n 1047 |                         &mut q_block,\n 1048 |                         &q_tables[component.quantization_table as usize],\n 1049 |                     );\n 1050 | \n 1051 |                     blocks[i].push(q_block);\n 1052 |                 }\n 1053 |             }\n 1054 |         }\n 1055 |         blocks\n 1056 |     }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"The AVX2 YCbCr `load3` reads 8 single-byte values with `_mm256_set_epi32(data[0], data[n], data[2n], …)`. The comment at line 24 acknowledges \"this compiles to many separate scalar loads and could be optimized further. But the gains are no more than 3% end to end\". For RGB specifically (`$num_colors = 3`), a contiguous 24-byte load + shuffle would give wider gains than 3% on long rows. Filed as an optimization opportunity, not a bug.","fix":"For the `$num_colors == 3` and `== 4` cases, replace the 24 scalar loads with one or two unaligned 256-bit loads followed by `_mm256_shuffle_epi8` / pshufb to extract the R/G/B lanes. Keep the scalar-set fallback if compile-time `$num_colors` makes the shuffle table tricky.","locations":[{"ref":"src/avx2/ycbcr.rs:22-126","code":"   22 |             #[target_feature(enable = \"avx2\")]\n   23 |             fn fill_buffers_avx2(&self, y: u16, buffers: &mut [Vec<u8>; 4]) {\n   24 |                 // TODO: this compiles to many separate scalar loads and could be optimized further.\n   25 |                 // But the gains are no more than 3% end to end and it doesn't seem to be worth the complexity.\n   26 |                 #[inline]\n   27 |                 #[target_feature(enable = \"avx2\")]\n   28 |                 fn load3(data: &[u8]) -> __m256i {\n   29 |                     _ = data[7 * $num_colors]; // dummy indexing operation up front to avoid bounds checks later\n   30 |                     _mm256_set_epi32(\n   31 |                         data[0] as i32,\n   32 |                         data[1 * $num_colors] as i32,\n   33 |                         data[2 * $num_colors] as i32,\n   34 |                         data[3 * $num_colors] as i32,\n   35 |                         data[4 * $num_colors] as i32,\n   36 |                         data[5 * $num_colors] as i32,\n   37 |                         data[6 * $num_colors] as i32,\n   38 |                         data[7 * $num_colors] as i32,\n   39 |                     )\n   40 |                 }\n   41 | \n   42 |                 #[inline]\n   43 |                 #[target_feature(enable = \"avx2\")]\n   44 |                 fn avx_as_i32_array(data: __m256i) -> [i32; 8] {\n   45 |                     // Safety preconditions. Optimized away in release mode, no runtime cost.\n   46 |                     assert!(core::mem::size_of::<__m256i>() == core::mem::size_of::<[i32; 8]>());\n   47 |                     assert!(core::mem::align_of::<__m256i>() >= core::mem::align_of::<[i32; 8]>());\n   48 |                     // SAFETY: size and alignment preconditions checked above.\n   49 |                     // Both types are plain old data: no pointers, lifetimes, etc.\n   50 |                     unsafe { core::mem::transmute(data) }\n   51 |                 }\n   52 | \n   53 |                 let [y_buffer, cb_buffer, cr_buffer, _] = buffers;\n   54 |                 y_buffer.reserve(self.width() as usize);\n   55 |                 cb_buffer.reserve(self.width() as usize);\n   56 |                 cr_buffer.reserve(self.width() as usize);\n   57 | \n   58 |                 let ymulr = _mm256_set1_epi32(19595);\n   59 |                 let ymulg = _mm256_set1_epi32(38470);\n   60 |                 let ymulb = _mm256_set1_epi32(7471);\n   61 | \n   62 |                 let cbmulr = _mm256_set1_epi32(-11059);\n   63 |                 let cbmulg = _mm256_set1_epi32(21709);\n   64 |                 let cbmulb = _mm256_set1_epi32(32768);\n   65 | \n   66 |                 let crmulr = _mm256_set1_epi32(32768);\n   67 |                 let crmulg = _mm256_set1_epi32(27439);\n   68 |                 let crmulb = _mm256_set1_epi32(5329);\n   69 | \n   70 |                 let mut data = &self.0[(y as usize * self.1 as usize * $num_colors)..];\n   71 | \n   72 |                 for _ in 0..self.width() / 8 {\n   73 |                     let r = load3(&data[$o1..]);\n   74 |                     let g = load3(&data[$o2..]);\n   75 |                     let b = load3(&data[$o3..]);\n   76 | \n   77 |                     data = &data[($num_colors * 8)..];\n   78 | \n   79 |                     let yr = _mm256_mullo_epi32(ymulr, r);\n   80 |                     let yg = _mm256_mullo_epi32(ymulg, g);\n   81 |                     let yb = _mm256_mullo_epi32(ymulb, b);\n   82 | \n   83 |                     let y = _mm256_add_epi32(_mm256_add_epi32(yr, yg), yb);\n   84 |                     let y = _mm256_add_epi32(y, _mm256_set1_epi32(0x7FFF));\n   85 |                     let y = _mm256_srli_epi32(y, 16);\n   86 |                     let y: [i32; 8] = avx_as_i32_array(y);\n   87 |                     let mut y: [u8; 8] = y.map(|x| x as u8);\n   88 |                     y.reverse();\n   89 |                     y_buffer.extend_from_slice(&y);\n   90 | \n   91 |                     let cbr = _mm256_mullo_epi32(cbmulr, r);\n   92 |                     let cbg = _mm256_mullo_epi32(cbmulg, g);\n   93 |                     let cbb = _mm256_mullo_epi32(cbmulb, b);\n   94 | \n   95 |                     let cb = _mm256_add_epi32(_mm256_sub_epi32(cbr, cbg), cbb);\n   96 |                     let cb = _mm256_add_epi32(cb, _mm256_set1_epi32(128 << 16));\n   97 |                     let cb = _mm256_add_epi32(cb, _mm256_set1_epi32(0x7FFF));\n   98 |                     let cb = _mm256_srli_epi32(cb, 16);\n   99 |                     let cb: [i32; 8] = avx_as_i32_array(cb);\n  100 |                     let mut cb: [u8; 8] = cb.map(|x| x as u8);\n  101 |                     cb.reverse();\n  102 |                     cb_buffer.extend_from_slice(&cb);\n  103 | \n  104 |                     let crr = _mm256_mullo_epi32(crmulr, r);\n  105 |                     let crg = _mm256_mullo_epi32(crmulg, g);\n  106 |                     let crb = _mm256_mullo_epi32(crmulb, b);\n  107 | \n  108 |                     let cr = _mm256_sub_epi32(_mm256_sub_epi32(crr, crg), crb);\n  109 |                     let cr = _mm256_add_epi32(cr, _mm256_set1_epi32(128 << 16));\n  110 |                     let cr = _mm256_add_epi32(cr, _mm256_set1_epi32(0x7FFF));\n  111 |                     let cr = _mm256_srli_epi32(cr, 16);\n  112 |                     let cr: [i32; 8] = avx_as_i32_array(cr);\n  113 |                     let mut cr: [u8; 8] = cr.map(|x| x as u8);\n  114 |                     cr.reverse();\n  115 |                     cr_buffer.extend_from_slice(&cr);\n  116 |                 }\n  117 | \n  118 |                 for _ in 0..self.width() % 8 {\n  119 |                     let (y, cb, cr) = rgb_to_ycbcr(data[$o1], data[$o2], data[$o3]);\n  120 |                     data = &data[$num_colors..];\n  121 | \n  122 |                     y_buffer.push(y);\n  123 |                     cb_buffer.push(cb);\n  124 |                     cr_buffer.push(cr);\n  125 |                 }\n  126 |             }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"The AVX2 YCbCr conversion stores 8 lanes via `_mm256_set_epi32` (MSB-first) and then transmutes the vector to `[i32; 8]`. Because `set` is MSB-first but a little-endian transmute is LSB-first, the array ends up reversed and each chunk calls `.reverse()` on three 8-byte arrays (y, cb, cr) to put pixels back in source order. That is 6 byte-swaps per pixel block of pure overhead in the SIMD hot path.","fix":"Swap the argument order of `_mm256_set_epi32` so that `data[0]` lands in the low lane (the last argument). Then the transmute already produces the array in source order and the three `.reverse()` calls go away.","locations":[{"ref":"src/avx2/ycbcr.rs:79-115","code":"   79 |                     let yr = _mm256_mullo_epi32(ymulr, r);\n   80 |                     let yg = _mm256_mullo_epi32(ymulg, g);\n   81 |                     let yb = _mm256_mullo_epi32(ymulb, b);\n   82 | \n   83 |                     let y = _mm256_add_epi32(_mm256_add_epi32(yr, yg), yb);\n   84 |                     let y = _mm256_add_epi32(y, _mm256_set1_epi32(0x7FFF));\n   85 |                     let y = _mm256_srli_epi32(y, 16);\n   86 |                     let y: [i32; 8] = avx_as_i32_array(y);\n   87 |                     let mut y: [u8; 8] = y.map(|x| x as u8);\n   88 |                     y.reverse();\n   89 |                     y_buffer.extend_from_slice(&y);\n   90 | \n   91 |                     let cbr = _mm256_mullo_epi32(cbmulr, r);\n   92 |                     let cbg = _mm256_mullo_epi32(cbmulg, g);\n   93 |                     let cbb = _mm256_mullo_epi32(cbmulb, b);\n   94 | \n   95 |                     let cb = _mm256_add_epi32(_mm256_sub_epi32(cbr, cbg), cbb);\n   96 |                     let cb = _mm256_add_epi32(cb, _mm256_set1_epi32(128 << 16));\n   97 |                     let cb = _mm256_add_epi32(cb, _mm256_set1_epi32(0x7FFF));\n   98 |                     let cb = _mm256_srli_epi32(cb, 16);\n   99 |                     let cb: [i32; 8] = avx_as_i32_array(cb);\n  100 |                     let mut cb: [u8; 8] = cb.map(|x| x as u8);\n  101 |                     cb.reverse();\n  102 |                     cb_buffer.extend_from_slice(&cb);\n  103 | \n  104 |                     let crr = _mm256_mullo_epi32(crmulr, r);\n  105 |                     let crg = _mm256_mullo_epi32(crmulg, g);\n  106 |                     let crb = _mm256_mullo_epi32(crmulb, b);\n  107 | \n  108 |                     let cr = _mm256_sub_epi32(_mm256_sub_epi32(crr, crg), crb);\n  109 |                     let cr = _mm256_add_epi32(cr, _mm256_set1_epi32(128 << 16));\n  110 |                     let cr = _mm256_add_epi32(cr, _mm256_set1_epi32(0x7FFF));\n  111 |                     let cr = _mm256_srli_epi32(cr, 16);\n  112 |                     let cr: [i32; 8] = avx_as_i32_array(cr);\n  113 |                     let mut cr: [u8; 8] = cr.map(|x| x as u8);\n  114 |                     cr.reverse();\n  115 |                     cr_buffer.extend_from_slice(&cr);"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"`add_icc_profile` does `Vec::with_capacity(MAX_CHUNK_LENGTH)` (= 65,519), but the chunk content is `MARKER (12) + 2 sequence bytes + up to MAX_CHUNK_LENGTH data` = up to 65,533 bytes, so for any non-trivial ICC profile the Vec reallocates at least once per chunk.","fix":"Use `Vec::with_capacity(MARKER.len() + 2 + data.len())` (or `MAX_CHUNK_LENGTH + 14`) so the chunk vec is sized exactly.","locations":[{"ref":"src/encoder.rs:406-413","code":"  406 |         for (i, data) in data.chunks(MAX_CHUNK_LENGTH).enumerate() {\n  407 |             let mut chunk_data = Vec::with_capacity(MAX_CHUNK_LENGTH);\n  408 |             chunk_data.extend_from_slice(MARKER);\n  409 |             chunk_data.push(i as u8 + 1);\n  410 |             chunk_data.push(num_chunks as u8);\n  411 |             chunk_data.extend_from_slice(data);\n  412 | \n  413 |             self.add_app_segment(2, chunk_data)?;"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"`init_block_buffers(buffer_size / 64)` allocates capacity for `num_cols * num_rows` blocks on every component, but chroma components only need `(num_cols/h_scale) * (num_rows/v_scale)` blocks. In 4:2:0, each chroma block buffer is pre-reserved 4× larger than needed.","fix":"Allocate per-component sizes: pass the component sampling factors into `init_block_buffers`, or just call `Vec::with_capacity(cols * rows)` for each component inline where `cols`/`rows` are already computed (encoder.rs:1024-1025).","locations":[{"ref":"src/encoder.rs:977-1083","code":"  977 |     fn encode_blocks<I: ImageBuffer, OP: Operations>(\n  978 |         &mut self,\n  979 |         image: &I,\n  980 |         q_tables: &[QuantizationTable; 2],\n  981 |     ) -> [Vec<AlignedBlock>; 4] {\n  982 |         let width = image.width();\n  983 |         let height = image.height();\n  984 | \n  985 |         let (max_h_sampling, max_v_sampling) = self.get_max_sampling_size();\n  986 | \n  987 |         let num_cols = usize::from(width).div_ceil(8 * max_h_sampling) * max_h_sampling;\n  988 |         let num_rows = usize::from(height).div_ceil(8 * max_v_sampling) * max_v_sampling;\n  989 | \n  990 |         debug_assert!(num_cols > 0);\n  991 |         debug_assert!(num_rows > 0);\n  992 | \n  993 |         let buffer_width = num_cols * 8;\n  994 |         let buffer_size = num_cols * num_rows * 64;\n  995 | \n  996 |         let mut row: [Vec<_>; 4] = self.init_rows(buffer_size);\n  997 | \n  998 |         for y in 0..num_rows * 8 {\n  999 |             let y = (y.min(usize::from(height) - 1)) as u16;\n 1000 | \n 1001 |             image.fill_buffers(y, &mut row);\n 1002 | \n 1003 |             for _ in usize::from(width)..num_cols * 8 {\n 1004 |                 for channel in &mut row {\n 1005 |                     if !channel.is_empty() {\n 1006 |                         channel.push(channel[channel.len() - 1]);\n 1007 |                     }\n 1008 |                 }\n 1009 |             }\n 1010 |         }\n 1011 | \n 1012 |         let num_cols = usize::from(width).div_ceil(8);\n 1013 |         let num_rows = usize::from(height).div_ceil(8);\n 1014 | \n 1015 |         debug_assert!(num_cols > 0);\n 1016 |         debug_assert!(num_rows > 0);\n 1017 | \n 1018 |         let mut blocks: [Vec<_>; 4] = self.init_block_buffers(buffer_size / 64);\n 1019 | \n 1020 |         for (i, component) in self.components.iter().enumerate() {\n 1021 |             let h_scale = max_h_sampling / component.horizontal_sampling_factor as usize;\n 1022 |             let v_scale = max_v_sampling / component.vertical_sampling_factor as usize;\n 1023 | \n 1024 |             let cols = num_cols.div_ceil(h_scale);\n 1025 city(buffer_size),\n 1073 |                 Vec::new(),\n 1074 |             ],\n 1075 |             4 => [\n 1076 |                 Vec::with_capacity(buffer_size),\n 1077 |                 Vec::with_capacity(buffer_size),\n 1078 |                 Vec::with_capacity(buffer_size),\n 1079 |                 Vec::with_capacity(buffer_size),\n 1080 |             ],\n 1081 |             len => unreachable!(\"Unsupported component length: {}\", len),\n 1082 |         }\n 1083 |     }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","description":"The padding loop appends one byte per channel per padding column, iterating up to 4 channels per iteration even when only 1 or 3 channels are active. For odd-width images this is invoked once per row of the MCU strip; cumulatively it is many small `push` calls in the hot path.","fix":"Replace the per-pixel push loop with a single `channel.resize(channel.len() + pad, last_value)` per channel after the row is filled.","locations":[{"ref":"src/encoder.rs:738-744","code":"  738 |                 for _ in usize::from(width)..buffer_width {\n  739 |                     for channel in &mut row {\n  740 |                         if !channel.is_empty() {\n  741 |                             channel.push(channel[channel.len() - 1]);\n  742 |                         }\n  743 |                     }\n  744 |                 }"},{"ref":"src/encoder.rs:1003-1009","code":" 1003 |             for _ in usize::from(width)..num_cols * 8 {\n 1004 |                 for channel in &mut row {\n 1005 |                     if !channel.is_empty() {\n 1006 |                         channel.push(channel[channel.len() - 1]);\n 1007 |                     }\n 1008 |                 }\n 1009 |             }"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"negligible","description":"`HuffmanTable::default_*` allocates a fresh `Vec<u8>` for `values` each time. Called 4× in every `Encoder::new c::with_capacity(buffer_size),\n  688 |                 Vec::with_capacity(buffer_size),\n  689 |                 Vec::with_capacity(buffer_size),\n  690 |                 Vec::with_capacity(buffer_size),\n  691 |             ],\n  692 |             len => unreachable!(\"Unsupported component length: {}\", len),\n  693 |         }\n  694 |     }"},{"ref":"src/encoder.rs:1058-1083","code":" 1058 |     fn init_block_buffers(&mut self, buffer_size: usize) -> [Vec<AlignedBlock>; 4] {\n 1059 |         // To simplify the code and to give the compiler more infos to optimize stuff we always initialize 4 components\n 1060 |         // Resource overhead should be minimal because an empty Vec doesn't allocate\n 1061 | \n 1062 |         match self.components.len() {\n 1063 |             1 => [\n 1064 |                 Vec::with_capacity(buffer_size),\n 1065 |                 Vec::new(),\n 1066 |                 Vec::new(),\n 1067 |                 Vec::new(),\n 1068 |             ],\n 1069 |             3 => [\n 1070 |                 Vec::with_capacity(buffer_size),\n 1071 |                 Vec::with_capacity(buffer_size),\n 1072 |                 Vec::with_capacity(buffer_size),\n 1073 |                 Vec::new(),\n 1074 |             ],\n 1075 |             4 => [\n 1076 |                 Vec::with_capacity(buffer_size),\n 1077 |                 Vec::with_capacity(buffer_size),\n 1078 |                 Vec::with_capacity(buffer_size),\n 1079 |                 Vec::with_capacity(buffer_size),\n 1080 |             ],\n 1081 |             len => unreachable!(\"Unsupported component length: {}\", len),\n 1082 |         }\n 1083 |     }"}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"The AC frequency-counting block inside `optimize_huffman_table` duplicates the structure of the encoding loop in `encode_image_progressive`/`write_ac_block`: both walk `&block.data[start..end]`, accumulate zero runs, emit a 0xF0 every 16 zer y).","fix":"Either add a constructor `pub fn new(data: &'a [u8], width: u16, height: u16) -> Self` and make the fields private, or document the positional contract explicitly.","locations":[{"ref":"src/avx2/ycbcr.rs:19","code":"   19 |         pub struct $name<'a>(pub &'a [u8], pub u16, pub u16);"},{"ref":"src/avx2/ycbcr.rs:152-155","code":"  152 | ycbcr_image_avx2!(RgbImageAVX2, 3, 0, 1, 2);\n  153 | ycbcr_image_avx2!(RgbaImageAVX2, 4, 0, 1, 2);\n  154 | ycbcr_image_avx2!(BgrImageAVX2, 3, 2, 1, 0);\n  155 | ycbcr_image_avx2!(BgraImageAVX2, 4, 2, 1, 0);"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","description":"`cmyk_to_ycck` computes `(Y, Cb, Cr) = rgb_to_ycbcr(c, m, y)` directly from raw CMY values, but the Adobe YCCK convention (the format the encoder advertises via APP14 ColorTransform = 2) expects YCbCr to be computed from the *inverted* CMY (i.e. (255-C, 255-M, 255-Y) treated as RGB). Concretely, this encoder emits a JPEG where \"white CMYK\" maps to Y=0 instead of the Adobe-standard Y=255. The crate's own round-trip test passes because `jpeg-decoder` happens to use the same inverted convention, but standards-compliant Adobe-aware decoders (Photoshop, libjpeg-turbo, ImageMagick with `-define jpeg:dct-method=...`) will decode the K channel correctly but produce inverted-luma CMY output.","fix":"Match libjpeg-turbo: compute Y = 255 - rgb_to_ycbcr(c,m,y).0 (and likewise mirror Cb/Cr), so the YCC components are derived from the inverted (255-C, 255-M, 255-Y) RGB equivalent. Concretely something like `let (y, cb, cr) = rgb_to_ycbcr(255-c, 255-m, 255-y); (y, cb, cr, 255-k)`. Add an end-to-end test that decodes the encoded YCCK using a libjpeg-turbo-based decoder if one is available, or at least verify against published Adobe test vectors.","locations":[{"ref":"src/image_buffer.rs:33-38","code":"   33 | /// Conversion from CMYK to YCCK (YCbCrK)\n   34 | #[inline]\n   35 | pub fn cmyk_to_ycck(c: u8, m: u8, y: u8, k: u8) -> (u8, u8, u8, u8) {\n   36 |     let (y, cb, cr) = rgb_to_ycbcr(c, m, y);\n   37 |     (y, cb, cr, 255 - k)\n   38 | }"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","description":"`pub fn fdct_avx2` (exported via `pub use` under the `benchmark`+`simd` features) and the `RgbImageAVX2` family of structs all expose AVX2 code paths through safe APIs that do *not* check `is_x86_feature_detected!(\"avx2\")` themselves — the runtime detection happens only inside `Encoder::encode`. The `benchmark` feature is documented as \"DO NOT USE THIS IN PRODUCTION\", but anyone who enables it and calls these functions on a non-AVX2 x86 CPU triggers undefined behavior through a non-unsafe interface.","fix":"Either mark the exported wrappers `unsafe` (with a SAFETY comment naming the AVX2 requirement) so calling them from safe code without the runtime check is a compile error, or have each wrapper do its own `if !is_x86_feature_detected!(\"avx2\") { fallback() }` dispatch.","locations":[{"ref":"src/lib.rs:54-69","code":"   54 | #[cfg(feature = \"benchmark\")]\n   55 | pub use image_buffer::RgbImage;\n   56 | \n   57 | #[cfg(all(\n   58 |     feature = \"benchmark\",\n   59 |     feature = \"simd\",\n   60 |     any(target_arch = \"x86\", target_arch = \"x86_64\")\n   61 | ))]\n   62 | pub use avx2::fdct_avx2;\n   63 | \n   64 | #[cfg(all(\n   65 |     feature = \"benchmark\",\n   66 |     feature = \"simd\",\n   67 |     any(target_arch = \"x86\", target_arch = \"x86_64\")\n   68 | ))]\n   69 | pub use avx2::RgbImageAVX2;"},{"ref":"src/avx2/fdct.rs:62-66","code":"   62 | pub fn fdct_avx2(data: &mut AlignedBlock) {\n   63 |     unsafe {\n   64 |         fdct_avx2_internal(data);\n   65 |     }\n   66 | }"},{"ref":"src/avx2/ycbcr.rs:129-148","code":"  129 |         impl<'a> ImageBuffer for $name<'a> {\n  130 |             fn get_jpeg_color_type(&self) -> JpegColorType {\n  131 |                 JpegColorType::Ycbcr\n  132 |             }\n  133 | \n  134 |             fn width(& <script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
