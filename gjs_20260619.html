ignment after the is_running guard).","locations":[{"ref":"modules/script/mainloop.js:22-33","code":"   22 | function quit(name) {\n   23 |     if (!_mainLoops[name])\n   24 |         throw new Error('No main loop with this id');\n   25 | \n   26 |     let loop = _mainLoops[name];\n   27 |     _mainLoops[name] = null;\n   28 | \n   29 |     if (!loop.is_running())\n   30 |         throw new Error('Main loop was stopped already');\n   31 | \n   32 |     loop.quit();\n   33 | }","lines":12}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"On failure, g_utf16_to_utf8() returns NULL without writing to the items_written out-param (bytes_written). The code substitutes \"<invalid string>\" for the buffer but then calls fwrite(utf8, 1, bytes_written, fp) with bytes_written still uninitialized (declared `long bytes_written;` with no initializer). This reads an indeterminate length and writes garbage / out-of-bounds bytes to the dump file. On the success path it is fine, but the error path is broken.","fix":"Initialize `long bytes_written = 0;` and on the fallback path set bytes_written to the length of the replacement string, e.g. bytes_written = strlen(utf8) (or strlen(\"<invalid string>\")).","locations":[{"ref":"modules/system.cpp:170-177","code":"  170 |     long bytes_written;\n  171 |     Gjs::AutoChar utf8{g_utf16_to_utf8(reinterpret_cast<const uint16_t*>(buf),\n  172 |                                        len, /* items_read = */ nullptr,\n  173 |                                        &bytes_written, /* error = */ nullptr)};\n  174 |     if (!utf8)\n  175 |         utf8 = g_strdup(\"<invalid string>\");\n  176 | \n  177 |     fwrite(utf8, 1, bytes_written, fp);","lines":8}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"gjs_console_clear() returns success only if fflush(stdout) > 0, but fflush() returns 0 on success and EOF (nonzero, typically -1) on error. So the function returns false even when the screen was cleared successfully, and the predicate never indicates a genuine flush success. The fputs check is also fragile (fputs returns a non-negative count on success, which could be 0 for an empty string, though here the string is non-empty).","fix":"Test for non-error explicitly: return fputs(...) != EOF && fflush(stdout) == 0;","locations":[{"ref":"util/console.cpp:64-69","code":"   64 | bool gjs_console_clear() {\n   65 |     if (stdout_fd < 0 || !g_log_writer_supports_color(stdout_fd))\n   66 |         return false;\n   67 | \n   68 |     return fputs(ANSICode::CLEAR_SCREEN, stdout) > 0 && fflush(stdout) > 0;\n   69 | }","lines":6}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"hashtable_int_key() throws via gjs_throw() when the value is out of range but then falls through and still returns true after writing pointer_out from the (out-of-range, hence garbage) value. The 'if (out_of_range)' block sets an exception but does not return false, so callers see success with a pending exception and a bogus key. Contrast value_to_ghashtable_key()'s other branches which return false on error.","fix":"After gjs_throw() in the out_of_range branch, return false instead of continuing to store the value and returning true.","locations":[{"ref":"gi/arg.cpp:296-313","code":"  296 | static bool hashtable_int_key(JSContext* cx, JS::HandleValue value,\n  297 |                               void** pointer_out) {\n  298 |     using IntType = Gjs::Tag::RealT<IntTag>;\n  299 |     static_assert(std::is_integral_v<IntType>, \"Need an integer\");\n  300 |     bool out_of_range = false;\n  301 | \n  302 |     Gjs::Tag::JSValueContainingT<IntTag> i;\n  303 |     if (!Gjs::js_value_to_c_checked<IntType>(cx, value, &i, &out_of_range))\n  304 |         return false;\n  305 | \n  306 |     if (out_of_range) {\n  307 |         gjs_throw(cx, \"value is out of range for hash table key of type %s\",\n  308 |                   Gjs::static_type_name<IntTag>());\n  309 |     }\n  310 | \n  311 |     *pointer_out = gjs_int_to_pointer<IntType>(i);\n  312 | \n  313 |     return true;","lines":18}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gjs_value_from_gi_argument(): for GI_TRANSFER_CONTAINER struct elements, the switch over argument_type that promotes transfer to GI_TRANSFER_EVERYTHING for ARRAY/LIST/HASH elements falls through the cases without a break before default (relying on the trailing 'default: break'). While currently harmless, the missing break after the GJS_ARGUMENT_HASH_ELEMENT/transfer assignment is fragile; adding a case above default would silently change behavior.","fix":"Add an explicit break after the transfer assignment, or restructure as an if/else, to make the intended control flow robust.","locations":[{"ref":"gi/arg.cpp:3359-3368","code":" 3359 |                 } else if (transfer == GI_TRANSFER_CONTAINER) {\n 3360 |                     switch (argument_type) {\n 3361 |                         case GJS_ARGUMENT_ARRAY_ELEMENT:\n 3362 |                         case GJS_ARGUMENT_LIST_ELEMENT:\n 3363 |                         case GJS_ARGUMENT_HASH_ELEMENT:\n 3364 |                             transfer = GI_TRANSFER_EVERYTHING;\n 3365 |                         default:\n 3366 |                             break;\n 3367 |                     }\n 3368 |                 }","lines":10}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"BoxedInstance::field_getter_impl() handles a non-pointer interface field that is a STRUCT or UNION by creating a nested object, but if the interface is some other kind (e.g. a flags/enum embedded by value, or an unhandled interface kind) it silently falls through to field_info.read(). For a non-pointer interface tag that is neither struct nor union, the code relies entirely on read()/gjs_value_from_gi_argument behaving correctly; there is no explicit handling or diagnostic, which can produce confusing results for unusual field types.","fix":"Either document why other non-pointer interface kinds are safe to pass to read(), or add explicit handling/diagnostics for unsupported embedded interface kinds.","locations":[{"ref":"gi/boxed.cpp:589-639","code":"  589 | template <class Base, class Prototype, class Instance>\n  590 | bool BoxedInstance<Base, Prototype, Instance>::field_getter_impl(\n  591 |     JSContext* cx, JSObject* obj, const GI::FieldInfo& field_info,\n  592 |     JS::MutableHandleValue rval) const {\n  593 |     GI::AutoTypeInfo type_info{field_info.type_info()};\n  594 | \n  595 |     if (!type_info.is_pointer() && type_info.tag() == GI_TYPE_TAG_INTERFACE) {\n  596 |         GI::AutoBaseInfo interface{type_info.interface()};\n  597 |         if (auto union_info = interface.as<GI::InfoTag::UNION>()) {\n  598 |             return get_nested_interface_object<UnionInstance>(\n  599 |                 cx, obj, field_info, union_info.value(), rval);\n  600 |         }\n  601 |         if (auto struct_info = interface.as<GI::InfoTag::STRUCT>()) {\n  602 |             return get_nested_interface_object<StructInstance>(\n  603 |                 cx, obj, field_info, struct_info.value(), rval);\n  604 |         }\n  605 |     }\n  606 | \n  607 |     GIArgument arg;\n  608 |     if (field_info.read(m_ptr, &arg).isErr()) {\n  609 |         gjs_throw(cx, \"Reading field %s.%s is not supported\",\n  610 |                   format_name().c_str(), field_info.name());\n  611 |         return false;\n  612 |     }\n  613 | \n  614 |     if (type_info.tag() == GI_TYPE_TAG_ARRAY &&\n  615 |         type_info.array_length_index()) {\n  616 |         unsigned length_field_ix = type_info.array_length_index().value();\n  617 |         Maybe<GI::AutoFieldInfo> length_field_info{\n  618 |             get_field_info(cx, length_field_ix)};\n  619 |         if (!length_field_info) {\n  620 |             gjs_throw(cx, \"Reading field %s.%s is not supported\",\n  621 |                       format_name().c_str(), field_info.name());\n  622 |             return false;\n  623 |         }\n  624 | \n  625 |         GIArgument length_arg;\n  626 |         if (length_field_info->read(m_ptr, &length_arg).isErr()) {\n  627 |             gjs_throw(cx, \"Reading field %s.%s is not supported\",\n  628 |                       format_name().c_str(), length_field_info->name());\n  629 |             return false;\n  630 |         }\n  631 | \n  632 |         size_t length = gjs_gi_argument_get_array_length(\n  633 |             length_field_info->type_info().tag(), &length_arg);\n  634 |         return gjs_value_from_explicit_array(cx, rval, type_info, &arg, length);\n  635 |     }\n  636 | \n  637 |     return gjs_value_from_gi_argument(cx, rval, type_info, GJS_ARGUMENT_FIELD,\n  638 |                                       GI_TRANSFER_EVERYTHING, &arg);\n  639 | }","lines":51}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In Function::invoke() the 'too many arguments' branch only emits a warning and proceeds, while extra args beyond m_js_in_argc are silently ignored. That is acceptable, but js_arg_pos is advanced only when !skip_in, and js_in_arg is left undefined when js_arg_pos >= args.length(). For an under-supplied call this is caught earlier by reportMoreArgsNeeded, but for skipped-in args interleaved with normal args the mapping between JS positions and GI positions relies on skip_in being consistent; any annotation inconsistency yields undefined (uninitialized JS::RootedValue defaults to undefined, which is safe) silently rather than an error.","fix":"No action strictly required (RootedValue defaults to undefined). Consider asserting js_arg_pos progression matches m_js_in_argc after the loop to catch annotation bugs early.","locations":[{"ref":"gi/function.cpp:985-996","code":"  985 |         JS::RootedValue js_in_arg{cx};\n  986 |         if (js_arg_pos < args.length())\n  987 |             js_in_arg = args[js_arg_pos];\n  988 | \n  989 |         if (!gjs_arg->in(cx, &state, in_value, js_in_arg)) {\n  990 |             state.failed = true;\n  991 |             break;\n  992 |         }\n  993 | \n  994 |         if (!gjs_arg->skip_in())\n  995 |             js_arg_pos++;\n  996 | ","lines":12}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the Gio platform-specific preload, repo.require(platform_specific, version.get()) requires e.g. \"GioUnix\" using the *same* version string that was selected for \"Gio\" (via imports.gi.versions). GioUnix and Gio are separate typelibs whose version numbers are not guaranteed to coincide, so forwarding the Gio version to the platform-specific typelib can cause a spurious 'Failed to require GioUnix <version>' failure when the user pins a Gio version. The fixed-version definitions in repo_new() pin GioUnix/GLibUnix to \"2.0\" independently, which suggests the platform libs are meant to be versioned independently.","fix":"Require the platform-specific typelib with its own version (or null to accept any) rather than blindly forwarding the Gio version string.","locations":[{"ref":"gi/repo.cpp:112-128","code":"  112 | #if (defined(G_OS_UNIX) || defined(G_OS_WIN32))\n  113 |     if (strcmp(ns_name.get(), \"Gio\") == 0) {\n  114 | #    ifdef G_OS_UNIX\n  115 |         const char* platform = \"Unix\";\n  116 | #    else   // G_OS_WIN32\n  117 |         const char* platform = \"Win32\";\n  118 | #    endif  // G_OS_UNIX/G_OS_WIN32\n  119 |         Gjs::AutoChar platform_specific{\n  120 |             g_strconcat(ns_name.get(), platform, nullptr)};\n  121 |         auto required = repo.require(platform_specific, version.get());\n  122 |         if (!required.isOk()) {\n  123 |             gjs_throw(cx, \"Failed to require %s %s: %s\",\n  124 |                       platform_specific.get(), version.get(),\n  125 |                       required.inspectErr()->message);\n  126 |             return false;\n  127 |         }\n  128 |     }","lines":17},{"ref":"gi/repo.cpp:235-247","code":"  235 | #ifdef G_OS_UNIX\n  236 |     if (!JS_DefineProperty(cx, versions, \"GLibUnix\", two_point_oh,\n  237 |                            JSPROP_PERMANENT) ||\n  238 |         !JS_DefineProperty(cx, versions, \"GioUnix\", two_point_oh,\n  239 |                            JSPROP_PERMANENT))\n  240 |         return nullptr;\n  241 | #elif defined(G_OS_WIN32)\n  242 |     if (!JS_DefineProperty(cx, versions, \"GLibWin32\", two_point_oh,\n  243 |                            JSPROP_PERMANENT) ||\n  244 |         !JS_DefineProperty(cx, versions, \"GioWin32\", two_point_oh,\n  245 |                            JSPROP_PERMANENT))\n  246 |         return nullptr;\n  247 | #endif  // G_OS_UNIX/G_OS_WIN32","lines":13}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"gjs_value_guess_g_type() maps any JS BigInt that JS::BigIntFits(int64_t) to G_TYPE_INT64, including positive values that also fit in uint64_t. The comment says 'if negative or within int64 limit -> signed', but a large positive BigInt that fits int64_t but was conceptually unsigned is still coerced to INT64. Combined with the OR, the only values treated as UINT64 are those exceeding int64_t max, which is the intended heuristic but loses information for round-tripping unsigned 64-bit values that happen to fit in int64_t.","fix":"Document this as an intentional lossy heuristic, or accept an explicit signedness hint when available rather than guessing from magnitude.","locations":[{"ref":"gi/value.cpp:468-478","code":"  468 |     if (value.isBigInt()) {\n  469 |         // Assume that if the value is negative or within the int64_t limit,\n  470 |         // then we're handling a signed integer, otherwise unsigned.\n  471 |         int64_t ignored;\n  472 |         if (JS::BigIntIsNegative(value.toBigInt()) ||\n  473 |             JS::BigIntFits(value.toBigInt(), &ignored))\n  474 |             *gtype_out = G_TYPE_INT64;\n  475 |         else\n  476 |             *gtype_out = G_TYPE_UINT64;\n  477 |         return true;\n  478 |     }","lines":11}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gjs_value_to_g_value_internal()'s G_TYPE_VARIANT branch (inside the G_TYPE_BOXED block, via the explicit gtype==G_TYPE_VARIANT handling at the dedicated section) and the boxed handling can call g_value_set_boxed()/g_value_set_static_boxed() with a gboxed pulled from a foreign struct conversion whose ownership semantics (transfer) are not honored: gjs_struct_foreign_convert_to_gi_argument() is invoked with GI_TRANSFER_NOTHING and the returned pointer is then stored without considering that no_copy controls static-vs-copy but not the foreign allocation lifetime. If the foreign 'to' function allocated, this can leak or store a pointer outliving its owner.","fix":"Track and release the GIArgument produced by gjs_struct_foreign_convert_to_gi_argument(), or document/assert that foreign 'to' conversions for boxed GValues never transfer ownership.","locations":[{"ref":"gi/value.cpp:792-834","code":"  792 |                 if (registered) {\n  793 |                     if (auto struct_info =\n  794 |                             registered->as<GI::InfoTag::STRUCT>();\n  795 |                         struct_info && struct_info->is_foreign()) {\n  796 |                         GIArgument arg;\n  797 | \n  798 |                         if (!gjs_struct_foreign_convert_to_gi_argument(\n  799 |                                 cx, value, struct_info.value(), nullptr,\n  800 |                                 GJS_ARGUMENT_ARGUMENT, GI_TRANSFER_NOTHING,\n  801 |                                 GjsArgumentFlags::MAY_BE_NULL, &arg))\n  802 |                             return false;\n  803 | \n  804 |                         gboxed = gjs_arg_get<void*>(&arg);\n  805 |                     }\n  806 |                 }\n  807 | \n  808 |                 // First try a union. If that fails, assume a boxed struct.\n  809 |                 // Distinguishing which one is expected would require checking\n  810 |                 // the associated GIBaseInfo, which is not necessarily possible,\n  811 |                 // if e.g. we see the GType without loading the typelib.\n  812 |                 if (!gboxed) {\n  813 |                     if (UnionBase::typecheck(cx, obj, gtype,\n  814 |                                              GjsTypecheckNoThrow{})) {\n  815 |                         gboxed = UnionBase::to_c_ptr(cx, obj);\n  816 |                     } else {\n  817 |                         if (!StructBase::typecheck(cx, obj, gtype))\n  818 |                             return false;\n  819 | \n  820 |                         gboxed = StructBase::to_c_ptr(cx, obj);\n  821 |                     }\n  822 |                     if (!gboxed)\n  823 |                         return false;\n  824 |                 }\n  825 |             }\n  826 |         } else {\n  827 |             return throw_expect_type(cx, value, \"boxed type\", gtype);\n  828 |         }\n  829 | \n  830 |         if (no_copy)\n  831 |             g_value_set_static_boxed(gvalue, gboxed);\n  832 |         else\n  833 |             g_value_set_boxed(gvalue, gboxed);\n  834 |         return true;","lines":43}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"unregister_unhandled_promise_rejection() logs a g_critical if erase() did not remove exactly one entry. But on_promise_unhandled_rejection (engine.cpp) calls unregister for state==Handled even for promises that were never registered as unhandled (e.g. a promise that rejected and was handled in the same turn). This can produce spurious 'handler attached to rejected promise that wasn't previously marked as unhandled' criticals during normal operation where a rejection is immediately caught.","fix":"Only emit the critical when the promise was actually expected to be tracked; treat erase()==0 for an untracked-but-handled promise as benign, or gate registration so unregister is only called for previously registered IDs.","locations":[{"ref":"gjs/context.cpp:1172-1181","code":" 1172 | void GjsContextPrivate::unregister_unhandled_promise_rejection(uint64_t id) {\n 1173 |     size_t erased = m_unhandled_rejection_stacks.erase(id);\n 1174 |     if (erased != 1) {\n 1175 |         g_critical(\n 1176 |             \"Promise %\" PRIu64\n 1177 |             \" handler attached to rejected promise that wasn't previously \"\n 1178 |             \"marked as unhandled or that we wrongly reported as unhandled\",\n 1179 |             id);\n 1180 |     }\n 1181 | }","lines":10},{"ref":"gjs/engine.cpp:54-69","code":"   54 | static void on_promise_unhandled_rejection(\n   55 |     JSContext* cx, bool mutedErrors [[maybe_unused]], JS::HandleObject promise,\n   56 |     JS::PromiseRejectionHandlingState state, void* data) {\n   57 |     auto* gjs = static_cast<GjsContextPrivate*>(data);\n   58 |     uint64_t id = JS::GetPromiseID(promise);\n   59 | \n   60 |     if (state == JS::PromiseRejectionHandlingState::Handled) {\n   61 |         // This happens when catching an exception from an await expression.\n   62 |         gjs->unregister_unhandled_promise_rejection(id);\n   63 |         return;\n   64 |     }\n   65 | \n   66 |     JS::RootedObject allocation_site(cx, JS::GetPromiseAllocationSite(promise));\n   67 |     JS::UniqueChars stack = format_saved_frame(cx, allocation_site);\n   68 |     gjs->register_unhandled_promise_rejection(id, std::move(stack));\n   69 | }","lines":16}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"strip_uri_scheme assumes any URI is followed by exactly the four characters \"://\" plus one (offset + 4) after the scheme name (it strips ':///' per the comment but actually advances scheme_len + 4). For a URI like \"http://host/path\" g_uri_parse_scheme returns \"http\" (len 4); offset+4 points past \"http\" + 4 = past \"http://h\", dropping the first character of the host. The intended strip is scheme + \"://\" (3 chars) for authority URIs or scheme + \":\" otherwise; the hardcoded +4 is wrong for standard scheme://host URIs and right only for the file:/// triple-slash form.","fix":"Do not assume a fixed 4-character separator; locate the actual scheme terminator (skip past \":\" and any number of following slashes) or use g_filename_from_uri for file: URIs.","locations":[{"ref":"gjs/coverage.cpp:107-123","code":"  107 | // This function will strip a URI scheme and return the string with the URI\n  108 | // scheme stripped or nullptr if the path was not a valid URI\n  109 | [[nodiscard]]\n  110 | static char* strip_uri_scheme(const char* potential_uri) {\n  111 |     char* uri_header = g_uri_parse_scheme(potential_uri);\n  112 | \n  113 |     if (uri_header) {\n  114 |         size_t offset = strlen(uri_header);\n  115 |         g_free(uri_header);\n  116 | \n  117 |         /* g_uri_parse_scheme() only parses the name of the scheme, we also need\n  118 |          * to strip the characters ':///' */\n  119 |         return g_strdup(potential_uri + offset + 4);\n  120 |     }\n  121 | \n  122 |     return nullptr;\n  123 | }","lines":17}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"warn_deprecated_unsafe_internal builds a DeprecationEntry keyed on (id, callsite). When get_callsite() fails (returns nullptr), DeprecationEntry's constructor maps the null loc to the literal string \"unknown\". This means *all* deprecations whose callsite cannot be captured collapse to the same (id, \"un x = \"    \";","lines":8}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"_gettext.js has a stale FIXME comment ('missing dcngettext ?') indicating an intentionally unimplemented function, and dcgettext is exposed but there is no dcngettext, so category-specific plural translations are unavailable. Either implement dcngettext or remove the dangling FIXME.","fix":"Add dcngettext wrapping GLib.dcngettext if available, or remove the FIXME and document the omission.","locations":[{"ref":"modules/core/_gettext.js:50-53","code":"   50 | function dngettext(dom, msgid1, msgid2, n) {\n   51 |     return GLib.dngettext(dom, msgid1, msgid2, n);\n   52 | }\n   53 | // FIXME: missing dcngettext ?","lines":4}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"gjs_print_parse_args() returns true (success) but overwrites the whole buffer with \"<invalid string>\" the moment any single argument fails JS::ToString, discarding all previously-accumulated and any subsequent arguments. A failure to stringify the 3rd of 5 args therefore prints only \"<invalid string>\" rather than marking just that argument. Minor, but surprising for print()/printerr().","fix":"Append a placeholder token (e.g. \"<invalid string>\") for the offending argument and continue, preserving the other arguments, rather than replacing the entire buffer.","locations":[{"ref":"modules/print.cpp:111-114","code":"  111 |         } else {\n  112 |             *buffer = \"<invalid string>\";\n  113 |             return true;\n  114 |         }","lines":4}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"gjs_type_get_element_size() returns the wrong node size for linked lists: GI_TYPE_TAG_GLIST returns sizeof(GSList) and GI_TYPE_TAG_GSLIST returns sizeof(GList). The two cases are swapped. GList nodes are larger than GSList nodes ( x), prototype(cx);\n  415 |     if (!ObjectPrototype::define_class(cx, module, Nothing{}, instance_type,\n  416 |                                        iface_types, n_interfaces, &constructor,\n  417 |                                        &prototype))\n  418 |         return false;","lines":6},{"ref":"gi/private.cpp:272-274","code":"  272 |     JS::RootedObject module(cx, gjs_lookup_private_namespace(cx));\n  273 |     if (!module)\n  274 |         return false;  // error will have been thrown already","lines":3},{"ref":"gi/private.cpp:451-453","code":"  451 |     JS::RootedObject module(cx, gjs_lookup_private_namespace(cx));\n  452 |     if (!module)\n  453 |         return false;","lines":3}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"register_non_module_sourcemap() ignores all failures. JS_NewStringCopyZ can return null (OOM) and JS::Call can fail, but neither return value is checked: script_str/file_name_str are stored into the args array unconditionally (a null JSString would be set into a Value), and the JS::Call return value is discarded. On OOM or a throwing populateSourceMap this silently leaves a pending exception on m_cx, which then propagates into the following eval()/eval_with_scope() path where eval_with_scope() bails out with the misleading warning 'eval_with_scope() called with a pending exception'.","fix":"Check JS_NewStringCopyZ results for null and check the JS::Call return value; on failure either clear the exception (source maps are best-effort) or propagate it cleanly, so it does not leak into the subsequent eval().","locations":[{"ref":"gjs/context.cpp:1408-1438","code":" 1408 | void GjsContextPrivate::register_non_module_sourcemap(const char* script,\n 1409 |                                                       const char* filename) {\n 1410 |     using AutoURI = Gjs::AutoPointer<GUri, GUri, g_uri_unref>;\n 1411 |     Gjs::AutoMainRealm ar{this}; bject());\n  236 |         const JSClass* internal_error =\n  237 |             js::ProtoKeyToClass(JSProto_InternalError);\n  238 |         if (JS_InstanceOf(cx, exc_obj, internal_error, nullptr)) {\n  239 |             JSErrorReport* report = JS_ErrorFromException(cx, exc_obj);\n  240 |             if (!report->message())\n  241 |                 return JS_NewStringCopyZ(cx, \"(unknown internal error)\");\n  242 |             return JS_NewStringCopyUTF8Z(cx, report->message());\n  243 |         }\n  244 |     }","lines":12}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"gjs_module_load() and gjs_module_resolve() assert (g_assert) that the loader hook returned a JS object: 'g_assert(result.isObject() && \"Module hook failed to return an object!\")'. Since g_assert can be compiled out (G_DISABLE_ASSERT) and even when present aborts the whole process, a JS-side loader returning a non-object (a programming error in modules/internal/loader.js, but reachable) crashes the process instead of producing a catchable error. In a release build with assertions disabled, &result.toObject() on a non-object is undefined behavior.","fix":"Replace the assert with a real check that throws a JS error (or returns nullptr) when the hook result is not an object, so it is handled rather than aborting / invoking UB.","locations":[{"ref":"gjs/module.cpp:386-390","code":"  386 |     if (!JS::Call(cx, loader, \"moduleLoadHook\", args, &result))\n  387 |         return nullptr;\n  388 | \n  389 |     g_assert(result.isObject() && \"Module hook failed to return an object!\");\n  390 |     return &result.toObject();","lines":5},{"ref":"gjs/module.cpp:571-575","code":"  571 |     if (!JS::Call(cx, loader, \"moduleResolveHook\", args, &result))\n  572 |         return nullptr;\n  573 | \n  574 |     g_assert(result.isObject() && \"resolve hook failed to return an object!\");\n  575 |     return &result.toObject();","lines":5}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In the region binary-operation macro, CairoRegion::for_js(cx, other_obj) can return nullptr (wrong class / no private data) WITHOUT setting a pending JS exception, yet the result is passed straight into cairo_region_union/subtract/intersect/xor. Passing a null region to these cairo functions yields undefined/garbage behavior and the user gets no meaningful error. Every other cairo binding in this slice null-checks the for_js result and returns false; this macro does not.","fix":"After `cairo_region_t* other_region = CairoRegion::for_js(cx, other_obj);` add `if (!other_region) { gjs_throw(cx, \"other region is not a Cairo.Region\"); return false; }` before calling cairo_region_##method. Better, use for_js_typecheck so a proper exception is thrown.","locations":[{"ref":"modules/cairo-region.cpp:46-60","code":"   46 | #define REGION_DEFINE_REGION_FUNC(method)                                    \\\n   47 |     GJS_JSAPI_RETURN_CONVENTION                                              \\\n   48 |     static bool method##_func(JSContext* cx, unsigned argc, JS::Value* vp) { \\\n   49 |         PRELUDE;                                                             \\\n   50 |         JS::RootedObject other_obj{cx};                                      \\\n   51 |         if (!gjs_parse_call_args(cx, #method, argv, \"o\", \"other_region\",     \\\n   52 |                                  &other_obj))                                \\\n   53 |             return false;                                                    \\\n   54 |                                                                              \\\n   55 |         cairo_region_t* other_region = CairoRegion::for_js(cx, other_obj);   \\\n   56 |                                                                              \\\n   57 |         cairo_region_##method(thi ");\n  168 |         g_assert(principals->refcount == 0 &&\n  169 |                  \"Mismatched JS_HoldPrincipals/JS_DropPrincipals\");\n  170 |     }\n  171 | \n  172 |     // Singleton\n  173 |     static ModuleLoaderPrincipals the_principals;\n  174 | };\n  175 | \n  176 | ModuleLoaderPrincipals ModuleLoaderPrincipals::the_principals{};\n  177 | \n  178 | JSPrincipals* get_internal_principals() {\n  179 |     return &ModuleLoaderPrincipals::the_principals;\n  180 | }","lines":21}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gjs_internal_load_resource_or_file() reads the entire file as bytes and wraps the bytes verbatim as UTF-8 via JS_NewStringCopyUTF8Z(). If the file is not valid UTF-8 (or contains embedded NUL bytes, since the length is passed but the Z-terminated copy stops at a NUL), the resulting JS string is silently truncated or the call fails with a generic error rather than a meaningful 'file is not valid UTF-8' diagnostic. The async variant uses gjs_string_from_utf8_n() (length-aware) which is more correct; the sync path is inconsistent with it.","fix":"Use gjs_string_from_utf8_n(cx, contents, length, ...) in the sync path too, matching load_async_callback(), so embedded NULs and invalid UTF-8 are handled consistently.","locations":[{"ref":"gjs/internal.cpp:468-475","code":"  468 |     JS::ConstUTF8CharsZ contents_chars{contents, length};\n  469 |     JS::RootedString contents_str(cx,\n  470 |                                   JS_NewStringCopyUTF8Z(cx, contents_chars));\n  471 |     g_free(contents);\n  472 |     if (!contents_str)\n  473 |         return false;\n  474 | \n  475 |     args.rval().setString(contents_str);","lines":8}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In gjs_throw_abstract_constructor_error, if JS_GetPropertyById fails or `prototype` is not an obj ace_wrapper = CairoImageSurface::from_c_ptr(cx, surface);\n   67 |     if (!surface_wrapper)\n   68 |         return false;\n   69 | \n   70 |     cairo_surface_destroy(surface);\n   71 | \n   72 |     args.rval().setObject(*surface_wrapper);\n   73 |     return true;\n   74 | }","lines":23}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"When pretty-print (JS::Call) fails, gjs_console_eval_and_print() logs the exception via gjs_log_exception(cx), then restores the saved exception state, and finally returns true. Returning true tells the caller that evaluation succeeded normally, so an uncatchable exception raised inside the pretty-printer would be swallowed rather than propagated. In practice pretty-print is internal JS so this is unlikely, but the success/failure contract documented in the function's own comment (false == uncatchable) is not honored for the print step.","fix":"If the pretty-print Call fails because of an uncatchable/pending exception that should terminate the REPL, propagate it (return false) rather than always returning true after printing \"[error printing value]\".","locations":[{"ref":"modules/console.cpp:260-277","code":"  260 |     JS::AutoSaveExceptionState exc_state(cx);\n  261 |     JS::RootedValue v_printed_string(cx);\n  262 |     JS::RootedValue v_pretty_print(\n  263 |         cx, gjs_get_global_slot(global, GjsGlobalSlot::PRETTY_PRINT_FUNC));\n  264 |     bool ok = JS::Call(cx, global, v_pretty_print, JS::HandleValueArray(result),\n  265 |                        &v_printed_string);\n  266 |     if (!ok)\n  267 |         gjs_log_exception(cx);\n  268 |     exc_state.restore();\n  269 | \n  270 |     if (ok) {\n  271 |         g_fprintf(stdout, \"%s\\n\",\n  272 |                   print_string_value(cx, v_printed_string).c_str());\n  273 |     } else {\n  274 |         g_fprintf(stdout, \"[error printing value]\\n\");\n  275 |     }\n  276 | \n  277 |     return true;","lines":18}]},{"id":"ERR_25","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"_format.js vprintf: the '%d' case does `parseInt(getArg())` with no radix argument. A string argument beginning with '0x' would be parsed as hex, and a leading-zero string is parsed as decimal in modern engines but the intent is decimal integer conversion. Combined with the alternative-int (I) flag using Intl.NumberFormat on the parsed value, malformed inputs silently become NaN-derived output rather than a clear error. The '%x' case (line 59) similarly uses parseInt without radix on arbitrary input.","fix":"Pass an explicit radix 10 to parseInt for %d (parseInt(getArg(), 10)) and validate NaN, to make decimal parsing deterministic.","locations":[{"ref":"modules/core/_format.js:48-59","code":"   48 |         case 'd': {\n   49 |             let intV = parseInt(getArg());\n   50 |             if (hasAlternativeIntFlag) {\n   51 |                 numberFormatter ??= new Intl.NumberFormat();\n   52 |                 s = numberFormatter.format(intV);\n   53 |             } else {\n   54 |                 s = intV.toString();\n   55 |             }\n   56 |             break;\n   57 |         }\n   58 |         case 'x':\n   59 |             s = parseInt(getArg()).toString(16);","lines":12}]},{"id":"ERR_26","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"loader.js populateSourceMap swallows all errors with empty catch blocks (lines 156, 165). While the doc states it 'fails gracefully and not throw', a malformed inline base64 data URI or invalid JSON silently produces no source map and no diagnostic at any log level, making source-map debugging failures invisible. atob() on malformed base64 throws and is caught silently.","fix":"Keep failing gracefully but emit a debug-level log (e.g. via the internal logger) when source map parsing fai o required = repo.require(ns_name.get(), version.get());\n  132 |     if (!required.isOk()) {\n  133 |         gjs_throw(cx, \"Requiring %s, version %s: %s\", ns_name.get(),\n  134 |                   version ? version.get() : \"none\",\n  135 |                   required.inspectErr()->message);\n  136 |         return false;\n  137 |     }","lines":7}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"gjs_profiler_stop() is documented and used (e.g. on sysprof write failure inside gjs_profiler_sigprof, and via gjs_profiler_chain_signal) as callable from the SIGPROF signal handler, yet it calls async-signal-unsafe functions: g_message() (logging, locks/malloc), sysprof_capture_writer_flush(), and g_clear_pointer(..., sysprof_capture_writer_unref) which frees the writer (malloc/free). It also calls sysprof_capture_writer_set_counters and timer_delete. Running this from inside the SIGPROF handler can deadlock or corrupt the heap. The file header explicitly warns that nothing in the handler may malloc or lock.","fix":"Do not call gjs_profiler_stop() directly from the signal handler. Instead set an async-signal-safe flag (sig_atomic_t) and disarm the POSIX timer, then perform the teardown (flush/unref/g_message) from the periodic_flush GSource or another main-loop callback outside signal context.","locations":[{"ref":"gjs/profiler.cpp:481-486","code":"  481 |     if (!sysprof_capture_writer_add_sample(self->capture,\n  482 |                                            now.time_since_epoch().count(), -1,\n  483 |                                            self->pid, -1, addrs, depth)) {\n  484 |         gjs_profiler_stop(self);\n  485 |         return;\n  486 |     }","lines":6},{"ref":"gjs/profiler.cpp:505-508","code":"  505 |     if (new_counts > 0 && !sysprof_capture_writer_set_counters(\n  506 |                               self->capture, now.time_since_epoch().count(), -1,\n  507 |  // ENABLE_PROFILER\n  725 | \n  726 |     self->running = false;\n  727 | }","lines":47}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"InterfacePrototype constructor calls g_type_default_interface_ref(gtype) and stores the GTypeInterface* in m_vtable, releasing it in the destructor. However m_vtable is acquired unconditionally even for interfaces defined purely from within GJS (no GIRepository info). If gtype is not actually a registered interface type at construction time, g_type_default_interface_ref may return garbage/null or warn; there is no validation that gtype is an interface before the ref.","fix":"Assert or verify G_TYPE_IS_INTERFACE(gtype) before calling g_type_default_interface_ref(), or document the invariant that gtype is always a valid interface type here.","locations":[{"ref":"gi/interface.cpp:30-41","code":"   30 | InterfacePrototype::InterfacePrototype(\n   31 |     const Maybe<const GI::InterfaceInfo>& info, GType gtype)\n   32 |     : GIWrapperPrototype(info, gtype),\n   33 |       m_vtable(\n   34 |           static_cast<GTypeInterface*>(g_type_default_interface_ref(gtype))) {\n   35 |     GJS_INC_COUNTER(interface);\n   36 | }\n   37 | \n   38 | InterfacePrototype::~InterfacePrototype() {\n   39 |     g_clear_pointer(&m_vtable, g_type_default_interface_unref);\n   40 |     GJS_DEC_COUNTER(interface);\n   41 | }","lines":12}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"The SIGPROF handler calls gjs_context_get_profiler(profiling_context), which routes through GjsContextPrivate::from_object() -> g_return_val_if_fail(GJS_IS_CONTEXT(...)). GJS_IS_CONTEXT performs a GType instance check, and on failure g_return_val_if_fail invokes g_log/g_logv (not async-signal-safe). The GType check machinery is also not guaranteed async-signal-safe. Calling this from inside the SIGPROF handler violates the signal-safety constraint described in the file header.","fix":"Cache the GjsProfiler* (and pid) into a plain static/global at gjs_profiler_start() time and read only that raw pointer in the handler, avoiding any GObject type checks or logging calls in signal context.","locations":[{"ref":"gjs/profiler.cpp:394-411","code":"  394 | static void gjs_profiler_sigprof(int signum [[maybe_unused]], siginfo_t* info,\n  395 |                                  void*) {\n  396 |     GjsProfiler* self = gjs_context_get_profiler(profiling_context);\n  397 | \n  398 |     g_assert(info && \"SIGPROF handler called with invalid signal info\");\n  399 |     g_assert(info->si_signo == SIGPROF &&\n  400 |              \"SIGPROF handler called with other signal\");\n  401 | \n  402 |     /*\n  403 |      * NOTE:\n  404 |      *\n  405 |      * This is the SIGPROF signal handler. Everything done in this thread\n  406 |      * needs to be things that are safe to do in a signal handler. One thing\n  407 |      * that is not okay to do, is *malloc*.\n  408 |      */\n  409 | \n  410 |     if (!self || info->si_code != SI_TIMER)\n  411 |         return;","lines":18}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gjs_value_from_constant_info() ignores the int return value of info.load_value() (gi_constant_info_get_value), which returns the size of the constant and is 0 on failure. If loading the constant value fails, `garg` may be left uninitialized and is then passed to gjs_value_from_gi_argument(), and free_value() is unconditionally run on possibly-uninitialized data via the scope guard.","fix":"Check the return value of load_value(); on 0 (failure), throw or return false before using/freeing garg.","locations":[{"ref":"gi/repo.cpp:262-272","code":"  262 | GJS_JSAPI_RETURN_CONVENTION\n  263 | static bool gjs_value_from_constant_info(JSContext* cx,\n  264 |                                          const GI::ConstantInfo info,\n  265 |  default:\n   62 |                 // We can't safely move in complex cases, so let's just copy\n   63 |                 this->steal();\n   64 |                 *this = src;\n   65 |                 g_value_unset(&src);\n   66 |         }\n   67 |     }","lines":23}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gjs_uri_object() constructs JS strings from g_uri_get_scheme/host/path using JS_NewStringCopyZ, justified by the comment that components are %-encoded ASCII because g_uri_parse was called with G_URI_FLAGS_ENCODED. However g_uri_get_host() can legitimately return nullptr (e.g. for a 'file:' or 'gi:' URI with no authority). JS_NewStringCopyZ(cx, nullptr) is passed a null pointer; depending on the SpiderMonkey build this is undefined or returns an empty/null string, then the !host check may or may not catch it. The path/scheme are generally non-null but host is the risky one.","fix":"Guard g_uri_get_host()/get_scheme() against nullptr (substitute an empty string) before passing to JS_NewStringCopyZ.","locations":[{"ref":"gjs/internal.cpp:388-392","code":"  388 |     JS::RootedString host(cx, JS_NewStringCopyZ(cx, g_uri_get_host(parsed)));\n  389 |     if (!host)\n  390 |         return false;\n  391 | \n  392 |     JS::RootedString path(cx, JS_NewStringCopyZ(cx, g_uri_get_path(parsed)));","lines":5}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Inconsistent handling of a null len_p between code paths in gjs_string_to_ucs4 / gjs_string_get_char16_data. The two-byte path guards `if (len_p != nullptr)` before writing the length, but from_latin1() (used for the Latin-1 path) unconditionally dereferences `*len_p` (it writes the length via `g_new(T, *len_p)` and `*len_p`). If a caller ever passes a non-null data pointer but a null len_p with a Latin-1 string, from_latin1 crashes. Current in-tree callers always pass a non-null len_p, so this is latent rather than active.","fix":"Either document/assert that len_p must be non-null for both functions, or make from_latin1 tolerate a null len_p consistently with the two-byte path.","locations":[{"ref":"gjs/jsapi-util-string.cpp:246-268","code":"  246 | template <typename T>\n  247 | GJS_JSAPI_RETURN_CONVENTION\n  248 | static bool from_latin1(JSContext* cx, JSString* str, T** data_p,\n  249 |                         size_t* len_p) {\n  250 |     /* No garbage collection should be triggered while we are using the string's\n  251 |      * chars. Crash if that happens. */\n  252 |     JS::AutoCheckCannotGC nogc;\n  253 | \n  254 |     const JS::Latin1Char* js_data =\n  255 |         JS_GetLatin1StringCharsAndLength(cx, nogc, str, len_p);\n  256 |     if (js_data == nullptr)\n  257 |         return false;\n  258 | \n  259 |     /* Unicode codepoints 0x00-0xFF are the same as Latin-1 codepoints, so we\n  260 |      * can preserve the string length and simply copy the codepoints to an array\n  261 |      * of different-sized ints */\n  262 | \n  263 |     *data_p = g_new(T, *len_p);\n  264 | \n  265 |     // This will probably use a loop, unfortunately\n  266 |     std::copy(js_data, js_data + *len_p, *data_p);\n  267 |     return true;\n  268 | }","lines":23},{"ref":"gjs/jsapi-util-string.cpp:317-352","code":"  317 | bool gjs_string_to_ucs4(JSContext* cx, JS::HandleString str,\n  318 |                         gunichar** ucs4_string_p, size_t* len_p) {\n  319 |     if (ucs4_string_p == nullptr)\n  320 |         return true;\n  321 | \n  322 |     size_t len;\n  323 |     Gjs::AutoError error;\n  324 | \n  325 |     if (JS::StringHasLatin1Chars(str))\n  326 |         return from_latin1(cx, str, ucs4_string_p, len_p);\n  327 | \n  328 |     /* From this point on, crash if a GC is triggered while we are using the\n  329 |      * string's chars */\n  330 |     JS::AutoCheckCannotGC nogc;\n  331 | \n  332 |     const char16_t* utf16 =\n  333 |         JS_GetTwoByteStringCharsAndLength(cx, nogc, str, &len);\n  334 | \n  335 |     if (utf16 == nullptr) {\n  336 |         gjs_throw(cx, \"Failed to get UTF-16 string data\");\n  337 |         return false;\n  338 |     }\n  339 | \n  340 |     if (ucs4_string_p != nullptr) {\n  341 |         long length;\n  342 |         *ucs4_string_p =\n  343 |             g_utf16_to_ucs4(reinterpret_cast<const gunichar2*>(utf16), len,\n  344 |                             nullptr, &length, &error);\n  345 |         if (*ucs4_string_p == nullptr) {\n  346 |             gjs_throw(cx, \"Failed to convert UTF-16 string to UCS-4: %s\",\n  347 |                       error->message);\n  348 |             return false;\n  349 |         }\n  350 |         if (len_p != nullptr)\n  351 |             *len_p = static_cast<size_t>(length);\n  352 |     }","lines":36}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"gjs_dbus_implementation_emit_signal and the flush path take connections via g_dbus_interface_skeleton_get_connections() (transfer container, elements owned) and then g_object_unref each element individually inside the loop (lines 294, 425) followed by g_list_free(connections). gjs_dbus_implementation_unexport_from_connection instead uses g_list_free_full(connections, g_object_unref) (line 470). Both are correct, but the inconsistent idioms for freeing the same list type invite a future copy-paste error (e.g. double free if someone adds g_list_free_full where individual unrefs already ran).","fix":"Standardize on g_list_free_full(connections, g_object_unref) in all three sites for clarity and to reduce copy-paste hazard.","locations":[{"ref":"libgjs-private/gjs-gdbus-wrapper.c:285-297","code":"  285 |     for (const GList* iter = connections; iter; iter = iter->next) {\n  286 |         g_dbus_connection_emit_signal(G_DBUS_CONNECTION(iter->data),\n  287 |                                       NULL, /* bus name */\n  288 |  fit, but this couples array layout to libc's numeric LC_* values and risks out-of-bounds indexing on platforms where an LC_* value is >= the category count.","fix":"Map the GjsLocaleCategory to a dense 0-based index explicitly (e.g. a small switch), instead of using the raw LC_* value as the array subscript.","locations":[{"ref":"libgjs-private/gjs-util.c:84-86","code":"   84 | static size_t get_number_of_locale_categories(void) {\n   85 |     return __builtin_popcount(LC_ALL_MASK) + 1;\n   86 | }","lines":3},{"ref":"libgjs-private/gjs-util.c:127","code":"  127 |     GjsLocale* locale = &locales[category];","lines":1}]},{"id":"API_10","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"estimate_size_of_xlib_surface multiplies width * height * depth where depth is in BITS per pixel, not bytes. The estimated byte size of an xlib surface is therefore inflated by roughly 8x (and also ignores row padding). Since this value is only used as a GC memory-pressure hint via JS::AddAssociatedMemory, it is not a correctness bug, but it systematically over-reports xlib surface memory and can cause more aggressive GC than warranted.","fix":"Convert depth to bytes (e.g. width * ((depth + 7) / 8) * height), or better, use the surface stride if obtainable, to match the image-surface estimate which correctly uses stride * height.","locations":[{"ref":"modules/cairo-memory.cpp:31-42","code":"   31 | #ifdef CAIRO_HAS_XLIB_SURFACE\n   32 | int32_t estimate_size_of_xlib_surface(cairo_surface_t* surface) {\n   33 |     int width = cairo_xlib_surface_get_width(surface);\n   34 |     int height = cairo_xlib_surface_get_height(surface);\n   35 |     int depth = cairo_xlib_surface_get_depth(surface);\n   36 |     mozilla::CheckedInt32 result =\n   37 |         mozilla::CheckedInt32{width} * height * depth;\n   38 |     if (!result.isValid())\n   39 |         return INT32_MAX;\n   40 |     return result.value();\n   41 | }\n   42 | #endif","lines":12}]},{"id":"API_11","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":true,"description":"Several JSFunctionSpec nargs values disagree with the functions' actual required/declared arguments. gjs_exit requires one mandatory \"i\" arg but is registered with nargs 0 (JS_FN(\"exit\", gjs_exit, 0, ...)); dumpMemoryInfo takes an optional filename but is registered with nargs 0 while dumpHeap (also optional filename) uses 1. nargs only affects Function.length and arguments-object padding, so this is cosmetic, but it is inconsistent and slightly misreports arity to JS.","fix":"Set nargs to match each function's mandatory argument count (exit -> 1) and make optional-arg functions consistent (dumpMemoryInfo -> 1 like dumpHeap).","locations":[{"ref":"modules/system.cpp:258-261","code":"  258 |     JS_FN(\"dumpHeap\", gjs_dump_heap, 1, GJS_MODULE_PROP_FLAGS),\n  259 |     JS_FN(\"dumpMemoryInfo\", gjs_dump_memory_info, 0, GJS_MODULE_PROP_FLAGS),\n  260 |     JS_FN(\"gc\", gjs_gc, 0, GJS_MODULE_PROP_FLAGS),\n  261 |     JS_FN(\"exit\", gjs_exit, 0, GJS_MODULE_PROP_FLAGS),","lines":4}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"The interactive readline wait loop busy-spins. The outer `while (!rl_async_done)` repeatedly calls `g_main_context_iteration(main_context, may_block=false)` only while there are pending sources, otherwise it loops again immediately without ever blocking. While waiting for the user to type a line, this pins a CPU core at ~100% the entire time the prompt is idle.","fix":"Block when there is nothing pending, e.g. call g_main_context_iteration(main_context, /*may_block=*/true) directly in the wait loop (a single blocking iteration per turn) instead of spinning with may_block=false.","locations":[{"ref":"modules/console.cpp:194-198","code":"  194 |     while (!rl_async_done) {\n  195 |         // Yield to other things while waiting for input\n  196 |         while (g_main_context_pending(main_context))\n  197 |             g_main_context_iteration(main_context, /* may_block = */ false);\n  198 |     }","lines":5}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"gjs_value_from_basic_ghash() and gjs_object_from_g_hash() use JS_NewPlainObject()/JS_NewPlainObject and define properties one by one without presizing, which is acceptable, but gjs_array_from_g_list()/array_from_basic_linked_list() call elems.growBy(1) inside the per-element loop instead of resizing once up front. For long lists this repeatedly reallocates the RootedValueVector. The fixed-length array paths correctly use elems.resize(length) first. Linked lists do not know length up front, so growBy is required there, but the zero-terminated array fill helpers (fill_vector_from_basic_zero_terminated_c_array, fill_vector_from_zero_terminated_pointer_carray) also growBy(1) per element where the length is likewise unknown - acceptable, but worth a reserve heuristic.","fix":"Where the element count is known (GArray/GPtrArray/explicit length), resize once. For linked lists, consider counting length first (g_list_length/g_slist_length) and resizing, to avoid repeated reallocations.","locations":[{"ref":"gi/arg.cpp:2302-2314","code":" 2302 |     for (size_t i = 0; list; list = list->next, ++i) {\n 2303 |         element_type.argument_from_hash_pointer(list->data, &arg);\n 2304 | \n 2305 |         if (!elems.growBy(1)) {\n 2306 |             JS_ReportOutOfMemory(cx);\n 2307 |             return false;\n 2308 |         }\n 2309 | \n 2310 |         if (!gjs_value_from_gi_argument(cx, elems[i], element_type,\n 2311 |                                         GJS_ARGUMENT_LIST_ELEMENT, transfer,\n 2312 |                                         &arg))\n 2313 |             return false;\n 2314 |     }","lines":13},{"ref":"gi/arg.cpp:3053-3064","code":" 3053 |     for (size_t i = 0; list; list = list->next, ++i) {\n 3054 |         //
