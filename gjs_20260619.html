<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"FundamentalInstance::object_for_gvalue() calls FundamentalPrototype::for_gtype() and immediately dereferences the returned pointer (proto_priv->call_get_value_function()) without a null check. for_gtype() is GJS_JSAPI_RETURN_CONVENTION and returns nullptr when the prototype lookup fails (e.g. the gtype has no introspection info, or a JS exception is pending). A null fundamental prototype here causes a null-pointer dereference / crash instead of propagating the error.","fix":"After 'auto* proto_priv = FundamentalPrototype::for_gtype(cx, gtype);' add 'if (!proto_priv) return false;' before using it.","locations":[{"ref":"gi/fundamental.cpp:412-418","code":"  412 | bool FundamentalInstance::object_for_gvalue(\n  413 |     JSContext* cx, const GValue* value, GType gtype,\n  414 |     JS::MutableHandleObject object_out) {\n  415 |     auto* proto_priv = FundamentalPrototype::for_gtype(cx, gtype);\n  416 |     void* fobj = nullptr;\n  417 | \n  418 |     if (!proto_priv->call_get_value_function(value, &fobj)) {","lines":7},{"ref":"gi/fundamental.cpp:402-410","code":"  402 | FundamentalPrototype* FundamentalPrototype::for_gtype(JSContext* cx,\n  403 |                                                       GType gtype) {\n  404 |     JS::RootedObject proto(\n  405 |         cx, gjs_lookup_fundamental_prototype_from_gtype(cx, gtype));\n  406 |     if (!proto)\n  407 |         return nullptr;\n  408 | \n  409 |     return FundamentalPrototype::for_js(cx, proto);\n  410 | }","lines":9}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"FundamentalInstance::copy_ptr() calls FundamentalPrototype::for_gtype() and dereferences the result (priv->call_ref_function()) with no null check. for_gtype() can return nullptr (failed prototype lookup / pending exception), producing a null-pointer dereference.","fix":"Check 'if (!priv) return nullptr;' after the for_gtype() call before calling priv->call_ref_function().","locations":[{"ref":"gi/fundamental.cpp:472-476","code":"  472 | void* FundamentalInstance::copy_ptr(JSContext* cx, GType gtype,\n  473 |                                     void* gfundamental) {\n  474 |     auto* priv = FundamentalPrototype::for_gtype(cx, gtype);\n  475 |     return priv->call_ref_function(gfundamental);\n  476 | }","lines":5}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"In gjs_array_from_zero_terminated_c_array(), for GI_TYPE_TAG_INTERFACE elements, reg_info is obtained via interface_info.as<GI::InfoTag::REGISTERED_TYPE>() and then reg_info->is_struct() is called unconditionally. If the interface is not a registered type (e.g. a callback interface used as a zero-terminated array element), reg_info is an empty Maybe and dereferencing it is a null/invalid deref. The parallel function gjs_array_from_carray_internal() guards struct handling differently and does not assume reg_info is present.","fix":"Guard the struct branch on reg_info being present, e.g. test `bool is_struct = reg_info && reg_info->is_struct();` (matching the is_struct/is_union checks done elsewhere) before dereferencing, and fall through to the pointer-array path otherwise.","locations":[{"ref":"gi/arg.cpp:2874-2891","code":" 2874 |         case GI_TYPE_TAG_INTERFACE: {\n 2875 |             GI::AutoBaseInfo interface_info{element_type.interface()};\n 2876 |             auto reg_info = interface_info.as<GI::InfoTag::REGISTERED_TYPE>();\n 2877 |             bool element_is_pointer = element_type.is_pointer();\n 2878 |             bool is_struct = reg_info->is_struct();\n 2879 | \n 2880 |             if (!element_is_pointer && is_struct) {\n 2881 |                 auto struct_info = interface_info.as<GI::InfoTag::STRUCT>();\n 2882 |                 size_t element_size = struct_info->size();\n 2883 | \n 2884 |                 if (!fill_vector_from_zero_terminated_non_pointer_carray(\n 2885 |                         cx, elems, element_type, &arg, element_size, c_array))\n 2886 |                     return false;\n 2887 |                 break;\n 2888 |             }\n 2889 | \n 2890 |             [[fallthrough]];\n 2891 |         }","lines":18}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"BoxedPrototype::lookup_field() calls JS_EncodeStringToUTF8() and then immediately uses encoded_prop_name.get() to construct a std::string and to compare. JS_EncodeStringToUTF8 can return a null UniqueChars on OOM/error; dereferencing .get() (passing nullptr to std::string ctor) is undefined behavior / crash. Other call sites in this codebase guard the result of JS_EncodeStringToUTF8.","fix":"Check 'if (!encoded_prop_name) return {};' (an exception is already pending) before using encoded_prop_name.get().","locations":[{"ref":"gi/boxed.cpp:217-225","code":"  217 |     JS::RootedString rooted_name(cx, prop_name);\n  218 |     JS::UniqueChars encoded_prop_name = JS_EncodeStringToUTF8(cx, rooted_name);\n  219 |     const std::string field_name{\n  220 |         find_unique_js_field_name(info(), encoded_prop_name.get())};\n  221 | \n  222 |     if (field_name != encoded_prop_name.get()) {\n  223 |         prop_name = JS_AtomizeAndPinStringN(cx, field_name.c_str(),\n  224 |                                             field_name.length());\n  225 |     }","lines":9}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In the G_TYPE_ENUM conversion path, when an invalid enum value is supplied the error message calls value.toInt32(). JS::Value::toInt32() asserts that the value is an Int32, but the value reaching this branch was converted via js_value_to_c<int64_t>(), so it can be a JS double (e.g. 5.5) or a BigInt. Passing such a value triggers an assertion failure / undefined behavior in a debug build instead of a clean JS exception.","fix":"Use the already-computed value_int64 in the error string (e.g. \"%\" G_GINT64_FORMAT) instead of value.toInt32(), or guard with value.isInt32().","locations":[{"ref":"gi/value.cpp:859-877","code":"  859 |     if (g_type_is_a(gtype, G_TYPE_ENUM)) {\n  860 |         int64_t value_int64;\n  861 | \n  862 |         if (Gjs::js_value_to_c<int64_t>(cx, value, &value_int64)) {\n  863 |             Gjs::AutoTypeClass<GEnumClass> enum_class{gtype};\n  864 | \n  865 |             // See arg.c:_gjs_enum_to_int()\n  866 |             GEnumValue* v =\n  867 |                 g_enum_get_value(enum_class, static_cast<int>(value_int64));\n  868 |             if (v == nullptr) {\n  869 |                 gjs_throw(cx, \"%d is not a valid value for enumeration %s\",\n  870 |                           value.toInt32(), g_type_name(gtype));\n  871 |                 return false;\n  872 |             }\n  873 | \n  874 |             g_value_set_enum(gvalue, v->value);\n  875 |             return true;\n  876 |         }\n  877 |         return throw_expect_type(cx, value, \"enum\", gtype);","lines":19}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"GjsScriptModule::create() does not check the result of JS_NewObject() before using it. If allocation fails (returns nullptr), JS::SetReservedSlot() is called on a null JSObject*, and the freshly-allocated GjsScriptModule leaks (it is never stored where finalize() could delete it). JS_NewObject can fail under OOM, so this is a real null dereference + leak path, not just theoretical.","fix":"After 'JSObject* module = JS_NewObject(...)', add 'if (!module) return nullptr;' before allocating the GjsScriptModule and setting the reserved slot.","locations":[{"ref":"gjs/module.cpp:86-92","code":"   86 |     [[nodiscard]]\n   87 |     static JSObject* create(JSContext* cx, const char* name) {\n   88 |         JSObject* module = JS_NewObject(cx, &GjsScriptModule::klass);\n   89 |         JS::SetReservedSlot(module, GjsScriptModule::POINTER,\n   90 |                             JS::PrivateValue(new GjsScriptModule(name)));\n   91 |         return module;\n   92 |     }","lines":7}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"context_to_gi_argument calls `&value.toObject()` without first verifying value.isObject() (it only handles value.isNull()). If a non-null, non-object JS value (number, string, boolean) is marshalled as a Cairo.Context GI argument, value.toObject() hits a debug assertion / undefined behavior. The analogous surface_to_gi_argument, pattern_to_gi_argument and path_to_gi_argument all correctly guard with an `if (!value.isObject())` check before toObject(); the context version is missing it (region_to_gi_argument has the same omission).","fix":"Add the same `if (!value.isObject()) { ...throw \"is not a Cairo.Context\"...; return false; }` guard before `&value.toObject()`, mirroring surface_to_gi_argument.","locations":[{"ref":"modules/cairo-context.cpp:999-1018","code":"  999 |     if (value.isNull()) {\n 1000 |         if (!(flags & GjsArgumentFlags::MAY_BE_NULL)) {\n 1001 |             Gjs::AutoChar display_name{\n 1002 |                 gjs_argument_display_name(arg_name, argument_type)};\n 1003 |             gjs_throw(cx, \"%s may not be null\", display_name.get());\n 1004 |             return false;\n 1005 |         }\n 1006 | \n 1007 |         gjs_arg_unset(arg);\n 1008 |         return true;\n 1009 |     }\n 1010 | \n 1011 |     JS::RootedObject obj{cx, &value.toObject()};\n 1012 |     cairo_t* cr = CairoContext::for_js(cx, obj);\n 1013 |     if (!cr)\n 1014 |         return false;\n 1015 |     if (transfer == GI_TRANSFER_EVERYTHING)\n 1016 |         cairo_reference(cr);\n 1017 | \n 1018 |     gjs_arg_set(arg, cr);","lines":20},{"ref":"modules/cairo-region.cpp:218-238","code":"  218 |     if (value.isNull()) {\n  219 |         if (!(flags & GjsArgumentFlags::MAY_BE_NULL)) {\n  220 |             Gjs::AutoChar display_name{\n  221 |                 gjs_argument_display_name(arg_name, argument_type)};\n  222 |             gjs_throw(cx, \"%s may not be null\", display_name.get());\n  223 |             return false;\n  224 |         }\n  225 | \n  226 |         gjs_arg_unset(arg);\n  227 |         return true;\n  228 |     }\n  229 | \n  230 |     JS::RootedObject obj{cx, &value.toObject()};\n  231 |     cairo_region_t* region;\n  232 | \n  233 |     if (!CairoRegion::for_js_typecheck(cx, obj, &region))\n  234 |         return false;\n  235 |     if (transfer == GI_TRANSFER_EVERYTHING)\n  236 |         cairo_region_reference(region);\n  237 | \n  238 |     gjs_arg_set(arg, region);","lines":21}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"find_error_domain_info() calls repo.require(\"GIRepository\", \"3.0\").unwrap() as a 'last attempt' to resolve an unknown error domain. mozilla::Result::unwrap() aborts the process if the result is Err. While GLib/GObject/Gio are guaranteed dependencies, the GIRepository-3.0 typelib is described in the comment as 'rarely needed' and is not guaranteed to be installed; if it is missing, error marshalling for an unknown domain would abort the whole process instead of falling back to a plain GError.","fix":"Handle the GIRepository require() failure gracefully (e.g. check isOk() and just skip the find_by_error_domain() if it failed) rather than unwrap(), so a missing optional typelib does not abort the process.","locations":[{"ref":"gi/gerror.cpp:267-269","code":"  267 |     // last attempt: load GIRepository (for invoke errors, rarely needed)\n  268 |     repo.require(\"GIRepository\", \"3.0\").unwrap();\n  269 |     return repo.find_by_error_domain(domain);","lines":3},{"ref":"gi/gerror.cpp:251-270","code":"  251 | [[nodiscard]]\n  252 | static Maybe<const GI::EnumInfo> find_error_domain_info(\n  253 |     const GI::Repository& repo, GQuark domain) {\n  254 |     // first an attempt without loading extra libraries\n  255 |     Maybe<GI::AutoEnumInfo> info = repo.find_by_error_domain(domain);\n  256 |     if (info)\n  257 |         return info;\n  258 | \n  259 |     // load standard stuff\n  260 |     repo.require(\"GLib\", \"2.0\").unwrap();\n  261 |     repo.require(\"GObject\", \"2.0\").unwrap();\n  262 |     repo.require(\"Gio\", \"2.0\").unwrap();\n  263 |     info = repo.find_by_error_domain(domain);\n  264 |     if (info)\n  265 |         return info;\n  266 | \n  267 |     // last attempt: load GIRepository (for invoke errors, rarely needed)\n  268 |     repo.require(\"GIRepository\", \"3.0\").unwrap();\n  269 |     return repo.find_by_error_domain(domain);\n  270 | }","lines":20}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"gjs_internal_atob() does not check the result of g_base64_decode(). g_base64_decode() can return nullptr (e.g. for empty or whitespace-only input the GLib implementation may return a non-null zero-length buffer, but the contract does not guarantee non-null, and result_len can be 0). The returned pointer is wrapped directly in JS::ConstUTF8CharsZ{decoded, result_len} and passed to JS_NewStringCopyUTF8Z without a null check. If decoded is null this is a null deref inside the JSAPI.","fix":"Check 'if (!decoded) { gjs_throw(...); return false; }' (or handle the zero-length case) before constructing ConstUTF8CharsZ.","locations":[{"ref":"gjs/internal.cpp:498-502","code":"  498 |     Gjs::AutoChar decoded =\n  499 |         reinterpret_cast<char*>(g_base64_decode(text.get(), &result_len));\n  500 |     JS::ConstUTF8CharsZ contents_chars{decoded, result_len};\n  501 |     JS::RootedString contents_str{cx,\n  502 |                                   JS_NewStringCopyUTF8Z(cx, contents_chars)};","lines":5}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":true,"description":"Possible null-pointer dereference / write to uninitialized buffer in gjs_byte_array_from_data_copy(). JS::NewArrayBuffer(cx, nbytes) is called at line 163 and, when it succeeds-or-fails, the code immediately enters the AutoCheckCannotGC block and calls JS::GetArrayBufferData(array_buffer, ...) and std::copy_n into `storage` at lines 165-168, BEFORE the null check on `array_buffer` at line 172. If the allocation fails (OOM, huge nbytes), array_buffer is null, GetArrayBufferData dereferences/uses a null object and storage is garbage, leading to a crash or out-of-bounds write of nbytes bytes.","fix":"Check `if (!array_buffer) return nullptr;` immediately after the NewArrayBuffer call (before entering the nogc block and copying), as is done correctly in from_gbytes_func.","locations":[{"ref":"gjs/byteArray.cpp:158-173","code":"  158 | JSObject* gjs_byte_array_from_data_copy(JSContext* cx, size_t nbytes,\n  159 |                                         void* data) {\n  160 |     JS::RootedObject array_buffer(cx);\n  161 |     // a null data pointer takes precedence over whatever `nbytes` says\n  162 |     if (data) {\n  163 |         array_buffer = JS::NewArrayBuffer(cx, nbytes);\n  164 | \n  165 |         JS::AutoCheckCannotGC nogc{};\n  166 |         bool unused;\n  167 |         uint8_t* storage = JS::GetArrayBufferData(array_buffer, &unused, nogc);\n  168 |         std::copy_n(static_cast<uint8_t*>(data), nbytes, storage);\n  169 |     } else {\n  170 |         array_buffer = JS::NewArrayBuffer(cx, 0);\n  171 |     }\n  172 |     if (!array_buffer)\n  173 |         return nullptr;","lines":16}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"CallbackIn::m_ffi_closure is never initialized in the constructor (the Callback base does not initialize it either). It is only assigned inside CallbackIn::in(). If a function call fails on an earlier argument before this callback argument's in() runs, the cleanup path still invokes release() on every argument, and CallbackIn::release() reads m_ffi_closure (and then dereferences closure->user_data and calls g_closure_unref). Reading the uninitialized pointer can crash or unref an arbitrary pointer.","fix":"Initialize m_ffi_closure = nullptr in the CallbackIn/Callback constructor (e.g. in the member declaration: ffi_closure* m_ffi_closure = nullptr;).","locations":[{"ref":"gi/arg-cache.cpp:1531-1533","code":" 1531 |  private:\n 1532 |     ffi_closure* m_ffi_closure;\n 1533 | };","lines":3},{"ref":"gi/arg-cache.cpp:2467-2480","code":" 2467 | GJS_JSAPI_RETURN_CONVENTION\n 2468 | bool CallbackIn::release(JSContext*, GjsFunctionCallState*, GIArgument* in_arg,\n 2469 |                          GIArgument* out_arg [[maybe_unused]]) {\n 2470 |     ffi_closure* closure = m_ffi_closure;\n 2471 |     if (!closure)\n 2472 |         return true;\n 2473 | \n 2474 |     g_closure_unref(static_cast<GClosure*>(closure->user_data));\n 2475 |     // CallbackTrampolines are refcounted because for notified/async closures\n 2476 |     // it is possible to destroy it while in call, and therefore we cannot\n 2477 |     // check its scope at this point\n 2478 |     gjs_arg_unset(in_arg);\n 2479 |     return true;\n 2480 | }","lines":14}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"ObjectBox::impl::~impl() calls std::find() then m_wrappers.erase(it) unconditionally. m_wrappers is only appended to in init(), not in the constructor. In ObjectBox::boxed(), if init() fails (OOM), boxed() returns nullptr; the local Ptr `box` then destroys the just-created ObjectBox, which unrefs to zero, deletes the impl, and runs ~impl() where std::find returns end() (the parent was never appended). erase(end()) on a JS::GCVector is undefined behavior. Even outside OOM, erasing end() corrupts the vector.","fix":"Guard the erase: `auto* it = std::find(...); if (it != m_wrappers.end()) m_wrappers.erase(it);`. Alternatively, append to m_wrappers in the constructor, or detect the failed-init case in boxed() before the Ptr is destroyed.","locations":[{"ref":"gjs/objectbox.cpp:56-60","code":"   56 |     ~impl() {\n   57 |         auto* it = std::find(m_wrappers.begin(), m_wrappers.end(), m_parent);\n   58 |         m_wrappers.erase(it);\n   59 |         debug(\"Finalized\");\n   60 |     }","lines":5},{"ref":"gjs/objectbox.cpp:101-105","code":"  101 |     } else {\n  102 |         box = new ObjectBox(obj);\n  103 |         if (!box->m_impl->init(cx))\n  104 |             return nullptr;\n  105 |     }","lines":5}]},{"id":"UAF_4","type":"use_after_free","type_label":"Use After Free","severity":"low","easy":false,"description":"Surface methods (flush, finish, writeToPNG, getType, get*, etc.) operate on the wrapped cairo_surface_t with no guard against the surface already having been finished via finish(). After cairo_surface_finish(), most operations put the surface into CAIRO_STATUS_SURFACE_FINISHED; the binding's status checks will surface that as an error, so it is not a hard crash, but there is no use-after-free protection beyond cairo's own status handling. Worth noting that finish() does not invalidate the wrapper, so JS can keep calling drawing operations on a finished surface (and any Context still targeting it).","fix":"This is largely cairo-managed via status, so likely acceptable; if stricter behavior is desired, track a finished flag and throw early. At minimum ensure every entry point checks cairo_surface_status (they do).","locations":[{"ref":"modules/cairo-surface.cpp:87-107","code":"   87 | GJS_JSAPI_RETURN_CONVENTION\n   88 | bool finish_func(JSContext* cx, unsigned argc, JS::Value* vp) {\n   89 |     GJS_GET_THIS(cx, argc, vp, argv, obj);\n   90 | \n   91 |     if (argc > 1) {\n   92 |         gjs_throw(cx, \"Surface.finish() takes no arguments\");\n   93 |         return false;\n   94 |     }\n   95 | \n   96 |     cairo_surface_t* surface = CairoSurface::for_js(cx, obj);\n   97 |     if (!surface)\n   98 |         return false;\n   99 | \n  100 |     cairo_surface_finish(surface);\n  101 | \n  102 |     if (!gjs_cairo_check_status(cx, cairo_surface_status(surface), \"surface\"))\n  103 |         return false;\n  104 | \n  105 |     argv.rval().setUndefined();\n  106 |     return true;\n  107 | }","lines":21}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In callback_closure_inner(), for SCOPE != CALL in-args needing cleanup, an InvalidateData is heap-allocated and registered with g_closure_add_invalidate_notifier(this, ...). If the trampoline is never invalidated (e.g. a FOREVER-ish or leaked closure) the notifier never runs and the InvalidateData plus the owned GIArgument contents leak. Additionally, registering a new invalidate notifier per invocation per transfer-arg means repeated callbacks accumulate notifiers (and deferred releases) without bound for non-CALL, non-FOREVER scopes.","fix":"Release CALL-scope args immediately (already done) and for NOTIFIED/ASYNC scope track the pending releases in a per-trampoline container released exactly once on invalidation, rather than adding a fresh invalidate notifier on every invocation.","locations":[{"ref":"gi/function.cpp:638-661","code":"  638 | \n  639 |         struct InvalidateData {\n  640 |             GI::StackArgInfo arg_info;\n  641 |             GIArgument arg;\n  642 |         };\n  643 | \n  644 |         auto* data = new InvalidateData({std::move(arg_info), *arg});\n  645 |         g_closure_add_invalidate_notifier(\n  646 |             this, data, [](void* invalidate_data, GClosure* c) {\n  647 |                 auto* self = static_cast<GjsCallbackTrampoline*>(c);\n  648 |                 std::unique_ptr<InvalidateData> data(\n  649 |                     static_cast<InvalidateData*>(invalidate_data));\n  650 |                 GITransfer transfer = data->arg_info.ownership_transfer();\n  651 | \n  652 |                 GI::StackTypeInfo type_info;\n  653 |                 data->arg_info.load_type(&type_info);\n  654 |                 if (!gjs_gi_argument_release(self->cx(), transfer, type_info,\n  655 |                                              &data->arg)) {\n  656 |                     gjs_throw(self->cx(),\n  657 |                               \"Impossible to release closure argument '%s'\",\n  658 |                               data->arg_info.name());\n  659 |                 }\n  660 |             });\n  661 |     }","lines":24}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In write_statistics_internal, `output_file` is obtained from g_file_get_child() as a raw owning GFile* pointer, but it is never wrapped in an AutoUnref and never freed on the error paths. Every MOZ_TRY() in the function (write_line, copy_source_file_to_coverage_output, write_source_file_header) and the early `if (!ostream)` return leaks `output_file`. Only the final success return transfers ownership into the AutoUnref<GFile> result. Any failure during the lcov loop leaks the GFile.","fix":"Wrap it as `Gjs::AutoUnref<GFile> output_file{g_file_get_child(priv->output_dir, \"coverage.lcov\")};` and return `Gjs::AutoUnref<GFile>{output_file.copy()}` (or g_object_ref) on success so the object is freed on every error path.","locations":[{"ref":"gjs/coverage.cpp:209-268","code":"  209 |     GFile* output_file = g_file_get_child(priv->output_dir, \"coverage.lcov\");\n  210 | \n  211 |     size_t lcov_length;\n  212 |     JS::UniqueChars lcov = js::GetCodeCoverageSummary(cx, &lcov_length);\n  213 | \n  214 |     Gjs::AutoUnref<GOutputStream> ostream{G_OUTPUT_STREAM(g_file_append_to(\n  215 |         output_file, G_FILE_CREATE_NONE, nullptr, error.out()))};\n  216 |     if (!ostream)\n  217 |         return Err(error.release());\n  218 | \n  219 |     Gjs::AutoStrv lcov_lines{g_strsplit(lcov.get(), \"\\n\", -1)};\n  220 |     const char* test_name = nullptr;\n  221 |     bool ignoring_file = false;\n  222 | \n  223 |     for (const char* const* iter = lcov_lines.get(); *iter; iter++) {\n  224 |         if (ignoring_file) {\n  225 |             if (strcmp(*iter, \"end_of_record\") == 0)\n  226 |                 ignoring_file = false;\n  227 |             continue;\n  228 |         }\n  229 | \n  230 |         if (g_str_has_prefix(*iter, \"TN:\")) {\n  231 |             /* Don't write the test name if the next line shows we are ignoring\n  232 |              * the source file */\n  233 |             test_name = *iter;\n  234 |             continue;\n  235 |         }\n  236 | \n  237 |         if (g_str_has_prefix(*iter, \"SF:\")) {\n  238 |             const char* filename = *iter + 3;\n  239 |             if (!filename_has_coverage_prefixes(self, filename)) {\n  240 |                 ignoring_file = true;\n  241 |                 continue;\n  242 |             }\n  243 | \n  244 |             // Now we can write the test name before writing the source file\n  245 |             MOZ_TRY(write_line(ostream, test_name));\n  246 | \n  247 |             /* The source file could be a resource, so we must use\n  248 |              * g_file_new_for_commandline_arg() to disambiguate between URIs and\n  249 |              * filesystem paths. */\n  250 |             Gjs::AutoUnref<GFile> source_file{\n  251 |                 g_file_new_for_commandline_arg(filename)};\n  252 |             Gjs::AutoChar diverged_paths{\n  253 |                 find_diverging_child_components(source_file, priv->output_dir)};\n  254 |             Gjs::AutoUnref<GFile> destination_file{\n  255 |                 g_file_resolve_relative_path(priv->output_dir, diverged_paths)};\n  256 |             MOZ_TRY(copy_source_file_to_coverage_output(source_file,\n  257 |                                                         destination_file));\n  258 | \n  259 |             /* Rewrite the source file path to be relative to the output dir so\n  260 |              * that genhtml will find it */\n  261 |             MOZ_TRY(write_source_file_header(ostream, destination_file));\n  262 |             continue;\n  263 |         }\n  264 | \n  265 |         MOZ_TRY(write_line(ostream, *iter));\n  266 |     }\n  267 | \n  268 |     return Gjs::AutoUnref<GFile>{output_file};","lines":60}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In gjs_log_writer_func_wrapper, g_variant_dict_end() returns a floating GVariant reference. The code then calls g_variant_ref() (which adds a normal ref but does NOT sink the floating ref) followed by a single g_variant_unref(). The variant ends with refcount 1 and is still floating, so it is never freed - a leak on every log message routed through a JS writer. g_variant_ref_sink() (or just removing the extra ref/unref pair and sinking) is required to take ownership of a floating variant.","fix":"Use GVariant* string_fields = g_variant_ref_sink(g_variant_dict_end(&dict)); then g_variant_unref(string_fields) after use, or call g_variant_dict_end and pass directly without the spurious ref.","locations":[{"ref":"libgjs-private/gjs-util.c:483-489","code":"  483 |     GVariant* string_fields = g_variant_dict_end(&dict);\n  484 |     g_variant_ref(string_fields);\n  485 | \n  486 |     GLogWriterOutput output =\n  487 |         func(log_level, string_fields, log_writer_user_data);\n  488 | \n  489 |     g_variant_unref(string_fields);","lines":7}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"gjs_dumpstack_string() does `out.resize(std::max(out.size() - 2, size_t{0}))` to strip a trailing \"\\n\\n\". size_t is unsigned, so when `out` is empty (no contexts, or every printer.init() failed before appending) `out.size() - 2` wraps around to SIZE_MAX-1. std::max with size_t{0} cannot recover because the wrapped value is the larger of the two, so resize() is called with an enormous length and throws std::length_error / bad_alloc. The same underflow occurs if out has length 1.","fix":"Guard the size before subtracting, e.g. `if (out.size() >= 2) out.resize(out.size() - 2);` (the std::max trick does not work for unsigned types).","locations":[{"ref":"gjs/stack.cpp:62-66","code":"   62 |     std::string out = all_traces.str();\n   63 |     // COMPAT: 0zu in C++23\n   64 |     out.resize(std::max(out.size() - 2, size_t{0}));\n   65 | \n   66 |     return out;","lines":5}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In gjs_lossy_decode_from_uint8array_slow the buffer-growth heuristic can loop without ever making progress on degenerate inputs. When g_converter_convert writes 0 bytes, sets no recognized error, and input_len stays > 0, none of the branches (INVALID_DATA/PARTIAL_INPUT skip a byte, NO_SPACE grows buffer, else throws) is taken, so the do/while spins forever. The NO_SPACE growth `buffer_size += bytes_len` also assumes bytes_len > 0; for pathological converters that repeatedly return NO_SPACE the buffer keeps growing unbounded (no upper cap relative to SIZE_MAX), and `bytes_len * 2 + 12` / `bytes_len * 4` can overflow size_t for very large inputs, yielding a too-small allocation and subsequent over-append into output_str.","fix":"Add an explicit progress guard: if a conversion iteration reads 0 bytes and writes 0 bytes and produced no actionable error, break or throw. Use mozilla::CheckedInt for the buffer_size arithmetic (bytes_len*2+12, bytes_len*4) and bail with JS_ReportOutOfMemory on overflow.","locations":[{"ref":"gjs/text-encoding.cpp:116-191","code":"  116 |     size_t buffer_size =\n  117 |         std::max(bytes_len * 2 + 12, static_cast<size_t>(256u));\n  118 | \n  119 |     // Cast data to correct input types\n  120 |     const char* input = reinterpret_cast<const char*>(bytes);\n  121 |     size_t input_len = bytes_len;\n  122 | \n  123 |     // The base string that we'll append to.\n  124 |     std::u16string output_str;\n  125 | \n  126 |     do {\n  127 |         Gjs::AutoError local_error;\n  128 | \n  129 |         // Create a buffer to convert into.\n  130 |         std::unique_ptr<char[]> buffer = std::make_unique<char[]>(buffer_size);\n  131 |         size_t bytes_written = 0, bytes_read = 0;\n  132 | \n  133 |         g_converter_convert(G_CONVERTER(converter.get()), input, input_len,\n  134 |                             buffer.get(), buffer_size, G_CONVERTER_INPUT_AT_END,\n  135 |                             &bytes_read, &bytes_written, &local_error);\n  136 | \n  137 |         // If bytes were read, adjust input.\n  138 |         if (bytes_read > 0) {\n  139 |             input += bytes_read;\n  140 |             input_len -= bytes_read;\n  141 |         }\n  142 | \n  143 |         // If bytes were written append the buffer contents to our string\n  144 |         // accumulator\n  145 |         if (bytes_written > 0) {\n  146 |             char16_t* utf16_buffer = reinterpret_cast<char16_t*>(buffer.get());\n  147 |             // std::u16string uses exactly 2 bytes for every character.\n  148 |             output_str.append(utf16_buffer, bytes_written / 2);\n  149 |         } else if (local_error) {\n  150 |             // A PARTIAL_INPUT error can only occur if the user does not provide\n  151 |             // the full sequence for a multi-byte character, we skip over the\n  152 |             // next character and insert a unicode fallback.\n  153 | \n  154 |             // An INVALID_DATA error occurs when there is no way to decode a\n  155 |             // given byte into UTF-16 or the given byte does not exist in the\n  156 |             // source encoding.\n  157 |             if (g_error_matches(local_error, G_IO_ERROR,\n  158 |                                 G_IO_ERROR_INVALID_DATA) ||\n  159 |                 g_error_matches(local_error, G_IO_ERROR,\n  160 |                                 G_IO_ERROR_PARTIAL_INPUT)) {\n  161 |                 // If we're already at the end of the string, don't insert a\n  162 |                 // fallback.\n  163 |                 if (input_len > 0) {\n  164 |                     // Skip the next byte and reduce length by one.\n  165 |                     input += 1;\n  166 |                     input_len -= 1;\n  167 | \n  168 |                     // Append the unicode fallback character to the output\n  169 |                     output_str.append(u\"\\ufffd\", 1);\n  170 |                 }\n  171 |             } else if (g_error_matches(local_error, G_IO_ERROR,\n  172 |                                        G_IO_ERROR_NO_SPACE)) {\n  173 |                 // If the buffer was full increase the buffer\n  174 |                 // size and re-try the conversion.\n  175 |                 //\n  176 |                 // This logic allocates bytes_len * 3 first,\n  177 |                 // then bytes_len * 4 (the worst case scenario\n  178 |                 // is nearly impossible) and then continues appending\n  179 |                 // arbitrary padding because we'll trust Gio and give\n  180 |                 // it additional space.\n  181 |                 if (buffer_size > bytes_len * 4) {\n  182 |                     buffer_size += 256;\n  183 |                 } else {\n  184 |                     buffer_size += bytes_len;\n  185 |                 }\n  186 |             } else {\n  187 |                 // Stop decoding if an unknown error occurs.\n  188 |                 return gjs_throw_type_error_from_gerror(cx, local_error);\n  189 |             }\n  190 |         }\n  191 |     } while (input_len > 0);","lines":76}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gjs_arg_set<Gjs::Tag::Enum>(arg, GI::enum_to_int(value_int64)) in value_to_interface_gi_argument_internal stores an enum value that was validated only by gjs_enum_value_is_valid (membership) or gjs_flags_value_is_valid; for enums the int64 is narrowed to int (v_int) via enum_to_int without an explicit range check that the value fits in the C enum storage. For flags, gjs_flags_value_is_valid only checks the mask when gtype != G_TYPE_NONE; an enum/flags with G_TYPE_NONE bypasses range validation entirely and truncating narrowing occurs silently.","fix":"When gtype == G_TYPE_NONE (no GType to validate against), still bound-check the value against the storage size / known enum members before narrowing, or reject.","locations":[{"ref":"gi/arg.cpp:1396-1413","code":" 1396 |     if (value.isNumber()) {\n 1397 |         if (auto enum_info = interface_info.as<GI::InfoTag::ENUM>()) {\n 1398 |             int64_t value_int64;\n 1399 | \n 1400 |             if (!JS::ToInt64(cx, value, &value_int64))\n 1401 |                 return false;\n 1402 | \n 1403 |             if (interface_info.is_flags()) {\n 1404 |                 if (!gjs_flags_value_is_valid(cx, gtype, value_int64))\n 1405 |                     return false;\n 1406 |             } else {\n 1407 |                 if (!gjs_enum_value_is_valid(cx, enum_info.value(),\n 1408 |                                              value_int64))\n 1409 |                     return false;\n 1410 |             }\n 1411 | \n 1412 |             gjs_arg_set<Gjs::Tag::Enum>(arg, GI::enum_to_int(value_int64));\n 1413 |             return true;","lines":18}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In the SIGPROF handler, `depth` (uint32_t from stack.stackSize()) is used to size an alloca: `alloca(sizeof(SysprofCaptureAddress) * depth)`. The multiplication can overflow size_t on a pathologically deep stack, and even without overflow an unbounded alloca in a signal handler can blow the (signal) stack, causing a crash. There is no cap on depth before the allocation.","fix 3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"BoxedPrototype::create_field_map() ignores the return value of JS_AtomizeAndPinStringN(), which is GJS_JSAPI_RETURN_CONVENTION-equivalent and can return nullptr on OOM. The null atom is then stored as the key via putNewInfallible(). A null key corrupts the field map (later lookups by a real interned atom will never match) and silently loses fields, with no error reported to the caller.","fix":"Check the atom for null after JS_AtomizeAndPinStringN(); on null, call JS_ReportOutOfMemory(cx) and return nullptr from create_field_map().","locations":[{"ref":"gi/boxed.cpp:180-183","code":"  180 |         JSString* atom = JS_AtomizeAndPinStringN(cx, field_name.c_str(),\n  181 |                                                  field_name.length());\n  182 | \n  183 |         result->putNewInfallible(atom, std::move(field_info));","lines":4}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"BoxedPrototype::lookup_field() likewise ignores a possible nullptr from JS_AtomizeAndPinStringN() when the field name differs from the encoded property name. If atomization fails, prop_name becomes nullptr and is passed to m_field_map->lookup(prop_name), which will not match and produces a misleading 'No field' exception instead of an OOM error.","fix":"After JS_AtomizeAndPinStringN(), if the result is null, report OOM and return {}.","locations":[{"ref":"gi/boxed.cpp:222-227","code":"  222 |     if (field_name != encoded_prop_name.get()) {\n  223 |         prop_name = JS_AtomizeAndPinStringN(cx, field_name.c_str(),\n  224 |                                             field_name.length());\n  225 |     }\n  226 | \n  227 |     auto entry = m_field_map->lookup(prop_name);","lines":6}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"BoxedInstance::set_nested_interface blic_context);\n  667 |         }\n  668 |     }","lines":29}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Construct-only properties profiler-enabled and profiler-sigusr2 are applied by gjs_context_set_property() (set_should_profile / set_should_listen_sigusr2) during g_object_new, which runs BEFORE gjs_context_constructed(). But gjs_context_constructed() then does `new (gjs_location) GjsContextPrivate(...)` (context.cpp:514), and the constructor's member-init list does not carry m_should_profile / m_should_listen_sigusr2 forward. Placement-new constructs over the same memory; since those members are not initialized by the constructor they retain whatever was there (the value the setter wrote), so it works only by accident of memory layout/zeroing. The intended values written by the property setters are not robustly preserved across the placement-new.","fix":"Do not store profiler flags in the pre-placement-new private memory. Either read the construct properties from the GObject inside the constructor after placement-new, or pass them into the GjsContextPrivate constructor explicitly, instead of relying on setter writes surviving the placement-new.","locations":[{"ref":"gjs/context.cpp:504-514","code":"  504 | static void gjs_context_constructed(GObject* object) {\n  505 |     GjsContext* self = GJS_CONTEXT(object);\n  506 | \n  507 |     G_OBJECT_CLASS(gjs_context_parent_class)->constructed(object);\n  508 | \n  509 |     GjsContextPrivate* gjs_location = GjsContextPrivate::from_object(object);\n  510 |     JSContext* cx = gjs_create_js_context(gjs_location);\n  511 |     if (!cx)\n  512 |         g_error(\"Failed to create javascript context\");\n  513 | \n  514 |     new (gjs_location) GjsContextPrivate(cx, self);","lines":11},{"ref":"gjs/context.cpp:655-668","code":"  655 |     const char* env_profiler = g_getenv(\"GJS_ENABLE_PROFILER\");\n  656 |     if (env_profiler || m_should_listen_sigusr2)\n  657 |         m_should_profile = true;\n  658 | \n  659 |     if (m_should_profile) {\n  660 |         m_profiler = gjs_profiler_new(public_context);\n  661 | \n  662 |         if (!m_profiler) {\n  663 |             m_should_profile = false;\n  664 |         } else {\n  665 |             if (m_should_listen_sigusr2)\n  666 |                 gjs_profiler_setup_signals(m_profiler, public_context);\n  667 |         }\n  668 |     }","lines":14},{"ref":"gjs/context.cpp:832-837","code":"  832 |         case PROP_PROFILER_ENABLED:\n  833 |             gjs->set_should_profile(g_value_get_boolean(value));\n  834 |             break;\n  835 |         case PROP_PROFILER_SIGUSR2:\n  836 |             gjs->set_should_listen_sigusr2(g_value_get_boolean(value));\n  837 |             break;","lines":6}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"ModuleLoaderPrincipals::subsumes() returns `first == &the_principals || second != &the_principals`. When second != &the_principals it returns true unconditionally regardless of first, meaning a non-internal principal is reported as subsuming (being at least as privileged as) everything. The intended semantics of subsumes(A,B) is 'does A subsume B'. This expression makes any caller whose object's principal is the internal one (second) only subsumable by the internal principal, but for all other second it returns true for any first - effectively granting subsumption broadly. Worth verifying this matches the intended security model rather than being an inverted/over-broad condition.","fix":"Re-derive the intended subsumes semantics. Most likely it should be `first == &the_principals` (only the internal/module-loader principal subsumes others), i.e. drop or correct the `|| second != &the_principals` term.","locations":[{"ref":"gjs/engine.cpp:161-163","code":"  161 |     static bool subsumes(JSPrincipals* first, JSPrincipals* second) {\n  162 |         return first == &the_principals || second != &the_principals;\n  163 |     }","lines":3}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"Off-by-one in gjs_hyphen_to_underscore(). The loop `while (*(s++) != '\\0')` reads the character at the current position to decide whether to continue, but then tests/modifies `*s` AFTER the increment, i.e. the NEXT character. As a result the first character of the string is never examined for a hyphen (a leading '-' is not converted to '_'), and the conversion is effectively shifted by one position relative to the intended semantics. A property/signal name beginning with '-' would not be normalized correctly.","fix":"Iterate cleanly over each character, e.g. `for (char* p = retval.get(); *p; ++p) if (*p == '-') *p = '_';` so every character including the first is checked exactly once.","locations":[{"ref":"gjs/jsapi-util-string.cpp:44-52","code":"   44 | Gjs::AutoChar gjs_hyphen_to_underscore(const char* str) {\n   45 |     char* s = g_strdup(str);\n   46 |     char* retval = s;\n   47 |     while (*(s++) != '\\0') {\n   48 |         if (*s == '-')\n   49 |             *s = '_';\n   50 |     }\n   51 |     return retval;\n   52 | }","lines":9}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gjs_profiler_start() leaks the POSIX timer if it fails partway through. After timer_create() succeeds (line 627), a subsequent timer_settime() failure path calls timer_delete (line 643), but there is no path that deletes the timer if later setup were to fail. More importantly, if timer_settime() succeeds but the function is re-entered or the capture later fails, the timer is only deleted in gjs_profiler_stop(). The asymmetry is that all error-cleanup branches after sigaction unref the capture and destroy periodic_flush, but the installed SIGPROF sigaction handler is never restored/removed on any failure after line 605, leaving a dangling handler referencing a profiler whose capture has been freed.","fix":"On every error-cleanup branch after sigaction() is installed, also reset the SIGPROF disposition (e.g. to SIG_DFL) so a later stray SIGPROF does not invoke the handler against a half-torn-down profiler; and ensure timer_delete is called if the timer was created.","locations":[{"ref":"gjs/profiler.cpp:600-647","code":"  600 |     // Setup our signal handler for SIGPROF delivery\n  601 |     sa.sa_flags = SA_RESTART | SA_SIGINFO;\n  602 |     sa.sa_sigaction = gjs_profiler_sigprof;\n  603 |     sigemptyset(&sa.sa_mask);\n  604 | \n  605 |     if (sigaction(SIGPROF, &sa, nullptr) == -1) {\n  606 |         g_warning(\"Failed to register sigaction handler: %s\",\n  607 |                   g_strerror(errno));\n  608 |         g_clear_pointer(&self->capture, sysprof_capture_writer_unref);\n  609 |         g_clear_pointer(&self->periodic_flush, g_source_destroy);\n  610 |         return;\n  611 |     }\n  612 | \n  613 |     /*\n  614 |      * Create our SIGPROF timer\n  615 |      *\n  616 |      * We want to receive a SIGPROF signal on the JS thread using our configured\n  617 |      * sampling frequency. Instead of allowing any thread to be notified, we set\n  618 |      * the _tid value to ensure that only our thread gets delivery of the\n  619 |      * signal. This feature is generally just for threading implementations, but\n  620 |      * it works for us as well and ensures that the thread is blocked while we\n  621 |      * capture the stack.\n  622 |      */\n  623 |     sev.sigev_notify = SIGEV_THREAD_ID;\n  624 |     sev.sigev_signo = SIGPROF;\n  625 |     sev._sigev_un._tid = syscall(__NR_gettid);\n  626 | \n  627 |     if (timer_create(CLOCK_MONOTONIC, &sev, &self->timer) == -1) {\n  628 |         g_warning(\"Failed to create profiler timer: %s\", g_strerror(errno));\n  629 |         g_clear_pointer(&self->capture, sysprof_capture_writer_unref);\n  630 |         g_clear_pointer(&self->periodic_flush, g_source_destroy);\n  631 |         return;\n  632 |     }\n  633 | \n  634 |     // Calculate sampling interval\n  635 |     its.it_interval.tv_sec = 0;\n  636 |     its.it_interval.tv_nsec = std::chrono::nanoseconds{SAMPLING_PERIOD}.count();\n  637 |     its.it_value.tv_sec = 0;\n  638 |     its.it_value.tv_nsec = std::chrono::nanoseconds{SAMPLING_PERIOD}.count();\n  639 | \n  640 |     // Now start this timer\n  641 |     if (timer_settime(self->timer, 0, &its, &old_its) != 0) {\n  642 |         g_warning(\"Failed to enable profiler timer: %s\", g_strerror(errno));\n  643 |         timer_delete(self->timer);\n  644 |         g_clear_pointer(&self->capture, sysprof_capture_writer_unref);\n  645 |         g_clear_pointer(&self->periodic_flush, g_source_destroy);\n  646 |         return;\n  647 |     }","lines":48}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"PromiseJobDispatcher::Source::dispatch() always returns G_SOURCE_CONTINUE after calling js::RunJobs, but it does not check whether the context is exiting / should stop. If the cancellable is triggered concurrently the child-source mechanism handles detachment, but RunJobs is unconditionally driven on every dispatch even when m_gjs is shutting down. Combined with prepare() returning !m_gjs->empty(), a job that itself enqueues more jobs will keep this highest-priority (-1000) source dispatching, starving all other GSources - this is documented as intentional, but there is no safety valve if RunJobs cannot make progress, risking a live-lock of the main context.","fix":"Consider bounding the number of RunJobs iterations per dispatch or yielding to the main loop periodically; at minimum verify the context is not in should_exit state before draining.","locations":[{"ref":"gjs/promise.cpp:80-93","code":"   80 |     gboolean dispatch() {\n   81 |         if (g_cancellable_is_cancelled(m_cancellable))\n   82 |             return G_SOURCE_REMOVE;\n   83 | \n   84 |         // The ready time is sometimes set to 0 to kick us out of polling,\n   85 |         // we need to reset the value here or this source will always be the\n   86 |         // next one to execute. (it will starve the other sources)\n   87 |         g_source_set_ready_time(this, -1);\n   88 | \n   89 |         // Drain the job queue.\n   90 |         js::RunJobs(m_gjs->context());\n   91 | \n   92 |         return G_SOURCE_CONTINUE;\n   93 |     }","lines":14}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gjs_dbus_implementation_get_properties() emits handle-property-get and unconditionally adds the returned value to the vardict builder without checking for NULL. If a JS handler returns no value (or none is connected, since handle-property-get uses g_signal_accumulator_first_wins and may yield NULL), g_variant_builder_add(&builder, \"{sv}\", prop->name, value) is called with value == NULL, which aborts/crashes inside GVariant. The synchronous property_get path (lines 141-151) explicitly guards against this exact NULL case, but get_properties does not.","fix":"After emitting the signal, skip the property (continue) or substitute a sane default when value is NULL, mirroring the NULL guard in gjs_dbus_implementation_property_get().","locations":[{"ref":"libgjs-private/gjs-gdbus-wrapper.c:237-251","code":"  237 |     for (GDBusPropertyInfo** props = info->properties; *props; ++props) {\n  238 |         GDBusPropertyInfo* prop = *props;\n  239 |         GVariant* value;\n  240 | \n  241 |         /* If we have a cached value, we use that instead of querying again */\n  242 |         if ((value = (GVariant*)g_hash_table_lookup(\n  243 |                  self->outstanding_properties, prop->name))) {\n  244 |             g_variant_builder_add(&builder, \"{sv}\", prop->name, value);\n  245 |             continue;\n  246 |         }\n  247 | \n  248 |         g_signal_emit(self, signals[SIGNAL_HANDLE_PROPERTY_GET], 0, prop->name,\n  249 |                       &value);\n  250 |         g_variant_builder_add(&builder, \"{sv}\", prop->name, value);\n  251 |     }","lines":15}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In _signals.js _emit(), handlers are snapshotted at emission start (handlers = connections.map(...)). A handler connected DURING emission via a 'before' handler will not be invoked in the current emission (correct), but a handler that was disconnected during emission is still in the snapshot and is only skipped via the `if (handler.disconnected) continue` check in _callHandlers. However, _disconnect() also splices the id out of _signalConnectionsByName and deletes _signalConnections[id]; the snapshot `handlers` already holds the object reference so `disconnected` is observed correctly. The real issue: connections.map(id => this._signalConnections[id]) can yield `undefined` entries if an id in the by-name list was already removed from _signalConnections but the splice in the by-name array hasn't happened yet in a nested/re-entrant disconnect, leading to a TypeError on handler.after / handler.disconnected access.","fix":"Filter out undefined entries after the map (handlers = connections.map(...).filter(Boolean)) before partitioning into before/after handlers.","locations":[{"ref":"modules/core/_signals.js:89-121","code":"   89 | function _emit(name, ...args) {\n   90 |     const connections = this._signalConnectionsByName?.[name];\n   91 | \n   92 |     // may not be any signal handlers at all, if not then return\n   93 |     if (!connections)\n   94 |         return;\n   95 | \n   96 |     // To deal with re-entrancy (removal/addition while\n   97 |     // emitting), we copy out a list of what was connected\n   98 |     // at emission start; and just before invoking each\n   99 |     // handler we check its disconnected flag.\n  100 |     const handlers = connections.map(id => this._signalConnections[id]);\n  101 | \n  102 |     // create arg array which is emitter + everything passed in except\n  103 |     // signal name. Would be more convenient not to pass emitter to\n  104 |     // the callback, but trying to be 100% consistent with GObject\n  105 |     // which does pass it in. Also if we pass in the emitter here,\n  106 |     // people don't create closures with the emitter in them,\n  107 |     // which would be a cycle.\n  108 |     const argArray = [this, ...args];\n  109 | \n  110 |     const afterHandlers = [];\n  111 |     const beforeHandlers = handlers.filter(c => {\n  112 |         if (!c.after)\n  113 |             return true;\n  114 | \n  115 |         afterHandlers.push(c);\n  116 |         return false;\n  117 |     });\n  118 | \n  119 |     if (!_callHandlers(beforeHandlers, argArray))\n  120 |         _callHandlers(afterHandlers, argArray);\n  121 | }","lines":33}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"_timers.js setTimeout/setInterval call import.meta.importSync('_promiseNative').drainMicrotaskQueue() AFTER invoking boundCallback(). If boundCallback() throws, drainMicrotaskQueue() is never reached, so pending microtasks (promise continuations) scheduled before the throw are left undrained until the next event-loop turn, and the source for setTimeout is also never released (releaseSource on line 73 is also skipped on throw), leaking the entry in the timeouts Map. There is no try/finally around the callback.","fix":"Wrap boundCallback() in try/finally so releaseSource() (for setTimeout) and drainMicrotaskQueue() always run even when the callback throws.","locations":[{"ref":"modules/esm/_timers.js:68-77","code":"   68 |     const source = createTimeoutSource(delay, () => {\n   69 |         if (!timeouts.has(source))\n   70 |             return imports.gi.GLib.SOURCE_REMOVE;\n   71 | \n   72 |         boundCallback();\n   73 |         releaseSource(source);\n   74 |         import.meta.importSync('_promiseNative').drainMicrotaskQueue();\n   75 | \n   76 |         return imports.gi.GLib.SOURCE_REMOVE;\n   77 |     });","lines":10},{"ref":"modules/esm/_timers.js:94-102","code":"   94 |     const source = createTimeoutSource(delay, () => {\n   95 |         if (!timeouts.has(source))\n   96 |             return imports.gi.GLib.SOURCE_REMOVE;\n   97 | \n   98 |         boundCallback();\n   99 |         import.meta.importSync('_promiseNative').drainMicrotaskQueue();\n  100 | \n  101 |         return imports.gi.GLib.SOURCE_CONTINUE;\n  102 |     });","lines":9}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"moduleResolveAsyncHook() looks up an already-loaded module by the raw specifier first (registry.get(specifier)) before resolving it to a URI. The synchronous resolveModule() does the same. However the async path stores compiled modules only under uri.uriWithQuery (line 240), never under the bare specifier, whereas the registry-by-specifier check exists to short-circuit. For a bare specifier resolved to an internal URI, a second concurrent import with the same specifier will pass the first `registry.get(specifier)` (miss), re-resolve, then both await loadURIAsync and the later one is caught by the post-await `registry.get(uri.uriWithQuery)` check - but only the URI form is ever populated, so the initial specifier-keyed fast path is effectively dead for async-loaded modules and every async import re-resolves the specifier.","fix":"Either also register the compiled module under the original specifier when appropriate, or drop the misleading specifier-keyed lookup; document that the URI form is the canonical cache key.","locations":[{"ref":"modules/internal/loader.js:211-244","code":"  211 |     async moduleResolveAsyncHook(importingModulePriv, specifier) {\n  212 |         const registry = getRegistry(this.global);\n
