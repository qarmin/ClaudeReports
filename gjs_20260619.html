totype<Base, Prototype, Instance>::create_field_map(\n  167 |     JSContext* cx, const BoxedInfo& info) {\n  168 |     auto result = std::make_unique<Boxed::FieldMap>();\n  169 |     typename BoxedInfo::FieldsIterator fields = info.fields();\n  170 |     if (!result->reserve(fields.size())) {\n  171 |         JS_ReportOutOfMemory(cx);\n  172 |         return nullptr;\n  173 |     }\n  174 | \n  175 |     for (GI::AutoFieldInfo field_info : fields) {\n  176 |         // We get the string as a jsid later, which is interned. We intern the\n  177 |         // string here as well, so it will be the same string pointer\n  178 |         const std::string& field_name =\n  179 |             find_unique_js_field_name(info, field_info.name());\n  180 |         JSString* atom = JS_AtomizeAndPinStringN(cx, field_name.c_str(),\n  181 |                                                  field_name.length());\n  182 | \n  183 |         result->putNewInfallible(atom, std::move(field_info));\n  184 |     }\n  185 | \n  186 |     return result;\n  187 | }","lines":24},{"ref":"gi/boxed.cpp:210-235","code":"  210 | template <class Base, class Prototype, class Instance>\n  211 | Maybe<const GI::FieldInfo>\n  212 | BoxedPrototype<Base, Prototype, Instance>::lookup_field(JSContext* cx,\n  213 |                                                         JSString* prop_name) {\n  214 |     if (!ensure_field_map(cx))\n  215 |         return {};\n  216 | \n  217 |     JS::RootedString rooted_name(cx, prop_name);\n  218 |     JS::UniqueChars encoded_prop_name = JS_EncodeStringToUTF8(cx, rooted_name);\n  219 |     const std::string field_name{\n  220 |         find_unique_js_field_name(info(), encoded_prop_name.get())};\n  221 | \n  222 |     if (field_name != encoded_prop_name.get()) {\n  223 |         prop_name = JS_AtomizeAndPinStringN(cx, field_name.c_str(),\n  224 |                                             field_name.length());\n  225 |     }\n  226 | \n  227 |     auto entry = m_field_map->lookup(prop_name);\n  228 |     if (!entry) {\n  229 |         gjs_throw(cx, \"No field %s on boxed type %s\",\n  230 |                   gjs_debug_string(prop_name).c_str(), name());\n  231 |         return {};\n  232 |     }\n  233 | \n  234 |     return Some(entry->value());\n  235 | }","lines":26}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"gjs_struct_foreign_lookup() builds a StructID = std::pair<std::string,std::string> from info.ns()/info.name() on every conversion, allocating two std::strings per call, and StructIDHash combines hashes with XOR (poor distribution; symmetric collisions for swapped ns/name). Foreign-struct conversions (e.g. cairo) hit this on each marshalling.","fix":"Use a transparent/string_view-keyed lookup to avoid allocations, and combine the two hashes with a proper mixing function (e.g. boost-style hash_combine) instead of XOR.","locations":[{"ref":"gi/foreign.cpp:30-37","code":"   30 | using StructID = std::pair<std::string, std::string>;\n   31 | struct StructIDHash {\n   32 |     [[nodiscard]]\n   33 |     size_t operator()(const StructID& val) const {\n   34 |         std::hash<std::string> hasher;\n   35 |         return hasher(val.first) ^ hasher(val.second);\n   36 |     }\n   37 | };","lines":8},{"ref":"gi/foreign.cpp:70-87","code":"   70 | GJS_JSAPI_RETURN_CONVENTION\n   71 | static GjsForeignInfo* gjs_struct_foreign_lookup(JSContext* cx,\n   72 |                                                  const GI::StructInfo& info) {\n   73 |     StructID key{info.ns(), info.name()};\n   74 |     auto entry = foreign_structs_table.find(key);\n   75 |     if (entry == foreign_structs_table.end()) {\n   76 |         if (gjs_foreign_load_foreign_module(cx, info.ns()))\n   77 |             entry = foreign_structs_table.find(key);\n   78 |     }\n   79 | \n   80 |     if (entry == foreign_structs_table.end()) {\n   81 |         gjs_throw(cx, \"Unable to find module implementing foreign type %s.%s\",\n   82 |                   key.first.c_str(), key.second.c_str());\n   83 |         return nullptr;\n   84 |     }\n   85 | \n   86 |     return entry->second;\n   87 | }","lines":18}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Function::invoke() allocates a fresh void*[] (ffi_arg_pointers) via make_unique on every single C-function call. This is in the hottest path of the bindings (every native call from JS). For typical small arg counts this heap allocation dominates marshalling overhead.","fix":"Use a small-size-optimized stack buffer (e.g. a fixed-size array sized to Argument::MAX_ARGS, falling back to heap only for unusually large signatures) since ffi_argc is bounded by MAX_ARGS + a few extra slots.","locations":[{"ref":"gi/function.cpp:913","code":"  913 |     auto ffi_arg_pointers = std::make_unique<void*[]>(ffi_argc);","lines":1}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"interface_setter() atomizes a fresh string ('Private interface function setter') and creates a brand-new JS Symbol on every single property set through an interface-proxied accessor, then stores it under atoms.override(). This runs in a hot path (every set of a monkeypatchable interface method/property) and allocates per call. The description string at least could be cached/atomized once.","fix":"Hoist the atomized description (or the symbol description) into a GjsAtoms entry or a static, and avoid re-atomizing the constant string on each setter invocation.","locations":[{"ref":"gi/object.cpp:1631-1652","code":" 1631 | static bool interface_setter(JSContext* cx, unsigned argc, JS::Value* vp) {\n 1632 |     JS::CallArgs args = JS::CallArgsFromVp(argc, vp);\n 1633 |     JS::RootedValue v_accessor(\n 1634 |         cx, js::GetFunctionNativeReserved(&args.callee(), ACCESSOR_SLOT));\n 1635 |     JS::RootedObject accessor(cx, &v_accessor.toObject());\n 1636 |     JS::RootedString description(\n 1637 |         cx, JS_AtomizeAndPinString(cx, \"Private interface function setter\"));\n 1638 |     JS::RootedSymbol symbol(cx, JS::NewSymbol(cx, description));\n 1639 |     JS::RootedValue v_symbol(cx, JS::SymbolValue(symbol));\n 1640 | \n 1641 |     const GjsAtoms& atoms = GjsContextPrivate::atoms(cx);\n 1642 |     if (!JS_SetPropertyById(cx, accessor, atoms.override(), v_symbol))\n 1643 |         return false;\n 1644 | \n 1645 |     args.rval().setUndefined();\n 1646 | \n 1647 |     JS::RootedObject this_obj(cx);\n 1648 |     if (!args.computeThis(cx, &this_obj))\n 1649 |         return false;\n 1650 |     JS::RootedId override_id(cx, JS::PropertyKey::Symbol(symbol));\n 1651 | \n 1652 |     return JS_SetPropertyById(cx, this_obj, override_id, args[0]);","lines":22}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"do_import() and importer_new_enumerate() repeatedly stat/query the filesystem per search-path element using separate calls: import_symbol_from_init_js() loads/parses __init__.js, then g_file_query_file_type() for the directory case, then g_file_query_exists() plus a load for the file case. Each __init__.js is re-loaded and re-evaluated through load_module_init on every resolve of a different symbol in the same directory (the result is cached as a property, mitigating this somewhat, but query_file_type + query_exists are independent stat round-trips that could be merged via a single g_file_query_info call retrieving the file type).","fix":"Fetch file type once with g_file_query_info(standard::type) and branch on the result, avoiding the separate query_file_type and query_exists round-trips.","locations":[{"ref":"gjs/importer.cpp:510-550","code":"  510 |         Gjs::AutoUnref<GFile> directory{\n  511 |             g_file_new_for_commandline_arg(dirname.get())};\n  512 | \n  513 |         // Try importing __init__.js and loading the symbol from it\n  514 |         bool found = false;\n  515 |         if (!import_symbol_from_init_js(cx, obj, directory, name.get(), &found))\n  516 |             return false;\n  517 |         if (found)\n  518 |             return true;\n  519 | \n  520 |         // Second try importing a directory (a sub-importer)\n  521 |         Gjs::AutoUnref<GFile> file{g_file_get_child(directory, name.get())};\n  522 | \n  523 |         if (g_file_query_file_type(file, GFileQueryInfoFlags(0), nullptr) ==\n  524 |             G_FILE_TYPE_DIRECTORY) {\n  525 |             Gjs::AutoChar full_path{g_file_get_parse_name(file)};\n  526 |             gjs_debug(GJS_DEBUG_IMPORTER,\n  527 |                       \"Adding directory '%s' to child importer '%s'\",\n  528 |                       full_path.get(), name.get());\n  529 |             directories.emplace_back(full_path.get());\n  530 |         }\n  531 | \n  532 |         /* If we just added to directories, we know we don't need to check for a\n  533 |          * file.  If we added to directories on an earlier iteration, we want to\n  534 |          * ignore any files later in the path. So, always skip the rest of the\n  535 |          * loop block if we have directories.\n  536 |          */\n  537 |         if (!directories.empty())\n  538 |             continue;\n  539 | \n  540 |         // Third, if it's not a directory, try importing a file\n  541 |         file = g_file_get_child(directory, filename.get());\n  542 |         bool exists = g_file_query_exists(file, nullptr);\n  543 | \n  544 |         if (!exists) {\n  545 |             Gjs::AutoChar full_path{g_file_get_parse_name(file)};\n  546 |             gjs_debug(GJS_DEBUG_IMPORTER,\n  547 |                       \"JS import '%s' not found in %s at %s\", name.get(),\n  548 |                       dirname.get(), full_path.get());\n  549 |             continue;\n  550 |         }","lines":41}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"gjs_lossy_string_from_utf8 / gjs_lossy_string_from_utf8_n perform a double allocation+copy: LossyUTF8CharsToNewTwoByteCharsZ allocates a fresh UTF-16 buffer, then JS_NewUCStringCopyN copies it again into a JS string and the first buffer is freed. For large strings on the lossy decode path (the default toString path for byte arrays) this doubles transient memory and copy cost.","fix":"If SpiderMonkey exposes an adopt-style constructor (e.g. JS_NewUCString that takes ownership of a JS-engine-allocated buffer), hand the allocated twobyte_chars buffer directly to the engine instead of copying.","locations":[{"ref":"gjs/jsapi-util-string.cpp:148-184","code":"  148 | JSString* gjs_lossy_string_from_utf8(JSContext* cx, const char* utf8_string) {\n  149 |     JS::UTF8Chars chars{utf8_string, strlen(utf8_string)};\n  150 |     size_t outlen;\n  151 |     JS::UniqueTwoByteChars twobyte_chars(\n  152 |         JS::LossyUTF8CharsToNewTwoByteCharsZ(cx, chars, &outlen,\n  153 |                                              js::MallocArena)\n  154 |             .get());\n  155 |     if (!twobyte_chars)\n  156 |         return nullptr;\n  157 | \n  158 |     return JS_NewUCStringCopyN(cx, twobyte_chars.get(), outlen);\n  159 | }\n  160 | \n  161 | /**\n  162 |  * gjs_lossy_string_from_utf8_n:\n  163 |  * @cx: the current #JSContext\n  164 |  * @utf8_string: an array of UTF-8 characters to decode\n  165 |  * @len: length of @utf8_string\n  166 |  *\n  167 |  * Provides the same conversion behavior as gjs_lossy_string_from_utf8\n  168 |  * with a fixed length. See gjs_lossy_string_from_utf8().\n  169 |  *\n  170 |  * Returns: The decoded string.\n  171 |  */\n  172 | JSString* gjs_lossy_string_from_utf8_n(JSContext* cx, const char* utf8_string,\n  173 |                                        size_t len) {\n  174 |     JS::UTF8Chars chars(utf8_string, len);\n  175 |     size_t outlen;\n  176 |     JS::UniqueTwoByteChars twobyte_chars(\n  177 |         JS::LossyUTF8CharsToNewTwoByteCharsZ(cx, chars, &outlen,\n  178 |                                              js::MallocArena)\n  179 |             .get());\n  180 |     if (!twobyte_chars)\n  181 |         return nullptr;\n  182 | \n  183 |     return JS_NewUCStringCopyN(cx, twobyte_chars.get(), outlen);\n  184 | }","lines":37}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"CairoPath::copy_ptr implements path duplication by creating a throwaway 0x0 ARGB32 image surface and a cairo_t, appending the path, copying it back, then destroying both. This is the documented PyGObject workaround for the lack of a cairo path-copy API, but it allocates a surface and context on every transfer-everything marshalling of a Path (e.g. passing a Path to a GI function with GI_TRANSFER_EVERYTHING). For paths copied frequently this is heavyweight.","fix":"Acceptable given cairo offers no public deep-copy of cairo_path_t; if this shows up in profiles, cache a shared scratch context, or deep-copy the cairo_path_data_t array manually.","locations":[{"ref":"modules/cairo-path.cpp:120-131","code":"  120 | // Adapted from PyGObject cairo code\n  121 | cairo_path_t* CairoPath::copy_ptr(cairo_path_t* path) {\n  122 |     cairo_surface_t* surface =\n  123 |         cairo_image_surface_create(CAIRO_FORMAT_ARGB32, 0, 0);\n  124 |     cairo_t* cr = cairo_create(surface);\n  125 |     cairo_append_path(cr, path);\n  126 |     cairo_path_t* copy = cairo_copy_path(cr);\n  127 |     cairo_destroy(cr);\n  128 |     cairo_surface_destroy(surface);\n  129 | \n  130 |     return copy;\n  131 | }","lines":12}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In ErrorPrototype::get_parent_proto() and find_error_domain_info(), repo.require(\"GLib\"/\"GObject\"/\"Gio\", ...) is called on every invocation. get_parent_proto() runs once per error-domain class definition and object_for_c_ptr()/find_error_domain_info() runs for every GError-to-JS conversion that lacks cached domain info. gi_repository_require is reasonably cheap once loaded, but the repeated require(\"GLib\")/require(\"GObject\")/require(\"Gio\") on the no-metadata path adds avoidable overhead to error marshalling.","fix":"These typelibs are guaranteed loaded at startup; the extra require() calls in find_error_domain_info() could be dropped (or done once) since the namespaces are already registered by the time errors are marshalled.","locations":[{"ref":"gi/gerror.cpp:222-232","code":"  222 | bool ErrorPrototype::get_parent_proto(JSContext* cx,\n  223 |                                       JS::MutableHandleObject proto) {\n  224 |     GI::Repository repo{};\n  225 |     repo.require(\"GLib\", \"2.0\").unwrap();\n  226 | \n  227 |     GI::AutoBaseInfo glib_error_info{\n  228 |         repo.find_by_name(\"GLib\", \"Error\").value()};\n  229 | \n  230 |     proto.set(gjs_lookup_generic_prototype(cx, glib_error_info));\n  231 |     return !!proto;\n  232 | }","lines":11},{"ref":"gi/gerror.cpp:251-270","code":"  251 | [[nodiscard]]\n  252 | static Maybe<const GI::EnumInfo> find_error_domain_info(\n  253 |     const GI::Repository& repo, GQuark domain) {\n  254 |     // first an attempt without loading extra libraries\n  255 |     Maybe<GI::AutoEnumInfo> info = repo.find_by_error_domain(domain);\n  256 |     if (info)\n  257 |         return info;\n  258 | \n  259 |     // load standard stuff\n  260 |     repo.require(\"GLib\", \"2.0\").unwrap();\n  261 |     repo.require(\"GObject\", \"2.0\").unwrap();\n  262 |     repo.require(\"Gio\", \"2.0\").unwrap();\n  263 |     info = repo.find_by_error_domain(domain);\n  264 |     if (info)\n  265 |         return info;\n  266 | \n  267 |     // last attempt: load GIRepository (for invoke errors, rarely needed)\n  268 |     repo.require(\"GIRepository\", \"3.0\").unwrap();\n  269 |     return repo.find_by_error_domain(domain);\n  270 | }","lines":20}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In emit_impl(), inside the per-parameter loop, the code re-fetches the signal info via ObjectBase::info()->signal(signal_query.signal_name) on every iteration (once per signal parameter) to obtain transfer ownership for each arg. The signal lookup is invariant across the loop and could be hoisted out, fetching the GI::AutoSignalInfo once before the loop.","fix":"Move the info()->signal(...) lookup above the for loop and reuse the resulting Maybe<GI::AutoSignalInfo> for each arg's ownership_transfer() check.","locations":[{"ref":"gi/object.cpp:3106-3120","code":" 3106 |         if (!ObjectBase::info())\n 3107 |             continue;\n 3108 | \n 3109 |         Maybe<GI::AutoSignalInfo> signal_info =\n 3110 |             ObjectBase::info()->signal(signal_query.signal_name);\n 3111 |         if (!signal_info)\n 3112 |             continue;\n 3113 | \n 3114 |         GI::AutoArgInfo arg_info{signal_info->arg(i)};\n 3115 |         if (arg_info.ownership_transfer() != GI_TRANSFER_NOTHING) {\n 3116 |             // FIXME(3v1n0): As it happens in many places in gjs, we can't track\n 3117 |             // (yet) containers content, so in case of transfer container we\n 3118 |             // can only leak.\n 3119 |             args_to_steal.push_back(&value);\n 3120 |         }","lines":15}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"Closure::marshal() evaluates gjs->is_owner_thread() twice: once in the short-circuit condition and again inside the if-branch to choose the message. The call is cheap but redundant.","fix":"Cache the result of is_owner_thread() in a local bool before the condition and reuse it.","locations":[{"ref":"gi/value.cpp:242-246","code":"  242 |     if (G_UNLIKELY(!gjs->is_owner_thread()) || JS::RuntimeHeapIsCollecting()) {\n  243 |         auto* hint = static_cast<GSignalInvocationHint*>(invocation_hint);\n  244 |         std::ostringstream message;\n  245 | \n  246 |         if (!gjs->is_owner_thread()) {","lines":5}]},{"id":"PERF_13","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"filename_has_coverage_prefixes calls g_get_current_dir() and g_canonicalize_filename() for the working dir on every invocation, and re-canonicalizes every prefix on every call. Since this runs once per SF: record while writing lcov statistics, the prefixes (and workdir) could be canonicalized once up front rather than O(files * prefixes) times.","fix":"Canonicalize the workdir and prefixes once (e.g. cache them) before the lcov loop, then only canonicalize the per-file filename inside the loop.","locations":[{"ref":"gjs/coverage.cpp:162-176","code":"  162 | [[nodiscard]]\n  163 | static bool filename_has_coverage_prefixes(GjsCoverage* self,\n  164 |                                            const char* filename) {\n  165 |     auto* priv = static_cast<GjsCoveragePrivate*>(\n  166 |         gjs_coverage_get_instance_private(self));\n  167 |     Gjs::AutoChar workdir{g_get_current_dir()};\n  168 |     Gjs::AutoChar abs_filename{g_canonicalize_filename(filename, workdir)};\n  169 | \n  170 |     for (const char* const* prefix = priv->prefixes; *prefix; prefix++) {\n  171 |         Gjs::AutoChar abs_prefix{g_canonicalize_filename(*prefix, workdir)};\n  172 |         if (g_str_has_prefix(abs_filename, abs_prefix))\n  173 |             return true;\n  174 |     }\n  175 |     return false;\n  176 | }","lines":15}]},{"id":"PERF_14","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"gjs_load_internal_source() computes `filename + 11` with the comment `len(\"resource://\")`, but \"resource://\" is 11 characters so the value is correct; however the literal 11 is a magic number duplicated from the string and could silently break if the scheme prefix used by callers changes. The callers pass URIs like 'resource:///org/gnome/...'. Minor maintainability hazard, not a live bug.","fix":"Replace the hardcoded 11 with `strlen(\"resource://\")` or skip past a named constant to keep the offset in sync with the scheme string.","locations":[{"ref":"gjs/engine.cpp:80-91","code":"   80 | bool gjs_load_internal_source(JSContext* cx, const char* filename, char** src,\n   81 |                               size_t* length) {\n   82 |     Gjs::AutoError error;\n   83 |     const char* path = filename + 11;  // len(\"resource://\")\n   84 |     GBytes* script_bytes =\n   85 |         g_resources_lookup_data(path, G_RESOURCE_LOOKUP_FLAGS_NONE, &error);\n   86 |     if (!script_bytes)\n   87 |         return gjs_throw_gerror_message(cx, error);\n   88 | \n   89 |     *src = static_cast<char*>(g_bytes_unref_to_data(script_bytes, length));\n   90 |     return true;\n   91 | }","lines":12}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"gjs_memory_report() loads each counter's atomic value multiple times: once summing into total_objects (counters[i]->value, which reads .value implicitly) and again in the per-counter debug print (counters[i]->value.load()). Minor, but under a debug build that calls this frequently the redundant atomic loads and the separate GJS_GET_COUNTER(everything) loads add up; more importantly total_objects is compared to GJS_GET_COUNTER(everything) without any synchronization, so in a multithreaded scenario the 'counts don't add up' warning can spuriously fire.","fix":"Snapshot each counter once into a local; acknowledge the inherent raciness or take a lock if counters can change concurrently during the report.","locations":[{"ref":"gjs/mem.cpp:43-64","code":"   43 |     int64_t total_objects = 0;\n   44 |     for (size_t i = 0; i < n_counters; ++i) {\n   45 |         total_objects += counters[i]->value;\n   46 |     }\n   47 | \n   48 |     if (total_objects != GJS_GET_COUNTER(everything)) {\n   49 |         gjs_debug(GJS_DEBUG_MEMORY,\n   50 |                   \"Object counts don't add up!\");\n   51 |     }\n   52 | \n   53 |     gjs_debug(GJS_DEBUG_MEMORY, \"  %\" PRId64 \" objects currently alive\",\n   54 |               GJS_GET_COUNTER(everything));\n   55 | \n   56 |     if (GJS_GET_COUNTER(everything) != 0) {\n   57 |         for (size_t i = 0; i < n_counters; ++i) {\n   58 |             gjs_debug(GJS_DEBUG_MEMORY, \"    %24s = %\" PRId64,\n   59 |                       counters[i]->name, counters[i]->value.load());\n   60 |         }\n   61 | \n   62 |         if (die_if_leaks)\n   63 |             g_error(\"%s: JavaScript objects were leaked.\", where);\n   64 |     }","lines":22}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"is_utf8_label() is called on every encode/decode and, on the non-trivial path (label not exactly 'utf-8'/'utf8'), it g_strdup()s the whole encoding string just to g_strstrip() and compare. For the common 'UTF-8' (uppercase) or whitespace-padded labels this is an allocation per call on a hot conversion path.","fix":"Strip leading/trailing whitespace by pointer/length arithmetic without duplicating the string, then case-insensitively compare against the two literals.","locations":[{"ref":"gjs/text-encoding.cpp:233-249","code":"  233 | [[nodiscard]]\n  234 | static bool is_utf8_label(const char* encoding) {\n  235 |     // We could be smarter about utf8 synonyms here.\n  236 |     // For now, we handle any casing and trailing/leading\n  237 |     // whitespace.\n  238 |     //\n  239 |     // is_utf8_label is only an optimization, so if a label\n  240 |     // doesn't match we just use the slower path.\n  241 |     if (g_ascii_strcasecmp(encoding, \"utf-8\") == 0 ||\n  242 |         g_ascii_strcasecmp(encoding, \"utf8\") == 0)\n  243 |         return true;\n  244 | \n  245 |     Gjs::AutoChar stripped{g_strdup(encoding)};\n  246 |     g_strstrip(stripped);  // modifies in place\n  247 |     return g_ascii_strcasecmp(stripped, \"utf-8\") == 0 ||\n  248 |            g_ascii_strcasecmp(stripped, \"utf8\") == 0;\n  249 | }","lines":17}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"console.js builds the global console by binding every Console.prototype method to the singleton and freezing the object at module load. formatOptimally() calls imports.gi.GLib on every invocation (line 43) and #printer calls imports.gi.GLib on every print (line 507); these imports.gi.GLib property lookups happen per-call rather than being hoisted to module scope, adding overhead to every console call on a hot logging path.","fix":"Cache GLib once at module top-level (const GLib = imports.gi.GLib) and reference it, as other modules in this slice (mainloop.js, _gettext.js) already do.","locations":[{"ref":"modules/esm/console.js:43","code":"   43 |     const GLib = imports.gi.GLib;","lines":1},{"ref":"modules/esm/console.js:507","code":"  507 |         const GLib = imports.gi.GLib;","lines":1}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"set_main_loop_hook() asserts `JS::IsCallable(callable)` at the top, which dereferences/uses callable and requires it to be non-null and callable. The subsequent `if (!callable) { m_main_loop_hook = nullptr; return true; }` branch is therefore dead code: a null callable would already have tripped the assertion (and IsCallable(nullptr) is itself invalid). The null-clearing path can never be reached.","fix":"Either remove the dead `if (!callable)` block, or move the null check before the assertion if clearing the hook via nullptr is a supported use case.","locations":[{"ref":"gjs/context.cpp:1381-1394","code":" 1381 | bool GjsContextPrivate::set_main_loop_hook(JSObject* callable) {\n 1382 |     g_assert(JS::IsCallable(callable) &&\n 1383 |              \"main loop hook must be a callable object\");\n 1384 | \n 1385 |     if (!callable) {\n 1386 |         m_main_loop_hook = nullptr;\n 1387 |         return true;\n 1388 |     }\n 1389 | \n 1390 |     if (m_main_loop_hook)\n 1391 |         return false;\n 1392 | \n 1393 |     m_main_loop_hook = callable;\n 1394 |     return true;","lines":14}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"importer_resolve() checks 'if (!id.isString())' twice with identical bodies. The second check at line 707 is unreachable as a positive branch because the first check at line 692 already returned for non-string ids, and nothing between them can change id. The second block is pure dead code.","fix":"Remove the duplicate 'if (!id.isString())' block at lines 707-710.","locations":[{"ref":"gjs/importer.cpp:692-695","code":"  692 |     if (!id.isString()) {\n  693 |         *resolved = false;\n  694 |         return true;\n  695 |     }","lines":4},{"ref":"gjs/importer.cpp:707-710","code":"  707 |     if (!id.isString()) {\n  708 |         *resolved = false;\n  709 |         return true;\n  710 |     }","lines":4}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"encoded_stack_str is computed via g_filename_from_utf8() and null-checked, but the code then prints stack_str.get() (the un-encoded UTF-8 string) instead of encoded_stack_str. The filename-encoding conversion is entirely wasted, and the intent (printing the locale/filename-encoded stack) is silently not honored.","fix":"Print encoded_stack_str in the else branch: g_printerr(\"%s\", encoded_stack_str.get()); (or drop the conversion if UTF-8 output is actually intended).","locations":[{"ref":"modules/console.cpp:105-110","code":"  105 |                 Gjs::AutoChar encoded_stack_str{g_filename_from_utf8(\n  106 |                     stack_str.get(), -1, nullptr, nullptr, nullptr)};\n  107 |                 if (!encoded_stack_str)\n  108 |                     g_printerr(\"(Unable to print stack trace)\\n\");\n  109 |                 else\n  110 |                     g_printerr(\"%s\", stack_str.get());","lines":6}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In callback_closure_inner(), the switch over param_type lists PARAM_CALLBACK and PARAM_UNKNOWN with explanatory comments, both falling through to g_assert_not_reached(). The comments confirm these are never set for callback args, so the cases are effectively dead but intentionally kept as guards; flagged for completeness as unreachable branches.","fix":"Acceptable as defensive code; no change needed, or collapse into the default g_assert_not_reached().","locations":[{"ref":"gi/function.cpp:502-508","code":"  502 |             case PARAM_CALLBACK:\n  503 |                 /* Callbacks that accept another callback as a parameter are not\n  504 |                  * supported, see gjs_callback_trampoline_new() */\n  505 |             case PARAM_UNKNOWN:\n  506 |                 // PARAM_UNKNOWN is currently not ever set on a callback's args.\n  507 |             default:\n  508 |                 g_assert_not_reached();","lines":7}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"Redundant null check in gjs_string_to_ucs4. The function returns early at the top when `ucs4_string_p == nullptr` (lines 319-320), so by line 340 ucs4_string_p is guaranteed non-null; the `if (ucs4_string_p != nullptr)` guard is dead and always true. Also `size_t len;` and `Gjs::AutoError error;` declared at the top are unused on the Latin-1 early-return path.","fix":"Drop the redundant `if (ucs4_string_p != nullptr)` wrapper and rely on the early return; declare `len`/`error` only in the two-byte branch.","locations":[{"ref":"gjs/jsapi-util-string.cpp:317-352","code":"  317 | bool gjs_string_to_ucs4(JSContext* cx, JS::HandleString str,\n  318 |                         gunichar** ucs4_string_p, size_t* len_p) {\n  319 |     if (ucs4_string_p == nullptr)\n  320 |         return true;\n  321 | \n  322 |     size_t len;\n  323 |     Gjs::AutoError error;\n  324 | \n  325 |     if (JS::StringHasLatin1Chars(str))\n  326 |         return from_latin1(cx, str, ucs4_string_p, len_p);\n  327 | \n  328 |     /* From this point on, crash if a GC is triggered while we are using the\n  329 |      * string's chars */\n  330 |     JS::AutoCheckCannotGC nogc;\n  331 | \n  332 |     const char16_t* utf16 =\n  333 |         JS_GetTwoByteStringCharsAndLength(cx, nogc, str, &len);\n  334 | \n  335 |     if (utf16 == nullptr) {\n  336 |         gjs_throw(cx, \"Failed to get UTF-16 string data\");\n  337 |         return false;\n  338 |     }\n  339 | \n  340 |     if (ucs4_string_p != nullptr) {\n  341 |         long length;\n  342 |         *ucs4_string_p =\n  343 |             g_utf16_to_ucs4(reinterpret_cast<const gunichar2*>(utf16), len,\n  344 |                             nullptr, &length, &error);\n  345 |         if (*ucs4_string_p == nullptr) {\n  346 |             gjs_throw(cx, \"Failed to convert UTF-16 string to UCS-4: %s\",\n  347 |                       error->message);\n  348 |             return false;\n  349 |         }\n  350 |         if (len_p != nullptr)\n  351 |             *len_p = static_cast<size_t>(length);\n  352 |     }","lines":36}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In gjs_profiler_add_mark the non-profiler branch does `(void)time; (void)duration; (void)message;` but omits `(void)group` and `(void)name`. Those two parameters are checked by g_return_if_fail above (which is compiled in regardless of ENABLE_PROFILER), so they are technically used; however this is inconsistent with the other (void) casts and relies on the g_return_if_fail not being compiled out (it is removed with G_DISABLE_CHECKS), which would then make group/name unused in a no-profiler + G_DISABLE_CHECKS build.","fix":"For consistency and to be safe under G_DISABLE_CHECKS, also cast (void)group and (void)name in the non-profiler branch, or mark the parameters [[maybe_unused]].","locations":[{"ref":"gjs/profiler.cpp:870-875","code":"  870 | #else\n  871 |     // Unused in the no-profiler case\n  872 |     (void)time;\n  873 |     (void)duration;\n  874 |     (void)message;\n  875 | #endif","lines":6}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"gjs_match_info_free() is documented as accepting a NULL self (annotation `@self: (nullable)`), but the first statement is g_return_if_fail(self != NULL), which logs a critical warning and returns for NULL. The subsequent `if (self == NULL) return;` is therefore unreachable dead code, and the function does not actually honor its nullable contract.","fix":"If NULL is meant to be allowed, drop the g_return_if_fail and keep the NULL check; otherwise remove the redundant NULL check and fix the (nullable) annotation.","locations":[{"ref":"libgjs-private/gjs-match-info.c:98-104","code":"   98 | void gjs_match_info_free(GjsMatchInfo* self) {\n   99 |     g_return_if_fail(self != NULL);\n  100 |     if (self == NULL)\n  101 |         return;\n  102 | \n  103 |     gjs_match_info_unref(self);\n  104 | }","lines":7}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"gjs_cairo_pdf_surface_proto_props is defined at file scope but never referenced anywhere (the class_spec uses CairoSurface::proto_props instead). It is pure dead code (and the symptom of the copy-paste bug reported separately).","fix":"Remove it, or (preferred) wire it up as CairoPDFSurface::proto_props in the class_spec.","locations":[{"ref":"modules/cairo-pdf-surface.cpp:54-58","code":"   54 | // clang-format off\n   55 | JSPropertySpec gjs_cairo_pdf_surface_proto_props[] = {\n   56 |     JS_STRING_SYM_PS(toStringTag, \"PDFSurface\", JSPROP_READONLY),\n   57 |     JS_PS_END};\n   58 | // clang-format on","lines":5}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"In load_async_executor(), the GFile is taken out of the reserved slot into Gjs::AutoUnref<GFile> file (consuming the ref stashed via file.copy() in the caller), then passed to g_file_load_contents_async, and the AutoUnref drops that ref at scope exit. This is actually balanced because g_file_load_contents_async takes its own ref on the GFile for the async operation's lifetime. However the comment 'We now own the GFile, and will pass the reference to the GAsyncResult' is misleading: the executor's reference is NOT passed to the async call - it is dropped by the AutoUnref, and the async machinery relies on GIO's own internal ref. The comment should not be read as 'do not unref here', which a future maintainer might believe and then break the balance.","fix":"Clarify the comment: the AutoUnref owns the reference taken out of the slot and releases it on return; g_file_load_contents_async holds its own reference for the duration of the async load.","locations":[{"ref":"gjs/internal.cpp:601-612","code":"  601 |     Gjs::AutoUnref<GFile> file{G_FILE(priv_value.toPrivate())};\n  602 |     g_assert(file && \"Executor called twice\");\n  603 |     // We now own the GFile, and will pass the reference to the GAsyncResult, so\n  604 |     // remove it from the executor's private slot so it doesn't become dangling\n  605 |     js::SetFunctionNativeReserved(&args.callee(), 0, JS::NullValue());\n  606 | \n  607 |     auto* data = new PromiseData(cx, JS_GetObjectFunction(resolve),\n  608 |                                  JS_GetObjectFunction(reject));\n  609 | \n  610 |     // Hold the main loop until this function resolves...\n  611 |     GjsContextPrivate::from_cx(cx)->main_loop_hold();\n  612 |     g_file_load_contents_async(file, nullptr, load_async_callback, data);","lines":12}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment in Closure::invoke() debug log on success-with-exception path passes m_cx where the format string '%p ... closure %p' expects the closure pointer (this); it logs the JSContext pointer labeled as the closure. Cosmetic/debug-only mismatch.","fix":"Pass 'this' instead of m_cx to the gjs_debug_closure call so the logged pointer matches the 'closure %p' label.","locations":[{"ref":"gi/closure.cpp:190-195","code":"  190 |     if (gjs_log_exception_uncaught(m_cx)) {\n  191 |         gjs_debug_closure(\n  192 |             \"Closure invocation succeeded but an exception was set\"\n  193 |             \" - closure %p\",\n  194 |             m_cx);\n  195 |     }","lines":6}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment says '2 means: recurse at most three times (including this call)' but actual_gtype passes recurse=2 to actual_gtype_recurse, which recurses while 'recurse > 0', i.e. it makes the initial call plus at most 2 more recursive calls = three calls total, but the phrasing '2 means ... three times' is confusing and the second comment block restates the same thing. The number 2 is a bare magic value whose mapping to the level count is non-obvious.","fix":"Clarify the comment to state explicitly that the argument is the maximum number of additional recursion levels (so 2 => 3 total lookups), or introduce a named constant.","locations":[{"ref":"gi/gtype.cpp:185-197","code":"  185 |     GJS_JSAPI_RETURN_CONVENTION\n  186 |     static bool actual_gtype(JSContext* cx, JS::HandleObject object,\n  187 |                              GType* gtype_out) {\n  188 |         g_assert(gtype_out && \"Missing return location\");\n  189 | \n  190 |         // 2 means: recurse at most three times (including this call).\n  191 |         // The levels are calculated considering that, in the worst case we need\n  192 |         // to go from instance to class, from class to GType object and from\n  193 |         // GType object to GType value.\n  194 | \n  195 |         const GjsAtoms& atoms = GjsContextPrivate::atoms(cx);\n  196 |         return actual_gtype_recurse(cx, atoms, object, gtype_out, 2);\n  197 |     }","lines":13}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment block before the _init check in lookup_override_function() states 'function being undefined means there was no override module', but the code path reaching this point has already successfully resolved the overrides module (gjs_object_require_property for `module` succeeded). At this point a missing/undefined _init does NOT mean there was no override module; it means the module exists but lacks a callable _init, which is exactly what the throw reports. The parenthetical comment is misleading about the control flow.","fix":"Reword the comment to clarify that the module was found and that a non-callable _init is unexpected; the 'no override module' case was already handled by the is_import_error() branch above.","locations":[{"ref":"gi/repo.cpp:434-442","code":"  434 |     // If the override module is present, it must have a callable _init(). An\n  435 |     // override module without _init() is probably unintentional. (function\n  436 |     // being undefined means there was no override module.)\n  437 |     if (!gjs_object_require_property(cx, module, \"override module\",\n  438 |                                      atoms.init(), function) ||\n  439 |         !function.isObject() || !JS::IsCallable(&function.toObject())) {\n  440 |         gjs_throw(cx, \"Unexpected value for _init in overrides module\");\n  441 |         return false;\n  442 |     }","lines":9}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"compile_module()'s doc comment says 'Returns: whether an error occurred while compiling the module.' Returning true here means success, not 'an error occurred'; the phrasing inverts the meaning. Same inverted wording appears on gjs_internal_compile_internal_module / gjs_internal_compile_module via their summaries.","fix":"Reword to 'Returns: false if an exception is pending, otherwise true' to match the actual GJS_JSAPI_RETURN_CONVENTION semantics.","locations":[{"ref":"gjs/internal.cpp:152-153","code":"  152 |  *\n  153 |  * Returns: whether an error occurred while compiling the module.","lines":2}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment for gjs_module_load() says 'Returns: whether an error occurred while resolving the specifier.' but the function returns JSObject* (the module object, or nullptr on failure), not a bool 'whether an error occurred'. The same boolean-style 'Returns' wording is copy-pasted onto gjs_module_resolve() (line 540) which also returns JSObject*. Copy-paste from a bool-returning hook doc.","fix":"Update the Returns: lines to describe the JSObject* return value (module object or nullptr on failure).","locations":[{"ref":"gjs/module.cpp:353","code":"  353 |  * Returns: whether an error occurred while resolving the specifier.","lines":1},{"ref":"gjs/module.cpp:540","code":"  540 |  * Returns: whether an error occurred while resolving the specifier.","lines":1}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"In getSource_func the comment \"pattern belongs to the context, so keep the reference\" precedes a call to gjs_cairo_pattern_from_pattern, which internally takes its OWN new reference (via copy_ptr/cairo_pattern_reference). The comment implies the wrapper adopts the context's reference, which is not what happens; the wrapp <div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
