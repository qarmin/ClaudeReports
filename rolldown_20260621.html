ent. While\n`...rest` in a binding context is normally followed by an identifier, relying on\n`unreachable!()` for an AST-shape invariant is fragile: if oxc ever parses a more permissive\nrest target (or a recovered/invalid AST is passed in), this panics during scanning.","fix":"Replace the `unreachable!()` arm with a graceful bailout (e.g. `_ => return None` or just skip recording the rest binding).","locations":[{"ref":"crates/rolldown/src/ast_scanner/dynamic_import.rs:197-213","code":"  197 |         if let Some(rest) = &obj.rest {\n  198 |           match &rest.argument {\n  199 |             ast::BindingPattern::BindingIdentifier(id) => {\n  200 |               let symbol_id = id.symbol_id();\n  201 |               self\n  202 |                 .dynamic_import_usage_info\n  203 |                 .dynamic_import_binding_to_import_record_idx\n  204 |                 .insert(symbol_id, import_record_idx);\n  205 |               self\n  206 |                 .dynamic_import_usage_info\n  207 |                 .dynamic_import_binding_reference_id\n  208 |                 .extend(self.result.symbol_ref_db.scoping().get_resolved_reference_ids(symbol_id));\n  209 |             }\n  210 |             // If the rest argument is not a BindingIdentifier, this is an unexpected case\n  211 |             // because '...' must be followed by an identifier in declaration contexts.\n  212 |             _ => unreachable!(),\n  213 |           }","lines":17,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ast_scanner/dynamic_import.rs#L197-L213"}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"ESM concatenated-module group rendering uses unchecked map indexing and `.unwrap()` on `rendered_esm_runtime_expr` / `wrap_ref_name` for `group.entry`. Earlier in the same loop, per-module lookups use `.get(idx)` with a `continue` fallback, but the group entry is indexed directly three times (`module_idx_to_render_concatenated_module[&group.entry]`) and two `Option`s are unwrapped. If a multi-module group's entry lacks a rendered concatenated module (graph inconsistency), this panics.","fix":"Look the entry up once via `.get(&group.entry)` and bail/emit a diagnostic if missing or if the runtime-expr/wrap-name `Option`s are `None`, matching the defensive `.get`/`continue` style used for the other modules in the group.","locations":[{"ref":"crates/rolldown/src/ecmascript/format/esm.rs:185-194","code":"  185 |     let rendered_esm_runtime_expr = ctx.chunk.module_idx_to_render_concatenated_module\n  186 |       [&group.entry]\n  187 |       .rendered_esm_runtime_expr\n  188 |       .as_ref()\n  189 |       .unwrap()\n  190 |       .trim_end_matches([';', '\\n']);\n  191 |     let wrap_name = ctx.chunk.module_idx_to_render_concatenated_module[&group.entry]\n  192 |       .wrap_ref_name\n  193 |       .as_ref()\n  194 |       .unwrap();","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ecmascript/format/esm.rs#L185-L194"}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`changed_file_path.to_slash().unwrap()` panics if `to_slash()` returns `None`. The input is a\n`String` key from `changed_file_paths` (so UTF-8 is guaranteed and the common case is fine), but\nrelying on `unwrap` for a watcher-supplied path is fragile - any future change that lets a\nnon-convertible path reach here turns a watch event into a hard crash.","fix":"Fall back to the original string when `to_slash()` is `None`, e.g. `changed_file_path.to_slash().map(ArcStr::from).unwrap_or_else(|| ArcStr::from(changed_file_path.as_str()))`.","locations":[{"ref":"crates/rolldown/src/hmr/hmr_stage.rs:167-167","code":"  167 |       let changed_file_path = ArcStr::from(changed_file_path.to_slash().unwrap());","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/hmr/hmr_stage.rs#L167"}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`finalized_expr_for_cross_chunk_symbol` indexes `exports_to_other_chunks[&canonical_ref][0]` with both a map index and a slice index. If `canonical_ref` is absent from `exports_to_other_chunks`, or its vec is empty, this panics. It is reached on the CJS cross-chunk path for Esm/None wrap kinds or common chunks; correctness relies on an unstated invariant that the symbol is always registered as an export with at least one name.","fix":"Use `.get(&canonical_ref).and_then(|v| v.first())` and handle the `None` case explicitly (diagnostic or documented unreachable), instead of double unchecked indexing.","locations":[{"ref":"crates/rolldown/src/module_finalizers/mod.rs:573-575","code":"  573 |     let exported_name = &self.ctx.chunk_graph.chunk_table[target_chunk_idx].exports_to_other_chunks\n  574 |       [&canonical_ref][0];\n  575 |     let is_default_export = exported_name.as_str() == \"default\";","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/module_finalizers/mod.rs#L573-L575"}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`require` rewrite for external modules uses `call_expr.arguments.get_mut(0).expect(\"require should have an argument\")`. While `is_global_require_call` likely guarantees an argument, this is a hard expect on user-derived AST; a `require()` recognized as a global-require call but with zero arguments (e.g. constructed/edge cases) would panic instead of being left untouched.","fix":"Replace `.expect(...)` with `let Some(request_path) = call_expr.arguments.get_mut(0) else { return None; };` to degrade gracefully.","locations":[{"ref":"crates/rolldown/src/module_finalizers/mod.rs:1434-1435","code":" 1434 |             let request_path =\n 1435 |               call_expr.arguments.get_mut(0).expect(\"require should have an argument\");","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/module_finalizers/mod.rs#L1434-L1435"}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`find_merge_target` unwraps with `.expect(\"Should be normal module\")` on `module_table[*entry_module_idx].as_normal()`. The entry module indices come from `collect_entry_modules`, which calls `chunk.entry_module_idx()`. While entry modules are normally normal modules, this is an `expect` on a value derived from chunk-graph state during the merge-common-chunks optimization path; if an entry chunk ever references an external/non-normal entry module the optimizer would panic instead of bailing out gracefully like the rest of the function does (it returns `None`/`continue` for other unexpected cases).","fix":"Use `as_normal()?` (return `None` from the `find_map` closure) instead of `.expect(...)` so a non-normal entry module simply disqualifies that candidate rather than aborting the build.","locations":[{"ref":"crates/rolldown/src/stages/generate_stage/chunk_optimizer.rs:752-758","code":"  752 |     chunk_indices.iter().zip(entry_modules.iter()).find_map(|(chunk_idx, entry_module_idx)| {\n  753 |       let module = module_table[*entry_module_idx].as_normal().expect(\"Should be normal module\");\n  754 |       let can_merge = entry_modules.iter().all(|other_entry_module_idx| {\n  755 |         *entry_module_idx == *other_entry_module_idx\n  756 |           || module.importers_idx.contains(other_entry_module_idx)\n  757 |       });\n  758 |       can_merge.then_some(*chunk_idx)","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/generate_stage/chunk_optimizer.rs#L752-L758"}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`add_exports_for_export_star` pushes `module_idx` onto `module_stack` (line 330), then bails via the `let Module::Normal(module) = &normal_modules[module_idx] else { return }` guard (lines 332-334) without ever calling the matching `module_stack.pop()` at line 399. This leaks a stale entry onto the shared `module_stack`, which corrupts the subsequent `module_stack.contains(&module_idx)` cycle check and the shadowing check at lines 362-366 for the rest of the recursion. It is currently latent because every call site reaches this function with a Normal module (the initial call filters, and the recursive call at 396 only passes `dep_id` values already checked Normal at line 349), but the guard is fragile dead code that becomes a real bug if an External idx ever reaches it.","fix":"Pop the just-pushed idx before the early `return` (or restructure so the push happens only after confirming the module is Normal).","locations":[{"ref":"crates/rolldown/src/stages/link_stage/bind_imports_and_exports.rs:330-334","code":"  330 |     module_stack.push(module_idx);\n  331 | \n  332 |     let Module::Normal(module) = &normal_modules[module_idx] else {\n  333 |       return;\n  334 |     };","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/link_stage/bind_imports_and_exports.rs#L330-L334"},{"ref":"crates/rolldown/src/stages/link_stage/bind_imports_and_exports.rs:396-399","code":"  396 |       Self::add_exports_for_export_star(normal_modules, resolve_exports, dep_id, module_stack);\n  397 |     }\n  398 | \n  399 |     module_stack.pop();","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/link_stage/bind_imports_and_exports.rs#L396-L399"}]},{"id":"PANIC_36","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`get_snapshot_mut`, `get_snapshot`, and `create_output` all call `self.snapshot.<...>().unwrap()`\non the `Option<NormalizedScanStageOutput>`. Their doc comments acknowledge they panic when the\nsnapshot is unset. These are reachable from incremental/HMR flows; a single mis-ordered call\n(snapshot not yet set, or dropped due to an earlier `?` bail elsewhere) turns into a hard panic\nrather than a recoverable error. The risk is elevated because `update_defer_sync_data` documents\nexactly the failure mode where a `?` could leave `snapshot == None`.","fix":"Return `BuildResult`/`Option` from these accessors (or assert with a descriptive message tying the\npanic to the invariant) so callers can surface a diagnostic instead of an unexplained crash.","locations":[{"ref":"crates/rolldown/src/types/scan_stage_cache.rs:41-43","code":"   41 |   pub fn get_snapshot_mut(&mut self) -> &mut NormalizedScanStageOutput {\n   42 |     self.snapshot.as_mut().unwrap()\n   43 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/types/scan_stage_cache.rs#L41-L43"},{"ref":"crates/rolldown/src/types/scan_stage_cache.rs:66-68","code":"   66 |   pub fn get_snapshot(&self) -> &NormalizedScanStageOutput {\n   67 |     self.snapshot.as_ref().unwrap()\n   68 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/types/scan_stage_cache.rs#L66-L68"},{"ref":"crates/rolldown/src/types/scan_stage_cache.rs:229-230","code":"  229 |   pub fn create_output(&mut self) -> NormalizedScanStageOutput {\n  230 |     let cache = self.snapshot.as_mut().unwrap();","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/types/scan_stage_cache.rs#L229-L230"}]},{"id":"PANIC_37","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ScanStageCache::merge` indexes `self.module_id_to_idx[new_module.id()]` with the `Index`\noperator, which panics if the id is absent from the map. The function is incremental-build code\nwhere the set of modules in `module_id_to_idx` and the modules in `scan_stage_output` are derived\nseparately; if they ever diverge (e.g. a module present in the scan output but not yet recorded in\n`module_id_to_idx`) the build panics instead of returning a `BuildResult` error.","fix":"Use `self.module_id_to_idx.get(new_module.id())` and convert a missing entry into a\n`BuildResult` error (or handle the genuinely-new-module case explicitly) rather than panicking.","locations":[{"ref":"crates/rolldown/src/types/scan_stage_cache.rs:94-95","code":"   94 |     for (new_idx, new_module) in modules {\n   95 |       let idx = self.module_id_to_idx[new_module.id()].idx();","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/types/scan_stage_cache.rs#L94-L95"}]},{"id":"PANIC_38","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`prepare_build_context` calls `std::env::current_dir().expect(\"Failed to get current dir\")` when\nthe user did not supply `cwd`. `current_dir()` legitimately fails (e.g. the working directory was\ndeleted, or insufficient permissions), turning an environmental condition into a panic during\nbundler initialization instead of a `BuildResult` error.","fix":"Propagate the error via `?` after mapping it to a `BuildDiagnostic::bundler_initialize_error`,\nmatching how other initialization failures in this function are reported.","locations":[{"ref":"crates/rolldown/src/utils/prepare_build_context.rs:300-301","code":"  300 |   let cwd =\n  301 |     raw_options.cwd.unwrap_or_else(|| std::env::current_dir().expect(\"Failed to get current dir\"));","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/prepare_build_context.rs#L300-L301"}]},{"id":"PANIC_39","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`add_symbol_in_root_scope` indexes the first byte of the symbol's canonical name with\n`canonical_name.as_bytes()[0]` (and later `&canonical_name[1..]`) when JSX preserve mode is on\nand the symbol has the `MustStartWithCapitalLetterForJSX` flag. If `canonical_name` is ever an\nempty string this indexing panics (index out of bounds / byte-slice on empty). There is no guard\nthat the name is non-empty before the `[0]` access. While most symbol names are non-empty, a\nsynthetic or anonymous symbol with an empty name would crash here rather than degrade gracefully.","fix":"Guard with `!canonical_name.is_empty()` in the `if` condition before reading\n`canonical_name.as_bytes()[0]`, falling through to the plain `CompactStr::new(canonical_name)`\nbranch when empty.","locations":[{"ref":"crates/rolldown/src/utils/renamer.rs:157-169","code":"  157 |     let original_name = if self.symbol_db.has_module_preserve_jsx()\n  158 |       && canonical_name.as_bytes()[0].is_ascii_lowercase()\n  159 |       && canonical_ref\n  160 |         .flags(self.symbol_db)\n  161 |         .is_some_and(|flags| flags.contains(SymbolRefFlags::MustStartWithCapitalLetterForJSX))\n  162 |     {\n  163 |       let mut s = String::with_capacity(canonical_name.len());\n  164 |       s.push(canonical_name.as_bytes()[0].to_ascii_uppercase() as char);\n  165 |       s.push_str(&canonical_name[1..]);\n  166 |       CompactStr::from(s)\n  167 |     } else {\n  168 |       CompactStr::new(canonical_name)\n  169 |     };","lines":13,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/renamer.rs#L157-L169"}]},{"id":"PANIC_40","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`BindingNormalizedOptions::input` decides `has_name` from only the first input, then `unwrap_or_else(|| unreachable!(...))` on every subsequent input's `name`. The 'all have names or none do' invariant is only checked against the first element; if a later input lacks a name while the first has one, this panics and aborts the process. Reachable via `#[napi(getter)]`.","fix":"Validate the invariant and return a JS-throwable error, or fall back to `unwrap_or_default()` rather than `unreachable!`.","locations":[{"ref":"crates/rolldown_binding/src/types/binding_normalized_options.rs:29-51","code":"   29 |   pub fn input(&self) -> Either<Vec<String>, HashMap<String, String, FxBuildHasher>> {\n   30 |     let mut inputs_iter = self.inner.input.iter().peekable();\n   31 |     let has_name = inputs_iter.peek().is_some_and(|input| input.name.is_some());\n   32 |     if has_name {\n   33 |       Either::B(\n   34 |         self\n   35 |           .inner\n   36 |           .input\n   37 |           .iter()\n   38 |           .map(|input| {\n   39 |             (\n   40 |               input.name.clone().unwrap_or_else(|| {\n   41 |                 unreachable!(\"Inputs passed from js side are either all have names or not\")\n   42 |               }),\n   43 |               input.import.clone(),\n   44 |             )\n   45 |           })\n   46 |           .collect(),\n   47 |       )\n   48 |     } else {\n   49 |       Either::A(self.inner.input.iter().map(|input| input.import.clone()).collect())\n   50 |     }\n   51 |   }","lines":23,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/types/binding_normalized_options.rs#L29-L51"}]},{"id":"PANIC_41","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`normalize_binding_options` does `worker_manager.as_ref().unwrap()` in the parallel-plugin branch. The invariant is that a `None` plugin slot (parallel plugin) implies a worker manager exists, but this couples two separate inputs (parallel_plugins_map and worker_manager) via an `unwrap`. If a caller supplies a parallel-plugin placeholder without a positive worker_count, this aborts the Node process instead of erroring.","fix":"Return a `napi::Error` when the worker manager is absent but a parallel plugin slot is encountered, rather than `unwrap`.","locations":[{"ref":"crates/rolldown_binding/src/utils/normalize_binding_options.rs:735-740","code":"  735 |           let plugins = parallel_plugins_map\n  736 |             .as_mut()\n  737 |             .and_then(|plugin| plugin.remove(&index))\n  738 |             .unwrap_or_default();\n  739 |           let worker_manager = worker_manager.as_ref().unwrap();\n  740 |           ParallelJsPlugin::new_shared(plugins, Arc::clone(worker_manager))","lines":6,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/utils/normalize_binding_options.rs#L735-L740"}]},{"id":"PANIC_42","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Chunk::import_path_for` / `relative_path_for` use `expect` on `absolute_preliminary_filename` and on `parent()`.\nThese are reachable if a chunk is queried before its preliminary filename is assigned; the invariant violation aborts\nthe bundler rather than surfacing a diagnostic.","fix":"Acceptable if guaranteed by call order, but consider returning `Result` to make ordering bugs recoverable instead of panicking.","locations":[{"ref":"crates/rolldown_common/src/chunk/mod.rs:144-162","code":"  144 |   pub fn import_path_for(&self, importee: &Chunk) -> String {\n  145 |     let importee_filename = importee\n  146 |       .absolute_preliminary_filename\n  147 |       .as_ref()\n  148 |       .expect(\"importee chunk should have absolute_preliminary_filename\");\n  149 |     let import_path = self.relative_path_for(importee_filename.as_path());\n  150 |     if import_path.starts_with(\"../\") { import_path } else { format!(\"./{import_path}\") }\n  151 |   }\n  152 | \n  153 |   pub fn relative_path_for(&self, target: &Path) -> String {\n  154 |     let source_dir = self\n  155 |       .absolute_preliminary_filename\n  156 |       .as_ref()\n  157 |       .expect(\"chunk should have absolute_preliminary_filename\")\n  158 |       .as_path()\n  159 |       .parent()\n  160 |       .expect(\"absolute_preliminary_filename should have a parent directory\");\n  161 |     target.relative(source_dir).as_path().expect_to_slash()\n  162 |   }","lines":19,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/chunk/mod.rs#L144-L162"}]},{"id":"PANIC_43","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`generate_preliminary_filename` uses `expect(\"The file should have basename\")` on\n`PathBuf::from(file).file_name()`. A user-supplied `output.file` ending in `/`, `.`, or `..` yields no `file_name`\nand aborts the bundler with a panic instead of a user-facing error.","fix":"Validate `options.file` earlier and emit a build diagnostic, or fall back gracefully when `file_name()` is `None`.","locations":[{"ref":"crates/rolldown_common/src/chunk/mod.rs:193-200","code":"  193 |     if let Some(file) = &options.file {\n  194 |       let basename = PathBuf::from(file)\n  195 |         .file_name()\n  196 |         .expect(\"The file should have basename\")\n  197 |         .to_string_lossy()\n  198 |         .to_string();\n  199 |       return Ok(PreliminaryFilename::new(basename.into(), None));\n  200 |     }","lines":8,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/chunk/mod.rs#L193-L200"}]},{"id":"PANIC_44","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`SanitizeFilename::value` calls `.expect(\"SanitizeFilename Fn should has value\")` when `self` is the `Fn(_)` variant\nbut `fn_sanitized_file_name` is `None`. Any caller passing the `Fn` variant without precomputing the JS-side result\npanics instead of getting an error.","fix":"Return a `Result`/`Option`, or at minimum make the panic message describe the calling contract (caller must precompute the sanitized name for the `Fn` variant).","locations":[{"ref":"crates/rolldown_common/src/inner_bundler_options/types/sanitize_filename.rs:39-50","code":"   39 |   pub fn value(&self, name: &str, fn_sanitized_file_name: Option<String>) -> ArcStr {\n   40 |     match self {\n   41 |       Self::Boolean(value) => {\n   42 |         if *value {\n   43 |           default_sanitize_file_name(name).into()\n   44 |         } else {\n   45 |           name.into()\n   46 |         }\n   47 |       }\n   48 |       Self::Fn(_) => fn_sanitized_file_name.expect(\"SanitizeFilename Fn should has value\").into(),\n   49 |     }\n   50 |   }","lines":12,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/inner_bundler_options/types/sanitize_filename.rs#L39-L50"}]},{"id":"PANIC_45","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`ExternalModule::get_import_path` uses `expect(\"importer chunk should have preliminary_filename\")` and an\n`expect` on `parent()`. If a chunk reaches rendering without a preliminary filename the first `expect` panics; this\nis an invariant-dependent abort during rendering rather than a recoverable diagnostic.","fix":"Return a `Result` or fall back to the file name when `preliminary_filename`/`parent` is absent, rather than panicking during rendering.","locations":[{"ref":"crates/rolldown_common/src/module/external_module.rs:74-88","code":"   74 |     let mut importer = chunk\n   75 |       .preliminary_filename\n   76 |       .as_deref()\n   77 |       .expect(\"importer chunk should have preliminary_filename\")\n   78 |       .to_string();\n   79 |     while target.starts_with(\"../\") {\n   80 |       target = &target[3..];\n   81 |       importer = concat_string!(\"_/\", importer);\n   82 |     }\n   83 |     let relative_path = Path::new(target).relative(\n   84 |       importer\n   85 |         .as_path()\n   86 |         .parent()\n   87 |         .expect(\"the importer chunk preliminary filename should have a parent directory\"),\n   88 |     );","lines":15,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/module/external_module.rs#L74-L88"}]},{"id":"PANIC_46","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`RuntimeModuleBrief::resolve_symbol` unconditionally `panic!`s when a runtime symbol name is missing. The doc claims\nthis \"should not happen as symbols are validated upfront\", but `validate_symbols` only checks names passed to it; any\ncaller resolving a name outside that validated set (e.g. a plugin-modified runtime missing a helper) hits the panic.","fix":"Return `Option<SymbolRef>` / `Result` so callers can handle a missing runtime symbol gracefully instead of aborting.","locations":[{"ref":"crates/rolldown_common/src/module_loader/runtime_module_brief.rs:60-67","code":"   60 |   pub fn resolve_symbol(&self, name: &str) -> SymbolRef {\n   61 |     let symbol_id = self.name_to_symbol.get(name).unwrap_or_else(|| {\n   62 |       panic!(\n   63 |         \"Failed to resolve runtime symbol `{name}`. This should not happen as symbols are validated upfront.\"\n   64 |       )\n   65 |     });\n   66 |     (self.id, *symbol_id).into()\n   67 |   }","lines":8,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/module_loader/runtime_module_brief.rs#L60-L67"}]},{"id":"PANIC_47","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`trace_action!` calls `serde_json::to_string(&$expr).unwrap()`. Although the current action structs serialize infallibly, this macro is the single emission point used across the whole bundler; any future action type containing a map with non-string keys, a non-finite float, or a custom `Serialize` that can error would turn a tracing call into a process panic.","fix":"Handle the serialization error gracefully (e.g. skip emitting and log at debug level) instead of unwrapping in a tracing macro.","locations":[{"ref":"crates/rolldown_devtools/src/trace_action_macro.rs:3-5","code":"    3 |   ($expr:expr) => {\n    4 |     tracing::trace!(devtoolsAction = serde_json::to_string(&$expr).unwrap());\n    5 |   };","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/trace_action_macro.rs#L3-L5"}]},{"id":"PANIC_48","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`DevtoolsActionFieldExtractor::record_str` unconditionally `unwrap()`s `serde_json::from_str(value)` for the `devtoolsAction` field. While the value normally comes from `trace_action!`'s `to_string`, any other code path emitting a `devtoolsAction` field with non-JSON text (or partially written/escaped data) would panic the formatting path rather than being ignored.","fix":"Use `serde_json::from_str(value).ok()` and only set `self.value` on success.","locations":[{"ref":"crates/rolldown_devtools/src/types/devtools_action_field_extractor.rs:8-12","code":"    8 |   fn record_str(&mut self, field: &tracing::field::Field, value: &str) {\n    9 |     if field.name() == \"devtoolsAction\" {\n   10 |       self.value = Some(serde_json::from_str(value).unwrap());\n   11 |     }\n   12 |   }","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/types/devtools_action_field_extractor.rs#L8-L12"}]},{"id":"PANIC_49","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`is_script_close_tag` calls `slice.try_into().unwrap()` to convert `&[u8]` into `[u8; 8]`, relying entirely on the single caller `contains_script_closing_tag` guaranteeing an exactly-8-byte slice. It does not panic today (the caller's `remaining.len() >= pos + 8` guard holds), but the `unwrap` is a latent footgun if the private helper is ever reused.","fix":"Use `let Ok(bytes): Result<[u8; 8], _> = slice.try_into() else { return false; };` instead of `.unwrap()`.","locations":[{"ref":"crates/rolldown_ecmascript_utils/src/source_utils.rs:22-31","code":"   22 | fn is_script_close_tag(slice: &[u8]) -> bool {\n   23 |   // Compiler condenses these operations to an 8-byte read, u64 AND, and u64 compare.\n   24 |   // https://godbolt.org/z/K8q68WGn6\n   25 |   let mut bytes: [u8; 8] = slice.try_into().unwrap();\n   26 |   for byte in bytes.iter_mut().skip(2) {\n   27 |     // `| 32` converts ASCII upper case letters to lower case.\n   28 |     *byte |= 32;\n   29 |   }\n   30 |   bytes == *b\"<\/script\"\n   31 | }","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_ecmascript_utils/src/source_utils.rs#L22-L31"}]},{"id":"PANIC_50","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`AmbiguousExternalNamespace::message` does `self.exporter.iter()...next_back().unwrap()`. If the `exporter` Vec is empty the unwrap panics. The constructor `BuildDiagnostic::ambiguous_external_namespace` accepts an arbitrary `Vec<AmbiguousExternalNamespaceModule>` with no non-empty guarantee, and this is the message-rendering path that runs while reporting another error, so a degenerate input would turn a diagnostic into a crash.","fix":"Guard against an empty exporter list (e.g. early-return a simpler message, or `if let Some(last) = exporter.next_back()`), instead of unwrapping.","locations":[{"ref":"crates/rolldown_error/src/build_diagnostic/events/ambiguous_external_namespace.rs:36-48","code":"   36 |   fn message(&self, _opts: &DiagnosticOptions) -> String {\n   37 |     let mut exporter = self.exporter.iter().map(|v| format!(r#\"\"{0}\"\"#, v.stable_id));\n   38 | \n   39 |     let last = exporter.next_back().unwrap();\n   40 | \n   41 |     format!(\n   42 |       r#\"\"{}\" re-exports \"{}\" from one of the modules {} and {} (will be ignored).\"#,\n   43 |       self.importee,\n   44 |       self.ambiguous_export_name,\n   45 |       exporter.collect::<Vec<_>>().join(\", \"),\n   46 |       last\n   47 |     )\n   48 |   }","lines":13,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_error/src/build_diagnostic/events/ambiguous_external_namespace.rs#L36-L48"}]},{"id":"PANIC_51","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`finalize_vite_css_urls` decodes the base64 segment of a `__VITE_CSS_URL__`\nplaceholder with `String::from_utf8_unchecked`. If the decoded bytes are not\nvalid UTF-8 this is undefined behavior. The placeholder is normally\nplugin-generated (so it should be valid), but the value is read back from\nrendered chunk code and base64-decoded, so the safety invariant relies on no\nintervening corruption.","fix":"Use `String::from_utf8(...)` and propagate the error (the function already returns Result).","locations":[{"ref":"crates/rolldown_plugin_vite_css_post/src/utils.rs:105-111","code":"  105 |         let id = unsafe {\n  106 |           String::from_utf8_unchecked(\n  107 |             base64_simd::STANDARD\n  108 |               .decode_to_vec(&ctx.args.code[start..start + pos])\n  109 |               .context(\"Invalid base64 in '__VITE_CSS_URL__'\")?,\n  110 |           )\n  111 |         };","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_css_post/src/utils.rs#L105-L111"}]},{"id":"PANIC_52","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`Path::new(importer).parent().unwrap()` panics if `importer` has no parent\ncomponent (a bare filename with no directory). The importer is a normalized id\nthat usually has a parent, but this is an unguarded assumption on a\npath-derived value.","fix":"Handle the `None` case (fall back to root or return an error) instead of unwrapping.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/utils/plugin_ext.rs:107-111","code":"  107 |     let path = if url.starts_with('/') {\n  108 |       self.root.join(url)\n  109 |     } else {\n  110 |       Path::new(importer).parent().unwrap().join(url)\n  111 |     };","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/utils/plugin_ext.rs#L107-L111"}]},{"id":"PANIC_53","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Same pattern in the html-inline-proxy load hook: `ctx.meta().get::<HTMLProxyMap>().expect(\"HTMLProxyMap is missing\")` panics if the map metadata is not present. Since this runs in the `load` hook for any id matching the html-proxy query, an absent map (ordering/config issue) becomes a panic instead of an error.","fix":"Replace `expect` with proper error propagation via `ok_or_else(|| anyhow::anyhow!(...))?`.","locations":[{"ref":"crates/rolldown_plugin_vite_html_inline_proxy/src/lib.rs:82-85","code":"   82 |     // Get HTMLProxyMap from context metadata and find the cached result\n   83 |     if let Some(html_proxy_map) =\n   84 |       ctx.meta().get::<HTMLProxyMap>().expect(\"HTMLProxyMap is missing\").inner.get(url)\n   85 |     {","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html_inline_proxy/src/lib.rs#L82-L85"}]},{"id":"PANIC_54","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"When `is_enable_v2` is true the manifest plugin calls `.expect(\"CSSEntriesCache is missing\")` on `ctx.meta().get::<CSSEntriesCache>()`. If that metadata entry is absent (e.g. the producing plugin did not run or hook ordering changed) this panics inside `generate_bundle` rather than surfacing a recoverable error.","fix":"Return an `anyhow::Error` (`ok_or_else`) instead of `expect`, matching the error handling used elsewhere (e.g. CSSModuleCache in vite-css).","locations":[{"ref":"crates/rolldown_plugin_vite_manifest/src/lib.rs:72-80","code":"   72 |               let reference_ids = if self.is_enable_v2 {\n   73 |                 ctx\n   74 |                   .meta()\n   75 |                   .get::<CSSEntriesCache>()\n   76 |                   .expect(\"CSSEntriesCache is missing\")\n   77 |                   .inner\n   78 |                   .iter()\n   79 |                   .map(|entry| (entry.key().to_string(), entry.value().to_string()))\n   80 |                   .collect::<FxHashMap<_, _>>()","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_manifest/src/lib.rs#L72-L80"}]},{"id":"PANIC_55","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`Path::new(asset.filename.as_str()).file_name().unwrap()` and the analogous chunk-filename call panic if the filename has no final path component (e.g. empty string or a value ending in `/`). These are derived from output filenames so they are normally well-formed, but the unconditional `unwrap` turns any malformed/empty filename into a hard panic during `generate_bundle`.","fix":"Handle the `None` case from `file_name()` gracefully (e.g. fall back to the full filename via `unwrap_or` / `map_or`) instead of `unwrap()`.","locations":[{"ref":"crates/rolldown_plugin_vite_manifest/src/lib.rs:94-99","code":"   94 |             let file = asset.original_file_names.first().map_or_else(\n   95 |               || {\n   96 |                 Cow::Owned(rolldown_utils::concat_string!(\n   97 |                   \"_\",\n   98 |                   Path::new(asset.filename.as_str()).file_name().unwrap().to_string_lossy()\n   99 |                 ))","lines":6,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_manifest/src/lib.rs#L94-L99"},{"ref":"crates/rolldown_plugin_vite_manifest/src/utils.rs:55-58","code":"   55 |       _ => rolldown_utils::concat_string!(\n   56 |         \"_\",\n   57 |         std::path::Path::new(chunk.filename.as_str()).file_name().unwrap().to_string_lossy()\n   58 |       ),","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_manifest/src/utils.rs#L55-L58"}]},{"id":"PANIC_56","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`expect_to_str`/`expect_to_slash`/`expect_into_string` panic on non-UTF-8 paths. On Linux/macOS filesystem paths are arbitrary byte sequences, so a path containing non-UTF-8 bytes reaches these helpers and aborts the whole bundle via panic rather than producing a recoverable diagnostic. Rare in practice but reachable on user/attacker-controlled filesystem input.","fix":"Return a `Result` and surface a `BuildDiagnostic` for non-UTF-8 paths where these run on external input; otherwise document the UTF-8 invariant.","locations":[{"ref":"crates/rolldown_std_utils/src/path_ext.rs:14-30","code":"   14 |   fn expect_to_str(&self) -> &str {\n   15 |     self.to_str().unwrap_or_else(|| {\n   16 |       panic!(\"Failed to convert {:?} to valid utf8 str\", self.display());\n   17 |     })\n   18 |   }\n   19 | \n   20 |   fn expect_to_slash(&self) -> String {\n   21 |     let path = if std::path::MAIN_SEPARATOR == '/' {\n   22 |       self.to_str().map(Cow::Borrowed)\n   23 |     } else {\n   24 |       self.to_str().map(|s| Cow::Owned(s.replace(std::path::MAIN_SEPARATOR, \"/\")))\n   25 |     };\n   26 | \n   27 |     path\n   28 |       .unwrap_or_else(|| panic!(\"Failed to convert {:?} to slash str\", self.display()))\n   29 |       .into_owned()\n   30 |   }","lines":17,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_std_utils/src/path_ext.rs#L14-L30"},{"ref":"crates/rolldown_std_utils/src/path_buf_ext.rs:8-13","code":"    8 |   fn expect_into_string(self) -> String {\n    9 |     self.into_os_string().into_string().unwrap_or_else(|input| {\n   10 |       panic!(\"Failed to convert {:?} to valid utf8 string\", PathBuf::from(input).display());\n   11 |     })\n   12 |   }\n   13 | }","lines":6,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_std_utils/src/path_buf_ext.rs#L8-L13"}]},{"id":"PANIC_57","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`replace_all_placeholder_impl` computes `let offset = placeholder.len() - 1;` unconditionally. With an empty placeholder this underflows (debug panic; release wraps to `usize::MAX`, then `&placeholder[..offset]` panics). All current call sites pass non-empty literals, so it is not currently reachable, but the function has no guard or documented precondition.","fix":"Add `debug_assert!(!placeholder.is_empty())` or early-return when `placeholder` is empty.","locations":[{"ref":"crates/rolldown_utils/src/replace_all_placeholder.rs:54-64","code":"   54 | fn replace_all_placeholder_impl(\n   55 |   pattern: String,\n   56 |   is_len_enabled: bool,\n   57 |   mut placeholder: &str,\n   58 |   mut replacer: impl Replacer,\n   59 | ) -> SingleBuildResult<String> {\n   60 |   let offset = placeholder.len() - 1;\n   61 | \n   62 |   if is_len_enabled {\n   63 |     placeholder = &placeholder[..offset];\n   64 |   }","lines":11,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_utils/src/replace_all_placeholder.rs#L54-L64"}]},{"id":"PANIC_58","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`WatchTask::build` does `bundler.last_bundle_handle.clone().expect(\"bundle handle should exist\nafter build\")`. If `with_cached_bundle_experimental` returns early with an error before a bundle\nhandle is recorded (e.g. a failure in the scan setup path), `last_bundle_handle` could be `None`,\nturning a recoverable build error into a panic that kills the coordinator task. The surrounding code\nalready treats build errors as recoverable (`BuildOutcome::Error`), so an `expect` here is a\nmismatch in error-handling strategy.","fix":"Handle `None` gracefully (e.g. fall through to a fatal-but-non-panicking error path) instead of `expect`, or document the invariant that guarantees a handle always exists.","locations":[{"ref":"crates/rolldown_watcher/src/watch_task.rs:134-136","code":"  134 |       // Extract the bundle handle for event data (watch files + close support)\n  135 |       let bundle_handle =\n  136 |         bundler.last_bundle_handle.clone().expect(\"bundle handle should exist after build\");","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_watcher/src/watch_task.rs#L134-L136"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"DataUrlPlugin stores every resolved data URL in `resolved_data_url: FxDashMap` keyed by a hash-derived id, and never removes entries. If the same plugin instance is reused across multiple builds (e.g. watch mode / dev server), the map grows monotonically with every distinct data URL ever seen, since there is no clearing on build_start or build_end.","fix":"Clear `resolved_data_url` at build_start (or use a per-build context) so entries do not accumulate across rebuilds when the plugin instance is shared.","locations":[{"ref":"crates/rolldown_plugin_data_url/src/lib.rs:22-25","code":"   22 | #[derive(Debug, Default)]\n   23 | pub struct DataUrlPlugin {\n   24 |   resolved_data_url: FxDashMap<ArcStr, ResolvedDataUrl>,\n   25 | }","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_data_url/src/lib.rs#L22-L25"},{"ref":"crates/rolldown_plugin_data_url/src/lib.rs:69-74","code":"   69 |       let id: ArcStr =\n   70 |         format!(\"\\0rolldown/data-url:{}\", xxhash_base64_url(args.specifier.as_bytes())).into();\n   71 | \n   72 |       self.resolved_data_url.insert(id.clone(), ResolvedDataUrl { data, module_type });\n   73 | \n   74 |       return Ok(Some(HookResolveIdOutput { id, ..Default::default() }));","lines":6,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_data_url/src/lib.rs#L69-L74"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"`prepare_cross_module_optimization` computes `self.options.optimization.inline_const_pass() - 1` on a `u32`. `inline_const_pass()` returns the user-supplied `pass` value verbatim (`self.inline_const.map_or(1, |item| item.pass)`), and `normalize_optimization_option` passes `config.pass` through unchecked for the `InlineConstOption::Config` case (no minimum clamp). If a user configures `optimization.inlineConst = { pass: 0 }`, this subtraction underflows: panic in debug builds, wrap to `u32::MAX` in release. A wrapped `u32::MAX` then flows into `pass.max(other_optimization_pass)` and the `while ctx.config.pass > 0` loop, causing an effectively unbounded optimization loop.","fix":"Use `inline_const_pass().saturating_sub(1)`, or clamp `pass` to a minimum of 1 in `normalize_optimization_option`.","locations":[{"ref":"crates/rolldown/src/stages/link_stage/cross_module_optimization.rs:62-68","code":"   62 |     #[expect(clippy::bool_to_int_with_if)]\n   63 |     let other_optimization_pass = if has_side_effect_free_functions { 1 } else { 0 };\n   64 |     let cross_module_inline_const_pass = self.options.optimization.inline_const_pass() - 1;\n   65 |     CrossModuleOptimizationConfig {\n   66 |       pass: cross_module_inline_const_pass.max(other_optimization_pass),\n   67 |       inline_const_optimization: cross_module_inline_const_pass >= 1,\n   68 |     }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/link_stage/cross_module_optimization.rs#L62-L68"},{"ref":"crates/rolldown_common/src/inner_bundler_options/types/optimization.rs:112-118","code":"  112 |     Some(InlineConstOption::Config(config)) => {\n  113 |       // When `mode` is unspecified, default to `Smart` to match the omitted-option\n  114 |       // default. See https://github.com/rolldown/rolldown/issues/9244.\n  115 |       let mode = config.mode.unwrap_or(InlineConstMode::Smart);\n  116 |       let pass = config.pass;\n  117 |       Some(NormalizedInlineConstConfig { mode, pass })\n  118 |     }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/inner_bundler_options/types/optimization.rs#L112-L118"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`cursor - 1` and `cursor - 2` are unguarded `usize` subtractions where `cursor =\nself.visit_path.len() - 1`. They are reached when the parent node is a member expression\n(`kind.is_member_expression_kind()`). In normal traversal a member expression always has a\nstatement/expression ancestor so `cursor >= 1`, but the code relies on that invariant\nimplicitly; if it is ever violated (e.g. a future caller invokes the analyzer with a shorter\npath) the subtraction underflows and the subsequent index panics rather than returning `None`.\nThe sibling `.get(cursor - 1)?` pattern suggests `None` was the intended fallback.","fix":"Use checked indexing throughout, e.g. `cursor.checked_sub(1).and_then(|i| self.visit_path.get(i))?`, so a too-short path yields `None` instead of panicking.","locations":[{"ref":"crates/rolldown/src/ast_scanner/cjs_export_analyzer.rs:53-94","code":"   53 |     let cursor = self.visit_path.len() - 1;\n   54 |     let parent = self.visit_path.get(cursor)?;\n   55 |     match parent {\n   56 |       kind if kind.is_member_expression_kind() => match ty {\n   57 |         // two scenarios:\n   58 |         // 1. module.exports.__esModule = true;\n   59 |         // 2. Object.defineProperty(module.exports, \"__esModule\", { value: true });\n   60 |         CjsGlobalAssignmentType::ModuleExportsAssignment => {\n   61 |           let member_expr = kind.as_member_expression_kind().unwrap();\n   62 |           let property_name = member_expr.static_property_name()?;\n   63 |           if property_name != \"exports\" {\n   64 |             return None;\n   65 |           }\n   66 |           let parent_parent_kind = self.visit_path.get(cursor - 1)?;\n   67 |           match parent_parent_kind {\n   68 |             parent_parent_kind if parent_parent_kind.is_member_expression_kind() => {\n   69 |               let parent_parent = parent_parent_kind.as_member_expression_kind().unwrap();\n   70 |               Self::check_assignment_target_property(\n   71 |                 &parent_parent,\n   72 |                 self.visit_path.get(cursor - 2)?,\n   73 |               )\n   74 |             }\n   75 |             AstKind::CallExpression(call_expr)\n   76 |               if call_expr\n   77 |                 .arguments\n   78 |                 .first()\n   79 |                 .is_some_and(|arg| arg.node_id() == parent.node_id()) =>\n   80 |             {\n   81 |               self.check_object_define_property(call_expr)\n   82 |             }\n   83 |             AstKind::AssignmentExpression(assignment_expr) => {\n   84 |               self.check_assignment_is_cjs_reexport(assignment_expr)\n   85 |             }\n   86 |             _ => None,\n   87 |           }\n   88 |         }\n   89 |         CjsGlobalAssignmentType::ExportsAssignment => {\n   90 |           // one scenario:\n   91 |           // 1. exports.__esModule = true;\n   92 |           let member_expr = kind.as_member_expression_kind().unwrap();\n   93 |           Self::check_assignment_target_property(&member_expr, self.visit_path.get(cursor - 1)?)\n   94 |         }","lines":42,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ast_scanner/cjs_export_analyzer.rs#L53-L94"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"When rebuilding semantic stats for a transformed JSON module, `references` is computed as `declaration_binding_names.len() as u32 * 2u32` and `symbols`/`nodes` as `len() as u32`. Both the `as u32` cast (truncation for >4B keys is unrealistic) and the `* 2` multiplication are unchecked; this is only a stats hint to `SemanticBuilder` so a wrong value degrades to a reallocation rather than miscompiling, but the multiplication can overflow in release for a pathological JSON object.","fix":"Use `saturating_mul`/`try_into` with a saturating fallback, or cap the stats hint.","locations":[{"ref":"crates/rolldown/src/stages/link_stage/generate_lazy_export.rs:245-252","code":"  245 |   #[expect(clippy::cast_possible_truncation)]\n  246 |   let scoping = ecma_ast.make_symbol_table_and_scope_tree_with_semantic_builder(\n  247 |     SemanticBuilder::new().with_stats(Stats {\n  248 |       nodes: declaration_binding_names.len().next_power_of_two() as u32,\n  249 |       scopes: 1,\n  250 |       symbols: declaration_binding_names.len() as u32,\n  251 |       references: declaration_binding_names.len() as u32 * 2u32,\n  252 |     }),","lines":8,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/link_stage/generate_lazy_export.rs#L245-L252"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`ByteLocator::byte_offset` computes `self.line_starts[line] + column` with no bounds relation between `column` and the actual line length, and the out-of-range branch returns `last_line_start + column`. The result is then cast `as u32` in `BuildDiagnostic::json_parse` to build a `Span`. For a large source (> 4 GiB) or a malformed/oversized column, the offset can exceed the real source length or overflow on the u32 cast, producing a span that points outside the source. Downstream span slicing (e.g. `is_context_too_long`, ariadne) then has to defend against an invalid span.","fix":"Clamp the computed offset to `source.len()` (and saturate on the u32 conversion) so a bad line/column degrades to a valid in-range span instead of an out-of-bounds one.","locations":[{"ref":"crates/rolldown_error/src/utils/locator.rs:25-31","code":"   25 |   pub fn byte_offset(&self, line: usize, column: usize) -> usize {\n   26 |     if line >= self.line_starts.len() {\n   27 |       // Return last position or handle error appropriately\n   28 |       return self.line_starts.last().copied().unwrap_or(0) + column;\n   29 |     }\n   30 |     self.line_starts[line] + column\n   31 |   }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_error/src/utils/locator.rs#L25-L31"},{"ref":"crates/rolldown_error/src/build_diagnostic/constructors.rs:372-385","code":"  372 |   #[expect(clippy::cast_possible_truncation)]\n  373 |   pub fn json_parse(\n  374 |     filename: ArcStr,\n  375 |     source: ArcStr,\n  376 |     line: usize,\n  377 |     column: usize,\n  378 |     message: ArcStr,\n  379 |   ) -> Self {\n  380 |     // This function expects 0-based `line` and `column` values, matching `ByteLocator::byte_offset`.\n  381 |     // Note: `serde_json::Error` reports 1-based line/column; conversion to 0-based is handled at the call site.\n  382 |     let offset = ByteLocator::new(source.as_str()).byte_offset(line, column);\n  383 |     let span = Span::new(offset as u32, offset as u32);\n  384 |     Self::new_inner(JsonParse { filename, source, span, message })\n  385 |   }","lines":14,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_error/src/build_diagnostic/constructors.rs#L372-L385"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Off-by-one ancestor lookup in dynamic-import treeshaking analysis. `rposition` is\ncalled on `self.visit_path.iter().skip(1)`, so the returned index is relative to the\n*skipped* iterator (an element at absolute index `i` has position `i - 1`). That index\nis then used directly to index the full path (`self.visit_path[ast_after_remove_paren_idx]`)\nand for all the relative `saturating_sub(1)/(2)` lookups. Every ancestor inspected is\ntherefore one slot lower than intended, so the `VariableDeclarator` / `ExpressionStatement` /\nmember-expression classification of `await import('mod')` matches the wrong node. This\nmis-classifies dynamic-import exports usage (e.g. `const {a} = await import('mod')` vs a\nbare statement), producing incorrect `DynamicImportExportsUsage` and thus wrong tree-shaking\nof dynamically-imported modules. The comment on line 88 (\"the index is find from visit_path\")\nreinforces the wrong assumption.","fix":"Do not `skip(1)` before computing the index, or add `+ 1` to the result to convert it\nback to an absolute `visit_path` index. Compute the absolute index explicitly, e.g.\n`let idx = self.visit_path.iter().rposition(|k| !matches!(k, AstKind::ParenthesizedExpression(_)))?;`\n(without the skip), then index `self.visit_path[idx]`.","locations":[{"ref":"crates/rolldown/src/ast_scanner/dynamic_import.rs:83-131","code":"   83 |     let ast_after_remove_paren_idx = self\n   84 |       .visit_path\n   85 |       .iter()\n   86 |       .skip(1)\n   87 |       .rposition(|kind| !matches!(kind, AstKind::ParenthesizedExpression(_)))?;\n   88 |     // ast_after_remove_paren_idx the index is find from `visit_path`\n   89 |     match self.visit_path[ast_after_remove_paren_idx] {\n   90 |       // 1. const mod = await import('mod'); console.log(mod)\n   91 |       // 2. const {a} = await import('mod'); a.something;\n   92 |       AstKind::VariableDeclarator(var_decl) => {\n   93 |         // parent of varDeclarator should be varDeclaration, so we should look for the parent of\n   94 |         // parent\n   95 |         let is_exported = matches!(\n   96 |           self.visit_path.get(ast_after_remove_paren_idx.saturating_sub(2)),\n   97 |           Some(AstKind::ExportDefaultDeclaration(_) | AstKind::ExportNamedDeclaration(_))\n   98 |         );\n   99 |         self.update_dynamic_import_usage_info_from_binding_pattern(\n  100 |           &var_decl.id,\n  101 |           import_record_idx,\n  102 |           is_exported,\n  103 |         )\n  104 |       }\n  105 |       // 3. await import('mod');\n  106 |       //   - return await import('mod'); // should consider it is completely used\n  107 |       //   - () => await import('mod'); // should consider it is completely used\n  108 |       // only side effects from `mod` is triggered\n  109 |       AstKind::ExpressionStatement(_) => {\n  110 |         // if the import is used in a function, we should consider it is completely used\n  111 |         match self.visit_path.get(ast_after_remove_paren_idx.saturating_sub(1))? {\n  112 |           AstKind::ReturnStatement(_) => None,\n  113 |           AstKind::FunctionBody(_) => {\n  114 |             match self.visit_path.get(ast_after_remove_paren_idx.saturating_sub(2))? {\n  115 |               AstKind::ArrowFunctionExpression(expr) if expr.expression => None,\n  116 |               _ => Some(FxHashSet::default()),\n  117 |             }\n  118 |           }\n  119 |           _ => Some(FxHashSet::default()),\n  120 |         }\n  121 |       }\n  122 |       // 4. (await import('mod')).a\n  123 |       kind if kind.is_member_expression_kind() => Some(FxHashSet::from_iter([kind\n  124 |         .as_member_expression_kind()\n  125 |         .unwrap()\n  126 |         .static_property_name()?\n  127 |         .into()])),\n  128 |       // for rest of the cases, just bailout, until we find other optimization could apply\n  129 |       _ => None,\n  130 |     }\n  131 |   }","lines":49,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ast_scanner/dynamic_import.rs#L83-L131"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Broken transitive-importer BFS in `find_entry_level_external_module`. The work queue `q` is seeded directly from `invalidated_modules`, then the loop body does `if !invalidated_modules.insert(idx) { continue; }`. Because every initial queue element is already present in the set, `insert` returns `false`, so the guard is `!false == true` and every initial element is immediately skipped before `q.extend(module.importers_idx)` ever runs. The intended transitive propagation up the importer graph therefore never happens — only the directly-invalidated modules are reprocessed. This silently under-propagates `has_dynamic_exports` invalidation to importers, which feeds the indirect-external-reexport namespace-elimination optimization and can produce wrong namespace inclusion.","fix":"Use a separate visited set for the BFS instead of mutating/reading `invalidated_modules` as both the seed and the visited marker. e.g. `let mut visited = FxHashSet::default(); while let Some(idx) = q.pop_front() { if !visited.insert(idx) { continue; } invalidated_modules.insert(idx); ... q.extend(module.importers_idx.iter()); }`.","locations":[{"ref":"crates/rolldown/src/stages/generate_stage/code_splitting.rs:655-664","code":"  655 |     let mut q = invalidated_modules.iter().copied().collect::<VecDeque<_>>();\n  656 |     while let Some(idx) = q.pop_front() {\n  657 |       if !invalidated_modules.insert(idx) {\n  658 |         continue;\n  659 |       }\n  660 |       let Module::Normal(module) = &self.link_output.module_table[idx] else {\n  661 |         continue;\n  662 |       };\n  663 |       q.extend(module.importers_idx.iter());\n  664 |     }","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/generate_stage/code_splitting.rs#L655-L664"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`TsconfigCache::clear()` only empties the binding-level `FxDashMap` (`self.cache`) but does NOT clear the underlying `oxc_resolver::Resolver`'s internal cache (which exposes `clear_cache()`). `find_tsconfig` reads/populates the resolver's own cache, so after a tsconfig edit the resolver keeps returning stale parsed config. The docstring explicitly promises 'Call this when tsconfig files have changed to ensure fresh resolution', which is violated.","fix":"Also call `self.resolver.clear_cache()` inside `clear()` in addition to `self.cache.clear()`.","locations":[{"ref":"crates/rolldown_binding/src/transform_cache.rs:32-38","code":"   32 |   /// Clear the cache.\n   33 |   ///\n   34 |   /// Call this when tsconfig files have changed to ensure fresh resolution.\n   35 |   #[napi]\n   36 |   pub fn clear(&self) {\n   37 |     self.cache.clear();\n   38 |   }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/transform_cache.rs#L32-L38"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`WorkerManager::acquire_all` drains `worker_count` permits one-by-one in a loop with no atomicity. Two concurrent `acquire_all` calls (or `acquire_all` racing `acquire`) can each grab a disjoint subset of permits and then block forever waiting for the rest - a classic deadlock. The channel-based pseudo-semaphore offers no all-or-nothing bulk acquisition. `run_all` depends on this for output hooks.","fix":"Use a real counting semaphore (e.g. `tokio::sync::Semaphore::acquire_many`) supporting atomic bulk acquisition, or serialize `acquire_all` behind a mutex.","locations":[{"ref":"crates/rolldown_binding/src/worker_manager.rs:32-41","code":"   32 |   pub async fn acquire_all(&self) -> WorkerAllSemaphorePermit {\n   33 |     for _ in 0..self.worker_count {\n   34 |       self.free_workers_receiver.recv().await.unwrap();\n   35 |     }\n   36 | \n   37 |     WorkerAllSemaphorePermit {\n   38 |       worker_count: self.worker_count,\n   39 |       sender: self.free_workers_sender.clone(),\n   40 |     }\n   41 |   }","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/worker_manager.rs#L32-L41"},{"ref":"crates/rolldown_binding/src/options/plugin/parallel_js_plugin.rs:59-76","code":"   59 |   #[cfg(not(target_family = \"wasm\"))]\n   60 |   async fn run_all<\n   61 |     'a,\n   62 |     R,\n   63 |     E: std::fmt::Debug,\n   64 |     F: FnMut(&'a JsPlugin) -> BoxFuture<'a, Result<R, E>>,\n   65 |   >(\n   66 |     &'a self,\n   67 |     f: F,\n   68 |   ) -> Result<Vec<R>, E> {\n   69 |     let _permit = self.worker_manager.acquire_all().await;\n   70 |     let results = future::join_all(self.plugins.iter().map(f)).await;\n   71 |     let mut ok_list: Vec<R> = Vec::with_capacity(results.len());\n   72 |     for result in results {\n   73 |       ok_list.push(result?);\n   74 |     }\n   75 |     Ok(ok_list)\n   76 |   }","lines":18,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/options/plugin/parallel_js_plugin.rs#L59-L76"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In `write_event`'s first pass, when more than one string field in a single event exceeds 5KB, each StringRef object is serialized back-to-back to the file with no separator, and only a single `writeln!` is emitted after the whole loop. The result is concatenated JSON objects on one physical line like `{...StringRef...}{...StringRef...}\\n`, which is not valid JSON-lines and will break any line-based consumer (the devtools reader expects one JSON object per line). This is reachable for events such as `AssetsReady` / `ChunkGraphReady` that can carry several large string fields.","fix":"Emit a newline after each StringRef object inside the loop (e.g. `writeln!(file)` per written ref), or accumulate refs and write each on its own line. Do not rely on a single trailing writeln for multiple objects.","locations":[{"ref":"crates/rolldown_devtools/src/writer.rs:124-143","code":"  124 |   let mut wrote_ref = false;\n  125 |   for value in action_meta.values() {\n  126 |     if let serde_json::Value::String(s) = value {\n  127 |       if s.len() > 5 * 1024 {\n  128 |         let hash = blake3::hash(s.as_bytes()).to_hex().to_string();\n  129 |         if exist_hashes.insert(hash.clone()) {\n  130 |           let mut serializer = serde_json::Serializer::new(&mut *file);\n  131 |           let mut map = serializer.serialize_map(None)?;\n  132 |           map.serialize_entry(\"action\", \"StringRef\")?;\n  133 |           map.serialize_entry(\"id\", &hash)?;\n  134 |           map.serialize_entry(\"content\", s)?;\n  135 |           map.end()?;\n  136 |           wrote_ref = true;\n  137 |         }\n  138 |       }\n  139 |     }\n  140 |   }\n  141 |   if wrote_ref {\n  142 |     writeln!(file).map_err(serde_json::Error::io)?;\n  143 |   }","lines":20,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/writer.rs#L124-L143"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"`MemoryFileSystem::exists` returns `self.fs.exists(...).is_ok()`. The underlying `vfs`\n`FileSystem::exists` returns `VfsResult<bool>` (i.e. `Result<bool, VfsError>`), so for a\npath whose parent exists but the file itself does not, the call returns `Ok(false)` and\n`.is_ok()` evaluates to `true`. The method therefore reports that nearly every queried path\nexists, the opposite of intended behavior. `exists` should unwrap the inner boolean\n(`== Ok(true)`), matching how `add_file_bytes` uses `fs.exists(...).unwrap()` to branch on\nthe bool. Affects the in-memory filesystem used by tests/REPL.","fix":"Return the inner boolean: `self.fs.exists(path.to_string_lossy().as_ref()) == Ok(true)` (or `.unwrap_or(false)`).","locations":[{"ref":"crates/rolldown_fs/src/memory.rs:73-75","code":"   73 |   fn exists(&self, path: &Path) -> bool {\n   74 |     self.fs.exists(path.to_string_lossy().as_ref()).is_ok()\n   75 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_fs/src/memory.rs#L73-L75"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"ChunkImportMapPlugin::render_chunk lazily builds the shared `chunk_import_map` exactly once, guarded by an `AtomicBool` swap. render_chunk is invoked CONCURRENTLY for every chunk via `try_join_all` (crates/rolldown/src/stages/generate_stage/render_chunks.rs uses `try_join_all(assets.iter_mut()...)`). The single thread that wins `self.initialized.swap(true, ...)` builds the entire map (lines 41-79) while all other concurrent render_chunk calls skip the init block and immediately proceed to lines 81-96, reading the map before it is fully populated. Those threads filter placeholders with `contains_key` (line 82) against an incomplete map, so placeholders not yet inserted by the in-progress initializer are silently dropped and never replaced, leaving raw `!~{...}~` hash placeholders in the emitted code. The result is non-deterministic, depending on scheduling. The atomic only prevents double-initialization; it provides no happens-before guarantee that initialization has completed before other threads read the map.","fix":"Build the chunk_import_map in a hook that runs once before chunk rendering (e.g. a dedicated pre-pass / once-cell future that all render_chunk calls await), or wrap initialization in a `tokio::sync::OnceCell`/`Mutex` so every render_chunk thread blocks until the map is fully populated, instead of using a fire-and-forget AtomicBool swap.","locations":[{"ref":"crates/rolldown_plugin_chunk_import_map/src/lib.rs:41-96","code":"   41 |     if !self.initialized.swap(true, Ordering::SeqCst) {\n   42 |       let base = args.options.hash_characters.base();\n   43 |       let mut used_names = FxHashSet::default();\n   44 |       for chunk in args.chunks.values() {\n   45 |         let mut hash_placeholders =\n   46 |           find_hash_placeholders(&chunk.filename, &HASH_PLACEHOLDER_LEFT_FINDER).peekable();\n   47 |         if hash_placeholders.peek().is_none() {\n   48 |           continue;\n   49 |         }\n   50 |         let hasher = match &chunk.facade_module_id {\n   51 |           Some(module_id) => {\n   52 |             let mut hasher = Xxh3::with_seed(0);\n   53 |             module_id.as_str().hash(&mut hasher);\n   54 |             hasher\n   55 |           }\n   56 |           None => {\n   57 |             // Fallback logic for common chunk\n   58 |             let mut hasher = Xxh3::with_seed(1);\n   59 |             if used_names.contains(&chunk.name) {\n   60 |               // Reduce the impact factor\n   61 |               let Some(module_id) = chunk.module_ids.iter().min() else { continue };\n   62 |               module_id.as_str().hash(&mut hasher);\n   63 |             } else {\n   64 |               used_names.insert(chunk.name.clone());\n   65 |               chunk.name.hash(&mut hasher);\n   66 |             }\n   67 |             hasher\n   68 |           }\n   69 |         };\n   70 |         let hash = encode_hash_with_base(&hasher.digest128().to_le_bytes(), base);\n   71 |         let mut chunk_id = chunk.filename.to_string();\n   72 |         for (start, end, placeholder) in hash_placeholders {\n   73 |           let hash = hash[..end - start].to_string();\n   74 |           unsafe { chunk_id.as_bytes_mut()[start..end].copy_from_slice(hash.as_bytes()) };\n   75 |           self.chunk_import_map.insert(placeholder.into(), hash);\n   76 |         }\n   77 |         self.chunk_import_map.insert(chunk.filename.clone(), chunk_id);\n   78 |       }\n   79 |     }\n   80 | \n   81 |     let placeholders: Vec<_> = find_hash_placeholders(&args.code, &HASH_PLACEHOLDER_LEFT_FINDER)\n   82 |       .filter(|placeholder| self.chunk_import_map.contains_key(placeholder.2))\n   83 |       .collect();\n   84 | \n   85 |     if placeholders.is_empty() {\n   86 |       return Ok(None);\n   87 |     }\n   88 | \n   89 |     let mut code = args.code.as_ref().clone();\n   90 |     for (start, end, placeholder) in placeholders {\n   91 |       let hash = self.chunk_import_map.get(placeholder).expect(\"hash placeholder must exist\");\n   92 |       debug_assert_eq!(hash.len(), end - start, \"hash length doesn't match placeholder size\");\n   93 |       unsafe {\n   94 |         code.as_bytes_mut()[start..end].copy_from_slice(hash.as_bytes());\n   95 |       }\n   96 |     }","lines":56,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_chunk_import_map/src/lib.rs#L41-L96"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`is_external_url` discards the result of its alphabetic-protocol check:\n`protocol.strip_suffix(':').map(|p| p.bytes().all(..is_ascii_alphabetic)).is_some()`.\n`.map(...)` yields `Some(bool)` and `.is_some()` is true whenever\n`strip_suffix(':')` succeeds, regardless of the inner boolean. So any id of the\nform `<anything>://...` whose pre-`//` segment ends with `:` is treated as an\nexternal URL even when the \"protocol\" contains digits or other non-alphabetic\ncharacters (e.g. `c1:abc//`).","fix":"Us d that `None` is then memoized as `Visited(None)` for every node along the current DFS path even if a later sibling branch of the same parent would have discovered TLA through one of those nodes. A subsequent `require(...)` lookup that lands on a prematurely-memoized sibling silently misses the forbidden `require` of a TLA module (no diagnostic emitted). The code documents this but does not guard against it.","fix":"Defer memoization of nodes participating in an unresolved cycle until the enclosing SCC resolves (e.g. only memoize a definitive result, leave cycle-tainted nodes as NotVisited or track them separately).","locations":[{"ref":"crates/rolldown/src/stages/link_stage/compute_tla.rs:32-72","code":"   32 |     // Known limitation: on a cycle hit we return `None` for the visiting\n   33 |     // edge and then memoize modules along the current DFS path even\n   34 |     // though a later branch of the same parent might still discover TLA\n   35 |     // through them. If a subsequent `require(...)` lookup lands on one\n   36 |     // of those prematurely memoized siblings we silently miss the error.\n   37 |     // A proper fix would delay memoization until the enclosing SCC\n   38 |     // resolves.\n   39 |     fn find_tla_source(\n   40 |       module_idx: ModuleIdx,\n   41 |       module_table: &ModuleTable,\n   42 |       visited: &mut IndexVec<ModuleIdx, TlaVisitState>,\n   43 |     ) -> Option<ModuleIdx> {\n   44 |       match visited[module_idx] {\n   45 |         TlaVisitState::Visited(result) => return result,\n   46 |         TlaVisitState::Visiting => return None,\n   47 |         TlaVisitState::NotVisited => {}\n   48 |       }\n   49 | \n   50 |       visited[module_idx] = TlaVisitState::Visiting;\n   51 |       let module = &module_table[module_idx];\n   52 |       let is_self_tla = module\n   53 |         .as_normal()\n   54 |         .is_some_and(|module| module.ast_usage.contains(EcmaModuleAstUsage::TopLevelAwait));\n   55 |       if is_self_tla     sender: self.free_workers_sender.clone(),\n   40 |     }\n   41 |   }","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/worker_manager.rs#L32-L41"},{"ref":"crates/rolldown_binding/src/worker_manager.rs:73-84","code":"   73 | #[cfg(not(target_family = \"wasm\"))]\n   74 | impl Drop for WorkerAllSemaphorePermit {\n   75 |   fn drop(&mut self) {\n   76 |     let worker_count = self.worker_count;\n   77 |     (0..worker_count).for_each(|value| {\n   78 |       self\n   79 |         .sender\n   80 |         .send_blocking(value)\n   81 |         .expect(\"WorkerManager: failed to return workers to pool during bulk release - channel closed unexpectedly\");\n   82 |     });\n   83 |   }\n   84 | }","lines":12,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/worker_manager.rs#L73-L84"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`treeshake: true`/absent and `treeshake: {}` produce different `invalidImportSideEffects` behaviour.\nIn `deserialize_treeshake`, the `None | Some(true)` branch sets `invalid_import_side_effects: None`, which the\naccessor `NormalizedTreeshakeOptions::invalid_import_side_effects()` resolves to `false`. But the `Object` branch\ndefaults the same field to `Some(true)`. So `treeshake: true` yields `false` while `treeshake: {}` yields `true`,\nwhich is surprising and almost certainly unintended.","fix":"Make both paths agree: either set `invalid_import_side_effects: Some(false)` in the object-branch fallback (matching the accessor default), or set the `true`-branch field to `Some(true)`. Pick the intended default and apply it uniformly.","locations":[{"ref":"crates/rolldown_common/src/inner_bundler_options/mod.rs:338-348","code":"  338 |     None | Some(Value::Bool(true)) => {\n  339 |       Ok(TreeshakeOptions::Option(types::trees
