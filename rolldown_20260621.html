total named imports) per pass over the whole module table; for projects with many passes (`inline_const.pass > 1`) and large import surfaces it is repeated full scans. The TODO at the top of `cross_module_optimization` already acknowledges missing early-exit optimizations.","fix":"Build a reverse index (constant canonical ref -> importing modules) once, or restrict the scan to modules that import from modules where new constants were discovered.","locations":[{"ref":"crates/rolldown/src/stages/link_stage/cross_module_optimization.rs:131-152","code":"  131 |   fn find_modules_referencing_constants(\n  132 |     &self,\n  133 |     new_constant_refs: &FxHashSet<SymbolRef>,\n  134 |   ) -> FxHashSet<ModuleIdx> {\n  135 |     if new_constant_refs.is_empty() {\n  136 |       return FxHashSet::default();\n  137 |     }\n  138 | \n  139 |     self\n  140 |       .module_table\n  141 |       .iter()\n  142 |       .filter_map(|module| {\n  143 |         let normal_module = module.as_normal()?;\n  144 |         // Check if any of the module's named imports resolve to a newly discovered constant\n  145 |         let references_new_constant = normal_module.named_imports.keys().any(|local_symbol_ref| {\n  146 |           let canonical_ref = self.symbols.canonical_ref_for(*local_symbol_ref);\n  147 |           new_constant_refs.contains(&canonical_ref)\n  148 |         });\n  149 |         references_new_constant.then_some(normal_module.idx)\n  150 |       })\n  151 |       .collect()\n  152 |   }","lines":22,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/link_stage/cross_module_optimization.rs#L131-L152"}]},{"id":"PERF_15","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"In `render_chunk_exports` (ESM branch) `export_items` is collected into a `Vec`, then mapped into\nanother `Vec<Cow<str>>` (`rendered_items`), and finally joined manually into the output string via\na per-item loop. The intermediate `rendered_items` allocation is unnecessary; the items could be\nwritten straight into `s` while tracking the separator, saving a `Vec` allocation and a second\npass per chunk.","fix":"Write each rendered export directly into `s` inside the iteration (emitting \", \" before all but the\nfirst), dropping the `rendered_items` `Vec`.","locations":[{"ref":"crates/rolldown/src/utils/chunk/render_chunk_exports.rs:112-153","code":"  112 |       let mut s = String::new();\n  113 |       let rendered_items = export_items\n  114 |         .into_iter()\n  115 |         .map(|(exported_name, export_ref)| {\n  116 |           let canonical_ref = link_output.symbol_db.canonical_ref_for(export_ref);\n  117 |           let symbol = link_output.symbol_db.get(canonical_ref);\n  118 |           let canonical_name = link_output\n  119 |             .symbol_db\n  120 |             .canonical_name_for_or_original(canonical_ref, &chunk.canonical_names);\n  121 |           if let Some(ns_alias) = &symbol.namespace_alias {\n  122 |             let canonical_ns_name = link_output\n  123 |               .symbol_db\n  124 |               .canonical_name_for_or_original(ns_alias.namespace_ref, &chunk.canonical_names);\n  125 |             let property_name = &ns_alias.property_name;\n  126 |             s.push_str(\"var \");\n  127 |             s.push_str(canonical_name);\n  128 |             s.push_str(\" = \");\n  129 |             s.push_str(canonical_ns_name);\n  130 |             s.push('.');\n  131 |             s.push_str(property_name);\n  132 |             s.push_str(\";\\n\");\n  133 |           }\n  134 | \n  135 |           if canonical_name == exported_name {\n  136 |             Cow::Borrowed(canonical_name)\n  137 |           } else {\n  138 |             Cow::Owned(concat_string!(\n  139 |               canonical_name,\n  140 |               \" as \",\n  141 |               to_module_import_export_name(&exported_name)\n  142 |             ))\n  143 |           }\n  144 |         })\n  145 |         .collect::<Vec<_>>();\n  146 |       s.push_str(\"export { \");\n  147 |       for (i, item) in rendered_items.iter().enumerate() {\n  148 |         if i > 0 {\n  149 |           s.push_str(\", \");\n  150 |         }\n  151 |         s.push_str(item);\n  152 |       }\n  153 |       s.push_str(\" };\");","lines":42,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/chunk/render_chunk_exports.rs#L112-L153"}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`get_module_loader_from_file_extension` iterates over every `.` byte in the module id via\n`memchr_iter` and, for each, hashes and looks up the substring after that dot\n(`module_types.get(&id[i+1..])`). For a long path with many dots this performs many redundant\nhashmap lookups over progressively shorter suffixes. The first dot in a path component also makes\nit match across directory separators (e.g. a dotted directory name), though the registered keys\nare normal extensions so a false match is unlikely in practice.","fix":"Restrict the scan to the final path component (split on the last separator first) and/or stop after\nthe first registered match measured from the rightmost extension, reducing lookups and avoiding\ncross-separator matches.","locations":[{"ref":"crates/rolldown/src/utils/load_source.rs:148-159","code":"  148 | fn get_module_loader_from_file_extension<S: AsRef<str>>(\n  149 |   id: S,\n  150 |   module_types: &FxHashMap<Cow<'static, str>, ModuleType>,\n  151 | ) -> Option<ModuleType> {\n  152 |   let id = id.as_ref();\n  153 |   for i in memchr::memchr_iter(b'.', id.as_bytes()) {\n  154 |     if let Some(ty) = module_types.get(&id[i + 1..]) {\n  155 |       return Some(ty.clone());\n  156 |     }\n  157 |   }\n  158 |   None\n  159 | }","lines":12,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/load_source.rs#L148-L159"}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"Source-map getters (`file`, `sources`, `sources_content`, `names`, `mappings`, `x_google_ignore_list`) each `.clone()` the underlying Vec/String on every JS property access. For large bundles these are large allocations re-done on every getter read, and `mappings` in particular can be very large.","fix":"Return references where napi allows (e.g. `&str`), or cache/move the JSON fields once instead of cloning per access.","locations":[{"ref":"crates/rolldown_binding/src/types/binding_magic_string.rs:258-291","code":"  258 |   #[napi(getter)]\n  259 |   pub fn file(&self) -> Option<String> {\n  260 |     self.json.file.clone()\n  261 |   }\n  262 | \n  263 |   /// The list of original source files.\n  264 |   #[napi(getter)]\n  265 |   pub fn sources(&self) -> Vec<String> {\n  266 |     self.json.sources.clone()\n  267 |   }\n  268 | \n  269 |   /// The original source contents (if `includeContent` was true).\n  270 |   #[napi(getter)]\n  271 |   pub fn sources_content(&self) -> Vec<Option<String>> {\n  272 |     self.json.sources_content.clone().unwrap_or_default()\n  273 |   }\n  274 | \n  275 |   /// The list of symbol names used in mappings.\n  276 |   #[napi(getter)]\n  277 |   pub fn names(&self) -> Vec<String> {\n  278 |     self.json.names.clone()\n  279 |   }\n  280 | \n  281 |   /// The VLQ-encoded mappings string.\n  282 |   #[napi(getter)]\n  283 |   pub fn mappings(&self) -> String {\n  284 |     self.json.mappings.clone()\n  285 |   }\n  286 | \n  287 |   /// The list of source indices that should be excluded from debugging.\n  288 |   #[napi(getter, js_name = \"x_google_ignoreList\")]\n  289 |   pub fn x_google_ignore_list(&self) -> Option<Vec<u32>> {\n  290 |     self.json.x_google_ignore_list.clone()\n  291 |   }","lines":34,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/types/binding_magic_string.rs#L258-L291"},{"ref":"crates/rolldown_binding/src/types/binding_magic_string.rs:325-385","code":"  325 |   /// The generated file name.\n  326 |   #[napi(getter)]\n  327 |   pub fn file(&self) -> Option<String> {\n  328 |     self.json.file.clone()\n  329 |   }\n  330 | \n  331 |   /// The list of original source files.\n  332 |   #[napi(getter)]\n  333 |   pub fn sources(&self) -> Vec<String> {\n  334 |     self.json.sources.clone()\n  335 |   }\n  336 | \n  337 |   /// The original source contents (if `includeContent` was true).\n  338 |   #[napi(getter)]\n  339 |   pub fn sources_content(&self) -> Vec<Option<String>> {\n  340 |     self.json.sources_content.clone().unwrap_or_default()\n  341 |   }\n  342 | \n  343 |   /// The list of symbol names used in mappings.\n  344 |   #[napi(getter)]\n  345 |   pub fn names(&self) -> Vec<String> {\n  346 |     self.json.names.clone()\n  347 |   }\n  348 | \n  349 |   /// The decoded mappings as an array of line arrays.\n  350 |   /// Each line is an array of segments, where each segment is [generatedColumn, sourceIndex, originalLine, originalColumn, nameIndex?].\n  351 |   #[napi(getter)]\n  352 |   pub fn mappings(&self) -> Vec<Vec<Vec<i64>>> {\n  353 |     let mut lines: Vec<Vec<Vec<i64>>> = Vec::new();\n  354 | \n  355 |     for token in self.inner.get_tokens() {\n  356 |       // Fill in empty lines if needed\n  357 |       while lines.len() <= token.get_dst_line() as usize {\n  358 |         lines.push(Vec::new());\n  359 |       }\n  360 | \n  361 |       let current_line = token.get_dst_line();\n  362 | \n  363 |       let mut segment: Vec<i64> = vec![i64::from(token.get_dst_col())];\n  364 | \n  365 |       if let Some(source_id) = token.get_source_id() {\n  366 |         segment.push(i64::from(source_id));\n  367 |         segment.push(i64::from(token.get_src_line()));\n  368 |         segment.push(i64::from(token.get_src_col()));\n  369 | \n  370 |         if let Some(name_id) = token.get_name_id() {\n  371 |           segment.push(i64::from(name_id));\n  372 |         }\n  373 |       }\n  374 | \n  375 |       lines[current_line as usize].push(segment);\n  376 |     }\n  377 | \n  378 |     lines\n  379 |   }\n  380 | \n  381 |   /// The list of source indices that should be excluded from debugging.\n  382 |   #[napi(getter, js_name = \"x_google_ignoreList\")]\n  383 |   pub fn x_google_ignore_list(&self) -> Option<Vec<u32>> {\n  384 |     self.json.x_google_ignore_list.clone()\n  385 |   }","lines":61,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/types/binding_magic_string.rs#L325-L385"}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`napi_error.rs` does a redundant double downcast in both `resolve_error` and `load_error`: it calls `err.downcast_ref::<napi::Error>().is_some()` and then, inside the branch, `err.downcast::<napi::Error>().unwrap()`, re-doing the type check. The first borrow is wasted and the `.unwrap()` is a latent footgun if the two lines drift apart.","fix":"Use a single fallible `match err.downcast::<napi::Error>() { Ok(cause) => ..., Err(err) => ... }`.","locations":[{"ref":"crates/rolldown_binding/src/utils/napi_error.rs:2-6","code":"    2 |   if err.downcast_ref::<napi::Error>().is_some() {\n    3 |     let mut new_err =\n    4 |       napi::Error::from_reason(format!(\"Errored while resolving {specifier:?} in `this.resolve`.\"));\n    5 |     new_err.set_cause(err.downcast::<napi::Error>().unwrap());\n    6 |     new_err","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/utils/napi_error.rs#L2-L6"},{"ref":"crates/rolldown_binding/src/utils/napi_error.rs:15-19","code":"   15 |   if err.downcast_ref::<napi::Error>().is_some() {\n   16 |     let mut new_err =\n   17 |       napi::Error::from_reason(format!(\"Errored while load {specifier:?} in `this.load`.\"));\n   18 |     new_err.set_cause(err.downcast::<napi::Error>().unwrap());\n   19 |     new_err","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/utils/napi_error.rs#L15-L19"}]},{"id":"PERF_19","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"In `FilenameTemplate::render`, `let extname = if ext.is_empty() { \"\" } else { &format!(\".{ext}\") };` borrows a\ntemporary `String` (kept alive by temporary-lifetime extension). The `format!` allocation is created solely to take\na `&str` from it and the `&format!(...)` borrow pattern is fragile.","fix":"Bind an owned `String`: `let extname = if ext.is_empty() { String::new() } else { format!(\".{ext}\") };` then `tmp.replace_all(\"[extname]\", &extname)`.","locations":[{"ref":"crates/rolldown_common/src/inner_bundler_options/types/filename_template.rs:93-97","code":"   93 |     if let Some(ext) = extension {\n   94 |       let extname = if ext.is_empty() { \"\" } else { &format!(\".{ext}\") };\n   95 |       tmp = tmp.replace_all(\"[ext]\", ext);\n   96 |       tmp = tmp.replace_all(\"[extname]\", extname);\n   97 |     }","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/inner_bundler_options/types/filename_template.rs#L93-L97"}]},{"id":"PERF_20","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`PathsOutputOption::resolve_all` on the `FxHashMap` variant does `map.clone()` only to wrap the same map back into the\nsame variant, cloning every path string even when no async resolution is needed. Callers that only need lookups pay a\nfull HashMap clone.","fix":"Return `Cow` / take `self` by value where possible, or special-case the `FxHashMap` variant in callers to avoid the clone.","locations":[{"ref":"crates/rolldown_common/src/inner_bundler_options/types/output_option/paths.rs:39-51","code":"   39 |   pub async fn resolve_all<'a>(&self, ids: impl Iterator<Item = &'a str>) -> PathsOutputOption {\n   40 |     match self {\n   41 |       Self::FxHashMap(map) => Self::FxHashMap(map.clone()),\n   42 |       Self::Fn(f) => {\n   43 |         let mut resolved = FxHashMap::default();\n   44 |         for id in ids {\n   45 |           if let Ok(path) = f(id).await {\n   46 |             resolved.insert(id.to_string(), path);\n   47 |           }\n   48 |         }\n   49 |         Self::FxHashMap(resolved)\n   50 |       }\n   51 |     }","lines":13,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/inner_bundler_options/types/output_option/paths.rs#L39-L51"}]},{"id":"PERF_21","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`to_module_info` pushes one `CompactStr::new(\"*\")` per export-star import record, producing duplicate `\"*\"` entries\nin the public `ModuleInfo.exports` list when a module has multiple `export * from` statements. Rollup exposes a\nsingle `\"*\"`. This both allocates redundantly and exposes a misleading deduped-looking list to plugins.","fix":"Collect star-export presence as a boolean and push a single `\"*\"` if any export-star record exists, instead of mapping each record to a separate `\"*\"`.","locations":[{"ref":"crates/rolldown_common/src/module/normal_module.rs:94-113","code":"   94 |       exports: {\n   95 |         let mut exports = self.ecma_view.named_exports.keys().cloned().collect_vec();\n   96 |         if let Some(e) = raw_import_records {\n   97 |           exports.extend(\n   98 |             e.iter()\n   99 |               .filter(|&rec| rec.meta.contains(ImportRecordMeta::IsExportStar))\n  100 |               .map(|_| CompactStr::new(\"*\")),\n  101 |           );\n  102 |         } else {\n  103 |           exports.extend(\n  104 |             self\n  105 |               .ecma_view\n  106 |               .import_records\n  107 |               .iter()\n  108 |               .filter(|&rec| rec.meta.contains(ImportRecordMeta::IsExportStar))\n  109 |               .map(|_| CompactStr::new(\"*\")),\n  110 |           );\n  111 |         }\n  112 |         exports\n  113 |       },","lines":20,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/module/normal_module.rs#L94-L113"}]},{"id":"PERF_22","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`ImportedExports::merge` does `lhs.extend(rhs.clone())`, which allocates a full copy of the `rhs` `FxHashSet` and\nthen drops it. `extend(rhs.iter().cloned())` clones only the elements being inserted without the extra set allocation.","fix":"Replace `lhs.extend(rhs.clone())` with `lhs.extend(rhs.iter().cloned())`.","locations":[{"ref":"crates/rolldown_common/src/types/lazy_barrel.rs:97-103","code":"   97 |   pub fn merge(&mut self, other: &Self) {\n   98 |     match (&mut *self, other) {\n   99 |       (Self::All, _) => {}\n  100 |       (_, Self::All) => *self = Self::All,\n  101 |       (Self::Partial(lhs), Self::Partial(rhs)) => lhs.extend(rhs.clone()),\n  102 |     }\n  103 |   }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/types/lazy_barrel.rs#L97-L103"}]},{"id":"PERF_23","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`extract_context_variables_from_action` is called for every devtools event and recursively visits every string value in the action payload, including large code/content strings inside arrays (e.g. `AssetsReady.assets[].content`, `HookRenderChunkStart.content`, module/chunk lists). Since real placeholders only ever occur at top level (build_id/session_id/call_id/trigger), scanning megabytes of user code on the hot formatting path is wasted work. It can also misfire: a content string that is exactly `${...}` would be wrongly treated as a context variable.","fix":"Only scan the top-level object for placeholders (placeholders are never nested), avoiding recursion into large content payloads.","locations":[{"ref":"crates/rolldown_devtools/src/devtools_formatter.rs:98-119","code":"   98 | pub fn extract_context_variables_from_action(meta: &serde_json::Value) -> FxHashSet<String> {\n   99 |   fn visit(meta: &serde_json::Value, context_variables: &mut FxHashSet<String>) {\n  100 |     if let serde_json::Value::Object(map) = meta {\n  101 |       for (_key, value) in map {\n  102 |         match value {\n  103 |           serde_json::Value::String(value) if value.starts_with(\"${\") && value.ends_with('}') => {\n  104 |             // Check if the value is a placeholder for provided data\n  105 |             {\n  106 |               let var_name = &value[2..value.len() - 1];\n  107 |               context_variables.insert(var_name.to_string());\n  108 |             }\n  109 |           }\n  110 |           _ => visit(value, context_variables),\n  111 |         }\n  112 |       }\n  113 |     }\n  114 |   }\n  115 | \n  116 |   let mut contextual_fields = FxHashSet::default();\n  117 |   visit(meta, &mut contextual_fields);\n  118 |   contextual_fields\n  119 | }","lines":22,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/devtools_formatter.rs#L98-L119"}]},{"id":"PERF_24","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"The plugin hook drivers always allocate a `to_string()`/`String` for the plugin name and module ids to populate `trace_action!` fields even when tracing is disabled. In `load` and `resolve_id` the `trace_action!` arguments (`plugin.call_name().to_string()`, `args.id.to_string()`, content clones) are evaluated unconditionally inside the per-plugin loop, unlike `render_chunk` which guards them with `trace_action_enabled!()`. For builds with many modules x many plugins this is avoidable allocation on the hot path.","fix":"Gate the `trace_action!` blocks in `load`/`resolve_id` behind `trace_action_enabled!()` as already done in `render_chunk`, or rely on `trace_action!` being a no-op macro that does not evaluate its args when disabled.","locations":[{"ref":"crates/rolldown_plugin/src/plugin_driver/build_hooks.rs:199-231","code":"  199 |       let ret = async {\n  200 |         trace_action!(action::HookLoadCallStart {\n  201 |           action: \"HookLoadCallStart\",\n  202 |           module_id: args.id.to_string(),\n  203 |           plugin_name: plugin.call_name().to_string(),\n  204 |           plugin_id: plugin_idx.raw(),\n  205 |           call_id: \"${call_id}\",\n  206 |         });\n  207 |         let load_ctx = Arc::new(LoadPluginContext::new(ctx.clone(), args.module_idx));\n  208 |         let start = self.start_timing();\n  209 |         let result = plugin.call_load(load_ctx, args).await;\n  210 |         self.record_timing(plugin_idx, start);\n  211 |         if let Some(r) = result? {\n  212 |           trace_action!(action::HookLoadCallEnd {\n  213 |             action: \"HookLoadCallEnd\",\n  214 |             module_id: args.id.to_string(),\n  215 |             content: Some(r.code.to_string()),\n  216 |             plugin_name: plugin.call_name().to_string(),\n  217 |             plugin_id: plugin_idx.raw(),\n  218 |             call_id: \"${call_id}\",\n  219 |           });\n  220 |           anyhow::Ok(Some(r))\n  221 |         } else {\n  222 |           trace_action!(action::HookLoadCallEnd {\n  223 |             action: \"HookLoadCallEnd\",\n  224 |             module_id: args.id.to_string(),\n  225 |             content: None,\n  226 |             plugin_name: plugin.call_name().to_string(),\n  227 |             plugin_id: plugin_idx.raw(),\n  228 |             call_id: \"${call_id}\",\n  229 |           });\n  230 |           Ok(None)\n  231 |         }","lines":33,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin/src/plugin_driver/build_hooks.rs#L199-L231"},{"ref":"crates/rolldown_plugin/src/plugin_driver/build_hooks.rs:85-130","code":"   85 |       let ret = async {\n   86 |         trace_action!(action::HookResolveIdCallStart {\n   87 |           action: \"HookResolveIdCallStart\",\n   88 |           importer: args.importer.map(ToString::to_string),\n   89 |           module_request: args.specifier.to_string(),\n   90 |           import_kind: args.kind.to_string(),\n   91 |           plugin_name: plugin.call_name().to_string(),\n   92 |           plugin_id: plugin_idx.raw(),\n   93 |           trigger: \"${hook_resolve_id_trigger}\",\n   94 |           call_id: \"${call_id}\",\n   95 |         });\n   96 |         let start = self.start_timing();\n   97 |         let result = plugin\n   98 |           .call_resolve_id(\n   99 |             &skipped_resolve_calls.map_or_else(\n  100 |               || ctx.clone(),\n  101 |               |skipped_resolve_calls| {\n  102 |                 PluginContext::fork_with_skipped_resolve_calls(ctx, skipped_resolve_calls.clone())\n  103 |               },\n  104 |             ),\n  105 |             args,\n  106 |           )\n  107 |           .await;\n  108 |         self.record_timing(plugin_idx, start);\n  109 |         if let Some(r) = result? {\n  110 |           trace_action!(action::HookResolveIdCallEnd {\n  111 |             action: \"HookResolveIdCallEnd\",\n  112 |             resolved_id: Some(r.id.to_string()),\n  113 |             is_external: r.external.map(|v| v.is_external()),\n  114 |             plugin_name: plugin.call_name().to_string(),\n  115 |             plugin_id: plugin_idx.raw(),\n  116 |             trigger: \"${hook_resolve_id_trigger}\",\n  117 |             call_id: \"${call_id}\",\n  118 |           });\n  119 |           anyhow::Ok(Some(r))\n  120 |         } else {\n  121 |           trace_action!(action::HookResolveIdCallEnd {\n  122 |             action: \"HookResolveIdCallEnd\",\n  123 |             resolved_id: None,\n  124 |             is_external: None,\n  125 |             plugin_name: plugin.call_name().to_string(),\n  126 |             plugin_id: plugin_idx.raw(),\n  127 |             trigger: \"${hook_resolve_id_trigger}\",\n  128 |             call_id: \"${call_id}\",\n  129 |           });\n  130 |           Ok(None)","lines":46,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin/src/plugin_driver/build_hooks.rs#L85-L130"}]},{"id":"PERF_25","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"IsolatedDeclarationPlugin::transform_ast, for every TS/TSX module, walks the AST to collect type-only import specifiers and then for each specifier performs an async `ctx.resolve` followed by `ctx.load` (lines 40-45). This forces full resolution and loading of every type-only dependency of every TS module during transform, which is comparatively expensive per-module work performed on the critical transform path. The loaded result is discarded (only used to ensure the module is in the graph for declaration emit).","fix":"Cache/deduplicate resolution+load of type-only specifiers (e.g. across modules) or load lazily only when isolated-declarations actually needs the referenced module, instead of eagerly resolving+loading every type import on every TS module transform.","locations":[{"ref":"crates/rolldown_plugin_isolated_declaration/src/lib.rs:34-45","code":"   34 |       let type_import_specifiers = args.ast.program.with_mut(|fields| {\n   35 |         let mut visitor = TypeImportVisitor { imported: vec![].into_in(fields.allocator) };\n   36 |         visitor.visit_program(fields.program);\n   37 |         visitor.imported\n   38 |       });\n   39 | \n   40 |       for specifier in type_import_specifiers {\n   41 |         let resolved_id = ctx.resolve(&specifier, Some(args.id), None).await??;\n   42 |         if matches!(resolved_id.external, ResolvedExternal::Bool(false)) {\n   43 |           ctx.load(&resolved_id.id, None, resolved_id.module_def_format).await?;\n   44 |         }\n   45 |       }","lines":12,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_isolated_declaration/src/lib.rs#L34-L45"}]},{"id":"PERF_26","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`to_absolute_glob` calls `rolldown_utils::futures::block_on(future)` to resolve a bare glob specifier while executing inside the synchronous AST visitor (`visit_expression` -> `transform_glob_import` -> `eval_glob_expr`). Blocking on a resolve future from within the async `transform` hook's call stack stalls the executor thread for every unresolved bare glob and serializes what could be concurrent resolution work.","fix":"Collect bare glob specifiers during the visit and resolve them concurrently (e.g. `block_on_spawn_all`) the way `vite-dynamic-import-vars` handles `async_imports`, instead of blocking once per glob.","locations":[{"ref":"crates/rolldown_plugin_vite_import_glob/src/utils.rs:294-313","code":"  294 |       let future = self.ctx.resolve(\n  295 |         glob,\n  296 |         Some(self.id),\n  297 |         is_sub_imports_pattern.then(|| {\n  298 |           let mut custom = rolldown_plugin::CustomField::new();\n  299 |           custom.insert(ViteImportGlob, ViteImportGlobValue(true));\n  300 |           rolldown_plugin::PluginContextResolveOptions {\n  301 |             custom: Arc::new(custom),\n  302 |             ..Default::default()\n  303 |           }\n  304 |         }),\n  305 |       );\n  306 | \n  307 |       let resolved_id =\n  308 |         rolldown_utils::futures::block_on(future).ok().and_then(Result::ok).map(|resolved| {\n  309 |           path_posix::normalize(&rolldown_utils::pattern_filter::normalize_path(\n  310 |             resolved.id.as_str(),\n  311 |           ))\n  312 |           .into_owned()\n  313 |         });","lines":20,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_import_glob/src/utils.rs#L294-L313"}]},{"id":"PERF_27","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`accumulate_sourcemap_data_size` counts collection sizes with `.count()` on `get_names()`/`get_sources()`/`get_tokens()`. `Iterator::count()` is not specialized for `ExactSizeIterator`, so each call fully traverses the underlying Vec; `get_tokens().count()` walks every token of every appended sourcemap purely to pre-size the builder, an extra O(total_tokens) pass in the bundling hot path on top of the traversal `join()` already performs.","fix":"Use a length accessor (e.g. `ExactSizeIterator::len()` if available, or an upstream count API) to size the builder in O(1) instead of re-walking every token.","locations":[{"ref":"crates/rolldown_sourcemap/src/source_joiner.rs:73-79","code":"   73 |   fn accumulate_sourcemap_data_size(&mut self, hint: &SourceMap) {\n   74 |     self.enable_sourcemap = true;\n   75 |     self.names_len += hint.get_names().count();\n   76 |     self.sources_len += hint.get_sources().count();\n   77 |     self.tokens_len += hint.get_tokens().count();\n   78 |     self.token_chunks_len += 1;\n   79 |   }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_sourcemap/src/source_joiner.rs#L73-L79"}]},{"id":"PERF_28","type":"performance","type_label":"Performance","severity":"low","easy":true,"description":"`WatchTask::is_watched_file` allocates a fresh `String` via `path.replace('\\\\', \"/\")` on every\ncall on Windows, even when the fast-path `contains` already succeeded for most paths. Since this is\ninvoked once per changed file per task during every debounce flush, the allocation is avoidable for\nthe common (forward-slash / already-watched) case. Minor, Windows-only.","fix":"Only compute the normalized form when `path` actually contains a backslash, or normalize watched paths once at insertion time so lookups never need to reallocate.","locations":[{"ref":"crates/rolldown_watcher/src/watch_task.rs:354-366","code":"  354 |   fn is_watched_file(&self, path: &str) -> bool {\n  355 |     if self.watched_files.contains(path) {\n  356 |       return true;\n  357 |     }\n  358 | \n  359 |     // Windows path normalization\n  360 |     #[cfg(windows)]\n  361 |     if self.watched_files.contains(path.replace('\\\\', \"/\").as_str()) {\n  362 |       return true;\n  363 |     }\n  364 | \n  365 |     false\n  366 |   }","lines":13,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_watcher/src/watch_task.rs#L354-L366"}]},{"id":"PERF_29","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`has_changed` calls `self.to_string()` (full allocation of the generated output) and also `self.len()` (a separate full chunk traversal) on every call. For a frequently-queried change flag this is expensive; the `self.source.len() != self.len()` short-circuit helps only when lengths differ.","fix":"Compare fragment-by-fragment against the source without materializing a full String (stream-compare), or track a dirty flag set by mutating operations.","locations":[{"ref":"crates/string_wizard/src/magic_string/mod.rs:116-118","code":"  116 |   pub fn has_changed(&self) -> bool {\n  117 |     self.source.len() != self.len() || self.source.as_ref() != self.to_string()\n  118 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/mod.rs#L116-L118"}]},{"id":"PERF_30","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`last_line` builds its result by repeated prefix concatenation: `content.to_string() + &line_str` and `chunk_outro + &line_str` allocate a new String each chunk and copy the entire accumulated suffix again, giving O(n^2) total copying across n chunks when no newline is found early. It also calls `.to_string()` on every chunk content.","fix":"Collect the trailing fragments into a `Vec<&str>`/`VecDeque` while walking backwards and join once at the end, or push onto a single buffer in reverse and reverse at the end, avoiding repeated whole-suffix reallocation.","locations":[{"ref":"crates/string_wizard/src/magic_string/mod.rs:172-228","code":"  172 |   pub fn last_line(&self) -> String {\n  173 |     // Check outro first (last in output order)\n  174 |     for outro_part in self.outro.iter().rev() {\n  175 |       if let Some(line_index) = memchr::memrchr(b'\\n', outro_part.as_bytes()) {\n  176 |         return outro_part[line_index + 1..].to_string();\n  177 |       }\n  178 |     }\n  179 | \n  180 |     let mut line_str = self.outro.iter().map(|s| s.as_ref()).collect::<String>();\n  181 | \n  182 |     // Traverse chunks from last to first\n  183 |     let mut chunk_idx = Some(self.last_chunk_idx);\n  184 |     while let Some(idx) = chunk_idx {\n  185 |       let chunk = &self.chunks[idx];\n  186 | \n  187 |       // Check chunk outro\n  188 |       for outro_part in chunk.outro.iter().rev() {\n  189 |         if let Some(line_index) = memchr::memrchr(b'\\n', outro_part.as_bytes()) {\n  190 |           return outro_part[line_index + 1..].to_string() + &line_str;\n  191 |         }\n  192 |       }\n  193 |       let chunk_outro: String = chunk.outro.iter().map(|s| s.as_ref()).collect();\n  194 |       line_str = chunk_outro + &line_str;\n  195 | \n  196 |       // Check chunk content (edited or original)\n  197 |       let content = chunk\n  198 |         .edited_content\n  199 |         .as_ref()\n  200 |         .map(|s| s.as_ref())\n  201 |         .unwrap_or_else(|| chunk.span.text(&self.source));\n  202 |       if let Some(line_index) = memchr::memrchr(b'\\n', content.as_bytes()) {\n  203 |         return content[line_index + 1..].to_string() + &line_str;\n  204 |       }\n  205 |       line_str = content.to_string() + &line_str;\n  206 | \n  207 |       // Check chunk intro\n  208 |       for intro_part in chunk.intro.iter().rev() {\n  209 |         if let Some(line_index) = memchr::memrchr(b'\\n', intro_part.as_bytes()) {\n  210 |           return intro_part[line_index + 1..].to_string() + &line_str;\n  211 |         }\n  212 |       }\n  213 |       let chunk_intro: String = chunk.intro.iter().map(|s| s.as_ref()).collect();\n  214 |       line_str = chunk_intro + &line_str;\n  215 | \n  216 |       chunk_idx = chunk.prev;\n  217 |     }\n  218 | \n  219 |     // Check intro last (first in output order, but we're going backwards)\n  220 |     for intro_part in self.intro.iter().rev() {\n  221 |       if let Some(line_index) = memchr::memrchr(b'\\n', intro_part.as_bytes()) {\n  222 |         return intro_part[line_index + 1..].to_string() + &line_str;\n  223 |       }\n  224 |     }\n  225 | \n  226 |     let intro_str: String = self.intro.iter().map(|s| s.as_ref()).collect();\n  227 |     intro_str + &line_str\n  228 |   }","lines":57,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/mod.rs#L172-L228"}]},{"id":"PERF_31","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`alias_name_for_import_meta_hot` for the HMR finalizer allocates a `String` via\n`format!(\"hot_{}\", self.module.repr_name)` on every call. `rewrite_import_meta_hot` likewise\nbuilds `format!(\"hot_{}\", self.module.repr_name)` for each `import.meta.hot` occurrence in the\nmodule body. For modules with many `import.meta.hot` references this re-formats the same string\nrepeatedly. Caching the computed hot name once per finalizer would avoid the repeated\nallocation.","fix":"Compute `hot_<repr_name>` once when constructing the finalizer and reuse the cached value.","locations":[{"ref":"crates/rolldown/src/hmr/hmr_ast_finalizer.rs:413-417","code":"  413 |   pub fn rewrite_import_meta_hot(&self, expr: &mut ast::Expression<'ast>) {\n  414 |     if expr.is_import_meta_hot() {\n  415 |       let hot_name = format!(\"hot_{}\", self.module.repr_name);\n  416 |       *expr = self.ast_factory.make_id_ref_expr(SPAN, &hot_name);\n  417 |     }","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/hmr/hmr_ast_finalizer.rs#L413-L417"},{"ref":"crates/rolldown/src/hmr/utils.rs:164-166","code":"  164 |   fn alias_name_for_import_meta_hot(&self) -> ast::Str<'ast> {\n  165 |     self.builder().str(&format!(\"hot_{}\", self.module.repr_name))\n  166 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/hmr/utils.rs#L164-L166"}]},{"id":"PERF_32","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`enter_scope`/`leave_scope` recompute `TopLevel` and `IsRootLevel` by iterating the entire `scope_stack` (`.iter().rev().all(...)`) on every scope push/pop. For deeply nested code this is O(depth) per scope transition, i.e. O(depth^2) overall during a traversal. The flags could be maintained incrementally.","fix":"Track counts of non-top/non-block scopes incrementally (increment on enter, decrement on leave) and set the flags from those counts instead of rescanning the stack each time.","locations":[{"ref":"crates/rolldown/src/module_finalizers/impl_visit_mut.rs:25-49","code":"   25 |   fn enter_scope(\n   26 |     &mut self,\n   27 |     flags: oxc::semantic::ScopeFlags,\n   28 |     _scope_id: &std::cell::Cell<Option<oxc::semantic::ScopeId>>,\n   29 |   ) {\n   30 |     self.scope_stack.push(flags);\n   31 |     self.state.set(\n   32 |       TraverseState::TopLevel,\n   33 |       self.scope_stack.iter().rev().all(|flag| flag.is_block() || flag.is_top()),\n   34 |     );\n   35 |     self\n   36 |       .state\n   37 |       .set(TraverseState::IsRootLevel, self.scope_stack.iter().rev().all(|flag| flag.is_top()));\n   38 |   }\n   39 | \n   40 |   fn leave_scope(&mut self) {\n   41 |     self.scope_stack.pop();\n   42 |     self.state.set(\n   43 |       TraverseState::TopLevel,\n   44 |       self.scope_stack.iter().rev().all(|flag| flag.is_block() || flag.is_top()),\n   45 |     );\n   46 |     self\n   47 |       .state\n   48 |       .set(TraverseState::IsRootLevel, self.scope_stack.iter().rev().all(|flag| flag.is_top()));\n   49 |   }","lines":25,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/module_finalizers/impl_visit_mut.rs#L25-L49"}]},{"id":"PERF_33","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`Renamer::new` allocates a `Vec` of `&str` (`manual_reserved`), then `extend`s it with two more\nentries, only to immediately consume it via `iter().chain(...).map(CompactStr::new)`. The\nintermediate `Vec` and the `extend` are avoidable; the format-specific reserved names could be\nchained as iterators directly into the `ConflictResolver::new` argument.","fix":"Build the reserved-name iterator by chaining slices (e.g.\n`base_reserved.iter().chain([\"Object\",\"Promise\"].iter()).chain(RESERVED_KEYWORDS.iter())...`)\nwithout the intermediate `Vec`/`extend`.","locations":[{"ref":"crates/rolldown/src/utils/renamer.rs:34-51","code":"   34 |     let mut manual_reserved = match format {\n   35 |       OutputFormat::Esm => vec![],\n   36 |       OutputFormat::Cjs => vec![\"module\", \"require\", \"__filename\", \"__dirname\", \"exports\"],\n   37 |       OutputFormat::Iife | OutputFormat::Umd => vec![\"exports\"], // Also for AMD, but we don't support it yet.\n   38 |     };\n   39 |     // https://github.com/rollup/rollup/blob/bfbea66569491f5466fbba99de2ba6a0225f851b/src/Chunk.ts#L1359\n   40 |     manual_reserved.extend([\"Object\", \"Promise\"]);\n   41 | \n   42 |     Self {\n   43 |       canonical_names: FxHashMap::default(),\n   44 |       symbol_db,\n   45 |       resolver: ConflictResolver::new(\n   46 |         manual_reserved\n   47 |           .iter()\n   48 |           .chain(RESERVED_KEYWORDS.iter())\n   49 |           .chain(GLOBAL_OBJECTS.iter())\n   50 |           .map(|s| CompactStr::new(s)),\n   51 |       ),","lines":18,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/renamer.rs#L34-L51"}]},{"id":"PERF_34","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"In the `moduleSideEffects` function branch, `id` is created as an owned `String` via `id.to_string()` and then passed as `id.clone()` to `invoke_async`, allocating a second copy needlessly. The closure is `move` and `id` is not used afterward.","fix":"Pass `id` directly instead of `id.clone()`.","locations":[{"ref":"crates/rolldown_binding/src/options/binding_input_options/binding_treeshake.rs:85-93","code":"   85 |           let id = id.to_string();\n   86 |           let ts_fn = Arc::clone(&ts_fn);\n   87 |           Box::pin(async move {\n   88 |             ts_fn\n   89 |               .invoke_async((id.clone(), is_external).into())\n   90 |               .await\n   91 |               .context(\"treeshake.moduleSideEffects option\")\n   92 |               .map_err(anyhow::Error::from)\n   93 |           })","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/options/binding_input_options/binding_treeshake.rs#L85-L93"}]},{"id":"PERF_35","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`BundleCoordinator::update_watch_paths` builds `cwd` via\n`bundler.options().cwd.to_string_lossy().to_string()` on every call, and `WatchTask::\nupdate_watch_files_from` likewise calls `options.cwd.to_string_lossy()` once per invocation. These\nrun on every rebuild while holding the bundler/fs-watcher lock. The cwd is immutable for the\nlifetime of the bundler, so the string conversion could be cached once. Minor.","fix":"Cache the cwd string once (e.g. on the coordinator/task) instead of re-deriving it per rebuild.","locations":[{"ref":"crates/rolldown_dev/src/bundle_coordinator.rs:484-505","code":"  484 |   async fn update_watch_paths(&self) -> BuildResult<()> {\n  485 |     let bundler = self.bundler.lock().await;\n  486 |     let watch_files = bundler.watch_files();\n  487 |     let cwd = bundler.options().cwd.to_string_lossy().to_string();\n  488 | \n  489 |     let include = self.ctx.options.watch_include.as_deref();\n  490 |     let exclude = self.ctx.options.watch_exclude.as_deref();\n  491 | \n  492 |     let mut watcher = self.watcher.lock().ok().context(\"Failed to acquire watcher lock\")?;\n  493 |     let mut paths_mut = watcher.paths_mut();\n  494 |     for watch_file in watch_files.iter() {\n  495 |       let watch_file = &**watch_file;\n  496 |       if !self.watched_files.contains(watch_file)\n  497 |         && pattern_filter::filter(exclude, include, watch_file, &cwd).inner()\n  498 |       {\n  499 |         self.watched_files.insert(watch_file.to_string().into());\n  500 |         paths_mut.add(watch_file.as_path(), RecursiveMode::NonRecursive)?;\n  501 |       }\n  502 |     }\n  503 |     paths_mut.commit()?;\n  504 |     Ok(())\n  505 |   }","lines":22,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_dev/src/bundle_coordinator.rs#L484-L505"},{"ref":"crates/rolldown_watcher/src/watch_task.rs:260-301","code":"  260 |   fn update_watch_files_from(\n  261 |     fs_watcher: &std::sync::Mutex<DynFsWatcher>,\n  262 |     watched_files: &FxDashSet<ArcStr>,\n  263 |     options: &NormalizedBundlerOptions,\n  264 |     files: &[ArcStr],\n  265 |   ) -> BuildResult<()> {\n  266 |     let mut fs_watcher = fs_watcher.lock().expect(\"fs_watcher lock poisoned\");\n  267 |     let mut watcher_paths = fs_watcher.paths_mut();\n  268 | \n  269 |     for file in files {\n  270 |       let file_str = file.as_str();\n  271 |       if watched_files.contains(file_str) {\n  272 |         continue;\n  273 |       }\n  274 |       let path = Path::new(file_str);\n  275 |       if !path.exists() {\n  276 |         continue;\n  277 |       }\n  278 |       if pattern_filter::filter(\n  279 |         options.watch.exclude.as_deref(),\n  280 |         options.watch.include.as_deref(),\n  281 |         file_str,\n  282 |         options.cwd.to_string_lossy().as_ref(),\n  283 |       )\n  284 |       .inner()\n  285 |       {\n  286 |         match watcher_paths.add(path, RecursiveMode::NonRecursive) {\n  287 |           Ok(()) => {\n  288 |             tracing::debug!(name = \"notify watch\", path = ?path);\n  289 |             watched_files.insert(file.clone());\n  290 |           }\n  291 |           Err(e) => {\n  292 |             tracing::debug!(name = \"notify watch skipped\", path = ?path, error = ?e);\n  293 |           }\n  294 |         }\n  295 |       }\n  296 |     }\n  297 | \n  298 |     watcher_paths.commit().map_err_to_unhandleable()?;\n  299 | \n  300 |     Ok(())\n  301 |   }","lines":42,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_watcher/src/watch_task.rs#L260-L301"}]},{"id":"PERF_36","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`contains_script_closing_tag` constructs a fresh `memchr::memmem::Finder` and re-scans from the start of the shrinking `remaining` slice in a loop, advancing only by `pos + 2`. This is still O(n) but does redundant re-slicing/re-search versus iterating over the original buffer with absolute offsets.","fix":"Use `Finder::find_iter(source)` and index `source[pos..pos+8]` with bounds checks, avoiding repeated re-slicing of `remaining`.","locations":[{"ref":"crates/rolldown_ecmascript_utils/src/source_utils.rs:2-16","code":"    2 | pub fn contains_script_closing_tag(source: &[u8]) -> bool {\n    3 |   // Use memchr to find `\"<\/\"` (start of a closing tag), then check if followed by `script` (case insensitive)\n    4 |   let finder = memchr::memmem::Finder::new(b\"<\/\");\n    5 |   let mut remaining = source;\n    6 |   while let Some(pos) = finder.find(remaining) {\n    7 |     // Check if there's enough bytes for `<\/script` (8 bytes)\n    8 |     if remaining.len() >= pos + 8 {\n    9 |       if is_script_close_tag(&remaining[pos..pos + 8]) {\n   10 |         return true;\n   11 |       }\n   12 |     }\n   13 |     // Move past the current `<\/` to continue searching\n   14 |     remaining = &remaining[pos + 2..];\n   15 |   }\n   16 |   false","lines":15,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_ecmascript_utils/src/source_utils.rs#L2-L16"}]},{"id":"PERF_37","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`update_options` allocates a fresh `String` for every options field (`str.value.to_string()`, `str.value.as_str().to_string()`) and the query object branch calls `v.value.to_string()` (NumericLiteral) producing a temporary that is then borrowed via `&v.value.to_string()` only to be written immediately. These are per-`import.meta.glob`-call allocations that could be avoided/reduced, though impact is small.","fix":"Where lifetimes allow, store borrowed `&str`/`Cow` and `write!` numeric values directly into the buffer instead of allocating intermediate `String`s.","locations":[{"ref":"crates/rolldown_plugin_vite_import_glob/src/utils.rs:626-643","code":"  626 |               let value = match &p.value {\n  627 |                 Expression::StringLiteral(v) => v.value.as_str(),\n  628 |                 Expression::BooleanLiteral(v) => {\n  629 |                   if v.value {\n  630 |                     \"true\"\n  631 |                   } else {\n  632 |                     \"false\"\n  633 |                   }\n  634 |                 }\n  635 |                 Expression::NumericLiteral(v) => &v.value.to_string(),\n  636 |                 Expression::NullLiteral(_) => \"null\",\n  637 |                 _ => continue,\n  638 |               };\n  639 | \n  640 |               if query_string.len() != 1 {\n  641 |                 query_string.push('&');\n  642 |               }\n  643 |               write!(query_string, \"{key}={value}\").unwrap();","lines":18,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_import_glob/src/utils.rs#L626-L643"}]},{"id":"PERF_38","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In the reporter `write_bundle`, the entries are filtered per group inside the loop with `log_entries.iter().filter(|e| e.group == group).collect::<Vec<_>>()` for each of the three groups, allocating three temporary vectors and scanning all entries three times. Minor for typical bundle sizes.","fix":"Partition entries by group once (e.g. into three vectors or a single stable sort by group then size) instead of filtering per group.","locations":[{"ref":"crates/rolldown_plugin_vite_reporter/src/lib.rs:223-228","code":"  223 |       for group in utils::GROUPS {\n  224 |         let mut filtered = log_entries.iter().filter(|e| e.group == group).collect::<Vec<_>>();\n  225 |         if filtered.is_empty() {\n  226 |           continue;\n  227 |         }\n  228 |         filtered.sort_by_key(|a| a.size);","lines":6,"link":"https://github.com/rolldo  13); line 28 references 'From<JSONSourceMap> impl (line 64)' (actually 68). These brittle line references drift on every edit.","fix":"Drop the inline line numbers; reference impls by name only.","locations":[{"ref":"crates/rolldown_binding/src/types/binding_sourcemap.rs:4-6","code":"    4 | // This struct is used to both pass to JS and receive from JS:\n    5 | // - Pass to JS: `From<JSONSourceMap>` impl (line 61) used in hook outputs\n    6 | // - Receive from JS: `TryFrom<BindingSourcemap>` impl (line 10) used in JsOutputChunk","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/types/binding_sourcemap.rs#L4-L6"},{"ref":"crates/rolldown_binding/src/types/binding_sourcemap.rs:26-29","code":"   26 | // This struct is used to both pass to JS and receive from JS:\n   27 | // - Part of BindingSourcemap Either type, used in both directions\n   28 | // - Pass to JS: Created in From<JSONSourceMap> impl (line 64)\n   29 | // - Receive from JS: Converted in TryFrom<BindingSourcemap> impl (line 16)","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/types/binding_sourcemap.rs#L26-L29"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The struct field comment \"emitted chunk corresponding reference_id, used to PluginContext#getFileName ...\" sits above\n`pre_rendered_chunk` but describes a `reference_id` field that does not exist on this struct - an orphaned/misplaced\ncomment.","fix":"Remove or correct the orphaned comment so it accurately describes `pre_rendered_chunk`.","locations":[{"ref":"crates/rolldown_common/src/chunk/mod.rs:74-76","code":"   74 |   pub file_name: Option<ArcStr>,\n   75 |   // emitted chunk corresponding reference_id, used to `PluginContext#getFileName` to search the emitted chunk name\n   76 |   pub pre_rendered_chunk: Option<Roll encies: &FxHashMap<usize, FxHashSet<usize>>,\n  331 |   ) -> Vec<usize> {\n  332 |     let mut visited: FxHashSet<usize> = FxHashSet::default();\n  333 |     let mut stack: Vec<usize> = vec![entry_module_idx];\n  334 | \n  335 |     while let Some(module_idx) = stack.pop() {\n  336 |       if visited.contains(&module_idx) {\n  337 |         continue;\n  338 |       }\n  339 |       visited.insert(module_idx);\n  340 | \n  341 |       if let Some(deps) = dependencies.get(&module_idx) {\n  342 |         for &dep_idx in deps {\n  343 |           if !visited.contains(&dep_idx) {\n  344 |             stack.push(dep_idx);\n  345 |           }\n  346 |         }\n  347 |       }\n  348 |     }\n  349 | \n  350 |     visited.into_iter().collect()\n  351 |   }","lines":26,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_bundle_analyzer/src/lib.rs#L326-L351"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The comment justifying `cast_possible_truncation` claims \"we know HTML files\nare < 4GB\", but nothing validates `html.len() < u32::MAX`. A 4GB+ HTML input\n(or one expanded by a transformIndexHtml hook) silently truncates span offsets\nvia `as u32`, corrupting all subsequent MagicString edits. The comment\npresents an unchecked invariant as fact.","fix":"Either guard (bail if `html.len() > u32::MAX as usize`) so the invariant holds, or use checked conversions.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/lib.rs:73-74","code":"   73 |   // html5gum::Span uses usize for start/end, but we know HTML files are < 4GB\n   74 |   #[expect(clippy::too_many_lines, clippy::cast_possible_truncation)]","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/lib.rs#L73-L74"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"Misleading doc example on `OptionExt::unpack`: the example claims the panic prints the inner value type (e.g. `Option<usize>`). That holds for `unpack`, but `unpack_ref`/`unpack_ref_mut` call `self.as_ref().unpack()` / `self.as_mut().unpack()`, so inside `unpack` `Self` is `Option<&T>` / `Option<&mut T>` and the panic message for the ref variants prints `Option<&T>` / `Option<&mut T>`, not the value type the example implies.","fix":"Note in the doc that the ref helpers report `Option<&T>`/`Option<&mut T>`, or inline the panic in the ref methods so they report the original type.","locations":[{"ref":"crates/rolldown_std_utils/src/option_ext.rs:14-40","code":"   14 |   /// ```ignore\n   15 |   /// None::<usize>.unwrap();\n   16 |   /// // called `Option::unwrap()` on a `None` value\n   17 |   ///\n   18 |   /// None::<usize>.unpack();\n   19 |   /// // Got `None` value when calling `OptionExt::unpack()` on `Option<usize>`\n   20 |   /// ```\n   21 |   #[track_caller]\n   22 |   fn unpack(self) -> T {\n   23 |     match self {\n   24 |       Some(v) => v,\n   25 |       None => panic!(\n   26 |         \"Got `None` value when calling `OptionExt::unpack()` on `{type_name}`\",\n   27 |         type_name = pretty_type_name::<Self>()\n   28 |       ),\n   29 |     }\n   30 |   }\n   31 | \n   32 |   /// Shorthand for `self.as_ref().unpack()`.\n   33 |   fn unpack_ref(&self) -> &T {\n   34 |     self.as_ref().unpack()\n   35 |   }\n   36 | \n   37 |   /// Shorthand for `self.as_mut().unpack()`.\n   38 |   fn unpack_ref_mut(&mut self) -> &mut T {\n   39 |     self.as_mut().unpack()\n   40 |   }","lines":27,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_std_utils/src/option_ext.rs#L14-L40"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The `HashPlaceholderGenerator` comment says the placeholder is \"Something like `~!{001}~`\" with a `~!{` prefix, but the actual prefix is `HASH_PLACEHOLDER_LEFT = \"!~{\"` and the real output is `!~{001}~` (verified by tests). The `~!` vs `!~` ordering is reversed/misleading.","fix":"Change the comment to `!~{001}~`.","locations":[{"ref":"crates/rolldown_utils/src/hash_placeholder.rs:107","code":"  107 |   // This is used to generate hash placeholder. Something like `~!{001}~`.","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_utils/src/hash_placeholder.rs#L107"}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Garbled comment with duplicated words: \"there shouldn't be an argument shouldn't be related to the export.\"","fix":"Reword, e.g. \"there should be no exports-related argument.\"","locations":[{"ref":"crates/rolldown/src/ecmascript/format/iife.rs:110-113","code":"  110 |     // If there is no export or not using named export,\n  111 |     // there shouldn't be an argument shouldn't be related to the export.\n  112 |     None\n  113 |   };","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ecmascript/format/iife.rs#L110-L113"}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment for `render_property_access` has a double-negative typo: \"If the name is not an invalid identifier, it will generate a caller like `.name`.\" It should say \"If the name is a valid identifier\".","fix":"Reword to \"If the name is a valid identifier, it generates `.name`; otherwise it generates `[\\\"...\\\"]`.\"","locations":[{"ref":"crates/rolldown/src/ecmascript/format/utils/namespace.rs:129-138","code":"  129 | /// It is a helper function to generate a caller for the given name.\n  130 | ///\n  131 | /// - If the name is not an invalid identifier, it will generate a caller like `.name`.\n  132 | /// - Otherwise, it will generate a caller like `[\"-foo\"]`.\n  133 | pub fn render_property_access(name: &str) -> String {\n  134 |   if is_validate_identifier_name(name) {\n  135 |     concat_string!(\".\", name)\n  136 |   } else {\n  137 |     concat_string!(\"[\\\"\", name, \"\\\"]\")\n  138 |   }","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ecmascript/format/utils/namespace.rs#L129-L138"}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Two stale comments reference `compute_hmr_update_single` (\"Use stable module IDs ... (in\ncompute_hmr_update_single)\") inside `compute_hmr_update_single` itself and a copy inside\n`render_hmr_patch_from_prerequisites`. The first names a now-dead function; the second names the\nwrong function. They add no information and mislead readers.","fix":"Remove the parenthetical `(in <fn name>)` from both comments.","locations":[{"ref":"crates/rolldown/src/hmr/hmr_stage.rs:759-759","code":"  759 |     // Use stable module IDs for consistent runtime lookup (in compute_hmr_update_single)","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/hmr/hmr_stage.rs#L759"},{"ref":"crates/rolldown/src/hmr/hmr_stage.rs:952-952","code":"  952 |     // Use stable module IDs for consistent runtime lookup (in render_hmr_patch_from_prerequisites)","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/hmr/hmr_stage.rs#L952"}]},{"id":"CMT_14","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`MatchingContext::current_tracker` calls `self.tracker_stack.last().expect(\"tracker_stack is not empty\")`. The expect message is phrased as the property being asserted (\"is not empty\") rather than the failure condition, so the panic message reads as a true statement instead of an error. Minor, but misleading in a crash log.","fix":"Phrase the message as the violated expectation, e.g. `.expect(\"tracker_stack should not be empty\")`.","locations":[{"ref":"crates/rolldown/src/stages/link_stage/bind_imports_and_exports.rs:44-46","code":"   44 |   fn current_tracker(&self) -> &ImportTracker {\n   45 |     self.tracker_stack.last().expect(\"tracker_stack is not empty\")\n   46 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/link_stage/bind_imports_and_exports.rs#L44-L46"}]},{"id":"CMT_15","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment block for `rename_bindings_shadowing_wrapper_params` duplicates an entire example.\nA first `# Example` for the CJS-wrapper case (the `cjs-module.js` / `require_cjs` block) is written,\nthen immediately followed by a second summary (\"Rename nested bindings that would shadow\nwrapper/factory parameters. This handles two cases...\") with its own `# Example (external module)`.\nThe first paragraph is an orphaned, half-finished doc section preceding the real one, making the\ndocumentation confusing.","fix":"Merge the two doc sections: keep the combined summary describing both cases and a single Examples\nsection, removing the duplicated leading CJS-only block.","locations":[{"ref":"crates/rolldown/src/utils/renamer.rs:366-419","code":"  366 |   /// Rename nested bindings that would shadow CJS wrapper parameters.\n  367 |   ///\n  368 |   /// For CommonJS wrapped modules, nested scopes must avoid shadowing the synthetic\n  369 |   /// `exports` and `module` parameters injected by the CJS wrapper.\n  370 |   ///\n  371 |   /// # Example\n  372 |   ///\n  373 |   /// ```js\n  374 |   /// // cjs-module.js (detected as CommonJS)\n  375 |   /// function helper() {\n  376 |   ///   const exports = {};  // Would shadow CJS wrapper's exports parameter\n  377 |   ///   return exports;\n  378 |   /// }\n  379 |   /// module.exports = helper;\n  380 |   /// ```\n  381 |   ///\n  382 |   /// Output:\n  383 |   /// ```js\n  384 |   /// var require_cjs = __commonJS((exports, module) => {\n  385 |   ///   function helper() {\n  386 |   ///     const exports$1 = {};  // Renamed to avoid shadowing\n  387 |   ///     return exports$1;\n  388 |   ///   }\n  389 |   ///   module.exports = helper;\n  390 |   /// });\n  391 |   /// ```\n  392 |   /// Rename nested bindings that would shadow wrapper/factory parameters.\n  393 |   ///\n  394 |   /// This handles two cases:\n  395 |   /// 1. CJS wrapper params (\"exports\", \"module\") for CJS-wrapped modules\n  396 |   /// 2. External module factory params for IIFE/UMD/CJS formats\n  397 |   ///\n  398 |   /// # Example (external module)\n  399 |   ///\n  400 |   /// ```js\n  401 |   /// // entry.js\n  402 |   /// import Quill from 'quill';\n  403 |   /// export class Editor {\n  404 |   ///   constructor(quill) {     // Would shadow factory param 'quill'\n  405 |   ///     console.log(Quill);    // After bundling: quill.default (shadowed!)\n  406 |   ///   }\n  407 |   /// }\n  408 |   /// ```\n  409 |   ///\n  410 |   /// Output (fixed):\n  411 |   /// ```js\n  412 |   /// (function(exports, quill) {\n  413 |   ///   class Editor {\n  414 |   ///     constructor(quill$1) {   // Renamed to avoid shadowing\n  415 |   ///       console.log(quill.default);  // Correctly references factory param\n  416 |   ///     }\n  417 |   ///   }\n  418 |   /// })\n  419 |   /// ```","lines":54,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/renamer.rs#L366-L419"}]},{"id":"CMT_16","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Stray empty trailing `//` comment with no content at the end of `RawMinifyOptions::normalize`, leftover from editing.","fix":"Remove the empty `//` line.","locations":[{"ref":"crates/rolldown_common/src/inner_bundler_options/types/minify_options.rs:149","code":"  149 |     //","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/inner_bundler_options/types/minify_options.rs#L149"}]},{"id":"CMT_17","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"`BundleCoordinator::new` comment `// Initialize build state with initial build task` precedes\n`queued_tasks: VecDeque::from([])`, which initializes an EMPTY queue (the FullBuild task is actually\npushed later in `run`). The comment claims it seeds the initial build task, which it does not.","fix":"Remove or correct the comment; `VecDeque::from([])` could also just be `VecDeque::new()`.","locations":[{"ref":"crates/rolldown_dev/src/bundle_coordinator.rs:67-68","code":"   67 |       // Initialize build state with initial build task\n   68 |       queued_tasks: VecDeque::from([]),","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_dev/src/bundle_coordinator.rs#L67-L68"}]},{"id":"CMT_18","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The comment claims the computation is done outside the lock 'to avoid holding it across await points', but `AssetCache` is a `FxDashMap` accessed via the lock-free `get`/`entry` API in this function; there is no lock held across the awaits (`should_inline`, `emit_file_async`) at all. The comment describes a locking discipline that does not exist in this code.","fix":"Reword the comment to reflect that the dashmap is consulted before and after the await without holding a guard across it, rather than implying an explicit lock is being avoided.","locations":[{"ref":"crates/rolldown_plugin_utils/src/file_to_url.rs:83-88","code":"   83 |     // Slow path: compute the URL\n   84 |     // Note: We compute outside the lock to avoid holding it across await points\n   85 |     let file = clean_url(&id);\n   86 |     let content = std::fs::read(file)?;\n   87 | \n   88 |     let url = if self.should_inline(file, &id, &content, force_inline).await? {","lines":6,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_utils/src/file_to_url.rs#L83-L88"}]},{"id":"CMT_19","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The doc comment on `rewrite_variable_dynamic_import`'s vite-ignore handling references `import(/* @vite-ignore */ `..`)`, but the analogous comment in the asset-import-meta-url visitor (`is_vite_ignore_comment`) copies the same `import(...)` example even though that code handles `new URL(...)` expressions, not `import()`. The example is misleading for that plugin.","fix":"Update the example in `is_vite_ignore_comment` to reference `new URL(/* @vite-ignore */ '..', import.meta.url)`.","locations":[{"ref":"crates/rolldown_plugin_vite_asset_import_meta_url/src/ast_visit.rs:22-22","code":"   22 |   /// Respects @vite-ignore comment (e.g., import(/* @vite-ignore */ `..`))","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_asset_import_meta_url/src/ast_visit.rs#L22"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","easy":false,"description":"The external-import `__toESM` interop code generation is duplicated between the CJS renderer (`render_cjs_chunk_imports`) and the shared `render_chunk_external_imports` used by IIFE/UMD. Both implement the same mixed-mode (two `__toESM` bindings) vs single-mode (`is_node_esm` flag) logic with near-identical string building, differing only in whether they emit a `let` declaration (CJS declares the binding; IIFE/U  = first_label.span();\n  200 |     let start = span.start();\n  201 |     let source = self.files.get(span.source())?;\n  202 | \n  203 |     let mut line = 1; // 1-based\n  204 |     let mut column = 0; // 0-based\n  205 |     let mut utf16_pos = 0;\n  206 |     let mut byte_count = 0;\n  207 | \n  208 |     for ch in source.chars() {\n  209 |       if byte_count >= start {\n  210 |         break;\n  211 |       }\n  212 |       if ch == '\\n' {\n  213 |         line += 1;\n  214 |         column = 0;\n  215 |       } else {\n  216 |         column += ch.len_utf16();\n  217 |       }\n  218 |       utf16_pos += ch.len_utf16();\n  219 |       byte_count += ch.len_utf8();\n  220 |     }\n  221 | \n  222 |     let file = span.source().to_string();\n  223 |     Some((file, line, column, utf16_pos))\n  224 |   }","lines":28,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_error/src/build_diagnostic/diagnostic.rs#L197-L224"},{"ref":"crates/rolldown_error/src/utils/locator.rs:39-53","code":"   39 |   pub fn locate_utf16(&self, source: &str, byte_offset: usize) -> (usize, usize, usize) {\n   40 |     // `line_starts` always begins with 0, so `partition_point` is >= 1 and the\n   41 |     // `- 1` cannot underflow.\n   42 |     let line_idx = self.line_starts.partition_point(|&start| start <= byte_offset) - 1;\n   43 |     let line_byte_start = self.line_starts[line_idx];\n   44 |     let line_utf16_start = self.line_utf16_starts[line_idx];\n   45 |     // Clamp so a (malformed) out-of-range offset degrades to the end-of-file\n   46 |     // position instead of yielding column 0.\n   47 |     let end = byte_offset.min(source.len());\n   48 |     let column: usize = source\n   49 |       .get(line_byte_start..end)\n   50 |       .map(|within_line| within_line.chars().map(char::len_utf16).sum())\n   51 |       .unwrap_or(0);\n   52 |     (line_idx + 1, column, line_utf16_start + column)\n   53 |   }","lines":15,"link" design choice, but the buffering window and the 0ms default should be documented; consider re-arming the debounce timer for changes that arrive during a build rather than relying solely on a post-build drain.","locations":[{"ref":"crates/rolldown_watcher/src/watch_coordinator.rs:60-91","code":"   60 |         WatcherState::Debouncing { deadline, .. } => {\n   61 |           let timeout = tokio::time::sleep_until((*deadline).into());\n   62 | \n   63 |           tokio::select! {\n   64 |             () = timeout => {\n   65 |               let (new_state, changes) = mem::take(&mut self.state).on_debounce_timeout();\n   66 |               self.state = new_state;\n   67 | \n   68 |               if let Some(changes) = changes {\n   69 |                 self.run_build_sequence(changes).await;\n   70 |               }\n   71 |             }\n   72 |             msg = self.rx.recv() => {\n   73 |               match msg {\n   74 |                 Some(WatcherMsg::FileChanges { task_index, changes }) => {\n   75 |                   self.process_file_changes(task_index, changes).await;\n   76 |                 }\n   77 |                 Some(WatcherMsg::Close) => {\n   78 |                   self.handle_close().await;\n   79 |                   break;\n   80 |                 }\n   81 |                 None => break,\n   82 |               }\n   83 |             }\n   84 |           }\n   85 |         }\n   86 |         WatcherState::Closing | WatcherState::Closed => {\n   87 |           break;\n   88 |         }\n   89 |       }\n   90 |     }\n   91 |   }","lines":32,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_watcher/src/watch_coordinator.rs#L60-L91"},{"ref":"crates/rolldown_watcher/src/watch_coordinator.rs:130-223","code":"  130 |   async fn run_build_sequence(&mut self, changes: FxIndexMap<String, WatcherChangeKind>) {\n  131 |     // Step 1 & 2: Notify handler and plugin hooks for each change\n  132 |     for (path, kind) in &changes {\n  133 |       self.handler.on_change(path.as_str(), *kind).await;\n  134 |     }\n  135 | \n  136 |     for task in &self.tasks {\n  137 |       for (path, kind) in &changes {\n  138 |         task.call_watch_change(path.as_str(), *kind).await;\n  139 |       }\n  140 |     }\n  141 | \n  142 |     // Step 3: Restart notification\n  143 |     self.handler.on_restart().await;\n  144 | \n  145 |     // Step 4: Start event\n  146 |     self.handler.on_event(WatchEvent::Start).await;\n  147 | \n  148 |     // Step 5: Build each task that needs it\n  149 |     for task_index in self.tasks.indices() {\n  150 |       if !self.tasks[task_index].needs_rebuild {\n  151 |         continue;\n  152 |       }\n  153 | \n  154 |       let task = &self.tasks[task_index];\n  155 |       self.handler.on_event(WatchEvent::BundleStart(task.start_event_data(task_index))).await;\n  156 | \n  157 |       let task = &mut self.tasks[task_index];\n  158 |       match task.build(task_index).await {\n  159 |         Ok(BuildOutcome::Success(data)) => {\n  160 |           self.handler.on_event(WatchEvent::BundleEnd(data)).await;\n  161 |         }\n  162 |         Ok(BuildOutcome::Error(data)) => {\n  163 |           self.handler.on_event(WatchEvent::Error(data)).await;\n  164 |         }\n  165 |         Ok(BuildOutcome::Skipped) => {}\n  166 |         Ok(BuildOutcome::Closed) => return,\n  167 |         Err(errs) => {\n  168 |           let error_messages: Vec<String> =\n  169 |             errs.iter().map(|e| e.to_diagnostic().to_string()).collect();\n  170 |           tracing::error!(\"Fatal build error: {error_messages:?}\");\n  171 |         }\n  172 |       }\n  173 |     }\n  174 | \n  175 |     // Step 6: End event\n  176 |     self.handler.on_event(WatchEvent::End).await;\n  177 | \n  178 |     // Step 7: Drain buffered events that arrived during the build\n  179 |     self.drain_buffered_events().await;\n  180 |   }\n  181 | \n  182 |   /// Process file changes: call on_invalidate per file, mark task for rebuild,\n  183 |   /// then batch all changes into a single state transition.\n  184 |   async fn process_file_changes(\n  185 |     &mut self,\n  186 |     task_index: WatchTaskIdx,\n  187 |     changes: Vec<FileChangeEvent>,\n  188 |   ) {\n  189 |     let mut effective_changes: Vec<FileChangeEvent> = Vec::new();\n  190 | \n  191 |     if let Some(task) = self.tasks.get_mut(task_index) {\n  192 |       for change in changes {\n  193 |         if task.mark_needs_rebuild(&change.path) {\n  194 |           task.call_on_invalidate(&change.path).await;\n  195 |           effective_changes.push(change);\n  196 |         }\n  197 |       }\n  198 |     }\n  199 | \n  200 |     if effective_changes.is_empty() {\n  201 |       return;\n  202 |     }\n  203 | \n  204 |     self.state =\n  205 |       mem::take(&mut self.state).on_file_changes(effective_changes, self.debounce_duration);\n  206 |   }\n  207 | \n  208 |   /// Drain buffered fs events that arrived during a build.\n  209 |   /// Uses try_recv to process all pending messages without blocking.\n  210 |   async fn drain_buffered_events(&mut self) {\n  211 |     loop {\n  212 |       match self.rx.try_recv() {\n  213 |         Ok(WatcherMsg::FileChanges { task_index, changes }) => {\n  214 |           self.process_file_changes(task_index, changes).await;\n  215 |         }\n  216 |         Ok(WatcherMsg::Close) => {\n  217 |           self.handle_close().await;\n  218 |           return;\n  219 |         }\n  220 |         Err(_) => break,\n  221 |       }\n  222 |     }\n  223 |   }","lines":94,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_watcher/src/watch_coordinator.rs#L130-L223"}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`ModuleLoader::drop` writes back `self.cache.importers` unconditionally from the intermediate\nstate. The HMR callers (`compute_hmr_update`, `compile_lazy_entry`) build a `ModuleLoader`, call\n`fetch_modules`, then `drop(module_loader)` explicitly before `self.cache.merge(...)`. If\n`fetch_modules` returns `Err`, the `?` propagates and `module_loader` is dropped via unwinding,\nwhich still overwrites `cache.importers` with the partially-built intermediate importers from the\nfailed scan. The cache's importer graph can thus be left in a partially-mutated state after a\nfailed partial scan, while the rest of the snapshot (module_table) is not merged - an\ninconsistent cache for the next HMR round.","fix":"On the error path, restore the previous `cache.importers` snapshot (or only commit the importer\nwrite-back when `fetch_modules` succeeded), so a failed partial scan leaves the cache unchanged.","locations":[{"ref":"crates/rolldown/src/module_loader/module_loader.rs:155-159","code":"  155 | impl<Fs: FileSystem + Clone> Drop for ModuleLoader<'_, Fs> {\n  156 |   fn drop(&mut self) {\n  157 |     self.cache.importers = std::mem::take(&mut self.intermediate_normal_modules.importers);\n  158 |   }\n  159 | }","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/module_loader/module_loader.rs#L155-L159"},{"ref":"crates/rolldown/src/hmr/hmr_stage.rs:256-284","code":"  256 |       let mut module_loader = ModuleLoader::new(\n  257 |         self.fs.clone(),\n  258 |         Arc::clone(&self.options),\n  259 |         Arc::clone(&self.resolver),\n  260 |         Arc::clone(&self.plugin_driver),\n  261 |         self.cache,\n  262 |         fetch_mode.is_full(),\n  263 |         None,\n  264 |       )?;\n  265 | \n  266 |       let module_loader_output = module_loader.fetch_modules(fetch_mode).await?;\n  267 | \n  268 |       // We manually impl `Drop` for `ModuleLoader` to avoid missing assign `importers` to\n  269 |       // `self.cache`, but rustc is not smart enough to infer actually we don't touch it in `drop`\n  270 |       // implementation, so we need to manually drop it.\n  271 |       drop(module_loader);\n  272 | \n  273 |       let new_added_modules = module_loader_output.new_added_modules_from_partial_scan.clone();\n  274 | \n  275 |       tracing::debug!(\n  276 |         target: \"hmr\",\n  277 |         \"New added modules: {:?}\",\n  278 |         new_added_modules\n  279 |           .iter()\n  280 |           .map(|module_idx| module_loader_output.module_table.get(*module_idx).stable_id())\n  281 |           .collect::<Vec<_>>(),\n  282 |       );\n  283 | \n  284 |       self.cache.merge(module_loader_output.into())?;","lines":29,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/hmr/hmr_stage.rs#L256-L284"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"low","easy":false,"description":"Potential metadata-event rebuild loop on non-macOS poll/native watchers. `bundle_coordinator::\nhandle_watch_event` only special-cases `Modify(Metadata)` under `#[cfg(target_os = \"macos\")]`\n(and only when not polling). On Linux/Windows a bare `Modify(Metadata(_))` (e.g. atime/mtime touch\ncaused by the bundler itself reading source files) falls into the catch-all `EventKind::Modify(_)`\narm and is treated as `WatcherChangeKind::Update`, which can trigger rebuilds. The watcher crate's\n`TaskFsEventHandler` has the same blanket `Modify(_) => Update` mapping. The doc on\n`map_raw_event_kind_to_watcher_event_kind` claims `Access` events are filtered to avoid rebuild\nloops, but metadata-only modifications are not similarly guarded on Linux/Windows.","fix":"Consider filtering metadata-only `Modify(Metadata(_))` events on Linux/Windows too (or document why they are safe), to avoid self-induced rebuild churn.","locations":[{"ref":"crates/rolldown_dev/src/bundle_coordinator.rs:170-191","code":"  170 |             #[cfg(target_os = \"macos\")]\n  171 |             EventKind::Modify(notify::event::ModifyKind::Metadata(
