<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`compute_update_for_calling_invalidate` looks up the caller module by the stable id the\nclient sent and `panic!`s if it is not present in the cache. The `invalidate_caller` string\ncomes straight from the HMR client (`import.meta.hot.invalidate()` reports the module id over\nthe wire). A stale, out-of-sync, or otherwise malformed client message therefore crashes the\nwhole bundler/dev server. The following `.as_normal().unwrap()` adds a second reachable panic\nif the resolved module happens to be external.","fix":"Treat a missing/non-normal module as a recoverable case: return `Ok(HmrUpdate::Noop)` (or a\n`FullReload`) instead of `panic!`/`unwrap`. e.g. `let Some(module_idx) = self.cache.module_idx_by_stable_id.get(...).copied() else { return Ok(HmrUpdate::Noop) };`\nand `let Some(caller) = self.module_table().modules[module_idx].as_normal() else { return Ok(HmrUpdate::Noop) };`.","locations":[{"ref":"crates/rolldown/src/hmr/hmr_stage.rs:95-102","code":"   95 |     let module_idx = self\n   96 |       .cache\n   97 |       .module_idx_by_stable_id\n   98 |       .get(invalidate_caller.as_str())\n   99 |       .copied()\n  100 |       .unwrap_or_else(|| panic!(\"Not found modules for file: {invalidate_caller}\"));\n  101 | \n  102 |     let caller = self.module_table().modules[module_idx].as_normal().unwrap();","lines":8,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/hmr/hmr_stage.rs#L95-L102"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`trigger_full_build` is a `#[napi]`-exported method called from JS that does `self.inner.trigger_full_build().expect(\"Should handle this error\")`. Any engine error panics and aborts the Node process instead of surfacing a catchable JS error. The expect message itself admits the path is unhandled, and every sibling method correctly maps errors to `napi::Result`.","fix":"Make the method return `napi::Result<()>` and `.map_err(|e| napi::Error::from_reason(format!(\"Failed to trigger full build: {e:#?}\")))?`.","locations":[{"ref":"crates/rolldown_binding/src/binding_dev_engine.rs:207-210","code":"  207 |   #[napi]\n  208 |   pub fn trigger_full_build(&self) {\n  209 |     self.inner.trigger_full_build().expect(\"Should handle this error\");\n  210 |   }","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/binding_dev_engine.rs#L207-L210"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"`register_hook_usage` calls `HookUsage::from_bits(self.inner.hook_usage).expect(\"Failed to register hook usage\")`. `hook_usage` is a `u32` supplied directly from JS (see BindingPluginOptions field). `from_bits` returns `None` for any value containing bits that don't correspond to a defined flag, so a malformed/out-of-range value from a JS plugin object aborts the entire Node process. This runs during bundler setup on every plugin.","fix":"Use `HookUsage::from_bits_truncate(self.inner.hook_usage)` (ignore unknown bits) or `from_bits_retain`; or validate at construction and return a `napi::Error`.","locations":[{"ref":"crates/rolldown_binding/src/options/plugin/js_plugin.rs:631-633","code":"  631 |   fn register_hook_usage(&self) -> HookUsage {\n  632 |     HookUsage::from_bits(self.inner.hook_usage).expect(\"Failed to register hook usage\")\n  633 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/options/plugin/js_plugin.rs#L631-L633"},{"ref":"crates/rolldown_binding/src/options/plugin/binding_plugin_options.rs:41","code":"   41 |   pub hook_usage: u32,","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/options/plugin/binding_plugin_options.rs#L41"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`ContextLoadCompletionManager::mark_completion` calls `sender.send(()).expect(...)` on a `tokio::sync::broadcast::Sender`. `broadcast::Sender::send` returns `Err` when there are no live receivers. The receiver (`rx`) is created in `wait_for_completion` and handed to the awaiting caller (`NativePluginContextImpl::load` -> `plugin_driver.wait_for_module_load_completion`). If that awaiting future is dropped/cancelled before the module finishes loading (task cancellation, build abort on another error, timeout, etc.), the only receiver is dropped while the map entry stays in `Pending`. A later `mark_completion` for that module then hits the `Pending` arm and panics. This is a reachable abort under normal cancellation, not just a programmer error.","fix":"Do not panic when the broadcast send fails: treat `Err` as 'no one is waiting' and still transition to `Completed` (e.g. `let _ = sender.send(());`), since a dropped receiver just means the waiter already went away.","locations":[{"ref":"crates/rolldown_plugin/src/plugin_driver/mod.rs:221-240","code":"  221 |   pub fn mark_completion(&self, module_id: ModuleId) {\n  222 |     match self.notifiers.entry(module_id) {\n  223 |       dashmap::Entry::Vacant(guard) => {\n  224 |         guard.insert(ContextLoadCompletionState::Completed);\n  225 |       }\n  226 |       dashmap::Entry::Occupied(mut guard) => match guard.get_mut() {\n  227 |         ContextLoadCompletionState::Pending(sender) => {\n  228 |           sender.send(()).expect(\n  229 |             \"PluginDriver: failed to send completion notification - receiver was dropped before wait_for_completion was called, indicating a race condition in module loading\"\n  230 |           );\n  231 |           *guard.get_mut() = ContextLoadCompletionState::Completed;\n  232 |         }\n  233 |         ContextLoadCompletionState::Completed => {\n  234 |           // This happens if `.mark_completion` is called multiple times, which is not expected\n  235 |           debug_assert!(false, \"mark_completion was called even though it was already completed\");\n  236 |           tracing::warn!(\"mark_completion was called even though it was already completed\");\n  237 |         }\n  238 |       },\n  239 |     }\n  240 |   }","lines":20,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin/src/plugin_driver/mod.rs#L221-L240"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"Inline `<script>`/`<style>` handling pops the last child of the element and\nasserts it is a `Text` node, otherwise `panic!`. The popped child is simply\nthe element's last child, which for arbitrary user HTML need not be text. The\nsink appends `Comment` and `Element` nodes as children (see\nhtml/sink.rs add_comment/add_element), so input like\n`<script type=\"module\">x<!--c--><\/script>` or `<style><b>x<\/b><\/style>`\nleaves a non-Text last child and triggers the panic on fully reachable,\nuser-controlled HTML. Three such panic sites.","fix":"Do not assume the last child is text. Scan children for the text node(s) and\ntreat absence as \"no inline content\" (skip the transform) instead of\npanicking.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/lib.rs:177-180","code":"  177 |                 } else if let Some(node) = node.children.borrow_mut().pop() {\n  178 |                   let html::sink::NodeData::Text { contents, .. } = &node.data else {\n  179 |                     panic!(\"Expected text node but received: {:#?}\", node.data);\n  180 |                   };","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/lib.rs#L177-L180"},{"ref":"crates/rolldown_plugin_vite_html/src/lib.rs:212-215","code":"  212 |               } else if let Some(node) = node.children.borrow_mut().pop() {\n  213 |                 let html::sink::NodeData::Text { contents, span } = &node.data else {\n  214 |                   panic!(\"Expected text node but received: {:#?}\", node.data);\n  215 |                 };","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/lib.rs#L212-L215"},{"ref":"crates/rolldown_plugin_vite_html/src/lib.rs:345-347","code":"  345 |             let html::sink::NodeData::Text { ref contents, span } = node.data else {\n  346 |               panic!(\"Expected text node but received: {:#?}\", node.data);\n  347 |             };","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/lib.rs#L345-L347"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"After manually matching the `__VITE_INLINE_CSS__<hash>_<n>__` placeholder\nshape in the (post-transformIndexHtml) HTML, the code does\n`cache.inner.get(scoped_name).unwrap()`. A user (or a transformIndexHtml hook)\nthat emits a literal string of this exact shape, e.g.\n`__VITE_INLINE_CSS__abcd1234_0__`, matches the pattern but has no\ncorresponding cache entry, so `.unwrap()` panics on reachable input. The\nadjacent `expect(\"HTMLProxyResult missing\")` is a similar lower-likelihood\npanic.","fix":"If `cache.inner.get(scoped_name)` is `None`, skip this match (leave text\nunchanged) instead of unwrapping; propagate the missing-meta case as a\n`Result` error.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/utils/plugin_ext.rs:247-251","code":"  247 |       let cache = ctx.meta().get::<HTMLProxyResult>().expect(\"HTMLProxyResult missing\");\n  248 |       let css_transformed_code = cache.inner.get(scoped_name).unwrap();\n  249 |       #[expect(clippy::cast_possible_truncation)]\n  250 |       s.update(start as u32, match_end as u32, css_transformed_code.to_string())\n  251 |         .expect(\"update should not fail in html plugin\");","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/utils/plugin_ext.rs#L247-L251"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`write_line` truncates a message to the terminal width using a byte slice `&message[..width]`. `width` is the terminal column count, but `message` is sliced by byte index, so when the message contains a multi-byte UTF-8 character (e.g. a non-ASCII path produced by `Path::relative(...).to_string_lossy()` in the reporter's `transform` hook) the slice can land in the middle of a code point and panic. Additionally the message contains ANSI escape sequences (from `utils::paint`), so `message.len()` and the slice index are measured in bytes including escape codes rather than display columns - cutting mid-escape-sequence corrupts the terminal even when no panic occurs.","fix":"Truncate on a character boundary (e.g. iterate `char_indices()` to find a valid byte offset at or below `width`), and ideally compute display width excluding ANSI escape codes rather than using `message.len()`.","locations":[{"ref":"crates/rolldown_plugin_vite_reporter/src/utils.rs:94-104","code":"   94 | #[inline]\n   95 | pub fn write_line(message: &str) {\n   96 |   let mut lock = clear_line();\n   97 | \n   98 |   let message = terminal_size::terminal_size()\n   99 |     .map(|(width, _)| width.0 as usize)\n  100 |     .map_or(message, |width| if message.len() < width { message } else { &message[..width] });\n  101 | \n  102 |   let _ = write!(&mut lock, \"{message}\");\n  103 |   let _ = lock.flush();\n  104 | }","lines":11,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_reporter/src/utils.rs#L94-L104"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`resolve_bare_import` calls `oxc_resolved_result.unwrap()` on a `Result` that\ncan be `Err`. `resolved` being `Some` does NOT imply `Ok`:\n`normalize_oxc_resolver_result` returns `Ok(Some(..))` for the\n`ResolveError::Ignored` case (id = BROWSER_EXTERNAL_ID, no extension) and the\noptional-peer-dep case, where the underlying result is `Err`. With\n`external == true`, `can_externalize_file(BROWSER_EXTERNAL_ID)` returns true\n(empty extension), so execution reaches the `is_deep_import(id) && ext differs`\nbranch and `oxc_resolved_result.unwrap()` panics on the `Err`.","fix":"Match on `&oxc_resolved_result` instead of unwrapping, e.g.\n`&& let Ok(res) = &oxc_resolved_result && let Some(pkg_json) = res.package_json()`.","locations":[{"ref":"crates/rolldown_plugin_vite_resolve/src/resolver.rs:470-489","code":"  470 |     if let Some(mut resolved) = resolved {\n  471 |       if !external || !can_externalize_file(&resolved.id) {\n  472 |         return Ok(Some(resolved));\n  473 |       }\n  474 | \n  475 |       let id = specifier;\n  476 |       let mut resolved_id = id;\n  477 |       if is_deep_import(id)\n  478 |         && get_extension(id) != get_extension(&resolved.id)\n  479 |         && let Some(pkg_json) = oxc_resolved_result.unwrap().package_json()\n  480 |       {\n  481 |         let has_exports_field = pkg_json.exports().is_some();\n  482 |         if !has_exports_field {\n  483 |           // id date-fns/locale\n  484 |           // resolve.id ...date-fns/esm/locale/index.js\n  485 |           if let Some(index) = resolved.id.find(id) {\n  486 |             resolved_id = &resolved.id[index..];\n  487 |           }\n  488 |         }\n  489 |       }","lines":20,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_resolve/src/resolver.rs#L470-L489"},{"ref":"crates/rolldown_plugin_vite_resol  |         oxc_resolver::ResolveError::YarnPnpError(\n  384 |           pnp::Error::BadSpecifier(_)\n  385 |           | pnp::Error::MissingPeerDependency(_)\n  386 |           | pnp::Error::UndeclaredDependency(_)\n  387 |           | pnp::Error::MissingDependency(_),\n  388 |         )\n  389 |         | oxc_resolver::ResolveError::NotFound(_),\n  390 |       ) => {\n  391 |         // if import can't be found, check if it's an optional peer dep.\n  392 |         // if so, we can resolve to a special id that errors only when imported.\n  393 |         if is_bare_import(id)\n  394 |           && !self.built_in_checker.is_builtin(id)\n  395 |           && !id.contains('\\0')\n  396 |           && let Some(pkg_name) = get_npm_package_name(id)\n  397 |         {\n  398 |           let resolved_importer_dir = self\n  399 |             .should_use_importer(id, importer, dedupe)\n  400 |             .then(|| {\n  401 |               importer.map(|importer| {\n  402 |                 Path::new(importer).parent().map(|i| i.to_str().unwrap()).unwrap_or(importer)\n  403 |               })\n  404 |             })\n  405 |             .flatten();\n  406 |           if resolved_importer_dir.is_some_and(|dir| dir != self.root.to_str().unwrap())\n  407 |             && let Some(package_json) =\n  408 |               self.get_nearest_package_json_optional_peer_deps(importer.unwrap())\n  409 |             && package_json.optional_peer_dependencies.contains(pkg_name)\n  410 |           {\n  411 |             return Ok(Some(HookResolveIdOutput {\n  412 |               id: format!(\"{OPTIONAL_PEER_DEP_ID}:{id}:{}\", package_json.name).into(),\n  413 |               ..Default::default()\n  414 |             }));\n  415 |           }\n  416 |         }\n  417 |         Ok(None)\n  418 |       }\n  419 |       Err(oxc_resolver::ResolveError::Ignored(_)) => Ok(Some(HookResolveIdOutput {\n  420 |         id: arcstr::literal!(BROWSER_EXTERNAL_ID),\n  421 |         ..Default::default()\n  422 |       })),\n  423 |       Err(err) => Err(err.to_owned()),\n  424 |     }\n  425 |   }","lines":84,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_resolve/src/resolver.rs#L342-L425"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"`update_with` (and thus `update`/`update_with`/`replace_with`) does not validate that `end <= source.len()`. `split_at(end)` early-returns `Ok(())` when `at_index >= self.source.len()`, so when `end > source.len()` no chunk is created/found and `self.chunk_by_end.get(&end).copied().unwrap()` panics at line 55. The sibling `reset()` does perform this bounds check (reset.rs:19-21), confirming the omission. Reachable from the public `update`/`update_with` API with an out-of-range `end`.","fix":"Add a bounds check `if (end as usize) > self.source.len() { return Err(...) }` (mirroring reset.rs) before splitting, or handle the `None` from `chunk_by_end.get(&end)` gracefully.","locations":[{"ref":"crates/string_wizard/src/magic_string/update.rs:48-55","code":"   48 |     if start >= end {\n   49 |       return Err(format!(\"end must be greater than start, got start: {start}, end: {end}\"));\n   50 |     }\n   51 |     self.split_at(start)?;\n   52 |     self.split_at(end)?;\n   53 | \n   54 |     let start_idx = self.chunk_by_start.get(&start).copied().unwrap();\n   55 |     let end_idx = self.chunk_by_end.get(&end).copied().unwrap();","lines":8,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/update.rs#L48-L55"},{"ref":"crates/string_wizard/src/magic_string/mod.rs:267-273","code":"  267 |   fn split_at(&mut self, at_index: u32) -> Result<(), String> {\n  268 |     if at_index == 0\n  269 |       || (at_index as usize) >= self.source.len()\n  270 |       || self.chunk_by_end.contains_key(&at_index)\n  271 |     {\n  272 |       return Ok(());\n  273 |     }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/mod.rs#L267-L273"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`resolve_symbol_from_reference` panics if an `IdentifierReference` has no reference id. The\n`unwrap_or_else(|| panic!(...))` assumes oxc semantic analysis always assigns a reference id.\nThis is called from many hot visiting paths (`resolve_identifier_reference`,\n`is_global_identifier_reference`, `scan_export_default_decl`, `mark_jsx_member_expression_root`).\nAny oxc edge case or future syntax that yields an identifier reference without a reference id\nturns into a hard panic of the whole bundle rather than a recoverable build error.","fix":"Return `Option`/`None` (treat as global) instead of panicking, or downgrade to a `debug_assert` and fall back gracefully in release builds.","locations":[{"ref":"crates/rolldown/src/ast_scanner/mod.rs:831-839","code":"  831 |   fn resolve_symbol_from_reference(&self, id_ref: &IdentifierReference) -> Option<SymbolId> {\n  832 |     let ref_id = id_ref.reference_id.get().unwrap_or_else(|| {\n  833 |       panic!(\n  834 |         \"{id_ref:#?} must have reference id in code```\\n{}\\n```\\n\",\n  835 |         self.current_stmt_info.unwrap_debug_label()\n  836 |       )\n  837 |     });\n  838 |     self.result.symbol_ref_db.ast_scopes.symbol_id_for(ref_id)\n  839 |   }","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ast_scanner/mod.rs#L831-L839"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`results.pop().unwrap()` assumes `compute_hmr_update` always returns exactly one\n`ClientHmrUpdate` for the single temporary client. That is true today, but it is an implicit\ninvariant enforced only by the caller passing a 1-element `clients` slice; if\n`compute_hmr_update` ever short-circuits to an empty result (e.g. future early-return on empty\ninput) this becomes a reachable panic with no useful message.","fix":"Replace `results.pop().unwrap().update` with an explicit error/Noop fallback, e.g.\n`Ok(results.pop().map(|r| r.update).unwrap_or(HmrUpdate::Noop))`.","locations":[{"ref":"crates/rolldown/src/hmr/hmr_stage.rs:150-150","code":"  150 |     Ok(results.pop().unwrap().update)","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/hmr/hmr_stage.rs#L150"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`finalized_expr_for_symbol_ref` panics (via `unwrap_or_else`/`panic!`) when a CJS-format canonical symbol has no `chunk_idx`. The branch is only taken for `OutputFormat::Cjs` and for root-scope, non-external symbols, but it is a hard `panic!` rather than a recoverable error. If any internal invariant about chunk assignment is violated for a reachable symbol (e.g. a synthesized/edge-case symbol), this aborts the whole bundle with an internal panic instead of producing a build diagnostic.","fix":"If this is a true invariant, document it and keep the panic; otherwise convert to a `BuildResult`/diagnostic path. At minimum, ensure the panic message is actionable and that all CJS root-scope symbols are guaranteed a chunk before finalization.","locations":[{"ref":"crates/rolldown/src/module_finalizers/mod.rs:465-470","code":"  465 |           let chunk_idx_of_canonical_symbol = canonical_symbol.chunk_idx.unwrap_or_else(|| {\n  466 |             // Scoped symbols don't get assigned a `ChunkIdx`. There are skipped for performance reason, because they are surely\n  467 |             // belong to the chunk they are declared in and won't link to other chunks.\n  468 |             let symbol_name = canonical_ref.name(self.ctx.symbol_db);\n  469 |             panic!(\"{canonical_ref:?} {symbol_name:?} is not in any chunk, which is unexpected\");\n  470 |           });","lines":6,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/module_finalizers/mod.rs#L465-L470"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`finalized_string_pattern_for_symbol_ref` indexes `exporter_chunk.exports_to_other_chunks[&canonical_ref][0]`\ndirectly. Both the `HashMap` index (`[&canonical_ref]`) and the slice index (`[0]`) panic if the\ncanonical_ref is not an export of that chunk or its alias list is empty. This is in the CJS\ncross-chunk binding path; if the cross-chunk link bookkeeping and the rendered exports ever\ndisagree, this produces an index-out-of-bounds panic during code generation rather than a\ndiagnostic.","fix":"Use `.get(&canonical_ref).and_then(|aliases| aliases.first())` and emit a build error (or\n`debug_assert` with context) on the `None` case instead of relying on the index never being out of\nrange.","locations":[{"ref":"crates/rolldown/src/types/generator.rs:82-84","code":"   82 |           let exporter_chunk = &self.chunk_graph.chunk_table[chunk_idx_of_canonical_symbol];\n   83 |           let exported_name = &exporter_chunk.exports_to_other_chunks[&canonical_ref][0];\n   84 |           if exported_name == \"default\" {","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/types/generator.rs#L82-L84"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`collect_transitive_dependencies::traverse` is a recursive DFS over the chunk dependency graph\nwith no depth bound. On a build that produces a very long chunk-dependency chain (deeply nested\ndynamic-import / cross-chunk import chains) this can overflow the stack. The surrounding code runs\ninside a rayon worker (`par_iter().map(... traverse ...)`), where thread stacks are typically\nsmaller than the main thread, increasing the risk.","fix":"Convert `traverse` to an explicit worklist/stack-based iteration (push onto a `Vec`, pop until\nempty) so depth is bounded by heap, not call stack.","locations":[{"ref":"crates/rolldown/src/utils/chunk/finalize_chunks.rs:252-282","code":"  252 | fn collect_transitive_dependencies(\n  253 |   index_direct_dependencies: &IndexVec<InsChunkIdx, Vec<InsChunkIdx>>,\n  254 | ) -> IndexVec<InsChunkIdx, FxIndexSet<InsChunkIdx>> {\n  255 |   fn traverse(\n  256 |     index: InsChunkIdx,\n  257 |     dep_map: &IndexVec<InsChunkIdx, Vec<InsChunkIdx>>,\n  258 |     visited: &mut FxIndexSet<InsChunkIdx>,\n  259 |   ) {\n  260 |     for dep_index in &dep_map[index] {\n  261 |       if !visited.contains(dep_index) {\n  262 |         visited.insert(*dep_index);\n  263 |         traverse(*dep_index, dep_map, visited);\n  264 |       }\n  265 |     }\n  266 |   }\n  267 | \n  268 |   let index_transitive_dependencies: IndexVec<InsChunkIdx, FxIndexSet<InsChunkIdx>> =\n  269 |     index_direct_dependencies\n  270 |       .par_iter()\n  271 |       .enumerate()\n  272 |       .map(|(idx, _deps)| {\n  273 |         let idx = InsChunkIdx::from(idx);\n  274 |         let mut visited_deps = FxIndexSet::default();\n  275 |         traverse(idx, index_direct_dependencies, &mut visited_deps);\n  276 |         visited_deps\n  277 |       })\n  278 |       .collect::<Vec<_>>()\n  279 |       .into();\n  280 | \n  281 |   index_transitive_dependencies\n  282 | }","lines":31,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/chunk/finalize_chunks.rs#L252-L282"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`take_plugin_values` does `PLUGINS_MAP.remove(&self.id).expect(\"plugin list already taken\")`. The same id is also removed by `ObjectFinalize::finalize` when the JS registry object is GC'd. If finalization runs before/around `take_plugin_values`, the entry is gone and the `expect` aborts the Node process. The two removal paths race on the same key with no coordination.","fix":"Handle the missing entry gracefully: `let Some((_, plugins_list)) = PLUGINS_MAP.remove(&self.id) else { return PluginValues::default(); };`.","locations":[{"ref":"crates/rolldown_binding/src/parallel_js_plugin_registry.rs:42-43","code":"   42 |   pub fn take_plugin_values(&self) -> PluginValues {\n   43 |     let plugins_list = PLUGINS_MAP.remove(&self.id).expect(\"plugin list already taken\").1;","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/parallel_js_plugin_registry.rs#L42-L43"},{"ref":"crates/rolldown_binding/src/parallel_js_plugin_registry.rs:57-62","code":"   57 | impl ObjectFinalize for ParallelJsPluginRegistry {\n   58 |   fn finalize(self, mut _env: Env) -> napi::Result<()> {\n   59 |     PLUGINS_MAP.remove(&self.id);\n   60 |     Ok(())\n   61 |   }\n   62 | }","lines":6,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/parallel_js_plugin_registry.rs#L57-L62"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`take_plugin_values` indexes `plugins_list[0]` to size a map. `PLUGINS_MAP` is initialized with an empty `vec![]` in the constructor (line 37) and only grows when `register_plugins` is called. If a registry is created but no worker ever registered plugins (e.g. zero plugins, or a worker race), `plugins_list` is empty and `plugins_list[0]` is an out-of-bounds index that panics and aborts Node.","fix":"Use `let cap = plugins_list.first().map_or(0, Vec::len);` and build the map from that; the loop handles the empty case naturally.","locations":[{"ref":"crates/rolldown_binding/src/parallel_js_plugin_registry.rs:42-54","code":"   42 |   pub fn take_plugin_values(&self) -> PluginValues {\n   43 |     let plugins_list = PLUGINS_MAP.remove(&self.id).expect(\"plugin list already taken\").1;\n   44 | \n   45 |     let mut map: FxHashMap<usize, Vec<BindingPluginOptions>> =\n   46 |       FxHashMap::with_capacity(plugins_list[0].len());\n   47 |     for plugins in plugins_list {\n   48 |       for plugin in plugins {\n   49 |         map.entry(plugin.index as usize).or_default().push(plugin.plugin);\n   50 |       }\n   51 |     }\n   52 | \n   53 |     map\n   54 |   }","lines":13,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/parallel_js_plugin_registry.rs#L42-L54"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`enhanced_transform_internal` does `std::env::current_dir().expect(\"Failed to get current dir\")` when `options.cwd` is None. `current_dir()` can fail (cwd deleted, permissions). This runs inside the napi transform path so a failure aborts the Node process. The function already returns `napi::Result`, so the error is trivially propagatable.","fix":"Replace the `expect` with error propagation: `std::env::current_dir().map_err(|e| napi::Error::from_reason(format!(\"Failed to get current dir: {e}\")))?`.","locations":[{"ref":"crates/rolldown_binding/src/transform.rs:50-54","code":"   50 |   let cwd = options\n   51 |     .cwd\n   52 |     .clone()\n   53 |     .map(PathBuf::from)\n   54 |     .unwrap_or_else(|| std::env::current_dir().expect(\"Failed to get current dir\"));","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/transform.rs#L50-L54"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Several `#[napi]`-exposed `BindingWatcherEvent` accessors call `unreachable!()` when the event variant doesn't match (e.g. calling `bundleEndData()` on a `change` event). These are directly callable from JS; the official watcher.ts guards them, but any out-of-order or third-party JS call triggers a Rust panic that aborts the Node process instead of throwing a catchable error.","fix":"Return `napi::Result<...>` from these methods and replace `unreachable!(...)` with `return Err(napi::Error::from_reason(...))`.","locations":[{"ref":"crates/rolldown_binding/src/types/binding_watcher_event.rs:55-98","code":"   55 |   #[napi]\n   56 |   pub fn bundle_event_kind(&self) -> &str {\n   57 |     match &self.inner {\n   58 |       WatcherEventInner::BundleEvent(event) => event.as_str(),\n   59 |       _ => unreachable!(\"Expected BundleEvent\"),\n   60 |     }\n   61 |   }\n   62 | \n   63 |   #[napi]\n   64 |   pub fn bundle_end_data(&self) -> BindingBundleEndEventData {\n   65 |     match &self.inner {\n   66 |       WatcherEventInner::BundleEvent(WatchEvent::BundleEnd(data)) => BindingBundleEndEventData {\n   67 |         output: data.output.clone(),\n   68 |         duration: data.duration,\n   69 |         result: data.bundle_handle.clone(),\n   70 |       },\n   71 |       _ => unreachable!(\"Expected BundleEvent::BundleEnd\"),\n   72 |     }\n   73 |   }\n   74 | \n   75 |   #[napi]\n   76 |   pub fn bundle_error_data(&self) -> BindingBundleErrorEventData {\n   77 |     match &self.inner {\n   78 |       WatcherEventInner::BundleEvent(WatchEvent::Error(data)) => BindingBundleErrorEventData {\n   79 |         error: data\n   80 |           .diagnostics\n   81 |           .iter()\n   82 |           .map(|diagnostic| to_binding_error(diagnostic, data.cwd.clone()))\n   83 |           .collect(),\n   84 |         result: data.bundle_handle.clone(),\n   85 |       },\n   86 |       _ => unreachable!(\"Expected BundleEvent::Error\"),\n   87 |     }\n   88 |   }\n   89 | \n   90 |   #[napi]\n   91 |   pub fn watch_change_data(&self) -> BindingWatcherChangeData {\n   92 |     match &self.inner {\n   93 |       WatcherEventInner::Change { path, kind } => {\n   94 |         BindingWatcherChangeData { path: path.clone(), kind: kind.clone() }\n   95 |       }\n   96 |       _ => unreachable!(\"Expected Change event\"),\n   97 |     }\n   98 |   }","lines":44,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/types/binding_watcher_event.rs#L55-L98"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`WorkerManager::acquire` and `acquire_all` do `self.free_workers_receiver.recv().await.unwrap()`. `async_channel::recv` returns `Err(RecvError)` once all senders are dropped and the channel is empty. Under normal flow this is unlikely, but any path that drops the senders turns a recoverable condition into a process-aborting panic across the FFI boundary.","fix":"Propagate the error (return `Result`) or document/justify the invariant; do not `unwrap` on channel recv reachable from JS-driven bundling.","locations":[{"ref":"crates/rolldown_binding/src/worker_manager.rs:26-30","code":"   26 |   pub async fn acquire(&self) -> WorkerSemaphorePermit {\n   27 |     let worker_index = self.free_workers_receiver.recv().await.unwrap();\n   28 | \n   29 |     WorkerSemaphorePermit { worker_index, sender: self.free_workers_sender.clone() }\n   30 |   }","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/worker_manager.rs#L26-L30"},{"ref":"crates/rolldown_binding/src/worker_manager.rs:32-41","code":"   32 |   pub async fn acquire_all(&self) -> WorkerAllSemaphorePermit {\n   33 |     for _ in 0..self.worker_count {\n   34 |       self.free_workers_receiver.recv().await.unwrap();\n   35 |     }\n   36 | \n   37 |     WorkerAllSemaphorePermit {\n   38 |       worker_count: self.worker_count,\n   39 |       sender: self.free_workers_sender.clone(),\n   40 |     }\n   41 |   }","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/worker_manager.rs#L32-L41"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Deserializing `manualPureFunctions` calls `item.as_str().expect(\"manualPureFunctions should be a `Vec<String>`\")`.\nA non-string array element (e.g. `manualPureFunctions: [1]`) panics/aborts the bundler on user-controlled config\ninstead of returning a clean serde deserialization error. Every other field in this function reports errors via\n`serde::de::Error::custom`; this one is the outlier.","fix":"Replace the `expect` with a fallible map collected into `Result<FxHashSet<_>, _>`: `item.as_str().map(str::to_string).ok_or_else(|| serde::de::Error::custom(\"manualPureFunctions should be a Vec<String>\"))`.","locations":[{"ref":"crates/rolldown_common/src/inner_bundler_options/mod.rs:393-401","code":"  393 |           Value::Array(v) => Ok(\n  394 |             v.iter()\n  395 |               .map(|item| {\n  396 |                 item.as_str().expect(\"manualPureFunctions should be a `Vec<String>`\").to_string()\n  397 |               })\n  398 |               .collect::<FxHashSet<_>>(),\n  399 |           ),\n  400 |           _ => Err(serde::de::Error::custom(\"manualPureFunctions should be a `Vec<String>`\")),\n  401 |         },","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/inner_bundler_options/mod.rs#L393-L401"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`EsModuleFlag::from(String)` calls `unreachable!()` for any string other than `\"if-default-prop\"`, aborting the\nprocess on unexpected input rather than returning an error. It also cannot parse the serialized forms of the other\nvariants (`\"always\"`/`\"never\"`), so it is not a true inverse of the public string representation.","fix":"Make conversion fallible (`TryFrom` returning an error) or match all known strings (\"always\" => Always, \"never\" => Never, \"if-default-prop\" => IfDefaultProp) with a proper error for the unknown case.","locations":[{"ref":"crates/rolldown_common/src/inner_bundler_options/types/es_module_flag.rs:62-70","code":"   62 | impl From<String> for EsModuleFlag {\n   63 |   fn from(value: String) -> Self {\n   64 |     if value == \"if-default-prop\" {\n   65 |       Self::IfDefaultProp\n   66 |     } else {\n   67 |       unreachable!(\"unknown es module type\")\n   68 |     }\n   69 |   }\n   70 | }","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/inner_bundler_options/types/es_module_flag.rs#L62-L70"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`BundlingTask::run_inner` passes the changed file path to the `watch_change` plugin hook via\n`changed_file.to_str().unwrap()`. `Path::to_str` returns `None` for paths that are not valid\nUTF-8, which is possible on Linux/macOS where filenames are arbitrary bytes. A non-UTF-8 path\nemitted by the watcher would panic the bundling task (the same paths are handled losslessly via\n`to_string_lossy` elsewhere in this file, e.g. `generate_hmr_updates` and `rebuild`).","fix":"Use `changed_file.to_string_lossy()` (as the rest of the file does) instead of `to_str().unwrap()`.","locations":[{"ref":"crates/rolldown_dev/src/bundling_task.rs:98-103","code":"   98 |       for (changed_file, event) in self.input.changed_files() {\n   99 |         if let Some(plugin_driver) =\n  100 |           bundler.last_bundle_handle.as_ref().map(rolldown::BundleHandle::plugin_driver)\n  101 |         {\n  102 |           if let Err(err) = plugin_driver.watch_change(changed_file.to_str().unwrap(), *event).await\n  103 |           {","lines":6,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_dev/src/bundling_task.rs#L98-L103"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`args.id.as_path().parent().unwrap()` panics if the transformed module id has no parent path component. This branch is reached when a file contains a bare (non-relative, non-absolute) variable dynamic import and a `resolver` is configured. A virtual or single-segment module id (no `/`) yields `None` from `parent()` and aborts the build with a panic instead of a graceful error/warning.","fix":"Use `args.id.as_path().parent().unwrap_or(ctx.cwd())` (or fall back to the configured root) instead of `unwrap()`.","locations":[{"ref":"crates/rolldown_plugin_vite_dynamic_import_vars/src/lib.rs:116-116","code":"  116 |         let importer = args.id.as_path().parent().unwrap();","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_dynamic_import_vars/src/lib.rs#L116"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`parse_html` uses `String::from_utf8_unchecked` on raw html5gum byte buffers\nfor attribute names, attribute values, end-tag names, and text content. If any\nof these byte buffers is not valid UTF-8 this is undefined behavior. The\nstart-tag name path (line 26) uses the safe `from_utf8_lossy`, showing the\nauthor already knew names can be non-UTF-8, yet the end-tag name path uses the\nunchecked variant - an inconsistency that is at minimum a latent UB vector on\nhostile input.","fix":"Use `from_utf8_lossy` (as the start-tag name already does) for all token\nbuffers, or document/verify that html5gum only ever emits valid-UTF-8\nsub-slices of the original `&str`.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/html/parser.rs:19-23","code":"   19 |         for (attr_name, attr_value) in tag.attributes {\n   20 |           let name = Atom::from(unsafe { String::from_utf8_unchecked(attr_name.0) });\n   21 |           let value = unsafe { String::from_utf8_unchecked(attr_value.value.0) };\n   22 |           attrs.push(Attribute { name, value, span: attr_value.span });\n   23 |         }","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/html/parser.rs#L19-L23"},{"ref":"crates/rolldown_plugin_vite_html/src/html/parser.rs:32-38","code":"   32 |       Ok(Token::EndTag(tag)) => {\n   33 |         let name = unsafe { String::from_utf8_unchecked(tag.name.0) };\n   34 |         dom_builder.close_element(&name, tag.span);\n   35 |       }\n   36 |       Ok(Token::String(s)) => {\n   37 |         let contents = unsafe { String::from_utf8_unchecked(s.0.clone()) };\n   38 |         dom_builder.add_text(contents, s.span);","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/html/parser.rs#L32-L38"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`split_at` only guards `at_index == 0` and `at_index >= source.len()`; it never checks that `at_index` lies on a UTF-8 char boundary. A mid-codepoint index produces `Span(start, at_index)` / `Span(at_index, end)` whose `.text()` later does `&source[start..end]`, which panics (\"byte index is not a char boundary\"). Reachable from public `update`/`remove`/`relocate`/`reset` if a caller passes a byte offset inside a multibyte character. Only a `debug_assert!(is_char_boundary)` exists, and only in indent.rs, not in `split`/`Span::text`.","fix":"In `split_at` (or the public entry points) return an `Err` when `!source.is_char_boundary(at_index as usize)` instead of slicing on a non-boundary.","locations":[{"ref":"crates/string_wizard/src/magic_string/mod.rs:267-273","code":"  267 |   fn split_at(&mut self, at_index: u32) -> Result<(), String> {\n  268 |     if at_index == 0\n  269 |       || (at_index as usize) >= self.source.len()\n  270 |       || self.chunk_by_end.contains_key(&at_index)\n  271 |     {\n  272 |       return Ok(());\n  273 |     }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/mod.rs#L267-L273"},{"ref":"crates/string_wizard/src/span.rs:13-15","code":"   13 |   pub fn text<'s>(&self, source: &'s str) -> &'s str {\n   14 |     &source[self.start() as usize..self.end() as usize]\n   15 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/span.rs#L13-L15"},{"ref":"crates/string_wizard/src/chunk.rs:68-84","code":"   68 |   pub fn split<'a>(&'a mut self, text_index: u32) -> Result<Chunk<'str>, String> {\n   69 |     if let Some(ref content) = self.edited_content\n   70 |       && !content.is_empty()\n   71 |     {\n   72 |       return Err(\"Cannot split a chunk that has already been edited\".to_string());\n   73 |     }\n   74 |     let first_half_slice = Span(self.start(), text_index);\n   75 |     let second_half_slice = Span(text_index, self.end());\n   76 |     let mut new_chunk = Chunk::new(second_half_slice);\n   77 |     if self.is_edited() {\n   78 |       new_chunk\n   79 |         .edit(\"\".into(), EditOptions { store_name: self.keep_in_mappings, overwrite: false });\n   80 |     }\n   81 |     std::mem::swap(&mut new_chunk.outro, &mut self.outro);\n   82 |     self.span = first_half_slice;\n   83 |     Ok(new_chunk)\n   84 |   }","lines":17,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/chunk.rs#L68-L84"}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`relocate` indexes `self.chunk_by_start[&start]` and `self.chunk_by_end[&end]` directly (panicking index ops). If `start`/`end`/`to` are out of range, `split_at` silently no-ops (it returns `Ok` for indices `>= source.len()`), so the keys are absent and the index panics. There is no `end <= source.len()` validation as there is in `reset()`. Reachable from the public `relocate` API with out-of-range indices.","fix":"Validate `start`/`end`/`to` against `source.len()` and return `Err` on out-of-range, or use `.get(..)` and return an error instead of indexing.","locations":[{"ref":"crates/string_wizard/src/magic_string/movement.rs:34-44","code":"   34 |   pub fn relocate(&mut self, start: u32, end: u32, to: u32) -> Result<&mut Self, String> {\n   35 |     if to >= start && to <= end {\n   36 |       return Err(\"Cannot move a selection inside itself\".to_string());\n   37 |     }\n   38 | \n   39 |     self.split_at(start)?;\n   40 |     self.split_at(end)?;\n   41 |     self.split_at(to)?;\n   42 | \n   43 |     let first_idx = self.chunk_by_start[&start];\n   44 |     let last_idx = self.chunk_by_end[&end];","lines":11,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/movement.rs#L34-L44"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`prepend_left`/`prepend_right`/`append_left`/`append_right` call `by_end_mut`/`by_start_mut` and `.expect(\"... unexpected split error\")`. `split_at` returns `Err(\"Cannot split a chunk that has already been edited\")` when the index falls strictly inside an already-edited chunk (chunk.rs:68-73). The comment claims \"append/prepend operations don't require splitting edited chunks in practice\", but that is not enforced: editing a range and then appending/prepending at an interior index of that edited chunk reaches the `Err` path and panics. Reachable by combining public `update`/`replace` with `append_*`/`prepend_*`.","fix":"Propagate the `Result` from these methods (return `Result<&mut Self, String>`) instead of `.expect()`, or document/guarantee the invariant and fall back gracefully.","locations":[{"ref":"crates/string_wizard/src/ plit error\") {\n   24 |       Some(chunk) => {\n   25 |         chunk.append_outro(content.into());\n   26 |       }\n   27 |       None => self.append_intro(content.into()),\n   28 |     }\n   29 |     self\n   30 |   }\n   31 | \n   32 |   /// # Example\n   33 |   /// ```rust\n   34 |   /// use string_wizard::MagicString;\n   35 |   /// let mut s = MagicString::new(\"01234\");\n   36 |   /// s.append_right(2, \"A\");\n   37 |   /// s.append_right(2, \"B\");\n   38 |   /// s.append_left(2, \"a\");\n   39 |   /// s.append_left(2, \"b\");\n   40 |   /// assert_eq!(s.to_string(), \"01abAB234\")\n   41 |   ///```\n   42 |   pub fn append_right(&mut self, text_index: u32, content: impl Into<CowStr<'text>>) -> &mut Self {\n   43 |     // Note: by_start_mut only errors when splitting an already-edited chunk,\n   44 |     // but append operations don't require splitting edited chunks in practice.\n   45 |     // We use expect here as this is an internal invariant.\n   46 |     match self.by_start_mut(text_index).expect(\"append_right: unexpected split error\") {\n   47 |       Some(chunk) => {\n   48 |         chunk.append_intro(content.into());\n   49 |       }\n   50 |       None => self.append_outro(content.into()),\n   51 |     }\n   52 |     self\n   53 |   }","lines":35,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/append.rs#L19-L53"},{"ref":"crates/string_wizard/src/magic_string/mod.rs:318-336","code":"  318 |   fn by_start_mut(&mut self, text_index: u32) -> Result<Option<&mut Chunk<'text>>, String> {\n  319 |     if text_index as usize == self.source.len() {\n  320 |       Ok(None)\n  321 |     } else {\n  322 |       self.split_at(text_index)?;\n  323 |       let idx = self.chunk_by_start.get(&text_index);\n  324 |       Ok(idx.map(|idx| &mut self.chunks[*idx]))\n  325 |     }\n  326 |   }\n  327 | \n  328 |   fn by_end_mut(&mut self, text_index: u32) -> Result<Option<&mut Chunk<'t
