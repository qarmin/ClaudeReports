parse indices (it has an `insert(i, item)` method and `reserve` calls it a \"sparse index\nvec\"). If any entry was previously `insert`ed at a non-contiguous index, `m.len()` no longer corresponds to the next\nfree slot, so `push` can collide with / overwrite an existing entry or skip indices. Mixing `insert` and `push` on\nthe same Map instance is a latent correctness hazard.","fix":"Either forbid `push` on the Map variant (panic like `insert` does for IndexVec), or track a separate monotonic next-index counter for the Map variant instead of deriving it from `len()`.","locations":[{"ref":"crates/rolldown_common/src/types/hybrid_index_vec.rs:25-44","code":"   25 |   pub fn push(&mut self, item: T) -> I {\n   26 |     match self {\n   27 |       HybridIndexVec::IndexVec(v) => v.push(item),\n   28 |       HybridIndexVec::Map(m) => {\n   29 |         let idx = I::from_usize(m.len());\n   30 |         m.insert(idx, item);\n   31 |         idx\n   32 |       }\n   33 |     }\n   34 |   }\n   35 |   /// # Panic\n   36 |   /// This method is only available for `Sparse Map` variant.\n   37 |   pub fn insert(&mut self, i: I, item: T) {\n   38 |     match self {\n   39 |       HybridIndexVec::IndexVec(_) => unreachable!(),\n   40 |       HybridIndexVec::Map(m) => {\n   41 |         m.insert(i, item);\n   42 |       }\n   43 |     }\n   44 |   }","lines":20,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/types/hybrid_index_vec.rs#L25-L44"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`extract_context_variables_from_action` recurses into nested objects/arrays to collect `${var}` placeholders, but `inject_context_data` only walks the top-level object and never recurses. If a placeholder ever appears in a nested field, the variable is collected and resolved into `found_context_fields` but is never substituted back into the value - it stays as the literal `${var}` in the output. The two functions sitting next to each other with divergent traversal depth is a latent correctness trap for any future nested placeholder.","fix":"Make both functions use the same traversal: either recurse in `inject_context_data` too, or restrict extraction to the top level to match injection.","locations":[{"ref":"crates/rolldown_devtools/src/devtools_formatter.rs:98-118","code":"   98 | pub fn extract_context_variables_from_action(meta: &serde_json::Value) -> FxHashSet<String> {\n   99 |   fn visit(meta: &serde_json::Value, context_variables: &mut FxHashSet<String>) {\n  100 |     if let serde_json::Value::Object(map) = meta {\n  101 |       for (_key, value) in map {\n  102 |         match value {\n  103 |           serde_json::Value::String(value) if value.starts_with(\"${\") && value.ends_with('}') => {\n  104 |             // Check if the value is a placeholder for provided data\n  105 |             {\n  106 |               let var_name = &value[2..value.len() - 1];\n  107 |               context_variables.insert(var_name.to_string());\n  108 |             }\n  109 |           }\n  110 |           _ => visit(value, context_variables),\n  111 |         }\n  112 |       }\n  113 |     }\n  114 |   }\n  115 | \n  116 |   let mut contextual_fields = FxHashSet::default();\n  117 |   visit(meta, &mut contextual_fields);\n  118 |   contextual_fields","lines":21,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/devtools_formatter.rs#L98-L118"},{"ref":"crates/rolldown_devtools/src/devtools_formatter.rs:121-135","code":"  121 | pub fn inject_context_data(meta: &mut serde_json::Value, context_data: &FxHashMap<String, String>) {\n  122 |   if let serde_json::Value::Object(map) = meta {\n  123 |     for value in map.values_mut() {\n  124 |       if let serde_json::Value::String(value) = value {\n  125 |         if value.starts_with(\"${\") && value.ends_with('}') {\n  126 |           // Check if the value is a placeholder for provided data\n  127 |           let var_name = &value[2..value.len() - 1];\n  128 |           if let Some(replacement_value) = context_data.get(var_name) {\n  129 |             *value = replacement_value.clone();\n  130 |           }\n  131 |         }\n  132 |       }\n  133 |     }\n  134 |   }\n  135 | }","lines":15,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/devtools_formatter.rs#L121-L135"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Threshold mismatch between the two passes of `write_event`. Pass 1 emits a `StringRef` (content-bearing) line for any string longer than 5KB, but pass 2 only replaces a field with `$ref:<hash>` when the string is longer than 10KB. Consequently, strings in the (5KB, 10KB] range get a StringRef line written to the file (duplicating the content), yet are still inlined verbatim in the event line - the StringRef is orphaned (never referenced) and the deduplication/space-saving intent is defeated, roughly doubling on-disk size for those fields.","fix":"Use a single shared threshold constant for both passes (emit StringRef and substitute `$ref:` at the same size cutoff).","locations":[{"ref":"crates/rolldown_devtools/src/writer.rs:127-128","code":"  127 |       if s.len() > 5 * 1024 {\n  128 |         let hash = blake3::hash(s.as_bytes()).to_hex().to_string();","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/writer.rs#L127-L128"},{"ref":"crates/rolldown_devtools/src/writer.rs:152-154","code":"  152 |         serde_json::Value::String(s) if s.len() > 10 * 1024 => {\n  153 |           let hash = blake3::hash(s.as_bytes()).to_hex().to_string();\n  154 |           map.serialize_entry(key, &format!(\"$ref:{hash}\"))?;","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/writer.rs#L152-L154"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"The virtual-module help hint never triggers because the prefix string is wrong. `UnloadableDependency::resolved` stores the raw module id, and virtual module ids start with a single NUL byte `\\0` (see `transform_plugin_context.rs:71`, `normal_module.rs:120`, etc.). The check compares against the two-character literal backslash-zero (`\"\\0\"` in Rust source = `\\` followed by `0`), which a raw NUL-prefixed id can never start with. The `resolved` value is also not run through `stabilize_path` (which would escape `\\0` -> `\\\\0`), so even the escaped form is wrong. As a result the \"This module seems to be a virtual module...\" help is dead and users never see it. It should be `self.resolved.starts_with('\\0')`.","fix":"Change the guard to `if self.resolved.starts_with('\\0')` (single NUL char), matching how virtual ids are detected everywhere else.","locations":[{"ref":"crates/rolldown_error/src/build_diagnostic/events/unloadable_dependency.rs:67-71","code":"   67 |     if self.resolved.starts_with(\"\\\\0\") {\n   68 |       diagnostic.add_help(String::from(\n   69 |         \"This module seems to be a virtual module, but no plugin handled it via the load hook.\",\n   70 |       ));\n   71 |     }","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_error/src/build_diagnostic/events/unloadable_dependency.rs#L67-L71"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`is_variable_declaration_prefix` indexes characters using a byte length.\n`s.chars().nth(s.len() - 6)` and the `let`/`var` equivalents treat `s.len()`\n(byte length) as a char index. `s` is the source text BEFORE a match and can\ncontain multi-byte UTF-8 (comments, identifiers, strings). When it does,\n`chars().nth(byte_len - N)` selects the wrong character (or `None`), so the\n\"word boundary before const/let/var\" check is computed against the wrong\nposition. This misdetects variable-declaration prefixes for any non-ASCII\ninput preceding the keyword, causing `prevent_assignment` to wrongly skip or\nwrongly perform replacements. `chars().nth()` is also O(n), making this an\nO(n^2) scan over the prefix.","fix":"Operate on `char` boundaries: check the char immediately preceding the keyword\nvia `s[..s.len()-5].chars().next_back()` (byte-slicing at a known ASCII\nkeyword boundary is safe) instead of `chars().nth(s.len()-N)`.","locations":[{"ref":"crates/rolldown_plugin_replace/src/plugin.rs:42-58","code":"   42 | fn is_variable_declaration_prefix(s: &str) -> bool {\n   43 |   // First check if there's any whitespace at the end\n   44 |   if !s.ends_with(|c: char| c.is_whitespace()) {\n   45 |     return false;\n   46 |   }\n   47 | \n   48 |   // Trim the trailing whitespace\n   49 |   let s = s.trim_end();\n   50 | \n   51 |   // Check for word boundary before the keywords\n   52 |   (s.ends_with(\"const\")\n   53 |     && (s.len() == 5 || !s.chars().nth(s.len() - 6).unwrap_or(' ').is_alphanumeric()))\n   54 |     || (s.ends_with(\"let\")\n   55 |       && (s.len() == 3 || !s.chars().nth(s.len() - 4).unwrap_or(' ').is_alphanumeric()))\n   56 |     || (s.ends_with(\"var\")\n   57 |       && (s.len() == 3 || !s.chars().nth(s.len() - 4).unwrap_or(' ').is_alphanumeric()))\n   58 | }","lines":17,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_replace/src/plugin.rs#L42-L58"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Inline script/style content is read by `node.children.borrow_mut().pop()`,\ntaking only the LAST text child. html5gum can emit an element's text as\nseveral `Text` tokens (entities, state switches) or interleave it with\ncomments. When that happens only the final fragment is captured and parsed /\ncached, the rest is silently dropped, and the byte offset (`span.start`)\nhanded to the oxc parser / inline-import visitor no longer matches the partial\ncontents. It also mutates the DOM (`pop`) purely to read content.","fix":"Concatenate all `Text` children (using the span covering the full text range)\ninstead of popping only the last; avoid mutating the tree to read it.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/lib.rs:177","code":"  177 |                 } else if let Some(node) = node.children.borrow_mut().pop() {","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/lib.rs#L177"},{"ref":"crates/rolldown_plugin_vite_html/src/lib.rs:212-213","code":"  212 |               } else if let Some(node) = node.children.borrow_mut().pop() {\n  213 |                 let html::sink::NodeData::Text { contents, span } = &node.data else {","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/lib.rs#L212-L213"},{"ref":"crates/rolldown_plugin_vite_html/src/lib.rs:343-345","code":"  343 |             && let Some(node) = node.children.borrow_mut().pop()\n  344 |           {\n  345 |             let html::sink::NodeData::Text { ref contents, span } = node.data else {","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/lib.rs#L343-L345"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Injected tag attributes are stored/iterated through an `FxHashMap`, whose\niteration order is nondeterministic. `serialize_attrs` therefore emits\nattributes (e.g. on injected `<script>`/`<link>` tags) in arbitrary,\nrun-to-run-varying order, producing non-reproducible HTML output - bad for\ndiffs, snapshot tests, and content-hash stability.","fix":"Use an order-preserving structure (e.g. `Vec<(&str, AttrValue)>` or IndexMap)\nfor tag attributes, or sort keys before serialization.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/utils/html_inject.rs:44-71","code":"   44 | fn serialize_attrs(attrs: Option<&rustc_hash::FxHashMap<&'static str, AttrValue>>) -> String {\n   45 |   let Some(attrs) = attrs else {\n   46 |     return String::new();\n   47 |   };\n   48 |   let mut result = String::new();\n   49 |   for (key, value) in attrs {\n   50 |     match value {\n   51 |       AttrValue::String(s) => {\n   52 |         // Escape HTML entities in attribute values\n   53 |         result.push_str(&rolldown_utils::concat_string!(\n   54 |           \" \",\n   55 |           key,\n   56 |           \"=\\\"\",\n   57 |           s.cow_replace('&', \"&amp;\")\n   58 |             .cow_replace('\"', \"&quot;\")\n   59 |             .cow_replace('<', \"&lt;\")\n   60 |             .cow_replace('>', \"&gt;\"),\n   61 |           \"\\\"\"\n   62 |         ));\n   63 |       }\n   64 |       AttrValue::Boolean(true) => {\n   65 |         result.push_str(&rolldown_utils::concat_string!(\" \", key));\n   66 |       }\n   67 |       AttrValue::Boolean(false) | AttrValue::Undefined => {}\n   68 |     }\n   69 |   }\n   70 |   result\n   71 | }","lines":28,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/utils/html_inject.rs#L44-L71"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`is_json_ext` diverges from the Vite regex `/\\.json(?:$|\\?)(?!commonjs-(?:proxy|external))/`. The regex uses a negative lookahead that fails whenever the text after `.json?` merely STARTS WITH `commonjs-proxy` or `commonjs-external`. The Rust port instead requires FULL equality of the whole postfix string (`postfix != \"commonjs-proxy\" && postfix != \"commonjs-external\"`). So an id like `test.json?commonjs-proxy-extra` is rejected by Vite (lookahead matches the prefix) but accepted here (full string differs), producing different transform decisions for commonjs-proxy/external suffixed ids that carry trailing characters.","fix":"Match the prefix semantics of the lookahead: replace the equality checks with `!postfix.starts_with(\"commonjs-proxy\") && !postfix.starts_with(\"commonjs-external\")`.","locations":[{"ref":"crates/rolldown_plugin_vite_json/src/utils.rs:1-11","code":"    1 | /// /\\.json(?:$|\\?)(?!commonjs-(?:proxy|external))/\n    2 | pub fn is_json_ext(ext: &str) -> bool {\n    3 |   if ext.ends_with(\".json\") {\n    4 |     return true;\n    5 |   }\n    6 |   let Some(i) = memchr::memmem::rfind(ext.as_bytes(), b\".json?\") else {\n    7 |     return false;\n    8 |   };\n    9 |   let postfix = &ext[i + 6..];\n   10 |   postfix != \"commonjs-proxy\" && postfix != \"commonjs-external\"\n   11 | }","lines":11,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_json/src/utils.rs#L1-L11"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the reporter, the message truncation compares `message.len()` (byte length, including ANSI color escape sequences emitted by `utils::paint`) against the terminal width (display columns). For any colored message the byte length is far larger than the visible width, so messages that visually fit are still truncated, and the truncation point bears no relation to the actual rendered column. The displayed `transforming (...) <path>` line will be cut arbitrarily.","fix":"Measure the visible width by stripping ANSI escapes (or build the truncated plain string first, then apply styling), and compare that against the terminal column count.","locations":[{"ref":"crates/rolldown_plugin_vite_reporter/src/utils.rs:98-101","code":"   98 |   let message = terminal_size::terminal_size()\n   99 |     .map(|(width, _)| width.0 as usize)\n  100 |     .map_or(message, |width| if message.len() < width { message } else { &message[..width] });\n  101 | ","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_reporter/src/utils.rs#L98-L101"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `indent_with`, `char_index` is only assigned inside the non-edited (`else`) branch (set to `chunk.start()` then `chunk_end`). For an edited chunk the exclude test `exclude_set.contains(char_index)` uses a stale `char_index` left over from a previous iteration. After a non-edited chunk `char_index == that chunk end == next chunk start`, so a single edited chunk happens to read the right value, but two consecutive edited chunks make the second one test the wrong position (the first edited chunk's start), so the `exclude` range is applied to the wrong chunk.","fix":"Set `char_index = self.chunks[chunk_idx].start();` at the top of each loop iteration (before branching on `edited_content`) so the exclude test always uses the current chunk start.","locations":[{"ref":"crates/string_wizard/src/magic_string/indent.rs:103-135","code":"  103 |     let mut next_chunk_id = Some(self.first_chunk_idx);\n  104 |     let mut char_index: u32 = 0;\n  105 |     while let Some(chunk_idx) = next_chunk_id {\n  106 |       // Make sure the `next_chunk_id` is updated before we split the chunk. Otherwise, we\n  107 |       // might process the same chunk twice.\n  108 |       next_chunk_id = self.chunks[chunk_idx].next;\n  109 |       if let Some(edited_content) = self.chunks[chunk_idx].edited_content.as_mut() {\n  110 |         if !exclude_set.contains(char_index) {\n  111 |           indent_frag(edited_content, &mut indent_replacer);\n  112 | "/\"/\"\\\\\"\nrequirement - this is correct, but the dual-separator handling suggests the author was unsure which\nseparator `normalize()` emits, which is fragile across platforms.","fix":"Normalize to a single separator (or operate on `Path::components()` and reject a leading\n`Component::ParentDir`) instead of string-prefix matching both separators, making the check\nplatform-independent and robust.","locations":[{"ref":"crates/rolldown/src/bundle/bundle.rs:420-432","code":"  420 | fn is_filename_outside_output_dir(filename: &str) -> bool {\n  421 |   if Path::new(filename).is_absolute() {\n  422 |     return true;\n  423 |   }\n  424 | \n  425 |   let normalized = filename.normalize();\n  426 |   let normalized = normalized.to_string_lossy();\n  427 | \n  428 |   normalized == \".\"\n  429 |     || normalized == \"..\"\n  430 |     || normalized.starts_with(\"../\")\n  431 |     || normalized.starts_with(\"..\\\\\")\n  432 | }","lines":13,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/bundle/bundle.rs#L420-L432"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_use_strict_directive` trims any leading run of quote chars and any trailing run of quote/semicolon chars, then compares to `use strict`. This would also match malformed inputs like `'\"use strict;;'` or mixed quotes `'use strict\"`. Directives in practice are well-formed so this is low risk, but the asymmetric quote trimming (it does not require matching open/close quotes) is a latent correctness smell used to decide whether to inject/strip `\"use strict\"`.","fix":"Match the directive more strictly (e.g. exact `\"use strict\"` / `'use strict'` with optional trailing `;`) rather than trimming arbitrary runs of quote characters from both ends.","locations":[{"ref":"crates/rolldown/src/ecmascript/format/utils/mod.rs:174-179","code":"  174 | /// Returns `true` if the given directive string is a `\"use strict\"` directive.\n  175 | /// Handles both single-quoted (`'use strict'`) and double-quoted (`\"use strict\"`) forms,\n  176 | /// with or without a trailing semicolon.\n  177 | pub fn is_use_strict_directive(s: &str) -> bool {\n  178 |   s.trim_start_matches(['\\'', '\"']).trim_end_matches(['\\'', '\"', ';']) == \"use strict\"\n  179 | }","lines":6,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ecmascript/format/utils/mod.rs#L174-L179"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `propagate_update`, when an importer reports `can_accept_hmr_dependency_for`, the code does\n`modules_to_be_updated.insert(module_idx)` again (line 1085) even though `module_idx` was already\ninserted at the top of the function (line 1017). The redundant insert is harmless for\ncorrectness but signals confused intent: the value being inserted is the importee\n(`module_idx`), not the accepting importer (`importer_idx`) recorded in the boundary, so a reader\nmay believe the accepting importer is being added to the update set when it is not.","fix":"Remove the redundant `modules_to_be_updated.insert(module_idx)` at line 1085 (it is already inserted at the function entry); the importer is added when `propagate_update` recurses into it.","locations":[{"ref":"crates/rolldown/src/hmr/hmr_stage.rs:1085-1086","code":" 1085 |         modules_to_be_updated.insert(module_idx);\n 1086 |         hmr_boundaries.insert(HmrBoundary { boundary: importer_idx, accepted_via: module_idx });","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/hmr/hmr_stage.rs#L1085-L1086"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `transform_or_remove_import_export_stmt`, the CJS branch handles `transferred_import_record` by re-rendering the just-built statement to a source string and returning `true` (remove). This `to_source_string()` allocation happens on the finalize path for every transferred CJS import record. The ESM branch does the same. While functionally a feature (recording transferred records), serializing each statement to a String during finalize is a notable per-record allocation in a hot path.","fix":"Consider deferring source-string rendering of transferred records out of the finalize loop, or storing the AST node / a cheaper representation, if profiling shows this matters.","locations":[{"ref":"crates/rolldown/src/module_finalizers/mod.rs:384-409","code":"  384 |         if self.transferred_import_record.contains_key(&rec_idx) {\n  385 |           self.transferred_import_record.insert(rec_idx, stmt.to_source_string());\n  386 |           return true;\n  387 |         }\n  388 |         return false;\n  389 |       }\n  390 |       // Replace the import statement with `init_foo()` if `ImportDeclaration` is not a plain import\n  391 |       // or the importee have side effects.\n  392 |       WrapKind::Esm => {\n  393 |         if matches!(\n  394 |           importee_linking_info.concatenated_wrapped_module_kind,\n  395 |           ConcatenateWrappedModuleKind::Inner\n  396 |         ) || self.generated_init_esm_importee_ids.contains(&importee.idx)\n  397 |         {\n  398 |           return true;\n  399 |         }\n  400 |         self.generated_init_esm_importee_ids.insert(importee.idx);\n  401 |         // `init_foo()` / `await init_foo()`\n  402 |         let init_expr = self.wrapped_esm_init_call_expr(importee.idx, stmt.span(), false, true);\n  403 |         *stmt = self.ast_factory.statement_expression(SPAN, init_expr);\n  404 | \n  405 |         if self.transferred_import_record.contains_key(&rec_idx) {\n  406 |           self.transferred_import_record.insert(rec_idx, stmt.to_source_string());\n  407 |           return true;\n  408 |         }\n  409 |         return false;","lines":26,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/module_finalizers/mod.rs#L384-L409"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`process_keep_name_for_expression` wraps named function/class expressions only when `id.is_some()` returns early (handled elsewhere), but for `ArrowFunctionExpression` it always wraps regardless of whether `keep_name_id` resolves to a deconflicted name. `process_fn` returns `None` when not deconflicted, so the arrow branch is gated on `process_fn` returning `Some`, which is correct - but note the arrow branch ignores the `_insert_position`/`new_name` it computes, building a `__name(arrow, original)` call inline. This is consistent with the function-expression branch, so behavior is fine; flagged only to confirm the asymmetric handling of arrows (no binding rename, always inline-wrapped) is intentional and not a missed case for named-context arrows.","fix":"No code change required if intentional; consider a one-line comment clarifying why arrows are always inline-wrapped while named fn/class exprs are routed through `visit_expression`.","locations":[{"ref":"crates/rolldown/src/module_finalizers/mod.rs:1957-1982","code":" 1957 |       ast::Expression::FunctionExpression(fn_expression) => {\n 1958 |         // Named function expressions are handled in visit_expression\n 1959 |         if fn_expression.id.is_some() {\n 1960 |           return;\n 1961 |         }\n 1962 |         if let Some((_insert_position, original_name, _)) =\n 1963 |           self.process_fn(keep_name_id, keep_name_id)\n 1964 |         {\n 1965 |           let fn_expr = expr.take_in(self.alloc);\n 1966 |           let name_ref = self.canonical_ref_for_runtime(\"__name\");\n 1967 |           let (finalized_callee, _) = self.finalized_expr_for_symbol_ref(name_ref, false, false);\n 1968 |           *expr =\n 1969 |             self.ast_factory.make_keep_name_call(&original_name, fn_expr, finalized_callee, true);\n 1970 |         }\n 1971 |       }\n 1972 |       ast::Expression::ArrowFunctionExpression(_fn_expr) => {\n 1973 |         if let Some((_insert_position, original_name, _)) =\n 1974 |           self.process_fn(keep_name_id, keep_name_id)\n 1975 |         {\n 1976 |           let fn_expr = expr.take_in(self.alloc);\n 1977 |           let name_ref = self.canonical_ref_for_runtime(\"__name\");\n 1978 |           let (finalized_callee, _) = self.finalized_expr_for_symbol_ref(name_ref, false, false);\n 1979 |           *expr =\n 1980 |             self.ast_factory.make_keep_name_call(&original_name, fn_expr, finalized_callee, true);\n 1981 |         }\n 1982 |       }","lines":26,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/module_finalizers/mod.rs#L1957-L1982"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The `JsonModule` flag is set on an import record purely by checking `resolved_id.id.ends_with(\".json\")`\nin vite mode. A resolved id that ends in `.json` but is not actually a JSON module (e.g. a virtual\nmodule or a plugin-produced id that merely has a `.json` suffix) is incorrectly tagged\n`ImportRecordMeta::JsonModule`, which later drives the special `__toCommonJS(...).default` unwrap\nin the HMR `require` rewrite. The detection should be tied to the module's actual resolved\n`ModuleType`, not a string suffix.","fix":"Key the `JsonModule` meta off the resolved module's `ModuleType`/asserted type rather than the `.json` filename suffix.","locations":[{"ref":"crates/rolldown/src/module_loader/module_loader.rs:458-462","code":"  458 |             if self.shared_context.options.experimental.vite_mode.unwrap_or_default()\n  459 |               && resolved_id.id.as_str().ends_with(\".json\")\n  460 |             {\n  461 |               raw_rec.meta gic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In `generate_bundle`, when deciding to delete an entry chunk whose sole module is a handled asset id, the guard only checks whether the chunk's filename appears in another chunk's `imports`/`dynamic_imports`. Assets (`Output::Asset`) referencing the chunk are not considered, and the iteration re-scans the entire bundle for every deletion candidate (O(n*m)). For large bundles with many deletable asset-only entry chunks this is quadratic. Marked low because the deletion set is usually tiny.","fix":"Precompute the set of referenced chunk filenames once before the removal loop instead of rescanning per candidate.","locations":[{"ref":"crates/rolldown_plugin_vite_asset/src/lib.rs:185-206","code":"  185 |     for (i, e) in deleted_files.into_iter().rev().enumerate() {\n  186 |       'outer: for j in (0..8).rev() {\n  187 |         if e & (1 << j) != 0 {\n  188 |           let index = (len - 1 - i) * 8 + j;\n  189 |           if index >= args.bundle.len() {\n  190 |             continue;\n  191 |           }\n  192 |           if let Output::Chunk(item) = &args.bundle[index] {\n  193 |             for file in args.bundle.iter() {\n  194 |               if let Output::Chunk(chunk) = file {\n  195 |                 if chunk.imports.contains(&item.filename)\n  196 |                   || chunk.dynamic_imports.contains(&item.filename)\n  197 |                 {\n  198 |                   continue 'outer;\n  199 |                 }\n  200 |               }\n  201 |             }\n  202 |           }\n  203 |           args.bundle.remove(index);\n  204 |         }\n  205 |       }\n  206 |     }","lines":22,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_asset/src/lib.rs#L185-L206"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`has_dynamic_import` after finding `import` not followed by `(` or `/` advances `i = j` (the position after trailing whitespace). Because `memchr::memmem::find` is then re-run on `&bytes[i..]`, overlapping later occurrences are still found, but when the word-boundary check fails it sets `i = abs_pos + 6` and continues - this can skip a following valid `import(` that begins inside the 6 bytes only in pathological cases. The loop bound `while i + 6 < bytes.len()` also excludes a buffer whose final 7 bytes are exactly `import(` at the very end is handled, but a file consisting solely of e.g. `a.import(x)` near the tail relies on the boundary advance being correct. Behaviour is correct for normal input; flagged as a fragile hand-rolled scanner worth a comment/test.","fix":"Add tests for `import(` at end-of-buffer and immediately after an identifier char, and document the boundary-advance invariant.","locations":[{"ref":"crates/rolldown_plugin_vite_dynamic_import_vars/src/utils.rs:21-56","code":"   21 | pub fn has_dynamic_import(code: &str) -> bool {\n   22 |   let bytes = code.as_bytes();\n   23 | \n   24 |   let mut i = 0;\n   25 |   while i + 6 < bytes.len() {\n   26 |     // Find \"import\"\n   27 |     if let Some(pos) = memchr::memmem::find(&bytes[i..], b\"import\") {\n   28 |       let abs_pos = i + pos;\n   29 | \n   30 |       // Check word boundary before \"import\"\n   31 |       if abs_pos > 0 {\n   32 |         let prev = bytes[abs_pos - 1];\n   33 |         if prev.is_ascii_alphanumeric() || prev == b'_' {\n   34 |           i = abs_pos + 6;\n   35 |           continue;\n   36 |         }\n   37 |       }\n   38 | \n   39 |       // Skip whitespace after \"import\"\n   40 |       let mut j = abs_pos + 6;\n   41 |       while j < bytes.len() && bytes[j].is_ascii_whitespace() {\n   42 |         j += 1;\n   43 |       }\n   44 | \n   45 |       // Check for '(' or '/' (slash covers comments between import and '(')\n   46 |       if j < bytes.len() && (bytes[j] == b'(' || bytes[j] == b'/') {\n   47 |         return true;\n   48 |       }\n   49 | \n   50 |       i = j;\n   51 |     } else {\n   52 |       break;\n   53 |     }\n   54 |   }\n   55 |   false\n   56 | }","lines":36,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_dynamic_import_vars/src/utils.rs#L21-L56"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`is_excluded_url`'s scheme scan only accepts `is_ascii_lowercase` before\n`://`, so uppercase or mixed-case schemes (`HTTP://`, `Https://`) and schemes\ncontaining digits/`+`/`-`/`.` (`h2c://`, valid per RFC 3986) are NOT treated as\nexternal and get processed as local assets. This diverges from Vite's\ncase-insensitive external-URL matching. Note `data:` is matched\ncase-insensitively just below, so the handling is internally inconsistent too.","fix":"Accept the full scheme charset `[A-Za-z][A-Za-z0-9+.-]*` case-insensitively\nbefore `://`, matching Vite's externalRE.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/utils/helpers.rs:35-49","code":"   35 | pub fn is_excluded_url(url: &str) -> bool {\n   36 |   url.starts_with('#')\n   37 |     || {\n   38 |       let b = url.as_bytes();\n   39 |       if b.starts_with(b\"//\") {\n   40 |         return true;\n   41 |       }\n   42 |       let mut i = 0;\n   43 |       while i < b.len() && b[i].is_ascii_lowercase() {\n   44 |         i += 1;\n   45 |       }\n   46 |       i > 0 && i + 2 < b.len() && &b[i..i + 3] == b\"://\"\n   47 |     }\n   48 |     || url.trim_start().get(..5).is_some_and(|p| p.eq_ignore_ascii_case(\"data:\"))\n   49 | }","lines":15,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/utils/helpers.rs#L35-L49"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_jsx` decides JSX eligibility by `id_without_query.ends_with('x')`. This matches `.jsx`/`.tsx`/`.mdx` but also matches any file whose path ends in the letter `x` (e.g. `foo.docx`, `bar.linux`, a file literally named `x`). Vite uses a precise extension regex (`/\\.([cm]?[jt]sx?|mdx)$/`). The over-broad check can mark unrelated modules as fast-refresh eligible; impact is limited because content-based guards follow, but it is still an incorrect, surprising heuristic.","fix":"Check for the actual JSX/TSX/MDX extensions (e.g. `.jsx`, `.tsx`, `.mdx`, with optional `c`/`m` prefixes) rather than a bare trailing `x`.","locations":[{"ref":"crates/rolldown_plugin_vite_react_refresh_wrapper/src/lib.rs:153-156","code":"  153 | fn is_jsx(id: &str) -> bool {\n  154 |   let id_without_query = id.split_once('?').map_or(id, |(id, _)| id);\n  155 |   id_without_query.ends_with('x')\n  156 | }","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_react_refresh_wrapper/src/lib.rs#L153-L156"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Resolver::try_rollup_compatibility_resolve` computes `importer_dir` from the importer's parent but\nthen ignores the importer's own absoluteness: it joins the specifier onto `self.cwd`\n(`self.cwd.join(specifier)`) and resolves that normalized absolute path against `importer_dir`. When\nan importer IS present and is not under cwd, the fallback resolves a cwd-relative path from a\ndifferent base directory, which can produce surprising results. The doc comment only describes the\nno-importer entry case; the importer-present branch's behavior is undocumented and arguably\ninconsistent with the stated Rollup compatibility intent.","fix":"Either resolve the specifier relative to `importer_dir` (not cwd) when an importer is present, or document why cwd-join is intended in that branch.","locations":[{"ref":"crates/rolldown_resolver/src/resolver.rs:205-226","code":"  205 |   fn try_rollup_compatibility_resolve(\n  206 |     &self,\n  207 |     resolver: &ResolverGeneric<Fs>,\n  208 |     importer: Option<&Path>,\n  209 |     specifier: &str,\n  210 |     original_resolution: Result<Resolution, ResolveError>,\n  211 |   ) -> Result<Resolution, ResolveError> {\n  212 |     if specifier.starts_with('.') || specifier.starts_with('/') {\n  213 |       return original_resolution;\n  214 |     }\n  215 | \n  216 |     let importer_dir = importer\n  217 |       .and_then(|importer_path| importer_path.parent())\n  218 |       .and_then(|parent_dir| parent_dir.components().next().is_some().then_some(parent_dir))\n  219 |       .unwrap_or(self.cwd.as_path());\n  220 | \n  221 |     // Try resolving relative to cwd as a fallback\n  222 |     let joined = self.cwd.join(specifier);\n  223 |     let specifier_path = joined.normalize();\n  224 |     let fallback = resolver.resolve(importer_dir, &specifier_path.to_string_lossy());\n  225 |     if fallback.is_ok() { fallback } else { original_resolution }\n  226 |   }","lines":22,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_resolver/src/resolver.rs#L205-L226"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Contradictory control flow in `collapse_sourcemaps`: `debug_assert!(sourcemap_chain.len() > 1)` asserts more than one element, but the immediately following `if sourcemap_chain.len() == 1 { return ... }` handles the single-element case. In debug builds the assert fires before the `len == 1` branch can ever run, so a 1-element slice panics in debug despite the code appearing to support it; the branch is effectively dead in debug.","fix":"Relax the assert (e.g. `debug_assert!(!sourcemap_chain.is_empty());`) so the `len == 1` fast path is reachable, or drop the branch if a single-element chain is truly a programming error.","locations":[{"ref":"crates/rolldown_sourcemap/src/lib.rs:58-62","code":"   58 |   debug_assert!(sourcemap_chain.len() > 1);\n   59 |   if sourcemap_chain.len() == 1 {\n   60 |     // If there's only one sourcemap, return it as is.\n   61 |     return sourcemap_chain[0].clone();\n   62 |   }","lines":5,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_sourcemap/src/lib.rs#L58-L62"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`BitSet::union` indexes `self.entries[i]` for every byte of `other` with no length check, panicking with index-out-of-bounds when `other` is longer than `self`. The sibling `intersect` explicitly handles a size mismatch, making the asymmetry surprising. Since `IndexBitSet::default()` yields a zero-length BitSet and `union` is used across the codebase, unioning a longer/sized set into an empty one panics rather than behaving as a set union.","fix":"Grow `self.entries` to `max(self.len(), other.len())` (resize with 0) before OR-ing, or zip the shorter side and extend with the remainder of `other`.","locations":[{"ref":"crates/rolldown_utils/src/bitset.rs:51-64","code":"   51 |   pub fn union(&mut self, other: &Self) {\n   52 |     for (i, &e) in other.entries.iter().enumerate() {\n   53 |       self.entries[i] |= e;\n   54 |     }\n   55 |   }\n   56 | \n   57 |   pub fn intersect(&mut self, other: &Self) {\n   58 |     for (left, right) in self.entries.iter_mut().zip(&other.entries) {\n   59 |       *left &= right;\n   60 |     }\n   61 |     if self.entries.len() > other.entries.len() {\n   62 |       self.entries[other.entries.len()..].fill(0);\n   63 |     }\n   64 |   }","lines":14,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_utils/src/bitset.rs#L51-L64"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`is_data_url` trims leading whitespace (`s.trim_start().starts_with(\"data:\")`) but `parse_data_url` begins with a bare `tag(\"data:\")` and does not skip leading whitespace. A specifier with leading whitespace passes the `is_data_url` gate yet `parse_data_url` returns `None`, an inconsistent contract between the two functions that can make data-URL loading bail out as \"not a data URL\" for inputs `is_data_url` accepted.","fix":"Make the two agree: either have `is_data_url` not trim, or have the parser skip leading whitespace before `tag(\"data:\")`.","locations":[{"ref":"crates/rolldown_utils/src/dataurl.rs:12-14","code":"   12 | pub fn is_data_url(s: &str) -> bool {\n   13 |   s.trim_start().starts_with(\"data:\")\n   14 | }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_utils/src/dataurl.rs#L12-L14"},{"ref":"crates/rolldown_utils/src/dataurl.rs:22-52","code":"   22 | #[inline]\n   23 | // Parse the data URL with a more flexible approach\n   24 | fn parse_data_url_nom(input: &str) -> IResult<&str, ParsedDataUrl<'_>> {\n   25 |   // Start with \"data:\" prefix\n   26 |   let (input, _) = tag(\"data:\")(input)?;\n   27 | \n   28 |   // Parse the MIME type\n   29 |   let (input, mime) = recognize(take_till(|c| c == ';' || c == ',')).parse(input)?;\n   30 | \n   31 |   // Handle the case where there's no charset or base64 marker\n   32 |   if let Ok((remaining, data)) =\n   33 |     preceded(char::<_, Error<_>>(','), take_while(|_| true)).parse(input)\n   34 |   {\n   35 |     return Ok((\n   36 |       remaining,\n   37 |       ParsedDataUrl { mime: mime.trim(), is_base64: false, data: data.trim() },\n   38 |     ));\n   39 |   }\n   40 | \n   41 |   // Parse optional charset\n   42 |   let (input, _) =\n   43 |     opt(preceded(tag(\";charset=\"), take_till(|c| c == ';' || c == ','))).parse(input)?;\n   44 | \n   45 |   // Check for base64 encoding\n   46 |   let (input, is_base64) = map(opt(tag(\";base64\")), |opt_tag| opt_tag.is_some()).parse(input)?;\n   47 | \n   48 |   // Parse the data part after the comma\n   49 |   let (remaining, data) = preceded(char(','), take_while(|_| true)).parse(input)?;\n   50 | \n   51 |   Ok((remaining, ParsedDataUrl { mime: mime.trim(), is_base64, data: data.trim() }))\n   52 | }","lines":31,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_utils/src/dataurl.rs#L22-L52"}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`encode_as_percent_escaped` / the percent-escaping path collects the whole input into a `Vec<char>` solely for `chars[i+1]`/`chars[i+2]` lookahead when detecting an existing `%XY` escape. The lookahead only needs the next two ASCII bytes, so the Vec<char> materialization is an unnecessary heap allocation on every percent-escape (a hot data-URL/asset path).","fix":"Iterate `text.char_indices()` and inspect `text.as_bytes().get(i + 1)` / `get(i + 2)` for hex-digit lookahead instead of building `chars: Vec<char>`.","locations":[{"ref":"crates/rolldown_utils/src/percent_encoding.rs:9-33","code":"    9 |       let mut url = String::with_capacity(text.len() * 3);\n   10 |       let chars = text.chars().collect::<Vec<_>>();\n   11 |       let mut trailing_start = chars.len();\n   12 |       while trailing_start > 0 {\n   13 |         let c = chars[trailing_start - 1];\n   14 |         if c > 0x20 as char || matches!(c, '\\t' | '\\n' | '\\r') {\n   15 |           break;\n   16 |         }\n   17 |         trailing_start -= 1;\n   18 |       }\n   19 |       for (i, &c) in chars.iter().enumerate() {\n   20 |         if matches!(c, '\\t' | '\\n' | '\\r' | '#')\n   21 |           || i >= trailing_start\n   22 |           || (c == '%'\n   23 |             && i + 2 < chars.len()\n   24 |             && chars[i + 1].is_ascii_hexdigit()\n   25 |             && chars[i + 2].is_ascii_hexdigit())\n   26 |         {\n   27 |           url.push('%');\n   28 |           url.push(HEX[c as usize >> 4]);\n   29 |           url.push(HEX[c as usize & 15]);\n   30 |         } else {\n   31 |           url.push(c);\n   32 |         }\n   33 |       }","lines":25,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_utils/src/percent_encoding.rs#L9-L33"}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`slice` computes `slice_end = content.len() - (chunk.end() - end)` for the end chunk. This is only correct because line 57 errors out when an edited chunk contains the end with `chunk.end() != end`. The arithmetic mixes original-source byte distance (`chunk.end() - end`) with `content.len()` (possibly edited content length); the safety relies entirely on that guard. It is currently correct but fragile, and `slice_start`/`slice_end` can land on non-char boundaries if `start`/`end` are mid-codepoint, panicking at the `&content[slice_start..slice_end]` slice.","fix":"Add a char-boundary check on `start`/`end` (or document the precondition) and assert the edited-chunk invariant explicitly; consider computing `slice_end` only for the unedited branch.","locations":[{"ref":"crates/string_wizard/src/magic_string/slice.rs:55-79","code":"   55 |       let contains_end = chunk.start() < end && chunk.end() >= end;\n   56 | \n   57 |       if contains_end && chunk.edited_content.is_some() && chunk.end() != end {\n   58 |         return Err(format!(\"Cannot use replaced character {} as slice end anchor.\", end));\n   59 |       }\n   60 | \n   61 |       let slice_start = if idx == start_chunk_idx { (start - chunk.start()) as usize } else { 0 };\n   62 | \n   63 |       let content = if let Some(ref edited) = chunk.edited_content {\n   64 |         edited.as_ref()\n   65 |       } else {\n   66 |         chunk.span.text(&self.source)\n   67 |       };\n   68 | \n   69 |       let slice_end = if contains_end {\n   70 |         // end <= chunk.end() when contains_end is true, so we subtract\n   71 |         content.len() - (chunk.end() - end) as usize\n   72 |       } else {\n   73 |         content.len()\n   74 |       };\n   75 | \n   76 |       // Guard against reversed range within a single chunk (matches JS .slice() behavior\n   77 |       // which returns \"\" for reversed ranges instead of panicking).\n   78 |       if slice_start < slice_end {\n   79 |         result.push_str(&content[slice_start..slice_end]);","lines":25,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/slice.rs#L55-L79"}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"`comments` normalization in `prepare_build_context` only lets `legalComments` override\n`comments.legal` when `raw_options.comments.is_none()`. It first builds `comments` from\n`unwrap_or_default()` and then conditionally overrides. The intent (legalComments overrides only\nwhen comments is unset) is correct, but `raw_options.comments` is checked twice (once via\n`unwrap_or_default`, once via `is_none`), and the `comments` local is computed even on the path\nwhere it is fully defaulted, making the precedence rule easy to break in future edits.","fix":"Restructure as a single `match raw_options.comments { Some(c) => c, None => { let mut c =\nCommentsOptions::default(); if let Some(legal) = raw_options.legal_comments { c.legal =\nmatches!(legal, LegalComments::Inline); } c } }` to make the precedence explicit.","locations":[{"ref":"crates/rolldown/src/utils/prepare_build_context.rs:460-469","code":"  460 |     comments: {\n  461 |       let mut comments = raw_options.comments.unwrap_or_default();\n  462 |       // When `comments` option is not explicitly set, `legalComments` can override `comments.legal`\n  463 |       if raw_options.comments.is_none() {\n  464 |         if let Some(legal) = raw_options.legal_comments {\n  465 |           comments.legal = matches!(legal, LegalComments::Inline);\n  466 |         }\n  467 |       }\n  468 |       comments\n  469 |     },","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/prepare_build_context.rs#L460-L469"}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"Default session id string is inconsistent: `DEFAULT_SESSION_ID` is `\"unknown-session\"` (hyphen) while `Session::dummy()` uses `\"unknown_session\"` (underscore). Events without a session context are written under the `unknown-session` directory, but a dummy session advertises a different id, which is confusing if either is ever matched/compared.","fix":"Use the single `DEFAULT_SESSION_ID` constant in `Session::dummy()` instead of a separate literal.","locations":[{"ref":"crates/rolldown_devtools/src/static_data.rs:1-1","code":"    1 | pub static DEFAULT_SESSION_ID: &str = \"unknown-session\";","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/static_data.rs#L1"},{"ref":"crates/rolldown_devtools/src/init_tracing.rs:70-71","code":"   70 |     let session_id = Arc::from(\"unknown_session\");\n   71 |     Self { id: session_id, span: tracing::Span::none() }","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/init_tracing.rs#L70-L71"}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"Inconsistent lazy-suffix matching in LazyCompilationPlugin. The load hook gates on `args.id.contains(\"rolldown-lazy=1\")` (line 142, missing the leading `?`), while resolve_id (line 92) and transform_ast (line 187) use `contains(\"?rolldown-lazy=1\")` and the split on line 145 uses `\"?rolldown-lazy=1\"`. The looser substring on line 142 could match an id that merely contains `rolldown-lazy=1` as part of an unrelated query value, and is inconsistent with the rest of the file.","fix":"Use the same `\"?rolldown-lazy=1\"` (or end-of-id) check consistently across resolve_id, load, and transform_ast.","locations":[{"ref":"crates/rolldown_plugin_lazy_compilation/src/lazy_compilation_plugin.rs:142-145","code":"  142 |     if args.id.contains(\"rolldown-lazy=1\") {\n  143 |       if self.lazy_entries.contains(args.id) {\n  144 |         // Extract original ID without the query string (this is the absolute path)\n  145 |         let original_id = args.id.split(\"?rolldown-lazy=1\").next().unwrap_or(args.id);","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_lazy_compilation/src/lazy_compilation_plugin.rs#L142-L145"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"The comment/regex documents the pattern as `html-proxy=?` (an optional `=` after `html-proxy`), but the parser relies on `find_special_query`, which only matches `html-proxy` when it is immediately followed by `&` or end-of-string. So an id of the form `?html-proxy=&index=0.js` (with the `=` the regex permits) would not be detected. In practice the html plugin always emits `?html-proxy&index=...` without `=`, so this is latent rather than actively broken.","fix":"Either drop the `=?` from the documented pattern to match the actual parser, or strip an optional leading `=` from `query_after_proxy` before parsing the rest.","locations":[{"ref":"crates/rolldown_plugin_vite_html_inline_proxy/src/lib.rs:39-58","code":"   39 |     // Pattern: /[?&]html-proxy=?(?:&inline-css)?(?:&style-attr)?&index=(\\d+)\\.(?:js|css)$/\n   40 | \n   41 |     // Fast path: check if id contains html-proxy\n   42 |     let Some(html_proxy_pos) = rolldown_plugin_utils::find_special_query(args.id, b\"html-proxy\")\n   43 |     else {\n   44 |       return Ok(None);\n   45 |     };\n   46 | \n   47 |     // Parse query string after html-proxy\n   48 |     // Expected: html-proxy=? followed by optional &inline-css, &style-attr, then required &index=(\\d+)\n   49 |     let query_after_proxy = &args.id[html_proxy_pos + b\"html-proxy\".len()..];\n   50 | \n   51 |     // Skip optional &inline-css and &style-attr\n   52 |     let query_rest = query_after_proxy.strip_prefix(\"&inline-css\").unwrap_or(query_after_proxy);\n   53 |     let query_rest = query_rest.strip_prefix(\"&style-attr\").unwrap_or(query_rest);\n   54 | \n   55 |     // Now we must find &index=\n   56 |     let Some(index_str_start) = query_rest.strip_prefix(\"&index=\") else {\n   57 |       return Ok(None);\n   58 |     };","lines":20,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html_inline_proxy/src/lib.rs#L39-L58"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The `derive_more::Debug` attribute on the `finalize_other_specifiers` field tests the WRONG field: it checks `finalize_bare_specifier.is_some()` (copied from the field above) while labelling the output `<finalize_other_specifiers>`. As a result the debug output for `finalize_other_specifiers` reflects whether `finalize_bare_specifier` is set, not itself.","fix":"Change the condition to test `finalize_other_specifiers.is_some()`.","locations":[{"ref":"crates/rolldown_binding/src/options/plugin/config/binding_vite_resolve_plugin_config.rs:41","code":"   41 |   #[debug(\"{}\", if finalize_bare_specifier.is_some() { \"Some(<finalize_other_specifiers>)\" } else { \"None\" })]","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/options/plugin/config/binding_vite_resolve_plugin_config.rs#L41"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"Multiple async `#[napi]` dev-engine methods discard the underlying error with `|_e|` and substitute a generic static message (`run` -> 'Failed to run dev engine', plus `ensure_current_build_finish`, `get_bundle_state`, `close`). All real diagnostic detail is lost to the JS caller. Contrast with `compile_entry` and the constructor which correctly format the error with `{e:#?}`.","fix":"Include the error in the reason, e.g. `.map_err(|e| napi::Error::from_reason(format!(\"Failed to run dev engine: {e:#?}\")))`.","locations":[{"ref":"crates/rolldown_binding/src/binding_dev_engine.rs:169","code":"  169 |     self.inner.run().await.map_err(|_e| napi::Error::from_reason(\"Failed to run dev engine\"))?;","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/binding_dev_engine.rs#L169"},{"ref":"crates/rolldown_binding/src/binding_dev_engine.rs:179","code":"  179 |       .map_err(|_e| napi::Error::from_reason(\"Failed to ensure current build finish\"))?;","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/binding_dev_engine.rs#L179"},{"ref":"crates/rolldown_binding/src/binding_dev_engine.rs:190","code":"  190 |       .map_err(|_e| napi::Error::from_reason(\"Failed to get bundle state\"))","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/binding_dev_engine.rs#L190"},{"ref":"crates/rolldown_binding/src/binding_dev_engine.rs:250","code":"  250 |       .map_err(|_e| napi::Error::from_reason(\"Failed to close dev engine\"))?;","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/binding_dev_engine.rs#L250"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`deserialize_minify` uses `unreachable!()` for value shapes that are reachable from user JSON: a `minify` string\nother than `\"dceOnly\"` (e.g. `minify: \"foo\"`) deserializes into `SimpleMinifyOptions::String` and then hits the\n`_ => unreachable!(...)` arm, panicking on user input. Same pattern in `deserialize_inline_const`, where a\nnon-bool/non-object value (e.g. `inlineConst: 5`) reaches `_ => unreachable!()`.","fix":"Replace the `unreachable!()` catch-all arms with `Err(serde::de::Error::custom(...))` describing the accepted shapes, so malformed config yields a deserialization error instead of a panic.","locations":[{"ref":"crates/rolldown_common/src/inner_bundler_options/mod.rs:317-325","code":"  317 |   match deserialized {\n  318 |     Some(SimpleMinifyOptions::Boolean(false)) => Ok(Some(RawMinifyOptions::Bool(false))),\n  319 |     Some(SimpleMinifyOptions::Boolean(true)) => Ok(Some(RawMinifyOptions::Bool(true))),\n  320 |     Some(SimpleMinifyOptions::String(value)) if value == \"dceOnly\" => {\n  321 |       Ok(Some(RawMinifyOptions::DeadCodeEliminationOnly))\n  322 |     }\n  323 |     None => Ok(None),\n  324 |     _ => unreachable!(\"Unexpected value for minify {:?}\", deserialized),\n  325 |   }","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/inner_bundler_options/mod.rs#L317-L325"},{"ref":"crates/rolldown_common/src/inner_bundler_options/types/optimization.rs:138-148","code":"  138 |   let deserialized = Option::<Value>::deserialize(deserializer)?;\n  139 |   match deserialized {\n  140 |     Some(Value::Bool(v)) => Ok(Some(InlineConstOption::Bool(v))),\n  141 |     Some(Value::Object(obj)) => {\n  142 |       let config =\n  143 |         InlineConstConfig::deserialize(Value::Object(obj)).map_err(serde::de::Error::custom)?;\n  144 |       Ok(Some(InlineConstOption::Config(config)))\n  145 |     }\n  146 |     None => Ok(None),\n  147 |     _ => unreachable!(),\n  148 |   }","lines":11,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/inner_bundler_options/types/optimization.rs#L138-L148"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`MemoryFileSystem::create_dir_all` is named after (and documented in the `FileSystem` trait as)\n`std::fs::create_dir_all`, which creates all missing parent directories. But it calls\n`self.fs.create_dir(...)`, the single-level, non-recursive vfs operation, which errors when an\nintermediate directory is missing. The crate's own test asserts that\n`create_dir_all(\"/module_2/utils\")` fails with `ErrorKind::Other` when `/module_2` does not exist,\nconfirming the method does NOT behave like `create_dir_all`. Callers relying on the documented\nrecursive semantics will get spurious failures on the memory FS.","fix":"Iterate `path.ancestors()` in reverse creating each missing component (as `add_file_bytes` already does), or otherwise emulate recursive creation.","locations":[{"ref":"crates/rolldown_fs/src/memory.rs:59-61","code":"   59 |   fn create_dir_all(&self, path: &Path) -> io::Result<()> {\n   60 |     self.fs.create_dir(&path.to_string_lossy()).map_err(io::Error::other)\n   61 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_fs/src/memory.rs#L59-L61"},{"ref":"crates/rolldown_fs/src/file_system.rs:14-17","code":"   14 |   /// # Errors\n   15 |   ///\n   16 |   /// * See [std::fs::create_dir_all]\n   17 |   fn create_dir_all(&self, path: &Path) -> io::Result<()>;","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_fs/src/file_system.rs#L14-L17"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Numerous `MagicString` `remove`/`update`/`append` calls use\n`.expect(\"... should not fail in html plugin\")`. These operate on byte offsets\nderived from html5gum spans against the `html` string. If any span is stale,\noverlaps a prior edit, or lands off a UTF-8 boundary (plausible after the\nlossy/unchecked conversions and the `usize as u32` truncation), MagicString\nreturns `Err` and these turn an input-driven condition into a hard panic.","fix":"Propagate these as `anyhow::Result` errors (the functions already return\n`Result`) so malformed input degrades to a build error rather than a panic.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/lib.rs:150-151","code":"  150 |                   s.remove(attr.span.start as u32, attr.span.end as u32)\n  151 |                     .expect(\"remove should not fail in html plugin\");","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/lib.rs#L150-L151"},{"ref":"crates/rolldown_plugin_vite_html/src/lib.rs:436-437","code":"  436 |           s.remove(span.start as u32, span.end as u32)\n  437 |             .expect(\"remove should not fail in html plugin\");","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/lib.rs#L436-L437"},{"ref":"crates/rolldown_plugin_vite_html/src/utils/plugin_ext.rs:250-251","code":"  250 |       s.update(start as u32, match_end as u32, css_transformed_code.to_string())\n  251 |         .expect(\"update should not fail in html plugin\");","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/utils/plugin_ext.rs#L250-L251"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`rewrite_dynamic_import_for_merged_entry` returns `None` (silently keeping the original `import()` unrewritten) and emits only a `tracing::warn!` when an ESM-wrapped merged module has a wrapper but no namespace export, or when a merged dynamic entry has no export name in `exports_to_other_chunks`. The warning text itself says this indicates an \"inconsistent state in the chunk graph\". Degrading to an unrewritten dynamic import can produce incorrect runtime behavior (importing the wrong shape) rather than surfacing a hard error.","fix":"If these states are truly impossible, assert/diagnose; if reachable, decide on a correct fallback rather than leaving the original import unchanged, and consider promoting the warning to a build error.","locations":[{"ref":"crates/rolldown/src/module_finalizers/mod.rs:2216-2240","code":" 2216 |               } else {\n 2217 |                 tracing::warn!(\n 2218 |                   \"ESM wrapped module {:?} in chunk {:?} has wrapper but no namespace export.\",\n 2219 |                   importee_idx,\n 2220 |                   importee_chunk_idx\n 2221 |                 );\n 2222 |                 None\n 2223 |               }\n 2224 |             }\n 2225 |             WrapKind::None => {\n 2226 |               let call_expr = self.ast_factory.make_then_extract_property(base_expr, name);\n 2227 |               Some(Expression::CallExpression(call_expr))\n 2228 |             }\n 2229 |           }\n 2230 |         }\n 2231 |         None => {\n 2232 |           tracing::warn!(\n 2233 |             \"Merged dynamic entry module {:?} in chunk {:?} has no export name in exports_to_other_chunks. \\\n 2234 |             This indicates an inconsistent state in the chunk graph where the module is marked as merged \\\n 2235 |             but its namespace export is not properly tracked.\",\n 2236 |             importee_idx,\n 2237 |             importee_chunk_idx\n 2238 |           );\n 2239 |           None\n 2240 |         }","lines":25,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/module_finalizers/mod.rs#L2216-L2240"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`request_all_exports_for_entry` is only invoked when `owner.is_none()` (i.e. for entries). If a\nmodule is first seen as a non-entry import (`owner = Some(...)`) and later requested as an entry,\nthe `Seen` arm returns early at line 257 only after the `owner.is_none()` guard, but the same\nmodule reached via a normal import never records the deferred `All` request. The lazy-barrel\ndeferral therefore depends on entry discovery order; an entry that is imported (as a dependency)\nbefore being resolved as an entry can skip the `request_all_exports_for_entry` bookkeeping for\nthe dependency-import visit, potentially leaving some of its re-exports unloaded under\nlazy-barrel mode.","fix":"Ensure `request_all_exports_for_entry` is consulted for entries regardless of the order in which\nthe module was first encountered (e.g. when promoting a `Seen` non-entry module to an entry,\nre-run the all-exports request), or document and assert the ordering invariant.","locations":[{"ref":"crates/rolldown/src/module_loader/module_loader.rs:252-281","code":"  252 |     let idx = match self.cache.module_id_to_idx.get(&resolved_id.id).copied() {\n  253 |       Some(VisitState::Seen(idx)) => {\n  254 |         if self.flat_options.is_lazy_barrel_enabled() && owner.is_none() {\n  255 |           self.request_all_exports_for_entry(idx, user_defined_entries);\n  256 |         }\n  257 |         return idx;\n  258 |       }\n  259 |       Some(VisitState::Invalidate(idx)) => {\n  260 |         // Full scan mode the idx will never be invalidated right?\n  261 |         self.intermediate_normal_modules.alloc_ecma_module_idx_sparse(idx);\n  262 |         self.cache.module_id_to_idx.insert(resolved_id.id.clone(), VisitState::Seen(idx));\n  263 |         idx\n  26
