assets_ready` uses `.try_into().unwrap()` when converting an asset's byte length (`usize`) to the `size` field. For a single asset larger than `u32::MAX` (4 GiB) this panics. Other size conversions in this slice (e.g. `package_info.size` in mod.rs uses `u32::try_from(...).unwrap_or(u32::MAX)`) defensively saturate; this one does not. Only reachable when devtools tracing is enabled, hence low severity.","fix":"Use `u32::try_from(asset.content.as_bytes().len()).unwrap_or(u32::MAX)` (saturating) to match the convention used elsewhere instead of `.unwrap()`.","locations":[{"ref":"crates/rolldown/src/stages/generate_stage/render_chunk_to_assets.rs:289-291","code":"  289 |           content: asset.content.try_as_inner_str().ok().map(str::to_string),\n  290 |           size: asset.content.as_bytes().len().try_into().unwrap(),\n  291 |           filename: asset.filename.to_string(),","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/generate_stage/render_chunk_to_assets.rs#L289-L291"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `ScanStageCache::merge`, the `HybridIndexVec::IndexVec(_)` arm of the module_table match is\n`unreachable!()`. This is reached only in incremental/partial-scan merges, and the invariant that a\nmerge always carries the `Map` variant is enforced elsewhere; if a future change produces the\n`IndexVec` variant here the build panics with no context instead of a diagnostic.","fix":"Replace `unreachable!()` with a descriptive `unreachable!(\"...\")` message explaining the\ninvariant, or convert it into a `BuildResult` error to fail gracefully.","locations":[{"ref":"crates/rolldown/src/types/scan_stage_cache.rs:83-92","code":"   83 |     let modules = match scan_stage_output.module_table {\n   84 |       rolldown_common::HybridIndexVec::IndexVec(_index_vec) => {\n   85 |         unreachable!()\n   86 |       }\n   87 |       rolldown_common::HybridIndexVec::Map(map) => {\n   88 |         let mut modules = map.into_iter().collect_vec();\n   89 |         modules.sort_unstable_by_key(|(k, _)| *k);\n   90 |         modules\n   91 |       }\n   92 |     };","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/types/scan_stage_cache.rs#L83-L92"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"`process_code_and_sourcemap` calls `Path::new(filename).file_name().expect(\"should have file name\")`.\nThe filename comes from a user-configurable output pattern; values that end in `/`, `.`, `..`, or\nare empty make `file_name()` return `None` and panic here. `verify_raw_options` only validates\n`output.file` (not `entryFileNames`/`chunkFileNames`/`assetFileNames` patterns), so a crafted\nfilename pattern reaching this point panics during sourcemap processing.","fix":"Handle the `None` case by returning a `BuildDiagnostic` (e.g. an invalid-filename error) instead of\n`expect`, or set the map file name from the already-validated chunk basename.","locations":[{"ref":"crates/rolldown/src/utils/process_code_and_sourcemap.rs:24-25","code":"   24 |   let file_base_name = Path::new(filename).file_name().expect(\"should have file name\");\n   25 |   map.set_file(file_base_name.to_string_lossy().as_ref());","lines":2,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/process_code_and_sourcemap.rs#L24-L25"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`ParallelJsPluginRegistry::from_napi_value` returns `napi::Error::from_status(napi::Status::GenericFailure)` with no message when the value isn't an instance of the class, losing all context about what was expected. It then uses `get_named_property_unchecked` for `id`/`workerCount`, bypassing type validation.","fix":"Use `napi::Error::new(Status::InvalidArg, \"Expected an instance of ParallelJsPluginRegistry\")`.","locations":[{"ref":"crates/rolldown_binding/src/parallel_js_plugin_registry.rs:64-80","code":"   64 | impl FromNapiValue for ParallelJsPluginRegistry {\n   65 |   unsafe fn from_napi_value(\n   66 |     env: napi::sys::napi_env,\n   67 |     napi_val: napi::sys::napi_value,\n   68 |   ) -> napi::Result<Self> {\n   69 |     unsafe {\n   70 |       let unknown = Unknown::from_napi_value(env, napi_val)?;\n   71 |       if !ParallelJsPluginRegistry::instance_of(&Env::from_raw(env), &unknown)? {\n   72 |         return Err(napi::Error::from_status(napi::Status::GenericFailure));\n   73 |       }\n   74 | \n   75 |       let object: Object = unknown.cast()?;\n   76 |       let id: u16 = object.get_named_property_unchecked(\"id\")?;\n   77 |       let worker_count: u16 = object.get_named_property_unchecked(\"workerCount\")?;\n   78 |       Ok(Self { id, worker_count })\n   79 |     }\n   80 |   }","lines":17,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/parallel_js_plugin_registry.rs#L64-L80"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`JsRegExp::from_napi_value` reads `RegExp.lastIndex` as `u32` via `get_named_property::<u32>(\"lastIndex\").unwrap_or(0)`. A JS `lastIndex` is an arbitrary Number (may be non-integer or exceed u32::MAX); reading as u32 truncates and any coercion failure is silently mapped to 0. This 0 is then used as a UTF-16->byte offset in magic-string regex replace, producing a silently wrong starting offset rather than an error.","fix":"Read `lastIndex` as `f64` and convert with explicit integer/range checks, or document the intentional clamp-to-0 behavior.","locations":[{"ref":"crates/rolldown_binding/src/types/js_regex.rs:43","code":"   43 |       let last_index = js_object.get_named_property::<u32>(\"lastIndex\").unwrap_or(0) as usize;","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/types/js_regex.rs#L43"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `dev_engine::DevEngine::run`, the spawned coordinator handle wrapper does\n`join_handle.await.unwrap()`. If the coordinator task panics (or is aborted), the `JoinError`\nunwrap propagates the panic into whatever awaits `wait_for_close`/`run`, rather than surfacing a\nclean error. The analogous code in `rolldown_watcher::watcher::Watcher::run` instead uses\n`let _ = join_handle.await;`, swallowing the JoinError. The two engines handle coordinator-task\nfailure inconsistently.","fix":"Pick one strategy; prefer logging the JoinError (`if let Err(e) = join_handle.await { tracing::error!(...) }`) over `unwrap()` so a coordinator panic doesn't cascade.","locations":[{"ref":"crates/rolldown_dev/src/dev_engine.rs:121-127","code":"  121 |     if let Some(coordinator) = coordinator_state.coordinator.take() {\n  122 |       let join_handle = tokio::spawn(coordinator.run());\n  123 |       let coordinator_handle = Box::pin(async move {\n  124 |         join_handle.await.unwrap();\n  125 |       }) as PinBoxSendStaticFuture;\n  126 |       coordinator_state.handle = Some(coordinator_handle.shared());\n  127 |     }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_dev/src/dev_engine.rs#L121-L127"},{"ref":"crates/rolldown_watcher/src/watcher.rs:108-114","code":"  108 |     if let Some(coordinator) = state.coordinator.take() {\n  109 |       let join_handle = tokio::spawn(coordinator);\n  110 |       let handle: Pin<Box<dyn Future<Output = ()> + Send>> = Box::pin(async move {\n  111 |         let _ = join_handle.await;\n  112 |       });\n  113 |       state.handle = Some(handle.shared());\n  114 |     }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_watcher/src/watcher.rs#L108-L114"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The background writer thread is spawned lazily and opens log files with `.unwrap_or_else(|e| panic!(...))`. A panic here is on the writer thread, so it does not crash the producer, but it silently kills the writer thread; after that all `send` calls drop commands and no further logs/flushes happen for the process lifetime, with no diagnostic surfaced to the producer side (which only does `let _ = ...send`). A transient open failure (e.g. permission, too many open files) thus permanently disables devtools logging.","fix":"On open failure, skip that file (continue) instead of panicking the writer thread, so subsequent sessions/files still work.","locations":[{"ref":"crates/rolldown_devtools/src/writer.rs:78-85","code":"   78 |         let file = self.files.entry(Arc::clone(&filename)).or_insert_with(|| {\n   79 |           let f = OpenOptions::new()\n   80 |             .create(true)\n   81 |             .append(true)\n   82 |             .open(filename.as_ref())\n   83 |             .unwrap_or_else(|e| panic!(\"devtools: failed to open log file {filename}: {e}\"));\n   84 |           BufWriter::new(f)\n   85 |         });","lines":8,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/writer.rs#L78-L85"},{"ref":"crates/rolldown_devtools/src/writer.rs:45-48","code":"   45 | pub fn send(cmd: LogCommand) {\n   46 |   // If the writer thread has died, drop the command silently.\n   47 |   let _ = LOG_WRITER_TX.send(cmd);\n   48 | }","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools/src/writer.rs#L45-L48"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"EsmExternalRequirePlugin::load builds a JS facade by interpolating the resolved module specifier directly into a single-quoted import: `concat_string!(\"import * as m from '\", module_id, \"';...\")`. `module_id` (the bare specifier after stripping the facade prefix) is not escaped, so a specifier containing a single quote, backslash, or newline produces broken/invalid JavaScript. While package specifiers rarely contain such characters, the specifier originates from user import statements and is not validated here.","fix":"Serialize the module specifier as a JSON string literal (e.g. serde_json::to_string) instead of wrapping it in raw single quotes, so quotes/backslashes are escaped.","locations":[{"ref":"crates/rolldown_plugin_esm_external_require/src/lib.rs:138-147","code":"  138 |     Ok(args.id.strip_prefix(CJS_EXTERNAL_FACADE_PREFIX).map(|module_id| {\n  139 |       let code = concat_string!(\n  140 |         \"import * as m from '\",\n  141 |         module_id,\n  142 |         \"';module.exports = \",\n  143 |         if is_nodejs_builtin_module(module_id) { \"m.default\" } else { \"{ ...m }\" },\n  144 |         \";\"\n  145 |       );\n  146 |       HookLoadOutput { code: code.into(), ..Default::default() }\n  147 |     }))","lines":10,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_esm_external_require/src/lib.rs#L138-L147"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The non-codesplit CSS bundle collection uses an irrefutable `while let` with a\nguard: `while let imports = std::mem::take(&mut dynamic_imports) && !imports.is_empty()`.\nWhile it works, the irrefutable `while let` binding is unidiomatic and easy to\nmisread; a plain `loop { let imports = take(...); if imports.is_empty() { break } ... }`\nis clearer and conveys the same intent.","fix":"Rewrite as a `loop` with an explicit `break`, or `while !dynamic_imports.is_empty()` taking inside.","locations":[{"ref":"crates/rolldown_plugin_vite_css_post/src/utils.rs:611-619","code":"  611 |       while let imports = std::mem::take(&mut dynamic_imports)\n  612 |         && !imports.is_empty()\n  613 |       {\n  614 |         for name in imports {\n  615 |           if let Some(chunk) = chunks.get(&name) {\n  616 |             collect(ctx, chunk, &chunks, &mut collected, &mut dynamic_imports, &mut extracted_css);\n  617 |           }\n  618 |         }\n  619 |       }","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_css_post/src/utils.rs#L611-L619"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"The parse-error guard only returns an error when the parser sets `panicked` AND an error diagnostic is present. If oxc reports a recoverable syntax error without setting `panicked` (or `panicked` is true but the first matching diagnostic search is skipped), the plugin proceeds to transform a possibly malformed/partial AST and silently emits rewritten code. The sibling `vite-transform` plugin instead rejects on any non-empty `diagnostics`, making this inconsistent. Same pattern appears in all three AST-transforming glob/url plugins.","fix":"Treat the presence of any error-severity diagnostic as a hard error regardless of the `panicked` flag, or at minimum document why partial ASTs are tolerated.","locations":[{"ref":"crates/rolldown_plugin_vite_import_glob/src/lib.rs:45-53","code":"   45 |       if parser_ret.panicked\n   46 |         && let Some(err) =\n   47 |           parser_ret.diagnostics.iter().find(|e| e.severity == oxc::diagnostics::Severity::Error)\n   48 |       {\n   49 |         return Err(anyhow::anyhow!(format!(\n   50 |           \"Failed to parse code in '{}': {:?}\",\n   51 |           args.id, err.message\n   52 |         )));\n   53 |       }","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_import_glob/src/lib.rs#L45-L53"},{"ref":"crates/rolldown_plugin_vite_dynamic_import_vars/src/lib.rs:84-92","code":"   84 |       if parser_ret.panicked\n   85 |         && let Some(err) =\n   86 |           parser_ret.diagnostics.iter().find(|e| e.severity == oxc::diagnostics::Severity::Error)\n   87 |       {\n   88 |         return Err(anyhow::anyhow!(format!(\n   89 |           \"Failed to parse code in '{}': {:?}\",\n   90 |           args.id, err.message\n   91 |         )));\n   92 |       }","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_dynamic_import_vars/src/lib.rs#L84-L92"},{"ref":"crates/rolldown_plugin_vite_asset_import_meta_url/src/lib.rs:63-71","code":"   63 |       if parser_ret.panicked\n   64 |         && let Some(err) =\n   65 |           parser_ret.diagnostics.iter().find(|e| e.severity == oxc::diagnostics::Severity::Error)\n   66 |       {\n   67 |         return Err(anyhow::anyhow!(format!(\n   68 |           \"Failed to parse code in '{}': {:?}\",\n   69 |           args.id, err.message\n   70 |         )));\n   71 |       }","lines":9,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_asset_import_meta_url/src/lib.rs#L63-L71"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"`compute_tla` has a `debug_assert!` that `tla_keyword_span` is present for a TLA source module, then falls back to `Span::empty(0)` in release via `unwrap_or(Span::empty(0))`. If the scanner invariant is ever violated in a release build, the emitted `require_tla` diagnostic points at an empty span (offset 0) rather than the actual TLA keyword, producing a misleading error location instead of failing loudly. The comment claims the lookup \"must hit\".","fix":"If the invariant is truly guaranteed, document why a release fallback is still needed; otherwise consider surfacing a clearer internal-error rather than an empty span.","locations":[{"ref":"crates/rolldown/src/stages/link_stage/compute_tla.rs:160-180","code":"  160 |         let tla_module = &self.module_table[tla_source_idx];\n  161 |         // `find_tla_source` only returns modules whose `ast_usage` contains\n  162 |         // `TopLevelAwait`, and the scanner always records a keyword span for\n  163 |         // those modules, so this map lookup must hit.\n  164 |         let tla_keyword_span = self.tla_keyword_span_map.get(&tla_source_idx).copied();\n  165 |         debug_assert!(\n  166 |           tla_keyword_span.is_some(),\n  167 |           \"tla_keyword_span missing for TLA source module {tla_source_idx:?}\"\n  168 |         );\n  169 |         let tla_keyword_span = tla_keyword_span.unwrap_or(Span::empty(0));\n  170 | \n  171 |         self.errors.push(BuildDiagnostic::require_tla(RequireTla {\n  172 |           importer_stable_id: module.stable_id.as_arc_str().clone(),\n  173 |           importer_source: module.source.clone(),\n  174 |           require_span,\n  175 |           tla_source_stable_id: tla_module.stable_id().as_arc_str().clone(),\n  176 |           tla_source_text: tla_module.as_normal().map(|m| m.source.clone()).unwrap_or_default(),\n  177 |           tla_keyword_span,\n  178 |           import_chain,\n  179 |         }));\n  180 |       }","lines":21,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/link_stage/compute_tla.rs#L160-L180"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"`load` enters the optional-peer-dep branch for any id starting with\n`OPTIONAL_PEER_DEP_ID` and then asserts exactly 3 colon-separated segments via\n`let [_, peer_dep, parent_dep] = id.splitn(3, \":\")... else { unreachable!() }`.\n`OPTIONAL_PEER_DEP_ID` itself contains no `:`, so an id like\n`__vite-optional-peer-dep` or `__vite-optional-peer-dep:x` (which any plugin /\nsource could produce) yields fewer than 3 segments and hits `unreachable!()`,\npanicking.","fix":"Replace `unreachable!()` with `return Ok(None)` (graceful fallthrough).","locations":[{"ref":"crates/rolldown_plugin_vite_resolve/src/vite_resolve_plugin.rs:538-541","code":"  538 |     if args.id.starts_with(OPTIONAL_PEER_DEP_ID) {\n  539 |       let [_, peer_dep, parent_dep] = args.id.splitn(3, \":\").collect::<Vec<&str>>()[..] else {\n  540 |         unreachable!()\n  541 |       };","lines":4,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_resolve/src/vite_resolve_plugin.rs#L538-L541"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`SymbolRefDbForModule::merge_from_build` extends `self.classic_data` up to the build DB's symbol count but only\npreserves `IsFacade` flags from the build DB; any other per-symbol flag set during the build (e.g.\n`SideEffectsFreeFunction`, `HasComputedMemberWrite`) is discarded on merge-back. If such flags are mutated post-cache,\nthey are lost, risking stale results across incremental builds.","fix":"Confirm no flags other than `IsFacade` are mutated post-cache; if others are, merge them too (or document why only `IsFacade` survives).","locations":[{"ref":"crates/rolldown_common/src/types/symbol_ref_db.rs:137-154","code":"  137 |   pub fn merge_from_build(&mut self, build_db: SymbolRefDbForModule) {\n  138 |     // Extend classic_data for any symbols added during linking (e.g., facade symbols)\n  139 |     let new_len = build_db.ast_scopes.total_symbol_count();\n  140 |     let current_len = self.classic_data.len();\n  141 |     for _ in current_len..new_len {\n  142 |       self.classic_data.push(SymbolRefDataClassic::default());\n  143 |     }\n  144 | \n  145 |     // Preserve IsFacade flags for facade symbols added during linking\n  146 |     for (symbol_id, flags) in &build_db.flags {\n  147 |       if flags.contains(SymbolRefFlags::IsFacade) {\n  148 |         self.flags.entry(*symbol_id).or_default().insert(SymbolRefFlags::IsFacade);\n  149 |       }\n  150 |     }\n  151 | \n  152 |     let scoping = build_db.ast_scopes.into_scoping();\n  153 |     self.ast_scopes.set_scoping(scoping);\n  154 |   }","lines":18,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_common/src/types/symbol_ref_db.rs#L137-L154"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`unsafe { css_entries.as_ref().unwrap_unchecked() }` is used to extract a value that was just guaranteed `Some` a few lines above (the `if css_entries.is_none()` block always sets it). The unsafe `unwrap_unchecked` provides no measurable benefit here, only fragility: a future refactor that changes the control flow could introduce UB. A safe `unwrap()`/`expect()` would be optimized identically by the compiler in this branch.","fix":"Use `css_entries.as_ref().unwrap()` (or restructure so the value is bound in the same scope) instead of `unwrap_unchecked`.","locations":[{"ref":"crates/rolldown_plugin_vite_manifest/src/lib.rs:104-104","code":"  104 |             let css_entries = unsafe { css_entries.as_ref().unwrap_unchecked() };","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_manifest/src/lib.rs#L104"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":true,"description":"Field type inconsistency for `call_id` across action definitions: `HookTransformCallStart`/`HookTransformCallEnd` use `call_id: String`, while every other hook action (`HookLoadCall*`, `HookResolveIdCall*`, `HookRenderChunk*`) uses `call_id: &'static str`. The transform path uses an owned uuid (`call_id.unwrap_or_default()`), the others use the `\"${call_id}\"` placeholder mechanism. The divergence is intentional at the call sites but makes the action API surface inconsistent and easy to mis-handle for consumers/maintainers.","fix":"Document the reason for the differing types, or unify the transform hook to use the same `${call_id}` placeholder mechanism as the other hooks.","locations":[{"ref":"crates/rolldown_devtools_action/src/definitions/hook_transform_call_start.rs:12-12","code":"   12 |   pub call_id: String,","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools_action/src/definitions/hook_transform_call_start.rs#L12"},{"ref":"crates/rolldown_devtools_action/src/definitions/hook_transform_call_end.rs:12-12","code":"   12 |   pub call_id: String,","lines":1,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_devtools_action/src/definitions/hook_transform_call_end.rs#L12"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"Quadratic-in-nesting-depth side-effect detection. `fold_compound` first calls\n`expr.may_have_side_effects(self)` on the *entire* compound subtree (a full recursive walk),\nand then, when no side effect is found, recurses into each child via\n`detect_side_effect_of_expr`, which for a nested compound child (ObjectExpression,\nArrayExpression, SequenceExpression, etc.) again calls `may_have_side_effects` on that whole\nchild subtree. A deeply nested side-effect-free object/array literal is therefore re-scanned\nonce per nesting level, i.e. O(n * depth). This is on the hot per-statement AST-scanning path\nand the metadata-propagation arms (added for rolldown#9425) deliberately recurse every layer.","fix":"Avoid the redundant full-subtree `may_have_side_effects` gate at every level. Either fold the\nboolean side-effect status up from children in a single pass (reuse the recursive results)\ninstead of re-asking oxc per node, or only run the oxc gate once at the outermost compound and\npass the certified-pure context down so nested compounds skip their own gate.","locations":[{"ref":"crates/rolldown/src/ast_scanner/side_effect_detector/mod.rs:315-331","code":"  315 |   fn fold_compound<'e>(\n  316 |     &self,\n  317 |     expr: &Expression,\n  318 |     children: impl IntoIterator<Item = &'e Expression<'e>>,\n  319 |   ) -> SideEffectDetail {\n  320 |     if expr.may_have_side_effects(self) {\n  321 |       return true.into();\n  322 |     }\n  323 |     let mut detail = SideEffectDetail::empty();\n  324 |     for child in children {\n  325 |       detail |= self.detect_side_effect_of_expr(child);\n  326 |       if detail.has_side_effect() {\n  327 |         break;\n  328 |       }\n  329 |     }\n  330 |     detail - SideEffectDetail::Unknown\n  331 |   }","lines":17,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ast_scanner/side_effect_detector/mod.rs#L315-L331"},{"ref":"crates/rolldown/src/ast_scanner/side_effect_detector/mod.rs:264-294","code":"  264 |       Expression::ObjectExpression(obj) => self.fold_compound(\n  265 |         expr,\n  266 |         // `p.computed == true` => `p.key` is always an Expression variant\n  267 |         // (oxc's parser only emits Static/PrivateIdentifier for `key:` syntax).\n  268 |         obj\n  269 |           .properties\n  270 |           .iter()\n  271 |           .flat_map(|prop| match prop {\n  272 |             ast::ObjectPropertyKind::ObjectProperty(p) => {\n  273 |               [p.computed.then(|| p.key.to_expression()), Some(&p.value)]\n  274 |             }\n  275 |             ast::ObjectPropertyKind::SpreadProperty(s) => [Some(&s.argument), None],\n  276 |           })\n  277 |           .flatten(),\n  278 |       ),\n  279 |       Expression::ArrayExpression(arr) => self.fold_compound(\n  280 |         expr,\n  281 |         arr.elements.iter().filter_map(|elem| match elem {\n  282 |           ast::ArrayExpressionElement::SpreadElement(s) => Some(&s.argument),\n  283 |           ast::ArrayExpressionElement::Elision(_) => None,\n  284 |           e => Some(e.to_expression()),\n  285 |         }),\n  286 |       ),\n  287 |       Expression::SequenceExpression(s) => self.fold_compound(expr, &s.expressions),\n  288 |       Expression::TemplateLiteral(t) => self.fold_compound(expr, &t.expressions),\n  289 |       Expression::ConditionalExpression(c) => {\n  290 |         self.fold_compound(expr, [&c.test, &c.consequent, &c.alternate])\n  291 |       }\n  292 |       Expression::LogicalExpression(e) => self.fold_compound(expr, [&e.left, &e.right]),\n  293 |       Expression::BinaryExpression(e) => self.fold_compound(expr, [&e.left, &e.right]),\n  294 |       Expression::UnaryExpression(e) => self.fold_compound(expr, [&e.argument]),","lines":31,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ast_scanner/side_effect_detector/mod.rs#L264-L294"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`reduced_atom_graph_has_static_cycle` is called inside the per-atom loop in `optimize_dynamic_entry_bits` (once for every atom whose dependent_entries changed). Each call rebuilds the full bits->chunk map, the per-chunk dependency sets, and runs a complete DFS cycle check over all atoms/chunks. This makes the whole pass O(atoms^2) in the number of atoms in the worst case (every atom triggers a full-graph cycle scan), which is quadratic on a path that runs for every build with `avoid_redundant_chunk_loads` enabled and can be large for big graphs.","fix":"Accumulate all tentative reductions first, then run a single cycle check, or incrementally maintain the chunk dependency graph and run an incremental/targeted cycle check rather than rebuilding and rescanning the entire graph for every atom.","locations":[{"ref":"crates/rolldown/src/stages/generate_stage/dynamic_already_loaded.rs:62-85","code":"   62 |     for atom_idx in 0..atoms.len() {\n   63 |       let original_dependent_entries = atoms[atom_idx].dependent_entries.clone();\n   64 |       let dependent_entries = atoms[atom_idx].dependent_entries.index_of_one().collect::<Vec<_>>();\n   65 |       let atom_bit: u32 = atom_idx.try_into().expect(\"Too many atoms, u32 overflowed.\");\n   66 |       for entry_idx in dependent_entries {\n   67 |         if already_loaded_atoms_by_entry[entry_idx as usize].has_bit(atom_bit) {\n   68 |           atoms[atom_idx].dependent_entries.clear_bit(entry_idx);\n   69 |         }\n   70 |       }\n   71 |       if atoms[atom_idx].dependent_entries != original_dependent_entries\n   72 |         && self.can_use_reduced_dependent_entries(\n   73 |           &atoms[atom_idx],\n   74 |           &original_dependent_entries,\n   75 |           &atoms[atom_idx].dependent_entries,\n   76 |           chunk_graph,\n   77 |           &dynamic_entry_modules_by_entry,\n   78 |         )\n   79 |         && !Self::reduced_atom_graph_has_static_cycle(&atoms, &atom_dependencies)\n   80 |       {\n   81 |         changed = true;\n   82 |       } else {\n   83 |         atoms[atom_idx].dependent_entries = original_dependent_entries;\n   84 |       }\n   85 |     }","lines":24,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/generate_stage/dynamic_already_loaded.rs#L62-L85"},{"ref":"crates/rolldown/src/stages/generate_stage/dynamic_already_loaded.rs:204-234","code":"  204 |   fn reduced_atom_graph_has_static_cycle(\n  205 |     atoms: &[ChunkAtom],\n  206 |     atom_dependencies: &[Vec<usize>],\n  207 |   ) -> bool {\n  208 |     let mut chunk_idx_by_bits = FxHashMap::default();\n  209 |     let mut atom_to_chunk = Vec::with_capacity(atoms.len());\n  210 |     for atom in atoms {\n  211 |       let next_chunk_idx = chunk_idx_by_bits.len();\n  212 |       let chunk_idx = match chunk_idx_by_bits.entry(atom.dependent_entries.clone()) {\n  213 |         std::collections::hash_map::Entry::Occupied(occupied) => *occupied.get(),\n  214 |         std::collections::hash_map::Entry::Vacant(vacant) => {\n  215 |           vacant.insert(next_chunk_idx);\n  216 |           next_chunk_idx\n  217 |         }\n  218 |       };\n  219 |       atom_to_chunk.push(chunk_idx);\n  220 |     }\n  221 | \n  222 |     let mut chunk_dependencies = vec![FxHashSet::default(); chunk_idx_by_bits.len()];\n  223 |     for (atom_idx, dependencies) in atom_dependencies.iter().enumerate() {\n  224 |       let from_chunk_idx = atom_to_chunk[atom_idx];\n  225 |       for &dep_atom_idx in dependencies {\n  226 |         let to_chunk_idx = atom_to_chunk[dep_atom_idx];\n  227 |         if from_chunk_idx != to_chunk_idx {\n  228 |           chunk_dependencies[from_chunk_idx].insert(to_chunk_idx);\n  229 |         }\n  230 |       }\n  231 |     }\n  232 | \n  233 |     Self::chunk_dependency_graph_has_cycle(&chunk_dependencies)\n  234 |   }","lines":31,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/generate_stage/dynamic_already_loaded.rs#L204-L234"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`match_import_with_export` clones the entire `ctx.tracker_stack` for each potentially-ambiguous export-star ref (`MatchingContext { tracker_stack: ctx.tracker_stack.clone() }`) inside a loop over `potentially_ambiguous_export_star_refs`, and recurses. For deep/wide re-export ambiguity graphs this is repeated full-Vec clones in a hot linking path. The reused `matching_ctx` allocation added in `match_imports_with_exports` only helps the top-level call, not these inner clones.","fix":"Push/pop onto a shared stack across the ambiguous recursion instead of cloning the whole Vec per ambiguous ref, or reuse a scratch buffer.","locations":[{"ref":"crates/rolldown/src/stages/link_stage/bind_imports_and_exports.rs:1141-1152","code":" 1141 |                   let ambiguous_result = self.match_import_with_export(\n 1142 |                     index_modules,\n 1143 |                     &mut MatchingContext { tracker_stack: ctx.tracker_stack.clone() },\n 1144 |                     ImportTracker {\n 1145 |                       importer: ambiguous_ref_owner.idx(),\n 1146 |                       importee: resolved_module_idx,\n 1147 |                       imported: another_named_import.imported.clone(),\n 1148 |                       imported_as: another_named_import.imported_as,\n 1149 |                     },\n 1150 |                   );\n 1151 |                   ambiguous_results.push(ambiguous_result);\n 1152 |                 }","lines":12,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/stages/link_stage/bind_imports_and_exports.rs#L1141-L1152"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`has_nested_scope_binding` does a full linear scan of every nested scope's binding map of the\nowning module (`scoping().iter_bindings().skip(1).any(|(_, bindings)| bindings.contains_key(name))`)\non every invocation. It is called from the renamer's `accept` closure\n(`is_name_available_with`) for each rejected `name$N` candidate during conflict resolution. In a\nmodule with many nested scopes and many colliding top-level names this becomes quadratic\n(candidates x scopes x bindings) on the renamer hot path (`deconflict_chunk_symbols`). The\nper-module nested-binding name set is recomputed from scratch every time instead of being built\nonce per module and cached.","fix":"Build a per-module `FxHashSet<&str>` (or `FxHashSet<CompactStr>`) of all nested-scope binding\nnames once when the module is first processed for deconfliction, then test membership in O(1)\ninstead of re-walking all scopes for each candidate.","locations":[{"ref":"crates/rolldown/src/utils/renamer.rs:235-241","code":"  235 | fn has_nested_scope_binding(symbol_db: &SymbolRefDb, module_idx: ModuleIdx, name: &str) -> bool {\n  236 |   let Some(db) = &symbol_db[module_idx] else {\n  237 |     return false;\n  238 |   };\n  239 |   // Skip root scope (index 0), check nested scopes only\n  240 |   db.ast_scopes.scoping().iter_bindings().skip(1).any(|(_, bindings)| bindings.contains_key(name))\n  241 | }","lines":7,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/renamer.rs#L235-L241"},{"ref":"crates/rolldown/src/utils/renamer.rs:118-141","code":"  118 |   #[inline]\n  119 |   fn is_name_available_with(\n  120 |     symbol_db: &SymbolRefDb,\n  121 |     entry_module_idx: Option<ModuleIdx>,\n  122 |     candidate_name: &str,\n  123 |     symbol_ref: SymbolRef,\n  124 |     is_original_name: bool,\n  125 |   ) -> bool {\n  126 |     if let Some(entry_idx) = entry_module_idx {\n  127 |       if symbol_ref.owner == entry_idx {\n  128 |         // Entry module symbols can use their original names freely - shadowing is\n  129 |         // handled by reference-based renaming of nested bindings later\n  130 |         return true;\n  131 |       }\n  132 |     }\n  133 | \n  134 |     // Renamed candidates must not conflict with own module's nested bindings\n  135 |     // (original names are allowed to shadow - that's intentional)\n  136 |     if !is_original_name && has_nested_scope_binding(symbol_db, symbol_ref.owner, candidate_name) {\n  137 |       return false;\n  138 |     }\n  139 | \n  140 |     true\n  141 |   }","lines":24,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/utils/renamer.rs#L118-L141"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`ParallelJsPlugin::register_hook_usage` returns `HookUsage::all()` unconditionally, declaring every hook used regardless of which hooks the wrapped plugins actually implement. This defeats the hook-usage optimization (the bundler invokes every hook entry point, which then short-circuits via `first_plugin().<hook>.is_some()` checks) and is inconsistent with `JsPlugin::register_hook_usage` which reports real usage.","fix":"Compute usage from the representative plugin: `HookUsage::from_bits_truncate(self.first_plugin().inner.hook_usage)` (the wrapped plugins are identical copies across workers).","locations":[{"ref":"crates/rolldown_binding/src/options/plugin/parallel_js_plugin.rs:199-201","code":"  199 |   fn register_hook_usage(&self) -> HookUsage {\n  200 |     HookUsage::all()\n  201 |   }","lines":3,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_binding/src/options/plugin/parallel_js_plugin.rs#L199-L201"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"LazyCompilationPlugin::transform_ast runs LazyCompilationRuntimeInjector on EVERY non-proxy module and rewrites EVERY `import(...)` expression into `import(...).then(__unwrap_lazy_compilation_entry)`, plus injects the helper function declaration, regardless of whether the dynamic import actually targets a lazy module. visit_expression (runtime_injector.rs:25-52) matches all ImportExpression nodes unconditionally. This adds a runtime `.then()` allocation/microtask and a helper to every module with dynamic imports in the whole graph, even when lazy compilation is not relevant to that import. It also changes the resolved value semantics of all dynamic imports through the helper wrapper.","fix":"Only wrap/transform dynamic imports whose target is (or may be) a lazy entry, or gate the whole transform on whether any lazy entries exist, to avoid touching unrelated dynamic imports across the entire module graph.","locations":[{"ref":"crates/rolldown_plugin_lazy_compilation/src/lazy_compilation_plugin.rs:181-213","code":"  181 |   async fn transform_ast(\n  182 |     &self,\n  183 |     _ctx: &rolldown_plugin::PluginContext,\n  184 |     mut args: rolldown_plugin::HookTransformAstArgs<'_>,\n  185 |   ) -> rolldown_plugin::HookTransformAstReturn {\n  186 |     // Skip proxy modules (they have their own structure)\n  187 |     if args.id.contains(\"?rolldown-lazy=1\") {\n  188 |       return Ok(args.ast);\n  189 |     }\n  190 | \n  191 |     args.ast.program.with_mut(|fields| {\n  192 |       let mut visitor = LazyCompilationRuntimeInjector::new(fields.allocator);\n  193 |       visitor.visit_program(fields.program);\n  194 | \n  195 |       // Inject helper after directive prologues (e.g., \"use strict\")\n  196 |       if visitor.transformed_count > 0 {\n  197 |         let helper = create_unwrap_lazy_compilation_entry_helper(fields.allocator);\n  198 |         // Find insertion point after directive prologues\n  199 |         let insert_idx = fields\n  200 |           .program\n  201 |           .body\n  202 |           .iter()\n  203 |           .take_while(|stmt| {\n  204 |             matches!(stmt, oxc::ast::ast::Statement::ExpressionStatement(expr_stmt)\n  205 |               if matches!(&expr_stmt.expression, oxc::ast::ast::Expression::StringLiteral(_)))\n  206 |           })\n  207 |           .count();\n  208 |         fields.program.body.insert(insert_idx, helper);\n  209 |       }\n  210 |     });\n  211 | \n  212 |     Ok(args.ast)\n  213 |   }","lines":33,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_lazy_compilation/src/lazy_compilation_plugin.rs#L181-L213"},{"ref":"crates/rolldown_plugin_lazy_compilation/src/runtime_injector.rs:25-52","code":"   25 |   fn visit_expression(&mut self, expr: &mut Expression<'ast>) {\n   26 |     // First visit children\n   27 |     walk_mut::walk_expression(self, expr);\n   28 | \n   29 |     // Then transform import expressions\n   30 |     if matches!(expr, Expression::ImportExpression(_)) {\n   31 |       // Transform: import(x) -> import(x).then(__unwrap_lazy_compilation_entry)\n   32 |       let import_expr = std::mem::replace(expr, self.ast_builder.expression_null_literal(SPAN));\n   33 | \n   34 |       // Build: import_expr.then(__unwrap_lazy_compilation_entry)\n   35 |       *expr = self.ast_builder.expression_call(\n   36 |         SPAN,\n   37 |         Expression::from(self.ast_builder.member_expression_static(\n   38 |           SPAN,\n   39 |           import_expr,\n   40 |           self.ast_builder.identifier_name(SPAN, \"then\"),\n   41 |           false,\n   42 |         )),\n   43 |         NONE,\n   44 |         self\n   45 |           .ast_builder\n   46 |           .vec1(Argument::from(self.ast_builder.expression_identifier(SPAN, HELPER_NAME))),\n   47 |         false,\n   48 |       );\n   49 | \n   50 |       self.transformed_count += 1;\n   51 |     }\n   52 |   }","lines":28,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_lazy_compilation/src/runtime_injector.rs#L25-L52"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`get_imported_chunks_inner` and `get_css_files_for_chunk_impl` look up each\nimported chunk by filename with `bundle.iter().find_map(...)` inside a\nrecursion over every chunk's imports - O(chunks * imports), quadratic in\nbundle size, executed per HTML entry in generate_bundle. The TODO comments in\nthe code acknowledge this.","fix":"Build a single `FxHashMap<&filename, &OutputChunk>` from the bundle once and\npass it into the recursion for O(1) lookups.","locations":[{"ref":"crates/rolldown_plugin_vite_html/src/utils/helpers.rs:81-100","code":"   81 |   for file in &chunk.imports {\n   82 |     // Find the importee in the bundle by filename\n   83 |     let importee = bundle.iter().find_map(|output| match output {\n   84 |       Output::Chunk(c) if c.filename == *file => Some(c),\n   85 |       _ => None,\n   86 |     });\n   87 |     if let Some(importee) = importee {\n   88 |       // If it's a chunk and we haven't seen it yet\n   89 |       if !seen.contains(file) {\n   90 |         seen.insert(file.clone());\n   91 |         // Post-order traversal: first add all imports of this chunk\n   92 |         get_imported_chunks_inner(importee, bundle, seen, chunks);\n   93 |         // Then add the chunk itself\n   94 |         chunks.push(ImportedChunk::Chunk(Arc::clone(importee)));\n   95 |       }\n   96 |     } else {\n   97 |       // External import\n   98 |       chunks.push(ImportedChunk::External(file.clone()));\n   99 |     }\n  100 |   }","lines":20,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/utils/helpers.rs#L81-L100"},{"ref":"crates/rolldown_plugin_vite_html/src/utils/helpers.rs:139-154","code":"  139 |     for import_filename in &chunk.imports {\n  140 |       // TODO: we could improve below logic in future\n  141 |       if let Some(importee) = bundle.iter().find_map(|output| match output {\n  142 |         rolldown_common::Output::Chunk(c) if &c.filename == import_filename => Some(c),\n  143 |         _ => None,\n  144 |       }) {\n  145 |         files.extend(get_css_files_for_chunk_impl(\n  146 |           ctx,\n  147 |           importee,\n  148 |           bundle,\n  149 |           analyzed_imported_css_files,\n  150 |           seen_chunks,\n  151 |           seen_css,\n  152 |         ));\n  153 |       }\n  154 |     }","lines":16,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_html/src/utils/helpers.rs#L139-L154"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`get_internal_imports` does a linear scan over the entire `bundle` for every import filename (nested loop), making it O(imports * bundle_outputs). It is called twice per chunk (for `imports` and `dynamic_imports`) in `create_chunk`, which itself runs for every chunk, giving roughly quadratic behavior in the number of chunks. Additionally `get_chunk_name` is recomputed (with path allocation, normalization and string allocation) on every match. For large bundles this is a real hot spot.","fix":"Build a single `FxHashMap<&str filename, &OutputChunk>` (or filename -> precomputed chunk name) once before the chunk loop and look imports up by key, instead of rescanning the bundle and recomputing chunk names per import.","locations":[{"ref":"crates/rolldown_plugin_vite_manifest/src/utils.rs:103-121","code":"  103 |   fn get_internal_imports(\n  104 |     &self,\n  105 |     bundle: &Vec<Output>,\n  106 |     imports: &Vec<ArcStr>,\n  107 |     is_legacy: bool,\n  108 |   ) -> Vec<String> {\n  109 |     let mut filtered_imports = vec![];\n  110 |     for file in imports {\n  111 |       for output in bundle {\n  112 |         if let Output::Chunk(chunk) = output {\n  113 |           if chunk.filename == *file {\n  114 |             filtered_imports.push(self.get_chunk_name(chunk, is_legacy));\n  115 |             break;\n  116 |           }\n  117 |         }\n  118 |       }\n  119 |     }\n  120 |     filtered_imports\n  121 |   }","lines":19,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_manifest/src/utils.rs#L103-L121"},{"ref":"crates/rolldown_plugin_vite_manifest/src/lib.rs:49-68","code":"   49 |     for file in args.bundle.iter() {\n   50 |       match file {\n   51 |         Output::Chunk(chunk) => {\n   52 |           let name = self.get_chunk_name(chunk, is_legacy);\n   53 |           let vite_metadata = if self.is_enable_v2 {\n   54 |             ctx.meta().get::<ViteMetadata>().and_then(|cache| {\n   55 |               cache.inner.get(chunk.preliminary_filename.as_str()).map(|v| v.clone())\n   56 |             })\n   57 |           } else {\n   58 |             None\n   59 |           };\n   60 |           let chunk_manifest = Arc::new(self.create_chunk(\n   61 |             args.bundle,\n   62 |             chunk,\n   63 |             &name,\n   64 |             is_legacy,\n   65 |             vite_metadata.as_ref(),\n   66 |           ));\n   67 |           manifest.insert(name, chunk_manifest);\n   68 |         }","lines":20,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown_plugin_vite_manifest/src/lib.rs#L49-L68"}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`trim_start_pattern`/`trim_end_pattern` compile a fresh `regex::Regex` (`Regex::new(format!(...))`) on every invocation for any non-fast-path pattern, and these are called once per chunk inside the trim loops. For a custom `char_type` and many chunks this recompiles the same regex repeatedly (O(chunks) regex compilations), which dominates trim cost. The common patterns (`\\s`, `[\\r\\n]`) take a fast path, so the default/`trim_lines` cases are unaffected, but custom patterns are quadratic-ish in compilation work.","fix":"Compile the regex once per `trim`/`trim_with` call (e.g. build it in the public entry and pass the compiled `Regex` down), or cache compiled patterns in a thread-local/`OnceLock` keyed by pattern string.","locations":[{"ref":"crates/string_wizard/src/magic_string/trim.rs:203-223","code":"  203 | fn trim_start_pattern<'a>(s: &'a str, pattern: &str) -> &'a str {\n  204 |   // Fast path for common patterns\n  205 |   match pattern {\n  206 |     \"\\\\s\" => return s.trim_start(),\n  207 |     \"[\\\\r\\\\n]\" | \"[\\r\\n]\" => return s.trim_start_matches(['\\r', '\\n']),\n  208 |     _ => {}\n  209 |   }\n  210 | \n  211 |   // Use regex for custom patterns\n  212 |   let regex_pattern = format!(\"^({pattern})+\");\n  213 |   match regex::Regex::new(&regex_pattern) {\n  214 |     Ok(re) => {\n  215 |       if let Some(m) = re.find(s) {\n  216 |         &s[m.end()..]\n  217 |       } else {\n  218 |         s\n  219 |       }\n  220 |     }\n  221 |     Err(_) => s.trim_start(), // Fallback to whitespace on invalid regex\n  222 |   }\n  223 | }","lines":21,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/trim.rs#L203-L223"},{"ref":"crates/string_wizard/src/magic_string/trim.rs:230-250","code":"  230 | fn trim_end_pattern<'a>(s: &'a str, pattern: &str) -> &'a str {\n  231 |   // Fast path for common patterns\n  232 |   match pattern {\n  233 |     \"\\\\s\" => return s.trim_end(),\n  234 |     \"[\\\\r\\\\n]\" | \"[\\r\\n]\" => return s.trim_end_matches(['\\r', '\\n']),\n  235 |     _ => {}\n  236 |   }\n  237 | \n  238 |   // Use regex for custom patterns\n  239 |   let regex_pattern = format!(\"({pattern})+$\");\n  240 |   match regex::Regex::new(&regex_pattern) {\n  241 |     Ok(re) => {\n  242 |       if let Some(m) = re.find(s) {\n  243 |         &s[..m.start()]\n  244 |       } else {\n  245 |         s\n  246 |       }\n  247 |     }\n  248 |     Err(_) => s.trim_end(), // Fallback to whitespace on invalid regex\n  249 |   }\n  250 | }","lines":21,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/string_wizard/src/magic_string/trim.rs#L230-L250"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`try_extract_parent_static_member_expr_chain` allocates a fresh `Vec<MemberExprProp>` on every\ninvocation, and is called once per resolved root identifier reference during scanning\n(`process_identifier_ref_by_scope`), plus for namespace/default imports it walks the entire\nvisit path (`usize::MAX` / `usize::MAX` max_len). On large modules with many member-expression\nreferences this is a steady stream of small heap allocations on a hot path.","fix":"Consider a reusable scratch buffer on the scanner (like `namespace_name_buf`) or returning a small-vec/iterator, and only build the props vec lazily after confirming the chain is non-trivial.","locations":[{"ref":"crates/rolldown/src/ast_scanner/mod.rs:1037-1072","code":" 1037 |   pub fn try_extract_parent_static_member_expr_chain(\n 1038 |     &self,\n 1039 |     max_len: usize,\n 1040 |   ) -> Option<(NodeId, Span, Vec<MemberExprProp>)> {\n 1041 |     let mut node_id = NodeId::DUMMY;\n 1042 |     let mut span = SPAN;\n 1043 |     let mut props = vec![];\n 1044 |     for ancestor_ast in self.visit_path.iter().rev().take(max_len) {\n 1045 |       match ancestor_ast {\n 1046 |         AstKind::StaticMemberExpression(expr) => {\n 1047 |           node_id = ancestor_ast.node_id();\n 1048 |           span = ancestor_ast.span();\n 1049 |           props.push(MemberExprProp {\n 1050 |             name: expr.property.name.as_str().into(),\n 1051 |             span: expr.property.span(),\n 1052 |             optional: expr.optional,\n 1053 |           });\n 1054 |         }\n 1055 |         AstKind::ComputedMemberExpression(expr) => {\n 1056 |           if let Some(name) = expr.static_property_name() {\n 1057 |             node_id = ancestor_ast.node_id();\n 1058 |             span = ancestor_ast.span();\n 1059 |             props.push(MemberExprProp {\n 1060 |               name: name.into(),\n 1061 |               span: expr.expression.span(),\n 1062 |               optional: expr.optional,\n 1063 |             });\n 1064 |           } else {\n 1065 |             break;\n 1066 |           }\n 1067 |         }\n 1068 |         _ => break,\n 1069 |       }\n 1070 |     }\n 1071 |     (!props.is_empty()).then_some((node_id, span, props))\n 1072 |   }","lines":36,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ast_scanner/mod.rs#L1037-L1072"},{"ref":"crates/rolldown/src/ast_scanner/impl_visit.rs:605-657","code":"  605 |         if let Some(named_import) = self.result.named_imports.get(&root_symbol_id) {\n  606 |           let (ty, max_tract_len) = match named_import.imported {\n  607 |             rolldown_common::Specifier::Star => {\n  608 |               (MemberExprObjectReferencedType::Namespace, usize::MAX)\n  609 |             }\n  610 |             rolldown_common::Specifier::Literal(ref compact_str)\n  611 |               if compact_str.as_str() == \"default\" =>\n  612 |             {\n  613 |               (MemberExprObjectReferencedType::Default, 2)\n  614 |             }\n  615 |             rolldown_common::Specifier::Literal(_) => {\n  616 |               (MemberExprObjectReferencedType::Named, usize::MAX)\n  617 |             }\n  618 |           };\n  619 |           if let Some((node_id, span, props)) =\n  620 |             self.try_extract_parent_static_member_expr_chain(max_tract_len)\n  621 |           {\n  622 |             if !span.is_unspanned() {\n  623 |               is_inserted_before = true;\n  624 | \n  625 |               if matches!(ty, MemberExprObjectReferencedType::Namespace)\n  626 |                 && is_member_write\n  627 |                 && props[0].name == \"default\"\n  628 |               {\n  629 |                 // Write through namespace default (e.g. `ns.default.a = value`). Since\n  630 |                 // `ns.default` is the raw CJS exports object, any property write on it may\n  631 |                 // affect all `ns.xxx` reads. Mark the symbol so all CJS exports of the target\n  632 |                 // module are bailed out from constant inlining.\n  633 |                 let symbol_ref_flags = root_symbol_id.flags_mut(&mut self.result.symbol_ref_db);\n  634 |                 *symbol_ref_flags |= SymbolRefFlags::HasComputedMemberWrite;\n  635 |               }\n  636 |               self.add_member_expr_reference(MemberExprRef::new(\n  637 |                 root_symbol_id,\n  638 |                 props,\n  639 |                 node_id,\n  640 |                 span,\n  641 |                 ty,\n  642 |                 ident_ref.reference_id.get(),\n  643 |                 is_member_write,\n  644 |               ));\n  645 |             }\n  646 |           } else if is_member_write\n  647 |             && matches!(\n  648 |               ty,\n  649 |               MemberExprObjectReferencedType::Default | MemberExprObjectReferencedType::Namespace\n  650 |             )\n  651 |           {\n  652 |             // Computed member write (e.g. `cjs[name] = value`) where the key is dynamic.\n  653 |             // Mark the import symbol so all CJS exports of the target module won't be inlined.\n  654 |             let symbol_ref_flags = root_symbol_id.flags_mut(&mut self.result.symbol_ref_db);\n  655 |             *symbol_ref_flags |= SymbolRefFlags::HasComputedMemberWrite;\n  656 |           }\n  657 |         }","lines":53,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ast_scanner/impl_visit.rs#L605-L657"}]},{"id":"PERF_11","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"ESM export-star external `with`-clause resolution does a nested scan of every module in the chunk and every import record of each module, per entry-level external importee. For chunks with many modules/records and several entry-level externals this is O(externals * modules * records). It runs only for ESM entry chunks with entry-level external star-exports, so impact is bounded, but the algorithm is quadratic-ish.","fix":"Precompute a map from external importee idx to its export-star import attribute once per chunk instead of re-scanning all modules/records for each external.","locations":[{"ref":"crates/rolldown/src/ecmascript/format/esm.rs:57-95","code":"   57 |       for importee_idx in ctx.chunk.entry_level_external_module_idx.iter().copied() {\n   58 |         let importee = &ctx.link_output.module_table[importee_idx];\n   59 |         if let Some(m) = importee.as_external() {\n   60 |           let ext_name = m.get_import_path(ctx.chunk, ctx.resolved_paths);\n   61 |           // Preserve the `with { ... }` import attribute from the originating\n   62 |           // `export * from \"...\" with { ... }` record (issue #9160) instead of dropping it.\n   63 |           // Find the entry-level export-star record (in a chunk module) that resolved to this\n   64 |           // external and reuse its attribute. Notes:\n   65 |           // - If no such record carries an attribute, `with_clause` is `None` and we emit the\n   66 |           //   plain `export * from` exactly as before (safe degradation, no regression). This is\n   67 |           //   also what happens if the owning module lives in a different chunk.\n   68 |           // - If several records re-export the same external with *different* attributes (a\n   69 |           //   pathological, conflicting input), the first by chunk exec-order wins — consistent\n   70 |           //   with the existing import-side behavior (see the TODO in `render_esm_chunk_imports`).\n   71 |           let with_clause = ctx\n   72 |             .chunk\n   73 |             .modules\n   74 |             .iter()\n   75 |             .filter_map(|module_idx| ctx.link_output.module_table[*module_idx].as_normal())\n   76 |             .find_map(|module| {\n   77 |               module.import_records.iter_enumerated().find_map(|(rec_idx, rec)| {\n   78 |                 (rec.resolved_module == Some(importee_idx)\n   79 |                   && rec.meta.contains(ImportRecordMeta::IsExportStar)\n   80 |                   && rec.meta.contains(ImportRecordMeta::EntryLevelExternal))\n   81 |                 .then(|| module.import_attribute_map.get(&rec_idx))\n   82 |                 .flatten()\n   83 |               })\n   84 |             });\n   85 |           // An absent attribute is just an empty suffix, so both cases collapse to a\n   86 |           // single `append_source` (same shape `create_import_declaration` uses below).\n   87 |           source_joiner.append_source(concat_string!(\n   88 |             \"export * from \\\"\",\n   89 |             ext_name,\n   90 |             \"\\\"\",\n   91 |             with_clause.map(|attr| concat_string!(\" \", attr.to_string())).unwrap_or_default(),\n   92 |             \"\\n\"\n   93 |           ));\n   94 |         }\n   95 |       }","lines":39,"link":"https://github.com/rolldown/rolldown/blob/a19a9c38241abfcbe98e651a88e4eba8a49caba9/crates/rolldown/src/ecmascript/format/esm.rs#L57-L95"}]},{"id":"PERF_12","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"For every changed file, `compute_hmr_update_for_file_changes` iterates the entire\n`plugin_driver.transform_dependencies` DashMap and calls `deps.contains(&changed_file_path)` for\neach module entry. This is O(changed_files * total_modules_with_transform_deps * deps_per_module)\nper HMR round. When many transform plugins register dependencies, a single file save scans the\nwhole dependency table repeatedly. An inverted index (transform-dependency-path -> module idxs)\nbuilt once would turn this into a hash lookup per changed file.","fix":"Maintain a reverse map `dep_path -> Vec<ModuleIdx>` in the plugin driver and look up changed paths directly instead of scanning every module's dependency set.","locations":[{"ref":"crates/rolldown/src/hmr/hmr_stage.rs:179-187","code":"  179 |       // Check if any modules have
