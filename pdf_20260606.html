<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"Font::widths indexes `t0.descendant_fonts[0]` directly. DescendantFonts is parsed from an untrusted Vec and the PDF may supply an empty array (`/DescendantFonts []`), causing an out-of-bounds index panic while parsing a malformed Type0 font.","fix":"Use `.get(0).ok_or(...)?` (as is already done in embedded_data/cid_to_gid_map) instead of `descendant_fonts[0]`, returning a PdfError when the array is empty.","locations":[{"ref":"pdf/src/font.rs:325-327","code":"  325 |     pub fn widths(&self, resolve: &impl Resolve) -> Result<Option<Widths>> {\n  326 |         match self.data {\n  327 |             FontData::Type0(ref t0) => t0.descendant_fonts[0].widths(resolve),","lines":3}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"`Function::input_dim` and `Function::output_dim` call `panic!()` for the `Calculator` variant (and any future variant). These are public methods; a parsed `Function::Calculator` (FunctionType handling is incomplete) reaching either method aborts the process when processing untrusted input.","fix":"Return a `Result<usize>` and `bail!` for unsupported variants, or return 0; do not `panic!` on data-driven branches.","locations":[{"ref":"pdf/src/object/function.rs:130-147","code":"  130 |     pub fn input_dim(&self) -> usize {\n  131 |         match *self {\n  132 |             Function::PostScript { ref domain, .. } => domain.len() / 2,\n  133 |             Function::Sampled(ref f) => f.input.len(),\n  134 |             // Stitching and exponential-interpolation functions take one input.\n  135 |             Function::Stitching(_) | Function::Interpolated(_) => 1,\n  136 |             _ => panic!(),\n  137 |         }\n  138 |     }\n  139 |     pub fn output_dim(&self) -> usize {\n  140 |         match *self {\n  141 |             Function::PostScript { ref range, .. } => range.len() / 2,\n  142 |             Function::Sampled(ref f) => f.output.len(),\n  143 |             Function::Interpolated(ref parts) => parts.len(),\n  144 |             Function::Stitching(ref f) => f.output_dim(),\n  145 |             _ => panic!(),\n  146 |         }\n  147 |     }","lines":18}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"Type 2 (exponential) function construction indexes `raw.domain[0]` and `raw.domain[1]` directly. `Domain` is read verbatim from the untrusted dictionary; a function with a missing or short `Domain` array (e.g. `[]` or `[0.0]`) panics with an out-of-bounds slice index instead of returning an error.","fix":"Validate `raw.domain.len() >= 2` before indexing, or use `raw.domain.get(0)`/`get(1)` and `bail!` on absence.","locations":[{"ref":"pdf/src/object/function.rs:164","code":"  164 |                 let input_range = (raw.domain[0], raw.domain[1]);","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"When building a Type 4 (PostScript) function the `Range` array is unwrapped with `info.range.unwrap()`. `Range` is optional in `RawFunction` and comes from untrusted input; a Type 4 function stream without a `/Range` entry panics.","fix":"Replace `info.range.unwrap()` with `try_opt!(info.range)` (Range is required for type 0 and 4 functions) to return a proper error.","locations":[{"ref":"pdf/src/object/function.rs:227-231","code":"  227 |                         Ok(Function::PostScript {\n  228 |                             func,\n  229 |                             domain: info.domain,\n  230 |                             range: info.range.unwrap(),\n  231 |                         })","lines":5}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"ObjectStream::get_object_slice builds a byte range `start..end` from offsets read out of the untrusted object stream, then returns it to be sliced against `data`. The offsets are never validated to be in-bounds or monotonically increasing. `start = first + offsets[index]` and `end = first + offsets[index+1]` can both exceed `data.len()`, and `end` can be smaller than `start` (offsets need not increase), producing an invalid Range. When a caller slices `data[start..end]` this panics with 'range start index out of range' / 'slice index starts at X but ends at Y'. The only guard is the index bound and the checked_add for overflow; magnitude vs data.len() and ordering are unchecked.","fix":"After computing start and end, clamp/validate: ensure start <= end and end <= data.len(); otherwise return a PdfError (e.g. PdfError::ObjStmOutOfBounds or a parse error) instead of returning a range that will later panic on slicing.","locations":[{"ref":"pdf/src/object/stream.rs:388-402","code":"  388 | impl ObjectStream {\n  389 |     pub fn get_object_slice(&self, index: usize, resolve: &impl Resolve) -> Result<(Arc<[u8]>, Range<usize>)> {\n  390 |         if index >= self.offsets.len() {\n  391 |             err!(PdfError::ObjStmOutOfBounds {index, max: self.offsets.len()});\n  392 |         }\n  393 |         let start = try_opt!(self.inner.info.first.checked_add(self.offsets[index]), \"overflow\");\n  394 |         let data = self.inner.data(resolve)?;\n  395 |         let end = if index == self.offsets.len() - 1 {\n  396 |             data.len()\n  397 |         } else {\n  398 |             try_opt!(self.inner.info.first.checked_add(self.offsets[index + 1]), \"overflow\")\n  399 |         };\n  400 | \n  401 |         Ok((data, start..end))\n  402 |     }","lines":15}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","description":"read_n can underflow/panic and silently drops a byte. `self.pos += n` can overflow usize for an attacker-chosen length. When start_pos < buf.len() but pos >= buf.len(), it sets `self.pos = self.buf.len() - 1`, which panics with subtract-overflow when buf is empty (len()==0), and otherwise returns a substr ending one byte before EOF (off-by-one), losing the final byte. parse_stream_object calls read_n(length) and compares the returned length to `length`, so a stream that ends exactly at EOF returns length-1 bytes and is wrongly rejected as EOF.","fix":"Use checked/saturating arithmetic: let end = self.pos.saturating_add(n).min(self.buf.len()); build the substr from start_pos.min(len)..end and set self.pos = end. Do not subtract 1 from len; do not use raw `+=`.","locations":[{"ref":"pdf/src/parser/lexer/mod.rs:320-331","code":"  320 |     pub fn read_n(&mut self, n: usize) -> Substr<'a> {\n  321 |         let start_pos = self.pos;\n  322 |         self.pos += n;\n  323 |         if self.pos >= self.buf.len() {\n  324 |             self.pos = self.buf.len() - 1;\n  325 |         }\n  326 |         if start_pos < self.buf.len() {\n  327 |             self.new_substr(start_pos..self.pos)\n  328 |         } else {\n  329 |             self.new_substr(0..0)\n  330 |         }\n  331 |     }","lines":12}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","description":"PdfStream::serialize unwraps the Length entry and as_usize() on data parsed (or constructed) from untrusted input, and then asserts equality with data.len(). A Pending stream whose info dictionary lacks a Length key, has a non-integer/negative Length, or whose Length disagrees with the actual byte length will panic instead of returning an Err. Reachable when serializing streams derived from malformed input.","fix":"Replace .unwrap()/.unwrap() with proper error propagation: let info_len = self.info.get(\"Length\").ok_or(PdfError::MissingEntry{...})?.as_usize()?; and return Err on mismatch instead of assert_eq!.","locations":[{"ref":"pdf/src/primitive.rs:316-331","code":"  316 |     pub fn serialize(&self, out: &mut impl io::Write) -> Result<()> {\n  317 |         match self.inner {\n  318 |             StreamInner::InFile { .. } => {\n  319 |                 bail!(\"attempted to write already written stream\");\n  320 |             }\n  321 |             StreamInner::Pending { ref data } => {\n  322 |                 let info_len = self.info.get(\"Length\").unwrap().as_usize().unwrap();\n  323 |                 assert_eq!(info_len, data.len());\n  324 |                 self.info.serialize(out)?;\n  325 |                 writeln!(out, \"stream\")?;\n  326 |                 out.write_all(data)?;\n  327 |                 writeln!(out, \"\\nendstream\")?;\n  328 |             }\n  329 |         }\n  330 |         Ok(())\n  331 |     }","lines":16}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","description":"serialize_ops uses `unimplemented!()` for Op::InlineImage. Serializing any Content that legitimately contains an inline image (parsed from a real PDF via the BI/ID/EI path) panics. This is reachable from a normal round-trip (parse then re-serialize).","fix":"Implement inline-image serialization, or return a PdfError (e.g. `bail!(\"inline image serialization not supported\")`) instead of panicking.","locations":[{"ref":"pdf/src/content.rs:734","code":"  734 |             Op::InlineImage { image: _ } => unimplemented!(),","lines":1}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","description":"Content::from_ops calls `serialize_ops(&operations).unwrap()`, turning any serialization error (e.g. an Op::InlineImage which serialize_ops hits with `unimplemented!()`) into a panic instead of propagating the Result the function already returns.","fix":"Replace `.unwrap()` with `?` so the error is propagated through the function's `Result`.","locations":[{"ref":"pdf/src/content.rs:746-751","code":"  746 |     pub fn from_ops(operations: Vec<Op>, update: &mut impl Updater) -> Result<Self> {\n  747 |         let data = serialize_ops(&operations).unwrap();\n  748 |         Ok(Content {\n  749 |             parts: vec![update.create(Stream::new((), &data)?)?]\n  750 |         })\n  751 |     }","lines":6}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"fax_decode contains debug-style assert_eq! that can fire on attacker-controlled input. The fax crate's pels()/decode_g4 may not always yield a buffer length that is a multiple of columns (e.g. malformed G4 data), and these asserts will panic instead of returning a PdfError. CCITTFaxDecode is reachable from untrusted streams once wired up.","fix":"Replace the assert_eq! calls with a checked condition that returns Err(PdfError::Other) on mismatch.","locations":[{"ref":"pdf/src/enc.rs:426-433","code":"  426 |         decode_g4(data.iter().cloned(), columns, height, |line| {\n  427 |             buf.extend(pels(line, columns).map(|c| match c {\n  428 |                 Color::Black => 0,\n  429 |                 Color::White => 255\n  430 |             }));\n  431 |             assert_eq!(buf.len() % columns as usize, 0, \"len={}, columns={}\", buf.len(), columns);\n  432 |         }).ok_or(PdfError::Other { msg: \"faxdecode failed\".into() })?;\n  433 |         assert_eq!(buf.len() % columns as usize, 0, \"len={}, columns={}\", buf.len(), columns);","lines":8}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"Storage::update_with panics via panic!() for XRef::Free and XRef::Invalid entries when updating an object id that resolves to a free/invalid slot. update is a public API path; passing a PlainRef to a free/invalid object id triggers an unrecoverable panic instead of an error.","fix":"Return Err(PdfError) for the Free and Invalid cases instead of panic!().","locations":[{"ref":"pdf/src/file.rs:403-412","code":"  403 |     fn update_with<T: ObjectWrite>(&mut self, old: PlainRef, obj: T, options: UpdateOptions) -> Result<RcRef<T>> {\n  404 |         use std::collections::hash_map::Entry;\n  405 | \n  406 |         let r = match self.refs.get(old.id)? {\n  407 |             XRef::Free { .. } => panic!(),\n  408 |             XRef::Raw { gen_nr, .. } => PlainRef { id: old.id, gen: gen_nr },\n  409 |             XRef::Stream { .. } => return self.create(obj),\n  410 |             XRef::Promised => PlainRef { id: old.id, gen: 0 },\n  411 |             XRef::Invalid => panic!()\n  412 |         };","lines":10}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","description":"parse_cmap's beginbfrange single-string branch does `unicode_data.last_mut().unwrap()` to increment the trailing byte. It is guarded by `unicode_data.data.len() > 0` at the match, but after `into_bytes()` the same buffer is used; if a zero-length string somehow reaches here (e.g. via a different code path or future refactor) the unwrap panics. More concretely, the increment-last-byte logic mutates only the final byte, so for multi-byte UTF-16 ranges spanning a low-byte rollover it produces wrong unicode mappings rather than erroring.","fix":"Increment the full big-endian value (treat the trailing bytes as a number and add 1 with carry) instead of only the last byte; keep the explicit non-empty guard and avoid unwrap.","locations":[{"ref":"pdf/src/font.rs:655-671","code":"  655 |                     ) if unicode_data.data.len() > 0 => {\n  656 |                         let cid_start = parse_cid(&cid_start_data)?;\n  657 |                         let cid_end = parse_cid(&cid_end_data)?;\n  658 |                         let mut unicode_data = unicode_data.into_bytes();\n  659 | \n  660 |                         for cid in cid_start..=cid_end {\n  661 |                             match utf16be_to_string(&unicode_data) {\n  662 |                                 Ok(unicode) => map.insert(cid, unicode),\n  663 |                                 Err(_) => warn!(\"invalid unicode for cid {cid} {unicode_data:?}\"),\n  664 |                             }\n  665 |                             let last = unicode_data.last_mut().unwrap();\n  666 |                             if *last < 255 {\n  667 |                                 *last += 1;\n  668 |                             } else {\n  669 |                                 break;\n  670 |                             }\n  671 |                         }","lines":17}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","description":"`Function::apply` for the `Interpolated` variant reads `x[0]` without checking that the input slice is non-empty. A caller passing an empty input slice (input dimension 0) panics on the slice index.","fix":"Check `x.is_empty()` / `x.len() == self.input_dim()` and `bail!` before indexing `x[0]`.","locations":[{"ref":"pdf/src/object/function.rs:120-122","code":"  120 |                 for (f, y) in parts.iter().zip(out) {\n  121 |                     *y = f.apply(x[0]);\n  122 |                 }","lines":3}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","description":"Type 2 function `Function::to_primitive` (ObjectWrite) is `unimplemented!()`, so serializing any document containing a Type 2/3/Sampled/PostScript function panics. Reachable whenever a parsed document with functions is written back out.","fix":"Implement serialization for the supported `Function` variants or return an `Err` instead of `unimplemented!()`.","locations":[{"ref":"pdf/src/object/function.rs:281-305","code":"  281 | impl ObjectWrite for Function {\n  282 |     fn to_primitive(&self, _update: &mut impl Updater) -> Result<Primitive> {\n  283 |         unimplemented!()\n  284 |         /*\n  285 |         let dict = match self {\n  286 |             Function::Interpolated(parts) => {\n  287 |                 let first: &InterpolatedFunctionDim = try_opt!(parts.get(0));\n  288 |                 let f2 = Function2 {\n  289 |                     c0: parts.iter().map(|p| p.c0).collect(),\n  290 |                     c1: parts.iter().map(|p| p.c0).collect(),\n  291 |                     exponent: first.exponent\n  292 |                 };\n  293 |                 let f = RawFunction {\n  294 | (&data)?,\n  135 |             StreamFilter::JBIG2Decode(ref p) => {\n  136 |                 let global_data = p.globals.as_ref().map(|s| s.data(resolve)).transpose()?;\n  137 |                 jbig2_decode(&data, global_data.as_deref().unwrap_or_default())?\n  138 |             }\n  139 |             StreamFilter::FlateDecode(ref p) => flate_decode(&data, p, resolve.options())?,\n  140 |             _ => unreachable!(),\n  141 |         };","lines":25}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","description":"new_substr's 'fix backward range' branch is broken and can panic or produce a garbage slice. For range.start > range.end it computes new_end = range.start + 1 (can overflow usize) then range.start = range.end + 1, range.end = new_end. The resulting range is not the original swapped range and `&self.buf[range]` can be out of bounds (start can exceed buf.len()) causing a slice-index panic on adversarial positions.","fix":"Either reject inverted ranges, or simply swap them: if range.start > range.end { std::mem::swap(&mut range.start, &mut range.end); }. Clamp range.end to self.buf.len() before slicing.","locations":[{"ref":"pdf/src/parser/lexer/mod.rs:227-240","code":"  227 |     pub fn new_substr(&self, mut range: Range<usize>) -> Substr<'a> {\n  228 |         // if the range is backward, fix it\n  229 |         // start is inclusive, end is exclusive. keep that in mind\n  230 |         if range.start > range.end {\n  231 |             let new_end = range.start + 1;\n  232 |             range.start = range.end + 1;\n  233 |             range.end = new_end;\n  234 |         }\n  235 | \n  236 |         Substr {\n  237 |             file_offset: self.file_offset + range.start,\n  238 |             slice: &self.buf[range],\n  239 |         }\n  240 |     }","lines":14}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","description":"seek_newline directly indexes self.buf[self.pos] in the loop condition. If the lexer is positioned at buf.len() (e.g. at EOF) or buf is empty, this panics with index out of bounds before incr_pos is ever consulted. incr_pos itself also computes `self.buf.len() - 1` which underflow-panics on an empty buffer.","fix":"Guard with self.buf.get(self.pos): `while matches!(self.buf.get(self.pos), Some(&b) if b != b'\\n') && self.incr_pos() {}`. In incr_pos compare against len using `self.pos + 1 >= self.buf.len()` or saturating_sub(1).","locations":[{"ref":"pdf/src/parser/lexer/mod.rs:268-275","code":"  268 |     pub fn seek_newline(&mut self) -> Substr<'_> {\n  269 |         let start = self.pos;\n  270 |         while self.buf[self.pos] != b'\\n'\n  271 |             && self.incr_pos() { }\n  272 |         self.incr_pos();\n  273 | \n  274 |         self.new_substr(start..self.pos)\n  275 |     }","lines":8},{"ref":"pdf/src/parser/lexer/mod.rs:344-352","code":"  344 |     #[inline]\n  345 |     fn incr_pos(&mut self) -> bool {\n  346 |         if self.pos >= self.buf.len() - 1 {\n  347 |             false\n  348 |         } else {\n  349 |             self.pos += 1;\n  350 |             true\n  351 |         }\n  352 |     }","lines":9}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","description":"seek_substr indexes substr[matched] with no check that substr is non-empty: an empty needle panics on the first iteration (index out of bounds). It also indexes self.buf[self.pos] directly (guarded by the len check above, so that part is ok). Function is dead-code-annotated but public API.","fix":"Return None (or an error) immediately if substr.is_empty(). Consider using buf[pos..].windows(substr.len()).position(...) instead of the hand-rolled matcher, which also fixes the broken partial-match reset (matched is reset to 0 on mismatch instead of backtracking).","locations":[{"ref":"pdf/src/parser/lexer/mod.rs:281-302","code":"  281 |     pub fn seek_substr(&mut self, substr: impl AsRef<[u8]>) -> Option<Substr<'a>> {\n  282 | ncoming entry; if a parsed xref section yields a Promised/Invalid entry whose gen number is queried, this panics on untrusted input. The panic also carries no diagnostic message.","fix":"Return a Result or a sentinel (e.g. 0) for Promised/Invalid rather than panicking, or document/guarantee these variants never reach get_gen_nr and add a descriptive message.","locations":[{"ref":"pdf/src/xref.rs:35-44","code":"   35 | impl XRef {\n   36 |     pub fn get_gen_nr(&self) -> GenNr {\n   37 |         match *self {\n   38 |             XRef::Free {gen_nr, ..}\n   39 |             | XRef::Raw {gen_nr, ..} => gen_nr,\n   40 |             XRef::Stream { .. } => 0, // TODO I think these always have gen nr 0?\n   41 |             _ => panic!()\n   42 |         }\n   43 |     }\n   44 | }","lines":10}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"medium","description":"XRefTable::set indexes self.entries[id as usize] directly. If id exceeds the table length (e.g. an xref section whose first_id+count is larger than Size, or a change/promise id beyond bounds) this panics with an out-of-bounds index. The table is sized from the trailer Size field which comes from untrusted input.","fix":"Bounds-check or grow the vector (e.g. if id as usize >= len, resize with XRef::Invalid) and/or return Result instead of panicking on OOB index.","locations":[{"ref":"pdf/src/xref.rs:81-83","code":"   81 |     pub fn set(&mut self, id: ObjNr, r: XRef) {\n   82 |         self.entries[id as usize] = r;\n   83 |     }","lines":3}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"medium","description":"FieldAttrs::key() does `.expect(\"no 'key' in field attributes\")`. Any field without a `#[pdf(key=...)]` (and not marked skip/other) triggers this panic during expansion. The message gives no field name or span, so the developer cannot tell which field is missing the attribute.","fix":"Thread the field's span through and emit a spanned compile_error pointing at the o Overflow Underflow","severity":"high","description":"In Font::widths the CID `W` array handling computes `c1 + array.len() - 1` for ensure_cid. When the inner width array is empty (`[c1 []]`, allowed by malformed input), `array.len() - 1` underflows in usize and panics (or with a huge value, triggers an enormous allocation).","fix":"Guard against empty arrays: skip ensure_cid / the loop when `array.is_empty()`, or compute the upper bound with checked/saturating arithmetic before calling ensure_cid.","locations":[{"ref":"pdf/src/font.rs:346-358","code":"  346 |                         Some(Primitive::Array(array)) => {\n  347 |                             widths.ensure_cid(c1 + array.len() - 1);\n  348 |                             for (i, w) in array.iter().enumerate() {\n  349 |                                 widths.set(c1 + i, w.as_number()?);\n  350 |                             }\n  351 |                         }\n  352 |                         Some(&Primitive::Reference(r)) => match resolve.resolve(r)? {\n  353 |                             Primitive::Array(array) => {\n  354 |                                 widths.ensure_cid(c1 + array.len() - 1);\n  355 |                                 for (i, w) in array.iter().enumerate() {\n  356 |                                     widths.set(c1 + i, w.as_number()?);\n  357 |                                 }\n  358 |                             }","lines":13}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"In Font::widths the CID `W` ranged form does `for c in c1..=(c2 as usize)` where c2 is an i32 read straight from the PDF. A negative c2 casts to a gigantic usize, and even a large positive c2 produces an unbounded range; each iteration calls widths.set which grows the values Vec by `default`, leading to multi-GB allocation / OOM / effective hang on untrusted input.","fix":"Reject negative c2 (use as_usize-style validation), and bound the range (e.g. cap c2 - c1 to a sane maximum or validate against document size) before iterating and calling set.","locations":[{"ref":"pdf/src/font.rs:365-370","code":"  365 |                         Some(&Primitive::Integer(c2)) => {\n  366 |                             let w = try_opt!(iter.next()).as_number()?;\n  367 |                             for c in c1..=(c2 as usize) {\n  368 |                                 widths.set(c, w);\n  369 |                             }\n  370 |                         }","lines":6}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"In `SampledFunction::apply` the sample index is computed as `i * n_out` (1-D), `(i0 + s0*i1) * n_out` (2-D) and `(i0 + s0*(i1+s1*i2)) * n_out` (3-D). The indices `i`, `i0`, `i1`, `i2` come from `SampledFunctionInput::map`, where `y.floor() as usize` saturates a large/encoded float to `usize::MAX`. Multiplying by `n_out` overflows usize, panicking in debug builds and wrapping (yielding a wrong but possibly in-bounds offset) in release. `s0`/`s1` are attacker-controlled `Size` entries, compounding the overflow.","fix":"Clamp each mapped index to `size-1` inside `SampledFunctionInput::map` and use `checked_mul`/`checked_add` (or `saturating_*`) when computing the flat sample offset; bail on overflow.","locations":[{"ref":"pdf/src/object/function.rs:374-399","code":"  374 |                     let (i, _, s) = self.input[0].map(x[0]);\n  375 |                     let idx = i * n_out;\n  376 | \n  377 |                     if let Some(part) = self.data.get(idx..) {\n  378 |                         for (o, &a) in out.iter_mut().zip(part) {\n  379 |                             *o = a as f32 * (1. - s);\n  380 |                         }\n  381 |                     }\n  382 |                     if let Some(part) = self.data.get(idx + n_out..) {\n  383 |                         for (o, &b) in out.iter_mut().zip(part) {\n  384 |                             *o += b as f32 * s;\n  385 |                         }\n  386 |                     }\n  387 |                 }\n  388 |                 _ => unimplemented!(),\n  389 |             },\n  390 |             2 => match self.order {\n  391 |                 Interpolation::Linear => {\n  392 |                     let (i0, s0, f0) = self.input[0].map(x[0]);\n  393 |                     let (i1, _, f1) = self.input[1].map(x[1]);\n  394 |                     let (j0, j1) = (i0 + 1, i1 + 1);\n  395 |                     let (g0, g1) = (1. - f0, 1. - f1);\n  396 | \n  397 |                     out.fill(0.0);\n  398 |                     let mut add = |i0, i1, f| {\n  399 |                         let idx = (i0 + s0 * i1) * n_out;","lines":26},{"ref":"pdf/src/object/function.rs:417-425","code":"  417 |                     let (i0, s0, f0) = self.input[0].map(x[0]);\n  418 |                     let (i1, s1, f1) = self.input[1].map(x[1]);\n  419 |                     let (i2, _, f2) = self.input[2].map(x[2]);\n  420 |                     let (j0, j1, j2) = (i0 + 1, i1 + 1, i2 + 1);\n  421 |                     let (g0, g1, g2) = (1. - f0, 1. - f1, 1. - f2);\n  422 | \n  423 |                     out.fill(0.0);\n  424 |                     let mut add = |i0, i1, i2, f| {\n  425 |                         let idx = (i0 + s0 * (i1 + s1 * i2)) * n_out;","lines":9}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"`PageTree::page_limited` computes `pos..pos + tree.count` and `pos += tree.count` / `pos += 1` on u32 values taken directly from each node's `/Count`. Crafted `/Count` values that sum past u32::MAX overflow: debug-build panic, release-build wraparound that can make `contains(&page_nr)` match the wrong subtree (logic corruption). `page_nr - pos` is also an unchecked subtraction.","fix":"Use `checked_add`/`saturating_add` for `pos` and `checked_sub` for `page_nr - pos`, bailing on overflow; do not trust `/Count` to be consistent.","locations":[{"ref":"pdf/src/object/types/pagesnode.rs:65-83","code":"   65 |         let mut pos = 0;\n   66 |         for &kid in &self.kids {\n   67 |             let node = resolve.get(kid)?;\n   68 |             match *node {\n   69 |                 PagesNode::Tree(ref tree) => {\n   70 |                     if (pos..pos + tree.count).contains(&page_nr) {\n   71 |                         return tree.page_limited(resolve, page_nr - pos, depth - 1);\n   72 |                     }\n   73 |                     pos += tree.count;\n   74 |                 }\n   75 |                 PagesNode::Leaf(ref _page) => {\n   76 |                     if pos == page_nr {\n   77 |                         return Ok(PageRc(node));\n   78 |                     }\n   79 |                     pos += 1;\n   80 |                 }\n   81 |             }\n   82 |         }\n   83 |         Err(PdfError::PageOutOfBounds { page_nr, max: pos })","lines":19}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"Integer overflow in the xref bounds check: `num_entries * (w0 + w1 + w2)` multiplies an attacker-controlled entry count by an attacker-controlled total width with no overflow protection. On overflow the product wraps to a small value, the `> data.len()` guard passes, and the function then attempts to iterate num_entries times (potentially astronomically large), reading per-entry. In release builds this wraps silently and defeats the truncation safeguard.","fix":"Use checked arithmetic: let stride = w0.checked_add(w1).and_then(|s| s.checked_add(w2)); compute num_entries.checked_mul(stride) and on None/overflow either bail or clamp num_entries to data.len()/stride (guarding stride != 0).","locations":[{"ref":"pdf/src/parser/parse_xref.rs:12-22","code":"   12 | fn parse_xref_section_from_stream(first_id: u32, mut num_entries: usize, width: &[usize], data: &mut &[u8], resolve: &impl Resolve) -> Result<XRefSection> {\n ageDict {\n  204 |         width,\n  205 |         height,\n  206 |         color_space,\n  207 |         bits_per_component,\n  208 |         intent,\n  209 |         image_mask,\n  210 |         mask: None,\n  211 |         decode,\n  212 |         interpolate,\n  213 |         struct_parent: None,\n  214 |         id: None,\n  215 |         smask: None,\n  216 |         other: dict,\n  217 |     };\n  218 | \n  219 |     let data = lexer.new_substr(data_start .. data_end).to_vec();","lines":64}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"flate_decode computes `rows = inp.len() / (stride+1)` then allocates `rows * stride` after check_limits!, but stride = columns * n_components is bounded only by columns < 2^20 and n_components < 1024, so stride can be ~2^30; `rows * stride` can overflow usize on 32-bit and even the intermediate `stride+1` and per-row slice math `in_off + stride` operate on values derived from input. The split_at_mut prev/curr slicing uses out_off/last_out_off without revalidating against attacker-influenced stride.","fix":"Use checked_mul for rows*stride and stride computation, and tighten the columns/n_components bounds (or validate stride <= object_size_limit) before allocating.","locations":[{"ref":"pdf/src/enc.rs:280-345","code":"  280 | pub fn flate_decode(data: &[u8], params: &LZWFlateParams, options: &ParseOptions) -> Result<Vec<u8>> {\n  281 |     if !(0..1024).contains(&params.n_components) {\n  282 |         bail!(\"n_components out of range\");\n  283 |     }\n  284 |     if !(0..1<<20).contains(&params.columns) {\n  285 |         bail!(\"columns too large\");\n  286 |     }\n  287 |     let predictor: usize = params.predictor.try_into()?;\n  288 |     let n_components: usize = params.n_components.try_into()?;\n  289 |     let columns: usize = params.columns.try_into()?;\n  290 |     let stride = columns * n_components;\n  291 | \n  292 | \n  293 |     // First flate decode\n  294 |     let decoded = {\n  295 |         if let Ok(data) = inflate_bytes_zlib(data, options.object_size_limit) {\n  296 |             data\n  297 |         } else if let Ok(data) = inflate_bytes(data, options.object_size_limit) {\n  298 |             data\n  299 |         } else {\n  300 |             dump_data(data);\n  301 |             bail!(\"can't inflate\");\n  302 |         }\n  303 |     };\n  304 |     // Then unfilter (PNG)\n  305 |     // For this, take the old out as input, and write output to out\n  306 | \n  307 |     if predictor > 10 {\n  308 |         let inp = decoded; // input buffer\n  309 |         let rows = inp.len() / (stride+1);\n  310 | \n  311 |         // output buffer\n  312 |         check_limits!(rows * stride, options.object_size_limit);\n  313 |         let mut out = vec![0; rows * stride];\n  314 | \n  315 |         // Apply inverse predictor\n  316 |         let null_vec = vec![0; stride];\n  317 | \n  318 |         let mut in_off = 0; // offset into input buffer\n  319 | \n  320 |         let mut out_off = 0; // offset into output buffer\n  321 |         let mut last_out_off = 0; // last offset to output buffer\n  322 | \n  323 |         while in_off + stride < inp.len() {\n  324 |             let predictor = PredictorType::from_u8(inp[in_off])?;\n  325 |             in_off += 1; // +1 because the first byte on each row is predictor\n  326 | \n  327 |             let row_in = &inp[in_off .. in_off + stride];\n  328 |             let (prev_row, row_out) = if out_off == 0 {\n  329 |                 (&null_vec[..], &mut out[out_off .. out_off+stride])\n  330 |             } else {\n  331 |                 let (prev, curr) = out.split_at_mut(out_off);\n  332 |                 (&prev[last_out_off ..], &mut curr[.. stride])\n  333 |             };\n  334 |             unfilter(predictor, n_components, prev_row, row_in, row_out);\n  335 | \n  336 |             last_out_off = out_off;\n  337 | \n  338 |             in_off += stride;\n  339 |             out_off += stride;\n  340 |         }\n  341 |         Ok(out)\n  342 |     } else {\n  343 |         Ok(decoded)\n  344 |     }\n  345 | }","lines":66}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Storage::resolve_ref computes self.start_offset + pos for an XRef::Raw position without a checked_add. start_offset comes from the header scan and pos comes from the untrusted xref table; on 32-bit targets (or with very large crafted offsets) this addition can overflow and wrap, producing a bogus read offset. The xref-offset path in backend.rs uses checked_add, but this Raw-object path does not.","fix":"Use start_offset.checked_add(pos).ok_or(PdfError::Invalid)? before constructing the lexer.","locations":[{"ref":"pdf/src/file.rs:259-262","code":"  259 |                 XRef::Raw {pos, ..} => {\n  260 |                     let mut lexer = Lexer::with_offset(t!(self.backend.read(self.start_offset + pos ..), r), self.start_offset + pos);\n  261 |                     let p = t!(parse_indirect_object(&mut lexer, resolve, self.decoder.as_ref(), flags), r).1;\n  262 |                     Ok(p)","lines":4}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"`SampledFunctionInput::map` does `y.floor() as usize` then the caller adds 1 (`j0 = i0 + 1`, etc.) without clamping to `size`. While `data.get(idx..idx+n_out)` guards the final slice, the intermediate `i0 + s0*i1` arithmetic can still index a wrong cell, and `size` from input is never used to bound `i`. The returned `size` field is also ignored for the highest-index dimension. Combined with the multiply this is the root of the index issues.","fix":"Clamp the integer index to `0..size` (and the fractional weight accordingly) inside `map`, returning a guaranteed in-bounds index.","locations":[{"ref":"pdf/src/object/function.rs:320-326","code":"  320 | impl SampledFunctionInput {\n  321 |     fn map(&self, x: f32) -> (usize, usize, f32) {\n  322 |         let x = x.clamp(self.domain.0, self.domain.1);\n  323 |         let y = x.mul_add(self.encode_scale, self.encode_offset);\n  324 |         (y.floor() as usize, self.size, y.fract())\n  325 |     }\n  326 | }","lines":7}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In ObjectStream::from_primitive the loop runs `0..(stream.info.num_objects as ObjNr)` where num_objects is a usize parsed directly from the untrusted /N entry. While each iteration consumes lexer tokens (so it self-limits on truncated data), a stream whose decoded body contains many cheap integer tokens lets an attacker force num_objects (up to usize::MAX) iterations and push that many usize values into `offsets`, an unbounded allocation/DoS. There is no sanity bound tying num_objects to the decoded data length or object_size_limit.","fix":"Cap num_objects against a reasonable bound derived from the decoded data length (e.g. data.len() / 2, since each object needs at least two tokens) and/or resolve.options() limits before the loop, returning an error when exceeded.","locations":[{"ref":"pdf/src/object/stream.rs:364-386","code":"  364 | impl Object for ObjectStream {\n  365 |     fn from_primitive(p: Primitive, resolve: &impl Resolve) -> Result<ObjectStream> {\n  366 |         let stream: Stream<ObjStmInfo> = Stream::from_primitive(p, resolve)?;\n  367 | \n  368 |         let mut offsets = Vec::new();\n  369 |         {\n  370 |             debug!(\"parsing stream\");\n  371 |             let data = stream.data(resolve)?;\n  372 |             let mut lexer = Lexer::new(&data);\n  373 |             for _ in 0..(stream.info.num_objects as ObjNr) {\n  374 |                 let _obj_nr = lexer.next()?.to::<ObjNr>()?;\n  375 |                 let offset = lexer.next()?.to::<usize>()?;\n  376 |                 offsets.push(offset);\n  377 |             }\n  378 |         }\n  379 | \n  380 |         Ok(ObjectStream {\n  381 |             offsets,\n  382 |             _id: 0, // TODO\n  383 |             inner: stream\n  384 |         })\n  385 |     }\n  386 | }","lines":23}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In the disabled-but-intended repair logic, `1 + last_id - first_id` and `first_id + 1 .. obj_nr` and `offset - start_offset` perform unchecked arithmetic on object numbers and offsets taken directly from untrusted input. If last_id < first_id (objects with descending numbers after a sort edge case) or offset < start_offset, these underflow and panic in debug / wrap in release. last_id is also reassigned inside the loop to obj_nr, breaking the intended span computation.","fix":"Use checked/saturating arithmetic and validate first_id <= last_id and offset >= start_offset before subtracting; do not mutate last_id inside the fill loop.","locations":[{"ref":"pdf/src/repair.rs:19-34","code":"   19 |     let mut first_id = objects.first().map(|&(n, _, _)| n).unwrap_or(0);\n   20 |     let mut last_id = objects.last().map(|&(n, _, _)| n).unwrap_or(0);\n   21 |     let mut xref = XRefTable::new(1 + last_id - first_id);\n   22 |     for &(obj_nr, gen_nr, offset) in objects.iter() {\n   23 |         for n in first_id + 1 .. obj_nr {\n   24 |             xref.push(XRef::Free { next_obj_nr: obj_nr, gen_nr: 0 });\n   25 |         }\n   26 |         if obj_nr == last_id {\n   27 |             warn!(\"duplicate obj_nr {}\", obj_nr);\n   28 |             continue;\n   29 |         }\n   30 |         xref.push(XRef::Raw {\n   31 |             pos: offset - start_offset,\n   32 |             gen_nr\n   33 |         });\n   34 |         last_id = obj_nr;","lines":16}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"`PsFunc::exec_inner` casts popped f32 stack values to `as isize`/`as usize` for `roll`/`index` counts. A large or NaN float (NaN as usize = 0, huge float saturates) is converted then used for `rotate_right`/`rotate_left`/`stack[len-n-1]`. The slice/`checked_sub` guards prevent OOB, but `j as usize` after a huge `j` combined with `rotate_right` on a large slice is a controllable amount of work; more importantly the semantics of `as` saturation silently swallow malformed operands instead of erroring.","fix":"Reject non-finite / out-of-range float operands for roll/index explicitly before casting.","locations":[{"ref":"pdf/src/object/function.rs:500-518","code":"  500 |                 PsOp::Roll => {\n  501 |                     let j = stack.pop().ok_or(PostScriptError::StackUnderflow)? as isize;\n  502 |                     let n = stack.pop().ok_or(PostScriptError::StackUnderflow)? as usize;\n  503 |                     let start = stack.len().checked_sub(n).ok_or(PostScriptError::StackUnderflow)?;\n  504 |                     let slice = stack.get_mut(start..).ok_or(PostScriptError::IncorrectStackSize)?;\n  505 |                     if j > 0 {\n  506 |                         slice.rotate_right(j as usize);\n  507 |                     } else {\n  508 |                         slice.rotate_left(-j as usize);\n  509 |                     }\n  510 |                 }\n  511 |                 PsOp::Index => {\n  512 |                     let n = stack.pop().ok_or(PostScriptError::StackUnderflow)? as usize;\n  513 |                     if n >= stack.len() {\n  514 |                         return Err(PostScriptError::StackUnderflow);\n  515 |                     }\n  516 |                     let val = stack[stack.len() - n - 1];\n  517 |                     stack.push(val);\n  518 |                 }","lines":19}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"offset_pos uses self.pos.wrapping_add(offset) and then set_pos clamps with .min(buf.len()). The wrapping_add masks an overflow: a large offset wraps to a small value and set_pos happily moves the position backward instead of clamping to EOF, silently corrupting the parse position rather than erroring. This is reachable from string parsing where bytes_traversed feeds offset_pos.","fix":"Use saturating_add instead of wrapping_add so overflow clamps to buf.len() rather than wrapping to a small position.","locations":[{"ref":"pdf/src/parser/lexer/mod.rs:261-264","code":"  261 |     #[inline]\n  262 |     pub fn offset_pos(&mut self, offset: usize) -> Substr<'a> {\n  263 |         self.set_pos(self.pos.wrapping_add(offset))\n  264 |     }","lines":4},{"ref":"pdf/src/parser/lexer/mod.rs:244-253","code":"  244 |     pub fn set_pos(&mut self, wanted_pos: usize) -> Substr<'a> {\n  245 |         let new_pos = wanted_pos.min(self.buf.len());\n  246 |         let range = if self.pos < new_pos {\n  247 |             self.pos..new_pos\n  248 |         } else {\n  249 |             new_pos..self.pos\n  250 |         };\n  251 |         self.pos = new_pos;\n  252 |         self.new_substr(range)\n  253 |     }","lines":10}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"critical","description":"decode_nibble accepts the wrong character ranges for hex digits. It maps 'a'..='h' and 'A'..='H' to 0xa..=0x11 instead of 'a'..='f'/'A'..='F' to 0xa..=0xf. This means: (1) valid hex digits 'a'..'f' are decoded but so are invalid 'g' and 'h' (decoded as 0x10, 0x11) producing corrupt bytes that overflow a nibble, and (2) the high-nibble shift `high << 4 | low` will be wrong for these. Every ASCIIHexDecode stream and hex-encoded string (e.g. the /U, /O entries, names) containing letters g or h, or relying on correct f-handling, is decoded incorrectly. This is reachable from any untrusted PDF using hex strings.","fix":"Change the ranges to `b'a'..=b'f' => Some(a - b'a' + 0xa)` and `b'A'..=b'F' => Some(a - b'A' + 0xA)`.","locations":[{"ref":"pdf/src/enc.rs:117-125","code":"  117 | #[inline]\n  118 | pub fn decode_nibble(c: u8) -> Option<u8> {\n  119 |     match c {\n  120 |         n @ b'0' ..= b'9' => Some(n - b'0'),\n  121 |         a @ b'a' ..= b'h' => Some(a - b'a' + 0xa),\n  122 |         a @ b'A' ..= b'H' => Some(a - b'A' + 0xA),\n  123 |         _ => None\n  124 |     }\n  125 | }","lines":9}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"compare_dict returns an inverted equality result. After collecting keys present in b but not in a into b_unvisited, it returns `same && !b_unvisited.is_empty()`. This returns `true` (dicts equal) only when b has EXTRA keys that a lacks, and returns `false` for two genuinely identical dictionaries (where b_unvisited is empty). The verification logic is backwards, so Importer::verify will report identical clones as different and divergent clones as identical.","fix":"Return `Ok(same && b_unvisited.is_empty())` so that extra keys in b mark the dicts as unequal and an empty unvisited set is required for equality.","locations":[{"ref":"pdf/src/build.rs:305-323","code":"  305 |         let mut same = true;\n  306 |         let mut b_unvisited: HashSet<_> = b_dict.keys().collect();\n  307 |         for (a_key, a_val) in a_dict.iter() {\n  308 |             if let Some(b_val) = b_dict.get(a_key) {\n  309 |                 if !self.compare_prim(a_val, b_val, new_resolve)? {\n  310 |                     println!(\"value for key {a_key} mismatch.\");\n  311 |                     same = false;\n  312 |                 }\n  313 |                 b_unvisited.remove(a_key);\n  314 |             } else {\n  315 |                 println!(\"missing key {a_key} in b.\");\n  316 |                 same = false;\n  317 |             }\n  318 |         }\n  319 |         for b_key in b_unvisited.iter() {\n  320 |             println!(\"missing key {b_key} in a.\");\n  321 |         }\n  322 |         Ok(same && !b_unvisited.is_empty())\n  323 |     }","lines":19}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"key_derivation_user_password_rc4 always copies exactly 16 bytes into the key but allocates key_size.max(16); for AES/longer key sizes the rest stays zero, and crucially the MD5 result is always 16 bytes so `key[..16].copy_from_slice(&data)` is the only fill. For key_size < 16 (e.g. 40-bit/5-byte RC4) the function returns a 16-byte key but downstream uses key[..min(key_size,16)] so that is OK; however when key_size > 16 (impossible for RC4/MD5-derived keys but used for V=4 AESV2 with Length>128) the upper bytes are silently zero, yielding a wrong key. The code conflates the MD5-based (max 16 byte) derivation with arbitrary key_size.","fix":"Clamp key_size to 16 for the MD5-based RC4/AESV2 derivation, or reject key_size > 16 here as is done in key_derivation_owner_password_rc4.","locations":[{"ref":"pdf/src/crypt.rs:230-276","code":"  230 |         fn key_derivation_user_password_rc4(\n  231 |             revision: u32,\n  232 |             key_size: usize,\n  233 |             dict: &CryptDict,\n  234 |             id: &[u8],\n  235 |             pass: &[u8],\n  236 |         ) -> Vec<u8> {\n  237 |             let o = dict.o.as_bytes();\n  238 |             let p = dict.p;\n  239 |             // 7.6.3.3 - Algorithm 2\n  240 |             // a) and b)\n  241 |             let mut hash = md5::Context::new();\n  242 |             if pass.len() < 32 {\n  243 |                 hash.consume(pass);\n  244 |                 hash.consume(&PADDING[..32 - pass.len()]);\n  245 |             } else {\n  246 |                 hash.consume(&pass[..32]);\n  247 |             }\n  248 | \n  249 |             // c)\n  250 |             hash.consume(o);\n  251 | \n  252 |             // d)\n  253 |             hash.consume(p.to_le_bytes());\n  254 | \n  255 |             // e)\n  256 |             hash.consume(id);\n  257 | \n  258 |             // f)\n  259 |             if revision >= 4 && !dict.encrypt_metadata {\n  260 |                 hash.consume([0xff, 0xff, 0xff, 0xff]);\n  261 |             }\n  262 | \n  263 |             // g)\n  264 |             let mut data = *hash.compute();\n  265 | \n  266 |             // h)\n  267 |             if revision >= 3 {\n  268 |                 for _ in 0..50 {\n  269 |                     data = *md5::compute(&data[..std::cmp::min(key_size, 16)]);\n  270 |                 }\n  271 |             }\n  272 | \n  273 |             let mut key = vec![0u8; key_size.max(16)];\n  274 |             key[..16].copy_from_slice(&data);\n  275 |             key\n  276 |         }","lines":47}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The sampled-function output scale is hard-coded as `(c[1] - c[0]) / 255.` and each sample byte is read as `a as f32`, i.e. the code assumes BitsPerSample == 8. The `BitsPerSample` field is captured as `_bits_per_sample` and never used, so Type 0 functions with 1/2/4/12/16-bit samples are decoded incorrectly (wrong scaling and wrong byte stride), producing garbage colors. There is no validation that the sample data length matches `prod(size) * n_out`.","fix":"Honor `BitsPerSample`: unpack samples at the declared bit depth, scale by `2^bits - 1` instead of 255, and validate that `data.len()` is consistent with the declared `Size` and output dimension.","locations":[{"ref":"pdf/src/object/function.rs:21-22","code":"   21 |     #[pdf(key = \"BitsPerSample\")]\n   22 |     _bits_per_sample: Option<u32>,","lines":2},{"ref":"pdf/src/object/function.rs:261-271","code":"  261 |                             output: decode\n  262 |                                 .chunks_exact(2)\n  263 |                                 .map(|c| SampledFunctionOutput {\n  264 |                                     offset: c[0],\n  265 |                                     scale: (c[1] - c[0]) / 255.,\n  266 |                                 })\n  267 | ormed operand bytes can be silently swallowed, masking corruption.","fix":"Distinguish 'not an object' from 'malformed object' errors from parse_with_lexer so that genuine corruption is not silently treated as an unknown operator; only fall through to operator handling on a specific 'not an operand' error kind.","locations":[{"ref":"pdf/src/content.rs:241-271","code":"  241 |         loop {\n  242 |             let backup_pos = lexer.get_pos();\n  243 |             let obj = parse_with_lexer(&mut lexer, resolve, ParseFlags::ANY);\n  244 |             match obj {\n  245 |                 Ok(obj) => {\n  246 |                     // Operand\n  247 |                     buffer.push(obj)\n  248 |                 }\n  249 |                 Err(e) => {\n  250 |                     if e.is_eof() {\n  251 |                         break;\n  252 |                     }\n  253 |                     // It's not an object/operand - treat it as an operator.\n  254 |                     lexer.set_pos(backup_pos);\n  255 |                     let op = t!(lexer.next());\n  256 |                     let operator = t!(op.as_str(), op);\n  257 |                     match self.add(operator, buffer.drain(..), &mut lexer, resolve) {\n  258 |                         Ok(()) => {},\n  259 |                         Err(e) if resolve.options().allow_invalid_ops => {\n  260 |                             warn!(\"OP Err: {:?}\", e);\n  261 |                         },\n  262 |                         Err(e) => return Err(e),\n  263 |                     }\n  264 |                 }\n  265 |             }\n  266 |             match lexer.get_pos().cmp(&data.len()) {\n  267 |                 Ordering::Greater => err!(PdfError::ContentReadPastBoundary),\n  268 |                 Ordering::Less => (),\n  269 |                 Ordering::Equal => break\n  270 |             }\n  271 |         }","lines":31}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"serialize_ops fuses Op::Leading + Op::MoveTextPosition into a single `TD` operator only when `leading == -translation.x`, but the parser (OpBuilder::add, `TD` case) produces the pair as `Op::Leading { leading: -translation.y }`. Because the check uses translation.x instead of translation.y, the TD fusion almost never triggers and the operator pair is emitted separately (as TL + Td), so the parse->serialize round-trip does not reconstruct the original `TD`. For translations where x and y differ it is simply the wrong condition.","fix":"Compare against `-translation.y` (matching the `TD` parse which does `Op::Leading { leading: -translation.y }`) so the TD fusion round-trips correctly.","locations":[{"ref":"pdf/src/content.rs:414-419","code":"  414 |             \"Td\"  => push(Op::MoveTextPosition { translation: point(&mut args)? }),\n  415 |             \"TD\"  => {\n  416 |                 let translation = point(&mut args)?;\n  417 |                 push(Op::Leading { leading: -translation.y });\n  418 |                 push(Op::MoveTextPosition { translation });\n  419 |             }","lines":6},{"ref":"pdf/src/content.rs:691-699","code":"  691 |             Op::Leading { leading } => match ops[1..] {\n  692 |                 [Op::MoveTextPosition { translation }, ..] if leading == -translation.x => {\n  693 |                     writeln!(f, \"{} {} TD\", translation.x, translation.y)?;\n  694 |                     advance += 1;\n  695 |                 }\n  696 |                 _ => {\n  697 |                     writeln!(f, \"{} TL\", leading)?;\n  698 |                 }\n  699 |             }","lines":9}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In CryptMethod::V2 decrypt the final RC4 key is `&key[..(n + 5).min(16)]` where n is the file-key length. The MD5 output is always 16 bytes, but the PDF spec says the per-object key length is min(n+5, 16). For n=16 this gives 16 (fine), but for the common n<16 cases the slice n+5 may be correct; however the AESV2 branch uses `&key[..(n + 5).min(16)]` on a 16-byte MD5 output for an AES-128 cipher that REQUIRES a 16-byte key. When n+5 < 16 (n<11, e.g. 40-bit/5-byte key gives 10) AESV2 passes a too-short key to Aes128CbcDec::new_from_slices, which then errors as DecryptionFailure even though the input is valid AESV2 data.","fix":"For AESV2 the object key must be the full 16-byte MD5 digest; do not truncate to (n+5).min(16). Pass the entire 16-byte key to the AES cipher.","locations":[{"ref":"pdf/src/crypt.rs:585-608","code":"  585 |             CryptMethod::AESV2 => {\n  586 |                 // b)\n  587 |                 let mut key = [0; 32 + 5 + 4];\n  588 |                 let n = std::cmp::min(self.key_size, 16);\n  589 |                 key[..n].copy_from_slice(self.key());\n  590 |                 key[n..n + 3].copy_from_slice(&id.id.to_le_bytes()[..3]);\n  591 |                 key[n + 3..n + 5].copy_from_slice(&id.gen.to_le_bytes()[..2]);\n  592 |                 key[n + 5..n + 9].copy_from_slice(b\"sAlT\");\n  593 | \n  594 |                 // c)\n  595 |                 let key = *md5::compute(&key[..n + 9]);\n  596 | \n  597 |                 // d)\n  598 |                 let key = &key[..(n + 5).min(16)];\n  599 |                 if data.len() < 16 {\n  600 |                     return Err(PdfError::DecryptionFailure);\n  601 |                 }\n  602 |                 let (iv, ciphertext) = data.split_at_mut(16);\n  603 |                 let cipher =\n  604 |                     t!(Aes128CbcDec::new_from_slices(key, iv).map_err(|_| PdfError::DecryptionFailure));\n  605 |                 Ok(t!(cipher\n  606 |                     .decrypt_padded_mut::<Pkcs7>(ciphertext)\n  607 |                     .map_err(|_| PdfError::DecryptionFailure)))\n  608 |             }","lines":24}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"run_length_decode literal-run length is off by one in the copy count. For length < 128 the spec says copy length+1 bytes; the code computes `end = start + length + 1` which is correct, but the `else if length >= 129` / final `else break` structure means length == 128 (the EOD marker) is handled by the unreachable `else` branch only because 128 is neither <128 nor >=129. That is correct by luck, but the comment 'copy 2 - 128 times' with `257 - length` for length in 129..=255 yields 128..=2 copies (reversed range in comment) — minor. The real issue: there is no bound on total output size, so a crafted RLE stream can expand to a very large Vec without hitting object_size_limit.","fix":"Add a check_limits! against options.object_size_limit on buf growth (thread ParseOptions into run_length_decode), and fix the misleading 'copy 2 - 128 times' comment.","locations":[{"ref":"pdf/src/enc.rs:444-470","code":"  444 | pub fn run_length_decode(data: &[u8]) -> Result<Vec<u8>> {\n  445 |     // Used <http://benno.id.au/refs/PDFReference15_v5.pdf> as specification\n  446 |     let mut buf = Vec::new();\n  447 |     let d = data;\n  448 |     let mut c = 0;\n  449 | \n  450 |     while c < data.len() {\n  451 |         let length = d[c]; // length is first byte\n  452 |         if length < 128 {\n  453 |             let start = c + 1;\n  454 |             let end = start + length as usize + 1;\n  455 |             // copy _following_ length + 1 bytes literally\n  456 |             let source = d.get(start..end).ok_or(PdfError::RleError)?;\n  457 |             buf.extend_from_slice(source);\n  458 |             c = end; // move cursor to next run\n  459 |         } else if length >= 129 {\n  460 |             let copy = 257 - length as usize; // copy 2 - 128 times\n  461 |             let b = *d.get(c + 1).ok_or(PdfError::RleError)?; // copied byte\n  462 |             buf.extend(std::iter::repeat(b).take(copy));\n  463 |             c += 2; // move cursor to next run\n  464 |         } else {\n  465 |             break; // EOD\n  466 |         }\n  467 |     }\n  468 | \n  469 |     Ok(buf)\n  470 | }","lines":27}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Encoding::from_primitive Differences parsing does `gid += 1` (u32) after each Name. A maliciously long Differences array, or an initial Integer near u32::MAX followed by many names, will overflow gid in release builds (wrapping) / panic in debug. Codes are also not validated against any reasonable bound, so a single `Differences [4000000000 /a /b ...]` inflates the HashMap keys unpredictably.","fix":"Use checked/saturating increment for gid and bound the accepted code range (codes are byte-based, 0..=255 for simple encodings); bail on out-of-range integers.","locations":[{"ref":"pdf/src/encoding.rs:41-56","code":"   41 |                 let mut gid = 0;\n   42 |                 let mut differences = HashMap::new();\n   43 |                 if let Some(p) = dict.remove(\"Differences\") {\n   44 |                     for part in p.resolve(resolve)?.into_array()? {\n   45 |                         match part {\n   46 |                             Primitive::Integer(code) => {\n   47 |                                 gid = code as u32;\n   48 |                             }\n   49 |                             Primitive::Name(name) => {\n   50 |                                 differences.insert(gid, name);\n   51 |                                 gid += 1;\n   52 |                             }\n   53 |                             _ => bail!(\"Unknown part primitive in dictionary: {:?}\", part),\n   54 |                         }\n   55 |                     }\n   56 |                 }","lines":16}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"PdfError::from(TryFromIntError) discards the original error and collapses to PdfError::Invalid with no context. In decode paths (fax_decode columns/rows try_into, flate_decode try_into) a malformed integer becomes an opaque 'Invalid', losing the field that overflowed and making malformed-input diagnosis impossible.","fix":"Carry the source/message, e.g. map to PdfError::Other with a description including the attempted conversion, or add a dedicated variant.","locations":[{"ref":"pdf/src/error.rs:280-284","code":"  280 | impl From<TryFromIntError> for PdfError {\n  281 |     fn from(_e: TryFromIntError) -> PdfError {\n  282 |         PdfError::Invalid\n  283 |     }\n  284 | }","lines":5}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"write_entrys! macro in macros.rs: the optional arm `$key:tt ? << $val:expr $(,)*` matches `&Some(ref v)`/`&None` by taking a reference to $val. If $val is itself a temporary or a method call with side effects, it is evaluated once which is fine, but the macro provides no recursion (`$rest`) handling combined with the non-optional terminal arm ambiguity: a sequence mixing optional and required entries relies on macro arm ordering. The required terminal arm (line 13) and optional terminal arm (line 22) both can match a single trailing entry, and macro_rules picks the first matching arm, so `key ? << val` as the LAST entry without trailing tokens could be matched by the non-optional arm pattern `$key:tt << $val:expr` is avoided only because of the `?` token — verify, but the dual terminal/recursive arm design is fragile and undocumented.","fix":"Add doc comments and tests covering mixed optional/required entries in both terminal and non-terminal positions; consider a single recursive arm design with an explicit terminator to remove arm-ordering reliance.","locations":[{"ref":"pdf/src/macros.rs:12-37","code":"   12 | macro_rules! write_entrys {\n   13 |     ($out:expr, $key:tt << $val:expr $(,)*) => {\n   14 |         write_entry!($out, $key, $val);\n   15 |     };\n   16 |     ($out:expr, $key:tt << $val:expr, $($rest:tt)*) => {\n   17 |         {\n   18 |             write_entry!($out, $key, $val);\n   19 |             write_entrys!($out, $($rest)*);\n   20 |         }\n   21 |     };\n   22 |     ($out:expr, $key:tt ? << $val:expr $(,)*) => {\n   23 |         match &$val {\n   24 |             &Some(ref v) => write_entry!($out, $key, v),\n   25 |             &None => {}\n   26 |         }\n   27 |     };\n   28 |     ($out:expr, $key:tt ? << $val:expr, $($rest:tt)*) => {\n   29 |         {\n   30 |             match &$val {\n   31 |                 &Some(ref v) => write_entry!($out, $key, v),\n   32 |                 &None => {}\n   33 |             }\n   34 |             write_entrys!($out, $($rest)*);\n   35 |         }\n   36 |     }\n   37 | }","lines":26}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Stream::data (Generated branch) applies all entries of self.info.filters sequentially via decode(). Each decode() call enforces object_size_limit individually, but there is no cumulative limit across a chain of filters, and a long filter chain (filters Vec is built from untrusted /Filter array with no length cap in StreamInfo::from_primitive) can repeatedly inflate up to the limit per stage, amplifying CPU/memory cost. Combined with no cap on the number of filters, this is a decompression-amplification DoS vector.","fix":"Cap the number of filters in the chain and/or track cumulative decoded size against object_size_limit across the whole filter chain in data().","locations":[{"ref":"pdf/src/object/stream.rs:89-108","code":"   89 |     pub fn data(&self, resolve: &impl Resolve) -> Result<Arc<[u8]>> {\n   90 |         match self.inner_data {\n   91 |             StreamData::Generated(ref data) => {\n   92 |                 let filters = &self.info.filters;\n   93 |                 if filters.len() == 0 {\n   94 |                     Ok(data.clone())\n   95 |                 } else {\n   96 |                     use std::borrow::Cow;\n   97 |                     let mut data: Cow<[u8]> = (&**data).into();\n   98 |                     for filter in filters {\n   99 |                         data = t!(decode(&data, filter, resolve.options()), filter).into();\n  100 |                     }\n  101 |                     Ok(data.into())\n  102 |                 }\n  103 |             }\n  104 |             StreamData::Original(ref file_range, id) => {\n  105 |                 resolve.get_data_or_decode(id, file_range.clone(), &self.info.filters)\n  106 |             }\n  107 |         }\n  108 |     }","lines":20},{"ref":"pdf/src/object/stream.rs:309-325","code":"  309 |         let mut new_filters = Vec::new();\n  310 |         let mut new_file_filters = Vec::new();\n  311 | \n  312 |         for (i, filter) in filters.iter().enumerate() {\n  313 |             let params = match decode_params.get(i) {\n  314 |                 Some(Some(params)) => params.clone(),\n  315 |                 _ => Dictionary::default(),\n  316 |             };\n  317 |             new_filters.push(StreamFilter::from_kind_and_params(filter, params, resolve)?);\n  318 |         }\n  319 |         for (i, filter) in file_filters.iter().enumerate() {\n  320 |             let params = match file_decode_params.get(i) {\n  321 |                 Some(params) => params.clone(),\n  322 |                 None => Dictionary::default(),\n  323 |             };\n  324 |             new_file_filters.push(StreamFilter::from_kind_and_params(filter, params, resolve)?);\n  325 |         }","lines":17}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In `Dest::from_array` the `XYZ` `left` and `top` fields use `try_opt!(array.get(2))`/`get(3)` (mandatory, error if absent) while `zoom` uses `array.get(4)` with `None => 0.0`. Per PDF spec all three (left/top/zoom) may be null and the array may legitimately have null entries; the asymmetry means a destination array like `[page /XYZ null null null]` is fine but `[page /XYZ]` (omitting trailing nulls, seen in malformed files) errors on `left` while `zoom` would have tolerated absence. Inconsistent tolerance of short arrays.","fix":"Treat all three XYZ coordinates uniformly (use `array.get(n)` with `None`/`Null` => None), as the spec allows any of them to be null.","locations":[{"ref":"pdf/src/object/types/dest.rs:33-67","code":"   33 |             \"XYZ\" => DestView::XYZ {\n   34 |                 left: match *try_opt!(array.get(2)) {\n   35 |                     Primitive::Null => None,\n   36 |                     Primitive::Integer(n) => Some(n as f32),\n   37 |                     Primitive::Number(f) => Some(f),\n   38 |                     ref p => {\n   39 |                         return Err(PdfError::UnexpectedPrimitive {\n   40 |                             expected: \"Number | Integer | Null\",\n   41 |                             found: p.get_debug_name(),\n   42 |                         })\n   43 |                     }\n   44 |                 },\n   45 |                 top: match *try_opt!(array.get(3)) {\n   46 |                     Primitive::Null => None,\n   47 |                     Primitive::Integer(n) => Some(n as f32),\n   48 |                     Primitive::Number(f) => Some(f),\n   49 |                     ref p => {\n   50 |                         return Err(PdfError::UnexpectedPrimitive {\n   51 |                             expected: \"Number | Integer | Null\",\n   52 |                             found: p.get_debug_name(),\n   53 |                         })\n   54 |                     }\n   55 |                 },\n   56 |                 zoom: match array.get(4) {\n   57 |                     Some(Primitive::Null) => 0.0,\n   58 |                     Some(&Primitive::Integer(n)) => n as f32,\n   59 |                     Some(&Primitive::Number(f)) => f,\n   60 |                     Some(p) => {\n   61 |                         return Err(PdfError::UnexpectedPrimitive {\n   62 |                             expected: \"Number | Integer | Null\",\n   63 |                             found: p.get_debug_name(),\n   64 |                         })\n   65 |                     }\n   66 |                     None => 0.0,\n   67 |                 },","lines":35}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"seek_substr's matcher resets `matched` to 0 on any mismatching byte instead of backtracking, so overlapping prefixes are missed. E.g. searching for \"aab\" in \"aaab\" fails because after matching 'a','a' it sees another 'a', resets to 0, and never realigns. This yields false 'not found' results on adversarial input.","fix":"Use buf[start..].windows(substr.len()).position(|w| w == substr) (mirroring seek_substr_back) instead of the stateful matcher.","locations":[{"ref":"pdf/src/parser/lexer/mod.rs:286-301","code":"  286 |         loop {\n  287 |             if self.pos >= self.buf.len() {\n  288 |                 return None\n  289 |             }\n  290 |             if self.buf[self.pos] == substr[matched] {\n  291 |                 matched += 1;\n  292 |             } else {\n  293 |                 matched = 0;\n  294 |             }\n  295 |             if matched == substr.len() {\n  296 |                 break;\n  297 |             }\n  298 |             self.pos += 1;\n  299 |         }\n  300 |         self.pos += 1;\n  301 |         Some(self.new_substr(start..(self.pos - substr.len())))","lines":16}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Octal escape parsing in PDF string literals truncates silently and can mis-handle invalid escapes. char_code is u16 accumulated as char_code*8 + digit then cast `char_code as u8`, so \\541 yields 'a' (0x161 truncated) per the test — but the PDF spec says high-order overflow is ignored which matches; however the `_ =>` fallback after `self.back()?` will, for a backslash followed by a non-o ding_zeros()) as usize / 8 + (n == 0) as usize\n  178 | }","lines":3}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In impl_object_for_struct, a field marked `#[pdf(other)]` expands to `let #name = dict;` which MOVES `dict`. The fields are emitted in declaration order, so any field declared AFTER the `other` field will then call `dict.remove(...)` on a moved value and fail to compile. This ordering constraint is undocumented and fragile; all current call sites happen to put `other` last by convention.","fix":"Reorder generation so the `other` field is bound last regardless of declaration order (collect remaining-dict assignment after all removes), or emit a clear compile error if any keyed field follows an `other` field.","locations":[{"ref":"pdf_derive/src/lib.rs:623-627","code":"  623 |         if attrs.other {\n  624 |             return quote! {\n  625 |                 let #name = dict;\n  626 |             };\n  627 |         }","lines":5},{"ref":"pdf_derive/src/lib.rs:616-676","code":"  616 |     let let_parts = fields.iter().map(|field| {\n  617 | \n  618 |         let name = &field.ident;\n  619 |         let attrs = FieldAttrs::parse(&field.attrs);\n  620 |         if attrs.skip {\n  621 |             return quote! {}\n  622 |         }\n  623 |         if attrs.other {\n  624 |             return quote! {\n  625 |                 let #name = dict;\n  626 |             };\n  627 |         }\n  628 | \n  629 |         let key = attrs.key();\n  630 | \n  631 |         let ty = field.ty.clone();\n  632 |         if let Some(ref default) = attrs.default() {\n  633 |             quote! {\n  634 |                 let #name = {\n  635 |                     let primitive: Option<pdf::primitive::Primitive>\n  636 |                         = dict.remove(#key);\n  637 |                     let x: #ty = match primitive {\n  638 |                         Some(primitive) => <#ty as pdf::object::Object>::from_primit
