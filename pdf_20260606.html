g(string) => {\n  127 |                         let data: Vec<u8> = string.into_bytes().into();\n  128 |                         data.into()\n  129 |                     }\n  130 |                     Primitive::Stream(stream) => {\n  131 |                         let s: Stream::<()> = Stream::from_stream(stream, resolve)?;\n  132 |                         t!(s.data(resolve))\n  133 |                     },\n  134 |                     p => return Err(PdfError::UnexpectedPrimitive {\n  135 |                         expected: \"String or Stream\",\n  136 |                         found: p.get_debug_name()\n  137 |                     })\n  138 |                 };\n  139 |                 Ok(ColorSpace::Indexed(base, hival, lookup))","lines":22}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","description":"`StitchingFunction::apply` clamps `t` to `[d0.min(d1), d0.max(d1)]` but then computes `lo`/`hi` directly from `domain[0]`/`bounds`/`domain[1]` assuming an ascending domain. If `bounds` are not monotonically increasing or `domain[1] < domain[0]`, `(hi - lo)` can be negative/zero and the linear remap `e0 + (t-lo)*(e1-e0)/(hi-lo)` produces values outside `[e0,e1]`, which are then passed unclamped to the subfunction. Malformed `Bounds`/`Encode` arrays of mismatched length silently fall back to defaults via `get(...).unwrap_or`, masking the error.","fix":"Validate that `bounds` is sorted and lies within `domain`, and that `encode.len() == 2*functions.len()`; bail on inconsistency rather than silently defaulting.","locations":[{"ref":"pdf/src/object/function.rs:77-92","code":"   77 |         let d0 = self.domain.first().copied().unwrap_or(0.0);\n   78 |         let d1 = self.domain.get(1).copied().unwrap_or(1.0);\n   79 |         let t = x.first().copied().unwrap_or(0.0).clamp(d0.min(d1), d0.max(d1));\n   80 |         // With k functions there are k-1 bounds; the subinterval index is how\n   81 |         // many bounds `t` has reached n   24 |                     bail!(\"Error reading NameTree: 'Limits' is not of length 2\");\n   25 |                 }","lines":3},{"ref":"pdf/src/object/types/numbertree.rs:62-63","code":"   62 |             (None, None) => {\n   63 |                 warn!(\"Neither Kids nor Names present in NumberTree node.\");","lines":2}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","description":"Storage::scan() calls .unwrap() on backend.locate_xref_offset() and on backend.read(...). Both depend on parsing untrusted input (locate_xref_offset seeks 'startxref' and parses an integer; the read range start_offset..xref_offset can be reversed/out of bounds). A malformed file where xref_offset < start_offset or where 'startxref' is missing/garbage panics the iterator constructor.","fix":"Make scan() return a Result or have the iterator yield an initial Err item: propagate the errors from locate_xref_offset() and read() instead of unwrapping.","locations":[{"ref":"pdf/src/file.rs:211-214","code":"  211 |     pub fn scan(&self) -> impl Iterator<Item = Result<ScanItem>> + '_ {\n  212 |         let xref_offset = self.backend.locate_xref_offset().unwrap();\n  213 |         let slice = self.backend.read(self.start_offset .. xref_offset).unwrap();\n  214 |         let mut lexer = Lexer::with_offset(slice, 0);","lines":4}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In read_xref_table_and_trailer the Prev offset loop reads self.read(pos..) but unlike the first xref read it does not check pos >= self.len() before constructing the lexer (the first read at line 56 does). A Prev pointing exactly at/after EOF relies on read() returning an error, which it does, but the asymmetry means error messages and bounds handling differ between the initial and subsequent xref sections.","fix":"Apply the same `if pos >= self.len()` bounds check (and consistent error) el":"Incorrect Error Handling","severity":"medium","description":"StreamInfo::from_primitive parses /Length only to immediately discard it (`let _length = ...`). The value is required (errors with MissingEntry if absent) and must parse as usize, but it is never used to validate the stream body length. A malformed but present Length still forces a hard error on absence while a wildly wrong present Length is silently ignored, so the field provides neither validation nor useful behavior. This is misleading: the strict requirement (MissingEntry) gives the impression Length is enforced when it is not.","fix":"Either use the parsed Length to validate/bound the stream data range, or stop hard-failing on a missing Length (many malformed PDFs omit it) and treat it as optional; at minimum document why it is discarded.","locations":[{"ref":"pdf/src/object/stream.rs:284-286","code":"  284 |         let _length = usize::from_primitive(\n  285 |             dict.remove(\"Length\").ok_or(PdfError::MissingEntry{ typ: \"StreamInfo\", field: \"Length\".into() })?,\n  286 |             resolve)?;","lines":3}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"In _parse_with_lexer_ctx the array branch peeks for ']' but if the input ends without a closing bracket, lexer.peek() returns an empty substr (not ']'), parse_with_lexer_ctx recurses on EOF and errors — fine — but there is no max element/size limit on arrays or dictionaries. Combined with the recursion depth guard only decrementing per nesting level, a long flat array/dict of millions of small primitives from untrusted input causes unbounded Vec growth (memory exhaustion) with no cap.","fix":"Impose a sane upper bound on the number of array/dictionary entries (or total parsed primitives) and bail when exceeded, to bound memory on malformed input.","locations":[{"ref":"pdf/src/parser/mod.rs:218-236","code":"  218 |     } else if first_lexeme.equals(b\"[\") {\n  219 |         check(flags, ParseFlags::ARRAY)?;\n  220 |         if max_depth == 0 {\n  221 |             return Err(PdfError::MaxDepth);\n  222 |         }\n  223 |         let mut array = Vec::new();\n  224 |         // Array\n  225 |         loop {\n  226 |             // Exit if closing delimiter\n  227 |             if lexer.peek()?.equals(b\"]\") {\n  228 |                 break;\n  229 |             }\n  230 | \n  231 |             let element = t!(parse_with_lexer_ctx(lexer, r, ctx, ParseFlags::ANY, max_depth-1));\n  232 |             array.push(element);\n  233 |         }\n  234 |         t!(lexer.next()); // Move beyond closing delimiter\n  235 | \n  236 |         Primitive::Array (array)","lines":19},{"ref":"pdf/src/parser/mod.rs:74-90","code":"   74 | fn parse_dictionary_object(lexer: &mut Lexer, r: &impl Resolve, ctx: Option<&Context>, max_depth: usize) -> Result<Dictionary> {\n   75 |     let mut dict = Dictionary::default();\n   76 |     loop {\n   77 |         // Expect a Name (and Object) or the '>>' delimiter\n   78 |         let token = t!(lexer.next());\n   79 |         if token.starts_with(b\"/\") {\n   80 |             let key = token.reslice(1..).to_name()?;\n   81 |             let obj = t!(parse_with_lexer_ctx(lexer, r, ctx, ParseFlags::ANY, max_depth));\n   82 |             dict.insert(key, obj);\n   83 |         } else if token.equals(b\">>\") {\n   84 |             break;\n   85 |         } else {\n   86 |             err!(PdfError::UnexpectedLexeme{ pos: lexer.get_pos(), lexeme: token.to_string(), expected: \"/ or >>\"});\n   87 |         }\n   88 |     }\n   89 |     Ok(dict)\n   90 | }","lines":17}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"The no-default read branch swallows the real error when a key is absent. If the key is missing, it tries `from_primitive(Primitive::Null)`; on failure it discards the error `Err(_)` and reports MissingEntry. But this path is also taken when the key IS present and parsing returns... no: only the None arm. Still, the discarded `Err(_)` from the Null attempt hides genuine reasons (e.g. a custom type's Null handler failing for an unrelated reason), making debugging required-field failures harder.","fix":"Preserve the underlying error (wrap it as the source of MissingEntry, or only use the Null fallback for known-optional types) instead of `Err(_)`.","locations":[{"ref":"pdf_derive/src/lib.rs:662-669","code":"  662 |                         None =>  // Try to construct T from Primitive::Null\n  663 |                             match <#ty as pdf::object::Object>::from_primitive(pdf::primitive::Primitive::Null, resolve) {\n  664 |                                 Ok(obj) => obj,\n  665 |                                 Err(_) => return Err(pdf::error::PdfError::MissingEntry {\n  666 |                                     typ: #typ,\n  667 |                                     field: String::from(stringify!(#name)),\n  668 |                                 })\n  669 |                             },","lines":8}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In OpBuilder::add the `SC`/`SCN` and `sc`/`scn` operators collect all remaining args into Color::Other without any validation or limit. A content stream that pushes a huge number of operands before one of these operators causes an unbounded Vec collect; combined with the operand buffer in parse() this allows memory amplification from a small input.","fix":"Cap the number of collected color operands (color spaces have <= a handful of components) and bail/truncate beyond a sane limit.","locations":[{"ref":"pdf/src/content.rs:405-410","code":"  405 |             \"SC\" | \"SCN\" => {\n  406 |                 push(Op::StrokeColor { color: Color::Other(args.collect()) });\n  407 |             }\n  408 |             \"sc\" | \"scn\" => {\n  409 |                 push(Op::FillColor { color: Color::Other(args.collect()) });\n  410 |             }","lines":6}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"read_limited reports `requested: data.len() + 1` when the decompressed output exceeds the limit, but more than one byte may remain unread; the reported size understates the true requested size and is misleading for diagnostics and any caller deciding how much to allocate.","fix":"Report the configured limit (or limit+1) rather than data.len()+1, or read the remaining length to give an accurate figure.","locations":[{"ref":"pdf/src/enc.rs:259-266","code":"  259 | fn read_limited(mut reader: impl Read, limit: usize) -> Result<Vec<u8>> {\n  260 |     let mut data = vec![];\n  261 |     reader.by_ref().take(limit as u64).read_to_end(&mut data)?;\n  262 |     if reader.bytes().next().is_some() {\n  263 |         return Err(PdfError::LimitsExeeded { requested: data.len() + 1 });\n  264 |     }\n  265 |     Ok(data)\n  266 | }","lines":8}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"ctx! macro references `$crate::PdfError::TryContext`, but no TryContext variant exists in the PdfError enum (only Try). Any use of ctx! will fail to compile. It is currently unused, but it is exported (#[macro_export]) so external/internal callers enabling it hit a missing-variant error.","fix":"Change TryContext to the existing Try variant (matching its fields), or add a TryContext variant; remove the macro if unused.","locations":[{"ref":"pdf/src/error.rs:322-333","code":"  322 | #[macro_export]\n  323 | macro_rules! ctx {\n  324 |     ($e:expr, $($c:expr),*) => {\n  325 |         match $e {\n  326 |             Ok(v) => Ok(v),\n  327 |             Err(e) => {\n  328 |                 let context = $crate::error::Context(vec![ $( (stringify!($c), format!(\"{:?}\", $c) ) ),* ]);\n  329 |                 Err($crate::PdfError::TryContext { file: file!(), line: line!(), column: column!(), context, source: e.into() })\n  330 |             }\n  331 |         }\n  332 |     };\n  333 | }","lines":12}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"load_storage_and_trailer_password uses .get(0) on the ID array and .as_string(), but the surrounding logic only runs when Encrypt is present. The decoder unwraps via self.decoder.as_mut().unwrap() at lines 199 and 205 immediately after assigning Some; correct today but fragile: any future early-return between the assignment and the unwraps would panic. Minor maintainability/robustness concern.","fix":"Bind the decoder to a local mutable variable and mutate that, then store it once, avoiding repeated as_mut().unwrap().","locations":[{"ref":"pdf/src/file.rs:197-206","code":"  197 |             self.decoder = Some(t!(Decoder::from_password(&dict, key, password)));\n  198 |             if let Primitive::Reference(reference) = crypt {\n  199 |                 self.decoder.as_mut().unwrap().encrypt_indirect_object = Some(*reference);\n  200 |             }\n  201 |             if let Some(Primitive::Reference(catalog_ref)) = trailer.get(\"Root\") {\n  202 |                 let resolver = StorageResolver::new(self);\n  203 |                 let catalog = t!(t!(resolver.resolve(*catalog_ref)).resolve(&resolver)?.into_dictionary());\n  204 |                 if let Some(Primitive::Reference(metadata_ref)) = catalog.get(\"Metadata\") {\n  205 |                     self.decoder.as_mut().unwrap().metadata_indirect_object = Some(*metadata_ref);\n  206 |                 }","lines":10}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"parse_cid uses `b.try_into().unwrap()` on the 2-byte branch. It is logically safe because len==2 is matched first, but the unwrap is a latent panic if the match arms are ever reordered/edited; safer to construct the array explicitly.","fix":"Build the u16 as `u16::from_be_bytes([b[0], b[1]])` directly inside the `2 =>` arm without try_into/unwrap.","locations":[{"ref":"pdf/src/font.rs:608-615","code":"  608 | fn parse_cid(s: &PdfString) -> Result<u16> {\n  609 |     let b = s.as_bytes();\n  610 |     match b.len() {\n  611 |         2 => Ok(u16::from_be_bytes(b.try_into().unwrap())),\n  612 |         1 => Ok(b[0] as u16),\n  613 |         _ => Err(PdfError::CidDecode),\n  614 |     }\n  615 | }","lines":8}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`ColorSpace::to_primitive` calls `dbg!(p)` then `unimplemented!()` for any unsupported colorspace variant (DeviceN, Separation, Icc, CalGray/RGB/CMYK, Pattern, Named, Other). Serializing a document containing one of these colorspaces dumps it to stderr and panics.","fix":"Return an `Err` for unsupported variants and drop the `dbg!`; ideally implement the remaining variants.","locations":[{"ref":"pdf/src/object/color.rs:237-241","code":"  237 |             ref p => {\n  238 |                 dbg!(p);\n  239 |                 unimplemented!()\n  240 |             }\n  241 |         }","lines":5}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Merged::from_dict discards the underlying parse errors of both A and B via `.ok()`. When both A and B fail to parse from the dict, the result is Merged { a: None, b: None } (Ok), silently swallowing all error context. For untrusted input this hides genuine corruption and makes debugging malformed PDFs impossible.","fix":"If both A and B fail, return an error (or at least log the discarded errors) rather than producing an empty Merged value.","locations":[{"ref":"pdf/src/object/mod.rs:1042-1048","code":" 1042 | impl<A: FromDict, B: FromDict> FromDict for Merged<A, B> {\n 1043 |     fn from_dict(dict: Dictionary, resolve: &impl Resolve) -> Result<Self> {\n 1044 |         let a = A::from_dict(dict.clone(), resolve).ok();\n 1045 |         let b = B::from_dict(dict, resolve).ok();\n 1046 |         Ok(Merged { a, b })\n 1047 |     }\n 1048 | }","lines":7}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"parse_stream_object accepts Length given as a Reference by resolving it with resolve_flags, but in parse_stream_with_lexer the dictionary is parsed with ctx=None and the stream Context is built with decoder:None; there is no validation that the resolved Length is within the remaining buffer beyond the read_n length-equality check. A Length reference resolving to a huge value triggers read_n(huge) which (see read_n finding) can overflow pos. The two stream-parsing entry points (parse_stream_object vs parse_stream_with_lexer) also duplicate dictionary/stream logic.","fix":"Clamp/validate length against remaining buffer before read_n; consolidate the two stream parsing paths to avoid divergent handling.","locations":[{"ref":"pdf/src/parser/mod.rs:92-118","code":"   92 | fn parse_stream_object(dict: Dictionary, lexer: &mut Lexer, r: &impl Resolve, ctx: &Context) -> Result<PdfStream> {\n   93 |     t!(lexer.next_stream());\n   94 | \n   95 |     let length = match dict.get(\"Length\") {\n   96 |         Some(&Primitive::Integer(n)) if n >= 0 => n as usize,\n   97 |         Some(&Primitive::Reference(reference)) => t!(t!(r.resolve_flags(reference, ParseFlags::INTEGER, 1)).as_usize()),\n   98 |         Some(other) => err!(PdfError::UnexpectedPrimitive { expected: \"unsigned Integer or Reference\", found: other.get_debug_name() }),\n   99 |         None => err!(PdfError::MissingEntry { typ: \"<Stream>\", field: \"Length\".into() }),\n  100 |     };\n  101 | \n  102 |     let stream_substr = lexer.read_n(length);\n  103 | \n  104 |     if stream_substr.len() != length {\n  105 |         err!(PdfError::EOF)\n  106 |     }\n  107 | \n  108 |     // Finish\n  109 |     t!(lexer.next_expect(\"endstream\"));\n  110 | \n  111 |     Ok(PdfStream {\n  112 |         inner: StreamInner::InFile {\n  113 |             id: ctx.id,\n  114 |             file_range: stream_substr.file_range(),\n  115 |         },\n  116 |         info: dict,\n  117 |     })\n  118 | }","lines":27},{"ref":"pdf/src/parser/mod.rs:298-318","code":"  298 | fn parse_stream_with_lexer(lexer: &mut Lexer, r: &impl Resolve, ctx: &Context) -> Result<PdfStream> {\n  299 |     let first_lexeme = t!(lexer.next());\n  300 | \n  301 |     let obj = if first_lexeme.equals(b\"<<\") {\n  302 |         let dict = t!(parse_dictionary_object(lexer, r, None, MAX_DEPTH));\n  303 |         // It might just be the dictionary in front of a stream.\n  304 |         if t!(lexer.peek()).equals(b\"stream\") {\n  305 |             let ctx = Context {\n  306 |                 decoder: None,\n  307 |                 id: ctx.id\n  308 |             };\n  309 |             t!(parse_stream_object(dict, lexer, r, &ctx))\n  310 |         } else {\n  311 |             err!(PdfError::UnexpectedPrimitive { expected: \"Stream\", found: \"Dictionary\" });\n  312 |         }\n  313 |     } else {\n  314 |         err!(PdfError::UnexpectedPrimitive { expected: \"Stream\", found: \"something else\" });\n  315 |     };\n  316 | \n  317 |     Ok(obj)\n  318 | }","lines":21}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Several attribute parsers use `value.parse()?` to read a LitStr but do not validate the literal kind, while elsewhere the code does explicitly match Lit::Str and panic on the wrong kind (lines 244, 267). The inconsistency means `key`, `default`, `is_default`, `name` accept any token that parses as the target type, and the error reporting style (panic vs ?-propagated syn error vs .expect(\"parse error\")) is mixed across the three attribute keys, producing inconsistent diagnostics.","fix":"Standardize on returning syn::Result errors with spans for all attribute parsing and remove the `.expect(\"parse error\")` / panic! kind-mismatch handlers in favor of meta.error(...).","locations":[{"ref":"pdf_derive/src/lib.rs:162-208","code":"  162 |     fn parse(list: &[Attribute]) -> FieldAttrs {\n  163 |         let mut attrs = FieldAttrs::new();\n  164 |         for attr in list.iter().filter(|attr| attr.path().is_ident(\"pdf\")) {\n  165 |             attr.parse_nested_meta(|meta| {\n  166 |                 if meta.path.is_ident(\"key\") {\n  167 |                     let value = meta.value()?;\n  168 |                     attrs.key = Some(value.parse()?);\n  169 |                     return Ok(());\n  170 |                 }\n  171 | \n  172 |                 if meta.path.is_ident(\"default\") {\n  173 |                     let value = meta.value()?;\n  174 |                     attrs.default = Some(value.parse()?);\n  175 |                     return Ok(());\n  176 |                 }\n  177 | \n  178 |                 if meta.path.is_ident(\"is_default\") {\n  179 |                     let value = meta.value()?;\n  180 |                     attrs.is_default = Some(value.parse()?);\n  181 |                     return Ok(());\n  182 |                 }\n  183 | \n  184 |                 if meta.path.is_ident(\"name\") {\n  185 |                     let value = meta.value()?;\n  186 |                     attrs.name = Some(value.parse()?);\n  187 |                     return Ok(());\n  188 |                 }\n  189 | \n  190 |                 if meta.path.is_ident(\"skip\") {\n  191 |                     attrs.skip = true;\n  192 |                     return Ok(());\n  193 |                 }\n  194 | \n  195 |                 if meta.path.is_ident(\"other\") {\n  196 |                     attrs.other = true;\n  197 |                     return Ok(());\n  198 |                 }\n  199 | \n  200 |                 if meta.path.is_ident(\"indirect\") {\n  201 |                     attrs.indirect = true;\n  202 |                     return Ok(());\n  203 |                 }\n  204 | \n  205 |                 Err(meta.error(\"unsupported key\"))\n  206 |             })\n  207 |             .expect(\"parse error\");\n  208 |         }","lines":47},{"ref":"pdf_derive/src/lib.rs:229-274","code":"  229 |             attr.parse_nested_meta(|meta| {\n  230 |                 if meta.path.is_ident(\"Type\") {\n  231 |                     let value = meta.value()?;\n  232 |                     let lit = value.parse()?;\n  233 |                     match lit {\n  234 |                         Lit::Str(ref value) => {\n  235 |                             let mut value = value.value();\n  236 |                             attrs.type_required = if value.ends_with('?') {\n  237 |                                 value.pop(); // remove '?'\n  238 |                                 false\n  239 |                             } else {\n  240 |                                 true\n  241 |                             };\n  242 |                             attrs.type_name = Some(value);\n  243 |                         }\n  244 |                         _ => panic!(\"Value of 'Type' attribute must be a String.\"),\n  245 |                     };\n  246 |                     return Ok(());\n  247 |                 }\n  248 | \n  249 |                 if meta.path.is_ident(\"is_stream\") {\n  250 |                     attrs.is_stream = true;\n  251 |                     return Ok(());\n  252 |                 }\n  253 | \n  254 |                 if let Ok(value) = meta.value() {\n  255 |                     let path = &meta.path;\n  256 |                     let lit = value.parse()?;\n  257 |                     match lit {\n  258 |                         Lit::Str(ref value) => {\n  259 |                             let segments = path\n  260 |                                 .segments\n  261 |                                 .iter()\n  262 |                                 .map(|s| s.ident.to_string())\n  263 |                                 .collect::<Vec<String>>()\n  264 |                                 .join(\"::\");\n  265 |                             attrs.checks.push((segments, value.value()));\n  266 |                         }\n  267 |                         _ => panic!(\"Other checks must have RHS String.\"),\n  268 |                     };\n  269 |                     return Ok(());\n  270 |                 }\n  271 | \n  272 |                 Ok(())\n  273 |             })\n  274 |             .expect(\"error with global attrs parsing\");","lines":46}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"Owner-password fallback uses key[..key_size] at line 367 while the user-password check at line 343 uses key[..min(key_size,16)]. If key_size > 16, line 367 indexes beyond the meaningful 16 derived bytes (into zero padding) and also differs from the first check, an inconsistency that can both pass a wrong password and, combined with the zero-padding bug above, derive a corrupt key.","fix":"Use the same min(key_size,16) slice for both password checks, and clamp key_size consistently.","locations":[{"ref":"pdf/src/crypt.rs:343-372","code":"  343 |             if check_password_rc4(level, dict.u.as_bytes(), id, &key[..std::cmp::min(key_size, 16)]) {\n  344 |                 let decoder = Decoder::new(key, key_size, method, dict.encrypt_metadata)?;\n  345 |                 Ok(decoder)\n  346 |             } else {\n  347 |                 let password_wrap_key = key_derivation_owner_password_rc4(level, key_size, pass)?;\n  348 |                 let mut data = dict.o.as_bytes().to_vec();\n  349 |                 let rounds = if level == 2 { 1u8 } else { 20u8 };\n  350 |                 for round in 0..rounds {\n  351 |                     let mut round_key = password_wrap_key.clone();\n  352 |                     for byte in round_key.iter_mut() {\n  353 |                         *byte ^= round;\n  354 |                     }\n  355 |                     Rc4::encrypt(&round_key, &mut data);\n  356 |                 }\n  357 |                 let unwrapped_user_password = data;\n  358 | \n  359 |                 let key = key_derivation_user_password_rc4(\n  360 |                     level,\n  361 |                     key_size,\n  362 |                     dict,\n  363 |                     id,\n  364 |                     &unwrapped_user_password,\n  365 |                 );\n  366 | \n  367 |                 if check_password_rc4(level, dict.u.as_bytes(), id, &key[..key_size]) {\n  368 |                     let decoder = Decoder::new(key, key_size, method, dict.encrypt_metadata)?;\n  369 |                     Ok(decoder)\n  370 |                 } else {\n  371 |                     Err(PdfError::InvalidPassword)\n  372 |                 }","lines":30}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"Decoder's Debug impl prints the decryption key via `.field(\"key\", &self.key())`. Logging a Decoder (e.g. in error context which uses {:?}) leaks the file encryption key into logs.","fix":"Redact the key in Debug (print only its length or a placeholder).","locations":[{"ref":"pdf/src/crypt.rs:623-630","code":"  623 | impl fmt::Debug for Decoder {\n  624 |     fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {\n  625 |         f.debug_struct(\"Decoder\")\n  626 |             .field(\"key\", &self.key())\n  627 |             .field(\"method\", &self.method)\n  628 |             .finish()\n  629 |     }\n  630 | }","lines":8}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"Name (#xx) hex unescaping is O(n^2) and re-scans/re-copies on every '#'. For each '#' found it does `rest[..idx]` extend, then `rest = &rest[idx+3..]`, then searches rest again from the start, and finally extends the tail again. A name with many '#' escapes causes repeated re-scanning. The bounds via get(idx+1..idx+3) are safe but idx is reported as the error pos relative to the shrinking `rest`, not the original lexeme, so HexDecode pos is misleading.","fix":"Iterate over the bytes once with a single cursor, decoding '#xx' in place into the output buffer; track an absolute offset for accurate error positions.","locations":[{"ref":"pdf/src/parser/mod.rs:196-215","code":"  196 |         let mut rest: &[u8] = &first_lexeme.reslice(1..);\n  197 |         let s = if rest.contains(&b'#') {\n  198 |             let mut s = IBytes::new();\n  199 |             while let Some(idx) = rest.iter().position(|&b| b == b'#') {\n  200 |                 use crate::enc::decode_nibble;\n  201 |                 use std::convert::TryInto;\n  202 |                 let [hi, lo]: [u8; 2] = rest.get(idx+1 .. idx+3).ok_or(PdfError::EOF)?.try_into().unwrap();\n  203 |                 let byte = match (decode_nibble(lo), decode_nibble(hi)) {\n  204 |                     (Some(low), Some(high)) => low | high << 4,\n  205 |                     _ => return Err(PdfError::HexDecode { pos: idx, bytes: [hi, lo] }),\n  206 |                 };\n  207 |                 s.extend_from_slice(&rest[..idx]);\n  208 |                 s.push(byte);\n  209 |                 rest = &rest[idx+3..];\n  210 |             }\n  211 |             s.extend_from_slice(rest);\n  212 |             SmallBytes::from(s.as_slice())\n  213 |         } else {\n  214 |             SmallBytes::from(rest)\n  215 |         };","lines":20}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","description":"XRefTable::new does Vec::with_capacity(num_objects) then resize(num_objects, Invalid). num_objects derives from the trailer Size (only bounded by MAX_ID = 1_000_000 in the file.rs caller, but XRefTable::new is public and unbounded). A crafted Size near i32::MAX passed through any other caller eagerly allocates gigabytes. Also with_capacity then resize is redundant: resize alone reserves.","fix":"Cap num_objects defensively inside new() (or take a checked size), and drop the redundant with_capacity since resize already grows the vec.","locations":[{"ref":"pdf/src/xref.rs:55-63","code":"   55 | impl XRefTable {\n   56 |     pub fn new(num_objects: ObjNr) -> XRefTable {\n   57 |         let mut entries = Vec::with_capacity(num_objects as usize);\n   58 |         entries.push(XRef::Free { next_obj_nr: 0, gen_nr: 0xffff });\n   59 |         entries.resize(num_objects as usize, XRef::Invalid);\n   60 |         XRefTable {\n   61 |             entries,\n   62 |         }\n   63 |     }","lines":9}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"Content::operations concatenates every content-stream part into a single Vec via extend_from_slice on each part's decoded data, copying all bytes. For documents with many large content streams this doubles peak memory unnecessarily; the parser could be driven part-by-part or over a chained reader.","fix":"Consider parsing each part incrementally or using a reader that chains the parts to avoid the full concatenation copy, or at least pre-reserve the total length.","locations":[{"ref":"pdf/src/content.rs:24-30","code":"   24 |     pub fn operations(&self, resolve: &impl Resolve) -> Result<Vec<Op>> {\n   25 |         let mut data = vec![];\n   26 |         for part in self.parts.iter() {\n   27 |             data.extend_from_slice(&t!(part.data(resolve)));\n   28 |         }\n   29 |         parse_ops(&data, resolve)\n   30 |     }","lines":7}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"revision_6_kdf allocates a fixed `[0u8; (128 + 64 + 48) * 64]` = ~15 KiB stack array on every call and rebuilds it inside the loop via copy_within for j in 1..64. This is run per password attempt; for the (rare) revision-6 path it is acceptable but the large stack array risks stack pressure and the inner copy loop is O(64 * data_repeat_len) per iteration over up to ~64+ iterations.","fix":"Consider heap-allocating a right-sized buffer (password.len()+block_size+u.len())*64 once and reusing it, rather than a worst-case stack array.","locations":[{"ref":"pdf/src/crypt.rs:485-543","code":"  485 |     fn revision_6_kdf(password: &[u8], salt: &[u8], u: &[u8]) -> [u8; 32] {\n  486 |         let mut data = [0u8; (128 + 64 + 48) * 64];\n  487 |         let mut data_total_len = 0;\n  488 | \n  489 |         let mut sha256 = Sha256::new();\n  490 |         let mut sha384 = Sha384::new();\n  491 |         let mut sha512 = Sha512::new();\n  492 | \n  493 |         let mut input_sha256 = Sha256::new();\n  494 |         input_sha256.update(password);\n  495 |         input_sha256.update(salt);\n  496 |         input_sha256.update(u);\n  497 |         let input = input_sha256.finalize();\n  498 |         let (mut key, mut iv) = input.split();\n  499 | \n  500 |         let mut block = [0u8; 64];\n  501 |         let mut block_size = 32;\n  502 |         (block[..block_size]).copy_from_slice(&input[..block_size]);\n  503 | \n  504 |         let mut i = 0;\n  505 |         while i < 64 || i < data[data_total_len - 1] as usize + 32 {\n  506 |             let aes = Aes128CbcEnc::new(&key, &iv);\n  507 |             let data_repeat_len = password.len() + block_size + u.len();\n  508 |             data[..password.len()].copy_from_slice(password);\n  509 |             data[password.len()..password.len() + block_size].copy_from_slice(&block[..block_size]);\n  510 |             data[password.len() + block_size..data_repeat_len].copy_from_slice(u);\n  511 |             for j in 1..64 {\n  512 |                 data.copy_within(..data_repeat_len, j * data_repeat_len);\n  513 |             }\n  514 |             data_total_len = data_repeat_len * 64;\n  515 | \n  516 |             // The plaintext length will always be a multiple of the block size, unwrap is okay\n  517 |             let encrypted = aes\n  518 |                 .encrypt_padded_mut::<NoPadding>(&mut data[..data_total_len], data_total_len)\n  519 |                 .unwrap();\n  520 | \n  521 |             let sum: usize = encrypted[..16].iter().map(|byte| *byte as usize).sum();\n  522 |             block_size = sum % 3 * 16 + 32;\n  523 |             match block_size {\n  524 |                 32 => {\n  525 |                     sha256.update(encrypted);\n  526 |                     (block[..block_size]).copy_from_slice(&sha256.finalize_reset());\n  527 |                 }\n  528 |                 48 => {\n  529 |                     sha384.update(encrypted);\n  530 |                     (block[..block_size]).copy_from_slice(&sha384.finalize_reset());\n  531 |                 }\n  532 |                 64 => {\n  533 |                     sha512.update(encrypted);\n  534 |                     (block[..block_size]).copy_from_slice(&sha512.finalize_reset());\n  535 |                 }\n  536 |                 _ => unreachable!(),\n  537 |             }\n  538 | \n  539 |             key.copy_from_slice(&block[..16]);\n  540 |             iv.copy_from_slice(&block[16..32]);\n  541 | \n  542 |             i += 1;\n  543 |         }","lines":59}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"Backend::locate_start_offset scans up to 1024 bytes with windows(5).position; fine. But Backend::read_xref_table_and_trailer's Prev loop uses a Vec `seen` with seen.contains() for loop detection, an O(n^2) scan over visited offsets. For a file with many incremental updates this is quadratic.","fix":"Use a HashSet<usize> for seen offsets to make loop detection O(1) per iteration.","locations":[{"ref":"pdf/src/file.rs:83-107","code":"   83 |     changes:    HashMap<ObjNr, (&'static str, Primitive, GenNr)>,\n   84 |     promises:   HashMap<ObjNr, &'static str>,\n   85 | \n   86 |     refs:       XRefTable,\n <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-06-06 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
