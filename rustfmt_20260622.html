<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In `CommentCodeSlices::next`, `&subslice[..2]` slices the first two bytes of the remaining slice unconditionally. `subslice` is only guaranteed non-empty (the `last_slice_end == slice.len()` early-return at line 1660). When the remaining code slice is a single byte (e.g. trailing `;`) or begins with a multi-byte UTF-8 character (e.g. a `Normal` slice that starts at a non-ASCII char such as `é` or an emoji), the index `2` is past the end or falls inside a char, and the slice panics with an out-of-bounds / not-a-char-boundary error. The `&&` chain evaluates `&subslice[..2]` whenever `last_slice_kind == CodeCharKind::Normal`, which happens on every code-to-comment transition. This iterator is driven over arbitrary source text in `write_snippet_inner`.","fix":"Guard the slice with a byte/boundary-safe check, e.g. `subslice.starts_with(\"//\")` instead of `&subslice[..2] == \"//\"`, which never panics regardless of length or char boundaries.","locations":[{"ref":"src/comment.rs:1669-1672","code":" 1669 |         for (kind, (i, c)) in &mut iter {\n 1670 |             let is_comment_connector = self.last_slice_kind == CodeCharKind::Normal\n 1671 |                 && &subslice[..2] == \"//\"\n 1672 |                 && [' ', '\\t'].contains(&c);","lines":4,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/comment.rs#L1669-L1672"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`FileName::from` for `rustc_span::FileName` uses `unreachable!()` for any variant other than `Real`/`Custom(\"stdin\")`. rustc has other `FileName` variants (e.g. `Custom` with a non-stdin name, `Anon`, `MacroExpansion`, `ProcMacroSourceCode`, `DocTest`, etc.). If such a span ever reaches this conversion (e.g. when formatting code that involves macro-expanded or synthetic spans while `--file-lines` matching is active), rustfmt panics instead of degrading gracefully.","fix":"Replace the `unreachable!()` arms with a graceful fallback (return a sentinel `FileName` or propagate an error) rather than panicking on unexpected rustc FileName variants.","locations":[{"ref":"src/config/file_lines.rs:28-43","code":"   28 | impl From<rustc_span::FileName> for FileName {\n   29 |     fn from(name: rustc_span::FileName) -> FileName {\n   30 |         match name {\n   31 |             rustc_span::FileName::Real(real) => {\n   32 |                 if let Some(p) = real.into_local_path() {\n   33 |                     FileName::Real(p)\n   34 |                 } else {\n   35 |                     // rustfmt does not remap filenames; the local path should always\n   36 |                     // remain accessible.\n   37 |                     unreachable!()\n   38 |                 }\n   39 |             }\n   40 |             rustc_span::FileName::Custom(ref f) if f == \"stdin\" => FileName::Stdin,\n   41 |             _ => unreachable!(),\n   42 |         }\n   43 |     }","lines":16,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/file_lines.rs#L28-L43"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`snippet.find_uncommented(\"{\").unwrap()` panics if no uncommented `{` is found in the foreign-mod / extern block snippet. While well-formed input always contains a brace, rustfmt is run on user code that may be malformed or have spans that do not line up after macro expansion; a panic here aborts formatting of the whole file.","fix":"Propagate the error instead of unwrapping, e.g. handle the `None` case by returning/keeping the original snippet rather than panicking.","locations":[{"ref":"src/items.rs:376","code":"  376 |         let brace_pos = snippet.find_uncommented(\"{\").unwrap();","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/items.rs#L376"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`enum_snippet.find_uncommented(\"{\").unwrap()` panics if the enum span snippet contains no uncommented opening brace. `visit_enum` returns `()`, so there is no error path; a malformed/odd span aborts formatting of the entire file rather than gracefully leaving the item unformatted.","fix":"Guard the `None` case (bail out and emit the original text) instead of unwrapping.","locations":[{"ref":"src/items.rs:545","code":"  545 |         let brace_pos = enum_snippet.find_uncommented(\"{\").unwrap();","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/items.rs#L545"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`format_generics(...).unwrap()` in `visit_enum` will panic if `format_generics` returns `None` (it returns `Option<String>` and can fail, e.g. when budgets go to zero via `rewrite_generics(...).ok()?` or `rewrite_where_clause(...).ok()?`). Unlike most call sites that propagate failure, this one unwraps.","fix":"Handle the `None` case by falling back to the original snippet via `push_rewrite`, mirroring how other visit_* methods recover, instead of `.unwrap()`.","locations":[{"ref":"src/items.rs:547-561","code":"  547 |         let generics_str = format_generics(\n  548 |             &self.get_context(),\n  549 |             generics,\n  550 |             self.config.brace_style(),\n  551 |             if enum_def.variants.is_empty() {\n  552 |                 BracePos::ForceSameLine\n  553 |             } else {\n  554 |                 BracePos::Auto\n  555 |             },\n  556 |             self.block_indent,\n  557 |             // make a span that starts right after `enum Foo`\n  558 |             mk_sp(ident.span.hi(), body_start),\n  559 |             last_line_width(&enum_header),\n  560 |         )\n  561 |         .unwrap();","lines":15,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/items.rs#L547-L561"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`is_short_pattern_inner` indexes into a closed set of expr kinds with `unreachable!()` arms for any `ExprKind` other than `Lit`, `Unary(Neg, Lit)`, `ConstBlock`, and `Path`. This relies on the parser only ever producing those expression kinds inside `PatKind::Expr`. New/edge expression kinds reachable in pattern position (e.g. macro-expanded const expressions, or a future parser change) would cause a hard panic in the formatter instead of a graceful fall-through. A formatter should never panic on valid parseable input.","fix":"Replace the inner `unreachable!()` arms with `_ => false` (treat unknown expression kinds as non-short) so the formatter degrades gracefully rather than aborting.","locations":[{"ref":"src/patterns.rs:51-61","code":"   51 |         ast::PatKind::Expr(expr) => match &expr.kind {\n   52 |             ast::ExprKind::Lit(_) => true,\n   53 |             ast::ExprKind::Unary(ast::UnOp::Neg, expr) => match &expr.kind {\n   54 |                 ast::ExprKind::Lit(_) => true,\n   55 |                 _ => unreachable!(),\n   56 |             },\n   57 |             ast::ExprKind::ConstBlock(_) | ast::ExprKind::Path(..) => {\n   58 |                 context.config.style_edition() <= StyleEdition::Edition2024\n   59 |             }\n   60 |             _ => unreachable!(),\n   61 |         },","lines":11,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/patterns.rs#L51-L61"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`RewriteContext::snippet` calls `self.snippet_provider.span_to_snippet(span).unwrap()`. Any span that falls outside the provider's range (which can happen for synthesized/derived spans) will panic instead of degrading gracefully. This is a pervasively-called helper, so a single bad span aborts formatting of the whole file.","fix":"Return an Option or fall back to an empty/owned snippet, or at minimum panic with a descriptive message including the span for easier debugging.","locations":[{"ref":"src/rewrite.rs:148-150","code":"  148 |     pub(crate) fn snippet(&self, span: Span) -> &str {\n  149 |         self.snippet_provider.span_to_snippet(span).unwrap()\n  150 |     }","lines":3,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/rewrite.rs#L148-L150"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`span_after_last` and `span_before_last` call `self.span_to_snippet(original).unwrap()`. Like the documented panics in `span_after`/`span_before`, a span that cannot be turned into a snippet will panic. This is reachable for malformed/synthesized spans and gives no diagnostic context (unlike `span_after`, which at least formats a helpful panic message).","fix":"Use the same `unwrap_or_else(|| panic!(...))` pattern with a descriptive message as `span_after`/`span_before`, or propagate an Option.","locations":[{"ref":"src/source_map.rs:39-48","code":"   39 |     fn span_after_last(&self, original: Span, needle: &str) -> BytePos {\n   40 |         let snippet = self.span_to_snippet(original).unwrap();\n   41 |         let mut offset = 0;\n   42 | \n   43 |         while let Some(additional_offset) = snippet[offset..].find_uncommented(needle) {\n   44 |             offset += additional_offset + needle.len();\n   45 |         }\n   46 | \n   47 |         original.lo() + BytePos(offset as u32)\n   48 |     }","lines":10,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/source_map.rs#L39-L48"},{"ref":"src/source_map.rs:60-69","code":"   60 |     fn span_before_last(&self, original: Span, needle: &str) -> BytePos {\n   61 |         let snippet = self.span_to_snippet(original).unwrap();\n   62 |         let mut offset = 0;\n   63 | \n   64 |         while let Some(additional_offset) = snippet[offset..].find_uncommented(needle) {\n   65 |             offset += additional_offset + needle.len();\n   66 |         }\n   67 | \n   68 |         original.lo() + BytePos(offset as u32 - 1)\n   69 |     }","lines":10,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/source_map.rs#L60-L69"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the block-comment branch of `consume_same_line_comments`/`identify_comment`, the first line is sliced with `trimmed_line = &trimmed_line[opener.len()..]`. This assumes the trimmed first line is at least `opener.len()` bytes. For the styles selected here the opener is ASCII and `orig` starts with it, so it is usually safe, but the slice is unchecked and relies on invariants established elsewhere; any future change to how the first group / opener is derived can turn this into an out-of-bounds panic.","fix":"Use `trimmed_line = trimmed_line.get(opener.len()..).unwrap_or(\"\")` to make the slice infallible.","locations":[{"ref":"src/comment.rs:331-335","code":"  331 |                 if first {\n  332 |                     let opener = style.opener().trim_end();\n  333 |                     trimmed_line = &trimmed_line[opener.len()..];\n  334 |                     first = false;\n  335 |                 }","lines":5,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/comment.rs#L331-L335"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In the custom-comment branch of `left_trim_comment_line`, when the line does not start with the full `opener` it falls back to `&line[opener.trim_end().len()..]`. If a line in the comment group is shorter than the trimmed opener (e.g. opener `//@` len 3 but the line is only `//`), this slices past the end and panics. `consume_same_line_comments` largely keeps group members consistent with the opener, but a line that satisfies the group predicate via `comment_style(...) == style` while being shorter than the trimmed opener is not excluded, so this is reachable.","fix":"Use `line.strip_prefix(opener.trim_end()).map(|s| (s, false)).unwrap_or((line, false))` or guard with a length check before slicing.","locations":[{"ref":"src/comment.rs:1101-1106","code":" 1101 |     } else if let CommentStyle::Custom(opener) = *style {\n 1102 |         if let Some(stripped) = line.strip_prefix(opener) {\n 1103 |             (stripped, true)\n 1104 |         } else {\n 1105 |             (&line[opener.trim_end().len()..], false)\n 1106 |         }","lines":6,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/comment.rs#L1101-L1106"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`remove_comment_header` computes `&comment[3..comment.len() - 2]` (block doc `/**`/`/*!`) and `&comment[2..comment.len() - 2]` (plain `/*`). If a malformed/short comment slice reaches here - e.g. a 3-byte `/*!` or `/**` with no closing `*/`, or a bare 2-byte `/*` - then `comment.len() - 2` is less than the start index (1 < 3, or 0 < 2), producing a reversed range and an index-out-of-order slice panic. This function is reached via `CommentReducer::new` from `changed_comment_content`, which runs over comment slices that are not guaranteed to be well-formed/closed.","fix":"Clamp the end: `let end = comment.len().saturating_sub(2).max(start);` and slice `&comment[start..end]`, or validate the comment is properly closed before stripping the trailer.","locations":[{"ref":"src/comment.rs:1837-1847","code":" 1837 |     } else if (comment.starts_with(\"/**\") && !comment.starts_with(\"/**/\"))\n 1838 |         || comment.starts_with(\"/*!\            let commits = matches.free[0].trim();\n  176 |             if u32::from_str(commits).is_err() {\n  177 |                 panic!(\"Couldn't parse number of commits\");\n  178 |             }\n  179 |             config.commits = commits.to_owned();\n  180 |         }","lines":10,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/git-rustfmt/main.rs#L171-L180"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`.expect(\"initializer expression is multi-lined\")` on `init_str.lines().last()`. The early `if !init_str.contains('\\n')` return guarantees a newline, so `lines()` yields at least one item; however `\"foo\\n\".lines().last()` returns `Some(\"foo\")` and a string that is only `\"\\n\"` would still yield `Some(\"\")`, so the invariant holds — but the message is misleading: `lines().last()` is never `None` for a non-empty string regardless of multi-linedness. Low risk, flagged as fragile/misleading.","fix":"Replace expect with a graceful fallback (`.unwrap_or(\"\")`) or note the real invariant (lines() is never empty for non-empty input).","locations":[{"ref":"src/items.rs:239-242","code":"  239 |     init_str\n  240 |         .lines()\n  241 |         .last()\n  242 |         .expect(\"initializer expression is multi-lined\")","lines":4,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/items.rs#L239-L242"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`extract_post_comment` strips a trailing separator by slicing off exactly one byte: `post_snippet[..(post_snippet.len() - 1)]`. This assumes the separator is a single byte. The branch guard is `post_snippet.ends_with(separator)` where `separator` is an arbitrary `&str`; for a multi-character separator this removes the wrong number of bytes (and could slice mid-char). Safe today only because callers in these files pass \",\".","fix":"Strip exactly `separator.len()` bytes via `post_snippet.strip_suffix(separator)` instead of hard-coding `- 1`.","locations":[{"ref":"src/lists.rs:644-647","code":"  644 |     else if post_snippet.ends_with(separator)\n  645 |         && (!post_snippet.trim().starts_with(\"//\") || post_snippet.trim().contains('\\n'))\n  646 |     {\n  647 |         post_snippet[..(post_snippet.len() - 1)].trim_matches(white_space)","lines":4,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lists.rs#L644-L647"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`has_extra_newline` slices `post_snippet[..comment_end]` and `post_snippet[comment_end - len_last..]` using `comment_end`, a byte offset returned by `get_comment_end`. That offset is built from `find`/`find_uncommented` results plus `separator_index + 1`. It is only guaranteed to land on a char boundary because the separators used here are single-byte ASCII (\",\"). If a multi-byte separator were ever passed to `itemize_list`, these slices panic on a non-char-boundary index.","fix":"Either assert the separator is single-byte where these offsets are computed, or use char-boundary-safe slicing (e.g. `get(..comment_end)`) and handle the None case.","locations":[{"ref":"src/lists.rs:721","code":"  721 |     let len_last = post_snippet[..comment_end]","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lists.rs#L721"},{"ref":"src/lists.rs:727","code":"  727 |     let test_snippet = &post_snippet[comment_end - len_last..];","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lists.rs#L727"},{"ref":"src/lists.rs:689","code":"  689 |             (Some(i), None) if i > separator_index => separator_index + 1,","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lists.r oundaries, or any span anomaly, the `unwrap()` panics. A `RewriteError` would be safer.","fix":"Match on the `Option` and return `Err(RewriteError::Unknown)` (or skip arrow-comment handling) when `=>` is not found, instead of `unwrap()`.","locations":[{"ref":"src/matches.rs:443-447","code":"  443 |         let arrow_index = if context.config.style_edition() <= StyleEdition::Edition2021 {\n  444 |             arrow_snippet.rfind(\"=>\").unwrap()\n  445 |         } else {\n  446 |             arrow_snippet.find_last_uncommented(\"=>\").unwrap()\n  447 |         };","lines":5,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/matches.rs#L443-L447"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`nop_block_collapse` calls `block_str[1..].find(|c| !c.is_whitespace()).unwrap()`. This assumes that a string starting with `{` always contains a non-whitespace character after position 0 (i.e. the closing `}`). That invariant holds for valid block rewrites today, but the `.unwrap()` is a latent panic with no diagnostic: a malformed/incomplete block rewrite consisting of `{` followed only by whitespace would abort formatting.","fix":"Guard with `if let Some(idx) = block_str[1..].find(|c: char| !c.is_whitespace())` and only collapse when `idx == block_str.len() - 2`, otherwise return `block_str` unchanged.","locations":[{"ref":"src/matches.rs:613-624","code":"  613 | fn nop_block_collapse(block_str: RewriteResult, budget: usize) -> RewriteResult {\n  614 |     debug!(\"nop_block_collapse {:?} {}\", block_str, budget);\n  615 |     block_str.map(|block_str| {\n  616 |         if block_str.starts_with('{')\n  617 |             && budget >= 2\n  618 |             && (block_str[1..].find(|c: char| !c.is_whitespace()).unwrap() == block_str.len() - 2)\n  619 |         {\n  620 |             String::from(\"{}\")\n  621 |         } else {\n  622 |             block_str\n  623 |         }\n  624 |     })","lines":12,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/matches.rs#L613-L624"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In Coverage emit mode, `transform_missing_snippet` (coverage.rs `replace_chars`) maps every non-whitespace char to a single-byte `'X'`, shrinking multi-byte characters. The `offset` values produced by `CommentCodeSlices::new(snippet)` are byte offsets into this transformed snippet, but `&big_snippet[..(offset + big_diff)]` indexes the ORIGINAL file text (`big_snippet`). When the original contains multi-byte characters before the comment, `offset + big_diff` no longer lands on a char boundary of `big_snippet`, so the slice panics. Only reachable with `EmitMode::Coverage` plus non-ASCII source.","fix":"Compute `big_diff`/offsets against the untransformed snippet, or pass the original (untransformed) snippet to `CommentCodeSlices` and apply the coverage transform only to the emitted text. At minimum, derive the index into `big_snippet` from the original snippet length, not the transformed one.","locations":[{"ref":"src/missed_spans.rs:181-211","code":"  181 |         let snippet = &*transform_missing_snippet(self.config, old_snippet);\n  182 | \n  183 |         let slice_within_file_lines_range =\n  184 |             |file_lines: FileLines, cur_line, s| -> (usize, usize, bool) {\n  185 |                 let (lf_count, crlf_count) = count_lf_crlf(s);\n  186 |                 let newline_count = lf_count + crlf_count;\n  187 |                 let within_file_lines_range = file_lines.contains_range(\n  188 |                     file_name,\n  189 |                     cur_line,\n  190 |                     // if a newline character is at the end of the slice, then the number of\n  191 |                     // newlines needs to be decreased by 1 so that the range checked against\n  192 |                     // the file_lines is the visual range one would expect.\n  193 |                     cur_line + newline_count - if s.ends_with('\\n') { 1 } else { 0 },\n  194 |                 );\n  195 |                 (lf_count, crlf_count, within_file_lines_range)\n  196 |             };\n  197 |         for (kind, offset, subslice) in CommentCodeSlices::new(snippet) {\n  198 |             debug!(\"{:?}: {:?}\", kind, subslice);\n  199 | \n  200 |             let (lf_count, crlf_count, within_file_lines_range) =\n  201 |                 slice_within_file_lines_range(self.config.file_lines(), status.cur_line, subslice);\n  202 |             let newline_count = lf_count + crlf_count;\n  203 |             if CodeCharKind::Comment == kind && within_file_lines_range {\n  204 |                 // 1: comment.\n  205 |                 self.process_comment(\n  206 |                     &mut status,\n  207 |                     snippet,\n  208 |                     &big_snippet[..(offset + big_diff)],\n  209 |                     offset,\n  210 |                     subslice,\n  211 |                 );","lines":31,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/missed_spans.rs#L181-L211"}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`snippet_provider` unwraps `source_file.src.as_ref().unwrap()`. If the SourceFile has no in-memory source (`src` is None, which occurs for externally-loaded/metadata-only files), this panics. rustfmt generally has source loaded, but the unwrap is an unguarded assumption inside a `pub(crate)` helper.","fix":"Return a Result/Option from `snippet_provider` or surface a proper ErrorKind instead of `.unwrap()` on `src`.","locations":[{"ref":"src/parse/session.rs:236-243","code":"  236 |     pub(crate) fn snippet_provider(&self, span: Span) -> SnippetProvider {\n  237 |         let source_file = self.raw_psess.source_map().lookup_char_pos(span.lo()).file;\n  238 |         SnippetProvider::new(\n  239 |             source_file.start_pos,\n  240 |             source_file.end_position(),\n  241 |             Arc::clone(source_file.src.as_ref().unwrap()),\n  242 |         )\n  243 |     }","lines":8,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/parse/session.rs#L236-L243"},{"ref":"src/parse/session.rs:241","code":"  241 |             Arc::clone(source_file.src.as_ref().unwrap()),","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/parse/session.rs#L241"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`lookup_line(span.lo()).unwrap()` and `lookup_line(span.hi()).unwrap()` in `lookup_line_range` will panic if the byte positions cannot be resolved to a line (e.g. a DUMMY_SP or an out-of-range span). This is in a trait method used during line-range computation; a bad span anywhere upstream becomes a hard crash rather than a formatting error.","fix":"Handle the `None` case gracefully (e.g. fall back to a sensible default or propagate an error) rather than unwrapping.","locations":[{"ref":"src/parse/session.rs:291-292","code":"  291 |         let lo = self.raw_psess.source_map().lookup_line(span.lo()).unwrap();\n  292 |         let hi = self.raw_psess.source_map().lookup_line(span.hi()).unwrap();","lines":2,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/parse/session.rs#L291-L292"}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`count_wildcard_suffix_len` is consumed by `rewrite_tuple_pat`, which then does `context.snippet(sp).find_uncommented(\"_\").unwrap()` at the suffix boundary. The `.unwrap()` assumes the snippet of the counted pattern literally contains `_`. The count is based on the *rewritten* item string being equal to `\"_\"`, but the original source snippet (e.g. via a macro or unusual span) may not co .rs#L588-L623"}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In `is_item_with_multi_items_array`, when `segments.len() <= 1` the code indexes `segments[0]`. A path with zero segments would panic. Trait-ref paths always have >=1 segment today, so this is currently unreachable, but the indexing is an unguarded assumption rather than an explicit check.","fix":"Use `segments.first()` / `if let Some(seg) = segments.first()` instead of `segments[0]`, returning `false` when empty.","locations":[{"ref":"src/types.rs:1187-1202","code":" 1187 |         ast::GenericBound::Trait(ref poly_trait_ref, ..) => {\n 1188 |             let segments = &poly_trait_ref.trait_ref.path.segments;\n 1189 |             if segments.len() > 1 {\n 1190 |                 true\n 1191 |             } else {\n 1192 |                 if let Some(args_in) = &segments[0].args {\n 1193 |                     matches!(\n 1194 |                         args_in.deref(),\n 1195 |                         ast::GenericArgs::AngleBracketed(bracket_args)\n 1196 |                             if bracket_args.args.len() > 1\n 1197 |                     )\n 1198 |                 } else {\n 1199 |                     false\n 1200 |                 }\n 1201 |             }\n 1202 |         }","lines":16,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/types.rs#L1187-L1202"}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`format_restriction` uses `panic!(\"non-global path in {kw}(restricted)?\")` when a path reports `is_global()` yet yields no segments. This converts a malformed-but-parseable AST into a hard crash of the formatter instead of degrading gracefully or returning an error string.","fix":"Return an empty/best-effort string or propagate a RewriteError rather than panicking.","locations":[{"ref":"src/utils.rs:105-107","code":"  105 |             if path.is_global() && segments_iter.next().is_none() {\n  106 |                 panic!(\"non-global path in {kw}(restricted)?\");\n  107 |             }","lines":3,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/utils.rs#L105-L107"}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"`group_aligned_items` computes `0..fields.len() - 1`, which underflows (panic in debug, wraps to a huge range in release) when `fields` is empty. `rewrite_with_alignment` likewise indexes `fields[0..=group_index]` and `fields[init.len() - 1]` assuming at least one field. Today every caller in items.rs/expr.rs guards `fields.is_empty()` before calling, so the path is currently unreachable, but the function offers no internal protection and a future caller could trigger the panic/UB.","fix":"Add an early return / debug_assert for `fields.is_empty()` at the top of `rewrite_with_alignment` and `group_aligned_items`, or change the loop bound to `0..fields.len().saturating_sub(1)` and guard the slice indexing.","locations":[{"ref":"src/vertical.rs:280","code":"  280 |     for i in 0..fields.len() - 1 {","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/vertical.rs#L280"},{"ref":"src/vertical.rs:122-123","code":"  122 |     };\n  123 |     let init = &fields[0..=group_index];","lines":2,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/vertical.rs#L122-L123"},{"ref":"src/vertical.rs:129","code":"  129 |         let init_hi = init[init.len() - 1].get_span().hi();","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/vertical.rs#L129"}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`is_unknown_rustfmt_attr` indexes `segments[0]` without checking the slice is non-empty. A path segment list is virtually always non-empty for a parsed attribute, but the unconditional index is a latent panic if an empty segment path ever reaches here.","fix":"Use `segments.first().map_or(false, |s| s.ident.to_string() == \"rustfmt\")` (or early-return `false` when `segments.is_empty()`).","locations":[{"ref":"src/visitor.rs:921-925","code":"  921 |     fn is_unknown_rustfmt_attr(&self, segments: &[ast::PathSegment]) -> bool {\n  922 |         if segments[0].ident.to_string() != \"rustfmt\" {\n  923 |             return false;\n  924 |         }\n  925 |         !is_skip_attr(segments)","lines":5,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/visitor.rs#L921-L925"}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"negligible","easy":true,"description":"`MacroSelectors::from_str` calls `.expect(\"MacroSelector from_str is infallible\")`. This is sound today because `MacroSelector::from_str` has `Err = Infallible`, but the `expect` will panic if that signature ever changes; an `unwrap`-free conversion would be more robust and self-documenting.","fix":"Use `let Ok(sel) = MacroSelector::from_str(raw);` (infallible irrefutable binding) or `.unwrap_or_else(|e| match e {})` to make infallibility compiler-checked.","locations":[{"ref":"src/config/macro_names.rs:89-98","code":"   89 |     fn from_str(s: &str) -> Result<Self, Self::Err> {\n   90 |         let raw: Vec<&str> = json::from_str(s).map_err(MacroSelectorsError::Json)?;\n   91 |         Ok(Self(\n   92 |             raw.into_iter()\n   93 |                 .map(|raw| {\n   94 |                     MacroSelector::from_str(raw).expect(\"MacroSelector from_str is infallible\")\n   95 |                 })\n   96 |                 .collect(),\n   97 |         ))\n   98 |     }","lines":10,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/macro_names.rs#L89-L98"}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"negligible","easy":true,"description":"`Config::from_args` in git-rustfmt does `env::args_os().next().unwrap().to_string_lossy()` to build the usage string. `args().next()` is virtually always present, but unwrapping argv[0] is technically a panic point if the process was started with an empty argv.","fix":"Use `env::args_os().next().map(|a| a.to_string_lossy().into_owned()).unwrap_or_else(|| \"git-rustfmt\".to_owned())`.","locations":[{"ref":"src/git-rustfmt/main.rs:148-156","code":"  148 |         if matches.opt_present(\"h\") {\n  149 |             let message = format!(\n  150 |                 \"\\nusage: {} <commits> [options]\\n\\n\\\n  151 |                  commits: number of commits to format, default: 1\",\n  152 |                 env::args_os().next().unwrap().to_string_lossy()\n  153 |             );\n  154 |             println!(\"{}\", opts.usage(&message));\n  155 |             std::process::exit(0);\n  156 |         }","lines":9,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/git-rustfmt/main.rs#L148-L156"}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"negligible","easy":true,"description":"`extract_pre_comment` calls `pre_snippet.rfind(|c| c == '/').unwrap()` guarded only by `trimmed_pre_snippet.ends_with(\"*/\")`. The guard is on the *trimmed* snippet while the rfind runs on the *untrimmed* `pre_snippet`; this is fine because trailing `*/` implies a `/` exists in the untrimmed string too, but the coupling between the trimmed-guard and untrimmed-search is fragile and the unwrap has no local justification comment.","fix":"rfind on `trimmed_pre_snippet` (consistent with the guard) or add a comment explaining why the unwrap cannot fail.","locations":[{"ref":"src/lists.rs:589-592","code":"  589 |     let ends_with_block_comment = trimmed_pre_snippet.ends_with(\"*/\");\n  590 |     let starts_with_single_line_comment = trimmed_pre_snippet.starts_with(\"//\");\n  591 |     if ends_with_block_comment {\n  592 |         let comment_end = pre_snippet.rfind(|c| c == '/').unwrap();","lines":4,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lists.rs#L589-L592"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"Unchecked subtraction `context.config.max_width() - offset.width()` can underflow and panic in debug builds when an item is nested deeply enough that the indentation width exceeds `max_width` (e.g. a where-clause on a Visual-indent-styled item inside many nested modules/impls). Everywhere else in this file the budget is computed via `context.budget(..)`, which uses `saturating_sub`.","fix":"Use `context.budget(offset.width())` (or `context.config.max_width().saturating_sub(offset.width())`) instead of the raw subtraction.","locations":[{"ref":"src/items.rs:3214","code":" 3214 |     let budget = context.config.max_width() - offset.width();","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/items.rs#L3214"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`register_metavariable` computes `\"$\".repeat(dollar_count - 1)`. If it is ever called with `dollar_count == 0` this underflows `usize` and panics (or, in release, allocates a huge string). Today both call sites in `replace_names` only reach this when `dollar_count > 0`, but that invariant is implicit and easy to break: a future change to the parsing loop that lets `cur_name` become non-empty with `dollar_count == 0` would turn this into a panic. The function takes `dollar_count` as a bare argument with no guard.","fix":"Add a debug_assert!(dollar_count > 0) and/or use `dollar_count.saturating_sub(1)`, or have `register_metavariable` early-return when `dollar_count == 0`.","locations":[{"ref":"src/macros.rs:513-528","code":"  513 | fn register_metavariable(\n  514 |     map: &mut HashMap<String, String>,\n  515 |     result: &mut String,\n  516 |     name: &str,\n  517 |     dollar_count: usize,\n  518 | ) {\n  519 |     let mut new_name = \"$\".repeat(dollar_count - 1);\n  520 |     let mut old_name = \"$\".repeat(dollar_count);\n  521 | \n  522 |     new_name.push('z');\n  523 |     new_name.push_str(name);\n  524 |     old_name.push_str(name);\n  525 | \n  526 |     result.push_str(&new_name);\n  527 |     map.insert(old_name, new_name);\n  528 | }","lines":16,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/macros.rs#L513-L528"},{"ref":"src/macros.rs:519","code":"  519 |     let mut new_name = \"$\".repeat(dollar_count - 1);","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/macros.rs#L519"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`config.max_width() - body_indent.width()` is an unchecked subtraction. If the macro body is deeply nested so that `body_indent.width()` exceeds `max_width`, this underflows and panics in debug builds (and produces an absurd `usize` width in release). Macro branch bodies can be arbitrarily indented, so this is reachable for pathological inputs.","fix":"Use `config.max_width().saturating_sub(body_indent.width())`, or compute via `Shape`'s checked helpers and bail out with a RewriteError when it would underflow.","locations":[{"ref":"src/macros.rs:1342-1343","code":" 1342 |         let new_width = config.max_width() - body_indent.width();\n 1343 |         config.set().max_width(new_width);","lines":2,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/macros.rs#L1342-L1343"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`self.config.max_width() - self.block_indent.width()` subtracts unconditionally. For deeply nested code (block indent wider than `max_width`, which can happen with very small `max_width` configs or pathological nesting), this underflows `usize` and panics in debug / wraps to a huge value in release. The surrounding `min(comment_width(), ...)` does not protect the subtraction because the subtraction is evaluated before `min` is applied.","fix":"Use `self.config.max_width().saturating_sub(self.block_indent.width())`.","locations":[{"ref":"src/missed_spans.rs:272-275","code":"  272 |         let comment_width = ::std::cmp::min(\n  273 |             self.config.comment_width(),\n  274 |             self.config.max_width() - self.block_indent.width(),\n  275 |         );","lines":4,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/missed_spans.rs#L272-L275"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"`span_before_last` computes `original.lo() + BytePos(offset as u32 - 1)`. The `while let` loop only advances `offset` while `find_uncommented` returns `Some`. If the needle is never found in the snippet, `offset` stays `0` and `0u32 - 1` underflows, panicking in debug builds (and wrapping to a huge BytePos in release, producing a corrupt span). `span_after_last` has the identical loop but no `-1`, so it is safe; this asymmetry is the bug.","fix":"Guard against the not-found case, e.g. track whether any match was found and panic with a clear message or return early, or compute `offset.checked_sub(1)` and handle `None`. Mirror the contract of `span_before`/`opt_span_before`.","locations":[{"ref":"src/source_map.rs:60-69","code":"   60 |     fn span_before_last(&self, original: Span, needle: &str) -> BytePos {\n   61 |         let snippet = self.span_to_snippet(original).unwrap();\n   62 |         let mut offset = 0;\n   63 | \n   64 |         while let Some(additional_offset) = snippet[offset..].find_uncommented(needle) {\n   65 |             offset += additional_offset + needle.len();\n   66 |         }\n   67 | \n   68 |         original.lo() + BytePos(offset as u32 - 1)\n   69 |     }","lines":10,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/source_map.rs#L60-L69"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"When laying out a continuation after a multi-line wrap, the offset is computed as `1 + last_line_width(&self.result) - self.line_start.len()`. If the width of the last produced line is smaller than `line_start.len() - 1` (possible with custom/short line layouts where the rewritten line does not actually contain the full `line_start` prefix), this subtraction underflows `usize`, producing a huge `offset` that then drives `self.max_width.saturating_sub(offset)` to 0 and corrupts subsequent shaping. The invariant `last_line_width >= line_start.len()` is assumed but not enforced.","fix":"Compute the offset with saturating arithmetic: `1 + last_line_width(&self.result).saturating_sub(self.line_start.len())`.","locations":[{"ref":"src/comment.rs:880-890","code":"  880 |             self.fmt.shape = if self.is_prev_line_multi_line {\n  881 |                 // 1 = \" \"\n  882 |                 let offset = 1 + last_line_width(&self.result) - self.line_start.len();\n  883 |                 Shape {\n  884 |                     width: self.max_width.saturating_sub(offset),\n  885 |                     indent: self.fmt_indent,\n  886 |                     offset: self.fmt.shape.offset + offset,\n  887 |                 }\n  888 |             } else {\n  889 |                 Shape::legacy(self.max_width, self.fmt_indent)\n  890 |             };","lines":11,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/comment.rs#L880-L890"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`Range::adjacent_to` computes `self.hi + 1` and `other.hi + 1` without guarding against overflow. If a range with `hi == usize::MAX` is constructed (e.g. via a `--file-lines` JSON span with a huge number), `normalize_ranges` -> `merge` -> `adjacent_to` will panic on integer overflow in debug builds (and silently wrap in release, producing wrong adjacency results). User-controlled `--file-lines` values flow directly into `Range::new` with no upper-bound validation.","fix":"Use checked/saturating arithmetic, e.g. `self.hi.checked_add(1) == Some(other.lo)`, or `self.hi.saturating_add(1) == other.lo`.","locations":[{"ref":"src/config/file_lines.rs:137-143","code":"  137 |     fn adjacent_to(self, other: Range) -> bool {\n  138 |         if self.is_empty() || other.is_empty() {\n  139 |             false\n  140 |         } else {\n  141 |             self.hi + 1 == other.lo || other.hi + 1 == self.lo\n  142 |         }\n  143 |     }","lines":7,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/file_lines.rs#L137-L143"},{"ref":"src/config/file_lines.rs:330-335","code":"  330 |     fn into_tuple(self) -> Result<(FileName, Range), FileLinesError> {\n  331 |         let (lo, hi) = self.range;\n  332 |         let canonical = canonicalize_path_string(&self.file)\n  333 |             .ok_or(FileLinesError::CannotCanonicalize(self.file))?;\n  334 |         Ok((canonical, Range::new(lo, hi)))\n  335 |     }","lines":6,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/file_lines.rs#L330-L335"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`scan_diff` computes `end_line = start_line + line_count - 1` with `u32` arithmetic parsed directly from the diff. A malformed/hostile diff with very large `+N,M` hunk numbers could overflow `start_line + line_count` and panic in debug builds (or wrap in release). `line_count == 0` is guarded, but the addition itself is unguarded.","fix":"Use checked/saturating arithmetic (`start_line.saturating_add(line_count).saturating_sub(1)`) or validate the parsed values are within a sane range.","locations":[{"ref":"src/format-diff/main.rs:164-184","code":"  164 |         let start_line = lines_captures\n  165 |             .get(1)\n  166 |             .unwrap()\n  167 |             .as_str()\n  168 |             .parse::<u32>()\n  169 |             .unwrap();\n  170 |         let line_count = match lines_captures.get(3) {\n  171 |             Some(line_count) => line_count.as_str().parse::<u32>().unwrap(),\n  172 |             None => 1,\n  173 |         };\n  174 | \n  175 |         if line_count == 0 {\n  176 |             continue;\n  177 |         }\n  178 | \n  179 |         let end_line = start_line + line_count - 1;\n  180 |         files.insert(file.to_owned());\n  181 |         ranges.push(Range {\n  182 |             file: file.to_owned(),\n  183 |             range: [start_line, end_line],\n  184 |         });","lines":21,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/format-diff/main.rs#L164-L184"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"`offset.block_indent + context.config.tab_spaces() - 1` underflows (panicking in debug) if `tab_spaces()` is configured to 0. `tab_spaces` is a user-configurable option, and `0` is not obviously rejected here. The same `tab_spaces() - 1` pattern appears in format_tuple_struct's where-clause indentation.","fix":"Use `saturating_sub(1)` or validate that `tab_spaces >= 1` upstream and document the invariant.","locations":[{"ref":"src/items.rs:1235","code":" 1235 |             let width = offset.block_indent + context.config.tab_spaces() - 1;","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/items.rs#L1235"},{"ref":"src/items.rs:1662","code":" 1662 |             &(offset.block_only() + (context.config.tab_spaces() - 1)).to_string(context.config),","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/items.rs#L1662"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`FormattedSnippet::unwrap_code_block` decrements `*low` and `*high` by 1 unconditionally. These are 1-based line numbers shifted by the prepended `fn main() {\\n` wrapper, so they are normally >= 2; but if a non-formatted range ever started at line 0, `*low -= 1` would underflow and panic. There is no assertion documenting the invariant.","fix":"Use `low.saturating_sub(1)` / `high.saturating_sub(1)`, or assert the ranges are >= 1 before decrementing.","locations":[{"ref":"src/lib.rs:169-176","code":"  169 |     fn unwrap_code_block(&mut self) {\n  170 |         self.non_formatted_ranges\n  171 |             .iter_mut()\n  172 |             .for_each(|(low, high)| {\n  173 |                 *low -= 1;\n  174 |                 *high -= 1;\n  175 |             });\n  176 |     }","lines":8,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lib.rs#L169-L176"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"`Sub for Indent` and `Sub<usize> for Indent` use plain `-` on `usize` fields (`self.block_indent - rhs.block_indent`, `self.alignment - rhs.alignment`). If a caller subtracts a larger indent/alignment than the receiver holds, this underflows and panics in debug. Unlike `Shape`'s width arithmetic (which uses `checked_sub`/`saturating_sub`), these operators are unguarded.","fix":"Use `saturating_sub` for the components, or document/assert the precondition that rhs <= self for every call site.","locations":[{"ref":"src/shape.rs:115-124","code":"  115 | impl Sub for Indent {\n  116 |     type Output = Indent;\n  117 | \n  118 |     fn sub(self, rhs: Indent) -> Indent {\n  119 |         Indent::new(\n  120 |             self.block_indent - rhs.block_indent,\n  121 |             self.alignment - rhs.alignment,\n  122 |         )\n  123 |     }\n  124 | }","lines":10,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/shape.rs#L115-L124"},{"ref":"src/shape.rs:134-140","code":"  134 | impl Sub<usize> for Indent {\n  135 |     type Output = Indent;\n  136 | \n  137 |     fn sub(self, rhs: usize) -> Indent {\n  138 |         Indent::new(self.block_indent, self.alignment - rhs)\n  139 |     }\n  140 | }","lines":7,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/shape.rs#L134-L140"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`create_config_arg` builds a custom-config argument that is missing the `--config=` prefix and produces a leading comma. When the caller passes any non-empty config, the function returns a string like `,opt1=val,opt2=val` instead of `--config=opt1=val,opt2=val`. This whole string is then passed verbatim as a single CLI argument to rustfmt (see `format_code`/`format_code_from_path` `.args([... self.command_line_configs()])`), so rustfmt receives a bogus argument and the user-supplied config options are never applied (and rustfmt likely errors). The capacity comment even references `DEFAULT_CONFIG.len()` but DEFAULT_CONFIG is never written into the result, confirming the prefix was dropped. The default-config path works only because DEFAULT_CONFIG already contains `--config=`.","fix":"Start the result with the `--config=` prefix and join the non-empty configs with commas without a leading comma, e.g. `let mut result = String::from(\"--config=\"); push first config, then for each subsequent push ',' then the config`. Adjust the capacity calculation accordingly.","locations":[{"ref":"check_diff/src/lib.rs:384-416","code":"  384 | fn create_config_arg<T: AsRef<str>>(configs: Option<&[T]>) -> Cow<'static, str> {\n  385 |     let Some(configs) = configs else {\n  386 |         return Cow::Borrowed(DEFAULT_CONFIG);\n  387 |     };\n  388 | \n  389 |     let mut configs_len = 0;\n  390 |     let mut num_configs = 0;\n  391 | \n  392 |     // Determine how many non empty configs we've got\n  393 |     for c in configs.iter().map(AsRef::as_ref) {\n  394 |         if c.is_empty() {\n  395 |             continue;\n  396 |         }\n  397 | \n  398 |         configs_len += c.len();\n  399 |         num_configs += 1;\n  400 |     }\n  401 | \n  402 |     if num_configs == 0 {\n  403 |         // All configs were empty so return the default.\n  404 |         return Cow::Borrowed(DEFAULT_CONFIG);\n  405 |     }\n  406 | \n  407 |     // We need capacity for the default configs len + one ',' per config + total config element len\n  408 |     let mut result = String::with_capacity(DEFAULT_CONFIG.len() + num_configs + configs_len);\n  409 | \n  410 |     for c in configs.iter().map(AsRef::as_ref) {\n  411 |         result.push(',');\n  412 |         result.push_str(c);\n  413 |     }\n  414 | \n  415 |     Cow::Owned(result)\n  416 | }","lines":33,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/check_diff/src/lib.rs#L384-L416"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `get_targets_root_only`, `in_workspace_root` is computed as `workspace_root_path == target_manifest` when a `--manifest-path` is supplied. `workspace_root_path` is the canonicalized workspace *directory*, while `target_manifest` is a path to a `Cargo.toml` *file*, so this comparison is always false. (The `else` branch correctly compares directory-to-directory: `workspace_root_path == current_dir`.) As a result, when invoking with an explicit `--manifest-path` that points at the workspace root manifest, root-only target detection can fail to recognize the workspace root and falls back to per-manifest filtering.","fix":"Compare the workspace root directory against the manifest's parent directory, e.g. `workspace_root_path == target_manifest.parent().unwrap()` (after canonicalizing), mirroring the `current_dir` branch.","locations":[{"ref":"src/cargo-fmt/main.rs:391-402","code":"  391 |     let (in_workspace_root, current_dir_manifest) = if let Some(target_manifest) = manifest_path {\n  392 |         (\n  393 |             workspace_root_path == target_manifest,\n  394 |             target_manifest.canonicalize()?,\n  395 |         )\n  396 |     } else {\n  397 |         let current_dir = env::current_dir()?.canonicalize()?;\n  398 |         (\n  399 |             workspace_root_path == current_dir,\n  400 |             current_dir.join(\"Cargo.toml\"),\n  401 |         )\n  402 |     };","lines":12,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/cargo-fmt/main.rs#L391-L402"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`format_overflow_style` (used by `format_chain_item` when `allow_overflow` is true) returns the raw source snippet with only trailing whitespace trimmed, performing no reindentation. Although `allow_overflow` is hard-coded to `false` today (see `ChainFormatterShared::new` TODO), if it is ever enabled the overflow fallback emits original-source-indented text spliced into a reformatted chain, which will produce incorrectly indented output rather than a formatting error. The fallback also swallows ALL RewriteError variants, not just ExceedsMaxWidth, as its own TODO warns.","fix":"Before enabling `allow_overflow`, restrict the `or_else` fallback to `RewriteError::ExceedsMaxWidth` and reindent the snippet to the target shape, per the in-code TODOs.","locations":[{"ref":"src/chains.rs:84-112","code":"   84 | fn format_overflow_style(span: Span, context: &RewriteContext<'_>) -> Option<String> {\n   85 |     // TODO(ding-young): Currently returning None when the given span is out of the range\n   86 |     // covered by the snippet provider. If this is a common cause for internal\n   87 |     // rewrite failure, add a new enum variant and return RewriteError instead of None\n   88 |     context.snippet_provider.span_to_snippet(span).map(|s| {\n   89 |         s.lines()\n   90 |             .map(|l| l.trim_end())\n   91 |             .collect::<Vec<_>>()\n   92 |             .join(\"\\n\")\n   93 |     })\n   94 | }\n   95 | \n   96 | fn format_chain_item(\n   97 |     item: &ChainItem,\n   98 |     context: &RewriteContext<'_>,\n   99 |     rewrite_shape: Shape,\n  100 |     allow_overflow: bool,\n  101 | ) -> RewriteResult {\n  102 |     if allow_overflow {\n  103 |         // TODO(ding-young): Consider calling format_overflow_style()\n  104 |         // only when item.rewrite_result() returns RewriteError::ExceedsMaxWidth.\n  105 |         // It may be inappropriate to call format_overflow_style on other RewriteError\n  106 |         // since the current approach retries formatting if allow_overflow is true\n  107 |         item.rewrite_result(context, rewrite_shape)\n  108 |             .or_else(|_| format_overflow_style(item.span, context).unknown_error())\n  109 |     } else {\n  110 |         item.rewrite_result(context, rewrite_shape)\n  111 |     }\n  112 | }","lines":29,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/chains.rs#L84-L112"},{"ref":"src/chains.rs:654-656","code":"  654 |             // TODO(calebcartwright)\n  655 |             allow_overflow: false,\n  656 |         }","lines":3,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/chains.rs#L654-L656"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `Chain::from_ast`, the post-comment for the very first chain item is only handled when `!is_tries(comment_snippet.trim())`, but the leading-comment/`handle_comment` gating in the main loop uses `context.config.use_try_shorthand() || is_tries(...)`. When `use_try_shorthand()` is true, the special first-item peek block at lines 444-455 still calls `handle_post_comment` unconditionally (it does not consult `use_try_shorthand`), so comment handling for the first gap is inconsistent with the per-item loop which suppresses comment handling entirely under `use_try_shorthand`. This can produce divergent treatment of comments before the first child depending on whether `try!`->`?` conversion is enabled.","fix":"Gate the first-item peek block on the same `handle_comment` condition used in the loop (`!(use_try_shorthand() || is_tries(...))`) so comment extraction before the first child is consistent with subsequent children.","locations":[{"ref":"src/chains.rs:443-496","code":"  443 |         let mut iter = rev_children.into_iter().rev().peekable();\n  444 |         if let Some(first_chain_item) = iter.peek() {\n  445 |             let comment_span = mk_sp(prev_span_end, first_chain_item.span.lo());\n  446 |             let comment_snippet = context.snippet(comment_span);\n  447 |             if !is_tries(comment_snippet.trim()) {\n  448 |                 handle_post_comment(\n  449 |                     comment_span,\n  450 |                     comment_snippet,\n  451 |                     &mut prev_span_end,\n  452 |                     &mut children,\n  453 |                 );\n  454 |             }\n  455 |         }\n  456 |         while let Some(chain_item) = iter.next() {\n  457 |             let comment_snippet = context.snippet(chain_item.span);\n  458 |             // FIXME: Figure out the way to get a correct span when converting `try!` to `?`.\n  459 |             let handle_comment =\n  460 |                 !(context.config.use truct/impl as the last item) that the formatter placed on the final line, this is still the wrapper brace, so it is usually correct; but if formatting emits a trailing comment or string after the wrapper's `}` the rfind could mis-locate. The slicing `&formatted.snippet[block_start..block_len]` assumes `block_start <= block_len`; `block_start = min(FN_MAIN_PREFIX.len(), block_len)` guarantees that, but the byte-index slice can panic if `block_len` ever lands inside a multi-byte char (it cannot for ASCII '}', so currently safe). Flagged as fragile rather than a confirmed panic.","fix":"Document the assumption that the wrapper '}' is always the last '}' in the output, or search forward for the matching brace explicitly rather than relying on rfind.","locations":[{"ref":"src/lib.rs:388-400","code":"  388 |     let block_len = formatted\n  389 |         .snippet\n  390 |         .rfind('}')\n  391 |         .unwrap_or_else(|| formatted.snippet.len());\n  392 | \n  393 |     // It's possible that `block_len < FN_MAIN_PREFIX.len()`. This can happen if the code block was\n  394 |     // formatted into the empty string, leading to the enclosing `fn main() {\\n}` being formatted\n  395 |     // into `fn main() {}`. In this case no unindentation is done.\n  396 |     let block_start = min(FN_MAIN_PREFIX.len(), block_len);\n  397 | \n  398 |     let mut is_indented = true;\n  399 |     let indent_str = Indent::from_width(config, config.tab_spaces()).to_string(config);\n  400 |     for (kind, ref line) in LineClasses::new(&formatted.snippet[block_start..block_len]) {","lines":13,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lib.rs#L388-L400"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`is_like_block_indent_style` in the parse-failure fallback decides block vs visual style by checking whether the last line of the snippet consists solely of closing delimiters `} \n  554 |                         list_items[self.items.len() - 1].item = rw.unknown_error();\n  555 |                     } else {\n  556 |                         list_items[self.items.len() - 1].item = Ok(overflowed.to_owned());\n  557 |                     }\n  558 |                 } else {\n  559 |                     list_items[self.items.len() - 1].item = Ok(overflowed.to_owned());\n  560 |                 }\n  561 |             }","lines":25,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/overflow.rs#L537-L561"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In `parse_numeric_chunk`, a numeric chunk is parsed with `source.parse::<usize>().ok()?`. Because `source` consists only of ASCII digits, the only way this fails is integer overflow (a digit run that exceeds `usize::MAX`, e.g. `1` followed by 20+ digits). On overflow the `?` makes `next()` return `None`, which silently TERMINATES the chunk iterator. `self.start` was already advanced past the numeric chunk before the parse attempt, so that chunk and every subsequent chunk are dropped from the comparison. Two identifiers that differ only after a very long numeric run would then compare `Equal`, producing a wrong sort order (and a non-total/inconsistent ordering across inputs). It does not panic, but it is a real correctness bug for pathological identifiers.","fix":"Do not fall back to ending iteration on overflow. Either compare numeric chunks by their digit-significant string when the value does not fit (compare `zeros`/length then lexicographic digits), or saturate/clamp the value, or store the value as a big-enough/arbitrary representation. At minimum, on parse failure emit a `Str`/raw-source chunk for the digit run instead of returning `None`, so the remainder of the identifier still participates in the comparison.","locations":[{"ref":"src/sort.rs:43-50","code":"   43 |         let zeros OGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`FormatLines::new_line` does `self.line_len -= 1` after detecting trailing whitespace (to undo counting the trailing space when reporting overflow). If the last char was a tab, `char()` added `tab_spaces()` (e.g. 4) to `line_len`, but `new_line` only subtracts 1. So a line ending in a tab that is also a trailing-whitespace line will have its `line_len` over-counted by `tab_spaces()-1` for the subsequent overflow check, potentially producing a spurious LineOverflow error.","fix":"Subtract the width that was actually added for the last whitespace char (track it), not a hardcoded 1.","locations":[{"ref":"src/formatting.rs:563","code":"  563 |                 self.line_len -= 1;","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/formatting.rs#L563"},{"ref":"src/formatting.rs:589-601","code":"  589 |     fn char(&mut self, c: char, kind: FullCodeCharKind) {\n  590 |         self.newline_count = 0;\n  591 |         self.line_len += if c == '\\t' {\n  592 |             self.config.tab_spaces()\n  593 |         } else {\n  594 |             1\n  595 |         };\n  596 |         self.last_was_space = c.is_whitespace();\n  597 |         self.line_buffer.push(c);\n  598 |         if kind.is_string() {\n  599 |             self.current_line_contains_string_literal = true;\n  600 |         }\n  601 |     }","lines":13,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/formatting.rs#L589-L601"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`UseTree::share_prefix` only rejects the merge when `self` has attrs/comments (`self.attrs.is_some()`, `self.contains_comment()`), but never checks `other.attrs`/`other.contains_comment()`. The check is asymmetric. In the current call sites (`normalize_use_trees_with_granularity`, `
