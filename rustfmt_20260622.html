al path in pub(restricted)?\")` only when `path.is_global()`, while the parallel `format_restriction` panics with `panic!(\"non-global path in {kw}(restricted)?\")` when `is_global() && next().is_none()`. The two helpers handle the same situation with different control flow and different (inverted-sounding) panic messages, which is confusing copy-paste divergence; `format_visibility` will panic via `expect` if a global path has zero segments.","fix":"Unify the two restricted-path renderers into one helper, or at least align the panic conditions and messages.","locations":[{"ref":"src/utils.rs:60-73","code":"   60 |         VisibilityKind::Restricted { ref path, .. } => {\n   61 |             let Path { ref segments, .. } = **path;\n   62 |             let mut segments_iter = segments.iter().map(|seg| rewrite_ident(context, seg.ident));\n   63 |             if path.is_global() {\n   64 |                 segments_iter\n   65 |                     .next()\n   66 |                     .expect(\"Non-global path in pub(restricted)?\");\n   67 |             }\n   68 |             let is_keyword = |s: &str| s == \"crate\" || s == \"self\" || s == \"super\";\n   69 |             let path = segments_iter.collect::<Vec<_>>().join(\"::\");\n   70 |             let in_str = if is_keyword(&path) { \"\" } else { \"in \" };\n   71 | \n   72 |             Cow::from(format!(\"pub({in_str}{path}) \"))\n   73 |         }","lines":14,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/utils.rs#L60-L73"},{"ref":"src/utils.rs:96-114","code":"   96 |     match restriction {\n   97 |         RestrictionKind::Unrestricted => String::new(),\n   98 |         RestrictionKind::Restricted {\n   99 |             ref path,\n  100 |             id: _,\n  101 |             shorthand,\n  102 |         } => {\n  103 |             let Path { ref segments, .. } = **path;\n  104 |             let mut segments_iter = segments.iter().map(|seg| rewrite_ident(context, seg.ident));\n  105 |             if path.is_global() && segments_iter.next().is_none() {\n  106 |                 panic!(\"non-global path in {kw}(restricted)?\");\n  107 |             }\n  108 |             // FIXME use `segments_iter.intersperse(\"::\").collect::<String>()` once\n  109 |             // `#![feature(iter_intersperse)]` is re-stabilized.\n  110 |             let path = itertools::join(segments_iter, \"::\");\n  111 |             let in_str = if *shorthand { \"\" } else { \"in \" };\n  112 | \n  113 |             format!(\"{kw}({in_str}{path}) \")\n  114 |         }","lines":19,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/utils.rs#L96-L114"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"`OperationError::StdinBadEmit` message reads \"Emit mode {0} not supported with standard output.\" but the condition is about standard *input* (stdin). The error is raised in `format_string` for emit modes incompatible with reading from stdin, so the word should be \"input\".","fix":"Change the message to \"... not supported with standard input.\".","locations":[{"ref":"src/bin/main.rs:89-92","code":"   89 |     /// Attempt to use --emit with a mode which is not currently\n   90 |     /// supported with standard input.\n   91 |     #[error(\"Emit mode {0} not supported with standard output.\")]\n   92 |     StdinBadEmit(EmitMode),","lines":4,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/bin/main.rs#L89-L92"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"`is_table_item` uses a `match s.rfind('|') { Some(0) | None => false, _ => true }` returning a bool, which is a verbose way of writing a boolean expression and also uses an explicit `return` in a non-tail position with a trailing expression style. Functionally correct but needlessly convoluted (clippy `match_like_matches_macro` / `needless_return`).","fix":"Simplify to `s.starts_with('|') && s.rfind('|').is_some_and(|i| i != 0)`.","locations":[{"ref":"src/comment.rs:997-1006","code":"  997 | fn is_table_item(mut s: &str) -> bool {\n  998 |     // This function may return false positive, but should get its job done in most cases (i.e.\n  999 |     // markdown tables with two column delimiters).\n 1000 |     s = s.trim_start();\n 1001 |     return s.starts_with('|')\n 1002 |         && match s.rfind('|') {\n 1003 |             Some(0) | None => false,\n 1004 |             _ => true,\n 1005 |         };\n 1006 | }","lines":10,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/comment.rs#L997-L1006"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"`add_repeat` sets `first = false` on the first loop iteration but `first` is never read for anything (the `if first { first = false; }` block has no effect). This is dead state left over from an earlier implementation.","fix":"Remove the unused `first` variable and the `if first { ... }` block.","locations":[{"ref":"src/macros.rs:820-828","code":"  820 |         let mut buffer = String::new();\n  821 |         let mut first = true;\n  822 | \n  823 |         // Parse '*', '+' or '?.\n  824 |         for tok in iter {\n  825 |             self.set_last_tok(&tok);\n  826 |             if first {\n  827 |                 first = false;\n  828 |             }","lines":9,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/macros.rs#L820-L828"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In `impl_serde`, the match pattern for named-field enum variants interpolates the wrong token: `quote!(#ident::v_ident{..})` uses the literal identifier `v_ident` instead of the captured variant ident `#v_ident`. This expands to `Ident::v_ident { .. }`, which does not match the actual variant and will fail to compile (or match the wrong thing) for any `config_type` enum that has a struct-like (named-fields) variant. The adjacent unnamed/unit arms correctly use `#v_ident`.","fix":"Change `quote!(#ident::v_ident{..})` to `quote!(#ident::#v_ident{..})`.","locations":[{"ref":"config_proc_macro/src/item_enum.rs:170-174","code":"  170 |         let pattern = match v.fields {\n  171 |             syn::Fields::Named(..) => quote!(#ident::v_ident{..}),\n  172 |             syn::Fields::Unnamed(..) => quote!(#ident::#v_ident(..)),\n  173 |             syn::Fields::Unit => quote!(#ident::#v_ident),\n  174 |         };","lines":5,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/config_proc_macro/src/item_enum.rs#L170-L174"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`build_rustfmt_from_src` ignores the exit status of `cargo build`. It only checks whether the `cargo` process could be spawned (`let Ok(_) = Command::new(\"cargo\")... .output()`), not whether the build succeeded. If `cargo build` runs but fails (compile error), the code proceeds to `std::fs::copy(dir.join(\"target/release/rustfmt\"), ...)`. The copy may then either fail (if no prior binary exists) or silently copy a stale binary, producing misleading diff-check results.","fix":"Inspect the `Output.status.success()` of the `cargo build` command and return `CheckDiffError::FailedSourceBuild` when it is not successful, before attempting the copy.","locations":[{"ref":"check_diff/src/lib.rs:592-602","code":"  592 |     let Ok(_) = Command::new(\"cargo\")\n  593 |         .current_dir(dir)\n  594 |         .args([\"build\", \"-q\", \"--release\", \"--bin\", \"rustfmt\"])\n  595 |         .output()\n  596 |     else {\n  597 |         return Err(CheckDiffError::FailedSourceBuild(\n  598 |             \"Error building rustfmt from source\",\n  599 |         ));\n  600 |     };\n  601 | \n  602 |     std::fs::copy(dir.join(\"target/release/rustfmt\"), &binary_path)?;","lines":11,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/check_diff/src/lib.rs#L592-L602"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"`FileLines::from_str` (used for `--file-lines` and `--config file_lines=...` test overrides) canonicalizes each span's path via `JsonSpan::into_tuple`, but the public `FileLines::from_str` path silently produces a `CannotCanonicalize` error only inside `into_tuple`; meanwhile `file_range_matches` later canonicalizes the queried file again. If a span path cannot be canonicalized at query time (file deleted/renamed between config load and formatting), `canonicalize_path_string` returns `None` and the lines silently fail to match (formatting is skipped) with no diagnostic, rather than reporting the problem.","fix":"When canonicalization fails at query time, surface a warning/error instead of silently treating the file as not-included, or document and test the intended fallback behavior.","locations":[{"ref":"src/config/file_lines.rs:243-257","code":"  243 |     fn file_range_matches<F>(&self, file_name: &FileName, f: F) -> bool\n  244 |     where\n  245 |         F: FnMut(&Range) -> bool,\n  246 |     {\n  247 |         let map = match self.0 {\n  248 |             // `None` means \"all lines in all files\".\n  249 |             None => return true,\n  250 |             Some(ref map) => map,\n  251 |         };\n  252 | \n  253 |         match canonicalize_path_string(file_name).and_then(|file| map.get(&file)) {\n  254 |             Some(ranges) => ranges.iter().any(f),\n  255 |             None => false,\n  256 |         }\n  257 |     }","lines":15,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/file_lines.rs#L243-L257"},{"ref":"src/config/file_lines.rs:292-297","code":"  292 | fn canonicalize_path_string(file: &FileName) -> Option<FileName> {\n  293 |     match *file {\n  294 |         FileName::Real(ref path) => path.canonicalize().ok().map(FileName::Real),\n  295 |         _ => Some(file.clone()),\n  296 |     }\n  297 | }","lines":6,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/file_lines.rs#L292-L297"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`config_path` calls `path.to_str().unwrap()` on the user-supplied config path in the not-found error branches. A non-UTF-8 path (legal on Linux) makes rustfmt panic instead of emitting a clean 'config file not found' error.","fix":"Use `path.display()` (or `to_string_lossy()`) for the error message instead of `to_str().unwrap()`.","locations":[{"ref":"src/config/mod.rs:536","code":"  536 |         Some(path) if !path.exists() => config_path_not_found(path.to_str().unwrap()),","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/mod.rs#L536"},{"ref":"src/config/mod.rs:542","code":"  542 |                 config_path_not_found(path.to_str().unwrap())","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/mod.rs#L542"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Several `parse_float_symbol(symbol).unwrap()` calls will panic if the symbol does not match the float regex. The function's own doc says it 'may panic or return wrong result' for non-float input. These run on `token_lit.symbol` for `LitKind::Float`/semantic-float literals, so they rely on rustc always producing a regex-matchable symbol. Because rustfmt also parses macro arguments and `-Zunpretty=expanded` output, a malformed float token reaching here would crash the formatter instead of degrading gracefully.","fix":"Propagate the `Result` (e.g. `parse_float_symbol(symbol).map_err(...)?` / fall back to emitting the raw snippet via `wrap_str`) instead of `unwrap()`.","locations":[{"ref":"src/expr.rs:78","code":"   78 |             let float_parts = parse_float_symbol(symbol).unwrap();","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/expr.rs#L78"},{"ref":"src/expr.rs:1386","code":" 1386 |     let float_parts = parse_float_symbol(symbol).unwrap();","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/expr.rs#L1386"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In `parse_lazy_static`, the comment at lines 36-37 already flags that the `eat_*` calls (Static, Ref, Colon, Eq, Semi) are unchecked: their results are discarded with `let _ = ...`. A malformed `lazy_static!` missing e.g. the `ref` keyword or `:` will silently be reformatted as if it were well-formed, potentially producing output that does not round-trip. Discarding `eat_keyword`/`eat` results means parse failures are not detected for these tokens.","fix":"Convert the `let _ = parser.eat_*` calls into checked parsing (return None / propagate error when the expected token is absent), as the FIXME suggests.","locations":[{"ref":"src/parse/macros/lazy_static.rs:34-48","code":"   34 |     while parser.token.kind != token::Eof {\n   35 |         // Parse a `lazy_static!` item.\n   36 |         // FIXME: These `eat_*` calls should be converted to `parse_or` to avoid\n   37 |         // silently formatting malformed lazy-statics.\n   38 |         let vis = parse_or!(parse_visibility, rustc_parse::parser::FollowedByType::No);\n   39 |         let _ = parser.eat_keyword(exp!(Static));\n   40 |         let _ = parser.eat_keyword(exp!(Ref));\n   41 |         let id = parse_or!(parse_ident);\n   42 |         let _ = parser.eat(exp!(Colon));\n   43 |         let ty = parse_or!(parse_ty);\n   44 |         let _ = parser.eat(exp!(Eq));\n   45 |         let expr = parse_or!(parse_expr);\n   46 |         let _ = parser.eat(exp!(Semi));\n   47 |         result.push((vis, id, ty, expr));\n   48 |     }","lines":15,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/parse/macros/lazy_static.rs#L34-L48"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`determine_operation` for `--print-config minimal` without a PATH prints `WARNING: PATH required ...` to stderr but then continues with `minimal_config_path = None` and proceeds to format (or reads stdin). The warning implies the option is required, yet execution continues silently producing no minimal config. This is an inconsistent contract compared to `current` (which errors) and `MinimalPathWithStdin` (which errors).","fix":"Either return an error (like the `current` case) when PATH is missing for `minimal`, or clearly document that minimal-config emission is skipped; don't emit a WARNING that suggests a hard requirement while silently continuing.","locations":[{"ref":"src/bin/main.rs:489-494","code":"  489 |             \"minimal\" => {\n  490 |                 minimal_config_path = path;\n  491 |                 if minimal_config_path.is_none() {\n  492 |                     eprintln!(\"WARNING: PATH required for `--print-config minimal`.\");\n  493 |                 }\n  494 |             }","lines":6,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/bin/main.rs#L489-L494"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`get_rustfmt_info` in cargo-fmt maps a non-success child exit to `result.code().unwrap_or(SUCCESS)`. When rustfmt is terminated by a signal (no exit code), `code()` is `None` and cargo-fmt reports SUCCESS (0) despite the child having failed. The fallback for an unknown-but-failed status should be a failure code, not success.","fix":"Use `result.code().unwrap_or(FAILURE)` (or 1) for the signal-terminated / unknown case.","locations":[{"ref":"src/cargo-fmt/main.rs:268-273","code":"  268 |     let result = command.wait()?;\n  269 |     if result.success() {\n  270 |         Ok(SUCCESS)\n  271 |     } else {\n  272 |         Ok(result.code().unwrap_or(SUCCESS))\n  273 |     }","lines":6,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/cargo-fmt/main.rs#L268-L273"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`run_rustfmt` in cargo-fmt collects all child exit statuses but returns only the *first* non-success exit code (`.filter_map(...).next()`). If different editions fail with different codes, only the first is surfaced; if an earlier edition succeeds and a later one fails, the failing code is still picked up (correct), but the overall design discards information and depends on `BTreeMap` ordering of editions. Minor: the success-of-all path is fine, but the comment/behavior could lose meaningful distinct exit codes.","fix":"Document the intent, or aggregate to a deterministic value (e.g. return the max/first failing code) and ensure a failure anywhere yields a non-zero exit (which it does); consider returning FAILURE when any child fails without a code.","locations":[{"ref":"src/cargo-fmt/main.rs:547-551","code":"  547 |     Ok(status\n  548 |         .iter()\n  549 |         .filter_map(|s| if s.success() { None } else { s.code() })\n  550 |         .next()\n  551 |         .unwrap_or(SUCCESS))","lines":5,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/cargo-fmt/main.rs#L547-L551"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`get_cargo_metadata` retries with empty `other_options` (dropping `--offline`) when the offline call fails, but discards the original error. If the retry also fails for an unrelated reason, the user sees only the second error and never learns the offline attempt failed, which can be confusing when diagnosing network/registry issues.","fix":"Include context from the first failure (or log it) when returning the second error so both failure modes are visible.","locations":[{"ref":"src/cargo-fmt/main.rs:554-572","code":"  554 | fn get_cargo_metadata(manifest_path: Option<&Path>) -> Result<cargo_metadata::Metadata, io::Error> {\n  555 |     let mut cmd = cargo_metadata::MetadataCommand::new();\n  556 |     cmd.no_deps();\n  557 |     if let Some(manifest_path) = manifest_path {\n  558 |         cmd.manifest_path(manifest_path);\n  559 |     }\n  560 |     cmd.other_options(vec![String::from(\"--offline\")]);\n  561 | \n  562 |     match cmd.exec() {\n  563 |         Ok(metadata) => Ok(metadata),\n  564 |         Err(_) => {\n  565 |             cmd.other_options(vec![]);\n  566 |             match cmd.exec() {\n  567 |                 Ok(metadata) => Ok(metadata),\n  568 |                 Err(error) => Err(io::Error::new(io::ErrorKind::Other, error.to_string())),\n  569 |             }\n  570 |         }\n  571 |     }\n  572 | }","lines":19,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/cargo-fmt/main.rs#L554-L572"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `rewrite_macro_def`, when an individual branch rewrite fails AND `context.macro_rewrite_failure` is set, the code substitutes the original snippet (`context.snippet(branch.body).trim()`) and returns Ok, silently emitting unformatted output. The adjacent TODO acknowledges that the rewrite error is swallowed and not reported. A user gets silently-unformatted macro arms with no diagnostic.","fix":"Surface the swallowed error to context.report (as the TODO notes) so users learn why a branch was left unformatted.","locations":[{"ref":"src/macros.rs:474-483","code":"  474 |         |branch| match branch.rewrite(context, arm_shape, multi_branch_style) {\n  475 |             Ok(v) => Ok(v),\n  476 |             // if the rewrite returned None because a macro could not be rewritten, then return the\n  477 |             // original body\n  478 |             // TODO(ding-young) report rewrite error even if we return Ok with original snippet\n  479 |             Err(_) if context.macro_rewrite_failure.get() => {\n  480 |                 Ok(context.snippet(branch.body).trim().to_string())\n  481 |             }\n  482 |             Err(e) => Err(e),\n  483 |         },","lines":10,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/macros.rs#L474-L483"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In `rewrite_last_item_with_overflow`, control-flow last items (If/ForLoop/Loop/While/Match) call `expr.rewrite(...)` (Option) and closures use `rewrite_last_closure(...).ok()`, both discarding the structured `RewriteError`. The resulting `None` is then propagated as a generic failure, losing the original error reason. The codebase otherwise threads `RewriteResult` for diagnostics; this branch drops it.","fix":"Where feasible, keep the `RewriteResult` (use `rewrite_result`) so the original error can be surfaced rather than collapsing to `None`.","locations":[{"ref":"src/overflow.rs:437","code":"  437 |                             closures::rewrite_last_closure(self.context, expr, shape).ok()","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/overflow.rs#L437"},{"ref":"src/overflow.rs:454","code":"  454 |                             expr.rewrite(self.context, shape)","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/overflow.rs#L454"},{"ref":"src/overflow.rs:458","code":"  458 |                     _ => expr.rewrite(self.context, shape),","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/overflow.rs#L458"},{"ref":"src/overflow.rs:461","code":"  461 |             item => item.rewrite(self.context, shape),","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/overflow.rs#L461"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`OutputWriter::writeln` unwraps every terminal operation (`t.fg(color).unwrap()`, `writeln!(t, ...).unwrap()`, `t.reset().unwrap()`). A transient terminal/IO error (e.g. broken pipe when piping rustfmt output to `head`) will panic rather than terminate cleanly. The non-terminal branch uses `println!`, which also panics on a closed pipe, but the explicit unwraps make the terminal path strictly worse.","fix":"Propagate or swallow IO errors instead of unwrapping (e.g. `let _ = writeln!(...)`), matching how other emit paths ignore broken-pipe errors.","locations":[{"ref":"src/rustfmt_diff.rs:163-176","code":"  163 |     pub(crate) fn writeln(&mut self, msg: &str, color: Option<term::color::Color>) {\n  164 |         match &mut self.terminal {\n  165 |             Some(ref mut t) => {\n  166 |                 if let Some(color) = color {\n  167 |                     t.fg(color).unwrap();\n  168 |                 }\n  169 |                 writeln!(t, \"{msg}\").unwrap();\n  170 |                 if color.is_some() {\n  171 |                     t.reset().unwrap();\n  172 |                 }\n  173 |             }\n  174 |             None => println!(\"{msg}\"),\n  175 |         }\n  176 |     }","lines":14,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/rustfmt_diff.rs#L163-L176"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`clone_repositories_for_diff_check` wraps a plain `HashMap` in `Arc<Mutex<..>>` and uses `std::thread::scope`, but scoped threads can already borrow non-`'static` data, so the `Arc` is unnecessary; a `&Mutex<HashMap<..>>` borrowed by the scope would suffice. After the scope, `Arc::into_inner(map).expect(\"All other threads are done\")` is used; if the Arc were ever cloned beyond the scope this could panic, but more importantly the whole Arc indirection is dead complexity given the scoped-thread guarantee.","fix":"Use `let map = Mutex::new(HashMap::new());` and borrow `&map` in the spawned closures; after the scope call `map.into_inner()` directly, removing the `Arc` and the `into_inner().expect(...)` dance. The same applies to the `errors` Arc in `check_diff` (lines 895-919).","locations":[{"ref":"check_diff/src/lib.rs:749-793","code":"  749 | pub fn clone_repositories_for_diff_check(\n  750 |     repositories: &[&str],\n  751 | ) -> Vec<Repository<tempfile::TempDir>> {\n  752 |     // Use a Hashmap to deduplicate any repositories\n  753 |     let map = Arc::new(Mutex::new(HashMap::new()));\n  754 | \n  755 |     std::thread::scope(|s| {\n  756 |         for url in repositories {\n  757 |             let map = Arc::clone(&map);\n  758 | \n  759 |             s.spawn(move || {\n  760 |                 let repo_name = get_repo_name(url);\n  761 |                 info!(\"Processing repo: {repo_name}\");\n  762 |                 let Ok(tmp_dir) = tempdir() else {\n  763 |                     warn!(\n  764 |                         \"Failed to create a tempdir for {}. Can't check formatting diff for {}\",\n  765 | :false,"description":"`Chain::make_subexpr_list` clones every expression in the chain (`expr.clone()` in `SubExpr` and in `pop_expr_chain`/`convert_try`), and `ChainItemKind::MethodCall` additionally clones the `PathSegment`, all generic args, and the full `ThinVec<Box<ast::Expr>>` of arguments. For deep chains with large argument expressions this is O(total AST size) of deep cloning per chain rewrite. The FIXME at lines 181-183 acknowledges this. Each chain rewrite may run multiple times during width trials, multiplying the cost.","fix":"Switch `SubExpr`/`ChainItemKind` to borrow via references or `Cow` (as the FIXME suggests) so only the synthesized `try!`->`?` nodes are owned, avoiding cloning the rest of the chain.","locations":[{"ref":"src/chains.rs:181-251","code":"  181 | // FIXME: we can't use a reference here because to convert `try!` to `?` we\n  182 | // synthesise the AST node. However, I think we could use `Cow` and that\n  183 | // would remove a lot of cloning.\n  184 | #[derive(Debug)]\n  185 | enum ChainItemKind {\n  186 |     Parent {\n  187 |         expr: ast::Expr,\n  188 |         parens: bool,\n  189 |     },\n  190 |     MethodCall(\n  191 |         ast::PathSegment,\n  192 |         Vec<ast::GenericArg>,\n  193 |         ThinVec<Box<ast::Expr>>,\n  194 |     ),\n  195 |     StructField(symbol::Ident),\n  196 |     TupleField(symbol::Ident, bool),\n  197 |     Await,\n  198 |     Use,\n  199 |     Yield,\n  200 |     Comment(String, CommentPosition),\n  201 | }\n  202 | \n  203 | impl ChainItemKind {\n  204 |     fn is_block_like(&self, context: &RewriteContext<'_>, reps: &str) -> bool {\n  205 |         match self {\n  206 |             ChainItemKind::Parent { expr, .. } => utils::is_block_expr(context, expr, reps),\n  207 |             ChainItemKind::MethodCall(..)\n  208 |             | ChainItemKind::StructField(..)\n  209 |             | ChainItemKind::TupleField(..)\n  210 |             | ChainItemKind::Await\n  211 |             | ChainItemKind::Use\n  212 |             | ChainItemKind::Yield\n  213 |             | ChainItemKind::Comment(..) => false,\n  214 |         }\n  215 |     }\n  216 | \n  217 |     fn is_tup_field_access(expr: &ast::Expr) -> bool {\n  218 |         match expr.kind {\n  219 |             ast::ExprKind::Field(_, ref field) => {\n  220 |                 field.name.as_str().chars().all(|c| c.is_digit(10))\n  221 |             }\n  222 |             _ => false,\n  223 |         }\n  224 |     }\n  225 | \n  226 |     fn from_ast(\n  227 |         context: &RewriteContext<'_>,\n  228 |         expr: &ast::Expr,\n  229 |         is_method_call_receiver: bool,\n  230 |     ) -> (ChainItemKind, Span) {\n  231 |         let (kind, span) = match expr.kind {\n  232 |             ast::ExprKind::MethodCall(ref call) => {\n  233 |                 let types = if let Some(ref generic_args) = call.seg.args {\n  234 |                     if let ast::GenericArgs::AngleBracketed(ref data) = **generic_args {\n  235 |                         data.args\n  236 |                             .iter()\n  237 |                             .filter_map(|x| match x {\n  238 |                                 ast::AngleBracketedArg::Arg(ref generic_arg) => {\n  239 |                                     Some(generic_arg.clone())\n  240 |                                 }\n  241 |                                 _ => None,\n  242 |                             })\n  243 |                             .collect::<Vec<_>>()\n  244 |                     } else {\n  245 |                         vec![]\n  246 |                     }\n  247 |                 } else {\n  248 |                     vec![]\n  249 |                 };\n  250 |                 let span = mk_sp(call.receiver.span.hi(), expr.span.hi());\n  251 |                 let kind = ChainItemKind::MethodCall(call.seg.clone(), types, call.args.clone());","lines":71,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a                  subexpr\n  541 |                 } else {\n  542 |                     expr.clone()\n  543 |                 }\n  544 |             }\n  545 |             _ => expr.clone(),\n  546 |         }\n  547 |     }","lines":45,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/chains.rs#L503-L547"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`canonicalize_path_string` calls `path.canonicalize()` (a filesystem syscall) on every range-matching query. `file_range_matches` is invoked per-line / per-range during formatting (`contains_line`, `intersects`, `contains_range`), so when `--file-lines` is in use the same path is canonicalized via a syscall repeatedly for the same file, instead of being canonicalized once and cached.","fix":"Canonicalize file paths once when building `FileLines` (the map keys are already canonicalized in `JsonSpan::into_tuple`), and look up by an already-canonicalized key in `file_range_matches` rather than canonicalizing on every call.","locations":[{"ref":"src/config/file_lines.rs:243-278","code":"  243 |     fn file_range_matches<F>(&self, file_name: &FileName, f: F) -> bool\n  244 |     where\n  245 |         F: FnMut(&Range) -> bool,\n  246 |     {\n  247 |         let map = match self.0 {\n  248 |             // `None` means \"all lines in all files\".\n  249 |             None => return true,\n  250 |             Some(ref map) => map,\n  251 |         };\n  252 | \n  253 |         match canonicalize_path_string(file_name).and_then(|file| map.get(&file)) {\n  254 |             Some(ranges) => ranges.iter().any(f),\n  255 |             None => false,\n  256 |         }\n  257 |     }\n  258 | \n  259 |     /// Returns `true` if `range` is fully contained in `self`.\n  260 |     #[allow(dead_code)]\n  261 |     pub(crate) fn contains(&self, range: &LineRange) -> bool {\n  262 |         self.file_range_matches(&range.file_na all `Symbol::intern(\"cfg_if\")` / `Symbol::intern(\"cfg_match\")` on every item examined during module resolution. `Symbol::intern` performs an interner lock + hash-map lookup/insert each call, whereas the symbol could be compared once or matched against a cached/pre-interned symbol.","fix":"Intern the symbol once (e.g. a `LazyLock<Symbol>` or compare `first_segment.ident.as_str() == \"cfg_if\"`) instead of re-interning per call.","locations":[{"ref":"src/modules.rs:598","code":"  598 |                 if first_segment.ident.name == Symbol::intern(\"cfg_if\") {","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/modules.rs#L598"},{"ref":"src/modules.rs:612","code":"  612 |                 if last_segment.ident.name == Symbol::intern(\"cfg_match\") {","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/modules.rs#L612"},{"ref":"src/modules/visitor.rs:58","code":"   58 |                 if first_segment.ident.name != Symbol::intern(\"cfg_if\") {","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/modules/visitor.rs#L58"},{"ref":"src/modules/visitor.rs:117","code":"  117 |                 if last_segment.ident.name != Symbol::intern(\"cfg_match\") {","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/modules/visitor.rs#L117"}]},{"id":"PERF_10","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`FlattenPair::flatten` eagerly calls `default_rewrite` for every node and stores the result in `list`. But `rewrite_all_pairs` first tries `rewrite_pairs_one_line`, which for non-let-chains is the common success path and uses the stored single-shape rewrites; the multi-line `default_rewrite` rewrites (computed with the nested/indented shape) are then discarded when the one-line attempt succeeds. For deep binop trees this perfo 4cc/src/git-rustfmt/main.rs#L20-L44"}]},{"id":"PERF_16","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"In `write_list`, line 393 recomputes the item width via `item.item.as_ref().map_or(0, |s| unicode_str_width(s))` even though `inner_item` is already bound at line 288 and its width is partly computed at line 304. Minor redundant `unicode_str_width` pass over the same string in the pre-comment branch on the hot list path.","fix":"Reuse the already-bound `inner_item` (e.g. `unicode_str_width(inner_item)`) instead of re-deriving it from `item.item`.","locations":[{"ref":"src/lists.rs:393","code":"  393 |                         line_len = item.item.as_ref().map_or(0, |s| unicode_str_width(s));","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lists.rs#L393"},{"ref":"src/lists.rs:288","code":"  288 |         let inner_item = item.item.as_ref().or_else(|err| Err(err.clone()))?;","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lists.rs#L288"},{"ref":"src/lists.rs:304","code":"  304 |         let mut item_last_line_width = unicode_str_width(item_last_line) + item_sep_len;","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/lists.rs#L304"}]},{"id":"PERF_17","type":"performance","type_label":"Performance","severity":"negligible","easy":false,"description":"`MacroBranch` and the macros 2.0 parser clone whole TokenStreams (`tok.clone()`, `tts.clone()`, `def.body.tokens.clone()`, `mac.args.tokens.clone()` throughout) rather than borrowing. The struct comment at lines 1273-1274 already records `FIXME: it would be more efficient to use references to the token streams rather than clone them`. For large macros these clones add up.","fix":"Where lifetimes permit, hold `&TokenStream`/iterators instead of owned clones.","locations":[{"ref":"src/macros.rs:1273-1281","code":" 1273 | // FIXME: it would be more efficient to use references to the token streams\n 1274 | // rather than clone them, if we can make the borrowing work out.\n 1275 | struct MacroBranch {\n 1276 |     span: Span,\n 1277 |     args_paren_kind: Delimiter,\n 1278 |     args: TokenStream,\n 1279 |     body: Span,\n 1280 |     whole_body: Span,\n 1281 | }","lines":9,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/macros.rs#L1273-L1281"},{"ref":"src/macros.rs:1220","code":" 1220 |         let args = TokenStream::new(vec![tok.clone()]);","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/macros.rs#L1220"},{"ref":"src/macros.rs:427","code":"  427 |     let ts = def.body.tokens.clone();","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/macros.rs#L427"}]},{"id":"PERF_18","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`rewrite_string` sizes the result buffer with `stripped_str.len().checked_next_power_of_two().unwrap_or(usize::MAX)`. Rounding up to the next power of two roughly doubles the allocation for typical strings (e.g. a 600-byte string reserves 1024), and the `unwrap_or(usize::MAX)` fallback would attempt a `usize::MAX` reservation (instant allocation abort) for extremely large inputs. The output is at most modestly larger than the input, so the power-of-two rounding is wasteful.","fix":"Reserve `stripped_str.len() + a small constant` (e.g. + 16) instead of the next power of two; this is a tight, panic-free capacity estimate.","locations":[{"ref":"src/string.rs:82-88","code":"   82 |     let mut cur_start = 0;\n   83 |     let mut result = String::with_capacity(\n   84 |         stripped_str\n   85 |             .len()\n   86 |             .checked_next_power_of_two()\n   87 |             .unwrap_or(usize::MAX),\n   88 |     );","lines":7,"link":"https://gi unction's documented semantics. The output happens to come out correct because the swapped names are then used in matching swapped positions, but the names actively mislead a reader: `mla` here holds the *before* string and `mlb` holds the *after* string. This is a copy-paste/naming hazard that will cause a real bug the moment someone 'fixes' an apparent inconsistency.","fix":"Rename the bindings to match the function's return order, e.g. `let (mlb, mla) = has_newlines_before_after_comment(snippet);`, and use them consistently; or rename the function's returned tuple to be self-describing.","locations":[{"ref":"src/attr.rs:260-276","code":"  260 | fn has_newlines_before_after_comment(comment: &str) -> (&str, &str) {\n  261 |     // Look at before and after comment and see if there are any empty lines.\n  262 |     let comment_begin = comment.find('/');\n  263 |     let len = comment_begin.unwrap_or_else(|| comment.len());\n  264 |     let mlb = count_newlines(&comment[..len]) > 1;\n  265 |     let mla = if comment_begin.is_none() {\n  266 |         mlb\n  267 |     } else {\n  268 |         comment\n  269 |             .chars()\n  270 |             .rev()\n  271 |             .take_while(|c| c.is_whitespace())\n  272 |             .filter(|&c| c == '\\n')\n  273 |             .count()\n  274 |             > 1\n  275 |     };\n  276 |     (if mlb { \"\\n\" } else { \"\" }, if mla { \"\\n\" } else { \"\" })","lines":17,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/attr.rs#L260-L276"},{"ref":"src/attr.rs:425","code":"  425 |                     let (mla, mlb) = has_newlines_before_after_comment(snippet);","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/attr.rs#L425"},{"ref":"src/attr.rs:465-466","code":"  465 |                             let snippet = context.snippet(missing_span);\n  466 |                             let (_, mlb) = has_newlines_before_after_comment(snippet);","lines":2,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/attr.rs#L465-L466"},{"ref":"src/attr.rs:498-499","code":"  498 |                         let snippet = context.snippet(missing_span);\n  499 |                         let (_, mlb) = has_newlines_before_after_comment(snippet);","lines":2,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/attr.rs#L498-L499"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Doc comment for `NewlineStyle::Unix` reads `/// Force CR (\\n).` The mnemonic 'CR' is wrong: `\\n` is LF (line feed), and CR is `\\r`. Unix line endings are LF, so the parenthesized escape is correct but the abbreviation 'CR' is mislabeled (likely a copy/paste slip from the neighboring `Windows`/CRLF variant).","fix":"Change the comment to `/// Force LF (\\n).` for the Unix variant.","locations":[{"ref":"src/config/options.rs:24-28","code":"   24 |     Windows,\n   25 |     /// Force CR (`\\n`).\n   26 |     Unix,\n   27 |     /// `\\r\\n` in Windows, `\\n` on other platforms.\n   28 |     Native,","lines":5,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/options.rs#L24-L28"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"Comment `// 1 = \";\"` at line 1377 actually documents two overheads (`// 6 = \"trait \", 2 = \" =\"`) on line 1377, while a separate `// 1 = \";\"` comment at line 1383 sits above the `trait_alias_bounds` binding rather than above the `shape.sub_width(1, ...)` it describes (the sub_width happens on line 1393). The `;`-overhead comment is detached from the code it annotates, making it easy to break during edits.","fix":"Move the `// 1 = \";\"` comment adjacent to the `shape.sub_width(1, ta.generics.span)?` call it documents.","locations":[{"ref":"src/items.rs:1383-1394","code":" 1383 |     // 1 = \";\"\n 1384 |     let trait_alias_bounds = TraitAliasBounds {\n 1385 |         generic_bounds: &ta.bounds,\n 1386 |         generics: &ta.generics,\n 1387 |     };\n 1388 |     let result = rewrite_assign_rhs(\n 1389 |         context,\n 1390 |         lhs,\n 1391 |         &trait_alias_bounds,\n 1392 |         &RhsAssignKind::Bounds,\n 1393 |         shape.sub_width(1, ta.generics.span)?,\n 1394 |     )?;","lines":12,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/items.rs#L1383-L1394"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment typos / inaccuracies in check_diff's `RustfmtRunner::format_code_from_path`: \"causes rustfmt to hang or rustfmt.\" is an incomplete sentence (looks like a copy-paste/edit artifact). Also `format_code`'s comment header misspells \"rusfmt\".","fix":"Fix the truncated sentence and the `rusfmt` -> `rustfmt` typo.","locations":[{"ref":"check_diff/src/lib.rs:295-298","code":"  295 |     // When rustfmt knows the file path it's able to skip formatting for files listed in the repo's\n  296 |     // rustfmt.toml `ignore` list. For example, this helps us skip files in r-l/rust that have\n  297 |     // been explicitly skipped because trying to format them causes rustfmt to hang or rustfmt.\n  298 |     // doesn't do a good job at formatting those files.","lines":4,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/check_diff/src/lib.rs#L295-L298"},{"ref":"check_diff/src/lib.rs:336","code":"  336 |     //  Run rusfmt to see if a diff is produced. Runs on the code specified","lines":1,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/check_diff/src/lib.rs#L336"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Doc comment for the chains module has a grammatical error / dropped words: 'we put each subexpression on a separate, much like the (default) function argument function argument strategy.' The word after 'separate' is missing (should be 'line') and 'function argument' is duplicated.","fix":"Reword to: 'we put each subexpression on a separate line, much like the (default) function argument strategy.'","locations":[{"ref":"src/chains.rs:8-10","code":"    8 | //! Whenever possible, the entire chain is put on a single line. If that fails,\n    9 | //! we put each subexpression on a separate, much like the (default) function\n   10 | //! argument function argument strategy.","lines":3,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/chains.rs#L8-L10"}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment on `get_inner_expr` says `// block.stmts.len() == 1 except with `|| {{}}``, but the code path is reached whenever `!needs_block(...)`, and `needs_block` returns false for `block.stmts.len() <= 1` (i.e. also for 0 statements). The comment understates the empty-block case it is actually guarding against, and `block.stmts.first()` returning `None` is the real reason the `if let Some(expr)` exists.","fix":"Reword the comment to state that `block.stmts` may have 0 or 1 statements here, hence the `first()` / `if let Some` handling.","locations":[{"ref":"src/closures.rs:107-117","code":"  107 |     if let ast::ExprKind::Block(ref block, ref label) = expr.kind {\n  108 |         if !needs_block(block, label, prefix, context) {\n  109 |             // block.stmts.len() == 1 except with `|| {{}}`;\n  110 |             // https://github.com/rust-lang/rustfmt/issues/3844\n  111 |             if let Some(expr) = block.stmts.first().and_then(stmt_expr) {\n  112 |                 return get_inner_expr(expr, prefix, context);\n  113 |             }\n  114 |         }\n  115 |     }\n  116 | \n  117 |     expr","lines":11,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/closures.rs#L107-L117"}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment on the `Config` struct field tuple says `// - 0: true if the value has been access` (truncated/typo) and also notes `// FIXME: 4 is probably unnecessary and duplicative`. The field-0 comment is grammatically broken ('has been access').","fix":"Fix the wording to `// - 0: true if the value has been accessed`.","locations":[{"ref":"src/config/config_type.rs:86-94","code":"   86 |             // For each config item, we store:\n   87 |             //\n   88 |             // - 0: true if the value has been access\n   89 |             // - 1: true if the option was manually initialized\n   90 |             // - 2: the option value\n   91 |             // - 3: true if the option is unstable\n   92 |             // - 4: true if the option was set manually from a CLI flag\n   93 |             // FIXME: 4 is probably unnecessary and duplicative\n   94 |             // https://github.com/rust-lang/rustfmt/issues/6252","lines":9,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/config_type.rs#L86-L94"}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The deprecation warning printed by `set_fn_args_layout` contains a stray period inside the message: `Use \\`fn_params_layout\\`. instead` (period before 'instead'), producing awkward user-facing output.","fix":"Remove the stray period: `Use \\`fn_params_layout\\` instead`.","locations":[{"ref":"src/config/config_type.rs:545-548","code":"  545 |                     eprintln!(\n  546 |                         \"Warning: the `fn_args_layout` option is deprecated. \\\n  547 |                         Use `fn_params_layout`. instead\"\n  548 |                     );","lines":4,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/config/config_type.rs#L545-L548"}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Comment `// 9 = `try `` is wrong: `\"try \".len()` is 4, not 9. The adjacent FIXME already suspects the constant predates a rename from `do catch `. `saturating_sub(9)` over-subtracts the budget by 5 (conservative, so only causes unnecessary wrapping, not overflow), and the comment misstates the value.","fix":"Use `shape.width.saturating_sub(\"try \".len())` (i.e. 4) and fix the comment to `// 4 = \"try \".len()`.","locations":[{"ref":"src/expr.rs:347-349","code":"  347 |                 // FIXME: 9 sounds like `\"do catch \".len()`, so may predate the rename\n  348 |                 // 9 = `try `\n  349 |                 let budget = shape.width.saturating_sub(9);","lines":3,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/expr.rs#L347-L349"}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The doc comment for `path_to_imported_ident` claims it returns `self` for `std::cmp::self`, but the function unconditionally returns `path.segments.last().unwrap().ident`; for the path `std::cmp::self` the last segment ident is the keyword `self`, which is fine, but the example is misleading because elsewhere `self`/`super`/`crate` segments are special-cased and normalized away (e.g. `foo::self` -> `foo`). The example does not reflect how the result is actually used and can mislead readers about `self`-handling.","fix":"Update the example to a representative non-keyword case, or note that `self`/`super`/`crate` tail segments are handled separately during normalization.","locations":[{"ref":"src/imports.rs:30-34","code":"   30 | /// Returns a name imported by a `use` declaration.\n   31 | /// E.g., returns `Ordering` for `std::cmp::Ordering` and `self` for `std::cmp::self`.\n   32 | pub(crate) fn path_to_imported_ident(path: &ast::Path) -> symbol::Ident {\n   33 |     path.segments.last().unwrap().ident\n   34 | }","lines":5,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/imports.rs#L30-L34"}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment `// 1 = \"(\"` immediately precedes the `combine_arg_with_callee` computation, which has nothing to do with a `(` width adjustment (it checks item count, expr-ness, attrs and ident length vs tab_spaces). The comment is stale/misplaced and misleads readers.","fix":"Remove the orphaned `// 1 = \"(\"` comment or move it next to the code it actually annotates.","locations":[{"ref":"src/overflow.rs:484-488","code":"  484 |         // 1 = \"(\"\n  485 |         let combine_arg_with_callee = self.items.len() == 1\n  486 |             && self.items[0].is_expr()\n  487 |             && !self.items[0].has_attrs()\n  488 |             && self.ident.len() < self.context.config.tab_spaces();","lines":5,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/overflow.rs#L484-L488"}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The `INDENT_BUFFER` comment states `INDENT_BUFFER.len() = 81` while the adjacent constant is `INDENT_BUFFER_LEN: usize = 80`. The buffer string is a leading '\\n' followed by 80 spaces (total 81 bytes), and `INDENT_BUFFER_LEN` is deliberately 80 (the usable spaces). The two numbers describing the same buffer (81 vs 80) with terse comments are easy to misread as inconsistent.","fix":"Expand the comment to explain that the buffer is '\\n' + 80 spaces = 81 bytes and that INDENT_BUFFER_LEN counts only the spaces.","locations":[{"ref":"src/shape.rs:19-22","code":"   19 | // INDENT_BUFFER.len() = 81\n   20 | const INDENT_BUFFER_LEN: usize = 80;\n   21 | const INDENT_BUFFER: &str =\n   22 |     \"\\n                                                                                \";","lines":4,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/shape.rs#L19-L22"}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"In `rewrite_fn_ptr` the comment says '6 = \"for<> \".len(), 4 = \"for<\".' but only `\"for<\"` (4 chars) and `\"> \"` are actually pushed; no offset of 6 or 4 is used in the surrounding code. The numeric annotations are stale/unused and misleading.","fix":"Remove the stale '6 = ...' / '4 = ...' length annotations or restore the offset computation they were meant to document.","locations":[{"ref":"src/types.rs:1104-1109","code":" 1104 |         result.push_str(\"for<\");\n 1105 |         // 6 = \"for<> \".len(), 4 = \"for<\".\n 1106 |         // This doesn't work out so nicely for multiline situation with lots of\n 1107 |         // rightward drift. If that is a problem, we could use the list stuff.\n 1108 |         result.push_str(lifetime_str);\n 1109 |         result.push_str(\"> \");","lines":6,"link":"https://github.com/rust-lang/rustfmt/blob/95dfb4cb589453758c15b8581ee591255b31a4cc/src/types.rs#L1104-L1109"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"`CfgIfVisitor` and `CfgMatchVisitor` are near-identical (same fields, `new`, `mods`, `Visitor` impl, and `visit_mac_inner` structure), differing only in `segments.first()` vs `segments.last()` and the expected symbol name. The same first/last segment-name check is also duplicated again in modules.rs (`is_cfg_if`/`is_cfg_match`). This is four copies of essentially one routine; a bug fix in one is easily missed in the others.","fix":"Factor a sing <script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
