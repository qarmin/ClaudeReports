ed.as_ref().and_then(|id| {\n   96 |                 self.selections.get(id).map(AsRef::as_ref).zip({\n   97 |                     let state = tree.state.downcast_mut::<State<Item>>();\n   98 | \n   99 |                     if state.selections.is_empty() {\n  100 |                         for list in &self.selections.lists {\n  101 |                             for (_, item) in &list.options {\n  102 |                                 state\n  103 |                                     .selections\n  104 |                                     .push((item.clone(), crate::Plain::default()));\n  105 |                             }\n  106 |                         }\n  107 |                     }\n  108 | \n  109 |                     state\n  110 |                         .selections\n  111 |                         .iter_mut()\n  112 |                         .find(|(i, _)| i == id)\n  113 |                         .map(|(_, p)| p)\n  114 |                 })\n  115 |             }),","lines":21}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In the Length::Shrink branch of horizontal layout, `visible_width -= spacing;` runs unconditionally after the loop. When the loop exits via the `else` branch (a button doesn't fit), `visible_width` was just reassigned to `max_size.width - max_height` (reserved space for the prev/next pagination buttons) and the loop `break`s before reaching the `visible_width += spacing` line -- so this value never had a trailing spacing added to it. The subsequent unconditional `-= spacing` incorrectly shrinks this reserved-space value by one spacing unit, slightly under-allocating the minimum width whenever pagination buttons are needed. (When the loop completes normally without breaking, the `-= spacing` correctly cancels a trailing `+= spacing` that was added after the last accepted button.)","fix":"Only subtract the trailing spacing when the loop completed without breaking through the fallback branch, e.g. track a `bool` for whether the break path was taken, or restructure so the early-break path sets the final value directly without involving the shared `-= spacing` correction.","locations":[{"ref":"src/widget/segmented_button/horizontal.rs:149-165","code":"  149 |             let mut visible_width = 0.0;\n  150 |             state.buttons_visible = 0;\n  151 | \n  152 |             for (button_size, _actual_size) in &state.internal_layout {\n  153 |                 visible_width += button_size.width;\n  154 | \n  155 |                 if max_size.width - spacing >= visible_width {\n  156 |                     state.buttons_visible += 1;\n  157 |                 } else {\n  158 |                     visible_width = max_size.width - max_height;\n  159 |                     break;\n  160 |                 }\n  161 | \n  162 |                 visible_width += spacing;\n  163 |             }\n  164 | \n  165 |             visible_width -= spacing;","lines":17}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"TextInput::diff() unfocuses the input whenever its on_input callback is None and manage_value is false, but it does this unconditionally on every diff() call while the condition holds, even for a TextInput that is not currently using on_input at all by design (e.g. read-only display variants). Separately, the condition `!self.manage_value || !self.value.is_empty() && state.tracked_value != self.value` relies on && binding tighter than ||, parsing as `(!self.manage_value) || (!self.value.is_empty() && state.tracked_value != self.value)`. This is easy to misread as `!(self.manage_value || (!self.value.is_empty() && ...))` and the lack of parentheses makes the intended precedence non-obvious to a future maintainer, increasing the chance of an incorrect edit.","fix":"Add explicit parentheses to make the intended precedence unambiguous: `if !self.manage_value || (!self.value.is_empty() && state.tracked_value != self.value) { ... }`. No behavior change is required, just clarify intent for future readers.","locations":[{"ref":"src/widget/text_input/input.rs:604-609","code":"  604 |         if !self.manage_value || !self.value.is_empty() && state.tracked_value != self.value {\n  605 |             state.tracked_value = self.value.clone();\n  606 |         } else if self.value.is_empty() {\n  607 |             self.value = state.tracked_value.clone();\n  608 |             // std::mem::swap(&mut state.tracked_value, &mut self.value);\n  609 |         }","lines":6}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"`open::portal::FileResponse::url()` calls `self.0.uris().first().expect(\"no files selected\")`, which panics if the portal returns zero URIs. The structurally identical `save::portal::Response::url()` handles the exact same situation safely by returning `Option<&Url>` via `.first()` without panicking. Since the open dialog's `file()`/`folder()` functions only check `Result` (any `Ok` is treated as success), a portal response that succeeds with an empty selection (e.g. due to a buggy or unusual portal backend) will panic deep inside application code that merely calls `.url()` on the response, instead of surfacing a recoverable error like the save-dialog path does.","fix":"Change `FileResponse::url()` to return `Option<&Url>` (mirroring `save::portal::Response::url()`), e.g. `pub fn url(&self) -> Option<&Url> { self.0.uris().first() }`, and update callers/doc examples to handle the `None` case instead of relying on a panic.","locations":[{"ref":"src/dialog/file_chooser/open.rs:208-216","code":"  208 |     impl FileResponse {\n  209 |         pub fn choices(&self) -> &[(String, String)] {\n  210 |             self.0.choices()\n  211 |         }\n  212 | \n  213 |         pub fn url(&self) -> &Url {\n  214 |             self.0.uris().first().expect(\"no files selected\")\n  215 |         }\n  216 |     }","lines":9},{"ref":"src/dialog/file_chooser/save.rs:159-170","code":"  159 |     /// A dialog response containing the selected file or folder.\n  160 |     pub struct Response(pub SelectedFiles);\n  161 | \n  162 |     impl Response {\n  163 |         pub fn choices(&self) -> &[(String, String)] {\n  164 |             self.0.choices()\n  165 |         }\n  166 | \n  167 |         pub fn url(&self) -> Option<&Url> {\n  168 |             self.0.uris().first()\n  169 |         }\n  170 |     }","lines":12}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":false,"description":"as_gtk4() defines three conceptually identical \"black shade overlay\" constants with inconsistent dark/light alpha values. `shade` (used for the global shade_color) uses alpha 0.32 in dark mode / 0.08 in light mode, matching Theme::build()'s canonical `shade` field (theme.rs ~1154-1158: dark=0.32, light=0.08). But `sidebar_shade`, `secondary_sidebar_shade`, and `backdrop_overlay` all use the opposite mapping: alpha 0.08 in dark mode / 0.32 in light mode. Since these are meant to represent the same kind of overlay (and `backdrop_overlay` is literally composited with the same intent as `shade`), this looks like the light/dark branches were swapped by copy-paste in two of the three definitions, producing visibly wrong (inverted) shading intensity for GTK sidebar/backdrop colors relative to the rest of the theme.","fix":"Make `sidebar_shade`, `secondary_sidebar_shade`, and `backdrop_overlay` use the same dark=0.32/light=0.08 mapping as `shade` (and as Theme::build()'s shade field), unless there is a documented design reason for sidebars to use the inverse intensity -- in which case add a comment explaining why, since right now it reads as an accidental inversion.","locations":[{"ref":"cosmic-theme/src/output/gtk4_output.rs:42-57","code":"   42 |         let sidebar_shade = to_rgba(if self.is_dark {\n   43 |             Rgba::new(0.0, 0.0, 0.0, 0.08)\n   44 |         } else {\n   45 |             Rgba::new(0.0, 0.0, 0.0, 0.32)\n   46 |         });\n   47 |         let backdrop_overlay = Srgba::new(1.0, 1.0, 1.0, if self.is_dark { 0.08 } else { 0.32 });\n   48 |         let sidebar_backdrop = to_rgba(over(backdrop_overlay, primary.base));\n   49 | \n   50 |         let secondary_sidebar_bg = to_rgba(secondary.base);\n   51 |         let secondary_sidebar_fg = to_rgba(secondary.on);\n   52 |         let secondary_sidebar_shade = to_rgba(if self.is_dark {\n   53 |             Rgba::new(0.0, 0.0, 0.0, 0.08)\n   54 |         } else {\n   55 |             Rgba::new(0.0, 0.0, 0.0, 0.32)\n   56 |         });\n   57 |         let secondary_sidebar_backdrop = to_rgba(over(backdrop_overlay, secondary.base));","lines":16},{"ref":"cosmic-theme/src/output/gtk4_output.rs:73-77","code":"   73 |         let shade = to_rgba(if self.is_dark {\n   74 |             Rgba::new(0.0, 0.0, 0.0, 0.32)\n   75 |         } else {\n   76 |             Rgba::new(0.0, 0.0, 0.0, 0.08)\n   77 |         });","lines":5}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"`Message::ShowMinimizeButton(value)` sets `self.show_maximize_button` instead of `self.show_minimize_button`. This is a copy-paste error from the adjacent `ShowMaximizeButton` arm: toggling the \"Show Minimize Button\" control in the demo UI actually changes the maximize-button state, leaving the minimize toggle non-functional and silently corrupting the maximize toggle's value.","fix":"Change line 108 to `Message::ShowMinimizeButton(value) => self.show_minimize_button = value,`.","locations":[{"ref":"examples/cosmic/src/window/desktop.rs:107-108","code":"  107 |             Message::ShowMaximizeButton(value) => self.show_maximize_button = value,\n  108 |             Message::ShowMinimizeButton(value) => self.show_maximize_button = value,","lines":2}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"When rendering a button, the right edge of the content bounds is computed as `bounds.width -= button_padding[0] - button_padding[2]` after `bounds.x` was already advanced by `button_padding[0]`. Every other place in this file/horizontal.rs that derives a content width from button_padding subtracts the SUM of both paddings (`width -= button_padding[0] + button_padding[2]`, see widget.rs:660, 677, 700-701, 726-727). Using a minus here is inconsistent: when left and right padding are equal the width is not reduced at all (it should shrink by 2x padding since x moved right by padding[0]), and when padding[2] > padding[0] the width actually grows past the button's right edge, causing visual overflow/clipping artifacts especially with asymmetric `button_padding`.","fix":"Change to `bounds.width -= f32::from(self.button_padding[0]) + f32::from(self.button_padding[2]);` to match the pattern used everywhere else in this file.","locations":[{"ref":"src/widget/segmented_button/widget.rs:1918-1919","code":" 1918 |             bounds.x += f32::from(self.button_padding[0]);\n 1919 |             bounds.width -= f32::from(self.button_padding[0]) - f32::from(self.button_padding[2]);","lines":2}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In `vertical_variant`, the accessibility name strings for the increment/decrement buttons are built from `spin_button.label` (the visible numeric value text) instead of `spin_button.name` (the dedicated a11y screen-reader name set via `.name()`). The horizontal variant correctly uses `spin_button.name`. This means vertical spin buttons announce the wrong accessible name to screen readers whenever `name` differs from `label`, which is the whole reason the separate `name` field/setter exists.","fix":"Change `[&spin_button.label, \" decrease\"].concat()` and `[&spin_button.label, \" increase\"].concat()` in `vertical_variant` to use `&spin_button.name` instead, matching `horizontal_variant`.","locations":[{"ref":"src/widget/spin_button.rs:251-265","code":"  251 |     let decrement_button = make_button(\n  252 |         &spin_button,\n  253 |         \"list-remove-symbolic\",\n  254 |         #[cfg(feature = \"a11y\")]\n  255 |         [&spin_button.label, \" decrease\"].concat(),\n  256 |         match spin_button.value == spin_button.min {\n  257 |             true => None,\n  258 |             false => Some(decrement),\n  259 |         },\n  260 |     );\n  261 |     let increment_button = make_button(\n  262 |         &spin_button,\n  263 |         \"list-add-symbolic\",\n  264 |         #[cfg(feature = \"a11y\")]\n  265 |         [&spin_button.label, \" increase\"].concat(),","lines":15}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In Theme::as_gtk4, `component_gtk4_css(\"accent\", accent)` is emitted twice in a row (lines 120 and 124), writing the exact same `@define-color accent_color/accent_bg_color/accent_fg_color` block twice into the generated CSS. This is dead duplicate output and strongly suggests a copy-paste mistake where a different component (e.g. primary/suggested) was intended for one of the two calls.","fix":"Remove the duplicate `component_gtk4_css(\"accent\", accent)` call, or replace it with whatever component was actually intended to be exported there.","locations":[{"ref":"cosmic-theme/src/output/gtk4_output.rs:120-125","code":"  120 |         css.push_str(&component_gtk4_css(\"accent\", accent));\n  121 |         css.push_str(&component_gtk4_css(\"destructive\", destructive));\n  122 |         css.push_str(&component_gtk4_css(\"warning\", warning));\n  123 |         css.push_str(&component_gtk4_css(\"success\", success));\n  124 |         css.push_str(&component_gtk4_css(\"accent\", accent));\n  125 |         css.push_str(&component_gtk4_css(\"error\", destructive));","lines":6}]},{"id":"CPY_7","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"`view_desktop_workspaces` passes `DesktopPage::Wallpaper` to `window.parent_page_button`, copy-pasted from `view_desktop_wallpaper` above it, instead of `DesktopPage::Workspaces`. The back-button on the Workspaces sub-page therefore displays the wrong label/icon and is wired to the wrong page identity for that button (cosmetic, but a clear leftover copy-paste bug).","fix":"Change line 257 to `window.parent_page_button(DesktopPage::Workspaces)`.","locations":[{"ref":"examples/cosmic/src/window/desktop.rs:255-257","code":"  255 |     fn view_desktop_workspaces<'a>(&'a self, window: &'a Window) -> Element<'a, Message> {\n  256 |         settings::view_column(vec![\n  257 |             window.parent_page_button(DesktopPage::Wallpaper),","lines":3}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"Both `subscription.rs` and `dbus.rs` call `CosmicConfigEntry::update_keys`, which can return non-empty `errors` (e.g. a key file contains malformed RON and fails to parse) together with an empty `changed`/`keys` list (because the field was not actually updated when the parse failed). In both call sites, the `Update` message carrying those errors is only sent to the application `if !keys.is_empty()` / `if !changed.is_empty()`. This means that whenever a config key changes on disk but fails to parse, the error is computed and then thrown away — the subscriber application is never notified that anything went wrong, and is left silently holding a stale/default value with no diagnostic at all, defeating the purpose of returning `errors` from `update_keys` in the first place.","fix":"Send the `Update` (or at least log the errors) whenever `errors` is non-empty, not only when `keys`/`changed` is non-empty. For example: `if !changed.is_empty() || !errors.is_empty() { output.send(...).await; }`.","locations":[{"ref":"cosmic-config/src/subscription.rs:123-137","code":"  123 |         ConfigState::Waiting(mut conf_data, watcher, mut rx, config) => match rx.next().await {\n  124 |             Some(keys) => {\n  125 |                 let (errors, changed) = conf_data.update_keys(&config, &keys);\n  126 | \n  127 |                 if !changed.is_empty() {\n  128 |                     _ = output\n  129 |                         .send(crate::Update {\n  130 |                             errors,\n  131 |                             keys: changed,\n  132 |                             config: conf_data.clone(),\n  133 |                         })\n  134 |                         .await;\n  135 |                 }\n  136 |                 ConfigState::Waiting(conf_data, watcher, rx, config)\n  137 |             }","lines":15},{"ref":"cosmic-config/src/dbus.rs:242-254","code":"  242 |                             let (errors, keys) = config.update_keys(&cosmic_config, &[args.key]);\n  243 |                             if !keys.is_empty() {\n  244 |                                 if let Err(err) = tx\n  245 |                                     .send(Update {\n  246 |                                         errors,\n  247 |                                         keys,\n  248 |                                         config: config.clone(),\n  249 |                                     })\n  250 |                                     .await\n  251 |                                 {\n  252 |                                     tracing::error!(\"Failed to send config update: {err}\");\n  253 |                                 }\n  254 |                             }","lines":13}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In the `notify` watcher callback, both the path-prefix-stripping error and the top-level `notify::Error` from the watcher are silently discarded with `//TODO: handle errors` and no logging. The rest of this same file uses `tracing::debug!`/`tracing::warn!` for far less important Flatpak path-resolution diagnostics, but actual watcher failures (which break live config reload entirely) are dropped on the floor, making misbehaving watches very hard to diagnose in the field.","fix":"Log the discarded errors with `tracing::warn!` or `tracing::error!` instead of swallowing them silently, e.g. `Err(err) => tracing::warn!(\"failed to strip config path prefix: {err}\")` and `Err(err) => tracing::warn!(\"config watcher error: {err}\")`.","locations":[{"ref":"cosmic-config/src/lib.rs:349-353","code":"  349 |                                 }\n  350 |                                 Err(_err) => {\n  351 |                                     //TODO: handle errors\n  352 |                                 }\n  353 |                             }","lines":5},{"ref":"cosmic-config/src/lib.rs:358-362","code":"  358 |                     }\n  359 |                     Err(_err) => {\n  360 |                         //TODO: handle errors\n  361 |                     }\n  362 |                 }","lines":5}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Theme::apply_vs_code reads the existing settings.json with `std::fs::read_to_string(&settings_file).unwrap_or_default()`, so when the file does not exist yet (very common on first run, since the function itself creates the parent directory if missing) `settings` becomes an empty string `\"\"`. It is then passed to `serde_json::from_str(&settings)?`, but `serde_json::from_str::<Value>(\"\")` returns an Err (unexpected end of input), which propagates via `?` as OutputError::Serde. So the very first time a user enables the VS Code theme export (no existing settings.json), apply_vs_code fails instead of treating the missing file as an empty JSON object. Note reset_vs_code has the same read pattern but masks the parse failure with `.unwrap_or_default()` on the Value itself, so the two functions handle the identical missing-file scenario inconsistently.","fix":"In apply_vs_code, fall back to `\"{}\"` (or directly to `serde_json::Value::Object(Default::default())`) when the settings file is missing/empty, instead of letting an empty string reach serde_json::from_str. For consistency, mirror reset_vs_code's `unwrap_or_default()` on the parsed Value, or better, make both functions use the same explicit empty-object fallback rather than relying on a panic-free default that doesn't actually parse.","locations":[{"ref":"cosmic-theme/src/output/vs_code.rs:280-289","code":"  280 |         let settings_file = vs_code_dir.join(\"settings.json\");\n  281 |         let settings = std::fs::read_to_string(&settings_file).unwrap_or_default();\n  282 |         let mut settings: serde_json::Value = serde_json::from_str(&settings)?;\n  283 |         settings[\"workbench.colorCustomizations\"] = serde_json::to_value(vs_theme).unwrap();\n  284 |         settings[\"window.autoDetectColorScheme\"] = serde_json::Value::Bool(true);\n  285 |         std::fs::write(\n  286 |             &settings_file,\n  287 |             serde_json::to_string_pretty(&settings).unwrap(),\n  288 |         )\n  289 |         .map_err(OutputError::Io)?;","lines":10},{"ref":"cosmic-theme/src/output/vs_code.rs:296-302","code":"  296 |         let mut config_dir = dirs::config_dir().ok_or(OutputError::MissingConfigDir)?;\n  297 |         config_dir.extend([\"Code\", \"User\", \"settings.json\"]);\n  298 |         let settings_file = config_dir;\n  299 |         // just remove the json entry for workbench.colorCustomizations\n  300 |         let settings = std::fs::read_to_string(&settings_file).unwrap_or_default();\n  301 |         let mut settings: serde_json::Value = serde_json::from_str(&settings).unwrap_or_default();\n  302 |         settings[\"workbench.colorCustomizations\"] = serde_json::Value::Null;","lines":7}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"`wayland_handler` (run on a dedicated OS thread spawned per applet activation-token subscription) calls `.unwrap()` on `Connection::from_socket(socket)`, `Connection::connect_to_env()`, and `registry_queue_init(&conn)`, and `.expect(...)` on inserting the wayland source. Any failure to connect to or initialize the Wayland connection (e.g. compositor restart, socket permission issue, race during panel startup) panics the spawned thread instead of reporting a recoverable error through the existing `TokenUpdate`/`output` channel that the rest of the module already uses for graceful shutdown (`TokenUpdate::Finished`).","fix":"Replace the `unwrap()`/`expect()` calls with proper error propagation: return a `Result` from `wayland_handler` (or send a `TokenUpdate::Finished`/new error variant through `tx` before returning) so `start_listening` in subscription.rs can detect the failure via `handle.is_finished()` without relying on a bare thread panic, and so the failure is logged via `tracing::error!` instead of an unstructured panic message.","locations":[{"ref":"src/applet/token/wayland_handler.rs:97-118","code":"   97 |     let socket = std::env::var(\"X_PRIVILEGED_WAYLAND_SOCKET\")\n   98 |         .ok()\n   99 |         .and_then(|fd| {\n  100 |             fd.parse::<RawFd>()\n  101 |                 .ok()\n  102 |                 .map(|fd| unsafe { UnixStream::from_raw_fd(fd) })\n  103 |         });\n  104 | \n  105 |     let conn = if let Some(socket) = socket {\n  106 |         Connection::from_socket(socket).unwrap()\n  107 |     } else {\n  108 |         Connection::connect_to_env().unwrap()\n  109 |     };\n  110 |     let (globals, event_queue) = registry_queue_init(&conn).unwrap();\n  111 | \n  112 |     let mut event_loop = calloop::EventLoop::<AppData>::try_new().unwrap();\n  113 |     let qh = event_queue.handle();\n  114 |     let wayland_source = WaylandSource::new(conn, event_queue);\n  115 |     let handle = event_loop.handle();\n  116 |     wayland_source\n  117 |         .insert(handle.clone())\n  118 |         .expect(\"Failed to insert wayland source.\");","lines":22}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In the dbus activation subscription, the first `output.send(...)` call (sending `Action::Cosmic(Action::DbusConnection(conn.clone()))`) ignores its `Result` entirely, while every other `output.send(...)` call in the same function (for `Activate` and the `DbusActivation` message forwarding) explicitly checks the result and logs via `tracing::error!` on failure. If the receiver has already been dropped at this point, the dropped-channel error is silently swallowed instead of being logged like its siblings.","fix":"Match the pattern used elsewhere in the function: `if let Err(err) = output.send(...).await { tracing::error!(?err, \"Failed to send message\"); }`.","locations":[{"ref":"src/dbus_activation.rs:46-50","code":"   46 |                         output\n   47 |                             .send(crate::Action::Cosmic(crate::app::Action::DbusConnection(\n   48 |                                 conn.clone(),\n   49 |                             )))\n   50 |                             .await;","lines":5}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"critical","easy":true,"description":"This example uses `cosmic::iced::Application` (the raw iced trait, see `impl Application for Window` at line 316 and `Window::run(settings)` in main.rs) instead of `cosmic::Application`. The `Window` struct (lines 144-166) has no `core` field, no `core()`/`core_mut()` methods, and there is no `Deref` impl anywhere in this module or its submodules that would provide one. Yet `update()` references `self.core.main_window_id().unwrap()` four times. This cannot compile (`no field 'core' on type '&mut Window'`); the example as committed is broken and cannot be used as a copy-paste starting point.","fix":"Either switch this example to implement `cosmic::Application` (which provides `core`/`core_mut`) and add a `core: Core` field to `Window`, or, if intentionally using raw `iced::Application`, remove the `self.core.main_window_id()` calls and use the appropriate iced-native window-targeting API (e.g. track the window id manually) for drag/close/minimize/maximize.","locations":[{"ref":"examples/cosmic/src/window.rs:144-166","code":"  144 | #[derive(Default)]\n  145 | pub struct Window {\n  146 |     bluetooth: bluetooth::State,\n  147 |     debug: bool,\n  148 |     demo: demo::State,\n  149 |     editor: editor::State,\n  150 |     desktop: desktop::State,\n  151 |     nav_bar: segmented_button::SingleSelectModel,\n  152 |     nav_id_to_page: segmented_button::SecondaryMap<Page>,\n  153 |     nav_bar_toggled_condensed: bool,\n  154 |     nav_bar_toggled: bool,\n  155 |     page: Page,\n  156 |     show_maximize: bool,\n  157 |     show_minimize: bool,\n  158 |     system_and_accounts: system_and_accounts::State,\n  159 |     theme: Theme,\n  160 |     title: String,\n  161 |     show_warning: bool,\n  162 |     warning_message: String,\n  163 |     scale_factor: f64,\n  164 |     scale_factor_string: String,\n  165 |     timeline: Rc<RefCell<Timeline>>,\n  166 | }","lines":23},{"ref":"examples/cosmic/src/window.rs:432-435","code":"  432 |             Message::Drag => return drag(self.core.main_window_id().unwrap()),\n  433 |             Message::Close => return close(self.core.main_window_id().unwrap()),\n  434 |             Message::Minimize => return minimize(self.core.main_window_id().unwrap(), true),\n  435 |             Message::Maximize => return toggle_maximize(self.core.main_window_id().unwrap()),","lines":4}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"Menu::List::update computes the hovered/selected option index purely from `(cursor_position.y / option_height) as usize` with no upper-bound check against `self.options.len()`. On ButtonPressed/FingerPressed this unchecked index is published directly to the caller-supplied `on_selected` callback (which ultimately becomes the index argument passed to the user's `on_selected: impl Fn(usize) -> Message` closure from `dropdown()`). If the cursor is at or past the bottom edge of the menu bounds (rounding error, or bounds slightly taller than `options.len() * option_height` due to layout rounding), the computed index can equal or exceed `options.len()`, and the dropdown will report a selection index that is out of range for the caller's own selections list -- a very common pattern is for consumers to immediately index their own data with this value, which will then panic outside this crate. Note that `List::draw` (a few lines below) does defensively clamp with `.min(self.options.len())`, showing the interaction code path was simply missed during a clamp that was added elsewhere.","fix":"Clamp/validate the computed index before storing/publishing it, e.g. `let new_hovered_option = ((cursor_position.y / option_height) as usize).min(self.options.len().saturating_sub(1));` and skip publishing entirely when `self.options.is_empty()`.","locations":[{"ref":"src/widget/dropdown/menu/mod.rs:489-533","code":"  489 |             Event::Mouse(mouse::Event::CursorMoved { .. }) => {\n  490 |                 if let Some(cursor_position) = cursor.position_in(layout.bounds()) {\n  491 |                     let text_size = self\n  492 |                         .text_size\n  493 |                         .unwrap_or_else(|| text::Renderer::default_size(renderer).0);\n  494 | \n  495 |                     let option_height =\n  496 |                         f32::from(self.text_line_height.to_absolute(Pixels(text_size)))\n  497 |                             + self.padding.y();\n  498 | \n  499 |                     let new_hovered_option = (cursor_position.y / option_height) as usize;\n  500 |                     let mut hovered_guard = self.hovered_option.lock().unwrap();\n  501 | \n  502 |                     if let Some(on_option_hovered) = self.on_option_hovered {\n  503 |                         if *hovered_guard != Some(new_hovered_option) {\n  504 |                             shell.publish(on_option_hovered(new_hovered_option));\n  505 |                         }\n  506 |                     }\n  507 | \n  508 |                     *hovered_guard = Some(new_hovered_option);\n  509 |                 }\n  510 |             }\n  511 |             Event::Touch(touch::Event::FingerPressed { .. }) => {\n  512 |                 if let Some(cursor_position) = cursor.position_in(layout.bounds()) {\n  513 |                     let text_size = self\n  514 |                         .text_size\n  515 |                         .unwrap_or_else(|| text::Renderer::default_size(renderer).0);\n  516 | \n  517 |                     let option_height =\n  518 |                         f32::from(self.text_line_height.to_absolute(Pixels(text_size)))\n  519 |                             + self.padding.y();\n  520 |                     let mut hovered_guard = self.hovered_option.lock().unwrap();\n  521 | \n  522 |                     *hovered_guard = Some((cursor_position.y / option_height) as usize);\n  523 | \n  524 |                     if let Some(index) = *hovered_guard {\n  525 |                         shell.publish((self.on_selected)(index));\n  526 |                         if let Some(close_on_selected) = self.close_on_selected.as_ref() {\n  527 |                             shell.publish(close_on_selected.clone());\n  528 |                         }\n  529 |                         shell.capture_event();\n  530 |                         return;\n  531 |                     }\n  532 |                 }\n  533 |             }","lines":45}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"Two distinct, simultaneously-rendered text input widgets (a `secure_input` and a plain `text_input`, both inside the same `settings::view_column`) are both given the same `INPUT_ID.clone()` widget id. The same file's parent module (window.rs:32) explicitly documents that assigning the same `id::Id` to multiple widgets \"causes a crash when a11y is enabled\" — yet this exact pattern is reproduced here unaddressed, risking the very crash the codebase's own comment warns about.","fix":"Give each text input its own unique `id::Id` (e.g. a second static `Lazy<id::Id>`), since `id::Id` values must be unique per concurrently-rendered widget.","locations":[{"ref":"examples/cosmic/src/window/demo.rs:483-499","code":"  483 |             cosmic::widget::text_input::secure_input(\n  484 |                 \"Type to search apps or type “?” for more options...\",\n  485 |                 &self.entry_value,\n  486 |                 Some(Message::Hidden),\n  487 |                 self.hidden,\n  488 |             )\n  489 |             .on_input(Message::InputChanged)\n  490 |             .size(20)\n  491 |             .id(INPUT_ID.clone())\n  492 |             .into(),\n  493 |             cosmic::widget::text_input(\"\", &self.entry_value)\n  494 |                 .label(\"Test Input\")\n  495 |                 .helper_text(\"test helper text\")\n  496 |                 .on_input(Message::InputChanged)\n  497 |                 .size(20)\n  498 |                 .id(INPUT_ID.clone())\n  499 |                 .into(),","lines":17}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"`AspectRatio` wraps an inner `Container` but, unlike its near-identical sibling `LayerContainer` (which delegates `tag()`, `state()`, `id()`, `set_id()`, and `drag_destinations()` to the inner container), `AspectRatio` does not override any of these five `Widget` trait methods. As a result it falls back to the default `Widget` implem \n  294 |     }\n  295 | }","lines":149}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"BuilderEntity (used inside Model::builder().insert(|b| ...)) is missing an `indent()` setter method, even though EntityMut (used via model.insert().indent(n)) has one, and Model itself exposes indent_set(). This means indentation can only be configured via the incremental insert() API, not via the builder() API, with no compiler error to indicate the feature is unavailable there -- it's simply absent, forcing users to discover the asymmetry by trial and error.","fix":"Add an `indent(mut self, indent: u16) -> Self` method to BuilderEntity that calls self.model.0.indent_set(self.id, indent), mirroring EntityMut::indent.","locations":[{"ref":"src/widget/segmented_button/model/builder.rs:41-152","code":"   41 | impl<SelectionMode: Default> BuilderEntity<SelectionMode>\n   42 | where\n   43 |     Model<SelectionMode>: Selectable,\n   44 | {\n   45 |     /// Activates the newly-inserted item.\n   46 |     #[allow(clippy::must_use_candidate, clippy::return_self_not_must_use)]\n   47 |     #[inline]\n   48 |     pub fn activate(mut self) -> Self {\n   49 |         self.model.0.activate(self.id);\n   50 |         self\n   51 |     }\n   52 | \n   53 |     /// Defines that the close button should appear\n   54 |     #[allow(clippy::must_use_candidate, clippy::return_self_not_must_use)]\n   55 |     #[inline]\n   56 |     pub fn closable(mut self) -> Self {\n   57 |         self.model.0.closable_set(self.id, true);\n   58 |         self\n   59 |     }\n   60 | \n   61 |     /// Associates extra data with an external secondary map.\n   62 |     ///\n   63 |     /// The secondary map internally uses a `Vec`, so should only be used for data that\n   64 |     /// is commonly associated.\n   65 |     #[allow(clippy::must_use_candidate, clippy::return_self_not_must_use)]\n   66 |     #[inline]\n   67 |     pub fn secondary<Data>(self, map t), unlike its sibling removal methods icon_remove, text_remove, and indent_remove, which all return Option<T> with the previously-stored value. This inconsistency means callers cannot retrieve or inspect data that was just removed via data_remove, even though the doc comment style and surrounding API suggest they could.","fix":"Change the signature to `pub fn data_remove<Data: 'static>(&mut self, id: Entity) -> Option<Data>` and return the downcast removed value, matching the pattern used by icon_remove/text_remove/indent_remove.","locations":[{"ref":"src/widget/segmented_button/model/mod.rs:206-211","code":"  206 |     pub fn data_remove<Data: 'static>(&mut self, id: Entity) {\n  207 |         self.storage\n  208 |             .0\n  209 |             .get_mut(&TypeId::of::<Data>())\n  210 |             .and_then(|storage| storage.remove(id));\n  211 |     }","lines":6}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":true,"description":"Value::insert inserts the new character as a single-grapheme String at the target index, then immediately discards that work and re-derives the ENTIRE grapheme vector from scratch by calling self.to_string() (concatenating all graphemes into a new String) and re-running unicode grapheme segmentation over the whole text. This runs on every single keystroke typed into a text input, making typing cost O(n) per character and the whole-string typing cost O(n^2) for an n-character input.","fix":"Avoid the full re-segmentation: after computing the new grapheme(s) introduced by inserting `c` next to its neighboring graphemes (only the boundary may change), splice only the affected region, or at minimum avoid the full to_string()+graphemes() round trip by re-segmenting only the substring around the insertion point (e.g., the previous grapheme + new char + next grapheme) and splicing the result back into self.graphemes.","locations":[{"ref":"src/widget/text_input/value.rs:97-105","code":"   97 |     /// Inserts a new `char` at the given grapheme `index`.\n   98 |     #[inline]\n   99 |     pub fn insert(&mut self, index: usize, c: char) {\n  100 |         self.graphemes.insert(index, c.to_string());\n  101 | \n  102 |         self.graphemes = UnicodeSegmentation::graphemes(&self.to_string() as &str, true)\n  103 |             .map(String::from)\n  104 |             .collect();\n  105 |     }","lines":9}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`resolve_desktop_entry` calls `cache.refresh()` (which performs a full filesystem walk of all XDG desktop entry directories via `fde::Iter::new(fde::default_paths())`, parsing every `.desktop` file) and then, if that lookup stage fails, falls through to `load_entry_via_app_ids`, which performs an entirely separate, redundant full filesystem walk and re-parses every `.desktop` file again instead of reusing `cache.entries()` that was just populated. On top of that, once a matching entry's path is found, the function parses that same file from disk yet again (`fde::DesktopEntry::from_path(path, ...)` at line 265) instead of reusing the already-parsed entry. For systems with hundreds of desktop files, this multiplies disk I/O and parsing work several times over for a single lookup.","fix":"Have `load_entry_via_app_ids` search `cache.entries()` directly (already loaded by the preceding `cache.refresh()`) instead of re-walking `fde::default_paths()` and re-parsing every file. If a `DesktopEntryData`-shaped intermediate result is needed, build it from the already-parsed `fde::DesktopEntry` in the cache rather than re-reading the file from disk a second time.","locations":[{"ref":"src/desktop.rs:170-200","code":"  170 | pub fn resolve_desktop_entry(\n  171 |     cache: &mut DesktopEntryCache,\n  172 |     context: &DesktopLookupContext<'_>,\n  173 |     options: &DesktopResolveOptions,\n  174 | ) -> fde::DesktopEntry {\n  175 |     let app_id = fde::unicase::Ascii::new(context.app_id.as_ref());\n  176 | \n  177 |     if let Some(entry) = fde::find_app_by_id(cache.entries(), app_id) {\n  178 |         return entry.clone();\n  179 |     }\n  180 | \n  181 |     cache.refresh();\n  182 |     if let Some(entry) = fde::find_app_by_id(cache.entries(), app_id) {\n  183 |         return entry.clone();\n  184 |     }\n  185 | \n  186 |     let candidate_ids = candidate_desktop_ids(context);\n  187 | \n  188 |     if let Some(entry) = try_match_cached(cache.entries(), &candidate_ids) {\n  189 |         return entry;\n  190 |     }\n  191 | \n  192 |     if let Some(entry) = load_entry_via_app_ids(\n  193 |         cache,\n  194 |         &candidate_ids,\n  195 |         options.include_no_display,\n  196 |         options.xdg_current_desktop.as_deref(),\n  197 |     ) {\n  198 |         cache.insert(entry.clone());\n  199 |         return entry;\n  200 |     }","lines":31},{"ref":"src/desktop.rs:235-272","code":"  235 | #[cfg(not(windows))]\n  236 | fn load_entry_via_app_ids(\n  237 |     cache: &DesktopEntryCache,\n  238 |     candidate_ids: &[String],\n  239 |     include_no_display: bool,\n  240 |     xdg_current_desktop: Option<&str>,\n  241 | ) -> Option<fde::DesktopEntry> {\n  242 |     if candidate_ids.is_empty() {\n  243 |         return None;\n  244 |     }\n  245 | \n  246 |     let candidate_refs: Vec<&str> = candidate_ids.iter().map(String::as_str).collect();\n  247 |     let locales = cache.locales().to_vec();\n  248 |     let iter_locales = locales.clone();\n  249 | \n  250 |     let desktop_iter = fde::Iter::new(fde::default_paths())\n  251 |         .filter_map(move |path| fde::DesktopEntry::from_path(path, Some(&iter_locales)).ok());\n  252 | \n  253 |     let app_iter = load_applications_for_app_ids(\n  254 |         desktop_iter,\n  255 |         &locales,\n  256 |         candidate_refs,\n  257 |         false,\n  258 |         include_no_display,\n  259 |         xdg_current_desktop,\n  260 |     );\n  261 | \n  262 |     let locales_for_load = cache.locales().to_vec();\n  263 |     for app in app_iter {\n  264 |         if let Some(path) = app.path {\n  265 |             if let Ok(entry) = fde::DesktopEntry::from_path(path, Some(&locales_for_load)) {\n  266 |                 return Some(entry);\n  267 |             }\n  268 |         }\n  269 |     }\n  270 | \n  271 |     None\n  272 | }","lines":38}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"find_key() performs a linear scan over the entire key_binds HashMap for every Button/ButtonDisabled/CheckBox menu item built in menu_items(). This turns what should be an O(1) HashMap lookup into an O(n) scan per item (O(n*m) for n items and m keybinds), defeating the purpose of using a HashMap. This runs on every menu tree construction (i.e. every time the menu view is rebuilt).","fix":"Build a reverse lookup map once, e.g. `HashMap<A, KeyBind>` (requires A: Hash + Eq, which MenuAction-bound types like Copy + Eq + PartialEq could be extended to support, or just build the reverse map with a Vec<(A, KeyBind)> linear fallback built once outside the loop), instead of re-scanning key_binds for every item inside the closure.","locations":[{"ref":"src/widget/menu/menu_tree.rs:223-230","code":"  223 |     fn find_key<A: MenuAction>(action: &A, key_binds: &HashMap<KeyBind, A>) -> String {\n  224 |         for (key_bind, key_action) in key_binds {\n  225 |             if action == key_action {\n  226 |                 return key_bind.to_string();\n  227 |             }\n  228 |         }\n  229 |         String::new()\n  230 |     }","lines":8},{"ref":"src/widget/menu/menu_tree.rs:254-254","code":"  254 |                     let key = find_key(&action, key_binds);","lines":1},{"ref":"src/widget/menu/menu_tree.rs:285-285","code":"  285 |                     let key = find_key(&action, key_binds);","lines":1},{"ref":"src/widget/menu/menu_tree.rs:315-315","code":"  315 |                     let key = find_key(&action, key_binds);","lines":1}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`ResponsiveContainer::layout` calls `self.content.as_widget_mut().layout(...)` up to three times per layout pass: once inside the `unwrap_or_else` closure for `unrestricted_size` (only when `self.size` is `None`), once again immediately after for `cur_unrestricted_size` with the exact same `&Limits::NONE` argument, and once more with the real `limits` for the final `node`. The first two calls are redundant (identical arguments) whenever `self.size` is `None`, and laying out an arbitrary widget subtree is recursive/expensive, so this triples layout cost for every responsive container on every layout pass (which can happen every frame during resize).","fix":"Compute the unrestricted layout once (`let cur_node = self.content.as_widget_mut().layout(&mut tree.children[0], renderer, &Limits::NONE);`) and reuse its `.size()` for both `unrestricted_size`'s fallback and `cur_unrestricted_size`, instead of invoking `layout` twice with identical arguments.","locations":[{"ref":"src/widget/responsive_container.rs:96-136","code":"   96 |         let state = tree.state.downcast_mut::<State>();\n   97 |         let mut unrestricted_size = self.size.unwrap_or_else(|| {\n   98 |             let node =\n   99 |                 self.content\n  100 |                     .as_widget_mut()\n  101 |                     .layout(&mut tree.children[0], renderer, &Limits::NONE);\n  102 |             node.size()\n  103 |         });\n  104 | \n  105 |         let cur_unrestricted_size = {\n  106 |             let node =\n  107 |                 self.content\n  108 |                     .as_widget_mut()\n  109 |                     .layout(&mut tree.children[0], renderer, &Limits::NONE);\n  110 |             node.size()\n  111 |         };\n  112 | \n  113 |         let max_size = limits.max();\n  114 | \n  115 |  the already-resolved spacing values down, or have the preset methods take an optional pre-fetched `Spacing` instead of re-locking THEME each time).","locations":[{"ref":"src/widget/button/icon.rs:33-120","code":"   33 | impl<Message> Button<'_, Message> {\n   34 |     pub fn new(icon: Icon) -> Self {\n   35 |         let guard = crate::theme::THEME.lock().unwrap();\n   36 |         let theme = guard.cosmic();\n   37 |         let padding = theme.space_xxs();\n   38 | \n   39 |         Self {\n   40 |             id: Id::unique(),\n   41 |             label: Cow::Borrowed(\"\"),\n   42 |             #[cfg(feature = \"a11y\")]\n   43 |             name: Cow::Borrowed(\"\"),\n   44 |             #[cfg(feature = \"a11y\")]\n   45 |             description: Cow::Borrowed(\"\"),\n   46 |             tooltip: Cow::Borrowed(\"\"),\n   47 |             on_press: None,\n   48 |             width: Length::Shrink,\n   49 |             height: Length::Shrink,\n   50 |             padding: Padding::from(padding),\n   51 |             spacing: theme.space_xxxs(),\n   52 |             icon_size: if icon.handle.symbolic { 16 } else { 24 },\n   53 |             line_height: 20,\n   54 |             font_size: 14,\n   55 |             font_weight: Weight::Normal,\n   56 |             class: ButtonClass::Icon,\n   57 |             variant: icon,\n   58 |         }\n   59 |     }\n   60 | \n   61 |     /// Applies the **Extra Small** button size preset.\n   62 |     pub fn extra_small(mut self) -> Self {\n   63 |         let guard = crate::theme::THEME.lock().unwrap();\n   64 |         let theme = guard.cosmic();\n   65 | \n   66 |         self.font_size = 14;\n   67 |         self.font_weight = Weight::Normal;\n   68 |         self.icon_size = 16;\n   69 |         self.line_height = 20;\n   70 |         self.padding = Padding::from(theme.space_xxs());\n   71 |         self.spacing = theme.space_xxxs();\n   72 | \n   73 |         self\n   74 |     }\n   75 | \n   76 |     /// Applies the **Medium** button size preset.\n   77 |     pub fn medium(mut self) -> Self {\n   78 |         let guard = crate::theme::THEME.lock().unwrap();\n   79 |         let theme = guard.cosmic();\n   80 | \n   81 |         self.font_size = 24;\n   82 |         self.font_weight = Weight::Normal;\n   83 |         self.icon_size = 32;\n   84 |         self.line_height = 32;\n   85 |         self.padding = Padding::from(theme.space_xs());\n   86 |         self.spacing = theme.space_xxs();\n   87 | \n   88 |         self\n   89 |     }\n   90 | \n   91 |     /// Applies the **Large** button size preset.\n   92 |     pub fn large(mut self) -> Self {\n   93 |         let guard = crate::theme::THEME.lock().unwrap();\n   94 |         let theme = guard.cosmic();\n   95 | \n   96 |         self.font_size = 28;\n   97 |         self.font_weight = Weight::Normal;\n   98 |         self.icon_size = 40;\n   99 |         self.line_height = 36;\n  100 |         self.padding = Padding::from(theme.space_xs());\n  101 |         self.spacing = theme.space_xxs();\n  102 | \n  103 |         self\n  104 |     }\n  105 | \n  106 |     /// Applies the **Extra Large** button size preset.\n  107 |     pub fn extra_large(mut self) -> Self {\n  108 |         let guard = crate::theme::THEME.lock().unwrap();\n  109 |         let theme = guard.cosmic();\n  110 |         let padding = theme.space_xs();\n  111 | \n  112 |         self.font_size = 32;\n  113 |         self.font_weight = Weight::Light;\n  114 |         self.icon_size = 56;\n  115 |         self.line_height = 44;\n  116 |         self.padding = Padding::from(padding);\n  117 |         self.spacing = theme.space_xxs();\n  118 | \n  119 |         self\n  120 |     }","lines":88}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"multi::widget's State.selections (a Vec<(Item, Plain)>) is used as an association list / cache from Item to its cached text Plain. Both `layout()` and `overlay()`'s width-measuring closure do a linear `iter_mut().find(...)`/`iter().position(...)` scan over this Vec per item per layout/overlay pass instead of using a map keyed by something O(1)-lookupable (or simply storing the Plain alongside the option in the Model). For large multi-list dropdowns (many lists/options) this turns each layout/overlay pass into O(n^2) work just to locate cached paragraphs for measurement.","fix":"Store the Plain paragraph directly alongside each option in the Model (or key the cache by list/option index instead of doing an Item equality scan) so paragraph lookup during layout/overlay is O(1) instead of O(n).","locations":[{"ref":"src/widget/dropdown/multi/widget.rs:95-115","code":"   95 |             self.selections.selected.as_ref().and_then(|id| {\n   96 |                 self.selections.get(id).map(AsRef::as_ref).zip({\n   97 |                     let state = tree.state.downcast_mut::<State<Item>>();\n   98 | \n   99 |                     if state.selections.is_empty() {\n  100 |                         for list in &self.selections.lists {\n  101 |                             for (_, item) in &list.options {\n  102 |                                 state\n  103 |                                     .selections\n  104 |                                     .push((item.clone(), crate::Plain::default()));\n  105 |                             }\n  106 |                         }\n  107 |                     }\n  108 | \n  109 |                     state\n  110 |                         .selections\n  111 |                         .iter_mut()\n  112 |                         .find(|(i, _)| i == id)\n  113 |                         .map(|(_, p)| p)\n  114 |                 })\n  115 |             }),","lines":21},{"ref":"src/widget/dropdown/multi/menu.rs:444-461","code":"  444 |                         current_offset += elem_height;\n  445 |                     }\n  446 |                 }\n  447 |             }\n  448 |             _ => {}\n  449 |         }\n  450 |     }\n  451 | \n  452 |     fn mouse_interaction(\n  453 |         &self,\n  454 |         _state: &Tree,\n  455 |         layout: Layout<'_>,\n  456 |         cursor: mouse::Cursor,\n  457 |         _viewport: &Rectangle,\n  458 |         _renderer: &crate::Renderer,\n  459 |     ) -> mouse::Interaction {\n  460 |         let is_mouse_over = cursor.is_over(layout.bounds());\n  461 | ","lines":18}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"HeaderBarWidget::layout (via HeaderBar::view) lays out the `center` element twice per layout pass when a center region is present: once with loose limits purely to measure `natural_width` (lines 211-215), and again with the actual constrained slot width to get the real node (lines 217-221). Since `center` is frequently a text widget (the window title), this means text shaping/measurement work is done twice every layout, which can matter on every resize/redraw for windows with long titles or many resizes in quick succession.","fix":"If avoidable, cache the natural (unconstrained) size from one layout call instead of issuing two separate `.layout()` calls on the same element, or document why the double layout is required (e.g. if `as_widget_mut().layout()` is not idempotent/cheap to call twice, consider exposing a cheaper `measure`-only path).","locations":[{"ref":"src/widget/header_bar.rs:206-227","code":"  206 |         if let Some(center) = &mut self.center {\n  207 |             let slot_start = start_width + gap;\n  208 |             let slot_end = (width - end_width - gap).max(slot_start);\n  209 |             let slot_width = slot_end - slot_start;\n  210 |             // this instead of `node.size().width` prevents center jitter as text ellipsizes\n  211 |             let natural_width = center\n  212 |                 .as_widget_mut()\n  213 |                 .layout(&mut tree.children[2], renderer, &limits.loose())\n  214 |   277 |     ) {\n  278 |         let _ = self.tx.unbounded_send((self.id, layout.bounds()));\n  279 |         self.container.draw(\n  280 |             tree,\n  281 |             renderer,\n  282 |             theme,\n  283 |             renderer_style,\n  284 |             layout,\n  285 |             cursor_position,\n  286 |             viewport,\n  287 |         );\n  288 |     }","lines":21}]},{"id":"PERF_9","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"Model::clear() clones the entire `order` VecDeque and then calls remove() once per entity. Each remove() call performs an O(n) linear scan via position() plus an O(n) VecDeque::remove, making clear() overall O(n^2) in the number of items. For typical tab-bar sizes this is unlikely to matter, but it's a needless inefficiency for an operation that could be done in O(n) by clearing the underlying collections directly.","fix":"Implement clear() by directly clearing items, order, storage, icons, indents, text, and divider_aboves, and resetting the selection state, instead of looping with per-item remove() calls.","locations":[{"ref":"src/widget/segmented_button/model/mod.rs:133-138","code":"  133 |     #[inline]\n  134 |     pub fn clear(&mut self) {\n  135 |         for entity in self.order.clone() {\n  136 |             self.remove(entity);\n  137 |         }\n  138 |     }","lines":6}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"medium","easy":false,"description":"The entire public Operation-based API for programmatically closing/opening a Dropdown is commented out (the `close`/`open` free functions in operation.rs, and the corresponding `dropdown::close`/`dropdown::open` Task constructors in mod.rs). The `Widget::operate` impl that would have dispatched into this machinery is also a no-op (just comments). As a result, `super::operation::Dropdown for State`'s `close()`/`open()` trait methods, and the `close_operation`/`open_operation` field                 }\n   61 |                                 })\n   62 |                             })\n   63 |                         };","lines":12}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"low","easy":false,"description":"Both async executors (`single.rs` single-threaded executor and `multi.rs` multi-threaded executor) implement `spawn` by discarding the `JoinHandle` returned from `tokio::runtime::Runtime::spawn`: `let _res = self.0.spawn(future);`. If the spawned future panics, tokio normally surfaces this through the dropped `JoinHandle`'s `JoinError` only if something polls/awaits it; here it is immediately dropped, so a panicking task silently disappears (the panic is reported to stderr by tokio's default panic hook but the application has no way to detect or react to the failure, and -- depending on the panic hook configuration -- the failure could go unnoticed entirely in a release build with custom panic handling).","fix":"If task failures should be observable, spawn a supervising task that awaits the `JoinHandle` and logs/reports `JoinError`s (panics or cancellations) via `tracing::error!`, instead of discarding the handle outright. At minimum, document why dropping the handle is acceptable for this executor's use case (iced expects `()`-returning futures, so panics are the only failure mode of interest).","locations":[{"ref":"src/executor/single.rs:25-27","code":"   25 |     fn spawn(&self, future: impl Future<Output = ()> + Send + 'static) {\n   26 |         let _res = self.0.spawn(future);\n   27 |     }","lines":3},{"ref":"src/executor/multi.rs:21-23","code":"   21 |     fn spawn(&self, future: impl Future<Output = ()> + Send + 'static) {\n   22 |         let _res = self.0.spawn(future);\n   23 |     }","lines":3}]},{"id":"DEAD_9","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"In the toggler Catalog::style match, the `is_toggled` bindings in `toggler::Status::Active { is_toggled {"id":"ARCH_12","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"`LayerContainer` and `AspectRatio` are two widget wrapper structs (each ~150-300 lines) that both wrap an inner `iced_widget::Container` and re-implement the entire `Widget` trait by forwarding nearly every method 1:1 to `self.container`, differing only in 1-2 methods (`draw` theme-swap for LayerContainer; `layout` limit-constraining for AspectRatio). The boilerplate forwarding (`children`, `diff`, `size`, `operate`, `update`, `mouse_interaction`, `overlay`, builder setters like `padding`/`width`/`height`/`max_width`/`max_height`/`align_x`/`align_y`/`center_x`/`center_y`/`center`/`class`) is duplicated near-verbatim between the two files, which is exactly the kind of divergence that produced the missing `id()`/`set_id()`/`drag_destinations()`/`tag()`/`state()` overrides bug in AspectRatio noted separately -- the two implementations have already silently drifted apart.","fix":"Extract a shared helper/macro (or a generic `ContainerWrapper<Extra>` struct holding the inner `Container` plus an extra per-variant field/hook) that implements the common `Widget` forwarding once, with each variant only supplying its differing `layout`/`draw` behavior. This removes the duplication and prevents future drift between the two wrappers.","locations":[{"ref":"src/widget/layer_container.rs:33-295","code":"   33 | impl<'a, Message, Renderer> LayerContainer<'a, Message, Renderer>\n   34 | where\n   35 |     Renderer: iced_core::Renderer,\n   36 |     // iced_widget::container::Style: From<crate::theme::Container>,\n   37 | {\n   38 |     /// Creates an empty [`Container`].\n   39 |     pub(crate) fn new<T>(content: T) -> Self\n   40 |     where\n   41 |         T: Into<Element<'a, Message, Theme, Renderer>>,\n   42 |     {\n   43 |         LayerContainer {\n   44 |             layer: None,\n   45 |             container: Container::new(content),\n   46 |         }\n   47 | ndSource, DndDestination, etc.) re-exports both the constructor and the type name. As a result, external users of the `cosmic::widget::cards(...)` builder can call its builder methods (`.width()`, `.anim_multiplier()`, `.duration()`, `.id()`) fluently, but cannot name the `Cards<'a, Message, Renderer>` type itself (e.g. to store it in a struct field or write a function returning it), and the public function technically leaks a type that is private-by-path, which is the kind of inconsistency `private_interfaces`-style lints flag.","fix":"Re-export the type alongside the constructor for consistency with every other widget in this module: change line 135 to `pub use cards::{Cards, cards};` (or make `mod cards` itself `pub`).","locations":[{"ref":"src/widget/mod.rs:133-135","code":"  133 | mod cards;\n  134 | #[doc(inline)]\n  135 | pub use cards::cards;","lines":3},{"ref":"src/widget/cards.rs:74-87","code":"   74 | pub struct Cards<'a, Message, Renderer = crate::Renderer>\n   75 | where\n   76 |     Renderer: iced_core::text::Renderer,\n   77 | {\n   78 |     id: Id,\n   79 |     show_less_button: Element<'a, Message, crate::Theme, Renderer>,\n   80 |     clear_all_button: Element<'a, Message, crate::Theme, Renderer>,\n   81 |     elements: Vec<Element<'a, Message, crate::Theme, Renderer>>,\n   82 |     expanded: bool,\n   83 |     can_show_more: bool,\n   84 |     width: Length,\n   85 |     anim_multiplier: f32,\n   86 |     duration: Duration,\n   87 | }","lines":14}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"critical","easy":true,"description":"In the `smol`-feature branch of the dbus activation subscription, a background thread is spawned that calls `_conn.clone()`, but no variable named `_conn` exists anywhere in scope -- only `conn` (bound by `if let Ok(conn) = builder.build().await`) is defined. This is a use of an undeclared identifier, which fails to compile (E0425) whenever the crate is built with `single-instance` and `smol` enabled together (both are independent, combinable Cargo features). The whole `single-instance` feature is unusable with the `smol` runtime as a result.","fix":"Change `let conn_clone = _conn.clone();` to `let conn_clone = conn.clone();`, capturing the actual `conn` connection variable defined a few lines above. Also confirm the closure correctly captures `conn` (clone it before moving into `std::thread::spawn` if needed).","locations":[{"ref":"src/dbus_activation.rs:52-63","code":"   52 |                         #[cfg(feature = \"smol\")]\n   53 |                         let handle = {\n   54 |                             std::thread::spawn(move || {\n   55 |                                 let conn_clone = _conn.clone();\n   56 | \n   57 |                                 zbus::block_on(async move {\n   58 |                                     loop {\n   59 |                                         conn_clone.executor().tick().await;\n   60 |                                     }\n   61 |                                 })\n   62 |                             })\n   63 |                         };","lines":12}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"high","easy":false,"description":"DndSource's `state.is_dragging` is only ever reset to false inside the `SourceEvent::Cancelled` or `SourceEvent::Finished` event arms. There is no fallback (timeout, window-focus-lost handling, Escape key, or widget-removal cleanup) for cases where the platform/compositor never emits one of those two events for an in-progress drag (e.g. the surface is destroyed, the compositor crashes/restarts, or the drag is otherwise abandoned). When that happens `is_dragging` stays stuck at true forever: `mouse_interaction` keeps returning `Grabbing` permanently for that widget, and `on_cancelled`/`on_finish` never fire, desyncing the widget's visible state from reality with no way to recover short of restarting the app.","fix":"Add a defensive reset path: e.g. clear `is_dragging` (and treat it as cancelled) on window focus-lost / CursorLeft-while-dragging events, or track a start Instant and time out the drag after a few seconds without a terminal Source event, publishing `on_cancelled` in that case.","locations":[{"ref":"src/widget/dnd_source.rs:258-271","code":"  258 |                         if let Some(left_pressed_position) = state.left_pressed_position\n  259 |                             && position.distance(left_pressed_position) > self.drag_threshold\n  260 |                         {\n  261 |                             if let Some(on_start) = self.on_start.as_ref() {\n  262 |                                 shell.publish(on_start.clone());\n  263 |                             }\n  264 |                             let offset = Vector::new(\n  265 |                                 left_pressed_position.x - layout.bounds().x,\n  266 |                                 left_pressed_position.y - layout.bounds().y,\n  267 |                             );\n  268 |                             self.start_dnd(clipboard, state.cached_bounds, offset);\n  269 |                             state.is_dragging = true;\n  270 |                             state.left_pressed_position = None;\n  271 |                         }","lines":14},{"ref":"src/widget/dnd_source.rs:280-297","code":"  280 |             Event::Dnd(DndEvent::Source(SourceEvent::Cancelled)) => {\n  281 |                 if state.is_dragging {\n  282 |                     if let Some(m) = self.on_cancelled.as_ref() {\n  283 |                         shell.publish(m.clone());\n  284 |                     }\n  285 |                     state.is_dragging = false;\n  286 |                     shell.capture_event();\n  287 |                 }\n  288 |             }\n  289 |             Event::Dnd(DndEvent::Source(SourceEvent::Finished)) => {\n  290 |                 if state.is_dragging {\n  291 |                     if let Some(m) = self.on_finish.as_ref() {\n  292 |                         shell.publish(m.clone());\n  293 |                     }\n  294 |                     state.is_dragging = false;\n  295 |                     shell.capture_event();\n  296 |                 }\n  297 |             }","lines":18},{"ref":"src/widget/dnd_source.rs:408-420","code":"  408 | /// Local state of the [`MouseListener`].\n  409 | #[derive(Debug, Default)]\n  410 | struct State {\n  411 |     left_pressed_position: Option<Point>,\n  412 |     is_dragging: bool,\n  413 |     cached_bounds: Rectangle,\n  414 | }\n  415 | \n  416 | impl State {\n  417 |     fn new() -> Self {\n  418 |         Self::default()\n  419 |     }\n  420 | }","lines":13}]},{"id":"OTHER_3","type":"other","type_label":"Other","severity":"high","easy":false,"description":"menu_roots_diff casts a shared reference (`&mt.item`, obtained from `root: &MenuTree` via `menu_roots.iter()`, an immutable iterator) to a raw `*const dyn Widget`, then to `*mut dyn Widget`, then dereferences it as `&mut` inside an unsafe block. This casts away the immutability guarantee of the original `&` borrow and produces a mutable alias to data that the type system believes is only shared-borrowed elsewhere (since `menu_roots: &mut [MenuTree<Message>]` is the actual mutable reference, but the inner `.iter()` only re-borrows it immutably before the cast happens). This is the exact pattern the `invalid_reference_casting` lint exists to catch (note the `#[allow(invalid_reference_casting)]` annotation acknowledging this), and is undefined behavior under Rust's aliasing model even if no observable corruption occurs in practice. The accompanying `//TODO: find a way to diff_children without unsafe code` comment confirms this is a known, unresolved workaround.","fix":"Change menu_roots.iter() to menu_roots.iter_mut() so the original borrow is already mutable, removing the need for the const-to-mut pointer cast entirely (the closure can then take `mt: &mut MenuTree` and produce `&mut dyn Widget` directly via a safe reborrow).","locations":[{"ref":"src/widget/menu/menu_bar.rs:124-151","code":"  124 | #[allow(invalid_reference_casting)]\n  125 | pub(crate) fn menu_roots_diff<Message>(menu_roots: &mut [MenuTree<Message>], tree: &mut Tree)\n  126 | where\n  127 |     Message: Clone + 'static,\n  128 | {\n  129 |     if tree.children.len() > menu_roots.len() {\n  130 |         tree.children.truncate(menu_roots.len());\n  131 |     }\n  132 | \n  133 |     tree.children\n  134 |         .iter_mut()\n  135 |         .zip(menu_roots.iter())\n  136 |         .for_each(|(t, root)| {\n  137 |             let mut flat = root\n  138 |                 .flattern()\n  139 |                 .iter()\n  140 |                 .map(|mt| {\n  141 |                     let widget = &mt.item;\n  142 |                     let widget_ptr = widget as *const dyn Widget<Message, crate::Theme, Renderer>;\n  143 |                     let widget_ptr_mut =\n  144 |                         widget_ptr as *mut dyn Widget<Message, crate::Theme, Renderer>;\n  145 |                     //TODO: find a way to diff_children without unsafe code\n  146 |                     unsafe { &mut *widget_ptr_mut }\n  147 |                 })\n  148 |                 .collect::<Vec<_>>();\n  149 | \n  150 |             t.diff_children(flat.as_mut_slice());\n  151 |         });","lines":28}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"medium","easy":true,"description":"Theme::to_high_contrast is a public, documented method (\"Convert the theme to a high-contrast variant\") whose body is `todo!()`, so calling it always panics. Since high-contrast palettes already exist as builder constructors (ThemeBuilder::dark_high_contrast/light_high_contrast), shipping an unimplemented public API that panics is a foot-gun for any downstream consumer who discovers and calls it.","fix":"Either implement the conversion (e.g. rebuild via ThemeBuilder using the existing palette but switching to the HighContrast* variant), or remove the method/mark it deprecated until implemented, so the public API surface doesn't contain a guaranteed panic.","locations":[{"ref":"cosmic-theme/src/model/theme.rs:169-173","code":"  169 |     #[inline]\n  170 |     /// Convert the theme to a high-contrast variant\n  171 |     pub fn to_high_contrast(&self) -> Self {\n  172 |         todo!();\n  173 |     }","lines":5}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"medium","easy":false,"description":"ContextMenu::update contains a self-acknowledged unresolved design gap: the comment at line 343 (\"XXX this should reset the state if there are no other copies of the state, which implies no dropdown menus open\") documents that the `reset` logic does not actually check whether other copies of `LocalState`/`MenuBarState` exist. Since `MenuBarState.inner` is an `RcWrapper` (reference-counted shared state), and the overlay built in `overlay()`/`create_popup()` clones `menu_bar_state` (so the live overlay and the tree-owned state alias the same inner data), the `reset` heuristic at lines 344-359 can behave unpredictably: it triggers based solely on `!d.open && !d.active_root.is_empty()` without regard to whether an overlay clone is still actively using that shared state, which is exactly the scenario the XXX comment flags as unhandled.","fix":"Resolve the XXX: either track a reference count / liveness flag on the shared inner state to know when it is safe to reset, or restructure so the popup overlay does not alias the same `RcWrapper` instance that `reset` mutates.","locations":[{"ref":"src/widget/context_menu.rs:340-359","code":"  340 |         let state = tree.state.downcast_mut::<LocalState>();\n  341 |         let bounds = layout.bounds();\n  342 | \n  343 |         // XXX this should reset the state if there are no other copies of the state, which implies no dropdown menus open.\n  344 |         let reset = self.window_id != window::Id::NONE\n  345 |             && state\n  346 |                 .menu_bar_state\n  347 |                 .inner\n  348 |                 .with_data(|d| !d.open && !d.active_root.is_empty());\n  349 | \n  350 |         let open = state.menu_bar_state.inner.with_data_mut(|state| {\n  351 |             if reset\n  352 |                 && let Some(popup_id) = state.popup_id.get(&self.window_id).copied()\n  353 |                 && let Some(handler) = self.on_surface_action.as_ref()\n  354 |             {\n  355 |                 shell.publish((handler)(crate::surface::Action::DestroyPopup(popup_id)));\n  356 |                 state.reset();\n  357 |             }\n  358 |             state.open\n  359 |         });","lines":20}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"medium","easy":false,"description":"`Toasts::push` only schedules the auto-dismiss timer (`tokio::time::sleep` followed by `on_close(id)`) under `#[cfg(feature = \"tokio\")]`; the `#[cfg(not(feature = \"tokio\"))]` branch just returns `Task::none()`. Elsewhere in the same crate (e.g. the wayland tooltip's delayed-popup logic) both `tokio` and `async-std` feature flags are supported for sleeping. Building libcosmic with the `async-std` feature instead of `tokio` silently disables toast auto-dismissal: toasts will accumulate (up to the internal `limit`) and only ever be removed by eviction or an explicit `Toasts::remove` call, never by their configured `Duration`.","fix":"Add an `#[cfg(feature = \"async-std\")]` branch using `async_std::task::sleep(duration).await` mirroring the pattern already used in src/widget/wayland/tooltip/widget.rs, so toast duration works consistently across the supported async runtimes.","locations":[{"ref":"src/widget/toaster/mod.rs:173-201","code":"  173 |     /// Add a new [`Toast`]\n  174 |     pub fn push(&mut self, toast: Toast<Message>) -> Task<Message> {\n  175 |         while self.toasts.len() >= self.limit {\n  176 |             self.toasts.remove(\n  177 |                 self.queue\n  178 |                     .pop_front()\n  179 |                     .expect(\"Queue must contain all toast ids\"),\n  180 |             );\n  181 |         }\n  182 | \n  183 |         #[cfg(feature = \"tokio\")]\n  184 |         let duration = toast.duration.duration();\n  185 | \n  186 |         let id = self.toasts.insert(toast);\n  187 |         self.queue.push_back(id);\n  188 | \n  189 |         #[cfg(feature = \"tokio\")]\n  190 |         {\n  191 |             let on_close = self.on_close;\n  192 |             crate::task::future(async move {\n  193 |                 tokio::time::sleep(duration).await;\n  194 |                 on_close(id)\n  195 |             })\n  196 |         }\n  197 |         #[cfg(not(feature = \"tokio\"))]\n  198 |         {\n  199 |             Task::none()\n  200 |         }\n  201 |     }","lines":29}]},{"id":"OTHER_7","type":"other","type_label":"Other","severity":"low","easy":false,"description":"`AspectRatio::constrain_limits` divides `size.width / size.height` and, in the else branch, `width / self.ratio` with no validation that `height` or `ratio` are non-zero/positive/finite. `ratio` is a public, unvalidated `f32` constructor parameter (`aspect_ratio_container(content, ratio)`), and `limits.min()` is commonly `Size::ZERO`, so a zero height yields `NaN` or `inf` from the division, and a zero/negative `ratio` passed by a caller propagates `NaN`/`inf`/wrong-signed sizes into the layout limits, which can cascade into rendering glitches or panics deeper in iced's layout/arithmetic.","fix":"Validate `ratio` in `AspectRatio::new`/`aspect_ratio_container` (e.g. `assert!(ratio.is_finite() && ratio > 0.0)` or clamp to a sane default), and guard `constrain_limits` against zero-height/zero-width inputs before dividing, e.g. returning the input `size` unchanged when either dimension is zero.","locations":[{"ref":"src/widget/aspect_ratio.rs:38-49","code":"   38 |     fn constrain_limits(&self, size: Size) -> Size {\n   39 |         let Size {\n   40 |             mut width,\n   41 |             mut height,\n   42 |         } = size;\n   43 |         if size.width / size.height > self.ratio {\n   44 |             width = self.ratio * height;\n   45 |         } else {\n   46 |             height = width / self.ratio;\n   47 |         }\n   48 |         Size { width, height }\n   49 |     }","lines":12},{"ref":"src/widget/aspect_ratio.rs:14-22","code":"   14 | pub fn aspect_ratio_container<'a, Message: 'static, T>(\n   15 |     content: T,\n   16 |     ratio: f32,\n   17 | ) -> AspectRatio<'a, Message, crate::Renderer>\n   18 | where\n   19 |     T: Into<Element<'a, Message, crate::Theme, crate::Renderer>>,\n   20 | {\n   21 |     AspectRatio::new(content, ratio)\n   22 | }","lines":9}]},{"id":"OTHER_8","type":"other","type_label":"Other","severity":"low","easy":true,"description":"In `sync_slot_positions`, `drag_item_index` is read out of `state.drag.as_ref()` into a snapshot tuple, and a few lines later is written straight back into `drag.item_index` (`drag.item_index = drag_item_index`) without ever being changed in between. The assignment is a no-op that adds confusion about whether `item_index` is supposed to be recomputed here (it visually suggests `item_index` tracks something dynamic, but it never changes during a drag).","fix":"Remove the redundant `drag.item_index = drag_item_index;` line (or, if `item_index` actually needs to be recomputed for some scenario, add a comment explaining why and fix the assignment to use a recomputed value instead of the unchanged snapshot).","locations":[{"ref":"src/widget/reorderable_flex_row/widget.rs:399-446","code":"  399 |         let Some(drag_snapshot) = state.drag.as_ref().map(|drag| {\n  400 |             (\n  401 |                 drag.key.clone(),\n  402 |                 drag.cursor_local,\n  403 |                 drag.pointer_offset,\n  404 |                 drag.item_index,\n  405 |             )\n  406 |         }) else {\n  407 |             for slot in slots {\n  408 | ing the already-computed `contents` string. Editor::contents() allocates a fresh String by concatenating every grapheme (self.value.to_string()), so this duplicates an O(n) allocation and string-build on every backspace keystroke for no reason.","fix":"Reuse the already-computed `contents` variable: replace `(on_input)(editor.contents())` with `(on_input)(contents.clone())` (or restructure so on_input is called before contents is consumed).","locations":[{"ref":"src/widget/text_input/input.rs:1975-1979","code":" 1975 |                         let contents = editor.contents();\n 1976 |                         let unsecured_value = Value::new(&contents);\n 1977 |                         state.tracked_value = unsecured_value.clone();\n 1978 |                         if let Some(on_input) = on_input {\n 1979 |                             let message = (on_input)(editor.contents());","lines":5}]},{"id":"OTHER_10","type":"other","type_label":"Other","severity":"negligible","easy":true,"description":"entity_at() takes `&mut self` even though its body only performs an immutable read (`self.order.get(position as usize).copied()`). This needlessly forces every caller to hold a mutable borrow of the model just to look up an entity by position, which is an unnecessary API restriction for a pure accessor.","fix":"Change the signature to `pub fn entity_at(&self, position: u16) -> Option<Entity>`.","locations":[{"ref":"src/widget/segmented_button/model/mod.rs:244-248","code":"  244 |     #[must_use]\n  245 |     #[inline]\n  246 |     pub fn entity_at(&mut self, position: u16) -> Option<Entity> {\n  247 |         self.order.get(position as usize).copied()\n  248 |     }","lines":5}]},{"id":"OTHER_11","type":"other","type_label":"Other","severity":"negligible","easy":true,"description":"start_tab_drag logs a hardcoded `data_len = 0` as the 'bytes' count of the drag payload, but the actual drag data constructed two lines later is `SimpleDragData::new(tab_drag.mime.clone(), vec![1])`
