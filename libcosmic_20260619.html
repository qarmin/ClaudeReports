<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"InnerList::layout computes `(lists - 1) as f32` where `lists = self.options.lists.len()` is a usize. When the multi-list dropdown Model has zero lists (e.g. freshly created via `dropdown::multi::model()` before any `insert` call, or after `Model::clear()`), `lists - 1` underflows. In debug builds this panics immediately when the dropdown overlay is laid out; in release builds it wraps to usize::MAX, which is then cast to f32 and multiplied into the intrinsic height, producing a nonsensical/huge layout size (effectively breaking or hanging layout for that widget).","fix":"Use `lists.saturating_sub(1)` instead of `lists - 1`, and additionally short-circuit layout to a zero/minimal size when `lists == 0`.","locations":[{"ref":"src/widget/dropdown/multi/menu.rs:304-323","code":"  304 |         let lists = self.options.lists.len();\n  305 |         let (descriptions, options) = self.options.lists.iter().fold((0, 0), |acc, l| {\n  306 |             (\n  307 |                 acc.0 + i32::from(l.description.is_some()),\n  308 |                 acc.1 + l.options.len(),\n  309 |             )\n  310 |         });\n  311 | \n  312 |         let vertical_padding = self.padding.y();\n  313 |         let text_line_height = f32::from(text_line_height);\n  314 | \n  315 |         let size = {\n  316 |             #[allow(clippy::cast_precision_loss)]\n  317 |             let intrinsic = Size::new(0.0, {\n  318 |                 let text = vertical_padding + text_line_height;\n  319 |                 let separators = ((vertical_padding / 2.0) + 1.0) * (lists - 1) as f32;\n  320 |                 let descriptions = (text + 4.0) * descriptions as f32;\n  321 |                 let options = text * options as f32;\n  322 |                 separators + descriptions + options\n  323 |             });","lines":20}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"critical","easy":true,"description":"In Popover's Overlay::layout, `position.x = (position.x - width / 2.0).clamp(0.0, bounds.width - width)` (and the analogous height/Bottom/Point clamps) panics whenever the popup content is wider or taller than the available overlay `bounds`, because `f32::clamp` panics if `min > max` and `bounds.width - width` (or `bounds.height - height`) goes negative in that case. This is easily reachable in real use: any popover/menu whose content is larger than the current window (e.g. a tall dropdown in a short window, or a window resized smaller than an open popup) will crash the whole application instead of merely clipping or repositioning the popup.","fix":"Clamp the max bound to be at least the min bound before calling clamp, e.g. `position.x = (position.x - width / 2.0).clamp(0.0, (bounds.width - width).max(0.0));` and apply the same `.max(0.0)` guard to every `bounds.* - size.*` expression used as the clamp upper bound in all three Position arms (Center, Bottom, Point).","locations":[{"ref":"src/widget/popover.rs:349-372","code":"  349 |         match self.position {\n  350 |             Position::Center => {\n  351 |                 // Position is set to the center of the widget\n  352 |                 let width = node.size().width;\n  353 |                 let height = node.size().height;\n  354 |                 position.x = (position.x - width / 2.0).clamp(0.0, bounds.width - width);\n  355 |                 position.y = (position.y - height / 2.0).clamp(0.0, bounds.height - height);\n  356 |             }\n  357 |             Position::Bottom => {\n  358 |                 // Position is set to the center bottom of the widget\n  359 |                 let width = node.size().width;\n  360 |                 let height = node.size().height;\n  361 |                 position.x = (position.x - width / 2.0).clamp(0.0, bounds.width - width);\n  362 |                 position.y = position.y.clamp(0.0, bounds.height - height);\n  363 |             }\n  364 |             Position::Point(_) => {\n  365 |                 // Position is using context menu logic\n  366 |                 let size = node.size();\n  367 |                 position.x = position.x.clamp(0.0, bounds.width - size.width);\n  368 |                 if position.y + size.height > bounds.height {\n  369 |                     position.y = (position.y - size.height).clamp(0.0, bounds.height - size.height);\n  370 |                 }\n  371 |             }\n  372 |         }","lines":24}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"State::selected_text takes a &str (the full text) and slices it with `text[left..right]` where `left`/`right` come from `self.cursor.state(&value)`. Cursor positions are grapheme indices (Value uses a Vec<String> of graphemes internally), not byte indices. For any text containing multi-byte UTF-8 characters (accented letters, CJK, emoji, etc.) this slices the str at a non-char-boundary or at the wrong offset, which panics on a non-boundary index or silently returns the wrong substring. This method is used to compute the text dragged out via DnD.","fix":"Convert the grapheme indices to byte indices before slicing, e.g. build a Value from text once, then use value.byte_index_at_grapheme(left) and value.byte_index_at_grapheme(right) to get byte offsets, and slice `text` with those. Alternatively return value.select(left, right).to_string() instead of slicing the raw &str.","locations":[{"ref":"src/widget/text_input/input.rs:2961-2969","code":" 2961 |     pub fn selected_text(&self, text: &str) -> Option<String> {\n 2962 |         let value = Value::new(text);\n 2963 |         match self.cursor.state(&value) {\n 2964 |             cursor::State::Index(_) => None,\n 2965 |             cursor::State::Selection { start, end } => {\n 2966 |                 let left = start.min(end);\n 2967 |                 let right = end.max(start);\n 2968 |                 Some(text[left..right].to_string())\n 2969 |             }","lines":9}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`syn::parse(input).unwrap()` will panic the whole proc-macro process if the derive input cannot be parsed (e.g. malformed but plausible-looking user code mid-edit, or unusual token sequences). A panicking proc-macro produces an opaque \"proc macro panicked\" diagnostic instead of a normal, well-located compile error, which is a noticeably worse experience for anyone using `#[derive(CosmicConfigEntry)]` and makes a typo far harder to diagnose than it should be.","fix":"Use `syn::parse_macro_input!(input as syn::DeriveInput)` instead of `syn::parse(input).unwrap()`, which automatically converts parse failures into a proper compiler error pointing at the offending span.","locations":[{"ref":"cosmic-config-derive/src/lib.rs:9","code":"    9 |     let ast = syn::parse(input).unwrap();","lines":1}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`lit_int.base10_parse::<u64>().unwrap()` panics the macro if a user writes `#[version = ...]` with a literal that isn't parseable as `u64` (e.g. a negative number like `#[version = -1]`, or a value larger than `u64::MAX`). This is legitimate-looking, easy-to-write user code (a typo'd version number) that crashes the proc-macro with an unhelpful panic message instead of a clean compile error pointing at the attribute.","fix":"Replace `.unwrap()` with a span-preserving `syn::Error`, e.g. propagate via `.map_err(|e| e.to_compile_error())` or use `?` inside a function returning `syn::Result` and emit the error tokens, so an invalid `#[version]` literal produces a normal compile error instead of a macro panic.","locations":[{"ref":"cosmic-config-derive/src/lib.rs:29","code":"   29 |                     }) => Some(lit_int.base10_parse::<u64>().unwrap()),","lines":1}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"`match self.tab_bar.active_data() { None => panic!(\"no tab is active\"), ... }` inside `view()` will crash the whole demo application if the tab bar model ever has no active entity. `view()` runs on every redraw, so this is a live panic risk rather than a one-time init assumption; defensive code in a copy-pasted example should not `panic!` from inside `view`.","fix":"Handle the `None` case gracefully (e.g. render an empty/placeholder view or fall back to the first tab) instead of panicking, since a `view` function should never crash the application.","locations":[{"ref":"examples/cosmic/src/window/demo.rs:256-257","code":"  256 |             match self.tab_bar.active_data() {\n  257 |                 None => panic!(\"no tab is active\"),","lines":2}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`view_window` calls `self.windows.get(&id).unwrap()` to look up per-window state. `Message::WindowClosed` removes the entry from `self.windows` as soon as the close event arrives, but iced may still invoke `view_window` for that same id afterward (e.g. during teardown, or if a close event and a final redraw race), which would cause the lookup to return `None` and panic. This is a copy-paste-prone multi-window pattern that demo authors are likely to replicate verbatim in their own multi-window apps.","fix":"Handle the missing-window case gracefully in `view_window`, e.g. return an empty `Element` or the main window's content when `self.windows.get(&id)` is `None`, instead of unwrapping.","locations":[{"ref":"examples/multi-window/src/window.rs:120-121","code":"  120 |     fn view_window(&self, id: window::Id) -> Element<'_, Self::Message> {\n  121 |         let w = self.windows.get(&id).unwrap();","lines":2}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Frames::from_decoder is a public function returning `Result<Self, Error>` but uses `frames.first().cloned().unwrap()` to extract the first frame, which panics if the decoded animation has zero frames. This is reachable from `load_from_path`/`load_from_name`, which load attacker- or user-supplied files from disk (icon/image paths); a corrupted or specially-crafted GIF/APNG/WebP that decodes to zero frames will crash the whole application instead of surfacing a normal `Err`, even though the function already has an `Err` path (`Error::Missing` is used elsewhere for exactly this kind of \"no usable frames\" condition).","fix":"Replace the `.unwrap()` with a proper early return, e.g. `let Some(first) = frames.first().cloned() else { return Err(Error::Missing); };`, and remove the now-inaccurate `# Panics` doc comment once the panic path is eliminated.","locations":[{"ref":"src/widget/frames.rs:160-166","code":"  160 |     pub fn from_decoder<'a, T: AnimationDecoder<'a>>(decoder: T) -> Result<Self, Error> {\n  161 |         let frames = decoder\n  162 |             .into_frames()\n  163 |             .map(|result| result.map(Frame::from))\n  164 |             .collect::<Result<Vec<_>, _>>()?;\n  165 | \n  166 |         let first = frames.first().cloned().unwrap();","lines":7}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"`view_cursor.position().unwrap()` is called unconditionally when creating a Wayland popup menu. Cursor::position() returns None when the cursor is Cursor::Unavailable, which can occur for touch-originated events (e.g. FingerLifted/FingerLost after an interrupted touch sequence) that route into this same handler. If a touch event with an unavailable cursor position reaches this call, the widget panics instead of gracefully ignoring the event.","fix":"Replace `.unwrap()` with a guarded early return, e.g. `let Some(pos) = view_cursor.position() else { return; };`, mirroring the `unwrap_or_default()` pattern used elsewhere in the same file for cursor positions.","locations":[{"ref":"src/widget/menu/menu_bar.rs:451-451","code":"  451 |                 view_cursor.position().unwrap(),","lines":1}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`unimplemented!(\"Only named fields are supported\")` and `unimplemented!(\"Only structs are supported\")` panic the proc-macro (with no useful span) if `#[derive(CosmicConfigEntry)]` is applied to a tuple struct, unit struct, enum, or union — all syntactically valid Rust that a user could plausibly attempt to derive this on before realizing it isn't supported.","fix":"Replace the `unimplemented!()` calls with `syn::Error::new_spanned(ast, \"...\").to_compile_error().into()` so unsupported input types produce a normal, well-located compile error instead of a macro panic.","locations":[{"ref":"cosmic-config-derive/src/lib.rs:41-47","code":"   41 |     let fields = match ast.data {\n   42 |         syn::Data::Struct(ref data_struct) => match data_struct.fields {\n   43 |             syn::Fields::Named(ref fields) => &fields.named,\n   44 |             _ => unimplemented!(\"Only named fields are supported\"),\n   45 |         },\n   46 |         _ => unimplemented!(\"Only structs are supported\"),\n   47 |     };","lines":7}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The public function `steps(c, len: NonZeroUsize)` computes `len.get() - 1` as a divisor (`i as f32 / (len.get() - 1) as f32`). NonZeroUsize permits the value 1, and `1 - 1 = 0` causes a usize underflow that panics in debug builds (and produces a division by zero, silently yielding all-NaN/garbage lightness values, in release builds). All internal call sites in this crate happen to pass 10/11/100, but `steps` is exported as public API (`pub mod steps`), so any external caller passing `NonZeroUsize::new(1)` hits this.","fix":"Special-case len.get() == 1 (return a single color, e.g. lightness 0.5 or 1.0) before entering the loop, or use `len.get().saturating_sub(1).max(1)` as the divisor to avoid the underflow/divide-by-zero for the degenerate single-step case.","locations":[{"ref":"cosmic-theme/src/steps.rs:10-23","code":"   10 | pub fn steps<C>(c: C, len: NonZeroUsize) -> Vec<Srgba>\n   11 | where\n   12 |     Oklcha: FromColor<C>,\n   13 | {\n   14 |     let mut c = Oklcha::from_color(c);\n   15 |     let mut steps = Vec::with_capacity(len.get());\n   16 | \n   17 |     for i in 0..len.get() {\n   18 |         let lightness = i as f32 / (len.get() - 1) as f32;\n   19 |         c.l = lightness;\n   20 |         steps.push(oklch_to_srgba_nearest_chroma(c))\n   21 |     }\n   22 |     steps\n   23 | }","lines":14}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"The public function `color_index(c, array_len)` computes `array_len - 1` for `.clamp(0, array_len - 1)`. If `array_len == 0` this underflows and panics in debug builds. All internal callers pass a fixed length of 100, but the function is publicly exported and documented as a general utility, so an external caller passing an empty slice's length triggers the panic.","fix":"Guard against array_len == 0, e.g. `if array_len == 0 { return 0; }` before computing the clamp bound, or change the clamp to `.clamp(0, array_len.saturating_sub(1))`.","locations":[{"ref":"cosmic-theme/src/steps.rs:104-110","code":"  104 | pub fn color_index<C>(c: C, array_len: usize) -> usize\n  105 | where\n  106 |     Oklcha: FromColor<C>,\n  107 | {\n  108 |     let c = Oklcha::from_color(c);\n  109 |     ((c.l * array_len as f32).round() as usize).clamp(0, array_len - 1)\n  110 | }","lines":7}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"Inside the async file-read task, `url.to_file_path().unwrap()` is called after only checking `url.scheme() == \"file\"`. `Url::to_file_path` can still return `Err` for a `file:` URL that has an unexpected host component or otherwise fails platform-specific decoding, even though the scheme check passed. A malformed or unusual file URL returned from the file-chooser portal would panic this async task instead of surfacing a normal `Message::Error`, which is the error-reporting path this same match arm already uses one branch below for the \"unknown scheme\" case.","fix":"Replace `url.to_file_path().unwrap()` with a match/`?` that converts the `Err(())` case into `Message::Error(format!(\"invalid file path in URL: {url}\"))`, mirroring how the unknown-scheme branch already reports errors instead of panicking.","locations":[{"ref":"examples/open-dialog/src/main.rs:111-118","code":"  111 |                 return cosmic::task::future(async move {\n  112 |                     // Check if its a valid local file path.\n  113 |                     let path = match url.scheme() {\n  114 |                         \"file\" => url.to_file_path().unwrap(),\n  115 |                         other => {\n  116 |                             return Message::Error(format!(\"{url} has unknown scheme: {other}\"));\n  117 |                         }\n  118 |                     };","lines":8}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`Context::suggested_window_size` calls `NonZeroU32::new(...).unwrap()` (twice) as the fallback when `suggested_bounds` is `None`. If `suggested.0`/`suggested.1` (from `suggested_size`, which for `Size::Hardcoded` comes directly from the public `window_size(width, height)` setter with no validation) is `0` and the corresponding padding is also `0`, the sum is `0` and `NonZeroU32::new(0)` returns `None`, causing an unwrap panic. `Size::Hardcoded((0, 0))` is reachable by any downstream applet calling `applet.window_size(0, 0)`.","fix":"Replace the `unwrap()` calls with a safe fallback (e.g. `NonZeroU32::new(...).unwrap_or(NonZeroU32::MIN)`), or validate/clamp the width/height arguments in `window_size()` to be at least 1.","locations":[{"ref":"src/applet/mod.rs:143-160","code":"  143 |         let configured_width = self\n  144 |             .suggested_bounds\n  145 |             .as_ref()\n  146 |             .and_then(|c| NonZeroU32::new(c.width as u32)) // TODO: should this be physical size instead of logical?\n  147 |             .unwrap_or_else(|| {\n  148 |                 NonZeroU32::new(suggested.0 as u32 + horizontal_padding as u32 * 2).unwrap()\n  149 |             });\n  150 | \n  151 |         let configured_height = self\n  152 |             .suggested_bounds\n  153 |             .as_ref()\n  154 |             .and_then(|c| NonZeroU32::new(c.height as u32))\n  155 |             .unwrap_or_else(|| {\n  156 |                 NonZeroU32::new(suggested.1 as u32 + vertical_padding as u32 * 2).unwrap()\n  157 |             });\n  158 |         info!(\"{configured_height:?}\");\n  159 |         (configured_width, configured_height)\n  160 |     }","lines":18},{"ref":"src/applet/mod.rs:174-176","code":"  174 |     pub fn window_size(&mut self, width: u16, height: u16) {\n  175 |         self.size = Size::Hardcoded((width, height));\n  176 |     }","lines":3}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"In MenuBar::draw, `layout.children().nth(*active).expect(\"Active child not found in menu?\")` assumes state.active_root[0] is always a valid index into the menu bar's current layout children. If the app dynamically changes the set of menu_roots (fewer roots) between the state being set and the next draw call while a root menu is still marked active, this index can be out of range and the widget panics instead of degrading gracefully (e.g. skipping the path highlight).","fix":"Use `.nth(*active)` result via `if let Some(...)` instead of `.expect(...)`, skipping the path-highlight draw silently when the active root index is no longer valid.","locations":[{"ref":"src/widget/menu/menu_bar.rs:716-723","code":"  716 |             if self.path_highlight.is_some() {\n  717 |                 let styling = theme.appearance(&self.style);\n  718 |                 if let Some(active) = state.active_root.first() {\n  719 |                     let active_bounds = layout\n  720 |                         .children()\n  721 |                         .nth(*active)\n  722 |                         .expect(\"Active child not found in menu?\")\n  723 |                         .bounds();","lines":8}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"next_end_of_word indexes self.graphemes[index..] directly with no clamping (unlike previous_start_of_word, which does call index.min(self.graphemes.len())). If ever called with an index greater than the number of graphemes, this slice indexing panics immediately instead of returning a safe fallback. All current call sites pass clamped indices, so this is not triggered today, but it is an inconsistency with the sibling method and an easy-to-hit panic if a future caller (or a refactor of Cursor) passes an out-of-range index.","fix":"Clamp the index at the top of the function, e.g. `let index = index.min(self.graphemes.len()); let next_string = &self.graphemes[index..].concat();`, mirroring the clamping already done in previous_start_of_word.","locations":[{"ref":"src/widget/text_input/value.rs:65-66","code":"   65 |     pub fn next_end_of_word(&self, index: usize) -> usize {\n   66 |         let next_string = &self.graphemes[index..].concat();","lines":2}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"critical","easy":false,"description":"`RcWrapper<T>` wraps `Rc<RefCell<T>>` (a non-thread-safe, non-atomically-refcounted type) and unconditionally implements `unsafe impl Send` and `unsafe impl Sync` for it. The `thread_id` assertions in `with_data`/`with_data_mut`/`overlay` only guard those three methods; `Clone` (which bumps the `Rc` strong count) performs no thread check at all, and `Drop` of the `Rc` (implicit whenever a `RcElementWrapper`/`RcWrapper` clone goes out of scope) is completely unguarded. If a clone is sent to another thread (which the unsafe Send/Sync impls explicitly allow) and is cloned or dropped there, the `Rc`'s non-atomic refcount is mutated concurrently from multiple threads without synchronization -- a real data race that is undefined behavior in Rust, not just a logic bug, and can lead to a use-after-free or double-free of the inner Element.","fix":"Replace `Rc<RefCell<T>>` with `Arc<Mutex<T>>` (or `Arc<RwLock<T>>`) if cross-thread sharing is genuinely required, since those use atomic refcounting and provide real synchronization. Alternatively, remove the `unsafe impl Send/Sync` entirely and keep `RcWrapper` strictly single-threaded, enforcing it at the type level (e.g. via `PhantomData<*const ()>` to make it `!Send`/`!Sync` automatically) rather than relying on runtime assertions that don't cover `Clone`/`Drop`.","locations":[{"ref":"src/widget/wrapper.rs:12-61","code":"   12 | #[derive(Debug)]\n   13 | pub struct RcWrapper<T> {\n   14 |     pub(crate) data: Rc<RefCell<T>>,\n   15 |     pub(crate) thread_id: ThreadId,\n   16 | }\n   17 | \n   18 | impl<T: Default> Default for RcWrapper<T> {\n   19 |     fn default() -> Self {\n   20 |         Self::new(T::default())\n   21 |     }\n   22 | }\n   23 | \n   24 | impl<T> Clone for RcWrapper<T> {\n   25 |     fn clone(&self) -> Self {\n   26 |         Self {\n   27 |             data: self.data.clone(),\n   28 |             thread_id: self.thread_id,\n   29 |         }\n   30 |     }\n   31 | }\n   32 | \n   33 | unsafe impl<M: 'static> Send for RcWrapper<M> {}\n   34 | unsafe impl<M: 'static> Sync for RcWrapper<M> {}\n   35 | \n   36 | impl<T> RcWrapper<T> {\n   37 |     pub fn new(element: T) -> Self {\n   38 |         Self {\n   39 |             data: Rc::new(RefCell::new(element)),\n   40 |             thread_id: thread::current().id(),\n   41 |         }\n   42 |     }\n   43 | \n   44 |     /// # Panics\n   45 |     ///\n   46 |     /// Will panic if used outside of original thread.\n   47 |     pub fn with_data<O>(&self, f: impl FnOnce(&T) -> O) -> O {\n   48 |         assert_eq!(self.thread_id, thread::current().id());\n   49 |         let my_ref: &T = &RefCell::borrow(self.data.as_ref());\n   50 |         f(my_ref)\n   51 |     }\n   52 | \n   53 |     /// # Panics\n   54 |     ///\n   55 |     /// Will panic if used outside of original thread.\n   56 |     pub fn with_data_mut<O>(&self, f: impl FnOnce(&mut T) -> O) -> O {\n   57 |         assert_eq!(self.thread_id, thread::current().id());\n   58 |         let my_refmut: &mut T = &mut RefCell::borrow_mut(self.data.as_ref());\n   59 |         f(my_refmut)\n   60 |     }\n   61 | }","lines":50}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"Model::remove() removes the entity from `items`, `storage`, and `order`, and deactivates it, but never clears the entity's entries from the `icons`, `indents`, `text`, and `divider_aboves` SecondaryMaps. slotmap::SecondaryMap is an independent structure from the owning SlotMap: removing a key from the SlotMap does NOT automatically purge entries from any SecondaryMap keyed by that same Entity. Since this widget is typically used for tab bars where tabs are repeatedly inserted and removed over the application's lifetime, each removed tab silently leaves orphaned text/icon/indent/divider entries behind forever, growing these maps unboundedly relative to the steady-state item count.","fix":"In remove(), also call self.icons.remove(id), self.indents.remove(id), self.text.remove(id), and self.divider_aboves.remove(id) (mirroring the existing storage.0.values_mut() cleanup loop).","locations":[{"ref":"src/widget/segmented_button/model/mod.rs:449-460","code":"  449 |     pub fn remove(&mut self, id: Entity) {\n  450 |         self.items.remove(id);\n  451 |         self.deactivate(id);\n  452 | \n  453 |         for storage in self.storage.0.values_mut() {\n  454 |             storage.remove(id);\n  455 |         }\n  456 | \n  457 |         if let Some(index) = self.position(id) {\n  458 |             self.order.remove(index as usize);\n  459 |         }\n  460 |     }","lines":12}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"`From<FontConfig> for iced::Font` leaks the font family `String` via `.leak()` into a process-lifetime static `BTreeSet<&'static str>` (`FAMILY_MAP`) whenever a not-yet-seen family name is converted. This is called from `font::default()`/`font::mono()`, which read the live `CosmicTk` config on every call. The set is never pruned, so each distinct family string ever seen over the process lifetime stays allocated forever. In normal usage (a small, mostly-static set of configured font names) this is bounded and harmless, but any code path that feeds many distinct/changing family name strings through this conversion (e.g. a live font-family preview/typing UI) would grow this set unboundedly with no way to reclaim the memory.","fix":"If font family names are expected to be a small fixed set (the common case), document the intentional leak-as-cache tradeoff explicitly. If dynamic/user-driven family names are a real use case, cap the cache size (e.g. LRU with a fixed capacity) or avoid leaking by using a reference-counted family name type (`Arc<str>`) instead of a `'static` leak.","locations":[{"ref":"src/config/mod.rs:154-177","code":"  154 | impl From<FontConfig> for iced::Font {\n  155 |     fn from(font: FontConfig) -> Self {\n  156 |         /// Stores static strings of the family names for `iced::Font` compatibility.\n  157 |         static FAMILY_MAP: LazyLock<RwLock<BTreeSet<&'static str>>> =\n  158 |             LazyLock::new(RwLock::default);\n  159 | \n  160 |         let read_guard = FAMILY_MAP.read().unwrap();\n  161 |         let name: Option<&'static str> = read_guard.get(font.family.as_str()).copied();\n  162 |         drop(read_guard);\n  163 | \n  164 |         let name = name.unwrap_or_else(|| {\n  165 |             let value: &'static str = font.family.clone().leak();\n  166 |             FAMILY_MAP.write().unwrap().insert(value);\n  167 |             value\n  168 |         });\n  169 | \n  170 |         Self {\n  171 |             family: iced::font::Family::Name(name),\n  172 |             weight: font.weight,\n  173 |             stretch: font.stretch,\n  174 |             style: font.style,\n  175 |         }\n  176 |     }\n  177 | }","lines":24}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"negligible","easy":false,"description":"In `start_listening`, when `handle.is_finished()` is true the code sends `TokenUpdate::Finished` and transitions to `State::Finished`, dropping the `JoinHandle` without ever calling `.join()` on it. While the OS thread has already finished running, the handle is dropped rather than joined, so the thread's resources (and any panic payload, since the wayland_handler thread can panic per the related finding) are never reaped/observed by the parent; this is a minor leak/diagnostic loss rather than a functional bug.","fix":"Call `let _ = handle.join();` before transitioning to `State::Finished` so the thread is properly reaped and any panic can be logged.","locations":[{"ref":"src/applet/token/subscription.rs:52-56","code":"   52 |         State::Waiting(mut rx, tx, handle) => {\n   53 |             if handle.is_finished() {\n   54 |                 _ = output.send(TokenUpdate::Finished).await;\n   55 |                 return State::Finished;\n   56 |             }","lines":5}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In the desktop settings retry loop, `attempts` (inferred u32) is incremented without bound every time `ashpd::desktop::settings::Settings::new()` fails, and is then used as the exponent in `2_u64.pow(attempts)`. If the xdg-desktop-portal is unavailable (e.g. non-portal environment, sandboxing issue, or the service crashes permanently), this loop retries forever, and once `attempts` reaches 64 the `pow` call overflows: in debug builds this panics, and in release builds it silently wraps to nonsensical sleep durations. This subscription runs for the lifetime of the application, so a never-recovering portal connection is a realistic scenario, not just a contrived edge case.","fix":"Cap the exponent before using it, e.g. `2_u64.pow(attempts.min(6))` (max 64s sleep), or use `attempts.saturating_add(1)` together with a clamped exponent so the value can never reach an overflow point.","locations":[{"ref":"src/theme/portal.rs:19-35","code":"   19 |                 let mut attempts = 0;\n   20 |                 loop {\n   21 |                     let Ok(settings) = ashpd::desktop::settings::Settings::new().await else {\n   22 |                         error!(\"Failed to create the settings proxy\");\n   23 |                         #[cfg(feature = \"tokio\")]\n   24 |                         ::tokio::time::sleep(::tokio::time::Duration::from_secs(\n   25 |                             2_u64.pow(attempts),\n   26 |                         ))\n   27 |                         .await;\n   28 |                         #[cfg(not(feature = \"tokio\"))]\n   29 |                         {\n   30 |                             futures::future::pending::<()>().await;\n   31 |                             unreachable!();\n   32 |                         }\n   33 |                         attempts += 1;\n   34 |                         continue;\n   35 |                     };","lines":17}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In the determinate progress bar segment rendering, `fill = (current_p - seg_lo) / (seg_hi - seg_lo)` divides by zero whenever `seg_hi == seg_lo`. This happens whenever a marker value equals exactly `0.0` (the first segment then has seg_lo=0.0 and seg_hi=markers[0]=0.0) or exactly `1.0` (the last segment has seg_lo=markers[last]=1.0 and seg_hi=1.0), both of which are valid post-clamp marker values accepted by the public `markers()` API. The result is `0.0/0.0 = NaN`, which then flows into `x_width * bounds.width * fill` as a rectangle width passed to the renderer, corrupting the draw call.","fix":"Guard the division: `let fill = if seg_hi > seg_lo { ((current_p - seg_lo) / (seg_hi - seg_lo)).min(1.0) } else { 1.0 };` or reject/clamp markers equal to 0.0/1.0 in the `markers()` setter so degenerate zero-width segments can never be created.","locations":[{"ref":"src/widget/progress_bar/linear.rs:229-306","code":"  229 |             let gap = if len != 0 {\n  230 |                 spacing / bounds.width\n  231 |             } else {\n  232 |                 0.0\n  233 |             };\n  234 |             let drawable = 1.0 - gap * len as f32;\n  235 | \n  236 |             for i in 0..=len {\n  237 |                 let (seg_lo, r_left) = if i == 0 {\n  238 |                     (0.0, radius)\n  239 |                 } else {\n  240 |                     (self.markers[i - 1], radius_inner)\n  241 |                 };\n  242 |                 let (seg_hi, r_right) = if i == len {\n  243 |                     (1.0, radius)\n  244 |                 } else {\n  245 |                     (self.markers[i], radius_inner)\n  246 |                 };\n  247 |                 let x_start = seg_lo * drawable + i as f32 * gap;\n  248 |                 let x_width = (seg_hi - seg_lo) * drawable;\n  249 |                 let segment_radius = [r_left, r_right, r_right, r_left].into();\n  250 | \n  251 |                 let fill = ((current_p - seg_lo) / (seg_hi - seg_lo)).min(1.0);\n  252 |                 let border = iced::Border {\n  253 |                     width: border_width,\n  254 |                     color: border_color,\n  255 |                     radius: segment_radius,\n  256 |                 };\n  257 | \n  258 |                 // empty segment\n  259 |                 if current_p < seg_lo {\n  260 |                     draw_quad(\n  261 |                         renderer,\n  262 |                         x_start * bounds.width,\n  263 |                         x_width * bounds.width,\n  264 |                         custom_style.track_color,\n  265 |                         border,\n  266 |                     );\n  267 |                 }\n  268 |                 // filled segment\n  269 |                 else if current_p > seg_hi {\n  270 |                     draw_quad(\n  271 |                         renderer,\n  272 |                         x_start * bounds.width,\n  273 |                         x_width * bounds.width,\n  274 |                         custom_style.bar_color,\n  275 |                         border,\n  276 |                     );\n  277 |                 }\n  278 |                 // partially filled segment\n  279 |                 else {\n  280 |                     draw_quad(\n  281 |                         renderer,\n  282 |                         x_start * bounds.width,\n  283 |                         x_width * bounds.width,\n  284 |                         custom_style.track_color,\n  285 |                         border,\n  286 |                     );\n  287 | \n  288 |                     renderer.with_layer(\n  289 |                         Rectangle {\n  290 |                             x: bounds.x + x_start * bounds.width,\n  291 |                             y: bounds.y,\n  292 |                             width: x_width * bounds.width * fill,\n  293 |                             height: bounds.height,\n  294 |                         },\n  295 |                         |renderer| {\n  296 |                             draw_quad(\n  297 |                                 renderer,\n  298 |                                 x_start * bounds.width,\n  299 |                                 x_width * bounds.width,\n  300 |                                 custom_style.bar_color,\n  301 |                                 border,\n  302 |                             );\n  303 |                         },\n  304 |                     );\n  305 |                 }\n  306 |             }","lines":78}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"next_tab_sensitive computes `self.model.order.len() - state.buttons_visible` using unchecked usize subtraction. `state.buttons_visible` is state left over from the previous `layout()` pass, while `self.model.order` reflects the current model. If the application removes items from the model (e.g. closes several tabs) between layout passes, `buttons_visible` can exceed the new `order.len()`, causing this subtraction to underflow: a panic in debug builds or a huge wrapped value in release builds that would then make pagination behave incorrectly. This function is called from `update`, `operate`, and `draw`, all of which run against a model reference that can be smaller than what produced the cached `buttons_visible`.","fix":"Use a saturating/checked subtraction, e.g. `state.buttons_offset < self.model.order.len().saturating_sub(state.buttons_visible)`, or clamp `buttons_visible` to `self.model.order.len()` before computing sensitivity.","locations":[{"ref":"src/widget/segmented_button/widget.rs:598-600","code":"  598 |     fn next_tab_sensitive(&self, state: &LocalState) -> bool {\n  599 |         state.buttons_offset < self.model.order.len() - state.buttons_visible\n  600 |     }","lines":3}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In the D-Bus watcher reconnect loop, `attempts` (a `u32`) is incremented on every failure to create the watcher, subscribe to changes, or subscribe to owner-changed events, and is only reset to 0 after a successfully received change. If the cosmic-settings-daemon is unavailable or stays down for an extended period (plausible: not installed, crashed, or slow to start), `attempts` grows without bound across the loop's three failure points. `2_u64.pow(attempts)` will panic on overflow once `attempts` reaches 64 in debug builds (and silently wrap in release), and even before that the unbounded exponential backoff produces absurd sleep durations (e.g. `2^40` seconds) long before the panic threshold, effectively wedging the subscription forever instead of retrying at a sane capped interval.","fix":"Cap `attempts` before computing the backoff, e.g. `2_u64.pow(attempts.min(6))` to cap sleeps at 64 seconds, and/or saturate the counter itself with `attempts = attempts.saturating_add(1).min(SOME_MAX)`.","locations":[{"ref":"cosmic-config/src/dbus.rs:104-180","code":"  104 |                     let mut attempts = 0;\n  105 | \n  106 |                     loop {\n  107 |                         let watcher = if is_state {\n  108 |                             Watcher::new_state(&settings_daemon, config_id, version).await\n  109 |                         } else {\n  110 |                             Watcher::new_config(&settings_daemon, config_id, version).await\n  111 |                         };\n  112 |                         let Ok(watcher) = watcher else {\n  113 |                             tracing::error!(\"Failed to create watcher for {config_id}\");\n  114 | \n  115 |                             #[cfg(feature = \"tokio\")]\n  116 |                             ::tokio::time::sleep(::tokio::time::Duration::from_secs(\n  117 |                                 2_u64.pow(attempts),\n  118 |                             ))\n  119 |                             .await;\n  120 |                             #[cfg(feature = \"async-std\")]\n  121 |                             async_std::task::sleep(std::time::Duration::from_secs(\n  122 |                                 2_u64.pow(attempts),\n  123 |                             ))\n  124 |                             .await;\n  125 |                             #[cfg(not(any(feature = \"tokio\", feature = \"async-std\")))]\n  126 |                             {\n  127 |                                 pending::<()>().await;\n  128 |                                 unreachable!();\n  129 |                             }\n  130 |                             attempts += 1;\n  131 |                             // The settings daemon has exited\n  132 |                             continue;\n  133 |                         };\n  134 |                         let Ok(changes) = watcher.receive_changed().await else {\n  135 |                             tracing::error!(\"Failed to listen for changes for {config_id}\");\n  136 | \n  137 |                             #[cfg(feature = \"tokio\")]\n  138 |                             ::tokio::time::sleep(::tokio::time::Duration::from_secs(\n  139 |                                 2_u64.pow(attempts),\n  140 |                             ))\n  141 |                             .await;\n  142 |                             #[cfg(feature = \"async-std\")]\n  143 |                             async_std::task::sleep(std::time::Duration::from_secs(\n  144 |                                 2_u64.pow(attempts),\n  145 |                             ))\n  146 |                             .await;\n  147 |                             #[cfg(not(any(feature = \"tokio\", feature = \"async-std\")))]\n  148 |                             {\n  149 |                                 pending::<()>().await;\n  150 |                                 unreachable!();\n  151 |                             }\n  152 |                             attempts += 1;\n  153 |                             // The settings daemon has exited\n  154 |                             continue;\n  155 |                         };\n  156 | \n  157 |                         let mut changes = changes.map(Change::Changes).fuse();\n  158 | \n  159 |                         let Ok(owner_changed) = watcher.inner().receive_owner_changed().await\n  160 |                         else {\n  161 |                             tracing::error!(\"Failed to listen for owner changes for {config_id}\");\n  162 |                             #[cfg(feature = \"tokio\")]\n  163 |                             ::tokio::time::sleep(::tokio::time::Duration::from_secs(\n  164 |                                 2_u64.pow(attempts),\n  165 |                             ))\n  166 |                             .await;\n  167 |                             #[cfg(feature = \"async-std\")]\n  168 |                             async_std::task::sleep(std::time::Duration::from_secs(\n  169 |                                 2_u64.pow(attempts),\n  170 |                             ))\n  171 |                             .await;\n  172 |                             #[cfg(not(any(feature = \"tokio\", feature = \"async-std\")))]\n  173 |                             {\n  174 |                                 pending::<()>().await;\n  175 |                                 unreachable!();\n  176 |                             }\n  177 |                             attempts += 1;\n  178 |                             // The settings daemon has exited\n  179 |                             continue;\n  180 |                         };","lines":77},{"ref":"cosmic-config/src/dbus.rs:236-237","code":"  236 |                             // Reset the attempts counter if we received a change\n  237 |                             attempts = 0;","lines":2}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"composite::c_over divides by `o_alpha` (the combined output alpha from alpha_over) with no zero-check: `a * a_alpha + b * b_alpha * (1.0 - a_alpha) / o_alpha`. When both input colors are fully transparent (a.alpha == 0 and b.alpha == 0), alpha_over returns 0, making this a 0.0/0.0 division that produces NaN for each of the red/green/blue channels. `over()` only `.clamp(0.0, 1.0)`s the result afterward, and f32::clamp does not turn NaN into a defined value (NaN compares false to both bounds and is returned unchanged), so a NaN-valued Srgba color can silently leak out of theme derivation into rendering/serialization. Component::colored_component (used for the accent/success/destructive/warning components) calls `over(base_50, base)` unconditionally for the `disabled` field, with no guard for base.alpha == 0, unlike the sibling Component::component which explicitly checks `if base.alpha < 0.001` before calling over(). With the shipped dark.ron/light.ron all utility colors have alpha 1.0 so this isn't hit today, but any custom palette (loaded via ThemeBuilder/RON) supplying a fully transparent accent/success/warning/destructive color triggers it.","fix":"In c_over (or in over()), short-circuit when o_alpha is 0 (e.g. return 0.0 for that channel, matching the convention used by Component::component's `base.alpha < 0.001` guard), so a fully-transparent-on-transparent composite yields a defined color instead of NaN.","locations":[{"ref":"cosmic-theme/src/composite.rs:15-21","code":"   15 | fn alpha_over(a: f32, b: f32) -> f32 {\n   16 |     a + b * (1.0 - a)\n   17 | }\n   18 | \n   19 | fn c_over(a: f32, b: f32, a_alpha: f32, b_alpha: f32, o_alpha: f32) -> f32 {\n   20 |     a * a_alpha + b * b_alpha * (1.0 - a_alpha) / o_alpha\n   21 | }","lines":7},{"ref":"cosmic-theme/src/model/derivation.rs:108-136","code":"  108 |     /// helper for producing a component from a base color a neutral and an accent\n  109 |     pub fn colored_component(\n  110 |         base: Srgba,\n  111 |         neutral: Srgba,\n  112 |         accent: Srgba,\n  113 |         hovered: Srgba,\n  114 |         pressed: Srgba,\n  115 |     ) -> Self {\n  116 |         let mut base_50 = base;\n  117 |         base_50.alpha *= 0.5;\n  118 | \n  119 |         let on_20 = neutral;\n  120 |         let on_50 = on_20.with_alpha(0.5);\n  121 | \n  122 |         Component {\n  123 |             base,\n  124 |             hover: over(hovered, base),\n  125 |             pressed: over(pressed, base),\n  126 |             selected: over(hovered, base),\n  127 |             selected_text: accent,\n  128 |             divider: on_20,\n  129 |             on: neutral,\n  130 |             disabled: over(base_50, base),\n  131 |             on_disabled: over(on_50, base),\n  132 |             focus: accent,\n  133 |             border: base,\n  134 |             disabled_border: base_50,\n  135 |         }\n  136 |     }","lines":29}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"The saturation-value canvas drag handling in `ColorPicker::update` computes `relative_pos.x / bounds.width` and `relative_pos.y / bounds.height` for both the drag-start (button press) and drag-move (cursor moved) cases. `bounds` comes from the canvas container element's layout, whose height/width are driven directly by the public, unguarded `ColorPickerModel.width`/`.height` setters (`#[derive(Setters)]` with no `#[setters(skip)]` on those two fields). If a consumer sets `width`/`height` to `Length::Fixed(0.0)` (or a `Length` that resolves to 0 in a constrained layout), both divisions produce NaN/Infinity, which is then stored as `saturation`/`value` on the active HSV color with no clamping, propagating NaN into the rendered color and slider position.","fix":"Clamp the resulting `s`/`v` to `0.0..=1.0` after the division (also guards NaN propagation from a zero-size canvas in most cases when combined with width/height validation), and/or reject non-positive Length::Fixed values in the width/height setters for ColorPickerModel.","locations":[{"ref":"src/widget/color_picker/mod.rs:714-741","code":"  714 |         if state.dragging {\n  715 |             let bounds = column_layout.children().nth(1).unwrap().bounds();\n  716 |             match event {\n  717 |                 Event::Mouse(mouse::Event::CursorMoved { .. } | mouse::Event::CursorEntered) => {\n  718 |                     if let Some(mut clamped) = cursor.position() {\n  719 |                         clamped.x = clamped.x.clamp(bounds.x, bounds.x + bounds.width);\n  720 |                         clamped.y = clamped.y.clamp(bounds.y, bounds.y + bounds.height);\n  721 |                         let relative_pos = clamped - bounds.position();\n  722 |                         let (s, v) = (\n  723 |                             relative_pos.x / bounds.width,\n  724 |                             1.0 - relative_pos.y / bounds.height,\n  725 |                         );\n  726 | \n  727 |                         let hsv: palette::Hsv = palette::Hsv::new(self.active_color.hue, s, v);\n  728 |                         shell.publish((self.on_update)(ColorPickerUpdate::ActiveColor(hsv)));\n  729 |                     }\n  730 |                 }\n  731 |                 Event::Mouse(\n  732 |                     mouse::Event::ButtonReleased(mouse::Button::Left) | mouse::Event::CursorLeft,\n  733 |                 ) => {\n  734 |                     shell.publish((self.on_update)(ColorPickerUpdate::ActionFinished));\n  735 |                     state.dragging = false;\n  736 |                 }\n  737 |                 _ => return,\n  738 |             };\n  739 |             shell.capture_event();\n  740 |             return;\n  741 |         }","lines":28},{"ref":"src/widget/color_picker/mod.rs:759-773","code":"  759 |         match event {\n  760 |             Event::Mouse(mouse::Event::ButtonPressed(mouse::Button::Left)) => {\n  761 |                 let bounds = column_layout.children().nth(1).unwrap().bounds();\n  762 |                 if let Some(point) = cursor.position_over(bounds) {\n  763 |                     let relative_pos = point - bounds.position();\n  764 |                     let (s, v) = (\n  765 |                         relative_pos.x / bounds.width,\n  766 |                         1.0 - relative_pos.y / bounds.height,\n  767 |                     );\n  768 |                     state.dragging = true;\n  769 |                     let hsv: palette::Hsv = palette::Hsv::new(self.active_color.hue, s, v);\n  770 |                     shell.publish((self.on_update)(ColorPickerUpdate::ActiveColor(hsv)));\n  771 |                     shell.capture_event();\n  772 |                 }\n  773 |             }","lines":15}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In MenuState::slice(), for the ItemHeight::Uniform branch, only end_index is clamped with `.min(max_index)` (line 410); start_index (line 409) is left unclamped. If lower_bound_rel computes to a value larger than the total scrolled content height (e.g. extreme scroll_offset or transient geometry during repositioning), start_index can exceed max_index, producing start_index > end_index. This slice is later used unmodified in MenuState::layout as `child_positions[start_index..=end_index]`, which panics on an invalid range or out-of-bounds index.","fix":"Clamp start_index the same way end_index is clamped, e.g. `let start_index = ((lower_bound_rel / f32::from(u)).floor() as usize).min(max_index);`, and/or defensively clamp start_index <= end_index before using it to slice in MenuState::layout.","locations":[{"ref":"src/widget/menu/menu_inner.rs:407-411","code":"  407 |         let (start_index, end_index) = match item_height {\n  408 |             ItemHeight::Uniform(u) => {\n  409 |                 let start_index = (lower_bound_rel / f32::from(u)).floor() as usize;\n  410 |                 let end_index = ((upper_bound_rel / f32::from(u)).floor() as usize).min(max_index);\n  411 |                 (start_index, end_index)","lines":5},{"ref":"src/widget/menu/menu_inner.rs:334-337","code":"  334 |         let child_nodes = self.menu_bounds.child_positions[start_index..=end_index]\n  335 |             .iter_mut()\n  336 |             .zip(self.menu_bounds.child_sizes[start_index..=end_index].iter_mut())\n  337 |             .zip(menu_tree[start_index..=end_index].iter())","lines":4}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`Animation::timed_transition` computes `additional = ((now - self.last).as_secs_f32() / period.as_secs_f32() * u32::MAX as f32) as u32` without checking whether `period` is zero. `period` is fully attacker/caller-controlled via the public `Circular::period()` / `Linear::period()` builder methods (unlike `cycle_duration`, which is checked with `is_zero()` everywhere it is used). Passing `Duration::ZERO` as the period causes division by +Infinity, and the subsequent `as u32` cast saturates to `u32::MAX`, making the indeterminate animation offset jump to its maximum value in a single frame instead of animating smoothly.","fix":"Add the same `!period.is_zero()` guard used for cycle_duration before doing the division, e.g. `let additional = if period.is_zero() { 0 } else { ((now - self.last).as_secs_f32() / period.as_secs_f32() * u32::MAX as f32) as u32 };`.","locations":[{"ref":"src/widget/progress_bar/animation.rs:67-98","code":"   67 | impl Animation {\n   68 |     pub fn timed_transition(\n   69 |         &self,\n   70 |         cycle_duration: Duration,\n   71 |         period: Duration,\n   72 |         wrap: f32,\n   73 |         now: Instant,\n   74 |     ) -> Self {\n   75 |         let additional =\n   76 |             ((now - self.last).as_secs_f32() / period.as_secs_f32() * u32::MAX as f32) as u32;\n   77 |         let new_offset = self.offset.wrapping_add(additional);\n   78 | \n   79 |         if !cycle_duration.is_zero() && now.duration_since(self.start) > cycle_duration {\n   80 |             let offset = if self.expanding {\n   81 |                 new_offset\n   82 |             } else {\n   83 |                 new_offset.wrapping_add((wrap * u32::MAX as f32) as u32)\n   84 |             };\n   85 |             Self {\n   86 |                 expanding: !self.expanding,\n   87 |                 start: now,\n   88 |                 last: now,\n   89 |                 offset,\n   90 |             }\n   91 |         } else {\n   92 |             Self {\n   93 |                 last: now,\n   94 |                 offset: new_offset,\n   95 |                 ..*self\n   96 |             }\n   97 |         }\n   98 |     }","lines":32}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"`increment`/`decrement` in spin_button.rs compute `max - step` and `min + step` respectively before comparing. For generic integer `T` (the crate supports i8/i16/i32/i64 per examples/spin-button), if `step` is large relative to `max`/`min` (e.g. close to the type's range boundary), this subtraction/addition can overflow or underflow before the saturating comparison even happens, causing a debug-mode panic (and silently wrong wrapped values in release mode) instead of the intended saturate-to-min/max behavior.","fix":"Use checked or saturating arithmetic, e.g. require `T: CheckedAdd/CheckedSub` or restrict to floats, or restructure as `value.checked_add(step).map_or(max, |v| if v > max { max } else { v })` style logic that never computes `max - step`/`min + step` directly.","locations":[{"ref":"src/widget/spin_button.rs:142-162","code":"  142 | fn increment<T>(value: T, step: T, _min: T, max: T) -> T\n  143 | where\n  144 |     T: Copy + Sub<Output = T> + Add<Output = T> + PartialOrd,\n  145 | {\n  146 |     if value > max - step {\n  147 |         max\n  148 |     } else {\n  149 |         value + step\n  150 |     }\n  151 | }\n  152 | \n  153 | fn decrement<T>(value: T, step: T, min: T, _max: T) -> T\n  154 | where\n  155 |     T: Copy + Sub<Output = T> + Add<Output = T> + PartialOrd,\n  156 | {\n  157 |     if value < min + step {\n  158 |         min\n  159 |     } else {\n  160 |         value - step\n  161 |     }\n  162 | }","lines":21}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"Model::position() converts a usize index from `VecDeque::iter().position()` into u16 via `as u16` (truncating cast, with the clippy lint explicitly allowed). If a model ever holds more than 65535 items, this silently truncates to an incorrect position value, which then propagates into position_set, position_swap, and reorder, potentially reordering or corrupting the wrong items. This is a low-probability scenario for a tab/segmented-button UI but is an unguarded silent truncation rather than a saturating conversion or explicit capacity limit.","fix":"Either document/enforce a hard cap of u16::MAX items in the model (e.g. debug_assert! or rejecting inserts beyond that), or change the public position type to usize/u32 to remove the silent-truncation risk.","locations":[{"ref":"src/widget/segmented_button/model/mod.rs:369-372","code":"  369 |     pub fn position(&self, id: Entity) -> Option<u16> {\n  370 |         #[allow(clippy::cast_possible_truncation)]\n  371 |         self.order.iter().position(|k| *k == id).map(|v| v as u16)\n  372 |     }","lines":4}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"When a wayland subsurface/popup window closes (Action::SurfaceClosed), the closed window id is never removed from `core.focused_window`, the focus stack used for header-bar focus styling and popup parent-chain tracking. The doc comment on `Action::SurfaceClosed` explicitly states 'Any data relating to the surface should be cleaned up', but only `opened_surfaces`, `surface_views`, and `tracked_windows` are cleaned up; `focused_window` is left untouched. A closed window's id can remain permanently buried in the focus stack, corrupting future focus-chain lookups (`core.focus_chain()` used by `view_main()` to decide which window draws as focused).","fix":"In the `Action::SurfaceClosed` handler, remove `id` from `self.app.core_mut().focused_window` (e.g. `core.focused_window.retain(|w| *w != id)`) before or alongside the existing `opened_surfaces`/`surface_views`/`tracked_windows` cleanup.","locations":[{"ref":"src/app/cosmic.rs:1076-1099","code":" 1076 |             Action::SurfaceClosed(id) => {\n 1077 |                 if self.opened_surfaces.get_mut(&id).is_some_and(|v| {\n 1078 |                     *v = v.saturating_sub(1);\n 1079 |                     *v == 0\n 1080 |                 }) {\n 1081 |                     self.opened_surfaces.remove(&id);\n 1082 |                     #[cfg(all(feature = \"wayland\", target_os = \"linux\"))]\n 1083 |                     self.surface_views.remove(&id);\n 1084 |                     self.tracked_windows.remove(&id);\n 1085 |                 }\n 1086 | \n 1087 |                 let mut ret = if let Some(msg) = self.app.on_close_requested(id) {\n 1088 |                     self.app.update(msg)\n 1089 |                 } else {\n 1090 |                     Task::none()\n 1091 |                 };\n 1092 |                 let core = self.app.core();\n 1093 |                 if core.exit_on_main_window_closed\n 1094 |                     && core.main_window_id().is_some_and(|m_id| id == m_id)\n 1095 |                 {\n 1096 |                     ret = Task::batch([iced::exit::<crate::Action<T::Message>>()]);\n 1097 |                 }\n 1098 |                 return ret;\n 1099 |             }","lines":24},{"ref":"src/app/action.rs:50-52","code":"   50 |     /// Notifies that a surface was closed.\n   51 |     /// Any data relating to the surface should be cleaned up.\n   52 |     SurfaceClosed(iced::window::Id),","lines":3}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`command::set_title` is documented as 'Sets the title of a window' and is the function backing the public `Core::set_title` API, but its body is just `iced::Task::none()` -- it never touches `id` or `title`, and both parameters are suppressed with `#[allow(unused_variables, clippy::needless_pass_by_value)]`. Every sibling function in the same file (`drag`, `maximize`, `minimize`, `set_windowed`, `toggle_maximize`) forwards to a real `iced_runtime::window::*` call, but `set_title` does not call anything. Any application using `Core::set_title` silently has no effect on the window title.","fix":"Implement the function properly, e.g. forward to the appropriate `iced_runtime::window::set_title(id, title)` (or equivalent API) the same way the other functions in this file forward to `iced_runtime::window`. Remove the `#[allow(unused_variables, ...)]` once the parameters are actually used.","locations":[{"ref":"src/command.rs:24-28","code":"   24 | /// Sets the title of a window.\n   25 | #[allow(unused_variables, clippy::needless_pass_by_value)]\n   26 | pub fn set_title<M>(id: window::Id, title: String) -> iced::Task<crate::Action<M>> {\n   27 |     iced::Task::none()\n   28 | }","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In the toggler style function, the disabled-state background color is derived from `active.background`, which was computed earlier using `matches!(status, toggler::Status::Active { is_toggled: true })` (line 918). Since `status` is actually `Disabled { is_toggled: true }` at that point, this match is always false, so a toggled-on-but-disabled toggler renders with the 'off' neutral gray background (just alpha-scaled) instead of a dimmed accent color. A disabled toggle that is logically ON will visually look OFF (just slightly faded), which is misleading to users inspecting widget state.","fix":"Compute the background using the actual is_toggled value from the match arm instead of re-deriving from a generic Active match, e.g. in the Disabled arm: `active.background = if is_toggled { cosmic.accent.base.into() } else { <neutral> }; active.background = active.background.scale_alpha(0.5);` or restructure so background is computed per-status using the bound is_toggled in every arm.","locations":[{"ref":"src/theme/style/iced.rs:917-924","code":"  917 |         let mut active = toggler::Style {\n  918 |             background: if matches!(status, toggler::Status::Active { is_toggled: true }) {\n  919 |                 cosmic.accent.base.into()\n  920 |             } else if cosmic.is_dark {\n  921 |                 cosmic.palette.neutral_6.into()\n  922 |             } else {\n  923 |                 cosmic.palette.neutral_5.into()\n  924 |             },","lines":8},{"ref":"src/theme/style/iced.rs:960-964","code":"  960 |             toggler::Status::Disabled { is_toggled } => {\n  961 |                 active.background = active.background.scale_alpha(0.5);\n  962 |                 active.foreground = active.foreground.scale_alpha(0.5);\n  963 |                 active\n  964 |             }","lines":5}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`Builder::on_press_down_maybe` is supposed to set `on_press_down` when given `Some(message)`, mirroring its `None` branch which clears `on_press_down`. Instead the `Some` branch calls `self.on_press(m)`, which sets the regular `on_press` handler. Any caller using `on_press_down_maybe(Some(msg))` gets press-on-release semantics instead of press-on-press-down, silently breaking the press-down behavior they asked for.","fix":"Change the `Some(m)` branch to call `self.on_press_down(m)` instead of `self.on_press(m)`, matching the field being assigned in the `None` branch (`self.on_press_down = None`).","locations":[{"ref":"src/widget/button/widget.rs:218-225","code":"  218 |     pub fn on_press_down_maybe(mut self, on_press: Option<Message>) -> Self {\n  219 |         if let Some(m) = on_press {\n  220 |             self.on_press(m)\n  221 |         } else {\n  222 |             self.on_press_down = None;\n  223 |             self\n  224 |         }\n  225 |     }","lines":8}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In Cards::layout, inside the `fully_expanded` branch, a new `clear_all_node` is computed by re-laying out `clear_all` into local variable `n` (lines 295-298), but the translate operation at line 300 is applied to `clear_all_node` instead of `n`. Because this `let clear_all_node = if ... { ... }` statement is still being evaluated, the name `clear_all_node` inside its own initializer refers to the *outer* `clear_all_node` computed earlier at line 271-274 (before `size.width` was finalized by the per-card layout loop at lines 278-281). The freshly laid-out node `n` is discarded after being used only to measure `clear_all_node_size`; its only other effect is a wasted, redundant `.layout()` call into `tree_children[1]` whose resulting tree state is then never actually used for the published node geometry. The result: the clear-all button is positioned using a stale, pre-loop measurement instead of the final stack width, which can visibly misplace the button, and the tree/layout state for that child becomes inconsistent between what was laid out and what was published.","fix":"Rename the freshly computed node so it isn't shadowed-confused with the outer binding, and translate that one: `let mut n = clear_all.as_widget_mut().layout(&mut tree_children[1], renderer, limits); let clear_all_node_size = n.size(); n = n.translate(Vector::new(size.width - clear_all_node_size.width, 0.0));`. Also consider removing the now-redundant outer `clear_all_node` layout call at line 271-274 if it is only used for width measurement, to avoid laying out the same widget twice per frame.","locations":[{"ref":"src/widget/cards.rs:271-274","code":"  271 |         let clear_all_node =\n  272 |             clear_all\n  273 |                 .as_widget_mut()\n  274 |                 .layout(&mut tree_children[1], renderer, limits);","lines":4},{"ref":"src/widget/cards.rs:294-306","code":"  294 |             let clear_all_node = if self.can_show_more {\n  295 |                 let mut n =\n  296 |                     clear_all\n  297 |                         .as_widget_mut()\n  298 |                         .layout(&mut tree_children[1], renderer, limits);\n  299 |                 let clear_all_node_size = n.size();\n  300 |                 n = clear_all_node\n  301 |                     .translate(Vector::new(size.width - clear_all_node_size.width, 0.0));\n  302 |                 size.height += show_less_node.size().height.max(n.size().height) + VERTICAL_SPACING;\n  303 |                 n\n  304 |             } else {\n  305 |                 Node::new(Size::default())\n  306 |             };","lines":13}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"In the context drawer overlay's layout positioning, the branch conditions are inverted relative to their intent. `x: if bounds.width > node_size.width - 8.0 { bounds.width - node_size.width - 8.0 } else { 0.0 }` is meant to dock the drawer flush at 0 when it doesn't fit and offset it by 8px when it does, but because the drawer content is laid out with `limits` bounded by `bounds` (so node_size.width <= bounds.width is the common case), the comparison `bounds.width > node_size.width - 8.0` is almost always true, taking the 'has room' branch even when `node_size.width` is close to or equal to `bounds.width`. This yields `bounds.width - node_size.width - 8.0`, which goes negative whenever node_size.width is within 8px of bounds.width, pushing the drawer panel partially off the left/top edge of the screen. The same bug affects the y-coordinate computation. This is the overlay used for every context drawer popup in the toolkit (drawer typically fills width to `max_width`), so misplacement is easily triggered, not just a rare edge case.","fix":"Fix the comparison to check the actual leftover space against the margin: `x: if bounds.width - node_size.width > 8.0 { bounds.width - node_size.width - 8.0 } else { 0.0 }`, and the same for `y` using `bounds.height - node_size.height > 8.0`.","locations":[{"ref":"src/widget/context_drawer/overlay.rs:35-46","code":"   35 |         node.move_to(Point {\n   36 |             x: if bounds.width > node_size.width - 8.0 {\n   37 |                 bounds.width - node_size.width - 8.0\n   38 |             } else {\n   39 |                 0.0\n   40 |             },\n   41 |             y: if bounds.height > node_size.height - 8.0 {\n   42 |                 bounds.height - node_size.height - 8.0\n   43 |             } else {\n   44 |                 0.0\n   45 |             },\n   46 |         })","lines":12}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The Ctrl+scroll-to-advance-selection handler computes next_index = selected + 1 and then only publishes the selection change when `selections.len() < next_index`. This comparison is backwards: it should publish when next_index is a *valid* index (next_index < selections.len()), not when it exceeds the list length. As written, the condition is essentially never true for any normal-sized list (it only fires once length has already been exceeded by 1, i.e. never for a valid index), so Ctrl+scroll over a closed dropdown silently does nothing in virtually all cases. The scroll delta's direction/magnitude is also ignored entirely (`mouse::ScrollDelta::Lines { .. }`), so scrolling can only ever move forward by one, never backward.","fix":"Flip the comparison to `if next_index < selections.len() { shell.publish((on_selected)(next_index)); }`. Al
