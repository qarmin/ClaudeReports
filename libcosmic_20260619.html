so consider reading the actual scroll delta to support scrolling backward (decrementing the index) instead of only incrementing.","locations":[{"ref":"src/widget/dropdown/widget.rs:694-708","code":"  694 |         Event::Mouse(mouse::Event::WheelScrolled {\n  695 |             delta: mouse::ScrollDelta::Lines { .. },\n  696 |         }) => {\n  697 |             let is_open = state.is_open.load(Ordering::Relaxed);\n  698 | \n  699 |             if state.keyboard_modifiers.command() && cursor.is_over(layout.bounds()) && !is_open {\n  700 |                 let next_index = selected.map(|index| index + 1).unwrap_or_default();\n  701 | \n  702 |                 if selections.len() < next_index {\n  703 |                     shell.publish((on_selected)(next_index));\n  704 |                 }\n  705 | \n  706 |                 shell.capture_event();\n  707 |             }\n  708 |         }","lines":15}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The assertion message says \"skipping menu with no children\", implying the code intends to skip/early-return when a submenu has no children (matching the analogous check `if mt.children.is_empty() { continue; }` in the sibling function `init_root_menu`), but `assert!` does not skip anything -- it panics the whole application when the condition is false. Any code path that ends up calling `init_root_popup_menu` for a Folder menu item with an empty children list will crash instead of silently doing nothing.","fix":"Replace the assert with an early return, mirroring init_root_menu's behavior: `if mt.children.is_empty() { return; }` instead of `assert!(!mt.children.is_empty(), ...)`.","locations":[{"ref":"src/widget/menu/menu_inner.rs:1264","code":" 1264 |         assert!(!mt.children.is_empty(), \"skipping menu with no children\");","lines":1}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"The public `vertical()` constructor for spin buttons builds the widget with `Orientation::Horizontal` instead of `Orientation::Vertical`, so any caller of `spin_button::vertical(...)` actually gets a horizontally laid out spin button. This is directly exercised by `examples/spin-button/src/main.rs`, which calls `spin_button::vertical(...)` four times expecting a vertical layout. As a side effect, `Orientation::Vertical` and `vertical_variant` become unreachable dead code via the public API.","fix":"Change the `Orientation::Horizontal` argument on line 63 (inside `pub fn vertical`) to `Orientation::Vertical` so it matches the function name and actually renders via `vertical_variant`.","locations":[{"ref":"src/widget/spin_button.rs:45-73","code":"   45 | pub fn vertical<'a, T, M>(\n   46 |     label: impl Into<Cow<'a, str>>,\n   47 |     #[cfg(feature = \"a11y\")] name: impl Into<Cow<'a, str>>,\n   48 |     value: T,\n   49 |     step: T,\n   50 |     min: T,\n   51 |     max: T,\n   52 |     on_press: impl Fn(T) -> M + 'static,\n   53 | ) -> SpinButton<'a, T, M>\n   54 | where\n   55 |     T: Copy + Sub<Output = T> + Add<Output = T> + PartialOrd,\n   56 | {\n   57 |     let mut button = SpinButton::new(\n   58 |         label,\n   59 |         value,\n   60 |         step,\n   61 |         min,\n   62 |         max,\n   63 |         Orientation::Horizontal,\n   64 |         on_press,\n   65 |     );\n   66 | \n   67 |     #[cfg(feature = \"a11y\")]\n   68 |     {\n   69 |         button = button.name(name.into());\n   70 |     }\n   71 | \n   72 |     button\n   73 | }","lines":29}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`get_local` checks `key_path.is_file()` and then separately calls `fs::read_to_string` on the same path (TOCTOU). If the file is deleted or atomically replaced between the check and the read (e.g. by a concurrent `atomicwrites` write from another process, or external deletion), `read_to_string` fails with a raw `io::Error` that gets wrapped as `Error::GetKey`, not `Error::NotFound`. Since `ConfigGet::get` (lib.rs:388-394) only falls back to `get_system_default` when it sees `Error::NotFound` specifically, this race can cause `get()` to incorrectly propagate a transient I/O error instead of falling back to the system default, even though the value is available there. The upfront existence check is also redundant since `read_to_string` already reports a useful error when the file is absent.","fix":"Drop the `is_file()` pre-check and call `fs::read_to_string` directly, mapping `io::ErrorKind::NotFound` (and `NotADirectory`/equivalent) to `Error::NotFound` so the existing fallback-to-system-default logic in `get()` works correctly even when the user file vanishes mid-read.","locations":[{"ref":"cosmic-config/src/lib.rs:396-409","code":"  396 |     fn get_local<T: DeserializeOwned>(&self, key: &str) -> Result<T, Error> {\n  397 |         // If key path exists\n  398 |         match self.key_path(key) {\n  399 |             Ok(key_path) if key_path.is_file() => {\n  400 |                 // Load user override\n  401 |                 let data = fs::read_to_string(key_path)\n  402 |                     .map_err(|err| Error::GetKey(key.to_string(), err))?;\n  403 | \n  404 |                 Ok(ron::from_str(&data)?)\n  405 |             }\n  406 | \n  407 |             _ => Err(Error::NotFound),\n  408 |         }\n  409 |     }","lines":14}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `Cosmic::cosmic_update`, the `Action::WindowMaximized(id, maximized)` arm is only compiled `#[cfg(not(all(feature = \"wayland\", target_os = \"linux\")))]` and, when active, sets `window.sharp_corners = maximized` but never updates `window.is_maximized`. On non-wayland-linux platforms (Windows, macOS, X11-only Linux builds) there is no other code path that updates `window.is_maximized` (the wayland-only `Action::WindowState` arm that does set it is gated to `all(feature = \"wayland\", target_os = \"linux\")`). Since `view_main()` reads `core.window.is_maximized` to compute border padding and corner styling, and `Cosmic::style()` reads it to choose the maximized vs. transparent style, maximizing a window on these platforms never updates the value used for window chrome/style decisions.","fix":"In the `Action::WindowMaximized` arm, also set `self.app.core_mut().window.is_maximized = maximized;` alongside `sharp_corners`, regardless of the wayland/linux cfg gate.","locations":[{"ref":"src/app/cosmic.rs:624-634","code":"  624 |             Action::WindowMaximized(id, maximized) => {\n  625 |                 #[cfg(not(all(feature = \"wayland\", target_os = \"linux\")))]\n  626 |                 if self\n  627 |                     .app\n  628 |                     .core()\n  629 |                     .main_window_id()\n  630 |                     .is_some_and(|main_id| main_id == id)\n  631 |                 {\n  632 |                     self.app.core_mut().window.sharp_corners = maximized;\n  633 |                 }\n  634 |             }","lines":11},{"ref":"src/app/cosmic.rs:655-705","code":"  655 |             #[cfg(all(feature = \"wayland\", target_os = \"linux\"))]\n  656 |             Action::WindowState(id, state) => {\n  657 |                 if self\n  658 |                     .app\n  659 |                     .core()\n  660 |                     .main_window_id()\n  661 |                     .is_some_and(|main_id| main_id == id)\n  662 |                 {\n  663 |                     self.app.core_mut().window.sharp_corners = state.intersects(\n  664 |                         WindowState::MAXIMIZED\n  665 |                             | WindowState::FULLSCREEN\n  666 |                             | WindowState::TILED\n  667 |                             | WindowState::TILED_RIGHT\n  668 |                             | WindowState::TILED_LEFT\n  669 |                             | WindowState::TILED_TOP\n  670 |                             | WindowState::TILED_BOTTOM,\n  671 |                     );\n  672 |                     self.app.core_mut().window.is_maximized =\n  673 |                         state.intersects(WindowState::MAXIMIZED | WindowState::FULLSCREEN);\n  674 |                 }\n  675 |                 if self.app.core().sync_window_border_radii_to_theme() {\n  676 |                     use iced_runtime::platform_specific::wayland::CornerRadius;\n  677 |                     use iced_winit::platform_specific::commands::corner_radius::corner_radius;\n  678 | \n  679 |                     let theme = THEME.lock().unwrap();\n  680 |                     let t = theme.cosmic();\n  681 |                     let radii = t.radius_s().map(|x| if x < 4.0 { x } else { x + 4.0 });\n  682 |                     let cur_rad = CornerRadius {\n  683 |                         top_left: radii[0].round() as u32,\n  684 |                         top_right: radii[1].round() as u32,\n  685 |                         bottom_right: radii[2].round() as u32,\n  686 |                         bottom_left: radii[3].round() as u32,\n  687 |                     };\n  688 |                     let rounded = !self.app.core().window.sharp_corners;\n  689 |                     return Task::batch([corner_radius(\n  690 |                         id,\n  691 |                         if rounded {\n  692 |                             Some(cur_rad)\n  693 |                         } else {\n  694 |                             let rad_0 = t.radius_0();\n  695 |                             Some(CornerRadius {\n  696 |                                 top_left: rad_0[0].round() as u32,\n  697 |                                 top_right: rad_0[1].round() as u32,\n  698 |                                 bottom_right: rad_0[2].round() as u32,\n  699 |                                 bottom_left: rad_0[3].round() as u32,\n  700 |                             })\n  701 |                         },\n  702 |                     )\n  703 |                     .discard()]);\n  704 |                 }\n  705 |             }","lines":51},{"ref":"src/app/mod.rs:610-624","code":"  610 |     fn view_main(&self) -> Element<'_, crate::Action<Self::Message>> {\n  611 |         let core = self.core();\n  612 |         let is_condensed = core.is_condensed();\n  613 |         let sharp_corners = core.window.sharp_corners;\n  614 |         let maximized = core.window.is_maximized;\n  615 |         let content_container = core.window.content_container;\n  616 |         let show_context = core.window.show_context;\n  617 |         let nav_bar_active = core.nav_bar_active();\n  618 |         let focused = core\n  619 |             .focus_chain()\n  620 |             .iter()\n  621 |             .any(|i| Some(*i) == self.core().main_window_id());\n  622 | \n  623 |         let border_padding = if maximized { 8 } else { 7 };\n  624 | ","lines":15}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`Action::Focus` can push multiple ids onto `core.focused_window` to represent a parent->child surface focus chain (subsurfaces/popups), but `Action::Unfocus` only pops the stack's *last* element, and only if it equals the unfocused id. If a non-terminal element in the chain receives an unfocus event (e.g. a parent surface loses focus while a child popup is still considered focused), nothing is removed, leaving a stale id permanently lodged in the middle of the focus stack and silently desynchronizing future Focus/Unfocus bookkeeping.","fix":"Make `Action::Unfocus` symmetric with `Action::Focus`: instead of only checking/popping the last element, remove the specific `id` from `focused_window` wherever it occurs (e.g. `core.focused_window.retain(|w| *w != id)`), or truncate the stack at the first occurrence of `id`.","locations":[{"ref":"src/app/cosmic.rs:1200-1242","code":" 1200 |             Action::Focus(f) => {\n 1201 |                 #[cfg(all(\n 1202 |                     feature = \"wayland\",\n 1203 |                     feature = \"multi-window\",\n 1204 |                     feature = \"surface-message\",\n 1205 |                     target_os = \"linux\"\n 1206 |                 ))]\n 1207 |                 if let Some((\n 1208 |                     parent,\n 1209 |                     SurfaceIdWrapper::Subsurface(_) | SurfaceIdWrapper::Popup(_),\n 1210 |                     _,\n 1211 |                 )) = self.surface_views.get(&f)\n 1212 |                 {\n 1213 |                     // If the parent is already focused, push the new focus\n 1214 |                     // to the end of the focus chain.\n 1215 |                     if parent.is_some_and(|p| self.app.core().focused_window.last() == Some(&p)) {\n 1216 |                         self.app.core_mut().focused_window.push(f);\n 1217 |                         return iced::Task::none();\n 1218 |                     } else {\n 1219 |                         // set the whole parent chain to the focus chain\n 1220 |                         let mut parent_chain = vec![f];\n 1221 |                         let mut cur = *parent;\n 1222 |                         while let Some(p) = cur {\n 1223 |                             parent_chain.push(p);\n 1224 |                             cur = self\n 1225 |                                 .surface_views\n 1226 |                                 .get(&p)\n 1227 |                                 .and_then(|(parent, _, _)| *parent);\n 1228 |                         }\n 1229 |                         parent_chain.reverse();\n 1230 |                         self.app.core_mut().focused_window = parent_chain;\n 1231 |                         return iced::Task::none();\n 1232 |                     }\n 1233 |                 }\n 1234 |                 self.app.core_mut().focused_window = vec![f];\n 1235 |             }\n 1236 | \n 1237 |             Action::Unfocus(id) => {\n 1238 |                 let core = self.app.core_mut();\n 1239 |                 if core.focused_window().as_ref().is_some_and(|cur| *cur == id) {\n 1240 |                     core.focused_window.pop();\n 1241 |                 }\n 1242 |             }","lines":43}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`iced_settings()` sets `iced.exit_on_close_request = settings.is_daemon;` instead of using `settings.exit_on_close` (the local `exit_on_close` variable computed one line above and correctly used for `window_settings.exit_on_close_request` and `core.exit_on_main_window_closed`). This looks like a copy/paste mistake confusing two different boolean settings. Because `Settings::default()` happens to set both `exit_on_close` and `is_daemon` to `true`, the bug is usually masked, but any app that sets them to different values (e.g. `.is_daemon(false)` while keeping `.exit_on_close(true)`, or vice versa) gets the wrong value assigned to this field.","fix":"Change `iced.exit_on_close_request = settings.is_daemon;` to `iced.exit_on_close_request = exit_on_close;` to match the locally captured `exit_on_close` value used elsewhere in the same function.","locations":[{"ref":"src/app/mod.rs:57-67","code":"   57 |     let mut iced = iced::Settings::default();\n   58 | \n   59 |     iced.antialiasing = settings.antialiasing;\n   60 |     iced.default_font = settings.default_font;\n   61 |     iced.default_text_size = iced::Pixels(settings.default_text_size);\n   62 |     let exit_on_close = settings.exit_on_close;\n   63 |     iced.is_daemon = false;\n   64 |     iced.exit_on_close_request = settings.is_daemon;\n   65 |     let mut window_settings = iced::window::Settings::default();\n   66 |     window_settings.exit_on_close_request = exit_on_close;\n   67 |     iced.id = Some(App::APP_ID.to_owned());","lines":11}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Checkbox::Secondary uses hardcoded `cosmic.background.*` colors (background.component.base, background.on) in the Active/Disabled state (lines 228-241), but the same variant in the Hovered state uses `self.current_container()` (lines 321-339), which is layer-aware (Background/Primary/Secondary). When a Secondary checkbox is rendered inside a Primary or Secondary layer container, its active-state color will not match its hover-state color (and won't match the surrounding container), causing a visible color jump/mismatch on hover.","fix":"Make the Active/Disabled arm use `self.current_container()` consistently with the Hovered arm, e.g. replace `cosmic.background.component.base` with `self.current_container().component.base` and `cosmic.background.on` with `self.current_container().on`.","locations":[{"ref":"src/theme/style/iced.rs:228-241","code":"  228 |                     Checkbox::Secondary => iced_checkbox::Style {\n  229 |                         background: Background::Color(if is_checked {\n  230 |                             cosmic.background.component.base.into()\n  231 |                         } else {\n  232 |                             self.current_container().small_widget.into()\n  233 |                         }),\n  234 |                         icon_color: cosmic.background.on.into(),\n  235 |                         border: Border {\n  236 |                             radius: corners.radius_xs.into(),\n  237 |                             width: if is_checked { 0.0 } else { 1.0 },\n  238 |                             color: cosmic.palette.neutral_8.into(),\n  239 |                         },\n  240 |                         text_color: None,\n  241 |                     },","lines":14},{"ref":"src/theme/style/iced.rs:321-339","code":"  321 |                     Checkbox::Secondary => iced_checkbox::Style {\n  322 |                         background: Background::Color(if is_checked {\n  323 |                             self.current_container().component.hover.into()\n  324 |                         } else {\n  325 |                             hovered_bg.into()\n  326 |                         }),\n  327 |                         icon_color: self.current_container().on.into(),\n  328 |                         border: Border {\n  329 |                             radius: corners.radius_xs.into(),\n  330 |                             width: if is_checked { 0.0 } else { 1.0 },\n  331 |                             color: if is_checked {\n  332 |                                 self.current_container().base\n  333 |                             } else {\n  334 |                                 cosmic.palette.neutral_8\n  335 |                             }\n  336 |                             .into(),\n  337 |                         },\n  338 |                         text_color: None,\n  339 |                     },","lines":19}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"segmented_button's horizontal::tab_bar computes a high-contrast-aware border (checks `cosmic.is_high_contrast` and draws a 1.0-width bordered outline on inactive tab items, lines 155-164), but vertical::tab_bar has no such logic at all -- it always uses the unconditional default Border for inactive items. Vertical-orientation tab bars (e.g. side navigation in NavBar/FileNav/TabBar SegmentedButton styles) therefore lose the high-contrast accessibility outline that horizontal tab bars get, which is an accessibility regression specific to one orientation.","fix":"Port the `hc`/border computation from horizontal::tab_bar into vertical::tab_bar so both orientations apply the same high-contrast border to inactive items.","locations":[{"ref":"src/theme/style/segmented_button.rs:153-184","code":"  153 |     pub fn tab_bar(cosmic: &cosmic_theme::Theme, container: &Container) -> Appearance {\n  154 |         let active = tab_bar_acti r::hover(cosmic, &active, 0.3),\n  275 |             pressed: super::hover(cosmic, &active, 0.25),\n  276 |             active,\n  277 |             ..Default::default()\n  278 |         }\n  279 |     }","lines":19}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`CalendarModel::show_prev_month`/`show_next_month` add/subtract `1.month()` directly to/from `self.visible` using jiff's date arithmetic, which saturates the day-of-month to the target month's last valid day when it overflows (e.g. Jan 31 + 1 month = Feb 28). Because each navigation step re-applies the saturated result rather than tracking the originally selected day, repeatedly clicking 'next month' starting from a 31st-of-the-month date causes the visible day to drift downward over time (Jan 31 -> Feb 28 -> Mar 28 instead of Mar 31), a well-known date-arithmetic pitfall that is user-visible in the calendar's month navigation.","fix":"Track the originally selected day-of-month separately (e.g. keep the day from `self.selected` or an anchor date) and reconstruct `self.visible` as `first_of_month().with().day(anchor_day)` (clamped to the new month's length) each time, instead of chaining `checked_add`/`checked_sub` of `1.month()` onto the already-saturated previous `visible` value.","locations":[{"ref":"src/widget/calendar.rs:59-65","code":"   59 |     pub fn show_prev_month(&mut self) {\n   60 |         self.visible = self.visible.checked_sub(1.month()).expect(\"valid date\");\n   61 |     }\n   62 | \n   63 |     pub fn show_next_month(&mut self) {\n   64 |         self.visible = self.visible.checked_add(1.month()).expect(\"valid date\");\n   65 |     }","lines":7}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In ContextMenu::update, the condition `} else if !was_open && right_button_released(event) || (touch_lifted(event)) || left_button_released(event) {` relies on `&&` binding tighter than `||`, so it actually parses as `(!was_open && right_button_released(event)) || touch_lifted(event) || left_button_released(event)`. The `!was_open` guard, which is clearly intended (mirroring the pattern used a few lines above at line 412-414) to apply to all three branches, only applies to the first one. Today this happens to be harmless because the earlier `was_open`-setting block only matches button-press/key-press events while this block matches button-release/touch-lifted events (mutually exclusive event kinds for the same `event` value), but the code reads as if `!was_open` guards all three and will silently break (causing this block to run a second time on the same event after state was already reset by the block above) the moment someone adds an event kind that overlaps both blocks.","fix":"Parenthesize the intended grouping explicitly: `} else if !was_open && (right_button_released(event) || touch_lifted(event) || left_button_released(event)) {`.","locations":[{"ref":"src/widget/context_menu.rs:434-437","code":"  434 |             } else if !was_open && right_button_released(event)\n  435 |                 || (touch_lifted(event))\n  436 |                 || left_button_released(event)\n  437 |             {","lines":4}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Even when lists is non-zero, the separator-count math `(lists - 1)` is wrong: `Model::elements()` appends a `Separator` after every list's options (`.chain(std::iter::once(OptionElement::Separator))` runs once per list, including the last one), so the true number of separators rendered/hovered is `lists`, not `lists - 1`. InnerList::layout therefore undercounts the intrinsic content height by one separator's height, which can cause the last item(s) to be clipped or the overlay to be sized too small relative to what visible_options/element_heights will actually iterate over (those two functions correctly account for one separator per list).","fix":"Change the separators count to `lists as f32` (one separator per list) to match what `elements()`/`element_heights()` actually produce, e.g. `let separators = ((vertical_padding / 2.0) + 1.0) * lists as f32;`.","locations":[{"ref":"src/widget/dropdown/multi/menu.rs:304-323","code":"  304 |         let lists = self.options.lists.len();\n  305 |         let (descriptions, options) = self.options.lists.iter().fold((0, 0), |acc, l| {\n  306 |             (\n  307 |                 acc.0 + i32::from(l.description.is_some()),\n  308 |                 acc.1 + l.options.len(),\n  309 |             )\n  310 |         });\n  311 | \n  312 |         let vertical_padding = self.padding.y();\n  313 |         let text_line_height = f32::from(text_line_height);\n  314 | \n  315 |         let size = {\n  316 |             #[allow(clippy::cast_precision_loss)]\n  317 |             let intrinsic = Size::new(0.0, {\n  318 |                 let text = vertical_padding + text_line_height;\n  319 |                 let separators = ((vertical_padding / 2.0) + 1.0) * (lists - 1) as f32;\n  320 |                 let descriptions = (text + 4.0) * descriptions as f32;\n  321 |                 let options = text * options as f32;\n  322 |                 separators + descriptions + options\n  323 |             });","lines":20},{"ref":"src/widget/dropdown/multi/menu.rs:675-690","code":"  675 | impl<S, Message> Model<S, Message> {\n  676 |     pub(super) fn elements(&self) -> impl Iterator<Item = OptionElement<'_, S, Message>> + '_ {\n  677 |         self.lists.iter().flat_map(|list| {\n  678 |             let description = list\n  679 |                 .description\n  680 |                 .as_ref()\n  681 |                 .into_iter()\n  682 |                 .map(OptionElement::Description);\n  683 | \n  684 |             let options = list.options.iter().map(OptionElement::Option);\n  685 | \n  686 |             description\n  687 |                 .chain(options)\n  688 |                 .chain(std::iter::once(OptionElement::Separator))\n  689 |         })\n  690 |     }","lines":16}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `flex_row::layout::resolve`, every child unconditionally pushes a layout `Node` into `nodes` (line 69), but the corresponding taffy leaf is only pushed into `leafs` on success; on `taffy_tree.new_leaf` failure the loop does `continue` and skips the `leafs.push`. After any single failure, `leafs.len() < nodes.len()`, so the final `leafs.into_iter().zip(items.iter_mut()).zip(nodes.iter_mut()).zip(tree)` chain (driven by the shorter `leafs` iterator) silently misaligns every subsequent leaf with the wrong item/node/tree triple, corrupting positions for all remaining children in the row, not just the one that failed.","fix":"Keep `leafs` and `nodes` in lock-step, e.g. push a placeholder/sentinel leaf id on failure (or skip pushing to `nodes` too and track failures via index so the final zip stays aligned), or collect failures separately and filter all three vectors consistently before the final zip.","locations":[{"ref":"src/widget/flex_row/layout.rs:64-163","code":"   64 |     for (child, tree) in items.iter_mut().zip(tree.iter_mut()) {\n   65 |         let child_widget = child.as_widget_mut();\n   66 |         let child_node = child_widget.layout(tree, renderer, limits);\n   67 |         let size = child_node.size();\n   68 | \n   69 |         nodes.push(child_node);\n   70 | \n   71 |         let c_size = child_widget.size();\n   72 |         let (width, flex_grow, justify_self) = match c_size.width {\n   73 |             Length::Fill | Length::FillPortion(_) => {\n   74 |                 (Dimension::auto(), 1.0, Some(AlignItems::Stretch))\n   75 |             }\n   76 |             _ => (length(size.width), 0.0, None),\n   77 |         };\n   78 | \n   79 |         let child_style = Style {\n   80 |             fle |         Err(why) => {\n  134 |             tracing::error!(?why, \"cannot get flex row layout\");\n  135 |             return Node::new(Size::ZERO);\n  136 |         }\n  137 |     };\n  138 | \n  139 |     leafs\n  140 |         .into_iter()\n  141 |         .zip(items.iter_mut())\n  142 |         .zip(nodes.iter_mut())\n  143 |         .zip(tree)\n  144 |         .for_each(|(((leaf, child), node), tree)| {\n  145 |             let Ok(leaf_layout) = taffy_tree.layout(leaf) else {\n  146 |                 return;\n  147 |             };\n  148 | \n  149 |             let child_widget = child.as_widget_mut();\n  150 |             let c_size = child_widget.size();\n  151 |             match c_size.width {\n  152 |                 Length::Fill | Length::FillPortion(_) => {\n  153 |                     *node =\n  154 |                         child_widget.layout(tree, renderer, &limits.width(leaf_layout.size.width));\n  155 |                 }\n  156 |                 _ => (),\n  157 |             }\n  158 | \n  159 |             node.move_to_mut(Point {\n  160 |                 x: leaf_layout.location.x,\n  161 |                 y: leaf_layout.location.y,\n  162 |             });\n  163 |         });","lines":100}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `grid::layout::resolve`, when `taffy.new_leaf(...)` fails the code logs an error and does `continue` (skipping the push to `leafs`), but the corresponding `child_node` was already unconditionally pushed to `nodes` on every iteration (line 50) before the leaf is created. This means `leafs.len()` can become shorter than `items.len()`/`nodes.len()`/`tree.len()` after a failure. The final assembly loop zips `leafs.into_iter().zip(items.iter_mut()).zip(nodes.iter_mut()).zip(tree)`, which silently realigns each subsequent successful leaf with the WRONG item/node/tree (shifted by one for every prior failure), corrupting layout for all grid children nment.row as i16 + assignment.height as i16).into()),\n   74 |             },\n   75 | \n   76 |             size: taffy::geometry::Size {\n   77 |                 width,\n   78 |                 height: match c_size.height {\n   79 |                     Length::Fill | Length::FillPortion(_) => Dimension::auto(),\n   80 |                     _ => length(size.height),\n   81 |                 },\n   82 |             },\n   83 | \n   84 |             justify_self,\n   85 | \n   86 |             ..Style::default()\n   87 |         });\n   88 | \n   89 |         match leaf {\n   90 |             Ok(leaf) => leafs.push(leaf),\n   91 |             Err(why) => {\n   92 |                 tracing::error!(?why, \"cannot add leaf node to grid\");\n   93 |                 continue;\n   94 |             }\n   95 |         }\n   96 |     }","lines":58},{"ref":"src/widget/grid/layout.rs:177-199","code":"  177 |     for (((leaf, child), node), tree) in leafs\n  178 |         .into_iter()\n  179 |         .zip(items.iter_mut())\n  180 |         .zip(nodes.iter_mut())\n  181 |         .zip(tree)\n  182 |     {\n  183 |         if let Ok(leaf_layout) = taffy.layout(leaf) {\n  184 |             let child_widget = child.as_widget_mut();\n  185 |             let c_size = child_widget.size();\n  186 |             match c_size.width {\n  187 |                 Length::Fill | Length::FillPortion(_) => {\n  188 |                     *node =\n  189 |                         child_widget.layout(tree, renderer, &limits.width(leaf_layout.size.width));\n  190 |                 }\n  191 |                 _ => (),\n  192 |             }\n  193 | \n  194 |             node.move_to_mut(Point {\n  195 |                 x: leaf_layout.location.x,\n  196 |                 y: leaf_layout.location.y,\n  197 |             })\n  198 |         }\n  199 |     }","lines":23}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In `grid::layout::resolve`'s final assembly loop, a child is only re-laid-out with the grid-resolved size when `c_size.width` is `Length::Fill`/`FillPortion` (line 186-192), and even then only the resolved *width* is passed via `limits.width(leaf_layout.size.width)` -- the resolved height from `leaf_layout.size.height` is never applied. A grid cell child with `height: Length::Fill` (independent of its width setting) never gets relaid-out to actually receive its assigned cell height; it keeps whatever height resulted from the initial unconstrained `limits`-based layout pass at line 47, so 'Fill' height inside a grid cell is effectively broken.","fix":"Re-layout the child whenever either dimension is Fill/FillPortion, passing both the resolved width and height: `if matches!(c_size.width, Length::Fill | Length::FillPortion(_)) || matches!(c_size.height, Length::Fill | Length::FillPortion(_)) { *node = child_widget.layout(tree, renderer, &limits.width(leaf_layout.size.width).height(leaf_layout.size.height)); }`.","locations":[{"ref":"src/widget/grid/layout.rs:183-199","code":"  183 |         if let Ok(leaf_layout) = taffy.layout(leaf) {\n  184 |             let child_widget = child.as_widget_mut();\n  185 |             let c_size = child_widget.size();\n  186 |             match c_size.width {\n  187 |                 Length::Fill | Length::FillPortion(_) => {\n  188 |                     *node =\n  189 |                         child_widget.layout(tree, renderer, &limits.width(leaf_layout.size.width));\n  190 |                 }\n  191 |                 _ => (),\n  192 |             }\n  193 | \n  194 |             node.move_to_mut(Point {\n  195 |                 x: leaf_layout.location.x,\n  196 |                 y: leaf_layout.location.y,\n  197 |             })\n  198 |         }\n  199 |     }","lines":17}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"last_tab() indexes `order[buttons_offset + buttons_visible]`, but the visible tab range produced by `iterate_visible_tabs` (skip(buttons_offset).take(buttons_visible)) is `[buttons_offset, buttons_offset + buttons_visible)`. The true last visible tab is at index `buttons_offset + buttons_visible - 1`. As written, `last_tab()` returns the first tab that is NOT visible (one past the end), so pressing Enter on the focused 'next' pagination button, or Shift+Tab navigation that calls `last_tab`, focuses the wrong (off-screen) tab.","fix":"Index with `buttons_offset + buttons_visible - 1` (guarding for buttons_visible == 0), e.g. `state.buttons_visible.checked_sub(1).and_then(|last| self.model.order.get(state.buttons_offset + last)).copied()`.","locations":[{"ref":"src/widget/segmented_button/widget.rs:586-591","code":"  586 |     fn last_tab(&self, state: &LocalState) -> Option<Entity> {\n  587 |         self.model\n  588 |             .order\n  589 |             .get(state.buttons_offset + state.buttons_visible)\n  590 |             .copied()\n  591 |     }","lines":6}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In draw(), `button_amount` is set to `self.model.items.len()` (the TOTAL number of items in the model), but the draw loop only iterates the currently-visible/paginated buttons (bounded by `state.buttons_visible` via `variant_bounds`), incrementing a separate counter `nth` from 0. The 'last' style variant (rounded corner, etc.) is only applied when `nth + 1 == button_amount`. Whenever the widget is collapsed/paginated (buttons_visible < items.len()), `nth` never reaches a value where `nth + 1 == button_amount`, so the visually-last rendered button never receives the 'last' appearance (e.g. correct border radius), producing incorrect styling at the end of a paginated segmented button.","fix":"Compare against the number of buttons actually being drawn instead of the total model size, e.g. capture `let button_amount = state.buttons_visible;` (or compute it from the iterator) so `nth + 1 == button_amount` correctly identifies the last rendered button.","locations":[{"ref":"src/widget/segmented_button/widget.rs:1667","code":" 1667 |         let button_amount = self.model.items.len();","lines":1},{"ref":"src/widget/segmented_button/widget.rs:1876-1882","code":" 1876 |             let button_appearance = if nth == 0 {\n 1877 |                 status_appearance.first\n 1878 |             } else if nth + 1 == button_amount {\n 1879 |                 status_appearance.last\n 1880 |             } else {\n 1881 |                 status_appearance.middle\n 1882 |             };","lines":7}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In CompactTableView's rendering, the body text shows `item.get_text(Category::default())` as the title, and the caption row below it is built from `val.model.categories.iter().skip_while(|cat| **cat != Category::default())`. `skip_while` stops skipping (and includes) the first element for which the predicate is false, i.e. the first category that equals `Category::default()`. That means the default category's text is rendered twice: once as the title and again as the first caption chip, while the intent was clearly to show the *remaining* categories after the default one.","fix":"Skip the default category itself, e.g. `.skip_while(|cat| **cat != Category::default()).skip(1)`, or filter it out explicitly with `.filter(|cat| **cat != Category::default())`.","locations":[{"ref":"src/widget/table/widget/compact.rs:79-101","code":"   79 |                             .push(\n   80 |                                 widget::column::with_capacity(2)\n   81 |                                     .push(widget::text::body(item.get_text(Category::default())))\n   82 |                                     .push({\n   83 |                                         let mut elements = val\n   84 |                                             .model\n   85 |                                             .categories\n   86 |                                             .iter()\n   87 |                                             .skip_while(|cat| **cat != Category::default())\n   88 |                                             .flat_map(|category| {\n   89 |                                                 [\n   90 |                                                     widget::text::caption(item.get_text(*category))\n   91 |                                                         .apply(Element::from),\n   92 |                                                     widget::text::caption(\"-\").apply(Element::from),\n   93 |                                                 ]\n   94 |                                             })\n   95 |                                             .collect::<Vec<Element<'static, Message>>>();\n   96 |                                         elements.pop();\n   97 |                                         elements\n   98 |                                             .apply(widget::row::with_children)\n   99 |                                             .spacing(space_xxxs)\n  100 |                                             .wrap()\n  101 |                                     }),","lines":23}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"previous_start_of_word clamps the lookup index for building `previous_string` (`index.min(self.graphemes.len())`) but then uses the original, unclamped `index` in the final arithmetic (`index - graphemes(...).count() - graphemes(...).count()`). If called with an index greater than the grapheme length, the returned position is computed against a string that was built using the clamped index while the offset arithmetic uses the unclamped one, producing an incorrect (too large) result instead of a value consistent with the actual content length. Worse, because the result is a `usize` subtraction chain, an inconsistent index can drive the subtraction below zero and panic with an overflow in debug builds. All current call sites happen to pass already-clamped indices (via Cursor::state/left/right), so this is latent rather than triggered today, but the method is exported (pub) and not safe to call generally as documented (it claims to operate on 'the given grapheme index' without clamping guarantees).","fix":"Clamp once at the top: `let index = index.min(self.graphemes.len());` and use that clamped value consistently throughout the function (both for building previous_string and in the final arithmetic), or use saturating_sub for the final subtraction to avoid a panic if the invariant is ever violated.","locations":[{"ref":"src/widget/text_input/value.rs:45-60","code":"   45 |     pub fn previous_start_of_word(&self, index: usize) -> usize {\n   46 |         let previous_string = &self.graphemes[..index.min(self.graphemes.len())].concat();\n   47 | \n   48 |         UnicodeSegmentation::split_word_bound_indices(previous_string as &str)\n   49 |             .filter(|(_, word)| !word.trim_start().is_empty())\n   50 |             .next_back()\n   51 |             .map_or(0, |(i, previous_word)| {\n   52 |                 index\n   53 |                     - UnicodeSegmentation::graphemes(previous_word, true).count()\n   54 |                     - UnicodeSegmentation::graphemes(\n   55 |                         &previous_string[i + previous_word.len()..] as &str,\n   56 |                         true,\n   57 |                     )\n   58 |                     .count()\n   59 |             })\n   60 |     }","lines":16}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"A plain `text_input` bound to `self.input_1` (lines 206-209) and a `secure_input` also bound to `self.input_1` via the same `Message::Input1` (lines 211-219) are both rendered simultaneously, and likewise a `text_input` and `search_input` both bound to `self.input_2`/`Message::Input2` (lines 220-225) are rendered together. Because both widgets in each pair read and write the exact same field through the exact same message, typing in one immediately overwrites and re-renders into the other, which is surprising behavior for a feature-demonstration example unless explicitly called out as intentional.","fix":"Use separate backing fields (and separate `Message` variants) for each visually-distinct input widget, or add a comment explaining that the shared state is intentional for demonstrating different input-widget styles over the same value.","locations":[{"ref":"examples/application/src/main.rs:203-225","code":"  203 |         let centered = widget::container(\n  204 |             widget::column::with_capacity(14)\n  205 |                 .push(widget::text::body(page_content))\n  206 |                 .push(\n  207 |                     widget::text_input::text_input(\"\", &self.input_1)\n  208 |                         .on_input(Message::Input1)\n  209 |                         .on_clear(Message::Ignore),\n  210 |                 )\n  211 |                 .push(\n  212 |                     widget::text_input::secure_input(\n  213 |                         \"\",\n  214 |                         &self.input_1,\n  215 |                         Some(Message::ToggleHide),\n  216 |                         self.hidden,\n  217 |                     )\n  218 |                     .on_input(Message::Input1),\n  219 |                 )\n  220 |                 .push(widget::text_input::text_input(\"\", &self.input_2).on_input(Message::Input2))\n  221 |                 .push(\n  222 |                     widget::text_input::search_input(\"\", &self.input_2)\n  223 |                         .on_input(Message::Input2)\n  224 |                         .on_clear(Message::Ignore),\n  225 |                 )","lines":23}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Message::WindowClose`, `Message::ToggleHideContent`, and `Message::WindowNew` are dispatched from the context menu but handled as no-ops in `update()` (lines 94-96). A user copying this context-menu example would reasonably expect \"Quit\" and the \"Hide content\" checkbox to actually do something, since the menu items are wired up and look fully functional, but none of them have any effect.","fix":"Either implement the corresponding behavior (e.g. close the window via `window::close`, toggle a `hide_content` field that actually affects `view()`) or add a comment noting these are deliberately left unimplemented as a wiring-only demo.","locations":[{"ref":"examples/context-menu/src/main.rs:94-97","code":"   94 |             Message::WindowClose => {}\n   95 |             Message::ToggleHideContent => {}\n   96 |             Message::WindowNew => {}\n   97 |         }","lines":4}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`Message::Remove(id)` removes an entry from `self.images` by index but never adjusts `self.selected`. After removing an image at an index at or before the currently selected index, `self.selected` can point at a different image than the one the user actually selected, or (if the last image was selected and removed) at an index past the end of the now-shorter `images` vector. This doesn't panic here (the index is only used in an `==` comparison for highlighting), but produces a visibly wrong/stale selection highlight that a copy-paste user might not expect, and would panic if this same `selected` field were ever used to index into `images` directly.","fix":"After removing an item, clamp or update `self.selected` (e.g. `self.selected = self.selected.min(self.images.len().saturating_sub(1))`, or clear it if the removed image was the selected one).","locations":[{"ref":"examples/image-button/src/main.rs:70-79","code":"   70 |     fn update(&mut self, message: Self::Message) -> Task<Self::Message> {\n   71 |         match message {\n   72 |             Message::Clicked(id) => self.selected = id,\n   73 |             Message::Remove(id) => {\n   74 |                 self.images.remove(id);\n   75 |             }\n   76 |         }\n   77 | \n   78 |         Task::none()\n   79 |     }","lines":10}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"`anim::State::t()` divides `Instant::now().duration_since(t).as_millis() as f32` by `dur.as_millis() as f32` with no guard against `dur` being `Duration::ZERO`. Float division by zero does not panic in Rust, but it produces `inf` (or `NaN` if the numerator is also zero), which then flows into `forward { res } else { 1. - res }` and from there into `lerp`/`slerp` callers, producing garbage interpolation values (`NaN`/`inf`) instead of the presumably-intended 'animation is already complete' (`t = 1.0`) result for a zero-length animation.","fix":"Special-case a zero (or near-zero) duration to return 1.0 (animation complete) directly: `if dur.is_zero() { return if forward { 1.0 } else { 0.0 }; }` before doing the division.","locations":[{"ref":"src/anim.rs:45-50","code":"   45 |     pub fn t(&self, dur: Duration, forward: bool) -> f32 {\n   46 |         let res = self.last_change.map_or(1., |t| {\n   47 |             Instant::now().duration_since(t).as_millis() as f32 / dur.as_millis() as f32\n   48 |         });\n   49 |         if forward { res } else { 1. - res }\n   50 |     }","lines":6}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In DndDestination::update, the `OfferEvent::Leave` and `OfferEvent::LeaveDestination` match arms (unlike Enter, Motion, Drop, SelectedAction, and Data) do not check `if *id == Some(my_id)` before acting — they match on `Event::Dnd(DndEvent::Offer(_, OfferEvent::Leave))` with the id wildcarded. Practically this is mostly harmless today because `State::on_leave` only fires when `self.drag_offer` is already `Some(..)` (i.e. only a destination that previously entered will react), but it is inconsistent with every other arm in the same match and with the general per-id targeting model used throughout this widget, making it easy to introduce a real cross-destination state bug if the guard logic in `on_leave` is ever relaxed or the protocol starts reusing ids across simultaneous offers.","fix":"Add the same `if *id == Some(my_id)` guard used by the other arms to the Leave and LeaveDestination match patterns for consistency and defense-in-depth, e.g. `Event::Dnd(DndEvent::Offer(id, OfferEvent::Leave)) if *id == Some(my_id) => { ... }`.","locations":[{"ref":"src/widget/dnd_destination.rs:401-428","code":"  401 |             Event::Dnd(DndEvent::Offer(_, OfferEvent::Leave)) => {\n  402 |                 log::trace!(\n  403 |                     target: DND_DEST_LOG_TARGET,\n  404 |                     \"offer leave id={:?}\",\n  405 |                     my_id\n  406 |                 );\n  407 |                 if let Some(msg) =\n  408 |                     state.on_leave(self.on_leave.as_ref().map(std::convert::AsRef::as_ref))\n  409 |                 {\n  410 |                     shell.publish(msg);\n  411 |                 }\n  412 | \n  413 |                 if self.forward_drag_as_cursor {\n  414 |                     let drag_cursor = mouse::Cursor::Unavailable;\n  415 |                     let event = Event::Mouse(mouse::Event::CursorLeft);\n  416 |                     self.container.as_widget_mut().update(\n  417 |                         &mut tree.children[0],\n  418 |                         &event,\n  419 |                         layout,\n  420 |                         drag_cursor,\n  421 |                         renderer,\n  422 |                         clipboard,\n  423 |                         shell,\n  424 |                         viewport,\n  425 |                     );\n  426 |
