18 |       mask = NULL;\n  819 |       if (is_mask)\n  820 |         {\n  821 |           if (data - buf + 4 > len)\n  822 |             return;\n  823 |           mask = data;\n  824 |           data += 4;\n  825 |         }\n  826 | \n  827 |       if (data - buf + payload_len > len)\n  828 |         return; /* wait to accumulate more */\n  829 | \n  830 |       if (is_mask)\n  831 |         {\n  832 |           gsize i;\n  833 |           for (i = 0; i < payload_len; i++)\n  834 |             data[i] ^= mask[i%4];\n  835 |         }"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","description":"In the daemon's BROADWAY_REQUEST_SET_NODES handler, array_size is computed as `request->base.size - sizeof(BroadwayRequestSetNodes) + sizeof(guint32)`. request->base.size is attacker-controlled (read from the client socket). If size is smaller than sizeof(BroadwayRequestSetNodes) - sizeof(guint32), the unsigned subtraction underflows to a huge gsize, making n_data huge, which is passed as `len` to decode_nodes and drives massive OOB reads of request->set_nodes.data.","fix":"Validate that request->base.size >= sizeof(BroadwayRequestSetNodes) - sizeof(guint32) (and that the bytes are actually present in the buffer) before computing array_size; reject otherwise.","locations":[{"ref":"gdk/broadway/broadwayd.c:274-282","code":"  274 |     case BROADWAY_REQUEST_SET_NODES:\n  275 |       {\n  276 |         gsize array_size = request->base.size - sizeof (BroadwayRequestSetNodes) + sizeof(guint32);\n  277 |         int n_data = array_size / sizeof(guint32);\n  278 | \n  279 |         broadway_server_surface_update_nodes (server, request->set_nodes.id,\n  280 |                                               request->set_nodes.data, n_data,\n  281 |                                               client->textures);\n  282 |       }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","description":"In the TIFF fallback loader, image width/height are read from the (untrusted) TIFF file via TIFFGetField into `int` variables, and the allocation size is computed as `width * height * 4` with no overflow check. TIFF dimensions are 32-bit unsigned in the file; reading them into `int` and multiplying overflows signed int (UB) and/or wraps to a small value, after which TIFFReadRGBAImageOriented writes width*height*4 bytes into the under-sized buffer. A crafted TIFF (e.g. width=65536, height=65536) yields a 16 GiB product that overflows to a small allocation, producing a heap buffer overflow. Note the native-format path (gdk_load_tiff) correctly uses gdk_memory_layout_try_init, but this fallback path bypasses all of that.","fix":"Read width/height into guint32, validate them against a sane maximum, and use g_size_checked_mul / overflow-checked arithmetic (or gdk_memory_layout_try_init) before g_malloc. Bail out with GDK_TEXTURE_ERROR_TOO_LARGE on overflow.","locations":[{"ref":"gdk/loaders/gdktiff.c:383-411","code":"  383 |   int width, height;\n  384 |   guchar *data;\n  385 |   GBytes *bytes;\n  386 |   GdkTexture *texture;\n  387 | \n  388 |   TIFFGetField (tif, TIFFTAG_IMAGEWIDTH, &width);\n  389 |   TIFFGetField (tif, TIFFTAG_IMAGELENGTH, &height);\n  390 | \n  391 |   data = g_malloc (width * height * 4);\n  392 | \n  393 |   if (!TIFFReadRGBAImageOriented (tif, width, height, (guint32 *)data, ORIENTATION_TOPLEFT, 1))\n  394 |     {\n  395 |       g_set_error_literal (error,\n  396 |                            GDK_TEXTURE_ERROR, GDK_TEXTURE_ERROR_CORRUPT_IMAGE,\n  397 |                            _(\"Failed to load RGB data from TIFF file\"));\n  398 |       g_free (data);\n  399 |       return NULL;\n  400 |     }\n  401 | \n  402 |   bytes = g_bytes_new_take (data, width * height * 4);\n  403 | \n  404 |   texture = gdk_memory_texture_new (width, height,\n  405 |                                     GDK_MEMORY_R8G8B8A8_PREMULTIPLIED,\n  406 |                                     bytes,\n  407 |                                     width * 4);\n  408 | \n  409 |   g_bytes_unref (bytes);\n  410 | \n  411 |   return texture;"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"_get_read_data() stores the result of httpRead() (which returns a signed\nssize_t/int and yields -1 on error) into `gsize bytes` (unsigned). On a read\nerror, `bytes` becomes SIZE_MAX. It is then added to `request->bytes_received`\nand passed as the length to g_io_channel_write_chars(request->data_io, buffer,\nbytes, ...), causing a massive out-of-bounds read from the 8192-byte stack\nbuffer and corrupt accounting. The subsequent `httpGetLength(...) <= bytes_received`\ncheck is also defeated.","fix":"Read into a signed temporary and handle the error/negative case before using it:\n\n    gssize n = httpRead (request->http, buffer, sizeof (buffer));\n    if (n < 0) { /* set error, GTK_CUPS_REQUEST_DONE, return */ }\n    bytes = (gsize) n;","locations":[{"ref":"gtk/print/backends/gtkcupsutils.c:1451-1490","code":" 1451 |   char buffer[_GTK_CUPS_MAX_CHUNK_SIZE];\n 1452 |   gsize bytes;\n 1453 |   gsize bytes_written;\n 1454 |   GIOStatus io_status;\n 1455 |   GError *error;\n 1456 | \n 1457 |   GTK_DEBUG (PRINTING, \"CUPS Backend: %s\", G_STRFUNC);\n 1458 | \n 1459 |   error = NULL;\n 1460 | \n 1461 |   request->poll_state = GTK_CUPS_HTTP_READ;\n 1462 | \n 1463 |   bytes = httpRead (request->http, buffer, sizeof (buffer));\n 1464 |   request->bytes_received += bytes;\n 1465 | \n 1466 |   GTK_DEBUG (PRINTING, \"CUPS Backend: %\"G_GSIZE_FORMAT\" bytes read\", bytes);\n 1467 | \n 1468 |   io_status =\n 1469 |     g_io_channel_write_chars (request->data_io, \n 1470 |                               buffer, \n 1471 | \t\t\t      bytes, \n 1472 | \t\t\t      &bytes_written,\n 1473 | \t\t\t      &error);\n 1474 | \n 1475 |   if (io_status == G_IO_STATUS_ERROR)\n 1476 |     {\n 1477 |       request->state = GTK_CUPS_GET_DONE;\n 1478 |       request->poll_state = GTK_CUPS_HTTP_IDLE;\n 1479 | \n 1480 |       gtk_cups_result_set_error (request->result,\n 1481 |                                  GTK_CUPS_ERROR_IO,\n 1482 |                                  io_status,\n 1483 |                                  error->code,\n 1484 |                                  \"%s\",\n 1485 |                                  error->message);\n 1486 |       g_error_free (error);\n 1487 |     }\n 1488 | \n 1489 |   /* Stop if we do not expect any more data or EOF was received. */\n 1490 |   if (httpGetLength (request->http) <= request->bytes_received || bytes == 0)"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"Allocation-size overflow / unbounded allocation when interpolating two stroke-dasharray values. svg_dash_array_interpolate() computes `n_dashes = lcm (a0->n_dashes, a1->n_dashes)` and then allocates an array of that many Dash entries via svg_dash_array_alloc(). lcm() is implemented as `(a * b) / gcd (a, b)` in unsigned int arithmetic (gtk/svg/gtksvgutilsprivate.h:65-70). Both dash counts come directly from untrusted attribute/animation input (each stroke-dasharray attribute may contain an arbitrary number of dash entries, parsed unbounded in svg_dash_array_parse). Two large, coprime dash counts (e.g. 40000 and 40001) make lcm ~= 1.6e9, so svg_dash_array_alloc tries to allocate ~1.6e9 * sizeof(Dash) bytes (DoS / OOM); larger coprime counts make `a * b` overflow the 32-bit unsigned multiply, producing a small n_dashes while the subsequent loop indexes a0->dashes[i % a0->n_dashes] correctly but the allocation is undersized only if wrap lands low — the dominant risk is the huge/over-large allocation. This runs at animation time on attacker-controlled SVG.","fix":"Bound the dash count before computing lcm (e.g. cap n_dashes during parsing and cap lcm()), perform the lcm in 64-bit and reject/clamp results that exceed a sane maximum, and use g_checked/overflow-safe multiplication when sizing the allocation.","locations":[{"ref":"gtk/svg/gtksvgdasharray.c:244-260","code":"  244 |   n_dashes = lcm (a0->n_dashes, a1->n_dashes);\n  245 | \n  246 |   a = svg_dash_array_alloc (n_dashes);\n  247 |   a->kind = a0->kind;\n  248 | \n  249 |   for (unsigned int i = 0; i < n_dashes; i++)\n  250 |     {\n  251 |       if (a0->dashes[i % a0->n_dashes].unit != a1->dashes[i %a1->n_dashes].unit)\n  252 |         {\n  253 |           g_clear_pointer ((SvgValue **)&a, svg_value_unref);\n  254 |           break;\n  255 |         }\n  256 | \n  257 |       a->dashes[i].unit = a0->dashes[i % a0->n_dashes].unit;\n  258 |       a->dashes[i].value = lerp (t, a0->dashes[i % a0->n_dashes].value,\n  259 |                                     a1->dashes[i % a1->n_dashes].value);\n  260 |     }"},{"ref":"gtk/svg/gtksvgutilsprivate.h:65-70","code":"   65 | static inline unsigned int\n   66 | lcm (unsigned int a,\n   67 |      unsigned int b)\n   68 | {\n   69 |   return (a * b) / gcd (a, b);\n   70 | }"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"gtk_css_parser_consume_any() shifts a plain `int` literal `1` by the option\nindex `i`, but accepts up to 62 options (the precondition is\n`n_options < sizeof(gsize)*8 - 1`, i.e. up to 62). `result` is a `gsize`. The\nexpressions `result & (1 << i)` and `result |= 1 << i` compute `1 << i` in `int`,\nwhich is signed-overflow UB for i >= 31 and yields wrong bits for i >= 32. Only\nthe loop terminator `(1u << n_options)` was made unsigned; the per-bit ops were\nnot.","fix":"Use a gsize literal for the shifts: `result & ((gsize) 1 << i)` and\n`result |= (gsize) 1 << i`. Alternatively tighten the precondition to\n`n_options < 31`.","locations":[{"ref":"gtk/css/gtkcssparser.c:1340-1354","code":" 1340 |   g_return_val_if_fail (n_options < sizeof (gsize) * 8 - 1, 0);\n 1341 | \n 1342 |   result = 0;\n 1343 |   while (result != (1u << n_options) - 1u)\n 1344 |     {\n 1345 |       for (i = 0; i < n_options; i++)\n 1346 |         {\n 1347 |           if (result & (1 << i))\n 1348 |             continue;\n 1349 |           if (options[i].can_parse && !options[i].can_parse (parser, options[i].data, user_data))\n 1350 |             continue;\n 1351 |           if (!options[i].parse (parser, options[i].data, user_data))\n 1352 |             return 0;\n 1353 |           result |= 1 << i;\n 1354 |           break;"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Several bounds checks in the icon cache validator add an attacker-controlled length/count to an offset before comparing to cache_size, which can wrap around on 32-bit guint32 arithmetic and pass a check that should fail. check_pixel_data() uses `offset + 8 + length < info->cache_size`, check_attach_point_list() uses `offset + 4 + 4 * n_attach_points < info->cache_size`. With length/n_attach_points near UINT32_MAX the sum wraps to a small value and the check incorrectly succeeds, later leading to OOB reads of the mapped cache. Counts/lengths should be range-checked against the remaining buffer without overflow.","fix":"Rewrite as subtractions that cannot overflow, e.g. `length <= info->cache_size && offset <= info->cache_size - 8 - length`, and similarly bound n_attach_points by `(info->cache_size - offset - 4) / 4`.","locations":[{"ref":"gtk/gtkiconcachevalidator.c:159","code":"  159 |   check (\"pixel data length\", offset + 8 + length < info->cache_size);"},{"ref":"gtk/gtkiconcachevalidator.c:191","code":"  191 |   check (\"attach points\", offset + 4 + 4 * n_attach_points < info->cache_size);"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"Integer overflow when parsing the untrusted _NET_WM_ICON X property. In find_largest_sizes() and find_best_size(), w and h are read from gulong cardinal data into int, and the bounds checks 'nitems < ((w * h) + 2)' compute w * h in int arithmetic. A malicious/buggy window can publish huge w/h values causing w*h to overflow int, so the check passes incorrectly; read_rgb_icon() then calls argbdata_to_pixdata(best, w*h) which g_new(guchar, len*4) and reads w*h gulongs from the buffer, causing heap out-of-bounds read (and the advancement 'data += (w*h)+2' is also wrong). Affects icon lookup for the show-processes dialog.","fix":"Validate w and h against sane bounds and compute sizes with 64-bit/overflow-checked arithmetic (e.g. guint64 area = (guint64)w * h; if (nitems < area + 2) ...), and reject icons with absurd dimensions before allocating/reading.","locations":[{"ref":"gtk/gtkmountoperation-x11.c:196-209","code":"  196 |       if (nitems < 3)\n  197 |         return FALSE; /* no space for w, h */\n  198 | \n  199 |       w = data[0];\n  200 |       h = data[1];\n  201 | \n  202 |       if (nitems < ((w * h) + 2))\n  203 |         return FALSE; /* not enough data */\n  204 | \n  205 |       *width = MAX (w, *width);\n  206 |       *height = MAX (h, *height);\n  207 | \n  208 |       data += (w * h) + 2;\n  209 |       nitems -= (w * h) + 2;"},{"ref":"gtk/gtkmountoperation-x11.c:252-297","code":"  252 |       if (nitems < 3)\n  253 |         return FALSE; /* no space for w, h */\n  254 | \n  255 |       w = data[0];\n  256 |       h = data[1];\n  257 | \n  258 |       if (nitems < ((w * h) + 2))\n  259 |         break; /* not enough data */\n  260 | \n  261 |       if (best_start == NULL)\n  262 |         {\n  263 |           replace = TRUE;\n  264 |         }\n  265 |       else\n  266 |         {\n  267 |           /* work with averages */\n  268 |           const int ideal_size = (ideal_width + ideal_height) / 2;\n  269 |           int best_size = (best_w + best_h) / 2;\n  270 |           int this_size = (w + h) / 2;\n  271 | \n  272 |           /* larger than desired is always better than smaller */\n  273 |           if (best_size < ideal_size &&\n  274 |               this_size >= ideal_size)\n  275 |             replace = TRUE;\n  276 |           /* if we have too small, pick anything bigger */\n  277 |           else if (best_size < ideal_size &&\n  278 |                    this_size > best_size)\n  279 |             replace = TRUE;\n  280 |           /* if we have too large, pick anything smaller\n  281 |            * but still >= the ideal\n  282 |            */\n  283 |           else if (best_size > ideal_size &&\n  284 |                    this_size >= ideal_size &&\n  285 |                    this_size < best_size)\n  286 |             replace = TRUE;\n  287 |         }\n  288 | \n  289 |       if (replace)\n  290 |         {\n  291 |           best_start = data + 2;\n  292 |           best_w = w;\n  293 |           best_h = h;\n  294 |         }\n  295 | \n  296 |       data += (w * h) + 2;\n  297 |       nitems -= (w * h) + 2;"},{"ref":"gtk/gtkmountoperation-x11.c:387-398","code":"  387 |   if (!find_best_size (data, nitems,\n  388 |                        ideal_width, ideal_height,\n  389 |                        &w, &h, &best))\n  390 |     {\n  391 |       XFree (data);\n  392 |       return FALSE;\n  393 |     }\n  394 | \n  395 |   *width = w;\n  396 |   *height = h;\n  397 | \n  398 |   argbdata_to_pixdata (best, w * h, pixdata);"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"In _post_write_data(), `httpWrite(request->http, buffer, bytes) < bytes` compares\na signed httpWrite() return against `gsize bytes`. If httpWrite returns -1 (write\nerror) the value is converted to a huge unsigned number, so `(-1) < bytes` is\nfalse and the write-error path is skipped, silently losing data / not reporting\nthe failure.","fix":"Capture the return in a signed variable and test for < 0 separately, e.g.:\n\n    gssize written = httpWrite (request->http, buffer, bytes);\n    if (written < 0 || (gsize) written < bytes) { /* error path */ }","locations":[{"ref":"gtk/print/backends/gtkcupsutils.c:877-893","code":"  877 |       if (httpWrite (request->http, buffer, bytes) < bytes)\n  878 |         {\n  879 |           int http_errno;\n  880 | \n  881 |           http_errno = httpGetError (request->http);\n  882 | \n  883 |           request->state = GTK_CUPS_POST_DONE;\n  884 | \t  request->poll_state = GTK_CUPS_HTTP_IDLE;\n  885 |      \n  886 |           gtk_cups_result_set_error (request->result,\n  887 |                                      GTK_CUPS_ERROR_HTTP,\n  888 |                                      http_status,\n  889 |                                      http_errno, \n  890 |                                      \"Error writing to socket in Post %s\", \n  891 |                                      g_strerror (http_errno));\n  892 |           return;\n  893 |         }"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"add_string() in the broadway renderer packs string bytes into guint32 words with `v |= (*str++) << 8*c++;`. *str has type char, which is signed on most platforms; for bytes >= 0x80 the value is sign-extended to int before the shift, setting the high bits of the word and corrupting the packed representation of non-ASCII bytes in debug-node messages sent to the browser. Low impact (debug messages only) but incorrect.","fix":"Cast to unsigned char before shifting: `v |= ((guint32)(guchar)(*str++)) << (8 * c++);`.","locations":[{"ref":"gsk/broadway/gskbroadwayrenderer.c:232-255","code":"  232 | static void\n  233 | add_string (GArray *nodes, const char *str)\n  234 | {\n  235 |   guint32 len = strlen(str);\n  236 |   guint32 v, c;\n  237 | \n  238 |   add_uint32 (nodes, len);\n  239 | \n  240 |   v = 0;\n  241 |   c = 0;\n  242 |   while (*str != 0)\n  243 |     {\n  244 |       v |= (*str++) << 8*c++;\n  245 |       if (c == 4)\n  246 |         {\n  247 |           add_uint32 (nodes, v);\n  248 |           v = 0;\n  249 |           c = 0;\n  250 |         }\n  251 |     }\n  252 | \n  253 |   if (c != 0)\n  254 |     add_uint32 (nodes, v);\n  255 | }"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"gtk_css_tokenizer_read_numeric() accumulates the integer part with\n`integer = 10 * integer + digit` over an unbounded digit run with no overflow\ncheck (the inline comment even asks \"check for overflow here?\"). For very long\ndigit strings in untrusted CSS, `integer` (gint64) overflows (signed overflow\nUB), producing a wrong/implementation-defined numeric token value. The fractional\npart is guarded against overflow but the integer part is not.","fix":"Clamp accumulation once it would overflow (mirror the fractional_length guard),\nor accumulate into a double / cap at G_MAXINT64, since the value is ultimately\nconverted to double anyway.","locations":[{"ref":"gtk/css/gtkcsstokenizer.c:1112-1116","code":" 1112 |   for (integer = 0; data < tokenizer->end && g_ascii_isdigit (*data); data++)\n 1113 |     {\n 1114 |       /* check for overflow here? */\n 1115 |       integer = 10 * integer + g_ascii_digit_value (*data);\n 1116 |     }"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"Potential double GTask completion / use-after-free in the OpenURI portal. The inner GTask created in open_uri() is referenced by three independent completion paths that each call g_task_return_*() + g_object_unref(task) without disarming the others: response_received() (D-Bus 'Response' signal), canceled() (GCancellable 'cancelled' signal), and open_call_done() (D-Bus method reply error path). If the application cancels (canceled() fires) at roughly the same time the portal sends its Response, the same task is returned and unreffed twice. canceled() in particular returns the inner task and triggers open_uri_done()->open_uri_data_free(), after which a still-pending response_received() invocation operates on a freed task. There is no flag/guard ensuring exactly one of these paths completes the task.","fix":"Add a 'completed' guard (or disconnect the cancel handler and unsubscribe the signal as soon as any path completes the task) so the task is returned and unreffed exactly once.","locations":[{"ref":"gtk/gtkopenuriportal.c:144-173","code":"  144 | static void\n  145 | response_received (GDBusConnection *connection,\n  146 |                    const char      *sender_name,\n  147 |                    const char      *object_path,\n  148 |                    const char      *interface_name,\n  149 |                    const char      *signal_name,\n  150 |                    GVariant        *parameters,\n  151 |                    gpointer         user_data)\n  152 | {\n  153 |   GTask *task = user_data;\n  154 |   guint32 response;\n  155 | \n  156 |   g_variant_get (parameters, \"(u@a{sv})\", &response, NULL);\n  157 | \n  158 |   switch (response)\n  159 |     {\n  160 |     case XDG_DESKTOP_PORTAL_SUCCESS:\n  161 |       g_task_return_boolean (task, TRUE);\n  162 |       break;\n  163 |     case XDG_DESKTOP_PORTAL_CANCELLED:\n  164 |       g_task_return_new_error (task, GTK_DIALOG_ERROR, GTK_DIALOG_ERROR_DISMISSED, \"The portal dialog was dismissed by the user\");\n  165 |       break;\n  166 |     case XDG_DESKTOP_PORTAL_FAILED:\n  167 |     default:\n  168 |       g_task_return_new_error (task, GTK_DIALOG_ERROR, GTK_DIALOG_ERROR_FAILED, \"The application launch failed\");\n  169 |       break;\n  170 |     }\n  171 | \n  172 |   g_object_unref (task);\n  173 | }"},{"ref":"gtk/gtkopenuriportal.c:255-267","code":"  255 | static void\n  256 | canceled (GCancellable *cancellable,\n  257 |           GTask        *task)\n  258 | {\n  259 |   OpenUriData *data = g_task_get_task_data (task);\n  260 | \n  261 |   send_close (data);\n  262 | \n  263 |   g_task_return_new_error (task,\n  264 |                            GTK_DIALOG_ERROR, GTK_DIALOG_ERROR_CANCELLED,\n  265 |                            \"The OpenURI portal call was cancelled by the application\");\n  266 |   g_object_unref (task);\n  267 | }"},{"ref":"gtk/gtkopenuriportal.c:203-209","code":"  203 |   if (!res)\n  204 |     {\n  205 |       g_free (path);\n  206 |       g_task_return_error (task, error);\n  207 |       g_object_unref (task);\n  208 |       return;\n  209 |     }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"low","description":"GdkDisplayLinkSource accesses needs_dispatch inconsistently: gdk_display_link_source_frame_cb() reads it with g_atomic_int_get() (because it runs on the high-priority CVDisplayLink thread) but then writes it with a plain `impl->needs_dispatch = TRUE;`, and the GSource prepare/check/dispatch callbacks on the main thread read/write it non-atomically too. The mixed atomic/non-atomic access to a flag shared across threads is a (benign-in-practice but real) data race.","fix":"Use g_atomic_int_set()/g_atomic_int_get() consistently on needs_dispatch from all threads, or document/justify the relaxed access.","locations":[{"ref":"gdk/macos/gdkdisplaylinksource.c:127-132","code":"  127 |   needs_wakeup = !g_atomic_int_get (&impl->needs_dispatch);\n  128 | \n  129 |   presentation_time = host_to_frame_clock_time (inOutputTime->hostTime);\n  130 | \n  131 |   impl->presentation_time = presentation_time;\n  132 |   impl->needs_dispatch = TRUE;"},{"ref":"gdk/macos/gdkdisplaylinksource.c:53-71","code":"   53 |   return impl->needs_dispatch;\n   54 | }\n   55 | \n   56 | static gboolean\n   57 | gdk_display_link_source_check (GSource *source)\n   58 | {\n   59 |   GdkDisplayLinkSource *impl = (GdkDisplayLinkSource *)source;\n   60 |   return impl->needs_dispatch;\n   61 | }\n   62 | \n   63 | static gboolean\n   64 | gdk_display_link_source_dispatch (GSource     *source,\n   65 |                                   GSourceFunc  callback,\n   66 |                                   gpointer     user_data)\n   67 | {\n   68 |   GdkDisplayLinkSource *impl = (GdkDisplayLinkSource *)source;\n   69 |   gboolean ret = G_SOURCE_CONTINUE;\n   70 | \n   71 |   impl->needs_dispatch = FALSE;"}]},{"id":"DUPLIC_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"Duplicate #include of \"gdkcairoprivate.h\" on two consecutive lines. Harmless (header has include guards) but is dead/redundant and was likely an accidental paste.","fix":"Remove the duplicate #include \"gdkcairoprivate.h\" at line 28.","locations":[{"ref":"gsk/gskcairoblur.c:26-28","code":"   26 | #include \"gdkcairoprivate.h\"\n   27 | \n   28 | #include \"gdkcairoprivate.h\""}]},{"id":"DUPLIC_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"In collect_relations() the relation map contains a duplicated entry:\n{ GTK_ACCESSIBLE_RELATION_DETAILS, ATSPI_RELATION_DETAILS } appears twice in consecutive\nlines. The second copy is dead/redundant; if the DETAILS relation is set it will be emitted\ntwice into the relation set.","fix":"Remove the duplicate { GTK_ACCESSIBLE_RELATION_DETAILS, ATSPI_RELATION_DETAILS } entry.","locations":[{"ref":"gtk/a11y/gtkatspicontext.c:348-349","code":"  348 |     { GTK_ACCESSIBLE_RELATION_DETAILS, ATSPI_RELATION_DETAILS },\n  349 |     { GTK_ACCESSIBLE_RELATION_DETAILS, ATSPI_RELATION_DETAILS },"}]},{"id":"DUPLIC_3","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","description":"Duplicate #include of gtkcsscolorvalueprivate.h.","fix":"Remove the redundant duplicate include lines.","locations":[{"ref":"gtk/gtkcssimagefallback.c:23-24","code":"   23 | #include \"gtkcsscolorvalueprivate.h\"\n   24 | #include \"gtkcsscolorvalueprivate.h\""},{"ref":"gtk/gtkcssimagelinear.c:26-28","code":"   26 | #include \"gtkcsscolorvalueprivate.h\"\n   27 | #include \"gtkcssnumbervalueprivate.h\"\n   28 | #include \"gtkcsscolorvalueprivate.h\""},{"ref":"gtk/gtkc <div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-31 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
