 | \n  113 |   priv = gtk_gesture_swipe_get_instance_private (gesture);\n  114 | \n  115 |   for (i = 0; i < (int) priv->events->len; i++)\n  116 |     {\n  117 |       EventData *data;\n  118 | \n  119 |       data = &g_array_index (priv->events, EventData, i);\n  120 | \n  121 |       if (data->evtime >= evtime - CAPTURE_THRESHOLD_MS)\n  122 |         {\n  123 |           length = i - 1;\n  124 |           break;\n  125 |         }\n  126 |     }\n  127 | \n  128 |   if (length > 0)\n  129 |     g_array_remove_range (priv->events, 0, length);\n  130 | }"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","description":"gtk_kinetic_scrolling_update_size(): the lower-bound branch correctly compares the position against the new `lower` parameter (`if (data->position <= lower)`), but the upper-bound branch compares against the stale member `data->upper` (`if (data->position >= data->upper)`) instead of the new `upper` parameter. Copy/paste inconsistency: the CHANGE_UPPER flag is computed against the old upper value rather than the requested new one.","fix":"Change line 148 to `if (data->position >= upper)` to match the lower-bound branch.","locations":[{"ref":"gtk/gtkkineticscrolling.c:146-152","code":"  146 |   if (upper != data->upper)\n  147 |     {\n  148 |       if (data->position >= data->upper)\n  149 |         change |= GTK_KINETIC_SCROLLING_CHANGE_UPPER;\n  150 | \n  151 |       data->upper = upper;\n  152 |     }"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","description":"offset_sort_func() is used as the GCompareFunc for g_list_insert_sorted() but returns `(offset_a->value > offset_b->value)`, i.e. only 0 or 1 and never a negative value. A proper comparator must return <0/0/>0; here a<b and a==b both yield 0. As a result the offsets list is not reliably ordered by value, which can misclassify the value style class chosen in update_level_style_classes() (which relies on offsets being in ascending order).","fix":"Return a three-way result, e.g. `return offset_a->value < offset_b->value ? -1 : (offset_a->value > offset_b->value ? 1 : 0);`.","locations":[{"ref":"gtk/gtklevelbar.c:236-244","code":"  236 | static int\n  237 | offset_sort_func (gconstpointer a,\n  238 |                   gconstpointer b)\n  239 | {\n  240 |   const GtkLevelBarOffset *offset_a = a;\n  241 |   const GtkLevelBarOffset *offset_b = b;\n  242 | \n  243 |   return (offset_a->value > offset_b->value);\n  244 | }"}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Inconsistent NULL ordering between the two comparison paths of GtkStringSorter. gtk_string_sorter_compare() compares keys with g_strcmp0(), which orders NULL *before* any non-NULL string. The sort-keys fast path gtk_string_sort_keys_compare() explicitly orders a NULL key *after* (LARGER than) a non-NULL key. Items whose expression yields NULL/empty will therefore sort to opposite ends depending on whether the GtkSortListModel uses the keyed fast path or the direct comparator, producing observably different orderings for the same sorter.","fix":"Make the two paths agree on NULL handling, e.g. have gtk_string_sorter_compare() apply the same NULL-is-LARGER rule used by gtk_string_sort_keys_compare() instead of relying on g_strcmp0()'s NULL-is-SMALLER behavior.","locations":[{"ref":"gtk/gtkstringsorter.c:133-136","code":"  133 |   s1 = gtk_string_sorter_get_key (self->expression, self->ignore_case, self->collation, item1);\n  134 |   s2 = gtk_string_sorter_get_key (self->expression, self->ignore_case, self->collation, item2);\n  135 | \n  136 |   result = gtk_ordering_from_cmpfunc (g_strcmp0 (s1, s2));"},{"ref":"gtk/gtkstringsorter.c:182-187","code":"  182 |   if (sa == NULL)\n  183 |     return sb == NULL ? GTK_ORDERING_EQUAL : GTK_ORDERING_LARGER;\n  184 |   else if (sb == NULL)\n  185 |     return GTK_ORDERING_SMALLER;\n  186 | \n  187 |   return gtk_ordering_from_cmpfunc (strcmp (sa, sb));"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","description":"gtk_switch_pan_gesture_pan() divides by width/2 using integer division on the denominator while the numerator is a double:\n\n    offset /= width / 2;\n\nIf the switch width is 0 or 1 (e.g. during early allocation), `width / 2` is 0 and the expression becomes a floating-point division by zero, yielding inf/nan. The subsequent CLAMP(offset, 0, 1.0) hides the result for the inf case but nan would not be clamped meaningfully. Guarding against width <= 1 (or using `offset /= (double) width / 2.0` plus a zero check) would be safer.","fix":"Guard against a zero/near-zero denominator, e.g.:\n    if (width > 1)\n      offset /= width / 2.0;\n    self->handle_pos = CLAMP (offset, 0.0, 1.0);","locations":[{"ref":"gtk/gtkswitch.c:280-282","code":"  280 |   offset /= width / 2;\n  281 |   /* constrain the handle within the trough width */\n  282 |   self->handle_pos = CLAMP (offset, 0, 1.0);"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Format string typo for touchpad gesture delta. The format is \"%.2f %.f2\" - the second conversion \"%.f2\" prints with precision 0 followed by a literal '2', instead of \"%.2f\". The y delta is shown incorrectly (e.g. '1 2' instead of '1.23').","fix":"Use \"%.2f %.2f\" as the format string.","locations":[{"ref":"gtk/inspector/recorder.c:2026","code":" 2026 |       add_text_row (store, \"Delta\", \"%.2f %.f2\", dx, dy);"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","description":"GtkInspectorVariantEditor::dispose disconnects signal handlers with g_signal_handlers_disconnect_by_func(self->editor, variant_editor_changed_cb, self->data), but the handlers were connected with 'self' as user data (not self->data). The disconnect matches on user data and will not match, so no handler is actually disconnected here (it only works because the editor widget is then unparented/destroyed).","fix":"Disconnect using the same user data that was connected: g_signal_handlers_disconnect_by_func (self->editor, variant_editor_changed_cb, self);","locations":[{"ref":"gtk/inspector/variant-editor.c:68-74","code":"   68 |   if (self->editor)\n   69 |    {\n   70 |       g_signal_handlers_disconnect_by_func (self->editor, variant_editor_changed_cb, self->data);\n   71 | \n   72 |       gtk_widget_unparent (self->editor);\n   73 |       self->editor = NULL;\n   74 |     }"},{"ref":"gtk/inspector/variant-editor.c:106-137","code":"  106 |       g_signal_connect (self->editor, \"notify::active\",\n  107 |                         G_CALLBACK (variant_editor_changed_cb), self);\n  108 | \n  109 |       gtk_widget_set_parent (self->editor, GTK_WIDGET (self));\n  110 |     }\n  111 |   else if (g_variant_type_equal (type, G_VARIANT_TYPE_STRING))\n  112 |     {\n  113 |       if (self->editor)\n  114 |         gtk_widget_unparent (self->editor);\n  115 | \n  116 |       self->editor = gtk_entry_new ();\n  117 |       gtk_editable_set_width_chars (GTK_EDITABLE (self->editor), 10);\n  118 |       g_signal_connect (self->editor, \"notify::text\",\n  119 |                         G_CALLBACK (variant_editor_changed_cb), self);\n  120 | \n  121 |       gtk_widget_set_parent (self->editor, GTK_WIDGET (self));\n  122 |     }\n  123 |   else if (!GTK_IS_BOX (self->editor))\n  124 |     {\n  125 |       GtkWidget *entry, *label;\n  126 | \n  127 |       if (self->editor)\n  128 |         gtk_widget_unparent (self->editor);\n  129 | \n  130 |       self->editor = gtk_box_new (GTK_ORIENTATION_HORIZONTAL, 10);\n  131 |       entry = gtk_entry_new ();\n  132 |       gtk_editable_set_width_chars (GTK_EDITABLE (entry), 10);\n  133 |       gtk_box_append (GTK_BOX (self->editor), entry);\n  134 |       label = gtk_label_new (g_variant_type_peek_string (type));\n  135 |       gtk_box_append (GTK_BOX (self->editor), label);\n  136 |       g_signal_connect (entry, \"notify::text\",\n  137 |                         G_CALLBACK (variant_editor_changed_cb), self);"}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","description":"localtime_to_utctime() computes the UTC offset by subtracting hour/min/sec\nfields independently and reducing each mod 24/60/60. A non-whole-hour timezone\noffset, or a min/sec borrow, is not carried into the higher unit, so the\nresulting UTC time can be wrong (e.g. for offsets like +05:30 or when the\nminute/second difference is negative).","fix":"Compute the difference as total seconds (or use difftime/timegm on full\nstruct tm values) and normalize once, rather than per-field modular arithmetic.","locations":[{"ref":"gtk/print/backends/gtkprintbackendutils.c:77-88","code":"   77 |       diff_time.tm_hour = actual_utc_time->tm_hour - actual_local_time->tm_hour;\n   78 |       diff_time.tm_min  = actual_utc_time->tm_min  - actual_local_time->tm_min;\n   79 |       diff_time.tm_sec  = actual_utc_time->tm_sec  - actual_local_time->tm_sec;\n   80 | \n   81 |       utc_print_time.tm_hour = ((local_print_time.tm_hour + diff_time.tm_hour) + 24) % 24;\n   82 |       utc_print_time.tm_min  = ((local_print_time.tm_min  + diff_time.tm_min)  + 60) % 60;\n   83 |       utc_print_time.tm_sec  = ((local_print_time.tm_sec  + diff_time.tm_sec)  + 60) % 60;\n   84 | \n   85 |       utc_time = g_strdup_printf (\"%02d:%02d:%02d\",\n   86 |                                   utc_print_time.tm_hour,\n   87 |                                   utc_print_time.tm_min,\n   88 |                                   utc_print_time.tm_sec);"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In time_spec_parse(), the test `gtk_css_parser_try_token (parser, GTK_CSS_TOKEN_COLON) && strcmp (id, \"gpa\") == 0` evaluates the try_token first, which CONSUMES a colon token even when the consumed identifier is not \"gpa\". For an input such as `foo:bar` the colon is swallowed and `id` (\"foo\") is leaked is avoided (short-circuit means strcmp runs), but parsing then falls through to the `else if (gtk_css_parser_try_delim (parser, '.'))` branch with the stream already advanced past the colon, so a malformed begin/end time value is silently mis-parsed instead of being rejected. This is a malformed-input robustness issue (wrong parse), not a memory-safety bug.","fix":"Only consume the colon when id == \"gpa\": check `strcmp (id, \"gpa\") == 0` first and use a non-consuming peek (or restore the parser position) otherwise.","locations":[{"ref":"gtk/svg/gtksvgtimespec.c:225-283","code":"  225 |       if (gtk_css_parser_try_token (parser, GTK_CSS_TOKEN_COLON) &&\n  226 |           strcmp (id, \"gpa\") == 0)\n  227 |         {\n  228 |           g_free (id);\n  229 | \n  230 |           if (gtk_css_parser_has_function (parser, \"states\"))\n  231 |             {\n  232 |               ParseStatesArg arg = {\n  233 |                 .svg = svg,\n  234 |                 .states = { NO_STATES, NO_STATES },\n  235 |                 .set = { FALSE, FALSE },\n  236 |               };\n  237 | \n  238 |               if (gtk_css_parser_consume_function (parser, 1, 2, parse_states_arg, &arg))\n  239 |                 {\n  240 |                   spec->type = TIME_SPEC_TYPE_STATES;\n  241 | \n  242 |                   if (!arg.set[1])\n  243 |                     {\n  244 |                       TimeSpecSide side;\n  245 | \n  246 |                       if (!gtk_css_parser_try_delim (parser, '.'))\n  247 |                         return FALSE;\n  248 |                       if (gtk_css_parser_try_ident (parser, \"begin\"))\n  249 |                         side = TIME_SPEC_SIDE_BEGIN;\n  250 |                       else if (gtk_css_parser_try_ident (parser, \"end\"))\n  251 |                         side = TIME_SPEC_SIDE_END;\n  252 |                       else\n  253 |                         return FALSE;\n  254 | \n  255 |                       if (side == TIME_SPEC_SIDE_BEGIN)\n  256 |                         {\n  257 |                           spec->states.from = ALL_STATES & ~arg.states[0];\n  258 |                           spec->states.to = arg.states[0];\n  259 |                         }\n  260 |                       else\n  261 |                         {\n  262 |                           spec->states.from = arg.states[0];\n  263 |                           spec->states.to = ALL_STATES & ~arg.states[0];\n  264 |                         }\n  265 |                     }\n  266 |                   else\n  267 |                     {\n  268 |                       spec->states.from = arg.states[0];\n  269 |                       spec->states.to = arg.states[1];\n  270 |                     }\n  271 | \n  272 |                   gtk_css_parser_skip_whitespace (parser);\n  273 |                   parser_try_duration (parser, &spec->offset);\n  274 |                 }\n  275 | \n  276 |               if (*error == NULL)\n  277 |                 g_set_error (error,\n  278 |                              GTK_SVG_ERROR, GTK_SVG_ERROR_INVALID_SYNTAX,\n  279 |                              \"gpa:states() is deprecated. Use StateChange()\");\n  280 |             }\n  281 |           else\n  282 |             return FALSE;\n  283 |         }"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","description":"lerp_bool() interpolates the two booleans in reverse order relative to lerp(). It is defined as `(t * b0 + (1 - t) * b1) != 0`, so at t==0 it yields b1 and at t==1 it yields b0 — the opposite of the convention used by lerp() (t==0 -> a, t==1 -> b) and of how its callers in svg_path_data_interpolate() pass arguments (`lerp_bool (t, op0->arc.large_arc, op1->arc.large_arc)`, gtk/svg/gtksvgpathdata.c:298-299, mirroring the adjacent lerp(t, op0, op1) calls). The effect is that the large-arc / sweep flags of an interpolated SVG arc flip toward the wrong endpoint, drawing the wrong arc partway through an animation.","fix":"Swap the operands so t selects b1 at t==1: `return (t * b1 + (1 - t) * b0) != 0;` (or `t >= 0.5 ? b1 : b0`).","locations":[{"ref":"gtk/svg/gtksvgutilsprivate.h:84-88","code":"   84 | static inline gboolean\n   85 | lerp_bool (double t, gboolean b0, gboolean b1)\n   86 | {\n   87 |   return (t * b0 + (1 - t) * b1) != 0;\n   88 | }"},{"ref":"gtk/svg/gtksvgpathdata.c:298-299","code":"  298 |           op->arc.large_arc = lerp_bool (t, op0->arc.large_arc, op1->arc.large_arc);\n  299 |           op->arc.positive_sweep = lerp_bool (t, op0->arc.positive_sweep, op1->arc.positive_sweep);"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"negligible","description":"gtk_button_set_child_type() uses `if (child_type != LABEL_CHILD) notify(LABEL); else if (child_type != ICON_CHILD) notify(ICON_NAME);`. The `else if` branch is reached only when child_type == LABEL_CHILD, in which case `child_type != ICON_CHILD` is always true, making the condition tautological. The net behaviour happens to be correct (notify label when leaving label, notify icon-name when entering label) but the condition is misleading dead logic.","fix":"Replace with explicit intent, e.g. `if (child_type != LABEL_CHILD) notify(LABEL); else notify(ICON_NAME);` and drop the redundant comparison.","locations":[{"ref":"gtk/gtkbutton.c:452-455","code":"  452 |   if (child_type != LABEL_CHILD)\n  453 |     g_object_notify_by_pspec (G_OBJECT (button), props[PROP_LABEL]);\n  454 |   else if (child_type != ICON_CHILD)\n  455 |     g_object_notify_by_pspec (G_OBJECT (button), props[PROP_ICON_NAME]);"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"When receiving SCM_RIGHTS file descriptors, the inner loop iterates `j` over the fds returned by g_unix_fd_message_steal_fds, but indexes `fds[i]` (the outer message-loop index) instead of `fds[j]`. This stores the wrong fd (and, when n_fds > 1 while i stays 0, repeatedly stores fds[0] and leaks fds[1..]; conversely when i exceeds n_fds it reads past the fds array). FDs are then consumed by texture upload, so this both leaks file descriptors and can use an out-of-range/incorrect descriptor.","fix":"Use `int fd = fds[j];` inside the inner loop.","locations":[{"ref":"gdk/broadway/broadwayd.c:436-443","code":"  436 |           int j, n_fds;\n  437 |           int *fds = g_unix_fd_message_steal_fds (G_UNIX_FD_MESSAGE (messages[i]), &n_fds);\n  438 |           for (j = 0; j < n_fds; j++)\n  439 |             {\n  440 |               int fd = fds[i];\n  441 |               client->fds = g_list_append (client->fds, GINT_TO_POINTER (fd));\n  442 |             }\n  443 |           g_free (fds);"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"Suspected MAX/MIN mismatch in the 'tile horizontally, repeat vertically' branch of gsk_repeat_node_draw_repeat(). end_y is computed with MAX: `end_y = MAX (clip_bounds.origin.y + clip_bounds.size.height, child_bounds.origin.y + (y+1)*child_bounds.size.height);` whereas the symmetric 'repeat horizontally, tile vertically' branch computes the analogous end_x with MIN: `end_x = MIN (clip_bounds.origin.x + clip_bounds.size.width, child_bounds.origin.x + (x+1)*child_bounds.size.width);`. Using MAX for end_y lets the strip height exceed the clip bounds for the per-row strips, which is inconsistent with the horizontal counterpart and likely produces over-large offscreen strips / incorrect tiling for the vertical-repeat case.","fix":"Change end_y to use MIN to match the horizontal branch: `float end_y = MIN (clip_bounds.origin.y + clip_bounds.size.height, child_bounds.origin.y + (y + 1) * child_bounds.size.height);`. Verify against the reflect/pad cases and add a tiling test.","locations":[{"ref":"gsk/gskrepeatnode.c:230-264","code":"  230 |           float y;\n  231 |           for (y = floorf (tile_top); y < ceilf (tile_bottom); y++)\n  232 |             {\n  233 |               graphene_rect_t strip, snapped;\n  234 |               float start_y = MAX (clip_bounds.origin.y,\n  235 |                                    child_bounds.origin.y + y * child_bounds.size.height);\n  236 |               float end_y = MAX (clip_bounds.origin.y + clip_bounds.size.height,\n  237 |                                  child_bounds.origin.y + (y + 1) * child_bounds.size.height);\n  238 | \n  239 |               strip = GRAPHENE_RECT_INIT (child_bounds.origin.x,\n  240 |                                           start_y - y * child_bounds.size.height,\n  241 |                                           child_bounds.size.width,\n  242 |                                           end_y - start_y);\n  243 |               if (gsk_cairo_rect_snap (cr, &strip, GSK_RECT_SNAP_GROW, &snapped))\n  244 |                 {\n  245 |                   strip.origin.y = snapped.origin.y;\n  246 |                   strip.size.height = snapped.size.height;\n  247 |                 }\n  248 | \n  249 |               gsk_repeat_node_draw_tiled (cr,\n  250 |                                           data,\n  251 |                                           &GRAPHENE_RECT_INIT (\n  252 |                                               clip_bounds.origin.x,\n  253 |                                               start_y,\n  254 |                                               clip_bounds.size.width,\n  255 |                                               end_y - start_y\n  256 |                                           ),\n  257 |                                           self->repeat,\n  258 |                                           self->child,\n  259 |                                           &strip,\n  260 |                                           &GRAPHENE_POINT_INIT (\n  261 |                                             child_bounds.origin.x,\n  262 |                                             strip.origin.y + y * child_bounds.size.height\n  263 |                                           ));\n  264 |             }"},{"ref":"gsk/gskrepeatnode.c:270-305","code":"  270 |       /* repeat horizontally, tile vertically */\n  271 |       float x;\n  272 |       for (x = floorf (tile_left); x < ceilf (tile_right); x++)\n  273 |         {\n  274 |           graphene_rect_t strip, snapped;\n  275 |           float start_x = MAX (clip_bounds.origin.x,\n  276 |                                child_bounds.origin.x + x * child_bounds.size.width);\n  277 |           float end_x = MIN (clip_bounds.origin.x + clip_bounds.size.width,\n  278 |                              child_bounds.origin.x + (x + 1) * child_bounds.size.width);\n  279 | \n  280 |           strip = GRAPHENE_RECT_INIT (start_x - x * child_bounds.size.width,\n  281 |                                       child_bounds.origin.y,\n  282 |                                       end_x - start_x,\n  283 |                                       child_bounds.size.height);\n  284 |           if (gsk_cairo_rect_snap (cr, &strip, GSK_RECT_SNAP_GROW, &snapped))\n  285 |             {\n  286 |               strip.origin.x = snapped.origin.x;\n  287 |               strip.size.width = snapped.size.width;\n  288 |             }\n  289 | \n  290 |           gsk_repeat_node_draw_tiled (cr,\n  291 |                                       data,\n  292 |                                       &GRAPHENE_RECT_INIT (\n  293 |                                           start_x,\n  294 |                                           clip_bounds.origin.y,\n  295 |                                           end_x - start_x,\n  296 |                                           clip_bounds.size.height\n  297 |                                       ),\n  298 |                                       self->repeat,\n  299 |                                       self->child,\n  300 |                                       &strip,\n  301 |                                       &GRAPHENE_POINT_INIT (\n  302 |                                         strip.origin.x + x * child_bounds.size.width,\n  303 |                                         child_bounds.origin.y\n  304 |                                       ));\n  305 |         }"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"In gtk_constraint_solver_remove_constraint(), when filtering the stay_error_vars after removing a stay constraint, the two removals from the error_vars set set 'found' inconsistently. Removing pair->first sets found=TRUE, but removing pair->second sets found=FALSE (overwriting a possible earlier TRUE). This is a copy-paste error: the second branch should also set found=TRUE. As written, a pair whose 'first' is in error_vars but whose 'second' is also in error_vars ends up with found=FALSE and is wrongly re-added to 'remaining', and a pair where only 'second' matches is never kept. This corrupts the stay_error_vars bookkeeping for the Cassowary solver.","fix":"Change the second branch to set found = TRUE (or OR the two results): `if (gtk_constraint_variable_set_remove (error_vars, pair->second)) found = TRUE;`.","locations":[{"ref":"gtk/gtkconstraintsolver.c:1899-1906","code":" 1899 |               if (gtk_constraint_variable_set_remove (error_vars, pair->first))\n 1900 |                 found = TRUE;\n 1901 | \n 1902 |               if (gtk_constraint_variable_set_remove (error_vars, pair->second))\n 1903 |                 found = FALSE;\n 1904 | \n 1905 |               if (!found)\n 1906 |                 g_ptr_array_add (remaining, gtk_constraint_variable_pair_new (pair->first, pair->second));"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"update_renderer() displays the surface pointer instead of the renderer. It calls gtk_native_get_surface() (copy-pasted from update_surface) where it should call gtk_native_get_renderer(). The misc-info 'Renderer' row therefore shows the surface address, duplicating the Surface row and never showing the actual renderer.","fix":"Use obj = (GObject *) gtk_native_get_renderer (GTK_NATIVE (sl->object));","locations":[{"ref":"gtk/inspector/misc-info.c:311","code":"  311 |       obj = (GObject *)gtk_native_get_surface (GTK_NATIVE (sl->object));"}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"In bind_label_cb the GTK_IS_LABEL branch uses a standalone 'if' rather than starting the if/else-if chain, and the following GTK_IS_INSCRIPTION test is a separate 'if'. For a GtkLabel: the label binding is created, then the independent if/else-if chain runs and (Label being none of inscription/button/window/column/editable) falls into the final 'else' which calls gtk_inscription_set_text(NULL), discarding the label text. Labels therefore display no text in the object tree's value column, and the first binding leaks (it is overwritten/never stored cleanly).","fix":"Make the inscription test part of the chain: change line 1164 from 'if (GTK_IS_INSCRIPTION (item))' to 'else if (GTK_IS_INSCRIPTION (item))'.","locations":[{"ref":"gtk/inspector/object-tree.c:1162-1175","code":" 1162 |   if (GTK_IS_LABEL (item))\n 1163 |     binding = g_object_bind_property (item, \"label\", inscription, \"text\", G_BINDING_SYNC_CREATE);\n 1164 |   if (GTK_IS_INSCRIPTION (item))\n 1165 |     binding = g_object_bind_property (item, \"text\", inscription, \"text\", G_BINDING_SYNC_CREATE);\n 1166 |   else if (GTK_IS_BUTTON (item))\n 1167 |     binding = g_object_bind_property (item, \"label\", inscription, \"text\", G_BINDING_SYNC_CREATE);\n 1168 |   else if (GTK_IS_WINDOW (item))\n 1169 |     binding = g_object_bind_property (item, \"title\", inscription, \"text\", G_BINDING_SYNC_CREATE);\n 1170 |   else if (GTK_IS_TREE_VIEW_COLUMN (item))\n 1171 |     binding = g_object_bind_property (item, \"title\", inscription, \"text\", G_BINDING_SYNC_CREATE);\n 1172 |   else if (GTK_IS_EDITABLE (item))\n 1173 |     binding = g_object_bind_property (item, \"text\", inscription, \"text\", G_BINDING_SYNC_CREATE);\n 1174 |   else\n 1175 |     gtk_inscription_set_text (GTK_INSCRIPTION (inscription), NULL);"}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"gsk_quad_curve_print() reads the y-coordinates of the control/end points through the cubic union member (curve->cubic.points[1].y and curve->cubic.points[2].y) while reading the x-coordinates through the quad member (curve->quad.points[1].x, [2].x). Because GskCurve is a union and a quad's points overlap the cubic's first points, this happens to read the same memory today, but it is a clear copy-paste mistake (the surrounding lines use curve->quad). It is fragile against any future layout change and is misleading.","fix":"Use curve->quad.points[1].y and curve->quad.points[2].y to match the x reads.","locations":[{"ref":"gsk/gskcurve.c:564-572","code":"  564 | gsk_quad_curve_print (const GskCurve *curve,\n  565 |                       GString        *string)\n  566 | {\n  567 |   g_string_append_printf (string,\n  568 |                           \"M %g %g Q %g %g %g %g\",\n  569 |                           curve->quad.points[0].x, curve->quad.points[0].y,\n  570 |                           curve->quad.points[1].x, curve->cubic.points[1].y,\n  571 |                           curve->quad.points[2].x, curve->cubic.points[2].y);\n  572 | }"}]},{"id":"CPY_7","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"In append_dmabuf_texture(), the loop that prints the 'stride:' parameter reuses the same loop variable `i` for an outer and an inner for-loop. The outer loop `for (i = 0; i < n_planes; i++)` immediately contains an inner `for (i = 0; i < n_planes; i++)` that runs `i` to n_planes, so the outer loop condition is already false on the next check and only executes once. The net serialized output happens to be correct (one 'stride:' line listing all planes), but the outer loop is dead/confusing code and a clear copy-paste artifact (compare the correctly-structured 'offset:' block just above which uses a single loop).","fix":"Remove the redundant outer `for (i = 0; i < n_planes; i++)` wrapper so the 'stride:' block mirrors the 'offset:' block: emit the `_indent(p)`/'stride: ' header once, then a single loop over planes.","locations":[{"ref":"gsk/gskrendernodeparser.c:5740-5751","code":" 5740 |   for (i = 0; i < n_planes; i++)\n 5741 |     {\n 5742 |       _indent (p);\n 5743 |       g_string_append (p->str, \"stride: \");\n 5744 |       for (i = 0; i < n_planes; i++)\n 5745 |         {\n 5746 |           if (i > 0)\n 5747 |             g_string_append_printf (p->str, \", \");\n 5748 |           g_string_append_printf (p->str, \"%zu\", layout.planes[i].stride);\n 5749 |         }\n 5750 |       g_string_append (p->str, \";\\n\");\n 5751 |     }"}]},{"id":"CPY_8","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"gtk_bitset_remove_rectangle() validates its arguments with `g_return_if_fail (width <= stride)`, whereas the symmetric gtk_bitset_add_rectangle() uses the stricter and correct `g_return_if_fail ((start % stride) + width <= stride)`. The remove variant therefore fails to reject rectangles whose rows wrap past the stride boundary, so it can remove values from the next row that were never part of the intended rectangle.","fix":"Use the same precondition in remove_rectangle: `g_return_if_fail ((start % stride) + width <= stride);` to match add_rectangle().","locations":[{"ref":"gtk/gtkbitset.c:482-531","code":"  482 | void\n  483 | gtk_bitset_add_rectangle (GtkBitset *self,\n  484 |                           guint      start,\n  485 |                           guint      width,\n  486 |                           guint      height,\n  487 |                           guint      stride)\n  488 | {\n  489 |   guint i;\n  490 | \n  491 |   g_return_if_fail (self != NULL);\n  492 |   g_return_if_fail ((start % stride) + width <= stride);\n  493 |   g_return_if_fail (G_MAXUINT - start >= height * stride);\n  494 | \n  495 |   if (width == 0 || height == 0)\n  496 |     return;\n  497 | \n  498 |   for (i = 0; i < height; i++)\n  499 |     gtk_bitset_add_range (self, i * stride + start, width);\n  500 | }\n  501 | \n  502 | /**\n  503 |  * gtk_bitset_remove_rectangle:\n  504 |  * @self: a `GtkBitset`\n  505 |  * @start: first value to remove\n  506 |  * @width: width of the rectangle\n  507 |  * @height: height of the rectangle\n  508 |  * @stride: row stride of the grid\n  509 |  *\n  510 |  * Interprets the values as a 2-dimensional boolean grid with the given @stride\n  511 |  * and inside that grid, removes a rectangle with the given @width and @height.\n  512 |  */\n  513 | void\n  514 | gtk_bitset_remove_rectangle (GtkBitset *self,\n  515 |                              guint      start,\n  516 |                              guint      width,\n  517 |                              guint      height,\n  518 |                              guint      stride)\n  519 | {\n  520 |   guint i;\n  521 | \n  522 |   g_return_if_fail (self != NULL);\n  523 |   g_return_if_fail (width <= stride);\n  524 |   g_return_if_fail (G_MAXUINT - start >= height * stride);\n  525 | \n  526 |   if (width == 0 || height == 0)\n  527 |     return;\n  528 | \n  529 |   for (i = 0; i < height; i++)\n  530 |     gtk_bitset_remove_range (self, i * stride + start, width);\n  531 | }"}]},{"id":"CPY_9","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"When formatting a VEC2 GL-shader uniform, the y component is read with graphene_vec2_get_x() instead of graphene_vec2_get_y(), so both displayed values are the x coordinate.","fix":"Change line 1385 to: float y = graphene_vec2_get_y (&v);","locations":[{"ref":"gtk/inspector/recorder.c:1384-1385","code":" 1384 |                   float x = graphene_vec2_get_x (&v);\n 1385 |                   float y = graphene_vec2_get_x (&v);"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"gdk_png_get_color_state: when a cICP chunk is present but gdk_color_state_new_for_cicp fails, the code calls g_set_error(error, ...) but then falls through and ultimately returns a non-NULL color state (GDK_COLOR_STATE_SRGB). The caller checks `if (color_state == NULL) return NULL;`, so it proceeds successfully while *error has been set. A caller that inspects *error after a successful return will see a spurious error, and the GError is leaked if the caller does not free it on the success path.","fix":"On unsupported cICP, either return NULL (and have the caller clean up png/info) or clear the local error and fall back to sRGB without touching *error. Do not both set *error and return a valid color state.","locations":[{"ref":"gdk/loaders/gdkpng.c:215-246","code":"  215 |       if (color_state)\n  216 |         {\n  217 |           g_debug (\"Color state from cICP data: %s\", gdk_color_state_get_name (color_state));\n  218 |           return color_state;\n  219 |         }\n  220 |       else\n  221 |         {\n  222 |           g_set_error_literal (error,\n  223 |                                GDK_TEXTURE_ERROR, GDK_TEXTURE_ERROR_UNSUPPORTED_CONTENT,\n  224 |                                local_error->message);\n  225 |           g_error_free (local_error);\n  226 |         }\n  227 |     }\n  228 | \n  229 | #if 0\n  230 |   if (png_get_iCCP (png, info, &name, NULL, &icc_data, &icc_len))\n  231 |     {\n  232 |     }\n  233 | #endif\n  234 | \n  235 |   if (png_get_sRGB (png, info, &intent))\n  236 |     return gdk_color_state_ref (GDK_COLOR_STATE_SRGB);\n  237 | \n  238 |   /* If neither of those is valid, the result is sRGB */\n  239 |   if (!png_get_valid (png, info, PNG_INFO_gAMA) &&\n  240 |       !png_get_valid (png, info, PNG_INFO_cHRM))\n  241 |     return GDK_COLOR_STATE_SRGB;\n  242 | \n  243 |   g_debug (\"Failed to find color state, assuming SRGB\");\n  244 | \n  245 |   return GDK_COLOR_STATE_SRGB;\n  246 | }"},{"ref":"gdk/loaders/gdkpng.c:444-446","code":"  444 |   color_state = gdk_png_get_color_state (png, info, error);\n  445 |   if (color_state == NULL)\n  446 |     return NULL;"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"gdk_d3d12_resource_new_from_bytes() ignores the HRESULT of ID3D12Resource_Map(). The return value isn't even captured. If Map() fails, buffer_data is left uninitialized and gdk_memory_copy() then writes/reads through a garbage pointer. Furthermore the final success check at the `out:` label only inspects the last `hr` value (from CreateCommandQueue), so a Map() failure is not reflected there and the function can return a half-initialized resource.","fix":"Capture and check the HRESULT of ID3D12Resource_Map() with gdk_win32_check_hresult() and `goto out` on failure before calling gdk_memory_copy().","locations":[{"ref":"gdk/win32/gdkd3d12utils.c:162-169","code":"  162 |   ID3D12Resource_Map (buffer, 0, (&(D3D12_RANGE) { 0, buffer_layout.size }), &buffer_data );\n  163 | \n  164 |   gdk_memory_copy (buffer_data,\n  165 |                    &buffer_layout,\n  166 |                    data,\n  167 |                    layout);\n  168 | \n  169 |   ID3D12Resource_Unmap (buffer, 0, (&(D3D12_RANGE) { 0, buffer_layout.size }));"},{"ref":"gdk/win32/gdkd3d12utils.c:223-235","code":"  223 | out:\n  224 |   if (!SUCCEEDED (hr))\n  225 |     {\n  226 |       gdk_win32_com_clear (&resource);\n  227 |       resource = NULL;\n  228 |     }\n  229 |   gdk_win32_com_clear (&buffer);\n  230 |   gdk_win32_com_clear (&commands);\n  231 |   gdk_win32_com_clear (&allocator);\n  232 |   gdk_win32_com_clear (&queue);\n  233 |   gdk_win32_com_clear (&device);\n  234 | \n  235 |   return resource;"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"gdk_android_glib_context_run_on_main_cb calls FindClass(\"java/lang/Runnable\") and GetMethodID without checking for NULL or pending exceptions before CallVoidMethod. If class/method lookup fails (it normally won't, but JNI requires the check), the subsequent calls dereference NULL / run with a pending exception.","fix":"Check runnable_class and run for NULL (and clear/handle exceptions) before invoking; bail out gracefully otherwise.","locations":[{"ref":"gdk/android/gdkandroidutils.c:23-32","code":"   23 | static gboolean\n   24 | gdk_android_glib_context_run_on_main_cb (jobject runnable)\n   25 | {\n   26 |   JNIEnv *env = gdk_android_get_env ();\n   27 |   jclass runnable_class = (*env)->FindClass (env, \"java/lang/Runnable\");\n   28 |   jmethodID run = (*env)->GetMethodID (env, runnable_class, \"run\", \"()V\");\n   29 |   (*env)->CallVoidMethod (env, runnable, run);\n   30 |   (*env)->DeleteLocalRef (env, runnable_class);\n   31 |   return G_SOURCE_REMOVE;\n   32 | }"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"gdk_cairo_region_create_from_surface() ignores the return value of _gdk_cairo_surface_extents(). When the surface is unbounded, _gdk_cairo_surface_extents() returns FALSE and zero-fills extents; the code then proceeds to allocate a 0x0 A1 coercion image and produce an empty region rather than detecting/handling the unbounded case. The helper's own doc-comment explicitly says callers must check the return value to handle the unbounded case.","fix":"Check the return value of _gdk_cairo_surface_extents() and handle the unbounded/failure case explicitly (e.g. return an empty region early).","locations":[{"ref":"gdk/gdkcairo.c:233-246","code":"  233 | cairo_region_t *\n  234 | gdk_cairo_region_create_from_surface (cairo_surface_t *surface)\n  235 | {\n  236 |   cairo_region_t *region;\n  237 |   GdkRectangle extents, rect;\n  238 |   cairo_surface_t *image;\n  239 |   cairo_t *cr;\n  240 |   int x, y, stride;\n  241 |   guchar *data;\n  242 | \n  243 |   _gdk_cairo_surface_extents (surface, &extents);\n  244 | \n  245 |   if (cairo_surface_get_content (surface) == CAIRO_CONTENT_COLOR)\n  246 |     return cairo_region_create_rectangle (&extents);"},{"ref":"gdk/gdkcairo.c:178-213","code":"  178 | static gboolean\n  179 | _gdk_cairo_surface_extents (cairo_surface_t *surface,\n  180 |                             GdkRectangle    *extents)\n  181 | {\n  182 |   double x1, x2, y1, y2;\n  183 |   cairo_t *cr;\n  184 | \n  185 |   g_return_val_if_fail (surface != NULL, FALSE);\n  186 |   g_return_val_if_fail (extents != NULL, FALSE);\n  187 | \n  188 |   cr = cairo_create (surface);\n  189 |   cairo_clip_extents (cr, &x1, &y1, &x2, &y2);\n  190 |   cairo_destroy (cr);\n  191 | \n  192 |   x1 = floor (x1);\n  193 |   y1 = floor (y1);\n  194 |   x2 = ceil (x2);\n  195 |   y2 = ceil (y2);\n  196 |   x2 -= x1;\n  197 |   y2 -= y1;\n  198 | \n  199 |   if (x1 < G_MININT || x1 > G_MAXINT ||\n  200 |       y1 < G_MININT || y1 > G_MAXINT ||\n  201 |       x2 > G_MAXINT || y2 > G_MAXINT)\n  202 |     {\n  203 |       extents->x = extents->y = extents->width = extents->height = 0;\n  204 |       return FALSE;\n  205 |     }\n  206 | \n  207 |   extents->x = x1;\n  208 |   extents->y = y1;\n  209 |   extents->width = x2;\n  210 |   extents->height = y2;\n  211 | \n  212 |   return TRUE;\n  213 | }"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"select_thread_start() ignores the return value of pipe(select_thread_wakeup_pipe). If pipe() fails, the two fds are left uninitialized/garbage and the subsequent fcntl()/read()/write() on the wakeup pipe operate on invalid descriptors, silently breaking select-thread wakeups.","fix":"Check the return value of pipe() and g_error()/warn on failure, as is done for other unrecoverable setup failures.","locations":[{"ref":"gdk/macos/gdkmacoseventsource.c:355-356","code":"  355 |   pipe (select_thread_wakeup_pipe);\n  356 |   fcntl (select_thread_wakeup_pipe[0], F_SETFL, O_NONBLOCK);"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"gdk_d3d12_fence_wait_sync() ignores a possible failure of CreateEvent(). If CreateEvent returns NULL, ID3D12Fence_SetEventOnCompletion gets a NULL handle and WaitForSingleObject(NULL, INFINITE) returns immediately (WAIT_FAILED) instead of waiting, silently breaking the busy-wait-for-fence contract.","fix":"Check `event != NULL` (g_return_if_fail / warn) before using it.","locations":[{"ref":"gdk/win32/gdkd3d12utils.c:278-288","code":"  278 | void\n  279 | gdk_d3d12_fence_wait_sync (ID3D12Fence *fence,\n  280 |                            guint64      fence_value)\n  281 | {\n  282 |   HANDLE event;\n  283 | \n  284 |   event = CreateEvent (NULL, FALSE, FALSE, NULL);\n  285 |   hr_warn (ID3D12Fence_SetEventOnCompletion (fence, fence_value, event));\n  286 |   WaitForSingleObject (event, INFINITE);\n  287 |   CloseHandle (event);\n  288 | }"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"parse_glyphs() ignores the return value of gtk_css_parser_consume_number() when reading the glyph advance width: `gtk_css_parser_consume_number (parser, &d);` without checking success (line 2236), then uses d. Other consume_number calls in the same function are checked. On a malformed width token d is left undefined and used to compute geometry.width. Untrusted-input robustness issue.","fix":"Check the return value: `if (!gtk_css_parser_consume_number (parser, &d)) { pango_glyph_string_free (glyph_string); return FALSE; }`.","locations":[{"ref":"gsk/gskrendernodeparser.c:2234-2242","code":" 2234 |           if (gtk_css_parser_has_number (parser))\n 2235 |             {\n 2236 |               gtk_css_parser_consume_number (parser, &d);\n 2237 |               gi.geometry.width = (int) (d * PANGO_SCALE);\n 2238 |             }\n 2239 |           else\n 2240 |             {\n 2241 |               gi.geometry.width = GLYPH_NEEDS_WIDTH;\n 2242 |             }"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"AT-SPI Text \"GetStringAtOffset\": when gtk_accessible_text_get_contents_at() returns NULL,\nthe code returns the \"empty\" variant inside the `if (bytes == NULL)` branch but then falls\nthrough to `g_bytes_unref (bytes)` with bytes == NULL. g_bytes_unref() is not documented to\naccept NULL in all GLib versions and may crash/assert; even where tolerated it relies on\nimplementation behaviour. The non-NULL branch also returns a variant and then unrefs, so the\nshared unref at the end is reached with NULL in the error case.","fix":"Use `g_clear_pointer (&bytes, g_bytes_unref)` or only unref inside the non-NULL branch.","locations":[{"ref":"gtk/a11y/gtkatspitext.c:146-165","code":"  146 |   else if (g_strcmp0 (method_name, \"GetStringAtOffset\") == 0)\n  147 |     {\n  148 |       unsigned int start, end;\n  149 |       int offset;\n  150 |       AtspiTextGranularity granularity;\n  151 |       GBytes *bytes;\n  152 | \n  153 |       g_variant_get (parameters, \"(iu)\", &offset, &granularity);\n  154 | \n  155 |       bytes = gtk_accessible_text_get_contents_at (accessible_text, offset,\n  156 |                                                    atspi_granularity_to_gtk (granularity),\n  157 |                                                    &start, &end);\n  158 | \n  159 |       if (bytes == NULL)\n  160 |         g_dbus_method_invocation_return_value (invocation, g_variant_new (\"(sii)\", \"\", -1, -1));\n  161 |       else\n  162 |         g_dbus_method_invocation_return_value (invocation, g_variant_new (\"(sii)\", g_bytes_get_data (bytes, NULL), start, end));\n  163 | \n  164 |       g_bytes_unref (bytes);\n  165 |     }"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In gtk_css_data_url_parse(), the non-base64 branch uses g_uri_unescape_string()\nthen bsize = strlen(bdata). As the in-file comment notes (\"This doesn't allow nul\nbytes\"), any embedded percent-encoded NUL truncates the decoded data silently.\nFor data: URLs feeding binary resources this produces a wrong-length, truncated\nGBytes rather than an error.","fix":"Use a decoder that preserves length (e.g. g_uri_unescape_bytes()) and propagate\nthe true byte length instead of strlen().","locations":[{"ref":"gtk/css/gtkcssdataurl.c:131-145","code":"  131 |     {\n  132 |       /* URI encoded, i.e. \"percent\" encoding */\n  133 |       /* XXX: This doesn't allow nul bytes */\n  134 |       bdata = g_uri_unescape_string (data_start, NULL);\n  135 |       if (bdata == NULL)\n  136 |         {\n  137 |           g_set_error (error,\n  138 |                        G_IO_ERROR,\n  139 |                        G_IO_ERROR_INVALID_FILENAME,\n  140 |                        _(\"Could not unescape string\"));\n  141 |           g_free (mimetype);\n  142 |           return NULL;\n  143 |         }\n  144 |       bsize = strlen (bdata);\n  145 |     }"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"gdk_texture_new_from_filename_at_scale() returns NULL when svg_from_bytes() reports an unsupported SVG feature (the `unsupported` out-string is set), but it never sets the GError. Callers receive a NULL texture with **error still NULL, which violates the GError contract for a function that takes a GError** and returns a pointer.","fix":"When `unsupported` is set and the function returns NULL, set a GError (e.g. G_IO_ERROR_FAILED) describing the unsupported feature before returning.","locations":[{"ref":"gtk/gdktextureutils.c:386-398","code":"  386 |   svg = svg_from_bytes (bytes, FALSE, &unsupported);\n  387 |   g_bytes_unref (bytes);\n  388 |   if (unsupported)\n  389 |     {\n  390 |       g_clear_object (&svg);\n  391 |       g_free (unsupported);\n  392 |       return NULL;\n  393 |     }\n  394 | \n  395 |   texture = svg_to_texture (svg, width, height, NULL, 0);\n  396 |   g_object_unref (svg);\n  397 | \n  398 |   return texture;"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"color_picked() calls g_error_free(error) when gtk_color_picker_pick_finish() returns NULL, without checking that error is non-NULL. If a picker implementation returns NULL without setting the GError (contract violation), g_error_free(NULL) is undefined behavior. Using g_clear_error() would be safe regardless.","fix":"Use g_clear_error (&error); instead of g_error_free (error); (g_clear_error tolerates NULL).","locations":[{"ref":"gtk/gtkcoloreditor.c:395-399","code":"  395 |   color = gtk_color_picker_pick_finish (picker, res, &error);\n  396 |   if (color == NULL)\n  397 |     {\n  398 |       g_error_free (error);\n  399 |     }"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In parse_import(), the url() branch (non-string import target) silently sets file = NULL when gtk_css_parser_resolve_url() fails, without emitting any diagnostic, whereas the string branch emits a 'Could not resolve ... to a valid URL' error. An @import with an unresolvable url() token is therefore silently ignored with no feedback.","fix":"Emit gtk_css_parser_error_import() in the url() branch when resolve_url returns NULL, matching the string branch.","locations":[{"ref":"gtk/gtkcssprovider.c:1047-1057","code":" 1047 |   else\n 1048 |     {\n 1049 |       char *url = gtk_css_parser_consume_url (scanner->parser);\n 1050 |       if (url)\n 1051 |         {\n 1052 |           file = gtk_css_parser_resolve_url (scanner->parser, url);\n 1053 |           g_free (url);\n 1054 |         }\n 1055 |       else\n 1056 |         file = NULL;\n 1057 |     }"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In gtk_css_shadow_value_parse(), when gtk_css_shadow_value_parse_one() fails it neither increments n_shadows nor aborts; the do/while loop just continues. If the (single) shadow fails to parse and there is no following comma, the function falls through and returns gtk_css_shadow_value_new(shadows, 0, ...) == the 'none' value instead of NULL. An invalid box-shadow/shadow value is thus silently turned into 'none' rather than reported as a failed value parse (only the lower-level parser error is recorded). Malformed shadows in the middle of a comma list are likewise silently dropped.","fix":"On parse_one failure, goto fail (return NULL) instead of continuing/falling through, so the whole shadow value is rejected.","locations":[{"ref":"gtk/gtkcssshadowvalue.c:517-549","code":"  517 | GtkCssValue *\n  518 | gtk_css_shadow_value_parse (GtkCssParser *parser,\n  519 |                             gboolean      box_shadow_mode)\n  520 | {\n  521 |   ShadowValue shadows[MAX_SHADOWS];\n  522 |   int n_shadows = 0;\n  523 |   int i;\n  524 | \n  525 |   if (gtk_css_parser_try_ident (parser, \"none\"))\n  526 |     return gtk_css_shadow_value_new_none ();\n  527 | \n  528 |   do {\n  529 |     if (n_shadows == MAX_SHADOWS)\n  530 |       {\n  531 |         gtk_css_parser_error_syntax (parser, \"Not more than %d shadows supported\", MAX_SHADOWS);\n  532 |         goto fail;\n  533 |       }\n  534 |     if (gtk_css_shadow_value_parse_one (parser, box_shadow_mode, &shadows[n_shadows]))\n  535 |       n_shadows++;\n  536 | \n  537 |   } while (gtk_css_parser_try_token (parser, GTK_CSS_TOKEN_COMMA));\n  538 | \n  539 |   return gtk_css_shadow_value_new (shadows, n_shadows, FALSE);\n  540 | \n  541 | fail:\n  542 |   for (i = 0; i < n_shadows; i++)\n  543 |     {\n  544 |       const ShadowValue *shadow = &shadows[i];\n  545 | \n  546 |       shadow_value_unref (shadow);\n  547 |     }\n  548 |   return NULL;\n  549 | }"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"launch_done() in GtkLinkButton dereferences error->message unconditionally when the launch reports failure (`g_warning (\"Failed to launch handler: %s\", error->message)`). If a *_launch_finish() ever returns FALSE without setting the error (or if it sets a benign cancellation/dismissal error), this either NULL-derefs or spams a warning on every user dismissal. The common GTK convention is to ignore G_IO_ERROR_CANCELLED/DISMISSED and to null-check the error before formatting.","fix":"Check `if (error && !g_error_matches (error, GTK_DIALOG_ERROR, GTK_DIALOG_ERROR_DISMISSED) && !g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED)) g_warning (...); g_clear_error (&error);` and guard against a NULL error.","locations":[{"ref":"gtk/gtklinkbutton.c:500-520","code":"  500 | static void\n  501 | launch_done (GObject      *source,\n  502 |              GAsyncResult *result,\n  503 |              gpointer      data)\n  504 | {\n  505 |   GError *error = NULL;\n  506 |   gboolean success;\n  507 | \n  508 |   if (GTK_IS_FILE_LAUNCHER (source))\n  509 |     success = gtk_file_launcher_launch_finish (GTK_FILE_LAUNCHER (source), result, &error);\n  510 |   else if (GTK_IS_URI_LAUNCHER (source))\n  511 |     success = gtk_uri_launcher_launch_finish (GTK_URI_LAUNCHER (source), result, &error);\n  512 |   else\n  513 |     g_assert_not_reached ();\n  514 | \n  515 |   if (!success)\n  516 |     {\n  517 |       g_warning (\"Failed to launch handler: %s\", error->message);\n  518 |       g_error_free (error);\n  519 |     }\n  520 | }"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"render_node_save_response() dereferences error->message in the cancel/failure path of gtk_file_dialog_save_finish without checking that the path is a genuine error vs user cancellation; the same pattern in save_response prints to stderr on a normal user cancel (G_IO_ERROR_CANCELLED). Minor but produces spurious 'Error saving ...' console spam whenever the user dismisses the file dialog.","fix":"Check g_error_matches(error, G_IO_ERROR, G_IO_ERROR_CANCELLED) (or G_IO_ERROR_DISMISSED) and silently return in that case.","locations":[{"ref":"gtk/inspector/recorder.c:2226-2230","code":" 2226 |   else\n 2227 |     {\n 2228 |       g_print (\"Error saving nodes: %s\\n\", error->message);\n 2229 |       g_error_free (error);\n 2230 |     }"},{"ref":"gtk/inspector/css-editor.c:269-273","code":"  269 |   else\n  270 |     {\n  271 |       g_print (\"Error saving css: %s\\n\", error->message);\n  272 |       g_error_free (error);\n  273 |     }"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","description":"languages_variant_init() frees a GMarkupParseContext with g_free() instead of g_markup_parse_context_free():\n\n    ctx = g_markup_parse_context_new (&parser, 0, NULL, NULL);\n    res = g_markup_parse_context_parse (ctx, buf, buf_len, &error);\n    g_free (ctx);\n\nA GMarkupParseContext is an opaque struct that owns internal allocations (its parse stack, partial-text buffers, etc.). Releasing it with g_free() frees only the top-level struct and leaks all of its internal state; it is also undefined to free a glib-allocated opaque type this way. The context must be released with g_markup_parse_context_free().","fix":"Replace g_free (ctx); with g_markup_parse_context_free (ctx);","locations":[{"ref":"gtk/language-names.c:278-281","code":"  278 |       ctx = g_markup_parse_context_new (&parser, 0, NULL, NULL);\n  279 | \n  280 |       res = g_markup_parse_context_parse (ctx, buf, buf_len, &error);\n  281 |       g_free (ctx);"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"When a widget that is a member of a displayed size group is destroyed, size_group_row_widget_destroyed() removes the row via gtk_box_remove (GTK_BOX (parent), ...). But rows are inserted into a GtkListBox (gtk_list_box_insert), so 'parent' is a GtkListBox, not a GtkBox. Calling gtk_box_remove on a GtkListBox is a type-confusion / wrong-API call that triggers a GTK_IS_BOX assertion failure (and fails to remove the row).","fix":"Remove via the list box API: gtk_list_box_remove (GTK_LIST_BOX (parent), GTK_WIDGET (row)); (guarding for the actual parent type if rows may be reparented).","locations":[{"ref":"gtk/inspector/size-groups.c:85-93","code":"   85 | static void\n   86 | size_group_row_widget_destroyed (GtkWidget *widget, SizeGroupRow *row)\n   87 | {\n   88 |   GtkWidget *parent;\n   89 | \n   90 |   parent = gtk_widget_get_parent (GTK_WIDGET (row));\n   91 |   if (parent)\n   92 |     gtk_box_remove (GTK_BOX (parent), GTK_WIDGET (row));\n   93 | }"},{"ref":"gtk/inspector/size-groups.c:215","code":"  215 |   gtk_list_box_insert (listbox, row, -1);"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"gdk_d3d12_command_queue_wait_sync() calls ID3D12Resource_GetDevice() on an ID3D12CommandQueue* (`queue`). It happens to work because GetDevice occupies the same vtable slot on every ID3D12DeviceChild, but it is a type-confusing macro misuse; the correct call is ID3D12CommandQueue_GetDevice(). Same pattern is fine but confusing.","fix":"Use ID3D12CommandQueue_GetDevice(queue, ...) for clarity/correctness.","locations":[{"ref":"gdk/win32/gdkd3d12utils.c:252-254","code":"  252 |   hr_warn (ID3D12Resource_GetDevice (queue,\n  253 |                                      &IID_ID3D12Device,\n  254 |                                      (void **) &device));"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"gtk_tree_row_reference_free dereferences reference->proxy unconditionally via g_object_get_data (G_OBJECT (reference->proxy), ...) and later g_object_unref (reference->proxy). However, when the proxy object is destroyed while references are still outstanding, release_row_references() sets reference->proxy = NULL (and reference->model = NULL when proxy == model) but leaves the reference allocation for the user to free, as documented. If the user then calls gtk_tree_row_reference_free() on such a reference, G_OBJECT(NULL) is invoked, g_object_get_data(NULL,...) and g_object_unref(NULL) are called, producing GLib criticals (and a NULL model unref). The function guards reference == NULL but not reference->proxy == NULL.","fix":"Add an early `if (reference->proxy == NULL) { gtk_tree_path_free (reference->path); g_clear_object (&reference->model); g_free (reference); return; }` guard (matching the proxy-destroyed state set in release_row_references), or otherwise NULL-check proxy before the g_object_get_data/g_object_unref calls.","locations":[{"ref":"gtk/deprecated/gtktreemodel.c:2617-2651","code":" 2617 | void\n 2618 | gtk_tree_row_reference_free (GtkTreeRowReference *reference)\n 2619 | {\n 2620 |   RowRefList *refs;\n 2621 | \n 2622 |   if (reference == NULL)\n 2623 |     return;\n 2624 | \n 2625 |   refs = g_object_get_data (G_OBJECT (reference->proxy), ROW_REF_DATA_STRING);\n 2626 | \n 2627 |   if (refs == NULL)\n 2628 |     {\n 2629 |       g_warning (G_STRLOC\": bad row reference, proxy has no outstanding row references\");\n 2630 |       return;\n 2631 |     }\n 2632 | \n 2633 |   refs->list = g_slist_remove (refs->list, reference);\n 2634 | \n 2635 |   if (refs->list == NULL)\n 2636 |     {\n 2637 |       g_object_set_data (G_OBJECT (reference->proxy),\n 2638 |                          I_(ROW_REF_DATA_STRING),\n 2639 |                          NULL);\n 2640 |     }\n 2641 | \n 2642 |   if (reference->path)\n 2643 |     {\n 2644 |       gtk_tree_row_reference_unref_path (reference->path, reference->model, reference->path->depth);\n 2645 |       gtk_tree_path_free (reference->path);\n 2646 |     }\n 2647 | \n 2648 |   g_object_unref (reference->proxy);\n 2649 |   g_object_unref (reference->model);\n 2650 |   g_free (reference);\n 2651 | }"},{"ref":"gtk/deprecated/gtktreemodel.c:2186-2208","code":" 2186 | static void\n 2187 | release_row_references (gpointer data)\n 2188 | {\n 2189 |   RowRefList *refs = data;\n 2190 |   GSList *tmp_list = NULL;\n 2191 | \n 2192 |   tmp_list = refs->list;\n 2193 |   while (tmp_list != NULL)\n 2194 |     {\n 2195 |       GtkTreeRowReference *reference = tmp_list->data;\n 2196 | \n 2197 |       if (reference->proxy == (GObject *)reference->model)\n 2198 |         reference->model = NULL;\n 2199 |       reference->proxy = NULL;\n 2200 | \n 2201 |       /* we don't free the reference, users are responsible for that. */\n 2202 | \n 2203 |       tmp_list = tmp_list->next;\n 2204 |     }\n 2205 | \n 2206 |   g_slist_free (refs->list);\n 2207 |   g_free (refs);\n 2208 | }"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"gtk_calendar_drag_prepare() allocates a GDate with g_date_new_dmy() and frees it with g_free() instead of g_date_free(). While GDate is currently a plain g_slice/g_new allocation so g_free happens to work today, this is incorrect API usage and could leak or crash if GDate's allocation strategy changes.","fix":"Use g_date_free (date); instead of g_free (date);","locations":[{"ref":"gtk/gtkcalendar.c:551-555","code":"  551 |   date = g_date_new_dmy (g_date_time_get_day_of_month (calendar->date),\n  552 |                          g_date_time_get_month (calendar->date),\n  553 |                          g_date_time_get_year (calendar->date));\n  554 |   g_date_strftime (str, 127, \"%x\", date);\n  555 |   g_free (date);"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"gtk_joined_menu_append_menu() and gtk_joined_menu_prepend_menu() perform their argument validation with `g_return_if_fail (G_MENU_MODEL (model))`. G_MENU_MODEL() is a cast macro, not a type predicate, so the check is effectively only `model != NULL` while also emitting a spurious GLib cast-check warning rather than the intended type assertion. gtk_joined_menu_remove_menu() correctly uses G_IS_MENU_MODEL().","fix":"Use `g_return_if_fail (G_IS_MENU_MODEL (model));` in both append and prepend, matching remove_menu.","locations":[{"ref":"gtk/gtkjoinedmenu.c:256","code":"  256 |   g_return_if_fail (G_MENU_MODEL (model));"},{"ref":"gtk/gtkjoinedmenu.c:266","code":"  266 |   g_return_if_fail (G_MENU_MODEL (model));"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"GtkInspectorNodeWrapper declares its node/draw-node/profile-node params as g_param_spec_pointer, but the property getter reads them with g_value_set_boxed (GValue is G_TYPE_POINTER, not a boxed type). A g_object_get on any of these properties triggers a 'value not a boxed type' g_critical and returns garbage. set_property correctly uses g_value_get_pointer, so get/set are inconsistent.","fix":"Use g_value_set_pointer() in the getter to match the G_TYPE_POINTER pspecs (or declare the params with the proper boxed GSK_TYPE_RENDER_NODE type and use boxed accessors consistently).","locations":[{"ref":"gtk/inspector/nodewrapper.c:73-83","code":"   73 |     case PROP_DRAW_NODE:\n   74 |       g_value_set_boxed (value, self->draw_node);\n   75 |       break;\n   76 | \n   77 |     case PROP_NODE:\n   78 |       g_value_set_boxed (value, self->node);\n   79 |       break;\n   80 | \n   81 |     case PROP_PROFILE_NODE:\n   82 |       g_value_set_boxed (value, self->profile_node);\n   83 |       break;"},{"ref":"gtk/inspector/nodewrapper.c:150-158","code":"  150 |   props[PROP_DRAW_NODE] =\n  151 |     g_param_spec_pointer (\"draw-node\", NULL, NULL,\n  152 |                           G_PARAM_READWRITE | G_PARAM_CONSTRUCT | G_PARAM_STATIC_NAME);\n  153 |   props[PROP_NODE] =\n  154 |     g_param_spec_pointer (\"node\", NULL, NULL,\n  155 |                           G_PARAM_READWRITE | G_PARAM_CONSTRUCT | G_PARAM_STATIC_NAME);\n  156 |   props[PROP_PROFILE_NODE] =\n  157 |     g_param_spec_pointer (\"profile-node\", NULL, NULL,\n  158 |                           G_PARAM_READWRITE | G_PARAM_CONSTRUCT | G_PARAM_STATIC_NAME);"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"GtkInspectorPropList exposes the 'search-entry' property with g_value_take_object() in its getter. take_object steals a reference, but the getter does not own one (search_entry is owned by the widget/template tree). A g_object_get(pl, \"search-entry\", ...) call would over-consume a reference, leading to premature finalization / use-after-free of the search entry. Standard pattern is g_value_set_object().","fix":"Use g_value_set_object (value, pl->priv->search_entry);","locations":[{"ref":"gtk/inspector/prop-list.c:154-156","code":"  154 |       case PROP_SEARCH_ENTRY:\n  155 |         g_value_take_object (value, pl->priv->search_entry);\n  156 |         break;"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"GtkInspectorStatistics 'button' property getter uses g_value_take_object() on sl->priv->button, which it does not own a reference to (the button is owned by the template). Reading the property via g_object_get would steal a ref and can cause premature destruction of the button.","fix":"Use g_value_set_object (value, sl->priv->button);","locations":[{"ref":"gtk/inspector/statistics.c:838-840","code":"  838 |     case PROP_BUTTON:\n  839 |       g_value_take_object (value, sl->priv->button);\n  840 |       break;"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"gsk_gpu_frame_reserve_vertex_data() grows the vertex buffer by exactly old_size*2\nonce when more space is needed, but does not loop. If a single reservation\n`size` is larger than old_size (i.e. size > old buffer size, possible for a very\nlarge texture-vertex-data stride or a future larger op), the doubled buffer\n(old_size*2) can still be smaller than size_needed, leaving the buffer\nundersized and subsequent writes through gsk_gpu_frame_get_vertex_data() writing\nout of bounds. With the current DEFAULT_VERTEX_BUFFER_SIZE (128 KiB) and small\nper-op strides this is not reached, but the growth has no guarantee of being\nsufficient for a single request.","fix":"Grow in a loop (or to MAX(old_size*2, size_needed)) until\ngsk_gpu_buffer_get_size(new_buffer) >= size_needed.","locations":[{"ref":"gsk/gpu/gskgpuframe.c:633-664","code":"  633 | gsize\n  634 | gsk_gpu_frame_reserve_vertex_data (GskGpuFrame *self,\n  635 |                                    gsize        size)\n  636 | {\n  637 |   GskGpuFramePrivate *priv = gsk_gpu_frame_get_instance_private (self);\n  638 |   gsize size_needed;\n  639 | \n  640 |   if (priv->vertex_buffer == NULL)\n  641 |     priv->vertex_buffer = gsk_gpu_frame_create_vertex_buffer (self, DEFAULT_VERTEX_BUFFER_SIZE);\n  642 | \n  643 |   size_needed = round_up (priv->vertex_buffer_used, size) + size;\n  644 | \n  645 |   if (gsk_gpu_buffer_get_size (priv->vertex_buffer) < size_needed)\n  646 |     {\n  647 |       gsize old_size = gsk_gpu_buffer_get_size (priv->vertex_buffer);\n  648 |       GskGpuBuffer *new_buffer = gsk_gpu_frame_create_vertex_buffer (self, old_size * 2);\n  649 |       guchar *new_data = gsk_gpu_buffer_map (new_buffer);\n  650 | \n  651 |       if (priv->vertex_buffer_data)\n  652 |         {\n  653 |           memcpy (new_data, priv->vertex_buffer_data, old_size);\n  654 |           gsk_gpu_buffer_unmap (priv->vertex_buffer, old_size);\n  655 |         }\n  656 |       g_object_unref (priv->vertex_buffer);\n  657 |       priv->vertex_buffer = new_buffer;\n  658 |       priv->vertex_buffer_data = new_data;\n  659 |     }\n  660 | \n  661 |   priv->vertex_buffer_used = size_needed;\n  662 | \n  663 |   return size_needed - size;\n  664 | }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"gsk_gl_shader_node_diff() allocates and frees a fresh cairo_region per diff and diffs all children into it only to discard the result and call gsk_render_node_diff_impossible() whenever any child changed. Since GL-shader nodes always fall back to impossible-diff on any child change, the per-child diff into a throwaway region is pure overhead on the hot diff path; a cheaper can-diff comparison (already mostly done in the if condition) plus a direct impossible-diff would suffice. (Low severity: behavior is correct, just wasteful, and the node type is deprecated/draws pink in cairo.)","fix":"Consider comparing children with gsk_render_node_can_diff() (or skip the\nper-child diff entirely) and call gsk_render_node_diff_impossible() directly when\nnot all children are identical, avoiding the temporary region allocation.","locations":[{"ref":"gsk/gskglshadernode.c:77-100","code":"   77 | gsk_gl_shader_node_diff (GskRenderNode *node1,\n   78 |                          GskRenderNode *node2,\n   79 |                          GskDiffData   *data)\n   80 | {\n   81 |   GskGLShaderNode *self1 = (GskGLShaderNode *) node1;\n   82 |   GskGLShaderNode *self2 = (GskGLShaderNode *) node2;\n   83 | \n   84 |   if (gsk_rect_equal (&node1->bounds, &node2->bounds) &&\n   85 |       self1->shader == self2->shader &&\n   86 |       g_bytes_compare (self1->args, self2->args) == 0 &&\n   87 |       self1->n_children == self2->n_children)\n   88 |     {\n   89 |       cairo_region_t *child_region = cairo_region_create();\n   90 |       for (guint i = 0; i < self1->n_children; i++)\n   91 |         gsk_render_node_diff (self1->children[i], self2->children[i], &(GskDiffData) { child_region, data->copies, data->surface });\n   92 |       if (!cairo_region_is_empty (child_region))\n   93 |         gsk_render_node_diff_impossible (node1, node2, data);\n   94 |       cairo_region_destroy (child_region);\n   95 |     }\n   96 |   else\n   97 |     {\n   98 |       gsk_render_node_diff_impossible (node1, node2, data);\n   99 |     }\n  100 | }"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"gsk_shadow_node_get_shadow() lazily builds self->rgba_shadows under a single global static lock G_LOCK(rgba) shared by ALL shadow nodes (and a separate but similarly global 'rgba' lock is used in gsklineargradientnode.c). Because the lock is a single process-wide mutex rather than per-node, concurrent access to unrelated shadow/ gradient nodes serializes on the same lock. This is a (pre-existing) scalability limitation rather than a correctness bug; the returned pointer remains valid since rgba_shadows is only freed at finalize.","fix":"Consider building the rgba cache once at construction (when the data is immutable) or use a per-node one-time init (g_once / atomic) instead of a single global lock, to avoid cross-node contention.","locations":[{"ref":"gsk/gskshadownode.c:31","code":"   31 | G_LOCK_DEFINE_STATIC (rgba);"},{"ref":"gsk/gskshadownode.c:358-386","code":"  358 | const GskShadow *\n  359 | gsk_shadow_node_get_shadow (const GskRenderNode *node,\n  360 |                             gsize                i)\n  361 | {\n  362 |   GskShadowNode *self = (GskShadowNode *) node;\n  363 |   const GskShadow *shadow;\n  364 | \n  365 |   G_LOCK (rgba);\n  366 | \n  367 |   if (self->rgba_shadows == NULL)\n  368 |     {\n  369 |       self->rgba_shadows = g_new (GskShadow, self->n_shadows);\n  370 |       for (gsize j = 0; j < self->n_shadows; j++)\n  371 |         {\n  372 |           gdk_color_to_float (&self->shadows[j].color,\n  373 |                               GDK_COLOR_STATE_SRGB,\n  374 |                               (float *) &self->rgba_shadows[j].color);\n  375 |           self->rgba_shadows[j].dx = self->shadows[j].offset.x;\n  376 |           self->rgba_shadows[j].dy = self->shadows[j].offset.y;\n  377 |           self->rgba_shadows[j].radius = self->shadows[j].radius;\n  378 |         }\n  379 |     }\n  380 | \n  381 |   shadow = &self->rgba_shadows[i];\n  382 | \n  383 |   G_UNLOCK (rgba);\n  384 | \n  385 |   return shadow;\n  386 | }"},{"ref":"gsk/gsklineargradientnode.c:29","code":"   29 | G_LOCK_DEFINE_STATIC (rgba);"},{"ref":"gsk/gsklineargradientnode.c:471-485","code":"  471 | const GskColorStop *\n  472 | gsk_linear_gradient_node_get_color_stops (const GskRenderNode *node,\n  473 |                                           gsize               *n_stops)\n  474 | {\n  475 |   GskLinearGradientNode *self = (GskLinearGradientNode *) node;\n  476 |   const GskColorStop *stops;\n  477 | \n  478 |   G_LOCK (rgba);\n  479 | \n  480 |   stops = gsk_gradient_get_color_stops (&self->gradient, n_stops);\n  481 | \n  482 |   G_UNLOCK (rgba);\n  483 | \n  484 |   return stops;\n  485 | }"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"AccessKit update queue uses a linear scan for de-duplication. add_to_update_queue() (in the\nnon-force path) and remove_from_update_queue() both scan the entire GArray on every call to\ncheck for / remove an existing id. Since every queue_update() ultimately calls into this, a\ncontext tree with N nodes that all queue updates yields O(N^2) behaviour per frame. For\nlarge widget trees with frequent state changes this can be a noticeable cost.","fix":"Track queued ids in a GHashTable (id -> presence/index) alongside the array, or mark contexts as already-queued, to make dedup O(1).","locations":[{"ref":"gtk/a11y/gtkaccesskitroot.c:423-461","code":"  423 | static void\n  424 | remove_from_update_queue (GtkAccessKitRoot *self, guint id)\n  425 | {\n  426 |   guint i;\n  427 | \n  428 |   if (!self->update_queue)\n  429 |     return;\n  430 | \n  431 |   for (i = 0; i < self->update_queue->len; i++)\n  432 |     {\n  433 |       if (g_array_index (self->update_queue, guint, i) == id)\n  434 |         {\n  435 |           g_array_remove_index (self->update_queue, i);\n  436 |           return;\n  437 |         }\n  438 |     }\n  439 | }\n  440 | \n  441 | static void\n  442 | add_to_update_queue (GtkAccessKitRoot *self, guint id, gboolean force_to_end)\n  443 | {\n  444 |   guint i;\n  445 | \n  446 |   if (!self->update_queue)\n  447 |     self->update_queue = g_array_new (FALSE, FALSE, sizeof (guint));\n  448 | \n  449 |   if (force_to_end)\n  450 |     remove_from_update_queue (self, id);\n  451 |   else\n  452 |     {\n  453 |       for (i = 0; i < self->update_queue->len; i++)\n  454 |         {\n  455 |           if (g_array_index (self->update_queue, guint, i) == id)\n  456 |             return;\n  457 |         }\n  458 |     }\n  459 | \n  460 |   g_array_append_val (self->update_queue, id);\n  461 | }"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","description":"gtk_list_store_iter_is_valid performs an O(n) linear scan over the whole sequence to validate an iter. This is documented as slow/debug-only, which is fine, but gtk_list_store_swap/move and several other public entry points rely on the cheaper iter_is_valid() inline (stamp + sequence-owner check). No bug, but worth noting the two validity checks (iter_is_valid vs gtk_list_store_iter_is_valid) have materially different cost and semantics and are easy to confuse.","fix":"No action required; documented behaviour. Listed for reviewer awareness.","locations":[{"ref":"gtk/deprecated/gtkliststore.c:1492-1524","code":" 1492 | gboolean\n 1493 | gtk_list_store_iter_is_valid (GtkListStore *list_store,\n 1494 |                               GtkTreeIter  *iter)\n 1495 | {\n 1496 |   GtkListStorePrivate *priv;\n 1497 |   GSequenceIter *seq_iter;\n 1498 | \n 1499 |   g_return_val_if_fail (GTK_IS_LIST_STORE (list_store), FALSE);\n 1500 |   g_return_val_if_fail (iter != NULL, FALSE);\n 1501 | \n 1502 |   /* can't use iter_is_valid() here, because iter might point\n 1503 |    * to random memory.\n 1504 |    *\n 1505 |    * We MUST NOT dereference it.\n 1506 |    */\n 1507 | \n 1508 |   priv = list_store->priv;\n 1509 | \n 1510 |   if (iter == NULL ||\n 1511 |       iter->user_data == NULL ||\n 1512 |       priv->stamp != iter->stamp)\n 1513 |     return FALSE;\n 1514 | \n 1515 |   for (seq_iter = g_sequence_get_begin_iter (priv->seq);\n 1516 |        !g_sequence_iter_is_end (seq_iter);\n 1517 |        seq_iter = g_sequence_iter_next (seq_iter))\n 1518 |     {\n 1519 |       if (seq_iter == iter->user_data)\n 1520 |         return TRUE;\n 1521 |     }\n 1522 | \n 1523 |   return FALSE;\n 1524 | }"},{"ref":"gtk/deprecated/gtkliststore.c:395-404","code":"  395 | static gboolean\n  396 | iter_is_valid (GtkTreeIter  *iter,\n  397 |                GtkListStore *list_store)\n  398 | {\n  399 |   return iter != NULL &&\n  400 |          iter->user_data != NULL &&\n  401 |          list_store->priv->stamp == iter->stamp &&\n  402 |          !g_sequence_iter_is_end (iter->user_data) &&\n  403 |          g_sequence_iter_get_sequence (iter->user_data) == list_store->priv->seq;\n  404 | }"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","description":"gtk_list_store_reorder and the related sort/reorder helpers call g_sequence_get_length(priv->seq) inside the for-loop condition (`for (i = 0; i < g_sequence_get_length (priv->seq); i++)`). g_sequence_get_length is O(1) on modern GLib so the cost is minor, but the list store maintains its own `priv->length` counter precisely to avoid recomputation; using the length once into a local (or priv->length) would be cleaner and avoids repeated calls in a hot reorder path. Note priv->length itself is maintained but never used for anything (see separate finding).","fix":"Hoist the length into a local int before the loop, or use the already-maintained priv->length.","locations":[{"ref":"gtk/deprecated/gtkliststore.c:1755-1757","code":" 1755 |   order = g_new (int, g_sequence_get_length (priv->seq));\n 1756 |   for (i = 0; i < g_sequence_get_length (priv->seq); i++)\n 1757 |     order[new_order[i]] = i;"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","description":"gtk_tree_row_ref_reordered recomputes `length = gtk_tree_model_iter_n_children(model, iter)` once per reference inside the while-loop, even though `iter` (the reordered parent) is the same for every iteration of this call, making length loop-invariant. iter_n_children can be O(n) on some models, so for a proxy holding many row references this is needlessly quadratic. (The `if (length < 2) return;` early-out is correct, since length does not depend on the reference.)","fix":"Compute `length` once before entering the loop (the value cannot change across iterations), then early-return if length < 2.","locations":[{"ref":"gtk/deprecated/gtktreemodel.c:2335-2367","code":" 2335 |   while (tmp_list != NULL)\n 2336 |     {\n 2337 |       GtkTreeRowReference *reference = tmp_list->data;\n 2338 | \n 2339 |       length = gtk_tree_model_iter_n_children (GTK_TREE_MODEL (reference->model), iter);\n 2340 | \n 2341 |       if (length < 2)\n 2342 |         return;\n 2343 | \n 2344 |       if ((reference->path) &&\n 2345 |           (gtk_tree_path_is_ancestor (path, reference->path)))\n 2346 |         {\n 2347 |           int ref_depth = gtk_tree_path_get_depth (reference->path);\n 2348 |           int depth = gtk_tree_path_get_depth (path);\n 2349 | \n 2350 |           if (ref_depth > depth)\n 2351 |             {\n 2352 |               int i;\n 2353 |               int *indices = gtk_tree_path_get_indices (reference->path);\n 2354 | \n 2355 |               for (i = 0; i < length; i++)\n 2356 |                 {\n 2357 |                   if (new_order[i] == indices[depth])\n 2358 |                     {\n 2359 |                       indices[depth] = i;\n 2360 |                       break;\n 2361 |                     }\n 2362 |                 }\n 2363 |             }\n 2364 |         }\n 2365 | \n 2366 |       tmp_list = tmp_list->next;\n 2367 |     }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"`fdata = &format_data[format];` takes the address of an array element, which can never be NULL, so the subsequent `if (fdata == NULL) fdata = &format_data[0];` is dead code. The real risk it seems intended to guard against (an out-of-range or zero-initialized format entry) is not handled: a format whose designated-initializer slot is zero would yield a bogus FormatData of all-zeros.","fix":"Remove the dead NULL check, and instead validate that `format < GDK_MEMORY_N_FORMATS` and that the looked-up entry is populated (e.g. samples_per_pixel != 0).","locations":[{"ref":"gdk/loaders/gdktiff.c:331-334","code":"  331 |   fdata = &format_data[format];\n  332 | \n  333 |   if (fdata == NULL)\n  334 |     fdata = &format_data[0];"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"gsk_border_node_new2() initializes self->border_color twice: first via memcpy() of the whole border_color array (line 402), then immediately re-initializes each element with gdk_color_init_copy() in a loop (lines 403-404). The memcpy is redundant (and shallow-copies GdkColor structs that the subsequent gdk_color_init_copy properly copies). At best wasted work; if GdkColor ever owned heap data the memcpy followed by init_copy would not be a leak only because init_copy overwrites the fields, but it is confusing and fragile.","fix":"Drop the memcpy of border_color and keep only the gdk_color_init_copy loop\n(the border_width memcpy on line 401 should remain).","locations":[{"ref":"gsk/gskbordernode.c:401-404","code":"  401 |   memcpy (self->border_width, border_width, sizeof (self->border_width));\n  402 |   memcpy (self->border_color, border_color, sizeof (self->border_co
