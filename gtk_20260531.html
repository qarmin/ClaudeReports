_selector))\n  197 |       return 1;\n  198 | \n  199 |     g_variant_builder_init (&b2, G_VARIANT_TYPE (\"as\"));\n  200 |     if (json_object_has_member (obj_en, \"tags\"))\n  201 |       {\n  202 |         JsonArray *tags_en = json_object_get_array_member (obj_en, \"tags\");\n  203 |         for (int j = 0; j < json_array_get_length (tags_en); j++)\n  204 |         {\n  205 |           g_variant_builder_add (&b2, \"s\", json_array_get_string_element (tags_en, j));\n  206 |         }\n  207 |       }\n  208 | \n  209 |     g_variant_builder_init (&b3, G_VARIANT_TYPE (\"as\"));\n  210 |     if (json_object_has_member (obj, \"tags\"))\n  211 |       {\n  212 |         JsonArray *tags = json_object_get_array_member (obj, \"tags\");\n  213 |         for (int j = 0; j < json_array_get_length (tags); j++)\n  214 |         {\n  215 |           g_variant_builder_add (&b3, \"s\", json_array_get_string_element (tags, j));\n  216 |         }\n  217 |       }\n  218 |     g_variant_builder_add (&builder, \"(aussasasu)\", &b1, name_en, name, &b2, &b3, group);\n  219 |   }"}]},{"id":"RES_8","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"gtk_custom_layout_new() allocates self via g_object_new() before validating arguments with g_return_val_if_fail(measure != NULL) / (allocate != NULL). When measure or allocate is NULL, the function returns NULL but leaks the already-created GtkCustomLayout object.","fix":"Move the g_return_val_if_fail() checks before the g_object_new() call.","locations":[{"ref":"gtk/gtkcustomlayout.c:112-127","code":"  112 | GtkLayoutManager *\n  113 | gtk_custom_layout_new (GtkCustomRequestModeFunc request_mode,\n  114 |                        GtkCustomMeasureFunc measure,\n  115 |                        GtkCustomAllocateFunc allocate)\n  116 | {\n  117 |   GtkCustomLayout *self = g_object_new (GTK_TYPE_CUSTOM_LAYOUT, NULL);\n  118 | \n  119 |   g_return_val_if_fail (measure != NULL, NULL);\n  120 |   g_return_val_if_fail (allocate != NULL, NULL);\n  121 | \n  122 |   self->request_mode_func = request_mode;\n  123 |   self->measure_func = measure;\n  124 |   self->allocate_func = allocate;\n  125 | \n  126 |   return GTK_LAYOUT_MANAGER (self);\n  127 | }"}]},{"id":"RES_9","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"Custom-slot keys leak / dangle. In gtk_menu_section_box_insert_func the custom slot id string slot_id is both inserted as the key into box->custom_slots and attached to the widget via g_object_set_data_full(...,g_free). The hash table is created with g_hash_table_new (no key/value destroy) and is shared between toplevel and submenus via g_hash_table_ref. There is no code that removes the entry from custom_slots when the slot widget is destroyed (e.g. via gtk_menu_section_box_remove_func -> gtk_box_remove). When the widget is finalized its slot_id is freed, leaving a dangling key (and dangling value pointer) in the still-live shared hash table, which gtk_menu_section_box_add_custom/remove_custom later look up.","fix":"Remove the slot from box->custom_slots when the slot widget is removed/destroyed, or make custom_slots own its keys and not store a borrowed pointer that the widget frees.","locations":[{"ref":"gtk/gtkmenusectionbox.c:396-403","code":"  396 |       if (g_hash_table_lookup (box->custom_slots, id))\n  397 |         g_warning (\"Duplicate custom ID: %s\", id);\n  398 |       else\n  399 |         {\n  400 |           char *slot_id = g_strdup (id);\n  401 |           g_object_set_data_full (G_OBJECT (widget), \"slot-id\", slot_id, g_free);\n  402 |           g_hash_table_insert (box->custom_slots, slot_id, widget);\n  403 |         }"},{"ref":"gtk/gtkmenusectionbox.c:209-240","code":"  209 | static void\n  210 | gtk_menu_section_box_remove_func (int      position,\n  211 |                                   gpointer user_data)\n  212 | {\n  213 |   GtkMenuSectionBox *box = user_data;\n  214 |   GtkMenuTrackerItem *item;\n  215 |   GtkWidget *widget;\n  216 |   int pos;\n  217 | \n  218 |   for (widget = gtk_widget_get_first_child (GTK_WIDGET (box->item_box)), pos = 0;\n  219 |        widget != NULL;\n  220 |        widget = gtk_widget_get_next_sibling (widget), pos++)\n  221 |     {\n  222 |       if (pos == position)\n  223 |         break;\n  224 |     }\n  225 | \n  226 |   item = g_object_get_data (G_OBJECT (widget), \"GtkMenuTrackerItem\");\n  227 |   if (gtk_menu_tracker_item_get_has_link (item, G_MENU_LINK_SUBMENU))\n  228 |     {\n  229 |       GtkWidget *stack, *subbox;\n  230 | \n  231 |       stack = gtk_widget_get_ancestor (GTK_WIDGET (box->toplevel), GTK_TYPE_STACK);\n  232 |       subbox = gtk_stack_get_child_by_name (GTK_STACK (stack), gtk_menu_tracker_item_get_label (item));\n  233 |       if (subbox != NULL)\n  234 |         gtk_stack_remove (GTK_STACK (stack), subbox);\n  235 |     }\n  236 | \n  237 |   gtk_box_remove (GTK_BOX (box->item_box), widget);\n  238 | \n  239 |   gtk_menu_section_box_schedule_separator_sync (box);\n  240 | }"}]},{"id":"RES_10","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"gtk_multi_filter_unwatch() iterates the filter_to_watch hash with loop condition 'g_hash_table_iter_next(&iter, ...) && child_watch'. gtk_filter_watch() may legitimately return NULL (stored as the value), so encountering a NULL watch value stops iteration early and leaves any remaining non-NULL child watches un-unwatched, leaking them. The NULL guard should skip the entry, not terminate the loop.","fix":"Loop on g_hash_table_iter_next() only and inside the body do 'if (child_watch) gtk_filter_unwatch (child_filter, child_watch);'.","locations":[{"ref":"gtk/gtkmultifilter.c:253-255","code":"  253 |   g_hash_table_iter_init (&iter, data->filter_to_watch);\n  254 |   while (g_hash_table_iter_next (&iter, &child_filter, &child_watch) && child_watch)\n  255 |     gtk_filter_unwatch (child_filter, child_watch);"}]},{"id":"RES_11","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In gtk_path_bar_set_file_finish() the failure path (result == FALSE) iterates info->new_buttons and calls gtk_box_remove(buttons_box, button_data->button) for each. However the newly created buttons are never added to buttons_box during the async build (make_directory_button() creates them with a floating reference and they are only inserted into the box in the success path via gtk_box_prepend). Calling gtk_box_remove on widgets that are not children of the box is a no-op (and triggers a g_warning about removing a non-child); the freshly created buttons are then leaked (their floating reference is never sunk or destroyed, and the button_data weak-ref cleanup never runs).","fix":"In the failure path, destroy the unparented buttons (e.g. g_object_ref_sink + g_object_unref, or gtk_widget_unparent only if parented) rather than calling gtk_box_remove on widgets that were never added to the box.","locations":[{"ref":"gtk/gtkpathbar.c:769-781","code":"  769 |   else\n  770 |     {\n  771 |       GList *l;\n  772 | \n  773 |       for (l = info->new_buttons; l; l = l->next)\n  774 |         {\n  775 |           ButtonData *button_data = BUTTON_DATA (l->data);\n  776 | \n  777 |           gtk_box_remove (GTK_BOX (info->path_bar->buttons_box), button_data->button);\n  778 |         }\n  779 | \n  780 |       g_list_free (info->new_buttons);\n  781 |     }"},{"ref":"gtk/gtkpathbar.c:830-841","code":"  830 |   button_data = make_directory_button (file_info->path_bar, display_name,\n  831 |                                        file_info->file,\n  832 |                                        file_info->mount,\n  833 |                                        file_info->root_file,\n  834 |                                        file_info->first_directory, is_hidden);\n  835 |   g_clear_object (&file_info->file);\n  836 |   g_object_unref (info);\n  837 | \n  838 |   file_info->new_buttons = g_list_prepend (file_info->new_buttons, button_data);\n  839 | \n  840 |   if (BUTTON_IS_FAKE_ROOT (button_data))\n  841 |     file_info->fake_root = file_info->new_buttons;"}]},{"id":"RES_12","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"gtk_gst_media_file_source_setup_cb() takes a new reference to the source into\nself->src each time the playbin emits \"source-setup\", overwriting any previous\nself->src without unref'ing it. If source-setup fires more than once (e.g. on\nre-setup/seek with some pipelines) the previous GtkGstBin reference leaks.\nConversely, gtk_gst_media_file_destroy_play() unconditionally does\ng_object_unref(self->src); if open/close happen without a source-setup callback,\nself->src is NULL and this emits a g_object_unref(NULL) critical.","fix":"Use g_set_object (&self->src, GTK_GST_BIN (source)) in the callback, and in\ndestroy_play use g_clear_object (&self->src) instead of an unconditional\ng_object_unref.","locations":[{"ref":"gtk/media/gtkgstmediafile.c:240","code":"  240 |   self->src = GTK_GST_BIN (g_object_ref (source));"},{"ref":"gtk/media/gtkgstmediafile.c:278","code":"  278 |   g_object_unref (self->src);"}]},{"id":"RES_13","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"gtk_print_operation_unix_launch_preview() closes the temp-file fd with\n`if (fd > 0) close (fd);`. A valid file descriptor can be 0, so an fd of 0 is\nleaked. The condition should be `fd >= 0` (it is already checked for < 0 right\nafter g_file_open_tmp()).","fix":"Change `if (fd > 0)` to `if (fd >= 0)`.","locations":[{"ref":"gtk/print/gtkprintoperation-unix.c:383-384","code":"  383 |   if (fd > 0)\n  384 |     close (fd);"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"GDK_ANDROID_FLAG_TO_INFO is a macro that takes an `attr` parameter but hardcodes G_FILE_ATTRIBUTE_ACCESS_CAN_DELETE in the g_file_info_set_attribute_boolean call. It is invoked four times with different attributes (CAN_WRITE/supports_write, CAN_DELETE/supports_delete, CAN_RENAME/supports_rename, STANDARD_IS_VIRTUAL/virtual_document). As written, all four calls write to the CAN_DELETE attribute (overwriting each other), and the CAN_WRITE, CAN_RENAME and IS_VIRTUAL attributes are never set, while CAN_DELETE ends up holding whatever the last invocation (virtual_document flag) computed. File capability reporting for content:// files is therefore wrong.","fix":"Use the macro's `attr` parameter: `g_file_info_set_attribute_boolean (info, (attr), (qflags & ...flag_##flag) != 0);`.","locations":[{"ref":"gdk/android/gdkandroidcontentfile.c:587-591","code":"  587 | #define GDK_ANDROID_FLAG_TO_INFO(attr, flag)                               \\\n  588 |   if (g_file_attribute_matcher_matches (matcher, (attr)))                  \\\n  589 |     g_file_info_set_attribute_boolean (info,                               \\\n  590 |                                        G_FILE_ATTRIBUTE_ACCESS_CAN_DELETE, \\\n  591 |                                        (qflags & gdk_android_get_java_cache ()->a_documents_contract_document.flag_##flag) != 0);"},{"ref":"gdk/android/gdkandroidcontentfile.c:654-658","code":"  654 |   GDK_ANDROID_FLAG_TO_INFO (G_FILE_ATTRIBUTE_ACCESS_CAN_WRITE, supports_write)\n  655 | \n  656 |   GDK_ANDROID_FLAG_TO_INFO (G_FILE_ATTRIBUTE_ACCESS_CAN_DELETE, supports_delete)\n  657 |   GDK_ANDROID_FLAG_TO_INFO (G_FILE_ATTRIBUTE_ACCESS_CAN_RENAME, supports_rename)\n  658 |   GDK_ANDROID_FLAG_TO_INFO (G_FILE_ATTRIBUTE_STANDARD_IS_VIRTUAL, virtual_document)"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"client_input_cb dispatches requests by reading a 32-bit `size` prefix from the client buffer. The check is `if (size <= buffer_len)`. If size == 0, the condition is true, client_handle_request is invoked, then `buffer_len -= 0; buffer += 0;` so the loop never makes progress and never terminates (DoS, the daemon hangs). Additionally there is no check that size >= sizeof the specific request struct, so a small-but-nonzero size lets client_handle_request read request fields past the received bytes (OOB read of the heap-allocated GString buffer).","fix":"Require `size >= sizeof(guint32)` (or the minimum request header size) before dispatching; break out of the loop and disconnect the client on a malformed size. Validate per-request that size is large enough for request->base.type.","locations":[{"ref":"gdk/broadway/broadwayd.c:454-468","code":"  454 |   while (buffer_len >= sizeof (guint32))\n  455 |     {\n  456 |       guint32 size;\n  457 | \n  458 |       memcpy (&size, buffer, sizeof (guint32));\n  459 |       if (size <= buffer_len)\n  460 |         {\n  461 |           client_handle_request (client, (BroadwayRequest *)buffer);\n  462 | \n  463 |           buffer_len -= size;\n  464 |           buffer += size;\n  465 |         }\n  466 |       else\n  467 |         break;\n  468 |     }"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"The clipboard/selection output (send) path uses the wrong text-list converter direction. handle_text_list() is invoked when a remote requestor asks for COMPOUND_TEXT/TEXT/STRING targets and we must convert our local UTF-8 content INTO the X encoding (encode). However it constructs the converter via gdk_x11_text_list_converter_to_utf8_new(), which creates a *decoder* (encoder bit = FALSE) that converts FROM the X encoding TO UTF-8 — the opposite direction. The correct constructor gdk_x11_text_list_converter_from_utf8_new() exists but is never called anywhere in the tree (confirmed: only to_utf8_new is used). As a result, sending text as COMPOUND_TEXT/STRING/TEXT to X11 clients runs the wrong conversion (the decode path requires G_CONVERTER_INPUT_AT_END and calls _gdk_x11_display_text_property_to_utf8_list on UTF-8 input typed as the target encoding), producing wrong/garbled data for STRING (latin1) and COMPOUND_TEXT pastes.","fix":"In handle_text_list(), use the encoder:\n  converter = gdk_x11_text_list_converter_from_utf8_new (display, encoding, format);\nso the output stream encodes the local UTF-8 content into the requested X encoding.","locations":[{"ref":"gdk/x11/gdkselectionoutputstream-x11.c:789-800","code":"  789 |   GOutputStream *converter_stream;\n  790 |   GConverter *converter;\n  791 | \n  792 |   converter = gdk_x11_text_list_converter_to_utf8_new (display,\n  793 |                                                        encoding,\n  794 |                                                        format);\n  795 |   converter_stream = g_converter_output_stream_new (stream, converter);\n  796 | \n  797 |   g_object_unref (converter);\n  798 |   g_object_unref (stream);\n  799 | \n  800 |   handler (converter_stream, gdk_intern_mime_type (\"text/plain;charset=utf-8\"), user_data);"},{"ref":"gdk/x11/gdktextlistconverter-x11.c:356-371","code":"  356 | GConverter *\n  357 | gdk_x11_text_list_converter_from_utf8_new (GdkDisplay *display,\n  358 |                                            const char *encoding,\n  359 |                                            int         format)\n  360 | {\n  361 |   GdkX11TextListConverter *conv;\n  362 | \n  363 |   conv = g_object_new (GDK_TYPE_X11_TEXT_LIST_CONVERTER, NULL);\n  364 | \n  365 |   conv->display = g_object_ref (display);\n  366 |   conv->encoding = g_intern_string (encoding);\n  367 |   conv->format = format;\n  368 |   conv->encoder = TRUE;\n  369 | \n  370 |   return G_CONVERTER (conv);\n  371 | }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"gsk_component_transfer_node_diff() is missing an else/return. After calling gsk_render_node_diff() on the children in the can-diff case, it unconditionally falls through and ALSO calls gsk_render_node_diff_impossible(). The result is that every component-transfer node is always treated as impossible-to-diff, so the whole node bounds are invalidated on every frame even when only a small child region changed (and the child diff work above is wasted). Compare to all other node diff functions (e.g. gskblendnode.c, gskcrossfadenode.c) which use an if/else or return after the child diff.","fix":"Return after diffing the children, e.g.:\n  if (gsk_component_transfer_node_can_diff (node1, node2))\n    {\n      gsk_render_node_diff (self1->child, self2->child, data);\n      return;\n    }\n  gsk_render_node_diff_impossible (node1, node2, data);","locations":[{"ref":"gsk/gskcomponenttransfernode.c:180-192","code":"  180 | static void\n  181 | gsk_component_transfer_node_diff (GskRenderNode *node1,\n  182 |                                   GskRenderNode *node2,\n  183 |                                   GskDiffData   *data)\n  184 | {\n  185 |   GskComponentTransferNode *self1 = (GskComponentTransferNode *) node1;\n  186 |   GskComponentTransferNode *self2 = (GskComponentTransferNode *) node2;\n  187 | \n  188 |   if (gsk_component_transfer_node_can_diff (node1, node2))\n  189 |     gsk_render_node_diff (self1->child, self2->child, data);\n  190 | \n  191 |   gsk_render_node_diff_impossible (node1, node2, data);\n  192 | }"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","description":"gsk_displacement_node_draw() insets an UNINITIALIZED rectangle. child_bounds is declared at line 214 and never initialized before line 219 calls graphene_rect_inset(&child_bounds, -self->max.width, -self->max.height) on it. The inset operates on garbage memory, and its result is immediately discarded because line 220 overwrites child_bounds entirely via gsk_rect_intersection(). The inset by max (to expand the sampled child area so displacement can reach pixels outside the node bounds) is therefore never actually applied, so the displaced child can be clipped/sampled-as-transparent near the edges. The inset was almost certainly meant to be applied to the intersection result (after line 220), not before it.","fix":"Compute the intersection first, then expand it by max:\n  if (!gsk_rect_intersection (&bounds, &self->child->bounds, &child_bounds))\n    return;\n  graphene_rect_inset (&child_bounds, - self->max.width, - self->max.height);\nRemove the inset call on the uninitialized variable at line 219.","locations":[{"ref":"gsk/gskdisplacementnode.c:214-221","code":"  214 |   graphene_rect_t bounds, child_bounds;\n  215 | \n  216 |   if (!gsk_cairo_rect_snap (cr, &node->bounds, self->snap, &bounds))\n  217 |     return;\n  218 | \n  219 |   graphene_rect_inset (&child_bounds, - self->max.width, - self->max.height);\n  220 |   if (!gsk_rect_intersection (&bounds, &self->child->bounds, &child_bounds))\n  221 |     return;"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","description":"gsk_render_replay_set_texture_filter() and gsk_render_replay_set_font_filter() only overwrite the stored filter function pointer when the new filter is non-NULL (`if (filter) self->texture_filter = filter;`), but they always run the old destroy notify on the old user_data and always overwrite *_filter_data and *_filter_destroy. As a result, calling set_*_filter(self, NULL, NULL, NULL) to *clear* a previously installed filter frees/clears the user data but leaves the old function pointer installed. A subsequent filter_texture()/filter_font() call will then invoke the stale filter function with NULL (or freed) user_data, a use-after-free / wrong-callback bug. The node-filter setter (set_node_filter) does NOT have this guard and behaves correctly, making the inconsistency clear.","fix":"Remove the `if (filter)` guard in both set_texture_filter() and set_font_filter() so the function pointer is set unconditionally (matching set_node_filter): `self->texture_filter = filter;` / `self->font_filter = filter;`.","locations":[{"ref":"gsk/gskrenderreplay.c:288-305","code":"  288 | void\n  289 | gsk_render_replay_set_texture_filter (GskRenderReplay              *self,\n  290 |                                       GskRenderReplayTextureFilter  filter,\n  291 |                                       gpointer                      user_data,\n  292 |                                       GDestroyNotify                user_destroy)\n  293 | {\n  294 |   g_return_if_fail (self != NULL);\n  295 |   g_return_if_fail (filter || user_data == NULL);\n  296 |   g_return_if_fail (user_data || !user_destroy);\n  297 | \n  298 |   if (self->texture_filter_destroy)\n  299 |     self->texture_filter_destroy (self->texture_filter_data);\n  300 | \n  301 |   if (filter)\n  302 |     self->texture_filter = filter;\n  303 |   self->texture_filter_data = user_data;\n  304 |   self->texture_filter_destroy = user_destroy;\n  305 | }"},{"ref":"gsk/gskrenderreplay.c:353-370","code":"  353 | void\n  354 | gsk_render_replay_set_font_filter (GskRenderReplay           *self,\n  355 |                                    GskRenderReplayFontFilter  filter,\n  356 |                                    gpointer                   user_data,\n  357 |                                    GDestroyNotify             user_destroy)\n  358 | {\n  359 |   g_return_if_fail (self != NULL);\n  360 |   g_return_if_fail (filter || user_data == NULL);\n  361 |   g_return_if_fail (user_data || !user_destroy);\n  362 | \n  363 |   if (self->font_filter_destroy)\n  364 |     self->font_filter_destroy (self->font_filter_data);\n  365 | \n  366 |   if (filter)\n  367 |     self->font_filter = filter;\n  368 |   self->font_filter_data = user_data;\n  369 |   self->font_filter_destroy = user_destroy;\n  370 | }"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","description":"AT-SPI Component \"Contains\" compares translated coordinates against the bounds origin\ninstead of the bounds size. After gtk_at_spi_translate_coordinates_to_accessible() makes\n(x,y) relative to the accessible's top-left, the hit-test should be\n`x >= 0 && x <= width && y >= 0 && y <= height`. Instead it does\n`x >= 0 && x <= bounds_x && y >= 0 && y <= bounds_y`, comparing the local coordinate to the\naccessible's absolute origin (bounds_x/bounds_y). This makes Contains() return wrong results\n(e.g. always false when bounds_x/bounds_y are 0, or an arbitrary box otherwise). Compare with\naccessible_at_point() in the same file, which correctly uses `x <= px + width`.","fix":"Compare against the size: `ret = x >= 0 && x <= width && y >= 0 && y <= height;`.","locations":[{"ref":"gtk/a11y/gtkatspicomponent.c:104-109","code":"  104 |       gtk_at_spi_translate_coordinates_to_accessible (accessible, coordtype, x, y, &x, &y);\n  105 | \n  106 |       if (gtk_accessible_get_bounds (accessible, &bounds_x, &bounds_y, &width, &height))\n  107 |         ret = x >= 0 && x <= bounds_x && y >= 0 && y <= bounds_y;\n  108 |       else\n  109 |         ret = FALSE;"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","description":"GtkComboBox AT-SPI \"IsChildSelected\" uses an assignment instead of a comparison.\nThe line `active = idx = gtk_combo_box_get_active (...)` assigns the active index to\nboth `idx` (clobbering the requested child index passed by the AT) and `active`. It was\nclearly meant to be `active = idx == gtk_combo_box_get_active (...)`, i.e. test whether\nthe requested child is the active one. As written, IsChildSelected ignores the requested\nindex entirely and returns TRUE whenever any non-zero item is active (and FALSE when item 0\nis active, due to the implicit truthiness conversion), so it reports the wrong selection\nstate for every queried child.","fix":"Change line 689 to `active = (idx == gtk_combo_box_get_active (GTK_COMBO_BOX (widget)));`.","locations":[{"ref":"gtk/a11y/gtkatspiselection.c:683-691","code":"  683 |   else if (g_strcmp0 (method_name, \"IsChildSelected\") == 0)\n  684 |     {\n  685 |       int idx;\n  686 |       gboolean active;\n  687 | \n  688 |       g_variant_get (parameters, \"(i)\", &idx);\n  689 |       active = idx = gtk_combo_box_get_active (GTK_COMBO_BOX (widget));\n  690 |       g_dbus_method_invocation_return_value (invocation, g_variant_new (\"(b)\", active));\n  691 |     }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","description":"update_process_list_store() computes delta index arrays pid_indices_to_add and pid_indices_to_remove via diff_sorted_arrays(), but the subsequent loops ignore those indices. The removal loop (lines 1344-1348) iterates n from 0..pid_indices_to_remove->len and reads g_array_index(current_pids, GPid, n) using the loop counter n instead of the actual index stored in pid_indices_to_remove. The add loop (lines 1353-1356) similarly reads g_array_index(processes, GPid, n) using n instead of g_array_index(pid_indices_to_add, int, n). When the count of added/removed PIDs is non-trivial and the indices are not 0..N-1, the wrong processes are added/removed from the list shown to the user (the whole point of the diff was defeated).","fix":"Index through the delta arrays, e.g. guint idx = g_array_index(pid_indices_to_remove, int, n); pid = g_array_index(current_pids, GPid, idx); and likewise for the add loop using pid_indices_to_add.","locations":[{"ref":"gtk/gtkmountoperation.c:1342-1359","code":" 1342 |   diff_sorted_arrays (current_pids, processes, pid_equal, pid_indices_to_add, pid_indices_to_remove);\n 1343 | \n 1344 |   for (n = 0; n < pid_indices_to_remove->len; n++)\n 1345 |     {\n 1346 |       pid = g_array_index (current_pids, GPid, n);\n 1347 |       remove_pid_from_process_list_store (mount_operation, list_store, pid);\n 1348 |     }\n 1349 | \n 1350 |   if (pid_indices_to_add->len > 0)\n 1351 |     {\n 1352 |       lookup_context = _gtk_mount_operation_lookup_context_get (gtk_widget_get_display (mount_operation->priv->process_list_view));\n 1353 |       for (n = 0; n < pid_indices_to_add->len; n++)\n 1354 |         {\n 1355 |           pid = g_array_index (processes, GPid, n);\n 1356 |           add_pid_to_process_list_store (mount_operation, lookup_context, list_store, pid);\n 1357 |         }\n 1358 |       _gtk_mount_operation_lookup_context_free (lookup_context);\n 1359 |     }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","description":"object_tree_text_tag_table_get_children() builds a GListStore, connects signals, and populates it with tags, but then returns NULL instead of G_LIST_MODEL (store). As a result GtkTextTagTable children are never shown in the object tree, and the freshly created store (with its connected signal handlers) is leaked. Every other *_get_children function returns its store.","fix":"Return the store: replace 'return NULL;' with 'return G_LIST_MODEL (store);'.","locations":[{"ref":"gtk/inspector/object-tree.c:501-511","code":"  501 | static GListModel *\n  502 | object_tree_text_tag_table_get_children (GObject *object)\n  503 | {\n  504 |   GListStore *store = g_list_store_new (GTK_TYPE_TEXT_TAG);\n  505 | \n  506 |   g_signal_connect_object (object, \"tag-added\", G_CALLBACK (text_tag_added), store, 0);\n  507 |   g_signal_connect_object (object, \"tag-removed\", G_CALLBACK (text_tag_removed), store, 0);\n  508 |   gtk_text_tag_table_foreach (GTK_TEXT_TAG_TABLE (object), text_tag_foreach, store);\n  509 | \n  510 |   return NULL;\n  511 | }"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"When building the Android ClipData HTML item, the code uses g_memory_output_stream_get_size(mgr->html) (the allocated/grown buffer capacity, which can exceed the bytes actually written) as the length argument to gdk_android_utf8n_to_java, whereas the adjacent text and uris paths correctly use g_memory_output_stream_get_data_size(). This passes the over-allocated buffer tail (uninitialized or zero padding beyond the real HTML payload) into the UTF-16 conversion, producing a corrupted/oversized HTML clipboard entry.","fix":"Use g_memory_output_stream_get_data_size(mgr->html) instead of g_memory_output_stream_get_size(mgr->html).","locations":[{"ref":"gdk/android/gdkandroidclipboard.c:274-277","code":"  274 |   if (mgr->html && text)\n  275 |     {\n  276 |       jstring html = gdk_android_utf8n_to_java (g_memory_output_stream_get_data (mgr->html),\n  277 |                                                 g_memory_output_stream_get_size (mgr->html));"},{"ref":"gdk/android/gdkandroidclipboard.c:238-244","code":"  238 |   jstring text = mgr->text ? gdk_android_utf8n_to_java (g_memory_output_stream_get_data (mgr->text),\n  239 |                                                         g_memory_output_stream_get_data_size (mgr->text)) : NULL;\n  240 | \n  241 |   if (mgr->uris)\n  242 |     {\n  243 |       const gchar *buf = g_memory_output_stream_get_data (mgr->uris);\n  244 |       gsize len = g_memory_output_stream_get_data_size (mgr->uris);"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In the OVERWRITE branch of gdk_android_content_file_copy, the code reads from `file` (the source) and writes back to `file` via g_file_replace(file, ...), instead of writing to `destination`. The copy therefore reads and overwrites the source file with its own contents rather than copying source to destination.","fix":"Open the input stream on `file` (source) and the replace/output stream on `destination`, then splice source into destination.","locations":[{"ref":"gdk/android/gdkandroidcontentfile.c:1083-1114","code":" 1083 |   else if (flags & G_FILE_COPY_OVERWRITE)\n 1084 |     {\n 1085 |       GFileInputStream *istream = g_file_read (file, cancellable, error);\n 1086 |       if (!istream)\n 1087 |         return FALSE;\n 1088 |       GFileOutputStream *ostream = g_file_replace (file,\n 1089 |                                                    NULL,\n 1090 |                                                    FALSE,\n 1091 |                                                    G_FILE_CREATE_REPLACE_DESTINATION,\n 1092 |                                                    cancellable,\n 1093 |                                                    error);\n 1094 |       if (!ostream)\n 1095 |         {\n 1096 |           g_object_unref (istream);\n 1097 |           return FALSE;\n 1098 |         }\n 1099 | \n 1100 |       if (g_output_stream_splice ((GOutputStream *)ostream,\n 1101 |                                   (GInputStream *)istream,\n 1102 |                                   G_OUTPUT_STREAM_SPLICE_CLOSE_SOURCE | G_OUTPUT_STREAM_SPLICE_CLOSE_TARGET,\n 1103 |                                   cancellable,\n 1104 |                                   error) < 0)\n 1105 |         {\n 1106 |           g_object_unref (istream);\n 1107 |           g_object_unref (ostream);\n 1108 |           return FALSE;\n 1109 |         }\n 1110 | \n 1111 |       g_object_unref (istream);\n 1112 |       g_object_unref (ostream);\n 1113 |       return TRUE;\n 1114 |     }"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"parse_all_input on the GTK client side reads a reply `size` from the daemon and loops `while (p + sizeof(guint32) <= end)`. If size == 0, the `p + size > end` check is false, g_memdup2(p, 0) is appended, p does not advance, and the loop spins forever appending zero-length replies (DoS / OOM). A size smaller than sizeof(guint32) but nonzero also yields malformed replies whose fields are later read past their bounds by process_input_messages.","fix":"Require `size >= sizeof(guint32)` (or the minimum reply size) before consuming; break / treat as protocol error on a too-small size.","locations":[{"ref":"gdk/broadway/gdkbroadway-server.c:240-255","code":"  240 |   while (p + sizeof (guint32) <= end)\n  241 |     {\n  242 |       memcpy (&size, p, sizeof (guint32));\n  243 |       if (p + size > end)\n  244 |         break;\n  245 | \n  246 |       reply = g_memdup2 (p, size);\n  247 |       p += size;\n  248 | \n  249 |       server->incoming = g_list_append (server->incoming, reply);\n  250 |     }\n  251 | \n  252 |   if (p < end)\n  253 |     memmove (server->recv_buffer, p, end - p);\n  254 |   server->recv_buffer_size = end - p;\n  255 | }"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"gsk_circle_contour_get_stroke_bounds() uses an inconsistent stroke extent on the right edge. Three of the four extents add the full stroke->line_width, but max.x adds only stroke->line_width/2 (line 1548). For a circle the stroke extends by line_width/2 on all sides, so either all four should use line_width/2 or all four line_width; the mix is a copy-paste error that under-estimates the bounding box on the right side and can cause clipping/painting artifacts of the stroked circle's right edge.","fix":"Make the four extents consistent, e.g. use stroke->line_width on all sides\n(matching the other three lines), or more correctly 0.5 * stroke->line_width on\nall four sides as gsk_rect_contour_get_stroke_bounds() does.","locations":[{"ref":"gsk/gskcontour.c:1538-1551","code":" 1538 | static gboolean\n 1539 | gsk_circle_contour_get_stroke_bounds (const GskContour *contour,\n 1540 |                                       const GskStroke  *stroke,\n 1541 |                                       GskBoundingBox   *bounds)\n 1542 | {\n 1543 |   const GskCircleContour *self = (const GskCircleContour *) contour;\n 1544 | \n 1545 |   gsk_bounding_box_init (bounds,\n 1546 |                          &GRAPHENE_POINT_INIT (self->center.x - self->radius - stroke->line_width,\n 1547 |                                                self->center.y - self->radius - stroke->line_width),\n 1548 |                          &GRAPHENE_POINT_INIT (self->center.x + self->radius + stroke->line_width/2,\n 1549 |                                                self->center.y + self->radius + stroke->line_width));\n 1550 | \n 1551 |   return TRUE;"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"AT-SPI root \"GetChildAtIndex\" returns the wrong (or a stale) toplevel for out-of-range\nindices. The loop iterates the toplevels model, immediately unrefs each `window`, and breaks\nonly when `real_idx == idx`. The NULL guard after the loop (`if (window == NULL) return;`)\nonly triggers when there are zero toplevels. If the requested idx is larger than the number\nof visible toplevels, the loop ends with `window` pointing at the last (already-unreffed)\ntoplevel and `real_idx != idx`, yet the code proceeds to build and return a ref for that\nwindow instead of reporting \"no child\". This returns an incorrect object for out-of-range\nindices (and dereferences an already-unreffed pointer, which only survives because the model\nstill holds a reference).","fix":"Track whether a match was actually found (e.g. set a flag when `real_idx == idx`) and return G_IO_ERROR_INVALID_ARGUMENT when no match; do not unref `window` until after it is used.","locations":[{"ref":"gtk/a11y/gtkatspiroot.c:298-332","code":"  298 |   else if (g_strcmp0 (method_name, \"GetChildAtIndex\") == 0)\n  299 |     {\n  300 |       int idx, real_idx = 0;\n  301 | \n  302 |       g_variant_get (parameters, \"(i)\", &idx);\n  303 | \n  304 |       GtkWidget *window = NULL;\n  305 |       guint n_toplevels = g_list_model_get_n_items (self->toplevels);\n  306 |       for (guint i = 0; i < n_toplevels; i++)\n  307 |         {\n  308 |           window = g_list_model_get_item (self->toplevels, i);\n  309 | \n  310 |           g_object_unref (window);\n  311 | \n  312 |           if (!gtk_widget_get_visible (window))\n  313 |             continue;\n  314 | \n  315 |           if (real_idx == idx)\n  316 |             break;\n  317 | \n  318 |           real_idx += 1;\n  319 |         }\n  320 | \n  321 |       if (window == NULL)\n  322 |         return;\n  323 | \n  324 |       GtkATContext *context = gtk_accessible_get_at_context (GTK_ACCESSIBLE (window));\n  325 | \n  326 |       const char *name = g_dbus_connection_get_unique_name (self->connection);\n  327 |       const char *path = gtk_at_spi_context_get_context_path (GTK_AT_SPI_CONTEXT (context));\n  328 | \n  329 |       g_dbus_method_invocation_return_value (invocation, g_variant_new (\"((so))\", name, path));\n  330 | \n  331 |       g_object_unref (context);\n  332 |     }"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"GtkComboBox AT-SPI \"NSelectedChildren\" property uses the active index as a boolean.\n`if (gtk_combo_box_get_active (...))` returns 1 only when the active index is non-zero.\nWhen the first item (index 0) is selected, gtk_combo_box_get_active() returns 0, which is\nfalsey, so the code reports 0 selected children even though an item is selected. The \"no\nselection\" sentinel for gtk_combo_box_get_active() is -1, not 0, so the test must compare\nagainst -1.","fix":"Use `if (gtk_combo_box_get_active (GTK_COMBO_BOX (widget)) != -1)` to decide between 1 and 0 selected children.","locations":[{"ref":"gtk/a11y/gtkatspiselection.c:716-722","code":"  716 |   if (g_strcmp0 (property_name, \"NSelectedChildren\") == 0)\n  717 |     {\n  718 |       if (gtk_combo_box_get_active (GTK_COMBO_BOX (widget)))\n  719 |         return g_variant_new_int32 (1);\n  720 |       else\n  721 |         return g_variant_new_int32 (0);\n  722 |     }"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"gtk_check_button_set_group() does not detach @self from its current group before linking it into @group. When @self already belongs to a group (has group_prev/group_next), the code overwrites priv->group_prev=NULL and priv->group_next=group without fixing up the old neighbors' pointers. The old previous button's group_next and old next button's group_prev still point to @self, while @self no longer links back, corrupting the old group's doubly-linked list. This can leave stale group membership and break mutual-exclusion / focus traversal for the old group.","fix":"Before relinking into the new group (when group != NULL), unlink @self from its existing group exactly as the group==NULL branch does (patch priv->group_prev->group_next and priv->group_next->group_prev), then proceed to insert into the new group.","locations":[{"ref":"gtk/gtkcheckbutton.c:1098-1155","code":" 1098 | void\n 1099 | gtk_check_button_set_group (GtkCheckButton *self,\n 1100 |                             GtkCheckButton *group)\n 1101 | {\n 1102 |   GtkCheckButtonPrivate *priv = gtk_check_button_get_instance_private (self);\n 1103 |   GtkCheckButtonPrivate *group_priv;\n 1104 | \n 1105 |   g_return_if_fail (GTK_IS_CHECK_BUTTON (self));\n 1106 |   g_return_if_fail (self != group);\n 1107 | \n 1108 |   if (!group)\n 1109 |     {\n 1110 |       if (priv->group_prev)\n 1111 |         {\n 1112 |           GtkCheckButtonPrivate *p = gtk_check_button_get_instance_private (priv->group_prev);\n 1113 |           p->group_next = priv->group_next;\n 1114 |         }\n 1115 |       if (priv->group_next)\n 1116 |         {\n 1117 |           GtkCheckButtonPrivate *p = gtk_check_button_get_instance_private (priv->group_next);\n 1118 |           p->group_prev = priv->group_prev;\n 1119 |         }\n 1120 | \n 1121 |       priv->group_next = NULL;\n 1122 |       priv->group_prev = NULL;\n 1123 | \n 1124 |       update_button_role (self, GTK_BUTTON_ROLE_CHECK);\n 1125 | \n 1126 |       force_set_accessible_role (self, GTK_ACCESSIBLE_ROLE_CHECKBOX);\n 1127 | \n 1128 |       return;\n 1129 |     }\n 1130 | \n 1131 |   if (priv->group_next == group)\n 1132 |     return;\n 1133 | \n 1134 |   group_priv = gtk_check_button_get_instance_private (group);\n 1135 | \n 1136 |   priv->group_prev = NULL;\n 1137 |   if (group_priv->group_prev)\n 1138 |     {\n 1139 |       GtkCheckButtonPrivate *prev = gtk_check_button_get_instance_private (group_priv->group_prev);\n 1140 | \n 1141 |       prev->group_next = self;\n 1142 |       priv->group_prev = group_priv->group_prev;\n 1143 |     }\n 1144 | \n 1145 |   group_priv->group_prev = self;\n 1146 |   priv->group_next = group;\n 1147 | \n 1148 |   update_button_role (self, GTK_BUTTON_ROLE_RADIO);\n 1149 |   update_button_role (group, GTK_BUTTON_ROLE_RADIO);\n 1150 | \n 1151 |   force_set_accessible_role (self, GTK_ACCESSIBLE_ROLE_RADIO);\n 1152 |   force_set_accessible_role (group, GTK_ACCESSIBLE_ROLE_RADIO);\n 1153 | \n 1154 |   g_object_notify_by_pspec (G_OBJECT (self), props[PROP_GROUP]);\n 1155 | }"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"gtk_compose_table_load_cache() calls g_stat(path,...) and g_lstat(compose_file,...) but never checks their return values. If compose_file does not exist or cannot be stat'd, original_buf is left uninitialized and the subsequent st_mtime comparison reads indeterminate stack memory, which can cause a stale cache to be used or a valid cache to be discarded nondeterministically.","fix":"Check the return value of g_stat/g_lstat (they return -1 on error) and bail out to out_load_cache if either fails before comparing st_mtime.","locations":[{"ref":"gtk/gtkcomposetable.c:802-808","code":"  802 |   g_stat (path, &cache_buf);\n  803 |   g_lstat (compose_file, &original_buf);\n  804 |   if (original_buf.st_mtime > cache_buf.st_mtime)\n  805 |     goto out_load_cache;\n  806 |   g_stat (compose_file, &original_buf);\n  807 |   if (original_buf.st_mtime > cache_buf.st_mtime)\n  808 |     goto out_load_cache;"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In gtk_css_image_linear_transition(), when both gradients are direction-based (side != 0), result->angle is never assigned and stays NULL. The very next check `if (result->angle == NULL) goto fail;` then always triggers, so any transition between two side/edge-keyword linear gradients (e.g. `to right`) silently falls back to the generic cross-fade instead of interpolating the color stops. The angle should only be required/checked when side == 0.","fix":"Guard the NULL check so it only applies to the angle case, e.g. `if (result->side == 0) { result->angle = gtk_css_value_transition(...); if (result->angle == NULL) goto fail; }`.","locations":[{"ref":"gtk/gtkcssimagelinear.c:686-690","code":"  686 |   result->side = start->side;\n  687 |   if (result->side == 0)\n  688 |     result->angle = gtk_css_value_transition (start->angle, end->angle, property_id, progress);\n  689 |   if (result->angle == NULL)\n  690 |     goto fail;"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"gtk_css_image_linear_resolve() copies repeating, side and angle but fails to copy color_space and hue_interp into the new image (compare gtk_css_image_linear_compute() which copies both at lines 624-625). When a linear gradient containing currentColor is resolved, the resolved copy loses its interpolation color space / hue interpolation and reverts to the default sRGB.","fix":"After setting copy->side, also set `copy->color_space = linear->color_space; copy->hue_interp = linear->hue_interp;`.","locations":[{"ref":"gtk/gtkcssimagelinear.c:878-907","code":"  878 |   copy = g_object_new (GTK_TYPE_CSS_IMAGE_LINEAR, NULL);\n  879 |   copy->repeating = linear->repeating;\n  880 |   copy->side = linear->side;\n  881 | \n  882 |   if (linear->angle)\n  883 |     copy->angle = gtk_css_value_ref (linear->angle);\n  884 | \n  885 |   copy->n_stops = linear->n_stops;\n  886 |   copy->color_stops = g_new (GtkCssImageLinearColorStop, copy->n_stops);\n  887 | \n  888 |   for (i = 0; i < linear->n_stops; i++)\n  889 |     {\n  890 |       const GtkCssImageLinearColorStop *stop = &linear->color_stops[i];\n  891 |       GtkCssImageLinearColorStop *scopy = &copy->color_stops[i];\n  892 | \n  893 |       scopy->color = gtk_css_value_resolve (stop->color, context, current_color);\n  894 | \n  895 |       if (stop->offset)\n  896 |         scopy->offset = gtk_css_value_ref (stop->offset);\n  897 |       else\n  898 |         scopy->offset = NULL;\n  899 | \n  900 |       if (stop->transition_hint)\n  901 |         scopy->transition_hint = gtk_css_value_ref (stop->transition_hint);\n  902 |       else\n  903 |         scopy->transition_hint = NULL;\n  904 |     }\n  905 | \n  906 |   return GTK_CSS_IMAGE (copy);\n  907 | }"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"gtk_css_image_radial_transition() checks that start->color_space == end->color_space and start->hue_interp == end->hue_interp (lines 648-649) but never copies them into `result`. The transitioned radial gradient therefore always reverts to the default sRGB color space, even when both inputs used a non-sRGB space. The linear equivalent copies them (gtkcssimagelinear.c:680-681).","fix":"Set `result->color_space = start->color_space; result->hue_interp = start->hue_interp;` when building the result.","locations":[{"ref":"gtk/gtkcssimageradial.c:652-655","code":"  652 |   result = g_object_new (GTK_TYPE_CSS_IMAGE_RADIAL, NULL);\n  653 |   result->repeating = start->repeating;\n  654 |   result->circle = start->circle;\n  655 |   result->size = start->size;"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"gtk_css_image_radial_resolve() copies repeating, circle, size, position and sizes but not color_space / hue_interp (compute copies both at lines 591-592). A radial gradient with currentColor that gets resolved loses its interpolation color space.","fix":"Add `copy->color_space = radial->color_space; copy->hue_interp = radial->hue_interp;` in the resolve copy.","locations":[{"ref":"gtk/gtkcssimageradial.c:872-907","code":"  872 |   copy = g_object_new (GTK_TYPE_CSS_IMAGE_RADIAL, NULL);\n  873 |   copy->repeating = radial->repeating;\n  874 |   copy->circle = radial->circle;\n  875 |   copy->size = radial->size;\n  876 | \n  877 |   copy->position = gtk_css_value_ref (radial->position);\n  878 | \n  879 |   if (radial->sizes[0])\n  880 |     copy->sizes[0] = gtk_css_value_ref (radial->sizes[0]);\n  881 | \n  882 |   if (radial->sizes[1])\n  883 |     copy->sizes[1] = gtk_css_value_ref (radial->sizes[1]);\n  884 | \n  885 |   copy->n_stops = radial->n_stops;\n  886 |   copy->color_stops = g_new (GtkCssImageRadialColorStop, copy->n_stops);\n  887 | \n  888 |   for (guint i = 0; i < radial->n_stops; i++)\n  889 |     {\n  890 |       const GtkCssImageRadialColorStop *stop = &radial->color_stops[i];\n  891 |       GtkCssImageRadialColorStop *scopy = &copy->color_stops[i];\n  892 | \n  893 |       scopy->color = gtk_css_value_resolve (stop->color, context, current_color);\n  894 | \n  895 |       if (stop->offset)\n  896 |         scopy->offset = gtk_css_value_ref (stop->offset);\n  897 |       else\n  898 |         scopy->offset = NULL;\n  899 | \n  900 |       if (stop->transition_hint)\n  901 |         scopy->transition_hint = gtk_css_value_ref (stop->transition_hint);\n  902 |       else\n  903 |         scopy->transition_hint = NULL;\n  904 |     }\n  905 | \n  906 |   return GTK_CSS_IMAGE (copy);\n  907 | }"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"gtk_css_keyframes_add_keyframe() inserts a new keyframe at sorted position k and uses memmove to shift the keyframe_progress and values arrays so element k becomes the new slot. The variables array, however, is only g_realloc'd to the new size and has its LAST slot (n_keyframes-1) nulled — it is never memmove-shifted to open a hole at index k. If a new keyframe percentage is inserted in the middle (k < n_keyframes-1) AFTER the variables array has been allocated (which happens once any custom-property declaration is parsed), every variable set from index k onward becomes associated with the wrong keyframe progress, and gtk_css_keyframes_copy_keyframe()/print/get_variable then read mismatched variable sets.","fix":"When variables != NULL, memmove the variables array to open a slot at index k (mirroring the keyframe_progress/values handling) and set variables[k] = NULL, instead of only nulling the last element.","locations":[{"ref":"gtk/gtkcsskeyframes.c:119-139","code":"  119 |   keyframes->n_keyframes++;\n  120 |   keyframes->keyframe_progress = g_realloc (keyframes->keyframe_progress, sizeof (double) * keyframes->n_keyframes);\n  121 |   memmove (keyframes->keyframe_progress + k + 1, keyframes->keyframe_progress + k, sizeof (double) * (keyframes->n_keyframes - k - 1));\n  122 |   keyframes->keyframe_progress[k] = progress;\n  123 | \n  124 |   if (keyframes->n_properties)\n  125 |     {\n  126 |       gsize size = sizeof (GtkCssValue *) * keyframes->n_properties;\n  127 |       \n  128 |       keyframes->values = g_realloc (keyframes->values, sizeof (GtkCssValue *) * keyframes->n_keyframes * keyframes->n_properties);\n  129 |       memmove (&KEYFRAMES_VALUE (keyframes, k + 1, 0), &KEYFRAMES_VALUE (keyframes, k, 0), size * (keyframes->n_keyframes - k - 1));\n  130 |       memset (&KEYFRAMES_VALUE (keyframes, k, 0), 0, size);\n  131 |     }\n  132 | \n  133 |   if (keyframes->variables)\n  134 |     {\n  135 |       keyframes->variables = g_realloc (keyframes->variables, sizeof (GtkCssVariableSet *) * keyframes->n_keyframes);\n  136 |       keyframes->variables[keyframes->n_keyframes - 1] = NULL;\n  137 |     }\n  138 | \n  139 |   return k;"},{"ref":"gtk/gtkcsskeyframes.c:418-439","code":"  418 | static guint\n  419 | gtk_css_keyframes_copy_keyframe (GtkCssKeyframes *keyframes,\n  420 |                                  guint            k,\n  421 |                                  double           progress)\n  422 | {\n  423 |   guint l = gtk_css_keyframes_add_keyframe (keyframes, progress);\n  424 | \n  425 |   if (l <= k)\n  426 |     k++;\n  427 | \n  428 |   if (keyframes->variables && keyframes->variables[k])\n  429 |     keyframes->variables[l] = gtk_css_variable_set_copy (keyframes->variables[k]);\n  430 | \n  431 |   for (guint p = 0; p < keyframes->n_properties; p++)\n  432 |     {\n  433 |       GtkCssValue *value = KEYFRAMES_VALUE (keyframes, k, p);\n  434 |       if (value)\n  435 |         KEYFRAMES_VALUE (keyframes, l, p) = gtk_css_value_ref (value);\n  436 |     }\n  437 | \n  438 |   return l;\n  439 | }"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In gtk_filter_list_model_set_incremental(), when disabling incremental filtering, the code runs the filter to completion with G_MAXUINT BEFORE snapshotting the 'old' bitset, then copies old (which now already equals the fully-filtered matches), then runs again with 512 (a no-op since pending is NULL). The subsequent emit_items_changed_for_changes(self, old) therefore sees no difference and emits nothing, so observers never learn about the items that became visible/hidden when filtering completed. The 'old' snapshot must be taken before running the filter.","fix":"Snapshot old = gtk_bitset_copy(self->matches) BEFORE calling gtk_filter_list_model_run_filter(self, G_MAXUINT); drop the redundant second run_filter(self, 512) call.","locations":[{"ref":"gtk/gtkfilterlistmodel.c:1125-1137","code":" 1125 |   if (!incremental)\n 1126 |     {\n 1127 |       GtkBitset *old;\n 1128 |       gtk_filter_list_model_run_filter (self, G_MAXUINT);\n 1129 | \n 1130 |       old = gtk_bitset_copy (self->matches);\n 1131 |       gtk_filter_list_model_run_filter (self, 512);\n 1132 | \n 1133 |       gtk_filter_list_model_stop_filtering (self);\n 1134 | \n 1135 |       gtk_filter_list_model_emit_items_changed_for_changes (self, old);\n 1136 |       g_object_notify_by_pspec (G_OBJECT (self), properties[PROP_PENDING]);\n 1137 |     }"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"GtkSearchEngineTracker3 never resets its GCancellable, so search only works once after any stop. The cancellable is created once in _init() and is cancelled in gtk_search_engine_tracker3_stop() (g_cancellable_cancel), but it is never reset (g_cancellable_reset) before the next search. After the first stop()/cancel, the same already-cancelled cancellable is passed to tracker_sparql_statement_execute_async() on the next gtk_search_engine_tracker3_start(), so the async query fails/aborts immediately. Searches after a stop silently return no results.","fix":"Call g_cancellable_reset (tracker->cancellable) at the start of gtk_search_engine_tracker3_start() (or after cancelling in stop()), or allocate a fresh GCancellable per search.","locations":[{"ref":"gtk/gtksearchenginetracker3.c:322-336","code":"  322 | static void\n  323 | gtk_search_engine_tracker3_stop (GtkSearchEngine *engine)\n  324 | {\n  325 |   GtkSearchEngineTracker3 *tracker;\n  326 | \n  327 |   tracker = GTK_SEARCH_ENGINE_TRACKER3 (engine);\n  328 | \n  329 |   if (tracker->query && tracker->query_pending)\n  330 |     {\n  331 |       g_cancellable_cancel (tracker->cancellable);\n  332 |       tracker->query_pending = FALSE;\n  333 |     }\n  334 | \n  335 |   g_clear_handle_id (&tracker->idle_id, g_source_remove);\n  336 | }"},{"ref":"gtk/gtksearchenginetracker3.c:316-318","code":"  316 |   tracker_sparql_statement_execute_async (statement, tracker->cancellable,\n  317 |                                           (GAsyncReadyCallback) query_callback,\n  318 |                                           g_object_ref (tracker));"}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"find_action_owner() inverts the prefix tests. g_str_has_prefix() returns TRUE (non-zero) when the prefix matches, so 'g_str_has_prefix (full_name, \"win.\") == 0' is true only when the name does NOT start with \"win.\". The win./app. action-owner shortcuts are thus taken for the wrong action names; the generic muxer-walk afterwards may paper over it, but the intended fast path is dead/incorrect.","fix":"Drop the '== 0' (or use '!= 0'): use 'if (g_str_has_prefix (full_name, \"win.\"))' and 'else if (g_str_has_prefix (full_name, \"app.\"))'.","locations":[{"ref":"gtk/inspector/prop-editor.c:1671","code":" 1671 |   if (g_str_has_prefix (full_name, \"win.\") == 0)"},{"ref":"gtk/inspector/prop-editor.c:1676","code":" 1676 |   else if (g_str_has_prefix (full_name, \"app.\") == 0)"}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"ObjectProperty 'texture' property getter returns the wrong field. The OBJECT_PROPERTY_PROP_TEXTURE case calls g_value_set_object(value, self->value) where self->value is a 'char *' string, not the GdkTexture* (self->texture). g_value_set_object on a non-GObject pointer (a heap string) will either fail a type check or attempt to ref a string as a GObject, leading to memory corruption / crash if this getter is ever invoked via g_object_get on the texture property.","fix":"Return the texture field instead: g_value_set_object (value, self->texture);","locations":[{"ref":"gtk/inspector/recorder.c:153-155","code":"  153 |     case OBJECT_PROPERTY_PROP_TEXTURE:\n  154 |       g_value_set_object (value, self->value);\n  155 |       break;"}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Argument-order bug in svg_orient_interpolate(). The helper lerp() is declared as `lerp (double t, double a, double b)` (gtk/svg/gtksvgutilsprivate.h:78-82) and every other caller in the SVG code passes the interpolation factor `t` as the FIRST argument. svg_orient_interpolate() instead calls `lerp (v0->angle, v1->angle, t)`, i.e. it passes the two angles as `t`/`a` and the real interpolation factor `t` as `b`. The result is a nonsensical value (`v0->angle + (v1->angle - v0->angle) * t_real_is_ignored ...`), so animating a marker's `orient` attribute between two numeric angles produces garbage orientation values instead of a smooth interpolation. Compare with the correct usage in gtksvgtransform.c (e.g. lines 1163) and gtksvgnumber.c:62.","fix":"Reorder the arguments to match the helper: `lerp (t, v0->angle, v1->angle)`.","locations":[{"ref":"gtk/svg/gtksvgorient.c:69","code":"   69 |     return svg_orient_new_angle (lerp (v0->angle, v1->angle, t), v0->unit);"}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","description":"rotl() masks the shift with `shift &= 32 - 1` (i.e. &= 31) which is correct for a 32-bit rotate, but the early-return guard `if ((shift &= 31) == 0) return value;` combined with `value >> (32 - shift)` is only safe because shift is now in [1,31]. This is fine, but the function is also relied upon to produce a stable hash that must match the browser-side JS implementation; any divergence silently breaks node-diffing/reuse. Noting as a correctness-coupling hazard rather than a crash: the C hash in decode_nodes (line 1888-1896) must stay byte-identical to the JS side.","fix":"No code change required; document the invariant that this hash must match broadway.js, and add a test that exercises the diff path.","locations":[{"ref":"gdk/broadway/broadway-server.c:1765-1771","code":" 1765 | static guint32\n 1766 | rotl (guint32 value, int shift)\n 1767 | {\n 1768 |   if ((shift &= 32 - 1) == 0)\n 1769 |     return value;\n 1770 |   return (value << shift) | (value >> (32 - shift));\n 1771 | }"},{"ref":"gdk/broadway/broadway-server.c:1888-1896","code":" 1888 |   hash = node->type << 16;\n 1889 | \n 1890 |   for (i = 0; i < size; i++)\n 1891 |     hash ^= rotl (node->data[i], i);\n 1892 | \n 1893 |   for (i = 0; i < n_children; i++)\n 1894 |     hash ^= rotl (node->children[i]->hash, i);\n 1895 | \n 1896 |   node->hash = hash;"}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In gdk_x11_context_create_glx_context(), the debug message logs and calls glXIsDirect() on context_glx->glx_context BEFORE that field is assigned the freshly-created context. The new context handle is in the local variable `ctx`, but the field assignment `context_glx->glx_context = ctx;` happens only afterwards (line 598). At the point of the GDK_DISPLAY_DEBUG call (lines 591-596), context_glx->glx_context is still NULL (or a stale value from a previous create attempt during the realize fallback loop). As a result the debug log reports the wrong pointer and glXIsDirect() is invoked with NULL/stale instead of the just-created `ctx`, so the 'direct'/'indirect' diagnostic is wrong. The version fields logged (display_x11->glx_version) are also unrelated to the context just created.","fix":"Assign context_glx->glx_context = ctx; before emitting the debug message, or log `ctx` and\ncall glXIsDirect (dpy, ctx) directly.","locations":[{"ref":"gdk/x11/gdkglcontext-glx.c:591-598","code":"  591 |   GDK_DISPLAY_DEBUG (display, OPENGL,\n  592 |                      \"Realized GLX context[%p], %s, version: %d.%d\",\n  593 |                      context_glx->glx_context,\n  594 |                      glXIsDirect (dpy, context_glx->glx_context) ? \"direct\" : \"indirect\",\n  595 |                      display_x11->glx_version / 10,\n  596 |                      display_x11->glx_version % 10);\n  597 | \n  598 |   context_glx->glx_context = ctx;"}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In parse_glyphs() (string branch), the 'Unsupported character' error message prints the loop index `i` instead of the offending character value s[i]: `gtk_css_parser_error_value (parser, \"Unsupported character %d in string\", i);`. Also, after reporting the unsupported character it does not `continue`/skip; it falls through and still encodes `gi.glyph = PANGO_GLYPH_INVALID_INPUT - MAX_ASCII_GLYPH + s[i]` for the out-of-range char, which (for s[i] outside [MIN,MAX)) feeds an inconsistent placeholder value into the glyph string. Diagnostic-quality / robustness issue in the untrusted parser.","fix":"Print the character (or its code) rather than the index, and skip encoding the glyph when the character is out of the supported ASCII range (continue the loop), so invalid input does not produce a bogus placeholder glyph.","locations":[{"ref":"gsk/gskrendernodeparser.c:2211-2221","code":" 2211 |           for (i = 0; s[i] != 0; i++)\n 2212 |             {\n 2213 |               if (s[i] < MIN_ASCII_GLYPH || s[i] >= MAX_ASCII_GLYPH)\n 2214 |                 {\n 2215 |                   gtk_css_parser_error_value (parser, \"Unsupported character %d in string\", i);\n 2216 |                 }\n 2217 |               gi.glyph = PANGO_GLYPH_INVALID_INPUT - MAX_ASCII_GLYPH + s[i];\n 2218 |               gi.geometry.width = GLYPH_NEEDS_WIDTH;\n 2219 |               pango_glyph_string_set_size (glyph_string, glyph_string->num_glyphs + 1);\n 2220 |               glyph_string->glyphs[glyph_string->num_glyphs - 1] = gi;\n 2221 |             }"}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Potential division by zero / non-finite output in gsk_rounded_rect_shrink() when `width = left + right == 0` while `self->bounds.size.width < 0` (non-normalized input): the branch `self->bounds.origin.x += left * self->bounds.size.width / width;` divides by width==0. The same applies to the height/`height==0` case. Normal callers pass normalized rects (size >= 0) so the negative-size branch is not taken, but the function does not normalize and is also used with negative (grow) arguments, so a left=+k/right=-k pair giving width==0 combined with a degenerate negative size would divide by zero.","fix":"Guard the proportional-shrink branches against width==0 / height==0 (only enter them when bounds size is actually negative AND the divisor is non-zero), or clamp/normalize bounds first.","locations":[{"ref":"gsk/gskroundedrect.c:259-297","code":"  259 | GskRoundedRect *\n  260 | gsk_rounded_rect_shrink (GskRoundedRect *self,\n  261 |                          float           top,\n  262 |                          float           right,\n  263 |                          float           bottom,\n  264 |                          float           left)\n  265 | {\n  266 |   float width = left + right;\n  267 |   float height = top + bottom;\n  268 | \n  269 |   if (self->bounds.size.width - width < 0)\n  270 |     {\n  271 |       self->bounds.origin.x += left * self->bounds.size.width / width;\n  272 |       self->bounds.size.width = 0;\n  273 |     }\n  274 |   else\n  275 |     {\n  276 |       self->bounds.origin.x += left;\n  277 |       self->bounds.size.width -= width;\n  278 |     }\n  279 | \n  280 |   if (self->bounds.size.height - height < 0)\n  281 |     {\n  282 |       self->bounds.origin.y += top * self->bounds.size.height / height;\n  283 |       self->bounds.size.height = 0;\n  284 |     }\n  285 |   else\n  286 |     {\n  287 |       self->bounds.origin.y += top;\n  288 |       self->bounds.size.height -= height;\n  289 |     }\n  290 | \n  291 |   border_radius_shrink (&self->corner[GSK_CORNER_TOP_LEFT], left, top, &self->bounds.size);\n  292 |   border_radius_shrink (&self->corner[GSK_CORNER_TOP_RIGHT], right, top, &self->bounds.size);\n  293 |   border_radius_shrink (&self->corner[GSK_CORNER_BOTTOM_RIGHT], right, bottom, &self->bounds.size);\n  294 |   border_radius_shrink (&self->corner[GSK_CORNER_BOTTOM_LEFT], left, bottom, &self->bounds.size);\n  295 | \n  296 |   return self;\n  297 | }"}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","description":"AT-SPI Action index space is inconsistent between the enumeration methods and the\nper-index methods. GetActions and the NActions property skip actions whos t_context_get_accessible (GTK_AT_CONTEXT (self));\n  209 |       GtkWidget *widget = GTK_WIDGET (accessible);\n  210 |       int idx = -1;\n  211 | \n  212 |       if (!gtk_widget_is_sensitive (widget) || !gtk_widget_get_visible (widget))\n  213 |         {\n  214 |           g_dbus_method_invocation_return_value (invocation, g_variant_new (\"(b)\", FALSE));\n  215 |           return;\n  216 |         }\n  217 | \n  218 |       g_variant_get (parameters, \"(i)\", &idx);\n  219 | \n  220 |       if (idx >= 0 && idx < n_actions)\n  221 |         {\n  222 |           const Action *action = &actions[idx];\n  223 | \n  224 |           if (action->is_enabled == NULL || action->is_enabled (self))\n  225 |             {\n  226 |               gboolean res = TRUE;\n  227 | \n  228 |               if (action->activate == NULL)\n  229 |                 {\n  230 |                   gtk_widget_activate (widget);\n  231 |                 }\n  232 |               else\n  233 |                 {\n  234 |                   res = action->activate (self);\n  235 |                 }\n  236 | \n  237 |               g_dbus_method_invocation_return_value (invocation, g_variant_new (\"(b)\", res));\n  238 |             }\n  239 |           else\n  240 |             {\n  241 |               g_dbus_method_invocation_return_value (invocation, g_variant_new (\"(b)\", FALSE));\n  242 |             }\n  243 |         }\n  244 |       else\n  245 |         {\n  246 |           g_dbus_method_invocation_return_error (invocation,\n  247 |                                                  G_IO_ERROR,\n  248 |                                                  G_IO_ERROR_INVALID_ARGUMENT,\n  249 |                                                  \"Unknown action %d\",\n  250 |                                                  idx);\n  251 |         }\n  252 |     }\n  253 | }\n  254 | \n  255 | static GVariant *\n  256 | action_handle_get_property (GtkAtSpiContext  *self,\n  257 |                             const char       *property_name,\n  258 |                             GError          **error,\n  259 |                             const Action     *actions,\n  260 |                             int               n_actions)\n  261 | {\n  262 |   if (g_strcmp0 (property_name, \"NActions\") == 0)\n  263 |     {\n  264 |       int n_valid_actions = 0;\n  265 | \n  266 |       for (int i = 0; i < n_actions; i++)\n  267 |         {\n  268 |           const Action *action = &actions[i];\n  269 | \n  270 |           if (action->is_enabled == NULL || action->is_enabled (self))\n  271 |             n_valid_actions += 1;\n  272 |         }\n  273 | \n  274 |       return g_variant_new_int32 (n_valid_actions);\n  275 |     }\n  276 | \n  277 |   g_set_error (error, G_IO_ERROR, G_IO_ERROR_NOT_SUPPORTED,\n  278 |                \"Unknown property '%s'\", property_name);\n  279 | \n  280 |   return NULL;\n  281 | }"}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In pango_layout_get_line_before(), if the target offset is never found inside any line\n(the `!found` branch), the function uses prev_start_index and prev_length to compute the\nresult. These locals are declared without initializers (lines 298-300) and are only assigned\nat the end of each loop iteration. They are guaranteed to be set only if the do/while body\nran at least once and reached its tail — which holds whenever the layout has at least one\nline — but a layout that produced no iterations would read indeterminate values. The code\nrelies on PangoLayout always yielding at least one line.","fix":"Initialize prev_start_index/prev_length (and the prev_prev_* locals) to 0 to be defensive against a zero-line layout.","locations":[{"ref":"gtk/a11y/gtkatspipango.c:296-366","code":"  296 |   PangoLayoutIter *iter;\n  297 |   PangoLayoutLine *line, *prev_line = NULL, *prev_prev_line = NULL;\n  298 |   int index, start_index, length, end_index;\n  299 |   int prev_start_index, prev_length;\n  300 |   int prev_prev_start_index, prev_prev_length;\n  301 |   const char *text;\n  302 |   gboolean found = FALSE;\n  303 | \n  304 |   text = pango_layout_get_text (layout);\n  305 |   index = g_utf8_offset_to_pointer (text, offset) - text;\n  306 |   iter = pango_layout_get_iter (layout);\n  307 |   do\n  308 |     {\n  309 |       line = pango_layout_iter_get_line (iter);\n  310 |       start_index = pango_layout_line_get_start_index (line);\n  311 |       length = pango_layout_line_get_length (line);\n  312 |       end_index = start_index + length;\n  313 | \n  314 |       if (index >= start_index && index <= end_index)\n  315 |         {\n  316 |           /* Found line for offset */\n  317 |           if (prev_line)\n  318 |             {\n  319 |               switch (boundary_type)\n  320 |                 {\n  321 |                 case ATSPI_TEXT_BOUNDARY_LINE_START:\n  322 |                   end_index = start_index;\n  323 |                   start_index = prev_start_index;\n  324 |                   break;\n  325 |                 case ATSPI_TEXT_BOUNDARY_LINE_END:\n  326 |                   if (prev_prev_line)\n  327 |                     start_index = prev_prev_start_index + prev_prev_length;\n  328 |                   else\n  329 |                     start_index = 0;\n  330 |                   end_index = prev_start_index + prev_length;\n  331 |                   break;\n  332 |                 case ATSPI_TEXT_BOUNDARY_CHAR:\n  333 |                 case ATSPI_TEXT_BOUNDARY_WORD_START:\n  334 |                 case ATSPI_TEXT_BOUNDARY_WORD_END:\n  335 |                 case ATSPI_TEXT_BOUNDARY_SENTENCE_START:\n  336 |                 case ATSPI_TEXT_BOUNDARY_SENTENCE_END:\n  337 |                 default:\n  338 |                   g_assert_not_reached();\n  339 |                 }\n  340 |             }\n  341 |           else\n  342 |             start_index = end_index = 0;\n  343 | \n  344 |           found = TRUE;\ _36","type":"logic_error","type_label":"Logic Error","severity":"low","description":"gtk_css_image_recolor_resolve() creates a new recolor image and refs recolor->paintable but never copies recolor->width / recolor->height. Because get_width()/get_height() call gtk_css_image_recolor_load_paintable(), which returns immediately when paintable is already set (line 74-75) and only assigns width/height when it actually loads the paintable, the resolved image will report width == 0 and height == 0 for icons that contain currentColor (the only case resolve is used). Sizing of recolored symbolic icons that use currentColor is therefore broken.","fix":"In gtk_css_image_recolor_resolve(), copy img->width = recolor->width; img->height = recolor->height; when img->paintable is set.","locations":[{"ref":"gtk/gtkcssimagerecolor.c:394-411","code":"  394 | static GtkCssImage *\n  395 | gtk_css_image_recolor_resolve (GtkCssImage          *image,\n  396 |                                GtkCssComputeContext *context,\n  397 |                                GtkCssValue          *current_color)\n  398 | {\n  399 |   GtkCssImageRecolor *recolor = GTK_CSS_IMAGE_RECOLOR (image);\n  400 |   GtkCssImageRecolor *img;\n  401 | \n  402 |   img = g_object_new (GTK_TYPE_CSS_IMAGE_RECOLOR, NULL);\n  403 | \n  404 |   img->palette = gtk_css_value_resolve (recolor->palette, context, current_color);\n  405 |   img->color = gtk_css_value_resolve (recolor->color, context, current_color);\n  406 |   img->file = g_object_ref (recolor->file);\n  407 |   if (recolor->paintable)\n  408 |     img->paintable = g_object_ref (recolor->paintable);\n  409 | \n  410 |   return GTK_CSS_IMAGE (img);\n  411 | }"},{"ref":"gtk/gtkcssimagerecolor.c:68-142","code":"   68 | static void\n   69 | gtk_css_image_recolor_load_paintable (GtkCssImageRecolor  *recolor,\n   70 |                                       GError             **error)\n   71 | {\n   72 |   char *uri;\n   73 | \n   74 |   if (recolor->paintable)\n   75 |     return;\n   76 | \n   77 |   uri = g_file_get_uri (recolor->file);\n   78 | \n   79 |   if (g_file_has_uri_scheme (recolor->file, \"resource\"))\n   80 |     {\n   81 |       char *resource_path = g_uri_unescape_string (uri + strlen (\"resource://\"), NULL);\n   82 | \n   83 |       if (g_str_has_suffix (resource_path, \".svg\"))\n   84 |         {\n   85 |           GtkSvg *svg = gtk_svg_new ();\n   86 | \n   87 |           if (g_str_has_suffix (resource_path, \"-symbolic.svg\") ||\n   88 |               g_str_has_suffix (resource_path, \"-symbolic-ltr.svg\") ||\n   89 |               g_str_has_suffix (resource_path, \"-symbolic-rtl.svg\"))\n   90 |             gtk_svg_set_features (svg, GTK_SVG_DEFAULT_FEATURES | GTK_SVG_TRADITIONAL_SYMBOLIC);\n   91 | \n   92 |           gtk_svg_load_from_resource (svg, resource_path);\n   93 |           recolor->paintable = GDK_PAINTABLE (svg);\n   94 |         }\n   95 |       else if (g_str_has_suffix (uri, \".symbolic.png\"))\n   96 |         {\n   97 |           recolor->paintable = GDK_PAINTABLE (gdk_texture_new_from_resource (resource_path));\n   98 |         }\n   99 | \n  100 |       g_free (resource_path);\n  101 |     }\n  102 |   else\n  103 |     {\n  104 |       const char *path = g_file_peek_path (recolor->file);\n  105 | \n  106 |       if (g_str_has_suffix (path, \".svg\"))\n  107 |         {\n  108 |           GtkSvg *svg;\n  109 |           char *data;\n  110 |           size_t size;\n  111 | \n  112 |           svg = gtk_svg_new ();\n  113 | \n  114 |           if (g_str_has_suffix (path, \"-symbolic.svg\") ||\n  115 |               g_str_has_suffix (path, \"-symbolic-ltr.svg\") ||\n  116 |               g_str_has_suffix (path, \"-symbolic-rtl.svg\"))\n  117 |             gtk_svg_set_features (svg, GTK_SVG_DEFAULT_FEATURES | GTK_SVG_TRADITIONAL_SYMBOLIC);\n  118 | \n  119 | \n  120 |           if (g_file_get_contents (path, &data, &size, NULL))\n  121 |             {\n  122 |               GBytes *bytes = g 563 | \n 1564 |   return 0;\n 1565 | }"},{"ref":"gtk/gtkcssprovider.c:1577","code":" 1577 |   g_array_sort (priv->rulesets, gtk_css_provider_compare_rule);"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","description":"gtk_css_provider_load_internal() sets priv->bytes = bytes for the file being parsed but never restores the previous value. During a recursive @import, the child load overwrites priv->bytes; after the child returns its GBytes is unreffed (parse_import line 1104), leaving priv->bytes dangling at the parent's remaining parse and afterwards (priv->bytes is documented as holding no reference). gtk_css_style_provider_has_section() compares against priv->bytes, so it can compare against a freed pointer. The pointer is only used for identity comparison (not dereferenced), but it is a stale/dangling pointer.","fix":"Save and restore priv->bytes around the recursive load, or set it from the top-level bytes only.","locations":[{"ref":"gtk/gtkcssprovider.c:1610-1642","code":" 1610 | static void\n 1611 | gtk_css_provider_load_internal (GtkCssProvider *self,\n 1612 |                                 GtkCssScanner  *parent,\n 1613 |                                 GFile          *file,\n 1614 |                                 GBytes         *bytes)\n 1615 | {\n 1616 |   GtkCssProviderPrivate *priv = gtk_css_provider_get_instance_private (self);\n 1617 |   gint64 before G_GNUC_UNUSED;\n 1618 |   GtkCssScanner *scanner;\n 1619 | \n 1620 |   before = GDK_PROFILER_CURRENT_TIME;\n 1621 | \n 1622 |   priv->bytes = bytes;\n 1623 | \n 1624 |   scanner = gtk_css_scanner_new (self,\n 1625 |                                   parent,\n 1626 |                                   file,\n 1627 |                                   bytes);\n 1628 | \n 1629 |   parse_stylesheet (scanner);\n 1630 | \n 1631 |   gtk_css_scanner_destroy (scanner);\n 1632 | \n 1633 |   if (parent == NULL)\n 1634 |     gtk_css_provider_postprocess (self);\n 1635 | \n 1636 |   if (GDK_PROFILER_IS_RUNNING)\n 1637 |     {\n 1638 |       const char *uri G_GNUC_UNUSED;\n 1639 |       uri = file ? g_file_peek_path (file) : NULL;\n 1640 |       gdk_profiler_end_mark (before, \"CSS theme load\", uri);\n 1641 |     }\n 1642 | }"},{"ref":"gtk/gtkcssprovider.c:790-798","code":"  790 | static gboolean\n  791 | gtk_css_style_provider_has_section (GtkStyleProvider *provider,\n  792 |                                     GtkCssSection    *section)\n  793 | {\n  794 |   GtkCssProvider *self = GTK_CSS_PROVIDER (provider);\n  795 |   GtkCssProviderPrivate *priv = gtk_css_provider_get_instance_private (self);\n  796 | \n  797 |   return priv->bytes == gtk_css_section_get_bytes (section);\n  798 | }"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","description":"comp_name() and comp_id() implement the selector comparator as `a->name.name - b->name.name`, subtracting two GQuark (guint) values and returning the result as an int. When the two quark values differ by more than INT_MAX (or the unsigned subtraction wraps), the sign of the returned comparison is wrong, which can corrupt the ordering / dedup logic in the selector tree (gtk_css_selector_compare_one, subdivide_infos max_selector selection). comp_class() avoids this by using explicit < / > comparisons; comp_name/comp_id should do the same. In practice quark values are small so this is mostly latent, but it is an incorrect comparator.","fix":"Compare with explicit relational operators returning -1/0/1, as comp_class() does, instead of subtracting unsigned quark values.","locations":[{"ref":"gtk/gtkcssselector.c:571-576","code":"  571 | static int\n  572 | comp_name (const GtkCssSelector *a,\n  573 |            const GtkCssSelector *b)\n  574 | {\n  575 |   return a->name.name - b->name.name;\n  576 | }"},{"ref":"gtk/gtkcssselector.c:640-645","code":"  640 | static int\n  641 | comp_id (const GtkCssSelector *a,\n  642 | \t const GtkCssSelector *b)\n  643 | {\n  644 |   return a->id.name - b->id.name;\n  645 | }"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","description":"file_filter_add_attribute() uses g_renew(char **, filter->attributes, i + 2) but the array element type is 'char *', not 'char **'. The element-size passed to g_renew is therefore sizeof(char**) instead of sizeof(char*). On all common platforms sizeof(char**)==sizeof(char*) so it currently works, but it is incorrect and would over-/mis-allocate on a hypothetical platform where the sizes differ. It is also misleading to readers.","fix":"Use g_renew (char *, filter->attributes, i + 2).","locations":[{"ref":"gtk/gtkfilefilter.c:612","code":"  612 |   filter->attributes = (char **)g_renew (char **, filter->attributes, i + 2);"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","description":"_gtk_gesture_swipe_clear_backlog() intends to drop events older than CAPTURE_THRESHOLD_MS. When it finds the first event newer than the threshold at index i it sets `length = i - 1` and removes [0, length). This is an off-by-one: it should remove [0, i) (length = i), so one stale event is always retained. Additionally, if NO event is newer than the threshold the loop never sets length (stays 0) and no pruning happens, so all stale events are kept. Also `evtime - CAPTURE_THRESHOLD_MS` underflows for evtime < 150 (guint32), making the comparison always false and keeping everything.","fix":"Use length = i when the first fresh event is found; handle the all-stale case (remove all but keep at least the most recent); and guard the unsigned subtraction (e.g. only subtract when evtime >= CAPTURE_THRESHOLD_MS).","locations":[{"ref":"gtk/gtkgestureswipe.c:106-130","code":"  106 | static void\n  107 | _gtk_gesture_swipe_clear_backlog (GtkGestureSwipe *gesture,\n  108 |                                   guint32          evtime)\n  109 | {\n  110 |   GtkGestureSwipePrivate *priv;\n  111 |   int i, length = 0;\n  112
