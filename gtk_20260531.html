ity,\n  781 |                                self->cancellable,\n  782 |                                got_existing_file_info_cb,\n  783 |                                ev);\n  784 |       break;\n  785 | \n  786 |     case G_FILE_MONITOR_EVENT_CHANGED:\n  787 |     case G_FILE_MONITOR_EVENT_CHANGES_DONE_HINT:\n  788 |     case G_FILE_MONITOR_EVENT_PRE_UNMOUNT:\n  789 |     case G_FILE_MONITOR_EVENT_UNMOUNTED:\n  790 |     case G_FILE_MONITOR_EVENT_MOVED:\n  791 |     default:\n  792 |       break;\n  793 |     }\n  794 | }"},{"ref":"gtk/gtkdirectorylist.c:256-274","code":"  256 | static void\n  257 | gtk_directory_list_dispose (GObject *object)\n  258 | {\n  259 |   GtkDirectoryList *self = GTK_DIRECTORY_LIST (object);\n  260 | \n  261 |   gtk_directory_list_stop_loading (self);\n  262 |   gtk_directory_list_stop_monitoring (self);\n  263 | \n  264 |   g_clear_object (&self->file);\n  265 |   g_clear_pointer (&self->attributes, g_free);\n  266 | \n  267 |   g_clear_error (&self->error);\n  268 |   g_clear_pointer (&self->items, g_sequence_free);\n  269 | \n  270 |   g_queue_foreach (&self->events, (GFunc) free_queued_event, NULL);\n  271 |   g_queue_clear (&self->events);\n  272 | \n  273 |   G_OBJECT_CLASS (gtk_directory_list_parent_class)->dispose (object);\n  274 | }"}]},{"id":"UAF_8","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"gtk_picture_clear_paintable() unrefs self->paintable but never sets self->paintable = NULL. In gtk_picture_set_paintable() this is harmless because the field is immediately reassigned afterward, but gtk_picture_dispose() calls gtk_picture_clear_paintable() and leaves a dangling pointer in self->paintable. GObject dispose may run more than once during teardown; a second dispose invocation calls gtk_picture_clear_paintable() again, which dereferences the freed paintable via gdk_paintable_get_flags(self->paintable) and g_signal_handlers_disconnect_by_func() -> use-after-free / double unref.","fix":"Set self->paintable = NULL at the end of gtk_picture_clear_paintable() (after the g_object_unref), so repeated calls / dispose are idempotent.","locations":[{"ref":"gtk/gtkpicture.c:416-437","code":"  416 | static void\n  417 | gtk_picture_clear_paintable (GtkPicture *self)\n  418 | {\n  419 |   guint flags;\n  420 | \n  421 |   if (self->paintable == NULL)\n  422 |     return;\n  423 | \n  424 |   flags = gdk_paintable_get_flags (self->paintable);\n  425 | \n  426 |   if ((flags & GDK_PAINTABLE_STATIC_CONTENTS) == 0)\n  427 |     g_signal_handlers_disconnect_by_func (self->paintable,\n  428 |                                           gtk_picture_paintable_invalidate_contents,\n  429 |                                           self);\n  430 | \n  431 |   if ((flags & GDK_PAINTABLE_STATIC_SIZE) == 0)\n  432 |     g_signal_handlers_disconnect_by_func (self->paintable,\n  433 |                                           gtk_picture_paintable_invalidate_size,\n  434 |                                           self);\n  435 | \n  436 |   g_object_unref (self->paintable);\n  437 | }"},{"ref":"gtk/gtkpicture.c:439-450","code":"  439 | static void\n  440 | gtk_picture_dispose (GObject *object)\n  441 | {\n  442 |   GtkPicture *self = GTK_PICTURE (object);\n  443 | \n  444 |   gtk_picture_clear_paintable (self);\n  445 | \n  446 |   g_clear_object (&self->file);\n  447 |   g_clear_pointer (&self->alternative_text, g_free);\n  448 | \n  449 |   G_OBJECT_CLASS (gtk_picture_parent_class)->dispose (object);\n  450 | };"}]},{"id":"UAF_9","type":"use_after_free","type_label":"Use After Free","severity":"low","description":"init_builtin_table() obtains a data pointer from a GBytes via g_bytes_get_data() and then immediately drops its only reference with g_bytes_unref(), retaining the raw pointer in builtin_compose_table.data / .char_data. The pointer's validity after the GBytes is freed is not guaranteed by the API; it only happens to work because GResource data lives in static memory. There is also no NULL check on the GBytes returned by g_resources_lookup_data().","fix":"Keep the GBytes references alive for the lifetime of builtin_compose_table (store them), or copy the data, instead of relying on the freed GBytes' backing memory remaining valid.","locations":[{"ref":"gtk/gtkimcontextsimple.c:106-118","code":"  106 | static void\n  107 | init_builtin_table (void)\n  108 | {\n  109 |   GBytes *bytes;\n  110 | \n  111 |   bytes = g_resources_lookup_data (\"/org/gtk/libgtk/compose/sequences\", 0, NULL);\n  112 |   builtin_compose_table.data = (guint16 *) g_bytes_get_data (bytes, NULL);\n  113 |   g_bytes_unref (bytes);\n  114 | \n  115 |   bytes = g_resources_lookup_data (\"/org/gtk/libgtk/compose/chars\", 0, NULL);\n  116 |   builtin_compose_table.char_data = (char *) g_bytes_get_data (bytes, NULL);\n  117 |   g_bytes_unref (bytes);\n  118 | }"}]},{"id":"UAF_10","type":"use_after_free","type_label":"Use After Free","severity":"low","description":"On Windows, get_win32_all_locales_scripts() inserts the same heap-allocated `langname` pointer into the language hash table under multiple distinct keys (the localized locale name, plus the ISO-639-2 and ISO-639-3 abbreviations). The hash table created in languages_init() uses g_free as its value-destroy function (g_hash_table_new_full (NULL, NULL, NULL, g_free)). If the table is ever destroyed, or if an existing key/value is ever replaced, the shared `langname` pointer would be freed more than once (double free). Currently language_map is a never-freed process singleton and keys are checked for existence before insert, so the bug is latent, but the ownership is unsafe.","fix":"g_strdup() langname for each additional key insertion so each hash-table value is independently owned (matching the non-Windows path which g_strdup()s display_name for every insert).","locations":[{"ref":"gtk/language-names.c:60-91","code":"   60 |   langname = g_utf16_to_utf8 (langname_w, -1, NULL, NULL, NULL);\n   61 |   locale = g_utf16_to_utf8 (locale_w, -1, NULL, NULL, NULL);\n   62 |   lang = pango_language_from_string (locale);\n   63 |   if (g_hash_table_lookup (ht_scripts_langs, lang) == NULL)\n   64 |     g_hash_table_insert (ht_scripts_langs, lang, langname);\n   65 | \n   66 |   /*\n   67 |    * Track 3+-letter ISO639-2/3 language codes as well (these have a max length of 9 including terminating NUL)\n   68 |    * ISO639-2: iso639_lctypes[0] = LOCALE_SISO639LANGNAME\n   69 |    * ISO639-3: iso639_lctypes[1] = LOCALE_SISO639LANGNAME2\n   70 |    */\n   71 |   for (i = 0; i < 2; i++)\n   72 |     {\n   73 |       locale_abbrev_size = GetLocaleInfoEx (locale_w, iso639_lctypes[i], locale_abbrev_w, 0);\n   74 |       if (locale_abbrev_size > 0)\n   75 |         {\n   76 |           GetLocaleInfoEx (locale_w, iso639_lctypes[i], locale_abbrev_w, locale_abbrev_size);\n   77 | \n   78 |           locale_abbrev = g_utf16_to_utf8 (locale_abbrev_w, -1, NULL, NULL, NULL);\n   79 |           lang = pango_language_from_string (locale_abbrev);\n   80 |           if (g_hash_table_lookup (ht_scripts_langs, lang) == NULL)\n   81 |             g_hash_table_insert (ht_scripts_langs, lang, langname);\n   82 | \n   83 |           g_free (locale_abbrev);\n   84 |         }\n   85 |     }\n   86 | \n   87 |   g_free (locale);\n   88 |   g_free (langname_w);\n   89 | \n   90 |   return TRUE;\n   91 | }"},{"ref":"gtk/language-names.c:307","code":"  307 |   language_map = g_hash_table_new_full (NULL, NULL, NULL, g_free);"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","description":"gsk_arithmetic_node_new() leaks the freshly-allocated node when the color state is unsupported. self/node is allocated at line 343 (gsk_render_node_alloc), but the non-default-color-state check at lines 346-350 returns NULL without freeing node and without having taken the child/color refs yet. The allocated GskRenderNode is leaked. The check should be performed BEFORE allocation (like (text_ctx);\n 2096 |             return;\n 2097 |           }\n 2098 |         layout = gtk_text_get_layout (text);\n 2099 | \n 2100 |         anchor =\n 2101 |           text_position_to_usv_offset (&text_accesskit_ctx->single_text_layout,\n 2102 |                                        layout, &selection->anchor);\n 2103 |         if (anchor == -1)\n 2104 |           return;\n 2105 |         focus =\n 2106 |           text_position_to_usv_offset (&text_accesskit_ctx->single_text_layout,\n 2107 |                                        layout, &selection->focus);\n 2108 |         if (focus == -1)\n 2109 |           return;\n 2110 | \n 2111 |         if (anchor == focus)\n 2112 |           gtk_editable_set_position (editable, focus);\n 2113 |         else if (anchor > focus)\n 2114 |           gtk_editable_select_region (editable, focus, anchor);\n 2115 |         else\n 2116 |           gtk_editable_select_region (editable, anchor, focus);\n 2117 | \n 2118 |         g_object_unref (text_ctx);"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"In gdk_load_png, if gdk_png_get_color_state returns NULL the function does `return NULL;` without calling png_destroy_read_struct(&png, &info, NULL), leaking the libpng read struct and info struct (and the longjmp buffer is not the one taken here). Every other early-return in this function destroys the png struct; this one does not.","fix":"Call png_destroy_read_struct (&png, &info, NULL); before returning NULL when color_state is NULL.","locations":[{"ref":"gdk/loaders/gdkpng.c:444-446","code":"  444 |   color_state = gdk_png_get_color_state (png, info, error);\n  445 |   if (color_state == NULL)\n  446 |     return NULL;"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"AT-SPI Text \"GetCharacterAtOffset\" leaks the GBytes returned by\ngtk_accessible_text_get_contents(). The returned `text` GBytes is used to extract a\ngunichar L);\n  243 |   g_object_unref (task);\n  244 | }"}]},{"id":"MEM_11","type":"memory_leak","type_label":"Memory Leak","severity":"medium","description":"gtk_print_backend_cups_set_password() g_strdup()s `username`, `hostname` and\n`password` from auth_info at the top, but never frees them before returning. The\npassword copy in particular is leaked without being zeroed. (cups_backend->username\ngets its own separate strdup, so the local `username` is also leaked.)","fix":"Free the three locals before return: g_free (username); g_free (hostname); and\nfor the password use overwrite_and_free()/memset+g_free to avoid leaving the\nsecret in freed heap memory.","locations":[{"ref":"gtk/print/backends/gtkprintbackendcups.c:1038-1108","code":" 1038 |   char *username = NULL;\n 1039 |   char *hostname = NULL;\n 1040 |   char *password = NULL;\n 1041 |   int    length;\n 1042 |   int    i;\n 1043 | \n 1044 |   length = g_strv_length (auth_info_required);\n 1045 | \n 1046 |   if (auth_info != NULL)\n 1047 |     for (i = 0; i < length; i++)\n 1048 |       {\n 1049 |         if (g_strcmp0 (auth_info_required[i], \"username\") == 0)\n 1050 |           username = g_strdup (auth_info[i]);\n 1051 |         else if (g_strcmp0 (auth_info_required[i], \"hostname\") == 0)\n 1052 |           hostname = g_strdup (auth_info[i]);\n 1053 |         else if (g_strcmp0 (auth_info_required[i], \"password\") == 0)\n 1054 |           password = g_strdup (auth_info[i]);\n 1055 |       }\n 1056 | \n 1057 |   if (hostname != NULL && username != NULL && password != NULL)\n 1058 |     {\n 1059 |       char *key = g_strconcat (username, \"@\", hostname, NULL);\n 1060 |       g_hash_table_insert (cups_backend->auth, key, g_strdup (password));\n 1061 |       GTK_DEBUG (PRINTING, \"CUPS backend: caching password for %s\", key);\n 1062 |     }\n 1063 | \n 1064 |   g_free (cups_backend->username);\n 1065 |   cups_backend->username = g_strdup (username);\n 1066 | \n 1067 | \n 1068 |   for (l = cups_backend->requests; l; l = l->next)\n 1069 |     {\n 1070 |       GtkPrintCupsDispatchWatch *dispatch = l->data;\n 1071 | \n 1072 |       httpGetHostname (dispatch->request->http, dispatch_hostname, sizeof (dispatch_hostname));\n 1073 |       if (is_address_local (dispatch_hostname))\n 1074 |         g_strlcpy (dispatch_hostname, \"localhost\", sizeof (dispatch_hostname));\n 1075 | \n 1076 |       if (dispatch->request->need_auth_info)\n 1077 |         {\n 1078 |           if (auth_info != NULL)\n 1079 |             {\n 1080 |               dispatch->request->auth_info = g_new0 (char *, length + 1);\n 1081 |               for (i = 0; i < length; i++)\n 1082 |                 dispatch->request->auth_info[i] = g_strdup (auth_info[i]);\n 1083 |             }\n 1084 |           /* Save the password if the user requested it */\n 1085 |           if (password != NULL && store_auth_info)\n 1086 |             {\n 1087 |               const char *printer_uri =\n 1088 |                   gtk_cups_request_ipp_get_string (dispatch->request,\n 1089 |                                                    IPP_TAG_URI,\n 1090 |                                                    \"printer-uri\");\n 1091 | \n 1092 |               gtk_cups_secrets_service_store (auth_info, auth_info_required,\n 1093 |                                               printer_uri);\n 1094 |             }\n 1095 |           dispatch->backend->authentication_lock = FALSE;\n 1096 |           dispatch->request->need_auth_info = FALSE;\n 1097 |         }\n 1098 |       else if (dispatch->request->password_state == GTK_CUPS_PASSWORD_REQUESTED || auth_info == NULL)\n 1099 |         {\n 1100 |           overwrite_and_free (dispatch->request->password);\n 1101 |           dispatch->request->password = g_strdup (password);\n 1102 |           g_free (dispatch->request->username);\n 1103 |           dispatch->request->username = g_strdup (username);\n 1104 |           dispatch->request->password_state = GTK_CUPS_PASSWORD_HAS;\n 1105 |           dispatch->backend->authentication_lock = FALSE;\n 1106 |         }\n 1107 |     }\n 1108 | }"}]},{"id":"MEM_12","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In parse_requires(), the condition `if (!(split = g_strsplit (version, \".\", 2)) || !split[0] || !split[1])` returns early on malformed version strings without freeing `split`. g_strsplit() never returns NULL, so when the value is e.g. \"4\" (split[1] == NULL), the error branch leaks the allocated `split` array (it is only g_strfreev'd on the success path).","fix":"Free `split` before returning in the error branch, e.g. assign split first, then `if (!split[0] || !split[1]) { g_strfreev (split); g_set_error (...); return; }`.","locations":[{"ref":"gtk/gtkbuilderparser.c:517-528","code":"  517 |   if (!(split = g_strsplit (version, \".\", 2)) || !split[0] || !split[1])\n  518 |     {\n  519 |       g_set_error (error,\n  520 |                    GTK_BUILDER_ERROR,\n  521 |                    GTK_BUILDER_ERROR_INVALID_VALUE,\n  522 |                    \"'version' attribute has malformed value '%s'\", version);\n  523 |       _gtk_builder_prefix_error (data->builder, &data->ctx, error);\n  524 |       return;\n  525 |     }\n  526 |   version_major = g_ascii_strtoll (split[0], NULL, 10);\n  527 |   version_minor = g_ascii_strtoll (split[1], NULL, 10);\n  528 |   g_strfreev (split);"}]},{"id":"MEM_13","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In gtk_css_image_conic_transition(), the 'fail' cleanup path when a stop's color transition returns NULL unrefs stop->offset but not stop->transition_hint. Since result->n_stops was not yet incremented for this partially-built stop, the subsequent g_object_unref(result)/dispose loop only frees stops [0, n_stops), so the transition_hint value allocated for the current failing stop leaks.","fix":"In the color==NULL failure branch, also unref stop->transition_hint (if non-NULL) before goto fail, or restructure so all of the current stop's allocated GtkCssValues are released.","locations":[{"ref":"gtk/gtkcssimageconic.c:492-501","code":"  492 |       stop->color = gtk_css_value_transition (start_stop->color,\n  493 |                                               end_stop->color,\n  494 |                                               property_id,\n  495 |                                               progress);\n  496 |       if (stop->color == NULL)\n  497 |         {\n  498 |           if (stop->offset)\n  499 |             gtk_css_value_unref (stop->offset);\n  500 |           goto fail;\n  501 |         }"}]},{"id":"MEM_14","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"gtk_filter_default_watch() stores the caller-supplied GDestroyNotify in data->destroy, but it is never invoked: expression_watch_cb() does not call it, and gtk_filter_default_unwatch() frees the ExpressionWatchData struct (and the expression watch) without ever calling data->destroy(data->user_data). Any caller of gtk_filter_watch() that passes a non-NULL destroy for owned user_data will leak that data. GTK's own callers currently pass NULL, so this is a latent leak in the public-ish watch vfunc contract.","fix":"In gtk_filter_default_unwatch(), call data->destroy(data->user_data) (if non-NULL) before g_free(data); or pass data->destroy through to gtk_expression_watch and drop it from ExpressionWatchData.","locations":[{"ref":"gtk/gtkfilter.c:94-108","code":"   94 |       data = g_new0 (ExpressionWatchData, 1);\n   95 |       data->item = item;\n   96 |       data->callback = callback;\n   97 |       data->user_data = user_data;\n   98 |       data->destroy = destroy;\n   99 |       data->watch = gtk_expression_watch (expression,\n  100 |                                           item,\n  101 |                                           expression_watch_cb,\n  102 |                                           data,\n  103 |                                           NULL);\n  104 | \n  105 |       gtk_expression_unref (expression);\n  106 | \n  107 |       return g_steal_pointer (&data);\n  108 |     }"},{"ref":"gtk/gtkfilter.c:113-120","code":"  113 | static void\n  114 | gtk_filter_default_unwatch (GtkFilter *filter,\n  115 |                             gpointer   watch)\n  116 | {\n  117 |   ExpressionWatchData *data = (ExpressionWatchData *) watch;\n  118 |   g_clear_pointer (&data->watch, gtk_expression_watch_unwatch);\n  119 |   g_free (data);\n  120 | }"}]},{"id":"MEM_15","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"gtk_css_style_snapshot_outline() leaks the GdkColor's color state when the outline width rounds to zero. `color` is initialized via gtk_css_color_to_color() (which refs a GdkColorState), and the early `if (gdk_color_is_clear(&color))` path correctly calls gdk_color_finish() before returning, but the subsequent `if (G_APPROX_VALUE (border_width[0], 0, FLT_EPSILON)) return;` returns without calling gdk_color_finish(&color), leaking a GdkColorState ref (non-SRGB color states actually leak; SRGB is a singleton).","fix":"Call gdk_color_finish (&color); before the `return;` on the zero-width path (or restructure so the finish at the end of the function is always reached).","locations":[{"ref":"gtk/gtkrenderborder.c:769-772","code":"  769 |       border_width[0] = gtk_css_number_value_get (style->outline->outline_width, 100);\n  770 | \n  771 |       if (G_APPROX_VALUE (border_width[0], 0, FLT_EPSILON))\n  772 |         return;"}]},{"id":"MEM_16","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"snapshot_insertion_cursor() initializes a GdkColor via gtk_css_color_to_color() (taking a ref on a GdkColorState) but never calls gdk_color_finish() on it in either the cairo branch or the add-color branch. This leaks a GdkColorState reference on every caret draw (real leak for non-SRGB color states).","fix":"Add gdk_color_finish (&color); before the function returns (after the if/else that consumes the color).","locations":[{"ref":"gtk/gtkrenderlayout.c:241-277","code":"  241 |   GdkColor color;\n  242 | \n  243 |   gtk_css_color_to_color (is_primary\n  244 |                             ? gtk_css_color_value_get_color (style->used->caret_color)\n  245 |                             : gtk_css_color_value_get_color (style->used->secondary_caret_color),\n  246 |                           &color);\n  247 | \n  248 |   if (width != 0 || draw_arrow)\n  249 |     {\n  250 |       cairo_t *cr;\n  251 |       graphene_rect_t bounds;\n  252 | \n  253 |       get_insertion_cursor_bounds (width, height, aspect_ratio, direction, draw_arrow, &bounds);\n  254 |       cr = gtk_snapshot_append_cairo (snapshot, &bounds);\n  255 | \n  256 |       draw_insertion_cursor (cr, 0, 0, width, height, aspect_ratio, &color, direction, draw_arrow);\n  257 | \n  258 |       cairo_destroy (cr);\n  259 |     }\n  260 |   else\n  261 |     {\n  262 |       int stem_width;\n  263 |       int offset;\n  264 | \n  265 |       stem_width = height * aspect_ratio + 1;\n  266 | \n  267 |       /* put (stem_width % 2) on the proper side of the cursor */\n  268 |       if (direction == PANGO_DIRECTION_LTR)\n  269 |         offset = stem_width / 2;\n  270 |       else\n  271 |         offset = stem_width - stem_width / 2;\n  272 | \n  273 |       gtk_snapshot_add_color (snapshot,\n  274 |                               &color,\n  275 |                               &GRAPHENE_RECT_INIT (- offset, 0, stem_width, height));\n  276 |     }\n  277 | }"}]},{"id":"MEM_17","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"gtk_settings_load_from_key_file() leaks the per-key GValue on a parse error. In the per-key loop, svalue.value is always g_value_init()'d for the property type before reading the value. When reading fails and `error` is set, the code warns and g_clear_error()s but does not call g_value_unset(&svalue.value); the unset only happens on the success path. Every malformed key in a settings.ini leaks one initialized GValue (e.g. a boxed GString).","fix":"Call g_value_unset (&svalue.value); in the error branch as well (or unconditionally after the if/else, before the next iteration).","locations":[{"ref":"gtk/gtksettings.c:1905-1927","code":" 1905 |       if (error)\n 1906 |         {\n 1907 |           g_warning (\"Error setting %s in %s: %s\", key, path, error->message);\n 1908 |           g_clear_error (&error);\n 1909 |         }\n 1910 |       else\n 1911 |         {\n 1912 |           GValue *copy;\n 1913 | \n 1914 |           copy = g_new0 (GValue, 1);\n 1915 | \n 1916 |           g_value_init (copy, G_VALUE_TYPE (&svalue.value));\n 1917 |           g_value_copy (&svalue.value, copy);\n 1918 | \n 1919 |           g_param_spec_set_qdata_full (pspec, g_quark_from_string (key),\n 1920 |                                        copy, gvalue_free);\n 1921 | \n 1922 |           if (g_getenv (\"GTK_DEBUG\"))\n 1923 |             svalue.origin = (char *)path;\n 1924 | \n 1925 |           gtk_settings_set_property_value_internal (settings, key, &svalue, source);\n 1926 |           g_value_unset (&svalue.value);\n 1927 |         }"}]},{"id":"MEM_18","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"gtk_string_filter_match() leaks the evaluated GValue when the prepared search string is empty. After gtk_expression_evaluate() fills `value` and `gtk_string_filter_prepare()` returns NULL (empty/NULL source string), the function does `return FALSE;` without calling g_value_unset(&value). The GValue holds a string copy from the expression evaluation, so this leaks on every non-matching empty cell.","fix":"Call g_value_unset (&value); before the `return FALSE;` on the prepared==NULL path.","locations":[{"ref":"gtk/gtkstringfilter.c:115-118","code":"  115 |   s = g_value_get_string (&value);\n  116 |   prepared = gtk_string_filter_prepare (self, s);\n  117 |   if (prepared == NULL)\n  118 |     return FALSE;"}]},{"id":"MEM_19","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"In _gtk_text_attributes_fill_from_tags(), when a tag has font_features_set, dest->font_features is overwritten with a freshly g_strdup()'d string without freeing the previous value first:\n\n    if (tag->priv->font_features_set)\n      dest->font_features = g_strdup (vals->font_features);\n\nIf more than one tag in the `tags` array sets font-features (or if `dest` already carried a font_features string from a default style), the previously allocated string is leaked. Every other string/boxed field in this function (tabs, font, *_rgba, pg_bg_rgba) is correctly freed/replaced before assignment; font_features is the only one that just overwrites the pointer.","fix":"Free the existing value before assigning, e.g.:\n    if (tag->priv->font_features_set)\n      {\n        g_free (dest->font_features);\n        dest->font_features = g_strdup (vals->font_features);\n      }","locations":[{"ref":"gtk/gtktextattributes.c:430-431","code":"  430 |       if (tag->priv->font_features_set)\n  431 |         dest->font_features = g_strdup (vals->font_features);"}]},{"id":"MEM_20","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"property_editor() passes a freshly allocated g_strdup_printf() string as the value argument to gtk_accessible_update_property(GTK_ACCESSIBLE_PROPERTY_LABEL, ...). That function collects the string into an accessible value without taking ownership, so the allocated string is leaked on every property editor creation.","fix":"Store the printf result in a temporary char*, pass it to gtk_accessible_update_property, then g_free it.","locations":[{"ref":"gtk/inspector/prop-editor.c:1434-1439","code":" 1434 |       gtk_accessible_update_property (GTK_ACCESSIBLE (prop_edit),\n 1435 |                                       GTK_ACCESSIBLE_PROPERTY_LABEL,\n 1436 |                                       g_strdup_printf (\"%s: %s\",\n 1437 |                                                        self->name,\n 1438 |                                                        gtk_label_get_text (GTK_LABEL (prop_edit))),\n 1439 |                                       -1);"}]},{"id":"MEM_21","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"add_string() passes a g_strdup_printf() result directly to gtk_accessible_update_property(GTK_ACCESSIBLE_PROPERTY_LABEL, ...), which does not take ownership of the string. The allocated 'Remove %s' label string is leaked each time a strv entry is added.","fix":"Capture the string in a temporary, pass it, then g_free it.","locations":[{"ref":"gtk/inspector/strv-editor.c:81-84","code":"   81 |   gtk_accessible_update_property (GTK_ACCESSIBLE (button),\n   82 |                                   GTK_ACCESSIBLE_PROPERTY_LABEL,\n   83 |                                   g_strdup_printf (_(\"Remove %s\"), str),\n   84 |                                   -1);"}]},{"id":"MEM_22","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"create_item_cb(): on the failure branch (item == NULL or strlen(item) <= 1) the\ncode unrefs `output` but never calls g_task_return_* nor g_object_unref(task).\nThe GTask is leaked and the caller's callback is never invoked, so the operation\nsilently hangs/leaks.","fix":"In the else/fall-through case, also report a result and drop the task:\n    g_variant_unref (output);\n    g_task_return_pointer (task, NULL, NULL);\n    g_object_unref (task);","locations":[{"ref":"gtk/print/backends/gtkcupssecretsutils.c:268-277","code":"  268 |   g_variant_get (output, \"(&o&o)\", &item, NULL);\n  269 |   if (item != NULL && strlen (item) > 1)\n  270 |     {\n  271 |       GTK_DEBUG (PRINTING, \"Successfully stored auth info.\");\n  272 |       g_task_return_pointer (task, NULL, NULL);\n  273 |       g_object_unref (task);\n  274 |       return;\n  275 |     }\n  276 |   g_variant_unref (output);\n  277 | }"}]},{"id":"MEM_23","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"localtime_to_utctime() allocates two struct tm copies via g_memdup2() (from\ngmtime()/localtime()) into actual_utc_time / actual_local_time and never frees\nthem. Leaks two structs each time a printer's print-time is converted.","fix":"g_free (actual_utc_time); g_free (actual_local_time); before returning.","locations":[{"ref":"gtk/print/backends/gtkprintbackendutils.c:74-89","code":"   74 |       actual_utc_time = g_memdup2 (gmtime (&rawtime), sizeof (struct tm));\n   75 |       actual_local_time = g_memdup2 (localtime (&rawtime), sizeof (struct tm));\n   76 | \n   77 |       diff_time.tm_hour = actual_utc_time->tm_hour - actual_local_time->tm_hour;\n   78 |       diff_time.tm_min  = actual_utc_time->tm_min  - actual_local_time->tm_min;\n   79 |       diff_time.tm_sec  = actual_utc_time->tm_sec  - actual_local_time->tm_sec;\n   80 | \n   81 |       utc_print_time.tm_hour = ((local_print_time.tm_hour + diff_time.tm_hour) + 24) % 24;\n   82 |       utc_print_time.tm_min  = ((local_print_time.tm_min  + diff_time.tm_min)  + 60) % 60;\n   83 |       utc_print_time.tm_sec  = ((local_print_time.tm_sec  + diff_time.tm_sec)  + 60) % 60;\n   84 | \n   85 |       utc_time = g_strdup_printf (\"%02d:%02d:%02d\",\n   86 |                                   utc_print_time.tm_hour,\n   87 |                                   utc_print_time.tm_min,\n   88 |                                   utc_print_time.tm_sec);\n   89 |     }"}]},{"id":"MEM_24","type":"memory_leak","type_label":"Memory Leak","severity":"low","description":"gtk_printer_option_allocate_choices() frees the choices/choices_display arrays\nbut not the individual strings they point to before reallocating. If called a\nsecond time on an option that already has populated choices (e.g. via\ngtk_printer_option_choices_from_array), every previously duplicated choice and\nchoice-display string is leaked. finalize() only frees num_choices strings of the\n*current* arrays.","fix":"Before freeing the arrays, loop i in [0, num_choices) freeing choices[i] and\nchoices_display[i], then free the arrays.","locations":[{"ref":"gtk/print/gtkprinteroption.c:226-244","code":"  226 | void\n  227 | gtk_printer_option_allocate_choices (GtkPrinterOption     *option,\n  228 | \t\t\t\t     int num)\n  229 | {\n  230 |   g_free (option->choices);\n  231 |   g_free (option->choices_display);\n  232 | \n  233 |   option->num_choices = num;\n  234 |   if (num == 0)\n  235 |     {\n  236 |       option->choices = NULL;\n  237 |       option->choices_display = NULL;\n  238 |     }\n  239 |   else\n  240 |     {\n  241 |       option->choices = g_new0 (char *, num);\n  242 |       option->choices_display = g_new0 (char *, num);\n  243 |     }\n  244 | }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"gdk_wayland_clipboard_claim_remote() leaks the incoming wl_data_offer proxy when we currently own the selection locally (cb->source != NULL). In that branch it unrefs the formats and returns, but never destroys `offer`, so the wl_data_offer Wayland proxy is leaked. The analogous primary-selection code path (gdk_wayland_primary_claim_remote in gdkprimary-wayland.c:100-106) correctly does `g_clear_pointer (&offer, zwp_primary_selection_offer_v1_destroy);` in the same situation, confirming this is an omission. This leaks one proxy on every selection notification received while a local clipboard claim is active.","fix":"Destroy the offer before returning:\n  if (cb->source)\n    {\n      GDK_DISPLAY_DEBUG (...);\n      gdk_content_formats_unref (formats);\n      g_clear_pointer (&offer, wl_data_offer_destroy);\n      return;\n    }","locations":[{"ref":"gdk/wayland/gdkclipboard-wayland.c:323-329","code":"  323 |   if (cb->source)\n  324 |     {\n  325 |       GDK_DISPLAY_DEBUG (gdk_clipboard_get_display (GDK_CLIPBOARD (cb)), CLIPBOARD,\n  326 |                          \"%p: Ignoring clipboard offer for self\", cb);\n  327 |       gdk_content_formats_unref (formats);\n  328 |       return;\n  329 |     }"},{"ref":"gdk/wayland/gdkprimary-wayland.c:100-106","code":"  100 |   if (cb->source)\n  101 |     {\n  102 |       GDK_DISPLAY_DEBUG (gdk_clipboard_get_display (GDK_CLIPBOARD (cb)), CLIPBOARD, \"%p: Ignoring primary offer for self\", cb);\n  103 |       gdk_content_formats_unref (formats);\n  104 |       g_clear_pointer (&offer, zwp_primary_selection_offer_v1_destroy);\n  105 |       return;\n  106 |     }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In the 'gtk-xft-dpi' branch of gdk_win32_get_setting(), GetDC(NULL) is called twice: once stored in `hdc` (released later) and a second time inline as the argument to GetDeviceCaps(GetDC(NULL), LOGPIXELSX). The second screen DC is never released with ReleaseDC, leaking a common HDC every time this setting is queried. Almost certainly a copy-paste mistake; the already-acquired `hdc` should be passed to GetDeviceCaps.","fix":"Pass the existing `hdc` to GetDeviceCaps: `int dpi = GetDeviceCaps (hdc, LOGPIXELSX);`","locations":[{"ref":"gdk/win32/gdkwin32misc.c:465-470","code":"  465 |           HDC hdc = GetDC (NULL);\n  466 | \n  467 |           if (hdc != NULL)\n  468 |             {\n  469 |               int dpi = GetDeviceCaps (GetDC (NULL), LOGPIXELSX);\n  470 |               ReleaseDC (NULL, hdc);"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"gsk_gl_pipeline_load_program() leaks the vertex shader GL object on the\nfragment-shader-failure error path. After vertex_shader_id is created\nsuccessfully (non-zero), if fragment_shader_id == 0 the function does\n`return 0;` without calling glDeleteShader(vertex_shader_id). This leaks a GL\nshader object every time fragment compilation fails (e.g. a broken/edited\nfragment shader). The success path correctly detaches+deletes both shaders.","fix":"Before returning 0 on fragment failure, delete the vertex shader:\n  fragment_shader_id = gsk_gl_pipeline_load_shader (...);\n  if (fragment_shader_id == 0)\n    {\n      glDeleteShader (vertex_shader_id);\n      return 0;\n    }","locations":[{"ref":"gsk/gpu/gskglpipeline.c:305-311","code":"  305 |   vertex_shader_id = gsk_gl_pipeline_load_shader (device, op_class->shader_name, GL_VERTEX_SHADER, flags, color_states, variation, error);\n  306 |   if (vertex_shader_id == 0)\n  307 |     return 0;\n  308 | \n  309 |   fragment_shader_id = gsk_gl_pipeline_load_shader (device, op_class->shader_name, GL_FRAGMENT_SHADER, flags, color_states, variation, error);\n  310 |   if (fragment_shader_id == 0)\n  311 |     return 0;"}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"gtk_gst_sink_texture_from_buffer(): in the dmabuf branch, when\ngst_buffer_find_memory() fails inside the plane loop, the function does\n`return NULL` without unref'ing the already-created GdkDmabufTextureBuilder\n`builder`. The builder (and the gst_buffer_ref it would have consumed is not yet\ntaken, but the builder object) leaks on every malformed dmabuf buffer.","fix":"Before `return NULL` in the gst_buffer_find_memory() failure case, unref the\nbuilder: g_object_unref (builder); (and ensure no double free of `frame`, which\nwas already cleared earlier in this branch).","locations":[{"ref":"gtk/media/gtkgstsink.c:664-688","code":"  664 |       builder = gdk_dmabuf_texture_builder_new ();\n  665 |       gdk_dmabuf_texture_builder_set_display (builder, self->gdk_display);\n  666 |       gdk_dmabuf_texture_builder_set_fourcc (builder, self->drm_info.drm_fourcc);\n  667 |       gdk_dmabuf_texture_builder_set_modifier (builder, self->drm_info.drm_modifier);\n  668 |       gdk_dmabuf_texture_builder_set_width (builder, ROUND_UP_WIDTH (&self->v_info, vmeta->width));\n  669 |       gdk_dmabuf_texture_builder_set_height (builder, ROUND_UP_HEIGHT (&self->v_info, vmeta->height));\n  670 |       gdk_dmabuf_texture_builder_set_n_planes (builder, vmeta->n_planes);\n  671 |       gdk_dmabuf_texture_builder_set_color_state (builder, self->color_state);\n  672 |       gdk_dmabuf_texture_builder_set_premultiplied (builder, GST_VIDEO_INFO_FLAGS (&self->v_info) & GST_VIDEO_FLAG_PREMULTIPLIED_ALPHA);\n  673 | \n  674 |       for (i = 0; i < vmeta->n_planes; i++)\n  675 |         {\n  676 |           guint mem_idx, length;\n  677 |           gsize skip;\n  678 | \n  679 |           if (!gst_buffer_find_memory (buffer,\n  680 |                                        vmeta->offset[i],\n  681 |                                        1,\n  682 |                                        &mem_idx,\n  683 |                                        &length,\n  684 |                                        &skip))\n  685 |             {\n  686 |               GST_ERROR_OBJECT (self, \"Buffer data is bogus\");\n  687 |               return NULL;\n  688 |             }"}]},{"id":"RES_5","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"gtk_css_variable_value_set_section() assigns a new ref'd section into\nself->section without unref'ing any section already stored there. If called more\nthan once on the same value, the previous GtkCssSection ref leaks.","fix":"Use g_clear_pointer (&self->section, gtk_css_section_unref) before assigning, or gtk_css_section_ref the new one into a temp and swap.","locations":[{"ref":"gtk/css/gtkcssvariablevalue.c:147-152","code":"  147 | void\n  148 | gtk_css_variable_value_set_section (GtkCssVariableValue *self,\n  149 |                                     GtkCssSection       *section)\n  150 | {\n  151 |   self->section = gtk_css_section_ref (section);\n  152 | }"}]},{"id":"RES_6","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In list_store_end_element handling of the <columns> end tag, the loop that resolves type names frees each `l->data` (the strdup'd type name) only on the success path; when gtk_builder_get_type_from_name returns G_TYPE_INVALID the code `continue`s without g_free(l->data), and the surrounding code only g_slist_free()s the list spine (in custom_tag_end) without freeing remaining elements. Each unknown column type name in a .ui file therefore leaks a string. Also note `i` is used after the loop as the column count passed to set_column_types even though invalid entries were skipped, so an invalid type silently shifts subsequent columns.","fix":"g_free (l->data) before `continue` on the G_TYPE_INVALID branch (or g_slist_free_full the list with g_free in custom_tag_end). Consider erroring out rather than silently skipping an invalid column type to avoid column index shifting.","locations":[{"ref":"gtk/deprecated/gtkliststore.c:2569-2584","code":" 2569 |       for (l = data->column_type_names, i = 0; l; l = l->next, i++)\n 2570 |         {\n 2571 |           type = gtk_builder_get_type_from_name (data->builder, l->data);\n 2572 |           if (type == G_TYPE_INVALID)\n 2573 |             {\n 2574 |               g_warning (\"Unknown type %s specified in treemodel %s\",\n 2575 |                          (const char *)l->data,\n 2576 |                          gtk_buildable_get_buildable_id (GTK_BUILDABLE (data->object)));\n 2577 |               continue;\n 2578 |             }\n 2579 |           column_types[i] = type;\n 2580 | \n 2581 |           g_free (l->data);\n 2582 |         }\n 2583 | \n 2584 |       gtk_list_store_set_column_types (GTK_LIST_STORE (data->object), i, column_types);"},{"ref":"gtk/deprecated/gtkliststore.c:2706-2710","code":" 2706 |   if (strcmp (tagname, \"columns\") == 0)\n 2707 |     {\n 2708 |       g_slist_free (data->column_type_names);\n 2709 |       g_slice_free (SubParserData, data);\n 2710 |     }"}]},{"id":"RES_7","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"The convert
