lor));\n  403 |   for (int i = 0; i < 4; i++)\n  404 |     gdk_color_init_copy (&self->border_color[i], &border_color[i]);"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"Duplicated statement: _graphene_rect_init_from_clip_extents(&clip_rect, cr) is called twice in a row in gsk_outset_shadow_node_draw(). The first call is redundant (the second immediately overwrites clip_rect with the same data). Harmless but clearly a copy/paste slip (note the irregular leading whitespace on the first line).","fix":"Delete the duplicate line 94, keeping a single _graphene_rect_init_from_clip_extents(&clip_rect, cr) call.","locations":[{"ref":"gsk/gskoutsetshadownode.c:94-95","code":"   94 |    _graphene_rect_init_from_clip_extents (&clip_rect, cr);\n   95 |   _graphene_rect_init_from_clip_extents (&clip_rect, cr);"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"low","description":"GtkListStorePrivate maintains a `length` field that is incremented on every insert (gtk_list_store_insert, insert_with_values, insert_with_valuesv) and decremented on remove, but it is never read anywhere: all length queries go through g_sequence_get_length(priv->seq). The field is therefore dead state that must be kept in sync for no benefit, and a missed update would be an undetectable latent bug. Either use it (e.g. in gtk_list_store_iter_n_children / reorder) or remove it.","fix":"Remove priv->length and its increments/decrements, or replace the g_sequence_get_length() calls with priv->length consistently.","locations":[{"ref":"gtk/deprecated/gtkliststore.c:194","code":"  194 |   int length;"},{"ref":"gtk/deprecated/gtkliststore.c:1314","code":" 1314 |   priv->length++;"},{"ref":"gtk/deprecated/gtkliststore.c:1250","code":" 1250 |   priv->length--;"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"low","description":"gtk_compose_table_load_cache() performs the same g_stat(compose_file,&original_buf)+mtime comparison twice in a row (lines 803-805 then 806-808). The second g_stat/compare is redundant duplicate code (the first used g_lstat, the second g_stat, but both compare the same fields against cache_buf); the duplication has no effect and looks like a copy-paste artifact.","fix":"Remove the duplicated g_stat + mtime comparison block, or consolidate into a single intentional check with error handling.","locations":[{"ref":"gtk/gtkcomposetable.c:803-808","code":"  803 |   g_lstat (compose_file, &original_buf);\n  804 |   if (original_buf.st_mtime > cache_buf.st_mtime)\n  805 |     goto out_load_cache;\n  806 |   g_stat (compose_file, &original_buf);\n  807 |   if (original_buf.st_mtime > cache_buf.st_mtime)\n  808 |     goto out_load_cache;"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"low","description":"gtk_media_file_get_extension() calls g_type_ensure() for GTK_TYPE_NO_MEDIA_FILE and GTK_TYPE_GST_MEDIA_FILE twice in a row. The first block (lines 195-197) is guarded by HAVE_MEDIA_GSTREAMER while the duplicate block (lines 203-205) is guarded by HAVE_GSTREAMER. The GTK_TYPE_NO_MEDIA_FILE ensure is plainly duplicated, and the two different macro names for the GStreamer ensure suggests a copy-paste/merge artifact: one of the two macro spellings is almost certainly wrong (only one is defined by the build), so this is confusing/dead code at best.","fix":"Remove the duplicated g_type_ensure() block and use the single correct config macro (HAVE_GSTREAMER per the #include guard at line 29) for the GStreamer type ensure.","locations":[{"ref":"gtk/gtkmediafile.c:193-205","code":"  193 |   g_type_ensure (GTK_TYPE_NO_MEDIA_FILE);\n  194 | \n  195 | #ifdef HAVE_MEDIA_GSTREAMER\n  196 |   g_type_ensure (GTK_TYPE_GST_MEDIA_FILE);\n  197 | #endif\n  198 | \n  199 |   GTK_DEBUG (MODULES, \"Looking up MediaFile extension\");\n  200 | \n  201 |   g_type_ensure (GTK_TYPE_NO_MEDIA_FILE);\n  202 | \n  203 | #ifdef HAVE_GSTREAMER\n  204 |   g_type_ensure (GTK_TYPE_GST_MEDIA_FILE);\n  205 | #endif"}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"low","description":"gtk_svg_widget_measure() computes the widget's minimum size from local variables min_width/min_height that are initialized to 0 and never modified, so *minimum is always reported as 0 regardless of orientation. The variables default_width/default_height are passed to gdk_paintable_compute_concrete_size() but the resulting nat_height (HORIZONTAL branch) and nat_width (VERTICAL branch) are computed and discarded. The code is confusing and the min_width/min_height variables are effectively dead: the minimum size is hard-coded to 0 via an indirection that looks like it intends to compute something.","fix":"Either drop the unused min_width/min_height locals and assign *minimum = 0 explicitly (documenting the intent), or actually compute a meaningful minimum. Also remove the unused nat_height/nat_width results from the wrong orientation.","locations":[{"ref":"gtk/gtksvgwidget.c:322-351","code":"  322 |   double default_width, default_height;\n  323 |   double min_width, min_height, nat_width, nat_height;\n  324 | \n  325 |   /* ? */\n  326 |   default_width = 16;\n  327 |   default_height = 16;\n  328 |   min_width = 0;\n  329 |   min_height = 0;\n  330 | \n  331 |   if (orientation == GTK_ORIENTATION_HORIZONTAL)\n  332 |     {\n  333 |       gdk_paintable_compute_concrete_size (GDK_PAINTABLE (self->svg),\n  334 |                                            0,\n  335 |                                            for_size < 0 ? 0 : for_size,\n  336 |                                            default_width, default_height,\n  337 |                                            &nat_width, &nat_height);\n  338 |       *minimum = ceil (min_width);\n  339 |       *natural = ceil (nat_width);\n  340 |     }\n  341 |   else\n  342 |     {\n  343 |       gdk_paintable_compute_concrete_size (GDK_PAINTABLE (self->svg),\n  344 |                                            for_size < 0 ? 0 : for_size,\n  345 |                                            0,\n  346 |                                            default_width, default_height,\n  347 |                                            &nat_width, &nat_height);\n  348 |       *minimum = ceil (min_height);\n  349 |       *natural = ceil (nat_height);\n  350 |     }\n  351 | }"}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"The `scale` argument to gtk_css_image_recolor_load() is computed in compute() (gtk_style_provider_get_scale) and passed in but never used inside gtk_css_image_recolor_load(). Either the scale is meant to affect loading and is a missing-feature bug, or the parameter is dead and should be removed.","fix":"Remove the unused scale parameter, or actually use it when loading the paintable at the requested scale.","locations":[{"ref":"gtk/gtkcssimagerecolor.c:144-186","code":"  144 | static GtkCssImage *\n  145 | gtk_css_image_recolor_load (GtkCssImageRecolor    *recolor,\n  146 |                             GtkCssComputeContext  *context,\n  147 |                             GtkCssValue           *palette,\n  148 |                             int                    scale,\n  149 |                             GError               **gerror)\n  150 | {\n  151 |   GError *local_error = NULL;\n  152 |   GtkCssImageRecolor *image;\n  153 | \n  154 |   image = g_object_new (GTK_TYPE_CSS_IMAGE_RECOLOR, NULL);\n  155 | \n  156 |   image->file = g_object_ref (recolor->file);\n  157 |   image->palette = gtk_css_value_ref (palette);\n  158 |   image->color = gtk_css_value_ref (context->style->core->color);\n  159 | \n  160 |   gtk_css_image_recolor_load_paintable (recolor, &local_error);\n  161 | \n  162 |   if (recolor->paintable)\n  163 |     {\n  164 |       image->paintable = g_object_ref (recolor->paintable);\n  165 |       image->width = recolor->width;\n  166 |       image->height = recolor->height;\n  dmabuf->n_planes - 1)\n  701 |                            * gdk_memory_format_get_plane_block_bytes (self->format, dmabuf->n_planes - 1);\n  702 | \n  703 |   return TRUE;\n  704 | }"},{"ref":"gdk/gdkdmabuf.c:131-208","code":"  131 | static gboolean\n  132 | gdk_dmabuf_do_download_mmap (GdkTexture            *texture,\n  133 |                              guchar                *data,\n  134 |                              const GdkMemoryLayout *layout,\n  135 |                              GdkColorState         *color_state)\n  136 | {\n  137 |   const GdkDmabuf *dmabuf;\n  138 |   GdkMemoryLayout dmabuf_layout;\n  139 |   const guchar *src_data[GDK_DMABUF_MAX_PLANES];\n  140 |   gsize sizes[GDK_DMABUF_MAX_PLANES];\n  141 |   gsize needs_unmap[GDK_DMABUF_MAX_PLANES] = { FALSE, };\n  142 |   gsize i, j;\n  143 |   gboolean retval = FALSE;\n  144 | \n  145 |   dmabuf = gdk_dmabuf_texture_get_dmabuf (GDK_DMABUF_TEXTURE (texture));\n  146 | \n  147 |   if (dmabuf->modifier != DRM_FORMAT_MOD_LINEAR)\n  148 |     return FALSE;\n  149 | \n  150 |   for (i = 0; i < dmabuf->n_planes; i++)\n  151 |     {\n  152 |       if (dmabuf->planes[i].fd == -1)\n  153 |         {\n  154 |           g_assert (i > 0);\n  155 |           src_data[i] = src_data[0];\n  156 |           sizes[i] = sizes[0];\n  157 |           continue;\n  158 |         }\n  159 | \n  160 |       for (j = 0; j < i; j++)\n  161 |         {\n  162 |           if (dmabuf->planes[i].fd == dmabuf->planes[j].fd)\n  163 |             break;\n  164 |         }\n  165 |       if (j < i)\n  166 |         {\n  167 |           src_data[i] = src_data[j];\n  168 |           sizes[i] = sizes[j];\n  169 |           continue;\n  170 |         }\n  171 | \n  172 |       src_data[i] = gdk_dmabuf_mmap (dmabuf->planes[i].fd, &sizes[i]);\n  173 |       if (src_data[i] == NULL)\n  174 |         goto out;\n  175 |       needs_unmap[i] = TRUE;\n  176 |     }\n  177 | \n  178 |   if (gdk_memory_layout_init_from_dmabuf (&dmabuf_layout,\n  179 |                                           dmabuf,\n  180 |                                           gdk_memory_format_alpha (gdk_texture_get_format (texture)) == GDK_MEMORY_ALPHA_PREMULTIPLIED,\n  181 |                                           gdk_texture_get_width (texture),\n  182 |                                           gdk_texture_get_height (texture)))\n  183 |     {\n  184 |       gdk_memory_convert (data,\n  185 |                           layout,\n  186 |                           gdk_texture_get_color_state (texture),\n  187 |                           src_data[0],\n  188 |                           &dmabuf_layout,\n  189 |                           gdk_texture_get_color_state (texture));\n  190 |       retval = TRUE;\n  191 |     }\n  192 | \n  193 |   GDK_DISPLAY_DEBUG (gdk_dmabuf_texture_get_display (GDK_DMABUF_TEXTURE (texture)), DMABUF,\n  194 |                      \"Used mmap for downloading %dx%d dmabuf (format %.4s:%#\" G_GINT64_MODIFIER \"x)\",\n  195 |                      gdk_texture_get_width (texture), gdk_texture_get_height (texture),\n  196 |                      (char *)&dmabuf->fourcc, dmabuf->modifier);\n  197 | \n  198 | out:\n  199 |   for (i = 0; i < dmabuf->n_planes; i++)\n  200 |     {\n  201 |       if (!needs_unmap[i])\n  202 |         continue;\n  203 | \n  204 |       gdk_dmabuf_munmap (dmabuf->planes[i].fd, src_data[i], sizes[i]);\n  205 |     }\n  206 | \n  207 |   return retval;\n  208 | }"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"high","description":"transmute_cf_text_to_utf8_string() treats CF_TEXT (single-byte ANSI text) as if it were 2-byte-per-char data. It computes the end pointer as `endp = ptr + length / 2`, which is the correct stride for CF_UNICODETEXT (wchar_t) but is wrong for CF_TEXT, where each character is a single byte. As a result only half of the clipboard text is ever processed/converted when pasting CF_TEXT data from another application. This is a copy-paste error from OffBits and bV5SizeImage against the available data length; bound the premultiply loop by the actual number of pixel bytes copied (`(data_length - bi->biSize) / 4`) rather than the header-declared bV5SizeImage.","locations":[{"ref":"gdk/win32/gdkclipdrop-win32.c:2231-2418","code":" 2231 | static void\n 2232 | transmute_cf_dib_to_image_bmp (const guchar    *data,\n 2233 |                                gsize            length,\n 2234 |                                guchar         **set_data,\n 2235 |                                gsize           *set_data_length,\n 2236 |                                GDestroyNotify  *set_data_destroy)\n 2237 | {\n 2238 |   /* Need to add a BMP file header so gdk-pixbuf can load\n 2239 |    * it.\n 2240 |    *\n 2241 |    * If the data is from Mozilla Firefox or IE7, and\n 2242 |    * starts with an \"old fashioned\" BITMAPINFOHEADER,\n 2243 |    * i.e. with biSize==40, and biCompression == BI_RGB and\n 2244 |    * biBitCount==32, we assume that the \"extra\" byte in\n 2245 |    * each pixel in fact is alpha.\n 2246 |    *\n 2247 |    * The gdk-pixbuf bmp loader doesn't trust 32-bit BI_RGB\n 2248 |    * bitmaps to in fact have alpha, so we have to convince\n 2249 |    * it by changing the bitmap header to a version 5\n 2250 |    * BI_BITFIELDS one with explicit alpha mask indicated.\n 2251 |    *\n 2252 |    * The RGB bytes that are in bitmaps on the clipboard\n 2253 |    * originating from Firefox or IE7 seem to be\n 2254 |    * premultiplied with alpha. The gdk-pixbuf bmp loader\n 2255 |    * of course doesn't expect that, so we have to undo the\n 2256 |    * premultiplication before feeding the bitmap to the\n 2257 |    * bmp loader.\n 2258 |    *\n 2259 |    * Note that for some reason the bmp loader used to want\n 2260 |    * the alpha bytes in its input to actually be\n 2261 |    * 255-alpha, but here we assume that this has been\n 2262 |    * fixed before this is committed.\n 2263 |    */\n 2264 |   BITMAPINFOHEADER *bi = (BITMAPINFOHEADER *) data;\n 2265 |   BITMAPFILEHEADER *bf;\n 2266 |   gpointer result;\n 2267 |   gsize data_length = length;\n 2268 |   gsize new_length;\n 2269 |   gboolean make_dibv5 = FALSE;\n 2270 |   BITMAPV5HEADER *bV5;\n 2271 |   guchar *p;\n 2272 |   guint i;\n 2273 |   guint palette_number_of_colors = 0;\n 2274 | \n 2275 |   /* Image has a palette if format is BI_RGB (0) and\n 2276 |    * bits per pixel is between 1 and 8.\n 2277 |    * If the image has a palette,\n 2278 |    * number of colors in the palette is either bi->biClrUsed,\n 2279 |    * or if that is zero, use 1 << bi->biBitCount instead.\n 2280 |    */\n 2281 |   if (bi->biCompression == BI_RGB &&\n 2282 |       bi->biBitCount >= 1 &&\n 2283 |       bi->biBitCount <= 8 &&\n 2284 |       bi->biClrUsed >= 0 &&\n 2285 |       bi->biClrUsed <= 256)\n 2286 |     {\n 2287 |       palette_number_of_colors = bi->biClrUsed;\n 2288 |       if (palette_number_of_colors == 0)\n 2289 |         {\n 2290 |           palette_number_of_colors = 1 << bi->biBitCount;\n 2291 |         }\n 2292 |     }\n 2293 | \n 2294 |   if (bi->biSize == sizeof (BITMAPINFOHEADER) &&\n 2295 |       bi->biPlanes == 1 &&\n 2296 |       bi->biBitCount == 32 &&\n 2297 |       bi->biCompression == BI_RGB &&\n 2298 | #if 0\n 2299 |       /* Maybe check explicitly for Mozilla or IE7?\n 2300 |        *\n 2301 |        * If the clipboard format\n 2302 |        * application/x-moz-nativeimage is present, that is\n 2303 |        * a reliable indicator that the data is offered by\n 2304 |        * Mozilla one would think. For IE7,\n 2305 |        * UniformResourceLocatorW is presumably not that\n 2306 |        * uniqie, so probably need to do some\n 2307 |        * GetClipboardOwner(), GetWindowThreadProcessId(),\n 2308 |        * OpenProcess(), GetModuleFileNameEx() dance to\n 2309 |        * check?\n 2310 |        */\n 2311 |       (IsClipboardFormatAvailable\n 2312 |        (RegisterClipboardFormat (L\"application/x-moz-nativeimage\")) ||\n 2313 |        IsClipboardFormatAvailable\n 2314 |        (RegisterClipboardFormat (L\"UniformResourceLocatorW\"))) &&\n 2315 | #endif\n 2316 |       TRUE)\n 2317 |     {\n 2318 |       /* We turn the BITMAPINFOHEADER into a\n 2319 |        * BITMAPV5HEADER before feeding it to gdk-pixbuf.\n 2320 |        */\n 2321 |       new_length = (data_length +\n 2322 | \t\t    sizeof (BITMAPFILEHEADER) +\n 2323 | \t\t    (sizeof (BITMAPV5HEADER) - sizeof (BITMAPINFOHEADER)));\n 2324 |       make_dibv5 = TRUE;\n 2325 |     }\n 2326 |   else\n 2327 |     {\n 2328 |       new_length = data_length + sizeof (BITMAPFILEHEADER);\n 2329 |     }\n 2330 | \n 2331 |   result = g_try_malloc (new_length);\n 2332 | \n 2333 |   if (result == NULL)\n 2334 |     return;\n 2335 | \n 2336 |   bf = (BITMAPFILEHEADER *) result;\n 2337 |   bf->bfType = 0x4d42; /* \"BM\" */\n 2338 |   bf->bfSize = new_length;\n 2339 |   bf->bfReserved1 = 0;\n 2340 |   bf->bfReserved2 = 0;\n 2341 | \n 2342 |   *set_data = result;\n 2343 | \n 2344 |   if (set_data_length)\n 2345 |     *set_data_length = new_length;\n 2346 |   if (set_data_destroy)\n 2347 |     *set_data_destroy = g_free;\n 2348 | \n 2349 |   if (!make_dibv5)\n 2350 |     {\n 2351 |       bf->bfOffBits = (sizeof (BITMAPFILEHEADER) +\n 2352 | \t\t       bi->biSize +\n 2353 |                        palette_number_of_colors  * sizeof (RGBQUAD));\n 2354 | \n 2355 |       if (bi->biCompression == BI_BITFIELDS && bi->biBitCount >= 16)\n 2356 |         {\n 2357 |           /* Screenshots taken with PrintScreen or\n 2358 |            * Alt + PrintScreen are found on the clipboard in\n 2359 |            * this format. In this case the BITMAPINFOHEADER is\n 2360 |            * followed by three DWORD specifying the masks of the\n 2361 |            * red green and blue components, so adjust the offset\n 2362 |            * accordingly. */\n 2363 |           bf->bfOffBits += (3 * sizeof (DWORD));\n 2364 |         }\n 2365 | \n 2366 |       memcpy ((char *) result + sizeof (BITMAPFILEHEADER),\n 2367 | \t      bi,\n 2368 | \t      data_length);\n 2369 | \n 2370 |       return;\n 2371 |     }\n 2372 | \n 2373 |   bV5 = (BITMAPV5HEADER *) ((char *) result + sizeof (BITMAPFILEHEADER));\n 2374 | \n 2375 |   bV5->bV5Size = sizeof (BITMAPV5HEADER);\n 2376 |   bV5->bV5Width = bi->biWidth;\n 2377 |   bV5->bV5Height = bi->biHeight;\n 2378 |   bV5->bV5Planes = 1;\n 2379 |   bV5->bV5BitCount = 32;\n 2380 |   bV5->bV5Compression = BI_BITFIELDS;\n 2381 |   bV5->bV5SizeImage = 4 * bV5->bV5Width * ABS (bV5->bV5Height);\n 2382 |   bV5->bV5XPelsPerMeter = bi->biXPelsPerMeter;\n 2383 |   bV5->bV5YPelsPerMeter = bi->biYPelsPerMeter;\n 2384 |   bV5->bV5ClrUsed = 0;\n 2385 |   bV5->bV5ClrImportant = 0;\n 2386 |   /* Now the added mask fields */\n 2387 |   bV5->bV5RedMask   = 0x00ff0000;\n 2388 |   bV5->bV5GreenMask = 0x0000ff00;\n 2389 |   bV5->bV5BlueMask  = 0x000000ff;\n 2390 |   bV5->bV5AlphaMask = 0xff000000;\n 2391 |   ((char *) &bV5->bV5CSType)[3] = 's';\n 2392 |   ((char *) &bV5->bV5CSType)[2] = 'R';\n 2393 |   ((char *) &bV5->bV5CSType)[1] = 'G';\n 2394 |   ((char *) &bV5->bV5CSType)[0] = 'B';\n 2395 |   /* Ignore colorspace and profile fields */\n 2396 |   bV5->bV5Intent = LCS_GM_GRAPHICS;\n 2397 |   bV5->bV5Reserved = 0;\n 2398 | \n 2399 |   bf->bfOffBits = (sizeof (BITMAPFILEHEADER) +\n 2400 | \t\t   bV5->bV5Size);\n 2401 | \n 2402 |   p = ((guchar *) result) + sizeof (BITMAPFILEHEADER) + sizeof (BITMAPV5HEADER);\n 2403 |   memcpy (p, ((char *) bi) + bi->biSize,\n 2404 |           data_length - sizeof (BITMAPINFOHEADER));\n 2405 | \n 2406 |   for (i = 0; i < bV5->bV5SizeImage / 4; i++)\n 2407 |     {\n 2408 |       if (p[3] != 0)\n 2409 |         {\n 2410 |           double inverse_alpha = 255. / p[3];\n 2411 | \n 2412 |           p[0] = p[0] * inverse_alpha + 0.5;\n 2413 |           p[1] = p[1] * inverse_alpha + 0.5;\n 2414 |           p[2] = p[2] * inverse_alpha + 0.5;\n 2415 |         }\n 2416 | \n 2417 |       p += 4;\n 2418 |     }"}]},{"id":"OTHER_4","type":"other","type_label":"Other","severity":"high","description":"gdk_win32_drop_read_async() picks the wrong content-format pair. The intended behaviour is to find the first requested mime type that has a matching pair in droptarget_w32format_contentformat_map. But the inner `break` only exits the inner loop; the outer `for (i ...)` keeps iterating over all requested mime types, so `pair` ends up reflecting the LAST mime type examined (or NULL), not the first match. Unlike process_retrieve() (same file family) which guards its outer loop condition, here there is no such guard, so a correct early format can be discarded in favour of a non-matching later one.","fix":"Break out of the outer loop once a matching pair is found, e.g. add a flag or `if (pair != NULL) break;` after the inner loop, mirroring the early-exit logic in process_retrieve().","locations":[{"ref":"gdk/win32/gdkdrop-win32.c:1051-1069","code":" 1051 |   for (pair = NULL, i = 0; i < n_mime_types; i++)\n 1052 |     {\n 1053 |       for (j = 0; j < drop_win32->droptarget_w32format_contentformat_map->len; j++)\n 1054 |         {\n 1055 |           pair = &g_array_index (drop_win32->droptarget_w32format_contentformat_map, GdkWin32ContentFormatPair, j);\n 1056 |           if (pair->contentformat == mime_types[i])\n 1057 |             break;\n 1058 | \n 1059 |           pair = NULL;\n 1060 |         }\n 1061 |     }\n 1062 | \n 1063 |   if (pair == NULL)\n 1064 |     {\n 1065 |       g_task_return_new_error (task, G_IO_ERROR, G_IO_ERROR_NOT_SUPPORTED,\n 1066 |                                _(\"No compatible transfer format found\"));\n 1067 |       g_object_unref (task);\n 1068 |       return;\n 1069 |     }"}]},{"id":"OTHER_5","type":"other","type_label":"Other","severity":"high","description":"gsk_gpu_cached_is_old() is declared to return gboolean, but when caching is\ndisabled (cache_timeout < 0) it does `return -1;`. -1 is a non-zero value, so it\nis interpreted as TRUE. The semantics intended by `cache_timeout < 0` is \"GC\ndisabled / items never expire\", but every should_collect() implementation that\ncalls this (texture, tile, glyph, fill, stroke, atlas, GL pipeline, Vulkan\npipeline, Vulkan ycbcr) therefore treats items as *old* and eligible for\ncollection when GC is disabled. Currently this latent bug is masked only because\ngsk_gpu_cache_gc() is never reached with cache_timeout == -1 (gskgpudevice.c\nguards the call), but the function is wrong on its own contract and one new\ndirect caller would cause cached resources to be wrongly evicted even with\nGSK_CACHE_TIMEOUT=-1. The correct value for the disabled case is FALSE.","fix":"Return FALSE when caching is disabled:\n  if (cache_timeout < 0)\n    return FALSE;\n  else\n    return timestamp - cached->timestamp > cache_timeout;","locations":[{"ref":"gsk/gpu/gskgpucached.c:7-16","code":"    7 | gboolean\n    8 | gsk_gpu_cached_is_old (GskGpuCached *cached,\n    9 |                        gint64        cache_timeout,\n   10 |                        gint64        timestamp)\n   11 | {\n   12 |   if (cache_timeout < 0)\n   13 |     return -1;\n   14 |   else\n   15 |     return timestamp - cached->timestamp > cache_timeout;\n   16 | }"}]},{"id":"OTHER_6","type":"other","type_label":"Other","severity":"high","description":"Unbounded recursion over the element tree can overflow the stack on malicious input. The parser caps the total number of elements at LOADING_LIMIT = 50000 (gtk/svg/gtksvgprivate.h:46, enforced in start_element_cb gtk/svg/gtksvgparser.c:2021), but it imposes no limit on nesting DEPTH. A single deeply-nested chain of container elements (e.g. 50000 nested <g> elements) is accepted, and many operations then recurse once per nesting level: svg_element_free() (via the per-array free func, gtk/svg/gtksvgelement.c:94,163), svg_element_foreach() (gtk/svg/gtksvgelement.c:1582-1593), apply_styles_to_shape() (gtk/svg/gtksvgparser.c:4425-4439), do_compute_update_order() (gtk/svg/gtksvgparser.c:3261-3278), load_styles_for_shape() (gtk/svg/gtksvgparser.c:4000-4017) and resolve_animation_refs() (gtk/svg/gtksvgparser.c:3124-3143). 50000 stack frames will exceed the default thread stack and crash the process (SIGSEGV) when loading untrusted SVG.","fix":"Track and enforce a maximum nesting depth in start_element_cb (skip elements deeper than a modest bound, e.g. a few hundred), or convert the tree walks / free routine to iterative form so depth is not bounded by the call stack.","locations":[{"ref":"gtk/svg/gtksvgparser.c:2021-2029","code":" 2021 |   if (data->num_loaded_elements++ > LOADING_LIMIT)\n 2022 |     {\n 2023 |       data->skip.start = location;\n 2024 |       data->skip.to = g_markup_parse_context_get_element_stack (context)->next;\n 2025 |       data->skip.code = GTK_SVG_ERROR_LIMITS_EXCEEDED;\n 2026 |       data->skip.reason = g_strdup (\"Loading limit exceeded\");\n 2027 |       data->skip.skip_over_target = FALSE;\n 2028 |       return;\n 2029 |     }"},{"ref":"gtk/svg/gtksvgelement.c:1582-1595","code":" 1582 | svg_element_foreach (SvgElement       *element,\n 1583 |                      SvgShapeCallback  callback,\n 1584 |                      gpointer          user_data)\n 1585 | {\n 1586 |   callback (element, user_data);\n 1587 | \n 1588 |   if (element->shapes)\n 1589 |     {\n 1590 |       for (unsigned int i = 0; i < element->shapes->len; i++)\n 1591 |         {\n 1592 |           SvgElement *sh = g_ptr_array_index (element->shapes, i);\n 1593 |           svg_element_foreach (sh, callback, user_data);\n 1594 |         }\n 1595 |     }"},{"ref":"gtk/svg/gtksvgparser.c:4425-4439","code":" 4425 | apply_styles_to_shape (SvgElement *shape,\n 4426 |                        GtkSvg     *svg)\n 4427 | {\n 4428 |   SvgValue *color, *paint;\n 4429 | \n 4430 |   apply_styles_here (shape, 0, svg);\n 4431 | \n 4432 |   if (shape->shapes)\n 4433 |     {\n 4434 |       for (unsigned int i = 0; i < shape->shapes->len; i++)\n 4435 |         {\n 4436 |           SvgElement *sh = g_ptr_array_index (shape->shapes, i);\n 4437 |           apply_styles_to_shape (sh, svg);\n 4438 |         }\n 4439 |     }"}]},{"id":"OTHER_7","type":"other","type_label":"Other","severity":"medium","description":"BROADWAY_REQUEST_UPLOAD_TEXTURE does `g_malloc(request->upload_texture.size)` with a fully client-controlled 32-bit size and reads that many bytes from the passed fd, with no upper bound. A malicious or buggy client can request a ~4 GiB allocation (DoS). Also, on a read() error that is not EAGAIN (e.g. EINTR), the code takes the else branch, warns 'short read', and breaks, leaving the tail of `data` uninitialized but still wrapped into a GBytes of the full requested size.","fix":"Bound request->upload_texture.size to a sane maximum and validate the fd's size; handle EINTR by retrying; on short/failed read, free data and reject the request rather than uploading partially-initialized memory.","locations":[{"ref":"gdk/broadway/broadwayd.c:284-329","code":"  284 |     case BROADWAY_REQUEST_UPLOAD_TEXTURE:\n  285 |       if (client->fds == NULL)\n  286 |         g_warning (\"FD passing mismatch for texture upload %d\", request->release_texture.id);\n  287 |       else\n  288 |         {\n  289 |           char *data, *p;\n  290 |           gsize to_read;\n  291 |           gssize num_read;\n  292 |           GBytes *texture;\n  293 | \n  294 |           fd = GPOINTER_TO_INT (client->fds->data);\n  295 |           client->fds = g_list_delete_link (client->fds, client->fds);\n  296 | \n  297 |           data = g_malloc (request->upload_texture.size);\n  298 |           to_read = request->upload_texture.size;\n  299 |           lseek (fd, request->upload_texture.offset, SEEK_SET);\n  300 | \n  301 |           p = data;\n  302 |           do\n  303 |             {\n  304 |               num_read = read (fd, p, to_read);\n  305 |               if (num_read == -1 && errno == EAGAIN)\n  306 |                 continue;\n  307 | \n  308 |               if (num_read > 0)\n  309 |                 {\n  310 |                   p += num_read;\n  311 |                   to_read -= num_read;\n  312 |                 }\n  313 |               else\n  314 |                 {\n  315 |                   g_warning (\"Unexpected short read of texture\");\n  316 |                   break;\n  317 |                 }\n  318 |             }\n  319 |           while (to_read > 0);\n  320 |           close (fd);\n  321 | \n  322 |           texture = g_bytes_new_take (data, request->upload_texture.size);\n  323 |           global_id = broadway_server_upload_texture (server, texture);\n  324 |           g_bytes_unref (texture);\n  325 | \n  326 |           g_hash_table_replace (client->textures,\n  327 |                                 GINT_TO_POINTER (request->release_texture.id),\n  328 |                                 GINT_TO_POINTER (global_id));\n  329 |         }"}]},{"id":"OTHER_8","type":"other","type_label":"Other","severity":"medium","description":"TYPED_PACKED_FUNCS from_float() has a copy-paste bug: when packing the blue channel it scales using G_BITS instead of B_BITS. The line computes `CLAMP (src[i][2] * ((1 << G_BITS) - 1) + 0.5, 0, ((1 << B_BITS) - 1))` — the multiplier uses G_BITS but the clamp uses B_BITS. For all current packed formats R/G/B all have 10 bits so this is currently harmless, but it is a latent bug that breaks the moment a packed format with differing G and B bit-widths is added.","fix":"Change the blue-channel multiplier to use B_BITS: `(((T) CLAMP (src[i][2] * ((1 << B_BITS) - 1) + 0.5, 0, ((1 << B_BITS) - 1))) << B_SHIFT)`.","locations":[{"ref":"gdk/gdkmemoryformat.c:142-144","code":"  142 |       T val = (((T) CLAMP (src[i][0] * ((1 << R_BITS) - 1) + 0.5, 0, ((1 << R_BITS) - 1))) << R_SHIFT) | \\\n  143 |               (((T) CLAMP (src[i][1] * ((1 << G_BITS) - 1) + 0.5, 0, ((1 << G_BITS) - 1))) << G_SHIFT) | \\\n  144 |               (((T) CLAMP (src[i][2] * ((1 << G_BITS) - 1) + 0.5, 0, ((1 << B_BITS) - 1))) << B_SHIFT); \\"}]},{"id":"OTHER_9","type":"other","type_label":"Other","severity":"medium","description":"gdk_texture_downloader_copy() copies the format but fails to copy the color_state. The copy is always created via gdk_texture_downloader_new() (which initializes color_state to sRGB) and only set_format is called afterwards. A downloader configured with a non-sRGB color state via gdk_texture_downloader_set_color_state() loses that setting when copied, producing incorrectly color-converted output. Since GdkTextureDownloader is a boxed type, this also affects language bindings that copy the boxed value.","fix":"After gdk_texture_downloader_set_format(copy, self->format); add gdk_texture_downloader_set_color_state (copy, self->color_state);","locations":[{"ref":"gdk/gdktexturedownloader.c:102-113","code":"  102 | GdkTextureDownloader *\n  103 | gdk_texture_downloader_copy (const GdkTextureDownloader *self)\n  104 | {\n  105 |   GdkTextureDownloader *copy;\n  106 | \n  107 |   g_return_val_if_fail (self != NULL, NULL);\n  108 | \n  109 |   copy = gdk_texture_downloader_new (self->texture);\n  110 |   gdk_texture_downloader_set_format (copy, self->format);\n  111 | \n  112 |   return copy;\n  113 | }"}]},{"id":"OTHER_10","type":"other","type_label":"Other","severity":"medium","description":"In the macOS CGL context creation (gdk_macos_gl_context_real_init_gl / GL path), the previously-current CGL context is saved in `existing` and made current again only on the success path (lines 476-477). On the error paths after CGLSetCurrentContext(cgl_context) (line 430), the code calls CGLReleaseContext(cgl_context) and returns 0 without restoring `existing` as current. This leaves the just-released context set as the thread's current CGL context (a dangling pointer), and also fails to restore the caller's previous context. A subsequent CGLGetCurrentContext()/GL call can then operate on freed memory.","fix":"Before each early `return 0` after line 430, restore the previous context (e.g. `CGLSetCurrentContext (existing);`) prior to CGLReleaseContext(cgl_context), or use a shared cleanup label that restores `existing`.","locations":[{"ref":"gdk/macos/gdkmacosglcontext.c:430-448","code":"  430 |   CGLSetCurrentContext (cgl_context);\n  431 |   CGLReleasePixelFormat (pixelFormat);\n  432 | \n  433 |   gdk_gl_version_init_epoxy (&version);\n  434 |   if (!gdk_gl_version_greater_equal (&version, &min_version))\n  435 |     {\n  436 |       CGLReleaseContext (cgl_context);\n  437 |       return 0;\n  438 |     }\n  439 | \n  440 |   if (validate)\n  441 |     CHECK (NULL, CGLEnable (cgl_context, kCGLCEStateValidation));\n  442 | \n  443 |   if (!CHECK (error, CGLSetParameter (cgl_context, kCGLCPSwapInterval, &sync_to_framerate)) ||\n  444 |       !CHECK (error, CGLGetParameter (cgl_context, kCGLCPCurrentRendererID, &renderer_id)))\n  445 |    {\n  446 |       CGLReleaseContext (cgl_context);\n  447 |       return 0;\n  448 |    }"},{"ref":"gdk/macos/gdkmacosglcontext.c:476-477","code":"  476 |   if (existing != NULL)\n  477 |     CGLSetCurrentContext (existing);"}]},{"id":"OTHER_11","type":"other","type_label":"Other","severity":"medium","description":"transmute_cf_shell_id_list_to_text_uri_list() casts clipboard data directly to CIDA* and reads cida->cidl and cida->aoffset[i] without validating that `length` is large enough to contain the CIDA header or the referenced offset array. A malformed CFSTR_SHELLIDLIST payload causes an out-of-bounds read.","fix":"Validate length >= sizeof(CIDA) and that aoffset[number_of_ids] entries are within `length` before dereferencing; bail out otherwise.","locations":[{"ref":"gdk/win32/gdkclipdrop-win32.c:2421-2467","code":" 2421 | static void\n 2422 | transmute_cf_shell_id_list_to_text_uri_list (const guchar    *data,\n 2423 |                                              gsize            length,\n 2424 |                                              guchar         **set_data,\n 2425 |                                              gsize           *set_data_length,\n 2426 |                                              GDestroyNotify  *set_data_destroy)\n 2427 | {\n 2428 |   guint i;\n 2429 |   CIDA *cida = (CIDA *) data;\n 2430 |   guint number_of_ids = cida->cidl;\n 2431 |   GString *result = g_string_new (NULL);\n 2432 |   PCIDLIST_ABSOLUTE folder_id = HIDA_GetPIDLFolder (cida);\n 2433 |   wchar_t path_w[MAX_PATH + 1];\n 2434 | \n 2435 |   for (i = 0; i < number_of_ids; i++)\n 2436 |     {\n 2437 |       PCUIDLIST_RELATIVE file_id = HIDA_GetPIDLItem (cida, i);\n 2438 |       PIDLIST_ABSOLUTE file_id_full = ILCombine (folder_id, file_id);\n 2439 | \n 2440 |       if (SHGetPathFromIDListW (file_id_full, path_w))\n 2441 |         {\n 2442 |           char *filename = g_utf16_to_utf8 (path_w, -1, NULL, NULL, NULL);\n 2443 | \n 2444 |           if (filename)\n 2445 |             {\n 2446 |               char *uri = g_filename_to_uri (filename, NULL, NULL);\n 2447 | \n 2448 |               if (uri)\n 2449 |                 {\n 2450 |                   g_string_append (result, uri);\n 2451 |                   g_string_append (result, \"\\r\\n\");\n 2452 |                   g_free (uri);\n 2453 |                 }\n 2454 | \n 2455 |               g_free (filename);\n 2456 |             }\n 2457 |         }\n 2458 | \n 2459 |       ILFree (file_id_full);\n 2460 |     }\n 2461 | \n 2462 |   if (set_data_length)\n 2463 |     *set_data_length = result->len;\n 2464 |   *set_data = (guchar *) g_string_free (result, FALSE);\n 2465 |   if (set_data_destroy)\n 2466 |     *set_data_destroy = g_free;\n 2467 | }"}]},{"id":"OTHER_12","type":"other","type_label":"Other","severity":"medium","description":"GL command-time merge loop in gsk_gpu_shader_op_gl_command() does NOT compare\nclip_mask between merged ops, whereas the Vulkan path (gsk_gpu_shader_op_vk_command)\ndoes (it has `(next_shader->clip_mask && next_shader->clip_mask != self->clip_mask)`\nin the break condition). The GL merge loop only checks op_class, node_id, flags,\ncolor_states, variation, vertex_offset and images/samplers. If two consecutive\nshader ops are identical in everything checked but differ in clip_mask, the GL\nbackend will merge them into a single glDrawArraysInstanced call and render the\nlater op with the wrong (first op's) clip mask. The flags already encode whether\na clip mask is used, so differing flags would break the merge, but two ops that\nboth use a clip mask but reference *different* clip-mask images would be wrongly\nmerged on GL.","fix":"Add the same clip_mask check to the GL merge loop's break condition as exists in\nthe Vulkan loop:\n  (next_shader->clip_mask && next_shader->clip_mask != self->clip_mask) ||","locations":[{"ref":"gsk/gpu/gskgpushaderop.c:226-241","code":"  226 |   for (next = op->next; next; next = next->next)\n  227 |     {\n  228 |       GskGpuShaderOp *next_shader = (GskGpuShaderOp *) next;\n  229 | \n  230 |       if (next->op_class != op->op_class ||\n  231 |           next->node_id != op->node_id ||\n  232 |           next_shader->flags != self->flags ||\n  233 |           next_shader->color_states != self->color_states ||\n  234 |           next_shader->variation != self->variation ||\n  235 |           next_shader->vertex_offset != self->vertex_offset + n_ops * shader_op_class->vertex_size ||\n  236 |           (shader_op_class->n_textures > 0 && (next_shader->images[0] != self->images[0] || next_shader->samplers[0] != self->samplers[0])) ||\n  237 |           (shader_op_class->n_textures > 1 && (next_shader->images[1] != self->images[1] || next_shader->samplers[1] != self->samplers[1])))\n  238 |         break;\n  239 | \n  240 |       n_ops += next_shader->n_ops;\n  241 |     }"},{"ref":"gsk/gpu/gskgpushaderop.c:86-102","code":"   86 |   for (next = op->next; next; next = next->next)\n   87 |     {\n   88 |       GskGpuShaderOp *next_shader = (GskGpuShaderOp *) next;\n   89 |   \n   90 |       if (next->op_class != op->op_class ||\n   91 |           next->node_id != op->node_id ||\n   92 |           next_shader->flags != self->flags ||\n   93 |           next_shader->color_states != self->color_states ||\n   94 |           next_shader->variation != self->variation ||\n   95 |           next_shader->vertex_offset != self->vertex_offset + n_ops * shader_op_class->vertex_size ||\n   96 |           (next_shader->clip_mask && next_shader->clip_mask != self->clip_mask) ||\n   97 |           (shader_op_class->n_textures > 0 && (next_shader->images[0] != self->images[0] || next_shader->samplers[0] != self->samplers[0])) ||\n   98 |           (shader_op_class->n_textures > 1 && (next_shader->images[1] != self->images[1] || next_shader->samplers[1] != self->samplers[1])))\n   99 |         break;\n  100 | \n  101 |       n_ops += next_shader->n_ops;\n  102 |     }"}]},{"id":"OTHER_13","type":"other","type_label":"Other","severity":"low","description":"string_deserializer registration passes the string returned by g_get_charset() as user_data with g_free as the GDestroyNotify. g_get_charset() returns a string owned by GLib that must not be freed. If this deserializer's notify were ever invoked it would free GLib-internal memory. It is latent because deserializers are registered once and never unregistered, but it is incorrect ownership handling.","fix":"Pass g_strdup(charset) as the user_data if a g_free notify is desired, or pass NULL as the notify (matching the const ownership of g_get_charset's result).","locations":[{"ref":"gdk/gdkcontentdeserializer.c:997-1006","code":"  997 |   if (!g_get_charset (&charset))\n  998 |     {\n  999 |       char *mime = g_strdup_printf (\"text/plain;charset=%s\", charset);\n 1000 | \n 1001 |       gdk_content_register_deserializer (mime,\n 1002 |                                          G_TYPE_STRING,\n 1003 |                                          string_deserializer,\n 1004 |                                          (gpointer) charset,\n 1005 |                                          g_free);\n 1006 |       g_free (mime);"}]},{"id":"OTHER_14","type":"other","type_label":"Other","severity":"low","description":"color_serializer() converts GdkRGBA float components to guint16 with a plain cast `(guint16) (rgba->red * 65535)` without clamping to [0,1] or rounding. Out-of-range component values (e.g. HDR/extended-range or negative values, which GdkRGBA does not forbid) wrap/truncate via the implicit float-to-unsigned conversion, producing arbitrary serialized color bytes. Compare the deserializer which divides by 65535.0 with no validation either.","fix":"Clamp each component to [0,1] and round before casting, e.g. data[0] = (guint16) (CLAMP (rgba->red, 0.f, 1.f) * 65535 + 0.5f);","locations":[{"ref":"gdk/gdkcontentserializer.c:947-954","code":"  947 |   data = g_new0 (guint16, 4);\n  948 |   if (rgba)\n  949 |     {\n  950 |       data[0] = (guint16) (rgba->red * 65535);\n  951 |       data[1] = (guint16) (rgba->green * 65535);\n  952 |       data[2] = (guint16) (rgba->blue * 65535);\n  953 |       data[3] = (guint16) (rgba->alpha * 65535);\n  954 |     }"}]},{"id":"OTHER_15","type":"other","type_label":"Other","severity":"low","description":"gdk_memory_convert_color_state_generic() passes `row` (a pointer into the middle of the tmp block for the current y) to desc->from_float() instead of the block base `tmp`. Compare with gdk_memory_convert_generic() at line 7272 which correctly passes `tmp`. from_float() is documented to be called with the start of a block of block_size.height rows. For any color-state-converted format with block_size.height > 1 this writes the wrong rows. Currently the only formats going through this path have block height 1, so it is latent.","fix":"Pass `tmp` instead of `row`: desc->from_float (mc->data, &mc->layout, tmp, y - (desc->block_size.height - 1));","locations":[{"ref":"gdk/gdkmemoryformat.c:7538-7539","code":" 7538 |           if (y % desc->block_size.height == desc->block_size.height - 1)\n 7539 |             desc->from_float (mc->data, &mc->layout, row, y - (desc->block_size.height - 1));"},{"ref":"gdk/gdkmemoryformat.c:7271-7272","code":" 7271 |           if (y % dest_desc->block_size.height == dest_desc->block_size.height - 1)\n 7272 |             dest_desc->from_float (mc->dest_data, &mc->dest_layout, tmp, y - (dest_desc->block_size.height - 1));"}]},{"id":"OTHER_16","type":"other","type_label":"Other","severity":"low","description":"Confusing argument order in CLAMP(): the code writes `CLAMP (2, nproc - 1, 32)` apparently intending to clamp the thread count nproc-1 into the range [2, 32]. The conventional spelling is CLAMP(nproc - 1, 2, 32). It happens to compute the same result because MAX is commutative, but it reads as 'clamp the constant 2', which is misleading and fragile to future edits.","fix":"Rewrite as CLAMP (nproc - 1, 2, 32) for clarity.","locations":[{"ref":"gdk/gdkparalleltask.c:76","code":"   76 |       guint num_threads = CLAMP (2, nproc - 1, 32);"}]},{"id":"OTHER_17","type":"other","type_label":"Other","severity":"low","description":"gdk_texture_save_to_png() does not check the return value of gdk_save_png(). Although gdk_save_png currently always returns bytes, passing a NULL GBytes to g_bytes_get_data/g_bytes_get_size/g_bytes_unref would crash. Other texture save paths have the same pattern (save_to_tiff).","fix":"Guard against a NULL return from gdk_save_png()/gdk_save_tiff() before using the bytes.","locations":[{"ref":"gdk/gdktexture.c:1135-1153","code":" 1135 | gboolean\n 1136 | gdk_texture_save_to_png (GdkTexture *texture,\n 1137 |                          const char *filename)\n 1138 | {\n 1139 |   GBytes *bytes;\n 1140 |   gboolean result;\n 1141 | \n 1142 |   g_return_val_if_fail (GDK_IS_TEXTURE (texture), FALSE);\n 1143 |   g_return_val_if_fail (filename != NULL, FALSE);\n 1144 | \n 1145 |   bytes = gdk_save_png (texture, NULL);\n 1146 |   result = g_file_set_contents (filename,\n 1147 |                                 g_bytes_get_data (bytes, NULL),\n 1148 |                                 g_bytes_get_size (bytes),\n 1149 |                                 NULL);\n 1150 |   g_bytes_unref (bytes);\n 1151 | \n 1152 |   return result;\n 1153 | }"}]},{"id":"OTHER_18","type":"other","type_label":"Other","severity":"low","description":"gdk_texture_downloader_set_color_state() lacks the `g_return_if_fail (self != NULL)` precondition check that every other setter in this file has, and does not validate that color_state is non-NULL before refing it. A NULL color_state passed by a binding would crash inside gdk_color_state_ref.","fix":"Add g_return_if_fail (self != NULL); and consider g_return_if_fail (color_state != NULL); at the top of the function.","locations":[{"ref":"gdk/gdktexturedownloader.c:219-228","code":"  219 | void\n  220 | gdk_texture_downloader_set_color_state (GdkTextureDownloader *self,\n  221 |                                         GdkColorState        *color_state)\n  222 | {\n  223 |   if (self->color_state == color_state)\n  224 |     return;\n  225 | \n  226 |   gdk_color_state_unref (self->color_state);\n  227 |   self->color_state = gdk_color_state_ref (color_state);\n  228 | }"}]},{"id":"OTHER_19","type":"other","type_label":"Other","severity":"low","description":"In on_data_ready_cb(), after archiving an NSColor with NSKeyedArchiver (which reports failure via the `error:` out-parameter passed as &nserror), the code checks `if (error)` instead of `if (nserror)`. `error` is the GError, which in this success branch is always NULL, so a real archiving failure is never detected/logged. `nserror` is assigned but otherwise unused.","fix":"Check `if (nserror)` (and log nserror.localizedDescription) instead of `if (error)`.","locations":[{"ref":"gdk/macos/gdkmacospasteboard.c:426-440","code":"  426 |       if (size == 8 && [wr->type isEqualToString:NSPasteboardTypeColor])\n  427 |         {\n  428 |           guint16 *color;\n  429 |           NSError *nserror = nil;\n  430 | \n  431 |           color = (guint16 *)g_memory_output_stream_steal_data (G_MEMORY_OUTPUT_STREAM (wr->stream));\n  432 |           NSColor *nscolor = [[NSColor colorWithRed:color[0] / 65535.0\n  433 |                                               green:color[1] / 65535.0\n  434 |                                                blue:color[2] / 65535.0\n  435 |                                               alpha:color[3] / 65535.0]\n  436 |                               colorUsingColorSpace:[NSColorSpace genericRGBColorSpace]];\n  437 |           data = [NSKeyedArchiver archivedDataWithRootObject:nscolor requiringSecureCoding:YES error: &nserror];\n  438 |           if (error)\n  439 |             g_warning (\"Encoding color failed\");\n  440 |         }"}]},{"id":"OTHER_20","type":"other","type_label":"Other","severity":"low","description":"In the WM_RENDERALLFORMATS handler the NULL check is written as `CLIPDROP_CB_THREAD_MEMBER (clipdrop, cached_advertisement == NULL)` — the `== NULL` is placed inside the macro argument. Because the CLIPDROP_CB_THREAD_MEMBER macro expands `m` to `(...)->m`, this happens to expand to `(...)->cached_advertisement == NULL`, which is correct by luck, but it is misleading and inconsistent with the correct form used in the WM_RENDERFORMAT handler a few lines below (`CLIPDROP_CB_THREAD_MEMBER (clipdrop, cached_advertisement) == NULL`).","fix":"Rewrite as `CLIPDROP_CB_THREAD_MEMBER (clipdrop, cached_advertisement) == NULL` to match the rest of the code and avoid confusion.","locations":[{"ref":"gdk/win32/gdkclipdrop-win32.c:1187","code":" 1187 |         if (CLIPDROP_CB_THREAD_MEMBER (clipdrop, cached_advertisement == NULL))"},{"ref":"gdk/win32/gdkclipdrop-win32.c:1226","code":" 1226 |         if (CLIPDROP_CB_THREAD_MEMBER (clipdrop, cached_advertisement) == NULL)"}]},{"id":"OTHER_21","type":"other","type_label":"Other","severity":"low","description":"gdk_win32_drop_read_async() calls strlen(drop_win32->dropfiles_list) without a NULL check in the GDK_DRAG_PROTO_WIN32_DROPFILES branch. If the dropfiles list was never populated (or the read is somehow attempted twice, since dropfiles_list is set to NULL after the first read at line 1025), strlen(NULL) dereferences a NULL pointer and crashes.","fix":"Guard with `if (drop_win32->dropfiles_list == NULL)` and return a G_IO_ERROR before constructing the stream.","locations":[{"ref":"gdk/win32/gdkdrop-win32.c:1024-1025","code":" 1024 |       stream = g_memory_input_stream_new_from_data (drop_win32->dropfiles_list, strlen (drop_win32->dropfiles_list), g_free);\n 1025 |       drop_win32->dropfiles_list = NULL;"}]},{"id":"OTHER_22","type":"other","type_label":"Other","severity":"low","description":"gdk_win32_message_source_finalize() references `self->poll_fd.fd` inside the `#ifdef G_WITH_CYGWIN` block, but the function only declares `GSource *source` and never derives `self` from it. On Cygwin builds this fails to compile (use of undeclared `self`), so the file descriptor opened in gdk_win32_message_source_new() is also leaked on that platform.","fix":"Add `GdkWin32MessageSource *self = (GdkWin32MessageSource *) source;` at the top of the finalize function (matching the other callbacks) before using self->poll_fd.fd.","locations":[{"ref":"gdk/win32/gdkwin32messagesource.c:53-59","code":"   53 | static void\n   54 | gdk_win32_message_source_finalize (GSource *source)\n   55 | {\n   56 | #ifdef G_WITH_CYGWIN\n   57 |   close (self->poll_fd.fd);\n   58 | #endif\n   59 | }"}]},{"id":"OTHER_23","type":"other","type_label":"Other","severity":"low","description":"malloc() used for the CPU-side copy buffer in gsk_gl_copied_buffer_new() while the\nmatching finalize uses g_free(). Mixing libc malloc() with GLib g_free() is\ntechnically undefined behavior (GLib does not guarantee g_free can free a libc\nmalloc'd block, though in practice on glibc they are the same allocator). All\nother allocations in this file/module use the GLib allocator.","fix":"Use g_malloc (size) to match the g_free in gsk_gl_copied_buffer_finalize().","locations":[{"ref":"gsk/gpu/gskglbuffer.c:209","code":"  209 |   self->data = malloc (size);"},{"ref":"gsk/gpu/gskglbuffer.c:162","code":"  162 |   g_free (self->data);"}]},{"id":"OTHER_24","type":"other","type_label":"Other","severity":"low","description":"Comma-operator instead of semicolons when initializing cached pipeline structs.\nIn both the GL and Vulkan pipeline creation code the per-field assignments are\nchained with `,` rather than terminated with `;` (e.g. `result->op_class = op_class,`\nfollowed by more comma-separated assignments). This compiles and works (comma\noperator), but is fragile: in the Vulkan case the final assignment's comma even\nchains into the following GSK_VK_CHECK(...) statement, so an accidental edit could\nsilently change control flow or drop an assignment. Should be plain statements.","fix":"Replace the trailing commas with semicolons so each field assignment is its own statement.","locations":[{"ref":"gsk/gpu/gskglpipeline.c:424-428","code":"  424 |   result->op_class = op_class,\n  425 |   result->flags = flags,\n  426 |   result->color_states = color_states,\n  427 |   result->variation = variation,\n  428 |   result->program_id = program_id;"},{"ref":"gsk/gpu/gskvulkanpipeline.c:269-276","code":"  269 |   result->vk_layout = vk_layout;\n  270 |   result->op_class = op_class,\n  271 |   result->color_states = color_states,\n  272 |   result->variation = variation,\n  273 |   result->flags = flags,\n  274 |   result->blend = blend,\n  275 |   result->vk_format = vk_format,\n  276 | "}]},{"id":"OTHER_25","type":"other","type_label":"Other","severity":"low","description":"Glyph cache hash truncates the scale before scaling by PANGO_SCALE due to\noperator precedence and integer cast. `((guint) glyph->scale * PANGO_SCALE)`\ncasts the float scale to guint *first* (so 1.0, 1.3, 1.7 all become 1) and only\nthen multiplies by PANGO_SCALE, so all sub-integer scale differences collapse to\nthe same hash contribution. The equal() function compares the full float scale,\nso correctness is preserved, but the hash quality is poor: every glyph at scales\nin [1,2) hashes identically w.r.t. scale, causing extra hash collisions in a hot\ncache. Intent was almost certainly `(guint) (glyph->scale * PANGO_SCALE)`.","fix":"Parenthesize so the multiply happens in float: `((guint) (glyph->scale * PANGO_SCALE))`.","locations":[{"ref":"gsk/gpu/gskgpucachedglyph.c:57-66","code":"   57 | static guint\n   58 | gsk_gpu_cached_glyph_hash (gconstpointer data)\n   59 | {\n   60 |   const GskGpuCachedGlyph *glyph = data;\n   61 | \n   62 |   return GPOINTER_TO_UINT (glyph->font) ^\n   63 |          glyph->glyph ^\n   64 |          (glyph->flags << 24) ^\n   65 |          ((guint) glyph->scale * PANGO_SCALE);\n   66 | }"}]},{"id":"OTHER_26","type":"other","type_label":"Other","severity":"low","description":"NULL image not handled in the glyph fallback path. When the glyph does not fit in\nan atlas, gsk_gpu_device_create_upload_image() may return NULL (documented as\nnullable when the size is too large or on OOM). The result is stored directly\ninto `image` and then `cache->image = image` (NULL) and passed to\ngsk_gpu_upload_cairo_into_op(), and the function returns cache->image == NULL or\ncrashes downstream. Other lookup paths (fill/stroke) explicitly check\n`if (image == NULL) return NULL;` for the same call. Additionally, the\ncreate_upload_image() call statement ends with a comma operator (`,`) instead of\na semicolon (line 212), a copy/paste typo that happens to compile.","fix":"After creating the fallback image, handle NULL (return NULL / bail out) as the\nfill/stroke caches do, and replace the trailing `,` on the create_upload_image()\nstatement with `;`.","locations":[{"ref":"gsk/gpu/gskgpucachedglyph.c:210-221","code":"  210 |   else\n  211 |     {\n  212 |       image = gsk_gpu_device_create_upload_image (gsk_gpu_cache_get_device (self), FALSE, GDK_MEMORY_DEFAULT, FALSE, rect.size.width, rect.size.height),\n  213 |       area.x = 0;\n  214 |       area.y = 0;\n  215 |       area.width = rect.size.width;\n  216 |       area.height = rect.size.height;\n  217 |       rect.origin.x = 0;\n  218 |       rect.origin.y = 0;\n  219 |       padding = 0;\n  220 |       cache = gsk_gpu_cached_new (self, &GSK_GPU_CACHED_GLYPH_CLASS);\n  221 |     }"}]},{"id":"OTHER_27","type":"other","type_label":"Other","severity":"low","description":"Suspicious / incomplete condition in the debug print of the globals op. The check\n`if (instance->clip_mask_rect[2] > 0 && instance->clip_mask_rect[3])` tests\nelement [2] (width) with `> 0` but element [3] (height) only for truthiness (no\ncomparison), so a negative height (which is intentionally produced for flipped GL\ntargets in gsk_gpu_render_pass_prepare_shader, gskgpurenderpass.c:311-315) would\nstill be considered \"has mask\". This is only a debug-print path so impact is\ncosmetic, but the asymmetry between the two checks looks like a copy/paste\noversight.","fix":"Make both checks consistent, e.g. `clip_mask_rect[2] > 0 && clip_mask_rect[3] != 0` (or use fabs for height).","locations":[{"ref":"gsk/gpu/gskgpuglobalsop.c:43-47","code":"   43 |   if (instance->clip_mask_rect[2] > 0 && instance->clip_mask_rect[3])\n   44 |     {\n   45 |       g_string_append (string, \"mask \");\n   46 |       gsk_gpu_print_rect (string, instance->clip_mask_rect);\n   47 |     }"}]},{"id":"OTHER_28","type":"other","type_label":"Other","severity":"low","description":"Redundant re-initialization of the clip in gsk_gpu_render_pass_draw_clip_mask().\nself->clip is set with gsk_gpu_clip_init_empty(&self->clip, &self->offset, &bounds)\nat line 1202, then modified by gsk_gpu_render_pass_push_clip_device_rect() at line\n1203, and then unconditionally reset to the same empty clip again at line 1216.\nThe second init silently discards whatever push_clip_device_rect computed. Either\nthe line-1203 push is pointless for self->clip, or the line-1216 reset is a bug\nthat throws away the intended clip; the duplicated \"We can reset things now\"\ncomment (lines 1200 and 1215) suggests a copy/paste leftover.","fix":"Clarify intent: remove the redundant gsk_gpu_clip_init_empty() at line 1216 if the\npush_clip_device_rect result should be kept, or remove the push if the empty clip\nis what is wanted. Drop the duplicated comment.","locations":[{"ref":"gsk/gpu/gskgpurenderpass.c:1200-1217","code":" 1200 |   /* We can reset things now, the mask does it all */\n 1201 |   gsk_gpu_clip_init_copy (&old_clip, &self->clip);\n 1202 |   gsk_gpu_clip_init_empty (&self->clip, &self->offset, &bounds);\n 1203 |   gsk_gpu_render_pass_push_clip_device_rect (self, &area, storage);\n 1204 |   gsk_gpu_clip_init_copy (&storage->clip, &old_clip);\n 1205 |   storage->clip_mask = self->clip_mask;\n 1206 |   storage->clip_mask_rect = self->clip_mask_rect;\n 1207 |   storage->clip_mask_has_opacity = self->clip_mask_has_opacity;\n 1208 |   storage->opacity = self->opacity;\n 1209 |   storage->modified |= GSK_GPU_GLOBAL_CLIP | GSK_GPU_GLOBAL_MASK;\n 1210 | \n 1211 |   self->clip_mask = image;\n 1212 |   self->clip_mask_has_opacity |= self->opacity < 1.0;\n 1213 |   self->opacity = 1.0;\n 1214 |   self->clip_mask_rect = GSK_RECT_INIT_CAIRO (&area);\n 1215 |   /* We can reset things now, the mask does it all */\n 1216 |   gsk_gpu_clip_init_empty (&self->clip, &self->offset, &bounds);\n 1217 |   self->pending_globals |= storage->modified;"}]},{"id":"OTHER_29","type":"other","type_label":"Other","severity":"low","description":"Off-by-one bounds assertion. blend_attachment_states[] has G_N_ELEMENTS == 8\nvalid indices (0..7), but the guard is `g_assert (blend <= G_N_ELEMENTS(...))`,\nwhich permits blend == 8 and then does an out-of-bounds read at\n`&blend_attachment_states[blend]` (line 381). GskGpuBlend currently only reaches\n7 (MASK_INV_ALPHA), so it does not trigger today, but the assertion is wrong and\nprovides no protection against an OOB array access if a new blend mode is added.","fix":"Use `g_assert (blend < G_N_ELEMENTS (blend_attachment_states));`.","locations":[{"ref":"gsk/gpu/gskvulkanpipeline.c:254","code":"  254 |   g_assert (blend <= G_N_ELEMENTS (blend_attachment_states));"},{"ref":"gsk/gpu/gskvulkanpipeline.c:381","code":"  381 |                                                    .pAttachments = &blend_attachment_states[blend],"}]},{"id":"OTHER_30","type":"other","type_label":"Other","severity":"low","description":"gsk_blend_node_draw() emits a g_warning() but then proceeds to draw in the wrong color state when ccs is not sRGB ('blend node in non-srgb colorstate isnt implemented yet.'). This is unbounded log spam on every draw in HDR/wide-gamut output and produces visibly wrong colors rather than a graceful fallback. (Acknowledged as not-yet-implemented; flagged because it warns per-frame on the draw path.)","fix":"Gate the warning behind a one-shot (g_warning_once / a static guard) or a debug\nflag, and/or implement a proper color-state conversion path.","locations":[{"ref":"gsk/gskblendnode.c:115-116","code":"  115 |   if (!gdk_color_state_equal (data->ccs, GDK_COLOR_STATE_SRGB))\n  116 |     g_warning (\"blend node in non-srgb colorstate isn't implemented yet.\");"}]},{"id":"OTHER_31","type":"other","type_label":"Other","severity":"low","description":"gsk_cairo_renderer_render_texture() tiling fallback for very large viewports does not null-check the recursive gsk_cairo_renderer_render_texture() result before gdk_texture_download()/g_object_unref(). If a tile ever returns NULL (e.g. an allocation failure inside the recursive call), this dereferences NULL. Also stride = width * 4 is computed in int (width up to >32767 in this branch) which can overflow before being widened to gsize for g_malloc_n; only the malloc arg is overflow-checked, not the stride expression.","fix":"Compute stride as a gsize ((gsize) width * 4) and guard the recursive texture\nresult against NULL before downloading/unreffing.","locations":[{"ref":"gsk/gskcairorenderer.c:102-131","code":"  102 |   if (width > MAX_IMAGE_SIZE || height > MAX_IMAGE_SIZE)\n  103 |     {\n  104 |       gsize x, y, size, stride;\n  105 |       GBytes *bytes;\n  106 |       guchar *data;\n  107 | \n  108 |       stride = width * 4;\n  109 |       size = stride * height;\n  110 |       data = g_malloc_n (stride, height);\n  111 | \n  112 |       for (y = 0; y < height; y += MAX_IMAGE_SIZE)\n  113 |         {\n  114 |           for (x = 0; x < width; x += MAX_IMAGE_SIZE)\n  115 |             {\n  116 |               texture = gsk_cairo_renderer_render_texture (renderer, root, \n  117 |                                                            &GRAPHENE_RECT_INIT (x, y,\n  118 |                                                                                 MIN (MAX_IMAGE_SIZE, viewport->size.width - x),\n  119 |                                                                                 MIN (MAX_IMAGE_SIZE, viewport->size.height - y)));\n  120 |               gdk_texture_download (texture,\n  121 |                                     data + stride * y + x * 4,\n  122 |                                     stride);\n  123 |               g_object_unref (texture);\n  124 |             }\n  125 |         }\n  126 | \n  127 |       bytes = g_bytes_new_take (data, size);\n  128 |       texture = gdk_memory_texture_new (width, height, GDK_MEMORY_DEFAULT, bytes, stride);\n  129 |       g_bytes_unref (bytes);\n  130 |       return texture;\n  131 |     }"}]},{"id":"OTHER_32","type":"other","type_label":"Other","severity":"low","description":"parse_d3d12_texture() is declared to return GdkTexture* but, on the Windows path when gdk_d3d12_resource_new_from_bytes() fails, it `return FALSE;` (i.e. returns the integer 0 cast to a pointer). While FALSE happens to equal NULL on these platforms, returning a boolean from a pointer-returning function is incorrect and fragile.","fix":"Return NULL instead of FALSE.","locations":[{"ref":"gsk/gskrendernodeparser.c:1052-1065","code":" 1052 | #ifdef GDK_WINDOWING_WIN32\n 1053 |   resource = gdk_d3d12_resource_new_from_bytes (g_bytes_get_data (bytes, NULL),\n 1054 |                                                 &layout,\n 1055 |                                                 &error);\n 1056 |   if (resource == NULL)\n 1057 |     {\n 1058 |       gtk_css_parser_emit_error (parser,\n 1059 |                                 &start_location,\n 1060 |                                 gtk_css_parser_get_end_location (parser),\n 1061 |                                 error);\n 1062 |       g_bytes_unref (bytes);\n 1063 |       gdk_color_state_unref (color_state);\n 1064 |       return FALSE;\n 1065 |     }"}]},{"id":"OTHER_33","type":"other","type_label":"Other","severity":"low","description":"In gtk_cell_renderer_progress_init the assignment of the default orientation is terminated with a comma operator instead of a semicolon: `priv->orientation = GTK_ORIENTATION_HORIZONTAL,`. This compiles because the comma sequences into the following statement (`priv->inverted = FALSE;`), so it happens to be harmless, but it is a typo and a maintenance hazard: any future edit that reorders or inserts a line between these two statements could silently change behaviour.","fix":"Replace the trailing comma with a semicolon.","locations":[{"ref":"gtk/deprecated/gtkcellrendererprogress.c:713-714","code":"  713 |   priv->orientation = GTK_ORIENTATION_HORIZONTAL,\n  714 |   priv->inverted = FALSE;"}]},{"id":"OTHER_34","type":"other","type_label":"Other","severity":"low","description":"Potential 1-byte over-read in the <lookup> text handler: `while (g_ascii_isspace (*text) && text_len > 0)` dereferences *text before testing text_len > 0. GMarkup text is not NUL-terminated, so when text_len == 0 this reads one byte past the valid region. The operand order should test the length first.","fix":"Swap the operands: `while (text_len > 0 && g_ascii_isspace (*text))`.","locations":[{"ref":"gtk/gtkbuilderparser.c:2281-2285","code":" 2281 |       while (g_ascii_isspace (*text) && text_len > 0)\n 2282 |         {\n 2283 |           text++;\n 2284 |           text_len--;\n 2285 |         }"}]},{"id":"OTHER_35","type":"other","type_label":"Other","severity":"low","description":"create_default_times() divides by `n`, where for non-discrete calc modes `n = n_values - 1`. If it is ever called with n_values == 1 (non-discrete), `n` becomes 0 and `d = i / (double) n` yields 0.0/0.0 = NaN for i==0. Current callers in parse_value_animation_attrs() are guarded by later `times->len < 2` / values length checks (gtk/svg/gtksvgparser.c:1145), so the NaN array is rejected before use, but the helper itself has no guard and would silently produce NaN times if reused elsewhere.","fix":"Assert or early-return when n_values < 2 for non-discrete calc modes before dividing by n.","locations":[{"ref":"gtk/svg/gtksvgparser.c:642-663","code":"  642 | static GArray *\n  643 | create_default_times (CalcMode      calc_mode,\n  644 |                       unsigned int  n_values)\n  645 | {\n  646 |   GArray *times;\n  647 |   double n;\n  648 | \n  649 |   if (calc_mode == CALC_MODE_DISCRETE)\n  650 |     n = n_values;\n  651 |   else\n  652 |     n = n_values - 1;\n  653 | \n  654 |   times = g_array_new (FALSE, FALSE, sizeof (double));\n  655 | \n  656 |   for (unsigned int i = 0; i < n_values; i++)\n  657 |     {\n  658 |       double d = i / (double) n;\n  659 |       g_array_append_val (times, d);\n  660 |     }\n  661 | \n  662 |   return times;\n  663 | }"}]},{"id":"OTHER_36","type":"other","type_label":"Other","severity":"low","description":"svg_transform_size() computes `sizeof (SvgTransform) + (n - 1) * sizeof (PrimitiveTransform)` with n an unsigned int. If ever called with n == 0 the `(n - 1)` underflows to UINT_MAX and the multiplication overflows, producing a bogus (likely huge or wrapped) allocation size. All current callers pass n >= 1, so this is latent, but it is an unguarded unsigned-underflow trap in an allocation-size helper.","fix":"Guard against n == 0 (e.g. `g_assert (n >= 1)`), or use `n > 0 ? n - 1 : 0` as done in svg_numbers_size()/svg_dash_array_size().","locations":[{"ref":"gtk/svg/gtksvgtransform.c:81-85","code":"   81 | static unsigned int\n   82 | svg_transform_size (unsigned int n)\n   83 | {\n   84 |   return sizeof (SvgTransform) + (n - 1) * sizeof (PrimitiveTransform);\n   85 | }"}]},{"id":"OTHER_37","type":"other","type_label":"Other","severity":"negligible","description":"gtk/roaring/roaring.c is an amalgamated, vendored copy of CRoaring 4.3.5, modified only to\nsilence compiler warnings and to normalize #if/#ifdef usage for portability (per the file\nheader and git history). The audited GTK-local changes are sound: in particular the\n`#if CROARING_IS_X64` -> `#ifdef CROARING_IS_X64` conversions are semantically equivalent\nbecause CROARING_IS_X64 is only ever `#define`d to 1 on x64 and `#undef`ined elsewhere\n(roaring.h:109-126), never defined to 0. The 27k lines of upstream algorithm code\n(containers, galloping/merge, bitset arithmetic) were not line-audited as they are not\nGTK-authored; no GTK-introduced defect was found in the diff-bearing changes.","fix":"No action; keep the vendored copy in sync with upstream CRoaring and re-apply only the warning/portability shims.","locations":[{"ref":"gtk/roaring/roaring.c:1-40","code":"    1 | /*\n    2 |  * Amalgamated copy of CRoaring 4.3.5, modified for GTK to reduce compiler\n    3 |  * warnings.\n    4 |  *\n    5 |  * Copyright 2016-2022 The CRoaring authors\n    6 |  * Copyright 2025 Red Hat, Inc\n    7 |  *\n    8 |  * Licensed under the Apache License, Version 2.0 (the \"License\");\n    9 |  * you may not use this file except in compliance with the License.\n   10 |  * You may obtain a copy of the License at\n   11 |  *\n   12 |  *    http://www.apache.org/licenses/LICENSE-2.0\n   13 |  *\n   14 |  * Unless required by applicable law or agreed to in writing, software\n   15 |  * distributed under the License is distributed on an \"AS IS\" BASIS,\n   16 |  * WITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express or implied.\n   17 |  * See the License for the specific language governing permissions and\n   18 |  * limitations under the License.\n   19 |  *\n   20 |  * SPDX-License-Identifier: Apache-2.0\n   21 |  */\n   22 | \n   23 | #include \"roaring.h\"\n   24 | \n   25 | #if defined (__GNUC__)\n   26 | _Pragma (\"GCC diagnostic ignored \\\"-Wswitch-default\\\"\")\n   27 | _Pragma (\"GCC diagnostic ignored \\\"-Wredundant-decls\\\"\")\n   28 | _Pragma (\"GCC diagnostic ignored \\\"-Wunused-function\\\"\")\n   29 | _Pragma (\"GCC diagnostic ignored \\\"-Wnull-dereference\\\"\")\n   30 | #elif defined (__clang__)\n   31 | _Pragma (\"clang diagnostic ignored \\\"-Wswitch-default\\\"\")\n   32 | _Pragma (\"clang diagnostic ignored \\\"-Wredundant-decls\\\"\")\n   33 | _Pragma (\"clang diagnostic ignored \\\"-Wunused-function\\\"\")\n   34 | _Pragma (\"clang diagnostic ignored \\\"-Wnull-dereference\\\"\")\n   35 | #endif\n   36 | \n   37 | /* used for http://dmalloc.com/ Dmalloc - Debug Malloc Library */\n   38 | #ifdef DMALLOC\n   39 | #include \"dmalloc.h\"\n   40 | #endif"},{"ref":"gtk/roaring/roaring.h:109-126","code":"  109 | #if defined(__x86_64__) || defined(_M_X64)\n  110 | // we have an x64 processor\n  111 | #define CROARING_IS_X64 1\n  112 | \n  113 | #if defined(_MSC_VER) && (_MSC_VER < 1910)\n  114 | // Old visual studio systems won't support AVX2 well.\n  115 | #undef CROARING_IS_X64\n  116 | #endif\n  117 | \n  118 | #if defined(__clang_major__) && (__clang_major__ <= 8) && !defined(__AVX2__)\n  119 | // Older versions of clang have a bug affecting us\n  120 | // https://stackoverflow.com/questions/57228537/how-does-one-use-pragma-clang-attribute-push-with-c-namespaces\n  121 | #undef CROARING_IS_X64\n  122 | #endif\n  123 | \n  124 | #ifdef ROARING_DISABLE_X64\n  125 | #undef CROARING_IS_X64\n  126 | #endif"}]},{"id":"OTHER_38","type":"other","type_label":"Other","severity":"negligible","description":"gtk/timsort/gtktimsort.c and gtk/timsort/gtktimsort-impl.c are a careful C port of the\nAndroid/Python TimSort (the impl file is multiply #included with WIDTH=4/8/16 and a generic\nvariant). Index arithmetic in the galloping (gallop_left/gallop_right), merge_lo/merge_hi,\nand merge_collapse paths follows the upstream 'POP' (Patrick O. Perry) hardening that fixes\nthe well-known JDK-8072909 stack-invariant bug, and offset overflow is intentionally bounded\nby clamping `ofs` to max_ofs. No out-of-bounds or overflow defect was identified. One minor\nnote: gtk_tim_sort_ensure_capacity() rounds up to a power of two and then allocates\ntmp_length * element_size without an explicit overflow check, but the size is bounded by the\narray being sorted, so it cannot exceed an allocation that already succeeded.","fix":"No action required.","locations":[{"ref":"gtk/timsort/gtktimsort.c:147-174","code":"  147 | static gpointer\n  148 | gtk_tim_sort_ensure_capacity (GtkTimSort *self,\n  149 |                               gsize       min_capacity)\n  150 | {\n  151 |   if (self->tmp_length < min_capacity)\n  152 |     {\n  153 |       /* Compute smallest power of 2 > min_capacity */\n  154 |       gsize new_size = min_capacity;\n  155 |       new_size |= new_size >> 1;\n  156 |       new_size |= new_size >> 2;\n  157 |       new_size |= new_size >> 4;\n  158 |       new_size |= new_size >> 8;\n  159 |       new_size |= new_size >> 16;\n  160 | #if GLIB_SIZEOF_SIZE_T > 4\n  161 |       new_size |= new_size >> 32;\n  162 | #endif\n  163 | \n  164 |       new_size++;\n  165 |       if (new_size == 0) /* (overflow) Not bloody likely! */\n  166 |         new_size = min_capacity;\n  167 | \n  168 |       g_free (self->tmp);\n  169 |       self->tmp_length = new_size;\n  170 |       self->tmp = g_malloc (self->tmp_length * self->element_size);\n  171 |   }\n  172 | \n  173 |   return self->tmp;\n  174 | }"},{"ref":"gtk/timsort/gtktimsort-impl.c:265-416","code":"  265 | static gsize\n  266 | gtk_tim_sort(gallop_left) (GtkTimSort *self,\n  267 |                            gpointer    key,\n  268 |                            gpointer    base,\n  269 |                            gsize       len,\n  270 |                            gsize       hint)\n  271 | {\n  272 |   char *hintp = ELEM (base, hint);\n  273 |   gsize last_ofs = 0;\n  274 |   gsize ofs = 1;\n  275 | \n  276 |   g_assert (len > 0 && hint < len);\n  277 |   if (gtk_tim_sort_compare (self, key, hintp) > 0)\n  278 |     {\n  279 |       /* Gallop right until a[hint+last_ofs] < key <= a[hint+ofs] */\n  280 |       gsize max_ofs = len - hint;\n  281 |       while (ofs < max_ofs\n  282 |              && gtk_tim_sort_compare (self, key, ELEM (hintp, ofs)) > 0)\n  283 |         {\n  284 |           last_ofs = ofs;\n  285 |           ofs = (ofs << 1) + 1;                 /* eventually this becomes SIZE_MAX */\n  286 |         }\n  287 |       if (ofs > max_ofs)\n  288 |         ofs = max_ofs;\n  289 | \n  290 |       /* Make offsets relative to base */\n  291 |       last_ofs += hint + 1;              /* POP: we add 1 here so last_ofs stays non-negative */\n  292 |       ofs += hint;\n  293 |     }\n  294 |   else                          /* key <= a[hint] */\n  295 |   /* Gallop left until a[hint-ofs] < key <= a[hint-last_ofs] */\n  296 |     {\n  297 |       const gsize max_ofs = hint + 1;\n  298 |       gsize tmp;\n  299 |       while (ofs < max_ofs\n  300 |              && gtk_tim_sort_compare (self, key, ELEM_REV (hintp, ofs)) <= 0)\n  301 |         {\n  302 |           last_ofs = ofs;\n  303 |           ofs = (ofs << 1) + 1;                 /* no need to check for overflow */\n  304 |         }\n  305 |       if (ofs > max_ofs)\n  306 |         ofs = max_ofs;\n  307 | \n  308 |       /* Make offsets relative to base */\n  309 |       tmp = last_ofs;\n  310 |       last_ofs = hint + 1 - ofs;                 /* POP: we add 1 here so last_ofs stays non-negative */\n  311 |       ofs = hint - tmp;\n  312 |     }\n  313 |   g_assert (last_ofs <= ofs && ofs <= len);\n  314 | \n  315 |   /*\n  316 |    * Now a[last_ofs-1] < key <= a[ofs], so key belongs somewhere\n  317 |    * to the right of last_ofs but no farther right than ofs.  Do a binary\n  318 |    * search, with invariant a[last_ofs - 1] < key <= a[ofs].\n  319 |    */\n  320 |   /* last_ofs++; POP: we added 1 above to keep last_ofs non-negative */\n  321 |   while (last_ofs < ofs)\n  322 |     {\n  323 |       /*gsize m = last_ofs + ((ofs - last_ofs) >> 1); */\n  324 |       /* http://stackoverflow.com/questions/4844165/safe-integer-middle-value-formula */\n  325 |       gsize m = (last_ofs & ofs) + ((last_ofs ^ ofs) >> 1);\n  326 | \n  327 |       if (gtk_tim_sort_compare (self, key, ELEM (base, m)) > 0)\n  328 |         last_ofs = m + 1;                        /* a[m] < key */\n  329 |       else\n  330 |         ofs = m;                        /* key <= a[m] */\n  331 |     }\n  332 |   g_assert (last_ofs == ofs);      /* so a[ofs - 1] < key <= a[ofs] */\n  333 |   return ofs;\n  334 | }\n  335 | \n  336 | /*\n  337 |  * Like gallop_left, except that if the range contains an element equal to\n  338 |  * key, gallop_right returns the index after the rightmost equal element.\n  339 |  *\n  340 |  * @param key the key whose insertion point to search for\n  341 |  * @param base the array in which to search\n  342 |  * @param len the length of the range; must be > 0\n  343 |  * @param hint the index at which to begin the search, 0 <= hint < n.\n  344 |  *     The closer hint is to the result, the faster this method will run.\n  345 |  * @param c the comparator used to order the range, and to search\n  346 |  * @return the int k,  0 <= k <= n such that a[b + k - 1] <= key < a[b + k]\n  347 |  */\n  348 | static gsize\n  349 | gtk_tim_sort(gallop_right) (GtkTimSort *self,\n  350 |                             gpointer    key,\n  351 |                             gpointer    base,\n  352 |                             gsize       len,\n  353 |                             gsize       hint)\n  354 | {\n  355 |   char *hintp = ELEM (base, hint);\n  356 |   gsize ofs = 1;\n  357 |   gsize last_ofs = 0;\n  358 | \n  359 |   g_assert (len > 0 && hint < len);\n  360 | \n  361 |   if (gtk_tim_sort_compare (self, key, hintp) < 0)\n  362 |     {\n  363 |       /* Gallop left until a[hint - ofs] <= key < a[hint - last_ofs] */\n  364 |       gsize max_ofs = hint + 1;\n  365 |       gsize tmp;\n  366 |       while (ofs < max_ofs\n  367 |              && gtk_tim_sort_compare (self, key, ELEM_REV (hintp, ofs)) < 0)\n  368 |         {\n  369 |           last_ofs = ofs;\n  370 |           ofs = (ofs << 1) + 1;                 /* no need to check for overflow */\n  371 |         }\n  372 |       if (ofs > max_ofs)\n  373 |         ofs = max_ofs;\n  374 | \n  375 |       /* Make offsets relative to base */\n  376 |       tmp = last_ofs;\n  377 |       last_ofs = hint + 1 - ofs;\n  378 |       ofs = hint - tmp;\n  379 |     }\n  380 |   else                          /* a[hint] <= key */\n  381 |   /* Gallop right until a[hint + last_ofs] <= key < a[hint + ofs] */\n  382 |     {\n  383 |       gsize max_ofs = len - hint;\n  384 |       while (ofs < max_ofs\n  385 |              && gtk_tim_sort_compare (self, key, ELEM (hintp, ofs)) >= 0)\n  386 |         {\n  387 |           last_ofs = ofs;\n  388 |           ofs = (ofs << 1) + 1;                 /* no need to check for overflow */\n  389 |         }\n  390 |       if (ofs > max_ofs)\n  391 |         ofs = max_ofs;\n  392 | \n  393 |       /* Make offsets relative to base */\n  394 |       last_ofs += hint + 1;\n  395 |       ofs += hint;\n  396 |     }\n  397 |   g_assert (last_ofs <= ofs && ofs <= len);\n  398 | \n  399 |   /*\n  400 |    * Now a[last_ofs - 1] <= key < a[ofs], so key belongs somewhere to\n  401 |    * the right of last_ofs but no farther right than ofs.  Do a binary\n  402 |    * search, with invariant a[last_ofs - 1] <= key < a[ofs].\n  403 |    */\n  404 |   while (last_ofs < ofs)\n  405 |     {\n  406 |       /* gsize m = last_ofs + ((ofs - last_ofs) >> 1); */\n  407 |       gsize m = (last_ofs & ofs) + ((last_ofs ^ ofs) >> 1);\n  408 | \n  409 |       if (gtk_tim_sort_compare (self, key, ELEM (base, m)) < 0)\n  410 |         ofs = m;                        /* key < a[m] */\n  411 |       else\n  412 |         last_ofs = m + 1;                        /* a[m] <= key */\n  413 |     }\n  414 |   g_assert (last_ofs == ofs);      /* so a[ofs - 1] <= key < a[ofs] */\n  415 |   return ofs;\n  416 | }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","description":"Websocket frame parsing reads an attacker-controlled 64-bit payload length for the 127 length form, then validates with `data - buf + payload_len > len`. payload_len is gsize and fully attacker controlled (up to 2^64-1). `data - buf + payload_len` overflows the gsize addition and can wrap to a small value, bypassing the bounds check, after which the de-masking loop `data[i] ^= mask[i%4]` for i in [0, payload_len) and parse_input_message() read/write far out of bounds. This is a remote OOB read/write from the browser-facing websocket.","fix":"After decoding payload_len, reject it if it exceeds a sane maximum or if (gsize)(data - buf) > len - payload_len (computed without overflow), e.g. `if (payload_len > len || (gsize)(data - buf) > len - payload_len) return;`.","locations":[{"ref":"gdk/broadway/broadway-server.c:810-835","code":"  810 |       else if (payload_len == 127)\n  811 |         {\n  812 |           if (len < 10)\n  813 |             return;\n  814 |           payload_len = GUINT64_FROM_BE( *(guint64 *) data );\n  815 |           data += 8;\n  816 |         }\n  817 | \n  8
