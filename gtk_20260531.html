<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"parse_input_message() reads a fixed sequence of `ntohl(*p++)` fields from the websocket frame payload according to the message type, but never checks that the frame payload is large enough to contain those fields. parse_input() only ensures the declared payload_len bytes are present, not that payload_len is large enough for the message type. A BINARY frame with a tiny payload (e.g. 1 byte declared) but a type byte requesting e.g. BROADWAY_EVENT_CONFIGURE_NOTIFY causes many 4-byte reads past the end of input->buffer's data. Remote OOB read from the browser.","fix":"Pass payload_len into parse_input_message and validate that payload_len >= required size for msg.base.type (mirroring get_event_size) before parsing each field; drop the frame otherwise.","locations":[{"ref":"gdk/broadway/broadway-server.c:620-744","code":"  620 | static void\n  621 | parse_input_message (BroadwayInput *input, const unsigned char *message)\n  622 | {\n  623 |   BroadwayServer *server = input->server;\n  624 |   BroadwayInputMsg msg;\n  625 |   guint32 *p;\n  626 |   gint64 time_;\n  627 |   GList *l;\n  628 | \n  629 |   memset (&msg, 0, sizeof (msg));\n  630 | \n  631 |   p = (guint32 *) message;\n  632 | \n  633 |   msg.base.type = ntohl (*p++);\n  634 |   msg.base.serial = ntohl (*p++);\n  635 | \n  636 |   time_ = ntohl (*p++);\n  637 | \n  638 |   if (time_ == 0) {\n  639 |     time_ = server->last_seen_time;\n  640 |   } else {\n  641 |     if (!input->seen_time) {\n  642 |       input->seen_time = TRUE;\n  643 |       /* Calculate time base so that any following times are normalized to start\n  644 |          5 seconds after last_seen_time, to avoid issues that could appear when\n  645 |          a long hiatus due to a reconnect seems to be instant */\n  646 |       input->time_base = time_ - (server->last_seen_time + 5000);\n  647 |     }\n  648 |     time_ = time_ - input->time_base;\n  649 |   }\n  650 | \n  651 |   server->last_seen_time = time_;\n  652 | \n  653 |   msg.base.time = time_;\n  654 | \n  655 |   switch (msg.base.type) {\n  656 |   case BROADWAY_EVENT_ENTER:\n  657 |   case BROADWAY_EVENT_LEAVE:\n  658 |     p = parse_pointer_data (p, &msg.pointer);\n  659 |     update_future_pointer_info (server, &msg.pointer);\n  660 |     msg.crossing.mode = ntohl (*p++);\n  661 |     break;\n  662 | \n  663 |   case BROADWAY_EVENT_POINTER_MOVE: /* Mouse move */\n  664 |     p = parse_pointer_data (p, &msg.pointer);\n  665 |     update_future_pointer_info (server, &msg.pointer);\n  666 |     break;\n  667 | \n  668 |   case BROADWAY_EVENT_BUTTON_PRESS:\n  669 |   case BROADWAY_EVENT_BUTTON_RELEASE:\n  670 |     p = parse_pointer_data (p, &msg.pointer);\n  671 |     update_future_pointer_info (server, &msg.pointer);\n  672 |     msg.button.button = ntohl (*p++);\n  673 |     break;\n  674 | \n  675 |   case BROADWAY_EVENT_SCROLL:\n  676 |     p = parse_pointer_data (p, &msg.pointer);\n  677 |     update_future_pointer_info (server, &msg.pointer);\n  678 |     msg.scroll.dir = ntohl (*p++);\n  679 |     break;\n  680 | \n  681 |   case BROADWAY_EVENT_TOUCH:\n  682 |     p = parse_touch_data (p, &msg.touch);\n  683 |     break;\n  684 | \n  685 |   case BROADWAY_EVENT_KEY_PRESS:\n  686 |   case BROADWAY_EVENT_KEY_RELEASE:\n  687 |     msg.key.surface_id = server->focused_surface_id;\n  688 |     msg.key.key = ntohl (*p++);\n  689 |     msg.key.state = ntohl (*p++);\n  690 |     break;\n  691 | \n  692 |   case BROADWAY_EVENT_GRAB_NOTIFY:\n  693 |   case BROADWAY_EVENT_UNGRAB_NOTIFY:\n  694 |     msg.grab_reply.res = ntohl (*p++);\n  695 |     break;\n  696 | \n  697 |   case BROADWAY_EVENT_CONFIGURE_NOTIFY:\n  698 |     msg.configure_notify.id = ntohl (*p++);\n  699 |     msg.configure_notify.x = ntohl (*p++);\n  700 |     msg.configure_notify.y = ntohl (*p++);\n  701 |     msg.configure_notify.width = ntohl (*p++);\n  702 |     msg.configure_notify.height = ntohl (*p++);\n  703 |     break;\n  704 | \n  705 |   case BROADWAY_EVENT_ROUNDTRIP_NOTIFY:\n  706 |     msg.roundtrip_notify.id = ntohl (*p++);\n  707 |     msg.roundtrip_notify.tag = ntohl (*p++);\n  708 |     msg.roundtrip_notify.local = FALSE;\n  709 | \n  710 |     /* Remove matched outstanding roundtrips */\n  711 |     for (l = server->outstanding_roundtrips; l != NULL; l = l->next)\n  712 |       {\n  713 |         BroadwayOutstandingRoundtrip *rt = l->data;\n  714 | \n  715 |         if (rt->id == msg.roundtrip_notify.id &&\n  716 |             rt->tag == msg.roundtrip_notify.tag)\n  717 |           break;\n  718 |       }\n  719 | \n  720 |     if (l == NULL)\n  721 |       g_warning (\"Got unexpected roundtrip reply for id %d, tag %d\\n\", msg.roundtrip_notify.id, msg.roundtrip_notify.tag);\n  722 |     else\n  723 |       {\n  724 |         BroadwayOutstandingRoundtrip *rt = l->data;\n  725 | \n  726 |         server->outstanding_roundtrips = g_list_delete_link (server->outstanding_roundtrips, l);\n  727 |         g_free (rt);\n  728 |       }\n  729 | \n  730 |     break;\n  731 | \n  732 |   case BROADWAY_EVENT_SCREEN_SIZE_CHANGED:\n  733 |     msg.screen_resize_notify.width = ntohl (*p++);\n  734 |     msg.screen_resize_notify.height = ntohl (*p++);\n  735 |     msg.screen_resize_notify.scale = ntohl (*p++);\n  736 |     break;\n  737 | \n  738 |   default:\n  739 |     g_printerr (\"parse_input_message - Unknown input command %c (%s)\\n\", msg.base.type, message);\n  740 |     break;\n  741 |   }\n  742 | \n  743 |   queue_input_message (server, &msg);\n  744 | }"},{"ref":"gdk/broadway/broadway-server.c:837-851","code":"  837 |       switch (code) {\n  838 |       case BROADWAY_WS_CNX_CLOSE:\n  839 |         break; /* hang around anyway */\n  840 |       case BROADWAY_WS_BINARY:\n  841 |         if (!fin)\n  842 |           {\n  843 | #ifdef DEBUG_WEBSOCKETS\n  844 |             g_warning (\"can't yet accept fragmented input\");\n  845 | #endif\n  846 |           }\n  847 |         else\n  848 |           {\n  849 |             parse_input_message (input, data);\n  850 |           }\n  851 |         break;"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"decode_nodes() parses a node tree from client-supplied data[] of length `len`, but only asserts `*pos < len` once at entry. It then advances *pos via `data[(*pos)++]` for the type/id, the size fields, all `size` data words (line 1874-1876), and recursively for each child, with no per-access bounds check against `len`. Several `size`/`n_children`/`n_stops`/`n_shadows`/`n_chars` values are themselves taken from data[] (lines 1819,1830,1843,1848,1857) and used to size reads and the g_malloc, so a short or malicious node array causes large OOB reads and a node allocation sized from attacker data. Reached from the daemon's BROADWAY_REQUEST_SET_NODES handler.","fix":"Bounds-check *pos against len before every read (type/id, each size word, each data word, and each child recursion), and validate derived counts (n_children, n_stops, n_shadows, n_chars, size) so that the total consumed words never exceed len. Return an error / abort decoding on violation instead of asserting only once.","locations":[{"ref":"gdk/broadway/broadway-server.c:1773-1899","code":" 1773 | static BroadwayNode *\n 1774 | decode_nodes (BroadwayServer *server,\n 1775 |               BroadwaySurface *surface,\n 1776 |               int len,\n 1777 |               guint32 data[],\n 1778 |               GHashTable  *client_texture_map,\n 1779 |               int *pos)\n 1780 | {\n 1781 |   BroadwayNode *node;\n 1782 |   guint32 type, id;\n 1783 |   guint32 i, n_stops, n_shadows, n_chars;\n 1784 |   guint32 size, n_children;\n 1785 |   gint32 texture_offset;\n 1786 |   guint32 hash;\n 1787 |   guint32 transform_type;\n 1788 | \n 1789 |   g_assert (*pos < len);\n 1790 | \n 1791 |   size = 0;\n 1792 |   n_children = 0;\n 1793 |   texture_offset = -1;\n 1794 | \n 1795 |   type = data[(*pos)++];\n 1796 |   id = data[(*pos)++];\n 1797 |   switch (type) {\n 1798 |   case BROADWAY_NODE_REUSE:\n 1799 |     node = g_hash_table_lookup (surface->node_lookup, GINT_TO_POINTER(id));\n 1800 |     g_assert (node != NULL);\n 1801 |     return broadway_node_ref (node);\n 1802 |     break;\n 1803 |   case BROADWAY_NODE_COLOR:\n 1804 |     size = NODE_SIZE_RECT + NODE_SIZE_COLOR;\n 1805 |     break;\n 1806 |   case BROADWAY_NODE_BORDER:\n 1807 |     size = NODE_SIZE_RRECT + 4 * NODE_SIZE_FLOAT + 4 * NODE_SIZE_COLOR;\n 1808 |     break;\n 1809 |   case BROADWAY_NODE_INSET_SHADOW:\n 1810 |   case BROADWAY_NODE_OUTSET_SHADOW:\n 1811 |     size = NODE_SIZE_RRECT + NODE_SIZE_COLOR + 4 * NODE_SIZE_FLOAT;\n 1812 |     break;\n 1813 |   case BROADWAY_NODE_TEXTURE:\n 1814 |     texture_offset = 4;\n 1815 |     size = 5;\n 1816 |     break;\n 1817 |   case BROADWAY_NODE_CONTAINER:\n 1818 |     size = 1;\n 1819 |     n_children = data[*pos];\n 1820 |     break;\n 1821 |   case BROADWAY_NODE_ROUNDED_CLIP:\n 1822 |     size = NODE_SIZE_RRECT;\n 1823 |     n_children = 1;\n 1824 |     break;\n 1825 |   case BROADWAY_NODE_CLIP:\n 1826 |     size = NODE_SIZE_RECT;\n 1827 |     n_children = 1;\n 1828 |     break;\n 1829 |   case BROADWAY_NODE_TRANSFORM:\n 1830 |     transform_type = data[(*pos)];\n 1831 |     size = 1;\n 1832 |     if (transform_type == 0) {\n 1833 |       size += NODE_SIZE_POINT;\n 1834 |     } else if (transform_type == 1) {\n 1835 |       size += NODE_SIZE_MATRIX;\n 1836 |     } else {\n 1837 |       g_assert_not_reached();\n 1838 |     }\n 1839 |     n_children = 1;\n 1840 |     break;\n 1841 |   case BROADWAY_NODE_LINEAR_GRADIENT:\n 1842 |     size = NODE_SIZE_RECT + 2 * NODE_SIZE_POINT;\n 1843 |     n_stops = data[*pos + size++];\n 1844 |     size += n_stops * NODE_SIZE_COLOR_STOP;\n 1845 |     break;\n 1846 |   case BROADWAY_NODE_SHADOW:\n 1847 |     size = 1;\n 1848 |     n_shadows = data[*pos];\n 1849 |     size += n_shadows * NODE_SIZE_SHADOW;\n 1850 |     n_children = 1;\n 1851 |     break;\n 1852 |   case BROADWAY_NODE_OPACITY:\n 1853 |     size = NODE_SIZE_FLOAT;\n 1854 |     n_children = 1;\n 1855 |     break;\n 1856 |   case BROADWAY_NODE_DEBUG:\n 1857 |     n_chars = data[*pos];\n 1858 |     size = 1 + (n_chars + 3) / 4;\n 1859 |     n_children = 1;\n 1860 |     break;\n 1861 |   default:\n 1862 |     g_assert_not_reached ();\n 1863 |   }\n 1864 | \n 1865 |   node = g_malloc (sizeof(BroadwayNode) + (size - 1) * sizeof(guint32) + n_children * sizeof (BroadwayNode *));\n 1866 |   g_ref_count_init (&node->refcount);\n 1867 |   node->type = type;\n 1868 |   node->id = id;\n 1869 |   node->output_id = id;\n 1870 |   node->texture_id = 0;\n 1871 |   node->n_children = n_children;\n 1872 |   node->children = (BroadwayNode **)((char *)node + sizeof(BroadwayNode) + (size - 1) * sizeof(guint32));\n 1873 |   node->n_data = size;\n 1874 |   for (i = 0; i < size; i++)\n 1875 |     {\n 1876 |       node->data[i] = data[(*pos)++];\n 1877 |       if (i == texture_offset)\n 1878 |         {\n 1879 |           node->texture_id = GPOINTER_TO_INT (g_hash_table_lookup (client_texture_map, GINT_TO_POINTER (node->data[i])));\n 1880 |           broadway_server_ref_texture (server, node->texture_id);\n 1881 |           node->data[i] = node->texture_id;\n 1882 |         }\n 1883 |     }\n 1884 | \n 1885 |   for (i = 0; i < n_children; i++)\n 1886 |     node->children[i] = decode_nodes (server, surface, len, data, client_texture_map, pos);\n 1887 | \n 1888 |   hash = node->type << 16;\n 1889 | \n 1890 |   for (i = 0; i < size; i++)\n 1891 |     hash ^= rotl (node->data[i], i);\n 1892 | \n 1893 |   for (i = 0; i < n_children; i++)\n 1894 |     hash ^= rotl (node->children[i]->hash, i);\n 1895 | \n 1896 |   node->hash = hash;\n 1897 | \n 1898 |   return node;\n 1899 | }"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"tiff_io_read passes `extra_types[0]` access guarded only by TIFFGetField returning success, but does not verify the returned `extra` count is > 0. libtiff can return a zero-length EXTRASAMPLES array; dereferencing extra_types[0] then reads out of bounds. Triggerable from a crafted TIFF with samples_per_pixel of 2 or 4 and a malformed/zero EXTRASAMPLES tag.","fix":"Check `if (TIFFGetField (tif, TIFFTAG_EXTRASAMPLES, &extra, &extra_types) && extra > 0)` before reading extra_types[0]; otherwise treat as alpha_samples = -1.","locations":[{"ref":"gdk/loaders/gdktiff.c:454-462","code":"  454 |   if (samples_per_pixel == 2 || samples_per_pixel == 4)\n  455 |     {\n  456 |       guint16 extra;\n  457 |       guint16 *extra_types;\n  458 | \n  459 |       if (TIFFGetField (tif, TIFFTAG_EXTRASAMPLES, &extra, &extra_types))\n  460 |         alpha_samples = extra_types[0];\n  461 |       else\n  462 |         alpha_samples = -1;"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"In linux_dmabuf_format_table(), when a new format table arrives and a previous one must be released, the code munmaps the wrong pointer. It calls `munmap(info->dmabuf_formats, sizeof(DmabufFormat) * info->n_dmabuf_formats)` but `info->dmabuf_formats` is a heap-allocated `DmabufFormats *` (created via g_new0 in dmabuf_formats_new()), NOT the mmap()'d format table. The mmap()'d region is stored in `info->dmabuf_format_table`. This passes a non-mmap heap pointer to munmap() (undefined behavior / crash on most allocators since the address is not page-aligned and was not mmap'd), and additionally leaks the previously mmap'd format table. Compare with dmabuf_formats_info_free() which correctly munmaps info->dmabuf_format_table. This is reachable whenever the compositor sends a second format_table event.","fix":"Munmap the actual mmap'd table and use the previous size, e.g.:\n  if (info->dmabuf_format_table)\n    munmap (info->dmabuf_format_table, info->n_dmabuf_formats * 16);\n  info->n_dmabuf_formats = size / 16;\n  info->dmabuf_format_table = mmap (NULL, size, PROT_READ, MAP_PRIVATE, fd, 0);\nNote n_dmabuf_formats must be updated AFTER computing the old size for the munmap.","locations":[{"ref":"gdk/wayland/gdkdmabuf-wayland.c:119-124","code":"  119 | \n  120 |   if (info->dmabuf_formats)\n  121 |     munmap (info->dmabuf_formats, sizeof (DmabufFormat) * info->n_dmabuf_formats);\n  122 | \n  123 |   info->n_dmabuf_formats = size / 16;\n  124 |   info->dmabuf_format_table = mmap (NULL, size, PROT_READ, MAP_PRIVATE, fd, 0);"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"OOB read with a negative array index when parsing untrusted .node files. parse_glyphs() (in the integer-glyph branch) accepts an arbitrary glyph value directly from the file: `gtk_css_parser_consume_integer(parser, &i); gi.glyph = i;` (PangoGlyph is guint32, so negative ints become large unsigned values). unpack_glyphs() later treats any glyph in the range [PANGO_GLYPH_INVALID_INPUT - MAX_ASCII_GLYPH, PANGO_GLYPH_INVALID_INPUT) (= [0xFFFFFF80, 0xFFFFFFFF)) as an encoded ASCII placeholder and computes `idx = gi->glyph - (PANGO_GLYPH_INVALID_INPUT - MAX_ASCII_GLYPH) - MIN_ASCII_GLYPH`. With PANGO_GLYPH_INVALID_INPUT=0xFFFFFFFF, MAX_ASCII_GLYPH=127, MIN_ASCII_GLYPH=32, a glyph value of 0xFFFFFF80 yields idx = 0 - 32 = -32, and the code then reads `ascii->glyphs[idx]` where `ascii` has only N_ASCII_GLYPHS (95) entries indexed 0..94. idx can range from -32 to +94, so values -32..-1 are out-of-bounds negative reads. A crafted .node file (parsed e.g. by the node-editor, tests, or any app calling gsk_render_node_deserialize) can trigger this OOB read.","fix":"In unpack_glyphs(), bound idx to [0, N_ASCII_GLYPHS): only treat the glyph as a placeholder when `gi->glyph >= PANGO_GLYPH_INVALID_INPUT - N_ASCII_GLYPHS` (i.e. idx >= 0), and additionally assert/verify `idx < N_ASCII_GLYPHS` before indexing ascii->glyphs[idx]. Equivalently compute idx first and `continue`/reject if idx < 0 || idx >= N_ASCII_GLYPHS. The placeholder encoding base used by parse_glyphs (PANGO_GLYPH_INVALID_INPUT - MAX_ASCII_GLYPH + s[i], with s[i] >= MIN_ASCII_GLYPH) and the decode base here are inconsistent and should be aligned.","locations":[{"ref":"gsk/gskrendernodeparser.c:2227-2232","code":" 2227 |           if (!gtk_css_parser_consume_integer (parser, &i))\n 2228 |             {\n 2229 |               pango_glyph_string_free (glyph_string);\n 2230 |               return FALSE;\n 2231 |             }\n 2232 |           gi.glyph = i;"},{"ref":"gsk/gskrendernodeparser.c:3554-3578","code":" 3554 |   for (i = 0; i < glyphs->num_glyphs; i++)\n 3555 |     {\n 3556 |       PangoGlyphInfo *gi = &glyphs->glyphs[i];\n 3557 | \n 3558 |       if (gi->glyph >= PANGO_GLYPH_INVALID_INPUT - MAX_ASCII_GLYPH &&\n 3559 |           gi->glyph < PANGO_GLYPH_INVALID_INPUT)\n 3560 |         {\n 3561 |           PangoGlyph idx = gi->glyph - (PANGO_GLYPH_INVALID_INPUT - MAX_ASCII_GLYPH) - MIN_ASCII_GLYPH;\n 3562 | \n 3563 |           if (ascii == NULL)\n 3564 |             {\n 3565 |               ascii = create_ascii_glyphs (font);\n 3566 |               if (ascii == NULL)\n 3567 |                 return FALSE;\n 3568 |             }\n 3569 | \n 3570 |           if (ascii->glyphs[idx].glyph == PANGO_GLYPH_INVALID_INPUT)\n 3571 |             {\n 3572 |               g_clear_pointer (&ascii, pango_glyph_string_free);\n 3573 |               return FALSE;\n 3574 |             }\n 3575 | \n 3576 |           gi->glyph = ascii->glyphs[idx].glyph;\n 3577 |           gi->geometry.width = ascii->glyphs[idx].geometry.width;\n 3578 |         }"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","description":"gtk_builder_list_item_factory_set_bytes() only assigns self->data when the incoming bytes are NOT already precompiled (the `if (!_gtk_buildable_parser_is_precompiled (...))` branch). When the bytes ARE already in the precompiled 'GBU\\0' format, neither branch sets self->data, so it stays NULL. gtk_builder_list_item_factory_setup() then calls g_bytes_get_data(self->data, NULL) and g_bytes_get_size(self->data) on a NULL GBytes for every list item, causing a NULL dereference / crash. Passing pre-compiled template bytes (e.g. produced by gtk4-builder-tool) is a supported scenario, so this is reachable.","fix":"When the bytes are already precompiled, set `self->data = g_bytes_ref (bytes);` (add an else branch to the `if (!precompiled)` test), so self->data is always non-NULL after set_bytes() succeeds.","locations":[{"ref":"gtk/gtkbuilderlistitemfactory.c:159-195","code":"  159 | static gboolean\n  160 | gtk_builder_list_item_factory_set_bytes (GtkBuilderListItemFactory *self,\n  161 |                                          GBytes                    *bytes)\n  162 | {\n  163 |   if (bytes == NULL)\n  164 |     return FALSE;\n  165 | \n  166 |   if (self->bytes)\n  167 |     {\n  168 |       g_critical (\"Data for GtkBuilderListItemFactory has already been set.\");\n  169 |       return FALSE;\n  170 |     }\n  171 | \n  172 |   self->bytes = g_bytes_ref (bytes);\n  173 | \n  174 |   if (!_gtk_buildable_parser_is_precompiled (g_bytes_get_data (bytes, NULL), g_bytes_get_size (bytes)))\n  175 |     {\n  176 |       GError *error = NULL;\n  177 |       GBytes *data;\n  178 | \n  179 |       data = _gtk_buildable_parser_precompile (g_bytes_get_data (bytes, NULL),\n  180 |                                                g_bytes_get_size (bytes),\n  181 |                                                &error);\n  182 |       if (data == NULL)\n  183 |         {\n  184 |           g_warning (\"Failed to precompile template for GtkBuilderListItemFactory: %s\", error->message);\n  185 |           g_error_free (error);\n  186 |           self->data = g_bytes_ref (bytes);\n  187 |         }\n  188 |       else\n  189 |         {\n  190 |           self->data = data;\n  191 |         }\n  192 |     }\n  193 | \n  194 |   return TRUE;\n  195 | }"},{"ref":"gtk/gtkbuilderlistitemfactory.c:113-116","code":"  113 |   if (!gtk_builder_extend_with_template (builder, G_OBJECT (item), G_OBJECT_TYPE (item),\n  114 |                                          (const char *)g_bytes_get_data (self->data, NULL),\n  115 |                                          g_bytes_get_size (self->data),\n  116 |                                          &error))"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","description":"In gtk_css_number_value_multiply(), the TYPE_ROUND branch reads value->calc.terms[1] when the guard is `value->calc.n_terms > 0` (line 1065). A round() value can legitimately have a single term (round(a) with no step): gtk_css_round_value_new() allocates `b != NULL ? 2 : 1` terms. Since n_terms is always >= 1 for a round value, the `> 0` test is always true and terms[1] is read out of bounds whenever the round value has only one term. The check should be `> 1`.","fix":"Change the guard to `value->calc.n_terms > 1 ? gtk_css_number_value_multiply (value->calc.terms[1], factor) : gtk_css_number_value_new (factor, GTK_CSS_NUMBER)`.","locations":[{"ref":"gtk/gtkcssnumbervalue.c:1062-1070","code":" 1062 |     case TYPE_ROUND:\n 1063 |       {\n 1064 |         GtkCssValue *a = gtk_css_number_value_multiply (value->calc.terms[0], factor);\n 1065 |         GtkCssValue *b = value->calc.n_terms > 0\n 1066 |                            ? gtk_css_number_value_multiply (value->calc.terms[1], factor)\n 1067 |                            : gtk_css_number_value_new (factor, GTK_CSS_NUMBER);\n 1068 | \n 1069 |         return gtk_css_round_value_new (value->calc.mode, a, b);\n 1070 |       }"},{"ref":"gtk/gtkcssnumbervalue.c:1184-1206","code":" 1184 | static GtkCssValue *\n 1185 | gtk_css_round_value_new (guint        mode,\n 1186 |                          GtkCssValue *a,\n 1187 |                          GtkCssValue *b)\n 1188 | {\n 1189 |   GtkCssValue *values[2] = { a, b };\n 1190 |   GtkCssUnit unit;\n 1191 |   double a_, b_, v;\n 1192 | \n 1193 |   if (!units_compatible (a, b))\n 1194 |     return gtk_css_calc_value_new (TYPE_ROUND, mode, values, b != NULL ? 2 : 1);\n 1195 | \n 1196 |   unit = canonical_unit (a->dimension.unit);\n 1197 |   a_ = get_converted_value (a, unit);\n 1198 |   b_ = b ? get_converted_value (b, unit) : 1;\n 1199 | \n 1200 |   v = _round (mode, a_, b_);\n 1201 | \n 1202 |   gtk_css_value_unref (a);\n 1203 |   gtk_css_value_unref (b);\n 1204 | \n 1205 |   return gtk_css_dimension_value_new (v, unit);\n 1206 | }"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","description":"In gtk_css_number_value_get(), the TYPE_ROUND branch reads `terms[1] != NULL ? ... : 1` (line 1671). For a single-term round() value (n_terms == 1, created via gtk_css_round_value_new with b == NULL) only one term pointer is allocated, so dereferencing terms[1] is an out-of-bounds read of the flexible terms[] array. Other multi-arg branches (TYPE_LOG at 1787) correctly gate on n_terms > 1 first; ROUND should too.","fix":"Guard with n_terms: `double b = n_terms > 1 ? gtk_css_number_value_get (terms[1], one_hundred_percent) : 1;`.","locations":[{"ref":"gtk/gtkcssnumbervalue.c:1667-1674","code":" 1667 |     case TYPE_ROUND:\n 1668 |       {\n 1669 |         double a = gtk_css_number_value_get (terms[0], one_hundred_percent);\n 1670 | \n 1671 |         double b = terms[1] != NULL ? gtk_css_number_value_get (terms[1], one_hundred_percent) : 1;\n 1672 | \n 1673 |         return _round (mode, a, b);\n 1674 |       }"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","description":"In response_cb(), the return value of g_variant_lookup(response_data, \"uris\", \"^a&s\", &uris) is not checked, and 'uris' is declared without initialization. If a (malformed or error) portal Response has no 'uris' key, 'uris' is left uninitialized and the subsequent loop 'for (i = 0; uris[i]; i++)' dereferences an indeterminate pointer, causing a crash. A misbehaving or compromised portal could trigger this.","fix":"Initialize 'uris = NULL' and check the return value of g_variant_lookup; only iterate when uris != NULL. Note the '^a&s' format allocates the outer array (g_free(uris) is correct) but the strings are borrowed.","locations":[{"ref":"gtk/gtkfilechoosernativeportal.c:118-119","code":"  118 |   const char **uris;\n  119 |   int i;"},{"ref":"gtk/gtkfilechoosernativeportal.c:125","code":"  125 |   g_variant_lookup (response_data, \"uris\", \"^a&s\", &uris);"},{"ref":"gtk/gtkfilechoosernativeportal.c:178-184","code":"  178 |   g_slist_free_full (self->custom_files, g_object_unref);\n  179 |   self->custom_files = NULL;\n  180 |   for (i = 0; uris[i]; i++)\n  181 |     self->custom_files = g_slist_prepend (self->custom_files, g_file_new_for_uri (uris[i]));\n  182 |   self->custom_files = g_slist_reverse (self->custom_files);\n  183 | \n  184 |   g_free (uris);"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"high","description":"In gtk_text_history_modified_changed(), the undo-queue branch dereferences peek->link.prev without checking it for NULL:\n\n    if ((peek = g_queue_peek_tail (&self->undo_queue)))\n      {\n        if (peek->kind == ACTION_KIND_BARRIER)\n          {\n            if (!(peek = peek->link.prev->data))   // <-- peek->link.prev may be NULL\n              return;\n          }\n        ...\n\nIf the only element in the undo queue is a BARRIER action (so its embedded GList link has prev == NULL), peek->link.prev->data dereferences a NULL pointer and crashes. The symmetric redo-queue branch a few lines below correctly guards this case with `if (peek->link.next == NULL || ...)`, demonstrating that the undo branch is missing the analogous NULL check.","fix":"Guard link.prev like the redo branch guards link.next:\n    if (peek->kind == ACTION_KIND_BARRIER)\n      {\n        if (peek->link.prev == NULL ||\n            !(peek = peek->link.prev->data))\n          return;\n      }","locations":[{"ref":"gtk/gtktexthistory.c:1090-1100","code":" 1090 |   if ((peek = g_queue_peek_tail (&self->undo_queue)))\n 1091 |     {\n 1092 |       if (peek->kind == ACTION_KIND_BARRIER)\n 1093 |         {\n 1094 |           if (!(peek = peek->link.prev->data))\n 1095 |             return;\n 1096 |         }\n 1097 | \n 1098 |       peek->is_modified = !!modified;\n 1099 |       peek->is_modified_set = TRUE;\n 1100 |     }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"high","description":"gtk_paper_size_new_from_ipp() has a copy-paste/logic bug that both reads out of\nbounds and makes the intended check dead. Inside the loop comparing the incoming\n`ipp_name` against the standard `name`, the code does:\n\n    ipp_name[strlen (ipp_name)] == '_' &&\n    g_ascii_isdigit (ipp_name[strlen (ipp_name) + 1])\n\n`ipp_name[strlen(ipp_name)]` is always the NUL terminator, so it can never equal\n'_' (the prefix branch is therefore dead), and `ipp_name[strlen(ipp_name) + 1]`\nreads ONE byte PAST the NUL terminator of the string — an out-of-bounds read on\nattacker/printer-supplied IPP paper-size names. The author clearly meant\n`strlen(name)` (the matched standard prefix), so the separator is checked at\n`ipp_name[strlen(name)]` and the following char at `ipp_name[strlen(name)+1]`.","fix":"Use the length of the matched prefix `name`, not the whole `ipp_name`:\n\n    g_str_has_prefix (ipp_name, name) &&\n    strlen (ipp_name) > strlen (name) + 2 &&\n    ipp_name[strlen (name)] == '_' &&\n    g_ascii_isdigit (ipp_name[strlen (name) + 1]) &&\n    ...\n\n(Compute `strlen(name)` once into a local to avoid repeated calls.)","locations":[{"ref":"gtk/print/gtkpapersize.c:416-419","code":"  416 |             (g_str_has_prefix (ipp_name, name) &&\n  417 |              strlen (ipp_name) > strlen (name) + 2 &&\n  418 |              ipp_name[strlen (ipp_name)] == '_' &&\n  419 |              g_ascii_isdigit (ipp_name[strlen (ipp_name) + 1]) &&"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","description":"get_quadratic_roots() can divide by zero / produce NaN. When the discriminant branch d > 0.0001 is taken, the roots are computed as (-b +/- q)/(2*a) without checking a != 0. a = pa - 2*pb + pc can be 0 (a degenerate quadratic that is actually linear) while still having b != 0 so that d = b*b > 0.0001. This yields +/-inf or NaN roots, which then flow into acceptable()/intersection math. solve_quadratic() in the same file (lines 132-157) handles the a==0 case explicitly; get_quadratic_roots() does not.","fix":"Guard the quadratic branch on fabsf(a) > epsilon and fall back to the linear\nsolution (-c/b) when a is ~0, mirroring solve_quadratic().","locations":[{"ref":"gsk/gskcurveintersect.c:177-210","code":"  177 | static int\n  178 | get_quadratic_roots (float pa, float pb, float pc, float roots[2])\n  179 | {\n  180 |   float a, b, c, d;\n  181 |   int n_roots = 0;\n  182 | \n  183 |   a = pa - 2 * pb + pc;\n  184 |   b = 2 * (pb - pa);\n  185 |   c = pa;\n  186 | \n  187 |   d = b*b - 4*a*c;\n  188 | \n  189 |   if (d > 0.0001)\n  190 |     {\n  191 |       float q = sqrtf (d);\n  192 |       roots[n_roots] = (-b + q) / (2 * a);\n  193 |       if (acceptable (roots[n_roots]))\n  194 |         n_roots++;\n  195 |       roots[n_roots] = (-b - q) / (2 * a);\n  196 |       if (acceptable (roots[n_roots]))\n  197 |         n_roots++;\n  198 |     }\n  199 |   else if (fabsf (d) < 0.0001)\n  200 |     {\n  201 |       roots[n_roots] = -b / (2 * a);\n  202 |       if (acceptable (roots[n_roots]))\n  203 |         n_roots++;\n  204 |     }\n  205 | \n  206 |   return n_roots;\n  207 | }\n  208 | \n  209 | static float\n  210 | cuberoot (float v)"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","description":"gtk_css_tokenizer_read_ident_like() scans past the buffer end. After consuming\nthe '(' that follows an ident, it peeks ahead for the special-case `url(`:\n\n    const char *data = tokenizer->data;\n    while (is_whitespace (*data))\n      data++;\n    if (*data != '\"' && *data != '\\'')\n\nThe while loop and the subsequent dereference have no `data < tokenizer->end`\nbound check. For untrusted CSS that ends in `url(` followed only by whitespace\n(or `url(` exactly at end of buffer), `*data` dereferences memory at/after\ntokenizer->end. GBytes data is not guaranteed NUL-terminated, so this is an OOB\nread on attacker-controlled CSS.","fix":"Bound the look-ahead by tokenizer->end:\n\n    const char *data = tokenizer->data;\n    while (data < tokenizer->end && is_whitespace (*data))\n      data++;\n    if (data < tokenizer->end && *data != '\"' && *data != '\\'')\n      return gtk_css_tokenizer_read_url (tokenizer, token, error);","locations":[{"ref":"gtk/css/gtkcsstokenizer.c:1049-1054","code":" 1049 |           const char *data = tokenizer->data;\n 1050 | \n 1051 |           while (is_whitespace (*data))\n 1052 |             data++;\n 1053 | \n 1054 |           if (*data != '\"' && *data != '\\'')"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","description":"add_palette() divides the swatch index by colors_per_line (line / pos computation, and max_custom computation), but colors_per_line is taken unvalidated from the public deprecated API gtk_color_chooser_add_palette() -> gtk_color_chooser_widget_add_palette(). If a caller passes colors_per_line == 0, this is an integer division by zero, crashing the process. The vertical branch also computes n_colors / colors_per_line.","fix":"Validate colors_per_line > 0 (e.g. g_return_if_fail or clamp to at least 1) in gtk_color_chooser_widget_add_palette()/add_palette() before using it as a divisor.","locations":[{"ref":"gtk/gtkcolorchooserwidget.c:400-401","code":"  400 |       line = i / colors_per_line;\n  401 |       pos = i % colors_per_line;"},{"ref":"gtk/gtkcolorchooserwidget.c:426","code":"  426 |     cc->max_custom = MAX (cc->max_custom, n_colors / colors_per_line);"},{"ref":"gtk/gtkcolorchooserwidget.c:874-884","code":"  874 | static void\n  875 | gtk_color_chooser_widget_add_palette (GtkColorChooser *chooser,\n  876 |                                       GtkOrientation   orientation,\n  877 |                                       int              colors_per_line,\n  878 |                                       int              n_colors,\n  879 |                                       GdkRGBA         *colors)\n  880 | {\n  881 |   GtkColorChooserWidget *cc = GTK_COLOR_CHOOSER_WIDGET (chooser);\n  882 | \n  883 |   remove_default_palette (cc);\n  884 |   add_palette (cc, orientation, colors_per_line, n_colors, colors, NULL);"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","description":"gtk_css_image_radial_transition() decides whether to transition the transition_hint solely from start_stop->transition_hint (line 690), unlike the linear version which first verifies `(start_stop->transition_hint != NULL) != (end_stop->transition_hint != NULL)` and bails out on mismatch (gtkcssimagelinear.c:701-702). If start_stop has a hint but end_stop does not, the radial code calls gtk_css_value_transition(start_stop->transition_hint, end_stop->transition_hint /* NULL */, ...), passing a NULL value, which can crash or produce garbage.","fix":"Mirror the linear code: add `if ((start_stop->transition_hint != NULL) != (end_stop->transition_hint != NULL)) goto fail;` before interpolating the hint.","locations":[{"ref":"gtk/gtkcssimageradial.c:687-702","code":"  687 |       if ((start_stop->offset != NULL) != (end_stop->offset != NULL))\n  688 |         goto fail;\n  689 | \n  690 |       if (start_stop->transition_hint == NULL)\n  691 |         {\n  692 |           stop->transition_hint = NULL;\n  693 |         }\n  694 |       else\n  695 |         {\n  696 |           stop->transition_hint = gtk_css_value_transition (start_stop->transition_hint,\n  697 | es `BIT(n) = (G_GUINT64_CONSTANT(1) << (n))` (gtk/svg/gtksvgutilsprivate.h:40). The gpa:state-names attribute is attacker-controlled; providing more than 64 names sets svg->n_state_names > 64 (gtk/svg/gtksvg.c:2543). find_named_state() then returns indices >= 64 (gtk/svg/gtksvggpa.c:84-91), and parse_states_css() executes `*states |= BIT(u)` with u >= 64 (gtk/svg/gtksvggpa.c:132), which is a shift count >= width of the type — undefined behavior, and silently corrupts the state mask. Other state logic (apply_state, max_state via g_bit_nth_msf) also assumes <= 64 states.","fix":"Reject (return FALSE) in gtk_svg_set_state_names() when g_strv_length(names) > 64.","locations":[{"ref":"gtk/svg/gtksvg.c:2529-2545","code":" 2529 | gtk_svg_set_state_names (GtkSvg      *svg,\n 2530 |                          const char **names)\n 2531 | {\n 2532 |   for (unsigned int i = 0; names[i]; i++)\n 2533 |     {\n 2534 |       if (!valid_state_name (names[i]))\n 2535 |         return FALSE;\n 2536 |     }\n 2537 | \n 2538 |   if (!strv_unique ((GStrv) names))\n 2539 |     return FALSE;\n 2540 | \n 2541 |   g_strfreev (svg->state_names);\n 2542 |   svg->state_names = g_strdupv ((char **) names);\n 2543 |   svg->n_state_names = g_strv_length ((char **) names);\n 2544 |   return TRUE;\n 2545 | }"},{"ref":"gtk/svg/gtksvggpa.c:120-146","code":"  120 |           char *id = gtk_css_parser_consume_ident (parser);\n  121 |           unsigned int u;\n  122 | \n  123 |           if (!find_named_state (svg, id, &u))\n  124 |             {\n  125 |               *states = NO_STATES;\n  126 |               g_free (id);\n  127 |               return FALSE;\n  128 |             }\n  129 | \n  130 |           g_free (id);\n  131 | \n  132 |           *states |= BIT (u);\n  133 |         }\n  134 |       else if (gtk_css_parser_has_integer (parser))\n  135 |         {\n  136 |           int i;\n  137 | \n  138 |           gtk_css_parser_consume_integer (parser, &i);\n  139 |           if (i < 0 || i > en the uri is neither a document nor a tree). The result `file` is passed to g_application_open(app, &file, 1, hint) and then g_object_unref(file) unconditionally, dereferencing/unreffing a possible NULL.","fix":"Check file != NULL after gdk_android_content_file_from_uri and fall back to g_application_activate (or return) if it is NULL.","locations":[{"ref":"gdk/android/gdkandroidinit.c:85-100","code":"   85 | _gdk_android_gdk_context_open (JNIEnv *env, jclass this, jobject uri, jstring jhint)\n   86 | {\n   87 |   GApplication *app = g_application_get_default ();\n   88 |   if (g_application_get_flags (app) & G_APPLICATION_HANDLES_OPEN)\n   89 |     {\n   90 |       GFile *file = gdk_android_content_file_from_uri (uri);\n   91 |       gchar *hint = gdk_android_java_to_utf8 (jhint, NULL);\n   92 |       g_application_open (app, &file, 1, hint);\n   93 |       g_free (hint);\n   94 |       g_object_unref (file);\n   95 |     }\n   96 |   else\n   97 |     {\n   98 |       g_application_activate (app);\n   99 |     }\n  100 | }"},{"ref":"gdk/android/gdkandroidcontentfile.c:1739-1745","code":" 1739 |   else\n 1740 |     {\n 1741 |       g_object_unref (self);\n 1742 |       g_return_val_if_reached (NULL);\n 1743 |     }\n 1744 | \n 1745 |   return (GFile *)self;"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"low","description":"gdk_android_utils_rect_to_gdk computes width/height as abs(right - left) / abs(bottom - top) using int abs(). If the Android Rect carries extreme coordinates such that the subtraction overflows int (e.g. right - left == INT_MIN), abs() is undefined behavior. Rect coordinates come from the Android framework so this is low-risk, but unchecked.","fix":"Compute the difference in 64-bit (gint64) or use MAX-MIN on the bounds before taking the absolute value.","locations":[{"ref":"gdk/android/gdkandroidutils.c:56-71","code":"   56 | GdkRectangle\n   57 | gdk_android_utils_rect_to_gdk (jobject rect)\n   58 | {\n   59 |   JNIEnv *en t (parameters, \"(i)\", &index);\n   63 | \n   64 |       link = gtk_accessible_hypertext_get_link (hypertext, index);\n   65 |       ctx = gtk_accessible_get_at_context (GTK_ACCESSIBLE (link));\n   66 |       ref = gtk_at_spi_context_to_ref (GTK_AT_SPI_CONTEXT (ctx));\n   67 | \n   68 |       g_dbus_method_invocation_return_value (invocation, g_variant_new (\"(@(so))\", ref));\n   69 | \n   70 |       g_object_unref (ctx);\n   71 |     }"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"low","description":"The convert-emoji build tool indexes the English JSON array with the loop index `i` derived\nfrom the locale array length without checking that the English array is at least as long.\n`length` is taken from the locale array (argv[2]) and the loop runs `i < length`, but\njson_array_get_object_element (array_en, i) and json_object_has_member (obj_en, ...) assume\narray_en (argv[1], English) has at least `length` elements. If the locale file has more\nentries than the English file, obj_en is read out of bounds. Build-time tool, but unguarded.","fix":"Clamp the loop to MIN (length, length_en), or skip entries where i >= length_en.","locations":[{"ref":"gtk/emoji/convert-emoji.c:146-171","code":"  146 |   root = json_parser_get_root (parser);\n  147 |   array = json_node_get_array (root);\n  148 |   length = json_array_get_length (array);\n  149 |   root_en = json_parser_get_root (parser_en);\n  150 |   array_en = json_node_get_array (root_en);\n  151 |   length_en = json_array_get_length (array_en);\n  152 | \n  153 |   g_variant_builder_init (&builder, G_VARIANT_TYPE (\"a(aussasasu)\"));\n  154 |   for (i = 0; i < length; i++)\n  155 |   {\n  156 |     JsonObject *obj = json_array_get_object_element (array, i);\n  157 |     JsonObject *obj_en = json_array_get_object_element (array_en, i);\n  158 |     GVariantBuilder b1;\n  159 |     GVariantBuilder b2;\n  160 |     GVariantBuilder b3;\n  161 |     guint group;\n  162 |     const char *name;\n  163 |     const char *name_en;\n  164 |     char *code;\n  165 |     const char *text;\n  166 |     gboolean needs_presentation_selector;\n  167 | \n  168 |     if (!json_object_has_member (obj, \"group\"))\n  169 |       continue;\n  170 |     if (!json_object_has_member (obj_en, \"group\"))\n  171 |       continue;"}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"low","description":"In _gtk_buildable_parser_replay_precompiled() the switch over the decoded record `type` has a `default: g_assert_not_reached ();` but does not set `res`. In a release build (G_DISABLE_ASSERT), g_assert_not_reached() compiles to nothing, so a malformed/corrupt precompiled blob with an unknown record type falls through with `res` uninitialized and is then read at `if (!res) return FALSE;`. The precompiled format is normally internal/trusted, but corrupt GResource data or future format drift would yield undefined behaviour.","fix":"Initialize `res = FALSE;` and in the default branch set an error / return FALSE instead of relying solely on g_assert_not_reached().","locations":[{"ref":"gtk/gtkbuilderprecompile.c:731-753","code":"  731 |   while (tree < data_end)\n  732 |     {\n  733 |       gboolean res;\n  734 |       type = demarshal_uint32 (&tree);\n  735 | \n  736 |       switch (type)\n  737 |         {\n  738 |         case RECORD_TYPE_ELEMENT:\n  739 |           res = replay_start_element (context, &tree, strings, error);\n  740 |           break;\n  741 |         case RECORD_TYPE_END_ELEMENT:\n  742 |           res = replay_end_element (context, &tree, strings, error);\n  743 |           break;\n  744 |         case RECORD_TYPE_TEXT:\n  745 |           res = replay_text (context, &tree, strings, error);\n  746 |           break;\n  747 |         default:\n  748 |           g_assert_not_reached ();\n  749 |         }\n  750 | \n  751 |       if (!res)\n  752 |         return FALSE;\n  753 |     }"}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"low","description":"gtk_css_image_conic_equal() iterates conic1->n_stops and indexes conic2->color_stops[i] without first verifying conic1->n_stops == conic2->n_stops. If two conic gradients with differing stop counts are compared, this reads conic2->color_stops out of bounds. Other CSS image equal implementations and the transition() code guard on n_stops mismatch first; this one does not.","fix":"Add a check `if (conic1->n_stops != conic2->n_stops) return FALSE;` before the per-stop comparison loop.","locations":[{"ref":"gtk/gtkcssimageconic.c:513-538","code":"  513 | static gboolean\n  514 | gtk_css_image_conic_equal (GtkCssImage *image1,\n  515 |                             GtkCssImage *image2)\n  516 | {\n  517 |   GtkCssImageConic *conic1 = (GtkCssImageConic *) image1;\n  518 |   GtkCssImageConic *conic2 = (GtkCssImageConic *) image2;\n  519 |   guint i;\n  520 | \n  521 |   if (!gtk_css_value_equal (conic1->center, conic2->center) ||\n  522 |       !gtk_css_value_equal (conic1->rotation, conic2->rotation) ||\n  523 |       conic1->color_space != conic2->color_space ||\n  524 |       conic1->hue_interp != conic2->hue_interp)\n  525 |     return FALSE;\n  526 | \n  527 |   for (i = 0; i < conic1->n_stops; i++)\n  528 |     {\n  529 |       const GtkCssImageConicColorStop *stop1 = &conic1->color_stops[i];\n  530 |       const GtkCssImageConicColorStop *stop2 = &conic2->color_stops[i];\n  531 | \n  532 |       if (!gtk_css_value_equal0 (stop1->offset, stop2->offset) ||\n  533 |           !gtk_css_value_equal0 (stop1->transition_hint, stop2->transition_hint) ||\n  534 |           !gtk_css_value_equal (stop1->color, stop2->color))\n  535 |         return FALSE;\n  536 |     }\n  537 | \n  538 |   return TRUE;"}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"low","description":"gtk_gesture_zoom_get_scale_delta() returns `distance / priv->initial_distance` without guarding against initial_distance == 0. The internal _gtk_gesture_zoom_check_emit() guards this case (returns FALSE when initial_distance == 0), but the public getter does not, yielding inf/NaN when the gesture began with a zero initial distance (e.g. touchpad pinch where initial distance was never set).","fix":"Return 1.0 when priv->initial_distance == 0 (matching the documented 'not active' behavior).","locations":[{"ref":"gtk/gtkgesturezoom.c:246-260","code":"  246 | double\n  247 | gtk_gesture_zoom_get_scale_delta (GtkGestureZoom *gesture)\n  248 | {\n  249 |   GtkGestureZoomPrivate *priv;\n  250 |   double distance;\n  251 | \n  252 |   g_return_val_if_fail (GTK_IS_GESTURE_ZOOM (gesture), 1.0);\n  253 | \n  254 |   if (!_gtk_gesture_zoom_get_distance (gesture, &distance))\n  255 |     return 1.0;\n  256 | \n  257 |   priv = gtk_gesture_zoom_get_instance_private (gesture);\n  258 | \n  259 |   return distance / priv->initial_distance;\n  260 | }"}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"low","description":"check_icon() in the icon cache validator recurses for each entry in a hash chain (`if (chain_offset != 0xffffffff) check_icon (info, chain_offset)`). A crafted cache with a very long (or self-referential but progressing) chain causes unbounded recursion and a stack overflow. There is no cycle detection or depth limit. The validator is only run under GTK_DEBUG=icontheme, limiting exposure, but it is intended to harden against malicious caches.","fix":"Convert the chain walk to an iterative loop and/or impose a maximum chain depth; the same applies to bounding recursion via attacker-controlled offsets.","locations":[{"ref":"gtk/gtkiconcachevalidator.c:321-345","code":"  321 | static gboolean\n  322 | check_icon (CacheInfo *info,\n  323 |             guint32    offset)\n  324 | {\n  325 |   guint32 chain_offset;\n  326 |   guint32 name_offset;\n  327 |   guint32 image_list_offset;\n  328 | \n  329 |   check (\"offset, icon chain\", get_uint32 (info, offset, &chain_offset));\n  330 |   check (\"offset, icon name\", get_uint32 (info, offset + 4, &name_offset));\n  331 |   check (\"offset, icon image list\", get_uint32 (info, offset + 8,\n  332 |          &image_list_offset));\n  333 | \n  334 |   if (!check_string (info, name_offset))\n  335 |     return FALSE;\n  336 |   if (!check_image_list (info, image_list_offset))\n  337 |     return FALSE;\n  338 |   if (chain_offset != 0xffffffff)\n  339 |     {\n  340 |       if (!check_icon (info, chain_offset))\n  341 |         return FALSE;\n  342 |     }\n  343 | \n  344 |   return TRUE;\n  345 | }"}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"low","description":"gtk_map_list_model_get_item() stores the map function result and immediately calls g_object_add_weak_pointer(node->item, &node->item). If the user map_func returns NULL (allowed by a misbehaving/edge-case mapper), g_object_add_weak_pointer is invoked with a NULL object, producing a GLib critical and leaving the node in an inconsistent state (n_items==1 with item==NULL but treated as mapped).","fix":"Check for a NULL return from map_func and either fall back to returning NULL without caching or assert/handle it explicitly before adding the weak pointer.","locations":[{"ref":"gtk/gtkmaplistmodel.c:199-202","code":"  199 |   node->item = self->map_func (g_list_model_get_item (self->model, position), self->user_data);\n  200 |   g_object_add_weak_pointer (node->item, &node->item);\n  201 | \n  202 |   return node->item;"}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"low","description":"on_selected_item() casts the selected item to GtkTreeListRow and immediately calls gtk_tree_list_row_get_item() without checking for NULL. When the selection is cleared (selected-item becomes NULL, e.g. when the model empties), GTK_TREE_LIST_ROW(NULL)/gtk_tree_list_row_get_item(NULL) is invoked, risking a critical warning or NULL deref.","fix":"Guard: if (selected == NULL) { emit object-selected with NULL or return; } before casting.","locations":[{"ref":"gtk/inspector/object-tree.c:1389-1399","code":" 1389 | static void\n 1390 | on_selected_item (GtkSingleSelection     *selection,\n 1391 |                   GParamSpec             *pspec,\n 1392 |                   GtkInspectorObjectTree *wt)\n 1393 | {\n 1394 |   GObject *selected = gtk_single_selection_get_selected_item (selection);\n 1395 |   GtkTreeListRow *row = GTK_TREE_LIST_ROW (selected);\n 1396 |   GObject *object = gtk_tree_list_row_get_item (row);\n 1397 |   g_signal_emit (wt, signals[OBJECT_SELECTED], 0, object);\n 1398 |   g_object_unref (object);\n 1399 | }"}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"low","description":"_post_send() calls fstat() on the data_io fd but ignores the return value, then\nunconditionally uses data_info.st_size to compute the Content-Length. If fstat\nfails, data_info is uninitialized and a garbage Content-Length is sent. Also uses\nsprintf() into a fixed 255-byte buffer (bounded here, but snprintf is preferable).","fix":"Check fstat()'s return value; on failure fall back to ippGetLength() only or\nfail the request. Replace sprintf with g_snprintf.","locations":[{"ref":"gtk/print/backends/gtkcupsutils.c:730-743","code":"  730 |   char length[255];\n  731 |   struct stat data_info;\n  732 | \n  733 |   GTK_DEBUG (PRINTING, \"CUPS Backend: %s\", G_STRFUNC);\n  734 | \n  735 |   request->poll_state = GTK_CUPS_HTTP_WRITE;\n  736 | \n  737 |   if (request->data_io != NULL)\n  738 |     {\n  739 |       fstat (g_io_channel_unix_get_fd (request->data_io), &data_info);\n  740 |       sprintf (length, \"%lu\", (unsigned long) (ippGetLength (request->ipp_request) + data_info.st_size));\n  741 |     }\n  742 |   else\n  743 |     sprintf (length, \"%lu\", (unsigned long) ippGetLength (request->ipp_request));"}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"low","description":"get_preview_command() calls g_str_has_prefix(preview_cmd, \"evince \") without\nfirst checking that the gtk-print-preview-command setting returned non-NULL. If\nthe setting is unset/NULL (g_object_get yields NULL), g_str_has_prefix(NULL, ...)\ndereferences NULL.","fix":"Guard with `if (preview_cmd && g_str_has_prefix (preview_cmd, \"evince \"))`.","locations":[{"ref":"gtk/print/gtkprintoperation-unix.c:238-240","code":"  238 |   g_object_get (settings, \"gtk-print-preview-command\", &preview_cmd, NULL);\n  239 | \n  240 |   if (g_str_has_prefix (preview_cmd, \"evince \"))"}]},{"id":"PANIC_36","type":"panic","type_label":"Panic","severity":"negligible","description":"gtk_inscription_get_layout_index() computes `cluster = self->text + *index` where self->text may be NULL when no text has been set. With an empty layout pango_layout_xy_to_index() returns index 0 and trailing 0, so the pointer arithmetic is `NULL + 0` and the while loop does not run, but `NULL + 0` is technically undefined behavior and the code path is reachable from link/tooltip hit-testing on an empty inscription.","fix":"Guard with `if (self->text == NULL) { *index = 0; return FALSE; }` before doing pointer arithmetic on self->text.","locations":[{"ref":"gtk/gtkinscription.c:489-497","code":"  489 |   cluster = self->text + *index;\n  490 |   cluster_end = cluster;\n  491 |   while (trailing)\n  492 |     {\n  493 |       cluster_end = g_utf8_next_char (cluster_end);\n  494 |       --trailing;\n  495 |     }\n  496 | \n  497 |   *index += (cluster_end - cluster);"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"GtkFontFilter stores the PangoContext without taking a reference (self->pango_context = context) and never unrefs it (there is no finalize/dispose). The context is later dereferenced in gtk_font_filter_match() via pango_context_load_font(self->pango_context, desc). If the context is freed by its owner while the filter is alive (filters typically outlive transient contexts, e.g. when reused across font-chooser instances), this is a use-after-free / dangling pointer.","fix":"Use g_set_object(&self->pango_context, context) in the setter and add a finalize/dispose that does g_clear_object(&self->pango_context).","locations":[{"ref":"gtk/gtkfontfilter.c:200-212","code":"  200 | void\n  201 | _gtk_font_filter_set_pango_context (GtkFontFilter *self,\n  202 |                                     PangoContext  *context)\n  203 | {\n  204 |   g_return_if_fail (GTK_IS_FONT_FILTER (self));\n  205 |   g_return_if_fail (PANGO_IS_CONTEXT (context));\n  206 | \n  207 |   if (self->pango_context == context)\n  208 |     return;\n  209 | \n  210 |   self->pango_context = context;\n  211 |   g_object_notify_by_pspec (G_OBJECT (self), properties[PROP_PANGO_CONTEXT]);\n  212 | }"},{"ref":"gtk/gtkfontfilter.c:28-36","code":"   28 | struct _GtkFontFilter\n   29 | {\n   30 |   GtkFilter parent_instance;\n   31 | \n   32 |   PangoContext *pango_context;\n   33 | \n   34 |   gboolean monospace;\n   35 |   PangoLanguage *language;\n   36 | };"},{"ref":"gtk/gtkfontfilter.c:132","code":"  132 |       font = pango_context_load_font (self->pango_context, desc);"}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"Type confusion / out-of-bounds read in the numeric sort-keys is_compatible function. The NUMERIC_SORT_KEYS macro generates gtk_<type>_sort_keys_is_compatible() which receives GtkSortKeys* arguments (the real objects are small GtkNumericSortKeys = {GtkSortKeys keys; GtkExpression *expression;}) but casts them to GtkNumericSorter* ('GtkNumericSorter *self = (GtkNumericSorter *) keys;' and likewise for other) and then reads self->expression / compare->expression. GtkNumericSorter has a completely different (much larger) layout (GtkSorter/GObject parent + sort_order + expression), so ->expression is read from a wrong, out-of-bounds offset relative to the GtkNumericSortKeys allocation. This both reads past the allocated key object and compares the wrong fields, so sort-keys compatibility (used when merging/optimizing sorters) is computed from garbage.","fix":"Cast to the correct key type: 'GtkNumericSortKeys *self = (GtkNumericSortKeys *) keys; GtkNumericSortKeys *compare = (GtkNumericSortKeys *) other;' and compare self->expression == compare->expression.","locations":[{"ref":"gtk/gtknumericsorter.c:186-198","code":"  186 | static gboolean \\\n  187 | gtk_ ## type ## _sort_keys_is_compatible (GtkSortKeys *keys, \\\n  188 |                                           GtkSortKeys *other) \\\n  189 | { \\\n  190 |   GtkNumericSorter *self = (GtkNumericSorter *) keys; \\\n  191 |   GtkNumericSorter *compare = (GtkNumericSorter *) other; \\\n  192 | \\\n  193 |   if (other->klass != &GTK_ASCENDING_ ## TYPE ## _SORT_KEYS_CLASS && \\\n  194 |       other->klass != &GTK_DESCENDING_ ## TYPE ## _SORT_KEYS_CLASS) \\\n  195 |     return FALSE; \\\n  196 | \\\n  197 |   return self->expression == compare->expression; \\\n  198 | }"}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"gtk_secure_strndup_full() can read one byte past the end of the source buffer. After computing the effective length, it does `len = length + 1` and then `memcpy(res, str, len)`, copying length+1 bytes. If `str` has no NUL terminator within the first `length` bytes (the documented/intended use of a bounded strndup), this reads one byte beyond the caller-supplied buffer. A correct strndup copies `length` bytes and writes the terminating NUL itself (e.g. `memcpy(res, str, length); res[length] = 0;`). This is in security-critical secure-memory code.","fix":"Copy only `length` bytes and NUL-terminate explicitly: `memcpy (res, str, length); res[length] = '\\0';` Also guard against `res == NULL` (see separate finding).","locations":[{"ref":"gtk/gtksecurememory.c:1452-1458","code":" 1452 | \tend = memchr (str, '\\0', length);\n 1453 | \tif (end != NULL)\n 1454 | \t\tlength = (end - str);\n 1455 | \tlen = length + 1;\n 1456 | \tres = (char *)gtk_secure_alloc_full (tag, len, options);\n 1457 | \tmemcpy (res, str, len);\n 1458 | \treturn res;"}]},{"id":"UAF_4","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"search_changed() in the statistics page unrefs the TypeData item before using it: g_object_unref (data) is called, then data->type is dereferenced (g_ascii_strdown (g_type_name (data->type), -1)). The single ref returned by g_list_model_get_item is dropped before the read, so 'data' may already be finalized -> use-after-free.","fix":"Move g_object_unref (data) to after the last use of data (after the g_str_has_prefix check / both g_free calls).","locations":[{"ref":"gtk/inspector/statistics.c:361-374","code":"  361 |       TypeData *data = g_list_model_get_item (model, i);\n  362 |       char *string;\n  363 | \n  364 |       g_object_unref (data);\n  365 | \n  366 |       string = g_ascii_strdown (g_type_name (data->type), -1);\n  367 |       if (g_str_has_prefix (string, text))\n  368 |         {\n  369 |           g_free (string);\n  370 |           gtk_single_selection_set_selected (sl->priv->selection, i);\n  371 |           return;\n  372 |         }\n  373 | \n  374 |        g_free (string);"}]},{"id":"UAF_5","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"gsk_gpu_cache_lookup_tile() returns the cached tile image without checking\nwhether the tile is still valid, unlike gsk_gpu_cache_lookup_texture_image()\nwhich explicitly calls gsk_gpu_cached_texture_is_invalid(). A GskGpuCachedTile\nkeeps use_count == 2 (cache + texture weak ref); when the source GdkTexture dies,\nthe weak-ref callback drops use_count to 1 (is_invalid() == TRUE), but the hash\ntable entry is only removed in finalize (during GC). Between texture death and\nthe next GC, lookup_tile can hand out tile->image, whose underlying texture\nmemory may have been reused for a different texture — exactly the case the\ntexture-cache code guards against with the is_invalid() check and the comment at\ngskgpucache.c:242-250.","fix":"Mirror the texture-image lookup: after looking up the tile, return NULL if\ngsk_gpu_cached_tile_is_invalid(tile) is TRUE (and only then call\ngsk_gpu_cached_use / return the image).","locations":[{"ref":"gsk/gpu/gskgpucachedtile.c:161-190","code":"  161 | GskGpuImage *\n  162 | gsk_gpu_cache_lookup_tile (GskGpuCache      *cache,\n  163 |                            GdkTexture       *texture,\n  164 |                            guint             lod_level,\n  165 |                            GskScalingFilter  lod_filter,\n  166 |                            gsize             tile_id,\n  167 |                            GdkColorState   **out_color_state)\n  168 | {\n  169 |   GskGpuCachePrivate *priv = gsk_gpu_cache_get_private (cache);\n  170 |   GskGpuCachedTile *tile;\n  171 |   GskGpuCachedTile lookup = {\n  172 |     .texture = texture,\n  173 |     .lod_level = lod_level,\n  174 |     .lod_linear = lod_filter == GSK_SCALING_FILTER_TRILINEAR,\n  175 |     .tile_id = tile_id\n  176 |   };\n  177 | \n  178 |   if (priv->tile_cache == NULL)\n  179 |     return NULL;\n  180 | \n  181 |   tile = g_hash_table_lookup (priv->tile_cache, &lookup);\n  182 |   if (tile == NULL)\n  183 |     return NULL;\n  184 | \n  185 |   gsk_gpu_cached_use ((GskGpuCached *) tile);\n  186 | \n  187 |   *out_color_state = tile->color_state;\n  188 | \n  189 |   return g_object_ref (tile->image);\n  190 | }"},{"ref":"gsk/gpu/gskgpucache.c:567-578","code":"  567 |   cache = gdk_texture_get_render_data (texture, self);\n  568 |   /* color_state_equal() isn't necessary and if we'd use it,\n  569 |    * we'd need to check for NULLs before */\n  570 |   if (cache == NULL || color_state != cache->color_state)\n  571 |     cache = g_hash_table_lookup (texture_cache, texture);\n  572 | \n  573 |   if (!cache || !cache->image || gsk_gpu_cached_texture_is_invalid (cache))\n  574 |     return NULL;\n  575 | \n  576 |   gsk_gpu_cached_use ((GskGpuCached *) cache);\n  577 | \n  578 |   return g_object_ref (cache->image);"}]},{"id":"UAF_6","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"Coordinate-translation helpers unref the parent accessible and then keep using it. In both\ngtk_at_spi_translate_coordinates_to_accessible() and ..._from_accessible(), the\nCOORD_TYPE_WINDOW loop does `g_object_unref (parent)` and then immediately calls\ngtk_accessible_get_bounds (parent, ...) and gtk_accessible_get_accessible_parent (parent) on\nthe just-unreffed object. gtk_accessible_get_accessible_parent() returns an owned reference,\nso this is a use-after-unref that is only safe because the live widget tree keeps the object\nalive; it is a latent use-after-free if a parent is ever held by only this transient\nreference. (The same unref-then-use idiom appears in component.c find_first_accessible_non_socket\nand the AccessKit get_focus/editable_ancestor walkers.)","fix":"Reorder so the object is used before it is unreffed: fetch bounds and the next parent first, store the next parent, then unref the current one (the typical 'next = get_parent(p); use(p); unref(p); p = next;' pattern).","locations":[{"ref":"gtk/a11y/gtkatspiutils.c:405-421","code":"  405 |   if (coordtype == ATSPI_COORD_TYPE_WINDOW)\n  406 |     {\n  407 |       parent = gtk_accessible_get_accessible_parent (accessible);\n  408 |       while (parent != NULL)\n  409 |         {\n  410 |           g_object_unref (parent);\n  411 | \n  412 |           if (gtk_accessible_get_bounds (parent, &x, &y, &width, &height))\n  413 |             {\n  414 |               *xo = *xo - x;\n  415 |               *yo = *yo - y;\n  416 |               parent = gtk_accessible_get_accessible_parent (parent);\n  417 |             }\n  418 |           else\n  419 |             break;\n  420 |         }\n  421 |     }"},{"ref":"gtk/a11y/gtkatspiutils.c:459-475","code":"  459 |   if (coordtype == ATSPI_COORD_TYPE_WINDOW)\n  460 |     {\n  461 |       parent = gtk_accessible_get_accessible_parent (accessible);\n  462 |       while (parent != NULL)\n  463 |         {\n  464 |           g_object_unref (parent);\n  465 | \n  466 |           if (gtk_accessible_get_bounds (parent, &x, &y, &width, &height))\n  467 |             {\n  468 |               *xo = *xo + x;\n  469 |               *yo = *yo + y;\n  470 |               parent = gtk_accessible_get_accessible_parent (parent);\n  471 |             }\n  472 |           else\n  473 |             break;\n  474 |         }\n  475 |     }"}]},{"id":"UAF_7","type":"use_after_free","type_label":"Use After Free","severity":"medium","description":"GtkDirectoryList queues QueuedEvent structs (allocated with g_new0) into self->events and also passes the same QueuedEvent pointer as user_data to g_file_query_info_async() (directory_changed, CREATED/ATTRIBUTE_CHANGED/RENAMED branches). On dispose, gtk_directory_list_dispose() cancels self->cancellable and then frees every queued event via g_queue_foreach(free_queued_event)+g_queue_clear. A g_file_query_info_async() call that is still in flight will still invoke its callback (got_new_file_info_cb / got_existing_file_info_cb) afterwards with the now-freed QueuedEvent as data; the callback dereferences event->list and event->file and calls handle_events(self) on the freed/finalized object. The cancellable does not prevent the callback from running. This is a use-after-free triggered by destroying a monitored GtkDirectoryList while file-info queries are pending.","fix":"Pass a reference to the query callbacks (e.g. take a ref on self, or use a separate GCancellable and disconnect/clear pending events without freeing those still referenced by an outstanding async op), and have the callbacks early-out if the operation was cancelled before touching event/self. At minimum, do not free queued events that are still owned by an in-flight async query.","locations":[{"ref":"gtk/gtkdirectorylist.c:682-706","code":"  682 | static void\n  683 | got_new_file_info_cb (GObject      *source,\n  684 |                       GAsyncResult *res,\n  685 |                       gpointer      data)\n  686 | {\n  687 |   QueuedEvent *event = data;\n  688 |   GtkDirectoryList *self = event->list;\n  689 |   GFile *file = event->file;\n  690 | \n  691 |   event->info = g_file_query_info_finish (file, res, NULL);\n  692 |   handle_events (self);\n  693 | }\n  694 | \n  695 | static void\n  696 | got_existing_file_info_cb (GObject      *source,\n  697 |                            GAsyncResult *res,\n  698 |                            gpointer      data)\n  699 | {\n  700 |   QueuedEvent *event = data;\n  701 |   GtkDirectoryList *self = event->list;\n  702 |   GFile *file = event->file;\n  703 | \n  704 |   event->info = g_file_query_info_finish (file, res, NULL);\n  705 |   handle_events (self);\n  706 | }"},{"ref":"gtk/gtkdirectorylist.c:708-794","code":"  708 | static void\n  709 | directory_changed (GFileMonitor       *monitor,\n  710 |                    GFile              *file,\n  711 |                    GFile              *other_file,\n  712 |                    GFileMonitorEvent   event,\n  713 |                    gpointer            data)\n  714 | {\n  715 |   GtkDirectoryList *self = GTK_DIRECTORY_LIST (data);\n  716 |   QueuedEvent *ev;\n  717 | \n  718 |   switch (event)\n  719 |     {\n  720 |     case G_FILE_MONITOR_EVENT_MOVED_IN:\n  721 |     case G_FILE_MONITOR_EVENT_CREATED:\n  722 |       ev = g_new0 (QueuedEvent, 1);\n  723 |       ev->list = self;\n  724 |       ev->event = event;\n  725 |       ev->file = g_object_ref (file);\n  726 |       g_queue_push_head (&self->events, ev);\n  727 | \n  728 |       g_file_query_info_async (file,\n  729 |                                self->attributes,\n  730 |                                G_FILE_QUERY_INFO_NONE,\n  731 |                                self->io_priority,\n  732 |                                self->cancellable,\n  733 |
