<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"`BufExt::get_bytes(len)` does `self.slice(..len)` and `get_str(len)` does `from_utf8(&self[..len])`; both index past the end and panic when `len > remaining`. These are called with lengths taken straight from untrusted server bytes (e.g. mysql handshake `get_bytes(len)`, `err.rs` `get_str(5)`), so a truncated/malicious packet crashes the connection task instead of returning a protocol error. Note `get_bytes_nul` already returns `Err` on bad input — these two siblings do not.","fix":"Add a length guard returning `Err(err_protocol!(\"unexpected end of buffer\"))` when `len > self.remaining()` (for `get_str`, when `len > self.len()`) before the slice, mirroring `get_bytes_nul`.","locations":[{"ref":"sqlx-core/src/io/buf.rs:34-39","code":"   34 |     fn get_bytes(&mut self, len: usize) -> Bytes {\n   35 |         let v = self.slice(..len);\n   36 |         self.advance(len);\n   37 | \n   38 |         v\n   39 |     }"},{"ref":"sqlx-core/src/io/buf.rs:49-57","code":"   49 |     fn get_str(&mut self, len: usize) -> Result<String, Error> {\n   50 |         let v = from_utf8(&self[..len])\n   51 |             .map_err(|err| err_protocol!(\"{}\", err))\n   52 |             .map(ToOwned::to_owned)?;\n   53 | \n   54 |         self.advance(len);\n   55 | \n   56 |         Ok(v)\n   57 |     }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"The binary row decoder has several unchecked reads against a server-controlled packet: `buf.get_bytes(null_bitmap_len)` (line 30) panics if the packet is shorter than `1 + null_bitmap_len`; `buf[0]` (line 91, reading the length byte for TIME/DATE/DATETIME/TIMESTAMP) panics on an empty buffer; and `buf.advance(size)` (line 102) panics if `size > buf.remaining()`. The text-row decoder already guards the analogous `advance` with a `remaining()` check; the binary decoder does not.","fix":"Bounds-check before each read: `buf.remaining() >= null_bitmap_len` before `get_bytes`; non-empty before `buf[0]`; and `size <= buf.remaining()` before `buf.advance(size)`.","locations":[{"ref":"sqlx-mysql/src/protocol/statement/row.rs:29-30","code":"   29 |         let null_bitmap_len = (columns.len() + 9) / 8;\n   30 |         let null_bitmap = buf.get_bytes(null_bitmap_len);"},{"ref":"sqlx-mysql/src/protocol/statement/row.rs:90-92","code":"   90 |                     // Leave the length byte on the front of the value because decoding uses it.\n   91 |                     buf[0] as usize + 1\n   92 |                 }"},{"ref":"sqlx-mysql/src/protocol/statement/row.rs:98-102","code":"   98 |             let offset = offset - buf.len();\n   99 | \n  100 |             values.push(Some(offset..(offset + size)));\n  101 | \n  102 |             buf.advance(size);"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"`chrono::NaiveDateTime::decode` calls `decode_time(len - 4, &buf[5..])` whenever the server length byte is `> 4`, and `decode_time` reads 3 bytes with `buf.get_u8()`. When the length byte is 5 or 6 the slice is only 1-2 bytes and the third `get_u8()` panics — reachable when decoding a malformed binary DATETIME/TIMESTAMP into `NaiveDateTime` (and thus `DateTime<Utc>`/`DateTime<Local>`).","fix":"In `decode_time`, check `buf.len() >= 3` before reading the three components and return a protocol error otherwise.","locations":[{"ref":"sqlx-mysql/src/types/chrono.rs:241-249","code":"  241 |                 let len = buf[0];\n  242 |                 let date = decode_date(&buf[1..])?.ok_or(UnexpectedNullError)?;\n  243 | \n  244 |                 let dt = if len > 4 {\n  245 |                     date.and_time(decode_time(len - 4, &buf[5..])?)\n  246 |                 } else {\n  247 |                     date.and_hms_opt(0, 0, 0)\n  248 |                         .expect(\"expected `NaiveDate::and_hms_opt(0, 0, 0)` to be valid\")\n  249 |                 };"},{"ref":"sqlx-mysql/src/types/chrono.rs:311-314","code":"  311 | fn decode_time(len: u8, mut buf: &[u8]) -> Result<NaiveTime, BoxDynError> {\n  312 |     let hour = buf.get_u8();\n  313 |     let minute = buf.get_u8();\n  314 |     let seconds = buf.get_u8();"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"`time::decode_date` guards only against an empty buffer, then unconditionally reads `LittleEndian::read_u16(buf)` (2 bytes) and `buf[2]`/`buf[3]`. A binary DATE/DATETIME/TIMESTAMP whose length byte is 1, 2, or 3 yields a 1-3 byte slice and panics when decoding into `time::Date` or `PrimitiveDateTime`. The chrono sibling was hardened against exactly this with a `match buf.len()`, making this a copy-paste inconsistency.","fix":"Replace the `is_empty()` check with a length match: `0 => Ok(None)`, `>=4 => parse`, else return a protocol error (mirror the chrono version).","locations":[{"ref":"sqlx-mysql/src/types/time.rs:267-280","code":"  267 | fn decode_date(buf: &[u8]) -> Result<Option<Date>, BoxDynError> {\n  268 |     if buf.is_empty() {\n  269 |         // zero buffer means a zero date (null)\n  270 |         return Ok(None);\n  271 |     }\n  272 | \n  273 |     Date::from_calendar_date(\n  274 |         LittleEndian::read_u16(buf) as i32,\n  275 |         time::Month::try_from(buf[2])?,\n  276 |         buf[3],\n  277 |     )\n  278 |     .map_err(Into::into)\n  279 |     .map(Some)\n  280 | }"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"`time::decode_time` reads three bytes via `buf.get_u8()` with no length check (`Buf::get_u8` panics on empty/short input). It is called as `decode_time(&buf[4..])` from `PrimitiveDateTime::decode` when the server-controlled length byte is `> 4`, so a value with length byte 5 or 6 produces a 1-2 byte slice and panics.","fix":"Validate `buf.len() >= 3` (and a valid total of 4/7/11) before reading, returning a protocol error otherwise.","locations":[{"ref":"sqlx-mysql/src/types/time.rs:292-302","code":"  292 | fn decode_time(mut buf: &[u8]) -> Result<Time, BoxDynError> {\n  293 |     let hour = buf.get_u8();\n  294 |     let minute = buf.get_u8();\n  295 |     let seconds = buf.get_u8();\n  296 | \n  297 |     let micros = if !buf.is_empty() {\n  298 |         // microseconds : int<EOF>\n  299 |         buf.get_uint_le(buf.len())\n  300 |     } else {\n  301 |         0\n  302 |     };"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","description":"`DataRow::decode_body` validates the 4-byte length prefix and the next-value start, but never checks the final `value_end` (`value_start + length`) against `buf.len()`. The last column's `value_end` can therefore exceed the buffer; `DataRow::get` then slices `&self.storage[start..end]` and panics. Separately, `get(index)` indexes `self.values[index]`, which panics if the server sends fewer columns than the `RowDescription` declared.","fix":"In `decode_body`, validate `value_end <= buf.len()` and return a protocol error otherwise. In `get`, use `self.values.get(index)` and return `None` on a column-count mismatch.","locations":[{"ref":"sqlx-postgres/src/message/data_row.rs:65-71","code":"   65 |             if let Ok(length) = u32::try_from(length) {\n   66 |                 let value_end = value_start.checked_add(length).ok_or_else(|| {\n   67 |                     err_protocol!(\"value_start + length out of range ({offset} + {length})\")\n   68 |                 })?;\n   69 | \n   70 |                 values.push(Some(value_start..value_end));\n   71 |                 offset = value_end;"},{"ref":"sqlx-postgres/src/message/data_row.rs:21-25","code":"   21 |     pub(crate) fn get(&self, index: usize) -> Option<&'_ [u8]> {\n   22 |         self.values[index]\n   23 |             .as_ref()\n   24 |             .map(|col| &self.storage[(col.start as usize)..(col.end as usize)])\n   25 |     }"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","description":"`PgNumeric::decode` reads an 8-byte header via four `get_u16`/`get_i16` calls with no length check, then loops `(0..num_digits).map(|_| buf.get_i16())`. A NUMERIC/DECIMAL value with a truncated header, or a `num_digits` exceeding the remaining bytes, panics. This underlies `BigDecimal`, `rust_decimal`, and `PgNumeric` decoding — a commonly-used type.","fix":"Validate at least 8 bytes for the header, then `2 * num_digits` bytes, before reading; return a decode error otherwise.","locations":[{"ref":"sqlx-postgres/src/types/numeric.rs:108-118","code":"  108 |     pub(crate) fn decode(mut buf: &[u8]) -> Result<Self, BoxDynError> {\n  109 |         // https://github.com/postgres/postgres/blob/bcd1c3630095e48bc3b1eb0fc8e8c8a7c851eba1/src/backend/utils/adt/numeric.c#L874\n  110 |         let num_digits = buf.get_u16();\n  111 |         let weight = buf.get_i16();\n  112 |         let sign = buf.get_u16();\n  113 |         let scale = buf.get_i16();\n  114 | \n  115 |         if sign == SIGN_NAN {\n  116 |             Ok(PgNumeric::NotANumber)\n  117 |         } else {\n  118 |             let digits: Vec<_> = (0..num_digits).map(|_| buf.get_i16()).collect::<_>();"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","description":"`PgValueRef::get` reads a 4-byte length with `buf.get_i32()` (panics if `<4` bytes remain) and then slices `&buf[..element_len]` using the server-supplied `element_len` without checking it against `buf.len()`. This is the element reader shared by array, record, and range binary decoding, so a server returning an element length that exceeds the remaining buffer triggers an out-of-bounds slice panic.","fix":"Verify `buf.len() >= 4` before `get_i32()`, and return a decode error (not panic) when `element_len > buf.len()` before slicing.","locations":[{"ref":"sqlx-postgres/src/value.rs:38-50","code":"   38 |         let element_len = buf.get_i32();\n   39 | \n   40 |         let element_val = if element_len == -1 {\n   41 |             None\n   42 |         } else {\n   43 |             let element_len: usize = element_len\n   44 |                 .try_into()\n   45 |                 .map_err(|_| format!(\"overflow converting element_len ({element_len}) to usize\"))?;\n   46 | \n   47 |             let val = &buf[..element_len];\n   48 |             buf.advance(element_len);\n   49 |             Some(val)\n   50 |         };"}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","description":"When decoding a `PrimitiveDateTime`/`OffsetDateTime` from an INTEGER column, the i64 value is passed to `OffsetDateTime::from_unix_timestamp(...).unwrap()`. The `time` crate returns `Err` for timestamps outside its supported range, so any out-of-range integer stored in the database panics instead of producing a decode error. This is data-controllable.","fix":"Replace `.unwrap()` with `.ok()` folded into the `Option` (return `None`/decode error on out-of-range), mirroring how the chrono path uses `.single()`.","locations":[{"ref":"sqlx-sqlite/src/types/time.rs:159-165","code":"  159 | fn decode_datetime(value: SqliteValueRef<'_>) -> Result<PrimitiveDateTime, BoxDynError> {\n  160 |     let dt = match value.type_info().0 {\n  161 |         DataType::Text => decode_datetime_from_text(value.text_borrowed()?),\n  162 |         DataType::Int4 | DataType::Integer => {\n  163 |             let parsed = OffsetDateTime::from_unix_timestamp(value.int64()?).unwrap();\n  164 |             Some(PrimitiveDateTime::new(parsed.date(), parsed.time()))\n  165 |         }"}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","description":"`from_url` (reached from `AnyConnection::connect`/`AnyPool` before drivers are installed) calls `DRIVERS.get().expect(...)`, panicking instead of returning the `crate::Result::Err` that the whole surrounding API uses. A forgotten `install_default_drivers()` aborts the process rather than surfacing a recoverable configuration error.","fix":"Replace the `expect` with `.ok_or_else(|| Error::Configuration(\"no drivers installed; call sqlx::any::install_default_drivers()\".into()))?`.","locations":[{"ref":"sqlx-core/src/any/driver.rs:142-155","code":"  142 | pub(crate) fn from_url(url: &Url) -> crate::Result<&'static AnyDriver> {\n  143 |     let scheme = url.scheme();\n  144 | \n  145 |     let drivers: &[AnyDriver] = DRIVERS\n  146 |         .get()\n  147 |         .expect(\"No drivers installed. Please see the documentation in `sqlx::any` for details.\");\n  148 | \n  149 |     drivers\n  150 |         .iter()\n  151 |         .find(|driver| driver.url_schemes.contains(&url.scheme()))\n  152 |         .ok_or_else(|| {\n  153 |             Error::Configuration(format!(\"no driver found for URL scheme {scheme:?}\").into())\n  154 |         })\n  155 | }"}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"medium","description":"`workspace_root` (reached during offline builds) uses `crate::env(\"CARGO\").unwrap()`, `.expect(\"Could not fetch metadata\")`, `.expect(\"Invalid cargo metadata output\")`, and a final `root.clone().unwrap()`. If `CARGO` is unset, `cargo metadata` fails, or its output is unparseable, the proc-macro panics with an opaque message instead of using the `crate::Result` error path used elsewhere, breaking the user's build confusingly.","fix":"Propagate these as `crate::Result` errors with messages consistent with the rest of the macro's error handling.","locations":[{"ref":"sqlx-macros-core/src/query/metadata.rs:30-55","code":"   30 |         let mut root = self.workspace_root.lock().unwrap();\n   31 |         if root.is_none() {\n   32 |             use serde::Deserialize;\n   33 |             use std::process::Command;\n   34 | \n   35 |             let cargo = crate::env(\"CARGO\").unwrap();\n   36 | \n   37 |             let output = Command::new(cargo)\n   38 |                 .args([\"metadata\", \"--format-version=1\", \"--no-deps\"])\n   39 |                 .current_dir(&self.manifest_dir)\n   40 |                 .env_remove(\"__CARGO_FIX_PLZ\")\n   41 |                 .output()\n   42 |                 .expect(\"Could not fetch metadata\");\n   43 | \n   44 |             #[derive(Deserialize)]\n   45 |             struct CargoMetadata {\n   46 |                 workspace_root: PathBuf,\n   47 |             }\n   48 | \n   49 |             let metadata: CargoMetadata =\n   50 |                 serde_json::from_slice(&output.stdout).expect(\"Invalid `cargo metadata` output\");\n   51 | \n   52 |             *root = Some(metadata.workspace_root);\n   53 |         }\n   54 |         root.clone().unwrap()\n   55 |     }"}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"medium","description":"In `AuthPlugin::handle`, when the first byte is `0x01` the code immediately indexes `packet[1]`. `recv_packet` only guarantees the packet is non-empty, so a server sending a 1-byte packet `[0x01]` during caching_sha2_password authentication causes an out-of-bounds panic at `packet[1]`.","fix":"Check `packet.len() >= 2` before reading `packet[1]`, returning a protocol error otherwise.","locations":[{"ref":"sqlx-mysql/src/connection/auth.rs:43-45","code":"   43 |         match self {\n   44 |             AuthPlugin::CachingSha2Password if packet[0] == 0x01 => {\n   45 |                 match packet[1] {"}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"medium","description":"In `Handshake::decode_with`, `auth_plugin_data_2` reads `buf.get_bytes(len)` (len up to 246, derived from the server-supplied `auth_plugin_data_len`) and then `buf.advance(1)` for the NUL, with no check that `len + 1 <= buf.remaining()`. A truncated initial handshake packet panics. The decoder also reads several fixed fields earlier without length checks.","fix":"Bounds-check `len` (plus the trailing NUL) against `buf.remaining()` before `get_bytes`; validate the minimum packet length up front.","locations":[{"ref":"sqlx-mysql/src/protocol/connect/handshake.rs:64-72","code":"   64 |         let auth_plugin_data_2 = if capabilities.contains(Capabilities::SECURE_CONNECTION) {\n   65 |             let len = cmp::max(auth_plugin_data_len.saturating_sub(9), 12);\n   66 |             let v = buf.get_bytes(len as usize);\n   67 |             buf.advance(1); // NUL-terminator\n   68 | \n   69 |             v\n   70 |         } else {\n   71 |             Bytes::new()\n   72 |         };"}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","description":"`EofPacket::decode_with` reads `get_u16_le()` twice with no length check after the header. An EOF packet is parsed for result-set/row terminators when a packet starts with `0xfe` and is `< 9` bytes, so a 1-4 byte packet like `[0xfe]` reaches a `get_u16_le` and panics.","fix":"Verify `buf.remaining() >= 4` after the header before reading warnings and status.","locations":[{"ref":"sqlx-mysql/src/protocol/response/eof.rs:22-35","code":"   22 |     fn decode_with(mut buf: Bytes, _: Capabilities) -> Result<Self, Error> {\n   23 |         let header = buf.get_u8();\n   24 |         if header != 0xfe {\n   25 |             return Err(err_protocol!(\n   26 |                 \"expected 0xfe (EOF_Packet) but found 0x{:x}\",\n   27 |                 header\n   28 |             ));\n   29 |         }\n   30 | \n   31 |         let warnings = buf.get_u16_le();\n   32 |         let status = Status::from_bits_truncate(buf.get_u16_le());\n   33 | \n   34 |         Ok(Self { status, warnings })\n   35 |     }"}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","description":"`ErrPacket::decode_with` reads `buf.get_u16_le()` (line 28, panics if `<2` bytes remain after the header) and, when a `#` SQL-state marker is present, `buf.get_str(5)` (line 35, slices `&self[..5]` — panics if `<5` bytes follow). An ErrPacket is decoded from any server packet starting with `0xff`, so a server can send `[0xff]` or a short SQL-state to crash the client during normal operation.","fix":"Check `buf.remaining()` before `get_u16_le`, and `buf.remaining() >= 5` before reading the SQL-state, returning a protocol error otherwise.","locations":[{"ref":"sqlx-mysql/src/protocol/response/err.rs:28-39","code":"   28 |         let error_code = buf.get_u16_le();\n   29 |         let mut sql_state = None;\n   30 | \n   31 |         if capabilities.contains(Capabilities::PROTOCOL_41) {\n   32 |             // If the next byte is '#' then we have a SQL STATE\n   33 |             if buf.starts_with(b\"#\") {\n   34 |                 buf.advance(1);\n   35 |                 sql_state = Some(buf.get_str(5)?);\n   36 |             }\n   37 |         }\n   38 | \n   39 |         let error_message = buf.get_str(buf.len())?;"}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","description":"The match arm for `ColumnType::Null` in the binary row decoder is `unreachable!()`. `Null` (0x06) is a legitimate `ColumnType` a server may place in a column definition; if it then marks that column non-NULL in the row's null bitmap, control reaches this arm and the process panics. The \"MySQL will never generate NULL types\" comment is an assumption about a trusted server, not an invariant enforced on untrusted input.","fix":"Return `err_protocol!(...)` for a `Null` column type with a non-null bitmap entry instead of `unreachable!()`.","locations":[{"ref":"sqlx-mysql/src/protocol/statement/row.rs:94-95","code":"   94 |                 // NOTE: MySQL will never generate NULL types for non-NULL values\n   95 |                 ColumnType::Null => unreachable!(),"}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"medium","description":"`ColumnDefinition::decode_with` checks the lenenc strings via `?` but then reads the fixed tail with no bounds checks: `get_u16_le` (collation), `get_u32_le` (max_size), `get_u8` (type), `get_u16_le` (flags), `get_u8` (decimals). A truncated column-definition packet (received once per result column) panics instead of erroring.","fix":"Verify `buf.remaining() >= 10` after the lenenc strings (or read a single `buf.get(..N)` slice) before reading the fixed-size tail.","locations":[{"ref":"sqlx-mysql/src/protocol/text/column.rs:150-155","code":"  150 |         let _next_len = buf.get_uint_lenenc()?; // always 0x0c\n  151 |         let collation = buf.get_u16_le();\n  152 |         let max_size = buf.get_u32_le();\n  153 |         let type_id = buf.get_u8();\n  154 |         let flags = buf.get_u16_le();\n  155 |         let decimals = buf.get_u8();"}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","description":"`PgNotification::channel()` and `payload()` call `from_utf8(...).unwrap()` on the raw notification bytes. Those bytes are read via `get_bytes_nul()` without UTF-8 validation, so a `NOTIFY` whose channel name or payload contains non-UTF-8 bytes makes these public accessors panic.","fix":"Return `Result`/`Cow` from the accessors or use `from_utf8_lossy`, or validate UTF-8 once in `Notification::decode_body`.","locations":[{"ref":"sqlx-postgres/src/listener.rs:463-473","code":"  463 |     #[inline]\n  464 |     pub fn channel(&self) -> &str {\n  465 |         from_utf8(&self.0.channel).unwrap()\n  466 |     }\n  467 | \n  468 |     /// The payload of the notification. An empty payload is received as an\n  469 |     /// empty string.\n  470 |     #[inline]\n  471 |     pub fn payload(&self) -> &str {\n  472 |         from_utf8(&self.0.payload).unwrap()\n  473 |     }"}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","description":"`Authentication::decode_body` calls `buf.get_u32()` with no length check (panics on a short body) and the MD5 branch calls `buf.copy_to_slice(&mut salt)` (panics if `<4` bytes remain). The SCRAM `decode_with` loops also index `item[0]` and `item[2..]` on each comma-split segment, panicking on an empty or `<2`-byte segment. All run during the handshake on bytes from a possibly-malicious server/MITM.","fix":"Bounds-check before `get_u32`/`copy_to_slice`; in the SCRAM loops, skip or error on segments with `len() < 3` instead of indexing `item[0]`/`item[2..]`.","locations":[{"ref":"sqlx-postgres/src/message/authentication.rs:66-77","code":"   66 |     fn decode_body(mut buf: Bytes) -> Result<Self, Error> {\n   67 |         Ok(match buf.get_u32() {\n   68 |             0 => Authentication::Ok,\n   69 | \n   70 |             3 => Authentication::CleartextPassword,\n   71 | \n   72 |             5 => {\n   73 |                 let mut salt = [0; 4];\n   74 |                 buf.copy_to_slice(&mut salt);\n   75 | \n   76 |                 Authentication::Md5Password(AuthenticationMd5Password { salt })\n   77 |             }"},{"ref":"sqlx-postgres/src/message/authentication.rs:143-145","code":"  143 |         for item in buf.split(|b| *b == b',') {\n  144 |             let key = item[0];\n  145 |             let value = &item[2..];"},{"ref":"sqlx-postgres/src/message/authentication.rs:182-184","code":"  182 |         for item in buf.split(|b| *b == b',') {\n  183 |             let key = item[0];\n  184 |             let value = &item[2..];"}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","description":"`BackendKeyData::decode_body` reads two big-endian u32s via `BigEndian::read_u32(&buf)` and `read_u32(&buf[4..])` with no length validation. A `K` message with a body shorter than 8 bytes (reachable during `establish()`) panics on the slice/read.","fix":"Return a protocol error when `buf.len() < 8` before reading.","locations":[{"ref":"sqlx-postgres/src/message/backend_key_data.rs:21-23","code":"   21 |     fn decode_body(buf: Bytes) -> Result<Self, Error> {\n   22 |         let process_id = BigEndian::read_u32(&buf);\n   23 |         let secret_key = BigEndian::read_u32(&buf[4..]);"}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"medium","description":"`CopyResponseData::decode` calls `buf.get_i8()`/`buf.get_i16()` with no length check and then loops `(0..num_columns).map(|_| buf.get_i16())`. A short body, or a `num_columns` larger than the remaining bytes, panics. Reached at the start of every COPY operation.","fix":"Validate the body has `1 + 2 + 2*num_columns` bytes before reading; treat a negative `num_columns` as an error.","locations":[{"ref":"sqlx-postgres/src/message/copy.rs:31-44","code":"   31 | impl CopyResponseData {\n   32 |     #[inline]\n   33 |     fn decode(mut buf: Bytes) -> Result<Self> {\n   34 |         let format = buf.get_i8();\n   35 |         let num_columns = buf.get_i16();\n   36 | \n   37 |         let format_codes = (0..num_columns).map(|_| buf.get_i16()).collect();\n   38 | \n   39 |         Ok(CopyResponseData {\n   40 |             format,\n   41 |             num_columns,\n   42 |             format_codes,\n   43 |         })\n   44 |     }"}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"medium","description":"`Notification::decode_body` calls `buf.get_u32()` before reading the channel/payload, panicking if a `NotificationResponse` body is shorter than 4 bytes. This is decoded automatically inside `PgStream::recv` whenever a listener buffer is set.","fix":"Validate `buf.len() >= 4` (or use a checked read) before `get_u32()`.","locations":[{"ref":"sqlx-postgres/src/message/notification.rs:17-20","code":"   17 |     fn decode_body(mut buf: Bytes) -> Result<Self, Error> {\n   18 |         let process_id = buf.get_u32();\n   19 |         let channel = buf.get_bytes_nul()?;\n   20 |         let payload = buf.get_bytes_nul()?;"}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"medium","description":"`ParameterDescription::decode_body` calls `buf.get_u16()` (panics if `<2` bytes) and then loops `buf.get_u32()` `cnt` times; if the server reports a `cnt` larger than the actual remaining bytes, `get_u32()` panics. Reached during statement preparation.","fix":"Validate the body has 2 bytes, then `4 * cnt` bytes, before reading.","locations":[{"ref":"sqlx-postgres/src/message/parameter_description.rs:16-24","code":"   16 |     fn decode_body(mut buf: Bytes) -> Result<Self, Error> {\n   17 |         // Note: this is correct, max parameters is 65535, not 32767\n   18 |         // https://github.com/launchbadge/sqlx/issues/3464\n   19 |         let cnt = buf.get_u16();\n   20 |         let mut types = SmallVec::with_capacity(cnt as usize);\n   21 | \n   22 |         for _ in 0..cnt {\n   23 |             types.push(Oid(buf.get_u32()));\n   24 |         }"}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"medium","description":"`ReadyForQuery::decode_body` indexes `buf[0]` without checking the body is non-empty. A `Z` message (sent after every query and during the handshake) with an empty body panics.","fix":"Use `buf.first()` and return a protocol error when it is `None`.","locations":[{"ref":"sqlx-postgres/src/message/ready_for_query.rs:27-28","code":"   27 |     fn decode_body(buf: Bytes) -> Result<Self, Error> {\n   28 |         let status = match buf[0] {"}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"medium","description":"The container decoders read multi-field binary headers via repeated `get_i32`/`get_u32`/`get_u8` with no upfront length check (array reads 5 ints, record reads a u32, range reads a u8), so truncated bodies panic. In the Text branches, `&s[1..(s.len()-1)]` (array, record, range) and `sb[0]`/`sb[sb.len()-1]` (range) underflow/panic when the server sends an empty or 1-char value instead of a brace/bracket-wrapped literal. `record.rs:102` `get_u32` is guarded only by `!is_empty()`, so 1-3 remaining bytes still panic.","fix":"Validate header sizes before the `get_*` reads; in the Text branches verify length `>= 2` before slicing/indexing.","locations":[{"ref":"sqlx-postgres/src/types/array.rs:196-234","code":"  196 |                 let ndim = buf.get_i32();\n  197 | \n  198 |                 if ndim == 0 {\n  199 |                     // zero dimensions is an empty array\n  200 |                     return Ok(Vec::new());\n  201 |                 }\n  202 | \n  203 |                 if ndim != 1 {\n  204 |                     return Err(format!(\"encountered an array of {ndim} dimensions; only one-dimensional arrays are supported\").into());\n  205 |                 }\n  206 | \n  207 |                 // appears to have been used in the past to communicate potential NULLS\n  208 |                 // but reading source code back through our historically supported\n  209 |                 // postgres versions (9.5+) this is never used for anything\n  210 |                 let _flags = buf.get_i32();\n  211 | \n  212 |                 // the OID of the element\n  213 |                 let element_type_oid = Oid(buf.get_u32());\n  214 |                 let element_type_info: PgTypeInfo = PgTypeInfo::try_from_oid(element_type_oid)\n  215 |                     .or_else(|| value.type_info.try_array_element().map(Cow::into_owned))\n  216 |                     .ok_or_else(|| {\n  217 |                         BoxDynError::from(format!(\n  218 |                             \"failed to resolve array element type for oid {}\",\n  219 |                             element_type_oid.0\n  220 |                         ))\n  221 |                     })?;\n  222 | \n  223 |                 // length of the array axis\n  224 |                 let len = buf.get_i32();\n  225 | \n  226 |                 let len = usize::try_from(len)\n  227 |                     .map_err(|_| format!(\"overflow converting array len ({len}) to usize\"))?;\n  228 | \n  229 |                 // the lower bound, we only support arrays starting from \"1\"\n  230 |                 let lower = buf.get_i32();\n  231 | \n  232 |                 if lower != 1 {\n  233 |                     return Err(format!(\"encountered an array with a lower bound of {lower} in the first dimension; only arrays starting at one are supported\").into());\n  234 |                 }"},{"ref":"sqlx-postgres/src/types/array.rs:255-256","code":"  255 |                 // trim the wrapping braces\n  256 |                 let s = &s[1..(s.len() - 1)];"},{"ref":"sqlx-postgres/src/types/record.rs:73-79","code":"   73 |             PgValueFormat::Binary => {\n   74 |                 let _len = buf.get_u32();\n   75 |             }\n   76 | \n   77 |             PgValueFormat::Text => {\n   78 |                 // remove the enclosing `(` .. `)`\n   79 |                 buf = &buf[1..(buf.len() - 1)];"},{"ref":"sqlx-postgres/src/types/record.rs:96-102","code":"   96 |         if self.buf.is_empty() {\n   97 |             return Err(format!(\"no field `{0}` found on record\", self.ind).into());\n   98 |         }\n   99 | \n  100 |         match self.fmt {\n  101 |             PgValueFormat::Binary => {\n  102 |                 let element_type_oid = Oid(self.buf.get_u32());"},{"ref":"sqlx-postgres/src/types/range.rs:345-345","code":"  345 |                 let flags = RangeFlags::from_bits_truncate(buf.get_u8());"},{"ref":"sqlx-postgres/src/types/range.rs:385-390","code":"  385 |                 let sb = s.as_bytes();\n  386 |                 let lower = sb[0] as char;\n  387 |                 let upper = sb[sb.len() - 1] as char;\n  388 | \n  389 |                 // trim the wrapping braces/brackets\n  390 |                 let s = &s[1..(s.len() - 1)];"}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"medium","description":"`BitVec::decode` (binary) calls `bytes.get_i32()` to read the bit length before any size check, panicking if a BIT/VARBIT value has a body shorter than 4 bytes. The length-mismatch check at line 60 only runs after the panicking read.","fix":"Validate `bytes.len() >= 4` before `get_i32()`.","locations":[{"ref":"sqlx-postgres/src/types/bit_vec.rs:51-55","code":"   51 |             PgValueFormat::Binary => {\n   52 |                 let mut bytes = value.as_bytes()?;\n   53 |                 let len = bytes.get_i32();\n   54 | \n   55 |                 let len = usize::try_from(len).map_err(|_| format!(\"invalid VARBIT len: {len}\"))?;"}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"medium","description":"The date/timestamp binary decoders add a server-controlled days/microseconds offset to the Postgres epoch with `+`, which panics for chrono/`time` values outside their supported year range. Postgres can store dates far beyond chrono's range (year > 262143), so even a legitimate server value — let alone a malicious `i32::MAX`/`i64::MAX` — panics when decoding `NaiveDate`/`NaiveDateTime`/`time::Date`/`PrimitiveDateTime`.","fix":"Use the checked APIs (`NaiveDate::checked_add_signed`, `Date::checked_add`, etc.) and return a decode error on `None` instead of relying on the panicking `+`.","locations":[{"ref":"sqlx-postgres/src/types/chrono/date.rs:45-53","code":"   45 |                 // DATE is encoded as the days since epoch\n   46 |                 let days: i32 = Decode::<Postgres>::decode(value)?;\n   47 | \n   48 |                 let days = TimeDelta::try_days(days.into())\n   49 |                     .unwrap_or_else(|| {\n   50 |                         unreachable!(\"BUG: days ({days}) as `i32` multiplied into seconds should not overflow `i64`\")\n   51 |                     });\n   52 | \n   53 |                 postgres_epoch_date() + days"},{"ref":"sqlx-postgres/src/types/chrono/datetime.rs:53-57","code":"   53 |             PgValueFormat::Binary => {\n   54 |                 // TIMESTAMP is encoded as the microseconds since the epoch\n   55 |                 let us = Decode::<Postgres>::decode(value)?;\n   56 |                 postgres_epoch_datetime() + Duration::microseconds(us)\n   57 |             }"},{"ref":"sqlx-postgres/src/types/time/date.rs:40-44","code":"   40 |             PgValueFormat::Binary => {\n   41 |                 // DATE is encoded as the days since epoch\n   42 |                 let days: i32 = Decode::<Postgres>::decode(value)?;\n   43 |                 PG_EPOCH + Duration::days(days.into())\n   44 |             }"},{"ref":"sqlx-postgres/src/types/time/datetime.rs:57-61","code":"   57 |             PgValueFormat::Binary => {\n   58 |                 // TIMESTAMP is encoded as the microseconds since the epoch\n   59 |                 let us = Decode::<Postgres>::decode(value)?;\n   60 |                 PG_EPOCH.midnight() + Duration::microseconds(us)\n   61 |             }"}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"medium","description":"The fixed-size geometry binary decoders (point, line, box, circle, lseg) repeatedly call `bytes.get_f64()` with no length check. A server returning one of these values with a body shorter than the expected number of f64s panics. (`path`, `polygon`, and `cube` correctly validate the size first and are unaffected.)","fix":"Verify `bytes.len()` equals the expected fixed size (16 for point, 24 for line/circle/lseg-pair, 32 for box/lseg) before reading, as `path`/`polygon` already do.","locations":[{"ref":"sqlx-postgres/src/types/geometry/point.rs:87-91","code":"   87 |     fn from_bytes(mut bytes: &[u8]) -> Result<PgPoint, BoxDynError> {\n   88 |         let x = bytes.get_f64();\n   89 |         let y = bytes.get_f64();\n   90 |         Ok(PgPoint { x, y })\n   91 |     }"},{"ref":"sqlx-postgres/src/types/geometry/line.rs:93-98","code":"   93 |     fn from_bytes(mut bytes: &[u8]) -> Result<PgLine, BoxDynError> {\n   94 |         let a = bytes.get_f64();\n   95 |         let b = bytes.get_f64();\n   96 |         let c = bytes.get_f64();\n   97 |         Ok(PgLine { a, b, c })\n   98 |     }"},{"ref":"sqlx-postgres/src/types/geometry/box.rs:111-116","code":"  111 |     fn from_bytes(mut bytes: &[u8]) -> Result<PgBox, BoxDynError> {\n  112 |         let upper_right_x = bytes.get_f64();\n  113 |         let upper_right_y = bytes.get_f64();\n  114 |         let lower_left_x = bytes.get_f64();\n  115 |         let lower_left_y = bytes.get_f64();\n  116 | "},{"ref":"sqlx-postgres/src/types/geometry/circle.rs:103-108","code":"  103 |     fn from_bytes(mut bytes: &[u8]) -> Result<PgCircle, Error> {\n  104 |         let x = bytes.get_f64();\n  105 |         let y = bytes.get_f64();\n  106 |         let r = bytes.get_f64();\n  107 |         Ok(PgCircle { x, y, radius: r })\n  108 |     }"},{"ref":"sqlx-postgres/src/types/geometry/line_segment.rs:112-117","code":"  112 |     fn from_bytes(mut bytes: &[u8]) -> Result<PgLSeg, BoxDynError> {\n  113 |         let start_x = bytes.get_f64();\n  114 |         let start_y = bytes.get_f64();\n  115 |         let end_x = bytes.get_f64();\n  116 |         let end_y = bytes.get_f64();\n  117 | "}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"medium","description":"Several binary decoders index the first byte without an emptiness check: `PgLTree`/`PgLQuery` read `bytes[0]` for the version byte, `Json<T>` reads `buf[0]` for the JSONB version byte, and `bool` reads `value.as_bytes()?[0]`. A server returning any of these types with an empty body panics on the index.","fix":"Use `bytes.first()` / check `!buf.is_empty()` and return a decode error on empty input.","locations":[{"ref":"sqlx-postgres/src/types/ltree.rs:223-229","code":"  223 |             PgValueFormat::Binary => {\n  224 |                 let bytes = value.as_bytes()?;\n  225 |                 let version = i8::from_le_bytes([bytes[0]; 1]);\n  226 |                 if version != 1 {\n  227 |                     return Err(Box::new(PgLTreeParseError::InvalidLtreeVersion));\n  228 |                 }\n  229 |                 Ok(Self::from_str(std::str::from_utf8(&bytes[1..])?)?)"},{"ref":"sqlx-postgres/src/types/lquery.rs:182-189","code":"  182 |             PgValueFormat::Binary => {\n  183 |                 let bytes = value.as_bytes()?;\n  184 |                 let version = i8::from_le_bytes([bytes[0]; 1]);\n  185 |                 if version != 1 {\n  186 |                     return Err(Box::new(PgLQueryParseError::InvalidLqueryVersion));\n  187 |                 }\n  188 |                 Ok(Self::from_str(std::str::from_utf8(&bytes[1..])?)?)\n  189 |             }"},{"ref":"sqlx-postgres/src/types/json.rs:84-96","code":"   84 |     fn decode(value: PgValueRef<'r>) -> Result<Self, BoxDynError> {\n   85 |         let mut buf = value.as_bytes()?;\n   86 | \n   87 |         if value.format() == PgValueFormat::Binary && value.type_info == PgTypeInfo::JSONB {\n   88 |             // Check JSONB version byte - PostgreSQL currently only supports version 1\n   89 |             if buf[0] != 1 {\n   90 |                 return Err(\n   91 |                     format!(\"unsupported JSONB format version {} (expected 1)\", buf[0]).into(),\n   92 |                 );\n   93 |             }\n   94 | \n   95 |             buf = &buf[1..];\n   96 |         }"},{"ref":"sqlx-postgres/src/types/bool.rs:28-30","code":"   28 |     fn decode(value: PgValueRef<'_>) -> Result<Self, BoxDynError> {\n   29 |         Ok(match value.format() {\n   30 |             PgValueFormat::Binary => value.as_bytes()?[0] != 0,"}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"medium","description":"Several fixed-width binary decoders call `byteorder` read functions on `value.as_bytes()?` without verifying the slice length: MONEY (`read_i64`, needs 8), OID (`read_u32`, needs 4), FLOAT4 (`read_f32`, needs 4), FLOAT8 (`read_f64`, needs 8). A server returning any of these columns with a short body panics. OID decoding is also reached for array/record element type OIDs.","fix":"Check the byte length and return a decode error before calling each `read_*` function.","locations":[{"ref":"sqlx-postgres/src/types/money.rs:178-181","code":"  178 |             PgValueFormat::Binary => {\n  179 |                 let cents = BigEndian::read_i64(value.as_bytes()?);\n  180 | \n  181 |                 Ok(PgMoney(cents))"},{"ref":"sqlx-postgres/src/types/oid.rs:41-43","code":"   41 |         Ok(Self(match value.format() {\n   42 |             PgValueFormat::Binary => BigEndian::read_u32(value.as_bytes()?),\n   43 |             PgValueFormat::Text => value.as_str()?.parse()?,"},{"ref":"sqlx-postgres/src/types/float.rs:31-33","code":"   31 |         Ok(match value.format() {\n   32 |             PgValueFormat::Binary => BigEndian::read_f32(value.as_bytes()?),\n   33 |             PgValueFormat::Text => value.as_str()?.parse()?,"},{"ref":"sqlx-postgres/src/types/float.rs:59-62","code":"   59 |     fn decode(value: PgValueRef<'_>) -> Result<Self, BoxDynError> {\n   60 |         Ok(match value.format() {\n   61 |             PgValueFormat::Binary => BigEndian::read_f64(value.as_bytes()?),\n   62 |             PgValueFormat::Text => value.as_str()?.parse()?,"}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"low","description":"The write loop calls `poll_write` then `buf.consume(written)` and never handles `written == 0`. A conforming `AsyncWrite` may legally return `Ok(0)` under back-pressure; `consume(0)` makes no progress, so the loop busy-spins / hangs instead of erroring. TLS sockets guard this elsewhere by mapping `Ok(0)` to `WouldBlock`; this raw path does not.","fix":"Treat `Ok(0)` while the buffer is non-empty as `io::ErrorKind::WriteZero`, matching `std::io::Write::write_all` semantics.","locations":[{"ref":"sqlx-core/src/io/write_and_flush.rs:24-33","code":"   24 |         loop {\n   25 |             let read = buf.fill_buf()?;\n   26 | \n   27 |             if !read.is_empty() {\n   28 |                 let written = ready!(Pin::new(&mut *stream).poll_write(cx, read)?);\n   29 |                 buf.consume(written);\n   30 |             } else {\n   31 |                 break;\n   32 |             }\n   33 |         }"}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"low","description":"When parsing `#[repr(...)]` on a type deriving an sqlx enum, a multi-segment path such as `#[repr(some::path)]` makes `require_path_only()` succeed but `get_ident()` return `None`, so `.unwrap()` panics at compile time instead of producing a clean syn error.","fix":"Replace `.unwrap()` with `path.get_ident().ok_or_else(|| syn::Error::new_spanned(path, \"expected a simple repr like #[repr(i32)]\"))?`.","locations":[{"ref":"sqlx-macros-core/src/derives/attributes.rs:126-133","code":"  126 |         } else if attr.path().is_ident(\"repr\") {\n  127 |             let list: Punctuated<Meta, Token![,]> =\n  128 |                 attr.parse_args_with(<Punctuated<Meta, Token![,]>>::parse_terminated)?;\n  129 | \n  130 |             if let Some(path) = list.iter().find_map(|f| f.require_path_only().ok()) {\n  131 |                 try_set!(repr, path.get_ident().unwrap().clone(), list);\n  132 |             }\n  133 |         }"}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"low","description":"`from_dyn_data` is called on data deserialized from the user-editable `.sqlx/query-*.json` cache. An empty `db_name` or `hash` (from a bad merge or hand edit) trips `assert!(!...is_empty())`, panicking at compile time with an opaque message instead of returning the `crate::Result` compile error used elsewhere in the function.","fix":"Replace the `assert!`s with `return Err(...)` producing a clear message about the cached query file missing `db_name`/`hash`.","locations":[{"ref":"sqlx-macros-core/src/query/data.rs:117-119","code":"  117 |     pub fn from_dyn_data(dyn_data: DynQueryData) -> crate::Result<Self> {\n  118 |         assert!(!dyn_data.db_name.is_empty());\n  119 |         assert!(!dyn_data.hash.is_empty());"}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"low","description":"`xor_eq` computes `y[i % y_len]`; if `y_len == 0` (empty nonce/key) and `x` is non-empty, this is a modulo-by-zero panic. The nonce derives from the server handshake (`auth_plugin_data`), which a malicious server could make empty, and `xor_eq` runs during password scrambling.","fix":"Return early (or error) when `y.is_empty()` before the loop.","locations":[{"ref":"sqlx-mysql/src/connection/auth.rs:163-169","code":"  163 | fn xor_eq(x: &mut [u8], y: &[u8]) {\n  164 |     let y_len = y.len();\n  165 | \n  166 |     for i in 0..x.len() {\n  167 |         x[i] ^= y[i % y_len];\n  168 |     }\n  169 | }"}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"low","description":"`get_bytes_lenenc` reads a server-controlled length-encoded size and calls `self.split_to(size)` without checking `size <= self.remaining()`; `Bytes::split_to` panics if `size` exceeds the buffer. This backs `ColumnDefinition` string fields, so a column-definition packet whose lenenc length exceeds the remaining bytes panics. (`get_str_lenenc` just above has the same shape via `get_str`.)","fix":"Return a protocol error when `size > self.remaining()` before calling `split_to`.","locations":[{"ref":"sqlx-mysql/src/io/buf.rs:68-74","code":"   68 |     fn get_bytes_lenenc(&mut self) -> Result<Bytes, Error> {\n   69 |         let size = self.get_uint_lenenc()?;\n   70 |         let size = usize::try_from(size)\n   71 |             .map_err(|_| err_protocol!(\"string length overflows usize: {size}\"))?;\n   72 | \n   73 |         Ok(self.split_to(size))\n   74 |     }"}]},{"id":"PANIC_36","type":"panic","type_label":"Panic","severity":"low","description":"`apply_patches` indexes `&parameters[patch.arg_index]`, where `parameters` is the parameter-type list resolved from the server's `ParameterDescription`. If the server returns fewer parameter types than the number of bound arguments that registered a patch, this panics.","fix":"Use `parameters.get(patch.arg_index)` and return a protocol error when the server under-reported parameter types.","locations":[{"ref":"sqlx-postgres/src/arguments.rs:118-123","code":"  118 |         for patch in patches {\n  119 |             let buf = &mut buffer[patch.buf_offset..];\n  120 |             let ty = &parameters[patch.arg_index];\n  121 | \n  122 |             (patch.callback)(buf, ty);\n  123 |         }"}]},{"id":"PANIC_37","type":"panic","type_label":"Panic","severity":"low","description":"In `PgRecordDecoder::find_type_info`, the `Composite` branch indexes `fields[self.ind]`, where `self.ind` advances once per decoded field. If the server returns a record/composite with more fields than the composite type declares, this panics with an out-of-bounds index.","fix":"Use `fields.get(self.ind)` and return a protocol/mismatch error on `None`.","locations":[{"ref":"sqlx-postgres/src/types/record.rs:188-196","code":"  188 |         match typ.kind() {\n  189 |             PgTypeKind::Simple if typ.0 == PgType::Record => Ok(PgTypeInfo::try_from_oid(oid)),\n  190 |             PgTypeKind::Composite(fields) => {\n  191 |                 let ty = fields[self.ind].1.clone();\n  192 |                 if ty.0.oid() != oid {\n  193 |                     return Err(\"unexpected mismatch of composite type information\".into());\n  194 |                 }\n  195 | \n  196 |                 Ok(Some(ty))"}]},{"id":"PANIC_38","type":"panic","type_label":"Panic","severity":"low","description":"In `SqliteArguments::bind`, a `$NNN`/`?NNN` parameter is parsed with `atoi` and used as `self.values.0[n - 1]`. The guard checks only `n > len`, not `n == 0`; a `$0` parameter name yields `n = 0` and `n - 1` underflows, panicking. The `?NNN` branch also uses `.expect(\"parameter of the form ?NNN\")`, panicking on `atoi` overflow.","fix":"Use `let Some(idx) = n.checked_sub(1) else { return Err(err_protocol!(\"invalid parameter index 0\")); };` and replace the `.expect` with a returned protocol error.","locations":[{"ref":"sqlx-sqlite/src/arguments.rs:78-110","code":"   78 |         for param_i in 1..=cnt {\n   79 |             // figure out the index of this bind parameter into our argument tuple\n   80 |             let n: usize = if let Some(name) = handle.bind_parameter_name(param_i) {\n   81 |                 if let Some(name) = name.strip_prefix('?') {\n   82 |                     // parameter should have the form ?NNN\n   83 |                     atoi(name.as_bytes()).expect(\"parameter of the form ?NNN\")\n   84 |                 } else if let Some(name) = name.strip_prefix('$') {\n   85 |                     // parameter should have the form $NNN\n   86 |                     atoi(name.as_bytes()).ok_or_else(|| {\n   87 |                         err_protocol!(\n   88 |                             \"parameters with non-integer names are not currently supported: {}\",\n   89 |                             name\n   90 |                         )\n   91 |                     })?\n   92 |                 } else {\n   93 |                     return Err(err_protocol!(\"unsupported SQL parameter format: {}\", name));\n   94 |                 }\n   95 |             } else {\n   96 |                 arg_i += 1;\n   97 |                 arg_i\n   98 |             };\n   99 | \n  100 |             if n > self.values.0.len() {\n  101 |                 // SQLite treats unbound variables as NULL\n  102 |                 // we reproduce this here\n  103 |                 // If you are reading this and think this should be an error, open an issue and we can\n  104 |                 // discuss configuring this somehow\n  105 |                 // Note that the query macros have a different way of enforcing\n  106 |                 // argument arity\n  107 |                 break;\n  108 |             }\n  109 | \n  110 |             self.values.0[n - 1].bind(handle, param_i)?;"}]},{"id":"PANIC_39","type":"panic","type_label":"Panic","severity":"low","description":"`EstablishParams::establish` converts the user-configured `busy_timeout` to `i32` milliseconds with `.expect(\"Given busy timeout value is too big.\")`. A `busy_timeout` greater than ~24.85 days (i32::MAX ms) panics on every connection establishment, reachable purely through the public `SqliteConnectOptions::busy_timeout` setter.","fix":"Clamp to `i32::MAX` (`i32::try_from(...).unwrap_or(i32::MAX)`) or return a configuration `Error` instead of panicking.","locations":[{"ref":"sqlx-sqlite/src/connection/establish.rs:180-184","code":"  180 |         // We also need to convert the u128 value to i32, checking we're not overflowing.\n  181 |         let ms = i32::try_from(self.busy_timeout.as_millis())\n  182 |             .expect(\"Given busy timeout value is too big.\");\n  183 | \n  184 |         handle.call_with_result(|db| unsafe { sqlite3_busy_timeout(db, ms) })?;"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In `AnyArguments::convert_into`, the NULL float type mappings are swapped: `AnyTypeInfoKind::Real` (which is `f32`) is encoded as `Option::<f64>::None`, and `Double` (which is `f64`) as `Option::<f32>::None`. Binding a NULL `f32`/`f64` through the `Any` driver sends the wrong SQL type hint, which can produce a type-mismatch error on strongly-typed backends like Postgres.","fix":"Swap the two arms: `Real => out.add(Option::<f32>::None)` and `Double => out.add(Option::<f64>::None)`.","locations":[{"ref":"sqlx-core/src/any/arguments.rs:70-71","code":"   70 |                 AnyValueKind::Null(AnyTypeInfoKind::Real) => out.add(Option::<f64>::None),\n   71 |                 AnyValueKind::Null(AnyTypeInfoKind::Double) => out.add(Option::<f32>::None),"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`AnyConnection::close_hard` forwards to `self.backend.close()` (the graceful close) instead of `self.backend.close_hard()`. The `AnyConnectionBackend` trait defines a distinct `close_hard` (backend.rs:23) meant to close immediately without the graceful shutdown handshake, so callers requesting a hard close silently get a full graceful close.","fix":"Call `self.backend.close_hard()` in `close_hard`.","locations":[{"ref":"sqlx-core/src/any/connection/mod.rs:103-105","code":"  103 |     fn close_hard(self) -> impl Future<Output = Result<(), Error>> + Send + 'static {\n  104 |         self.backend.close()\n  105 |     }"},{"ref":"sqlx-core/src/any/connection/backend.rs:19-23","code":"   19 |     /// Immediately close the connection without sending a graceful shutdown.\n   20 |     ///\n   21 |     /// This should still at least send a TCP `FIN` frame to let the server know we're dying.\n   22 |     #[doc(hidden)]\n   23 |     fn close_hard(self: Box<Self>) -> BoxFuture<'static, crate::Result<()>>;"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`MySqlTime::is_negative()` returns `self.sign.is_positive()` — inverted. It returns `true` for positive values and `false` for negative ones, and is byte-for-byte identical to `is_positive()` just above it. Any caller relying on `is_negative()` gets the opposite of the truth.","fix":"Change the body to `self.sign.is_negative()`.","locations":[{"ref":"sqlx-mysql/src/types/mysql_time.rs:209-217","code":"  209 |     /// Returns `true` if `self` is positive or zero, `false` if negative.\n  210 |     pub fn is_positive(&self) -> bool {\n  211 |         self.sign.is_positive()\n  212 |     }\n  213 | \n  214 |     /// Returns `true` if `self` is negative, `false` if positive or zero.\n  215 |     pub fn is_negative(&self) -> bool {\n  216 |         self.sign.is_positive()\n  217 |     }"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"`Execute::persistent` for `Map` returns `self.inner.arguments.is_some()` instead of delegating to the inner query like its siblings (`QueryAs` uses `self.inner.persistent()`, `QueryScalar` uses `Execute::persistent(&self.inner)`). A `Map` built from a query with `.persistent(false)` still reports `persistent = true` (arguments is `Some` pre-execution), so the statement is cached against the caller's explicit opt-out.","fix":"Change the body to `self.inner.persistent()`.","locations":[{"ref":"sqlx-core/src/query.rs:321-324","code":"  321 |     #[inline]\n  322 |     fn persistent(&self) -> bool {\n  323 |         self.inner.arguments.is_some()\n  324 |     }"},{"ref":"sqlx-core/src/query_as.rs:45-48","code":"   45 |     #[inline]\n   46 |     fn persistent(&self) -> bool {\n   47 |         self.inner.persistent()\n   48 |     }"},{"ref":"sqlx-core/src/query_scalar.rs:42-45","code":"   42 |     #[inline]\n   43 |     fn persistent(&self) -> bool {\n   44 |         Execute::persistent(&self.inner)\n   45 |     }"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","description":"In `return_type_for_id` the `rust_decimal` arm uses `select_input_type!($rust_decimal_ty $(, $rust_decimal_input)?)`, while every other arm of the same function (chrono at 388-396, bigdecimal at 421/433) uses `stringify!(...)`. `select_input_type!` prefers the optional *input* override, which is correct for `param_type_for_id` (binding) but wrong for a return/decode type. If a `rust_decimal` mapping declares an input override, the wrong type is emitted as the decoded return type.","fix":"Replace both `select_input_type!(...)` occurrences in `return_type_for_id` with `stringify!($rust_decimal_ty)`.","locations":[{"ref":"sqlx-core/src/type_checking.rs:445-455","code":"  445 |                     $(\n  446 |                         if <$rust_decimal_ty as sqlx_core::types::Type<$database>>::type_info() == *info {\n  447 |                             return Ok($crate::select_input_type!($rust_decimal_ty $(, $rust_decimal_input)?));\n  448 |                         }\n  449 |                     )*\n  450 | \n  451 |                     $(\n  452 |                         if <$rust_decimal_ty as sqlx_core::types::Type<$database>>::compatible(info) {\n  453 |                             return Ok($crate::select_input_type!($rust_decimal_ty $(, $rust_decimal_input)?));\n  454 |                         }\n  455 |                     )*"},{"ref":"sqlx-core/src/type_checking.rs:388-396","code":"  388 |                     $(\n  389 |                         if <$chrono_ty as sqlx_core::types::Type<$database>>::type_info() == *info {\n  390 |                             return Ok(stringify!($chrono_ty));\n  391 |                         }\n  392 |                     )*\n  393 | \n  394 |                     $(\n  395 |                         if <$chrono_ty as sqlx_core::types::Type<$database>>::compatible(info) {\n  396 |                             return Ok(stringify!($chrono_ty));"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"The strong-enum Encode derive parses child attributes with `?` in a `for` loop (encode.rs:159), propagating errors cleanly. The parallel strong-enum Decode derive uses `parse_child_attributes(&v.attrs).unwrap()` inside a `.map(|v| -> Arm {...})` closure (decode.rs:158), so a malformed child attribute (e.g. a bad `rename`) panics the proc-macro instead of yielding the clean compile error the Encode path gives.","fix":"Convert the Decode strong-enum loop to a fallible form (collect into `syn::Result<Vec<Arm>>` via `for`/`try_fold`) and use `?` like Encode.","locations":[{"ref":"sqlx-macros-core/src/derives/decode.rs:156-159","code":"  156 |     let value_arms = variants.iter().map(|v| -> Arm {\n  157 |         let id = &v.ident;\n  158 |         let attributes = parse_child_attributes(&v.attrs).unwrap();\n  159 | "},{"ref":"sqlx-macros-core/src/derives/encode.rs:156-159","code":"  156 | \n  157 |     for v in variants {\n  158 |         let id = &v.ident;\n  159 |         let attributes = parse_child_attributes(&v.attrs)?;"}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"The `max_branch_id` computation lists `self.branch_results.last_index()` twice and never consults `self.branch_origins.last_index()`. A branch id appearing only in `branch_origins` is under-counted and omitted from the rendered query-plan graph. Impact is limited to the diagnostic EXPLAIN graph (only active under `sqlx::explain` TRACE logging).","fix":"Replace the duplicated third entry with `self.branch_origins.last_index().unwrap_or(0)`.","locations":[{"ref":"sqlx-sqlite/src/logger.rs:224-231","code":"  224 |         let max_branch_id: i64 = [\n  225 |             self.branch_operations.last_index().unwrap_or(0),\n  226 |             self.branch_results.last_index().unwrap_or(0),\n  227 |             self.branch_results.last_index().unwrap_or(0),\n  228 |         ]\n  229 |         .into_iter()\n  230 |         .max()\n  231 |         .unwrap_or(0);"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"`Extend for AnyQueryResult` unconditionally overwrites `self.last_insert_id` with each element's value, including `None`. Aggregating results from multiple statements where a later statement has no insert id (e.g. a trailing non-insert statement) clobbers a previously captured `last_insert_id` to `None`.","fix":"Only overwrite when the incoming value is `Some`: `if elem.last_insert_id.is_some() { self.last_insert_id = elem.last_insert_id; }`.","locations":[{"ref":"sqlx-core/src/any/query_result.rs:21-28","code":"   21 | impl Extend<AnyQueryResult> for AnyQueryResult {\n   22 |     fn extend<T: IntoIterator<Item = AnyQueryResult>>(&mut self, iter: T) {\n   23 |         for elem in iter {\n   24 |             self.rows_affected += elem.rows_affected;\n   25 |             self.last_insert_id = elem.last_insert_id;\n   26 |         }\n   27 |     }\n   28 | }"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"`UStr::new` does `Arc::from(s.to_owned())`, allocating a heap `String` (copy 1) and then an `Arc<str>` (copy 2, plus dropping the temporary). `Arc<str>` implements `From<&str>` directly (single allocation + copy). `UStr` backs column/type names and is constructed frequently, so this doubles the per-construction allocation/copy cost.","fix":"Use `UStr::Shared(Arc::from(s))` (i.e. `Arc::<str>::from(&str)`) to avoid the intermediate `String`.","locations":[{"ref":"sqlx-core/src/ext/ustr.rs:16-19","code":"   16 | impl UStr {\n   17 |     pub fn new(s: &str) -> Self {\n   18 |         UStr::Shared(Arc::from(s.to_owned()))\n   19 |     }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"negligible","description":"`Encode for BString` calls `self.as_bytes().to_vec()` and encodes the owned `Vec<u8>` by value; the `<Vec<u8> as Encode>` impl then copies the bytes again into the argument buffer, so the data is allocated/copied twice. The `&BStr` impl just above (lines 40-45) encodes the borrowed slice and avoids the extra allocation.","fix":"Encode the borrowed slice: `<&[u8] as Encode<DB>>::encode(self.as_bytes(), buf)`, matching the `&BStr` impl.","locations":[{"ref":"sqlx-core/src/types/bstr.rs:48-58","code":"   48 | impl<'q, DB: Database> Encode<'q, DB> for BString\n   49 | where\n   50 |     DB: Database,\n   51 |     Vec<u8>: Encode<'q, DB>,\n   52 | {\n   53 |     fn encode_by_ref(\n   54 |         &self,\n   55 |         buf: &mut <DB as Database>::ArgumentBuffer,\n   56 |     ) -> Result<IsNull, BoxDynError> {\n   57 |         <Vec<u8> as Encode<DB>>::encode(self.as_bytes().to_vec(), buf)\n   58 |     }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"This post-`match` check can never fire: whenever `fixtures_type` is `ExplicitPath` at this point, `is_explicit_path` is necessarily `true` (it was either just set from that condition, or the `!is_explicit_path` case already returned an error in the match). So `!is_explicit_path` is always false and the intended `.sql`-extension validation (per the error message) silently never runs. The redundant parens also trip a clippy lint.","fix":"Remove the dead block, or replace it with the intended check (verify the explicit path ends in `.sql`).","locations":[{"ref":"sqlx-macros-core/src/test_attr.rs:353-358","code":"  353 |     if (matches!(fixtures_type, FixturesType::ExplicitPath) && !is_explicit_path) {\n  354 |         return Err(syn::Error::new_spanned(\n  355 |             litstr,\n  356 |             \"expected explicit path fixtures to have `.sql` extension\",\n  357 |         ));\n  358 |     }"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Inside `if mismatched_checksum`, `mismatched_checksum` can only be `true` when the outer `applied` was `Some` (it is set `true` only in the `Some` branch above). So `applied.map(|a| a.checksum.clone()).unwrap_or_else(|| Cow::Owned(vec![]))` can never take the `vec![]` fallback — it is dead defensive code that obscures intent.","fix":"Bind the guaranteed-`Some` `applied` and use `applied.checksum` directly instead of the `.map().unwrap_or_else()` fallback.","locations":[{"ref":"sqlx-cli/src/migrate.rs:175-188","code":"  175 |         if mismatched_checksum {\n  176 |             println!(\n  177 |                 \"applied migration had checksum {}\",\n  178 |                 short_checksum(\n  179 |                     &applied\n  180 |                         .map(|a| a.checksum.clone())\n  181 |                         .unwrap_or_else(|| Cow::Owned(vec![]))\n  182 |                 ),\n  183 |             );\n  184 |             println!(\n  185 |                 \"local migration has checksum {}\",\n  186 |                 short_checksum(&migration.checksum)\n  187 |             )\n  188 |         }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"A ~70-line commented-out `impl Executor for &mut PoolConnection` block is retained with a stale note. It references an old `prepare_with(self, sql: &'q str, ...)` signature that no longer matches the current `SqlStr`-based `Executor` API, so it is misleading dead code that can no longer be re-enabled as written.","fix":"Delete the commented-out block, or replace it with a one-line note plus an issue link if the rationale must be preserved.","locations":[{"ref":"sqlx-core/src/pool/executor.rs:76-147","code":"   76 | // Causes an overflow when evaluating `&mut DB::Connection: Executor`.\n   77 | //\n   78 | //\n   79 | // impl<'c, DB: Database> crate::executor::Executor<'c> for &'c mut crate::pool::PoolConnection<DB>\n   80 | // where\n   81 | //     &'c mut DB::Connection: Executor<'c, Database = DB>,\n   82 | // {\n   83 | //     type Database = DB;\n   84 | //\n   85 | //\n   86 | //\n   87 | //     #[inline]\n   88 | //     fn fetch_many<'e, 'q: 'e, E: 'q>(\n   89 | //         self,\n   90 | //         query: E,\n   91 | //     ) -> futures_core::stream::BoxStream<\n   92 | //         'e,\n   93 | //         Result<\n   94 | //             either::Either<<DB as crate::database::Database>::QueryResult, DB::Row>,\n   95 | //             crate::error::Error,\n   96 | //         >,\n   97 | //     >\n   98 | //     where\n   99 | //         'c: 'e,\n  100 | //         E: crate::executor::Execute<'q, DB>,\n  101 | //     {\n  102 | //         (**self).fetch_many(query)\n  103 | //     }\n  104 | //\n  105 | //     #[inline]\n  106 | //     fn fetch_optional<'e, 'q: 'e, E: 'q>(\n  107 | //         self,\n  108 | //         query: E,\n  109 | //     ) -> futures_core::future::BoxFuture<'e, Result<Option<DB::Row>, crate::error::Error>>\n  110 | //     where\n  111 | //         'c: 'e,\n  112 | //         E: crate::executor::Execute<'q, DB>,\n  113 | //     {\n  114 | //         (**self).fetch_optional(query)\n  115 | //     }\n  116 | //\n  117 | //     #[inline]\n  118 | //     fn prepare_with<'e, 'q: 'e>(\n  119 | //         self,\n  120 | //         sql: &'q str,\n  121 | //         parameters: &'e [<DB as crate::database::Database>::TypeInfo],\n  122 | //     ) -> futures_core::future::BoxFuture<\n  123 | //         'e,\n  124 | //         Result<<DB as crate::database::Database>::Statement<'q>, crate::error::Error>,\n  125 | //     >\n  126 | //     where\n  127 | //         'c: 'e,\n  128 | //     {\n  129 | //         (**self).prepare_with(sql, parameters)\n  130 | //     }\n  131 | //\n  132 | //     #[doc(hidden)]\n  133 | //     #[cfg(feature = \"offline\")]\n  134 | //     #[inline]\n  135 | //     fn describe<'e, 'q: 'e>(\n  136 | //         self,\n  137 | //         sql: &'q str,\n  138 | //     ) -> futures_core::future::BoxFuture<\n  139 | //         'e,\n  140 | //         Result<crate::describe::Describe<DB>, crate::error::Error>,\n  141 | //     >\n  142 | //     where\n  143 | //         'c: 'e,\n  144 | //     {\n  145 | //         (**self).describe(sql)\n  146 | //     }\n  147 | // }"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The inline comment claims the filename is checked against `<VERSION>_<DESCRIPTION>.<REVERSIBLE_DIRECTION>.sql`, but the condition only checks `parts.len() == 2 && parts[1].ends_with(\".sql\")`. The reversible-direction component is not validated here (it is inferred later via `MigrationType::from_filename`), so the comment overstates the check.","fix":"Reword to indicate only a `<VERSION>_<REST>.sql` shape is required at this point.","locations":[{"ref":"sqlx-core/src/migrate/source.rs:204-209","code":"  204 |         let parts = file_name.splitn(2, '_').collect::<Vec<_>>();\n  205 | \n  206 |         if parts.len() != 2 || !parts[1].ends_with(\".sql\") {\n  207 |             // not of the format: <VERSION>_<DESCRIPTION>.<REVERSIBLE_DIRECTION>.sql; ignore\n  208 |             continue;\n  209 |         }"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment on `AsyncSemaphoreReleaser` says the semaphore-from-`futures-intrusive` is used because the one from `async-std` lacks adding arbitrary permits, but the identical comment on `AsyncSemaphore` (line 10) correctly names `async-lock` (and both link to `smol-rs/async-lock` issues). The releaser comment names the wrong crate.","fix":"Change `async-std` to `async-lock` in the `AsyncSemaphoreReleaser` comment.","locations":[{"ref":"sqlx-core/src/sync.rs:154-158","code":"  154 | pub struct AsyncSemaphoreReleaser<'a> {\n  155 |     // We use the semaphore from futures-intrusive as the one from async-std\n  156 |     // is missing the ability to add arbitrary permits, and is not guaranteed to be fair:\n  157 |     // * https://github.com/smol-rs/async-lock/issues/22\n  158 |     // * https://github.com/smol-rs/async-lock/issues/23"},{"ref":"sqlx-core/src/sync.rs:9-13","code":"    9 | pub struct AsyncSemaphore {\n   10 |     // We use the semaphore from futures-intrusive as the one from async-lock\n   11 |     // is missing the ability to add arbitrary permits, and is not guaranteed to be fair:\n   12 |     // * https://github.com/smol-rs/async-lock/issues/22\n   13 |     // * https://github.com/smol-rs/async-lock/issues/23"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The doc comment is truncated (ends with a comma) and wrong: it says the function returns `true` only when `val` is `\"true\"`, but the body also returns `true` for `\"1\"` and is case-insensitive.","fix":"Fix the comment, e.g. \"Returns true if val is \"true\" (case-insensitive) or \"1\".\".","locations":[{"ref":"sqlx-macros-core/src/query/metadata.rs:159-162","code":"  159 | /// Returns `true` if `val` is `\"true\"`,\n  160 | fn is_truthy_bool(val: &str) -> bool {\n  161 |     val.eq_ignore_ascii_case(\"true\") || val == \"1\"\n  162 | }"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"Migration versions are parsed as arbitrary `i64` from the filename prefix, so `i64::MAX` or negative values are accepted. `migration.version + 1` (lines 576, 588, 592) and `latest.version - previous.version` (line 587) can overflow/underflow: a migration named `9223372036854775807_x.sql` makes `sqlx migrate add` panic in debug and silently wrap to a negative version in release.","fix":"Use `checked_add`/`checked_sub` and fall back to timestamp versioning (or emit a clear error) when the next sequential version would overflow.","locations":[{"ref":"sqlx-cli/src/opt.rs:570-598","code":"  570 |         match (self.timestamp, self.sequential, default_versioning) {\n  571 |             (true, false, _) | (false, false, DefaultVersioning::Timestamp) => next_timestamp(),\n  572 |             (false, true, _) | (false, false, DefaultVersioning::Sequential) => fmt_sequential(\n  573 |                 migrator\n  574 |                     .migrations\n  575 |                     .last()\n  576 |                     .map_or(1, |migration| migration.version + 1),\n  577 |             ),\n  578 |             (false, false, DefaultVersioning::Inferred) => {\n  579 |                 migrator\n  580 |                     .migrations\n  581 |                     .rchunks(2)\n  582 |                     .next()\n  583 |                     .and_then(|migrations| {\n  584 |                         match migrations {\n  585 |                             [previous, latest] => {\n  586 |                                 // If the latest two versions differ by 1, infer sequential.\n  587 |                                 (latest.version - previous.version == 1)\n  588 |                                     .then_some(latest.version + 1)\n  589 |                             }\n  590 |                             [latest] => {\n  591 |                                 // If only one migration exists and its version is 0 or 1, infer sequential\n  592 |                                 matches!(latest.version, 0 |
