<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"In User::handlePasswordExpiry(), the LDAP 'pwdchangedtime' value is parsed with \\DateTime::createFromFormat('YmdHisZ', $pwdChangedTime[0]). createFromFormat() returns false on a malformed value, but the result is used immediately with ->add() without any check. If the directory returns a pwdchangedtime that does not match the expected format (e.g. a value without the trailing 'Z' offset, or a generalized-time variant), this triggers a fatal 'Call to a member function add() on bool' during the post_login hook, breaking login for the affected user.","fix":"Check the return value of createFromFormat() for false before calling ->add(); skip the expiry-warning logic (and log at debug) when the timestamp cannot be parsed.","locations":[{"ref":"apps/user_ldap/lib/User/User.php:803-806","code":"  803 | \t\t\t\t\t\t$pwdChangedTimeDt = \\DateTime::createFromFormat('YmdHisZ', $pwdChangedTime[0]);\n  804 | \t\t\t\t\t\t$pwdChangedTimeDt->add(new \\DateInterval('PT' . $pwdMaxAgeInt . 'S'));\n  805 | \t\t\t\t\t\t$currentDateTime = new \\DateTime();\n  806 | \t\t\t\t\t\t$secondsToExpiry = $pwdChangedTimeDt->getTimestamp() - $currentDateTime->getTimestamp();"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","description":"External\\Manager::canAccessShare can fatally dereference null. For a group external share it calls `$this->groupManager->get($groupShare->getUser())->inGroup($user)`. IGroupManager::get() returns null when the group no longer exists (e.g. the group was deleted but the share_external row / sub-share remains, or backend caching inconsistencies). Calling ->inGroup() on null is a fatal TypeError. This is reachable from Manager::getShare() (a request path used when resolving/displaying federated incoming shares). Additionally, the preceding `$this->externalShareMapper->getById($parentId)` on line 156 can throw an uncaught DoesNotExistException if the parent entry is missing.","fix":"Null-check the group before calling inGroup, e.g. `$group = $this->groupManager->get($groupShare->getUser()); if ($group !== null && $group->inGroup($user)) { return true; }`. Wrap the getById($parentId) call in a try/catch for DoesNotExistException and return false (deny) when the parent share cannot be loaded.","locations":[{"ref":"apps/files_sharing/lib/External/Manager.php:152-164","code":"  152 | \t\tif ($share->getShareType() === IShare::TYPE_GROUP) {\n  153 | \t\t\t$parentId = $share->getParent();\n  154 | \t\t\tif ($parentId !== '-1') {\n  155 | \t\t\t\t// we just retrieved a sub-share, switch to the parent entry for verification\n  156 | \t\t\t\t$groupShare = $this->externalShareMapper->getById($parentId);\n  157 | \t\t\t} else {\n  158 | \t\t\t\t$groupShare = $share;\n  159 | \t\t\t}\n  160 | \n  161 | \t\t\tif ($this->groupManager->get($groupShare->getUser())->inGroup($user)) {\n  162 | \t\t\t\treturn true;\n  163 | \t\t\t}\n  164 | \t\t}"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","description":"Watcher::checkUpdate calls $this->update(), then re-reads the entry with `$newEntry = $this->cache->get($path)` and immediately calls `$newEntry->getStorageMTime()`. If the file no longer exists after update (the scanner removed it from cache, e.g. it was deleted on the backend between the needsUpdate check and the rescan), get() returns false and `false->getStorageMTime()` is a fatal error. This is a TOCTOU-style race that surfaces as an uncaught Error.","fix":"Guard the re-read: `if ($newEntry === false) { return true; }` (or return false) before calling getStorageMTime().","locations":[{"ref":"lib/private/Files/Cache/Watcher.php:74-80","code":"   74 | \t\t\tif ($cachedEntry === false) {\n   75 | \t\t\t\treturn true;\n   76 | \t\t\t} else {\n   77 | \t\t\t\t// storage backends can sometimes return false positives, only return true if the scanner actually found a change\n   78 | \t\t\t\t$newEntry = $this->cache->get($path);\n   79 | \t\t\t\treturn $newEntry->getStorageMTime() > $cachedEntry->getStorageMTime();\n   80 | \t\t\t}"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","description":"Local::getETag calls calculateEtag($path, $this->stat($path)); stat() can return false (non-existent path or stat failure). calculateEtag is declared `private function calculateEtag(string $path, array $stat)`, so passing `false` raises a TypeError. Even ignoring the type hint, the first line dereferences `$stat['mode']` before the `if ($stat === false)` guard at line 543, making that guard dead code and the false-handling never reachable. getETag is invoked widely (e.g. View::getETag), so a stat failure on a Local storage path turns into an uncaught TypeError.","fix":"Handle a false stat before use: change the parameter type to `array|false`, move the `$stat === false` check to the top of calculateEtag, and return md5('') early when stat failed.","locations":[{"ref":"lib/private/Files/Storage/Local.php:534-563","code":"  534 | \t#[\\Override]\n  535 | \tpublic function getETag(string $path): string|false {\n  536 | \t\treturn $this->calculateEtag($path, $this->stat($path));\n  537 | \t}\n  538 | \n  539 | \tprivate function calculateEtag(string $path, array $stat): string|false {\n  540 | \t\tif ($stat['mode'] & 0x4000 && !($stat['mode'] & 0x8000)) { // is_dir & not socket\n  541 | \t\t\treturn parent::getETag($path);\n  542 | \t\t} else {\n  543 | \t\t\tif ($stat === false) {\n  544 | \t\t\t\treturn md5('');\n  545 | \t\t\t}\n  546 | \n  547 | \t\t\t$toHash = '';\n  548 | \t\t\tif (isset($stat['mtime'])) {\n  549 | \t\t\t\t$toHash .= $stat['mtime'];\n  550 | \t\t\t}\n  551 | \t\t\tif (isset($stat['ino'])) {\n  552 | \t\t\t\t$toHash .= $stat['ino'];\n  553 | \t\t\t}\n  554 | \t\t\tif (isset($stat['dev'])) {\n  555 | \t\t\t\t$toHash .= $stat['dev'];\n  556 | \t\t\t}\n  557 | \t\t\tif (isset($stat['size'])) {\n  558 | \t\t\t\t$toHash .= $stat['size'];\n  559 | \t\t\t}\n  560 | \n  561 | \t\t\treturn md5($toHash);\n  562 | \t\t}\n  563 | \t}"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","description":"In getImage, getimagesizefromstring($file->getContent()) can return false when the stored bytes are not a valid image. The code then unconditionally reads $info[2] and passes it to image_type_to_mime_type(). With $info === false, $info[2] is an 'array offset on false' warning yielding null, and image_type_to_mime_type(null) is invalid. Although the bytes are normally produced by a provider, a corrupt/empty stored file leads to a broken response/error rather than a clean 404/500.","fix":"Check the result of getimagesizefromstring() for false (and that index 2 exists) before calling image_type_to_mime_type(); return a NOT_FOUND or INTERNAL_SERVER_ERROR DataResponse otherwise.","locations":[{"ref":"core/Controller/TextToImageApiController.php:165-168","code":"  165 | \t\t\t$file = $folder->getFolder((string)$task->getId())->getFile((string)$index);\n  166 | \t\t\t$info = getimagesizefromstring($file->getContent());\n  167 | \n  168 | \t\t\treturn new FileDisplayResponse($file, Http::STATUS_OK, ['Content-Type' => image_type_to_mime_type($info[2])]);"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","description":"OCSMiddleware::afterController() reads `$response->getData()['message']` when converting a\n401/403 JSONResponse to an OCS response (lines 89 and 98). The data array is arbitrary\ncontroller output and is not guaranteed to contain a 'message' key, so this can raise an\n\"Undefined array key 'message'\" warning and yield a null message. Other middleware that\nproduce 401/403 JSONResponses without a 'message' field trigger this.","fix":"Use a null-coalescing access: `$message = $response->getData()['message'] ?? '';` (only when getData() is an array).","locations":[{"ref":"lib/private/AppFramework/Middleware/OCSMiddleware.php:84-102","code":"   84 | \t\tif ($controller instanceof OCSController && !($response instanceof BaseResponse)) {\n   85 | \t\t\tif ($response->getStatus() === Http::STATUS_UNAUTHORIZED) {\n   86 | \t\t\t\t$message = '';\n   87 | \t\t\t\tif ($response instanceof JSONResponse) {\n   88 | \t\t\t\t\t/** @var DataResponse $response */\n   89 | \t\t\t\t\t$message = $response->getData()['message'];\n   90 | \t\t\t\t}\n   91 | \n   92 | \t\t\t\treturn $this->buildNewResponse($controller, OCSController::RESPOND_UNAUTHORISED, $message);\n   93 | \t\t\t}\n   94 | \t\t\tif ($response->getStatus() === Http::STATUS_FORBIDDEN) {\n   95 | \t\t\t\t$message = '';\n   96 | \t\t\t\tif ($response instanceof JSONResponse) {\n   97 | \t\t\t\t\t/** @var DataResponse $response */\n   98 | \t\t\t\t\t$message = $response->getData()['message'];\n   99 | \t\t\t\t}\n  100 | \n  101 | \t\t\t\treturn $this->buildNewResponse($controller, Http::STATUS_FORBIDDEN, $message);\n  102 | \t\t\t}"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"In getFileContentsInternal the file is opened with $node->fopen('rb') purely to feed mime_content_type(), but the returned stream handle is never assigned to a variable nor closed. A second, independent stream is then opened at line 574 for the StreamResponse. Each call to the file-download endpoint therefore leaks one open file handle for the lifetime of the request. Under high download volume this can exhaust the per-process open-file-descriptor limit.","fix":"Open the stream once into a variable, use it for both the mime detection (or use IMimeTypeDetector::detectContent on a small read) and the StreamResponse, or fclose() the temporary handle after mime_content_type() returns.","locations":[{"ref":"core/Controller/TaskProcessingApiController.php:563-580","code":"  563 | \t\t$contentType = $node->getMimeType();\n  564 | \t\tif (function_exists('mime_content_type')) {\n  565 | \t\t\t$mimeType = mime_content_type($node->fopen('rb'));\n  566 | \t\t\tif ($mimeType !== false) {\n  567 | \t\t\t\t$mimeType = $this->mimeTypeDetector->getSecureMimeType($mimeType);\n  568 | \t\t\t\tif ($mimeType !== 'application/octet-stream') {\n  569 | \t\t\t\t\t$contentType = $mimeType;\n  570 | \t\t\t\t}\n  571 | \t\t\t}\n  572 | \t\t}\n  573 | \n  574 | \t\t$response = new StreamResponse($node->fopen('rb'));\n  575 | \t\t$response->addHeader(\n  576 | \t\t\t'Content-Disposition',\n  577 | \t\t\t'attachment; filename=\"' . rawurldecode($node->getName()) . '\"'\n  578 | \t\t);\n  579 | \t\t$response->addHeader('Content-Type', $contentType);\n  580 | \t\treturn $response;"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"Common::copy file branch opens both `$sourceStream` and `$targetStream` with fopen but never closes either of them on any path. Every cross-path copy on a Common-derived storage that hits this branch leaks two stream handles. (Contrast with file_get_contents/hash in the same class which correctly fclose their handles.) The streams are also not null-checked before stream_copy_to_stream, so a failed fopen yields a warning instead of a clean failure.","fix":"Check both handles for false and fclose($sourceStream) and fclose($targetStream) before returning (use try/finally around stream_copy_to_stream).","locations":[{"ref":"lib/private/Files/Storage/Common.php:233-245","code":"  233 | \t\t} else {\n  234 | \t\t\t$sourceStream = $this->fopen($source, 'r');\n  235 | \t\t\t$targetStream = $this->fopen($target, 'w');\n  236 | \t\t\t$result = stream_copy_to_stream($sourceStream, $targetStream);\n  237 | \t\t\tif ($result !== false) {\n  238 | \t\t\t\t$result = true;\n  239 | \t\t\t}\n  240 | \t\t\tif (!$result) {\n  241 | \t\t\t\tServer::get(LoggerInterface::class)->warning(\"Failed to write data while copying $source to $target\");\n  242 | \t\t\t}\n  243 | \t\t\t$this->removeCachedFile($target);\n  244 | \t\t\treturn $result;\n  245 | \t\t}"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"LocalTempFileTrait::toTmpFile opens the source stream via `$this->fopen($path, 'r')` but never closes it. On the success path and on the `stream_copy_to_stream` failure path (`$result === false`) the `$source` handle is leaked. This is reachable for every non-local storage that uses getLocalFile()/getCachedFile() (the trait is used by ObjectStoreStorage, DAV, etc.), so handles accumulate during operations that materialize many remote files locally.","fix":"Call `fclose($source)` after the copy completes (both before the `return false` and before the final `return $tmpFile`), e.g. close in a finally block once the copy is done.","locations":[{"ref":"lib/private/Files/Storage/LocalTempFileTrait.php:40-59","code":"   40 | \tprotected function toTmpFile(string $path): string|false { //no longer in the storage api, still useful here\n   41 | \t\t$source = $this->fopen($path, 'r');\n   42 | \t\tif (!$source) {\n   43 | \t\t\treturn false;\n   44 | \t\t}\n   45 | \t\tif ($pos = strrpos($path, '.')) {\n   46 | \t\t\t$extension = substr($path, $pos);\n   47 | \t\t} else {\n   48 | \t\t\t$extension = '';\n   49 | \t\t}\n   50 | \t\t$tmpFile = Server::get(ITempManager::class)->getTemporaryFile($extension);\n   51 | \t\t$target = fopen($tmpFile, 'w');\n   52 | \t\t$result = stream_copy_to_stream($source, $target);\n   53 | \t\tfclose($target);\n   54 | \t\tif ($result === false) {\n   55 | \t\t\treturn false;\n   56 | \t\t}\n   57 | \n   58 | \t\treturn $tmpFile;\n   59 | \t}"}]},{"id":"RES_4","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"ObjectStoreStorage::fopen, for append/random-access modes (a, ab, r+, a+, x, x+, c, c+) when the file exists, opens the existing object via `$source = $this->fopen($path, 'r')` and passes it to file_put_contents($tmpFile, $source) but never fclose()s $source. Each open in these modes on an existing object leaks one stream handle.","fix":"After `file_put_contents($tmpFile, $source);` close the handle: `if (is_resource($source)) { fclose($source); }`.","locations":[{"ref":"lib/private/Files/ObjectStore/ObjectStoreStorage.php:381-390","code":"  381 | \t\t\t\t$tmpFile = Server::get(ITempManager::class)->getTemporaryFile($ext);\n  382 | \t\t\t\tif ($this->file_exists($path)) {\n  383 | \t\t\t\t\t$source = $this->fopen($path, 'r');\n  384 | \t\t\t\t\tfile_put_contents($tmpFile, $source);\n  385 | \t\t\t\t}\n  386 | \t\t\t\t$handle = fopen($tmpFile, $mode);\n  387 | \t\t\t\treturn CallbackWrapper::wrap($handle, null, null, function () use ($path, $tmpFile): void {\n  388 | \t\t\t\t\t$this->writeBack($tmpFile, $path);\n  389 | \t\t\t\t\tunlink($tmpFile);\n  390 | \t\t\t\t});"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"ViewOnly::dirRecursiveCheck returns after inspecting only the FIRST subfolder of a directory listing. The loop iterates over a folder's children, but when it encounters a child that is a Folder it does `return $this->dirRecursiveCheck($file)` which exits the whole function immediately. As a result, any sibling files or folders that appear after the first subfolder in the listing are never checked. If that first subfolder is downloadable but a later sibling (a file or another folder) has the download/view-only permission attribute denied, the method still returns true and the whole bulk download (e.g. zip of a shared folder) is wrongly allowed, leaking content the share owner marked as view-only. This is an access-control bypass for the 'hide download / view-only' share attribute on folders with multiple children.","fix":"Do not return on the first subfolder. Recurse into each subfolder and only return false on failure, e.g. `if ($file instanceof Folder) { if (!$this->dirRecursiveCheck($file)) { return false; } }`, allowing the loop to continue checking the remaining siblings. Return true only after the full listing has been validated.","locations":[{"ref":"apps/files_sharing/lib/ViewOnly.php:64-72","code":"   64 | \t\tforeach ($files as $file) {\n   65 | \t\t\tif ($file instanceof File) {\n   66 | \t\t\t\tif (!$this->checkFileInfo($file)) {\n   67 | \t\t\t\t\treturn false;\n   68 | \t\t\t\t}\n   69 | \t\t\t} elseif ($file instanceof Folder) {\n   70 | \t\t\t\treturn $this->dirRecursiveCheck($file);\n   71 | \t\t\t}\n   72 | \t\t}"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","description":"ShardedQueryBuilder::set() assigns the new shard-key value to a local variable\n`$updateShardKey` instead of the property `$this->updateShardKey`. The property\nis declared at line 36 and is the *only* input consumed by validate() (lines\n366-383) to detect an UPDATE that would move a row to a different shard. Because\nthe property is never set, the cross-shard-move guard (\"Update statement would\nmove rows to a different shard\") can never fire. An app that updates the shard\nkey column (e.g. `storage` on filecache) to a value that hashes to a different\nshard will silently corrupt the sharded data set rather than being rejected.","fix":"Change `$updateShardKey = $value;` to `$this->updateShardKey = $value;`. Note the property is typed `?int`, so the assigned value (the column value / placeholder) may also need a type adjustment to match how validate() consumes it via getKeyValue().","locations":[{"ref":"lib/private/DB/QueryBuilder/Sharded/ShardedQueryBuilder.php:164-169","code":"  164 | \tpublic function set($key, $value) {\n  165 | \t\tif ($this->shardDefinition && $key === $this->shardDefinition->shardKey) {\n  166 | \t\t\t$updateShardKey = $value;\n  167 | \t\t}\n  168 | \t\treturn parent::set($key, $value);\n  169 | \t}"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","description":"Operator precedence bug in the read-permission guard. `!$permissions & Constants::PERMISSION_READ` is evaluated as `(!$permissions) & Constants::PERMISSION_READ` because `!` binds tighter than `&`. `!$permissions` is a boolean; for any non-zero permission set it is `false`, and `false & 1 === 0` (falsy), so the early-return is never taken and metadata is returned even for paths that lack read permission. Conversely when permissions are exactly 0 the expression is `true & 1 === 1` (truthy) so it returns null — which is the only case it accidentally works. The intended check is `!($permissions & Constants::PERMISSION_READ)`. This affects scanning/metadata of every storage extending Common.","fix":"Wrap the bitwise test in parentheses: `if (!($permissions & Constants::PERMISSION_READ)) { return null; }`.","locations":[{"ref":"lib/private/Files/Storage/Common.php:651-654","code":"  651 | \t\tif (!$permissions & Constants::PERMISSION_READ) {\n  652 | \t\t\t//can't read, nothing we can do\n  653 | \t\t\treturn null;\n  654 | \t\t}"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In isTrustedDomain(), the loop over the configured trusted_domains list uses `break` instead of `continue` when it encounters a non-string entry: `if (gettype($trusted) !== 'string') { break; }`. A single malformed (non-string) entry in the trusted_domains config aborts the entire match loop, so every trusted domain listed after the bad entry is silently ignored. This can lock legitimate users out (all requests treated as untrusted) depending on config ordering, and makes the security-critical trusted-domain check order-dependent on data an admin can easily get wrong (e.g. an accidental nested array or numeric value).","fix":"Replace `break;` with `continue;` so a single invalid entry only skips that one entry instead of aborting evaluation of the remaining trusted domains.","locations":[{"ref":"lib/private/Security/TrustedDomainHelper.php:81-91","code":"   81 | \t\tforeach ($trustedList as $trusted) {\n   82 | \t\t\tif (gettype($trusted) !== 'string') {\n   83 | \t\t\t\tbreak;\n   84 | \t\t\t}\n   85 | \t\t\t$regex = '/^' . implode('[-\\.a-zA-Z0-9]*', array_map(function ($v) {\n   86 | \t\t\t\treturn preg_quote($v, '/');\n   87 | \t\t\t}, explode('*', $trusted))) . '$/i';\n   88 | \t\t\tif (preg_match($regex, $domain) || preg_match($regex, $domainWithPort)) {\n   89 | \t\t\t\treturn true;\n   90 | \t\t\t}\n   91 | \t\t}"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"Group_LDAP::_groupMembers() merges dynamic group members with the '+' array-union operator: $allMembers += $this->getDynamicGroupMembers($dnGroup). getDynamicGroupMembers() returns an associative array of the form [memberDN => 1] (DN as key, value 1), whereas $allMembers is a list of member DN strings (values are DNs). After the union, dynamic members appear with the DN as the array key but value 1, and the subsequent array_unique() plus all consumers of _groupMembers() (inGroup(), usersInGroup(), countUsersInGroup()) treat the array *values* as DNs. As a result dynamic-group members are effectively ignored / mismatched in membership checks and listings.","fix":"Normalize getDynamicGroupMembers() to return a list of DN values (e.g. array_keys()) and merge with array_merge(), or make _groupMembers() consistently key-based throughout.","locations":[{"ref":"apps/user_ldap/lib/Group_LDAP.php:282-290","code":"  282 | \t\t$allMembers += $this->getDynamicGroupMembers($dnGroup);\n  283 | \n  284 | \t\t$allMembers = array_unique($allMembers);\n  285 | \n  286 | \t\t// A group cannot be a member of itself\n  287 | \t\t$index = array_search($dnGroup, $allMembers, true);\n  288 | \t\tif ($index !== false) {\n  289 | \t\t\tunset($allMembers[$index]);\n  290 | \t\t}"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In UpdateGroupsService::handleRemovedGroups(), groupMembershipMapper->deleteGroups($removedGroups) is called first, deleting all membership rows for the removed groups. Only afterwards does the loop call findGroupMemberships($group) to dispatch UserRemovedEvent for each former member. Because the rows were already deleted, findGroupMemberships() returns an empty list and no UserRemovedEvent is ever dispatched for users in removed groups. Downstream consumers of UserRemovedEvent (e.g. share/ACL cleanup, activity) are therefore never notified when an LDAP group disappears.","fix":"Collect the memberships (and resolve user objects) for each removed group before calling deleteGroups(), then delete, then dispatch the UserRemovedEvents.","locations":[{"ref":"apps/user_ldap/lib/Service/UpdateGroupsService.php:197-220","code":"  197 | \tpublic function handleRemovedGroups(array $removedGroups): void {\n  198 | \t\t$this->logger->debug('service \"updateGroups\" - dealing with removed groups.');\n  199 | \n  200 | \t\t$this->groupMembershipMapper->deleteGroups($removedGroups);\n  201 | \t\tforeach ($removedGroups as $group) {\n  202 | \t\t\t$groupObject = $this->groupManager->get($group);\n  203 | \t\t\tif ($groupObject instanceof IGroup) {\n  204 | \t\t\t\t$groupMemberships = $this->groupMembershipMapper->findGroupMemberships($group);\n  205 | \t\t\t\tforeach ($groupMemberships as $groupMembership) {\n  206 | \t\t\t\t\t$userObject = $this->userManager->get($groupMembership->getUserid());\n  207 | \t\t\t\t\tif ($userObject instanceof IUser) {\n  208 | \t\t\t\t\t\t$this->dispatcher->dispatchTyped(new UserRemovedEvent($groupObject, $userObject));\n  209 | \t\t\t\t\t}\n  210 | \t\t\t\t}\n  211 | \t\t\t}\n  212 | \t\t}\n  213 | \n  214 | \t\t$this->logger->info(\n  215 | \t\t\t'service \"updateGroups\" - groups {removedGroups} were removed.',\n  216 | \t\t\t[\n  217 | \t\t\t\t'removedGroups' => $removedGroups\n  218 | \t\t\t]\n  219 | \t\t);\n  220 | \t}"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"PartitionSplit::getTablesAndAliases() combines alias names and table names with the\narray union operator: `array_keys($this->aliases) + $this->tables`. Both operands are\n0-indexed lists, so `+` keeps the left operand's value for every shared integer key and\ndiscards the corresponding table entry. Concretely, with 2 aliases and 3 tables the\nresult is [alias0, alias1, table2] — table0 and table1 are dropped. The returned list is\nused by checkPredicateForTable() and isColumnInPartition() to decide which partition a\npredicate/column belongs to, so partition detection silently misses tables whose index\nis shadowed by an alias, leading to query parts being routed to the wrong (or no) split query.","fix":"Use array_merge: `return array_merge(array_keys($this->aliases), $this->tables);`","locations":[{"ref":"lib/private/DB/QueryBuilder/Partitioned/PartitionSplit.php:47-49","code":"   47 | \tprivate function getTablesAndAliases(): array {\n   48 | \t\treturn array_keys($this->aliases) + $this->tables;\n   49 | \t}"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"createCertificateBundle() decides whether to include a user-uploaded certificate with `if (strpos($data, 'BEGIN CERTIFICATE'))`. strpos returns the integer offset of the match, which is falsy (0) when the marker is at the very start of the file, and also returns false when absent. A certificate whose content begins exactly with 'BEGIN CERTIFICATE' (no leading dashes/whitespace) would be silently dropped from the generated CA bundle, while the intent is clearly to test for presence of the marker.","fix":"Use a strict check: `if (strpos($data, 'BEGIN CERTIFICATE') !== false)` (or str_contains($data, 'BEGIN CERTIFICATE')).","locations":[{"ref":"lib/private/Security/CertificateManager.php:122-129","code":"  122 | \t\tforeach ($certs as $cert) {\n  123 | \t\t\t$file = $path . '/uploads/' . $cert->getName();\n  124 | \t\t\t$data = $this->view->file_get_contents($file);\n  125 | \t\t\tif (strpos($data, 'BEGIN CERTIFICATE')) {\n  126 | \t\t\t\tfwrite($fhCerts, $data);\n  127 | \t\t\t\tfwrite($fhCerts, \"\\r\\n\");\n  128 | \t\t\t}\n  129 | \t\t}"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"LegacyPublicAuth compares the session value PublicAuth::DAV_AUTHENTICATED with === against a single share id ($share->getId()). However PublicAuth::addShareToSession() stores DAV_AUTHENTICATED as an ARRAY of allowed share ids, and PublicAuth::isShareInSession() reads it as an array. The strict comparison of an int to an array here can never be true, so the 'already authenticated in session' fallback branch in the legacy backend is effectively dead and a previously password-authenticated session is not honored by the legacy endpoint.","fix":"Use the same array-aware check as PublicAuth (is_array() + in_array($share->getId(), $allowedShareIds)) so the legacy backend honors the shared session format.","locations":[{"ref":"apps/dav/lib/Connector/LegacyPublicAuth.php:76-78","code":"   76 | \t\t\t\t} elseif ($this->session->exists(PublicAuth::DAV_AUTHENTICATED)\n   77 | \t\t\t\t\t&& $this->session->get(PublicAuth::DAV_AUTHENTICATED) === $share->getId()) {\n   78 | \t\t\t\t\treturn true;"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"getCirclesFileIds is gated on $this->appManager->isEnabledForUser('circles'). In processFilterRulesForFileIDs, circle filtering is reachable on public WebDAV / federated contexts where there may be no logged-in user; isEnabledForUser with a null user can behave inconsistently versus isEnabledForAnyone, potentially silently returning no circle results. Minor but can cause filter-files REPORT to silently drop circle matches depending on session state.","fix":"Use an explicit user (or isEnabledForAnyone) consistent with how the REPORT endpoint is authenticated, and document expected behavior when no user is present.","locations":[{"ref":"apps/dav/lib/Connector/Sabre/FilesReportPlugin.php:307-312","code":"  307 | \tprivate function getCirclesFileIds(array $circlesIds) {\n  308 | \t\tif (!$this->appManager->isEnabledForUser('circles') || !class_exists('\\OCA\\Circles\\Api\\v1\\Circles')) {\n  309 | \t\t\treturn [];\n  310 | \t\t}\n  311 | \t\treturn Circles::getFilesForCircles($circlesIds);\n  312 | \t}"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"solveChallenge redirects to urldecode($redirect_url) wrapped in IURLGenerator::getAbsoluteURL() without the safety filtering applied to other login redirects (e.g. LoginController::generateRedirect rejects URLs containing '@' to prevent unvalidated redirect tricks). Because getAbsoluteURL prefixes the server base URL it is not a full open redirect, but the inconsistent handling (and the extra urldecode step that the other flows do not perform) can allow crafted redirect targets that the other flows reject.","fix":"Route the redirect through the same validation used by LoginController::generateRedirect (reject '@', validate it stays on-instance) and avoid the extra urldecode unless strictly required.","locations":[{"ref":"core/Controller/TwoFactorChallengeController.php:156-159","code":"  156 | \t\t\tif ($this->twoFactorManager->verifyChallenge($challengeProviderId, $user, $challenge)) {\n  157 | \t\t\t\tif (!is_null($redirect_url)) {\n  158 | \t\t\t\t\treturn new RedirectResponse($this->urlGenerator->getAbsoluteURL(urldecode($redirect_url)));\n  159 | \t\t\t\t}"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ControllerMethodReflector::reflect() parses annotation parameters of the form `@Foo(a=1,b=2)`\nby splitting each comma-separated token on '=' with a list destructure:\n`[$key, $value] = explode('=', $annotationValues);`. A token without '=' (e.g. `@Foo(bar)`)\nyields a single-element array, so `$value` is undefined and an \"Undefined array key 1\" notice\nis emitted, and a token with more than one '=' silently drops the remainder. This affects\nparsing of any controller annotation that uses the parenthesised key=value syntax with a\nmalformed entry.","fix":"Guard with a count/strpos check before destructuring, e.g. skip tokens lacking '=' or use explode('=', $token, 2) with a default for the missing value.","locations":[{"ref":"lib/private/AppFramework/Utility/ControllerMethodReflector.php:57-60","code":"   57 | \t\t\t\t\tforeach ($splitArray as $annotationValues) {\n   58 | \t\t\t\t\t\t[$key, $value] = explode('=', $annotationValues);\n   59 | \t\t\t\t\t\t$this->annotations[$annotation][$key] = $value;\n   60 | \t\t\t\t\t}"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In Crypto::decrypt the HMAC-mismatch error is thrown inconsistently: the ownCloud-v2-migration branch throws `\\Exception('HMAC does not match.')` while the normal branch throws `\\RuntimeException('HMAC does not match.')`. Callers that catch the documented `\\Exception` (per the method's @throws) behave fine, but any code narrowing on exception type for the two structurally-identical failure modes will treat them differently. This is a copy/paste divergence in two adjacent branches that should report the same condition identically.","fix":"Throw the same exception type for both HMAC-mismatch branches (the method documents `@throws Exception`; use a single consistent exception class).","locations":[{"ref":"lib/private/Security/Crypto.php:159-168","code":"  159 | \t\tif ($isOwnCloudV2Migration) {\n  160 | \t\t\t// ownCloud uses the binary IV for HMAC calculation\n  161 | \t\t\tif (!hash_equals($this->calculateHMAC($parts[0] . $iv, $hmacKey), $hmac)) {\n  162 | \t\t\t\tthrow new Exception('HMAC does not match.');\n  163 | \t\t\t}\n  164 | \t\t} else {\n  165 | \t\t\tif (!hash_equals($this->calculateHMAC($parts[0] . $parts[1], $hmacKey), $hmac)) {\n  166 | \t\t\t\tthrow new \\RuntimeException('HMAC does not match.');\n  167 | \t\t\t}\n  168 | \t\t}"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Signer::verify() computes `$location = strrpos($data['message']['signer'], '@')` and then `substr(..., 0, $location)`. If the signer string contains no '@', strrpos returns false; substr() coerces false to 0 producing an empty userId. While userManager->get('') returns null (so verification fails closed), the code relies on incidental behaviour rather than explicitly rejecting a malformed signer, and `substr($x, 0, false)` is a fragile idiom. A signer like 'user@' would also yield the full local part being mis-parsed in edge cases.","fix":"Explicitly check `if ($location === false) { return false; }` before calling substr(), and validate that the extracted userId is non-empty.","locations":[{"ref":"lib/private/Security/IdentityProof/Signer.php:49-66","code":"   49 | \tpublic function verify(array $data): bool {\n   50 | \t\tif (isset($data['message']['signer'])\n   51 | \t\t\t&& isset($data['signature'])\n   52 | \t\t) {\n   53 | \t\t\t$location = strrpos($data['message']['signer'], '@');\n   54 | \t\t\t$userId = substr($data['message']['signer'], 0, $location);\n   55 | \n   56 | \t\t\t$user = $this->userManager->get($userId);\n   57 | \t\t\tif ($user !== null) {\n   58 | \t\t\t\t$key = $this->keyManager->getKey($user);\n   59 | \t\t\t\treturn openssl_verify(\n   60 | \t\t\t\t\tjson_encode($data['message']),\n   61 | \t\t\t\t\tbase64_decode($data['signature']),\n   62 | \t\t\t\t\t$key->getPublic(),\n   63 | \t\t\t\t\tOPENSSL_ALGO_SHA512\n   64 | \t\t\t\t) === 1;\n   65 | \t\t\t}\n   66 | \t\t}"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"Manager::checkPassword returns false when the share has no password set ($share->getPassword() === null). Callers such as ShareController::verifyPassword and ShareInfoController treat a false return as 'wrong password / access denied'. For password-protected shares this is correct, but the combined contract is fragile: code paths must separately test isPasswordProtected() before relying on checkPassword(), and any caller that uses checkPassword() alone as the gate for a share that is not password protected will incorrectly deny access. The behaviour is intentional but undocumented and easy to misuse (api_misuse risk); the current callers gate on getPassword()/isPasswordProtected() first, so impact is limited.","fix":"Document explicitly that checkPassword returns false for non-password-protected shares and that callers must check isPasswordProtected()/getPassword() separately, or split the no-password case into a distinct return/contract so callers cannot accidentally use checkPassword() as the sole access gate.","locations":[{"ref":"lib/private/Share20/Manager.php:1523-1549","code":" 1523 | \t#[Override]\n 1524 | \tpublic function checkPassword(IShare $share, ?string $password): bool {\n 1525 | \n 1526 | \t\t// if there is no password on the share object / passsword is null, there is nothing to check\n 1527 | \t\tif ($password === null || $share->getPassword() === null) {\n 1528 | \t\t\treturn false;\n 1529 | \t\t}\n 1530 | \n 1531 | \t\t// Makes sure password hasn't expired\n 1532 | \t\t$expirationTime = $share->getPasswordExpirationTime();\n 1533 | \t\tif ($expirationTime !== null && $expirationTime < new \\DateTime()) {\n 1534 | \t\t\treturn false;\n 1535 | \t\t}\n 1536 | \n 1537 | \t\t$newHash = '';\n 1538 | \t\tif (!$this->hasher->verify($password, $share->getPassword(), $newHash)) {\n 1539 | \t\t\treturn false;\n 1540 | \t\t}\n 1541 | \n 1542 | \t\tif (!empty($newHash)) {\n 1543 | \t\t\t$share->setPassword($newHash);\n 1544 | \t\t\t$provider = $this->factory->getProviderForType($share->getShareType());\n 1545 | \t\t\t$provider->update($share);\n 1546 | \t\t}\n 1547 | \n 1548 | \t\treturn true;\n 1549 | \t}"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","description":"In Group_LDAP::countUsersInGroup(), for memberuid/zimbra group member association the code passes the whole LDAP record array to dn2username(): $this->access->dn2username($ldap_users[0]). dn2username() expects a DN string and immediately runs string operations on it (isDNPartOfBase -> mb_strripos). The analogous code in usersInGroup() at line 934 correctly passes $ldap_users[0]['dn'][0]. Passing the array yields a wrong/empty result (and a type warning), so user counting for memberuid-based groups with a search term is broken.","fix":"Pass the DN string: $this->access->dn2username($ldap_users[0]['dn'][0]) as done in usersInGroup().","locations":[{"ref":"apps/user_ldap/lib/Group_LDAP.php:1050-1054","code":" 1050 | \t\t\t\t$ldap_users = $this->access->fetchListOfUsers($filter, ['dn'], 1);\n 1051 | \t\t\t\tif (count($ldap_users) < 1) {\n 1052 | \t\t\t\t\tcontinue;\n 1053 | \t\t\t\t}\n 1054 | \t\t\t\t$groupUsers[] = $this->access->dn2username($ldap_users[0]);"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"In MigrationService::ensureUniqueNamesConstraints(), the primary-key collision branch\nbuilds its error/log message using `$constraintNames[$thing->getName()]` and `$thing`,\nbut `$thing` is a leftover loop variable from the preceding foreach over foreign keys\n(line 755); it is not the current primary key. The intended reference is\n`$constraintNames[$indexName]`. The result is a misleading message and a possible\n\"undefined key\" notice when the leftover $thing name is not present in $constraintNames.","fix":"Use `$constraintNames[$indexName]` in both the exception and the logErrorOrWarning call instead of `$constraintNames[$thing->getName()]`.","locations":[{"ref":"lib/private/DB/MigrationService.php:772-778","code":"  772 | \t\t\t\tif (isset($constraintNames[$indexName])) {\n  773 | \t\t\t\t\tif ($isInstalling) {\n  774 | \t\t\t\t\t\tthrow new \\InvalidArgumentException('Primary index name \"' . $indexName . '\" for table \"' . $table->getName() . '\" collides with the constraint on table \"' . $constraintNames[$thing->getName()] . '\".');\n  775 | \t\t\t\t\t}\n  776 | \t\t\t\t\t$this->logErrorOrWarning('Primary index name \"' . $indexName . '\" for table \"' . $table->getName() . '\" collides with the constraint on table \"' . $constraintNames[$thing->getName()] . '\".');\n  777 | \t\t\t\t}\n  778 | \t\t\t\t$constraintNames[$indexName] = $table->getName();"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","description":"In MigrationService::ensureUniqueNamesConstraints(), the trailing sequence-collision loop\nreferences `$table->getName()` and `$constraintNames[$thing->getName()]` / `$thing`, but\nboth `$table` and `$thing` are stale variables left over from the previous\nforeach ($targetSchema->getTables()) loop, which has already ended at line 780. The\nintended key is the sequence's own name. This produces an incorrect message and may emit\nan undefined-key notice on collision.","fix":"Reference the sequence in the message, e.g. `$constraintNames[$sequence->getName()]`, and drop the stale `$table`/`$thing` references.","locations":[{"ref":"lib/private/DB/MigrationService.php:782-790","code":"  782 | \t\tforeach ($sequences as $sequence) {\n  783 | \t\t\tif (isset($constraintNames[$sequence->getName()])) {\n  784 | \t\t\t\tif ($isInstalling) {\n  785 | \t\t\t\t\tthrow new \\InvalidArgumentException('Sequence name \"' . $sequence->getName() . '\" for table \"' . $table->getName() . '\" collides with the constraint on table \"' . $constraintNames[$thing->getName()] . '\".');\n  786 | \t\t\t\t}\n  787 | \t\t\t\t$this->logErrorOrWarning('Sequence name \"' . $sequence->getName() . '\" for table \"' . $table->getName() . '\" collides with the constraint on table \"' . $constraintNames[$thing->getName()] . '\".');\n  788 | \t\t\t}\n  789 | \t\t\t$constraintNames[$sequence->getName()] = 'sequence';\n  790 | \t\t}"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"ShareInfoController::info catches the wrong NotFoundException class. The file imports `OCA\\Files_External\\NotFoundException` (line 10) and the catch block on the `$node->get($dir)` call references the bare `NotFoundException`, which resolves to that Files_External class. However Folder::get() throws `\\OCP\\Files\\NotFoundException` (see lib/public/Files/Folder.php:63). The two classes are unrelated, so the catch never matches: a request to this public endpoint with a `dir` parameter pointing at a non-existent path raises an uncaught OCP\\Files\\NotFoundException and produces a 500 error instead of the intended graceful fallback to the share root. Reachable on the public, brute-force-protected `info` route.","fix":"Import and catch `\\OCP\\Files\\NotFoundException` for the `$node->get($dir)` call (rename the Files_External import with an alias if it is actually needed elsewhere — it is not used in this file). Catching the correct exception restores the intended behaviour of falling back to the share node when the requested subdirectory does not exist.","locations":[{"ref":"apps/files_sharing/lib/Controller/ShareInfoController.php:10","code":"   10 | use OCA\\Files_External\\NotFoundException;"},{"ref":"apps/files_sharing/lib/Controller/ShareInfoController.php:88-93","code":"   88 | \t\tif ($dir !== null && $node instanceof Folder) {\n   89 | \t\t\ttry {\n   90 | \t\t\t\t$node = $node->get($dir);\n   91 | \t\t\t} catch (NotFoundException $e) {\n   92 | \t\t\t}\n   93 | \t\t}"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"encryptPassword()/decryptPassword() ignore the boolean return value of openssl_public_encrypt()/openssl_private_decrypt(). If the OpenSSL operation fails (e.g. malformed key, OAEP padding error), $encryptedPassword/$password remains unset/null and the method returns an empty/garbage string instead of raising an error. For decryptPassword this means a failed decryption can yield an empty password that is then propagated as a valid credential (e.g. via getPassword()), masking the failure rather than throwing. There is no detection of the failure path at all.","fix":"Check the return value of openssl_public_encrypt()/openssl_private_decrypt() and throw an exception (e.g. InvalidTokenException) when it returns false, instead of silently returning the uninitialised output buffer.","locations":[{"ref":"lib/private/Authentication/Token/PublicKeyTokenProvider.php:413-425","code":"  413 | \tprivate function encryptPassword(string $password, string $publicKey): string {\n  414 | \t\topenssl_public_encrypt($password, $encryptedPassword, $publicKey, OPENSSL_PKCS1_OAEP_PADDING);\n  415 | \t\t$encryptedPassword = base64_encode($encryptedPassword);\n  416 | \n  417 | \t\treturn $encryptedPassword;\n  418 | \t}\n  419 | \n  420 | \tprivate function decryptPassword(string $encryptedPassword, string $privateKey): string {\n  421 | \t\t$encryptedPassword = base64_decode($encryptedPassword);\n  422 | \t\topenssl_private_decrypt($encryptedPassword, $password, $privateKey, OPENSSL_PKCS1_OAEP_PADDING);\n  423 | \n  424 | \t\treturn $password;\n  425 | \t}"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"Migrator::applySchema() opens a transaction (for non-MySQL platforms) at line 121, then\nruns each ALTER statement in a loop, and only commits at line 130. There is no try/catch:\nif any executeStatement() in the loop throws, the exception propagates and the open\ntransaction is neither committed nor rolled back. The connection is left with a dangling\ntransaction, which can poison subsequent queries on the same connection and leaves the\nschema half-migrated without an explicit rollback.","fix":"Wrap the executeStatement loop in try/catch and call `$connection->rollBack()` on failure before rethrowing (for the non-MySQL transactional path).","locations":[{"ref":"lib/private/DB/Migrator.php:113-132","code":"  113 | \tprotected function applySchema(Schema $targetSchema, ?Connection $connection = null) {\n  114 | \t\tif (is_null($connection)) {\n  115 | \t\t\t$connection = $this->connection;\n  116 | \t\t}\n  117 | \n  118 | \t\t$schemaDiff = $this->getDiff($targetSchema, $connection);\n  119 | \n  120 | \t\tif (!$connection->getDatabasePlatform() instanceof MySQLPlatform) {\n  121 | \t\t\t$connection->beginTransaction();\n  122 | \t\t}\n  123 | \t\t$sqls = $connection->getDatabasePlatform()->getAlterSchemaSQL($schemaDiff);\n  124 | \t\t$step = 0;\n  125 | \t\tforeach ($sqls as $sql) {\n  126 | \t\t\t$this->emit($sql, $step++, count($sqls));\n  127 | \t\t\t$connection->executeStatement($sql);\n  128 | \t\t}\n  129 | \t\tif (!$connection->getDatabasePlatform() instanceof MySQLPlatform) {\n  130 | \t\t\t$connection->commit();\n  131 | \t\t}\n  132 | \t}"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"In processFilterRulesForFileNodes, when a {DAV:}limit block contains only nresults (limit) and not nextcloud:firstresult (offset), $offset stays null. For multi-tag searches (!$oneTagSearch) the code calls array_slice($nodes, $offset, $limit) with $offset === null. The file has no declare(strict_types=1), so PHP coerces null to 0 with a deprecation notice rather than failing; behaviorally the offset is silently treated as 0. The intent was likely to default offset to 0 explicitly.","fix":"Pass an explicit integer: array_slice($nodes, $offset ?? 0, $limit). Same for the firstresult/nresults handling, default both to 0/null deterministically.","locations":[{"ref":"apps/dav/lib/Connector/Sabre/FilesReportPlugin.php:294-296","code":"  294 | \t\t\tif (!$oneTagSearch && ($limit !== null || $offset !== null)) {\n  295 | \t\t\t\t$nodes = array_slice($nodes, $offset, $limit);\n  296 | \t\t\t}"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"EncryptAll::encryptFile() wraps the copy/rename in a try/catch that only catches DecryptionFailedException and returns false (interpreted by the caller as 'already encrypted'). copy()/rename() on the View can throw other exceptions (e.g. lock or storage exceptions); those propagate uncaught from encryptFile and the temporary target file ('.encrypted.<time>') created by the copy is then leaked on disk because cleanup only happens in the DecryptionFailedException branch.","fix":"Catch \\Throwable (or at least clean up the target in a finally block) so the temporary encrypted copy is always removed on failure, and distinguish real errors from the 'already encrypted' case.","locations":[{"ref":"apps/encryption/lib/Crypto/EncryptAll.php:214-241","code":"  214 | \tprotected function encryptFile(FileInfo $fileInfo, string $path): bool {\n  215 | \t\t// skip already encrypted files\n  216 | \t\tif ($fileInfo->isEncrypted()) {\n  217 | \t\t\treturn true;\n  218 | \t\t}\n  219 | \n  220 | \t\t$source = $path;\n  221 | \t\t$target = $path . '.encrypted.' . time();\n  222 | \n  223 | \t\ttry {\n  224 | \t\t\t$copySuccess = $this->rootView->copy($source, $target);\n  225 | \t\t\tif ($copySuccess === false) {\n  226 | \t\t\t\t/* Copy failed, abort */\n  227 | \t\t\t\tif ($this->rootView->file_exists($target)) {\n  228 | \t\t\t\t\t$this->rootView->unlink($target);\n  229 | \t\t\t\t}\n  230 | \t\t\t\tthrow new \\Exception('Copy failed for ' . $source);\n  231 | \t\t\t}\n  232 | \t\t\t$this->rootView->rename($target, $source);\n  233 | \t\t} catch (DecryptionFailedException $e) {\n  234 | \t\t\tif ($this->rootView->file_exists($target)) {\n  235 | \t\t\t\t$this->rootView->unlink($target);\n  236 | \t\t\t}\n  237 | \t\t\treturn false;\n  238 | \t\t}\n  239 | \n  240 | \t\treturn true;\n  241 | \t}"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"EncryptAll::writePasswordsToFile() opens a file via $this->rootView->fopen('oneTimeEncryptionPasswords.csv', 'w') and immediately uses the handle in fputcsv()/fclose() without checking for false. If the file cannot be opened (permissions, storage error), fputcsv()/fclose() receive false and emit warnings/TypeErrors while the one-time passwords are silently lost, even though the operator is told a CSV was written.","fix":"Check the fopen() return value; on false, log an error and surface it to the operator instead of claiming the file was written.","locations":[{"ref":"apps/encryption/lib/Crypto/EncryptAll.php:289-303","code":"  289 | \tprotected function writePasswordsToFile(array $passwords): void {\n  290 | \t\t$fp = $this->rootView->fopen('oneTimeEncryptionPasswords.csv', 'w');\n  291 | \t\tforeach ($passwords as $pwd) {\n  292 | \t\t\tfputcsv($fp, $pwd);\n  293 | \t\t}\n  294 | \t\tfclose($fp);\n  295 | \t\t$this->output->writeln(\"\\n\");\n  296 | \t\t$this->output->writeln('A list of all newly created passwords was written to data/oneTimeEncryptionPasswords.csv');\n  297 | \t\t$this->output->writeln('');\n  298 | \t\t$this->output->writeln('Each of these users need to login to the web interface, go to the');\n  299 | \t\t$this->output->writeln('personal settings section \"basic encryption module\" and');\n  300 | \t\t$this->output->writeln('update the private key password to match the login password again by');\n  301 | \t\t$this->output->writeln('entering the one-time password into the \"old log-in password\" field');\n  302 | \t\t$this->output->writeln('and their current login password');\n  303 | \t}"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"postAvatar uses $userFolder->get($path) and $node->getContent() but only catches NotPermittedException for getContent. A non-existent path passed in 'path' makes $userFolder->get() throw NotFoundException (a \\OCP\\Files\\NotFoundException), which is not caught here and propagates out of the controller method, producing a generic 500 instead of a clean validation error. The path is fully user-supplied via the POST 'path' parameter.","fix":"Wrap the $userFolder->get($path) lookup in a try/catch for NotFoundException (and InvalidPathException) and return a Http::STATUS_BAD_REQUEST/NOT_FOUND JSONResponse.","locations":[{"ref":"core/Controller/AvatarController.php:159-188","code":"  159 | \t\tif (isset($path)) {\n  160 | \t\t\t$path = stripslashes($path);\n  161 | \t\t\t$userFolder = $this->rootFolder->getUserFolder($this->userId);\n  162 | \t\t\t/** @var File $node */\n  163 | \t\t\t$node = $userFolder->get($path);\n  164 | \t\t\tif (!($node instanceof File)) {\n  165 | \t\t\t\treturn new JSONResponse(['data' => ['message' => $this->l10n->t('Please select a file.')]]);\n  166 | \t\t\t}\n  167 | \t\t\tif ($node->getSize() > 20 * 1024 * 1024) {\n  168 | \t\t\t\treturn new JSONResponse(\n  169 | \t\t\t\t\t['data' => ['message' => $this->l10n->t('File is too big')]],\n  170 | \t\t\t\t\tHttp::STATUS_BAD_REQUEST\n  171 | \t\t\t\t);\n  172 | \t\t\t}\n  173 | \n  174 | \t\t\tif ($node->getMimeType() !== 'image/jpeg' && $node->getMimeType() !== 'image/png') {\n  175 | \t\t\t\treturn new JSONResponse(\n  176 | \t\t\t\t\t['data' => ['message' => $this->l10n->t('The selected file is not an image.')]],\n  177 | \t\t\t\t\tHttp::STATUS_BAD_REQUEST\n  178 | \t\t\t\t);\n  179 | \t\t\t}\n  180 | \n  181 | \t\t\ttry {\n  182 | \t\t\t\t$content = $node->getContent();\n  183 | \t\t\t} catch (NotPermittedException $e) {\n  184 | \t\t\t\treturn new JSONResponse(\n  185 | \t\t\t\t\t['data' => ['message' => $this->l10n->t('The selected file cannot be read.')]],\n  186 | \t\t\t\t\tHttp::STATUS_BAD_REQUEST\n  187 | \t\t\t\t);\n  188 | \t\t\t}"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Connection::commit() and Connection::rollBack() compute `microtime(true) - $this->transactionActiveSince`\nafter the parent call. `$transactionActiveSince` is only set in beginTransaction() when no\ntransaction was previously active. If commit()/rollBack() is reached on this Connection\nwithout a matching tracked begin (e.g. a transaction begun on the underlying DBAL connection\nby other means, or a nesting edge case), `$transactionActiveSince` is null and the subtraction\n`microtime(true) - null` produces a bogus large duration and emits a deprecation/type notice in\nstrict setups, potentially logging spurious \"Transaction took ...\" errors.","fix":"Guard the timing block with `if ($this->transactionActiveSince !== null)` before computing $timeTook.","locations":[{"ref":"lib/private/DB/Connection.php:848-873","code":"  848 | \t#[\\Override]\n  849 | \tpublic function commit() {\n  850 | \t\t$result = parent::commit();\n  851 | \t\tif ($this->getTransactionNestingLevel() === 0) {\n  852 | \t\t\t$timeTook = microtime(true) - $this->transactionActiveSince;\n  853 | \t\t\t$this->transactionBacktrace = null;\n  854 | \t\t\t$this->transactionActiveSince = null;\n  855 | \t\t\tif ($timeTook > 1) {\n  856 | \t\t\t\t$logLevel = match (true) {\n  857 | \t\t\t\t\t$timeTook > 20 * 60 => ILogger::ERROR,\n  858 | \t\t\t\t\t$timeTook > 5 * 60 => ILogger::WARN,\n  859 | \t\t\t\t\t$timeTook > 10 => ILogger::INFO,\n  860 | \t\t\t\t\tdefault => ILogger::DEBUG,\n  861 | \t\t\t\t};\n  862 | \t\t\t\t$this->logger->log(\n  863 | \t\t\t\t\t$logLevel,\n  864 | \t\t\t\t\t'Transaction took ' . $timeTook . 's',\n  865 | \t\t\t\t\t[\n  866 | \t\t\t\t\t\t'exception' => new \\Exception('Transaction took ' . $timeTook . 's'),\n  867 | \t\t\t\t\t\t'timeSpent' => $timeTook,\n  868 | \t\t\t\t\t]\n  869 | \t\t\t\t);\n  870 | \t\t\t}\n  871 | \t\t}\n  872 | \t\treturn $result;\n  873 | \t}"},{"ref":"lib/private/DB/Connection.php:875-900","code":"  875 | \t#[\\Override]\n  876 | \tpublic function rollBack() {\n  877 | \t\t$result = parent::rollBack();\n  878 | \t\tif ($this->getTransactionNestingLevel() === 0) {\n  879 | \t\t\t$timeTook = microtime(true) - $this->transactionActiveSince;\n  880 | \t\t\t$this->transactionBacktrace = null;\n  881 | \t\t\t$this->transactionActiveSince = null;\n  882 | \t\t\tif ($timeTook > 1) {\n  883 | \t\t\t\t$logLevel = match (true) {\n  884 | \t\t\t\t\t$timeTook > 20 * 60 => ILogger::ERROR,\n  885 | \t\t\t\t\t$timeTook > 5 * 60 => ILogger::WARN,\n  886 | \t\t\t\t\t$timeTook > 10 => ILogger::INFO,\n  887 | \t\t\t\t\tdefault => ILogger::DEBUG,\n  888 | \t\t\t\t};\n  889 | \t\t\t\t$this->logger->log(\n  890 | \t\t\t\t\t$logLevel,\n  891 | \t\t\t\t\t'Transaction rollback took longer than 1s: ' . $timeTook,\n  892 | \t\t\t\t\t[\n  893 | \t\t\t\t\t\t'exception' => new \\Exception('Long running transaction rollback'),\n  894 | \t\t\t\t\t\t'timeSpent' => $timeTook,\n  895 | \t\t\t\t\t]\n  896 | \t\t\t\t);\n  897 | \t\t\t}\n  898 | \t\t}\n  899 | \t\treturn $result;\n  900 | \t}"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Common::searchInDir calls closedir($dh) unconditionally at the end even though the readdir loop is guarded by `if (is_resource($dh))`. When opendir() returns false (directory not accessible), `$dh` is false and closedir(false) emits a TypeError/warning. The success path is fine; only the failure path is affected.","fix":"Move the closedir($dh) inside the `if (is_resource($dh))` block, or guard it with `if (is_resource($dh)) { closedir($dh); }`.","locations":[{"ref":"lib/private/Files/Storage/Common.php:293-311","code":"  293 | \tprotected function searchInDir(string $query, string $dir = ''): array {\n  294 | \t\t$files = [];\n  295 | \t\t$dh = $this->opendir($dir);\n  296 | \t\tif (is_resource($dh)) {\n  297 | \t\t\twhile (($item = readdir($dh)) !== false) {\n  298 | \t\t\t\tif (Filesystem::isIgnoredDir($item)) {\n  299 | \t\t\t\t\tcontinue;\n  300 | \t\t\t\t}\n  301 | \t\t\t\tif (strstr(strtolower($item), strtolower($query)) !== false) {\n  302 | \t\t\t\t\t$files[] = $dir . '/' . $item;\n  303 | \t\t\t\t}\n  304 | \t\t\t\tif ($this->is_dir($dir . '/' . $item)) {\n  305 | \t\t\t\t\t$files = array_merge($files, $this->searchInDir($query, $dir . '/' . $item));\n  306 | \t\t\t\t}\n  307 | \t\t\t}\n  308 | \t\t}\n  309 | \t\tclosedir($dh);\n  310 | \t\treturn $files;\n  311 | \t}"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"Jail::writeStream fallback (non-IWriteStreamStorage path) does `$target = $this->fopen($path, 'w')` then `stream_copy_to_stream($stream, $target)` and `fclose($target)` without checking $target for false. If fopen fails, stream_copy_to_stream and fclose receive false (warnings/TypeError) and the source `$stream` is still closed but the failure is not cleanly reported as the GenericFileException path expects a false count, not an fopen failure.","fix":"Check `if ($target === false) { fclose($stream); throw new GenericFileException(...); }` before copying.","locations":[{"ref":"lib/private/Files/Storage/Wrapper/Jail.php:303-318","code":"  303 | \tpublic function writeStream(string $path, $stream, ?int $size = null): int {\n  304 | \t\t$storage = $this->getWrapperStorage();\n  305 | \t\tif ($storage->instanceOfStorage(IWriteStreamStorage::class)) {\n  306 | \t\t\t/** @var IWriteStreamStorage $storage */\n  307 | \t\t\treturn $storage->writeStream($this->getUnjailedPath($path), $stream, $size);\n  308 | \t\t} else {\n  309 | \t\t\t$target = $this->fopen($path, 'w');\n  310 | \t\t\t$count = stream_copy_to_stream($stream, $target);\n  311 | \t\t\tfclose($stream);\n  312 | \t\t\tfclose($target);\n  313 | \t\t\tif ($count === false) {\n  314 | \t\t\t\tthrow new GenericFileException('Failed to copy stream.');\n  315 | \t\t\t}\n  316 | \n  317 | \t\t\treturn $count;\n  318 | \t\t}"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","description":"CrossShardMoveHelper::updateItems() builds an UPDATE query (update()/set()/where())\nbut executes it with `$query->executeQuery()->fetchAll()`. QueryBuilder::executeQuery()\nthrows RuntimeException('Invalid query type, expected SELECT query') for any non-SELECT\nquery (QueryBuilder.php:253-254). This method is reached from moveCrossShards() whenever\nthe source and target shard are identical (the early same-shard path at lines 43-46),\nso an in-shard shard-key update always throws instead of updating the rows.","fix":"Replace `$query->executeQuery()->fetchAll();` with `$query->executeStatement();`.","locations":[{"ref":"lib/private/DB/QueryBuilder/Sharded/CrossShardMoveHelper.php:136-142","code":"  136 | \tpublic function updateItems(IDBConnection $connection, string $table, string $shardColumn, int $targetShardKey, string $primaryColumn, array $primaryKeys): void {\n  137 | \t\t$query = $connection->getQueryBuilder();\n  138 | \t\t$query->update($table)\n  139 | \t\t\t->set($shardColumn, $query->createNamedParameter($targetShardKey, IQueryBuilder::PARAM_INT))\n  140 | \t\t\t->where($query->expr()->in($primaryColumn, $query->createNamedParameter($primaryKeys, IQueryBuilder::PARAM_INT_ARRAY)));\n  141 | \t\t$query->executeQuery()->fetchAll();\n  142 | \t}"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"Access::getFilterPartForSearch() and getAdvancedFilterPartForSearch() build LDAP filter assertions ($attribute . '=' . $search and $attr . '=' . $word) using the search term passed through prepareSearchTerm(), which only appends/prepends '*' wildcards and never calls escapeFilterPart()/ldap_escape(). Callers such as User_LDAP::getUsers() and Group_LDAP::usersInGroup()/getGroups() escape the term before passing it in, but getFilterPartForUserSearch()/getFilterPartForGroupSearch() are public and several internal call sites (e.g. the memberuid branches) pass terms that are only partially escaped, so a search string containing LDAP filter metacharacters (parentheses, etc.) can alter the resulting filter. The escaping responsibility is implicit and inconsistent.","fix":"Escape each search term with escapeFilterPart() (preserving an intentional trailing/leading wildcard) inside getFilterPartForSearch()/getAdvancedFilterPartForSearch() instead of relying on every caller to pre-escape.","locations":[{"ref":"apps/user_ldap/lib/Access.php:1498-1514","code":" 1498 | \tprivate function getAdvancedFilterPartForSearch(string $search, $searchAttributes): string {\n 1499 | \t\tif (!is_array($searchAttributes) || count($searchAttributes) < 2) {\n 1500 | \t\t\tthrow new DomainException('searchAttributes must be an array with at least two string');\n 1501 | \t\t}\n 1502 | \t\t$searchWords = explode(' ', trim($search));\n 1503 | \t\t$wordFilters = [];\n 1504 | \t\tforeach ($searchWords as $word) {\n 1505 | \t\t\t$word = $this->prepareSearchTerm($word);\n 1506 | \t\t\t//every word needs to appear at least once\n 1507 | \t\t\t$wordMatchOneAttrFilters = [];\n 1508 | \t\t\tforeach ($searchAttributes as $attr) {\n 1509 | \t\t\t\t$wordMatchOneAttrFilters[] = $attr . '=' . $word;\n 1510 | \t\t\t}\n 1511 | \t\t\t$wordFilters[] = $this->combineFilterWithOr($wordMatchOneAttrFilters);\n 1512 | \t\t}\n 1513 | \t\treturn $this->combineFilterWithAnd($wordFilters);\n 1514 | \t}"},{"ref":"apps/user_ldap/lib/Access.php:1525-1560","code":" 1525 | \tprivate function getFilterPartForSearch(string $search, $searchAttributes, string $fallbackAttribute): string {\n 1526 | \t\t$filter = [];\n 1527 | \t\t$haveMultiSearchAttributes = (is_array($searchAttributes) && count($searchAttributes) > 0);\n 1528 | \t\tif ($haveMultiSearchAttributes && str_contains(trim($search), ' ')) {\n 1529 | \t\t\ttry {\n 1530 | \t\t\t\treturn $this->getAdvancedFilterPartForSearch($search, $searchAttributes);\n 1531 | \t\t\t} catch (DomainException $e) {\n 1532 | \t\t\t\t// Creating advanced filter for search failed, falling back to simple method. Edge case, but valid.\n 1533 | \t\t\t}\n 1534 | \t\t}\n 1535 | \n 1536 | \t\t$originalSearch = $search;\n 1537 | \t\t$search = $this->prepareSearchTerm($search);\n 1538 | \t\tif (!is_array($searchAttributes) || count($searchAttributes) === 0) {\n 1539 | \t\t\tif ($fallbackAttribute === '') {\n 1540 | \t\t\t\treturn '';\n 1541 | \t\t\t}\n 1542 | \t\t\t// wildcards don't work with some attributes\n 1543 | \t\t\tif ($originalSearch !== '') {\n 1544 | \t\t\t\t$filter[] = $fallbackAttribute . '=' . $originalSearch;\n 1545 | \t\t\t}\n 1546 | \t\t\t$filter[] = $fallbackAttribute . '=' . $search;\n 1547 | \t\t} else {\n 1548 | \t\t\tforeach ($searchAttributes as $attribute) {\n 1549 | \t\t\t\t// wildcards don't work with some attributes\n 1550 | \t\t\t\tif ($originalSearch !== '') {\n 1551 | \t\t\t\t\t$filter[] = $attribute . '=' . $originalSearch;\n 1552 | \t\t\t\t}\n 1553 | \t\t\t\t$filter[] = $attribute . '=' . $search;\n 1554 | \t\t\t}\n 1555 | \t\t}\n 1556 | \t\tif (count($filter) === 1) {\n 1557 | \t\t\treturn '(' . $filter[0] . ')';\n 1558 | \t\t}\n 1559 | \t\treturn $this->combineFilterWithOr($filter);\n 1560 | \t}"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","description":"mime_content_type() is documented to take a filename (string) path, not a stream resource. Here it is passed the resource returned by $node->fopen('rb'). The file has declare(strict_types=1), so passing a resource where a string is expected raises a TypeError. TypeError is not an Exception, so it is NOT caught by the surrounding catch (Exception) blocks in getFileContents()/getFileContentsExApp() and would surface as an uncaught error (HTTP 500) whenever the mime_content_type extension is loaded.","fix":"Detect the mime type from a real path or by reading bytes and using IMimeTypeDetector (e.g. $this->mimeTypeDetector->detectContent or detectPath), instead of calling mime_content_type() on a stream resource.","locations":[{"ref":"core/Controller/TaskProcessingApiController.php:564-572","code":"  564 | \t\tif (function_exists('mime_content_type')) {\n  565 | \t\t\t$mimeType = mime_content_type($node->fopen('rb'));\n  566 | \t\t\tif ($mimeType !== false) {\n  567 | \t\t\t\t$mimeType = $this->mimeTypeDetector->getSecureMimeType($mimeType);\n  568 | \t\t\t\tif ($mimeType !== 'application/octet-stream') {\n  569 | \t\t\t\t\t$contentType = $mimeType;\n  570 | \t\t\t\t}\n  571 | \t\t\t}\n  572 | \t\t}"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"low","description":"Crypto::decrypt() falls back to retrying decryption with an empty secret ('') whenever decryption with the configured `secret` fails, and the IdentityProof/VerificationToken/PublicKeyTokenProvider layers add their own empty-secret retries on top. While documented as a convenience for instances where `secret` was accidentally unset, this means authenticated-ciphertext that was produced with an empty key is accepted on instances that DO have a secret configured. An attacker who can craft ciphertext (e.g. for a token/credential blob whose key derivation they influence) effectively only needs to satisfy the empty-secret variant. The fallback weakens the security guarantee of the configured secret and should at least be gated behind an explicit opt-in / logged loudly.","fix":"Gate the empty-secret fallback behind an explicit migration flag that defaults to off once a non-empty secret is configured, and emit a warning log on each fallback so operators can detect and stop relying on it.","locations":[{"ref":"lib/private/Security/Crypto.php:96-110","code":"   96 | \tpublic function decrypt(string $authenticatedCiphertext, string $password = ''): string {\n   97 | \t\t$secret = $this->config->getSystemValue('secret');\n   98 | \t\ttry {\n   99 | \t\t\tif ($password === '') {\n  100 | \t\t\t\treturn $this->decryptWithoutSecret($authenticatedCiphertext, $secret);\n  101 | \t\t\t}\n  102 | \t\t\treturn $this->decryptWithoutSecret($authenticatedCiphertext, $password);\n  103 | \t\t} catch (Exception $e) {\n  104 | \t\t\tif ($password === '') {\n  105 | \t\t\t\t// Retry with empty secret as a fallback for instances where the secret might not have been set by accident\n  106 | \t\t\t\treturn $this->decryptWithoutSecret($authenticatedCiphertext, '');\n  107 | \t\t\t}\n  108 | \t\t\tthrow $e;\n  109 | \t\t}\n  110 | \t}"},{"ref":"lib/private/Authentication/Token/PublicKeyTokenProvider.php:397-411","code":"  397 | \tprivate function decrypt(string $cipherText, string $token): string {\n  398 | \t\t$secret = $this->config->getSystemValueString('secret');\n  399 | \t\ttry {\n  400 | \t\t\treturn $this->crypto->decrypt($cipherText, $token . $secret);\n  401 | \t\t} catch (\\Exception $ex) {\n  402 | \t\t\t// Retry with empty secret as a fallback for instances where the secret might not have been set by accident\n  403 | \t\t\ttry {\n  404 | \t\t\t\treturn $this->crypto->decrypt($cipherText, $token);\n  405 | \t\t\t} catch (\\Exception $ex2) {\n  406 | \t\t\t\t// Delete the invalid token\n  407 | \t\t\t\t$this->invalidateToken($token);\n  408 | \t\t\t\tthrow new InvalidTokenException('Could not decrypt token password: ' . $ex->getMessage(), 0, $ex2);\n  409 | \t\t\t}\n  410 | \t\t}\n  411 | \t}"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","description":"ShareAPIController::getSharesInDir performs an N+1 / N*M query explosion. For every node returned by `$folder->getDirectoryListing()` it calls `$this->getAllShares($node, true)`, and getAllShares issues a separate getSharesBy() query for each of the nine share types (user, group, link, mail, circle, room, deck, remote, remote_group), each with its own pagination loop in Manager::getSharesBy. For a directory with N children this results in roughly 9*N share-resolution queries plus per-share node lookups. On large shared directories this is a significant scalability problem for the OCS shares listing endpoint (subfiles=true).","fix":"Use a single bulk query path. Manager::getSharesInFolder / IShareProviderSupportsAllSharesInFolder already exists to fetch all shares in a folder in one query per provider; use that here instead of looping getAllShares() per child node, then format/filter in memory.","locations":[{"ref":"apps/files_sharing/lib/Controller/ShareAPIController.php:889-934","code":"  889 | \tprivate function getSharesInDir(Node $folder): array {\n  890 | \t\tif (!($folder instanceof Folder)) {\n  891 | \t\t\tthrow new OCSBadRequestException($this->l->t('Not a directory'));\n  892 | \t\t}\n  893 | \n  894 | \t\t$nodes = $folder->getDirectoryListing();\n  895 | \n  896 | \t\t/** @var IShare[] $shares */\n  897 | \t\t$shares = array_reduce($nodes, function ($carry, $node) {\n  898 | \t\t\t$carry = array_merge($carry, $this->getAllShares($node, true));\n  899 | \t\t\treturn $carry;\n  900 | \t\t}, []);\n  901 | \n  902 | \t\t// filter out duplicate shares\n  903 | \t\t$known = [];\n  904 | \n  905 | \t\t$formatted = $miniFormatted = [];\n  906 | \t\t$resharingRight = false;\n  907 | \t\t$known = [];\n  908 | \t\tforeach ($shares as $share) {\n  909 | \t\t\tif (in_array($share->getId(), $known) || $share->getSharedWith() === $this->userId) {\n  910 | \t\t\t\tcontinue;\n  911 | \t\t\t}\n  912 | \n  913 | \t\t\ttry {\n  914 | \t\t\t\t$format = $this->formatShare($share);\n  915 | \n  916 | \t\t\t\t$known[] = $share->getId();\n  917 | \t\t\t\t$formatted[] = $format;\n  918 | \t\t\t\tif ($share->getSharedBy() === $this->userId) {\n  919 | \t\t\t\t\t$miniFormatted[] = $format;\n  920 | \t\t\t\t}\n  921 | \t\t\t\tif (!$resharingRight && $this->shareProviderResharingRights($this->userId, $share, $folder)) {\n  922 | \t\t\t\t\t$resharingRight = true;\n  923 | \t\t\t\t}\n  924 | \t\t\t} catch (\\Exception $e) {\n  925 | \t\t\t\t//Ignore this share\n  926 | \t\t\t}\n  927 | \t\t}\n  928 | \n  929 | \t\tif (!$resharingRight) {\n  930 | \t\t\t$formatted = $miniFormatted;\n  931 | \t\t}\n  932 | \n  933 | \t\treturn $formatted;\n  934 | \t}"},{"ref":"apps/files_sharing/lib/Controller/ShareAPIController.php:1980-2011","code":" 1980 | \tprivate function getAllShares(?Node $path = null, bool $reshares = false) {\n 1981 | \t\t// Get all shares\n 1982 | \t\t$userShares = $this->shareManager->getSharesBy($this->userId, IShare::TYPE_USER, $path, $reshares, -1, 0);\n 1983 | \t\t$groupShares = $this->shareManager->getSharesBy($this->userId, IShare::TYPE_GROUP, $path, $reshares, -1, 0);\n 1984 | \t\t$linkShares = $this->shareManager->getSharesBy($this->userId, IShare::TYPE_LINK, $path, $reshares, -1, 0);\n 1985 | \n 1986 | \t\t// EMAIL SHARES\n 1987 | \t\t$mailShares = $this->shareManager->getSharesBy($this->userId, IShare::TYPE_EMAIL, $path, $reshares, -1, 0);\n 1988 | \n 1989 | \t\t// TEAM SHARES\n 1990 | \t\t$circleShares = $this->shareManager->getSharesBy($this->userId, IShare::TYPE_CIRCLE, $path, $reshares, -1, 0);\n 1991 | \n 1992 | \t\t// TALK SHARES\n 1993 | \t\t$roomShares = $this->shareManager->getSharesBy($this->userId, IShare::TYPE_ROOM, $path, $reshares, -1, 0);\n 1994 | \n 1995 | \t\t// DECK SHARES\n 1996 | \t\t$deckShares = $this->shareManager->getSharesBy($this->userId, IShare::TYPE_DECK, $path, $reshares, -1, 0);\n 1997 | \n 1998 | \t\t// FEDERATION\n 1999 | \t\tif ($this->shareManager->outgoingServer2ServerSharesAllowed()) {\n 2000 | \t\t\t$federatedShares = $this->shareManager->getSharesBy($this->userId, IShare::TYPE_REMOTE, $path, $reshares, -1, 0);\n 2001 | \t\t} else {\n 2002 | \t\t\t$federatedShares = [];\n 2003 | \t\t}\n 2004 | \t\tif ($this->shareManager->outgoingServer2ServerGroupSharesAllowed()) {\n 2005 | \t\t\t$federatedGroupShares = $this->shareManager->getSharesBy($this->userId, IShare::TYPE_REMOTE_GROUP, $path, $reshares, -1, 0);\n 2006 | \t\t} else {\n 2007 | \t\t\t$federatedGroupShares = [];\n 2008 | \t\t}\n 2009 | \n 2010 | \t\treturn array_merge($userShares, $groupShares, $linkShares, $mailS
