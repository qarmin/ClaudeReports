hares, $circleShares, $roomShares, $deckShares, $federatedShares, $federatedGroupShares);\n 2011 | \t}"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"View::getDirectoryContent calls $storage->getOwner($contentPath) inside the loop over every directory entry, constructing a LazyUser per entry. For Local/Common storage getOwner is cheap, but for storages whose getOwner resolves the owning user this is an N+1-style per-entry call when all entries in a single storage typically share the same owner. The owner could be resolved once per storage/mount and reused.","fix":"Resolve the owner once per storage before the loop (the owner of a storage's entries is constant) and reuse the LazyUser instance, falling back to per-entry only where storages legitimately vary owner.","locations":[{"ref":"lib/private/Files/View.php:1547-1568","code":" 1547 | \t\tforeach ($contents as $content) {\n 1548 | \t\t\t$name = $content->getName();\n 1549 | \t\t\t$contentPath = $content->getPath();\n 1550 | \n 1551 | \t\t\tif ($sharingDisabled) {\n 1552 | \t\t\t\t$content['permissions'] = $content->getPermissions() & $permissionsMask;\n 1553 | \t\t\t}\n 1554 | \n 1555 | \t\t\t$ownerId = $storage->getOwner($contentPath);\n 1556 | \t\t\t$owner = $ownerId !== false\n 1557 | \t\t\t\t? $this->getUserObjectForOwner($ownerId)\n 1558 | \t\t\t\t: null;\n 1559 | \n 1560 | \t\t\t$files[$name] = new FileInfo(\n 1561 | \t\t\t\t$path . '/' . $name,\n 1562 | \t\t\t\t$storage,\n 1563 | \t\t\t\t$contentPath,\n 1564 | \t\t\t\t$content,\n 1565 | \t\t\t\t$mount,\n 1566 | \t\t\t\t$owner\n 1567 | \t\t\t);\n 1568 | \t\t}"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"medium","description":"User_LDAP::getUserFromCustomAttribute() contains a leftover debug statement '$this->logger->error($filter);' that unconditionally logs the constructed LDAP filter at error level on every call. This is clearly leftover debugging (it sits between the search and the result handling, duplicating the structured error log a few lines below), causing log spam at error severity and potentially leaking the searched attribute/value into logs.","fix":"Remove the stray $this->logger->error($filter); line.","locations":[{"ref":"apps/user_ldap/lib/User_LDAP.php:716","code":"  716 | \t\t$this->logger->error($filter);"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"MountProvider::getMountsFromSuperShares reads and writes a 'share-valid-mountpoint-max' local cache ($maxValidatedShare / $newMaxValidatedShare) but the value is never used to gate or skip any work. $maxValidatedShare is only used to seed $newMaxValidatedShare, $newMaxValidatedShare is updated to max(shareId, ...) for every processed super share and written back to the cache, yet nothing ever consults the previously stored maximum to short-circuit validation. The cache machinery therefore has no functional effect (the name 'validated' implies it was meant to skip re-validating shares with id <= maxValidatedShare) and only adds cache reads/writes on every mount setup.","fix":"Either implement the intended optimization (skip/short-circuit shares whose id is <= the cached maxValidatedShare when nothing else changed) or remove the unused cache read/write to avoid misleading code and needless cache traffic.","locations":[{"ref":"apps/files_sharing/lib/MountProvider.php:257-313","code":"  257 | \t\t$validShareCache = $this->cacheFactory->createLocal('share-valid-mountpoint-max');\n  258 | \t\t$maxValidatedShare = $validShareCache->get($userId) ?? 0;\n  259 | \t\t$newMaxValidatedShare = $maxValidatedShare;\n  260 | \n  261 | \t\tforeach ($superShares as $share) {\n  262 | \t\t\t[$parentShare, $groupedShares] = $share;\n  263 | \t\t\ttry {\n  264 | \t\t\t\tif ($parentShare->getStatus() !== IShare::STATUS_ACCEPTED\n  265 | \t\t\t\t\t&& ($parentShare->getShareType() === IShare::TYPE_GROUP\n  266 | \t\t\t\t\t\t|| $parentShare->getShareType() === IShare::TYPE_USERGROUP\n  267 | \t\t\t\t\t\t|| $parentShare->getShareType() === IShare::TYPE_USER)\n  268 | \t\t\t\t) {\n  269 | \t\t\t\t\tcontinue;\n  270 | \t\t\t\t}\n  271 | \n  272 | \t\t\t\t$owner = $parentShare->getShareOwner();\n  273 | \t\t\t\tif (!isset($ownerViews[$owner])) {\n  274 | \t\t\t\t\t$ownerViews[$owner] = new View('/' . $owner . '/files');\n  275 | \t\t\t\t}\n  276 | \t\t\t\t$shareId = (int)$parentShare->getId();\n  277 | \t\t\t\t$mount = new SharedMount(\n  278 | \t\t\t\t\tSharedStorage::class,\n  279 | \t\t\t\t\t[\n  280 | \t\t\t\t\t\t'user' => $userId,\n  281 | \t\t\t\t\t\t// parent share\n  282 | \t\t\t\t\t\t'superShare' => $parentShare,\n  283 | \t\t\t\t\t\t// children/component of the superShare\n  284 | \t\t\t\t\t\t'groupedShares' => $groupedShares,\n  285 | \t\t\t\t\t\t'ownerView' => $ownerViews[$owner],\n  286 | \t\t\t\t\t\t'sharingDisabledForUser' => $sharingDisabledForUser\n  287 | \t\t\t\t\t],\n  288 | \t\t\t\t\t$loader,\n  289 | \t\t\t\t\t$this->eventDispatcher,\n  290 | \t\t\t\t\t$user,\n  291 | \t\t\t\t);\n  292 | \n  293 | \t\t\t\t$newMaxValidatedShare = max($shareId, $newMaxValidatedShare);\n  294 | \n  295 | \t\t\t\t$event = new ShareMountedEvent($mount);\n  296 | \t\t\t\t$this->eventDispatcher->dispatchTyped($event);\n  297 | \n  298 | \t\t\t\t$mounts[$mount->getMountPoint()] = $mount;\n  299 | \t\t\t\tforeach ($event->getAdditionalMounts() as $additionalMount) {\n  300 | \t\t\t\t\t$mounts[$additionalMount->getMountPoint()] = $additionalMount;\n  301 | \t\t\t\t}\n  302 | \t\t\t} catch (Exception $e) {\n  303 | \t\t\t\t$this->logger->error(\n  304 | \t\t\t\t\t'Error while trying to create shared mount',\n  305 | \t\t\t\t\t[\n  306 | \t\t\t\t\t\t'app' => 'files_sharing',\n  307 | \t\t\t\t\t\t'exception' => $e,\n  308 | \t\t\t\t\t],\n  309 | \t\t\t\t);\n  310 | \t\t\t}\n  311 | \t\t}\n  312 | \n  313 | \t\t$validShareCache->set($userId, $newMaxValidatedShare, 24 * 60 * 60);"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"low","description":"JoinCondition::clearConditionPart() has two consecutive `elseif` branches guarded by the\nidentical condition `str_starts_with($part, 'to_number(to_char(')` (lines 149 and 152).\nThe second branch (commented \"oracle cast to string\") is unreachable, and—were it\nreachable—its body strips with `strlen('to_char(')` which does not match its own guard\nprefix `to_number(to_char(`. This is a copy/paste mistake: the second guard was likely\nmeant to detect a different cast wrapper. As written it is dead code and the \"cast to\nstring\" case is never handled.","fix":"Correct the second guard to the intended distinct prefix (or remove the dead branch if only the to_number(to_char( form is supported).","locations":[{"ref":"lib/private/DB/QueryBuilder/Partitioned/JoinCondition.php:149-155","code":"  149 | \t\t} elseif (str_starts_with($part, 'to_number(to_char(')) {\n  150 | \t\t\t// oracle cast to int\n  151 | \t\t\t$part = substr($part, strlen('to_number(to_char('), -2);\n  152 | \t\t} elseif (str_starts_with($part, 'to_number(to_char(')) {\n  153 | \t\t\t// oracle cast to string\n  154 | \t\t\t$part = substr($part, strlen('to_char('), -1);\n  155 | \t\t}"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"Private method isAdmin() is never called anywhere in FilesReportPlugin (only its own definition references it). It is leftover/unused code.","fix":"Remove the unused isAdmin() method (and the IGroupManager dependency if it becomes unused elsewhere).","locations":[{"ref":"apps/dav/lib/Connector/Sabre/FilesReportPlugin.php:385-391","code":"  385 | \tprivate function isAdmin() {\n  386 | \t\t$user = $this->userSession->getUser();\n  387 | \t\tif ($user !== null) {\n  388 | \t\t\treturn $this->groupManager->isAdmin($user->getUID());\n  389 | \t\t}\n  390 | \t\treturn false;\n  391 | \t}"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"PartitionedQueryBuilder::executeQuery() computes `$s = $this->getSQL();` (line 444) but\nnever uses `$s`. getSQL() does have a side effect (applySelects()), but applySelects() is\nalready invoked unconditionally at the top of executeQuery() (line 423) and is idempotent\n(it resets $this->selects to []), so this second call only re-runs getSQL() for no reason\nand assigns to an unused variable.","fix":"Remove the unused `$s = $this->getSQL();` line.","locations":[{"ref":"lib/private/DB/QueryBuilder/Partitioned/PartitionedQueryBuilder.php:444","code":"  444 | \t\t$s = $this->getSQL();"}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In Local::calculateEtag the branch `if ($stat === false) { return md5(''); }` at lines 543-545 is unreachable: it is inside the `else` of `if ($stat['mode'] & 0x4000 ...)`, which already dereferenced $stat['mode']. If $stat were false the dereference on line 540 would have already produced a warning/null, so the false check can never be the first thing evaluated. The dead check also masks the real missing guard (see the getETag panic finding).","fix":"Move the `$stat === false` check to the very top of calculateEtag so it actually guards the mode dereference.","locations":[{"ref":"lib/private/Files/Storage/Local.php:539-562","code":"  539 | \tprivate function calculateEtag(string $path, array $stat): string|false {\n  540 | \t\tif ($stat['mode'] & 0x4000 && !($stat['mode'] & 0x8000)) { // is_dir & not socket\n  541 | \t\t\treturn parent::getETag($path);\n  542 | \t\t} else {\n  543 | \t\t\tif ($stat === false) {\n  544 | \t\t\t\treturn md5('');\n  545 | \t\t\t}\n  546 | \n  547 | \t\t\t$toHash = '';\n  548 | \t\t\tif (isset($stat['mtime'])) {\n  549 | \t\t\t\t$toHash .= $stat['mtime'];\n  550 | \t\t\t}\n  551 | \t\t\tif (isset($stat['ino'])) {\n  552 | \t\t\t\t$toHash .= $stat['ino'];\n  553 | \t\t\t}\n  554 | \t\t\tif (isset($stat['dev'])) {\n  555 | \t\t\t\t$toHash .= $stat['dev'];\n  556 | \t\t\t}\n  557 | \t\t\tif (isset($stat['size'])) {\n  558 | \t\t\t\t$toHash .= $stat['size'];\n  559 | \t\t\t}\n  560 | \n  561 | \t\t\treturn md5($toHash);\n  562 | \t\t}"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The Crypt class header docblock states 'As default AES-256-CTR is used', and getUnencryptedBlockSize() comments describe a '22-byte IV'. The IV is actually 16 random bytes (generateIv() returns random_bytes(16)); the 22 figure is the size of the on-disk IV block '00iv00' (6 bytes) + 16-byte IV. The wording '22-byte IV' is misleading for future maintainers reasoning about the crypto layout.","fix":"Reword the comment to say the IV is 16 bytes and the IV block (marker + IV) is 22 bytes.","locations":[{"ref":"apps/encryption/lib/Crypto/Encryption.php:413-427","code":"  413 | \t/**\n  414 | \t * get size of the unencrypted payload per block.\n  415 | \t * Nextcloud read/write files with a block size of 8192 byte\n  416 | \t *\n  417 | \t * Encrypted blocks have a 22-byte IV and 2 bytes of padding, encrypted and\n  418 | \t * signed blocks have also a 71-byte signature and 1 more byte of padding,\n  419 | \t * resulting respectively in:\n  420 | \t *\n  421 | \t *  8192 - 22 - 2 = 8168 bytes in each unsigned unencrypted block\n  422 | \t *  8192 - 22 - 2 - 71 - 1 = 8096 bytes in each signed unencrypted block\n  423 | \t *\n  424 | \t * Legacy base64 encoding then reduces the available size by a 3/4 factor:\n  425 | \t *\n  426 | \t *  8168 * (3/4) = 6126 bytes in each base64-encoded unsigned unencrypted block\n  427 | \t *  8096 * (3/4) = 6072 bytes in each base64-encoded signed unencrypted block"},{"ref":"apps/encryption/lib/Crypto/Crypt.php:585-587","code":"  585 | \tprivate function generateIv(): string {\n  586 | \t\treturn random_bytes(16);\n  587 | \t}"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"getTokenFromCache() carries the docblock `@throws InvalidTokenException when token doesn't exist`, but the method never throws: it returns null (or a PublicKeyToken) in every path. The misleading contract can lead callers to add unreachable catch blocks or to assume a non-null return is guaranteed.","fix":"Remove the inaccurate @throws line from the docblock (the method only ever returns ?PublicKeyToken).","locations":[{"ref":"lib/private/Authentication/Token/PublicKeyTokenProvider.php:154-172","code":"  154 | \t/**\n  155 | \t * @throws InvalidTokenException when token doesn't exist\n  156 | \t */\n  157 | \tprivate function getTokenFromCache(string $tokenHash): ?PublicKeyToken {\n  158 | \t\t$serializedToken = $this->cache->get($tokenHash);\n  159 | \t\tif ($serializedToken === false) {\n  160 | \t\t\treturn null;\n  161 | \t\t}\n  162 | \n  163 | \t\tif ($serializedToken === null) {\n  164 | \t\t\treturn null;\n  165 | \t\t}\n  166 | \n  167 | \t\t$token = unserialize($serializedToken, [\n  168 | \t\t\t'allowed_classes' => [PublicKeyToken::class],\n  169 | \t\t]);\n  170 | \n  171 | \t\treturn $token instanceof PublicKeyToken ? $token : null;\n  172 | \t}"}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-06-03 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
