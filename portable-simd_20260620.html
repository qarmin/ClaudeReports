<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"`simd_min`/`simd_max` for masks invert the comparison relative to numeric vectors: numeric `simd_max` is `self.simd_lt(other).select(other, self)` while mask `simd_max` is `self.simd_gt(other).select(other, self)`. For masks, elements are i-1 (true) / 0 (false), so as signed integers `true (-1) < false (0)`; the mask impl deliberately flips lt/gt so that true is treated as the maximum. This is intentional but undocumented and is a trap for anyone editing it (it looks like a copy-paste sign error). Worth a comment.","fix":"Add a one-line comment explaining that mask elements encode true as -1, so simd_max/simd_min flip the comparison so that `true` is ordered above `false`.","locations":[{"ref":"crates/core_simd/src/simd/cmp/ord.rs:185-193","code":"  185 |             #[inline]\n  186 |             fn simd_max(self, other: Self) -> Self {\n  187 |                 self.simd_gt(other).select(other, self)\n  188 |             }\n  189 | \n  190 |             #[inline]\n  191 |             fn simd_min(self, other: Self) -> Self {\n  192 |                 self.simd_lt(other).select(other, self)\n  193 |             }","lines":9,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/simd/cmp/ord.rs#L185-L193"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The avx512vbmi arms for N=32 and N=64 build the in-range mask with `_mm{256,512}_cmp_epu8_mask::<_MM_CMPINT_LT>(idxs, splat(N as u8))`. `vpermb`/`permutexvar` uses only the low bits of the index, but the OOB-zeroing relies entirely on this comparison against `N as u8`. For N=64 (the 64-arm) `N as u8` is 64, fine; for the 32-arm `N as u8` is 32. This matches the fallback's `(k as usize) < N`. However the comparison uses `N as u8` where the splat vector type is hard-coded `Simd::<u8, 32>`/`Simd::<u8, 64>` rather than tied to the matched arm width, so if the match arm values were ever edited the splat width and `N` could silently disagree. Worth tightening the coupling.","fix":"Derive the splat width from the arm (or assert `N` equals the arm constant) so the mask comparison and the intrinsic width cannot drift apart; add a test comparing these arms to the scalar fallback for indices >= N.","locations":[{"ref":"crates/core_simd/src/swizzle_dyn.rs:53-77","code":"   53 |                 #[cfg(all(target_feature = \"avx512vl\", target_feature = \"avx512vbmi\"))]\n   54 |                 32 => {\n   55 |                     // Unlike vpshufb, vpermb doesn't zero out values in the result based on the index high bit\n   56 |                     let swizzler = |bytes, idxs| {\n   57 |                         let mask = x86::_mm256_cmp_epu8_mask::<{ x86::_MM_CMPINT_LT }>(\n   58 |                             idxs,\n   59 |                             Simd::<u8, 32>::splat(N as u8).into(),\n   60 |                         );\n   61 |                         x86::_mm256_maskz_permutexvar_epi8(mask, idxs, bytes)\n   62 |                     };\n   63 |                     transize(swizzler, self, idxs)\n   64 |                 }\n   65 |                 // Notable absence: avx512bw pshufb shuffle\n   66 |                 #[cfg(all(target_feature = \"avx512vl\", target_feature = \"avx512vbmi\"))]\n   67 |                 64 => {\n   68 |                     // Unlike vpshufb, vpermb doesn't zero out values in the result based on the index high bit\n   69 |                     let swizzler = |bytes, idxs| {\n   70 |                         let mask = x86::_mm512_cmp_epu8_mask::<{ x86::_MM_CMPINT_LT }>(\n   71 |                             idxs,\n   72 |                             Simd::<u8, 64>::splat(N as u8).into(),\n   73 |                         );\n   74 |                         x86::_mm512_maskz_permutexvar_epi8(mask, idxs, bytes)\n   75 |                     };\n   76 |                     transize(swizzler, self, idxs)\n   77 |                 }","lines":25,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/swizzle_dyn.rs#L53-L77"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`Mask::to_array` uses `mem::transmute_copy(&array)`/`transmute_copy(&bytes)` between `[u8; N]`/`Simd<i8, N>` and `[bool; N]`. transmute_copy reads `size_of::<Dst>()` bytes from the source; since `Simd<i8, N>` may be over-aligned/padded relative to `[bool; N]` this relies on the source being at least as large as the destination. The same pattern in `from_array` transmutes `[bool; N]` (size N) into `[u8; N]` (size N) which is fine, but transmuting a `Simd<i8, N>` (which can have padding for non-power-of-two N) into `[bool; N]` only works because Dst (N bytes) <= Src. It is correct today but extremely fragile and undocumented; a future change to Simd layout/padding for the smaller direction would silently break it.","fix":"Document the size/layout assumption explicitly (Dst size <= Src size) in the SAFETY comment, and prefer `to_array()`/`from_array()` on Simd plus a per-lane bool conversion, or assert `size_of` relationships, instead of relying on transmute_copy of differently-laid-out aggregates.","locations":[{"ref":"crates/core_simd/src/masks.rs:185-189","code":"  185 |         unsafe {\n  186 |             let mut bytes: Simd<i8, N> = core::intrinsics::simd::simd_cast(self.to_simd());\n  187 |             bytes &= Simd::splat(1i8);\n  188 |             mem::transmute_copy(&bytes)\n  189 |         }","lines":5,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/masks.rs#L185-L189"},{"ref":"crates/core_simd/src/masks.rs:164-169","code":"  164 |         unsafe {\n  165 |             let bytes: [u8; N] = mem::transmute_copy(&array);\n  166 |             let bools: Simd<i8, N> =\n  167 |                 core::intrinsics::simd::simd_ne(Simd::from_array(bytes), Simd::splat(0u8));\n  168 |             Mask::from_simd_unchecked(core::intrinsics::simd::simd_cast(bools))\n  169 |         }","lines":6,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/masks.rs#L164-L169"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"`Mask::from_bitmask` delegates to `bitmask.select(Simd::splat(T::TRUE), Simd::splat(T::FALSE))` (the u64 Select impl). For each call this resizes both splatted vectors to the rounded width, runs simd_select_bitmask, then resizes back, even though both inputs are constant splats. The round-trip resize/select is heavier than a direct `simd_select_bitmask` against splat constants of the already-correct width.","fix":"Provide a dedicated from_bitmask lowering that calls simd_select_bitmask once on the correctly-sized splat constants without the resize dance, or special-case splat inputs in the u64 Select impl.","locations":[{"ref":"crates/core_simd/src/masks.rs:345-347","code":"  345 |     pub fn from_bitmask(bitmask: u64) -> Self {\n  346 |         Self(bitmask.select(Simd::splat(T::TRUE), Simd::splat(T::FALSE)))\n  347 |     }","lines":3,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/masks.rs#L345-L347"},{"ref":"crates/core_simd/src/select.rs:78-125","code":"   78 |     fn select(self, true_values: Simd<T, N>, false_values: Simd<T, N>) -> Simd<T, N> {\n   79 |         const {\n   80 |             assert!(N <= 64, \"number of elements can't be greater than 64\");\n   81 |         }\n   82 | \n   83 |         #[inline]\n   84 |         unsafe fn select_impl<T, U: FixEndianness, const M: usize, const N: usize>(\n   85 |             bitmask: U,\n   86 |             true_values: Simd<T, N>,\n   87 |             false_values: Simd<T, N>,\n   88 |         ) -> Simd<T, N>\n   89 |         where\n   90 |             T: SimdElement,\n   91 |         {\n   92 |             let default = true_values[0];\n   93 |             let true_values = true_values.resize::<M>(default);\n   94 |             let false_values = false_values.resize::<M>(default);\n   95 | \n   96 |             // LLVM assumes bit order should match endianness\n   97 |             let bitmask = bitmask.fix_endianness();\n   98 | \n   99 |             // Safety: the caller guarantees that the size of U matches M\n  100 |             let selected = unsafe {\n  101 |                 core::intrinsics::simd::simd_select_bitmask(bitmask, true_values, false_values)\n  102 |             };\n  103 | \n  104 |             selected.resize::<N>(default)\n  105 |         }\n  106 | \n  107 |         // TODO modify simd_bitmask_select to truncate input, making this unnecessary\n  108 |         if N <= 8 {\n  109 |             let bitmask = self as u8;\n  110 |             // Safety: bitmask matches length\n  111 |             unsafe { select_impl::<T, u8, 8, N>(bitmask, true_values, false_values) }\n  112 |         } else if N <= 16 {\n  113 |             let bitmask = self as u16;\n  114 |             // Safety: bitmask matches length\n  115 |             unsafe { select_impl::<T, u16, 16, N>(bitmask, true_values, false_values) }\n  116 |         } else if N <= 32 {\n  117 |             let bitmask = self as u32;\n  118 |             // Safety: bitmask matches length\n  119 |             unsafe { select_impl::<T, u32, 32, N>(bitmask, true_values, false_values) }\n  120 |         } else {\n  121 |             let bitmask = self;\n  122 |             // Safety: bitmask matches length\n  123 |             unsafe { select_impl::<T, u64, 64, N>(bitmask, true_values, false_values) }\n  124 |         }\n  125 |     }","lines":48,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/select.rs#L78-L125"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"medium","easy":true,"description":"In `first_set` and `last_set` the fast-path guard `cfg!(target_feature = \"sse\") && N <= 64` includes `N <= 64`, but `N` is already statically constrained to at most 64 everywhere masks are usable (to_bitmask even has a const assert for N <= 64). The `N <= 64` term is always true and is dead/redundant in the condition; it can also confuse readers into thinking N > 64 masks are supported.","fix":"Drop the redundant `&& N <= 64` from both guards, or replace with a const assertion that documents the real invariant.","locations":[{"ref":"crates/core_simd/src/masks.rs:366","code":"  366 |         if cfg!(target_feature = \"sse\") && N <= 64 {","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/masks.rs#L366"},{"ref":"crates/core_simd/src/masks.rs:434","code":"  434 |         if cfg!(target_feature = \"sse\") && N <= 64 {","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/masks.rs#L434"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`#[track_caller]` is applied unconditionally to every binary operator generated by `for_base_types!` (Add, Mul, Sub, BitAnd, BitOr, BitXor, Div, Rem, Shl, Shr for all integer and float types), even though the authors' own TODO comment notes it is \"only useful for int Div::div\". `#[track_caller]` forces the compiler to thread an implicit `&Location` argument through the function, which can pessimize codegen and inlining for the vast majority of these ops that can never panic.","fix":"Restrict `#[track_caller]` to the Div/Rem implementations only (e.g. via a separate macro arm or a conditional attribute), rather than emitting it for every operator in `for_base_types!`.","locations":[{"ref":"crates/core_simd/src/ops.rs:134-140","code":"  134 |                     #[inline]\n  135 |                     // TODO: only useful for int Div::div, but we hope that this\n  136 |                     // will essentially always get inlined anyway.\n  137 |                     #[track_caller]\n  138 |                     fn $call(self, rhs: Self) -> Self::Output {\n  139 |                         $macro_impl!(self, rhs, $inner, $scalar)\n  140 |                     }","lines":7,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/ops.rs#L134-L140"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"`lane_indices` builds the index vector with a scalar `for` loop writing into a stack array and then loading it as a Simd vector. For the only caller (`mask_up_to`, used in `load_select`/`store_select`) this is on the hot path of masked load/store and depends on the optimizer to vectorize the loop into a single iota; on debug or under poor inlining this is N scalar stores plus a vector load.","fix":"Prefer a dedicated lane-index intrinsic / `core::array::from_fn` lowered to an iota, or document the reliance on optimization. At minimum this is fine but worth a note; not a correctness issue.","locations":[{"ref":"crates/core_simd/src/vector.rs:1159-1167","code":" 1159 | #[inline]\n 1160 | fn lane_indices<const N: usize>() -> Simd<usize, N> {\n 1161 |     #![allow(clippy::needless_range_loop)]\n 1162 |     let mut index = [0; N];\n 1163 |     for i in 0..N {\n 1164 |         index[i] = i;\n 1165 |     }\n 1166 |     Simd::from_array(index)\n 1167 | }","lines":9,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L1159-L1167"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"`to_bits` and `from_bits` perform a runtime `assert_eq!(size_of::<Self>(), size_of::<Self::Bits>())` on every call before a `transmute_copy`. The sizes are compile-time constants and always equal for the macro-generated impls, so the check is dead in practice; using `transmute_copy` (which skips the compile-time size check that `transmute` would give) is what necessitates this runtime assert. It will be optimized away in release, but a `const` assertion would be clearer and free.","fix":"Replace the runtime `assert_eq!` with a `const { assert!(size_of::<Self>() == size_of::<Self::Bits>()) }` block, or switch to a size-checked `transmute` where possible.","locations":[{"ref":"crates/core_simd/src/simd/num/float.rs:295-307","code":"  295 |             #[inline]\n  296 |             fn to_bits(self) -> Simd<$bits_ty, N> {\n  297 |                 assert_eq!(size_of::<Self>(), size_of::<Self::Bits>());\n  298 |                 // Safety: transmuting between vector types is safe\n  299 |                 unsafe { core::mem::transmute_copy(&self) }\n  300 |             }\n  301 | \n  302 |             #[inline]\n  303 |             fn from_bits(bits: Simd<$bits_ty, N>) -> Self {\n  304 |                 assert_eq!(size_of::<Self>(), size_of::<Self::Bits>());\n  305 |                 // Safety: transmuting between vector types is safe\n  306 |                 unsafe { core::mem::transmute_copy(&bits) }\n  307 |             }","lines":13,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/simd/num/float.rs#L295-L307"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"`mask_up_to`'s final fallback `index.simd_lt(Simd::splat(len)).cast()` is effectively unreachable. The `case!(u8)` arm always matches for any supported `N` (N <= 64 < u8::MAX == 255, and u8::MAX round-trips through u64), so the u16/u32/u64 cases and the trailing fallback never execute. This is dead-by-construction code kept for generality; it adds confusion because the fallback compares against full `len` rather than `len.min(N)` like the macro arms, suggesting a behavioral difference that can never be observed.","fix":"Either simplify to the u8 path with a comment that N <= 64 guarantees indices fit in u8, or add a comment explaining the later cases exist only to future-proof a larger lane limit. Make the fallback also use `len.min(N)` for consistency if it is kept.","locations":[{"ref":"crates/core_simd/src/vector.rs:1176-1187","code":" 1176 |     macro_rules! case {\n 1177 |         ($ty:ty) => {\n 1178 |             if N < <$ty>::MAX as usize && max_value as $ty as u64 == max_value {\n 1179 |                 return index.cast().simd_lt(Simd::splat(len.min(N) as $ty)).cast();\n 1180 |             }\n 1181 |         };\n 1182 |     }\n 1183 |     case!(u8);\n 1184 |     case!(u16);\n 1185 |     case!(u32);\n 1186 |     case!(u64);\n 1187 |     index.simd_lt(Simd::splat(len)).cast()","lines":12,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L1176-L1187"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"medium","easy":false,"description":"Inside `scatter_select_unchecked` (the UNSAFE, unchecked entry point), the comment claims `The ptrs have been bounds-masked to prevent memory-unsafe writes`. That is false here: bounds masking only happens in the safe `scatter_select` caller. In the `_unchecked` path the caller is solely responsible for ensuring indices are in bounds, and no masking is performed. The misleading comment can lull a maintainer into thinking this function is self-protecting, which it is not - an actual soundness footgun.","fix":"Reword the comment to state that the ptrs are NOT bounds-checked here and that safety relies entirely on the caller's invariant (matching the `# Safety` section), e.g. 'Caller guarantees enabled indices are in bounds; no masking is done here.'","locations":[{"ref":"crates/core_simd/src/vector.rs:816-824","code":"  816 |         unsafe {\n  817 |             // Now Entering ☢️ *mut T Zone\n  818 |             let base_ptr = Simd::<*mut T, N>::splat(slice.as_mut_ptr());\n  819 |             // Ferris forgive me, I have done pointer arithmetic here.\n  820 |             let ptrs = base_ptr.wrapping_add(idxs);\n  821 |             // The ptrs have been bounds-masked to prevent memory-unsafe writes insha'allah\n  822 |             self.scatter_select_ptr(ptrs, enable);\n  823 |             // Cleared ☢️ *mut T Zone\n  824 |         }","lines":9,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L816-L824"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc/inline comment in `last_set` is a copy-paste from `first_set`. It says \"To find the first set index\" and the bullet list describes finding the first set element, but the function finds the *last* set element. This misleads readers of the algorithm.","fix":"Reword the comment to describe finding the last set index (e.g. \"To find the last set index: create a vector 0..N, replace unset mask elements with -1, perform signed reduce-max, check if the result is -1 or an index\").","locations":[{"ref":"crates/core_simd/src/masks.rs:438-442","code":"  438 |         // To find the first set index:\n  439 |         // * create a vector 0..N\n  440 |         // * replace unset mask elements in that vector with -1\n  441 |         // * perform _signed_ reduce-max\n  442 |         // * check if the result is -1 or an index","lines":5,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/masks.rs#L438-L442"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"The doc comment on `gather_or` / `gather_select` and friends, plus the safety prose, refer to indices being masked, but the inline `// Safety:` comments on lines 533 and 765 are spelled `Safety:` (capital S, not the canonical `SAFETY:` used elsewhere in the file, e.g. lines 152, 168, 202). The crate denies `clippy::undocumented_unsafe_blocks`; mixed casing is harmless functionally but inconsistent and can defeat lint/tooling that scans for `SAFETY:`.","fix":"Normalize all safety comments to the `// SAFETY:` form used by the rest of the file and required convention.","locations":[{"ref":"crates/core_simd/src/vector.rs:533","code":"  533 |         // Safety: We have masked-off out-of-bounds indices.","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L533"},{"ref":"crates/core_simd/src/vector.rs:576","code":"  576 |         // Safety: The caller is responsible for determining the indices are okay to read","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L576"},{"ref":"crates/core_simd/src/vector.rs:640","code":"  640 |         // Safety: The caller is responsible for upholding all invariants","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L640"},{"ref":"crates/core_simd/src/vector.rs:765","code":"  765 |         // Safety: We have masked-off out-of-bounds indices.","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L765"},{"ref":"crates/core_simd/src/vector.rs:806","code":"  806 |         // Safety: This block works with *mut T derived from &mut 'a [T],","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L806"},{"ref":"crates/core_simd/src/vector.rs:848","code":"  848 |         // Safety: The caller is responsible for upholding all invariants","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L848"},{"ref":"crates/core_simd/src/vector.rs:876","code":"  876 |         // Safety: The caller is responsible for upholding all invariants","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L876"},{"ref":"crates/core_simd/src/vector.rs:909","code":"  909 |         // Safety: All SIMD vectors are SimdPartialEq, and the comparison produces a valid mask.","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/vector.rs#L909"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":true,"description":"The doc comment for `StdFloat::round` states \"Ties round toward zero.\" This is incorrect. `round` lowers to the `simd_round` intrinsic (LLVM `llvm.round`), which rounds half-way cases AWAY from zero (matching `f32::round`/`f64::round`). The `round_ties_even` method directly below correctly documents the round-to-even behavior, so this comment will actively mislead users about rounding direction (e.g. they may expect `2.5` to round to `2.0` when it actually rounds to `3.0`).","fix":"Change the comment to \"Rounds to the nearest integer value. Ties round away from zero.\" to match the actual `simd_round`/`f32::round` semantics.","locations":[{"ref":"crates/std_float/src/lib.rs:137","code":"  137 |     /// Rounds to the nearest integer value. Ties round toward zero.","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/std_float/src/lib.rs#L137"}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Typo \"elemnent\" (should be \"element\") in the `reverse_bits` doc comment, duplicated in both the signed and unsigned integer trait definitions.","fix":"Correct the spelling to \"element\".","locations":[{"ref":"crates/core_simd/src/simd/num/int.rs:217","code":"  217 |     /// Reverses the order of bits in each elemnent.","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/simd/num/int.rs#L217"},{"ref":"crates/core_simd/src/simd/num/uint.rs:100","code":"  100 |     /// Reverses the order of bits in each elemnent.","lines":1,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/simd/num/uint.rs#L100"}]},{"id":"DUP_1","type":"duplicate_code","type_label":"Duplicate Code","severity":"medium","easy":false,"description":"The `simd_clamp` implementation (assert min<=max via simd_le().all(), then simd_max(min).simd_min(max)) is duplicated verbatim four times: integer Simd, mask, *const T and *mut T impls. Likewise the SimdPartialOrd pointer impls for *const and *mut are byte-identical, and the float/integer simd_lt/le/gt/ge macro bodies are identical. This is a lot of copy-paste that must be kept in sync by hand.","fix":"Extract a shared macro or a default-method/blanket helper for the clamp body and the pointer SimdPartialOrd/SimdOrd impls (the *const and *mut pointer impls can share a single macro).","locations":[{"ref":"crates/core_simd/src/simd/cmp/ord.rs:94-102","code":"   94 |             #[inline]\n   95 |             #[track_caller]\n   96 |             fn simd_clamp(self, min: Self, max: Self) -> Self {\n   97 |                 assert!(\n   98 |                     min.simd_le(max).all(),\n   99 |                     \"each element in `min` must be less than or equal to the corresponding element in `max`\",\n  100 |                 );\n  101 |                 self.simd_max(min).simd_min(max)\n  102 |             }","lines":9,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/simd/cmp/ord.rs#L94-L102"},{"ref":"crates/core_simd/src/simd/cmp/ord.rs:195-203","code":"  195 |             #[inline]\n  196 |             #[track_caller]\n  197 |             fn simd_clamp(self, min: Self, max: Self) -> Self {\n  198 |                 assert!(\n  199 |                     min.simd_le(max).all(),\n  200 |                     \"each element in `min` must be less than or equal to the corresponding element in `max`\",\n  201 |                 );\n  202 |                 self.simd_max(min).simd_min(max)\n  203 |             }","lines":9,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/simd/cmp/ord.rs#L195-L203"},{"ref":"crates/core_simd/src/simd/cmp/ord.rs:244-252","code":"  244 |     #[inline]\n  245 |     #[track_caller]\n  246 |     fn simd_clamp(self, min: Self, max: Self) -> Self {\n  247 |         assert!(\n  248 |             min.simd_le(max).all(),\n  249 |             \"each element in `min` must be less than or equal to the corresponding element in `max`\",\n  250 |         );\n  251 |         self.simd_max(min).simd_min(max)\n  252 |     }","lines":9,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/simd/cmp/ord.rs#L244-L252"},{"ref":"crates/core_simd/src/simd/cmp/ord.rs:289-296","code":"  289 |     #[track_caller]\n  290 |     fn simd_clamp(self, min: Self, max: Self) -> Self {\n  291 |         assert!(\n  292 |             min.simd_le(max).all(),\n  293 |             \"each element in `min` must be less than or equal to the corresponding element in `max`\",\n  294 |         );\n  295 |         self.simd_max(min).simd_min(max)\n  296 |     }","lines":8,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/simd/cmp/ord.rs#L289-L296"}]},{"id":"DUP_2","type":"duplicate_code","type_label":"Duplicate Code","severity":"low","easy":false,"description":"`SimdConstPtr` (const_ptr.rs) and `SimdMutPtr` (mut_ptr.rs) are almost entirely identical: the trait definitions and the full `impl` bodies for `is_null`, `cast`, `addr`, `with_addr`, `expose_provenance`, `wrapping_offset`, `wrapping_add`, and `wrapping_sub` are byte-for-byte copies (only `cast_mut`/`cast_const` and `null()`/`null_mut()` differ). Any fix to the tricky `with_addr` emulation (which depends on `wrapping_offset` provenance behavior) must be made in two places, and the two can silently drift apart.","fix":"Factor the shared body into a macro (as is done elsewhere in this crate) or a private helper so the const and mut pointer impls share one source of truth.","locations":[{"ref":"crates/core_simd/src/simd/ptr/const_ptr.rs:74-138","code":"   74 |     #[inline]\n   75 |     fn is_null(self) -> Self::Mask {\n   76 |         Simd::splat(core::ptr::null()).simd_eq(self)\n   77 |     }\n   78 | \n   79 |     #[inline]\n   80 |     fn cast<U>(self) -> Self::CastPtr<U> {\n   81 |         // SimdElement currently requires zero-sized metadata, so this should never fail.\n   82 |         // If this ever changes, `simd_cast_ptr` should produce a post-mono error.\n   83 |         use core::ptr::Pointee;\n   84 |         assert_eq!(size_of::<<T as Pointee>::Metadata>(), 0);\n   85 |         assert_eq!(size_of::<<U as Pointee>::Metadata>(), 0);\n   86 | \n   87 |         // Safety: pointers can be cast\n   88 |         unsafe { core::intrinsics::simd::simd_cast_ptr(self) }\n   89 |     }\n   90 | \n   91 |     #[inline]\n   92 |     fn cast_mut(self) -> Self::MutPtr {\n   93 |         // Safety: pointers can be cast\n   94 |         unsafe { core::intrinsics::simd::simd_cast_ptr(self) }\n   95 |     }\n   96 | \n   97 |     #[inline]\n   98 |     fn addr(self) -> Self::Usize {\n   99 |         // FIXME(strict_provenance_magic): I am magic and should be a compiler intrinsic.\n  100 |         // SAFETY: Pointer-to-integer transmutes are valid (if you are okay with losing the\n  101 |         // provenance).\n  102 |         unsafe { core::mem::transmute_copy(&self) }\n  103 |     }\n  104 | \n  105 |     #[inline]\n  106 |     fn with_addr(self, addr: Self::Usize) -> Self {\n  107 |         // FIXME(strict_provenance_magic): I am magic and should be a compiler intrinsic.\n  108 |         //\n  109 |         // In the mean-time, this operation is defined to be \"as if\" it was\n  110 |         // a wrapping_offset, so we can emulate it as such. This should properly\n  111 |         // restore pointer provenance even under today's compiler.\n  112 |         self.cast::<u8>()\n  113 |             .wrapping_offset(addr.cast::<isize>() - self.addr().cast::<isize>())\n  114 |             .cast()\n  115 |     }\n  116 | \n  117 |     #[inline]\n  118 |     fn expose_provenance(self) -> Self::Usize {\n  119 |         // Safety: `self` is a pointer vector\n  120 |         unsafe { core::intrinsics::simd::simd_expose_provenance(self) }\n  121 |     }\n  122 | \n  123 |     #[inline]\n  124 |     fn wrapping_offset(self, count: Self::Isize) -> Self {\n  125 |         // Safety: simd_arith_offset takes a vector of pointers and a vector of offsets\n  126 |         unsafe { core::intrinsics::simd::simd_arith_offset(self, count) }\n  127 |     }\n  128 | \n  129 |     #[inline]\n  130 |     fn wrapping_add(self, count: Self::Usize) -> Self {\n  131 |         self.wrapping_offset(count.cast())\n  132 |     }\n  133 | \n  134 |     #[inline]\n  135 |     fn wrapping_sub(self, count: Self::Usize) -> Self {\n  136 |         self.wrapping_offset(-count.cast::<isize>())\n  137 |     }\n  138 | }","lines":65,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/simd/ptr/const_ptr.rs#L74-L138"},{"ref":"crates/core_simd/src/simd/ptr/mut_ptr.rs:74-1 n   75 |                 self.to_ne_bytes()\n   76 |             }\n   77 | \n   78 |             #[inline]\n   79 |             fn to_le_bytes(mut self) -> Self::Bytes {\n   80 |                 if !cfg!(target_endian = \"little\") {\n   81 |                     self = swap_bytes!($ty, self);\n   82 |                 }\n   83 |                 self.to_ne_bytes()\n   84 |             }\n   85 | \n   86 |             #[inline]\n   87 |             fn from_ne_bytes(bytes: Self::Bytes) -> Self {\n   88 |                 // Safety: transmuting between vectors is safe\n   89 |                 unsafe {\n   90 |                     #![allow(clippy::useless_transmute)]\n   91 |                     core::mem::transmute(bytes)\n   92 |                 }\n   93 |             }\n   94 | \n   95 |             #[inline]\n   96 |             fn from_be_bytes(bytes: Self::Bytes) -> Self {\n   97 |                 let ret = Self::from_ne_bytes(bytes);\n   98 |                 if cfg!(target_endian = \"big\") {\n   99 |                     ret\n  100 |                 } else {\n  101 |                     swap_bytes!($ty, ret)\n  102 |                 }\n  103 |             }\n  104 | \n  105 |             #[inline]\n  106 |             fn from_le_bytes(bytes: Self::Bytes) -> Self {\n  107 |                 let ret = Self::from_ne_bytes(bytes);\n  108 |                 if cfg!(target_endian = \"little\") {\n  109 |                     ret\n  110 |                 } else {\n  111 |                     swap_bytes!($ty, ret)\n  112 |                 }\n  113 |             }","lines":44,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/to_bytes.rs#L70-L113"}]},{"id":"ARCH_1","type":"architecture","type_label":"Architecture","severity":"medium","easy":false,"description":"`swizzle_dyn` is a single monolithic `match N` with many arch-specific arms inline (ssse3, simd128, armv7 neon, avx2, avx512vbmi for 32 and 64) plus the n't zero out values in the result based on the index high bit\n   56 |                     let swizzler = |bytes, idxs| {\n   57 |                         let mask = x86::_mm256_cmp_epu8_mask::<{ x86::_MM_CMPINT_LT }>(\n   58 |                             idxs,\n   59 |                             Simd::<u8, 32>::splat(N as u8).into(),\n   60 |                         );\n   61 |                         x86::_mm256_maskz_permutexvar_epi8(mask, idxs, bytes)\n   62 |                     };\n   63 |                     transize(swizzler, self, idxs)\n   64 |                 }\n   65 |                 // Notable absence: avx512bw pshufb shuffle\n   66 |                 #[cfg(all(target_feature = \"avx512vl\", target_feature = \"avx512vbmi\"))]\n   67 |                 64 => {\n   68 |                     // Unlike vpshufb, vpermb doesn't zero out values in the result based on the index high bit\n   69 |                     let swizzler = |bytes, idxs| {\n   70 |                         let mask = x86::_mm512_cmp_epu8_mask::<{ x86::_MM_CMPINT_LT }>(\n   71 |                             idxs,\n   72 |                             Simd::<u8, 64>::splat(N as u8).into(),\n   73 |                         );\n   74 |                         x86::_mm512_maskz_permutexvar_epi8(mask, idxs, bytes)\n   75 |                     };\n   76 |                     transize(swizzler, self, idxs)\n   77 |                 }\n   78 |                 _ => {\n   79 |                     let mut array = [0; N];\n   80 |                     for (i, k) in idxs.to_array().into_iter().enumerate() {\n   81 |                         if (k as usize) < N {\n   82 |                             array[i] = self[k as usize];\n   83 |                         };\n   84 |                     }\n   85 |                     array.into()\n   86 |                 }\n   87 |             }\n   88 |         }\n   89 |     }","lines":59,"link":"https://github.com/rust-lang/portable-simd/blob/d7a525f66ace336c4b67bf1576c4ce341ac110c9/crates/core_simd/src/swizzle_dyn.rs#L31-L89"}]},{"id":"ARCH_2","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"vector.rs is ~1188 lines mixing many concerns: the core `Simd` type, all load/store variants, gather/scatter (safe + unchecked + ptr forms), the `SimdElement` trait and ~15 impls, all the std trait impls (Copy/Clone/Default/Eq/Ord/Hash/AsRef/AsMut/From/TryFrom), and free helper fns. This is a large, monolithic file that is hard to navigate; the gather/scatter/load family alone (lines ~189-878) is a sprawling set of near-duplicate doc-heavy methods.","fix":"Consider splitting into submodules (e.g. vector/load_store.rs, vector/gather_scatter.rs, vector/element.rs, vector/traits.rs) re-exported from vector.rs.","locations":[{"ref":"crates/core_simd/src/vector.rs:1-1188","code":"    1 | use core::intrinsics::simd::SimdAlign;\n    2 | \n    3 | use crate::simd::{\n    4 |     Mask, MaskElement,\n    5 |     cmp::SimdPartialOrd,\n    6 |     num::SimdUint,\n    7 |     ptr::{SimdConstPtr, SimdMutPtr},\n    8 | };\n    9 | \n   10 | /// A SIMD vector with the shape of `[T; N]` but the operations of `T`.\n   11 | ///\n   12 | /// `Simd<T, N>` supports the operators (+, *, etc.) that `T` does in \"elementwise\" fashion.\n   13 | /// These take the element at each index from the left-hand side and right-hand side,\n   14 | /// perform the operation, then return the result in the same index in a vector of equal size.\n   15 | /// However, `Simd` differs from normal iteration and normal arrays:\n   16 | /// - `Simd<T, N>` executes `N` operations in a single step with no `break`s\n   17 | /// - `Simd<T, N>` can have an alignment greater than `T`, for better mechanical sympathy\n   18 | ///\n   19 | /// By always imposing these constraints on `Simd`, it is easier to compile elementwise operations\n   20 | /// into machine instructions that can themselves be executed in parallel.\n   21 | ///\n   22 | /// ```rust\n   23 | /// # #![feature(portable_simd)]\n   24 | /// # use core::simd::{Simd};\n   25 | /// # use core::array;\n   26 | /// let a: [i32; 4] = [-2, 0, 2, 4];\n   27 | /// let b = [10, 9, 8, 7];\n   28 | /// let sum = array::from_fn(|i| a[i] + b[i]);\n   29 | /// let prod = array::from_fn(|i| a[i] * b[i]);\n   30 | ///\n   31 | /// // `Simd<T, N>` implements `From<[T; N]>`\n   32 | /// let (v, w) = (Simd::from(a), Simd::from(b));\n   33 | /// // Which means arrays implement `Into<Simd<T, N>>`.\n   34 | /// assert_eq!(v + w, sum.into());\n   35 | /// assert_eq!(v * w, prod.into());\n   36 | /// ```\n   37 | ///\n   38 | ///\n   39 | /// `Simd` with integer elements treats operators as wrapping, as if `T` was [`Wrapping<T>`].\n   40 | /// Thus, `Simd` does not implement `wrapping_add`, because that is the default behavior.\n   41 | /// This means there is no warning on overflows, even in \"debug\" builds.\n   42 | /// For most applications where `Simd` is appropriate, it is \"not a bug\" to wrap,\n   43 | /// and even \"debug builds\" are unlikely to tolerate the loss of performance.\n   44 | /// You may want to consider using explicitly checked arithmetic if such is required.\n   45 | /// Division by zero on integers still causes a panic, so\n   46 | /// you may want to consider using `f32` or `f64` if that is unacceptable.\n   47 | ///\n   48 | /// [`Wrapping<T>`]: core::num::Wrapping\n   49 | ///\n   50 | /// # Layout\n   51 | /// `Simd<T, N>` has a layout similar to `[T; N]` (identical \"shapes\"), with a greater alignment.\n   52 | /// `[T; N]` is aligned to `T`, but `Simd<T, N>` will have an alignment based on both `T` and `N`.\n   53 | /// Thus it is sound to [`transmute`] `Simd<T, N>` to `[T; N]` and should optimize to \"zero cost\",\n   54 | /// but the reverse transmutation may require a copy the compiler cannot simply elide.\n   55 | ///\n   56 | /// `N` cannot be 0 and may be at most 64. This limit may be increased in the future.\n   57 | ///\n   58 | /// # ABI \"Features\"\n   59 | /// Due to Rust's safety guarantees, `Simd<T, N>` is currently passed and returned via memory,\n   60 | /// not SIMD registers, except as an optimization. Using `#[inline]` on functions that accept\n   61 | /// `Simd<T, N>` or return it is recommended, at the cost of code generation time, as\n   62 | /// inlining SIMD-using functions can omit a large function prolog or epilog and thus\n   63 | /// improve both speed and code size. The need for this may be corrected in the future.\n   64 | ///\n   65 | /// Using `#[inline(always)]` still requires additional care.\n   66 | ///\n   67 | /// # Safe SIMD with Unsafe Rust\n   68 | ///\n   69 | /// Operations with `Simd` are typically safe, but there are many reasons to want to combine SIMD with `unsafe` code.\n   70 | /// Care must be taken to respect differences between `Simd` and other types it may be transformed into or derived from.\n   71 | /// In particular, the layout of `Simd<T, N>` may be similar to `[T; N]`, and may allow some transmutations,\n   72 | /// but references to `[T; N]` are not interchangeable with those to `Simd<T, N>`.\n   73 | /// Thus, when using `unsafe` Rust to read and write `Simd<T, N>` through [raw pointers], it is a good idea to first try with\n   74 | /// [`read_unaligned`] and [`write_unaligned`]. This is because:\n   75 | /// - [`read`] and [`write`] require full alignment (in this case, `Simd<T, N>`'s alignment)\n   76 | /// - `Simd<T, N>` is often read from or written to [`[T]`](slice) and other types aligned to `T`\n   77 | /// - combining these actions violates the `unsafe` contract and explodes the program into\n   78 | ///   a puff of **undefined behavior**\n   79 | /// - the compiler can implicitly adjust layouts to make unaligned reads or writes fully aligned\n   80 | ///   if it sees the optimization\n   81 | /// - most contemporary processors with \"aligned\" and \"unaligned\" read and write instructions\n   82 | ///   exhibit no performance difference if the \"unaligned\" variant is aligned at runtime\n   83 | ///\n   84 | /// Less obligations mean unaligned reads and writes are less likely to make the program unsound,\n   85 | /// and may be just as fast as stricter alternatives.\n   86 | /// When trying to guarantee alignment, [`[T]::as_simd`][as_simd] is an option for\n   87 | /// converting `[T]` to `[Simd<T, N>]`, and allows soundly operating on an aligned SIMD body,\n   88 | /// but it may cost more time when handling the scalar head and tail.\n   89 | /// If these are not enough, it is most ideal to design data structures to be already aligned\n   90 | /// to `align_of::<Simd<T, N>>()` before using `unsafe` Rust to read or write.\n   91 | /// Other ways to compensate for these facts, like materializing `Simd` to or from an array first,\n   92 | /// are handled by safe methods like [`Simd::from_array`] and [`Simd::from_slice`].\n   93 | ///\n   94 | /// [`transmute`]: core::mem::transmute\n   95 | /// [raw pointers]: pointer\n   96 | /// [`read_unaligned`]: pointer::read_unaligned\n   97 | /// [`write_unaligned`]: pointer::write_unaligned\n   98 | /// [`read`]: pointer::read\n   99 | /// [`write`]: pointer::write\n  100 | /// [as_simd]: slice::as_simd\n  101 | //\n  102 | // NOTE: Accessing the inner array directly in any way (e.g. by using the `.0` field syntax) or\n  103 | // directly constructing an instance of the type (i.e. `let vector = Simd(array)`) should be\n  104 | // avoided, as it will likely become illegal on `#[repr(simd)]` structs in the future. It also\n  105 | // causes rustc to emit illegal LLVM IR in some cases.\n  106 | #[repr(simd, packed)]\n  107 | #[rustc_simd_monomorphize_lane_limit = \"64\"]\n  108 | pub struct Simd<T, const N: usize>([T; N])\n  109 | where\n  110 |     T: SimdElement;\n  111 | \n  112 | impl<T, const N: usize> Simd<T, N>\n  113 | where\n  114 |     T: SimdElement,\n  115 | {\n  116 |     /// Number of elements in this vector.\n  117 |     pub const LEN: usize 68 |         // SAFETY: `Simd<T, N>` is just an overaligned `[T; N]` with\n  169 |         // potential padding at the end, so pointer casting to a\n  170 |         // `&[T; N]` is safe.\n  171 |         //\n  172 |         // NOTE: This deliberately doesn't just use `&self.0`, see the comment\n  173 |         // on the struct definition for details.\n  174 |         unsafe { &*(self as *const Self as *const [T; N]) }\n  175 |     }\n  176 | \n  177 |     /// Returns a mutable array reference containing the entire SIMD vector.\n  178 |     #[inline]\n  179 |     pub const fn as_mut_array(&mut self) -> &mut [T; N] {\n  180 |         // SAFETY: `Simd<T, N>` is just an overaligned `[T; N]` with\n  181 |         // potential padding at the end, so pointer casting to a\n  182 |         // `&mut [T; N]` is safe.\n  183 |         //\n  184 |         // NOTE: This deliberately doesn't just use `&mut self.0`, see the comment\n  185 |         // on the struct definition for details.\n  186 |         unsafe { &mut *(self as *mut Self as *mut [T; N]) }\n  187 |     }\n  188 | \n  189 |     /// Loads a vector from an array of `T`.\n  190 |     ///\n  191 |     /// This function is necessary since `repr(simd)` has padding for non-power-of-2 vectors (at the time of writing).\n  192 |     /// With padding, `read_unaligned` will read past the end of an array of N elements.\n  193 |     ///\n  194 |     /// # Safety\n  195 |     /// Reading `ptr` must be safe, as if by `<*const [T; N]>::read`.\n  196 |     #[inline]\n  197 |     const unsafe fn load(ptr: *const [T; N]) -> Self {\n  198 |         // There are potentially simpler ways to write this function, but this should result in\n  199 |         // LLVM `load <N x T>`\n  200 | \n  201 |         let mut tmp = core::mem::MaybeUninit::<Self>::uninit();\n  202 |         // SAFETY: `Simd<T, N>` always contains `N` elements of type `T`.  It may have padding\n  203 |         // which does not need to be initialized.  The safety of reading `ptr` is ensured by the\n  204 |         // caller.\n  205 |         unsafe {\n  206 |             core::ptr::copy_nonoverlapping(ptr, tmp.as_mut_ptr().cast(), 1);\n  207 |             tmp.assume_init()\n  208 |         }\n  209 |     }\n  210 | \n  211 |     /// Store a vector to an array of `T`.\n  212 |     ///\n  213 |     /// See `load` as to why this function is necessary.\n  214 |     ///\n  215 |     /// # Safety\n  216 |     /// Writing to `ptr` must be safe, as if by `<*mut [T; N]>::write`.\n  217 |     #[inline]\n  218 |     const unsafe fn store(self, ptr: *mut [T; N]) {\n  219 |         // There are potentially simpler ways to write this function, but this should result in\n  220 |         // LLVM `store <N x T>`\n  221 | \n  222 |         // Creating a temporary helps LLVM turn the memcpy into a store.\n  223 |         let tmp = self;\n  224 |         // SAFETY: `Simd<T, N>` always contains `N` elements of type `T`.  The safety of writing\n  225 |         // `ptr` is ensured by the caller.\n  226 |         unsafe { core::ptr::copy_nonoverlapping(tmp.as_array(), ptr, 1) }\n  227 |     }\n  228 | \n  229 |     /// Converts an array to a SIMD vector.\n  230 |     #[inline]\n  231 |     pub const fn from_array(array: [T; N]) -> Self {\n  232 |         // SAFETY: `&array` is safe to read.\n  233 |         //\n  234 |         // FIXME: We currently use a pointer load instead of `transmute_copy` because `repr(simd)`\n  235 |         // results in padding for non-power-of-2 vectors (so vectors are larger than arrays).\n  236 |         //\n  237 |         // NOTE: This deliberately doesn't just use `Self(array)`, see the comment\n  238 |         // on the struct definition for details.\n  239 |         unsafe { Self::load(&array) }\n  240 |     }\n  241 | \n  242 |     /// Converts a SIMD vector to an array.\n  243 |     #[inline]\n  244 |     pub const fn to_array(self) -> [T; N] {\n  245 |         let mut tmp = core::mem::MaybeUninit::uninit();\n  246 |         // SAFETY: writing to `tmp` is safe and initializes it.\n  247 |         //\n  248 |         // FIXME: We currently use a pointer store instead of `transmute_copy` because `repr(simd)`\n  249 |         // results in padding for non-power-of-2 vectors (so vectors are larger than arrays).\n  250 |         //\n  251 |         // NOTE: This deliberately doesn't just use `self.0`, see the comment\n  252 |         // on the struct definition for details.\n  253 |         unsafe {\n  254 |             self.store(tmp.as_mut_ptr());\n  255 |             tmp.assume_init()\n  256 |         }\n  257 |     }\n  258 | \n  259 |     /// Converts a slice to a SIMD vector containing `slice[..N]`.\n  260 |     ///\n  261 |     /// # Panics\n  262 |     ///\n  263 |     /// Panics if the slice's length is less than the vector's `Simd::N`.\n  264 |     /// Use `load_or_default` for an alternative that does not panic.\n  265 |     ///\n  266 |     /// # Example\n  267 |     ///\n  268 |     /// ```\n  269 |     /// # #![feature(portable_simd)]\n  270 |     /// # use core::simd::u32x4;\n  271 |     /// let source = vec![1, 2, 3, 4, 5, 6];\n  272 |     /// let v = u32x4::from_slice(&source);\n  273 |     /// assert_eq!(v.as_array(), &[1, 2, 3, 4]);\n  274 |     /// ```\n  275 |     #[must_use]\n  276 |     #[inline]\n  277 |     #[track_caller]\n  278 |     pub const fn from_slice(slice: &[T]) -> Self {\n  279 |         assert!(\n  280 |             slice.len() >= Self::LEN,\n  281 |             \"slice length must be at least the number of elements\"\n  282 |         );\n  283 |         // SAFETY: We just checked that the slice contains\n  284 |         // at least `N` elements.\n  285 |         unsafe { Self::load(slice.as_ptr().cast()) }\n  286 |     }\n  287 | \n  288 |     /// Writes a SIMD vector to the first `N` elements of a slice.\n  289 |     ///\n  290 |     /// # Panics\n  291 |     ///\n  292 |     /// Panics if the slice's length is less than the vector's `Simd::N`.\n  293 |     ///\n  294 |     /// # Example\n  295 |     ///\n  296 |     /// ```\n  297 |     /// # #![feature(portable_simd)]\n  298 |     /// # #[cfg(feature = \"as_crate\")] use core_simd::simd;\n  299 |     /// # #[cfg(not(feature = \"as_crate\"))] use core::simd;\n  300 |     /// # use simd::u32x4;\n  301 |     /// let mut dest = vec![0; 6];\n  302 |     /// let v = u32x4::from_array([1, 2, 3, 4]);\n  303 |     /// v.copy_to_slice(&mut dest);\n  304 |     /// assert_eq!(&dest, &[1, 2, 3, 4, 0, 0]);\n  305 |     /// ```\n  306 |     #[inline]\n  307 |     #[track_caller]\n  308 |     pub const fn copy_to_slice(self, slice: &mut [T]) {\n  309 |         assert!(\n  310 |             slice.len() >= Self::LEN,\n  311 |             \"slice length must be at least the number of elements\"\n  312 |         );\n  313 |         // SAFETY: We just checked that the slice contains\n  314 |         // at least `N` elements.\n  315 |         unsafe { self.store(slice.as_mut_ptr().cast()) }\n  316 |     }\n  317 | \n  318 |     /// Reads contiguous elements from `slice`. Elements are read so long as they're in-bounds for\n  319 |     /// the `slice`. Otherwise, the default value for the element type is returned.\n  320 |     ///\n  321 |     /// # Examples\n  322 |     /// ```\n  323 |     /// # #![feature(portable_simd)]\n  324 |     /// # #[cfg(feature = \"as_crate\")] use core_simd::simd;\n  325 |     /// # #[cfg(not(feature = \"as_crate\"))] use core::simd;\n  326 |     /// # use simd::Simd;\n  327 |     /// let vec: Vec<i32> = vec![10, 11];\n  328 |     ///\n  329 |     /// let result = Simd::<i32, 4>::load_or_default(&vec);\n  330 |     /// assert_eq!(result, Simd::from_array([10, 11, 0, 0]));\n  331 |     /// ```\n  332 |     #[must_use]\n  333 |     #[inline]\n  334 |     pub fn load_or_default(slice: &[T]) -> Self\n  335 |     where\n  336 |         T: Default,\n  337 |     {\n  338 |         Self::load_or(slice, Default::default())\n  339 |     }\n  340 | \n  341 |
