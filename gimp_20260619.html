<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"In the PDF load loop, poppler_document_get_page() return value is not checked before poppler_page_get_size(page, ...) and render_page_to_surface(). For the non-interactive path the page indices come from the attacker-influenceable 'pages' config array; although page_numbers are bounded against doc_n_pages earlier, poppler_document_get_page can still legitimately return NULL for a corrupt/damaged page object in a malformed PDF, leading to a NULL-pointer dereference and crash.","fix":"Check 'if (! page) continue;' (or abort with an error) after poppler_document_get_page() before using the page.","locations":[{"ref":"plug-ins/common/file-pdf-load.c:797-801","code":"  797 |       page = poppler_document_get_page (doc, pages->pages[page_index]);\n  798 | \n  799 |       poppler_page_get_size (page, &page_width, &page_height);\n  800 |       width  = (gint) ceil (page_width  * scale);\n  801 |       height = (gint) ceil (page_height * scale);","lines":5}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"NULL-pointer dereference parsing untrusted Xmp.iptcExt.ArtworkOrObject. get_tags() leaves a row's column slot NULL when that sub-field is absent (it only strdup's non-NULL values into a g_malloc0 row), and count_tags counts a row if any column is present. The ArtworkOrObject handler then calls strstr(tagdatarow[COL_AOO_TITLE], \" \") which is not NULL-safe (unlike the NULL-tolerant remove_substring around it). A crafted XMP ArtworkOrObject array entry that supplies a sub-field but omits AOTitle yields strstr(NULL, ...) and crashes.","fix":"Guard each strstr/remove_substring block with 'if (tagdatarow[COL_AOO_TITLE])', or have get_tags() store g_strdup(\"\") for empty columns.","locations":[{"ref":"plug-ins/metadata/metadata-editor.c:3610-3626","code":" 3610 |                       remove_substring (tagdatarow[COL_AOO_TITLE], lang_default);\n 3611 |                       if (strstr (tagdatarow[COL_AOO_TITLE], \" \"))\n 3612 |                         {\n 3613 |                           remove_substring (tagdatarow[COL_AOO_TITLE], \" \");\n 3614 |                         }\n 3615 | \n 3616 |                       remove_substring (tagdatarow[COL_AOO_TITLE], bag_default);\n 3617 |                       if (strstr (tagdatarow[COL_AOO_TITLE], \" \"))\n 3618 |                         {\n 3619 |                           remove_substring (tagdatarow[COL_AOO_TITLE], \" \");\n 3620 |                         }\n 3621 | \n 3622 |                       remove_substring (tagdatarow[COL_AOO_TITLE], seq_default);\n 3623 |                       if (strstr (tagdatarow[COL_AOO_TITLE], \" \"))\n 3624 |                         {\n 3625 |                           remove_substring (tagdatarow[COL_AOO_TITLE], \" \");\n 3626 |                         }","lines":17}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"NULL-pointer dereference on g_locale_to_utf8 failure when applying imported template values to UI. set_tag_ui converts str_tag_value with g_locale_to_utf8 (returns NULL on conversion failure or if str_tag_value is non-UTF8 and not valid in the locale) and passes the result straight to gtk_entry_set_text / gtk_text_buffer_set_text / atoi without a NULL check. str_tag_value itself may also be NULL (no <tag-value> element seen for that tag). Crafted import XML with a non-locale-encoded value crashes the editor.","fix":"Check str_tag_value for NULL before converting, and check the g_locale_to_utf8 result; fall back to g_strdup(\"\") or g_utf8_make_valid(str_tag_value, -1) when conversion returns NULL. Capture the GError instead of passing NULL.","locations":[{"ref":"plug-ins/metadata/metadata-xml.c:177-180","code":"  177 |       value_utf = g_locale_to_utf8 (str_tag_value, -1, NULL, NULL, NULL);\n  178 |       entry_widget = GTK_ENTRY (widget);\n  179 |       gtk_entry_set_text (entry_widget, value_utf);\n  180 |       g_free (value_utf);","lines":4},{"ref":"plug-ins/metadata/metadata-xml.c:188-192","code":"  188 |       value_utf = g_locale_to_utf8 (str_tag_value, -1, NULL, NULL, NULL);\n  189 |       text_view = GTK_TEXT_VIEW (widget);\n  190 |       buffer = gtk_text_view_get_buffer (text_view);\n  191 |       gtk_text_buffer_set_text (buffer, value_utf, -1);\n  192 |       g_free (value_utf);","lines":5},{"ref":"plug-ins/metadata/metadata-xml.c:199-201","code":"  199 |       value_utf = g_locale_to_utf8 (str_tag_value, -1, NULL, NULL, NULL);\n  200 |       value = atoi(value_utf);\n  201 |       gtk_combo_box_set_active (GTK_COMBO_BOX(widget), value);","lines":3}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Division by zero / NaN in gimp_lineart_line_segment_until_hit(). 'direction' is the keypoint's normal multiplied by 'size'. For keypoint pixels whose accumulated normal is the zero vector (normals[] is g_new0'd and only edgel pixels get a normal assigned), direction becomes (0,0); after rounding, tmax = MAX(abs(0), abs(0)) = 0. The loop body then computes gimp_vector2_mul_val (direction, (float) t / tmax) with t == 0, i.e. 0.0f / 0 = NaN, and p.x/p.y = round(NaN) which is undefined. The result is garbage pixel coordinates (the subsequent bounds check at line 2291 mitigates a crash, but the segment computation is corrupted).","fix":"Guard against a zero-length direction: if (tmax == 0) { g_array_free (points, TRUE); return g_array_new (FALSE, TRUE, sizeof (Pixel)); } before entering the for loop, so the 0/0 division is never reached.","locations":[{"ref":"app/core/gimplineart.c:2282","code":" 2282 |   tmax = MAX (abs ((int) direction.x), abs ((int) direction.y));","lines":1},{"ref":"app/core/gimplineart.c:2284-2286","code":" 2284 |   for (int t = 0; t <= tmax; ++t)\n 2285 |     {\n 2286 |       GimpVector2 v = gimp_vector2_add_val (p0, gimp_vector2_mul_val (direction, (float)t / tmax));","lines":3},{"ref":"app/core/gimplineart.c:1254-1256","code":" 1254 |                   GArray *segment = gimp_lineart_line_segment_until_hit (closed, *point,\n 1255 |                                                                          pair2normal (*point, normals, width),\n 1256 |                                                                          segment_max_length);","lines":3}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"gimp_cage_config_point_inside() unconditionally indexes cage_points at (len - 1) to initialize 'last': 'g_array_index (gcc->cage_points, GimpCagePoint, gcc->cage_points->len - 1)'. If the cage has zero points, len-1 underflows to a huge guint index into the GArray, an out-of-bounds read (g_array_index does no bounds checking). There is no g_return_val_if_fail guarding len > 0 here, unlike most other accessors in this file.","fix":"Add 'g_return_val_if_fail (gcc->cage_points->len > 0, FALSE);' (or 'if (len == 0) return FALSE;') before computing last.","locations":[{"ref":"app/operations/gimpcageconfig.c:656","code":"  656 |   last = &((g_array_index (gcc->cage_points, GimpCagePoint, gcc->cage_points->len - 1)).src_point);","lines":1},{"ref":"app/operations/gimpcageconfig.c:645-654","code":"  645 | gboolean\n  646 | gimp_cage_config_point_inside (GimpCageConfig *gcc,\n  647 |                                gfloat          x,\n  648 |                                gfloat          y)\n  649 | {\n  650 |   GimpVector2   *last, *current;\n  651 |   gboolean       inside = FALSE;\n  652 |   gint           i;\n  653 | \n  654 |   g_return_val_if_fail (GIMP_IS_CAGE_CONFIG (gcc), FALSE);","lines":10}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"NULL-pointer dereference from the wire when a plug-in launched in QUERY or INIT mode sends a GP_PROC_RETURN message. gimp_plug_in_handle_proc_return unconditionally dereferences proc_frame->procedure->values and proc_frame->procedure->num_values. For query/init calls the plug-in is created via gimp_plug_in_new(... procedure=NULL ...) so main_proc_frame.procedure is NULL (set in gimp_plug_in_proc_frame_init, gimppluginprocframe.c:80). The query/init message loops (gimppluginmanager-call.c:98-111 and 140-153) dispatch any incoming message through gimp_plug_in_handle_message, so a crafted GP_PROC_RETURN during query() crashes the core.","fix":"Guard gimp_plug_in_handle_proc_return: if proc_frame->procedure == NULL (or call_mode is not RUN/temp), emit a 'should not happen' error and gimp_plug_in_close(plug_in, TRUE) instead of dereferencing procedure.","locations":[{"ref":"app/plug-in/gimpplugin-message.c:633-647","code":"  633 | static void\n  634 | gimp_plug_in_handle_proc_return (GimpPlugIn   *plug_in,\n  635 |                                  GPProcReturn *proc_return)\n  636 | {\n  637 |   GimpPlugInProcFrame *proc_frame = &plug_in->main_proc_frame;\n  638 | \n  639 |   g_return_if_fail (proc_return != NULL);\n  640 | \n  641 |   proc_frame->return_vals =\n  642 |     _gimp_gp_params_to_value_array (plug_in->manager->gimp,\n  643 |                                     proc_frame->procedure->values,\n  644 |                                     proc_frame->procedure->num_values,\n  645 |                                     proc_return->params,\n  646 |                                     proc_return->n_params,\n  647 |                                     TRUE);","lines":15},{"ref":"app/plug-in/gimppluginprocframe.c:80","code":"   80 |   proc_frame->procedure          = procedure ? g_object_ref (GIMP_PROCEDURE (procedure)) : NULL;","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"NULL-pointer dereference from the wire on GP_PROC_INSTALL with an out-of-range type. proc_install->type is a guint32 read from the plug-in (gimpprotocol.h:394). The switch in gimp_plug_in_handle_proc_install only assigns 'procedure' for the 3 known GIMP_PDB_PROC_TYPE_* values and has no default; for any other value 'procedure' stays NULL, then proc = GIMP_PLUG_IN_PROCEDURE(NULL) and proc->mtime = ... dereferences NULL. A malicious plug-in can send an invalid type to crash the core.","fix":"Add a default case to the type switch that reports an error and returns (without installing) when proc_install->type is none of the three valid values; or check 'if (! procedure) return;' after the switch.","locations":[{"ref":"app/plug-in/gimpplugin-message.c:785-801","code":"  785 |   switch (proc_install->type)\n  786 |     {\n  787 |     case GIMP_PDB_PROC_TYPE_PLUGIN:\n  788 |     case GIMP_PDB_PROC_TYPE_PERSISTENT:\n  789 |       procedure = gimp_plug_in_procedure_new (proc_install->type,\n  790 |                                               plug_in->file,\n  791 |                                               plug_in->root_folder);\n  792 |       break;\n  793 | \n  794 |     case GIMP_PDB_PROC_TYPE_TEMPORARY:\n  795 |       procedure = gimp_temporary_procedure_new (plug_in);\n  796 |       break;\n  797 |     }\n  798 | \n  799 |   proc = GIMP_PLUG_IN_PROCEDURE (procedure);\n  800 | \n  801 |   proc->mtime                 = time (NULL);","lines":17}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"Unchecked g_file_query_info() result dereferenced at startup. In gimp_plug_in_manager_search the returned GFileInfo *info is passed straight to g_file_info_get_attribute_uint64(info, ...) and g_object_unref(info) with no NULL check. g_file_query_info can return NULL (error argument is NULL/ignored), e.g. via a TOCTOU between the gimp_file_is_executable check at line 233 and the query, or any transient FS error, dereferencing NULL and crashing GIMP during plug-in discovery.","fix":"Check 'if (info)' before reading the mtime and unref'ing; fall back to mtime 0 (or skip the file) when info is NULL.","locations":[{"ref":"app/plug-in/gimppluginmanager-restore.c:238-243","code":"  238 |               info = g_file_query_info (file, G_FILE_ATTRIBUTE_TIME_MODIFIED,\n  239 |                                         G_FILE_QUERY_INFO_NONE, NULL, NULL);\n  240 |               mtime = g_file_info_get_attribute_uint64 (info,\n  241 |                                                         G_FILE_ATTRIBUTE_TIME_MODIFIED);\n  242 |               gimp_plug_in_manager_add_from_file (manager, file, root_folder, mtime);\n  243 |               g_object_unref (info);","lines":6}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"get_thumb_pixbuf() passes the result of get_thumb_surface() straight to gdk_pixbuf_get_from_surface() and cairo_image_surface_get_width/height() without a NULL check. get_thumb_surface() returns NULL when poppler_document_get_page() fails (e.g. a corrupt first page). The thumbnail thread (thumbnail_thread -> get_thumb_pixbuf) then dereferences a NULL surface and crashes the load dialog.","fix":"Return NULL early from get_thumb_pixbuf() if get_thumb_surface() returned NULL, and have callers handle a NULL pixbuf.","locations":[{"ref":"plug-ins/common/file-pdf-load.c:914-918","code":"  914 |   surface = get_thumb_surface (doc, page_num, preferred_size, white_background);\n  915 |   pixbuf  = gdk_pixbuf_get_from_surface (surface, 0, 0,\n  916 |                                          cairo_image_surface_get_width (surface),\n  917 |                                          cairo_image_surface_get_height (surface));\n  918 |   cairo_surface_destroy (surface);","lines":5},{"ref":"plug-ins/common/file-pdf-load.c:877-880","code":"  877 |   page = poppler_document_get_page (doc, page_num);\n  878 | \n  879 |   if (! page)\n  880 |     return NULL;","lines":4}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"In load_wmf_size(), if wmf_api      parent_obj = desc_obj;\n 2320 |                   desc_obj   = member_obj;\n 2321 |                   member_obj = NULL;\n 2322 |                 }\n 2323 | \n 2324 |               if (desc_obj == NULL)\n 2325 |                 g_critical (\"Increasing level: descriptor object is NULL!\");\n 2326 | \n 2327 |               json_object_set_string_member (desc_obj, \"type\", \"Objc\");\n 2328 | \n 2329 |               new_obj  = json_object_new ();\n 2330 |               new_node = json_node_new (JSON_NODE_OBJECT);\n 2331 |               json_node_init_object (new_node, new_obj);\n 2332 | \n 2333 |               if (! in_array)\n 2334 |                 json_object_set_object_member (desc_obj, \"descriptor\", new_obj);\n 2335 |               else\n 2336 |                 json_array_add_object_element (arr, new_obj);\n 2337 | \n 2338 |               data->lvl++;\n 2339 |               data->bufpos++;\n 2340 |               if (data->bufpos < len)\n 2341 |                 {\n 2342 |                   data->bufpos++;\n 2343 | \n 2344 |                   parse_text_loop (len, buf, &new_node, data, error);\n 2345 |                 }\n 2346 |               if (parent_obj)\n 2347 |                 desc_obj = parent_obj;\n 2348 |             }","lines":39},{"ref":"plug-ins/file-psd/psd-layer-res-load.c:2861-2916","code":" 2861 |   else if (memcmp (type, \"Objc\", 4) == 0)\n 2862 |     {\n 2863 |       /* Descriptor structure*/\n 2864 |       gint      res;\n 2865 |       JsonNode *desc_node = NULL;\n 2866 | \n 2867 |       IFDBG(3) g_debug (\"Objc Descriptor begin\");\n 2868 |       desc_node = add_descriptor_objc (key, type);\n 2869 |       res = load_descriptor (input, ibm_pc_format, &desc_node, error);\n 2870 |       *node = desc_node;\n 2871 |       IFDBG(3) g_debug (\"Objc Descriptor end\");\n 2872 |       if (res < 0)\n 2873 |         return res;\n 2874 |     }\n 2875 |   else if (memcmp (type, \"VlLs\", 4) == 0)\n 2876 |     {\n 2877 |       /* List */\n 2878 | up(\"\")) when g_locale_to_utf8 returns NULL so the function never returns NULL for a non-NULL input.","locations":[{"ref":"plug-ins/metadata/metadata-editor.c:1455-1466","code":" 1455 |   if (! g_utf8_validate (value_clean, -1, NULL))\n 1456 |     {\n 1457 |       value_utf8 = g_locale_to_utf8 (value_clean, -1, NULL, NULL, NULL);\n 1458 |     }\n 1459 |   else\n 1460 |     {\n 1461 |       value_utf8 = g_strdup (value_clean);\n 1462 |     }\n 1463 | \n 1464 |   g_free (value_clean);\n 1465 | \n 1466 |   return value_utf8;","lines":12}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Unchecked value passed to g_utf8_validate/g_strdup in metadata_dialog_format_tag_value (viewer). gexiv2_metadata_try_get_tag_interpreted_string may return NULL on error (the error branch only logs), after which g_utf8_validate(value, -1, NULL) is called with a possibly-NULL pointer, dereferencing NULL. Reachable from untrusted string-typed tags that exiv2 fails to interpret.","fix":"Treat NULL value as empty: 'if (! value) value = g_strdup (\"\");' before g_utf8_validate.","locations":[{"ref":"plug-ins/metadata/metadata-viewer.c:750-769","code":"  750 |       value = gexiv2_metadata_try_get_tag_interpreted_string (metadata, tag, &error);\n  751 |       if (error)\n  752 |         {\n  753 |           g_printerr (\"%s: unreadable '%s' metadata tag: %s\\n\",\n  754 |                       G_STRFUNC, tag, error->message);\n  755 |           g_clear_error (&error);\n  756 |         }\n  757 | \n  758 |       if (! g_utf8_validate (value, -1, NULL))\n  759 |         {\n  760 |           value_utf8 = g_locale_to_utf8 (value, -1, NULL, NULL, NULL);\n  761 |         }\n  762 |       else\n  763 |         {\n  764 |           value_utf8 = g_strdup (value);\n  765 |         }\n  766 | \n  767 |       g_free (value);\n  768 | \n  769 |       result = metadata_format_string_value (value_utf8, truncate);","lines":20}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"Unchecked gexiv2_metadata_try_get_tag_raw return value passed to g_bytes_get_data. In metadata_dialog_format_tag_value, for non-string (Byte/Undefined) tags, 'bytes' is fetched and on error/failure may be NULL; the error branch only logs and continues, then g_bytes_get_data(bytes, &size) is called and the result iterated, dereferencing NULL on malformed/unreadable raw tag values from untrusted metadata in the viewer.","fix":"After the error handling, 'if (! bytes) return g_strdup (\"\");' (or skip the hex dump) before calling g_bytes_get_data.","locations":[{"ref":"plug-ins/metadata/metadata-viewer.c:781-812","code":"  781 |       bytes = gexiv2_metadata_try_get_tag_raw (metadata, tag, &error);\n  782 |       if (error)\n  783 |         {\n  784 |           g_printerr (\"%s: unreadable '%s' metadata tag: %s\\n\",\n  785 |                       G_STRFUNC, tag, error->message);\n  786 |           g_clear_error (&error);\n  787 |         }\n  788 | \n  789 |       data  = g_bytes_get_data (bytes, &size);\n  790 | \n  791 |       if (! truncate)\n  792 |         display_size = size;\n  793 |       else\n  794 |         display_size = MIN (size, RAW_DATA_MAX_SIZE);\n  795 | \n  796 |       str = g_string_sized_new (3 * display_size);\n  797 | \n  798 |       for (i = 0; i < display_size; i++)\n  799 |         g_string_append_printf (str, i == 0 ? \"%02x\" : \" %02x\", data[i]);\n  800 | \n  801 |       if (display_size < size)\n  802 |         {\n  803 |           g_string_append (str, \" ... \");\n  804 |           g_string_append_printf (str,\n  805 |                                   _(\"(%llu more byte(s))\"),\n  806 |                                   (unsigned long long) (size - display_size));\n  807 |         }\n  808 | \n  809 |       result = g_string_free (str, FALSE);\n  810 | \n  811 |       g_bytes_unref (bytes);\n  812 |     }","lines":32}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"NULL dereference of str_tag_mode in xml_parser_end_element. When closing an <xmp-tag>, the code calls strcmp(str_tag_mode, \"list\") unconditionally. str_tag_mode is only set when a <tag-mode> element was parsed; a crafted import file that contains an <xmp-tag> with no <tag-mode> child leaves str_tag_mode NULL (or stale from a previous tag), so strcmp(NULL, ...) crashes.","fix":"Guard with 'if (str_tag_mode && strcmp(str_tag_mode, \"list\") != 0)' and reset str_tag_mode/str_tag_name/str_tag_value to NULL on each <xmp-tag>/<iptc-tag> open so stale values are not reused.","locations":[{"ref":"plug-ins/metadata/metadata-xml.c:871-897","code":"  871 |   else if (strcmp (element_name, \"xmp-tag\") == 0)\n  872 |     {\n  873 |       xmptag = FALSE;\n  874 |       if (strcmp (str_tag_mode, \"list\") != 0)\n  875 |         {\n  876 |           if (str_tag_name && str_tag_value)\n  877 |             {\n  878 |               /* make sure to only allow supported tags */\n  879 |               for (i = 0; i < n_default_metadata_tags; i++)\n  880 |                 {\n  881 |                   if (strcmp(default_metadata_tags[i].tag, str_tag_name) == 0)\n  882 |                     {\n  883 |                       set_tag_ui (args, i, str_tag_name, str_tag_value,\n  884 |                                   default_metadata_tags[i].mode);\n  885 | #ifdef _ENABLE_FORCE_WRITE_\n  886 |                       if (force_write == TRUE)\n  887 |                         gexiv2_metadata_set_tag_string (args->metadata,\n  888 |                                                         str_tag_name,\n  889 |                                                         str_tag_value);\n  890 | #endif\n  891 |                       break;\n  892 |                     }\n  893 |                 }\n  894 |             }\n  895 | \n  896 |         }\n  897 |       else if (strcmp (str_tag_mode, \"list\") == 0)","lines":27}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"gimp_gradient_segment_split_uniform() is a public API (declared in gimpgradient.h) and computes 'seg_len = (lseg->right - lseg->left) / parts' with no validation of 'parts'. Calling it with parts == 0 is a division by zero (FP: yields inf/NaN segment coordinates that corrupt the segment list). The only in-tree caller guards parts >= 2, but external/script callers are not protected, unlike gimp_gradient_segment_range_split_uniform() which does guard parts < 2.","fix":"Add 'g_return_if_fail (parts > 0);' (or >= 1) near the other g_return_if_fail checks at the top of gimp_gradient_segment_split_uniform().","locations":[{"ref":"app/core/gimpgradient.c:929-950","code":"  929 | void\n  930 | gimp_gradient_segment_split_uniform (GimpGradient                 *gradient,\n  931 |                                      GimpContext                  *context,\n  932 |                                      GimpGradientSegment          *lseg,\n  933 |                                      gint                          parts,\n  934 |                                      GimpGradientBlendColorSpace   blend_color_space,\n  935 |                                      GimpGradientSegment         **newl,\n  936 |                                      GimpGradientSegment         **newr)\n  937 | {\n  938 |   GimpGradientSegment *seg, *prev, *tmp;\n  939 |   gdouble              seg_len;\n  940 |   gint                 i;\n  941 | \n  942 |   g_return_if_fail (GIMP_IS_GRADIENT (gradient));\n  943 |   g_return_if_fail (GIMP_IS_CONTEXT (context));\n  944 |   g_return_if_fail (lseg != NULL);\n  945 |   g_return_if_fail (newl != NULL);\n  946 |   g_return_if_fail (newr != NULL);\n  947 | \n  948 |   gimp_data_freeze (GIMP_DATA (gradient));\n  949 | \n  950 |   seg_len = (lseg->right - lseg->left) / parts; /* Length of divisions */","lines":22}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"gimp_cage_config_compute_edges_normal() dereferences element 0 ('last = &g_array_index(..., 0)') with no check that the array is non-empty, then loops i=1..len. With 0 points this is an OOB read of element 0; with 1 point the loop body computes a normal using current = element (1 % 1 = 0) = element 0 vs last = element 0 (degenerate but in-bounds). gimp_cage_config_compute_scaling_factor guards len < 2 and returns early, but compute_edges_normal has no such guard, so the two functions are inconsistent. Both are called together after every insert/remove; an empty array would only occur transiently but is reachable via remove paths.","fix":"Add 'if (gcc->cage_points->len < 2) return;' at the top of gimp_cage_config_compute_edges_normal to match compute_scaling_factor.","locations":[{"ref":"app/operations/gimpcageconfig.c:609-631","code":"  609 | static void\n  610 | gimp_cage_config_compute_edges_normal (GimpCageConfig *gcc)\n  611 | {\n  612 |   GimpVector2    normal;\n  613 |   gint           i;\n  614 |   GimpCagePoint *current, *last;\n  615 | \n  616 |   g_return_if_fail (GIMP_IS_CAGE_CONFIG (gcc));\n  617 | \n  618 |   last = &g_array_index (gcc->cage_points, GimpCagePoint, 0);\n  619 | \n  620 |   for (i = 1; i <= gcc->cage_points->len; i++)\n  621 |     {\n  622 |       current = &g_array_index (gcc->cage_points, GimpCagePoint, i % gcc->cage_points->len);\n  623 | \n  624 |       gimp_vector2_sub (&normal,\n  625 |                         &(current->dest_point),\n  626 |                         &(last->dest_point));\n  627 | \n  628 |       last->edge_normal = gimp_vector2_normal (&normal);\n  629 |       last = current;\n  630 |     }\n  631 | }","lines":23},{"ref":"app/operations/gimpcageconfig.c:618","code":"  618 |   last = &g_array_index (gcc->cage_points, GimpCagePoint, 0);","lines":1}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"gimp_pdb_enum_value_get_nick() dereferences the result of g_enum_get_value() without a NULL check (`nick = enum_value->value_nick;`). g_enum_get_value() returns NULL when the requested integer is not a registered value of the enum. All current callers pass either an internal constant or the object's own (always-valid) enum value, so it is not presently exploitable, but the helper is a NULL-deref crash waiting for a future caller that forwards an unchecked value.","fix":"Guard the lookup: `if (! enum_value) { g_type_class_unref (enum_class); return NULL; }` before reading value_nick, or return a sentinel like \"(invalid)\".","locations":[{"ref":"app/pdb/gimppdb-utils.c:602-617","code":"  602 | static const gchar *\n  603 | gimp_pdb_enum_value_get_nick (GType enum_type,\n  604 |                               gint  value)\n  605 | {\n  606 |   GEnumClass  *enum_class;\n  607 |   GEnumValue  *enum_value;\n  608 |   const gchar *nick;\n  609 | \n  610 |   enum_class = g_type_class_ref (enum_type);\n  611 |   enum_value = g_enum_get_value (enum_class, value);\n  612 | \n  613 |   nick = enum_value->value_nick;\n  614 | \n  615 |   g_type_class_unref (enum_class);\n  616 | \n  617 |   return nick;","lines":16}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"g3.c tree-construction helpers call exit() on allocation failure or internal table errors (build_tree/tree_add_node: exit(10), exit(11), exit(6)). These run at the start of every faxg3 load. The tables are static/trusted so this is not directly attacker-triggered, but calling exit() from a library/plug-in load path is poor error handling that abruptly terminates the plug-in process instead of returning a GError.","fix":"Propagate failure via return codes / GError up to load_image instead of exit(); have build_tree return gboolean and abort the load gracefully.","locations":[{"ref":"plug-ins/file-faxg3/g3.c:238","code":"  238 | \t    if ( p2 == NULL ) { perror( \"malloc 3\" ); exit(11); }","lines":1},{"ref":"plug-ins/file-faxg3/g3.c:244","code":"  244 | \t    g_printerr (\"internal table setup error\\n\" ); exit(6);","lines":1},{"ref":"plug-ins/file-faxg3/g3.c:255","code":"  255 | \tif ( *p == NULL ) { perror( \"malloc(1)\" ); exit(10); }","lines":1}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"critical","easy":false,"description":"load_mpo_image walks the file with `data++` / `data += 4` etc. inside `for (i = 0; i < file_size; i++)`, mutating the heap base pointer returned by g_try_malloc0. The loop bound is the counter `i`, but `data` is advanced independently (and faster than i in the no-match `else: data++` branch), so the pointer runs past the allocated buffer. All subsequent dereferences (data[0..3]) read out of bounds, fwrite(data, 1, file_size - i, fp) reads OOB, and every `g_free (data)` frees a pointer that no longer points to the start of the allocation -> heap corruption / invalid free. The matching/parsing logic also always re-tests data[0..3] from the moved pointer rather than offset i, so it is logically incoherent.","fix":"Keep the allocation base in a separate immutable pointer and index it as data[i], data[i+1]... with explicit `i + 3 < file_size` bounds checks; never advance the pointer passed to g_free. Rewrite the SOI/APP1 scan to use a cursor index bounded by file_size and free the original base exactly once on all paths.","locations":[{"ref":"plug-ins/file-jpeg/jpeg-load.c:820-901","code":"  820 |   for (gint i = 0; i < file_size; i++)\n  821 |     {\n  822 |       if (data[0] == 0xFF &&\n  823 |           data[1] == 0xD8)\n  824 |         {\n  825 |           if (data[2] == 0xFF)\n  826 |             {\n  827 |               if (data[3] == 0xE1)\n  828 |                 {\n  829 |                   /* Skip first image since we've already read it in */\n  830 |                   if (read_first_image)\n  831 |                     {\n  832 |                       GFile     *temp_file = NULL;\n  833 |                       GimpImage *temp_image = NULL;\n  834 |                       gboolean   dummy1;\n  835 |                       gboolean   dummy2;\n  836 | \n  837 |                       temp_file = gimp_temp_file (\"tmp\");\n  838 |                       fp        = g_fopen (g_file_peek_path (temp_file), \"wb\");\n  839 | \n  840 |                       if (! fp)\n  841 |                         {\n  842 |                           g_free (data);\n  843 |                           g_file_delete (temp_file, NULL, NULL);\n  844 |                           g_object_unref (temp_file);\n  845 |                           return FALSE;\n  846 |                         }\n  847 | \n  848 |                       fwrite (data, 1, file_size - i, fp);\n  849 |                       fclose (fp);\n  850 | \n  851 |                       temp_image = load_image (temp_file,\n  852 |                                                GIMP_RUN_NONINTERACTIVE, FALSE,\n  853 |                                                &dummy1, &dummy2, error);\n  854 |                       g_file_delete (temp_file, NULL, NULL);\n  855 |                       g_object_unref (temp_file);\n  856 | \n  857 |                       if (! temp_image)\n  858 |                         {\n  859 |                           g_free (data);\n  860 |                           return FALSE;\n  861 |                         }\n  862 |                       else\n  863 |                         {\n  864 |                           GimpLayer **layers;\n  865 |                           GimpLayer  *new_layer;\n  866 | \n  867 |                           layers    = gimp_image_get_layers (temp_image);\n  868 |                           new_layer =\n  869 |                             gimp_layer_new_from_drawable (GIMP_DRAWABLE (layers[0]),\n  870 |                                                           first_image);\n  871 |                           gimp_image_insert_layer (first_image, new_layer,\n  872 |                                                    NULL, 0);\n  873 | \n  874 |                           g_free (layers);\n  875 |                           gimp_image_delete (temp_image);\n  876 |                         }\n  877 |                     }\n  878 |                   read_first_image = TRUE;\n  879 | \n  880 |                   data += 4;\n  881 |                   i    += 3;\n  882 |                 }\n  883 |               else\n  884 |                 {\n  885 |                   data += 2;\n  886 |                   i    += 1;\n  887 |                 }\n  888 |             }\n  889 |           else\n  890 |             {\n  891 |               data += 3;\n  892 |               i    += 2;\n  893 |             }\n  894 |         }\n  895 |       else\n  896 |         {\n  897 |           data++;\n  898 |         }\n  899 |     }\n  900 | \n  901 |   return TRUE;","lines":82}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":true,"description":"gimp_drawable_get_sub_thumbnail() double-unrefs the GBytes. Line 257 calls g_bytes_unref_to_data(data, &data_size), which consumes the GBytes (returns the owned data buffer and drops a reference, freeing the GBytes when the refcount hits 0). Line 260 then unconditionally calls g_bytes_unref(data) on the same, now-freed/dangling GBytes pointer. This is an unbalanced second unref / use-after-free on the sub-thumbnail path. The sibling gimp_drawable_get_thumbnail() (line 152) correctly does NOT perform the extra unref.","fix":"Remove the stray 'g_bytes_unref (data);' at line 260 so the GBytes is consumed exactly once by g_bytes_unref_to_data(), matching gimp_drawable_get_thumbnail().","locations":[{"ref":"libgimp/gimpdrawable.c:256-260","code":"  256 |   if (data)\n  257 |     pixbuf = _gimp_pixbuf_from_data (g_bytes_unref_to_data (data, &data_size),\n  258 |                                      thumb_width, thumb_height, thumb_bpp,\n  259 |                                      alpha);\n  260 | |     {\n  626 |       gint old_position = g_list_index (palette->colors, entry);\n  627 | \n  628 |       gimp_palette_entry_free (entry);\n  629 | \n  630 |       palette->colors = g_list_remove (palette->colors, entry);\n  631 | \n  632 |       palette->n_colors--;","lines":9}]},{"id":"UAF_5","type":"use_after_free","type_label":"Use After Free","severity":"low","easy":false,"description":"Stale freed pointer in plug_in_def_deserialize PROC_DEF loop. 'proc' is unref'd unconditionally after each proc-def but never reset to NULL. plug_in_procedure_deserialize has early returns (421/426/432/441) that occur before it assigns *proc. On a second proc-def that hits one of those early returns, the 'if (proc) g_object_unref(proc)' then unrefs the already-freed previous procedure (double-unref / use-after-free) when parsing a malformed pluginrc.","fix":"Set 'proc = NULL;' immediately before calling plug_in_procedure_deserialize (or have that function assign *proc = NULL at its top before any early return).","locations":[{"ref":"app/plug-in/plug-in-rc.c:354-364","code":"  354 |             case PROC_DEF:\n  355 |               token = plug_in_procedure_deserialize (scanner, gimp,\n  356 |                                                      plug_in_def,\n  357 |                                                      &proc);\n  358 | \n  359 |               if (token == G_TOKEN_LEFT_PAREN)\n  360 |                 gimp_plug_in_def_add_procedure (plug_in_def, proc);\n  361 | \n  362 |               if (proc)\n  363 |                 g_object_unref (proc);\n  364 |               break;","lines":11}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In gimp_drawable_filter_duplicate(), 'g_object_get (prior_filter, \"name\", &undo_desc, \"icon-name\", &icon_name, NULL)' returns newly-allocated (transfer-full) strings; g_object_get always dups string property values. Although declared 'const gchar *', they are owned by the caller. The function frees only 'operation' (line 549) and 'pspecs' (line 522), never undo_desc or icon_name, so both leak on every filter duplication. They are copied by value into gimp_drawable_filter_new() (via the name/icon-name properties), so freeing after the _new call is safe.","fix":"Declare undo_desc and icon_name as 'gchar *' and add 'g_free (undo_desc); g_free (icon_name);' after the gimp_drawable_filter_new() call (or at end of function).","locations":[{"ref":"app/core/gimpdrawablefilter.c:478-479","code":"  478 |   const gchar        *undo_desc;\n  479 |   const gchar        *icon_name;","lines":2},{"ref":"app/core/gimpdrawablefilter.c:494-497","code":"  494 |   g_object_get (prior_filter,\n  495 |                 \"name\",      &undo_desc,\n  496 |                 \"icon-name\", &icon_name,\n  497 |                 NULL);","lines":4},{"ref":"app/core/gimpdrawablefilter.c:549-551","code":"  549 |   g_free (operation);\n  550 | \n  551 |   return filter;","lines":3}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In gimp_drawable_filter_update(), inside the per-pspec loop, old_value (a GValue) is populated via g_object_get_property/gegl_node_get_property at lines 965-968. When the property is one being updated (j < n_values) the block ends with 'continue;' at line 1045, which skips the 'g_value_unset (&old_value);' at line 1063. Thus for every property actually being set (the common hot path) the old_value GValue and any boxed/object/string contents it holds are leaked. The 'break' at line 1030 (wrong value type) leaks it the same way. (The 'break' at line 962 is before old_value is initialized, so that one is fine.)","fix":"Add 'g_value_unset (&old_value);' before the 'continue;' at line 1045 and before the 'break;' at line 1030, or restructure with a cleanup label (goto next) so the unset at 1063 always runs.","locations":[{"ref":"app/core/gimpdrawablefilter.c:965-968","code":"  965 |       if (settings)\n  966 |         g_object_get_property (G_OBJECT (settings), pspec->name, &old_value);\n  967 |       else\n  968 |         gegl_node_get_property (node, pspec->name, &old_value);","lines":4},{"ref":"app/core/gimpdrawablefilter.c:1030","code":" 1030 |               break;","lines":1},{"ref":"app/core/gimpdrawablefilter.c:1045","code":" 1045 |           continue;","lines":1},{"ref":"app/core/gimpdrawablefilter.c:1063","code":" 1063 |       g_value_unset (&old_value);","lines":1}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In gimp_palette_load_acb, after the palette object is created at line 766, several subsequent error-return paths free palette_prefix/palette_suffix but never unref the already-created GimpPalette 'palette' (and in some of these paths also leak palette_prefix or palette_suffix that were not yet allocated, but the GimpPalette leak is the consistent one). On malformed ACB files (truncated number_of_colors, page info, or color space) the function returns NULL while leaking the GimpPalette.","fix":"Add g_object_unref (palette) to each of these error-return blocks (or use a single 'error:' cleanup label that unrefs palette and frees the prefix/suffix arrays).","locations":[{"ref":"app/core/gimppalette-load.c:809-819","code":"  809 |   if (! g_input_stream_read_all (input, &number_of_colors,\n  810 |                                  sizeof (number_of_colors), &bytes_read, NULL,\n  811 |                                  error))\n  812 |     {\n  813 |       g_strfreev (palette_prefix);\n  814 |       g_strfreev (palette_suffix);\n  815 | \n  816 |       g_set_error (error, GIMP_DATA_ERROR, GIMP_DATA_ERROR_READ,\n  817 |                    _(\"Invalid number of colors in palette.\"));\n  818 |       return NULL;\n  819 |     }","lines":11},{"ref":"app/core/gimppalette-load.c:830-849","code":"  830 |   if (! g_input_stream_read_all (input, &page, sizeof (page),\n  831 | he error path (the 'out:' label). The success path returns TRUE at the end of the function without freeing 'safe_value', leaking the string on every successfully parsed transform= attribute. Since transform= attributes come from untrusted SVG and an SVG can contain arbitrarily many <g>/<path>/<rect>/... elements each with a transform, an attacker-supplied document leaks an unbounded amount of memory.","fix":"Free 'safe_value' before 'return TRUE;' (e.g. add g_free (safe_value); right before the success return), or restructure with a single cleanup path so both success and failure free it.","locations":[{"ref":"app/path/gimppath-import.c:1300-1302","code":" 1300 |   gchar *safe_value;\n 1301 | \n 1302 |   safe_value = g_strstrip (g_strdup (value));","lines":3},{"ref":"app/path/gimppath-import.c:1447-1453","code":" 1447 |   gimp_matrix3_invert (matrix);\n 1448 | \n 1449 |   return TRUE;\n 1450 | \n 1451 | out:\n 1452 |   g_free (safe_value);\n 1453 |   return FALSE;","lines":7}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"In _gp_param_def_read, GP_PARAM_DEF_TYPE_CHOICE allocates `nick`, `label`, `help` and `redirect` via _gimp_wire_read_string on every loop iteration, then passes them to gimp_choice_add()/gimp_choice_add_deprecated() which g_strdup their arguments. The locally-read strings are never freed, leaking on every choice value parsed. (Also `nick` from the default_val read just above is g_strdup'd into default_val and then leaked.)","fix":"g_free nick, label, help and redirect at the end of each iteration (and the initial default_val nick) after they are consumed by gimp_choice_add.","locations":[{"ref":"libgimpbase/gimpprotocol.c:1149-1196","code":" 1149 |     case GP_PARAM_DEF_TYPE_CHOICE:\n 1150 |         {\n 1151 |           GimpChoice *choice;\n 1152 |           guint32     size;\n 1153 |           gchar      *nick;\n 1154 | \n 1155 |           if (! _gimp_wire_read_string (channel, &nick, (int) 1, user_data))\n 1156 |             return FALSE;\n 1157 | \n 1158 |           param_def->meta.m_choice.default_val = g_strdup (nick);\n 1159 | \n 1160 |           if (! _gimp_wire_read_int32 (channel, &size, 1, user_data))\n 1161 |             return FALSE;\n 1162 | \n 1163 |           choice = gimp_choice_new ();\n 1164 | \n 1165 |           for (gint i = 0; i < size; i++)\n 1166 |             {\n 1167 |               gchar    *label;\n 1168 |               gchar    *help;\n 1169 |               gchar    *redirect;\n 1170 |               gint      id;\n 1171 |               gboolean  is_deprecated;\n 1172 | \n 1173 |               if (! _gimp_wire_read_string (channel, &nick,\n 1174 |                                            (int) 1, user_data)  ||\n 1175 |                   ! _gimp_wire_read_int32 (channel, (guint32 *) &id,\n 1176 |                                            1, user_data)        ||\n 1177 |                   ! _gimp_wire_read_string (channel, &label,\n 1178 |                                             (int) 1, user_data) ||\n 1179 |                   ! _gimp_wire_read_string (channel, &help,\n 1180 |                                             (int) 1, user_data) ||\n 1181 |                   ! _gimp_wire_read_int32 (channel, (guint32 *) &is_deprecated,\n 1182 |                                            1, user_data)        ||\n 1183 |                   ! _gimp_wire_read_string (channel, &redirect,\n 1184 |                                             (int) 1, user_data))\n 1185 |                 {\n 1186 |                   g_object_unref (choice);\n 1187 |                   return FALSE;\n 1188 |                 }\n 1189 | \n 1190 |               if (! is_deprecated)\n 1191 |                 gimp_choice_add (choice, nick, id, label, help);\n 1192 |               else\n 1193 |                 gimp_choice_add_deprecated (choice, nick, id, redirect);\n 1194 |             }\n 1195 |           param_def->meta.m_choice.choice = choice;\n 1196 |         }","lines":48}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"file-cel.c load_image(): the per-row read error paths inside the bpp switch (cases 4, 8, 32 and default) call fclose(fp) and return NULL but never free 'buf', 'line', or unref 'buffer' and the partially-created image. On truncated/corrupt CEL data this leaks the row buffers, the GEGL buffer, and the image on every failed row read.","fix":"Add a common cleanup path (goto fail) that frees buf and line, unrefs buffer, and deletes the image before returning NULL.","locations":[{"ref":"plug-ins/common/file-cel.c:502-508","code":"  502 |           if (n_read < 1)\n  503 |             {\n  504 |               g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  505 |                            _(\"EOF or error while reading image data\"));\n  506 |               fclose (fp);\n  507 |               return NULL;\n  508 |             }","lines":7},{"ref":"plug-ins/common/file-cel.c:539-545","code":"  539 |           if (n_read < 1)\n  540 |             {\n  541 |               g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  542 |                            _(\"EOF or error while reading image data\"));\n  543 |               fclose (fp);\n  544 |               return NULL;\n  545 |             }","lines":7},{"ref":"plug-ins/common/file-cel.c:565-571","code":"  565 |           if (n_read < 1)\n  566 |             {\n  567 |               g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  568 |                            _(\"EOF or error while reading image data\"));\n  569 |               fclose (fp);\n  570 |               return NULL;\n  571 |             }","lines":7},{"ref":"plug-ins/common/file-cel.c:585-589","code":"  585 |           g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  586 |                        _(\"Unsupported bit depth (%d)!\"), bpp);\n  587 |           fclose (fp);\n  588 |           return NULL;\n  589 |         }","lines":5}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"file-iff.c load_image(): several early 'return NULL'/'return image' paths inside the per-image loop leak resources. E.g. when bitMapHeader/body is missing (line 331-337) it returns NULL without ILBM_freeImages(iff_image) or unref of any created buffer; the invalid-colormap-size paths (lines 362-367, 382-386) likewise return NULL without freeing iff_image. The list returned by ILBM_extractImages is leaked on all these error exits.","fix":"Route all error exits through a cleanup that calls ILBM_freeImages(iff_image, imagesLength) and unrefs/deletes any partially created GEGL buffer and image.","locations":[{"ref":"plug-ins/common/file-iff.c:331-337","code":"  331 |       if (! bitMapHeader || ! true_image->body)\n  332 |         {\n  333 |           g_set_error (error, G_FILE_ERROR, g_file_error_from_errno (errno),\n  334 |                        _(\"ILBM contains no image data - likely a palette \"\n  335 |                          \"file\"));\n  336 |           return NULL;\n  337 |         }","lines":7},{"ref":"plug-ins/common/file-iff.c:362-367","code":"  362 |           if (palette_size < 0 || palette_size > 256)\n  363 |             {\n  364 |               g_set_error (error, G_FILE_ERROR, g_file_error_from_errno (errno),\n  365 |                            _(\"Invalid ILBM colormap size\"));\n  366 |               return NULL;\n  367 |             }","lines":6},{"ref":"plug-ins/common/file-iff.c:380-390","code":"  380 |               if (palette_size < 32)\n  381 |                 {\n  382 |                   g_set_error (error, G_FILE_ERROR,\n  383 |                                g_file_error_from_errno (errno),\n  384 |                                _(\"Invalid ILBM colormap size\"));\n  385 |                   return NULL;\n  386 |                 }\n  387 |               else if (palette_size > 32)\n  388 |                 {\n  389 |                   palette_size = 32;\n  390 |                 }","lines":11}]},{"id":"MEM_8","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"JPEG XL load: several error-return paths in the CMYK extra-channel handling leak\nalready-allocated heap buffers. picture_buffer (g_try_malloc at line 785) is not\nfreed when JxlDecoderExtraChannelBufferSize fails (816-829), when key_buffer\nallocation fails (833-844), or when JxlDecoderSetExtraChannelBuffer fails\n(846-859). In the SetExtraChannelBuffer failure path, key_buffer (line 831) is\nalso leaked. In the JXL_DEC_FULL_IMAGE failure path (862-876) picture_buffer is\nfreed but key_buffer is leaked. A malformed CMYK JXL that fails at these decoder\ncalls leaks the full decoded-image-sized buffer each time.","fix":"Add g_free (picture_buffer) to the three error paths in the is_cmyk block, and\ng_free (key_buffer) to the SetExtraChannelBuffer-failure and JXL_DEC_FULL_IMAGE\nfailure paths (guarding for NULL). Consider a single `goto cleanup` epilogue that\nfrees memory, picture_buffer, key_buffer, profile, runner and decoder.","locations":[{"ref":"plug-ins/common/file-jpegxl.c:816-829","code":"  816 |       if (JxlDecoderExtraChannelBufferSize (decoder, &pixel_format,\n  817 |                                             &result_size, cmyk_channel_id)\n  818 |           != JXL_DEC_SUCCESS)\n  819 |         {\n  820 |           g_set_error (error, G_FILE_ERROR, 0,\n  821 |                        \"ERROR: JxlDecoderExtraChannelBufferSize failed\");\n  822 |           if (profile)\n  823 |             g_object_unref (profile);\n  824 | \n  825 |           JxlThreadParallelRunnerDestroy (runner);\n  826 |           JxlDecoderDestroy (decoder);\n  827 |           g_free (memory);\n  828 |           return NULL;\n  829 |         }","lines":14},{"ref":"plug-ins/common/file-jpegxl.c:833-844","code":"  833 |       if (! key_buffer)\n  834 |         {\n  835 |           g_set_error (error, G_FILE_ERROR, 0, \"Memory could not be allocated.\");\n  836 | \n  837 |           if (profile)\n  838 |             g_object_unref (profile);\n  839 | \n  840 |           JxlThreadParallelRunnerDestroy (runner);\n  841 |           JxlDecoderDestroy (decoder);\n  842 |           g_free (memory);\n  843 |           return NULL;\n  844 |         }","lines":12},{"ref":"plug-ins/common/file-jpegxl.c:846-859","code":"  846 |       if (JxlDecoderSetExtraChannelBuffer (decoder, &pixel_format, key_buffer,\n  847 |                                            result_size, cmyk_channel_id)\n  848 |           != JXL_DEC_SUCCESS)\n  849 |         {\n  850 |           g_set_error (error, G_FILE_ERROR, 0,\n  851 |                        \"ERROR: JxlDecoderSetExtraChannelBuffer failed\");\n  852 |           if (profile)\n  853 |             g_object_unref (profile);\n  854 | \n  855 |           JxlThreadParallelRunnerDestroy (runner);\n  856 |           JxlDecoderDestroy (decoder);\n  857 |           g_free (memory);\n  858 |           return NULL;\n  859 |         }","lines":14},{"ref":"plug-ins/common/file-jpegxl.c:862-876","code":"  862 |   status = JxlDecoderProcessInput (decoder);\n  863 |   if (status != JXL_DEC_FULL_IMAGE)\n  864 |     {\n  865 |       g_set_error (error, G_FILE_ERROR, 0,\n  866 |                    \"Unexpected event %d instead of JXL_DEC_FULL_IMAGE\", status);\n  867 |       g_free (picture_buffer);\n  868 |       if (profile)\n  869 |         {\n  870 |           g_object_unref (profile);\n  871 |         }\n  872 |       JxlThreadParallelRunnerDestroy (runner);\n  873 |       JxlDecoderDestroy (decoder);\n  874 |       g_free (memory);\n  875 |       return NULL;\n  876 |     }","lines":15}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"WebP load_image leaks the file contents buffer `indata` (allocated by g_file_get_contents) on the WebPMuxCreate-failure return (line 117) and the WebPDecodeRGBA-failure return (lines 155-157). On the decode-failure return the freshly created `image` (line 132) and, if present, `profile` are also leaked. The animation error: label likewise returns without g_free (indata) or unref of image/profile.","fix":"Route all error returns through a single cleanup label that g_free(indata), WebPMuxDelete(mux), deletes image if created, and unrefs profile. Add indata/image cleanup to the WebPMuxCreate failure and decode-failure paths and to the `error:` label.","locations":[{"ref":"plug-ins/file-webp/file-webp-load.c:114-118","code":"  114 |   mux = WebPMuxCreate (&wp_data, 1);\n  115 |   if (! mux)\n  116 |     {\n  117 |       return NULL;\n  118 |     }","lines":5},{"ref":"plug-ins/file-webp/file-webp-load.c:152-157","code":"  152 |       /* Check to ensure the image data was loaded correctly */\n  153 |       if (! outdata)\n  154 |         {\n  155 |           WebPMuxDelete (mux);\n  156 |           return NULL;\n  157 |         }","lines":6},{"ref":"plug-ins/file-webp/file-webp-load.c:176-188","code":"  176 |         error:\n  177 |           if (dec)\n  178 |             WebPAnimDecoderDelete (dec);\n  179 | \n  180 |           if (demux)\n  181 |             {\n  182 |               WebPDemuxReleaseIterator (&iter);\n  183 |               WebPDemuxDelete (demux);\n  184 |             }\n  185 | \n  186 |           WebPMuxDelete (mux);\n  187 |           return NULL;\n  188 |         }","lines":13}]},{"id":"MEM_10","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In file_gex_validate, when the archive contains more than one entry whose path equals appdata_path, the inner block allocates a fresh appstring, reads it to bytes and assigns it to appdata, then 'continue's. On the second matching entry appdata is overwritten with a new GBytes while the previously stored GBytes is never unref'd, leaking it. A malicious archive can include duplicate <id>/<id>.metainfo.xml entries to leak memory each load attempt.","fix":"Skip re-reading once appdata is already set (e.g. guard the block with 'if (appdata == NULL)'), or g_bytes_unref the previous appdata before reassigning.","locations":[{"ref":"app/file-data/file-data-gex.c:252-283","code":"  252 |                   if (appdata_path)\n  253 |                     {\n  254 |                       if (g_strcmp0 (appdata_path, archive_entry_pathname (entry)) == 0)\n  255 |                         {\n  256 |                           const void      *buffer;\n  257 |                           GString         *appstring = g_string_new (\"\");\n  258 |                           la_int64_t       offset;\n  259 |                           size_t           size;\n  260 | \n  261 |                           while (TRUE)\n  262 |                             {\n  263 |                               r = archive_read_data_block (a, &buffer, &size, &offset);\n  264 | \n  265 |                               if (r == ARCHIVE_FATAL)\n  266 |                                 {\n  267 |                                   *error = g_error_new (GIMP_EXTENSION_ERROR, GIMP_EXTENSION_FAILED,\n  268 |                                                         _(\"Fatal error when uncompressing GIMP extension '%s': %s\"),\n  269 |                                                         gimp_file_get_utf8_name (file),\n  270 |                                                         archive_error_string (a));\n  271 |                                   g_string_free (appstring, TRUE);\n  272 |                                   break;\n  273 |                                 }\n  274 |                               else if (r == ARCHIVE_EOF)\n  275 |                                 {\n  276 |                                   appdata = g_string_free_to_bytes (appstring);\n  277 |                                   break;\n  278 |                                 }\n  279 | \n  280 |                               appstring = g_string_append_len (appstring, (const gchar *) buffer, size);\n  281 |                             }\n  282 |                           continue;\n  283 |                         }","lines":32}]},{"id":"MEM_11","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"In file_gex_load_invoker, file_gex_validate allocates *metadata on success, but it is only unref'd inside the 'if (success)' branch. If file_gex_validate returns TRUE (allocating metadata) the unref at line 549 happens unconditionally inside that branch, so the normal path is fine; however if file_gex_validate sets metadata and then any later early-out were added, metadata would leak. More concretely: there is no g_clear_object on metadata in the failure/return path of the outer function, so the lifetime relies on validate's success implying the if-branch is taken. Fragile ownership; metadata is not freed if success is later set FALSE before line 549.","fix":"Unref metadata in a single place that always runs when validate succeeded (e.g. after the decompress attempt regardless of its result), rather than only inside the success branch, and null it out to make double-free impossible.","locations":[{"ref":"app/file-data/file-data-gex.c:544-550","code":"  544 |   success = file_gex_validate (file, &metadata, &component, error);\n  545 |   if (success)\n  546 |     {\n  547 |       ext_dir = file_gex_decompress (file, (gchar *) as_component_get_id (component),\n  548 |                                      error);\n  549 |       g_object_unref (metadata);\n  550 |     }","lines":7}]},{"id":"MEM_12","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"In gimp_curves_config_load_cruft(), the early-return when the header line cannot be read ('if (! line) return FALSE;') leaks the GDataInputStream created at line 553. Every other failure path in this function unrefs data_input; only this one does not.","fix":"Add 'g_object_unref (data_input);' before 'return FALSE;' at line 559.","locations":[{"ref":"app/operations/gimpcurvesconfig.c:556-559","code":"  556 |   line = gimp_data_input_stream_read_line_always (data_input, &line_len,\n  557 |                                                   NULL, error);\n  558 |   if (! line)\n  559 |     return FALSE;","lines":4},{"ref":"app/operations/gimpcurvesconfig.c:553","code":"  553 |   data_input = g_data_input_stream_new (input);","lines":1}]},{"id":"MEM_13","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"In gimp_levels_config_load_cruft(), the early-return path when the first line cannot be read frees nothing: 'data_input' (created by g_data_input_stream_new at line 873) is leaked. The later error path correctly unrefs data_input, but this one returns FALSE directly. A malformed/empty levels file truncated at the first line leaks one GDataInputStream per load attempt.","fix":"Before 'return FALSE;' at line 879, add 'g_object_unref (data_input);' (the stream is referenced by the wrapper but the wrapper itself must be released).","locations":[{"ref":"app/operations/gimplevelsconfig.c:876-879","code":"  876 |   line = gimp_data_input_stream_read_line_always (data_input, &line_len,\n  877 |                                                   NULL, error);\n  878 |   if (! line)\n  879 |     return FALSE;","lines":4},{"ref":"app/operations/gimplevelsconfig.c:873","code":"  873 |   data_input = g_data_input_stream_new (input);","lines":1}]},{"id":"MEM_14","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"gimp_pdb_get_resources() obtains a freshly allocated GList from gimp_container_get_children_by_name() (it returns a new list the caller must g_list_free). On the GIMP_PDB_DATA_ACCESS_WRITE / GIMP_PDB_DATA_ACCESS_RENAME error paths the function returns NULL directly without freeing the `resources` list, leaking the GList nodes. Currently only reachable in practice via fonts.pdb which uses READ access, so it is a latent leak rather than an active one, but the WRITE/RENAME branches are dead-wrong as written.","fix":"Before each `return NULL;` inside the access-check loop (lines 127 and 138), call `g_list_free (resources);` (the list nodes are owned by the caller; the GimpData elements are not). Alternatively goto a cleanup label that frees the list.","locations":[{"ref":"app/pdb/gimppdb-utils.c:93","code":"   93 |   resources = gimp_container_get_children_by_name (container, name);","lines":1},{"ref":"app/pdb/gimppdb-utils.c:127","code":"  127 |               return NULL;","lines":1},{"ref":"app/pdb/gimppdb-utils.c:138","code":"  138 |               return NULL;","lines":1}]},{"id":"MEM_15","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"Leaks on error paths in the GP_PARAM_DEF_TYPE_CHOICE parse loop of plug_in_proc_arg_deserialize. Several 'goto error' exits do not free per-iteration string locals already parsed: if parsing 'id' fails, nick is leaked (922-926); if parsing is_deprecated fails, nick/label/help are leaked (936-940); if parsing redirect fails, nick/label/help are leaked (941-945). These locals are not stored in param_def, so the shared error: cleanup does not reach them. (The 927-935 branch already frees them, showing the intent.)","fix":"Free nick, label, help (and redirect) before each goto error in those branches, mirroring the 927-935 block, or add a per-iteration cleanup label.","locations":[{"ref":"app/plug-in/plug-in-rc.c:922-926","code":"  922 |               if (! gimp_scanner_parse_int (scanner, &id))\n  923 |                 {\n  924 |                   token = G_TOKEN_INT;\n  925 |                   goto error;\n  926 |                 }","lines":5},{"ref":"app/plug-in/plug-in-rc.c:936-945","code":"  936 |               if (! gimp_scanner_parse_int (scanner, &is_deprecated))\n  937 |                 {\n  938 |                   token = G_TOKEN_INT;\n  939 | d by gimp_data_factory_get_data; if it is a ref, unref fill_pattern/stroke_pattern in xcf_load_free_vector_data. If borrowed, document it.","locations":[{"ref":"app/xcf/xcf-load.c:5827-5835","code":" 5827 | static void\n 5828 | xcf_load_free_vector_data (VectorLayerData *data)\n 5829 | {\n 5830 |   g_clear_object (&data->fill_color);\n 5831 |   g_clear_object (&data->stroke_color);\n 5832 |   g_clear_pointer (&data->stroke_dashes, g_free);\n 5833 | \n 5834 |   g_free (data);\n 5835 | }","lines":9},{"ref":"app/xcf/xcf-load.c:2529-2549","code":" 2529 |             data->fill_pattern = GIMP_PATTERN (xcf_load_data (info, GIMP_TYPE_PATTERN, &error));\n 2530 |             /* Just ignore errors here? */\n 2531 |             g_clear_error (&error);\n 2532 | \n 2533 |             xcf_read_int32 (info, (guint32 *) &uint_val, 1);\n 2534 |             data->stroke_style = (GimpCustomStyle) uint_val;\n 2535 |             xcf_read_int32 (info, (guint32 *) &uint_val, 1);\n 2536 |             data->stroke_antialias = (gboolean) uint_val;\n 2537 | \n 2538 |             data->stroke_color = xcf_load_color (info, next_prop, &valid_color, &error);\n 2539 |             if (error)\n 2540 |               {\n 2541 |                 gimp_message (info->gimp, G_OBJECT (info->progress),\n 2542 |                               GIMP_MESSAGE_WARNING,\n 2543 |                               \"Warning, invalid color in XCF file: %s\",\n 2544 |                               error->message);\n 2545 |                 g_clear_error (&error);\n 2546 |                 valid_color = TRUE;\n 2547 |               }\n 2548 |             /* Just ignore errors here? */\n 2549 |             data->stroke_pattern = GIMP_PATTERN (xcf_load_data (info, GIMP_TYPE_PATTERN, &error));","lines":21}]},{"id":"MEM_18","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In _gp_param_def_read, GP_PARAM_DEF_TYPE_GEGL_COLOR: when _gimp_wire_read_gegl_color succeeds but pixel_data is NULL, the `encoding` string and any icc_data GBytes that were allocated are never freed (default_val is only built in the pixel_data != NULL branch). Leak on each such message.","fix":"In the pixel_data == NULL case, g_free(encoding) and g_bytes_unref(icc_data) before continuing.","locations":[{"ref":"libgimpbase/gimpprotocol.c:1246-1291","code":" 1246 |     case GP_PARAM_DEF_TYPE_GEGL_COLOR:\n 1247 |         {\n 1248 |           GPParamColor *default_val = NULL;\n 1249 |           GBytes       *pixel_data = NULL;\n 1250 |           GBytes       *icc_data   = NULL;\n 1251 |           gchar        *encoding   = NULL;\n 1252 | \n 1253 |           if (! _gimp_wire_read_int32 (channel,\n 1254 |                                        (guint32 *) &param_def->meta.m_gegl_color.has_alpha, 1,\n 1255 |                                        user_data) ||\n 1256 |               ! _gimp_wire_read_gegl_color (channel, &pixel_data, &icc_data, &encoding,\n 1257 |                                             1, user_data))\n 1258 |             return FALSE;\n 1259 | \n 1260 |           if (pixel_data != NULL)\n 1261 |             {\n 1262 |               default_val = g_new0 (GPParamColor, 1);\n 1263 | \n 1264 |               default_val->format.encoding = encoding;\n 1265 |               default_val->size            = g_bytes_get_size (pixel_data);\n 1266 |               if (default_val->size > 40)\n 1267 |                 {\n 1268 |                   g_free (default_val);\n 1269 |                   g_free (encoding);\n 1270 |                   g_bytes_unref (pixel_data);\n 1271 |                   g_bytes_unref (icc_data);\n 1272 |                   return FALSE;\n 1273 |                 }\n 1274 |               memcpy (default_val->data, g_bytes_get_data (pixel_data, NULL),\n 1275 |                       default_val->size);\n 1276 |               g_bytes_unref (pixel_data);\n 1277 |               if (icc_data)\n 1278 |                 {\n 1279 |                   gsize profile_size;\n "easy":true,"description":"PSP read_color_block leaks color_palette on the fread error path. g_malloc(pal_size) is assigned to color_palette, and if the following fread fails the function returns -1 without freeing color_palette.","fix":"g_free (color_palette) before returning -1 in the fread failure branch.","locations":[{"ref":"plug-ins/common/file-psp.c:1313-1319","code":" 1313 |   color_palette = g_malloc (pal_size);\n 1314 |   if (fread (color_palette, pal_size, 1, f) < 1)\n 1315 |     {\n 1316 |       g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n 1317 |                    _(\"Error reading color palette\"));\n 1318 |       return -1;\n 1319 |     }","lines":7}]},{"id":"MEM_23","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In load_rsvg_pixbuf() the cairo_t 'cr' is destroyed but if gdk_pixbuf_new_from_data() fails (returns NULL) the cairo_surface_t 'surface' is leaked, because its only owner becomes the pixbuf's destroy-notify (svg_destroy_surface) which never runs when the pixbuf is not created. On the error/large-input path this leaks a full image-sized surface per attempt.","fix":"If gdk_pixbuf_new_from_data() returns NULL, explicitly cairo_surface_destroy(surface) before returning.","locations":[{"ref":"plug-ins/common/file-svg.c:980-984","code":"  980 |   pixbuf = gdk_pixbuf_new_from_data (cairo_image_surface_get_data (surface),\n  981 |                                      GDK_COLORSPACE_RGB, TRUE, 8, width, height,\n  982 |                                      cairo_format_stride_for_width (CAIRO_FORMAT_ARGB32, width),\n  983 |                                      (GdkPixbufDestroyNotify) svg_destroy_surface, surface);\n  984 |   cairo_destroy (cr);","lines":5}]},{"id":"MEM_24","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"TGA ReadImage early-return on unsupported colormap depth leaks already-allocated buffers. At lines 1068-1071 and 1082-1086 the code \n 1301 |               gimp_progress_update ((gdouble) y / (gdouble) load_info->height);\n 1302 |             }\n 1303 | \n 1304 |           if (load_info->flags & DDSD_PITCH)\n 1305 |             {\n 1306 |               current_position = ftell (fp);\n 1307 |               if (rowstride > (file_size - current_position))\n 1308 |                 {\n 1309 |                   g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n 1310 |                                _(\"Requested data exceeds size of file.\\n\"));\n 1311 |                   return FALSE;\n 1312 |                 }\n 1313 |               if (! fread (buf, rowstride, 1, fp))\n 1314 |                 {\n 1315 |                   g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n 1316 |                                _(\"Unexpected EOF.\\n\"));\n 1317 |                   return FALSE;\n 1318 |                 }","lines":32},{"ref":"plug-ins/file-dds/ddsread.c:1543-1545","code":" 1543 |   gegl_buffer_flush (buffer);\n 1544 | \n 1545 |   g_object_unref (buffer);","lines":3}]},{"id":"MEM_26","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In the path-record resource (2000), controlpoints = g_malloc(sizeof(gdouble)*num_rec*6) is leaked on two inner error returns: the psd_read failure inside 'while (num_rec > 0)' and the psd_seek failure in the else branch both 'return -1' without freeing controlpoints (only the outer seek-failure path frees it). Triggerable by truncating a path block.","fix":"g_free(controlpoints) before both inner 'return -1' statements.","locations":[{"ref":"plug-ins/file-psd/psd-image-res-load.c:1724-1730","code":" 1724 |           while (num_rec > 0)\n 1725 |             {\n 1726 |               if (psd_read (input, &type, 2, error) < 2)\n 1727 |                 {\n 1728 |                   psd_set_error (error);\n 1729 |                   return -1;\n 1730 |                 }","lines":7},{"ref":"plug-ins/file-psd/psd-image-res-load.
