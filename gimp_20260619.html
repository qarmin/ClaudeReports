= last_coords.xtilt    + p * delta_xtilt;\n  734 |       current_coords.ytilt     = last_coords.ytilt    + p * delta_ytilt;\n  735 |       current_coords.wheel     = last_coords.wheel    + p * delta_wheel;\n  736 |       current_coords.velocity  = last_coords.velocity + p * delta_velocity;\n  737 |       current_coords.direction = temp_direction;\n  738 |       current_coords.xscale    = last_coords.xscale;\n  739 |       current_coords.yscale    = last_coords.yscale;\n  740 |       current_coords.angle     = last_coords.angle;\n  741 |       current_coords.reflect   = last_coords.reflect;\n  742 | \n  743 |       fade_point = gimp_paint_options_get_fade (paint_options, image,\n  744 |                                                 paint_core->pixel_dist);\n  745 | \n  746 |       if (core->jitter > 0.0)\n  747 |         {\n  748 |           GimpVector2 x_axis;\n  749 |           GimpVector2 y_axis;\n  750 |           gdouble     dyn_jitter;\n  751 |           gdouble     jitter_dist;\n  752 |           gint32      jitter_angle;\n  753 | \n  754 |           x_axis = gimp_brush_get_x_axis (core->brush);\n  755 |           y_axis = gimp_brush_get_y_axis (core->brush);\n  756 | \n  757 |           dyn_jitter = (core->jitter *\n  758 |                         gimp_dynamics_get_linear_value (core->dynamics,\n  759 |                                                         GIMP_DYNAMICS_OUTPUT_JITTER,\n  760 |                                                         &current_coords,\n  761 |                                                         paint_options,\n  762 |                                                         fade_point));\n  763 | \n  764 |           jitter_dist  = g_rand_double_range (core->rand, 0, dyn_jitter);\n  765 |           jitter_angle = g_rand_int_range (core->rand,\n  766 |                                            0, BRUSH_CORE_JITTER_LUTSIZE);\n  767 | \n  768 |           current_coords.x +=\n  769 |             (x_axis.x + y_axis.x) *\n  770 |             jitter_dist * core->jitter_lut_x[jitter_angle] * core->scale;\n  771 | \n  772 |           current_coords.y +=\n  773 |             (y_axis.y + x_axis.y) *\n  774 |             jitter_dist * core->jitter_lut_y[jitter_angle] * core->scale;\n  775 |         }\n  776 | \n  777 |       gimp_paint_core_set_current_coords (paint_core, &current_coords);\n  778 | \n  779 |       paint_core->distance   = initial       + t * dist;\n  780 |       paint_core->pixel_dist = pixel_initial + t * pixel_dist;\n  781 | \n  782 |       gimp_paint_core_paint (paint_core, drawables, paint_options,\n  783 |                              GIMP_PAINT_STATE_MOTION, time);\n  784 |     }","lines":60}]},{"id":"LOGIC_37","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gimp_brush_core_get_paint_buffer computes the brush upper-left as x = floor(coords->x) - brush_width/2 (integer division), but the matching paste path in gimp_brush_core_paste_canvas / replace_canvas uses `>> 1` on the *final* (subsampled/solidified) brush mask width, and gimp_brush_core_color_area_with_pixmap additionally applies an even-size correction (ROUND - floor) that the get_paint_buffer path does not. For even-sized transformed masks these centering formulas can differ by one pixel, so the paint buffer rectangle and the mask stamp can be misaligned by a pixel at the brush edge. This is the historical bug #166622 territory; the correction exists in color_area_with_pixmap (lines 1348-1351) but not in get_paint_buffer.","fix":"Apply the same even-size centering correction used in gimp_brush_core_color_area_with_pixmap to the upper-left computation in gimp_brush_core_get_paint_buffer, or factor the centering into a single shared helper used by all three call sites.","locations":[{"ref":"app/paint/gimpbrushcore.c:836-837","code":"  836 |   x = (gint) floor (coords->x) - (brush_width  / 2);\n  837 |   y = (gint) floor (coords->y) - (brush_height / 2);","lines":2},{"ref":"app/paint/gimpbrushcore.c:991-992","code":"  991 |       x = (gint) floor (coords->x) - (gimp_temp_buf_get_width  (brush_mask) >> 1);\n  992 |       y = (gint) floor (coords->y) - (gimp_temp_buf_get_height (brush_mask) >> 1);","lines":2},{"ref":"app/paint/gimpbrushcore.c:1342-1351","code":" 1342 |   ul_x = (gint) floor (coords->x) - (gimp_temp_buf_get_width  (pixmap) >> 1);\n 1343 |   ul_y = (gint) floor (coords->y) - (gimp_temp_buf_get_height (pixmap) >> 1);\n 1344 | \n 1345 |   /*  Not sure why this is necessary, but empirically the code does\n 1346 |    *  not work without it for even-sided brushes.  See bug #166622.\n 1347 |    */\n 1348 |   if (gimp_temp_buf_get_width (pixmap) % 2 == 0)\n 1349 |     ul_x += ROUND (coords->x) - floor (coords->x);\n 1350 |   if (gimp_temp_buf_get_height (pixmap) % 2 == 0)\n 1351 |     ul_y += ROUND (coords->y) - floor (coords->y);","lines":10}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In svg_parser_text(), after iterating 'for (paths = prior_handler->paths; paths; paths = paths->next)' the variable 'paths' is NULL at the end of the loop, yet the code then calls g_list_free (paths). This frees nothing (g_list_free(NULL) is a no-op), so it is dead/misleading code: it looks like it intends to free the path list but does not. The list itself (prior_handler->paths) is correctly left intact for later use, so there is no leak, but the call is confusing and a future edit could turn it into a double-free if someone 'fixes' it to free prior_handler->paths (which is still owned and used elsewhere).","fix":"Remove the stray g_list_free (paths) call; it operates on a NULL pointer and conveys incorrect intent.","locations":[{"ref":"app/path/gimppath-import.c:515-524","code":"  515 |           for (paths = prior_handler->paths; paths; paths = paths->next)\n  516 |             {\n  517 |               SvgPath *svg_path = paths->data;\n  518 | \n  519 |               if (svg_path->id)\n  520 |                 g_free (svg_path->id);\n  521 | \n  522 |               svg_path->id = g_strdup (title);\n  523 |             }\n  524 |           g_list_free (paths);","lines":10}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In parse_svg_viewbox(), when scale is FALSE the matrix is built with only the translate(-x,-y) applied and the width/height scaling is skipped, but when w>0 && h>0 the function still returns success and the caller (svg_handler_svg_start) multiplies 'box' into the transform. More importantly, the function uses strtok on a g_strdup'd copy and parses with g_ascii_strtod without validating that the four tokens are actually numbers; non-numeric viewBox tokens silently parse as 0, so a viewBox like 'abc def 0 0' is treated as an empty viewBox (width=height=0) which disables rendering of the element - a malformed-input edge that silently drops content rather than reporting an error.","fix":"Validate each viewBox token (check g_ascii_strtod end pointer advanced) and treat unparsable tokens as a parse failure instead of silently yielding 0 coordinates.","locations":[{"ref":"app/path/gimppath-import.c:1212-1293","code":" 1212 | static gboolean\n 1213 | parse_svg_viewbox (const gchar *value,\n 1214 |                    gdouble     *width,\n 1215 |                    gdouble     *height,\n 1216 |                    GimpMatrix3 *matrix,\n 1217 |                    gboolean     scale)\n 1218 | {\n 1219 |   gdouble   x, y, w, h;\n 1220 |   gchar    *tok;\n 1221 |   gchar    *str     = g_strdup (value);\n 1222 |   gboolean  success = FALSE;\n 1223 | #ifdef _UCRT\n 1224 |   gchar     *context = NULL;\n 1225 | #endif\n 1226 | \n 1227 |   x = y = w = h = 0;\n 1228 | \n 1229 | #ifndef _UCRT\n 1230 |   tok = strtok (str, \", \\t\");\n 1231 | #else\n 1232 |   tok = strtok_s (str, \", \\t\", &context);\n 1233 | #endif\n 1234 |   if (tok)\n 1235 |     {\n 1236 |       x = g_ascii_strtod (tok, NULL);\n 1237 | #ifndef _UCRT\n 1238 |       tok = strtok (NULL, \", \\t\");\n 1239 | #else\n 1240 |       tok = strtok_s (NULL, \", \\t\", &context);\n 1241 | #endif\n 1242 |       if (tok)\n 1243 |         {\n 1244 |           y = g_ascii_strtod (tok, NULL);\n 1245 | #ifndef _UCRT\n 1246 |           tok = strtok (NULL, \", \\t\");\n 1247 | #else\n 1248 |           tok = strtok_s (NULL, \", \\t\", &context);\n 1249 | #endif\n 1250 |           if (tok != NULL)\n 1251 |             {\n 1252 |               w = g_ascii_strtod (tok, NULL);\n 1253 | #ifndef _UCRT\n 1254 |               tok = strtok (NULL, \", \\t\");\n 1255 | #else\n 1256 |               tok = strtok_s (NULL, \", \\t\", &context);\n 1257 | #endif\n 1258 |               if (tok)\n 1259 |                 {\n 1260 |                   h = g_ascii_strtod (tok, NULL);\n 1261 |                   success = TRUE;\n 1262 |                 }\n 1263 |             }\n 1264 |         }\n 1265 |     }\n 1266 | \n 1267 |   g_free (str);\n 1268 | \n 1269 |   if (success)\n 1270 |     {\n 1271 |       gimp_matrix3_identity (matrix);\n 1272 |       gimp_matrix3_translate (matrix, -x,  -y);\n 1273 | \n 1274 |       if (w > 0.0 && h > 0.0)\n 1275 |         {\n 1276 |           if (scale)\n 1277 |             gimp_matrix3_scale (matrix, *width / w, *height / h);\n 1278 |         }\n 1279 |       else  /* disable rendering of the element */\n 1280 |         {\n 1281 | #ifdef DEBUG_PATH_IMPORT\n 1282 |           g_printerr (\"empty viewBox\");\n 1283 | #endif\n 1284 |           *width = *height = 0.0;\n 1285 |         }\n 1286 |     }\n 1287 |   else\n 1288 |     {\n 1289 |       g_printerr (\"SVG import: cannot parse viewBox attribute\\n\");\n 1290 |     }\n 1291 | \n 1292 |   return success;\n 1293 | }","lines":82}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The SVG arc command parser reads each arc parameter as a full SVG number, including the large-arc-flag and sweep-flag (params[3], params[4]). Per the SVG spec these flags may be written as bare single digits with no separator (e.g. 'a25,25 0 1150,50' meaning flags 1 and 1 followed by coordinate 50). The number parser will instead read '1150' as a single value, mis-parsing valid SVG arc syntax and producing an incorrect arc. Not a memory-safety issue, but a correctness/interop bug when importing foreign SVG.","fix":"Special-case the flag arguments of the 'a'/'A' command to consume exactly one '0' or '1' digit rather than a full number.","locations":[{"ref":"app/path/gimppath-import.c:1746-1759","code":" 1746 |     case 'a':\n 1747 |       if (ctx->param == 7 || final)\n 1748 |         {\n 1749 |           coords.x = ctx->cpx = ctx->rpx = ctx->params[5];\n 1750 |           coords.y = ctx->cpy = ctx->rpy = ctx->params[6];\n 1751 | \n 1752 |           gimp_bezier_stroke_arcto (ctx->stroke,\n 1753 |                                     ctx->params[0], ctx->params[1],\n 1754 |                                     gimp_deg_to_rad (ctx->params[2]),\n 1755 |                                     ctx->params[3], ctx->params[4],\n 1756 |                                     &coords);\n 1757 |           ctx->param = 0;\n 1758 |         }\n 1759 |       break;","lines":14},{"ref":"app/path/gimppath-import.c:1767-1883","code":" 1767 | static gint\n 1768 | parse_number (ParsePathContext *ctx,\n 1769 |               const char       *data)\n 1770 | {\n 1771 |   gint     length        = 0;\n 1772 |   /* Current location within the number */\n 1773 |   gint     in            = IN_PREINTEGER;\n 1774 |   /* [bitfield] Having 2 of each of these is an error */\n 1775 |   gint     got           = 0x0;\n 1776 |   /* Set to true if the number should end after a char */\n 1777 |   gboolean end           = FALSE;\n 1778 |   /* Set to true if the number ended due to an error */\n 1779 |   gboolean error         = FALSE;\n 1780 |   gdouble  value         = 0.0;\n 1781 |   gdouble  fraction      = 1.0;\n 1782 |   /* Presume the INTEGER is positive if it has no sign */\n 1783 |   gint     sign          = +1;\n 1784 |   gint     exponent      = 0;\n 1785 |   /* Presume the EXPONENT is positive if it has no sign */\n 1786 |   gint     exponent_sign = +1;\n 1787 | \n 1788 |   while (data[length] != '\\0' && ! end && ! error)\n 1789 |     {\n 1790 |       gchar c = data[length];\n 1791 | \n 1792 |       switch (in)\n 1793 |         {\n 1794 |         case IN_PREINTEGER: /* No numbers yet, we're just starting out */\n 1795 |           /* LEGAL: + - .->FRACTION DIGIT->INTEGER */\n 1796 |           if (c == '+' || c == '-')\n 1797 |             {\n 1798 |               if (got & GOT_SIGN)\n 1799 |                 {\n 1800 |                   error = TRUE; /* Two signs: not allowed */\n 1801 |                 }\n 1802 |               else\n 1803 |                 {\n 1804 |                   sign = c == '+' ? +1 : -1;\n 1805 |                   got |= GOT_SIGN;\n 1806 |                 }\n 1807 |             }\n 1808 |           else if (c == '.')\n 1809 |             {\n 1810 |               in = IN_FRACTION;\n 1811 |             }\n 1812 |           else if (c >= '0' && c <= '9')\n 1813 |             {\n 1814 |               value = c - '0';\n 1815 |               in    = IN_INTEGER;\n 1816 |             }\n 1817 |           break;\n 1818 | \n 1819 |         case IN_INTEGER: /* Previous character(s) was/were digit(s) */\n 1820 |           /* LEGAL: DIGIT .->FRACTION E->PREEXPONENT */\n 1821 |           if (c >= '0' && c <= '9')\n 1822 |             value = value * 10 + (c - '0');\n 1823 |           else if (c == '.')\n 1824 |             in = IN_FRACTION;\n 1825 |           else if (c == 'e' || c == 'E')\n 1826 |             in = IN_PREEXPONENT;\n 1827 |           else\n 1828 |             end = TRUE;\n 1829 |           break;\n 1830 | \n 1831 |         case IN_FRACTION: /* Previously, digit(s) in the fractional part */\n 1832 |           /* LEGAL: DIGIT E->PREEXPONENT */\n 1833 |           if (c >= '0' && c <= '9')\n 1834 |             {\n 1835 |               fraction *= 0.1;\n 1836 |               value    += fraction * (c - '0');\n 1837 |             }\n 1838 |           else if (c == 'e' || c == 'E')\n 1839 |             {\n 1840 |               in = IN_PREEXPONENT;\n 1841 |             }\n 1842 |           else\n 1843 |             {\n 1844 |               end = TRUE;\n 1845 |             }\n 1846 |           break;\n 1847 | \n 1848 |         case IN_PREEXPONENT: /* Right after E */\n 1849 |           /* LEGAL: + - DIGIT->EXPONENT */\n 1850 |           if (c == '+' || c == '-')\n 1851 |             {\n 1852 |               if (got & GOT_EXPONENT_SIGN)\n 1853 |                 {\n 1854 |                   error = TRUE; /* Two signs: not allowed */\n 1855 |                 }\n 1856 |               else\n 1857 |                 {\n 1858 |                   exponent_sign = c == '+' ? +1 : -1;\n 1859 |                   got |= GOT_EXPONENT_SIGN;\n 1860 |                 }\n 1861 |             }\n 1862 |           else if (c >= '0' && c <= '9')\n 1863 |             {\n 1864 |               exponent = c - '0';\n 1865 |               in       = IN_EXPONENT;\n 1866 |             }\n 1867 |           break;\n 1868 | \n 1869 |         case IN_EXPONENT: /* After E and the sign, if applicable */\n 1870 |           /* LEGAL: DIGIT */\n 1871 |           if (c >= '0' && c <= '9')\n 1872 |             exponent = exponent * 10 + (c - '0');\n 1873 |           else\n 1874 |             end = TRUE;\n 1875 |           break;\n 1876 |         }\n 1877 |       length++;\n 1878 |     }\n 1879 | \n 1880 |   path_end_of_number (ctx, value, sign, exponent_sign, exponent);\n 1881 | \n 1882 |   return end ? length - 1 : length;\n 1883 | }","lines":117}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"parse_number()/path_end_of_number() build the exponent in a plain 'gint exponent' by repeatedly doing 'exponent = exponent * 10 + (c - '0')' over an unbounded run of digits (IN_EXPONENT state). A crafted SVG path number such as '1e999999999999' overflows the signed int (undefined behavior / wraparound) and then pow(10, exp_sign*exp) typically yields +inf, which is stored unchecked into ctx->params and propagated into coordinates. The resulting inf/NaN coordinates flow into the bezier subdivision/interpolation math (e.g. gimp_bezier_stroke_segment_nearest_point_get, gimp_stroke_interpolate, bounds computation) with no NaN/inf validation, producing garbage geometry and NaN bounds.","fix":"Clamp the number of exponent digits (or cap 'exponent' to a sane bound such as 308) and/or validate the final parsed value with isfinite() before storing into ctx->params[], rejecting/zeroing non-finite coordinates.","locations":[{"ref":"app/path/gimppath-import.c:1869-1875","code":" 1869 |         case IN_EXPONENT: /* After E and the sign, if applicable */\n 1870 |           /* LEGAL: DIGIT */\n 1871 |           if (c >= '0' && c <= '9')\n 1872 |             exponent = exponent * 10 + (c - '0');\n 1873 |           else\n 1874 |             end = TRUE;\n 1875 |           break;","lines":7},{"ref":"app/path/gimppath-import.c:1892","code":" 1892 |   val *= sign * pow (10, exp_sign * exp);","lines":1}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Uninitialized mask used in magic matching. In file_check_single_magic the three sscanf calls that parse the '&' operator value (\"%lu\"/\"%lx\"/\"%lo\") do not check their return value, yet num_operator is unconditionally set to '&' afterwards. On a malformed operator string (e.g. an empty/garbage tail after '&'), num_operator_val stays uninitialized while num_operator=='&', so 'fileval &= num_operator_val' applies a garbage mask, giving nondeterministic file-type magic matches.","fix":"Set num_operator = '&' only when the corresponding sscanf returns 1; otherwise leave it '\\0' so the mask step is skipped.","locations":[{"ref":"app/plug-in/gimppluginmanager-file.c:676-698","code":"  676 |       if (g_ascii_isdigit (num_operator_ptr[1]))\n  677 |         {\n  678 |           if (num_operator_ptr[1] != '0')      /* decimal */\n  679 | #ifndef _UCRT\n  680 |             sscanf (num_operator_ptr+1, \"%lu\", &num_operator_val);\n  681 | #else\n  682 |             sscanf_s (num_operator_ptr+1, \"%lu\", &num_operator_val);\n  683 | #endif\n  684 |           else if (num_operator_ptr[2] == 'x') /* hexadecimal */\n  685 | #ifndef _UCRT\n  686 |             sscanf (num_operator_ptr+3, \"%lx\", &num_operator_val);\n  687 | #else\n  688 |             sscanf_s (num_operator_ptr+3, \"%lx\", &num_operator_val);\n  689 | #endif\n  690 |           else                                 /* octal */\n  691 | #ifndef _UCRT\n  692 |             sscanf (num_operator_ptr+2, \"%lo\", &num_operator_val);\n  693 | #else\n  694 |             sscanf_s (num_operator_ptr+2, \"%lo\", &num_operator_val);\n  695 | #endif\n  696 | \n  697 |           num_operator = *num_operator_ptr;\n  698 |         }","lines":23},{"ref":"app/plug-in/gimppluginmanager-file.c:769-770","code":"  769 |       if (num_operator == '&')\n  770 |         fileval &= num_operator_val;","lines":2}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Signed/unsigned mismatch parsing magic test values. num_testval is a gulong but is parsed with strtol (signed long); the result is then rejected when errno != 0. Magic values with the high bit set saturate strtol to LONG_MAX and set errno=ERANGE, so those otherwise-valid unsigned magic rules silently never match.","fix":"Parse with strtoul to match the gulong num_testval type.","locations":[{"ref":"app/plug-in/gimppluginmanager-file.c:706","code":"  706 |       gulong  fileval  = 0;","lines":1},{"ref":"app/plug-in/gimppluginmanager-file.c:716-719","code":"  716 |       num_testval = strtol (value, NULL, 0);\n  717 | \n  718 |       if (errno != 0)\n  719 |         return FILE_MATCH_NONE;","lines":4}]},{"id":"LOGIC_44","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Function returns GimpTextLayout* but returns FALSE (a gboolean) on the early-out when layer->text is NULL. FALSE happens to be 0/NULL so it works, but it is a type-confused return that a future change could break and it misleads readers.","fix":"Return NULL instead of FALSE.","locations":[{"ref":"app/text/gimptextlayer.c:663-664","code":"  663 |    if (! layer->text)\n  664 |      return FALSE;","lines":2}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gimp_palette_editor_set_index() looks up 'entry' for the requested (clamped) index and selects it, but when returning the color it reads from editor->color->color instead of entry->color. This only works because gimp_palette_view_select_entry() synchronously emits 'entry-selected', whose handler (palette_editor_entry_selected) updates editor->color. The function therefore relies on a side effect of a signal callback to populate the value it returns, and if that callback chain is ever broken or made asynchronous, editor->color may be NULL (default) or stale, causing a NULL dereference or returning the wrong color. The local 'entry' is the correct, directly-available source.","fix":"Use the already-computed 'entry' for the color read: 'format = gegl_color_get_format (entry->color); gegl_color_get_pixel (entry->color, format, pixel); ...'. Do not depend on the signal side effect having updated editor->color.","locations":[{"ref":"app/widgets/gimppaletteeditor.c:677-690","code":"  677 |       entry = gimp_palette_get_entry (palette, index);\n  678 | \n  679 |       gimp_palette_view_select_entry (GIMP_PALETTE_VIEW (editor->view),\n  680 |                                       entry);\n  681 | \n  682 |       if (color)\n  683 |         {\n  684 |           const Babl *format;\n  685 |           guchar      pixel[40];\n  686 | \n  687 |           format = gegl_color_get_format (editor->color->color);\n  688 |           gegl_color_get_pixel (editor->color->color, format, pixel);\n  689 |           gegl_color_set_pixel (color, format, pixel);\n  690 |         }","lines":14}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In xcf_load_level, when offset2 == 0 (last tile) the code sets offset2 = offset + max_data_length and then validates offset2 - offset <= max_data_length (always true) - so the final tile's on-disk length is effectively unbounded except by max_data_length, and the subsequent direct g_input_stream_read_all (RLE/zlib) reads up to data_length = offset2-offset bytes regardless of actual file end. That is mostly safe because read_all returns short, but max_data_length itself is computed as 'XCF_TILE_WIDTH*XCF_TILE_HEIGHT*bpp*1.5' as a goffset from a double constant; for large bpp this is fine, but the value is used as a g_alloca size in the RLE/zlib paths (data_length), reinforcing the stack-alloca concern.","fix":"Clamp data_length to the actual remaining file size before allocating, and heap-allocate as noted in the alloca finding.","locations":[{"ref":"app/xcf/xcf-load.c:4856-4922","code":" 4856 |   max_data_length = XCF_TILE_WIDTH * XCF_TILE_HEIGHT * bpp *\n 4857 |                     XCF_TILE_MAX_DATA_LENGTH_FACTOR /* = 1.5, currently */;\n 4858 | \n 4859 |   /* read in the first tile offset.\n 4860 |    *  if it is '0', then this tile level is empty\n 4861 |    *  and we can simply return.\n 4862 |    */\n 4863 |   if (xcf_read_offset (info, &offset, 1) < info->bytes_per_offset)\n 4864 |     {\n 4865 |       GIMP_LOG (XCF, \"Failed to read tile offset\"\n 4866 |                 \" at offset: %\" G_GOFFSET_FORMAT, info->cp);\n 4867 |       return FALSE;\n 4868 |     }\n 4869 |   if (offset == 0)\n 4870 |     return le data length: %\" G_GOFFSET_FORMAT,\n 4920 |                         offset2 - offset);\n 4921 |           return FALSE;\n 4922 |         }","lines":67}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"xcf_load_old_path: when num_points or the version is bad it returns FALSE after freeing, but for an unknown version it returns FALSE without having consumed a consistent number of bytes; the caller xcf_load_old_paths then returns FALSE and the PROP_PATHS handler seeks to base+prop_size, masking the desync. More concretely, num_points is an unbounded guint32 used for g_new0(GimpPathCompatPoint, num_points) and a read loop, with no bound check (only ==0 is special-cased), allowing a huge allocation / long loop (DoS) on a crafted file.","fix":"Bound num_points against remaining prop/file size before allocating and looping.","locations":[{"ref":"app/xcf/xcf-load.c:5355-5454","code":" 5355 | static gboolean\n 5356 | xcf_load_old_path (XcfInfo   *info,\n 5357 |                    GimpImage *image)\n 5358 | {\n 5359 |   gchar                  *name;\n 5360 |   guint32                 locked;\n 5361 |   guint8                  state;\n 5362 |   guint32                 closed;\n 5363 |   guint32                 num_points;\n 5364 |   guint32                 version; /* changed from num_paths */\n 5365 |   GimpTattoo              tattoo = 0;\n 5366 |   GimpPath               *path;\n 5367 |   GimpPathCompatPoint    *points;\n 5368 |   gint                    i;\n 5369 | \n 5370 |   xcf_read_string (info, &name,       1);\n 5371 |   xcf_read_int32  (info, &locked,     1);\n 5372 |   xcf_read_int8   (info, &state,      1);\n 5373 |   xcf_read_int32  (info, &closed,     1);\n 5374 |   xcf_read_int32  (info, &num_points, 1);\n 5375 |   xcf_read_int32  (info, &version,    1);\n 5376 | \n 5377 |   if (version == 2)\n 5378 |     {\n 5379 |       guint32 dummy;\n 5380 | \n 5381 |       /* Had extra type field and points ar hs, path);\n 5444 | \n 5445 |   if (tattoo)\n 5446 |     gimp_item_set_tattoo (GIMP_ITEM (path), tattoo);\n 5447 | \n 5448 |   gimp_image_add_path (image, path,\n 5449 |                        NULL, /* can't be a tree */\n 5450 |                        gimp_container_get_n_children (gimp_image_get_paths (image)),\n 5451 |                        FALSE);\n 5452 | \n 5453 |   return TRUE;\n 5454 | }","lines":100},{"ref":"app/xcf/xcf-load.c:5401-5435","code":" 5401 |   if (num_points == 0)\n 5402 |     {\n 5403 |       g_free (name);\n 5404 |       return FALSE;\n 5405 |     }\n 5406 | \n 5407 |   points = g_new0 (GimpPathCompatPoint, num_points);\n 5408 | \n 5409 |   for (i = 0; i < num_points; i++)\n 5410 |     {\n 5411 |       if (version == 1)\n 5412 |         {\n 5413 |           gint32 x;\n 5414 |           gint32 y;\n 5415 | \n 5416 |           xcf_read_int32 (info, &points[i].type, 1);\n 5417 |           xcf_read_int32 (info, (guint32 *) &x,  1);\n 5418 |           xcf_read_int32 (info, (guint32 *) &y,  1);\n 5419 | \n 5420 |           points[i].x = x;\n 5421 |           points[i].y = y;\n 5422 |         }\n 5423 |       else\n 5424 |         {\n 5425 |           gfloat x;\n 5426 |           gfloat y;\n 5427 | \n 5428 |           xcf_read_int32 (info, &points[i].type, 1);\n 5429 |           xcf_read_float (info, &x,              1);\n 5430 |           xcf_read_float (info, &y,              1);\n 5431 | \n 5432 |           points[i].x = x;\n 5433 |           points[i].y = y;\n 5434 |         }\n 5435 |     }","lines":35}]},{"id":"LOGIC_48","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"xcf_load_old_vector reads num_parasites and num_strokes as unbounded guint32 and loops over them (allocating per iteration), with no bound check against the property size. A crafted file can specify huge counts causing long loops / many allocations (DoS). The parasite loop returns FALSE on a NULL parasite, but num_strokes stroke loop and num_parasites loop are otherwise unbounded.","fix":"Validate num_parasites/num_strokes against the remaining PROP_VECTORS payload size before iterating.","locations":[{"ref":"app/xcf/xcf-load.c:5509-5572","code":" 5509 | static gboolean\n 5510 | xcf_load_old_vector (XcfInfo   *info,\n 5511 |                      GimpImage *image)\n 5512 | {\n 5513 |   gchar      *name;\n 5514 |   GimpTattoo  tattoo = 0;\n 5515 |   guint32     visible;\n 5516 |   guint32     linked;\n 5517 |   guint32     num_parasites;\n 5518 |   guint32     num_strokes;\n 5519 |   GimpPath   *path;\n 5520 |   gint        i;\n 5521 | \n 5522 | #ifdef GIMP_XCF_PATH_DEBUG\n 5523 |   g_printerr (\"xcf_load_old_vector\\n\");\n 5524 | #endif\n 5525 | \n 5526 |   xcf_read_string (info, &name,          1);\n 5527 |   xcf_read_int32  (info, &tattoo,        1);\n 5528 |   xcf_read_int32  (info, &visible,       1);\n 5529 |   xcf_read_int32  (info, &linked,        1);\n 5530 |   xcf_read_int32  (info, &num_parasites, 1);\n 5531 |   xcf_read_int32  (info, &num_strokes,   1);\n 5532 | \n 5533 | #ifdef GIMP_XCF_PATH_DEBUG\n 5534 |   g_printerr (\"name: %s, tattoo: %d, visible: %d, linked: %d, \"\n 5535 |               \"num_parasites %d, num_strokes %d\\n\",\n 5536 |               name, tattoo, visible, linked, num_parasites, num_strokes);\n 5537 | #endif\n 5538 | \n 5539 |   path = gimp_path_new (image, name);\n 5540 |   g_free (name);\n 5541 | \n 5542 |   gimp_item_set_visible (GIMP_ITEM (path), visible, FALSE);\n 5543 |   if (linked)\n 5544 |     info->linked_paths = g_list_prepend (info->linked_paths, path);\n 5545 | \n 5546 |   if (tattoo)\n 5547 |     gimp_item_set_tattoo (GIMP_ITEM (path), tattoo);\n 5548 | \n 5549 |   for (i = 0; i < num_parasites; i++)\n 5550 |     {\n 5551 |       GimpParasite *parasite = xcf_load_parasite (info);\n 5552 |       GError       *error    = NULL;\n 5553 | \n 5554 |       if (! parasite)\n 5555 |         return FALSE;\n 5556 | \n 5557 |       if (! gimp_item_parasite_validate (GIMP_ITEM (path), parasite, &error))\n 5558 |         {\n 5559 |           gimp_message (info->gimp, G_OBJECT (info->progress),\n 5560 |                         GIMP_MESSAGE_WARNING,\n 5561 |                         \"Warning, invalid vectors parasite in XCF file: %s\",\n 5562 |                         error->message);\n 5563 |           g_clear_error (&error);\n 5564 |         }\n 5565 |       else\n 5566 |         {\n 5567 |           gimp_item_parasite_attach (GIMP_ITEM (path), parasite, FALSE);\n 5568 |         }\n 5569 | \n 5570 |       gimp_parasite_free (parasite);\n 5571 |     }\n 5572 | ","lines":64},{"ref":"app/xcf/xcf-load.c:5549-5571","code":" 5549 |   for (i = 0; i < num_parasites; i++)\n 5550 |     {\n 5551 |       GimpParasite *parasite = xcf_load_parasite (info);\n 5552 |       GError       *error    = NULL;\n 5553 | \n 5554 |       if (! parasite)\n 5555 |         return FALSE;\n 5556 | \n 5557 |       if (! gimp_item_parasite_validate (GIMP_ITEM (path), parasite, &error))\n 5558 |         {\n 5559 |           gimp_message (info->gimp, G_OBJECT (info->progress),\n 5560 |                         GIMP_MESSAGE_WARNING,\n 5561 |                         \"Warning, invalid vectors parasite in XCF file: %s\",\n 5562 |                         error->message);\n 5563 |           g_clear_error (&error);\n 5564 |         }\n 5565 |       else\n 5566 |         {\n 5567 |           gimp_item_parasite_attach (GIMP_ITEM (path), parasite, FALSE);\n 5568 |         }\n 5569 | \n 5570 |       gimp_parasite_free (parasite);\n 5571 |     }","lines":23}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"gimp_memsize_deserialize checks overflow with `if (size == G_MAXUINT64 && errno == ERANGE)` but never sets errno = 0 before g_ascii_strtoull. A stale errno == ERANGE combined with a legitimate exact value of G_MAXUINT64 makes the function wrongly return FALSE. The standard strtoull idiom requires clearing errno first.","fix":"Add errno = 0; immediately before the g_ascii_strtoull call.","locations":[{"ref":"libgimpbase/gimpmemsize.c:117-120","code":"  117 |   size = g_ascii_strtoull (string, &end, 0);\n  118 | \n  119 |   if (size == G_MAXUINT64 && errno == ERANGE)\n  120 |     return FALSE;","lines":4}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In gimp_color_parse_css_numeric, errno is checked for ERANGE immediately after g_ascii_strtod / strtol but errno is never cleared (errno = 0) before the calls. errno is only guaranteed set on error, not cleared on success, so a stale ERANGE from an unrelated earlier libc call causes a spurious parse failure mid-loop.","fix":"Set errno = 0 immediately before each g_ascii_strtod and strtol call.","locations":[{"ref":"libgimpcolor/gimpcolor-parse.c:512-515","code":"  512 |           values[i] = g_ascii_strtod (css, (gchar **) &end);\n  513 | \n  514 |           if (errno == ERANGE)\n  515 |             return FALSE;","lines":4},{"ref":"libgimpcolor/gimpcolor-parse.c:525-528","code":"  525 |           glong value = strtol (css, (gchar **) &end, 10);\n  526 | \n  527 |           if (errno == ERANGE)\n  528 |             return FALSE;","lines":4}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"p_retrieve_values() reads upper/lower point arrays from config and copies up to 17 entries with 'cd->points[0][i][0] = (i < length_x) ? data_x[i] : -1.0f;'. length_x/length_y are independent gsize values taken from the GimpArray; only their non-zero-ness is checked. If a (PDB-supplied) array is longer than 17 the extra values are ignored (benign) but if the two arrays differ in length the x and y of a point can be taken from inconsistent sources, and there is no validation that values are within the documented 0.0..1.0 (or -1) range before later use as multipliers in bender_plot_curve (geometry[][] = points[][]*xmax), which can push curve indices out of the CLAMP-protected range only by luck.","fix":"Validate array lengths (== 17 expected) and clamp/validate each point value to the documented range before storing; treat malformed arrays as an error.","locations":[{"ref":"plug-ins/common/curve-bend.c:991-1021","code":"  991 |       if (length_x != 0 && length_y != 0)\n  992 |         {\n  993 |           for (gint i = 0; i < 17; i++)\n  994 |             {\n  995 |               cd->points[0][i][0] = (i < length_x) ? data_x[i] : -1.0f;\n  996 |               cd->points[0][i][1] = (i < length_y) ? data_y[i] : -1.0f;\n  997 |             }\n  998 |           load_settings_data = FALSE;\n  999 |         }\n 1000 |     }\n 1001 |   if (lower_point_x_array != NULL &&\n 1002 |       lower_point_y_array != NULL)\n 1003 |     {\n 1004 |       gsize          length_x;\n 1005 |       gsize          length_y;\n 1006 |       const gdouble *data_x;\n 1007 |       const gdouble *data_y;\n 1008 | \n 1009 |       data_x = gimp_double_array_get_values (lower_point_x_array, &length_x);\n 1010 |       data_y = gimp_double_array_get_values (lower_point_y_array, &length_y);\n 1011 | \n 1012 |       if (length_x != 0 && length_y != 0)\n 1013 |         {\n 1014 |           for (gint i = 0; i < 17; i++)\n 1015 |             {\n 1016 |               cd->points[1][i][0] = (i < length_x) ? data_x[i] : -1.0f;\n 1017 |               cd->points[1][i][1] = (i < length_y) ? data_y[i] : -1.0f;\n 1018 |             }\n 1019 |           load_settings_data = FALSE;\n 1020 |         }\n 1021 |     }","lines":31}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"DICOM guess_and_set_endian2 is called with length = width*height, omitting samples_per_pixel, so for 16-bit RGB images only the first third of the pixel array has its endianness guessed/swapped. The actual decode in dicom_loader iterates width*height*samples_per_pixel 16-bit entries, so the remaining samples retain the original (possibly wrong) byte order, producing corrupted color for big-endian-stored RGB16.","fix":"Pass width * height * samples_per_pixel as the length to guess_and_set_endian2, consistent with the decode loop.","locations":[{"ref":"plug-ins/common/file-dicom.c:781","code":"  781 |     guess_and_set_endian2 ((guint16 *) pix_buf, width * height);","lines":1},{"ref":"plug-ins/common/file-dicom.c:828","code":"  828 |       for (pix_idx = 0; pix_idx < width * height * samples_per_pixel; pix_idx++)","lines":1}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"GIF DoExtension Graphic Control Extension reads buf[0..3] without checking GetDataBlock's return: '(void) GetDataBlock (fd, buf)' at line 832 discards the count, then buf[0], buf[1], buf[2], buf[3] are read (lines 833-837). If the data block is shorter than 4 bytes or GetDataBlock returned -1 (read error), stale/garbage bytes from the static buffer are used as disposal/transparency/delay. Not memory-unsafe (static 260-byte buffer) but produces incorrect transparency/disposal from corrupt input.","fix":"Check that GetDataBlock returned >= 4 before reading buf[0..3]; on error/short block, treat the extension as absent.","locations":[{"ref":"plug-ins/common/file-gif-load.c:828-844","code":"  828 |     case 0xf9:                  /* Graphic Control Extension */\n  829 | #ifdef GIFDEBUG\n  830 |       str = \"Graphic Control Extension\";\n  831 | #endif\n  832 |       (void) GetDataBlock (fd, (guchar *) buf);\n  833 |       Gif89.disposal  = (buf[0] >> 2) & 0x7;\n  834 |       Gif89.inputFlag = (buf[0] >> 1) & 0x1;\n  835 |       Gif89.delayTime = LM_to_uint (buf[1], buf[2]);\n  836 |       if ((buf[0] & 0x1) != 0)\n  837 |         Gif89.transparent = buf[3];\n  838 |       else\n  839 |         Gif89.transparent = -1;\n  840 | \n  841 |       while (GetDataBlock (fd, (guchar *) buf) > 0);\n  842 | \n  843 |       return FALSE;\n  844 |       break;","lines":17}]},{"id":"LOGIC_54","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"JP2 load: signed-sample handling uses incorrect offsets. For signed components\nthe offset added before scaling is set to G_MAXINT8-1 (126), G_MAXINT16-1\n(32766) or G_MAXINT32-1, rather than the correct mid-range bias (2^(prec-1)).\nThis produces wrong pixel values for signed JP2 components. Additionally\ntemp = (data[...] + signed_offset) << shift is computed in a signed gint and can\noverflow to undefined behavior for high-precision signed components, though the\nresult is only used as pixel bytes.","fix":"Use the correct bias for signed samples (1 << (precision_actual - 1)) and perform\nthe shift/add in a wide unsigned type to avoid signed overflow.","locations":[{"ref":"plug-ins/common/file-jp2.c:1606-1620","code":" 1606 |   signed_offset = 0;\n 1607 |   if (image->comps[0].sgnd)\n 1608 |     {\n 1609 |       switch (precision_scaled)\n 1610 |         {\n 1611 |           case 32:\n 1612 |             signed_offset = G_MAXINT32 - 1;\n 1613 |             break;\n 1614 |           case 16:\n 1615 |             signed_offset = G_MAXINT16 - 1;\n 1616 |             break;\n 1617 |           default:\n 1618 |             signed_offset = G_MAXINT8 - 1;\n 1619 |         }\n 1620 |     }","lines":15},{"ref":"plug-ins/common/file-jp2.c:1658-1661","code":" 1658 |               if (shift >= 0)\n 1659 |                 temp = (image->comps[j].data[i * width + k] + signed_offset) << shift;\n 1660 |               else /* precision_actual > 32 */\n 1661 |                 temp = (image->comps[j].data[i * width + k] + signed_offset) >> (- shift);","lines":4}]},{"id":"LOGIC_55","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"XBM get_int() accumulates into a plain int val with no overflow guard (val *= base; val += digval) over an unbounded run of digits, and the width/height parsing in load_image relies on these values. A file with a very long numeric literal overflows val into a negative or arbitrary value. While width/height are subsequently range-checked (<=0 and > GIMP_MAX_IMAGE_SIZE), the per-pixel data reads via get_int() in the body loop are not range checked, and a wrapped value is silently accepted as pixel data.","fix":"Clamp/limit the number of digits accumulated in get_int(), or detect overflow and signal a parse error.","locations":[{"ref":"plug-ins/common/file-xbm.c:680-694","code":"  680 |   val = 0;\n  681 |   for (;;)\n  682 |     {\n  683 |       digval = getval (c, base);\n  684 |       if (digval == -1)\n  685 |         {\n  686 |           ungetc (c, fp);\n  687 |           break;\n  688 |         }\n  689 |       val *= base;\n  690 |       val += digval;\n  691 |       c = fgetc (fp);\n  692 |     }\n  693 | \n  694 |   return val;","lines":15},{"ref":"plug-ins/common/file-xbm.c:913-927","code":"  913 |           for (k = 0; k < width; k ++)\n  914 |             {\n  915 |               /* Expand each integer into INTBITS pixels. */\n  916 |               if (k % intbits == 0)\n  917 |                 {\n  918 |                   c = get_int (fp);\n  919 | \n  920 |                   /* Flip all the bits so that 1's become black and\n  921 |                      0's become white. */\n  922 |                   c ^= 0xffff;\n  923 |                 }\n  924 | \n  925 |               data[rowoffset + k] = c & 1;\n  926 |               c >>= 1;\n  927 |             }","lines":15}]},{"id":"LOGIC_56","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"addtexture() and duptexture() guard with 'if (n == MAXTEXTUREPEROBJ - 1) return;' (n == 19), then write s.com.texture[n] and do numtexture++. This off-by-one allows numtexture to reach 20 (== MAXTEXTUREPEROBJ) but never lets the user create the 20th usable slot consistently; more importantly it relies on '== 19' exact equality, so if numtexture were ever :"low","easy":true,"description":"initworld() bumpmap branch scales the new normal using the wrong array: it does vmul(&d->normal[d->numnormal].scale, d->texture[d->numnormal].oscale) - it reads oscale from d->texture[] (the color-texture array) indexed by numnormal instead of from d->normal[d->numnormal].oscale. This is a copy/paste error: the normal's own oscale is ignored and an unrelated (possibly uninitialized) texture slot's oscale is applied, producing wrong bump scaling and reading a slot that may not have been populated.","fix":"Use d->normal[d->numnormal].oscale (i.e. scale the normal by its own oscale).","locations":[{"ref":"plug-ins/common/sphere-designer.c:2348-2353","code":" 2348 |       else if (t->majtype == 1)\n 2349 |         {                       /* Bumpmap */\n 2350 |           d->normal[d->numnormal] = *t;\n 2351 |           vmul (&d->normal[d->numnormal].scale,\n 2352 |                 d->texture[d->numnormal].oscale);\n 2353 |           d->numnormal++;","lines":6},{"ref":"plug-ins/common/sphere-designer.c:2351-2352","code":" 2351 |           vmul (&d->normal[d->numnormal].scale,\n 2352 |                 d->texture[d->numnormal].oscale);","lines":2}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"BMP load_rle() literal-run path at line 1042 reads only 1 byte for bpp<=8 but then for bpp==4 packs two pixels from a single byte across iterations using 'i % 2'. The read condition 'fi->bpp >= 8 || i % 2 == 0' fetches a fresh byte on even i for 4bpp. This is correct, but the encoded-run path for bpp<=8 (lines 997-1012) uses nested loops with three simultaneous bounds (j < rowbuf[0], i <= 8/bpp, xpos < width) that are subtle; the inner loop can write dest[1]=alpha at 'basedest + xpos*channels' where channels==2, and xpos is bounded by width, so writes stay within the row buffer. No OOB found, but the triple-nested counter logic is fragile and worth a targeted fuzz/unit test.","fix":"Add unit/fuzz coverage for RLE4 encoded and literal runs at width boundaries; consider simplifying the nested counters to a single pixel-emit helper with an explicit bounds check.","locations":[{"ref":"plug-ins/file-bmp/bmp-load.c:992-1031","code":"  992 |       if (fi->rowbuf[0] != 0)\n  993 |         {\n  994 |           /* encoded run, row_buf[0] == number of repeats */\n  995 |           if (fi->bpp <= 8)\n  996 |             {\n  997 |               for (j = 0; (j < fi->rowbuf[0]) && (fi->xpos < fi->width);)\n  998 |                 {\n  999 |                   for (i = 1; (i <= 8 / fi->bpp) && (fi->xpos < fi->width) &&\n 1000 |                               (j < fi->rowbuf[0]);\n 1001 |                        i++, fi->xpos++, j++)\n 1002 |                     {\n 1003 |                       shift = 8 - i * fi->bpp;\n 1004 |                       dest  = basedest + fi->xpos * fi->channels;\n 1005 | \n 1006 |                       dest[0] = (fi->rowbuf[1] & (((1 << fi->bpp) - 1) << shift)) >> shift;\n 1007 |                       dest[0] = MIN (dest[0], fi->ncolors - 1);\n 1008 |                       if (fi->gray)\n 1009 |                         dest[0] = fi->colormap[dest[0] * 3];\n 1010 |                       dest[1] = 0xff; /* alpha */\n 1011 |                     }\n 1012 |                 }\n 1013 |             }\n 1014 |           else\n 1015 |             {\n 1016 |               /* read remaining 2 rgb components */\n 1017 |               if (! ReadOK (fi->file, fi->rowbuf + 2, 2))\n 1018 |                 {\n 1019 |                   g_message (_(\"The bitmap ends unexpectedly.\"));\n 1020 |                   fi->needs_alpha = TRUE;\n 1021 |                   return FALSE;\n 1022 |                 }\n 1023 |               for (i = 0; (i < fi->rowbuf[0]) && (fi->xpos < fi->width); i++, fi->xpos++)\n 1024 |                 {\n 1025 |                   dest = basedest + fi->xpos * fi->channels;\n 1026 |                   for (gint c = 0; c < 3; c++)\n 1027 |                     dest[2 - c] = fi->rowbuf[1 + c];\n 1028 |                   dest[3] = 0xff; /* alpha */\n 1029 |                 }\n 1030 |             }\n 1031 |         }","lines":40}]},{"id":"LOGIC_59","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"load_mipmaps() skip-path computes 'size = load_info->linear_size >> (2 * level)' for uncompressed textures to fseek past unread mipmaps. This halving-area heuristic does not match the real per-mipmap byte size for non-power-of-two dimensions or for bpp/pitch-rounded rows, so the file position can be left at the wrong offset for subsequent layers (cubemap faces / array elements), causing misaligned decoding of attacker data. It is bounded by later per-layer size checks but yields incorrect output and can shift reads.","fix":"Compute each skipped mipmap's size the same way the read path does (pitch-based for uncompressed via the same rounding, block-based for compressed) rather than shifting linear_size by 2*level.","locations":[{"ref":"plug-ins/file-dds/ddsread.c:1593-1611","code":" 1593 |       /* Skip past mipmaps, as simply not reading them leaves us in the wrong pos for subsequent layers */\n 1594 |       for (level = 1; level < load_info->mipmaps; ++level)\n 1595 |         {\n 1596 |           guint width  = MAX (1, load_info->width  >> level);\n 1597 |           guint height = MAX (1, load_info->height >> level);\n 1598 |           guint size   = load_info->linear_size >> (2 * level);\n 1599 | \n 1600 |           if (load_info->fmt_flags & DDPF_FOURCC)\n 1601 |             {\n 1602 |               size = ((width + 3) >> 2) * ((height + 3) >> 2);\n 1603 |               if ((load_info->comp_format == DDS_COMPRESS_BC1) ||\n 1604 |                   (load_info->comp_format == DDS_COMPRESS_BC4))\n 1605 |                 size *= 8;\n 1606 |               else\n 1607 |                 size *= 16;\n 1608 |             }\n 1609 | \n 1610 |           fseek (fp, size, SEEK_CUR);\n 1611 |         }","lines":19}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"ico_load_layer() (called from ico_load_thumbnail_image at line 1137) ignores its return value; ico_load_thumbnail_image does not check whether the layer was actually created. If ico_read_png/ico_read_icon fail, ico_load_layer returns NULL but the function proceeds to return a (blank) image as a successful thumbnail. Minor, but masks decode failures.","fix":"Check the GimpLayer* returned by ico_load_layer and treat NULL as a thumbnail failure.","locations":[{"ref":"plug-ins/file-ico/ico-load.c:1135-1139","code":" 1135 |   image = gimp_image_new (w, h, GIMP_RGB);\n 1136 |   buf = g_new (guchar, w*h*4);\n 1137 |   ico_load_layer (fp, image, match, buf, w*h*4, file_offset,\n 1138 |                   \"Thumbnail\", info + match);\n 1139 |   g_free (buf);","lines":5}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Several fields read from the big-endian PSD file are byte-swapped with the *_TO_BE macros instead of *_FROM_BE (e.g. ls_a->count which then drives a loop bound). On little-endian hosts TO_BE and FROM_BE are identical so it works by accident, but on big-endian hosts these become no-ops on already-swapped wrong values, yielding incorrect counts/sizes.","fix":"Use GUINT16_FROM_BE / GUINT32_FROM_BE consistently for all values read from the file.","locations":[{"ref":"plug-ins/file-psd/psd-layer-res-load.c:1683-1684","code":" 1683 |   ls_a->version = GUINT16_TO_BE (ls_a->version);\n 1684 |   ls_a->count = GUINT16_TO_BE (ls_a->count);","lines":2},{"ref":"plug-ins/file-psd/psd-layer-res-load.c:1807-1816","code":" 1807 |               ls_a->oglw.size      = GUINT32_TO_BE (ls_a->oglw.size);\n 1808 |               ls_a->oglw.ver       = GUINT32_TO_BE (ls_a->oglw.ver);\n 1809 |               ls_a->oglw.blur      = FIXED_TO_FLOAT (GUINT16_TO_BE (temp[0]),\n 1810 |
