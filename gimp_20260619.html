ile));\n  782 |           return GIMP_PDB_EXECUTION_ERROR;\n  783 |         }\n  784 | \n  785 |       if (! TIFFGetField (tif, TIFFTAG_IMAGELENGTH, &rows))\n  786 |         {\n  787 |           TIFFClose (tif);\n  788 |           g_message (_(\"Could not get image length from '%s'\"),\n  789 |                      gimp_file_get_utf8_name (file));\n  790 |           return GIMP_PDB_EXECUTION_ERROR;\n  791 |         }","lines":15},{"ref":"plug-ins/file-tiff/file-tiff-load.c:1511-1527","code":" 1511 |               if (! TIFFGetField (tif, TIFFTAG_COLORMAP,\n 1512 |                                   &redmap, &greenmap, &bluemap))\n 1513 |                 {\n 1514 |                   TIFFClose (tif);\n 1515 |                   g_message (_(\"Could not get colormaps from '%s'\"),\n 1516 |                              gimp_file_get_utf8_name (file));\n 1517 |                   return GIMP_PDB_EXECUTION_ERROR;\n 1518 |                 }\n 1519 | \n 1520 |               /* TODO: Remove when we support 16 bit indexed TIFFs */\n 1521 |               if (bps > 8)\n 1522 |                 {\n 1523 |                   TIFFClose (tif);\n 1524 |                   g_message (_(\"Indexed TIFFs with color maps larger than 256 \"\n 1525 |                                \"colors are not yet supported\"));\n 1526 |                   return GIMP_PDB_EXECUTION_ERROR;\n 1527 |                 }","lines":17},{"ref":"plug-ins/file-tiff/file-tiff-load.c:1934-1935","code":" 1934 |   g_free (pages.pages);\n 1935 |   TIFFClose (tif);","lines":2}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":false,"description":"read_10bpc_packed() writes decoded samples into the heap buffer 'pixels' via 'pixels[pixel_index++]' with NO bound check on pixel_index. The loop iterates over data_len, which is derived from the remaining FILE SIZE (ftell to EOF), not from width*height. Up to 4 writes happen per iteration. 'pixels' is sized only width*height*depth*2 + 8 bytes. A DPX file whose packed image-data region is larger than the declared width*height*depth (trivial: pad the file or declare small dimensions) drives pixel_index far past the allocation, producing a controllable heap buffer overflow. Note the sibling read_12bpc_packed() does have a guard (pixel_index + 3 > num_pixels) at line 733; this one is missing it.","fix":"Add a bounds guard inside the loop mirroring read_12bpc_packed: before each group of writes (and ideally before every single 'pixels[pixel_index++]'), check that pixel_index stays within num_pixels and break otherwise. Allocate at least the worst-case number of writes per iteration of slack, and size the loop by min(data_len, ceil(num_pixels*10/32)) rather than the whole file.","locations":[{"ref":"plug-ins/file-cin/dpx-lib.c:531-587","code":"  531 |   for (gint long_index = 0; long_index < data_len; ++long_index)\n  532 |     {\n  533 |       guint t;\n  534 | \n  535 |       if (is_network_order)\n  536 |         {\n  537 |           t = g_ntohl (data[long_index]);\n  538 | \n  539 |           /* Get remaining bytes from prior run */\n  540 |           leftover += ((gushort) t & mask) << shift;\n  541 |           pixels[pixel_index++] = (leftover & 0x3FF) << 6;\n  542 |           t = t >> (10 - shift);\n  543 | \n  544 |           /* If the dimensions of the image are odd, the remaining\n  545 |            * packed bits are not part of the image and should be\n  546 |            * skipped */\n  547 |           odd_offset++;\n  548 |           if (odd_offset >= (width * depth))\n  549 |             {\n  550 |               odd_offset = 0;\n  551 |               shift      = 0;\n  552 |               mask       = 0x3FF;\n  553 |               leftover   = 0;\n  554 |               continue;\n  555 |             }\n  556 | \n  557 |           /* Read remaining 10 bit pixel values */\n  558 |           pixels[pixel_index++]   = ((gushort) t & 0x3FF) << 6;\n  559 |           t = t >> 10;\n  560 |           pixels[pixel_index++] = ((gushort) t & 0x3FF) << 6;\n  561 |           t = t >> 10;\n  562 |           leftover = (gushort) t;\n  563 | \n  564 |           odd_offset  += 2;\n  565 |           shift       += 2;\n  566 |           mask        /= 4.0f;\n  567 |           if (shift > 8)\n  568 |             {\n  569 |               shift = 0;\n  570 |               mask  = 0x3FF;\n  571 | \n  572 |               /* Copy the last leftover value into the pixel array */\n  573 |               pixels[pixel_index++] = ((gushort) t & 0x3FF) << 6;\n  574 |               leftover = 0;\n  575 |               odd_offset++;\n  576 |             }\n  577 | \n  578 |           if (odd_offset >= (width * depth))\n  579 |             {\n  580 |               shift      = 0;\n  581 |               mask       = 0x3FF;\n  582 |               leftover   = 0;\n  583 |               odd_offset = 0;\n  584 |               pixel_index--;\n  585 |             }\n  586 |         }\n  587 |     }","lines":57},{"ref":"plug-ins/file-cin/dpx-lib.c:541","code":"  541 |           pixels[pixel_index++] = (leftover & 0x3FF) << 6;","lines":1},{"ref":"plug-ins/file-cin/dpx-lib.c:558-573","code":"  558 |           pixels[pixel_index++]   = ((gushort) t & 0x3FF) << 6;\n  559 |           t = t >> 10;\n  560 |           pixels[pixel_index++] = ((gushort) t & 0x3FF) << 6;\n  561 |           t = t >> 10;\n  562 |           leftover = (gushort) t;\n  563 | \n  564 |           odd_offset  += 2;\n  565 |           shift       += 2;\n  566 |           mask        /= 4.0f;\n  567 |           if (shift > 8)\n  568 |             {\n  569 |               shift = 0;\n  570 |               mask  = 0x3FF;\n  571 | \n  572 |               /* Copy the last leftover value into the pixel array */\n  573 |               pixels[pixel_index++] = ((gushort) t & 0x3FF) << 6;","lines":16}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":true,"description":"APP13 (Photoshop) JPEG marker is processed with no minimum-length check. JPEG_APP_HEADER_PS is \"Photoshop 3.0\" so sizeof() == 14. A crafted APP13 marker whose data_length (len, a gsize) is < 14 makes `len - sizeof (JPEG_APP_HEADER_PS)` underflow to a near-SIZE_MAX value. That value is passed both to g_realloc as the new size base and, fatally, to memcpy as the copy length, producing an unbounded OOB read from `data + 14` and OOB write into photoshop_data: a remotely-triggerable heap buffer overflow from a malformed JPEG. Note the sibling Exif branch (line 292) DOES guard its length, this branch does not.","fix":"Before using the marker, require `len > sizeof (JPEG_APP_HEADER_PS)` (mirroring the Exif branch) and verify the leading bytes equal the \"Photoshop 3.0\" identifier; otherwise skip the marker. Compute lengths in gsize and bounds-check before memcpy/realloc.","locations":[{"ref":"plug-ins/file-jpeg/jpeg-load.c:300-311","code":"  300 |           else if (marker->marker == JPEG_APP0 + 13)\n  301 |             {\n  302 |               photoshop_data = g_realloc (photoshop_data,\n  303 |                                           (gsize) photoshop_len + len - sizeof (JPEG_APP_HEADER_PS));\n  304 | \n  305 |               memcpy (photoshop_data + photoshop_len,\n  306 |                       data + sizeof (JPEG_APP_HEADER_PS),\n  307 |                       len - sizeof (JPEG_APP_HEADER_PS));\n  308 | \n  309 |               photoshop_len += len;\n  310 |               photoshop_len -= sizeof (JPEG_APP_HEADER_PS);\n  311 | ","lines":12}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":false,"description":"In parse_text_loop's binary-value handler, val_len (guint32) = bufpos - value_start_pos. For an empty '()' or single-byte '(x)' value, val_len is 0 or 1, so val_len-2 underflows to ~4 billion and is passed to memcpy as the length, reading far out of bounds from buf and writing past the tiny name_utf16 allocation (g_malloc0(val_len+2)). The source pointer &buf[value_start_pos+2] can also already be past the end of buf. Fully attacker-controlled via the Txt2/tdta layer text-engine data: a reliable crash and likely exploitable heap corruption.","fix":"Before the memcpy, require val_len >= 2 and that value_start_pos+2+(val_len-2) <= len; otherwise treat the value as empty. Compute the UTF-16 payload length as a checked/clamped quantity bounded by the remaining buffer.","locations":[{"ref":"plug-ins/file-psd/psd-layer-res-load.c:2199-2204","code":" 2199 |             data->val_len = data->bufpos - data->value_start_pos;\n 2200 | \n 2201 |             /* Get the name as UTF-8 from UTF-16 data. */\n 2202 |             name_utf16 = g_malloc0 (data->val_len + 2);\n 2203 |             memcpy (name_utf16, &buf[data->value_start_pos+2], data->val_len-2);\n 2204 |             name_utf8 = g_convert (name_utf16, data->val_len, \"utf-8\", \"utf-16BE\", &br, &bw, &error);","lines":6}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"gimp_data_input_stream_read_ucs2_text() reads a file-supplied 32-bit count 'pslen' (only checked > 0) and computes len = 2 * pslen into a gint. With pslen between 0x40000000 and 0x7FFFFFFF the multiplication overflows signed int (undefined behavior) and can yield a negative or wrapped value passed to g_new(gchar, len); a wrapped small/negative len followed by the for(i<len) read loop writing name_ucs2[i] produces a heap buffer overflow / huge or mis-sized allocation. This routine is reached from the untrusted Photoshop pattern loader (read_ucs2_text at gimppattern-load.c:414) and the ABR v2 brush loader (gimpbrush-load.c:660).","fix":"Validate pslen against a sane maximum and the remaining file size before use, and compute the byte length in gsize: gsize len = (gsize) pslen * 2; reject pslen > some bound. Use gsize for the allocation and loop index.","locations":[{"ref":"app/core/gimp-utils.c:1048-1065","code":" 1048 |   if (! gimp_data_input_stream_read_long (input, &pslen, error) || pslen <= 0)\n 1049 |     return FALSE;\n 1050 | \n 1051 |   len = 2 * pslen;\n 1052 | \n 1053 |   name_ucs2 = g_new (gchar, len);\n 1054 | \n 1055 |   for (i = 0; i < len; i++)\n 1056 |     {\n 1057 |       gchar mychar;\n 1058 | \n 1059 |       if (! gimp_data_input_stream_read_char (input, &mychar, error))\n 1060 |         {\n 1061 |           g_free (name_ucs2);\n 1062 |           return FALSE;\n 1063 |         }\n 1064 |       name_ucs2[i] = mychar;\n 1065 |     }","lines":18}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"file_gex_validate indexes the parsed AppStream component box at element 0 without checking that any components exist. as_metadata_parse_bytes() can succeed on a syntactically valid metainfo XML that declares zero <component> entries; as_component_box_index(components, 0) (or g_ptr_array_index(components, 0) on the pre-1.0 path) then performs an out-of-bounds read on an empty container, yielding a garbage/NULL AsComponent that is passed to as_component_get_id() and later to file_gex_decompress as the plugin id. A crafted .gex with an empty-component metainfo file triggers OOB read / crash.","fix":"After a successful parse, query the component count (as_component_box_len()/components->len) and if it is 0 set *error and clear *metadata before dereferencing index 0.","locations":[{"ref":"app/file-data/file-data-gex.c:295-309","code":"  295 |                       if (success)\n  296 |                         {\n  297 | #if AS_CHECK_VERSION(1, 0, 0)\n  298 |                           AsComponentBox *components;\n  299 | \n  300 |                           components = as_metadata_get_components (*metadata);\n  301 |                           *component = as_component_box_index (components, 0);\n  302 | #else\n  303 |                           GPtrArray *components;\n  304 | \n  305 |                           components = as_metadata_get_components (*metadata);\n  306 |                           *component = g_ptr_array_index (components, 0);\n  307 | #endif\n  308 | \n  309 |                           if (g_strcmp0 (as_component_get_id (*component), plugin_id) != 0)","lines":15}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Heap out-of-bounds read on tile upload. In gimp_plug_in_handle_tile_put the core ignores the wire-supplied tile_info->width/height/bpp and calls gegl_buffer_set() with the drawable's own tile_rect and format. The plug-in process controls the GP_TILE_DATA message; the wire reader (_gp_tile_data_read in libgimpbase/gimpprotocol.c:858-866) allocates tile_info->data with exactly width*height*bpp bytes, all attacker-controlled. A malicious/buggy plug-in can declare a tile that is smaller (e.g. 1x1x1) than the drawable's real tile geometry while the drawable's format/tile_rect dictate a much larger read, so gegl_buffer_set reads tile_rect.width*tile_rect.height*babl_bpp bytes past the end of the short data allocation. No validation that tile_info->width==tile_rect.width, height==tile_rect.height, or bpp==babl_format_get_bytes_per_pixel(format) is performed before the read.","fix":"Before gegl_buffer_set, validate that tile_info->bpp == babl_format_get_bytes_per_pixel(format), tile_info->width == tile_rect.width and tile_info->height == tile_rect.height (and that use_shm matches), and kill the plug-in with an error message otherwise, exactly as the tile_num and drawable validity are already checked.","locations":[{"ref":"app/plug-in/gimpplugin-message.c:317-330","code":"  317 |   format = gegl_buffer_get_format (buffer);\n  318 | \n  319 |   if (tile_data.use_shm)\n  320 |     {\n  321 |       gegl_buffer_set (buffer, &tile_rect, 0, format,\n  322 |                        gimp_plug_in_shm_get_addr (plug_in->manager->shm),\n  323 |  via g_memdup2(scanner->value.v_string, length) without checking length against the real string length. plug-in-rc.c calls it with fully file-controlled counts: bpp for gegl-color data (1019), profile_size for profile_data (1029, only checked > 0, no upper bound), and icon_data_length for the PIXBUF icon (637, only checked < 0). A pluginrc with a short literal but a large declared count produces a heap out-of-bounds read whose contents are then stored as color/profile/icon data.","fix":"Bound profile_size and icon_data_length to sane maxima and validate the declared length against the actual decoded token length; ideally fix gimp_scanner_parse_data to clamp/fail when length exceeds the stored string length.","locations":[{"ref":"app/plug-in/plug-in-rc.c:1019","code":" 1019 |                    ! gimp_scanner_parse_data (scanner, bpp, &data)                  ||","lines":1},{"ref":"app/plug-in/plug-in-rc.c:1029","code":" 1029 |           if (profile_size > 0 && ! gimp_scanner_parse_data (scanner, profile_size, &profile_data))","lines":1},{"ref":"app/plug-in/plug-in-rc.c:637","code":"  637 |       if (! gimp_scanner_parse_data (scanner, icon_data_length, &icon_data))","lines":1}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"xcf_load_tile, xcf_load_tile_rle and xcf_load_tile_zlib allocate tile_data = g_alloca(tile_size) and (RLE/zlib) xcfdata = g_alloca(data_length) on the stack. tile_size = bpp * tile_rect->width * tile_rect->height: with bpp up to 32 (e.g. RGBA double) and 64x64 tiles this is ~128 KiB, and data_length (RLE/zlib) is bounded only by max_data_length ~= 64*64*bpp*1.5 (~196 KiB). These per-tile stack allocations of hundreds of KiB, combined with the recursive layer/group/effect-mask loading (xcf_load_layer -> xcf_load_effect -> xcf_load_channel -> xcf_load_buffer -> xcf_load_level -> xcf_load_tile_*), can exhaust the stack on a crafted file with deeply nested group/effect-mask structures, causing a crash (no guard page recovery with alloca).","fix":"Use g_malloc/g_free (heap) for tile_data and xcfdata instead of g_alloca so allocation failure is recoverable and the stack is not consumed during recursive loading. Optionally also enforce a recursion-depth limit on nested group layers / effect masks.","locations":[{"ref":"app/xcf/xcf-load.c:4991-5020","code":" 4991 | static gboolean\n 4992 | xcf_load_tile (XcfInfo       *info,\n 4993 |                GeglBuffer    *buffer,\n 4994 |                GeglRectangle *tile_rect,\n 4995 |                const Babl    *format)\n 4996 | {\n 4997 |   gint    bpp       = babl_format_get_bytes_per_pixel (format);\n 4998 |   gint    tile_size = bpp * tile_rect->width * tile_rect->height;\n 4999 |   guchar *tile_data = g_alloca (tile_size);\n 5000 | \n 5001 |   if (info->file_version <= 11)\n 5002 |     {\n 5003 |       xcf_read_int8 (info, tile_data, tile_size);\n 5004 |     }\n 5005 |   else\n 5006 |     {\n 5007 |       gint n_components = babl_format_get_n_components (format);\n 5008 | \n 5009 |       xcf_read_component (info, bpp / n_components, tile_data,\n 5010 |                           tile_size / bpp * n_components);\n 5011 |     }\n 5012 | \n 5013 |   if (! xcf_data_is_zero (tile_data, tile_size))\n 5014 |     {\n 5015 |       gegl_buffer_set (buffer, tile_rect, 0, format, tile_data,\n 5016 |                        GEGL_AUTO_ROWSTRIDE);\n 5017 |     }\n 5018 | \n 5019 |   return TRUE;\n 5020 | }","lines":30},{"ref":"app/xcf/xcf-load.c:5022-5048","code":" 5022 | static gboolean\n 5023 | xcf_load_tile_rle (XcfInfo       *info,\n 5024 |                    GeglBuffer    *buffer,\n 5025 |                    GeglRectangle *tile_rect,\n 5026 |                    const Babl    *format,\n 5027 |                    gint           data_length)\n 5028 | {\n 5029 |   gint    bpp       = babl_format_get_bytes_per_pixel (format);\n 5030 |   gint    tile_size = bpp * tile_rect->width * tile_rect->height;\n 5031 |   guchar *tile_data = g_alloca (tile_size);\n 5032 |   guchar  nonzero   = FALSE;\n 5033 |   gsize   bytes_read;\n 5034 |   gint    i;\n 5035 |   guchar *xcfdata;\n 5036 |   guchar *xcfodata;\n 5037 |   guchar *xcfdatalimit;\n 5038 | \n 5039 |   /* Workaround for bug #357809: avoid crashing on g_malloc() and skip\n 5040 |    * this tile (return TRUE without storing data) as if it did not\n 5041 |    * contain any data.  It is better than returning FALSE, which would\n 5042 |    * skip the whole hierarchy while there may still be some valid\n 5043 |    * tiles in the file.\n 5044 |    */\n 5045 |   if (data_length <= 0)\n 5046 |     return TRUE;\n 5047 | \n 5048 |   xcfdata = xcfodata = g_alloca (data_length);","lines":27},{"ref":"app/xcf/xcf-load.c:5174-5199","code":" 5174 | static gboolean\n 5175 | xcf_load_tile_zlib (XcfInfo       *info,\n 5176 |                     GeglBuffer    *buffer,\n 5177 |                     GeglRectangle *tile_rect,\n 5178 |                     const Babl    *format,\n 5179 |                     gint           data_length)\n 5180 | {\n 5181 |   z_stream  strm;\n 5182 |   int       action;\n 5183 |   int       status;\n 5184 |   gint      bpp       = babl_format_get_bytes_per_pixel (format);\n 5185 |   gint      tile_size = bpp * tile_rect->width * tile_rect->height;\n 5186 |   guchar   *tile_data = g_alloca (tile_size);\n 5187 |   gsize     bytes_read;\n 5188 |   guchar   *xcfdata;\n 5189 | \n 5190 |   /* Workaround for bug #357809: avoid crashing on g_malloc() and skip\n 5191 |    * this tile (return TRUE without storing data) as if it did not\n 5192 |    * contain any data.  It is better than returning FALSE, which would\n 5193 |    * skip the whole hierarchy while there may still be some valid\n 5194 |    * tiles in the file.\n 5195 |    */\n 5196 |   if (data_length <= 0)\n 5197 |     return TRUE;\n 5198 | \n 5199 |   xcfdata = g_alloca (data_length);","lines":26}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"xcf_read_offset() allocates a variable-length array on the stack via g_alloca(count * sizeof(gint32)) using a caller-supplied count, with no upper bound. While current call sites pass count==1, this is a foot-gun: any call with a file-derived count (or count*sizeof overflow on a 32-bit int) yields an unbounded/overflowing stack allocation. The multiply count*sizeof(gint32) is also done in int arithmetic and can overflow. g_alloca cannot fail safely; a large value blows the stack with no recovery.","fix":"Avoid g_alloca for unbounded sizes; use a small fixed loop reading offsets one at a time, or a bounded heap buffer with an explicit cap. Validate count against a sane maximum before allocating.","locations":[{"ref":"app/xcf/xcf-read.c:119-155","code":"  119 | guint\n  120 | xcf_read_offset (XcfInfo *info,\n  121 |                  goffset *data,\n  122 |                  gint     count)\n  123 | {\n  124 |   guint total = 0;\n  125 | \n  126 |   *data = 0;\n  127 |   if (count > 0)\n  128 |     {\n  129 |       if (info->bytes_per_offset == 4)\n  130 |         {\n  131 |           gint32 *int_offsets = g_alloca (count * sizeof (gint32));\n  132 | \n  133 |           total += xcf_read_int8 (info, (guint8 *) int_offsets, count * 4);\n  134 | \n  135 |           while (count--)\n  136 |             {\n  137 |               *data = g_ntohl (*int_offsets);\n  138 |               int_offsets++;\n  139 |               data++;\n  140 |             }\n  141 |         }\n  142 |       else\n  143 |         {\n  144 |           total += xcf_read_int8 (info, (guint8 *) data, count * 8);\n  145 | \n  146 |           while (count--)\n  147 |             {\n  148 |               *data = GINT64_FROM_BE (*data);\n  149 |               data++;\n  150 |             }\n  151 |         }\n  152 |     }\n  153 | \n  154 |   return total;\n  155 | }","lines":37}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"xcf_read_string allocates g_new(gchar, tmp) for the string and then reads tmp bytes, but does not verify that the read actually returned tmp bytes. On a truncated file str[] is left partially uninitialized, then str[tmp-1] is forced to NUL and gimp_any_to_utf8(str, -1, ...) runs strlen over uninitialized bytes. This is an uninitialized-memory read whose length is attacker-controlled (up to MAX_XCF_STRING_LEN = 16 MiB).","fix":"Capture the return value of xcf_read_int8 and, if fewer than tmp bytes were read, treat the string as truncated: NUL-terminate at the number of bytes actually read (or fail). Allocate with g_new0 to avoid reading uninitialized memory.","locations":[{"ref":"app/xcf/xcf-read.c:165-207","code":"  165 | guint\n  166 | xcf_read_string (XcfInfo  *info,\n  167 |                  gchar   **data,\n  168 |                  gint      count)\n  169 | {\n  170 |   guint total = 0;\n  171 |   gint  i;\n  172 | \n  173 |   for (i = 0; i < count; i++)\n  174 |     {\n  175 |       guint32 tmp;\n  176 | \n  177 |       total += xcf_read_int32 (info, &tmp, 1);\n  178 | \n  179 |       if (tmp > MAX_XCF_STRING_LEN)\n  180 |         {\n  181 |           g_warning (\"Maximum string length (%ld bytes) exceeded. \"\n  182 |                      \"Possibly corrupt XCF file.\", MAX_XCF_STRING_LEN);\n  183 |           data[i] = NULL;\n  184 |         }\n  185 |       else if (tmp > 0)\n  186 |         {\n  187 |           gchar *str;\n  188 | \n  189 |           str = g_new (gchar, tmp);\n  190 |           total += xcf_read_int8 (info, (guint8*) str, tmp);\n  191 | \n  192 |           if (str[tmp - 1] != '\\0')\n  193 |             str[tmp - 1] = '\\0';\n  194 | \n  195 |           data[i] = gimp_any_to_utf8 (str, -1,\n  196 |                                       _(\"Invalid UTF-8 string in XCF file\"));\n  197 | \n  198 |           g_free (str);\n  199 |         }\n  200 |       else\n  201 |         {\n  202 |           data[i] = NULL;\n  203 |         }\n  204 |     }\n  205 | \n  206 |   return total;\n  207 | }","lines":43}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"_gimp_pixbuf_from_data() trusts wire-supplied width/height/bpp and never validates the length of the incoming data buffer. The buffer originates from the core's thumbnail reply (_gimp_drawable_thumbnail / _gimp_drawable_sub_thumbnail). For bpp 1 and 2 it walks 'height' rows of 'width' pixels advancing src with no bound on data's actual size; for bpp 3/4 it hands width*bpp as rowstride to gdk_pixbuf_new_from_data covering width*height*bpp bytes. A core that returns a data buffer shorter than width*height*bpp (or inconsistent dimensions) causes a heap OOB read. The callers compute data_size via g_bytes_unref_to_data() but never check it (gimpdrawable.c:152, 257).","fix":"Pass the actual byte count into _gimp_pixbuf_from_data and verify data_size >= (gsize) width * height * bpp (computed in 64-bit) before any pixel access; return NULL (freeing data) on mismatch. Also reject bpp outside 1..4 before use.","locations":[{"ref":"libgimp/gimppixbuf.c:33-114","code":"   33 | GdkPixbuf *\n   34 | _gimp_pixbuf_from_data (guchar                 *data,\n   35 |                         gint                    width,\n   36 |                         gint                    height,\n   37 |                         gint                    bpp,\n   38 |                         GimpPixbufTransparency  alpha)\n   39 | {\n   40 |   GdkPixbuf *pixbuf;\n   41 | \n   42 |   switch (bpp)\n   43 |     {\n   44 |     case 1:\n   45 |       pixbuf = gdk_pixbuf_new (GDK_COLORSPACE_RGB, FALSE, 8, width, height);\n   46 |       {\n   47 |         guchar *src       = data;\n   48 |         guchar *pixels    = gdk_pixbuf_get_pixels (pixbuf);\n   49 |         gint    rowstride = gdk_pixbuf_get_rowstride (pixbuf);\n   50 |         gint    y;\n   51 | \n   52 | width * bpp,\n  108 |                                          (GdkPixbufDestroyNotify) g_free, NULL);\n  109 |       break;\n  110 | \n  111 |     default:\n  112 |       g_return_val_if_reached (NULL);\n  113 |       return NULL;\n  114 |     }","lines":82},{"ref":"libgimp/gimpdrawable.c:138-156","code":"  138 |   gsize      data_size;\n  139 |   GdkPixbuf *pixbuf = NULL;\n  140 | \n  141 |   g_return_val_if_fail (width  > 0 && width  <= 1024, NULL);\n  142 |   g_return_val_if_fail (height > 0 && height <= 1024, NULL);\n  143 | \n  144 |   data = gimp_drawable_get_thumbnail_data (drawable,\n  145 |                                            width,\n  146 |                                            height,\n  147 |                                            &thumb_width,\n  148 |                                            &thumb_height,\n  149 |                                            &thumb_bpp);\n  150 | \n  151 |   if (data)\n  152 |     pixbuf = _gimp_pixbuf_from_data (g_bytes_unref_to_data (data, &data_size),\n  153 |                                      thumb_width, thumb_height, thumb_bpp,\n  154 |                                      alpha);\n  155 | \n  156 |   return pixbuf;","lines":19},{"ref":"libgimp/gimpdrawable.c:238-260","code":"  238 |   gsize      data_size;\n  239 |   GdkPixbuf *pixbuf = NULL;\n  240 | \n  241 |   g_return_val_if_fail (src_x >= 0, NULL);\n  242 |   g_return_val_if_fail (src_y >= 0, NULL);\n  243 |   g_return_val_if_fail (src_width  > 0, NULL);\n  244 |   g_return_val_if_fail (src_height > 0, NULL);\n  245 |   g_return_val_if_fail (dest_width  > 0 && dest_width  <= 1024, NULL);\n  246 |   g_return_val_if_fail (dest_height > 0 && dest_height <= 1024, NULL);\n  247 | \n  248 |   data = gimp_drawable_get_sub_thumbnail_data (drawable,\n  249 |                                                src_x, src_y,\n  250 |                                                src_width, src_height,\n  251 | 70 |   gimp_tile.data = g_new (guchar,\n  271 |                           gimp_tile.ewidth * gimp_tile.eheight *\n  272 |                           priv->bpp);\n  273 | \n  274 |   if (gimp_tile.ewidth * gimp_tile.eheight * priv->bpp == tile_size)\n  275 |     {\n  276 |       memcpy (gimp_tile.data, tile_data, tile_size);","lines":10},{"ref":"libgimp/gimptilebackendplugin.c:386-387","code":"  386 |       tile->data = g_memdup2 (_gimp_shm_addr (),\n  387 |                               tile->ewidth * tile->eheight * priv->bpp);","lines":2},{"ref":"libgimp/gimptilebackendplugin.c:436-438","code":"  436 |       memcpy (_gimp_shm_addr (),\n  437 |               tile->data,\n  438 |               tile->ewidth * tile->eheight * priv->bpp);","lines":3}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"On the shared-memory tile paths, ewidth*eheight*bpp bytes are memdup'd out of (get) and memcpy'd into (put) the SHM segment with no check against the segment size. The segment is fixed at TILE_MAP_SIZE = tile_width*tile_height*32 (gimp-shm.c:64), implicitly assuming bpp <= 32. gimp_tile_put performs no validation of the incoming tile geometry before the memcpy into shm, so a bpp > 32 (or an overflowed product) produces an OOB write into the shared-memory segment.","fix":"Export the SHM segment size and verify (gsize) ewidth * eheight * bpp <= segment_size before the memdup/memcpy on both the get and put paths; bail out otherwise.","locations":[{"ref":"libgimp/gimptilebackendplugin.c:386-391","code":"  386 |       tile->data = g_memdup2 (_gimp_shm_addr (),\n  387 |                               tile->ewidth * tile->eheight * priv->bpp);\n  388 |     }\n  389 |   else\n  390 |     {\n  391 |       tile->data = tile_data->data;","lines":6},{"ref":"libgimp/gimptilebackendplugin.c:434-438","code":"  434 |   if (tile_info->use_shm)\n  435 |     {\n  436 |       memcpy (_gimp_shm_addr (),\n  437 |               tile->data,\n  438 |               tile->ewidth * tile->eheight * priv->bpp);","lines":5},{"ref":"libgimp/gimp-shm.c:64","code":"   64 | #define TILE_MAP_SIZE     (gimp_tile_width () * gimp_tile_height () * 32)","lines":1}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"_gp_tile_data_read computes `guint length = width * height * bpp` from three int32 fields read straight off the wire with no validation. The multiplication overflows (wrapping to a small value, or to a huge allocation), and the same unchecked `length` is then used for g_new() and the read. A malicious peer can trigger an overflowing or enormous allocation / mismatch. width/height/bpp are never sanity-checked.","fix":"Validate width, height and bpp against sane maxima and compute the size with overflow checking (e.g. g_uint_checked_mul or explicit checks); use g_try_new and fail gracefully on overflow or oversized requests.","locations":[{"ref":"libgimpbase/gimpprotocol.c:858-868","code":"  858 |   if (!tile_data->use_shm)\n  859 |     {\n  860 |       guint length = tile_data->width * tile_data->height * tile_data->bpp;\n  861 | \n  862 |       tile_data->data = g_new (guchar, length);\n  863 | \n  864 |       if (! _gimp_wire_read_int8 (channel,\n  865 |                                   (guint8 *) tile_data->data, length,\n  866 |                                   user_data))\n  867 |         goto cleanup;\n  868 |     }","lines":11}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"gimp_color_profile_is_equal does memcmp(profile1->data + header_len, ..., profile1->length - header_len) where header_len is sizeof(cmsICCHeader) (128) and length is taken verbatim from the (attacker-controlled) ICC blob. If length < 128, the subtraction underflows (gsize, unsigned) to a near-SIZE_MAX value and memcmp reads gigabytes past two small buffers: OOB read / crash.","fix":"Add a `profile1->length >= header_len` guard before the memcmp (and treat sub-header profiles as comparable only by full length/byte equality).","locations":[{"ref":"libgimpcolor/gimpcolorprofile.c:668-672","code":"  668 |   return profile1 == profile2                              ||\n  669 |          (profile1->length == profile2->length &&\n  670 |           memcmp (profile1->data + header_len,\n  671 |                   profile2->data + header_len,\n  672 |                   profile1->length - header_len) == 0);","lines":5}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"gimp_config_path_expand_only accumulates the expanded-path length into a signed `gint length`. The length is summed over all literal characters, every ~ expansion and every ${var} substitution in the first pass, then `g_new(gchar, length + 1)` allocates the buffer and a second pass writes the full expansion. A very long path (many/large substitutions, long home dir) can push `length` past INT_MAX, making it negative, under-allocating the buffer while the second pass writes the full output: heap buffer overflow from an oversized gimprc/config path string.","fix":"Make `length` a gsize and overflow-check each addition against a sane maximum, bailing out with a GIMP_CONFIG_ERROR_PARSE before the allocation.","locations":[{"ref":"libgimpconfig/gimpconfig-path.c:537","code":"  537 |   gint         length   = 0;","lines":1},{"ref":"libgimpconfig/gimpconfig-path.c:550","code":"  550 |           length += strlen (home);","lines":1},{"ref":"libgimpconfig/gimpconfig-path.c:611","code":"  611 |           length += strlen (substs[2*n_substs + 1]);","lines":1},{"ref":"libgimpconfig/gimpconfig-path.c:617","code":"  617 |           length += g_utf8_skip[(const guchar) *p];","lines":1},{"ref":"libgimpconfig/gimpconfig-path.c:625","code":"  625 |   expanded = g_new (gchar, length + 1);","lines":1}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"gimp_scanner_parse_data() copies `length` bytes from scanner->value.v_string with g_memdup2() but never checks that the scanned string is actually `length` bytes long, nor that `length` is non-negative. Callers pass file-controlled lengths: gimp_config_deserialize_parasite_value (data_length), gimp_config_deserialize_bytes (data_length) and gimp_scanner_parse_color (profile_data_length). A crafted config/XCF/preset file can declare a length far larger than the literal string token, causing g_memdup2 to read out of bounds (heap over-read, info leak or crash). A negative length becomes a huge size_t.","fix":"In gimp_scanner_parse_data, reject negative length and verify length <= strlen(scanner->value.v_string) (the scanner stores NUL-terminated, length-prefixed strings; track the real byte length). Have callers validate the declared length against the actual token length before allocating/copying.","locations":[{"ref":"libgimpconfig/gimpscanner.c:476-492","code":"  476 | gboolean\n  477 | gimp_scanner_parse_data (GimpScanner  *scanner,\n  478 |                          gint          length,\n  479 |                          guint8      **dest)\n  480 | {\n  481 |   if (g_scanner_peek_next_token (scanner) != G_TOKEN_STRING)\n  482 |     return FALSE;\n  483 | \n  484 |   g_scanner_get_next_token (scanner);\n  485 | \n  486 |   if (scanner->value.v_string)\n  487 |     *dest = g_memdup2 (scanner->value.v_string, length);\n  488 |   else\n  489 |     *dest = NULL;\n  490 | \n  491 |   return TRUE;\n  492 | }","lines":17},{"ref":"libgimpconfig/gimpconfig-deserialize.c:1191-1197","code":" 1191 |   if (! gimp_scanner_parse_int (scanner, &data_length))\n 1192 |     return G_TOKEN_INT;\n 1193 | \n 1194 |   if (! gimp_scanner_parse_data (scanner, data_length, &data))\n 1195 |     return G_TOKEN_STRING;\n 1196 | \n 1197 |   parasite = gimp_parasite_new (name, flags, data_length, r, validate bits_stored and high_bit: require 1 <= bits_stored <= bpp, high_bit < bpp, and high_bit+1 >= bits_stored. Reject the file otherwise. Compute and clamp shift amounts so they are always in [0, 15]/[0,7].","locations":[{"ref":"plug-ins/common/file-dicom.c:822","code":"  822 |       guint  shift = info->high_bit + 1 - info->bits_stored;","lines":1},{"ref":"plug-ins/common/file-dicom.c:829","code":"  829 |         buf16[pix_idx] = g_ntohs (GUINT16_SWAP_LE_BE  (buf16[pix_idx])) >> shift;","lines":1},{"ref":"plug-ins/common/file-dicom.c:862-863","code":"  862 |                   d[col_idx] = (guint8) (row_start[col_idx] >>\n  863 |                                          (info->bits_stored - 8));","lines":2},{"ref":"plug-ins/common/file-dicom.c:897","code":"  897 |                       d[col_idx] = row_start[col_idx] << (8 - info->bits_stored);","lines":1},{"ref":"plug-ins/common/file-dicom.c:657-663","code":"  657 |             case 0x0101:  /* bits stored */\n  658 |               bits_stored = ctx_us;\n  659 |               g_debug (\"bits stored: %d\", bits_stored);\n  660 |               break;\n  661 |             case 0x0102:  /* high bit */\n  662 |               high_bit = ctx_us;\n  663 |               g_debug (\"high bit: %d\", high_bit);","lines":7}]},{"id":"OVF_20","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"file-drhalo.c load_image(): in the RLE expansion, the repeat branch does 'memset(&pixels[pixel], repeat_val, value); pixel += value' and the literal branch 'pixels[pixel++] = ...' with no check that pixel+value <= max_pixels. The outer loop guard 'pixel < max_pixels' is only re-checked between lines, and x is bounded to header.Width but value (0..127) is added to pixel without clamping, so a line whose decoded run extends beyond the row writes past the end of the 'pixels' buffer (max_pixels = Width*Height) -> heap buffer overflow.","fix":"Before memset/writes, clamp 'value' so that pixel + value <= max_pixels (and x + value <= header.Width); abort the line if exceeded.","locations":[{"ref":"plug-ins/common/file-drhalo.c:334-336","code":"  334 |               memset (&pixels[pixel], repeat_val, value);\n  335 |               pixel += value;\n  336 |               x += value;","lines":3},{"ref":"plug-ins/common/file-drhalo.c:346-352","code":"  346 |               for (gint j = 0; j < value; j ++)\n  347 |                 {\n  348 |                   pixels[pixel++] = line_data[i++];\n  349 |                   if (line_data[i - 1] > highest_index)\n  350 |                     highest_index = line_data[i - 1];\n  351 |                 }\n  352 |               x += value;","lines":7},{"ref":"plug-ins/common/file-drhalo.c:264","code":"  264 |   while (y < header.Height && pixel < max_pixels)","lines":1}]},{"id":"OVF_21","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"GIF Jeff's Image Format loader: data_size is computed as 'len * height' (gint multiply) and may be doubled for alpha frames (lines 1543-1545), then 'g_try_malloc (data_size * 255)' is requested (line 1546). data_size is guint and 'data_size * 255' is an unsigned multiply that wraps for data_size > ~16.8M (e.g. a 4096x4096 frame: 16.7M*255 wraps). On wrap a far-too-small 'compressed' buffer is allocated, after which the block-copy loop at lines 1582-1593 bounds-checks against the wrapped '(data_size * 255)' value and may still permit writes past the real allocation, or the inflate output sized 'len*height' (line 1601) writes into 'indexes' whose true size differs from assumptions. The len*height multiply itself is also an unguarded gint multiply.","fix":"Use gsize arithmetic with explicit overflow checks for len*height and data_size*255 (or use g_try_malloc_n / g_size_checked_mul). Bound len and height before multiplying, and recompute the loop guard against the real allocation size rather than the possibly-wrapped value.","locations":[{"ref":"plug-ins/common/file-gif-load.c:1543-1547","code":" 1543 |   data_size = len * height;\n 1544 |   if (alpha_frame)\n 1545 |     data_size *= 2;\n 1546 |   compressed = g_try_malloc (data_size * 255);\n 1547 |   indexes    = g_try_malloc (data_size);","lines":5},{"ref":"plug-ins/common/file-gif-load.c:1582-1601","code":" 1582 |       for (gint i = 0; i < block_size; i++)\n 1583 |         {\n 1584 |           if ((i + count) >= (data_size * 255))\n 1585 |             {\n 1586 |               read_error (_(\"image data\"), *image, error);\n 1587 |               g_free (compressed);\n 1588 |               g_free (indexes);\n 1589 |               return FALSE;\n 1590 |             }\n 1591 | \n 1592 |           compressed[i + count] = block[i];\n 1593 |         }\n 1594 | \n 1595 |       count += block_size;\n 1596 |     }\n 1597 | \n 1598 |   zs.next_in   = (guchar *) compressed;\n 1599 |   zs.avail_in  = count;\n 1600 |   zs.next_out  = (guchar *) indexes;\n 1601 |   zs.avail_out = len * height;","lines":20}]},{"id":"OVF_22","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"HEIF load: attacker-controlled metadata block sizes are passed straight to\ng_alloca(), allowing an unbounded stack allocation. exif_data_size and\nxmp_data_size come from heif_image_handle_get_metadata_size() on a HEIF file\nthe user opened (fully untrusted). A crafted file can declare a huge Exif or\nXMP block (the size is a 32-bit/size_t field read from the container), and\ng_alloca() will move the stack pointer by that amount with no bounds check,\noverflowing the stack (crash, and potentially exploitable stack-clash). Even a\nmoderately large block can blow the stack of the plug-in process.","fix":"Do not use g_alloca() for file-supplied sizes. Allocate with g_malloc()/g_try_malloc()\n(checking for NULL and for a sane upper bound, e.g. reject sizes over a few MB),\nuse the heap buffer for heif_image_handle_get_metadata(), and g_free() it after use.","locations":[{"ref":"plug-ins/common/file-heif.c:1455-1459","code":" 1455 |           exif_data_size = heif_image_handle_get_metadata_size (handle, metadata_id);\n 1456 | \n 1457 |           exif_data = g_alloca (exif_data_size);\n 1458 | \n 1459 |           err = heif_image_handle_get_metadata (handle, metadata_id, exif_data);","lines":5},{"ref":"plug-ins/common/file-heif.c:1474-1478","code":" 1474 |               xmp_data_size = heif_image_handle_get_metadata_size (handle, metadata_id);\n 1475 | \n 1476 |               xmp_data = g_alloca (xmp_data_size);\n 1477 | \n 1478 |               err = heif_image_handle_get_metadata (handle, metadata_id, xmp_data);","lines":5}]},{"id":"OVF_23","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"file-iff.c load_image(): width, height and nPlanes come straight from the IFF BitMapHeader with no validation. deleave_indexed_row allocates 'row_length*8*nPlanes' and deleave_rgb_row 'row_length*8*pixel_size', but the body bitplane data pointer 'bitplanes' is advanced by (row_length*nPlanes) per row and indexed as bitplanes[i + row_length*k] (k<nPlanes) with NO check that the body chunk (true_image->body->chunkData) actually contains height*row_length*nPlanes bytes. A header claiming large width/height/nPlanes with a short BODY chunk causes large OOB reads of decompressed bitplane memory.","fix":"After ILBM_unpackByteRun, validate that body->chunkSize >= (gsize)row_length * nPlanes * height (and for PBM width*height); reject nPlanes outside 1..8 (or the supported set) and bound width/height to GIMP_MAX_IMAGE_SIZE before allocating/reading.","locations":[{"ref":"plug-ins/common/file-iff.c:339-343","code":"  339 |       width      = bitMapHeader->w;\n  340 |       height     = bitMapHeader->h;\n  341 |       nPlanes    = bitMapHeader->nPlanes;\n  342 |       row_length = ((width + 15) / 16) * 2;\n  343 |       pixel_size = nPlanes / 8;","lines":5} essed block_size. A crafted PAA whose declared estimated_size (derived from width*height) is larger than the actual compressed data lets raw_index run past the end of the g_malloc0(block_size) buffer -> out-of-bounds heap read. Symmetrically, uncompressed_data[data_index++] is written in the back-reference branch (lines 524-533) which copies up to b4 bytes while only checking '(b4+1) > estimated_size' once before the loop; estimated_size is decremented inside, but the literal/copy interplay can still drive data_index past the allocated uncompressed_data on malformed flag streams.","fix":"Pass the compressed buffer length to decode_lzss and bound raw_index against it on every read; bound data_index against the output buffer size on every write; abort decoding on any overrun.","locations":[{"ref":"plug-ins/common/file-paa.c:497-535","code":"  497 |       if (((flag >>= 1) & 256) == 0)\n  498 |           flag = raw_data[raw_index++] | 65280;\n  499 | \n  500 |       if ((flag & 1) != 0)\n  501 |         {\n  502 |           guchar value = raw_data[raw_index++];\n  503 | \n  504 |           uncompressed_data[data_index++] = value;\n  505 |           estimated_size--;\n  506 | \n  507 |           char_array[index] = value;\n  508 | \n  509 |           index = (index + 1) & 4095;\n  510 |         }\n  511 |       else\n  512 |         {\n  513 |           gint b1  = raw_data[raw_index++];\n  514 |           gint b2  = raw_data[raw_index++];\n  515 |           gint b3  = b1 | (b2 & 0xF0) << 4;\n  516 |           gint b4  = (b2 & 0x0F) + 2;\n  517 | \n  518 |           gint offset     = index - b3;\n  519 |           gint end_offset = b4 + offset;\n  520 | \n  521 |           if ((b4 + 1) > (guint32) estimated_size)\n  522 |             return FALSE;\n  523 | \n  524 |           for (; offset <= end_offset; offset++)\n  525 |             {\n  526 |               gint value = (gint) char_array[offset & 4095];\n  527 | \n  528 |               uncompressed_data[data_index++] = ile-pdf-load.c:779","code":"  779 |   scale = (gdouble) doc_width / extracted_data.width;","lines":1},{"ref":"plug-ins/common/file-pdf-load.c:799-801","code":"  799 |       poppler_page_get_size (page, &page_width, &page_height);\n  800 |       width  = (gint) ceil (page_width  * scale);\n  801 |       height = (gint) ceil (page_height * scale);","lines":3},{"ref":"plug-ins/common/file-pdf-load.c:815","code":"  815 |       surface = render_page_to_surface (page, width, height, scale,","lines":1}]},{"id":"OVF_30","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"file-pix.c load_esm_image() declares a stack VLA 'guchar buffer[file_size - 21]' where file_size is the attacker-controlled on-disk size of the .pix/.als file (read via g_seekable_tell). A large file produces an arbitrarily large stack allocation -> stack overflow / crash. There is no upper bound check, and file_size could even be < 21 (e.g. a 21-byte file), making file_size-21 == 0 or, if the seek/tell semantics differ, a huge size_t.","fix":"Do not use a VLA. Bound the size (reject files above a sane maximum), allocate with g_try_malloc, check for NULL, and free it. Also validate file_size >= 21 before subtracting.","locations":[{"ref":"plug-ins/common/file-pix.c:574","code":"  574 |       guchar          buffer[file_size - 21];","lines":1},{"ref":"plug-ins/common/file-pix.c:549-553","code":"  549 |   goffset         file_size;\n  550 | \n  551 |   g_seekable_seek (G_SEEKABLE (input), 0, G_SEEK_END, NULL, error);\n  552 |   file_size = g_seekable_tell (G_SEEKABLE (input));\n  553 |   g_seekable_seek (G_SEEKABLE (input), 21, G_SEEK_SET, NULL, error);","lines":5}]},{"id":"OVF_31","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"file-pix.c load_esm_image() reads only (file_size - 21) bytes into 'buffer' (sizeof(buffer) == file_size-21) but then writes file_size bytes from it: fwrite(buffer, sizeof(guchar), file_size, fp). This reads 21 bytes past the end of the buffer and writes them to the temp JPEG, an out-of-bounds stack read disclosing adjacent stack memory into the output file.","fix":"Write sizeof(buffer) (i.e. file_size - 21) bytes, not file_size: fwrite(buffer, 1, file_size - 21, fp).","locations":[{"ref":"plug-ins/common/file-pix.c:586","code":"  586 |       fwrite (buffer, sizeof (guchar), file_size, fp);","lines":1},{"ref":"plug-ins/common/file-pix.c:574-576","code":"  574 |       guchar          buffer[file_size - 21];\n  575 | \n  576 |       if (! g_input_stream_read_all (input, buffer, sizeof (buffer),","lines":3}]},{"id":"OVF_32","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"APNG acTL handler reads png_get_uint_32(chunk.data + 8) and png_get_uint_32(chunk.data + 12) (bytes 8-15) with no length check. A valid acTL payload is 8 bytes (chunk.size = 8+12 = 20), but a malformed acTL with declared length 0 produces a 12-byte buffer, making the read at offset 12-15 an out-of-bounds heap read.","fix":"Validate chunk.size >= 20 (4 length + 4 type + 8 data + 4 crc) before reading the acTL fields; otherwise treat the file as invalid.","locations":[{"ref":"plug-ins/common/file-png.c:1477-1478","code":" 1477 |                   frame_no    = png_get_uint_32 (chunk.data + 8);\n 1478 |                   playback_no = png_get_uint_32 (chunk.data + 12);","lines":2}]},{"id":"OVF_33","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"APNG fcTL handler reads fixed byte offsets up to chunk.data[33] (png_get_uint_32 at offset 24-27, png_get_uint_16 at 28-31, bytes 32 and 33) without ever validating that the chunk's declared length is large enough. read_apng_chunk() allocates a buffer of only (declared_len + 12) bytes; a malformed fcTL declaring a small length (e.g. 0) yields a 12-byte heap buffer, so all the reads from chunk.data+12 through chunk.data[33] are out-of-bounds heap reads on attacker-controlled input. The frame width/height/offset values harvested this way also drive subsequent allocation and pixel writes.","fix":"In read_apng_chunk() return the real payload size and have each chunk handler verify chunk.size is at least the number of bytes it reads before dereferencing (fcTL needs >= 12+26 = 38 bytes including the 4 length + 4 type + 26 data, acTL needs the 8 data bytes, etc.). Reject the file with an error if a chunk is shorter than required.","locations":[{"ref":"plug-ins/common/file-png.c:1511-1536","code":" 1511 |                   apng_frame.width     = png_get_uint_32 (chunk.data + 12);\n 1512 |                   apng_frame.height    = png_get_uint_32 (chunk.data + 16);\n 1513 |                   apng_frame.offset_x  = png_get_uint_32 (chunk.data + 20);\n 1514 |                   apng_frame.offset_y  = png_get_uint_32 (chunk.data + 24);\n 1515 |                   apng_frame.delay_num = png_get_uint_16 (chunk.data + 28);\n 1516 |                   apng_frame.delay_den = png_get_uint_16 (chunk.data + 30);\n 1517 | \n 1518 |                   region_width  = apng_frame.offset_x + apng_frame.width;\n 1519 |                   region_height = apng_frame.offset_y + apng_frame.height;\n 1520 | \n 1521 |                   if (region_width > (guint) gimp_image_get_width (image)  ||\n 1522 |                       region_height > (guint) gimp_image_get_height (image))\n 1523 |                     {\n 1524 |                       fclose (fp);\n 1525 |                       g_free (apng_frame.pixels);\n 1526 |                       g_free (prior_pixels);\n 1527 | \n 1528 |                       g_set_error (error, GIMP_PLUG_IN_ERROR, 0,\n 1529 |                                    _(\"Invalid APNG: fcTL frame dimensions \"\n 1530 |                                      \"exceed IHDR allocation\"));\n 1531 | \n 1532 |                       return FALSE;\n 1533 |                     }\n 1534 | \n 1535 |                   dispose_op = chunk.data[32];\n 1536 |                   blend_op   = chunk.data[33];","lines":26},{"ref":"plug-ins/common/file-png.c:2965-2991","code":" 2965 | static inline guint\n 2966 | read_apng_chunk (FILE      *f,\n 2967 |                  APNGChunk *chunk)\n 2968 | {\n 2969 |   guchar len[4];\n 2970 | \n 2971 |   chunk->size = 0;\n 2972 |   chunk->data = NULL;\n 2973 | \n 2974 |   if (fread (&len, 4, 1, f) == 1)\n 2975 |     {\n 2976 |       chunk->size = png_get_uint_32 (len);\n 2977 | \n 2978 |       if (chunk->size > PNG_USER_CHUNK_MALLOC_MAX)\n 2979 |         return 0;\n 2980 | \n 2981 |       chunk->size += 12;\n 2982 | \n 2983 |       chunk->data = g_malloc (chunk->size);\n 2984 |       memcpy (chunk->data, len, 4);\n 2985 | \n 2986 |       if (fread (chunk->data + 4, chunk->size - 4, 1, f) == 1)\n 2987 |         return *(guint *) (chunk->data + 4);\n 2988 |     }\n 2989 | \n 2990 |   return 0;\n 2991 | }","lines":27}]},{"id":"OVF_34","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"APNG fdAT handler computes png_save_uint_32 (chunk.data + 4, chunk.size - 16) and then process_apng_data (..., chunk.size - 4). chunk.size is guint. A malformed fdAT chunk with declared length < 4 (so chunk.size < 16 after the +12) makes chunk.size - 16 wrap to a huge unsigned value that is written as the fake IDAT length, and chunk.size - 4 can likewise underflow, feeding an enormous size into png_process_data. Also memcpy(chunk.data + 8, \"IDAT\", 4) assumes at least 12 bytes exist.","fix":"Verify chunk.size >= 16 before doing the fdAT rewrite/subtractions; reject shorter chunks. Use checked arithmetic for the rewritten length.","locations":[{"ref":"plug-ins/common/file-png.c:1551-1560","code":" 1551 |               else if (png_id == id_fdAT && is_animated)\n 1552 |                 {\n 1553 |                   /* Remove sequence number and rename chunk so that\n 1554 |                    * libpng thinks this is a regular IDAT chunk */\n 1555 |                   png_save_uint_32 (chunk.data + 4, chunk.size - 16);\n 1556 |                   memcpy (chunk.data + 8, \"IDAT\", 4);\n 1557 | \n 1558 |                   if (! process_apng_data (pp, info, chunk.data + 4,\n 1559 |                                            chunk.size - 4))\n 1560 |                     break;","lines":10}]},{"id":"OVF_35","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"PSP selection block computes width/height as unsigned subtractions of attacker-controlled rect coordinates with no validation, then allocates and decodes a pixel buffer from them. rect[2]-rect[0] / rect[3]-rect[1] are stored into gint with no check that rect[2] >= rect[0]; a negative or huge result feeds g_try_malloc0((gsize) width * height) and the subsequent fread / read_channel_data, gegl_buffer_set with width/height. Unlike read_layer_block (which validates), this path has no dimension sanity check, allowing huge/negative dimensions and out-of-bounds writes during decode.","fix":"Validate width and height the same way read_layer_block does (reject < 0 or > GIMP_MAX_IMAGE_SIZE and oversized products) before allocating or decoding the selection channel.","locations":[{"ref":"plug-ins/common/file-psp.c:2519-2521","code":" 2519 |   swab_rect (rect);\n 2520 |   width  = rect[2] - rect[0];\n 2521 |   height = rect[3] - rect[1];","lines":3},{"ref":"plug-ins/common/file-psp.c:2591-2605","code":" 2591 |   pixels = g_try_malloc0 ((gsize) width * height);\n 2592 |   if (pixels == NULL)\n 2593 |     {\n 2594 |       g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n 2595 |                    _(\"Error reading channel information chunk\"));\n 2596 |       return -1;\n 2597 |     }\n 2598 | \n 2599 |   selection = gimp_image_get_selection (image);\n 2600 |   buffer    = gimp_drawable_get_buffer (GIMP_DRAWABLE (selection));\n 2601 | \n 2602 |   /* Per the specification, this will always be a 1 byte grayscale channel */\n 2603 |   if (ia->compression == PSP_COMP_NONE)\n 2604 |     {\n 2605 |       fread (pixels, (gsize) width * height, 1, f);","lines":15},{"ref":"plug-ins/common/file-psp.c:2619","code":" 2619 |   gegl_buffer_set (buffer, GEGL_RECTANGLE (0, 0, width, height), 0,","lines":1}]},{"id":"OVF_36","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"file-pvr.c load_image(): in the compressed/VQ branch, 'data = g_try_malloc (header_file_size - mipmap_offset)'. header_file_size is derived from the file header (clamped to file_size, then header_file_size -= 8 and -= code_data_size). mipmap_offset grows each mipmap iteration (+= mipmap_size, 0x10<<(i*2)) and can exceed header_file_size, making the subtraction wrap to a huge size_t for g_try_malloc and making 'temp_size = header_file_size - mipmap_offset' negative; that negative is then passed to fread as size_t (huge). OOB/huge allocation and read.","fix":"Track sizes as signed and verify mipmap_offset <= header_file_size before subtracting; abort the loop when the remaining size would be <= 0.","locations":[{"ref":"plug-ins/common/file-pvr.c:532","code":"  532 |           data = g_try_malloc (header_file_size - mipmap_offset);","lines":1},{"ref":"plug-ins/common/file-pvr.c:553-557","code":"  553 |           temp_size -= mipmap_offset;\n  554 |           fseek (fp, mipmap_offset, SEEK_CUR);\n  555 | \n  556 |           /* Read rest of data */\n  557 |           if (fread (data, sizeof (guchar), temp_size, fp) != temp_size)","lines":5},{"ref":"plug-ins/common/file-pvr.c:592","code":"  592 |           mipmap_offset += mipmap_size;","lines":1}]},{"id":"OVF_37","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"file-pvr.c pvr_decode_compressed(): 'p = data[twiddle_index]' indexes the decompressed 'data' buffer with twiddle_index = ((twiddle[x]<<1)|twiddle[y]) where x<width/2, y<height/2, and twiddle[] values are up to ~1023; there is NO bounds check that twiddle_index is within the 'data' buffer (sized header_file_size - mipmap_offset, attacker-controlled and possibly tiny) -> out-of-bounds heap read. Then code_offset = p*n_components*4 indexes codebook[256*4*n_components]; p can be up to 255 so code_offset+... reaches 255*n_components*4 + 3*n_components < 256*4*n_components (in bounds), but for small-VQ formats the codebook is only populated for the smaller code_data_size that was actually read, so indices beyond that read uninitialized stack memory (info leak).","fix":"Bound twiddle_index against the actual size of the 'data' buffer before reading; pass the real code_data_size into pvr_decode_compressed and fully zero/validate the codebook; avoid VLAs sized by n_components.","locations":[{"ref":"plug-ins/common/file-pvr.c:862-890","code":"  862 |   for (gint y = 0; y < (height / 2); y++)\n  863 |     {\n  864 |       gint offset = ((y * 2) * width * n_components);\n  865 | \n  866 |       for (gint x = 0; x < (width / 2); x++)\n  867 |         {\n  868 |           gint twiddle_index = (((twiddle[x] << 1) | twiddle[y]));\n  869 |           gint p;\n  870 |           gint code_offset;\n  871 | \n  872 |           p = data[twiddle_index];\n  873 | \n  874 |           /* Account for 4 pixels per offset */\n  875 |           code_offset = p * n_components * 4;\n  876 | \n  877 |           for (gint i = 0; i < n_components; i++)\n  878 |             pixels[offset + i] = codebook[code_offset + i];\n  879 | \n  880 |           for (gint i = 0; i < n_components; i++)\n  881 |             pixels[offset + i + (width * n_components)] =\n  882 |               codebook[code_offset + i + n_components];\n  883 | \n  884 |           for (gint i = 0; i < n_components; i++)\n  885 |             pixels[offset + n_components + i] =\n  886 |               codebook[code_offset + i + (n_components * 2)];\n  887 | \n  888 |           for (gint i = 0; i < n_components; i++)\n  889 |             pixels[offset + n_components + i + (width * n_components)] =\n  890 |               codebook[code_offset + i + (n_components * 3)];","lines":29},{"ref":"plug-ins/common/file-pvr.c:831-832","code":"  831 |   gint        code_data_size = 256 * 2 * 4;\n  832 |   guchar      codebook[256 * 4 * n_components];","lines":2}]},{"id":"OVF_38","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Integer overflow in the rasterization allocation. width and height are gint coming from wmf_display_size() or the user-controlled requested_width/requested_height, and the size is computed as width * height * sizeof(guchar) * 4 in 'int' arithmetic before being widened to the gsize argument of g_try_malloc(). A malicious WMF whose display size (or the dialog-supplied dimensions) makes width*height*4 exceed INT_MAX wraps to a small/negative value, so g_try_malloc allocates a tiny buffer while the conversion loop below writes width*height*4 bytes, producing a heap buffer overflow.","fix":"Compute the size with 64-bit / gsize math and validate before allocating, e.g. 'if (width <= 0 || height <= 0 || (guint64) width * height > (G_MAXSIZE / 4)) return NULL;' then 'g_try_malloc ((gsize) width * height * 4)'. Also clamp width/height to a sane maximum derived from resolution.","locations":[{"ref":"plug-ins/common/file-wmf.c:468","code":"  468 |   pixels = (guchar *) g_try_malloc (width * height * sizeof (guchar) * 4);","lines":1},{"ref":"plug-ins/common/file-wmf.c:474-493","code":"  474 |   for (i = 0; i < height; i++)\n  475 |     for (j = 0; j < width; j++)\n  476 |       {\n  477 |         guchar r, g, b, a;\n  478 |         guint  pixel = (guint) (*gd_ptr++);\n  479 | \n  480 |         b = (guchar) (pixel & 0xff);\n  481 |         pixel >>= 8;\n  482 |         g = (guchar) (pixel & 0xff);\n  483 |         pixel >>= 8;\n  484 |         r = (guchar) (pixel & 0xff);\n  485 |         pixel >>= 7;\n  486 |         a = (guchar) (pixel & 0xfe);\n  487 |         a ^= 0xff;\n  488 | \n  489 |         *px_ptr++ = r;\n  490 |         *px_ptr++ = g;\n  491 |         *px_ptr++ = b;\n  492 |         *px_ptr++ = a;\n  493 |       }","lines":20}]},{"id":"OVF_39","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"XPM parse_image() dereferences cmap using indices taken directly from the libXpm-decoded pixel data: val = *(src++) * 4; cmap[val..val+3]. cmap is allocated as 4 * xpm_image->ncolors bytes in parse_colors(). There is no check that each pixel index is < ncolors, so a crafted XPM whose body references a color index >= ncolors (or ncolors == 0) causes an out-of-bounds heap read of up to 4 bytes per pixel that are then written into the layer. ncolors is also never validated to be > 0 before the g_new0(4 * ncolors).","fix":"Validate xpm_image->ncolors > 0 after XpmReadFileToXpmImage, and bounds-check each pixel value (val/4 < ncolors) before indexing cmap, erroring out on an out-of-range index.","locations":[{"ref":"plug-ins/common/file-xpm.c:541-558","code":"  541 |   src  = xpm_image->data;\n  542 |   for (i = 0; i < xpm_image->height; i += tile_height)\n  543 |     {\n  544 |       gint j;\n  545 | \n  546 |       dest = buf;\n  547 |       scanlines = MIN (tile_height, xpm_image->height - i);\n  548 |       j = scanlines * xpm_image->width;\n  549 |       while (j--)\n  550 |         {\n  551 |           {\n  552 |             val = *(src++) * 4;\n  553 |             *(dest)   = cmap[val];\n  554 |             *(dest+1) = cmap[val+1];\n  555 |             *(dest+2) = cmap[val+2];\n  556 |             *(dest+3) = cmap[val+3];\n  557 |             dest += 4;\n  558 |           }","lines":18},{"ref":"plug-ins/common/file-xpm.c:444","code":"  444 |   cmap = g_new0 (guchar, 4 * xpm_image->ncolors);","lines":1}]},{"id":"OVF_40","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"loadit() parses an untrusted .preset file line by line, writing each parsed texture into s.com.texture[i] where i = s.com.numtexture and incrementing numtexture once per line, with no check against MAXTEXTUREPEROBJ (20). A preset file with more than 20 data lines overflows the fixed-size texture[MAXTEXTUREPEROBJ] array inside the global 'sphere s', corrupting adjacent globals (numnormal, normal[], etc.) - a classic out-of-bounds write driven entirely by attacker-controlled file content. The loaded data is then used by the raytracer.","fix":"Bound the loop: stop (break) when s.com.numtexture >= MAXTEXTUREPEROBJ before writing t = &s.com.texture[i], and ideally emit a warning that the file was truncated.","locations":[{"ref":"plug-ins/common/sphere-designer.c:2112-2170","code":" 2112 |   while (!feof (f))\n 2113 |     {\n 2114 | \n 2115 |       if (!fgets (line, 1023, f))\n 2116 |         break;\n 2117 | \n 2118 |       i = s.com.numtexture;\n 2119 |       t = &s.com.texture[i];\n 2120 |       setdefaults (t);\n 2121 | \n 2122 | #ifndef _UCRT\n 2123 |       if (sscanf (line, fmt_str, &t->majtype, &t->type, end) != 3)\n 2124 | #else\n 2125 |       if (sscanf_s (line, fmt_str, &t->majtype, &t->type, end) != 3)\n 2126 | #endif\n 2127 |         t->color1.x = g_ascii_strtod (end, &end);\n 2128 |       if (end && errno != ERANGE)\n 2129 |         t->color1.y = g_ascii_strtod (end, &end);\n 2130 |       if (end && errno != ERANGE)\n 2131 |         t->color1.z = g_ascii_strtod (end, &end);\n 2132 |       if (end && errno != ERANGE)\n 2133 |         t->color1.w = g_ascii_strtod (end, &end);\n 2134 |       if (end && errno != ERANGE)\n 2135 |         t->color2.x = g_ascii_strtod (end, &end);\n 2136 |       if (end && errno != ERANGE)\n 2137 |         t->color2.y = g_ascii_strtod (end, &end);\n 2138 |       if (end && errno != ERANGE)\n 2139 |         t->color2.z = g_ascii_strtod (end, &end);\n 2140 |       if (end && errno != ERANGE)\n 2141 |         t->color2.w = g_ascii_strtod (end, &end);\n 2142 |       if (end && errno != ERANGE)\n 2143 |         t->oscale = g_ascii_strtod (end, &end);\n 2144 |       if (end && errno != ERANGE)\n 2145 |         t->turbulence.x = g_ascii_strtod (end, &end);\n 2146 |       if (end && errno != ERANGE)\n 2147 |         t->amount = g_ascii_strtod (end, &end);\n 2148 |       if (end && errno != ERANGE)\n 2149 |         t->exp = g_ascii_strtod (end, &end);\n 2150 |       if (end && errno != ERANGE)\n 2151 |         t->scale.x = g_ascii_strtod (end, &end);\n 2152 |       if (end && errno != ERANGE)\n 2153 |         t->scale.y = g_ascii_strtod (end, &end);\n 2154 |       if (end && errno != ERANGE)\n 2155 |         t->scale.z = g_ascii_strtod (end, &end);\n 2156 |       if (end && errno != ERANGE)\n 2157 |         t->rotate.x = g_ascii_strtod (end, &end);\n 2158 |       if (end && errno != ERANGE)\n 2159 |         t->rotate.y = g_ascii_strtod (end, &end);\n 2160 |       if (end && errno != ERANGE)\n 2161 |         t->rotate.z = g_ascii_strtod (end, &end);\n 2162 |       if (end && errno != ERANGE)\n 2163 |         t->translate.x = g_ascii_strtod (end, &end);\n 2164 |       if (end && errno != ERANGE)\n 2165 |         t->translate.y = g_ascii_strtod (end, &end);\n 2166 |       if (end && errno != ERANGE)\n 2167 |         t->translate.z = g_ascii_strtod (end, &end);\n 2168 | \n 2169 |       s.com.numtexture++;\n 2170 |     }","lines":59},{"ref":"plug-ins/common/sphere-designer.c:2118-2119","code":" 2118 |       i = s.com.numtexture;\n 2119 |       t = &s.com.texture[i];","lines":2}]},{"id":"OVF_41","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"The header-vs-filesize sanity check computes 'file_size - sizeof (hdr)' in unsigned (gsize) arithmetic. If the file is smaller than sizeof(dds_header_t) (128 bytes) - which is reachable because the read_header() failure is ignored (see separate finding) - the subtraction underflows to a huge gsize "plug-ins/file-fits/fits.c:493-497","code":"  493 |         pixels =\n  494 |           (gdouble *) g_try_malloc (width * sizeof (gdouble) * channels);\n  495 |       else\n  496 |         pixels =\n  497 |           (gdouble *) g_try_malloc (width * height * sizeof (gdouble) * channels);","lines":5},{"ref":"plug-ins/file-fits/fits.c:567","code":"  567 |           gint total_size = width * height * channels;","lines":1},{"ref":"plug-ins/file-fits/fits.c:569-601","code":"  569 |           fits_read_img (ifp, TDOUBLE, 1, total_size, &replace_val,\n  570 |                          pixels, NULL, &status);\n  571 | \n  572 |           if (! status)\n  573 |             {\n  574 |               gdouble *temp;\n  575 | \n  576 |               temp = (gdouble *) malloc (width * height * sizeof (gdouble) * channels);\n  577 | \n  578 |               if (temp == NULL)\n  579 |                 {\n  580 |                   g_set_error (error, G_FILE_ERROR, 0,\n  581 |                                \"Memory could not be allocated.\");\n  582 |                   fits_close_file (ifp, &status);\n  583 |                   g_object_unref (buffer);\n  584 |                   return image;\n  585 |                 }\n  586 | \n  587 |               if (datamin < datamax)\n  588 |                 {\n  589 |                   for (gint ii = 0; ii < total_size; ii++)\n  590 |                     pixels[ii] = (pixels[ii] - datamin) / (datamax - datamin);\n  591 |                 }\n  592 | \n  593 |               for (gint ii = 0; ii < (total_size / 3); ii++)\n  594 |                 {\n  595 |                   temp[(ii * 3)]     = pixels[ii];\n  596 |                   temp[(ii * 3) + 1] = pixels[ii + (total_size / 3)];\n  597 |                   temp[(ii * 3) + 2] = pixels[ii + ((total_size / 3) * 2)];\n  598 |                 }\n  599 | \n  600 |               gegl_buffer_set (buffer, GEGL_RECTANGLE (0, 0, width, height), 0,\n  601 |                                format, temp, GEGL_AUTO_ROWSTRIDE);","lines":33}]},{"id":"OVF_43","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"icns_slurp() 32-bit branch reads 4 bytes per pixel but the bounds check only rejects when cursor >= size+2. When cursor == size-1, the check passes yet the three following icns->data[icns->cursor++] reads at lines 314-318 access data[size], data[size+1], data[size+2], i.e. up to 3 bytes past the end of the heap-allocated resource buffer. A crafted icns 'is32'/'il32'/etc. resource whose declared icon dimensions exceed its actual payload triggers an out-of-bounds heap read.","fix":"Require at least 4 bytes available before reading: change the guard to 'if (icns->cursor + 4 > icns->size)'. Drop the bogus '+ 2' slack.","locations":[{"ref":"plug-ins/file-icns/file-icns-load.c:305-318","code":"  305 |       case 32:\n  306 |         for (out = 0; out < max; out++)\n  307 |           {\n  308 |             if (icns->cursor >= (icns->size + 2))\n  309 |               {\n  310 |                 g_message (\"Invalid or corrupt icns resource file.\");\n  311 |                 return;\n  312 |               }\n  313 | \n  314 |             dest[out * 4]     = icns->data[icns->cursor++];\n  315 |             dest[out * 4 + 1] = icns->data[icns->cursor++];\n  316 |             dest[out * 4 + 2] = icns->data[icns->cursor++];\n  317 |             /* Throw away alpha, use the mask */\n  318 |             icns->cursor++;","lines":14}]},{"id":"OVF_44","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"icns_decompress() reads the run-control byte 'run = image->data[image->cursor++]' at the top of the loop (line 384) with no check that image->cursor < image->size. The inner bound checks only happen after this read. On the first iteration of any channel - or after a run consumes the rest of the buffer - this reads past the end of the resource. The 'it32' path additionally does 'image->cursor += 4' at line 377 with no size check, so a short it32 resource makes the first run-byte read start already out of bounds.","fix":"Before line 384 add 'if (image->cursor >= image->size) { g_message(...); return FALSE; }'. Also validate 'image->cursor + 4 <= image->size' before the it32 cursor advance at line 377.","locations":[{"ref":"plug-ins/file-icns/file-icns-load.c:376-384","code":"  376 |   if (! strncmp (icontype->type, \"it32\", 4))\n  377 |     image->cursor += 4;\n  378 | \n  379 |   for (channel = 0; channel < n_channels; channel++)\n  380 |     {\n  381 |       out = 0;\n  382 |       while (out < max)\n  383 |         {\n  384 |           run = image->data[image->cursor++];","lines":9}]},{"id":"OVF_45","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"icns_decompress() mask fallback copies 'max' (width*height) alpha bytes from mask->data with a post-increment cursor and no bounds check whatsoever (line 450). A resource pairing a large icon type with a short mask resource produces a heap out-of-bounds read of up to width*height bytes.","fix":"Guard each read: inside the loop check 'if (mask->cursor >= mask->size) break;' (or validate mask->size >= mask->cursor + max up front) before 'dest[out*4+3] = mask->data[mask->cursor++];'.","locations":[{"ref":"plug-ins/file-icns/file-icns-load.c:444-451","code":"  444 |   else if (mask)\n  445 |     {\n  446 |       gchar typestring[5];\n  447 |       fourcc_get_string (mask->type, typestring);\n  448 | \n  449 |       for (out = 0; out < max; out++)\n  450 |         dest[out * 4 + 3] = mask->data[mask->cursor++];\n  451 |     }","lines":8}]},{"id":"OVF_46","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"ico_read_icon() trusts data.used_clrs (guint32 read from the embedded BMP header) for 8/4/1-bpp images. It allocates 'palette = g_new0(guint32, data.used_clrs)' and reads 'data.used_clrs * 4' bytes (line 502-505); 'data.used_clrs * 4' is computed in int, so values > ~0x3FFFFFFF overflow to a small/negative size while g_new0 attempts a huge allocation. More seriously, the per-pixel palette index is never clamped to used_clrs: the 8-bpp path does 'palette[ico_get_byte_from_data(...)]' where the index is 0-255, so a file declaring used_clrs < 256 (e.g. 2) causes an out-of-bounds palette read for any pixel byte >= used_clrs. The 4-bpp/1-bpp index sizes happen to fit a full 1<<bpp table only when used_clrs is not shrunk by the file.","fix":"Validate used_clrs <= (1 << data.bpp) and use a size-checked multiply for the read length; clamp every palette index with MIN(index, data.used_clrs - 1) before indexing palette[].","locations":[{"ref":"plug-ins/file-ico/ico-load.c:494-588","code":"  494 |   if (data.bpp <= 8)\n  495 |     {\n  496 |       if (data.used_clrs == 0)\n  497 |         data.used_clrs = (1 << data.bpp);\n  498 | \n  499 |       D((\"  allocating a %i-slot palette for %i bpp.\\n\",\n  500 |          data.used_clrs, data.bpp));\n  501 | \n  502 |       palette = g_new0 (guint32, data.used_clrs);\n  503 |       if (ico_read_int8 (fp,\n  504 |                          (guint8 *) palette,\n  505 |                          data.used_clrs * 4) != (data.used_clrs * 4))\n  506 |         {\n  507 |           D((\"skipping image: too large\\n\"));\n  508 |           return FALSE;\n  509 |         }\n  510 | \n  511 |     }\n  512 | \n  513 |   xor_map = ico_alloc_map (w, h, data.bpp, &length);\n  514 |   if (ico_read_int8 (fp, xor_map, length) != length)\n  515 |     {\n  516 |       D((\"skipping image: too large\\n\"));\n  517 |       return FALSE;\n  518 |     }\n  519 |   D((\"  length of xor_map: %i\\n\", length));\n  520 | \n  521 |   /* Read in and_map. It's padded out to 32 bits per line: */\n  522 |   and_map = ico_alloc_map (w, h, 1, &length);\n  523 |   if (ico_read_int8 (fp, and_map, length) != length)\n  524 |     {\n  525 |       D((\"skip
