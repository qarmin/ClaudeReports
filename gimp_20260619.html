its g_critical(\"... Use \\\"%s\\\" instead.\", ..., gimp_choice_get_redirect(...)) but a deprecated nick may legitimately have a NULL redirect (the documented deprecation-period case). Passing NULL to %s is undefined behaviour on some libcs and otherwise prints a misleading 'Use \"(null)\" instead'.","fix":"Only append the 'Use ... instead' clause when gimp_choice_get_redirect() returns non-NULL.","locations":[{"ref":"libgimpbase/gimpchoice.c:657-668","code":"  657 |   if (gimp_choice_get_deprecated (choice, strval) &&\n  658 |       /* Typically when calling a PDB procedure, we will first set\n  659 |        * properties to a GimpProcedureConfig, which will later be copied\n  660 |        * to a second one prefixed with \"GimpProcedureConfigRun-\".\n  661 |        * Plug-in developers don't have much say to this second config\n  662 |        * object, so let's avoid 2 WARNINGs for a single object set.\n  663 |        */\n  664 |       ! g_str_has_prefix (g_type_name (pspec->owner_type), \"GimpProcedureConfigRun-\"))\n  665 |     g_critical (\"Value \\\"%s\\\" is deprecated for property \\\"%s\\\" of %s. \"\n  666 |                 \"Use \\\"%s\\\" instead.\", strval,\n  667 |                 pspec->name, g_type_name (pspec->owner_type),\n  668 |                 gimp_choice_get_redirect (choice, strval));","lines":12}]},{"id":"ERR_52","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gimp_config_writer_new_from_file: when g_file_make_directory_with_parents fails and the caller passed error == NULL, g_prefix_error is a no-op and the `if (error && *error)` guard is false, so the failure is silently swallowed and execution continues to g_file_replace. Directory-creation errors are lost when the caller does not request a GError.","fix":"Capture the failure into a local GError regardless of the caller's error argument and abort the writer setup on failure.","locations":[{"ref":"libgimpconfig/gimpconfigwriter.c:148-160","code":"  148 |   dir = g_file_get_parent (file);\n  149 |   if (dir && ! g_file_query_exists (dir, NULL))\n  150 |     {\n  151 |       if (! g_file_make_directory_with_parents (dir, NULL, error))\n  152 |         g_prefix_error (error,\n  153 |                         _(\"Could not create directory '%s' for '%s': \"),\n  154 |                         gimp_file_get_utf8_name (dir),\n  155 |                         gimp_file_get_utf8_name (file));\n  156 |     }\n  157 |   g_object_unref (dir);\n  158 | \n  159 |   if (error && *error)\n  160 |     return NULL;","lines":13}]},{"id":"ERR_53","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"p_load_pointfile() reads an untrusted .points file. When a KEY_VAL_Y line parses two ints, it stores them with 'cd->curve[OUTLINE_UPPER][ci] = iuy;' where iuy/ily are plain int from sscanf %d, with no range check to 0..255 before narrowing to guchar. While the destination is guchar (so no overflow), out-of-range values silently wrap, and the file format invariants (0<=y<=255) are not enforced; combined with the lack of validation this is fragile error handling of attacker-supplied input.","fix":"Validate iuy/ily are within [0,255] (and fux..fly within [0,1] or -1) before storing; reject or clamp otherwise.","locations":[{"ref":"plug-ins/common/curve-bend.c:856-874","code":"  856 |           if (strncmp (buff, KEY_VAL_Y, len) == 0)\n  857 |             {\n  858 | #ifndef _UCRT\n  859 |               n = sscanf (&buff[len], \"%d %d\", &iuy, &ily);\n  860 | #else\n  861 |               n = sscanf_s (&buff[len], \"%d %d\", &iuy, &ily);\n  862 | #endif\n  863 | \n  864 |               if ((n == 2) && (ci < 256))\n  865 |                 {\n  866 |                   cd->curve[OUTLINE_UPPER][ci] = iuy;\n  867 |                   cd->curve[OUTLINE_LOWER][ci] = ily;\n  868 |                   ci++;\n  869 |                 }\n  870 |               else\n  871 |                 {\n  872 |                   g_printf(\"warning: BAD y_vals[%d] in file %s are ignored\\n\", ci, filename);\n  873 |                 }\n  874 |             }","lines":19}]},{"id":"ERR_54","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"file-cel.c need_palette(): 'n_read = fread(header, 32, 1, fp)' reads one 32-byte item; on a file shorter than 32 bytes fread returns 0 and the error is reported, but the function reads header[5] only after confirming n_read>=1, which is fine. However cel_load() calls need_palette and on a file of exactly e.g. 6-31 bytes the load is rejected as 'EOF while reading header' even though the new-style/old-style loaders only require 4 or 32 bytes respectively - a 4-byte old-style CEL that legitimately lacks 32 bytes is rejected. Minor correctness/usability issue, not memory-unsafe.","fix":"Read only the bytes needed to decide (peek header[5]) or handle short old-style files explicitly.","locations":[{"ref":"plug-ins/common/file-cel.c:335-346","code":"  335 |   n_read = fread (header, 32, 1, fp);\n  336 | \n  337 |   fclose (fp);\n  338 | \n  339 |   if (n_read < 1)\n  340 |     {\n  341 |       g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  342 |                    _(\"EOF or error while reading image header\"));\n  343 |       return FALSE;\n  344 |     }\n  345 | \n  346 |   return (header[5] < 32);","lines":12}]},{"id":"ERR_55","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"file-cel.c load_palette(): in the bpp==12 branch the EOF check is inverted/incorrect: 'if (n_read == 1)' is treated as the error ('EOF or error while reading palette data') while a true short read of 1 byte out of the requested 2 is actually a partial read. Reading 2 bytes returns 2 on success; n_read==1 means a 1-byte partial read which is correctly an error, but the success case (n_read==2) falls through fine - however n_read==0 returns -1 silently without setting the parse error, and the comparison logic is duplicated inconsistently with the trailing else-branch (lines 759-771) which treats n_read==1 as error too. The 24-bit branch checks 'n_read < 3*colors' using a byte count from g_input_stream_read (correct). The mismatch between item-style and byte-style read accounting is error-prone.","fix":"Use g_input_stream_read_all and check bytes_read == requested; unify the partial-read handling.","locations":[{"ref":"plug-ins/common/file-cel.c:703-718","code":"  703 |               n_read = g_input_stream_read (G_INPUT_STREAM (input), buffer, 2, NULL, error);\n  704 | \n  705 |               if (n_read == 1)\n  706 |                 {\n  707 |                   g_object_unref (input);\n  708 |                   g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  709 |                                _(\"'%s': EOF or error while reading \"\n  710 |                                  \"palette data\"),\n  711 |                                gimp_file_get_utf8_name (file));\n  712 |                   return -1;\n  713 |                 }\n  714 |               else if (n_read < 1)\n  715 |                 {\n  716 |                   g_object_unref (input);\n  717 |                   return -1;\n  718 |                 }","lines":16},{"ref":"plug-ins/common/file-cel.c:757-771","code":"  757 |           n_read = g_input_stream_read (G_INPUT_STREAM (input), buffer, 2, NULL, error);\n  758 | \n  759 |           if (n_read < 1)\n  760 |             {\n  761 |               g_object_unref (input);\n  762 |               return -1;\n  763 |             }\n  764 |           else if (n_read == 1)\n  765 |             {\n  766 |               g_object_unref (input);\n  767 |               g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  768 |                            _(\"'%s': EOF or error while reading palette data\"),\n  769 |                            gimp_file_get_utf8_name (file));\n  770 |               return -1;\n  771 |             }","lines":15}]},{"id":"ERR_56","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"DICOM reads multi-byte header fields with fread but ignores the return values (element_word, value_rep, element_length variants, and the initial 128-byte / 4-byte reads). On a truncated file this uses uninitialized stack data; e.g. value_rep at line 419 / element_length_chars at 455 may be partially uninitialized and then cast to int (lines 460/463), and ctx_us = *(guint16*)value is taken from a buffer whose fread (line 523) may have been short (handled) but the header fread results themselves are unchecked.","fix":"Check the return value of each fread and break/error out of the parsing loop on a short read instead of proceeding with uninitialized data.","locations":[{"ref":"plug-ins/common/file-dicom.c:370","code":"  370 |   fread (buf, 1, 128, dicom); /* skip past buffer */","lines":1},{"ref":"plug-ins/common/file-dicom.c:383","code":"  383 |   fread (buf, 1, 4, dicom); /* This should be dicom */","lines":1},{"ref":"plug-ins/common/file-dicom.c:409-410","code":"  409 |       fread (&element_word, 1, 2, dicom);\n  410 |       element_word = g_ntohs (GUINT16_SWAP_LE_BE (element_word));","lines":2},{"ref":"plug-ins/common/file-dicom.c:419","code":"  419 |       fread(value_rep, 2, 1, dicom);","lines":1},{"ref":"plug-ins/common/file-dicom.c:455","code":"  455 |           fread (&element_length_chars[2], 1, 2, dicom);","lines":1},{"ref":"plug-ins/common/file-dicom.c:471-472","code":"  471 |           fread (&element_length, 1, 2, dicom); /* skip two bytes */\n  472 |           fread (&element_length, 1, 4, dicom);","lines":2}]},{"id":"ERR_57","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"HEIF load: the file-read error check is logically wrong. The code does\n  if (! g_input_stream_read_all (...) && bytes_read == 0)\nso a short/failed read that still returned some bytes (read_all returns FALSE\nwith bytes_read > 0) does NOT trigger the error branch. Execution continues and\nthe full file_size-sized buffer (whose tail is uninitialized heap from g_malloc)\nis handed to heif_context_read_from_memory with the declared full size. This\nfeeds uninitialized heap bytes into the decoder rather than failing cleanly.","fix":"Treat any read_all() failure as fatal regardless of bytes_read, or require\nbytes_read == file_size before proceeding. Use g_malloc0 if a zero-filled tail\nis acceptable, but better to error out on short reads.","locations":[{"ref":"plug-ins/common/file-heif.c:1064-1073","code":" 1064 |   file_buffer = g_malloc (file_size);\n 1065 | \n 1066 |   if (! g_input_stream_read_all (input, file_buffer, file_size,\n 1067 |                                  &bytes_read, NULL, error) &&\n 1068 |       bytes_read == 0)\n 1069 |     {\n 1070 |       g_free (file_buffer);\n 1071 |       g_object_unref (input);\n 1072 |       return NULL;\n 1073 |     }","lines":10}]},{"id":"ERR_58","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"HEIF load: heif_image_handle_get_raw_color_profile_size() return value is used\ndirectly as a g_malloc0 size with no validation. A profile_size of 0 leads to a\n0-byte allocation passed to gimp_color_profile_new_from_icc_profile with size 0;\na maliciously huge value leads to a large unchecked allocation (g_malloc0 aborts\non failure rather than failing gracefully). The err.code from get_raw_color_profile\nis checked, but the size is trusted.","fix":"Validate profile_size (reject 0 and absurdly large values), use g_try_malloc0 and\ncheck for NULL, and skip profile creation when size is 0.","locations":[{"ref":"plug-ins/common/file-heif.c:1248-1259","code":" 1248 |         profile_size = heif_image_handle_get_raw_color_profile_size (handle);\n 1249 |         profile_data = g_malloc0 (profile_size);\n 1250 |         err = heif_image_handle_get_raw_color_profile (handle, profile_data);\n 1251 | \n 1252 |         if (err.code)\n 1253 |           g_warning (\"%s: ICC profile loading failed and discarded.\",\n 1254 |                      G_STRFUNC);\n 1255 |         else\n 1256 |           profile = gimp_color_profile_new_from_icc_profile ((guint8 *) profile_data,\n 1257 |                                                              profile_size, NULL);\n 1258 | \n 1259 |         g_free (profile_data);","lines":12}]},{"id":"ERR_59","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"PCX load_multi (DCX): 'fread (&offset, 1, 4, fd)' return values are ignored at lines 539, 542 and 573. On a truncated DCX header 'offset' is used uninitialised/stale to fseek, and at line 542 the first offset may be garbage. Also 'offset' is a gint read as 4 raw bytes without endianness normalisation (DCX offsets are little-endian); on big-endian hosts every offset is byte-swapped, but on all hosts a negative/huge offset just fails fseek and is handled, so impact is limited to reading wrong frames / uninitialised offset use.","fix":"Check each fread returns 4 bytes and bail on short read; read the offset as a little-endian guint32 via GUINT32_FROM_LE for portability.","locations":[{"ref":"plug-ins/common/file-pcx.c:539-543","code":"  539 |   fread (&offset, 1, 4, fd);\n  540 | \n  541 |   /* Read the first offset */\n  542 |   fread (&offset, 1, 4, fd);\n  543 |   valid_offset = fseek (fd, offset, SEEK_SET);","lines":5},{"ref":"plug-ins/common/file-pcx.c:573","code":"  573 |       fread (&offset, 1, 4, fd);","lines":1}]},{"id":"ERR_60","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"PCX 8bpp/1-plane palette read ignores fread: 'fseek (fd, -768L, SEEK_END); fread (cmap, 768, 1, fd);' (lines 844-845). The fseek and fread return values are unchecked, so for files smaller than 768 bytes or where the seek fails, 'cmap' (a 768-byte stack buffer, uninitialised) is passed to gimp_palette_set_colormap with stale stack contents used as the palette.","fix":"Check fseek and fread return values; zero-initialise cmap and bail or fall back to a default palette on short read.","locations":[{"ref":"plug-ins/common/file-pcx.c:840-848","code":"  840 |   else if (pcx_header.bpp == 8 && pcx_header.planes == 1)\n  841 |     {\n  842 |       dest = g_new (guchar, ((gsize) width) * height);\n  843 |       load_8 (fd, width, height, dest, bytesperline);\n  844 |       fseek (fd, -768L, SEEK_END);\n  845 |       fread (cmap, 768, 1, fd);\n  846 |       gimp_palette_set_colormap (gimp_image_get_palette (image),\n  847 |                                  babl_format (\"R'G'B' u8\"),\n  848 |                                  cmap, 256 * 3);","lines":9}]},{"id":"ERR_61","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"PNM pnm_load_ascii() data buffer is sized with plain gint arithmetic gimp_tile_height() * info->xres * np * bpc. The in-code comment claims no overflow only while gimp_tile_height() < 1365; unlike pnm_load_raw (which uses g_size_checked_mul), the ASCII path performs no checked multiplication, so the safety depends entirely on the tile-height invariant and xres bound rather than being enforced.","fix":"Use g_size_checked_mul / gsize for the allocation as is done in pnm_load_raw (lines 1077-1082) instead of relying on an implicit invariant.","locations":[{"ref":"plug-ins/common/file-pnm.c:971-972","code":"  971 |   /* No overflow as long as gimp_tile_height() < 1365 = 2^(31 - 18) / 6 */\n  972 |   data = g_new (guchar, gimp_tile_height () * info->xres * np * bpc);","lines":2}]},{"id":"ERR_62","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"ps_read_header() reads the file header with 'fread(hdr, 1, sizeof(hdr), eps_file);' without checking the return value. On a file shorter than 512 bytes, hdr is only partially filled and the strncmp/strstr checks (and the 0xc5d0d3c6 DOS-EPS magic compare) operate on uninitialized stack bytes, giving non-deterministic detection of PDF/EPSF. (hdr[sizeof-1] is nul-terminated only in the non-PDF branch.)","fix":"Capture the fread count, memset the unused tail of hdr to 0 (or only inspect the bytes actually read), and nul-terminate before any string scan.","locations":[{"ref":"plug-ins/common/file-ps.c:1869-1897","code":" 1869 |       gchar hdr[512];\n 1870 | \n 1871 |       fread (hdr, 1, sizeof(hdr), eps_file);\n 1872 |       *is_pdf = (strncmp (hdr, \"%PDF\", 4) == 0);\n 1873 | \n 1874 |       if (!*is_pdf)  /* Check for EPSF */\n 1875 |         {\n 1876 |           char                 *adobe, *epsf;\n 1877 |           int                   ds = 0;\n 1878 |           static unsigned char  doseps[5] = { 0xc5, 0xd0, 0xd3, 0xc6, 0 };\n 1879 | \n 1880 |           hdr[sizeof(hdr)-1] = '\\0';\n 1881 |           adobe = strstr (hdr, \"PS-Adobe-\");\n 1882 |           epsf = strstr (hdr, \"EPSF-\");\n 1883 | \n 1884 |           if ((adobe != NULL) && (epsf != NULL))\n 1885 |             ds = epsf - adobe;\n 1886 | \n 1887 |           *is_epsf = ((ds >= 11) && (ds <= 15));\n 1888 | \n 1889 |           /* Illustrator uses negative values in BoundingBox without marking */\n 1890 |           /* files as EPSF. Try to handle that. */\n 1891 |           maybe_epsf =\n 1892 |             (strstr (hdr, \"%%Creator: Adobe Illustrator(R) 8.0\") != 0);\n 1893 | \n 1894 |           /* Check DOS EPS binary file */\n 1895 |           if ((!*is_epsf) && (strncmp (hdr, (char *)doseps, 4) == 0))\n 1896 |             *is_epsf = 1;\n 1897 |         }","lines":29}]},{"id":"ERR_63","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"PSP load_image header read: fread(buf, 32, 1, f) and subsequent reads are checked, but read_general_image_attribute_block does not validate ia->width/ia->height before gimp_image_new_with_precision. Dimensions come from the file (GUINT32_FROM_LE) and are passed unchecked; a 0 or absurd width/height is handed to GIMP image creation. While later layer/selection code validates per-layer dims, the top-level image dimensions are not bounded here.","fix":"Validate ia->width and ia->height (nonzero, <= GIMP_MAX_IMAGE_SIZE) in read_general_image_attribute_block before creating the image.","locations":[{"ref":"plug-ins/common/file-psp.c:1015-1016","code":" 1015 |   ia->width = GUINT32_FROM_LE (ia->width);\n 1016 |   ia->height = GUINT32_FROM_LE (ia->height);","lines":2},{"ref":"plug-ins/common/file-psp.c:2919-2920","code":" 2919 |           image = gimp_image_new_with_precision (ia.width, ia.height,\n 2920 |                                                  ia.base_type, ia.precision);","lines":2}]},{"id":"ERR_64","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"raw_read_row() compares 'if (bread < size)' where bread is size_t (unsigned) and size is gint32 (signed). If size is ever negative (from an overflowed stride/offset computation upstream) it is converted to a huge size_t for the comparison and is passed to memset(buf, 0xFF, size) and fread(buf, 1, size, fp) as an enormous length, causing a buffer overflow / crash. Even with non-negative size this signed/unsigned mix is fragile.","fix":"Make size a gsize (or guint32) end-to-end, and assert/validate it is within the allocated buffer length before memset/fread.","locations":[{"ref":"plug-ins/common/file-raw-data.c:899-914","code":"  899 | raw_read_row (FILE   *fp,\n  900 |               guchar *buf,\n  901 |               gint32  offset,\n  902 |               gint32  size)\n  903 | {\n  904 |   size_t bread;\n  905 | \n  906 |   fseek (fp, offset, SEEK_SET);\n  907 | \n  908 |   memset (buf, 0xFF, size);\n  909 |   bread = fread (buf, 1, size, fp);\n  910 |   if (bread < size)\n  911 |     {\n  912 |       g_printerr (\"fread failed: read %u instead of %u bytes\\n\", (guint) bread, (guint) size);\n  913 |     }\n  914 | }","lines":16}]},{"id":"ERR_65","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"mmap_read() ignores the actual byte count from read(): 'if (! read(fd, buf, len)) memset(buf, 0xFF, rowstride);'. read() returns the number of bytes read; a short read (e.g. partial final row near EOF) returns a positive value less than len, so the buffer tail is left uninitialized rather than filled. This uninitialized data is then interpreted as pixels in preview_update. read() returning -1 (error) is also treated as 'success'.","fix":"Capture the read() return value; on r < len memset the remaining (len - max(r,0)) bytes, and handle r < 0 as an error.","locations":[{"ref":"plug-ins/common/file-raw-data.c:919-930","code":"  919 | static gint\n  920 | mmap_read (gint    fd,\n  921 |            void   *buf,\n  922 |            gint32  len,\n  923 |            gint32  pos,\n  924 |            gint    rowstride)\n  925 | {\n  926 |   lseek (fd, pos, SEEK_SET);\n  927 |   if (! read (fd, buf, len))\n  928 |     memset (buf, 0xFF, rowstride);\n  929 |   return 0;\n  930 | }","lines":12}]},{"id":"ERR_66","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"SunRAS load_sun_d8/d24/d32 ignore allocation overflow and width relationship. data buffers are 'g_malloc (tile_height * width)' (d8 line 1225), '* 3' (d24 line 1298, d32 line 1388). width is l_ras_width (guint32) clamped only to GIMP_MAX_IMAGE_SIZE; tile_height*width*3 is an int multiply that can overflow for large widths near GIMP_MAX_IMAGE_SIZE combined with tile_height. Also read_card32 builds the 32-bit header fields and l_ras_width/height are used as signed int comparisons after; values > INT_MAX wrap negative and are caught by the '<= 0' check, but values between GIMP_MAX_IMAGE_SIZE and INT_MAX are rejected, so the residual risk is the int multiply for the tile buffer.","fix":"Use gsize and overflow-checked multiplication for the tile data buffers (tile_height * width * bpp), consistent with the GIMP_MAX_IMAGE_SIZE clamps already present.","locations":[{"ref":"plug-ins/common/file-sunras.c:1225","code":" 1225 |   data = g_malloc (tile_height * width);","lines":1},{"ref":"plug-ins/common/file-sunras.c:1298","code":" 1298 |   data = g_malloc (tile_height * width * 3);","lines":1},{"ref":"plug-ins/common/file-sunras.c:1388","code":" 1388 |   data = g_malloc (tile_height * width * 3);","lines":1}]},{"id":"ERR_67","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"SunRAS RLE depth-32 decode discards getc/rle_getc return values for the first three components and only records the last into cerr. In load_sun_d32 (lines 1400-1417) the skip byte and the first two stored bytes use rle_getc/getc without checking for EOF (-1); a -1 is implicitly cast to guchar (0xFF) and stored. Only the 4th read is captured into cerr for the err flag, so truncated 32-bit files silently store 0xFF pixels instead of being flagged as fully corrupt.","fix":"Capture and OR every getc/rle_getc result into the error flag (or break out on the first negative result) so truncated streams are detected for all components.","locations":[{"ref":"plug-ins/common/file-sunras.c:1398-1418","code":" 1398 |       if (rle)\n 1399 |         {\n 1400 |           for (j = 0; j < width; j++)\n 1401 |             {\n 1402 |               rle_getc (ifp);   /* Skip unused byte */\n 1403 |               *(dest++) = rle_getc (ifp);\n 1404 |               *(dest++) = rle_getc (ifp);\n 1405 |               *(dest++) = (cerr = (rle_getc (ifp)));\n 1406 |             }\n 1407 |         }\n 1408 |       else\n 1409 |         {\n 1410 |           for (j = 0; j < width; j++)\n 1411 |             {\n 1412 |               getc (ifp);   /* Skip unused byte */\n 1413 |               *(dest++) = getc (ifp);\n 1414 |               *(dest++) = getc (ifp);\n 1415 |               *(dest++) = (cerr = (getc (ifp)));\n 1416 |             }\n 1417 |         }\n 1418 |       err |= (cerr < 0);","lines":21}]},{"id":"ERR_68","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"cineon_open() reads the header with 'fread(&header, sizeof(CineonGenericHeader), 1, fp) == 0'. Using item-count 1 means a file that is non-empty but shorter than the full header still returns 1 only if a complete item was read; a short read returns 0 and is caught. This is correct for the header, but the same pattern is reused for image rows where 'read_index != buffer_length' is checked - good. No header-field sanity is applied to channels_per_image/bits_per_pixel beyond the switch defaults, and depth/bpp combinations are taken directly from untrusted input; acceptable but the header read does not validate that channel[0] fields are self-consistent (e.g. pixels_per_line vs lines_per_image vs declared offset).","fix":"Optionally validate header consistency after reading; current behavior is safe but brittle.","locations":[{"ref":"plug-ins/file-cin/cineon-lib.c:95-102","code":"   95 |   if (fread (&header, sizeof (CineonGenericHeader), 1, fp) == 0)\n   96 |     {\n   97 |       g_set_error (error, G_FILE_ERROR, g_file_error_from_errno (errno),\n   98 |                    _(\"Could not read Cineon header information.\"));\n   99 | \n  100 |       fclose (fp);\n  101 |       return NULL;\n  102 |     }","lines":8},{"ref":"plug-ins/file-cin/cineon-lib.c:104-108","code":"  104 |   width  = g_ntohl (header.imageInfo.channel[0].pixels_per_line);\n  105 |   height = g_ntohl (header.imageInfo.channel[0].lines_per_image);\n  106 |   depth  = header.imageInfo.channels_per_image;\n  107 |   bpp    = header.imageInfo.channel[0].bits_per_pixel;\n  108 |   offset = g_ntohl (header.fileInfo.image_offset);","lines":5}]},{"id":"ERR_69","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"get_format_read_info() silently falls back to format_read_info[0] (D3DFMT_R8G8B8, 24bpp RGB) when neither the D3D9 nor DXGI format code matches any table entry, instead of signaling failure. A header whose format resolves to a code present in the bpp tables but absent from format_read_info will be decoded with the wrong channel layout/bpp. Because load_info.bpp is recomputed from hdr.pixelfmt.bpp this is not directly an OOB, but it produces garbage output and masks malformed input rather than rejecting it.","fix":"Return an explicit 'not found' indicator (or a validity flag in fmt_read_info_t) and make read_dds() error out when the uncompressed format cannot be resolved to a real read-info entry.","locations":[{"ref":"plug-ins/file-dds/formats.c:254-269","code":"  254 | fmt_read_info_t\n  255 | get_format_read_info (guint d3d9_fmt,\n  256 |                       guint dxgi_fmt)\n  257 | {\n  258 |   gint index = 0;\n  259 |   for (gint i = 0; i < FORMAT_READ_INFO_COUNT; i++)\n  260 |     {\n  261 |       if ((d3d9_fmt && (format_read_info[i].d3d9_format == d3d9_fmt)) ||\n  262 |           (dxgi_fmt && (format_read_info[i].dxgi_format == dxgi_fmt)))\n  263 |         {\n  264 |           index = i;\n  265 |           break;\n  266 |         }\n  267 |     }\n  268 |   return format_read_info[index];\n  269 | }","lines":16}]},{"id":"ERR_70","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"ico_read_size() ignores the return value of the first 'ico_read_int32(fp, &magic, 1)' (line 162). On a short read 'magic' is uninitialized stack data and is then compared against ICO_PNG_MAGIC / 40, potentially mis-detecting the embedded format.","fix":"Check the return value of ico_read_int32 for magic and bail out (return FALSE) on failure.","locations":[{"ref":"plug-ins/file-ico/ico-load.c:159-209","code":"  159 |   if (fseek (fp, info->offset + file_offset, SEEK_SET) < 0)\n  160 |     return FALSE;\n  161 | \n  162 |   ico_read_int32 (fp, &magic, 1);\n  163 | \n  164 |   if (magic == ICO_PNG_MAGIC)\n  165 |     {\n  166 |       png_ptr = png_create_read_struct (PNG_LIBPNG_VER_STRING, NULL, NULL,\n  167 |                                         NULL);\n  168 |       if (! png_ptr)\n  169 |         return FALSE;\n  170 | \n  171 |       info_ptr = png_create_info_struct (png_ptr);\n  172 |       if (! info_ptr)\n  173 |         {\n  174 |           png_destroy_read_struct (&png_ptr, NULL, NULL);\n  175 |           return FALSE;\n  176 |         }\n  177 | \n  178 |       if (setjmp (png_jmpbuf (png_ptr)))\n  179 |         {\n  180 |           png_destroy_read_struct (&png_ptr, NULL, NULL);\n  181 |           return FALSE;\n  182 |         }\n  183 |       png_init_io (png_ptr, fp);\n  184 |       png_set_sig_bytes (png_ptr, 4);\n  185 |       png_read_info (png_ptr, info_ptr);\n  186 |       png_get_IHDR (png_ptr, info_ptr, &w, &h, &bpp, &color_type,\n  187 |                     NULL, NULL, NULL);\n  188 |       png_destroy_read_struct (&png_ptr, &info_ptr, NULL);\n  189 |       info->width = w;\n  190 |       info->height = h;\n  191 |       D((\"ico_read_size: PNG: %ix%i\\n\", info->width, info->height));\n  192 |       return TRUE;\n  193 |     }\n  194 |   else if (magic == 40)\n  195 |     {\n  196 |       if (ico_read_int32 (fp, &info->width, 1) &&\n  197 |           ico_read_int32 (fp, &info->height, 1))\n  198 |         {\n  199 |           info->height /= 2;\n  200 |           D((\"ico_read_size: ICO: %ix%i\\n\", info->width, info->height));\n  201 |           return TRUE;\n  202 |         }\n  203 |       else\n  204 |         {\n  205 |           info->width = 0;\n  206 |           info->height = 0;\n  207 |           return FALSE;\n  208 |         }\n  209 |     }","lines":51}]},{"id":"ERR_71","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"load_image_metadata for_layers branch reads sig/key/raw_len32 then decrements data_length by 12 and continues; on a non-matching key it skips skip_len bytes but for matching keys it seeks back 4 and calls read_layer_block with mask_layer_len = 4 + skip_len without verifying skip_len against the actual remaining data_length, trusting an attacker-supplied payload_len for the layer block size.","fix":"Validate skip_len/payload_len against the remaining data_length before using it as the layer block length.","locations":[{"ref":"plug-ins/file-psd/psd-load.c:446-583","code":"  446 |       while (data_length >= 12)\n  447 |         {\n  448 |           if (psd_read (input, &sig, 4, error) < 4)\n  449 |             break;\n  450 |           if (psd_read (input, &key, 4, error) < 4)\n  451 |             break;\n  452 |           if (psd_read (input, &raw_len32, 4, error) < 4)\n  453 |             break;\n  454 | \n  455 |           data_length -= 12;\n  456 | \n  457 |           /* Treat labels/ints as Little Endian (IBM PC format) */\n  458 |           if (memcmp (sig, \"MIB8\", 4) == 0)\n  459 |             {\n  460 |               img_a.ibm_pc_format = TRUE;\n  461 |               payload_len         = GUINT32_FROM_LE (raw_len32);\n  462 |             }\n  463 |           else\n  464 |             {\n  465 |               img_a.ibm_pc_format = FALSE;\n  466 |               payload_len         = GUINT32_FROM_BE (raw_len32);\n  467 |             }\n  468 | \n  469 |           /* Actual block size is a multiple of 4 */\n  470 |           skip_len = (payload_len + 3) & ~3U;\n  471 | \n  472 |           if (! (memcmp (key, \"Layr\", 4) == 0 || memcmp (key, \"ryaL\", 4) == 0 ||\n  473 |                  memcmp (key, \" 564 | \n  565 |           if (! psd_seek (input, -4, G_SEEK_CUR, error))\n  566 |             {\n  567 |               g_object_unref (input);\n  568 |               return image;\n  569 |             }\n  570 | \n  571 |           /* Set layer block size from metadata */\n  572 |           img_a.mask_layer_len = 4 + skip_len;\n  573 | \n  574 |           lyr_a = read_layer_block (&img_a, input, error);\n  575 | \n  576 |           if (! lyr_a)\n  577 |             {\n  578 |               g_object_unref (input);\n  579 |               return image;\n  580 |             }\n  581 | \n  582 |           add_layers (image, &img_a, lyr_a, input, error);\n  583 |           break;","lines":138}]},{"id":"ERR_72","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In psd_thumb_load, add_image_resources returns 0 both when a thumbnail resource is truncated (data_start+data_len exceeds the section) and when the loop ends without finding any thumbnail, while the caller treats < 1 as a fatal load error and goes to load_error. Since *error is NULL on those returns, a valid PSD with no thumbnail produces a generic failure with no message, conflating a benign 'no thumbnail' result with a parse error.","fix":"Distinguish 'thumbnail not found' from parse errors; either return a value the caller treats as benign, or set *error with a descriptive message on the failing returns.","locations":[{"ref":"plug-ins/file-psd/psd-thumb-load.c:121-122","code":"  121 |   if (add_image_resources (image, &img_a, file, input, &error) < 1)\n  122 |     goto load_error;","lines":2},{"ref":"plug-ins/file-psd/psd-thumb-load.c:302-315","code":"  302 |       if (res_a.data_start + res_a.data_len >\n  303 |           img_a->image_res_start + img_a->image_res_len)\n  304 |         return 0;\n  305 | \n  306 |       status = load_thumbnail_resource (&res_a, image, file, input, error);\n  307 |       /* Error */\n  308 |       if (status < 0)\n  309 |         return -1;\n  310 |       /* Thumbnail Loaded */\n  311 |       if (status > 0)\n  312 |         return 1;\n  313 |     }\n  314 | \n  315 |   return 0;","lines":14}]},{"id":"ERR_73","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"getlong()/getshort() ignore the result of fread and the read_rle16 EOF test is ineffective. getshort/getlong call fread() without checking the return value; on a short read the byte buffer (b[]) is left uninitialized and a garbage value is returned. read_rle16 then does 'if ((ch = getshort(sgip)) == EOF)' but getshort can never return EOF (-1) because it masks/shifts bytes, so truncated RLE-16 streams are decoded from uninitialized stack data rather than being detected. Bounded by xsize so not OOB, but produces garbage and hides corruption.","fix":"Check the fread() return value in getshort/getlong and propagate an error/EOF sentinel that read_rle8/read_rle16 actually test, aborting the decode on truncated input.","locations":[{"ref":"plug-ins/file-sgi/sgi-lib.c:625-654","code":"  625 | static int\n  626 | getlong(sgi_t *sgip)    /* I - SGI image to read from */\n  627 | {\n  628 |   unsigned char b[4];\n  629 | \n  630 | \n  631 |   fread(b, 4, 1, sgip->file);\n  632 |   if(sgip->swapBytes)\n  633 |     return ((b[3] << 24) | (b[2] << 16) | (b[1] << 8) | b[0]);\n  634 |   else\n  635 |     return ((b[0] << 24) | (b[1] << 16) | (b[2] << 8) | b[3]);\n  636 | }\n  637 | \n  638 | \n  639 | /*\n  640 |  * 'getshort()' - Get a 16-bit big-endian integer.\n  641 |  */\n  642 | \n  643 | static int\n  644 | getshort(sgi_t *sgip)   /* I - SGI image to read from */\n  645 | {\n  646 |   unsigned char b[2];\n  647 | \n  648 | \n  649 |   fread(b, 2, 1, sgip->file);\n  650 |   if(sgip->swapBytes)\n  651 |     return ((b[1] << 8) | b[0]);\n  652 |   else\n  653 |     return ((b[0] << 8) | b[1]);\n  654 | }","lines":30},{"ref":"plug-ins/file-sgi/sgi-lib.c:744-782","code":"  744 | static int\n  745 | read_rle16(sgi_t *sgip,         /* I - SGI image to read from */\n  746 |            unsigned short *row, /* O - Data */\n  747 |            int            xsize)/* I - Width of data in pixels */\n  748 | {\n  749 |   int   i,              /* Looping var */\n  750 |         ch,             /* Current character */\n  751 |         count,          /* RLE count */\n  752 |         length;         /* Number of bytes read... */\n  753 | \n  754 | \n  755 |   length = 0;\n  756 | \n  757 |   while (xsize > 0)\n  758 |   {\n  759 |     if ((ch = getshort(sgip)) == EOF)\n  760 |       return (-1);\n  761 |     length ++;\n  762 | \n  763 |     count = MIN (ch & 127, xsize);\n  764 |     if (count == 0)\n  765 |       break;\n  766 | \n  767 |     if (ch & 128)\n  768 |     {\n  769 |       for (i = 0; i < count; i ++, row ++, xsize --, length ++)\n  770 |         *row = getshort(sgip);\n  771 |     }\n  772 |     else\n  773 |     {\n  774 |       ch = getshort(sgip);\n  775 |       length ++;\n  776 |       for (i = 0; i < count; i ++, row ++, xsize --)\n  777 |         *row = ch;\n  778 |     };\n  779 |   };\n  780 | \n  781 |   return (xsize > 0 ? -1 : length * 2);\n  782 | }","lines":39}]},{"id":"ERR_74","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Throughout the editor and the import path, every gexiv2_metadata_try_* / gexiv2_metadata_set_tag_string call passes NULL for the GError out-param (e.g. the forced-write paths in xml_parser_end_element). Parse/format failures from exiv2 on malformed metadata are silently swallowed, masking corruption and feeding NULL results into the NULL-deref issues above.","fix":"Capture and log (and g_clear_error) the GError on these calls, at minimum where the returned value is subsequently dereferenced or written back.","locations":[{"ref":"plug-ins/metadata/metadata-xml.c:862-864","code":"  862 |                     gexiv2_metadata_set_tag_string (args->metadata,\n  863 |                                                     str_tag_name,\n  864 |                                                     str_tag_value);","lines":3},{"ref":"plug-ins/metadata/metadata-xml.c:887-889","code":"  887 |                         gexiv2_metadata_set_tag_string (args->metadata,\n  888 |                                                         str_tag_name,\n  889 |                                                         str_tag_value);","lines":3},{"ref":"plug-ins/metadata/metadata-xml.c:910-912","code":"  910 |                         gexiv2_metadata_set_tag_string (args->metadata,\n  911 |                                                         str_tag_name,\n  912 |                                                         str_tag_value);","lines":3}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":true,"description":"pango_parse_markup() return value is ignored and attr_list is used unconditionally while parsing UNTRUSTED markup extracted from an XCF text parasite. attr_list is declared uninitialized at line 127; on parse failure Pango leaves the out-parameter untouched, so pango_attr_list_get_attributes() is called on an uninitialized/garbage pointer, leading to a crash or arbitrary read. The markup here is attacker-controlled (taken from the parasite blob, then mutated with g_string_replace) and parse failure is fully reachable with malformed input.","fix":"Check the boolean return of pango_parse_markup(); only proceed to pango_attr_list_get_attributes()/iteration when it returns TRUE and attr_list != NULL. Initialize attr_list = NULL and skip the font-extraction block on failure (and set the GError, as already done for the missing-delimiter case).","locations":[{"ref":"app/text/gimptext-parasite.c:127","code":"  127 |                   PangoAttrList *attr_list;","lines":1},{"ref":"app/text/gimptext-parasite.c:143-145","code":"  143 |                   pango_parse_markup (markup->str, -1, 0, &attr_list, NULL, NULL, NULL);\n  144 | \n  145 |                   list   = pango_attr_list_get_attributes (attr_list);","lines":3}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"pango_parse_markup() return value is ignored and the uninitialized PangoAttrList *attr_list (declared at line 816) is passed to pango_attr_list_get_attributes(). On parse failure attr_list is never assigned, so this dereferences garbage. This runs during PROP_MARKUP serialization where markup is normally GIMP-generated, but malformed markup set programmatically (e.g. via PDB/script) still reaches here and can crash.","fix":"Initialize attr_list = NULL and guard the get_attributes()/loop on a successful pango_parse_markup() return; bail out cleanly otherwise.","locations":[{"ref":"app/text/gimptext.c:816","code":"  816 |       PangoAttrList *attr_list;","lines":1},{"ref":"app/text/gimptext.c:843-845","code":"  843 |       pango_parse_markup (markup, -1, 0, &attr_list, NULL, NULL, NULL);\n  844 | \n  845 |       list   = pango_attr_list_get_attributes (attr_list);","lines":3}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"On Win32 EXCHNDL builds, codeview_path = g_try_malloc (codeview_path_len) may return NULL; the code only g_warning()s and then falls through to g_snprintf(codeview_path, ...) and uses it, dereferencing NULL -> crash. The warning does not skip the use.","fix":"After the NULL check, skip the snprintf/setenv/free block entirely (wrap in 'if (codeview_path)'), or use g_malloc which aborts deterministically.","locations":[{"ref":"libgimp/gimp.c:277-287","code":"  277 |         codeview_path = g_try_malloc (codeview_path_len);\n  278 |         if (codeview_path == NULL)\n  279 |           {\n  280 |             g_warning (\"Failed to allocate memory\");\n  281 |           }\n  282 |         if (g_getenv (\"_NT_SYMBOL_PATH\"))\n  283 |           g_snprintf (codeview_path, codeview_path_len, \"%s;%s\", plugin_dir, g_getenv (\"_NT_SYMBOL_PATH\"));\n  284 |         else\n  285 |           g_snprintf (codeview_path, codeview_path_len, \"%s\", plugin_dir);\n  286 |         g_setenv (\"_NT_SYMBOL_PATH\", codeview_path, TRUE);\n  287 |         g_free (codeview_path);","lines":11}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"read_apng_chunk() returns the chunk type via *(guint *)(chunk->data + 4), reading the 4 raw type bytes as a host-endian guint, and the id_* constants (e.g. id_IHDR 0x52444849) are the ASCII bytes interpreted little-endian. On a big-endian host none of the chunk-type comparisons in load_apng_image will ever match, so APNG parsing silently misbehaves (no frames imported, or chunks misclassified). PNG chunk types should be compared via the canonical big-endian byte order using png_get_uint_32 / explicit memcmp on the 4 bytes.","fix":"Compare the 4 type bytes explicitly (e.g. memcmp(chunk->data+4, \"IHDR\", 4)) or read them with png_get_uint_32 and use matching big-endian constants, so detection is endian-independent.","locations":[{"ref":"plug-ins/common/file-png.c:2986-2987","code":" 2986 |       if (fread (chunk->data + 4, chunk->size - 4, 1, f) == 1)\n 2987 |         return *(guint *) (chunk->data + 4);","lines":2},{"ref":"plug-ins/common/file-png.c:55-61","code":"   55 | #define id_IHDR 0x52444849\n   56 | #define id_tRNS 0x534E5274\n   57 | #define id_acTL 0x4C546361\n   58 | #define id_fcTL 0x4C546366\n   59 | #define id_IDAT 0x54414449\n   60 | #define id_fdAT 0x54416466\n   61 | #define id_IEND 0x444E4549","lines":7}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"WebPMuxGetFeatures return value is ignored; if it fails, `flags` is read uninitialized to test ANIMATION_FLAG/ICCP_FLAG, giving nondeterministic branch selection (e.g. treating a still image as r in vsnprintf is undefined behavior per the C standard; it currently works on glibc only by luck.","fix":"Build the result in a separate buffer in a single g_snprintf call (e.g. g_snprintf(dst, sizeof dst, \"%s%s\", prefix, tags[col])).","locations":[{"ref":"plug-ins/metadata/metadata-editor.c:1544-1545","code":" 1544 |           g_snprintf ((gchar *) &tag, 256, \"%s%s\",\n 1545 |                       (gchar *) &tag, (gchar *) tags[col]);","lines":2},{"ref":"plug-ins/metadata/metadata-editor.c:1586-1587","code":" 1586 |           g_snprintf ((gchar *) &tag, 256, \"%s%s\",\n 1587 |                       (gchar *) &tag, (gchar *) tags[col]);","lines":2}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"make_remap_table() second pass removes duplicate palette entries with an explicitly-acknowledged O(n^3) algorithm (the comment on line 667 reads 'O(n^3), could do better!'): for each pair (i,j) it rescans all *num_entries indices to rewrite transmap. For 256 colors this is up to ~16.7M iterations on every indexed conversion that requests duplicate removal. Not a correctness bug but a real cost on the conversion hot path.","fix":"Replace the triple loop with a hash map from packed RGB to first-seen index, collapsing duplicate detection and transmap rewriting to O(n).","locations":[{"ref":"app/core/gimpimage-convert-indexed.c:667-693","code":"  667 |   /* Second pass - remove duplicates. (O(n^3), could do better!) */\n  668 |   for (i = 0; i < used; i++)\n  669 |     {\n  670 |       for (j = 0; j < i; j++)\n  671 |         {\n  672 |           if ((temppal[i*3 + 1] == temppal[j*3 + 1]) &&\n  673 |               (temppal[i*3 + 0] == temppal[j*3 + 0]) &&\n  674 |               (temppal[i*3 + 2] == temppal[j*3 + 2]) &&\n  675 |               tempuse[j] &&\n  676 |               tempuse[i])\n  677 |             {\n  678 |               /* Move the 'used' tally from one to the other. */\n  679 |               tempuse[i] += tempuse[j];\n  680 |               /* zero one of them, deactivating its entry. */\n  681 |               tempuse[j] = 0;\n  682 | \n  683 |               /* change all mappings from this dead index to the live\n  684 |                * one.\n  685 |                */\n  686 |               for (k = 0; k < *num_entries; k++)\n  687 |                 {\n  688 |                   if (index_used_count[k] && (transmap[k] == j))\n  689 |                     transmap[k] = i;\n  690 |                 }\n  691 |             }\n  692 |         }\n  693 |     }","lines":27}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"gimp_display_shell_scroll() reallocates a full-viewport ARGB32 cairo surface (disp_width*render_scale x disp_height*render_scale) on every incremental pan step purely to shift the render cache by (x_offset,y_offset). For drag-panning this allocates and frees a large surface every motion event. A self-blit within the existing cache (or shifting the valid region without copying) would avoid the per-event allocation churn.","fix":"Keep a single scratch surface reused across scrolls, or perform the shift in place / only invalidate the newly exposed band instead of copying the whole cache.","locations":[{"ref":"app/display/gimpdisplayshell-scroll.c:98-124","code":"   98 |       if (shell->render_cache)\n   99 |         {\n  100 |           cairo_surface_t       *surface;\n  101 |           cairo_t               *cr;\n  102 | \n  103 |           surface = cairo_surface_create_similar_image (\n  104 |             shell->render_cache,\n  105 |             CAIRO_FORMAT_ARGB32,\n  106 |             shell->disp_width  * shell->render_scale,\n  107 |             shell->disp_height * shell->render_scale);\n  108 | \n  109 |           cr = cairo_create (surface);\n  110 |           cairo_set_operator (cr, CAIRO_OPERATOR_SOURCE);\n  111 |           cairo_set_source_surface (cr, shell->render_cache, 0, 0)   <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
  <button class="action-btn" data-action="download-md">&#11015; MD</button>
  <button class="action-btn" data-action="download-md-short">&#11015; MD Short</button>
  <button class="action-btn" data-action="download-toml">&#11015; TOML</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
