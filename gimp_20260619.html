map,\n  576 |                                                             w, y * w + x)];\n  577 |             guint32 *dest = dest_vec + (h - 1 - y) * w + x;\n  578 | \n  579 |             R_VAL_GIMP (dest) = R_VAL (&color);\n  580 |             G_VAL_GIMP (dest) = G_VAL (&color);\n  581 |             B_VAL_GIMP (dest) = B_VAL (&color);\n  582 | \n  583 |             if (ico_get_bit_from_data (and_map, w, y * w + x))\n  584 |               A_VAL_GIMP (dest) = 0;\n  585 |             else\n  586 |               A_VAL_GIMP (dest) = 255;\n  587 |           }\n  588 |       break;","lines":95}]},{"id":"OVF_47","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"Resource data_len/data_start are guint64 but are passed directly as the gint count argument of psd_read (e.g. data = g_malloc(res_a->data_len); psd_read(input, data, res_a->data_len, ...)). For data_len > INT32_MAX the count truncates to negative, psd_read's internal 'count > 0' guard is false, so it returns 0 WITHOUT reading or setting an error, and the buffer (allocated at the full 64-bit size) stays uninitialized. The full data_len of uninitialized heap is then handed to gimp_parasite_new / profile creation, disclosing heap contents. Lower 32-bit truncation to a smaller positive value yields a short read with the remainder uninitialized.","fix":"Reject data_len > G_MAXINT (and bound against remaining file size) before allocating; read in bounded chunks with a gsize length, or change psd_read to take gsize. Always verify the read length equals the requested length before using the buffer.","locations":[{"ref":"plug-ins/file-psd/psd-image-res-load.c:520-521","code":"  520 |   data = g_malloc (res_a->data_len);\n  521 |   if (res_a->data_len > 0 && psd_read (input, data, res_a->data_len, error) < res_a->data_len)","lines":2},{"ref":"plug-ins/file-psd/psd-image-res-load.c:555-556","code":"  555 |   data = g_malloc (res_a->data_len);\n  556 |   if (psd_read (input, data, res_a->data_len, error) < res_a->data_len)","lines":2},{"ref":"plug-ins/file-psd/psd-image-res-load.c:896-897","code":"  896 |   res_data = g_malloc (res_a->data_len);\n  897 |   if (psd_read (input, res_data, res_a->data_len, error) < res_a->data_len)","lines":2},{"ref":"plug-ins/file-psd/psd-image-res-load.c:1211-1212","code":" 1211 |   icc_profile = g_malloc (res_a->data_len);\n 1212 |   if (psd_read (input, icc_profile, res_a->data_len, error) < res_a->data_len)","lines":2},{"ref":"plug-ins/file-psd/psd-image-res-load.c:1386-1387","code":" 1386 |   res_data = g_malloc (res_a->data_len);\n 1387 |   if (psd_read (input, res_data, res_a->data_len, error) < res_a->data_len)","lines":2}]},{"id":"OVF_48","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"load_resource_1033 sizes the decode buffers as g_new(guchar, cinfo.output_height * cinfo.output_width * cinfo.output_components). The factors are libjpeg int/JDIMENSION values from the embedded JPEG header; the product is computed in int arithmetic and can overflow (e.g. ~65500x65500x3), wrapping to a small allocation. rowbuf[i] then points into the undersized buf and jpeg_read_scanlines writes output_height rows past the end, a heap buffer overflow. The embedded thumbnail dimensions are not validated or capped.","fix":"Compute the size in gsize/guint64, sanity-check cinfo.output_width/height/components against a sane maximum before allocating, and bail out on overflow.","locations":[{"ref":"plug-ins/file-psd/psd-image-res-load.c:1089-1099","code":" 1089 |   buf = g_new (guchar, cinfo.output_height * cinfo.output_width\n 1090 |                * cinfo.output_components);\n 1091 |   if (res_a->id == PSD_THUMB_RES)\n 1092 |     rgb_buf = g_new (guchar, cinfo.output_height * cinfo.output_width\n 1093 |                      * cinfo.output_components);\n 1094 |   else\n 1095 |     rgb_buf = NULL;\n 1096 |   rowbuf = g_new (guchar *, cinfo.output_height);\n 1097 | \n 1098 |   for (i = 0; i < cinfo.output_height; ++i)\n 1099 |     rowbuf[i] = buf + cinfo.output_width * cinfo.output_components * i;","lines":11}]},{"id":"OVF_49","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"fread_unicode_string reads a 32-bit length 'len' from the file into a signed gint32 and then allocates g_try_malloc(len * 2). The multiplication is performed in 32-bit int and overflows for len near/above 2^30, producing a small allocation; the subsequent loop reads 2 bytes per index up to 'len' (line 502-515) and writes past the buffer. A negative len (top bit set) also makes len*2 negative/undefined and the loop bound signed-negative. Reachable wherever unicode strings are parsed (layer/image resource names).","fix":"Treat len as unsigned, reject len > a sane maximum (and bound against the remaining stream), and compute the byte size with g_size_checked_mul before allocating.","locations":[{"ref":"plug-ins/file-psd/psd-util.c:469-515","code":"  469 |   if (psd_read (input, &len, 4, error) < 4)\n  470 |     {\n  471 |       psd_set_error (error);\n  472 |       return NULL;\n  473 |     }\n  474 |   *bytes_read += 4;\n  475 | \n  476 |   if (! ibm_pc_format)\n  477 |     len = GINT32_FROM_BE (len);\n  478 |   else\n  479 |     len = GINT32_FROM_LE (len);\n  480 | \n  481 |   IFDBG(4) g_debug (\"Unicode string length %d\", len);\n  482 | \n  483 |   if (len == 0)\n  484 |     {\n  485 |       if (! psd_seek (input, mod_len - 1, G_SEEK_CUR, error))\n  486 |         {\n  487 |           psd_set_error (error);\n  488 |           return NULL;\n  489 |         }\n  490 |       *bytes_read += (mod_len - 1);\n  491 |       *bytes_written = 0;\n  492 |       return NULL;\n  493 |     }\n  494 | \n  495 |   utf16_str = g_try_malloc (len * 2);\n  496 |   if (! utf16_str)\n  497 |     {\n  498 |       psd_set_error (error);\n  499 |       return NULL;\n  500 |     }\n  501 | \n  502 |   for (i = 0; i < len; ++i)\n  503 |     {\n  504 |       if (psd_read (input, &utf16_str[i], 2, error) < 2)\n  505 |         {\n  506 |           psd_set_error (error);\n  507 |           g_free (utf16_str);\n  508 |           return NULL;\n  509 |         }\n  510 |       *bytes_read += 2;\n  511 |       if (! ibm_pc_format)\n  512 |         utf16_str[i] = GINT16_FROM_BE (utf16_str[i]);\n  513 |       else\n  514 |         utf16_str[i] = GINT16_FROM_LE (utf16_str[i]);\n  515 |     }","lines":47}]},{"id":"OVF_50","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"SGI loader never validates sgip->bpp can be 0. sgiOpenFile reads bpp with getc() and only rejects values > 2 (sgi-lib.c:320), so bpp == 0 (or EOF == -1) is accepted. In load_image the per-tile pixel buffer is sized 'tile_height * sgip->xsize * sgip->bpp * bytes'; with bpp == 0 this is a zero-size allocation, but the 16-bit pixel-fill loop still writes xsize*bytes elements per row into pixels[count], producing a heap buffer overflow. (bpp == -1 from EOF yields a huge/negative size instead.)","fix":"In sgiOpenFile reject bpp < 1 || bpp > 2 for SGI_READ (mirror the SGI_WRITE check at sgi-lib.c:367). Also treat getc() returning EOF on comp/bpp as a read error.","locations":[{"ref":"plug-ins/file-sgi/sgi-lib.c:318-324","code":"  318 |         sgip->comp = getc (sgip->file);\n  319 |         sgip->bpp  = getc (sgip->file);\n  320 |         if (sgip->bpp > 2)\n  321 |           {\n  322 |             free (sgip);\n  323 |             return (NULL);\n  324 |           }","lines":7},{"ref":"plug-ins/file-sgi/sgi.c:472-477","code":"  472 |   tile_height = gimp_tile_height ();\n  473 |   pixels      = g_new (guchar *, tile_height);\n  474 |   pixels[0]   = g_new (guchar, ((gsize) tile_height) * sgip->xsize * sgip->bpp * bytes);\n  475 | \n  476 |   for (i = 1; i < tile_height; i ++)\n  477 |     pixels[i] = pixels[0] + (((gsize) sgip->xsize) * sgip->bpp * bytes * i);","lines":6},{"ref":"plug-ins/file-sgi/sgi.c:513-534","code":"  513 |       if (sgip->bpp == 1)\n  514 |         {\n  515 |           /*\n  516 |            * 8-bit (unsigned) pixels...\n  517 |            */\n  518 | \n  519 |           for (x = 0, pptr = pixels[count]; x < sgip->xsize; x ++)\n  520 |             for (i = 0; i < bytes; i ++, pptr ++)\n  521 |               *pptr = rows[i][x];\n  522 |         }\n  523 |       else\n  524 |         {\n  525 |           /*\n  526 |            * 16-bit (unsigned) pixels...\n  527 |            */\n  528 | \n  529 |           guint16 *pixels16;\n  530 | \n  531 |           for (x = 0, pixels16 = (guint16 *) pixels[count]; x < sgip->xsize; x ++)\n  532 |             for (i = 0; i < bytes; i ++, pixels16 ++)\n  533 |               *pixels16 = rows[i][x];\n  534 |         }","lines":22}]},{"id":"OVF_51","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"SGI compression offset/length tables are allocated with 'calloc(sgip->ysize * sgip->zsize, sizeof(long))'. ysize and zsize are unsigned short (each up to 65535) and the multiply 'ysize * zsize' is performed in int, so it can overflow (up to ~4.29e9 > INT_MAX) before being passed to calloc. The subsequent nested loop writes ysize*zsize longs (getlong) into the (wrongly sized) table[0], overflowing the heap. zsize is also used to size the table[] pointer array and is never bounded.","fix":"Validate xsize/ysize/zsize against sane limits right after reading the header (the GIMP_MAX_IMAGE_SIZE checks in sgi.c are commented out). Compute the table element count as a 64-bit value (gsize) and reject if it exceeds a limit before calling calloc.","locations":[{"ref":"plug-ins/file-sgi/sgi-lib.c:341-359","code":"  341 |           sgip->table    = calloc(sgip->zsize, sizeof(long *));\n  342 |           if (sgip->table == NULL)\n  343 |             {\n  344 |               free(sgip);\n  345 |               return (NULL);\n  346 |             }\n  347 |           sgip->table[0] = calloc (sgip->ysize * sgip->zsize, sizeof (long));\n  348 |           if (sgip->table[0] == NULL)\n  349 |             {\n  350 |               free(sgip->table);\n  351 |               free(sgip);\n  352 |               return (NULL);\n  353 |             }\n  354 |           for (i = 1; i < sgip->zsize; i ++)\n  355 |             sgip->table[i] = sgip->table[0] + i * sgip->ysize;\n  356 | \n  357 |           for (i = 0; i < sgip->zsize; i ++)\n  358 |             for (j = 0; j < sgip->ysize; j ++)\n  359 |               sgip->table[i][j] = getlong(sgip);","lines":19},{"ref":"plug-ins/file-sgi/sgi-lib.c:333-360","code":"  333 |         if (sgip->comp)\n  334 |         {\n  335 |          /*\n  336 |           * This file is compressed; read the scanline tables...\n  337 |           */\n  338 | \n  339 |           fseek(sgip->file, 512, SEEK_SET);\n  340 | \n  341 |           sgip->table    = calloc(sgip->zsize, sizeof(long *));\n  342 |           if (sgip->table == NULL)\n  343 |             {\n  344 |               free(sgip);\n  345 |               return (NULL);\n  346 |             }\n  347 |           sgip->table[0] = calloc (sgip->ysize * sgip->zsize, sizeof (long));\n  348 |           if (sgip->table[0] == NULL)\n  349 |             {\n  350 |               free(sgip->table);\n  351 |               free(sgip);\n  352 |               return (NULL);\n  353 |             }\n  354 |           for (i = 1; i < sgip->zsize; i ++)\n  355 |             sgip->table[i] = sgip->table[0] + i * sgip->ysize;\n  356 | \n  357 |           for (i = 0; i < sgip->zsize; i ++)\n  358 |             for (j = 0; j < sgip->ysize; j ++)\n  359 |               sgip->table[i][j] = getlong(sgip);\n  360 |         };","lines":28}]},{"id":"OVF_52","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"load_sketchbook_layers() reads the TIFFTAG_SUBIFD count into a gint16 'sub_len' (libtiff returns the SubIFD count as a uint16). A count above 32767 wraps to a negative gint16. That value is then used both as a VLA size 'toff_t offsets[sub_len]' (negative/huge size = undefined behavior, stack corruption or crash) and as 'memcpy(offsets, ptr, sub_len * sizeof(offsets[0]))' where a negative count converts to an enormous size_t -> wild memcpy. Even for legitimate large counts the unbounded stack VLA (up to ~65535*8 bytes) is a stack-exhaustion vector.","fix":"Read the count into an unsigned type (uint16_t), validate it against a sane upper bound, and use a heap allocation (g_new/g_malloc) sized from the validated count instead of a stack VLA. Guard the memcpy with the validated size.","locations":[{"ref":"plug-ins/file-tiff/file-tiff-load.c:2455","code":" 2455 |   gint16          sub_len;","lines":1},{"ref":"plug-ins/file-tiff/file-tiff-load.c:2525-2532","code":" 2525 |   if (TIFFGetField (tif, TIFFTAG_SUBIFD, &sub_len, &ptr))\n 2526 |     {\n 2527 |       toff_t offsets[sub_len];\n 2528 |       gint   count = 1;\n 2529 | \n 2530 |       memcpy (offsets, ptr, sub_len * sizeof (offsets[0]));\n 2531 | \n 2532 |       for (gint i = 0; i < sub_len; i++)","lines":8}]},{"id":"OVF_53","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"In load_photoshop_layers(), photoshop_len (gint32, attacker-controlled length of TIFFTAG_IMAGESOURCEDATA) is decremented by 36 and the pointer advanced by 36 with no check that the tag is at least 36 bytes long. If the tag carries fewer than 36 bytes, photoshop_len becomes negative; it is then passed to fwrite(photoshop_data, 1, photoshop_len, fp) where the negative gint is converted to a huge size_t, causing a massive out-of-bounds read of process memory (and write into the temp file). photoshop_data += 36 also moves the read pointer past the end of the tag buffer.","fix":"Before subtracting, verify 'if (photoshop_len < 36) return;' (or skip the layer block). Also bail out / handle the fp==NULL case explicitly instead of continuing to fwrite on a NULL FILE*.","locations":[{"ref":"plug-ins/file-tiff/file-tiff-load.c:2802-2825","code":" 2802 |   if (TIFFGetField (tif, TIFFTAG_IMAGESOURCEDATA, &photoshop_len, &photoshop_data))\n 2803 |     {\n 2804 |       FILE           *fp;\n 2805 |       GFile          *temp_file   = NULL;\n 2806 |       GimpProcedure  *procedure;\n 2807 |       GimpValueArray *return_vals = NULL;\n 2808 | \n 2809 |       /* Photoshop metadata starts with 'Adobe Photoshop Document Data Block'\n 2810 |        * so we need to skip past that for the data. */\n 2811 |       photoshop_data += 36;\n 2812 |       photoshop_len  -= 36;\n 2813 | \n 2814 |       temp_file = gimp_temp_file (\"tmp\");\n 2815 |       fp = g_fopen (g_file_peek_path (temp_file), \"wb\");\n 2816 | \n 2817 |       if (! fp)\n 2818 |         {\n 2819 |           g_message (_(\"Error trying to open temporary %s file '%s' \"\n 2820 |                        \"for tiff metadata loading: %s\"),\n 2821 |                      \"tmp\", gimp_file_get_utf8_name (temp_file),\n 2822 |                      g_strerror (errno));\n 2823 |         }\n 2824 | \n 2825 |       fwrite (photoshop_data, sizeof (guchar), photoshop_len, fp);","lines":24},{"ref":"plug-ins/file-tiff/file-tiff-load.c:2811-2812","code":" 2811 |       photoshop_data += 36;\n 2812 |       photoshop_len  -= 36;","lines":2}]},{"id":"OVF_54","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"Out-of-bounds array read in write_metadata_tag_multiple. The 'clear old tag data' loop iterates item from 0 to n_columns and indexes the hard-coded global locationshown[item] instead of the function's column_tags[item] parameter. locationshown[] has only n_locationshown==6 entries, but this generic function is also called for Licensor with n_columns==8, so locationshown[6] and locationshown[7] are read out of bounds and the garbage pointers are passed to g_snprintf(\"%s code":"  100 |   else if (strcmp (element_name, \"list-element\") == 0)\n  101 |     {\n  102 |       listelement = TRUE;\n  103 |       row_count += 1;\n  104 |     }\n  105 |   else if (strcmp (element_name, \"element\") == 0)\n  106 |     {\n  107 |       element = TRUE;\n  108 |       item_count += 1;\n  109 |     }","lines":10},{"ref":"plug-ins/metadata/metadata-xml.c:943-947","code":"  943 |   else if (strcmp (element_name, \"element\") == 0)\n  944 |     {\n  945 |       element = FALSE;\n  946 |       list_tag_data[row_count][item_count] = g_strdup(str_element);\n  947 |     }","lines":5}]},{"id":"OVF_56","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"readstr_upto() (the atom/symbol token reader) writes the UTF-8 encoding of each input character into the fixed 1024-byte sc->strbuff BEFORE testing the buffer bound. Each iteration does len = g_unichar_to_utf8(c, p); p += len; and only then the while-condition checks (p - sc->strbuff < sizeof(sc->strbuff)). When p is within the last few bytes of strbuff the test still passes, so the next iteration writes up to 6 bytes starting at offset up to 1023, overrunning the buffer (which lives inside the heap-allocated scheme struct) by up to ~5 bytes and corrupting adjacent struct fields. Also inchar() can return EOF (-1) which is passed to g_unichar_to_utf8 as gunichar 0xFFFFFFFF with no early-out. Reachable purely from untrusted script text by feeding an atom/symbol token longer than ~1018 bytes.","fix":"Test the bound (with a 6-byte margin for the maximum UTF-8 encoding) and check for c == EOF BEFORE writing: break out when (p - sc->strbuff) >= sizeof(sc->strbuff) - 6 or c == EOF, then NUL-terminate cleanly.","locations":[{"ref":"plug-ins/script-fu/libscriptfu/tinyscheme/scheme.c:1894-1916","code":" 1894 | static char *readstr_upto(scheme *sc, char *delim) {\n 1895 |   char *p = sc->strbuff;\n 1896 |   gunichar c = 0;\n 1897 |   gunichar c_prev = 0;\n 1898 |   int len = 0;\n 1899 | \n 1900 |   do {\n 1901 |     c_prev = c;\n 1902 |     c = inchar(sc);\n 1903 |     len = g_unichar_to_utf8(c, p);\n 1904 |     p += len;\n 1905 |   } while ((p - sc->strbuff < sizeof(sc->strbuff)) &&\n 1906 |            (c && !is_one_of(delim, c)));\n 1907 | \n 1908 |   if(p == sc->strbuff+2 && c_prev == '\\\\')\n 1909 |     *p = '\\0';\n 1910 |   else\n 1911 |   {\n 1912 |     backchar(sc,c);    /* put back the delimiter */\n 1913 |     p[-len] = '\\0';\n 1914 |   }\n 1915 |   return sc->strbuff;\n 1916 | }","lines":23}]},{"id":"OVF_57","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"readstrexp() (the quoted-string \"...\" reader) has the same flaw. The guard at line 1928 (p - sc->strbuff > sizeof(sc->strbuff)-1) permits p == strbuff+1023, after which the st_ok default case does len = g_unichar_to_utf8(c, p); p += len; writing up to 6 bytes at offset 1023 and overflowing the 1024-byte sc->strbuff by up to 5 bytes. Reachable from untrusted script via a long quoted string containing a multibyte UTF-8 character near the 1024-byte boundary. Heap struct corruption.","fix":"Require a 6-byte margin in the guard before any multibyte write: if (c == EOF || (p - sc->strbuff) > (int)sizeof(sc->strbuff) - 6) return sc->F; The single-byte escape writes are also unbounded by this margin and should be covered too.","locations":[{"ref":"plug-ins/script-fu/libscriptfu/tinyscheme/scheme.c:1919-2027","code":" 1919 | static pointer readstrexp(scheme *sc) {\n 1920 |   char *p = sc->strbuff;\n 1921 |   gunichar c;\n 1922 |   int c1=0;\n 1923 |   int len;\n 1924 |   enum { st_ok, st_bsl, st_x1, st_x2, st_oct1, st_oct2 } state=st_ok;\n 1925 | \n 1926 |   for (;;) {\n 1927 |     c=inchar(sc);\n 1928 |     if(c == EOF || p-sc->strbuff > sizeof(sc->strbuff)-1) {\n 1929 |       return sc->F;\n 1930 |     }\n 1931 |     switch(state) {\n 1932 |     case st_ok:\n 1933 |       switch(c) {\n 1934 |       case '\\ 4010 |           } else {\n 4011 |                index1=g_utf8_strlen(str, -1);\n 4012 |           }\n 4013 | \n 4014 |           /* store the contents of the argument strings into the new string */\n 4015 |           beg = g_utf8_offset_to_pointer(str, (long)index0);\n 4016 |           end = g_utf8_offset_to_pointer(str, (long)index1);\n 4017 |           len=end-beg;\n 4018 | \n 4019 |           str = (char *)sc->malloc(len+1);\n 4020 |           if (str == NULL) {\n 4021 |              g_warning (\"%s substring\", G_STRFUNC);\n 4022 |              sc->no_memory=1;\n 4023 |              Error_1(sc,\"string-set!: No memory to extract substring:\",car(sc->args));\n 4024 |           }\n 4025 | \n 4026 |           memcpy(str, beg, len);\n 4027 |           str[len] = '\\0';","lines":29}]},{"id":"OVF_59","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":true,"description":"vector-ref and vector-set! only validate index >= ivalue(vec) (upper bound) and never check index < 0. index = ivalue(x) is a signed int taken directly from script input. A negative index passes the guard and reaches vector_elem/set_vector_elem, which compute n = ielem/2 (negative) and access vec+1+n - a cell BEFORE the vector storage. (vector-ref v -10) is an out-of-bounds read; (vector-set! v -10 obj) is an out-of-bounds write of an arbitrary scheme pointer. Directly triggerable from a script.","fix":"Add a lower-bound check to both handlers: if (index < 0 || index >= ivalue(car(sc->args))) Error_1(...).","locations":[{"ref":"plug-ins/script-fu/libscriptfu/tinyscheme/scheme.c:4078-4084","code":" 4078 |           index=ivalue(x);\n 4079 | \n 4080 |           if(index>=ivalue(car(sc->args))) {\n 4081 |                Error_1(sc,\"vector-ref: out of bounds:\",x);\n 4082 |           }\n 4083 | \n 4084 |           s_return(sc,vector_elem(car(sc->args),index));","lines":7},{"ref":"plug-ins/script-fu/libscriptfu/tinyscheme/scheme.c:4099-4104","code":" 4099 |           i " 2827 |   for (int i = 1; i <= mask_size; ++i)\n 2828 |     weights[i] = expf (-(i * i) / den);","lines":2}]},{"id":"OVF_61","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"Render/filter/profile buffer allocations compute size in 32-bit int arithmetic: 'fw * fh * babl_format_get_bytes_per_pixel(...)'. fw/fh are gint and bytes-per-pixel is a small gint, so the whole product is evaluated as int. render_buf_width/height come from the GIMP_DISPLAY_RENDER_BUF_SIZE env var which is only clamped to <= 8192 each (gimpdisplayshell.c:402-407). With 8192x8192 and a wide format (e.g. RGBA float = 16 bytes -> 1,073,741,824; RGBA double = 32 bytes -> 2,147,483,648) the product overflows INT_MAX and wraps negative/small. gegl_malloc then receives a wrong (tiny or huge) gsize, producing an undersized allocation. Subsequent gegl_buffer_get / color-transform writes of width*height pixels then write out of bounds (heap corruption). The same wrong size feeds gegl_buffer_linear_new_from_data, so the GeglBuffer also reports a bogus extent.","fix":"Cast to gsize before multiplying: gegl_malloc ((gsize) fw * fh * babl_format_get_bytes_per_pixel (...)). Compute stride as (gsize) too, and validate it fits the surface. Also lower the env-var clamp or reject sizes whose pixel-byte product exceeds a sane bound.","locations":[{"ref":"app/display/gimpdisplayshell-render.c:286-291","code":"  286 |           shell->filter_data =\n  287 |             gegl_malloc (fw * fh *\n  288 |                          babl_format_get_bytes_per_pixel (shell->filter_format));\n  289 | \n  290 |           shell->filter_stride =\n  291 |             fw * babl_format_get_bytes_per_pixel (shell->filter_format);","lines":6},{"ref":"app/display/gimpdisplayshell-profile.c:175-179","code":"  175 |       shell->profile_data =\n  176 |         gegl_malloc (w * h * babl_format_get_bytes_per_pixel (src_format));\n  177 | \n  178 |       shell->profile_stride =\n is_zero length. If bpp/dimensions ever produce a value near INT_MAX the multiply overflows to a small or negative value, leading to an undersized buffer with a large logical size used by gegl_buffer_set / inflate (heap/stack overflow).","fix":"Compute tile_size in gsize and assert/validate it equals the expected (bounded) tile byte size before allocating; reject tiles whose computed size exceeds XCF_TILE_WIDTH*XCF_TILE_HEIGHT*bpp.","locations":[{"ref":"app/xcf/xcf-load.c:4997-4998","code":" 4997 |   gint    bpp       = babl_format_get_bytes_per_pixel (format);\n 4998 |   gint    tile_size = bpp * tile_rect->width * tile_rect->height;","lines":2},{"ref":"app/xcf/xcf-load.c:5029-5031","code":" 5029 |   gint    bpp       = babl_format_get_bytes_per_pixel (format);\n 5030 |   gint    tile_size = bpp * tile_rect->width * tile_rect->height;\n 5031 |   guchar *tile_data = g_alloca (tile_size);","lines":3},{"ref":"app/xcf/xcf-load.c:5184-5186","code":" 5184 |   gint      bpp       = babl_format_get_bytes_per_pixel (format);\n 5185 |   gint      tile_size = bpp * tile_rect->width * tile_rect->height;\n 5186 |   guchar   *tile_data = g_alloca (tile_size);","lines":3}]},{"id":"OVF_68","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"xcf_read_int16/int32/int64 compute the byte length as count * 2/4/8 in plain int arithmetic and pass it to xcf_read_int8 (which takes a gint count). A large count (these are called with file-derived counts elsewhere, e.g. xcf_read_int32 with a 2-element array etc.) could overflow the int and produce a negative or truncated byte count, corrupting the amount actually read. The byte-swap loop then dereferences 'count' elements regardless of how many bytes were actually read.","fix":"Use gsize for the byte count and check count against G_MAXINT/element-size before multiplying. Bound the number of elements actually byte-swapped by the number of bytes successfully read.","locations":[{"ref":"app/xcf/xcf-read.c:56-117","code":"   56 | guint\n   57 | xcf_read_int16 (XcfInfo *info,\n   58 |                 guint16 *data,\n   59 |                 gint     count)\n   60 | {\n   61 |   guint total = 0;\n   62 | \n   63 |   if (count > 0)\n   64 |     {\n   65 |       total += xcf_read_int8 (info, (guint8 *) data, count * 2);\n   66 | \n   67 |       while (count--)\n   68 |         {\n   69 |           *data = g_ntohs (*data);\n   70 |           data++;\n   71 |         }\n   72 |     }\n   73 | \n   74 |   return total;\n   75 | }\n   76 | \n   77 | guint\n   78 | xcf_read_int32 (XcfInfo *info,\n   79 |                 guint32 *data,\n   80 |                 gint     count)\n   81 | {\n   82 |   guint total = 0;\n   83 | \n   84 |   if (count > 0)\n   85 |     {\n   86 |       total += xcf_read_int8 (info, (guint8 *) data, count * 4);\n   87 | \n   88 |       while (count--)\n   89 |         {\n   90 |           *data = g_ntohl (*data);\n   91 |           data++;\n   92 |         }\n   93 |     }\n   94 | \n   95 |   return total;\n   96 | }\n   97 | \n   98 | guint\n   99 | xcf_read_int64 (XcfInfo *info,\n  100 |                 guint64 *data,\n  101 |                 gint     count)\n  102 | {\n  103 |   guint total = 0;\n  104 | \n  105 |   if (count > 0)\n  106 |     {\n  107 |       total += xcf_read_int8 (info, (guint8 *) data, count * 8);\n  108 | \n  109 |       while (count--)\n  110 |         {\n  111 |           *data = GINT64_FROM_BE (*data);\n  112 |           data++;\n  113 |         }\n  114 |     }\n  115 | \n  116 |   return total;\n  117 | }","lines":62}]},{"id":"OVF_69","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"Wire-supplied unsigned array sizes (guint32) are used in allocations of the form g_new0(T, size + 1) while loops iterate with a signed 'gint i'. For GIMP_VALUE_HOLDS_COLOR_ARRAY the count is param->data.d_color_array.size (guint32) used at g_new0(GeglColor*, size + 1) and 'for (gint i = 0; i < size; i++)'. For GIMP_VALUE_HOLDS_CORE_OBJECT_ARRAY the count is param->data.d_id_array.size (guint32) used at g_new0(GObject*, size + 1). A malicious/buggy core supplying size near G_MAXUINT32 makes size+1 wrap to 0 (tiny allocation) while the loop, with i promoted to unsigned in the comparison, walks far past the allocation -> heap OOB write. Sizes from the wire are never bounded.","fix":"Treat the sizes as gsize, reject implausibly large counts before allocating, compute (gsize) size + 1 to avoid 32-bit wrap, and iterate with a matching unsigned/gsize index.","locations":[{"ref":"libgimp/gimpgpparams-body.c:1075-1126","code":" 1075 |   else if (GIMP_VALUE_HOLDS_COLOR_ARRAY (value))\n 1076 |     {\n 1077 |       GeglColor **colors;\n 1078 | \n 1079 |       colors = g_new0 (GeglColor *, param->data.d_color_array.size + 1);\n 1080 | \n 1081 |       for (gint i = 0; i < param->data.d_color_array.size; i++)\n 1082 |         {\n 1083 |           GeglColor        *color;\n 1084 |           const Babl       *format  = NULL;\n 1085 |           const Babl       *space   = NULL;\n 1086 |           GimpColorProfile *profile = NULL;\n 1087 |           const gchar      *encoding;\n 1088 |           gint              bpp;\n 1089 | \n 1090 |           encoding = param->data.d_color_array.colors[i].format.encoding;\n 1091 |           if (param->data.d_color_array.colors[i].format.profile_size > 0)\n 1092 |             profile = gimp_color_profile_new_from_icc_profile (param->data.d_color_array.colors[i].format.profile_data,\n 1093 |                                                                param->data.d_color_array.colors[i].format.profile_size,\n 1094 |                                                                NULL);\n 1095 | \n 1096 |           if (profile)\n 1097 |             {\n 1098 |               GError *error = NULL;\n 1099 | \n 1100 |               space = gimp_color_profile_get_space (profile,\n 1101 |                                                     GIMP_COLOR_RENDERING_INTENT_RELATIVE_COLORIMETRIC,\n 1102 |                                                     &error);\n 1103 | \n 1104 |               if (! space)\n 1105 |                 {\n 1106 |                   g_printerr (\"%s: failed to create Babl space from profile: %s\\n\",\n 1107 |                               G_STRFUNC, error->message);\n 1108 |                   g_clear_error (&error);\n 1109 |                 }\n 1110 |               g_object_unref (profile);\n 1111 |             }\n 1112 |           format = babl_format_with_space (encoding, space);\n 1113 |           color  = gegl_color_new (\"black\");\n 1114 | \n 1115 |           bpp = babl_format_get_bytes_per_pixel (format);\n 1116 |           if (bpp != param->data.d_color_array.colors[i].size)\n 1117 |             g_printerr (\"%s: encoding \\\"%s\\\" expects %d bpp but data size is %d bpp.\\n\",\n 1118 |                         G_STRFUNC, encoding, bpp, param->data.d_color_array.colors[i].size);\n 1119 |           else\n 1120 |             gegl_color_set_pixel (color, format, param->data.d_color_array.colors[i].data);\n 1121 | \n 1122 |           colors[i] = color;\n 1123 |         }\n 1124 | \n 1125 |       g_value_take_boxed (value, colors);\n 1126 |     }","lines":52},{"ref":"libgimp/gimpgpparams-body.c:1127-1183","code":" 1127 |   else if (GIMP_VALUE_HOLDS_CORE_OBJECT_ARRAY (value))\n 1128 |     {\n 1129 |       GType     object_type = G_TYPE_INVALID;\n 1130 |       GObject **objects;\n 1131 |       gint      i;\n 1132 | \n 1133 |       if (param->data.d_id_array.type_name != NULL)\n 1134 |         {\n 1135 |           /* An empty array from a NULL has an arbitrary type_name set earlier. */\n 1136 |           object_type = g_type_from_name (param->data.d_id_array.type_name);\n 1137 |         }\n 1138 |       else if (pspec != NULL)\n 1139 |         {\n 1140 |           object_type = gimp_param_spec_core_object_array_get_object_type (pspec);\n 1141 |         }\n 1142 | \n 1143 |       if (param->data.d_id_array.size > 1 && ! g_type_is_a (object_type, G_TYPE_OBJECT))\n 1144 |         {\n 1145 |           g_warning (\"%s: GimpCoreObjectArray of unknown type.\", G_STRFUNC);\n 1146 |           return;\n 1147 |         }\n 1148 | \n 1149 |       /* size might be zero. */\n 1150 | \n 1151 |       objects = g_new0 (GObject *, param->data.d_id_array.size + 1);\n 1152 | \n 1153 |       for (i = 0; i < param->data.d_id_array.size; i++)\n 1154 |         {\n 1155 |           gint id = param->data.d_id_array.data[i];\n 1156 | \n 1157 |           if (object_type == GIMP_TYPE_IMAGE)\n 1158 |             {\n 1159 |               objects[i] = (GObject *) get_image_by_id (gimp, id);\n 1160 |             }\n 1161 |           else if (g_type_is_a (object_type, GIMP_TYPE_ITEM))\n 1162 |             {\n 1163 |               objects[i] = (GObject *) get_item_by_id (gimp, id);\n 1164 |             }\n 1165 |           else if (g_type_is_a (object_type, GIMP_TYPE_DRAWABLE_FILTER))\n 1166 |             {\n 1167 |               objects[i] = (GObject *) get_filter_by_id (gimp, id);\n 1168 |             }\n 1169 |           else if (g_type_is_a (object_type, GIMP_TYPE_DISPLAY))\n 1170 |             {\n 1171 |               objects[i] = (GObject *) get_display_by_id (gimp, id);\n 1172 |             }\n 1173 |           else if (g_type_is_a (object_type, GIMP_TYPE_RESOURCE))\n 1174 |             {\n 1175 |               objects[i] = (GObject *) get_resource_by_id (id);\n 1176 |             }\n 1177 |         }\n 1178 | \n 1179 |       /* Even when size is zero, set gvalue to an empty GimpObjectArray object,\n 1180 |        * having a valid but possibly arbitrary type of its elements.\n 1181 |        */\n 1182 |       g_value_set_boxed (value, objects);\n 1183 |     }","lines":57}]},{"id":"OVF_70","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"gimp_gp_param_to_value() unpacking a GIMP_CURVE_SMOOTH curve reads param->data.d_curve.points[j*2], points[(j*2)+1] and point_types[j] for j in [0, n_points) using the wire-supplied n_points, without validating that the points array holds 2*n_points gdoubles and point_types holds n_points entries. A crafted GPParam with a large n_points but short points/point_types arrays causes a heap OOB read.","fix":"Carry and validate the actual element counts of the points and point_types arrays against 2*n_points and n_points respectively before iterating.","locations":[{"ref":"libgimp/gimpgpparams-body.c:1219-1228","code":" 1219 |       if (param->data.d_curve.curve_type == GIMP_CURVE_SMOOTH)\n 1220 |         {\n 1221 |           for (gint j = 0; j < param->data.d_curve.n_points; j++)\n 1222 |             {\n 1223 |               gimp_curve_add_point (curve, param->data.d_curve.points[j * 2],\n 1224 |                                     param->data.d_curve.points[(j * 2) + 1]);\n 1225 | \n 1226 |               gimp_curve_set_point_type (curve, j,\n 1227 |                                          param->data.d_curve.point_types[j]);\n 1228 |             }","lines":10}]},{"id":"OVF_71","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"gimp_gp_param_to_value() unpacking a GIMP_CURVE_FREE curve uses the wire-supplied n_samples to drive a loop that divides by (n_samples - 1). When n_samples == 1 this is a division by zero (double 0.0/0.0 -> NaN passed to gimp_curve_set_sample). More importantly, samples[j] is read for j in [0, n_samples) without any validation that the wire-supplied samples array actually contains n_samples gdoubles, so a mismatched n_samples vs samples buffer is a heap OOB read.","fix":"Validate n_samples (>= 2 for the FREE branch, or special-case 0/1) and verify the samples array length matches n_samples before iterating; guard the (n_samples - 1) divisor.","locations":[{"ref":"libgimp/gimpgpparams-body.c:1230-1239","code":" 1230 |       else /* if (param->data.d_curve.curve_type == GIMP_CURVE_FREE) */\n 1231 |         {\n 1232 |           gint n_samples = param->data.d_curve.n_samples;\n 1233 | \n 1234 |           gimp_curve_set_n_samples (curve, n_samples);\n 1235 |           for (gint j = 0; j < n_samples; j++)\n 1236 |             gimp_curve_set_sample (curve,\n 1237 |                                    (gdouble) j / (gdouble) (n_samples - 1),\n 1238 |                                    param->data.d_curve.samples[j]);\n 1239 |         }","lines":10}]},{"id":"OVF_72","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In _gp_params_read, GP_PARAM_TYPE_CURVE reads n_points and n_samples as int32 from the wire and uses them unchecked: g_new0(gdouble, 2 * n_points) and the matching reads. `2 * n_points` is a signed int multiply that overflows for large n_points, and profile_size / array sizes elsewhere are also unbounded g_new0/g_new allocations driven by wire data (d_array.size, d_strv size+1, d_id_array.size, d_color_array.size). No sanity caps; a malicious peer can cause overflow or enormous allocation.","fix":"Validate all counts/sizes read from the wire (non-negative, within sane bounds) and use overflow-checked multiplication and g_try_new0 before reading the bulk data.","locations":[{"ref":"libgimpbase/gimpprotocol.c:2252-2308","code":" 2252 |         case GP_PARAM_TYPE_CURVE:\n 2253 |           {\n 2254 |             if (! _gimp_wire_read_int32 (channel,\n 2255 |                                          &(*params)[i].data.d_curve.curve_type, 1,\n 2256 |                                          user_data))\n 2257 |               goto cleanup;\n 2258 | \n 2259 |             if (! _gimp_wire_read_int32 (channel,\n 2260 |                                          &(*params)[i].data.d_curve.n_points, 1,\n 2261 |                                          user_data))\n 2262 |               goto cleanup;\n 2263 | \n 2264 |             if (! _gimp_wire_read_int32 (channel,\n 2265 |                                          &(*params)[i].data.d_curve.n_samples, 1,\n 2266 |                                          user_data))\n 2267 |               goto cleanup;\n 2268 | \n 2269 |             (*params)[i].data.d_curve.points = g_new0 (gdouble,\n 2270 |                                                        2 * (*params)[i].data.d_curve.n_points);\n 2271 | \n 2272 |             if (! _gimp_wire_read_double (channel,\n 2273 |                                           (*params)[i].data.d_curve.points,\n 2274 |                                           2 * (*params)[i].data.d_curve.n_points,\n 2275 |                                           user_data))\n 2276 |               {\n 2277 |                 g_free ((*params)[i].data.d_curve.points);\n 2278 |                 (*params)[i].data.d_curve.points = NULL;\n 2279 |                 goto cleanup;\n 2280 |               }\n 2281 | \n 2282 |             (*params)[i].data.d_curve.point_types = g_new0 (guint32,\n 2283 |                                                             (*params)[i].data.d_curve.n_points);\n 2284 | \n 2285 |             if (! _gimp_wire_read_int32 (channel,\n 2286 |                                          (*params)[i].data.d_curve.point_types,\n 2287 |                                          (*params)[i].data.d_curve.n_points,\n 2288 |                                          user_data))\n 2289 |               {\n 2290 |                 g_free ((*params)[i].data.d_curve.point_types);\n 2291 |                 (*params)[i].data.d_curve.point_types = NULL;\n 2292 |                 goto cleanup;\n 2293 |               }\n 2294 | \n 2295 |             (*params)[i].data.d_curve.samples = g_new0 (gdouble,\n 2296 |                                                         (*params)[i].data.d_curve.n_samples);\n 2297 | \n 2298 |             if (! _gimp_wire_read_double (channel,\n 2299 |                                           (*params)[i].data.d_curve.samples,\n 2300 |                                           (*params)[i].data.d_curve.n_samples,\n 2301 |                                           user_data))\n 2302 |               {\n 2303 |                 g_free ((*params)[i].data.d_curve.samples);\n 2304 |                 (*params)[i].data.d_curve.samples = NULL;\n 2305 |                 goto cleanup;\n 2306 |               }\n 2307 |           }\n 2308 |           break;","lines":57},{"ref":"libgimpbase/gimpprotocol.c:2153","code":" 2153 |             (*params)[i].data.d_strv = g_new0 (gchar *, size + 1);","lines":1},{"ref":"libgimpbase/gimpprotocol.c:2112-2113","code":" 2112 |           (*params)[i].data.d_array.data = g_new0 (guint8,\n 2113 |                                                    (*params)[i].data.d_array.size);","lines":2},{"ref":"libgimpbase/gimpprotocol.c:2021-2022","code":" 2021 |           (*params)[i].data.d_color_array.colors = g_new0 (GPParamColor,\n 2022 |                                                            (*params)[i].data.d_color_array.size);","lines":2}]},{"id":"OVF_73","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"_gimp_wire_read_gegl_color reads icc_length as a guint32 directly from the wire and passes it unchecked to g_new0(guint8, icc_length) and then _gimp_wire_read_int8(..., icc_length, ...). _gimp_wire_read_int8 takes a signed gint count, so a value > INT_MAX is reinterpreted negative (the g_return_val_if_fail(count >= 0) then fails and returns FALSE, but only after a potentially huge g_new0 of up to 4GB has been requested). No upper bound is enforced on attacker-controlled icc_length.","fix":"Bound icc_length to a reasonable maximum before allocating, use g_try_new0, and ensure the guint32 length cannot be silently passed as a negative gint count.","locations":[{"ref":"libgimpbase/gimpwire.c:496-530","code":"  496 |       guint32 size;\n  497 |       guint8  pixel[40];\n  498 |       guint32 icc_length;\n  499 | tive n_values and cap it to a sane maximum before allocating.","locations":[{"ref":"libgimpconfig/gimpconfig-deserialize.c:945-959","code":"  945 | static GTokenType\n  946 | gimp_config_deserialize_array (GValue     *value,\n  947 |                                GScanner   *scanner)\n  948 | {\n  949 |   gint32     *values;\n  950 |   gint        n_values;\n  951 |   GTokenType  result_token = G_TOKEN_RIGHT_PAREN;\n  952 | \n  953 |   if (! gimp_scanner_parse_int (scanner, &n_values))\n  954 |     return G_TOKEN_INT;\n  955 | \n  956 |   if (GIMP_VALUE_HOLDS_INT32_ARRAY (value))\n  957 |     values = g_new0 (gint32, n_values);\n  958 |   else /* GIMP_VALUE_HOLDS_DOUBLE_ARRAY (value) */\n  959 |     values = (gint32 *) g_new0 (gdouble, n_values);","lines":15},{"ref":"libgimpconfig/gimpconfig-deserialize.c:847-850","code":"  847 |   if (! gimp_scanner_parse_int (scanner, &n_values))\n  848 |     return G_TOKEN_INT;\n  849 | \n  850 |   array = gimp_value_array_new (n_values);","lines":4}]},{"id":"OVF_75","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"p_stretch_curves() (freehand curve path) computes x2 = (x1*255)/xmax for x1 in [0..xmax]. When xmax > 255 the else (interpolate) branch reads cd->curve[outline][x2+1]; when x2 reaches 255 this reads cd->curve[outline][256], one element past the 'guchar curve[2][256]' array - an out-of-bounds read. xmax = src_width-1, so any layer wider than 256 px triggers it on the last columns.","fix":"Clamp x2 to <= 254 before reading curve[x2+1], or special-case x2 == 255 to avoid the +1 read (reuse curve[255]).","locations":[{"ref":"plug-ins/common/curve-bend.c:2304-2322","code":" 2304 |       for(x1 = 0; x1 <= xmax; x1++)\n 2305 |         {\n 2306 |           x2 = (x1 * 255) / xmax;\n 2307 | \n 2308 |           if ((xmax <= 255) && (x2 < 255))\n 2309 |             {\n 2310 |               cd->curve_ptr[outline][x1] =\n 2311 |                 ROUND ((cd->curve[outline][x2] * ymax) / 255);\n 2312 |             }\n 2313 |           else\n 2314 |             {\n 2315 |               /* interpolate */\n 2316 |               rest = (((gdouble)x1 * 255.0) / (gdouble)xmax) - x2;\n 2317 |               ya = cd->curve[outline][x2];        /* y of this point */\n 2318 |               yb = cd->curve[outline][x2 +1];     /* y of next point */\n 2319 | \n 2320 |               cd->curve_ptr[outline][x1] =\n 2321 |                 ROUND (((ya + ((yb -ya) * rest)) * ymax) / 255);\n 2322 |             }","lines":19},{"ref":"plug-ins/common/curve-bend.c:2318","code":" 2318 |               yb = cd->curve[outline][x2 +1];     /* y of next point */","lines":1}]},{"id":"OVF_76","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"file-cel.c load_image(): for the new-style 4-bit row loop, fread reads (width+1)/2 bytes into buf, but the deinterleave loop runs 'for (j=0,k=0; j < width*2; j+=4, ++k)' reading buf[k] up to k = width/2 (exclusive) - matching (width+1)/2 only when width is odd. Combined with 'buf = g_new(width*4)' this is within bounds, but for the 8-bit case the loop reads buf[k] for k up to width-1 while only 'width' bytes were read - OK. The real risk: 'colors = (1 << bpp)' with bpp==32 is 1<<32, undefined behavior / 0, then default grey palette loop 'for i<colors' over palette[256*3] would massively overflow if reached; it is only avoided because bpp==32 takes the RGB branch. Fragile coupling worth hardening.","fix":"Compute colors only for the indexed bpp values (4,8); never evaluate 1<<32. Clamp colors to <= 256 before the default-palette fill loop that writes into palette[256*3].","locations":[{"ref":"plug-ins/common/file-cel.c:435","code":"  435 |           colors = (1 << bpp);","lines":1},{"ref":"plug-ins/common/file-cel.c:616-619","code":"  616 |           for (i= 0; i < colors; ++i)\n  617 |             {\n  618 |               palette[i * 3] = palette[i * 3 + 1] = palette[i * 3 + 2]= i * 256 / colors;\n  619 |             }","lines":4}]},{"id":"OVF_77","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"file-paa.c load_image(): block_size is a 24-bit value read straight from the file (up to ~16MB) and passed to g_malloc0(block_size) with no validation; then fread(raw_data, block_size, 1, fp) is checked only for ==0. If the file is shorter than block_size, fread returns 0 and the code returns NULL but leaks 'image', 'buffer', and (the just-allocated) raw_data is freed only on some paths - here raw_data is leaked too (return NULL at line 308 without g_free(raw_data) or unref buffer).","fix":"Validate block_size against remaining file size; on short read free raw_data, unref buffer, delete image before returning.","locations":[{"ref":"plug-ins/common/file-paa.c:301-309","code":"  301 |       raw_data = g_malloc0 (block_size);\n  302 |       if (fread (raw_data, block_size, 1, fp) == 0)\n  303 |         {\n  304 |           g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  305 |                        _(\"Couldn't read image data from '%s'\"),\n  306 |                        gimp_file_get_utf8_name (file));\n  307 | \n  308 |           return NULL;\n  309 |         }","lines":9}]},{"id":"OVF_78","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"file-paa.c load_image() RGBA_8888/GRAY_ALPHA path: the LZSS output 'uncompressed_data' is sized estimated_size = width*height*4 (or /2 for non-8888), and for RGBA_8888 the whole buffer is handed to gegl_buffer_set for an RGBA_IMAGE (4 bytes/px == width*height*4, matches). But GRAY_ALPHA uses GIMP_GRAYA_IMAGE (2 bytes/px) while estimated_size was halved to width*height*2 - consistent - yet decode_lzss fills exactly estimated_size bytes only if the compressed stream is well-formed; a stream that ends early leaves the tail of uncompressed_data zero (g_malloc0) which is benign, but a stream that over-produces is caught only by the loose bounds in decode_lzss (see separate finding). The 4444/5551 loops iterate 'j < estimated_size' writing pixels[] sized width*height*4 with index (j/2)*4 - for the halved estimated_size this writes width*height*2 pixel-bytes-pairs == fills width*height*4 bytes, consistent.","fix":"Primary hardening is in decode_lzss bounds; additionally assert estimated_size matches the layer's bytes-per-pixel * width * height before gegl_buffer_set.","locations":[{"ref":"plug-ins/common/file-paa.c:336-358","code":"  336 |           if (! g_size_checked_mul (&estimated_size, (guint32) width, height) ||\n  337 |               ! g_size_checked_mul (&estimated_size, estimated_size, 4)       ||\n  338 |               (pixels = g_try_malloc0 (estimated_size)) == NULL)\n  339 |             {\n  340 |               g_set_error (error, G_FILE_ERROR, 0,\n  341 |                            _(\"Memory could not be allocated.\"));\n  342 |               g_object_unref (buffer);\n  343 |               return NULL;\n  344 |             }\n  345 | \n  346 |           if (paa_type != RGBA_8888)\n  347 |             estimated_size /= 2;\n  348 | \n  349 |           uncompressed_data = g_try_malloc0 (estimated_size);\n  350 |           if (uncompressed_data == NULL)\n  351 |             {\n  352 |               g_set_error (error, G_FILE_ERROR, 0,\n  353 |                            _(\"Memory could not be allocated.\"));\n  354 |               g_object_unref (buffer);\n  355 |               return NULL;\n  356 |             }\n  357 | \n  358 |           if (! decode_lzss (raw_data, uncompressed_data, estimated_size))","lines":23},{"ref":"plug-ins/common/file-paa.c:402-406","code":"  402 |               case RGBA_8888:\n  403 |               case GRAY_ALPHA:\n  404 |                 gegl_buffer_set (buffer, GEGL_RECTANGLE (0, 0, width, height), 0,\n  405 |                                  NULL, uncompressed_data, GEGL_AUTO_ROWSTRIDE);\n  406 |                 break;","lines":5}]},{"id":"OVF_79","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"load_ps() takes width/height from the PNM header produced by Ghostscript via read_pnmraw_type() (sscanf \"%d%d\" with no bounds). nread is computed as width*3 (pnmtype 6) or width and data = g_malloc(tile_height * image_width * bpp), all as int. A crafted PostScript/PDF that makes gs emit a header with a very large width overflows these int multiplications, under-allocating byteline/data while the copy loops use the large width/image_width - a heap overflow. image_width = width - skip_left can also be computed before validating width > skip_left.","fix":"Validate width/height (and maxval) from read_pnmraw_type against a sane positive maximum and ensure image_width/image_height are positive; compute allocation sizes in 64-bit and reject on overflow.","locations":[{"ref":"plug-ins/common/file-ps.c:2305-2356","code":" 2305 |   pnmtype = read_pnmraw_type (ifp, &width, &height, &maxval);\n 2306 | \n 2307 |   if ((width == urx+1) && (height == ury+1))  /* gs respected BoundingBox ? */\n 2308 |     {\n 2309 |       skip_left = llx;    skip_bottom = lly;\n 2310 |       image_width = width - skip_left;\n 2311 |       image_height = height - skip_bottom;\n 2312 |     }\n 2313 |   else\n 2314 |     {\n 2315 |       skip_left = skip_bottom = 0;\n 2316 |       image_width = width;\n 2317 |       image_height = height;\n 2318 |     }\n 2319 |   if (pnmtype == 4)   /* Portable Bitmap */\n 2320 |     {\n 2321 |       imagetype = GIMP_INDEXED;\n 2322 |       nread = (width+7)/8;\n 2323 |       bpp = 1;\n 2324 |       bitline = g_new (guchar, nread);\n 2325 |       byteline = g_new (guchar, nread * 8);\n 2326 | \n 2327 |       /* Get an array for mapping 8 bits in a byte to 8 bytes */\n 2328 |       temp = bit2byte;\n 2329 |       for (j = 0; j < 256; j++)\n 2330 |         for (i = 7; i >= 0; i--)\n 2331 |           *(temp++) = ((j & (1 << i)) != 0);\n 2332 |     }\n 2333 |   else if (pnmtype == 5)  /* Portable Greymap */\n 2334 |     {\n 2335 |       imagetype = GIMP_GRAY;\n 2336 |       nread = width;\n 2337 |       bpp = 1;\n 2338 |       byteline = g_new (guchar, nread);\n 2339 |     }\n 2340 |   else if (pnmtype == 6)  /* Portable Pixmap */\n 2341 |     {\n 2342 |       imagetype = GIMP_RGB;\n 2343 |       nread = width * 3;\n 2344 |       bpp = 3;\n 2345 |       byteline = g_new (guchar, nread);\n 2346 |     }\n 2347 |   else\n 2348 |     return NULL;\n 2349 | \n 2350 |   image = create_new_image (file, pagenum,\n 2351 |                             image_width, image_height, imagetype,\n 2352 |                             &layer);\n 2353 |   buffer = gimp_drawable_get_buffer (GIMP_DRAWABLE (layer));\n 2354 | \n 2355 |   tile_height = gimp_tile_height ();\n 2356 |   data = g_malloc (tile_height * image_width * bpp);","lines":52},{"ref":"plug-ins/common/file-ps.c:2322-2345","code":" 2322 |       nread = (width+7)/8;\n 2323 |       bpp = 1;\n 2324 |       bitline = g_new (guchar, nread);\n 2325 |       byteline = g_new (guchar, nread * 8);\n 2326 | \n 2327 |       /* Get an array for mapping 8 bits in a byte to 8 bytes */\n 2328 |       temp = bit2byte;\n 2329 |       for (j = 0; j < 256; j++)\n 2330 |         for (i = 7; i >= 0; i--)\n 2331 |           *(temp++) = ((j & (1 << i)) != 0);\n 2332 |     }\n 2333 |   else if (pnmtype == 5)  /* Portable Greymap */\n 2334 |     {\n 2335 |       imagetype = GIMP_GRAY;\n 2336 |       nread = width;\n 2337 |       bpp = 1;\n 2338 |       byteline = g_new (guchar, nread);\n 2339 |     }\n 2340 |   else if (pnmtype == 6)  /* Portable Pixmap */\n 2341 |     {\n 2342 |       imagetype = GIMP_RGB;\n 2343 |       nread = width * 3;\n 2344 |       bpp = 3;\n 2345 |       byteline = g_new (guchar, nread);","lines":24},{"ref":"plug-ins/common/file-ps.c:2356","code":" 2356 |   data = g_malloc (tile_height * image_width * bpp);","lines":1}]},{"id":"OVF_80","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"PSP LZ77 (PSP_COMP_LZ77) allocates the compressed input buffer directly from the file-supplied compressed_len with no bound: g_malloc(compressed_len) then fread(buf, compressed_len, 1, f). compressed_len comes from the channel chunk and is only byte-swapped; a crafted value up to 4 GiB causes an enormous allocation, and the fread return is not checked so a short read feeds partial/garbage data to zlib inflate.","fix":"Bound compressed_len against the channel's total/remaining length and the file size before allocating; use g_try_malloc and verify the fread read the full amount.","locations":[{"ref":"plug-ins/common/file-psp.c:1744-1745","code":" 1744 |       buf = g_malloc (compressed_len);\n 1745 |       fread (buf, compressed_len, 1, f);","lines":2},{"ref":"plug-ins/common/file-psp.c:2237","code":" 2237 |               compressed_len = GUINT32_FROM_LE (compressed_len);","lines":1}]},{"id":"OVF_81","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"PSP read_layer_block trusts namelen (guint16) for psp_ver_major>=4: name = g_malloc(namelen + 1) then fread(name, namelen, 1, f). namelen is bounded to 65535 so not catastrophic, but the fread is the only validation and is read before any check that the name fits within the layer sub-block; combined with no leak on later error paths the name buffer is generally freed, so impact is limited to reading attacker-chosen length without bounding to the block. Lower confidence.","fix":"Validate namelen against the remaining sub-block length before allocating/reading.","locations":[{"ref":"plug-ins/common/file-psp.c:1946-1973","code":" 1946 |           if (fread (&chunk_len, 4, 1, f) < 1\n 1947 |               || fread (&namelen, 2, 1, f) < 1\n 1948 |               /* A zero length layer name is apparently valid. To not get a warning for\n 1949 |                  namelen < 0 always being false we use this more complicated comparison. */\n 1950 |               || ((namelen = GUINT16_FROM_LE (namelen)) && (FALSE || namelen == 0))\n 1951 |               || (name = g_malloc (namelen + 1)) == NULL\n 1952 |               || (namelen > 0 && fread (name, namelen, 1, f) < 1)\n 1953 |               || fread (&type, 1, 1, f) < 1\n 1954 |               || fread (&image_rect, 16, 1, f) < 1\n 1955 |               || fread (&saved_image_rect, 16, 1, f) < 1\n 1956 |               || fread (&opacity, 1, 1, f) < 1\n 1957 |               || fread (&blend_mode, 1, 1, f) < 1\n 1958 |               || fread (&visibility, 1, 1, f) < 1\n 1959 |               || fread (&transparency_protected, 1, 1, f) < 1\n 1960 |               || fread (&link_group_id, 1, 1, f) < 1\n 1961 |               || fread (&mask_rect, 16, 1, f) < 1\n 1962 |               || fread (&saved_mask_rect, 16, 1, f) < 1\n 1963 |               || fread (&mask_linked, 1, 1, f) < 1\n 1964 |               || fread (&mask_disabled, 1, 1, f) < 1)\n 1965 |             {\n 1966 |               g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n 1967 |                            _(\"Error reading layer information chunk\"));\n 1968 | \n 1969 |               g_free (name);\n 1970 |               return NULL;\n 1971 |             }\n 1972 | \n 1973 |           name[namelen] = 0;","lines":28}]},{"id":"OVF_82","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"PSP read_colorprofile_block trusts file-supplied sizes. psp_header_size is read from the file and used as `fseek(f, psp_header_size - 8, SEEK_CUR)`; if psp_header_size < 8 the subtraction underflows (guint) producing a huge forward/relative seek. icc_profile_size is then read from the file and passed directly to g_malloc with no bound and the fread return is checked but the allocation size itself is unbounded (can be up to 4 GiB, causing a huge allocation / abort).","fix":"Reject psp_header_size < 8. Bound icc_profile_size against the remaining block/total length before allocating, and use g_try_malloc with a NULL check.","locations":[{"ref":"plug-ins/common/file-psp.c:2776-2799","code":" 2776 |   if (fread (&psp_header_size, 4, 1, f) < 1)\n 2777 |     {\n 2778 |       g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n 2779 |                    _(\"Error reading colorprofile chunk\"));\n 2780 |       return -1;\n 2781 |     }\n 2782 |   psp_header_size = GUINT32_FROM_LE (psp_header_size);\n 2783 | \n 2784 |   /* The next part is a 2 byte length value, followed by PSP's\n 2785 |    * internal name for the profile. We'll skip most of it,\n 2786 |    * except for the last 4 bytes which is the profile size */\n 2787 |   if (try_fseek (f, psp_header_size - 8, SEEK_CUR, error) < 0 ||\n 2788 |       fread (&icc_profile_size, 4, 1, f) < 1)\n 2789 |     {\n 2790 |       g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n 2791 |                    _(\"Error reading colorprofile chunk\"));\n 2792 |       return -1;\n 2793 |     }\n 2794 |   icc_profile_size = GUINT32_FROM_LE (icc_profile_size);\n 2795 | \n 2796 |   /* The rest of the code references load_resource_1039 ()\n 2797 |    * in psd-image-res-load.c */\n 2798 |   icc_profile = g_malloc (icc_profile_size);\n 2799 |   if (fread (icc_profile, icc_profile_size, 1, f) < 1)","lines":24}]},{"id":"OVF_83","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"file-pvr.c load_image(): width/height are read as raw gushort and passed directly to gimp_image_new(width,height,...) and to layer allocations with no validation that they are non-zero or within GIMP_MAX_IMAGE_SIZE. pvr_decode_rect computes 'count = width*height*2' and 'width*height*n_components' as int/gsize multiplications that can overflow for large dimensions, then g_try_malloc and fread use them.","fix":"Validate width>0,height>0,<=GIMP_MAX_IMAGE_SIZE; use g_size_ch MP_MAX_IMAGE_SIZE or overflow check is performed on width/height for TGA (unlike PCX and SunRAS).","fix":"Validate info->width and info->height against GIMP_MAX_IMAGE_SIZE right after parsing the header (around line 517), and use overflow-checked gsize multiplications (g_new with explicit checks) for all buffers derived from width/height/bytes/colorMapLength.","locations":[{"ref":"plug-ins/common/file-tga.c:1004-1026","code":" 1004 |       cmap_bytes = (info->colorMapSize + 7 ) / 8;\n 1005 |       tga_cmap = g_new (guchar, info->colorMapLength * cmap_bytes);\n 1006 | \n 1007 |       if (info->colorMapSize > 24 || info->alphaBits > 0)\n 1008 |         {\n 1009 |           /* indexed + full alpha, or alpha exists => promoted to RGBA */\n 1010 |           itype = GIMP_RGB;\n 1011 |           dtype = GIMP_RGBA_IMAGE;\n 1012 |           convert_cmap = g_new (guchar, info->colorMapLength * 4);\n 1013 |         }\n 1014 |       else if (info->colorMapIndex + info->colorMapLength > 256)\n 1015 |         {\n 1016 |           /* more than 256 colormap entries => promoted to RGB */\n 1017 |           itype = GIMP_RGB;\n 1018 |           dtype = GIMP_RGB_IMAGE;\n 1019 |           convert_cmap = g_new (guchar, info->colorMapLength * 3);\n 1020 |         }\n 1021 |       else\n 1022 |         {\n 1023 |           itype = GIMP_INDEXED;\n 1024 |           dtype = GIMP_INDEXED_IMAGE;\n 1025 |           gimp_cmap = g_new (guchar, info->colorMapLength * 3);\n 1026 |         }","lines":23},{"ref":"plug-ins/common/file-tga.c:1115-1118","code":" 1115 |   /* Allocate the data. */\n 1116 |   max_tileheight = gimp_tile_height ();\n 1117 |   data = g_new (guchar, info->width * max_tileheight * bpp);\n 1118 |   buf  = g_new (guchar, info->width * info->bytes);","lines":4}]},{"id":"OVF_87","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"file-tim.c load_image(): for PSX_24BPP, width is reduced by 'width = (gushort)((gfloat)width/1.5)' which can become 0 (e.g. width==1), but the zero check happened before this division; gimp_image_new(0,...) and the subsequent fread(pixels, width*3,...) with width 0 then proceed. For PSX_4BPP/PSX_8BPP, width is multiplied (width*=4 / width*=2) AFTER the zero check (lines 545-548) and can overflow gushort, producing a small/zero width while large pixel buffers are read - dimension/allocation mismatch.","fix":"Re-validate width (and the product against GIMP_MAX_IMAGE_SIZE) after the 1.5 division and after the *4/*2 multiplications; use a wider integer type for the multiply and reject overflow.","locations":[{"ref":"plug-ins/common/file-tim.c:396-400","code":"  396 |       if (tim_header.type[0] == PSX_24BPP)\n  397 |         {\n  398 |           width      = (gushort) ((gfloat) width / 1.5);\n  399 |           layer_type = GIMP_RGB_IMAGE;\n  400 |         }","lines":5},{"ref":"plug-ins/common/file-tim.c:545-548","code":"  545 |         if (tim_header.type[0] == PSX_4BPP)\n  546 |           width *= 4;\n  547 |         else if (tim_header.type[0] == PSX_8BPP)\n  548 |           width *= 2;","lines":4}]},{"id":"OVF_88","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"XBM load_image() allocates the row buffer with data = g_malloc (width * tileheight) using plain int multiplication. width is only bounded by GIMP_MAX_IMAGE_SIZE (524288) and tileheight by gimp_tile_height(); width*tileheight is computed in int and, with a large width and tile height, can overflow gint before being passed to g_malloc, producing an undersized allocation that is then written width*tileheight times in the parse loop (heap overflow).","fix":"Use gsize/g_size_checked_mul (or g_malloc_n) for the width * tileheight allocation, matching the overflow-safe pattern used in the PNM raw loader.","locations":[{"ref":"plug-ins/common/file-xbm.c:901-902","code":"  901 |   tileheight = gimp_tile_height ();\n  902 |   data = (guchar *) g_malloc (width * tileheight);","lines":2},{"ref":"plug-ins/common/file-xbm.c:904-928","code":"  904 |   for (i = 0; i < height; i += tileheight)\n  905 |     {\n  906 |       tileheight = MIN (tileheight, height - i);\n  907 | \n  908 |       /* Parse the data from the file */\n  909 |       for (j = 0; j < tileheight; j ++)\n  910 |         {\n  911 |           /* Read each row. */\n  912 |           rowoffset = j * width;\n  913 |           for (k = 0; k < width; k ++)\n  914 |             {\n  915 |               /* Expand each integer into INTBITS pixels. */\n  916 |               if (k % intbits == 0)\n  917 |                 {\n  918 |                   c = get_int (fp);\n  919 | \n  920 |                   /* Flip all the bits so that 1's become black and\n  921 |                      0's become white. */\n  922 |                   c ^= 0xffff;\n  923 |                 }\n  924 | \n  925 |               data[rowoffset + k] = c & 1;\n  926 |               c >>= 1;\n  927 |             }\n  928 |         }","lines":25}]},{"id":"OVF_89","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"XWD pixel-buffer allocations multiply gint operands that are only individually bounded, so the product can overflow 32-bit int. width is bounded by GIMP_MAX_IMAGE_SIZE (2^18) and tile_height by gimp_tile_height(); width*tile_height*bpp (e.g. *3 or *4) can exceed INT_MAX, wrapping to a small/negative value passed to g_malloc and producing an undersized buffer that the per-scanline writes then overrun. Several loaders share this pattern.","fix":"Compute the allocation size in gsize/guint64 and check it against a sane maximum before calling g_malloc; e.g. ((gsize) tile_height) * width * bpp, and bail out if it exceeds a limit. Use g_malloc_n / g_try_malloc_n which detect multiply overflow.","locations":[{"ref":"plug-ins/common/file-xwd.c:1387","code":" 1387 |   data = g_malloc (tile_height * width);","lines":1},{"ref":"plug-ins/comm   }","lines":18},{"ref":"plug-ins/common/sphere-designer.c:1046-1054","code":" 1046 |       if (t->pos[i] > val)\n 1047 |         {\n 1048 |           d = (val - t->pos[i - 1]) / (t->pos[i] - t->pos[i - 1]);\n 1049 |           vcopy (&tmpcol, &t->color[i]);\n 1050 |           vmul (&tmpcol, d);\n 1051 |           vcopy (col, &tmpcol);\n 1052 |           vcopy (&tmpcol, &t->color[i - 1]);\n 1053 |           vmul (&tmpcol, 1.0 - d);\n 1054 |           vadd (col, &tmpcol);","lines":9}]},{"id":"OVF_91","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"imagepixel() computes x = p.x * t->image.xsize and y = p.y * t->image.ysize then does (x % xsize + xsize) % xsize. If xsize or ysize is 0 this is a modulo-by-zero (SIGFPE). The final index t->image.rgb[x*3 + (ysize-1-y)*xsize*3] is also unchecked against the actual allocation size of rgb, so a mismatched xsize/ysize vs. allocated buffer yields an out-of-bounds read. image dimensions/pointer originate from deserialized texture state.","fix":"Return early (or a default color) when image.xsize <= 0 || image.ysize <= 0 || image.rgb == NULL, and validate the computed index against the buffer size.","locations":[{"ref":"plug-ins/common/sphere-designer.c:1199-1206","code":" 1199 |   x = (p.x * t->image.xsize);\n 1200 |   y = (p.y * t->image.ysize);\n 1201 | \n 1202 |   x = (x % t->image.xsize + t->image.xsize) % t->image.xsize;\n 1203 |   y = (y % t->image.ysize + t->image.ysize) % t->image.ysize;\n 1204 | \n 1205 |   rgb = &t->image.rgb[x * 3 + (t->image.ysize - 1 - y) * t->image.xsize * 3];\n 1206 |   vset (col, rgb[0] / 255.0, rgb[1] / 255.0, rgb[2] / 255.0);","lines":8}]},{"id":"OVF_92","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"In cineon_open()/dpx_open(), buffer_length is computed from (width * depth) using int arithmetic (e.g. ceil((width*depth)/4.0)). width is a guint only checked against GIMP_MAX_IMAGE_SIZE; depth is validated to small values, so this specific product cannot overflow today. However the downstream pixel buffers are sized as buffer_length*3*2 and the line decoders (read_*bpc_line) write 'data_len' (= buffer_length) iterations worth of samples assuming a fixed depth of 3 channels. For depth==1 (GRAY) the read loops still iterate buffer_length longs and the decoders unconditionally write 3 (cineon 10bpc) or up to 4 (8bpc) components per long, but the buffers happen to be over-allocated (buffer_length*3*2) so no overflow occurs. The decoders ignore the 'depth' and 'num_pixels' parameters entirely, so the safety is incidental rather than enforced; any future change to buffer sizing would silently become an overflow.","fix":"Make the decoders honor num_pixels/depth and bound their writes, and size pixel buffers explicitly from width*depth*bytes_per_sample using g_size_checked_mul, rather than relying on the buffer_length*3*2 over-allocation.","locations":[{"ref":"plug-ins/file-cin/cineon-lib.c:144-164","code":"  144 |       buffer_length = ceil ((width * depth) / 4.0);\n  145 |       break;\n  146 | \n  147 |     case 10:\n  148 |       precision     = GIMP_PRECISION_U16_NON_LINEAR;\n  149 |       buffer_length = ((width * depth) + 2) / 3;\n  150 |       break;\n  151 | \n  152 |     default:\n  153 |       g_set_error (error, GIMP_PLUG_IN_ERROR, 0,\n  154 |                    _(\"Image with %d bpc not yet supported.\"),\n  155 |                    bpp);\n  156 |       fclose (fp);\n  157 |       return NULL;\n  158 |     }\n  159 | \n  160 |   buffer = g_try_malloc ((gsize) buffer_length * 4);\n  161 |   if (bpp > 8)\n  162 |     pixels = g_try_malloc ((gsize) buffer_length * 3 * 2);\n  163 |   else\n  164 |     pixels_8 = g_try_malloc ((gsize) buffer_length * 3 * 2);","lines":21},{"ref":"plug-ins/file-cin/cineon-lib.c:244-311","code":"  244 | static gboolean\n  245 | read_8bpc_line (GeglBuffer *buffer,\n  246 |                 FILE       *fp,\n es":9}]},{"id":"OVF_96","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"icns_attach_image() computes the output buffer as 'row = 4 * icontype->width; dest = g_malloc(row * icontype->height)' (size width*height*4) but never validates that the resource actually contains enough data, nor that width/height come from a trusted source. While icontype dimensions are from the static table, the slurp/decompress routines write up to width*height*4 bytes into dest based on their own loop bounds; combined with the missing/weak input bounds in icns_slurp and icns_decompress this is the sink for the OOB reads, and any future change to make icontype dimensions file-derived would make this a write overflow. The malloc size 'row * icontype->height' is also unchecked for overflow (width/height are guint).","fix":"Use g_malloc with an overflow-checked size (g_size_checked_mul) and pass the allocated size down to icns_slurp/icns_decompress so they can clamp 'out' writes to the real buffer size rather than trusting icontype dimensions.","locations":[{"ref":"plug-ins/file-icns/file-icns-load.c:477-486","code":"  477 |   row = 4 * icontype->width;\n  478 |   dest = g_malloc (row * icontype->height);\n  479 | \n  480 |   expected_size =\n  481 |     (icontype->width * icontype->height * icontype->bits) / 8;\n  482 | \n  483 |   if (icns == mask)\n  484 |     expected_size *= 2;\n  485 | \n  486 |   expected_size += sizeof (IcnsResourceHeader);","lines":10}]},{"id":"OVF_97","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"ico_read_png() (PNG-in-ICO path) builds the row pointer array as 'rows[0] = buf; rows[i] = rows[i-1] + w' (32-bit pixels) and lets libpng write h rows of w pixels into the caller's buf. The overflow check at lines 307-310 validates w*h*4 against maxsize, but maxsize is max_width*max_height*4 computed from the icon DIRECTORY entries, while w/h come from
