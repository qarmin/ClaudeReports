rbuf[rp] (refill the buffer when rp >= rs at the top of the read), rather than reading then post-checking.","locations":[{"ref":"plug-ins/file-faxg3/faxg3.c:317-334","code":"  317 |       while (hibit < 20)\n  318 |         {\n  319 |           data |= (byte_tab[(int) (unsigned char) rbuf[rp++]] << hibit);\n  320 |           hibit += 8;\n  321 | \n  322 |           if (rp >= rs)\n  323 |             {\n  324 |               rs = read (fd, rbuf, sizeof (rbuf));\n  325 |               if (rs < 0)\n  326 |                 { perror (\"read2\");\n  327 |                   break;\n  328 |                 }\n  329 |               rr += rs;\n  330 |               gimp_progress_update ((float) rr / rsize / 2.0);\n  331 |               rp = 0;\n  332 |               if (rs == 0)\n  333 |                 goto do_write;\n  334 |             }","lines":18},{"ref":"plug-ins/file-faxg3/faxg3.c:359-384","code":"  359 |           while ((data & 0x03f) != 0)\n  360 |             {\n  361 |               data >>= 1; hibit--;\n  362 | \n  363 |               if ( hibit < 20 )\n  364 |                 {\n  365 |                   data |= (byte_tab[(int) (unsigned char) rbuf[rp++]] << hibit);\n  366 |                   hibit += 8;\n  367 | \n  368 |                   if (rp >= rs) /* buffer underrun */\n  369 |                     {\n  370 |                       rs = read (fd, rbuf, sizeof (rbuf));\n  371 | \n  372 |                       if (rs < 0)\n  373 |                         { perror (\"read4\");\n  374 |                           break;\n  375 |                         }\n  376 | \n  377 |                       rr += rs;\n  378 |                       gimp_progress_update ((float) rr / rsize / 2.0);\n  379 |                       rp = 0;\n  380 |                       if (rs == 0)\n  381 |                         goto do_write;\n  382 |                     }\n  383 |                 }\n  384 |             }","lines":26},{"ref":"plug-ins/file-faxg3/faxg3.c:406-444","code":"  406 |           while ((data & 0x01) != 1)\n  407 |             {\n  408 |               if ((data & 0xf) == 0) /* nibble optimization */\n  409 |                 {\n  410 |                   hibit-= 4;\n  411 |                   data >>= 4;\n  412 |                 }\n  413 |               else\n  414 |                 {\n  415 |                   hibit--;\n  416 |                   data >>= 1;\n  417 |                 }\n  418 | \n  419 |               /* fill higher bits */\n  420 |               if (hibit < 20)\n  421 |                 {\n  422 |                   data |= ( byte_tab[(int) (unsigned char) rbuf[ rp++]] << hibit);\n  423 |                   hibit += 8;\n  424 | \n  425 |                   if (rp >= rs) /* buffer underrun */\n  426 |                     {\n  427 |                       rs = read (fd, rbuf, sizeof (rbuf));\n  428 |                       if ( rs < 0 )\n  429 |                         {\n  430 |                           perror (\"read3\");\n  431 |                           break;\n  432 |                         }\n  433 |                       rr += rs;\n  434 |                       gimp_progress_update ((float) rr / rsize / 2.0);\n  435 |                       rp = 0;\n  436 |                       if (rs == 0)\n  437 |                         goto do_write;\n  438 |                     }\n  439 |                 }\n  440 | #ifdef DEBUG\n  441 |               g_printerr (\"hibit=%2d, data=\", hibit );\n  442 |               putbin(data);\n  443 | #endif\n  444 |             } /* end skip 0bits */","lines":39}]},{"id":"OVF_132","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In add_merged_image PSD_COMP_RLE path, rle_pack_len[cidx] = g_malloc(img_a->rows * 4) computes the size in int. img_a->rows is bounded by GIMP_MAX_IMAGE_SIZE in read_header_block so this does not overflow today, but the per-row RLE read loop never validates the cumulative compressed length against the merged-image block length (the explicit FIXME in read_channel_data confirms over-run is not checked), so a malformed RLE stream is only bounded by EOF. Same unchecked RLE pattern in read_RLE_channel.","fix":"Validate each rle_pack_len[i] and the running total against the channel's available compressed length / block_end before reading and before decode_packbits.","locations":[{"ref":"plug-ins/file-psd/psd-load.c:4260-4294","code":" 4260 |               for (cidx = 0; cidx < total_channels; ++cidx)\n 4261 |                 {\n 4262 |                   chn_a[cidx].columns = img_a->columns;\n 4263 |                   chn_a[cidx].rows = img_a->rows;\n 4264 |                   rle_pack_len[cidx] = g_malloc (img_a->rows * 4); /* Always 4 since this is the data size in memory. */\n 4265 |                   for (rowi = 0; rowi < img_a->rows; ++rowi)\n 4266 |                     {\n 4267 |                       if (psd_read (input, &rle_pack_len[cidx][rowi], rle_count_size, error) < rle_count_size)\n 4268 |                         {\n 4269 |                           psd_set_error (error);\n 4270 |                           return -1;\n 4271 |                         }\n 4272 |                       if (img_a->version == 1)\n 4273 |                         rle_pack_len[cidx][rowi] = GUINT16_FROM_BE (rle_pack_len[cidx][rowi]);\n 4274 |                       else\n 4275 |                         rle_pack_len[cidx][rowi] = GUINT32_FROM_BE (rle_pack_len[cidx][rowi]);\n 4276 |                     }\n 4277 |                 }\n 4278 | \n 4279 |               /* Skip channel length data for unloaded channels */\n 4280 |               if (! psd_seek (input, (img_a->channels - total_channels) * rle_row_size,\n 4281 |                               G_SEEK_CUR, error))\n 4282 |                 {\n 4283 |                   psd_set_error (error);\n 4284 |                   return -1;\n 4285 |                 }\n 4286 | \n 4287 |               for (cidx = 0; cidx < total_channels; ++cidx)\n 4288 |                 {\n 4289 |                   if (read_channel_data (&chn_a[cidx], img_a->bps,\n 4290 |                                         PSD_COMP_RLE, rle_pack_len[cidx], input, 0,\n 4291 |                                         error) < 1)\n 4292 |                     return -1;\n 4293 |                   g_free (rle_pack_len[cidx]);\n 4294 |                 }","lines":35},{"ref":"plug-ins/file-psd/psd-load.c:4728-4751","code":" 4728 |       case PSD_COMP_RLE:\n 4729 |         for (gint i = 0; i < channel->rows; ++i)\n 4730 |           {\n 4731 |             src = gegl_scratch_alloc (rle_pack_len[i]);\n 4732 | /*      FIXME check for over-run\n 4733 |             if (PSD_TELL(input) + rle_pack_len[i] > block_end)\n 4734 |               {\n 4735 |                 psd_set_error (TRUE, errno, error);\n 4736 |                 return -1;\n 4737 |               }\n 4738 | */\n 4739 |             if (psd_read (input, src, rle_pack_len[i], error) < rle_pack_len[i])\n 4740 |               {\n 4741 |                 psd_set_error (error);\n 4742 |                 gegl_scratch_free (src);\n 4743 |                 g_free (raw_data);\n 4744 |                 return -1;\n 4745 |               }\n 4746 |             /* FIXME check for errors returned from decode packbits */\n 4747 |             decode_packbits (src, raw_data + i * readline_len,\n 4748 |                              rle_pack_len[i], readline_len);\n 4749 |             gegl_scratch_free (src);\n 4750 |           }\n 4751 |         break;","lines":24}]},{"id":"OVF_133","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"decode_32_bit_predictor computes rowsize = columns*4 then loops 'for (j = 0; j < rowsize-1; ++j)'. If columns is 0, rowsize is 0 and rowsize-1 underflows (guint32) to 4294967295, causing a massive out-of-bounds walk of src. The only caller (read_channel_data) rejects columns==0 before this point, so it is currently unreachable, but the function is unsafe in isolation and relies on an external invariant.","fix":"Return early when columns == 0 (and rows == 0) inside decode_32_bit_predictor.","locations":[{"ref":"plug-ins/file-psd/psd-load.c:4876-4900","code":" 4876 | decode_32_bit_predictor (gchar   *src,\n 4877 |                          gchar   *dst,\n 4878 |                          guint32  rows,\n 4879 |                          guint32  columns)\n 4880 | {\n 4881 |   guint32 rowsize;\n 4882 |   guint64 row, dstpos;\n 4883 | \n 4884 |   rowsize = columns * 4;\n 4885 | \n 4886 |   /* decode delta */\n 4887 |   for (row = 0; row < rows; ++row)\n 4888 |     {\n 4889 |       guint32 j;\n 4890 |       guint64 offset;\n 4891 | \n 4892 |       offset = row * rowsize;\n 4893 |       for (j = 0; j < rowsize-1; ++j)\n 4894 |         {\n 4895 |           guint64 pos;\n 4896 | \n 4897 |           pos = offset + j;\n 4898 |           src[pos + 1] += src[pos];\n 4899 |         }\n 4900 |     }","lines":25}]},{"id":"OVF_134","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"fread_pascal_string, when the length byte is 0, seeks mod_len - 1 bytes (line 323) and adds mod_len-1 to bytes_read. mod_len is a guint16 supplied by the caller; for mod_len == 0 the expression mod_len - 1 underflows to a large positive value, seeking far forward and reporting a bogus bytes_read, desynchronizing the parser. The padding loop at 343-356 is guarded by mod_len > 0 but the zero-length branch is not.","fix":"Guard the mod_len == 0 case (skip the seek) in the zero-length branch, mirroring the 'if (mod_len > 0)' guard used for the padding loop.","locations":[{"ref":"plug-ins/file-psd/psd-util.c:321-331","code":"  321 |   if (len == 0)\n  322 |     {\n  323 |       if (! psd_seek (input, mod_len - 1, G_SEEK_CUR, error))\n  324 |         {\n  325 |           psd_set_error (error);\n  326 |           return NULL;\n  327 |         }\n  328 |       *bytes_read += (mod_len - 1);\n  329 |       *bytes_written = 0;\n  330 |       return NULL;\n  331 |     }","lines":11}]},{"id":"OVF_135","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"convert_bit2byte/convert_2bit2byte/convert_4bit2byte compute 'gint64 x = width * height' where width and height are gint; the multiplication is performed in int and only then widened to gint64, so a large tile width*height could overflow the int product before assignment. In practice cols/rows here are tile dimensions bounded by image dimensions (GIMP_MAX_IMAGE_SIZE), and a single tile big enough to overflow INT_MAX is implausible given tile buffer allocation would fail first, so impact is limited.","fix":"Cast one operand to gint64 before multiplying: 'gint64 x = (gint64) width * height;'.","locations":[{"ref":"plug-ins/file-tiff/file-tiff-load.c:3110","code":" 3110 |   gint64 x = width * height;","lines":1},{"ref":"plug-ins/file-tiff/file-tiff-load.c:3134","code":" 3134 |   gint64 x = width * height;","lines":1},{"ref":"plug-ins/file-tiff/file-tiff-load.c:3158","code":" 3158 |   gint64 x = width * height;","lines":1}]},{"id":"OVF_136","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":false,"description":"zlib custom allocator zzalloc returns g_malloc(items * size) with an explicit '/* overflow check missing */' comment and no overflow guard. items and size originate from zlib internals during inflate, so practical exploitability is limited, but the multiplication can overflow on attacker-influenced decompression state.","fix":"Use g_malloc with g_size_checked_mul (or return NULL on overflow) so zlib gets a clean allocation failure instead of an undersized buffer.","locations":[{"ref":"plug-ins/file-psd/psd-load.c:4662-4667","code":" 4662 | static voidpf\n 4663 | zzalloc (voidpf opaque, uInt items, uInt size)\n 4664 | {\n 4665 |   /* overflow check missing */\n 4666 |   return g_malloc (items * size);\n 4667 | }","lines":6}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"gimp_drawable_filter_update() returns the inverted success value. The function ends with 'return (*error != NULL)', i.e. it returns TRUE when an error occurred and FALSE on success. The sole caller, drawable_filter_update_invoker() in app/pdb/drawable-filter-cmds.c:357, assigns this directly to 'success' and feeds it into gimp_procedure_get_return_values(procedure, success, ...). Semantics are exactly reversed: a successful update reports failure to the PDB, and a failed update reports success. It is also internally inconsistent: the early error paths in the same function (e.g. lines 902, 914) return FALSE. Every libgimp/script call to gimp-drawable-filter-update reports the wrong outcome (and gets success=TRUE together with a non-NULL error).","fix":"Change line 1129 to 'return (*error == NULL);' so the function returns TRUE on success, matching the early returns and how the caller consumes the value.","locations":[{"ref":"app/core/gimpdrawablefilter.c:1129","code":" 1129 |   return (*error != NULL);","lines":1},{"ref":"app/pdb/drawable-filter-cmds.c:355-366","code":"  355 |   if (success)\n  356 |     {\n  357 |       success = gimp_drawable_filter_update (filter, propnames, propvalues,\n  358 |                                              opacity,\n  359 |                                              blend_mode, blend_space,\n  360 |                                              composite_mode, composite_space,\n  361 |                                              auxinputnames, auxinputs,\n  362 |                                              error);\n  363 |     }\n  364 | \n  365 |   return gimp_procedure_get_return_values (procedure, success,\n  366 |                                            error ? *error : NULL);","lines":12}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"Missing 'break' in the GIMP_GRADIENT_BLEND_RGB_LINEAR case of the blend-color-space switch. After reading the left/right colors as linear 'RGB double', execution falls through into the GIMP_GRADIENT_BLEND_RGB_PERCEPTUAL case, which immediately re-reads them as non-linear \"R'G'B' double\", overwriting the linear values. As a result RGB_LINEAR blending silently behaves identically to RGB_PERCEPTUAL: linear gradient interpolation never happens.","fix":"Add a 'break;' statement after the two gegl_color_get_pixel(... \"RGB double\" ...) calls in the GIMP_GRADIENT_BLEND_RGB_LINEAR case (before the GIMP_GRADIENT_BLEND_RGB_PERCEPTUAL label).","locations":[{"ref":"app/core/gimpgradient.c:582-591","code":"  582 |         case GIMP_GRADIENT_BLEND_RGB_LINEAR:\n  583 |           gegl_color_get_pixel (left_color, babl_format (\"RGB double\"), left_components);\n  584 |           gegl_color_get_pixel (right_color, babl_format (\"RGB double\"), right_components);\n  585 | \n  586 |         case GIMP_GRADIENT_BLEND_RGB_PERCEPTUAL:\n  587 |           /* TODO: shouldn't this format use the color space of the target\n  588 |            * image? Will it change computation? */\n  589 |           gegl_color_get_pixel (left_color, babl_format (\"R'G'B' double\"), left_components);\n  590 |           gegl_color_get_pixel (right_color, babl_format (\"R'G'B' double\"), right_components);\n  591 |           break;","lines":10}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"HTML table export: in the cellspan (config_span_tags) scan, the while-loop conditions evaluate palloc[cols * row + col] BEFORE checking row < rows / col < cols. C && is short-circuit left-to-right, so when col == cols (or row == rows) the index cols*row+col (or cols*row+col with row==rows) is read out of bounds of palloc (sized rows*cols ints). gegl_sampler_get is also called with col==cols / row==rows. Furthermore the write-back loop writes palloc[cols*(row+y)+(col+x)] = 0 for row in [0,rowspan) and col in [0,colspan); rowspan/colspan are derived from the scan and (row+y)/(col+x) can exceed image bounds, causing out-of-bounds writes into palloc. Triggerable on any image with uniformly colored regions reaching the right/bottom edge.","fix":"Reorder the conditions so the bounds checks come first: while (row < rows && palloc[...] == 1 && color_comp(...)) and likewise col < cols before indexing. Clamp the palloc-clearing loop to (row+y) < rows and (col+x) < cols.","locations":[{"ref":"plug-ins/common/file-html-table.c:455-493","code":"  455 |               while (color_comp (buf, buf2) &&\n  456 |                      palloc[cols * row + col] == 1 &&\n  457 |                      row < rows)\n  458 |                 {\n  459 |                   while (color_comp (buf, buf2) &&\n  460 |                          palloc[cols * row + col] == 1 &&\n  461 |                          col < cols)\n  462 |                     {\n  463 |                       colcount++;\n  464 |                       col++;\n  465 | \n  466 |                       gegl_sampler_get (sampler,\n  467 |                                         col, row, NULL, buf2, GEGL_ABYSS_NONE);\n  468 |                     }\n  469 | \n  470 |                   if (colcount != 0)\n  471 |                     {\n  472 |                       row++;\n  473 |                       rowspan++;\n  474 |                     }\n  475 | \n  476 |                   if (colcount < colspan || colspan == 0)\n  477 |                     colspan = colcount;\n  478 | \n  479 |                   col = x;\n  480 |                   colcount = 0;\n  481 | \n  482 |                   gegl_sampler_get (sampler,\n  483 |                                     col, row, NULL, buf2, GEGL_ABYSS_NONE);\n  484 |                 }\n  485 | \n  486 |               if (colspan > 1 || rowspan > 1)\n  487 |                 {\n  488 |                   for (row = 0; row < rowspan; row++)\n  489 |                     for (col = 0; col < colspan; col++)\n  490 |                       palloc[cols * (row + y) + (col + x)] = 0;\n  491 | \n  492 |                   palloc[cols * y + x] = 2;\n  493 |                 }","lines":39}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gimp_get_default_language calls setlocale(cat, NULL) and immediately g_strdup()s the result, then unconditionally does strchr(lang, '.'). If setlocale returns NULL (can happen for some categories/locales), g_strdup yields NULL and strchr(NULL, '.') dereferences a NULL pointer, crashing. There is no NULL check on lang.","fix":"After 'lang = g_strdup (setlocale (cat, NULL));' guard with 'if (! lang) return g_strdup (\"C\");' (or similar) before calling strchr.","locations":[{"ref":"app/core/gimp-utils.c:195-204","code":"  195 |   lang = g_strdup (setlocale (cat, NULL));\n  196 | \n  197 | #endif\n  198 | \n  199 |   p = strchr (lang, '.');\n  200 |   if (p)\n  201 |     *p = '\\0';\n  202 |   p = strchr (lang, '@');\n  203 |   if (p)\n  204 |     *p = '\\0';","lines":10}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"gimp_image_colormap_set_palette_entry() declares 'gchar name[64]' and only fills it inside the padding loop that adds missing black entries. In the common case where the requested index already exists (n_colors > index), the padding loop body never executes, leaving 'name' uninitialized. That uninitialized stack buffer is then passed to gimp_palette_set_entry(), overwriting the colormap entry's name with garbage bytes. This is hit on the normal path of gimp_image_set_colormap_entry().","fix":"Compute the name unconditionally before calling gimp_palette_set_entry(), e.g. add 'g_snprintf (name, sizeof (name), \"#%d\", index);' immediately before line 513, or pass the existing entry name / NULL to preserve it.","locations":[{"ref":"app/core/gimpimage-colormap.c:489-513","code":"  489 |   const Babl       *format;\n  490 |   guint8            rgb[3];\n  491 |   gchar             name[64];\n  492 |   gint              i;\n  493 | \n  494 |   g_return_if_fail (GEGL_IS_COLOR (color));\n  495 | \n  496 |   /* Adding black entries if needed. */\n  497 |   for (i = gimp_palette_get_n_colors (private->palette);\n  498 |        i <= index;\n  499 |        i++)\n  500 |     {\n  501 |       g_snprintf (name, sizeof (name), \"#%d\", i);\n  502 |       gimp_palette_add_entry (private->palette, index, name, new_color);\n  503 |     }\n  504 | \n  505 |   space  = gimp_image_get_layer_space (image);\n  506 |   format = gimp_babl_format (GIMP_RGB, private->precision, FALSE, space);\n  507 | \n  508 |   /* For image colormap, we force the color to be in the target format (which at\n  509 |    * time of writing is only \"R'G'B' u8\" for the target space).\n  510 |    */\n  511 |   gegl_color_get_pixel (color, format, rgb);\n  512 |   gegl_color_set_pixel (new_color, format, rgb);\n  513 |   gimp_palette_set_entry (private->palette, index, name, new_color);","lines":25}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The update_last_error() macro (#define at line 249) does 'if (last_error) g_clear_error(last_error); last_error = error; error = NULL;'. Because 'error' is the local copy of the GError** parameter, setting error = NULL only mutates the local pointer; all subsequent gimp_data_input_stream_read_* calls in the same function are then passed a NULL error and silently stop reporting failures. The intent (capture the first error, suppress later ones unless no pattern was produced) is fragile and effectively disables error propagation after the first failure for the rest of the loop iteration and following iterations, masking truncated/corrupt input.","fix":"Track the first error in an explicit local GError* and pass a dedicated transient GError* to each read; do not reassign the parameter pointer. Decide at the end whether to propagate, based on whether any pattern was loaded.","locations":[{"ref":"app/core/gimppattern-load.c:249","code":"  249 | #define update_last_error() if (last_error) g_clear_error (last_error); last_error = error; error = NULL;","lines":1},{"ref":"app/core/gimppattern-load.c:608-619","code":"  608 |   if (last_error && *last_error)\n  609 |     {\n  610 |       if (pattern_list == NULL)\n  611 |         {\n  612 |           /* Only return error if we didn't get any patterns. */\n  613 |           error = last_error;\n  614 |         }\n  615 |       else\n  616 |         {\n  617 |           g_clear_error (last_error);\n  618 |         }\n  619 |     }","lines":12}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In gimp_levels_config_load_alv(), low_input is divided by 253.0 while every other channel value (high_input, low_output, high_output) is divided by 255.0. This looks like a typo: 253 has no meaning for an 8-bit-derived 0..255 range. It produces low_input values that are wrong/too large (e.g. an input of 255 maps to 1.0079 instead of 1.0), skewing every imported Photoshop .alv levels preset.","fix":"Change '/ 253.0' to '/ 255.0' on line 1073 to match the other channels.","locations":[{"ref":"app/operations/gimplevelsconfig.c:1073","code":" 1073 |       config->low_input[i]   = low_input[i]   / 253.0;","lines":1},{"ref":"app/operations/gimplevelsconfig.c:1074-1077","code":" 1074 |       config->high_input[i]  = high_input[i]  / 255.0;\n 1075 |       config->gamma[i]       = gamma[i]       / 100.0;\n 1076 |       config->low_output[i]  = low_output[i]  / 255.0;\n 1077 |       config->high_output[i] = high_output[i] / 255.0;","lines":4}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gimp_paint_core_finish/cancel branch on whether the drawable was resized using GIMP_LAYER (drawables->data) and GIMP_LAYER_MASK (drawables->data) - i.e. always the FIRST drawable in the list - while iterating over `iter` for every drawable. Inside the expanded-drawable branch the 'other_drawable' (layer mask vs layer) is derived from drawables->data, not iter->data. When painting on multiple drawables simultaneously with layer expansion, the undo/restore for non-first drawables operates on the wrong companion drawable, corrupting undo data or restoring the wrong mask.","fix":"Use iter->data (the drawable currently being processed) instead of drawables->data when determining GIMP_IS_LAYER_MASK / the companion layer-mask in the finish and cancel expansion branches.","locations":[{"ref":"app/paint/gimppaintcore.c:629-638","code":"  629 |               if (GIMP_IS_LAYER_MASK (drawables->data) || GIMP_LAYER (drawables->data)->mask)\n  630 |                 {\n  631 |                   GeglBuffer   *other_new;\n  632 |                   GeglBuffer   *other_old;\n  633 |                   GimpDrawable *other_drawable;\n  634 | \n  635 |                   if (GIMP_IS_LAYER_MASK (drawables->data))\n  636 |                     other_drawable = GIMP_DRAWABLE ((GIMP_LAYER_MASK (drawables->data))->layer);\n  637 |                   else\n  638 |                     other_drawable = GIMP_DRAWABLE (GIMP_LAYER (drawables->data)->mask);","lines":10},{"ref":"app/paint/gimppaintcore.c:790-798","code":"  790 |               if (GIMP_IS_LAYER_MASK (drawables->data) || GIMP_LAYER (drawables->data)->mask)\n  791 |                 {\n  792 |                   GeglBuffer   *other_old;\n  793 |                   GimpDrawable *other_drawable;\n  794 | \n  795 |                   if (GIMP_IS_LAYER_MASK (drawables->data))\n  796 |                     other_drawable = GIMP_DRAWABLE ((GIMP_LAYER_MASK (drawables->data))->layer);\n  797 |                   else\n  798 |                     other_drawable = GIMP_DRAWABLE (GIMP_LAYER (drawables->data)->mask);","lines":9}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In gimp_paint_core_smooth_coords, the smoothing path is entered when use_smoothing is set and smoothing_quality > 0, but the Gaussian weight depends on smoothing_factor (gaussian_weight2 = SQR(smoothing_factor)). If smoothing_factor is 0, gaussian_weight2 == 0, so every per-sample rate stays 0.0, scale_sum stays 0.0, and the final division block is skipped. The result is that coords->x/y, which were zeroed at the start, are returned as (0.0, 0.0) instead of the real cursor position. The brush then jumps to the image origin. smoothing_quality and smoothing_factor are independent user-controllable options, so this is reachable.","fix":"When scale_sum == 0.0 (or gaussian_weight2 == 0.0), leave the incoming coordinates unchanged instead of returning the zeroed coords. E.g. cache the original coords and restore them when no weight was accumulated.","locations":[{"ref":"app/paint/gimppaintcore.c:1670-1718","code":" 1670 |   if (smoothing_options->use_smoothing &&\n 1671 |       smoothing_options->smoothing_quality > 0)\n 1672 |     {\n 1673 |       gint       i;\n 1674 |       guint      length;\n 1675 |       gint       min_index;\n 1676 |       gdouble    gaussian_weight  = 0.0;\n 1677 |       gdouble    gaussian_weight2 = SQR (smoothing_options->smoothing_factor);\n 1678 |       gdouble    velocity_sum     = 0.0;\n 1679 |       gdouble    scale_sum        = 0.0;\n 1680 | \n 1681 |       g_array_append_val (history, *coords);\n 1682 | \n 1683 |       if (history->len < 2)\n 1684 |         return; /* Just don't bother, nothing to do */\n 1685 | \n 1686 |       coords->x = coords->y = 0.0;\n 1687 | \n 1688 |       length = MIN (smoothing_options->smoothing_quality, history->len);\n 1689 | \n 1690 |       min_index = history->len - length;\n 1691 | \n 1692 |       if (gaussian_weight2 != 0.0)\n 1693 |         gaussian_weight = 1 / (sqrt (2 * G_PI) * smoothing_options->smoothing_factor);\n 1694 | \n 1695 |       for (i = history->len - 1; i >= min_index; i--)\n 1696 |         {\n 1697 |           gdouble     rate        = 0.0;\n 1698 |           GimpCoords *next_coords = &g_array_index (history,\n 1699 |                                                     GimpCoords, i);\n 1700 | \n 1701 |           if (gaussian_weight2 != 0.0)\n 1702 |             {\n 1703 |               /* We use gaussian function with velocity as a window function */\n 1704 |               velocity_sum += next_coords->velocity * 100;\n 1705 |               rate = gaussian_weight * exp (-velocity_sum * velocity_sum /\n 1706 |                                             (2 * gaussian_weight2));\n 1707 |             }\n 1708 | \n 1709 |           scale_sum += rate;\n 1710 |           coords->x += rate * next_coords->x;\n 1711 |           coords->y += rate * next_coords->y;\n 1712 |         }\n 1713 | \n 1714 |       if (scale_sum != 0.0)\n 1715 |         {\n 1716 |           coords->x /= scale_sum;\n 1717 |           coords->y /= scale_sum;\n 1718 |         }","lines":49},{"ref":"app/paint/gimppaintcore.c:1686","code":" 1686 |       coords->x = coords->y = 0.0;","lines":1}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"xcf_load_image_header link-loop scan recurses into linked XCF files (xcf_load_image_header called recursively at line 615) to detect cycles, but there is no depth limit on the recursion itself other than cycle detection via file identity. A chain of N distinct linked files each pointing to the next (no cycle) causes N levels of recursion, each opening a file and allocating XcfInfo/GList state on the stack, enabling stack exhaustion / resource exhaustion with a crafted set of files. Cycle detection only catches repeats, not long acyclic chains.","fix":"Impose an explicit maximum link-recursion depth (e.g. via a counter threaded through prev_files length) and abort link resolution beyond it.","locations":[{"ref":"app/xcf/xcf-load.c:596-628","code":"  596 |                   file_proc = gimp_plug_in_manager_file_procedure_find (gimp->plug_in_manager,\n  597 |                                                                         GIMP_FILE_PROCEDURE_GROUP_OPEN,\n  598 |                                                                         link_file, error);\n  599 |                   if (file_proc && gimp_plug_in_procedure_is_xcf_load (file_proc))\n  600 |                     {\n  601 |                       GInputStream  *input;\n  602 |                       GList         *parent_files;\n  603 |                       XcfInfo        info2  = { 0, };\n  604 |                       gint           width2;\n  605 |                       gint           height2;\n  606 |                       gint           type2;\n  607 |                       GimpPrecision  precision2;\n  608 |                       gboolean       subloop_found = FALSE;\n  609 | \n  610 |                       parent_files = g_list_copy (prev_files);\n  611 |                       parent_files = g_list_prepend (parent_files, link_file);\n  612 | \n  613 |                       input = G_INPUT_STREAM (g_file_read (link_file, NULL, NULL));\n  614 |                       if (input && xcf_load_magic_version (gimp, input, link_file, NULL, &info2))\n  615 |                         xcf_load_image_header (gimp, &info2, &width2, &height2, &type2, &precision2,\n  616 |                                                parent_files, loop_files, &subloop_found, NULL);\n  617 | \n  618 |                       g_clear_object (&input);\n  619 |                       g_list_free (parent_files);\n  620 | \n  621 |                       if (subloop_found)\n  622 |                         {\n  623 |                           *loop_files = g_list_prepend (*loop_files, link_file);\n  624 |                           if (loop_found)\n  625 |                             *loop_found = TRUE;\n  626 |                           break;\n  627 |                         }\n  628 |                     }","lines":33}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"PROP_VECTOR_LAYER stores the dash count with 'data->n_stroke_dashes = (gboolean) uint_val;'. The (gboolean) cast collapses any nonzero count to 1 (TRUE), so a file with N dash entries is loaded as a single dash, and the subsequent read loop only consumes 1 float instead of N, desynchronizing the stream relative to next_prop. This is a clear copy/paste of the (gboolean) casts used for the surrounding boolean fields.","fix":"Use 'data->n_stroke_dashes = uint_val;' (no gboolean cast), then bound-check it as above.","locations":[{"ref":"app/xcf/xcf-load.c:2561-2562","code":" 2561 |             xcf_read_int32 (info, (guint32 *) &uint_val, 1);\n 2562 |             data->n_stroke_dashes = (gboolean) uint_val;","lines":2}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"gimp_choice_set_sensitive dereferences the hash-table lookup result `alias_desc->sensitive = sensitive;` with no NULL check, unlike every other lookup in the file. A nick present on a target's aliases list but no longer in the hash table (e.g. after being re-added / replaced via gimp_choice_add) yields a NULL lookup and a crash.","fix":"Guard the assignment with if (alias_desc) { ... }.","locations":[{"ref":"libgimpbase/gimpchoice.c:510-512","code":"  510 |               alias_desc = g_hash_table_lookup (choice->choices, iter->data);\n  511 |               alias_desc->sensitive = sensitive;\n  512 |               g_signal_emit (choice, gimp_choice_signals[SENSITIVITY_CHANGED], 0, (gchar *) iter->data);","lines":3}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"GIF Application Extension parsing uses an 8-byte compare to detect NETSCAPE2.0 but the block holds 11 bytes: 'strncmp ((const gchar *) buf, \"NETSCAPE2.0\", 8)' compares only 8 chars (line 797). More importantly, GetDataBlock returns the raw count but buf is not NUL-terminated before strncmp here (unlike the comment path which NUL-terminates), and the subsequent 'Gif89.num_loops = (buf[0] << 8) | buf[1]' (line 800) reads the next sub-block's first two bytes without verifying its length is >= 2 (GetDataBlock can return a count of 1). This reads slightly past meaningful data, though within the static 260-byte buffer.","fix":"Compare the full 11 bytes of the NETSCAPE/ANIMEXTS identifier and verify the loop sub-block returned at least 3 bytes before indexing buf[0]/buf[1]/buf[2].","locations":[{"ref":"plug-ins/common/file-gif-load.c:795-802","code":"  795 |       if (GetDataBlock (fd, (guchar *) buf))\n  796 |         {\n  797 |           if (strncmp ((const gchar *) buf, \"NETSCAPE2.0\", 8) == 0)\n  798 |             {\n  799 |               if (GetDataBlock (fd, (guchar *) buf))\n  800 |                 Gif89.num_loops = (buf[0] << 8) | buf[1];\n  801 |             }\n  802 |         }","lines":8}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In the PDF non-interactive path, when an explicit 'pages' array is supplied, page_numbers[i] is validated to be < doc_n_pages but is NOT validated to be >= 0. gimp_int32_array supplies attacker/script controlled signed values; a negative page number passes the upper-bound check and is stored into pages.pages[i], then later used as poppler_document_get_page(doc, pages->pages[page_index]) with a negative index, which poppler treats as out-of-range (NULL) but combined with the missing NULL check (separate finding) leads to a crash, and pages->pages[page_index] indexing is otherwise unguarded.","fix":"Reject page_numbers[i] < 0 in the same bounds check (e.g. 'if (page_numbers[i] < 0 || page_numbers[i] >= doc_n_pages)').","locations":[{"ref":"plug-ins/common/file-pdf-load.c:405-427","code":"  405 |               for (i = 0; i < pages.n_pages; i++)\n  406 |                 {\n  407 |                   if (page_numbers[i] >= doc_n_pages)\n  408 |                     {\n  409 |                       status = GIMP_PDB_EXECUTION_ERROR;\n  410 |                       g_set_error (&error, GIMP_PLUGIN_PDF_LOAD_ERROR, 0,\n  411 |                                    /* TRANSLATORS: first argument is file name,\n  412 |                                     * second is out-of-range page number,\n  413 |                                     * third is number of pages.\n  414 |                                     * Specify order as in English if needed.\n  415 |                                     */\n  416 |                                    ngettext (\"PDF document '%1$s' has %3$d page. Page %2$d is out of range.\",\n  417 |                                              \"PDF document '%1$s' has %3$d pages. Page %2$d is out of range.\",\n  418 |                                              doc_n_pages),\n  419 |                                    gimp_file_get_utf8_name (file),\n  420 |                                    page_numbers[i],\n  421 |                                    doc_n_pages);\n  422 |                       break;\n  423 |                     }\n  424 |                   else\n  425 |                     {\n  426 |                       pages.pages[i] = page_numbers[i];\n  427 |                     }","lines":23}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"PNM process_pam_header() accepts a DEPTH (np) value with no upper bound; only np <= 0 is rejected (line 944). The image layer type switch in load_image only maps np 0-4 and falls through to GIMP_GRAY_IMAGE for np > 4, but pnm_load_raw allocates and reads info->xres * info->np * bpc bytes per row using the unbounded np, and gegl_buffer_set writes into a buffer created for at most 4 components. A PAM file declaring egion and paint_update_region are always created together for the same rect, so in practice they are in sync; however the asymmetry means that if only an update region were ever produced without a copy region, queued display updates would be silently dropped. This is a fragile coupling rather than a current crash.","fix":"Flush paint_update_region independently of paint_copy_region (separate 'if' guards) so the two regions cannot get out of sync.","locations":[{"ref":"app/core/gimpdrawable.c:2198-2248","code":" 2198 |   if (drawable->private->paint_copy_region)\n 2199 |     {\n 2200 |       GeglBuffer *buffer;\n 2201 |       gint        n_rects;\n 2202 |       gint        i;\n 2203 | \n 2204 |       buffer = GIMP_DRAWABLE_GET_CLASS (drawable)->get_buffer (drawable);\n 2205 | \n 2206 |       g_return_val_if_fail (buffer != NULL, FALSE);\n 2207 |       g_return_val_if_fail (drawable->private->paint_buffer != NULL, FALSE);\n 2208 | \n 2209 |       n_rects = cairo_region_num_rectangles (\n 2210 |         drawable->private->paint_copy_region);\n 2211 | \n 2212 |       for (i = 0; i < n_rects; i++)\n 2213 |         {\n 2214 |           GeglRectangle rect;\n 2215 | \n 2216 |           cairo_region_get_rectangle (drawable->private->paint_copy_region,\n 2217 |                                       i, (cairo_rectangle_int_t *) &rect);\n 2218 | \n 2219 |           gimp_gegl_buffer_copy (\n 2220 |             drawable->private->paint_buffer, &rect, GEGL_ABYSS_NONE,\n 2221 |             buffer, NULL);\n 2222 |         }\n 2223 | \n 2224 |       g_clear_pointer (&drawable->private->paint_copy_region,\n 2225 |                        cairo_region_destroy);\n 2226 | \n 2227 |       n_rects = cairo_region_num_rectangles (\n 2228 |         drawable->private->paint_update_region);\n 2229 | \n 2230 |       for (i = 0; i < n_rects; i++)\n 2231 |         {\n 2232 |           GeglRectangle rect;\n 2233 | \n 2234 |           cairo_region_get_rectangle (drawable->private->paint_update_region,\n 2235 |                                       i, (cairo_rectangle_int_t *) &rect);\n 2236 | \n 2237 |           g_signal_emit (drawable, gimp_drawable_signals[UPDATE], 0,\n 2238 |                          rect.x, rect.y, rect.width, rect.height);\n 2239 |         }\n 2240 | \n 2241 |       g_clear_pointer (&drawable->private->paint_update_region,\n 2242 |                        cairo_region_destroy);\n 2243 | \n 2244 |       return TRUE;\n 2245 |     }\n 2246 | \n 2247 |   return FALSE;\n 2248 | }","lines":51},{"ref":"app/core/gimpdrawable.c:1325-1356","code":" 1325 |           if (drawable->private->paint_copy_region)\n 1326 |             {\n 1327 |               cairo_region_union_rectangle (\n 1328 |                 drawable->private->paint_copy_region,\n 1329 |                 (const cairo_rectangle_int_t *) &aligned_rect);\n 1330 |             }\n 1331 |           else\n 1332 |             {\n 1333 |               drawable->private->paint_copy_region =\n 1334 |                 cairo_region_create_rectangle (\n 1335 |                   (const cairo_rectangle_int_t *) &aligned_rect);\n 1336 |             }\n 1337 | \n 1338 |           gegl_rectangle_align (&aligned_rect, &rect,\n 1339 |                                 GEGL_RECTANGLE (0, 0,\n 1340 |                                                 PAINT_UPDATE_CHUNK_WIDTH,\n 1341 |                                                 PAINT_UPDATE_CHUNK_HEIGHT),\n 1342 |                                 GEGL_RECTANGLE_ALIGNMENT_SUPERSET);\n 1343 | \n 1344 |           if (drawable->private->paint_update_region)\n 1345 |             {\n 1346 |               cairo_region_union_rectangle (\n 1347 |                 drawable->private->paint_update_region,\n 1348 |                 (const cairo_rectangle_int_t *) &aligned_rect);\n 1349 |             }\n 1350 |           else\n 1351 |             {\n 1352 |               drawable->private->paint_update_region =\n 1353 |                 cairo_region_create_rectangle (\n 1354 |  global_rmax);\n 4249 |           ge = CLAMP(ge, global_gmin, global_gmax);\n 4250 |           be = CLAMP(be, global_bmin, global_bmax);","lines":3}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gimp_lineart_curvature_extremums() allocates the smoothed-curvature buffer based on edgelset->len in gimp_lineart_get_smooth_curvatures (g_new0 (gfloat, edgelset->len)), but the surrounding code mixes per-edgel indexing with per-pixel indexing. In gimp_lineart_compute_normals_curvatures the loop at lines 1644-1653 walks the NULL-terminated edgel set and reads smoothed_curvature sequentially (one per edgel) while the producer wrote exactly one value per edgel; this is internally consistent only because both walks stop at the NULL terminator. If the edgel array were ever not NULL-terminated (e.g. an empty set returned early), 'while (*e)' relies on the terminator element being present. This is a fragile coupling worth documenting/asserting rather than a present-day OOB.","fix":"Add an explicit assert that edgelset is NULL-terminated and that the number of produced smoothed curvatures equals (set->len), or index by a counter bounded by set->len instead of relying on the sentinel.","locations":[{"ref":"app/core/gimplineart.c:1662-1712","code":" 1662 | static gfloat *\n 1663 | gimp_lineart_get_smooth_curvatures (GArray    *edgelset,\n 1664 |                                     GimpAsync *async)\n 1665 | {\n 1666 |   Edgel  **e;\n 1667 |   gfloat  *smoothed_curvatures = g_new0 (gfloat, edgelset->len);\n 1668 |   gfloat   weights[9];\n 1669 |   gfloat   smoothed_curvature;\n 1670 |   gfloat   weights_sum;\n 1671 |   gint     idx = 0;\n 1672 | \n 1673 |   weights[0] = 1.0f;\n 1674 |   for (int i = 1; i <= 8; ++i)\n 1675 |     weights[i] = expf (-(i * i) / 30.0f);\n 1676 | \n 1677 |   e = (Edgel **) edgelset->data;\n 1678 |   while (*e)\n 1679 |     {\n 1680 |       Edgel *edgel_before = g_array_index (edgelset, Edgel*, (*e)->previous);\n 1681 |       Edgel *edgel_after  = g_array_index (edgelset, Edgel*, (*e)->next);\n 1682 |       int    n = 5;\n 1683 |       int    i = 1;\n 1684 | \n 1685 |       if (gimp_async_is_canceled (async))\n 1686 |         {\n 1687 |           gimp_async_abort (async);\n 1688 | \n 1689 |           g_free (smoothed_curvatures);\n 1690 | \n 1691 |           return NULL;\n 1692 |         }\n 1693 | \n 1694 |       smoothed_curvature = (*e)->curvature;\n 1695 |       weights_sum = weights[0];\n 1696 |       while (n-- && (edgel_after != edgel_before))\n 1697 |         {\n 1698 |           smoothed_curvature += weights[i] * edgel_before->curvature;\n 1699 |           smoothed_curvature += weights[i] * edgel_after->curvature;\n 1700 |           edgel_before = g_array_index (edgelset, Edgel*, edgel_before->previous);\n 1701 |           edgel_after  = g_array_index (edgelset, Edgel*, edgel_after->next);\n 1702 |           weights_sum += 2 * weights[i];\n 1703 |           i++;\n 1704 |         }\n 1705 |       smoothed_curvature /= weights_sum;\n 1706 |       smoothed_curvatures[idx++] = smoothed_curvature;\n 1707 | \n 1708 |       e++;\n 1709 |     }\n 1710 | \n 1711 |   return smoothed_curvatures;\n 1712 | }","lines":51},{"ref":"app/core/gimplineart.c:1643-1653","code":" 1643 |   e = (Edgel **) es->data;\n 1644 |   while (*e)\n 1645 |     {\n 1646 |       gfloat *pixel_curvature = &smoothed_curvatures[(*e)->x + (*e)->y * width];\n 1647 | \n 1648 |       if (*pixel_curvature < *smoothed_curvature)\n 1649 |         *pixel_curvature = *smoothed_curvature;\n 1650 | \n 1651 |       ++smoothed_curvature;\n 1652 |       e++;\n 1653 |     }","lines":11}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In gimp_palette_load_ase, src_format is declared 'static const Babl *src_format = NULL'. The static qualifier makes it persist across invocations of the loader; while each color entry sets src_format before use (components==0 breaks otherwise), making it static is unnecessary and a latent hazard for concurrent/repeated loads. There is no need for static lifetime here.","fix":"Remove the 'static' qualifier (make it a plain local), since it is always reassigned per color entry before use.","locations":[{"ref":"app/core/gimppalette-load.c:1052","code":" 1052 |   const Babl  *src_format = NULL;","lines":1}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"gimp_palette_add_entry() appends the entry at the END of the list when position < 0 or position >= n_colors, but then emits ENTRY_CHANGED for the index range starting at the raw 'position' value: 'for (i = position; i < palette->n_colors; i++)'. When position < 0 (the common 'append' convention is -1), this emits signals with negative indices and for indices that do not correspond to the actually-changed (last) entry. With position <= -2 the emitted index is < -1; the connected handler gimp_palette_real_entry_changed -> gimp_image_colormap_changed asserts color_index >= -1 (g_return_if_fail), triggering a runtime warning/early return. The emitted index set also does not match the entry that was inserted.","fix":"Determine the actual insertion index first (n_colors-1 for append, else position), then emit ENTRY_CHANGED only for affected indices, e.g. clamp the loop start to MAX(position,0) and base it on the real inserted position.","locations":[{"ref":"app/core/gimppalette.c:597-610","code":"  597 |   if (position < 0 || position >= palette->n_colors)\n  598 |     {\n  599 |       palette->colors = g_list_append (palette->colors, entry);\n  600 |     }\n  601 |   else\n  602 |     {\n  603 |       palette->colors = g_list_insert (palette->colors, entry, position);\n  604 |     }\n  605 | \n  606 |   palette->n_colors += 1;\n  607 | \n  608 |   if (! gimp_data_is_frozen (GIMP_DATA (palette)))\n  609 |     for (gint i = position; i < palette->n_colors; i++)\n  610 |       g_signal_emit (palette, signals[ENTRY_CHANGED], 0, i);","lines":14}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In gimp_display_shell_scale_fit_or_fill the zoom factor is computed as disp_width/image_width and disp_height/image_height. image_width/image_height are derived from transform_bounds and reduced by subtracting image_x/image_y; for a degenerate (zero-area) transformed bounding box these can be 0.0, producing a division by zero (inf) zoom_factor that then flows into gimp_display_shell_scale. Float div-by-zero does not trap but yields inf/nan scale which can corrupt later offset/scale integer conversions.","fix":"Clamp image_width/image_height to a minimum (e.g. MAX (1.0, image_width)) before dividing, as is already done in gimp_display_shell_scale_to_rectangle (scale.c:655-656).","locations":[{"ref":"app/display/gimpdisplayshell-scale.c:1231-1245","code":" 1231 |   image_width  -= image_x;\n 1232 |   image_height -= image_y;\n 1233 | \n 1234 |   current_scale = gimp_zoom_model_get_factor (shell->zoom);\n 1235 | \n 1236 |   if (fill)\n 1237 |     {\n 1238 |       zoom_factor = MAX (shell->disp_width  / image_width,\n 1239 |                          shell->disp_height / image_height);\n 1240 |     }\n 1241 |   else\n 1242 |     {\n 1243 |       zoom_factor = MIN (shell->disp_width  / image_width,\n 1244 |                          shell->disp_height / image_height);\n 1245 |     }","lines":15}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"file_gex_validate_path rejects absolute paths and root-level files but its handling of relative parent traversal is weak: a path like '../evil' has dirname '..', which recurses with first=FALSE; dirname of '..' is '.', so '..' is accepted as the plugin_id (or compared against an existing plugin_id). Validation therefore does not explicitly reject '..' path components; the only thing preventing escape during extraction is libarchive's ARCHIVE_EXTRACT_SECURE_NODOTDOT flag in file_gex_decompress. The validation pass alone would treat a '..'-rooted archive as having plugin id '..', and the AppStream-id-equality check is the sole remaining guard. Defense-in-depth gap: path-traversal safety relies entirely on a single libarchive flag rather than being rejected at validation time.","fix":"Explicitly reject any path whose components contain '..' (e.g. check for g_strcmp0(dirname, \"..\")==0 and basename '..') and fail validation, so traversal attempts are caught independently of the extraction flags.","locations":[{"ref":"app/file-data/file-data-gex.c:134-188","code":"  134 | static gboolean\n  135 | file_gex_validate_path (const gchar  *path,\n  136 |                         const gchar  *file_name,\n  137 |                         gboolean      first,\n  138 |                         gchar       **plugin_id,\n  139 |                         GError      **error)\n  140 | {\n  141 |   gchar    *dirname = g_path_get_dirname (path);\n  142 |   gboolean  valid   = TRUE;\n  143 | \n  144 |   if (g_path_is_absolute (path) || g_strcmp0 (dirname, \"/\") == 0)\n  145 |     {\n  146 |       *error = g_error_new (GIMP_EXTENSION_ERROR, GIMP_EXTENSION_FAILED,\n  147 |                             _(\"Absolute path are forbidden in GIMP extension '%s': %s\"),\n  148 |                             file_name, path);\n  149 |       g_free (dirname);\n  150 |       return FALSE;\n  151 |     }\n  152 | \n  153 |   if (g_strcmp0 (dirname, \".\") == 0)\n  154 |     {\n  155 |       if (first)\n  156 |         {\n  157 |           *error = g_error_new (GIMP_EXTENSION_ERROR, GIMP_EXTENSION_FAILED,\n  158 |                                 _(\"File not allowed in root of GIMP extension '%s': %s\"),\n  159 |                                 file_name, path);\n  160 |           valid = FALSE;\n  161 |         }\n  162 |       else\n  163 |         {\n  164 |           if (*plugin_id)\n  165 |             {\n  166 |               if (g_strcmp0 (path, *plugin_id) != 0)\n  167 |                 {\n  168 |                   *error = g_error_new (GIMP_EXTENSION_ERROR, GIMP_EXTENSION_FAILED,\n  169 |                                         _(\"File not in GIMP extension '%s' folder id '%s': %s\"),\n  170 |                                         file_name, *plugin_id, path);\n  171 |                   valid = FALSE;\n  172 |                 }\n  173 |             }\n  174 |           else\n  175 |             {\n  176 |               *plugin_id = g_strdup (path);\n  177 |             }\n  178 |           }\n  179 |     }\n  180 |   else\n  181 |     {\n  182 |       valid = file_gex_validate_path (dirname, file_name, FALSE, plugin_id, error);\n  183 |     }\n  184 | \n  185 |   g_free (dirname);\n  186 | \n  187 |   return valid;\n  188 | }","lines":55}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"gimp_cage_config_remove_cage_point() takes an explicit point_number and validates it, but then ignores it: it always removes the LAST element ('g_array_remove_index (gcc->cage_points, gcc->cage_points->len - 1)') regardless of which index the caller asked to remove, contradicting its documented contract ('Remove the given point from the cage'). Currently latent because the only in-tree caller (gimp_cage_config_remove_last_cage_point) passes len-1, but any future caller deleting an interior point would silently drop the final point and corrupt the cage.","fix":"Remove the requested index: 'g_array_remove_index (gcc->cage_points, point_number);' (the existing g_return_if_fail already guards the range).","locations":[{"ref":"app/operations/gimpcageconfig.c:234-246","code":"  234 | gimp_cage_config_remove_cage_point (GimpCageConfig *gcc,\n  235 |                                     gint            point_number)\n  236 | {\n  237 |   g_return_if_fail (GIMP_IS_CAGE_CONFIG (gcc));\n  238 |   g_retur ainst length == 0. If two consecutive source-cage points coincide (duplicate point, or both at the same location after a remove), length is 0 and the division yields inf/NaN, which then propagates into the Green-coordinate cage transform. The DELTA offset added in insert_cage_point reduces but does not eliminate exact coincidence (e.g. reversing/duplicating points can align them).","fix":"Guard the division: 'last->edge_scaling_factor = (length > 0.0) ? length_d / length : 1.0;'.","locations":[{"ref":"app/operations/gimpcageconfig.c:590-597","code":"  590 |       length = gimp_vector2_length (&edge);\n  591 | \n  592 |       gimp_vector2_sub (&edge,\n  593 |                         &(last->dest_point),\n  594 |                         &(current->dest_point));\n  595 |       length_d = gimp_vector2_length (&edge);\n  596 | \n  597 |       last->edge_scaling_factor = length_d / length;","lines":8}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gimp_levels_config_to_curves_config(): when gamma < 1 it duplicates the config via gimp_config_duplicate to build config_inv, but if delta_out == 0 the whole gamma branch is skipped (guarded by 'if (delta_out != 0 && gamma != 1.0)'), so no leak there. However within the gamma<1 path, gimp_operation_levels_map_input is called on config_inv whose high_input/low_input were swapped with outputs; if high_output == low_output (delta_out==0) the branch is already skipped, but if high_input==low_input (delta_in==0) while delta_out!=0, the gamma>1 branch computes x0 = delta_in/dx = 0 producing all-identical interior points (degenerate but not crashing). Not a memory or safety bug; flagged as a latent degenerate-curve correctness issue.","fix":"Consider guarding the interior-point generation on delta_in != 0 (gamma>1 case) and delta_out != 0 (gamma<1 case) to avoid emitting redundant coincident control points.","locations":[{"ref":"app/operations/gimplevelsconfig.c:764-843","code":"  764 |       if (delta_out != 0 && gamma != 1.0)\n  765 |         {\n  766 |           /* The Levels tool performs gamma adjustment, which is a\n  767 |            * power law, while the Curves tool uses cubic Bézier\n  768 |            * curves. Here we try to approximate this gamma adjustment\n  769 |            * with a Bézier curve with 5 control points. Two of them\n  770 |            * must be (low_input, low_output) and (high_input,\n  771 |            * high_output), so we need to add 3 more control points in\n  772 |            * the middle.\n  773 |            */\n  774 |           gint i;\n  775 | \n  776 |           if (gamma > 1)\n  777 |             {\n  778 |               /* Case no. 1: γ > 1\n  779 |                *\n  780 |                * The curve should look like a horizontal\n  781 |                * parabola. Since its curvature is greatest when x is\n  782 |                * small, we add more control points there, so the\n  783 |                * approximation is more accurate. I decided to set the\n  784 |                * length of the consecutive segments to x₀, γ⋅x₀, γ²⋅x₀\n  785 |                * and γ³⋅x₀ and I saw that the curves looked\n  786 |                * good. Still, this is completely arbitrary.\n  787 |                */\n  788 |               gdouble dx = 0;\n  789 |               gdouble x0;\n  790 | \n  791 |               for (i = 0; i < n; ++i)\n  792 |                 dx = dx * gamma + 1;\n  793 |               x0 = delta_in / dx;\n  794 | \n  795 |               dx = 0;\n  796 |               for (i = 1; i < n; ++i)\n  797 |                 {\n  798 |                   dx = dx * gamma + x0;\n  799 |                   x = config->low_input[channel] + dx;\n  800 |                   y = config->low_output[channel] + delta_out *\n  801 |                       gimp_operation_levels_map_input (config, channel, x);\n  802 |                   gimp_curve_add_point (curve, x, y);\n  803 |                 }\n  804 |             }\n  805 |           else\n  806 |             {\n  807 |               /* Case no. 2: γ < 1\n  808 |                *\n  809 |                * The curve is the same as the one in case no. 1,\n  810 |                * observed through a reflexion along the y = x axis. So\n  811 |                * if we invert γ and swap the x and y axes we can use\n  812 |                * the same method as in case no. 1.\n  813 |                */\n  814 |               GimpLevelsConfig *config_inv;\n  815 |               gdouble           dy = 0;\n  816 |               gdouble           y0;\n  817 |               const gdouble     gamma_inv = 1 / gamma;\n  818 | \n  819 |               config_inv = gimp_config_duplicate (GIMP_CONFIG (config));\n  820 | \n  821 |               config_inv->gamma[channel]       = gamma_inv;\n  822 |               config_inv->low_input[channel]   = config->low_output[channel];\n  823 |               config_inv->low_output[channel]  = config->low_input[channel];\n  824 |               config_inv->high_input[channel]  = config->high_output[channel];\n  825 |               config_inv->high_output[channel] = config->high_input[channel];\n  826 | \n  827 |               for (i = 0; i < n; ++i)\n  828 |                 dy = dy * gamma_inv + 1;\n  829 |               y0 = delta_out / dy;\n  830 | \n  831 |               dy = 0;\n  832 |               for (i = 1; i < n; ++i)\n  833 |                 {\n  834 |                   dy = dy * gamma_inv + y0;\n  835 |                   y = config->low_output[channel] + dy;\n  836 |                   x = config->low_input[channel] + delta_in *\n  837 |                       gimp_operation_levels_map_input (config_inv, channel, y);\n  838 |                   gimp_curve_add_point (curve, x, y);\n  839 |                 }\n  840 | \n  841 |               g_object_unref (config_inv);\n  842 |             }\n  843 |         }","lines":80}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In gradient_put_pixel(), the dithering branch computes 'dest' and calls gradient_dither_pixel(color, ppd->dither_rand, dest), then executes 'dest += 4;'. 'dest' is a local pointer recomputed from ppd->roi on every call, so this post-increment is dead code with no effect. Harmless but misleading (suggests advancing a cursor that does not persist).","fix":"Remove the 'dest += 4;' statement inside the dither branch.","locations":[{"ref":"app/operations/gimpoperationgradient.c:1089-1094","code":" 1089 |   if (ppd->dither_rand)\n 1090 |     {\n 1091 |       gradient_dither_pixel (color, ppd->dither_rand, dest);\n 1092 | \n 1093 |       dest += 4;\n 1094 |     }","lines":6}]},{"id":"LOGIC_34","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gimp_operation_gradient_validate_cache() computes cache_size = ceil(hypot(start-end)) * GRADIENT_CACHE_N_SUPERSAMPLES as a gint. start_x/end_x are doubles in [-G_MAXDOUBLE, G_MAXDOUBLE] (set from properties with no finite-range constraint). For a very large or non-finite (inf/NaN) coordinate, hypot() may be huge or inf, and the (implicit) double->gint conversion of the multiplication is undefined / produces a garbage/negative cache_size. The subsequent 'cache_size > GRADIENT_CACHE_MAX_SIZE' guard catches large positive values, and MAX(cache_size,2) raises small ones, but a negative wrapped value from inf could pass the upper-bound check yet g_new0(gdouble, cache_size*4) with a negative-then-promoted size is dangerous. Coordinates normally come from clamped tool input, so impact is low, but the op is callable via PDB with arbitrary doubles.","fix":"Validate that start/end coordinates are finite and clamp cache_size into [2, GRADIENT_CACHE_MAX_SIZE] using a 64-bit intermediate before allocating, rejecting non-finite hypot results.","locations":[{"ref":"app/operations/gimpoperationgradient.c:1328-1344","code":" 1328 |   cache_size = ceil (hypot (self->st
