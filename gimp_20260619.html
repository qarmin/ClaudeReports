               for (t = 0; t < num_tables; t++)\n  367 |                 {\n  368 |                   for (i = 0; i < 8; i++)\n  369 |                     {\n  370 |                       for (j = 0; j < 8; j++)\n  371 |                         {\n  372 |                           dest[i * 16 + j * 2]     = src[j * 16 + i * 2];\n  373 |                           dest[i * 16 + j * 2 + 1] = src[j * 16 + i * 2 + 1];\n  374 |                         }\n  375 |                     }\n  376 |                   dest += 128;\n  377 |                   src += 128;\n  378 |                   if (src_size > (4 + num_components * 2 + num_tables * 128))\n  379 |                     {\n  380 |                       memcpy (dest, src, src_size - (4 + num_components * 2\n  381 |                                                      + num_tables * 128));\n  382 |                     }\n  383 |                 }","lines":38}]},{"id":"OVF_99","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"load_resource_1053 computes tot_rec = res_a->data_len / 4 storing a guint64 quotient into a gint16. For data_len above ~256KB the quotient exceeds INT16_MAX and wraps, often producing a negative tot_rec, which the 'if (tot_rec == 0)' guard does not catch. g_malloc(sizeof(...) * tot_rec) with negative tot_rec promotes to an enormous gsize allocation (g_malloc aborts -> DoS). The same gint16 quotient pattern appears for other channel/alpha record counts. Additionally line 1356 uses sizeof(img_a->alpha_id) (pointer size 8) instead of sizeof(*img_a->alpha_id) (4), over-allocating 2x (harmless but wrong).","fix":"Use an unsigned/gint64 intermediate for the count, validate it is > 0 and below a sane bound consistent with data_len, and allocate with sizeof(*img_a->alpha_id).","locations":[{"ref":"plug-ins/file-psd/psd-image-res-load.c:1352-1357","code":" 1352 |   tot_rec = res_a->data_len / 4;\n 1353 |   if (tot_rec ==0)\n 1354 |     return 0;\n 1355 | \n 1356 |   img_a->alpha_id = g_malloc (sizeof (img_a->alpha_id) * tot_rec);\n 1357 |   img_a->alpha_id_count = tot_rec;","lines":6}]},{"id":"OVF_100","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"load_key reads a 32-bit length 'len' from the file and allocates g_malloc0(len + 1). For len == 0xFFFFFFFF, len+1 wraps to 0; for len in (INT_MAX, UINT_MAX-1) g_malloc0 attempts a multi-gigabyte allocation and aborts (DoS). No bound is enforced against the remaining resource size.","fix":"Reject implausibly large len (bound against remaining stream and a sane key-length max) before allocating; use g_try_malloc0 and handle NULL.","locations":[{"ref":"plug-ins/file-psd/psd-layer-res-load.c:2583-2611","code":" 2583 |   guint32  len = 0;\n 2584 |   gchar   *key;\n 2585 | \n 2586 |   if (psd_read (input, &len, 4, error) < 4)\n 2587 |     {\n 2588 |       psd_set_error (error);\n 2589 |       return NULL;\n 2590 |     }\n 2591 |   len = GUINT32_FROM_BE (len);\n 2592 | \n 2593 |   if (len == 0)\n 2594 |     {\n 2595 |       /* pre-defined key is always 4 bytes */\n 2596 |       len = 4;\n 2597 |     }\n 2598 | \n 2599 |   /* We can't use fread_pascal_string since that expects a 1-byte length\n 2600 |      instead of 4-bytes. */\n 2601 |   key = g_malloc0 (len+1);\n 2602 |   if (! key)\n 2603 |     return NULL;\n 2604 | \n 2605 |   if (psd_read (input, key, len, error) < len)\n 2606 |     {\n 2607 |       psd_set_error (error);\n 2608 |       g_free (key);\n 2609 |       return NULL;\n 2610 |     }\n 2611 |   key [len] = '\\0';","lines":29}]},{"id":"OVF_101","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":true,"description":"make-vector does not reject a negative length. len = ivalue(car(sc->args)) is taken from script input with no validation, then passed to mk_vector. The OP_VECTOR handler correctly rejects len < 0 (line 4039) but OP_MKVECTOR does not. A negative len produces an inconsistent vector object whose cell count and later GC mark/fill loops disagree, leading to corruption or crash. (make-vector -1) is directly triggerable.","fix":"After len = ivalue(car(sc->args)); add: if (len < 0) Error_1(sc, \"make-vector: length must be non-negative:\", car(sc->args));","locations":[{"ref":"plug-ins/script-fu/libscriptfu/tinyscheme/scheme.c:4050-4066","code":" 4050 |      case OP_MKVECTOR: { /* make-vector */\n 4051 |           pointer fill=sc->NIL;\n 4052 |           int len;\n 4053 |           pointer vec;\n 4054 | \n 4055 |           len=ivalue(car(sc->args));\n 4056 | \n 4057 |           if(cdr(sc->args)!=sc->NIL) {\n 4058 |                fill=cadr(sc->args);\n 4059 |           }\n 4060 |           vec=mk_vector(sc,len);\n 4061 |           if(sc->no_memory) { s_return(sc, sc->sink); }\n 4062 |           if(fill!=sc->NIL) {\n 4063 |                fill_vector(vec,fill);\n 4064 |           }\n 4065 |           s_return(sc,vec);\n 4066 |      }","lines":17}]},{"id":"OVF_102","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gimp_data_input_stream_read_ucs2_text reads pslen (gint32, validated > 0) and computes 'len = 2 * pslen' in gint. A crafted Photoshop resource with pslen near G_MAXINT/2 makes '2 * pslen' overflow to a negative or small value; g_new(gchar, len) with a negative gint converted to gsize allocates a huge/zero buffer, and the subsequent read loop bounds become wrong. pslen is only checked '> 0', not against a sane upper bound.","fix":"Validate pslen against a reasonable maximum (e.g. reject pslen > G_MAXINT/2) and/or compute len as gsize: 'gsize len = (gsize) 2 * pslen;'.","locations":[{"ref":"app/core/gimp-utils.c:1048-1053","code":" 1048 |   if (! gimp_data_input_stream_read_long (input, &pslen, error) || pslen <= 0)\n 1049 |     return FALSE;\n 1050 | \n 1051 |   len = 2 * pslen;\n 1052 | \n 1053 |   name_ucs2 = g_new (gchar, len);","lines":6}]},{"id":"OVF_103","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In gimp_brush_load_abr_brush_v6, size = width * depth * height is computed as a 32-bit signed multiplication BEFORE the dimension bounds check at lines 879-889. width and height are attacker-controlled (right-left, bottom-top) and only constrained afterwards; for large intermediate values the multiplication is signed integer overflow (UB). The result is only consumed after validation succeeds, so it is not directly exploitable today, but it is undefined behavior on malformed input.","fix":"Validate width/height ranges before computing size, or compute size in gsize after the bounds check (mirroring the v12 path which checks before multiplying).","locations":[{"ref":"app/core/gimpbrush-load.c:870-872","code":"  870 |   width  = right - left;\n  871 |   height = bottom - top;\n  872 |   size   = width * depth * height;","lines":3},{"ref":"app/core/gimpbrush-load.c:879-889","code":"  879 |   if (width  < 1 || width  > GIMP_BRUSH_MAX_SIZE ||\n  880 |       height < 1 || height > GIMP_BRUSH_MAX_SIZE ||\n  881 |       (compress && depth != 1)                   ||\n  882 |       (! compress && (depth < 1 || depth > 2))   ||\n  883 |       G_MAXSIZE / width / height / depth < 1)\n  884 |     {\n  885 |       g_set_error (error, GIMP_DATA_ERROR, GIMP_DATA_ERROR_READ,\n  886 |                    _(\"Fatal parse error in brush file: \"\n  887 |                      \"Brush dimensions out of range.\"));\n  888 |       return NULL;\n  889 |     }","lines":11}]},{"id":"OVF_104","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"gimp_gradient_get_new_preview() computes 'dx = 1.0 / (width - 1)' after multiplying width by scale_factor. gimp_gradient_get_preview_size() sets width = size, and size can be 1 (and scale_factor multiplies it but a 1px preview yields width 1), making (width - 1) == 0 and dx == +inf. cur_x then becomes inf on the second pixel; CLAMP in gimp_gradient_get_color_at salvages the position, but the division by zero is undefined-ish (relies on IEEE inf) and the row buffer math is fragile for degenerate sizes.","fix":"Guard against width <= 1, e.g. 'dx = (width > 1) ? 1.0 / (width - 1) : 0.0;' before the loop.","locations":[{"ref":"app/core/gimpgradient.c:234-258","code":"  234 |   width  *= scale_factor;\n  235 |   height *= scale_factor;\n  236 | \n  237 |   dx    = 1.0 / (width - 1);\n  238 |   cur_x = 0.0;\n  239 |   p     = row = g_malloc (width * 4);\n  240 | \n  241 |   /* Create lines to fill the image */\n  242 | \n  243 |   for (x = 0; x < width; x++)\n  244 |     {\n  245 |       GeglColor *color = NULL;\n  246 | \n  247 |       seg = gimp_gradient_get_color_at (gradient, context, seg, cur_x,\n  248 |                                         FALSE,\n  249 |                                         GIMP_GRADIENT_BLEND_RGB_PERCEPTUAL,\n  250 |                                         &color);\n  251 | \n  252 |       gegl_color_get_pixel (color, babl_format (\"R'G'B'A u8\"), p);\n  253 | \n  254 |       p     += 4;\n  255 |       cur_x += dx;\n  256 | \n  257 |       g_object_unref (color);\n  258 |     }","lines":25}]},{"id":"OVF_105","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"gimp_palette_load_acb_string and gimp_palette_load_ase_block_name allocate g_malloc(pal_name_len * 2) where pal_name_len is gint/gushort. pal_name_len is bounded by '> (file_size - current_pos)', so the size is limited by the real file size; however 'pal_name_len * 2' is a signed int multiplication and for a >2GB input file pal_name_len could approach 1G making *2 overflow. The gushort variant (ASE) is safe (max 0xFFFF); the ACB gint variant is the concern.","fix":"Compute the allocation size in gsize: g_malloc ((gsize) pal_name_len * 2); keep the existing file-size bound check.","locations":[{"ref":"app/core/gimppalette-load.c:1006-1016","code":" 1006 |   pal_name_len = GUINT32_FROM_BE (pal_name_len);\n 1007 |   current_pos  = g_seekable_tell (G_SEEKABLE (input));\n 1008 | \n 1009 |   if (pal_name_len <= 0 || pal_name_len > (file_size - current_pos))\n 1010 |     {\n 1011 |       if (pal_name_len != 0)\n 1012 |         g_printerr (_(\"Invalid ACB name size.\"));\n 1013 | \n 1014 |       return NULL;\n 1015 |     }\n 1016 |   pal_name = g_malloc (pal_name_len * 2);","lines":11},{"ref":"app/core/gimppalette-load.c:1287-1295","code":" 1287 |   pal_name_len = GUINT16_FROM_BE (pal_name_len);\n 1288 |   current_pos  = g_seekable_tell (G_SEEKABLE (input));\n 1289 | \n 1290 |   if (pal_name_len <= 0 || pal_name_len > (file_size - current_pos))\n 1291 |     {\n 1292 |       g_printerr (_(\"Invalid ASE name size.\"));\n 1293 |       return NULL;\n 1294 |     }\n 1295 |   pal_name = g_malloc (pal_name_len * 2);","lines":9}]},{"id":"OVF_106","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In gimp_pattern_load_photoshop_channel the loop counter j is gint while size is gsize: 'for (j = 0; j < size; j++)'. size is currently bounded by width*height with width,height <= GIMP_PATTERN_MAX_SIZE (10000), so size can reach 1e8 which still fits in gint, but the signed/unsigned comparison and gint index are a latent overflow if the size cap is ever raised; the same gint j is reused for the 88-byte alpha-fill loop at line 577.","fix":"Use gsize for the loop counter j (and the alpha-fill loop) to match size and avoid signed/unsigned comparison.","locations":[{"ref":"app/core/gimppattern-load.c:335-338","code":"  335 |   for (j = 0; j < size; j++)\n  336 |     {\n  337 |       temp_buf[j*n_channels] = chan_buf[j];\n  338 |     }","lines":4},{"ref":"app/core/gimppattern-load.c:577-580","code":"  577 |               for (j = 0; j < size; j++)\n  578 |                 {\n  579 |                   temp_buf[j*n_channels] = 255;\n  580 |                 }","lines":4}]},{"id":"OVF_107","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gimp_temp_buf_new_from_pixbuf and gimp_temp_buf_create_pixbuf compute the per-row copy size as 'width * bpp' with both operands gint. The destination temp buf advance uses the same gint product. The allocation itself is overflow-checked, but the per-row 'width * bpp' (and 'data += width * bpp') is computed in gint; for pathologically wide rows this could overflow gint even when the total size fit in gsize. Mostly theoretical given pixbuf size limits, but the computation is inconsistent with the gsize-correct allocation path.","fix":"Cast to gsize when computing row byte counts: 'memcpy (data, pixels, (gsize) width * bpp);' and advance 'data += (gsize) width * bpp;'.","locations":[{"ref":"app/core/gimptempbuf.c:130-132","code":"  130 |         memcpy (data, pixels, width * bpp);\n  131 | \n  132 |       data   += width * bpp;","lines":3},{"ref":"app/core/gimptempbuf.c:426-428","code":"  426 |         memcpy (pixels, data, width * bpp);\n  427 | \n  428 |       data   += width * bpp;","lines":3}]},{"id":"OVF_108","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gimp_temp_buf_lock computes 'n_pixels = buf->width * buf->height' and then 'n_pixels * bpp' using gint arithmetic. While gimp_temp_buf_new guards the allocation against overflow using gsize math (G_MAXSIZE / width / height / bpp), the lock path repeats the size computation purely in gint. For very large temp buffers (width*height near/above 2^31) the gint products overflow, producing a too-small gegl_scratch_alloc and subsequent OOB writes in the babl_process conversion. The unlock path (buf->width * buf->height passed to babl_process) shares the same gint computation.","fix":"Compute n_pixels and the byte size as gsize: 'gsize n_pixels = (gsize) buf->width * buf->height;' and 'gegl_scratch_alloc (LOCK_DATA_ALIGNMENT + n_pixels * (gsize) bpp);', and use gsize for the unlock pixel count.","locations":[{"ref":"app/core/gimptempbuf.c:303-306","code":"  303 |   n_pixels = buf->width * buf->height;\n  304 |   bpp      = babl_format_get_bytes_per_pixel (format);\n  305 | \n  306 |   data = gegl_scratch_alloc (LOCK_DATA_ALIGNMENT + n_pixels * bpp);","lines":4},{"ref":"app/core/gimptempbuf.c:344-352","code":"  344 |   lock_data = (LockData *) ((const guint8 *) data - LOCK_DATA_ALIGNMENT);\n  345 | \n  346 |   if (lock_data->access_mode & GEGL_ACCESS_WRITE)\n  347 |     {\n  348 |       babl_process (babl_fish (lock_data->format, buf->format),\n  349 |                     data,\n  350 |                     gimp_temp_buf_get_data (buf),\n  351 |                     buf->width * buf->height);\n  352 |     }","lines":9}]},{"id":"OVF_109","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"shell->disp_width * shell->render_scale and disp_height * render_scale (used to size the render_cache surface) are computed in int. render_scale is clamped to <= 4, and disp_width/height are display dimensions, so a single dimension would need ~536M px to overflow int; not reachable in practice but the multiplication is unguarded and mirrors the render.c allocation pattern. Worth hardening alongside the primary overflow.","fix":"Use gsize/explicit casts when computing surface dimensions, consistent with the fix for the render/profile buffer allocation.","locations":[{"ref":"app/display/gimpdisplayshell-render.c:241-242","code":"  241 |         shell->disp_width  * shell->render_scale,\n  242 |         shell->disp_height * shell->render_scale);","lines":2},{"ref":"app/display/gimpdisplayshell-scroll.c:106-107","code":"  106 |             shell->disp_width  * shell->render_scale,\n  107 |             shell->disp_height * shell->render_scale);","lines":2}]},{"id":"OVF_110","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In gradient_render_pixel(), GIMP_REPEAT_TRIANGULAR casts the blending factor to 'guint': 'ifactor = (guint) factor;' after negating negative factors. Several factor functions can return values well above 1.0 (e.g. square/radial/linear return 2.0, spiral uses fmod but conical/linear with offset==1.0 return 2.0), and for SHAPEBURST/SPIRAL the value can be large. A factor >= 2^32 (not reachable here in practice given clamps, but factor is an unbounded gdouble from user-controlled start/end coordinates spanning G_MAXDOUBLE) would invoke undefined behavior on the double->guint conversion. Realistically bounded, so low severity, but the conversion is unguarded.","fix":"Clamp or fmod the factor into a sane range before the (guint) cast, or compute the triangular wave entirely in floating point (e.g. using fabs(fmod(factor,2.0)-1.0)).","locations":[{"ref":"app/operations/gimpoperationgradient.c:1022-1034","code":" 1022 |     case GIMP_REPEAT_TRIANGULAR:\n 1023 |       {\n 1024 |         guint ifactor;\n 1025 | \n 1026 |         if (factor < 0.0)\n 1027 |           factor = -factor;\n 1028 | \n 1029 |         ifactor = (guint) factor;\n 1030 |         factor = factor - floor (factor);\n 1031 | \n 1032 |         if (ifactor & 1)\n 1033 |           factor = 1.0 - factor;\n 1034 |       }","lines":13}]},{"id":"OVF_111","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gimp_blob_fill scans for the first/last present row with `start = 0; while (! present[start]) {...; start++;}` and `for (i = b->height - 1; ! present[i]; i--) {...}` with no bound check. For the polygon/ellipse callers at least one edge is normally set, but there is no validation that `present` contains any set entry, so a degenerate blob (e.g. zero-area ellipse where all sampled points round to outside, or a polygon with all points on one y) can drive `start` past b->height or `i` below 0, causing OOB heap access.","fix":"Add bounds checks: `while (start < b->height && ! present[start])` and `for (i = b->height - 1; i >= 0 && ! present[i]; i--)`, and bail out / mark the blob empty when no present row is found.","locations":[{"ref":"app/paint/gimpink-blob.c:530-536","code":"  530 |   start = 0;\n  531 |   while (! present[start])\n  532 |     {\n  533 |       b->data[start].left  = 0;\n  534 |       b->data[start].right = -1;\n  535 |       start++;\n  536 |     }","lines":7},{"ref":"app/paint/gimpink-blob.c:548-552","code":"  548 |   for (i = b->height - 1; ! present[i]; i--)\n  549 |     {\n  550 |       b->data[i].left  = 0;\n  551 |       b->data[i].right = -1;\n  552 |     }","lines":5}]},{"id":"OVF_112","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gimp_blob_make_convex starts with `start = 0; while (! present[start]) start++;` with no upper bound against b->height. It is called from gimp_blob_convex_union, where `present` is only marked for rows in which the source blob spans satisfy right >= left. If both input blobs consist entirely of empty spans (left > right on every row) the present array is all-zero and the loop reads past the end of the heap allocation. The height==0 early-out at line 417 does not cover the all-empty-but-nonzero-height case.","fix":"Bound the scan: `while (start < b->height && ! present[start]) start++;` and return early (treat as empty blob) if start == b->height. Apply the same guard to the equivalent loops in gimp_blob_fill (lines 531, 548).","locations":[{"ref":"app/paint/gimpink-blob.c:691-693","code":"  691 |   start = 0;\n  692 |   while (! present[start])\n  693 |     start++;","lines":3},{"ref":"app/paint/gimpink-blob.c:404-458","code":"  404 | gimp_blob_convex_union (GimpBlob *b1,\n  405 |                         GimpBlob *b2)\n  406 | {\n  407 |   GimpBlob *result;\n  408 |   gint      y;\n  409 |   gint      i, j;\n  410 |   EdgeType *present;\n  411 | \n  412 |   /* Create the storage for the result */\n  413 | \n  414 |   y = MIN (b1->y, b2->y);\n  415 |   result = gimp_blob_new (y, MAX (b1->y + b1->height, b2->y + b2->height)-y);\n  416 | \n  417 |   if (result->height == 0)\n  418 |     return result;\n  419 | \n  420 |   present = g_new0 (EdgeType, result->height);\n  421 | \n  422 |   /* Initialize spans from original objects */\n  423 | \n  424 |   for (i = 0, j = b1->y-y; i < b1->height; i++, j++)\n  425 |     {\n  426 |       if (b1->data[i].right >= b1->data[i].left)\n  427 |         {\n  428 |           present[j] = EDGE_LEFT | EDGE_RIGHT;\n  429 |           result->data[j].left  = b1->data[i].left;\n  430 |           result->data[j].right = b1->data[i].right;\n  431 |         }\n  432 |     }\n  433 | \n  434 |   for (i = 0, j = b2->y - y; i < b2->height; i++, j++)\n  435 |     {\n  436 |       if (b2->data[i].right >= b2->data[i].left)\n  437 |         {\n  438 |           if (present[j])\n  439 |             {\n  440 |               if (result->data[j].left > b2->data[i].left)\n  441 |                 result->data[j].left = b2->data[i].left;\n  442 |               if (result->data[j].right < b2->data[i].right)\n  443 |                 result->data[j].right = b2->data[i].right;\n  444 |             }\n  445 |           else\n  446 |             {\n  447 |               present[j] = EDGE_LEFT | EDGE_RIGHT;\n  448 |               result->data[j].left = b2->data[i].left;\n  449 |               result->data[j].right = b2->data[i].right;\n  450 |             }\n  451 |         }\n  452 |     }\n  453 | \n  454 |   gimp_blob_make_convex (result, present);\n  455 | \n  456 |   g_free (present);\n  457 | \n  458 |   return result;","lines":55}]},{"id":"OVF_113","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"gimp_bezier_stroke_make_bezier() computes 'num_cmds = 2 + (points->len / 3 - 1) * 4' into a signed gint, where points->len is a guint count of anchors. For a sufficiently large path (very large imported SVG) this multiplication can overflow gint, and num_cmds is then used to pre-size a GArray and as the expected command count. While reaching the overflow requires an impractically large anchor count, the arithmetic mixes guint length with gint and has no overflow guard.","fix":"Use a wider/unsigned type for num_cmds (e.g. gsize/guint) and/or bound points->len; compute with overflow checks.","locations":[{"ref":"app/path/gimpbezierstroke.c:1587-1602","code":" 1587 |   gint               num_cmds, i;\n 1588 | \n 1589 |   points = gimp_stroke_control_points_get (stroke, NULL);\n 1590 | \n 1591 |   g_return_val_if_fail (points && points->len % 3 == 0, NULL);\n 1592 |   if (points->len < 3)\n 1593 |     return NULL;\n 1594 | \n 1595 |   /* Moveto + (n-1) * curveto + (if closed) curveto + closepath */\n 1596 |   num_cmds = 2 + (points->len / 3 - 1) * 4;\n 1597 |   if (stroke->closed)\n 1598 |     num_cmds += 1 + 4;\n 1599 | \n 1600 |   cmd_array = g_array_sized_new (FALSE, FALSE,\n 1601 |                                  sizeof (cairo_path_data_t),\n 1602 |                                  num_cmds);","lines":16}]},{"id":"OVF_114","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"Stack-allocated variable-length array 'guchar line[width * 4]' in the per-channel preview blit path. 'width' is the intersection of the destination surface (renderer->width * temp_buf_scale, bounded by GIMP_VIEWABLE_MAX_PREVIEW_SIZE * scale) and the temp_buf, so in practice it stays a few KB; but it is an unchecked stack VLA with no guard, and the project has been actively removing VLAs from preview/loader code (see recent commits). A pathological renderer->width combined with a large temp_buf_scale could push the stack frame to several KB or more, and VLAs defeat compiler stack-probing/overflow protections.","fix":"Replace the VLA with a heap allocation (g_malloc/g_free, or a g_autofree buffer) sized 'width * 4', allocated once before the row loop. This mirrors the workaround already applied elsewhere in the tree (e.g. the psd VLA workaround).","locations":[{"ref":"app/widgets/gimpviewrenderer.c:1423","code":" 1423 |           guchar        line[width * 4];","lines":1}]},{"id":"OVF_115","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"PROP_COLORMAP for file_version 0 seeks to info->cp + n_colors and then fills cmap. n_colors is checked against GIMP_IMAGE_COLORMAP_SIZE/3 (=256) so the cmap writes stay in bounds, but for the non-zero version path 'xcf_read_int8 (info, cmap, n_colors * 3)' the multiply n_colors*3 is fine (<=768). However n_colors is read with xcf_read_int32 unchecked; on a short read n_colors is uninitialized and the bound check / seek operate on garbage. Combined with the unchecked-read issue this can read/seek using uninitialized data.","fix":"Check the xcf_read_int32 return for n_colors; treat short read as failure.","locations":[{"ref":"app/xcf/xcf-load.c:1738-1787","code":" 1738 |         case PROP_COLORMAP:\n 1739 |             {\n 1740 |               guint32 n_colors;\n 1741 |               guchar  cmap[GIMP_IMAGE_COLORMAP_SIZE];\n 1742 | \n 1743 |               xcf_read_int32 (info, &n_colors, 1);\n 1744 | \n 1745 |               if (n_colors > (GIMP_IMAGE_COLORMAP_SIZE / 3))\n 1746 |                 {\n 1747 |                   gimp_message (info->gimp, G_OBJECT (info->progress),\n 1748 |                                 GIMP_MESSAGE_ERROR,\n 1749 |                                 \"Maximum colormap size (%d) exceeded\",\n 1750 |                                 GIMP_IMAGE_COLORMAP_SIZE);\n 1751 |                   return FALSE;\n 1752 |                 }\n 1753 | \n 1754 |               if (info->file_version == 0)\n 1755 |                 {\n 1756 |                   gint i;\n 1757 | \n 1758 |                   gimp_message_literal (info->gimp, G_OBJECT (info->progress),\n 1759 |                                         GIMP_MESSAGE_WARNING,\n 1760 |                                         _(\"XCF warning: version 0 of XCF file format\\n\"\n 1761 |                                           \"did not save indexed colormaps correctly.\\n\"\n 1762 |                                           \"Substituting grayscale map.\"));\n 1763 | \n 1764 |                   if (! xcf_seek_pos (info, info->cp + n_colors, NULL))\n 1765 |                     return FALSE;\n 1766 | \n 1767 |                   for (i = 0; i < n_colors; i++)\n 1768 |                     {\n 1769 |                       cmap[i * 3 + 0] = i;\n 1770 |                       cmap[i * 3 + 1] = i;\n 1771 |                       cmap[i * 3 + 2] = i;\n 1772 |                     }\n 1773 |                 }\n 1774 |               else\n 1775 |                 {\n 1776 |                   xcf_read_int8 (info, cmap, n_colors * 3);\n 1777 |                 }\n 1778 | \n 1779 |               /* only set color map if image is indexed, this is just\n 1780 |                * sanity checking to make sure gimp doesn't end up with\n 1781 |                * an image state that is impossible.\n 1782 |                */\n 1783 |               if (gimp_image_get_base_type (image) == GIMP_INDEXED)\n 1784 |                 _gimp_image_set_colormap (image, cmap, n_colors, FALSE);\n 1785 | \n 1786 |               GIMP_LOG (XCF, \"prop colormap n_colors=%d\", n_colors);\n 1787 |             }","lines":50}]},{"id":"OVF_116","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"PROP_VECTOR_LAYER reads n_stroke_dashes as a guint32 (stored into gsize n_stroke_dashes via a (gboolean) cast bug, see separate finding) and then g_new0(gdouble, n_stroke_dashes) followed by a loop reading that many floats, with no bound. A large value triggers a large allocation / long loop (DoS). The loop reads via xcf_read_float without checking it stays within the property (next_prop) bounds.","fix":"Validate n_stroke_dashes against the remaining property size (next_prop - info->cp) / sizeof(float) before allocating and looping.","locations":[{"ref":"app/xcf/xcf-load.c:2561-2569","code":" 2561 |             xcf_read_int32 (info, (guint32 *) &uint_val, 1);\n 2562 |             data->n_stroke_dashes = (gboolean) uint_val;\n 2563 | \n 2564 |             data->stroke_dashes = g_new0 (gdouble, data->n_stroke_dashes);\n 2565 |             for (gint i = 0; i < data->n_stroke_dashes; i++)\n 2566 |               {\n 2567 |                 xcf_read_float (info, (gfloat *) &float_val, 1);\n 2568 |                 data->stroke_dashes[i] = (gdouble) float_val;\n 2569 |               }","lines":9}]},{"id":"OVF_117","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"xcf_load_color reads profile_data_length as a signed gint and only checks '> 0' before g_new(guint8, profile_data_length) and reading that many bytes. A value up to INT_MAX (~2 GiB) triggers a huge allocation (OOM/DoS) with no bound relative to file size. data_length is validated against the format bpp, but profile_data_length is not bounded.","fix":"Bound profile_data_length to a reasonable maximum (e.g. a few MiB, or the remaining property/file size) before allocating, and fail gracefully otherwise.","locations":[{"ref":"app/xcf/xcf-load.c:4354-4366","code":" 4354 |   xcf_read_int32 (info, (guint32 *) &profile_data_length, 1);\n 4355 |   if (profile_data_length > 0)\n 4356 |     {\n 4357 |       const Babl       *space = NULL;\n 4358 |       GimpColorProfile *profile;\n 4359 |       guint8           *profile_data;\n 4360 | \n 4361 |       profile_data = g_new (guint8, profile_data_length);\n 4362 |       xcf_read_int8 (info, profile_data, profile_data_length);\n 4363 |       profile = gimp_color_profile_new_from_icc_profile (profile_data,\n 4364 |                                                          profile_data_length,\n 4365 |                                                          error);\n 4366 |       g_free (profile_data);","lines":13}]},{"id":"OVF_118","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In export_image the per-layer pixel buffer size is computed with plain gint arithmetic: g_new (guchar, (cols * rows * (alpha ? 2 : 1))). cols and rows are gint and the image is only bounded to G_MAXUSHORT (65535) each by sanity_check. A 65535x65535 layer with alpha computes 65535*65535*2 ~= 8.59e9, which overflows 32-bit signed int before being passed to g_new, producing a far-too-small allocation and a subsequent heap overflow when gegl_buffer_get fills it. Such image sizes are extreme but the multiplication is unchecked.","fix":"Compute the size as gsize/guint64 (e.g. (gsize) cols * rows * bpp) and/or use g_new with a size_t product, or reject images whose pixel count * bpp exceeds G_MAXINT before allocating.","locations":[{"ref":"plug-ins/common/file-gif-export.c:1053-1059","code":" 1053 |       pixels = g_new (guchar, (cols * rows *\n 1054 |                                (((drawable_type == GIMP_INDEXEDA_IMAGE) ||\n 1055 |                                  (drawable_type == GIMP_GRAYA_IMAGE)) ? 2 : 1)));\n 1056 | \n 1057 |       gegl_buffer_get (buffer, GEGL_RECTANGLE (0, 0, cols, rows), 1.0,\n 1058 |                        format, pixels,\n 1059 |                        GEGL_AUTO_ROWSTRIDE, GEGL_ABYSS_NONE);","lines":7}]},{"id":"OVF_119","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"HEIF high-bit-depth load: rowentries is a gint computed as width*4 (or width*3),\nand the conversion buffer is g_malloc_n (height, rowentries * 2). For very large\ndeclared image dimensions (width/height from heif_image_get_width/height), the\ngint multiplication width*4 and rowentries*2 can overflow a 32-bit int before\ng_malloc_n's own size_t multiply, yielding a smaller-than-needed allocation and\nsubsequent heap overflow in the row-conversion loop. g_malloc_n only guards the\nheight * (rowentries*2) product, not the inner gint arithmetic.","fix":"Compute rowentries and the per-row byte count in size_t (or use\ng_size_checked_mul) and validate width/height against a sane maximum before\nallocating; ensure the multiply width * channels * 2 cannot overflow before it\nreaches g_malloc_n.","locations":[{"ref":"plug-ins/common/file-heif.c:1379-1388","code":" 1379 |       if (has_alpha)\n 1380 |         {\n 1381 |           rowentries = width * 4;\n 1382 |         }\n 1383 |       else /* no alpha */\n 1384 |         {\n 1385 |           rowentries = width * 3;\n 1386 |         }\n 1387 | \n 1388 |       data16 = g_malloc_n (height, rowentries * 2);","lines":10},{"ref":"plug-ins/common/file-heif.c:1394-1431","code":" 1394 |           for (y = 0; y < height; y++)\n 1395 |             {\n 1396 |               src16 = (const uint16_t *) (y * stride + data);\n 1397 |               for (x = 0; x < rowentries; x++)\n 1398 |                 {\n 1399 |                   tmp_pixelval = (int) ( ( (float) (0x03ff & (*src16)) / 1023.0f) * 65535.0f + 0.5f);\n 1400 |                   *dest16 = CLAMP (tmp_pixelval, 0, 65535);\n 1401 |                   dest16++;\n 1402 |                   src16++;\n 1403 |                 }\n 1404 |             }\n 1405 |           break;\n 1406 |         case 12:\n 1407 |           for (y = 0; y < height; y++)\n 1408 |             {\n 1409 |               src16 = (const uint16_t *) (y * stride + data);\n 1410 |               for (x = 0; x < rowentries; x++)\n 1411 |                 {\n 1412 |                   tmp_pixelval = (int) ( ( (float) (0x0fff & (*src16))  / 4095.0f) * 65535.0f + 0.5f);\n 1413 |                   *dest16 = CLAMP (tmp_pixelval, 0, 65535);\n 1414 |                   dest16++;\n 1415 |                   src16++;\n 1416 |                 }\n 1417 |             }\n 1418 |           break;\n 1419 |         default:\n 1420 |           for (y = 0; y < height; y++)\n 1421 |             {\n 1422 |               src16 = (const uint16_t *) (y * stride + data);\n 1423 |               for (x = 0; x < rowentries; x++)\n 1424 |                 {\n 1425 |                   *dest16 = *src16;\n 1426 |                   dest16++;\n 1427 |                   src16++;\n 1428 |                 }\n 1429 |             }\n 1430 |           break;\n 1431 |         }","lines":38}]},{"id":"OVF_120","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"PCX load_24/load_8/load_4/load_sub_8 RLE decoders: the readline() RLE path (lines 1047-1066) writes exactly 'bytes' (bytesperline) decoded bytes into 'line', but the per-row consumer loops then index line[x] for x in [0,width) and, in load_sub_8, line[(bpp*x+b)/8]. When the (legacy off-by-one tolerant) bytesperline is smaller than ceil(width*bpp/8), the consumer reads past the decoded region of 'line'. The header validation at lines 700-705 clamps bytesperline up to computed_bytesperline but allows bytesperline to be 1 LESS than computed (bytesperline+1 < computed triggers recompute, so a value exactly computed-1 is accepted), and 'line' is allocated bytes+1, so a single trailing byte is the only slack; load_sub_8's bit index can reach (bpp*(width-1)+bpp-1)/8 which may equal bytes when bytesperline==computed-1.","fix":"Reject any bytesperline smaller than the computed minimum rather than tolerating a difference of 1, or size the 'line' buffer to MAX(bytesperline, computed_bytesperline)+1 and zero-fill so over-reads stay in-bounds and deterministic.","locations":[{"ref":"plug-ins/common/file-pcx.c:700-705","code":"  700 |   computed_bytesperline = (width * pcx_header.bpp + 7) / 8;\n  701 |   if (bytesperline + 1 < computed_bytesperline || bytesperline == 0)\n  702 |     {\n  703 |       g_message (_(\"Invalid number of bytes per line in PCX header\"));\n  704 |       bytesperline = (width * pcx_header.bpp + 7) / 8;\n  705 |     }","lines":6},{"ref":"plug-ins/common/file-pcx.c:1024-1031","code":" 1024 |           for (x = 0; x < width; ++x)\n 1025 |             {\n 1026 |               for (b = 0; b < bpp; b++)\n 1027 |                 {\n 1028 |                   current_bit = bpp * x + b;\n 1029 |                   if (line[current_bit / 8] & (128 >> (current_bit % 8)))\n 1030 |                     buf[x] += (1 << (real_bpp - b + c));\n 1031 |                 }","lines":8},{"ref":"plug-ins/common/file-pcx.c:937-940","code":"  937 |           for (x = 0; x < width; ++x)\n  938 |             {\n  939 |               buf[x * planes + c] = line[x];\n  940 |             }","lines":4}]},{"id":"OVF_121","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"pdf_load_thumb() and wmf_load_thumb() truncate gdouble/float dimensions into gint return values. In pdf_load_thumb, width/height are scaled gdoubles (page MediaBox * scale) cast via GIMP_VALUES_SET_INT; for an oversized first-page MediaBox these can exceed G_MAXINT and wrap to negative/garbage thumbnail dimensions reported to the caller. Same pattern in wmf_load_thumb with float width/height.","fix":"Clamp the scaled dimensions to a sane range before casting to gint when filling the thumbnail return values.","locations":[{"ref":"plug-ins/common/file-pdf-load.c:534-535","code":"  534 |   width  *= scale;\n  535 |   height *= scale;","lines":2},{"ref":"plug-ins/common/file-pdf-load.c:547-548","code":"  547 |   GIMP_VALUES_SET_INT   (return_vals, 2, width);\n  548 |   GIMP_VALUES_SET_INT   (return_vals, 3, height);","lines":2},{"ref":"plug-ins/common/file-wmf.c:348-349","code":"  348 |   GIMP_VALUES_SET_INT   (return_vals, 2, width);\n  349 |   GIMP_VALUES_SET_INT   (return_vals, 3, height);","lines":2}]},{"id":"OVF_122","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"PNM raw 16-bit normalization in pnm_load_raw reads v = (*d++ << 8) + *d++ then does s[x] = MIN(v, info->maxval) immediately overwritten by s[x] = 65535.0 * v / maxval, so the MIN clamp is dead and a sample value v greater than maxval is NOT clamped before the float scale, producing s[x] > 65535 which is truncated on store to gushort (wraps). maxval is validated <= 65535 but individual samples are not guaranteed <= maxval.","fix":"Clamp v to info->maxval before scaling (use the clamped value in the 65535.0 * v / maxval expression), and drop the dead first assignment.","locations":[{"ref":"plug-ins/common/file-pnm.c:1112-1124","code":" 1112 |           if (bpc > 1)\n 1113 |             {\n 1114 |               for (x = 0; x < info->xres * info->np; x++)\n 1115 |                 {\n 1116 |                   int v;\n 1117 | \n 1118 |                   v = *d++ << 8;\n 1119 |                   v += *d++;\n 1120 | \n 1121 |                   s[x] = MIN (v, info->maxval); /* guard against overflow */\n 1122 |                   s[x] = 65535.0 * (gdouble) v / (gdouble) info->maxval;\n 1123 |                 }\n 1124 |               s += info->xres * info->np;","lines":13}]},{"id":"OVF_123","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"ps_open() derives the gs raster geometry from the BoundingBox: width = bbox_x1/72.0*resolution and is passed as '-g%dx%d'. With a crafted BoundingBox and high pixel-density, width/height can become very large or, via the (int) casts of doubles, wrap; these same width/height later become urx/ury and the EPS image is created with gimp_image_new(urx, ury, ...). There is no upper clamp against GIMP_MAX_IMAGE_SIZE before spawning gs / creating the image.","fix":"Clamp computed width/height/urx/ury to [1, GIMP_MAX_IMAGE_SIZE] after the BoundingBox computation and before passing to gs or gimp_image_new().","locations":[{"ref":"plug-ins/common/file-ps.c:1981-1994","code":" 1981 |       if (bbox_x0 >= 0 && bbox_y0 >= 0 && bbox_x1 > bbox_x0 && bbox_y1 > bbox_y0)\n 1982 |         {\n 1983 |           *llx = (int) (bbox_x0 / 72.0 * resolution + 0.0001);\n 1984 |           *lly = (int) (bbox_y0 / 72.0 * resolution + 0.0001);\n 1985 |           /* Use upper bbox values as image size */\n 1986 |           width = (int) (bbox_x1 / 72.0 * resolution + 0.5);\n 1987 |           height = (int) (bbox_y1 / 72.0 * resolution + 0.5);\n 1988 |           /* Pixel coordinates must be one less */\n 1989 |           *urx = width - 1;\n 1990 |           *ury = height - 1;\n 1991 |           if (*urx < *llx) *urx = *llx;\n 1992 |           if (*ury < *lly) *ury = *lly;\n 1993 |         }\n 1994 |     }","lines":14},{"ref":"plug-ins/common/file-ps.c:2043","code":" 2043 |       g_ptr_array_add (cmdA, g_strdup_printf (\"-g%dx%d\", width, height));","lines":1},{"ref":"plug-ins/common/file-ps.c:1250","code":" 1250 |       image = gimp_image_new (urx, ury, GIMP_RGB);","lines":1}]},{"id":"OVF_124","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"rgb_565_to_888() declares 'gboolean swap_endian;' and only assigns it inside if/else-if branches keyed on G_BYTE_ORDER. There is no final else, so if G_BYTE_ORDER is none of LITTLE/PDP/BIG (defensively) swap_endian is used uninitialized. num_pixels is gint32 but the loop counter i is guint32 compared with 'i < num_pixels' (signed/unsigned comparison); a negative num_pixels would become a huge loop bound writing past out.","fix":"Initialize swap_endian = FALSE; and use a matching unsigned type (or validate num_pixels >= 0) for the loop bound.","locations":[{"ref":"plug-ins/common/file-raw-data.c:1357-1411","code":" 1357 | static void\n 1358 | rgb_565_to_888 (guint16       *in,\n 1359 |                 guchar        *out,\n 1360 |                 gint32         num_pixels,\n 1361 |                 RawType        type,\n 1362 |                 RawEndianness  endianness)\n 1363 | {\n 1364 |   guint32 i, j;\n 1365 |   guint16 input;\n 1366 |   gboolean swap_endian;\n 1367 | \n 1368 |   if (G_BYTE_ORDER == G_LITTLE_ENDIAN || G_BYTE_ORDER == G_PDP_ENDIAN)\n 1369 |     {\n 1370 |       swap_endian = (endianness == RAW_BIG_ENDIAN);\n 1371 |     }\n 1372 |   else if (G_BYTE_ORDER == G_BIG_ENDIAN)\n 1373 |     {\n 1374 |       swap_endian = (endianness == RAW_LITTLE_ENDIAN);\n 1375 |     }\n 1376 | \n 1377 |   switch (type)\n 1378 |     {\n 1379 |     case RAW_RGB565:\n 1380 |       for (i = 0, j = 0; i < num_pixels; i++)\n 1381 |         {\n 1382 |           input = in[i];\n 1383 | \n 1384 |           if (swap_endian)\n 1385 |             input = GUINT16_SWAP_LE_BE (input);\n 1386 | \n 1387 |           out[j++] = ((((input >> 11) & 0x1f) * 0x21) >> 2);\n 1388 |           out[j++] = ((((input >>  5) & 0x3f) * 0x41) >> 4);\n 1389 |           out[j++] = ((((input >>  0) & 0x1f) * 0x21) >> 2);\n 1390 |         }\n 1391 |       break;\n 1392 | \n 1393 |     case RAW_BGR565:\n 1394 |       for (i = 0, j = 0; i < num_pixels; i++)\n 1395 |         {\n 1396 |           input = in[i];\n 1397 | \n 1398 |           if (swap_endian)\n 1399 |             input = GUINT16_SWAP_LE_BE (input);\n 1400 | \n 1401 |           out[j++] = ((((input >>  0) & 0x1f) * 0x21) >> 2);\n 1402 |           out[j++] = ((((input >>  5) & 0x3f) * 0x41) >> 4);\n 1403 |           out[j++] = ((((input >> 11) & 0x1f) * 0x21) >> 2);\n 1404 |         }\n 1405 |       break;\n 1406 | \n 1407 |     default:\n 1408 |       /*This conversion function does not handle the passed in\n 1409 |        * planar-configuration*/\n 1410 |       g_assert_not_reached ();\n 1411 |     }","lines":55},{"ref":"plug-ins/common/file-raw-data.c:1364-1375","code":" 1364 |   guint32 i, j;\n 1365 |   guint16 input;\n 1366 |   gboolean swap_endian;\n 1367 | \n 1368 |   if (G_BYTE_ORDER == G_LITTLE_ENDIAN || G_BYTE_ORDER == G_PDP_ENDIAN)\n 1369 |     {\n 1370 |       swap_endian = (endianness == RAW_BIG_ENDIAN);\n 1371 |     }\n 1372 |   else if (G_BYTE_ORDER == G_BIG_ENDIAN)\n 1373 |     {\n 1374 |       swap_endian = (endianness == RAW_LITTLE_ENDIAN);\n 1375 |     }","lines":12},{"ref":"plug-ins/common/file-raw-data.c:1380-1394","code":" 1380 |       for (i = 0, j = 0; i < num_pixels; i++)\n 1381 |         {\n 1382 |           input = in[i];\n 1383 | \n 1384 |           if (swap_endian)\n 1385 |             input = GUINT16_SWAP_LE_BE (input);\n 1386 | \n 1387 |           out[j++] = ((((input >> 11) & 0x1f) * 0x21) >> 2);\n 1388 |           out[j++] = ((((input >>  5) & 0x3f) * 0x41) >> 4);\n 1389 |           out[j++] = ((((input >>  0) & 0x1f) * 0x21) >> 2);\n 1390 |         }\n 1391 |       break;\n 1392 | \n 1393 |     case RAW_BGR565:\n 1394 |       for (i = 0, j = 0; i < num_pixels; i++)","lines":15}]},{"id":"OVF_125","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"file-wbmp.c load_wbmp_image(): width and height are accumulated from a uintvar with 'width = (width << 7) | (value & 0x7F)' in a loop with no iteration cap, so a long run of bytes with the high bit set shifts an int repeatedly -> signed integer overflow (undefined behavior) and arbitrary width/height before the >0 check. read_image then validates against GIMP_MAX_IMAGE_SIZE, so the main impact is UB and potentially negative values slipping through after wraparound.","fix":"Cap the number of continuation bytes (uintvar is at most 5 bytes for 32-bit) and reject values exceeding GIMP_MAX_IMAGE_SIZE during accumulation; use unsigned arithmetic.","locations":[{"ref":"plug-ins/common/file-wbmp.c:273-285","code":"  273 |   /* The width and height are stored as uintvar values */\n  274 |   while (ReadOK (fd, &value, 1))\n  275 |     {\n  276 |       width = (width << 7) | (value & 0x7F);\n  277 |       if (value >> 7 != 1)\n  278 |         break;\n  279 |     }\n  280 |   while (ReadOK (fd, &value, 1))\n  281 |     {\n  282 |       height = (height << 7) | (value & 0x7F);\n  283 |       if (value >> 7 != 1)\n  284 |         break;\n  285 |     }","lines":13}]},{"id":"OVF_126","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"file-wbmp.c load_otb_image(): 'total_size = (gsize) width * height' then g_malloc0(total_size) with width/height up to 65535 (16-bit OTB) -> up to ~4.29 GB allocation request from a tiny file; there is no GIMP_MAX_IMAGE_SIZE bound as read_image has. A failed g_malloc0 (not g_try) would abort the process.","fix":"Bound width and height to GIMP_MAX_IMAGE_SIZE before allocating, and use g_try_malloc0 with a NULL check.","locations":[{"ref":"plug-ins/common/file-wbmp.c:406-407","code":"  406 |   total_size = (gsize) width * height;\n  407 |   dest       = g_malloc0 (total_size);","lines":2},{"ref":"plug-ins/common/file-wbmp.c:388-395","code":"  388 |   if (width == 0 || height == 0)\n  389 |     {\n  390 |       g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  391 |                     _(\"'%s': Invalid dimensions %u x %u\"),\n  392 |                     gimp_file_get_utf8_name (file),\n  393 |                     width, height);\n  394 |       goto out;\n  395 |     }","lines":8}]},{"id":"OVF_127","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"XWD load_xwd_f2_d1_b1 unpacks bits from a scanline of l_bytes_per_line bytes into up to `width` output bytes, advancing src up to ceil(width/8) bytes. If l_bytes_per_line*8 < width (a crafted small bytes_per_line with large width), the inner loop reads past the end of the scanline buffer (scanline allocated as l_bytes_per_line+8). The +8 slack mitigates small overruns but a width much larger than bytes_per_line*8 still over-reads scanline.","fix":"Validate that l_bytes_per_line >= (width + 7) / 8 before decoding, and bound the source pointer to the scanline length.","locations":[{"ref":"plug-ins/common/file-xwd.c:1389","code":" 1389 |   scanline = g_new (guchar, xwdhdr->l_bytes_per_line + 8);","lines":1},{"ref":"plug-ins/common/file-xwd.c:1454-1468","code":" 1454 |       src = scanline;\n 1455 |       j = width;\n 1456 |       while (j >= 8)\n 1457 |         {\n 1458 |           pix8 = *(src++);\n 1459 |           memcpy (dest, bit2byte + pix8*8, 8);\n 1460 |           dest += 8;\n 1461 |           j -= 8;\n 1462 |         }\n 1463 |       if (j > 0)\n 1464 |         {\n 1465 |           pix8 = *(src++);\n 1466 |           memcpy (dest, bit2byte + pix8*8, j);\n 1467 |           dest += j;\n 1468 |         }","lines":15}]},{"id":"OVF_128","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"BMP load_rgb() indexes fi->rowbuf with 'xpos * (fi->bpp / 8)' and reads fi->bpp/8 bytes via ToLn (lines 908-910). fi->rowbuf is allocated to MAX(4, bytes_per_row) where bytes_per_row = ((width*bpp+31)/32)*4, which correctly covers width pixels, so this is bounded. However load_rgb_64() reads 8 bytes per pixel ('fi->rowbuf[(xpos*8)+6]') assuming bpp==64; bytes_per_row for bpp=64 is ((width*64+31)/32)*4 = width*8, exactly enough - safe but relies on the bpp/dimension validation upstream remaining intact. No fix strictly required; documenting the tight coupling between bytes_per_row and the per-pixel stride assumed in each loader.","fix":"Add an assertion or comment tying fi->bytes_per_row to the per-pixel stride each loader assumes, so a future change to the bpp validation cannot silently introduce an OOB read.","locations":[{"ref":"plug-ins/file-bmp/bmp-load.c:893-951","code":"  893 | static gint\n  894 | load_rgb (struct Fileinfo *fi, guchar *dest)\n  895 | {\n  896 |   gint     xpos, i;\n  897 |   gint32   px;\n  898 |   gdouble  d;\n  899 |   guint16 *dest16;\n  900 |   guint32 *dest32;\n  901 | \n  902 |   if (! ReadOK (fi->file, fi->rowbuf, fi->bytes_per_row))\n  903 |     return FALSE;\n  904 | \n  905 |   dest16 = (guint16 *) dest;\n  906 |   dest32 = (guint32 *) dest;\n  907 | \n  908 |   for (xpos = 0; xpos < fi->width; xpos++)\n  9
