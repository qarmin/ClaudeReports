y the ==0 checks removes a defense-in-depth bound that would catch absurd channel counts (zsize up to 65535).","fix":"Re-enable upper-bound validation and additionally cap zsize (channels) to a small value (e.g. <= 4 or a defined max); validate the product xsize*ysize*zsize*bpp in 64-bit before allocating.","locations":[{"ref":"plug-ins/file-sgi/sgi.c:333-358","code":"  333 |   /* Sanitize dimensions (note that they are unsigned short and can\n  334 |    * thus never be larger than GIMP_MAX_IMAGE_SIZE\n  335 |    */\n  336 |   if (sgip->xsize == 0 /*|| sgip->xsize > GIMP_MAX_IMAGE_SIZE*/)\n  337 |     {\n  338 |       g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  339 |               _(\"Invalid width: %hu\"), sgip->xsize);\n  340 |       free (sgip);\n  341 |       return NULL;\n  342 |     }\n  343 | \n  344 |   if (sgip->ysize == 0 /*|| sgip->ysize > GIMP_MAX_IMAGE_SIZE*/)\n  345 |     {\n  346 |       g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  347 |               _(\"Invalid height: %hu\"), sgip->ysize);\n  348 |       free (sgip);\n  349 |       return NULL;\n  350 |     }\n  351 | \n  352 |   if (sgip->zsize == 0 /*|| sgip->zsize > GIMP_MAX_IMAGE_SIZE*/)\n  353 |     {\n  354 |       g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  355 |               _(\"Invalid number of channels: %hu\"), sgip->zsize);\n  356 |       free (sgip);\n  357 |       return NULL;\n  358 |     }","lines":26}]},{"id":"LOGIC_64","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The still-image branch passes &width/&height to WebPDecodeRGBA (line 150), which overwrites them with the decoded dimensions, but the GIMP image canvas was already created at line 132 using the dimensions from WebPGetInfo. If a malformed/mismatched WebP reports different sizes from the two APIs, the layer is created at the decoded size while the image canvas keeps the WebPGetInfo size, and gegl_buffer_set in create_layer trusts WebPDecodeRGBA's RGBA buffer to be exactly width*height*4 with no validation.","fix":"Decode into separate local dimensions and assert/verify they match the WebPGetInfo dimensions used to create the image; reject the file on mismatch rather than silently using inconsistent sizes.","locations":[{"ref":"plug-ins/file-webp/file-webp-load.c:103","code":"  103 |   if (! WebPGetInfo (indata, indatalen, &width, &height))","lines":1},{"ref":"plug-ins/file-webp/file-webp-load.c:132","code":"  132 |   image = gimp_image_new (width, height, GIMP_RGB);","lines":1},{"ref":"plug-ins/file-webp/file-webp-load.c:150-160","code":"  150 |       outdata = WebPDecodeRGBA (indata, indatalen, &width, &height);\n  151 | \n  152 |       /* Check to ensure the image data was loaded correctly */\n  153 |       if (! outdata)\n  154 |         {\n  155 |           WebPMuxDelete (mux);\n  156 |           return NULL;\n  157 |         }\n  158 | \n  159 |       create_layer (image, outdata, 0, _(\"Background\"),\n  160 |                     width, height);","lines":11}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"JP2 load: sycc444_to_rgb() writes the converted G and B channels to a constant\nindex instead of the running index, and the C/G/B back-copy loop is broken.\nLines 948-950 do:\n  img->comps[0].data[i] = d0[i];\n  img->comps[1].data[1] = d1[i];   // index '1', not 'i'\n  img->comps[2].data[1] = d2[i];   // index '1', not 'i'\nSo every green/blue value is written to element 1 only, leaving the rest of the\nG/B planes as the raw (still-YCC) values. The result is a corrupted/garbage\nimage for any 4:4:4 YCC JPEG 2000. (Compare the sibling 4:2:0/4:2:2 paths which\nswap the buffer pointers instead of copying element-by-element.) The inner loop\nvariable 'gint i' also shadows the outer 'size_t i' and is compared signed\nagainst a size_t 'max', which is a separate latent issue for very large images.","fix":"Replace the element-by-element back-copy with the same buffer-swap pattern used\nby sycc420/sycc422 (free the old comps[*].data and assign d0/d1/d2), or fix the\nindices to img->comps[1].data[i] / img->comps[2].data[i] and use a size_t loop\nvariable that does not shadow the outer i.","locations":[{"ref":"plug-ins/common/file-jp2.c:946-951","code":"  946 |   for (gint i = 0; i < max; i++)\n  947 |     {\n  948 |       img->comps[0].data[i] = d0[i];\n  949 |       img->comps[1].data[1] = d1[i];\n  950 |       img->comps[2].data[1] = d2[i];\n  951 |     }","lines":6}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"In icns_slurp()'s 32-bit branch the alpha is read from the wrong buffer with the wrong bound. Line 327 does 'dest[out*4+3] = icns->data[mask->cursor++]' - it indexes icns->data with mask->cursor (should be mask->data), and the preceding guard at line 320 compares mask->cursor against icns->size instead of mask->size. With a small mask resource this reads out of bounds and/or pulls bytes from the wrong allocation.","fix":"Read from mask->data, and bound-check against mask->size: 'if (mask && mask->cursor >= mask->size) {...}' then 'dest[out*4+3] = mask->data[mask->cursor++];'.","locations":[{"ref":"plug-ins/file-icns/file-icns-load.c:320-327","code":"  320 |             if (mask && mask->cursor >= (icns->size))\n  321 |               {\n  322 |                 g_message (\"Invalid or corrupt icns resource file.\");\n  323 |                 return;\n  324 |               }\n  325 | \n  326 |             if (mask)\n  327 |               dest[out * 4 + 3] = icns->data[mask->cursor++];","lines":8}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In gimp_channel_to_selection(), the call to gimp_channel_select_channel() passes feather_radius_x for BOTH the feather_radius_x and feather_radius_y parameters. The function receives a distinct feather_radius_y (declared line 878) but never uses it. When a channel is converted to a selection with feathering using asymmetric radii, the Y feather radius is silently replaced by the X radius, producing an incorrectly shaped feathered selection.","fix":"Change the final argument from feather_radius_x to feather_radius_y: 'op, feather, feather_radius_x, feather_radius_y);'.","locations":[{"ref":"app/core/gimpchannel.c:886-890","code":"  886 |   gimp_channel_select_channel (gimp_image_get_mask (image),\n  887 |                                GIMP_ITEM_GET_CLASS (item)->to_selection_desc,\n  888 |                                channel, off_x, off_y,\n  889 |                                op,\n  890 |                                feather, feather_radius_x, feather_radius_x);","lines":5}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In file_pat_image_to_pattern the multi-drawable branch computes height from gimp_image_get_width(subimage) instead of gimp_image_get_height(subimage). For a non-square merged sub-image the pattern mask is allocated with the wrong height. The subsequent gegl_buffer_get reads a GEGL_RECTANGLE(0,0,width,height) region into a temp-buf sized width*width; if width > height it requests more rows than the source has (reads abyss) and if width < height the temp-buf is over-allocated and the exported pattern is geometrically corrupted. Wrong-dimension buffer handling on the export path.","fix":"Change line 274 to: height = gimp_image_get_height (subimage);","locations":[{"ref":"app/file-data/file-data-pat.c:273-274","code":"  273 |       width  = gimp_image_get_width (subimage);\n  274 |       height = gimp_image_get_width (subimage);","lines":2}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In gimp_value_to_gp_param() serializing a COLOR_ARRAY, inside the per-color loop the ICC profile size is written to the WRONG union field: 'param->data.d_gegl_color.format.profile_size = icc_length;' instead of 'param->data.d_color_array.colors[i].format.profile_size'. Because d_gegl_color and d_color_array share the same union storage, this both corrupts the union (writing through the d_gegl_color view while d_color_array is the live member) and leaves every array color's profile_size as 0 from the g_new0. Result: per-color ICC profiles are silently dropped on the wire (color space loss) for color arrays, and the stray write aliases the color_array struct's memory.","fix":"Change line 1603 to set param->data.d_color_array.colors[i].format.profile_size = icc_length; (and only when profile_data was actually obtained).","locations":[{"ref":"libgimp/gimpgpparams-body.c:1588-1604","code":" 1588 |           for (gint i = 0; i < param->data.d_color_array.size; i++)\n 1589 |             {\n 1590 |               const Babl *format;\n 1591 |               int         icc_length = 0;\n 1592 | \n 1593 |               format = gegl_color_get_format (colors[i]);\n 1594 | \n 1595 |               param->data.d_color_array.colors[i].size = babl_format_get_bytes_per_pixel (format);\n 1596 |               gegl_color_get_pixel (colors[i], format, &param->data.d_color_array.colors[i].data);\n 1597 | \n 1598 |               param->data.d_color_array.colors[i].format.encoding = (gchar *) babl_format_get_encoding (format);\n 1599 | \n 1600 |               if (babl_format_get_space (format) != babl_space (\"sRGB\"))\n 1601 |                 param->data.d_color_array.colors[i].format.profile_data = (guint8 *) babl_space_get_icc (babl_format_get_space (format),\n 1602 |                                                                                                          &icc_length);\n 1603 |               param->data.d_gegl_color.format.profile_size = icc_length;\n 1604 |             }","lines":17}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In gimp_drawable_real_set_buffer's update path, the y coordinate of the old extent is offset by the X offset instead of the Y offset: 'old_extent.y += gimp_item_get_offset_x (item);'. This makes the old/new extent comparison wrong for drawables placed at offsets where off_x != off_y, so a needed full preview/display update may be skipped (or a redundant one issued). The same code at line 1625 correctly uses offset_x for x.","fix":"Change line 1626 to 'old_extent.y += gimp_item_get_offset_y (item);'.","locations":[{"ref":"app/core/gimpdrawable.c:1626","code":" 1626 |       old_extent.y += gimp_item_get_offset_x (item);","lines":1}]},{"id":"CPY_7","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"Inconsistent thaw loop for paths in gimp_plug_in_cleanup_image. The layers and channels cleanup loops decrement the freeze count in the loop condition (count-- > 0 && gimp_container_frozen), but the paths loop tests 'cleanup->paths_freeze_count > 0' without ever decrementing paths_freeze_count in the condition or body. The loop only terminates because gimp_container_thaw eventually makes the container non-frozen; the freeze count is never consumed, diverging from the layers/channels pattern and breaking the count-based semantics (and risking a spin if frozen state and count get out of sync).","fix":"Match the layers/channels loops: 'while (cleanup->paths_freeze_count-- > 0 && gimp_container_frozen (container)) gimp_container_thaw (container);'.","locations":[{"ref":"app/plug-in/gimpplugin-cleanup.c:496-507","code":"  496 |   if (cleanup->paths_freeze_count > 0)\n  497 |     {\n  498 |       g_message (\"Plug-in '%s' left image's paths frozen, \"\n  499 |                  \"thawing paths.\",\n  500 |                  gimp_procedure_get_label (proc_frame->procedure));\n  501 | \n  502 |       while (cleanup->paths_freeze_count > 0 &&\n  503 |              gimp_container_frozen (container))\n  504 |         {\n  505 |           gimp_container_thaw (container);\n  506 |         }\n  507 |     }","lines":12},{"ref":"app/plug-in/gimpplugin-cleanup.c:466-492","code":"  466 |   if (cleanup->layers_freeze_count > 0)\n  467 |     {\n  468 |       g_message (\"Plug-in '%s' left image's layers frozen, \"\n  469 |                  \"thawing layers.\",\n  470 |                  gimp_procedure_get_label (proc_frame->procedure));\n  471 | \n  472 |       while (cleanup->layers_freeze_count-- > 0 &&\n  473 |              gimp_container_frozen (container))\n  474 |         {\n  475 |           gimp_container_thaw (container);\n  476 |         }\n  477 |     }\n  478 | \n  479 |   container = gimp_image_get_channels (image);\n  480 | \n  481 |   if (cleanup->channels_freeze_count > 0)\n  482 |     {\n  483 |       g_message (\"Plug-in '%s' left image's channels frozen, \"\n  484 |                  \"thawing channels.\",\n  485 |                  gimp_procedure_get_label (proc_frame->procedure));\n  486 | \n  487 |       while (cleanup->channels_freeze_count-- > 0 &&\n  488 |              gimp_container_frozen (container))\n  489 |         {\n  490 |           gimp_container_thaw (container);\n  491 |         }\n  492 |     }","lines":27}]},{"id":"CPY_8","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"gimp_color_parse_css_numeric is declared to return GeglColor * but returns FALSE on the ERANGE error paths. FALSE == 0 == NULL so it is harmless in practice, but it is a type-confused copy-paste from a gboolean function.","fix":"Return NULL instead of FALSE.","locations":[{"ref":"libgimpcolor/gimpcolor-parse.c:515","code":"  515 |             return FALSE;","lines":1},{"ref":"libgimpcolor/gimpcolor-parse.c:528","code":"  528 |             return FALSE;","lines":1}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"In the Photoshop pattern loader the return value of gimp_pattern_load_photoshop_channel() is ignored in both the color-channel loop and the alpha-channel call. On a channel read/RLE-decode failure the function sets *error and returns FALSE, but the caller proceeds: it keeps iterating remaining channels, then either runs the alpha-fill path or builds a GimpPattern from a partially-populated / stream-desynchronized mask buffer and prepends it to pattern_list. Combined with the update_last_error() mechanism (which nulls out the local error pointer after the first failure, see below) this silently produces patterns from corrupt data instead of aborting.","fix":"Check the boolean return of each gimp_pattern_load_photoshop_channel() call; on FALSE, free chan_buf and the half-built pattern and break/continue to the next pattern instead of using the buffer.","locations":[{"ref":"app/core/gimppattern-load.c:544-547","code":"  544 |           for (chan = 0; chan < n_channels-1; chan++)\n  545 |             gimp_pattern_load_photoshop_channel (data_input, chan, chan_buf,\n  546 |                                                  size, chan_data, n_channels,\n  547 |                                                  error);","lines":4},{"ref":"app/core/gimppattern-load.c:567-569","code":"  567 |               gimp_pattern_load_photoshop_channel (data_input, n_channels-1, chan_buf,\n  568 |                                                    size, chan_data, n_channels,\n  569 |                                                    error);","lines":3}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"gimp_metadata_deserialize_text dereferences the result of g_base64_decode without checking for NULL or zero length: `if (decoded[len - 1] == '\\0')`. When the base64 tag body decodes to 0 bytes (empty/whitespace/invalid), len is 0 so decoded[len-1] is decoded[(gsize)-1], an out-of-bounds read at SIZE_MAX, and decoded may itself be NULL. Reachable from gimp_metadata_deserialize with attacker-controlled metadata XML: crash / OOB read.","fix":"Guard with `if (decoded && len > 0 && decoded[len - 1] == '\\0')` before the dereference; free both pointers otherwise.","locations":[{"ref":"libgimpbase/gimpmetadata.c:692-703","code":"  692 |           decoded = g_base64_decode (value, &len);\n  693 | \n  694 |           if (decoded[len - 1] == '\\0')\n  695 |             {\n  696 |               g_free (value);\n  697 |               value = (gchar *) decoded;\n  698 |             }\n  699 |           else\n  700 |             {\n  701 |               g_clear_pointer (&value,   g_free);\n  702 |               g_clear_pointer (&decoded, g_free);\n  703 |             }","lines":12}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"wmf_load_file() unconditionally calls g_set_error() at the end of the function, on the success path as well as the error path. The label _wmf_error is reached by fall-through even when pixels were successfully produced, so on every successful load a GError 'Could not open ... for reading' is set into *error. Callers that inspect *error (or downstream code expecting error to remain NULL on success) get a spurious error, and a GError is leaked/overwritten. It also makes the actual failure reason indistinguishable from success.","fix":"Only set the error on actual failure. Split the cleanup label from the error reporting, e.g. set the GError immediately before each 'goto _wmf_error', or guard the g_set_error with 'if (pixels == NULL)'.","locations":[{"ref":"plug-ins/common/file-wmf.c:585-599","code":"  585 |  _wmf_error:\n  586 |   if (API)\n  587 |     {\n  588 |       wmf_mem_close (API);\n  589 |       wmf_api_destroy (API);\n  590 |     }\n  591 | \n  592 |   g_mapped_file_unref (mapped);\n  593 | \n  594 |   /* FIXME: improve error message */\n  595 |   g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  596 |                _(\"Could not open '%s' for reading\"),\n  597 |                gimp_file_get_utf8_name (file));\n  598 | \n  599 |   return pixels;","lines":15}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"read_header() and read_header_dx10() return FALSE when fread() reads fewer bytes than the header size, but their return values are completely ignored by read_dds(). For a truncated file (< 128 bytes), read_header fails but parsing continues with whatever partial/zero data is in the header struct. If the first 4 bytes happen to be the magic 'DDS ', validate_header() passes and the loader proceeds with attacker-influenced, partially-uninitialized header fields. This is the root enabler that defeats several downstream size sanity checks.","fix":"Check the boolean return of read_header()/read_header_dx10() and bail out with an error (and fclose) when the full header could not be read. Also reject files smaller than DDS_HEADERSIZE up front.","locations":[{"ref":"plug-ins/file-dds/ddsread.c:182-183","code":"  182 |   memset (&hdr, 0, sizeof (dds_header_t));\n  183 |   read_header (&hdr, fp);","lines":2},{"ref":"plug-ins/file-dds/ddsread.c:214-218","code":"  214 |   /* Read DX10 header if present */\n  215 |   memset (&dx10hdr, 0, sizeof (dds_header_dx10_t));\n  216 |   if (GETL32 (load_info.fourcc) == FOURCC ('D','X','1','0'))\n  217 |     {\n  218 |       read_header_dx10 (&dx10hdr, fp);","lines":5},{"ref":"plug-ins/file-dds/ddsread.c:787-832","code":"  787 | static gboolean\n  788 | read_header (dds_header_t *hdr,\n  789 |              FILE         *fp)\n  790 | {\n  791 |   guchar buf[DDS_HEADERSIZE];\n  792 | \n  793 |   if (fread (buf, 1, DDS_HEADERSIZE, fp) != DDS_HEADERSIZE)\n  794 |     return FALSE;\n  795 | \n  796 |   hdr->magic              = GETL32 (buf);\n  797 | \n  798 |   hdr->size               = GETL32 (buf + 4);\n  799 |   hdr->flags              = GETL32 (buf + 8);\n  800 |   hdr->height             = GETL32 (buf + 12);\n  801 |   hdr->width              = GETL32 (buf + 16);\n  802 |   hdr->pitch_or_linsize   = GETL32 (buf + 20);\n  803 |   hdr->depth              = GETL32 (buf + 24);\n  804 |   hdr->num_mipmaps        = GETL32 (buf + 28);\n  805 | \n  806 |   hdr->pixelfmt.size      = GETL32 (buf + 76);\n  807 |   hdr->pixelfmt.flags     = GETL32 (buf + 80);\n  808 |   hdr->pixelfmt.fourcc[0] = buf[84];\n  809 |   hdr->pixelfmt.fourcc[1] = buf[85];\n  810 |   hdr->pixelfmt.fourcc[2] = buf[86];\n  811 |   hdr->pixelfmt.fourcc[3] = buf[87];\n  812 |   hdr->pixelfmt.bpp       = GETL32 (buf + 88);\n  813 |   hdr->pixelfmt.rmask     = GETL32 (buf + 92);\n  814 |   hdr->pixelfmt.gmask     = GETL32 (buf + 96);\n  815 |   hdr->pixelfmt.bmask     = GETL32 (buf + 100);\n  816 |   hdr->pixelfmt.amask     = GETL32 (buf + 104);\n  817 | \n  818 |   hdr->caps.caps1         = GETL32 (buf + 108);\n  819 |   hdr->caps.caps2         = GETL32 (buf + 112);\n  820 | \n  821 |   /* GIMP-DDS special info */\n  822 |   if (GETL32 (buf + 32) == FOURCC ('G','I','M','P') &&\n  823 |       GETL32 (buf + 36) == FOURCC ('-','D','D','S'))\n  824 |     {\n  825 |       hdr->reserved.gimp_dds_special.magic1       = GETL32 (buf + 32);\n  826 |       hdr->reserved.gimp_dds_special.magic2       = GETL32 (buf + 36);\n  827 |       hdr->reserved.gimp_dds_special.version      = GETL32 (buf + 40);\n  828 |       hdr->reserved.gimp_dds_special.extra_fourcc = GETL32 (buf + 44);\n  829 |     }\n  830 | \n  831 |   return TRUE;\n  832 | }","lines":46},{"ref":"plug-ins/file-dds/ddsread.c:837-853","code":"  837 | static gboolean\n  838 | read_header_dx10 (dds_header_dx10_t *dx10hdr,\n  839 |                   FILE              *fp)\n  840 | {\n  841 |   gchar buf[DDS_HEADERSIZE_DX10];\n  842 | \n  843 |   if (fread (buf, 1, DDS_HEADERSIZE_DX10, fp) != DDS_HEADERSIZE_DX10)\n  844 |     return FALSE;\n  845 | \n  846 |   dx10hdr->dxgiFormat        = GETL32 (buf);\n  847 |   dx10hdr->resourceDimension = GETL32 (buf + 4);\n  848 |   dx10hdr->miscFlag          = GETL32 (buf + 8);\n  849 |   dx10hdr->arraySize         = GETL32 (buf + 12);\n  850 |   dx10hdr->reserved          = GETL32 (buf + 16);\n  851 | \n  852 |   return TRUE;\n  853 | }","lines":17}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"ico_read_info() reads the icon directory with 'fread(entries, sizeof(IcoFileEntry), icon_count, fp) <= 0' which only fails if zero elements were read. On a truncated file fread returns a count between 1 and icon_count-1, the check passes, and the loop then consumes uninitialized heap memory (entries allocated with g_new, not g_new0) as width/height/bpp/size/offset for the missing entries - feeding attacker-uninfluenced-but-undefined offsets/sizes into subsequent seeks and allocations.","fix":"Require the full read: 'if (fread(entries, sizeof(IcoFileEntry), icon_count, fp) != (size_t) icon_count)' then error out. (icon_count is bounded by the guint16 header field, so the allocation itself is fine.)","locations":[{"ref":"plug-ins/file-ico/ico-load.c:223-232","code":"  223 |   /* read icon entries */\n  224 |   entries = g_new (IcoFileEntry, icon_count);\n  225 |   if (fread (entries, sizeof (IcoFileEntry), icon_count, fp) <= 0)\n  226 |     {\n  227 |       g_set_error (error, G_FILE_ERROR, 0,\n  228 |                    _(\"Could not read '%lu' bytes\"),\n  229 |                    (long unsigned int) sizeof (IcoFileEntry));\n  230 |       g_free (entries);\n  231 |       return NULL;\n  232 |     }","lines":10}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"In load_resource_ltxt and the tdta handler of load_type, buf = g_malloc(size) where size/res_len is derived from a guint64 data_len truncated to guint32, then psd_read(input, buf, size, ...). For size in (INT_MAX, UINT_MAX] the count is negative, psd_read returns 0 without filling buf; for size near 2GB g_malloc aborts (DoS). The parsed size is then fully attacker-controlled and fed to parse_tdta, which is the delivery path for the parse_text_loop underflow.","fix":"Validate size/res_len against a sane maximum and the remaining resource bytes before allocating; use g_try_malloc and check NULL; only pass the count to psd_read after confirming it is non-negative and fits in gint.","locations":[{"ref":"plug-ins/file-psd/psd-layer-res-load.c:1520-1525","code":" 1520 |   buf = g_malloc (res_len);\n 1521 |   if (psd_read (input, buf, res_len, error) < res_len)\n 1522 |     {\n 1523 |       psd_set_error (error);\n 1524 |       return -1;\n 1525 |     }","lines":6},{"ref":"plug-ins/file-psd/psd-layer-res-load.c:3136-3142","code":" 3136 |       buf = g_malloc (size);\n 3137 |       if (psd_read (input, buf, size, error) < size)\n 3138 |         {\n 3139 |           g_warning (_(\"Could not read enough bytes!\"));\n 3140 |           psd_set_error (error);\n 3141 |           return -1;\n 3142 |         }","lines":7}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"gimp_levels_config_load_alv() writes deserialized values directly into config->low_input/high_input/gamma/low_output/high_output (lines 1071-1078), bypassing the GParamSpec range clamping that normally protects these fields (gamma 0.1..10, inputs/outputs 0..1). gamma is read via read_int16 and divided by 100, so a crafted file can store gamma <= 0 (e.g. raw 0 -> gamma 0.0, or a negative raw value -> negative gamma). gimp_operation_levels_map_input applies pow(x, 1.0/gamma); gamma of 0 yields a division by zero / inf exponent and propagates inf/NaN into the rendered pixels. The XCF/deserialize path is protected by param specs, but this loader is not.","fix":"After reading, clamp each value to its valid range before storing: gamma = CLAMP (gamma[i] / 100.0, 0.1, 10.0); and CLAMP the input/output values to [0,1]. Alternatively route them through g_object_set so the param-spec ranges apply.","locations":[{"ref":"app/operations/gimplevelsconfig.c:1062","code":" 1062 |       gamma[i] = g_data_input_stream_read_int16 (data_input, NULL, error);","lines":1},{"ref":"app/operations/gimplevelsconfig.c:1071-1078","code":" 1071 |   for (gint i = 0; i < 4; i++)\n 1072 |     {\n 1073 |       config->low_input[i]   = low_input[i]   / 253.0;\n 1074 |       config->high_input[i]  = high_input[i]  / 255.0;\n 1075 |       config->gamma[i]       = gamma[i]       / 100.0;\n 1076 |       config->low_output[i]  = low_output[i]  / 255.0;\n 1077 |       config->high_output[i] = high_output[i] / 255.0;\n 1078 |     }","lines":8}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In xcf_load_image_props, PROP_PARASITES loops 'while (info->cp - base < prop_size)' calling xcf_load_parasite. If a parasite fails, it seeks to base+prop_size and 'continue's, but the while condition is then false so the loop ends - fine. However if xcf_load_parasite repeatedly succeeds with a zero-size parasite (size==0, valid name) info->cp advances by only the fixed header bytes; this terminates. The real risk: prop_size is attacker-controlled and unrelated to actual remaining file; the loop trusts prop_size as the stop condition while xcf_load_parasite reads from the stream independently, so a crafted prop_size much larger than the data causes many reads past intended boundaries (reads return short / uninitialized) until cp finally reaches base+prop_size or a NULL parasite triggers the seek. The seek on failure can move cp backwards/forwards arbitrarily based on prop_size.","fix":"Bound prop_size against the actual remaining stream/file size before looping, and stop the loop on any short read inside xcf_load_parasite rather than relying solely on prop_size.","locations":[{"ref":"app/xcf/xcf-load.c:1974-2014","code":" 1974 |         case PROP_PARASITES:\n 1975 |             {\n 1976 |               goffset base = info->cp;\n 1977 | \n 1978 |               while (info->cp - base < prop_size)\n 1979 |                 {\n 1980 |                   GimpParasite *p     = xcf_load_parasite (info);\n 1981 |                   GError       *error = NULL;\n 1982 | \n 1983 |                   if (! p)\n 1984 |                     {\n 1985 |                       gimp_message (info->gimp, G_OBJECT (info->progress),\n 1986 |                                     GIMP_MESSAGE_WARNING,\n 1987 |                                     \"Invalid image parasite found. \"\n 1988 |                                     \"Possibly corrupt XCF file.\");\n 1989 | \n 1990 |                       xcf_seek_pos (info, base + prop_size, NULL);\n 1991 |                       continue;\n 1992 |                     }\n 1993 | \n 1994 |                   if (! gimp_image_parasite_validate (image, p, &error))\n 1995 |                     {\n 1996 |                       gimp_message (info->gimp, G_OBJECT (info->progress),\n 1997 |                                     GIMP_MESSAGE_WARNING,\n 1998 |                                     \"Warning, invalid image parasite in XCF file: %s\",\n 1999 |                                     error->message);\n 2000 |                       g_clear_error (&error);\n 2001 |                     }\n 2002 |                   else\n 2003 |                     {\n 2004 |                       gimp_image_parasite_attach (image, p, FALSE);\n 2005 |                     }\n 2006 | \n 2007 |                   gimp_parasite_free (p);\n 2008 |                 }\n 2009 | \n 2010 |               if (info->cp - base != prop_size)\n 2011 |                 gimp_message_literal (info->gimp, G_OBJECT (info->progress),\n 2012 |                                       GIMP_MESSAGE_WARNING,\n 2013 |                                       \"Error while loading an image's parasites\");\n 2014 |             }","lines":41},{"ref":"app/xcf/xcf-load.c:2452-2484","code":" 2452 |         case PROP_PARASITES:\n 2453 |           {\n 2454 |             goffset base = info->cp;\n 2455 | \n 2456 |             while (info->cp - base < prop_size)\n 2457 |               {\n 2458 |                 GimpParasite *p     = xcf_load_parasite (info);\n 2459 |                 GError       *error = NULL;\n 2460 | \n 2461 |                 if (! p)\n 2462 |                   return FALSE;\n 2463 | \n 2464 |                 if (! gimp_item_parasite_validate (GIMP_ITEM (*layer), p, &error))\n 2465 |                   {\n 2466 |                     gimp_message (info->gimp, G_OBJECT (info->progress),\n 2467 |                                   GIMP_MESSAGE_WARNING,\n 2468 |                                   \"Warning, invalid layer parasite in XCF file: %s\",\n 2469 |                                   error->message);\n 2470 |                     g_clear_error (&error);\n 2471 |                   }\n 2472 |                 else\n 2473 |                   {\n 2474 |                     gimp_item_parasite_attach (GIMP_ITEM (*layer), p, FALSE);\n 2475 |                   }\n 2476 | \n 2477 |                 gimp_parasite_free (p);\n 2478 |               }\n 2479 | \n 2480 |             if (info->cp - base != prop_size)\n 2481 |               gimp_message_literal (info->gimp, G_OBJECT (info->progress),\n 2482 |                                     GIMP_MESSAGE_WARNING,\n 2483 |                                     \"Error while loading a layer's parasites\");\n 2484 |           }","lines":33}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Throughout the loader, return values of xcf_read_int8/int16/int32/offset/string are almost never checked. On a truncated file these return fewer bytes than requested but leave the destination buffer partially or fully uninitialized, and parsing proceeds using uninitialized stack values as dimensions, counts, offsets, enum values, etc. E.g. xcf_load_layer reads width/height/type without checking the read succeeded; xcf_load_buffer/level read width/height/bpp unchecked; many props read values unchecked. This yields use of uninitialized memory and unpredictable control flow on malformed input.","fix":"Have the read helpers signal short reads and check them at every call site that drives subsequent allocation/seeking, bailing out (returning FALSE/NULL) on truncated reads. At minimum zero-initialize destination locals so uninitialized data is not interpreted as counts/offsets.","locations":[{"ref":"app/xcf/xcf-load.c:3792-3795","code":" 3792 |   xcf_read_int32  (info, (guint32 *) &width,  1);\n 3793 |   xcf_read_int32  (info, (guint32 *) &height, 1);\n 3794 |   xcf_read_int32  (info, (guint32 *) &type,   1);\n 3795 |   xcf_read_string (info,             &name,   1);","lines":4},{"ref":"app/xcf/xcf-load.c:4788-4790","code":" 4788 |   xcf_read_int32 (info, (guint32 *) &width,  1);\n 4789 |   xcf_read_int32 (info, (guint32 *) &height, 1);\n 4790 |   xcf_read_int32 (info, (guint32 *) &bpp,    1);","lines":3},{"ref":"app/xcf/xcf-load.c:4845-4846","code":" 4845 |   xcf_read_int32 (info, (guint32 *) &width,  1);\n 4846 |   xcf_read_int32 (info, (guint32 *) &height, 1);","lines":2},{"ref":"app/xcf/xcf-read.c:35-117","code":"   35 | guint\n   36 | xcf_read_int8 (XcfInfo *info,\n   37 |                guint8  *data,\n   38 |                gint     count)\n   39 | {\n   40 |   gsize bytes_read = 0;\n   41 | \n   42 |   /* we allow for 'data == NULL && count == 0', which g_input_stream_read_all()\n   43 |    * rejects.\n   44 |    */\n   45 |   if (count > 0)\n   46 |     {\n   47 |       g_input_stream_read_all (info->input, data, count,\n   48 |                                &bytes_read, NULL, NULL);\n   49 | \n   50 |       info->cp += bytes_read;\n   51 |     }\n   52 | \n   53 |   return bytes_read;\n   54 | }\n   55 | \n   56 | guint\n   57 | xcf_read_int16 (XcfInfo *info,\n   58 |                 guint16 *data,\n   59 |                 gint     count)\n   60 | {\n   61 |   guint total = 0;\n   62 | \n   63 |   if (count > 0)\n   64 |     {\n   65 |       total += xcf_read_int8 (info, (guint8 *) data, count * 2);\n   66 | \n   67 |       while (count--)\n   68 |         {\n   69 |           *data = g_ntohs (*data);\n   70 |           data++;\n   71 |         }\n   72 |     }\n   73 | \n   74 |   return total;\n   75 | }\n   76 | \n   77 | guint\n   78 | xcf_read_int32 (XcfInfo *info,\n   79 |                 guint32 *data,\n   80 |                 gint     count)\n   81 | {\n   82 |   guint total = 0;\n   83 | \n   84 |   if (count > 0)\n   85 |     {\n   86 |       total += xcf_read_int8 (info, (guint8 *) data, count * 4);\n   87 | \n   88 |       while (count--)\n   89 |         {\n   90 |           *data = g_ntohl (*data);\n   91 |           data++;\n   92 |         }\n   93 |     }\n   94 | \n   95 |   return total;\n   96 | }\n   97 | \n   98 | guint\n   99 | xcf_read_int64 (XcfInfo *info,\n  100 |                 guint64 *data,\n  101 |                 gint     count)\n  102 | {\n  103 |   guint total = 0;\n  104 | \n  105 |   if (count > 0)\n  106 |     {\n  107 |       total += xcf_read_int8 (info, (guint8 *) data, count * 8);\n  108 | \n  109 |       while (count--)\n  110 |         {\n  111 |           *data = GINT64_FROM_BE (*data);\n  112 |           data++;\n  113 |         }\n  114 |     }\n  115 | \n  116 |   return total;\n  117 | }","lines":83}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"gimp_color_profile_new_from_file allocates the profile buffer with g_malloc(length) where length is a guint64 taken from the filesystem-reported file size. g_malloc (not the _try variant) aborts the whole process on a huge/implausible size, giving a DoS on a crafted/large profile file; on 32-bit gsize it also truncates. The mmap path's g_memdup2 has the same abort-on-huge-size behaviour.","fix":"Use g_try_malloc / g_try_memdup2 and return a clean GError on NULL, and/or cap length to a sane maximum before allocating.","locations":[{"ref":"libgimpcolor/gimpcolorprofile.c:220-221","code":"  220 |           length = g_file_info_get_attribute_uint64 (info, G_FILE_ATTRIBUTE_STANDARD_SIZE);\n  221 |           data   = g_malloc (length);","lines":2},{"ref":"libgimpcolor/gimpcolorprofile.c:200-202","code":"  200 | \n  201 |       length = g_mapped_file_get_length (mapped);\n  202 |       data   = g_memdup2 (g_mapped_file_get_contents (mapped), length);","lines":3}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"file-farbfeld.c load_image(): the per-row read failure path (fread returns 0) calls g_set_error and 'return NULL' but does NOT fclose(fp), does NOT g_free(pixels), and does NOT g_object_unref(buffer). A truncated Farbfeld file leaks the file handle, the row buffer, and the GEGL buffer.","fix":"On the premature-EOF path, free pixels, unref buffer, and fclose(fp) before returning NULL (mirror the success-path cleanup).","locations":[{"ref":"plug-ins/common/file-farbfeld.c:325-330","code":"  325 |       if (! fread (pixels, row_size, 1, fp))\n  326 |         {\n  327 |           g_set_error (error, G_FILE_ERROR, g_file_error_from_errno (errno),\n  328 |                        _(\"Premature end of Farbfeld pixel data\"));\n  329 |           return NULL;\n  330 |         }","lines":6}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"GIF ReadJeffsImage ignores its return value: ReadImage calls 'ReadJeffsImage (fd, dest, c, len, height, alpha_frame, image, error)' at line 1468 but discards the boolean result and unconditionally proceeds to gegl_buffer_set with 'dest' at line 1479. On any ReadJeffsImage failure path (read error, alloc failure, inflate failure) the function frees its internal buffers and returns FALSE without fully populating 'dest', yet ReadImage still commits the partially/uninitialised 'dest' to the image. Combined with the fact that 'dest' here is from g_malloc (not zeroed), this reads uninitialised heap into the image.","fix":"Check the return value of ReadJeffsImage and bail out (free dest, delete image, set error, return FALSE) on failure. Alternatively zero-initialise dest with g_malloc0 so unwritten pixels are deterministic.","locations":[{"ref":"plug-ins/common/file-gif-load.c:1466-1469","code":" 1466 |   else\n 1467 |     {\n 1468 |       ReadJeffsImage (fd, dest, c, len, height, alpha_frame, image, error);\n 1469 |     }","lines":4},{"ref":"plug-ins/common/file-gif-load.c:1377-1380","code":" 1377 |   if (alpha_frame)\n 1378 |     dest = (guchar *) g_malloc ((gsize)len * (gsize)height * (promote_to_rgb ? 4 : 2));\n 1379 |   else\n 1380 |     dest = (guchar *) g_malloc ((gsize)len * (gsize)height);","lines":4},{"ref":"plug-ins/common/file-gif-load.c:1477-1482","code":" 1477 |   buffer = gimp_drawable_get_buffer (GIMP_DRAWABLE (layer));\n 1478 | \n 1479 |   gegl_buffer_set (buffer, GEGL_RECTANGLE (0, 0, len, height), 0,\n 1480 |                    NULL, dest, GEGL_AUTO_ROWSTRIDE);\n 1481 | \n 1482 |   g_free (dest);","lines":6}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"render_page_to_surface() never checks the result of cairo_image_surface_create(). For attacker-controlled width/height that are too large (or that overflow cairo's internal stride computation), cairo returns a surface in CAIRO_STATUS_INVALID_SIZE / NO_MEMORY state. The code proceeds to cairo_create() and poppler_page_render() on the invalid surface and returns it; downstream gimp_layer_new_from_surface / cairo_image_surface_get_data then operate on a 0x0 or error surface, yielding incorrect output or crashes rather than a clean failure.","fix":"After cairo_image_surface_create(), check cairo_surface_status(surface) == CAIRO_STATUS_SUCCESS; on failure destroy it and return NULL, and propagate the failure to load_image().","locations":[{"ref":"plug-ins/common/file-pdf-load.c:684-685","code":"  684 |   surface = cairo_image_surface_create (CAIRO_FORMAT_ARGB32, width, height);\n  685 |   cr = cairo_create (surface);","lines":2},{"ref":"plug-ins/common/file-pdf-load.c:705-717","code":"  705 |   poppler_page_render (page, cr);\n  706 |   cairo_restore (cr);\n  707 | \n  708 |   if (white_background)\n  709 |     {\n  710 |       cairo_set_operator (cr, CAIRO_OPERATOR_DEST_OVER);\n  711 |       cairo_set_source_rgb (cr, 1.0, 1.0, 1.0);\n  712 |       cairo_paint (cr);\n  713 |     }\n  714 | \n  715 |   cairo_destroy (cr);\n  716 | \n  717 |   return surface;","lines":13}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"PSP read_channel_data ignores fread return values in several decode paths, so on a truncated file uninitialized/garbage data is silently used and decode proceeds. PSP_COMP_NONE bytespp==1 (fread of height*line_width), the RLE path (fread of runcount, byte and the run buffer), and PSP_COMP_LZ77 (fread of compressed_len) all discard the fread result. The RLE loop reads runcount/byte before checking, and on short read keeps looping against stale buf contents.","fix":"Check every fread return against the requested count and return -1 / set GError on a short read, including the RLE runcount/byte reads and the LZ77 compressed_len read.","locations":[{"ref":"plug-ins/common/file-psp.c:1625","code":" 1625 |           fread (pixels[0], (gsize) height * line_width, 1, f);","lines":1},{"ref":"plug-ins/common/file-psp.c:1694-1702","code":" 1694 |             fread (&runcount, 1, 1, f);\n 1695 |             if (runcount > 128)\n 1696 |               {\n 1697 |                 runcount -= 128;\n 1698 |                 fread (&byte, 1, 1, f);\n 1699 |                 memset (buf, byte, runcount);\n 1700 |               }\n 1701 |             else\n 1702 |               fread (buf, runcount, 1, f);","lines":9},{"ref":"plug-ins/common/file-psp.c:1744-1745","code":" 1744 |       buf = g_malloc (compressed_len);\n 1745 |       fread (buf, compressed_len, 1, f);","lines":2},{"ref":"plug-ins/common/file-psp.c:2605","code":" 2605 |       fread (pixels, (gsize) width * height, 1, f);","lines":1}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"file-pvr.c load_image(): in the twiddle branch, on decode failure or dimension-exceeds paths the code does 'return image' (lines 438, 456) leaving 'data' allocated (g_free(data) only happens at line 466 on the normal path) -> memory leak of the header_file_size buffer on those error exits. Similarly the early 'return NULL' at line 410 after a short fread leaks nothing (data freed? no - data is leaked there too since g_free(data) is only at 466).","fix":"Free 'data' on every error exit of the twiddle branch (or use g_autofree).","locations":[{"ref":"plug-ins/common/file-pvr.c:403-410","code":"  403 |       if (data == NULL ||\n  404 |           fread (data, sizeof (guchar),\n  405 |                  header_file_size, fp) != header_file_size)\n  406 |         {\n  407 |           g_set_error (error, G_FILE_ERROR, g_file_error_from_errno (errno),\n  408 |                        _(\"Incomplete PVR header data.\"));\n  409 |           return NULL;\n  410 |         }","lines":8},{"ref":"plug-ins/common/file-pvr.c:438","code":"  438 |               return image;","lines":1},{"ref":"plug-ins/common/file-pvr.c:456","code":"  456 |             }","lines":1}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"raw_load_palette() opens the palette file with g_open() and tests 'if (! fd)'. g_open()/open() return -1 on failure, not 0; fd == 0 is a valid descriptor. So an open failure (fd == -1) is not detected and the code proceeds to lseek/read on fd -1. The subsequent read() return values are also ignored, so on a short palette file data->cmap is left partly uninitialized (then pushed to the image colormap).","fix":"Check 'if (fd < 0)' and bail out. Also check the return value of read() and zero/clamp cmap on short reads.","locations":[{"ref":"plug-ins/common/file-raw-data.c:1425-1449","code":" 1425 |       fd = g_open (g_file_peek_path (palette_file), O_RDONLY, 0);\n 1426 | \n 1427 |       if (! fd)\n 1428 |         return FALSE;\n 1429 | \n 1430 |       lseek (fd, palette_offset, SEEK_SET);\n 1431 | \n 1432 |       switch (palette_type)\n 1433 |         {\n 1434 |         case RAW_PALETTE_RGB:\n 1435 |           read (fd, data->cmap, 768);\n 1436 |           break;\n 1437 | \n 1438 |         case RAW_PALETTE_BGR:\n 1439 |           read (fd, temp, 1024);\n 1440 |           for (i = 0, j = 0; i < 256; i++)\n 1441 |             {\n 1442 |               data->cmap[j++] = temp[i * 4 + 2];\n 1443 |               data->cmap[j++] = temp[i * 4 + 1];\n 1444 |               data->cmap[j++] = temp[i * 4 + 0];\n 1445 |             }\n 1446 |           break;\n 1447 |         }\n 1448 | \n 1449 |       close (fd);","lines":25}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In load_rsvg_pixbuf() (librsvg >= 2.46 path) the return value of cairo_image_surface_create(CAIRO_FORMAT_ARGB32, width, height) is not checked, and the return value of rsvg_handle_render_document() is ignored (NULL passed for its GError). width/height derive from config/extracted SVG dimensions and can be large; if cairo fails to allocate the surface, cairo_image_surface_get_data() returns NULL and the subsequent un-premultiply loop (src[...] writes for width*height pixels) dereferences/overruns a NULL or undersized buffer. A failed render is also silently treated as success.","fix":"Check cairo_surface_status(surface) after creation and bail out with an error; pass and check a GError to rsvg_handle_render_document(); verify gdk_pixbuf_get_pixels() is non-NULL before the un-premultiply loop.","locations":[{"ref":"plug-ins/common/file-svg.c:970-1001","code":"  970 |   surface = cairo_image_surface_create (CAIRO_FORMAT_ARGB32, width, height);\n  971 |   cr      = cairo_create (surface);\n  972 | \n  973 |   viewport.width  = (double) aspect_width;\n  974 |   viewport.height = (double) aspect_height;\n  975 | \n  976 |   if (x_scale != 1.0 || y_scale != 1.0)\n  977 |     cairo_scale (cr, x_scale, y_scale);\n  978 | \n  979 |   rsvg_handle_render_document (handle, cr, &viewport, NULL);\n  980 |   pixbuf = gdk_pixbuf_new_from_data (cairo_image_surface_get_data (surface),\n  981 |                                      GDK_COLORSPACE_RGB, TRUE, 8, width, height,\n  982 |                                      cairo_format_stride_for_width (CAIRO_FORMAT_ARGB32, width),\n  983 |                                      (GdkPixbufDestroyNotify) svg_destroy_surface, surface);\n  984 |   cairo_destroy (cr);\n  985 | \n  986 |   /* un-premultiply the data */\n  987 |   src = gdk_pixbuf_get_pixels (pixbuf);\n  988 | \n  989 |   for (y = 0; y < height; y++)\n  990 |     {\n  991 |       guchar *s = src;\n  992 |       gint    w = width;\n  993 | \n  994 |       while (w--)\n  995 |         {\n  996 |           GIMP_CAIRO_ARGB32_GET_PIXEL (s, s[0], s[1], s[2], s[3]);\n  997 |           s += 4;\n  998 |         }\n  999 | \n 1000 |       src += gdk_pixbuf_get_rowstride (pixbuf);\n 1001 |     }","lines":32}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"TGA load: return value of fread is ignored in the non-RLE read path. read_line() does 'fread (buf, info->bytes, info->width, fp)' (line 944) without checking the count, so on a truncated file 'buf' keeps stale/uninitialised contents (buf is g_new, not zeroed) and those bytes are converted and written to the image. Likewise the colormap apply and upsample then operate on garbage. rle_read at least returns EOF, but that EOF is also ignored by the caller (line 940).","fix":"Check the fread return count against info->width and the rle_read return value; on short read, stop and either error out or zero-fill the remaining row, and propagate failure to ReadImage.","locations":[{"ref":"plug-ins/common/file-tga.c:938-945","code":"  938 |   if (info->imageCompression == TGA_COMP_RLE)\n  939 |     {\n  940 |       rle_read (fp, buf, info);\n  941 |     }\n  942 |   else\n  943 |     {\n  944 |       fread (buf, info->bytes, info->width, fp);\n  945 |     }","lines":8},{"ref":"plug-ins/common/file-tga.c:1118","code":" 1118 |   buf  = g_new (guchar, info->width * info->bytes);","lines":1}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"file-tim.c load_image(): the CLUT palette read 'fread(clut_data, clut_size*2, 1, fp)' and other freads check only '== 0' (the glibc convention of full-items-read), which is correct for count=1, but clut_size = num_colors*num_cluts is taken directly from the file with no upper bound before 'g_try_malloc0(clut_size*2)' / 'clut_size*4'. num_colors and num_cluts are gushort so clut_size <= ~4.29e9; clut_size*4 can overflow gsize on 32-bit. Also color_map indexing in the 8bpp promote path uses pixels[i] (0..255) into color_map of clut_size*4 bytes - safe only because promote requires clut_size>256, which holds.","fix":"Validate num_colors/num_cluts and clut_size against sane limits; use g_size_checked_mul for clut_size*2 and clut_size*4.","locations":[{"ref":"plug-ins/common/file-tim.c:486-494","code":"  486 |         gsize     clut_size      = (gsize) num_colors * num_cluts;\n  487 ","severity":"medium","easy":false,"description":"icns_attach_image() OSX/PNG path: after running the sub-decoder, return_vals is assumed to contain a valid image with at least one layer. 'layers = gimp_image_get_layers(temp_image); new_layer = gimp_layer_new_from_drawable(GIMP_DRAWABLE(layers[0]), image)' dereferences layers[0] without checking layers != NULL or that the array is non-empty. A PNG/JP2 payload that decodes to an image with no layers (or a failed decode that still returns vals) causes a NULL/garbage dereference.","fix":"Check 'temp_image' is non-NULL and 'layers && layers[0]' before dereferencing; bail out gracefully otherwise.","locations":[{"ref":"plug-ins/file-icns/file-icns-load.c:553-560","code":"  553 |       if (return_vals)\n  554 |         {\n  555 |           temp_image = g_value_get_object (gimp_value_array_index (return_vals, 1));\n  556 | \n  557 |           layers = gimp_image_get_layers (temp_image);\n  558 |           new_layer = gimp_layer_new_from_drawable (GIMP_DRAWABLE (layers[0]), image);\n  559 |           gimp_item_set_name (GIMP_ITEM (new_layer), layer_name);\n  560 |           gimp_image_insert_layer (image, new_layer, NULL, 0);","lines":8}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"ani_load_image() performs almost all fread() calls without checking the return value (RIFF/anih/LIST/icon chunk sizes at lines 865,869-870,884,963, and others). The AniFileHeader 'header' is only populated if an 'anih' chunk is encountered, yet header.frames (line 1001) and header.jif_rate (line 1010) are read unconditionally afterwards - using stack garbage if no anih chunk was present. Additionally a chunk size read into 'size' is passed straight to fseek(fp, size, SEEK_CUR) with no validation.","fix":"Check every fread() count, zero-initialize 'header' and track whether an anih chunk was seen before using header fields, and validate chunk sizes before ly emit g_message and DO NOT return. Execution falls through to fwrite(..., fp) and fclose(fp) with fp == NULL, which is a NULL-pointer dereference / crash. Reachable when the temp file cannot be created.","fix":"After the '! fp' g_message, return (and free temp_file/unref) instead of falling through to fwrite/fclose on a NULL FILE pointer.","locations":[{"ref":"plug-ins/file-tiff/file-tiff-load.c:2763-2774","code":" 2763 |       fp = g_fopen (g_file_peek_path (temp_file), \"wb\");\n 2764 | \n 2765 |       if (! fp)\n 2766 |         {\n 2767 |           g_message (_(\"Error trying to open temporary %s file '%s' \"\n 2768 |                        \"for tiff metadata loading: %s\"),\n 2769 |                      \"tmp\", gimp_file_get_utf8_name (temp_file),\n 2770 |                      g_strerror (errno));\n 2771 |         }\n 2772 | \n 2773 |       fwrite (photoshop_data, sizeof (guchar), photoshop_len, fp);\n 2774 |       fclose (fp);","lines":12},{"ref":"plug-ins/file-tiff/file-tiff-load.c:2815-2826","code":" 2815 |       fp = g_fopen (g_file_peek_path (temp_file), \"wb\");\n 2816 | \n 2817 |       if (! fp)\n 2818 |         {\n 2819 |           g_message (_(\"Error trying to open temporary %s file '%s' \"\n 2820 |                        \"for tiff metadata loading: %s\"),\n 2821 |                      \"tmp\", gimp_file_get_utf8_name (temp_file),\n 2822 |                      g_strerror (errno));\n 2823 |         }\n 2824 | \n 2825 |       fwrite (photoshop_data, sizeof (guchar), photoshop_len, fp);\n 2826 |       fclose (fp);","lines":12}]},{"id":"ERR_29","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"Uninitialized variables used after unchecked sscanf when populating a calendar from a metadata date string. year/month/day are declared without initialization and the sscanf return value is ignored; if the date string from metadata (e.g. Xmp.photoshop.DateCreated / Xmp.DICOM.* dates) does no ng loop and Gauss-Seidel loop do nothing, so no crash, but it is wasted work; more importantly the convergence test `err < EPSILON*EPSILON*w*w` with nmask==0 yields err==0 and breaks immediately - benign. The real concern is only the allocation cost. Documented as low-risk.","fix":"Early-return from gimp_heal_laplace_loop when nmask would be 0 (or detect empty mask before calling), avoiding the large Adiag/Aidx allocations entirely.","locations":[{"ref":"app/paint/gimpheal.c:382-410","code":"  382 |   nmask = 0;\n  383 |   for (parity = 0; parity < 2; parity++)\n  384 |     for (i = 0; i < height; i++)\n  385 |       for (j = (i&1)^parity; j < width; j+=2)\n  386 |         if (mask[j + i * width])\n  387 |           {\n  388 | #define A_NEIGHBOR(o,di,dj) \\\n  389 |             if ((dj<0 && j==0) || (dj>0 && j==width-1) || (di<0 && i==0) || (di>0 && i==height-1)) \\\n  390 |               Aidx[o + nmask * 5] = zero; \\\n  391 |             else                                               \\\n  392 |               Aidx[o + nmask * 5] = ((i + di) * width + (j + dj)) * depth;\n  393 | \n  394 |             /* Omit Dirichlet conditions for any neighbors off the\n  395 |              * edge of the canvas.\n  396 |              */\n  397 |             Adiag[nmask] = 4 - (i==0) - (j==0) - (i==height-1) - (j==width-1);\n  398 |             A_NEIGHBOR (0,  0,  0);\n  399 |             A_NEIGHBOR (1,  0,  1);\n  400 |             A_NEIGHBOR (2,  1,  0);\n  401 |             A_NEIGHBOR (3,  0, -1);\n  402 |             A_NEIGHBOR (4, -1,  0);\n  403 |             nmask++;\n  404 |           }\n  405 | \n  406 |   /* Empirically optimal over-relaxation factor. (Benchmarked on\n  407 |    * round brushes, at least. I don't know whether aspect ratio\n  408 |    * affects it.)\n  409 |    */\n  410 |   w = 2.0 - 1.0 / (0.1575 * sqrt (nmask) + 0.8);","lines":29}]},{"id":"ERR_42","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"svg_parser_text() pops the current handler and, for a <title> element, also pops 'prior_handler' (g_queue_pop_head). If the stack does not contain a second element (malformed/oddly-nested document where <title> appears at an unexpected depth), prior_handler is NULL. The code guards the body with 'if (prior_handler && prior_handler->paths)', but then unconditionally pushes prior_handler back with g_queue_push_head (parser->stack, prior_handler), pushing a NULL onto the stack. A subsequent svg_parser_end_element() pops that NULL and the g_return_if_fail at line 547 dereferences handler->name only after the NULL check, so it is caught - but pushing NULL is fragile and depends on that downstream guard.","fix":"Only pop/push prior_handler when it is non-NULL; do not push a NULL handler back onto the parser stack.","locations":[{"ref":"app/path/gimppath-import.c:500-531","code":"  500 |   handler = g_queue_pop_head (parser->stack);\n  501 | \n  502 |   if (handler       &&\n  503 |       handler->name &&\n  504 |       strcmp (handler->name, \"title\") == 0)\n  505 |     {\n  506 |       gchar      *title = g_uri_unescape_string (text, NULL);\n  507 |       SvgHandler *prior_handler;\n  508 |       GList      *paths;\n  509 | \n  510 |       prior_handler = g_queue_pop_head (parser->stack);\n  511 | \n  512 |       /* Replace path ID with title name if imported */\n  513 |       if (prior_handler && prior_handler->paths)\n  514 |         {\n  515 |           for (paths = prior_handler->paths; paths; paths = paths->next)\n  516 |             {\n  517 |               SvgPath *svg_path = paths->data;\n  518 | \n  519 |               if (svg_path->id)\n  520 |                 g_free (svg_path->id);\n  521 | \n  522 |               svg_path->id = g_strdup (title);\n  523 |             }\n  524 |           g_list_free (paths);\n  525 |         }\n  526 | \n  527 |       g_queue_push_head (parser->stack, prior_handler);\n  528 |       g_free (title);\n  529 | L before hb_blob_create_from_file(); on failure leave font->hash NULL (or handle explicitly) instead of hashing an empty blob.","locations":[{"ref":"app/text/gimpfont.c:1391-1395","code":" 1391 |       FcPatternGetString (pango_fc_font_get_pattern (pango_font), FC_FILE, 0, (FcChar8 **) &file);\n 1392 | \n 1393 |       hb_blob  = hb_blob_create_from_file (file);\n 1394 |       hb_data  = hb_blob_get_data (hb_blob, &length);\n 1395 |       g_checksum_update (checksum, (const guchar*) hb_data, length);","lines":5}]},{"id":"ERR_45","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gimp_text_layout_new() can return NULL (g_return_val_if_fail on font_desc == NULL at line 132, reachable if the resolved font's lookup_name yields no description). gimp_text_layer_render() does not null-check 'layout': gimp_text_layout_get_size(NULL) is tolerated via g_return_val_if_fail, but g_object_unref(layout) at line 877 on a NULL layout emits a GLib-CRITICAL. Same pattern (no NULL check after _new) in gimp_text_layer_get_layout().","fix":"After gimp_text_layout_new(), if layout == NULL, thaw notify and return FALSE (render) / return NULL (get_layout) before using or unref-ing it.","locations":[{"ref":"app/text/gimptextlayer.c:823-877","code":"  823 |   layout = gimp_text_layout_new (layer->text, image, xres, yres, &error);\n  824 |   if (error)\n  825 |     {\n  826 |       gimp_message_literal (image->gimp, NULL, GIMP_MESSAGE_ERROR, error->message);\n  827 |       g_error_free (error);\n  828 |     }\n  829 | \n  830 |   g_object_freeze_notify (G_OBJECT (drawable));\n  831 | \n  832 |   if (gimp_text_layout_get_size (layout, &width, &height) &&\n  833 |       (width  != gimp_item_get_width  (item) ||\n  834 |        height != gimp_item_get_height (item) ||\n  835 |        gimp_text_layer_get_format (layer) !=\n  836 |        gimp_drawable_get_format (drawable)))\n  837 |     {\n  838 |       GeglBuffer *new_buffer;\n tes were read. It then calls g_str_has_prefix/strcmp/atoi on id, which for a file shorter than 14 bytes operates on uninitialized stack bytes and may not be NUL-terminated within the array (strcmp(id+9,\"file\") and g_str_has_prefix scan past). id is not guaranteed NUL-terminated even on success since exactly 14 bytes are read into a 14-byte buffer.","fix":"Check that xcf_read_int8 returned 14; ensure id is NUL-terminated (use a 15-byte buffer or explicitly set id[13] handling) before string operations.","locations":[{"ref":"app/xcf/xcf-load.c:280-318","code":"  280 |   gchar id[14];\n  281 | \n  282 |   g_return_val_if_fail (GIMP_IS_GIMP (gimp), FALSE);\n  283 |   g_return_val_if_fail (G_IS_INPUT_STREAM (input), FALSE);\n  284 |   g_return_val_if_fail (input_file == NULL || G_IS_FILE (input_file), FALSE);\n  285 |   g_return_val_if_fail (progress == NULL || GIMP_IS_PROGRESS (progress), FALSE);\n  286 | \n  287 |   info->gimp             = gimp;\n  288 |   info->input            = input;\n  289 |   info->seekable         = G_SEEKABLE (input);\n  290 |   info->bytes_per_offset = 4;\n  291 |   info->progress         = progress;\n  292 |   info->file             = input_file;\n  293 |   info->compression      = COMPRESS_NONE;\n  294 | \n  295 |   xcf_read_int8 (info, (guint8 *) id, 14);\n  296 | \n  297 |   if (! g_str_has_prefix (id, \"gimp xcf \"))\n  298 |     {\n  299 |       return FALSE;\n  300 |     }\n  301 |   else if (strcmp (id + 9, \"file\") == 0)\n  302 |     {\n  303 |       info->file_version = 0;\n  304 |     }\n  305 |   else if (id[9]  == 'v' &&\n  306 |            id[13] == '\\0')\n  307 |     {\n  308 |       info->file_version = atoi (id + 10);\n  309 |     }\n  310 |   else\n  311 |     {\n  312 |       return FALSE;\n  313 |     }\n  314 | \n  315 |   if (info->file_version >= 11)\n  316 |     info->bytes_per_offset = 8;\n  317 | \n  318 |   return TRUE;","lines":39}]},{"id":"ERR_47","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"xcf_load_image header parsing for precision: for file_version >= 7 the precision is taken verbatim ('*precision = p') from the file and only later checked via gimp_babl_is_valid. p is read with xcf_read_int32 into a gint without checking the read succeeded; an out-of-range/uninitialized value flows into precision and is used to build babl formats. gimp_babl_is_valid is the only guard. If it does not fully validate arbitrary integer precision enum values, a bogus precision could be used to compute bpp/formats.","fix":"Validate that p is a known GimpPrecision enum value before assigning, in addition to gimp_babl_is_valid; check the read return.","locations":[{"ref":"app/xcf/xcf-load.c:366-447","code":"  366 |   if (info->file_version >= 4)\n  367 |     {\n  368 |       gint p;\n  369 | \n  370 |       xcf_read_int32 (info, (guint32 *) &p, 1);\n  371 | \n  372 |       if (info->file_version == 4)\n  373 |         {\n  374 |           switch (p)\n  375 |             {\n  376 |             case 0:\n  377 |               *precision = GIMP_PRECISION_U8_NON_LINEAR;\n  378 |               break;\n  379 |             case 1:\n  380 |               *precision = GIMP_PRECISION_U16_NON_LINEAR;\n  381 |               break;\n  382 |             case 2:\n  383 |               *precision = GIMP_PRECISION_U32_LINEAR;\n  384 |               break;\n  385 |             case 3:\n  386 |               *precision = GIMP_PRECISION_HALF_LINEAR;\n  387 |               break;\n  388 |             case 4:\n  389 |               *precision = GIMP_PRECISION_FLOAT_LINEAR;\n  390 |               break;\n  391 |             default:\n  392 |               if (error)\n  393 |                 g_set_error (error, G_FILE_ERROR, G_FILE_ERROR_FAILED,\n  394 |                              /* TODO: localize after freeze ends. */\n  395 |                              \"Invalid image precision value %d for XCF version %d.\",\n  396 |        }\n  444 |       else\n  445 |         {\n  446 |           *precision = p;\n  447 |         }","lines":82}]},{"id":"ERR_48","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"_gimp_shm_close() guards the POSIX munmap path with '(_shm_addr != MAP_FAILED)', but _shm_addr is initialized to NULL (gimp-shm.c:73) and the SysV branch tests against NULL. The MAP_FAILED sentinel is inconsistent with the initializer and the other branch; it is only harmless today because the open path g_error()-aborts on mmap failure rather than leaving MAP_FAILED. Latent correctness defect if that error handling is ever softened.","fix":"Test '_shm_addr != NULL' for consistency and set _shm_addr = NULL after munmap.","locations":[{"ref":"libgimp/gimp-shm.c:73","code":"   73 | static guchar *_shm_addr = NULL;","lines":1},{"ref":"libgimp/gimp-shm.c:192-195","code":"  192 | #elif defined(USE_POSIX_SHM)\n  193 | \n  194 |   if ((_shm_ID != -1) && (_shm_addr != MAP_FAILED))\n  195 |     munmap (_shm_addr, TILE_MAP_SIZE);","lines":4}]},{"id":"ERR_49","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"_gimp_shm_open() calls g_error() (which aborts the process) on every failure path. The shm id ultimately derives from the wire (config->shm_id via _gimp_config). A host that supplies a valid-looking but unattachable shm id forces the plug-in to abort, where a graceful fallback to wire tile transfer (leaving _shm_addr NULL) would be safer.","fix":"Replace fatal g_error() with g_warning() and leave _shm_addr = NULL so callers fall back to non-shm transfer.","locations":[{"ref":"libgimp/gimp-shm.c:97-99","code":"   97 |           g_error (\"shmat() failed: %s\\n\" ERRMSG_SHM_FAILED,\n   98 |                    g_strerror (errno));\n   99 |         }","lines":3},{"ref":"libgimp/gimp-shm.c:113","code":"  113 |         g_error (\"Cannot convert to UTF16\");","lines"
