`create-artifacts.py` picks the build directory from the *oldest* `ctest_output.c` (ascending mtime sort + index `[0]`), but the comment says it wants the 'most recently touched' file. The intended most-recent file is at `[-1]`.","fix":"Use `marker_files[-1]` (or sort with `reverse=True`).","locations":[{"ref":"ci/create-artifacts.py:19-23","code":"   19 |     # Find the most recently touched file named \"ctest_output.c\" in the target\n   20 |     # directory. This will be libc-tests's `OUT_DIR`\n   21 |     marker_files = [Path(p) for p in glob(\"target/**/ctest_output.c\", recursive=True)]\n   22 |     marker_files.sort(key=lambda path: path.stat().st_mtime)\n   23 |     build_dir = marker_files[0].parent","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/create-artifacts.py#L19-L23"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"`--skip-semver` is declared without `action=\"store_true\"`, so argparse treats it as taking a value. `cfg.skip_semver = args.skip_semver` is therefore `None` (falsy) unless a value is supplied, meaning the documented flag-style usage `--skip-semver` would actually consume the following argument, and passing it alone at the end raises an error. It also can never be set true the way a flag is expected to work.","fix":"Declare it as `p.add_argument(\"--skip-semver\", action=\"store_true\", help=...)`.","locations":[{"ref":"ci/verify-build.py:438","code":"  438 |     p.add_argument(\"--skip-semver\", help=\"don't run semver checks\")","lines":1,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/verify-build.py#L438"},{"ref":"ci/verify-build.py:454","code":"  454 |         skip_semver=args.skip_semver,","lines":1,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/verify-build.py#L454"},{"ref":"ci/verify-build.py:422-426","code":"  422 |     if cfg.skip_semver:\n  423 |         eprint(\"Skipping semver checks\")\n  424 |         semver_ok = True\n  425 |     else:\n  426 |         semver_ok = do_semver_checks(cfg, target)","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/verify-build.py#L422-L426"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"visit_item_foreign_mod derives the ABI by lowercasing the abi string via Abi::from, but an extern block with an explicit unrecognized ABI (e.g. extern \"system\") is mapped to Abi::Other while a bare `extern { }` defaults to Abi::C. Since the abi field is #[expect(unused)] and never consulted during generation, all extern fns/statics are treated identically regardless of ABI - so a non-C-ABI extern block would still be tested as if it were C. Currently latent because abi is unused, but it means the collected ABI is misleading.","fix":"Either consume abi during generation (skip/flag non-C ABIs) or remove the abi field; do not collect data that is then ignored.","locations":[{"ref":"ctest/src/ffi_items.rs:235-255","code":"  235 |     fn visit_item_foreign_mod(&mut self, i: &'ast syn::ItemForeignMod) {\n  236 |         // Because we need to store the ABI we can't directly visit the foreign\n  237 |         // functions/statics.\n  238 | \n  239 |         // Since this is an extern block, assume extern \"C\" by default.\n  240 |         let abi = i\n  241 |             .abi\n  242 |             .name\n  243 |             .clone()\n  244 |             .map_or(Abi::C, |s| Abi::from(s.value().as_str()));\n  245 | \n  246 |         for item in &i.items {\n  247 |             match item {\n  248 |                 syn::ForeignItem::Fn(function) => visit_foreign_item_fn(self, function, &abi),\n  249 |                 syn::ForeignItem::Static(static_variable) => {\n  250 |                     visit_foreign_item_static(self, static_variable, &abi)\n  251 |                 }\n  252 |                 _ => (),\n  253 |             }\n  254 |         }\n  255 |     }","lines":21,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/ffi_items.rs#L235-L255"},{"ref":"ctest/src/ast/function.rs:12-14","code":"   12 |     pub(crate) public: bool,\n   13 |     #[expect(unused)]\n   14 |     pub(crate) abi: Abi,","lines":3,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/ast/function.rs#L12-L14"},{"ref":"ctest/src/ast/static_variable.rs:13-14","code":"   13 |     #[expect(unused)]\n   14 |     pub(crate) abi: Abi,","lines":2,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/ast/static_variable.rs#L13-L14"}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Skipping of C-enum constants matches the predicate against the constant's full *type* token stream (`constant.ty.to_token_stream().to_string()`), passed as `MapInput::CEnumType`. The alias C-enum skip just above (line 630-635) matches against the alias *ident*. So whether a constant is recognized as belonging to a skipped C enum depends on the textual rendering of its type (spacing/path qualification of the token stream), which is fragile and inconsistent with the ident-based matching used for the alias itself. A constant whose type prints with a path prefix or differing whitespace silently fails to be skipped.","fix":"Match the constant against the resolved type-alias name consistently with how aliases are matched (use the canonical ident), rather than the raw token-stream string of the type.","locations":[{"ref":"ctest/src/template.rs:643-658","code":"  643 |         let skipped = self\n  644 |             .filtered_ffi_items\n  645 |             .constants\n  646 |             .extract_if(.., |constant| {\n  647 |                 self.generator.skips.iter().any(|f| {\n  648 |                     f(&MapInput::CEnumType(\n  649 |                         &constant.ty.to_token_stream().to_string(),\n  650 |                     ))\n  651 |                 })\n  652 |             });\n  653 | \n  654 |         for item in skipped {\n  655 |             if verbose {\n  656 |                 eprintln!(\"Skipping C enum constant {}\", item.ident());\n  657 |             }\n  658 |         }","lines":16,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/template.rs#L643-L658"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"translate_path() treats ANY path with angle-bracketed type arguments as if it were Option<T>: it unwraps the first generic type arg and, if it is a reference or bare fn, returns the translation of that inner type (dropping the wrapper), otherwise reports NotFfiCompatible. The ident is never checked to actually be `Option`. The comment on line 229 says \"Option<T> is ONLY ffi-safe...\", but e.g. NonNull<&T>, ManuallyDrop<fn()>, or any other generic wrapper would be silently unwrapped as though it were Option, or wrongly rejected. The code and comment disagree about scope.","fix":"Guard the branch on `last.ident == \"Option\"` before unwrapping the generic argument; for other generic types decide explicitly (reject as unsupported) rather than assuming Option semantics.","locations":[{"ref":"ctest/src/translator.rs:226-242","code":"  226 |         if let syn::PathArguments::AngleBracketed(args) = &last.arguments\n  227 |             && let syn::GenericArgument::Type(inner_ty) = args.args.first().unwrap()\n  228 |         {\n  229 |             // Option<T> is ONLY ffi-safe if it contains a function pointer, or a reference.\n  230 |             match inner_ty {\n  231 |                 syn::Type::Reference(_) | syn::Type::BareFn(_) => {\n  232 |                     return self.translate_type(inner_ty);\n  233 |                 }\n  234 |                 _ => {\n  235 |                     return Err(TranslationError::new(\n  236 |                         TranslationErrorKind::NotFfiCompatible,\n  237 |                         &path.to_token_stream().to_string(),\n  238 |                         inner_ty.span(),\n  239 |                     ));\n  240 |                 }\n  241 |             }\n  242 |         }","lines":17,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/translator.rs#L226-L242"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Mixed boolean operator precedence in is_signed(): the expression uses bitwise `|` between `s.starts_with(\"uint\")` and `s.starts_with(\"signed \")` while the surrounding operators are `||`. Because `|` binds tighter than `||`, this parses as `int || (uint | signed) || unsigned`. Beyond the correctness problem of treating uint/unsigned as signed, the bitwise `|` defeats short-circuit evaluation and is a clear copy/typo of the intended `||`.","fix":"Replace the `|` on line 284 with `||` so all the alternatives are logical-or, and re-verify the type classification per the previous finding.","locations":[{"ref":"ctest/src/translator.rs:283-286","code":"  283 |                         s.starts_with(\"int\")\n  284 |                             || s.starts_with(\"uint\") | s.starts_with(\"signed \")\n  285 |                             || s.starts_with(\"unsigned \")\n  286 |                     }","lines":4,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/translator.rs#L283-L286"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"translate_primitive_type() produces stray/duplicate spaces for the `c_long`-family aliases. `&ty[2..].replace(\"long\", \" long\")` turns \"long\" into \" long\" (leading space), so c_long -> \" long\", c_longlong -> \" long long\". For the unsigned/signed variants the `&s[1..]` slice keeps that leading space, so c_ulong -> \"unsigned  long\" and c_ulonglong -> \"unsigned  long long\" (double space). These spellings are then stored as the C type name and emitted into declarations. C compilers tolerate the extra whitespace, but the generated C is malformed-looking and inconsistent.","fix":"Normalize spacing, e.g. build the base as `ty[2..].replacen(\"long\", \"long\", 0)` is not it; instead detect the long-count and format explicitly, or trim/collapse spaces: `format!(\"unsigned {}\", &s[1..].trim_start())` and avoid prefixing a space when replacing \"long\".","locations":[{"ref":"ctest/src/translator.rs:331-339","code":"  331 |         ty if ty.starts_with(\"c_\") => {\n  332 |             let ty = &ty[2..].replace(\"long\", \" long\");\n  333 |             match ty.as_str() {\n  334 |                 \"short\" => \"short\".to_string(),\n  335 |                 s if s.starts_with('u') => format!(\"unsigned {}\", &s[1..]),\n  336 |                 s if s.starts_with('s') => format!(\"signed {}\", &s[1..]),\n  337 |                 s => s.to_string(),\n  338 |             }\n  339 |         }","lines":9,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/translator.rs#L331-L339"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The positive-#[cfg] detection for s! macros uses `meta_str.starts_with(\"not\")`, `starts_with(\"any\")`, `starts_with(\"all\")` and `starts_with(\"target_endian\")` on the stringified cfg tokens. These are prefix matches against bare identifiers, so a config predicate whose name merely begins with one of those words (e.g. `#[cfg(notarget)]`, `#[cfg(allow_foo)]`, `#[cfg(anything)]`) would be silently accepted as if it were a `not(...)`/`all(...)`/`any(...)` combinator, producing a false negative in the linter. Real cfg names like these are unlikely in libc today, but the check should match the combinator token, not a string prefix.","fix":"Parse the cfg meta with syn (Meta::List with path ident `not`/`any`/`all`) instead of doing `starts_with` on `tokens.to_string()`, or at minimum require the prefix to be followed by `(` / ` (`.","locations":[{"ref":"libc-test/tests/style_lib/mod.rs:272-284","code":"  272 |                 if !meta_str.starts_with(\"not\")\n  273 |                     && !meta_str.starts_with(\"any\")\n  274 |                     && !meta_str.starts_with(\"all\")\n  275 |                     && !meta_str.starts_with(\"target_endian\")\n  276 |                     && !ALLOWED_POSITIVE_S_CFGS.contains(&meta_str.as_str())\n  277 |                 {\n  278 |                     self.error(\n  279 |                         \"positive #[cfg] for s! macro\".to_string(),\n  280 |                         span,\n  281 |                         String::new(),\n  282 |                         (None, \"move it to the relevant file\".to_string()),\n  283 |                     );\n  284 |                 }","lines":13,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/libc-test/tests/style_lib/mod.rs#L272-L284"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"The duplicate-#[cfg] and positive-#[cfg] checks for s! macros only fire for the literal macro named `s` (`item_macro.mac.path.is_ident(\"s\")` in visit_item_macro). The other repeated macros `s_no_extra_traits` and `s_paren` are listed in ALLOWED_REPEATED_MACROS and treated as struct-state, but they are never passed to `handle_s_macro_with_attrs`. As a result a duplicated or standalone-positive `#[cfg]` on an `s_no_extra_traits!`/`s_paren!` block is not flagged, even though the same style rule logically applies.","fix":"Gate handle_s_macro_with_attrs on membership in ALLOWED_REPEATED_MACROS (the same set used in visit_macro) rather than only `is_ident(\"s\")`, if the cfg rules are meant to apply to all s-family macros.","locations":[{"ref":"libc-test/tests/style_lib/mod.rs:349-357","code":"  349 |     fn visit_item_macro(&mut self, item_macro: &'ast syn::ItemMacro) {\n  350 |         if item_macro.mac.path.is_ident(\"s\") {\n  351 |             if !item_macro.attrs.is_empty() {\n  352 |                 self.handle_s_macro_with_attrs(item_macro);\n  353 |             }\n  354 |         }\n  355 | \n  356 |         visit::visit_item_macro(self, item_macro);\n  357 |     }","lines":9,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/libc-test/tests/style_lib/mod.rs#L349-L357"},{"ref":"libc-test/tests/style_lib/mod.rs:248-287","code":"  248 |     fn handle_s_macro_with_attrs(&mut self, item_macro: &syn::ItemMacro) {\n  249 |         for attr in &item_macro.attrs {\n  250 |             let Ok(meta_list) = attr.meta.require_list() else {\n  251 |                 continue;\n  252 |             };\n  253 | \n  254 |             if meta_list.path.is_ident(\"cfg\") {\n  255 |                 let span = meta_list.span();\n  256 |                 let meta_str = meta_list.tokens.to_string();\n  257 | \n  258 |                 match self.seen_s_macro_cfgs.get(&meta_str) {\n  259 |                     Some(seen_span) => {\n  260 |                         self.error(\n  261 |                             \"duplicate #[cfg] for s! macro\".to_string(),\n  262 |                             span,\n  263 |                             \"duplicated #[cfg]\".to_string(),\n  264 |                             (Some(*seen_span), \"combine the two\".to_string()),\n  265 |                         );\n  266 |                     }\n  267 |                     None => {\n  268 |                         self.seen_s_macro_cfgs.insert(meta_str.clone(), span);\n  269 |                     }\n  270 |                 }\n  271 | \n  272 |                 if !meta_str.starts_with(\"not\")\n  273 |                     && !meta_str.starts_with(\"any\")\n  274 |                     && !meta_str.starts_with(\"all\")\n  275 |                     && !meta_str.starts_with(\"target_endian\")\n  276 |                     && !ALLOWED_POSITIVE_S_CFGS.contains(&meta_str.as_str())\n  277 |                 {\n  278 |                     self.error(\n  279 |                         \"positive #[cfg] for s! macro\".to_string(),\n  280 |                         span,\n  281 |                         String::new(),\n  282 |                         (None, \"move it to the relevant file\".to_string()),\n  283 |                     );\n  284 |                 }\n  285 |             }\n  286 |         }\n  287 |     }","lines":40,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/libc-test/tests/style_lib/mod.rs#L248-L287"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Solaris CMSG_NXTHDR aligns the wrong subexpression in its bounds check. The illumos C macro computes the end-of-cmsg as `_CMSG_HDR_ALIGN((char*)c + cmsg_len) + sizeof(struct cmsghdr)` (align applied to `c + cmsg_len` only, then sizeof added unaligned). This code instead computes `_CMSG_HDR_ALIGN(c + cmsg_len + sizeof(cmsghdr))`, folding sizeof inside the alignment. On non-sparc targets _CMSG_HDR_ALIGNMENT is 4 and sizeof(cmsghdr)==12 (a multiple of 4) so the two agree, but on sparc64 the alignment is 8: `align(base)+12` vs `align(base+12)==align(base)+16` differ by 4 bytes, making the bounds check over-conservative and able to return NULL for a still-valid final cmsg. The returned pointer in the else-branch is computed correctly; only the boundary test diverges.","fix":"Compute the check value as `_CMSG_HDR_ALIGN(cmsg as usize + (*cmsg).cmsg_len as usize) + size_of::<cmsghdr>()` so the alignment is applied before adding sizeof(cmsghdr), matching the illumos macro.","locations":[{"ref":"src/unix/solarish/mod.rs:2230-2242","code":" 2230 |     pub fn CMSG_NXTHDR(mhdr: *const crate::msghdr, cmsg: *const cmsghdr) -> *mut cmsghdr {\n 2231 |         if cmsg.is_null() {\n 2232 |             return crate::CMSG_FIRSTHDR(mhdr);\n 2233 |         }\n 2234 |         let next =\n 2235 |             _CMSG_HDR_ALIGN(cmsg as usize + (*cmsg).cmsg_len as usize + size_of::<cmsghdr>());\n 2236 |         let max = (*mhdr).msg_control as usize + (*mhdr).msg_controllen as usize;\n 2237 |         if next > max {\n 2238 |             ptr::null_mut()\n 2239 |         } else {\n 2240 |             _CMSG_HDR_ALIGN(cmsg as usize + (*cmsg).cmsg_len as usize) as *mut cmsghdr\n 2241 |         }\n 2242 |     }","lines":13,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/solarish/mod.rs#L2230-L2242"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"high","easy":true,"description":"musl SUN_LEN computes `2 * strlen(sun_path)` but the macro must return the offset of sun_path plus the path length. musl's sockaddr_un is `sa_family_t sun_family` (2 bytes) immediately followed by `sun_path`, so offsetof(sun_path) == 2 and the correct value is `2 + strlen(sun_path)` (matching musl's own `#define SUN_LEN(s) (2+strlen((s)->sun_path))`). The `*` is a typo for `+`: an empty path yields 0 instead of 2, and any path yields double its true length, producing a wrong sockaddr length passed to bind/connect on musl targets. The gnu sibling directly above uses the correct `offset_of!(sockaddr_un, sun_path) + strlen(...)`.","fix":"Change the musl SUN_LEN body to `2 + crate::strlen(s.sun_path.as_ptr())` (offsetof(sun_path) is 2 since sun_family is a 2-byte sa_family_t).","locations":[{"ref":"src/unix/linux_like/linux/mod.rs:3680-3683","code":" 3680 |     #[cfg(target_env = \"musl\")]\n 3681 |     pub fn SUN_LEN(s: crate::sockaddr_un) -> usize {\n 3682 |         2 * crate::strlen(s.sun_path.as_ptr())\n 3683 |     }","lines":4,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/linux_like/linux/mod.rs#L3680-L3683"},{"ref":"src/unix/linux_like/linux/mod.rs:3675-3678","code":" 3675 |     #[cfg(target_env = \"gnu\")]\n 3676 |     pub fn SUN_LEN(s: crate::sockaddr_un) -> usize {\n 3677 |         offset_of!(crate::sockaddr_un, sun_path) + crate::strlen(s.sun_path.as_ptr())\n 3678 |     }","lines":4,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/linux_like/linux/mod.rs#L3675-L3678"},{"ref":"src/unix/linux_like/mod.rs:209-212","code":"  209 |     pub struct sockaddr_un {\n  210 |         pub sun_family: sa_family_t,\n  211 |         pub sun_path: [c_char; 108],\n  212 |     }","lines":4,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/linux_like/mod.rs#L209-L212"}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"After running the test binary via `adb shell`, the code asserts `status.success()` instead of `output.status.success()`. `status` is the exit status of the earlier `adb push` command (already asserted on line 29), so the assertion here is meaningless/always-true copy-paste and never validates that the `adb shell` invocation itself succeeded. The test-result heuristic below is the only thing checked.","fix":"Change the assertion to `assert!(output.status.success());`.","locations":[{"ref":"ci/runtest-android.rs:31-37","code":"   31 |     let output = Command::new(\"adb\")\n   32 |         .arg(\"shell\")\n   33 |         .arg(\"RUST_BACKTRACE=1\")\n   34 |         .arg(&dst)\n   35 |         .output()\n   36 |         .expect(\"failed to run: adb shell\");\n   37 |     assert!(status.success());","lines":7,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/runtest-android.rs#L31-L37"}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The single test in errqueue.rs (which exercises libc::SO_EE_OFFENDER vs the C macro) is named `test_cmsg_data`, a copy-paste leftover from cmsg.rs. It has nothing to do with CMSG data; the misleading name makes test output and failure triage confusing.","fix":"Rename the test to `test_so_ee_offender`.","locations":[{"ref":"libc-test/tests/errqueue.rs:15-23","code":"   15 |     #[test]\n   16 |     fn test_cmsg_data() {\n   17 |         for l in 0..128 {\n   18 |             let ee = l as *const sock_extended_err;\n   19 |             unsafe {\n   20 |                 assert_eq!(libc::SO_EE_OFFENDER(ee), so_ee_offender(ee));\n   21 |             }\n   22 |         }\n   23 |     }","lines":9,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/libc-test/tests/errqueue.rs#L15-L23"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"The shellcheck-presence check catches only `sp.CalledProcessError`, but when shellcheck is not installed `subprocess` raises `FileNotFoundError`, which is not caught. The intended graceful 'ERROR: shellcheck not found' message and clean exit(1) never fire; instead the script dies with an unhandled traceback.","fix":"Catch `(sp.CalledProcessError, FileNotFoundError)` (or `OSError`) in the except clause.","locations":[{"ref":"ci/style.py:56-60","code":"   56 |     try:\n   57 |         run([\"shellcheck\", \"--version\"])\n   58 |     except sp.CalledProcessError:\n   59 |         eprint(\"ERROR: shellcheck not found\")\n   60 |         exit(1)","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/style.py#L56-L60"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"`create-artifacts.py` assumes at least one `ctest_output.c` exists; if `glob` returns an empty list, `marker_files[0]` raises IndexError with no useful message. Since this script runs specifically when tests fail (and may run before any ctest build), an empty match is plausible.","fix":"Check `if not marker_files: sys.exit(...)` with a clear message before indexing.","locations":[{"ref":"ci/create-artifacts.py:21-24","code":"   21 |     marker_files = [Path(p) for p in glob(\"target/**/ctest_output.c\", recursive=True)]\n   22 |     marker_files.sort(key=lambda path: path.stat().st_mtime)\n   23 |     build_dir = marker_files[0].parent\n   24 |     print(f\"Located build directory '{build_dir}'\")","lines":4,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/create-artifacts.py#L21-L24"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"GITHUB_ENV is opened with mode `\"w+\"`, which truncates the file. GITHUB_ENV is an append-only handoff file shared across steps; truncating it discards any variables exported by earlier steps. The convention is to append.","fix":"Open with mode `\"a\"` instead of `\"w+\"`.","locations":[{"ref":"ci/create-artifacts.py:45-47","code":"   45 |         with open(gh_env, \"w+\") as f:\n   46 |             f.write(f\"ARCHIVE_NAME={archive_name}\\n\")\n   47 |             f.write(f\"ARCHIVE_PATH={archive_path}\\n\")","lines":3,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/create-artifacts.py#L45-L47"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"Several download/build install scripts run multi-stage pipelines and curl|tar chains but do not enable `set -o pipefail` (sh `set -eux` only). A failed `curl` piped into `tar`/`gunzip`/`cpio` is masked because only the exit status of the last pipeline element is observed, so a failed download can silently proceed with empty/garbage input. e.g. linux-s390x.sh `gunzip -c ../initrd.gz | cpio -id`, install-musl.sh `curl ... | tar xzf -`, wasi.sh and install-uclibc.sh curl|tar.","fix":"Where the shell is bash use `set -euxo pipefail`; for POSIX sh either switch to bash or restructure curl-to-file then extract so download failures are detected.","locations":[{"ref":"ci/linux-s390x.sh:1-4","code":"    1 | #!/usr/bin/env sh\n    2 | \n    3 | set -eux\n    4 | ","lines":4,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/linux-s390x.sh#L1-L4"},{"ref":"ci/install-musl.sh:31","code":"   31 | curl --retry 5 \"https://ci-mirrors.rust-lang.org/libc/${musl}.tar.gz\" | tar xzf -","lines":1,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/install-musl.sh#L31"},{"ref":"ci/wasi.sh:17-18","code":"   17 | curl -L https://github.com/bytecodealliance/wasmtime/releases/download/v$wasmtime/wasmtime-v$wasmtime-x86_64-linux.tar.xz |\n   18 |     tar xJf -","lines":2,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/wasi.sh#L17-L18"},{"ref":"ci/install-uclibc.sh:17-18","code":"   17 | curl --retry 5 -L \"https://toolchains.bootlin.com/downloads/releases/toolchains/armv7-eabihf/tarballs/armv7-eabihf--uclibc--${version}.tar.bz2\" |\n   18 | tar xjf - -C /toolchain --strip-components=1","lines":2,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/install-uclibc.sh#L17-L18"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"Generated C compilation via cc::Build .compile(stem) is the final step but cc panics internally on failure rather than returning a Result, so generate_test cannot convert a C-compiler error into its GenerationError; the function signature implies recoverable errors but this step aborts the process. (cc::Build has no fallible compile in the API used here.) Worth documenting that compile failures abort rather than return Err.","fix":"Use cc::Build::try_compile (returns Result) and map the error into GenerationError so callers get a recoverable error consistent with the rest of generate_test.","locations":[{"ref":"ctest/src/runner.rs:93-95","code":"   93 |     let stem: &str = output_file_path.file_stem().unwrap().to_str().unwrap();\n   94 |     cfg.out_dir(output_file_path.parent().unwrap())\n   95 |         .compile(stem);","lines":3,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/runner.rs#L93-L95"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"generate_test/__compile_test rely on a chain of unwrap() on path operations: output_file_path.file_stem().unwrap().to_str().unwrap(), .parent().unwrap(), crate_path.file_stem().unwrap(), library_file ... .file_stem().unwrap(), .to_str().unwrap(). These panic (rather than returning the function's Result error) for paths with no stem, a non-UTF8 component, or no parent (e.g. a root-level output path). Inputs are user-supplied paths.","fix":"Replace the unwrap() chains with proper error propagation into the function's Result (ok_or(...)?), so malformed paths surface as a GenerationError/Error rather than a panic.","locations":[{"ref":"ctest/src/runner.rs:93-95","code":"   93 |     let stem: &str = output_file_path.file_stem().unwrap().to_str().unwrap();\n   94 |     cfg.out_dir(output_file_path.parent().unwrap())\n   95 |         .compile(stem);","lines":3,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/runner.rs#L93-L95"},{"ref":"ctest/src/runner.rs:112-117","code":"  112 |     let library_file = library_file.as_ref().file_stem().unwrap();\n  113 | \n  114 |     let rust_file = output_dir\n  115 |         .join(crate_path.file_stem().unwrap())\n  116 |         .with_extension(\"rs\");\n  117 |     let binary_path = output_dir.join(rust_file.file_stem().unwrap());","lines":6,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/runner.rs#L112-L117"},{"ref":"ctest/src/runner.rs:124","code":"  124 |             library_file.to_str().unwrap()","lines":1,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/runner.rs#L124"}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In __run_test, when RUNNER is unset the binary is launched as `Command::new(test_binary)` and then `cmd.arg(test_binary)` appends the binary's own path as argv[1]. The compiled test main() ignores argv so it is currently harmless, but it is semantically wrong: the test process is invoked with itself as an argument. The single `cmd.arg(test_binary)` line is only correct for the RUNNER-set branch (where it is the argument to the runner program); it should not run for the no-runner branch.","fix":"Move `cmd.arg(test_binary.as_ref());` into the `else` branch (the RUNNER-set case) only, so the direct-execution path runs the binary with no spurious self-argument.","locations":[{"ref":"ctest/src/runner.rs:172-184","code":"  172 | pub fn __run_test<P: AsRef<Path>>(test_binary: P) -> Result<String> {\n  173 |     let runner = env::var(\"RUNNER\").unwrap_or_default();\n  174 |     let mut cmd;\n  175 |     if runner.is_empty() {\n  176 |         cmd = Command::new(test_binary.as_ref());\n  177 |     } else {\n  178 |         let mut args = runner.split_whitespace();\n  179 |         cmd = Command::new(args.next().unwrap());\n  180 |         cmd.args(args);\n  181 |     }\n  182 | \n  183 |     cmd.arg(test_binary.as_ref());\n  184 |     let output = cmd.output()?;","lines":13,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/runner.rs#L172-L184"}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":true,"description":"`run.sh` parses `env`/`bits` from `rustc --print cfg` via a pipeline `rustc ... | sed ...`. Under `set -eu` (no pipefail) a failing `rustc` is masked and `env`/`bits` become empty, silently skipping the gnu 32-bit extra test matrix rather than failing. Low impact since rustc failing is unlikely, but it would silently reduce coverage.","fix":"Add pipefail handling or capture rustc output once and check it before sed.","locations":[{"ref":"ci/run.sh:41-42","code":"   41 | env=\"$(rustc --print cfg --target \"$target\" | sed -n 's/target_env=\"\\(.*\\)\"/\\1/p')\"\n   42 | bits=\"$(rustc --print cfg --target \"$target\" | sed -n 's/target_pointer_width=\"\\(.*\\)\"/\\1/p')\"","lines":2,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/run.sh#L41-L42"},{"ref":"ci/run.sh:53-58","code":"   53 | if [ \"$env\" = \"gnu\" ] && [ \"$bits\" = \"32\" ]; then\n   54 |     # shellcheck disable=SC2086\n   55 |     RUST_LIBC_UNSTABLE_GNU_FILE_OFFSET_BITS=64 $cmd -- $test_flags\n   56 |     # shellcheck disable=SC2086\n   57 |     RUST_LIBC_UNSTABLE_GNU_TIME_BITS=64 $cmd -- $test_flags\n   58 | fi","lines":6,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/run.sh#L53-L58"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"expand(), __compile_test() and __run_test() build commands by passing env-var strings (RUNNER, FLAGS) through split_whitespace and interpolating LINKER/TARGET directly. RUNNER is split on whitespace and the first token becomes the program, but quoting is not handled, so a runner path containing spaces, or runner args needing quoting, cannot be expressed. Same for FLAGS. This is a usability/correctness limitation for cross-compilation setups (e.g. a wrapper script with a spaced path).","fix":"Document that these env vars are whitespace-split with no quoting, or parse them with a shell-words style splitter that honors quoting.","locations":[{"ref":"ctest/src/runner.rs:173-181","code":"  173 |     let runner = env::var(\"RUNNER\").unwrap_or_default();\n  174 |     let mut cmd;\n  175 |     if runner.is_empty() {\n  176 |         cmd = Command::new(test_binary.as_ref());\n  177 |     } else {\n  178 |         let mut args = runner.split_whitespace();\n  179 |         cmd = Command::new(args.next().unwrap());\n  180 |         cmd.args(args);\n  181 |     }","lines":9,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/runner.rs#L173-L181"},{"ref":"ctest/src/runner.rs:154-157","code":"  154 |     let flags = env::var(\"FLAGS\").unwrap_or_default();\n  155 |     if !flags.is_empty() {\n  156 |         cmd.args(flags.split_whitespace());\n  157 |     }","lines":4,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/runner.rs#L154-L157"},{"ref":"ctest/src/macro_expansion.rs:17-36","code":"   17 |     let rustc = env::var(\"RUSTC\").unwrap_or_else(|_| String::from(\"rustc\"));\n   18 | \n   19 |     let mut cmd = Command::new(rustc);\n   20 |     cmd.env(\"RUSTC_BOOTSTRAP\", \"1\")\n   21 |         .arg(\"-Zunpretty=expanded\")\n   22 |         .arg(\"--edition\")\n   23 |         .arg(EDITION) // By default, -Zunpretty=expanded uses 2015 edition.\n   24 |         .arg(canonicalize(crate_path)?);\n   25 | \n   26 |     if !target.is_empty() {\n   27 |         cmd.arg(\"--target\").arg(target);\n   28 |     }\n   29 | \n   30 |     // `libc` uses non standard cfg flags as well, which have to be manually expanded.\n   31 |     for (k, v) in cfg {\n   32 |         match v {\n   33 |             None => cmd.arg(\"--cfg\").arg(k),\n   34 |             Some(val) => cmd.arg(\"--cfg\").arg(format!(\"{k}=\\\"{val}\\\"\")),\n   35 |         };\n   36 |     }","lines":20,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/macro_expansion.rs#L17-L36"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"`TranslateHelper::c_type` uses `panic!` for six `MapInput` variants it considers illegal (StructType/UnionType/CEnumType/StructFieldType/UnionFieldType/Type) and `unimplemented!()` for `MapInput::Fn`. These are internal-invariant guards, but they are reachable purely through programmer error within the crate and abort the whole build with no context about which item triggered it. A returned error (or a typed-narrower input) would be safer than seven panic arms.","fix":"Narrow the accepted input type so illegal variants are unrepresentable, or return a `TranslationError` describing the offending variant/ident instead of panicking.","locations":[{"ref":"ctest/src/template.rs:692-714","code":"  692 |     pub(crate) fn c_type(&self, item: impl Into<MapInput<'a>>) -> Result<String, TranslationError> {\n  693 |         let item: MapInput = item.into();\n  694 | \n  695 |         let (ident, ty) = match item {\n  696 |             MapInput::Const(c) => (c.ident(), self.translator.translate_type(&c.ty)?),\n  697 |             MapInput::StructField(_, f) => (f.ident(), self.translator.translate_type(&f.ty)?),\n  698 |             MapInput::UnionField(_, f) => (f.ident(), self.translator.translate_type(&f.ty)?),\n  699 |             MapInput::Static(s) => (s.ident(), self.translator.translate_type(&s.ty)?),\n  700 |             // For functions, their type would be a bare fn signature, which would need to be saved\n  701 |             // inside of `Fn` when parsed.\n  702 |             MapInput::Fn(_) => unimplemented!(),\n  703 |             // For structs/unions/aliases, their type is the same as their identifier.\n  704 |             MapInput::Alias(a) => (a.ident(), cdecl::named(a.ident(), Constness::Mut)),\n  705 |             MapInput::Struct(s) => (s.ident(), cdecl::named(s.ident(), Constness::Mut)),\n  706 |             MapInput::Union(u) => (u.ident(), cdecl::named(u.ident(), Constness::Mut)),\n  707 | \n  708 |             MapInput::StructType(_) => panic!(\"MapInput::StructType is not allowed!\"),\n  709 |             MapInput::UnionType(_) => panic!(\"MapInput::UnionType is not allowed!\"),\n  710 |             MapInput::CEnumType(_) => panic!(\"MapInput::CEnumType is not allowed!\"),\n  711 |             MapInput::StructFieldType(_, _) => panic!(\"MapInput::StructFieldType is not allowed!\"),\n  712 |             MapInput::UnionFieldType(_, _) => panic!(\"MapInput::UnionFieldType is not allowed!\"),\n  713 |             MapInput::Type(_) => panic!(\"MapInput::Type is not allowed!\"),\n  714 |         };","lines":23,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/template.rs#L692-L714"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"All test generation work is performed twice. `generate_files` constructs a `RustTestTemplate` and a `CTestTemplate` separately, and each one's `::new` calls `TestTemplate::new`, which builds the complete set of tests from scratch (every populate_* pass over all aliases/structs/unions/constants/functions/statics). The two `TestTemplate`s are identical, so the entire translation/iteration pipeline runs twice for every build. For libc-sized inputs (thousands of items) this roughly doubles generation time.","fix":"Build the shared `TestTemplate` once in `generate_files` (or cache it) and pass/clone it into both `RustTestTemplate` and `CTestTemplate`, instead of recomputing it inside each template's `new`.","locations":[{"ref":"ctest/src/template.rs:33-42","code":"   33 | impl RustTestTemplate {\n   34 |     pub(crate) fn new(\n   35 |         ffi_items: &FfiItems,\n   36 |         generator: &TestGenerator,\n   37 |     ) -> Result<Self, TranslationError> {\n   38 |         Ok(Self {\n   39 |             template: TestTemplate::new(ffi_items, generator)?,\n   40 |             extern_keyword: \"extern\".into(),\n   41 |         })\n   42 |     }","lines":10,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/template.rs#L33-L42"},{"ref":"ctest/src/template.rs:68-78","code":"   68 | impl CTestTemplate {\n   69 |     pub(crate) fn new(\n   70 |         ffi_items: &FfiItems,\n   71 |         generator: &TestGenerator,\n   72 |     ) -> Result<Self, TranslationError> {\n   73 |         Ok(Self {\n   74 |             template: TestTemplate::new(ffi_items, generator)?,\n   75 |             headers: generator.headers.clone(),\n   76 |         })\n   77 |     }\n   78 | }","lines":11,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/template.rs#L68-L78"},{"ref":"ctest/src/generator.rs:1088-1110","code":" 1088 |         let mut rust_file = RustTestTemplate::new(&ffi_items, self)?\n 1089 |             .edition(self.edition.unwrap_or(DEFAULT_EDITION))\n 1090 |             .render()\n 1091 |             .map_err(GenerationError::RustTemplateRender)?;\n 1092 |         ensure_trailing_newline(&mut rust_file);\n 1093 | \n 1094 |         // Generate the Rust side of the tests.\n 1095 |         File::create(output_file_path.with_extension(\"rs\"))\n 1096 |             .map_err(GenerationError::OsError)?\n 1097 |             .write_all(rust_file.as_bytes())\n 1098 |             .map_err(GenerationError::OsError)?;\n 1099 | \n 1100 |         let mut c_file = CTestTemplate::new(&ffi_items, self)?\n 1101 |             .render()\n 1102 |             .map_err(GenerationError::CTemplateRender)?;\n 1103 |         ensure_trailing_newline(&mut c_file);\n 1104 | \n 1105 |         // Generate the C/Cxx side of the tests.\n 1106 |         let c_output_path = output_file_path.with_extension(self.language.extension());\n 1107 |         File::create(&c_output_path)\n 1108 |             .map_err(GenerationError::OsError)?\n 1109 |             .write_all(c_file.as_bytes())\n 1110 |             .map_err(GenerationError::OsError)?;","lines":23,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/generator.rs#L1088-L1110"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"`TranslateHelper::new` does `filtered_ffi_items: ffi_items.clone()`, deep-cloning the entire `FfiItems` collection (all structs, unions, fields, constants, etc.) so it can run `extract_if` to drop skipped items. Combined with the double construction above, the full FFI item set is cloned twice per generation. The clone exists only to allow in-place filtering of a borrowed input.","fix":"Filter without owning a full copy: collect references/indices of retained items, or compute the skip predicate lazily at iteration time in the populate_* methods, rather than cloning all items up front.","locations":[{"ref":"ctest/src/template.rs:610-621","code":"  610 | impl<'a> TranslateHelper<'a> {\n  611 |     /// Create a new translation helper.\n  612 |     pub(crate) fn new(ffi_items: &'a FfiItems, generator: &'a TestGenerator) -> Self {\n  613 |         let mut helper = Self {\n  614 |             filtered_ffi_items: ffi_items.clone(),\n  615 |             generator,\n  616 |             translator: Translator::new(ffi_items, generator),\n  617 |         };\n  618 |         helper.filter_ffi_items();\n  619 | \n  620 |         helper\n  621 |     }","lines":12,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/template.rs#L610-L621"},{"ref":"ctest/src/template.rs:627-684","code":"  627 |     fn filter_ffi_items(&mut self) {\n  628 |         let verbose = self.generator.verbose_skip;\n  629 | \n  630 |         let skipped = self.filtered_ffi_items.aliases.extract_if(.., |alias| {\n  631 |             self.generator\n  632 |                 .skips\n  633 |                 .iter()\n  634 |                 .any(|f| f(&MapInput::     <h1>Code Audit Report &mdash; libc</h1>
    <div class="meta">Generated 2026-06-20 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="project-info"><div class="pi-name">libc</div><div class="pi-row"><a class="pi-repo-btn" href="https://github.com/rust-lang/libc" target="_blank" rel="noopener">&#128279; https://github.com/rust-lang/libc</a><span><span class="pi-k">branch</span> <code>main</code></span><span><span class="pi-k">commit</span> <a href="https://github.com/rust-lang/libc/commit/413bb61f08f005112e67957337db95db0fb01113" target="_blank" rel="noopener"><code>413bb61f08</code></a></span></div></div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
  <button class="action-btn" data-action="download-md">&#11015; MD</button>
  <button class="action-btn" data-action="download-md-short">&#11015; MD Short</button>
  <button class="action-btn" data-action="download-toml">&#11015; TOML</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// Data
const FINDINGS     = JSON.parse(document.getElementById('D').textContent);
const PROJECT_INFO = JSON.parse(document.getElementById('PI').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Build lookup map for O(1) access
const FINDING_BY_ID = new Map(FINDINGS.map(f => [f.id, f]));
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash — debounced so rapid filter changes don't thrash history
let _hashTimer = 0;
function syncHash() {
  clearTimeout(_hashTimer);
  _hashTimer = setTimeout(() => {
    const p = new URLSearchParams();
    if (S.groupBy !== 'type') p.set('g', S.groupBy);
    if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
    if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
    if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
    if (S.easyOnly)          p.set('e',   '1');
    if (S.search)            p.set('q',   S.search);
    const str = p.toString();
    history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
  }, 300);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
