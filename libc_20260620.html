<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"The public builder `TestGenerator::edition(e: u32)` accepts any u32, but `RustTestTemplate::edition` panics on any value other than 2021 or 2024. So a caller doing e.g. `cfg.edition(2018)` or `cfg.edition(2015)` gets a panic deep inside `generate_files` rather than a returned `GenerationError`. A public API should not panic on plausible user input.","fix":"Validate the edition in the public `edition` setter (or in `generate_files`) and return `GenerationError` for unsupported editions, instead of `panic!` in the template's `edition` method.","locations":[{"ref":"ctest/src/generator.rs:258-261","code":"  258 |     pub fn edition(&mut self, e: u32) -> &mut Self {\n  259 |         self.edition = Some(e);\n  260 |         self\n  261 |     }","lines":4,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/generator.rs#L258-L261"},{"ref":"ctest/src/template.rs:45-57","code":"   45 |     pub(crate) fn edition(&mut self, edition: u32) -> &Self {\n   46 |         match edition {\n   47 |             2021 => {\n   48 |                 self.extern_keyword = \"extern\".into();\n   49 |             }\n   50 |             2024 => {\n   51 |                 // For now we only use this to convert extern to unsafe extern.\n   52 |                 self.extern_keyword = \"unsafe extern\".into();\n   53 |             }\n   54 |             _ => panic!(\"unsupported or invalid edition: {edition}\"),\n   55 |         }\n   56 |         self\n   57 |     }","lines":13,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/template.rs#L45-L57"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"The FreeBSD version override does `version.parse().unwrap()` on RUST_LIBC_UNSTABLE_FREEBSD_VERSION in both scripts. A non-numeric value panics with an opaque ParseIntError instead of a helpful message. Same pattern duplicated in build.rs:81 and libc-test/build.rs:2304.","fix":"Use `.unwrap_or_else(|_| panic!(\"RUST_LIBC_UNSTABLE_FREEBSD_VERSION must be an integer, got {version:?}\"))` (or `.expect(...)`) for a clear error.","locations":[{"ref":"build.rs:80-82","code":"   80 |     let which_freebsd = if let Ok(version) = env::var(\"RUST_LIBC_UNSTABLE_FREEBSD_VERSION\") {\n   81 |         let vers = version.parse().unwrap();\n   82 |         println!(\"cargo:warning=setting FreeBSD version to {vers}\");","lines":3,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/build.rs#L80-L82"},{"ref":"libc-test/build.rs:2303-2306","code":" 2303 |     let freebsd_ver = if let Ok(version) = env::var(\"RUST_LIBC_UNSTABLE_FREEBSD_VERSION\") {\n 2304 |         let vers = version.parse().unwrap();\n 2305 |         println!(\"cargo:warning=setting FreeBSD version to {vers}\");\n 2306 |         Some(vers)","lines":4,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/libc-test/build.rs#L2303-L2306"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"rustc_minor_nightly() panics on rustc version strings that lack a patch component. After `version.split('.')`, it does `assert_eq!(pieces.next(), Some(\"rustc 1\"))` then expects a 2nd piece (minor) and a 3rd piece (`otry!(pieces.next())`) for the nightly suffix. A version string like \"rustc 1.85\" (no `.0`) makes the 3rd `pieces.next()` return None and the `otry!` macro panics with \"Failed to get rustc version\". Also `assert_eq!(..., Some(\"rustc 1\"))` hard-fails the day rustc reaches 2.0. These are build-script panics on unusual but well-formed rustc output.","fix":"Parse more defensively: split on whitespace to grab the `x.y.z` token, then split that on '.'; tolerate a missing patch component (default nightly=false) and avoid asserting the literal \"rustc 1\" major version.","locations":[{"ref":"build.rs:251-272","code":"  251 |     let version = otry!(str::from_utf8(&output.stdout).ok());\n  252 | \n  253 |     let mut pieces = version.split('.');\n  254 | \n  255 |     assert_eq!(\n  256 |         pieces.next(),\n  257 |         Some(\"rustc 1\"),\n  258 |         \"Failed to get rustc version\"\n  259 |     );\n  260 | \n  261 |     let minor = pieces.next();\n  262 | \n  263 |     // If `rustc` was built from a tarball, its version string\n  264 |     // will have neither a git hash nor a commit date\n  265 |     // (e.g. \"rustc 1.39.0\"). Treat this case as non-nightly,\n  266 |     // since a nightly build should either come from CI\n  267 |     // or a git checkout\n  268 |     let nightly_raw = otry!(pieces.next()).split('-').nth(1);\n  269 |     let nightly = nightly_raw.map_or(false, |raw| {\n  270 |         raw.starts_with(\"dev\") || raw.starts_with(\"nightly\")\n  271 |     });\n  272 |     let minor = otry!(otry!(minor).parse().ok());","lines":22,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/build.rs#L251-L272"}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"extract_single_link_name panics (via panic! / multiple-attr check / unrecognized-syntax) on malformed or duplicate #[link_name = ...] attributes encountered while walking the AST. Because ctest parses macro-expanded libc source, a panic here aborts the whole test generation with a raw backtrace instead of a diagnostic. More importantly the collected link_name is never actually consumed (see the dead-code finding), so these panic paths add risk for data that is thrown away.","fix":"Return a Result/Option and surface a proper GenerationError instead of panic!, or (since link_name is unused) stop parsing link_name entirely until it is consumed.","locations":[{"ref":"ctest/src/ffi_items.rs:115-133","code":"  115 | fn extract_single_link_name(attrs: &[syn::Attribute]) -> Option<BoxStr> {\n  116 |     let mut link_name_iter = attrs\n  117 |         .iter()\n  118 |         .filter(|attr| attr.path().is_ident(\"link_name\"));\n  119 | \n  120 |     let link_name = link_name_iter.next()?;\n  121 |     if let Some(attr) = link_name_iter.next() {\n  122 |         panic!(\"multiple `#[link_name = ...]` attributes found: {attr:?}\");\n  123 |     }\n  124 | \n  125 |     if let syn::Meta::NameValue(nv) = &link_name.meta\n  126 |         && let syn::Expr::Lit(expr_lit) = &nv.value\n  127 |         && let syn::Lit::Str(lit_str) = &expr_lit.lit\n  128 |     {\n  129 |         return Some(lit_str.value().into_boxed_str());\n  130 |     }\n  131 | \n  132 |     panic!(\"unrecognized `link_name` syntax: {link_name:?}\");\n  133 | }","lines":19,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/ffi_items.rs#L115-L133"}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"visit_foreign_item_fn uses unimplemented!() for any parameter pattern that is not Pat::Ident and unreachable!() for receivers. Macro-expanded libc is unlikely to hit these, but a foreign fn declared with a wildcard/tuple parameter pattern (legal in some extern signatures, e.g. `fn f(_: c_int)`) would hit the unimplemented! and abort generation. `_` parameters are common.","fix":"Handle Pat::Wild (and other patterns) by synthesizing a placeholder identifier instead of panicking; reserve unreachable! strictly for the receiver case.","locations":[{"ref":"ctest/src/ffi_items.rs:143-156","code":"  143 |         .map(|arg| match arg {\n  144 |             syn::FnArg::Typed(arg) => Parameter {\n  145 |                 ident: match arg.pat.deref() {\n  146 |                     syn::Pat::Ident(i) => i.ident.to_string().into_boxed_str(),\n  147 |                     _ => {\n  148 |                         unimplemented!(\"Foreign functions are unlikely to have any other pattern.\")\n  149 |                     }\n  150 |                 },\n  151 |                 ty: arg.ty.deref().clone(),\n  152 |             },\n  153 |             syn::FnArg::Receiver(_) => {\n  154 |                 unreachable!(\"Foreign functions can't have self/receiver parameters.\")\n  155 |             }\n  156 |         })","lines":14,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/ffi_items.rs#L143-L156"}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"`path.path.segments.last().unwrap()` will panic on a path with zero segments. While syn normally produces at least one segment, this is an unchecked unwrap inside the const-classification hot path; a malformed/edge-case expanded type would crash generation instead of being treated as a non-cstr constant.","fix":"Use `if let Some(seg) = path.path.segments.last()` and fall through to the else branch when absent, rather than `unwrap()`.","locations":[{"ref":"ctest/src/template.rs:122-126","code":"  122 |             if let syn::Type::Ptr(ptr) = &constant.ty\n  123 |                 && let syn::Type::Path(path) = &*ptr.elem\n  124 |                 && path.path.segments.last().unwrap().ident == \"c_char\"\n  125 |                 && ptr.mutability.is_none()\n  126 |             {","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/template.rs#L122-L126"}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"translate_path() calls args.args.first().unwrap() inside the `if let ... && let ...` chain. If a path segment has empty angle-bracketed arguments (Punctuated is empty), first() returns None and unwrap() panics instead of producing a TranslationError. The translator otherwise reports unsupported/odd types via Result, so this is an inconsistent hard panic in the parsing path.","fix":"Match on args.args.first() with `if let Some(syn::GenericArgument::Type(inner_ty)) = args.args.first()` (the chain already falls through when the pattern does not match), avoiding the unwrap.","locations":[{"ref":"ctest/src/translator.rs:226-228","code":"  226 |         if let syn::PathArguments::AngleBracketed(args) = &last.arguments\n  227 |             && let syn::GenericArgument::Type(inner_ty) = args.args.first().unwrap()\n  228 |         {","lines":3,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/translator.rs#L226-L228"}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"test_windows rename_struct_ty does `ty.chars().next().unwrap()` (line 796) to test if the first char is uppercase. An empty type identifier would panic. Type names are never empty in practice, but the unwrap is an unguarded panic point in generated-code logic.","fix":"Use `ty.chars().next().is_some_and(char::is_uppercase)` to avoid the unwrap.","locations":[{"ref":"libc-test/build.rs:790-801","code":"  790 |     cfg.rename_struct_ty(|ty| {\n  791 |         match ty {\n  792 |             // Just pass all these through, no need for a \"struct\" prefix\n  793 |             \"FILE\" | \"DIR\" | \"Dl_info\" => ty.to_string().into(),\n  794 |             t if t.ends_with(\"_t\") => t.to_string().into(),\n  795 |             // Windows uppercase structs don't have `struct` in fr.into()ont:\n  796 |             t if ty.chars().next().unwrap().is_uppercase() => t.to_string().into(),\n  797 |             \"stat\" => \"struct __stat64\".to_string().into(),\n  798 |             \"utimbuf\" => \"struct __utimbuf64\".to_string().into(),\n  799 |             _ => None,\n  800 |         }\n  801 |     });","lines":12,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/libc-test/build.rs#L790-L801"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"OpenHarmony (ohos) targets get the `musl_v1_2_3` cfg in the libc crate but NOT in the ctest test generator. Root build.rs sets `musl_v1_2_3 = true` unconditionally for `target_env == \"ohos\"` (build.rs:119-124), so the libc crate is compiled with the v1.2.3 struct layouts / 64-bit time_t. But libc-test only enables the matching `cfg.cfg(\"musl_v1_2_3\")` when `(musl_v1_2_3 || loongarch64 || hexagon) && musl` is true (libc-test/build.rs:3745); `musl_v1_2_3` here comes only from the env var (3736) and `ohos` is not in the loongarch64/hexagon list. For an ohos target without RUST_LIBC_UNSTABLE_MUSL_V1_2_3 set (e.g. aarch64/x86_64 ohos), the generated C-vs-Rust comparison is done against the OLD layout while libc itself uses the NEW layout, so the test validates the wrong variant (and may silently pass or spuriously fail).","fix":"In libc-test/build.rs include ohos in the auto-enable condition, mirroring root build.rs: e.g. `let ohos = target.contains(\"ohos\"); ... if (musl_v1_2_3 || loongarch64 || hexagon || ohos) && musl { cfg.cfg(\"musl_v1_2_3\", None); ... }`. Better: factor the musl_v1_2_3 decision into one shared helper used by both build scripts.","locations":[{"ref":"build.rs:116-132","code":"  116 |     let musl = target_env == \"musl\" || target_env == \"ohos\";\n  117 | \n  118 |     // loongarch64, hexagon, and ohos only exist with recent musl\n  119 |     if target_arch == \"loongarch64\" || target_arch == \"hexagon\" || target_env == \"ohos\" {\n  120 |         musl_v1_2_3 = true;\n  121 |     }\n  122 | \n  123 |     if musl && musl_v1_2_3 {\n  124 |         set_cfg(\"musl_v1_2_3\");\n  125 |         if target_ptr_width == \"32\" {\n  126 |             set_cfg(\"musl32_time64\");\n  127 |             set_cfg(\"linux_time_bits64\");\n  128 |         }\n  129 |         if MUSL_REDIR_TIME64_ARCHES.contains(&target_arch.as_str()) {\n  130 |             set_cfg(\"musl_redir_time64\");\n  131 |         }\n  132 |     }","lines":17,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/build.rs#L116-L132"},{"ref":"libc-test/build.rs:3736-3754","code":" 3736 |     let musl_v1_2_3 = env::var(\"RUST_LIBC_UNSTABLE_MUSL_V1_2_3\").is_ok();\n 3737 |     if musl_v1_2_3 {\n 3738 |         assert!(musl);\n 3739 |     }\n 3740 |     let old_musl = musl && !musl_v1_2_3;\n 3741 | \n 3742 |     let b32 = arm || target.contains(\"hexagon\") || mips32 || ppc32 || x86_32;\n 3743 | \n 3744 |     let mut cfg = ctest_cfg();\n 3745 |     if (musl_v1_2_3 || loongarch64 || hexagon) && musl {\n 3746 |         cfg.cfg(\"musl_v1_2_3\", None);\n 3747 |         if b32 {\n 3748 |             cfg.cfg(\"musl32_time64\", None);\n 3749 |             cfg.cfg(\"linux_time_bits64\", None);\n 3750 |         }\n 3751 |         if arm || ppc32 || x86_32 || mips32 {\n 3752 |             cfg.cfg(\"musl_redir_time64\", None);\n 3753 |         }\n 3754 |     }","lines":19,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/libc-test/build.rs#L3736-L3754"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"`stdout.lines().find(|l| ...)` returns `Option<&str>`, but it is unwrapped with `.unwrap_or(false)` (a `bool`), which is a type mismatch. As written this file does not type-check. Even ignoring that, the intent (a `bool` indicating whether a passing line was found) requires `.is_some()` / `.any(...)`; the current expression conflates the matched line with a success flag, so the `if !passed` gate would never behave as intended.","fix":"Use `let passed = stdout.lines().any(|l| (l.contains(\"PASSED\") && l.contains(\"tests\")) || l.contains(\"test result: ok\"));`","locations":[{"ref":"ci/ios/deploy_and_run_on_ios_simulator.rs:145-149","code":"  145 |     let stdout = String::from_utf8_lossy(&output.stdout);\n  146 |     let passed = stdout\n  147 |         .lines()\n  148 |         .find(|l| (l.contains(\"PASSED\") && l.contains(\"tests\")) || l.contains(\"test result: ok\"))\n  149 |         .unwrap_or(false);","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/ios/deploy_and_run_on_ios_simulator.rs#L145-L149"},{"ref":"ci/ios/deploy_and_run_on_ios_simulator.rs:157-159","code":"  157 |     if !passed {\n  158 |         panic!(\"tests didn't pass\");\n  159 |     }","lines":3,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/ios/deploy_and_run_on_ios_simulator.rs#L157-L159"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"Fuchsia CMSG_NXTHDR advances the cmsg pointer by sizeof(cmsghdr) units instead of bytes. __CMSG_NEXT does `cmsg.offset(__CMSG_LEN(cmsg))` where `cmsg: *const cmsghdr`. __CMSG_LEN returns the CMSG_ALIGN'd cmsg_len as a *byte* count, but `<*const cmsghdr>::offset` multiplies its argument by size_of::<cmsghdr>() (16 bytes on Fuchsia). The intended next header is `(char*)cmsg + CMSG_ALIGN(cmsg_len)`, but this computes `cmsg + 16 * CMSG_ALIGN(cmsg_len)` bytes, walking far past the real next header and past the control buffer. The `as *mut c_uchar` cast happens only after offset() has already scaled, so it does not help. CMSG_NXTHDR therefore returns a wild/out-of-bounds pointer (or spuriously NULL via the bounds check), corrupting ancillary-data iteration for every recvmsg user on Fuchsia. Contrast Android's correct version which uses byte arithmetic (`cmsg as usize + CMSG_ALIGN(...)`).","fix":"In __CMSG_NEXT advance by bytes, not by cmsghdr-sized units: `(cmsg as *const c_uchar).offset(__CMSG_LEN(cmsg)) as *mut c_uchar` or `(cmsg as usize + __CMSG_LEN(cmsg) as usize) as *mut c_uchar`.","locations":[{"ref":"src/fuchsia/mod.rs:3171-3178","code":" 3171 | fn __CMSG_LEN(cmsg: *const cmsghdr) -> ssize_t {\n 3172 |     ((unsafe { (*cmsg).cmsg_len as size_t } + size_of::<c_long>() - 1) & !(size_of::<c_long>() - 1))\n 3173 |         as ssize_t\n 3174 | }\n 3175 | \n 3176 | fn __CMSG_NEXT(cmsg: *const cmsghdr) -> *mut c_uchar {\n 3177 |     (unsafe { cmsg.offset(__CMSG_LEN(cmsg)) }) as *mut c_uchar\n 3178 | }","lines":8,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/fuchsia/mod.rs#L3171-L3178"},{"ref":"src/fuchsia/mod.rs:3077-3085","code":" 3077 |     pub fn CMSG_NXTHDR(mhdr: *const msghdr, cmsg: *const cmsghdr) -> *mut cmsghdr {\n 3078 |         if ((*cmsg).cmsg_len as size_t) < size_of::<cmsghdr>() {\n 3079 |             ptr::null_mut()\n 3080 |         } else if __CMSG_NEXT(cmsg).add(size_of::<cmsghdr>()) >= __MHDR_END(mhdr) {\n 3081 |             ptr::null_mut()\n 3082 |         } else {\n 3083 |             __CMSG_NEXT(cmsg).cast()\n 3084 |         }\n 3085 |     }","lines":9,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/fuchsia/mod.rs#L3077-L3085"},{"ref":"src/unix/linux_like/android/mod.rs:3299-3307","code":" 3299 |     pub fn CMSG_NXTHDR(mhdr: *const msghdr, cmsg: *const cmsghdr) -> *mut cmsghdr {\n 3300 |         let next = (cmsg as usize + super::CMSG_ALIGN((*cmsg).cmsg_len as usize)) as *mut cmsghdr;\n 3301 |         let max = (*mhdr).msg_control as usize + (*mhdr).msg_controllen as usize;\n 3302 |         if (next.offset(1)) as usize > max {\n 3303 |             ptr::null_mut()\n 3304 |         } else {\n 3305 |             next.cast()\n 3306 |         }\n 3307 |     }","lines":9,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/linux_like/android/mod.rs#L3299-L3307"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"NetBSD makedev masks the major number with 0x000ff00 (bits 8-15, only 8 bits) while its own major() extracts it with 0x000fff00 (bits 8-19, the 12-bit major field NetBSD's dev_t uses). makedev and major are no longer inverses: any major >= 0x100 is silently truncated by makedev, so `major(makedev(m, n)) != m` (e.g. major=0xabc round-trips to 0xbc). The makedev mask is missing one 'f' nibble. The minor packing (`<<12 & 0xfff00000`) and minor extraction (`>>12`) agree with each other, isolating the major packing mask as the wrong operand. NetBSD's real makedev uses (major<<8) & 0x000fff00.","fix":"Change the major packing mask in makedev from 0x000ff00 to 0x000fff00 so it matches major(): `dev |= (major << 8) & 0x000fff00;`","locations":[{"ref":"src/unix/bsd/netbsdlike/netbsd/mod.rs:1875-1894","code":" 1875 |     pub const fn makedev(major: c_uint, minor: c_uint) -> crate::dev_t {\n 1876 |         let major = major as crate::dev_t;\n 1877 |         let minor = minor as crate::dev_t;\n 1878 |         let mut dev = 0;\n 1879 |         dev |= (major << 8) & 0x000ff00;\n 1880 |         dev |= (minor << 12) & 0xfff00000;\n 1881 |         dev |= minor & 0xff;\n 1882 |         dev\n 1883 |     }\n 1884 | \n 1885 |     pub const fn major(dev: crate::dev_t) -> c_int {\n 1886 |         (((dev as u32) & 0x000fff00) >> 8) as c_int\n 1887 |     }\n 1888 | \n 1889 |     pub const fn minor(dev: crate::dev_t) -> c_int {\n 1890 |         let mut res = 0;\n 1891 |         res |= ((dev as u32) & 0xfff00000) >> 12;\n 1892 |         res |= (dev as u32) & 0x000000ff;\n 1893 |         res as c_int\n 1894 |     }","lines":20,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/bsd/netbsdlike/netbsd/mod.rs#L1875-L1894"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"VxWorks version handling is inconsistent between the two build scripts when WIND_RELEASE_ID is unset. Root build.rs treats a missing/unparseable version (vxworks_version_code() == None) as `_ => ()`, i.e. it does NOT set `vxworks_lt_25_09` (assumes >= 25.09). libc-test does `if vxworks_ver < Some((25, 9))`, and in Rust `None < Some(_)` is `true`, so when WIND_RELEASE_ID is unset libc-test DOES set `vxworks_lt_25_09`. The libc crate and the test generator therefore disagree about the VxWorks ABI version, causing struct/const layout mismatches in tests.","fix":"Make the two agree on the default. Either change libc-test to `if matches!(vxworks_ver, Some(v) if v < (25, 9))`, or change root build.rs to also treat None as `< 25.09`. They must use the same default-when-missing behavior.","locations":[{"ref":"build.rs:106-110","code":"  106 |     match vxworks_version_code() {\n  107 |         Some(v) if (v < (25, 9)) => set_cfg(\"vxworks_lt_25_09\"),\n  108 |         // VxWorks version >= 25.09\n  109 |         _ => (),\n  110 |     }","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/build.rs#L106-L110"},{"ref":"libc-test/build.rs:3507-3511","code":" 3507 |     let vxworks_ver = which_vxworks();\n 3508 | \n 3509 |     if vxworks_ver < Some((25, 9)) {\n 3510 |         cfg.cfg(\"vxworks_lt_25_09\", None);\n 3511 |     }","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/libc-test/build.rs#L3507-L3511"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In the no-argument branch the loop iterates `ci/docker/*` and passes the full glob path (e.g. `ci/docker/x86_64-unknown-linux-gnu`) as `run_target`. `run()` then builds `--tag=libc-ci/docker/<t>` and `--file=ci/docker/ci/docker/<t>/Dockerfile`, and finally tries `docker run ... libc-$target` where `$target` is empty (the outer `$1`). The all-targets path is therefore broken; only the single-target invocation works.","fix":"Strip the path before passing, e.g. `run \"$(basename \"$d\")\"`, and ensure the final `docker run` uses `$run_target` (the function arg) rather than the outer `$target`.","locations":[{"ref":"ci/run-docker.sh:29-37","code":"   29 | run() {\n   30 |     run_target=\"$1\"\n   31 |     echo \"Building docker container for target $run_target\"\n   32 | \n   33 |     build_args=(\n   34 |         \"--tag=libc-$run_target\"\n   35 |         \"--file=ci/docker/$run_target/Dockerfile\"\n   36 |         \"ci/\"\n   37 |     )","lines":9,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/run-docker.sh#L29-L37"},{"ref":"ci/run-docker.sh:88-95","code":"   88 | if [ -z \"$target\" ]; then\n   89 |     # Run all docker targets\n   90 |     for d in ci/docker/*; do\n   91 |         run \"${d}\"\n   92 |     done\n   93 | else\n   94 |     run \"$target\"\n   95 | fi","lines":8,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ci/run-docker.sh#L88-L95"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"collect_fields strips a leading `r#` from field identifiers and stores the bare name; Field::rust_ident() re-adds `r#` only for the hardcoded keyword list in is_rust_keyword. Struct/union/fn/const/static/type-alias identifiers (visit_item_* in ffi_items.rs) are NOT stripped of `r#`, so raw-identifier handling is inconsistent across item kinds: a raw-named field is normalized while a raw-named type keeps its `r#`. Any keyword not in the is_rust_keyword list (the list omits e.g. the weak keywords and is maintained by hand) that appears as a raw-ident field would be emitted without `r#` and fail to compile in the generated Rust test.","fix":"Centralize raw-identifier handling: either keep the original `r#`-prefixed string and never strip it, or strip uniformly across all item kinds and rely on a single complete keyword set. Avoid the strip-then-reconstruct round-trip that can drop the prefix for keywords missing from the manual list.","locations":[{"ref":"ctest/src/ffi_items.rs:99-112","code":"   99 |             field.ident.as_ref().map(|ident| {\n  100 |                 let ident = ident.to_string();\n  101 |                 Field {\n  102 |                     public: is_visible(&field.vis),\n  103 |                     ident: ident\n  104 |                         .strip_prefix(\"r#\")\n  105 |                         .unwrap_or(&ident)\n  106 |                         .to_string()\n  107 |                         .into_boxed_str(),\n  108 |                     ty: field.ty.clone(),\n  109 |                 }\n  110 |             })\n  111 |         })\n  112 |         .collect()","lines":14,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/ffi_items.rs#L99-L112"},{"ref":"ctest/src/ast/field.rs:18-81","code":"   18 |     pub fn rust_ident(&self) -> String {\n   19 |         if is_rust_keyword(&self.ident) {\n   20 |             format!(\"r#{}\", self.ident)\n   21 |         } else {\n   22 |             self.ident.to_string()\n   23 |         }\n   24 |     }\n   25 | }\n   26 | \n   27 | fn is_rust_keyword(ident: &str) -> bool {\n   28 |     matches!(\n   29 |         ident,\n   30 |         \"as\" | \"break\"\n   31 |             | \"const\"\n   32 |             | \"continue\"\n   33 |             | \"crate\"\n   34 |             | \"else\"\n   35 |             | \"enum\"\n   36 |             | \"extern\"\n   37 |             | \"false\"\n   38 |             | \"fn\"\n   39 |             | \"for\"\n   40 |             | \"if\"\n   41 |             | \"impl\"\n   42 |             | \"in\"\n   43 |             | \"let\"\n   44 |             | \"loop\"\n   45 |             | \"match\"\n   46 |             | \"mod\"\n   47 |             | \"move\"\n   48 |             | \"mut\"\n   49 |             | \"pub\"\n   50 |             | \"ref\"\n   51 |             | \"return\"\n   52 |             | \"self\"\n   53 |             | \"Self\"\n   54 |             | \"static\"\n   55 |             | \"struct\"\n   56 |             | \"super\"\n   57 |             | \"trait\"\n   58 |             | \"true\"\n   59 |             | \"type\"\n   60 |             | \"unsafe\"\n   61 |             | \"use\"\n   62 |             | \"where\"\n   63 |             | \"while\"\n   64 |             | \"async\"\n   65 |             | \"await\"\n   66 |             | \"dyn\"\n   67 |             | \"abstract\"\n   68 |             | \"become\"\n   69 |             | \"box\"\n   70 |             | \"do\"\n   71 |             | \"final\"\n   72 |             | \"macro\"\n   73 |             | \"override\"\n   74 |             | \"priv\"\n   75 |             | \"typeof\"\n   76 |             | \"unsized\"\n   77 |             | \"virtual\"\n   78 |             | \"yield\"\n   79 |             | \"try\"\n   80 |     )\n   81 | }","lines":64,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/ast/field.rs#L18-L81"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"is_signed() classifies unsigned C types as signed. The fallthrough arm returns true when the C type name starts with \"uint\" (uint8_t, uint16_t, uint32_t, uint64_t) or \"unsigned \" (unsigned int, unsigned long, ...), and the explicit arm above lists \"size_t\" (which is unsigned in C) as signed. Since is_signed() gates whether a signededness test is emitted for an alias, every unsigned alias whose underlying type resolves to uint*_t / unsigned X / size_t is incorrectly treated as signed and gets an unnecessary signededness test generated, contradicting the function's documented intent of only testing signed aliases.","fix":"Remove \"size_t\" from the signed list on line 281 (it is unsigned), and fix the fallthrough so unsigned spellings are not matched: only return true for s.starts_with(\"int\") || s.starts_with(\"signed \"), and explicitly return false for \"uint\"/\"unsigned \" prefixes.","locations":[{"ref":"ctest/src/translator.rs:280-287","code":"  280 |                 match translate_primitive_type(&ident.to_string()).as_str() {\n  281 |                     \"char\" | \"short\" | \"long\" | \"long long\" | \"size_t\" | \"ssize_t\" => true,\n  282 |                     s => {\n  283 |                         s.starts_with(\"int\")\n  284 |                             || s.starts_with(\"uint\") | s.starts_with(\"signed \")\n  285 |                             || s.starts_with(\"unsigned \")\n  286 |                     }\n  287 |                 }","lines":8,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/translator.rs#L280-L287"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"ptr_with_inner() silently drops the pointee constness when the inner type is an Array or Fn. syn reports the constness on the pointee, and this helper pushes that constness into the inner CTy; but the match only handles CTy::Named and CTy::Ptr, with `_ => ()` swallowing Array/Fn. As a result `*const [T; N]` and `*mut [T; N]` (a Ptr whose elem is an Array, produced by translate_ptr) translate to the same C type, losing the const qualifier of the pointed-to array.","fix":"Handle the Array/Fn cases too: for CTy::Array, apply the qualifier to the array element (or attach a Qual to the array if the model supported it); at minimum do not silently discard constness. Consider emitting `const` on the appropriate inner element so `*const [T;N]` yields `const T (*)[N]`.","locations":[{"ref":"ctest/src/translator.rs:355-360","code":"  355 |     let mut ty = Box::new(inner);\n  356 |     match ty.deref_mut() {\n  357 |         cdecl::CTy::Named { name: _, qual } => qual.constness = constness,\n  358 |         cdecl::CTy::Ptr { ty: _, qual } => qual.constness = constness,\n  359 |         _ => (),\n  360 |     }","lines":6,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/ctest/src/translator.rs#L355-L360"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"The style-checker's own unit tests (style_tests.rs) build the checker via `check_string`, which never sets `self.path` (it stays an empty PathBuf - only `check_file` sets it). When those tests record errors and call `finalize()`, the very first thing `finalize` does on the error path is `let source = fs::read_to_string(&error.path)?;` with an empty path, which fails and returns that IO error via `?` before any snippet is rendered. The `check_style_reject_*` tests only assert `checker.finalize().is_err()`, so they pass on the IO error regardless of whether the style violation was actually detected. They still catch the 'zero errors recorded' case (finalize returns Ok early when `errors` is empty), but they give false confidence: a wrong/missing error message, wrong span, or a panic in the annotate-snippets rendering path is never exercised, and a reject test cannot distinguish 'correct violation detected' from 'detected some unrelated error'.","fix":"In the in-memory tests render/assert on the recorded errors rather than the IO-dependent `finalize`, or make `finalize` not depend on re-reading the file from disk for in-memory sources (e.g. carry the source string in FileError, or skip the disk read when path is empty). Better: have the reject tests assert on the specific error title/count instead of just `is_err()`.","locations":[{"ref":"libc-test/tests/style_lib/mod.rs:159-190","code":"  159 |     pub fn finalize(self) -> Result<()> {\n  160 |         if self.errors.is_empty() {\n  161 |             return Ok(());\n  162 |         }\n  163 | \n  164 |         let renderer = Renderer::styled();\n  165 |         for error in self.errors {\n  166 |             let source = fs::read_to_string(&error.path)?;\n  167 | \n  168 |             let mut snippet = Snippet::source(&source)\n  169 |                 .origin(error.path.to_str().expect(\"path to be UTF-8\"))\n  170 |                 .fold(true)\n  171 |                 .annotation(Level::Error.span(error.span.byte_range()).label(&error.msg));\n  172 | _cmsg_nxthdr` it is derived from use strict `>`. With `>=`, a control message whose trailing byte ends exactly at `msg_control + msg_controllen` (a perfectly valid last cmsg) is treated as out of bounds and CMSG_NXTHDR returns NULL one iteration too early, dropping the final ancillary-data message. This silently truncates received SCM_RIGHTS / SCM_CREDENTIALS data.","fix":"Change `if (next.offset(1)) as usize >= max` to `> max`, matching the Android implementation.","locations":[{"ref":"src/unix/linux_like/emscripten/mod.rs:1261-1272","code":" 1261 |     pub fn CMSG_NXTHDR(mhdr: *const msghdr, cmsg: *const cmsghdr) -> *mut cmsghdr {\n 1262 |         if ((*cmsg).cmsg_len as usize) < size_of::<cmsghdr>() {\n 1263 |             return ptr::null_mut();\n 1264 |         }\n 1265 |         let next = (cmsg as usize + super::CMSG_ALIGN((*cmsg).cmsg_len as usize)) as *mut cmsghdr;\n 1266 |         let max = (*mhdr).msg_control as usize + (*mhdr).msg_controllen as usize;\n 1267 |         if (next.offset(1)) as usize >= max {\n 1268 |             ptr::null_mut()\n 1269 |         } else {\n 1270 |             next.cast()\n 1271 |         }\n 1272 |     }","lines":12,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/linux_like/emscripten/mod.rs#L1261-L1272"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"CPU_ALLOC_SIZE divides the bit count by 8 instead of rounding up to whole cpu-mask words and multiplying by the mask byte size. The code is `(count + size_in_bits - 1) / 8` where size_in_bits is the per-word bit width (e.g. 64). glibc's macro is `((count + __NCPUBITS - 1) / __NCPUBITS) * sizeof(__cpu_mask)`, i.e. round count up to a whole number of words, then * word-bytes. The current expression neither rounds to a whole-word multiple nor multiplies by word size: for count=1 with 64-bit words it returns 7 bytes instead of glibc's 8, and in general returns sizes that are not multiples of sizeof(__cpu_mask) and can under-size the allocation expected by CPU_*_S operations. The same wrong formula is duplicated verbatim across all four copies.","fix":"Round up to whole words and multiply by word bytes: `let word_bytes = size_of_val(&_dummy.bits[0]); ((count as size_t + size_in_bits - 1) / size_in_bits) * word_bytes`.","locations":[{"ref":"src/unix/linux_like/linux_l4re_shared.rs:1467-1471","code":" 1467 |     pub fn CPU_ALLOC_SIZE(count: c_int) -> size_t {\n 1468 |         let _dummy: cpu_set_t = mem::zeroed();\n 1469 |         let size_in_bits = 8 * size_of_val(&_dummy.bits[0]);\n 1470 |         ((count as size_t + size_in_bits - 1) / 8) as size_t\n 1471 |     }","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/linux_like/linux_l4re_shared.rs#L1467-L1471"},{"ref":"src/unix/linux_like/android/mod.rs:3309-3313","code":" 3309 |     pub fn CPU_ALLOC_SIZE(count: c_int) -> size_t {\n 3310 |         let _dummy: cpu_set_t = mem::zeroed();\n 3311 |         let size_in_bits = 8 * size_of_val(&_dummy.__bits[0]);\n 3312 |         ((count as size_t + size_in_bits - 1) / 8) as size_t\n 3313 |     }","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/linux_like/android/mod.rs#L3309-L3313"},{"ref":"src/unix/cygwin/mod.rs:1697-1701","code":" 1697 |     pub fn CPU_ALLOC_SIZE(count: c_int) -> size_t {\n 1698 |         let _dummy: cpu_set_t = cpu_set_t { bits: [0; 16] };\n 1699 |         let size_in_bits = 8 * size_of_val(&_dummy.bits[0]);\n 1700 |         ((count as size_t + size_in_bits - 1) / 8) as size_t\n 1701 |     }","lines":5,"link":"https://github.com/rust-lang/libc/blob/413bb61f08f005112e67957337db95db0fb01113/src/unix/cygwin/mod.rs#L1697-L1701"},{"ref":"src/unix/hurd/mod.rs:3399-3403","code":" 3399 |     pub fn CPU_ALLOC_SIZE(count: c_int) -> size_t {\n 3400 |         let _dummy: cpu_set_t = mem::zeroed();\n 3401 |         let
