n the second iteration it re-opens the same parent again, stx (set to new_stx at line 966) and new_stx become identical, statx_inode_same(&stx, &new_stx) at line 940 fires, and the function returns DIRECTORY_IS_OTHERWISE_OWNED. The multi-level ancestor walk is dead/broken. Consequence: a directory in the foreign UID range whose peer-owned ancestor is more than one level up is misclassified as 'otherwise owned' instead of 'foreign owned', so default_mount_map_mode() picks MOUNT_MAP_IDENTITY instead of MOUNT_MAP_FOREIGN and the trusted-directory polkit path is not taken (trusted_directory is false), forcing the stronger untrusted action. This is a correctness/usability regression in mountfsd's MountDirectory handling; it is over-restrictive rather than a privilege bypass, but it silently defeats an intended feature and the cited code reads as if it climbs the tree when it does not.","fix":"Open the parent relative to the current node being examined, not the original fd: use 'int base = parent_fd >= 0 ? parent_fd : fd;' then 'openat(base, \"..\", O_DIRECTORY|O_PATH|O_CLOEXEC)'. This makes each iteration ascend one real level and lets close_and_replace(parent_fd, new_parent_fd) actually advance the traversal.","locations":[{"ref":"src/mountfsd/mountwork.c:900-967","code":"  900 |         for (n_level = 0; n_level < 16; n_level++) {\n  901 |                 /* Do not go above bind mounts */\n  902 |                 if (FLAGS_SET(stx.stx_attributes, STATX_ATTR_MOUNT_ROOT)) {\n  903 |                         log_debug(\"Directory is a mount point, not checking for parent's ownership.\");\n  904 |                         *ret_current_owner_uid = stx.stx_uid;\n  905 |                         return DIRECTORY_IS_OTHERWISE_OWNED;\n  906 |                 }\n  907 | \n  908 |                 /* Stop iteration if we find a directory up the tree that is neither owned by the user, nor is from the foreign UID range */\n  909 |                 if (!uid_is_foreign(stx.stx_uid) || !gid_is_foreign(stx.stx_gid)) {\n  910 |                         log_debug(\"Directory file descriptor points to directory which itself or its parents is neither owned by foreign UID range nor by the user.\");\n  911 |                         *ret_current_owner_uid = stx.stx_uid;\n  912 |                         return DIRECTORY_IS_OTHERWISE_OWNED;\n  913 |                 }\n  914 | \n  915 |                 /* If the peer is root, then it doesn't matter if we find a parent owned by root, let's shortcut things. */\n  916 |                 if (peer_uid == 0) {\n  917 |                         log_debug(\"Directory referenced by file descriptor is owned by foreign UID range, and peer is root.\");\n  918 |                         *ret_current_owner_uid = stx.stx_uid;\n  919 |                         return DIRECTORY_IS_FOREIGN_OWNED;\n  920 |                 }\n  921 | \n  922 |                 /* Go one level up */\n  923 |                 _cleanup_close_ int new_parent_fd = openat(fd, \"..\", O_DIRECTORY|O_PATH|O_CLOEXEC);\n  924 |                 if (new_parent_fd < 0)\n  925 |                         return log_debug_errno(errno, \"Failed to open parent directory of directory file descriptor: %m\");\n  926 | \n  927 |                 struct statx new_stx;\n  928 |                 r = xstatx_full(new_parent_fd,\n  929 |                                 /* path= */ NULL,\n  930 |                                 AT_EMPTY_PATH,\n  931 |                                 /* xstatx_flags= */ XSTATX_MNT_ID_BEST,\n  932 |                                 /* mandatory_mask= */ STATX_UID|STATX_INO,\n  933 |                                 /* optional_mask= */ 0,\n  934 |                                 /* mandatory_attributes= */ STATX_ATTR_MOUNT_ROOT,\n  935 |                                 &new_stx);\n  936 |                 if (r < 0)\n  937 |                         return log_debug_errno(r, \"Failed to statx() parent directory of directory file descriptor: %m\");\n  938 | \n  939 |                 /* Safety check to see if we hit the root dir */\n  940 |                 if (statx_inode_same(&stx, &new_stx)) {\n  941 |                         log_debug(\"Directory file descriptor is owned by foreign UID range, but didn't find parent directory that is owned by peer among ancestors.\");\n  942 |                         *ret_current_owner_uid = stx.stx_uid;\n  943 |                         return DIRECTORY_IS_OTHERWISE_OWNED;\n  944 |                 }\n  945 | \n  946 |                 r = statx_mount_same(&stx, &new_stx);\n  947 |                 if (r < 0)\n  948 |                         return log_debug_errno(r, \"Failed to compare mount IDs: %m\");\n  949 |                 if (!r) {\n  950 |                         /* NB, this check is probably redundant, given we also check\n  951 |                          * STATX_ATTR_MOUNT_ROOT. The only reason we have it here is to provide extra safety\n  952 |                          * in case the mount tree is rearranged concurrently with our traversal, so that\n  953 |                          * STATX_ATTR_MOUNT_ROOT might be out of date. */\n  954 |                         log_debug(\"Won't cross mount boundaries, not checking for parent's ownership.\");\n  955 |                         *ret_current_owner_uid = stx.stx_uid;\n  956 |                         return DIRECTORY_IS_OTHERWISE_OWNED;\n  957 |                 }\n  958 | \n  959 |                 if (new_stx.stx_uid == peer_uid) { /* Parent inode is owned by the peer. That's good! Everything's fine. */\n  960 |                         log_debug(\"Directory file descriptor is owned by foreign UID range, and ancestor is owned by peer.\");\n  961 |                         *ret_current_owner_uid = stx.stx_uid;\n  962 |                         return DIRECTORY_IS_FOREIGN_OWNED;\n  963 |                 }\n  964 | \n  965 |                 close_and_replace(parent_fd, new_parent_fd);\n  966 |                 stx = new_stx;\n  967 |         }","lines":68}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"_nss_resolve_gethostbyaddr2_r uses sd_json_variant_is_blank_object(p.names) (line 651) to detect an empty result, but p.names is an array and is_blank_object() never returns true for an empty array (sd-json.c:1124-1129). For a names:[] reply this guard passes with n_names==0. Then the sizing loop and packing loop both do nothing, no aliases slots are reserved, and line 714 executes ((char**) r_aliases)[n_names - 1] = NULL, i.e. r_aliases[-1] = NULL, an out-of-bounds write before the reserved aliases region (it happens to land on the already-NULL r_addr_list[1] in the current layout, so it is not memory-unsafe today, but it is fragile). Worse, result->h_aliases is set to r_aliases whose slot 0 was never initialized, so the caller dereferences uninitialized buffer bytes as an alias string pointer.","fix":"After computing n_names = sd_json_variant_elements(p.names), if n_names == 0 goto not_found. Alternatively guard the terminator write and ensure h_aliases is always NULL-terminated even with zero names.","locations":[{"ref":"src/nss-resolve/nss-resolve.c:651-652","code":"  651 |         if (sd_json_variant_is_blank_object(p.names))\n  652 |                 goto not_found;","lines":2},{"ref":"src/nss-resolve/nss-resolve.c:666-714","code":"  666 |         size_t n_names = sd_json_variant_elements(p.names);\n  667 |         ms += ALIGN(len) +                    /* the address */\n  668 |               2 * sizeof(char*) +             /* pointer to the address, plus trailing NULL */\n  669 |               n_names * sizeof(char*);        /* pointers to aliases, plus trailing NULL */\n  670 | \n  671 |         if (buflen < ms) {\n  672 |                 UNPROTECT_ERRNO;\n  673 |                 *errnop = ERANGE;\n  674 |                 *h_errnop = NETDB_INTERNAL;\n  675 |                 return NSS_STATUS_TRYAGAIN;\n  676 |         }\n  677 | \n  678 |         /* First, place address */\n  679 |         char *r_addr = buffer;\n  680 |         memcpy(r_addr, addr, len);\n  681 |         idx = ALIGN(len);\n  682 | \n  683 |         /* Second, place address list */\n  684 |         char *r_addr_list = buffer + idx;\n  685 |         ((char**) r_addr_list)[0] = r_addr;\n  686 |         ((char**) r_addr_list)[1] = NULL;\n  687 |         idx += sizeof(char*) * 2;\n  688 | \n  689 |         /* Third, reserve space for the aliases array, plus trailing NULL */\n  690 |         char *r_aliases = buffer + idx;\n  691 |         idx += sizeof(char*) * n_names;\n  692 | \n  693 |         /* Fourth, place aliases */\n  694 |         char *r_name = buffer + idx;\n  695 | \n  696 |         size_t i = 0;\n  697 |         JSON_VARIANT_ARRAY_FOREACH(entry, p.names) {\n  698 |                 _cleanup_(name_parameters_destroy) NameParameters q = {};\n  699 | \n  700 |                 r = sd_json_dispatch(entry, name_parameters_dispatch_table, nss_json_dispatch_flags, &q);\n  701 |                 if (r < 0)\n  702 |                         goto fail;\n  703 | \n  704 |                 size_t l = strlen(q.name);\n  705 |                 char *z = buffer + idx;\n  706 |                 memcpy(z, q.name, l + 1);\n  707 | \n  708 |                 if (i > 0)\n  709 |                         ((char**) r_aliases)[i - 1] = z;\n  710 |                 i++;\n  711 | \n  712 |                 idx += ALIGN(l + 1);\n  713 |         }\n  714 |         ((char**) r_aliases)[n_names - 1] = NULL;","lines":49}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"boot_entry_compare() in bootspec.c is a translation of the EFI config_entry_compare() in src/boot/boot.c, where tries_left is a SIGNED value whose 'no boot counting' sentinel is a negative number (the EFI code reads `if (a->tries_left < 0 || b->tries_left < 0) return 0;`). In bootspec.c, tries_left/tries_done are `unsigned` with sentinel UINT_MAX (see bootspec.h:70-71,79-80), and the guard was translated as `if (a->tries_left != UINT_MAX || b->tries_left != UINT_MAX) return 0;`. This inverts the intent: it returns 0 (treats entries as equal) precisely when at least one entry HAS boot counting, and only falls through to the tries-based tiebreak when BOTH entries have NO boot counting (both == UINT_MAX). At that point CMP(a->tries_left,b->tries_left)=CMP(UINT_MAX,UINT_MAX)=0 and CMP(a->tries_done,b->tries_done)=CMP(UINT_MAX,UINT_MAX)=0, so lines 714-718 are entirely dead and the 'more tries left first / fewer tries done first' ordering is never applied. As a result, boot entries with boot-counting (foo+3-1.conf style) are not ordered by remaining tries in userspace tools (bootctl), diverging from sd-boot's actual boot order.","fix":"Change the guard to match the EFI semantics: `if (a->tries_left == UINT_MAX || b->tries_left == UINT_MAX) return 0;` so that the tries_left/tries_done comparison runs when BOTH entries have boot counting.","locations":[{"ref":"src/shared/bootspec.c:711-718","code":"  711 |         if (a->tries_left != UINT_MAX || b->tries_left != UINT_MAX)\n  712 |                 return 0;\n  713 | \n  714 |         r = -CMP(a->tries_left, b->tries_left);\n  715 |         if (r != 0)\n  716 |                 return r;\n  717 | \n  718 |         return CMP(a->tries_done, b->tries_done);","lines":8}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"group_record dispatch_per_machine's per_machine_dispatch_table only declares the \"matchMachineId\" and \"matchHostname\" keys, but the shared per_machine_match() (used for both user and group records) also recognizes \"matchNotMachineId\" and \"matchNotHostname\". The user-record per_machine table correctly lists all four match keys (with NULL handlers, so they are accepted as known fields). Because dispatch_per_machine() calls sd_json_dispatch() WITHOUT SD_JSON_ALLOW_EXTENSIONS (only json_flags are passed), a group record whose perMachine entry uses matchNotMachineId or matchNotHostname will be rejected by sd_json_dispatch with -EADDRNOTAVAIL (\"Unexpected object field\"), unless SD_JSON_PERMISSIVE is set. So those two match selectors are effectively unusable for group records even though per_machine_match() supports them - an inconsistency with user records and a functional defect.","fix":"Add the missing entries to group-record.c's per_machine_dispatch_table: { \"matchNotMachineId\", _SD_JSON_VARIANT_TYPE_INVALID, NULL, 0, 0 } and { \"matchNotHostname\", _SD_JSON_VARIANT_TYPE_INVALID, NULL, 0, 0 }, mirroring the user-record table.","locations":[{"ref":"src/shared/group-record.c:91-98","code":"   91 |         static const sd_json_dispatch_field per_machine_dispatch_table[] = {\n   92 |                 { \"matchMachineId\", _SD_JSON_VARIANT_TYPE_INVALID, NULL,                           0,                                     0             },\n   93 |                 { \"matchHostname\",  _SD_JSON_VARIANT_TYPE_INVALID, NULL,                           0,                                     0             },\n   94 |                 { \"gid\",            SD_JSON_VARIANT_UNSIGNED,      sd_json_dispatch_uid_gid,       offsetof(GroupRecord, gid),            0             },\n   95 |                 { \"members\",        SD_JSON_VARIANT_ARRAY,         json_dispatch_user_group_list,  offsetof(GroupRecord, members),        SD_JSON_RELAX },\n   96 |                 { \"administrators\", SD_JSON_VARIANT_ARRAY,         json_dispatch_user_group_list,  offsetof(GroupRecord, administrators), SD_JSON_RELAX },\n   97 |                 {},\n   98 |         };","lines":8},{"ref":"src/shared/group-record.c:109-122","code":"  109 |         JSON_VARIANT_ARRAY_FOREACH(e, variant) {\n  110 |                 if (!sd_json_variant_is_object(e))\n  111 |                         return json_log(variant, flags, SYNTHETIC_ERRNO(EINVAL), \"JSON field '%s' is not an array of objects.\", strna(name));\n  112 | \n  113 |                 r = per_machine_match(e, flags);\n  114 |                 if (r < 0)\n  115 |                         return r;\n  116 |                 if (r == 0)\n  117 |                         continue;\n  118 | \n  119 |                 r = sd_json_dispatch(e, per_machine_dispatch_table, flags, userdata);\n  120 |                 if (r < 0)\n  121 |                         return r;\n  122 |         }","lines":14},{"ref":"src/shared/user-record.c:1244-1269","code":" 1244 |         m = sd_json_variant_by_key(entry, \"matchNotMachineId\");\n 1245 |         if (m) {\n 1246 |                 r = per_machine_id_match(m, flags);\n 1247 |                 if (r < 0)\n 1248 |                         return r;\n 1249 |                 if (r == 0)\n 1250 |                         return true;\n 1251 |         }\n 1252 | \n 1253 |         m = sd_json_variant_by_key(entry, \"matchHostname\");\n 1254 |         if (m) {\n 1255 |                 r = per_machine_hostname_match(m, flags);\n 1256 |                 if (r < 0)\n 1257 |                         return r;\n 1258 |                 if (r > 0)\n 1259 |                         return true;\n 1260 |         }\n 1261 | \n 1262 |         m = sd_json_variant_by_key(entry, \"matchNotHostname\");\n 1263 |         if (m) {\n 1264 |                 r = per_machine_hostname_match(m, flags);\n 1265 |                 if (r < 0)\n 1266 |                         return r;\n 1267 |                 if (r == 0)\n 1268 |                         return true;\n 1269 |         }","lines":26},{"ref":"src/shared/user-record.c:1277-1280","code":" 1277 |                 { \"matchMachineId\",             _SD_JSON_VARIANT_TYPE_INVALID, NULL,                                 0,                                                   0              },\n 1278 |                 { \"matchNotMachineId\",          _SD_JSON_VARIANT_TYPE_INVALID, NULL,                                 0,                                                   0              },\n 1279 |                 { \"matchHostname\",              _SD_JSON_VARIANT_TYPE_INVALID, NULL,                                 0,                                                   0              },\n 1280 |                 { \"matchNotHostname\",           _SD_JSON_VARIANT_TYPE_INVALID, NULL,                                 0,                                                   0              },","lines":4}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"verb_list_automounts gates the whole listing loop on `if (argc == 1 || automounts)`, but `automounts` is the output array that is always NULL at this point (it is only populated inside the loop). The check is a copy-paste from the sibling verbs (verb_list_sockets uses `sockets_with_suffix`, verb_list_timers uses `timers_with_suffix`, verb_list_paths uses `units`); it should test the expanded-names strv `names`. As written, when the user passes any pattern argument (argc>1), the body is skipped entirely and `systemctl list-automounts <pattern>` always prints an empty list even when the pattern matches automount units.","fix":"Change the condition to `if (argc == 1 || names)` to match the other list verbs, so that supplying a pattern that expands to automount units actually enumerates them.","locations":[{"ref":"src/systemctl/systemctl-list-units.c:994","code":"  994 |         if (argc == 1 || automounts) {","lines":1}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"append_unit_dependencies() declares `char **deps;` uninitialized, then calls `(void) unit_get_dependencies(bus, *name, &deps);` ignoring the return value. unit_get_dependencies() only writes `*ret` (via TAKE_PTR) on success; on its error path (e.g. a transient bus failure / bus_map_all_properties failure) it returns negative WITHOUT touching `*ret`, leaving `deps` holding stack garbage. The garbage pointer is then passed to strv_extend_strv_consume(), which calls strv_length(deps) and iterates/free()s its elements - reading and freeing arbitrary pointers. This is reachable via `systemctl list-units --with-dependencies`, `systemctl cat --with-dependencies`, `systemctl list-unit-files --with-dependencies`, and `systemctl show --with-dependencies` whenever a per-unit dependency query fails.","fix":"Initialize `char **deps = NULL;` and check the result, e.g. `r = unit_get_dependencies(bus, *name, &deps); if (r < 0) continue;` (or propagate the error). With an explicit NULL initializer the existing `(void)` call would at least be memory-safe, but checking the return value is preferable.","locations":[{"ref":"src/systemctl/systemctl-util.c:749-770","code":"  749 | int append_unit_dependencies(sd_bus *bus, char **names, char ***ret) {\n  750 |         _cleanup_strv_free_ char **with_deps = NULL;\n  751 | \n  752 |         assert(bus);\n  753 |         assert(ret);\n  754 | \n  755 |         STRV_FOREACH(name, names) {\n  756 |                 char **deps;\n  757 | \n  758 |                 if (strv_extend(&with_deps, *name) < 0)\n  759 |                         return log_oom();\n  760 | \n  761 |                 (void) unit_get_dependencies(bus, *name, &deps);\n  762 | \n  763 |                 if (strv_extend_strv_consume(&with_deps, deps, /* filter_duplicates= */ true) < 0)\n  764 |                         return log_oom();\n  765 |         }\n  766 | \n  767 |         *ret = TAKE_PTR(with_deps);\n  768 | \n  769 |         return 0;\n  770 | }","lines":22},{"ref":"src/systemctl/systemctl-util.c:789-849","code":"  789 | int unit_get_dependencies(sd_bus *bus, const char *name, char ***ret) {\n  790 |         _cleanup_strv_free_ char **deps = NULL;\n  791 | \n  792 |         static const struct bus_properties_map map[_DEPENDENCY_MAX][7] = {\n  793 |                 [DEPENDENCY_FORWARD] = {\n  794 |                         { \"Requires\",    \"as\", NULL, 0 },\n  795 |                         { \"Requisite\",   \"as\", NULL, 0 },\n  796 |                         { \"Wants\",       \"as\", NULL, 0 },\n  797 |                         { \"ConsistsOf\",  \"as\", NULL, 0 },\n  798 |                         { \"BindsTo\",     \"as\", NULL, 0 },\n  799 |                         { \"Upholds\",     \"as\", NULL, 0 },\n  800 |                         {}\n  801 |                 },\n  802 |                 [DEPENDENCY_REVERSE] = {\n  803 |                         { \"RequiredBy\",  \"as\", NULL, 0 },\n  804 |                         { \"RequisiteOf\", \"as\", NULL, 0 },\n  805 |                         { \"WantedBy\",    \"as\", NULL, 0 },\n  806 |                         { \"PartOf\",      \"as\", NULL, 0 },\n  807 |                         { \"BoundBy\",     \"as\", NULL, 0 },\n  808 |                         { \"UpheldBy\",    \"as\", NULL, 0 },\n  809 |                         {}\n  810 |                 },\n  811 |                 [DEPENDENCY_AFTER] = {\n  812 |                         { \"After\",       \"as\", NULL, 0 },\n  813 |                         {}\n  814 |                 },\n  815 |                 [DEPENDENCY_BEFORE] = {\n  816 |                         { \"Before\",      \"as\", NULL, 0 },\n  817 |                         {}\n  818 |                 },\n  819 |         };\n  820 | \n  821 |         _cleanup_(sd_bus_error_free) sd_bus_error error = SD_BUS_ERROR_NULL;\n  822 |         _cleanup_free_ char *dbus_path = NULL;\n  823 |         int r;\n  824 | \n  825 |         assert(bus);\n  826 |         assert(name);\n  827 |         assert(ret);\n  828 | \n  829 |         dbus_path = unit_dbus_path_from_name(name);\n  830 |         if (!dbus_path)\n  831 |                 return log_oom();\n  832 | \n  833 |         r = bus_map_all_properties(bus,\n  834 |                                    \"org.freedesktop.systemd1\",\n  835 |                                    dbus_path,\n  836 | ysupdate.c:355","code":"  355 |                                 if (cursor && strverscmp(i->metadata.version, cursor) <= 0)","lines":1}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"IMPORT{program} truncation handling mutates the wrong buffer. When the program's output is truncated to fit the result buffer, the code is supposed to drop the last (incomplete) line of the *result* so a half-read key=value pair is not imported as a device property. Instead the loop iterates over and NUL-terminates `buf` (the command string, only used afterwards for logging), while `strv_split_newlines_full()` then parses the unmodified `result` - including the truncated final line. The safety feature (added in commit 6b6e471a32 and described by the log message \"ignoring the last line of the result\") has never actually worked: a truncated property value still gets imported. The two buffers are the same size (UDEV_LINE_SIZE) so this is not memory-unsafe, but it is a real correctness bug on the program-output path.","fix":"Operate on `result` instead of `buf`: change the strlen/PTR_SUB1 scan and the `buf[0] = '\\0'` fallback to use `result`, e.g. `for (char *p = PTR_SUB1(result + strlen(result), result); ...)` and `if (!found) result[0] = '\\0';`. The log message may keep using `buf` for the command name.","locations":[{"ref":"src/udev/udev-rules.c:2480-2495","code":" 2480 |                 if (truncated) {\n 2481 |                         log_event_debug(event, token, \"Result of \\\"%s\\\" is too long and truncated, ignoring the last line of the result.\", buf);\n 2482 | \n 2483 |                         /* Drop the last line. */\n 2484 |                         bool found = false;\n 2485 |                         for (char *p = PTR_SUB1(buf + strlen(buf), buf); p; p = PTR_SUB1(p, buf))\n 2486 |                                 if (strchr(NEWLINE, *p)) {\n 2487 |                                         *p = '\\0';\n 2488 |                                         found = true;\n 2489 |                                         break;\n 2490 |                                 }\n 2491 |                         if (!found)\n 2492 |                                 buf[0] = '\\0';\n 2493 |                 }\n 2494 | \n 2495 |                 r = strv_split_newlines_full(&lines, result, EXTRACT_RETAIN_ESCAPE);","lines":16}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"In veritysetup's parse_options(), the `tpm2-measure-nvpcr=` handler uses `return 0` to indicate the option disables measurement (when value is empty/false) or has an invalid NvPCR name. But unlike every other option branch (which sets state and lets the for(;;) loop continue), this `return 0` aborts the entire option-parsing loop. Any crypttab/integritytab options listed after `tpm2-measure-nvpcr=` (e.g. `...,tpm2-measure-nvpcr=no,ignore-corruption`) are silently dropped and never applied. The analogous code in cryptsetup.c (tpm2-measure-keyslot-nvpcr=) is correct only because there it lives in a per-option helper (parse_one_option) where `return 0` means 'this one option done'.","fix":"Replace the two `return 0;` statements in the tpm2-measure-nvpcr= branch with `continue;` (or restructure to fall through to the loop) so the remaining comma-separated options keep being parsed. Set arg_tpm2_measure_nvpcr to NULL/skip but do not exit the loop.","locations":[{"ref":"src/veritysetup/veritysetup.c:298-309","code":"  298 |                 } else if ((val = startswith(word, \"tpm2-measure-nvpcr=\"))) {\n  299 |                         r = isempty(val) ? 0 : parse_boolean(val);\n  300 |                         if (r == 0) {\n  301 |                                 arg_tpm2_measure_nvpcr = mfree(arg_tpm2_measure_nvpcr);\n  302 |                                 return 0;\n  303 |                         }\n  304 |                         if (r > 0)\n  305 |                                 val = \"verity\";\n  306 |                         else if (!tpm2_nvpcr_name_is_valid(val)) {\n  307 |                                 log_warning(\"Invalid NvPCR name, ignoring: %s\", word);\n  308 |                                 return 0;\n  309 |                         }","lines":12}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"parse_loadavg_fixed_point() treats the fractional part of the input as hundredths regardless of how many digits were actually written. It splits on '.', parses the substring after the dot as an integer `f`, and passes it to store_loadavg_fixed_point() which computes `f << BITS / 100` (i.e. assumes `f` is a value out of 100). For input like \"1.5\" the fractional string is \"5\", parsed to f=5 and interpreted as 0.05 instead of 0.5; \"1.05\" and \"1.5\" therefore decode to the same value. This is only correct for inputs that always use exactly two decimal digits. The current sole producer is the kernel's /proc/loadavg (always 2 digits), so it is not a live bug, but the parser silently mis-scales any other two-or-fewer-digit fractional input.","fix":"Either document/assert that the fractional part must be exactly two digits, or scale `f` by the number of digits consumed (e.g. multiply/divide so a 1-digit fraction is treated as tenths) before calling store_loadavg_fixed_point().","locations":[{"ref":"src/basic/parse-util.c:779-819","code":"  779 | int store_loadavg_fixed_point(unsigned long i, unsigned long f, loadavg_t *ret) {\n  780 |         assert(ret);\n  781 | \n  782 |         if (i >= (~0UL << LOADAVG_PRECISION_BITS))\n  783 |                 return -ERANGE;\n  784 | \n  785 |         i = i << LOADAVG_PRECISION_BITS;\n  786 |         f = DIV_ROUND_UP((f << LOADAVG_PRECISION_BITS), 100);\n  787 | \n  788 |         if (f >= LOADAVG_FIXED_POINT_1_0)\n  789 |                 return -ERANGE;\n  790 | \n  791 |         *ret = i | f;\n  792 |         return 0;\n  793 | }\n  794 | \n  795 | int parse_loadavg_fixed_point(const char *s, loadavg_t *ret) {\n  796 |         const char *d, *f_str, *i_str;\n  797 |         unsigned long i, f;\n  798 |         int r;\n  799 | \n  800 |         assert(s);\n  801 |         assert(ret);\n  802 | \n  803 |         d = strchr(s, '.');\n  804 |         if (!d)\n  805 |                 return -EINVAL;\n  806 | \n  807 |         i_str = strndupa_safe(s, d - s);\n  808 |         f_str = d + 1;\n  809 | \n  810 |         r = safe_atolu_full(i_str, 10, &i);\n  811 |         if (r < 0)\n  812 |                 return r;\n  813 | \n  814 |         r = safe_atolu_full(f_str, 10, &f);\n  815 |         if (r < 0)\n  816 |                 return r;\n  817 | \n  818 |         return store_loadavg_fixed_point(i, f, ret);\n  819 | }","lines":41}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"verify_gpt() validates the GPT header but accepts SizeOfPartitionEntry == 0: the only relevant check is `(h->SizeOfPartitionEntry % sizeof(EFI_PARTITION_ENTRY)) != 0` (0 % 128 == 0 passes) and the subsequent overflow check `SizeOfPartitionEntry > SIZE_MAX/NumberOfPartitionEntries` is false for 0. With SizeOfPartitionEntry==0, read_gpt_entries() computes size = 0*N = 0 and does xmalloc(0). In try_gpt()/disk_get_part_uuid_eltorito() the loop then dereferences `(EFI_PARTITION_ENTRY*)(entries + 0*i)` for every i, reading 128 bytes from a zero-length allocation -> out-of-bounds heap read from attacker-controlled on-disk GPT data. In practice this is mitigated only because BS->CalculateCrc32 over a 0-byte buffer is supposed to return EFI_INVALID_PARAMETER per the UEFI spec (so the CRC check would bail out before the loop), but the code does not rely on that and firmware behavior here is not guaranteed.","fix":"In verify_gpt(), reject SizeOfPartitionEntry that is smaller than sizeof(EFI_PARTITION_ENTRY) (e.g. `if (h->SizeOfPartitionEntry < sizeof(EFI_PARTITION_ENTRY) || (h->SizeOfPartitionEntry % sizeof(EFI_PARTITION_ENTRY)) != 0) return false;`), so a zero (or undersized) entry size can never reach the entry-reading loop.","locations":[{"ref":"src/boot/part-discovery.c:63-74","code":"   63 |         if ((h->SizeOfPartitionEntry % sizeof(EFI_PARTITION_ENTRY)) != 0)\n   64 |                 return false;\n   65 | \n   66 |         if (h->NumberOfPartitionEntries <= 0 || h->NumberOfPartitionEntries > 1024)\n   67 |                 return false;\n   68 | \n   69 |         /* overflow check */\n   70 |         if (h->SizeOfPartitionEntry > SIZE_MAX / h->NumberOfPartitionEntries)\n   71 |                 return false;\n   72 | \n   73 |         return true;\n   74 | }","lines":12},{"ref":"src/boot/part-discovery.c:114-118","code":"  114 |         size = (size_t) gpt.SizeOfPartitionEntry * (size_t) gpt.NumberOfPartitionEntries;\n  115 |         if (size == SIZE_MAX) /* overflow check */\n  116 |                 return log_debug_status(EFI_OUT_OF_RESOURCES, \"GPT partition entries size overflow: %m\");\n  117 | \n  118 |         _cleanup_free_ void *entries = xmalloc(size);","lines":5},{"ref":"src/boot/part-discovery.c:165-167","code":"  165 |         for (size_t i = 0; i < gpt.NumberOfPartitionEntries; i++) {\n  166 |                 EFI_PARTITION_ENTRY *entry =\n  167 |                                 (EFI_PARTITION_ENTRY *) ((uint8_t *) entries + gpt.SizeOfPartitionEntry * i);","lines":3}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In write_netlabel_rules() the write-error check is inverted: 'if (!fputs(buf, dst))'. fputs() returns a nonnegative value on success and EOF (a negative, non-zero value) on failure, so '!fputs(...)' evaluates to true only when fputs returns 0 (an empty successful write) and is false on an actual EOF error. The intended error branch therefore never runs on write failure; the specific 'Failed to write line' diagnostic is effectively dead code. Real write errors are still caught indirectly by the following fflush_and_check(), so impact is limited to a misleading/dead error path rather than a fully swallowed error.","fix":"Change the condition to detect EOF, e.g. 'if (fputs(buf, dst) == EOF) { ... }', so the write-failure path is actually exercised.","locations":[{"ref":"src/core/smack-setup.c:232-236","code":"  232 |                         if (!fputs(buf, dst)) {\n  233 |                                 log_error_errno(errno, \"Failed to write line to %s: %m\", \"/sys/fs/smackfs/netlabel\");\n  234 |                                 RET_GATHER(r, -errno);\n  235 |                                 break;\n  236 |                         }","lines":5}]},{"id":"LOGIC_18","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"For the `sector-size=` crypttab option, the modulo check (`% 2`) logs a warning and `return 0` (ignoring the bad value, keeping the default). However the out-of-range check (value < CRYPT_SECTOR_SIZE or > CRYPT_MAX_SECTOR_SIZE) only logs a warning and does NOT reset/ignore the value, so an out-of-range sector size from crypttab is still copied into arg_sector_size and later passed to crypt_format() in plain mode. Inconsistent with the adjacent modulo handling and with the warning text ('ignoring').","fix":"After the out-of-range warning, `return 0;` (and likely reset arg_sector_size to CRYPT_SECTOR_SIZE) so the invalid value is actually ignored as the message claims.","locations":[{"ref":"src/cryptsetup/cryptsetup.c:209-223","code":"  209 |         } else if ((val = startswith(option, \"sector-size=\"))) {\n  210 | \n  211 |                 r = safe_atou(val, &arg_sector_size);\n  212 |                 if (r < 0) {\n  213 |                         log_warning_errno(r, \"Failed to parse %s, ignoring: %m\", option);\n  214 |                         return 0;\n  215 |                 }\n  216 | \n  217 |                 if (arg_sector_size % 2) {\n  218 |                         log_warning(\"sector-size= not a multiple of 2, ignoring.\");\n  219 |                         return 0;\n  220 |                 }\n  221 | \n  222 |                 if (arg_sector_size < CRYPT_SECTOR_SIZE || arg_sector_size > CRYPT_MAX_SECTOR_SIZE)\n  223 |                         log_warning(\"sector-size= is outside of %u and %u, ignoring.\", CRYPT_SECTOR_SIZE, CRYPT_MAX_SECTOR_SIZE);","lines":15}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In manager_rebalance_calculate(), the code tracks the home directory with the least free space to scale the next rebalance interval: it compares the candidate's computed `new_free` against `min_free` but then stores `h->rebalance_size` (the total size, not the free space) into `min_free`. The comparison value and the stored value are mismatched, so `min_free` ends up holding a total size rather than the smallest free space. This feeds log2u64(min_free) for the rebalance interval, so the adaptive scheduling interval is computed from the wrong quantity. Cosmetic/heuristic impact only (just affects how soon the next rebalance is scheduled).","fix":"Store the compared value: `if (new_free < min_free) min_free = new_free;` (matching the comment about 'least amount of space left').","locations":[{"ref":"src/home/homed-manager.c:1911-1912","code":" 1911 |                 if (new_free < min_free)\n 1912 |                         min_free = h->rebalance_size;","lines":2}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"journal_file_setup_data_hash_table() zeroes only `s` bytes instead of `s * sizeof(HashItem)` bytes of the freshly appended data hash table object. The allocation is `offsetof(Object, hash_table.items) + s * sizeof(HashItem)` and the corresponding field-hash-table function (journal_file_setup_field_hash_table, line 1333) correctly does `memzero(o->hash_table.items, s * sizeof(HashItem))`. Here `s` is an item COUNT (since commit fbbcd0edef switched these constants to counts), so this memzero only clears the first 1/8th of the table (HashItem is 16 bytes). In practice this is currently harmless because the object lives in space just obtained from posix_fallocate_loop(), which POSIX guarantees is zero-filled, so the uninitialized tail already reads as zero. But it is a real correctness/consistency bug: the intent is clearly to zero the whole table, and if the allocation path ever changes to reuse non-zeroed storage, uninitialized hash-table slots would be written to a persistent on-disk structure, corrupting the data hash table.","fix":"Change `memzero(o->hash_table.items, s);` to `memzero(o->hash_table.items, s * sizeof(HashItem));` to match the allocated size and the field-hash-table implementation.","locations":[{"ref":"src/libsystemd/sd-journal/journal-file.c:1304","code":" 1304 |         memzero(o->hash_table.items, s);","lines":1},{"ref":"src/libsystemd/sd-journal/journal-file.c:1297-1307","code":" 1297 |         r = journal_file_append_object(f,\n 1298 |                                        OBJECT_DATA_HASH_TABLE,\n 1299 |                                        offsetof(Object, hash_table.items) + s * sizeof(HashItem),\n 1300 |                                        &o, &p);\n 1301 |         if (r < 0)\n 1302 |                 return r;\n 1303 | \n 1304 |         memzero(o->hash_table.items, s);\n 1305 | \n 1306 |         f->header->data_hash_table_offset = htole64(p + offsetof(Object, hash_table.items));\n 1307 |         f->header->data_hash_table_size = htole64(s * sizeof(HashItem));","lines":11},{"ref":"src/libsystemd/sd-journal/journal-file.c:1333","code":" 1333 |         memzero(o->hash_table.items, s * sizeof(HashItem));","lines":1}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In json_dispatch_pidref(), when a pidfd inode number is provided (data.fd_id > 0) and a local pidfd was acquired (np.fd >= 0), pidref_acquire_pidfd_id() may fail with a 'not supported' errno. The code deliberately tolerates that error (it skips the return when ERRNO_IS_NOT_SUPPORTED(r)), but then still proceeds to compare data.fd_id against np.fd_id. Because the acquire failed, np.fd_id was never populated (remains 0), so the comparison data.fd_id != np.fd_id is true, causing a spurious 'non-matching inode number' rejection (-ESRCH under SD_JSON_STRICT) even though the mismatch is actually due to lack of kernel support, not an authentication failure. This is reachable from JSON/Varlink input but only under SD_JSON_STRICT and only on kernels lacking pidfd id support.","fix":"After tolerating a NOT_SUPPORTED failure from pidref_acquire_pidfd_id(), skip the inode-number comparison (e.g. only compare when the acquire succeeded), mirroring the 'operating without pidfd' branch that just stores data.fd_id without validating it.","locations":[{"ref":"src/libsystemd/sd-json/json-util.c:528-543","code":"  528 |                 if (data.fd_id > 0) {\n  529 |                         if (np.fd >= 0) {\n  530 |                                 r = pidref_acquire_pidfd_id(&np);\n  531 |                                 if (r < 0 && !ERRNO_IS_NOT_SUPPORTED(r))\n  532 |                                         return json_log(variant, flags, r, \"Unable to get pidfd ID to validate JSON field '%s': %m\", strna(name));\n  533 | \n  534 |                                 if (data.fd_id != np.fd_id) {\n  535 |                                         json_log(variant, flags | (FLAGS_SET(flags, SD_JSON_STRICT) ? 0 : SD_JSON_DEBUG), 0, \"JSON field '%s' references PID with non-matching inode number.\", strna(name));\n  536 |                                         if (FLAGS_SET(flags, SD_JSON_STRICT))\n  537 |                                                 return -ESRCH;\n  538 |                                 }\n  539 |                         } else {\n  540 |                                 json_log(variant, flags|SD_JSON_DEBUG, 0, \"Not validating PID inode number on JSON field '%s', because operating without pidfd.\", strna(name));\n  541 |                                 np.fd_id = data.fd_id;\n  542 |                         }\n  543 |                 }","lines":16}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Broken else-if chain in decode_netdev(): the bridge branch is terminated with `} if (streq(info->netdev_kind, \"bond\"))` instead of `} else if (...)`. Every other branch in the kind dispatch uses `else if`, so this is clearly a typo. It is currently functionally harmless because netdev_kind holds a single mutually-exclusive string (when kind==\"bridge\" the bond `if` evaluates false; the subsequent vxlan/vlan/... else-if chain hangs off the bond `if`), but it is a latent fragility: any future code added to the bridge block that also matched the bond test, or refactoring of the chain, would silently misbehave. It also defeats the short-circuit intent of the chain.","fix":"Change line 76 from `} if (streq(info->netdev_kind, \"bond\")) {` to `} else if (streq(info->netdev_kind, \"bond\")) {` so the bridge/bond/vxlan/... branches form a single coherent else-if chain.","locations":[{"ref":"src/network/networkctl-link-info.c:63-81","code":"   63 |         if (streq(info->netdev_kind, \"bridge\")) {\n   64 |                 (void) sd_netlink_message_read_u32(m, IFLA_BR_FORWARD_DELAY, &info->forward_delay);\n   65 |                 (void) sd_netlink_message_read_u32(m, IFLA_BR_HELLO_TIME, &info->hello_time);\n   66 |                 (void) sd_netlink_message_read_u32(m, IFLA_BR_MAX_AGE, &info->max_age);\n   67 |                 (void) sd_netlink_message_read_u32(m, IFLA_BR_AGEING_TIME, &info->ageing_time);\n   68 |                 (void) sd_netlink_message_read_u32(m, IFLA_BR_STP_STATE, &info->stp_state);\n   69 |                 (void) sd_netlink_message_read_u32(m, IFLA_BRPORT_COST, &info->cost);\n   70 |                 (void) sd_netlink_message_read_u16(m, IFLA_BR_PRIORITY, &info->priority);\n   71 |                 (void) sd_netlink_message_read_u8(m, IFLA_BR_MCAST_IGMP_VERSION, &info->mcast_igmp_version);\n   72 |                 (void) sd_netlink_message_read_u8(m, IFLA_BRPORT_STATE, &info->port_state);\n   73 |                 if (sd_netlink_message_read_u32(m, IFLA_BR_FDB_MAX_LEARNED, &info->fdb_max_learned) >= 0 &&\n   74 |                     sd_netlink_message_read_u32(m, IFLA_BR_FDB_N_LEARNED, &info->fdb_n_learned) >= 0)\n   75 |                         info->has_fdb_learned = true;\n   76 |         } if (streq(info->netdev_kind, \"bond\")) {\n   77 |                 (void) sd_netlink_message_read_u8(m, IFLA_BOND_MODE, &info->mode);\n   78 |                 (void) sd_netlink_message_read_u32(m, IFLA_BOND_MIIMON, &info->miimon);\n   79 |                 (void) sd_netlink_message_read_u32(m, IFLA_BOND_DOWNDELAY, &info->downdelay);\n   80 |                 (void) sd_netlink_message_read_u32(m, IFLA_BOND_UPDELAY, &info->updelay);\n   81 |         } else if (streq(info->netdev_kind, \"vxlan\")) {","lines":19}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"The per-userns delegation limits for cgroups and network interfaces are enforced with '>' instead of '>=', so they admit one entry beyond the documented maximum. In vl_method_add_cgroup_to_user_namespace the check 'userns_info->n_cgroups > USER_NAMESPACE_CGROUPS_DELEGATE_MAX' runs before userns_info_add_cgroup(), so when n_cgroups already equals the max (16) the check passes and a 17th cgroup is added. Likewise vl_method_add_netif_to_user_namespace checks 'strv_length(userns_info->netifs) > USER_NAMESPACE_NETIFS_DELEGATE_MAX' before adding, allowing a 17th interface. Both are soft anti-DoS caps so impact is minor, but the effective limit is MAX+1 rather than MAX.","fix":"Use '>=' for both pre-insertion checks (n_cgroups >= USER_NAMESPACE_CGROUPS_DELEGATE_MAX and strv_length(netifs) >= USER_NAMESPACE_NETIFS_DELEGATE_MAX) so the count never exceeds the documented maximum.","locations":[{"ref":"src/nsresourced/nsresourcework.c:1947-1948","code":" 1947 |         if (userns_info->n_cgroups > USER_NAMESPACE_CGROUPS_DELEGATE_MAX)\n 1948 |                 return sd_varlink_error(link, \"io.systemd.NamespaceResource.TooManyControlGroups\", NULL);","lines":2},{"ref":"src/nsresourced/nsresourcework.c:2341-2342","code":" 2341 |         if (strv_length(userns_info->netifs) > USER_NAMESPACE_NETIFS_DELEGATE_MAX)\n 2342 |                 return sd_varlink_error(link, \"io.systemd.NamespaceResource.TooManyNetworkInterfaces\", NULL);","lines":2}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In dns_transaction_cache_answer(), the decision whether to cache the full packet alongside the answer uses `t->answer_ede_rcode > 0`. EDE rcodes are valid starting at 0 (DNS_EDE_RCODE_OTHER == 0, confirmed by an assert_cc in test-resolved-dummy-server.c), and the sentinel for \"no EDE\" is _DNS_EDE_RCODE_INVALID == -1. The `> 0` test therefore treats a present, valid EDE code of 0 (e.g. SERVFAIL with EDE \"Other Error\" plus a diagnostic message) as if no EDE were present, so the full packet (and the EDE info it carries) is not cached. The correct comparison is `>= 0`, matching how the same field is tested elsewhere in the file (e.g. lines 911-915 in dns_transaction_dnssec_ready use `dt->answer_ede_rcode >= 0`). Impact is only a missed caching optimization for one EDE code value; no correctness or security consequence.","fix":"Change the condition from `t->answer_ede_rcode > 0` to `t->answer_ede_rcode >= 0` so that a valid EDE code of 0 (DNS_EDE_RCODE_OTHER) is treated as present, consistent with the `_DNS_EDE_RCODE_INVALID == -1` sentinel.","locations":[{"ref":"src/resolve/resolved-dns-transaction.c:849-850","code":"  849 |                       /* If neither DO nor EDE is set, the full packet isn't useful to cache */\n  850 |                       dns_packet_do(t->received) || t->answer_ede_rcode > 0 || t->answer_ede_msg ? t->received : NULL,","lines":2}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In clean_posix_shm_internal(), when a subdirectory is recursed into, only a negative return value is propagated (`if (r < 0) ret = r;`). A positive return from the recursive call is silently dropped. This breaks the function's documented contract in two ways: (1) in non-rm 'search' mode the recursive call returns 1 when it finds a matching IPC object inside a subdirectory, but the parent discards that 1 and keeps iterating, so clean_ipc_internal(rm=false) can report 0 ('no matching objects') even though a match exists in a nested /dev/shm subdirectory; (2) in rm mode, when sub-objects were actually removed (recursion returns >0) but the parent directory itself does not match the uid/gid, the 'something was removed' signal (positive ret) is lost, so the overall return value can stay 0. Impact is limited in practice because all current callers use rm=true and only test for r<0, but the contract is violated.","fix":"After the recursive call, propagate positive results too, e.g.: `r = clean_posix_shm_internal(...); if (r < 0) ret = r; else if (r > 0) { if (!rm) return 1; if (ret == 0) ret = 1; }` (mirroring how the leaf-file branch reports matches/removals).","locations":[{"ref":"src/shared/clean-ipc.c:246-249","code":"  246 |                                 r = clean_posix_shm_internal(de->d_name, kid, uid, gid, rm);\n  247 |                                 if (r < 0)\n  248 |                                         ret = r;\n  249 |                         }","lines":4}]},{"id":"LOGIC_26","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"Swap-area selection for hibernation does not honor the documented 'highest priority swap with most remaining space' rule. The condition `swap->priority > entry->priority || swap->size - swap->used > entry->size - entry->used` is an OR, so a swap with LOWER priority but more free space replaces a higher-priority candidate. Because the two criteria are not lexicographically ordered (priority first, then free space), the chosen device depends on enumeration order and can violate the kernel's priority semantics. This only matters when resume=/resume_offset are NOT set on the kernel command line and the system has multiple active swap areas of differing priority, so impact is limited.","fix":"Order the criteria so priority dominates: e.g. `if (!entry || swap->priority > entry->priority || (swap->priority == entry->priority && (swap->size - swap->used) > (entry->size - entry->used)))`.","locations":[{"ref":"src/shared/hibernate-util.c:381-384","code":"  381 |                 if (!entry ||\n  382 |                     swap->priority > entry->priority ||\n  383 |                     swap->size - swap->used > entry->size - entry->used)\n  384 |                         entry = swap;","lines":4}]},{"id":"LOGIC_27","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"log_func_gnutls() always logs gnutls_log_map[level].names[1] as the category name, but several map entries only populate names[0] (level 0 = {\"0\"}, level 8 = {\"8\"}). For those levels names[1] is NULL, so the %s argument is NULL. glibc/systemd logging renders NULL as \"(null)\" rather than crashing, but the logged category name is wrong/missing. Only triggers when the corresponding gnutls log level fires and the category has been enabled (e.g. via --gnutls-log=all).","fix":"Log a meaningful name, e.g. names[0] (the numeric level) or names[1] ?: names[0], instead of unconditionally dereferencing names[1].","locations":[{"ref":"src/shared/microhttpd-util.c:154-164","code":"  154 | static void log_func_gnutls(int level, const char *message) {\n  155 |         assert_se(message);\n  156 | \n  157 |         if (0 <= level && level < (int) ELEMENTSOF(gnutls_log_map)) {\n  158 |                 if (gnutls_log_map[level].enabled)\n  159 |                         log_internal(gnutls_log_map[level].level, 0, NULL, 0, NULL, \"gnutls %d/%s: %s\", level, gnutls_log_map[level].names[1], message);\n  160 |         } else {\n  161 |                 log_debug(\"Received GNUTLS message with unknown level %d.\", level);\n  162 |                 log_internal(LOG_DEBUG, 0, NULL, 0, NULL, \"gnutls: %s\", message);\n  163 |         }\n  164 | }","lines":11}]},{"id":"LOGIC_28","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"user_name_fuzzy_match() is declared to return bool but contains `return -ENOMEM;` on strdup failure (two places). As a bool, -ENOMEM is non-zero, i.e. true. Its callers user_record_match() and group_record_match() interpret a true return as \"the record matches the fuzzy search\". So under memory pressure a record that should not match (or whose match could not be evaluated) is incorrectly reported as matching, silently including wrong entries in userdb search results instead of propagating an error. Type confusion between bool and an int errno.","fix":"Either change user_name_fuzzy_match() to return int (negative errno on OOM, 0/1 otherwise) and have callers treat r < 0 as an error, or replace the failing strdup with a non-failing approach; at minimum do not return a negative errno from a bool function (return false on OOM is still wrong semantically but avoids the spurious true).","locations":[{"ref":"src/shared/user-record.c:2810-2844","code":" 2810 | bool user_name_fuzzy_match(const char *names[], size_t n_names, char **matches) {\n 2811 |         assert(names || n_names == 0);\n 2812 | \n 2813 |         /* Checks if any of the user record strings in the names[] array matches any of the search strings in\n 2814 |          * the matches** strv fuzzily. */\n 2815 | \n 2816 |         FOREACH_ARRAY(n, names, n_names) {\n 2817 |                 if (!*n)\n 2818 |                         continue;\n 2819 | \n 2820 |                 _cleanup_free_ char *lcn = strdup(*n);\n 2821 |                 if (!lcn)\n 2822 |                         return -ENOMEM;\n 2823 | \n 2824 |                 ascii_strlower(lcn);\n 2825 | \n 2826 |                 STRV_FOREACH(i, matches) {\n 2827 |                         _cleanup_free_ char *lc = strdup(*i);\n 2828 |                         if (!lc)\n 2829 |                                 return -ENOMEM;\n 2830 | \n 2831 |                         ascii_strlower(lc);\n 2832 | \n 2833 |                         /* First do substring check */\n 2834 |                         if (strstr(lcn, lc))\n 2835 |                                 return true;\n 2836 | \n 2837 |                         /* Then do some fuzzy string comparison (but only if the needle is non-trivially long) */\n 2838 |                         if (strlen(lc) >= 5 && strlevenshtein(lcn, lc) < 3)\n 2839 |                                 return true;\n 2840 |                 }\n 2841 |         }\n 2842 | \n 2843 |         return false;\n 2844 | }","lines":35},{"ref":"src/shared/user-record.c:2821-2822","code":" 2821 |                 if (!lcn)\n 2822 |                         return -ENOMEM;","lines":2},{"ref":"src/shared/user-record.c:2828-2829","code":" 2828 |                         if (!lc)\n 2829 |                                 return -ENOMEM;","lines":2},{"ref":"src/shared/user-record.c:2877-2879","code":" 2877 |                 if (!user_name_fuzzy_match(names, ELEMENTSOF(names), match->fuzzy_names) &&\n 2878 |                     !user_name_fuzzy_match((const char**) u->aliases, strv_length(u->aliases), match->fuzzy_names))\n 2879 |                         return false;","lines":3},{"ref":"src/shared/group-record.c:373","code":"  373 |                 if (!user_name_fuzzy_match(names, ELEMENTSOF(names), match->fuzzy_names))","lines":1}]},{"id":"LOGIC_29","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"Off-by-one in the connection-limit check. context_add_connection() checks `set_size(context->connections) > arg_connections_max` BEFORE inserting the new connection into the set. When there are already exactly arg_connections_max connections, the comparison is false and a further connection is accepted, so the daemon actually permits arg_connections_max + 1 simultaneous connections rather than the configured maximum.","fix":"Use `>=` so the limit is enforced before exceeding it: `if (set_size(context->connections) >= arg_connections_max)`.","locations":[{"ref":"src/socket-proxy/socket-proxyd.c:402-403","code":"  402 |         if (set_size(context->connections) > arg_connections_max)\n  403 |                 return log_warning_errno(SYNTHETIC_ERRNO(EBUSY), \"Hit connection limit, refusing connection.\");","lines":2}]},{"id":"LOGIC_30","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In block_device_pick_name(), when two symlinks share the same preferred prefix and the newly seen symlink sorts higher than the one already stored in found[i] (path_compare(*sl, found[i]) > 0), the code does `continue` and never adds the new (higher) symlink to the aliases strv. The kept lower symlink becomes the canonical name, but the discarded higher one is silently dropped from the alias list instead of being recorded as an alias. (The symmetric case, where the new symlink is lower, correctly moves the old one into aliases.) This loses an alias that should be reported.","fix":"In the `found[i]` branch, when keeping the existing one (path_compare > 0), still record the new symlink as an alias before continuing, e.g. add `r = strv_extend(&aliases, *sl); if (r < 0) return r; continue;` instead of a bare continue.","locations":[{"ref":"src/storage/storage-block.c:61-75","code":"   61 |                         if (found[i]) {\n   62 |                                 /* Two symlinks with the same prefix? Then keep the lower one. */\n   63 |                                 if (path_compare(*sl, found[i]) > 0)\n   64 |                                         continue;\n   65 | \n   66 |                                 r = strv_extend(&aliases, found[i]);\n   67 |                                 if (r < 0)\n   68 |                                         return r;\n   69 |                         }\n   70 | \n   71 |                         found[i] = *sl;\n   72 |                         if (i < best)\n   73 |                                 best = i;\n   74 |                         matched = true;\n   75 |                 }","lines":15}]},{"id":"LOGIC_31","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In systemctl_parse_argv the `--kill-value=` option handler does `if (isempty(opts.arg)) { arg_kill_value_set = false; return 0; }`. Returning 0 from the parse function makes run() (which does `if (r <= 0) goto finish; return r;`) silently exit with status 0 without executing the requested verb. Every other option handler that wants to clear/ignore a value (e.g. `--kill-subgroup=`, `--kernel-cmdline=`) uses `break`. So `systemctl --kill-value= kill foo.service` does nothing and reports success instead of killing the unit.","fix":"Replace `return 0;` with `break;` so an empty `--kill-value=` just resets arg_kill_value_set and continues parsing/executing the command.","locations":[{"ref":"src/systemctl/systemctl.c:542-548","code":"  542 |                 OPTION_LONG(\"kill-value\", \"INT\", \"Signal value to enqueue\"): {\n  543 |                         unsigned u;\n  544 | \n  545 |                         if (isempty(opts.arg)) {\n  546 |                                 arg_kill_value_set = false;\n  547 |                                 return 0;\n  548 |                         }","lines":7}]},{"id":"LOGIC_32","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":true,"description":"shall_set_terminal_title() caches the result of getenv_bool() in a static int, but only the unset case (-ENXIO) and the success case are actually cached for future calls. On a *parse* error (e.g. SYSTEMD_ADJUST_TERMINAL_TITLE set to garbage, getenv_bool returns a negative errno like -EINVAL), cache holds that negative value. The next invocation sees `cache >= 0` as false, so it re-runs getenv_bool() and re-logs the debug warning every time the function is called - the caching is defeated on the error path. Functionally harmless (it keeps returning true), just slightly wasteful and noisy. Note this mirrors the exact established pattern of shall_tint_background() in src/shared/pretty-print.c, so it is an accepted idiom in the codebase rather than a real defect.","fix":"If strict caching of the error path were desired, set `cache = true;` (or 0) explicitly before returning on the `cache < 0` branch, e.g. `return (cache = true);`. Given it matches the codebase-wide idiom, leaving it as-is is also reasonable.","locations":[{"ref":"src/shared/ptyfwd.c:424-437","code":"  424 | bool shall_set_terminal_title(void) {\n  425 |         static int cache = -1;\n  426 | \n  427 |         if (cache >= 0)\n  428 |                 return cache;\n  429 | \n  430 |         cache = getenv_bool(\"SYSTEMD_ADJUST_TERMINAL_TITLE\");\n  431 |         if (cache == -ENXIO)\n  432 |                 return (cache = true);\n  433 |         if (cache < 0)\n  434 |                 log_debug_errno(cache, \"Failed to parse $SYSTEMD_ADJUST_TERMINAL_TITLE, leaving terminal title setting enabled: %m\");\n  435 | \n  436 |         return cache != 0;\n  437 | }","lines":14}]},{"id":"LOGIC_33","type":"logic_error","type_label":"Logic Error","severity":"negligible","easy":false,"description":"In create_device(), the success debug log prints the device major/minor extracted from i->mode (the file permission bits) instead of i->major_minor (the parsed device number). i->mode holds permission/type bits, so major()/minor() applied to it yields meaningless numbers. The actual device number that was passed to mknodat() is i->major_minor. This is a cosmetic/diagnostic bug only (debug log), but it makes the log message wrong and could mislead during debugging of device-node creation.","fix":"Change major(i->mode), minor(i->mode) to major(i->major_minor), minor(i->major_minor).","locations":[{"ref":"src/tmpfiles/tmpfiles.c:2565-2568","code":" 2565 |         log_debug(\"%s %s device node \\\"%s\\\" %u:%u.\",\n 2566 |                   creation_mode_verb_to_string(creation),\n 2567 |                   i->type == CREATE_BLOCK_DEVICE ? \"block\" : \"char\",\n 2568 |                   i->path, major(i->mode), minor(i->mode));","lines":4}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":false,"description":"In bus_socket_set_transient_property() the comparison for the socket SMACK-on-IP-input label uses streq(name, \"SmackLabelIPin\") with a lowercase 'i' in \"in\". The canonical property name used everywhere else is \"SmackLabelIPIn\" (capital I): the D-Bus vtable property (dbus-socket.c:106), the config parser (load-fragment-gperf.gperf.in), the varlink definition, and the client-side setter table in src/shared/bus-unit-util.c:2776 which sends the property as \"SmackLabelIPIn\". Because the name never matches, setting SmackLabelIPIn= on a transient socket unit (e.g. via systemd-run/SetUnitProperties) silently falls through to the generic 'return 0' and the value is dropped without error. The property is therefore unsettable on transient units.","fix":"Change the comparison at dbus-socket.c:290 from streq(name, \"SmackLabelIPin\") to streq(name, \"SmackLabelIPIn\") so it matches the property name used by the vtable and clients.","locations":[{"ref":"src/core/dbus-socket.c:290-291","code":"  290 |         if (streq(name, \"SmackLabelIPin\"))\n  291 |                 return bus_set_transient_string(u, name, &s->smack_ip_in, message, flags, reterr_error);","lines":2},{"ref":"src/core/dbus-socket.c:106","code":"  106 |         SD_BUS_PROPERTY(\"SmackLabelIPIn\", \"s\", NULL, offsetof(Socket, smack_ip_in), SD_BUS_VTABLE_PROPERTY_CONST),","lines":1},{"ref":"src/shared/bus-unit-util.c:2776","code":" 2776 |         { \"SmackLabelIPIn\",                        bus_append_string                             },","lines":1}]},{"id":"CPY_2","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In bus_message_remarshal(), when remarshalling a METHOD_ERROR message the BUS_MESSAGE_HEADER_ERROR_NAME field is appended but the resulting quick-access pointer is stored into &n->error.message instead of &n->error.name (compare the canonical pattern at lines 670 and 789, which store into &t->error.name). Consequences: after remarshalling, n->error.name stays NULL (so sd_bus_message_get_error(), sd_bus_message_is_method_error(name) and sd_bus_message_get_errno() no longer recognize the error name), while n->error.message is left pointing at the error-NAME string in the fields buffer (and n->error._need_free = -1). The actual error message text appended later by sd_bus_message_copy() does not update this pointer. This corrupts the error identity of any error message that passes through remarshalling (e.g. message forwarding / reconnect paths).","fix":"Store the returned pointer into &n->error.name: message_append_field_string(n, BUS_MESSAGE_HEADER_ERROR_NAME, SD_BUS_TYPE_STRING, (*m)->error.name, &n->error.name);","locations":[{"ref":"src/libsystemd/sd-bus/bus-message.c:4645-4651","code":" 4645 |                 if ((*m)->header->type == SD_BUS_MESSAGE_METHOD_ERROR && (*m)->error.name) {\n 4646 |                         r = message_append_field_string(n, BUS_MESSAGE_HEADER_ERROR_NAME, SD_BUS_TYPE_STRING, (*m)->error.name, &n->error.message);\n 4647 |                         if (r < 0)\n 4648 |                                 return r;\n 4649 | \n 4650 |                         n->error._need_free = -1;\n 4651 |                 }","lines":7}]},{"id":"CPY_3","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"In method_set_reboot_to_boot_loader_entry(), the non-EFI write path writes the requested boot loader entry to \"/run/systemd/reboot-boot-to-loader-entry\" (the words \"boot\" and \"to\" are transposed). Every other place - the reader property_get_reboot_to_boot_loader_entry() at line 3388, the unlink in the same function at line 3492, the debug strings, and bootctl/systemd-boot consumers - uses \"/run/systemd/reboot-to-boot-loader-entry\". Consequence: on non-EFI systems (e.g. inside containers, or where $SYSTEMD_REBOOT_TO_BOOT_LOADER_ENTRY=1), SetRebootToBootLoaderEntry(name) writes to a file that nobody ever reads, so the requested one-shot boot entry is silently lost, and the property always reads back empty. The delete/unlink path uses the correct name, so this is purely a stale orphan file.","fix":"Change the path literal on line 3495 from \"/run/systemd/reboot-boot-to-loader-entry\" to \"/run/systemd/reboot-to-boot-loader-entry\" to match the reader and the unlink path.","locations":[{"ref":"src/login/logind-dbus.c:3495","code":" 3495 |                         r = write_string_file(\"/run/systemd/reboot-boot-to-loader-entry\", v, WRITE_STRING_FILE_CREATE|WRITE_STRING_FILE_ATOMIC|WRITE_STRING_FILE_LABEL);","lines":1},{"ref":"src/login/logind-dbus.c:3388-3392","code":" 3388 |                 r = read_one_line_file(\"/run/systemd/reboot-to-boot-loader-entry\", &v);\n 3389 |                 if (r < 0) {\n 3390 |                         if (r != -ENOENT)\n 3391 |                                 log_warning_errno(r, \"Failed to read /run/systemd/reboot-to-boot-loader-entry, ignoring: %m\");\n 3392 |                 } else if (!efi_loader_entry_name_valid(v))","lines":5},{"ref":"src/login/logind-dbus.c:3492","code":" 3492 |                         if (unlink(\"/run/systemd/reboot-to-boot-loader-entry\") < 0 && errno != ENOENT)","lines":1}]},{"id":"CPY_4","type":"copy_paste","type_label":"Copy Paste","severity":"medium","easy":false,"description":"config_parse_min_version() expands specifiers from rvalue into 'resolved', then validates version_is_valid(rvalue) (the raw, unexpanded string) instead of version_is_valid(resolved) (the expanded string it actually stores). The sibling parser config_parse_protect_version() correctly validates 'resolved'. Consequences: (1) if rvalue contains specifiers, the raw string with '%' specifiers is validated rather than the expanded result, so an expansion that yields an invalid version string can be accepted and stored as MinVersion, and (2) the warning message on failure prints 'resolved' while the test ran on 'rvalue', which is misleading. MinVersion gates whether updates are considered obsolete, so a bad value can affect update selection.","fix":"Validate the expanded value: change 'if (!version_is_valid(rvalue))' to 'if (!version_is_valid(resolved))'.","locations":[{"ref":"src/sysupdate/sysupdate-transfer.c:166-179","code":"  166 |         r = specifier_printf(rvalue, NAME_MAX, specifier_table, arg_root, NULL, &resolved);\n  167 |         if (r < 0) {\n  168 |                 log_syntax(unit, LOG_WARNING, filename, line, r,\n  169 |                            \"Failed to expand specifiers in MinVersion=, ignoring: %s\", rvalue);\n  170 |                 return 0;\n  171 |         }\n  172 | \n  173 |         if (!version_is_valid(rvalue)) {\n  174 |                 log_syntax(unit, LOG_WARNING, filename, line, 0,\n  175 |                            \"MinVersion= string is not valid, ignoring: %s\", resolved);\n  176 |                 return 0;\n  177 |         }\n  178 | \n  179 |         return free_and_replace(*version, resolved);","lines":14}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In pam_close_session_and_delete_credentials(), the second error is logged with the wrong variable. When sym_pam_setcred(PAM_DELETE_CRED) fails (s != PAM_SUCCESS), the code calls pam_syslog_pam_error(pamh, LOG_DEBUG, r, \"pam_setcred(PAM_DELETE_CRED) failed: @PAMERR@\") passing `r` (the result of the earlier pam_close_session()) instead of `s` (the actual setcred error). The @PAMERR@ placeholder is expanded from the passed code, so the logged message will contain the wrong PAM error string (e.g. PAM_SUCCESS text) and mask the real cause of the setcred failure. The function's return value correctly uses `s`, so only the diagnostic is wrong.","fix":"Change the pam_syslog_pam_error() call to pass `s` instead of `r`: `pam_syslog_pam_error(pamh, LOG_DEBUG, s, \"pam_setcred(PAM_DELETE_CRED) failed: @PAMERR@\");`","locations":[{"ref":"src/core/exec-invoke.c:1159-1161","code":" 1159 |         s = sym_pam_setcred(pamh, PAM_DELETE_CRED | flags);\n 1160 |         if (s != PAM_SUCCESS)\n 1161 |                 pam_syslog_pam_error(pamh, LOG_DEBUG, r, \"pam_setcred(PAM_DELETE_CRED) failed: @PAMERR@\");","lines":3}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"oci_ref_parse() logs the wrong variable in its error message: when the image specification is invalid it prints 'registry' instead of 'image'. When the ref had no '/' separator, 'registry' is NULL, so this prints \"(null)\" (and is the wrong field regardless). Misleading diagnostic for untrusted input.","fix":"Change the format argument from 'registry' to 'image' in the log_debug_errno() call.","locations":[{"ref":"src/import/oci-util.c:138-139","code":"  138 |         if (!oci_image_is_valid(image))\n  139 |                 return log_debug_errno(SYNTHETIC_ERRNO(EINVAL), \"OCI image specification '%s' is not valid.\", registry);","lines":2}]},{"id":"CPY_7","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"In json_dispatch_oci_manifest_config(), the digest-mismatch branch reports 'Manifest data size mismatch.' but this comparison (memcmp_nn of the computed sha256 vs the declared digest) is a CONTENT/digest mismatch, not a size mismatch (the size check with its own correct message is the preceding block at line 739-740). The misleading message makes diagnosing tampered/corrupt inline OCI config data harder.","fix":"Change the message at line 745 to something like 'Manifest config data does not match digest.'","locations":[{"ref":"src/import/pull-oci.c:743-745","code":"  743 |                 if (memcmp_nn(sha256_direct(config->data.iov_base, config->data.iov_len, h), SHA256_DIGEST_SIZE,\n  744 |                               config->digest.iov_base, config->digest.iov_len) != 0)\n  745 |                         return json_log(v, SD_JSON_LOG, SYNTHETIC_ERRNO(EBADMSG), \"Manifest data size mismatch.\");","lines":3}]},{"id":"CPY_8","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"config_parse_ndisc_route_metric() parses the RouteMetric= setting (registered for [IPv6AcceptRA] RouteMetric and [DHCPv6] RouteMetric in networkd-network-gperf.gperf), but all three of its diagnostic log_syntax() messages refer to \"RouteTable=\" instead of \"RouteMetric=\". The strings were copy-pasted from config_parse_dhcp_or_ra_route_table() (line 584, same file) which is the genuine RouteTable parser. A user who writes an invalid RouteMetric= (e.g. a bad triple like 100:50:200 or non-numeric value) is told \"Failed to parse RouteTable=...\" / \"Invalid RouteTable=...\", pointing them at a completely different setting. The sibling single-value parser config_parse_dhcp_route_metric() (line 425, same file) correctly says \"RouteMetric=\". Additionally line 496 passes errno 0 to a message ending in \"%m\" which renders as \"Success\".","fix":"Replace the three \"RouteTable=\" literals in config_parse_ndisc_route_metric() with \"RouteMetric=\" to match the actual setting name. For the line 494-498 message, drop the trailing \"%m\" (or use a non-zero errno) since it is a semantic validation failure, not an errno failure.","locations":[{"ref":"src/network/networkd-dhcp-common.c:480-482","code":"  480 |                         log_syntax(unit, LOG_WARNING, filename, line, r < 0 ? r : 0,\n  481 |                                    \"Failed to parse RouteTable=%s, ignoring assignment: %m\", rvalue);\n  482 |                         return 0;","lines":3},{"ref":"src/network/networkd-dhcp-common.c:489-491","code":"  489 |                         log_syntax(unit, LOG_WARNING, filename, line, r < 0 ? r : s < 0 ? s : t,\n  490 |                                    \"Failed to parse RouteTable=%s, ignoring assignment: %m\", rvalue);\n  491 |                         return 0;","lines":3},{"ref":"src/network/networkd-dhcp-common.c:494-498","code":"  494 |                 if (metric_high >= metric_medium || metric_medium >= metric_low) {\n  495 |                         log_syntax(unit, LOG_WARNING, filename, line, 0,\n  496 |                                    \"Invalid RouteTable=%s, ignoring assignment: %m\", rvalue);\n  497 |                         return 0;\n  498 |                 }","lines":5}]},{"id":"CPY_9","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"config_parse_ndisc_route_metric() parses the RouteMetric= setting (registered for IPv6AcceptRA.RouteMetric and DHCPv6.RouteMetric in networkd-network-gperf.gperf), but every error/warning log message in it refers to 'RouteTable=' instead of 'RouteMetric='. This is a copy-paste mistake that produces misleading diagnostics for users whose RouteMetric= value fails to parse or is invalid. Additionally the messages at lines 480-481, 489-490 and 495-496 use the %m format specifier while sometimes passing error code 0 (e.g. the metric_high>=metric_medium ordering-violation branch), which would render as 'Success'.","fix":"Change the three 'Failed to parse RouteTable=%s' / 'Invalid RouteTable=%s' messages to say 'RouteMetric='. For the ordering-violation case (line 495) drop the %m since the error code passed is 0, or emit a dedicated message describing that high<medium<low ordering is required.","locations":[{"ref":"src/network/networkd-dhcp-common.c:480-481","code":"  480 |                         log_syntax(unit, LOG_WARNING, filename, line, r < 0 ? r : 0,\n  481 |                                    \"Failed to parse RouteTable=%s, ignoring assignment: %m\", rvalue);","lines":2},{"ref":"src/network/networkd-dhcp-common.c:489-490","code":"  489 |                         log_syntax(unit, LOG_WARNING, filename, line, r < 0 ? r : s < 0 ? s : t,\n  490 |                                    \"Failed to parse RouteTable=%s, ignoring assignment: %m\", rvalue);","lines":2},{"ref":"src/network/networkd-dhcp-common.c:494-498","code":"  494 |                 if (metric_high >= metric_medium || metric_medium >= metric_low) {\n  495 |                         log_syntax(unit, LOG_WARNING, filename, line, 0,\n  496 |                                    \"Invalid RouteTable=%s, ignoring assignment: %m\", rvalue);\n  497 |                         return 0;\n  498 |                 }","lines":5}]},{"id":"CPY_10","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"verb_sign() error message references the wrong argv index. After failing to hash the PE binary, it logs `\"Failed to hash PE binary %s: %m\", argv[0]`, but argv[0] in a verb handler is the verb name (\"sign\"), not the input file. The actual input file is argv[1] (opened at line 510 and used in every other error message in this function, e.g. lines 512, 516, 520, 639). The diagnostic will print the verb name instead of the offending file path.","fix":"Change argv[0] to argv[1] in the log_error_errno() call so it reports the actual input file being hashed.","locations":[{"ref":"src/sbsign/sbsign.c:533-535","code":"  533 |         r = pe_hash(srcfd, sym_EVP_sha256(), &pehash, &pehashsz);\n  534 |         if (r < 0)\n  535 |                 return log_error_errno(r, \"Failed to hash PE binary %s: %m\", argv[0]);","lines":3}]},{"id":"CPY_11","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"In the child process of remove_tree_foreign(), when fd_reopen(tree_fd, ...) fails the error is logged via log_debug_errno(r, ...) but r at that point holds the return value of the preceding successful namespace_enter() call (i.e. 0), not the failure value dfd. As a result the '%m' will render \"Success\" instead of the real error, and a 0 is passed where a negative errno is expected. This is a misleading-diagnostics/copy-paste bug on an error path (the process still _exit(EXIT_FAILURE) correctly, so behavior is otherwise unaffected).","fix":"Log the actual failure value: change log_debug_errno(r, \"Failed to reopen tree fd: %m\") to log_debug_errno(dfd, \"Failed to reopen tree fd: %m\").","locations":[{"ref":"src/shared/dissect-image.c:5607-5611","code":" 5607 |                 _cleanup_close_ int dfd = fd_reopen(tree_fd, O_DIRECTORY|O_CLOEXEC);\n 5608 |                 if (dfd < 0) {\n 5609 |                         log_debug_errno(r, \"Failed to reopen tree fd: %m\");\n 5610 |                         _exit(EXIT_FAILURE);\n 5611 |                 }","lines":5}]},{"id":"CPY_12","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"In output_short() OUTPUT_WITH_UNIT handling, when both _SYSTEMD_UNIT and _SYSTEMD_USER_UNIT are present and printable, the column counter advances by `unit_len + 1` for the user_unit branch instead of `user_unit_len + 1`. This is a copy-paste of the preceding unit branch. `n` is later passed as the prefix to print_multiline() (as `n + 2`) to compute ellipsization/indentation, so the column math for the message body is wrong whenever a user unit name differs in length from the system unit name in with-unit output mode. No memory safety impact, purely incorrect layout/ellipsization accounting.","fix":"Change line 647 from `n += unit_len + 1;` to `n += user_unit_len + 1;` to count the actually-printed user unit name.","locations":[{"ref":"src/shared/logs-show.c:642-648","code":"  642 |                 if (user_unit) {\n  643 |                         if (unit)\n  644 |                                 fprintf(f, \"/%.*s\", (int) user_unit_len, user_unit);\n  645 |                         else\n  646 |                                 fprintf(f, \" %.*s\", (int) user_unit_len, user_unit);\n  647 |                         n += unit_len + 1;\n  648 |                 }","lines":7}]},{"id":"CPY_13","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"write_origin_file(), write_dev_file() and write_backing_file() build a 'hierarchy_path' that is passed to write_string_file_full() as the label_fn (SELinux label template path), but they construct it using image_class_info[].short_identifier_plural (e.g. '/usr/.systemd-sysext/extensions') instead of the actual target file name they are writing ('origin', 'dev', 'backing' respectively). This looks copy-pasted from write_extensions_file() (where short_identifier_plural is correct because that IS the file it writes). As a result the SELinux context for the origin/dev/backing meta files is computed from the wrong path basename. Normally the whole dot directory shares one label so this is harmless, but it is incorrect and will mislabel if a per-file file_contexts rule ever applies.","fix":"Build hierarchy_path with the real file name for each case: '...dot_directory_name, \"origin\"' in write_origin_file, '..., \"dev\"' in write_dev_file, and '..., \"backing\"' in write_backing_file (matching the corresponding 'f' path), as write_work_dir_file already does correctly with \"work_dir\".","locations":[{"ref":"src/sysext/sysext.c:1230-1232","code":" 1230 |         _cleanup_free
