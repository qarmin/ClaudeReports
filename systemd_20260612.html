_ char *hierarchy_path = path_join(hierarchy, image_class_info[image_class].dot_directory_name, image_class_info[image_class].short_identifier_plural);\n 1231 |         if (!hierarchy_path)\n 1232 |                 return log_oom();","lines":3},{"ref":"src/sysext/sysext.c:1265-1267","code":" 1265 |         _cleanup_free_ char *hierarchy_path = path_join(hierarchy, image_class_info[image_class].dot_directory_name, image_class_info[image_class].short_identifier_plural);\n 1266 |         if (!hierarchy_path)\n 1267 |                 return log_oom();","lines":3},{"ref":"src/sysext/sysext.c:1294-1296","code":" 1294 |         _cleanup_free_ char *hierarchy_path = path_join(hierarchy, image_class_info[image_class].dot_directory_name, image_class_info[image_class].short_identifier_plural);\n 1295 |         if (!hierarchy_path)\n 1296 |                 return log_oom();","lines":3}]},{"id":"CPY_14","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":false,"description":"In item_equivalent(), the branch that detects differing home directories logs the description fields (a->description / b->description) instead of the home fields (a->home / b->home). The condition correctly compares a->home vs b->home, but the diagnostic message prints the wrong values, which is misleading when debugging conflicting sysusers.d entries.","fix":"Replace `strempty(a->description), strempty(b->description)` with `strempty(a->home), strempty(b->home)` in the log_syntax() call.","locations":[{"ref":"src/sysusers/sysusers.c:1676-1681","code":" 1676 |         if (!streq_ptr(a->home, b->home)) {\n 1677 |                 log_syntax(NULL, LOG_DEBUG, a->filename, a->line, 0,\n 1678 |                            \"Item not equivalent because home directories differ ('%s' vs. '%s')\",\n 1679 |                            strempty(a->description), strempty(b->description));\n 1680 |                 return false;\n 1681 |         }","lines":6}]},{"id":"CPY_15","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":false,"description":"In get_pin() the second assert after querying the repeated PIN asserts on `pin` again instead of `pin2`: line 150 reads `assert(strv_length(pin) == 1);` but is meant to validate the second response (pin2). A copy-paste of the first assert; it does not check what it intends to.","fix":"Change the second `assert(strv_length(pin) == 1);` to `assert(strv_length(pin2) == 1);`.","locations":[{"ref":"src/cryptenroll/cryptenroll-tpm2.c:144-150","code":"  144 |                         r = ask_password_auto(\n  145 |                                         &req,\n  146 |                                         /* flags= */ 0,\n  147 |                                         &pin2);\n  148 |                         if (r < 0)\n  149 |                                 return log_error_errno(r, \"Failed to ask for user pin: %m\");\n  150 |                         assert(strv_length(pin) == 1);","lines":7}]},{"id":"CPY_16","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":false,"description":"oci_ref_normalize() logs data.override_registry when reporting an image override; it should log data.override_image. Debug-only, but the message is misleading (shows the registry override value as the new image).","fix":"Change 'data.override_registry' to 'data.override_image' in the log_debug() call.","locations":[{"ref":"src/import/oci-util.c:275-276","code":"  275 |         if (data.override_image) {\n  276 |                 log_debug(\"Overriding image to '%s' (was '%s') based on OCI registry database.\", data.override_registry, *image);","lines":2}]},{"id":"CPY_17","type":"copy_paste","type_label":"Copy Paste","severity":"negligible","easy":false,"description":"In parse_line(), when specifier_printf() fails while expanding the id (third) column, the error message formats the `name` variable instead of `id`. The format string refers to the id being processed, so the wrong field is reported; additionally `name` may have been set to NULL earlier (empty/dash), feeding NULL to a %s argument. This is a cold-path, error-only message.","fix":"Use `id` instead of `name` as the format argument on line 1799 to match the field actually being expanded.","locations":[{"ref":"src/sysusers/sysusers.c:1795-1799","code":" 1795 |         if (id) {\n 1796 |                 r = specifier_printf(id, PATH_MAX-1, system_and_tmp_specifier_table, arg_root, NULL, &resolved_id);\n 1797 |                 if (r < 0)\n 1798 |                         return log_syntax(NULL, LOG_ERR, fname, line, r,\n 1799 |                                           \"Failed to replace specifiers in '%s': %m\", name);","lines":5}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":true,"description":"pkcs7_extract_signers() ignores the return value of sym_i2d_X509_NAME() and sym_i2d_ASN1_INTEGER(). These OpenSSL i2d_* functions return a negative value (typically -1) on encoding failure. The returned int 'len' is stored directly into an iovec via IOVEC_MAKE(TAKE_PTR(p), len); because iovec.iov_len is size_t, a negative len becomes a near-SIZE_MAX value. The resulting Signer.serial/Signer.issuer iovecs are later consumed by pcrextend_verity_word() (src/shared/pcrextend-util.c:282-288) via hexmem(iov_base, iov_len) and base64mem(iov_base, iov_len). hexmem/base64mem then attempt malloc on a huge length and read iov_len bytes from a tiny/NULL buffer -> guaranteed crash/OOM and potential OOB read. The PKCS7 signature blob originates from DDI/sysext verity signatures which can be attacker-influenced, so a malformed signature that parses as PKCS7 but yields ASN.1 that fails i2d serialization triggers this. Even on success this path also fails to guard against len==0 with a NULL p, though that case is benign in hexmem.","fix":"After each i2d call check the return: 'int len = sym_i2d_X509_NAME(...); if (len < 0) return log_debug_errno(SYNTHETIC_ERRNO(EBADMSG), \"Failed to serialize issuer.\");' and likewise for sym_i2d_ASN1_INTEGER before building the iovec. Reset/own 'p' correctly only on success.","locations":[{"ref":"src/shared/pkcs7-util.c:76-84","code":"   76 |                 _cleanup_free_ unsigned char *p = NULL;\n   77 |                 int len = sym_i2d_X509_NAME(si->issuer_and_serial->issuer, &p);\n   78 |                 signer.issuer = IOVEC_MAKE(TAKE_PTR(p), len);\n   79 | \n   80 |                 len = sym_i2d_ASN1_INTEGER(si->issuer_and_serial->serial, &p);\n   81 |                 signer.serial = IOVEC_MAKE(TAKE_PTR(p), len);\n   82 | \n   83 |                 signers[n_signers++] = TAKE_STRUCT(signer);\n   84 |         }","lines":9},{"ref":"src/shared/pcrextend-util.c:281-292","code":"  281 |                 FOREACH_ARRAY(i, signers, n_signers) {\n  282 |                         _cleanup_free_ char *serial = hexmem(i->serial.iov_base, i->serial.iov_len);\n  283 |                         if (!serial)\n  284 |                                 return log_oom();\n  285 | \n  286 |                         _cleanup_free_ char *issuer = NULL;\n  287 |                         if (base64mem(i->issuer.iov_base, i->issuer.iov_len, &issuer) < 0)\n  288 |                                 return log_oom();\n  289 | \n  290 |                         if (strextendf_with_separator(&sigs, \",\", \"%s/%s\", serial, issuer) < 0)\n  291 |                                 return log_oom();\n  292 |                 }","lines":12}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In verb_set(), the STATUS_INDETERMINATE branch fails when left==0 with log_error_errno(r, ...). At that point r holds the return value of the preceding make_bad() call (line 479), which succeeded, so r == 0. log_error_errno(0, ...) returns 0, so the function logs an error message but returns success (0) instead of an error. Callers (and the exit code) treat the operation as having succeeded even though it was explicitly rejected.","fix":"Use a synthetic error code, e.g. return log_error_errno(SYNTHETIC_ERRNO(EINVAL), \"Current boot entry was already marked bad in a previous boot, cannot reset to indeterminate.\");","locations":[{"ref":"src/bless-boot/bless-boot.c:495-497","code":"  495 |         case STATUS_INDETERMINATE:\n  496 |                 if (left == 0)\n  497 |                         return log_error_errno(r, \"Current boot entry was already marked bad in a previous boot, cannot reset to indeterminate.\");","lines":3}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In home_setup_luks(), when reopening an already-activated LUKS home and LOOP_GET_STATUS64 falls back to the sysfs path, a failing fstat(setup->loop->fd) is logged/returned via log_error_errno(r, ...). But 'r' at that point holds the (non-negative) return value of the preceding loop_device_open_from_path()/make_dm_names() call, not the fstat error. log_error_errno() with a non-negative argument logs \"Success\" AND returns a non-negative value, so a genuine fstat() failure is swallowed and the function continues as if it succeeded (with uninitialized 'st' used immediately after in DEVNUM_FORMAT_VAL(st.st_rdev) and the assert(S_ISBLK(st.st_mode))). Should pass errno.","fix":"Change `return log_error_errno(r, \"Failed to stat block device %s: %m\", n);` to use errno: `return log_error_errno(errno, \"Failed to stat block device %s: %m\", n);`","locations":[{"ref":"src/home/homework-luks.c:1349-1351","code":" 1349 |                         if (fstat(setup->loop->fd, &st) < 0)\n 1350 |                                 return log_error_errno(r, \"Failed to stat block device %s: %m\", n);\n 1351 |                         assert(S_ISBLK(st.st_mode));","lines":3}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In home_create_luks(), after the final allocation step the image is fsync'd, but on fsync() failure the error is reported with log_error_errno(r, ...) where 'r' is the (>=0) result of the preceding run_fallocate() (or an even earlier successful call when offline-discard is set). Passing a non-negative value to log_error_errno() logs \"Success\" and returns a non-negative value, so an fsync() failure during home creation is silently treated as success and creation proceeds (rename into place, etc.) despite data possibly not being flushed. Should pass errno.","fix":"Change `return log_error_errno(r, \"Failed to synchronize image to disk: %m\");` to `return log_error_errno(errno, \"Failed to synchronize image to disk: %m\");`","locations":[{"ref":"src/home/homework-luks.c:2570-2571","code":" 2570 |         if (fsync(setup->image_fd) < 0)\n 2571 |                 return log_error_errno(r, \"Failed to synchronize image to disk: %m\");","lines":2}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"copy_skel() only handles the -ENOENT result of chase(); for any other negative return (e.g. -EACCES, -ENOTDIR, -ENOMEM, -ELOOP) the error is neither logged nor returned. Execution falls through to copy_tree_at() with skel_fd still at -EBADF (chase did not populate it on failure), so the real chase() error is swallowed and an invalid fd is passed to copy_tree_at(). This is on the home-creation/populate path. A failed skeleton lookup is silently ignored or produces a misleading downstream error.","fix":"After the -ENOENT special case, add a generic error check: `if (r < 0) return log_error_errno(r, \"Failed to open skeleton directory %s: %m\", skel);` before calling copy_tree_at().","locations":[{"ref":"src/home/homework.c:1075-1087","code":" 1075 |         r = chase(skel, /* root= */ NULL, CHASE_MUST_BE_DIRECTORY, /* ret_path= */ NULL, &skel_fd);\n 1076 |         if (r == -ENOENT) {\n 1077 |                 log_info(\"Skeleton directory %s missing, ignoring.\", skel);\n 1078 |                 return 0;\n 1079 |         }\n 1080 | \n 1081 |         r = copy_tree_at(\n 1082 |                         skel_fd, /* from= */ NULL,\n 1083 |                         root_fd, \".\",\n 1084 |                         h->uid, user_record_gid(h),\n 1085 |                         COPY_MERGE|COPY_REPLACE,\n 1086 |                         /* denylist= */ NULL,\n 1087 |                         /* subvolumes= */ NULL);","lines":13}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"marker_matches_images() is declared to return bool, but its body returns negative error codes on failure paths: 'return -ENOMEM;' (strv_new failure), 'return r;' (strv_extend_strv failure, path_pick failure), and 'return log_debug_errno(...);' (extract_first_word, path_extract_image_name, ENOENT). All of these negative ints are converted to the boolean value true. The caller test_chroot_dropin() stores the result into an int r and returns it; portable_detach() and portable_get_state_internal() treat any non-zero r as 'this drop-in matches the requested image'. Thus an OOM, a parse failure, or a vpick resolution failure while scanning a portable drop-in marker is silently turned into a positive match, which in portable_detach() causes that unit's files/drop-ins to be unlinked even though the marker matching actually failed. Errors are swallowed and can lead to detaching the wrong unit.","fix":"Either change marker_matches_images() to return int with a proper tri-state (negative errno on error, 0 no-match, >0 match) and have test_chroot_dropin()/callers propagate negative returns, or convert the failure paths to log-and-return-false. As written, the function's negative returns are indistinguishable from a successful match.","locations":[{"ref":"src/portable/portable.c:2165-2231","code":" 2165 | static bool marker_matches_images(const char *marker, const char *name_or_path, char **extension_image_paths, bool match_all) {\n 2166 |         _cleanup_strv_free_ char **root_and_extensions = NULL;\n 2167 |         int r;\n 2168 | \n 2169 |         assert(marker);\n 2170 |         assert(name_or_path);\n 2171 | \n 2172 |         /* If extensions were used when attaching, the marker will be a colon-separated\n 2173 |          * list of images/paths. We enforce strict 1:1 matching, so that we are sure\n 2174 |          * we are detaching exactly what was attached.\n 2175 |          * For each image, starting with the root, we look for a token in the marker,\n 2176 |          * and return a negative answer on any non-matching combination.\n 2177 |          * If a partial match is allowed, then return immediately once it is found, otherwise\n 2178 |          * ensure that everything matches. */\n 2179 | \n 2180 |         root_and_extensions = strv_new(name_or_path);\n 2181 |         if (!root_and_extensions)\n 2182 |                 return -ENOMEM;\n 2183 | \n 2184 |         r = strv_extend_strv(&root_and_extensions, extension_image_paths, false);\n 2185 |         if (r < 0)\n 2186 |                 return r;\n 2187 | \n 2188 |         /* Ensure the number of images passed matches the number of images listed in the marker */\n 2189 |         while (!isempty(marker))\n 2190 |                 STRV_FOREACH(image_name_or_path, root_and_extensions) {\n 2191 |                         _cleanup_free_ char *image = NULL, *base_image = NULL, *base_image_name_or_path = NULL;\n 2192 |                         _cleanup_(pick_result_done) PickResult result = PICK_RESULT_NULL;\n 2193 | \n 2194 |                         r = extract_first_word(&marker, &image, \":\", EXTRACT_UNQUOTE|EXTRACT_RETAIN_ESCAPE);\n 2195 |                         if (r < 0)\n 2196 |                                 return log_debug_errno(r, \"Failed to parse marker: %s\", marker);\n 2197 |                         if (r == 0)\n 2198 |                                 return false;\n 2199 | \n 2200 |                         r = path_extract_image_name(image, &base_image);\n 2201 |                         if (r < 0)\n 2202 |                                 return log_debug_errno(r, \"Failed to extract image name from %s, ignoring: %m\", image);\n 2203 | \n 2204 |                         r = path_pick(/* toplevel_path= */ NULL,\n 2205 |                                       /* toplevel_fd= */ AT_FDCWD,\n 2206 |                                       *image_name_or_path,\n 2207 |                                       pick_filter_image_any,\n 2208 |                                       ELEMENTSOF(pick_filter_image_any),\n 2209 |                                       PICK_ARCHITECTURE|PICK_TRIES|PICK_RESOLVE,\n 2210 |                                       &result);\n 2211 |                         if (r < 0)\n 2212 |                                 return r;\n 2213 |                         if (!result.path)\n 2214 |                                 return log_debug_errno(\n 2215 |                                                 SYNTHETIC_ERRNO(ENOENT),\n 2216 |                                                 \"No matching entry in .v/ directory %s found.\",\n 2217 |                                                 *image_name_or_path);\n 2218 | \n 2219 |                         r = path_extract_image_name(result.path, &base_image_name_or_path);\n 2220 |                         if (r < 0)\n 2221 |                                 return log_debug_errno(r, \"Failed to extract image name from %s, ignoring: %m\", result.path);\n 2222 | \n 2223 |                         if (!streq(base_image, base_image_name_or_path)) {\n 2224 |                                 if (match_all)\n 2225 |                                         return false;\n 2226 |                         } else if (!match_all)\n 2227 |                                 return true;\n 2228 |                 }\n 2229 | \n 2230 |         return match_all;\n 2231 | }","lines":67},{"ref":"src/portable/portable.c:2287","code":" 2287 |                 r = marker_matches_images(marker, name_or_path, extension_image_paths, ret_marker != NULL);","lines":1}]},{"id":"ERR_7","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In save_seed_file(), the ftruncate() error branch logs and returns using the wrong error variable. At this point `r` holds the (>=0) return value from the preceding successful loop_write(), not the ftruncate error. So `log_error_errno(r, \"Failed to truncate random seed file: %m\")` is called with r==0: it formats `%m` as \"Success\" and returns 0 (success). The function therefore reports success and silently ignores a genuine ftruncate failure, potentially leaving a stale/over-long random seed file on disk. It should use `errno` (which ftruncate set).","fix":"Change the ftruncate error branch to `return log_error_errno(errno, \"Failed to truncate random seed file: %m\");` (use errno, not r), so a real error code is logged and a negative value returned.","locations":[{"ref":"src/random-seed/random-seed-tool.c:280-285","code":"  280 |         r = loop_write(seed_fd, buf, (size_t) k);\n  281 |         if (r < 0)\n  282 |                 return log_error_errno(r, \"Failed to write new random seed file: %m\");\n  283 | \n  284 |         if (ftruncate(seed_fd, k) < 0)\n  285 |                 return log_error_errno(r, \"Failed to truncate random seed file: %m\");","lines":6}]},{"id":"ERR_8","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In bpf_program_deserialize_attachment(), when parse_fd(sfd) fails it returns the wrong variable: `return r;` instead of `return ifd;`. At that point r still holds the value 1 (success) from the preceding extract_first_word() call, so the function returns success without ever assigning *bpfp. The caller bpf_program_deserialize_attachment_set() then does set_ensure_consume(bpfsetp, &bpf_program_hash_ops, p) with p still NULL, inserting a NULL pointer into a set whose hash ops include a destructor (bpf_program_free). This swallows a real parse error and can lead to a NULL entry / later misbehavior. (Note ifd is also already a negative errno here, so the intended behavior is to propagate it.)","fix":"Change the error branch to `if (ifd < 0) return ifd;` so the actual error from parse_fd() is propagated instead of the stale success value in r.","locations":[{"ref":"src/shared/bpf-program.c:522-524","code":"  522 |         ifd = parse_fd(sfd);\n  523 |         if (ifd < 0)\n  524 |                 return r;","lines":3}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"make_backup() returns a positive errno value on rename() failure instead of a negative one. Every caller in write_files() (and elsewhere) checks `if (r < 0)`, so a positive errno is interpreted as success. A failed rename of the temporary backup file to <file>- is therefore silently swallowed: no error is propagated, the backup is missing, yet sysusers proceeds to overwrite the live account database. The whole codebase uses the negative-errno convention, so this is an outright bug introduced by the backup rewrite.","fix":"Change `return errno;` to `return -errno;` so the rename failure is propagated as a negative errno and detected by the `r < 0` checks in write_files().","locations":[{"ref":"src/sysusers/sysusers.c:354-355","code":"  354 |         if (rename(dst_tmp, backup) < 0)\n  355 |                 return errno;","lines":2}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"decescape() calls strchr(bad, u) unconditionally at line 504, while the analogous functions octescape_full() (line 471) and cescape paths guard the lookup with a NULL check (`bad && strchr(...)`). The header escape.h declares decescape() with `_nonnull_if_nonzero_(1, 2)` which only constrains the first two arguments (s and len), so `bad` is allowed to be NULL per the contract. Passing bad==NULL would dereference NULL inside strchr(). Today the only non-test caller (src/shared/dns-rr.c) passes a literal non-NULL string, so no live crash exists, but the inconsistency with octescape_full() is a latent NULL-deref trap for future callers.","fix":"Guard the lookup like octescape_full() does: change `strchr(bad, u)` to `(bad && strchr(bad, u))`, making decescape() tolerate a NULL `bad` argument consistently with the sibling functions.","locations":[{"ref":"src/basic/escape.c:484-515","code":"  484 | char* decescape(const char *s, size_t len, const char *bad) {\n  485 |         char *buf, *t;\n  486 | \n  487 |         /* Escapes all chars in bad, in addition to \\ and \" chars, in \\nnn decimal style escaping. */\n  488 | \n  489 |         assert(s || len == 0);\n  490 | \n  491 |         if (len == SIZE_MAX)\n  492 |                 len = strlen(s);\n  493 | \n  494 |         if (len > (SIZE_MAX - 1) / 4)\n  495 |                 return NULL;\n  496 | \n  497 |         t = buf = new(char, len * 4 + 1);\n  498 |         if (!buf)\n  499 |                 return NULL;\n  500 | \n  501 |         for (size_t i = 0; i < len; i++) {\n  502 |                 uint8_t u = (uint8_t) s[i];\n  503 | \n  504 |                 if (u < ' ' || u >= 127 || IN_SET(u, '\\\\', '\"') || strchr(bad, u)) {\n  505 |                         *(t++) = '\\\\';\n  506 |                         *(t++) = '0' + (u / 100);\n  507 |                         *(t++) = '0' + ((u / 10) % 10);\n  508 |                         *(t++) = '0' + (u % 10);\n  509 |                 } else\n  510 |                         *(t++) = u;\n  511 |         }\n  512 | \n  513 |         *t = 0;\n  514 |         return buf;\n  515 | }","lines":32}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In parse_cifs_service(), when strdup() of the path component fails (out-of-memory), the function returns -EINVAL instead of -ENOMEM. Every other allocation failure in this same function correctly returns -ENOMEM (e.g. h = strndup(...) → -ENOMEM at line 994, ss = strndup(...) → -ENOMEM at line 1005). Returning -EINVAL here misrepresents an OOM condition as a malformed-input error, which can mislead callers/error reporting (a CIFS service string that is actually well-formed would be reported as invalid under memory pressure). This is a parser of potentially externally-supplied mount source strings, but the impact is limited to error-code accuracy, not memory safety.","fix":"Change `if (!x) return -EINVAL;` to `if (!x) return -ENOMEM;` to match the convention used for the other strdup/strndup failures in the same function.","locations":[{"ref":"src/basic/fs-util.c:1011-1013","code":" 1011 |                 x = strdup(skip_leading_chars(d, CHAR_TO_STR(delimiter)));\n 1012 |                 if (!x)\n 1013 |                         return -EINVAL;","lines":3}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In the PAM conversation callback ask_password_conv(), when setenv(\"CREDENTIALS_DIRECTORY\", ...) fails, the code does `return log_error_errno(r, \"Failed to set $CREDENTIALS_DIRECTORY: %m\")`. At this point `r` is the (>= 0) return value of the preceding successful exec_context_get_credential_directory() call (the `r < 0` case was already handled and returned at line 1088). log_error_errno() returns the value passed to it, so on a real setenv() failure this returns a non-negative value (typically 0 == PAM_SUCCESS) instead of an error. The caller at the conv layer / PAM will interpret a 0 return as success, silently ignoring the failed environment setup, and the %m will print a stale/wrong errno. The correct value to report is -errno from the failed setenv().","fix":"Capture and return the real error, e.g. `return log_error_errno(errno, \"Failed to set $CREDENTIALS_DIRECTORY: %m\")` (or set r = -errno before logging). Do not reuse the success-valued r from exec_context_get_credential_directory().","locations":[{"ref":"src/core/exec-invoke.c:1090-1097","code":" 1090 |                                 if (creds_dir) {\n 1091 |                                         if (setenv(\"CREDENTIALS_DIRECTORY\", creds_dir, /* overwrite= */ true) < 0)\n 1092 |                                                 return log_error_errno(r, \"Failed to set $CREDENTIALS_DIRECTORY: %m\");\n 1093 |                                 } else\n 1094 |                                         (void) unsetenv(\"CREDENTIALS_DIRECTORY\");\n 1095 | \n 1096 |                                 set_credential_env_var = true;\n 1097 |                         }","lines":8}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In path_spec_check_good(), when a spec is determined 'good' but the strdup() of s->path fails (OOM), the code only logs via log_oom_debug() and leaves trigger==NULL, yet still sets *ret_trigger_path=NULL and returns true. The caller path_enter_waiting() then logs \"Got triggered by '%s'\" with a NULL argument and passes NULL into path_enter_running()/ActivationDetailsPath.trigger_path_filename. There is no crash (systemd logging tolerates NULL %s and free_and_strdup(NULL) is safe), but under OOM the unit is triggered with the trigger path silently dropped, so the TRIGGER_PATH= env var passed to the activated service is lost.","fix":"On strdup failure, treat it as a transient failure: return false (so the watch is re-armed and retried) instead of returning good=true with a NULL trigger path, or propagate -ENOMEM to the caller.","locations":[{"ref":"src/core/path.c:237-246","code":"  237 |         if (good) {\n  238 |                 if (!trigger) {\n  239 |                         trigger = strdup(s->path);\n  240 |                         if (!trigger)\n  241 |                                 (void) log_oom_debug();\n  242 |                 }\n  243 |                 *ret_trigger_path = TAKE_PTR(trigger);\n  244 |         }\n  245 | \n  246 |         return good;","lines":10},{"ref":"src/core/path.c:593-595","code":"  593 |         if (path_check_good(p, initial, from_trigger_notify, &trigger_path)) {\n  594 |                 log_unit_debug(UNIT(p), \"Got triggered by '%s'.\", trigger_path);\n  595 |                 path_enter_running(p, trigger_path);","lines":3}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In add_credentials_to_table(), the fstatfs() failure path logs with log_error_errno(r, ...) but r is not the fstatfs errno. At that point r still holds the value returned by open_credential_directory() (which is 1 on success) on the first loop iteration, or the value returned by is_tmpfs_with_noswap() from a previous iteration. fstatfs() reports its error in errno, not r. As a result the error message prints the wrong errno via %m and the function returns a bogus (possibly positive) value instead of the real failure code.","fix":"Change the call to use errno: `return log_error_errno(errno, \"fstatfs() failed on '%s': %m\", de->d_name);`","locations":[{"ref":"src/creds/creds.c:271-272","code":"  271 |                         if (fstatfs(fd, &sfs) < 0)\n  272 |                                 return log_error_errno(r, \"fstatfs() failed on '%s': %m\", de->d_name);","lines":2}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"check_registered_passwords() is declared to return PassphraseType but on allocation failure it does `return log_oom();` which yields -ENOMEM (an int) implicitly cast to the enum. The caller in verb_attach only tests `== PASSPHRASE_NONE` (0), so an OOM is not detected: the bogus negative value is passed to get_password()/passphrase_type_to_string(), where the string-table lookup returns NULL (printed as the prompt text) and the OOM is silently swallowed instead of aborting the unlock attempt.","fix":"Change check_registered_passwords() to return an int status with the PassphraseType via an out-parameter, or have it return _PASSPHRASE_TYPE_INVALID/abort on OOM and make the caller treat any negative value as a fatal error rather than only comparing against PASSPHRASE_NONE.","locations":[{"ref":"src/cryptsetup/cryptsetup.c:820-836","code":"  820 | static PassphraseType check_registered_passwords(struct crypt_device *cd) {\n  821 |         _cleanup_free_ bool *slots = NULL;\n  822 |         int slot_max;\n  823 |         PassphraseType passphrase_type = PASSPHRASE_NONE;\n  824 | \n  825 |         assert(cd);\n  826 | \n  827 |         if (!streq_ptr(sym_crypt_get_type(cd), CRYPT_LUKS2)) {\n  828 |                 log_debug(\"%s: not a LUKS2 device, only passphrases are supported\", sym_crypt_get_device_name(cd));\n  829 |                 return PASSPHRASE_REGULAR;\n  830 |         }\n  831 | \n  832 |         /* Search all used slots */\n  833 |         assert_se((slot_max = sym_crypt_keyslot_max(CRYPT_LUKS2)) > 0);\n  834 |         slots = new(bool, slot_max);\n  835 |         if (!slots)\n  836 |                 return log_oom();","lines":17},{"ref":"src/cryptsetup/cryptsetup.c:2771-2783","code":" 2771 |                                 if (passphrase_type == PASSPHRASE_NONE) {\n 2772 |                                         passphrase_type = check_registered_passwords(cd);\n 2773 |                                         if (passphrase_type == PASSPHRASE_NONE)\n 2774 |                                                 return log_error_errno(SYNTHETIC_ERRNO(EINVAL), \"No passphrase or recovery key registered.\");\n 2775 |                                 }\n 2776 | \n 2777 |                                 r = get_password(\n 2778 |                                                 volume,\n 2779 |                                                 source,\n 2780 |                                                 until,\n 2781 |                                                 /* ignore_cached= */ !use_cached_passphrase || arg_verify,\n 2782 |                                                 passphrase_type,\n 2783 |                                                 &passwords);","lines":13}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In add_root_mount(), when running in the initrd, the error from generator_write_initrd_root_device_deps() is swallowed: the code does `if (r < 0) return 0;` instead of `return r;`. Every other call in this function (and the surrounding add_root_cryptsetup/add_veritysetup calls) correctly propagates the error with `return r`. As a result, a failure to write the initrd root device dependency drop-in is silently treated as success, and the generator reports overall success even though the root device ordering deps were not written. This is a cold initrd startup path, hence low severity, but it is a clear copy/paste-style typo (the literal 0 should be r).","fix":"Change `return 0;` to `return r;` in the `if (r < 0)` branch after generator_write_initrd_root_device_deps().","locations":[{"ref":"src/gpt-auto-generator/gpt-auto-generator.c:882-885","code":"  882 |         if (in_initrd()) {\n  883 |                 r = generator_write_initrd_root_device_deps(arg_dest_late, bdev);\n  884 |                 if (r < 0)\n  885 |                         return 0;","lines":4}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"machine_load() returns the raw result of the last optional-field parse (parse_uid for UID, safe_atou for VSOCK_CID) instead of 0. The state file always contains a UID= line, so parse_uid() always runs and assigns to r; on a corrupted/garbage UID value parse_uid() returns a negative errno even though the code logs 'ignoring' and continues. That negative r is then returned from machine_load() and RET_GATHER()'d into manager_enumerate_machines()'s result (machined.c:221), so a single machine with a corrupt persisted UID (or VSOCK_CID) makes the whole enumerate step report failure, despite the machine actually having been loaded. The 'Failed to parse owning UID, ignoring' message contradicts the propagated error.","fix":"Reset the return value before the final return, e.g. change the trailing `return r;` to `return 0;` (the only hard errors above already return early), so that ignored optional-field parse failures don't propagate.","locations":[{"ref":"src/machine/machine.c:403-416","code":"  403 |         m->vsock_cid = 0;\n  404 |         if (vsock_cid) {\n  405 |                 r = safe_atou(vsock_cid, &m->vsock_cid);\n  406 |                 if (r < 0)\n  407 |                         log_warning_errno(r, \"Failed to parse AF_VSOCK CID, ignoring: %s\", vsock_cid);\n  408 |         }\n  409 | \n  410 |         if (uid) {\n  411 |                 r = parse_uid(uid, &m->uid);\n  412 |                 if (r < 0)\n  413 |                         log_warning_errno(r, \"Failed to parse owning UID, ignoring: %s\", uid);\n  414 |         }\n  415 | \n  416 |         return r;","lines":14},{"ref":"src/machine/machined.c:221","code":"  221 |                 RET_GATHER(r, machine_load(machine));","lines":1}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"sd_dns_resolver_copy() swallows an out-of-memory failure from newdup() and reports success. After `r = strdup_to(&c.auth_name, a->auth_name)` (which returns 0 when auth_name is NULL, or 1 otherwise), the code does `c.addrs = newdup(...); if (!c.addrs) return r;`. On allocation failure this returns the stale `r` (0 or 1, i.e. >= 0 / success) instead of -ENOMEM. The sole caller ndisc_router_process_encrypted_dns() checks `if (r < 0) return log_oom();`, so on OOM it proceeds and stores an NDiscDNR whose resolver has addrs==NULL and n_addrs==0, derived from an untrusted RA Encrypted-DNS option. Also note the misleading-looking pattern even on the non-OOM path. Impact is limited (only triggers under genuine memory pressure) but it is a real swallowed error on a network-input path.","fix":"Return an explicit error on allocation failure: replace `if (!c.addrs) return r;` with `if (!c.addrs) return -ENOMEM;` (guarding for a->n_addrs==0 if needed so an empty resolver is not misdetected as OOM).","locations":[{"ref":"src/network/networkd-ndisc.c:2244-2247","code":" 2244 |         c.addrs = newdup(union in_addr_union, a->addrs, a->n_addrs);\n 2245 |         if (!c.addrs)\n 2246 |                 return r;\n 2247 |         c.n_addrs = a->n_addrs;","lines":4}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In bus_append_directory(), when the optional flags token fails to parse (exec_directory_flags_from_string() returns invalid, or unsupported flags are set), the code calls log_error_errno(r, ...) using r, which at this point holds the positive word count returned by the preceding extract_many_words() (here 3, since flags is non-empty). log_error_errno() therefore reports a bogus, misleading errno (-ESRCH) instead of -EINVAL. The function still returns a negative value so the error is not swallowed, but the diagnostic/return code is wrong and inconsistent with every other parse-error path in this file (which use parse_log_error() or SYNTHETIC_ERRNO(EINVAL)).","fix":"Use a synthetic EINVAL instead of the leftover word count, e.g. `return log_error_errno(SYNTHETIC_ERRNO(EINVAL), \"Failed to parse flags for %s=: '%s'\", field, flags);` (or call parse_log_error(SYNTHETIC_ERRNO(EINVAL), field, flags)).","locations":[{"ref":"src/shared/bus-unit-util.c:2011-2013","code":" 2011 |                         ExecDirectoryFlags exec_directory_flags = exec_directory_flags_from_string(flags);\n 2012 |                         if (exec_directory_flags < 0 || (exec_directory_flags & ~_EXEC_DIRECTORY_FLAGS_PUBLIC) != 0)\n 2013 |                                 return log_error_errno(r, \"Failed to parse flags for %s=: '%s'\", field, flags);","lines":3}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"config_parse_ip_protocol() passes the parsed protocol number (a positive value returned in r) as the 'error' argument to log_syntax() when the protocol number exceeds UINT8_MAX. log_syntax()'s error argument is meant to be an errno/error code (used for %m and severity hints), not a positive payload value. Here the message does not use %m so the user-visible output is fine, but feeding a large positive number where an error code is expected is an API misuse that could mislead future maintainers or interact badly with errno-based log filtering. This is a startup/config-parse path so impact is minimal.","fix":"Pass 0 (or SYNTHETIC_ERRNO(ERANGE)) as the error argument instead of r: log_syntax(unit, LOG_WARNING, filename, line, 0, \"Invalid '%s=%s', allowed range is 0..255, ignoring.\", lvalue, rvalue);","locations":[{"ref":"src/shared/conf-parser.c:2246-2252","code":" 2246 |         if (r > UINT8_MAX) {\n 2247 |                 /* linux/fib_rules.h and linux/fou.h define the netlink field as one byte, so we need to\n 2248 |                  * reject protocols numbers that don't fit in one byte. */\n 2249 |                 log_syntax(unit, LOG_WARNING, filename, line, r,\n 2250 |                            \"Invalid '%s=%s', allowed range is 0..255, ignoring.\",\n 2251 |                            lvalue, rvalue);\n 2252 |                 return 0;","lines":7}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In decrypt_credential_and_warn() the return value of sha256_hash_host_and_tpm2_key(&host_key, &tpm2_key, md) is ignored (the call site does not assign or check 'r'). On the encryption side (line 1033) the identical call is checked. If the hash computation fails (dlopen_libcrypto failure, EVP init/update/final failure), 'md' is left holding uninitialized stack bytes and is then used as the AES-256-GCM key. This does not cause memory unsafety (GCM tag verification will subsequently fail with -EBADMSG), but it silently swallows a real error and proceeds with a garbage key, producing a misleading EBADMSG instead of the actual failure.","fix":"Capture and check the result: 'r = sha256_hash_host_and_tpm2_key(&host_key, &tpm2_key, md); if (r < 0) return r;' to match the encrypt path.","locations":[{"ref":"src/shared/creds-util.c:1435","code":" 1435 |         sha256_hash_host_and_tpm2_key(&host_key, &tpm2_key, md);","lines":1}]},{"id":"ERR_22","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In dns_packet_read_rr() the SSHFP, DNSKEY and TLSA cases call dns_packet_read_memdup() but do not check its return value before testing the resulting *_size field. DS (lines 2084-2093) correctly does `if (r < 0) return r;` before the size check, but SSHFP (2109-2116), DNSKEY (2136-2143) and TLSA (2281-2288) omit it. Because DnsResourceRecord is zero-initialized, a failing memdup (e.g. -ENOMEM, or -EMSGSIZE when rdlength-N exceeds the remaining packet) leaves the size at 0 and the code returns -EBADMSG instead of the real errno. This is not a memory-safety problem (the record is zeroed and the error is still surfaced via the size<=0 path), but it masks -ENOMEM as a malformed-packet error and is inconsistent with the DS case in the same function.","fix":"Add `if (r < 0) return r;` immediately after each dns_packet_read_memdup() call in the SSHFP, DNSKEY and TLSA branches, matching the DS branch, before checking the *_size field.","locations":[{"ref":"src/shared/dns-packet.c:2097-2118","code":" 2097 |         case DNS_TYPE_SSHFP:\n 2098 |                 r = dns_packet_read_uint8(p, &rr->sshfp.algorithm, NULL);\n 2099 |                 if (r < 0)\n 2100 |                         return r;\n 2101 | \n 2102 |                 r = dns_packet_read_uint8(p, &rr->sshfp.fptype, NULL);\n 2103 |                 if (r < 0)\n 2104 |                         return r;\n 2105 | \n 2106 |                 if (rdlength < 2)\n 2107 |                         return -EBADMSG;\n 2108 | \n 2109 |                 r = dns_packet_read_memdup(p, rdlength - 2,\n 2110 |                                            &rr->sshfp.fingerprint, &rr->sshfp.fingerprint_size,\n 2111 |                                            NULL);\n 2112 | \n 2113 |                 if (rr->sshfp.fingerprint_size <= 0)\n 2114 |                         /* the accepted size depends on the algorithm, but for now\n 2115 |                            just ensure that the value is greater than zero */\n 2116 |                         return -EBADMSG;\n 2117 | \n 2118 |                 break;","lines":22},{"ref":"src/shared/dns-packet.c:2120-2145","code":" 2120 |         case DNS_TYPE_DNSKEY:\n 2121 |                 r = dns_packet_read_uint16(p, &rr->dnskey.flags, NULL);\n 2122 |                 if (r < 0)\n 2123 |                         return r;\n 2124 | \n 2125 |                 r = dns_packet_read_uint8(p, &rr->dnskey.protocol, NULL);\n 2126 |                 if (r < 0)\n 2127 |                         return r;\n 2128 | \n 2129 |                 r = dns_packet_read_uint8(p, &rr->dnskey.algorithm, NULL);\n 2130 |                 if (r < 0)\n 2131 |                         return r;\n 2132 | \n 2133 |                 if (rdlength < 4)\n 2134 |                         return -EBADMSG;\n 2135 | \n 2136 |                 r = dns_packet_read_memdup(p, rdlength - 4,\n 2137 |                                            &rr->dnskey.key, &rr->dnskey.key_size,\n 2138 |                                            NULL);\n 2139 | \n 2140 |                 if (rr->dnskey.key_size <= 0)\n 2141 |                         /* the accepted size depends on the algorithm, but for now\n 2142 |                            just ensure that the value is greater than zero */\n 2143 |                         return -EBADMSG;\n 2144 | \n 2145 |                 break;","lines":26},{"ref":"src/shared/dns-packet.c:2265-2290","code":" 2265 |         case DNS_TYPE_TLSA:\n 2266 |                 r = dns_packet_read_uint8(p, &rr->tlsa.cert_usage, NULL);\n 2267 |                 if (r < 0)\n 2268 |                         return r;\n 2269 | \n 2270 |                 r = dns_packet_read_uint8(p, &rr->tlsa.selector, NULL);\n 2271 |                 if (r < 0)\n 2272 |                         return r;\n 2273 | \n 2274 |                 r = dns_packet_read_uint8(p, &rr->tlsa.matching_type, NULL);\n 2275 |                 if (r < 0)\n 2276 |                         return r;\n 2277 | \n 2278 |                 if (rdlength < 3)\n 2279 |                         return -EBADMSG;\n 2280 | \n 2281 |                 r = dns_packet_read_memdup(p, rdlength - 3,\n 2282 |                                            &rr->tlsa.data, &rr->tlsa.data_size,\n 2283 |                                            NULL);\n 2284 | \n 2285 |                 if (rr->tlsa.data_size <= 0)\n 2286 |                         /* the accepted size depends on the algorithm, but for now\n 2287 |                            just ensure that the value is greater than zero */\n 2288 |                         return -EBADMSG;\n 2289 | \n 2290 |                 break;","lines":26}]},{"id":"ERR_23","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"In query_presets(), pattern_match_multiple_instances() is invoked as `pattern_match_multiple_instances(*i, name, instance_name_list) > 0`. That helper can return a negative errno (e.g. -ENOMEM from unit_name_template(), unit_name_replace_instance(), or unit_name_to_instance()). A negative return is treated identically to 'no match' (the `> 0` test is false), so the code silently falls through to the fnmatch() branch and continues, swallowing the allocation failure. On a transient OOM during preset evaluation this can cause an incorrect preset decision (e.g. enabling a unit that a templated 'disable'/'ignore' rule was meant to match) rather than propagating the error. This is a cold/preset-only path.","fix":"Capture the return value of pattern_match_multiple_instances() into a local int, propagate r < 0 out of query_presets() (the callers already handle negative returns), and only treat r > 0 as a match.","locations":[{"ref":"src/shared/install.c:3525-3530","code":" 3525 |         FOREACH_ARRAY(i, presets->rules, presets->n_rules)\n 3526 |                 if (pattern_match_multiple_instances(*i, name, instance_name_list) > 0 ||\n 3527 |                     fnmatch(i->pattern, name, FNM_NOESCAPE) == 0) {\n 3528 |                         action = i->action;\n 3529 |                         break;\n 3530 |                 }","lines":6},{"ref":"src/shared/install.c:3462-3513","code":" 3462 | static int pattern_match_multiple_instances(\n 3463 |                         const UnitFilePresetRule rule,\n 3464 |                         const char *unit_name,\n 3465 |                         char ***ret) {\n 3466 | \n 3467 |         _cleanup_free_ char *templated_name = NULL;\n 3468 |         int r;\n 3469 | \n 3470 |         assert(unit_name);\n 3471 | \n 3472 |         /* If no ret is needed or the rule itself does not have instances\n 3473 |          * initialized, we return not matching */\n 3474 |         if (!ret || !rule.instances)\n 3475 |                 return 0;\n 3476 | \n 3477 |         r = unit_name_template(unit_name, &templated_name);\n 3478 |         if (r < 0)\n 3479 |                 return r;\n 3480 |         if (!streq(rule.pattern, templated_name))\n 3481 |                 return 0;\n 3482 | \n 3483 |         /* Compose a list of specified instances when unit name is a template  */\n 3484 |         if (unit_name_is_valid(unit_name, UNIT_NAME_TEMPLATE)) {\n 3485 |                 _cleanup_strv_free_ char **out_strv = NULL;\n 3486 | \n 3487 |                 STRV_FOREACH(iter, rule.instances) {\n 3488 |                         _cleanup_free_ char *name = NULL;\n 3489 | \n 3490 |                         r = unit_name_replace_instance(unit_name, *iter, &name);\n 3491 |                         if (r < 0)\n 3492 |                                 return r;\n 3493 | \n 3494 |                         r = strv_consume(&out_strv, TAKE_PTR(name));\n 3495 |                         if (r < 0)\n 3496 |                                 return r;\n 3497 |                 }\n 3498 | \n 3499 |                 *ret = TAKE_PTR(out_strv);\n 3500 |                 return 1;\n 3501 |         } else {\n 3502 |                 /* We now know the input unit name is an instance name */\n 3503 |                 _cleanup_free_ char *instance_name = NULL;\n 3504 | \n 3505 |                 r = unit_name_to_instance(unit_name, &instance_name);\n 3506 |                 if (r < 0)\n 3507 |                         return r;\n 3508 | \n 3509 |                 if (strv_contains(rule.instances, instance_name))\n 3510 |                         return 1;\n 3511 |         }\n 3512 |         return 0;\n 3513 | }","lines":52}]},{"id":"ERR_24","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In nvme_subsystem_write_metadata(), the model string is duplicated with strndup() into `truncated` but, unlike the firmware (lines 272-274) and serial (lines 300-302) cases that immediately check `if (!truncated) return log_oom();`, the model case has NO NULL check. On OOM strndup() returns NULL, which is then passed as `line` to write_string_file_at()/write_string_file_full(), whose first action is `assert(line)` (src/basic/fileio.c:293). So an allocation failure here triggers an abort() rather than a graceful -ENOMEM. It is also an inconsistency with the two sibling blocks in the same function. Impact is limited (OOM-only, startup/sysfs path).","fix":"Add the missing NULL check right after the strndup: `_cleanup_free_ char *truncated = strndup(w, 40); if (!truncated) return log_oom();` matching the firmware and serial blocks below it.","locations":[{"ref":"src/storagetm/storagetm.c:259-266","code":"  259 |         if (w) {\n  260 |                 _cleanup_free_ char *truncated = strndup(w, 40); /* kernel refuses more than 40 chars (as per nvme spec) */\n  261 | \n  262 |                 /* The default string stored in 'attr_model' is \"Linux\" btw. */\n  263 |                 r = write_string_file_at(subsystem_fd, \"attr_model\", truncated, WRITE_STRING_FILE_DISABLE_BUFFER);\n  264 |                 if (r < 0)\n  265 |                         log_warning_errno(r, \"Failed to set model of subsystem to '%s', ignoring: %m\", w);\n  266 |         }","lines":8}]},{"id":"ERR_25","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In store_info_in_meta(), after the final utimensat() fails, the error is logged with log_error_errno(r, ...) but at this point r is 0 (the success return value of the preceding write_backing_file() call, which already passed its own 'if (r < 0) return r' check). Logging with errno 0 produces a bogus/misleading '%m' message ('Success') and, more importantly, log_error_errno(0,...) evaluates to a non-negative value so the subsequent 'return log_error_errno(r, ...)' actually returns >= 0, meaning the caller does NOT treat the utimensat failure as an error at all. The mtime-failure is silently swallowed.","fix":"Use the actual errno: 'return log_error_errno(errno, \"Failed to fix mtime of '%s': %m\", meta_path);' so the failure is reported and propagated as a negative return.","locations":[{"ref":"src/sysext/sysext.c:1397-1398","code":" 1397 |         if (utimensat(AT_FDCWD, meta_path, NULL, AT_SYMLINK_NOFOLLOW) < 0)\n 1398 |                 return log_error_errno(r, \"Failed to fix mtime of '%s': %m\", meta_path);","lines":2}]},{"id":"ERR_26","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","easy":false,"description":"bpf_firewall_prepare_access_maps() calls bpf_firewall_count_access_items() without checking its return value (line 447). That helper returns -EAFNOSUPPORT for any prefix whose family is neither AF_INET nor AF_INET6. In practice the prefixes come from validated configuration so non-IP families cannot occur, making this harmless today, but the ignored error is inconsistent with the same family switch being treated as a hard error in bpf_firewall_add_access_items().","fix":"Capture and propagate the return value: 'r = bpf_firewall_count_access_items(prefixes, &n_ipv4, &n_ipv6); if (r < 0) return r;'.","locations":[{"ref":"src/core/bpf-firewall.c:344-366","code":"  344 | static int bpf_firewall_count_access_items(Set *prefixes, size_t *n_ipv4, size_t *n_ipv6) {\n  345 |         struct in_addr_prefix *a;\n  346 | \n  347 |         assert(n_ipv4);\n  348 |         assert(n_ipv6);\n  349 | \n  350 |         SET_FOREACH(a, prefixes)\n  351 |                 switch (a->family) {\n  352 | \n  353 |                 case AF_INET:\n  354 |                         (*n_ipv4)++;\n  355 |                         break;\n  356 | \n  357 |                 case AF_INET6:\n  358 |                         (*n_ipv6)++;\n  359 |                         break;\n  360 | \n  361 |                 default:\n  362 |                         return -EAFNOSUPPORT;\n  363 |                 }\n  364 | \n  365 |         return 0;\n  366 | }","lines":23},{"ref":"src/core/bpf-firewall.c:447","code":"  447 |                 bpf_firewall_count_access_items(prefixes, &n_ipv4, &n_ipv6);","lines":1}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"parse_luks2_pkcs11_data() and parse_luks2_fido2_data() (the libcryptsetup token-plugin code paths that parse the untrusted LUKS2 header JSON) call strdup(sd_json_variant_string(w)) on the 'pkcs11-uri' / 'fido2-rp' fields after only checking the key is present, not that it is a string. sd_json_variant_string() returns NULL for non-string variants, and strdup(NULL) is undefined behavior (crash on glibc). In the normal libcryptsetup flow the matching cryptsetup_token_validate() rejects non-string fields before open/dump is invoked, so this is currently defended; but the parse helpers themselves are unsafe and would crash if ever called on unvalidated JSON (e.g. older libcryptsetup without validate, or future direct callers). Note the in-tool find_pkcs11_auto_data() correctly checks sd_json_variant_is_string() first.","fix":"Before strdup(sd_json_variant_string(w)), verify `sd_json_variant_is_string(w)` and return -EINVAL otherwise (matching find_pkcs11_auto_data() in cryptsetup-pkcs11.c), so these helpers are self-defending regardless of whether validate ran.","locations":[{"ref":"src/cryptsetup/cryptsetup-tokens/luks2-pkcs11.c:264-270","code":"  264 |         w = sd_json_variant_by_key(v, \"pkcs11-uri\");\n  265 |         if (!w)\n  266 |                 return -EINVAL;\n  267 | \n  268 |         uri = strdup(sd_json_variant_string(w));\n  269 |         if (!uri)\n  270 |                 return -ENOMEM;","lines":7},{"ref":"src/cryptsetup/cryptsetup-tokens/luks2-fido2.c:120-128","code":"  120 |         w = sd_json_variant_by_key(v, \"fido2-rp\");\n  121 |         if (w) {\n  122 |                 /* The \"rp\" field is optional. */\n  123 |                 rp = strdup(sd_json_variant_string(w));\n  124 |                 if (!rp) {\n  125 |                         crypt_log_error(cd, \"Not enough memory.\");\n  126 |                         return -ENOMEM;\n  127 |                 }\n  128 |         }","lines":9}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"Latent NULL dereference in qcow2 normalize_offset(): in the non-compressed branch the code writes '*compressed_size = 0;' guarded only by 'if (compressed)', but compressed and compressed_size are independent out-parameters. If a caller ever passes a non-NULL 'compressed' with a NULL 'compressed_size', this dereferences NULL. Current callers (qcow2_convert) always pass both non-NULL or both NULL, so it is not presently triggerable, but the guard is incorrect and fragile for a parser of untrusted qcow2 images.","fix":"Guard the write separately: 'if (compressed_size) *compressed_size = 0;' (mirroring the compressed branch at lines 158-159), or assert that compressed_size is non-NULL whenever compressed is.","locations":[{"ref":"src/import/qcow2-util.c:163-167","code":"  163 |         } else {\n  164 |                 if (compressed)  {\n  165 |                         *compressed = false;\n  166 |                         *compressed_size = 0;\n  167 |                 }","lines":5}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":true,"description":"bus_append_open_file() passes `(size_t) 1` as the element count for the `a(sst)` array in sd_bus_message_append(). sd_bus reads array element counts via va_arg(ap, unsigned) (see bus-message.c:2007/3450), so passing a size_t (8 bytes on LP64) where an unsigned (4 bytes) is consumed is a varargs type mismatch / undefined behavior. It happens to work on common ABIs because the value is small, but every other call site in this file correctly passes a plain int literal (0/1).","fix":"Pass the count as a plain int matching the other call sites: `sd_bus_message_append(m, \"(sv)\", field, \"a(sst)\", 1, of->path, of->fdname, of->flags);`","locations":[{"ref":"src/shared/bus-unit-util.c:745","code":"  745 |         r = sd_bus_message_append(m, \"(sv)\", field, \"a(sst)\", (size_t) 1, of->path, of->fdname, of->flags);","lines":1}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"In bus_slot_disconnect() the BUS_NODE_VTABLE teardown builds the lookup key for property/writable-property members from v->x.method.member instead of v->x.property.member (the _SD_BUS_VTABLE_PROPERTY / _SD_BUS_VTABLE_WRITABLE_PROPERTY case shares the method-branch field access). This only works correctly by accident: in struct sd_bus_vtable the union members 'method' and 'property' both place 'const char *member' as their first field, so the two accesses alias the same offset. If the vtable layout were ever changed so the member fields no longer coincide, set_remove() would look up a garbage key and leak the BusVTableMember (and double-register on re-add). It is fragile and inconsistent with the rest of the file which uses x.property.member for properties.","fix":"Use v->x.property.member for the _SD_BUS_VTABLE_PROPERTY / _SD_BUS_VTABLE_WRITABLE_PROPERTY key.member assignment to match the type and avoid relying on union field-aliasing.","locations":[{"ref":"src/libsystemd/sd-bus/bus-slot.c:139-149","code":"  139 |                                 case _SD_BUS_VTABLE_PROPERTY:\n  140 |                                 case _SD_BUS_VTABLE_WRITABLE_PROPERTY: {\n  141 |                                         BusVTableMember key;\n  142 | \n  143 |                                         key.path = slot->node_vtable.node->path;\n  144 |                                         key.interface = slot->node_vtable.interface;\n  145 |                                         key.member = v->x.method.member;\n  146 | \n  147 |                                         x = set_remove(slot->bus->vtable_properties, &key);\n  148 |                                         break;\n  149 |                                 }}","lines":11}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"negligible","easy":false,"description":"In fw_nftables_add_local_dnat_internal() the 'remove previous remote' path passes the raw address family `af` (AF_INET/AF_INET6) as the nfproto argument to nft_del_element(), whereas the add/delete path immediately below correctly converts via af_to_nfproto(af). This works only because NFPROTO_IPV4 == AF_INET == 2 and NFPROTO_IPV6 == AF_INET6 == 10 happen to be numerically identical, so nfproto_is_valid() inside nft_del_element() passes. It is an inconsistent, accidentally-correct API use.","fix":"Pass af_to_nfproto(af) instead of af for the nfproto parameter, matching the surrounding add/del calls, so correctness does not rely on the AF_*/NFPROTO_* constants coinciding.","locations":[{"ref":"src/shared/firewall-util.c:1084-1091","code":" 1084 |         if (add && previous_remote && !in_addr_equal(af, previous_remote, remote)) {\n 1085 |                 if (af == AF_INET)\n 1086 |                         data[0] = previous_remote->in.s_addr;\n 1087 |                 else\n 1088 |                         memcpy(data, &previous_remote->in6, sizeof(previous_remote->in6));\n 1089 | \n 1090 |                 r = nft_del_element(nfnl, &messages[msgcnt++], af, nft_table_name(), dnat_map_name(),\n 1091 |                                     key, sizeof(key), data, dlen);","lines":8}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"setup_uid_map() accepts parameters `const uid_t bind_user_uid[]` and `size_t n_bind_user_uid`, but never reads them - the function only writes the base mapping `0 arg_uid_shift arg_uid_range`. The caller declares `bind_user_uid = NULL` / `n_bind_user_uid = 0`, never populates them, and passes them through. These are remnants of the pre-852de7ed70 implementation where --bind-user= injected extra UID-map entries; the refactor switched --bind-user= to idmapped mounts (machine-bind-user.c) and removed the map injection but left the now-dead variables and parameters. Harmless but misleading: a reader may think bind-user uids are still wired into the uid_map when they are not.","fix":"Drop the `bind_user_uid`/`n_bind_user_uid` parameters from setup_uid_map() and call it as `setup_uid_map(pid)`; remove the unused `bind_user_uid`/`n_bind_user_uid` locals at nspawn.c:5301-5302.","locations":[{"ref":"src/nspawn/nspawn.c:4596-4622","code":" 4596 | static int setup_uid_map(\n 4597 |                 const PidRef *pid,\n 4598 |                 const uid_t bind_user_uid[],\n 4599 |                 size_t n_bind_user_uid) {\n 4600 | \n 4601 |         char uid_map[STRLEN(\"/proc//uid_map\") + DECIMAL_STR_MAX(uid_t) + 1];\n 4602 |         _cleanup_free_ char *s = NULL;\n 4603 |         int r;\n 4604 | \n 4605 |         assert(pidref_is_set(pid));\n 4606 |         assert(pid->pid > 1);\n 4607 | \n 4608 |         if (asprintf(&s, \"0 \" UID_FMT \" \" UID_FMT \"\\n\", arg_uid_shift, arg_uid_range) < 0)\n 4609 |                 return log_oom();\n 4610 | \n 4611 |         xsprintf(uid_map, \"/proc/\" PID_FMT \"/uid_map\", pid->pid);\n 4612 |         r = write_string_file(uid_map, s, WRITE_STRING_FILE_DISABLE_BUFFER);\n 4613 |         if (r < 0)\n 4614 |                 return log_error_errno(r, \"Failed to write UID map: %m\");\n 4615 | \n 4616 |         xsprintf(uid_map, \"/proc/\" PID_FMT \"/gid_map\", pid->pid);\n 4617 |         r = write_string_file(uid_map, s, WRITE_STRING_FILE_DISABLE_BUFFER);\n 4618 |         if (r < 0)\n 4619 |                 return log_error_errno(r, \"Failed to write GID map: %m\");\n 4620 | \n 4621 |         return 0;\n 4622 | }","lines":27},{"ref":"src/nspawn/nspawn.c:5301-5302","code":" 5301 |         _cleanup_free_ uid_t *bind_user_uid = NULL;\n 5302 |         size_t n_bind_user_uid = 0;","lines":2},{"ref":"src/nspawn/nspawn.c:5517","code":" 5517 |                         r = setup_uid_map(pid, bind_user_uid, n_bind_user_uid);","lines":1}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"json_dispatch_rlimit_value() guards out-of-range values with `if (w == RLIM_INFINITY || w != sd_json_variant_unsigned(variant))`. The second clause compares w (a uint64_t just assigned from sd_json_variant_unsigned(variant)) against the same call again, so it is always false and can never detect truncation. The apparent intent was to detect that the value does not fit in rlim_t (e.g. `w != (rlim_t) w`). On Linux rlim_t is 64-bit so there is no practical truncation today, making this harmless but the check is dead/misleading.","fix":"Replace the tautological `w != sd_json_variant_unsigned(variant)` with a real truncation check such as `(rlim_t) w != w`, or drop it if rlim_t is guaranteed 64-bit.","locations":[{"ref":"src/shared/user-record.c:324-326","code":"  324 |                 w = sd_json_variant_unsigned(variant);\n  325 |                 if (w == RLIM_INFINITY || w != sd_json_variant_unsigned(variant))\n  326 |                         return json_log(variant, flags, SYNTHETIC_ERRNO(ERANGE), \"Resource limit value '%s' is out of range.\", name);","lines":3}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"In config_parse_route_metric(), the empty-rvalue branch calls route_metric_unset(&route->metric, ltype) then 'TAKE_PTR(route)' before 'return 1'. Here 'route' is a plain local pointer obtained from ASSERT_PTR(userdata); it is not owned via a cleanup attribute in this function (ownership lives in config_parse_route_section()'s _cleanup_(route_unref_or_set_invalidp) local). TAKE_PTR() on it merely NULLs a local that is immediately discarded on return, so it has no effect. It is harmless but misleading, suggesting an ownership transfer that does not exist.","fix":"Remove the no-op 'TAKE_PTR(route);' line in the isempty(rvalue) branch; just call route_metric_unset() and 'return 1'.","locations":[{"ref":"src/network/networkd-route-metric.c:399-403","code":"  399 |         if (isempty(rvalue)) {\n  400 |                 route_metric_unset(&route->metric, ltype);\n  401 |                 TAKE_PTR(route);\n  402 |                 return 1;\n  403 |         }","lines":5}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"event_log_record_add_bank() allocates `h = memdup(hash, hash_size)` into a _cleanup_free_ pointer (line 468) but never uses it; the bank's digest is populated separately via TPM2B_DIGEST_MAKE(hash, hash_size) on line 478, which copies into the inline buffer. The memdup'd buffer is freed at scope exit without ever being read. This is a useless heap allocation (and an extra allocation per bank per record while parsing event logs).","fix":"Remove the unused `_cleanup_free_ void *h = NULL;` declaration and the `h = memdup(...)` call (lines 457 and 468-470).","locations":[{"ref":"src/pcrlock/pcrlock.c:457-478","code":"  457 |         _cleanup_free_ void *h = NULL;\n  458 | \n  459 |         assert(record);\n  460 |         assert(hash || hash_size == 0);\n  461 | \n  462 |         if (event_log_record_find_bank(record, algorithm))\n  463 |                 return -EEXIST;\n  464 | \n  465 |         if (hash_size > sizeof_field(TPM2B_DIGEST, buffer))\n  466 |                 return -E2BIG;\n  467 | \n  468 |         h = memdup(hash, hash_size);\n  469 |         if (!h)\n  470 |                 return -ENOMEM;\n  471 | \n  472 |         bank = new(EventLogRecordBank, 1);\n  473 |         if (!bank)\n  474 |                 return -ENOMEM;\n  475 | \n  476 |         *bank = (EventLogRecordBank) {\n  477 |                 .algorithm = algorithm,\n  478 |                 .hash = TPM2B_DIGEST_MAKE(hash, hash_size),","lines":22}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In calculate_verity_hash_size() the overflow guard `if (data_blocks > UINT64_MAX / data_block_size) return -EOVERFLOW;` checks whether data_blocks*data_block_size would overflow, but that product is never computed anywhere in the function (the only multiplications that matter are hashes_per_hash_block divisions and the final hash_blocks*hash_block_size, which has its own guard at line 748). Since data_blocks = ceil(data_bytes/data_block_size) <= data_bytes, this check is misleading: it neither protects a real computation nor reflects the documented merkle-tree math. It is effectively dead/incorrect and could confuse future maintainers into thinking data_blocks scaling is bounded.","fix":"Remove the spurious overflow check on data_blocks, or replace it with a meaningful bound (e.g. validating data_block_size != 0 and that hashes_per_hash_block > 1 to guarantee the bottom-up loop terminates).","locations":[{"ref":"src/repart/repart.c:721-723","code":"  721 |         uint64_t data_blocks = DIV_ROUND_UP(data_bytes, data_block_size);\n  722 |         if (data_blocks > UINT64_MAX / data_block_size)\n  723 |                 return -EOVERFLOW;","lines":3}]},{"id":"DEAD_6","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In extension_release_validate() the final 'else if (isempty(host_os_release_version_id) && isempty(host_os_extension_release_level))' branch is unreachable. Earlier (lines 100-103) the function already returns 1 whenever both host_os_release_version_id and host_os_extension_release_level are empty, so by the time control reaches this else-if at least one of them is non-empty, making the condition always false.","fix":"Remove the dead 'else if (...both empty...)' branch (lines 129-133); it can never execute given the early return at lines 100-103.","locations":[{"ref":"src/shared/extension-util.c:99-133","code":"   99 |         /* Rolling releases do not typically set VERSION_ID (eg: ArchLinux) */\n  100 |         if (isempty(host_os_release_version_id) && isempty(host_os_extension_release_level)) {\n  101 |                 log_debug(\"No version info on the host (rolling release?), but ID in %s matched.\", name);\n  102 |                 return 1;\n  103 |         }\n  104 | \n  105 |         /* If the extension has a sysext API level declared, then it must match the host API\n  106 |          * level. Otherwise, compare OS version as a whole */\n  107 |         extension_release_level = strv_env_pairs_get(extension_release, extension_level);\n  108 |         if (!isempty(host_os_extension_release_level) && !isempty(extension_release_level)) {\n  109 |                 if (!streq_ptr(host_os_extension_release_level, extension_release_level)) {\n  110 |                         log_debug(\"Extension '%s' is for API level '%s', but running on API level '%s'\",\n  111 |                                 name, strna(extension_release_level), strna(host_os_extension_release_level));\n  112 |                         return 0;\n  113 |                 }\n  114 |         } else if (!isempty(host_os_release_version_id)) {\n  115 |                 const char *extension_release_version_id;\n  116 | \n  117 |                 extension_release_version_id = strv_env_pairs_get(extension_release, \"VERSION_ID\");\n  118 |                 if (isempty(extension_release_version_id)) {\n  119 |                         log_debug(\"Extension '%s' does not contain VERSION_ID in release file but requested to match '%s'\",\n  120 |                                   name, strna(host_os_release_version_id));\n  121 |                         return 0;\n  122 |                 }\n  123 | \n  124 |                 if (!streq_ptr(host_os_release_version_id, extension_release_version_id)) {\n  125 |                         log_debug(\"Extension '%s' is for OS '%s', but deployed on top of '%s'.\",\n  126 |                                   name, strna(extension_release_version_id), strna(host_os_release_version_id));\n  127 |                         return 0;\n  128 |                 }\n  129 |         } else if (isempty(host_os_release_version_id) && isempty(host_os_extension_release_level)) {\n  130 |                 /* Rolling releases do not typically set VERSION_ID (eg: ArchLinux) */\n  131 |                 log_debug(\"No version info on the host (rolling release?), but ID in %s matched.\", name);\n  132 |                 return 1;\n  133 |         }","lines":35}]},{"id":"DEAD_7","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"groupdb_by_gid_fallbacks() guards the drop-in and NSS fallback branches with !(iterator && iterator->dropin_covered) / !(iterator && iterator->nss_covered), but iterator is unconditionally non-NULL here (asserted via assert(iterator) at the top, and the only caller groupdb_by_gid() always passes a freshly allocated iterator). The iterator && short-circuit is dead and inconsistent with the sibling helpers groupdb_by_name_fallbacks()/userdb_by_uid_fallbacks() which dereference iterator directly.","fix":"Drop the redundant iterator && from both conditions, using !iterator->dropin_covered and !iterator->nss_covered as the other *_fallbacks() helpers do.","locations":[{"ref":"src/shared/userdb.c:1417-1434","code":" 1417 |         assert(gid_is_valid(gid));\n 1418 |         assert(iterator);\n 1419 |         assert(ret);\n 1420 | \n 1421 |         if (!FLAGS_SET(flags, USERDB_EXCLUDE_DROPIN) && !(iterator && iterator->dropin_covered)) {\n 1422 |                 r = dropin_group_record_by_gid(gid, NULL, flags, ret);\n 1423 |                 if (r >= 0)\n 1424 |                         return r;\n 1425 |         }\n 1426 | \n 1427 |         if (!FLAGS_SET(flags, USERDB_EXCLUDE_NSS) && !(iterator && iterator->nss_covered)) {\n 1428 |                 r = userdb_iterator_block_nss_systemd(iterator);\n 1429 |                 if (r >= 0) {\n 1430 |                         r = nss_group_record_by_gid(gid, !FLAGS_SET(flags, USERDB_SUPPRESS_SHADOW), ret);\n 1431 |                         if (r >= 0)\n 1432 |                                 return r;\n 1433 |                 }\n 1434 |         }","lines":18}]},{"id":"DEAD_8","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":false,"description":"In pattern_match() the PATTERN_PARTITION_FLAGS case checks 'if (found.partition_flags_set && found.partition_flags != f) goto nope;' immediately followed by 'assert(!found.partition_flags_set);'. pattern_split() already rejects any pattern where the same field marker appears twice (mask_found dedup), so found.partition_flags_set is always false when this case runs. The runtime check on line 295-296 can therefore never trigger and the immediately following assert proves the predicate of that check is always false. Harmless but dead/contradictory.","fix":"Drop the redundant 'if (found.partition_flags_set && found.partition_flags != f) goto nope;' check, keeping only the assert, to match the other field cases (e.g. PATTERN_SIZE) which only assert.","locations":[{"ref":"src/sysupdate/sysupdate-pattern.c:295-298","code":"  295 |                         if (found.partition_flags_set && found.partition_flags != f)\n  296 |                                 goto nope;\n  297 | \n  298 |                         assert(!found.partition_flags_set);","lines":4}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"In condition_test_capability(), the comment says \"If it's an invalid capability, we don't have it\", which implies the condition should evaluate to false (not present). The code instead returns -EINVAL, which makes condition_test() set the result to CONDITION_ERROR and propagate an error rather than treating the capability as simply absent. This is inconsistent with sibling conditions (e.g. condition_test_architecture() returns false for an unknown architecture name) and the comment does not match the behavior. Either the comment or the return value should be corrected.","fix":"Either change the comment to reflect that an invalid capability name is reported as a configuration error (return -EINVAL), or change the behavior to `return false;` so it matches the comment and the convention used by other condition checks for unknown/invalid names.","locations":[{"ref":"src/shared/condition.c:864-867","code":"  864 |         /* If it's an invalid capability, we don't have it */\n  865 |         int value = capability_from_name(c->parameter);\n  866 |         if (value < 0)\n  867 |                 return -EINVAL;","lines":4}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","easy":false,"description":"in_addr_prefixes_reduce() uses sizeof(uint64_t) (== 8) as if it were the number of bits in a uint64_t (== 64) when indexing the ipv6_prefixlen_bits bitmap. The array is declared as ipv6_prefixlen_bits[128 / sizeof(uint64_t)] (16 elements), and both the set path (`[(p->prefixlen-1)/sizeof(uint64_t)] |= UINT64_C(1) << ((p->prefixlen-1) % sizeof(uint64_t))`) and the read path (`[i/sizeof(uint64_t)] & (UINT64_C(1) << (i % sizeof(uint64_t)))`) consistently use /8 and %8. Because the divisor and modulus are consistent, the mapping is still a bijection over prefixlens 1..128 and the code is functionally correct, but it only uses the low 8 bits of each of 16 uint64_t words (128 of 1024 allocated bits) and the math reads as a real bug to any future maintainer. The IPv4 path correctly uses a single uint32_t with proper bit indexing.","fix":"Use bit-count semantics: size the array as `(128 + 63) / 64` (or a single bitmap large enough), and index with `(p->prefixlen-1) / 64` and bit `1ULL << ((p->prefixlen-1) % 64)`, matching the read loop. This makes the intent (one bit per prefixlen) clear and avoids the misleading sizeof()-as-bitcount expression.","locations":[{"ref":"src/shared/in-addr-prefix-util.c:108-108","code":"  108 |         uint64_t ipv6_prefixlen_bits[128 / sizeof(uint64_t)] = {};","lines":1},{"ref":"src/shared/in-addr-prefix-util.c:128-129","code":"  128 |                                 ipv6_prefixlen_bits[(p->prefixlen - 1) / sizeof(uint64_t)] |=\n  129 |                                         UINT64_C(1) << ((p->prefixlen - 1) % sizeof(uint64_t));","lines":2},{"ref":"src/shared/in-addr-prefix-util.c:141-144","code":"  141 |                 for (size_t i = 0; i < 128; i++)\n  142 |                         if (ipv6_prefixlen_bits[i / sizeof(uint64_t)] &\n  143 |                             (UINT64_C(1) << (i % sizeof(uint64_t))))\n  144 |                                 ipv6_prefixlens[ipv6_n_prefixlens++] = i + 1;","lines":4}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Comment misspells the kernel command line variable name: it says \"systemd.factor_reset=\" but the variable is \"systemd.factory_reset=\". Misleading for future readers grepping for the option name.","fix":"Fix the typo: \"systemd.factor_reset=\" -> \"systemd.factory_reset=\".","locations":[{"ref":"src/factory-reset/factory-reset-generator.c:8-9","code":"    8 | /* This generator pulls factory-reset-now.target into the initial transaction the kernel command line's\n    9 |  * systemd.factor_reset= variable, or the FactoryResetRequest EFI variable say so. */","lines":2}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Misleading comment in qcow2 verify_header(): the check 'HEADER_CLUSTER_BITS(header) < 9' is annotated '/* 512K */' but cluster_bits of 9 corresponds to a 512-BYTE cluster (1<<9 = 512), not 512K. The adjacent >21 check is correctly annotated 2MB. The wrong comment can mislead future readers reasoning about cluster-size bounds on untrusted qcow2 input.","fix":"Chan
