<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"_nss_resolve_gethostbyname4_r guards the empty-result case only with sd_json_variant_is_blank_object(p.addresses) (line 267). But p.addresses is dispatched as SD_JSON_VARIANT_ARRAY (mandatory), and sd_json_variant_is_blank_object() returns true only for a null/empty *object*, never for an empty *array* (see sd-json.c:1124-1129). So a resolved reply containing addresses:[] (or an array whose entries all have an unsupported family, since the packing loop at 309-327 skips non-INET/INET6) passes the guard with n_addresses==0. The packing loop then never assigns r_tuple, and the assert(r_tuple) at line 329 aborts the calling process. Any process performing hostname resolution would crash on such a (malformed/edge-case) resolved reply.","fix":"Treat an empty/zero-matching address set as not-found: after counting, if n_addresses == 0 goto not_found (mirroring the blank check). Equivalently replace the is_blank_object guard with a proper empty-array check or check n_addresses==0 before packing.","locations":[{"ref":"src/nss-resolve/nss-resolve.c:267-268","code":"  267 |         if (sd_json_variant_is_blank_object(p.addresses))\n  268 |                 goto not_found;","lines":2},{"ref":"src/nss-resolve/nss-resolve.c:309-330","code":"  309 |         JSON_VARIANT_ARRAY_FOREACH(entry, p.addresses) {\n  310 |                 AddressParameters q = {};\n  311 | \n  312 |                 r = sd_json_dispatch(entry, address_parameters_dispatch_table, nss_json_dispatch_flags, &q);\n  313 |                 if (r < 0)\n  314 |                         goto fail;\n  315 | \n  316 |                 if (!IN_SET(q.family, AF_INET, AF_INET6))\n  317 |                         continue;\n  318 | \n  319 |                 r_tuple = (struct gaih_addrtuple*) (buffer + idx);\n  320 |                 r_tuple->next = (struct gaih_addrtuple*) ((char*) r_tuple + ALIGN(sizeof(struct gaih_addrtuple)));\n  321 |                 r_tuple->name = r_name;\n  322 |                 r_tuple->family = q.family;\n  323 |                 r_tuple->scopeid = ifindex_to_scopeid(q.family, &q.address, q.ifindex);\n  324 |                 memcpy(r_tuple->addr, &q.address, q.address_size);\n  325 | \n  326 |                 idx += ALIGN(sizeof(struct gaih_addrtuple));\n  327 |         }\n  328 | \n  329 |         assert(r_tuple);  /* We had at least one address, so r_tuple must be set */\n  330 |         r_tuple->next = NULL;  /* Override last next pointer */","lines":22}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"event_log_record_validate_hash_firmware() handles EV_EFI_VARIABLE_BOOT by reinterpreting the firmware payload as a UEFI_VARIABLE_DATA and asserting that the payload is large enough to hold the structure and the variable name: `assert(record->firmware_payload_size >= offsetof(UEFI_VARIABLE_DATA, unicodeName))` (line 1471) and `assert(record->firmware_payload_size >= skip)` where skip = offsetof(unicodeName) + vdata->unicodeNameLength*2 (lines 1472-1474). The comment at lines 1468-1469 claims 'we already checked the general validity of the UEFI_VARIABLE_DATA structure', but that validation only happens in event_log_record_parse_variable_data(), which is called from event_log_record_extract_firmware_description(). That function (a) skips all parsing/validation and jumps to 'catchall' when arg_raw_description is set (line 566-567), and (b) when the variable-data validation fails it merely logs and sets event_payload_valid=NO, without preventing the later hash-validation pass from running. event_log_validate_record_hashes() (line 1590-1606) then iterates every firmware record unconditionally with no early-out on event_payload_valid==NO. Therefore a crafted/corrupt firmware TPM2 event log containing an EV_EFI_VARIABLE_BOOT record with a too-small payload or an oversized unicodeNameLength makes the asserts fire and aborts the process. This is reachable via `systemd-pcrlock log` (verb_show_log -> event_log_load_and_process -> event_log_validate_record_hashes), and even more easily with `--raw-description`. The firmware event log (/sys/kernel/security/tpm0/binary_bios_measurements) is parsed as essentially untrusted input. Impact is an abort/DoS rather than memory corruption (the assert evaluates before any out-of-bounds read).","fix":"In event_log_record_validate_hash_firmware()'s EV_EFI_VARIABLE_BOOT case, replace the asserts with explicit runtime checks that return/skip gracefully (e.g. if firmware_payload_size < offsetof(UEFI_VARIABLE_DATA, unicodeName) or the computed skip overflows / exceeds firmware_payload_size, treat the record as unvalidatable and return 0). Also guard unicodeNameLength*2 against overflow as event_log_record_parse_variable_data() does. Alternatively, have event_log_validate_record_hashes()/this function early-out when record->event_payload_valid == EVENT_PAYLOAD_VALID_NO, and ensure the structure is always validated regardless of arg_raw_description.","locations":[{"ref":"src/pcrlock/pcrlock.c:1461-1478","code":" 1461 |         case EV_EFI_VARIABLE_BOOT: {\n 1462 |                 const UEFI_VARIABLE_DATA *vdata = record->firmware_payload;\n 1463 |                 size_t skip;\n 1464 | \n 1465 |                 /* Here the extended hash value is the hash value of the variable data (i.e. excluding the\n 1466 |                  * name).\n 1467 |                  *\n 1468 |                  * Note: we already checked the general validity of the UEFI_VARIABLE_DATA structure, hence\n 1469 |                  * no need to do so again. */\n 1470 | \n 1471 |                 assert(record->firmware_payload_size >= offsetof(UEFI_VARIABLE_DATA, unicodeName));\n 1472 |                 skip = offsetof(UEFI_VARIABLE_DATA, unicodeName) + vdata->unicodeNameLength * 2;\n 1473 | \n 1474 |                 assert(record->firmware_payload_size >= skip);\n 1475 |                 hdata = (const uint8_t*) record->firmware_payload + skip;\n 1476 |                 hsz = record->firmware_payload_size - skip;\n 1477 |                 strict = true;\n 1478 |                 break;","lines":18},{"ref":"src/pcrlock/pcrlock.c:1583-1606","code":" 1583 | static int event_log_validate_record_hashes(EventLog *el) {\n 1584 |         int r;\n 1585 | \n 1586 |         assert(el);\n 1587 | \n 1588 |         /* For records which contain the full data to validate the hashes, do so. */\n 1589 | \n 1590 |         FOREACH_ARRAY(rr, el->records, el->n_records) {\n 1591 | \n 1592 |                 LIST_FOREACH(banks, bank, (*rr)->banks) {\n 1593 |                         const EVP_MD *md;\n 1594 |                         const char *a;\n 1595 | \n 1596 |                         assert_se(a = tpm2_hash_alg_to_string(bank->algorithm));\n 1597 |                         assert_se(md = sym_EVP_get_digestbyname(a));\n 1598 | \n 1599 |                         r = event_log_record_validate_hash_firmware(*rr, bank, md);\n 1600 |                         if (r < 0)\n 1601 |                                 return r;\n 1602 | \n 1603 |                         r = event_log_record_validate_hash_userspace(*rr, bank, md);\n 1604 |                         if (r < 0)\n 1605 |                                 return r;\n 1606 |                 }","lines":24},{"ref":"src/pcrlock/pcrlock.c:557-593","code":"  557 | static int event_log_record_extract_firmware_description(EventLogRecord *rec) {\n  558 |         _cleanup_free_ char *fallback = NULL;\n  559 |         int r;\n  560 | \n  561 |         assert(rec);\n  562 | \n  563 |         if (!EVENT_LOG_RECORD_IS_FIRMWARE(rec))\n  564 |                 return 0;\n  565 | \n  566 |         if (arg_raw_description)\n  567 |                 goto catchall;\n  568 | \n  569 |         switch (rec->firmware_event_type) {\n  570 | \n  571 |         case EV_EFI_VARIABLE_DRIVER_CONFIG:\n  572 |         case EV_EFI_VARIABLE_BOOT:\n  573 |         case EV_EFI_VARIABLE_BOOT2:\n  574 |         case EV_EFI_VARIABLE_AUTHORITY: {\n  575 |                 _cleanup_free_ char *p = NULL;\n  576 |                 sd_id128_t uuid;\n  577 | \n  578 |                 r = event_log_record_parse_variable_data(rec, &uuid, &p);\n  579 |                 if (r == -ENOMEM)\n  580 |                         return log_oom();\n  581 |                 if (r < 0) {\n  582 |                         log_warning_errno(r, \"EFI variable data invalid, ignoring.\");\n  583 |                         goto invalid;\n  584 |                 }\n  585 | \n  586 |                 if (asprintf(&rec->description, \"%s: %s-\" SD_ID128_UUID_FORMAT_STR,\n  587 |                              rec->firmware_event_type == EV_EFI_VARIABLE_AUTHORITY ? \"Authority\" : \"Variable\",\n  588 |                              p,\n  589 |                              SD_ID128_FORMAT_VAL(uuid)) < 0)\n  590 |                         return log_oom();\n  591 | \n  592 |                 return 1;\n  593 |         }","lines":37}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"user_record_luks_sector_size() computes 63 - __builtin_clzll(h->luks_sector_size). __builtin_clzll(0) is undefined behavior. luksSectorSize is parsed from the JSON record via plain sd_json_dispatch_uint64 (in both the top-level user_dispatch_table and the perMachine table) with no lower-bound validation, so an untrusted/malicious user record with \"luksSectorSize\": 0 stores 0 in h->luks_sector_size. The only guard before the clz is == UINT64_MAX. homework-luks.c reaches user_record_luks_sector_size() for any value other than UINT64_MAX (its 0-special-case only checks UINT64_MAX), so the UB is reachable on the homed path that processes untrusted records. The surrounding CLAMP(...,512,4096) limits the practical damage but the shift/clz is still UB and may yield a garbage sector size.","fix":"Guard against 0 in user_record_luks_sector_size() (e.g. if (h->luks_sector_size == UINT64_MAX || h->luks_sector_size == 0) return 512;), or validate luksSectorSize during dispatch to reject values < 512.","locations":[{"ref":"src/shared/user-record.c:2060-2068","code":" 2060 | uint64_t user_record_luks_sector_size(UserRecord *h) {\n 2061 |         assert(h);\n 2062 | \n 2063 |         if (h->luks_sector_size == UINT64_MAX)\n 2064 |                 return 512;\n 2065 | \n 2066 |         /* Allow up to 4K due to dm-crypt support and 4K alignment by the homed LUKS backend */\n 2067 |         return CLAMP(UINT64_C(1) << (63 - __builtin_clzll(h->luks_sector_size)), 512U, 4096U);\n 2068 | }","lines":9},{"ref":"src/shared/user-record.c:1334","code":" 1334 |                 { \"luksSectorSize\",             _SD_JSON_VARIANT_TYPE_INVALID, sd_json_dispatch_uint64,              offsetof(UserRecord, luks_sector_size),              0              },","lines":1},{"ref":"src/shared/user-record.c:1704","code":" 1704 |                 { \"luksSectorSize\",             _SD_JSON_VARIANT_TYPE_INVALID, sd_json_dispatch_uint64,              offsetof(UserRecord, luks_sector_size),              0              },","lines":1},{"ref":"src/home/homework-luks.c:2372-2384","code":" 2372 |         if (h->luks_sector_size == UINT64_MAX) {\n 2373 |                 /* If sector size is not specified, select UINT32_MAX, i.e. auto-probe */\n 2374 |                 image_sector_size = UINT32_MAX;\n 2375 |                 /* Let cryptsetup decide if the sector size is not specified in home record */\n 2376 |                 luks_sector_size = 0;\n 2377 |         } else {\n 2378 |                 if (S_ISBLK(st.st_mode)) {\n 2379 |                         /* For physical block devices always use the actual device logical\n 2380 |                          * sector size. Else the partition will not be discoverable by kernel. */\n 2381 |                         image_sector_size = UINT32_MAX;\n 2382 |                         luks_sector_size = user_record_luks_sector_size(h);\n 2383 |                 } else\n 2384 |                         image_sector_size = luks_sector_size = user_record_luks_sector_size(h);","lines":13}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"catalog_list() does `assert_se(s = find_id(p, items[n].id))` for every item id read from the on-disk database. find_id() returns NULL when bsearch fails to locate the id (which can happen for a corrupt/inconsistent database where item ids do not all resolve, e.g. due to suffix/locale handling), turning untrusted-input corruption into an abort() rather than a graceful error. catalog_get() handles the NULL case correctly; this listing path does not.","fix":"Replace the assert_se with a graceful check: if find_id() returns NULL, log_debug and continue (or return -EBADMSG) instead of asserting.","locations":[{"ref":"src/libsystemd/sd-journal/catalog.c:690-702","code":"  690 |         for (size_t n = 0; n < le64toh(h->n_items); n++) {\n  691 |                 const char *s;\n  692 | \n  693 |                 if (last_id_set && sd_id128_equal(last_id, items[n].id))\n  694 |                         continue;\n  695 | \n  696 |                 assert_se(s = find_id(p, items[n].id));\n  697 | \n  698 |                 dump_catalog_entry(f, items[n].id, s, oneline);\n  699 | \n  700 |                 last_id_set = true;\n  701 |                 last_id = items[n].id;\n  702 |         }","lines":13}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"When parsing an existing on-disk GPT, partition size/start/end values returned by libfdisk (which are 64-bit LBA counts originating directly from the GPT entries on disk) are multiplied by the sector size guarded only by plain assert() (e.g. `assert(sz <= UINT64_MAX/secsz); sz *= secsz;`). systemd ships with assert() enabled, so a deliberately corrupt/crafted GPT (e.g. on an attacker-supplied USB stick or disk image processed by repart) with a partition size or start LBA close to UINT64_MAX triggers a controlled SIGABRT rather than a graceful EINVAL/EIO. This is a denial-of-service on disk input that is not fully trusted. The same pattern repeats for nsectors/first_lba/last_lba and in determine_current_padding(). It only aborts (no memory corruption), hence low severity, but a graceful error return would be more robust for untrusted disks.","fix":"Replace the assert()s on disk-derived sector counts with explicit checks that return log_error_errno(SYNTHETIC_ERRNO(EINVAL/EIO), ...) when sz/start/end exceed UINT64_MAX/secsz, so a corrupt GPT is rejected gracefully instead of aborting the process.","locations":[{"ref":"src/repart/repart.c:4007-4013","code":" 4007 |                 sz = sym_fdisk_partition_get_size(p);\n 4008 |                 assert(sz <= UINT64_MAX/secsz);\n 4009 |                 sz *= secsz;\n 4010 | \n 4011 |                 start = sym_fdisk_partition_get_start(p);\n 4012 |                 assert(start <= UINT64_MAX/secsz);\n 4013 |                 start *= secsz;","lines":7},{"ref":"src/repart/repart.c:3410-3416","code":" 3410 |                 sz = sym_fdisk_partition_get_size(p);\n 3411 |                 assert(sz <= UINT64_MAX/secsz);\n 3412 |                 sz *= secsz;\n 3413 | \n 3414 |                 start = sym_fdisk_partition_get_start(p);\n 3415 |                 assert(start <= UINT64_MAX/secsz);\n 3416 |                 start *= secsz;","lines":7},{"ref":"src/repart/repart.c:3284-3320","code":" 3284 |         offset = sym_fdisk_partition_get_end(p);\n 3285 |         assert(offset < UINT64_MAX);\n 3286 |         offset++; /* The end is one sector before the next partition or padding. */\n 3287 |         assert(offset < UINT64_MAX / secsz);\n 3288 |         offset *= secsz;\n 3289 | \n 3290 |         n_partitions = sym_fdisk_table_get_nents(t);\n 3291 |         for (size_t i = 0; i < n_partitions; i++) {\n 3292 |                 struct fdisk_partition *q;\n 3293 |                 uint64_t start;\n 3294 | \n 3295 |                 q = sym_fdisk_table_get_partition(t, i);\n 3296 |                 if (!q)\n 3297 |                         return log_error_errno(SYNTHETIC_ERRNO(EIO), \"Failed to read partition metadata.\");\n 3298 | \n 3299 |                 if (sym_fdisk_partition_is_used(q) <= 0)\n 3300 |                         continue;\n 3301 | \n 3302 |                 if (!sym_fdisk_partition_has_start(q))\n 3303 |                         continue;\n 3304 | \n 3305 |                 start = sym_fdisk_partition_get_start(q);\n 3306 |                 assert(start < UINT64_MAX / secsz);\n 3307 |                 start *= secsz;\n 3308 | \n 3309 |                 if (start >= offset && (next == UINT64_MAX || next > start))\n 3310 |                         next = start;\n 3311 |         }\n 3312 | \n 3313 |         if (next == UINT64_MAX) {\n 3314 |                 /* No later partition? In that case check the end of the usable area */\n 3315 |                 next = sym_fdisk_get_last_lba(c);\n 3316 |                 assert(next < UINT64_MAX);\n 3317 |                 next++; /* The last LBA is one sector before the end */\n 3318 | \n 3319 |                 assert(next < UINT64_MAX / secsz);\n 3320 |                 next *= secsz;","lines":37},{"ref":"src/repart/repart.c:4091-4103","code":" 4091 |         nsectors = sym_fdisk_get_nsectors(c);\n 4092 |         assert(nsectors <= UINT64_MAX/secsz);\n 4093 |         nsectors *= secsz;\n 4094 | \n 4095 |         first_lba = sym_fdisk_get_first_lba(c);\n 4096 |         assert(first_lba <= UINT64_MAX/secsz);\n 4097 |         first_lba *= secsz;\n 4098 | \n 4099 |         last_lba = sym_fdisk_get_last_lba(c);\n 4100 |         assert(last_lba < UINT64_MAX);\n 4101 |         last_lba++;\n 4102 |         assert(last_lba <= UINT64_MAX/secsz);\n 4103 |         last_lba *= secsz;","lines":13}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"In spc_indirect_data_content_new(), SpcIndirectDataContent_new() return value is not checked for NULL before being dereferenced. Line 226 assigns idc = SpcIndirectDataContent_new(); and line 227 immediately dereferences idc->data->value = sym_ASN1_TYPE_new();. Every other ASN1 _new() in this function (e.g. peid at lines 214-216, link at 196-198) is NULL-checked with `return log_oom()`, so this one was clearly missed. On allocation failure (OOM) this is a NULL pointer dereference / crash instead of a clean error return.","fix":"Add a NULL check right after the allocation, matching the surrounding pattern: `_cleanup_(SpcIndirectDataContent_freep) SpcIndirectDataContent *idc = SpcIndirectDataContent_new(); if (!idc) return log_oom();` before the first idc->data->value dereference.","locations":[{"ref":"src/sbsign/sbsign.c:226-234","code":"  226 |         _cleanup_(SpcIndirectDataContent_freep) SpcIndirectDataContent *idc = SpcIndirectDataContent_new();\n  227 |         idc->data->value = sym_ASN1_TYPE_new();\n  228 |         if (!idc->data->value)\n  229 |                 return log_oom();\n  230 | \n  231 |         idc->data->value->type = V_ASN1_SEQUENCE;\n  232 |         idc->data->value->value.sequence = sym_ASN1_STRING_new();\n  233 |         if (!idc->data->value->value.sequence)\n  234 |                 return log_oom();","lines":9}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"dissect_image() asserts assert((uint64_t) start < UINT64_MAX/512) and assert((uint64_t) size < UINT64_MAX/512) on the partition start/size values returned by libblkid for a (potentially untrusted) disk image, before multiplying by 512 to form byte offsets/sizes. These are derived from on-disk partition table contents. libblkid normally clamps these to the backing device geometry, so in practice the values are bounded, but relying on an assert() (which aborts the whole process in builds with assertions, and is a no-op converting to UB-free-but-wrong multiplication otherwise) for sanitizing disk-derived data is fragile. If a crafted/garbage partition entry ever slipped a value >= UINT64_MAX/512 past blkid, this would abort the process dissecting the image rather than returning an error.","fix":"Replace the assert()s with explicit range checks that return a clean error (e.g. -EBADMSG / -ERANGE) when (uint64_t) start or size exceeds UINT64_MAX/512, so malformed images are rejected gracefully instead of aborting.","locations":[{"ref":"src/shared/dissect-image.c:1252-1264","code":" 1252 |                 start = sym_blkid_partition_get_start(pp);\n 1253 |                 if (start < 0)\n 1254 |                         return errno_or_else(EIO);\n 1255 | \n 1256 |                 assert((uint64_t) start < UINT64_MAX/512);\n 1257 | \n 1258 |                 errno = 0;\n 1259 |                 size = sym_blkid_partition_get_size(pp);\n 1260 |                 if (size < 0)\n 1261 |                         return errno_or_else(EIO);\n 1262 | \n 1263 |                 assert((uint64_t) size < UINT64_MAX/512);\n 1264 | ","lines":13}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"low","easy":false,"description":"fstab_is_mount_point_full() passes sym_mnt_fs_get_source(fs) directly to fstab_is_same_node(), which calls fstab_node_to_udev_node() that begins with assert(p). libmount can return NULL for the source of certain fstab entries (e.g. malformed/special lines), so a crafted /etc/fstab entry could trigger an assertion abort when path!=NULL is requested. fstab is root-controlled so impact is limited, but the assert-on-parsed-input pattern is fragile (other loops in this file, e.g. fstab_has_mount_point_prefix_strv(), defensively skip NULL targets).","fix":"In fstab_is_mount_point_full(), guard against a NULL source: e.g. `const char *src = sym_mnt_fs_get_source(fs); if (!src) continue;` before calling fstab_is_same_node(), or make fstab_is_same_node()/fstab_node_to_udev_node() tolerate a NULL input instead of asserting.","locations":[{"ref":"src/shared/fstab-util.c:194-196","code":"  194 |                 r = fstab_is_same_node(sym_mnt_fs_get_source(fs), path);\n  195 |                 if (r > 0 || (r < 0 && !ERRNO_IS_DEVICE_ABSENT(r)))\n  196 |                         return r;","lines":3},{"ref":"src/shared/fstab-util.c:100-108","code":"  100 | static int fstab_is_same_node(const char *what_fstab, const char *path) {\n  101 |         _cleanup_free_ char *node = NULL;\n  102 | \n  103 |         assert(what_fstab);\n  104 |         assert(path);\n  105 | \n  106 |         node = fstab_node_to_udev_node(what_fstab);\n  107 |         if (!node)\n  108 |                 return -ENOMEM;","lines":9}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"negligible","easy":false,"description":"show_man_page() computes k = strlen(desc) and then unconditionally dereferences desc[k-1] to check for a trailing ')'. If desc is the empty string, k == 0 and desc[k-1] reads desc[-1], a one-byte out-of-bounds read. All current callers pass non-empty hard-coded man page references, so this is defensive only, but the function takes a generic const char* and has no guard.","fix":"Add an early guard, e.g. `if (isempty(desc)) return -EINVAL;` (or `k == 0` check) before indexing desc[k-1].","locations":[{"ref":"src/shared/pager.c:303-312","code":"  303 | int show_man_page(const char *desc, bool null_stdio) {\n  304 |         const char *args[4] = { \"man\", NULL, NULL, NULL };\n  305 |         const char *e = NULL;\n  306 |         size_t k;\n  307 |         int r;\n  308 | \n  309 |         k = strlen(desc);\n  310 | \n  311 |         if (desc[k-1] == ')')\n  312 |                 e = strrchr(desc, '(');","lines":10}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":true,"description":"compression_config_put() removes a stale COMPRESSION_NONE entry incorrectly. When a non-NONE algorithm is added while a COMPRESSION_NONE entry already exists in the map, line 44 does free(ordered_hashmap_get(*configs, INT_TO_PTR(COMPRESSION_NONE))) - this frees the stored value but leaves the dangling entry (key + freed value pointer) in the hashmap. Compare with line 41 which correctly uses ordered_hashmap_remove() before free(). The map uses trivial_hash_ops_value_free, so the freed value will be freed AGAIN when the hashmap is later destroyed (or that entry is replaced), producing a double-free; any read of the entry is a use-after-free. The state is reachable via configuration: a 'Compression=no' line/drop-in stores COMPRESSION_NONE, a subsequent 'Compression=zstd' line then triggers line 42-44, and compression_configs_mangle() (line 53 ordered_hashmap_contains(NONE) still true) frees the whole map, double-freeing the NONE value. This file feeds both systemd-journal-remote and systemd-journal-upload.","fix":"Use free(ordered_hashmap_remove(*configs, INT_TO_PTR(COMPRESSION_NONE))); so the entry is actually removed from the hashmap, matching the pattern used on line 41.","locations":[{"ref":"src/journal-remote/journal-compression-util.c:42-44","code":"   42 |         } else\n   43 |                 /* otherwise, drop 'none' if stored. */\n   44 |                 free(ordered_hashmap_get(*configs, INT_TO_PTR(COMPRESSION_NONE)));","lines":3}]},{"id":"UAF_2","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":true,"description":"process_timeout() invokes the reply callback (c->callback) and then dereferences the slot afterwards (reads slot->floating and calls netlink_slot_disconnect(slot, true)) without pinning the slot with an extra reference for the duration of the callback. The callback may drop the last reference to the slot object (e.g. by calling sd_netlink_slot_unref on its handle), freeing the sd_netlink_slot. The subsequent slot->floating read at line 326 and netlink_slot_disconnect() at line 327 are then a use-after-free. This is the exact same bug that commit 332ecf40f2 (\"sd-netlink: pin reply slot while we execute callback\") fixed in the sibling function process_reply(), where a local '_cleanup_(sd_netlink_slot_unrefp) sd_netlink_slot *slot = sd_netlink_slot_ref(container_of(...))' was introduced. process_timeout() was left with the old, vulnerable 'slot = container_of(c, ...)' pattern. This path runs whenever an outstanding netlink request times out.","fix":"Mirror the fix from process_reply(): replace 'sd_netlink_slot *slot;' / 'slot = container_of(c, sd_netlink_slot, reply_callback);' with '_cleanup_(sd_netlink_slot_unrefp) sd_netlink_slot *slot = sd_netlink_slot_ref(container_of(c, sd_netlink_slot, reply_callback));' so the slot stays alive across the callback and the subsequent slot->floating / netlink_slot_disconnect() access.","locations":[{"ref":"src/libsystemd/sd-netlink/sd-netlink.c:317-327","code":"  317 |         slot = container_of(c, sd_netlink_slot, reply_callback);\n  318 | \n  319 |         r = c->callback(nl, m, slot->userdata);\n  320 |         if (r < 0)\n  321 |                 log_debug_errno(r, \"sd-netlink: timedout callback %s%s%sfailed: %m\",\n  322 |                                 slot->description ? \"'\" : \"\",\n  323 |                                 strempty(slot->description),\n  324 |                                 slot->description ? \"' \" : \"\");\n  325 | \n  326 |         if (slot->floating)\n  327 |                 netlink_slot_disconnect(slot, true);","lines":11}]},{"id":"UAF_3","type":"use_after_free","type_label":"Use After Free","severity":"medium","easy":false,"description":"In bus_method_register_service(), the service is inserted into m->dnssd_registered_services via hashmap_ensure_put() (line 2058) BEFORE service->manager is assigned (line 2070). If sd_bus_track_new() (line 2062) or sd_bus_track_add_sender() (line 2066) fails, the function returns and the _cleanup_(dnssd_registered_service_freep) destructor runs. dnssd_registered_service_free() only removes the service from the hashmap when service->manager is non-NULL (resolved-dnssd.c:53-54), but manager is still NULL at this point, so the freed service pointer remains in m->dnssd_registered_services. A subsequent lookup (e.g. another RegisterService with the same id, or RRs refresh) will dereference the dangling pointer. Triggering requires the sd_bus_track calls to fail (e.g. OOM), so it is not trivially reachable, but it is a genuine dangling-pointer/use-after-free.","fix":"Set service->manager = m before (or immediately after) the hashmap_ensure_put() at line 2058, so that the cleanup destructor removes the entry from the hashmap on any subsequent error path. Alternatively, on the track failure paths explicitly hashmap_remove() the service before returning.","locations":[{"ref":"src/resolve/resolved-bus.c:2058-2072","code":" 2058 |         r = hashmap_ensure_put(&m->dnssd_registered_services, &string_hash_ops, service->id, service);\n 2059 |         if (r < 0)\n 2060 |                 return r;\n 2061 | \n 2062 |         r = sd_bus_track_new(sd_bus_message_get_bus(message), &bus_track, dnssd_registered_service_on_bus_track, service);\n 2063 |         if (r < 0)\n 2064 |                 return r;\n 2065 | \n 2066 |         r = sd_bus_track_add_sender(bus_track, message);\n 2067 |         if (r < 0)\n 2068 |                 return r;\n 2069 | \n 2070 |         service->manager = m;\n 2071 | \n 2072 |         service = NULL;","lines":15},{"ref":"src/resolve/resolved-dnssd.c:49-69","code":"   49 | DnssdRegisteredService *dnssd_registered_service_free(DnssdRegisteredService *service) {\n   50 |         if (!service)\n   51 |                 return NULL;\n   52 | \n   53 |         if (service->manager)\n   54 |                 hashmap_remove(service->manager->dnssd_registered_services, service->id);\n   55 | \n   56 |         dns_resource_record_unref(service->ptr_rr);\n   57 |         dns_resource_record_unref(service->sub_ptr_rr);\n   58 |         dns_resource_record_unref(service->srv_rr);\n   59 | \n   60 |         dnssd_txtdata_free_all(service->txt_data_items);\n   61 | \n   62 |         free(service->path);\n   63 |         free(service->id);\n   64 |         free(service->type);\n   65 |         free(service->subtype);\n   66 |         free(service->name_template);\n   67 | \n   68 |         return mfree(service);\n   69 | }","lines":21}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"bpf_restrict_fs_update() creates an inner BPF map fd via compat_bpf_map_create() (stored in plain 'int inner_map_fd', not _cleanup_close_), inserts it into the outer map-of-maps with bpf_map_update_elem(), and then never closes it on any return path (success at line 187, or error returns at 155/161/182). The kernel takes its own reference to the inner map when it is stored in the outer map, so the userspace fd must be closed. Contrast with prepare_restrict_fs_bpf() in the same file, which correctly uses '_cleanup_close_ int inner_map_fd'. This function is called once per service start that uses RestrictFileSystems= (via exec-invoke.c:1896), so PID1 leaks one file descriptor for every such service (re)start over the manager's lifetime, eventually exhausting the fd table.","fix":"Declare inner_map_fd as '_cleanup_close_ int inner_map_fd = -EBADF;' (matching prepare_restrict_fs_bpf), or explicitly safe_close(inner_map_fd) before all returns after the value has been stored into the outer map.","locations":[{"ref":"src/core/bpf-restrict-fs.c:144-187","code":"  144 |         int inner_map_fd = compat_bpf_map_create(\n  145 |                         BPF_MAP_TYPE_HASH,\n  146 |                         NULL,\n  147 |                         sizeof(uint32_t),\n  148 |                         sizeof(uint32_t),\n  149 |                         128U, /* Should be enough for all filesystem types */\n  150 |                         NULL);\n  151 |         if (inner_map_fd < 0)\n  152 |                 return log_error_errno(errno, \"bpf-restrict-fs: Failed to create inner BPF map: %m\");\n  153 | \n  154 |         if (sym_bpf_map_update_elem(outer_map_fd, &cgroup_id, &inner_map_fd, BPF_ANY) != 0)\n  155 |                 return log_error_errno(errno, \"bpf-restrict-fs: Error populating BPF map: %m\");\n  156 | \n  157 |         uint32_t allow = allow_list;\n  158 | \n  159 |         /* Use key 0 to store whether this is an allow list or a deny list */\n  160 |         if (sym_bpf_map_update_elem(inner_map_fd, &zero, &allow, BPF_ANY) != 0)\n  161 |                 return log_error_errno(errno, \"bpf-restrict-fs: Error initializing map: %m\");\n  162 | \n  163 |         SET_FOREACH(fs, filesystems) {\n  164 |                 r = fs_type_from_string(fs, &magic);\n  165 |                 if (r < 0) {\n  166 |                         log_warning(\"bpf-restrict-fs: Invalid filesystem name '%s', ignoring.\", fs);\n  167 |                         continue;\n  168 |                 }\n  169 | \n  170 |                 log_debug(\"bpf-restrict-fs: Restricting filesystem access to '%s'\", fs);\n  171 | \n  172 |                 for (int i = 0; i < FILESYSTEM_MAGIC_MAX; i++) {\n  173 |                         if (magic[i] == 0)\n  174 |                                 break;\n  175 | \n  176 |                         if (sym_bpf_map_update_elem(inner_map_fd, &magic[i], &dummy_value, BPF_ANY) != 0) {\n  177 |                                 r = log_error_errno(errno, \"bpf-restrict-fs: Failed to update BPF map: %m\");\n  178 | \n  179 |                                 if (sym_bpf_map_delete_elem(outer_map_fd, &cgroup_id) != 0)\n  180 |                                         log_debug_errno(errno, \"bpf-restrict-fs: Failed to delete cgroup entry from BPF map: %m\");\n  181 | \n  182 |                                 return r;\n  183 |                         }\n  184 |                 }\n  185 |         }\n  186 | \n  187 |         return 0;","lines":44}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"In dev_kmsg_record(), when the kmsg record is recognized as self-generated (is_us() true) and the per-source ratelimit fires, the function does `return` at the point shown, bypassing the `finish:` cleanup loop (lines 321-323) that frees the `z` heap-allocated _KERNEL_*/_UDEV_DEVNODE=/_UDEV_SYSNAME=/_UDEV_DEVLINK= iovec buffers allocated earlier in the function (lines 206-255). Every other exit after those allocations reaches `finish:` either by `goto finish` or by falling through. This is a leak on the ratelimited self-log path. In practice journald's own messages rarely carry kernel metadata fields so z is usually 0, but a crafted/forwarded record attributed to journald with kernel metadata fields would leak those buffers each time the own-ratelimit suppresses it.","fix":"Replace the bare `return` at line 291 with `goto finish;` so the allocated kernel/udev field buffers are freed. (saved_log_max_level was not yet modified at this point, so no level restore is needed there.)","locations":[{"ref":"src/journal/journald-kmsg.c:289-291","code":"  289 |                 if (is_us(identifier, pid)) {\n  290 |                         if (!ratelimit_below(&m->kmsg_own_ratelimit))\n  291 |                                 return;","lines":3},{"ref":"src/journal/journald-kmsg.c:321-324","code":"  321 | finish:\n  322 |         for (j = 0; j < z; j++)\n  323 |                 free(iovec[j].iov_base);\n  324 | }","lines":4}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"In merge_subprocess() the variable 'filename' is declared once at function scope with _cleanup_free_, but it is (re)assigned inside the HASHMAP_FOREACH loop via path_extract_filename(img->path, &filename). path_extract_filename()/path_split_prefix_filename() writes '*ret_filename = fn' WITHOUT freeing any prior value. Each accepted extension after the first therefore leaks the previously allocated filename string. The leak is bounded by the number of extensions and the subprocess is short-lived, so impact is small, but it is a genuine leak.","fix":"Declare 'filename' inside the HASHMAP_FOREACH loop body as a _cleanup_free_ local, or free it before each reassignment (e.g. free_and_replace via a local), so each iteration's allocation is released.","locations":[{"ref":"src/sysext/sysext.c:1723-1724","code":" 1723 |                         *filename = NULL, *old_origin_content = NULL,\n 1724 |                         *extensions_origin_content = NULL, *root_resolved = NULL;","lines":2},{"ref":"src/sysext/sysext.c:1941-1945","code":" 1941 |                 r = path_extract_filename(img->path, &filename);\n 1942 |                 if (r == -ENOMEM)\n 1943 |                         return log_oom();\n 1944 |                 if (r < 0)\n 1945 |                         return log_error_errno(r, \"Failed to extract filename from '%s': %m\", img->path);","lines":5}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"negligible","easy":false,"description":"In parse_env_extension_hierarchies() the working variable 'l' holds a NULL-terminated string vector (filled by getenv_path_list() or strv_new()), but it is declared '_cleanup_free_' rather than '_cleanup_strv_free_'. Today there is no early return after 'l' is populated except the success path (TAKE_PTR), so no leak occurs in practice, but the wrong cleanup attribute is a latent bug: any future error path added after population would free only the array and leak all element strings.","fix":"Change the declaration to '_cleanup_strv_free_ char **l = NULL;' to match the strv semantics of the value it holds.","locations":[{"ref":"src/shared/extension-util.c:140","code":"  140 |         _cleanup_free_ char **l = NULL;","lines":1}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"In sd_device_monitor_receive() the libudev-message branch validates the properties offset with `message.nlh->properties_off + 32 > (size_t) n`. `properties_off` is an `unsigned` (uint32) field taken verbatim from the wire (it is NOT in the network-order group and is not byte-swapped). The expression `properties_off + 32` is evaluated in 32-bit unsigned arithmetic, so a sender that supplies properties_off in [0xFFFFFFE0, 0xFFFFFFFF] makes the sum wrap to a small value that passes the `> n` check. `offset` is then set to the full ~4GB value, and `device_new_from_nulstr(&device, message.nulstr + offset, n - offset)` is called: `message.nulstr + offset` points far out of the `n`-byte heap/stack buffer and `n - offset` (n is small ssize_t, offset huge size_t) underflows to a gigantic length. device_new_from_nulstr() then does `memchr(key, '\\0', len - i)` over that wild range, causing a large out-of-bounds read / crash. The sender must pass the uid credential check (uid 0 or configured trusted uid) and know UDEV_MONITOR_MAGIC, but this is a memory-safety bug driven by message contents.","fix":"Compare without the wrapping addition, e.g. validate `message.nlh->properties_off > (size_t) n - 32` (after confirming n >= 32, which is already guaranteed by the earlier `n < 32` check), or cast properties_off to uint64_t/size_t before adding 32. Also reject properties_off > n directly before computing offset.","locations":[{"ref":"src/libsystemd/sd-device/device-monitor.c:645-665","code":"  645 |                 if (message.nlh->properties_off + 32 > (size_t) n)\n  646 |                         return log_monitor_errno(m, SYNTHETIC_ERRNO(EAGAIN),\n  647 |                                                  \"Invalid offset for properties (%u > %zi).\",\n  648 |                                                  message.nlh->properties_off + 32, n);\n  649 | \n  650 |                 offset = message.nlh->properties_off;\n  651 | \n  652 |                 /* devices received from udev are always initialized */\n  653 |                 is_initialized = true;\n  654 | \n  655 |         } else {\n  656 |                 /* check kernel message header */\n  657 |                 if (!strstr(message.nulstr, \"@/\"))\n  658 |                         return log_monitor_errno(m, SYNTHETIC_ERRNO(EAGAIN), \"Invalid message header.\");\n  659 | \n  660 |                 offset = strlen(message.nulstr) + 1;\n  661 |                 if (offset >= (size_t) n)\n  662 |                         return log_monitor_errno(m, SYNTHETIC_ERRNO(EAGAIN), \"Invalid message length.\");\n  663 |         }\n  664 | \n  665 |         r = device_new_from_nulstr(&device, message.nulstr + offset, n - offset);","lines":21},{"ref":"src/libsystemd/sd-device/device-private.c:506-525","code":"  506 |         for (size_t i = 0; i < len; ) {\n  507 |                 char *key;\n  508 |                 const char *end;\n  509 | \n  510 |                 key = nulstr + i;\n  511 |                 end = memchr(key, '\\0', len - i);\n  512 |                 if (!end)\n  513 |                         return log_device_debug_errno(device, SYNTHETIC_ERRNO(EINVAL),\n  514 |                                                       \"sd-device: Failed to parse nulstr\");\n  515 | \n  516 |                 i += end - key + 1;\n  517 | \n  518 |                 /* netlink messages for some devices contain an unwanted newline at the end of value.\n  519 |                  * Let's drop the newline and remaining characters after the newline. */\n  520 |                 truncate_nl(key);\n  521 | \n  522 |                 r = device_append(device, key, &major, &minor);\n  523 |                 if (r < 0)\n  524 |                         return r;\n  525 |         }","lines":20}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","easy":false,"description":"efi_get_boot_option() parses an attacker/firmware-controlled BootXXXX EFI variable. Inside the device-path walk loop, individual device_path entries are not bounds-checked against the remaining buffer. (1) MEDIA_FILEPATH_DP case: utf16_to_utf8(dpath->path, dpath->length-4) reads dpath->length-4 bytes starting at dnext+4, but there is no check that dnext_old + dpath->length <= path_len; a crafted entry with length up to 0xFFFF placed near the buffer end causes a large heap over-read. (2) MEDIA_HARDDRIVE_DP case: it reads dpath->drive (a 40-byte struct drive_path) after only validating dpath->length >= 4, so an entry of length 4 at the buffer tail reads ~36 bytes past the heap allocation. (3) The 4-byte device_path header itself (type/sub_type/length) is read while the loop only guarantees dnext < path_len, so up to 3 bytes can be read past path_len. These are all reads of persistent EFI-variable data (settable by firmware or by root/another OS) into a heap buffer of exactly l bytes; values can leak into the returned path/partition-uuid or crash on an unmapped page.","fix":"Before dereferencing each entry, verify the full entry fits: require dnext + 4 <= path_len before reading dpath->length, and require dnext + dpath->length <= path_len before advancing/using it. For MEDIA_HARDDRIVE_DP require dpath->length >= offsetof(struct device_path, drive) + sizeof(struct drive_path); for MEDIA_FILEPATH_DP clamp the utf16 length to the validated remaining bytes. Break/return -EINVAL on any entry that does not fit.","locations":[{"ref":"src/shared/efi-api.c:284-335","code":"  284 |         if (header->path_len > 0) {\n  285 |                 uint8_t *dbuf;\n  286 |                 size_t dnext, doff;\n  287 | \n  288 |                 doff = offsetof(struct boot_option, title) + title_size;\n  289 |                 dbuf = buf + doff;\n  290 |                 if (header->path_len > l - doff)\n  291 |                         return -EINVAL;\n  292 | \n  293 |                 dnext = 0;\n  294 |                 while (dnext < header->path_len) {\n  295 |                         struct device_path *dpath;\n  296 | \n  297 |                         dpath = (struct device_path *)(dbuf + dnext);\n  298 |                         if (dpath->length < 4)\n  299 |                                 break;\n  300 | \n  301 |                         /* Type 0x7F – End of Hardware Device Path, Sub-Type 0xFF – End Entire Device Path */\n  302 |                         if (dpath->type == END_DEVICE_PATH_TYPE && dpath->sub_type == END_ENTIRE_DEVICE_PATH_SUBTYPE)\n  303 |                                 break;\n  304 | \n  305 |                         dnext += dpath->length;\n  306 | \n  307 |                         /* Type 0x04 – Media Device Path */\n  308 |                         if (dpath->type != MEDIA_DEVICE_PATH)\n  309 |                                 continue;\n  310 | \n  311 |                         /* Sub-Type 1 – Hard Drive */\n  312 |                         if (dpath->sub_type == MEDIA_HARDDRIVE_DP) {\n  313 |                                 /* 0x02 – GUID Partition Table */\n  314 |                                 if (dpath->drive.mbr_type != MBR_TYPE_EFI_PARTITION_TABLE_HEADER)\n  315 |                                         continue;\n  316 | \n  317 |                                 /* 0x02 – GUID signature */\n  318 |                                 if (dpath->drive.signature_type != SIGNATURE_TYPE_GUID)\n  319 |                                         continue;\n  320 | \n  321 |                                 if (ret_part_uuid)\n  322 |                                         p_uuid = efi_guid_to_id128(dpath->drive.signature);\n  323 |                                 continue;\n  324 |                         }\n  325 | \n  326 |                         /* Sub-Type 4 – File Path */\n  327 |                         if (dpath->sub_type == MEDIA_FILEPATH_DP && !p && ret_path) {\n  328 |                                 p = utf16_to_utf8(dpath->path, dpath->length-4);\n  329 |                                 if (!p)\n  330 |                                         return  -ENOMEM;\n  331 | \n  332 |                                 efi_tilt_backslashes(p);\n  333 |                                 continue;\n  334 |                         }\n  335 |                 }","lines":52}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","easy":false,"description":"open_mmap() validates a catalog database with `st.st_size < (off_t)(le64toh(h->header_size) + le64toh(h->catalog_item_size) * le64toh(h->n_items))`. Both catalog_item_size and n_items are 64-bit values read from the (untrusted/possibly-corrupt) on-disk file; their product is computed in uint64 and can overflow/wrap to a small value, so a file declaring e.g. n_items=2^58, catalog_item_size=64 passes the size check. find_id() then calls bsearch() with nmemb = n_items (2^58) over the small mapping, reading far out of the mmap bounds and crashing. The database path is normally root-owned, but catalog_get() also honors the $SYSTEMD_CATALOG environment override (used by sd_journal_get_catalog and journalctl), so an attacker-controlled path is reachable.","fix":"Use overflow-checked multiplication/addition (MUL_SAFE/ADD_SAFE) when computing header_size + catalog_item_size*n_items, and bail out with -EBADMSG on overflow before mmap use.","locations":[{"ref":"src/libsystemd/sd-journal/catalog.c:538-547","code":"  538 |         const CatalogHeader *h = p;\n  539 |         if (memcmp(h->signature, (const uint8_t[]) CATALOG_SIGNATURE, sizeof(h->signature)) != 0 ||\n  540 |             le64toh(h->header_size) < sizeof(CatalogHeader) ||\n  541 |             le64toh(h->catalog_item_size) < sizeof(CatalogItem) ||\n  542 |             h->incompatible_flags != 0 ||\n  543 |             le64toh(h->n_items) <= 0 ||\n  544 |             st.st_size < (off_t) (le64toh(h->header_size) + le64toh(h->catalog_item_size) * le64toh(h->n_items))) {\n  545 |                 munmap(p, st.st_size);\n  546 |                 return -EBADMSG;\n  547 |         }","lines":10},{"ref":"src/libsystemd/sd-journal/catalog.c:570-600","code":"  570 |                         key.language[len] = '\\0';\n  571 | \n  572 |                         f = bsearch(&key,\n  573 |                                     (const uint8_t*) p + le64toh(h->header_size),\n  574 |                                     le64toh(h->n_items),\n  575 |                                     le64toh(h->catalog_item_size),\n  576 |                                     (comparison_fn_t) catalog_compare_func);\n  577 |                         if (!f) {\n  578 |                                 char *e;\n  579 | \n  580 |                                 e = strchr(key.language, '_');\n  581 |                                 if (e) {\n  582 |                                         *e = 0;\n  583 |                                         f = bsearch(&key,\n  584 |                                                     (const uint8_t*) p + le64toh(h->header_size),\n  585 |                                                     le64toh(h->n_items),\n  586 |                                                     le64toh(h->catalog_item_size),\n  587 |                                                     (comparison_fn_t) catalog_compare_func);\n  588 |                                 }\n  589 |                         }\n  590 |                 }\n  591 |         }\n  592 | \n  593 |         if (!f) {\n  594 |                 zero(key.language);\n  595 |                 f = bsearch(&key,\n  596 |                             (const uint8_t*) p + le64toh(h->header_size),\n  597 |                             le64toh(h->n_items),\n  598 |                             le64toh(h->catalog_item_size),\n  599 |                             (comparison_fn_t) catalog_compare_func);\n  600 |         }","lines":31}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"remove_from_order() shifts the BootOrder array to delete element i with memmove(order + i, order + i+1, (n - i) * sizeof(uint16_t)). The number of elements after index i is (n - i - 1), not (n - i). Using (n - i) reads one element past the end of the order buffer (which is allocated with exactly n uint16_t entries from efi_get_boot_order()), an OOB read of 2 bytes. The over-read value lands in order[n-1], which is not persisted (efi_set_boot_order writes only n-1 elements), so impact is limited to the over-read itself. Compare with insert_into_order() at line 1325 which correctly uses (n - i - 1).","fix":"Change the memmove count to (n - i - 1) * sizeof(uint16_t).","locations":[{"ref":"src/bootctl/bootctl-install.c:1359-1365","code":" 1359 |         for (int i = 0; i < n; i++) {\n 1360 |                 if (order[i] != slot)\n 1361 |                         continue;\n 1362 | \n 1363 |                 if (i + 1 < n)\n 1364 |                         memmove(order + i, order + i+1, (n - i) * sizeof(uint16_t));\n 1365 |                 return efi_set_boot_order(order, n - 1);","lines":7}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In sd_bus_message_append_array_memfd() and sd_bus_message_append_string_memfd() the bounds check 'offset + size > real_size' is performed on caller-supplied uint64_t values before either is range-limited. If offset + size wraps around UINT64_MAX, the check passes and a memfd region outside the file could be referenced. The subsequent 'size > UINT32_MAX' check limits size, but offset is never bounded, so a huge offset with a small size can still wrap. These are local (trusted) append APIs, not wire input, so impact is limited, but the overflow check is still incorrect.","fix":"Guard against overflow explicitly, e.g. reject when offset > real_size || size > real_size - offset (and/or check offset/size against UINT32_MAX before the addition).","locations":[{"ref":"src/libsystemd/sd-bus/bus-message.c:2226-2229","code":" 2226 |         if (offset == 0 && size == UINT64_MAX)\n 2227 |                 size = real_size;\n 2228 |         else if (offset + size > real_size)\n 2229 |                 return -EMSGSIZE;","lines":4},{"ref":"src/libsystemd/sd-bus/bus-message.c:2301-2304","code":" 2301 |         if (offset == 0 && size == UINT64_MAX)\n 2302 |                 size = real_size;\n 2303 |         else if (offset + size > real_size)\n 2304 |                 return -EMSGSIZE;","lines":4}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"netlink_message_parse_error() computes 'hlen += err->msg.nlmsg_len - sizeof(struct nlmsghdr)' using the untrusted inner error message length err->msg.nlmsg_len (a __u32 from the received netlink datagram). If err->msg.nlmsg_len < sizeof(struct nlmsghdr) (e.g. 0), the size_t subtraction underflows to a huge value; the subsequent 'm->hdr->nlmsg_len <= NLMSG_SPACE(hlen)' guard and NLMSG_PAYLOAD(m->hdr, hlen) (= nlmsg_len - NLMSG_SPACE(hlen)) then wrap around as well, which could let netlink_container_parse() iterate rtattrs well past the message buffer. In practice this is only reachable for NLMSG_ERROR replies whose inner header is constructed by the kernel (the receive path already discards datagrams whose sender nl_pid != 0 and whose pid does not match), so the value is effectively trusted and the underflow is not attacker-triggerable today; it remains a latent bug if that assumption ever changes.","fix":"Before adding to hlen, validate that err->msg.nlmsg_len >= sizeof(struct nlmsghdr) (return 0 / bail out otherwise), so the subtraction cannot underflow; equivalently clamp hlen and re-check it does not exceed m->hdr->nlmsg_len before calling netlink_container_parse().","locations":[{"ref":"src/libsystemd/sd-netlink/netlink-message.c:1289-1308","code":" 1289 | static int netlink_message_parse_error(sd_netlink_message *m) {\n 1290 |         struct nlmsgerr *err = NLMSG_DATA(m->hdr);\n 1291 |         size_t hlen = sizeof(struct nlmsgerr);\n 1292 | \n 1293 |         /* no TLVs, nothing to do here */\n 1294 |         if (!(m->hdr->nlmsg_flags & NLM_F_ACK_TLVS))\n 1295 |                 return 0;\n 1296 | \n 1297 |         /* if NLM_F_CAPPED is set then the inner err msg was capped */\n 1298 |         if (!(m->hdr->nlmsg_flags & NLM_F_CAPPED))\n 1299 |                 hlen += err->msg.nlmsg_len - sizeof(struct nlmsghdr);\n 1300 | \n 1301 |         if (m->hdr->nlmsg_len <= NLMSG_SPACE(hlen))\n 1302 |                 return 0;\n 1303 | \n 1304 |         return netlink_container_parse(m,\n 1305 |                                        &m->containers[m->n_containers],\n 1306 |                                        (struct rtattr*)((uint8_t*) NLMSG_DATA(m->hdr) + hlen),\n 1307 |                                        NLMSG_PAYLOAD(m->hdr, hlen));\n 1308 | }","lines":20}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":false,"description":"In method_set_time(), the relative-time branch computes `(usec_t) -utc` where `utc` is an int64_t known to be negative. If a client passes utc == INT64_MIN (reachable from the unprivileged SetTime D-Bus method, before polkit authorization), `-utc` is signed-integer overflow / undefined behavior. In practice it wraps to INT64_MIN, which after casting to usec_t becomes a huge value that DEC_SAFE rejects, so the practical impact is just an error reply; but it is technically UB triggerable by an unauthenticated caller.","fix":"Compute the magnitude in unsigned space, e.g. use `usec_t mag = (utc == INT64_MIN) ? ((usec_t)INT64_MAX + 1) : (usec_t)(-utc);` (or cast to usec_t before negating: `-(usec_t)utc`), then pass `mag` to DEC_SAFE.","locations":[{"ref":"src/timedate/timedated.c:882-894","code":"  882 |         if (relative) {\n  883 |                 usec_t n = now(CLOCK_REALTIME);\n  884 |                 bool valid;\n  885 |                 if (utc > 0)\n  886 |                         valid = INC_SAFE(&n, (usec_t) utc);\n  887 |                 else\n  888 |                         valid = DEC_SAFE(&n, (usec_t) -utc);\n  889 |                 if (!valid)\n  890 |                         return sd_bus_error_set(error, SD_BUS_ERROR_INVALID_ARGS, \"Time value overflow\");\n  891 | \n  892 |                 timespec_store(&ts, n);\n  893 |         } else\n  894 |                 timespec_store(&ts, (usec_t) utc);","lines":13}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"Out-of-bounds array read due to reversed short-circuit condition in get_cap_mask()'s debug dump. The loop `while (bitmask[val-1] == 0 && val > 0) --val;` evaluates `bitmask[val-1]` before testing `val > 0`. If the entire capability bitmask is zero (a device exposing an empty capabilities/ev, /abs, /key, etc. sysfs attribute), `val` is decremented down to 0 and the next iteration reads `bitmask[(size_t)-1]`, a wild out-of-bounds read on the stack-allocated bitmask array. Only reachable on the EVENT_UDEVADM_TEST_BUILTIN debug path (`udevadm test-builtin input_id` with debug logging), hence low severity, but it is a deterministic OOB read on device-controlled input.","fix":"Swap the operand order so the bound is checked first: `while (val > 0 && bitmask[val-1] == 0) --val;`.","locations":[{"ref":"src/udev/udev-builtin-input_id.c:119-122","code":"  119 |                 val = bitmask_size / sizeof (unsigned long);\n  120 |                 /* skip trailing zeros */\n  121 |                 while (bitmask[val-1] == 0 && val > 0)\n  122 |                         --val;","lines":4}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"In timer_enter_waiting() the realtime calendar next-elapse is incremented with a bare '+=' (v->next_elapse += random_offset) rather than the saturating usec_add() used a few lines below for the monotonic case (line 502). next_elapse here comes from calendar_spec_next_usec() (a realtime wall-clock timestamp far from USEC_INFINITY) and random_offset is bounded by random_offset_usec, so a real overflow cannot occur, but the inconsistency with the monotonic path and with add_random_delay()'s explicit overflow guard is worth aligning.","fix":"Use v->next_elapse = usec_add(v->next_elapse, random_offset); for consistency and defense in depth.","locations":[{"ref":"src/core/timer.c:438","code":"  438 |                         v->next_elapse += random_offset;","lines":1},{"ref":"src/core/timer.c:502","code":"  502 |                                 v->next_elapse = usec_add(usec_shift_clock(base, CLOCK_MONOTONIC, TIMER_MONOTONIC_CLOCK(t)), v->value);","lines":1}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"negligible","easy":true,"description":"In ask_password_plymouth(), 'size' (uint32_t, read from the plymouth socket) is checked with 'if (size + 5 > sizeof(buffer))'. Because both operands are unsigned 32-bit, size+5 wraps modulo 2^32; a size near UINT32_MAX (e.g. 0xFFFFFFFF) yields a small sum that passes the bound check. The subsequent 'if (p-5 < size) continue;' guard prevents any actual OOB read (p is at most sizeof(buffer)=LINE_MAX, far below such a size, so the loop just spins until EIO/timeout), so this is not exploitable, but the bound check is incorrect as written. The plymouth socket is a privileged local source, further reducing impact.","fix":"Avoid the wraparound, e.g. check 'if (size > sizeof(buffer) - 5)' (with sizeof(buffer) >= 5 guaranteed) before adding, or compare as size_t.","locations":[{"ref":"src/shared/ask-password-api.c:442-448","code":"  442 |                         memcpy(&size, buffer+1, sizeof(size));\n  443 |                         size = le32toh(size);\n  444 |                         if (size + 5 > sizeof(buffer))\n  445 |                                 return -EIO;\n  446 | \n  447 |                         if (p-5 < size)\n  448 |                                 continue;","lines":7}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"oci_registry_is_valid() validates the port part of a registry spec by parsing the HOSTNAME instead of the port. After splitting on ':' it does s = strndup(n, colon - n) (the part before the colon, i.e. the hostname), validates s as a DNS name, and then calls safe_atou16(s, &port) on that SAME hostname string rather than on colon+1. Since a DNS hostname like \"registry.example.com\" never parses as a uint16, the function returns false for every registry reference that includes an explicit port (e.g. \"myregistry.io:5000/image:tag\"). This rejects all valid registries-with-port supplied by users to importctl/machinectl pull-oci, breaking legitimate OCI pulls.","fix":"Parse the port from the substring after the colon: replace safe_atou16(s, &port) with safe_atou16(colon + 1, &port). The DNS validation should still use s (the hostname before the colon).","locations":[{"ref":"src/import/oci-util.c:61-70","code":"   61 |         _cleanup_free_ char *s = strndup(n, colon - n);\n   62 |         if (!s)\n   63 |                 return -ENOMEM;\n   64 | \n   65 |         r = dns_name_is_valid(s);\n   66 |         if (r <= 0)\n   67 |                 return r;\n   68 | \n   69 |         uint16_t port;\n   70 |         return safe_atou16(s, &port) >= 0 && port != 0;","lines":10}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"`journalctl --list-catalog` and `journalctl --dump-catalog` with no positional arguments no longer list the entire catalog. action_list_catalog() distinguishes \"list everything\" from \"list specific IDs\" by testing `if (items)` (NULL => list all via catalog_list(), non-NULL => filter via catalog_list_items()). Previously run() built the args strv with strv_copy_unless_empty(), which yields NULL when there are no positional args. After the OptionParser migration, parse_argv() now does `args = strv_copy(args)` (journalctl.c:965), and option_parser_get_args() returns a pointer into argv that, with no positional args, points at the trailing NULL; strv_copy() of an empty strv returns a non-NULL empty strv `{NULL}`. So `items` is always non-NULL, catalog_list_items() iterates over zero items and prints nothing, and the catalog_list() branch (journalctl-catalog.c:51) is now dead code. Net effect: `journalctl --list-catalog`/`--dump-catalog` print nothing instead of the full catalog.","fix":"Make the empty case yield NULL again, or test emptiness in the catalog action. E.g. in run(): pass `strv_isempty(args) ? NULL : args` to action_list_catalog(); or change action_list_catalog() to use `if (!strv_isempty(items))` instead of `if (items)`. Simplest: in parse_argv() use strv_copy_unless_empty() (or set *remaining_args=NULL when option_parser_get_n_args()==0) to restore the prior NULL-when-empty contract that other call sites tolerate.","locations":[{"ref":"src/journal/journalctl.c:965-969","code":"  965 |         args = strv_copy(args);\n  966 |         if (!args)\n  967 |                 return log_oom();\n  968 | \n  969 |         *remaining_args = args;","lines":5},{"ref":"src/journal/journalctl-catalog.c:48-53","code":"   48 |         if (items)\n   49 |                 r = catalog_list_items(/* f= */ NULL, database, oneline, items);\n   50 |         else\n   51 |                 r = catalog_list(/* f= */ NULL, database, oneline);\n   52 |         if (r < 0)\n   53 |                 return log_error_errno(r, \"Failed to list catalog: %m\");","lines":6}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In ndisc_send(), when an option build_* helper returns a negative error other than -ENOMEM, the code only logs it and falls through to `iov[n_iov++] = IOVEC_MAKE(buf, buf[1] * 8); TAKE_PTR(buf);` without a `continue`. On failure the build helpers leave the local `buf` as NULL (they only assign via TAKE_PTR on success), so `buf[1]` is a NULL-pointer dereference, and an all-zero/garbage iovec entry would be queued. Several build helpers can return non-ENOMEM errors: ndisc_option_build_encrypted_dns() returns -EINVAL when the resolver has no usable transport (line 1488) and propagates dns_name_to_wire_format() failures (line 1456); ndisc_option_build_dnssl() propagates dns_name_to_wire_format() failures (line 1037); ndisc_option_build_route/prefix64 propagate pref64/plc errors. These options originate from local configuration (sd_radv_add_*/sd_ndisc_* setters), so this is a crash on a misconfigured/oddly-built option set rather than a remote-triggerable bug, but it is a definite NULL deref. Note the `default:` case already does `continue`, confirming the intent was to skip un-built options.","fix":"After `if (r < 0) log_debug_errno(...)`, add `continue;` so that failed (and therefore NULL) buffers are skipped instead of dereferenced. E.g. change the block to `if (r < 0) { log_debug_errno(r, \"Failed to build NDisc option %u, ignoring: %m\", option->type); continue; }`.","locations":[{"ref":"src/libsystemd-network/ndisc-option.c:1791-1797","code":" 1791 |                 if (r == -ENOMEM)\n 1792 |                         return log_oom_debug();\n 1793 |                 if (r < 0)\n 1794 |                         log_debug_errno(r, \"Failed to build NDisc option %u, ignoring: %m\", option->type);\n 1795 | \n 1796 |                 iov[n_iov++] = IOVEC_MAKE(buf, buf[1] * 8);\n 1797 |                 TAKE_PTR(buf);","lines":7}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"find_id() returns a string pointer computed as `p + header_size + n_items*catalog_item_size + le64toh(f->offset)`. The per-item `f->offset` comes straight from the on-disk catalog item and is never bounds-checked against the file size or the strings section. A corrupt/malicious offset makes the returned pointer point outside the mmap; callers then run strdup()/strdup_to() on it (catalog_get, dump_catalog_entry), causing an out-of-bounds read. There is also no guarantee the string is NUL-terminated within the mapping. Likewise the bsearch comparator catalog_compare_func() does strcmp() on the 32-byte item language field which is not guaranteed NUL-terminated.","fix":"Validate f->offset < (st_size - (header_size + n_items*catalog_item_size)) (i.e. it lies inside the strings region) and that a NUL terminator exists within the remaining mapped bytes before returning the pointer; reject otherwise with -EBADMSG.","locations":[{"ref":"src/libsystemd/sd-journal/catalog.c:605-609","code":"  605 |         return (const char*) p +\n  606 |                 le64toh(h->header_size) +\n  607 |                 le64toh(h->n_items) * le64toh(h->catalog_item_size) +\n  608 |                 le64toh(f->offset);\n  609 | }","lines":5},{"ref":"src/libsystemd/sd-journal/catalog.c:611-632","code":"  611 | int catalog_get(const char *database, sd_id128_t id, char **ret_text) {\n  612 |         int r;\n  613 | \n  614 |         assert(database);\n  615 |         assert(ret_text);\n  616 | \n  617 |         _cleanup_close_ int fd = -EBADF;\n  618 |         struct stat st;\n  619 |         void *p;\n  620 |         r = open_mmap(database, &fd, &st, &p);\n  621 |         if (r < 0)\n  622 |                 return r;\n  623 | \n  624 |         const char *s = find_id(p, id);\n  625 |         if (!s)\n  626 |                 r = -ENOENT;\n  627 |         else\n  628 |                 r = strdup_to(ret_text, s);\n  629 | \n  630 |         (void) munmap(p, st.st_size);\n  631 |         return r;\n  632 | }","lines":22}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In manager_count_external_displays(), the list of external display connector prefixes passed to STARTSWITH_SET() is missing a comma after \"DVI-A-\". Because adjacent C string literals are concatenated by the preprocessor, \"DVI-A-\" \"Composite-\" becomes the single token \"DVI-A-Composite-\". As a result: (1) plain \"DVI-A-\" connectors (e.g. sysfs name card0-DVI-A-1) are no longer matched and are wrongly ignored, and (2) \"Composite-\" connectors are never matched as a standalone prefix. These connectors are therefore not counted as external displays, which feeds manager_is_docked_or_external_displays() and the lid-switch handling: with such a display connected, closing the lid may still trigger suspend instead of being suppressed. The bug predates the STARTSWITH_SET() refactor (the original FOREACH_STRING list had the same missing comma).","fix":"Add the missing comma: change \"DVI-A-\"\\n \"Composite-\" to \"DVI-A-\",\\n \"Composite-\" so each connector prefix is a separate argument to STARTSWITH_SET().","locations":[{"ref":"src/login/logind-core.c:670-673","code":"  670 |                 if (!STARTSWITH_SET(dash,\n  671 |                                     \"VGA-\", \"DVI-I-\", \"DVI-D-\", \"DVI-A-\"\n  672 |                                     \"Composite-\", \"SVIDEO-\", \"Component-\",\n  673 |                                     \"DIN-\", \"DP-\", \"HDMI-A-\", \"HDMI-B-\", \"TV-\"))","lines":4}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"validate_directory_fd() is supposed to walk up the directory tree (up to 16 levels) looking for an ancestor owned by the peer UID, to classify foreign-UID-owned bind-mounted directories as DIRECTORY_IS_FOREIGN_OWNED. But the per-iteration parent lookup at line 923 always does openat(fd, \"..\", ...) on the ORIGINAL directory fd, never on the advancing parent_fd that is maintained via close_and_replace(parent_fd, new_parent_fd) at line 965. As a result the loop only ever inspects the first parent: o
