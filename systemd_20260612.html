ge the '/* 512K */' comment to '/* 512 bytes */'.","locations":[{"ref":"src/import/qcow2-util.c:194-198","code":"  194 |         if (HEADER_CLUSTER_BITS(header) < 9) /* 512K */\n  195 |                 return -EBADMSG;\n  196 | \n  197 |         if (HEADER_CLUSTER_BITS(header) > 21) /* 2MB */\n  198 |                 return -EBADMSG;","lines":5}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The block comment explaining the recursion semantics of bus_match_run() is garbled: it begins \"Not these special semantics\" (should be \"Note these special semantics\") and contains \"There's are two exceptions here\" (\"There's are\" is not grammatical). Also it references node type names BUS_NODE_ROOT / BUS_NODE_VALUE that do not exist; the actual enum values are BUS_MATCH_ROOT / BUS_MATCH_VALUE. This makes the explanation of a subtle recursion invariant harder to follow.","fix":"Reword to e.g. \"Note these special semantics: when traversing the tree bus_match_run() recursively invokes itself for child nodes. There are two exceptions: BUS_MATCH_ROOT (which cannot have a sibling) and BUS_MATCH_VALUE (whose siblings are invoked by its parent).\" and fix the node type names.","locations":[{"ref":"src/libsystemd/sd-bus/bus-match.c:258-263","code":"  258 |         /* Not these special semantics: when traversing the tree we\n  259 |          * usually let bus_match_run() when called for a node\n  260 |          * recursively invoke bus_match_run(). There's are two\n  261 |          * exceptions here though, which are BUS_NODE_ROOT (which\n  262 |          * cannot have a sibling), and BUS_NODE_VALUE (whose siblings\n  263 |          * are invoked anyway by its parent. */","lines":6}]},{"id":"CMT_6","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"The worker reads the environment variable MOUNTFS_FIXED_WORKER (matching what mountfsd-manager.c sets at line 184), but the error message on parse failure refers to MOUNTFSD_FIXED_WORKER (with an extra 'D'). Purely a misleading diagnostic string; the variable name itself is consistent and correct.","fix":"Change the log message to reference $MOUNTFS_FIXED_WORKER to match the variable actually being read (getenv_bool(\"MOUNTFS_FIXED_WORKER\")).","locations":[{"ref":"src/mountfsd/mountwork.c:1526-1528","code":" 1526 |         r = getenv_bool(\"MOUNTFS_FIXED_WORKER\");\n 1527 |         if (r < 0)\n 1528 |                 return log_error_errno(r, \"Failed to parse MOUNTFSD_FIXED_WORKER: %m\");","lines":3}]},{"id":"CMT_7","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"The comment in config_parse_can_time_quanta says \"Linux uses __u32 for bitrates, so the value should not exceed that.\" but this parser handles time quanta (the value is stored into struct can_bittiming.tq, a __u32), not bitrates. The bound check itself (val > UINT32_MAX) is correct because tq is a u32; only the wording was copy-pasted from config_parse_can_bitrate and refers to the wrong field. Cosmetic only.","fix":"Reword the comment to reference the time-quanta field, e.g. \"struct can_bittiming.tq is a __u32, so the value must fit in 32 bits.\"","locations":[{"ref":"src/network/networkd-can.c:199-204","code":"  199 |         /* Linux uses __u32 for bitrates, so the value should not exceed that. */\n  200 |         if (val <= 0 || val > UINT32_MAX) {\n  201 |                 log_syntax(unit, LOG_WARNING, filename, line, 0,\n  202 |                            \"Time quanta out of permitted range 1...4294967295\");\n  203 |                 return 0;\n  204 |         }","lines":6}]},{"id":"CMT_8","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"config_parse_multipath_route() rejects weights with `nh->weight == 0 || nh->weight > 256`, accepting the inclusive range 1..256 before decrementing to the kernel range 0..255. The adjacent comment states \"ip command takes weight in the range 1…255 ... networkd decreases by one and stores it to match the range which kernel uses\" (implying kernel range 0..254). The comment's stated bounds (1..255 / 0..254) are inconsistent with the code's actual accepted bounds (1..256 / 0..255). Not a memory-safety issue (weight is uint32_t and the kernel u8 field can hold 0..255), purely a documentation/validation-bound mismatch that could confuse maintainers about the intended upper limit.","fix":"Reconcile code and comment: either change the upper bound check to `nh->weight > 255` to match the documented ip/kernel range, or update the comment to state the actual accepted range (1..256 stored as 0..255).","locations":[{"ref":"src/network/networkd-route-nexthop.c:1109-1118","code":" 1109 |                 /* ip command takes weight in the range 1…255, while kernel takes the value in the\n 1110 |                  * range 0…254. MultiPathRoute= setting also takes weight in the same range which ip\n 1111 |                  * command uses, then networkd decreases by one and stores it to match the range which\n 1112 |                  * kernel uses. */\n 1113 |                 if (nh->weight == 0 || nh->weight > 256) {\n 1114 |                         log_syntax(unit, LOG_WARNING, filename, line, 0,\n 1115 |                                    \"Invalid multipath route weight, ignoring assignment: %s\", p);\n 1116 |                         return 0;\n 1117 |                 }\n 1118 |                 nh->weight--;","lines":10}]},{"id":"CMT_9","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"Stray double semicolon at end of declaration `_cleanup_free_ char *top = NULL, *full = NULL;;`. Cosmetic only; produces an empty statement.","fix":"Remove the extra semicolon.","locations":[{"ref":"src/nspawn/nspawn-mount.c:441","code":"  441 |         _cleanup_free_ char *top = NULL, *full = NULL;;","lines":1}]},{"id":"CMT_10","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"userns_registry_load_delegation_by_gid() formats the GID delegation filename with UID_FMT ('g' UID_FMT '.delegate') rather than GID_FMT. UID_FMT and GID_FMT are both '%u' so this is functionally correct, but it is inconsistent with userns_registry_delegation_gid_exists() (which uses GID_FMT) and is misleading for a GID code path.","fix":"Use GID_FMT in the asprintf for consistency with the other GID-keyed filename formatters.","locations":[{"ref":"src/nsresourced/userns-registry.c:1318","code":" 1318 |         if (asprintf(&fn, \"g\" UID_FMT \".delegate\", start) < 0)","lines":1}]},{"id":"CMT_11","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"Dangling/incomplete comment: the sentence ends with \"We'll\" and nothing after it, on the CNAME-restart branch of dns_stub_query_complete(). The thought is cut off; it should describe what happens (the restarted query's completion callback will re-enter this function). Purely cosmetic, no behavioral impact.","fix":"Complete the sentence, e.g. \"...now with the redirected question. We'll get re-invoked via the completion callback once the new query finishes.\" or simply drop the trailing \"We'll\".","locations":[{"ref":"src/resolve/resolved-dns-stub.c:821-823","code":"  821 |                                 /* Otherwise, we already followed a CNAME once within this packet, and the\n  822 |                                  * packet doesn't answer our question. In that case let's restart the query,\n  823 |                                  * now with the redirected question. We'll */","lines":3}]},{"id":"CMT_12","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":true,"description":"bus_append_root_hash() decodes the value with unhexmem() (hexadecimal), but on failure logs \"Failed to decode base64 data for %s=\". The message wrongly says base64 (copy-paste from the signature/credential helpers which do use base64), which is misleading when a user provides a malformed hex RootHash.","fix":"Change the message to refer to hexadecimal data, e.g. `return log_error_errno(r, \"Failed to decode hexadecimal data for %s=: %m\", field);`","locations":[{"ref":"src/shared/bus-unit-util.c:1688-1690","code":" 1688 |         r = unhexmem(eq, &roothash_decoded, &roothash_decoded_size);\n 1689 |         if (r < 0)\n 1690 |                 return log_error_errno(r, \"Failed to decode base64 data for %s=: %m\", field);","lines":3}]},{"id":"CMT_13","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","easy":false,"description":"synthetic_numeric_group_build() formats the group description using UID_FMT for a gid_t value, while the rest of the function (groupName and gid) correctly use GID_FMT. UID_FMT and GID_FMT both expand to \"%\" PRIu32 so there is no behavioral bug, but the format token is semantically wrong for a GID and is inconsistent with the surrounding code (compare with the user variant which correctly uses UID_FMT).","fix":"Change \"Unknown System GID \" UID_FMT to \"Unknown System GID \" GID_FMT for consistency with the gid_t argument.","locations":[{"ref":"src/shared/userdb.c:1281","code":" 1281 |         if (asprintf(&d, \"Unknown System GID \" UID_FMT, gid) < 0)","lines":1}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"medium","easy":false,"description":"The .hwids matching path dereferences attacker-controllable string offsets without bounds-checking them against the section size. chid_match() validates only the Device array bounds (the `(n_devices+1)*sizeof(*devices) < hwid_length` loop), but device_get_compatible()/device_get_fwid() return `(const char*)base + off` where `off` is an unchecked uint32_t (devicetree.compatible_offset / uefi_fw.fwid_offset, up to ~4 GiB) taken directly from the .hwids PE section. pe_use_this_dtb()/pe_use_this_firmware() then pass this pointer to devicetree_match_by_compatible()/efi_firmware_match_by_fwid(), which call streq8() on it, reading memory at an arbitrary offset far outside the .hwids section -> out-of-bounds read / crash. The .hwids section lives inside the (normally signed) UKI, so this is primarily a robustness/DoS issue rather than a privilege boundary, but the section size (hwids_section[0].memory_size) is known at the call site and is never used to bound these offsets.","fix":"Pass the .hwids section length down into chid_match()/device_get_compatible()/device_get_fwid() (or validate it once in chid_match) and verify that each non-zero name/compatible/fwid offset is < section_size and that a NUL terminator exists within [off, section_size) before returning the pointer; reject the Device otherwise.","locations":[{"ref":"src/boot/chid.h:78-100","code":"   78 | static inline const char* device_get_compatible(const void *base, const Device *device) {\n   79 |         size_t off = 0;\n   80 |         switch (DEVICE_TYPE_FROM_DESCRIPTOR(device->descriptor)) {\n   81 |         case DEVICE_TYPE_DEVICETREE:\n   82 |                 off = device->devicetree.compatible_offset;\n   83 |                 break;\n   84 |         default:\n   85 |                 return NULL;\n   86 |         }\n   87 |         return off == 0 ? NULL : (const char *) ((const uint8_t *) base + off);\n   88 | }\n   89 | \n   90 | static inline const char* device_get_fwid(const void *base, const Device *device) {\n   91 |         size_t off = 0;\n   92 |         switch (DEVICE_TYPE_FROM_DESCRIPTOR(device->descriptor)) {\n   93 |         case DEVICE_TYPE_UEFI_FW:\n   94 |                 off = device->uefi_fw.fwid_offset;\n   95 |                 break;\n   96 |         default:\n   97 |                 return NULL;\n   98 |         }\n   99 |         return off == 0 ? NULL : (const char *) ((const uint8_t *) base + off);\n  100 | }","lines":23},{"ref":"src/boot/pe.c:217-226","code":"  217 |         const char *compatible = device_get_compatible(base, device);\n  218 |         if (!compatible)\n  219 |                 return false;\n  220 | \n  221 |         err = devicetree_match_by_compatible(dtb, dtb_size, compatible);\n  222 |         if (err == EFI_SUCCESS)\n  223 |                 return true;\n  224 |         if (err == EFI_INVALID_PARAMETER)\n  225 |                 log_error_status(err, \"Found bad DT blob in PE section %zu\", section_nb);\n  226 |         return false;","lines":10},{"ref":"src/boot/pe.c:244-253","code":"  244 |         const char *fwid = device_get_fwid(base, device);\n  245 |         if (!fwid)\n  246 |                 return false;\n  247 | \n  248 |         err = efi_firmware_match_by_fwid(efifw, efifw_size, fwid);\n  249 |         if (err == EFI_SUCCESS)\n  250 |                 return true;\n  251 |         if (err == EFI_INVALID_PARAMETER)\n  252 |                 log_error_status(err, \"Found bad efifw blob in PE section %zu\", section_nb);\n  253 |         return false;","lines":10}]}]</script>

<script>
(function(){
'use strict';

// Data
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
// Only severities actually present in the report — the filter bar hides the rest.
const PRESENT_SEVS = SEVS.filter(s => FINDINGS.some(f => (f.severity || 'medium') === s));
// Whether any finding is flagged easy — the "Quick wins" filter row is hidden otherwise.
const HAS_EASY = FINDINGS.some(f => f.easy);
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// State
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(), easyOnly: false,
};
const statuses = {};

// Persistence
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// URL hash
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.easyOnly)          p.set('e',   '1');
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
  if (p.has('e'))   S.easyOnly = p.get('e') === '1';
}

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.easyOnly && !f.easy)                    return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 f.easy ? 'easy quick win' : '',
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Render
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">⚡ Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">⧉ Copy</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">⚡ Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDINGS.find(x => x.id === id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
