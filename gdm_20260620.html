                                        GDM_DBUS_NAME,\n  191 |                                              dbus_path,\n  192 |                                              dbus_iface,\n  193 |                                              method,\n  194 |                                              g_variant_new (\"(s)\", state->username),\n  195 |                                              NULL,\n  196 |                                              G_DBUS_CALL_FLAGS_NONE,\n  197 |                                              -1, NULL, error);\n  198 |         if (reply == NULL) {\n  199 |                 g_dbus_error_strip_remote_error (*error);\n  200 |                 return FALSE;\n  201 |         }\n  202 | \n  203 |         return TRUE;\n  204 | }","lines":35,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-new-session.c#L170-204"},{"ref":"utils/gdm-new-session.c:206-222","code":"  206 | static gboolean\n  207 | create_session (State   *state,\n  208 |                 GError **error)\n  209 | {\n  210 |         return call_gdm_display_factory_method (state,\n  211 |                                                 \"CreateUserDisplay\",\n  212 |                                                 error);\n  213 | }\n  214 | \n  215 | static gboolean\n  216 | terminate_session (State   *state,\n  217 |                    GError **error)\n  218 | {\n  219 |         return call_gdm_display_factory_method (state,\n  220 |                                                 \"DestroyUserDisplay\",\n  221 |                                                 error);\n  222 | }","lines":17,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-new-session.c#L206-222"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"start_element_cb() only allocates info->entry when it sees a <schema> start tag. If the schema XML has a <key>, <signature>, or <default> element outside of (or before) a <schema> element -- e.g. a malformed/corrupted schema file -- text_cb() will dereference info->entry->key/signature/default_value while info->entry is still NULL, crashing the process (gdm daemon or any tool linking gdm-settings-utils.c) with a NULL pointer dereference.","fix":"In text_cb(), guard each branch with 'info->entry != NULL' before dereferencing, or have start_element_cb() reject/warn on out-of-context <key>/<signature>/<default> elements via the GError** parameter.","locations":[{"ref":"common/gdm-settings-utils.c:124-147","code":"  124 | static void\n  125 | start_element_cb (GMarkupParseContext *ctx,\n  126 |                   const char          *element_name,\n  127 |                   const char         **attribute_names,\n  128 |                   const char         **attribute_values,\n  129 |                   gpointer             user_data,\n  130 |                   GError             **error)\n  131 | {\n  132 |         ParserInfo *info;\n  133 | \n  134 |         info = (ParserInfo *) user_data;\n  135 | \n  136 |         /*g_debug (\"parsing start: '%s'\", element_name);*/\n  137 | \n  138 |         if (strcmp (element_name, \"schema\") == 0) {\n  139 |                 info->entry = gdm_settings_entry_new ();\n  140 |         } else if (strcmp (element_name, \"key\") == 0) {\n  141 |                 info->in_key = TRUE;\n  142 |         } else if (strcmp (element_name, \"signature\") == 0) {\n  143 |                 info->in_signature = TRUE;\n  144 |         } else if (strcmp (element_name, \"default\") == 0) {\n  145 |                 info->in_default = TRUE;\n  146 |         }\n  147 | }","lines":24,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-settings-utils.c#L124-147"},{"ref":"common/gdm-settings-utils.c:180-204","code":"  180 | static void\n  181 | text_cb (GMarkupParseContext *ctx,\n  182 |          const char          *text,\n  183 |          gsize                text_len,\n  184 |          gpointer             user_data,\n  185 |          GError             **error)\n  186 | {\n  187 |         ParserInfo *info;\n  188 |         char       *t;\n  189 | \n  190 |         info = (ParserInfo *) user_data;\n  191 | \n  192 |         t = g_strndup (text, text_len);\n  193 | \n  194 |         if (info->in_key) {\n  195 |                 info->entry->key = g_strdup (t);\n  196 |         } else if (info->in_signature) {\n  197 |                 info->entry->signature = g_strdup (t);\n  198 |         } else if (info->in_default) {\n  199 |                 info->entry->default_value = g_strdup (t);\n  200 |         }\n  201 | \n  202 |         g_free (t);\n  203 | \n  204 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-settings-utils.c#L180-204"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"gdm_settings_parse_schemas() calls g_markup_parse_context_parse(ctx, contents, len, NULL), discarding the GError entirely and ignoring the boolean return value. It also never calls g_markup_parse_context_end_parse(), which is required to detect truncated/unclosed XML documents. A malformed or truncated schema file therefore silently yields a partial (or empty) schema list while the function still returns TRUE, so gdm_settings_direct_init() proceeds to treat broken/missing settings schemas as successfully loaded with no warning logged anywhere (error_cb is a no-op).","fix":"Capture and check the GError from g_markup_parse_context_parse(), call g_markup_parse_context_end_parse(ctx, &error) afterward, and return FALSE (logging via g_warning) on any parse failure instead of silently returning TRUE with a possibly-incomplete schema list.","locations":[{"ref":"common/gdm-settings-utils.c:206-211","code":"  206 | static void\n  207 | error_cb (GMarkupParseContext *ctx,\n  208 |           GError              *error,\n  209 |           gpointer             user_data)\n  210 | {\n  211 | }","lines":6,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-settings-utils.c#L206-211"},{"ref":"common/gdm-settings-utils.c:247-249","code":"  247 |         ctx = g_markup_parse_context_new (&parser, 0, info, NULL);\n  248 |         g_markup_parse_context_parse (ctx, contents, len, NULL);\n  249 | ","lines":3,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-settings-utils.c#L247-249"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdm_display_factory_on_user_display_destruction() removes the user from priv->display_creation_users via g_hash_table_remove() as the very first step, before verifying that graphical sessions actually exist for the user and before attempting to terminate them. If gdm_find_graphical_sessions_for_username() fails, returns zero sessions, or gdm_terminate_session_by_id() fails partway through the loop, the function returns FALSE/error but the user has already been dropped from display_creation_users. A subsequent call to gdm_display_factory_on_user_display_creation() for that same user will then succeed even though the previous display/session may still be alive (in the partial-termination-failure case), allowing duplicate/overlapping user displays to be created against the 'one display per user' invariant this hashtable is meant to enforce.","fix":"Only remove the user from display_creation_users after all session terminations have succeeded (move the g_hash_table_remove call to just before the final `return TRUE;`), or re-insert the user back into the table if any later step fails.","locations":[{"ref":"daemon/gdm-display-factory.c:263-310","code":"  263 | gboolean\n  264 | gdm_display_factory_on_user_display_destruction (GdmDisplayFactory  *factory,\n  265 |                                                  const char         *user,\n  266 |                                                  GError            **error)\n  267 | {\n  268 |         g_auto (GStrv) session_ids = NULL;\n  269 |         g_autoptr (GError) local_error = NULL;\n  270 |         g_autoptr (GDBusConnection) connection = NULL;\n  271 |         GdmDisplayFactoryPrivate *priv;\n  272 |         int i;\n  273 | \n  274 |         g_return_val_if_fail (GDM_IS_DISPLAY_FACTORY (factory), FALSE);\n  275 | \n  276 |         priv = gdm_display_factory_get_instance_private (factory);\n  277 | \n  278 |         if (!g_hash_table_remove (priv->display_creation_users, user)) {\n  279 |                 g_set_error (error, GDM_DISPLAY_ERROR, GDM_DISPLAY_ERROR_GENERAL,\n  280 |                              \"A display for user %s wasn't created\", user);\n  281 |                 return FALSE;\n  282 |         }\n  283 | \n  284 |         if (!gdm_find_graphical_sessions_for_username (user, &session_ids, error))\n  285 |                 return FALSE;\n  286 | \n  287 |         if (g_strv_length (session_ids) == 0) {\n  288 |                 g_set_error (error, GDM_DISPLAY_ERROR, GDM_DISPLAY_ERROR_GENERAL,\n  289 |                              \"There's no display for user %s\", user);\n  290 |                 return FALSE;\n  291 |         }\n  292 | \n  293 |         connection = g_bus_get_sync (G_BUS_TYPE_SYSTEM, NULL, &local_error);\n  294 |         if (connection == NULL) {\n  295 |                 g_set_error (error, GDM_DISPLAY_ERROR, GDM_DISPLAY_ERROR_GENERAL,\n  296 |                              \"Failed getting system bus %s\", local_error->message);\n  297 |                 return FALSE;\n  298 |         }\n  299 | \n  300 |         for (i = 0; session_ids[i] != NULL; i++) {\n  301 |                 if (!gdm_terminate_session_by_id (connection, NULL, session_ids[i])) {\n  302 |                         g_set_error (error, GDM_DISPLAY_ERROR, GDM_DISPLAY_ERROR_GENERAL,\n  303 |                                      \"Failed to terminate session %s\",\n  304 |                                      session_ids[i]);\n  305 |                         return FALSE;\n  306 |                 }\n  307 |         }\n  308 | \n  309 |         return TRUE;\n  310 | }","lines":48,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-display-factory.c#L263-310"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"gdm_display_store_remove() unconditionally `return FALSE;` regardless of whether gdm_display_store_foreach_remove() actually found and removed the display (that function returns a guint count of removed entries, which is discarded). Any future caller relying on the documented gboolean return value to detect whether removal succeeded will always see failure, even on successful removal. The single current caller in gdm-manager.c ignores the return value, which is why this hasn't surfaced as a visible bug yet, but the function's contract is broken.","fix":"Capture the count from gdm_display_store_foreach_remove() and return `count > 0` (or similarly correct boolean) instead of a hardcoded FALSE.","locations":[{"ref":"daemon/gdm-display-store.c:120-131","code":"  120 | gboolean\n  121 | gdm_display_store_remove (GdmDisplayStore    *store,\n  122 |                           GdmDisplay         *display)\n  123 | {\n  124 |         g_return_val_if_fail (GDM_IS_DISPLAY_STORE (store), FALSE);\n  125 |         g_return_val_if_fail (display != NULL, FALSE);\n  126 | \n  127 |         gdm_display_store_foreach_remove (store,\n  128 |                                           (GdmDisplayStoreFunc)remove_display,\n  129 |                                           display);\n  130 |         return FALSE;\n  131 | }","lines":12,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-display-store.c#L120-131"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"gdm_dynamic_user_store_remove() looks up the user in store->by_uid (g_hash_table_lookup) before taking store->mutex; the lock is only acquired afterward for the actual removal. Every other accessor of by_uid/by_name (gdm_dynamic_user_store_create, vl_get_user_record, vl_get_memberships) consistently takes the mutex before touching these tables. This unlocked read violates the locking protocol the rest of the file relies on and is a maintenance/correctness hazard: any future caller of _remove() from a different thread (or a future writer added to the varlink worker) would race with this unlocked lookup.","fix":"Move g_mutex_lock(&store->mutex) before the g_hash_table_lookup call, performing the lookup and the two removals under a single critical section (e.g. using G_MUTEX_AUTO_LOCK like the varlink handlers do).","locations":[{"ref":"daemon/gdm-dynamic-user-store.c:347-361","code":"  347 | void\n  348 | gdm_dynamic_user_store_remove (GdmDynamicUserStore *store,\n  349 |                                uid_t                uid)\n  350 | {\n  351 |         DynamicUser *user;\n  352 | \n  353 |         user = g_hash_table_lookup (store->by_uid, &uid);\n  354 |         if (user == NULL)\n  355 |                 return;\n  356 | \n  357 |         g_mutex_lock (&store->mutex);\n  358 |         g_hash_table_remove (store->by_uid, &uid);\n  359 |         g_hash_table_remove (store->by_name, user->username);\n  360 |         g_mutex_unlock (&store->mutex);\n  361 | }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-dynamic-user-store.c#L347-361"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"GdmLaunchEnvironment->pid is never reset to 0 after gdm_signal_pid(-pid, SIGTERM) is sent in gdm_launch_environment_stop() (unlike dyn_uid, which is zeroed right after use on the next line, and session, which is cleared via g_clear_object). gdm_launch_environment_stop() is called both explicitly from gdm-display.c during teardown and again from gdm_launch_environment_finalize(), and on_conversation_stopped() also signals the same pid earlier in the shutdown sequence. Because pid is left stale, the same process-group ID can be SIGTERM'd a second time after the kernel has already reaped and possibly recycled that PID for an unrelated process group, which is a real risk in a root daemon.","fix":"Set launch_environment->pid = 0 immediately after calling gdm_signal_pid() in both on_conversation_stopped() and gdm_launch_environment_stop(), mirroring the dyn_uid = 0 pattern already used in the same function.","locations":[{"ref":"daemon/gdm-launch-environment.c:628-652","code":"  628 | gboolean\n  629 | gdm_launch_environment_stop (GdmLaunchEnvironment *launch_environment)\n  630 | {\n  631 |         g_return_val_if_fail (GDM_IS_LAUNCH_ENVIRONMENT (launch_environment), FALSE);\n  632 | \n  633 |         if (launch_environment->pid > 1) {\n  634 |                 gdm_signal_pid (-launch_environment->pid, SIGTERM);\n  635 |         }\n  636 | \n  637 |         if (launch_environment->session != NULL) {\n  638 |                 gdm_session_close (launch_environment->session);\n  639 | \n  640 |                 g_clear_object (&launch_environment->session);\n  641 |         }\n  642 | \n  643 |         if (launch_environment->dyn_uid != 0) {\n  644 |                 gdm_dynamic_user_store_remove (launch_environment->dyn_user_store,\n  645 |                                                launch_environment->dyn_uid);\n  646 |                 launch_environment->dyn_uid = 0;\n  647 |         }\n  648 | \n  649 |         g_signal_emit (G_OBJECT (launch_environment), signals [STOPPED], 0);\n  650 | \n  651 |         return TRUE;\n  652 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-launch-environment.c#L628-652"},{"ref":"daemon/gdm-launch-environment.c:509-528","code":"  509 | static void\n  510 | on_conversation_stopped (GdmSession           *session,\n  511 |                          const char           *service_name,\n  512 |                          GdmLaunchEnvironment *launch_environment)\n  513 | {\n  514 |         g_autoptr(GdmSession) conversation_session = NULL;\n  515 | \n  516 |         conversation_session = g_steal_pointer (&launch_environment->session);\n  517 | \n  518 |         g_debug (\"GdmLaunchEnvironment: conversation stopped\");\n  519 | \n  520 |         if (launch_environment->pid > 1) {\n  521 |                 gdm_signal_pid (-launch_environment->pid, SIGTERM);\n  522 |                 g_signal_emit (G_OBJECT (launch_environment), signals [STOPPED], 0);\n  523 |         }\n  524 | \n  525 |         if (conversation_session != NULL) {\n  526 |                 gdm_session_close (conversation_session);\n  527 |         }\n  528 | }","lines":20,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-launch-environment.c#L509-528"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"is_remote_session() treats sd_session_is_remote() returning -ENXIO (no seat associated with the session) as 'is remote' = TRUE, because the final return is `ret != FALSE` i.e. `ret != 0`, and -ENXIO is non-zero. Every other helper in this file (get_seat_id_for_session_id, get_tty_for_session_id) explicitly special-cases -ENXIO as 'no data' rather than folding it into a truthy/positive result. This makes seatless sessions get misclassified as remote, which feeds into are_sessions_compatible() and reauthentication-channel routing decisions.","fix":"Special-case ret == -ENXIO the same way the sibling helpers do (treat as FALSE/unknown rather than truthy), e.g. `if (ret == -ENXIO) return FALSE;` before the generic error check, and only return `ret > 0` for the success path.","locations":[{"ref":"daemon/gdm-manager.c:380-397","code":"  380 | static gboolean\n  381 | is_remote_session (GdmManager  *self,\n  382 |                    const char  *session_id,\n  383 |                    GError     **error)\n  384 | {\n  385 |         int ret;\n  386 | \n  387 |         ret = sd_session_is_remote (session_id);\n  388 | \n  389 |         if (ret < 0 && ret != -ENXIO) {\n  390 |                 g_set_error (error,\n  391 |                              GDM_DISPLAY_ERROR,\n  392 |                              GDM_DISPLAY_ERROR_GETTING_SESSION_INFO,\n  393 |                              \"%s\", g_strerror (-ret));\n  394 |                 return FALSE;\n  395 |         }\n  396 | \n  397 |         return ret != FALSE;","lines":18,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-manager.c#L380-397"}]},{"id":"LOGIC_17","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"gdm_manager_handle_open_reauthentication_channel() validates session_id/pid/uid for NULL/zero but never checks `display` for NULL before using it. get_display_and_details_for_bus_sender() can return display == NULL (its display lookup via lookup_by_session_id can fail) while still populating session_id/pid/uid from the session info. When is_login_screen is TRUE, the code then calls `g_object_set_data (G_OBJECT (display), \"reauth-pid-of-caller\", ...)` with display possibly NULL, which trips a g_critical via G_IS_OBJECT() inside g_object_set_data and silently no-ops, masking what should be a clean access-denied error to the caller.","fix":"After the session_id/pid/uid validation, also check `if (display == NULL) { return access-denied error; }` before dereferencing display in the is_login_screen branch.","locations":[{"ref":"daemon/gdm-manager.c:1094-1109","code":" 1094 |         if (session_id itor.c:181-201","code":"  181 |                 /* If display is on console or VT */\n  182 |                 if (hostname != NULL && hostname[0] != '\\0') {\n  183 |                         /* Login from a remote host */\n  184 |                         if (adt_load_hostname (hostname, &tid) != 0) {\n  185 |                                 syslog (LOG_AUTH | LOG_ALERT,\n  186 |                                         \"adt_loadhostname (%s): %m\", hostname);\n  187 |                         }\n  188 |                 } else {\n  189 |                         /* login from the local host */\n  190 |                         if (adt_load_ttyname (display_device, &tid) != 0) {\n  191 |                                 syslog (LOG_AUTH | LOG_ALERT,\n  192 |                                         \"adt_loadhostname (localhost): %m\");\n  193 |                         }\n  194 |                 }\n  195 | \n  196 |                 if (adt_set_user (ah,\n  197 |                                   solaris_auditor->username != NULL ? solaris_auditor->uid : ADT_NO_ATTRIB,\n  198 |                                   solaris_auditor->username != NULL ? solaris_auditor->gid : ADT_NO_ATTRIB,\n  199 |                                   solaris_auditor->username != NULL ? solaris_auditor->uid : ADT_NO_ATTRIB,\n  200 |                                   solaris_auditor->username != NULL ? solaris_auditor->gid : ADT_NO_ATTRIB,\n  201 |                                   tid, ADT_NEW) != 0) {","lines":21,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-solaris-auditor.c#L181-201"}]},{"id":"LOGIC_19","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"user_verifier_extensions is a single hashtable owned at the GdmSession level, but its entries (GDBusInterfaceSkeleton extension objects) are exported onto a specific GDBusConnection inside gdm_session_handle_client_enable_extensions(). If more than one outside connection calls EnableExtensions on the same GdmSession (e.g. greeter reconnects, or a second client), the second call does g_hash_table_remove_all() which unexports and disposes (unexport_and_free_user_verifier_extension) the interfaces that were exported on the FIRST connection's D-Bus object path, even though that first connection may still be alive and relying on them. This causes cross-connection interface corruption rather than being scoped per-connection.","fix":"Scope user_verifier_extensions per-connection (e.g. store it in connection object data alongside 'gdm-session', or key the table by connection) instead of a single session-wide table shared across all outside connections.","locations":[{"ref":"daemon/gdm-session.c:1571-1599","code":" 1571 | static gboolean\n 1572 | gdm_session_handle_client_enable_extensions (GdmDBusUserVerifier    *user_verifier_interface,\n 1573 |                                              GDBusMethodInvocation  *invocation,\n 1574 |                                              const char * const *    extensions,\n 1575 |                                              GDBusConnection        *connection)\n 1576 | {\n 1577 |         GdmSession *self = g_object_get_data (G_OBJECT (connection), \"gdm-session\");\n 1578 |         size_t i;\n 1579 | \n 1580 |         g_hash_table_remove_all (self->user_verifier_extensions);\n 1581 | \n 1582 |         for (i = 0; extensions[i] != NULL; i++) {\n 1583 |                 if (g_hash_table_lookup (self->user_verifier_extensions, extensions[i]) != NULL)\n 1584 |                         continue;\n 1585 | \n 1586 |                 if (strcmp (extensions[i],\n 1587 |                             gdm_dbus_user_verifier_choice_list_interface_info ()->name) == 0)\n 1588 |                         export_user_verifier_choice_list_interface (self, connection);\n 1589 | \n 1590 |                 if (g_str_equal (extensions[i],\n 1591 |                                  gdm_dbus_user_verifier_custom_json_interface_info ()->name))\n 1592 |                         export_user_verifier_custom_json_interface (self, connection);\n 1593 | \n 1594 |         }\n 1595 | \n 1596 |         gdm_dbus_user_verifier_complete_enable_extensions (user_verifier_interface, invocation);\n 1597 | \n 1598 |         return TRUE;\n 1599 | }","lines":29,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L1571-1599"},{"ref":"daemon/gdm-session.c:1849-1887","code":" 1849 | static void\n 1850 | export_user_verifier_interface (GdmSession      *self,\n 1851 |                                 GDBusConnection *connection)\n 1852 | {\n 1853 |         g_autoptr (GdmDBusUserVerifier) user_verifier_interface = NULL;\n 1854 | \n 1855 |         user_verifier_interface = GDM_DBUS_USER_VERIFIER (gdm_dbus_user_verifier_skeleton_new ());\n 1856 | \n 1857 |         g_object_set_data (G_OBJECT (connection), \"gdm-session\", self);\n 1858 | \n 1859 |         g_signal_connect (user_verifier_interface,\n 1860 |                           \"handle-enable-extensions\",\n 1861 |                           G_CALLBACK (gdm_session_handle_client_enable_extensions),\n 1862 |                           connection);\n 1863 |         g_signal_connect (user_verifier_interface,\n 1864 |                           \"handle-begin-verification\",\n 1865 |                           G_CALLBACK (gdm_session_handle_client_begin_verification),\n 1866 |                           self);\n 1867 |         g_signal_connect (user_verifier_interface,\n 1868 |                           \"handle-begin-verification-for-user\",\n 1869 |                           G_CALLBACK (gdm_session_handle_client_begin_verification_for_user),\n 1870 |                           self);\n 1871 |         g_signal_connect (user_verifier_interface,\n 1872 |                           \"handle-answer-query\",\n 1873 |                           G_CALLBACK (gdm_session_handle_client_answer_query),\n 1874 |                           self);\n 1875 |         g_signal_connect (user_verifier_interface,\n 1876 |                           \"handle-cancel\",\n 1877 |                           G_CALLBACK (gdm_session_handle_client_cancel),\n 1878 |                           self);\n 1879 | \n 1880 |         g_dbus_interface_skeleton_export (G_DBUS_INTERFACE_SKELETON (user_verifier_interface),\n 1881 |                                           connection,\n 1882 |                                           GDM_SESSION_DBUS_OBJECT_PATH,\n 1883 |                                           NULL);\n 1884 | \n 1885 |         g_set_object (&self->user_verifier_interface, user_verifier_interface);\n 1886 | }\n 1887 | ","lines":39,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L1849-1887"}]},{"id":"LOGIC_20","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"on_initialization_complete_cb() checks conversation->starting_invocation for NULL before using it on the success path (ret != NULL), but on the failure path it calls g_dbus_method_invocation_return_gerror (conversation->starting_invocation, error) unconditionally. starting_invocation is NULL whenever the conversation was started via gdm_session_setup_for_program() (which never sets starting_invocation, see gdm_session_setup_for_program at line 2637), so an initialization failure for a program-session conversation will pass NULL into g_dbus_method_invocation_return_gerror().","fix":"Guard the failure branch the same way the success branch does: if (conversation->starting_invocation) { g_dbus_method_invocation_return_gerror (...); }","locations":[{"ref":"daemon/gdm-session.c:2532-2536","code":" 2532 |         } else {\n 2533 |                 g_dbus_method_invocation_return_gerror (conversation->starting_invocation, error);\n 2534 |                 report_and_stop_conversation (self, service_name, error);\n 2535 |                 g_error_free (error);\n 2536 |         }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L2532-2536"}]},{"id":"LOGIC_21","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"gdm_session_setup() (the normal login verification path) never resets self->is_program_session to FALSE, while gdm_session_setup_for_user() explicitly does (self->is_program_session = FALSE at line 2632) and gdm_session_setup_for_program() sets it to TRUE. do_reset()/gdm_session_reset() also never clears this flag. Since GdmSession is reused across conversations within the same display/session-object lifecycle, if a program-session conversation (e.g. autologin helper) runs before a plain gdm_session_setup() call on the same GdmSession, is_program_session incorrectly remains TRUE and is sent to the worker as 'is-program-session' in initialize(), affecting PAM/session setup behavior for what should be a normal login.","fix":"Explicitly set self->is_program_session = FALSE at the start of gdm_session_setup(), or reset it in do_reset() so each fresh login pass starts from a known state.","locations":[{"ref":"daemon/gdm-session.c:2599-2611","code":" 2599 | void\n 2600 | gdm_session_setup (GdmSession *self,\n 2601 |                    const char *service_name)\n 2602 | {\n 2603 | \n 2604 |         g_return_if_fail (GDM_IS_SESSION (self));\n 2605 |         g_return_if_fail (service_name != NULL);\n 2606 | \n 2607 |         update_session_type (self);\n 2608 | \n 2609 |         initialize (self, service_name, NULL, NULL);\n 2610 |         gdm_session_defaults_changed (self);\n 2611 | }","lines":13,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L2599-2611"},{"ref":"daemon/gdm-session.c:3110-3135","code":" 3110 | static void\n 3111 | do_reset (GdmSession *self)\n 3112 | {\n 3113 |         stop_all_conversations (self);\n 3114 | \n 3115 |         free_pending_worker_connections (self);\n 3116 | \n 3117 |         g_free (self->selected_user);\n 3118 |         self->selected_user = NULL;\n 3119 | \n 3120 |         g_free (self->selected_session);\n 3121 |         self->selected_session = NULL;\n 3122 | \n 3123 |         g_free (self->saved_session);\n 3124 |         self->saved_session = NULL;\n 3125 | \n 3126 |         g_free (self->saved_language);\n 3127 |         self->saved_language = NULL;\n 3128 | \n 3129 |         g_hash_table_remove_all (self->environment);\n 3130 | \n 3131 |         g_clear_pointer (&self->session_opened, g_free);\n 3132 | \n 3133 |         self->session_pid = -1;\n 3134 |         self->session_conversation = NULL;\n 3135 | }","lines":26,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L3110-3135"}]},{"id":"LOGIC_22","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In pam_sm_authenticate(), if keyctl_read_alloc() succeeds with a zero-length payload (r == 0), the for loop body never executes and last_cached_password stays pointed at the start of a zero-byte allocation. pam_set_item() is then called with this pointer as a string, reading past the allocation since there is no NUL byte within the 0-byte buffer.","fix":"Check for cached_passwords_length == 0 explicitly and return PAM_AUTHINFO_UNAVAIL in that case before scanning for the last password.","locations":[{"ref":"pam_gdm/pam_gdm.c:52-73","code":"   52 |         r = keyctl_read_alloc (serial, &cached_passwords);\n   53 |         if (r < 0)\n   54 |                 return PAM_AUTHINFO_UNAVAIL;\n   55 |         \n   56 |         cached_passwords_length = r;\n   57 | \n   58 |         /*\n   59 |             Find the last password in the NUL-separated list of passwords.\n   60 |             Multiple passwords are returned either when the user enters an\n   61 |             incorrect password or there are multiple encrypted drives.\n   62 |             In the case of an incorrect password the last one is correct.\n   63 |             In the case of multiple drives, choosing the last drive is as\n   64 |             arbitrary a choice as any other, but choosing the last password at\n   65 |             least supports multiple attempts on the last drive.\n   66 |         */\n   67 |         last_cached_password = cached_passwords;\n   68 |         for (i = 0; i < cached_passwords_length; i++) {\n   69 |                 last_cached_password = ((char *) cached_passwords) + i;\n   70 |                 i += strlen (last_cached_password);\n   71 |         }\n   72 | \n   73 |         r = pam_set_item (pamh, PAM_AUTHTOK, last_cached_password);","lines":22,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/pam_gdm/pam_gdm.c#L52-73"}]},{"id":"LOGIC_23","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"handle_reset's interactive confirmation loop calls fgets(buffer, sizeof(buffer), stdin) and on failure (NULL return, e.g. EOF because stdin is closed/redirected from /dev/null, which is common for a privileged tool invoked from scripts or systemd) just does 'continue', looping forever and repeatedly re-printing the prompt. There is no escape path, causing gdm-config reset to hang/busy-loop indefinitely when run non-interactively without the -y/--yes flag misuse or stdin EOF.","fix":"Break out of the loop (and treat as cancelled / return an error) when fgets returns NULL instead of continuing the loop forever.","locations":[{"ref":"utils/gdm-config.c:1889-1904","code":" 1889 |                 while (TRUE) {\n 1890 |                         g_print (C_(\"Interactive question\", \"Do you want to continue? [Y/n]? \"));\n 1891 |                         if (!fgets(buffer, sizeof (buffer), stdin))\n 1892 |                                 continue;\n 1893 | \n 1894 |                         g_strstrip (buffer);\n 1895 | \n 1896 |                         if (g_str_equal (buffer, reply_Y))\n 1897 |                                 break;\n 1898 |                         if (g_str_equal (buffer, reply_y))\n 1899 |                                 break;\n 1900 |                         if (g_str_equal (buffer, reply_N))\n 1901 |                                 break;\n 1902 |                         if (g_str_equal (buffer, reply_n))\n 1903 |                                 break;\n 1904 |                 }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L1889-1904"}]},{"id":"LOGIC_24","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"gdm_session_display_mode_from_string() returns -1 cast to the GdmSessionDisplayMode enum when given an unrecognized string, but the enum has no member representing an invalid/unknown value. Callers such as gdm_session_display_mode_to_string() only handle the two real enum values and fall into a 'default: g_warning(...); return \"\";' branch, silently propagating an invalid display mode rather than failing loudly at the point of conversion. Additionally str is dereferenced via strcmp() without a NULL guard (currently safe because the only caller passes a GVariant 's' argument, which GVariant guarantees non-NULL, but the function has no defense if reused elsewhere).","fix":"Return a proper sentinel (or have the function take an out-gboolean for success) and have the caller (gdm-session-worker.c:2394) reject the SetSessionDisplayMode call outright when the string is unrecognized, instead of silently storing an invalid enum value.","locations":[{"ref":"daemon/gdm-session.c:4140-4150","code":" 4140 | GdmSessionDisplayMode\n 4141 | gdm_session_display_mode_from_string (const char *str)\n 4142 | {\n 4143 |         if (strcmp (str, \"new-vt\") == 0)\n 4144 |                 return GDM_SESSION_DISPLAY_MODE_NEW_VT;\n 4145 |         if (strcmp (str, \"logind-managed\") == 0)\n 4146 |                 return GDM_SESSION_DISPLAY_MODE_LOGIND_MANAGED;\n 4147 | \n 4148 |         g_warning (\"Unknown GdmSessionDisplayMode %s\", str);\n 4149 |         return -1;\n 4150 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L4140-4150"}]},{"id":"LOGIC_25","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"write_dconf_setting_to_key_file's final g_debug call always references value_str even on the 'remove key' path (value == NULL), where value_str is never assigned and remains NULL for the entire function. Passing NULL for a \"%s\" conversion is technically undefined behavior in C (though glib's printf usually tolerates it by printing \"(null)\"), and the debug message is misleading since it claims to show what was written when in fact the key was removed, not set to a value.","fix":"Use a separate debug message for the remove-key path that doesn't reference value_str, or initialize value_str to a placeholder like \"<removed>\" before the unconditional g_debug call.","locations":[{"ref":"utils/gdm-config.c:1093-1118","code":" 1093 |         if (value) {\n 1094 |                 value_ref = g_variant_ref_sink (value);\n 1095 |                 value_str = g_variant_print (value_ref, FALSE);\n 1096 | \n 1097 |                 if (g_variant_is_of_type (value, G_VARIANT_TYPE_BOOLEAN))\n 1098 |                         g_key_file_set_boolean (key_file, setting_path, key,\n 1099 |                                                 g_variant_get_boolean (value));\n 1100 |                 else\n 1101 |                         g_key_file_set_string (key_file, setting_path, key, value_str);\n 1102 |         } else {\n 1103 |                 g_clear_error (&local_error);\n 1104 |                 g_key_file_remove_key (key_file, setting_path, key, &local_error);\n 1105 | \n 1106 |                 if (local_error &&\n 1107 |                     !g_error_matches (local_error, G_KEY_FILE_ERROR,\n 1108 |                                       G_KEY_FILE_ERROR_KEY_NOT_FOUND) &&\n 1109 |                     !g_error_matches (local_error, G_KEY_FILE_ERROR,\n 1110 |                                       G_KEY_FILE_ERROR_GROUP_NOT_FOUND)) {\n 1111 |                         g_propagate_error (error, g_steal_pointer (&local_error));\n 1112 |                         return FALSE;\n 1113 |                 }\n 1114 |         }\n 1115 | \n 1116 |         g_debug (\"Writing %s configuration “%s = %s” to file %s\",\n 1117 |                  setting_path, key, value_str,\n 1118 |                  file_path);","lines":26,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L1093-1118"}]},{"id":"CPY_1","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"register_display_timeout_cb() in gdm-wayland-session.c logs the warning 'Could not display session' on failure, which is a copy-paste leftover from gdm-x-session.c's near-identical function (which correctly says 'Could not register display'). The wayland version's message is misleading since this callback registers the *display*, not the session.","fix":"Change the warning text to 'Could not register display: %s' to match what the function actually does (and the x-session.c equivalent).","locations":[{"ref":"daemon/gdm-wayland-session.c:455-465","code":"  455 | static void\n  456 | register_display_timeout_cb (gpointer user_data)\n  457 | {\n  458 |         State *state = (State *) user_data;\n  459 |         g_autoptr(GError) error = NULL;\n  460 | \n  461 |         if (!gdm_dbus_manager_call_register_display_sync (state->display_manager_proxy,\n  462 |                                                           state->cancellable,\n  463 |                                                           &error))\n  464 |                 g_warning (\"Could not display session: %s\", error->message);\n  465 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-wayland-session.c#L455-465"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"In write_dconf_setting_to_key_file, when the key file load succeeds but has no leading comment, g_key_file_get_comment(key_file, NULL, NULL, &local_error) returns NULL and sets local_error. The code immediately calls g_strstrip(file_comment) on that NULL pointer before checking local_error, which triggers a GLib critical warning (g_return_val_if_fail) on every write to a settings file lacking a recognizable header comment, even though this is an expected/handled case a few lines later.","fix":"Check local_error (or NULL-ness of file_comment) before calling g_strstrip; only strip when file_comment is non-NULL.","locations":[{"ref":"utils/gdm-config.c:1076-1088","code":" 1076 |                 g_autofree char *file_comment = NULL;\n 1077 | \n 1078 |                 file_comment = g_key_file_get_comment (key_file, NULL, NULL, &local_error);\n 1079 |                 file_comment = g_strstrip (file_comment);\n 1080 | \n 1081 |                 if (local_error) {\n 1082 |                         /* TRANSLATORS: First value is a file path, second is an error message */\n 1083 |                         g_warning (_(\"Failed to get the “%s” header comment: %s, was it modified?\"),\n 1084 |                                    file_path, local_error->message);\n 1085 |                 } else if (g_strcmp0 (file_comment, header_comment) != 0) {\n 1086 |                         g_warning (_(\"File “%s” header comment does not match, was it modified?\"),\n 1087 |                                    file_path);\n 1088 |                 }","lines":13,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L1076-1088"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"gdm_session_record() switches on `event` (a GdmSessionRecordEvent) and assigns the function pointer `write_record` in each case, but there is no `default:` case. If the enum were ever extended without updating this switch, `write_record` would be called uninitialized. Currently harmless since all three enum values are handled, but it's a latent landmine in security-relevant audit-log code with no compiler safety net (no default: g_assert_not_reached() / no g_return_if_fail guard).","fix":"Initialize write_record = NULL at declaration and add a default case (or post-switch check) that asserts/aborts if write_record is still NULL, so a future enum addition fails loudly instead of dereferencing an uninitialized function pointer.","locations":[{"ref":"daemon/gdm-session-record.c:238-272","code":"  238 | void\n  239 | gdm_session_record (GdmSessionRecordEvent  event,\n  240 |                     GdmSession            *session,\n  241 |                     GPid                   pid)\n  242 | {\n  243 |         UTMP record = { 0 };\n  244 |         const char *username = NULL;\n  245 |         g_autofree char *hostname = NULL;\n  246 |         g_autofree char *tty = NULL;\n  247 |         g_autofree char *seat_id = NULL;\n  248 |         void (*write_record)(UTMP *);\n  249 | \n  250 |         username = gdm_session_get_username (session);\n  251 |         if (username == NULL)\n  252 |                 return;\n  253 | \n  254 |         if (pid < 0)\n  255 |                 pid = gdm_session_get_pid (session);\n  256 |         if (pid < 0)\n  257 |                 return;\n  258 | \n  259 |         switch (event) {\n  260 |         case GDM_SESSION_RECORD_LOGIN:\n  261 |                 g_debug (\"Writing login record\");\n  262 |                 write_record = write_login_record;\n  263 |                 break;\n  264 |         case GDM_SESSION_RECORD_LOGOUT:\n  265 |                 g_debug (\"Writing logout record\");\n  266 |                 write_record = write_logout_record;\n  267 |                 break;\n  268 |         case GDM_SESSION_RECORD_FAILED:\n  269 |                 g_debug (\"Writing failed session attempt record\");\n  270 |                 write_record = write_failed_record;\n  271 |                 break;\n  272 |         }","lines":35,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-record.c#L238-272"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"gdm_session_worker_ask_list_of_choices() validates that list->items[i].key is non-NULL before adding to the GVariantBuilder, but does not validate list->items[i].text. g_variant_builder_add() with format \"{ss}\" requires both strings to be non-NULL (g_variant_new_string() on a NULL pointer triggers a GLib critical/assertion). This data originates from a PAM module via the GDM_PAM_EXTENSION_CHOICE_LIST binary PAM message, i.e. untrusted-module-controlled input, so a malicious or buggy PAM module can crash the privileged session worker.","fix":"Validate list->items[i].text != NULL the same way key is validated, warning and bailing out (clearing the builder) if it is NULL.","locations":[{"ref":"daemon/gdm-session-worker.c:548-556","code":"  548 |         for (i = 0; i < list->number_of_items; i++) {\n  549 |                 if (list->items[i].key == NULL) {\n  550 |                         g_warning (\"choice list contains item with NULL key\");\n  551 |                         g_variant_builder_clear (&builder);\n  552 |                         return FALSE;\n  553 |                 }\n  554 |                 g_debug (\"GdmSessionWorker:        choices['%s'] = \\\"%s\\\"\", list->items[i].key, list->items[i].text);\n  555 |                 g_variant_builder_add (&builder, \"{ss}\", list->items[i].key, list->items[i].text);\n  556 |         }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker.c#L548-556"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"In gdm_session_worker_pam_new_messages_handler(), the result of calloc(number_of_messages, sizeof(struct pam_response)) is not checked for NULL before the loop dereferences replies[i] (both in the main loop at replies[i].resp = response and in the `out:` cleanup loop). Under memory pressure this is a NULL pointer dereference inside the PAM conversation callback, which runs with elevated privileges during authentication.","fix":"Check `if (replies == NULL) { return_value = PAM_BUF_ERR; goto out_no_replies; }` (skipping the deref loop) or otherwise bail out safely before touching replies[i].","locations":[{"ref":"daemon/gdm-session-worker.c:895-924","code":"  895 |         replies = (struct pam_response *) calloc (number_of_messages,\n  896 |                                                   sizeof (struct pam_response));\n  897 |         for (i = 0; i < number_of_messages; i++) {\n  898 |                 gboolean got_response;\n  899 |                 char    *response;\n  900 | \n  901 |                 response = NULL;\n  902 |                 got_response = gdm_session_worker_process_pam_message (worker,\n  903 |                                                                        messages[i],\n  904 |                                                                        &response);\n  905 |                 if (!got_response) {\n  906 |                         goto out;\n  907 |                 }\n  908 | \n  909 |                 replies[i].resp = response;\n  910 |                 replies[i].resp_retcode = PAM_SUCCESS;\n  911 |         }\n  912 | \n  913 |         return_value = PAM_SUCCESS;\n  914 | \n  915 |  out:\n  916 |         if (return_value != PAM_SUCCESS || responses == NULL) {\n  917 |                 for (i = 0; i < number_of_messages; i++) {\n  918 |                         if (replies[i].resp != NULL) {\n  919 |                                 memset (replies[i].resp, 0, strlen (replies[i].resp));\n  920 |                                 free (replies[i].resp);\n  921 |                         }\n  922 |                         memset (&replies[i], 0, sizeof (replies[i]));\n  923 |                 }\n  924 |                 free (replies);","lines":30,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker.c#L895-924"}]},{"id":"ERR_5","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"gdm_client_get_user_verifier_sync calls gdm_user_verifier_call_enable_extensions_sync() with the trailing GError** argument hard-coded to NULL, so if enabling PAM extensions fails, the failure is completely silent (no g_debug/g_warning, no way for the caller to learn why extensions weren't applied) and the function just falls back to returning the verifier without extensions. The async counterpart (on_user_verifier_extensions_enabled) does capture and log the equivalent error via g_debug, making the sync path strictly less debuggable than the async one for the same operation.","fix":"Pass a real GError** (or at least a local GError that gets logged via g_debug) instead of NULL, mirroring the async on_user_verifier_extensions_enabled error handling.","locations":[{"ref":"libgdm/gdm-client.c:813-819","code":"  813 |         res = gdm_user_verifier_call_enable_extensions_sync (client->user_verifier,\n  814 |                                                              (const char * const *)\n  815 |                                                              client->enabled_extensions,\n  816 |                                                              cancellable,\n  817 |                                                              NULL);\n  818 |         if (!res)\n  819 |                 return g_object_ref (client->user_verifier);","lines":7,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/libgdm/gdm-client.c#L813-819"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":true,"description":"gdm_session_settings_set_language_name() and gdm_session_settings_set_session_name() call strcmp(settings->X, X) directly instead of g_strcmp0(). If settings->X is already set (non-NULL) and the caller passes a NULL X (e.g. an unset/cleared language or session name), this dereferences NULL inside strcmp() and crashes the privileged daemon. gdm_session_settings_set_session_type() right below correctly uses g_strcmp0() for the same kind of comparison, showing the inconsistency.","fix":"Replace the raw strcmp() calls with g_strcmp0(), matching gdm_session_settings_set_session_type(), so a NULL new value doesn't crash when an old value is set.","locations":[{"ref":"daemon/gdm-session-settings.c:142-152","code":"  142 | gdm_session_settings_set_language_name (GdmSessionSettings *settings,\n  143 |                                         const char         *language_name)\n  144 | {\n  145 |         g_return_if_fail (GDM_IS_SESSION_SETTINGS (settings));\n  146 | \n  147 |         if (settings->language_name == NULL ||\n  148 |             strcmp (settings->language_name, language_name) != 0) {\n  149 |                 settings->language_name = g_strdup (language_name);\n  150 |                 g_object_notify (G_OBJECT (settings), \"language-name\");\n  151 |         }\n  152 | }","lines":11,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-settings.c#L142-152"},{"ref":"daemon/gdm-session-settings.c:154-165","code":"  154 | void\n  155 | gdm_session_settings_set_session_name (GdmSessionSettings *settings,\n  156 |                                        const char         *session_name)\n  157 | {\n  158 |         g_return_if_fail (GDM_IS_SESSION_SETTINGS (settings));\n  159 | \n  160 |         if (settings->session_name == NULL ||\n  161 |             strcmp (settings->session_name, session_name) != 0) {\n  162 |                 settings->session_name = g_strdup (session_name);\n  163 |                 g_object_notify (G_OBJECT (settings), \"session-name\");\n  164 |         }\n  165 | }","lines":12,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-settings.c#L154-165"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"_open_program_session_log() is invoked from the forked session child while the process is STILL ROOT (it runs before setsid()/setuid()/setusercontext() in the child, at the top of the fork branch). It operates on worker->log_file, a path that is fully attacker/caller-influenced data received over D-Bus in gdm_session_worker_handle_initialize() (the \"log-file\" key). Inside, rotate_logs() calls g_unlink()/g_rename() on attacker-influenced filenames without O_NOFOLLOW, and _open_program_session_log() itself calls g_open(filename, O_WRONLY|O_APPEND|O_CREAT, 0600) without O_NOFOLLOW either. If any component that can set 'log-file' (e.g. a compromised or buggy higher-level caller, custom session config, or future code path) supplies a path containing attacker-controlled directory components, a classic symlink/TOCTOU race lets a local user redirect this root-owned open/rename/unlink/fchmod sequence at an arbitrary file, since none of these operations validate the target is the expected regular file owned by the expected user before acting on it as root.","fix":"Either move log-file opening to after privileges are dropped (matching how _open_user_session_log is invoked post-setuid for the user-session case), or, if it must run as root, harden rotate_logs()/_open_program_session_log() to use O_NOFOLLOW on every open(), avoid following the final path component via openat()+O_NOFOLLOW, and verify (via fstat after open, not lstat before) that the opened file is a regular file with expected ownership before truncating/chmod'ing it.","locations":[{"ref":"daemon/gdm-session-worker.c:2020-2023","code":" 2020 |                 if (!has_journald && worker->is_program_session) {\n 2021 |                         stdout_fd = _open_program_session_log (worker->log_file);\n 2022 |                         stderr_fd = dup (stdout_fd);\n 2023 |                 }","lines":4,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker.c#L2020-2023"},{"ref":"daemon/gdm-session-worker.c:1838-1905","code":" 1838 | rotate_logs (const char *path,\n 1839 |              guint       n_copies)\n 1840 | {\n 1841 |         int i;\n 1842 | \n 1843 |         for (i = n_copies - 1; i > 0; i--) {\n 1844 |                 g_autofree char *name_n = NULL;\n 1845 |                 g_autofree char *name_n1 = NULL;\n 1846 | \n 1847 |                 name_n = g_strdup_printf (\"%s.%d\", path, i);\n 1848 |                 if (i > 1) {\n 1849 |                         name_n1 = g_strdup_printf (\"%s.%d\", path, i - 1);\n 1850 |                 } else {\n 1851 |                         name_n1 = g_strdup (path);\n 1852 |                 }\n 1853 | \n 1854 |                 g_unlink (name_n);\n 1855 |                 g_rename (name_n1, name_n);\n 1856 |         }\n 1857 | \n 1858 |         g_unlink (path);\n 1859 | }\n 1860 | \n 1861 | static int\n 1862 | _open_program_session_log (const char *filename)\n 1863 | {\n 1864 |         int   fd;\n 1865 | \n 1866 |         rotate_logs (filename, MAX_LOGS);\n 1867 | \n 1868 |         fd = g_open (filename, O_WRONLY | O_APPEND | O_CREAT, 0600);\n 1869 | \n 1870 |         if (fd < 0) {\n 1871 |                 g_autofree char *temp_name = NULL;\n 1872 | \n 1873 |                 temp_name = g_strdup_printf (\"%s.XXXXXXXX\", filename);\n 1874 | \n 1875 |                 fd = g_mkstemp (temp_name);\n 1876 | \n 1877 |                 if (fd < 0) {\n 1878 |                         goto out;\n 1879 |                 }\n 1880 | \n 1881 |                 g_warning (\"session log '%s' is not appendable, logging session to '%s' instead.\\n\", filename,\n 1882 |                            temp_name);\n 1883 |         } else {\n 1884 |                 if (ftruncate (fd, 0) < 0) {\n 1885 |                         close (fd);\n 1886 |                         fd = -1;\n 1887 |                         goto out;\n 1888 |                 }\n 1889 |         }\n 1890 | \n 1891 |         if (fchmod (fd, 0644) < 0) {\n 1892 |                 close (fd);\n 1893 |                 fd = -1;\n 1894 |                 goto out;\n 1895 |         }\n 1896 | \n 1897 | \n 1898 | out:\n 1899 |         if (fd < 0) {\n 1900 |                 g_warning (\"unable to log program session\");\n 1901 |                 fd = g_open (\"/dev/null\", O_RDWR);\n 1902 |         }\n 1903 | \n 1904 |         return fd;\n 1905 | }","lines":68,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker.c#L1838-1905"}]},{"id":"API_3","type":"api_misuse","type_label":"Api Misuse","severity":"high","easy":false,"description":"gdm_session_report_error() calls g_dbus_method_invocation_return_error_literal() on conversation->pending_invocation via g_steal_pointer without checking it is non-NULL first (unlike cancel_pending_query(), which explicitly guards against a NULL pending_invocation). gdm_session_handle_client_custom_json_report_error() invokes gdm_session_report_error() directly from a client-facing D-Bus method (handle-report-error on the CustomJSON extension) with no guarantee a query is currently pending. A client/greeter that calls ReportError without an outstanding query causes a NULL GDBusMethodInvocation to be passed into GIO, producing at least a g_critical in this root daemon (and an abort under G_DEBUG=fatal-warnings).","fix":"Guard gdm_session_report_error() the same way cancel_pending_query() does: if (conversation->pending_invocation == NULL) return; before calling g_dbus_method_invocation_return_error_literal().","locations":[{"ref":"daemon/gdm-session.c:3168-3185","code":" 3168 | void\n 3169 | gdm_session_report_error (GdmSession *self,\n 3170 |                           const char *service_name,\n 3171 |                           GDBusError  code,\n 3172 |                           const char *message)\n 3173 | {\n 3174 |         GdmSessionConversation *conversation;\n 3175 | \n 3176 |         g_return_if_fail (GDM_IS_SESSION (self));\n 3177 |         g_return_if_fail (service_name != NULL);\n 3178 | \n 3179 |         conversation = find_conversation_by_name (self, service_name);\n 3180 |         if (conversation == NULL)\n 3181 |                 return;\n 3182 | \n 3183 |         g_dbus_method_invocation_return_error_literal (g_steal_pointer (&conversation->pending_invocation),\n 3184 |                                                        G_DBUS_ERROR, code, message);\n 3185 | }","lines":18,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L3168-3185"},{"ref":"daemon/gdm-session.c:1530-1542","code":" 1530 | static gboolean\n 1531 | gdm_session_handle_client_custom_json_report_error (GdmDBusUserVerifierCustomJSON *custom_json_interface,\n 1532 |                                                     GDBusMethodInvocation         *invocation,\n 1533 |                                                     const char                    *service_name,\n 1534 |                                                     const char                    *message,\n 1535 |                                                     GdmSession                    *self)\n 1536 | {\n 1537 |         g_debug (\"GdmSession: user reported custom JSON error: %s\", message);\n 1538 | \n 1539 |         gdm_dbus_user_verifier_custom_json_complete_report_error (custom_json_interface, invocation);\n 1540 |         gdm_session_report_error (self, service_name, G_DBUS_ERROR_ACCESS_DENIED, message);\n 1541 |         return TRUE;\n 1542 | }","lines":13,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L1530-1542"}]},{"id":"API_4","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"recursive_copy_dir() dereferences *error (via g_error_matches(*error, ...)) after g_file_make_directory() fails, without checking whether 'error' itself is NULL. GError convention (used throughout the rest of this same file, e.g. gdm_ensure_dir) explicitly allows callers to pass NULL for 'error' when they don't care about the failure reason. gdm_copy_dir_recursively() forwards its 'error' parameter straight through with no NULL check, so any future or external caller that passes NULL (legal per GLib convention) will crash with a NULL pointer dereference if the directory already exists or creation fails for another reason.","fix":"Use a local GError* and g_propagate_error(), or guard with 'if (error != NULL && !g_error_matches (*error, ...))'. Simplest fix: always use a local g_autoptr(GError) inside recursive_copy_dir and propagate it to the caller-supplied error at the end.","locations":[{"ref":"common/gdm-file-utils.c:175-181","code":"  175 |         if (!g_file_make_directory (dest, NULL, error)) {\n  176 |                 if (!g_error_matches (*error, G_IO_ERROR, G_IO_ERROR_EXISTS))\n  177 |                         return FALSE;\n  178 | \n  179 |                 /* It's not an error if the directory exists */\n  180 |                 g_clear_error (error);\n  181 |         }","lines":7,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-file-utils.c#L175-181"},{"ref":"common/gdm-file-utils.c:216-239","code":"  216 | gboolean\n  217 | gdm_copy_dir_recursively (const char *source,\n  218 |                           const char *dest,\n  219 |                           GError **error)\n  220 | {\n  221 |         g_autoptr (GFile) gio_source = NULL;\n  222 |         g_autoptr (GFile) gio_dest = NULL;\n  223 | \n  224 |         gio_source = g_file_new_for_path (source);\n  225 |         gio_dest = g_file_new_for_path (dest);\n  226 | \n  227 |         if (!recursive_copy_dir (gio_source, gio_dest, error)) {\n  228 |                 g_autoptr (GError) inner_error = NULL;\n  229 | \n  230 |                 if (!gdm_rm_recursively (gio_dest, &inner_error)) {\n  231 |                         g_warning (\"Failed to clean up '%s' after failed recursive copy: %s\",\n  232 |                                    dest, inner_error->message);\n  233 |                 }\n  234 | \n  235 |                 return FALSE;\n  236 |         }\n  237 | \n  238 |         return TRUE;\n  239 | }","lines":24,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-file-utils.c#L216-239"}]},{"id":"API_5","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"get_session_desktop_names() calls g_key_file_free (keyfile) unconditionally after the if (keyfile != NULL) block, but keyfile can legitimately be NULL whenever load_key_file_for_file() doesn't find the session's .desktop file (a normal, non-error condition handled everywhere else in the file via NULL checks, e.g. gdm_session_is_wayland_session uses g_clear_pointer). g_key_file_free()/g_key_file_unref() asserts its argument is non-NULL, so this triggers a GLib critical warning on every lookup miss.","fix":"Use g_clear_pointer (&keyfile, g_key_file_free) instead of the unconditional g_key_file_free (keyfile), matching the pattern used in gdm_session_is_wayland_session().","locations":[{"ref":"daemon/gdm-session.c:2773-2798","code":" 2773 | static gchar *\n 2774 | get_session_desktop_names (GdmSession *self)\n 2775 | {\n 2776 |         gchar *filename;\n 2777 |         GKeyFile *keyfile;\n 2778 |         gchar *desktop_names = NULL;\n 2779 | \n 2780 |         filename = g_strdup_printf (\"%s.desktop\", get_session_name (self));\n 2781 |         g_debug (\"GdmSession: getting desktop names for file '%s'\", filename);\n 2782 |         keyfile = load_key_file_for_file (self, filename, NULL, NULL);\n 2783 |         if (keyfile != NULL) {\n 2784 |               gchar **names;\n 2785 | \n 2786 |               names = g_key_file_get_string_list (keyfile, G_KEY_FILE_DESKTOP_GROUP,\n 2787 |                                                   \"DesktopNames\", NULL, NULL);\n 2788 |               if (names != NULL) {\n 2789 |                       desktop_names = g_strjoinv (\":\", names);\n 2790 | \n 2791 |                       g_strfreev (names);\n 2792 |               }\n 2793 |         }\n 2794 | \n 2795 |         g_key_file_free (keyfile);\n 2796 |         g_free (filename);\n 2797 |         return desktop_names;\n 2798 | }","lines":26,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L2773-2798"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"read_file_contents_to_array() builds a GPtrArray by directly assigning the public 'len' and 'pdata' struct fields after taking ownership of a raw GStrv from g_strsplit, bypassing the GPtrArray API entirely (no g_ptr_array_set_size, no g_ptr_array_add). This relies on internal GLib implementation details: the array's internal allocated-capacity bookkeeping (not exposed in the public struct) is never updated to match the spliced-in length, only happens to behave correctly because the very next g_ptr_array_add call (seen at the two call sites that mutate the returned array, e.g. ensure_dconf_configurable_system_profile and set_dconf_setting_lock_full) forces a realloc since GLib sees len > the stale/zero capacity it still believes the array has. This is fragile, undocumented behavior that could silently break (or read/write out of bounds) on a future GLib ABI change to GPtrArray's private layout.","fix":"Build the array using the public API (g_ptr_array_add or g_ptr_array_extend) instead of poking pdata/len directly, e.g. iterate the g_strsplit result and add each line to a properly constructed GPtrArray, or use g_ptr_array_new_take if available for the GLib version targeted.","locations":[{"ref":"utils/gdm-config.c:498-516","code":"  498 |         if (content) {\n  499 |                 char **lines = g_strsplit (content, \"\\n\", -1);\n  500 |                 int i;\n  501 | \n  502 |                 if (lines && *lines) {\n  503 |                         array->len = g_strv_length (lines) + 1;\n  504 |                         array->pdata = (gpointer *) g_steal_pointer (&lines);\n  505 |                 }\n  506 | \n  507 |                 /* Strip the trailing empty and NULL lines */\n  508 |                 for (i = array->len - 1; i >= 0; i--) {\n  509 |                         char *line = g_ptr_array_index (array, i);\n  510 | \n  511 |                         if (line && (g_ascii_isgraph (line[0]) || strlen (line) > 1))\n  512 |                                 break;\n  513 | \n  514 |                         g_ptr_array_remove_index (array, i);\n  515 |                 }\n  516 |         }","lines":19,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L498-516"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"negligible","easy":true,"description":"text_cb() allocates t = g_strndup(text, text_len), then in the matching branch immediately allocates a second copy via g_strdup(t), and finally frees t. This is a redundant double allocation/copy of every XML text node parsed from the settings schema file.","fix":"Assign the g_strndup() result directly to the destination field (info->entry->key = t;) in the matching branch instead of calling g_strdup(t) again, and only g_free(t) in the non-matching (discarded) case.","locations":[{"ref":"common/gdm-settings-utils.c:180-204","code":"  180 | static void\n  181 | text_cb (GMarkupParseContext *ctx,\n  182 |          const char          *text,\n  183 |          gsize                text_len,\n  184 |          gpointer             user_data,\n  185 |          GError             **error)\n  186 | {\n  187 |         ParserInfo *info;\n  188 |         char       *t;\n  189 | \n  190 |         info = (ParserInfo *) user_data;\n  191 | \n  192 |         t = g_strndup (text, text_len);\n  193 | \n  194 |         if (info->in_key) {\n  195 |                 info->entry->key = g_strdup (t);\n  196 |         } else if (info->in_signature) {\n  197 |                 info->entry->signature = g_strdup (t);\n  198 |         } else if (info->in_default) {\n  199 |                 info->entry->default_value = g_strdup (t);\n  200 |         }\n  201 | \n  202 |         g_free (t);\n  203 | \n  204 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-settings-utils.c#L180-204"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","easy":true,"description":"gdm_manager_handle_open_session() initializes `session = NULL` and then immediately tests `if (session == NULL)`, which is always true at that point - the branch can never be skipped, so the check is dead/misleading. It reads as if there were a prior code path that could set `session` before this point, but there isn't.","fix":"Drop the redundant `if (session == NULL)` guard and unconditionally do `session = get_user_session_for_display (display);` followed by the running-session check, or add a comment if the redundancy is intentionally defensive for future refactors.","locations":[{"ref":"daemon/gdm-manager.c:771-806","code":"  771 |         GdmSession       *session = NULL;\n  772 |         const char       *address;\n  773 |         GPid              pid = 0;\n  774 |         uid_t             uid = (uid_t) -1;\n  775 |         uid_t             allowed_user;\n  776 | \n  777 |         g_debug (\"GdmManager: trying to open new session\");\n  778 | \n  779 |         sender = g_dbus_method_invocation_get_sender (invocation);\n  780 |         connection = g_dbus_method_invocation_get_connection (invocation);\n  781 |         get_display_and_details_for_bus_sender (self, connection, sender, &display, NULL, NULL, NULL, &pid, &uid, NULL, NULL);\n  782 | \n  783 |         if (display == NULL) {\n  784 |                 g_dbus_method_invocation_return_error_literal (invocation,\n  785 |                                                                G_DBUS_ERROR,\n  786 |                                                                G_DBUS_ERROR_ACCESS_DENIED,\n  787 |                                                                _(\"No session available\"));\n  788 | \n  789 |                 return TRUE;\n  790 |         }\n  791 | \n  792 |         if (session == NULL) {\n  793 |                 session = get_user_session_for_display (display);\n  794 |                 g_debug (\"GdmSession: Considering session %s for username %s\",\n  795 |                          gdm_session_get_session_id (session),\n  796 |                          gdm_session_get_username (session));\n  797 | \n  798 |                 if (gdm_session_is_running (session)) {\n  799 |                         g_debug (\"GdmSession: the session is running, and therefore can't be used\");\n  800 |                         g_dbus_method_invocation_return_error_literal (invocation,\n  801 |                                                                        G_DBUS_ERROR,\n  802 |                                                                        G_DBUS_ERROR_ACCESS_D "Dead Code","severity":"low","easy":true,"description":"collect_sessions_from_directory has a stale '/* FIXME: add file monitor to directory */' comment, and the session cache (gdm_available_sessions_map / gdm_sessions_map_is_initialized) is populated exactly once and never invalidated or refreshed for the lifetime of the process. Any session .desktop files added, removed, or modified after the first call to gdm_get_session_ids()/gdm_get_session_name_and_description() are silently ignored for the remainder of the process's life, which is surprising for a long-lived consumer such as gnome-shell or the greeter.","fix":"Either implement the file monitor mentioned in the FIXME to invalidate the cache on changes, or document clearly that callers must restart/re-exec to see new sessions, and remove the stale FIXME if no monitor is planned.","locations":[{"ref":"libgdm/gdm-sessions.c:251","code":"  251 |         /* FIXME: add file monitor to directory */","lines":1,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/libgdm/gdm-sessions.c#L251"},{"ref":"libgdm/gdm-sessions.c:360-364","code":"  360 |         if (!gdm_sessions_map_is_initialized) {\n  361 |                 collect_sessions ();\n  362 | \n  363 |                 gdm_sessions_map_is_initialized = TRUE;\n  364 |         }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/libgdm/gdm-sessions.c#L360-364"},{"ref":"libgdm/gdm-sessions.c:398-402","code":"  398 |         if (!gdm_sessions_map_is_initialized) {\n  399 |                 collect_sessions ();\n  400 | \n  401 |                 gdm_sessions_map_is_initialized = TRUE;\n  402 |         }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/libgdm/gdm-sessions.c#L398-402"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","easy":true,"description":"gdm_settings_direct_shutdown() has an e ions.\n  611 |          *\n  612 |          * When in 'show' mode it should print in stdout one of these values:\n  613 |          *  - required\n  614 |          *  - enabled\n  615 |          *  - disabled\n  616 |          *  - command's option specific output\n  617 |          *\n  618 |          * However, we'll always double-check that the returned value matches\n  619 |          * the system settings.\n  620 |          *\n  621 |          * For example:\n  622 |          *  gdm-auth-config-foo show smartcard\n  623 |          *  > expected: enabled|disabled|required\n  624 |          *  gdm-auth-config-foo show smartcard removal-action\n  625 |          *  > expected: 'none|log-out|lock-screen'\n  626 |          *  gdm-auth-config-foo password disable\n  627 |          *  gdm-auth-config-foo smartcard require\n  628 |          *  > expected: exit status of 0 if done or 19 if we need to continue\n  629 |          */\n  630 | \n  631 |         if (DISTRO[0] == '\\0' || g_str_equal (DISTRO, \"none\")) {\n  632 |                 g_set_error (error, G_IO_ERROR, G_IO_ERROR_NOT_FOUND,\n  633 |                              _(\"No distro detected, no hook to run\"));\n  634 |                 return FALSE;\n  635 |         }\n  636 | \n  637 |         distro_hook = g_build_filename (LIBEXECDIR, \"gdm-auth-config-\" DISTRO, NULL);\n  638 |         g_debug (\"Looking for distro hook “%s”\", distro_hook);\n  639 | \n  640 |         if (!g_file_test (distro_hook, G_FILE_TEST_IS_REGULAR |\n  641 |                                        G_FILE_TEST_IS_EXECUTABLE)) {\n  642 |                 g_set_error (error, G_IO_ERROR, G_IO_ERROR_INVALID_DATA,\n  643 |                              \"%s is not an executable\", distro_hook);\n  644 |                 return FALSE;\n  645 |         }\n  646 | \n  647 |         call_args = build_distro_hook_arguments (distro_hook, config_command, command_args);\n  648 | \n  649 |         if (!call_args) {\n  650 |                 g_set_error ( usMethodInvocation      *invocation,\n 1239 |                             const char                 *user,\n 1240 |                             GdmLocalDisplayFactory     *factory)\n 1241 | {\n 1242 |         g_autoptr (GError) error = NULL;\n 1243 | \n 1244 |         if (!gdm_display_factory_on_user_display_creation (GDM_DISPLAY_FACTORY (factory),\n 1245 |                                                            user,\n 1246 |                                                            &error)) {\n 1247 |                 g_dbus_method_invocation_return_gerror (invocation, error);\n 1248 |                 return G_DBUS_METHOD_INVOCATION_HANDLED;\n 1249 |         }\n 1250 | \n 1251 |         if (!gdm_local_display_factory_create_display (factory,\n 1252 |                                                        user,\n 1253 |                                                        NULL,\n 1254 |                                                        &error)) {\n 1255 |                 g_dbus_method_invocation_return_gerror (invocation, error);\n 1256 |                 return G_DBUS_METHOD_INVOCATION_HANDLED;\n 1257 |         }\n 1258 | \n 1259 |         gdm_dbus_local_display_factory_complete_create_user_display (skeleton,\n 1260 |                                                                      invocation);\n 1261 | \n 1262 |         return G_DBUS_METHOD_INVOCATION_HANDLED;\n 1263 | }","lines":28,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-local-display-factory.c#L1236-1263"}]},{"id":"ARCH_4","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"gdm-manager.c is a single 2699-line file mixing several largely independent responsibilities: D-Bus method handlers for unprivileged callers (RegisterDisplay/RegisterSession/OpenSession/OpenReauthenticationChannel), the entire user-session lifecycle state machine (creation, start, reset, reauthentication, transient reauthentication channels), automatic-login/timed-login policy, plymouth boot-splash coordination, and display add/remove glue to the display store and D-Bus object manager. Each of these areas has its own signal handlers, helper functions, and bespoke per-object data attached via g_object_set_data with stringly-typed keys ('gdm-display', 'gdm-user-session', 'caller-pid', 'caller-session-id', 'reauth-pid-of-caller', 'start-when-ready', 'waiting-to-start', etc.), making the file hard to navigate and increasing the chance that a change to one area (e.g. reauthentication) accidentally affects unrelated state (e.g. automatic login) through shared object-data keys.","fix":"Consider splitting into focused units, e.g. a session-lifecycle helper (create/start/reset/migrate user sessions), a reauthentication-channel helper (transient session + open-reauthentication-channel handling), and keep gdm-manager.c focused on D-Bus dispatch and display add/remove wiring. Replacing the g_object_set_data string-keyed bag with typed fields (e.g. on a per-session or per-display context struct) would also reduce the risk of key collisions/typos.","locations":[{"ref":"daemon/gdm-manager.c:1-2699","code":"    1 | /* -*- Mode: C; tab-width: 8; indent-tabs-mode: nil; c-basic-offset: 8 -*-\n    2 |  *\n    3 |  * Copyright (C) 2007 William Jon McCann <mccann@jhu.edu>\n    4 |  *\n    5 |  * This program is free software; you can redistribute it and/or modify\n    6 |  * it under the terms of the GNU General Public License as published by\n    7 |  * the Free Software Foundation; either version 2 of the License, or\n    8 |  * (at your option) any later version.\n    9 |  *\n   10 |  * This program is distributed in the hope that it will be useful,\n   11 |  * but WITHOUT ANY WARRANTY; without even the implied warranty of\n   12 |  * MERCHANTABILITY or FITNESS FOR A PARTICULAR PURPOSE.  See the\n   13 |  * GNU General Public License for more details.\n   14 |  *\n   15 |  * You should have received a co
