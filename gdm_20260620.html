<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":false,"description":"pick_username() calls g_assert_not_reached() (which aborts the whole GDM daemon, killing every active session) if all GREETER_UID_COUNT (~128) username suffixes are already taken. Since CreateTransientDisplay/CreateUserDisplay D-Bus methods can be invoked repeatedly to allocate dynamic greeter/initial-setup users (each call goes through gdm_launch_environment_ensure_uid -> gdm_dynamic_user_store_create -> pick_username), a client authorized to call these methods (or a bug causing displays to leak without being torn down) can drive the number of live dynamic users up to the table size and crash the root display-manager daemon system-wide.","fix":"Return a GError (e.g. reuse GDM_DYNAMIC_USER_STORE_ERROR_NO_FREE_UID) instead of asserting; propagate the failure back through gdm_dynamic_user_store_create() instead of aborting the process.","locations":[{"ref":"daemon/gdm-dynamic-user-store.c:265-285","code":"  265 | static char *\n  266 | pick_username (GdmDynamicUserStore *store,\n  267 |                const char          *preferred)\n  268 | {\n  269 |         if (!g_hash_table_contains (store->by_name, preferred))\n  270 |                 return g_strdup (preferred);\n  271 | \n  272 |         for (size_t i = 2; i <= GREETER_UID_COUNT; i++) {\n  273 |                 g_autofree char *username = NULL;\n  274 | \n  275 |                 username = g_strdup_printf (\"%s-%lu\", preferred, i);\n  276 | \n  277 |                 if (!g_hash_table_contains (store->by_name, username))\n  278 |                         return g_steal_pointer (&username);\n  279 |         }\n  280 | \n  281 |         /* Reaching this should be impossible, because it means that we've\n  282 |          * already allocated more than GREETER_UID_COUNT users, which would\n  283 |          * be caught in pick_uid */\n  284 |         g_assert_not_reached ();\n  285 | }","lines":21,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-dynamic-user-store.c#L265-285"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"try_run_distro_hook ignores the return value of g_spawn_sync. gint exit_status is declared uninitialized on the stack; if g_spawn_sync itself fails (e.g. exec failure, ENOENT, fork failure) it returns FALSE and sets local_error but leaves exit_status untouched. The code only special-cases the success path (if (!local_error)), but the later g_warning at line 686 unconditionally calls WEXITSTATUS(exit_status) whenever local_error is set, including the g_spawn_sync-failure case, reading uninitialized stack memory and printing garbage / potentially misleading state to the admin.","fix":"Check the gboolean returned by g_spawn_sync before touching exit_status; only evaluate WEXITSTATUS when the spawn call itself succeeded. Initialize exit_status = 0 defensively.","locations":[{"ref":"utils/gdm-config.c:593","code":"  593 |         gint exit_status;","lines":1,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L593"},{"ref":"utils/gdm-config.c:658-659","code":"  658 |         g_spawn_sync (NULL, (GStrv) call_args->pdata, NULL, G_SPAWN_DEFAULT,\n  659 |                       NULL, NULL, &local_stdout, &local_stderr, &exit_status, &local_error);","lines":2,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L658-659"},{"ref":"utils/gdm-config.c:682-689","code":"  682 |         if (local_error) {\n  683 |                 g_warning (_(\"Distro hook failed with exit status %d and error %s:\\n\"\n  684 |                              \"Standard output:\\n%s\\n\"\n  685 |                              \"Error output:\\n%s\"),\n  686 |                            WEXITSTATUS (exit_status), local_error->message,\n  687 |                            local_stderr, local_stdout);\n  688 |                 g_propagate_error (error, g_steal_pointer (&local_error));\n  689 |                 return FALSE;","lines":8,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L682-689"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"medium","easy":true,"description":"udev_is_settled() calls g_strrstr (id_path, \"platform-simple-framebuffer\") where id_path comes directly from g_udev_device_get_property (device, \"ID_PATH\") with no NULL check. Not all enumerated DRM/card* devices are guaranteed to expose an ID_PATH udev property (e.g. virtual/simple-framebuffer devices during early boot, before udev has fully populated properties). g_strrstr does not tolerate a NULL haystack, so this can crash gdm with a NULL pointer dereference / assertion failure when iterating devices during the udev settle-check, which runs on every display-creation attempt at boot and on every uevent.","fix":"Guard the call: if (id_path != NULL && g_strrstr (id_path, \"platform-simple-framebuffer\") != NULL) { ... }, treating a missing ID_PATH the same as a non-matching one.","locations":[{"ref":"daemon/gdm-local-display-factory.c:428-436","code":"  428 |                 const gchar *id_path = g_udev_device_get_property (device, \"ID_PATH\");\n  429 |                 g_autoptr (GUdevDevice) platform_device = NULL;\n  430 |                 g_autoptr (GUdevDevice) pci_device = NULL;\n  431 |                 g_autoptr (GUdevDevice) drm_device = NULL;\n  432 | \n  433 |                 if (g_strrstr (id_path, \"platform-simple-framebuffer\") != NULL) {\n  434 |                         node = next_node;\n  435 |                         continue;\n  436 |                 }","lines":9,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-local-display-factory.c#L428-436"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","easy":true,"description":"GdmSettingsDesktopBackend uses g_timeout_add_seconds() to schedule a deferred save (queue_save -> save_id). gdm_settings_desktop_backend_finalize() calls save_settings() directly and frees the object's key_file/filename, but never calls g_source_remove(backend->save_id) to cancel a pending timeout. If the object is finalized while a save is still queued (dirty was set and the 5s timer hasn't fired yet), the GSource fires later and invokes save_settings_timer() with a dangling 'backend' pointer, dereferencing freed memory.","fix":"In gdm_settings_desktop_backend_finalize(), before freeing anything, do: if (backend->save_id != 0) { g_source_remove (backend->save_id); backend->save_id = 0; } and only then call save_settings().","locations":[{"ref":"common/gdm-settings-desktop-backend.c:368-383","code":"  368 | static void\n  369 | gdm_settings_desktop_backend_finalize (GObject *object)\n  370 | {\n  371 |         GdmSettingsDesktopBackend *backend;\n  372 | \n  373 |         g_return_if_fail (object != NULL);\n  374 |         g_return_if_fail (GDM_IS_SETTINGS_DESKTOP_BACKEND (object));\n  375 | \n  376 |         backend = GDM_SETTINGS_DESKTOP_BACKEND (object);\n  377 | \n  378 |         save_settings (backend);\n  379 |         g_key_file_free (backend->key_file);\n  380 |         g_free (backend->filename);\n  381 | \n  382 |         G_OBJECT_CLASS (gdm_settings_desktop_backend_parent_class)->finalize (object);\n  383 | }","lines":16,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-settings-desktop-backend.c#L368-383"},{"ref":"common/gdm-settings-desktop-backend.c:278-299","code":"  278 | static gboolean\n  279 | save_settings_timer (GdmSettingsDesktopBackend *backend)\n  280 | {\n  281 |         save_settings (backend);\n  282 |         backend->save_id = 0;\n  283 |         return FALSE;\n  284 | }\n  285 | \n  286 | static void\n  287 | queue_save (GdmSettingsDesktopBackend *backend)\n  288 | {\n  289 |         if (! backend->dirty) {\n  290 |                 return;\n  291 |         }\n  292 | \n  293 |         if (backend->save_id != 0) {\n  294 |                 /* already pending */\n  295 |                 return;\n  296 |         }\n  297 | \n  298 |         backend->save_id = g_timeout_add_seconds (5, (GSourceFunc)save_settings_timer, backend);\n  299 | }","lines":22,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-settings-desktop-backend.c#L278-299"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"high","easy":true,"description":"worker_context_free() closes the cancellable's fd with g_close() directly instead of g_cancellable_release_fd(). GLib's g_cancellable_get_fd() documentation requires the fd to be released with g_cancellable_release_fd(), which decrements an internal fd-refcount in the GCancellable. Bypassing that with a raw close()/g_close() leaves the GCancellable's internal bookkeeping inconsistent, which can trigger g_critical assertions or a double-close if the GCancellable's fd is requested again or the cancellable is later disposed.","fix":"Call g_cancellable_release_fd (g_weak_ref... ) appropriately - i.e. keep a reference to the GCancellable in WorkerContext and call g_cancellable_release_fd(cancellable) instead of g_close(ctx->cancel_fd, NULL).","locations":[{"ref":"daemon/gdm-dynamic-user-store.c:153-159","code":"  153 | static void\n  154 | worker_context_free (WorkerContext *ctx)\n  155 | {\n  156 |         g_weak_ref_clear (&ctx->store);\n  157 |         g_close (ctx->cancel_fd, NULL);\n  158 |         g_free (ctx);\n  159 | }","lines":7,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-dynamic-user-store.c#L153-159"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"gdm_session_auditor_set_username() overwrites priv->username with a new g_strdup() without freeing the previous value first, when the username actually changes (old != NULL, new != NULL, and they differ). Every reauthentication / username change leaks the prior string in this long-lived security daemon helper.","fix":"Use g_free(priv->username) before assigning, or use g_set_str()/g_clear_pointer(&priv->username, g_free) followed by g_strdup(), e.g. g_free(priv->username); priv->username = g_strdup(username);","locations":[{"ref":"daemon/gdm-session-auditor.c:132-151","code":"  132 | void\n  133 | gdm_session_auditor_set_username (GdmSessionAuditor *auditor,\n  134 |                                   const char        *username)\n  135 | {\n  136 |         GdmSessionAuditorPrivate *priv;\n  137 | \n  138 |         g_return_if_fail (GDM_IS_SESSION_AUDITOR (auditor));\n  139 | \n  140 |         priv = gdm_session_auditor_get_instance_private (auditor);\n  141 | \n  142 |         if (username == priv->username) {\n  143 |                 return;\n  144 |         }\n  145 | \n  146 |         if ((username == NULL || priv->username == NULL) ||\n  147 |             strcmp (username, priv->username) != 0) {\n  148 |                 priv->username = g_strdup (username);\n  149 |                 g_object_notify (G_OBJECT (auditor), \"username\");\n  150 |         }\n  151 | }","lines":20,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-auditor.c#L132-151"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"gdm_session_settings_set_language_name(), gdm_session_settings_set_session_name(), and gdm_session_settings_set_session_type() all assign settings->{language_name,session_name,session_type} = g_strdup(...) without freeing the previous value, leaking the old string on every change.","fix":"g_free() the existing field (or use g_set_str()) before assigning the new g_strdup() result in all three setters.","locations":[{"ref":"daemon/gdm-session-settings.c:141-178","code":"  141 | void\n  142 | gdm_session_settings_set_language_name (GdmSessionSettings *settings,\n  143 |                                         const char         *language_name)\n  144 | {\n  145 |         g_return_if_fail (GDM_IS_SESSION_SETTINGS (settings));\n  146 | \n  147 |         if (settings->language_name == NULL ||\n  148 |             strcmp (settings->language_name, language_name) != 0) {\n  149 |                 settings->language_name = g_strdup (language_name);\n  150 |                 g_object_notify (G_OBJECT (settings), \"language-name\");\n  151 |         }\n  152 | }\n  153 | \n  154 | void\n  155 | gdm_session_settings_set_session_name (GdmSessionSettings *settings,\n  156 |                                        const char         *session_name)\n  157 | {\n  158 |         g_return_if_fail (GDM_IS_SESSION_SETTINGS (settings));\n  159 | \n  160 |         if (settings->session_name == NULL ||\n  161 |             strcmp (settings->session_name, session_name) != 0) {\n  162 |                 settings->session_name = g_strdup (session_name);\n  163 |                 g_object_notify (G_OBJECT (settings), \"session-name\");\n  164 |         }\n  165 | }\n  166 | \n  167 | void\n  168 | gdm_session_settings_set_session_type (GdmSessionSettings *settings,\n  169 |                                        const char         *session_type)\n  170 | {\n  171 |         g_return_if_fail (GDM_IS_SESSION_SETTINGS (settings));\n  172 | \n  173 |         if (settings->session_type == NULL ||\n  174 |             g_strcmp0 (settings->session_type, session_type) != 0) {\n  175 |                 settings->session_type = g_strdup (session_type);\n  176 |                 g_object_notify (G_OBJECT (settings), \"session-type\");\n  177 |         }\n  178 | }","lines":38,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-settings.c#L141-178"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"reauthentication_request_new() calls gdm_session_worker_get_environment(worker), which wraps pam_getenvlist() and returns a freshly malloc'd NULL-terminated array of malloc'd strings (caller-owned per the PAM API contract). The local `environment` pointer is passed into gdm_session_new() (which stores/copies it into the 'conversation-environment' GObject property) but is never freed. This leaks the entire PAM environment block (array + every string) on every reauthentication request handled by this long-running root daemon (gdm_session_worker_handle_start_reauthentication is reachable repeatedly, e.g. from screen-lock/polkit reauth flows).","fix":"After gdm_session_new() returns, free the malloc'd envp array and its strings, e.g. `g_strfreev ((char **) environment);` (pam_getenvlist's array/strings are malloc'd, which is ABI-compatible with free()/g_strfreev() since g_strfreev uses g_free on each entry then the array - or explicitly loop with free() to be strictly correct with malloc'd memory).","locations":[{"ref":"daemon/gdm-session-worker.c:3041-3057","code":" 3041 |         const char * const * environment;\n 3042 |         const char *address;\n 3043 | \n 3044 |         environment = gdm_session_worker_get_environment (worker);\n 3045 | \n 3046 |         request = g_slice_new (ReauthenticationRequest);\n 3047 | \n 3048 |         request->worker = worker;\n 3049 |         request->pid_of_caller = pid_of_caller;\n 3050 |         request->uid_of_caller = uid_of_caller;\n 3051 |         request->session = gdm_session_new (GDM_SESSION_VERIFICATION_MODE_REAUTHENTICATE,\n 3052 |                                             uid_of_caller,\n 3053 |                                             worker->hostname,\n 3054 |                                             worker->display_device,\n 3055 |                                             worker->display_seat_id,\n 3056 |                                             worker->display_is_local,\n 3057 |                                             environment);","lines":17,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker.c#L3041-3057"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In on_opened(), the session_id out-parameter returned by gdm_dbus_worker_call_open_finish() is duplicated into conversation->session_id and self->session_opened via g_strdup/g_set_str, but the original session_id string itself is never freed. Leaks on every successful session open (one per login).","fix":"Add g_free (session_id) (or wrap with g_autofree) after it has been copied, on the success path of on_opened().","locations":[{"ref":"daemon/gdm-session.c:954-1009","code":"  954 | static void\n  955 | on_opened (GdmDBusWorker *worker,\n  956 |            GAsyncResult  *res,\n  957 |            gpointer       user_data)\n  958 | {\n  959 |         GdmSessionConversation *conversation = user_data;\n  960 |         GdmSession *self;\n  961 |         char *service_name;\n  962 | \n  963 |         GError *error = NULL;\n  964 |         gboolean worked;\n  965 |         char *session_id;\n  966 | \n  967 |         worked = gdm_dbus_worker_call_open_finish (worker,\n  968 |                                                    &session_id,\n  969 |                                                    res,\n  970 |                                                    &error);\n  971 | \n  972 |         if (g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CLOSED) ||\n  973 |             g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED))\n  974 |                 return;\n  975 | \n  976 |         self = conversation->session;\n  977 |         service_name = conversation->service_name;\n  978 | \n  979 |         if (worked) {\n  980 |                 g_clear_pointer (&conversation->session_id,\n  981 |                                  (GDestroyNotify) g_free);\n  982 | \n  983 |                 conversation->session_id = g_strdup (session_id);\n  984 | \n  985 |                 g_set_str (&self->session_opened, session_id);\n  986 | \n  987 |                 if (self->user_verifier_interface != NULL) {\n  988 |                         gdm_dbus_user_verifier_emit_verification_complete (self->user_verifier_interface,\n  989 |                                                                            service_name);\n  990 |                         g_signal_emit (self, signals[VERIFICATION_COMPLETE], 0, service_name);\n  991 |                 }\n  992 | \n  993 |                 if (self->greeter_interface != NULL) {\n  994 |                         gdm_dbus_greeter_emit_session_opened (self->greeter_interface,\n  995 |                                                               service_name,\n  996 |                                                               session_id);\n  997 |                 }\n  998 | \n  999 |                 g_debug (\"GdmSession: Emitting 'session-opened' signal\");\n 1000 |                 g_signal_emit (self, signals[SESSION_OPENED], 0, service_name, session_id);\n 1001 | \n 1002 |                 self->is_opened = TRUE;\n 1003 |         } else {\n 1004 |                 report_and_stop_conversation (self, service_name, error);\n 1005 | \n 1006 |                 g_debug (\"GdmSession: Emitting 'session-start-failed' signal\");\n 1007 |                 g_signal_emit (self, signals[SESSION_OPENED_FAILED], 0, service_name, error->message);\n 1008 |         }\n 1009 | }","lines":56,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L954-1009"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In on_opened(), the failure branch uses error (via report_and_stop_conversation and error->message) but never calls g_error_free(error), unlike the analogous on_initialization_complete_cb() which does free its error. Leaks a GError on every failed session-open.","fix":"Call g_error_free (error) after the SESSION_OPENED_FAILED signal emission, or switch to g_autoptr(GError).","locations":[{"ref":"daemon/gdm-session.c:1003-1008","code":" 1003 |         } else {\n 1004 |                 report_and_stop_conversation (self, service_name, error);\n 1005 | \n 1006 |                 g_debug (\"GdmSession: Emitting 'session-start-failed' signal\");\n 1007 |                 g_signal_emit (self, signals[SESSION_OPENED_FAILED], 0, service_name, error->message);\n 1008 |         }","lines":6,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L1003-1008"}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"worker_on_username_changed() calls gdm_session_select_user (self, g_strdup (username)) when username is non-empty, but gdm_session_select_user() itself does g_strdup (text) internally to store self->selected_user. The g_strdup() result passed in by worker_on_username_changed is therefore never freed -- it is only used as a transient 'const char *' argument and immediately leaked. Triggered on every PAM username-changed event.","fix":"Pass username directly (gdm_session_select_user (self, (strlen (username) > 0) ? username : NULL);) without the extra g_strdup, since gdm_session_select_user already duplicates the string.","locations":[{"ref":"daemon/gdm-session.c:1011-1024","code":" 1011 | static void\n 1012 | worker_on_username_changed (GdmDBusWorker          *worker,\n 1013 |                             const char             *username,\n 1014 |                             GdmSessionConversation *conversation)\n 1015 | {\n 1016 |         GdmSession *self = conversation->session;\n 1017 | \n 1018 |         g_debug (\"GdmSession: changing username from '%s' to '%s'\",\n 1019 |                  self->selected_user != NULL ? self->selected_user : \"<unset>\",\n 1020 |                  (strlen (username)) ? username : \"<unset>\");\n 1021 | \n 1022 |         gdm_session_select_user (self, (strlen (username) > 0) ? g_strdup (username) : NULL);\n 1023 |         gdm_session_defaults_changed (self);\n 1024 | }","lines":14,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L1011-1024"}]},{"id":"MEM_8","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":true,"description":"In on_reauthentication_started_cb(), the address out-parameter returned by gdm_dbus_worker_call_start_reauthentication_finish() is used directly in the REAUTHENTICATION_STARTED signal emission but is never freed on the success path. Also, on the failure path (worked == FALSE, not CLOSED/CANCELLED), error is never freed at all.","fix":"g_free (address) after the signal emission on success; add an else branch (or g_autoptr(GError)) that frees error on failure.","locations":[{"ref":"daemon/gdm-session.c:1047-1077","code":" 1047 | static void\n 1048 | on_reauthentication_started_cb (GdmDBusWorker *worker,\n 1049 |                                 GAsyncResult  *res,\n 1050 |                                 gpointer       user_data)\n 1051 | {\n 1052 |         GdmSessionConversation *conversation = user_data;\n 1053 |         GdmSession *self;\n 1054 | \n 1055 |         GError *error = NULL;\n 1056 |         gboolean worked;\n 1057 |         char *address;\n 1058 | \n 1059 |         worked = gdm_dbus_worker_call_start_reauthentication_finish (worker,\n 1060 |                                                                      &address,\n 1061 |                                                                      res,\n 1062 |                                                                      &error);\n 1063 | \n 1064 |         if (g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CLOSED) ||\n 1065 |             g_error_matches (error, G_IO_ERROR, G_IO_ERROR_CANCELLED))\n 1066 |                 return;\n 1067 | \n 1068 |         self = conversation->session;\n 1069 | \n 1070 |         if (worked) {\n 1071 |                 GPid pid_of_caller = conversation->reauth_pid_of_caller;\n 1072 |                 g_debug (\"GdmSession: Emitting 'reauthentication-started' signal for caller pid '%d'\", pid_of_caller);\n 1073 |                 g_signal_emit (self, signals[REAUTHENTICATION_STARTED], 0, pid_of_caller, address);\n 1074 |         }\n 1075 | \n 1076 |         conversation->reauth_pid_of_caller = 0;\n 1077 | }","lines":31,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session.c#L1047-1077"}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"session_worker_job_setup_journal_fds() opens journal stream fds (out, err) via sd_journal_stream_fd() and dup2()s them onto fd 1 and 2, but never closes the original `out`/`err` descriptors after the dup2 calls. Since this runs in the forked child's setup function right before exec, and GLib does not close arbitrary extra fds on spawn, these duplicate journal fds leak into (are inherited by) the exec'd gdm-session-worker process.","fix":"After the dup2() calls succeed, close(out) and close(err) (when they differ from 1/2) so they aren't inherited by the exec'd process.","locations":[{"ref":"daemon/gdm-session-worker-job.c:87-111","code":"   87 | static void\n   88 | session_worker_job_setup_journal_fds (void)\n   89 | {\n   90 | #ifdef ENABLE_SYSTEMD_JOURNAL\n   91 |         if (sd_booted () > 0) {\n   92 |                 const char *identifier = \"gdm-session-worker\";\n   93 |                 int out, err;\n   94 | \n   95 |                 out = sd_journal_stream_fd (identifier, LOG_INFO, FALSE);\n   96 |                 if (out < 0)\n   97 |                         return;\n   98 | \n   99 |                 err = sd_journal_stream_fd (identifier, LOG_WARNING, FALSE);\n  100 |                 if (err < 0) {\n  101 |                         close (out);\n  102 |                         return;\n  103 |                 }\n  104 | \n  105 |                 VE_IGNORE_EINTR (dup2 (out, 1));\n  106 |                 VE_IGNORE_EINTR (dup2 (err, 2));\n  107 |                 return;\n  108 |         }\n  109 | #endif\n  110 |         return;\n  111 | }","lines":25,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker-job.c#L87-111"}]},{"id":"MEM_10","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"In prepare_auth_file(), if gdm_generate_random_bytes() sets `error` (e.g. failure to read random bytes), the code does `goto out` but never frees `error` (no g_clear_error/g_error_free call before returning). The GError is leaked.","fix":"Add g_clear_error(&error) in the `out:` cleanup block of prepare_auth_file(), mirroring the pattern used in spawn_x_server()/spawn_bus().","locations":[{"ref":"daemon/gdm-x-session.c:141-145","code":"  141 |         auth_entry.data = gdm_generate_random_bytes (auth_entry.data_length, &error);\n  142 | \n  143 |         if (error != NULL) {\n  144 |                 goto out;\n  145 |         }","lines":5,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-x-session.c#L141-145"},{"ref":"daemon/gdm-x-session.c:158-166","code":"  158 | out:\n  159 |         g_clear_pointer (&auth_entry.data, g_free);\n  160 |         g_clear_pointer (&fp, fclose);\n  161 | \n  162 |         if (!prepared) {\n  163 |                 g_clear_pointer (&filename, g_free);\n  164 |         }\n  165 | \n  166 |         return filename;","lines":9,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-x-session.c#L158-166"}]},{"id":"MEM_11","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":true,"description":"handle_show() temporarily overrides the DCONF_PROFILE environment variable for the duration of the function (g_setenv) and only restores it afterward 'if (default_dconf_profile)' is non-NULL. When DCONF_PROFILE was originally unset (the common case), default_dconf_profile is NULL, the restoring branch is skipped, and DCONF_PROFILE is left permanently set to GDM_DCONF_PROFILE for the remainder of the process (and for any child processes spawned afterward, e.g. via try_run_distro_hook in subsequent commands, or the verbose re-invocation of handle_show at the end of handle_command).","fix":"Add an else branch that calls g_unsetenv (\"DCONF_PROFILE\") when default_dconf_profile is NULL, to fully restore the prior (unset) state.","locations":[{"ref":"utils/gdm-config.c:1850-1851","code":" 1850 |         default_dconf_profile = g_strdup (g_getenv (\"DCONF_PROFILE\"));\n 1851 |         g_setenv (\"DCONF_PROFILE\", GDM_DCONF_PROFILE, TRUE);","lines":2,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L1850-1851"},{"ref":"utils/gdm-config.c:1867-1868","code":" 1867 |         if (default_dconf_profile)\n 1868 |                 g_setenv (\"DCONF_PROFILE\", default_dconf_profile, TRUE);","lines":2,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L1867-1868"}]},{"id":"MEM_12","type":"memory_leak","type_label":"Memory Leak","severity":"negligible","easy":true,"description":"toggle_smartcard_settings() calls g_variant_ref_sink(value) on its first use (passing the result into write_locked_setting_to_db for the GDM_CONFIG_DCONF_DB_NAME database) but never stores or releases that extra reference; the original floating GVariant created in handle_smartcard_options (g_variant_new_string) is then reused as-is in the second call to write_locked_system_settings_to_db. Every internal write_dconf_setting_to_key_file call takes its own ref via g_autoptr and releases it, but the explicit sink at toggle_smartcard_settings's first call site is never balanced by a matching unref, leaking one GVariant reference per 'gdm-config smartcard --removal-action=...' invocation.","fix":"Use a g_autoptr(GVariant) for the locally-sunk value (or call g_variant_unref after the first write_locked_setting_to_db call) so the extra ref taken by g_variant_ref_sink is released.","locations":[{"ref":"utils/gdm-config.c:1697-1710","code":" 1697 |         if (!write_locked_setting_to_db (GDM_CONFIG_DCONF_DB_NAME,\n 1698 |                                          GSD_SC_SCHEMA,\n 1699 |                                          key,\n 1700 |                                          value ? g_variant_ref_sink (value) : NULL,\n 1701 |                                          &local_error)) {\n 1702 |                 g_debug (\"Failed to write setting to %s database: %s\",\n 1703 |                          GDM_CONFIG_DCONF_DB_NAME,\n 1704 |                          local_error->message);\n 1705 |         }\n 1706 | \n 1707 |         return write_locked_system_settings_to_db (GSD_SC_SCHEMA,\n 1708 |                                                    key,\n 1709 |                                                    value,\n 1710 |                                                    error);","lines":14,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/utils/gdm-config.c#L1697-1710"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"critical","easy":false,"description":"pam_sm_authenticate() reads a NUL-separated password list returned by keyctl_read_alloc() and walks it with strlen(last_cached_password) to find the last entry. keyctl_read_alloc() returns raw kernel key payload bytes with no guarantee the buffer is NUL-terminated. If the final segment in the buffer is not NUL-terminated (corrupt/crafted key payload, or any payload that doesn't end in NUL), strlen() reads past the end of the allocated buffer (an out-of-bounds read), and the over-read data is then passed to pam_set_item(pamh, PAM_AUTHTOK, ...) as the user's authentication token. This runs inside a PAM module that gdm loads as part of authentication.","fix":"Before treating the buffer as a sequence of C strings, verify cached_passwords_length > 0 and that the last byte of the buffer is '\\0' (or use memchr-based bounded scanning that never reads past cached_passwords_length). Reject/bail out (return PAM_AUTHINFO_UNAVAIL) if the payload is not well-formed NUL-terminated data.","locations":[{"ref":"pam_gdm/pam_gdm.c:67-73","code":"   67 |         last_cached_password = cached_passwords;\n   68 |         for (i = 0; i < cached_passwords_length; i++) {\n   69 |                 last_cached_password = ((char *) cached_passwords) + i;\n   70 |                 i += strlen (last_cached_password);\n   71 |         }\n   72 | \n   73 |         r = pam_set_item (pamh, PAM_AUTHTOK, last_cached_password);","lines":7,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/pam_gdm/pam_gdm.c#L67-73"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","easy":true,"description":"In on_info_query() and on_secret_info_query(), if fgets() returns NULL (e.g. stdin closed/EOF), the code only warns ('Couldn't get an answer') but still proceeds to execute answer[strlen(answer) - 1] = '\\0'. Since answer was pre-set to \"\" before the fgets call, strlen(answer) is 0, so strlen(answer)-1 underflows to SIZE_MAX, causing an out-of-bounds write far outside the 1024-byte stack buffer (undefined behavior / potential stack corruption).","fix":"After checking `res == NULL`, return/skip the strlen()-1 indexing (e.g. `if (res == NULL) { ...; return; }`) instead of falling through to the unconditional answer[strlen(answer)-1] write.","locations":[{"ref":"daemon/test-session-client.c:67-92","code":"   67 |         char  answer[1024];\n   68 |         char *res;\n   69 | \n   70 |         g_print (\"%s \", query_text);\n   71 | \n   72 |         answer[0] = '\\0';\n   73 |         res = fgets (answer, sizeof (answer), stdin);\n   74 |         if (res == NULL) {\n   75 |                 g_warning (\"Couldn't get an answer\");\n   76 |         }\n   77 | \n   78 |         answer[strlen (answer) - 1] = '\\0';\n   79 | \n   80 |         if (answer[0] == '\\0') {\n   81 |                 gdm_dbus_user_verifier_call_cancel_sync (user_verifier,\n   82 |                                                    NULL,\n   83 |                                                    NULL);\n   84 |                 g_main_loop_quit (loop);\n   85 |         } else {\n   86 |                 gdm_dbus_user_verifier_call_answer_query_sync (user_verifier,\n   87 |                                                          service_name,\n   88 |                                                          answer,\n   89 |                                                          NULL,\n   90 |                                                          NULL);\n   91 |         }\n   92 | }","lines":26,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/test-session-client.c#L67-92"},{"ref":"daemon/test-session-client.c:111-147","code":"  111 | on_secret_info_query (GdmDBusUserVerifier *user_verifier,\n  112 |                       const char          *service_name,\n  113 |                       const char          *query_text)\n  114 | {\n  115 |         char           answer[1024];\n  116 |         char          *res;\n  117 |         struct termios ts0;\n  118 |         struct termios ts1;\n  119 | \n  120 |         tcgetattr (fileno (stdin), &ts0);\n  121 |         ts1 = ts0;\n  122 |         ts1.c_lflag &= ~ECHO;\n  123 | \n  124 |         g_print (\"%s\", query_text);\n  125 | \n  126 |         if (tcsetattr (fileno vileged worker or, depending on stack contents, be leveraged for memory corruption.","fix":"Initialize `passwd_entry = NULL;` and check the boolean return of gdm_get_pwent_for_name(); if it fails, set error_code = PAM_USER_UNKNOWN (or similar), set *error, and bail out via `goto out` before forking, instead of proceeding to fork and dereference a possibly-uninitialized pointer as root.","locations":[{"ref":"daemon/gdm-session-worker.c:1964-1968","code":" 1964 |         struct passwd *passwd_entry;\n 1965 |         pid_t session_pid;\n 1966 |         int   error_code;\n 1967 | \n 1968 |         gdm_get_pwent_for_name (worker->username, &passwd_entry);","lines":5,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker.c#L1964-1968"},{"ref":"daemon/gdm-session-worker.c:2039-2044","code":" 2039 | #ifdef HAVE_LOGINCAP\n 2040 |                 if (setusercontext (NULL, passwd_entry, passwd_entry->pw_uid, LOGIN_SETALL) < 0) {\n 2041 |                         g_debug (\"GdmSessionWorker: setusercontext() failed for user %s: %s\",\n 2042 |                                  passwd_entry->pw_name, g_strerror (errno));\n 2043 |                         _exit (EXIT_FAILURE);\n 2044 |                 }","lines":6,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker.c#L2039-2044"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"gdm_ensure_dir() always creates the target directory (and any missing parent directories) with g_mkdir_with_parents(path, 0755), regardless of the caller-supplied 'mode' argument, and only chmod()s the leaf directory to the real 'mode' afterward. Real callers pass restrictive modes such as 0700 for per-user home/config/state/environment directories (see daemon/gdm-dynamic-user-store.c:328 and daemon/gdm-launch-environment.c:217,224,383,387). Between mkdir and the final chmod/chown, the directory (and any newly created parent directories) exists world-readable/world-executable (mode 0755 minus umask), creating a TOCTOU race window where any local user can traverse into and read the contents of what is supposed to be a private 0700 directory before permissions are tightened.","fix":"Create the leaf directory with the final restrictive mode from the start (e.g. g_mkdir(path, mode) after ensuring parents exist with a restrictive umask, or call umask(0077) around mkdir_with_parents for the private-dir case), so the directory is never briefly world-accessible. At minimum, chmod parent directories created by g_mkdir_with_parents too, not just the leaf.","locations":[{"ref":"common/gdm-file-utils.c:116-164","code":"  116 | gboolean\n  117 | gdm_ensure_dir (const char  *path,\n  118 |                 uid_t        uid,\n  119 |                 gid_t        gid,\n  120 |                 mode_t       mode,\n  121 |                 gboolean     recursive_chown,\n  122 |                 GError     **error)\n  123 | {\n  124 |         if (g_mkdir_with_parents (path, 0755) < 0) {\n  125 |                 int errsv = errno;\n  126 |                 g_set_error (error,\n  127 |                              G_IO_ERROR,\n  128 |                              g_io_error_from_errno (errsv),\n  129 |                              \"Failed to create directory '%s': %s\",\n  130 |                              path,\n  131 |                              g_strerror (errsv));\n  132 |                 return FALSE;\n  133 |         }\n  134 | \n  135 |         if (recursive_chown) {\n  136 |                 g_autoptr (GFile) gio_dir = g_file_new_for_path (path);\n  137 |                 if (!gdm_chown_recursively (gio_dir, uid, gid, error))\n  138 |                         return FALSE;\n  139 |         } else {\n  140 |                 if (chown (path, uid, gid) < 0) {\n  141 |                         int errsv = errno;\n  142 |                         g_set_error (error,\n  143 |                                      G_IO_ERROR,\n  144 |                                      g_io_error_from_errno (errsv),\n  145 |                                      \"Failed to chown directory '%s': %s\",\n  146 |                                      path,\n  147 |                                      g_strerror (errsv));\n  148 |                         return FALSE;\n  149 |                 }\n  150 |         }\n  151 | \n  152 |         if (chmod (path, mode) < 0) {\n  153 |                 int errsv = errno;\n  154 |                 g_set_error (error,\n  155 |                              G_IO_ERROR,\n  156 |                              g_io_error_from_errno (errsv),\n  157 |                              \"Failed to chmod directory '%s': %s\",\n  158 |                              path,\n  159 |                              g_strerror (errsv));\n  160 |                 return FALSE;\n  161 |         }\n  162 | \n  163 |         return TRUE;\n  164 | }","lines":49,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/common/gdm-file-utils.c#L116-164"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In gdm_manager_handle_open_session(), after `session = get_user_session_for_display (display)`, the code immediately calls `gdm_session_get_session_id (session)` and `gdm_session_get_username (session)` in a g_debug call, then `gdm_session_is_running (session)`, all without a NULL check on `session`. get_user_session_for_display() can legitimately return NULL (display exists but has no 'gdm-user-session' data set yet, e.g. very early in a display's lifecycle). This handler is reachable from any local D-Bus peer that has a session associated with a tracked GdmDisplay, so a caller can trigger this path by calling OpenSession before a session is attached to their display, leading to NULL being passed into gdm_session_get_session_id/get_username/is_running.","fix":"Add an explicit `if (session == NULL) { return error 'No session available'; }` check immediately after the `get_user_session_for_display()` call, before logging or calling gdm_session_is_running().","locations":[{"ref":"daemon/gdm-manager.c:792-806","code":"  792 |         if (session == NULL) {\n  793 |                 session = get_user_session_for_display (display);\n  794 |                 g_debug (\"GdmSession: Considering session %s for username %s\",\n  795 |                          gdm_session_get_session_id (session),\n  796 |                          gdm_session_get_username (session));\n  797 | \n  798 |                 if (gdm_session_is_running (session)) {\n  799 |                         g_debug (\"GdmSession: the session is running, and therefore can't be used\");\n  800 |                         g_dbus_method_invocation_return_error_literal (invocation,\n  801 |                                                                        G_DBUS_ERROR,\n  802 |                                                                        G_DBUS_ERROR_ACCESS_DENIED,\n  803 |                                                                        _(\"Can only be called before user is logged in\"));\n  804 |                         return TRUE;\n  805 |                 }\n  806 |         }","lines":15,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-manager.c#L792-806"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"gdm_session_worker_job_spawn() calls g_child_watch_add(session_worker_job->pid, ...) unconditionally, even when g_spawn_async_with_pipes() returns FALSE (ret == FALSE, error set). On failure, GLib's g_spawn_async_with_pipes() does not guarantee a valid child pid is written to the out-pid argument, so child_watch_add can be registered against garbage/uninitialized pid (job->pid is only initialized to -1 once in _init(), and a failed spawn does not reset it), potentially watching an unrelated or invalid process ID.","fix":"Only call g_child_watch_add() when ret is TRUE; on failure (ret == FALSE) return FALSE without registering a watch, and leave session_worker_job->pid at its previous value.","locations":[{"ref":"daemon/gdm-session-worker-job.c:266-290","code":"  266 |         ret = g_spawn_async_with_pipes (NULL,\n  267 |                                         (char **) args->pdata,\n  268 |                                         (char **)env->pdata,\n  269 |                                         G_SPAWN_SEARCH_PATH | G_SPAWN_DO_NOT_REAP_CHILD | G_SPAWN_FILE_AND_ARGV_ZERO,\n  270 |                                         (GSpawnChildSetupFunc)session_worker_job_child_setup,\n  271 |                                         session_worker_job,\n  272 |                                         &session_worker_job->pid,\n  273 |                                         NULL,\n  274 |                                         NULL,\n  275 |                                         NULL,\n  276 |                                         &error);\n  277 | \n  278 |         if (! ret) {\n  279 |                 g_warning (\"Could not start command '%s': %s\",\n  280 |                            session_worker_job->command,\n  281 |                            error->message);\n  282 |         } else {\n  283 |                 g_debug (\"GdmSessionWorkerJob: : SessionWorkerJob on pid %d\", (int)session_worker_job->pid);\n  284 |         }\n  285 | \n  286 |         session_worker_job->child_watch_id = g_child_watch_add (session_worker_job->pid,\n  287 |                                                                 (GChildWatchFunc)session_worker_job_child_watch,\n  288 |                                                                 session_worker_job);\n  289 | \n  290 |         return ret;","lines":25,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker-job.c#L266-290"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"gdm_session_worker_handle_start_program() calls validate_state_change() but discards its boolean return value. validate_state_change() already sends an error reply on `invocation` (via g_dbus_method_invocation_return_error) when the state machine is in the wrong state or a request is already outstanding, and returns FALSE. The caller ignores this and falls through to g_shell_parse_argv() and queue_state_change(), which: (1) may call g_dbus_method_invocation_take_error()/gdm_dbus_worker_complete_start_program() on the SAME invocation a second time later (double-reply on a GDBusMethodInvocation, which is a use-after-complete/programming error in GDBus), and (2) can push the state machine into do_start_session() even though state validation just failed, breaking the state machine's invariants (e.g. g_assert (worker->state == ...) elsewhere could abort the privileged worker, or a session could be started twice).","fix":"Check the return value: `if (!validate_state_change (worker, invocation, GDM_SESSION_WORKER_STATE_SESSION_STARTED)) return TRUE;` before proceeding, matching the pattern used by gdm_session_worker_handle_authenticate/authorize/establish_credentials/open via validate_and_queue_state_change().","locations":[{"ref":"daemon/gdm-session-worker.c:2941","code":" 2941 |         validate_state_change (worker, invocation, GDM_SESSION_WORKER_STATE_SESSION_STARTED);","lines":1,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-session-worker.c#L2941"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"gdm_session_handle_choice_list_query(), gdm_session_handle_custom_json_request(), gdm_session_handle_info_query() and gdm_session_handle_secret_info_query() are GDBus 'handle-*' signal callbacks that ret rvice_name);\n  827 | \n  828 |         if (self->user_verifier_extensions != NULL) {\n  829 |                 custom_json_interface =\n  830 |                         g_hash_table_lookup (self->user_verifier_extensions,\n  831 |                                              gdm_dbus_user_verifier_custom_json_interface_info ()->name);\n  832 |         }\n  833 | \n  834 |         if (custom_json_interface == NULL) {\n  835 |                 g_dbus_method_invocation_return_error_literal (invocation, G_DBUS_ERROR,\n  836 |                                                                G_DBUS_ERROR_NOT_SUPPORTED,\n  837 |                                                                \"custom JSON interface not supported by client\");\n  838 |                 return TRUE;\n  839 |         }\n  840 | \n  841 |         conversation = find_conversation_by_name (self, service_name);\n  842 |         if (conversation != NULL) {\n  843 |                 set_pending_query (conversation, invocation);\n  844 | \n  845 |                 static gsize debug_json_requests;\n  846 | \n  847 |                 if (g_once_init_enter (&debug_json_requests))\n  848 |                         g_once_init_leave (&debug_json_requests,\n  849 |                                            g_getenv (\"GDM_DEBUG_JSON_REQUESTS\") != NULL ? 1 : 2);\n  850 | \n  851 |                 if (debug_json_requests == 1)\n  852 |                         g_message (\"GdmSession: emitting custom JSON request '%s' v%u: %s\",\n  853 |                                    protocol, version, request);\n  854 |                 gdm_dbus_user_verifier_custom_json_emit_request (custom_json_interface,\n  855 |                                                                  service_name,\n  856 |                                                                  protocol,\n  857 |                                                                  version,\n  858 | (state->bus_subprocess,\n  182 |                                  cancellable,\n  183 |                                  (GAsyncReadyCallback)\n  184 |                                  on_bus_finished,\n  185 |                                  state);\n  186 | \n  187 |         bus_connection = g_dbus_connection_new_for_address_sync (state->bus_address,\n  188 |                                                                  G_DBUS_CONNECTION_FLAGS_AUTHENTICATION_CLIENT |\n  189 |                                                                  G_DBUS_CONNECTION_FLAGS_MESSAGE_BUS_CONNECTION,\n  190 |                                                                  NULL,\n  191 |                                                                  cancellable,\n  192 |                                                                  &error);\n  193 | \n  194 |         if (bus_connection == NULL) {\n  195 |                 g_debug (\"could not open connection to session bus: %s\",\n  196 |                          error->message);\n  197 |                 goto out;\n  198 |         }\n  199 | \n  200 |         state->bus_connection = bus_connection;\n  201 |         is_running = TRUE;\n  202 | out:\n  203 |         g_clear_object (&data_stream);\n  204 |         g_clear_object (&subprocess);\n  205 |         g_clear_object (&launcher);\n  206 |         g_clear_error (&error);\n  207 | \n  208 |         return is_running;\n  209 | }","lines":54,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/gdm-wayland-session.c#L156-209"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"gdm_daemon_ensure_dirs() calls getgrnam(GDM_GROUPNAME) and, if it returns NULL (group lookup fails), only logs a warning ('things will probably be very broken') but does not return early. Execution continues to gdm_ensure_dir(LOGDIR, 0, grent->gr_gid, ...) which dereferences the NULL grent pointer, crashing the GDM daemon during startup if the gdm group does not exist on the system.","fix":"After the NULL check on grent, either return/skip the LOGDIR chown step, or use a sentinel gid (e.g. -1 / 0) instead of dereferencing grent->gr_gid when grent is NULL.","locations":[{"ref":"daemon/main.c:146-167","code":"  146 | static void\n  147 | gdm_daemon_ensure_dirs (void)\n  148 | {\n  149 |         g_autoptr (GError) error = NULL;\n  150 |         struct group *grent;\n  151 | \n  152 |         grent = getgrnam (GDM_GROUPNAME);\n  153 |         if (G_UNLIKELY (grent == NULL))\n  154 |                 g_warning (\"Failed to find the GDM group, things will probably be very broken!\");\n  155 | \n  156 |         /* Set up /run/gdm */\n  157 |         if (!gdm_ensure_dir (GDM_RUN_DIR, 0, 0, 0755, FALSE, &error)) {\n  158 |                 g_warning (\"Failed to create \" GDM_RUN_DIR \": %s\", error->message);\n  159 |                 g_clear_error (&error);\n  160 |         }\n  161 | \n  162 |         /* Set up /var/log/gdm */\n  163 |         if (!gdm_ensure_dir (LOGDIR, 0, grent->gr_gid, 0711, FALSE, &error)) {\n  164 |                 g_warning (\"Failed to create \" LOGDIR \": %s\", error->message);\n  165 |                 g_clear_error (&error);\n  166 |         }\n  167 | }","lines":22,"link":"https://gitlab.gnome.org/GNOME/gdm/-/blob/125e72b82a20191aae7ab05efb5804244b8b23a4/daemon/main.c#L146-167"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"gdm-new-session correlates the display/session it is supposed to watch purely by username string (on_display_added compares state->username to the username of any GDBusObject that appears on the Displays object manager). CreateUserDisplay/DestroyUserDisplay are likewise invoked only with the username (call_gdm_display_factory_method). If the same user already has another running session, or two gdm-new-session processes are launched concurrently for t
