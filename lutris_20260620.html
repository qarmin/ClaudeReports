nfig/services_box.py:92-99","code":"   92 |     def _on_service_change(self, widget, state, setting_key, include_in_games_checkbox):\n   93 |         \"\"\"Save a setting when an option is toggled\"\"\"\n   94 |         settings.write_setting(setting_key, state, section=\"services\")\n   95 |         include_in_games_checkbox.set_visible(state)\n   96 |         # if you can't view the games in their own service view, then\n   97 |         # you need to see the min the name view, so make them visible there.\n   98 |         include_in_games_checkbox.set_active(True)\n   99 |         self.emit(\"services-changed\")","lines":8,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/services_box.py#L92-L99"}]},{"id":"LOGIC_49","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"StorageBox.bios_path_validated_cb writes bios_path into LutrisConfig.raw_system_config and saves only\nwhen there is no error message. But on_file_chooser_changed for the bios_path setting kicks off the\nasync validation on every 'changed' event, and the entry's 'changed' fires per keystroke when typed.\nEach keystroke can trigger a full directory walk (see related finding) and, when valid, a config save\nplus scan_firmware_directory. Rapid edits queue many concurrent walks/saves.","fix":"Debounce the bios_path validation (only validate on focus-out / commit, or cancel an in-flight\nvalidation when a new one starts) instead of running it on every changed event.","locations":[{"ref":"lutris/gui/config/storage_box.py:126-153","code":"  126 |     def bios_path_validated_cb(self, result, error):\n  127 |         error_box = self.error_boxes[\"bios_path\"]\n  128 | \n  129 |         if error:\n  130 |             error_box.show_markup(None)\n  131 |             return\n  132 | \n  133 |         bios_path, error_message = result\n  134 | \n  135 |         error_box.show_markup(error_message)\n  136 | \n  137 |         if not error_message:\n  138 |             lutris_config = LutrisConfig()\n  139 |             lutris_config.raw_system_config[\"bios_path\"] = bios_path\n  140 |             lutris_config.save()\n  141 |             AsyncCall(scan_firmware_directory, None, bios_path)\n  142 | \n  143 |     def on_file_chooser_changed(self, entry, setting):\n  144 |         folder_path = entry.get_text()\n  145 |         if setting[\"setting\"] == \"pga_cache_path\":\n  146 |             save_custom_cache_path(folder_path)\n  147 |             self.update_pga_cache_path_warning()\n  148 |         elif setting[\"setting\"] == \"game_path\":\n  149 |             lutris_config = LutrisConfig()\n  150 |             lutris_config.raw_system_config[\"game_path\"] = folder_path\n  151 |             lutris_config.save()\n  152 |         elif setting[\"setting\"] == \"bios_path\":\n  153 |             AsyncCall(self.is_bios_path_invalid, self.bios_path_validated_cb, folder_path)","lines":28,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/storage_box.py#L126-L153"}]},{"id":"LOGIC_50","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"GtkBuilderDialog.on_response hides the dialog only on DELETE_EVENT, but the class also defines a\n'destroy' gsignal it emits in on_close. There is no generic response handling and on_response is\nnot connected anywhere in this base class (subclasses connect their own buttons), so on_response is\neffectively dead code for the base flow and the AttributeError guard around self.dialog.hide()\nhides real bugs (self.dialog is always set in __init__).","fix":"Remove the unused on_response method (or wire it to the dialog's response signal); drop the\nAttributeError swallow which can mask genuine errors.","locations":[{"ref":"lutris/gui/dialogs/__init__.py:228-233","code":"  228 |     def on_response(self, _widget: Gtk.Dialog, response: Gtk.ResponseType) -> None:\n  229 |         if response == Gtk.ResponseType.DELETE_EVENT:\n  230 |             try:\n  231 |                 self.dialog.hide()\n  232 |             except AttributeError:\n  233 |                 pass","lines":6,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/__init__.py#L228-L233"}]},{"id":"LOGIC_51","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"DownloadDialog.on_response cancels the download on DELETE_EVENT or CANCEL, but the dialog also\nissues response(Gtk.ResponseType.OK) on completion. There is no handling to ensure the\nDownloadProgressBox 'complete'/'cancel' signal handlers are disconnected before destroy; combined\nwith ModalDialog.destroy_at_idle this is usually fine, but cancel_download() is also invoked when\nthe download already completed (CANCEL path after an OK race), which can call cancel on a finished\ndownloader.","fix":"Guard cancel_download() so it is a no-op once the downloader has completed, and/or disconnect the\nprogress-box signals in on_response before tearing down.","locations":[{"ref":"lutris/gui/dialogs/download.py:31-40","code":"   31 |     def download_complete(self, _widget, _data):\n   32 |         self.response(Gtk.ResponseType.OK)\n   33 | \n   34 |     def download_cancelled(self, _widget):\n   35 |         self.response(Gtk.ResponseType.CANCEL)\n   36 | \n   37 |     def on_response(self, dialog, response):\n   38 |         if response in (Gtk.ResponseType.DELETE_EVENT, Gtk.ResponseType.CANCEL):\n   39 |             self.dialog_progress_box.cancel_download()\n   40 |         super().on_response(dialog, response)","lines":10,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/download.py#L31-L40"}]},{"id":"LOGIC_52","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"In game_import.py search_single(filepath), line 138 calls show_progress(filename, ...) using the\nouter-loop variable 'filename' instead of the function parameter 'filepath'. It works today only\nbecause the single caller passes search_single(filename) so the two names coincide; if\nsearch_single is ever reused with a different argument the progress update targets the wrong row.","fix":"Use the parameter consistently: show_progress(filepath, _(\"Looking up checksum on Lutris.net...\")).","locations":[{"ref":"lutris/gui/dialogs/game_import.py:122-141","code":"  122 | \n  123 |         def search_single(filepath):\n  124 |             existing_game = get_existing_game(filepath)\n  125 |             if existing_game:\n  126 |                 # Found a game to launch instead of installing, but we can't safely\n  127 |                 # do this on this thread, so we return the game and handle it later.\n  128 |                 return [{\"name\": existing_game.name, \"game\": existing_game, \"roms\": []}]\n  129 |             show_progress(filepath, _(\"Calculating checksum...\"))\n  130 |             if filepath.lower().endswith(\".zip\"):\n  131 |                 md5 = get_md5_in_zip(filepath)\n  132 |             else:\n  133 |                 md5 = get_md5_hash(filepath)\n  134 | \n  135 |             if self.search_stopping:\n  136 |                 return None\n  137 | \n  138 |             show_progress(filename, _(\"Looking up checksum on Lutris.net...\"))\n  139 |             result = search_tosec_by_md5(md5)\n  140 |             if not result:\n  141 |                 raise RuntimeError(_(\"This ROM could not be identified.\"))","lines":20,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/game_import.py#L122-L141"}]},{"id":"LOGIC_53","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"IssueReportWindow creates self.title_label and adds it to the vbox, but never sets any text on it,\nso an empty label is packed at the top of the dialo alled):\n  233 |             self.uninstall_button.set_label(_(\"Uninstall\"))","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/uninstall_dialog.py#L231-L233"}]},{"id":"LOGIC_57","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_rating() always returns '' (script_box.py:25-27) and is the only source for the\nrating_label, so the rating column is permanently empty - a packed, aligned label that never\ndisplays anything. Either dead presentation code or an unfinished feature left wired into the\nUI layout.","fix":"Remove the rating label/column until ratings are implemented, or implement get_rating().","locations":[{"ref":"lutris/gui/installer/script_box.py:25-27","code":"   25 |     def get_rating(self):\n   26 |         \"\"\"Return a string representation of the API rating\"\"\"\n   27 |         return \"\"","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/installer/script_box.py#L25-L27"},{"ref":"lutris/gui/installer/script_box.py:38-40","code":"   38 |         rating_label = InstallerLabel(self.get_rating(), selectable=True)\n   39 |         rating_label.set_alignment(1, 0.5)\n   40 |         title_box.pack_end(rating_label, False, False, 0)","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/installer/script_box.py#L38-L40"}]},{"id":"LOGIC_58","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"get_status() returns the label text only when the status label is visible, otherwise ''.\non copy_clicked in create_error_page composes 'f\"{status}\\n\\n{details}\"'. If the status\nlabel happens to be hidden at copy time the copied report silently loses the error summary\nline, even though present_error_page set it via set_status (which also makes it visible). The\ncoupling between visibility and text r n.popitem()\n  838 |                 model.append([key, label])","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/installerwindow.py#L836-L838"}]},{"id":"LOGIC_60","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"on_game_updated(): in the service branch (self.service set) the code computes db_game via\nself.service.get_service_db_game(game) but never applies the is_game_displayed() removal\ncheck that the non-service branch applies (lines 1427-1429). So when a game update moves it\nout of the current service-backed category, it is updated in place instead of removed from\nthe view, leaving stale entries in service views until a full update_store().","fix":"Apply the same is_game_displayed()-based removal logic in the service branch, or factor the\ndisplay/removal decision so both branches share it.","locations":[{"ref":"lutris/gui/lutriswindow.py:1417-1437","code":" 1417 |     def on_game_updated(self, game):\n 1418 |         \"\"\"Updates an individual entry in the view when a game is updated\"\"\"\n 1419 |         add_to_path_cache(game)\n 1420 |         self.update_action_state()\n 1421 | \n 1422 |         if self.service:\n 1423 |             db_game = self.service.get_service_db_game(game)\n 1424 |         else:\n 1425 |             db_game = games_db.get_game_by_field(game.id, \"id\")\n 1426 | \n 1427 |             if db_game and not self.is_game_displayed(game) and \"id\" in db_game:\n 1428 |                 self.game_store.remove_game(db_game[\"id\"])\n 1429 |                 return True\n 1430 | \n 1431 |         if db_game:\n 1432 |             updated_columns = self.game_store.update(db_game)\n 1433 |             sensitive_columns = self.get_sort_sensitive_columns()\n 1434 |             if updated_columns is None or not sensitive_columns.isdisjoint(updated_columns):\n 1435 |                 self.update_store()\n 1436 | \n 1437 |         return True","lines":21,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/lutriswindow.py#L1417-L1437"}]},{"id":"LOGIC_61","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In cellrenderers.render_badge_stack, spacing is computed as\n(media_area.height - badge_height * len(icon_paths)) / max(1, len(icon_paths) - 1) and then\nclamped with min(spacing, 1). This silently negates the intended behavior when there is one\nicon: with a single badge, len-1 == 0 so the denominator is forced to 1, and spacing can be a\nlarge positive number that then gets clamped to 1, but y_offset = floor(badge_height + spacing)\nis still applied via (len(icon_paths) - 1) == 0, so it happens to work. However spacing can be\nnegative (overlapping badges) and min(spacing, 1) does not clamp a negative lower bound,\nallowing badges to be pushed off the top of the media when many icons must fit.","fix":"Clamp spacing to a sensible range (e.g. max(min_overlap, min(spacing, 1))) and verify the multi-icon overflow case keeps all badges within media_area.","locations":[{"ref":"lutris/gui/widgets/cellrenderers.py:430-460","code":"  430 |     def render_badge_stack(self, cr, widget, surface, surface_x, icon_paths, media_area):\n  431 |         \"\"\"Renders a vertical stack of badges, placed at the edge of the media, just to the left\n  432 |         of 'media_area.right'. The icons in icon_paths are drawn from top to bottom, and spaced\n  433 |         to fit in 'media_area', even if they overlap because of this.\"\"\"\n  434 | \n  435 |         badge_width = self.badge_size[0]\n  436 |         badge_height = self.badge_size[1]\n  437 |         alpha = self.badge_alpha\n  438 |         fore_color = self.badge_fore_color\n  439 |         back_color = self.badge_back_color\n  440 | \n  441 |         def render_badge(badge_x, badge_y, path):\n  442 |             cr.rectangle(badge_x, badge_y, badge_width, badge_height)\n  443 | _paste","type_label":"Copy Paste","severity":"medium","easy":true,"description":"The FileNotFoundError branch's message contains a literal '%s' placeholder ('Path %s not found, unable to create game folder. Is the disk mounted?') but it is never formatted with self.target_path via the % operator; target_path is instead passed as faulty_data, a separate field that ScriptingError.__str__ appends on a new line. The user sees a literal, unsubstituted '%s' in the primary error message. This is inconsistent with the sibling PermissionError branch immediately above, which correctly omits the %s and relies solely on faulty_data.","fix":"Either format the string directly: ScriptingError(_(\"Path %s not found, unable to create game folder. Is the disk mounted?\") % self.target_path) or drop the %s from the message text to match the PermissionError branch's style, relying on faulty_data alone.","locations":[{"ref":"lutris/installer/interpreter.py:234-243","code":"  234 |             except PermissionError as err:\n  235 |                 raise ScriptingError(\n  236 |                     _(\"Lutris does not have the necessary permissions to install to path:\"),\n  237 |                     faulty_data=self.target_path,\n  238 |                 ) from err\n  239 |             except FileNotFoundError as err:\n  240 |                 raise ScriptingError(\n  241 |                     _(\"Path %s not found, unable to create game folder. Is the disk mounted?\"),\n  242 |                     faulty_data=self.target_path,\n  243 |                 ) from err","lines":10,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/installer/interpreter.py#L234-L243"}]},{"id":"CPY_5","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"In print_service_game_list the truncation `[:15]` is applied to the literal string \"false\" rather\nthan to the formatted field. `\"false\"[:15]` is a no-op, and the intended truncation/alignment of the\ninstalled column is not what was written. The ternary also makes the slice apply only to the False\nbranch, which is clearly a copy-paste artifact from the adjacent truncated columns.","fix":"Replace `\"true\" if game[\"installed\"] else \"false\"[:15]` with simply\n`\"true\" if game[\"installed\"] else \"false\"` (the field already fits the {:<15} format spec).","locations":[{"ref":"lutris/gui/application.py:958","code":"  958 |                     \"true\" if game[\"installed\"] else \"false\"[:15],","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/application.py#L958"}]},{"id":"CPY_6","type":"copy_paste","type_label":"Copy Paste","severity":"low","easy":true,"description":"The exception handler for failed runner sidebar rows logs the wrong variable.\nWhen a RunnerSidebarRow fails to load, the log message interpolates `service_name` (left over\nfrom the service loop above) instead of `runner_name`. `service_name` may hold a stale value\nfrom the previous loop, or be undefined if the service loop never iterated, raising a\nNameError inside the except handler and masking the original error.","fix":"Change the log call to use `runner_name` instead of `service_name`.","locations":[{"ref":"lutris/gui/widgets/sidebar.py:763-778","code":"  763 |         for runner_name in self.installed_runners:\n  764 |             if runner_name not in self.runner_rows:\n  765 |                 try:\n  766 |                     icon_name = runner_name.lower().replace(\" \", \"\") + \"-symbolic\"\n  767 |                     runner = runners.import_runner(runner_name)()\n  768 |                     runner_row = RunnerSidebarRow(\n  769 |                         runner_name,\n  770 |                         \"runner\",\n  771 |                         runner.human_name,\n  772 |                         self.get_sidebar_icon(icon_name),\n  773 |                         application=self.application,\n  774 |                     )\n  775 |                     insert_row(runner_row)\n  776 |                     self.runner_rows[runner_name] = runner_row\n  777 |                 except Exception as ex:\n  778 |                     logger.exception(\"Sidebar row for '%s' could not be loaded: %s\", service_name, ex)","lines":16,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/sidebar.py#L763-L778"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"high","easy":false,"description":"update_search_results_cb is an AsyncCall callback invoked on the GTK main loop. On error it\nre-raises the exception with `raise error` instead of presenting it to the user. Raising from a\nGLib idle/main-loop callback does not propagate to any caller that can handle it; depending on the\nexception backstop it is either swallowed or crashes the handler, and the spinner started in\nupdate_search_results is never stopped/hidden, leaving the search UI stuck in a spinning state.\nNetwork errors from api.search_games (very common: offline, timeout) hit this path.","fix":"Handle the error gracefully: stop/hide the spinner first, then show the message in\nsearch_result_label (e.g. self.search_result_label.set_markup(gtk_safe(str(error))) and show it),\ninstead of `raise error`.","locations":[{"ref":"lutris/gui/addgameswindow.py:262-267","code":"  262 |     def update_search_results_cb(self, api_games, error):\n  263 |         if error:\n  264 |             raise error\n  265 | \n  266 |         self.search_spinner.stop()\n  267 |         self.search_spinner.hide()","lines":6,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/addgameswindow.py#L262-L267"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"get_lutris_action can return parse_installer_url's result, but when a URL is present and invalid,\nparse_installer_url raises ValueError which is caught at the call site (line 652). However when\n`url` is present but parse_installer_url returns a dict missing expected keys, the subsequent\nunconditional indexing installer_info[\"game_slug\"], [\"action\"], [\"service\"], [\"appid\"],\n[\"launch_config_name\"], [\"revision\"] will raise KeyError (not ValueError) and is NOT caught,\ncrashing do_command_line. The default dict in get_lutris_action has these keys, but\nparse_installer_url's return is trusted to have them all.","fix":"Use installer_info.get(...) for each field, or validate the dict returned by\nparse_installer_url has all required keys and treat missing keys as an invalid URI (returning the\nsame error path as ValueError).","locations":[{"ref":"lutris/gui/application.py:649-664","code":"  649 |         url = options.lookup_value(GLib.OPTION_REMAINING)\n  650 |         try:\n  651 |             installer_info = self.get_lutris_action(url)\n  652 |         except ValueError:\n  653 |             self._print(command_line, _(\"%s is not a valid URI\") % (url.get_strv() if url else \"''\"))\n  654 |             return 1\n  655 | \n  656 |         game_slug = installer_info[\"game_slug\"]\n  657 |         action = installer_info[\"action\"]\n  658 |         service = installer_info[\"service\"]\n  659 |         appid = installer_info[\"appid\"]\n  660 |         launch_config_name = installer_info[\"launch_config_name\"]\n  661 | \n  662 |         self.launch_ui_delegate = CommandLineUIDelegate(launch_config_name)\n  663 | \n  664 |         revision = installer_info[\"revision\"]","lines":16,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/application.py#L649-L664"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"SearchFiltersBox.on_save and EditCategoryGamesDialog.on_save raise RuntimeError directly from a save\nbutton handler when a name collides with an existing saved search / reserved category. These are\nGObject signal/button callbacks; a raised exception propagates into the GTK main loop and is logged as\nan unhandled error rather than shown to the user, and the dialog stays open in an undefined state with\nno user-visible message explaining the conflict.","fix":"Show an ErrorDialog (or inline validation message) and return without saving on name conflicts /\nreserved names, instead of raising RuntimeError out of the handler.","locations":[{"ref":"lutris/gui/config/edit_saved_search.py:294-303","code":"  294 |         if self.original_search.name != self.saved_search.name:\n  295 |             if saved_searches.get_saved_search_by_name(self.saved_search.name):\n  296 |                 raise RuntimeError(_(\"'%s' is already a saved search.\") % self.saved_search.name)\n  297 | \n  298 |         if not self.saved_search.saved_search_id:\n  299 |             # Creating new search!\n  300 |             self.saved_search.add()\n  301 |         elif self.original_search != self.saved_search:\n  302 |             # Changing an existing search.\n  303 |             self.saved_search.update()","lines":10,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/edit_saved_search.py#L294-L303"},{"ref":"lutris/gui/config/edit_game_categories.py:114-116","code":"  114 |         category_entry.connect(\"activate\", on_add_category)\n  115 |         hbox.pack_start(category_entry, True, True, 0)\n  116 | ","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/edit_game_categories.py#L114-L116"}]},{"id":"ERR_4","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"GameInfoBox.on_custom_image_download_clicked runs the network download via AsyncCall with a callback\ndownload_cb that does , or escape the truncated text via gtk_safe() rather than slicing a\nmarkup string.","locations":[{"ref":"lutris/gui/dialogs/__init__.py:316-320","code":"  316 |         if message_markup:\n  317 |             self.set_markup(message_markup[:256])\n  318 | \n  319 |         if secondary_markup:\n  320 |             self.format_secondary_markup(secondary_markup[:256])","lines":5,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/__init__.py#L316-L320"}]},{"id":"ERR_6","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"RunnerInstallDialog.cancel_install does self.installing[runner[\"version\"]].cancel() then\nself.installing.pop(runner[\"version\"]) with no guard. cancel_install is invoked both from the\nuser Cancel button and automatically from get_progress() on downloader ERROR. If both fire (or\ncancel_install runs twice for the same row), the second access raises KeyError, leaving the UI in\nan inconsistent state. on_extracted similarly pops unconditionally.","fix":"Use self.installing.pop(version, None) and check membership before calling .cancel(), so repeated\nor racing cancellations are idempotent.","locations":[{"ref":"lutris/gui/dialogs/runner_install.py:325-332","code":"  325 |     def cancel_install(self, row):\n  326 |         \"\"\"Cancel the installation of a runner version\"\"\"\n  327 |         runner = row.runner\n  328 |         self.installing[runner[\"version\"]].cancel()\n  329 |         self.uninstall_runner(row)\n  330 |         runner[\"progress\"] = 0\n  331 |         self.installing.pop(runner[\"version\"])\n  332 |         self.update_listboxrow(row)","lines":8,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/runner_install.py#L325-L332"},{"ref":"lutris/gui/dialogs/runner_install.py:425-439","code":"  425 |     def on_extracted(self, row_info, error):\n  426 | _games_from_filters(), when service_id is in services.SERVICES the code immediately\ndereferences self.service.online / self.service.is_authenticated() (line 688). But\nset_service() sets self.service to None on KeyError or when instantiation is otherwise\nabsent, and the sidebar handler can call set_service() with a name that fails. If\nself.service is None here while service_id is still a known key, this raises\nAttributeError on None. The service_id presence check and the self.service object are not\nguaranteed to be consistent.","fix":"Guard on self.service rather than (or in addition to) service_id, e.g.\n'if self.service and service_id in services.SERVICES:' and fall through to the non-service\npath otherwise.","locations":[{"ref":"lutris/gui/lutriswindow.py:685-691","code":"  685 |     def get_games_from_filters(self):\n  686 |         service_id = self.filters.get(\"service\")\n  687 |         if service_id in services.SERVICES:\n  688 |             if self.service.online and not self.service.is_authenticated():\n  689 |                 self.show_empty_label()\n  690 |                 return []\n  691 |             return self.get_service_games(service_id)","lines":7,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/lutriswindow.py#L685-L691"},{"ref":"lutris/gui/lutriswindow.py:645-656","code":"  645 |     def set_service(self, service_name):\n  646 |         if self.service and self.service.id == service_name:\n  647 |             return self.service\n  648 |         if not service_name:\n  649 |             self.service = None\n  650 |             return\n  651 |         try:\n  652 |             self.service = services.SERVICES[service_name]()\n  653 |         except KeyError:\n  654 |             logger.error(\"Non existent service '%s'\", service_name)\n  655 |             self.service = None\n  656 |         return self.service","lines":12,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/lutriswindow.py#L645-L656"}]},{"id":"ERR_9","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"In DownloadCollectionProgressBox._progress, os.rename(ad.file.tmp_file,\nad.file.dest_file) is called when a download completes with no error handling. If the rename\nfails (cross-device link, permission, destination directory missing), it raises inside the\nidle callback, leaving the cache lock in DOWNLOADING state and the collection in an\ninconsistent partial-complete state. DownloadProgressBox._progress has the same unguarded\nos.rename.","fix":"Wrap os.rename in try/except, emit an error signal and call _cancel_all / clean up the cache lock on failure.","locations":[{"ref":"lutris/gui/widgets/download_collection_progress_box.py:344-350","code":"  344 |         # ---- Process completions ----\n  345 |         for ad in finished:\n  346 |             self.num_files_downloaded += 1\n  347 |             self._completed_sizes[ad.file.dest_file] = ad.downloader.downloaded_size\n  348 |             os.rename(ad.file.tmp_file, ad.file.dest_file)\n  349 |             update_cache_lock(ad.file.dest_file, CacheState.DOWNLOADED)\n  350 |             self._active_downloads.remove(ad)","lines":7,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/download_collection_progress_box.py#L344-L350"},{"ref":"lutris/gui/widgets/download_progress_box.py:152-154","code":"  152 |         if downloader.state == downloader.COMPLETED:\n  153 |             os.rename(self.temp, self.dest)\n  154 |             update_cache_lock(self.dest, CacheState.DOWNLOADED)","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/download_progress_box.py#L152-L154"}]},{"id":"ERR_10","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":false,"description":"notifications.send_notification calls application.send_notification on the\nresult of Gio.Application.get_default() without checking for None. If no application is\nregistered as default (e.g. called from a context where the GApplication isn't set up), this\nraises AttributeError. Most other helpers in this codebase guard get_default() returning\nNone.","fix":"Check `application = Gio.Application.get_default()` for None and return/log early if it is missing.","locations":[{"ref":"lutris/gui/widgets/notifications.py:6-14","code":"    6 | def send_notification(title, text, file_path_to_icon=\"net.lutris.Lutris\"):\n    7 |     icon_file = Gio.File.new_for_path(file_path_to_icon)\n    8 |     icon = Gio.FileIcon.new(icon_file)\n    9 |     notification = Gio.Notification.new(title)\n   10 |     notification.set_body(text)\n   11 |     notification.set_icon(icon)\n   12 | \n   13 |     application = Gio.Application.get_default()\n   14 |     application.send_notification(None, notification)","lines":9,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/notifications.py#L6-L14"}]},{"id":"ERR_11","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"redream.py's play() never validates that 'main_file' exists before launching. Unlike nearly every other runner, it does not call system.path_exists() or raise MissingGameExecutableError. If the game's main_file is unset or points to a missing file, None or an invalid path is silently appended to the command argv, causing a confusing low-level crash from the emulator or subprocess layer instead of a clear Lutris error message.","fix":"Add a system.path_exists() check on main_file before building the command, raising MissingGameExecutableError(filename=main_file) if missing, matching the pattern used in other runners (e.g. mednafen.py, mame.py).","locations":[{"ref":"lutris/runners/redream.py:112-138","code":"  112 |     def play(self):\n  113 |         command = self.get_command()\n  114 | \n  115 |         if self.runner_config.get(\"fs\") is True:\n  116 |             command.append(\"--fullscreen=1\")\n  117 |         else:\n  118 |             command.append(\"--fullscreen=0\")\n  119 | \n  120 |         if self.runner_config.get(\"ar\"):\n  121 |             command.append(\"--aspect=\" + self.runner_config.get(\"ar\"))\n  122 | \n  123 |         if self.runner_config.get(\"region\"):\n  124 |             command.append(\"--region=\" + self.runner_config.get(\"region\"))\n  125 | \n  126 |         if self.runner_config.get(\"language\"):\n  127 |             command.append(\"--language=\" + self.runner_config.get(\"language\"))\n  128 | \n  129 |         if self.runner_config.get(\"broadcast\"):\n  130 |             command.append(\"--broadcast=\" + self.runner_config.get(\"broadcast\"))\n  131 | \n  132 |         if self.runner_config.get(\"time_sync\"):\n  133 |             command.append(\"--time_sync=\" + self.runner_config.get(\"time_sync\"))\n  134 | \n  135 |         if self.runner_config.get(\"int_res\"):\n  136 |             command.append(\"--res=\" + self.runner_config.get(\"int_res\"))\n  137 | \n  138 |         command.append(self.game_config.get(\"main_file\"))","lines":27,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/redream.py#L112-L138"}]},{"id":"ERR_12","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","easy":true,"description":"reicast.py's play() reads 'iso' from game_config and uses it directly to build the '-config image=' argument without checking system.path_exists() or raising MissingGameExecutableError, unlike nearly every other runner. If 'iso' is unset, the emulator is launched with the literal string 'config:image=None', producing an obscure failure instead of a clear error.","fix":"Validate the iso path with system.path_exists() before use and raise MissingGameExecutableError(filename=iso) if missing.","locations":[{"ref":"lutris/runners/reicast.py:152-153","code":"  152 |         iso = self.game_config.get(\"iso\")\n  153 |         return {\"command\": self.get_command() + [\"-config\", f\"config:image={iso}\"]}","lines":2,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/reicast.py#L152-L153"}]},{"id":"ERR_13","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"on_playtron_import_complete re-enables back_button and cancel_button at the top, but\ncontinue_button.set_sensitive(True) only happens in the error branch and again unconditionally near\nthe end (line 574). In the success-with-zero-games branch the continue button is re-enabled (line\n574) but then display_continue_button is called turning it into a \"_Close\" button. That's fine, but\nif result is a non-list truthy value, `game_ids = result or []` keeps it and len() may raise\nTypeError for a non-sized result. The callback trusts the scanner's return type.","fix":"Validate result is a list/sized collection before len(); default defensively to an\nempty list for any unexpected type.","locations":[{"ref":"lutris/gui/addgameswindow.py:560-575","code":"  560 |         game_ids = result or []\n  561 |         count = len(game_ids)\n  562 | \n  563 |         if count == 0:\n  564 |             self.import_playtron_result_label.set_text(_(\"No new games found to import.\"))\n  565 |         else:\n  566 |             self.import_playtron_result_label.set_text(\n  567 |                 ngettext(\"Successfully imported %d game.\", \"Successfully imported %d games.\", count) % count\n  568 |             )\n  569 |             # Refresh the game library\n  570 |             application = Gio.Application.get_default()\n  571 |             if application and hasattr(application, \"window\"):\n  572 |                 application.window.refresh_view()\n  573 | \n  574 |         self.continue_button.set_sensitive(True)\n  575 |         self.display_continue_button(lambda _w: self.destroy(), label=_(\"_Close\"), suggested_action=False)","lines":16,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/addgameswindow.py#L560-L575"}]},{"id":"ERR_14","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":true,"description":"_handle_keyerror does error.args[0] to format the message. A KeyError raised without arguments\n(KeyError() with empty args) makes args[0] raise IndexError inside the error handler itself,\nmasking the original error.","fix":"Guard with: key = error.args[0] if error.args else '?' before formatting the message.","locations":[{"ref":"lutris/gui/dialogs/__init__.py:808-810","code":"  808 | def _handle_keyerror(error: KeyError, parent: Gtk.Window) -> None:\n  809 |     message = _(\"The key '%s' could not be found.\") % error.args[0]\n  810 |     ErrorDialog(error, message_markup=gtk_safe(message), parent=parent)","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/__init__.py#L808-L810"}]},{"id":"ERR_15","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"IssueReportWindow.on_folder_selected writes the JSON report with open(..., \"w\") and\njson.dump(...) with no exception handling. gather_system_info() output that is not JSON\nserializable, or an unwritable target folder, raises out of the signal handler. Also, the dialog\nis only destroyed after a successful write, so on failure the file chooser response handler leaves\nthe native dialog object around.","fix":"Wrap the write in try/except, show an ErrorDialog on failure, and destroy the file chooser in a\nfinally block.","locations":[{"ref":"lutris/gui/dialogs/issue.py:79-91","code":"   79 |     def on_folder_selected(self, dialog, response, _dialog):\n   80 |         if response != Gtk.ResponseType.ACCEPT:\n   81 |             return\n   82 |         target_path = dialog.get_filename()\n   83 |         if not target_path:\n   84 |             return\n   85 |         issue_path = os.path.join(target_path, \"lutris-issue-report.json\")\n   86 |         issue_info = self.get_issue_info()\n   87 |         with open(issue_path, \"w\", encoding=\"utf-8\") as issue_file:\n   88 |             json.dump(issue_info, issue_file, indent=2)\n   89 |         dialog.destroy()\n   90 |         NoticeDialog(_(\"Issue saved in %s\") % issue_path)\n   91 |         self.destroy()","lines":13,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/issue.py#L79-L91"}]},{"id":"ERR_16","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"LogWindow.on_save_clicked writes the log via open(log_path, \"w\") with no exception handling. If\nthe chosen path is not writable (permissions, removed device, read-only filesystem), the unhandled\nIOError/OSError propagates out of the GTK signal handler and is only caught by the global backstop,\ngiving the user a generic crash dialog instead of a clear 'could not save' message.","fix":"Wrap the file write in try/except OSError and show an ErrorDialog with a clear message on failure.","locations":[{"ref":"lutris/gui/dialogs/log.py:62-75","code":"   62 |     def on_save_clicked(self, _button: Gtk.Button) -> None:\n   63 |         \"\"\"Handler to save log to a file\"\"\"\n   64 |         now = datetime.now()\n   65 |         log_filename = \"%s (%s).log\" % (self.title, now.strftime(\"%Y-%m-%d-%H-%M\"))\n   66 |         file_dialog = FileDialog(\n   67 |             message=\"Save the logs to...\", default_path=os.path.expanduser(\"~/%s\" % log_filename), mode=\"save\"\n   68 |         )\n   69 |         log_path = file_dialog.filename\n   70 |         if not log_path:\n   71 |             return None\n   72 | \n   73 |         text = self.buffer.get_text(self.buffer.get_start_iter(), self.buffer.get_end_iter(), True)\n   74 |         with open(log_path, \"w\", encoding=\"utf-8\") as log_file:\n   75 |             log_file.write(text)","lines":14,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/log.py#L62-L75"}]},{"id":"ERR_17","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"on_browse_clicked opens a DirectoryDialog and immediately reads dialog.folder then invokes\nthe callback (installerwindow.py:918-923). There is no check for the user cancelling the\ndialog; if dialog.folder is empty/None on cancel, the disc-selection callback is invoked\nwith a missing folder, likely failing downstream rather than being a no-op.","fix":"Return early if dialog.folder is falsy (user cancelled) before calling the callback.","locations":[{"ref":"lutris/gui/installerwindow.py:918-923","code":"  918 |     def on_browse_clicked(self, widget, callback_data):\n  919 |         dialog = DirectoryDialog(_(\"Select the folder where the disc is mounted\"), parent=self)\n  920 |         folder = dialog.folder\n  921 |         callback = callback_data[\"callback\"]\n  922 |         requires = callback_data[\"requires\"]\n  923 |         callback(widget, requires, folder)","lines":6,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/installerwindow.py#L918-L923"}]},{"id":"ERR_18","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"on_games_ready / apply_store re-raise background errors with 'raise error' to bounce them\nagainst an unspecified 'backstop' (lines 832, 847). These run inside AsyncCall completion\ncallbacks on the main loop; re-raising relies on a global exception backstop being\ninstalled. If that backstop is absent or changes, the exception is swallowed by the GLib\nmain loop and the spinner/overlay state can be left half-updated (e.g. spinner shown,\nstore never applied). There is no local cleanup of UI state on error.","fix":"On error, restore a sane UI state (hide spinner, show an error label) in addition to (or\ninstead of) re-raising, so a failed store build does not leave the view stuck on a\nspinner.","locations":[{"ref":"lutris/gui/lutriswindow.py:827-849","code":"  827 |         def on_games_ready(games, error):\n  828 |             if generation != self._game_store_generation:\n  829 |                 return  # no longer applicable, we got switched again!\n  830 | \n  831 |             if error:\n  832 |                 raise error  # bounce any error against the backstop\n  833 | \n  834 |             # Since get_games_from_filters() seems to be much faster than making a GameStore,\n  835 |             # we defer the spinner to here, when we know how many games we will show. If there\n  836 |             # are \"many\" we show a spinner while the store is built.\n  837 |             if len(games) > 512:\n  838 |                 self.show_spinner()\n  839 | \n  840 |             AsyncCall(make_game_store, apply_store, games)\n  841 | \n  842 |         def apply_store(result, error):\n  843 |             if generation != self._game_store_generation:\n  844 |                 return  # no longer applicable, we got switched again!\n  845 | \n  846 |             if error:\n  847 |                 raise error  # bounce any error against the backstop\n  848 | \n  849 |             games, game_store = result","lines":23,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/lutriswindow.py#L827-L849"}]},{"id":"ERR_19","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"easyrpg.py accesses several runner_config/game_config keys via direct dict indexing instead of .get() -- e.g. self.runner_config[\"audio\"] (line 455), [\"fullscreen\"] (line 471), [\"stretch\"] (line 484), [\"vsync\"] (line 487), [\"rtp\"] (line 501), and self.game_config[\"test_play\"] (line 567), [\"hide_title\"] (line 570). Every other option read in this file (and in most other runners) uses .get() with a default. If any of these keys is absent from a saved config (e.g. a config saved before the option existed, or a hand-edited YAML), play() raises an unhandled KeyError instead of falling back to a sane default.","fix":"Use self.runner_config.get(\"audio\", <default>) / self.game_config.get(\"test_play\", False) style accesses consistent with the rest of the file, so missing legacy config keys degrade gracefully instead of crashing.","locations":[{"ref":"lutris/runners/easyrpg.py:455","code":"  455 |         if not self.runner_config[\"audio\"]:","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/easyrpg.py#L455"},{"ref":"lutris/runners/easyrpg.py:471","code":"  471 |         if self.runner_config[\"fullscreen\"]:","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/easyrpg.py#L471"},{"ref":"lutris/runners/easyrpg.py:484","code":"  484 |         if self.runner_config[\"stretch\"]:","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/easyrpg.py#L484"},{"ref":"lutris/runners/easyrpg.py:487","code":"  487 |         if not self.runner_config[\"vsync\"]:","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/easyrpg.py#L487"},{"ref":"lutris/runners/easyrpg.py:501","code":"  501 |         if not self.runner_config[\"rtp\"]:","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/easyrpg.py#L501"},{"ref":"lutris/runners/easyrpg.py:567","code":"  567 |         if self.game_config[\"test_play\"]:","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/easyrpg.py#L567"},{"ref":"lutris/runners/easyrpg.py:570","code":"  570 |         if self.game_config[\"hide_title\"]:","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/easyrpg.py#L570"}]},{"id":"ERR_20","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"Message.read_varint() in the Amazon manifest protobuf-like decoder calls ord(stream.read(1)) in a loop with no EOF check. If the stream is truncated/empty at that point, stream.read(1) returns b\"\", and ord(b\"\") raises TypeError rather than a clear/handled parsing error. A malformed or truncated Amazon Games manifest response would surface as an unhelpful TypeError instead of a controlled parse failure.","fix":"Check for EOF explicitly:\nb = stream.read(1)\nif not b:\n    raise EOFError(\"Unexpected end of stream while reading varint\")\nbyte = ord(b)","locations":[{"ref":"lutris/util/amazon/protobuf_decoder.py:181-190","code":"  181 |     def read_varint(stream):\n  182 |         res = 0\n  183 |         i = 0\n  184 |         while 1:\n  185 |             c = ord(stream.read(1))\n  186 |             res |= (c & 127) << (i * 7)\n  187 |             if c & 128 == 0:\n  188 |                 break\n  189 |             i += 1\n  190 |         return res","lines":10,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/amazon/protobuf_decoder.py#L181-L190"}]},{"id":"ERR_21","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","easy":false,"description":"DiscordPresence.update() assigns self.rpc = Presence(discord_id) before calling self.rpc.connect(). If connect() raises DiscordNotFound, the except block returns without resetting self.rpc to None, leaving a never-connected Presence object stored. A later call to clear() will see self.rpc is not None and invoke methods (clear/close) on an object that was never actually connected. Module is explicitly marked unmaintained/deprecated in its docstring, limiting real-world impact.","fix":"Reset self.rpc on failure:\nexcept DiscordNotFound:\n    self.rpc = None\n    return","locations":[{"ref":"lutris/util/discord/client.py:15-27","code":"   15 |     def update(self, discord_id):\n   16 |         if self.rpc is not None:\n   17 |             # Clear the old RPC before creating a new one\n   18 |             self.clear()\n   19 | \n   20 |         # Create a new Presence object with the desired app id\n   21 |         try:\n   22 |             self.rpc = Presence(discord_id)\n   23 |             self.rpc.connect()\n   24 |         except DiscordNotFound:\n   25 |             return\n   26 | \n   27 |         self.rpc.update()","lines":13,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/discord/client.py#L15-L27"}]},{"id":"API_1","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"_print calls `command_line.do_print_literal(command_line, string + \"\\n\")`. do_print_literal is an\ninstance virtual method, so passing command_line again as the first positional argument passes the\nApplicationCommandLine twice (self plus an extra arg). The comment claims this is a workaround for\n\"broken pygobject bindings\", but this is fragile and version-dependent; on bindings where\ndo_print_literal has the normal (self, string) signature this raises TypeError, breaking every\ntext-output command (--list-games, --export errors, URI errors, etc.).","fix":"Use the public API `command_line.print_literal(string + \"\\n\")`, or if the binding\ntruly requires the vfunc, call `Gio.ApplicationCommandLine.do_print_literal(command_line, string + \"\\n\")`.\nVerify against the supported pygobject version and drop the doubled argument if not needed.","locations":[{"ref":"lutris/gui/application.py:448-451","code":"  448 |     @staticmethod\n  449 |     def _print(command_line: Gio.ApplicationCommandLine, string: str) -> None:\n  450 |         # Workaround broken pygobject bindings\n  451 |         command_line.do_print_literal(command_line, string + \"\\n\")  # type: ignore","lines":4,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/application.py#L448-L451"}]},{"id":"API_2","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"DialogInstallUIDelegate passes \"parent\": self into QuestionDialog/FileDialog and DownloadDialog,\nwhere self is the delegate object (e.g. a runner or window mixin), not necessarily a Gtk.Window.\nQuestionDialog does self.set_transient_for(dialog_settings[\"parent\"]) and DownloadDialog passes it\nstraight to a Dialog parent. If self is not a Gtk.Window, set_transient_for / parent handling\nraises or warns at runtime.","fix":"Resolve a real top-level window before passing it as parent (as display_error() does with\nget_toplevel()), or assert/convert self to a Gtk.Window.","locations":[{"ref":"lutris/gui/dialogs/delegates.py:135-161","code":"  135 |     def show_install_yesno_inquiry(self, question: str, title: str) -> bool:\n  136 |         dialog = dialogs.QuestionDialog(\n  137 |             {\n  138 |                 \"parent\": self,\n  139 |                 \"question\": question,\n  140 |                 \"title\": title,\n  141 |             }\n  142 |         )\n  143 |         return Gtk.ResponseType.YES == dialog.result\n  144 | \n  145 |     def show_install_file_inquiry(self, question: str, title: str, message: str) -> str | None:\n  146 |         dlg = dialogs.QuestionDialog(\n  147 |             {\n  148 |                 \"parent\": self,\n  149 |                 \"question\": question,\n  150 |                 \"title\": title,\n  151 | e appended with\n(None, None, None, extra_source) (installerwindow.py:569). Columns 0 and 1 are declared as\nbool (GType gboolean); passing Python None for a gboolean column is relying on PyGObject\ncoercing None->False. This is fragile/implicit and the CellRendererToggle 'active'/\n'inconsistent' attributes are bound to these columns; clearer to pass explicit False.","fix":"Append heading rows with explicit (False, False, None, extra_source).","locations":[{"ref":"lutris/gui/installerwindow.py:139-144","code":"  139 |         self.extras_tree_store = Gtk.TreeStore(\n  140 |             bool,  # is selected?\n  141 |             bool,  # is inconsistent?\n  142 |             object,  # extras dict\n  143 |             str,  # label\n  144 |         )","lines":6,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/installerwindow.py#L139-L144"},{"ref":"lutris/gui/installerwindow.py:569","code":"  569 |                 parent = self.extras_tree_store.append(None, (None, None, None, extra_source))","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/installerwindow.py#L569"}]},{"id":"API_6","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"StoreItem.id reads self._game_data[\"slug\"] and self._game_data[\"id\"] with subscript access that\nraises KeyError if the key is absent. self.slug and self.name likewise do self._game_data[\"slug\"]\n/ [\"name\"] unconditionally. StoreItem is constructed from arbitrary db_game / service game dicts,\nand an item lacking 'service_id', 'appid' and 'slug' (or lacking 'name'/'slug') will raise\nKeyError deep inside view population rather than degrading gracefully.","fix":"Use .get() with sensible fallbacks (e.g. self._game_data.get('slug') or '') and log when a\nrequired identifier is missing instead of letting a bare KeyError propagate into the view code.","locations":[{"ref":"lutris/gui/views/store_item.py:64-80","code":"   64 |     @property\n   65 |     def id(self) -> str:  # pylint: disable=invalid-name\n   66 |         \"\"\"Game internal ID\"\"\"\n   67 |         # Return a unique identifier for the game.\n   68 |         # Since service games are not related to lutris, use the appid\n   69 |         if \"service_id\" not in self._game_data:\n   70 |             if \"appid\" in self._game_data:\n   71 |                 _id = self._game_data[\"appid\"]\n   72 |             else:\n   73 |                 _id = self._game_data[\"slug\"]\n   74 |         else:\n   75 |             _id = self._game_data[\"id\"]\n   76 | \n   77 |         if not _id:\n   78 |             logger.error(\"No id could be found for '%s'\", self.name)\n   79 | \n   80 |         return str(_id)","lines":17,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/views/store_item.py#L64-L80"},{"ref":"lutris/gui/views/store_item.py:90-98","code":"   90 |     @property\n   91 |     def slug(self):\n   92 |         \"\"\"Slug identifier\"\"\"\n   93 |         return gtk_safe(self._game_data[\"slug\"])\n   94 | \n   95 |     @property\n   96 |     def name(self):\n   97 |         \"\"\"Name\"\"\"\n   98 |         return gtk_safe(self._game_data[\"name\"])","lines":9,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/views/store_item.py#L90-L98"}]},{"id":"API_7","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"LogTextView.find_previous calls buffer_iter.backward_chars(...) and then uses\nbuffer_iter for backward_search, but Gtk.TextIter.backward_chars mutates the iter in place and\nreturns a bool (whether the move was fully possible), which is discarded. More importantly, the\nintent (\"go to the beginning of the searched string\" before searching backward) relies on the\nmark sitting at the END of the previous match; after find_next the mark is placed at\nnext_occurence[1] (match end), so backward_chars by len(text) lands inside/at the start of the\nalready-found match, causing find_previous to potentially re-find the same match instead of the\ntrue previous one.","fix":"Track search position consistently (store the match start as the mark, or move the iter strictly before the current match) so find_previous reliably steps to the prior occurrence.","locations":[{"ref":"lutris/gui/widgets/log_text_view.py:68-87","code":"   68 |     def find_previous(self, searched_entry: Gtk.SearchEntry) -> None:\n   69 |         # First go to the beginning of searched_entry string\n   70 |         buffer_iter = self.props.buffer.get_iter_at_mark(self.mark)\n   71 |         buffer_iter.backward_chars(len(searched_entry.get_text()))\n   72 | \n   73 |         previous_occurence = buffer_iter.backward_search(\n   74 |             searched_entry.get_text(), Gtk.TextSearchFlags.CASE_INSENSITIVE, None\n   75 |         )\n   76 | \n   77 |         # Found nothing ? Try from the end\n   78 |         if previous_occurence is None:\n   79 |             previous_occurence = self.props.buffer.get_end_iter().backward_search(\n   80 |                 searched_entry.get_text(), Gtk.TextSearchFlags.CASE_INSENSITIVE, None\n   81 |             )\n   82 | \n   83 |         # Highlight if result\n   84 |         if previous_occurence is not None:\n   85 |             self.highlight(previous_occurence[0], previous_occurence[1])\n   86 |             self.props.buffer.delete_mark(self.mark)\n   87 |             self.mark = self.create_new_mark(previous_occurence[1])","lines":20,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/log_text_view.py#L68-L87"}]},{"id":"API_8","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":false,"description":"NavigationStack._update_back_button unconditionally calls\nself.cancel_button.set_visible(...), but cancel_button defaults to None in __init__. Any\nNavigationStack constructed without a cancel_button (the documented default) raises\nAttributeError on the first call to set_back_allowed / navigate_* which all invoke\n_update_back_button.","fix":"Guard the cancel_button access: `if self.cancel_button: self.cancel_button.set_visible(...)`.","locations":[{"ref":"lutris/gui/widgets/navigation_stack.py:28-60","code":"   28 |     def __init__(self, back_button, cancel_button=None, **kwargs):\n   29 |         super().__init__(**kwargs)\n   30 | \n   31 |         self.back_button = back_button\n   32 |         self.cancel_button = cancel_button\n   33 |         self.page_factories = {}\n   34 |         self.stack_pages = {}\n   35 |         self.navigation_stack = []\n   36 |         self.navigation_exit_handler = None\n   37 |         self.current_page_presenter = None\n   38 |         self.current_navigated_page_presenter = None\n   39 |         self.back_allowed = True\n   40 |         self.cancel_allowed = True\n   41 | \n   42 |     def add_named_factory(self, name, factory):\n   43 |         \"\"\"This specifies the factory functioin for the page named;\n   44 |         this function takes no arguments, but returns the page's widget.\"\"\"\n   45 |         self.page_factories[name] = factory\n   46 | \n   47 |     def set_back_allowed(self, is_allowed=True):\n   48 |         \"\"\"This turns the back button off, or back on.\"\"\"\n   49 |         self.back_allowed = is_allowed\n   50 |         self._update_back_button()\n   51 | \n   52 |     def set_cancel_allowed(self, is_allowed=True):\n   53 |         \"\"\"This turns the back button off, or back on.\"\"\"\n   54 |         self.cancel_allowed = is_allowed\n   55 |         self._update_back_button()\n   56 | \n   57 |     def _update_back_button(self):\n   58 |         can_go_back = self.back_allowed and self.navigation_stack\n   59 |         self.back_button.set_visible(can_go_back)\n   60 |         self.cancel_button.set_visible(not can_go_back and self.cancel_allowed)","lines":33,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/navigation_stack.py#L28-L60"}]},{"id":"API_9","type":"api_misuse","type_label":"Api Misuse","severity":"medium","easy":true,"description":"ScriptingError is constructed as ScriptingError(message, key) where key is intended as diagnostic context, but ScriptingError.__init__(self, message, message_markup=None, faulty_data=None) binds the second positional argument to message_markup, not faulty_data. The same mistaken pattern (passing diagnostic data positionally instead of via faulty_data=) recurs in lutris/installer/commands.py at lines 290, 368, and 372. As a result the diagnostic value never appears via ScriptingError.__str__/faulty_data (which is what error_handler in errors.py uses to show details in the UI's ErrorDialog), and instead gets silently treated as Pango/GTK markup text, which could also raise a markup-parsing error if the value contains characters like '<' or '&'.","fix":"Pass the diagnostic value via the faulty_data keyword consistently, e.g. raise ScriptingError(_(\"Game config key must be a string\"), faulty_data=key) and likewise faulty_data=params / faulty_data=src_ref / faulty_data=dst_ref in commands.py.","locations":[{"ref":"lutris/installer/installer.py:244-245","code":"  244 |             if not isinstance(key, str):\n  245 |                 raise ScriptingError(_(\"Game config key must be a string\"), key)","lines":2,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/installer/installer.py#L244-L245"},{"ref":"lutris/installer/commands.py:290","code":"  290 |             raise ScriptingError(_(\"Source does not exist: %s\") % src, params)","lines":1,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/installer/commands.py#L290"},{"ref":"lutris/installer/commands.py:368","code":"  368 |             raise ScriptingError(_( W_MEDIA:\n   45 |             self.image_renderer = GridViewCellRendererImage()\n   46 |             self.media_column = Gtk.TreeViewColumn(\n   47 |                 \"\", self.image_renderer, media_paths=COL_MEDIA_PATHS, is_installed=COL_INSTALLED, game_id=COL_ID\n   48 |             )\n   49 |             self.media_column.set_reorderable(True)\n   50 |             self.media_column.set_sort_indicator(False)\n   51 |             self.media_column.set_sizing(Gtk.TreeViewColumnSizing.FIXED)\n   52 |             self.append_column(self.media_column)","lines":9,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/views/list.py#L44-L52"},{"ref":"lutris/gui/views/base.py:55-57","code":"   55 |     def on_missing_games_updated(self):\n   56 |         if self.image_renderer and self.image_renderer.show_badges:\n   57 |             self.queue_draw()","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/views/base.py#L55-L57"}]},{"id":"API_20","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"StockIconImage connects to the icon theme \"changed\" signal in _on_realize and\ndisconnects in _on_unrealize, but it uses Gtk.IconTheme.get_default() in both places. If the\ndefault icon theme object differs between realize and unrealize (it generally does not, but is\nprocess-global and could be swapped via load_icon_theme path manipulation), the disconnect\nwould target a different object and leak the handler. More practically, multiple realize/\nunrealize cycles are fine, but a widget realized but never unrealized (destroyed while\nrealized) leaks the connection because there is no 'destroy' cleanup.","fix":"Also disconnect on 'destroy', and cache the theme object connected to so the matching object is used for disconnect.","locations":[{"ref":"lutris/gui/widgets/stock_icon_image.py:42-52","code":"   42 |     def _on_realize(self, _widget: Gtk.Widget) -> None:\n   43 |         theme = Gtk.IconTheme.get_default()\n   44 |         self._theme_changed_handler_id = theme.connect(\"changed\", self._on_theme_changed)\n   45 | \n   46 |     def _on_unrealize(self, _widget: Gtk.Widget) -> None:\n   47 |         if self._theme_changed_handler_id:\n   48 |             Gtk.IconTheme.get_default().disconnect(self._theme_changed_handler_id)\n   49 |             self._theme_changed_handler_id = 0\n   50 | \n   51 |     def _on_theme_changed(self, _theme: Gtk.IconTheme) -> None:\n   52 |         self._reload_icon()","lines":11,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/stock_icon_image.py#L42-L52"}]},{"id":"API_21","type":"api_misuse","type_label":"Api Misuse","severity":"low","easy":false,"description":"UbisoftClient.get_configuration() calls self._do_request_safe(...) and then `.json()` on the result, but _do_request_safe() delegates to _do_request(), which already calls response.json() and returns the parsed dict. Calling .json() again on a plain dict raises AttributeError. The method appears unused elsewhere in the codebase (lutris/services/ubisoft.py has its own differently-named get_configurations()), so this is likely dead/untested code, but it is a genuine crash if ever invoked.","fix":"Return the already-parsed result directly: return self._do_request_safe(\"get\", \"https://uplaywebcenter.ubi.com/v1/configuration\")","locations":[{"ref":"lutris/util/ubisoft/client.py:294-296","code":"  294 |     def get_configuration(self):\n  295 |         response = self._do_request_safe(\"get\", \"https://uplaywebcenter.ubi.com/v1/configuration\")\n  296 |         return response.json()","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/ubisoft/client.py#L294-L296"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"high","easy":false,"description":"get_service_games() updates the module-global _SERVICE_CACHE_ACCESSED to time.time() before comparing it against the previous value, so the staleness check (_SERVICE_CACHE_ACCESSED - previous_cache_accessed > 1) actually measures the time between this call and the immediately preceding call, not the age of the cached data. For any two calls spaced more than one second apart (the normal case for UI-driven calls), this condition is always true, so the cache is rebuilt from the database on essentially every call, defeating the purpose of the cache entirely (a DB query and list comprehension over all installed games runs on practically every invocation).","fix":"Compare against the cache's own age recorded before the refresh, not the previous-call-to-this-call delta. E.g. only update _SERVICE_CACHE_ACCESSED inside the if-block after refreshing the cache: check 'time.time() - _SERVICE_CACHE_ACCESSED > 1' first (without overwriting), and only set _SERVICE_CACHE_ACCESSED = time.time() once the cache is actually rebuilt.","locations":[{"ref":"lutris/database/games.py:134-146","code":"  134 | def get_service_games(service: str) -> list[str]:\n  135 |     \"\"\"Return the list of all installed games for a service\"\"\"\n  136 |     global _SERVICE_CACHE_ACCESSED\n  137 |     previous_cache_accessed = _SERVICE_CACHE_ACCESSED or 0\n  138 |     _SERVICE_CACHE_ACCESSED = time.time()\n  139 |     if service not in _SERVICE_CACHE or _SERVICE_CACHE_ACCESSED - previous_cache_accessed > 1:\n  140 |         if service == \"lutris\":\n  141 |             _SERVICE_CACHE[service] = [game[\"slug\"] for game in get_games(filters={\"installed\": \"1\"})]\n  142 |         else:\n  143 |             _SERVICE_CACHE[service] = [\n  144 |                 game[\"service_id\"] for game in get_games(filters={\"service\": service, \"installed\": \"1\"})\n  145 |             ]\n  146 |     return _SERVICE_CACHE[service]","lines":13,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/database/games.py#L134-L146"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"medium","easy":false,"description":"update_missing_games_sidebar_row() calls self.get_missing_games(), which runs\ngames_db.get_games_by_ids(...), filter_games(...) and a full apply_view_sort over all\nmissing games, purely to decide whether the sidebar 'missing' row should be shown or\nhidden. It only needs to know whether any missing games exist. This is registered on\nMISSING_GAMES.updated and also called from refresh_view(), so the expensive build+sort\nruns on every refresh even when the result list is discarded.","fix":"Use a cheap existence check (e.g. bool(MISSING_GAMES.missing_game_ids) combined with a\nlightweight filtered count) to decide visibility, and only build the full sorted list when\nthe missing category is actually the selected view.","locations":[{"ref":"lutris/gui/lutriswindow.py:589-599","code":"  589 |     def update_missing_games_sidebar_row(self) -> None:\n  590 |         missing_games = self.get_missing_games()\n  591 |         if missing_games:\n  592 |             self.sidebar.missing_row.show()\n  593 |             if self.selected_category == (\"dynamic_category\", \"missing\"):\n  594 |                 self.update_store()\n  595 |         else:\n  596 |             missing_ids = MISSING_GAMES.missing_game_ids\n  597 |             if missing_ids:\n  598 |                 logger.warning(\"Path cache out of date? (%s IDs missing)\", len(missing_ids))\n  599 |             self.sidebar.missing_row.hide()","lines":11,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/lutriswindow.py#L589-L599"},{"ref":"lutris/gui/lutriswindow.py:585-587","code":"  585 |     def get_missing_games(self):\n  586 |         games = games_db.get_games_by_ids(MISSING_GAMES.missing_game_ids)\n  587 |         return self.apply_view_sort(self.filter_games(games))","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/lutriswindow.py#L585-L587"}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"WidgetGenerator._generate_choice calls expand_combobox_choices() once inside\npopulate_combobox_choices() (via line 475) and then again directly at line 489 to compute\nvalid_choices/expanded_choices. For every combobox option this iterates the (possibly evaluated)\nchoices twice, and if 'choices' is a callable it may have already been invoked once via\n_evaluate_option. The duplicate expansion is wasteful and risks inconsistency if the choices source\nis non-deterministic.","fix":"Call expand_combobox_choices() once, store its (expanded, tooltip_default, valid) result, and reuse\nit for both populating the liststore and computing valid_choices/active id.","locations":[{"ref":"lutris/gui/config/widget_generator.py:474-489","code":"  474 |         liststore = Gtk.ListStore(str, str)\n  475 |         populate_combobox_choices()\n  476 |         # With entry (\"choice_with_entry\" type)\n  477 |         if has_entry:\n  478 |             combobox = Gtk.ComboBox.new_with_model_and_entry(liststore)\n  479 |             combobox.set_entry_text_column(0)\n  480 |         # No entry (\"choice\" type)\n  481 |         else:\n  482 |             combobox = Gtk.ComboBox.new_with_model(liststore)\n  483 |             cell = Gtk.CellRendererText()\n  484 |             combobox.pack_start(cell, True)\n  485 |             combobox.add_attribute(cell, \"text\", 0)\n  486 | \n  487 |         combobox.set_id_column(1)\n  488 | \n  489 |         expanded_choices, _tooltip_default, valid_choices = expand_combobox_choices()","lines":16,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/widget_generator.py#L474-L489"}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"RunnerInstallDialog.on
