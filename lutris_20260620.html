<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
.project-info{margin-bottom:1rem;padding:.75rem .9rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.project-info .pi-name{font-size:.95rem;font-weight:700;color:#f1f5f9}
.project-info .pi-desc{font-size:.82rem;color:#cbd5e1;margin-top:.25rem}
.project-info .pi-row{display:flex;flex-wrap:wrap;gap:.4rem .9rem;margin-top:.45rem;font-size:.78rem;color:#94a3b8}
.project-info .pi-row .pi-k{color:#64748b}
.project-info a{color:#60a5fa;text-decoration:none}
.project-info a:hover{text-decoration:underline}
.project-info code{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.74rem;color:#93c5fd}
.pi-repo-btn{display:inline-flex;align-items:center;gap:.3rem;padding:.18rem .5rem;background:#0f172a;border:1px solid #3b82f6;border-radius:6px;color:#60a5fa !important;font-weight:600}
.pi-repo-btn:hover{background:#1d283a;text-decoration:none !important}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.easy-badge{background:#052e16;color:#86efac;border-color:#16a34a}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
a.loc-link{color:inherit;text-decoration:none}
a.loc-link:hover{text-decoration:underline}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","easy":true,"description":"is_config_dark getter/setter on StyleManager reference self._is_config_dark, but this attribute is never declared as a class attribute (unlike _preferred_theme, _system_theme, _is_dark which are) and is never set in __init__. The getter raises AttributeError if read before the setter is ever called, and the setter's own equality check (self._is_config_dark == is_config_dark) raises AttributeError on the very first call since the attribute does not exist yet.","fix":"Add _is_config_dark = False as a class attribute alongside the other _* defaults (_preferred_theme, _system_theme, _is_dark) so the getter and the setter's equality check have a valid initial value.","locations":[{"ref":"lutris/style_manager.py:101-113","code":"  101 |     @property\n  102 |     def is_config_dark(self) -> bool:\n  103 |         \"\"\"True if we override light mode to be dark; if we're\n  104 |         defaulting to dark, this does nothing.\"\"\"\n  105 |         return self._is_config_dark\n  106 | \n  107 |     @is_config_dark.setter  # type: ignore\n  108 |     def is_config_dark(self, is_config_dark: bool) -> None:\n  109 |         if self._is_config_dark == is_config_dark:\n  110 |             return\n  111 | \n  112 |         self._is_config_dark = is_config_dark\n  113 |         self._update_is_dark()","lines":13,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/style_manager.py#L101-L113"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"medium","easy":false,"description":"on_installer_selected searches self.installers for a matching version and leaves script=None\nif none matches (installerwindow.py:418-421). It then passes script straight into\nScriptInterpreter(script, self) with no guard. If installer_version does not match any\nscript (e.g. signal carries an unexpected value), script is None and the interpreter\nconstructor will fail on a None script, throwing inside a clicked handler rather than a\nclean error.","fix":"After the loop, if script is None raise a ScriptingError (or break and handle) instead of constructing the interpreter with None; also break out of the loop on first match.","locations":[{"ref":"lutris/gui/installerwindow.py:417-422","code":"  417 |         try:\n  418 |             script = None\n  419 |             for _script in self.installers:\n  420 |                 if _script[\"version\"] == installer_version:\n  421 |                     script = _script\n  422 |             self.interpreter = interpreter.ScriptInterpreter(script, self)","lines":6,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/installerwindow.py#L417-L422"}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"low","easy":true,"description":"GPUInfo.get_vulkaninfo() builds result[current_gpu][...] for lines containing \"= \", but current_gpu is only assigned when a prior line starts with \"GPU\". If vulkaninfo's --summary output ever contains a \"key = value\" line before any \"GPU\" line is seen (within the \"Devices:\" section), current_gpu is referenced before assignment, raising NameError/UnboundLocalError and aborting GPU info collection.","fix":"Initialize current_gpu = None before the loop and guard the elif branch:\nelif current_gpu is not None and \"= \" in line:\n    key, value = line.split(\"= \", maxsplit=1)\n    result[current_gpu][key.strip()] = value.strip()","locations":[{"ref":"lutris/util/graphics/gpu.py:166-182","code":"  166 |         result = {}\n  167 |         devices_seen = False\n  168 |         for line in vulkaninfo_output:\n  169 |             line = line.strip()\n  170 |             if not line or line.startswith(\"===\"):\n  171 |                 continue\n  172 |             if line == \"Devices:\":\n  173 |                 devices_seen = True\n  174 |                 continue\n  175 |             if not devices_seen:\n  176 |                 continue\n  177 |             if line.startswith(\"GPU\"):\n  178 |                 current_gpu = line\n  179 |                 result[current_gpu] = {}\n  180 |             elif \"= \" in line:\n  181 |                 key, value = line.split(\"= \", maxsplit=1)\n  182 |                 result[current_gpu][key.strip()] = value.strip()","lines":17,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/graphics/gpu.py#L166-L182"}]},{"id":"MEM_1","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"GOGDownloader creates self._parallel_session = requests.Session() configured with an HTTPAdapter (pool_maxsize=...) for parallel chunk downloads, but never closes it. The base downloader's _release_resources() is a no-op and GOGDownloader does not override it to close _parallel_session. Each GOG download (especially large games using parallel workers) leaks a Session object and its underlying connection pool / sockets until garbage collection happens to run.","fix":"Override _release_resources() in GOGDownloader to close the session:\ndef _release_resources(self):\n    if self._parallel_session:\n        self._parallel_session.close()\n    super()._release_resources()","locations":[{"ref":"lutris/util/gog_downloader.py:70-90","code":"   70 |         # Pipelining: bounded queue decouples download I/O from disk writes\n   71 |         self._write_queue: queue.Queue = queue.Queue(maxsize=64)\n   72 |         self._writer_error: Exception | None = None\n   73 |         self._writer_error_event = threading.Event()\n   74 |         # Create a dedicated session with connection pooling sized for our workers\n   75 |         self._parallel_session = requests.Session()\n   76 |         adapter = HTTPAdapter(pool_maxsize=self.num_workers + 2)\n   77 |         self._parallel_session.mount(\"https://\", adapter)\n   78 |         self._parallel_session.mount(\"http://\", adapter)\n   79 |         self._parallel_session.headers[\"User-Agent\"] = \"Lutris/%s\" % __version__\n   80 | \n   81 |     def __repr__(self):\n   82 |         return \"GOG parallel downloader (%d workers) for %s\" % (self.num_workers, self.url)\n   83 | \n   84 |     @property\n   85 |     def _log_name(self) -> str:\n   86 |         return \"GOG parallel (%d workers): %s\" % (self.num_workers, self.url)\n   87 | \n   88 |     def _prepare_destination(self) -> None:\n   89 |         \"\"\"Detect resumable progress, or clear stale files for a fresh start.\n   90 | ","lines":21,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/gog_downloader.py#L70-L90"}]},{"id":"MEM_2","type":"memory_leak","type_label":"Memory Leak","severity":"medium","easy":false,"description":"CabInstaller.__init__ unconditionally creates self.tmpdir = tempfile.mkdtemp(). cleanup() (which removes it via shutil.rmtree) is only called at the very end of install(), after extract_from_cab/get_registry_files/apply_to_registry have all succeeded. If any of those steps raises partway through, install() propagates the exception without ever calling cleanup(), leaking the temporary directory (and any partially-extracted cab contents) on every error path.","fix":"Wrap the body of install() in try/finally so cleanup() always runs:\ndef install(self):\n    try:\n        ...existing steps...\n    finally:\n        self.cleanup()","locations":[{"ref":"lutris/util/wine/cabinstall.py:21-51","code":"   21 |         self.tmpdir = tempfile.mkdtemp()\n   22 |         self.wine_path = wine_path\n   23 | \n   24 |         self.register_dlls = False  # Whether to register DLLs, I don't the purpose of that\n   25 |         self.strip_dlls = False  # When registering, strip the full path\n   26 | \n   27 |     @staticmethod\n   28 |     def process_key(key):\n   29 |         \"\"\"I have no clue why\"\"\"\n   30 |         return key.strip(\"\\\\\").replace(\"HKEY_CLASSES_ROOT\", \"HKEY_LOCAL_MACHINE\\\\Software\\\\Classes\")\n   31 | \n   32 |     @staticmethod\n   33 |     def get_arch_from_manifest(root):\n   34 |         registry_keys = root.findall(\"{urn:schemas-microsoft-com:asm.v3}assemblyIdentity\")\n   35 |         arch = registry_keys[0].attrib[\"processorArchitecture\"]\n   36 |         arch_map = {\"amd64\": \"win64\", \"x86\": \"win32\", \"wow64\": \"wow64\"}\n   37 |         return arch_map[arch]\n   38 | \n   39 |     def get_winebin(self, arch):\n   40 |         wine_path = self.wine_path or \"wine\"\n   41 |         return wine_path if arch in (\"win32\", \"wow64\") else wine_path + \"64\"\n   42 | \n   43 |     @staticmethod\n   44 |     def get_arch_from_dll(dll_path):\n   45 |         if \"x86-64\" in read_process_output([\"file\", dll_path]):\n   46 |             return \"win64\"\n   47 |         return \"win32\"\n   48 | \n   49 |     def cleanup(self):\n   50 |         logger.info(\"Cleaning up %s\", self.tmpdir)\n   51 |         shutil.rmtree(self.tmpdir)","lines":31,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/wine/cabinstall.py#L21-L51"}]},{"id":"MEM_3","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"execute_command creates a new GLib.MainLoop and runs it, but on KeyboardInterrupt only calls\nmonitored_command.stop(); the MainLoop is never quit/cleaned and the function returns while the\ncommand may still be tearing down. Since this is a one-shot CLI path the impact is small, but a\nfresh MainLoop() each call plus no quit() on the loop is sloppy and can leave the loop running if\nthe command exits by another path.","fix":"Hold a reference to the loop, quit() it from the monitored command's completion\ncallback, and ensure it is quit in the KeyboardInterrupt/finally path.","locations":[{"ref":"lutris/gui/application.py:994-1004","code":"  994 |     @staticmethod\n  995 |     def execute_command(command: str) -> None:\n  996 |         \"\"\"Execute an arbitrary command in a Lutris context\n  997 |         with the runtime enabled and monitored by a MonitoredCommand\n  998 |         \"\"\"\n  999 |         logger.info(\"Running command '%s'\", command)\n 1000 |         monitored_command = exec_command(command)\n 1001 |         try:\n 1002 |             GLib.MainLoop().run()\n 1003 |         except KeyboardInterrupt:\n 1004 |             monitored_command.stop()","lines":11,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/application.py#L994-L1004"}]},{"id":"MEM_4","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"GameInfoBox.on_custom_image_download_clicked downloads to a tmp file and intentionally does not delete\nit (relying on init_dirs cleanup at next startup, per the comment). If save_custom_media decides the\nfile does not match any destination path or transcoding fails, the tmp file persists until the next\nlaunch. Over many failed/aborted downloads in one session, tmp files accumulate. This is documented as\nintentional but is still an unbounded-within-session leak.","fix":"Clean up the tmp file after save_custom_media completes (or on download/transcode failure) rather than\ndeferring all cleanup to the next startup.","locations":[{"ref":"lutris/gui/config/game_info_box.py:499-524","code":"  499 |         # This tmp file is consumed asynchronously by save_custom_media's\n  500 |         # async chains (copy or transcode), so we can't delete it here.\n  501 |         # Leftover tmp files are cleaned up on next startup in init_dirs().\n  502 |         file_id = uuid.uuid4()\n  503 |         tmp_file = os.path.join(settings.TMP_DIR, f\"download-{file_id}.tmp\")\n  504 |         logger.info(f\"Downloading custom image from `{url}` to `{tmp_file}`\")\n  505 | \n  506 |         def download():\n  507 |             with requests.get(url, stream=True) as r:\n  508 |                 if not r.ok:\n  509 |                     logger.error(\n  510 |                         f\"Request returned a status code that didn't indicate success: `{url}` (`{r.status_code}`)\"\n  511 |                     )\n  512 |                     return\n  513 |                 with open(tmp_file, \"wb\") as fp:\n  514 |                     for chunk in r.iter_content(chunk_size=8196):\n  515 |                         if chunk:\n  516 |                             fp.write(chunk)\n  517 | \n  518 |             self.save_custom_media(image_type, tmp_file)\n  519 | \n  520 |         def download_cb(_result, error):\n  521 |             if error:\n  522 |                 raise error\n  523 | \n  524 |         AsyncCall(download, download_cb)","lines":26,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/game_info_box.py#L499-L524"}]},{"id":"MEM_5","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"WebConnectDialog creates a fresh WebKit2.WebContext per dialog and never tears it down; on_destroy\nonly resets service.is_login_in_progress. The webview and its WebContext (with cookie manager and\npersistent storage) are not explicitly released, so repeated open/close cycles of the login dialog\ncan accumulate WebKit contexts/processes.","fix":"Explicitly destroy/unparent the webview and drop the WebContext reference in on_destroy, allowing\nWebKit to reclaim the associated process and resources.","locations":[{"ref":"lutris/gui/dialogs/webconnect_dialog.py:36-37","code":"   36 |         self.context: WebKit2.WebContext = WebKit2.WebContext.new()\n   37 | ","lines":2,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/webconnect_dialog.py#L36-L37"},{"ref":"lutris/gui/dialogs/webconnect_dialog.py:99-100","code":"   99 |     def on_destroy(self, _widget):\n  100 |         self.service.is_login_in_progress = False","lines":2,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/webconnect_dialog.py#L99-L100"}]},{"id":"MEM_6","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"load_finish_install_page connects a 'focus-in-event' handler (on_window_focus) every time\nthe page loads while the window is not active (installerwindow.py:1025-1027). on_window_focus\nclears the urgency hint but never disconnects itself, so the handler stays connected for the\nwindow's lifetime and fires on every subsequent focus-in. Minor, but it is an\naccumulating/never-removed signal connection.","fix":"Disconnect the focus-in-event handler inside on_window_focus after clearing the urgency hint, or guard against connecting it more than once.","locations":[{"ref":"lutris/gui/installerwindow.py:1025-1027","code":" 1025 |         if not self.is_active():\n 1026 |             self.set_urgency_hint(True)  # Blink in taskbar\n 1027 |             self.connect(\"focus-in-event\", self.on_window_focus)","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/installerwindow.py#L1025-L1027"},{"ref":"lutris/gui/installerwindow.py:1047-1049","code":" 1047 |     def on_window_focus(self, _widget, *_args):\n 1048 |         \"\"\"Remove urgency hint (flashing indicator) when window receives focus\"\"\"\n 1049 |         self.set_urgency_hint(False)","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/installerwindow.py#L1047-L1049"}]},{"id":"MEM_7","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"SearchableEntrybox.repopulate replaces self.popup_menu with a brand-new\nGtk.Menu() but never destroys the old menu nor disconnects the MenuItem 'activate' handlers\ncreated in _populate_entrybox_choices. The old menu and its items (which hold TPError the raised error object itself wraps an open file-like response that is never closed. Impact is limited since these are short-lived per-call connections that Python's GC will eventually clean up, but it leaves sockets open longer than necessary and is inconsistent with proper resource handling elsewhere.","fix":"Use urlopen as a context manager so the response is always closed:\nwith urllib.request.urlopen(req, timeout=CLOUD_API_TIMEOUT) as response:\n    response_body = response.read()\n    response_headers = {k: v for k, v in response.getheaders()}\nreturn response_body, response_headers\nAlso close error.fp / use `with` around the except urllib.error.HTTPError handling if the body isn't needed.","locations":[{"ref":"lutris/services/gog_cloud.py:178-193","code":"  178 |         req = urllib.request.Request(url=url, data=data, headers=headers, method=method)\n  179 |         try:\n  180 |             response = urllib.request.urlopen(req, timeout=CLOUD_API_TIMEOUT)\n  181 |             response_body = response.read()\n  182 |             response_headers = {k: v for k, v in response.getheaders()}\n  183 |             response.close()\n  184 |             return response_body, response_headers\n  185 |         except urllib.error.HTTPError as error:\n  186 |             if error.code == 404:\n  187 |                 return b\"\", {}\n  188 |             raise HTTPError(\n  189 |                 \"Cloud storage API error: %s %s -> %s\" % (method, url, error),\n  190 |                 code=error.code,\n  191 |             ) from error\n  192 |         except (urllib.error.URLError, OSError) as error:\n  193 |             raise HTTPError(\"Cloud storage connection error: %s\" % error) from error","lines":16,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/services/gog_cloud.py#L178-L193"}]},{"id":"MEM_9","type":"memory_leak","type_label":"Memory Leak","severity":"low","easy":false,"description":"TrashPortal._trash_next_file() opens a file descriptor with os.open(file_path, flags) and appends it to a Gio.UnixFDList via fds_in.append(file_handle). Gio.UnixFDList.append() dup()s the descriptor internally rather than taking ownership of the original, so file_handle itself is never os.close()'d. Every file moved to trash through the D-Bus trash portal leaks one file descriptor. Individually cheap, but accumulates across bulk trash operations and can eventually exhaust the process's fd limit.","fix":"Close the original descriptor after handing it to the FD list:\nfile_handle = os.open(file_path, flags)\ntry:\n    fds_in.append(file_handle)\n    self._dbus_proxy.call_with_unix_fd_list(...)\nfinally:\n    os.close(file_handle)","locations":[{"ref":"lutris/util/portals.py:70-82","code":"   70 |         try:\n   71 |             fds_in = Gio.UnixFDList.new()\n   72 |             flags = os.O_RDONLY | os.O_PATH | os.O_CLOEXEC\n   73 |             # You'd think you could use O_NOFOLLOW for any file, but\n   74 |             # I find TrashFile fails. We don't want to trash the link target\n   75 |             # in any case.\n   76 |             if os.path.islink(file_path):\n   77 |                 flags |= os.O_NOFOLLOW\n   78 |             file_handle = os.open(file_path, flags)\n   79 |             fds_in.append(file_handle)\n   80 | \n   81 |             self._dbus_proxy.call_with_unix_fd_list(\n   82 |                 \"TrashFile\",","lines":13,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/portals.py#L70-L82"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"EditCategoryGamesDialog matches checkboxes back to games by game *name* via\ngames_db.get_game_by_field(label, 'name'). Game names are not unique (two installed games can share a\ndisplay name), so on_save can resolve a checkbox to the wrong game id, or to an arbitrary one of\nseveral games sharing the name. This silently assigns/removes category membership on the wrong game.\nThe dialog also builds its checkbox list from self.available_games by name but stores no game id with\nthe checkbox, making correct round-tripping impossible.","fix":"Store the game id on each checkbox (e.g. as an attribute or in a dict keyed by checkbox) when\nbuilding the list, and use that id in on_save instead of looking the game up by name.","locations":[{"ref":"lutris/gui/config/edit_category_games.py:49-64","code":"   49 |     def _create_games_checkboxes(self):\n   50 |         frame = Gtk.Frame()\n   51 |         sw = Gtk.ScrolledWindow()\n   52 |         row = Gtk.VBox()\n   53 |         category_games_names = sorted([x.name for x in self.category_games.values()])\n   54 |         for game in self.available_games:\n   55 |             label = game.name\n   56 |             checkbutton_option = Gtk.CheckButton(label)\n   57 |             if label in category_games_names:\n   58 |                 checkbutton_option.set_active(True)\n   59 |             self.grid.attach_next_to(checkbutton_option, None, Gtk.PositionType.BOTTOM, 3, 1)\n   60 | \n   61 |         row.pack_start(self.grid, True, True, 0)\n   62 |         sw.add_with_viewport(row)\n   63 |         frame.add(sw)\n   64 |         return frame","lines":16,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/edit_category_games.py#L49-L64"},{"ref":"lutris/gui/config/edit_category_games.py:99-111","code":"   99 |         for game_checkbox in self.grid.get_children():\n  100 |             label = game_checkbox.get_label()\n  101 |             db_game = games_db.get_game_by_field(label, \"name\")\n  102 |             if not db_game:\n  103 |                 continue\n  104 |             game_id = db_game[\"id\"]\n  105 |             if game_checkbox.get_active():\n  106 |                 checked_game_ids.add(game_id)\n  107 |             else:\n  108 |                 unchecked_game_ids.add(game_id)\n  109 | \n  110 |         added_game_ids = checked_game_ids - category_games_ids\n  111 |         removed_game_ids = unchecked_game_ids & category_games_ids","lines":13,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/edit_category_games.py#L99-L111"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"DownloadQueue.start() with a 'wait_for' set defers the start and returns True without\nreserving 'operation_name' in self.running_operation_names. The whole point of\noperation_name is to prevent duplicate queued work (the docstring says \"If the name is\npresent already, this method does nothing but returns False\"). But while an operation is\ndeferred via the DOWNLOAD_QUEUE_COMPLETED registration, its name is NOT recorded, so a\nsecond call to start() with the same operation_name and the same wait_for will register a\nSECOND deferred start instead of being rejected. When the blocking operations finish, both\ndeferred starts fire and the duplicate-prevention check inside start_multiple() may or may\nnot catch them depending on timing (both could pass the isdisjoint check before either\nupdates the set). This can launch the same operation twice.","fix":"Reserve the operation name(s) before deferring (e.g. add operation_name to\nrunning_operation_names when registering the deferred callback, and remove it if the\ndeferred start is ever abandoned), or check running_operation_names plus a separate\n'deferred names' set before registering a new deferred start so duplicates are rejected\nwith False as documented.","locations":[{"ref":"lutris/gui/download_queue.py:123-138","code":"  123 |         if wait_for and not self.running_operation_names.isdisjoint(wait_for):\n  124 |             # Defer the entire start (including the progress box) until the\n  125 |             # blocking operations complete.\n  126 |             def on_maybe_ready():\n  127 |                 if self.running_operation_names.isdisjoint(wait_for):\n  128 |                     registration.unregister()\n  129 |                     self.start(\n  130 |                         operation,\n  131 |                         progress_function,\n  132 |                         completion_function=completion_function,\n  133 |                         error_function=error_function,\n  134 |                         operation_name=operation_name,\n  135 |                     )\n  136 | \n  137 |             registration = DOWNLOAD_QUEUE_COMPLETED.register(on_maybe_ready)\n  138 |             return True","lines":16,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/download_queue.py#L123-L138"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"When the file provider is \"steam\", self.stop_func is set to steam_installer.stop_func\n(file_box.py:80) at widget-construction time. At that moment SteamInstaller.stop_func is\nstill None (it is only assigned the real cancel lambda inside install_steam_game(), see\nsteam_installer.py:77). Because Python binds the value (None), not the attribute, the\nInstallerFileBox keeps stop_func = None forever. Consequently InstallerFilesBox.stop_all()\n(files_box.py:77, guarded by 'file_box.stop_func is not None') can never cancel/clean up an\nin-progress Steam install when the user aborts.","fix":"Store the installer and call it indirectly, e.g. self.stop_func = lambda: steam_installer.stop_func and steam_installer.stop_func(), or assign self.steam_installer = steam_installer and have stop_all invoke a method that defers to the live attribute.","locations":[{"ref":"lutris/gui/installer/file_box.py:79-80","code":"   79 |             self.start_func = steam_installer.install_steam_game\n   80 |             self.stop_func = steam_installer.stop_func","lines":2,"link":"https://github.com/lutris/lutris/blob/846f2c28e972    if path is not None:\n  114 |             return self.store[path]","lines":6,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/views/store.py#L109-L114"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"LutrisStatusIcon.on_activate dereferences self.application.window without a\nNone check (app_window.get_visible()), unlike update_present_menu which checks `if app_window`.\nIf the tray icon is activated while the main window does not yet exist (e.g. during startup or\nafter window destruction), this raises AttributeError on None.","fix":"Add an `if not app_window: return` guard at the start of on_activate, mirroring update_present_menu.","locations":[{"ref":"lutris/gui/widgets/status_icon.py:115-128","code":"  115 |     def on_activate(self, _status_icon, _event=None):\n  116 |         \"\"\"Callback to show or hide the window\"\"\"\n  117 |         app_window = self.application.window\n  118 |         if app_window.get_visible():\n  119 |             # If the window has any transients, hiding it will hide them too\n  120 |             # never to be shown again, which is broken. So we don't allow that.\n  121 |             windows = Gtk.Window.list_toplevels()\n  122 |             for w in windows:\n  123 |                 if w.get_visible() and w.get_transient_for() == app_window:\n  124 |                     return\n  125 | \n  126 |             app_window.hide()\n  127 |         else:\n  128 |             app_window.show()","lines":14,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/status_icon.py#L115-L128"},{"ref":"lutris/gui/widgets/status_icon.py:107-113","code":"  107 |     def update_present_menu(self):\n  108 |         app_window = self.application.window\n  109 |         if app_window and self.present_menu:\n  110 |             if app_window.get_visible():\n  111 |                 self.present_menu.set_label(_(\"Hide Lutris\"))\n  112 |             else:\n  113 |                 self.present_menu.set_label(_(\"Show Lutris\"))","lines":7,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/status_icon.py#L107-L113"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"pico8.py's prelaunch() only short-circuits when main_file is falsy AND the runner is already installed (line 141: \"if not self.game_config.get(\\\"main_file\\\") and self.is_installed(): return True\"). If main_file is empty/None and the runner is NOT yet installed, execution falls through to line 147, which calls self.game_config.get(\"main_file\").startswith(\"http\") on a None value, raising AttributeError. The same unguarded .startswith()/.isdigit() pattern on a possibly-None main_file also exists in the cart_path property (lines 98-103).","fix":"Guard against a missing main_file independent of installation state, e.g. \"if not self.game_config.get(\\\"main_file\\\"): return True\" (or raise a clear error), and add a None-check at the top of cart_path before calling string methods on main_file.","locations":[{"ref":"lutris/runners/pico8.py:140-150","code":"  140 |     def prelaunch(self):\n  141 |         if not self.game_config.get(\"main_file\") and self.is_installed():\n  142 |             return True\n  143 |         if os.path.exists(os.path.join(settings.RUNNER_DIR, \"pico8/cartridges\", \"tmp.p8.png\")):\n  144 |             os.remove(os.path.join(settings.RUNNER_DIR, \"pico8/cartridges\", \"tmp.p8.png\"))\n  145 | \n  146 |         # Don't download cartridge if using web backend and cart is url\n  147 |         if self.is_native or not self.game_config.get(\"main_file\").startswith(\"http\"):\n  148 |             if not os.path.exists(self.game_config.get(\"main_file\")) and (\n  149 |                 self.game_config.get(\"main_file\").isdigit() or self.game_config.get(\"main_file\").startswith(\"http\")\n  150 |             ):","lines":11,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/pico8.py#L140-L150"},{"ref":"lutris/runners/pico8.py:96-103","code":"   96 |     @property\n   97 |     def cart_path(self):\n   98 |         main_file = self.game_config.get(\"main_file\")\n   99 |         if self.is_native and main_file.startswith(\"http\"):\n  100 |             return os.path.join(settings.RUNNER_DIR, \"pico8/cartridges\", \"tmp.p8.png\")\n  101 |         if not os.path.exists(main_file) and main_file.isdigit():\n  102 |             return os.path.join(settings.RUNNER_DIR, \"pico8/cartridges\", main_file + \".p8.png\")\n  103 |         return main_file","lines":8,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/runners/pico8.py#L96-L103"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"GOGCloudSync.sync_saves() handles \"trivial cases\" (Step 7, when one side has files and the other is completely empty) by immediately performing the action and returning, BEFORE Step 9 evaluates the caller-supplied `preferred_action` override/guard. Concretely: if `local_files` is non-empty and `cloud_files` is empty, the code unconditionally uploads everything and returns at line 894 - even if the caller passed `preferred_action=\"download\"`. gog_cloud_hooks.py's sync_before_launch() always calls _sync_location with preferred_action=\"download\" specifically to prevent uploads before a game starts. With an empty/wiped cloud save (e.g. first run on a new GOG Galaxy cloud account, or after the cloud save was cleared), pre-launch sync will silently UPLOAD all local files instead of refusing, bypassing the safety guard at lines 928-931 that exists for exactly this scenario. This can overwrite intended cloud state with stale/wrong local saves without the user's consent.","fix":"Apply the preferred_action guard before/within the trivial-case handling too, e.g. check `preferred_action == \"download\"` before uploading in the local-only branch (and vice versa for the cloud-only branch), refusing and returning SyncAction.NONE just like Step 9 does:\nif local_files and not cloud_files:\n    if preferred_action == \"download\":\n        logger.warning(\"Refused to upload: download requested but no cloud files exist\")\n        result.action = SyncAction.NONE\n        return result\n    ...","locations":[{"ref":"lutris/services/gog_cloud.py:882-931","code":"  882 |         # Step 7: Handle trivial cases\n  883 |         if local_files and not cloud_files:\n  884 |             logger.info(\"No files in cloud, uploading all local files\")\n  885 |             action = SyncAction.UPLOAD\n  886 |             for i, f in enumerate(local_files):\n  887 |                 if progress_callback:\n  888 |                     progress_callback(i, len(local_files), f.relative_path)\n  889 |                 if client.upload_file(f, location_name):\n  890 |                     result.uploaded.append(f.relative_path)\n  891 |             result.action = action\n  892 |             result.timestamp = datetime.datetime.now().timestamp()\n  893 |             self.set_sync_timestamp(game_id, location_name, result.timestamp)\n  894 |             return result\n  895 | \n  896 |         if not local_files and cloud_files:\n  897 |             logger.info(\"No local files, downloading all cloud files\")\n  898 |             action = SyncAction.DOWNLOAD\n  899 |             for i, f in enumerate(downloadable_cloud):\n  900 |                 if progress_callback:\n  901 |                     progress_callback(i, len(downloadable_cloud), f.relative_path)\n  902 |                 if client.download_file(f, location_name):\n  903 |                     result.downloaded.append(f.relative_path)\n  904 |             result.action = action\n  905 |             result.timestamp = datetime.datetime.now().timestamp()\n  906 |             self.set_sync_timestamp(game_id, location_name, result.timestamp)\n  907 |             return result\n  908 | \n  909 |         # Step 8: Classify sync direction\n  910 |         timestamp = self.get_sync_timestamp(game_id, location_name)\n  911 |         classifier = SyncClassifier.classify(local_files, cloud_files, timestamp)\n  912 |         action = classifier.get_action()\n  913 | \n  914 |         # Step 9: Handle preferred action overrides\n  915 |         if preferred_action:\n  916 |             if preferred_action == \"forceupload\":\n  917 |                 logger.warning(\"Forcing upload\")\n  918 |                 classifier.updated_local = local_files\n  919 |                 action = SyncAction.UPLOAD\n  920 |             elif preferred_action == \"forcedownload\":\n  921 |                 logger.warning(\"Forcing download\")\n  922 |                 classifier.updated_cloud = downloadable_cloud\n  923 |                 action = SyncAction.DOWNLOAD\n  924 |             elif preferred_action == \"upload\" and action == SyncAction.DOWNLOAD:\n  925 |                 logger.warning(\"Refused to upload: newer files in cloud\")\n  926 |                 result.action = SyncAction.NONE\n  927 |                 return result\n  928 |             elif preferred_action == \"download\" and action == SyncAction.UPLOAD:\n  929 |                 logger.warning(\"Refused to download: newer files locally\")\n  930 |                 result.action = SyncAction.NONE\n  931 |                 return result","lines":50,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/services/gog_cloud.py#L882-L931"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"In lutris.py's sync_media(), the loop that resolves alias slugs mutates game[\"slug\"] in place while iterating, then immediately re-derives a lookup key from the just-mutated value: `game[\"slug\"] = alias_map[game[\"slug\"]]` is executed inside a loop over `used_alias_slugs`, but `alias_map` is keyed by the games' ORIGINAL slugs. Once a game's slug is overwritten, any later match against the same game in the same or a subsequent outer iteration looks the new (already-renamed) slug up in alias_map, which was never populated for that value. This can raise KeyError or silently produce wrong/no media downloads for games that have multiple matching alias entries. The trailing `continue` is also dead code since it's the last statement in its loop body and changes nothing.","fix":"Don't mutate game[\"slug\"] while it's still being used as a dict key for further lookups. Compute the final slug into a separate variable / new dict, or break out of the inner loop once a game is renamed:\nfor alias_slug in used_alias_slugs:\n    for game in games:\n        original_slug = game[\"slug\"]\n        if alias_slug in [alias[\"slug\"] for alias in game[\"aliases\"]]:\n            game[\"slug\"] = alias_map[original_slug]\n            break","locations":[{"ref":"lutris/services/lutris.py:216-229","code":"  216 |     alias_map = {}\n  217 |     api_slugs = set()\n  218 |     for game in games:\n  219 |         api_slugs.add(game[\"slug\"])\n  220 |         for alias in game[\"aliases\"]:\n  221 |             if alias[\"slug\"] in slugs_to_download:\n  222 |                 alias_map[game[\"slug\"]] = alias[\"slug\"]\n  223 |     alias_slugs = set(alias_map.values())\n  224 |     used_alias_slugs = alias_slugs - api_slugs\n  225 |     for alias_slug in used_alias_slugs:\n  226 |         for game in games:\n  227 |             if alias_slug in [alias[\"slug\"] for alias in game[\"aliases\"]]:\n  228 |                 game[\"slug\"] = alias_map[game[\"slug\"]]\n  229 |                 continue","lines":14,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/services/lutris.py#L216-L229"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"high","easy":true,"description":"DolphinCacheReader.get_games() loops `while self.offset < len(self.cache_content):` and calls self.get_game() inside a try/except that logs and swallows any exception, but self.offset is never advanced when an exception occurs. If get_game() ever raises partway through parsing (corrupted or unexpected GameCube/Wii cache file structure), the loop condition stays true forever with the same offset, causing an infinite loop that hangs the application (or floods the log indefinitely) instead of skipping the bad entry or aborting.","fix":"Advance the offset (or break) on failure so the loop can't spin forever:\nwhile self.offset < len(self.cache_content):\n    start_offset = self.offset\n    try:\n        games.append(self.get_game())\n    except Exception as ex:\n        logger.error(\"Failed to read Dolphin database: %s\", ex)\n        break  # or advance self.offset past the bad record\n    if self.offset == start_offset:\n        break  # safety net against any non-advancing path","locations":[{"ref":"lutris/util/dolphin/cache_reader.py:90-98","code":"   90 |     def get_games(self):\n   91 |         self.offset += self.header_size\n   92 |         games = []\n   93 |         while self.offset < len(self.cache_content):\n   94 |             try:\n   95 |                 games.append(self.get_game())\n   96 |             except Exception as ex:\n   97 |                 logger.error(\"Failed to read Dolphin database: %s\", ex)\n   98 |         return games","lines":9,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/dolphin/cache_reader.py#L90-L98"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"high","easy":false,"description":"DLLManager.upgrade() iterates candidate versions to find one that downloads and is compatible, but never assigns the loop variable to self._version (the property self.download() actually uses). Each iteration calls self.download() using whatever self._version already was, so it downloads the same version repeatedly (or the wrong one) instead of trying each candidate from `versions` in turn. The compatibility check `self.is_compatible_version(version)` does use the loop variable, so the loop can spin through all versions, redownloading the identical file each time, and may never actually try the versions it logs (\"Downloading %s %s...\", human_name, version) as being downloaded.","fix":"Set self._version = version (or equivalent) before calling self.download() inside the loop, e.g.:\nfor version in versions:\n    self._version = version\n    logger.info(\"Downloading %s %s...\", self.human_name, version)\n    self.download()\n    if self.is_compatible_version(version):\n        return","locations":[{"ref":"lutris/util/wine/dll_manager.py:321-343","code":"  321 |     def upgrade(self):\n  322 |         if not self.is_available():\n  323 |             versions = self.load_versions()\n  324 | \n  325 |             if not versions:\n  326 |                 logger.warning(\"Unable to download %s because version information was not available.\", self.human_name)\n  327 | \n  328 |             # We prefer recommended versions, so download those first.\n  329 |             versions.sort(key=self.is_recommended_version, reverse=True)\n  330 | \n  331 |             for version in versions:\n  332 |                 logger.info(\"Downloading %s %s...\", self.human_name, version)\n  333 |                 self.download()\n  334 | \n  335 |                 if self.is_compatible_version(version):\n  336 |                     return  # got a compatible version, that'll do.\n  337 | \n  338 |                 logger.warning(\n  339 |                     \"Version %s of %s is not compatible with this version of Lutris.\", version, self.human_name\n  340 |                 )\n  341 | \n  342 |             # We found nothing compatible, and downloaded everything, we just give up.","lines":23,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/wine/dll_manager.py#L321-L343"}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"logger.warning call has a %s placeholder in the format string but no argument is passed, so old_location is never substituted. The resulting log message literally prints 'Initial location %s does not exist...' instead of the actual path, making this diagnostic message useless when debugging a failed game move.","fix":"Pass old_location as a format argument: logger.warning(\"Initial location %s does not exist, files may have already been moved.\", old_location)","locations":[{"ref":"lutris/game.py:1177-1179","code":" 1177 |         if not system.path_exists(old_location):\n 1178 |             logger.warning(\"Initial location %s does not exist, files may have already been moved.\")\n 1179 |             return target_directory","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/game.py#L1177-L1179"}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"on_install_from_setup_game_name_changed is connected to the name entry's \"changed\" signal and is\nalso called directly from on_install_from_setup_game_slug_toggled. It only updates the slug entry\nwhen the slug checkbox is NOT active. But the slug entry's sensitivity is set to follow the checkbox\n(sensitive when checked). So when the checkbox is unchecked, the auto-derived slug is written into a\nNON-sensitive entry, and when checked the user edits a sensitive entry; toggling off does not\nrestore the auto-slug until the name changes again. The interaction between sensitivity and the\nderived value is inconsistent.","fix":"On toggling the checkbox off, immediately recompute and set the proposed slug; the\ndirect call already does this, but verify the entry sensitivity and value stay consistent (derived\nslug shown read-only when unchecked).","locations":[{"ref":"lutris/gui/addgameswindow.py:381-389","code":"  381 |     def on_install_from_setup_game_slug_toggled(self, checkbutton):\n  382 |         self.install_from_setup_game_slug_entry.set_sensitive(checkbutton.get_active())\n  383 |         self.on_install_from_setup_game_name_changed()\n  384 | \n  385 |     def on_install_from_setup_game_name_changed(self, *_args):\n  386 |         if not self.install_from_setup_game_slug_checkbox.get_active():\n  387 |             name = self.install_from_setup_game_name_entry.get_text()\n  388 |             proposed_slug = slugify(name) if name else \"\"\n  389 |             self.install_from_setup_game_slug_entry.set_text(proposed_slug)","lines":9,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/addgameswindow.py#L381-L389"}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"_on_install_setup_continue derives win_ver via installer_preset.split(\"-\")[0]. The preset ids are\nplain strings like \"win11\"/\"win10\"/\"winxp\" with no hyphen, so the split is a no-op and win_ver\nequals installer_preset. The `arch` is computed by startswith((\"win98\", \"winxp\")) -> win32 else\nwin64, but the winetricks task uses `app=win_ver` for any non-win10 preset including win11; if the\nwinetricks verb for \"win11\" is not valid this task will fail at install time. The hyphen split\nsuggests the id format was expected to differ from what installer_presets actually contains.","fix":"Drop the misleading split (or document why it exists) and validate that each preset\nid maps to a real winetricks verb; guard against unsupported presets.","locations":[{"ref":"lutris/gui/addgameswindow.py:403-409","code":"  403 |         installer_preset = self.installer_presets[self.install_preset_dropdown.get_active()][0]\n  404 |         arch = \"win32\" if installer_preset.startswith((\"win98\", \"winxp\")) else \"win64\"\n  405 |         win_ver = installer_preset.split(\"-\")[0]\n  406 |         if win_ver != \"win10\":\n  407 |             win_ver_task = {\"task\": {\"name\": \"winetricks\", \"app\": win_ver, \"arch\": arch}}\n  408 |         else:\n  409 |             win_ver_task = None","lines":7,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/addgameswindow.py#L403-L409"}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"do_command_line computes argc to decide whether to run checks asynchronously and route log output,\nby scanning sys.argv and only special-casing the `-d`/`--debug` flag. Any other option\n(e.g. --list-games, --json, --install, a URI) makes argc nonzero, which is intended, but the logic\nsilently breaks for combined short flags (e.g. `-dl`) and does not account for option arguments,\nso `--debug` combined with other flags can mis-count. More importantly it reads the raw sys.argv of\nthe primary instance even when invoked remotely via D-Bus from a second process, so a remote\ninvocation's arguments are not what argc reflects.","fix":"Derive the argument count from the parsed `options` VariantDict / command_line\narguments (command_line.get_arguments()) rather than the primary process's sys.argv, and stop\nhand-parsing flag strings.","locations":[{"ref":"lutris/gui/application.py:471-477","code":"  471 |         argc = len(sys.argv) - 1\n  472 |         if \"-d\" in sys.argv or \"--debug\" in sys.argv:\n  473 |             argc -= 1\n  474 |         if not argc:\n  475 |             # Switch back the log output to stderr (the default in Python)\n  476 |             # to avoid messing with any output from command line options.\n  477 |             log.console_handler.setStream(sys.stderr)","lines":7,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/application.py#L471-L477"}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"uninstall_runner branches on `\"wine\" in runner` first, then `runner.startswith(\"lutris\")`. A\nlutris-managed wine version string (which typically contains \"wine\", e.g. a runtime like\n\"lutris-7.2-x86_64\" passed for wine) will match the first branch and prompt to delete ALL of Wine\nrather than the specific lutris wine build the user asked to uninstall. The ordering means the\nspecific-version uninstall path (wine_runner_uninstall) is unreachable for names containing \"wine\".","fix":"Check the more specific condition first: if runner.startswith(\"lutris\") route to\nwine_runner_uninstall; only treat a bare \"wine\" (exact match) as the full-Wine removal prompt.","locations":[{"ref":"lutris/gui/application.py:1030-1041","code":" 1030 |     def uninstall_runner(self, runner: str) -> None:\n 1031 |         if \"wine\" in runner:\n 1032 |             print(\"Are sure you want to delete Wine and all of the installed runners?[Y/N]\")\n 1033 |             ans = input()\n 1034 |             if ans.lower() in (\"y\", \"yes\"):\n 1035 |                 self.uninstall_runner_cli(runner)\n 1036 |             else:\n 1037 |                 print(\"Not Removing Wine\")\n 1038 |         elif runner.startswith(\"lutris\"):\n 1039 |             self.wine_runner_uninstall(runner)\n 1040 |         else:\n 1041 |             self.uninstall_runner_cli(runner)","lines":12,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/application.py#L1030-L1041"}]},{"id":"LOGIC_16","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"In AccountsBox.on_sync_state_set, when the user opens the sync confirmation dialog and answers\nanything other than YES, the handler simply 'return's. Because this is a Gtk 'state-set' handler,\n  |         return None\n   47 |     exe_path = exe_path.replace(\"$GAMEDIR/\", \"\")\n   48 |     full_path = os.path.join(game_folder, exe_path)\n   49 |     if os.path.exists(full_path):\n   50 |         return full_path","lines":16,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/scanners/lutris.py#L35-L50"},{"ref":"lutris/scanners/lutris.py:76-98","code":"   76 | def scan_directory(dirname):\n   77 |     slugs_map = get_game_slugs_and_folders(dirname)\n   78 |     directories = get_used_directories()\n   79 |     api_games = get_api_games(list(slugs_map.keys()))\n   80 |     slugs_seen = set()\n   81 |     slugs_installed = set()\n   82 |     for api_game in api_games:\n   83 |         if api_game[\"slug\"] in slugs_seen:\n   84 |             continue\n   85 |         slugs_seen.add(api_game[\"slug\"])\n   86 |         game_folder = find_game_folder(dirname, api_game, slugs_map)\n   87 |         if game_folder in directories:\n   88 |             slugs_installed.add(api_game[\"slug\"])\n   89 |             continue\n   90 |         full_path, installer = find_game(game_folder, api_game)\n   91 |         if full_path:\n   92 |             logger.info(\"Found %s in %s\", api_game[\"name\"], full_path)\n   93 |             try:\n   94 |                 install_game(installer, game_folder)\n   95 |             except MissingGameDependencyError as ex:\n   96 |                 logger.error(\"Skipped %s: %s\", api_game[\"name\"], ex)\n   97 |             download_lutris_media(installer[\"game_slug\"])\n   98 |             slugs_installed.add(api_game[\"slug\"])","lines":23,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/scanners/lutris.py#L76-L98"}]},{"id":"LOGIC_38","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":true,"description":"tosec.py's clean_rom_name() is meant to strip a trailing parenthesized or bracketed tag from a ROM name by scanning the string in reverse and tracking whether the scan is currently inside such a tag. The opening condition correctly checks for '(' or ']' is wrong -- it should check for '(' or '[' to close the in_parens state when an opening delimiter is reached scanning backwards. Because the code checks \"c in ('(', ']')\" instead of \"c in ('(', '[')\", a name containing a square-bracket tag like 'Some Game [T-En by Someone]' never has in_parens reset to False at the '[', so the scan keeps treating the rest of the string as inside the tag, producing a corrupted, truncated result ('Some Game [T-En by Someone' instead of 'Some Game'). Verified by direct execution of the function.","fix":"Change line 157 from \"if c in (\\\"(\\\", \\\"]\\\"):\" to \"if c in (\\\"(\\\", \\\"[\\\"):\" so the in_parens flag correctly resets on the matching opening bracket.","locations":[{"ref":"lutris/scanners/tosec.py:149-162","code":"  149 | def clean_rom_name(name):\n  150 |     in_parens = False\n  151 |     good_index = 0\n  152 |     for i, c in enumerate(name[::-1], start=1):\n  153 |         if c in (\")\", \"]\"):\n  154 |             in_parens = True\n  155 |         if in_parens:\n  156 |             good_index = i\n  157 |         if c in (\"(\", \"]\"):\n  158 |             in_parens = False\n  159 |     name = name[: len(name) - good_index].strip()\n  160 |     if name.endswith(\", The\"):\n  161 |         name = \"The \" + name[:-5]\n  162 |     return name","lines":14,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/scanners/tosec.py#L149-L162"}]},{"id":"LOGIC_39","type":"logic_error","type_label":"Logic Error","severity":"medium","easy":false,"description":"Process.wait_for_finish() calls os.waitpid(int(self.pid) * -1, 0), which waits on the entire process GROUP (negative pid means \"any child in this process group\") rather than the specific self.pid. The docstring says it \"waits until the process finishes,\" implying the specific process, but the returned (pid, ret_status) can belong to a different process within the same group that happens to exit first. Callers relying on ret_status reflecting self.pid's own exit code can get a different process's status instead, and the function could return before self.pid itself has actually exited.","fix":"Wait on the specific pid unless waiting on the whole group is genuinely intended:\npid, ret_status = os.waitpid(int(self.pid), 0)\nIf group-waiting is intentional (e.g. to reap children of a launcher process), document why and loop until self.pid specifically has exited.","locations":[{"ref":"lutris/util/process.py:136-147","code":"  136 |     def wait_for_finish(self):\n  137 |         \"\"\"Waits until the process finishes\n  138 |         This only works if self.pid is a child process of Lutris\n  139 |         \"\"\"\n  140 |         try:\n  141 |             pid, ret_status = os.waitpid(int(self.pid) * -1, 0)\n  142 |         except OSError as ex:\n  143 |             logger.error(\"Failed to get exit status for PID %s\", self.pid)\n  144 |             logger.error(ex)\n  145 |             return -1\n  146 |         logger.info(\"PID %s exited with code %s\", pid, ret_status)\n  147 |         return ret_status","lines":12,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/util/process.py#L136-L147"}]},{"id":"LOGIC_40","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"_get_listbox_row only adds the right/next icon when left_icon_name is truthy (it is nested inside\nthe same `if left_icon_name:` condition's sibling block at lines 688-690). Search-result rows are\ncreated with an empty left_icon_name, so they never show the next/chevron icon - which may be\nintended - but the right_icon_name parameter is silently ignored whenever there is no left icon,\nwhich is a surprising coupling and makes the parameter dead in that case.","fix":"Decide the next-icon visibility independently of left_icon_name (e.g. add it when\nright_icon_name is non-empty) so the parameters are orthogonal.","locations":[{"ref":"lutris/gui/addgameswindow.py:683-690","code":"  683 |         if left_icon_name:\n  684 |             icon = self._get_icon(left_icon_name)\n  685 |             box.pack_start(icon, False, False, 0)\n  686 |         label = self._get_label(f\"<b>{text}<\/b>\\n{subtext}\")\n  687 |         box.pack_start(label, True, True, 0)\n  688 |         if left_icon_name:\n  689 |             next_icon = self._get_icon(right_icon_name, small=True)\n  690 |             box.pack_start(next_icon, False, False, 0)","lines":8,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/addgameswindow.py#L683-L690"}]},{"id":"LOGIC_41","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In do_command_line, when downloading an installer from a URL, the Content-Disposition header is\nparsed as `headers[\"Content-Disposition\"].split(\"=\", 1)[-1]` to derive the filename. This does not\nstrip surrounding quotes or the `filename=`/`filename*=` distinction, so a header like\n`attachment; filename=\"game.exe\"` yields the filename `\"game.exe\"` (with quotes) and\n`filename*=UTF-8''game.exe` yields a percent-encoded value. The resulting temp file path can be\nmalformed or contain unexpected characters.","fix":"Parse Content-Disposition robustly (strip quotes, handle the `filename`/`filename*`\nparameters, e.g. using email.message or werkzeug-style parsing) before building the temp path.","locations":[{"ref":"lutris/gui/application.py:675-680","code":"  675 |                 try:\n  676 |                     headers = dict(request.response_headers or {})\n  677 |                     file_name = headers[\"Content-Disposition\"].split(\"=\", 1)[-1]\n  678 |                 except (KeyError, IndexError):\n  679 |                     file_name = os.path.basename(installer_file)\n  680 |                 file_path = os.path.join(tempfile.gettempdir(), file_name)","lines":6,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/application.py#L675-L680"}]},{"id":"LOGIC_42","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"In do_command_line the rungame/rungameid path installs SIGTERM/SIGINT handlers that call\ngame.stop() only when self.quit_on_game_exit is true. do_startup already reset SIGINT to SIG_DFL.\nThese handlers are installed in the command-line handler which may run in the primary instance for a\nremote invocation, so a second `lutris lutris:rungameid/...` invocation reconfigures the primary\nprocess's signal handlers, affecting any already-running game launched earlier. Signal handlers are\nprocess-global and are overwritten on each rungame invocation.","fix":"Avoid mutating process-global signal handlers per invocation; track games to stop in\na structure and install a single stable handler, or only do this in genuine single-game CLI mode.","locations":[{"ref":"lutris/gui/application.py:785-792","code":"  785 |             if self.quit_on_game_exit:\n  786 | \n  787 |                 def game_stop_signal_handler(signum: int, _frame: types.FrameType | None) -> None:\n  788 |                     logger.debug(\"signal handler called with signal: %d\", signum)\n  789 |                     game.stop()\n  790 | \n  791 |                 signal.signal(signal.SIGTERM, game_stop_signal_handler)\n  792 |                 signal.signal(signal.SIGINT, game_stop_signal_handler)","lines":8,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/application.py#L785-L792"}]},{"id":"LOGIC_43","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"on_game_stopped shows the launcher window only when hide_client_on_game_start is set and\nnot quit_on_game_exit; otherwise it calls _quit_if_hidden_and_idle ted\", self.on_connect_response)\n  172 | \n  173 |     def on_connect_response(self, _dialog, bliblu):\n  174 |         self.rebuild_lutris_options()","lines":6,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/accounts_box.py#L169-L174"}]},{"id":"LOGIC_45","type":"logic_error","type_label":"Logic Error","severity":"low","easy":false,"description":"ConfigWidgetGenerator.on_reset_button_clicked hides the reset button (btn.set_visible(False)) then\nregenerates the widget via generate_widget(option, wrapper=wrapper). generate_widget rebuilds the\nwrapper contents but the reset_button instance stored in self.reset_buttons[option_key] still points\nto the old button that was just hidden; subsequent on_changed will call\nreset_buttons.get(option_key).set_visible(True) on that old (now possibly detached) button rather than\na freshly created one. Whether the button reappears correctly depends on the button not being\nrecreated by generate_widget (it is created in create_option_container, which is not re-run here), so\nthe reset button is reused - but the manual set_visible(False) plus no_show_all state from\ncreate_option_container can leave it stuck hidden after a value change.","fix":"After regenerating the widget, also reset the reset button's no_show_all/visibility state\nconsistently, or recreate/re-register the reset button so its tracked instance matches its shown\nstate.","locations":[{"ref":"lutris/gui/config/boxes.py:363-374","code":"  363 |     def on_reset_button_clicked(self, btn, option):\n  364 |         \"\"\"Clear option (remove from config, reset option widget).\"\"\"\n  365 |         option_key = option[\"option\"]\n  366 |         wrapper = self.wrappers[option_key]\n  367 | \n  368 |         btn.set_visible(False)\n  369 | \n  370 |         self.raw_config.pop(option_key, None)\n  371 |         self.lutris_config.update_cascaded_config()\n  372 | \n  373 |         self.generate_widget(option, wrapper=wrapper)\n  374 |         self.update_widgets()","lines":12,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/boxes.py#L363-L374"},{"ref":"lutris/gui/config/boxes.py:311-313","code":"  311 |         if option_key not in self.raw_config:\n  312 |             reset_button.set_visible(False)\n  313 |             reset_button.set_no_show_all(True)","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/boxes.py#L311-L313"}]},{"id":"LOGIC_46","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"GameDialogCommon._build_options_tab eagerly generates widgets for page_index == 0 and defers all\nothers to a lazy generator registered in notebook_page_generators. This assumes the first options tab\ncreated is always page index 0 and currently visible. In the runner config and preferences flows the\nGame info tab (added first in _build_info_tab) occupies index 0, so the first *options* tab is never\nindex 0 and is always lazily generated; but for runner-level dialogs (config_level != 'game') the\nfirst options tab IS index 0 and gets eagerly generated. The branch silently couples eager generation\nto a positional index rather than to which page is actually selected, so a future reordering of tabs\nwould generate the wrong page up front.","fix":"Decide eager vs lazy generation based on self.notebook.get_current_page() (the actually-visible\npage) instead of hard-coding 'page_index == 0'.","locations":[{"ref":"lutris/gui/config/game_common.py:211-234","code":"  211 |     def _build_options_tab(\n  212 |         self,\n  213 |         notebook_label: str,\n  214 |         box_factory: Callable[[], \"ConfigBox\"],\n  215 |         advanced: bool = True,\n  216 |         searchable: bool = True,\n  217 |     ) -> \"ConfigBox\":\n  218 |         if not self.lutris_config:\n  219 |             raise RuntimeError(\"Lutris config not loaded yet\")\n  220 |         config_box = box_factory()\n  221 |         page_index = self._add_notebook_tab(self.build_scrolled_window(config_box), notebook_label)\n  222 | \n  223 |         self.notebook_page_updater[page_index] = config_box.update_widgets\n  224 | \n  225 |         if page_index == 0:\n  226 |             config_box.generate_widgets()\n  227 |         else:\n  228 |             self.notebook_page_generators[page_index] = config_box.generate_widgets\n  229 | \n  230 |         if advanced:\n  231 |             self.option_page_indices.add(page_index)\n  232 |         if searchable:\n  233 |             self.searchable_page_indices.add(page_index)\n  234 |         return config_box","lines":24,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/game_common.py#L211-L234"}]},{"id":"LOGIC_47","type":"logic_error","type_label":"Logic Error","severity":"low","easy":true,"description":"GameDialogCommon.on_runner_changed guards the 'reset configuration' confirmation with\n'if game_info_box.runner_index and ...'. runner_index is an integer index into the runner\ncombobox where 0 means 'Select a runner from the list'. Using a truthiness test means index 0 is\ntreated the same as 'no previous selection', which is the intent for the no-runner case, but it\nalso means the comparison silently relies on 0 being falsy rather than an explicit check. If the\nsentinel index ever changes, or runner_index is legitimately 0 for a selected first runner, the\nconfirmation prompt is skipped. An explicit 'is not None' style check would be clearer and safer.","fix":"Compare explicitly, e.g. 'if game_info_box.runner_index is not None and game_info_box.runner_index\n> 0 and new_runner_index != game_info_box.runner_index:' so the intent and the sentinel are\nunambiguous.","locations":[{"ref":"lutris/gui/config/game_common.py:303-324","code":"  303 |         new_runner_index = widget.get_active()\n  304 |         game_info
