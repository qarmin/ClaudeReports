    ErrorDialog(_(\"Failed to retrieve the runner archive\"), parent=self)\n  429 |             return","lines":5,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/runner_install.py#L425-L429"}]},{"id":"PERF_5","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"UninstallDialog calls get_widget_children(self.uninstall_game_list, GameRemovalRow) on every\nget_game_removal_rows() invocation, and several update methods iterate all rows repeatedly\n(update_deletability, update_all_checkboxes calls it twice via the nested update(), on_row_updated,\n_apply_all_checkbox, _get_next_folder_size_cb). For large libraries each checkbox toggle triggers\nmultiple full traversals of the list-box children. With many games this is O(n) per toggle times\nseveral traversals.","fix":"Cache the list of GameRemovalRow objects (rebuild only when rows are added/removed) instead of\nre-querying widget children on every access.","locations":[{"ref":"lutris/gui/dialogs/uninstall_dialog.py:49-50","code":"   49 |     def get_game_removal_rows(self) -> list[\"GameRemovalRow\"]:\n   50 |         return get_widget_children(self.uninstall_game_list, GameRemovalRow)","lines":2,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/uninstall_dialog.py#L49-L50"},{"ref":"lutris/gui/dialogs/uninstall_dialog.py:195-229","code":"  195 |     def update_all_checkboxes(self) -> None:\n  196 |         \"\"\"Sets the state of the checkboxes at the button that are used to control all\n  197 |         settings together. While we are actually updating these checkboxes en-mass,\n  198 |         this method does nothing at all.\"\"\"\n  199 | \n  200 |         def update(checkbox, is_candidate, is_set):\n  201 |             set_count = 0\n  202 |             unset_count = 0\n  203 |             for row in self.get_game_removal_rows():\n  204 |                 if is_candidate(row):\n  205 |                     if is_set(row):\n  206 |                         set_count += 1\n  207 |                     else:\n  208 |                         unset_count += 1\n  209 | \n  210 |             checkbox.set_active(set_count > 0)\n  211 |             checkbox.set_inconsistent(set_count > 0 and unset_count > 0)\n  212 |             checkbox.set_visible((set_count + unset_count) > 1 and (set_count > 0 or unset_count > 0))\n  213 | \n  214 |         if not self._setting_all_checkboxes:\n  215 |             self._setting_all_checkboxes = True\n  216 |             try:\n  217 |                 update(\n  218 |                     self.delete_all_files_checkbox,\n  219 |                     lambda row: row.can_delete_files,\n  220 |                     lambda row: row.delete_files,\n  221 |                 )\n  222 | \n  223 |                 update(\n  224 |                     self.remove_all_games_checkbox,\n  225 |                     lambda row: True,\n  226 |                     lambda row: row.remove_from_library,\n  227 |                 )\n  228 |             finally:\n  229 |                 self._setting_all_checkboxes = False","lines":35,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/uninstall_dialog.py#L195-L229"}]},{"id":"PERF_6","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"NotificationSource._notify pops scheduled callbacks from the front of a list with\nself._scheduled_callbacks.pop(0), which is O(n) per pop and O(n^2) for the batch. While\nthis is in widgets/__init__.py (out of slice), download_queue.py fires\nDOWNLOAD_QUEUE_COMPLETED after every operation and lutriswindow registers many handlers on\nmany NotificationSources; high-frequency fires (e.g. per-poll progress) amplify the cost.\nNoted here as it affects the download-queue path's responsiveness.","fix":"Have download-queue fire completion less aggressively, or change NotificationSource to\ndrain via a deque / index pointer (O(1) pops) upstream.","locations":[{"ref":"lutris/gui/download_queue.py:197-199","code":"  197 |             DOWNLOAD_QUEUE_COMPLETED.fire()\n  198 | \n  199 |         AsyncCall(operation, completion_callback)","lines":3,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/download_queue.py#L197-L199"}]},{"id":"PERF_7","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"GridViewCellRendererImage._get_cached_surface_by_path keys its surface cache on\n(widget, path, size, preserve_aspect_ratio), holding a strong reference to the GTK widget in the\ndict keys. Across widget recreation these stale widget references stay in cached_surfaces_old/new\nuntil cycle_cache ages them out, keeping destroyed widgets alive longer than necessary.","fix":"Key the cache on the scale factor (or an id) rather than the widget object, since only widget.get_scale_factor() is actually used in _get_surface_by_path.","locations":[{"ref":"lutris/gui/widgets/cellrenderers.py:531-555","code":"  531 |     def _get_cached_surface_by_path(self, widget, path, size, preserve_aspect_ratio=True):\n  532 |         \"\"\"This obtains the scaled surface to rander for a given media path; this is cached\n  533 |         in this render, but we'll clear that cache when the media generation number is changed,\n  534 |         or certain properties are. We also age surfaces from the cache at idle time after\n  535 |         rendering.\"\"\"\n  536 |         if self.cached_surface_generation != _MEDIA_CACHE_GENERATION_NUMBER:\n  537 |             self.cached_surface_generation = _MEDIA_CACHE_GENERATION_NUMBER\n  538 |             self.clear_cache()\n  539 | \n  540 |         key = widget, path, size, preserve_aspect_ratio\n  541 | \n  542 |         if key in self.cached_surfaces_new:\n  543 |             return self.cached_surfaces_new[key]\n  544 | \n  545 |         if key in self.cached_surfaces_old:\n  546 |             surface = self.cached_surfaces_old[key]\n  547 |         else:\n  548 |             surface = self._get_surface_by_path(widget, path, size, preserve_aspect_ratio)\n  549 |             if surface:\n  550 |                 # We cache missing surfaces too, but only a successful load trigger\n  551 |                 # cache cycling\n  552 |                 self.cached_surfaces_loaded += 1\n  553 | \n  554 |         self.cached_surfaces_new[key] = surface\n  555 |         return surface","lines":25,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/cellrenderers.py#L531-L555"}]},{"id":"PERF_8","type":"performance","type_label":"Performance","severity":"low","easy":false,"description":"LutrisSidebar.update_rows rebuilds all category/saved-search/service/runner/\nplatform state and re-inserts rows on every fire of many global NotificationSources\n(GAME_UPDATED, CATEGORIES_UPDATED, SAVED_SEARCHES_UPDATED, runner-installed, services-changed,\netc.). It also calls categories_db.remove_unused_categories() and several DB queries each time.\nGAME_UPDATED in particular fires very frequently (e.g. per-game state changes), making this an\nO(rows) DB-touching rebuild on hot paths.","fix":"Debounce/coalesce update_rows via a single idle callback, and avoid running DB cleanup queries on every GAME_UPDATED; only fully rebuild when category/runner/service sets actually change.","locations":[{"ref":"lutris/gui/widgets/sidebar.py:492-509","code":"  492 |         GObject.add_emission_hook(RunnerBox, \"runner-installed\", self.update_rows)\n  493 |         GObject.add_emission_hook(RunnerBox, \"runner-removed\", self.update_rows)\n  494 |         GObject.add_emission_hook(RunnerConfigDialog, \"runner-updated\", self.update_runner_rows)\n  495 |         GObject.add_emission_hook(ScriptInterpreter, \"runners-installed\", self.update_rows)\n  496 |         GObject.add_emission_hook(ServicesBox, \"services-changed\", self.update_rows)\n  497 |         GAME_START.register(self.on_game_start)\n  498 |         GAME_STOPPED.register(self.on_game_stopped)\n  499 |         GAME_UPDATED.register(self.update_rows)\n  500 |         CATEGORIES_UPDATED.register(self.update_rows)\n  501 |         SAVED_SEARCHES_UPDATED.register(self.update_rows)\n  502 |         SERVICE_LOGIN.register(self.on_service_auth_changed)\n  503 |         SERVICE_LOGOUT.register(self.on_service_auth_changed)\n  504 |         SERVICE_GAMES_LOADING.register(self.on_service_games_loading)\n  505 |         SERVICE_GAMES_LOADED.register(self.on_service_games_loaded)\n  506 |         LOCAL_LIBRARY_SYNCING.register(self.on_local_library_syncing)\n  507 |         LOCAL_LIBRARY_SYNCED.register(self.on_local_library_synced)\n  508 |         self.set_filter_func(self._filter_func)\n  509 |         self.show_all()","lines":18,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/sidebar.py#L492-L509"},{"ref":"lutris/gui/widgets/sidebar.py:701-808","code":"  701 |     def update_rows(self, *_args):\n  702 |         \"\"\"Generates any missing rows that are now needed, and re-evaluate the filter to hide\n  703 |         any no longer needed. GTK has a lot of trouble dynamically updating and re-arranging\n  704 |         rows, so this will have to do. This keeps the total row count down reasonably well.\"\"\"\n  705 | \n  706 |         # Type alias for sort key: (header_index, is_header, sort_key, id)\n  707 |         SortKey = tuple[int, bool, int | str, str]\n  708 | \n  709 |         def get_sort_key(row: Gtk.ListBoxRow) -> SortKey:\n  710 |             \"\"\"Returns a key used to sort the rows. This keeps rows for a header\n  711 |             together, and rows in a hopefully reasonable order as we insert them.\n  712 |             Returns (header_index, is_header, sort_key, id) where is_header ensures\n  713 |             headers sort before content rows.\"\"\"\n  714 |             if isinstance(row, SidebarHeader):\n  715 |                 # Headers sort at the start of their section (is_header=False sorts before True)\n  716 |                 return row.header_index, False, 0, \"\"\n  717 |             if isinstance(row, SidebarRow):\n  718 |                 header_row = self.row_headers.get(row.type) if row.type else None\n  719 |                 header_index = header_row.header_index if header_row else 0\n  720 |                 return header_index, True, row.sort_key, row.id\n  721 |             # Fallback for any other row types\n  722 |             return 0, True, 0, \"\"\n  723 | \n  724 |         def insert_row(row: Gtk.ListBoxRow) -> None:\n  725 |             \"\"\"Find the best place to insert the row, to maintain order, and inserts it there.\"\"\"\n  726 |             index = 0\n  727 |             seq = get_sort_key(row)\n  728 |             while True:\n  729 |                 r = self.get_row_at_index(index)\n  730 |                 if not r or get_sort_key(r) > seq:\n  731 |                     break\n  732 |                 index += 1\n  733 | \n  734 |             row.show_all()\n  735 |             self.insert(row, index)\n  736 | \n  737 |         categories_db.remove_unused_categories()\n  738 |         categories = [c for c in categories_db.get_categories() if not categories_db.is_reserved_category(c[\"name\"])]\n  739 |         saved_searches = saved_search_db.get_saved_searches()\n  740 | \n  741 |         self.used_categories = {c[\"name\"] for c in categories}\n  742 |         self.saved_searches = {s.name for s in saved_searches}\n  743 |         self.active_services = services.get_enabled_services()\n  744 |         self.installed_runners = [runner.name for runner in runners.get_installed()]\n  745 |         self.active_platforms = games_db.get_used_platforms()\n  746 | \n  747 |         # Add section headers if not already in the sidebar\n  748 |         for section_id, header in self.row_headers.items():\n  749 |             if section_id != \"library\" and header.get_parent() is None:\n  750 |                 insert_row(header)\n  751 | \n  752 |         for service_name, service_class in self.active_services.items():\n  753 |             if service_name not in self.service_rows:\n  754 |                 try:\n  755 |                     service = service_class()\n  756 |                     row_class = OnlineServiceSidebarRow if service.online else ServiceSidebarRow\n  757 |                     service_row = row_class(service)\n  758 |                     insert_row(service_row)\n  759 |                     self.service_rows[service_name] = service_row\n  760 |                 except Exception as ex:\n  761 |                     logger.exception(\"Sidebar row for '%s' could not be loaded: %s\", service_name, ex)\n  762 | \n  763 |         for runner_name in self.installed_runners:\n  764 |             if runner_name not in self.runner_rows:\n  765 |                 try:\n  766 |                     icon_name = runner_name.lower().replace(\" \", \"\") + \"-symbolic\"\n  767 |                     runner = runners.import_runner(runner_name)()\n  768 |                     runner_row = RunnerSidebarRow(\n  769 |                         runner_name,\n  770 |                         \"runner\",\n  771 |                         runner.human_name,\n  772 |                         self.get_sidebar_icon(icon_name),\n  773 |                         application=self.application,\n  774 |                     )\n  775 |                     insert_row(runner_row)\n  776 |                     self.runner_rows[runner_name] = runner_row\n  777 |                 except Exception as ex:\n  778 |                     logger.exception(\"Sidebar row for '%s' could not be loaded: %s\", service_name, ex)\n  779 | \n  780 |         for platform in self.active_platforms:\n  781 |             if platform not in self.platform_rows:\n  782 |                 icon_name = platform.lower().replace(\" \", \"\").replace(\"/\", \"_\") + \"-symbolic\"\n  783 |                 platform_row = SidebarRow(\n  784 |                     platform, \"platform\", platform, self.get_sidebar_icon(icon_name), application=self.application\n  785 |                 )\n  786 |                 self.platform_rows[platform] = platform_row\n  787 |                 insert_row(platform_row)\n  788 | \n  789 |         # Remove stale category rows that no longer exist in the database\n  790 |         stale_categories = set(self.category_rows.keys()) - self.used_categories\n  791 |         for stale_name in stale_categories:\n  792 |             stale_row = self.category_rows.pop(stale_name)\n  793 |             stale_row.destroy()\n  794 | \n  795 |         for category in categories:\n  796 |             if category[\"name\"] not in self.category_rows:\n  797 |                 new_category_row = CategorySidebarRow(category, application=self.application)\n  798 |                 self.category_rows[category[\"name\"]] = new_category_row\n  799 |                 insert_row(new_category_row)\n  800 | \n  801 |         for saved_search in saved_searches:\n  802 |             if saved_search.name not in self.saved_search_rows:\n  803 |                 new_saved_search_row = SavedSearchSidebarRow(saved_search, application=self.application)\n  804 |                 self.saved_search_rows[saved_search.name] = new_saved_search_row\n  805 |                 insert_row(new_saved_search_row)\n  806 | \n  807 |         self.invalidate_filter()\n  808 |         return True","lines":108,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/widgets/sidebar.py#L701-L808"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"medium","easy":true,"description":"In GOGService.get_extras_files, the fallback branch compares a string to a list of dicts: `selected_extras` is typed `list[dict]`, but the elif conditio arted, this returns True.\n  110 | \n  111 |         If 'wait_for' is given, the start is deferred until none of those operation names\n  112 |         are running. The new progress box will appear when the actual\n  113 |         operation begins- once the blocking operations complete.\n  114 | \n  115 |         Args:\n  116 |             operation:              Called on a worker thread\n  117 |             progress_function:      Called on the main thread for progress status\n  118 |             completion_function:    Called on the main thread on completion, with result\n  119 |             error_function:         Called on the main threa don error, with exception\n  120 |             operation_name:         Name of operation, to prevent duplicate queued work.\n  121 |             wait_for:               Operation names that must finish before this one starts.\"\"\"\n  122 | \n  123 |         if wait_for and not self.running_operation_names.isdisjoint(wait_for):\n  124 |             # Defer the entire start (including the progress box) until the\n  125 |             # blocking operations complete.\n  126 |             def on_maybe_ready():\n  127 |                 if self.running_operation_names.isdisjoint(wait_for):\n  128 |                     registration.unregister()\n  129 |                     self.start(\n  130 |                         operation,\n  131 |                         progress_function,\n  132 |                         completion_function=completion_function,\n  133 |                         error_function=error_function,\n  134 |                         operation_name=operation_name,\n  135 |                     )\n  136 | \n  137 |             registration = DOWNLOAD_QUEUE_COMPLETED.register(on_maybe_ready)\n  138 |             return True","lines":33,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/download_queue.py#L106-L138"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Co ng custom image from `{url}` to `{tmp_file}`\")\n  505 | \n  506 |         def download():\n  507 |             with requests.get(url, stream=True) as r:\n  508 |                 if not r.ok:\n  509 |                     logger.error(\n  510 |                         f\"Request returned a status code that didn't indicate success: `{url}` (`{r.status_code}`)\"\n  511 |                     )\n  512 |                     return\n  513 |                 with open(tmp_file, \"wb\") as fp:\n  514 |                     for chunk in r.iter_content(chunk_size=8196):\n  515 |                         if chunk:\n  516 |                             fp.write(chunk)\n  517 | \n  518 |             self.save_custom_media(image_type, tmp_file)\n  519 | \n  520 |         def download_cb(_result, error):\n  521 |             if error:\n  522 |                 raise error\n  523 | \n  524 |         AsyncCall(download, download_cb)\n  525 | \n  526 |     def save_custom_media(self, image_type: str, image_path: str) -> None:\n  527 |         slug = self.slug or (self.game.slug if self.game else \"\")\n  528 |         service_media = self.service_medias[image_type]\n  529 |         if self.game:\n  530 |             self.game.custom_images.add(image_type)\n  531 |         dest_paths = [mp.path for mp in service_media.get_possible_media_paths(slug)]\n  532 | \n  533 |         if image_path not in dest_paths:\n  534 |             ext = get_image_file_extension(image_path)\n  535 | \n  536 |             if ext:\n  537 |                 for candidate in dest_paths:\n  538 |                     if candidate.casefold().endswith(ext):\n  539 |                         self._save_copied_media_to(candidate, image_type, image_path)\n  540 |                         return\n  541 | \n  542 |             self._save_transcoded_media_to(dest_paths[0], image_type, image_path)\n  543 | \n  544 |     def _save_copied_media_to(self, dest_path: str, image_type: str, image_path: str) -> None:\n  545 |         \ e)\n  621 | ","lines":586,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/game_info_box.py#L36-L621"}]},{"id":"ARCH_4","type":"architecture","type_label":"Architecture","severity":"medium","easy":false,"description":"lutriswindow.py is a 1600-line god-object that mixes many unrelated responsibilities:\nwindow geometry persistence, action/accelerator wiring, sidebar/category filtering, game\nsearch and sorting, store building, splash/overlay/spinner management, service login,\nruntime/component update orchestration, download-queue plumbing, and global error-handler\nregistration. The file even carries '# pylint: disable=too-many-lines'. Functions like\nget_games_from_filters() and update_store() carry deep nested logic with multiple\ngeneration-guard closures. This concentration makes the class hard to test and reason\nabout and is a breeding ground for the subtler bugs reported elsewhere.","fix":"Extract cohesive collaborators: a GameQueryService (filters/sorting/store building), a\nWindowStateManager (geometry/persistence), and a RuntimeUpdateController (start_runtime_\nupdates / install_runtime_component_updates), leaving LutrisWindow as a thin view\ncontroller.","locations":[{"ref":"lutris/gui/lutriswindow.py:84-1588","code":"   84 | @GtkTemplate(ui=os.path.join(datapath.get(), \"ui\", \"lutris-window.ui\"))\n   85 | class LutrisWindow(Gtk.ApplicationWindow, DialogLaunchUIDelegate, DialogInstallUIDelegate):  # type:ignore[misc]\n   86 |     \"\"\"Handler class for main window signals.\"\"\"\n   87 | \n   88 |     default_view_type = \"grid\"\n   89 |     default_width = 800\n   90 |     default_height = 600\n   91 | \n   92 |     __gtype_name__ = \"LutrisWindow\"\n   93 |     games_stack: Gtk.Stack = GtkTemplate.Child()\n   94 |     sidebar_revealer: Gtk.Revealer = GtkTemplate.Child()\n   95 |     sidebar_scrolled: Gtk.ScrolledWindow = GtkTemplate.Child()\n   96 |     game_revealer: Gtk.Revealer = GtkTempla gress_functions: dict[str, ProgressBox.ProgressFunction] = {}\n  169 | \n  170 |         # Since system-search-symbolic is already *right there* we'll try to pick some\n  171 |         # other icon for the button that shows the search popover.\n  172 |         filter_button_image = StockIconImage(\n  173 |             [\"filter-symbolic\", \"edit-find-replace-symbolic\"],\n  174 |             fallback_name=\"system-search-symbolic\",\n  175 |             icon_size=Gtk.IconSize.BUTTON,\n  176 |         )\n  177 |         filter_button_image.show()\n  178 |         self.search_filters_button.set_image(filter_button_image)\n  179 |         self.filter_box_search_name = \"\"\n  180 | \n  181 |         # Setup Drag and drop\n  182 |         self.drag_dest_set(Gtk.DestDefaults.ALL, [], Gdk.DragAction.COPY)\n  183 |         self.drag_dest_add_uri_targets()\n  184 | \n  185 |         self.set_viewtype_icon(self.current_view_type)\n  186 | \n  187 |         lutris_icon = Gtk.Image.new_from_icon_name(\"net.lutris.Lutris\", Gtk.IconSize.MENU)\n  188 |         lutris_icon.set_margin_right(3)\n  189 | \n  190 |         self.sidebar = LutrisSidebar(self.application)\n  191 |         self.sidebar.connect(\"selected-rows-changed\", self.on_sidebar_changed)\n  192 |         # \"realize\" is order sensitive- must connect after sidebar itself connects the same signal\n  193 |         self.sidebar.connect(\"realize\", self.on_sidebar_realize)\n  194 |         self.sidebar_scrolled.add(self.sidebar)\n  195 | \n  196 |         # This must wait until the selected-rows-changed signal is connected\n  197 |         self.sidebar.initialize_rows()\n  198 | \n  199 |         self.sidebar_revealer.set_reveal_child(self.side_panel_visible)\n  200 |         self.sidebar_revealer.set_transition_duration(300)\n  201 | \n  202 |         self.game_bar = None\n  203 |         self.revealer_box = Gtk.HBox(visible=True)\n  204 |         self.game_revealer.add(self.revealer_box)\n  205 | \n  206 | .SimpleAction.new_stateful(name, param_type, default_value)\n  314 |                 action.connect(\"change-state\", value.callback)\n  315 |             self.actions[name] = action\n  316 |             if value.enabled:\n  317 | \n  318 |                 def updater(action=action, value=value):\n  319 |                     action.props.enabled = value.enabled()\n  320 | \n  321 |                 self.action_state_updaters.append(updater)\n  322 |             self.add_action(action)\n  323 |             if value.accel:\n  324 |                 app.add_accelerator(value.accel, \"win.\" + name)\n  325 | \n  326 |     def sync_library(self, force: bool = False) -> None:\n  327 |         \"\"\"Tasks that can be run after the UI has been initialized.\"\"\"\n  328 | \n  329 |         def on_library_synced(_result, error):\n  330 |             \"\"\"Sync media after the library is loaded\"\"\"\n  331 |             if not error:\n  332 |                 AsyncCall(sync_media, None)\n  333 | \n  334 |         if settings.read_bool_setting(\"library_sync_enabled\", True):\n  335 |             AsyncCall(LibrarySyncer().sync_local_library, on_library_synced if force else None, force=force)\n  336 | \n  337 |     def update_action_state(self):\n  338 |         \"\"\"This invokes the functions to update the enabled states of all the actions\n  339 |         which can be disabled.\"\"\"\n  340 |         for updater in self.action_state_updaters:\n  341 |             updater()\n  342 | \n  343 |     @property\n  344 |     def service_media(self):\n  345 |         return self.get_service_media(self.load_icon_type())\n  346 | \n  347 |     @property\n  348 |     def selected_category(self):\n  349 |         return self.sidebar.selected_category\n  350 | \n  351 |     def on_load(self, widget, data=None):\n  352 |         \"\"\"Finish initializing the view\"\"\"\n  353 |         self._bind_zoom_adjustment()\n  354 |         self.current_view.grab_focus()\n  355 | \n  356 |     def on_sidebar_realize(self, widget, data=None):\n  357 |         \"\"\"Grab the initial focus after the sidebar is initialized - so the view is ready.\"\"\"\n  358 |         self.current_view.grab_focus()\n  359 | \n  360 |     def on_drag_data_received(self, _widget, _drag_context, _x, _y, data, _info, _time):\n  361 |         \"\"\"Handler for drop event\"\"\"\n  362 |         file_paths = [unquote(urlparse(uri).path) for uri in data.get_uris()]\n  363 |         dialog = ImportGameDialog(file_paths, parent=self)\n  364 |         dialog.show()\n  365 | \n  366 |     def load_filters(self):\n  367 |         \"\"\"Load the initial filters when creating the view\"\"\"\n  368 |         # The main sidebar-category filter will be populated when the sidebar row is selected, after this\n  369 |         return {\"installed\": self.filter_installed}\n  370 | \n  371 |     @property\n  372 |     def is_show_hidden_sensitive(self) -> bool:\n  373 |         \"\"\"True if there are any hidden games to show.\"\"\"\n  374 |         return bool(\n  375 |             self.sidebar.selected_category == (\"category\", \".hidden\")\n  376 |             or categories_db.get_game_ids_for_categories([\".hidden\"])\n  377 |         )\n  378 | \n  379 |     def on_show_hidden_clicked(self, action, value):\n  380 |         \"\"\"Hides or shows the hidden games\"\"\"\n  381 |         hidden_category = \"category\", \".hidden\"\n  382 |         if self.sidebar.selected_category == hidden_category:\n  383 |             if self.sidebar.previous_category:\n  384 |                 self.sidebar.selected_category = self.sidebar.previous_category\n  385 |         else:\n  386 |             self.sidebar.hidden_row.show()\n  387 |             self.sidebar.selected_category = hidden_category\n  388 | \n  389 |     def on_open_search_filters(self, _action, _value):\n  390 |         def on_filter_popover_closed(_popover):\n  391 |             self.filter_box_search_name = filter_box.search_name\n  392 | ings.read_bool_setting(\"show_tray_icon\", False)\n  432 | \n  433 |     @property\n  434 |     def view_sorting(self) -> str:\n  435 |         value = settings.read_setting(\"view_sorting\") or \"name\"\n  436 |         if value.endswith(\"_text\"):\n  437 |             value = value[:-5]\n  438 |         return value\n  439 | \n  440 |     @property\n  441 |     def view_reverse_order(self) -> bool:\n  442 |         return settings.read_bool_setting(\"view_reverse_order\", False)\n  443 | \n  444 |     @property\n  445 |     def view_sorting_installed_first(self) -> bool:\n  446 |         return settings.read_bool_setting(\"view_sorting_installed_first\", True)\n  447 | \n  448 |     @property\n  449 |     def show_hidden_games(self) -> bool:\n  450 |         return settings.read_bool_setting(\"show_hidden_games\", False)\n  451 | \n  452 |     @property\n  453 |     def is_view_sort_sensitive(self):\n  454 |         \"\"\"True if the view sorting options will be effective; most dynamic categories ignore them.\"\"\"\n  455 |         dynamic = self.filters.get(\"dynamic_category\")\n  456 |         return dynamic not in self.dynamic_categories_game_factories or dynamic in self.sortable_dynamic_categories\n  457 | \n  458 |     def get_sort_sensitive_columns(self) -> set[int]:\n  459 |         if self.is_view_sort_sensitive:\n  460 |             if self.view_sorting == \"name\":\n  461 |                 return {COL_NAME, COL_SORTNAME}\n  462 |             elif self.view_sorting == \"year\":\n  463 |                 return {COL_YEAR}\n  464 |             elif self.view_sorting == \"lastplayed\":\n  465 |                 return {COL_LASTPLAYED, COL_LASTPLAYED_TEXT}\n  466 |             elif self.view_sorting == \"installed_at\":\n  467 |                 return {COL_INSTALLED_AT, COL_INSTALLED_AT_TEXT}\n  468 |             elif self.view_sorting == \"playtime\":\n  469 |                 return {COL_PLAYTIME, COL_PLAYTIME_TEXT}\n  470 | \n  471 |         return set()\n  472 | \n  473 |     def apply_view_sort(self, items, resolver=lambda i: i):\n  474 |         \"\"\"This sorts a list of items according to the view settings of this window;\n  475 |         the items can be anything, but you can provide a lambda that provides a\n  476 |         database game dictionary for each one; this dictionary carries the\n  477 |         data we sort on (though any field may be missing).\n  478 | \n  479 |         This sort always sorts installed games ahead of uninstalled ones, even when\n  480 |         the sort is set to descending.\n  481 | \n  482 |         This treats 'name' sorting specially, applying a natural sort so that\n  483 |         'Mega slap battler 20' comes after 'Mega slap battler 3'.\"\"\"\n  484 |         sort_defaults = {\n  485 |             \"name\": \"\",\n  486 |             \"year\": 0,\n  487 |             \"lastplayed\": 0.0,\n  488 |             \"installed_at\": 0.0,\n  489 |             \"playtime\": 0.0,\n  490 |         }\n  491 | \n  492 |         service = self.service\n  493 |         view_sorting = self.view_sorting\n  494 |         view_reverse_order = self.view_reverse_order\n  495 |         view_sorting_installed_first = self.view_sorting_installed_first\n  496 | \n  497 |         def get_sort_default(item):\n  498 |             \"\"\"Returns the default value to use when the value is missing; we may be able\n  499 |             to extract this from the item..\"\"\"\n  500 |             if view_sorting == \"year\" and service:\n  501 |                 service_year = service.get_game_release_date(item)\n  502 |                 service_year = convert_value(service_year)\n  503 |                 if service_year:\n  504 |                     return service_year\n  505 | \n  506 |             # Users may have obsolete view_sorting settings, so\n  507 |             # we must tolerate them. We treat them all as blank.\n  508 |             return sort_defaults.get(view_sorting, \"\")\n  509 | \n  510 |         def convert_value(value):\n  511 |             \"\"\"Converts 'value' to the type required for the sort that is in use. Returns None if this\n  512 |             can't be managed.\"\"\"\n  513 |             try:\n  514 |                 if not value:\n  515 |                     return None\n  516 |                 if view_sorting == \"name\":\n  517 |                     return str(value)\n  518 |                 if view_sorting == \"year\":\n  519 |                     # Years can take many forms! We'll try to convert as best we can.\n  520 |                     if isinstance(value, datetime):\n  521 |                         return int(value.year)\n  522 |                     else:\n  523 |                         try:\n  524 |                             return int(value)\n  525 |                         except ValueError:\n  526 |                             as_date = datetime.strptime(str(value), \"%Y-%m-%d\")\n  527 |                             return int(as_date.year)\n  528 |                 else:\n  529 |                     return float(value)\n  530 |             except ValueError:\n  531 |                 return None  # unable to parse value?\n  532 | \n  533 |         def extend_value(value):\n  534 |             \"\"\"Expands the value to sort by to a more complex form, for smarter sorting.\"\"\"\n  535 |             if view_sorting == \"name\":\n  536 |                 return get_natural_sort_key(value)\n  537 |             if view_sorting == \"year\":\n  538 |                 contains_year = bool(value)\n  539 |                 if view_reverse_order:\n  540 |                     contains_year = not contains_year\n  541 |                 return contains_year, value\n  542 |             return value\n  543 | \n  544 |         def get_sort_value(item):\n  545 |             db_game = resolver(item)\n  546 |             if not db_game:\n  547 |                 installation_flag = False\n  548 |                 value = None\n  549 |             else:\n  550 |                 installation_flag = bool(db_game.get(\"installed\"))\n  551 | \n  552 |                 # When sorting by name, check for a valid sortname first, then fall back\n  553 |                 # on name if valid sortname is not available.\n  554 |                 if view_sorting == \"name\":\n  555 |                     value = db_game.get(\"sortname\") or db_game.get(\"name\")\n  556 |                 else:\n  557 |                     value = db_game.get(view_sorting)\n  558 | \n  559 |             value = convert_value(value) or get_sort_default(item)\n  560 |             value = extend_value(value)\n  561 | \n  562 |             if view_sorting_installed_first:\n  563 |                 # We want installed games to always be first, even in\n  564 |                 # a descending sort.\n  565 |                 if view_reverse_order:\n  566 |                     installation_flag = not installation_flag\n  567 |                 if view_sorting == \"name\":\n  568 |                     installation_flag = not installation_flag\n  569 |                 return installation_flag, value\n  570 |             return value\n  571 | \n  572 |         reverse = view_reverse_order if view_sorting == \"name\" else not view_reverse_order\n  573 |         return sorted(items, key=get_sort_value, reverse=reverse)\n  574 | \n  575 |     def get_running_games(self):\n  576 |         \"\"\"Return a list of currently running games\"\"\"\n  577 |         games = games_db.get_games_by_ids(self.application.get_running_game_ids())\n  578 |         return self.apply_view_sort(self.filter_games(games))\n  579 | \n  580 |     def get_uncategorized_games(self):\n  581 |         \"\"\"Return a list of games not in any category\"\"\"\n  582 |         games = self.filter_games(categories_db.get_uncategorized_games())\n  583 |         return self.apply_view_sort(games)\n  584 | \n  585 |     def get_missing_games(self):\n  586 |         games = games_db.get_games_by_ids(MISSING_         search = self.get_game_search()\n  621 | \n  622 |             if self.filters.get(\"installed\") and not search.has_component(\"installed\"):\n  623 |                 search = search.with_predicate(search.get_installed_predicate(installed=True))\n  624 | \n  625 |             category = self.filters.get(\"category\") or \"all\"\n  626 | \n  627 |             if category != \".hidden\" and not search.has_component(\"hidden\"):\n  628 |                 search = search.with_predicate(NotPredicate(search.get_category_predicate(\".hidden\")))\n  629 | \n  630 |             searches = [search]\n  631 | \n  632 |         to_apply = [search for search in searches if not search.is_empty]\n  633 | \n  634 |         if not to_apply:\n  635 |             return games\n  636 | \n  637 |         def matches(game):\n  638 |             for search in to_apply:\n  639 |                 if not search.matches(game):\n  640 |                     return False\n  641 |             return True\n  642 | \n  643 |         return [game for game in games if matches(game)]\n  644 | \n  645 |     def set_service(self, service_name):\n  646 |         if self.service and self.service.id == service_name:\n  647 |             return self.service\n  648 |         if not service_name:\n  649 |             self.service = None\n  650 |             return\n  651 |         try:\n  652 |             self.service = services.SERVICES[service_name]()\n  653 |         except KeyError:\n  654 |             logger.error(\"Non existent service '%s'\", service_name)\n  655 |             self.service = None\n  656 |         return self.service\n  657 | \n  658 |     @staticmethod\n  659 |     def combine_games(service_game, lutris_game):\n  660 |         \"\"\"Inject lutris game information into a service game\"\"\"\n  661 |         if lutris_game and service_game[\"appid\"] == lutris_game[\"service_id\"]:\n  662 |             for field in (\"platform\", \"runner\", \"installed_at\", \"lastplayed\", \"pla x.get_children():\n  770 |             self.game_revealer.set_reveal_child(True)\n  771 |         else:\n  772 |             self.game_revealer.set_reveal_child(False)\n  773 | \n  774 |     def show_empty_label(self):\n  775 |         \"\"\"Display a label when the view is empty\"\"\"\n  776 |         if self.service and self.service.online and not self.service.is_authenticated():\n  777 |             self.show_label(_(\"Connect your %s account to access your games\") % self.service.name)\n  778 |             return\n  779 | \n  780 |         filter_text = self.filters.get(\"text\")\n  781 |         has_uninstalled_games = games_db.get_game_count(\"installed\", \"0\")\n  782 |         if filter_text:\n  783 |             if self.filters.get(\"category\") == \"favorite\":\n  784 |                 self.show_label(_(\"Add a game matching '%s' to your favorites to see it here.\") % filter_text)\n  785 |             elif self.filters.get(\"category\") == \".hidden\":\n  786 |                 self.show_label(_(\"No hidden games matching '%s' found.\") % filter_text)\n  787 |             elif self.filters.get(\"installed\") and has_uninstalled_games:\n  788 |                 self.show_label(\n  789 |                     _(\"No installed games matching '%s' found. Press Ctrl+I to show uninstalled games.\") % filter_text\n  790 |                 )\n  791 |             else:\n  792 |                 self.show_label(_(\"No games matching '%s' found \") % filter_text)\n  793 |         else:\n  794 |             if self.filters.get(\"category\") == \"favorite\":\n  795 |                 self.show_label(_(\"Add games to your favorites to see them here.\"))\n  796 |             elif self.filters.get(\"category\") == \".hidden\":\n  797 |                 self.show_label(_(\"No games are hidden.\"))\n  798 |             elif self.filters.get(\"installed\") and has_uninstalled_games:\n  799 |                 self.show_label(_(\"No installed games found. Press Ctrl+I to show uninstalled games.\"))\n  800 |             elif (\n  801 |                 not self.filters.get(\"runner\")\n  802 |                 and not self.filters.get(\"service\")\n  803 |                 and not self.filters.get(\"platform\")\n  804 |                 and not self.filters.get(\"dynamic_category\")\n  805 |             ):\n  806 |                 self.show_splash()\n  807 |             else:\n  808 |                 self.show_label(_(\"No games found\"))\n  809 | \n  810 |     def refresh_view(self):\n  811 |         self.sidebar.update_rows()\n  812 |         self.update_missing_games_sidebar_row()\n  813 |         self.update_store()\n  814 | \n  815 |     def update_store(self) -> None:\n  816 |         service_id = self.filters.get(\"service\")\n  817 |         service = self.service\n  818 |         service_media = self.service_media\n  819 |         self._game_store_generation += 1\n  820 |         generation = self._game_store_generation\n  821 | \n  822 |         def make_game_store(games):\n  823 |             game_store = GameStore(service, service_media)\n  824 |             game_store.add_preloaded_games(games, service_id)\n  825 |             return games, game_store\n  826 | \n  827 |         def on_games_ready(games, error):\n  828 |             if generation != self._game_store_generation:\n  829 |                 return  # no longer applicable, we got switched again!\n  830 | \n  831 |             if error:\n  832 |                 raise error  # bounce any error against the backstop\n  833 | \n  834 |             # Since get_games_from_filters() seems to be much faster than making a GameStore,\n  835 |             # we defer the spinner to here, when we know how many games we will show. If there\n  836 |             # are \"many\" we show a spinner while the store is built.\n  837 |             if len(games) > 512:\n  838 |                 self.show_spinner()\n  839 | \n  840 |             AsyncCall(make_game_store, apply_store, games)\n  841 | \n ol) -> None:\n 1515 |         \"\"\"Starts the process of applying runtime updates, asynchronously. No UI appears until\n 1516 |         we can determine that there are updates to perform.\"\"\"\n 1517 | \n 1518 |         def create_runtime_updater():\n 1519 |             \"\"\"This function runs on a worker thread and decides what component updates are\n 1520 |             required; we do this on a thread because it involves hitting the Lutris.net website,\n 1521 |             which can easily block.\"\"\"\n 1522 |             runtime_updater = RuntimeUpdater(force=force_updates)\n 1523 |             component_updaters = runtime_updater.create_component_updaters()\n 1524 |             supported_client_version = runtime_updater.check_client_versions()\n 1525 |             return component_updaters, runtime_updater, supported_client_version\n 1526 | \n 1527 |         def create_runtime_updater_cb(result, error):\n 1528 |             \"\"\"Picks up the component updates when we know what they are, and begins the installation.\n 1529 |             This must be done on the main thread, since it updates the UI. This would be so much less\n 1530 |             ugly with asyncio, but here we are.\"\"\"\n 1531 |             if error:\n 1532 |                 logger.exception(\"Failed to obtain updates from Lutris.net: %s\", error)\n 1533 |             else:\n 1534 |                 component_updaters, runtime_updater, supported_client_version = result\n 1535 | \n 1536 |                 if supported_client_version and not LINUX_SYSTEM.is_flatpak():\n 1537 |                     markup = _(\n 1538 |                         \"Lutris %s is no longer supported. \"\n 1539 |                         + '<a href=\"https://lutris.net/downloads/\">Download %s here!<\/a>'\n 1540 |                     )\n 1541 |                     markup = markup % (settings.VERSION, supported_client_version)\n 1542 |                     self.version_notification_label.set_label(markup)\n 1543 | eue.start_multiple(\n 1583 |             install_updates,\n 1584 |             (u.get_progress for u in updaters),\n 1585 |             completion_function=on_complete,\n 1586 |             error_function=error_function,\n 1587 |             operation_names=operation_names,\n 1588 |         )","lines":1505,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/lutriswindow.py#L84-L1588"}]},{"id":"ARCH_5","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"GameDialogCommon.is_valid instantiates a fresh runner object (runner_class()) purely to iterate\noption validators every time validation runs, and iterates all game+runner config items calling\nfind_option for each. For runners with many options this is repeated work on every save attempt, and\nconstructing a runner instance can have side effects. Validation could reuse the already-loaded\nrunner where available.","fix":"Reuse an existing runner instance (e.g. self.game.runner when present) instead of importing and\ninstantiating a new runner solely for validation, and cache find_option lookups.","locations":[{"ref":"lutris/gui/config/game_common.py:383-401","code":"  383 |         invalid_fields = []\n  384 |         runner_class = import_runner(self.runner_name)\n  385 |         runner_instance = runner_class()\n  386 |         for config in [\"game\", \"runner\"]:\n  387 |             for k, v in getattr(self.lutris_config, config + \"_config\").items():\n  388 |                 option = runner_instance.find_option(config + \"_options\", k)\n  389 |                 if option is None:\n  390 |                     continue\n  391 |                 validator = option.get(\"validator\")\n  392 |                 if validator is not None:\n  393 |                     try:\n  394 |                         res = validator(v)\n  395 |                         logger.debug(\"%s validated successfully: %s\", k, res)\n  396 |                     except Exception:\n  397 |                         invalid_fields.append(option.get(\"label\"))\n  398 |         if invalid_fields:\n  399 |             ErrorDialog(_(\"The following fields have invalid values: \") + \", \".join(invalid_fields), parent=self)\n  400 |             return False\n  401 |         return True","lines":19,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/game_common.py#L383-L401"}]},{"id":"ARCH_6","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"WidgetGenerator (~908 lines) is a single class that owns: an ABC contract, 12 widget factory methods\neach with nested closures, async-reload protocol handling, tooltip/condition/visibility evaluation,\nand callable-arity introspection (evaluate_option_value). The arity-guessing logic in\nevaluate_option_value (inspecting signatures and slicing args) is especially subtle and fragile - it\nsilently changes how callbacks are invoked based on declared parameter count, which is surprising\nbehavior that can call a callback with the wrong arguments if a callback's signature is refactored.","fix":"Split the widget factories out of WidgetGenerator and replace the implicit arity-based dispatch in\nevaluate_option_value with an explicit, documented callback protocol (fixed signature) so callbacks\nare always invoked the same way.","locations":[{"ref":"lutris/gui/config/widget_generator.py:797-823","code":"  797 |     def evaluate_option_value(self, value: Any, option: dict[str, Any]) -> Any:\n  798 |         \"\"\"Evaluates the 'value' given, if it is callable. If not, this method just\n  799 |         returns the 'value'.\n  800 | \n  801 |         The 'value' is called with the option-key and then all the callback arguments\n  802 |         given to this generator's __init__. If the 'value' takes fewer arguments than\n  803 |         this, trailing arguments are omitted.\"\"\"\n  804 |         if callable(value):\n  805 |             sig = signature(value)\n  806 |             argcount = len(sig.parameters)\n  807 | \n  808 |             option_key = option[\"option\"]\n  809 |             argsneeded = 1 + len(self.callback_args)\n  810 | \n  811 |             if argcount >= argsneeded:  # enough declared args?\n  812 |                 return value(option_key, *self.callback_args, **self.callback_kwargs)\n  813 |             elif any(p.kind == Parameter.VAR_POSITIONAL for p in sig.parameters.values()):  # unlimited args via *args?\n  814 |                 return value(option_key, *self.callback_args, **self.callback_kwargs)\n  815 |             elif argcount == 0:  # no args?\n  816 |                 return value(**self.callback_kwargs)\n  817 |             else:  # any other number of args\n  818 |                 args = list(self.callback_args)\n  819 |                 args.insert(0, option_key)\n  820 |                 args = args[:argcount]\n  821 |                 return value(*args, **self.callback_kwargs)\n  822 | \n  823 |         return value","lines":27,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/config/widget_generator.py#L797-L823"}]},{"id":"ARCH_7","type":"architecture","type_label":"Architecture","severity":"low","easy":false,"description":"ShowAppsDialog is a ModelessDialog, but on_show_apps_usage calls dialog.run() on it. ModelessDialog\nis designed for non-blocking use (it self-destructs in on_response and clears transient-for at\nidle); calling the blocking run() on it mixes the two interaction models and can interact poorly\nwith the idle-time transient-for clearing and the modeless window group setup.","fix":"Either make ShowAppsDialog a ModalDialog if blocking behavior is intended, or present it modelessly\nwithout run().","locations":[{"ref":"lutris/gui/dialogs/runner_install.py:295-300","code":"  295 |     def on_show_apps_usage(self, _button, row):\n  296 |         \"\"\"Return grid with games that uses this wine version\"\"\"\n  297 |         runner = row.runner\n  298 |         runner_version = \"%s-%s\" % (runner[\"version\"], runner[\"architecture\"])\n  299 |         dialog = ShowAppsDialog(_(\"Wine version usage\"), self.get_toplevel(), self.runner_name, runner_version)\n  300 |         dialog.run()","lines":6,"link":"https://github.com/lutris/lutris/blob/846f2c28e972f84a9c360e957a87f5c44729e831/lutris/gui/dialogs/runner_install.py#L295-L300"},{"ref":"lutris/gui/dialogs/__init__.py:128-165","code":"  128 | class ModelessDialog(Dialog):\n  129 |     \"\"\"A base class for modeless dialogs. They have a parent only temporarily, so\n  130 |     they can be centered over it during creation. But each modeless dialog gets\n  131 |     its own window group, so it treats its own modal dialogs separately, and it resets\n  132 |     its transient-for after being created.\"\"\"\n  133 | \n  134 |     def __init__(\n  135 |         self,\n  136 |         title: str | None = None,\n  137 |         parent: Gtk.Widget | None = None,\n  138 |         flags: Gtk.DialogFlags = 0,\n  139 |         buttons: Gtk.ButtonsType | None = None,\n  140 |         **kwargs: Any,\n  141 |     ):\n  142 |         super().__init__(title, parent, flags, buttons, **kwargs)\n  143 |         # These are not stuck above the 'main' window, but can be\n  144 |         # re-ordered freely.\n  145 |         self.set_type_hint(Gdk.WindowTypeHint.NORMAL)\n  146 | \n  147 |         # These are independent windows, but start centered over\n  148 |         # a parent like a dialog. Not modal, not really transient,\n  149 |         # and does not share modality with other windows - so it\n  150 |         # needs its own window group.\n  151 |         Gtk.WindowGroup().add_window(self)\n  152 |         schedule_at_idle(self._clear_transient_for)\n  153 | \n  154 |     def _clear_transient_for(self) -> None:\n  155 |         # we need the parent set to be centered over the parent, but\n  1 // URL hash — debounced so rapid filter changes don't thrash history

function loadHash() {

// Helpers
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// First sentence of text (up to and including the first period).
function firstSentence(text) {
  const m = String(text).match(/\.(\s|$)/);
  return m ? text.slice(0, text.indexOf(m[0]) + 1) : text;
}

// Build full MD report (mirrors to_markdown in Python).
function buildMdFull() {
  const SORD = ['critical','high','medium','low','negligible'];
  const today = new Date().toISOString().slice(0, 10);
  let out = '# Code Audit Report\n\n_Generated ' + today + '_\n\n';

  const typeMap = new Map();
  for (const f of FINDINGS) {
    if (!typeMap.has(f.type)) typeMap.set(f.type, []);
    typeMap.get(f.type).push(f);
  }
  const sortedTypes = [...typeMap.keys()].sort();

  out += '## Summary\n\n| Type | Severity | Count |\n|------|----------|-------|\n';
  for (const t of sortedTypes) {
    const items = typeMap.get(t);
    const topSev = items.map(f => f.severity || 'medium').reduce((best, s) => {
      const bi = SORD.indexOf(best), si = SORD.indexOf(s);
      return (si >= 0 && (bi < 0 || si < bi)) ? s : best;
    }, 'negligible');
    out += '| ' + typeLabel(t) + ' | ' + topSev + ' | ' + items.length + ' |\n';
  }

  for (const t of sortedTypes) {
    out += '\n## ' + typeLabel(t) + '\n\n';
    for (const f of typeMap.get(t)) {
      const sevStr  = f.severity ? ' `' + f.severity.toUpperCase() + '`' : '';
      const easyStr = f.easy ? ' ⚡ easy' : '';
      out += '### ' + f.id + sevStr + easyStr + '\n\n';
      out += '**Description:** ' + (f.description || '') + '\n\n';
      if (f.locations.length) {
        out += '**Locations:**\n\n';
        for (const l of f.locations) {
          if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
          else                out += '- `' + l.ref + '` _(file not found)_\n\n';
        }
      }
      out += '**Fix:** ' + (f.fix || '') + '\n\n---\n\n';
    }
  }
  return out;
}

// Build MD short checklist (mirrors to_md_short in Python).
function buildMdShort() {
  const lines = [];
  const ids   = [];
  const sorted = [...FINDINGS].sort((a, b) => a.type.localeCompare(b.type));
  for (const f of sorted) {
    ids.push(f.id);
    const desc    = firstSentence(f.description || '');
    const locs    = f.locations.map(l => l.ref);
    const locStr  = locs.length ? ' - [' + locs.join(', ') + ']' : '';
    const sevStr  = f.severity ? ' [' + f.severity.toUpperCase() + ']' : '';
    const easyStr = f.easy ? ' ⚡' : '';
    lines.push('- [ ] - ' + f.id + sevStr + easyStr + ' - ' + desc + locStr);
  }
  lines.push('', '## IDs only', '');
  ids.forEach(id => lines.push('- [ ] - ' + id));
  return lines.join('\n') + '\n';
}

function downloadText(text, filename, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text], {type: mime || 'text/plain'}));
  a.download = filename;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function tomlStr(s) {
  return '"' + String(s == null ? '' : s)
    .replace(/\\/g, '\\\\')
    .replace(/"/g, '\\"')
    .replace(/\n/g, '\\n')
    .replace(/\r/g, '\\r')
    .replace(/\t/g, '\\t') + '"';
}

// Build TOML matching the original findings.toml format (re-parseable by toml_to_report.py).
function buildFindingsToml() {
  function pad(key) { return (key + '            ').slice(0, 12); }
  const chunks = [];
  for (const f of FINDINGS) {
    const lns = ['[[finding]]'];
    lns.push(pad('type')        + '= ' + tomlStr(f.type));
    lns.push(pad('severity')    + '= ' + tomlStr(f.severity || 'medium'));
    if (f.easy) lns.push(pad('easy') + '= true');
    lns.push(pad('description') + '= ' + tomlStr(f.description || ''));
    const refs = f.locations.map(l => tomlStr(l.ref));
    lns.push(pad('locations')   + '= [' + refs.join(', ') + ']');
    lns.push(pad('fix')         + '= ' + tomlStr(f.fix || ''));
    chunks.push(lns.join('\n'));
  }
  return chunks.join('\n\n') + '\n';
}

// Build project-info.toml from embedded PROJECT_INFO (same format as gen_project_info.py).
function buildProjectInfoToml() {
  const ORDER = ['name','description','git_url','repo_url','commit','commit_short','commit_url','branch','generated'];
  const pi = Object.assign({}, PROJECT_INFO);
  if (!('description' in pi)) pi.description = '';
  const lines = [
    '# Project metadata for the code audit report (all fields optional).',
    '# Hand-edit freely (e.g. fill in description); re-run the audit without --force to keep edits.',
    '', '[project]'
  ];
  for (const k of ORDER) {
    if (k in pi) lines.push(k + ' = ' + tomlStr(pi[k]));
  }
  return lines.join('\n') + '\n';
}

// Build the GitHub-ready Markdown for one finding (mirrors findings.md).
function findingToMd(f) {
  let out = '### ' + f.id + (f.severity ? ' `' + f.severity.toUpperCase() + '`' : '') + (f.easy ? ' ⚡ easy' : '') + '\n\n';
  out += '**Description:** ' + (f.description || '') + '\n\n';
  if (f.locations.length) {
    out += '**Locations:**\n\n';
    for (const l of f.locations) {
      if (l.code != null) out += '```\n' + l.ref + '\n' + l.code + '\n```\n\n';
      else                out += '- `' + l.ref + '` _(file not found)_\n\n';
    }
  }
  out += '**Fix:** ' + (f.fix || '') + '\n';
  return out;
}

function flashBtn(btn, msg) {
  btn.textContent = msg;
  setTimeout(() => { btn.textContent = '⧉ Copy'; }, 1200);
}

function copyText(text, btn) {
  const ok = () => flashBtn(btn, '✓ Copied');
  const no = () => flashBtn(btn, '✗ Failed');
  const fallback = () => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.top = '-9999px';
      document.body.appendChild(ta); ta.select();
      const r = document.execCommand('copy');
      document.body.removeChild(ta);
      r ? ok() : no();
    } catch { no(); }
  };
  if (navigator.clipboard && navigator.clipboard.writeText)
    navigator.clipboard.writeText(text).then(ok, fallback);
  else fallback();
}

// Filter logic
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';

}

// Pre-compute search haystack per finding (cleared on full re-render)
const _hay = new Map();
function hayOf(f) {
  if (!_hay.has(f.id)) {
    _hay.set(f.id, [f.id, f.type_label, f.severity, f.description, f.fix,
                    f.easy ? 'easy quick win' : '',
                    ...f.locations.map(l => l.ref)].join(' ').toLowerCase());
  }
  return _hay.get(f.id);
}

function matches(f) {
  if (S.easyOnly && !f.easy)                   return false;
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  const st = statusOf(f.id);
  if (S.hiddenStatus.has(st))                  return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    if (!hayOf(f).includes(q) && !st.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// Build body HTML for an expanded card (called lazily on first expand).
function renderCardBody(f, q) {
  let locs = '';
  for (const l of f.locations) {
    const lineInfo = l.lines != null
      ? ' <span class="loc-lines">(' + l.lines + ' line' + (l.lines === 1 ? '' : 's') + ')</span>'
      : '';
    const refHtml = l.link
      ? '<a class="loc-link" href="' + esc(l.link) + '" target="_blank" rel="noopener" title="Open at this commit">' + highlight(l.ref, q) + ' ↗</a>'
      : highlight(l.ref, q);
    locs += '<div class="loc-block"><div class="loc-ref">' + refHtml + lineInfo + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }
  return (
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>'
  );
}

// Render card shell only — header + empty or populated body.
// When collapsed the body is empty (display:none) — avoids renderMd for 1800+ cards.
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' \u2026' : '')
    : '';

  const bodyInner = isCollapsed ? '' : renderCardBody(f, q);

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '" data-card-id="' + esc(f.id) + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '\u25b6' : '\u25bc') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (f.easy ? '<span class="badge easy-badge" style="cursor:default" title="Easy to verify &amp; fix - no deep knowledge of the code, SDK or technology required">\u26a1 Easy</span>' : '') +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '<button class="copy-btn" data-action="copy-md" data-id="' + esc(f.id) + '" title="Copy as Markdown for GitHub">\u29c9 Copy</button>' +
    '</div>' +
    '<div class="card-body" data-body-id="' + esc(f.id) + '"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    bodyInner +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of PRESENT_SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  if (HAS_EASY)
    h += '<div class="filter-row"><span class="filter-lbl">Quick wins:</span>'
       + '<button class="badge easy-badge" data-easy="1">\u26a1 Easy only</button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-easy]'))   b.classList.toggle('off', !S.easyOnly);
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

// Surgical toggle: flip one card without touching the rest of the DOM.
function toggleCard(id) {
  const wasCollapsed = S.collapsed.has(id);
  if (wasCollapsed) S.collapsed.delete(id); else S.collapsed.add(id);
  const body  = document.querySelector('[data-body-id="' + id + '"]');
  const arrow = document.querySelector('[data-card-id="' + id + '"] .card-arrow');
  if (!body) { render(); return; }
  if (wasCollapsed) {
    if (!body.firstChild) {
      const f = FINDING_BY_ID.get(id);
      if (f) body.innerHTML = renderCardBody(f, S.search);
    }
    body.style.display = '';
    if (arrow) arrow.textContent = '\u25bc';
  } else {
    body.style.display = 'none';
    if (arrow) arrow.textContent = '\u25b6';
  }
}

// Surgical status update: update one card's button + resolved class.
function cycleStatus(id) {
  statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
  saveStatuses();
  const st  = statusOf(id);
  const btn = document.querySelector('.status-btn[data-id="' + id + '"]');
  if (!btn) { render(); return; }
  btn.className   = 'status-btn ' + (STATUS_CLS[st] || 'st-open');
  btn.textContent = STATUS_LBL[st] || '\u25cf open';
  const card = document.querySelector('[data-card-id="' + id + '"]');
  if (card) card.classList.toggle('resolved', st !== 'open');
  updateProgress();
}

// Surgical collapse/expand for a group: toggle all bodies in the group without full re-render.
function collapseGroup(key, collapse) {
  FINDINGS.forEach(f => {
    if (getKey(f) !== key) return;
    if (collapse) S.collapsed.add(f.id); else S.collapsed.delete(f.id);
    const body  = document.querySelector('[data-body-id="' + f.id + '"]');
    const arrow = document.querySelector('[data-card-id="' + f.id + '"] .card-arrow');
    if (!body) return;
    if (collapse) {
      body.style.display = 'none';
      if (arrow) arrow.textContent = '\u25b6';
    } else {
      if (!body.firstChild) {
        const ff = FINDING_BY_ID.get(f.id);
        if (ff) body.innerHTML = renderCardBody(ff, S.search);
      }
      body.style.display = '';
      if (arrow) arrow.textContent = '\u25bc';
    }
  });
}

// Full re-render: used for filter/group-by/search changes.
// Batched via requestAnimationFrame.
let _rafPending = false;
function scheduleRender() {
  if (_rafPending) return;
  _rafPending = true;
  requestAnimationFrame(() => { _rafPending = false; render(); });
}

function render() {
  _hay.clear();
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">\u229f</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">\u229e</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// Event delegation
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all],[data-easy]');
  if (!b) return;
  if (b.dataset.easy) {
    S.easyOnly = !S.easyOnly;
  }
  else if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? PRESENT_SEVS : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  scheduleRender();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key);    scheduleRender(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); scheduleRender(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear();     scheduleRender(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); scheduleRender(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); scheduleRender(); }
  else if (action === 'copy-md') {
    e.stopPropagation();
    const f = FINDING_BY_ID.get(id);
    if (f) copyText(findingToMd(f), b);
  }
  else if (action === 'download-md')       { downloadText(buildMdFull(),  'findings.md'); }
  else if (action === 'download-md-short') { downloadText(buildMdShort(), 'findings-short.md'); }
  else if (action === 'download-toml') {
    downloadText(buildFindingsToml(),    'findings.toml',     'application/toml');
    downloadText(buildProjectInfoToml(), 'project-info.toml', 'application/toml');
  }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    cycleStatus(id);
  }
  else if (action === 'toggle-card') {
    toggleCard(id);
  }
  else if (action === 'collapse-group') {
    collapseGroup(key, true);
  }
  else if (action === 'expand-group') {
    collapseGroup(key, false);
  }
});

// Debounced search — 180 ms after last keystroke
let _searchTimer = 0;
document.getElementById('search').addEventListener('input', e => {
  S.search = e.target.value;
  clearTimeout(_searchTimer);
  _searchTimer = setTimeout(scheduleRender, 180);
});
document.getElementById('groupby').addEventListener('change', e => {
  S.groupBy = e.target.value;
  S.hiddenGroup.clear();
  scheduleRender();
});

// Init
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
