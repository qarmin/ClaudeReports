<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.copy-btn{font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;white-space:nowrap;transition:background .12s,color .12s}
.copy-btn:hover{background:#334155;color:#e2e8f0}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
.loc-lines{color:#475569;font-weight:400}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>
<body>
<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"high","description":"Multiple unwrap() calls on fallible CPAL operations in CpalBackend::list_devices and set_device. host.input_devices().unwrap(), device.id().unwrap(), device.description().unwrap(), and host.default_input_device().unwrap() will all panic if the underlying audio subsystem returns an error (e.g. device hotplug, permission denial, ALSA errors). The default_input_device fallback in set_device is also silent - if the named device is not found it silently falls back to the default without any notification to the caller.","fix":"Return Result<Vec<DeviceListItem>> / Result<Device> from the trait methods, or at minimum use unwrap_or_else and log an error instead of panicking. For set_device's fallback, document or surface the fallback so callers know the device wasn't matched.","locations":[{"ref":"src/core/audio_controllers/cpal.rs:14-16","code":"   14 |         for device in host.input_devices().unwrap() {\n   15 |             let device_id = device.id().unwrap().to_string();\n   16 |             let device_description = device.description().unwrap();","lines":3},{"ref":"src/core/audio_controllers/cpal.rs:61-64","code":"   61 |         let mut device: cpal::Device = host.default_input_device().unwrap();\n   62 | \n   63 |         for possible_device in host.input_devices().unwrap() {\n   64 |             if possible_device.id().unwrap().to_string() == inner_name {","lines":4}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"high","description":"PulseBackend::get_app_idx calls self.handler.list_applications().unwrap(), which will panic if PulseAudio returns an error mid-session (e.g. daemon restart, socket disconnect).","fix":"Propagate the error: change get_app_idx to return Result<Option<u32>> and use ? instead of unwrap, then update set_device to handle the Err case.","locations":[{"ref":"src/core/audio_controllers/pulseaudio.rs:37","code":"   37 |         let applications = self.handler.list_applications().unwrap();","lines":1}]},{"id":"PANIC_3","type":"panic","type_label":"Panic","severity":"high","description":"PulseBackend::set_device calls self.handler.move_app_by_name(app_idx, inner_name).unwrap(), which panics if PulseAudio cannot move the stream (e.g. source gone, permission error). Also host.default_input_device().unwrap() at the end will panic if no default device exists.","fix":"Replace unwrap with proper error logging. The trait's return type Device makes proper error propagation difficult; consider returning Option<Device> or Result<Device>.","locations":[{"ref":"src/core/audio_controllers/pulseaudio.rs:126","code":"  126 |                             self.handler.move_app_by_name(app_idx, inner_name).unwrap();","lines":1},{"ref":"src/core/audio_controllers/pulseaudio.rs:137","code":"  137 |         host.default_input_device().unwrap()","lines":1}]},{"id":"PANIC_4","type":"panic","type_label":"Panic","severity":"high","description":"decode_from_binary uses assert!/assert_eq! throughout instead of returning Err. Any malformed or untrusted input (wrong magic, bad CRC, unknown sample rate, unknown frequency band ID) will panic the process rather than propagate a Result. decode_from_uri also asserts the URI prefix.","fix":"Replace every assert!/assert_eq!/panic! in decode_from_binary and decode_from_uri with explicit Err(...) returns so callers can handle bad data gracefully.","locations":[{"ref":"src/core/fingerprinting/signature_format.rs:44","code":"   44 |         assert!(data.len() > 48 + 8);","lines":1},{"ref":"src/core/fingerprinting/signature_format.rs:69-72","code":"   69 |         assert_eq!(header.magic1, 0xcafe2580);\n   70 |         assert_eq!(header.size_minus_header as usize, data.len() - 48);\n   71 |         assert_eq!(header.crc32, hasher.finalize());\n   72 |         assert_eq!(header.magic2, 0x94119c00);","lines":4},{"ref":"src/core/fingerprinting/signature_format.rs:82-87","code":"   82 |                 panic!(\n   83 |                     \"{}\",\n   84 |                     gettext(\"Invalid sample rate in decoded Shazam packet\")\n   85 |                 );\n   86 |             }\n   87 |         };","lines":6},{"ref":"src/core/fingerprinting/signature_format.rs:97-98","code":"   97 |         assert_eq!(cursor.read_u32::<LittleEndian>()?, 0x40000000);\n   98 |         assert_eq!(cursor.read_u32::<LittleEndian>()? as usize, data.len() - 48);","lines":2},{"ref":"src/core/fingerprinting/signature_format.rs:122-128","code":"  122 |                 _ => {\n  123 |                     panic!(\n  124 |                         \"{}\",\n  125 |                         gettext(\"Invalid frequency band in decoded Shazam packet\")\n  126 |                     );\n  127 |                 }\n  128 |             };","lines":7},{"ref":"src/core/fingerprinting/signature_format.rs:170","code":"  170 |         assert!(uri.starts_with(DATA_URI_PREFIX));","lines":1}]},{"id":"PANIC_5","type":"panic","type_label":"Panic","severity":"high","description":"decode_from_binary slices data[] directly at line 111-113 without bounds-checking the computed end index. If a packet has a frequency_peaks_size larger than the remaining data, the slice panics. The u64-to-u32 cast of cursor.position() also silently drops the high bits, producing a wrong (possibly smaller) slice end for very large inputs.","fix":"Validate that cursor.position() + frequency_peaks_size as u64 <= data.len() as u64 before slicing. Use u64 arithmetic throughout instead of casting through u32.","locations":[{"ref":"src/core/fingerprinting/signature_format.rs:111-113","code":"  111 |                 &data[cursor.position() as usize\n  112 |                     ..(cursor.position() as u32 + frequency_peaks_size) as usize],\n  113 |             );","lines":3}]},{"id":"PANIC_6","type":"panic","type_label":"Panic","severity":"high","description":"preferences.request_interval_secs_v3.unwrap() is called in write_data without a fallback. If the preferences migration logic in PreferencesInterface::update fails to populate request_interval_secs_v3 (e.g. a freshly deserialized file with all None fields that bypasses Default), this panics in the audio callback thread, crashing the stream.","fix":"Use .unwrap_or(8) to fall back to the default interval, matching the Default impl in preferences.rs.","locations":[{"ref":"src/core/microphone_thread.rs:366","code":"  366 |         request_interval_secs = preferences.request_interval_secs_v3.unwrap() as usize;","lines":1}]},{"id":"PANIC_7","type":"panic","type_label":"Panic","severity":"high","description":"`old_preferences.request_interval_secs_v3.unwrap()` panics when the preferences file contains a TOML document with `request_interval_secs_v3` omitted and all the legacy interval fields absent - this leaves the field as `None` after a failed TOML parse that falls back to `Preferences::default()`. In the error-path constructor (`PreferencesInterface::new` -> error branch), `Preferences::default()` is used and does set the field to `Some(8)`, but if `Preferences::load` succeeds and returns a file that was written before `request_interval_secs_v3` existed and has no default, the field remains `None`.","fix":"Use `unwrap_or(8)` or `unwrap_or_default()` rather than a bare `unwrap()`.","locations":[{"ref":"src/gui/main_window.rs:141","code":"  141 |         request_interval_value.set_value(old_preferences.request_interval_secs_v3.unwrap() as f64);","lines":1}]},{"id":"PANIC_8","type":"panic","type_label":"Panic","severity":"high","description":"OsString-to-String conversion panics on non-UTF-8 file paths. `file_path.into_os_string().into_string().unwrap()` inside the `connect_open` callback will panic if the user opens a file whose path contains non-UTF-8 bytes (valid on Linux).","fix":"Use `file_path.to_string_lossy().into_owned()` or propagate the error instead of `.unwrap()`.","locations":[{"ref":"src/gui/main_window.rs:208","code":"  208 |                     let file_path_string = file_path.into_os_string().into_string().unwrap();","lines":1}]},{"id":"PANIC_9","type":"panic","type_label":"Panic","severity":"high","description":"cover_image slice index assumes at least 16 bytes. In the SongRecognized debug log, `&data[..16]` panics if the image buffer is shorter than 16 bytes. A truncated or malformed HTTP response from the cover-art URL could trigger this.","fix":"Replace `&data[..16]` with `&data[..data.len().min(16)]`.","locations":[{"ref":"src/gui/main_window.rs:832","code":"  832 |                                 \"cover_image\": msg.cover_image.as_ref().map(|data| format!(\"{:02x?}...\", &data[..16])),","lines":1}]},{"id":"PANIC_10","type":"panic","type_label":"Panic","severity":"high","description":"`old_preferences.enable_mpris_v2.unwrap()`, `enable_notifications.unwrap()`, `enable_systray.unwrap()`, and `no_duplicates.unwrap()` are all called unconditionally to build the initial action states. Each of these fields is `Option<bool>` and can be `None` when a preferences file exists but was written before that field was introduced (all fields default to `None` in `Preferences::new()`). A corrupted or manually-edited TOML file that omits these keys will cause a panic at startup.","fix":"Use `unwrap_or(true/false)` matching the documented defaults instead of bare `unwrap()`.","locations":[{"ref":"src/gui/main_window.rs:1380","code":" 1380 |             .state(self.old_preferences.enable_mpris_v2.unwrap().to_variant())","lines":1},{"ref":"src/gui/main_window.rs:1399-1401","code":" 1399 |                 self.old_preferences\n 1400 |                     .enable_notifications\n 1401 |                     .unwrap()","lines":3},{"ref":"src/gui/main_window.rs:1424","code":" 1424 |             .state(self.old_preferences.enable_systray.unwrap().to_variant())","lines":1},{"ref":"src/gui/main_window.rs:1452","code":" 1452 |             .state(self.old_preferences.no_duplicates.unwrap().to_variant())","lines":1}]},{"id":"PANIC_11","type":"panic","type_label":"Panic","severity":"high","description":"wipe_and_save() calls csv::Writer::from_path(...).unwrap() on both RecognitionHistoryInterface and FavoritesInterface. If the path is read-only, the filesystem is full, or the directory was removed, this panics the entire application instead of surfacing an error.","fix":"Return Result<(), Box<dyn Error>> from wipe_and_save() and propagate the error, or at minimum log the error with error!() and skip the write.","locations":[{"ref":"src/gui/song_history_interface.rs:124","code":"  124 |         let mut writer = csv::Writer::from_path(&self.csv_path).unwrap();","lines":1},{"ref":"src/gui/song_history_interface.rs:190","code":"  190 |         let mut writer = csv::Writer::from_path(&self.csv_path).unwrap();","lines":1}]},{"id":"PANIC_12","type":"panic","type_label":"Panic","severity":"high","description":"save() calls csv::Writer::from_path(...).unwrap(), writer.serialize(...).unwrap(), and writer.flush().unwrap() on both RecognitionHistoryInterface and FavoritesInterface. Any I/O or serialization failure panics the entire application.","fix":"Return Result<(), Box<dyn Error>> from save() and propagate errors up through add_row_and_save / remove, or log them and continue.","locations":[{"ref":"src/gui/song_history_interface.rs:136-143","code":"  136 |         let mut writer = csv::Writer::from_path(&self.csv_path).unwrap();\n  137 | \n  138 |         for item in self.list_store.iter::<glib::Object>() {\n  139 |             let item = item.unwrap().downcast::<HistoryEntry>().unwrap();\n  140 |             writer.serialize(item.get_song_history_record()).unwrap();\n  141 |         }\n  142 |         writer.flush().unwrap();\n  143 |     }","lines":8},{"ref":"src/gui/song_history_interface.rs:201-209","code":"  201 |     fn save(&mut self) {\n  202 |         let mut writer = csv::Writer::from_path(&self.csv_path).unwrap();\n  203 | \n  204 |         for item in self.list_store.iter::<glib::Object>() {\n  205 |             let item = item.unwrap().downcast::<HistoryEntry>().unwrap();\n  206 |             writer.serialize(item.get_song_history_record()).unwrap();\n  207 |         }\n  208 |         writer.flush().unwrap();\n  209 |     }","lines":9}]},{"id":"PANIC_13","type":"panic","type_label":"Panic","severity":"high","description":"decode_with_ffmpeg calls unwrap() on current_exe() and on to_str() for the path. If the executable path cannot be determined, or its path contains non-UTF-8 bytes, the process panics unconditionally.","fix":"Use unwrap_or_else or return None/error early instead of unwrap(). For the to_str() call, skip the path if it is not UTF-8 rather than panicking.","locations":[{"ref":"src/plugins/ffmpeg_wrapper.rs:17","code":"   17 |     let mut current_dir_ffmpeg_path = std::env::current_exe().unwrap();","lines":1},{"ref":"src/plugins/ffmpeg_wrapper.rs:21","code":"   21 |     possible_ffmpeg_paths.push(current_dir_ffmpeg_path.to_str().unwrap());","lines":1}]},{"id":"PANIC_14","type":"panic","type_label":"Panic","severity":"high","description":"tempfile::Builder::new().suffix(\".wav\").tempfile().unwrap() in decode_with_ffmpeg panics if the OS cannot create a temporary file (e.g. /tmp is full or permissions are wrong).","fix":"Propagate the error: change the return type to Result or match on the tempfile result and return None on failure.","locations":[{"ref":"src/plugins/ffmpeg_wrapper.rs:53","code":"   53 |         let sink_file = tempfile::Builder::new().suffix(\".wav\").tempfile().unwrap();","lines":1}]},{"id":"PANIC_15","type":"panic","type_label":"Panic","severity":"high","description":"std::fs::File::open(...).unwrap() and rodio::Decoder::new(...).unwrap() on the temp WAV file written by ffmpeg will panic if the file cannot be opened (e.g. race with OS cleanup) or if the decoder fails.","fix":"Match or use ? to propagate errors; return None on failure.","locations":[{"ref":"src/plugins/ffmpeg_wrapper.rs:77-79","code":"   77 |                             std::fs::File::open(sink_file_path.to_str().unwrap()).unwrap(),\n   78 |                         ))\n   79 |                         .unwrap(),","lines":3}]},{"id":"PANIC_16","type":"panic","type_label":"Panic","severity":"high","description":"PROJECT_DIRS static is initialised with ProjectDirs::from(...).unwrap(). On platforms where XDG/home-directory resolution fails (no HOME set, container environments) this panics at first use, crashing the application before main() can report any error.","fix":"Wrap in a Result-returning function or use LazyLock<Option<ProjectDirs>> and propagate None as a proper error from each call site.","locations":[{"ref":"src/utils/filesystem_operations.rs:16-17","code":"   16 | static PROJECT_DIRS: LazyLock<ProjectDirs> =\n   17 |     LazyLock::new(|| ProjectDirs::from(QUALIFIER, ORGANIZATION, APPLICATION).unwrap());","lines":2}]},{"id":"PANIC_17","type":"panic","type_label":"Panic","severity":"high","description":"setup_internationalization calls std::env::current_exe().unwrap() twice. If the path cannot be read the process panics during early startup before any error handling is in place.","fix":"Return a Result or use unwrap_or_else with a fallback to skip the binary-relative path search.","locations":[{"ref":"src/utils/internationalization.rs:10","code":"   10 |     let mut translations_path = std::env::current_exe().unwrap();","lines":1},{"ref":"src/utils/internationalization.rs:22","code":"   22 |         translations_path = std::env::current_exe().unwrap();","lines":1}]},{"id":"PANIC_18","type":"panic","type_label":"Panic","severity":"medium","description":"cli_main.rs: microphone_tx.try_send(...).unwrap() and processing_tx.try_send(...).unwrap() can panic if the receiving threads have already exited when these sends happen.","fix":"Replace .unwrap() with .ok() or log the error.","locations":[{"ref":"src/cli_main.rs:101-103","code":"  101 |             processing_tx\n  102 |                 .try_send(ProcessingMessage::ProcessAudioFile(filename.to_string()))\n  103 |                 .unwrap();","lines":3},{"ref":"src/cli_main.rs:148-152","code":"  148 |                     microphone_tx\n  149 |                         .try_send(MicrophoneMessage::MicrophoneRecordStart(\n  150 |                             dev_name.to_owned(),\n  151 |                         ))\n  152 |                         .unwrap();","lines":5}]},{"id":"PANIC_19","type":"panic","type_label":"Panic","severity":"medium","description":"cli_main.rs: csv_writer.serialize(...).unwrap() and csv_writer.flush().unwrap() will panic if stdout is broken (e.g. piped to a closed process).","fix":"Propagate errors: use ? if the function returns Result, or log and break the loop on failure.","locations":[{"ref":"src/cli_main.rs:206-218","code":"  206 |                                 csv_writer\n  207 |                                     .serialize(SongHistoryRecord {\n  208 |                                         song_name,\n  209 |                                         album: Some(message.album_name.unwrap_or_default()),\n  210 |                                         track_key: Some(message.track_key),\n  211 |                                         release_year: Some(\n  212 |                                             message.release_year.unwrap_or_default(),\n  213 |                                         ),\n  214 |                                         genre: Some(message.genre.unwrap_or_default()),\n  215 |                                         recognition_date: Local::now().format(\"%c\").to_string(),\n  216 |                                     })\n  217 |                                     .unwrap();\n  218 |                                 csv_writer.flush().unwrap();","lines":13}]},{"id":"PANIC_20","type":"panic","type_label":"Panic","severity":"medium","description":"assert!(peak_variation_1 >= 0.0) in do_peak_recognition can fire in practice. The conditions that guard the peak (comparisons against the spread FFT neighbors) do not guarantee that fft_minus_46[bin-1] and fft_minus_46[bin+1] are both less than fft_minus_46[bin] in the raw (non-spread) domain. When adjacent raw bins are slightly larger than the center after the log transform, peak_variation_1 becomes negative and the assert panics.","fix":"Replace the assert with a runtime guard: if peak_variation_1 <= 0.0 { continue; } to skip degenerate peaks instead of crashing.","locations":[{"ref":"src/core/fingerprinting/algorithm.rs:287","code":"  287 |                         assert!(peak_variation_1 >= 0.0);","lines":1}]},{"id":"PANIC_21","type":"panic","type_label":"Panic","severity":"medium","description":"obtain_raw_cover_image slices response[..32] unconditionally for the debug log preview. If the HTTP response body is shorter than 32 bytes (e.g. a short error response), this panics with an index-out-of-bounds.","fix":"Use response[..response.len().min(32)] instead.","locations":[{"ref":"src/core/fingerprinting/communication.rs:149","code":"  149 |     let resp_header = format!(\"{:?}...\", &response[..32]);","lines":1}]},{"id":"PANIC_22","type":"panic","type_label":"Panic","severity":"medium","description":"encode_to_binary asserts that peaks are in ascending fft_pass_number order (line 227). If caller passes unsorted peaks, this panics instead of returning an error.","fix":"Return Err(...) instead of asserting, or sort the peaks before encoding.","locations":[{"ref":"src/core/fingerprinting/signature_format.rs:227","code":"  227 |                 assert!(frequency_peak.fft_pass_number >= fft_pass_number);","lines":1}]},{"id":"PANIC_23","type":"panic","type_label":"Panic","severity":"medium","description":"In http_task, gui_tx.try_send(...).unwrap() and microphone_tx.try_send(...).unwrap() are called unconditionally. If the receiving end has been dropped or the channel is full (try_send on a bounded channel returns Err(Full) or Err(Closed)), these will panic. The same pattern is repeated across 7 sites in that function.","fix":"Either use unbounded channels, or match the try_send result and log/break on error instead of unwrapping.","locations":[{"ref":"src/core/http_task.rs:104-107","code":"  104 |                             .try_send(GUIMessage::SongRecognized(Box::new(recognized_song)))\n  105 |                             .unwrap();\n  106 |                         gui_tx.try_send(GUIMessage::NetworkStatus(true)).unwrap();\n  107 |                         gui_tx.try_send(GUIMessage::RateLimitState(false)).unwrap();","lines":4},{"ref":"src/core/http_task.rs:113-115","code":"  113 |                                 .unwrap();\n  114 |                             gui_tx.try_send(GUIMessage::NetworkStatus(true)).unwrap();\n  115 |                             gui_tx.try_send(GUIMessage::RateLimitState(false)).unwrap();","lines":3},{"ref":"src/core/http_task.rs:118","code":"  118 |                             gui_tx.try_send(GUIMessage::RateLimitState(true)).unwrap();","lines":1},{"ref":"src/core/http_task.rs:122","code":"  122 |                             gui_tx.try_send(GUIMessage::NetworkStatus(false)).unwrap();","lines":1},{"ref":"src/core/http_task.rs:127-129","code":"  127 |                 microphone_tx\n  128 |                     .try_send(MicrophoneMessage::ProcessingDone)\n  129 |                     .unwrap();","lines":3}]},{"id":"PANIC_24","type":"panic","type_label":"Panic","severity":"medium","description":"In logging.rs, GUIDispatcher::write calls gui_tx.try_send(...).unwrap(). This is called from the logging infrastructure (potentially from any thread, including error paths). A panic inside a log write callback can lead to abort or deadlock.","fix":"Replace .unwrap() with .ok() or silently discard the error - log writers must never panic.","locations":[{"ref":"src/core/logging.rs:38-39","code":"   38 |                 ))\n   39 |                 .unwrap();","lines":2}]},{"id":"PANIC_25","type":"panic","type_label":"Panic","severity":"medium","description":"In microphone_thread, nearly every try_send to gui_tx, processing_tx, and microphone_tx is unwrapped (lines 137-138, 314, 325-328, 393-396, 427-429). write_data() also calls try_send().unwrap() on processing_tx and gui_tx. Any of these will panic if the channel is closed (e.g. GUI thread exits) or full.","fix":"Handle SendError: for gui_tx sends log and continue; for critical channels break out of the loop.","locations":[{"ref":"src/core/microphone_thread.rs:136-138","code":"  136 |         gui_tx\n  137 |             .try_send(GUIMessage::DevicesList(device_names))\n  138 |             .unwrap();","lines":3},{"ref":"src/core/microphone_thread.rs:312-314","code":"  312 |                     stream.as_ref().unwrap().play().unwrap();\n  313 | \n  314 |                     gui_tx_4.try_send(GUIMessage::MicrophoneRecording).unwrap();","lines":3},{"ref":"src/core/microphone_thread.rs:325-328","code":"  325 | \n  326 |                     gui_tx\n  327 |                         .try_send(GUIMessage::DevicesList(device_names))\n  328 |                         .unwrap();","lines":4},{"ref":"src/core/microphone_thread.rs:393-396","code":"  393 |                 .try_send(ProcessingMessage::ProcessAudioSamples(\n  394 |                     twelve_seconds_buffer.to_vec(),\n  395 |                 ))\n  396 |                 .unwrap();","lines":4},{"ref":"src/core/microphone_thread.rs:427-429","code":"  427 |             .try_send(GUIMessage::MicrophoneVolumePercent(\n  428 |                 max_f32_amplitude * 100.0,\n  429 |             ))","lines":3}]},{"id":"PANIC_26","type":"panic","type_label":"Panic","severity":"medium","description":"In processing_thread, http_tx.try_send(...).unwrap() and gui_tx.try_send(...).unwrap() will panic if a channel is closed or a bounded channel is full.","fix":"Handle the SendError instead of unwrapping; log and break the loop on channel close.","locations":[{"ref":"src/core/processing_thread.rs:23-25","code":"   23 |                     .try_send(HTTPMessage::RecognizeSignature(Box::new(signature)))\n   24 |                     .unwrap();\n   25 |             }","lines":3},{"ref":"src/core/processing_thread.rs:28-30","code":"   28 |                     .try_send(GUIMessage::ErrorMessage(error.to_string()))\n   29 |                     .unwrap();\n   30 |             }","lines":3}]},{"id":"PANIC_27","type":"panic","type_label":"Panic","severity":"medium","description":"record.downcast::<HistoryEntry>().unwrap() is called in connect_menu_mouse_actions and connect_menu_key_actions when handling cell/selection items. If the column view model is ever populated with a non-HistoryEntry item this panics at runtime.","fix":"Use downcast::<HistoryEntry>().ok() with an early return, or use a descriptive expect().","locations":[{"ref":"src/gui/context_menu.rs:43","code":"   43 |                     let record = record.downcast::<HistoryEntry>().unwrap();","lines":1},{"ref":"src/gui/context_menu.rs:108","code":"  108 |                         let record = record.downcast::<HistoryEntry>().unwrap();","lines":1},{"ref":"src/gui/context_menu.rs:138","code":"  138 |                             let record = record.downcast::<HistoryEntry>().unwrap();","lines":1}]},{"id":"PANIC_28","type":"panic","type_label":"Panic","severity":"medium","description":"`application.windows()[0]` in the `connect_activate` handler panics with an index-out-of-bounds if the window list is empty. While GTK guarantees `startup` fires before `activate`, this guard is implicit and fragile - any future refactor that defers window creation past `on_startup` will introduce a crash.","fix":"Use `application.windows().first()` and handle the `None` case gracefully.","locations":[{"ref":"src/gui/main_window.rs:218","code":"  218 |             let main_window = &application.windows()[0];","lines":1}]},{"id":"PANIC_29","type":"panic","type_label":"Panic","severity":"medium","description":"XML string-parsing in the about-dialog action uses chained `Vec::index` operations (`[1]`, `[0]`) that panic if the embedded metainfo XML file does not contain the expected markers. Although the XML is currently present and well-formed, any future packaging mistake or file-encoding issue would cause a runtime panic every time the About dialog is opened.","fix":"Use `.get(1)` / `.get(0)` and unwrap with a fallback empty string, or parse the version at compile time with a macro.","locations":[{"ref":"src/gui/main_window.rs:1195-1197","code":" 1195 |                     .collect::<Vec<_>>()[1]\n 1196 |                         .split(\"\\\"\")\n 1197 |                         .collect::<Vec<_>>()[0],","lines":3},{"ref":"src/gui/main_window.rs:1205-1209","code":" 1205 |                     .collect::<Vec<_>>()[1]\n 1206 |                         .split(\"<description>\")\n 1207 |                         .collect::<Vec<_>>()[1]\n 1208 |                         .split(\"<\/description>\")\n 1209 |                         .collect::<Vec<_>>()[0],","lines":5}]},{"id":"PANIC_30","type":"panic","type_label":"Panic","severity":"medium","description":"remove_song() calls item.clone().downcast::<HistoryEntry>().unwrap() inside the retain closure. If the ListStore ever contains a non-HistoryEntry GObject (e.g. due to a programming mistake elsewhere), this panics. Same pattern exists in both save() implementations.","fix":"Use downcast::<HistoryEntry>().ok() and skip items that fail the cast, or assert the invariant with a descriptive expect() message.","locations":[{"ref":"src/gui/song_history_interface.rs:35","code":"   35 |             let item = item.clone().downcast::<HistoryEntry>().unwrap();","lines":1},{"ref":"src/gui/song_history_interface.rs:139","code":"  139 |             let item = item.unwrap().downcast::<HistoryEntry>().unwrap();","lines":1},{"ref":"src/gui/song_history_interface.rs:205","code":"  205 |             let item = item.unwrap().downcast::<HistoryEntry>().unwrap();","lines":1}]},{"id":"PANIC_31","type":"panic","type_label":"Panic","severity":"medium","description":"ksni.rs: try_send().unwrap() is called in three places (activate, watcher_offline, menu item callbacks). If the receiving end of the channel has been dropped the process will panic.","fix":"Use try_send(...).ok() or log the error instead of unwrapping.","locations":[{"ref":"src/plugins/ksni.rs:35","code":"   35 |         self.gui_tx.try_send(GUIMessage::ShowWindow).unwrap();","lines":1},{"ref":"src/plugins/ksni.rs:38","code":"   38 |         self.gui_tx.try_send(GUIMessage::ShowWindow).unwrap();","lines":1},{"ref":"src/plugins/ksni.rs:50","code":"   50 |                     tray.gui_tx.try_send(GUIMessage::ShowWindow).unwrap();","lines":1},{"ref":"src/plugins/ksni.rs:58","code":"   58 |                     tray.gui_tx.try_send(GUIMessage::QuitApplication).unwrap();","lines":1}]},{"id":"PANIC_32","type":"panic","type_label":"Panic","severity":"medium","description":"mpris_player.rs: obtain_cache_directory().unwrap() panics if the cache directory cannot be determined or created (same issue as the PROJECT_DIRS static).","fix":"Propagate the error: return early from update_song or skip writing the cover file if the cache directory is unavailable.","locations":[{"ref":"src/plugins/mpris_player.rs:85","code":"   85 |         let mut tmp = obtain_cache_directory().unwrap();","lines":1}]},{"id":"PANIC_33","type":"panic","type_label":"Panic","severity":"medium","description":"mpris_player.rs: SystemTime::now().duration_since(SystemTime::UNIX_EPOCH).unwrap() will panic if the system clock is set before the Unix epoch (unlikely but possible in containers or after clock adjustments).","fix":"Use .unwrap_or(Duration::ZERO) or .unwrap_or_default() to avoid the panic.","locations":[{"ref":"src/plugins/mpris_player.rs:86-89","code":"   86 |         let timestamp = SystemTime::now()\n   87 |             .duration_since(SystemTime::UNIX_EPOCH)\n   88 |             .unwrap()\n   89 |             .as_secs();","lines":4}]},{"id":"PANIC_34","type":"panic","type_label":"Panic","severity":"medium","description":"clear_cache calls obtain_cache_directory().unwrap() and silently ignores the read_dir result, but will panic if the cache directory cannot be created.","fix":"Propagate the error from obtain_cache_directory() or use if let Ok(dir) = obtain_cache_directory() to skip silently.","locations":[{"ref":"src/utils/filesystem_operations.rs:70","code":"   70 |     if let Ok(contents) = std::fs::read_dir(obtain_cache_directory().unwrap()) {","lines":1}]},{"id":"PANIC_35","type":"panic","type_label":"Panic","severity":"low","description":"build.rs: clap_mangen::generate_to(...).unwrap() and the subsequent fs::read_dir and gz-generation chain all use unwrap(). A failure at any step aborts the whole build with an unhelpful panic message rather than a proper cargo error.","fix":"Use expect() with descriptive messages, or propagate errors via a Result-returning main.","locations":[{"ref":"build.rs:292-302","code":"  292 |     clap_mangen::generate_to(app!(), &out_dir).unwrap();\n  293 | \n  294 |     for path in std::fs::read_dir(out_dir).unwrap() {\n  295 |         let path_str = path.unwrap().path().display().to_string();\n  296 |         if path_str.ends_with(\".1\") {\n  297 |             let f = std::fs::File::create(format!(\"{}.gz\", path_str)).unwrap();\n  298 |             let mut gz = GzBuilder::new().write(f, Compression::best());\n  299 |             gz.write_all(&std::fs::read(&path_str).unwrap()).unwrap();\n  300 |             gz.finish().unwrap();\n  301 |             std::fs::remove_file(path_str).unwrap();\n  302 |         }","lines":11}]},{"id":"PANIC_36","type":"panic","type_label":"Panic","severity":"low","description":"main.rs: at line 332 i18n_folder is matched and path.to_str().unwrap() is called. If the translations path contains non-UTF-8 characters this panics during startup.","fix":"Use path.display() (which never panics) for the debug log line.","locations":[{"ref":"src/main.rs:332","code":"  332 |             debug!(\"Translations folder found at: {}\", path.to_str().unwrap());","lines":1}]},{"id":"PANIC_37","type":"panic","type_label":"Panic","severity":"low","description":"mpris_player.rs: glib::prgname().unwrap() panics if no program name has been set yet. The function is called during Player::builder construction before glib::set_prgname() is invoked in main().","fix":"Pass a fallback string: glib::prgname().unwrap_or_else(|| \"re.fossplant.songrec\".into()).","locations":[{"ref":"src/plugins/mpris_player.rs:31","code":"   31 |     .desktop_entry(glib::prgname().unwrap())","lines":1}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"medium","description":"obtain_data_directory and obtain_preferences_directory use a TOCTOU pattern: they test .exists(), then create the directory or symlink. Between the check and the creation another process could create the path, causing a spurious error or incorrect symlink creation.","fix":"Use create_dir_all unconditionally (it is idempotent) and only special-case the symlink path if the symlink/migration is truly needed.","locations":[{"ref":"src/utils/filesystem_operations.rs:39-49","code":"   39 |     if !data_dir.exists() {\n   40 |         let old_dir = get_old_data_dir_path()?;\n   41 |         if old_dir.exists() {\n   42 |             #[cfg(not(windows))]\n   43 |             symlink(old_dir, data_dir)?;\n   44 |             #[cfg(windows)]\n   45 |             symlink_dir(old_dir, data_dir)?;\n   46 |         } else {\n   47 |             create_dir_all(data_dir)?;\n   48 |         }\n   49 |     }","lines":11},{"ref":"src/utils/filesystem_operations.rs:55-57","code":"   55 |     if !preferences_dir.exists() {\n   56 |         create_dir_all(preferences_dir)?;\n   57 |     }","lines":3}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In microphone_thread, when MicrophoneRecordStop is received the old stream is dropped and stream is set to None. However, if MicrophoneRecordStart is received while a stream is already active, the old stream in 'stream' is silently replaced with the new stream without an explicit stop, relying on drop to pause the old stream. This is not a hard leak (drop does clean up) but the old stream continues running until the assignment, and any play()/pause() error on the old stream is ignored.","fix":"Before building the new stream, explicitly drop the old one if present, e.g. stream = None; at the start of the MicrophoneRecordStart arm.","locations":[{"ref":"src/core/microphone_thread.rs:298-313","code":"  298 |                     stream = Some(build_input_streams!(\n  299 |                         F64, f64;\n  300 |                         I8, i8;\n  301 |                         I16, i16;\n  302 |                         I24, cpal::I24;\n  303 |                         I32, i32;\n  304 |                         I64, i64;\n  305 |                         U8, u8;\n  306 |                         U16, u16;\n  307 |                         U24, cpal::U24;\n  308 |                         U32, u32;\n  309 |                         U64, u64\n  310 |                     ));\n  311 | \n  312 |                     stream.as_ref().unwrap().play().unwrap();\n  313 | ","lines":16}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"ffmpeg_wrapper.rs: the temporary file is converted to a TempPath at line 55 (sink_file_path). If the FFmpeg command fails or the decoder construction fails, the TempPath RAII guard cleans the file up correctly - but if decode_with_ffmpeg returns Some(...) the file is kept alive only until TempPath is dropped at end of scope, which is immediately after the Decoder is constructed. The returned Decoder may then try to read a file that has already been deleted.","fix":"Keep the TempPath alive alongside the Decoder, for example by returning (Decoder, TempPath) or converting the TempPath to a permanent file if the Decoder needs to read it lazily.","locations":[{"ref":"src/plugins/ffmpeg_wrapper.rs:55-79","code":"   55 |         let sink_file_path = sink_file.into_temp_path();\n   56 | \n   57 |         // Try to convert the input video or audio file to a standard\n   58 |         // .WAV s16le PCM file using FFMpeg, and pass it to Rodio\n   59 |         // later in the case where it succeeded\n   60 | \n   61 |         let mut command = Command::new(ffmpeg_path);\n   62 | \n   63 |         let command = command.args([\"-y\", \"-i\", file_path, sink_file_path.to_str().unwrap()]);\n   64 | \n   65 |         debug!(\"Spawning ffmpeg: {:?}\", command);\n   66 | \n   67 |         // Set \"CREATE_NO_WINDOW\" on Windows, see\n   68 |         // https://stackoverflow.com/a/60958956/662399\n   69 |         #[cfg(windows)]\n   70 |         let command = command.creation_flags(0x00000008);\n   71 | \n   72 |         match command.output() {\n   73 |             Ok(process) => {\n   74 |                 if process.status.success() {\n   75 |                     return Some(\n   76 |                         rodio::Decoder::new(BufReader::new(\n   77 |                             std::fs::File::open(sink_file_path.to_str().unwrap()).unwrap(),\n   78 |                         ))\n   79 |                         .unwrap(),","lines":25}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"The timestamp_ms value (u128, current value ~1.78e12 ms) is cast to u32 (max 4,294,967,295 ms = ~49.7 days after epoch) in two places in the JSON payload. This truncation has been in effect since February 1970. The Shazam API apparently tolerates it, but the sent timestamp is wrong and the behavior depends on undocumented server tolerance.","fix":"Use timestamp_ms as u64 (or keep u128) in the JSON. serde_json serializes u64 as a JSON number without loss for values this size.","locations":[{"ref":"src/core/fingerprinting/communication.rs:82","code":"   82 |             \"timestamp\": timestamp_ms as u32,","lines":1},{"ref":"src/core/fingerprinting/communication.rs:85","code":"   85 |         \"timestamp\": timestamp_ms as u32,","lines":1}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"`setup_systray` calls `ctx_systray_handle.take()` (which unconditionally replaces the cell value with `None`) to check whether the systray is already running. If the systray handle is `Some` the old handle is silently dropped without disabling the systray, leaking the ksni instance. The guard should be a non-destructive `borrow().is_none()` check.","fix":"Change `if ctx_systray_handle.take().is_none()` to `if ctx_systray_handle.borrow().is_none()`.","locations":[{"ref":"src/gui/main_window.rs:339","code":"  339 |             if ctx_systray_handle.take().is_none() {","lines":1}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"cli_main.rs: when the user specifies --audio-device and the device is not found, the code breaks out of the loop without calling loop_inner.quit(). The glib main loop then runs forever and the process hangs.","fix":"Add loop_inner.quit() before the break, mirroring the pattern used at line 124-125.","locations":[{"ref":"src/cli_main.rs:135-139","code":"  135 |                         if !found {\n  136 |                             error!(\"{}\", gettext(\"Exiting: audio device not found\"));\n  137 |                             break;\n  138 |                         }\n  139 |                         dev","lines":5}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In http_task, error classification relies on comparing the localized error string (after gettext translation) against a gettext-translated constant. If the locale changes at runtime, or if gettext returns a different translation than what was stored in error.to_string(), the comparison on lines 110 and 117 will fail to match and network errors will be misclassified (e.g. 'no match' errors treated as network failures). The double-gettext pattern is fragile.","fix":"Use a dedicated error type (e.g. an enum or a newtype) instead of comparing localized strings. Return a typed SongRecognitionError from try_recognize_song so the match in http_task can use pattern matching instead of string comparison.","locations":[{"ref":"src/core/http_task.rs:109-119","code":"  109 |                     Err(error) => match error.to_string().as_str() {\n  110 |                         a if a == gettext(\"No match for this song\") => {\n  111 |                             gui_tx\n  112 |                                 .try_send(GUIMessage::ErrorMessage(error.to_string()))\n  113 |                                 .unwrap();\n  114 |                             gui_tx.try_send(GUIMessage::NetworkStatus(true)).unwrap();\n  115 |                             gui_tx.try_send(GUIMessage::RateLimitState(false)).unwrap();\n  116 |                         }\n  117 |                         a if a == gettext(\"Your IP has been rate-limited\") => {\n  118 |                             gui_tx.try_send(GUIMessage::RateLimitState(true)).unwrap();\n  119 |                         }","lines":11}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In PreferencesInterface::update, the field request_interval_secs_v3 is populated from update_preferences.request_interval_secs_v2 (the legacy v2 field) rather than from update_preferences.request_interval_secs_v3. If a caller passes a Preferences with only request_interval_secs_v3 set, the new value is silently ignored and the old value is preserved instead.","fix":"Change the first .or() to use update_preferences.request_interval_secs_v3, then chain the legacy migration fields after it.","locations":[{"ref":"src/core/preferences.rs:137-149","code":"  137 |             request_interval_secs_v3: update_preferences\n  138 |                 .request_interval_secs_v2\n  139 |                 .or(match current_preferences.request_interval_secs {\n  140 |                     Some(4) => None,\n  141 |                     Some(val) => Some(val),\n  142 |                     None => None,\n  143 |                 })\n  144 |                 .or(match current_preferences.request_interval_secs_v2 {\n  145 |                     Some(10) => None,\n  146 |                     Some(val) => Some(val),\n  147 |                     None => None,\n  148 |                 })\n  149 |                 .or(current_preferences.request_interval_secs_v3),","lines":13}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"The log-buffer truncation algorithm uses `buffer_ptr.len()` (a byte count) as the argument to `chars().take()` (a character count). For ASCII-only log output these are equal, but for multibyte UTF-8 characters `len()` > `chars().count()`, so `to_cut.len()` in bytes may be less than `buffer_ptr.len() - MAX_LOG_SIZE`, leaving the buffer larger than intended after the drain. Over time the buffer grows unboundedly when the log contains multibyte characters.","fix":"Truncate purely by byte count: find the first valid UTF-8 boundary at or before `(buf.len() - MAX_LOG_SIZE)` bytes from the start and drain up to that boundary. Alternatively use `chars().count()` as the cap but switch `MAX_LOG_SIZE` to character count.","locations":[{"ref":"src/gui/main_window.rs:814-819","code":"  814 |                         if buffer_ptr.len() > MAX_LOG_SIZE {\n  815 |                             let to_cut: String = buffer_ptr\n  816 |                                 .chars()\n  817 |                                 .take(buffer_ptr.len() - MAX_LOG_SIZE)\n  818 |                                 .collect();\n  819 |                             buffer_ptr.drain(..to_cut.len());","lines":6}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"remove_song_history_record() delegates to remove_song(), which removes ALL list-store entries whose Song identity matches - ignoring the recognition_date field. If the user has recognized the same song multiple times, removing one entry silently removes all of them.","fix":"Implement true single-record removal: iterate the ListStore, find the first item whose get_song_history_record() equals to_remove (including date), and call list_store.remove(position) on that single index.","locations":[{"ref":"src/gui/song_history_interface.rs:40-42","code":"   40 |     fn remove_song_history_record(&mut self, to_remove: SongHistoryRecord) {\n   41 |         self.remove_song(to_remove.get_song());\n   42 |     }","lines":3}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"mpris_player.rs: old cover files are only cleaned up when a new song arrives (line 62-64). If the application exits normally without recognising another song after a cover has been written, the last cover file is never deleted.","fix":"Implement Drop for a wrapper type that holds the cover path, or call cleanup explicitly in the shutdown path.","locations":[{"ref":"src/plugins/mpris_player.rs:62-64","code":"   62 |     if let Some(path) = last_cover_path.take() {\n   63 |         let _ = fs::remove_file(path);\n   64 |     }","lines":3}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"cli_main.rs: the GUIMessage::MicrophoneRecording arm is guarded by !do_recognize_once but no action is taken when do_recognize_once is true, meaning the arm silently falls to the catch-all. This is harmless but the guard is misleading.","fix":"Either remove the guard and handle both cases, or add a comment explaining why recording start is ignored in single-recognition mode.","locations":[{"ref":"src/cli_main.rs:186","code":"  186 |                 GUIMessage::MicrophoneRecording if !do_recognize_once => {","lines":1}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In pulseaudio.rs list_devices, when the device matches the default source, it is inserted at position 0 regardless of whether it is a monitor device. This can insert a monitor (loopback) source as the first entry while the is_monitor flag is set correctly - but the special positioning was apparently intended for regular microphone sources.","fix":"Check dev.monitor.is_none() before inserting at position 0, or insert at the front of device_names only when it is not a monitor.","locations":[{"ref":"src/core/audio_controllers/pulseaudio.rs:75-83","code":"   75 |                                 if dev.name == info.default_source_name {\n   76 |                                     device_names.insert(\n   77 |                                         0,\n   78 |                                         DeviceListItem {\n   79 |                                             inner_name: name.to_string(),\n   80 |                                             display_name: desc.to_string(),\n   81 |                                             is_monitor: dev.monitor.is_some(),\n   82 |                                         },\n   83 |                                     );","lines":9}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"make_signature_from_buffer passes s16_buffer.as_chunks::<128>().0 to the processing loop, silently discarding the remainder (up to 127 samples at the end of the input). For the internal file path this is harmless because the buffer is padded to a multiple of 128 (192000 = 1500 * 128). For callers of the public make_signature_from_buffer API with non-padded input, the last partial chunk is silently dropped, slightly shortening the fingerprint.","fix":"Document the requirement that the buffer length must be a multiple of 128, or zero-pad the remainder before processing.","locations":[{"ref":"src/core/fingerprinting/algorithm.rs:131","code":"  131 |         for chunk in s16_buffer.as_chunks::<128>().0 {","lines":1}]},{"id":"LOGIC_11","type":"logic_error","type_label":"Logic Error","severity":"low","description":"copy-artist and copy-track-name actions silently do nothing when the song_name string does not contain \" - \". The user gets no feedback that the copy failed.","fix":"Fall back to copying the full song_name, or show a brief notification (e.g. a toast) when the expected separator is absent.","locations":[{"ref":"src/gui/context_menu.rs:184-186","code":"  184 |                         if let Some((ref artist, _track_name)) = song_name.split_once(\" - \") {\n  185 |                             display.clipboard().set(artist);\n  186 |                         }","lines":3},{"ref":"src/gui/context_menu.rs:198-200","code":"  198 |                         if let Some((_artist, ref track_name)) = song_name.split_once(\" - \") {\n  199 |                             display.clipboard().set(track_name);\n  200 |                         }","lines":3}]},{"id":"LOGIC_12","type":"logic_error","type_label":"Logic Error","severity":"low","description":"copy-album action sets the clipboard to an empty string when entry.album() is None, instead of doing nothing. This overwrites a potentially useful clipboard value with an empty string.","fix":"Remove the else branch so that the clipboard is left unchanged when there is no album.","locations":[{"ref":"src/gui/context_menu.rs:213-215","code":"  213 |                         } else {\n  214 |                             display.clipboard().set(&\"\");\n  215 |                         }","lines":3}]},{"id":"LOGIC_13","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In `search_engine_action_changed` and `search_engine_url_changed` callbacks, the `preferences` Mutex lock is held while `gui_tx.try_send(...)` is called (lines 422-428 and 440-446). Although there is no actual deadlock here (both run on the single GTK main thread and `try_send` is non-blocking), holding the lock across the send is misleading: the lock should be released before sending to keep the critical section minimal.","fix":"Drop the lock guard before calling `try_send`, e.g. by wrapping the comparison in a block `{ lock.preferences... }` and then sending outside.","locations":[{"ref":"src/gui/main_window.rs:422-428","code":"  422 |             let lock = preferences.lock().unwrap();\n  423 |             if lock.preferences.website_search_text != Some(entry_row.text().to_string()) {\n  424 |                 let mut new_preference = Preferences::new();\n  425 |                 new_preference.website_search_text = Some(entry_row.text().to_string());\n  426 |                 gui_tx\n  427 |                     .try_send(GUIMessage::UpdatePreference(new_preference))\n  428 |                     .unwrap();","lines":7},{"ref":"src/gui/main_window.rs:440-446","code":"  440 |             let lock = preferences.lock().unwrap();\n  441 |             if lock.preferences.website_search_url != Some(entry_row.text().to_string()) {\n  442 |                 let mut new_preference = Preferences::new();\n  443 |                 new_preference.website_search_url = Some(entry_row.text().to_string());\n  444 |                 gui_tx\n  445 |                     .try_send(GUIMessage::UpdatePreference(new_preference))\n  446 |                     .unwrap();","lines":7}]},{"id":"LOGIC_14","type":"logic_error","type_label":"Logic Error","severity":"low","description":"FavoritesInterface::load() does not sort the records by recognition_date before inserting them into the ListStore, unlike RecognitionHistoryInterface::load() which sorts. This means the favorites list ordering depends on CSV file order rather than a deterministic date order.","fix":"Apply the same sort_by_cached_key(item_date) logic used in RecognitionHistoryInterface::load() before iterating and inserting records.","locations":[{"ref":"src/gui/song_history_interface.rs:173-184","code":"  173 |     fn load(&mut self) -> Result<(), Box<dyn Error>> {\n  174 |         if let Ok(mut reader) = csv::ReaderBuilder::new()\n  175 |             .flexible(true)\n  176 |             .from_path(&self.csv_path)\n  177 |         {\n  178 |             for result in reader.deserialize() {\n  179 |                 let record = result?;\n  180 |                 self.list_store.add_song_history_record(&record);\n  181 |                 self.is_favorite.insert(record.get_song());\n  182 |             }\n  183 |         }\n  184 |         Ok(())","lines":12}]},{"id":"LOGIC_15","type":"logic_error","type_label":"Logic Error","severity":"low","description":"ffmpeg_wrapper.rs: possible_ffmpeg_paths is searched by running ffmpeg -version and checking exit status. ffmpeg exits with code 0 even on version print, but if the binary exists but the -version flag is not accepted (very old builds) the function will skip a valid ffmpeg binary.","fix":"Also accept a non-zero exit code from -version, or check only that the process was spawned successfully rather than that it exited with code 0.","locations":[{"ref":"src/plugins/ffmpeg_wrapper.rs:30-41","code":"   30 |         let mut command = Command::new(possible_path);\n   31 |         let command = command.arg(\"-version\");\n   32 | \n   33 |         #[cfg(windows)]\n   34 |         let command = command.creation_flags(0x00000008); // Set \"CREATE_NO_WINDOW\" on Windows\n   35 | \n   36 |         if let Ok(process) = command.output() {\n   37 |             if process.status.success() {\n   38 |                 actual_ffmpeg_path = Some(possible_path);\n   39 |                 break;\n   40 |             }\n   41 |         }","lines":12}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"medium","description":"All `try_send(... abel":"Performance","severity":"low","description":"In write_data, the volume measurement loop uses .take(16000 * BUFFER_SIZE_SECS) on a slice that is already exactly 16000 * BUFFER_SIZE_SECS elements long (the slice was created with that exact range on line 369). The take() is a no-op and the iter chain is needlessly complex.","fix":"Remove the .take(16000 * BUFFER_SIZE_SECS) call; only .skip(...) is needed.","locations":[{"ref":"src/core/microphone_thread.rs:415-423","code":"  415 |         for item in twelve_seconds_buffer\n  416 |             .iter()\n  417 |             .take(16000 * BUFFER_SIZE_SECS)\n  418 |             .skip(16000 * BUFFER_SIZE_SECS - 16000 / 100 * 2)\n  419 |         {\n  420 |             if item.abs() > max_f32_amplitude {\n  421 |                 max_f32_amplitude = item.abs();\n  422 |             }\n  423 |         }","lines":9}]},{"id":"PERF_3","type":"performance","type_label":"Performance","severity":"low","description":"Every incoming `GUIMessage` is pattern-matched twice in sequence: once to reset the file-recognition row sensitivity (lines 843-849) and again in the main dispatch match (lines 851-1157). The two matches could be merged by adding the row-reset side-effect to the three relevant arms of the main match, eliminating a redundant traversal per message.","fix":"Merge the reset logic into the `ErrorMessage`, `NetworkStatus`, and `SongRecognized` arms of the second match and remove the first match.","locations":[{"ref":"src/gui/main_window.rs:843-849","code":"  843 |                     match gui_message {\n  844 |                         ErrorMessage(_) | NetworkStatus(_) | SongRecognized(_) => {\n  845 |                             recognize_file_row.set_sensitive(true);\n  846 |                             spinner_row.set_visible(false);\n  847 |                         }\n  848 |                         _ => {}\n  849 |                     }","lines":7},{"ref":"src/gui/main_window.rs:851-849","code":"","lines":-1}]},{"id":"PERF_4","type":"performance","type_label":"Performance","severity":"low","description":"ffmpeg_wrapper.rs: the detection loop probes each possible ffmpeg path by spawning a child process and waiting for its output. If ffmpeg is slow to start (e.g. on a constrained system) this blocks the calling thread.","fix":"Cache the detected path in a OnceLock<Option<String>> so the probe runs only once per process lifetime.","locations":[{"ref":"src/plugins/ffmpeg_wrapper.rs:30-42","code":"   30 |         let mut command = Command::new(possible_path);\n   31 |         let command = command.arg(\"-version\");\n   32 | \n   33 |         #[cfg(windows)]\n   34 |         let command = command.creation_flags(0x00000008); // Set \"CREATE_NO_WINDOW\" on Windows\n   35 | \n   36 |         if let Ok(process) = command.output() {\n   37 |             if process.status.success() {\n   38 |                 actual_ffmpeg_path = Some(possible_path);\n   39 |                 break;\n   40 |             }\n   41 |         }\n   42 |     }","lines":13}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"low","description":"processing_thread calls processing_rx.close() after the while loop, but the loop only exits when recv_blocking returns Err (i.e. the channel is already closed). Closing an already-closed channel is a no-op, making the call redundant.","fix":"Remove the processing_rx.close() call.","locations":[{"ref":"src/core/processing_thread.rs:34","code":"   34 |     processing_rx.close();","lines":1}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"low","description":"Commented-out selection.connect_selection_changed closure in connect_menu_key_actions has never been enabled. It references a non-existent history_interface variable in that scope.","fix":"Remove the dead commented-out code.","locations":[{"ref":"src/gui/context_menu.rs:150-156","code":"  150 |         /* selection.connect_selection_changed(move |selection, _, _| {\n  151 |
