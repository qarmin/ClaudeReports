rrect Error Handling","severity":"negligible","description":"g_date_time_new_from_iso8601() uses a goto-to-cleanup pattern, but the early `return NULL` at line 1577 (taken when no timezone was parsed and default_tz is NULL) bypasses the `out:` label. This happens to be safe only because in that branch tz is guaranteed NULL (parse_iso8601_time returned no tz), so there is nothing to unref. The asymmetry is fragile: if parse_iso8601_time were ever changed to set *tz before failing the default-tz check, this would leak the GTimeZone.","fix":"Replace the `return NULL;` at line 1577 with `goto out;` so all exit paths go through the single cleanup that unrefs tz.","locations":[{"ref":"glib/gdatetime.c:1573-1584","code":" 1573 |   if (!parse_iso8601_time (text + date_length + 1, length - (date_length + 1),\n 1574 |                            &hour, &minute, &seconds, &tz))\n 1575 |     goto out;\n 1576 |   if (tz == NULL && default_tz == NULL)\n 1577 |     return NULL;\n 1578 | \n 1579 |   datetime = parse_iso8601_date (text, date_length, hour, minute, seconds, tz ? tz : default_tz);\n 1580 | \n 1581 | out:\n 1582 |     if (tz != NULL)\n 1583 |       g_time_zone_unref (tz);\n 1584 |     return datetime;"}]},{"id":"PERF_1","type":"performance","type_label":"Performance","severity":"low","description":"In _g_local_file_info_get(), for a symlink read_link(path) is always called whenever the file is a symlink, regardless of whether STANDARD_SYMLINK_TARGET was requested by the attribute matcher. The result is only used if the matcher matches the symlink-target id (line 2046-2049) and is otherwise freed unused at line 2242. For enumerations over directories with many symlinks where the caller did not request the symlink target, this performs an extra readlink() syscall (plus malloc/free) per symlink for nothing.","fix":"Only call read_link() when `_g_file_attribute_matcher_matches_id (attribute_matcher, G_FILE_ATTRIBUTE_ID_STANDARD_SYMLINK_TARGET)` is true.","locations":[{"ref":"gio/glocalfileinfo.c:2040-2050","code":" 2040 |   symlink_target = NULL;\n 2041 |   if (is_symlink)\n 2042 |     {\n 2043 | #if defined (S_ISLNK) || defined (G_OS_WIN32)\n 2044 |       symlink_target = read_link (path);\n 2045 | #endif\n 2046 |       if (symlink_target &&\n 2047 |           _g_file_attribute_matcher_matches_id (attribute_matcher,\n 2048 |                                                 G_FILE_ATTRIBUTE_ID_STANDARD_SYMLINK_TARGET))\n 2049 |         g_file_info_set_symlink_target (info, symlink_target);\n 2050 |     }"}]},{"id":"PERF_2","type":"performance","type_label":"Performance","severity":"low","description":"In g_array_insert_vals(), when index_ >= array->len, the code calls g_array_maybe_expand(array, index_ - array->len + len) and then immediately calls g_array_append_vals(g_array_set_size(farray, index_), data, len). Both g_array_set_size() and g_array_append_vals() perform their own g_array_maybe_expand() calls that already guarantee sufficient capacity, so the leading explicit g_array_maybe_expand() is redundant work (an extra capacity check / potential realloc round). It is not a correctness bug, just a minor inefficiency.","fix":"Drop the explicit g_array_maybe_expand() call in the index_ >= array->len branch and rely on g_array_set_size()/g_array_append_vals() to grow the array, or keep it only if pre-sizing in one shot is intentionally desired.","locations":[{"ref":"glib/garray.c:741-745","code":"  741 |   if (index_ >= array->len)\n  742 |     {\n  743 |       g_array_maybe_expand (array, index_ - array->len + len);\n  744 |       return g_array_append_vals (g_array_set_size (farray, index_), data, len);\n  745 |     }"}]},{"id":"DEAD_1","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In the EILSEQ use-fallback branch of g_charset_converter_convert(), 'in_left--' is decremented but in_left is never read again after this point (the function returns via the 'ok' label). bytes_read is set directly to 1, so the decrement has no effect and is misleading dead code that suggests in_left still matters.","fix":"Remove the 'in_left--;' statement; it has no observable effect since in_left is not used after the fallback path.","locations":[{"ref":"gio/gcharsetconverter.c:343-352","code":"  343 | \t\t  guint8 v = *(guint8 *)inbuf;\n  344 | \t\t  guint8 *out = (guint8 *)outbuf;\n  345 | \t\t  out[0] = '\\\\';\n  346 | \t\t  out[1] = (guint8) hex[(v & 0xf0) >> 4];\n  347 | \t\t  out[2] = (guint8) hex[(v & 0x0f) >> 0];\n  348 | \t\t  *bytes_read = 1;\n  349 | \t\t  *bytes_written = 3;\n  350 | \t\t  in_left--;\n  351 | \t\t  conv->n_fallback_errors++;\n  352 | \t\t  goto ok;"}]},{"id":"DEAD_2","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"_g_dbus_shared_thread_unref() is entirely #if 0'd out and is a no-op (with a TODO 'actually destroy the shared thread here'). The shared GDBus worker thread, its GMainContext and GMainLoop are therefore never torn down for the lifetime of the process. This is an intentional long-standing design choice but constitutes a permanent (bounded) leak of the shared thread resources and dead reference-counting code.","fix":"Either remove the dead refcount bookkeeping to avoid implying it does something, or implement teardown guarded so the shared thread can be reclaimed when the last connection goes away.","locations":[{"ref":"gio/gdbusprivate.c:319-333","code":"  319 | static void\n  320 | _g_dbus_shared_thread_unref (SharedThreadData *data)\n  321 | {\n  322 |   /* TODO: actually destroy the shared thread here */\n  323 | #if 0\n  324 |   g_assert (data != NULL);\n  325 |   if (g_atomic_int_dec_and_test (&data->refcount))\n  326 |     {\n  327 |       g_main_loop_quit (data->loop);\n  328 |       //g_thread_join (data->thread);\n  329 |       g_main_loop_unref (data->loop);\n  330 |       g_main_context_unref (data->context);\n  331 |     }\n  332 | #endif\n  333 | }"}]},{"id":"DEAD_3","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"do_copy_file_range() uses `do { ... } while (result == -1);` but every code path where result == -1 either `continue`s (EINTR) back to the top of the loop or `return FALSE` inside the body. Therefore the loop never reaches the `while (result == -1)` test with result still -1; the condition is always false and the loop body executes at most once per successful call. The `do/while` is misleading — it reads as if it retries on -1, but the only retry is the EINTR `continue`.","fix":"Replace the `do { ... } while (result == -1);` with a plain `while (TRUE) { ... }` (the EINTR continue already drives the retry), or remove the trailing condition, to make the control flow self-documenting.","locations":[{"ref":"gio/gfile.c:3062-3089","code":" 3062 |   do\n 3063 |     {\n 3064 |       result = copy_file_range (fd_in, off_in, fd_out, off_out, len, 0);\n 3065 | \n 3066 |       if (result == -1)\n 3067 |         {\n 3068 |           int errsv = errno;\n 3069 | \n 3070 |           if (errsv == EINTR)\n 3071 |             {\n 3072 |               continue;\n 3073 |             }\n 3074 |           else if (errsv == ENOSYS || errsv == EINVAL || errsv == EOPNOTSUPP || errsv == EXDEV)\n 3075 |             {\n 3076 |               g_set_error_literal (error, G_IO_ERROR, G_IO_ERROR_NOT_SUPPORTED,\n 3077 |                                    _(\"Copy file range not supported\"));\n 3078 |             }\n 3079 |           else\n 3080 |             {\n 3081 |               g_set_error (error, G_IO_ERROR,\n 3082 |                            g_io_error_from_errno (errsv),\n 3083 |                            _(\"Error splicing file: %s\"),\n 3084 |                            g_strerror (errsv));\n 3085 |             }\n 3086 | \n 3087 |           return FALSE;\n 3088 |         }\n 3089 |     } while (result == -1);"}]},{"id":"DEAD_4","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"validate_array_type_blob(), validate_iface_type_blob(), validate_param_type_blob() etc. carry FIXME comments for unimplemented checks (`FIXME validate length`, `FIXME check array-length pairs`, `FIXME: validate index range`). validate_union_blob() is a complete no-op that unconditionally returns TRUE, so union blobs receive no structural validation at all despite being dereferenced elsewhere. This leaves union typelib data effectively unvalidated.","fix":"Implement at least minimal bounds/field-count validation for union blobs (mirroring validate_struct_blob) instead of returning TRUE unconditionally, and address the array-length FIXME so array type blobs are bounds-checked.","locations":[{"ref":"girepository/gitypelib.c:1963-1969","code":" 1963 | static gboolean\n 1964 | validate_union_blob (GITypelib     *typelib,\n 1965 |                      uint32_t       offset,\n 1966 |                      GError       **error)\n 1967 | {\n 1968 |   return TRUE;\n 1969 | }"},{"ref":"girepository/gitypelib.c:674-689","code":"  674 | static gboolean\n  675 | validate_array_type_blob (GITypelib     *typelib,\n  676 |                           uint32_t       offset,\n  677 |                           uint32_t       signature_offset,\n  678 |                           gboolean       return_type,\n  679 |                           GError       **error)\n  680 | {\n  681 |   /* FIXME validate length */\n  682 | \n  683 |   if (!validate_type_blob (typelib,\n  684 |                            offset + G_STRUCT_OFFSET (ArrayTypeBlob, type),\n  685 |                            0, FALSE, error))\n  686 |     return FALSE;\n  687 | \n  688 |   return TRUE;\n  689 | }"}]},{"id":"DEAD_5","type":"dead_code","type_label":"Dead Code","severity":"negligible","description":"In _g_closure_is_void(), the g_type_class_meta_marshal branch uses the local `itype` in G_TYPE_INSTANCE_GET_CLASS(instance, itype, GTypeClass), but `itype` is declared and never assigned on that path (only assigned in the iface branch). This compiles only because the G_TYPE_INSTANCE_GET_CLASS / _G_TYPE_IGC macro discards its g_type argument. The reliance on an uninitialized variable is misleading and would become a real bug if the macro were ever changed to use the type argument.","fix":"Drop the unused `itype` argument by passing a clearly-unused placeholder, or initialize/assign itype on the class path, to avoid reading an uninitialized local even if currently macro-discarded.","locations":[{"ref":"gobject/gclosure.c:1203-1209","code":" 1203 |   else if (real_closure->meta_marshal == g_type_class_meta_marshal)\n 1204 |     {\n 1205 |       offset = GPOINTER_TO_UINT (real_closure->meta_marshal_data);\n 1206 | \n 1207 |       class = G_TYPE_INSTANCE_GET_CLASS (instance, itype, GTypeClass);\n 1208 |       callback = G_STRUCT_MEMBER (gpointer, class, offset);\n 1209 |       return callback == NULL;"}]},{"id":"CMT_1","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"The GInetAddressMask:length property documentation states the prefix length is \"in bytes\", but it is actually in bits: the property spec range is 0..128, the validation in g_inet_address_mask_initable_init checks length > addrlen * 8, and CIDR strings like \"10.0.0.0/8\" treat the number as bits. The misleading doc could cause API misuse.","fix":"Change \"The prefix length, in bytes.\" to \"The prefix length, in bits.\"","locations":[{"ref":"gio/ginetaddressmask.c:165-176","code":"  165 |   /**\n  166 |    * GInetAddressMask:length:\n  167 |    *\n  168 |    * The prefix length, in bytes.\n  169 |    *\n  170 |    * Since: 2.32\n  171 |    */\n  172 |   g_object_class_install_property (gobject_class, PROP_LENGTH,\n  173 |                                    g_param_spec_uint (\"length\", NULL, NULL,\n  174 | \t\t\t\t\t\t      0, 128, 0,\n  175 | \t\t\t\t\t\t      G_PARAM_READWRITE |\n  176 | \t\t\t\t\t\t      G_PARAM_STATIC_STRINGS));"}]},{"id":"CMT_2","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"g_themed_icon_update_names() is a static void function that returns nothing, but its doc-comment claims `Returns: (transfer full) (type GThemedIcon): a new #GThemedIcon`. The comment was copied from a constructor and is misleading for maintainers.","fix":"Remove the bogus Returns: line (and the GIcon-constructor wording) from the g_themed_icon_update_names() doc-comment; it neither returns a value nor creates an icon.","locations":[{"ref":"gio/gthemedicon.c:228-256","code":"  228 | /**\n  229 |  * g_themed_icon_update_names:\n  230 |  * @themed: a #GThemedIcon.\n  231 |  *\n  232 |  * Update the actual icon name list, based on the requested names (from\n  233 |  * construction, or later added with g_themed_icon_prepend_name() and\n  234 |  * g_themed_icon_append_name()).\n  235 |  * The order of the list matters, indicating priority:\n  236 |  *\n  237 |  * - The first requested icon is first in priority.\n  238 |  * - If \"use-default-fallbacks\" is #TRUE, then it is followed by all its\n  239 |  *   fallbacks (starting from top to lower context levels).\n  240 |  * - Then next requested icons, and optionally their fallbacks, follow.\n  241 |  * - Finally all the style variants (symbolic or regular, opposite to whatever\n  242 |  *   is the requested style) follow in the same order.\n  243 |  *\n  244 |  * An icon is not added twice in the list if it was previously added.\n  245 |  *\n  246 |  * For instance, if requested names are:\n  247 |  * [ \"some-icon-symbolic\", \"some-other-icon\" ]\n  248 |  * and use-default-fallbacks is TRUE, the final name list shall be:\n  249 |  * [ \"some-icon-symbolic\", \"some-symbolic\", \"some-other-icon\",\n  250 |  *   \"some-other\", \"some\", \"some-icon\", \"some-other-icon-symbolic\",\n  251 |  *   \"some-other-symbolic\" ]\n  252 |  *\n  253 |  * Returns: (transfer full) (type GThemedIcon): a new #GThemedIcon\n  254 |  **/\n  255 | static void\n  256 | g_themed_icon_update_names (GThemedIcon *themed)"}]},{"id":"CMT_3","type":"invalid_comment","type_label":"Invalid Comment","severity":"low","description":"parse_iso8601_date() is declared to return `GDateTime *` but its final fall-through branch returns `FALSE` (a boolean), which compiles to NULL only by accident of FALSE==0. This is a type-confusion code smell that misleads readers and would break if FALSE were ever non-zero. tuple_get_value() in the variant parser has the same issue: it returns `FALSE` from a function whose return type is `GVariant *`.","fix":"Return NULL instead of FALSE in both places to match the pointer return type.","locations":[{"ref":"glib/gdatetime.c:1392-1393","code":" 1392 |   else\n 1393 |     return FALSE;"},{"ref":"glib/gvariant-parser.c:1158-1161","code":" 1158 |         {\n 1159 |           g_variant_builder_clear (&builder);\n 1160 |           return FALSE;\n 1161 |         }"}]},{"id":"CMT_4","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"GConverterInputStream and GConverterOutputStream documentation both say the stream 'allows conversion of data of various types during reading.' For the output stream this is wrong — conversion happens during writing, not reading. Copy-paste of the input-stream blurb.","fix":"Change the GConverterOutputStream doc comment to '...allows conversion of data of various types during writing.'","locations":[{"ref":"gio/gconverteroutputstream.c:38-39","code":"   38 |  * Converter output stream implements [class@Gio.OutputStream] and allows\n   39 |  * conversion of data of various types during reading."}]},{"id":"CMT_5","type":"invalid_comment","type_label":"Invalid Comment","severity":"negligible","description":"The comment for the array-length overflow limit reads 'Maximum length is 2<<26 bytes (64 MiB)'. 2<<26 == 2^27 == 134217728 == 128 MiB, not 64 MiB. The check 'array_len > (2<<26)' therefore enforces a 128 MiB limit, and both the inline comment and the user-facing error message misstate it as 64 MiB.","fix":"Either change the limit to (1<<26) to actually enforce 64 MiB, or correct the comment and message to say 128 MiB. (Note 1<<26 == 64 MiB; the current 2<<26 is 128 MiB.)","locations":[{"ref":"gio/gdbusmessage.c:1926-1937","code":" 1926 |           if (array_len > (2<<26))\n 1927 |             {\n 1928 |               /* G_GUINT32_FORMAT doesn't work with gettext, so use u */\n 1929 |               g_set_error (&local_error,\n 1930 |                            G_IO_ERROR,\n 1931 |                            G_IO_ERROR_INVALID_ARGUMENT,\n 1932 |                            g_dngettext (GETTEXT_PACKAGE,\n 1933 |                                         \"Encountered array of length %u byte. Maximum length is 2<<26 bytes (64 MiB).\",\n 1934 |                                         \"Encountered array of length %u bytes. Maximum length is 2<<26 bytes (64 MiB).\",\n 1935 |                                         array_len),\n 1936 |                            array_len);\n 1937 |               goto fail;"}]},{"id":"OTHER_1","type":"other","type_label":"Other","severity":"low","description":"g_dbus_message_bytes_needed() reads the header length and body length via unaligned 4-byte casts: ((guint32 *) blob)[1] and [3]. This is a public API that accepts an arbitrary caller-supplied guchar* blob. On strict-alignment architectures (e.g. some ARM/SPARC/MIPS) a misaligned blob pointer causes undefined behavior / a SIGBUS. The internal caller (gdbusprivate.c) always passes an 8-byte-aligned g_malloc'd buffer, so the in-tree path is safe, but external callers can trigger UB.","fix":"Read the 32-bit fields with memcpy into a local guint32 (then byteswap), instead of casting blob to guint32*. e.g. memcpy(&header_len, blob + 12, 4); memcpy(&body_len, blob + 4, 4); then apply GUINT32_FROM_LE/BE.","locations":[{"ref":"gio/gdbusmessage.c:2283-2292","code":" 2283 |   if (blob[0] == 'l')\n 2284 |     {\n 2285 |       header_len = GUINT32_FROM_LE (((guint32 *) blob)[3]);\n 2286 |       body_len = GUINT32_FROM_LE (((guint32 *) blob)[1]);\n 2287 |     }\n 2288 |   else if (blob[0] == 'B')\n 2289 |     {\n 2290 |       header_len = GUINT32_FROM_BE (((guint32 *) blob)[3]);\n 2291 |       body_len = GUINT32_FROM_BE (((guint32 *) blob)[1]);\n 2292 |     }"}]},{"id":"OTHER_2","type":"other","type_label":"Other","severity":"low","description":"In g_boxed_copy(), after calling a third-party value_copy() the code checks `dest_value.data[1].v_ulong` to detect misuse of the reserved GValue field, but the G_VALUE_NOCOPY_CONTENTS flag is written and read everywhere else through data[1].v_uint (see boxed_proxy_collect_value/value_set_boxed_internal). On a big-endian platform where sizeof(gulong) > sizeof(guint), a value placed in v_uint will not be seen via v_ulong (and vice-versa), so the sanity warning can both miss real misuse and (in the opposite layout) read uninitialized high bits. The union member used for the check should match the member used to store the flag.","fix":"Check `dest_value.data[1].v_uint` (the same union member used to store G_VALUE_NOCOPY_CONTENTS) instead of v_ulong.","locations":[{"ref":"gobject/gboxed.c:362-364","code":"  362 |       if (dest_value.data[1].v_ulong)\n  363 | \tg_warning (\"the copy_value() implementation of type '%s' seems to make use of reserved GValue fields\",\n  364 | \t\t   g_type_name (boxed_type));"}]}]</script>
<div class="app">
<div class="top">
  <div>
    <h1>Code Audit Report</h1>
    <div class="meta">Generated 2026-05-31 &mdash; <span id="stats"></span></div>
  </div>
  <div class="top-right">
    <input type="search" id="search" placeholder="Search findings…" autocomplete="off">
    <label class="group-label">Group by
      <select id="groupby">
        <option value="type">Type</option>
        <option value="severity">Severity</option>
        <option value="file">File</option>
        <option value="none">None (flat)</option>
      </select>
    </label>
  </div>
</div>
<div class="filterbar" id="filterbar"></div>
<div id="progress-wrap">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <span id="progress-text"></span>
  <button class="action-btn" data-action="collapse-all">⊟ Collapse all</button>
  <button class="action-btn" data-action="expand-all">⊞ Expand all</button>
</div>
<div id="hidden-bar"></div>
<div id="content"></div>
</div>
<script>
(function(){
'use strict';

// ── Data ─────────────────────────────────────────────────────────────────────
const FINDINGS = JSON.parse(document.getElementById('D').textContent);
const SEVS     = ['critical','high','medium','low','negligible'];
const STATUSES = ['open','fixed','wont-fix','false-positive'];
const ALL_TYPES = [...new Set(FINDINGS.map(f => f.type))].sort();
const STORE_KEY = 'audit-status:' + location.href;

const STATUS_CLS = {open:'st-open', fixed:'st-fixed', 'wont-fix':'st-wont', 'false-positive':'st-fp'};
const STATUS_LBL = {open:'● open', fixed:'✓ fixed', 'wont-fix':"— won't fix", 'false-positive':'✗ false pos.'};
const STATUS_NEXT = {open:'fixed', fixed:'wont-fix', 'wont-fix':'false-positive', 'false-positive':'open'};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  search: '', groupBy: 'type',
  hiddenSev: new Set(), hiddenType: new Set(),
  hiddenStatus: new Set(), hiddenGroup: new Set(),
  collapsed: new Set(),
};
const statuses = {};

// ── Persistence ───────────────────────────────────────────────────────────────
function loadStatuses() {
  try { Object.assign(statuses, JSON.parse(localStorage.getItem(STORE_KEY) || '{}')); } catch {}
}
function saveStatuses() {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(statuses)); } catch {}
}
function statusOf(id) { return statuses[id] || 'open'; }

// ── URL hash ──────────────────────────────────────────────────────────────────
function syncHash() {
  const p = new URLSearchParams();
  if (S.groupBy !== 'type') p.set('g', S.groupBy);
  if (S.hiddenSev.size)    p.set('hs',  [...S.hiddenSev].join(','));
  if (S.hiddenType.size)   p.set('ht',  [...S.hiddenType].join(','));
  if (S.hiddenStatus.size) p.set('hst', [...S.hiddenStatus].join(','));
  if (S.search)            p.set('q',   S.search);
  const str = p.toString();
  history.replaceState(null, '', str ? '#' + str : location.pathname + location.search);
}

function loadHash() {
  const p = new URLSearchParams(location.hash.slice(1));
  if (p.has('g'))   { S.groupBy = p.get('g'); document.getElementById('groupby').value = S.groupBy; }
  if (p.has('q'))   { S.search  = p.get('q'); document.getElementById('search').value  = S.search;  }
  if (p.has('hs'))  p.get('hs') .split(',').filter(Boolean).forEach(v => S.hiddenSev.add(v));
  if (p.has('ht'))  p.get('ht') .split(',').filter(Boolean).forEach(v => S.hiddenType.add(v));
  if (p.has('hst')) p.get('hst').split(',').filter(Boolean).forEach(v => S.hiddenStatus.add(v));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function highlight(text, q) {
  if (!q) return esc(text);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
  return String(text).split(re).map((p, i) => i % 2 ? '<mark>' + esc(p) + '</mark>' : esc(p)).join('');
}

// Render text with ```fenced``` code blocks and `inline` backticks,
// also paragraph-splitting on blank lines. Output is HTML-safe.
function renderMd(text, q) {
  const src = String(text == null ? '' : text);
  const FENCE = /```[ \t]*([A-Za-z0-9_+-]*)[ \t]*\r?\n([\s\S]*?)```/g;
  const parts = [];
  let last = 0, m;
  while ((m = FENCE.exec(src)) !== null) {
    parts.push({kind: 'text', value: src.slice(last, m.index)});
    parts.push({kind: 'code', value: m[2].replace(/\r?\n$/, '')});
    last = m.index + m[0].length;
  }
  parts.push({kind: 'text', value: src.slice(last)});

  function renderInline(s) {
    // Split on single backticks (no newlines inside).
    const re = /`([^`\n]+)`/g;
    let out = '', i = 0, mm;
    while ((mm = re.exec(s)) !== null) {
      out += highlight(s.slice(i, mm.index), q);
      out += '<code class="md-inline">' + highlight(mm[1], q) + '</code>';
      i = mm.index + mm[0].length;
    }
    out += highlight(s.slice(i), q);
    return out;
  }

  function renderTextChunk(s) {
    // Split into paragraphs on blank lines; single newlines become <br>.
    const paragraphs = s.split(/\r?\n[ \t]*\r?\n/);
    const out = [];
    for (const p of paragraphs) {
      const trimmed = p.replace(/^\s+|\s+$/g, '');
      if (!trimmed) continue;
      out.push('<p>' + renderInline(trimmed).replace(/\r?\n/g, '<br>') + '</p>');
    }
    return out.join('');
  }

  let html = '';
  for (const p of parts) {
    if (p.kind === 'text') html += renderTextChunk(p.value);
    else html += '<pre class="md-code">' + highlight(p.value, q) + '</pre>';
  }
  return html;
}

function sevCls(s)    { return SEVS.includes(s) ? 'sev-'+s : 'sev-negligible'; }
function sevLbl(s)    { return s ? s[0].toUpperCase()+s.slice(1) : 'Medium'; }
function typeLabel(t) { return t.replace(/_/g,' ').replace(/\b\w/g, c => c.toUpperCase()); }

// ── Filter logic ──────────────────────────────────────────────────────────────
function getKey(f) {
  if (S.groupBy === 'severity') return f.severity || 'medium';
  if (S.groupBy === 'file')     return f.locations.length ? f.locations[0].ref.replace(/:.*/,'') : '(no location)';
  if (S.groupBy === 'none')     return '';
  return f.type_label;
}

function matches(f) {
  if (S.hiddenSev.has(f.severity || 'medium')) return false;
  if (S.hiddenType.has(f.type))                return false;
  if (S.hiddenStatus.has(statusOf(f.id)))      return false;
  if (S.search) {
    const q = S.search.toLowerCase();
    const hay = [f.id, f.type_label, f.severity, f.description, f.fix, statusOf(f.id),
                 ...f.locations.map(l => l.ref)].join(' ').toLowerCase();
    if (!hay.includes(q)) return false;
  }
  return true;
}

function sortKeys(keys) {
  if (S.groupBy === 'severity') {
    return [...keys].sort((a, b) => {
      const ai = SEVS.indexOf(a), bi = SEVS.indexOf(b);
      return (ai < 0 ? 99 : ai) - (bi < 0 ? 99 : bi);
    });
  }
  return [...keys].sort();
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderCard(f, q) {
  const sc  = sevCls(f.severity || 'medium');
  const sl  = sevLbl(f.severity || 'medium');
  const st  = statusOf(f.id);
  const sc2 = STATUS_CLS[st] || 'st-open';
  const sl2 = STATUS_LBL[st] || '● open';
  const isCollapsed = S.collapsed.has(f.id);
  const isResolved  = st !== 'open';

  let locs = '';
  for (const l of f.locations) {
    locs += '<div class="loc-block"><div class="loc-ref">' + highlight(l.ref, q) + '</div>';
    locs += l.code != null ? '<pre>' + esc(l.code) + '</pre>' : '<div class="not-found">(file not found)</div>';
    locs += '</div>';
  }

  const locSummary = f.locations.length
    ? f.locations[0].ref + (f.locations.length > 1 ? ' …' : '')
    : '';

  return (
    '<div class="card' + (isResolved ? ' resolved' : '') + '">' +
    '<div class="card-header" data-action="toggle-card" data-id="' + esc(f.id) + '">' +
    '<span class="card-arrow">' + (isCollapsed ? '▶' : '▼') + '</span>' +
    '<span class="card-id">' + esc(f.id) + '</span>' +
    '<span class="badge ' + sc + '" style="cursor:default">' + esc(sl) + '</span>' +
    '<span class="badge type-badge" style="cursor:default">' + esc(f.type_label) + '</span>' +
    (locSummary ? '<span class="card-loc" title="' + esc(locSummary) + '">' + esc(locSummary) + '</span>' : '') +
    '<button class="status-btn ' + sc2 + '" data-action="cycle-status" data-id="' + esc(f.id) + '">' + sl2 + '</button>' +
    '</div>' +
    '<div class="card-body"' + (isCollapsed ? ' style="display:none"' : '') + '>' +
    '<div class="field-lbl">Description</div>' +
    '<div class="desc">'    + renderMd(f.description, q) + '</div>' +
    (locs ? '<div class="field-lbl">Locations</div>' + locs : '') +
    '<div class="field-lbl">Fix</div>' +
    '<div class="fix-txt">' + renderMd(f.fix, q) + '</div>' +
    '</div></div>'
  );
}

function initFilterBar() {
  const fb = document.getElementById('filterbar');
  let h = '<div class="filter-row"><span class="filter-lbl">Severity:</span>';
  for (const s of SEVS)
    h += '<button class="badge ' + sevCls(s) + '" data-sev="' + s + '">' + sevLbl(s) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="sev"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Type:</span>';
  for (const t of ALL_TYPES)
    h += '<button class="badge type-badge" data-type="' + esc(t) + '">' + esc(typeLabel(t)) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="type"></button></div>';

  h += '<div class="filter-row"><span class="filter-lbl">Status:</span>';
  for (const st of STATUSES)
    h += '<button class="badge ' + (STATUS_CLS[st]||'st-open') + '" data-status="' + st + '">' + (STATUS_LBL[st]||st) + '</button>';
  h += '<button class="filter-toggle" data-toggle-all="status"></button></div>';

  fb.innerHTML = h;
}

function updateToggles() {
  for (const b of document.querySelectorAll('[data-sev]'))    b.classList.toggle('off', S.hiddenSev.has(b.dataset.sev));
  for (const b of document.querySelectorAll('[data-type]'))   b.classList.toggle('off', S.hiddenType.has(b.dataset.type));
  for (const b of document.querySelectorAll('[data-status]')) b.classList.toggle('off', S.hiddenStatus.has(b.dataset.status));
  for (const b of document.querySelectorAll('[data-toggle-all]')) {
    const k = b.dataset.toggleAll;
    const set = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    b.textContent = set.size === 0 ? 'Hide all' : 'Show all';
  }
}

function updateProgress() {
  const total = FINDINGS.length;
  const done  = FINDINGS.filter(f => statusOf(f.id) !== 'open').length;
  const pct   = total ? Math.round(done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = done + ' / ' + total + ' resolved (' + pct + '%)';
}

function render() {
  updateToggles();
  updateProgress();

  const q       = S.search;
  const visible = FINDINGS.filter(matches);
  document.getElementById('stats').textContent = visible.length + ' / ' + FINDINGS.length + ' findings';

  // Build groups
  const map = new Map();
  for (const f of visible) {
    const k = getKey(f);
    if (!map.has(k)) map.set(k, []);
    map.get(k).push(f);
  }

  // Hidden-groups bar
  const hbar = document.getElementById('hidden-bar');
  if (S.hiddenGroup.size > 0) {
    let hh = '<div class="hidden-inner"><span class="hidden-lbl">Hidden:</span>';
    for (const g of [...S.hiddenGroup].sort())
      hh += '<button class="show-btn" data-action="show-group" data-key="' + esc(g) + '">' + esc(g || '(all findings)') + '</button>';
    hh += '<button class="show-all-btn" data-action="show-all">Show all</button></div>';
    hbar.innerHTML = hh;
  } else {
    hbar.innerHTML = '';
  }

  // Content
  const content = document.getElementById('content');
  if (!visible.length) {
    content.innerHTML = '<div class="no-results">No findings match the current filters.</div>';
    syncHash();
    return;
  }

  let hh = '';
  for (const k of sortKeys([...map.keys()])) {
    if (S.hiddenGroup.has(k)) continue;
    const items   = map.get(k);
    const title   = k || 'All Findings';
    const done    = items.filter(f => statusOf(f.id) !== 'open').length;
    const allDone = done === items.length;
    hh += '<div class="group-section">' +
      '<div class="group-header">' +
      '<span class="group-title' + (allDone ? ' all-done' : '') + '">' + esc(title) + '</span>' +
      '<span class="group-count">' + done + '/' + items.length + '</span>' +
      '<button class="icon-btn" data-action="collapse-group" data-key="' + esc(k) + '" title="Collapse all">⊟</button>' +
      '<button class="icon-btn" data-action="expand-group"   data-key="' + esc(k) + '" title="Expand all">⊞</button>' +
      '<button class="hide-btn" data-action="hide-group"     data-key="' + esc(k) + '">Hide</button>' +
      '</div>';
    for (const f of items) hh += renderCard(f, q);
    hh += '</div>';
  }
  content.innerHTML = hh;
  syncHash();
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.getElementById('filterbar').addEventListener('click', e => {
  const b = e.target.closest('[data-sev],[data-type],[data-status],[data-toggle-all]');
  if (!b) return;
  if (b.dataset.toggleAll) {
    const k = b.dataset.toggleAll;
    const set  = k === 'sev' ? S.hiddenSev : k === 'type' ? S.hiddenType : S.hiddenStatus;
    const full = k === 'sev' ? SEVS        : k === 'type' ? ALL_TYPES    : STATUSES;
    if (set.size === 0) full.forEach(v => set.add(v));
    else                set.clear();
  }
  else if (b.dataset.sev)    { const s = S.hiddenSev;    s.has(b.dataset.sev)    ? s.delete(b.dataset.sev)    : s.add(b.dataset.sev); }
  else if (b.dataset.type)   { const s = S.hiddenType;   s.has(b.dataset.type)   ? s.delete(b.dataset.type)   : s.add(b.dataset.type); }
  else if (b.dataset.status) { const s = S.hiddenStatus; s.has(b.dataset.status) ? s.delete(b.dataset.status) : s.add(b.dataset.status); }
  render();
});

document.addEventListener('click', e => {
  const b = e.target.closest('[data-action]');
  if (!b) return;
  const { action, key, id } = b.dataset;

  if      (action === 'hide-group')     { S.hiddenGroup.add(key); render(); }
  else if (action === 'show-group')     { S.hiddenGroup.delete(key); render(); }
  else if (action === 'show-all')       { S.hiddenGroup.clear(); render(); }
  else if (action === 'collapse-all')   { FINDINGS.forEach(f => S.collapsed.add(f.id)); render(); }
  else if (action === 'expand-all')     { S.collapsed.clear(); render(); }
  else if (action === 'cycle-status') {
    e.stopPropagation();
    statuses[id] = STATUS_NEXT[statusOf(id)] || 'open';
    saveStatuses();
    render();
  }
  else if (action === 'toggle-card') {
    S.collapsed.has(id) ? S.collapsed.delete(id) : S.collapsed.add(id);
    render();
  }
  else if (action === 'collapse-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.add(f.id); });
    render();
  }
  else if (action === 'expand-group') {
    FINDINGS.forEach(f => { if (getKey(f) === key) S.collapsed.delete(f.id); });
    render();
  }
});

document.getElementById('search').addEventListener('input',  e => { S.search  = e.target.value; render(); });
document.getElementById('groupby').addEventListener('change', e => { S.groupBy = e.target.value; S.hiddenGroup.clear(); render(); });

// ── Init ──────────────────────────────────────────────────────────────────────
loadStatuses();
initFilterBar();
loadHash();
FINDINGS.forEach(f => S.collapsed.add(f.id));
render();
})();
</script>
</body></html>
