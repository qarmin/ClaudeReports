<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Audit — Interactive</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f172a;color:#e2e8f0;font-size:14px;line-height:1.5}
.app{max-width:1100px;margin:0 auto;padding:1.5rem 1rem}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
h1{font-size:1.5rem;font-weight:700;color:#f1f5f9}
.meta{font-size:.8rem;color:#64748b;margin-top:.2rem}
.top-right{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}
#search{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.4rem .75rem;border-radius:6px;font-size:.875rem;width:220px;outline:none}
#search:focus{border-color:#3b82f6}
.group-label{font-size:.8rem;color:#94a3b8;display:flex;align-items:center;gap:.4rem}
select{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:.35rem .6rem;border-radius:6px;font-size:.8rem;outline:none;cursor:pointer}
select:focus{border-color:#3b82f6}
.filterbar{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.6rem;padding:.6rem .75rem;background:#1e293b;border:1px solid #334155;border-radius:8px}
.filter-row{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.filter-lbl{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#475569;white-space:nowrap;margin-right:.25rem}
.filter-toggle{font-size:.65rem;font-weight:600;padding:.18rem .5rem;border-radius:4px;border:1px solid #334155;background:#0f172a;color:#94a3b8;cursor:pointer;margin-left:auto;white-space:nowrap;letter-spacing:.04em}
.filter-toggle:hover{background:#1e293b;color:#e2e8f0;border-color:#475569}
.badge{font-size:.68rem;font-weight:700;padding:.18rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;letter-spacing:.03em;transition:opacity .12s,filter .12s;user-select:none}
.badge.off{opacity:.28;filter:grayscale(.5)}
.sev-critical{background:#450a0a;color:#fca5a5;border-color:#991b1b}
.sev-high    {background:#431407;color:#fdba74;border-color:#9a3412}
.sev-medium  {background:#422006;color:#fcd34d;border-color:#854d0e}
.sev-low     {background:#0c1a3a;color:#93c5fd;border-color:#1d4ed8}
.sev-negligible{background:#1e293b;color:#64748b;border-color:#334155}
.type-badge{background:#0c1e33;color:#7dd3fc;border-color:#0369a1}
.st-open{background:#1e293b;color:#475569;border-color:#334155}
.st-fixed{background:#052e16;color:#4ade80;border-color:#16a34a}
.st-wont{background:#431407;color:#fdba74;border-color:#9a3412}
.st-fp{background:#2e1065;color:#c4b5fd;border-color:#7c3aed}
#progress-wrap{display:flex;align-items:center;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap}
#progress-bar{flex:1;min-width:120px;height:7px;background:#1e293b;border-radius:4px;overflow:hidden;border:1px solid #334155}
#progress-fill{height:100%;background:#22c55e;border-radius:4px;transition:width .35s ease;width:0}
#progress-text{font-size:.75rem;color:#64748b;white-space:nowrap}
.action-btn{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;white-space:nowrap}
.action-btn:hover{background:#334155;color:#e2e8f0}
#hidden-bar{margin-bottom:.6rem}
.hidden-inner{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center}
.hidden-lbl{font-size:.72rem;color:#475569}
.show-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#1e293b;color:#94a3b8;border:1px solid #334155;cursor:pointer}
.show-btn:hover{background:#334155;color:#e2e8f0}
.show-all-btn{font-size:.7rem;padding:.15rem .45rem;border-radius:4px;background:#2563eb;color:#fff;border:none;cursor:pointer}
.show-all-btn:hover{background:#1d4ed8}
.group-section{margin-bottom:1.5rem}
.group-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;padding-bottom:.35rem;border-bottom:1px solid #334155}
.group-title{font-size:.95rem;font-weight:700;color:#cbd5e1}
.group-title.all-done{color:#4ade80}
.group-count{font-size:.72rem;color:#475569;background:#1e293b;padding:.1rem .4rem;border-radius:10px;white-space:nowrap}
.icon-btn{background:transparent;border:none;color:#334155;cursor:pointer;font-size:.85rem;padding:.05rem .2rem;line-height:1}
.icon-btn:hover{color:#64748b}
.hide-btn{margin-left:auto;font-size:.68rem;padding:.12rem .45rem;border-radius:4px;background:transparent;color:#334155;border:1px solid #1e293b;cursor:pointer}
.hide-btn:hover{background:#1e293b;color:#64748b}
.card{background:#1e293b;border:1px solid #334155;border-radius:8px;margin-bottom:.6rem;overflow:hidden;transition:opacity .15s}
.card.resolved{opacity:.55;border-left:3px solid #16a34a}
.card.resolved:hover{opacity:.85}
.card-header{display:flex;align-items:center;gap:.5rem;padding:.45rem .85rem;background:#162032;border-bottom:1px solid #334155;flex-wrap:wrap;cursor:pointer;user-select:none}
.card-header:hover{background:#1a2840}
.card-arrow{font-size:.65rem;color:#334155;flex-shrink:0}
.card-id{font-size:.75rem;font-weight:700;color:#64748b;font-family:monospace;letter-spacing:.04em}
.card-loc{font-size:.72rem;color:#64748b;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;letter-spacing:.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.status-btn{margin-left:auto;font-size:.68rem;font-weight:600;padding:.15rem .5rem;border-radius:4px;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:filter .1s}
.status-btn:hover{filter:brightness(1.25)}
.card-body{padding:.85rem .9rem}
.field-lbl{font-size:.85rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#7dd3fc;margin:1rem 0 .35rem;padding-bottom:.18rem;border-bottom:1px solid #1e293b}
.field-lbl:first-child{margin-top:0}
.desc,.fix-txt{font-size:.875rem;color:#cbd5e1;line-height:1.55}
.desc p,.fix-txt p{margin:.4rem 0}
.desc p:first-child,.fix-txt p:first-child{margin-top:0}
.desc p:last-child,.fix-txt p:last-child{margin-bottom:0}
.loc-block{margin:.3rem 0 .6rem}
.loc-ref{font-size:.8rem;color:#38bdf8;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-weight:600;margin-bottom:.22rem}
pre{background:#0f172a;color:#cdd6f4;border-radius:5px;padding:.6rem .8rem;overflow-x:auto;white-space:pre;font-size:.8rem;line-height:1.55;font-family:"JetBrains Mono","Fira Code",Consolas,monospace;border:1px solid #1e293b;max-height:320px}
.desc pre.md-code,.fix-txt pre.md-code{margin:.5rem 0;font-size:.82rem;color:#e2e8f0;background:#0b1224;border:1px solid #1e293b;max-height:none}
code.md-inline{font-family:"JetBrains Mono","Fira Code",Consolas,monospace;font-size:.86em;background:#0b1224;color:#fca5a5;border:1px solid #1e293b;border-radius:3px;padding:.04rem .32rem;white-space:pre-wrap;word-break:break-word}
.not-found{font-size:.8rem;color:#334155;font-style:italic}
mark{background:#854d0e;color:#fef9c3;border-radius:2px;padding:0 .1rem}
.no-results{text-align:center;color:#334155;padding:3rem 1rem;font-size:.9rem}
</style>
</head>

<script type="application/json" id="D">[{"id":"PANIC_1","type":"panic","type_label":"Panic","severity":"medium","description":"gi_constant_info_get_value() calls g_assert_not_reached() in the default case of its tag switch. validate_constant_blob() accepts any basic tag (including GI_TYPE_TAG_GTYPE and GI_TYPE_TAG_UNICHAR) for a non-pointer constant, but the switch here only handles BOOLEAN/INT*/UINT*/FLOAT/DOUBLE. A non-pointer constant whose type tag is UNICHAR or GTYPE passes validation yet hits g_assert_not_reached(), aborting the process from an untrusted typelib.","fix":"Add explicit cases for GI_TYPE_TAG_UNICHAR (read uint32) and GI_TYPE_TAG_GTYPE, or replace g_assert_not_reached() with a graceful failure (return 0 / leave value untouched) for unsupported non-pointer tags. Also tighten validate_constant_blob() to reject tags the reader cannot handle.","locations":[{"ref":"girepository/giconstantinfo.c:142-179","code":"  142 |           switch (blob->type.flags.tag)\n  143 |             {\n  144 |             case GI_TYPE_TAG_BOOLEAN:\n  145 |               value->v_boolean = *(gboolean*)&rinfo->typelib->data[blob->offset];\n  146 |               break;\n  147 |             case GI_TYPE_TAG_INT8:\n  148 |               value->v_int8 = *(int8_t*)&rinfo->typelib->data[blob->offset];\n  149 |               break;\n  150 |             case GI_TYPE_TAG_UINT8:\n  151 |               value->v_uint8 = *(uint8_t*)&rinfo->typelib->data[blob->offset];\n  152 |               break;\n  153 |             case GI_TYPE_TAG_INT16:\n  154 |               value->v_int16 = *(int16_t*)&rinfo->typelib->data[blob->offset];\n  155 |               break;\n  156 |             case GI_TYPE_TAG_UINT16:\n  157 |               value->v_uint16 = *(uint16_t*)&rinfo->typelib->data[blob->offset];\n  158 |               break;\n  159 |             case GI_TYPE_TAG_INT32:\n  160 |               value->v_int32 = *(int32_t*)&rinfo->typelib->data[blob->offset];\n  161 |               break;\n  162 |             case GI_TYPE_TAG_UINT32:\n  163 |               value->v_uint32 = *(uint32_t*)&rinfo->typelib->data[blob->offset];\n  164 |               break;\n  165 |             case GI_TYPE_TAG_INT64:\n  166 |               DO_ALIGNED_COPY (&value->v_int64, &rinfo->typelib->data[blob->offset], int64_t);\n  167 |               break;\n  168 |             case GI_TYPE_TAG_UINT64:\n  169 |               DO_ALIGNED_COPY (&value->v_uint64, &rinfo->typelib->data[blob->offset], uint64_t);\n  170 |               break;\n  171 |             case GI_TYPE_TAG_FLOAT:\n  172 |               DO_ALIGNED_COPY (&value->v_float, &rinfo->typelib->data[blob->offset], float);\n  173 |               break;\n  174 |             case GI_TYPE_TAG_DOUBLE:\n  175 |               DO_ALIGNED_COPY (&value->v_double, &rinfo->typelib->data[blob->offset], double);\n  176 |               break;\n  177 |             default:\n  178 |               g_assert_not_reached ();\n  179 |             }"}]},{"id":"PANIC_2","type":"panic","type_label":"Panic","severity":"low","description":"parse_value_from_blob() asserts 'g_assert (buf->pos > (gsize) offset)' after parsing each non-fixed array element, relying on the claim that no valid D-Bus element type has a zero-length serialization. The asserted condition is derived from untrusted wire data. If any element type could be parsed while advancing pos by zero (or the assumption is ever violated by a future type), this is a reachable abort on attacker-controlled input. With assertions disabled (G_DISABLE_ASSERT) the same situation becomes an infinite loop, since 'offset = buf->pos' would never reach 'target'.","fix":"Replace the g_assert with an explicit check that sets a G_IO_ERROR_INVALID_ARGUMENT and goto fail when buf->pos has not advanced past offset, so malformed input is rejected rather than aborting or looping.","locations":[{"ref":"gio/gdbusmessage.c:2007-2034","code":" 2007 |                   while (offset < target)\n 2008 |                     {\n 2009 |                       GVariant *item;\n 2010 |                       item = parse_value_from_blob (buf,\n 2011 |                                                     element_type,\n 2012 |                                                     max_depth - 1,\n 2013 |                                                     FALSE,\n 2014 |                                                     indent + 2,\n 2015 |                                                     &local_error);\n 2016 |                       if (item == NULL)\n 2017 |                         {\n 2018 |                           g_variant_builder_clear (&builder);\n 2019 |                           goto fail;\n 2020 |                         }\n 2021 |                       g_variant_builder_add_value (&builder, item);\n 2022 |                       g_variant_unref (item);\n 2023 | \n 2024 |                       /* Array elements must not be zero-length. There are no\n 2025 |                        * valid zero-length serialisations of any types which\n 2026 |                        * can be array elements in the D-Bus wire format, so this\n 2027 |                        * assertion should always hold.\n 2028 |                        *\n 2029 |                        * See https://gitlab.gnome.org/GNOME/glib/-/issues/2557\n 2030 |                        */\n 2031 |                       g_assert (buf->pos > (gsize) offset);\n 2032 | \n 2033 |                       offset = buf->pos;\n 2034 |                     }"}]},{"id":"UAF_1","type":"use_after_free","type_label":"Use After Free","severity":"high","description":"In g_datalist_foreach() the inner loop searches for the element whose key matches keys[i], finding it at index j, but then invokes the callback with d->data[i] instead of d->data[j]. Because datalist_remove() relocates entries (it swaps the removed slot with the last element, like g_array_remove_index_fast), a callback that removes a later element reorders the array, so d->data[i] no longer corresponds to keys[i]. Worse, if a previous callback shrank the list, i can be >= d->len, so d->data[i] reads past the live entries of the (possibly reallocated) buffer — an out-of-bounds read that passes garbage key/data pointers to user code. The correct index is j (the one just located by the key comparison).","fix":"Use the located index j when calling the callback: `func (d->data[j].key, d->data[j].data, user_data);`.","locations":[{"ref":"glib/gdataset.c:1590-1596","code":" 1590 |       for (j = 0; j < d->len; j++)\n 1591 | \t{\n 1592 | \t  if (d->data[j].key == keys[i]) {\n 1593 | \t    func (d->data[i].key, d->data[i].data, user_data);\n 1594 | \t    break;\n 1595 | \t  }\n 1596 | \t}"}]},{"id":"RACE_1","type":"race_condition","type_label":"Race Condition","severity":"low","description":"splice_stream_with_progress() inner write loop `while (n_read > 0) { do_splice(buffer[0], ..., fd_out, ..., n_read, &n_written, ...); n_read -= n_written; }` assumes splice() from the pipe to the output fd always makes progress. do_splice() treats a return value of 0 as success and sets *bytes_transferd = 0. If splice() ever returns 0 while n_read > 0 (e.g. an unexpected EOF/short condition on the pipe read end), n_written stays 0, n_read is never decremented, and the loop spins forever (an unkillable busy loop, since cancellation is only checked once per inner iteration but n_read never changes).","fix":"Treat n_written == 0 with n_read > 0 as an error (or break) inside the inner loop instead of looping, e.g. `if (n_written == 0) { set error / break; }`.","locations":[{"ref":"gio/gfile.c:3276-3285","code":" 3276 |       while (n_read > 0)\n 3277 |         {\n 3278 |           if (g_cancellable_set_error_if_cancelled (cancellable, error))\n 3279 |             goto out;\n 3280 | \n 3281 |           if (!do_splice (buffer[0], NULL, fd_out, &offset_out, n_read, &n_written, error))\n 3282 |             goto out;\n 3283 | \n 3284 |           n_read -= n_written;\n 3285 |         }"}]},{"id":"RACE_2","type":"race_condition","type_label":"Race Condition","severity":"low","description":"g_signal_group__target_weak_notify() emits the UNBIND signal and calls g_object_notify_by_pspec() while holding self->mutex (a GRecMutex). Signal handlers and notify handlers run arbitrary user code that may call back into the GSignalGroup API (e.g. g_signal_group_dup_target, set_target). Although the mutex is recursive (so direct re-entry won't deadlock), emitting signals to external code while holding an internal lock is fragile and can deadlock against any other lock the user code acquires in a different order. The same pattern is used in g_signal_group_set_target() (notify under lock).","fix":"Collect the needed state, release self->mutex, then emit the UNBIND signal and call g_object_notify_by_pspec() outside the lock (mirroring the lock-free emission pattern used by g_binding_group_dispose()).","locations":[{"ref":"gobject/gsignalgroup.c:165-180","code":"  165 |   g_rec_mutex_lock (&self->mutex);\n  166 | \n  167 |   g_weak_ref_set (&self->target_ref, NULL);\n  168 | \n  169 |   for (i = 0; i < self->handlers->len; i++)\n  170 |     {\n  171 |       SignalHandler *handler = g_ptr_array_index (self->handlers, i);\n  172 | \n  173 |       handler->handler_id = 0;\n  174 |     }\n  175 | \n  176 |   g_signal_emit (self, signals[UNBIND], 0);\n  177 |   g_object_notify_by_pspec (G_OBJECT (self), properties[PROP_TARGET]);\n  178 | \n  179 |   g_rec_mutex_unlock (&self->mutex);\n  180 | }"}]},{"id":"RES_1","type":"resource_leak","type_label":"Resource Leak","severity":"medium","description":"g_unix_fd_message_deserialize receives a block of file descriptors from the kernel (SCM_RIGHTS). While iterating to set FD_CLOEXEC, if fcntl() fails for fds[i] the function returns NULL immediately without closing any of the received descriptors fds[i..n-1] (nor fds[0..i-1]). These fds were just handed over by the kernel and are now owned by nobody, so they leak. The leak is reachable from a peer that sends fds in a context where the CLOEXEC fallback path runs (kernel lacking MSG_CMSG_CLOEXEC).","fix":"On the fcntl failure path (and any early return), g_close() all descriptors in fds[0..n-1] before returning NULL. Better: build the GUnixFDList first (which takes ownership and will close on finalize) and only then apply CLOEXEC, or close remaining fds explicitly in the error branch.","locations":[{"ref":"gio/gunixfdmessage.c:102-126","code":"  102 |   for (i = 0; i < n; i++)\n  103 |     {\n  104 |       int errsv;\n  105 | \n  106 |       do\n  107 |         {\n  108 |           s = fcntl (fds[i], F_SETFD, FD_CLOEXEC);\n  109 |           errsv = errno;\n  110 |         }\n  111 |       while (s < 0 && errsv == EINTR);\n  112 | \n  113 |       if (s < 0)\n  114 |         {\n  115 |           g_warning (\"Error setting close-on-exec flag on incoming fd: %s\",\n  116 |                      g_strerror (errsv));\n  117 |           return NULL;\n  118 |         }\n  119 |     }\n  120 | \n  121 |   list = g_unix_fd_list_new_from_array (fds, n);\n  122 |   message = g_unix_fd_message_new_with_fd_list (list);\n  123 |   g_object_unref (list);\n  124 | \n  125 |   return message;\n  126 | }"}]},{"id":"RES_2","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In the worker read callback, received UNIX fds are appended into worker->read_fd_list as ancillary messages are processed. If a subsequent ancillary message in the same batch is of an unexpected type (and no prior read error set 'error'), the code emits 'disconnected', frees the remaining control-message array and goto out without delivering a message. The fds already accumulated in worker->read_fd_list are not closed at this point; they are only released when the worker is finalized. On a long-lived connection that keeps reading, this can defer closing of passed fds longer than intended.","fix":"On the unexpected-ancillary-message error exit, also g_clear_object(&worker->read_fd_list) (which closes the owned fds) before goto out, since the partially-collected fds will never be delivered.","locations":[{"ref":"gio/gdbusprivate.c:633-655","code":"  633 |           else\n  634 |             {\n  635 |               if (error == NULL)\n  636 |                 {\n  637 |                   g_set_error (&error,\n  638 |                                G_IO_ERROR,\n  639 |                                G_IO_ERROR_FAILED,\n  640 |                                \"Unexpected ancillary message of type %s received from peer\",\n  641 |                                g_type_name (G_TYPE_FROM_INSTANCE (control_message)));\n  642 |                   _g_dbus_worker_emit_disconnected (worker, TRUE, error);\n  643 |                   g_error_free (error);\n  644 |                   g_object_unref (control_message);\n  645 |                   n++;\n  646 |                   while (n < worker->read_num_ancillary_messages)\n  647 |                     g_object_unref (worker->read_ancillary_messages[n++]);\n  648 |                   g_free (worker->read_ancillary_messages);\n  649 |                   goto out;\n  650 |                 }\n  651 |             }\n  652 |           g_object_unref (control_message);\n  653 |         }\n  654 |       g_free (worker->read_ancillary_messages);\n  655 |     }"}]},{"id":"RES_3","type":"resource_leak","type_label":"Resource Leak","severity":"low","description":"In handle_overwrite_open() with G_FILE_CREATE_REPLACE_DESTINATION and a backup requested, after the backup copy the original fd is closed via g_clear_fd(&fd, NULL) (line 1202) and the file is unlinked and reopened. If the reopen g_open() at line 1219 fails, control jumps to the `error:` label which does `if (fd >= 0) g_close (fd, NULL);`. Here fd is -1 so nothing leaks — that path is fine. However note that the comment at line 1165-1168 plus the g_assert(fd >= 0) at line 1169 only hold for the create_backup branch; the broader function relies on subtle invariants about fd being -1 vs valid across the symlink/replace branches. Worth a defensive review/comment: the symlink + !replace_destination_set path can reach the regular-file checks with fd == -1 and then takes the truncate `else` branch at line 1234-1251 calling ftruncate(fd=-1) only if it is not a symlink, which is excluded; confirmed safe but fragile.","fix":"No leak today, but add an explicit assertion `g_assert (fd >= 0)` before the ftruncate(fd, 0) in the non-replace branch (line 1240) to document that fd must be valid there, guarding against future refactors of the symlink/replace fd bookkeeping.","locations":[{"ref":"gio/glocalfileoutputstream.c:1165-1253","code":" 1165 |       /* The FD could be invalid if the file is a symlink, a backup has been\n 1166 |        * requested, and the source directory is read-only (as we won’t have\n 1167 |        * errored out earlier), but in that case creating the backup file will\n 1168 |        * have failed just above. */\n 1169 |       g_assert (fd >= 0);\n 1170 | \n 1171 |       if (!copy_file_data (fd, bfd, NULL))\n 1172 | \t{\n 1173 | \t  g_set_error_literal (error,\n 1174 |                                G_IO_ERROR,\n 1175 |                                G_IO_ERROR_CANT_CREATE_BACKUP,\n 1176 |                                _(\"Backup file creation failed\"));\n 1177 | \t  g_unlink (backup_filename);\n 1178 |           g_close (bfd, NULL);\n 1179 | \t  g_free (backup_filename);\n 1180 | \t  \n 1181 |           goto error;\n 1182 | \t}\n 1183 |       \n 1184 |       g_close (bfd, NULL);\n 1185 |       g_free (backup_filename);\n 1186 | \n 1187 |       /* Seek back to the start of the file after the backup copy */\n 1188 |       if (lseek (fd, 0, SEEK_SET) == -1)\n 1189 | \t{\n 1190 |           errsv = errno;\n 1191 | \n 1192 | \t  g_set_error (error, G_IO_ERROR,\n 1193 | \t\t       g_io_error_from_errno (errsv),\n 1194 | \t\t       _(\"Error seeking in file: %s\"),\n 1195 | \t\t       g_strerror (errsv));\n 1196 |           goto error;\n 1197 | \t}\n 1198 |     }\n 1199 | \n 1200 |   if (replace_destination_set)\n 1201 |     {\n 1202 |       g_clear_fd (&fd, NULL);\n 1203 | \n 1204 |       if (g_unlink (filename) != 0)\n 1205 | \t{\n 1206 |           errsv = errno;\n 1207 | \t  \n 1208 | \t  g_set_error (error, G_IO_ERROR,\n 1209 | \t\t       g_io_error_from_errno (errsv),\n 1210 | \t\t       _(\"Error removing old file: %s\"),\n 1211 | \t\t       g_strerror (errsv));\n 1212 |           goto error;\n 1213 | \t}\n 1214 | \n 1215 |       if (readable)\n 1216 | \topen_flags = O_RDWR | O_CREAT | O_BINARY | O_CLOEXEC;\n 1217 |       else\n 1218 | \topen_flags = O_WRONLY | O_CREAT | O_BINARY | O_CLOEXEC;\n 1219 |       fd = g_open (filename, open_flags, mode);\n 1220 |       if (fd == -1)\n 1221 | \t{\n 1222 |     char *display_name;\n 1223 |     errsv = errno;\n 1224 |     display_name = g_filename_display_name (filename);\n 1225 | \n 1226 | \t  g_set_error (error, G_IO_ERROR,\n 1227 | \t\t       g_io_error_from_errno (errsv),\n 1228 | \t\t       _(\"Error opening file “%s”: %s\"),\n 1229 | \t\t       display_name, g_strerror (errsv));\n 1230 | \t  g_free (display_name);\n 1231 |           goto error;\n 1232 | \t}\n 1233 |     }\n 1234 |   else\n 1235 |     {\n 1236 |       /* Truncate the file at the start */\n 1237 | #ifdef G_OS_WIN32\n 1238 |       if (g_win32_ftruncate (fd, 0) == -1)\n 1239 | #else\n 1240 | \tif (ftruncate (fd, 0) == -1)\n 1241 | #endif\n 1242 | \t  {\n 1243 | \t    errsv = errno;\n 1244 | \t    \n 1245 | \t    g_set_error (error, G_IO_ERROR,\n 1246 | \t\t\t g_io_error_from_errno (errsv),\n 1247 | \t\t\t _(\"Error truncating file: %s\"),\n 1248 | \t\t\t g_strerror (errsv));\n 1249 |             goto error;\n 1250 | \t  }\n 1251 |     }\n 1252 |     \n 1253 |   return fd;"}]},{"id":"OVF_1","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"high","description":"gi_constant_info_get_value() reads a string/pointer constant from an attacker-controlled offset and size with no bounds check. For pointer-typed constants it does g_memdup2(&typelib->data[blob->offset], blob->size). The validator validate_constant_blob() only checks alignment of blob->offset and (for non-pointer types) that blob->size matches the expected fixed size; it never verifies that blob->offset + blob->size lies within the typelib buffer for pointer/string constants. A malicious .typelib can therefore set blob->offset / blob->size arbitrarily and cause an out-of-bounds read (heap info leak / crash) at the point any binding fetches the constant's value.","fix":"In validate_constant_blob(), when blob->type.flags.pointer is set, validate that blob->offset is within the buffer and that blob->offset + blob->size <= typelib->len (using overflow-safe arithmetic). Alternatively bounds-check in gi_constant_info_get_value() before the g_memdup2()/dereference.","locations":[{"ref":"girepository/giconstantinfo.c:134-139","code":"  134 |       if (blob->type.flags.pointer)\n  135 |         {\n  136 |           size_t blob_size = blob->size;\n  137 | \n  138 |           value->v_pointer = g_memdup2 (&rinfo->typelib->data[blob->offset], blob_size);\n  139 |         }"},{"ref":"girepository/gitypelib.c:1178-1209","code":" 1178 |   if (!is_aligned (blob->offset))\n 1179 |     {\n 1180 |       g_set_error (error,\n 1181 |                    GI_TYPELIB_ERROR,\n 1182 |                    GI_TYPELIB_ERROR_INVALID_BLOB,\n 1183 |                    \"Misaligned constant value\");\n 1184 |       return FALSE;\n 1185 |     }\n 1186 | \n 1187 |   type = (SimpleTypeBlob *)&typelib->data[offset + G_STRUCT_OFFSET (ConstantBlob, type)];\n 1188 |   if (type->flags.reserved == 0 && type->flags.reserved2 == 0)\n 1189 |     {\n 1190 |       if (type->flags.tag == 0)\n 1191 |         {\n 1192 |           g_set_error (error,\n 1193 |                        GI_TYPELIB_ERROR,\n 1194 |                        GI_TYPELIB_ERROR_INVALID_BLOB,\n 1195 |                        \"Constant value type void\");\n 1196 |           return FALSE;\n 1197 |         }\n 1198 | \n 1199 |       if (value_size[type->flags.tag] != 0 &&\n 1200 |           blob->size != value_size[type->flags.tag])\n 1201 |         {\n 1202 |           g_set_error (error,\n 1203 |                        GI_TYPELIB_ERROR,\n 1204 |                        GI_TYPELIB_ERROR_INVALID_BLOB,\n 1205 |                        \"Constant value size mismatch\");\n 1206 |           return FALSE;\n 1207 |         }\n 1208 |       /* FIXME check string values */\n 1209 |     }"}]},{"id":"OVF_2","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"do_lookup() computes the data size of a non-compressed resource as g_variant_get_size(array) - 1, relying on the invariant that uncompressed files always carry a trailing NUL appended by glib-compile-resources. For a corrupt/untrusted resource bundle whose 'ay' payload is empty, this underflows to SIZE_MAX. g_resource_open_stream() then passes that value straight to g_memory_input_stream_new_from_data(data, data_size, NULL) (and resource_to_bytes uses it for an uncompressed g_bytes_new_with_free_func), producing an out-of-bounds buffer.","fix":"Guard the subtraction: if the array size is 0 for a non-compressed entry, treat the entry as invalid (or clamp data_size to 0) rather than computing g_variant_get_size(array) - 1.","locations":[{"ref":"gio/gresource.c:746-752","code":"  746 |         {\n  747 |           /* Don't report trailing newline that non-compressed files has */\n  748 |           if (_flags & G_RESOURCE_FLAGS_COMPRESSED)\n  749 |             *data_size = g_variant_get_size (array);\n  750 |           else\n  751 |             *data_size = g_variant_get_size (array) - 1;\n  752 |         }"}]},{"id":"OVF_3","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"g_zlib_compressor_convert() assigns gsize inbuf_size/outbuf_size into z_stream.avail_in/avail_out, which are uInt (32-bit on virtually all platforms). On 64-bit systems a GConverter caller may legitimately pass buffers larger than UINT_MAX directly to the public g_converter_convert() API; the size is silently truncated, so only part of the buffer is processed and the subsequent computation *bytes_read = inbuf_size - avail_in (and *bytes_written) yields a wrong, potentially gigantic value because inbuf_size is the full 64-bit size but avail_in reflects only the truncated amount.","fix":"Clamp the amount handed to zlib per call, e.g. avail_in = MIN (inbuf_size, G_MAXUINT) and avail_out = MIN (outbuf_size, G_MAXUINT), and compute bytes_read/bytes_written relative to the clamped values so the deltas are correct.","locations":[{"ref":"gio/gzlibcompressor.c:475-479","code":"  475 |   compressor->zstream.next_in = (void *)inbuf;\n  476 |   compressor->zstream.avail_in = inbuf_size;\n  477 | \n  478 |   compressor->zstream.next_out = outbuf;\n  479 |   compressor->zstream.avail_out = outbuf_size;"},{"ref":"gio/gzlibcompressor.c:518-519","code":"  518 |       *bytes_read = inbuf_size - compressor->zstream.avail_in;\n  519 |       *bytes_written = outbuf_size - compressor->zstream.avail_out;"}]},{"id":"OVF_4","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"g_zlib_decompressor_convert() has the same uInt truncation as the compressor: gsize inbuf_size/outbuf_size are assigned to z_stream.avail_in/avail_out (uInt), then *bytes_read = inbuf_size - avail_in and *bytes_written = outbuf_size - avail_out are computed against the full 64-bit sizes. A buffer larger than UINT_MAX passed via the public converter API is silently truncated and the returned byte counts are wrong.","fix":"Clamp avail_in/avail_out to MIN(size, G_MAXUINT) and compute bytes_read/bytes_written relative to the clamped input/output sizes.","locations":[{"ref":"gio/gzlibdecompressor.c:323-327","code":"  323 |   decompressor->zstream.next_in = (void *)inbuf;\n  324 |   decompressor->zstream.avail_in = inbuf_size;\n  325 | \n  326 |   decompressor->zstream.next_out = outbuf;\n  327 |   decompressor->zstream.avail_out = outbuf_size;"},{"ref":"gio/gzlibdecompressor.c:368-369","code":"  368 |   *bytes_read = inbuf_size - decompressor->zstream.avail_in;\n  369 |   *bytes_written = outbuf_size - decompressor->zstream.avail_out;"}]},{"id":"OVF_5","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"strinfo_string_from_alias() dereferences an attacker-controllable word offset with no bounds check. For an alias entry the stored integer strinfo[index] is a word offset into the strinfo array; the code computes &strinfo[GUINT32_TO_LE(strinfo[index]) + 1] and reads a string there without validating that the offset is < length. The strinfo blob is obtained via g_variant_get_fixed_array() on an 'au' array taken directly from gschemas.compiled; GVariant normal-form validation checks only that the byte length is a multiple of 4, not the internal alias-offset semantics. A corrupt/untrusted schema can therefore trigger an out-of-bounds read (and read arbitrary memory as a string) via g_settings_schema_key_range_fixup().","fix":"Validate that the decoded offset (and offset+1, plus room for the string up to a 0xff terminator) lies within [0, length) before dereferencing; return NULL on an out-of-range offset.","locations":[{"ref":"gio/strinfo.c:248-261","code":"  248 | G_GNUC_UNUSED static const gchar *\n  249 | strinfo_string_from_alias (const guint32 *strinfo,\n  250 |                            guint          length,\n  251 |                            const gchar   *alias)\n  252 | {\n  253 |   gint index;\n  254 | \n  255 |   index = strinfo_find_string (strinfo, length, alias, TRUE);\n  256 | \n  257 |   if (index < 0)\n  258 |     return NULL;\n  259 | \n  260 |   return 1 + (const gchar *) &strinfo[GUINT32_TO_LE (strinfo[index]) + 1];\n  261 | }"}]},{"id":"OVF_6","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"get_section_by_id() walks the section array starting at header->sections until it finds a Section with id == GI_SECTION_END. header->sections is never validated to be within the buffer, nor is the section array guaranteed to be NUL/END-terminated inside the buffer. A malicious typelib with an out-of-range or unterminated sections offset causes an unbounded out-of-bounds read. Reachable at runtime via gi_typelib_get_dir_entry_by_name() (the directory-index lookup path).","fix":"Validate header->sections during validate_header_basic() (must be aligned and within bounds) and bound the iteration in get_section_by_id() so it never reads past typelib->len before encountering GI_SECTION_END.","locations":[{"ref":"girepository/gitypelib.c:168-186","code":"  168 | static Section *\n  169 | get_section_by_id (GITypelib   *typelib,\n  170 |                    SectionType  section_type)\n  171 | {\n  172 |   Header *header = (Header *)typelib->data;\n  173 |   Section *section;\n  174 | \n  175 |   if (header->sections == 0)\n  176 |     return NULL;\n  177 | \n  178 |   for (section = (Section*)&typelib->data[header->sections];\n  179 |        section->id != GI_SECTION_END;\n  180 |        section++)\n  181 |     {\n  182 |       if (section->id == section_type)\n  183 |         return section;\n  184 |     }\n  185 |   return NULL;\n  186 | }"}]},{"id":"OVF_7","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"validate_name() reads up to MAX_NAME_LEN (2048) bytes via memchr() starting at the string returned by get_string(). get_string() only checks `typelib->len < offset`, so a name offset equal to or near typelib->len yields a pointer at/just before the end of the buffer; the memchr() then scans up to 2048 bytes past the end of the mapped typelib looking for a NUL. This is an out-of-bounds read reachable during validation of an untrusted typelib (e.g. any blob name offset pointing near the buffer end).","fix":"In validate_name()/get_string(), clamp the memchr length to the number of bytes actually remaining in the buffer: use MIN(MAX_NAME_LEN, typelib->len - offset) and treat a missing NUL within the remaining bytes as invalid.","locations":[{"ref":"girepository/gitypelib.c:472-485","code":"  472 | static const char *\n  473 | get_string (GITypelib *typelib, uint32_t offset, GError **error)\n  474 | {\n  475 |   if (typelib->len < offset)\n  476 |     {\n  477 |       g_set_error (error,\n  478 |                    GI_TYPELIB_ERROR,\n  479 |                    GI_TYPELIB_ERROR_INVALID,\n  480 |                    \"Buffer is too short while looking up name\");\n  481 |       return NULL;\n  482 |     }\n  483 | \n  484 |   return (const char*)&typelib->data[offset];\n  485 | }"},{"ref":"girepository/gitypelib.c:504-516","code":"  504 |   name = get_string (typelib, offset, error);\n  505 |   if (!name)\n  506 |     return FALSE;\n  507 | \n  508 |   if (!memchr (name, '\\0', MAX_NAME_LEN))\n  509 |     {\n  510 |       g_set_error (error,\n  511 |                    GI_TYPELIB_ERROR,\n  512 |                    GI_TYPELIB_ERROR_INVALID,\n  513 |                    \"The %s is too long: %s\",\n  514 |                    msg, name);\n  515 |       return FALSE;\n  516 |     }"}]},{"id":"OVF_8","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"init_zone_from_iana_info() parses TZif files using 32-bit big-endian counts (tzh_timecnt, tzh_typecnt, tzh_charcnt, etc.) taken directly from the file and uses them to compute pointers into the mapped buffer and to index arrays (tz_ttinfo[index], tz_transitions[index], tz_type_index[index], tz_abbrs[info.tt_abbrind]) without validating that the computed offsets stay within `size`. A malformed/truncated TZif file therefore causes out-of-bounds reads (and the version-2 header skip at lines 715-722 can move `header` past the end of the buffer before any further reads). This is the documented FIXME 'Handle invalid TZif files better (Issue#1088)'. In normal use the input is the trusted system zoneinfo database, but g_time_zone_new_identifier() can be pointed at attacker-controlled data via TZDIR / an absolute identifier, making this reachable.","fix":"Before dereferencing, validate every derived pointer/length against `data + size`: check that the v2 header skip stays within the buffer, that tz_transitions/tz_type_index/tz_ttinfo/tz_abbrs and their full extents (timesize*time_count, time_count, sizeof(ttinfo)*type_count) lie within `size`, and that each info.tt_abbrind is within the abbreviation region. Bail out with g_return_if_fail / a clean error on any failure.","locations":[{"ref":"glib/gtimezone.c:712-755","code":"  712 |   if (header->tzh_version >= '2')\n  713 |       {\n  714 |         /* Skip ahead to the newer 64-bit data if it's available. */\n  715 |         header = (const struct tzhead *)\n  716 |           (((const gchar *) (header + 1)) +\n  717 |            guint32_from_be(header->tzh_ttisgmtcnt) +\n  718 |            guint32_from_be(header->tzh_ttisstdcnt) +\n  719 |            8 * guint32_from_be(header->tzh_leapcnt) +\n  720 |            5 * guint32_from_be(header->tzh_timecnt) +\n  721 |            6 * guint32_from_be(header->tzh_typecnt) +\n  722 |            guint32_from_be(header->tzh_charcnt));\n  723 |         timesize = sizeof (gint64);\n  724 |       }\n  725 |   time_count = guint32_from_be(header->tzh_timecnt);\n  726 |   type_count = guint32_from_be(header->tzh_typecnt);\n  727 | \n  728 |   if (header->tzh_version >= '2')\n  729 |     {\n  730 |       const gchar *footer = (((const gchar *) (header + 1))\n  731 |                              + guint32_from_be(header->tzh_ttisgmtcnt)\n  732 |                              + guint32_from_be(header->tzh_ttisstdcnt)\n  733 |                              + 12 * guint32_from_be(header->tzh_leapcnt)\n  734 |                              + 9 * time_count\n  735 |                              + 6 * type_count\n  736 |                              + guint32_from_be(header->tzh_charcnt));\n  737 |       const gchar *footerlast;\n  738 |       size_t footerlen;\n  739 |       g_return_if_fail (footer <= data + size - 2 && footer[0] == '\\n');\n  740 |       footerlast = memchr (footer + 1, '\\n', data + size - (footer + 1));\n  741 |       g_return_if_fail (footerlast);\n  742 |       footerlen = footerlast + 1 - footer;\n  743 |       if (footerlen != 2)\n  744 |         {\n  745 |           footertz = parse_footertz (footer, footerlen);\n  746 |           g_return_if_fail (footertz);\n  747 |           extra_type_count = footertz->t_info->len;\n  748 |           extra_time_count = footertz->transitions->len;\n  749 |         }\n  750 |     }\n  751 | \n  752 |   tz_transitions = ((guint8 *) (header) + sizeof (*header));\n  753 |   tz_type_index = tz_transitions + timesize * time_count;\n  754 |   tz_ttinfo = tz_type_index + time_count;\n  755 |   tz_abbrs = tz_ttinfo + sizeof (struct ttinfo) * type_count;"},{"ref":"glib/gtimezone.c:766-783","code":"  766 |       struct ttinfo info = ((struct ttinfo*)tz_ttinfo)[index];\n  767 |       t_info.gmt_offset = gint32_from_be (info.tt_gmtoff);\n  768 |       t_info.is_dst = info.tt_isdst ? TRUE : FALSE;\n  769 |       t_info.abbrev = g_strdup ((gchar *) &tz_abbrs[info.tt_abbrind]);\n  770 |       g_array_append_val (gtz->t_info, t_info);\n  771 |     }\n  772 | \n  773 |   for (index = 0; index < time_count; index++)\n  774 |     {\n  775 |       Transition trans;\n  776 |       if (header->tzh_version >= '2')\n  777 |         trans.time = gint64_from_be (((gint64_be*)tz_transitions)[index]);\n  778 |       else\n  779 |         trans.time = gint32_from_be (((gint32_be*)tz_transitions)[index]);\n  780 |       last_explicit_transition_time = trans.time;\n  781 |       trans.info_index = tz_type_index[index];\n  782 |       g_assert (trans.info_index >= 0);\n  783 |       g_assert ((guint) trans.info_index < gtz->t_info->len);"}]},{"id":"OVF_9","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"medium","description":"check_type_info_I() validates that instance_size/class_size are large enough but never checks an upper bound, while TypeData stores them in guint16 fields (instance.instance_size, class.class_size). A type registered with instance_size >= 65536 (or class_size >= 65536) is silently truncated when assigned to data->instance.instance_size = info->instance_size. g_type_create_instance() then allocates only the truncated size, but the caller's struct expects the full size, producing heap buffer under-allocation / out-of-bounds access for every instance. Note that the private-size registration paths (g_type_class_add_private / g_type_add_instance_private) DO guard with `<= 0xffff`, but the main instance/class sizes do not.","fix":"In check_type_info_I() add upper-bound checks rejecting instance_size and class_size that exceed G_MAXUINT16 (or whatever the storage field width is), emitting a g_critical and returning FALSE, before the values get truncated into the guint16 node fields.","locations":[{"ref":"gobject/gtype.c:929-946","code":"  929 |   /* check instance size */\n  930 |   if (finfo->type_flags & G_TYPE_FLAG_INSTANTIATABLE)\n  931 |     {\n  932 |       if (info->instance_size < sizeof (GTypeInstance))\n  933 | \t{\n  934 | \t  g_critical (\"specified instance size for type '%s' is smaller than 'GTypeInstance' size\",\n  935 | \t\t      type_name);\n  936 | \t  return FALSE;\n  937 | \t}\n  938 |       if (pnode && info->instance_size < pnode->data->instance.instance_size)\n  939 | \t{\n  940 | \t  g_critical (\"specified instance size for type '%s' is smaller \"\n  941 | \t\t      \"than the parent type's '%s' instance size\",\n  942 | \t\t      type_name,\n  943 | \t\t      NODE_NAME (pnode));\n  944 | \t  return FALSE;\n  945 | \t}\n  946 |     }"},{"ref":"gobject/gtype.c:1114","code":" 1114 |       data->instance.instance_size = info->instance_size;"},{"ref":"gobject/gtype.c:1131","code":" 1131 |       data->class.class_size = info->class_size;"}]},{"id":"OVF_10","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"The fixed-width readers guard with checks like 'if (mbuf->pos > mbuf->valid_len - 2)' (and -4, -8). When valid_len < the operand size, the unsigned subtraction (valid_len is gsize) underflows to a huge value, making the bounds check ineffective and allowing the subsequent memcpy to read out of bounds. In the current codebase these are only reachable from g_dbus_message_new_from_blob(), where valid_len == blob_len >= DBUS_MESSAGE_HEADER_MINIMUM_LENGTH_BYTES (16), so the underflow cannot currently occur; but the guard is incorrect as written and is fragile if any future caller uses a smaller buffer.","fix":"Rewrite the bounds check to avoid the underflow, e.g. 'if (mbuf->valid_len < 2 || mbuf->pos > mbuf->valid_len - 2)' or, better, 'if (mbuf->pos + 2 > mbuf->valid_len)' (pos is bounded well below G_MAXSIZE here, so the addition cannot overflow).","locations":[{"ref":"gio/gdbusmessage.c:113-120","code":"  113 |   if (mbuf->pos > mbuf->valid_len - 2)\n  114 |     {\n  115 |       g_set_error (error,\n  116 |                    G_IO_ERROR,\n  117 |                    G_IO_ERROR_INVALID_ARGUMENT,\n  118 |                    \"Unexpected end of message while reading int16.\");\n  119 |       return 0;\n  120 |     }"},{"ref":"gio/gdbusmessage.c:139-146","code":"  139 |   if (mbuf->pos > mbuf->valid_len - 2)\n  140 |     {\n  141 |       g_set_error (error,\n  142 |                    G_IO_ERROR,\n  143 |                    G_IO_ERROR_INVALID_ARGUMENT,\n  144 |                    \"Unexpected end of message while reading uint16.\");\n  145 |       return 0;\n  146 |     }"},{"ref":"gio/gdbusmessage.c:165-172","code":"  165 |   if (mbuf->pos > mbuf->valid_len - 4)\n  166 |     {\n  167 |       g_set_error (error,\n  168 |                    G_IO_ERROR,\n  169 |                    G_IO_ERROR_INVALID_ARGUMENT,\n  170 |                    \"Unexpected end of message while reading int32.\");\n  171 |       return 0;\n  172 |     }"},{"ref":"gio/gdbusmessage.c:191-198","code":"  191 |   if (mbuf->pos > mbuf->valid_len - 4)\n  192 |     {\n  193 |       g_set_error (error,\n  194 |                    G_IO_ERROR,\n  195 |                    G_IO_ERROR_INVALID_ARGUMENT,\n  196 |                    \"Unexpected end of message while reading uint32.\");\n  197 |       return 0;\n  198 |     }"},{"ref":"gio/gdbusmessage.c:217-224","code":"  217 |   if (mbuf->pos > mbuf->valid_len - 8)\n  218 |     {\n  219 |       g_set_error (error,\n  220 |                    G_IO_ERROR,\n  221 |                    G_IO_ERROR_INVALID_ARGUMENT,\n  222 |                    \"Unexpected end of message while reading int64.\");\n  223 |       return 0;\n  224 |     }"},{"ref":"gio/gdbusmessage.c:243-250","code":"  243 |   if (mbuf->pos > mbuf->valid_len - 8)\n  244 |     {\n  245 |       g_set_error (error,\n  246 |                    G_IO_ERROR,\n  247 |                    G_IO_ERROR_INVALID_ARGUMENT,\n  248 |                    \"Unexpected end of message while reading uint64.\");\n  249 |       return 0;\n  250 |     }"}]},{"id":"OVF_11","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In the UNIX (utimensat/utimes) variant of set_mtime_atime(), a user-supplied *_USEC attribute is converted to nanoseconds with `times_n[i].tv_nsec = val_usec * 1000` (and `times[i].tv_usec = val_usec` for utimes) with no range checking. val_usec is a guint32 taken directly from the attribute value, so `val_usec * 1000` overflows 32-bit arithmetic for val_usec > ~4.29M, producing a wrong/garbage tv_nsec. The Windows variant explicitly clamps this same computation (see line 2708/2754 with the 'Clamp the usec value if it’s going to overflow' comment), but the UNIX path does not, so behaviour is inconsistent and can silently set a bogus timestamp or be rejected by the kernel as out-of-range.","fix":"Validate/clamp val_usec to < 1000000 (or compute in 64-bit and reject values that exceed one second) before assigning to tv_nsec/tv_usec, mirroring the clamping already done in the Win32 branch.","locations":[{"ref":"gio/glocalfileinfo.c:2850-2858","code":" 2850 |   if (atime_usec_value)\n 2851 |     {\n 2852 |       guint32 val_usec = 0;\n 2853 | \n 2854 |       if (!get_uint32 (atime_usec_value, &val_usec, error))\n 2855 |         return FALSE;\n 2856 | \n 2857 |       times_n[0].tv_nsec = val_usec * 1000;\n 2858 |     }"},{"ref":"gio/glocalfileinfo.c:2889-2897","code":" 2889 |   if (mtime_usec_value)\n 2890 |     {\n 2891 |       guint32 val_usec = 0;\n 2892 | \n 2893 |       if (!get_uint32 (mtime_usec_value, &val_usec, error))\n 2894 |         return FALSE;\n 2895 | \n 2896 |       times_n[1].tv_nsec = val_usec * 1000;\n 2897 |     }"}]},{"id":"OVF_12","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"g_memory_output_stream_truncate() passes the signed goffset offset straight into array_resize() as a gsize without checking offset >= 0. g_seekable_truncate() (gseekable.c) performs no offset validation either, so a caller invoking truncate with a negative offset turns it into a huge gsize and requests an enormous realloc. realloc generally fails and a NO_SPACE error is returned, but the documented seekable contract is that negative offsets are invalid; this should be rejected explicitly rather than relying on allocation failure.","fix":"At the top of g_memory_output_stream_truncate(), validate offset: if (offset < 0) set G_IO_ERROR_INVALID_ARGUMENT and return FALSE before calling array_resize().","locations":[{"ref":"gio/gmemoryoutputstream.c:798-812","code":"  798 | static gboolean\n  799 | g_memory_output_stream_truncate (GSeekable     *seekable,\n  800 |                                  goffset        offset,\n  801 |                                  GCancellable  *cancellable,\n  802 |                                  GError       **error)\n  803 | {\n  804 |   GMemoryOutputStream *ostream = G_MEMORY_OUTPUT_STREAM (seekable);\n  805 | \n  806 |   if (!array_resize (ostream, offset, FALSE, error))\n  807 |     return FALSE;\n  808 | \n  809 |   ostream->priv->valid_len = offset;\n  810 | \n  811 |   return TRUE;\n  812 | }"}]},{"id":"OVF_13","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"strinfo_enumerate() walks the strinfo array assuming each 0xff-delimited string is NUL-terminated within bounds. It does ptr = memchr(ptr,'\\xff',end-ptr) then ptr += 5 and, for entries starting with 0xff, passes ptr+1 to g_variant_builder_add(...,\"s\",...). For a corrupt/untrusted schema where the final string is not NUL-terminated before 'end', g_variant_builder_add reads past the buffer. Reachable via g_settings_schema_key_get_range() on an enum/flags key. The g_assert(ptr != NULL) also turns a malformed blob into an abort.","fix":"Bound-check each string against 'end' (ensure a NUL exists before end before adding it) and replace the g_assert on the memchr result with a graceful bail-out for untrusted data.","locations":[{"ref":"gio/strinfo.c:263-291","code":"  263 | G_GNUC_UNUSED static GVariant *\n  264 | strinfo_enumerate (const guint32 *strinfo,\n  265 |                    guint          length)\n  266 | {\n  267 |   GVariantBuilder builder;\n  268 |   const gchar *ptr, *end;\n  269 | \n  270 |   ptr = (gpointer) strinfo;\n  271 |   end = ptr + 4 * length;\n  272 | \n  273 |   ptr += 4;\n  274 | \n  275 |   g_variant_builder_init_static (&builder, G_VARIANT_TYPE_STRING_ARRAY);\n  276 | \n  277 |   while (ptr < end)\n  278 |     {\n  279 |       /* don't include aliases */\n  280 |       if (*ptr == '\\xff')\n  281 |         g_variant_builder_add (&builder, \"s\", ptr + 1);\n  282 | \n  283 |       /* find the end of this string */\n  284 |       ptr = memchr (ptr, '\\xff', end - ptr);\n  285 |       g_assert (ptr != NULL);\n  286 | \n  287 |       /* skip over the int to the next string */\n  288 |       ptr += 5;\n  289 |     }\n  290 | \n  291 |   return g_variant_builder_end (&builder);"}]},{"id":"OVF_14","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"get_dir_entry_checked() and gi_typelib_get_dir_entry() compute the entry offset as `header->directory + (index - 1u) * header->entry_blob_size` entirely in 32-bit unsigned arithmetic. header->directory is an attacker-controlled uint32 that is only validated for alignment, not magnitude. For a very large typelib (directory near UINT32_MAX) the multiply/add can wrap modulo 2^32, producing a small offset that then passes the `typelib->len < offset + sizeof(DirEntry)` check (computed in size_t) while actually being bogus, leading to a misdirected read.","fix":"Compute the offset in size_t (cast header->directory and the product to size_t before adding) and additionally validate header->directory against typelib->len in validate_header_basic().","locations":[{"ref":"girepository/gitypelib.c:90-101","code":"   90 |   offset = header->directory + (index - 1u) * header->entry_blob_size;\n   91 | \n   92 |   if (typelib->len < offset + sizeof (DirEntry))\n   93 |     {\n   94 |       g_set_error (error,\n   95 |                    GI_TYPELIB_ERROR,\n   96 |                    GI_TYPELIB_ERROR_INVALID,\n   97 |                    \"The buffer is too short\");\n   98 |       return FALSE;\n   99 |     }\n  100 | \n  101 |   return (DirEntry *)&typelib->data[offset];"},{"ref":"girepository/gitypelib.c:162-166","code":"  162 |   Header *header = (Header *)typelib->data;\n  163 | \n  164 |   /* this deliberately doesn’t check for underflow of @index; see get_dir_entry_checked() for that */\n  165 |   return (DirEntry *)&typelib->data[header->directory + (index - 1u) * header->entry_blob_size];\n  166 | }"}]},{"id":"OVF_15","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"gi_typelib_get_dir_entry_by_name() hash path: gi_typelib_hash_search() returns table[offset], an arbitrary uint16 read from the attacker-controlled directory-index section (dirmap_offset is read straight from the typelib data). The returned index is passed to gi_typelib_get_dir_entry() (the unchecked variant), which computes &data[directory + (index-1)*entry_blob_size] without validating index against header->n_entries before dereferencing entry->name. A crafted directory-index section can yield an out-of-bounds DirEntry read.","fix":"Validate dirmap_offset and the resulting index against header->n_entries (use gi_typelib_get_dir_entry checked equivalent) before dereferencing, and bounds-check dirmap_offset + offset*sizeof(uint16) against typelib->len in gi_typelib_hash_search().","locations":[{"ref":"girepository/gitypelib.c:222-233","code":"  222 |   else\n  223 |     {\n  224 |       uint8_t *hash = (uint8_t *) &typelib->data[dirindex->offset];\n  225 |       uint16_t index;\n  226 | \n  227 |       index = gi_typelib_hash_search (hash, name, n_entries);\n  228 |       entry = gi_typelib_get_dir_entry (typelib, index + 1);\n  229 |       entry_name = gi_typelib_get_string (typelib, entry->name);\n  230 |       if (strcmp (name, entry_name) == 0)\n  231 |         return entry;\n  232 |       return NULL;\n  233 |     }"},{"ref":"girepository/gthash.c:204-229","code":"  204 | uint16_t\n  205 | gi_typelib_hash_search (uint8_t* memory, const char *str, uint32_t n_entries)\n  206 | {\n  207 |   uint32_t *mph;\n  208 |   uint16_t *table;\n  209 |   uint32_t dirmap_offset;\n  210 |   uint32_t offset;\n  211 | \n  212 |   g_assert ((((size_t)memory) & 0x3) == 0);\n  213 |   mph = ((uint32_t*)memory)+1;\n  214 | \n  215 |   offset = cmph_search_packed (mph, str, strlen (str));\n  216 | \n  217 |   /* Make sure that offset always lies in the entries array.  cmph\n  218 |      cometimes generates offset larger than number of entries (for\n  219 |      'str' argument which is not in the hashed list). In this case,\n  220 |      fake the correct result and depend on caller's final check that\n  221 |      the entry is really the one that the caller wanted. */\n  222 |   if (offset >= n_entries)\n  223 |     offset = 0;\n  224 | \n  225 |   dirmap_offset = *((uint32_t*)memory);\n  226 |   table = (uint16_t*) (memory + dirmap_offset);\n  227 | \n  228 |   return table[offset];\n  229 | }"}]},{"id":"OVF_16","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"In g_convert_with_iconv(), on an iconv E2BIG result the output buffer is grown with `outbuf_size *= 2` with no overflow check before the g_realloc(). For very large inputs (approaching G_MAXSIZE/2) the doubling wraps around to a small value, g_realloc() then shrinks the buffer, and the next g_iconv() call writes past the (now smaller) allocation, causing heap corruption. The same unchecked doubling exists in g_convert_with_fallback(). These functions are documented as not for streaming/huge inputs, so reachability is limited, but the missing guard is a genuine integer-overflow bug. Other allocation sites in this file (g_escape_uri_string, g_string code, etc.) do check for overflow.","fix":"Before doubling, check for overflow, e.g. `if (outbuf_size > G_MAXSIZE / 2) g_error(...)` (or use g_size_checked_mul) before `outbuf_size *= 2;` and the subsequent g_realloc().","locations":[{"ref":"glib/gconvert.c:345-354","code":"  345 | \t    case E2BIG:\n  346 | \t      {\n  347 | \t\tgsize used = outp - dest;\n  348 | \t\t\n  349 | \t\toutbuf_size *= 2;\n  350 | \t\tdest = g_realloc (dest, outbuf_size);\n  351 | \t\t\n  352 | \t\toutp = dest + used;\n  353 | \t\toutbytes_remaining = outbuf_size - used - NUL_TERMINATOR_LENGTH;\n  354 | \t      }"},{"ref":"glib/gconvert.c:657-668","code":"  657 | \t    case E2BIG:\n  658 | \t      {\n  659 | \t\tgsize used = outp - dest;\n  660 | \n  661 | \t\toutbuf_size *= 2;\n  662 | \t\tdest = g_realloc (dest, outbuf_size);\n  663 | \t\t\n  664 | \t\toutp = dest + used;\n  665 | \t\toutbytes_remaining = outbuf_size - used - NUL_TERMINATOR_LENGTH;\n  666 | \t\t\n  667 | \t\tbreak;\n  668 | \t      }"}]},{"id":"OVF_17","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"expand_escape() parses a `\\x{...}` hexadecimal escape in regex replacement text by accumulating `x = x * 16 + h` in a `gint x` with no limit on the number of hex digits and no overflow check. Attacker-controlled replacement text such as `\\x{ffffffffffff}` causes signed-integer overflow of `x`, which is undefined behaviour in C. The resulting value is then passed to g_unichar_to_utf8(); the 8-byte target buffer is large enough so there is no buffer overrun, but the signed overflow itself is UB and yields an arbitrary/garbage codepoint. The bounded numeric/octal escapes (\\0-\\9) limit iterations to 3 and are not affected.","fix":"Cap the accumulated value (e.g. reject once x exceeds 0x10FFFF) and/or limit the digit count, returning a parse error via the existing `goto error` path, mirroring how the bounded escapes are validated.","locations":[{"ref":"glib/gregex.c:3211-3248","code":" 3211 |     case 'x':\n 3212 |       p++;\n 3213 |       x = 0;\n 3214 |       if (*p == '{')\n 3215 |         {\n 3216 |           p++;\n 3217 |           do\n 3218 |             {\n 3219 |               h = g_ascii_xdigit_value (*p);\n 3220 |               if (h < 0)\n 3221 |                 {\n 3222 |                   error_detail = _(\"hexadecimal digit or “}” expected\");\n 3223 |                   goto error;\n 3224 |                 }\n 3225 |               x = x * 16 + h;\n 3226 |               p++;\n 3227 |             }\n 3228 |           while (*p != '}');\n 3229 |           p++;\n 3230 |         }\n 3231 |       else\n 3232 |         {\n 3233 |           for (i = 0; i < 2; i++)\n 3234 |             {\n 3235 |               h = g_ascii_xdigit_value (*p);\n 3236 |               if (h < 0)\n 3237 |                 {\n 3238 |                   error_detail = _(\"hexadecimal digit expected\");\n 3239 |                   goto error;\n 3240 |                 }\n 3241 |               x = x * 16 + h;\n 3242 |               p++;\n 3243 |             }\n 3244 |         }\n 3245 |       data->type = REPL_TYPE_STRING;\n 3246 |       data->text = g_new0 (gchar, 8);\n 3247 |       g_unichar_to_utf8 (x, data->text);\n 3248 |       break;"}]},{"id":"OVF_18","type":"overflow_underflow","type_label":"Overflow Underflow","severity":"low","description":"g_signal_newv() stores the caller-supplied n_params (a guint) into node->n_params, which is a `guint : 8` bitfield, without validating that n_params <= 255. A signal declared with more than 255 parameters silently truncates n_params while node->param_types is still g_memdup2'd for the full count. During emission the truncated n_params is used to build the instance_and_params array, so the extra parameter GValues are dropped / mismatched. The parameter loop validates each type but never caps the count.","fix":"Add `g_return_val_if_fail (n_params <= 255, 0);` (or the bitfield max) in g_signal_newv() alongside the other parameter validations before storing node->n_params.","locations":[{"ref":"gobject/gsignal.c:1687-1695","code":" 1687 |   for (i = 0; i < n_params; i++)\n 1688 |     if (!G_TYPE_IS_VALUE (param_types[i] & ~G_SIGNAL_TYPE_STATIC_SCOPE))\n 1689 |       {\n 1690 | \tg_critical (G_STRLOC \": parameter %d of type '%s' for signal \\\"%s::%s\\\" is not a value type\",\n 1691 | \t\t    i + 1, type_debug_name (param_types[i]), type_debug_name (itype), name);\n 1692 | \tg_free (signal_name_copy);\n 1693 | \tSIGNAL_UNLOCK ();\n 1694 | \treturn 0;\n 1695 |       }"},{"ref":"gobject/gsignal.c:1729-1730","code":" 1729 |   node->n_params = n_params;\n 1730 |   node->param_types = g_memdup2 (param_types, sizeof (GType) * n_params);"}]},{"id":"LOGIC_1","type":"logic_error","type_label":"Logic Error","severity":"high","description":"In the async SOCKSv4/v4a connect path, connect_reply_read_cb never checks for read == 0 (peer EOF / connection closed). g_input_stream_read_finish returns 0 at end-of-stream; offset then stays below length and the code calls do_read() again, which immediately returns 0 again, producing an infinite busy-loop of zero-byte reads if a (malicious or broken) SOCKS proxy closes the connection after sending a partial 8-byte reply. The SOCKSv5 code was explicitly fixed for this (it returns G_IO_ERROR_CONNECTION_CLOSED on read == 0) but SOCKSv4/v4a was not. GSocks4Proxy inherits from GSocks4aProxy so both are affected.","fix":"After checking read < 0, add a read == 0 branch that returns G_IO_ERROR_CONNECTION_CLOSED via g_task_return_new_error_literal(), mirroring the SOCKSv5 implementation in gsocks5proxy.c (e.g. connect_reply_read_cb at lines 962-970).","locations":[{"ref":"gio/gsocks4aproxy.c:394-424","code":"  394 |   read = g_input_stream_read_finish (G_INPUT_STREAM (source),\n  395 | \t\t\t\t     result, &error);\n  396 | \n  397 |   if (read < 0)\n  398 |     {\n  399 |       g_task_return_error (task, error);\n  400 |       g_object_unref (task);\n  401 |       return;\n  402 |     }\n  403 | \n  404 |   data->offset += read;\n  405 | \n  406 |   if (data->offset == data->length)\n  407 |     {\n  408 |       if (!parse_connect_reply (data->buffer, &error))\n  409 | \t{\n  410 | \t  g_task_return_error (task, error);\n  411 | \t  g_object_unref (task);\n  412 | \t  return;\n  413 | \t}\n  414 |       else\n  415 | \t{\n  416 | \t  g_task_return_pointer (task, g_object_ref (data->io_stream), g_object_unref);\n  417 | \t  g_object_unref (task);\n  418 | \t  return;\n  419 | \t}\n  420 |     }\n  421 |   else\n  422 |     {\n  423 |       do_read (connect_reply_read_cb, task, data);\n  424 |     }"}]},{"id":"LOGIC_2","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"g_settings_schema_key_init() takes the first child of the key tuple as the default value without checking it exists. The tuple comes straight from gschemas.compiled via g_settings_schema_get_value(), which only verifies the value is a tuple — not that it is non-empty. For a corrupt or untrusted gschemas.compiled (the documented trusted=FALSE use case for plugin schema sources), an empty tuple '()' makes g_variant_iter_next_value() return NULL, after which endian_fixup() and g_variant_get_type(key->default_value) dereference NULL, crashing the process.","fix":"After key->default_value = g_variant_iter_next_value (iter); check for NULL and raise a recoverable error (or g_error with a clear message) instead of unconditionally calling endian_fixup()/g_variant_get_type() on it.","locations":[{"ref":"gio/gsettingsschema.c:1294-1300","code":" 1294 |   iter = g_settings_schema_get_value (schema, name);\n 1295 | \n 1296 |   key->schema = g_settings_schema_ref (schema);\n 1297 |   key->default_value = g_variant_iter_next_value (iter);\n 1298 |   endian_fixup (&key->default_value);\n 1299 |   key->type = g_variant_get_type (key->default_value);\n 1300 |   key->name = g_intern_string (name);"}]},{"id":"LOGIC_3","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"In the SOCKSv5 async connect path, connect_addr_read_cb resumes a partial read of the bind-address bytes by calling do_read(connect_reply_read_cb, ...) instead of do_read(connect_addr_read_cb, ...). If the proxy delivers the trailing BND.ADDR/BND.PORT bytes in more than one chunk, the continuation is dispatched to the wrong callback (connect_reply_read_cb), which then re-runs parse_connect_reply() over address bytes it has already partly consumed and mis-handles the state machine. The single-read happy path masks this, but it is a genuine bug on fragmented reads.","fix":"Change the else branch to call do_read(connect_addr_read_cb, task, data) so partial address reads resume in the correct callback.","locations":[{"ref":"gio/gsocks5proxy.c:1078-1089","code":" 1078 |   data->offset += read;\n 1079 | \n 1080 |   if (data->offset == data->length)\n 1081 |     {\n 1082 |       g_task_return_pointer (task, g_object_ref (data->io_stream), g_object_unref);\n 1083 |       g_object_unref (task);\n 1084 |       return;\n 1085 |     }\n 1086 |   else\n 1087 |     {\n 1088 |       do_read (connect_reply_read_cb, task, data);\n 1089 |     }"}]},{"id":"LOGIC_4","type":"logic_error","type_label":"Logic Error","severity":"medium","description":"g_flags_get_value_by_nick() uses flags_value->value_nick as the loop-termination condition instead of value_name. Because value_nick is allowed to be NULL while value_name is not, the loop stops at the first flags entry whose nick is NULL, so any later flags with a matching nick are never found and the function wrongly returns NULL. The analogous g_enum_get_value_by_nick() (and g_flags_get_value_by_name()) correctly terminate on value_name and only NULL-check value_nick inside the body. The inner `flags_value->value_nick &&` test here is also redundant given the (buggy) loop guard.","fix":"Change the loop guard to `flags_value->value_name` to match g_flags_get_value_by_name()/g_enum_get_value_by_nick(): `for (flags_value = flags_class->values; flags_value->value_name; flags_value++) if (flags_value->value_nick && strcmp_ignore_case (nick, flags_value->value_nick) == 0) return flags_value;`.","locations":[{"ref":"gobject/genums.c:491-493","code":"  491 |       for (flags_value = flags_class->values; flags_value->value_nick; flags_value++)\n  492 |         if (flags_value->value_nick && strcmp_ignore_case (nick, flags_value->value_nick) == 0)\n  493 |           return flags_value;"}]},{"id":"LOGIC_5","type":"logic_error","type_label":"Logic Error","severity":"low","description":"g_data_input_stream_read_line() allocates found_pos + newline_len + 1 bytes and reads found_pos + newline_len bytes, but then writes line[found_pos] = 0, discarding the newline bytes that were just read into line[found_pos..found_pos+newline_len-1]. Those bytes remain consumed from the stream (correct) but the extra (newline_len) bytes in the allocation past the NUL are left holding the raw newline data and are never cleared. This is not a buffer overrun (allocation covers them) but it is wasted work: the newline bytes are copied into the result buffer only to be orphaned. Minor inefficiency / potential confusion if a caller inspects bytes past the returned length.","fix":"Either allocate only found_pos + 1 and skip the newline via g_input_stream_skip(), mirroring the async g_data_input_stream_read_complete() path, or document that the trailing bytes are intentional scratch space.","locations":[{"ref":"gio/gdatainputstream.c:789-798","code":"  789 |   line = g_malloc (found_pos + newline_len + 1);\n  790 | \n  791 |   res = g_input_stream_read (G_INPUT_STREAM (stream),\n  792 | \t\t\t     line,\n  793 | \t\t\t     found_pos + newline_len,\n  794 | \t\t\t     NULL, NULL);\n  795 |   if (length)\n  796 |     *length = (gsize)found_pos;\n  797 |   g_warn_if_fail (res == found_pos + newline_len);\n  798 |   line[found_pos] = 0;"}]},{"id":"LOGIC_6","type":"logic_error","type_label":"Logic Error","severity":"low","description":"g_inet_address_mask_new_from_string parses the prefix length with strtoul into a guint without checking the parsed value against the property's documented range. Values > 128 are silently relied upon to be clamped/rejected by g_param_spec_uint's range (0..128) inside g_inet_address_mask_new, which emits a g_warning (critical) rather than returning a clean GError. A user-supplied mask string such as \"10.0.0.0/999\" thus produces a console warning instead of a graceful parse error.","fix":"After strtoul, validate that the value parsed cleanly and is <= 128 (or <= native_size*8), and goto parse_error to return G_IO_ERROR_INVALID_ARGUMENT instead of relying on the GParamSpec range warning.","locations":[{"ref":"gio/ginetaddressmask.c:300-313","code":"  300 |   slash = strchr (mask_string, '/');\n  301 |   if (slash)\n  302 |     {\n  303 |       gchar *address, *end;\n  304 | \n  305 |       length = strtoul (slash + 1, &end, 10);\n  306 |       if (*end || !*(slash + 1))\n  307 | \t{\n  308 | \tparse_error:\n  309 | \t  g_set_error (error, G_IO_ERROR, G_IO_ERROR_INVALID_ARGUMENT,\n  310 | \t\t       _(\"Could not parse “%s” as IP address mask\"),\n  311 | \t\t       mask_string);\n  312 | \t  return NULL;\n  313 | \t}"}]},{"id":"LOGIC_7","type":"logic_error","type_label":"Logic Error","severity":"low","description":"g_local_file_trash() bails out entirely if g_stat() on the user's home directory fails (returns FALSE with an error built from the file being trashed). The home-dir stat is only needed to compare st_dev to decide whether to use the home trash dir; a transient failure to stat $HOME (e.g. permissions, automount) prevents trashing a file that could otherwise be trashed to a topdir .Trash-$uid directory. The error message also misleadingly refers to the file being trashed rather than to the home directory that actually failed to stat.","fix":"On failure to stat the home directory, fall through to the non-homedir trash path (treat is_homedir_trash as FALSE) instead of aborting the whole trash operation; or at minimum report the home directory in the error message.","locations":[{"ref":"gio/glocalfile.c:2147-2156","code":" 2147 |   homedir = g_get_home_dir ();\n 2148 |   if (g_stat (homedir, &home_stat) != 0)\n 2149 |     {\n 2150 |       errsv = errno;\n 2151 | \n 2152 |       g_set_io_error (error,\n 2153 |                       _(\"Error trashing file %s: %s\"),\n 2154 |                       file, errsv);\n 2155 |       return FALSE;\n 2156 |     }"}]},{"id":"LOGIC_8","type":"logic_error","type_label":"Logic Error","severity":"low","description":"In _g_local_file_info_get(), parent_info is treated as nullable: it is explicitly NULL-guarded at the mountpoint check (`if (... && parent_info && parent_info->device != 0 ...)`), yet a few lines later it is dereferenced unconditionally as `&parent_info->extra_data` / `&parent_info->free_extra_data` when a VFS implementation provides local_file_add_info (the default gvfs does). All current in-tree callers happen to pass a non-NULL parent_info, so this is latent, but the inconsistent NULL handling is a NULL-deref waiting to happen if a future caller passes NULL (which the guard at line 2162 implies is allowed).","fix":"Either drop the NULL guard at line 2162 (documenting parent_info as required) or guard the local_file_add_info call: pass NULL pointers for extra_data/free_extra_data when parent_info == NULL, e.g. `parent_info ? &parent_info->extra_data : NULL`.","locations":[{"ref":"gio/glocalfileinfo.c:2162-2165","code":" 2162 |   if (stat_ok && parent_info && parent_info->device != 0 &&\n 2163 |       _g_file_attribute_matcher_matches_id (attribute_matcher, G_FILE_ATTRIBUTE_ID_UNIX_IS_MOUNTPOINT))\n 2164 |     _g_file_info_set_attribute_boolean_by_id (info, G_FILE_ATTRIBUTE_ID_UNIX_IS_MOUNTPOINT,\n 2165 |                                               (_g_stat_dev (&statbuf) != parent_info->device || _g_stat_ino (&statbuf) == parent_info->inode));"},{"ref":"gio/glocalfileinfo.c:2228-2238","code":" 2228 |   if (class->local_file_add_info)\n 2229 |     {\n 2230 |       class->local_file_add_info (vfs,\n 2231 |                                   path,\n 2232 |                                   device,\n 2233 |                                   attribute_matcher,\n 2234 |                                   info,\n 2235 |                                   NULL,\n 2236 |                                   &parent_info->extra_data,\n 2237 |                                   &parent_info->free_extra_data);\n 2238 |     }"}]},{"id":"LOGIC_9","type":"logic_error","type_label":"Logic Error","severity":"low","description":"strinfo_string_to_words() is declared to return guint but returns FALSE (0) when the string exceeds STRINFO_MAX_WORDS. Callers store the result in 'guint n_words' and pass it to strinfo_scan(); with n_words == 0, strinfo_scan's inner loop never executes so j == 0 == n_words and it reports a match at index 0 for any non-empty array. A lookup of an over-long (>65 char) string can thus spuriously succeed. In practice over-long nicks are rejected at compile time, but the silent 0/FALSE conflation is a latent correctness bug.","fix":"Return a sentinel (e.g. 0) and have callers explicitly treat 0 as 'no match' / invalid before calling strinfo_scan, or change the return type to a signed value and check for the error case.","locations":[{"ref":"gio/strinfo.c:120-140","code":"  120 | G_GNUC_UNUSED static guint\n  121 | strinfo_string_to_words (const gchar *string,\n  122 |                          guint32     *words,\n  123 |                          gboolean     alias)\n  124 | {\n  125 |   guint n_words;\n  126 |   gsize size;\n  127 | \n  128 |   size = strlen (string);\n  129 | \n  130 |   n_words = MAX (2, (size + 6) >> 2);\n  131 | \n  132 |   if (n_words > STRINFO_MAX_WORDS)\n  133 |     return FALSE;\n  134 | \n  135 |   words[0] = GUINT32_TO_LE (alias ? 0xfe : 0xff);\n  136 |   words[n_words - 1] = GUINT32_TO_BE (0xff);\n  137 |   memcpy (((gchar *) words) + 1, string, size + 1);\n  138 | \n  139 |   return n_words;\n  140 | }"},{"ref":"gio/strinfo.c:171-186","code":"  171 | G_GNUC_UNUSED static gint\n  172 | strinfo_find_string (const guint32 *strinfo,\n  173 |                      guint          length,\n  174 |                      const gchar   *string,\n  175 |                      gboolean       alias)\n  176 | {\n  177 |   guint32 words[STRINFO_MAX_WORDS];\n  178 |   guint n_words;\n  179 | \n  180 |   if (length == 0)\n  181 |     return -1;\n  182 | \n  183 |   n_words = strinfo_string_to_words (string, words, alias);\n  184 | \n  185 |   return strinfo_scan (strinfo + 1, length - 1, words, n_words);\n  186 | }"}]},{"id":"LOGIC_10","type":"logic_error","type_label":"Logic Error","severity":"low","description":"parse_bookmark application metadata reads the optional `count` attribute with atoi(), which (a) silently maps non-numeric/garbage text to 0 with no error, and (b) accepts negative values, storing a negative registration count into ai->count (a guint-like counter). A crafted .xbel bookmark file can thus set an application's launch count to a negative/zero/garbage value. Low impact, but inconsistent with the rest of the markup parser which reports G_MARKUP_ERROR on bad content.","fix":"Parse with g_ascii_strtoll() and validate the full string and a non-negative range, reporting G_MARKUP_ERROR_INVALID_CONTENT on failure; clamp to >= 0.","locations":[{"ref":"glib/gbookmarkfile.c:949-952","code":"  949 |   if (count)\n  950 |     ai->count = atoi (count);\n  951 |   else\n  952 |     ai->count = 1;"}]},{"id":"ERR_1","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"low","description":"g_base64_decode_inplace() bails out with `g_return_val_if_fail (input_length > 1, NULL)` for inputs of length 0 or 1, returning NULL without ever writing to the inout `*out_len` parameter. Callers that allocate `out_len` on the stack and read it after a NULL return (a natural usage given out_len is documented as inout) will read an uninitialized value. Other failure-free paths always set *out_len. This is an API inconsistency / uninitialized-output hazard for short inputs.","fix":"Set `*out_len = 0;` before (or instead of failing in) the short-input early return, or document explicitly that *out_len is left untouched when NULL is returned.","locations":[{"ref":"glib/gbase64.c:430-447","code":"  430 | guchar *\n  431 | g_base64_decode_inplace (gchar *text,\n  432 |                          gsize *out_len)\n  433 | {\n  434 |   gint state = 0;\n  435 |   size_t input_length;\n  436 |   guint save = 0;\n  437 | \n  438 |   g_return_val_if_fail (text != NULL, NULL);\n  439 |   g_return_val_if_fail (out_len != NULL, NULL);\n  440 | \n  441 |   input_length = strlen (text);\n  442 | \n  443 |   g_return_val_if_fail (input_length > 1, NULL);\n  444 | \n  445 |   *out_len = g_base64_decode_step (text, input_length, (guchar *) text, &state, &save);\n  446 | \n  447 |   return (guchar *) text;"}]},{"id":"ERR_2","type":"incorrect_error_handling","type_label":"Incorrect Error Handling","severity":"negligible","description":"do_splice() sets *bytes_transferd = result only on success but the caller variable n_written is read after do_splice returns FALSE only via goto out (not used), so no bug today. However do_splice() and do_copy_file_range() both translate EINVAL to G_IO_ERROR_NOT_SUPPORTED. For copy_file_range, EINVAL can also legitimately indicate overlapping ranges on the same file or unaligned offsets; mapping every EINVAL to NOT_SUPPORTED causes silent fallback to the slow copy path rather than surfacing a real error, which only matters for diagnosability.","fix":"This is intentional fallback behaviour; if more precise diagnostics are wanted, log the underlying errno at debug level before mapping EINVAL to NOT_SUPPORTED.","locations":[{"ref":"gio/gfile.c:3074-3078","code":" 3074 |           else if (errsv == ENOSYS || errsv == EINVAL || errsv == EOPNOTSUPP || errsv == EXDEV)\n 3075 |             {\n 3076 |               g_set_error_literal (error, G_IO_ERROR, G_IO_ERROR_NOT_SUPPORTED,\n 3077 |                                    _(\"Copy file range not supported\"));\n 3078 |             }"},{"ref":"gio/gfile.c:3188-3190","code":" 3188 |       else if (errsv == ENOSYS || errsv == EINVAL || errsv == EOPNOTSUPP)\n 3189 |         g_set_error_literal (error, G_IO_ERROR, G_IO_ERROR_NOT_SUPPORTED,\n 3190 |                              _(\"Splice not supported\"));"}]},{"id":"ERR_3","type":"incorrect_error_handling","type_label":"Inco
